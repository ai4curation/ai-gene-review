gene_symbol: OSTC
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: OSTC (DC2) is a small (149 aa) multi-pass endoplasmic reticulum membrane
  protein that is a non-catalytic accessory subunit of the oligosaccharyltransferase
  (OST) complex. It is a defining, complex-specific subunit of the STT3A-containing
  OST-A complex, which carries out co-translational N-linked glycosylation, the en
  bloc transfer of the Glc3Man9GlcNAc2 glycan from dolichol-pyrophosphate onto asparagine
  residues within Asn-X-Ser/Thr sequons of nascent polypeptides in the ER. OSTC does
  not itself possess glycotransferase activity (the catalytic subunit is STT3A); instead
  it acts as an adapter/anchor that tethers the OST-A complex to the SEC61 protein-conducting
  channel of the ER translocon, positioning the catalytic machinery adjacent to emerging
  nascent chains and thereby supporting efficient co-translational glycosylation. Loss
  of OSTC produces a co-translational hypoglycosylation phenotype resembling loss of
  STT3A itself, while STT3A complexes lacking OSTC remain enzymatically active but fail
  to form stable associations with the SEC61 complex. OSTC has been resolved by cryo-EM
  as a component of human OST-A and of the SEC61-OST-A-TRAP translocon.
