core_functions:
- description: OSTC (DC2) is a non-catalytic, complex-specific subunit of the STT3A-containing
    oligosaccharyltransferase OST-A complex in the ER membrane. Its subunit-specific
    molecular function is that of an adapter/anchor that tethers the OST-A complex to
    the SEC61 protein-conducting channel; through this membership it contributes to
    the complex's dolichyl-diphosphooligosaccharide-protein glycotransferase activity,
    supporting co-translational protein N-linked glycosylation.
