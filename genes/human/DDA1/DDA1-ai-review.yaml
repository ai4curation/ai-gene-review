id: Q9BW61
gene_symbol: DDA1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DDA1 (DET1- and DDB1-associated protein 1) is a small, evolutionarily conserved
  subunit shared by numerous CUL4-RING (CRL4) E3 ubiquitin ligase complexes. It is
  an integral, core component of DCX/CRL4 complexes built on a core of DDB1,
  cullin-4 (CUL4A or CUL4B) and RBX1, where it functions as a scaffolding subunit
  that wraps around DDB1 and the substrate receptor (DCAF) to stabilize the
  assembled ligase and promote efficient, processive substrate ubiquitination.
  DDA1 is not itself a substrate receptor and does not provide the catalytic RING;
  rather it acts as an accessory/stabilizing module that rigidifies the complex and
  positions the substrate for ubiquitin transfer. It has been structurally and
  biochemically characterized as part of the DDB1-DCAF15-DDA1 ligase that mediates
  aryl-sulfonamide (indisulam/E7820)-induced neosubstrate degradation of the
  splicing factor RBM39 (and its paralog RBM23), and it is also part of the DDD
  core complex (DET1-DDA1-DDB1) that recruits UBE2E-family E2 enzymes. Through its
  presence across many CRL4 complexes DDA1 broadly supports CUL4-dependent
  protein polyubiquitination and proteasomal degradation, with downstream
  consequences for diverse substrates and pathways. It localizes to the nucleus
  where most CRL4 complexes act.
