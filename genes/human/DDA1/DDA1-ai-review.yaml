suggested_questions:
- question: Across the full repertoire of CRL4 complexes, which substrate receptors (DCAFs) depend most strongly on DDA1 for assembly/activity, and is DDA1 dispensable for some?
- question: Does DDA1 contribute only to complex stability and substrate positioning, or does it also influence ubiquitin-chain processivity, linkage type, or neddylation/deneddylation dynamics of CRL4 ligases?
suggested_experiments:
- description: Compare RBM39 (and endogenous substrate) ubiquitination kinetics in reconstituted DDB1-CUL4-RBX1-DCAF complexes with and without DDA1, measuring effects on substrate affinity, ubiquitin-transfer rate, and processivity.
- description: Perform quantitative proteomics of DDA1-knockout versus wild-type cells to define which CRL4 substrate pools are stabilized, distinguishing DDA1-dependent from DDA1-independent CRL4 functions.
