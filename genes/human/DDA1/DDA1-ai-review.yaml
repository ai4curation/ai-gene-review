core_functions:
- description: Shared core scaffolding/stabilizing subunit of CUL4-RING (CRL4/DCX) E3 ubiquitin ligase complexes (DDB1-CUL4A/CUL4B-RBX1 with a DCAF receptor), where DDA1 rigidifies the assembly and the substrate receptor fold to promote efficient CRL4-mediated polyubiquitination and proteasomal degradation of substrates. DDA1 is neither the substrate receptor nor the catalytic RING.
