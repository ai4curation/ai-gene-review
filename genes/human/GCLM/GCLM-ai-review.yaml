id: P48507
gene_symbol: GCLM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GCLM is the modifier (regulatory, light) subunit of glutamate-cysteine ligase
  (GCL; gamma-glutamylcysteine synthetase), the enzyme that catalyzes the first
  and rate-limiting step of glutathione biosynthesis: the ATP-dependent ligation
  of L-glutamate and L-cysteine to form gamma-glutamylcysteine. GCL is a
  cytosolic heterodimer of a catalytic heavy chain (GCLC) and this regulatory
  light chain. GCLM has no glutamate-cysteine ligase activity on its own; it
  binds GCLC and optimizes catalysis by the holoenzyme, lowering the Km for
  glutamate and ATP and raising the Ki for feedback inhibition by glutathione,
  thereby increasing the efficiency of glutathione synthesis. As glutathione is
  the principal cellular thiol antioxidant, GCLM is central to redox homeostasis
  and antioxidant defense; its gene is an NRF2 (NFE2L2)/ARE target induced by
  oxidative and xenobiotic stress. Reduced GCLM activity lowers glutathione and
  is associated with hemolytic anemia and cardiovascular phenotypes.
