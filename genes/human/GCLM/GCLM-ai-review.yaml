- term:
    id: GO:0004357
    label: glutamate-cysteine ligase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      This electronic annotation asserts that GCLM "enables" glutamate-cysteine
      ligase (catalytic) activity. That is misleading for the modifier subunit:
      GCLM has no ligase activity on its own; catalysis resides in GCLC and GCLM
      only contributes to holoenzyme activity. The experimental annotation to
      this term correctly uses the contributes_to qualifier (PMID:16183645).
      Recommend replacing the standalone catalytic MF with the regulator
      activity that GCLM actually enables (GO:1990609), keeping the catalytic
      term only as contributes_to.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:1990609
      label: glutamate-cysteine ligase regulator activity
