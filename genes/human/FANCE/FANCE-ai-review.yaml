- term:
    id: GO:0060090
    label: molecular adaptor activity
  evidence_type: IDA
  original_reference_id: PMID:12093742
  qualifier: enables
  review:
    summary: >-
      FANCE functions as a molecular adaptor/bridge, directly binding both FANCC (and the
      FA core complex) and the downstream substrate FANCD2, physically linking the core
      complex to its substrate. This is FANCE's defining, informative molecular function
      (in contrast to the generic 'protein binding' annotations).
    action: NEW
    reason: >-
      No informative molecular-function term is present in GOA (only GO:0005515). FANCE
      binds two partners (FANCC and FANCD2) to coordinate their function, matching the
      definition of molecular adaptor activity (bringing molecules together to act in a
      coordinated way). Supported by direct interaction and functional-bridging evidence.
    supported_by:
    - reference_id: PMID:12093742
      supporting_text: provides a critical bridge between the FA complex and FANCD2
    - reference_id: PMID:12093742
      supporting_text: FANCE protein is part of this nuclear complex, binding both FANCC and FANCD2
    - reference_id: PMID:12649160
      supporting_text: Direct interaction between FANCE and FANCD2 was also demonstrated in the yeast 2-hybrid system
    - reference_id: PMID:16513431
      supporting_text: FANCE is predominantly localized in the nucleus and acts as a molecular bridge between the FA core complex and FANCD2, through direct binding of both FANCC and FANCD2
    - reference_id: PMID:16127171
      supporting_text: FANCE is shown to be a key mediator of protein interactions both in the architecture of the FA protein complex and in the connection of complex components to the putative downstream targets of complex activity
