- description: >-
    Molecular adaptor within the Fanconi anemia core complex: FANCE directly binds FANCC
    (bridging into the assembled FA core complex) and directly binds the substrate FANCD2,
    physically linking the core complex to its downstream substrate and thereby promoting
    DNA-damage-induced FANCD2 monoubiquitination and interstrand crosslink repair. FANCE
    is also required for the nuclear accumulation of FANCC.
  supported_by:
  - reference_id: PMID:12093742
    supporting_text: provides a critical bridge between the FA complex and FANCD2
  - reference_id: PMID:12093742
    supporting_text: FANCE protein is part of this nuclear complex, binding both FANCC and FANCD2
  - reference_id: PMID:12649160
    supporting_text: A central region of FANCE was sufficient for FANCC binding
  - reference_id: PMID:24451376
    supporting_text: the Phe-522 within the region is a critical residue for the ability of FANCE to recruit FANCD2 to the FA core complex and to induce the subsequent monoubiquitination reaction
  - reference_id: PMID:12239156
    supporting_text: FANCE is a component of the nuclear FA complex in vivo and is required for the monoubiquitination of FANCD2
  molecular_function:
