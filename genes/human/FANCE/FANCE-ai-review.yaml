id: Q9HB96
gene_symbol: FANCE
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FANCE (Fanconi anemia group E protein) is a non-catalytic nuclear subunit of the
  eight-membered Fanconi anemia (FA) core complex (FANCA, FANCB, FANCC, FANCE, FANCF,
  FANCG, FANCL and FANCM, together with associated FAAP proteins). The FA core complex
  is a multisubunit RING-type (FANCL-catalyzed) ubiquitin ligase that monoubiquitinates
  the FANCD2-FANCI (ID2) heterodimer in response to replication-blocking DNA interstrand
  crosslinks, initiating crosslink repair via nucleolytic incision, translesion synthesis
  and homologous recombination. Within the complex, FANCE acts as a molecular adaptor
  that directly binds FANCC and directly binds the downstream substrate FANCD2, thereby
  bridging the assembled core complex to its substrate; it is also required for the
  nuclear accumulation of FANCC. FANCE is phosphorylated by the checkpoint kinase CHEK1
  (Chk1) at Thr346 and Ser374, a modification dispensable for FANCD2 monoubiquitination
  but required for full crosslink resistance. Biallelic loss-of-function of FANCE causes
  Fanconi anemia complementation group E, characterized by bone marrow failure,
  congenital malformations, cancer predisposition, and cellular hypersensitivity to
  crosslinking agents with chromosomal instability.
