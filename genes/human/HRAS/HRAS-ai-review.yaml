      nucleotide-state-dependent effector or regulator engagement it would be
      better captured by a specific binding term, and many large-scale
      interactome hits lack mechanistic validation.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
