      of HRAS.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This automated IEA row appears to over-project broad Ras-family or
      pathway-derived developmental biology onto HRAS; direct evidence that
      wild-type HRAS is a proximal regulator of adipose tissue development was
      not identified in this review.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
