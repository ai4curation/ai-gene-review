        “development,” “cell cycle,” “transcriptional regulation,”
        “immune/inflammatory processes”) unless there is direct mechanistic
        evidence placing *wild-type HRAS* as a proximal regulator rather than a
        downstream correlate. Large interactome datasets include false positives
        and many context-specific interactors.
