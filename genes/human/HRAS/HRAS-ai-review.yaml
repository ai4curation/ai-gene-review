- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Nuclear localization is not characteristic of the canonical farnesylated,
      membrane-anchored H-Ras p21 isoform.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The mature p21 H-Ras is targeted to the plasma membrane and
      Golgi/endomembranes via CAAX prenylation and palmitoylation; nuclear
      localization is reported mainly for the minor alternatively spliced p19
      (H-RasIDX) isoform, so a general nuclear CC annotation over-projects onto
      the main gene product.
    supported_by:
    - reference_id: PMID:14500341
      supporting_text: >-
        Both the endogenous and the transiently expressed p19 protein are
        detected in COS-1 and HeLa cells and show nuclear diffuse and speckled
        patterns as well as cytoplasmic localization.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      A broad cytoplasm annotation is consistent with HRAS biology but less
      informative than its specific membrane locations.
    action: KEEP_AS_NON_CORE
    reason: >-
      Newly synthesized and a fraction of HRAS exists in the cytoplasm prior to
      membrane targeting, and the p19 isoform shows cytoplasmic localization;
      however, the functionally meaningful locations are plasma membrane and
      Golgi/endomembrane, so the generic cytoplasm term is retained as non-core.
    supported_by:
    - reference_id: PMID:14500341
      supporting_text: >-
        Both the endogenous and the transiently expressed p19 protein are
        detected in COS-1 and HeLa cells and show nuclear diffuse and speckled
        patterns as well as cytoplasmic localization.
