- term:
    id: GO:0071480
    label: cellular response to gamma radiation
  evidence_type: IDA
  original_reference_id: PMID:16213212
  review:
    summary: >-
      The cited reference concerns RPL26/nucleolin control of p53 translation
      after irradiation and does not establish a direct, proximal HRAS role in
      the gamma-radiation response.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PMID:16213212 focuses on p53 translational induction by RPL26 and
      nucleolin after DNA damage; there is no direct evidence here that
      wild-type HRAS is a proximal mediator of the cellular response to gamma
      radiation, so this is a distal/indirect over-annotation.
    supported_by:
    - reference_id: PMID:16213212
      supporting_text: >-
        Ribosomal protein L26 (RPL26) and nucleolin were found to bind to the 5'
        untranslated region (UTR) of p53 mRNA and to control p53 translation and
        induction after DNA damage.
