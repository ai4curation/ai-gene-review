references:
- id: file:human/HRAS/HRAS-deep-research-falcon.md
  title: Falcon deep research synthesis for human HRAS
  findings:
  - statement: >-
      HRAS is a small GTPase molecular switch whose core GO annotations should
      prioritize GTP binding, GTPase activity, Ras protein signal transduction,
      positive regulation of MAPK cascade, and plasma membrane/Golgi membrane
      localization, while distal oncogenic mutant phenotypes should be curated
      conservatively.
    supporting_text: >-
      “Ras protein signal transduction” and “positive regulation of MAPK
      cascade” are generally **core** for HRAS, but very specific outcome terms
      (e.g., “cell cycle progression” as a default) should be restricted to
      contexts with strong, direct, wild-type evidence.
