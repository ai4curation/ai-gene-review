id: P01112
gene_symbol: HRAS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HRAS encodes H-Ras, a membrane-associated small GTPase that acts as a
  GDP/GTP-regulated molecular switch in Ras signal transduction. Its core
  function is GTP binding and hydrolysis with nucleotide-state-dependent
  recruitment of effectors, especially pathways leading to RAF-MEK-ERK signaling;
  membrane targeting through CAAX processing and palmitoylation localizes H-Ras
  to plasma membrane and Golgi/endomembrane compartments. Many proliferation,
  senescence, transcription, migration, and developmental annotations are
  context-dependent downstream outcomes, often derived from oncogenic mutant or
  overexpression studies, and should not be treated as the core molecular
  function of wild-type HRAS.
alternative_products:
- name: 1 (H-Ras4A, p21)
  id: P01112-1
- name: 2 (H-RasIDX, p19)
  id: P01112-2
  sequence_note: VSP_041597
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HRAS is membrane-targeted and signals from the plasma membrane.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is central to HRAS signaling, supported by
      CAAX processing and palmitoylation-dependent trafficking.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        HRAS contains a C-terminal **CAAX motif** that is post-translationally
        processed by a canonical sequence: **farnesylation → AAX proteolysis
        (RCE1) → carboxymethylation (ICMT)**.
- term:
    id: GO:0007265
    label: Ras protein signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HRAS is a canonical Ras-family GTPase that mediates Ras protein signal
      transduction.
    action: ACCEPT
    reason: >-
      Ras protein signal transduction is the core biological process for HRAS as
      a GDP/GTP-regulated molecular switch.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        RAS proteins (including HRAS) are **GTP hydrolases** that function as
        **binary molecular switches**: GDP-bound is “OFF,” GTP-bound is “ON,”
        and the ON state supports binding to downstream effector proteins.
- term:
    id: GO:0008284
    label: positive regulation of cell population proliferation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HRAS signaling can promote proliferation, but this is a downstream and
      context-dependent outcome rather than the core HRAS molecular function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Proliferation is a canonical outcome of Ras signaling in some cellular
      contexts, but it depends on cell type, stimulus duration, feedback, and
      mutant versus wild-type HRAS state.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        RAS-ERK signaling dynamics can bias proliferation versus
        differentiation outputs, but these outcomes depend strongly on cell
        type and signaling kinetics.
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HRAS has intrinsic GTPase activity.
    action: ACCEPT
    reason: >-
      GTP hydrolysis is the core molecular switch activity of HRAS.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Intrinsic GTPase activity is **accelerated by GAPs**, while **GEFs
        promote GDP→GTP exchange**.
- term:
    id: GO:0090398
    label: cellular senescence
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cellular senescence is a context-dependent outcome of oncogenic Ras
      signaling rather than the primary normal function of HRAS.
    action: KEEP_AS_NON_CORE
    reason: >-
      Senescence evidence is strongly tied to oncogenic Ras expression and
      should not be treated as the core function of wild-type HRAS.
    supported_by:
    - reference_id: PMID:9054499
      supporting_text: >-
        Here we show that expression of oncogenic ras in primary human or rodent
        cells results in a permanent G1 arrest.
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Apoptosis/senescence: generally non-core default for HRAS
- term:
    id: GO:0000139
    label: Golgi membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Golgi membrane localization is part of HRAS lipidation-dependent membrane
      trafficking.
    action: ACCEPT
    reason: >-
      HRAS is processed and trafficked through ER/Golgi membranes before plasma
      membrane localization.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Palmitoylation provides the “second signal” for HRAS membrane targeting
        beyond prenylation and supports vesicular transport from
        **Golgi→plasma membrane**; palmitoylation is **reversible/dynamic**,
        supporting HRAS cycling between Golgi and plasma membrane.
- term:
    id: GO:0000165
    label: MAPK cascade
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      HRAS activates signaling through the RAF-MEK-ERK MAPK cascade.
    action: ACCEPT
    reason: >-
      MAPK cascade signaling is a proximal canonical Ras output, although
      distal phenotypic outcomes should be curated separately.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        RAS proteins sit at the apex of the **RAF–MEK–ERK (MAPK) cascade**, and
        Ras-effector binding directly routes signals into MAPK outputs.
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      HRAS has intrinsic GTPase activity.
    action: ACCEPT
    reason: >-
      GTPase activity is the core catalytic molecular function of HRAS.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Intrinsic GTPase activity is **accelerated by GAPs**, while **GEFs
        promote GDP→GTP exchange**.
- term:
    id: GO:0003925
    label: G protein activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: >-
      HRAS is a small monomeric GTPase rather than a heterotrimeric G protein;
      the more precise annotation is GTPase activity.
    action: MODIFY
    reason: >-
      GO:0003925 can cover Ras-family GTPases, but the annotation should use
      GO:0003924 because it captures the catalytic GTP-hydrolysis function more
      precisely.
    proposed_replacement_terms:
    - id: GO:0003924
      label: GTPase activity
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        HRAS is a canonical RAS small GTPase that binds GDP/GTP with high
        affinity and functions as a nucleotide-dependent molecular switch.
