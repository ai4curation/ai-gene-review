- term:
    id: GO:0014044
    label: Schwann cell development
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Schwann cell development is a distal developmental outcome and is not a
      core HRAS molecular function annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This automated IEA row appears to over-project broad Ras-family or
      pathway-derived developmental biology onto HRAS; there is no direct
      evidence in this review that wild-type HRAS is a proximal regulator of
      Schwann cell development specifically.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        2) **Avoid overly broad BP terms** (e.g., generic “cancer,”
        “development,” “cell cycle,” “transcriptional regulation,”
        “immune/inflammatory processes”) unless there is direct mechanistic
        evidence placing *wild-type HRAS* as a proximal regulator rather than a
        downstream correlate. Large interactome datasets include false positives
        and many context-specific interactors.
- term:
    id: GO:0042552
    label: myelination
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Myelination is a distal developmental outcome and is not supported as a
      core HRAS annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This automated IEA row appears to over-project broad Ras-family or
      pathway-derived developmental biology onto HRAS; HRAS mutations can cause
      developmental phenotypes, but that does not make myelination a proximal
      wild-type HRAS function for GO annotation.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Do not transfer oncogenic mutant phenotypes to wild-type HRAS GO BP
