      protein-membrane adaptor activity.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Membrane targeting by CAAX prenylation and palmitoylation | HRAS uses
        CAAX farnesylation, AAX cleavage, carboxymethylation, and reversible
        palmitoylation as the core membrane-targeting logic.
- term:
