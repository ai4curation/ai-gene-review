- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:11598133
  review:
    summary: >-
      This IPI annotation records a physical interaction of HRAS with the GEF CNrasGEF (Nedd4 regulation).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The bare 'protein binding' (GO:0005515) term is uninformative for a hub
      GTPase like HRAS; where the interaction reflects a bona fide,
      nucleotide-state-dependent effector or regulator engagement it would be
      better captured by a specific binding term, and many large-scale
      interactome hits lack mechanistic validation.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        Broad protein-binding annotation adds little value when specific effector
        binding terms are available with direct evidence.
