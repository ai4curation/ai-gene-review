- term:
    id: GO:0007265
    label: Ras protein signal transduction
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      HRAS is directly involved in Ras protein signal transduction.
    action: ACCEPT
    reason: >-
      This is the core biological process for the HRAS GTPase switch.
    supported_by:
    - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
      supporting_text: >-
        “Ras protein signal transduction” and “positive regulation of MAPK
        cascade” are generally **core** for HRAS, but very specific outcome
        terms (e.g., “cell cycle progression” as a default) should be
        restricted to contexts with strong, direct, wild-type evidence.
