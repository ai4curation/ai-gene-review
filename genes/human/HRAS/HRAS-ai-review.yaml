core_functions:
- molecular_function:
    id: GO:0003924
    label: GTPase activity
  description: >-
    HRAS is a small monomeric GTPase that binds GDP/GTP and hydrolyzes GTP to
    operate as a molecular switch. In its GTP-bound state it recruits effectors
    that transmit Ras signaling, especially through RAF-MEK-ERK/MAPK pathways.
    Membrane targeting through CAAX processing and palmitoylation places this
    switch primarily at the plasma membrane and Golgi/endomembrane
    compartments. Proliferation, senescence, motility, and transcriptional
    outputs are downstream, context-dependent consequences rather than the core
    molecular function.
  directly_involved_in:
  - id: GO:0007265
    label: Ras protein signal transduction
  - id: GO:0043410
    label: positive regulation of MAPK cascade
  locations:
  - id: GO:0005886
    label: plasma membrane
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
    supporting_text: >-
      RAS proteins (including HRAS) are **GTP hydrolases** that function as
      **binary molecular switches**: GDP-bound is “OFF,” GTP-bound is “ON,” and
      the ON state supports binding to downstream effector proteins.
- molecular_function:
    id: GO:0005525
    label: GTP binding
  description: >-
    HRAS binding to GTP/GDP is co-equal with GTP hydrolysis in the Ras molecular
    switch: GDP-bound HRAS is inactive, while GTP-bound HRAS recruits effectors
    that route signals into MAPK and other Ras effector pathways.
  directly_involved_in:
  - id: GO:0007265
    label: Ras protein signal transduction
  locations:
  - id: GO:0005886
    label: plasma membrane
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: file:human/HRAS/HRAS-deep-research-falcon.md
    supporting_text: >-
      GTP binding | HRAS is a canonical RAS small GTPase that binds GDP/GTP
      with high affinity and functions as a nucleotide-dependent molecular
      switch.
proposed_new_terms: []
suggested_questions:
- question: >-
    Which HRAS effector interactions in the GOA set are supported by direct
    GTP-state-dependent binding and should be converted from generic protein
    binding to specific effector-binding annotations?
- question: >-
    Which distal proliferation, transcription, migration, or developmental
    annotations are based on oncogenic mutant HRAS rather than normal wild-type
    HRAS signaling?
- question: >-
    Should HRAS compartment-specific signaling from plasma membrane, Golgi, and
    recycling endosome be represented with separate non-core localization or
    process annotations?
suggested_experiments:
- description: >-
    Curate the generic protein-binding rows by mapping each interactor to
    nucleotide-state-dependent effector evidence and replacing supported rows
    with specific binding terms where available.
- description: >-
    Compare wild-type HRAS and oncogenic HRAS alleles in controlled cell systems
    for MAPK, PI3K, PLCepsilon, senescence, and transcriptional outputs to
    distinguish core signaling from mutant-specific phenotypes.
- description: >-
    Use live-cell imaging with palmitoylation/prenylation mutants to separate
    plasma membrane, Golgi, and recycling-endosome pools and their contribution
    to effector activation.
