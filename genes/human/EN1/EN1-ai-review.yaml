id: Q05925
gene_symbol: EN1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  EN1 is an engrailed-family homeobox transcription factor that binds cis-regulatory
  DNA and can repress RNA polymerase II transcription. It functions in the nucleus
  and on chromatin. Vertebrate genetic studies place EN1 in midbrain-hindbrain
  organizer maintenance, regional cerebellar patterning and foliation, ventral limb
  patterning, and the long-term survival of midbrain dopaminergic neurons. EN1 and
  its paralog EN2 have overlapping but context-dependent developmental roles, so
  phenotypes from compound-mutant studies do not necessarily identify EN1-specific
  direct targets.
