id: P00390
gene_symbol: GSR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: GSR encodes glutathione-disulfide reductase (glutathione reductase, GR;
  EC 1.8.1.7), an FAD-dependent, NADPH-using homodimeric flavoenzyme of the class-I
  pyridine nucleotide-disulfide oxidoreductase family. It catalyzes the reduction of
  oxidized glutathione (glutathione disulfide, GSSG) to two molecules of reduced glutathione
  (GSH) using NADPH, and constitutes the major mechanism maintaining the high cellular
  GSH:GSSG ratio that underpins antioxidant defense and thiol redox homeostasis. Each
  subunit binds one FAD; catalysis proceeds via a redox-active active-site disulfide
  and electron flow from NADPH through FAD. The enzyme is dually targeted to the cytosol
  and mitochondria through alternative initiation/splicing, with distinct mitochondrial
  and cytoplasmic isoforms. In humans, biallelic loss-of-function causes congenital
  non-spherocytic hemolytic anemia, with hemolytic crises triggered by oxidative stress
  or ingestion of fava beans (favism).
