suggested_questions:
- question: >-
    What structural determinants allow the PI16 CAP domain to inhibit both the
    metalloprotease MMP2 and the cysteine protease cathepsin K, and what is its
    complete physiological target spectrum?
  experts:
  - Stephen J. White
  - Zoltán Pós
- question: >-
    Which PI16 isoforms and post-translational processing events determine
    GPI-anchored plasma-membrane display versus release into serum, urine, or
    tissue interstitium?
  experts:
  - Zoltán Pós
  - Jonathan R. Reeves
- question: >-
    Do PI16-dependent control of chemerin activation, cardiomyocyte growth, and
    endothelial-barrier permeability observed in mice operate in human tissues,
    and which effects require MMP2 versus cathepsin K inhibition?
  experts:
  - Stefan Engelhardt
  - Annemieke Kavelaars
suggested_experiments:
- description: >-
    Express mammalian-glycosylated human PI16 isoforms and CAP-domain mutants,
    then measure binding kinetics and inhibition constants against a focused panel
    of MMPs, cysteine cathepsins, and unrelated extracellular proteases.
  experiment_type: recombinant protein biochemistry, enzyme kinetics, and structure-guided mutagenesis
  hypothesis: >-
    PI16 directly inhibits a restricted target set centered on MMP2 and cathepsin
    K through separable CAP-domain interaction surfaces.
- description: >-
    Endogenously tag each PI16 isoform in primary human fibroblasts, coronary
    endothelial cells, and skin-homing T cells; combine phosphatidylinositol-specific
    phospholipase C treatment, pulse-chase labeling, secretome proteomics, and
    C-terminal anchor-site mutagenesis.
  experiment_type: isoform-resolved genome editing, cell-surface biochemistry, and quantitative secretomics
  hypothesis: >-
    Cell type and isoform-specific GPI-anchor processing determine the balance
    between membrane-tethered and soluble PI16 pools.
- description: >-
    Compare wild-type and PI16-null human fibroblast/endothelial co-cultures under
    laminar shear or inflammatory cytokines, with rescue by wild-type PI16 and
    mutants selectively defective in MMP2 or cathepsin K inhibition. Quantify
    protease activity, endothelial migration, barrier permeability, and chemerin
    proteoforms.
  experiment_type: CRISPR genetics, vascular co-culture, protease reporters, and targeted proteomics
  hypothesis: >-
    PI16 restrains MMP2-dependent endothelial migration at baseline, while loss or
    inflammatory down-regulation shifts proteolysis and barrier behavior; chemerin
    processing depends specifically on cathepsin K inhibition.
knowledge_gaps:
- gap_statement: >-
    The physiological protease-target spectrum and structural inhibition mechanism
    of human PI16 are incompletely defined.
  boundary: >-
    Direct experiments support MMP2 and cathepsin K inhibition, but CAP-family
    membership does not justify extrapolation to all metalloproteases or cysteine
    peptidases.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Defining target selectivity is required to understand PI16's molecular function
    across vascular, cardiac, immune, and fibroblast contexts.
  resolution: >-
    Quantitative enzyme panels, direct binding measurements, PI16-protease
    structures, and separation-of-function mutants should establish specificity
    and mechanism.
  provenance:
  - reference_id: PMID:27996045
    supporting_text: recombinant PI16 produced in E. coli showed a strong inhibition of recombinant MMP2 activity
  - reference_id: PMID:30365157
    supporting_text: Inhibitor screening and pull-down experiments confirmed that PI16 inhibits cathepsin K
- gap_statement: >-
    The relationship between GPI-anchored and soluble human PI16 pools is unknown.
  boundary: >-
    Human PI16 is directly observed at the GPI-anchored plasma membrane and is
    independently purified from serum and detected in urine, but the responsible
