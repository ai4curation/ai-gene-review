id: Q6UXB8
gene_symbol: PI16
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Peptidase inhibitor 16 is a glycosylated CAP-superfamily ectoprotein that can
  be displayed at the plasma membrane through a GPI anchor and is also recovered
  as a soluble protein in serum and urine. Human biochemical studies establish
  inhibition of matrix metalloproteinase 2 (MMP2) and cathepsin K, placing PI16
  in extracellular control of proteolysis. In coronary endothelial cells, PI16
  is induced by laminar shear, suppressed by inflammatory cytokines, and limits
  MMP activity and cell migration. PI16 is also expressed by fibroblast and
  immune-cell subsets; mouse studies connect its cathepsin K inhibition to
  reduced chemerin activation in the myocardium and associate fibroblast-derived
  Pi16 with cardiomyocyte growth and neuropathic-pain responses. The mechanisms
  producing membrane-tethered versus soluble PI16 and the breadth of its
  physiological protease targets remain unresolved.
alternative_products:
- name: '1'
  id: Q6UXB8-1
  description: >-
    Canonical 463-residue isoform containing the CAP domain and C-terminal
    hydrophobic GPI-anchor signal; isoform-specific activity has not been tested.
- name: '2'
  id: Q6UXB8-2
  sequence_note: VSP_025574
  description: >-
    Alternative isoform lacking residues 231-423 of the canonical sequence;
    distinct localization, release, and protease specificity are unknown.
