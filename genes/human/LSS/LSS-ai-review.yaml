suggested_questions:
- question: >-
    Does LSS have any non-catalytic (moonlighting) role in the ER membrane beyond
    producing lanosterol, or are all its phenotypes attributable to loss of
    lanosterol/downstream sterol synthesis?
- question: >-
    Is the lipid-droplet localization functionally meaningful (a site of active sterol
    synthesis) or purely a consequence of ER-lipid-droplet continuity during
    fractionation?
suggested_experiments:
- description: >-
    Quantitative sterol-flux and lens-crystallin aggregation assays comparing wild-type
    LSS with CTRCT44 (W581R, G588S) and HYPT14 (L102V, L248P, F391S) variants to separate
    catalytic loss from mislocalization effects.
- description: >-
    Subcellular fractionation plus proximity labeling to test whether catalytically
    active LSS is genuinely present on lipid droplets versus co-purifying with
    ER-derived membrane.
