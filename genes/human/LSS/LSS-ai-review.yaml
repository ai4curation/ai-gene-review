- term:
    id: GO:0016104
    label: triterpenoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      Automated (IEA, InterPro IPR018333) assignment to triterpenoid biosynthetic
      process, reflecting the broad squalene/oxidosqualene cyclase family mapping.
    action: KEEP_AS_NON_CORE
    reason: >-
      Not wrong at the family level: lanosterol is a triterpenoid and oxidosqualene
      cyclases generically make triterpenoids. In humans, however, the biologically
      meaningful process is the specific cholesterol/sterol biosynthetic pathway
      (GO:0006695), of which this term is a broader relative. Retain as non-core rather
      than as the primary process.
    supported_by:
    - reference_id: PMID:15525992
      supporting_text: >-
        In a highly selective cyclization reaction OSC forms lanosterol with seven
        chiral centres starting from the linear substrate 2,3-oxidosqualene.
