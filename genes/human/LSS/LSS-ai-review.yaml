id: P48449
gene_symbol: LSS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  LSS encodes lanosterol synthase (2,3-oxidosqualene-lanosterol cyclase, OSC;
  EC 5.4.99.7), the enzyme that catalyses the polycyclization of (S)-2,3-epoxysqualene
  (2,3-oxidosqualene) to lanosterol. This remarkable single reaction forms the sterol
  nucleus with seven chiral centres, producing the first cyclic sterol and the committed
  precursor of all downstream sterols, including cholesterol. LSS acts immediately after
  squalene epoxidase (SQLE) and constitutes the final committed step of lanosterol
  biosynthesis from farnesyl diphosphate. It is a monotopic (peripheral) protein of the
  endoplasmic reticulum membrane and functions as a monomer, adopting the double
  alpha/alpha toroid fold characteristic of the terpene cyclase/mutase family. In humans,
  biallelic loss-of-function or mislocalizing mutations cause a spectrum of autosomal
  recessive disorders including congenital cataract (CTRCT44), hypotrichosis simplex
  (HYPT14), and alopecia with intellectual disability (APMR4); its product lanosterol
  can reverse crystallin protein aggregation in the lens.
