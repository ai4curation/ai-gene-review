- term:
    id: GO:0005811
    label: lipid droplet
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) assignment of LSS activity to lipid droplets, supported by
      proteomic co-fractionation of LSS with the lipid-droplet fraction across species.
    action: KEEP_AS_NON_CORE
    reason: >-
      Lipid droplets are contiguous with the endoplasmic reticulum, and many ER lipid
      enzymes co-purify with the LD fraction (PMID:14741744, PMID:21498505). LSS may
      transiently associate with LDs, but its principal, experimentally established
      site of action is the ER membrane. Retain as a non-core localization rather than
      the primary functional compartment.
    supported_by:
    - reference_id: PMID:14741744
      supporting_text: >-
        a fraction enriched with lipid droplets was isolated from a human hepatocyte
        cell line HuH7 using sucrose density gradient centrifugation
