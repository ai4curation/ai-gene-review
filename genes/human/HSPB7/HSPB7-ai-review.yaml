suggested_questions:
- question: What is the molecular mechanism by which HSPB7 suppresses aggregation of
    clients such as polyglutamine-expanded proteins and mutant filamin without supporting
    their refolding?
- question: Does HSPB7's residence in SC35 splicing speckles reflect a role in RNA/splicing
    biology, or is it a storage/sequestration site distinct from its cytoskeletal function?
- question: How do HSPB7 hetero-oligomers with HSPB8/BAG3 contribute to chaperone-assisted
    selective autophagy in cardiomyocytes?
suggested_experiments:
- description: In vitro aggregation-suppression assays comparing HSPB7 with canonical
    HSPB1/HSPB5 on amyloidogenic and polyQ substrates, paired with refolding assays
    to confirm holdase/sequestrase (non-foldase) behavior.
- description: Domain-swap and point-mutation analysis of the HSPB7 N-terminal region
    (1-71) to dissect SC35-speckle targeting versus client sequestration.
- description: Cardiomyocyte HSPB7 knockout/knock-in models to test effects on filamin
    handling, proteostasis, and contractile function.
