core_functions:
- description: Non-canonical small heat shock protein that binds aggregation-prone
    client proteins and small-HSP partners (e.g. HSPB8, HSPB2, HSPB1) and sequesters
    them to suppress aggregation, without promoting substrate refolding.
  molecular_function:
    id: GO:0051082
    label: unfolded protein binding
  locations:
