    supporting_text: HSPB7 did not support refolding
  - reference_id: PMID:14594798
    supporting_text: HSP22 interacts with itself, cvHSP (HSPB7), MKBP (HSPB2) and HSP27
- description: Binding to the actin-crosslinking protein filamin (alpha-filamin / actin-binding
    protein 280) via the alpha-crystallin domain, linking HSPB7 to the cardiac/muscle
    cytoskeleton.
  molecular_function:
    id: GO:0031005
