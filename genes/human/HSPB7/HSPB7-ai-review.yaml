  id: NCBITaxon:9606
  label: Homo sapiens
description: HSPB7 (heat shock protein beta-7), also known as cardiovascular heat shock
  protein (cvHsp), is a member of the small heat shock protein (sHSP / HSP20, alpha-crystallin
  domain) family. It is selectively and highly expressed in cardiovascular and insulin-sensitive
  tissues, predominantly heart and skeletal muscle. HSPB7 binds the actin-crosslinking
  protein filamin (alpha-filamin / actin-binding protein 280) through its core alpha-crystallin
  domain and forms hetero-oligomeric complexes with other small heat shock proteins
  including HSPB8 (HSP22), HSPB2 (MKBP) and HSPB1 (HSP27). Unlike the canonical small
  HSPs HSPB1 and HSPB5, HSPB7 does not promote refolding of denatured substrates; instead
  it acts as a non-canonical chaperone/sequestrase that binds and sequesters aggregation-prone
  proteins (e.g. polyglutamine-expanded and filamin clients), suppressing their aggregation.
  HSPB7 localizes to the cytoplasm and nucleus and constitutively resides in SC35 nuclear
  splicing speckles via its N-terminal region. It is implicated in cardiac biology
  and cardiomyopathy risk.
