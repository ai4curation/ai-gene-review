gene_symbol: COQ8B
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  COQ8B (ADCK4) is a mitochondrial atypical protein kinase-like enzyme of the
  UbiB/ADCK family and the closest paralog of COQ8A (ADCK3); both are
  co-orthologs of yeast Coq8p. It is required for the biosynthesis of coenzyme Q10
  (ubiquinone), an essential lipid-soluble electron carrier of the respiratory
  chain, and it stabilizes and regulates the multi-subunit COQ metabolon (complex
  Q / CoQ synthome), interacting with COQ6, COQ7 and other COQ enzymes. The
  protein adopts an atypical protein kinase-like fold in which an N-terminal KxGQ
  motif occludes the canonical substrate-binding pocket; nucleotide (ATP) binding
  relieves this autoinhibition. In vitro it binds ATP and phosphorylates the
  metabolon enzyme COQ3, thereby increasing coenzyme Q production, but it does not
  phosphorylate coenzyme Q lipid intermediates and lacks canonical protein kinase
  activity toward general substrates in trans. COQ8B localizes mainly to the
  mitochondrion, associated with the matrix face of the inner mitochondrial
  membrane, and is also detected at the cytosol and cell membrane. It is
  particularly important in kidney podocytes, where it supports podocyte
  migration; loss-of-function mutations cause primary coenzyme Q10 deficiency
  presenting as steroid-resistant nephrotic syndrome with focal segmental
  glomerulosclerosis (nephrotic syndrome type 9).
