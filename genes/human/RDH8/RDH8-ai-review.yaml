          photoreceptor outer segment
      - reference_id: PMID:10753906
        supporting_text: >-
          this enzyme utilizes NADPH, shows a marked preference for all-trans-retinal over
          11-cis-retinal
  - description: >-
      Binds the NADP(H) cofactor via an N-terminal Rossmann-fold NAD(P)-binding region, providing the
      reducing equivalents (NADPH) used to reduce all-trans-retinal to all-trans-retinol.
    molecular_function:
