      id: GO:0005829
      label: cytosol
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    qualifier: is_active_in
    review:
      summary: >-
        Phylogenetic (IBA) assignment of cytosolic localization. This conflicts with the direct evidence
        that RDH8 is a multi-pass integral membrane protein tightly associated with photoreceptor outer
        segment membranes; the enzyme acts at the membrane, not in the cytosol.
      action: REMOVE
      reason: >-
        RDH8 is a predicted multi-pass (three transmembrane helices) membrane protein and was shown by
        protein blotting/immunocytochemistry to be tightly associated with outer segment membranes, so a
        cytosolic active-site location is not supported. This is an over-propagated electronic (IBA)
        inference contradicted by the protein's membrane topology; the accurate compartment is the
        photoreceptor outer segment membrane.
      propagation_review:
        root_cause: PROPAGATION_BAD
        failure_modes:
          - COMPARTMENT_OR_COMPLEX_MISMATCH
        source_entities:
          - source_id: PANTHER:PTN008681310
            source_label: SDR family node (cytosol IBA)
            comment: >-
              Cytosol is a family-level default for soluble SDRs; RDH8 is a multi-pass integral
              membrane protein, so the compartment does not transfer to this target.
      supported_by:
        - reference_id: PMID:10753906
          supporting_text: >-
            prRDH is tightly associated with outer segment membranes
        - reference_id: file:human/RDH8/RDH8-uniprot.txt
