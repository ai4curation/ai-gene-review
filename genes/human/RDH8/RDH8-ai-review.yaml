id: Q9NYR8
gene_symbol: RDH8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RDH8 (retinol dehydrogenase 8; photoreceptor outer segment all-trans-retinol dehydrogenase, prRDH)
  is an NADPH-dependent, membrane-associated short-chain dehydrogenase/reductase (SDR) of the vertebrate
  visual cycle. It is expressed specifically in retinal photoreceptor cells and localizes to the outer
  segments of both rods and cones, where it is tightly associated with the disc/plasma membranes as a
  multi-pass integral membrane protein. RDH8 catalyzes the NADPH-dependent reduction of all-trans-retinal
  to all-trans-retinol (EC 1.1.1.300), the first step in clearing all-trans-retinal that is released from
  photobleached rhodopsin. This reductive step protects photoreceptors from retinaldehyde toxicity and
  feeds all-trans-retinol back toward the retinal pigment epithelium for regeneration of the 11-cis-retinal
  chromophore, contributing to visual pigment regeneration especially at high light intensity. Biallelic
  variants in RDH8 are associated with an autosomal recessive form of Stargardt macular dystrophy (STGD5).
  Structurally, RDH8 has an N-terminal Rossmann-fold NAD(P)-binding region and is most closely related to
  17-beta-hydroxysteroid dehydrogenase 1, but its physiologically demonstrated substrate is retinoid, not
  steroid.
