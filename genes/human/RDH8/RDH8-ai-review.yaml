  - id: PMID:10753906
    title: Identification and characterization of all-trans-retinol dehydrogenase from
      photoreceptor outer segments, the visual cycle enzyme that reduces all-trans-retinal
      to all-trans-retinol.
    findings:
      - statement: prRDH (RDH8) is the visual-cycle enzyme that reduces all-trans-retinal to
          all-trans-retinol within the photoreceptor outer segment, utilizes NADPH, and prefers
          all-trans-retinal over 11-cis-retinal.
      - statement: prRDH is a novel short-chain dehydrogenase/reductase most closely related to
          17-beta-hydroxysteroid dehydrogenase 1, expressed specifically in photoreceptors and
          localized to rod and cone outer segment membranes.
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Cached abstract-only record (full_text_available: false); title matches UniProt reference [1].
        Establishes RDH8/prRDH identity, NADPH-dependent all-trans-retinal reductase activity, and
        exclusive photoreceptor outer segment membrane localization. The 17beta-HSD1 relationship is a
        homology statement, not a demonstration of steroid activity.
  - id: file:human/RDH8/RDH8-uniprot.txt
    title: UniProtKB entry Q9NYR8 (RDH8_HUMAN)
    findings:
      - statement: RDH8 is a retinol dehydrogenase with a clear preference for NADP that converts
          all-trans-retinal to all-trans-retinol (EC 1.1.1.300); a multi-pass membrane protein detected
          in photoreceptor outer segments; biallelic variants cause Stargardt disease 5 (STGD5).
