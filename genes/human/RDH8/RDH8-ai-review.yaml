    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    qualifier: enables
    review:
      summary: >-
        Phylogenetic (IBA) family-level assignment of all-trans-retinol dehydrogenase activity. The
        molecular activity (all-trans-retinal/retinol dehydrogenase) is correct and central to RDH8, but
        the cofactor is wrong: RDH8 has a clear preference for NADP, so the NADP+ term (GO:0052650) is the
