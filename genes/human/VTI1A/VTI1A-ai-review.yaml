id: Q96AJ9
gene_symbol: VTI1A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  VTI1A encodes a VTI1-family SNARE that mediates vesicle transport through interactions with
  target-membrane SNAREs and promotes membrane fusion. Its best-supported core function is SNAP
  receptor/SNARE-complex activity in retrograde trafficking from endosomes or late endosomes to the
  trans-Golgi network/Golgi, with related roles in Golgi/TGN membrane traffic and selected
  non-conventional cell-surface trafficking routes. VTI1A also has direct support in
  autophagy/autophagosome context through STX13/Vti1a-associated autophagic flux, but it is not an
  ESCRT-III complex component.
