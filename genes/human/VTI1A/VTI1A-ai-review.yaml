  title: Differential effects of depletion of ARL1 and ARFRP1 on membrane trafficking between the trans-Golgi network and endosomes.
  findings:
  - statement: ARL1/ARFRP1 work supports Vti1a-containing SNARE involvement in Shiga-toxin retrograde transport downstream of ARL1.
