suggested_questions:
- question: Does VTI1A directly mediate phagophore closure/autophagosome assembly, or is the observed autophagy phenotype an indirect consequence of STX13-associated endosomal SNARE trafficking?
- question: Should VTI1A annotations citing PMID:15215310 be migrated to the GS15/BET1L gene rather than VTI1A?
- question: 'Which VTI1A-containing SNARE complex is active in autophagy: STX13/STX12-VTI1A, STX10-STX16-VTI1A-VAMP3, VAMP7-VTI1A, or a distinct context-specific complex?'
suggested_experiments:
- description: Rescue VTI1A knockdown with wild-type and SNARE-domain/membrane-anchor mutants in MPR recycling, Golgi ribbon, and autophagic flux assays.
  hypothesis: VTI1A SNARE activity and membrane targeting are required for both endosome-to-TGN transport and autophagy-associated trafficking.
- description: Use endogenous tagging/proximity labeling during starvation or CHMP2B perturbation to identify VTI1A SNARE partners at autophagy-related membranes.
  hypothesis: VTI1A forms a context-specific SNARE complex during autophagic flux that can be separated from its canonical endosome-to-TGN complex.
- description: Compare VTI1A depletion with ESCRT-III perturbation for LC3 flux, phagophore closure, and ESCRT-III recruitment/turnover.
  hypothesis: VTI1A affects autophagy through membrane-fusion traffic rather than direct ESCRT-III complex membership.
