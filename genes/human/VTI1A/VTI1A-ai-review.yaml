  title: VAMP1 mutation causes dominant hereditary spastic ataxia in Newfoundland families.
  findings:
  - statement: This is a VAMP1 spastic ataxia paper and does not support VTI1A movement annotation.
- id: PMID:23677696
  title: VAMP4 is required to maintain the ribbon structure of the Golgi apparatus.
  findings:
  - statement: Vti1a depletion phenocopies VAMP4-cognate SNARE disruption of Golgi ribbon structure, supporting early-endosome-to-TGN retrograde traffic.
