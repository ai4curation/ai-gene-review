- id: PMID:18195106
  title: A syntaxin 10-SNARE complex distinguishes two distinct transport routes from endosomes to the trans-Golgi in human cells.
  findings:
  - statement: STX10, STX16, Vti1a, and VAMP3 form a SNARE-complex route required for MPR transport from endosomes/late endosomes to the TGN/Golgi.
