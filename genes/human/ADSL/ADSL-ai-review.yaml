id: P30566
gene_symbol: ADSL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Adenylosuccinate lyase (ADSL; adenylosuccinase; EC 4.3.2.2) is a cytosolic
  homotetrameric enzyme of purine metabolism that catalyses two distinct beta-elimination
  (fumarate-releasing) reactions in the same active site. In de novo purine synthesis
  it cleaves SAICAR ((S)-2-(5-amino-1-(5-phospho-D-ribosyl)imidazole-4-carboxamido)succinate)
  to AICAR plus fumarate, completing the step 2/2 that converts SAICAR toward IMP;
  and at the IMP-to-AMP branch it cleaves adenylosuccinate (S-AMP) to AMP plus fumarate.
  The enzyme therefore contributes to both de novo IMP biosynthesis and de novo AMP
  biosynthesis. It assembles as a homotetramer in which three subunits contribute
  residues to each of the four active sites, and can associate with other de novo
  purine synthesis enzymes in the purinosome. Loss-of-function variants cause adenylosuccinate
  lyase deficiency (ADSLD), an autosomal-recessive neurodevelopmental disorder marked
  by psychomotor/mental retardation, epilepsy and autistic features, with accumulation
  of the dephosphorylated substrates SAICA-riboside and succinyladenosine in body
  fluids.
