id: Q6DKK2
gene_symbol: TTC19
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TTC19 (tetratricopeptide repeat protein 19, mitochondrial) is a nuclear-encoded,
  mitochondrion-imported protein of the mitochondrial inner membrane that acts as an
  assembly/maintenance factor for respiratory Complex III (cytochrome bc1, ubiquinol-cytochrome
  c reductase). It is a tetratricopeptide-repeat (TPR) scaffold protein containing five TPR
  repeats and has no catalytic activity of its own. TTC19 binds the mature Complex III dimer
  after incorporation of the Rieske iron-sulfur protein UQCRFS1, and is required for the
  clearance/turnover of the UQCRFS1 N-terminal fragments generated during Rieske maturation;
  accumulation of these fragments is detrimental to Complex III activity, so TTC19 preserves the
  structural and functional integrity of the complex. Loss-of-function mutations cause
  mitochondrial complex III deficiency, nuclear type 2 (MC3DN2), a progressive neurological
  disorder with encephalopathy, ataxia, psychomotor regression, and psychiatric features.
