  label: Homo sapiens
description: 'PCYT1A encodes choline-phosphate cytidylyltransferase A (CCTalpha), the
  rate-limiting and regulated enzyme of the CDP-choline (Kennedy) pathway of phosphatidylcholine
  (PC) biosynthesis. It catalyzes the condensation of phosphocholine and CTP to CDP-choline
  plus diphosphate (EC 2.7.7.15). CCTalpha is an amphitropic enzyme: an autoinhibitory
  amphipathic alpha-helix keeps the soluble form largely inactive, and binding of this
  helix to membranes that are depleted in PC (or enriched in anionic lipids, diacylglycerol
  or fatty acids) activates the enzyme, so that it acts as a sensor of membrane phospholipid
  composition and homeostatically tunes PC output. The active enzyme is an obligate homodimer.
  CCTalpha localizes to the nucleus and nuclear envelope and associates with the endoplasmic
  reticulum, interconverting with an inactive cytosolic pool. In humans, loss-of-function
  and destabilizing variants cause autosomal-recessive spondylometaphyseal dysplasia with
  cone-rod dystrophy, isolated retinal dystrophy, and congenital generalized lipodystrophy.'
