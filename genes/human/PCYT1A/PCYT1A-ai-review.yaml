  title: Primary structure and expression of a human CTP:phosphocholine cytidylyltransferase.
  findings:
  - statement: The cloned human enzyme has lipid-dependent cytidylyltransferase activity; the
      soluble form is activated several-fold by anionic phospholipids and by oleic acid or
      diacylglycerol-containing PC vesicles, and it shares an amphipathic membrane-binding helix
      with lipid-binding proteins.
    reference_section_type: ABSTRACT
    supporting_text: The soluble form was activated 3 to 4-fold by anionic phospholipids and by
      oleic acid or diacylglycerol-containing PC vesicles.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Original cloning and functional expression of human CCTalpha;
      supports the TAS catalytic-activity annotation and lipid-dependent activation.
