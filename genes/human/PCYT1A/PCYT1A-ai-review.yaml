- id: PMID:30559292
  title: Disease-linked mutations in the phosphatidylcholine regulatory enzyme CCTα
    impair enzymatic activity and fold stability.
  findings:
  - statement: CCT is the key regulatory enzyme in phosphatidylcholine synthesis, activated by
      binding PC-deficient membranes; disease-linked PCYT1A variants impair enzymatic activity
      and destabilize the catalytic-domain fold, and an autoinhibitory-helix deletion (E280del)
      increases constitutive activity.
    reference_section_type: ABSTRACT
    supporting_text: CTP:phosphocholine cytidylyltransferase (CCT) is the key regulatory enzyme
      in phosphatidylcholine (PC) synthesis and is activated by binding to PC-deficient membranes.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Provides the EXP catalytic-activity annotation and biochemical
      characterization of SMDCRD/CGL5 variants; directly supports the amphitropic-regulation and
      disease mechanism.
