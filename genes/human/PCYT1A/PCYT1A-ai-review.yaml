- id: PMID:10480912
  title: Distribution of CTP:phosphocholine cytidylyltransferase (CCT) isoforms. Identification
    of a new CCTbeta splice variant.
  findings:
  - statement: CCTalpha resides in the nucleus in addition to associating with the endoplasmic
      reticulum, distinguishing it from the ER-only CCTbeta isoforms, and has cytidylyltransferase
      activity in the CDP-choline pathway.
    reference_section_type: RESULTS
    supporting_text: Using isoform-specific antibodies, both CCTbeta1 and CCTbeta2 localized to
      the endoplasmic reticulum of cells, in contrast to CCTalpha which resided in the nucleus
      in addition to associating with the endoplasmic reticulum.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified. Source of the CCTalpha IDA annotations (nucleus, ER, ER
      membrane, catalytic activity, PC biosynthesis, CDP-choline pathway). Title foregrounds a
      new CCTbeta2 splice variant, but the alpha-specific nuclear+ER localization and activity
      are established in the same study; not a mis-attribution.
