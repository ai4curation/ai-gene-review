core_functions:
- molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  description: |
    ESCRT adapter at inner nuclear membrane that binds lamins, BAF, and
    CHMP7/IST1/CHMP2A. Mediates chromatin-nuclear envelope connection and
    recruits ESCRT-III machinery for nuclear envelope repair and closure
    during cell division. The molecular_function GO:0030674 (protein-
    macromolecule adaptor activity) replaces the previously-listed generic
