id: P53634
gene_symbol: CTSC
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CTSC (Cathepsin C / Dipeptidyl peptidase 1 / DPPI) is a lysosomal cysteine protease of the papain
  superfamily (peptidase C1 family) that functions primarily as an aminodipeptidase, removing
  N-terminal dipeptides from protein substrates. The mature enzyme is a tetramer of heterotrimers,
  each consisting of an exclusion domain chain, a heavy chain, and a light chain, with a unique
  exclusion domain that restricts the active site to exopeptidase (dipeptidase) activity. CTSC
  requires chloride ion binding for activity and is active at pH 4.5-6.8. Its principal biological
  role is the post-translational activation of granule-associated serine proteases in immune cells,
  including granzymes A and B, cathepsin G, elastase, and chymase, by cleaving their N-terminal
  activation dipeptides. Loss-of-function mutations cause Papillon-Lefevre syndrome (palmoplantar
  keratosis and severe periodontitis) and Haim-Munk syndrome. CTSC is regulated by cystatin F
  (CST7), which after N-terminal processing becomes a potent cathepsin C inhibitor in immune cells.
  The enzyme is ubiquitously expressed, with highest levels in lung, kidney, placenta, and immune cells.
