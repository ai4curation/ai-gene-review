- id: PMID:1586157
  title: Purification and characterization of dipeptidyl peptidase I from human spleen.
  findings:
  - statement: >-
      DPPI was purified from human spleen and characterized as a glycoprotein thiol protease
      with molecular mass of 200 kDa and subunit size of 24 kDa, exhibiting both hydrolytic
      and transpeptidase activity.
    supporting_text: >-
      The lysosomal hydrolase, dipeptidyl peptidase I (DPPI), was purified from human
      spleen and its enzymatic activity characterized.
  - statement: >-
      Human DPPI exhibited activity against a broad range of dipeptide substrates with
      preference for nonpolar residues at P1 position.
    supporting_text: >-
      DPPI exhibited activity against a variety of dipeptide substrates including peptides with either
      non-polar or polar residues in the P1 position.
  - statement: >-
      DPPI is a thiol protease, with highest content among cytotoxic lymphocytes and myeloid cells.
    supporting_text: >-
      DPPI content was found to be highest among cytotoxic lymphocytes and myeloid cells.
