- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-6798751
  review:
    summary: >-
      TAS annotation for extracellular region from Reactome neutrophil degranulation pathway.
      CTSC is released from azurophil granule lumen during neutrophil degranulation into the
