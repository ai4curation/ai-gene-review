- term:
    id: GO:0035578
    label: azurophil granule lumen
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-6798751
  review:
    summary: >-
      TAS annotation for azurophil granule lumen from Reactome neutrophil degranulation pathway.
      CTSC is stored in azurophil (primary) granules of neutrophils along with the serine
      proteases it activates.
    action: ACCEPT
    reason: >-
      Azurophil granule localization is functionally significant for CTSC. The enzyme co-localizes
      with its substrates (neutrophil elastase, cathepsin G) in azurophil granules, where it
      processes their activation dipeptides. This is a core localization for immune cell function.
    supported_by:
    - reference_id: PMID:8428921
      supporting_text: >-
        The comparable distribution of dipeptidyl peptidase I (DPPI) and serine proteases and the
        ability of DPPI to hydrolyze relevant dipeptide sequences suggested a role for DPPI in
        the processing and activation of granule serine proteases.

