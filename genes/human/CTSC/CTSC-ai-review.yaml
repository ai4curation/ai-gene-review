- id: PMID:7665576
  title: Oligomeric structure and substrate induced inhibition of human cathepsin C.
  findings:
  - statement: >-
      Human cathepsin C is a tetramer of 200 kDa consisting of four identical subunits,
      each composed of three polypeptide chains with a retained prosequence.
    supporting_text: >-
      The enzyme was shown to have a molecular mass of 200 kDa and to consist of four identical
      subunits, each composed of three different polypeptide chains, two of them disulfide-bound.
  - statement: >-
      The third chain of each subunit corresponds to the prosequence of the enzyme, showing
      that a substantial part of the proregion remains bound in the mature enzyme.
    supporting_text: >-
      the third one corresponded to the prosequence of the enzyme, thus showing that a
      substantial part of the proregion remains bound in the mature enzyme
- id: PMID:8428921
  title: Generation of active myeloid and lymphoid granule serine proteases requires
    processing by the granule thiol protease dipeptidyl peptidase I.
  findings:
  - statement: >-
      DPPI is required for post-translational processing and activation of granule serine
      proteases including cathepsin G and granzymes in immune effector cells.
    supporting_text: >-
      These results indicate that DPPI plays a requisite role in the post-translational
      processing and activation of members of the family of granule serine proteases expressed
      in bone marrow-derived effector cells.
  - statement: >-
      Inhibition of DPPI resulted in accumulation of inactive proenzyme forms bearing
      N-terminal dipeptide extensions.
    supporting_text: >-
      inhibition of DPPI activity was associated with the accumulation of the inactive proenzyme
      form of cathepsin G bearing an amino-terminal dipeptide extension to the isoleucine
      residue that normally occupies the amino terminus of the enzymatically active protein
- id: PMID:8811434
