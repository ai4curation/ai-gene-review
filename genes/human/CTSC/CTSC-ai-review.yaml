- id: PMID:18256700
  title: Cystatin F is a cathepsin C-directed protease inhibitor regulated by proteolysis.
  findings:
  - statement: >-
      Cystatin F (CST7) is a physiological inhibitor of cathepsin C that requires N-terminal
      processing to acquire cathepsin C inhibitory capacity.
    supporting_text: >-
      cystatin F must undergo an N-terminal processing event to acquire cathepsin C inhibitory
      capacity
  - statement: >-
      Cathepsin C was identified as a major interacting partner of cystatin F in U937 and YT
      immune cell lines by co-immunoprecipitation and mass spectrometry.
    supporting_text: >-
      MALDI TOF/TOF mass fingerprinting identified cystatin F itself and a smaller protein with apparent mol. wt. ∼7 kDa that was consistently observed in both U937 and YT samples
- id: PMID:18307834
  title: Cathepsin C propeptide interacts with intestinal alkaline phosphatase and
    heat shock cognate protein 70 in human Caco-2 cells.
