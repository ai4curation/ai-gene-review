existing_annotations:
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for extracellular space localization based on phylogenetic inference across
      papain-like cysteine proteases. CTSC has been detected in extracellular fluids such as
      colostrum (PMID:16502470) and is released from azurophil granules during neutrophil
      degranulation (Reactome:R-HSA-6798751).
    action: KEEP_AS_NON_CORE
    reason: >-
      Extracellular localization is supported by proteomic detection of CTSC in colostrum
      (PMID:16502470) and by its release from azurophil granules during neutrophil degranulation.
      However, extracellular space is not the primary localization of CTSC; it is primarily a
      lysosomal enzyme. The IBA is phylogenetically reasonable for the papain-like family.
    supported_by:
    - reference_id: PMID:16502470
      supporting_text: >-
        One hundred and fifty-one proteins were identified, 83 of which have not been previously
        reported in human colostrum, or milk.

- term:
    id: GO:0004197
    label: cysteine-type endopeptidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for cysteine-type endopeptidase activity, inferred from the papain-like
      cysteine protease family. CTSC does possess a papain-like catalytic domain and can act as
      both exo- and endopeptidase (PMID:1586157), though its primary physiological activity is
      as a dipeptidyl peptidase (exopeptidase). The endopeptidase activity is a secondary function.
    action: ACCEPT
    reason: >-
      While CTSC primarily functions as a dipeptidyl peptidase, it has demonstrated endopeptidase
      activity in vitro. UniProt states "Can act as both an exopeptidase and endopeptidase"
      (PMID:1586157). The IBA annotation is phylogenetically sound given the papain superfamily
      membership. Retaining this alongside the more specific dipeptidyl-peptidase term is appropriate.
    supported_by:
    - reference_id: PMID:1586157
      supporting_text: >-
        Purified DPPI exhibited both hydrolytic and transpeptidase (polymerase) activity. DPPI
        exhibited activity against a variety of dipeptide substrates including peptides with either
        non-polar or polar residues in the P1 position.

- term:
    id: GO:0005764
    label: lysosome
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for lysosomal localization. CTSC is a well-established lysosomal enzyme.
      UniProt annotates lysosomal localization (PMID:7665576). The enzyme is purified from
      lysosomal fractions and characterized as a lysosomal hydrolase (PMID:1586157, PMID:9092576).
    action: ACCEPT
    reason: >-
      Lysosomal localization is a core characteristic of CTSC. The IBA annotation is strongly
      supported by direct experimental evidence from multiple studies showing that CTSC is a
      lysosomal cysteine proteinase.
    supported_by:
    - reference_id: PMID:9092576
      supporting_text: >-
        Dipeptidyl-peptidase I, a lysosomal cysteine proteinase, is important in intracellular
        degradation of proteins and appears to be a central coordinator for activation of many
        serine proteinases in immune/inflammatory cells.
    - reference_id: PMID:7665576
      supporting_text: >-
        Cathepsin C has been purified from human kidney by a modified procedure.

- term:
    id: GO:0005764
    label: lysosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for lysosomal localization from combined automated methods including
      ortholog mapping and InterPro. Consistent with the IBA annotation and experimental
      evidence.
    action: ACCEPT
    reason: >-
      Redundant with the IBA annotation but consistent. CTSC is well-established as a lysosomal
      enzyme. Multiple evidence lines (IBA, ISS, TAS, IEA) all confirm this localization.

- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for involvement in proteolysis, from automated methods. CTSC is a protease
      that performs proteolytic cleavage of substrates. This is a broad but accurate term.
    action: ACCEPT
    reason: >-
      Proteolysis is a core function of CTSC. The term is broad but not incorrect. It is
      complemented by more specific annotations (dipeptidyl-peptidase activity, cysteine-type
      peptidase activity).

- term:
    id: GO:0006915
    label: apoptotic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation for apoptotic process, inferred logically from GO:0016505 (peptidase
      activator activity involved in apoptotic process). The connection to apoptosis is
      indirect -- CTSC activates granzymes which can trigger apoptosis in target cells during
      cytotoxic lymphocyte killing. This is a downstream consequence, not a direct function.
    action: KEEP_AS_NON_CORE
    reason: >-
      CTSC's connection to apoptosis is indirect and mediated through its activation of
      granzymes A and B. While technically supported by the logical inference chain, apoptosis
      is not a core process for CTSC -- it is a downstream consequence of granzyme activation
      in immune effector cells. Appropriate as a non-core annotation.

- term:
    id: GO:0008234
    label: cysteine-type peptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for cysteine-type peptidase activity from automated methods. CTSC is a
      well-characterized cysteine protease with Cys258 as the active-site nucleophile.
    action: ACCEPT
    reason: >-
      This is a core molecular function of CTSC. The enzyme is a thiol protease that requires
      cysteine for catalysis, as demonstrated by inhibition with cysteine protease inhibitors
      (PMID:1586157). Consistent with multiple IDA annotations for the same term.
    supported_by:
    - reference_id: PMID:1586157
      supporting_text: >-
        The lysosomal hydrolase, dipeptidyl peptidase I (DPPI), was purified from human spleen
        and its enzymatic activity characterized.

- term:
    id: GO:0008239
    label: dipeptidyl-peptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: >-
      IEA annotation for dipeptidyl-peptidase activity mapped from EC:3.4.14.1. This is the
      defining enzymatic activity of CTSC (Dipeptidyl peptidase 1). The enzyme removes
      N-terminal dipeptides from protein substrates (PMID:1586157).
    action: ACCEPT
    reason: >-
      Dipeptidyl-peptidase activity is the primary and defining molecular function of CTSC.
      EC:3.4.14.1 directly corresponds to this GO term. The enzyme name "Dipeptidyl peptidase 1"
      reflects this core function. Experimentally validated in PMID:1586157.
    supported_by:
    - reference_id: PMID:1586157
      supporting_text: >-
        DPPI exhibited activity against a variety of dipeptide substrates including peptides
        with either non-polar or polar residues in the P1 position.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:18256700
  review:
    summary: >-
      IPI annotation for protein binding based on interaction with CST7 (Cystatin F). Hamilton
      et al. (2008) showed that cystatin F is a physiological inhibitor of cathepsin C after
      N-terminal processing, and co-immunoprecipitation identified cathepsin C as a major
      interacting partner of cystatin F in U937 and YT cells (PMID:18256700). This is a
      biologically meaningful protease-inhibitor interaction.
    action: REMOVE
    reason: >-
      While the interaction between CTSC and CST7/cystatin F is experimentally validated and
      biologically significant (PMID:18256700), 'protein binding' is uninformative. The interaction
      represents a protease-inhibitor complex. Per curation guidelines, protein binding should be
      avoided in favor of more informative MF terms.
    supported_by:
    - reference_id: PMID:18256700
      supporting_text: >-
        MALDI TOF/TOF mass fingerprinting identified cystatin F itself and a smaller protein with apparent mol. wt. ∼7 kDa that was consistently observed in both U937 and YT samples

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32814053
  review:
    summary: >-
      IPI annotation for protein binding from a large-scale neurodegenerative disease interactome
      study using Y2H screening. CTSC interactions with DMWD and SPRED1 were identified in this
      high-throughput screen (PMID:32814053). These interactions may not reflect core physiological
      function.
    action: REMOVE
    reason: >-
      'Protein binding' is uninformative per curation guidelines. The interactions were identified
      in a large-scale Y2H screen focused on neurodegenerative disease proteins (PMID:32814053),
      and the biological significance of CTSC interactions with DMWD and SPRED1 is unclear. These
      do not represent core functions of CTSC.
    supported_by:
    - reference_id: PMID:32814053
      supporting_text: >-
        Here, we report on an interactome map that focuses on neurodegenerative disease (ND),
        connects ∼5,000 human proteins via ∼30,000 candidate interactions

- term:
    id: GO:0001913
    label: T cell mediated cytotoxicity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog (P97821). CTSC activates granzymes A and B
      which are essential for T cell mediated cytotoxicity (PMID:8428921). This is an indirect
      role -- CTSC processes the proenzymes rather than directly mediating cytotoxicity.
    action: KEEP_AS_NON_CORE
    reason: >-
      CTSC's role in T cell cytotoxicity is indirect but well-supported. CTSC activates granzymes
      by removing their activation dipeptides (PMID:8428921), which is required for cytotoxic
      function. However, T cell cytotoxicity is a downstream process of CTSC's core enzymatic
      function, not a direct biological role.
    supported_by:
    - reference_id: PMID:8428921
      supporting_text: >-
        This study demonstrates that inhibition of DPPI activity is associated with impairment of
        the generation of granule serine protease activity in CD8(+) T cells, lymphokine-activated
        killer cells, P815 mastocytoma cells, and U-937 myeloid cells.

- term:
    id: GO:0004252
    label: serine-type endopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog. CTSC is a cysteine protease, not a serine
      protease. Its active site contains Cys258, His405, and Asn427 -- the catalytic triad of
      papain-like cysteine proteases. It belongs to the peptidase C1 family, not serine protease
      families.
    action: REMOVE
    reason: >-
      This is an incorrect annotation. CTSC/Cathepsin C is definitively a cysteine-type protease,
      not a serine-type protease. UniProt classifies it in the peptidase C1 family with active
      site Cys258. The enzyme is inhibited by cysteine protease inhibitors and NOT inhibited by
      the serine protease inhibitor PMSF (PMID:1586157). This annotation likely represents an
      erroneous transfer from the mouse ortholog annotation.
    supported_by:
    - reference_id: PMID:1586157
      supporting_text: >-
        The lysosomal hydrolase, dipeptidyl peptidase I (DPPI), was purified from human
        spleen and its enzymatic activity characterized

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for cytoplasmic localization transferred from mouse ortholog. CTSC is
      primarily a lysosomal enzyme, though the proform traverses the secretory pathway through
      ER and Golgi. Cytoplasmic localization may be observed but is not the primary compartment.
    action: ACCEPT
    reason: >-
      Cytoplasm is a broad term that encompasses the lysosome. As a general localization term
      it is not incorrect. CTSC is synthesized in the cytoplasm and transits through the
      secretory pathway. The annotation is acceptable as a broader complement to the more
      specific lysosome annotation.

- term:
    id: GO:0016505
    label: peptidase activator activity involved in apoptotic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from mouse ortholog for peptidase activator activity involved
      in apoptotic process. CTSC does activate granule serine proteases (granzymes) by removing
      their activation dipeptides (PMID:8428921), and these granzymes can trigger apoptosis.
      However, the term is overly specific in qualifying "involved in apoptotic process" --
      CTSC's peptidase activation function is not specific to apoptosis.
    action: MODIFY
    reason: >-
      CTSC activates multiple serine proteases including granzymes, cathepsin G, elastase, and
      chymase (PMID:8428921). Only granzyme activation leads to apoptosis; the other targets
      are involved in inflammation, antimicrobial defense, and other processes. The qualifier
      "involved in apoptotic process" is too restrictive. A more general peptidase activator
      term would be more appropriate.
    proposed_replacement_terms:
    - id: GO:0016504
      label: peptidase activator activity
    supported_by:
    - reference_id: PMID:8428921
      supporting_text: >-
        These results indicate that DPPI plays a requisite role in the post-translational
        processing and activation of members of the family of granule serine proteases expressed
        in bone marrow-derived effector cells.

- term:
    id: GO:0019902
    label: phosphatase binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog (P80067). Based on PMID:18307834 which showed
      that cathepsin C propeptide interacts with intestinal alkaline phosphatase (IAP) in Caco-2
      cells. This interaction is specifically with the propeptide, not the mature enzyme, and was
      demonstrated in the rat system.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The phosphatase binding was demonstrated for the cathepsin C propeptide in rat Caco-2 cells
      (PMID:18307834), not for the mature active enzyme. The propeptide interaction with intestinal
      alkaline phosphatase appears to promote IAP degradation. This is a specialized property of
      the propeptide fragment rather than a core function of mature CTSC. Transfer to human via
      orthology is uncertain.
    supported_by:
    - reference_id: PMID:18307834
      supporting_text: >-
        Cathepsin C propeptide interacted with proteins with a molecular mass of approximately
        70 kDa, including IAP and heat shock cognate protein 70.

- term:
    id: GO:0031404
    label: chloride ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for chloride ion binding transferred from rat ortholog. CTSC binds one
      chloride ion per heavy chain, as demonstrated by X-ray crystallography of the human enzyme
      (PDB:1K3B). The chloride ion is bound at the bottom of the S2 pocket and is important for
      substrate specificity.
    action: ACCEPT
    reason: >-
      Chloride binding is directly demonstrated for human CTSC by crystal structure analysis
      (PDB:1K3B). UniProt annotates three chloride binding residues (302, 304, 347). This is
      a genuine cofactor requirement. The IEA transfer is fully supported by direct structural
      evidence on the human protein.

- term:
    id: GO:0042802
    label: identical protein binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for identical protein binding transferred from rat ortholog. CTSC forms
      a tetramer of heterotrimers (PMID:1586157, PMID:7665576), so the oligomeric assembly
      involves self-association. The 200 kDa native form consists of four identical subunits.
    action: ACCEPT
    reason: >-
      The tetrameric structure of CTSC is well-established. The enzyme has a molecular mass of
      200 kDa and consists of four identical subunits (PMID:7665576). This represents genuine
      self-association through identical protein binding.
    supported_by:
    - reference_id: PMID:7665576
      supporting_text: >-
        The enzyme was shown to have a molecular mass of 200 kDa and to consist of four identical
        subunits, each composed of three different polypeptide chains, two of them disulfide-bound.

- term:
    id: GO:0045732
    label: positive regulation of protein catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat ortholog. Based on PMID:18307834 showing that cathepsin
      C propeptide promotes degradation of intestinal alkaline phosphatase in Caco-2 cells.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This annotation derives from PMID:18307834 which demonstrated that the cathepsin C
      propeptide (not the mature enzyme) enhanced IAP degradation in Caco-2 cells. This is a
      specialized property of the propeptide fragment in a specific cell context. It does not
      represent a general function of mature CTSC in protein catabolism.
    supported_by:
    - reference_id: PMID:18307834
      supporting_text: >-
        Pulse-chase analysis confirmed that the reduction in IAP activity was due to an increase
        in IAP degradation, but not a decrease in IAP expression.

- term:
    id: GO:0051087
    label: protein-folding chaperone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation for chaperone binding transferred from rat ortholog. Based on PMID:18307834
      where cathepsin C propeptide was found to interact with heat shock cognate protein 70
      (Hsc70) in Caco-2 cells.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The chaperone binding was shown for the cathepsin C propeptide, not the mature enzyme
      (PMID:18307834). The propeptide also functions as an intramolecular chaperone for folding
      of the proenzyme. While chaperone interaction exists, it is a property of the proform
      rather than a core function of the mature active enzyme.
    supported_by:
    - reference_id: PMID:18307834
      supporting_text: >-
        Cathepsin C propeptide interacted with proteins with a molecular mass of approximately
        70 kDa, including IAP and heat shock cognate protein 70.

- term:
    id: GO:0045732
    label: positive regulation of protein catabolic process
  evidence_type: ISS
  original_reference_id: PMID:18307834
  review:
    summary: >-
      ISS annotation for positive regulation of protein catabolic process based on rat ortholog
      data. PMID:18307834 showed that cathepsin C propeptide enhanced degradation of IAP in
      Caco-2 cells. This is the same annotation as the IEA version above.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Same rationale as the IEA annotation. This function was demonstrated for the cathepsin C
      propeptide in rat Caco-2 cells (PMID:18307834), not the mature active enzyme.
    supported_by:
    - reference_id: PMID:18307834
      supporting_text: >-
        The stable overexpression of cathepsin C propeptide significantly decreased the activities
        of intestinal alkaline phosphatase (IAP) and sucrase in human Caco-2 intestinal epithelial
        cells, whereas it did not change the proliferation and cathepsin C activity.

- term:
    id: GO:0008234
    label: cysteine-type peptidase activity
  evidence_type: IDA
  original_reference_id: PMID:15752368
  review:
    summary: >-
      IDA annotation for cysteine-type peptidase activity based on Langerholc et al. (2005).
      This study characterized cystatin F interactions with cathepsins including cathepsin C in
      U937 cells. Cathepsin C was shown to have cysteine peptidase activity that was NOT inhibited
      by cystatin F in vitro (PMID:15752368).
    action: ACCEPT
    reason: >-
      Direct experimental demonstration that cathepsin C is a cysteine protease. The study
      tested cystatin F inhibition against multiple cathepsins, measuring their cysteine peptidase
      activities. Cathepsin C activity was directly assayed.
    supported_by:
    - reference_id: PMID:15752368
      supporting_text: >-
        The exopeptidases, cathepsins C and X were not inhibited by cystatin F.

- term:
    id: GO:0008234
    label: cysteine-type peptidase activity
  evidence_type: IDA
  original_reference_id: PMID:1586157
  review:
    summary: >-
      IDA annotation for cysteine-type peptidase activity based on McGuire et al. (1992).
      DPPI was purified from human spleen and characterized as a thiol protease inhibited by
      cysteine protease inhibitors (PMID:1586157).
    action: ACCEPT
    reason: >-
      Definitive biochemical characterization of CTSC as a cysteine/thiol protease from human
      tissue. The enzyme was inhibited by cysteine protease-specific inhibitors and not by serine
      protease inhibitors, establishing its catalytic mechanism.
    supported_by:
    - reference_id: PMID:1586157
      supporting_text: >-
        The lysosomal hydrolase, dipeptidyl peptidase I (DPPI), was purified from human spleen
        and its enzymatic activity characterized.

- term:
    id: GO:0008234
    label: cysteine-type peptidase activity
  evidence_type: IDA
  original_reference_id: PMID:8428921
  review:
    summary: >-
      IDA annotation for cysteine-type peptidase activity based on McGuire et al. (1993).
      This study demonstrated DPPI as a thiol protease (granule thiol protease) required for
      activation of granule serine proteases (PMID:8428921).
    action: ACCEPT
    reason: >-
      The study directly refers to DPPI as "the granule thiol protease" and demonstrates its
      cysteine protease activity through inhibition with DPPI-specific inhibitors. Redundant
      with other IDA annotations for this term but independently supported.
    supported_by:
    - reference_id: PMID:8428921
      supporting_text: >-
        The comparable distribution of dipeptidyl peptidase I (DPPI) and serine proteases and the
        ability of DPPI to hydrolyze relevant dipeptide sequences suggested a role for DPPI in
        the processing and activation of granule serine proteases.

- term:
    id: GO:0031012
    label: extracellular matrix
  evidence_type: HDA
  original_reference_id: PMID:28344315
  review:
    summary: >-
      HDA annotation for extracellular matrix localization from a proteomic study of bone marrow
      ECM in multiple myeloma (PMID:28344315). CTSC was detected in the ECM fraction, likely
      reflecting release during tissue processing or neutrophil degranulation.
    action: KEEP_AS_NON_CORE
    reason: >-
      CTSC detection in ECM fractions from bone marrow samples may reflect release from neutrophil
      azurophil granules during tissue processing or pathological conditions. This is not a
      primary localization for CTSC, which is primarily lysosomal. The annotation is from a
      high-throughput proteomic study and represents non-core localization.

- term:
    id: GO:0030134
    label: COPII-coated ER to Golgi transport vesicle
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-203973
  review:
    summary: >-
      TAS annotation from Reactome pathway for vesicle budding. CTSC, as a secretory/lysosomal
      protein, traverses the COPII-mediated transport pathway from ER to Golgi during biosynthesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      Transit through COPII vesicles is part of the normal secretory pathway for any lysosomal
      protein. This reflects the biosynthetic route rather than a functional localization of CTSC.

