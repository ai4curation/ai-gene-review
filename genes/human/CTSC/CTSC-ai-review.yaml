- term:
    id: GO:0005764
    label: lysosome
  evidence_type: TAS
  original_reference_id: PMID:7665576
  review:
    summary: >-
      TAS annotation for lysosomal localization based on Dolenc et al. (1995). The study purified
      cathepsin C from human kidney, consistent with its known lysosomal localization (PMID:7665576).
      UniProt annotates subcellular location as lysosome based on this reference.
    action: ACCEPT
    reason: >-
      Lysosomal localization is a core property. This TAS annotation is based on a key primary
      study that characterized the human enzyme and is consistent with all other evidence.
    supported_by:
    - reference_id: PMID:7665576
      supporting_text: >-
        Cathepsin C has been purified from human kidney by a modified procedure.

- term:
    id: GO:0006955
    label: immune response
  evidence_type: TAS
  original_reference_id: PMID:9092576
  review:
    summary: >-
      TAS annotation for immune response based on Rao et al. (1997). The study characterized
      CTSC gene expression and noted its importance in immune/inflammatory cells, with high
      expression in PMNs and alveolar macrophages, and upregulation by IL-2 in lymphocytes
      (PMID:9092576).
    action: ACCEPT
    reason: >-
      CTSC plays a central role in immune function through activation of granule serine proteases
      in immune cells. The gene is highly expressed in immune/inflammatory cells and is
      transcriptionally regulated by IL-2 (PMID:9092576). Immune response is a core biological
      process for CTSC, given its essential role in activating granzymes, elastase, cathepsin G,
      and other immune effector proteases.
    supported_by:
    - reference_id: PMID:9092576
      supporting_text: >-
        Dipeptidyl-peptidase I, a lysosomal cysteine proteinase, is important in intracellular
        degradation of proteins and appears to be a central coordinator for activation of many
        serine proteinases in immune/inflammatory cells.

- term:
    id: GO:0016504
    label: peptidase activator activity
  evidence_type: IDA
  original_reference_id: PMID:8428921
  review:
    summary: >-
      New annotation for peptidase activator activity based on McGuire et al. (1993), which
      demonstrated that DPPI is required for post-translational processing and activation of
      granule serine proteases in immune cells.
    action: NEW
    reason: >-
      CTSC's most distinctive biological role is activating granule serine proteases by removing
      their N-terminal activation dipeptides. This function is not captured by any existing
      annotation at the appropriate level. PMID:8428921 provides direct experimental evidence
      that inhibition of DPPI impairs generation of active serine proteases including cathepsin G
      and granzymes.
    supported_by:
    - reference_id: PMID:8428921
      supporting_text: >-
        These results indicate that DPPI plays a requisite role in the post-translational
        processing and activation of members of the family of granule serine proteases expressed
        in bone marrow-derived effector cells.

