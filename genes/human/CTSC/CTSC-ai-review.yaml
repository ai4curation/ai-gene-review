core_functions:
- molecular_function:
    id: GO:0008239
    label: dipeptidyl-peptidase activity
  directly_involved_in:
  - id: GO:0006508
    label: proteolysis
  locations:
  - id: GO:0005764
    label: lysosome
  description: >-
    CTSC is a lysosomal dipeptidyl peptidase (EC 3.4.14.1) that removes N-terminal dipeptides from
    protein substrates. This is its defining enzymatic activity, functioning within the lysosome
    at acidic pH (4.5-6.8) and requiring chloride ion as a cofactor. The tetrameric enzyme has a
    unique exclusion domain that restricts access to the active site, enforcing exopeptidase
    (dipeptidase) specificity.
- molecular_function:
    id: GO:0016504
    label: peptidase activator activity
  directly_involved_in:
  - id: GO:0006955
    label: immune response
  locations:
  - id: GO:0035578
    label: azurophil granule lumen
  description: >-
    CTSC activates granule-associated serine proteases in immune cells by cleaving their N-terminal
    activation dipeptides. Substrates include neutrophil elastase, cathepsin G, granzymes A and B,
    and mast cell chymase. This function is essential for immune cell effector mechanisms including
    neutrophil antimicrobial defense and cytotoxic lymphocyte killing. Loss of this function causes
    Papillon-Lefevre syndrome.
