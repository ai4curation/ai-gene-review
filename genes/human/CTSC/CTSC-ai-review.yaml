      Cathepsin C was isolated from human kidney alongside cathepsins B, H, and L using
      thiol-reactive chromatography, confirming its cysteine protease nature.
    supporting_text: >-
      A procedure for the simultaneous isolation of four cysteine proteinases, cathepsins B, H,
      L and C, from human kidney is described.
- id: PMID:9092576
  title: Human dipeptidyl-peptidase I. Gene characterization, localization, and expression.
  findings:
  - statement: >-
      CTSC gene maps to chromosome 11q14.1-q14.3, is expressed ubiquitously with highest
      levels in lung, kidney, and placenta, and is upregulated by IL-2 in lymphocytes.
    supporting_text: >-
      Northern analyses demonstrated that the dipeptidyl-peptidase I message is expressed at
      high levels in lung, kidney, and placenta, at moderate to low levels in many organs, and
      at barely detectable levels in the brain, suggesting tissue-specific regulation.
  - statement: >-
      CTSC is described as a central coordinator for activation of many serine proteinases
      in immune/inflammatory cells.
    supporting_text: >-
      Dipeptidyl-peptidase I, a lysosomal cysteine proteinase, is important in intracellular
      degradation of proteins and appears to be a central coordinator for activation of many
      serine proteinases in immune/inflammatory cells.
