proposed_new_terms: []
suggested_questions:
- question: >-
    Does DOLK activity contribute to Dol-P recycling in addition to de novo synthesis,
    and how is this partitioned in vivo?
- question: >-
    Why do some DOLK-CDG patients present predominantly with dilated cardiomyopathy
    (via alpha-dystroglycan O-mannosylation) while others show multisystem or purely
    neurological disease?
suggested_experiments:
- description: >-
    Tissue-specific conditional Dolk knockout in mouse heart to test whether dilated
    cardiomyopathy arises specifically from reduced alpha-dystroglycan O-mannosylation.
- description: >-
    Structure determination (cryo-EM) of human DOLK to define the dolichol- and
    CTP-binding pockets and rationalize CDG1M variant effects.
