id: Q9UPQ8
gene_symbol: DOLK
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DOLK is dolichol kinase, a polytopic endoplasmic reticulum membrane enzyme that
  catalyzes the CTP-dependent phosphorylation of dolichol to dolichyl monophosphate
  (Dol-P), the terminal step in de novo Dol-P biosynthesis (EC 2.7.1.108). Dol-P is
  the essential lipid carrier that primes assembly of the dolichol-linked
  oligosaccharide for protein N-linked glycosylation and is also required for
  O-mannosylation, C-mannosylation and GPI-anchor biosynthesis, so DOLK supplies the
  activated lipid carrier used throughout the glycosylation system. The enzyme has a
  cytoplasmically oriented CTP-binding site and belongs to the polyprenol kinase
  family. Loss-of-function mutations cause DOLK-CDG (congenital disorder of
  glycosylation type Im), whose features include dilated cardiomyopathy (linked to
  deficient alpha-dystroglycan O-mannosylation), ichthyosis and neurological disease.
