- term:
    id: GO:0006488
    label: dolichol-linked oligosaccharide biosynthetic process
  evidence_type: IGI
  original_reference_id: PMID:12213788
  qualifier: involved_in
  review:
    summary: >-
      Proposed annotation capturing DOLK's role in supplying Dol-P for assembly of
      the dolichol-linked oligosaccharide (LLO) used in N-glycosylation. DOLK
      complementation of the yeast dolichol kinase mutant restores N-glycosylation,
      demonstrating this downstream involvement.
    action: NEW
    reason: >-
      The existing GOA BP annotations stop at dolichyl monophosphate biosynthesis
      (GO:0043048). DOLK is upstream of, and required for, LLO assembly for protein
      N-linked glycosylation; adding GO:0006488 records this downstream biological
      role explicitly, supported by rescue of N-glycosylation in the yeast
      complementation assay.
    supported_by:
    - reference_id: PMID:12213788
      supporting_text: >-
        restoring normal N-glycosylation of carboxypeptidase Y at the restrictive
        temperature in the temperature-sensitive mutant sec59-1.
