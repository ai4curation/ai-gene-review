core_functions:
- description: 'Catalytically dead ODC paralog that acts as an antizyme inhibitor: it binds and sequesters
    ornithine-decarboxylase antizymes, stabilizing and activating ODC to promote polyamine biosynthesis.'
  molecular_function:
    id: GO:0042978
