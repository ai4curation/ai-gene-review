suggested_questions:
- question: Do the AZIN1 and AZIN2 paralogs have distinct antizyme preferences or subcellular sites of
    ODC activation?
suggested_experiments:
- hypothesis: AZIN2 activates ODC purely by antizyme sequestration, with no intrinsic decarboxylase activity.
  description: Assay purified AZIN2 for ODC/ADC activity (negative control) and measure ODC stabilization
    in cells co-expressing AZIN2 and antizyme.
