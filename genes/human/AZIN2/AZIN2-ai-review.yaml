id: Q96A70
gene_symbol: AZIN2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'Antizyme inhibitor 2 (AZIN2, also ADC/ODC-paralogue) is a catalytically dead member of the
  Orn/Lys/Arg decarboxylase class-II family. Despite early reports of ornithine or arginine decarboxylase
  activity, it has neither. Its function is regulatory: AZIN2 binds ornithine-decarboxylase antizymes
  (OAZ1/2/3) and sequesters them, thereby relieving antizyme-mediated inhibition and degradation of ornithine
  decarboxylase (ODC), positively regulating polyamine biosynthesis. AZIN2 is expressed in brain and testis,
  associates with the ER-Golgi/secretory and vesicular compartments, and has roles in vesicle trafficking
  and spermatogenesis.'
