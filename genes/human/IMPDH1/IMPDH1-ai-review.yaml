- term:
    id: GO:0006183
    label: GTP biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IMPDH1 contributes to GTP biosynthesis only indirectly: it makes XMP (->GMP),
      and GMP is subsequently phosphorylated (GMP->GDP->GTP) by other enzymes.
    action: KEEP_AS_NON_CORE
    reason: >-
      The direct committed step catalysed by IMPDH1 produces XMP en route to GMP,
      not GTP. GTP biosynthesis is several enzymatic steps downstream, so this term
      overstates the enzyme's direct role. It is biologically defensible as a broader
      pathway contribution but is not the core function; the more precise BP terms are
      XMP/GMP biosynthetic process.
    supported_by:
    - reference_id: PMID:1969416
      supporting_text: "IMP dehydrogenase (EC 1.1.1.205), the rate-limiting enzyme of de novo GTP"
