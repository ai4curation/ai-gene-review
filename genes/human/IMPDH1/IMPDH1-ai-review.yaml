gene_symbol: IMPDH1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Inosine-5'-monophosphate dehydrogenase 1 (IMPDH1; EC 1.1.1.205) catalyses the
  NAD+-dependent oxidation of inosine 5'-monophosphate (IMP) to xanthosine
  5'-monophosphate (XMP) (IMP + NAD+ + H2O -> XMP + NADH + H+), the first
  committed and rate-limiting step of de novo guanine-nucleotide (GMP)
  biosynthesis; XMP is subsequently aminated to GMP by GMP synthase (GMPS). The
  enzyme is a cytosolic homotetramer built from a catalytic (beta/alpha)8 TIM-barrel
  domain plus a regulatory subdomain of two tandem CBS (Bateman) domains, uses a
  monovalent cation (K+) cofactor, and can assemble into higher-order filaments
  ("rods and rings"/cytoophidia). IMPDH1 is broadly expressed but strongly enriched
  in retinal photoreceptors; a reported single-stranded nucleic-acid-binding
  activity mediated by the CBS subdomain suggests an additional, less well-defined
  role in nucleic-acid metabolism. Because guanine-nucleotide supply is coupled to
  cell proliferation, IMPDH is a validated target of immunosuppressive (mycophenolic
  acid, mizoribine), antiviral (ribavirin) and antitumour drugs. Dominant IMPDH1
  mutations, many clustered in the CBS subdomain, cause retinitis pigmentosa 10
  (RP10) and Leber congenital amaurosis (LCA11), degenerative diseases of the retina.
