- question: >-
    Is the single-stranded nucleic-acid-binding activity of the CBS subdomain a
    physiologically regulated function of IMPDH1 in photoreceptors, and does its
    disruption (as by RP10/LCA CBS-domain variants) cause disease independently of
    catalytic activity?
- question: >-
    What is the functional significance of IMPDH1 filament ("rods and rings"/
    cytoophidia) assembly for guanine-nucleotide homeostasis in the retina?
suggested_experiments:
- description: >-
    Separate-of-function IMPDH1 alleles that abolish catalysis while preserving
    nucleic-acid binding (and vice versa) expressed in photoreceptor models, to test
    whether RP10/LCA phenotypes arise from loss of catalysis, loss/alteration of
    nucleic-acid binding, or a dominant-negative filament defect.
- description: >-
    Cryo-EM and cellular imaging of retina-specific IMPDH1 isoforms to determine how
    the extended N-terminal retinal isoforms modulate filament assembly and
    GTP/GDP-dependent allosteric regulation.
