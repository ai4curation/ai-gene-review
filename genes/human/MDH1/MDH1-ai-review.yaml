id: P40925
gene_symbol: MDH1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MDH1 is the cytosolic (NAD-dependent) malate dehydrogenase, a homodimeric enzyme
  of the LDH/MDH superfamily that reversibly oxidises L-malate to oxaloacetate with
  concomitant reduction of NAD+ to NADH (EC 1.1.1.37). It is a central component of
  the malate-aspartate shuttle, which transfers reducing equivalents from the cytosol
  across the inner mitochondrial membrane and thereby recycles cytosolic NADH to NAD+
  to sustain glycolysis, serine biosynthesis and mitochondrial NADH supply for oxidative
  phosphorylation. MDH1 also participates in cytosolic malate/oxaloacetate metabolism
  and gluconeogenesis. The enzyme is catalytically promiscuous: it can reduce aromatic
  alpha-keto acids such as hydroxyphenylpyruvate (the historically described "aromatic
  alpha-keto acid reductase" activity) and reduce 2-oxoglutarate to 2-hydroxyglutarate.
  In humans, biallelic loss-of-function variants cause an autosomal recessive early-onset
  developmental and epileptic encephalopathy (DEE88), reflecting the shuttle's importance
  for neuronal redox balance and amino-acid metabolism.
