    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The nuclear localization is unsupported by ACADS biology (matrix beta-oxidation enzyme) and
      derives from a high-throughput proteomics dataset prone to contamination. It does not reflect
      a real subcellular function and is flagged as over-annotated rather than core.
    supported_by:
