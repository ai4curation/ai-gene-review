id: P16219
gene_symbol: ACADS
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ACADS (short-chain specific acyl-CoA dehydrogenase, SCAD; also butyryl-CoA dehydrogenase;
  EC 1.3.8.1) is a mitochondrial matrix flavoenzyme that catalyzes the first, committed step
  of fatty acid beta-oxidation for short-chain substrates. It performs the FAD-dependent
  alpha,beta-dehydrogenation of saturated short-chain (C4-C6) acyl-CoA thioesters to the
  corresponding trans-2-enoyl-CoA, with the optimum substrate being butyryl-CoA (C4), passing
  the abstracted electrons to electron-transfer flavoprotein (ETF). The mature protein is a
  soluble homotetramer in the mitochondrial matrix, with one non-covalently bound FAD per
  subunit shared at dimer interfaces. SCAD belongs to the acyl-CoA dehydrogenase family and
  is most active in tissues with high beta-oxidation flux such as liver and skeletal muscle.
  Loss-of-function and common susceptibility variants in ACADS cause short-chain acyl-CoA
  dehydrogenase deficiency (ACADSD), a defect of mitochondrial fatty acid oxidation marked by
  ethylmalonic aciduria with variable clinical presentations ranging from infantile acidosis
  and muscle weakness to adult lipid-storage myopathy, and often clinically benign.
