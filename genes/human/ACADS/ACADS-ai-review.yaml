# --- nucleus (HDA, 21630459) ---
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:21630459
  qualifier: located_in
  review:
    summary: >-
      HDA annotation from a human sperm-nucleus proteomics dataset (de Mateo et al. 2011). ACADS is
      a soluble mitochondrial matrix flavoenzyme with a cleaved mitochondrial transit peptide and no
