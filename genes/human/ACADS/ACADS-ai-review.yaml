- term:
    id: GO:0016937
    label: short-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred short-chain acyl-CoA dehydrogenase activity. This is the precise
      and correct molecular function for ACADS/SCAD, well-supported by direct experimental data
      (purified human SCAD dehydrogenates butyryl-CoA; EC 1.3.8.1 characterization) and by the
      UniProt curated substrate specificity for C4-C6 acyl-CoAs. Appropriate term and specificity.
    action: ACCEPT
    reason: >-
      The IBA propagation gives the most informative MF term and is concordant with the EXP, ISS,
      and IDA evidence. This is the core molecular function of ACADS.
    supported_by:
      - reference_id: PMID:3597357
        supporting_text: "The products of SCA dehydrogenase/butyryl-CoA, MCA dehydrogenase/octanoyl-CoA, and IV dehydrogenase/isovaleryl-CoA reactions were identified as crotonyl-CoA"
