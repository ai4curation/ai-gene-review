proposed_new_terms: []
suggested_questions:
- question: >-
    What accounts for the wide variability in clinical severity of ACADS deficiency, given that
    common susceptibility variants (625G>A, 511C>T) are frequent in the general population and many
    individuals with ethylmalonic aciduria are asymptomatic?
- question: >-
    Beyond energy-yielding short-chain fatty acid beta-oxidation, does ACADS contribute to the
    catabolism of specific short-chain acyl-CoA pools (e.g. butyryl-CoA derived from amino acid or
    microbial-derived butyrate metabolism) in particular tissues?
suggested_experiments:
- description: >-
    Quantitative measurement of short-chain acyl-CoA flux (C4-C6) in tissues or cell models with
    defined ACADS genotypes (including the common 625G>A and 511C>T variants) to define the
    genotype-to-biochemical-phenotype relationship and the functional threshold for ethylmalonic
    aciduria.
- description: >-
    Structure-guided enzyme kinetics across the C4-C8 acyl-CoA range using purified recombinant
    human SCAD to precisely delimit the short-chain specificity boundary (especially the extent of
    C6/hexanoyl-CoA activity) relative to MCAD, clarifying the medium-chain annotation.
