core_functions:
- description: >-
    ACADS catalyzes the first, FAD-dependent step of mitochondrial fatty acid beta-oxidation for
    short-chain substrates: the alpha,beta-dehydrogenation of saturated short-chain (C4-C6)
    acyl-CoA thioesters to the corresponding trans-2-enoyl-CoA (optimum substrate butyryl-CoA),
    transferring electrons to electron-transfer flavoprotein (ETF). It acts as a soluble
    homotetramer in the mitochondrial matrix with one FAD per subunit.
  molecular_function:
    id: GO:0016937
    label: short-chain fatty acyl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  - id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  locations:
