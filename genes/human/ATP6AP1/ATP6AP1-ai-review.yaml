- id: Reactome:R-HSA-5252133
  title: ATP6AP1 binds V-ATPase
  findings:
  - statement: Reactome event placing ATP6AP1 as an accessory V0 subunit that facilitates V-ATPase acidification.
    supporting_text: V-type proton ATPase subunit S1 (ATP6AP1) is thought to function as an accessory subunit of the V0 
      subcomplex of V-ATPase, facilitating acidification
- id: Reactome:R-HSA-74723
  title: Endosome acidification
  findings:
  - statement: Reactome event for endosome acidification by proton entry into the endosome lumen.
    supporting_text: The effect of the proton pump is to allow entry of [H+] ions into the lumen of the endosome.
- id: Reactome:R-HSA-917841
  title: Acidification of Tf:TfR1 containing endosome
  findings:
  - statement: Reactome event for transferrin-receptor endosome acidification by V-ATPase-driven proton movement.
    supporting_text: The function of V-type proton pumping ATPases is basically the same as that of F-type ATPases, 
      except that V-ATPases cannot synthesize ATP from the proton motive force, the reverse reaction of pumping.
- id: file:projects/PROTEOSTASIS/reports/pn_projection/pn_projected_annotations.tsv
  title: Proteostasis PN projected annotations report
  findings:
  - statement: Projects ATP6AP1 to GO:0060590 ATPase regulator activity from regulator-of-lysosomal-V-ATPase PN leaves 
      and recognizes GO:0007042 lysosomal lumen acidification as already present in GOA.
    supporting_text: ATPase regulator activity is the narrowest GO target that preserves the source mechanism without 
      requiring a speculative complex-specific term.
core_functions:
- molecular_function:
    id: GO:0060590
    label: ATPase regulator activity
  description: ATP6AP1/Ac45 is an accessory/regulatory subunit of the V-ATPase V0 sector. It promotes V-ATPase assembly,
    targeting, stability, and activity rather than catalyzing proton transport itself. This captures the PN-projected 
    regulator-of-lysosomal-V-ATPase role conservatively.
  directly_involved_in:
