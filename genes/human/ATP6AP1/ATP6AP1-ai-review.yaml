id: Q15904
gene_symbol: ATP6AP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ATP6AP1 encodes V-type proton ATPase subunit S1, also known as Ac45, a single-pass glycoprotein accessory 
  subunit of the vacuolar H+-ATPase. It is synthesized in the secretory pathway, localizes prominently to the ER and 
  ER-Golgi intermediate compartment in hepatocytes, and is incorporated into the V0 sector of mature V-ATPase complexes 
  in endolysosomal and specialized secretory membranes. ATP6AP1 supports V-ATPase assembly, targeting, stability, and 
  activity, thereby contributing to acidification of lysosomes, endosomes, Golgi/secretory compartments, and specialized
  plasma-membrane domains. Through the lysosomal V-ATPase-Ragulator machinery it contributes to amino-acid-dependent 
  mTORC1 signaling, and disruption of V-ATPase function secondarily affects iron handling and HIF1alpha regulation. 
  Pathogenic ATP6AP1 variants cause an X-linked disorder with immunodeficiency, hepatopathy, cognitive or neurologic 
  features, and abnormal protein glycosylation, consistent with tissue-specific defects in V-ATPase assembly and 
  organelle homeostasis.
