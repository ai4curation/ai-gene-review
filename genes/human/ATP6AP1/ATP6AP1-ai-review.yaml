- id: PMID:28296633
  title: The vacuolar-ATPase complex and assembly factors, TMEM199 and CCDC115, control HIF1α prolyl hydroxylation by 
    regulating cellular iron levels.
  findings:
  - statement: Links ATP6AP1/V-ATPase disruption to intracellular iron depletion and HIF activation in aerobic 
      conditions.
    supporting_text: disrupting the V-ATPase results in intracellular iron depletion, thereby impairing PHD activity and
      leading to HIF activation.
- id: PMID:29127204
  title: Mutations in the X-linked ATP6AP2 cause a glycosylation disorder with autophagic defects.
  findings:
  - statement: Shows ATP6AP2 disease mutations impair interaction with ATP6AP1 and supports an ATP6AP-family V0 assembly
      complex model.
    supporting_text: both ATP6AP2 mutations impaired protein stability and the interaction with ATP6AP1, a member of the
      V0 assembly complex.
- id: PMID:32001091
  title: Structure and Roles of V-type ATPases.
  findings:
  - statement: Review source for V-ATPase acidification roles across organelles and specialized plasma membranes.
    supporting_text: V-ATPases are membrane-embedded protein complexes that function as ATP hydrolysis-driven proton 
      pumps.
