    label: lysosomal lumen acidification
  - id: GO:0048388
    label: endosomal lumen acidification
  - id: GO:0061795
    label: Golgi lumen acidification
  - id: GO:1904263
    label: positive regulation of TORC1 signaling
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  - id: GO:0033116
    label: endoplasmic reticulum-Golgi intermediate compartment membrane
  - id: GO:0005765
    label: lysosomal membrane
  - id: GO:0010008
    label: endosome membrane
  in_complex:
    id: GO:0033176
    label: proton-transporting V-type ATPase complex
  supported_by:
  - reference_id: PMID:27231034
    supporting_text: This accessory subunit of the proton pump guides the V-ATPase into specialized subcellular 
      compartments such as neuroendocrine regulated secretory vesicles1415 or the ruffled border of the osteoclast101617
      thereby regulating its activity.
  - reference_id: PMID:33065002
    supporting_text: We define ATP6AP1 as a structural hub for Vo complex assembly because it connects to multiple Vo 
      subunits and phospholipids in the c-ring.
  - reference_id: PMID:22053050
    supporting_text: The v-ATPase is required for amino acid signaling to mTORC1 and functions between amino acids and 
      the nucleotide loading of the Rag GTPases.
proposed_new_terms: []
suggested_questions:
- question: Does ATP6AP1 have separable regulatory roles in mature lysosomal V-ATPase activity versus ER-localized V0 
    assembly in different human tissues?
  experts:
  - Jansen EJ
  - Wang L
- question: Is the ATP6AP1 contribution to mTORC1 nutrient sensing mediated entirely by mature V-ATPase/Ragulator 
    coupling, or do ATP6AP-family accessory subunits tune that signaling independently of bulk acidification?
  experts:
  - Zoncu R
  - Sabatini DM
suggested_experiments:
- hypothesis: ATP6AP1 disease variants differentially impair ER V0 assembly, lysosomal acidification, and mTORC1 
    amino-acid signaling.
  description: Introduce representative ATP6AP1 variants into an ATP6AP1-null human cell line and measure V-ATPase 
    assembly, lysosomal/endosomal pH, glycosylation markers, and amino-acid-stimulated mTORC1 
    recruitment/phosphorylation in parallel.
  experiment_type: genome editing and cell biology
- hypothesis: The PN-projected ATPase regulator activity reflects ATP6AP1-specific control of V-ATPase assembly/activity
    rather than a generic consequence of complex membership.
  description: Compare rescue by wild-type ATP6AP1 and assembly-defective mutants using purified V-ATPase assembly 
    assays or quantitative proteomics of V0/V1 subcomplex formation, coupled to acidification readouts.
  experiment_type: biochemical reconstitution/proteomics
