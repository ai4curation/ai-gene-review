product_type: PROTEIN
aliases:
- BNSP
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  IBSP encodes bone sialoprotein, a secreted, highly phosphorylated, sulfated,
  and glycosylated SIBLING-family protein of mineralized extracellular matrices.
  Acidic regions bind hydroxyapatite and influence mineral crystal formation,
  while a C-terminal Arg-Gly-Asp motif binds alpha-V-containing integrins to
  support cell attachment and migration. IBSP is produced chiefly by mature
  osteoblast-lineage cells and osteoclasts and is deposited in bone, dentin, and
  cementum, where it contributes to matrix organization, primary ossification,
  and bone mineralization. Outside the skeleton, integrin engagement can promote
  tumor-cell migration, and IBSP-bound complement factor H can protect attached
  cells from complement-mediated lysis.
