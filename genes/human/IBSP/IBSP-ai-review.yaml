- description: >-
    The C-terminal RGD motif of extracellular IBSP binds alpha-V-containing
    integrins and promotes cell-matrix attachment and migration. This activity
    contributes to normal bone-cell interactions and is reused by tumor cells
    in migratory perivascular niches.
