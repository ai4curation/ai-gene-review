knowledge_gaps:
- gap_statement: >-
    The modification-dependent switch between hydroxyapatite nucleation,
    crystal-growth inhibition, and passive mineral binding is unresolved.
  boundary: >-
    Native and recombinant proteins differ in hydroxyapatite affinity, and
    several BSP preparations inhibit or nucleate mineral in vitro, but the
    physiological state responsible for each behavior is not defined.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving this switch is essential for a mechanistic explanation of IBSP's
    positive in vivo contribution to bone mineralization.
  resolution: >-
    Produce site-specifically phosphorylated and glycosylated human IBSP
    proteoforms and compare mineral nucleation, growth, and binding under
    bone-like ionic and matrix conditions.
  provenance:
  - reference_id: file:human/IBSP/IBSP-deep-research-manual.md
    supporting_text: These activities organize the bone cell-matrix interface, support adhesion and migration, and contribute to bone formation and mineralization.
- gap_statement: >-
    The relative contributions of direct mineral binding and RGD-integrin
    signaling to skeletal phenotypes are not fully separated.
  boundary: >-
    Whole-gene knockout affects mineralization and bone-cell programs, while
    peptide and cell assays establish integrin binding, but human
    separation-of-function evidence is lacking.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Distinguishing the mechanisms would clarify whether IBSP is primarily a
    mineral nucleator, a matrix signal, or a coordinated bifunctional regulator.
  resolution: >-
    Compare hydroxyapatite-binding-deficient and RGD-deficient human IBSP
    knock-in alleles in mineralizing organoids and skeletal animal models.
  provenance:
  - reference_id: file:human/IBSP/IBSP-notes.md
    supporting_text: How much of the Ibsp-null skeletal phenotype is due to direct mineral-phase control versus integrin signaling to osteoblasts and osteoclasts?
suggested_questions:
- question: >-
    Which IBSP phosphorylation and glycosylation patterns determine mineral
    nucleation versus crystal-growth inhibition in human bone?
- question: >-
    How much of the skeletal phenotype requires RGD-integrin signaling rather
    than direct hydroxyapatite binding?
- question: >-
    Is IBSP actively packaged into human mineralizing extracellular vesicles?
- question: >-
    Does factor-H recruitment by IBSP have a normal placental or skeletal role,
    or is it primarily exploited by tumors?
suggested_experiments:
- hypothesis: >-
    Distinct phosphorylation patterns convert IBSP between a hydroxyapatite
    nucleator and a crystal-growth inhibitor.
  description: >-
    Generate site-specifically phosphorylated human IBSP proteoforms and measure
    hydroxyapatite binding, nucleation lag, crystal-growth kinetics, and crystal
    morphology in collagen-containing bone-like matrices.
  experiment_type: Proteoform-resolved mineralization biophysics
- hypothesis: >-
    IBSP's RGD motif and acidic mineral-binding regions make separable
    contributions to osteoblast differentiation and matrix mineralization.
  description: >-
    Rescue IBSP-null human osteogenic organoids with wild-type, RGD-to-KAE, or
    acidic-cluster mutants and quantify integrin signaling, cell attachment,
    osteoblast maturation, mineral deposition, and matrix ultrastructure.
  experiment_type: Separation-of-function rescue in human osteogenic organoids
- hypothesis: >-
    Human osteoblasts package IBSP into extracellular matrix vesicles to deliver
    it to nascent mineralization foci.
  description: >-
    Isolate vesicles from primary human osteoblast cultures using density and
    size-exclusion methods, confirm luminal or surface topology by protease
    protection, and track IBSP-dependent mineral nucleation by live imaging.
  experiment_type: Extracellular-vesicle localization and mineralization assay
