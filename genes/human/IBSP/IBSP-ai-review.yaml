core_functions:
- description: >-
    Secreted bone sialoprotein binds hydroxyapatite through its acidic,
    phosphorylated matrix regions and participates in organization and
    mineralization of bone extracellular matrix. Conserved loss-of-function
    phenotypes show delayed primary ossification and reduced mineral density.
  molecular_function:
    id: GO:0046848
