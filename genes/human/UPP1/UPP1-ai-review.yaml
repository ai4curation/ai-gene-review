- id: PMID:19291308
  title: Implications of the structure of human uridine phosphorylase 1 on the development
    of novel inhibitors for improving the therapeutic window of fluoropyrimidine chemotherapy.
  findings:
  - statement: >-
      High-resolution crystal structures confirm that the active human uridine
      phosphorylase 1 is a homodimer, unlike the hexameric microbial UPPs, and
      define the active-site interactions used for inhibitor (BAU) design.
    reference_section_type: RESULTS
    supporting_text: is dimeric in contrast to the hexameric assembly present in microbial UPPs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available; directly establishes the homodimer (identical protein
      binding) and the enzyme's role in pyrimidine salvage and fluoropyrimidine
      activation.
- id: PMID:20856879
  title: Active site conformational dynamics in human uridine phosphorylase 1.
  findings:
  - statement: >-
      Structure of hUPP1 bound to 5-fluorouracil confirms the strictly dimeric
      eukaryotic assembly and reveals inter-domain hinge motion coupling the two
      active sites during catalysis.
    reference_section_type: RESULTS
    supporting_text: strictly dimeric complexes in eukaryotic organisms
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available; independently supports the homodimer and details
      active-site conformational dynamics relevant to catalysis.
- id: PMID:7488099
  title: Cloning and expression of human uridine phosphorylase.
  findings:
  - statement: >-
      Cloned human UPP1 (from colorectal tumor line HCT116); recombinant enzyme
      showed specific uridine phosphorylase activity inhibited by a competitive
      uridine-analogue inhibitor, and expression was induced by vitamin D3 and
      inflammatory cytokines.
    reference_section_type: ABSTRACT
    supporting_text: specific enzyme activity with uridine as the substrate
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false); title/abstract match the
      gene and support the IDA catalytic-activity and uridine catabolic annotations
      curated by UniProt from the full text.
