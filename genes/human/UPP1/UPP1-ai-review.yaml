  label: Homo sapiens
description: >-
  UPP1 (uridine phosphorylase 1) is a cytosolic enzyme of the PNP/UDP phosphorylase
  family that catalyzes the reversible phosphorolysis of uridine, and to a lesser
  extent 2'-deoxyuridine, into uracil plus (2-deoxy)-alpha-D-ribose 1-phosphate
  (EC 2.4.2.3). This is a central reaction of pyrimidine nucleoside salvage and
  catabolism: the liberated uracil can be salvaged for pyrimidine nucleotide
  synthesis or degraded reductively (by DPYD, DPYS and UPB1), while the ribose
  1-phosphate feeds the pentose/energy pool. The active enzyme is a homodimer.
  UPP1 activity is important pharmacologically because it activates fluoropyrimidine
  chemotherapeutics such as 5-fluorouracil and its prodrug capecitabine, and its
  expression is induced by vitamin D3 and inflammatory cytokines (TNF, IL1, IFNG).
