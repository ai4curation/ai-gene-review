  label: Homo sapiens
description: >-
  PEDS1 (plasmanylethanolamine desaturase 1; formerly TMEM189, also known as KUA)
  is an endoplasmic reticulum multi-pass membrane enzyme of the fatty acid desaturase
  CarF family (a non-heme di-iron desaturase). It catalyzes the final, plasmalogen-defining
  step of ether-phospholipid biosynthesis: introduction of the characteristic 1-O-alk-1'-enyl
  (vinyl ether) double bond at the sn-1 position of plasmanylethanolamine to form
  plasmenylethanolamine (ethanolamine plasmalogen), using molecular oxygen and reduced
  cytochrome b5 as electron donor (EC 1.14.19.77). This reaction is specific to plasmalogen
  biosynthesis and generates the first plasmalogen in the pathway; downstream plasmenylcholines
  are derived from plasmenylethanolamine. Catalysis depends on two histidine-box motifs and
  additional conserved histidine residues that coordinate the di-iron center. Loss of PEDS1
  markedly reduces cellular plasmalogens and causes accumulation of the plasmanylethanolamine
  substrates. Plasmalogens are abundant glycerophospholipids, particularly in brain, cardiac,
  and immune-cell membranes, with roles in membrane organization, signaling, and antioxidant
  protection.
