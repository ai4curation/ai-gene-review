- id: PMID:34237462
  title: Human AGR2 Deficiency Causes Mucus Barrier Dysfunction and Infantile Inflammatory Bowel Disease.
  findings:
  - statement: Human AGR2 deficiency causes goblet-cell and gel-forming mucin loss with ER stress and mucus barrier disease.
    supporting_text: Patient biopsy specimens showed reduced goblet cells; depletion of MUC2, MUC5AC, and MUC6; up-regulation of AGR2; and increased ER stress.
    reference_section_type: ABSTRACT
  - statement: Human AGR2 H117Y has reduced MUC2 binding and reduced ER-stress relief, supporting AGR2-MUC2 functional interaction despite the earlier EGFR-focused conflict.
    supporting_text: The mutant AGR2 showed reduced capacity to bind MUC2 and alleviate tunicamycin-induced ER stress.
    reference_section_type: ABSTRACT
