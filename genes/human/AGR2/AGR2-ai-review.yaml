- id: PMID:19359471
  title: The protein disulfide isomerase AGR2 is essential for production of intestinal mucus.
  findings:
  - statement: AGR2 is an ER-localized PDI-family factor required for intestinal MUC2 production and mucus.
    supporting_text: Here, we show that AGR2 is present within the ER of intestinal secretory epithelial cells and is essential for in vivo production of the intestinal mucin MUC2
    reference_section_type: ABSTRACT
  - statement: AGR2 forms mixed disulfide bonds with MUC2 via its thioredoxin-like cysteine.
    supporting_text: A cysteine residue within the AGR2 thioredoxin-like domain forms mixed disulfide bonds with MUC2, indicating a direct role for AGR2 in mucin processing.
    reference_section_type: ABSTRACT
