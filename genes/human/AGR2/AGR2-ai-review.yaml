core_functions:
- description: AGR2 acts in the ER lumen of mucin-producing epithelial cells as a specialized PDI-family foldase/client-processing factor for gel-forming mucins, especially MUC2. This activity supports MUC2 post-transcriptional synthesis/processing, mucus production, and epithelial mucus barrier integrity; loss of AGR2 disrupts mucin production and increases ER stress in goblet cells. A 2015 EGFR-focused study disputed MUC2 as an AGR2 folding client, but later human AGR2 H117Y data showing reduced MUC2 binding and ER-stress relief support retaining the mucin-processing core-function model.
