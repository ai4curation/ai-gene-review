suggested_experiments:
- hypothesis: AGR2 directly catalyzes or stabilizes disulfide-dependent folding intermediates in gel-forming mucins.
  description: Reconstitute purified AGR2 with recombinant MUC2 cysteine-rich domains or MUC2 folding intermediates and compare wild-type AGR2 with Cys81/His117/dimerization mutants in disulfide-shuffling, mixed-disulfide trapping, and client-folding assays.
  experiment_type: in vitro biochemical foldase assay
- hypothesis: Extracellular AGR2 monomer functions mainly as a damage/inflammation signal when ER proteostasis is perturbed.
  description: Compare secretion state, oligomeric state, and monocyte/goblet-cell responses to endogenous AGR2 under normal mucin secretion, tunicamycin/ER stress, TMED2 perturbation, and AGR2 KTEL/dimerization mutant conditions in intestinal epithelial organoids.
  experiment_type: intestinal organoid perturbation and chemotaxis assay
