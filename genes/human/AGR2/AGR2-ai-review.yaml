- id: PMID:31040128
  title: Control of anterior GRadient 2 (AGR2) dimerization links endoplasmic reticulum proteostasis to inflammation.
  findings:
  - statement: AGR2 dimerization links ER proteostasis to secretion and inflammation.
    supporting_text: AGR2 dimers act as sensors of ER homeostasis which are disrupted upon ER stress and promote the secretion of AGR2 monomers.
    reference_section_type: ABSTRACT
  - statement: AGR2 dimers dissociate downstream of ER stress sensing rather than driving UPR — establishing the AGR2-versus-UPR-sensor directionality as sensor-driven, not AGR2-driven.
    supporting_text: dissociation of AGR2 homodimers as assessed by the decrease in luminescence observed for all the constructs tested
    reference_section_type: RESULTS
  - statement: The IRE1 mention in this paper is the ERMIT mammalian two-hybrid bait scaffold, not a biological regulatory target — relevant for evaluating arm-specific UPR claims.
    supporting_text: the luminal domain of IRE1 was replaced by different bait proteins
    reference_section_type: RESULTS
- id: PMID:31247903
  title: 'Leveraging the Role of the Metastatic Associated Protein Anterior Gradient Homologue 2 in Unfolded Protein Degradation: A Novel Therapeutic Biomarker for Cancer.'
  findings:
  - statement: The well-established AGR2/UPR-sensor directionality is sensor-driven — IRE1α and ATF6α regulate AGR2 expression, not vice versa. PERK is conspicuously absent from the AGR2 mechanistic literature.
    supporting_text: This was demonstrated when IREα and ATF6α were knocked down using small interfering RNA (siRNA) in HeLa cells, resulting in the decreased expression levels of the AGR2 protein
    reference_section_type: RESULTS
  - statement: Mechanistic review summary of AGR2 expression regulators omits any AGR2 → IRE1/PERK regulatory direction.
    supporting_text: The top molecules implicated in regulating the expression of AGR2 included IRE1α, ATF6α, AKT, FOXA1/2, HIF-1, TMED2, and the frequently mutated tumor suppressor p53.
    reference_section_type: DISCUSSION
