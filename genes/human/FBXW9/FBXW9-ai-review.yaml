- id: file:human/FBXW9/FBXW9-deep-research-falcon.md
  title: Falcon deep research report for human FBXW9
  findings:
  - statement: FBXW9 binds SKP1 (array MAPPIT screen validated by co-immunoprecipitation in HEK293T) and co-purifies with CUL1 in AP-MS of SCF assemblies, providing direct experimental evidence that it is an SCF/CRL1 substrate-recognition adaptor rather than an enzyme.
    supporting_text: FBXW9 was identified as a SKP1-interacting prey in a high-throughput **array MAPPIT** interactome screen and validated by **co-immunoprecipitation** in **HEK293T** cells
  - statement: FBXW9 is a direct p53 transcriptional target (ChIP/luciferase/Nutlin-3 evidence) whose ectopic expression suppresses proliferation of p53-deficient cells, positioning it downstream of p53 tumor-suppressor signaling.
    supporting_text: ChIP-seq/ChIP-qPCR showed p53 occupancy near Fbxw9 promoter; p53 increased luciferase reporter activity; p53 knockdown reduced expression; Nutlin-3 induced Fbxw9 in p53-WT but not p53-null human cells
  - statement: In glioblastoma stem-like cells FBXW9 is a CREB-bound transcriptional target downstream of an IGFBP5-ROR1/HER2 axis, and FBXW9 knockdown reduces invasion, with high FBXW9 associated with worse survival.
    supporting_text: siRNA against FBXW9 significantly decreased invasion capacity in X01 and 448 GSC lines; high FBXW9 associated with worse glioma/LGG survival
  - statement: In breast cancer cells FBXW9 knockdown reduces proliferation and induces G0/G1 arrest with increased p21, but TP53 as an FBXW9 ubiquitination substrate remains predicted (UbiBrowser), not biochemically validated.
    supporting_text: TP53 as substrate remains predicted, not biochemically validated by ubiquitination/degradation assay
  - statement: No directly validated endogenous ubiquitination substrate for human FBXW9 has been established; the molecular substrate repertoire and degron remain unresolved.
    supporting_text: No directly validated endogenous ubiquitination substrate for human FBXW9 was recovered; no direct catalytic assay, no substrate degron definition
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Falcon synthesis grounded chiefly in Lievens et al. 2009 (J Proteome Res, doi:10.1021/pr8005167; array MAPPIT + co-IP SKP1 interaction) and Lee et al. 2011 (Mol Cell Proteomics, doi:10.1074/mcp.m110.006460; CUL1 AP-MS), which provide direct experimental support for SCF/CRL1 adaptor behavior. Cancer-context studies (Lin 2023 Nat Commun; Yu 2023 Int J Mol Sci; Shin 2024 Genes Dis) describe FBXW9 as a transcriptional target of CREB and p53 with knockdown phenotypes, but report no direct substrate ubiquitination; TP53 substrate is predictive only. The report explicitly flags the CRL7 receptor claim (Jeong 2023 review) as uncorroborated. Cross-checked against UniProt Q5XUX1 FUNCTION/SUBUNIT and ComplexPortal CPX-7785. No annotation action is changed on the basis of these correlative/transcriptional findings.
core_functions:
- description: Substrate-recognition (substrate-adaptor) subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex; it docks via its F-box motif onto SKP1 (experimentally validated) and CUL1 (AP-MS), presenting a WD40 propeller for substrate recruitment. FBXW9 is non-catalytic (ubiquitin transfer is RBX1's), and its specific physiological substrates are not yet experimentally defined.
  supported_by:
  - reference_id: file:human/FBXW9/FBXW9-uniprot.txt
    supporting_text: Substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex
  - reference_id: file:human/FBXW9/FBXW9-deep-research-falcon.md
    supporting_text: FBXW9 was identified as a SKP1-interacting prey in a high-throughput **array MAPPIT** interactome screen and validated by **co-immunoprecipitation** in **HEK293T** cells
  locations:
  - id: GO:0005829
    label: cytosol
proposed_new_terms:
- proposed_name: ubiquitin-like ligase-substrate adaptor activity
  proposed_definition: Bridging a substrate to a ubiquitin-like protein ligase, as performed by an SCF F-box substrate-recognition subunit that binds both SKP1/the ligase scaffold and the substrate to facilitate the substrate's ubiquitination. This corresponds to the existing GO term GO:1990756, which is not currently in FBXW9's annotation set.
  justification: FBXW9 binds SKP1 (validated by co-IP) and co-purifies with CUL1-containing SCF assemblies, consistent with a substrate-adaptor molecular function rather than catalysis (which is RBX1's). Adding GO:1990756 would give FBXW9 an informative molecular-function term in place of the uninformative bare protein binding annotations, even though its specific substrate is not yet defined.
  proposed_parent:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  supported_by:
  - reference_id: file:human/FBXW9/FBXW9-uniprot.txt
    supporting_text: Substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex
  - reference_id: file:human/FBXW9/FBXW9-deep-research-falcon.md
    supporting_text: FBXW9 was identified as a SKP1-interacting prey in a high-throughput **array MAPPIT** interactome screen and validated by **co-immunoprecipitation** in **HEK293T** cells
suggested_questions:
- question: What are the physiological ubiquitination substrates recognized by the FBXW9 WD40 propeller, and is substrate recognition phosphodegron-dependent? Is the predicted TP53 substrate directly ubiquitinated by SCF(FBXW9)?
- question: Do the p53- and CREB-driven transcriptional control of FBXW9 and the breast-cancer/glioblastoma knockdown phenotypes reflect a degradative SCF(FBXW9) substrate, or non-proteolytic/indirect mechanisms?
suggested_experiments:
- description: Affinity purification of tagged FBXW9 with SKP1/CUL1/RBX1 followed by mass spectrometry to identify co-purifying and ubiquitinated substrate candidates, prioritizing cell types (breast cancer, glioblastoma stem-like cells) where knockdown phenotypes were reported.
- description: Reconstitute SCF(FBXW9) in vitro with SKP1, CUL1, RBX1 and an E2, and test ubiquitination of candidate substrates (e.g. TP53 predicted by UbiBrowser) comparing wild-type to F-box-deletion FBXW9.
