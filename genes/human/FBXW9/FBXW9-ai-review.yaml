id: Q5XUX1
gene_symbol: FBXW9
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW9 is a member of the F-box/WD40 (FBXW) family of proteins, containing an
  N-terminal F-box motif and a C-terminal beta-propeller built from seven WD40
  repeats. F-box proteins serve as the interchangeable substrate-recognition
  subunits of SCF (SKP1-CUL1-F-box)-type cullin-RING E3 ubiquitin ligase
  complexes: the F-box motif binds SKP1 (which in turn bridges to CUL1 and the
  RBX1-bound catalytic RING), while the WD40 propeller engages substrate proteins
  and presents them for ubiquitination, marking them for proteasomal degradation.
  FBXW9 is predicted to function in this manner and is reported to interact with
  SKP1 and CUL1, and ComplexPortal assigns it as the variable subunit of an SCF
  complex variant. It is broadly expressed and undergoes phosphorylation at
  several N-terminal residues, but FBXW9 remains poorly characterized: no specific
  physiological ubiquitination substrate or biological process has been
  experimentally established, and its assigned molecular and process roles rest
  largely on family-level and homology-based inference.
