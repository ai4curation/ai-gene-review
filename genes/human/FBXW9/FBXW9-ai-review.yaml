core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex, docking via its F-box motif onto SKP1/CUL1 with a WD40 propeller available for substrate recruitment; specific substrates are not yet experimentally defined.
