suggested_questions:
- question: What are the physiological ubiquitination substrates recognized by the FBXW9 WD40 propeller, and is substrate recognition phosphodegron-dependent?
- question: In which biological process or pathway does SCF(FBXW9) act, given the absence of any experimentally established loss-of-function phenotype?
suggested_experiments:
- description: Affinity purification of tagged FBXW9 with SKP1/CUL1/RBX1 followed by mass spectrometry to identify co-purifying and ubiquitinated substrate candidates.
- description: Reconstitute SCF(FBXW9) in vitro with SKP1, CUL1, RBX1 and an E2, and test ubiquitination of candidate substrates identified from interactome data, comparing wild-type to F-box-deletion FBXW9.
