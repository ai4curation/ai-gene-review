suggested_questions:
- question: How do FKBP5 and FKBP4 produce opposite effects on glucocorticoid receptor activity despite sharing the same TPR-HSP90 binding mode and overall domain architecture?
- question: Is FKBP5's PPIase catalytic activity required for its negative regulation of steroid receptors and for AKT1-PHLPP1 scaffolding, or are these adaptor functions catalysis-independent?
- question: How does glucocorticoid-induced FKBP5 expression quantitatively tune the HPA-axis negative feedback loop, and how do disease-associated FKBP5 variants alter this?
suggested_experiments:
- description: Compare FKBP5 wild-type versus PPIase-dead and TPR-deletion constructs for their ability to suppress glucocorticoid receptor transcriptional activity and to scaffold AKT1-PHLPP1.
- description: Reconstitute steroid receptor-HSP90-FKBP5 versus -FKBP4 heterocomplexes in vitro and measure receptor hormone-binding affinity and the FKBP5-to-FKBP4 exchange upon ligand binding.
- description: Use FKBP5 knockout/knockdown with AKT phosphorylation readouts (and PHLPP1 co-depletion) to confirm the scaffold mechanism for negative regulation of PI3K/AKT signaling.
