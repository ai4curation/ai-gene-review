core_functions:
- description: >-
    B-type cytosolic creatine kinase reversibly transfers the high-energy phosphoryl
    group between ATP and creatine (creatine + ATP = N-phosphocreatine + ADP + H+),
    acting in the cytosol to interconvert ATP and the phosphocreatine energy
    reservoir. The forward direction generates phosphocreatine (phosphocreatine
    biosynthetic process), buffering cellular ATP in brain and non-muscle tissues.
  molecular_function:
    id: GO:0004111
    label: creatine kinase activity
  directly_involved_in:
  - id: GO:0046314
    label: phosphocreatine biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:8186255
    supporting_text: The results showed residues Cys-283 and Arg-292 are essential
      for enzyme catalysis.
suggested_questions:
- question: Does human cytosolic B-CK have any direct, functionally relevant
    mitochondrial or futile-creatine-cycle role, or are the mitochondrion/futile-cycle
    annotations entirely by-similarity from the mouse thermogenic-fat ortholog?
- question: How general is the role of B-CK as an ATP-supplying partner physically
    coupled to membrane ATPases/transporters (e.g. KCC2/KCC3) across tissues, and is
    its kinase activity strictly required for transporter function?
suggested_experiments:
- description: Determine the subcellular distribution of endogenous human B-CK
    (cytosol vs mitochondrion vs membrane microcompartments) across brain, smooth
    muscle, and adipose tissue using fractionation and quantitative imaging, to test
    whether any mitochondrial/futile-cycle role exists for the human protein.
  hypothesis: Human B-CK is overwhelmingly cytosolic, with membrane and mitochondrial
    pools being minor and context-specific.
- description: Reconstitute B-CK with KCC2/KCC3 in a controlled system and measure
    cotransport activity with catalytically active versus catalytically dead B-CK to
    test whether local ATP regeneration, rather than mere binding, drives transporter
    activation.
  hypothesis: B-CK kinase activity is required to sustain KCC transporter activity by
    locally regenerating ATP at the membrane microcompartment.
