id: P12277
gene_symbol: CKB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CKB encodes the B-type (brain-type) cytosolic creatine kinase, a 381-residue
  enzyme (EC 2.7.3.2) of the ATP:guanido phosphotransferase (phosphagen kinase)
  family. It reversibly catalyzes transfer of the high-energy phosphoryl group
  between ATP and creatine (creatine + ATP = N-phosphocreatine + ADP + H+),
  interconverting ATP and the phosphocreatine energy reservoir. The active enzyme
  is a dimer: B-CK assembles into CK-BB homodimers and, with the muscle-type
  subunit CKM, into CK-MB heterodimers. As the cytosolic limb of the
  phosphocreatine/creatine-kinase shuttle, B-CK is functionally coupled to
  ATP-consuming processes (e.g. membrane ion transporters and other ATPases),
  locally regenerating ATP from phosphocreatine and providing temporal and spatial
  energy buffering in cells with high, fluctuating energy demands. B-CK is the
  predominant cytosolic creatine kinase of brain and is broadly expressed in smooth
  muscle and most non-muscle tissues. Beyond catalysis it acts as an
  ATP-regenerating partner in membrane microcompartments — for example binding the
  C-terminal domain of the K-Cl cotransporter KCC3 (SLC12A6) and supporting its
  transport activity — and is a substrate of the ECS(ASB9) Cullin-RING E3 ubiquitin
  ligase, which targets it for proteasomal degradation.
