existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Phylogenetic (IBA) inference that B-CK is active in the extracellular
      region. B-CK is a cytosolic enzyme; it is detected in exosomes/secretome but
      is not active extracellularly. The "is_active_in extracellular region" call
      is an over-propagation.
    action: MARK_AS_OVER_ANNOTATED
    reason: Creatine kinase catalysis requires cytosolic ATP/ADP and creatine; the
      enzyme is not known to function in the extracellular region. Detection in
      secreted vesicles does not make the extracellular region a site of activity.
- term:
    id: GO:0004111
    label: creatine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Creatine kinase activity is the core molecular function of CKB,
      supported phylogenetically (IBA) and experimentally. Accept.
    action: ACCEPT
    reason: This is the defining, experimentally established activity of CKB
      (EC 2.7.3.2); the IBA inference is consistent with direct assays.
    supported_by:
    - reference_id: PMID:8186255
      supporting_text: The results showed residues Cys-283 and Arg-292 are essential
        for enzyme catalysis.
