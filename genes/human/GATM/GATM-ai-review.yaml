- description: >-
    Broader amidinotransferase activity reflecting the enzyme's substrate promiscuity: in
    addition to glycine, GATM amidinates GABA, beta-alanine and taurine to form guanidinobutyrate,
    guanidinopropionate and taurocyamine, respectively.
  molecular_function:
    id: GO:0015067
