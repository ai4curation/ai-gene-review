core_functions:
- description: >-
    Glycine amidinotransferase activity: transfers the amidino group of L-arginine to glycine,
    producing guanidinoacetate and L-ornithine - the committed, rate-limiting step of creatine
    biosynthesis - acting in the mitochondrial intermembrane space.
  molecular_function:
    id: GO:0015068
    label: glycine amidinotransferase activity
  directly_involved_in:
