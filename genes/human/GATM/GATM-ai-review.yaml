      promiscuous action of human glycine amidinotransferase
suggested_questions:
- question: >-
    Is the broad amidinotransferase promiscuity (GABA, beta-alanine, taurine) physiologically
    significant in vivo, or is it primarily an in vitro side reaction with little flux under
    normal conditions?
- question: >-
    By what mechanism does the FRTS1 aggregation-prone gain-of-toxicity of specific GATM variants
    cause proximal tubulopathy, and how does it relate (if at all) to loss of catalytic activity?
suggested_experiments:
- description: >-
    Quantify in vivo flux of GATM toward the non-canonical guanidino acids (guanidinobutyrate,
    guanidinopropionate, taurocyamine) in human/mouse tissues using stable-isotope tracing, to
    determine whether the promiscuous activities contribute meaningfully to metabolite pools.
  hypothesis: >-
    The non-glycine amidinotransferase side reactions are minor relative to guanidinoacetate
    synthesis under physiological conditions.
- description: >-
    Use structure-guided mutants that selectively impair GATM aggregation (FRTS1 variants) while
    preserving catalytic activity to dissociate the toxic-aggregation phenotype from enzymatic
    loss of function in proximal tubule cell models.
  hypothesis: >-
    FRTS1 pathology is driven by mitochondrial protein aggregation and downstream stress, not by
    loss of creatine synthesis.
