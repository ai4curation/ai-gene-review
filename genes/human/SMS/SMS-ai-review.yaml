- id: PMID:18367445
  title: 'Crystal structure of human spermine synthase: implications of substrate
    binding and catalytic mechanism.'
  findings:
  - statement: >-
      Human spermine synthase is a homodimer of identical subunits; dimerization occurs
      mainly through the N-terminal domain and deletion of that domain abolishes activity.
    supporting_text: >-
      They show that the enzyme is a dimer of two identical subunits.
  - statement: >-
      The catalytic mechanism relies on conserved acidic residues (Asp201, Asp276, Glu353),
      confirmed by site-directed mutagenesis.
    supporting_text: >-
      Two residues (Asp 201 and Asp 276 ) that are conserved in aminopropyltransferases
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text available and read; directly establishes SMS structure, spermine
      synthase catalytic activity (EC 2.5.1.22), homodimer requirement, and catalytic
      residues. Underpins the EXP molecular-function annotation.
