id: P52788
gene_symbol: SMS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMS encodes spermine synthase (spermidine aminopropyltransferase; EC 2.5.1.22), a
  cytosolic enzyme that catalyzes the final committed step of polyamine biosynthesis.
  It transfers an aminopropyl group from decarboxylated S-adenosylmethionine (dcSAM,
  produced by AMD1) onto spermidine, yielding the higher polyamine spermine plus
  5'-methylthioadenosine (MTA). Spermine synthase is an obligate homodimer; each subunit
  comprises three domains — a C-terminal catalytic domain resembling spermidine synthase,
  a central four-stranded beta lid, and an N-terminal domain with structural similarity to
  S-adenosylmethionine decarboxylase that mediates dimerization required for activity. The
  enzyme belongs to the spermidine/spermine synthase (aminopropyltransferase) family and is
  ubiquitously expressed. Loss-of-function variants in the X-linked SMS gene cause
  Snyder-Robinson syndrome, an X-linked recessive syndromic intellectual disability with
  osteoporosis, hypotonia/hypertonia, marfanoid habitus and unsteady gait, reflecting an
  altered spermine/spermidine balance from impaired spermine biosynthesis.
