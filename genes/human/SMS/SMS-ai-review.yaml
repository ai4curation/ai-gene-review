core_functions:
- description: >-
    Spermine synthase (spermidine aminopropyltransferase) activity: transfers an aminopropyl
    group from decarboxylated S-adenosylmethionine to spermidine, forming spermine and
    5'-methylthioadenosine, as the final committed step of polyamine biosynthesis. The enzyme
    acts as an obligate homodimer in the cytosol.
