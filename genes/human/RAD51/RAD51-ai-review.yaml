suggested_questions:
- question: To what extent are RAD51's mitochondrial mtDNA-maintenance and nuclear HR functions mechanistically separable, and does mitochondrial RAD51 act as a recombinase there?
- question: How is the balance between RAD51 filament stabilization (BRCA2, RAD51AP1) and active dismantling (FIGNL1, RECQL5, PARI/PARPBP) controlled to switch between HR and fork protection outcomes?
suggested_experiments:
- description: Separation-of-function RAD51 mutants (e.g. FANCR-type dominant variants) assayed in parallel for HR, replication fork protection, and ICL repair to map the domains/activities specific to each process.
- description: Single-molecule / cryo-EM analysis of RAD51 filament dynamics on nucleosomal versus naked DNA to quantify the nucleosome-peeling step and its ATP dependence.
