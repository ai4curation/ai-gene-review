    label: site of double-strand break
  - id: GO:0005654
    label: nucleoplasm
- description: Binds single-stranded DNA to nucleate assembly of the RAD51 recombinase filament, the first committed step of the presynaptic filament that carries out homology search and strand exchange.
  supported_by:
