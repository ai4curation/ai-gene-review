id: Q06609
gene_symbol: RAD51
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RAD51 is the central eukaryotic recombinase of homologous recombination (HR), the ortholog of bacterial RecA and yeast Rad51. It binds single-stranded DNA in an ATP-dependent manner to assemble a helical nucleoprotein (presynaptic) filament on the 3'' single-stranded overhangs generated by end resection, after being loaded onto RPA-coated ssDNA by BRCA2/PALB2 and the RAD51 paralog mediators (the BCDX2 and CX3 complexes; RAD51B, RAD51C, RAD51D, XRCC2, XRCC3). The active ATP-bound filament performs homology search within duplex DNA and catalyzes DNA strand invasion and strand exchange, base-pairing the invading strand with the homologous template to form a displacement loop (D-loop). RAD51 is a self-inactivating, DNA-dependent ATPase: ATP binding and hydrolysis, modulated by cofactors such as Ca2+, control filament assembly, stability and turnover. Through this recombinase activity RAD51 is essential for error-free repair of DNA double-strand breaks by HR, for protection and restart of stalled or damaged replication forks, and for interstrand crosslink repair; it also acts at chromatin and can peel nucleosomal DNA at break sites. Additional context- specific roles include meiotic recombination (as a non-catalytic accessory to the meiosis-specific recombinase DMC1), recombination-based telomere maintenance, and maintenance of mitochondrial DNA copy number under oxidative stress. RAD51 is nuclear and concentrates in damage-induced foci at sites of double-strand breaks. A dominant- negative RAD51 variant causes a Fanconi anemia-like disorder (Fanconi anemia complementation group R, FANCR).'
