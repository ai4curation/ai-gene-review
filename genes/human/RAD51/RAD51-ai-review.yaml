core_functions:
- description: Assembles into an ATP-dependent nucleoprotein (presynaptic) filament on single-stranded DNA and catalyzes homology search, DNA strand invasion and strand exchange to form a D-loop — the core recombinase activity that repairs double-strand breaks by homologous recombination, protects/restarts stalled replication forks, and contributes to interstrand crosslink repair.
  supported_by:
  - reference_id: PMID:8929543
    supporting_text: hRad51 promotes homologous pairing and strand exchange reactions in vitro.
  - reference_id: PMID:27694622
    supporting_text: displacing the homologous strand to form a displacement loop (D-loop)
  molecular_function:
    id: GO:0000150
    label: DNA strand exchange activity
  directly_involved_in:
  - id: GO:0000724
    label: double-strand break repair via homologous recombination
  - id: GO:0006310
    label: DNA recombination
  - id: GO:0042148
    label: DNA strand invasion
  - id: GO:0031297
    label: replication fork processing
  - id: GO:0036297
