    label: site of double-strand break
- description: Binds and hydrolyzes ATP as a self-inactivating DNA-dependent ATPase; the nucleotide state governs assembly, stability and turnover of the nucleoprotein filament and thereby regulates strand-exchange activity.
  supported_by:
