gene_symbol: MCTS1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: MCTS1 (Malignant T-cell-amplified sequence 1, MCT-1) is a cytoplasmic
  PUA-domain RNA-binding protein that, together with its obligate partner DENR, forms
  the MCTS1-DENR heterodimer, a non-canonical translation factor equivalent to eIF2D
  (Ligatin) split into two polypeptides (MCTS1 corresponds to the N-terminal half and
  DENR to the C-terminal SUI1 half). MCTS1 contributes the PUA domain that engages
  mRNA/the cap region and binds the 40S small ribosomal subunit, and recruits DENR.
  The complex acts at the post-termination 40S ribosome to promote translation reinitiation,
  particularly after short upstream ORFs (uORFs), and to recycle/recover post-termination
  40S subunits by promoting release of deacylated tRNA and mRNA after ABCE1-mediated
  ribosome splitting; it also delivers initiator tRNA to the 40S P-site in an eIF2-independent
  manner when the start codon is positioned in the P-site (as on HCV-like IRESs). MCTS1-DENR-dependent
  reinitiation governs translation of a specific set of mRNAs (including JAK2) and is
  required for IFN-gamma immunity. MCTS1 was originally identified as an oncogene amplified
  in T-cell lymphoma.
