    non-canonical factor), binds the 40S small ribosomal subunit and (via its PUA domain)
    mRNA/the cap region, recruits DENR, and delivers initiator tRNA to the 40S P-site
    in an eIF2-independent manner to drive translation reinitiation after short uORFs.
