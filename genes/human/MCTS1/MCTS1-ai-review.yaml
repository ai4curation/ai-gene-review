suggested_questions:
- question: Does MCTS1 directly bind the m7G cap, or is its association with the cap
    complex indirect (via eIF4 components), and how does the PUA domain contribute?
- question: Which features of target mRNAs (uORF architecture, 5' UTR structure) determine
    MCTS1-DENR dependence, and how does this relate to MCTS1's oncogenic activity?
suggested_experiments:
- description: Cross-linking/CLIP of MCTS1 to define its direct RNA-binding sites genome-wide
    and test whether it contacts the cap-proximal region directly.
- description: Reconstituted 40S P-site tRNA delivery and recycling assays with purified
    MCTS1, DENR and ABCE1 to dissect MCTS1's specific contribution to each step.
