core_functions:
- description: >-
    Acts as a dedicated chaperone/assembly factor for succinate dehydrogenase (respiratory
    Complex II): binds the flavoprotein subunit SDHA and, together with a dicarboxylate
    cofactor, remodels and orients its flavin and capping domains to license covalent
    attachment of FAD (flavinylation) to SDHA. This maturation of SDHA is required for
    assembly of a functional Complex II. SDHAF2 has no catalytic activity of its own and is
    not a subunit of the mature enzyme.
  molecular_function:
    id: GO:0044183
    label: protein folding chaperone
  directly_involved_in:
