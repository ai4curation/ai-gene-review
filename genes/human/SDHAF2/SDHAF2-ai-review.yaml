- id: PMID:19628817
  title: SDH5, a gene required for flavination of succinate dehydrogenase, is mutated
    in paraganglioma.
  findings:
  - statement: >-
      Both yeast and human Sdh5 (SDHAF2) interact with the SDH catalytic subunit and are
      required for SDH-dependent respiration and for flavination (covalent FAD incorporation)
      of the SDHA/Sdh1 flavoprotein subunit; germline loss-of-function mutations cause
      hereditary paraganglioma.
    supporting_text: >-
      Sdh5 is required for SDH-dependent respiration and for Sdh1 flavination (incorporation
      of the flavin adenine dinucleotide cofactor)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Founding paper establishing SDHAF2/SDH5 as the SDH assembly factor required for SDHA
      flavinylation and as the PPGL2 paraganglioma gene. Cached entry is abstract-only.
- id: PMID:23983127
  title: Succinate dehydrogenase 5 (SDH5) regulates glycogen synthase kinase 3β-β-catenin-mediated
    lung cancer metastasis.
  findings:
  - statement: >-
      Loss of SDH5 initiates EMT and lung-cancer metastasis; SDH5 interacts with GSK-3β,
      facilitating its Ser-9 dephosphorylation/activation and thereby negatively regulating
      Wnt/β-catenin signaling.
    supporting_text: >-
      The physical interaction between SDH5 and GSK-3β facilitates GSK-3β activation through
      Ser-9 dephosphorylation
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text available. Basis for the MGI regulatory annotations (EMT, Wnt, protein
      dephosphorylation). Describes a cancer-context moonlighting role, not the core
      mitochondrial assembly function.
