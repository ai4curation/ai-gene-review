    review_notes: Establishes FBXL22 as a cardiac SCF substrate receptor with substrates ACTN2 and FLNC, Z-disc localization, SKP1/CUL1 interaction and an in vivo contractile-function requirement. Source of the Z-disc, substrate-interaction, ligase-activity (MGI IDA) and proteasomal-degradation annotations; abstract-only in cache but functional claims are explicit.
