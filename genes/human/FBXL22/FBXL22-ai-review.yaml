    summary: Direct experimental evidence (MGI IDA) that FBXL22 drives proteasome-dependent degradation of sarcomeric substrates; FBXL22 overexpression degrades ACTN2/FLNC dose-dependently and MG-132 attenuates this.
    action: ACCEPT
    reason: Directly supported core process; the more specific GO:0031146 (SCF-dependent) also applies, but this proteasome-mediated catabolic process annotation is correct and experimentally grounded.
