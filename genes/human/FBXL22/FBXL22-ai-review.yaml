suggested_questions:
- question: Beyond ACTN2 and FLNC, what is the full FBXL22 substrate repertoire at the cardiac Z-disc, and how is its activity regulated during cardiac stress and remodeling?
- question: How do human FBXL22 loss-of-function or regulatory variants relate to cardiomyopathy, given the in vivo contractile phenotypes observed on FBXL22 depletion?
suggested_experiments:
- description: Reconstitute SCF-FBXL22 (SKP1-CUL1-RBX1-FBXL22) in vitro and assay ubiquitination of ACTN2 and FLNC, mapping ubiquitin-acceptor sites and testing an F-box- or LRR-binding-deficient mutant.
- description: Generate cardiac-specific FBXL22 knockout and gain-of-function models with quantitative ubiquitinome/proteome profiling of the Z-disc proteome to define substrates and link substrate accumulation to contractile dysfunction.
