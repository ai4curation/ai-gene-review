suggested_questions:
- question: Beyond ACTN2 and FLNC, what is the full FBXL22 substrate repertoire at the Z-disc, and how is its activity regulated during cardiac stress/remodeling versus skeletal-muscle atrophy?
- question: Does the strong, transient induction of FBXL22 during denervation/neurogenic atrophy translate into increased sarcomeric protein degradation, given that E3-ligase mRNA does not always track protein abundance or bulk proteolysis?
- question: How do human FBXL22 loss-of-function or regulatory variants relate to cardiomyopathy and atrial fibrillation, given the in vivo contractile phenotypes observed on FBXL22 depletion in model organisms?
suggested_experiments:
- description: Reconstitute SCF-FBXL22 (SKP1-CUL1-RBX1-FBXL22) in vitro and assay ubiquitination of ACTN2 and FLNC, mapping ubiquitin-acceptor sites and testing an F-box- or LRR-binding-deficient mutant.
- description: Generate cardiac- and skeletal-muscle-specific FBXL22 knockout and gain-of-function models with quantitative ubiquitinome/proteome profiling of the Z-disc proteome, linking substrate accumulation to contractile dysfunction and to denervation-induced atrophy, and testing isoform-specific effects.
