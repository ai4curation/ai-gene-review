core_functions:
- description: Cardiac-enriched substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase that localizes to the sarcomeric Z-disc and promotes the proteasome-dependent ubiquitination and degradation of the Z-disc proteins alpha-actinin-2 (ACTN2) and filamin-C (FLNC), thereby controlling sarcomeric protein turnover and maintaining cardiac contractile function.
