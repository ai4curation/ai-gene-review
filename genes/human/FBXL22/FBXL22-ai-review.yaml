taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL22 (F-box and leucine-rich protein 22) is a cardiac-enriched member of the
  FBXL subfamily of F-box proteins, with an N-terminal F-box domain and a
  C-terminal leucine-rich repeat (LRR) region. It serves as the
  substrate-recognition subunit of a Cullin-RING (SCF; SKP1-CUL1-F-box) E3
  ubiquitin ligase, docking onto SKP1/CUL1 through its F-box domain and recruiting
  substrates via its LRRs. FBXL22 localizes to the sarcomeric Z-disc of
  cardiomyocytes, where it binds and promotes the proteasome-dependent degradation
  of the Z-disc sarcomeric proteins alpha-actinin-2 (ACTN2) and filamin-C (FLNC),
  thereby controlling sarcomeric protein turnover. Loss of FBXL22 causes
  accumulation of alpha-actinin and is associated with impaired contractile
  function and cardiomyopathy in vivo, making it important for maintenance of
  normal cardiac contractility.
