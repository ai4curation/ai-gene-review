  findings:
  - statement: FBXL22 is a cardiac-enriched, Z-disc-localized F-box protein that interacts with SKP1 and CUL1 and promotes the proteasome-dependent degradation of the sarcomeric proteins alpha-actinin (ACTN2) and filamin C (FLNC); FBXL22 knockdown causes alpha-actinin accumulation, impaired contractile function and cardiomyopathy in vivo.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
