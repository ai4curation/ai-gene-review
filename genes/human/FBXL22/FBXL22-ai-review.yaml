description: >-
  FBXL22 (F-box and leucine-rich protein 22) is a cardiac-enriched member of the
  FBXL subfamily of F-box proteins, with an N-terminal F-box domain and a
  C-terminal leucine-rich repeat (LRR) region. It serves as the
  substrate-recognition subunit of a Cullin-RING (SCF; SKP1-CUL1-F-box) E3
  ubiquitin ligase, docking onto SKP1/CUL1 through its F-box domain and recruiting
  substrates via its LRRs. FBXL22 is enriched in striated (cardiac and skeletal)
  muscle and localizes to the sarcomeric Z-disc, where it binds and promotes the
  proteasome-dependent polyubiquitination and degradation of the Z-disc sarcomeric
  proteins alpha-actinin-2 (ACTN2) and filamin-C (FLNC), thereby controlling
  sarcomeric/cytoskeletal protein turnover and quality control. Loss of FBXL22
  (e.g. in zebrafish) causes accumulation of alpha-actinin and progressive
  reduction in cardiac contractility, and FBXL22 is essential for maintenance of
  normal contractile function in vivo. Beyond steady-state cardiac maintenance,
  FBXL22 participates in sarcomere remodeling programs: in skeletal muscle it is an
  atrogene-like factor strongly and transiently induced during neurogenic atrophy
  (denervation, ~15-fold within days) and during myogenic differentiation, with
  isoform-dependent effects on muscle mass and myopathic phenotypes upon
  overexpression; and in zebrafish heart regeneration its expression is regulated
  by AP-1-dependent chromatin accessibility and it promotes sarcomere disassembly.
  Most mechanistic substrate/localization/contractility evidence derives from
  model organisms (zebrafish, mouse) and reviews rather than direct human assays.
