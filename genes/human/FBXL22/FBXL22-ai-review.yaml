  evidence_type: IDA
  original_reference_id: PMID:22972877
  qualifier: enables
  review:
    summary: MGI IDA annotation of ubiquitin protein ligase activity, based on FBXL22 promoting ubiquitination/degradation of ACTN2 and FLNC. However, FBXL22 is the SCF substrate-recognition subunit, not the catalytic RING; the ligase chemistry is contributed by RBX1/E2. The more accurate molecular function for the F-box receptor is ubiquitin-like ligase-substrate adaptor activity.
    action: MODIFY
    reason: FBXL22 is the substrate-recognition adaptor of the SCF complex, not the catalytic ubiquitin ligase; catalysis resides in RBX1/E2. The experimentally observed "ligase activity" reflects FBXL22 conferring substrate specificity on the SCF. Replace with the adaptor activity term.
