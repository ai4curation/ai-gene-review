- id: file:human/FBXL22/FBXL22-deep-research-falcon.md
  title: Falcon deep research report for human FBXL22
  findings:
  - statement: FBXL22 is a striated-muscle-enriched SCF (Cullin-1) substrate adaptor at the Z-disc that polyubiquitinates ACTN2 and FLNC for proteasome-mediated clearance.
    supporting_text: "Fbxl22 **binds ACTN2 and FLNC** and that Fbxl22-containing CRLs **poly-ubiquitylate** these proteins, promoting **proteasome-mediated clearance**"
  - statement: FBXL22 is a substrate-selection adaptor, not a small-molecule enzyme; it selects substrates for ubiquitylation by the SCF machinery.
    supporting_text: "FBXL22 is **not an enzyme that catalyzes a small-molecule reaction**; rather, its primary biochemical role is to **select specific protein substrates** for **ubiquitylation** (typically poly-ubiquitylation) by the SCF E3 ligase machinery, which can route substrates toward **proteasomal degradation** and/or alter their cellular behavior"
  - statement: Loss of fbxl22 in zebrafish causes ACTN2 accumulation and progressive reduction of cardiac contractility, consistent with impaired sarcomeric protein turnover.
    supporting_text: "Fbxl22 loss-of-function in zebrafish leads to **ACTN2 accumulation** and **progressive reduction of cardiac contractility**, consistent with impaired sarcomeric protein turnover"
  - statement: In skeletal muscle FBXL22 is an atrogene-like factor strongly and transiently induced after denervation (~15-fold at day 3, returning to baseline by day 7).
    supporting_text: "strong, stimulus-timed induction of Fbxl22 in neurogenic atrophy: **~15-fold mRNA increase at day 3 after denervation** in mouse gastrocnemius complex, returning to baseline by day 7"
  - statement: In zebrafish heart regeneration fbxl22 expression is regulated by AP-1-dependent chromatin accessibility and it regulates sarcomere disassembly.
    supporting_text: "AP-1 blockade decreases chromatin accessibility at the **fbxl22 locus**, and the study explicitly describes fbxl22 as regulating **sarcomere disassembly**, a key step for cardiomyocyte regenerative behavior"
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: Falcon (Edison Scientific) deep research synthesis. Corroborates the core cardiac SCF-FBXL22/ACTN2/FLNC/Z-disc biology (consistent with PMID:22972877) and adds the skeletal-muscle atrophy/denervation atrogene role (Hughes et al. 2023; Blondelle et al. 2020 review), the AP-1-regulated sarcomere-disassembly role in zebrafish heart regeneration (Beisaw et al. 2020), and the caveat that most substrate/contractility evidence is from model organisms and reviews rather than direct human assays. Primary leads cite DOIs not PMIDs and are largely reviews/model-organism studies not in the local cache; treated as enriching leads, not overriding the experimental curation.
