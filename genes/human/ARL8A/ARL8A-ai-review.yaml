- term:
    id: GO:0008089
    label: anterograde axonal transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Anterograde axonal transport is plausible for ARL8-family endolysosomal transport but is a neuron-specific manifestation of the broader lysosome/endolysosome motility role.
    action: KEEP_AS_NON_CORE
    reason: ARL8-dependent endolysosome movement has strong support, including kinesin-linked anterograde movement and neuronal axonal contexts. For human ARL8A in the PN review, however, the core function is lysosome/endolysosome localization and motility; axonal anterograde transport should be retained as a specialized neuronal context rather than the central function.
    additional_reference_ids:
    - PMID:35314674
    - PMID:25898167
    supported_by:
    - &id003
      reference_id: PMID:25898167
      supporting_text: This initiates a chain of interactions that promotes the kinesin-dependent movement of lysosomes toward the plus ends of microtubules
    - &id004
      reference_id: PMID:35314674
      supporting_text: ARL8 can thus regulate both anterograde and retrograde endolysosome transport through interactions with kinesin and dynein-dynactin motors
    - &id005
      reference_id: PMID:35314674
      supporting_text: toward the distal axon in neurons
