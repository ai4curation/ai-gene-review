suggested_questions:
- question: Should ARL8A receive a direct GO:0061906 autophagosome localization annotation, or should the PN projection remain limited to lysosome/endolysosome positioning until ARL8A-dependent autophagosome movement is shown directly?
  experts:
  - GO autophagy editors
  - GO proteostasis PN curators
- question: Should broad ARL8A protein binding annotations be replaced by a more specific curator model of small-GTPase effector recruitment for lysosome/endolysosome transport?
  experts:
  - GO molecular function editors
  - UniProt curators
- question: Does ARL8A contribute non-redundantly to BORC-ARL8-HOPS-dependent lysosomal cholesterol egress (NPC2 trafficking) and to endolysosome fusion that limits exosome secretion, or are these roles fully covered by ARL8B in cells expressing both paralogs?
  experts:
  - GO lysosome/membrane trafficking curators
  - lysosomal lipid trafficking experts
suggested_experiments:
- experiment_type: ARL8A-specific autophagosome positioning assay
  hypothesis: ARL8A regulates lysosome/endolysosome positioning but does not directly position autophagosomes independently of ARL8B or lysosome movement.
  description: Use ARL8A knockout, ARL8B knockout, double knockout, and matched rescue cells expressing endogenous-level ARL8A to image LC3-positive autophagosomes and LAMP1-positive lysosomes during basal and induced autophagy. Quantify autophagosome movement, lysosome movement, autophagosome-lysosome contacts, and cargo degradation to separate direct autophagosome localization from lysosome positioning effects.
- experiment_type: Effector-binding separation of function
  hypothesis: ARL8A effector binding to PLEKHM1/HOPS, SKIP, and RUFY3/RUFY4 separates lysosome localization, anterograde movement, retrograde movement, and autophagic cargo-delivery phenotypes.
  description: Compare wild-type ARL8A and effector-binding-defective mutants in ARL8A/ARL8B-deficient cells, measuring BORC-dependent lysosome recruitment, RUFY3/RUFY4-dependent dynein-dynactin coupling, SKIP/kinesin-dependent peripheral movement, and PLEKHM1/HOPS-dependent delivery of endocytic and autophagic cargo to lysosomes.
- experiment_type: ARL8A-specific cholesterol egress and exosome secretion assay
  hypothesis: ARL8A contributes to BORC-ARL8-HOPS-dependent lysosomal cholesterol egress and to endolysosome fusion that restrains exosome secretion, with partial redundancy with ARL8B.
  description: Using ARL8A single-knockout, ARL8B single-knockout, double-knockout, and matched rescue HeLa cells, quantify lysosomal free-cholesterol accumulation (filipin), NPC2 lysosomal association versus secretion, and exosome output (CD63/CD9 nanoparticle tracking and immunoblot), to determine the non-redundant contribution of ARL8A to the BORC-ARL8-HOPS cholesterol-egress and endolysosome-fusion programs.
