    label: lysosomal membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: ARL8A lysosomal membrane localization is a core, well-supported location.
    action: ACCEPT
    reason: Multiple evidence streams converge on ARL8A/ARL8 proteins as lysosome-associated small GTPases. The original ARL8 study directly showed ARL8A/ARL8B lysosome localization and lysosome motility effects, BORC work places ARL8 recruitment at lysosomal membranes, and lysosomal membrane proteomics is consistent with this localization.
