core_functions:
- description: ARL8A is a lysosomal/late-endosomal small GTPase that regulates endolysosome positioning and microtubule-based motility through BORC-dependent membrane recruitment and GTP-dependent effector interactions. This core activity supports lysosome localization, endolysosomal cargo delivery to lysosomes, and lysosome-related vesicle transport in specialized cellular contexts.
  molecular_function:
    id: GO:0003924
    label: GTPase activity
  directly_involved_in:
  - id: GO:0032418
    label: lysosome localization
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  - id: GO:0031902
    label: late endosome membrane
  supported_by:
  - reference_id: PMID:16537643
    supporting_text: Arl8a and Arl8b ... localise to lysosomes in mammalian cells
  - reference_id: PMID:16537643
    supporting_text: Overexpression of Arl8a or Arl8b results in a microtubule-dependent redistribution of lysosomes towards the cell periphery
  - reference_id: PMID:25898167
    supporting_text: BORC associates peripherally with the lysosomal membrane, where it functions to recruit the small GTPase Arl8
  - reference_id: PMID:28325809
    supporting_text: Arl8b binding to PLEKHM1 is required for its function in delivery and, therefore, degradation of endocytic and autophagic cargo in lysosomes
  - reference_id: PMID:35314674
    supporting_text: RUFY3 and RUFY4 are ARL8 effectors that promote coupling of endolysosomes to dynein-dynactin
