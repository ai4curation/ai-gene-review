- id: PMID:27851960
  title: BORC Functions Upstream of Kinesins 1 and 3 to Coordinate Regional Movement
    of Lysosomes along Different Microtubule Tracks.
  full_text_unavailable: true
  findings:
  - statement: BORC and ARL8 act upstream of both kinesin-1 (KIF5B) and kinesin-3
      (KIF1A/KIF1Bbeta), which move lysosomes on distinct microtubule tracks (KIF5B
      on central acetylated tubulin, KIF1A/KIF1Bbeta on peripheral tyrosinated tubulin);
      in an ARL8B-knockout background, siRNA against ARL8A removes the residual ability
      of kinesin constructs to disperse lysosomes, indicating ARL8A itself contributes
      to BORC-dependent anterograde lysosome transport.
- id: PMID:35653304
  title: BORC-ARL8-HOPS ensemble is required for lysosomal cholesterol egress through
    NPC2.
  full_text_unavailable: true
  findings:
  - statement: The BORC-ARL8-HOPS ensemble is required for egress of free cholesterol
      from lysosomes; depletion of BORC, ARL8, or HOPS causes lysosomal free-cholesterol
      accumulation, decreased NPC2 association with lysosomes with increased NPC2
      secretion, and increased lysosomal degradation of the CI-mannose-6-phosphate
      receptor.
- id: PMID:37213076
  title: Inhibition of endolysosome fusion increases exosome secretion.
  full_text_unavailable: true
  findings:
  - statement: Impairing the BORC-ARL8-HOPS pathway blocks fusion of multivesicular
      endosomes with lysosomes and increases exosome secretion; the study used HeLa
      ARL8A/ARL8B double-knockout cells, indicating an ARL8-family requirement for
      endolysosome fusion that determines exosome output.
- id: PMID:38296963
  title: DENND6A links Arl8b to a Rab34/RILP/dynein complex, regulating lysosomal
    positioning and autophagy.
  full_text_unavailable: true
  findings:
  - statement: DENND6A is an ARL8B effector and GEF that activates Rab34 to recruit
      a RILP/dynein-dynactin complex, driving retrograde (juxtanuclear) lysosome transport
      and supporting autophagic flux; double knockdown of ARL8A and ARL8B reduces
      DENND6A-dependent phenotypes, consistent with an ARL8-family contribution.
- id: PMID:38128568
  title: Biallelic BORCS8 variants cause an infantile-onset neurodegenerative disorder
    with altered lysosome dynamics.
  full_text_unavailable: true
  findings:
  - statement: Biallelic loss-of-function variants in the BORC subunit BORCS8 (which
      acts upstream of ARL8 to recruit kinesin motors for anterograde lysosome transport)
      cause a severe early-infantile neurodegenerative disorder in five children;
      patient alleles impair BORC assembly and peripheral lysosome distribution, validating
      the BORC-ARL8-kinesin axis physiologically in humans.
- id: PMID:39217195
  title: Altered expression of vesicular trafficking machinery in prostate cancer
    affects lysosomal dynamics and provides insight into the underlying biology and
    disease progression.
  full_text_unavailable: true
  findings:
  - statement: In prostate cancer cohorts, altered expression of lysosomal trafficking
      machinery including ARL8A was examined; ARL8A expression showed only a non-significant
      association with overall survival (log-rank P=0.1471, HR 1.927, 95% CI 0.6692-5.547).
