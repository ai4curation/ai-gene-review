suggested_questions:
- question: What are the physiological substrates recognized by FBXL8, given that it lacks the leucine-rich repeats typical of FBXL proteins and uses a different substrate-binding region?
- question: Are the binary-interactome partners ALAS1 and PICK1 genuine FBXL8 substrates, and under what conditions are they degraded?
suggested_experiments:
- description: Perform affinity purification-mass spectrometry of tagged FBXL8 (stabilized with proteasome and neddylation inhibitors) to identify candidate substrates enriched relative to an F-box-deletion mutant unable to assemble into SCF.
- description: Test ubiquitination and degradation of candidate substrates (e.g. ALAS1, PICK1) upon FBXL8 overexpression and CRISPR knockout, using reconstituted SCF-FBXL8 in vitro and quantitative proteomics in cells.
