description: >-
  FBXL8 (F-box/LRR-repeat protein 8, FBL8) is a member of the FBXL subfamily of
  F-box proteins. It has an N-terminal F-box domain through which it docks onto
  the SKP1 adaptor and, via SKP1, onto CUL1 and the catalytic RING subunit RBX1,
  assembling a Cullin-RING (SCF) E3 ubiquitin ligase in which the F-box protein
  serves as the substrate-recognition subunit. Despite the "LRR" in its name,
  UniProt notes that FBXL8 does not actually contain leucine-rich repeats, so its
  substrate-binding region differs from canonical FBXL proteins. FBXL8 is broadly
  expressed at low levels with no strong tissue specificity. It remains poorly
  characterized: its physiological substrates and biological roles have not been
  firmly established experimentally, and functional inference rests largely on its
  F-box domain, its documented SKP1/CUL1 interaction, and family/domain homology.
