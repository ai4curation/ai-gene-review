core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase complex; uses its F-box domain to assemble with SKP1/CUL1/RBX1 and recruit substrates for ubiquitination and proteasomal degradation. Lacks canonical leucine-rich repeats, and its specific physiological substrates remain to be established experimentally.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  locations: []
