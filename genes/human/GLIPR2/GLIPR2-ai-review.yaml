  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLIPR2, also called GAPR-1, is a compact CAP-domain protein that lacks a
  signal peptide and associates with lipid-enriched microdomains on the
  cytosolic leaflet of Golgi membranes through N-terminal myristoylation,
  electrostatic contacts, and protein interactions. It forms structurally
  dynamic homodimers and binds the BARA region of BECN1 and the ATG14-containing
  class III phosphatidylinositol 3-kinase complex I. GLIPR2 reduces complex
  association with membranes and directly inhibits its lipid kinase activity,
  thereby restraining basal macroautophagy; deletion increases autophagic flux
  in human cells and mouse tissues. In renal and hepatocellular-carcinoma cell
  models, elevated GLIPR2 also promotes ERK1/2-dependent epithelial-to-mesenchymal
  transition and migration, while a separate study implicates it in TLR4-induced
  type-I-interferon signaling. These context-dependent signaling phenotypes have
  not yet been mechanistically connected to its core autophagy-inhibitory
  activity.
