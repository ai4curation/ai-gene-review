- id: file:human/GLIPR2/GLIPR2-deep-research-manual.md
  title: Manual literature synthesis for human GLIPR2
  findings: []
core_functions:
- description: >-
    At the cytosolic Golgi membrane, myristoylated and dynamically oligomeric
    GLIPR2 binds the BECN1-ATG14-containing class III phosphatidylinositol
    3-kinase complex I, lowers its membrane association and lipid kinase activity,
    and thereby restrains basal macroautophagy.
  molecular_function:
    id: GO:0141039
    label: phosphatidylinositol 3-kinase inhibitor activity
  directly_involved_in:
  - id: GO:0016242
    label: negative regulation of macroautophagy
  locations:
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: PMID:33222586
    supporting_text: These findings demonstrate that GLIPR2 directly inactivates the PtdIns3K-C1 complex.
    reference_section_type: RESULTS
  - reference_id: PMID:33222586
    supporting_text: Thus, using four independent assays, we demonstrate that GLIPR2 negatively regulates autophagy in cultured cells.
    reference_section_type: RESULTS
proposed_new_terms: []
suggested_questions:
- question: >-
    At which endogenous membrane compartment does GLIPR2 inhibit PtdIns3K-C1,
    and does cytosolic Golgi tethering of BECN1 cause the inhibition?
  experts:
  - autophagy and class III PI3K structural biologists
  - Golgi membrane-trafficking specialists
- question: >-
    Does GLIPR2 inhibit the UVRAG-containing PtdIns3K-C2 complex, and how does it
    compete or cooperate with GORASP2 at the BECN1 BARA domain?
  experts:
  - autophagy-complex biochemists
- question: >-
    Are the ERK/EMT and TLR4/type-I-interferon phenotypes consequences of
    BECN1/PtdIns3K-C1 inhibition, or separable GLIPR2 activities?
  experts:
  - renal and cancer cell-signaling biologists
  - innate-immunity and autophagy specialists
- question: >-
    Do lipid-, zinc-, or copper-regulated GLIPR2 oligomers and amyloid-like
    assemblies form in living cells and contribute to normal function?
  experts:
  - CAP-domain structural biochemists
suggested_experiments:
- description: >-
    Reconstitute GLIPR2-null human cells at endogenous abundance with wild-type,
    G2A nonmyristoylated, BECN1-groove pentad, and dimer-interface mutants; measure
    PtdIns3K-C1 binding, membrane association, PtdIns3P, WIPI2, autophagic flux,
    and Golgi morphology in parallel.
  experiment_type: CRISPR rescue and separation-of-function analysis
  hypothesis: >-
    Golgi membrane anchoring and the BECN1-binding groove are independently
    required for GLIPR2 to inhibit PtdIns3K-C1, while a specific oligomeric state
    gates access to BECN1.
- description: >-
    Reconstitute purified PtdIns3K-C1 and PtdIns3K-C2 on Golgi-like membranes with
    GLIPR2 and GORASP2, then combine lipid-kinase assays with cryo-EM or HDX-MS and
    membrane-flotation measurements.
  experiment_type: comparative complex biochemistry and structural analysis
  hypothesis: >-
    GLIPR2 inhibits one or both class III PI3K complexes by restricting BECN1
    BARA-domain membrane engagement, with GORASP2 providing complex-specific
    competition.
- description: >-
    In primary human renal epithelial cells and monocytes, compare GLIPR2
    knockout and separation-of-function rescue during hypoxia or TLR4 stimulation,
    with autophagy epistasis using BECN1 mutants and selective class III PI3K
    perturbations.
  experiment_type: pathway epistasis in physiologically relevant human cells
  hypothesis: >-
    The ERK/EMT and interferon phenotypes depend on the same BECN1/PtdIns3K-C1
    inhibitory activity that restrains basal autophagy.
knowledge_gaps:
- gap_statement: >-
    The endogenous site and complete molecular mechanism of PtdIns3K-C1
    inhibition by GLIPR2 remain unresolved.
  boundary: >-
    Purified GLIPR2 binds and inhibits PtdIns3K-C1 and lowers its liposome
    association, while cellular knockout increases PtdIns3P and autophagic flux;
    however, it is unknown where endogenous inhibition occurs and whether Golgi
    sequestration or dispersion is causal.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Resolving compartment and structural state is necessary to distinguish direct
    membrane competition, BECN1 sequestration, and allosteric inhibition.
  resolution: >-
    Endogenous-level localization mutants, proximity labeling, live-cell PtdIns3P
    reporters, and structures of GLIPR2-bound PtdIns3K-C1 should resolve the
    mechanism.
  provenance:
  - reference_id: PMID:33222586
    supporting_text: it is not yet known where in the cell endogenous GLIPR2 acts to inhibit PtdIns3K activity
- gap_statement: >-
    It is unknown whether GLIPR2 also inhibits PtdIns3K-C2 and how GORASP2
    competition changes complex specificity.
  boundary: >-
    Direct biochemical inhibition has been shown only for ATG14-containing
    PtdIns3K-C1, while the BECN1-binding surface is also regulatory in PtdIns3K-C2.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    PtdIns3K-C2 controls autophagosome maturation and endocytic pathways, so
    inhibition would materially broaden GLIPR2's core function.
  resolution: >-
    Purified-complex kinase, membrane-association, and binding assays should test
    PtdIns3K-C2 directly with and without GORASP2.
  provenance:
  - reference_id: PMID:33222586
    supporting_text: additional studies are needed to determine whether GLIPR2, similar to HIV Nef and RUBCN, also inhibits PtdIns3K-C2 activity.
- gap_statement: >-
    The relationship between core autophagy inhibition and the reported EMT/ERK
    and TLR4/type-I-interferon phenotypes is unknown.
  boundary: >-
    Each phenotype is experimentally supported, but existing studies do not use
    GLIPR2 mutants that separate BECN1/PtdIns3K-C1 inhibition from membrane,
    dimerization, or TMED7 interactions.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: >-
    Mechanistic unification would determine whether these are physiological
    outputs of one core activity or distinct context-specific functions.
  resolution: >-
    Autophagy epistasis and endogenous-level separation-of-function rescues in
    renal epithelial, HCC, and monocyte models can distinguish the alternatives.
  provenance:
  - reference_id: PMID:33222586
    supporting_text: It is thus possible that GLIPR2-mediated inhibition of BECN1 and/or autophagy may regulate EMT and/or enhanced interferon signaling
- gap_statement: >-
    The physiological relevance of GLIPR2's lipid- and metal-regulated
    amyloid-like assemblies is unknown.
  boundary: >-
    Purified GLIPR2 forms oligomers and fibrils with anionic lipids, heparin,
    zinc, or copper, but no study has demonstrated these assemblies in normal
    cells or linked them causally to autophagy inhibition.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    The assemblies could be regulatory CAP-domain states or nonphysiological
    consequences of high-concentration in vitro conditions.
  resolution: >-
    Conformation-specific probes, endogenous crosslinking, and live-cell assembly
    measurements under controlled metal and membrane-lipid perturbations are
    required.
  provenance:
  - reference_id: PMID:30700571
    supporting_text: Whether these pathologies are related to the amyloidogenic properties of GAPR-1, however, remains to be investigated.
