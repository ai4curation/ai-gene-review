    supporting_text: Taken together, these data reveal increased autophagic flux and PtdIns3K-C1 activity in glipr2-/-mice, providing evidence that GLIPR2 functions as a negative regulator of autophagy in vivo.
    reference_section_type: RESULTS
  reference_review:
