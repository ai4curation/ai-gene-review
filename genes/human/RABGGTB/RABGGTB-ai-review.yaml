id: P53611
gene_symbol: RABGGTB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RABGGTB is the catalytic beta subunit of Rab geranylgeranyltransferase
  (RabGGTase / geranylgeranyltransferase type II, GGTase-II; EC 2.5.1.60). Paired
  with the alpha subunit RABGGTA it forms the catalytic heterodimer ("component
  B"), which transfers geranylgeranyl groups from geranylgeranyl diphosphate
  (GGpp) onto both C-terminal cysteines of Rab-family small GTPases bearing
  -XXCC, -XCXC or -CCXX motifs (e.g. RAB1A, RAB3A, RAB5A, RAB7A). RabGGTase does
  not bind Rab substrates directly; a Rab escort protein (REP1/CHM or REP2/CHML,
  "component A") presents the unprenylated Rab to the enzyme. Double
  geranylgeranylation anchors Rab GTPases to intracellular membranes, enabling
  their roles in vesicular trafficking. The subunit adopts an alpha-alpha barrel
  built from six protein-prenyltransferase (PFTB) repeats and carries a catalytic
  zinc ion. RABGGTB also serves as the shared catalytic beta subunit of
  geranylgeranyltransferase type III (GGTase-III), formed with the orphan alpha
  subunit PTAR1; GGTase-III geranylgeranylates the Golgi v-SNARE YKT6 (at Cys194,
  producing a doubly prenylated, farnesyl-geranylgeranyl YKT6 required for Golgi
  SNARE complex assembly) and has been reported to geranylgeranylate the ubiquitin
  ligase substrate-recognition subunit FBXL2.
