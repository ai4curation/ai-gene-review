- id: PMID:7991565
  title: Rab geranylgeranyl transferase catalyzes the geranylgeranylation of adjacent
    cysteines in the small GTPases Rab1A, Rab3A, and Rab5A.
  findings:
  - statement: >-
      Recombinant Rab geranylgeranyltransferase together with Rab escort protein
      and [3H]geranylgeranyl pyrophosphate geranylgeranylates both C-terminal
      adjacent cysteines of Rab1A (-XXCC), Rab3A (-XCXC) and Rab5A (-CCXX),
      demonstrating the core catalytic activity of the enzyme.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Direct biochemical demonstration (mass spectrometry of tryptic peptides) of
      di-geranylgeranylation of Rab substrates by RabGGTase; the EXP evidence
      underpinning the enzyme's molecular function. Abstract-only in cache but
      PMID/title verified and this is the reference cited by UniProt for the
      catalytic activity / EC 2.5.1.60.
- id: PMID:8380507
  title: 'Retinal degeneration in choroideremia: deficiency of rab geranylgeranyl
    transferase.'
  findings:
  - statement: >-
      Choroideremia lymphoblasts show a marked deficiency in component A (the Rab
      escort protein REP1/CHM), but not component B (the RABGGTA/RABGGTB catalytic
      dimer), of Rab geranylgeranyl transferase.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      This paper is about component A (REP1/CHM), the choroideremia disease gene,
      and explicitly finds that component B (which contains RABGGTB) is NOT
      deficient. It is therefore the wrong reference to attribute "visual
      perception" and "protein modification process" to RABGGTB; the visual
      phenotype maps to CHM, not to this catalytic subunit.
