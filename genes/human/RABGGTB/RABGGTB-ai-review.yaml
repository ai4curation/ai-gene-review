- id: PMID:31209342
  title: GGTase3 is a newly identified geranylgeranyltransferase targeting a ubiquitin
    ligase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Identifies GGTase-III as a heterodimer of the orphan alpha subunit PTAR1
      and the catalytic beta subunit of GGTase2 (RABGGTB); reports that
      GGTase-III geranylgeranylates FBXL2. Crystal structure of the
      GGTase3-FBXL2-SKP1 complex. Abstract-only in cache but PMID/title verified.
- id: PMID:32128853
  title: A SNARE geranylgeranyltransferase essential for the organization of the Golgi
    apparatus.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Defines GGTase-III (PTAR1 + beta subunit of
      RabGGTase) and shows it geranylgeranylates mono-farnesylated YKT6 at Cys194
      to produce doubly prenylated YKT6 required for Golgi SNARE assembly.
      Mutagenesis of RABGGTB Gly49 abolishes YKT6 modification. Also questions
      whether FBXL2 is a physiological GGTase-III substrate.
