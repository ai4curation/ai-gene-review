existing_annotations:
- term:
    id: GO:0006612
    label: protein targeting to membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) process annotation. RABGGTB is the catalytic enzyme that
      geranylgeranylates Rab GTPases; membrane targeting of Rabs is the downstream
      consequence of that modification rather than an activity of RABGGTB itself.
      This is a reasonable pathway-level statement but not the core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Downstream/consequence process. The core function is the catalytic transfer
      of geranylgeranyl to Rab cysteines (GO:0004663), which enables Rab membrane
      targeting; keep the broader process as non-core context.
- term:
    id: GO:0004663
    label: Rab geranylgeranyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: >-
      Phylogenetic (IBA) annotation of the correct core molecular function, with
      the appropriate contributes_to qualifier because the activity is a property
      of the RABGGTA:RABGGTB heterodimer rather than the beta subunit alone.
      Consistent with UniProt and with experimental evidence (PMID:7991565).
    action: ACCEPT
    reason: >-
      Correct, specific molecular function for the enzyme; contributes_to is the
      right qualifier for a catalytic subunit of an obligate heterodimer.
