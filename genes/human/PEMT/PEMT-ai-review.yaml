id: Q9UBM1
gene_symbol: PEMT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PEMT (phosphatidylethanolamine N-methyltransferase) is an integral, multi-pass
  endoplasmic-reticulum membrane enzyme that provides the alternative,
  liver-enriched route for de novo biosynthesis of phosphatidylcholine (PC). It
  catalyzes three sequential S-adenosyl-L-methionine (SAM)-dependent methylations
  of phosphatidylethanolamine (PE): PE is methylated to phosphatidyl-monomethyl-
  ethanolamine (PMME), PMME to phosphatidyl-dimethylethanolamine (PDME), and PDME
  to phosphatidylcholine, releasing S-adenosyl-L-homocysteine at each step (the
  first methylation is rate-limiting). This methylation route is the only pathway
  that synthesizes PC without preformed choline, complementing the choline-dependent
  CDP-choline (Kennedy) pathway, and accounts for roughly 30% of hepatic PC. Because
  it consumes SAM and yields choline moieties, PEMT is an important node in one-carbon
  (SAM) metabolism and choline homeostasis. The enzyme is expressed primarily in liver,
  resides in the ER membrane including the mitochondria-associated membrane (MAM)
  subdomain, with a minor mitochondrial-membrane pool, and adopts a topology with both
  termini in the cytosol. PEMT belongs to the class VI-like SAM-binding methyltransferase
  superfamily (PEMT/PEM2 family). Human PEMT variants are associated with susceptibility
  to non-alcoholic fatty liver disease and to choline-deficiency phenotypes.
