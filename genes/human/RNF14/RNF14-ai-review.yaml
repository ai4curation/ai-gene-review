  review:
    summary: As an RBR-type E3 ligase, RNF14 binds E2 ubiquitin-conjugating enzymes
      (UBE2E1/UBE2E2 experimentally; UBE2D family via interactome). E2 binding is
      mechanistically required for its ligase activity.
