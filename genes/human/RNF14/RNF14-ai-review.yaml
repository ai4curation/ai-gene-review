core_functions:
- description: RING-in-between-RING (RBR)-type E3 ubiquitin-protein ligase that catalyzes
    atypical Lys-6 (K6)-linked ubiquitination of substrates on stalled/collided cytosolic
    ribosomes, working with E2 enzymes and in concert with RNF25 and the collision
    sensor GCN1.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: file:human/RNF14/RNF14-uniprot.txt
    supporting_text: E3 ubiquitin-protein ligase that plays a key role in the
  - reference_id: file:human/RNF14/RNF14-uniprot.txt
    supporting_text: mediates 'Lys-6'-linked ubiquitination of target proteins
- description: Acts in ribosome-associated translational quality control by ubiquitinating
    and promoting degradation of translation factors (eEF1A, eRF1) and ribosomal proteins
    on stalled ribosomes, and by resolving reactive-aldehyde-induced RNA-protein crosslinks
    for VCP-dependent extraction and proteasomal degradation.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  locations:
  - id: GO:0022626
    label: cytosolic ribosome
  supported_by:
  - reference_id: file:human/RNF14/RNF14-uniprot.txt
    supporting_text: promotes ubiquitination and degradation of translation factors
      on stalled ribosomes
  - reference_id: file:human/RNF14/RNF14-uniprot.txt
    supporting_text: Specifically required to resolve RNA-protein cross-links caused
      by reactive aldehydes
