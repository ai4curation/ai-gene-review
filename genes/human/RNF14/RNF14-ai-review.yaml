suggested_questions:
- question: What determines RNF14 substrate selection (eEF1A vs eRF1 vs ribosomal
    proteins vs RNA-protein crosslinks) on stalled ribosomes, and how is this coordinated
    with RNF25?
- question: Is the nuclear transcriptional coregulator role (AR/Wnt) mechanistically
    dependent on RNF14 ligase activity, or is it a ligase-independent scaffolding
    function?
- question: How is the choice of K6-linked chain topology achieved by the atypical
    RBR module that lacks the canonical RING2 histidine?
suggested_experiments:
- description: Ribosome profiling and quantitative ubiquitin-site proteomics in RNF14
    and RNF14/RNF25 double knockouts after formaldehyde or stalling stress to map
    the full K6-ubiquitinated substrate set.
- description: Structure-function analysis (cryo-EM of RNF14-GCN1-stalled ribosome
    complexes) to define how GCN1 recruits and positions RNF14 on collided ribosomes.
- description: Separation-of-function mutants (catalytic-dead Cys-417/Cys-220 vs AR/TCF-binding-deficient
    C-terminal mutants) to test whether the transcriptional moonlighting roles require
    ligase activity.
