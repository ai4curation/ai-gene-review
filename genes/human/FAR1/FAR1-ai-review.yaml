id: Q8WVX9
gene_symbol: FAR1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FAR1 (fatty acyl-CoA reductase 1) is an NADPH-dependent, peroxisomal-membrane
  oxidoreductase that catalyzes the two-step reduction of long-chain fatty
  acyl-CoA (preferring saturated and unsaturated C16 and C18 species such as
  palmitoyl-, stearoyl- and oleoyl-CoA) to the corresponding primary fatty
  alcohol, with release of CoA (EC 1.2.1.84). It is a C-terminally
  tail-anchored, single-pass peroxisomal membrane protein whose targeting is
  mediated by the PEX19 receptor, with a large cytoplasmic catalytic domain. The
  fatty alcohols it produces are the committed precursors for ether-lipid
  (plasmalogen) biosynthesis, where alkyl-dihydroxyacetone-phosphate synthase
  (AGPS) uses them to form the characteristic ether bond; FAR1 is the
  rate-limiting enzyme of this pathway and is feedback-regulated by cellular
  plasmalogen levels through modulation of its protein stability. Its fatty
  alcohol product also feeds wax monoester synthesis. Loss-of-function of FAR1
  causes an autosomal-recessive peroxisomal disorder (severe intellectual
  disability, epilepsy, cataracts), and gain-of-function variants that escape
  plasmalogen feedback cause an autosomal-dominant cataract/spastic-paraparesis
  syndrome.
