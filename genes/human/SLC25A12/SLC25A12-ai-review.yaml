- id: PMID:38945283
  title: The mitochondrial aspartate/glutamate carrier does not transport GABA.
  findings:
  - statement: >-
      Human AGC1/aralar1 and AGC2/citrin (and Drosophila AGC) do not transport GABA in
      homo- or hetero-exchange with glutamate or aspartate; GABA does not inhibit AGC
      exchange activity, refuting a prior claim of mitochondrial GABA transport by AGC.
    supporting_text: AGC does not transport GABA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Important negative result defining substrate specificity;
      reconfirms canonical aspartate/glutamate exchange.
