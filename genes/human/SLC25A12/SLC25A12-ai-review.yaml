  title: Citrin and aralar1 are Ca(2+)-stimulated aspartate/glutamate transporters
    in mitochondria.
  findings:
  - statement: >-
      Recombinant human aralar1 reconstituted into liposomes catalyzes the electrogenic
      exchange of aspartate for glutamate plus a proton, and also transports
      cysteinesulfinate; overexpression in human cells increases malate-aspartate shuttle
      activity; activity is stimulated by external Ca2+.
    supporting_text: >-
      catalyze the electrogenic exchange of aspartate for glutamate and a H
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; the foundational biochemical identification of aralar1 as the
      Ca2+-stimulated aspartate/glutamate carrier. Directly supports the core MF, the
      cysteinesulfinate activity, the malate-aspartate shuttle role, and Ca2+ regulation.
