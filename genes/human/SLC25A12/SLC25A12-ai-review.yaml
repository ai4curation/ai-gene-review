- term:
    id: GO:0015804
    label: neutral amino acid transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: >-
      GOC inter-ontology inference from the 3-sulfino-L-alanine antiporter term. The
      physiological substrates of aralar (aspartate, glutamate) are acidic amino acids;
      cysteinesulfinate is an acidic sulfinic amino acid analogue. Labeling this a
      "neutral amino acid transport" function mischaracterizes the carrier's substrate
      class and is at best a minor over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The carrier's substrates are acidic/dicarboxylic amino acids, not neutral amino
      acids; this auto-generated term does not reflect the demonstrated selectivity.
