id: O75746
gene_symbol: SLC25A12
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A12 (Aralar / AGC1) is a calcium-regulated mitochondrial aspartate-glutamate
  carrier of the SLC25 mitochondrial carrier family. It is an electrogenic antiporter
  of the inner mitochondrial membrane that exports L-aspartate from the matrix in
  exchange for cytosolic L-glutamate plus a proton. This antiport is the key,
  effectively irreversible step of the malate-aspartate shuttle, which transfers
  reducing equivalents (cytosolic NADH) into mitochondria for oxidation; the carrier
  also supplies mitochondrially derived aspartate to the cytosol. The protein has a
  unique three-domain architecture: an N-terminal regulatory domain bearing EF-hand
  motifs that binds Ca2+ in the intermembrane space and gates transport, a
  six-transmembrane-helix mitochondrial carrier domain, and a short C-terminal domain;
  it functions as a homodimer. In addition to aspartate/glutamate it can exchange
  L-cysteinesulfinate (3-sulfino-L-alanine) for glutamate or aspartate, but it does not
  transport GABA or L-glutamine. Aralar is expressed predominantly in excitable tissues
  (heart, skeletal muscle) and neurons; in neurons its aspartate efflux is required for
  N-acetylaspartate production and myelination. Biallelic loss-of-function mutations
  cause developmental and epileptic encephalopathy with global cerebral hypomyelination.
