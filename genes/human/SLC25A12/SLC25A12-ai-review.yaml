    Electrogenic mitochondrial aspartate/glutamate antiporter of the inner membrane:
    exports L-aspartate from the matrix in exchange for cytosolic L-glutamate plus a
    proton, the defining transport step that renders the malate-aspartate shuttle
    directional and imports reducing equivalents (NADH) into mitochondria.
