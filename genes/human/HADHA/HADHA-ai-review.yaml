- id: PMID:1550553
  title: Human liver long-chain 3-hydroxyacyl-coenzyme A dehydrogenase is a multifunctional
    membrane-bound beta-oxidation enzyme of mitochondria.
  findings:
  - statement: >-
      Purified the long-chain-specific multifunctional beta-oxidation enzyme from human
      liver mitochondrial membranes and showed it possesses hydratase, dehydrogenase and
      thiolase activities (maximal with C10-C16 substrates) that could not be separated. Did
      not assign activities to specific subunits; subunit assignment was later done by
      PMID:8135828.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Establishes the long-chain specificity and the multifunctional
      nature of the enzyme; supports the hydratase and dehydrogenase activities now assigned
      to the alpha subunit.
- id: PMID:8135828
  title: Structural analysis of cDNAs for subunits of human mitochondrial fatty acid
    beta-oxidation trifunctional protein.
  findings:
  - statement: >-
      Definitive subunit-activity assignment. Expression of the alpha-subunit cDNA yielded
      long-chain enoyl-CoA hydratase and long-chain 3-hydroxyacyl-CoA dehydrogenase
      activities; expression of the beta-subunit cDNA yielded only long-chain 3-ketoacyl-CoA
      thiolase activity.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. The key reference establishing that HADHA carries hydratase +
      dehydrogenase and that thiolase is HADHB's; basis for REMOVE of thiolase from HADHA.
- id: PMID:8163672
  title: Mitochondrial trifunctional protein deficiency. Catalytic heterogeneity of
    the mutant enzyme in two patients.
  findings:
  - statement: >-
      Assayed the trifunctional protein's hydratase, dehydrogenase and thiolase activities in
      fibroblasts from two LCHAD-deficiency patients, demonstrating that the disease is caused
      by abnormality of the trifunctional protein.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache. Supports the dehydrogenase activity and disease relationship.
- id: PMID:18063578
  title: The layered structure of human mitochondrial DNA nucleoids.
  findings:
  - statement: >-
      Mitochondrial nucleoid proteomics; metabolic proteins identified in native nucleoids
      were not cross-linked to mtDNA, indicating peripheral association.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Supports a peripheral, non-core nucleoid association for HADHA.
- id: PMID:20562859
  title: Network organization of the human autophagy system.
  findings:
  - statement: >-
      Proteomic network of the human autophagy system; source of an HADHA protein-binding
      interaction annotation.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Supports a generic protein-binding annotation only.
- id: PMID:20833797
  title: Phosphoproteome analysis of functional mitochondria isolated from resting
    human muscle reveals extensive phosphorylation of inner membrane protein complexes
    and enzymes.
  findings:
  - statement: >-
      Muscle mitochondrial phosphoproteome study supporting mitochondrial localization of
      HADHA.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
- id: PMID:22586271
  title: Acyl coenzyme A thioesterase Them5/Acot15 is involved in cardiolipin remodeling
    and fatty liver development.
  findings:
  - statement: >-
      Structural and functional analysis of the Hotdog-fold mitochondrial thioesterase
      Them5/Acot15 (and its paralog Them4). The paper does not study HADHA/TFP/P40939; the
      long-chain acyl-CoA thioesterase activity it reports belongs to Them5, not HADHA.
  reference_review:
    relevance: NONE
    correctness: WRONG_IDENTIFIER
    review_notes: >-
      Full text available and confirms this paper is entirely about Them5/Acot15 with no
      mention of HADHA. The GO:0052816 (long-chain fatty acyl-CoA hydrolase) IDA on HADHA
      citing this paper is a wrong-paper attribution; annotation marked for REMOVE.
- id: PMID:23152787
  title: Human trifunctional protein alpha links cardiolipin remodeling to beta-oxidation.
  findings:
  - statement: >-
      Purified recombinant alpha subunit of TFP (alphaTFP) exhibits monolysocardiolipin
      acyltransferase activity, acylating MLCL to cardiolipin with linoleoyl-, oleoyl- and
      palmitoyl-CoA, and its expression increases incorporation of these fatty acids into CL
      in cells. Establishes an alpha-subunit-specific cardiolipin remodeling activity
      independent of the beta subunit.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; direct support for the cardiolipin acyl-chain remodeling
      (GO:0035965) annotation and the MLCL acyltransferase (EC 2.3.1.-) activity of HADHA.
- id: PMID:28514442
  title: Architecture of the human interactome defines protein communities and disease
    networks.
  findings:
  - statement: >-
      Large-scale interactome study; source of an HADHA-HADHB protein-binding interaction.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Supports generic protein binding (HADHA-HADHB complex), better captured by GO:0016507.
- id: PMID:29915090
  title: Cryo-EM structure of human mitochondrial trifunctional protein.
  findings:
  - statement: >-
      4.2-A cryo-EM structure of the human TFP alpha2-beta2 tetramer with a V-shaped
      architecture; a concave surface associates with the inner membrane. Supports complex
      membership, inner membrane localization and beta-oxidation function.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache but abstract directly supports the complex, localization and
      function claims.
- id: PMID:30850536
  title: Crystal structure of human mitochondrial trifunctional protein, a fatty acid
    β-oxidation metabolon.
  findings:
  - statement: >-
      3.6-A crystal structure of the human TFP alpha2-beta2 metabolon. Confirms that the ECH
      (hydratase) and HAD (dehydrogenase) active sites are in the alpha subunit and the
      3-ketothiolase (KT) site is in the beta subunit, with a substrate-channeling pathway
      along the inner membrane.
  full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; supports the alpha-subunit activity assignment (hydratase +
      dehydrogenase) and inner membrane association.
- id: PMID:31604922
  title: TFPa/HADHA is required for fatty acid beta-oxidation and cardiolipin re-modeling
    in human cardiomyocytes.
  findings:
  - statement: >-
      HADHA-deficient human iPSC-derived cardiomyocytes show reduced fatty acid beta-oxidation
      and defective cardiolipin remodeling, demonstrating that HADHA is required for both
      processes. Provides loss-of-function (IMP) support for GO:0006635 and GO:0035965.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; directly supports the beta-oxidation and cardiolipin remodeling
      mutant-phenotype annotations.
