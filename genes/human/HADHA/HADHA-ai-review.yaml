    summary: >-
      Phylogenetic (IBA) annotation assigning enoyl-CoA hydratase activity (EC 4.2.1.17) to
      HADHA. This is one of the two correct core catalytic activities of the alpha subunit:
      it hydrates 2-trans-enoyl-CoA to (3S)-3-hydroxyacyl-CoA in step 2 of each
      beta-oxidation cycle. Directly demonstrated for the human alpha subunit by expression
