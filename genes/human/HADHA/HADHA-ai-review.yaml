- description: >-
    Monolysocardiolipin (MLCL) acyltransferase (EC 2.3.1.-): an alpha-subunit-specific
    moonlighting activity that transfers an acyl group (linoleoyl, oleoyl or palmitoyl) from
    acyl-CoA onto monolysocardiolipin, reacylating it to mature cardiolipin. This activity is
    independent of the beta subunit and couples long-chain fatty acid beta-oxidation to
    cardiolipin acyl-chain remodeling, which is required for functional mitochondria. GO has no
    cardiolipin-specific molecular-function term, so the general acyltransferase activity term is
    used here pending a dedicated MLCL acyltransferase term.
