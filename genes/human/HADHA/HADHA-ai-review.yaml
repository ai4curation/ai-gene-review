- term:
    id: GO:0052816
    label: long-chain fatty acyl-CoA hydrolase activity
  evidence_type: IDA
  original_reference_id: PMID:22586271
  qualifier: enables
  review:
    summary: >-
      This IDA annotates HADHA with long-chain fatty acyl-CoA hydrolase (thioesterase)
      activity citing PMID:22586271. That paper (full text available) is a structural and
      functional study of the Hotdog-fold mitochondrial thioesterase Them5/Acot15 and its
      paralog Them4; it contains no mention of HADHA, the trifunctional protein, or P40939
      anywhere in the abstract or full text. The thioesterase activity it describes belongs to
      Them5, not HADHA. HADHA is a hydratase/dehydrogenase, not an acyl-CoA thioesterase.
    action: REMOVE
    reason: >-
      Wrong-paper attribution. The cited reference does not assay HADHA and does not support a
      thioesterase/hydrolase activity for this protein; the activity is that of Them5/Acot15.
    supported_by:
    - reference_id: PMID:22586271
      supporting_text: "Here, we present a structural and functional analysis of a new
        mammalian mitochondrial thioesterase, Them5."
