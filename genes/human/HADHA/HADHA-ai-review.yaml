- term:
    id: GO:0042645
    label: mitochondrial nucleoid
  evidence_type: IDA
  original_reference_id: PMID:18063578
  qualifier: located_in
  review:
    summary: >-
      IDA from a mitochondrial nucleoid proteomics study. HADHA was identified in native
      nucleoid preparations, but such metabolic proteins were not observed to cross-link to
      mtDNA, indicating peripheral association rather than a core nucleoid role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Peripheral/co-purifying association, not a functional nucleoid component; the core
      localization is the inner membrane.
    supported_by:
    - reference_id: PMID:18063578
      supporting_text: "Several other metabolic proteins and chaperones identified in native
        nucleoids, including ATAD3, were not observed to cross-link to mtDNA."
