# ============================================================================
# MOLECULAR FUNCTION - THIOLASE / ACETYLTRANSFERASE (BELONGS TO HADHB, NOT HADHA)
# ============================================================================
- term:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  evidence_type: TAS
  original_reference_id: PMID:8135828
  qualifier: enables
  review:
    summary: >-
      This annotation assigns thiolase/acetyltransferase activity to HADHA, but PMID:8135828 -
      the very paper cited - showed that the 3-ketoacyl-CoA thiolase activity is carried by
      the BETA subunit (HADHB), not the alpha subunit. Expression of the alpha-subunit cDNA
      yielded only hydratase and dehydrogenase activities; only the beta-subunit cDNA yielded
      thiolase activity. The crystal structure (PMID:30850536) likewise places the
      3-ketothiolase active site in the beta subunit.
    action: REMOVE
    reason: >-
      Thiolase (acetyl-CoA C-acetyltransferase) activity belongs to HADHB, not HADHA, and is
      contradicted by the cited paper itself and by the structural data. This is an old PINC
      annotation that mis-attributed a beta-subunit activity to the alpha subunit.
    supported_by:
    - reference_id: PMID:8135828
      supporting_text: "Expression of this cDNA in mammalian cells yielded a polypeptide with
        the long-chain 3-ketoacyl-CoA thiolase activity."
      full_text_unavailable: true
    - reference_id: PMID:30850536
      supporting_text: "employing 2-enoyl-CoA hydratase (ECH), 3-hydroxyl-CoA dehydrogenase
        (HAD), and 3-ketothiolase (KT) activities consecutively."
      full_text_unavailable: true
