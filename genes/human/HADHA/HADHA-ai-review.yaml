- term:
    id: GO:0035965
    label: cardiolipin acyl-chain remodeling
  evidence_type: IDA
  original_reference_id: PMID:23152787
  qualifier: involved_in
  review:
    summary: >-
      IDA showing that the alpha subunit of TFP has monolysocardiolipin acyltransferase
      activity that remodels cardiolipin. Purified recombinant alphaTFP acylated MLCL to CL
      with linoleoyl-, oleoyl- and palmitoyl-CoA, and its expression increased linoleate/oleate
