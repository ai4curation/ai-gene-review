core_functions:
- description: >-
    Long-chain enoyl-CoA hydratase (LCEH, EC 4.2.1.17): the second step of each
    mitochondrial long-chain fatty acid beta-oxidation cycle, catalyzing hydration of a
    (2E)-enoyl-CoA to (3S)-3-hydroxyacyl-CoA. This activity resides in the alpha subunit of
    the membrane-bound trifunctional protein and is specific for long-chain substrates.
  supported_by:
  - reference_id: PMID:8135828
    supporting_text: "Expression of this cDNA in mammalian cells yielded a polypeptide with
      the long-chain enoyl-CoA hydratase and long-chain 3-hydroxyacyl-CoA dehydrogenase
      activities."
    full_text_unavailable: true
  - reference_id: PMID:30850536
    supporting_text: "employing 2-enoyl-CoA hydratase (ECH), 3-hydroxyl-CoA dehydrogenase
      (HAD), and 3-ketothiolase (KT) activities consecutively."
    full_text_unavailable: true
  molecular_function:
    id: GO:0004300
    label: enoyl-CoA hydratase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  in_complex:
    id: GO:0016507
    label: mitochondrial fatty acid beta-oxidation multienzyme complex
- description: >-
    Long-chain 3-hydroxyacyl-CoA dehydrogenase (LCHAD, EC 1.1.1.211): the third step of
    each long-chain fatty acid beta-oxidation cycle, oxidizing (3S)-3-hydroxyacyl-CoA to
    3-oxoacyl-CoA with reduction of NAD+ to NADH. This NAD+-dependent activity resides in the
    alpha subunit of the trifunctional protein and is specific for long-chain (C10-C16)
    substrates; its deficiency causes LCHAD deficiency.
  supported_by:
  - reference_id: PMID:8135828
    supporting_text: "Expression of this cDNA in mammalian cells yielded a polypeptide with
      the long-chain enoyl-CoA hydratase and long-chain 3-hydroxyacyl-CoA dehydrogenase
      activities."
    full_text_unavailable: true
  - reference_id: PMID:1550553
    supporting_text: "gives maximum activity with 3-ketoacyl-CoA substrates of C10 to C16
