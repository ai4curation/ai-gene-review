suggested_questions:
- question: >-
    Is the monolysocardiolipin acyltransferase / cardiolipin remodeling activity of the alpha
    subunit a genuine independent physiological function in vivo, or a secondary moonlighting
    activity? Should it be modeled with a specific acyltransferase molecular-function term
    (EC 2.3.1.-) in addition to GO:0035965?
- question: >-
    Should the generic dehydrogenase (GO:0003857) and dehydratase (GO:0018812) annotations on
    HADHA be superseded by the long-chain-specific terms (GO:0016509, GO:0004300) to better
    reflect the demonstrated C10-C16 substrate specificity?
suggested_experiments:
- description: >-
    Reconstitute recombinant HADHA alone and as the alpha2-beta2 complex with HADHB and assay
    enoyl-CoA hydratase and 3-hydroxyacyl-CoA dehydrogenase activities across a chain-length
    series (C4-C20) to quantitatively define substrate specificity.
  hypothesis: >-
    HADHA exhibits hydratase and dehydrogenase activity restricted to long-chain (>=C10)
    acyl-CoA substrates, distinguishing it from the short-chain enzymes ECHS1 and HADH.
- description: >-
    Test whether the MLCL acyltransferase / cardiolipin remodeling activity of HADHA can be
    genetically separated from its hydratase/dehydrogenase activities using active-site point
    mutants in HADHA-deficient cardiomyocytes.
  hypothesis: >-
    The cardiolipin acyltransferase activity is mechanistically distinct from the
    beta-oxidation catalytic sites and can be uncoupled, indicating a bona fide moonlighting
    function.
