id: Q7Z392
gene_symbol: TRAPPC11
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: TRAPPC11 (C4orf41/Gryzun) is a metazoan TRAPP/TRAPPIII-associated subunit.
  It stabilizes mammalian TRAPP architecture and contributes to early secretory pathway
  trafficking between the ER, ERGIC, and Golgi. Patient-cell evidence also supports a
  TRAPPC11 role in starvation-induced autophagic flux and autophagosome sealing. In the
  proteostasis-network TRAPPIII context, TRAPPC11 is best represented by
  TRAPPIII/TRAPP complex membership, complex-level RAB1 GEF activity, ER-to-Golgi
  transport, TRAPP complex stability, and autophagosome maturation.
