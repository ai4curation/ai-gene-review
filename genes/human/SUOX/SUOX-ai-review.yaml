proposed_new_terms: []
suggested_questions:
- question: >-
    Is the nitrite reductase / nitric-oxide-generating activity of SUOX physiologically
    significant in vivo under hypoxia, and does it contribute measurably to NO homeostasis?
- question: >-
    What is the electron acceptor and electron-transfer path in the human enzyme, and how
    does the intermembrane-space localization relate to cytochrome c as physiological
    acceptor?
suggested_experiments:
- description: >-
    Genetic or pharmacological perturbation of SUOX in a hypoxia model to test whether the
    nitrite reductase activity affects cellular NO levels and downstream signaling.
- description: >-
    Structural determination of the full-length human holoenzyme (heme + Mo-MPT domains) to
    clarify inter-domain electron transfer and the basis of disease-associated variants.
