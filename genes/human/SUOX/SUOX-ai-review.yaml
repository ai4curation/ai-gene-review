core_functions:
- description: >-
    Sulfite oxidase: catalyses the oxidation of sulfite to sulfate (EC 1.8.3.1), the
    terminal reaction in the oxidative degradation of the sulfur amino acids cysteine and
    methionine, transferring electrons to cytochrome c. Activity requires a Mo-molybdopterin
    cofactor at the catalytic centre and a heme b prosthetic group in the cytochrome b5
    domain; the functional enzyme is a homodimer localized to the mitochondrial
    intermembrane space.
  molecular_function:
    id: GO:0008482
    label: sulfite oxidase activity
