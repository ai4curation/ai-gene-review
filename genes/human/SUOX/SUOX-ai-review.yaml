id: P51687
gene_symbol: SUOX
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SUOX encodes sulfite oxidase, the terminal enzyme of oxidative sulfur amino acid
  (cysteine and methionine) catabolism. It is a homodimeric molybdenum-cofactor
  (Mo-molybdopterin) and heme b (cytochrome b5-type) dependent oxidoreductase that
  catalyses the oxidation of sulfite to sulfate (EC 1.8.3.1), transferring electrons
  ultimately to cytochrome c. Each subunit is organized into an N-terminal cytochrome
  b5 heme-binding domain, a central molybdopterin/oxidoreductase (Moco) domain, and a
  C-terminal dimerization domain. The mature protein is imported into the mitochondrial
  intermembrane space via a cleavable N-terminal transit peptide. Under hypoxic or
  ischemic conditions the enzyme can additionally run in reverse and reduce nitrite to
  nitric oxide. Loss-of-function variants cause isolated sulfite oxidase deficiency, a
  severe autosomal recessive neurometabolic disorder with neonatal encephalopathy,
  intractable seizures, and ectopia lentis that phenotypically resembles molybdenum
  cofactor deficiency.
