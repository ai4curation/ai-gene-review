id: P04075
gene_symbol: ALDOA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ALDOA encodes fructose-bisphosphate aldolase A, the muscle/red-cell isozyme of the
  ubiquitous class-I fructose-bisphosphate aldolase (three vertebrate isozymes exist:
  A in muscle, B in liver, C in brain). It is a cytosolic homotetramer that uses a
  Schiff-base (active-site lysine) mechanism to catalyze the reversible aldol cleavage
  of beta-D-fructose 1,6-bisphosphate into dihydroxyacetone phosphate (DHAP) and
  D-glyceraldehyde 3-phosphate (EC 4.1.2.13), the fourth step of glycolysis, and the
  reverse aldol condensation in gluconeogenesis. Aldolase A is highly abundant in
  skeletal muscle and erythrocytes. Beyond catalysis it is a well-documented moonlighting
  protein that binds F-actin and other cytoskeletal components (and the actin
  nucleation-promoting factor WASP) via its active-site region, links glycolysis to
  cytoskeletal dynamics, and binds RNA. Loss-of-function variants cause glycogen storage
  disease type XII (aldolase A deficiency), presenting as hereditary nonspherocytic
  hemolytic anemia frequently accompanied by myopathy, exercise intolerance and
  rhabdomyolysis (often triggered by febrile illness).
