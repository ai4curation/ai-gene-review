  title: Guide molecule-driven stereospecific degradation of alpha-methylpolyamines
    by polyamine oxidase.
  findings:
  - statement: >-
      FAD-dependent polyamine oxidase (PAO) is a key enzyme in spermidine/spermine
      catabolism whose natural substrates are N1-acetylspermidine, N1-acetylspermine
      and N1,N12-diacetylspermine.
    supporting_text: the catabolism of polyamines spermidine and spermine. The natural substrates for
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Enzymology study of PAO substrate stereospecificity; GOA source for several
      human PAOX IDA annotations. Abstract-only in cache; confirms the natural
      acetylpolyamine substrates and PAO's role in polyamine catabolism. The
      "biosynthetic"-direction IDA annotations reflect product formation within the
      catabolic pathway rather than a dedicated biosynthetic function.
