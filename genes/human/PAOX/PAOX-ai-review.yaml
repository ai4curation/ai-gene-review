id: Q6QHF9
gene_symbol: PAOX
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PAOX is the human peroxisomal N(1)-acetylpolyamine oxidase (also called
  polyamine oxidase, PAO/APAO; EC 1.5.3.13), an FAD-dependent flavoenzyme of the
  flavin monoamine oxidase family. It catalyzes the oxidative arm of polyamine
  back-conversion: acting on N(1)-acetylated polyamines produced by
  spermidine/spermine N1-acetyltransferase (SAT1), it oxidizes N(1)-acetylspermine
  to spermidine and N(1)-acetylspermidine to putrescine, in each case releasing
  3-acetamidopropanal and hydrogen peroxide. Its substrate preference is
  N(1)-acetylspermine = N(1)-acetylspermidine > N(1),N(12)-diacetylspermine, and it
  does not oxidize free spermidine; its requirement for the acetylated substrate
  distinguishes it from spermine oxidase (SMOX), which oxidizes free spermine. By
  interconverting higher and lower polyamines, PAOX helps set intracellular
  polyamine concentrations. The protein carries a C-terminal PTS1 microbody
  targeting signal and localizes to the peroxisomal matrix, with a cytosolic
  (pre-import) pool. It is widely expressed and induced by polyamine analogs.
