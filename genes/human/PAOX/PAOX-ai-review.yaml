- id: PMID:12477380
  title: Genomic identification and biochemical characterization of the mammalian
    polyamine oxidase involved in polyamine back-conversion.
  findings:
  - statement: >-
      Human PAOX cDNA expressed in HEK-293 cells confers rapid oxidation of
      N1-acetylspermine to spermidine, with substrate ranking N1-acetylspermine =
      N1-acetylspermidine > N1,N12-diacetylspermine >> spermine; spermidine is not
      a substrate. This is distinct from spermine oxidase (SMO), which prefers free
      spermine.
    supporting_text: a preference ranking of N1-acetylspermine= N1-acetylspermidine> N1,N12-diacetylspermine>>spermine; spermidine was not acted upon
  - statement: >-
      PAOX overexpression shifts intracellular polyamine pools, decreasing spermine
      and increasing spermidine, supporting its role in polyamine back-conversion
      and homeostasis.
    supporting_text: intracellular spermine pools decreased by approx. 30%, whereas spermidine increased 2-4-fold
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary paper that genomically identified and biochemically characterized
      mammalian PAO/PAOX; establishes the diagnostic acetylpolyamine substrate
      specificity distinguishing PAOX from SMOX. Abstract-only in cache but the
      substrate ranking and pool-shift data are stated verbatim in the abstract.
