id: Q8N5Z0
gene_symbol: AADAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AADAT (kynurenine aminotransferase II, KAT II) is a mitochondrial, pyridoxal
  5'-phosphate (PLP)-dependent class-I (fold-type I) aminotransferase that is a
  homodimer with broad substrate specificity. It has two physiologically prominent
  catalytic activities carried out at the same active site. As 2-aminoadipate
  aminotransferase (EC 2.6.1.39) it transaminates L-2-aminoadipate with 2-oxoglutarate
  to give 2-oxoadipate and L-glutamate, an intermediate step of L-lysine degradation
  via the saccharopine/aminoadipate pathway. As kynurenine aminotransferase II
  (EC 2.6.1.7) it transaminates L-kynurenine with 2-oxoglutarate to yield kynurenate
  (kynurenic acid) plus L-glutamate; the intermediate spontaneously cyclizes to
  kynurenic acid, a neuroactive tryptophan-pathway metabolite that antagonizes NMDA
  and alpha-7 nicotinic acetylcholine receptors, and AADAT is a principal brain enzyme
  for kynurenic acid synthesis. The enzyme also transaminates a wide range of other
  amino acids (methionine, glutamate, tryptophan, aromatic amino acids) and can use
  several 2-oxo acids and, in vitro, glyoxylate as amino-group acceptors. It is highly
  expressed in liver and is also present in brain, kidney and other tissues, acting in
  the mitochondrion (matrix); cytosolic activity has also been reported.
