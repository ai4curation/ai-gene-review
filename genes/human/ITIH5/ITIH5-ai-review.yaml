knowledge_gaps:
- gap_statement: >-
    The molecular receptor or binding partner that transduces ITIH5 signaling
    in adipose stromal and endothelial cells is unknown.
  boundary: >-
    Recombinant protein and genetic perturbations establish cellular effects,
    but no receptor, direct signaling complex, or separation-of-function allele
    has been identified.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: >-
    Identifying the receptor is necessary to distinguish an autonomous signaling
    function from an indirect consequence of extracellular-matrix remodeling.
  resolution: >-
    Use affinity purification and cell-surface ligand-receptor screening with
    recombinant ITIH5, followed by receptor knockout and rescue in adipose stem
    cells and human endothelium.
  provenance:
  - reference_id: file:human/ITIH5/ITIH5-deep-research-manual.md
    supporting_text: The identity of any receptor and the relationship between this signaling role and covalent heavy-chain matrix chemistry remain unresolved.
- gap_statement: >-
    Isoform-specific secretion and function are unresolved, particularly for
    isoforms 3 and 4 that lack the canonical N-terminal signal peptide.
  boundary: >-
    Sequence records define four isoforms, but the primary functional studies
    do not identify which endogenous protein isoforms were detected.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: OPEN
  significance: >-
    Isoform resolution is required to know whether all ITIH5 products enter the
    extracellular matrix or whether truncated forms act intracellularly.
  resolution: >-
    Develop isoform-specific transcript and peptide assays, then couple
    secretion measurements with isoform-resolved rescue experiments.
  provenance:
  - reference_id: file:human/ITIH5/ITIH5-notes.md
    supporting_text: Isoforms 3 and 4 lack the canonical N terminus and signal peptide
suggested_questions:
- question: >-
    Which receptor or matrix partner transduces ITIH5 signals in adipose stem
    cells and vascular endothelium?
- question: >-
    How is the TSG-6/bikunin/HC5 hyaluronan pathway related to the adipose-
    endothelial signaling activity?
- question: >-
    Which ITIH5 isoforms are secreted in fibroblasts, adipocytes, placenta, and
    tumors?
- question: >-
    Is reduced tumor-cell proliferation a physiological ITIH5 function or a
    context-specific consequence of forced expression?
suggested_experiments:
- hypothesis: >-
    ITIH5 binds a cell-surface receptor that is required for its anti-adipogenic
    and anti-adhesive endothelial effects.
  description: >-
    Perform cell-surface ligand-receptor capture with recombinant ITIH5 in human
    adipose stem cells and aortic endothelial cells, then test candidate-receptor
    knockouts for loss of ITIH5-dependent differentiation and leukocyte-adhesion
    phenotypes with receptor rescue.
  experiment_type: Ligand-receptor discovery and genetic epistasis
- hypothesis: >-
    Covalent heavy-chain matrix transfer is required for fibroblast
    differentiation but dispensable for adipose-endothelial signaling.
  description: >-
    Compare wild-type ITIH5 with cleavage/transfer-deficient and VWA-domain
    mutants in TSG-6/bikunin-dependent fibroblast matrices, adipose-stem-cell
    differentiation, and endothelial leukocyte-adhesion assays.
  experiment_type: Separation-of-function mutagenesis and cellular rescue
- hypothesis: >-
    N-terminally truncated ITIH5 isoforms remain intracellular and have
    activities distinct from secreted isoform 1.
  description: >-
    Express each tagged isoform at matched levels, quantify secretion and
    subcellular localization, and perform isoform-specific rescue after
    endogenous ITIH5 depletion in fibroblasts and adipose stem cells.
  experiment_type: Isoform-resolved localization and functional complementation
