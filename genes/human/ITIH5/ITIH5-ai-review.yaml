  label: Homo sapiens
description: >-
  ITIH5 is a secreted inter-alpha-inhibitor heavy-chain family glycoprotein
  expressed prominently in placenta and adipose tissue and also by fibroblasts.
  It contains VIT and von Willebrand factor A domains but no Kunitz protease-
  inhibitor domain. In human fibroblasts, heavy chain 5 associates with bikunin
  and cell-surface hyaluronan in a TSG-6-dependent pericellular matrix that
  supports TGF-beta1-induced myofibroblast differentiation. ITIH5 also acts as
  an adipose-derived extracellular signal: mammalian genetic and recombinant-
  protein studies indicate that it restrains adipocyte differentiation, while
  direct treatment of human endothelium reduces leukocyte adhesion. ITIH5
  expression is frequently lost through promoter methylation in several cancers,
  and experimental re-expression can suppress tumor-cell proliferation.
