suggested_questions:
- question: >-
    Does XRCC2's own ATP binding (Walker A K54/T55, Walker B D149) contribute catalytically to
    BCDX2 function, or is it purely structural, given that RAD51B and RAD51C provide the coupled
    ATPase activity that drives RAD51 filament assembly?
- question: >-
    Is the centrosome/mitotic-stability phenotype of XRCC2-deficient cells a direct function of
    XRCC2 at the centrosome, or an indirect consequence of unrepaired DNA damage and genome
    instability?
suggested_experiments:
- description: >-
    Separation-of-function XRCC2 Walker-motif mutants (ATP-binding-deficient) reconstituted into
    BCDX2 to test whether XRCC2 nucleotide binding is required for RAD51 filament nucleation and
    extension versus complex assembly.
  hypothesis: >-
    XRCC2 ATP binding is structural and largely dispensable for the catalytic drive of RAD51
    filament assembly, which is provided by RAD51B and RAD51C.
- description: >-
    Single-molecule assays of RAD51 filament assembly with BCDX2 reconstituted from cancer- and
    Fanconi-associated XRCC2 variants to map variant effects onto the mediator activity.
  hypothesis: >-
    Pathogenic XRCC2 variants impair BCDX2's ability to nucleate and extend RAD51 filaments.
