- term:
    id: GO:0140664
    label: ATP-dependent DNA damage sensor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based electronic mapping propagated from the RecA/RAD51 ATP-binding domain.
      XRCC2 is a RAD51-filament-assembly mediator, not a demonstrated ATP-dependent DNA damage
      sensor; the ATP hydrolysis that drives BCDX2 is contributed by RAD51B and RAD51C.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This is an over-propagation of a RecA/RAD51-family ATPase/damage-sensor function onto
      XRCC2. Structural analysis shows XRCC2 binds but is not established to hydrolyze ATP as a
      damage sensor; its molecular role is as a mediator subunit promoting RAD51 filament
      nucleation/extension. The term overstates an independent catalytic sensor activity.
    supported_by:
    - reference_id: PMID:37344587
      supporting_text: BCDX2 promotes RAD51 filament nucleation and growth in an ATP hydrolysis dependent manner
