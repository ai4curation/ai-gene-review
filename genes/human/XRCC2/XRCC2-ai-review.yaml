core_functions:
- description: >-
    As an obligate subunit of the BCDX2 complex (RAD51B-RAD51C-RAD51D-XRCC2), XRCC2 acts as a
    homologous-recombination mediator: BCDX2 binds ssDNA and branched DNA intermediates
    (four-way/Holliday junctions and replication forks) and stimulates the nucleation and
    extension of the RAD51 nucleoprotein filament on RPA-coated ssDNA, promoting homologous
    pairing and strand invasion during double-strand break and interstrand crosslink repair.
    XRCC2 binds ATP via canonical Walker A/B motifs and provides a structural protomer within
    the complex, while the ATP hydrolysis that powers filament assembly is contributed by
    RAD51B and RAD51C.
  supported_by:
  - reference_id: PMID:37344587
    supporting_text: BCDX2 stimulates the nucleation and extension of RAD51
  - reference_id: PMID:11834724
    supporting_text: pairing between single-stranded and double-stranded DNA
  molecular_function:
