id: O43543
gene_symbol: XRCC2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  XRCC2 (DNA repair protein XRCC2; also FANCU) is one of five human RAD51 paralogs and a
  RecA/RAD51-family P-loop NTPase. It is an obligate structural subunit of the BCDX2 complex
  (RAD51B-RAD51C-RAD51D-XRCC2), one of the two RAD51-paralog assemblies (the other being
  CX3, RAD51C-XRCC3). BCDX2 functions as a homologous-recombination mediator: it binds
  single-stranded DNA and branched DNA structures (four-way/Holliday junctions and
  replication forks) and stimulates the nucleation and extension of the RAD51 nucleoprotein
  filament on RPA-coated ssDNA, an activity essential for homologous recombination. Within
  the complex, RAD51C-RAD51D-XRCC2 structurally mimic three aligned RAD51 protomers; XRCC2
  binds ATP through canonical Walker A/B motifs, but the ATP hydrolysis that drives the
  high-affinity ssDNA-binding, filament-promoting state is contributed by RAD51B and RAD51C.
  BCDX2 acts downstream of BRCA2 recruitment and upstream of RAD51 recruitment, and also
  participates in replication fork remodeling/protection and interstrand crosslink repair.
  XRCC2 localizes predominantly to the nucleus/nucleoplasm and is also found at centrosomes.
  Biallelic loss-of-function causes Fanconi anemia complementation group U, and XRCC2
  deficiency produces hypersensitivity to DNA cross-linking agents, chromosome instability
  and defective homologous recombination; hypomorphic variants underlie meiotic phenotypes
  (spermatogenic failure, premature ovarian failure) and contribute to cancer predisposition.
