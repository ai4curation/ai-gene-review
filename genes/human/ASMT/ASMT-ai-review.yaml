core_functions:
- description: >-
    Acetylserotonin O-methyltransferase (HIOMT) activity: transfers a methyl group
    from S-adenosyl-L-methionine to the 5-hydroxyl of N-acetylserotonin, producing
    melatonin and S-adenosyl-L-homocysteine (EC 2.1.1.4). This is the final,
    committed step of melatonin biosynthesis. The enzyme acts as a homodimer and is
    cytosolic, expressed principally in the pineal gland.
