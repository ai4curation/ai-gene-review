  label: Homo sapiens
description: >-
  ASMT (acetylserotonin O-methyltransferase; historically hydroxyindole
  O-methyltransferase, HIOMT; EC 2.1.1.4) is a cytosolic, S-adenosyl-L-methionine
  (SAM)-dependent O-methyltransferase that catalyzes the final step of melatonin
  biosynthesis: O-methylation of N-acetylserotonin to melatonin, with SAM converted
  to S-adenosyl-L-homocysteine. It is the last enzyme of the pathway
  Trp -> 5-HTP -> serotonin -> N-acetylserotonin -> melatonin and influences the
  rate of melatonin production. ASMT is a member of the class I-like SAM-binding
  methyltransferase superfamily (cation-independent O-methyltransferase family) and
  is catalytically active as a homodimer; only isoform 1 has enzyme activity. The
  protein is expressed principally in the pineal gland. Reduced-function ASMT
  variants lower melatonin production and have been associated with sleep,
  neurodevelopmental, and psychiatric phenotypes.
