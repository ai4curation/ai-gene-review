core_functions:
- description: >-
    L-glutamate dehydrogenase [NAD(P)+] activity: catalyzes the reversible oxidative
    deamination of L-glutamate to 2-oxoglutarate (alpha-ketoglutarate) with release
    of ammonia, using either NAD(+) or NADP(+) as the redox cofactor, in the
    mitochondrial matrix. This is the defining catalytic activity of GLUD1 and the
    central link between amino-acid/nitrogen metabolism and the TCA cycle.
  molecular_function:
    id: GO:0004353
    label: L-glutamate dehydrogenase [NAD(P)+] activity
  directly_involved_in:
  - id: GO:0006538
    label: L-glutamate catabolic process
  - id: GO:0072350
    label: tricarboxylic acid metabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:11903050
    supporting_text: "catalyses the reversible oxidative deamination of l-glutamate to 2-oxoglutarate in the mitochondrial matrix"
  - reference_id: PMID:11254391
    supporting_text: "only animal GDH utilizes"
- description: >-
    ADP binding: binds ADP at a defined allosteric site, which activates the enzyme
    (and sensitizes it to L-leucine). ADP binding drives GLUD1 into its catalytically
    active state under conditions of high ADP:ATP ratio, integrating enzyme activity
    with cellular energy charge.
  molecular_function:
    id: GO:0043531
    label: ADP binding
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: file:human/GLUD1/GLUD1-uniprot.txt
    supporting_text: "Activated by ADP"
  - reference_id: PMID:11903050
    supporting_text: "The major allosteric activator and inhibitor are ADP and GTP"
