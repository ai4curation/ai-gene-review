id: P00367
gene_symbol: GLUD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GLUD1 encodes glutamate dehydrogenase 1, the major, ubiquitously expressed
  mitochondrial-matrix enzyme that catalyzes the reversible oxidative deamination
  of L-glutamate to 2-oxoglutarate (alpha-ketoglutarate) with release of ammonia,
  using NAD(+) or NADP(+) as cofactor (EC 1.4.1.3). It is the central metabolic
  link between amino-acid/nitrogen metabolism and the tricarboxylic acid cycle,
  providing anaplerotic alpha-ketoglutarate and channeling ammonia toward the urea
  cycle. The mature enzyme (after cleavage of an N-terminal mitochondrial transit
  peptide) assembles into a homohexamer whose activity is tightly allosterically
  regulated: it is activated by ADP and L-leucine and inhibited by GTP and ATP,
  and it is inactivated by SIRT4-mediated ADP-ribosylation. The bulk of the protein
  localizes to the mitochondrial matrix, with a small pool in the endoplasmic
  reticulum and cytoplasm. In pancreatic beta-cells GLUD1 couples amino-acid
  catabolism to insulin secretion, and in the brain it contributes to turnover of
  the neurotransmitter glutamate. Dominant gain-of-function mutations that impair
  GTP inhibition cause the hyperinsulinism-hyperammonemia syndrome (familial
  hyperinsulinemic hypoglycemia type 6).
