core_functions:
- description: >-
    Magnesium-dependent, pH-neutral sphingomyelin phosphodiesterase (type-C
    neutral sphingomyelinase, EC 3.1.4.12) that hydrolyses membrane sphingomyelin
    to ceramide and phosphocholine at the endoplasmic reticulum, Golgi, and outer
    nuclear envelope, thereby driving sphingomyelin turnover and ceramide
    production.
  molecular_function:
    id: GO:0004767
    label: sphingomyelin phosphodiesterase activity
  directly_involved_in:
