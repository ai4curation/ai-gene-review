id: Q9NXE4
gene_symbol: SMPD4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SMPD4 (neutral sphingomyelinase 3, nSMase3) is a magnesium-dependent, neutral
  sphingomyelin phosphodiesterase (EC 3.1.4.12) that hydrolyses membrane
  sphingomyelin to ceramide and phosphocholine. Despite its name it is a
  distinct enzyme unrelated by sequence to the SMPD2/SMPD3 (nSMase1/nSMase2)
  extended-calcineurin-like family. It is a C-tail-anchored, single-pass integral
  membrane protein of the endoplasmic reticulum and Golgi apparatus, and it also
  resides at the outer nuclear envelope where it associates with nuclear pore
  complex proteins (it was independently identified as the nuclear envelope
  transmembrane protein NET13). Its catalytic activity is Mg2+-dependent with a
  neutral pH optimum, is stimulated by phosphatidylserine and by tumour necrosis
  factor, and is inhibited by scyphostatin. By generating ceramide from
  sphingomyelin, SMPD4 contributes to membrane sphingolipid homeostasis and to
  endoplasmic reticulum organization and ER-to-nuclear-envelope crosstalk, and it
  participates in stress-response signalling (DNA damage, TNF) linked to
  apoptosis and cell-cycle/mitotic progression. It is highly expressed in heart
  and skeletal muscle, where it mediates TNF-stimulated oxidant production.
  Bi-allelic loss-of-function variants in SMPD4 cause an autosomal-recessive
  neurodevelopmental disorder with microcephaly, arthrogryposis, and structural
  brain anomalies (NEDMABA).
