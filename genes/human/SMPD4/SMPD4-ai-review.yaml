- id: PMID:16517606
  title: Novel tumor necrosis factor-responsive mammalian neutral sphingomyelinase-3
    is a C-tail-anchored protein.
  findings:
  - statement: >-
      nSMase3 is a Mg2+-dependent neutral sphingomyelinase (pH optimum 7) that
      hydrolyses sphingomyelin to phosphorylcholine and ceramide; activity is
      enhanced by phosphatidylserine and inhibited by scyphostatin.
    reference_section_type: ABSTRACT
    supporting_text: >-
      nSMase3 is Mg2+-dependent and shows optimal activity at pH 7, which is
      enhanced in the presence of phosphatidylserine and inhibited by
      scyphostatin.
  - statement: >-
      nSMase3 is a C-tail-anchored integral membrane protein colocalizing with ER
      and Golgi markers, and is rapidly activated by TNF.
    reference_section_type: ABSTRACT
    supporting_text: >-
      colocalization with markers of the endoplasmic reticulum as
      well as with Golgi markers
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary biochemical and localization characterization of human nSMase3.
      Abstract-only cache but the enzymatic and localization findings are the
      basis for the core annotations.
- id: PMID:18505924
  title: Neutral sphingomyelinase-3 is a DNA damage and nongenotoxic stress-regulated
    gene that is deregulated in human malignancies.
  findings:
  - statement: >-
      nSMase3 (SKNY) localizes to the ER; expression is up-regulated by genotoxic
      (Adriamycin) and nongenotoxic (TNF-alpha) stress and its overexpression
      sensitizes cells to DNA-damage-induced apoptosis.
    reference_section_type: ABSTRACT
    supporting_text: >-
      reveals nSMase3 to localize to
      the endoplasmic reticulum (ER)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes ER localization and the stress-response/proapoptotic role.
      Abstract-only cache.
- id: PMID:25180167
  title: Neutral sphingomyelinase-3 mediates TNF-stimulated oxidant activity in skeletal
    muscle.
  findings:
  - statement: >-
      Endogenous nSMase3 provides constitutive Mg2+-dependent neutral
      sphingomyelinase activity in skeletal muscle and resides in internal and
      sarcolemmal membranes; nSMase3a is required for TNF-stimulated oxidant
      production.
    reference_section_type: ABSTRACT
    supporting_text: >-
      We demonstrate constitutive nSMase activity in skeletal muscles of
  - statement: >-
      nSMase3 is present at both internal and sarcolemmal membranes in muscle.
    reference_section_type: ABSTRACT
    supporting_text: >-
      nSMase3 resides in both internal and
      sarcolemmal membranes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; confirms catalytic activity, muscle localization
      (including sarcolemma), and a TNF/redox signalling role. Note the study is
      predominantly in mouse muscle and C2C12 myotubes with corroborating human
      diaphragm data.
- id: PMID:31495489
  title: Loss of SMPD4 Causes a Developmental Disorder Characterized by Microcephaly
    and Congenital Arthrogryposis.
  findings:
  - statement: >-
      Bi-allelic loss-of-function SMPD4 variants cause a neurodevelopmental
      disorder; SMPD4 localizes to the outer nuclear envelope and ER, interacts
      with nuclear pore proteins, and its loss causes ER abnormalities, increased
      apoptosis susceptibility, and delayed cell-cycle progression.
    reference_section_type: ABSTRACT
    supporting_text: >-
      localization both to the outer nuclear envelope and the ER and additionally
      revealed interactions with several nuclear pore complex proteins
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Defines the human disease (NEDMABA) and the
      ER/nuclear-envelope and cell-fate role; source of the ER organization IMP
      and nuclear-envelope/outer-nuclear-membrane annotations.
- id: Reactome:R-HSA-1606288
  title: SMPD4 hydrolyzes sphingomyelin (ER membrane)
  findings: []
  reference_review:
