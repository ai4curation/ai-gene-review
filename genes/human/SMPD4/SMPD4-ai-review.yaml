suggested_questions:
- question: >-
    Which sphingomyelin species and membrane compartments (ER vs outer nuclear
    envelope vs Golgi) does SMPD4 preferentially act on in situ, and how does the
    resulting ceramide pool differ functionally from that produced by SMPD2/SMPD3?
- question: >-
    How does SMPD4 loss mechanistically link sphingolipid homeostasis to
    ER-to-nuclear-envelope crosstalk, mitotic progression, and the microcephaly
    phenotype?
suggested_experiments:
- description: >-
    Lipidomic quantification of ceramide/sphingomyelin species in SMPD4-null vs
    wild-type patient fibroblasts and neural progenitors, with rescue by
    catalytically active vs catalytically dead SMPD4.
- description: >-
    Reconstitute purified SMPD4 in defined liposomes to confirm the EC 3.1.4.12
    (type-C) reaction stoichiometry (phosphocholine + ceramide) and the Mg2+
    requirement, formally excluding SMase-D (ceramide-1-phosphate) activity.
