- term:
    id: GO:0046475
    label: glycerophospholipid catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Sphingomyelin is a phosphosphingolipid, not a glycerophospholipid (its
      backbone is sphingosine, not glycerol). SMPD4 acts on sphingomyelin and
      there is no evidence it hydrolyses glycerophospholipids. This IBA-propagated
      term mis-classifies the sphingomyelinase reaction under the wrong lipid
      class and over-annotates the gene.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      SMPD4 hydrolyses sphingomyelin (a sphingolipid), not glycerophospholipids;
      the correct process is sphingomyelin catabolism (GO:0006685), already
      annotated.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
