        source_label: SMPD4 family node
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          Family sphingomyelinase activity is real, but the substrate is
          sphingomyelin (a phosphosphingolipid), so the glycerophospholipid
          catabolism term is the wrong lipid class.
- term:
    id: GO:0050290
    label: sphingomyelin phosphodiesterase D activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Wrong molecular function term. GO:0050290 is sphingomyelinase D activity
      (EC 3.1.4.41), which cleaves sphingomyelin to ceramide-1-phosphate and
      choline. SMPD4/nSMase3 is a type-C sphingomyelinase (EC 3.1.4.12) that
      releases ceramide and phosphocholine, as stated by UniProt (EC=3.1.4.12)
      and demonstrated experimentally. Modify to GO:0004767 sphingomyelin
      phosphodiesterase activity.
    action: MODIFY
    reason: >-
      Enzyme is a neutral sphingomyelinase (type C, EC 3.1.4.12), not a
      sphingomyelinase D (EC 3.1.4.41); GO:0050290 describes the wrong reaction
      product (ceramide-1-phosphate + choline vs ceramide + phosphocholine).
    proposed_replacement_terms:
    - id: GO:0004767
      label: sphingomyelin phosphodiesterase activity
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - GRANULARITY_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000988169
        source_label: SMPD4 family node
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: >-
          The family is sphingomyelinase, but the propagated term is the
          SMase-D reaction (EC 3.1.4.41); the correct term is the type-C
          sphingomyelinase GO:0004767 (EC 3.1.4.12).
    supported_by:
    - reference_id: file:human/SMPD4/SMPD4-uniprot.txt
      supporting_text: "EC=3.1.4.12"
