suggested_questions:
- question: Given that TRIM16 lacks a canonical RING domain, what is the structural and mechanistic basis for its reported B-box-dependent E3 ubiquitin ligase activity, and is the activity intrinsic or dependent on heterodimerization with RING-bearing TRIMs?
- question: The current GOA annotations for TRIM16 do not include an autophagy biological-process term despite the well-established galectin-3/lysophagy role - should an autophagy/selective-autophagy-receptor annotation be added based on PMID:27693506?
suggested_experiments:
- description: Reconstitute TRIM16 E3 ligase activity in vitro with purified TRIM16 (wild-type vs B-box mutants) and candidate E2s to determine whether autoubiquitination/substrate ubiquitination is intrinsic to the B-boxes or requires a heterodimeric RING-bearing TRIM partner.
- description: Use galectin-3- and ULK1-phosphosite TRIM16 mutants in lysosomal-damage assays (e.g. LLOMe treatment) to dissect how galectin-3 binding and ULK1 phosphorylation control TRIM16-directed lysophagy and aggregate clearance.
