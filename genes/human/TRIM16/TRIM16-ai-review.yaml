id: O95361
gene_symbol: TRIM16
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TRIM16 (estrogen-responsive B box protein, EBBP) is a cytoplasmic member of the
  TRIM/RBCC family that is atypical in lacking a canonical N-terminal RING domain:
  its architecture comprises B-box zinc finger(s), a coiled-coil that mediates
  homodimerization (and heterodimerization with other TRIMs such as MID1, TRIM24
  and PML), and a C-terminal B30.2/SPRY domain. Despite lacking a RING, TRIM16 has
  been reported to act as an atypical E3 ubiquitin ligase that autoubiquitinates
  via its B-boxes. Its principal modern function is in selective autophagy of
  damaged endomembranes: TRIM16 serves as a scaffold/receptor that, in a
  ULK1-dependent manner, interacts with galectin-3 (LGALS3) to sense and direct
  autophagy of damaged lysosomes and phagosomes (lysophagy), and it assembles core
  autophagy machinery (BECN1, ATG16L1, SQSTM1/p62 and LC3B/MAP1LC3B) to drive
  autophagic clearance of protein aggregates. Through these activities it regulates
  the p62-KEAP1-NRF2 axis (modulating NRF2 ubiquitination and stability) and
  protects cells against oxidative-stress-induced death following endomembrane
  damage; it is itself phosphorylated by ULK1. TRIM16 localizes mainly to the
  cytoplasm/cytosol (and has been observed in nuclear PML bodies). It was
  originally characterized as the estrogen-responsive B box protein with reported
  roles in keratinocyte differentiation, retinoid (retinoic acid receptor)
  signaling, interleukin-1beta production (binding IL-1 and the NALP1 NACHT domain),
  and tumor suppression (inhibiting cytoplasmic vimentin and nuclear E2F1 in
  neuroblastoma).
