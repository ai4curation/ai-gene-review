id: P19440
gene_symbol: GGT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GGT1 (gamma-glutamyltransferase 1 / gamma-glutamyl transpeptidase, GGT; CD224) is a
  cell-surface, extracellular-facing ectoenzyme that catalyzes the first and rate-limiting
  step of extracellular glutathione (GSH) catabolism and the gamma-glutamyl cycle. It is a
  single-pass type II membrane glycoprotein of the N-terminal-nucleophile (Ntn) hydrolase
  family; the 569-residue precursor is autocatalytically cleaved into a heavy chain and a
  light chain, and the N-terminal threonine of the light chain (Thr-381) is the catalytic
  nucleophile that resides in the enzyme active site. GGT1 hydrolyzes the gamma-glutamyl bond
  of extracellular glutathione (gamma-Glu-Cys-Gly), releasing free L-glutamate and the
  dipeptide L-cysteinylglycine (subsequently split to cysteine and glycine by dipeptidases),
  thereby salvaging cysteine for intracellular glutathione resynthesis. When a suitable
  acceptor amino acid or dipeptide is present at high concentration it instead transfers the
  gamma-glutamyl moiety to that acceptor (transpeptidation, EC 2.3.2.2). The same catalytic
  center also cleaves glutathione S-conjugates and the cysteinyl leukotriene C4, converting
  LTC4 to LTD4 (EC 3.4.19.14) and processing drug/xenobiotic mercapturates and specialized
  lipid-mediator conjugates. GGT1 is expressed most strongly on the apical/brush-border
  surface of kidney and liver epithelia and is central to cysteine and glutathione
  homeostasis, cysteinyl-leukotriene metabolism, and detoxification. Loss-of-function causes
  the rare autosomal-recessive disorder glutathionuria, and elevated serum GGT is a clinical
  hepatobiliary biomarker.
