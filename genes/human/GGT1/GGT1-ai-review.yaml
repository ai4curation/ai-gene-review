    reason: >-
      GGT1 is a glutathione hydrolase, not a GSH biosynthetic enzyme; the biosynthesis link is
      only indirect (cysteine salvage). Over-annotation transferred by orthology (ISS from
      mouse Ggt1). Flagged, not removed.
