core_functions:
- description: >-
    Cleaves the gamma-glutamyl amide bond of extracellular glutathione (gamma-Glu-Cys-Gly) as
    the first, rate-limiting step of extracellular glutathione catabolism / the gamma-glutamyl
    cycle. The gamma-glutamyl group is transferred either to water (hydrolysis, the predominant
    physiologic reaction, yielding L-glutamate + L-cysteinylglycine) or, when a suitable
    acceptor amino acid/dipeptide is present at high concentration, to that acceptor
    (transpeptidation, EC 2.3.2.2, the classic gamma-glutamyltransferase reaction). GO directs
    the obsolete gamma-glutamyltransferase term to this glutathione hydrolase term, so both
    reactions are represented here.
  molecular_function:
    id: GO:0036374
    label: glutathione hydrolase activity
  directly_involved_in:
  - id: GO:0006751
    label: glutathione catabolic process
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:21447318
    supporting_text: >-
      The Km for hydrolysis with GSH as a substrate was 10.60
  - reference_id: file:human/GGT1/GGT1-uniprot.txt
    supporting_text: >-
      Cleaves the gamma-glutamyl bond of extracellular glutathione
- description: >-
    Hydrolyzes the cysteinyl leukotriene C4 (LTC4) to leukotriene D4 (LTD4) plus glutamate
    (EC 3.4.19.14), a step in cysteinyl-leukotriene metabolism; also cleaves other glutathione
    S-conjugates (drug mercapturates, lipid-mediator conjugates).
  molecular_function:
    id: GO:0002951
    label: leukotriene-C(4) hydrolase activity
  directly_involved_in:
  - id: GO:1901750
    label: leukotriene D4 biosynthetic process
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:21447318
    supporting_text: >-
      The Km for LTC4 was 10.8
  - reference_id: PMID:14754911
    supporting_text: >-
      Our data demonstrate a complete deficiency of LTD(4) biosynthesis in
suggested_questions:
- question: >-
    Under physiological conditions in vivo, what fraction of GGT1 flux is hydrolysis versus
    transpeptidation, and which (if any) endogenous gamma-glutamyl acceptors matter?
- question: >-
    Which of the pleiotropic phenotypes attributed to GGT1 (immune/inflammatory regulation,
    spermatogenesis, bone resorption) are direct versus secondary to systemic cysteine/GSH
    deficiency?
suggested_experiments:
- description: >-
    Structure-guided separation-of-function mutants (e.g. altering acceptor-site residues) to
    dissect hydrolysis from transpeptidation and test their distinct physiological
    contributions.
- description: >-
    Tissue-specific / apical-surface reporter assays quantifying LTC4->LTD4 versus GSH
    turnover by native human GGT1 to establish the in vivo balance of its glutathionase and
    leukotrienase roles.
