- id: PMID:11313340
  title: 'cAmp regulation of arylalkylamine N-acetyltransferase (AANAT, EC 2.3.1.87):
    a new cell line (1E7) provides evidence of intracellular AANAT activation.'
  findings:
  - statement: >-
      Human AANAT is the penultimate enzyme of melatonin synthesis; the 1E7 cell line
      shows cytoplasmic hAANAT that is activated ~8-fold by cAMP-elevating treatments
      without a change in protein abundance, indicating a post-translational activation
      switch.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false). Directly establishes human
      AANAT catalytic activity, cytoplasmic localization, and cAMP activation; the
      UniProt EC and cytoplasm experimental evidence derive from this paper.
- id: PMID:12736803
  title: Significant association of the arylalkylamine N-acetyltransferase (AA-NAT)
    gene with delayed sleep phase syndrome.
  findings:
  - statement: >-
      A coding variant (Ala129Thr) of the human AA-NAT gene is significantly associated
      with delayed sleep phase syndrome, consistent with AANAT's role in circadian
      melatonin rhythm.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Supports the circadian-rhythm (IMP) annotation and the
      A129T variant recorded in UniProt (VAR_055086).
