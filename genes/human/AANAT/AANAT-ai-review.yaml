id: Q16613
gene_symbol: AANAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AANAT (serotonin N-acetyltransferase, arylalkylamine N-acetyltransferase, AA-NAT)
  is a cytosolic, acetyl-CoA-dependent GNAT-family acetyltransferase (EC 2.3.1.87)
  that catalyzes the penultimate step of melatonin biosynthesis: the N-acetylation
  of serotonin (5-hydroxytryptamine) to N-acetylserotonin, using acetyl-CoA and
  releasing CoA. It is the rate-controlling, circadian-regulated enzyme of the
  melatonin pathway (the pineal "timezyme"), most highly expressed in the pineal
  gland and at lower levels in the retina. Its activity rises sharply at night; the
  enzyme is regulated by cAMP/PKA-dependent phosphorylation at Thr-31 and Ser-205,
  which promotes binding of 14-3-3 proteins that stabilize and activate it and
  protect it from dephosphorylation and proteasomal degradation, while light triggers
  its rapid degradation. Through this control it couples pineal melatonin output to
  the circadian clock and photoperiod. A coding variant (A129T) has been associated
  with delayed sleep phase syndrome.
