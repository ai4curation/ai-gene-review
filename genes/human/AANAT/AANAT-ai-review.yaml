- id: Reactome:R-HSA-209792
  title: N-acetylation of serotonin
  findings:
  - statement: >-
      AANAT catalyzes the N-acetylation of serotonin to form N-acetylserotonin, using
      acetyl-CoA as the acetyl donor.
    reference_section_type: DATABASE_ENTRY
  reference_review:
