- term:
    id: GO:0006474
    label: N-terminal protein amino acid acetylation
  evidence_type: IDA
  original_reference_id: PMID:11313340
  qualifier: involved_in
  review:
    summary: >-
      This annotation is a misclassification. AANAT N-acetylates the primary amine of
      small-molecule arylalkylamines (serotonin -> N-acetylserotonin); it does not
      acetylate the alpha-amino group of protein N-termini. The cited paper concerns
      intracellular activation of serotonin N-acetyltransferase activity, not N-terminal
      protein acetylation, and provides no evidence for protein N-terminal acetylation.
      This appears to conflate small-molecule N-acetylation with protein N-terminal
      acetylation. Because it is an experimental (IDA) annotation, it is marked as
      over-annotated rather than removed; the correct MF is aralkylamine
      N-acetyltransferase activity (GO:0004059).
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:11313340
      supporting_text: >-
        Arylalkylamine N-acetyltransferase (serotonin N-acetyltransferase, AANAT, EC )
        is the penultimate enzyme in melatonin synthesis.
