      FANCD2/FANCI with FANCL); UniProt notes the all-seven-lysine polyubiquitination is
      an in-vitro capacity. Over-annotation of the biological role.
    supported_by:
    - reference_id: PMID:20061386
      supporting_text: >-
        Because this study was performed in the absence of an E3 enzyme, our data
        indicate that the E2 enzymes are capable of directing the ubiquitination process
        to distinct subsets of ubiquitin lysines
