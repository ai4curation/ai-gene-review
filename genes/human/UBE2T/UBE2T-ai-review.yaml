id: Q9NPD8
gene_symbol: UBE2T
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UBE2T (ubiquitin-conjugating enzyme E2 T; also PIG50/HSPC150) is the E2
  ubiquitin-conjugating enzyme of the Fanconi anemia (FA) DNA interstrand
  cross-link repair pathway. It is a 197-residue member of the UBC family with a
  canonical ubiquitin-conjugating catalytic core and active-site Cys86 that forms
  the ubiquitin thioester intermediate. UBE2T pairs specifically and exclusively
  with the RING E3 ubiquitin ligase FANCL of the FA core complex, and this cognate
  E2/E3 holoenzyme catalyzes the site-specific monoubiquitination of FANCD2 (and of
  FANCI) — the central activating step of the FA pathway that promotes recruitment
  of downstream DNA repair factors to interstrand cross-links and stalled
  replication forks. FANCL selectivity for UBE2T is achieved through an extensive
  electrostatic/hydrogen-bond network beyond the generic hydrophobic E2/E3
  interface, with Arg60 of UBE2T acting as the key positive selector. Regulation of
  FANCD2 monoubiquitination occurs by DNA-damage-induced localization of the
  enzymes to chromatin rather than by assembly of the core complex; UBE2T is
  constitutively present in the nuclear/chromatin compartment. UBE2T also undergoes
  self-limiting automonoubiquitination (Lys-91/Lys-182) that has been reported to
  down-regulate its activity. Biallelic loss-of-function of UBE2T causes Fanconi
  anemia (complementation group FANCT/FA-T), a chromosomal-instability disorder
  with bone marrow failure, developmental malformations, and cancer predisposition.
  Additional activities reported outside the canonical pathway — polyubiquitination
  and downregulation of BRCA1 in overexpressing breast-cancer cells, and an
  intrinsic in-vitro ability (in the absence of an E3) to build polyubiquitin chains
  through several ubiquitin lysines — are context-specific or non-physiological.
