core_functions:
- description: >-
    E2 ubiquitin-conjugating enzyme of the Fanconi anemia pathway: accepts ubiquitin
    from the E1 activating enzyme via active-site Cys86 and, partnered with the
    cognate RING E3 ligase FANCL, catalyzes the DNA-damage-induced, site-specific
    monoubiquitination of FANCD2 (and FANCI) on chromatin, the central activating
    step of interstrand cross-link repair.
  supported_by:
  - reference_id: PMID:16916645
    supporting_text: >-
      UBE2T is the ubiquitin-conjugating enzyme (E2) essential for this pathway. UBE2T
      binds to FANCL, the ubiquitin ligase subunit of the Fanconi anemia core complex,
      and is required for the monoubiquitination of FANCD2 in vivo.
  - reference_id: PMID:19111657
    supporting_text: >-
      addition of the FANCI protein enhances monoubiquitination and also restricts it
      to the in vivo substrate lysine residue on FANCD2
  molecular_function:
    id: GO:0061631
    label: ubiquitin conjugating enzyme activity
  directly_involved_in:
  - id: GO:0006513
    label: protein monoubiquitination
  - id: GO:0036297
    label: interstrand cross-link repair
  - id: GO:0006974
    label: DNA damage response
  locations:
  - id: GO:0005654
    label: nucleoplasm
