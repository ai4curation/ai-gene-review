- term:
    id: GO:0000209
    label: protein polyubiquitination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic (IBA) annotation to protein polyubiquitination, a family-level
      capability of UBC E2s. UBE2T can drive polyubiquitination in vitro and
      polyubiquitinates BRCA1 in overexpression settings, but its physiological FA
      role is monoubiquitination of FANCD2/FANCI.
    action: KEEP_AS_NON_CORE
    reason: >-
      Not incorrect — UBE2T has demonstrable polyubiquitination capacity
      (PMID:20061386, PMID:19887602) — but polyubiquitination is not the core
      biological function of UBE2T, which is site-specific monoubiquitination in the
      FA pathway. Retained as a valid non-core annotation.
- term:
    id: GO:0061631
    label: ubiquitin conjugating enzyme activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) annotation to the core E2 ubiquitin-conjugating enzyme
      activity. This is the defining molecular function of UBE2T.
    action: ACCEPT
    reason: >-
      Well supported at both the family (IBA) and gene-specific experimental levels.
      UBE2T is the E2 essential for the FA pathway, accepting ubiquitin from E1 and,
      with FANCL, transferring it to FANCD2/FANCI. This is the correctly specific MF
      term for an E2 and represents the core function.
    supported_by:
