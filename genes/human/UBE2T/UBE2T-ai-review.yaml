- id: PMID:16916645
  title: UBE2T is the E2 in the Fanconi anemia pathway and undergoes negative autoregulation.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Foundational paper establishing UBE2T as the E2 of the FA pathway: binds FANCL,
      required for FANCD2 monoubiquitination in vivo, depletion causes FA-like
      chromosomal abnormalities, and undergoes inactivating automonoubiquitination.
      Abstract verified against PubMed; supporting quotes are verbatim from the cached
      abstract.
- id: PMID:17938197
  title: 'UBE2T, the Fanconi anemia core complex, and FANCD2 are recruited independently
    to chromatin: a basis for the regulation of FANCD2 monoubiquitination.'
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes that FANCD2 monoubiquitination is regulated by DNA-damage-induced
      chromatin localization of an active E2/E3 holoenzyme rather than by core-complex
      assembly, and that UBE2T is constitutively present in the chromatin compartment.
      Full text available and quotes verified verbatim.
- id: PMID:19111657
  title: Mechanistic insight into site-restricted monoubiquitination of FANCD2 by
    Ube2t, FANCL, and FANCI.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Minimal reconstitution of FANCD2 monoubiquitination with Ube2t + FANCL; FANCL
      RWD-like domain stimulates the reaction and FANCI restricts it to the
      physiological substrate lysine. Also maps autoubiquitination sites (Lys-91/182).
      Abstract quotes verified verbatim.
- id: PMID:19589784
  title: FANCI binds branched DNA and is monoubiquitinated by UBE2T-FANCL.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Demonstrates in-vitro monoubiquitination of FANCI on Lys-523 by the UBE2T-FANCL
      pair, extending UBE2T's substrate set beyond FANCD2. Full text available; quote
      verified verbatim.
- id: PMID:19887602
  title: Ubiquitination and downregulation of BRCA1 by ubiquitin-conjugating enzyme
    E2T overexpression in human breast cancer cells.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Reports UBE2T overexpression-driven BRCA1 polyubiquitination/downregulation and
      interaction with BRCA1/BARD1 in breast cancer cells; Cys86-dependent. A
      context-specific (overexpression/cancer) activity, not the canonical FA-pathway
      function. Abstract verified.
- id: PMID:20061386
  title: The E2 ubiquitin-conjugating enzymes direct polyubiquitination to preferred
    lysines.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Systematic in-vitro survey of all human E2s in the ABSENCE of E3, assigning
      intrinsic lysine preferences; source of the K6/K11/K27/K29/K48/K63 linkage
      annotations for UBE2T. Confirms UBE2T E2 activity but the linkage-specific
      polyubiquitination reflects in-vitro capacity, not physiological function. Full
      text (cached extract) truncated at the introduction; abstract quotes verified
      verbatim.
- id: PMID:24389026
  title: Structure of the human FANCL RING-Ube2T complex reveals determinants of cognate
    E3-E2 selection.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Crystal structure of the FANCL RING-Ube2T complex; defines the exclusive,
      cognate E3-E2 pairing and identifies Arg60 of UBE2T as the positive selector for
      FANCL. Full text available; quotes verified verbatim. Also the source of the
      FANCL IPI 'protein binding' annotation.
- id: PMID:32814053
  title: Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins
    and Uncovers Widespread Protein Aggregation in Affected Brains.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale neurodegenerative-disease Y2H interactome; source of the UBE2T-GNB2
      binary interaction underlying a generic 'protein binding' annotation. Interaction
      of unclear functional significance for UBE2T; correctly cited but low relevance
      to the gene's core function.
- id: PMID:26046368
  title: Mutations in the gene encoding the E2 conjugating enzyme UBE2T cause Fanconi
    anemia.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes the gene-disease link (Fanconi anemia complementation group FA-T):
      biallelic UBE2T mutations, p.Gln2Glu abolishing FANCD2 monoubiquitination and
      FANCL interaction. Not in GOA but central to interpreting UBE2T's biology; cited
      in the description. Abstract verified.
