gene_symbol: ALDH7A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ALDH7A1 (antiquitin; alpha-aminoadipic semialdehyde dehydrogenase, EC 1.2.1.31) is the NAD+-dependent aldehyde dehydrogenase that catalyses the key step of the saccharopine pathway of L-lysine catabolism, oxidising L-alpha-aminoadipate-6-semialdehyde ((S)-2-amino-6-oxohexanoate, AASA) to L-2-aminoadipate. AASA is in spontaneous equilibrium with its cyclic Schiff base delta-1-piperideine-6-carboxylate (P6C). The enzyme is a homotetramer with a conserved catalytic cysteine (Cys330) and glutamate (Glu296), and is broadly conserved from plants (where the ortholog protects against osmotic, saline and dehydration stress) to humans. Beyond its saccharopine-pathway role, ALDH7A1 is a broad-specificity NAD+-aldehyde dehydrogenase that also oxidises the osmolyte precursor betaine aldehyde to betaine and detoxifies medium-chain and lipid-peroxidation-derived aldehydes such as 4-hydroxynonenal and malonaldehyde, contributing to protection against hyperosmotic and oxidative stress. A cytosolic
  isoform additionally generates membrane-associated NADH that supports AIFM2/FSP1-dependent suppression of ferroptosis and, during hypoxia and starvation, inhibits COPI-mediated intracellular transport to conserve cellular energy. The protein is found in mitochondria (isoform 1) and in the cytosol, nucleus, plasma membrane and Golgi (isoform 2). Biallelic loss-of-function variants abolish AASA-dehydrogenase activity; the accumulating P6C inactivates pyridoxal-5'-phosphate by Knoevenagel condensation, causing pyridoxine-dependent epilepsy.
