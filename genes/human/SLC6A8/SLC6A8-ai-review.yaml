core_functions:
- description: >-
    Sodium- and chloride-dependent symport of creatine across the plasma membrane,
    coupling the inward Na+ and Cl- electrochemical gradients to import creatine into
    the cell (approx. 2 Na+ : 1 Cl- : 1 creatine), thereby supplying creatine to the
    cellular creatine/phosphocreatine energy-buffer system in muscle, brain and other
    energy-demanding tissues.
  molecular_function:
    id: GO:0005309
    label: creatine:sodium symporter activity
  directly_involved_in:
  - id: GO:0015881
    label: creatine transmembrane transport
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:9882430
    supporting_text: >-
      induced a Na+- and Cl--dependent creatine uptake activity that saturated with a Km of
      approximately 20 microM for creatine
  - reference_id: PMID:7953292
    supporting_text: >-
      mediated high affinity (Km = 77 +/- 6 microM) creatine uptake, which was blocked by
      creatine analogs with high affinity. There was no specific transport of choline
  - reference_id: PMID:22644605
    supporting_text: Mutations led to the complete loss of both electrogenic and transport activities
suggested_questions:
- question: >-
    Does SLC6A8 transport guanidinoacetate (the GAMT substrate) to any physiologically
    relevant degree, or is it strictly selective for creatine among the guanidino compounds?
suggested_experiments:
- hypothesis: >-
    SLC6A8 selectively imports creatine and does not efficiently transport guanidinoacetate
    or other amino acids/neurotransmitters.
  description: >-
    Side-by-side radiolabeled/LC-MS uptake assays in SLC6A8-expressing cells comparing
    creatine, guanidinoacetate, GABA, taurine and betaine, with Na+/Cl- dependence and
    competition controls, to quantify substrate selectivity.
  experiment_type: transport assay
