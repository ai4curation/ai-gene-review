id: P48029
gene_symbol: SLC6A8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC6A8 (creatine transporter 1, CRT/CT1) is a sodium- and chloride-dependent
  plasma membrane creatine transporter of the SLC6 (SNF/neurotransmitter:sodium
  symporter) family. The 635-residue, 12-transmembrane protein couples the inward
  electrochemical gradients of Na+ and Cl- to import creatine into cells with a
  stoichiometry of approximately 2 Na+ : 1 Cl- : 1 creatine, generating an
  electrogenic, high-affinity (micromolar Km) uptake that is highly specific for
  creatine and closely related guanidino compounds; it does not transport choline
  or the neurotransmitter GABA despite its family relationship to GABA, taurine and
  betaine transporters. It is the transport arm of the creatine/phosphocreatine
  energy-buffer system, distributing blood-borne creatine to tissues with high and
  fluctuating energy demand. It is most strongly expressed in skeletal muscle,
  kidney and heart, with lower expression in brain, and is also present in intestine
  and other epithelia; in polarized epithelial cells (intestine, kidney) it localizes
  to the apical plasma membrane. It mediates creatine entry into the brain across the
  blood-brain barrier. Loss-of-function variants cause X-linked cerebral creatine
  deficiency syndrome 1 (creatine transporter deficiency), characterized by
  intellectual disability, severe speech delay, behavioral abnormalities and seizures.
