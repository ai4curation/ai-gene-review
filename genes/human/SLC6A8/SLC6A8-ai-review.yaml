  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      This IBA annotation, propagated from GABA/monoamine transporter relatives in the
      SLC6 family, assigns the wrong substrate. SLC6A8 transports creatine, not GABA;
      GABA does not inhibit creatine uptake, indicating it is not a substrate.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Wrong-substrate over-annotation derived from family phylogeny. The experimentally
      verified molecular function is creatine:sodium symporter activity (GO:0005309).
      GABA is not transported.
    supported_by:
