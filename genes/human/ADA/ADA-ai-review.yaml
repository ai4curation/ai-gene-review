- term:
    id: GO:0009168
    label: purine ribonucleoside monophosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: InterPro2GO electronic mapping to purine ribonucleoside monophosphate
      biosynthesis. ADA is a catabolic deaminase acting on nucleosides (adenosine,
      2'-deoxyadenosine); it does not synthesize any purine ribonucleoside monophosphate.
