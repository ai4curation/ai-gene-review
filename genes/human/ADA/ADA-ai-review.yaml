- term:
    id: GO:0043103
    label: hypoxanthine salvage
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic inference associating ADA with hypoxanthine salvage. ADA
      produces inosine; hypoxanthine is generated downstream by purine nucleoside
      phosphorylase (PNP), not by ADA itself.
    action: MARK_AS_OVER_ANNOTATED
    reason: ADA contributes to purine salvage upstream by generating inosine, but it
      does not catalyze any step producing or reutilizing hypoxanthine. Annotating
      ADA to hypoxanthine salvage over-extends the enzyme into a downstream pathway
      step carried out by other enzymes (PNP, HPRT). The upstream inosine-biosynthesis
      and adenosine-catabolism annotations already capture ADA's true contribution.
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - GRANULARITY_MISMATCH
      source_entities:
