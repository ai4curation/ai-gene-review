id: P00813
gene_symbol: ADA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Adenosine deaminase (ADA1; EC 3.5.4.4) is a zinc-dependent hydrolase of
  purine catabolism that catalyzes the irreversible hydrolytic deamination of adenosine
  to inosine and of 2'-deoxyadenosine to 2'-deoxyinosine, releasing ammonia. Each subunit
  binds one catalytic zinc ion (coordinated by conserved histidine and aspartate residues)
  and adopts the metallo-dependent hydrolase (TIM-barrel) fold of the adenosine/AMP deaminase
  family. By clearing (deoxy)adenosine it maintains adenosine homeostasis and is essential
  in lymphocytes, where loss of activity leads to toxic intracellular accumulation of
  2'-deoxyadenosine and dATP; complete deficiency causes adenosine-deaminase-deficient severe
  combined immunodeficiency (ADA-SCID, a T-B-NK-negative SCID), while a partial excess of
  activity is associated with hereditary hemolytic anemia. The enzyme is predominantly
  cytosolic (also detectable in lysosomes), but a fraction is found at the cell surface as
  ecto-ADA, where it is anchored as a peripheral membrane protein via the ectoenzyme CD26/DPP4;
  ecto-ADA catabolizes extracellular adenosine (notably in hypoxic endothelium), modulates
  adenosine-receptor signaling, and serves as a T-cell costimulatory molecule and regulator
  of lymphocyte-epithelial cell adhesion. ADA also deaminates the nucleoside drug ribavirin
  and the natural product cordycepin.
