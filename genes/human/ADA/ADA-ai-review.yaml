suggested_questions:
- question: Are the cell-surface (ecto-ADA), cytosolic, and lysosomal pools of ADA
    the product of a single gene/transcript, and how is surface localization (via
    CD26/DPP4) achieved given ADA lacks a signal peptide or transmembrane domain?
- question: To what extent are ADA's extra-enzymatic (moonlighting) roles in T-cell
    costimulation and cell adhesion mechanistically separable from its catalytic clearance
    of extracellular adenosine?
suggested_experiments:
- description: Catalytically-dead (e.g. zinc-site) ADA knock-in versus wild-type rescue
    in ADA-deficient lymphocytes to dissect enzyme-dependent versus CD26-binding (moonlighting)
    contributions to T-cell activation and adhesion.
- description: Quantitative subcellular fractionation plus surface biotinylation across
    cell types to measure the relative sizes of the cytosolic, lysosomal, and ecto-ADA
    pools and their dependence on CD26 expression.
