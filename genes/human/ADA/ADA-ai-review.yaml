- term:
    id: GO:0060169
    label: negative regulation of adenosine receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Inference that ADA negatively regulates adenosine-receptor signaling.
      By catabolizing extracellular adenosine (the receptor agonist), ecto-ADA reduces
      adenosine-receptor activation; the net effect can be complex, since ADA can also
      allosterically enhance receptor agonist affinity.
    action: KEEP_AS_NON_CORE
    reason: A real downstream signaling consequence of ADA's extracellular adenosine
      clearance, but secondary to the core catabolic activity rather than a defining
      molecular function. Note the effect is context-dependent (ADA also acts as a
      positive allosteric modulator of ADORA1/ADORA2A).
