- term:
    id: GO:0006196
    label: AMP catabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: Ensembl-Compara electronic transfer of AMP catabolic process. ADA acts
      on the nucleosides adenosine and 2'-deoxyadenosine, not directly on the nucleotide
      AMP; the direct catalytic step on AMP is carried out by other enzymes (AMP deaminase,
      5'-nucleotidase).
    action: MARK_AS_OVER_ANNOTATED
    reason: This is a broad pathway-participation (involved_in) annotation rather than
      a direct-substrate claim. ADA does participate in overall AMP catabolism downstream
      (AMP is dephosphorylated to adenosine, which ADA then deaminates to inosine), so
      the term is not strictly wrong at the pathway level; but it is a nonspecific,
      ortholog-transferred over-annotation that does not capture ADA's actual catalytic
      step, so it is marked as over-annotated rather than treated as a core function.
