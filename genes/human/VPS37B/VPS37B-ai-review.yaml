id: Q9H9H4
gene_symbol: VPS37B
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: VPS37B is a VPS37-family ESCRT-I subunit that complexes with TSG101, VPS28, and MVB12/UBAP-family
  subunits. It supports ESCRT-I-dependent endosomal sorting of ubiquitinated cargo into multivesicular bodies 
  and contributes to ESCRT-I membrane-remodeling contexts. Current local evidence does not support 
  transferring the VPS37A-specific phagophore-closure role to VPS37B as a core annotation.
