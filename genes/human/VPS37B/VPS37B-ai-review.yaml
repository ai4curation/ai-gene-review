core_functions:
- description: VPS37B is a structural ESCRT-I subunit that helps organize the TSG101-VPS28-VPS37-MVB12/UBAP 
    complex for ubiquitin-dependent endosomal cargo sorting, MVB assembly, and ESCRT-I-linked reverse-topology
    membrane remodeling.
