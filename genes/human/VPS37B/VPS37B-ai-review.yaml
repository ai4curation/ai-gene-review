suggested_questions:
- question: Should VPS37B macroautophagy annotations be retired or kept non-core given that the direct 
    phagophore-closure evidence is VPS37A-specific?
  experts:
  - GO autophagy editors
  - GO ESCRT curators
- question: Should generic VPS37B protein-binding annotations be replaced by ESCRT-I complex membership and 
    specific endosomal sorting terms?
  experts:
  - GO molecular function editors
  - UniProt curators
suggested_experiments:
- experiment_type: VPS37 paralog phagophore closure comparison
  hypothesis: VPS37A, but not VPS37B, is the VPS37 paralog specialized for phagophore closure because VPS37B 
    lacks the VPS37A PUEV-dependent targeting function.
  description: Compare VPS37A, VPS37B, and VPS37C depletion/rescue in HT-LC3 autophagosome closure assays and 
    parallel EGFR MVB-sorting assays, using endogenous expression or matched rescue levels.
