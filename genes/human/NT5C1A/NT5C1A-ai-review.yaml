description: >-
  NT5C1A encodes cytosolic 5'-nucleotidase 1A (cN-IA; also cN-I / cN1A), a
  Mg2+-dependent cytosolic enzyme of the 5'-nucleotidase type 3 (haloacid
  dehalogenase-like phosphatase) family. It catalyzes hydrolysis of ribonucleoside
  and deoxyribonucleoside 5'-monophosphates to the corresponding nucleoside plus
  inorganic phosphate. It is AMP-preferring (AMP is the major substrate) but also
  hydrolyzes dCMP and IMP, and its activity is allosterically stimulated by ADP.
  By dephosphorylating AMP to adenosine, cN-IA is a principal intracellular source
  of adenosine during nucleotide (ATP) breakdown, a role that is physiologically
  prominent in skeletal muscle and in heart, where it can account for adenosine
  formation during ischemia. The protein is highly expressed in skeletal muscle
  and at intermediate levels in heart, brain, kidney and pancreas. cN-IA is also a
  well-known autoantigen: circulating anti-cN1A (anti-NT5C1A) autoantibodies are a
  serological marker of sporadic inclusion body myositis and related inflammatory
  myopathies.
core_functions:
  - description: >-
      AMP-preferring cytosolic 5'-nucleotidase that hydrolyzes AMP (and other
      ribo-/deoxyribonucleoside 5'-monophosphates) to the corresponding nucleoside
      plus inorganic phosphate, using a Mg2+ cofactor; the enzyme is allosterically
      activated by ADP.
