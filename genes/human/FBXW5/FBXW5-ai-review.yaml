suggested_questions:
- question: What determines partition of FBXW5 between the SCF(CUL1) and DCX(CRL4) ligases, and is substrate choice (SASS6/EPS8/kinesin-13 vs TSC2) dictated by which cullin scaffold FBXW5 engages?
- question: How is the cell-cycle timing of FBXW5 activity (G1/S reaccumulation, PLK4 inhibition, APC/C-mediated destruction) integrated to coordinate centriole duplication, mitotic cell-shape changes, and ciliogenesis?
suggested_experiments:
- description: Reconstitute SCF(FBXW5) and DCX(FBXW5) ligases in vitro with purified components and candidate substrates (SASS6, EPS8, MCAK/KIF2C, TSC2) to determine which cullin scaffold each substrate requires and to map ubiquitination sites and chain linkages.
- description: Use degron/auxin-inducible depletion of FBXW5 combined with quantitative proteomics and ubiquitinomics across the cell cycle to define the endogenous substrate repertoire and the relative contributions of the CUL1 vs CUL4 complexes.
