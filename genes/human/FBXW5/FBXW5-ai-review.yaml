id: Q969U6
gene_symbol: FBXW5
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXW5 (FBW5) is a 566-residue F-box/WD40-repeat protein that serves as a
  substrate-recognition subunit for cullin-RING E3 ubiquitin ligases. Through its
  N-terminal F-box domain it assembles into the canonical SCF (SKP1-CUL1-RBX1)
  ligase as the SCF(FBXW5) complex, while its WD40 repeats allow it to act as a
  DDB1-binding WD40 (DWD) protein that joins the DDB1-CUL4A/B-RBX1 (DCX/CRL4)
  ligase as the DCX(FBXW5) complex. As an adaptor, FBXW5 does not itself catalyze
  ubiquitin transfer (the RING subunit RBX1 recruits the E2) but selects
  substrates for polyubiquitination and proteasomal degradation. Its best-defined
  substrates are the centriolar cartwheel protein SASS6/HsSAS-6, whose
  S-phase degradation by SCF(FBXW5) restrains centriole reduplication; the
  actin-regulator EPS8, degraded during G2 to permit mitotic cell-shape changes;
  the tumor-suppressor TSC2, polyubiquitinated by the DCX(FBXW5) complex to
  control TSC1-TSC2 complex turnover and mTOR signaling; and kinesin-13
  microtubule depolymerases (MCAK/KIF2C, KIF2A, KIF2B), whose SCF(FBXW5)-mediated
  degradation in G2 lowers their levels at basal bodies and licenses ciliogenesis
  in the subsequent G1/G0. SCF(FBXW5) activity toward SASS6 is inhibited by PLK4
  phosphorylation of FBXW5 at Ser151, and FBXW5 itself is a cell-cycle-regulated
  protein degraded by the APC/C during mitosis and G1 and reaccumulating at the
  G1/S transition. FBXW5 has also been reported as a negative regulator of
  MAP3K7/TAK1 in IL-1B signaling. It is a predominantly cytoplasmic protein.
