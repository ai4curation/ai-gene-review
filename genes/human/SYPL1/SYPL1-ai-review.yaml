id: Q16563
gene_symbol: SYPL1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Synaptophysin-like protein 1 (SYPL1), also called pantophysin, is a broadly
  expressed four-pass integral membrane protein of small cytoplasmic transport
  vesicles. In non-neuroendocrine cells it marks constitutive-secretory and
  endocytic vesicles rather than the specialized synaptic vesicles occupied by
  synaptophysin and synaptoporin. In mammalian male germ cells, SYPL1 cooperates
  with VAMP3 in a trans-Golgi-derived vesicle pathway that generates and
  sequesters membranous saccules in the sperm cytoplasmic droplet. This pathway
  concentrates metabolic and volume-regulatory cargo needed for normal sperm
  maturation, morphology, motility, and fertility. SYPL1 is present in human
  sperm cytoplasmic droplets, while the causal genetic evidence comes from mouse.
  Its autonomous biochemical activity has not been established.
