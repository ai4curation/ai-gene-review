id: P11172
gene_symbol: UMPS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UMPS is the bifunctional uridine 5'-monophosphate synthase (UMP synthase) that catalyzes the final
  two steps of the de novo pyrimidine biosynthesis pathway on a single polypeptide. Its N-terminal
  orotate phosphoribosyltransferase (OPRT; EC 2.4.2.10) activity condenses orotate with
  5-phospho-alpha-D-ribose 1-diphosphate (PRPP) to form orotidine-5'-monophosphate (OMP), and its
  C-terminal orotidine-5'-phosphate decarboxylase (ODC / OMP decarboxylase; EC 4.1.1.23) activity
  decarboxylates OMP to uridine monophosphate (UMP), the parent pyrimidine ribonucleotide from which
  all other pyrimidine nucleotides are subsequently derived. The enzyme is cytosolic and functions as
  a homodimer. Loss of either catalytic activity causes hereditary orotic aciduria (orotic aciduria 1),
  an autosomal recessive disorder presenting with megaloblastic anemia, failure to thrive, and massive
  urinary orotic acid excretion that responds to uridine supplementation.
