- term:
    id: GO:0006225
    label: UDP biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: >-
      UDP biosynthesis is downstream of UMPS. UMPS produces UMP; conversion of UMP to UDP is carried
      out by a separate enzyme (UMP-CMP kinase). This annotation is an electronic ortholog transfer
      (Ensembl Compara, GO_REF:0000107) that mis-states the enzymatic product.
    action: REMOVE
    reason: >-
      Over-propagated IEA inference. The direct catalytic product of UMPS is UMP, not UDP; UDP is made
      by downstream kinases. This mapping is refutable on biochemical grounds. Per policy, REMOVE is
      appropriate for a demonstrably wrong electronic (IEA) inference.
    supported_by:
    - reference_id: PMID:9042911
      supporting_text: >-
        Uridine monophosphate (UMP) synthase is a bifunctional enzyme catalyzing the last two steps
        of de novo pyrimidine biosynthesis, orotate phosphoribosyltransferase (OPRT) and
        orotidine-5'-monophosphate decarboxylase (ODC)
