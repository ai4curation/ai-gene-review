core_functions:
- description: >-
    Kynurenine 3-monooxygenase (kynurenine 3-hydroxylase) activity: the FAD- and NADPH-dependent
    hydroxylation of L-kynurenine to 3-hydroxy-L-kynurenine (EC 1.14.13.9), the committed branch-point
    step of the kynurenine pathway that directs tryptophan-derived flux toward quinolinate and de novo
    NAD+ biosynthesis. This function requires the transmembrane-anchored, outer mitochondrial membrane
    enzyme and its bound FAD cofactor.
  molecular_function:
    id: GO:0004502
    label: kynurenine 3-monooxygenase activity
  supported_by:
  - reference_id: PMID:9237672
    supporting_text: "the hydroxylation of L-kynurenine to L-3-hydroxykynurenine"
    reference_section_type: ABSTRACT
  - reference_id: file:human/KMO/KMO-uniprot.txt
    supporting_text: "EC=1.14.13.9"
    reference_section_type: DATABASE_ENTRY
  directly_involved_in:
