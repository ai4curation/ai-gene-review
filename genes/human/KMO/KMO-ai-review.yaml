id: O15229
gene_symbol: KMO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  KMO is kynurenine 3-monooxygenase (kynurenine 3-hydroxylase; EC 1.14.13.9), an
  FAD-dependent, NADPH-dependent flavin monooxygenase of the aromatic-ring hydroxylase
  family that catalyzes the hydroxylation of L-kynurenine to 3-hydroxy-L-kynurenine,
  using molecular oxygen and NADPH. It is anchored in the outer mitochondrial membrane
  as a multi-pass membrane protein, with its transmembrane segments required for
  enzymatic activity, and binds one non-covalently associated FAD cofactor per subunit.
  KMO occupies the committed branch point of the kynurenine pathway of tryptophan
  catabolism: by converting kynurenine to 3-hydroxykynurenine it directs flux toward
  3-hydroxyanthranilate, quinolinate and de novo NAD+ biosynthesis, and away from the
  competing branch that yields the neuroprotective metabolite kynurenic acid. It is
  most highly expressed in liver, kidney and placenta and, in the brain, predominantly
  in microglia. Because its inhibition or loss shifts kynurenine-pathway flux toward
  neuroprotective kynurenic acid and reduces the neurotoxic metabolites 3-hydroxykynurenine
  and quinolinate, KMO is a major drug target in neurodegenerative disease and in
  inflammatory multi-organ failure.
