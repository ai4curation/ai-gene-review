    label: L-tryptophan catabolic process
  - id: GO:0019805
    label: quinolinate biosynthetic process
  - id: GO:0034354
    label: "'de novo' NAD+ biosynthetic process from L-tryptophan"
  locations:
  - id: GO:0005741
    label: mitochondrial outer membrane
- description: >-
    FAD binding: KMO is a flavoprotein that binds one non-covalently associated FAD cofactor per subunit,
    required for the flavin-monooxygenase catalytic cycle. The human enzyme was crystallized in complex
    with FAD (PDB 5X68).
  molecular_function:
