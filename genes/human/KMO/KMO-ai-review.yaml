- id: PMID:29208702
  title: Biochemistry and structural studies of kynurenine 3-monooxygenase reveal
    allosteric inhibition by Ro 61-8048.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Biochemical/structural study of human KMO with active-site mutagenesis
      (R85, Y99, N363, E366, M367, Y398 abolish/strongly reduce activity) and evidence that the
      C-terminal region is essential; supports the core catalytic MF annotation.
- id: PMID:29429898
  title: Structural Basis for Inhibitor-Induced Hydrogen Peroxide Production by Kynurenine
    3-Monooxygenase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Human KMO structure (PDB 5X68) in complex with FAD; defines FAD-binding residues
      and inhibitor-induced H2O2 production. Supports the core FAD-binding annotation and the non-core
      NAD(P)H oxidase side activity.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics
    in cellular context.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified large-scale quantitative mitochondrial proteome dataset. Provides HTP-level support
      for mitochondrial localization of KMO but is not KMO-specific; less informative than the experimental
      outer-mitochondrial-membrane evidence.
- id: PMID:9237672
  title: Cloning and functional expression of human kynurenine 3-monooxygenase.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Original cloning and functional expression of human KMO; establishes it as an
      NADPH-dependent flavin monooxygenase hydroxylating L-kynurenine, tissue expression (liver/placenta/kidney),
      and OMM localization. Foundational support for the core catalytic and localization annotations.
