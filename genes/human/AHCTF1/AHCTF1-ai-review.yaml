proposed_new_terms: []
suggested_questions:
- question: >-
    Does human AHCTF1/ELYS have separable direct requirements for NPC assembly versus kinetochore/chromosome-segregation
    functions in non-transformed human cells?
- question: >-
    Which chromatin features and Nup107-160 interfaces determine AHCTF1 recruitment during
    post-mitotic nuclear pore assembly?
- question: >-
    Is AHCTF1 included in proteostasis network source lists only through broad nuclear-pore/nucleocytoplasmic-transport
    projection, or is there direct evidence for protein homeostasis regulation?
suggested_experiments:
- description: >-
    Domain-rescue experiments in AHCTF1-depleted human cells comparing C-terminal chromatin-binding
    mutants and N-terminal Nup107-160-binding mutants for NPC assembly, nuclear import/export,
    and kinetochore phenotypes.
- description: >-
    Quantitative proximity labeling or AP-MS across mitosis to distinguish AHCTF1 interactions
    with chromatin, Nup107-160/Y-complex members, and kinetochore proteins.
- description: >-
    Proteostasis-focused stress assays after AHCTF1 perturbation that measure protein folding,
    ubiquitin-proteasome flux, and ER stress markers separately from secondary nuclear transport
    or cell-cycle defects.
