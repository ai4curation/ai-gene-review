id: Q8WYP5
gene_symbol: AHCTF1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AHCTF1 encodes ELYS/MEL-28, a large metazoan nucleoporin and chromatin-associated assembly
  factor for nuclear pore complexes. ELYS binds chromatin during nuclear reformation, recruits
  the Nup107-160/Y-complex scaffold to nascent nuclear pores, and localizes to nuclear pores,
  the nuclear envelope, chromatin, and kinetochores in a cell-cycle-dependent manner. Loss
  or perturbation of ELYS disrupts post-mitotic NPC assembly and produces chromosome segregation
  and cytokinesis defects, consistent with a core role in rebuilding the nuclear pore scaffold
  after open mitosis.
