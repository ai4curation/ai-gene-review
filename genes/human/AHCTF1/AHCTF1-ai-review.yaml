- term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  evidence_type: NAS
  original_reference_id: PMID:27016207
  qualifier: involved_in
  review:
    summary: >-
      Nucleocytoplasmic transport is a real downstream function of assembled NPCs, but it
      is too broad for AHCTF1 itself.
    action: MODIFY
    reason: >-
      AHCTF1/ELYS acts primarily as a chromatin-associated initiator/scaffold for post-mitotic
      NPC assembly. The better direct BP annotation is nuclear pore complex assembly rather
      than the generic transport process carried out by the assembled pore and transport receptors.
    proposed_replacement_terms:
