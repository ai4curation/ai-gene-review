    - reference_id: PMID:27341616
      supporting_text: ELYS binding to chromatin represents the first step in the post-mitotic building of the pore
    - reference_id: Reactome:R-HSA-9615901
      supporting_text: AHCTF1 (ELYS, MEL-28) selectively interacts with the Nup107-160 complex and acts as a seeding center for assembly of nuclear pore complexes
