- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-141409
  qualifier: located_in
  review:
    summary: >-
      This Reactome-derived cytosol annotation is not an informative AHCTF1 cellular-component
      call.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The Reactome event concerns mitotic kinetochore/spindle-checkpoint pathway biology rather
      than direct localization evidence for AHCTF1 itself. AHCTF1 does have bona fide kinetochore
      and NPC assembly roles, but propagating the generic cytosol component from these events
      obscures the evidence-supported nuclear pore/chromatin/kinetochore localization.
    additional_reference_ids:
    - PMID:17098863
    - PMID:27341616
    - Reactome:R-HSA-9615901
    supported_by:
    - reference_id: PMID:17098863
      supporting_text: At mitosis, ELYS targets to kinetochores
