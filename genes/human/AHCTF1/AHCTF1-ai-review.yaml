- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Nucleoplasm is supported as a reported interphase/nuclear location, but it is not the
      most specific functional compartment.
    action: KEEP_AS_NON_CORE
    reason: >-
      ELYS has nucleoplasmic signal in addition to nuclear envelope/NPC localization. Because
      the core role is chromatin-associated NPC assembly, nucleoplasm should be retained as
      a non-core location rather than used to define gene function.
    additional_reference_ids:
    - PMID:27341616
    - file:human/AHCTF1/AHCTF1-uniprot.txt
    supported_by:
    - reference_id: PMID:27341616
      supporting_text: Both orthologs depend on an intact beta-propeller domain and central alpha-helical domains for NPC and kinetochore organization.
