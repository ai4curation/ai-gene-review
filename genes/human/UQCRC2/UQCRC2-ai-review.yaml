- term:
    id: GO:0004222
    label: metalloendopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro (peptidase M16 family, IPR001431) electronically maps
      metalloendopeptidase activity. UQCRC2 retains the M16/MPP-like fold but is a
      non-catalytic core subunit: it lacks the canonical M16 inverted zinc-binding
      motif (HXXEH), and no peptidase activity has been demonstrated for human
      UQCRC2. UniProt only hedges that the core proteins "seem to have preserved"
      MPP properties (By similarity) and that UQCRC2 "May be involved" in UQCRFS1
      processing (Probable).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Fold-based electronic over-annotation. A sequence scan finds no HXXEH
      catalytic motif in mature UQCRC2, and Reactome lists UQCRC1/UQCRC2 only as
      possible (not demonstrated) candidates for the UQCRFS1-processing peptidase.
      PAN-GO/GO_Central assigns no catalytic MF. The activity is not part of the
      verified core function (structural subunit of Complex III), so it should not
      be treated as a real molecular function.
    supported_by:
    - reference_id: file:human/UQCRC2/UQCRC2-uniprot.txt
      supporting_text: Belongs to the peptidase M16 family. UQCRC2/QCR2 subfamily.
    - reference_id: file:human/UQCRC2/UQCRC2-uniprot.txt
      supporting_text: >-
        May be involved in the in situ processing of UQCRFS1 into the mature Rieske
        protein and its mitochondrial targeting sequence (MTS)/subunit 9 when
        incorporated into complex III
