- term:
    id: GO:0006508
    label: proteolysis
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      InterPro (peptidase M16) electronic mapping to proteolysis. This is the
      biological-process counterpart of the metalloendopeptidase MF IEA and rests
      on the same unproven premise that UQCRC2 is catalytically active.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Human UQCRC2 is a non-catalytic core subunit that has lost the M16 catalytic
      zinc-binding motif; no proteolytic activity is demonstrated. Any involvement
      in UQCRFS1 maturation is speculative (only "Probable" in UniProt; Reactome
      lists UQCRC1/UQCRC2 only as possible candidates). This is a fold-derived
      over-annotation, not the gene's core process.
    supported_by:
