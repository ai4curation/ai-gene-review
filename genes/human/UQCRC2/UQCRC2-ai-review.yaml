suggested_questions:
- question: >-
    Does human UQCRC2 retain any residual peptidase activity toward the UQCRFS1
    Rieske precursor during Complex III assembly, or is UQCRFS1 processing entirely
    dependent on other peptidases?
- question: >-
    Are any of the reported PDZ-domain / interactome interactions of UQCRC2
    (e.g. DLG family, MAGI, SCRIB) physiologically relevant, or artifacts of the
    affinity/network assays?
suggested_experiments:
- description: >-
    Reconstitute Complex III assembly in cells expressing catalytic-site (M16 motif)
    UQCRC2 variants to test whether any residual metallopeptidase capacity
    contributes to UQCRFS1 maturation.
- description: >-
    Structurally and biochemically define the UQCRC2-mitolamban (STMP1) and
    UQCRC2-RAB5IF interactions within assembling Complex III to clarify their roles
    in CIII biogenesis and supercomplex formation.
