id: P22695
gene_symbol: UQCRC2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  UQCRC2 (Cytochrome b-c1 complex subunit 2, mitochondrial; core protein II; QCR2;
  ubiquinol-cytochrome-c reductase complex core protein 2) is one of the two large
  "core" subunits (with UQCRC1/core protein 1) of mitochondrial respiratory Complex
  III, the cytochrome bc1 / ubiquinol-cytochrome c reductase of the electron
  transport chain. Complex III is an eleven-subunit, obligate-dimeric enzyme of the
  inner mitochondrial membrane that transfers electrons from ubiquinol to cytochrome
  c and couples this redox chemistry to proton translocation across the inner
  membrane via the protonmotive Q cycle; the catalytic redox centres reside in
  cytochrome b, the Rieske iron-sulfur protein UQCRFS1, and cytochrome c1, not in
  the core proteins. UQCRC2 is a non-catalytic structural subunit required for
  assembly and stability of the complex; it is a peripheral inner-membrane protein
  exposed to the matrix side. The two core proteins are homologous to the alpha/beta
  subunits of the mitochondrial-processing peptidase and retain the peptidase M16
  fold, but human UQCRC2 lacks the catalytic zinc-binding motif and any peptidase
  activity is unproven (it has been proposed only as a possible participant in
  in situ processing of the UQCRFS1 Rieske precursor). Complex III assembles with
  Complexes I and IV into supercomplexes/respirasomes. Biallelic UQCRC2 loss-of-
  function variants cause mitochondrial complex III deficiency, nuclear type 5
  (MC3DN5), a metabolic/neurological disorder with neonatal-onset recurrent
  metabolic decompensation, encephalopathy, lactic acidosis, and hepato-renal
  involvement.
