core_functions:
- description: >-
    UQCRC2 (core protein 2) is a non-catalytic structural subunit of mitochondrial
    respiratory Complex III (cytochrome bc1 / ubiquinol-cytochrome c reductase) in
    the inner mitochondrial membrane, required for assembly and stability of the
    complex. The assembled complex transfers electrons from ubiquinol to cytochrome
    c and couples this to proton translocation (the Q cycle) during aerobic
    respiration / oxidative phosphorylation. UQCRC2 has no independent catalytic
    activity (no verifiable structural-molecule or peptidase MF term is carried in
    GOA; the InterPro-derived peptidase/metal-binding MF/BP annotations are
    fold-based over-annotations), so its core function is captured by its Complex III
    membership, inner-membrane location, and participation in ubiquinol-to-cytochrome
    c electron transport.
  supported_by:
  - reference_id: PMID:28844695
    supporting_text: >-
      Architecture of Human Mitochondrial Respiratory Megacomplex I(2)III(2)IV(2).
  - reference_id: file:human/UQCRC2/UQCRC2-uniprot.txt
    supporting_text: >-
      The cytochrome b-c1 complex catalyzes electron transfer from ubiquinol to
      cytochrome c, linking this redox reaction to translocation of protons across
      the mitochondrial inner membrane
  directly_involved_in:
