id: A6QL63
gene_symbol: ABTB3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ABTB3 encodes a conserved ankyrin repeat- and BTB/POZ domain-containing
  protein, also known as BTBD11. The best characterized functional evidence
  comes from the mouse ortholog Btbd11, which is enriched at glutamatergic
  postsynaptic densities in cortical and hippocampal inhibitory interneurons.
  Btbd11 contains a conserved C-terminal PDZ-binding motif that binds PSD-95
  (DLG4), promotes PSD-95 stabilization at glutamatergic synapses, and supports
  excitatory synaptic input onto parvalbumin-positive interneurons. Human ABTB3
  is predicted to share this synaptic scaffold/stabilizer role by orthology, but
  direct human functional assays and CUL3 substrate-adaptor activity have not
  been established.
