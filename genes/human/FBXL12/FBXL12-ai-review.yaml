- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase complex that selects phosphorylated substrates, notably the CDK inhibitor p57KIP2/CDKN1C and CAMK1, for SCF-dependent polyubiquitination and proteasomal degradation.
