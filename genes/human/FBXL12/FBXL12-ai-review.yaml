id: Q9NXK8
gene_symbol: FBXL12
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL12 (F-box/LRR-repeat protein 12; FBL12) is a substrate-recognition
  subunit of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase complex. Its N-terminal
  F-box motif binds SKP1, linking it to the CUL1-RBX1 catalytic core, and its
  leucine-rich repeats confer substrate selectivity. SCF(FBXL12) directs
  substrate-specific polyubiquitination and proteasomal degradation. Reported
  substrates include the cyclin-dependent kinase inhibitor p57KIP2/CDKN1C, whose
  TGF-beta1-induced, phosphorylation-dependent degradation by SCF(FBXL12)
  influences osteoblast differentiation, and calcium/calmodulin-dependent
  protein kinase I (CAMK1), whose degradation disrupts cyclin D1/CDK4 complex
  assembly and triggers G1 cell-cycle arrest in lung epithelia. FBXL12 acts in
  the cytoplasm/cytosol. Many of its catalogued interactions derive from
  high-throughput proteomic screens and are not established functional
  substrates.
