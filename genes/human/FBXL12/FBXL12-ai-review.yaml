id: Q9NXK8
gene_symbol: FBXL12
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL12 (F-box/LRR-repeat protein 12; FBL12) is a substrate-recognition
  subunit of an SCF (SKP1-CUL1-RBX1) E3 ubiquitin ligase complex. Its N-terminal
  F-box motif binds SKP1, linking it to the CUL1-RBX1 catalytic core, and its
  leucine-rich repeats confer substrate selectivity, so that SCF(FBXL12) directs
  substrate-specific (often K48-linked) polyubiquitination and proteasomal
  degradation. Several physiological substrates have been defined in distinct
  cellular programs, with substrate selection frequently gated by substrate
  phosphorylation. SCF(FBXL12) degrades calcium/calmodulin-dependent protein
  kinase I (CAMK1; acceptor Lys59), which lowers CAMK1-driven p27 phosphorylation,
  disrupts cyclin D1/CDK4 complex assembly, and triggers G1 cell-cycle arrest in
  lung epithelia. It targets the cyclin-dependent kinase inhibitors p57KIP2/CDKN1C
  (TGF-beta1-induced, phosphorylation-dependent turnover linked to osteoblast
  differentiation) and CDKN1B/p27 (Lys165 acceptor; degraded together with
  SCF(FBXL1)/SKP2 downstream of pre-TCR and Notch signaling to license the
  proliferative burst of thymocyte beta-selection). It promotes
  CHK1-phosphorylation-dependent degradation of chromatin-associated FANCD2 to
  support replication-fork recovery and cancer-cell survival under replication
  stress, and degrades the aldehyde dehydrogenases ALDH3A1/ALDH3A2 to permit
  trophoblast differentiation during placental development. An SCF complex
  containing FBXL12 also mediates DNA-damage-induced K48-linked ubiquitination
  and removal of the NHEJ factor Ku80 from DNA ends (shown in Xenopus extracts,
  with conservation to human inferred). FBXL12 acts in both the cytoplasm (where
  it co-localizes with CAMK1) and the nucleus/chromatin (FANCD2, Ku80). Many of
  its catalogued interactions derive from high-throughput proteomic screens and
  are not established functional substrates.
