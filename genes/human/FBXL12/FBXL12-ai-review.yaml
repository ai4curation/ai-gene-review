- id: file:human/FBXL12/FBXL12-deep-research-falcon.md
  title: Falcon deep research report for human FBXL12
  findings:
  - statement: FBXL12 is an SCF (SKP1-CUL1-RBX1) substrate-recognition subunit whose biology is best defined by its substrates in different cellular programs, including FANCD2, CaMKI, ALDH3A1/2, and CDKN1B/p27.
    supporting_text: >-
      SCF substrate-recognition subunit that drives ubiquitin-dependent remodeling
      of protein abundance (often proteasomal degradation) for specific substrates
      in distinct biological programs: replication stress recovery (FANCD2),
      cell-cycle gating (CaMKI; CDKN1B/p27), and differentiation programs (ALDH3A1/2).
  - statement: Human SCF(FBXL12) promotes CHK1-phosphorylation-dependent proteasomal degradation of chromatin-associated FANCD2 to enable replication-fork recovery and cancer-cell survival under replication stress.
    supporting_text: >-
      FANCD2 becomes a substrate of SCF^FBXL12 following **CHK1-dependent
      phosphorylation**, creating a phosphodegron that triggers FBXL12-dependent
      turnover, thereby helping clear "chromatin-trapped" FANCD2 at stalled forks
      and enabling replication restart
  - statement: SCF(FBXL12) targets ALDH3A1 and ALDH3A2 for ubiquitin-dependent degradation, which is essential for trophoblast differentiation during placental development.
    supporting_text: >-
      SCF^FBXL12 targets **ALDH3A1 and ALDH3A2** for ubiquitin-dependent degradation
      and that this is **essential for trophoblast differentiation** and proper
      placental development
  - statement: SCF(FBXL12) directly K48-polyubiquitinates CDKN1B/p27 (acceptor K165) to license the proliferative burst of thymocyte beta-selection downstream of pre-TCR and Notch signaling.
    supporting_text: >-
      SCF-Fbxl12 promoted **K48-linked polyubiquitination** of Cdkn1b, with a key
      ubiquitination site identified at **K165**; Cdkn1b(K165R) strongly reduced
      polyubiquitination
  - statement: An SCF complex containing Fbxl12 mediates DNA-damage-induced ubiquitination of Ku80 and its removal from DNA ends (Xenopus extracts, human conservation inferred).
    supporting_text: >-
      an **SCF complex containing Fbxl12** was required for **DNA damage-induced
      Ku80 ubiquitylation**, removal from DNA ends, and subsequent degradation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Falcon synthesis cross-checked against UniProt (CAMK1 FUNCTION; CDKN1C IntAct)
      and the cached PMID:18660753 (p57KIP2). Additional substrate axes (FANCD2 /
      Brunner 2023 Mol Cell; ALDH3A1-2 / Nishiyama 2015 Stem Cells; CDKN1B-p27 /
      Zhao 2019 Nat Immunol; Ku80 / Postow 2013 Cell Cycle) are reported via
      author-year DOIs not in the PMID cache, so treated as leads but drawn from
      peer-reviewed primary studies; not added as new GOA terms.
