suggested_questions:
- question: What is the complete physiological substrate repertoire of SCF(FBXL12), and what degron/phosphodegron features (e.g. CHK1, CK2, TGF-beta-driven) does its LRR domain recognize across substrates?
- question: How is FBXL12 partitioned between cytoplasmic (CAMK1) and nuclear/chromatin (FANCD2, Ku80, p27) substrate pools, and what determines context-specific substrate choice in cell cycle, replication stress, development, and immunity?
suggested_experiments:
- description: Reconstitute SCF(FBXL12)-mediated ubiquitination in vitro with purified SKP1-CUL1-RBX1-FBXL12, an E2, and phosphorylated versus unphosphorylated substrates (p57KIP2, CAMK1, CDKN1B/p27, CHK1-phosphorylated FANCD2) to define the phosphodegron requirement and map ubiquitination sites.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXL12-knockout versus control cells (including replication-stressed cancer models and differentiating trophoblast/thymocyte systems) to define the endogenous substrate landscape and validate the cell-cycle, replication-stress, and developmental consequences.
