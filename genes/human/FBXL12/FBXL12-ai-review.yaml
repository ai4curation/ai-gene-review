suggested_questions:
- question: What is the complete physiological substrate repertoire of SCF(FBXL12), and what degron/phosphodegron features does its LRR domain recognize?
- question: How are the p57KIP2/CDKN1C (osteoblast differentiation) and CAMK1 (G1 arrest) degradation activities regulated in different tissues, and are they coupled to specific signaling inputs (e.g. TGF-beta)?
suggested_experiments:
- description: Reconstitute SCF(FBXL12)-mediated ubiquitination in vitro with purified SKP1-CUL1-RBX1-FBXL12, an E2, and phosphorylated versus unphosphorylated p57KIP2/CAMK1 to define the phosphodegron requirement and map ubiquitination sites.
- description: Perform quantitative ubiquitinome/proteome profiling in FBXL12-knockdown versus control cells to define the endogenous substrate landscape and validate cell-cycle consequences.
