- id: PMID:37159021
  title: A two-step mitochondrial import pathway couples the disulfide relay with matrix complex I biogenesis.
  findings:
  - statement: >-
      NDUFAF8 reaches the matrix via a two-step import pathway (weak MTS + TIM23) that exposes it
      to the IMS disulfide relay for oxidation; in the matrix it binds and stabilizes NDUFAF5, and
      its loss causes NDUFAF5 degradation, stalled Q-module assembly, and isolated Complex I
      deficiency.
    reference_section_type: RESULTS
    supporting_text: >-
      NDUFAF8 interacts with its partner NDUFAF5 to stabilize and activate it
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes mitochondrial matrix localization (IDA) and the NDUFAF8->NDUFAF5 stabilization
      mechanism; characterizes the disulfide-relay/two-step import consistent with the CHCH /
      twin-Cx9C domain in UniProt.
