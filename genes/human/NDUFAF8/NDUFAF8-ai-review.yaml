  label: Homo sapiens
description: >-
  NDUFAF8 (formerly C17orf89) is a small (74 aa) soluble mitochondrial protein that acts as
  an assembly factor for respiratory chain Complex I (NADH:ubiquinone oxidoreductase). It is
  not a structural subunit of the mature holoenzyme and has no known catalytic activity.
  NDUFAF8 carries a twin CX9C / CHCH domain stabilized by two intramolecular disulfide bonds,
  the hallmark of substrates of the mitochondrial MIA40/CHCHD4 disulfide-relay import system;
  it reaches the mitochondrial matrix via a two-step import pathway in which a weak targeting
  sequence drives slow TIM23-dependent matrix import while allowing en-route oxidation by the
  intermembrane-space disulfide relay. In the matrix it binds and stabilizes the early Complex I
  assembly factor NDUFAF5, which is required for maturation of the Q module during early Complex I
  (NADH:ubiquinone oxidoreductase) biogenesis. Loss of NDUFAF8 destabilizes NDUFAF5 and stalls
  Q-module assembly, producing an isolated Complex I deficiency; bi-allelic loss-of-function
  variants cause a mitochondrial Complex I deficiency (Leigh syndrome, MC1DN34).
