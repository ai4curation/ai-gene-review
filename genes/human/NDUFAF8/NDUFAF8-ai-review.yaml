  title: Mitochondrial Protein Interaction Mapping Identifies Regulators of Respiratory Chain Function.
  findings:
  - statement: >-
      Affinity-enrichment MS interaction mapping validated C17orf89 (NDUFAF8) as a Complex I
      assembly factor whose disruption markedly reduces Complex I activity and whose depletion is
      found in an unresolved case of isolated Complex I deficiency.
    reference_section_type: RESULTS
    supporting_text: >-
      we validated C17orf89 as a complex I (CI) assembly factor. Disruption of C17orf89 markedly
      reduced CI activity, and its depletion is found in an unresolved case of CI
      deficiency.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary experimental reference establishing NDUFAF8 (C17orf89) as a Complex I assembly
      factor, its mitochondrial localization, and its NDUFAF5 interaction. Matches UniProt
      FUNCTION/SUBUNIT/SUBCELLULAR LOCATION statements.
