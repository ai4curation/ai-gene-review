core_functions:
- description: >-
    Mitochondrial Complex I assembly factor. NDUFAF8 is a small soluble matrix protein that binds
    and stabilizes the early Complex I assembly factor NDUFAF5. Its demonstrated molecular action
    is a specific protein-protein interaction with NDUFAF5 (not a catalytic activity); this
    stabilization is required for NDUFAF5-dependent maturation of the Q module during early
    Complex I (NADH:ubiquinone oxidoreductase) biogenesis. NDUFAF8 is not a subunit of the mature
    holoenzyme. Loss of NDUFAF8 leads to NDUFAF5 degradation, a stalled Q-module intermediate, and
    isolated Complex I deficiency.
