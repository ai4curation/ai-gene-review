id: O75881
gene_symbol: CYP7B1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CYP7B1 (cytochrome P450 7B1) is an oxysterol 7-alpha-hydroxylase, a heme/iron
  cytochrome P450 monooxygenase anchored in the endoplasmic reticulum membrane. It
  catalyzes the 7-alpha-hydroxylation of oxysterols, chiefly 25-hydroxycholesterol
  and 27-hydroxycholesterol ((25R)-cholest-5-ene-3beta,26-diol), as well as
  24S-hydroxycholesterol, using molecular oxygen with electrons from NADPH via
  cytochrome P450 reductase. This is the committed 7-alpha-hydroxylation step of the
  acidic (alternative) bile-acid biosynthesis pathway, converting oxysterols
  generated by CH25H, CYP27A1 and CYP46A1 into 7-alpha-hydroxylated intermediates
  that are transported to the liver and converted to bile acids. CYP7B1 also
  7-alpha-hydroxylates 3-hydroxy steroids and neurosteroids such as
  dehydroepiandrosterone (DHEA) and pregnenolone, contributing to neurosteroid
  metabolism, and its product 7-alpha,25-dihydroxycholesterol is the ligand for the
  chemotactic receptor GPR183/EBI2 that guides B-cell migration. The enzyme is
  widely expressed (brain, testis, ovary, prostate, liver, intestine, kidney).
  Loss-of-function variants cause hereditary spastic paraplegia type 5A (SPG5A), a
  progressive motor-neuron degeneration associated with oxysterol accumulation, and,
  in severe biallelic cases, congenital bile acid synthesis defect type 3 (CBAS3)
  with neonatal cholestasis and liver failure.
