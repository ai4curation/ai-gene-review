- id: PMID:10588945
  title: Structure and functions of human oxysterol 7alpha-hydroxylase cDNAs and gene
    CYP7B1.
  findings:
  - statement: >-
      Human CYP7B1 expressed in 293/T cells 7-alpha-hydroxylates 27-hydroxycholesterol
      and DHEA; the enzyme has broad substrate specificity for sterol metabolites and
      is expressed in steroidogenic and bile-acid-handling tissues.
    supporting_text: >-
      The human oxysterol 7alpha-hydroxylase transiently expressed in 293/T cells was
      able to catalyze 7alpha-hydroxylation of 27-hydroxycholesterol and
      dehydroepiandrosterone (DHEA).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available:false) but directly establishes
      human CYP7B1 oxysterol/DHEA 7-alpha-hydroxylase activity and tissue expression.
      Title/PMID match the fetched record.
