- id: PMID:9802883
  title: 'Identification of a new inborn error in bile acid synthesis: mutation of
    the oxysterol 7alpha-hydroxylase gene causes severe neonatal liver disease.'
  findings:
  - statement: >-
      Loss of microsomal oxysterol 7-alpha-hydroxylase (CYP7B1) activity causes a new
      inborn error of bile acid synthesis (CBAS3), with massive 27-hydroxycholesterol
      accumulation and severe neonatal cholestatic liver disease; establishes CYP7B1
      in the acidic bile-acid pathway.
    supporting_text: >-
      a deficiency in 7alpha-hydroxylation due to a mutation in the gene for the
      microsomal oxysterol 7alpha-hydroxylase enzyme, active in the acidic pathway
      for bile acid synthesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache but the primary human disease/enzyme paper; establishes
      CYP7B1 catalytic activity, ER/microsomal localization, and bile-acid-synthesis
      role. Title/PMID match.
