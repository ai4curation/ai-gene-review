- term:
    id: GO:0042632
    label: cholesterol homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA call linking CYP7B1 to cholesterol homeostasis. By clearing oxysterols
      (oxygenated cholesterol derivatives) into the bile-acid pathway, CYP7B1
      contributes to cholesterol/oxysterol turnover; defective function causes
      cholesterol/oxysterol dysregulation implicated in SPG5A. Keep as a non-core
      downstream/physiological role.
    action: KEEP_AS_NON_CORE
    reason: >-
      The direct molecular activity is oxysterol 7-alpha-hydroxylation; cholesterol
      homeostasis is a broader physiological consequence rather than the enzyme's
      specific function. SPG5A studies frame CYP7B1 loss as defective cholesterol
      homeostasis, supporting the association but as a downstream role.
    supported_by:
    - reference_id: file:human/CYP7B1/CYP7B1-uniprot.txt
      supporting_text: >-
        Sequence alterations within CYP7B1 implicate defective cholesterol homeostasis
        in motor-neuron degeneration
