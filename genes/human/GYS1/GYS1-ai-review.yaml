    summary: >-
      Experimental evidence that glycogen synthase (including recombinant human GYS1) can
      transfer the beta-phosphate of UDP-glucose into glycogen, forming glucose C2/C3
      phosphomonoesters, at ~1 per 10,000 glucoses. This is the basis of the
      glucose-1-phosphate-transferring activity term.
    action: MARK_AS_OVER_ANNOTATED
