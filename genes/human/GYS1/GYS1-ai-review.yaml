id: P13807
gene_symbol: GYS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GYS1 encodes glycogen synthase 1, the muscle (and general non-hepatic) isoform of
  glycogen synthase and the committed, rate-limiting elongation enzyme of glycogen
  biosynthesis. As a retaining glycosyltransferase of family GT3 (EC 2.4.1.11), it uses
  UDP-glucose as the glucosyl donor to add glucose units in alpha-1,4-glycosidic linkage
  to the non-reducing ends of a growing glycogen chain that has been primed by glycogenin
  (GYG1); glycogen branching enzyme (GBE1) subsequently introduces alpha-1,6 branch points.
  GYS1 forms a heterooctameric complex with glycogenin (a GYS1 tetramer bound to two GYG1
  dimers). Its activity is tightly regulated: it is allosterically activated by
  glucose-6-phosphate and inhibited by hierarchical multi-site phosphorylation of its N-
  and C-terminal tails (by kinases including GSK3, AMPK, casein kinase 2, PASK and DYRK2),
  which is reversed by glycogen-associated protein phosphatase 1 (recruited by PPP1R3
  targeting subunits such as PTG/PPP1R3C). GYS1 is cytosolic and associates with glycogen
  particles. In humans, loss-of-function variants cause muscle glycogen storage disease 0
  (GSD 0b), characterized by cardiomyopathy, exercise intolerance and risk of sudden
  cardiac death.
