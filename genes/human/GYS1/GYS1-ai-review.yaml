core_functions:
- description: >-
    Elongation of glycogen chains by transfer of glucose from UDP-glucose to the alpha-1,4
    non-reducing end of the growing polymer (the committed, rate-limiting step of glycogen
    biosynthesis), acting on a glycogenin-primed chain and in concert with branching enzyme.
  molecular_function:
    id: GO:0004373
    label: alpha-1,4-glucan glucosyltransferase (UDP-glucose donor) activity
  directly_involved_in:
  - id: GO:0005978
    label: glycogen biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
  in_complex:
    id: GO:1902494
    label: catalytic complex
  supported_by:
  - reference_id: PMID:35835870
    supporting_text: >-
      GYS, a retaining glycosyltransferase (GT) belonging to the GT3 superfamily,
      catalyzes successive addition of α-1,4-linked glucose residues to the nonreducing
      end of a growing polysaccharide chain, using UDP-glc as the sugar donor with the
      release of UDP5.
  - reference_id: PMID:35835870
    supporting_text: >-
      Cryo-EM map and model of the tetrameric GYS1–GYG1ΔCD complex at 3.0 Å resolution.
proposed_new_terms: []
suggested_questions:
- question: >-
    Is the glucose-1-phosphate-transferring (phosphate-incorporating) side reaction of GYS1
    physiologically regulated, or is it purely a stochastic catalytic error whose rate is
    fixed by the enzyme mechanism?
- question: >-
    Beyond glycogenin (GYG1) and the PP1 targeting subunits (PPP1R3 family), which of the
    many high-throughput interactome partners of GYS1 represent bona fide regulatory or
    scaffolding interactions relevant to glycogen metabolism?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the Glc6P allosteric arginine cluster and the N-/C-terminal
    phosphorylation sites in human GYS1, coupled with kinetic assays, to quantify the
    independent contributions of allosteric activation and dephosphorylation to activation of
    the human enzyme.
- description: >-
    Cell-based tagging/fractionation of endogenous GYS1 to test whether the reported membrane
    association is genuine peripheral binding (e.g. via glycogen particles) or a proteomics
    artifact, and to map its localization relative to glycogen synthesis sites.
