- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  qualifier: located_in
  review:
    summary: >-
      High-throughput mass-spectrometry detection of GYS1 in a membrane-enriched fraction
      of an NK-cell line. GYS1 is a soluble cytosolic enzyme with no transmembrane region;
      the study itself notes that most non-integral hits are only transiently
      membrane-associated.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GYS1 has no TM domain or signal peptide (UniProt) and is established as cytosolic.
      Detection in a membrane proteomics fraction most likely reflects transient/peripheral
      association (e.g. via glycogen particles) rather than true membrane residency; this is
      an over-annotation from a large-scale localization screen.
    supported_by:
    - reference_id: PMID:19946888
      supporting_text: >-
        could be predicted to be transiently associated with membranes
