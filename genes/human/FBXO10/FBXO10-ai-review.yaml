id: Q9UK96
gene_symbol: FBXO10
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXO10 (F-box only protein 10) is a large (956 aa) F-box protein that serves
  as the substrate-recognition subunit of an SCF (SKP1-CUL1-F-box)-type E3
  ubiquitin ligase complex. Through an N-terminal F-box motif it binds SKP1,
  docking onto the CUL1-RBX1 catalytic core (the SCF(FBXO10) complex consists of
  CUL1, SKP1 and FBXO10), while its extensive C-terminal beta-helix/PbH1 repeat
  region provides the substrate-binding surface. As the adaptor it does not
  itself catalyze ubiquitin transfer; rather it selects substrates that the
  CUL1-RBX1-E2 machinery polyubiquitinates for degradation. Its
  best-characterized substrate is the antiapoptotic protein BCL2: FBXO10 binds
  BCL2 and promotes its ubiquitination and degradation, thereby promoting
  apoptosis, a role conserved with the C. elegans F-box protein DRE-1, which
  inactivates the BCL2 ortholog CED-9. Loss-of-function mutations or reduced
  FBXO10 expression occur in diffuse large B-cell lymphoma, where they permit
  BCL2 accumulation. FBXO10 also targets the germinal-center protein HGAL/GCSAM
  for ubiquitination and degradation; upon B-cell receptor stimulation FBXO10 is
  palmitoylated and relocates to the plasma membrane, where HGAL degradation
  forms a negative-feedback loop that dampens BCR signaling. An additional
  reported substrate is the receptor for advanced glycation end products (RAGE/
  AGER), which FBXO10 targets for ubiquitination and lysosomal degradation.
  FBXO10 is widely expressed and predominantly cytoplasmic.
