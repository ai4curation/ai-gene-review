- term:
    id: GO:0004842
    label: ubiquitin-protein transferase activity
  evidence_type: NAS
  original_reference_id: PMID:10531035
  qualifier: enables
  review:
    summary: Author-statement (family-level) attribution of ubiquitin-protein transferase activity to FBXO10 from the original human F-box family paper. F-box proteins are the substrate-recognition adaptors of SCF, not the catalytic transferase; ubiquitin transfer is mediated by the RBX1 RING subunit and the charged E2.
    action: MODIFY
    reason: Over-attributes catalytic transferase activity to the adaptor subunit. The correct molecular function for the F-box substrate receptor is ubiquitin-like ligase-substrate adaptor activity (GO:1990756); catalytic ubiquitin transfer is performed by RBX1/E2, not by FBXO10. This is a 1999 family-level NAS inference predating mechanistic understanding of SCF architecture.
    proposed_replacement_terms:
    - id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    supported_by:
    - reference_id: file:human/FBXO10/FBXO10-uniprot.txt
      supporting_text: Substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex
