- id: PMID:23431138
  title: Related F-box proteins control cell death in Caenorhabditis elegans and human
    lymphoma.
  findings:
  - statement: FBXO10 binds BCL2 and promotes its degradation, thereby initiating cell death; some diffuse large B-cell lymphomas have inactivating FBXO10 mutations or low FBXO10 expression. DRE-1/FBXO10 is a conserved regulator of apoptosis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (PNAS 2013, PMC3593917); the key substrate paper establishing FBXO10 as the SCF substrate receptor for BCL2 and its apoptosis-regulatory and lymphoma-relevant roles. Source of the IMP catabolic-process/apoptosis annotations, the IPI BCL2 interaction, and the IDA cytoplasm localization. Abstract-only in cache; full text (read by curators) characterizes the SCF(FBXO10) complex and lymphoma variants.
- id: PMID:31570756
  title: Recent BCR stimulation induces a negative autoregulatory loop via FBXO10
    mediated degradation of HGAL.
  findings:
  - statement: BCR stimulation induces palmitoylation of SCF-FBXO10 and its relocation to the cell membrane, where it targets HGAL/GCSAM for ubiquitylation and degradation, reducing BCR-induced calcium influx and proximal effector phosphorylation; recognition relies on HGAL residue H91.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (Leukemia 2020); establishes the HGAL/GCSAM substrate and the BCR-stimulated, palmitoylation-driven cytoplasm-to-membrane relocalization of SCF-FBXO10. Source of the EXP cytoplasm localization annotation. Abstract-only in cache.
- id: PMID:34445249
  title: The SCF Complex Is Essential to Maintain Genome and Chromosome Stability.
  findings:
  - statement: The SCF (SKP1-CUL1-F-box protein) complex comprises a group of E3 ubiquitin ligase complexes that modify substrates with poly-ubiquitin chains to target them for proteasomal degradation; the variable F-box protein determines substrate specificity.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Int J Mol Sci 2021, PMC8395177) review of SCF biology; ComplexPortal-cited source of the SCF complex (GO:0019005) and SCF-dependent catabolism (GO:0031146) NAS annotations. General SCF review rather than FBXO10-specific.
