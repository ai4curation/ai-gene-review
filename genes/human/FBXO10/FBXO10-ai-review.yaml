suggested_questions:
- question: What sequence/structural features of the FBXO10 C-terminal beta-helix (PbH1 repeat) region determine recognition of structurally diverse substrates (BCL2, HGAL/GCSAM, RAGE), and are these substrates degron-dependent?
- question: How is FBXO10 substrate choice and subcellular targeting regulated by post-translational modification (e.g. BCR-induced palmitoylation and membrane relocalization), and does this redirect the SCF(FBXO10) substrate repertoire?
- question: Does FBXO10 contribute to lymphomagenesis primarily through BCL2 stabilization, deregulated BCR signaling via HGAL, or both, and how do the recurrent DLBCL variants (e.g. R44H, V762C, R825W) mechanistically impair these activities?
suggested_experiments:
- description: Reconstitute SCF(FBXO10) ubiquitination of BCL2 in vitro with purified CUL1, SKP1, RBX1, an E2, and FBXO10 (wild-type vs lymphoma variants R44H, V762C, R825W) to confirm adaptor function, map BCL2 ubiquitination sites, and quantify the catalytic contribution of each component.
- description: Perform global ubiquitinome/proteome profiling in FBXO10-knockout versus wild-type B cells, with and without BCR stimulation, to define the endogenous SCF(FBXO10) substrate repertoire and test the BCR-induced membrane-relocalization model.
- description: Use co-immunoprecipitation and proximity-labeling (BioID/TurboID) of FBXO10 to verify assembly with SKP1/CUL1 via the F-box motif and identify additional substrates beyond BCL2, HGAL/GCSAM and RAGE.
