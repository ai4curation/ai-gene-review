suggested_questions:
- question: Does DNAJC12 recognize a shared structural feature of the aromatic amino acid hydroxylase fold, and how does it coordinate Hsc70 with BH4 cofactor loading during hydroxylase maturation?
- question: Why does DNAJC12 deficiency preferentially manifest as hyperphenylalaninemia with neurotransmitter deficiency, and what determines the variable neurological severity among patients?
suggested_experiments:
- description: Reconstitute PAH (and TH/TPH) folding/stability in vitro with DNAJC12, Hsc70 and ATP, comparing wild-type versus HPD-motif and disease (e.g. R72P) mutants to dissect the J-domain-dependent contribution to client maturation.
- description: Quantify aromatic amino acid hydroxylase levels and activities, and dopamine/serotonin output, in DNAJC12-knockout neuronal models with and without BH4 supplementation to define the chaperone's role across the hydroxylase family.
