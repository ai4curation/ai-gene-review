id: O95954
gene_symbol: FTCD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FTCD (formimidoyltransferase-cyclodeaminase; glutamate formimidoyltransferase-cyclodeaminase)
  is a bifunctional cytosolic enzyme that catalyzes the last two steps of L-histidine
  catabolism, channeling the histidine-derived one-carbon (formimino) unit into the folate
  one-carbon pool. Its N-terminal domain has glutamate formimidoyltransferase activity
  (EC 2.1.2.5), transferring the formimino group between N-formimidoyl-L-glutamate and
  tetrahydrofolate to produce L-glutamate and 5-formimino-tetrahydrofolate; its C-terminal
  domain has formimidoyltetrahydrofolate cyclodeaminase activity (EC 4.3.1.4), converting
  5-formimino-tetrahydrofolate to 5,10-methenyl-tetrahydrofolate with release of ammonia.
  The protein assembles into a homooctamer arranged as a tetramer of dimers forming a planar
  ring, with polyglutamate (folate) binding sites, and is strongly expressed in liver. Beyond
  its cytosolic catalytic role it associates reversibly with the Golgi apparatus (the historical
  "58K Golgi protein") and, in rodent orthologs, binds microtubules and bundles vimentin
  filaments. Loss-of-function variants cause glutamate formiminotransferase deficiency
  (formiminoglutamic aciduria), an autosomal recessive inborn error of folate metabolism
  marked by urinary excretion of formiminoglutamate (FIGLU). The human protein is also the
  LC1 autoantigen recognized in type 2 autoimmune hepatitis.
