- id: PMID:10029623
  title: Formiminotransferase cyclodeaminase is an organ-specific autoantigen recognized
    by sera of patients with autoimmune hepatitis.
  findings:
  - statement: >-
      FTCD is a liver-specific cytosolic autoantigen recognized by anti-liver cytosol type 1
      autoantibodies in autoimmune hepatitis, present as a ~240 kDa oligomer.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Establishes human FTCD identity (cytosolic, liver-specific, oligomeric) and
      the LC1 autoantigen link; used for the cytoplasm and folate-metabolism TAS annotations.
- id: PMID:12815595
  title: The molecular basis of glutamate formiminotransferase deficiency.
  findings:
  - statement: >-
      Missense variants R135C and R299P reduce glutamate formimidoyltransferase activity to 61% and
      57% of wild-type, establishing FTCD's catalytic function and its role in glutamate
      formiminotransferase deficiency (FIGLU-uria).
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Primary experimental basis for the GO:0030409 IDA and for the disease
      association (formiminoglutamic aciduria / FIGLU excretion).
- id: PMID:14697341
  title: Characterization of the antigenicity of the formiminotransferase-cyclodeaminase
    in type 2 autoimmune hepatitis.
  findings:
  - statement: >-
      Human FTCD is present free in the cytosol and associated with Golgi membranes (reversible
      binding); the human protein does not interact with cytoskeleton proteins, unlike rat FTCD
      which binds brain microtubules and vimentin.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Source of the human cytosol/Golgi IDA localizations and the key caveat that
      human FTCD does not bind cytoskeleton, undercutting the microtubule-binding annotations.
- id: PMID:19056867
  title: Large-scale proteomics and phosphoproteomics of urinary exosomes.
  findings:
  - statement: >-
      FTCD was among 1132 proteins identified by LC-MS/MS in human urinary exosomes; a bulk
      proteomic detection rather than evidence of functional extracellular localization.
    reference_section_type: RESULTS
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
