proposed_new_terms:
- proposed_name: L-histidine catabolic process to glutamate
  proposed_definition: >-
    The chemical reactions and pathways resulting in the breakdown of L-histidine, ultimately
    yielding L-glutamate, and in the process converting tetrahydrofolate to
    5-formimino-tetrahydrofolate and then to 5,10-methenyl-tetrahydrofolate.
  justification: >-
    The historical GO terms 'L-histidine catabolic process to glutamate and formamide'
    (GO:0019556) and 'L-histidine catabolic process to glutamate and formate' (GO:0019557) are
    obsolete, leaving no live specific term for the folate-coupled histidine-to-glutamate route
    that FTCD completes. A specific descendant of GO:0006548 (L-histidine catabolic process) that
    captures the tetrahydrofolate-coupled glutamate-forming route would allow precise annotation.
  proposed_parent:
    id: GO:0006548
    label: L-histidine catabolic process
suggested_questions:
- question: >-
    Does human FTCD bind or bundle vimentin/microtubules under any physiological condition, or is
    this activity restricted to rodent orthologs? The human ortholog study (PMID:14697341) reported
    no cytoskeleton interaction, in contrast to rat FTCD.
- question: >-
    What is the functional significance, if any, of FTCD's reversible Golgi-membrane and
    centrosome association given that its catalytic activity is cytosolic?
suggested_experiments:
- description: >-
    Reconstitute recombinant human FTCD and measure both formimidoyltransferase (EC 2.1.2.5) and
    cyclodeaminase (EC 4.3.1.4) activities directly on the human enzyme, since the current
    cyclodeaminase annotation for human FTCD rests on homology rather than direct human assay.
- description: >-
    Test purified human FTCD for direct microtubule and vimentin binding in vitro and by
    co-localization in human cells, to resolve the human-versus-rodent discrepancy in cytoskeleton
    association.
