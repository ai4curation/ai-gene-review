id: Q8NHU2
gene_symbol: CFAP61
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CFAP61 is a structural component of the axonemal radial spoke 3 (RS3) base
  in motile cilia and sperm flagella. Together with CFAP91 and CFAP251, it forms
  the calmodulin- and spoke-associated complex (CSC), which anchors radial spoke 3
  to the outer doublet microtubules. CFAP61 contains an FAD/NAD(P)-binding domain
  fold (Rossmann-like fold) that is exapted for structural rather than catalytic
  purposes, making it a pseudoenzyme. Cryo-EM structure of the human respiratory
  cilia axoneme (PDB 8J07) places CFAP61 at the RS3 base. Biallelic loss-of-function
  variants cause multiple morphological abnormalities of the flagella (MMAF) and
  male infertility (SPGF84), but do not cause primary ciliary dyskinesia, indicating
  organ-specific requirement predominantly in sperm flagellum assembly and stability.
