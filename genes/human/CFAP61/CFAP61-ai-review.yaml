      proteomics data (PMID:28282151) that both place CFAP61 in the axoneme.
    supported_by:
      - reference_id: PMID:36659204
        supporting_text: >-
          absence of Cfap61 impaired sperm flagella ultrastructural abnormalities
          on account of numerous distortions in multiple flagellum components

# --- Annotation 12: cilium movement (ISS) ---
- term:
    id: GO:0003341
    label: cilium movement
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for cilium movement, transferred from Chlamydomonas ortholog
      (UniProtKB:A8IF44). In Chlamydomonas, CSC disruption impairs flagellar motility.
      CFAP61 is not a motor protein, but its structural role in the radial spoke system
      is required for proper cilium/flagellum beating. The term "cilium movement" is
      quite broad. Note that mouse Cfap61 KO causes sperm motility defects but NO
      respiratory ciliary dyskinesia (PMID:34792097), suggesting the contribution to
      cilium movement may be organ-specific.
    action: KEEP_AS_NON_CORE
    reason: >-
      CFAP61 contributes to cilium movement indirectly through its structural role in
      the RS3 base. However, mouse KO shows no PCD phenotype despite sperm defects
      (PMID:34792097), indicating that CFAP61 is not universally essential for cilium
      movement across all tissues. The annotation is not wrong (Chlamydomonas evidence
      is valid) but represents a non-core, indirect contribution rather than a direct
      role in motility.
    supported_by:
      - reference_id: PMID:34792097
        supporting_text: >-
          We generated Cfap61 knockout mice that recapitulate the infertility phenotype
          of the human CFAP61 mutation, but without other symptoms usually observed in PCD

