# --- Annotation 14: cilium organization (ISS, from Q23F13) ---
- term:
    id: GO:0044782
    label: cilium organization
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for cilium organization, transferred from ortholog UniProtKB:Q23F13.
      CFAP61 is required for proper organization of ciliary/flagellar axonemal structures
      including radial spokes, central pair, and inner dynein arms (PMID:34792097,
      PMID:35174165). However, "cilium organization" is a very broad BP term. The more
      specific "sperm flagellum assembly" (GO:0120316) captures the experimentally
      validated process more precisely.
    action: KEEP_AS_NON_CORE
    reason: >-
      Not wrong but overly broad. CFAP61 does contribute to cilium organization
      (specifically axonemal radial spoke organization), but more specific terms like
      sperm flagellum assembly better capture its demonstrated biological role. The
      term also implies a role in respiratory cilium organization which is not well
      supported given the absence of PCD in Cfap61 KO mice (PMID:34792097).

