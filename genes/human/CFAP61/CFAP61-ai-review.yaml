# --- Annotation 16: radial spoke stalk (ISS, colocalizes_with) ---
- term:
    id: GO:0001536
    label: radial spoke stalk
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation for radial spoke stalk localization, transferred from
      Chlamydomonas ortholog (UniProtKB:A8IF44). The qualifier is "colocalizes_with"
      rather than "located_in". Cryo-EM structure of human respiratory cilia
      (PMID:37258679, Walton et al. 2023) directly shows that CFAP61 forms the RS3
      base (not the stalk proper). The GO term "radial spoke base" (GO:0120339) would
      be more accurate than "radial spoke stalk". Furthermore, the qualifier should
      be "located_in" rather than "colocalizes_with" given the cryo-EM structural
      evidence showing CFAP61 as an integral component.
    action: MODIFY
    reason: >-
      The cryo-EM structure (PMID:37258679) resolves CFAP61 as a component of the
      RS3 base, not the stalk. GO:0120339 (radial spoke base) is the more accurate
      term. Additionally, the "colocalizes_with" qualifier understates the evidence:
      cryo-EM shows CFAP61 is an integral structural component of the RS3 base, not
      merely colocalizing. The ISS from Chlamydomonas was reasonable when assigned
      in 2017 but can now be refined with the 2023 cryo-EM data.
    proposed_replacement_terms:
      - id: GO:0120339
        label: radial spoke base
    additional_reference_ids:
      - PMID:37258679
    supported_by:
      - reference_id: PMID:37258679
        supporting_text: >-
          a full-length RS3, which we show is built on a base of CFAP61, CFAP91
          and CFAP251 ... Only the composition of the base of RS3 is known

