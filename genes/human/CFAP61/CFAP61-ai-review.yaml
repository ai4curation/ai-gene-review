    action: ACCEPT
    reason: >-
      The publication directly demonstrates CFAP61 localization to sperm flagella by
      immunostaining in both mouse and human. Although the primary detailed
      characterization is in mouse, the paper also reports human sperm localization.
      This is a core localization for CFAP61.
    supported_by:
      - reference_id: PMID:36659204
        supporting_text: >-
          Immunostaining experiments in wild-type mice and healthy adult humans
          indicated that Cfap61 is initially localized at the neck of sperm, where
          it potentially functions in flagellum formation, and is later localized
          to the midpiece of the sperm

# --- Annotation 7: axoneme (IDA, PMID:28282151) ---
- term:
    id: GO:0005930
    label: axoneme
  evidence_type: IDA
  original_reference_id: PMID:28282151
  review:
    summary: >-
      IDA annotation for axoneme localization based on PMID:28282151 (Blackburn et al.
      2017), a quantitative proteomic analysis of human airway cilia. CFAP61 was
      identified among over 400 proteins in isolated ciliary axonemes from human
      bronchial epithelial cells. Immunoblotting confirmed CFAP61 presence in axoneme
      preparations, and immunofluorescence showed it labels the full length of cilia.
      This is solid direct evidence for axoneme localization in human respiratory cilia.
    action: ACCEPT
    reason: >-
      High-quality proteomics study directly identifying CFAP61 in purified human
      airway cilia axonemes. Confirmed by immunoblotting and immunofluorescence.
      This provides human-specific evidence for axoneme localization in respiratory
      cilia. This is a core localization annotation.
    supported_by:
      - reference_id: PMID:28282151
        supporting_text: >-
          CFAP77 and CFAP61 were undetectable. In contrast, all of the proteins were
          clearly present in the isolated axonemal preparation. These results support
          the conclusion that these uncharacterized proteins are integral components
          of the ciliary axoneme.
      - reference_id: PMID:28282151
        supporting_text: >-
          Antibodies against CFAP61 label the length of the cilia

# --- Annotation 8: sperm flagellum assembly (IMP, PMID:35174165) ---
- term:
    id: GO:0120316
    label: sperm flagellum assembly
  evidence_type: IMP
  original_reference_id: PMID:35174165
  review:
    summary: >-
      IMP annotation for sperm flagellum assembly based on PMID:35174165 (Ma et al.
      2022). Biallelic truncating CFAP61 variants in three Pakistani families caused
      MMAF with severe axonemal disorganization shown by TEM and loss of CFAP61 and
      CFAP251 from sperm tails by immunofluorescence. This demonstrates that CFAP61
      is required for normal sperm flagellum structure.
    action: ACCEPT
    reason: >-
      Strong human genetic evidence demonstrating that loss of CFAP61 causes severe
      sperm flagellar structural defects (absent, short, bent, coiled flagella with
      disorganized axonemes). This directly supports involvement in sperm flagellum
      assembly as a core biological process.
    supported_by:
      - reference_id: PMID:35174165
        supporting_text: >-
          Transmission electron microscopy analyses revealed severe disorganized
          axonemal ultrastructures, and missings of central pair, RSs, and inner
          dynein arms were also observed and confirmed by immunofluorescence staining
          in spermatozoa from patients

# --- Annotation 9: flagellated sperm motility (IMP, PMID:34792097) ---
- term:
    id: GO:0030317
    label: flagellated sperm motility
  evidence_type: IMP
  original_reference_id: PMID:34792097
  review:
    summary: >-
      IMP annotation for flagellated sperm motility based on PMID:34792097 (Liu et al.
      2021). The qualifier in GOA is "acts_upstream_of_or_within" which is appropriately
      cautious, as the motility defect is secondary to the structural assembly defect
      rather than a direct motor function of CFAP61. Cfap61 KO mice show severely
      reduced sperm motility, and human patients with CFAP61 mutations show only 20%
      progressive motility. The motility defect is a downstream consequence of radial
      spoke and axoneme disorganization.
    action: ACCEPT
    reason: >-
      CFAP61 is not itself a motor protein, but its structural role in the RS3 base
      is required for proper axonemal function and sperm motility. The
      "acts_upstream_of_or_within" qualifier is appropriately cautious. Both human
      patient data and mouse KO data show severely reduced sperm motility when CFAP61
      is lost.
    supported_by:
      - reference_id: PMID:34792097
        supporting_text: >-
          We find that a CFAP61 splice variant, c.143+5G>A, causes exon
          skipping/intron retention in human, inducing a multiple morphological
          abnormalities of the flagella (MMAF) phenotype

# --- Annotation 10: sperm flagellum assembly (IMP, PMID:34792097) ---
- term:
    id: GO:0120316
    label: sperm flagellum assembly
  evidence_type: IMP
  original_reference_id: PMID:34792097
  review:
    summary: >-
      IMP annotation for sperm flagellum assembly based on PMID:34792097 (Liu et al.
      2021), with qualifier "acts_upstream_of_or_within". Cfap61 KO mice show severe
      flagellar morphological abnormalities and impaired radial spoke assembly during
      spermiogenesis. The CFAP61 splice variant in human causes MMAF. This is a
      duplicate of annotation 8 (PMID:35174165) in terms of GO term but from a
      different publication with additional mechanistic detail from the mouse KO model.
    action: ACCEPT
    reason: >-
      Strong evidence from both human genetics and mouse KO. This annotation captures
      the same core process as annotation 8 but from an independent study with detailed
      mechanistic characterization of the assembly defect (impaired RS assembly in
      early spermatids, axoneme instability in later stages). The duplicate GO term
      with different evidence and reference is acceptable.
    supported_by:
      - reference_id: PMID:34792097
        supporting_text: >-
          During early stages of Cfap61-/- spermatid development, the assembly of
          radial spoke components is impaired. As spermiogenesis progresses, the
          axoneme in Cfap61-/- cells becomes unstable and scatters, and the
          distribution of intraflagellar transport proteins is disrupted

# --- Annotation 11: axoneme (IDA, PMID:36659204) ---
- term:
    id: GO:0005930
    label: axoneme
  evidence_type: IDA
  original_reference_id: PMID:36659204
  review:
    summary: >-
      IDA annotation for axoneme localization based on PMID:36659204 (Huang et al.
      2020), assigned by MGI. The study demonstrates that Cfap61 deletion results in
      severe ultrastructural abnormalities of the sperm flagellum axoneme, consistent
