existing_annotations:
# --- Annotation 1: sperm flagellum (IBA) ---
- term:
    id: GO:0036126
    label: sperm flagellum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for sperm flagellum localization based on phylogenetic inference
      from mouse ortholog and PANTHER family. CFAP61 is well-established as a sperm
      flagellum component: mouse Cfap61 localizes to sperm flagella by immunostaining
      (PMID:36659204), and human CFAP61 mutations cause MMAF with loss of CFAP61
      signal from sperm tails (PMID:35174165). The IBA annotation is well-supported
      and at an appropriate level of specificity.
    action: ACCEPT
    reason: >-
      Strong phylogenetic and experimental support for CFAP61 localization to the
      sperm flagellum. Mouse immunostaining directly demonstrates flagellar localization
      (PMID:36659204), and human patient immunofluorescence shows absence of CFAP61
      from sperm tails in loss-of-function cases (PMID:35174165). The IBA is concordant
      with the IDA evidence and represents a core localization.
    supported_by:
      - reference_id: PMID:36659204
        supporting_text: >-
          Here, we found that cilia-and flagella-associated protein 61 (Cfap61) is
          highly expressed specifically in murine testes and show that the
          Cfap61-knockout male mice demonstrate MMAF phenotype, including sperm with
          short, coiled, and irregular flagella
      - reference_id: PMID:35174165
        supporting_text: >-
          CFAP61 and CFAP251 signals were absent from sperm tails of the patients,
          which suggested the loss of functional CSC in sperm flagella

# --- Annotation 2: sperm flagellum assembly (IBA) ---
- term:
    id: GO:0120316
    label: sperm flagellum assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in sperm flagellum assembly, inferred from
      phylogenetic analysis. This is strongly supported by human genetics showing
      that biallelic CFAP61 loss-of-function variants cause MMAF (PMID:34792097,
      PMID:35174165), and by mouse KO models showing severe flagellar morphological
      abnormalities (PMID:36659204). CFAP61 is required for proper radial spoke
      assembly during spermiogenesis (PMID:34792097).
    action: ACCEPT
    reason: >-
      Core biological process for CFAP61. Both human genetic evidence and mouse KO
      models demonstrate that CFAP61 is essential for sperm flagellum assembly. The
      IBA annotation is well-calibrated and supported by multiple lines of direct
      experimental evidence.
    supported_by:
      - reference_id: PMID:34792097
        supporting_text: >-
          CFAP61 is required for sperm flagellum formation and male fertility in
          human and mouse ... During early stages of Cfap61-/- spermatid development,
          the assembly of radial spoke components is impaired
      - reference_id: PMID:35174165
        supporting_text: >-
          our findings report that homozygous variants in CFAP61 are associated with
          MMAF and male infertility, demonstrating the essential role of this gene
          in normal sperm flagellum structure in humans

# --- Annotation 3: cytoskeleton (IEA) ---
- term:
    id: GO:0005856
    label: cytoskeleton
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for cytoskeleton localization, mapped from UniProtKB subcellular
      location vocabulary. CFAP61 is indeed a cytoskeletal protein as a component of
      the axonemal radial spoke complex. This is a very broad term but not incorrect.
      More specific terms (axoneme, radial spoke base) capture the localization more
      precisely.
    action: ACCEPT
    reason: >-
      Correct but very generic. CFAP61 is a structural component of the axoneme,
      which is part of the cytoskeleton. The IEA mapping from UniProt subcellular
      location is accurate. More informative CC terms (axoneme, radial spoke base)
      are also present, so this broad term is acceptable as a parent annotation.

