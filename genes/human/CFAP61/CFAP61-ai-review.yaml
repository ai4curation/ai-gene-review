# --- New annotation 3: structural constituent of cytoskeleton ---
- term:
    id: GO:0005200
    label: structural constituent of cytoskeleton
  evidence_type: IDA
  original_reference_id: PMID:37258679
  review:
    summary: >-
      NEW annotation for molecular function. CFAP61 currently has NO molecular function
      annotation in GOA. Cryo-EM (PMID:37258679) shows CFAP61 is an integral structural
      component of the RS3 base, a cytoskeletal structure within the axoneme. It contains
      a Rossmann-like FAD/NAD(P)-binding domain fold (Gene3D 3.50.50.60) that is exapted
      for structural purposes with no catalytic activity (pseudoenzyme). The more specific
      term "structural constituent of cytoskeleton" (GO:0005200) is preferred over the
      parent "structural molecule activity" (GO:0005198) because the axoneme is a
      cytoskeletal structure.
    action: NEW
    reason: >-
      CFAP61 has no molecular function annotation in GOA, which is a significant gap.
      The protein functions as a structural scaffold within the RS3 base of the axoneme,
      as demonstrated by cryo-EM (PMID:37258679). Its Rossmann-like fold domains are
      repurposed for structural protein-protein interactions rather than catalysis.
      GO:0005200 is the most accurate MF term for this pseudoenzyme that contributes to
      cytoskeletal (axonemal) structural integrity.
    additional_reference_ids:
      - PMID:37258679
    supported_by:
      - reference_id: PMID:37258679
        supporting_text: >-
          a full-length RS3, which we show is built on a base of CFAP61, CFAP91
          and CFAP251

