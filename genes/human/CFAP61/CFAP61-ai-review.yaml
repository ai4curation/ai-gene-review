      supporting_text: >-
        these uncharacterized proteins are integral components of the ciliary axoneme

suggested_questions:
- question: >-
    What is the functional redundancy between CFAP61 and other CSC components
    (CFAP91, CFAP251) in respiratory cilia vs. sperm flagella? Does the lack of PCD
    in CFAP61 KO mice reflect tissue-specific redundancy or a fundamentally different
    RS3 requirement?
- question: >-
    Can the Rossmann-like fold of CFAP61 bind any nucleotide cofactors (FAD, NAD),
    even without catalytic activity? Could it have a regulatory sensing role?
- question: >-
    Should the IDA annotation for sperm flagellum (PMID:36659204) carry a note that
    the primary evidence is from mouse immunostaining, even though human data is also
    shown?

suggested_experiments:
- description: >-
    Perform immunofluorescence or proximity ligation assay in human airway epithelial
    cells to directly confirm CFAP61 localization to the RS3 base in respiratory cilia,
    complementing the cryo-EM and proteomics data.
- description: >-
    Test whether CFAP61 Rossmann-like fold domains can bind FAD or NAD(P) in vitro
    using isothermal titration calorimetry or thermal shift assay, to definitively
    confirm pseudoenzyme status.
- description: >-
    Evaluate ciliary beat frequency and waveform in airway epithelial cells from
    CFAP61 MMAF patients to determine whether subtle respiratory ciliary defects
    exist that are below clinical detection threshold.
