  findings: []
- id: PMID:28282151
  title: >-
    Quantitative Proteomic Analysis of Human Airway Cilia Identifies Previously
    Uncharacterized Proteins of High Abundance.
  findings:
    - statement: CFAP61 protein was identified as a component of the human respiratory
        ciliary axoneme by quantitative proteomics (LC/MSE mass spectrometry).
      supporting_text: "CFAP61 (C20orf26) was also identified in our proteomic screen;
        and RT-PCR and immunoblot data clearly show that its expression is linked to
        ciliogenesis."
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: CFAP61 localizes along the full length of the ciliary axoneme in
        human respiratory cilia, as shown by immunofluorescence microscopy.
      supporting_text: "Antibodies against CFAP61 label the length of the cilia (Fig.
        4g, 4o and Fig. SI-3g); however the signal with this antibody was weaker than
        that observed with other proteins, e.g. SPACA9. This is likely due to the ~10-fold
        lower levels of CFAP61 compared to SPACA9 (184 vs 1771 fmol)."
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: CFAP61 transcript expression increases during ciliogenesis in human
        airway epithelial cell cultures, consistent with a role in ciliated cell differentiation.
      supporting_text: "CFA61 appeared to be expressed at a lower level than the other
        proteins, but followed a similar pattern of expression, with transcripts undetectable
        at days 4 and 8, weakly detectable at day 12, and present at variable levels
        at later time points."
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: CFAP61 protein was detected in isolated ciliary axoneme preparations
        by immunoblotting, confirming it is an integral axonemal component, even though
        it was undetectable in whole differentiated cell lysate.
      supporting_text: "CFAP77 and CFAP61 were undetectable. In contrast, all of the
        proteins were clearly present in the isolated axonemal preparation. These results
        support the conclusion that these uncharacterized proteins are integral components
        of the ciliary axoneme."
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: CFAP61 shares high homology with Chlamydomonas FAP61, an oxidoreductase
        domain protein identified as part of the calmodulin and radial spoke-associated
        complex (CSC).
      supporting_text: "CFAP61 (UniProtKB: Q8NHU2) is a large protein (114 kDa) of
        unknown function, although it shares a high degree of homology with the Chlamydomonas
        protein FAP61, an oxidoreductase protein identified as part of the calmodulin
        and radial spoke-associated complex that mediates regulatory signals between
        the radial spokes and dynein arms (73)."
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:34792097
  title: >-
    CFAP61 is required for sperm flagellum formation and male fertility in human
    and mouse.
  findings:
    - statement: CFAP61 is a conserved component of the calmodulin- and radial spoke-associated
        complex (CSC) of cilia.
      supporting_text: "We report that CFAP61 is a conserved component of the calmodulin-
        and radial spoke-associated complex (CSC) of cilia."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: CFAP61 interacts with the CSC, radial spoke stalk and head components.
      supporting_text: "We find that CFAP61 interacts with the CSC, radial spoke stalk
        and head."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Loss of Cfap61 in mouse spermatids impairs assembly of radial spoke
        components during early spermiogenesis.
      supporting_text: "During early stages of Cfap61-/- spermatid development, the
        assembly of radial spoke components is impaired."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: As spermiogenesis progresses in Cfap61-/- mice, the axoneme becomes
        unstable and scatters, and intraflagellar transport protein distribution is
        disrupted.
      supporting_text: "As spermiogenesis progresses, the axoneme in Cfap61-/- cells
        becomes unstable and scatters, and the distribution of intraflagellar transport
        proteins is disrupted."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: A human CFAP61 splice variant (c.143+5G>A) causes MMAF but not other
        PCD symptoms, revealing an organ-specific mechanism of axoneme stabilization.
      supporting_text: "We find that a CFAP61 splice variant, c.143+5G>A, causes exon
        skipping/intron retention in human, inducing a multiple morphological abnormalities
        of the flagella (MMAF) phenotype."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Cfap61 knockout mice recapitulate human infertility but lack other
        PCD symptoms, indicating a flagellum-specific role.
      supporting_text: "We generated Cfap61 knockout mice that recapitulate the infertility
        phenotype of the human CFAP61 mutation, but without other symptoms usually
        observed in PCD."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:35174165
  title: >-
    Biallelic Variants in CFAP61 Cause Multiple Morphological Abnormalities of
    the Flagella and Male Infertility.
  findings:
    - statement: CFAP61 is the mammalian ortholog of a Chlamydomonas CSC subunit, forming
        the CSC together with CFAP91 and CFAP251.
      supporting_text: "Cilia- and flagella-associated protein 61 (CFAP61), CFAP91
        and CFAP251 are the mammalian orthologs of C. reinhardtii CSC proteins (Dymek and Smith, 2007)"
      reference_section_type: INTRODUCTION
      full_text_unavailable: false
    - statement: Biallelic loss-of-function CFAP61 variants (frameshift and nonsense)
        cause MMAF in humans, with severely disorganized axonemal ultrastructures including
        loss of central pair, radial spokes, and inner dynein arms.
      supporting_text: "Transmission electron microscopy analyses revealed severe disorganized
        axonemal ultrastructures, and missings of central pair, RSs, and inner dynein
        arms were also observed and confirmed by immunofluorescence staining in spermatozoa
        from patients."
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: Loss of CFAP61 leads to concomitant loss of CFAP251 from sperm flagella,
        indicating CFAP61 is required for CSC integrity.
      supporting_text: "CFAP61 and CFAP251 signals were absent from sperm tails of
        the patients, which suggested the loss of functional CSC in sperm flagella."
      reference_section_type: ABSTRACT
      full_text_unavailable: false
    - statement: CFAP61 is essential for the localization of CFAP251 in sperm flagella,
        suggesting CFAP61 may play a predominant role within the CSC.
      supporting_text: "Furthermore, we observed a complete absence of CFAP251 proteins
        in the sperm tails of the patients with CFAP61 variants, indicating that CFAP61
        is essential for the localization of CFAP251 in sperm flagella. Altogether,
        it is suggested that CFAP61 may play a more predominant role in CSC."
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: CFAP61 localizes along the full length of mature human spermatozoa
        flagella, unlike in mouse where it is restricted to the midpiece.
      supporting_text: "However, in humans, CFAP61 localized along the full-length
        of mature spermatozoa, and we did not observe any obvious defects in the mitochondria
        of patients."
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: Patients with CFAP61 variants lack PCD symptoms, confirming flagellum-specific
        pathology without respiratory ciliary defects.
      supporting_text: "all the patients declared they have no ciliary-related clinical
        features (including situs ambiguous, unexplained chronic airway infections,
        respiratory distress at newborn, chronic middle ear infections, clubbing, hydrocephalus
        etc.)"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: CFAP61 variants cause loss of central pair (SPAG6), radial spoke (TSGA2),
        and inner dynein arm (DNAH1) markers in patient spermatozoa by immunofluorescence.
      supporting_text: "SPAG6 and TSGA2 signals were completely absent in the patient\u2019s
        spermatozoa (Figure 2C&D). DNAH1 signals were also absent from most of the
        spermatozoa that were examined, and only 4.8% of spermatozoa displayed normal
        and 14.4% displayed weak DNAH1 signals (Figure 2E)"
      reference_section_type: RESULTS
      full_text_unavailable: false
- id: PMID:36659204
  title: >-
    Absence of murine CFAP61 causes male infertility due to multiple morphological
    abnormalities of the flagella.
  findings:
    - statement: Cfap61 is highly expressed specifically in murine testes.
      supporting_text: "we found that cilia-and flagella-associated protein 61 (Cfap61)
        is highly expressed specifically in murine testes"
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Cfap61 knockout mice display MMAF phenotype including short, coiled,
        and irregular flagella, with severely reduced sperm count and motility leading
        to male infertility.
      supporting_text: "the Cfap61-knockout male mice demonstrate MMAF phenotype, including
        sperm with short, coiled, and irregular flagella. Deletion of Cfap61 resulted
        in severe morphological and behavior abnormalities in sperm, reduced total sperm
        counts, impaired sperm motility, and led to male infertility."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: In mouse sperm, Cfap61 initially localizes at the neck where it potentially
        functions in flagellum formation, and later localizes to the midpiece.
      supporting_text: "Immunostaining experiments in wild-type mice and healthy adult
        humans indicated that Cfap61 is initially localized at the neck of sperm, where
        it potentially functions in flagellum formation, and is later localized to the
        midpiece of the sperm."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
    - statement: Absence of Cfap61 causes ultrastructural abnormalities in multiple
        flagellum components.
      supporting_text: "absence of Cfap61 impaired sperm flagella ultrastructural abnormalities
        on account of numerous distortions in multiple flagellum components."
      reference_section_type: ABSTRACT
      full_text_unavailable: true
- id: PMID:37258679
  title: >-
    Axonemal structures reveal mechanoregulatory and disease mechanisms.
  findings:
    - statement: Cryo-EM atomic model of human respiratory cilia reveals that CFAP61,
        CFAP91, and CFAP251 form the base of radial spoke 3 (RS3).
      supporting_text: "The simpler architectures of RS1 and RS2 may be compensated
        by a full-length RS3, which we show is built on a base of CFAP61, CFAP91 and
        CFAP251 (Fig"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: The CFAP61/CFAP91/CFAP251 triumvirate, previously assigned to the
        CSC, forms the stubby headless RS3 stand-in (RS3S) in Chlamydomonas, but in
        humans constitutes the base of a full-length RS3.
      supporting_text: "The homologues of this triumvirate were previously assigned
        to the calmodulin- and spoke-associated complex35,36, which we show form the
        stubby, headless RS3 stand-in (RS3S) in C.\u2009reinhardtii"
      reference_section_type: RESULTS
      full_text_unavailable: false
    - statement: CFAP91 physically links CFAP251 and CFAP61 at the RS3 base, extending
        from the base of RS2 through the N-DRC to the RS3 subunits.
      supporting_text: "This type of interlocking is also observed for CFAP91, which
        begins at the base of RS2, interacts with the N-DRC14 and then links the RS3
        subunits CFAP251 and CFAP61 (Fig"
      reference_section_type: DISCUSSION
      full_text_unavailable: false
    - statement: IDAd and IDAg associate with RS3 and the ZMYND12/TTC29 complex in
        humans, indicating that the RS3 base (including CFAP61) serves as a docking
        platform for inner dynein arms.
      supporting_text: "IDAd and IDAg are unusual among single-headed IDAs because their
        N-terminal tails and auxiliary subunits are amalgamated into a single complex
        that associates with RS3 and ZMYND12/TTC29 complex in humans or the equivalent
        RS3S and p38/p44 in C.\u2009reinhardtii"
      reference_section_type: RESULTS
      full_text_unavailable: false

core_functions:
- description: >-
    Pseudoenzyme structural scaffold of the radial spoke 3 (RS3) base in motile cilia
    and sperm flagella axonemes. CFAP61 contains a Rossmann-like FAD/NAD(P)-binding
    domain fold (Gene3D 3.50.50.60) that is exapted for structural protein-protein
    interaction rather than catalysis. Together with CFAP91 and CFAP251, it forms the
    calmodulin- and spoke-associated complex (CSC) that anchors RS3 to the outer doublet
    microtubule A-tubule. The RS3 base also serves as a docking platform for inner
    dynein arms IDAd and IDAg. Required for sperm flagellum assembly (loss causes MMAF),
    but not essential for respiratory ciliary function.
