# --- Annotation 6: sperm flagellum (IDA, PMID:36659204) ---
- term:
    id: GO:0036126
    label: sperm flagellum
  evidence_type: IDA
  original_reference_id: PMID:36659204
  review:
    summary: >-
      IDA annotation for sperm flagellum localization based on PMID:36659204 (Huang
      et al. 2020), which used immunostaining in wild-type mice and healthy human
      tissue to show that Cfap61/CFAP61 localizes to sperm flagella. The annotation
      was assigned by MGI. Note that the primary immunostaining evidence is from mouse
      Cfap61, with human CFAP61 localization also shown. The qualifier is "located_in"
