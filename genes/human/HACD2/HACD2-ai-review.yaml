taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HACD2 (very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase 2; formerly PTPLB) is a
  multi-pass endoplasmic reticulum membrane enzyme (EC 4.2.1.134, a lyase) that catalyzes
  the third of the four steps of the microsomal fatty acid elongation cycle. It dehydrates
  a very-long-chain (3R)-3-hydroxyacyl-CoA (generated by the 3-ketoacyl-CoA reductase step)
  to the corresponding very-long-chain (2E)-enoyl-CoA plus water, which is then reduced by
  trans-2-enoyl-CoA reductase (TECR) to complete the two-carbon elongation. HACD2 acts over
  a broad acyl chain-length range (roughly C16 to C26) and, together with the condensing
  ELOVL enzymes, the 3-ketoacyl-CoA reductase, and TECR, forms the ER very-long-chain fatty
  acid (VLCFA) elongase machinery. It is one of four mammalian HACD paralogs (HACD1-4);
  HACD2 is broadly/ubiquitously expressed whereas HACD1 (PTPLA) is muscle-enriched. The
  VLCFAs it helps produce are precursors of membrane lipids and lipid mediators, including
  sphingolipids/ceramides. Despite belonging to a "protein tyrosine phosphatase-like"
  (PTPLA/PTPLB) sequence family, HACD2 has no phosphatase activity.
