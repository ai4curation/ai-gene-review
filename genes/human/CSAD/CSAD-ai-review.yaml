id: Q9Y600
gene_symbol: CSAD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CSAD is cysteine sulfinic acid decarboxylase (sulfinoalanine decarboxylase), a
  cytosolic pyridoxal 5'-phosphate (PLP)-dependent decarboxylase of the group II
  (glutamate-decarboxylase-like) family. It catalyzes the committed step of
  taurine/hypotaurine biosynthesis: decarboxylation of 3-sulfino-L-alanine
  (L-cysteinesulfinate) to hypotaurine plus CO2 (EC 4.1.1.29); it can also
  decarboxylate L-cysteate to taurine. 3-Sulfino-L-alanine is the preferred
  substrate, and the enzyme does not decarboxylate glutamate. The product
  hypotaurine is subsequently oxidized to taurine, making CSAD the principal
  route of endogenous taurine synthesis in mammals (highest in liver). The enzyme
  uses PLP bound through a Schiff base to an active-site lysine and functions as a
  homodimer. It is expressed most highly in liver and brain, where it occurs in
  both neurons and astrocytes. In addition to its main sulfinoalanine
  decarboxylase activity, it exhibits a secondary aspartate 1-decarboxylase
  activity (L-aspartate to beta-alanine, EC 4.1.1.11).
