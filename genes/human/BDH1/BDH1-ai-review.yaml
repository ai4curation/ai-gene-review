  qualifier: involved_in
  review:
    summary: >-
      Ensembl-Compara orthology IEA (from mouse Bdh1) placing BDH1 in "ketone biosynthetic
      process". BDH1 acts specifically on the ketone bodies beta-hydroxybutyrate/acetoacetate and
      catalyses the terminal step of ketogenesis, so the ketone-body-specific process term is more
      accurate than the general "ketone" term.
    action: MODIFY
    reason: >-
      The essence is correct (biosynthetic role) but the term is more general than warranted. BDH1
      produces the ketone body beta-hydroxybutyrate in the final step of ketogenesis; the
      ketone-body-specific term better captures this.
