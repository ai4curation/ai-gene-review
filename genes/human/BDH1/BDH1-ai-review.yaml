id: Q02338
gene_symbol: BDH1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  BDH1 is the mitochondrial NAD+-dependent D-beta-hydroxybutyrate dehydrogenase
  (EC 1.1.1.30), a short-chain dehydrogenase/reductase (SDR) family enzyme anchored to the
  matrix side of the mitochondrial inner membrane. It catalyses the reversible interconversion of
  the two principal ketone bodies, (R)-3-hydroxybutanoate + NAD+ <=> acetoacetate + NADH + H+.
  This single reaction serves two opposite physiological directions: it is the terminal step of
  hepatic ketogenesis, producing beta-hydroxybutyrate (the main circulating ketone body), and the
  initiating step of ketolysis in peripheral tissues (heart, brain, skeletal muscle), regenerating
  acetoacetate for downstream oxidation. BDH1 is a lipid-dependent enzyme that requires
  phosphatidylcholine as an allosteric activator for full activity, and it assembles as a
  homotetramer. It is highly expressed in liver and mitochondria-rich oxidative tissues, where it
  is central to ketone-body homeostasis and the use of ketone bodies as an alternative energy
  substrate during fasting, prolonged exercise, or carbohydrate restriction.
