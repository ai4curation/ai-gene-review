core_functions:
- description: >-
    NAD+-dependent oxidation of (R)-3-hydroxybutyrate to acetoacetate (and the reverse reduction),
    the reversible dehydrogenase reaction (EC 1.1.1.30) that interconverts the two ketone bodies at
    the matrix side of the mitochondrial inner membrane. This activity requires phosphatidylcholine
    as an allosteric activator and is the enzymatic basis of both ketogenesis and ketolysis.
