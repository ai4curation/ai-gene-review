proposed_new_terms: []
suggested_questions:
- question: >-
    Do the two Reactome directions (synthesis vs utilization) reflect genuinely tissue-directional
    physiology of the same BDH1 enzyme (liver ketogenesis vs peripheral ketolysis), or does BDH1
    equilibrium in vivo depend chiefly on the mitochondrial NAD+/NADH ratio in each tissue?
- question: >-
    Is BDH1's phosphatidylcholine dependence rate-limiting for ketone-body flux under physiological
    conditions, or is it primarily a structural/regulatory feature of the inner-membrane enzyme?
suggested_experiments:
- description: >-
    Tissue-specific stable-isotope tracing of beta-hydroxybutyrate/acetoacetate flux in liver
    versus heart/brain with BDH1 depletion to test the directional (ketogenic vs ketolytic) roles.
  experiment_type: metabolic flux analysis
  hypothesis: >-
    BDH1 controls net directionality of ketone-body interconversion primarily through the local
    mitochondrial NAD+/NADH ratio rather than intrinsic tissue-specific enzyme differences.
- description: >-
    Reconstitution of purified human BDH1 into liposomes of varying phosphatidylcholine content to
    quantify the dependence of Vmax/Km on membrane PC.
  experiment_type: enzyme kinetics / reconstitution
  hypothesis: >-
    Phosphatidylcholine is an obligatory allosteric activator that modulates NAD(H) binding affinity
    and thus catalytic efficiency of BDH1.
