  label: Homo sapiens
description: SEC11C (SPC21, SEC11L3; EC 3.4.21.89) is a single-pass type II endoplasmic reticulum membrane protein and one of the two catalytic serine-endopeptidase subunits of the human signal peptidase complex (SPC). As the proteolytic subunit of the SPC-C paralog (with accessory subunits SPCS1, SPCS2 and SPCS3), SEC11C catalyzes cleavage of N-terminal signal (leader) peptides from secretory and membrane pre-proteins as they are translocated into the ER lumen. It belongs to peptidase family S26B and uses a Ser/His/Asp-type charge-relay catalytic system (Ser-68 nucleophile). Its active site abuts the ER membrane, where the complex locally thins the lipid bilayer, conferring selectivity for signal peptides whose hydrophobic h-region is shorter than ~18-20 residues. SEC11C is the paralog of the more broadly expressed SEC11A; the two catalytic subunits form distinct but functionally analogous SPC paralogs.
