suggested_questions:
- question: What distinguishes the substrate specificity of the SEC11C (SPC-C) versus SEC11A (SPC-A) paralogous signal peptidase complexes, and do they serve distinct subsets of the secretory proteome or distinct tissues?
- question: How does the SPC's local thinning of the ER membrane mechanistically couple signal-peptide h-region length to catalytic engagement by SEC11C?
suggested_experiments:
- description: Reconstitute purified SPC-C (SEC11C + SPCS1/2/3) and assay cleavage of a panel of signal peptides varying in h-region length to quantify SEC11C's length-dependent specificity, comparing wild-type Ser-68 to the catalytic-dead S68A mutant.
- description: Acute degron depletion of SEC11C versus SEC11A followed by N-terminomics (e.g. TAILS) to define the paralog-specific repertoire of cleaved signal-peptide substrates in human cells.
