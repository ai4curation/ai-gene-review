- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HTP
  original_reference_id: PMID:34800366
  qualifier: located_in
  review:
    summary: >-
      RPIA appears in a large-scale high-throughput mitochondrial proteome
      (MitoCoP) dataset. RPIA is a soluble cytosolic housekeeping enzyme with no
      mitochondrial transit peptide, and its established site of action is the
      cytosol; the mitochondrial signal most likely reflects co-purification in
      the proteomic preparation rather than a genuine mitochondrial pool.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Isolated HTP proteomics hit that conflicts with the well-established
      cytosolic localisation and the lack of any targeting sequence; treated as an
      over-annotation rather than removed, as it is an experimental
      (high-throughput) dataset whose full detail is not verifiable here.
    supported_by:
