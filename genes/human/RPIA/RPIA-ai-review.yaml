id: P49247
gene_symbol: RPIA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPIA is ribose-5-phosphate isomerase (EC 5.3.1.6), a cytosolic enzyme of the
  non-oxidative branch of the pentose phosphate pathway. It catalyses the
  reversible aldose-ketose interconversion of D-ribose-5-phosphate and
  D-ribulose-5-phosphate. In the biosynthetic direction it supplies
  ribose-5-phosphate for nucleotide, nucleotide-cofactor and other precursor
  biosynthesis; in the regenerative direction it feeds ribulose-5-phosphate
  toward the transketolase/transaldolase reactions that reconnect the pathway to
  glycolysis. Loss-of-function causes ribose-5-phosphate isomerase deficiency, an
  extremely rare autosomal-recessive inborn error of metabolism presenting as a
  slowly progressive leukoencephalopathy with peripheral neuropathy and markedly
  elevated polyols (ribitol, D-arabitol) in brain and body fluids.
