suggested_questions:
- question: >-
    Does RPIA have any moonlighting or non-catalytic role that could explain the
    neurological phenotype of RPIA deficiency beyond simple pentose-phosphate flux
    disruption?
- question: >-
    Is the polyol accumulation (ribitol, D-arabitol) in RPIA deficiency directly
    neurotoxic, or is the phenotype driven by ribose-5-phosphate / nucleotide
    precursor shortage in the developing brain?
suggested_experiments:
- description: >-
    Kinetic characterisation of the human recombinant enzyme (wild-type versus
    disease variants such as p.Ala135Val) to quantify catalytic impairment in
    both reaction directions.
  experiment_type: enzyme kinetics
- description: >-
    Subcellular fractionation and imaging to test whether a genuine mitochondrial
    pool of RPIA exists or whether the high-throughput mitochondrial-proteome
    signal reflects co-purification of a cytosolic enzyme.
  experiment_type: cell biology / localisation
