id: Q01432
gene_symbol: AMPD3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: AMPD3 is the erythrocyte isoform (isoform E) of AMP deaminase (EC 3.5.4.6),
  a cytosolic zinc metalloenzyme that assembles into a homotetramer and catalyses the
  hydrolytic deamination of AMP to IMP plus ammonia (AMP + H2O + H+ = IMP + NH4+). It
  belongs to the metallo-dependent hydrolases superfamily, adenosine and AMP deaminases
  family, and is one of three vertebrate AMP deaminase isoforms (E/AMPD3, L/AMPD2,
  M/AMPD1) that share qualitatively the same catalytic activity but differ in tissue
  expression. By draining AMP to IMP, AMPD3 helps regulate the adenylate energy charge
  and the adenine-nucleotide pool; in red blood cells this maintains high ATP/ADP ratios
  while lowering the total adenine-nucleotide pool. Loss-of-function variants cause
  erythrocyte AMP deaminase deficiency (AMPDDE, MIM:612874), a clinically benign
  condition marked by an approximately 50% increase in steady-state erythrocyte ATP with
  no hemolysis or hematologic disease.
