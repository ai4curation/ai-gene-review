- term:
    id: GO:0006188
    label: IMP biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: AMPD3 does not perform de novo IMP biosynthesis. It regenerates IMP by
      hydrolytic deamination of AMP, which is a catabolic step acting on AMP, so the
      biological process is more accurately captured as AMP catabolism. UniProt places
      the reaction in the salvage arm of IMP metabolism, distinct from the de novo IMP
      biosynthesis branch this term sits under.
    action: MODIFY
    reason: The essence (AMPD3 contributes to IMP-yielding metabolism) is sound, but
      "IMP biosynthetic process" mis-frames a deamination/catabolic step as de novo
      biosynthesis; AMP catabolic process better describes the actual chemistry.
    proposed_replacement_terms:
    - id: GO:0006196
      label: AMP catabolic process
    supported_by:
    - reference_id: file:human/AMPD3/AMPD3-uniprot.txt
      supporting_text: 'Purine metabolism; IMP biosynthesis via salvage pathway; IMP'
    propagation_review:
      root_cause: TERM_SCOPING_PROBLEM
      failure_modes:
      - GRANULARITY_MISMATCH
