- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-6798748
  qualifier: located_in
  review:
    summary: This localization derives from the Reactome "Exocytosis of secretory granule
      lumen proteins" neutrophil-degranulation pathway, which catalogs proteins found in
      neutrophil granule proteomes. AMPD3 is a cytosolic purine-metabolism enzyme;
      catalog membership in a granule/exocytosis proteome does not establish a bona fide
      extracellular localization or function for it.
    action: MARK_AS_OVER_ANNOTATED
    reason: Extracellular localization for a cytosolic AMP deaminase arises from bulk
      neutrophil-granule proteomics rather than a genuine secreted role; treat as
      over-annotation, not core localization.
