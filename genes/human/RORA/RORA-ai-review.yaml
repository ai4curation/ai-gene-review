    label: nuclear receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: 'Core molecular function: RORA is an oxysterol-modulated nuclear receptor transcription factor.'
    action: ACCEPT
    reason: Nuclear receptor activity integrates ligand binding, ROR-response-element recognition, 
      and RNA polymerase II transcriptional regulation.
    additional_reference_ids:
    - PMID:7926749
    - PMID:19965867
    supported_by:
    - reference_id: PMID:7926749
      supporting_text: Binding site selection using in vitro-synthesized proteins reveals that the 
        ROR alpha 1 and ROR alpha 2 isoforms bind DNA as monomers to hormone response elements 
        composed of a 6-bp AT-rich sequence preceding a half-site core motif PuGGTCA (RORE).
    - reference_id: PMID:19965867
      supporting_text: Here, we demonstrate that 7-oxygenated sterols function as high affinity 
        ligands for both RORalpha and RORgamma by directly binding to their ligand-binding domains 
        (K(i) approximately 20 nM), modulating coactivator binding, and suppressing the 
        transcriptional activity of the receptors.
