id: P35398
gene_symbol: RORA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'RORA encodes ROR-alpha, a monomeric nuclear receptor and sequence-specific RNA polymerase
  II transcription factor. RORA binds ROR response elements in chromatin, recruits coactivators or corepressors
  according to promoter and cell context, and is modulated by oxysterol ligands. This core receptor activity
  controls multiple tissue-specific programs, including circadian clock-gene expression, lipid and glucose
  metabolism, inflammatory responses, and cell differentiation. RORA also has an essential developmental
  role in the cerebellum; damaging human variants cause neurodevelopmental disease that can include ataxia
  and cerebellar atrophy.'
