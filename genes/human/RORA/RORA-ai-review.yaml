suggested_questions:
- question: Which RORA-bound genes in human Purkinje cells directly mediate cerebellar maturation 
    and non-cell-autonomous granule-cell-precursor proliferation, and is SHH a direct human target?
  experts:
  - human cerebellar-development experts
  - nuclear-receptor chromatin experts
- question: Which of the four human RORA isoforms supplies the relevant receptor activity in 
    Purkinje cells, and do their distinct amino termini change target-site selection in vivo?
  experts:
  - RORA isoform experts
  - Purkinje-cell developmental biologists
suggested_experiments:
- hypothesis: RORA directly occupies a defined Purkinje-cell enhancer set and activates genes that 
    couple Purkinje differentiation to granule-cell-precursor expansion.
  description: Perform isoform-resolved CUT&RUN and nascent-RNA profiling after acute endogenous 
    RORA degradation in human iPSC-derived Purkinje cells, followed by wild-type and DNA-binding- or
    ligand-binding-domain rescue.
  experiment_type: acute perturbation, chromatin occupancy, and nascent-transcription assay
- hypothesis: Purkinje-cell RORA activity drives a secreted signal, potentially SHH, that promotes 
    human granule-cell-precursor proliferation.
  description: Co-culture isogenic RORA-null and rescued human Purkinje-like cells with granule-cell
    precursors; quantify secreted SHH, precursor cell-cycle entry, and Smoothened-pathway output, 
    and test rescue with recombinant SHH or pathway agonist.
  experiment_type: human cerebellar co-culture and pathway-rescue assay
