gene_symbol: FASN
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FASN encodes fatty acid synthase, the cytosolic type I fatty acid synthase of mammals:
  a large multifunctional homodimeric "megasynthase" (~273 kDa per protomer) that carries
  out the complete cycle of de novo long-chain saturated fatty acid biosynthesis, producing
  mainly palmitate (C16:0) from acetyl-CoA and malonyl-CoA using NADPH as reductant. Each
  subunit contains seven catalytic activities and an acyl-carrier-protein (ACP) domain
  bearing a 4'-phosphopantetheine prosthetic group. Using an acetyl-CoA primer, the enzyme
  iteratively condenses malonyl-CoA-derived two-carbon units and reduces the growing chain
  through a repeating condensation/reduction/dehydration/reduction cycle, releasing palmitate
  via its C-terminal thioesterase. The catalytic components are: the bifunctional
  malonyl/acetyl transferase (MAT; [ACP] S-acetyltransferase and S-malonyltransferase), the
  beta-ketoacyl (condensing) synthase (KS), beta-ketoacyl reductase (KR), beta-hydroxyacyl
  dehydratase (DH), enoyl reductase (ER), and thioesterase (TE), organized into a condensing
  region and a modifying region joined by a flexible neck, with catalytically dead pseudo-KR
  and pseudo-methyltransferase domains. The tethered ACP shuttles intermediates between the
  active sites. FASN is the primary enzyme of de novo lipogenesis, supplying fatty acids for
  membrane phospholipids, energy storage, protein acylation (e.g. palmitoylation) and lipid
  signaling. It is expressed ubiquitously with prominent expression in liver, adipose tissue,
  brain, lung and mammary gland, is transcriptionally induced by SREBP and ChREBP in response
  to nutrients/insulin, and is frequently overexpressed in cancers.
