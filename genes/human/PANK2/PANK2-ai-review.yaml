- id: PMID:15659606
  title: Altered neuronal mitochondrial coenzyme A synthesis in neurodegeneration with brain iron accumulation caused by abnormal processing, stability, and catalytic activity of mutant pantothenate kinase 2.
  findings:
  - statement: >-
      PanK2 is localized to mitochondria of human brain neurons, processed by MPP to
      a mature 48-kDa protein that catalyzes the initial step of CoA synthesis and
      shows feedback inhibition by acyl-CoA species; some disease mutations reduce
      catalytic activity.
    reference_section_type: ABSTRACT
    supporting_text: The mature protein catalyzes the initial step in coenzyme A (CoA)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
