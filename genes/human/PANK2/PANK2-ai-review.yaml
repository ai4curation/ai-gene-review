id: Q9BZ23
gene_symbol: PANK2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PANK2 is the mitochondrial isoform of pantothenate kinase, a type II
  pantothenate kinase that catalyzes the first, committed and rate-limiting step
  of coenzyme A (CoA) biosynthesis: the ATP-dependent phosphorylation of
  pantothenate (vitamin B5) to (R)-4'-phosphopantothenate (EC 2.7.1.33). It is a
  feedback-regulated homodimer, strongly inhibited by acetyl-CoA and other
  acyl-CoA thioesters and activated by long-chain acylcarnitines such as
  palmitoylcarnitine, which is thought to couple CoA synthesis to mitochondrial
  fatty-acid oxidation demand. In humans the enzyme is synthesized as a precursor
  with an N-terminal mitochondrial transit peptide and is proteolytically
  processed by the mitochondrial-processing peptidase to a mature ~48-kDa protein
  that resides in the mitochondrial intermembrane space; a dynamic minor pool
  shuttles to the nucleus in a cell-cycle-dependent manner. The mitochondrial
  targeting signal is a primate-specific feature (rodent PanK2 is cytosolic).
  PANK2 is highly expressed in brain, and loss-of-function mutations cause the
  autosomal-recessive disorder pantothenate kinase-associated neurodegeneration
  (PKAN; neurodegeneration with brain iron accumulation type 1, formerly
  Hallervorden-Spatz syndrome), characterized by iron accumulation in the basal
  ganglia, dystonia, and the 'eye of the tiger' MRI sign.
