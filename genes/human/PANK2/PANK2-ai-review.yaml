- term:
    id: GO:0019217
    label: regulation of fatty acid metabolic process
  evidence_type: IMP
  original_reference_id: PMID:22221393
  qualifier: acts_upstream_of
  review:
    summary: >-
      This annotation derives from metabolic-profiling observations that PKAN
      patient fibroblasts/plasma show lipid-metabolism defects. These are
      secondary, downstream consequences of reduced CoA availability (CoA is an
      obligate cofactor for fatty-acid metabolism), not a distinct regulatory
      function of PANK2. Over-annotation of a phenotypic readout as a regulatory
      role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Lipid-metabolism perturbations in PANK2-deficient cells are downstream
      effects of CoA depletion; annotating PANK2 as a regulator of fatty acid
      metabolism over-interprets a metabolic consequence.
