- id: PMID:12554685
  title: An isoform of hPANK2, deficient in pantothenate kinase-associated neurodegeneration, localizes to mitochondria.
  findings:
  - statement: >-
      Identifies two PANK2 first-exon isoforms; the isoform with an N-terminal
      mitochondrial targeting signal localizes to mitochondria (in vitro import +
      in vivo immunolocalization), and PKAN is attributed to deficiency of the
      mitochondrial isoform.
    reference_section_type: ABSTRACT
    supporting_text: >-
      An in vitro import assay and in vivo immunolocalization experiments
      demonstrate a mitochondrial localization of this isoform.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; establishes the mitochondrial isoform and its relevance to
      PKAN. Abstract-only cache.
