  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetic (IBA) nuclear localization. Human PanK2 does have a functional
      NLS (residues 82-94) and a dynamic nuclear pool that shuttles to
      mitochondria in a cell-cycle-dependent manner (PMID:23152917), so a nuclear
      annotation is defensible, but it is a minor, dynamic pool and not the site
      of the enzyme's core catalytic contribution to CoA biosynthesis.
    action: KEEP_AS_NON_CORE
    reason: >-
      Nuclear localization is experimentally observed but represents a minor,
      shuttling pool; the predominant and functionally relevant location is
      mitochondrial.
