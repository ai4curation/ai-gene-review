- id: PMID:39261662
  title: Interaction of chikungunya virus glycoproteins with macrophage factors controls virion production.
  findings:
  - statement: In human (THP-1-derived) macrophages, SPCS3 was identified by proteomics and functional validation as a chikungunya virus (CHIKV) E1 glycoprotein-binding host protein with anti-CHIKV (restriction-factor) activity; the positively selected CHIKV E1 residue V220 is indispensable for virion production and its mutation attenuates E1 interaction with the host restriction factors SPCS3 and eIF3k, indicating a host-virus evolutionary arms race late in the viral life cycle.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:39261662, doi:10.1038/s44318-024-00193-3, EMBO J 2024). Notable new finding - SPCS3 acts as an antiviral restriction factor against CHIKV (an alphavirus, distinct from the flaviviral host-factor role) via E1 binding; Falcon reports this is peptidase-independent (overexpression did not alter CHIKV polyglycoprotein cleavage). A secondary host-pathogen/innate-immunity role, not the core SPC function. Not in publications cache, so no verbatim supporting_text added.
- id: PMID:38230952
  title: Landscape of protein-protein interactions during hepatitis C virus assembly and release.
  findings:
  - statement: An affinity-purification mass-spectrometry interactome of HCV-infected cells engaged SPC components near viral envelope/assembly proteins, with SPCS3 reported in the HCV E2 accessory interactome; the authors note SPC subunits SPCS1 and SPCS3 were previously recognized as important for flavivirus particle production and HCV.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified (PMID:38230952, doi:10.1128/spectrum.02562-22). High-throughput AP-MS interactome placing SPCS3 in the HCV E2 accessory interactome; secondary host-pathogen context, not core function. Not in publications cache, so no verbatim supporting_text added.
