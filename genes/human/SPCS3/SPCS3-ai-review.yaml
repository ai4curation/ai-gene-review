suggested_questions:
- question: By what structural mechanism does the SPCS3 lumenal domain become essential for SEC11 catalytic activity, in contrast to the dispensable SPCS1?
- question: Is the flavivirus dependence on SPCS3 attributable to its general signal-peptidase role or to substrate-specific processing of viral structural proteins?
suggested_experiments:
- description: Reconstitute SPC with and without SPCS3 and measure signal-peptidase activity to quantify its requirement and define which substrate classes most depend on it.
- description: Structure-guided mutagenesis of the SPCS3 lumenal domain at the SEC11 interface, with activity assays, to test the proposed active-center stabilization mechanism.
