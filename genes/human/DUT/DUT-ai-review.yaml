    label: dUTP diphosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred dUTP diphosphatase (dUTPase) activity. This is the
      well-established, experimentally confirmed core molecular function of DUT and is
      supported at multiple levels of evidence.
    action: ACCEPT
    reason: >-
      dUTP diphosphatase activity is the defining, experimentally proven function of
      human dUTPase, confirmed by kinetics and crystal structures of the substrate/Mg2+
