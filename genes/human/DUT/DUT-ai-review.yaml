suggested_questions:
- question: >-
    Do the nuclear (DUT-N) and mitochondrial (DUT-M) isoforms have non-redundant
    physiological roles, or does one compartment's activity suffice for genome
    integrity under normal conditions?
- question: >-
    Is the reported PPAR-inhibition / signaling-receptor-inhibitor moonlighting
    function present and physiologically relevant in humans, or is it specific to the
    rodent ortholog from which it was projected?
suggested_experiments:
- description: >-
    Isoform-specific rescue of DUT-null cells with nuclear-only vs mitochondrial-only
    dUTPase to test compartmental requirements for preventing uracil misincorporation.
- description: >-
    Quantify dUTP:dTTP pools and uracil-DNA content in cells carrying the BMFDMS
    variants (Y142C, R173W, Y227C) to link catalytic impairment to the disease
    phenotype.
