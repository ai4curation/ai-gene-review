- term:
    id: GO:0006260
    label: DNA replication
  evidence_type: TAS
  original_reference_id: PMID:1325640
  qualifier: involved_in
  review:
    summary: >-
      Traceable author statement associating dUTPase with DNA replication. dUTPase
      supports faithful replication by keeping dUTP low (preventing uracil
      misincorporation) and supplying dUMP for dTTP, but it is not part of the
      replication machinery itself.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      dUTPase influences the fidelity of DNA replication indirectly, by controlling the
      deoxyribonucleotide pool, rather than acting in the DNA replication process per se.
      "DNA replication" (involved_in) over-states its direct role; the causal
      contribution is better captured by its nucleotide-metabolism annotations. Marked
      over-annotated rather than removed (traceable author statement).
    supported_by:
    - reference_id: PMID:1325640
      supporting_text: >-
        dUTPase may generally perform an essential role in DNA replication
core_functions:
- description: >-
    Mg2+-dependent dUTP diphosphatase (dUTPase) that hydrolyses dUTP to dUMP and
    inorganic diphosphate, catabolising dUTP and supplying dUMP for de novo
    thymidylate (dTMP) biosynthesis while preventing uracil misincorporation into DNA.
  molecular_function:
    id: GO:0004170
    label: dUTP diphosphatase activity
  directly_involved_in:
  - id: GO:0046081
    label: dUTP catabolic process
  supported_by:
  - reference_id: PMID:8805593
    supporting_text: >-
      dUTPase hydrolyzes dUTP to dUMP and pyrophosphate, simultaneously reducing dUTP
      levels and providing the dUMP for dTTP biosynthesis.
  - reference_id: PMID:17880943
    supporting_text: >-
      We determined the crystal structure of the
      enzyme:alpha,beta-imino-dUTP:Mg complex
- description: >-
    Production of dUMP (the immediate thymidylate-synthase substrate) as the direct
    product of dUTP hydrolysis, feeding de novo dTMP biosynthesis in the nucleus and
    cytosol.
  molecular_function:
    id: GO:0004170
    label: dUTP diphosphatase activity
  directly_involved_in:
  - id: GO:0006226
    label: dUMP biosynthetic process
  locations:
  - id: GO:0005634
    label: nucleus
  - id: GO:0005739
    label: mitochondrion
  supported_by:
  - reference_id: Reactome:R-HSA-73666
    supporting_text: >-
      this reaction depletes the supply of dUTP, preventing its incorporation into DNA,
      while generating dUMP, the immediate precursor of thymidine nucleotides.
  - reference_id: PMID:10952785
    supporting_text: >-
      dUTPase catalyses the hydrolysis of dUTP to dUMP, thereby maintaining low
      intracellular dUTP.
