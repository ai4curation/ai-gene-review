id: P33316
gene_symbol: DUT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DUT encodes deoxyuridine 5'-triphosphate nucleotidohydrolase (dUTPase; dUTP
  pyrophosphatase; EC 3.6.1.23), a Mg2+-dependent hydrolase that cleaves dUTP into
  dUMP and inorganic diphosphate. Through this single reaction the enzyme performs a
  dual, complementary role in pyrimidine deoxyribonucleotide metabolism: it keeps the
  intracellular dUTP:dTTP ratio low, preventing uracil misincorporation into DNA (and
  the resulting futile base-excision-repair cycles and DNA strand breaks), and it
  produces dUMP, the substrate that thymidylate synthase methylates to dTMP during de
  novo thymidylate biosynthesis. The active enzyme is a homotrimer whose substrate
  sites are formed at subunit interfaces, with catalytic residues contributed by all
  three subunits. In humans, alternative splicing of the N-terminus yields a nuclear
  isoform (DUT-N) and a mitochondrion-targeted isoform (DUT-M) bearing a cleavable
  transit peptide, so that dUTPase activity is provided in both the nucleus/cytosol
  and the mitochondrion. The nuclear isoform is cell-cycle regulated, peaking with
  DNA replication. dUTPase is essential for genome integrity; biallelic
  loss-of-function variants cause a bone marrow failure and diabetes mellitus syndrome.
