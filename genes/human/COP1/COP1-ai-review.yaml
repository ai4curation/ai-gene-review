proposed_new_terms: []
suggested_questions:
- Does COP1 possess intrinsic, stand-alone E3 ligase activity toward all of its reported
  substrates, or is its physiological activity primarily channeled through the CUL4A-RING
  (DCX DET1-COP1) module in which RBX1 is the catalytic RING?
- How is COP1 substrate choice partitioned in vivo between its canonical WD40 degron binding
  and the TRIB1/TRIB2-mediated recruitment of non-canonical substrates such as C/EBPalpha?
- Which COP1 substrates are physiologically dominant in specific tissues (e.g., ETS factors
  in prostate, ACC1 in liver, c-Jun/p53 broadly), and does this explain its context-dependent
  tumor-suppressor versus other roles?
suggested_experiments:
- Define the COP1 ubiquitinome in cells with degron-binding-deficient WD40 mutants versus
  RING-catalytic mutants (e.g., quantitative diGly/ubiquitin-remnant proteomics) to separate
  substrate-recognition from catalytic contributions.
- Reconstitute the DCX(DET1-COP1) CUL4A-RBX1 complex in vitro and compare ubiquitination
  kinetics of c-Jun, p53, ETV1, SFN and ACC1 with and without TRIB1/TRIB2 to map the rules
  of substrate selectivity and adaptor competition.
- Use structure-guided degron mutagenesis of individual substrates (and the COP1 WD40 pocket)
  combined with cellular stability assays to validate which proteins are direct COP1 substrates
  versus indirect.
