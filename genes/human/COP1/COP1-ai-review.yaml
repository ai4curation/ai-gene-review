id: Q8NHY2
gene_symbol: COP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COP1 (also known as RFWD2; constitutive photomorphogenesis protein 1 homolog)
  is a RING-finger E3 ubiquitin-protein ligase (EC 2.3.2.27) that mediates ubiquitination
  and subsequent proteasomal degradation of substrate transcription factors and signaling
  proteins. Its domain architecture comprises an N-terminal C3HC4 RING-HC zinc finger
  (responsible for catalytic ubiquitin transfer and zinc binding), a central coiled-coil
  that mediates homodimerization, and a C-terminal seven-bladed WD40 beta-propeller that
  serves as the substrate-recognition module, binding short degron motifs in substrates.
  COP1 acts both as a stand-alone RING E3 and as the substrate-recognition subunit of a
  cullin-RING ligase (CRL4) module; in the DCX(DET1-COP1) complex (COP1, DET1, DDB1, CUL4A,
  RBX1) the catalytic RING is contributed by RBX1 while COP1 provides substrate recognition.
  Validated substrates include the AP-1 transcription factor c-Jun (JUN) and its relatives,
  the tumor suppressor p53 (TP53, with MTA1 co-regulation), the oncogenic ETS-family factors
  ETV1/ETV4/ETV5 and ETS1, the metastasis regulator MTA1, 14-3-3 sigma (SFN), C/EBPalpha
  (CEBPA, recruited via the pseudokinase adaptor TRIB1), and acetyl-CoA carboxylase 1 (ACACA).
  Substrate choice and ligase activity are regulated by the pseudokinase adaptors TRIB1/TRIB2,
  which bind the WD40 domain and compete with substrates. COP1 shuttles between nuclear speckles
  and the cytoplasm; ATM-dependent phosphorylation at Ser387 and 14-3-3 sigma binding drive its
  nuclear export and autoubiquitination upon DNA damage. Through degradation of these substrates,
  COP1 functions as a tumor suppressor in several contexts and contributes to control of
  lipogenesis. It autoubiquitinates and is stabilized by the COP9 signalosome subunit COPS6/CSN6.
