core_functions:
- description: RING-type E3 ubiquitin-protein ligase activity. COP1 transfers ubiquitin
    from an E2 conjugating enzyme to substrate lysines (EC 2.3.2.27), either as a stand-alone
    RING ligase or as part of a CUL4A-based cullin-RING ligase, driving substrate ubiquitination.
  molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  directly_involved_in:
  - id: GO:0016567
    label: protein ubiquitination
  locations:
  - id: GO:0016607
    label: nuclear speck
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:12615916
    supporting_text: The RING domain of huCOP1 displays ubiquitin ligase activity in an
      autoubiquitination assay in vitro
- description: Substrate-recognition adaptor of a CUL4A-RING ubiquitin ligase. Via its
    C-terminal WD40 beta-propeller, COP1 binds degron motifs in substrate transcription
    factors and signaling proteins and recruits them to the DCX(DET1-COP1) CUL4A ligase
    for ubiquitination and proteasomal degradation; substrate selection is regulated by
    the pseudokinase adaptors TRIB1/TRIB2.
