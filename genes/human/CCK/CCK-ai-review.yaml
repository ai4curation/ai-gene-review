    supported_by:
    - reference_id: Reactome:R-HSA-749448
      supporting_text: >-
        Liganded Gq-activating GPCRs bind inactive heterotrimeric Gq [CCK as extracellular ligand]

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-749452
  review:
    summary: >-
      Reactome annotation for extracellular localization based on "The Ligand:GPCR:Gq
      complex dissociates". CCK is the extracellular ligand in this pathway step.
    action: ACCEPT
    reason: >-
      Consistent with other extracellular region annotations. Multiple Reactome pathway
