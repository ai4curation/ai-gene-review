    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK is synthesized as a precursor in secretory cells, processed in the regulated
        secretory pathway, and released as an extracellular peptide hormone/neuropeptide

- term:
    id: GO:0007586
    label: digestion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Duplicate of the IBA annotation for digestion, here from InterPro-to-GO mapping.
      Both annotations are valid.
    action: ACCEPT
    reason: >-
      This IEA annotation agrees with the IBA annotation for the same term. CCK's role
      in digestion is one of its most well-established functions.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK1R activation supports gallbladder contraction, pancreatic enzyme secretion,
        delayed gastric emptying, and satiety signaling

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32296183
  review:
    summary: >-
      This annotation is from a large-scale binary protein interactome mapping study (HuRI).
      CCK is a small secreted peptide hormone (115 aa precursor, active peptides 5-58 aa)
      that acts via GPCR binding. The ~50 interactors listed in UniProt from this study
      include many nuclear and cytoplasmic proteins (MYC, RELA, histones, etc.) that are
      biologically implausible binding partners for a secreted peptide.
    action: REMOVE
    reason: >-
      The term 'protein binding' is uninformative per curation guidelines. More importantly,
      the interactions detected in this high-throughput Y2H screen are likely spurious for
      a small secreted peptide hormone. The reported interactors (nuclear transcription
      factors, histones, kinases, etc.) do not make biological sense for an extracellular
      peptide ligand. CCK's real protein interactions are with its receptors (CCK1R, CCK2R),
      which are better captured by the peptide hormone receptor binding annotation.
    supported_by:
    - reference_id: PMID:32296183
      supporting_text: >-
        A reference map of the human binary protein interactome.

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:32814053
  review:
    summary: >-
      This annotation comes from another large-scale interactome mapping study focused on
      neurodegenerative disease proteins. Same concerns as the HuRI study above regarding
      biological plausibility of reported interactions for a small secreted peptide.
    action: REMOVE
    reason: >-
      Same rationale as the other protein binding annotation. The term is uninformative,
      and the interactions reported for CCK in high-throughput interactome screens are
      likely artifacts. CCK is a secreted peptide that binds cell-surface GPCRs; it does
      not plausibly interact with the nuclear/cytoplasmic proteins identified in these
      screens. The specific receptor binding is captured by GO:0051428.
    supported_by:
    - reference_id: PMID:32814053
      supporting_text: >-
        Interactome Mapping Provides a Network of Neurodegenerative Disease Proteins and
        Uncovers Widespread Protein Aggregation in Affected Brains.

- term:
    id: GO:0030424
    label: axon
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      Automated transfer of axon localization from Ensembl Compara orthologs. Consistent
      with the IBA annotation for the same term.
    action: ACCEPT
    reason: >-
      This IEA annotation agrees with the IBA annotation. CCK is a neuropeptide present
      in axons. The broader IEA is acceptable alongside the phylogenetically derived IBA.
    supported_by:
    - reference_id: PMID:15152034
      supporting_text: >-
        both ligand and receptors (CCK-1R and CCK-2R) found on olfactory axons throughout
        prenatal development

- term:
    id: GO:0038188
    label: cholecystokinin signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      CCK is the defining ligand of the cholecystokinin signaling pathway. This is a
      core biological process annotation.
    action: ACCEPT
    reason: >-
      CCK peptides are the ligands that initiate cholecystokinin signaling through CCK1R
      and CCK2R receptors. This pathway encompasses the Gq/PLC/IP3/Ca2+ signaling cascade
      that mediates CCK's physiological effects. The annotation is unambiguously correct.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        GPCR signaling predominantly through Gq/PLC/IP3/Ca2+, with downstream kinase
        pathways (MAPK/PI3K-related) depending on receptor subtype and tissue context
    - reference_id: Reactome:R-HSA-388529
      supporting_text: >-
        Cholecystokinin receptors bind cholecystokinin [Reactome pathway annotation]

- term:
    id: GO:0048018
    label: receptor ligand activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      CCK peptides are receptor ligands that bind and activate the GPCRs CCK1R and CCK2R.
      This is a core molecular function annotation.
    action: ACCEPT
    reason: >-
      Receptor ligand activity accurately describes the molecular function of mature CCK
      peptides, which bind and activate two GPCRs (CCK1R and CCK2R) to trigger downstream
      signaling cascades. This is well supported by extensive biochemical and structural
      data including cryo-EM structures of CCK-8 bound to its receptors.
    supported_by:
    - reference_id: PMID:10320330
      supporting_text: >-
        This probe bound specifically, saturably, and with high affinity (KD = 1.2 nM) to
        the CCKBR and has full agonistic activity
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        generates sulfated and amidated CCK peptides that act as ligands for CCK1R/CCKAR
        and CCK2R/CCKBR GPCRs

- term:
    id: GO:0051428
    label: peptide hormone receptor binding
  evidence_type: IPI
  original_reference_id: PMID:7681836
  review:
    summary: >-
      This annotation is based on the cloning and characterization of the human brain
      CCK-B/gastrin receptor (CCKBR), demonstrating direct binding of CCK-8 to the
      recombinant receptor with stimulation of phosphatidylinositol hydrolysis and
      intracellular Ca2+ mobilization.
    action: ACCEPT
    reason: >-
      PMID:7681836 provides direct experimental evidence of CCK binding to the cloned
      human CCK-B receptor in COS-7 cells, with functional coupling demonstrated by
      PLC activation and Ca2+ signaling. UniProt also records the direct interaction
      between CCK-8 (PRO_0000010542) and CCKBR (P32239) with 2 experiments in IntAct.
      This is a high-quality IPI annotation for a core molecular function.
    supported_by:
    - reference_id: PMID:7681836
      supporting_text: >-
        In COS-7 cells expressing the cloned receptor, CCK-8-stimulated phosphatidylinositol
        hydrolysis and intracellular Ca2+ mobilization suggesting second messenger signaling
        through phospholipase C

- term:
    id: GO:0001764
    label: neuron migration
  evidence_type: ISS
  original_reference_id: PMID:15152034
  review:
    summary: >-
      PMID:15152034 shows that CCK modulates GnRH-1 neuron migration during development.
      Exogenous CCK reduced GnRH-1 cell migration, and CCK-1R knockout mice showed
      accelerated GnRH-1 neuron migration into the forebrain. This is a real but
      developmentally specific, non-core effect of CCK signaling.
    action: KEEP_AS_NON_CORE
    reason: >-
      The evidence from PMID:15152034 is solid, showing CCK provides an inhibitory influence
      on GnRH-1 neuron migration via CCK-1R. However, this represents a developmental
      modulatory role rather than a core function of CCK. The primary functions of CCK are
      hormone/neuropeptide signaling related to digestion and satiety. Neuron migration
      modulation is a pleiotropic downstream effect.
    supported_by:
    - reference_id: PMID:15152034
      supporting_text: >-
        These results indicate that CCK provides an inhibitory influence on GnRH-1 neuronal
        migration, contributing to the appropriate entrance of these neuroendocrine cells
        into the brain, and thus represent the first report of a developmental role for CCK

- term:
    id: GO:0005184
    label: neuropeptide hormone activity
  evidence_type: ISS
  original_reference_id: PMID:15374756
  review:
    summary: >-
      ISS annotation for neuropeptide hormone activity. PMID:15374756 is about dopamine's
      role in feeding responses to orexigenic agents, and uses CCK as a reference compound
      for satiety. While the reference is tangential, the annotation itself is correct.
    action: ACCEPT
    reason: >-
      The term neuropeptide hormone activity is unambiguously correct for CCK, as confirmed
      by multiple other evidence lines (IBA, IEA). The reference PMID:15374756 uses CCK
      in a context that confirms its neuropeptide/satiety role, though it is not a primary
      study of CCK function. The annotation is valid regardless of the reference quality.
    supported_by:
    - reference_id: PMID:15374756
      supporting_text: >-
        Dopamine-deficient (DD) mice become hypophagic and die of starvation [study context
        involves CCK as a satiety-related neuropeptide]

- term:
    id: GO:0007409
    label: axonogenesis
  evidence_type: ISS
  original_reference_id: PMID:15152034
  review:
    summary: >-
      PMID:15152034 shows CCK modulates olfactory axon outgrowth during development.
      Exogenous CCK (10^-7 M) reduced olfactory axon outgrowth in nasal explants. This is
      a real but developmentally specific, non-core effect.
    action: KEEP_AS_NON_CORE
    reason: >-
      The evidence from PMID:15152034 demonstrates CCK has an inhibitory effect on olfactory
      axon outgrowth, which could be categorized under axonogenesis. However, like the neuron
      migration annotation from the same paper, this represents a developmental modulatory
      effect rather than a core function of CCK. CCK's primary roles are in digestion and
      satiety signaling.
    supported_by:
    - reference_id: PMID:15152034
      supporting_text: >-
        Exogenous application of CCK (10(-7) m) reduced both olfactory axon outgrowth and
        migration of GnRH-1 cells. This inhibition was mediated by CCK-1R receptors.

- term:
    id: GO:0030424
    label: axon
  evidence_type: ISS
  original_reference_id: PMID:15152034
  review:
    summary: >-
      PMID:15152034 shows CCK transcript and protein are expressed on olfactory axons
      during prenatal development. This ISS annotation is consistent with the IBA and IEA
      annotations for the same term.
    action: ACCEPT
    reason: >-
      The paper provides direct evidence that CCK is present on olfactory axons during
      development, consistent with CCK's role as a neuropeptide. This is supported by
      the IBA and IEA annotations for the same GO term.
    supported_by:
    - reference_id: PMID:15152034
      supporting_text: >-
        CCK transcript and protein are expressed in sensory cells in the developing olfactory
        epithelium and vomeronasal organ, with both ligand and receptors (CCK-1R and CCK-2R)
        found on olfactory axons throughout prenatal development

- term:
    id: GO:0042755
    label: eating behavior
  evidence_type: ISS
  original_reference_id: PMID:15374756
  review:
    summary: >-
      CCK is one of the best-characterized satiety hormones, suppressing food intake by
      acting on CCK1R receptors on vagal afferents and in the CNS. PMID:15374756 studies
      feeding responses in dopamine-deficient mice using CCK among other agents. Recent
      2024 studies further confirm CCK-expressing VMH neurons regulate feeding behavior.
    action: ACCEPT
    reason: >-
      Eating behavior regulation is a core biological process for CCK. CCK is the prototypical
      satiety hormone, and its role in meal termination and food intake suppression is one of
      the most well-established functions in endocrinology. The 2024 study by Eftychidis et al.
      showed that silencing VMH CCK neurons increased food intake, and ablation caused
      hyperphagia and weight gain, confirming both peripheral and central CCK-mediated satiety.
    supported_by:
    - reference_id: PMID:15374756
      supporting_text: >-
        Dopamine-deficient (DD) mice become hypophagic and die of starvation [CCK used as
        reference satiety agent in feeding behavior studies]
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        VMH CCK neurons suppress feeding and support glucose homeostasis; acute inhibition
        increases meal frequency, while chronic ablation causes hyperphagia, weight gain,
        and glucose intolerance

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-379048
  review:
    summary: >-
      Reactome annotation for extracellular localization based on the pathway "Liganded
      Gq/11-activating GPCRs act as GEFs for Gq/11". CCK acts extracellularly as a ligand
      for Gq-coupled GPCRs.
    action: ACCEPT
    reason: >-
      CCK is a secreted peptide that acts extracellularly on cell-surface GPCRs. This TAS
      annotation from Reactome is consistent with all other evidence for extracellular
      localization of mature CCK peptides.
    supported_by:
    - reference_id: Reactome:R-HSA-379048
      supporting_text: >-
        Liganded Gq/11-activating GPCRs act as GEFs for Gq/11 [CCK is a ligand in this pathway]

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-388529
  review:
    summary: >-
      Reactome annotation for extracellular localization based on the pathway "Cholecystokinin
      receptors bind cholecystokinin". This directly models CCK as an extracellular ligand
