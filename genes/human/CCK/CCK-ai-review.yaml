    supported_by:
    - reference_id: Reactome:R-HSA-749452
      supporting_text: >-
        The Ligand:GPCR:Gq complex dissociates [CCK as extracellular ligand]

- term:
    id: GO:0005179
    label: hormone activity
  evidence_type: TAS
  original_reference_id: PMID:10320330
  review:
    summary: >-
      PMID:10320330 characterizes the agonist binding site of CCK on the human brain CCKBR,
      demonstrating CCK-8s binds with high affinity (KD = 1.2 nM) and has full agonistic
      activity. This supports hormone activity for CCK.
    action: ACCEPT
    reason: >-
      PMID:10320330 directly demonstrates CCK as a high-affinity agonist ligand for CCKBR,
      supporting its annotation as having hormone activity. While the broader parent term
      is less informative than neuropeptide hormone activity, it is not incorrect and the
      TAS evidence is solid.
    supported_by:
    - reference_id: PMID:10320330
      supporting_text: >-
        This probe bound specifically, saturably, and with high affinity (KD = 1.2 nM) to
        the CCKBR and has full agonistic activity

- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: TAS
  original_reference_id: PMID:10320330
  review:
    summary: >-
      PMID:10320330 demonstrates CCK binding to CCKBR triggers downstream signaling. Signal
      transduction is a very broad term but is not incorrect for CCK. CCK's signaling via
      Gq/PLC/IP3/Ca2+ is well established.
    action: ACCEPT
    reason: >-
      Signal transduction is a valid but very broad biological process term for CCK. The
      more specific cholecystokinin signaling pathway (GO:0038188) is also annotated and
      is more informative. However, the broad signal transduction annotation from a TAS
      reference is acceptable to retain alongside the more specific term.
    supported_by:
    - reference_id: PMID:10320330
      supporting_text: >-
        In investigating the agonist binding site of the human brain cholecystokininB
        receptor (CCKBR), we employed the direct protein chemical approach
    - reference_id: PMID:7681836
      supporting_text: >-
        CCK-8-stimulated phosphatidylinositol hydrolysis and intracellular Ca2+ mobilization
        suggesting second messenger signaling through phospholipase C

