id: P06307
gene_symbol: CCK
product_type: PROTEIN
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CCK (cholecystokinin) encodes preprocholecystokinin, a 115-amino acid precursor protein
  of the gastrin/cholecystokinin family that is proteolytically processed into multiple
  bioactive peptide hormones (CCK-58, CCK-33, CCK-8, CCK-5, etc.). The mature peptides
  share a conserved C-terminal amidated octapeptide with a critical tyrosyl O-sulfation at
  position 7 from the C-terminus that is required for high-affinity binding to CCK1R/CCKAR.
  CCK peptides function as secreted peptide hormones and neuropeptides, acting through two
  GPCRs: CCK1R (primarily peripheral, mediating gallbladder contraction, pancreatic enzyme
  secretion, and satiety signaling via vagal afferents) and CCK2R (primarily CNS and gastric
  mucosa, mediating gastric acid secretion and various central effects). CCK is produced by
  intestinal enteroendocrine I-cells and CNS neurons, and is one of the most abundant brain
  neuropeptides.

existing_annotations:
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GO:0005615 (extracellular space) is an obsolete term that has been replaced. CCK is
      a secreted peptide hormone that acts in the extracellular space, but the term itself
      is no longer valid in the GO.
    action: MODIFY
    reason: >-
      The term GO:0005615 is obsolete and should be replaced with GO:0005576 (extracellular
      region), which is the current valid term. CCK is well-established as a secreted peptide
      hormone acting extracellularly. UniProt annotates CCK subcellular location as "Secreted"
      (ECO:0000269|PubMed:25326458, ECO:0000269|PubMed:37453717).
    proposed_replacement_terms:
    - id: GO:0005576
      label: extracellular region
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK is synthesized as a precursor in secretory cells, processed in the regulated
        secretory pathway, and released as an extracellular peptide hormone/neuropeptide.

- term:
    id: GO:0030424
    label: axon
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CCK is one of the most abundant neuropeptides in the brain and is present in axons
      as part of its role as a neuropeptide. IBA annotations are phylogenetically informed
      and this localization is consistent with CCK's well-established role as a neuropeptide.
    action: ACCEPT
    reason: >-
      CCK is expressed by CNS neurons and functions as a neuropeptide, which entails
      localization to axons for synaptic release. This is consistent with the deep research
      review indicating CCK is produced by CNS neurons/glia and the ISS annotation from
      PMID:15152034 showing CCK expression on olfactory axons. The IBA annotation is
      phylogenetically sound for a conserved neuropeptide.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK is produced by intestinal enteroendocrine I-cells and by neurons/glia in the CNS
    - reference_id: PMID:15152034
      supporting_text: >-
        both ligand and receptors (CCK-1R and CCK-2R) found on olfactory axons throughout
        prenatal development

- term:
    id: GO:0005184
    label: neuropeptide hormone activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CCK is a classic neuropeptide hormone. It functions both as a gut hormone (stimulating
      gallbladder contraction, pancreatic enzyme secretion) and as a brain neuropeptide
      (modulating satiety, anxiety, pain). This is a core molecular function annotation.
    action: ACCEPT
    reason: >-
      Neuropeptide hormone activity is the most precise and informative molecular function
      term for CCK. The protein is proteolytically processed from a precursor into multiple
      active peptides that act as both peripheral hormones and central neuropeptides via
      GPCR signaling. This IBA annotation is well-supported by extensive literature.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK is a secreted peptide signaling precursor whose processed peptides coordinate
        digestive secretion and motility and contribute to meal termination/satiety, primarily
        via CCK1R on peripheral targets and via CCK2R/CCK1R signaling in the CNS
    - reference_id: PMID:7681836
      supporting_text: >-
        The predominant brain cholecystokinin receptor (CCK-B/gastrin) has been implicated
        in mediating many of the central effects of cholecystokinin, including anxiety,
        panic attacks, satiety, and analgesia

- term:
    id: GO:0007586
    label: digestion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      CCK is a central regulator of digestion. It stimulates gallbladder contraction and
      pancreatic enzyme secretion, and slows gastric emptying. This is a core biological
      process for CCK.
    action: ACCEPT
    reason: >-
      Digestion is one of the two primary biological processes for CCK (along with satiety/
      eating behavior). CCK peptides released from intestinal I-cells in response to dietary
      fat and protein act via CCK1R to stimulate gallbladder contraction, pancreatic exocrine
      secretion, and regulate gut motility. The IBA annotation is phylogenetically well-supported.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK1R activation supports gallbladder contraction, pancreatic enzyme secretion,
        delayed gastric emptying, and satiety signaling (notably via vagal afferents)

- term:
    id: GO:0005179
    label: hormone activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      CCK has hormone activity, acting as a peptide hormone in the gut to regulate digestion
      and satiety. This is a parent term of neuropeptide hormone activity (GO:0005184) which
      is also annotated.
    action: ACCEPT
    reason: >-
      Hormone activity is valid for CCK. While GO:0005184 (neuropeptide hormone activity)
      is more specific and also annotated, the broader hormone activity term is not incorrect
      since CCK functions as both a peripheral hormone and a neuropeptide. The IEA from
      InterPro mapping is appropriate given the gastrin/cholecystokinin domain. It is
      acceptable for IEA annotations to be broader than more specific annotations from
      other evidence codes.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        Human CCK is best annotated as a secreted peptide signaling precursor whose processed
        products regulate digestive secretion/motility, gallbladder emptying, pancreatic
        exocrine function, satiety, and selected CNS functions through CCK1R and CCK2R

- term:
    id: GO:0005184
    label: neuropeptide hormone activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Duplicate of the IBA annotation for neuropeptide hormone activity, here from combined
      automated IEA methods. Both annotations are valid.
    action: ACCEPT
    reason: >-
      This IEA annotation agrees with the IBA annotation for the same term and is well
      supported by the literature. CCK is unambiguously a neuropeptide hormone.
    supported_by:
    - reference_id: file:human/CCK/CCK-deep-research-falcon.md
      supporting_text: >-
        CCK is produced by intestinal enteroendocrine I-cells and by neurons/glia in the CNS

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      CCK is a secreted peptide hormone localized to the extracellular region after
      secretion from I-cells and neurons.
    action: ACCEPT
    reason: >-
      CCK is secreted extracellularly. UniProt annotates the subcellular location as
      "Secreted" with experimental evidence (PubMed:25326458, PubMed:37453717). The protein
