- id: file:human/CCK/CCK-deep-research-falcon.md
  title: Deep research review of CCK function (Falcon provider)
  findings:
  - statement: CCK is a secreted peptide hormone/neuropeptide precursor processed into multiple active peptides
  - statement: Acts via CCK1R (peripheral) and CCK2R (brain/stomach) GPCRs
  - statement: Primary functions are digestive regulation and satiety signaling
  - statement: Signaling via Gq/PLC/IP3/Ca2+ cascade

core_functions:
- molecular_function:
    id: GO:0005184
    label: neuropeptide hormone activity
  description: >-
    CCK encodes preprocholecystokinin, a precursor that is proteolytically processed and
    post-translationally modified (tyrosyl O-sulfation, C-terminal amidation) to generate
    multiple bioactive peptide hormones (CCK-58, CCK-33, CCK-8, CCK-5, etc.). These
    mature CCK peptides function as both peripheral hormones and central neuropeptides,
    binding and activating two GPCRs: CCK1R/CCKAR (preferring sulfated CCK, mediating
    gallbladder contraction, pancreatic enzyme secretion, and vagal satiety signaling)
    and CCK2R/CCKBR (recognizing unsulfated and sulfated CCK equally, mediating gastric
    acid secretion and central effects). CCK-8 binds CCKBR with KD = 1.2 nM and activates
    Gq/PLC/IP3/Ca2+ signaling.
  directly_involved_in:
  - id: GO:0007586
    label: digestion
  - id: GO:0042755
    label: eating behavior
  - id: GO:0038188
    label: cholecystokinin signaling pathway
  - id: GO:0007165
    label: signal transduction
  locations:
  - id: GO:0005576
    label: extracellular region
  - id: GO:0030424
    label: axon
  supported_by:
  - reference_id: PMID:7681836
    supporting_text: >-
      CCK-8-stimulated phosphatidylinositol hydrolysis and intracellular Ca2+ mobilization
      suggesting second messenger signaling through phospholipase C
  - reference_id: PMID:10320330
    supporting_text: >-
      This probe bound specifically, saturably, and with high affinity (KD = 1.2 nM) to
      the CCKBR and has full agonistic activity
  - reference_id: file:human/CCK/CCK-deep-research-falcon.md
    supporting_text: >-
      Human CCK is best annotated as a secreted peptide signaling precursor whose processed
      products regulate digestive secretion/motility, gallbladder emptying, pancreatic
      exocrine function, satiety, and selected CNS functions through CCK1R and CCK2R

proposed_new_terms: []

suggested_questions:
- question: >-
    Should CCK be annotated with more specific biological process terms for its digestive
    functions, such as gallbladder contraction (GO:0014830) or pancreatic juice secretion
    (GO:0030157)? These are well-documented downstream effects of CCK signaling via CCK1R
    that are more specific than the current "digestion" annotation.
- question: >-
    Is there sufficient evidence to annotate CCK with glucose homeostasis (GO:0042593)?
    Recent 2024 data from Eftychidis et al. shows that ablation of CCK-expressing VMH
    neurons causes glucose intolerance, suggesting CCK plays a role in glucose regulation
    beyond its established satiety function.

suggested_experiments:
- description: >-
    Systematic characterization of the relative contributions of different CCK peptide
    forms (CCK-58 vs CCK-33 vs CCK-8) to satiety signaling, using isoform-specific
    approaches in human-relevant model systems, to determine whether different processed
    forms should receive distinct functional annotations.
  hypothesis: >-
    Different CCK peptide forms may have quantitatively or qualitatively different
    signaling properties at CCK1R and CCK2R, potentially warranting isoform-specific
    annotations for the processed peptide chains.

