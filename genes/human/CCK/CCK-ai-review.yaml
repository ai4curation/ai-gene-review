    supported_by:
    - reference_id: Reactome:R-HSA-388529
      supporting_text: >-
        Cholecystokinin receptors bind cholecystokinin [Reactome pathway annotation]

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-749448
  review:
    summary: >-
      Reactome annotation for extracellular localization based on "Liganded Gq-activating
