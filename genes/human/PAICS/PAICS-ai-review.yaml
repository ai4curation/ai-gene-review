suggested_questions:
- question: Does phosphorylation of PAICS (e.g. at Ser-27, Ser-107, Thr-238) regulate
    its catalytic activity or its recruitment into the purinosome?
- question: What is the molecular basis of PAICS upregulation in cancers, and does the
    substrate-channeling octamer offer a druggable target distinct from the salvage
    pathway?
suggested_experiments:
- description: Structure-guided design and testing of active-site-selective inhibitors
    targeting the AIRC versus SAICARS active sites, exploiting the intersubunit
    substrate-channeling tunnels revealed by the octameric structure.
  hypothesis: Selective inhibition of one PAICS active site can block de novo purine
    flux with a therapeutic window over the salvage pathway.
- description: Quantitative measurement of AIR/CAIR/SAICAR flux in PAICS-deficient
    versus wild-type cells to define the metabolic consequences and confirm the two
    consecutive steps in vivo.
  hypothesis: Loss of PAICS causes accumulation of its AIR substrate and depletion of
    SAICAR, consistent with a block at both consecutive de novo purine synthesis steps.
