- term:
    id: GO:0045296
    label: cadherin binding
  evidence_type: HDA
  original_reference_id: PMID:25468996
  qualifier: enables
  review:
    summary: This annotation derives from a BioID proximity-biotinylation screen of the
      E-cadherin cytoplasmic tail, in which PAICS was one of ~561 vicinal proteins. It
      reflects spatial proximity in a high-throughput screen, not a genuine
      cadherin-binding molecular function of this cytosolic metabolic enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: The source study identified hundreds of proximal proteins by promiscuous
      biotin ligase labeling; the authors themselves note many proximal proteins do not
      localize to junctions. PAICS is a cytosolic purine-synthesis enzyme with no evidence
      of a true cadherin-binding function. Over-annotation.
    supported_by:
    - reference_id: PMID:25468996
      supporting_text: We used proximity biotinylation and quantitative proteomics to
        identify 561 proteins in the vicinity of the cytoplasmic tail of E-cadherin.
