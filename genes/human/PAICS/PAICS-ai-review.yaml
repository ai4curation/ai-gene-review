id: P22234
gene_symbol: PAICS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Bifunctional enzyme of the de novo purine biosynthesis pathway that catalyzes
  two consecutive reactions. Its phosphoribosylaminoimidazole carboxylase (AIR carboxylase,
  AIRC; EC 4.1.1.21) activity carboxylates 5-aminoimidazole ribonucleotide (AIR) to
  4-carboxy-AIR (CAIR) using CO2/bicarbonate; its phosphoribosylaminoimidazolesuccinocarboxamide
  synthetase (SAICAR synthetase, SAICARS; EC 6.3.2.6) activity then condenses CAIR
  with L-aspartate in an ATP-dependent reaction to form SAICAR, the substrate that
  adenylosuccinate lyase (ADSL) subsequently cleaves to AICAR. The two catalytic activities
  reside in distinct domains of a single polypeptide (an N-terminal SAICAR synthetase
  domain and a C-terminal AIR carboxylase domain), and the protein assembles into a
  homooctamer whose quaternary structure builds the carboxylase active sites and provides
  intersubunit tunnels for substrate channeling between the two active sites. PAICS
  is a cytosolic enzyme and a component of the purinosome, the reversible multi-enzyme
  assembly of de novo purine synthesis. Loss-of-function causes an autosomal recessive
  inborn error of purine metabolism with multiple congenital anomalies and neonatal
  lethality.
