- term:
    id: GO:0006177
    label: GMP biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:27590927
  qualifier: acts_upstream_of_or_within
  review:
    summary: PAICS acts upstream of IMP, which is the branch-point precursor for both AMP
      and GMP synthesis. GMP biosynthesis is therefore a downstream consequence, captured
      appropriately with the acts_upstream_of_or_within qualifier, but it is not PAICS's
      direct pathway step.
    action: KEEP_AS_NON_CORE
    reason: Correct but downstream and indirect; PAICS makes an IMP precursor and GMP
      synthesis occurs downstream of IMP. The acts_upstream_of_or_within qualifier is
      appropriate. Not a core process for PAICS, whose direct role is IMP biosynthesis.
    supported_by:
    - reference_id: PMID:27590927
      supporting_text: an accumulation of the substrate(s) for the knocked out enzyme was
        identified
