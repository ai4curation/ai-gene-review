id: Q9NZB8
gene_symbol: MOCS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MOCS1 encodes the bifunctional enzyme system that catalyses the first, committed step of
  molybdenum cofactor (Moco) biosynthesis: the conversion of GTP to cyclic pyranopterin
  monophosphate (cPMP, "precursor Z"). The single MOCS1 gene is bicistronic and extensively
  alternatively spliced, producing two functionally distinct protein products, MOCS1A and
  MOCS1B. MOCS1A (N-terminal region) is a radical S-adenosyl-L-methionine (SAM) enzyme that
  binds two [4Fe-4S] clusters and acts as a GTP 3',8-cyclase (EC 4.1.99.22), generating the
  intermediate (8S)-3',8-cyclo-7,8-dihydroguanosine 5'-triphosphate. MOCS1B (C-terminal
  region, a MoaC-family enzyme) is cyclic pyranopterin monophosphate synthase (EC 4.6.1.17),
  which converts that intermediate to cPMP. The mature catalytic proteins act primarily in
  the mitochondrial matrix, reached via alternative-splicing-dependent targeting and, for
  MOCS1AB fusion products, proteolytic maturation after mitochondrial import; some N-terminal
  splice variants remain cytosolic. cPMP is subsequently processed by MOCS2, MOCS3 and
  gephyrin to the mature molybdenum cofactor required by sulfite oxidase, xanthine
  dehydrogenase and aldehyde oxidase. Loss-of-function variants in MOCS1 cause molybdenum
  cofactor deficiency type A, a severe autosomal-recessive neonatal encephalopathy with
  intractable seizures, resembling isolated sulfite oxidase deficiency; early cPMP
  (fosdenopterin) replacement can be therapeutic.
