- id: PMID:27499296
  title: Mitochondrial Protein Interaction Mapping Identifies Regulators of Respiratory Chain Function.
  findings:
  - statement: Affinity-enrichment MS mapping of mitochondrial protein interactions identified a dynamic
      human coenzyme Q biosynthetic complex (complex Q / CoQ synthome) that includes COQ6, localizing
      it to the inner membrane as part of the CoQ biosynthetic complex.
    supporting_text: identify a dynamic human coenzyme Q biosynthetic complex that includes multiple MXPs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; supports COQ6 membership in the human CoQ biosynthetic complex
      and inner-membrane localization (IDA and complex part_of annotations).
- id: PMID:28927698
  title: Biochemistry of Mitochondrial Coenzyme Q Biosynthesis.
  findings:
  - statement: Review establishing that the eukaryotic C5-hydroxylation of the CoQ head group is catalyzed
      by COQ6, a flavin (FAD)-dependent monooxygenase, and that the terminal-stage COQ proteins are peripherally
      associated with the matrix face of the mitochondrial inner membrane as complex Q.
    supporting_text: The C5-hydroxylation is catalyzed by COQ6 in eukaryotes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Authoritative review (Stefely & Pagliarini); supports the C5-hydroxylase role, FAD/ferredoxin
      dependence, and matrix-face inner-membrane localization of the COQ complex.
- id: PMID:34800366
  title: Quantitative high-confidence human mitochondrial proteome and its dynamics in cellular context.
  findings:
  - statement: High-confidence quantitative human mitochondrial proteome; COQ6 is detected as a bona fide
      mitochondrial protein (HTP evidence for mitochondrion localization).
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Proteomic survey supporting mitochondrial localization; corroborates but is coarser
      than the specific inner-membrane localization.
- id: PMID:38425362
  title: In vitro construction of the COQ metabolon unveils the molecular determinants of coenzyme Q biosynthesis.
  findings:
  - statement: In vitro reconstitution of the animal COQ metabolon demonstrated that COQ6 is a class A
      flavin-dependent monooxygenase that performs the C5 hydroxylation and, downstream of COQ4, also
      the C1 hydroxylation, using FAD and requiring the FDXR/FDX2 ferredoxin couple to supply electrons
      from NADPH.
    supporting_text: corroborating its dual functionality as both a C5 and C1 hydroxylase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary biochemical study (Nicoll et al., Nat Catal 2024); directly supports both hydroxylase
      molecular functions, FAD cofactor, ferredoxin dependence, and the ubiquinone biosynthetic process.
      Basis for the IDA annotations and EC 1.14.15.45 / 1.14.15.46.
