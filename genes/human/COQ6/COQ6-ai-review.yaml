id: Q9Y2Z9
gene_symbol: COQ6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: COQ6 is a mitochondrial FAD-dependent (flavin) monooxygenase of the UbiH/COQ6 family that
  catalyzes aromatic-ring hydroxylation steps of coenzyme Q10 (ubiquinone) biosynthesis. It performs the
  conserved C5-ring hydroxylation of 4-hydroxy-3-(all-trans-decaprenyl)benzoate to 3,4-dihydroxy-5-(all-trans-
  decaprenyl)benzoate (EC 1.14.15.45) and additionally, acting downstream of COQ4, the C1-hydroxylation
  of 2-methoxy-6-(all-trans-decaprenyl)phenol to 2-methoxy-6-(all-trans-decaprenyl)benzene-1,4-diol (EC
  1.14.15.46). Both reactions consume molecular oxygen and require FAD as cofactor, with the reducing
  electrons delivered from NAD(P)H via the mitochondrial ferredoxin/ ferredoxin-reductase couple FDX2/FDXR
  rather than directly from NAD(P)H. COQ6 is a peripheral membrane protein localized to the matrix face
  of the mitochondrial inner membrane, where it assembles into the COQ synthome (complex Q) together with
  COQ3, COQ4, COQ5, COQ7 and COQ9. In humans, biallelic loss-of-function mutations cause primary coenzyme
  Q10 deficiency-6, presenting as steroid-resistant nephrotic syndrome with sensorineural deafness.
