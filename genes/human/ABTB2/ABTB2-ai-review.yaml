core_functions:
- description: >-
    ABTB2 acts as a BTB/POZ substrate-adaptor-like protein for ubiquitin-dependent
    degradation of TRAP1 in pancreatic cancer models, consistent with the
    Proteostasis PN Cul3 substrate-receptor projection.
  molecular_function:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  directly_involved_in:
  - id: GO:0016567
    label: protein ubiquitination
  substrates:
  - id: UniProtKB:Q12931
    label: TRAP1
  supported_by:
  - reference_id: PMID:41322190
    supporting_text: >-
      ABTB2 promotes TRAP1 degradation via ubiquitination (Figure 8). We also
      found that ABTB2 interacts with cullin-3 (Figure S9)
suggested_questions:
- question: >-
    Does endogenous ABTB2 form a native CRL3 complex with CUL3 in non-cancer
    tissues, and is TRAP1 a physiological substrate outside pancreatic cancer
    models?
- question: >-
    What additional ABTB2 substrates explain its tissue-specific and disease-context
    effects?
suggested_experiments:
- description: >-
    Test endogenous ABTB2-CUL3-TRAP1 complex formation with reciprocal co-IP,
    proximity ligation, and BTB-domain mutant rescue in cells with native ABTB2
    expression.
  hypothesis: >-
    ABTB2 uses its BTB/POZ domain to recruit CUL3 while its substrate-recognition
    regions engage TRAP1.
  experiment_type: co-immunoprecipitation and mutant rescue
- description: >-
    Measure TRAP1 ubiquitination and stability after ABTB2 loss or rescue with
    CUL3 depletion, proteasome inhibition, and ubiquitin-linkage/site mapping.
  hypothesis: >-
    ABTB2-dependent TRAP1 degradation requires a CUL3 ubiquitin-ligase complex.
  experiment_type: ubiquitination and protein-turnover assay
