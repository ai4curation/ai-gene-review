  review:
    summary: >-
      Biologically incorrect. "Energy reserve metabolic process" concerns
      storage carbohydrate/lipid (glycogen, starch, triglyceride) metabolism and
      energy derivation. GFPT1 does the opposite: it diverts fructose 6-phosphate
      OUT of energy/glycolytic flux into aminosugar biosynthesis (the HBP). This
      is a clearly wrong electronic (ARBA) inference and should be removed.
    action: REMOVE
