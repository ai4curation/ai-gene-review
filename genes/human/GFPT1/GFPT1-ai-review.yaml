id: Q06210
gene_symbol: GFPT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GFPT1 (GFAT1) is the human glutamine--fructose-6-phosphate aminotransferase
  [isomerizing] 1 (EC 2.6.1.16), the first and rate-limiting enzyme of the
  hexosamine biosynthetic pathway (HBP). It catalyzes the transfer of the amido
  nitrogen of L-glutamine to D-fructose 6-phosphate, producing D-glucosamine
  6-phosphate and L-glutamate. The enzyme is bifunctional: an N-terminal
  glutamine amidotransferase (class II / Ntn-hydrolase) domain hydrolyzes
  L-glutamine to L-glutamate plus ammonia, and a C-terminal isomerase region
  built from two sugar-isomerase (SIS) subdomains isomerizes fructose 6-phosphate
  to glucose 6-phosphate and aminates it, with the two active sites connected by
  an ammonia channel. Glucosamine 6-phosphate is the committed precursor for
  UDP-N-acetylglucosamine (UDP-GlcNAc), which feeds N- and O-linked protein
  glycosylation, O-GlcNAcylation, GPI-anchor synthesis, and glycosaminoglycan
  (e.g. hyaluronan) biosynthesis; the HBP therefore acts as a nutrient- and
  flux-sensing branch of glycolysis. GFPT1 is a cytosolic homodimer/homotetramer
  and is feedback-inhibited by its downstream product UDP-GlcNAc. Loss-of-function
  variants of GFPT1 cause congenital myasthenic syndrome type 12 (limb-girdle
  congenital myasthenia with tubular aggregates).
