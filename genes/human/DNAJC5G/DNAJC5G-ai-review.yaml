description: DNAJC5G (cysteine string protein-gamma, CSP-gamma) is a testis-specific,
  poorly characterized paralog of the synaptic co-chaperone CSPalpha/DNAJC5. It carries
  an N-terminal J domain characteristic of DnaJ/HSP40 co-chaperones, which in characterized
  family members recruits and stimulates the HSP70 chaperone HSC70/HSPA8, together
  with a cysteine-string region that is predicted to be palmitoylated and to anchor
  the protein to membranes. No direct biochemical characterization of CSP-gamma's
  activity or clients has been reported; its function is inferred from family membership
  to be HSP70 co-chaperone activity in a testis secretory/membrane context.
