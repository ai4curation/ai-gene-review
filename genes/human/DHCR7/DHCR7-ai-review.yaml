gene_symbol: DHCR7
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 7-dehydrocholesterol reductase (7-DHC reductase; Delta7-sterol reductase;
  EC 1.3.1.21) is an NADPH-dependent oxidoreductase of the endoplasmic reticulum membrane
  that catalyses the final step of cholesterol biosynthesis, reducing the C7-C8 double
  bond of 7-dehydrocholesterol (7-DHC) to yield cholesterol. It is the terminal enzyme
  of the Kandutsch-Russell arm of the sterol biosynthetic pathway and can also reduce
  7-dehydrodesmosterol to desmosterol. Because 7-DHC is also the immediate precursor
  of vitamin D3, DHCR7 activity partitions 7-DHC between cholesterol and vitamin D3
  synthesis, and its activity is modulated by physical interaction with the other terminal
  sterol reductase DHCR24. It is a multi-pass integral membrane protein of the ERG4/ERG24
  sterol-reductase family. Loss-of-function mutations cause Smith-Lemli-Opitz syndrome
  (SLOS), an autosomal-recessive cholesterol-biosynthesis malformation disorder characterised
  by elevated 7-DHC and low cholesterol with microcephaly, 2-3 toe syndactyly and developmental
  delay.
