- term:
    id: GO:0160020
    label: positive regulation of ferroptosis
  evidence_type: IMP
  original_reference_id: PMID:38297129
  qualifier: involved_in
  review:
    summary: DHCR7 promotes ferroptosis by consuming its substrate 7-DHC, a potent
      radical-trapping (anti-ferroptotic) sterol; DHCR7 loss raises 7-DHC and confers
      ferroptosis resistance.
    action: KEEP_AS_NON_CORE
    reason: This is a real, experimentally supported (IMP) regulatory consequence of
      DHCR7's enzymatic activity - by depleting the anti-ferroptotic metabolite 7-DHC,
      DHCR7 acts as a pro-ferroptotic factor. It is downstream of, and secondary to,
      the core biosynthetic function, so it is kept as non-core rather than a defining
      function.
    supported_by:
    - reference_id: PMID:38297129
      supporting_text: we identify proferroptotic activity of 7-dehydrocholesterol
        reductase (DHCR7) and an unexpected prosurvival function of its substrate,
        7-dehydrocholesterol (7-DHC)
