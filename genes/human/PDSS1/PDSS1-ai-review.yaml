id: Q5T2R2
gene_symbol: PDSS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PDSS1 (decaprenyl-diphosphate synthase subunit 1; also DPS1/TPRT) is one of the two
  subunits of the human all-trans-decaprenyl-diphosphate synthase (trans-prenyltransferase,
  EC 2.5.1.91). Together with PDSS2, it forms a heterotetramer (2 PDSS1 + 2 PDSS2) that
  performs the first committed, chain-length-determining step of coenzyme Q10 (ubiquinone)
  biosynthesis: sequential head-to-tail condensation of (2E,6E)-farnesyl diphosphate (the
  primer) with multiple isopentenyl diphosphate (IPP) units, adding them with trans
  stereochemistry to build the all-trans C50 decaprenyl (and C45 nonaprenyl) polyisoprenoid
  diphosphate side chain. This polyprenyl tail is subsequently attached to the quinone ring
  (by COQ2) to yield ubiquinone-10 (and ubiquinone-9). The enzyme is a Mg(2+)-dependent
  member of the trans-isoprenyl diphosphate synthase (FPP/GGPP synthase) family and localizes
  to the mitochondrion, acting at the matrix/inner-membrane face where CoQ is assembled.
  Loss-of-function variants cause autosomal recessive primary coenzyme Q10 deficiency type 2
  (COQ10D2), a multisystem mitochondrial disorder.
