core_functions:
- description: >-
    All-trans-decaprenyl-diphosphate synthase (trans-prenyltransferase, EC 2.5.1.91): as a
    subunit of the PDSS1/PDSS2 heterotetramer, catalyzes the Mg(2+)-dependent sequential
    head-to-tail (trans) condensation of (2E,6E)-farnesyl diphosphate with seven isopentenyl
    diphosphate units to form all-trans-decaprenyl diphosphate (and, with six IPP units, the
    nonaprenyl diphosphate), the chain-length-determining step that builds the polyprenyl side
    chain of coenzyme Q10/Q9.
  molecular_function:
    id: GO:0097269
    label: all-trans-decaprenyl-diphosphate synthase activity
  supported_by:
  - reference_id: PMID:16262699
    supporting_text: >-
      an in vitro activity of solanesyl or
      decaprenyl diphosphate synthase was verified
  - reference_id: file:human/PDSS1/PDSS1-uniprot.txt
    supporting_text: "all-trans-decaprenyl diphosphate + 7 diphosphate"
  directly_involved_in:
  - id: GO:0006744
    label: ubiquinone biosynthetic process
  in_complex:
