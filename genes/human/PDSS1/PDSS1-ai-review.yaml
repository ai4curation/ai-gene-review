  findings:
  - statement: >-
      Human hDPS1 (PDSS1) and hDLP1 (PDSS2) form a heterotetrameric decaprenyl diphosphate
      synthase; reconstitution in E. coli verifies in vitro decaprenyl diphosphate synthase
      activity and Q10 production, and both subunits contribute to determining the ubiquinone
      side chain.
    reference_section_type: ABSTRACT
    supporting_text: >-
      murine and human solanesyl and decaprenyl
      diphosphate synthases are heterotetramers composed of newly characterized hDPS1
      (mSPS1) and hDLP1 (mDLP1)
  reference_review:
    relevance: HIGH
