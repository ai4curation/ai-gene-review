core_functions:
- description: >-
    N-terminal 2-enoyl-CoA hydratase that catalyzes step 2 of the peroxisomal fatty-acid
    beta-oxidation spiral, hydrating trans-2-enoyl-CoA to L-(3S)-3-hydroxyacyl-CoA (L
    stereochemistry, distinguishing it from the D-bifunctional protein HSD17B4). Acts on
    medium/long-chain and dicarboxylic-acid (omega-oxidation-product) substrates.
  supported_by:
  - reference_id: PMID:15060085
    supporting_text: "the main enzymes involved in \nbeta-oxidation of C16DCA are SCOX, both LBP and DBP"
  - reference_id: file:human/EHHADH/EHHADH-uniprot.txt
    supporting_text: "a (3S)-3-hydroxyacyl-CoA = a (2E)-enoyl-CoA + H2O"
  molecular_function:
