- id: PMID:15060085
  title: Identification of the peroxisomal beta-oxidation enzymes involved in the
    degradation of long-chain dicarboxylic acids.
  findings:
  - statement: >-
      Using recombinant human L-bifunctional protein (LBP) and patient fibroblasts, shows that
      peroxisomes (not mitochondria) beta-oxidize C16 dicarboxylic acid and that LBP is one of
      the main enzymes involved; first demonstration of a specific physiological function for LBP.
    reference_section_type: ABSTRACT
    supporting_text: "the main enzymes involved in \nbeta-oxidation of C16DCA are SCOX, both LBP and DBP"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false). PMID/title verified against PubMed;
      it is the GOA IDA source for EHHADH's hydratase and dehydrogenase activities and for its
      dicarboxylic-acid beta-oxidation role. Anchored by the GOA IDA evidence code.
