id: Q08426
gene_symbol: EHHADH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  EHHADH is the peroxisomal L-bifunctional protein (LBP; also peroxisomal bifunctional
  enzyme PBE/PBFE, multifunctional enzyme 1 MFE1), a single 723-residue polypeptide that
  carries two catalytic activities of the peroxisomal fatty-acid beta-oxidation spiral in
  one chain. Its N-terminal module has 2-enoyl-CoA hydratase activity (EC 4.2.1.17) that
  hydrates 2-trans-enoyl-CoA to L-(3S)-3-hydroxyacyl-CoA (step 2), together with an
  auxiliary Delta-3,Delta-2-enoyl-CoA isomerase activity (EC 5.3.3.8) used in unsaturated
  fatty-acid oxidation. Its C-terminal module has NAD+-dependent L-3-hydroxyacyl-CoA
  dehydrogenase activity (EC 1.1.1.35) that oxidizes the (3S)-3-hydroxyacyl-CoA intermediate
  to 3-oxoacyl-CoA (step 3). EHHADH thus performs the second and third reactions of the
  peroxisomal beta-oxidation pathway with L-stereochemistry, in contrast to the D-bifunctional
  protein HSD17B4, which uses the opposite chirality and handles very-long-chain, branched-chain
  and bile-acid substrates. EHHADH is comparatively more important for medium/long-chain
  substrates and for the degradation of dicarboxylic acids (omega-oxidation products). The
  mature enzyme is a peroxisomal-matrix protein imported via a C-terminal PTS1 (SKL) targeting
  signal, and it is expressed most strongly in liver and in the proximal tubule of the kidney.
  A dominant EHHADH variant (p.E3K) that mistargets the protein to mitochondria causes Fanconi
  renotubular syndrome 3.
