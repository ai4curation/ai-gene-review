proposed_new_terms: []
suggested_questions:
- question: >-
    What is the physiological substrate spectrum that distinguishes EHHADH (LBP) from HSD17B4
    (DBP) in vivo, given that both can catalyze the peroxisomal hydratase/dehydrogenase steps
    with opposite chirality?
- question: >-
    By what mechanism does the FRTS3 p.E3K mistargeting of EHHADH to mitochondria impair
    mitochondrial oxidative phosphorylation and proximal-tubule solute transport, if the enzyme's
    peroxisomal catalytic function is retained?
suggested_experiments:
- description: >-
    Quantify accumulation of medium/long-chain dicarboxylic acyl-CoAs and their beta-oxidation
    flux in EHHADH-null vs HSD17B4-null cells to define the non-redundant substrate niche of LBP.
- description: >-
    Compare peroxisomal versus mitochondrial localization and downstream metabolic/transport
    phenotypes of wild-type EHHADH versus the p.E3K FRTS3 variant in proximal tubule cell models.
