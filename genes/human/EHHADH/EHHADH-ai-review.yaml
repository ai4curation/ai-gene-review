- description: >-
    C-terminal NAD+-dependent L-3-hydroxyacyl-CoA dehydrogenase that catalyzes step 3 of the
    peroxisomal beta-oxidation spiral, oxidizing L-(3S)-3-hydroxyacyl-CoA to 3-oxoacyl-CoA with
    reduction of NAD+ to NADH. The long-chain-specific activity (GO:0016509) is a precise child.
  supported_by:
