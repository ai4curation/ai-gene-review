        ciliary length

- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: HDA
  original_reference_id: PMID:22658674
  review:
    summary: >-
      MAP4 was identified as an mRNA-binding protein in a systematic UV crosslinking
      interactome capture study in HeLa cells [PMID:22658674]. This is a high-throughput
      discovery study that identified 860 mRNA-binding proteins.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      While MAP4 was identified in this mRNA interactome capture study, this is a
      high-throughput approach that identified many proteins not traditionally considered
      RNA-binding. MAP4 has no known RNA-binding domain, and RNA binding is not a
      recognized function of microtubule-associated proteins. This likely represents
      non-specific or indirect association with mRNA rather than a specific RNA-binding function.
    supported_by:
    - reference_id: PMID:22658674
      supporting_text: >-
        We identify 860 proteins that qualify as RBPs by biochemical and statistical criteria,
        adding more than 300 RBPs to those previously known

- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: HDA
  original_reference_id: PMID:22681889
  review:
    summary: >-
      MAP4 was identified as an mRNA-bound protein in a systematic photoreactive nucleotide-enhanced
      UV crosslinking study in HEK293 cells [PMID:22681889]. Nearly one-third of identified
      proteins were not previously annotated as RNA-binding.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Similar to the PMID:22658674 study, this is a high-throughput mRNA-bound proteome study.
      MAP4 has no known RNA-binding domain and is not functionally characterized as an
      RNA-binding protein. Microtubule-associated proteins with large disordered regions
      may be captured non-specifically in such assays.
    supported_by:
    - reference_id: PMID:22681889
      supporting_text: >-
        nearly one-third were not previously annotated as RNA binding, and about 15% were not
        predictable by computational methods to interact with RNA

