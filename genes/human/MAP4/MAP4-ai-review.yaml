gene_symbol: MAP4
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MAP4 (Microtubule-associated protein 4) is the major non-neuronal microtubule-associated protein,
  structurally related to neuronal MAP2 and tau. It contains a C-terminal microtubule-binding domain
  with four imperfect Tau/MAP repeats that bind and stabilize microtubules, promoting their assembly
  and polymerization. MAP4 is regulated by phosphorylation at multiple sites (notably Ser787 by
  p34cdc2 kinase), which reduces its microtubule-stabilizing activity during mitosis, allowing
  dynamic microtubule remodeling. MAP4 localizes to the microtubule cytoskeleton, microtubule
  organizing center, mitotic spindle, ciliary axoneme, and ciliary basal body. It plays roles in
  maintaining mitotic spindle position (acting with CLASP1 as a safety mechanism), regulating
  ciliary length and cilium disassembly, and interacts with SEPTIN2, KNSTRN/SKAP, and
  dynein-dynactin. MAP4 is ubiquitously expressed with enhanced expression in brain and skeletal
  muscle.
