    label: microtubule cytoskeleton
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MAP4 localizes to the microtubule cytoskeleton, consistent with its role as a
      microtubule-binding and stabilizing protein. UniProt annotates cytoplasm/cytoskeleton
      localization with experimental evidence [PMID:34782749].
    action: ACCEPT
    reason: >-
      Localization to the microtubule cytoskeleton is a core characteristic of MAP4. This is
      supported by multiple experimental studies and by the UniProt subcellular location annotation.
    supported_by:
    - reference_id: PMID:34782749
      supporting_text: >-
        loss of TPGC leads to aberrant, enhanced assembly of MTs that penetrate the nucleus
    - reference_id: PMID:1905296
