    label: mitotic spindle organization
  evidence_type: IMP
  original_reference_id: PMID:21822276
  review:
    summary: >-
      MAP4 depletion causes spindle positioning defects in mitotic human cells. MAP4 and CLASP1
      operate as a safety mechanism to maintain a stable spindle position, with MAP4 preventing
      engagement of excess dynein motors [PMID:21822276].
    action: ACCEPT
    reason: >-
      Mitotic spindle organization is a well-established function of MAP4, supported by direct
      experimental evidence from RNAi depletion studies showing spindle positioning defects
      and misorientation.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        the tau-related protein MAP4 and the microtubule rescue factor CLASP1 are essential for
        maintaining spindle position and the correct cell-division axis in human cells

- term:
    id: GO:0051012
    label: microtubule sliding
  evidence_type: IMP
  original_reference_id: PMID:21822276
  review:
    summary: >-
      MAP4 inhibits dynein-mediated microtubule sliding in vitro. MAP4 depletion leads to
      excess microtubule sliding, contributing to spindle positioning defects [PMID:21822276].
    action: ACCEPT
    reason: >-
      MAP4's role in regulating microtubule sliding is directly demonstrated by in vitro
      experiments showing that MAP4 inhibits dynein-mediated microtubule sliding. This
      function is mechanistically linked to its role in spindle positioning.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        MAP4 physically interacts with dynein-dynactin in vivo and inhibits dynein-mediated
        microtubule sliding in vitro

- term:
    id: GO:0051294
    label: establishment of spindle orientation
  evidence_type: IMP
  original_reference_id: PMID:21822276
  review:
    summary: >-
      MAP4 depletion causes spindle misorientation in the vertical plane. The study demonstrates
      that MAP4 is required for correct spindle orientation, and that force generators are under
      spatial control mediated in part by MAP4 [PMID:21822276].
    action: ACCEPT
    reason: >-
      Establishment of spindle orientation is a well-supported function of MAP4 based on direct
      RNAi depletion experiments showing vertical spindle misorientation.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        Depletion of MAP4, but not CLASP1, causes spindle misorientation in the vertical plane,
        demonstrating that force generators are under spatial control

- term:
    id: GO:0051294
    label: establishment of spindle orientation
  evidence_type: IGI
  original_reference_id: PMID:21822276
  review:
    summary: >-
      IGI annotation indicating genetic interaction between MAP4 and CLASP1 (Q7Z460) in
      establishment of spindle orientation. The study shows that MAP4 and CLASP1 cooperate
      to maintain spindle position [PMID:21822276].
    action: ACCEPT
    reason: >-
      The genetic interaction between MAP4 and CLASP1 in spindle orientation is well-supported
      by the experimental evidence from PMID:21822276, where both proteins are shown to function
      as a safety mechanism for spindle positioning.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        MAP4 and CLASP1 operate as a safety mechanism to maintain a stable spindle position in mitosis

- term:
    id: GO:0051301
    label: cell division
  evidence_type: IMP
  original_reference_id: PMID:21822276
  review:
    summary: >-
      MAP4 depletion affects cell division through spindle positioning and orientation defects.
      Correct spindle positioning is critical for establishing the correct cell-division plane
      [PMID:21822276].
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell division is a very broad biological process. While MAP4 contributes to cell division
      through its role in spindle positioning and microtubule dynamics, this is an indirect
      consequence of its more specific functions. The more specific terms (mitotic spindle
      organization, establishment of spindle orientation) better capture MAP4's role.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        Correct positioning of the mitotic spindle is critical to establish the correct
        cell-division plane

- term:
    id: GO:0072686
    label: mitotic spindle
  evidence_type: IDA
  original_reference_id: PMID:21822276
  review:
    summary: >-
      MAP4 localizes to the mitotic spindle, as demonstrated by direct observation in
      PMID:21822276. This localization is essential for its function in maintaining spindle
      position during mitosis.
    action: ACCEPT
    reason: >-
      Mitotic spindle localization is directly demonstrated by experimental evidence and is
      functionally relevant to MAP4's role in spindle positioning and orientation.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        the tau-related protein MAP4 and the microtubule rescue factor CLASP1 are essential for
        maintaining spindle position and the correct cell-division axis in human cells

- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: TAS
  original_reference_id: PMID:1905296
  review:
    summary: >-
      TAS annotation from the original characterization of MAP4. MAP4 contains a microtubule-binding
      domain homologous to MAP2 and tau, with a large projection domain that extends from the
      microtubule surface [PMID:1905296]. The structural molecule activity annotation reflects
      MAP4's role as a structural component of the microtubule cytoskeleton.
    action: MODIFY
    reason: >-
      While MAP4 does have structural properties, the term 'structural molecule activity' is not
      the most accurate description of MAP4's molecular function. MAP4's primary molecular
      functions are microtubule binding (GO:0008017) and microtubule stabilizing activity
      (GO:0140778), which are already annotated. The structural molecule activity term is too
      generic and does not adequately capture the specific role of MAP4.
    proposed_replacement_terms:
    - id: GO:0140778
      label: microtubule stabilizing activity
    supported_by:
    - reference_id: PMID:1905296
      supporting_text: >-
        MAP4.245 fusion proteins bound to MTs in vitro, while fusion proteins that contained only
        the projection domain repeats failed to bind specifically to MTs

- term:
    id: GO:0005875
    label: microtubule associated complex
  evidence_type: TAS
  original_reference_id: PMID:1905296
  review:
    summary: >-
      MAP4 is a microtubule-associated protein that copurifies with microtubules, forming
      part of the microtubule-associated complex. This was established in the original
      characterization of MAP4 [PMID:1905296].
    action: ACCEPT
    reason: >-
      MAP4 is by definition a member of the microtubule associated complex, as it is a major
      non-neuronal microtubule-associated protein that copurifies with microtubules.
    supported_by:
    - reference_id: PMID:1905296
      supporting_text: >-
        A polyclonal antiserum raised against a HeLa cell microtubule-associated protein of Mr
        210,000 (210 kD MAP or MAP4), an abundant non-neuronal MAP

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: MAP4 contains InterPro domains IPR027324 (MAP2/MAP4/Tau) and IPR001084 (MAP tubulin-binding repeat) supporting microtubule binding and tubulin binding annotations.
- id: GO_REF:0000024
  title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence similarity
  findings:
  - statement: ISS annotations transferred from mouse and bovine orthologs for microtubule cytoskeleton organization and axonal localization.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: IBA annotations inferred from the MAP2/MAP4/tau family, supporting microtubule binding, microtubule stabilizing activity, microtubule cytoskeleton organization, and regulation of microtubule-based movement.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping
  findings:
  - statement: IEA annotations for microtubule organizing center and cytoskeleton localization mapped from UniProt subcellular location vocabulary.
- id: GO_REF:0000052
  title: Gene Ontology annotation based on curation of immunofluorescence data
  findings:
  - statement: HPA immunofluorescence data supports MAP4 localization to cilium, microtubule cytoskeleton, and ciliary basal body.
- id: PMID:10791892
  title: Ser787 in the proline-rich region of human MAP4 is a critical phosphorylation site that reduces its activity to promote tubulin polymerization.
  findings:
  - statement: MAP4 promotes tubulin polymerization, and phosphorylation at Ser787 by p34cdc2 kinase reduces this activity, regulating microtubule dynamics during mitosis.
    supporting_text: >-
      Mutation of Ser787 to Glu strikingly reduced the MAP4's MT-polymerization activity, while Glu-mutation at Ser696 did not
  - statement: Ser787 is differentially phosphorylated during the cell cycle, suggesting a critical role in mitotic microtubule dynamics.
    supporting_text: >-
      Ser787 could be the critical phosphorylation site causing MTs to be dynamic at mitosis
- id: PMID:17474147
  title: Systematic identification of SH3 domain-mediated human protein-protein interactions by peptide array target screening.
  findings:
  - statement: MAP4 was identified as interacting with NCK1 via SH3 domain-mediated peptide array screening, a high-throughput interaction discovery method.
    supporting_text: >-
      employed peptide arrays to identify such binding events
- id: PMID:1905296
  title: Non-neuronal 210 x 10(3) Mr microtubule-associated protein (MAP4) contains a domain homologous to the microtubule-binding domains of neuronal MAP2 and tau.
  findings:
  - statement: MAP4 is the major non-neuronal microtubule-associated protein with a C-terminal microtubule-binding domain containing three imperfect 18-amino acid repeats homologous to the MT-binding domain of MAP2 and tau.
    supporting_text: >-
      the major human non-neuronal MAP resembles two neuronal MAPs in its MT-binding domain, while most of the molecule has sequences, and presumably functions, distinct from those of the neuronal MAPs
  - statement: MAP4 fusion proteins bind directly to microtubules in vitro through the conserved MT-binding domain.
    supporting_text: >-
      MAP4.245 fusion proteins bound to MTs in vitro, while fusion proteins that contained only the projection domain repeats failed to bind specifically to MTs
- id: PMID:21822276
  title: MAP4 and CLASP1 operate as a safety mechanism to maintain a stable spindle position in mitosis.
  findings:
  - statement: MAP4 and CLASP1 are essential for maintaining spindle position and the correct cell-division axis in human cells. MAP4 prevents excess dynein motor engagement.
    supporting_text: >-
      the tau-related protein MAP4 and the microtubule rescue factor CLASP1 are essential for maintaining spindle position and the correct cell-division axis in human cells
  - statement: MAP4 physically interacts with dynein-dynactin in vivo and inhibits dynein-mediated microtubule sliding in vitro.
    supporting_text: >-
      MAP4 physically interacts with dynein-dynactin in vivo and inhibits dynein-mediated microtubule sliding in vitro
  - statement: MAP4 depletion causes spindle misorientation in the vertical plane, demonstrating spatial control of force generators.
    supporting_text: >-
      Depletion of MAP4, but not CLASP1, causes spindle misorientation in the vertical plane, demonstrating that force generators are under spatial control
- id: PMID:22658674
  title: Insights into RNA biology from an atlas of mammalian mRNA-binding proteins.
  findings:
  - statement: MAP4 was identified among 860 mRNA-binding proteins in a systematic UV crosslinking interactome capture study in HeLa cells. However, many identified proteins were not previously known RNA-binding proteins.
    supporting_text: >-
      We identify 860 proteins that qualify as RBPs by biochemical and statistical criteria, adding more than 300 RBPs to those previously known
- id: PMID:22681889
  title: The mRNA-bound proteome and its global occupancy profile on protein-coding transcripts.
  findings:
  - statement: MAP4 was identified as an mRNA-bound protein in a systematic photoreactive nucleotide-enhanced UV crosslinking study. Many identified proteins were not previously annotated as RNA-binding.
    supporting_text: >-
      nearly one-third were not previously annotated as RNA binding, and about 15% were not predictable by computational methods to interact with RNA
- id: PMID:23572511
  title: Septins 2, 7 and 9 and MAP4 colocalize along the axoneme in the primary cilium and control ciliary length.
  findings:
  - statement: MAP4 localizes along the axoneme of the primary cilium and negatively regulates ciliary length in RPE cells.
    supporting_text: >-
      MAP4, which is a binding partner of SEPT2 and controls the accessibility of septins to microtubules, was also localized to the axoneme where it appeared to negatively regulate ciliary length
  - statement: MAP4 controls the accessibility of septins to microtubules, indicating functional interaction between MAP4 and the septin cytoskeleton at cilia.
    supporting_text: >-
      MAP4, which is a binding partner of SEPT2 and controls the accessibility of septins to microtubules
- id: PMID:29180244
  title: "Dual loss of p110\u03B4 PI3-kinase and SKAP (KNSTRN) expression leads to combined immunodeficiency and multisystem syndromic features."
  findings:
  - statement: MAP4 was identified as a novel SKAP/KNSTRN-binding partner. MAP4 undergoes relocalization in SKAP-deficient patient T cells with associated areas of aberrant microtubule hyperstabilization.
    supporting_text: >-
      microtubule-associated protein 4 microtubule-binding protein as a novel SKAP-binding partner and show that it undergoes relocalization in patient T cells, with associated areas of aberrant microtubule hyperstabilization
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human interactome.
  findings:
  - statement: MAP4 was detected in BioPlex 3.0 proteome-scale interaction networks, identifying interaction partners through affinity-purification mass spectrometry.
    supporting_text: >-
      affinity purification of 10,128 human proteins-half the proteome-in 293T cells and includes 118,162 interactions among 14,586 proteins
- id: PMID:34782749
  title: Regulators of tubulin polyglutamylation control nuclear shape and cilium disassembly by balancing microtubule and actin assembly.
  findings:
  - statement: MAP4 recruitment to microtubules is inhibited by tubulin polyglutamylation. Loss of polyglutamylation leads to enhanced MAP4 binding, aberrant microtubule assembly, and defects in nuclear shape and cilium disassembly.
    supporting_text: >-
      loss of TPGC leads to aberrant, enhanced assembly of MTs that penetrate the nucleus
  - statement: MAP4 binding to microtubules is regulated by post-translational modification of tubulin, establishing a link between polyglutamylation and MAP-dependent microtubule organization.
    supporting_text: >-
      modulates long-chain polyglutamylation levels on microtubules (MTs) and thereby balances the binding of MT-associated proteins and actin nucleators
- id: PMID:35271311
  title: 'OpenCell: Endogenous tagging for the cartography of human cellular organization.'
  findings:
  - statement: MAP4 interactions were profiled through endogenous tagging and mass spectrometry in the OpenCell project.
    supporting_text: >-
      We combined genome engineering, confocal live-cell imaging, mass spectrometry, and data science to systematically map the localization and interactions of human proteins
- id: PMID:36115835
  title: Quantitative fragmentomics allow affinity mapping of interactomes.
  findings:
  - statement: MAP4 was identified in a quantitative fragmentomics study mapping PDZ domain-mediated interactions.
    supporting_text: >-
      we measure the affinities of 65,000 interactions involving PDZ domains and their target PDZ-binding motifs (PBM)

core_functions:
- molecular_function:
    id: GO:0008017
    label: microtubule binding
  description: >-
    MAP4 contains a conserved Tau/MAP microtubule-binding domain with four tubulin-binding repeats
    that directly bind microtubules [PMID:1905296]. This is the defining molecular function of
    the protein, supported by IBA, IEA, and direct experimental evidence.
  supported_by:
  - reference_id: PMID:1905296
    supporting_text: >-
      MAP4.245 fusion proteins bound to MTs in vitro, while fusion proteins that contained only
      the projection domain repeats failed to bind specifically to MTs
- molecular_function:
    id: GO:0140778
    label: microtubule stabilizing activity
  description: >-
    MAP4 promotes microtubule assembly and stabilization. This activity is regulated by
    phosphorylation at Ser787 [PMID:10791892] and by tubulin polyglutamylation [PMID:34782749].
    Supported by IBA and IDA evidence.
  supported_by:
  - reference_id: PMID:10791892
    supporting_text: >-
      Mutation of Ser787 to Glu strikingly reduced the MAP4's MT-polymerization activity,
      while Glu-mutation at Ser696 did not
- molecular_function:
    id: GO:0015631
    label: tubulin binding
  description: >-
    MAP4 directly binds tubulin through its Tau/MAP repeat domain, promoting tubulin polymerization
    into microtubules [PMID:10791892, PMID:1905296].
  supported_by:
  - reference_id: PMID:10791892
    supporting_text: >-
      Ser787 in the proline-rich region of human MAP4 is a critical phosphorylation site that
      reduces its activity to promote tubulin polymerization
