existing_annotations:
- term:
    id: GO:0000226
    label: microtubule cytoskeleton organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MAP4 is a core microtubule-associated protein that promotes microtubule assembly and
      stabilization, directly organizing the microtubule cytoskeleton. IBA annotation is
      well-supported by phylogenetic inference from the MAP2/MAP4/tau family and by direct
      experimental evidence in PMID:34782749 and PMID:21822276.
    action: ACCEPT
    reason: >-
      Microtubule cytoskeleton organization is a core function of MAP4, supported by multiple
      experimental studies demonstrating that MAP4 promotes microtubule assembly, stabilizes
      microtubules, and regulates microtubule dynamics during both interphase and mitosis.
    supported_by:
    - reference_id: PMID:34782749
      supporting_text: >-
        loss of TPGC leads to aberrant, enhanced assembly of MTs that penetrate the nucleus
    - reference_id: PMID:21822276
      supporting_text: >-
        MAP4 and CLASP1 operate as a safety mechanism to maintain a stable spindle position in mitosis

- term:
    id: GO:0008017
    label: microtubule binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MAP4 contains a well-characterized microtubule-binding domain with four Tau/MAP repeats
      (residues 923-1085) homologous to neuronal MAP2 and tau [PMID:1905296]. Microtubule binding
      is the defining molecular function of this protein.
    action: ACCEPT
    reason: >-
      Microtubule binding is the core molecular function of MAP4, demonstrated by direct binding
      experiments and structural analysis showing the conserved Tau/MAP repeat microtubule-binding
      domain [PMID:1905296]. The IBA annotation is phylogenetically sound across the MAP2/MAP4/tau family.
    supported_by:
    - reference_id: PMID:1905296
      supporting_text: >-
        MAP4.245 fusion proteins bound to MTs in vitro, while fusion proteins that contained only
        the projection domain repeats failed to bind specifically to MTs

- term:
