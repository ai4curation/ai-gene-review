- term:
    id: GO:0061523
    label: cilium disassembly
  evidence_type: IDA
  original_reference_id: PMID:34782749
  review:
    summary: >-
      MAP4 is implicated in cilium disassembly through its role in balancing microtubule and
      actin assembly. Loss of tubulin polyglutamylation affects MAP4 binding to microtubules,
      which disrupts cytoplasmic actin organization and the YAP/TAZ pathway required for
      cilium disassembly [PMID:34782749].
    action: KEEP_AS_NON_CORE
    reason: >-
      While the study implicates MAP4 in cilium disassembly through its regulation by
      polyglutamylation, the primary role of MAP4 in this process is indirect - it is
      the downstream consequence of altered microtubule dynamics affecting actin organization.
      This is a secondary function rather than a core activity of MAP4.
    supported_by:
    - reference_id: PMID:34782749
      supporting_text: >-
        disorganization of cytoplasmic actin that disrupts the YAP/TAZ pathway and cilium disassembly

