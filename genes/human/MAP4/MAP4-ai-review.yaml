- term:
    id: GO:0030424
    label: axon
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from the MAP2/tau/MAP4 family. While MAP2
      and tau are neuronal MAPs with strong axonal localization, MAP4 is described as the major
      non-neuronal MAP [PMID:1905296]. However, MAP4 is expressed in brain tissue and the IBA
      annotation includes strong support from multiple orthologs.
    action: KEEP_AS_NON_CORE
    reason: >-
      MAP4 is primarily described as a non-neuronal MAP, but it is expressed in brain (enhanced
      expression per HPA) and is phylogenetically related to neuronal MAP2 and tau. Axonal
      localization is plausible but is not a core function of MAP4, which is ubiquitously expressed.
    supported_by:
    - reference_id: PMID:1905296
      supporting_text: >-
        the major human non-neuronal MAP resembles two neuronal MAPs in its MT-binding domain,
        while most of the molecule has sequences, and presumably functions, distinct from those
        of the neuronal MAPs

- term:
    id: GO:0060632
    label: regulation of microtubule-based movement
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MAP4 regulates microtubule-based movement, specifically by inhibiting dynein-mediated
      microtubule sliding [PMID:21822276]. MAP4 physically interacts with dynein-dynactin
      in vivo and prevents engagement of excess dynein motors.
    action: ACCEPT
    reason: >-
      Direct experimental evidence from PMID:21822276 demonstrates that MAP4 inhibits
      dynein-mediated microtubule sliding in vitro and physically interacts with dynein-dynactin
      in vivo, establishing regulation of microtubule-based movement as a core function.
    supported_by:
    - reference_id: PMID:21822276
      supporting_text: >-
        MAP4 physically interacts with dynein-dynactin in vivo and inhibits dynein-mediated
        microtubule sliding in vitro

- term:
    id: GO:0140778
    label: microtubule stabilizing activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      MAP4 promotes microtubule assembly and stabilization, a function shared with other members
