gene_symbol: NUFIP1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NUFIP1 (nuclear fragile X mental retardation-interacting protein 1) is a small
  zinc-finger, RNA-binding nucleocytoplasmic shuttling protein with two
  well-supported, distinct roles. In the nucleus/nucleolus it acts as a box C/D
  small nucleolar ribonucleoprotein (snoRNP) biogenesis/assembly factor: as part
  of the R2TP-associated pre-snoRNP machinery (with ZNHIT3, BCD1/ZNHIT6 and the
  AAA+ ATPases RUVBL1/TIP49 and RUVBL2/TIP48), NUFIP1 serves as a scaffold that
  bridges interactions between the core box C/D proteins, facilitating assembly
  of the snoRNPs that process and modify rRNA. In the cytoplasm, upon mTORC1
  inhibition/nutrient starvation, NUFIP1 relocalizes from the nucleus to
  autophagosomes and functions as the selective-autophagy receptor for ribosomes
  (ribophagy): together with its partner ZNHIT3 it binds ribosomes and delivers
  them to the autophagosome by directly binding the ATG8-family protein LC3B
  through a LIR motif, providing metabolites that support cell survival under
  starvation. NUFIP1 was originally identified as a nuclear interactor of the
  fragile X protein FMR1/FMRP and is associated with active synaptoneurosomes;
  it has also been reported to cooperate with BRCA1 and the elongation factor
  P-TEFb (via Cyclin T1) to stimulate RNA polymerase II transcription, although
  it does not bind DNA directly. NUFIP1 localizes mainly to the nucleoplasm,
  nucleolus, perichromatin fibrils and nuclear matrix, redistributing to the
  cytoplasm during starvation-induced ribophagy.
