- id: PMID:29700228
  title: NUFIP1 is a ribosome receptor for starvation-induced ribophagy.
  findings:
  - statement: Upon mTORC1 inhibition/starvation, NUFIP1 redistributes from the nucleus to autophagosomes, binds ribosomes (with ZNHIT3), and delivers them to autophagosomes by directly binding LC3B; a NUFIP1 mutant unable to bind LC3B cannot support ribosome degradation. NUFIP1 is the selective-autophagy receptor for ribosomes (ribophagy), promoting cell survival under starvation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Wyant et al., Science 2018 (PMID PubMed-verified). Establishes NUFIP1's headline cytoplasmic function as the ribophagy receptor binding LC3B. This function is not yet captured in the current GOA; proposed as new terms.
core_functions:
- description: Acts as a box C/D small nucleolar ribonucleoprotein (snoRNP) assembly factor, serving as a protein-macromolecule adaptor/scaffold that bridges interactions between core box C/D proteins within the R2TP-associated pre-snoRNP complex (with ZNHIT3 and the RUVBL1/RUVBL2 ATPases), thereby facilitating snoRNP biogenesis for rRNA processing and modification.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  supported_by:
  - reference_id: PMID:17636026
    supporting_text: NUFIP bridges interactions between the core box C/D proteins in a partially reconstituted pre-snoRNP
  locations:
  - id: GO:0005730
    label: nucleolus
  directly_involved_in:
  - id: GO:0000492
    label: box C/D snoRNP assembly
- description: Functions as the selective-autophagy (ribophagy) receptor for ribosomes during starvation/mTORC1 inhibition, binding ribosomes (with ZNHIT3) and the ATG8-family protein LC3B via a LIR motif to deliver ribosomes to autophagosomes for degradation, supporting cell survival. This function is not yet represented in the current GOA.
  molecular_function:
    id: GO:0160247
    label: autophagy cargo adaptor activity
  supported_by:
  - reference_id: PMID:29700228
    supporting_text: depends on the capacity of NUFIP1 to bind LC3B and promotes cell survival
  directly_involved_in:
  - id: GO:0034517
    label: ribophagy
proposed_new_terms: []
suggested_questions:
- question: How is NUFIP1's partitioning between its nuclear snoRNP-assembly role and its cytoplasmic ribophagy-receptor role regulated beyond mTORC1 signaling, and does ZNHIT3 coordinate both functions?
- question: Is NUFIP1-mediated ribophagy selective for particular ribosome subpopulations (e.g. 60S vs 40S, or stalled/damaged ribosomes), and what determines cargo selectivity?
suggested_experiments:
- description: Map the NUFIP1 LIR motif by mutagenesis and test LC3B-binding-deficient NUFIP1 for ribosome delivery to autophagosomes and starvation survival, while separately assaying snoRNP assembly to determine whether the two functions are genetically separable.
- description: Use proximity labeling and ribosome-profiling in nucleus- versus autophagosome-localized NUFIP1 pools under fed and starved conditions to define the in vivo cargo (ribosomes/snoRNPs) and partner repertoire of each functional state.
