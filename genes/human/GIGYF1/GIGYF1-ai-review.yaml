- term:
    id: GO:1990261
    label: pre-mRNA catabolic process
  evidence_type: NAS
  original_reference_id: PMID:33053355
  qualifier: involved_in
  review:
    summary: >-
      ComplexPortal-derived annotation reflecting GIGYF1's role in the
      4EHP-GIGYF1 co-translational mRNA-decay complex. The biology (decay of
      mature, translated mRNAs that experience ribosome pausing) is correct, but
      'pre-mRNA catabolic process' is an imprecise label, since the substrates
      are mature, ribosome-engaged mRNAs rather than pre-mRNA.
    action: MODIFY
    reason: >-
      The complex triggers co-translational decay of mature mRNAs with ribosome
      pausing, not pre-mRNA turnover; a mature-mRNA catabolic term better
      reflects the evidence.
    proposed_replacement_terms:
    - id: GO:0000956
      label: nuclear-transcribed mRNA catabolic process
    supported_by:
    - reference_id: PMID:33053355
      supporting_text: >-
        Here, we show that 4EHP-GIGYF1/2 complexes trigger co-translational mRNA
        decay. Human cells lacking these proteins accumulate mRNAs with prominent
        ribosome pausing.
