- description: >-
    As the scaffold of the 4EHP-GIGYF1/2 module (with DDX6 and ZNF598), GIGYF1
    represses translation and triggers co-translational decay of mRNAs that
    experience ribosome pausing or stalling, coupling ribosome transit to mRNA
    turnover.
