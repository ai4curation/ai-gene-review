    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      GIGYF1 acts in the cytosol, where it associates with ribosomes, the mRNA
      cap, DDX6 and P-body/decay machinery. The localization is consistent with
      its translational-repression function.
    action: ACCEPT
    reason: >-
      Cytosolic activity is expected for a translation/mRNA-decay adaptor and is
      phylogenetically well supported; the complex acts co-translationally on
      cytoplasmic mRNAs.
    supported_by:
    - reference_id: PMID:33053355
      supporting_text: >-
        co-translational binding of GIGYF1/2 to the mRNA marks transcripts with
        perturbed elongation to decay.
- term:
    id: GO:0048009
    label: insulin-like growth factor receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      GIGYF1 was originally identified via the GRB10 adapter as a modulator of
      IGF-1 receptor signaling and may increase IGF1R phosphorylation. This is a
      real but secondary, less-characterized role relative to its translational
      repression function.
    action: KEEP_AS_NON_CORE
    reason: >-
      UniProt records a GRB10-linked IGF signaling role, but the mechanistic and
      genetic evidence for GIGYF1's principal cellular function centers on
      4EHP/DDX6-mediated translational repression and co-translational mRNA
      decay. The IGF role is retained as non-core.
    supported_by:
