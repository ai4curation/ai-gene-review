      decay. Human cells lacking these proteins accumulate mRNAs with prominent
      ribosome pausing.
proposed_new_terms: []
suggested_questions:
- Does GIGYF1 act redundantly with GIGYF2 in co-translational mRNA decay, or do
  the paralogs have distinct target-mRNA repertoires and tissue contexts?
- To what extent does GIGYF1 contribute to ZNF598-dependent ribosome-collision
  quality control versus 4EHP-only translational repression at uncollided mRNAs?
suggested_experiments:
- Ribosome profiling and mRNA-decay measurements in GIGYF1 single-knockout versus
  GIGYF1/GIGYF2 double-knockout cells to define paralog-specific target mRNAs.
- Structure-guided separation-of-function mutants (4EHP-binding vs DDX6-binding vs
  GYF-domain ZNF598/TTP binding) to dissect the contribution of each interaction
  to repression and decay.
