id: O75420
gene_symbol: GIGYF1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GIGYF1 (GRB10-interacting GYF protein 1; PERQ1) is a cytosolic adaptor/scaffold
  protein and the paralog of GIGYF2. Its central GYF domain and N-terminal
  4EHP-binding region allow it to nucleate a translational-repression and
  co-translational mRNA-decay module together with the non-canonical cap-binding
  protein 4EHP (EIF4E2), the DEAD-box helicase DDX6, and the collided-ribosome
  sensor E3 ligase ZNF598. By tethering 4EHP to the mRNA 5' cap, GIGYF1 represses
  cap-dependent translation initiation, and by co-translationally binding
  transcripts that experience ribosome pausing or stalling it marks them for
  decay, linking ribosome transit to mRNA turnover. The GYF domain also recruits
  RNA-associated repressors such as tristetraprolin (TTP) and the miRNA-pathway
  TNRC6 proteins to specific messages. In a separate, less-characterized legacy
  role, GIGYF1 was first identified through the GRB10 adapter as a modulator of
  insulin-like growth factor-1 (IGF-1) receptor and other receptor tyrosine
  kinase signaling. The protein is largely intrinsically disordered outside its
  GYF domain and is heavily phosphorylated.
existing_annotations:
- term:
    id: GO:0045947
    label: negative regulation of translational initiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      GIGYF1 tethers the non-canonical cap-binding protein 4EHP/EIF4E2 to mRNA,
      repressing cap-dependent translation initiation as part of the
      4EHP-GIGYF1/2 repressor module. This is well supported and represents a
      core function.
    action: ACCEPT
    reason: >-
      The 4EHP-GIGYF1/2 complex represses translation and triggers
      co-translational decay; loss of these proteins fails to reduce target mRNA
      levels and accumulates ribosome-paused transcripts. The IBA call is
      consistent with direct experimental evidence on the complex.
    supported_by:
    - reference_id: PMID:33053355
      supporting_text: >-
        4EHP-GIGYF1/2 complexes fail to reduce mRNA levels in the absence of
        ribosome stalling or upon disruption of their interaction with the cap
        structure, DDX6, and ZNF598.
    - reference_id: PMID:31439631
      supporting_text: >-
        These proteins possess an N-terminal 4EHP-binding region (4EHP-BR) and a
        central compacted GYF domain
- term:
