core_functions:
- description: >-
    ADP/ATP antiport across the mitochondrial inner membrane: SLC25A6/ANT3 exchanges
    ATP synthesized in the matrix for cytosolic ADP, importing ADP for phosphorylation by
    the ATP synthase and exporting ATP to fuel the cell. This couples oxidative
    phosphorylation to cytosolic energy supply.
  molecular_function:
    id: GO:0005471
    label: ATP:ADP antiporter activity
