id: P12236
gene_symbol: SLC25A6
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SLC25A6 (ADP/ATP translocase 3, ANT3) is one of the human adenine nucleotide
  translocase isoforms of the SLC25 mitochondrial carrier family (TC 2.A.29). It is a
  multi-pass integral protein of the mitochondrial inner membrane with the
  characteristic three-fold repeated mitochondrial carrier fold (six transmembrane
  helices, three Solcar repeats). Its principal function is ADP/ATP antiport: it
  exchanges ATP generated in the matrix for cytosolic ADP, importing ADP for
  phosphorylation by the F1Fo-ATP synthase and exporting newly synthesized ATP to the
  cytosol to fuel the cell, thereby serving as the final step that couples oxidative
  phosphorylation to cellular energy supply. Transport proceeds by an alternating-access
  mechanism in which a single nucleotide-binding site is exposed alternately to the
  cytosolic (c-state) and matrix (m-state) sides of the membrane, and is blocked by the
  inhibitors carboxyatractyloside (c-state) and bongkrekic acid (m-state). ANT3 is the
  ubiquitously expressed ANT isoform; its gene lies in the pseudoautosomal region 1
  (PAR1) of the X and Y chromosomes and escapes X-inactivation. Like other ANT isoforms,
  ANT3 is associated with the mitochondrial permeability transition pore and can
  contribute to apoptosis, and it has been implicated in mitochondrial uncoupling/proton
  transport (thermogenesis), although these activities are secondary to its core role as
  an ADP/ATP exchanger.
