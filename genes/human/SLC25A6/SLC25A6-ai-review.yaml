    label: mitochondrial inner membrane
  supported_by:
  - reference_id: file:human/SLC25A6/SLC25A6-uniprot.txt
    supporting_text: >-
      ADP:ATP antiporter that mediates import of ADP into the
      mitochondrial matrix for ATP synthesis, and export of ATP out to fuel
      the cell
  - reference_id: PMID:2541251
    supporting_text: >-
      It carries ATP from the matrix into the intermembrane space and
      transports ADP back.
  - reference_id: PMID:16201016
    supporting_text: >-
      ANT3 is an inner mitochondrial membrane protein that functions as an
      antiporter catalyzing the exchange of ATP for ADP
proposed_new_terms: []
suggested_questions:
- question: >-
    Does the TIM23-translocase-complex (GO:0005744) part_of annotation reflect a genuine
    structural subunit relationship, or is ANT3 merely a carrier-pathway (TIM22) import
    substrate that was mis-annotated as a translocase component?
- question: >-
    Beyond ADP/ATP exchange, does human ANT3 specifically contribute proton-transport
    (uncoupling/thermogenesis) activity in vivo, and should a dedicated proton-transport
    MF/BP annotation be added for ANT3 as has been proposed for the ANT family?
suggested_experiments:
- description: >-
    Reconstitute purified human ANT3 into proteoliposomes and measure ADP/ATP exchange
    kinetics with carboxyatractyloside and bongkrekic acid controls to directly confirm
    the antiporter activity currently supported by orthology/ISS.
- description: >-
    Use isoform-selective knockout/knockdown of SLC25A6 in cells lacking ANT1/ANT2 to
    test its individual contribution to permeability transition pore opening and
    apoptosis versus the other ANT paralogs.
