id: Q16518
gene_symbol: RPE65
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  RPE65 is the retinoid isomerohydrolase, the central enzyme of the visual (retinoid)
  cycle in the retinal pigment epithelium (RPE). It is an iron(II)-dependent,
  membrane-associated member of the carotenoid oxygenase family that converts
  all-trans-retinyl ester (produced by LRAT) to 11-cis-retinol through a coupled
  ester hydrolysis and all-trans-to-11-cis isomerization. The 11-cis-retinol product
  is subsequently oxidized by 11-cis-retinol dehydrogenase to 11-cis-retinal, the
  chromophore required to regenerate rod and cone visual pigments (opsins) after
  photobleaching, making RPE65 essential for both rod and cone photoreceptor function.
  RPE65 binds a single catalytic Fe(2+) ion coordinated by conserved histidine
  residues. Its association with the smooth endoplasmic reticulum / microsomal
  membrane of RPE cells is controlled by reversible palmitoylation (notably at
  Cys-112 by LRAT); the palmitoylated membrane form binds all-trans-retinyl esters
  while the soluble form binds all-trans-retinol (vitamin A). In addition to its
  primary role in the visual cycle, RPE65 acts as the lutein-to-meso-zeaxanthin
  isomerase responsible for producing the ocular carotenoid meso-zeaxanthin.
  Recessive loss-of-function mutations in RPE65 cause Leber congenital amaurosis
  type 2 and retinitis pigmentosa 20, and a dominant D477G gain-of-function allele
  causes retinitis pigmentosa 87; RPE65-associated inherited retinal dystrophy is
  the target of voretigene neparvovec (Luxturna) gene therapy.
