existing_annotations:
- term:
    id: GO:0003834
    label: beta-carotene 15,15'-dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Family-level phylogenetic (IBA) inference of beta-carotene 15,15'-dioxygenase
      activity. This is the activity of the paralogous carotenoid oxygenase BCO1/BCMO1,
      not RPE65. RPE65 is a non-oxygenase member of the family that isomerizes
      all-trans-retinyl esters rather than symmetrically cleaving beta-carotene, and
      it does not incorporate molecular oxygen. This is an over-annotation propagated
      from the family tree.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      RPE65 is an isomerohydrolase, not a dioxygenase; the beta-carotene cleavage
      activity belongs to the BCO1 branch of the carotenoid oxygenase family. UniProt
      places RPE65 in the carotenoid oxygenase family but annotates only isomerohydrolase
      activity, not dioxygenase activity.
    supported_by:
    - reference_id: file:human/RPE65/RPE65-uniprot.txt
      supporting_text: "Belongs to the carotenoid oxygenase family."
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
