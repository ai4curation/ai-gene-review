id: Q96IG2
gene_symbol: FBXL20
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL20 (F-box/LRR-repeat protein 20; FBL2; the mouse ortholog is named
  SCRAPPER) is a substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1) E3
  ubiquitin ligase complex. Its F-box motif binds SKP1, linking it to the
  CUL1-RBX1 catalytic core, while its leucine-rich repeat domain provides
  substrate selectivity, directing substrate-specific polyubiquitination and
  proteasomal degradation. FBXL20 carries a C-terminal CAAX motif that is
  isoprenylated, targeting it to membranes, and its localization governs which
  substrates it engages. A well-characterized human substrate is VPS34/PIK3C3,
  the catalytic subunit of class III PI3K: FBXL20 binds VPS34 through its
  C-terminal LRR region (engaging the VPS34 C2 domain) and, downstream of DNA
  damage, promotes CDK-dependent (VPS34 Thr159) phosphodegron-gated
  ubiquitination and proteasomal degradation of VPS34. FBXL20 is itself a
  p53-inducible gene (and a miR-3151 target), so the p53 to FBXL20 to VPS34 axis
  lowers PtdIns3P output, dampening autophagy and slowing endosomal receptor
  (e.g. EGFR) degradation under genotoxic stress. FBXL20 also promotes
  ubiquitination and degradation of PR55alpha/PPP2R2A, a regulatory B subunit of
  the PP2A serine/threonine phosphatase. In the nervous system the
  SCRAPPER/FBXL20 ortholog is a membrane-associated presynaptic regulator that
  ubiquitinates the active-zone protein RIM1/RIMS1, controlling synaptic vesicle
  release and neurotransmission; accordingly the protein has documented roles at
  the presynapse and at glutamatergic synapses (largely inferred from the mouse
  ortholog). FBXL20 acts in the cytoplasm/cytosol and at membranes.
