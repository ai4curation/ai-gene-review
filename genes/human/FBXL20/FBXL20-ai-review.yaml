suggested_questions:
- question: Which of the FBXL20 functions established for the mouse SCRAPPER ortholog (RIM1 ubiquitination, regulation of synaptic vesicle release) are conserved and directly demonstrable for the human protein, and is CAAX isoprenylation required?
- question: How do the membrane/autophagy (VPS34/PIK3C3, p53-DNA-damage axis), synaptic (RIM1), and PP2A (PR55alpha) substrate-targeting activities of FBXL20 relate, and are they coordinated by CAAX-dependent localization or by distinct phosphodegrons?
suggested_experiments:
- description: Reconstitute SCF(FBXL20)-mediated ubiquitination in vitro with purified SKP1-CUL1-RBX1-FBXL20, an E2, and candidate substrates (VPS34/PIK3C3 phosphorylated at Thr159, PR55alpha/PPP2R2A, RIM1) to confirm direct ubiquitination, test phosphodegron dependence, and map sites.
- description: Use FBXL20 knockout/knockdown (and CAAX-motif mutants) in human neurons and epithelial cells with quantitative ubiquitinome/proteome profiling and autophagy/PtdIns3P readouts to define the endogenous substrate repertoire, test the p53-FBXL20-VPS34 autophagy checkpoint, and assess conservation of the presynaptic role.
