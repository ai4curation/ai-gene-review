suggested_questions:
- question: Which of the FBXL20 functions established for the mouse SCRAPPER ortholog (RIM1 ubiquitination, regulation of synaptic vesicle release) are conserved and directly demonstrable for the human protein?
- question: How do the neuronal (RIM1/synaptic) and non-neuronal (PR55alpha/PP2A, p53 axis) substrate-targeting activities of FBXL20 relate, and are they tissue- or signal-specific?
suggested_experiments:
- description: Reconstitute SCF(FBXL20)-mediated ubiquitination in vitro with purified SKP1-CUL1-RBX1-FBXL20, an E2, and candidate substrates (PR55alpha/PPP2R2A, RIM1) to confirm direct ubiquitination and map sites.
- description: Use FBXL20 knockout/knockdown in human neurons and epithelial cells with quantitative ubiquitinome/proteome profiling to define the endogenous substrate repertoire and test conservation of the presynaptic role.
