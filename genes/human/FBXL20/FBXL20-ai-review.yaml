- id: file:human/FBXL20/FBXL20-deep-research-falcon.md
  title: Falcon deep research report for human FBXL20
  findings:
  - statement: FBXL20 is the substrate-recognition subunit of an SCF (CUL1-SKP1-FBXL20) E3 ligase that promotes ubiquitination and proteasomal degradation of VPS34/PIK3C3, binding VPS34 through its C-terminal LRR region (VPS34 C2 domain).
    supporting_text: >-
      FBXL20 acts as the substrate-recognition component of an **SCF (SKP1-CUL1-FBXL20)**
      E3 ubiquitin ligase that promotes **ubiquitination and proteasomal degradation**
      of **VPS34 (PIK3C3)**, the catalytic subunit of class III PI3K complexes.
  - statement: DNA damage drives a p53 to FBXL20 to VPS34 checkpoint in which CDK-dependent VPS34 Thr159 phosphorylation creates a phosphodegron required for FBXL20-mediated ubiquitination.
    supporting_text: >-
      phosphorylation at **T159** is required for efficient FBXL20-mediated
      ubiquitination and degradation. Specifically, VPS34 **T159A** (nonphosphorylatable)
      is largely resistant, whereas **T159E** (phosphomimetic) remains sensitive
  - statement: By lowering VPS34 and PtdIns3P output, FBXL20 acts as a negative regulator of autophagy under genotoxic stress and slows endosomal degradation of receptors such as EGFR.
    supporting_text: >-
      FBXL20 knockdown increases VPS34 and increases an autophagy marker readout
      (LC3-II ratio), whereas FBXL20 overexpression lowers VPS34; collectively this
      supports FBXL20 as a **negative regulator of autophagy** under genotoxic stress
  - statement: FBXL20 contains a CAAX motif that is isoprenylated, directing it to membranes, and this localization is required for ubiquitylation-dependent degradation of RIM1.
    supporting_text: >-
      FBXL20 contains a **CAAX motif** that is **isoprenylated**, directing FBXL20 to
      **membranes**; this localization is required for ubiquitylation-dependent
      degradation of **RIM1** (RAB3-interacting molecule 1)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Falcon adds the human VPS34/PIK3C3 substrate axis (Xiao et al. 2015 Genes &
      Dev, DOI 10.1101/gad.252528.114) and the CAAX-isoprenylation/membrane-localization
      requirement for RIM1 degradation (Skaar et al. 2013 Nat Rev Mol Cell Biol
      review). These are reported via author-year DOIs not in the PMID cache;
      cross-checked against UniProt and the existing PR55alpha study (PMID:34731788),
      and treated as well-supported leads rather than added as new GOA terms.
