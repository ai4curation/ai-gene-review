  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FBXL20 (F-box/LRR-repeat protein 20; FBL2; the mouse ortholog is named
  SCRAPPER) is a substrate-recognition subunit of an SCF (SKP1-CUL1-RBX1) E3
  ubiquitin ligase complex. Its F-box motif binds SKP1, linking it to the
  CUL1-RBX1 catalytic core, while its leucine-rich repeat domain provides
  substrate selectivity, directing substrate-specific polyubiquitination and
  proteasomal degradation. In the nervous system the SCRAPPER/FBXL20 ortholog is
  a presynaptic regulator that ubiquitinates the active-zone protein
  RIM1/RIMS1, controlling synaptic vesicle release and neurotransmission;
  accordingly the protein has documented roles at the presynapse and at
  glutamatergic synapses (largely inferred from the mouse ortholog). In human
  cells FBXL20 is a p53 target gene whose product promotes ubiquitination and
  degradation of PR55alpha/PPP2R2A, a regulatory B subunit of the PP2A
  serine/threonine phosphatase. FBXL20 acts in the cytoplasm/cytosol.
