  - term:
      id: GO:0007219
      label: Notch signaling pathway
    evidence_type: IDA
    original_reference_id: PMID:32601208
    review:
      summary: >-
        MAML1 is a component of the Notch transcription activation complex whose
        pharmacological disruption inhibits Notch signaling output.
      action: KEEP_AS_NON_CORE
      reason: >-
        The broad pathway term is defensible as context, but the more precise
        curatable process for MAML1's direct role is positive regulation of
        transcription of Notch target genes. Keep this as non-core.
      supported_by:
        - reference_id: PMID:32601208
          supporting_text: >-
            we describe a pharmacological strategy that interferes with Notch
            signaling by disrupting the Notch transcription complex
  - term:
      id: GO:0045893
      label: positive regulation of DNA-templated transcription
    evidence_type: IDA
    original_reference_id: PMID:32601208
    review:
      summary: >-
        As a component of the Notch transcription activation complex, MAML1
        positively regulates transcription of Notch target genes.
      action: ACCEPT
      reason: >-
        Positive regulation of DNA-templated transcription is supported by
        MAML1's coactivator role in the Notch transcription complex; disrupting
        the complex reduces this transcriptional output. The more specific
        RNA Pol II and Notch-target-gene terms are also annotated.
      supported_by:
        - reference_id: PMID:32601208
          supporting_text: >-
            we describe a pharmacological strategy that interferes with Notch
            signaling by disrupting the Notch transcription complex
  - term:
      id: GO:0003162
      label: atrioventricular node development
    evidence_type: ISS
    original_reference_id: GO_REF:0000024
    review:
      summary: >-
        Atrioventricular node development is inferred for MAML1 by curator
