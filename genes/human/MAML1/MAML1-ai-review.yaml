      supported_by:
        - reference_id: PMID:11101851
          supporting_text: >-
            Here we clone MAML1, a human homologue of the Drosophila gene
            Mastermind, and show that it encodes a protein of 130 kD
            localizing to nuclear bodies.
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IDA
    original_reference_id: PMID:32601208
    review:
      summary: >-
        MAML1 acts as part of the nuclear Notch transcription factor complex, the
        target of the small-molecule inhibitor characterized in this study.
      action: ACCEPT
      reason: >-
        Nuclear localization is the supported cellular context for MAML1's
