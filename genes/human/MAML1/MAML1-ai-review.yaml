  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:23022380
    review:
      summary: >-
        Bare protein binding row derived from a NOTCH1 nuclear interactome study
        that confirms MAML1 as part of the core ICN1-CSL-MAML1 activation
