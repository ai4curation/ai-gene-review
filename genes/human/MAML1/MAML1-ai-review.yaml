      supported_by:
        - reference_id: file:human/MAML1/MAML1-deep-research-falcon.md
          supporting_text: >-
            Avoid over-broad human MAML1 developmental annotations unless
            supported by direct gene-specific experiments; dnMAML affects
            multiple MAML paralogs/pathway output.
