  - term:
      id: GO:0002193
      label: MAML1-RBP-Jkappa- ICN1 complex
    evidence_type: IDA
    original_reference_id: PMID:16510869
    review:
      summary: >-
        MAML1 is a component of the Notch intracellular domain-RBPJ/CSL
        transcriptional activation complex.
      action: ACCEPT
      reason: >-
        The term is a specific cellular component representation of the
        canonical Notch transcription activation complex. The original cited
        PMID is myogenesis-focused, so the support should rely on the direct
        Notch complex papers.
      supported_by:
        - reference_id: PMID:11390662
          supporting_text: >-
            hMam-1 stabilizes and participates in the DNA binding complex of
            the intracellular domain of human Notch1 and a CSL protein.
        - reference_id: file:human/MAML1/MAML1-deep-research-falcon.md
          supporting_text: >-
            Specific complex membership: NICD–RBPJ–MAML1.
  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:16510869
    review:
      summary: >-
        Bare protein binding rows from the myogenesis paper capturing the MAML1
        interactions with MEF2C and RBPJ. The interactions are real but the term
        is uninformative.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0005515 protein binding is uninformative about molecular function.
        The functional content (MAML1 coactivation of MEF2C-mediated muscle
        transcription, and Notch complex membership) is captured by the
        transcription coactivator activity and muscle-differentiation
        annotations.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            we determined that MAML1 interacts with MEF2C (myocyte enhancer
            factor 2C), functioning as its potent co-transcriptional regulator.
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IDA
    original_reference_id: PMID:16510869
    review:
      summary: >-
        MAML1 functions as a nuclear coactivator (for MEF2C and Notch), placing
        it in the nucleus.
      action: ACCEPT
      reason: >-
        Nuclear localization is the supported cellular context for MAML1's
        coactivator function, consistent across the Notch and MEF2C literature.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            we determined that MAML1 interacts with MEF2C (myocyte enhancer
            factor 2C), functioning as its potent co-transcriptional regulator.
  - term:
      id: GO:0006468
      label: protein phosphorylation
    evidence_type: IDA
    original_reference_id: PMID:16510869
    review:
      summary: >-
        MISANNOTATION: MAML1 is a transcriptional coactivator, not a kinase,
        and the cited PMID:16510869 supports MEF2C coactivation/myogenesis
        rather than protein phosphorylation.
      action: REMOVE
      reason: >-
        The essence of the annotation is not sound: MAML1 does not catalyze
        protein phosphorylation in this paper. MAML1's non-catalytic CDK8
        recruitment role is already captured separately by the accepted
        GO:0019901 protein kinase binding row based on PMID:15546612.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            Our study thus reveals novel and nonredundant functions for MAML1:
            It acts as a coactivator for MEF2C transcription and is essential
            for proper muscle development.
  - term:
      id: GO:0010831
      label: positive regulation of myotube differentiation
    evidence_type: IGI
    original_reference_id: PMID:16510869
    review:
      summary: >-
        MAML1 promotes myotube differentiation as a MEF2C coactivator,
        demonstrated by gain- and loss-of-function in C2C12 cells and Maml1-null
        fibroblasts.
      action: KEEP_AS_NON_CORE
      reason: >-
        This is a directly supported (IGI, MyoD genetic interaction) muscle
        differentiation function, but it is a Notch-independent MEF2C-mediated
        activity peripheral to MAML1's core Notch coactivator role.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            overexpression of MAML1 in C2C12 cells dramatically enhanced myotube
            formation and increased the expression of muscle-specific genes,
            while RNA interference (RNAi)-mediated MAML1 knockdown abrogated
            differentiation.
  - term:
      id: GO:0045944
      label: positive regulation of transcription by RNA polymerase II
    evidence_type: IDA
    original_reference_id: PMID:16510869
    review:
      summary: >-
        MAML1 positively regulates RNA polymerase II transcription as a
        coactivator for MEF2C-mediated muscle-specific gene expression.
      action: ACCEPT
      reason: >-
        Direct evidence that MAML1 acts as a potent co-transcriptional regulator
        of MEF2C and increases muscle-specific gene expression supports positive
        regulation of RNA Pol II transcription.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            we determined that MAML1 interacts with MEF2C (myocyte enhancer
            factor 2C), functioning as its potent co-transcriptional regulator.
  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:11101851
    review:
      summary: >-
        Bare protein binding rows from the founding MAML1 paper capturing
        interactions with NOTCH intracellular domains and RBPJ. The interactions
        are central but the term is uninformative.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0005515 protein binding does not describe MAML1's molecular function.
        The functionally meaningful content (binding the Notch ANK domain to
        assemble the ICN-RBPJ-MAML transcription complex) is captured by the
        accepted transcription coactivator activity and MAML1-RBP-Jkappa-ICN1
        complex annotations.
      supported_by:
        - reference_id: PMID:11101851
          supporting_text: >-
            MAML1 binds to the ankyrin repeat domain of all four mammalian
            NOTCH receptors, forms a DNA-binding complex with ICN and
            RBP-Jkappa, and amplifies NOTCH-induced transcription of HES1.
