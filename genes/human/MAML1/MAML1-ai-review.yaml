      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        GO:0005515 protein binding does not describe a molecular function. The
        MAML1 membership in the Notch core activation complex described here is
        already captured by the accepted transcription coactivator activity and
        MAML1-RBP-Jkappa-ICN1 complex annotations.
      supported_by:
        - reference_id: PMID:23022380
          supporting_text: >-
            beyond the well-characterized core activation complex
            (ICN1-CSL-MAML1), NOTCH1 assembles a multifunctional complex
  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        MAML1 is a nuclear protein with an NLS that functions in DNA-bound Notch
        transcription complexes; nuclear localization is well supported.
      action: ACCEPT
      reason: >-
        Nuclear localization is robustly supported by direct experimental
        evidence (PMID:11101851) and is consistent with the core transcriptional
        coactivator function. The IEA term is appropriate, if broader than the
        nucleoplasm assignment.
      supported_by:
        - reference_id: PMID:11101851
          supporting_text: >-
            Here we clone MAML1, a human homologue of the Drosophila gene
            Mastermind, and show that it encodes a protein of 130 kD
            localizing to nuclear bodies.
  - term:
      id: GO:0010831
      label: positive regulation of myotube differentiation
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        MAML1 promotes myotube formation as a coactivator for MEF2C, an activity
        documented in mouse and transferred to human by ortholog inference.
      action: KEEP_AS_NON_CORE
      reason: >-
        Maml1-null fibroblasts fail MyoD-induced differentiation and MAML1
        overexpression enhances myotube formation, supporting positive
        regulation of myotube differentiation. This is a genuine Notch-
        independent (MEF2C) function but is peripheral to the core Notch
        coactivator role.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            overexpression of MAML1 in C2C12 cells dramatically enhanced myotube
            formation and increased the expression of muscle-specific genes,
            while RNA interference (RNAi)-mediated MAML1 knockdown abrogated
            differentiation.
  - term:
      id: GO:0045445
      label: myoblast differentiation
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        MAML1 is required for myogenic differentiation, documented in mouse and
        transferred to human by ortholog inference.
      action: KEEP_AS_NON_CORE
      reason: >-
        Maml1-null embryonic fibroblasts fail to undergo MyoD-induced myogenic
        differentiation, supporting a role in myoblast/muscle differentiation.
        This is a genuine but non-core (MEF2C-mediated, Notch-independent)
        process relative to the core Notch coactivator function.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            In vitro, Maml1-null embryonic fibroblasts failed to undergo
            MyoD-induced myogenic differentiation, further suggesting that Maml1
            is required for muscle development.
  - term:
      id: GO:0051149
      label: positive regulation of muscle cell differentiation
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        MAML1 positively regulates muscle cell differentiation via MEF2C
        coactivation, documented in mouse and transferred by ortholog inference.
      action: KEEP_AS_NON_CORE
      reason: >-
        MAML1 enhances muscle-specific gene expression and myotube formation and
        is required for myogenesis. This supports positive regulation of muscle
        cell differentiation, a genuine but non-core function relative to the
        core Notch coactivator role.
      supported_by:
        - reference_id: PMID:16510869
          supporting_text: >-
            overexpression of MAML1 in C2C12 cells dramatically enhanced myotube
            formation and increased the expression of muscle-specific genes
  - term:
      id: GO:0060928
      label: atrioventricular node cell development
    evidence_type: IEA
    original_reference_id: GO_REF:0000107
    review:
      summary: >-
        Cardiac/atrioventricular node development is attributed to MAML1 via
        Notch-pathway roles in the mouse ortholog and transferred to human by
        automated ortholog inference.
      action: KEEP_AS_NON_CORE
      reason: >-
        AV node development is a plausible developmental output of MAML-dependent
        Notch signaling, but direct attribution to human MAML1 is indirect
        (ortholog/pathway-based, with potential MAML paralog redundancy). Keep as
        a non-core developmental annotation rather than a core function.
      supported_by:
        - reference_id: file:human/MAML1/MAML1-deep-research-falcon.md
          supporting_text: >-
            Avoid over-broad human MAML1 developmental annotations unless
            supported by direct gene-specific experiments; dnMAML affects
            multiple MAML paralogs/pathway output.
  - term:
      id: GO:0005654
      label: nucleoplasm
    evidence_type: IDA
    original_reference_id: GO_REF:0000052
    review:
      summary: >-
        Direct immunofluorescence localization (Human Protein Atlas) places
        MAML1 in the nucleoplasm, consistent with its nuclear coactivator role.
      action: ACCEPT
      reason: >-
        Nucleoplasm is the supported subnuclear compartment for MAML1's
        DNA-bound transcriptional coactivator function, corroborated by direct
