- id: PMID:8218174
  title: NAD-dependent methylenetetrahydrofolate dehydrogenase-methenyltetrahydrofolate cyclohydrolase is the mammalian homolog of the mitochondrial enzyme encoded by the yeast MIS1 gene.
  findings:
  - statement: >-
      The recombinant human bifunctional enzyme is NAD-dependent and uniquely
      requires Mg2+ and inorganic phosphate, both of which affect NAD affinity;
      NADP can substitute with higher KM and lower Vmax.
    reference_section_type: ABSTRACT
    supporting_text: "unique in its absolute \nrequirement for Mg2+ and inorganic phosphate."
  - statement: >-
      The enzyme is the mammalian mitochondrial homolog (yeast MIS1) proposed to
      provide 10-formyl-THF for formylmethionyl-tRNA synthesis in mitochondria.
    reference_section_type: ABSTRACT
    supporting_text: "Its role is proposed to be in providing \nformyltetrahydrofolate for the synthesis of formylmethionyl transfer RNA"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false); PubMed-verified.
      Foundational biochemical characterization establishing NAD-dependent
      dehydrogenase, cyclohydrolase (by similarity), Mg2+/phosphate requirement,
      and mitochondrial role.
