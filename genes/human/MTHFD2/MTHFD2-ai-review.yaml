  title: Magnesium and phosphate ions enable NAD binding to methylenetetrahydrofolate dehydrogenase-methenyltetrahydrofolate cyclohydrolase.
  findings:
  - statement: >-
      MTHFD2 has an absolute requirement for inorganic phosphate and magnesium
      ions to support NAD-dependent dehydrogenase activity; Pi and Mg2+ adapt an
      NADP-type binding site for NAD binding.
    reference_section_type: ABSTRACT
    supporting_text: "It is unique in its absolute \nrequirement for inorganic phosphate and magnesium ions to support dehydrogenase \nactivity."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false); PubMed-verified. Directly
      supports the Mg2+ and phosphate binding annotations and the NAD-dependence of
      the dehydrogenase. Cited by UniProt for both catalytic activities.
