gene_symbol: MTHFD2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTHFD2 (NMDMC) is a bifunctional mitochondrial enzyme of mitochondrial
  one-carbon (folate) metabolism. It is synthesized as a 350-residue precursor
  with an N-terminal mitochondrial transit peptide and localizes to the
  mitochondrial matrix. A single polypeptide carries two catalytic activities:
  an NAD-dependent methylenetetrahydrofolate dehydrogenase (EC 1.5.1.15) that
  oxidizes (6R)-5,10-methylene-tetrahydrofolate to 5,10-methenyl-tetrahydrofolate,
  and a methenyltetrahydrofolate cyclohydrolase (EC 3.5.4.9) that hydrolyzes
  5,10-methenyl-tetrahydrofolate to 10-formyl-tetrahydrofolate. Together these
  interconvert one-carbon-loaded folates, channeling one-carbon units derived
  from mitochondrial serine and glycine catabolism toward formate export and
  downstream biosynthesis (purine synthesis and mitochondrial protein synthesis).
  Unlike the cytosolic NADP-dependent trifunctional enzyme MTHFD1, the
  dehydrogenase of MTHFD2 is NAD-specific and uniquely requires an
  enzyme-magnesium complex together with inorganic phosphate to bind its NAD
  cofactor; it can use NADP only at markedly reduced efficiency. The enzyme is a
  homodimer. MTHFD2 is expressed mainly in developing and proliferating tissues
  and is strongly re-expressed in many cancers, where it is an actively pursued
  metabolic drug target.
