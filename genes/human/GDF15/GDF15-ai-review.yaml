- term:
    id: GO:0002686
    label: negative regulation of leukocyte migration
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      UniProt describes GDF15 as required for tissue tolerance in response to myocardial infarction
      by acting as an inhibitor of leukocyte integrin activation (by similarity from mouse data).
      This is a secondary/non-core function related to immune modulation during tissue stress.
    action: KEEP_AS_NON_CORE
    reason: >-
      While GDF15 has been reported to inhibit leukocyte migration as part of its tissue tolerance
      function, this is not a core function. The evidence is from mouse studies (by similarity) and
      represents a downstream consequence of GDF15 signaling rather than a primary molecular
      activity.
    supported_by:
      - reference_id: PMID:28953886
        supporting_text: >-
          GDF15 levels increase in response to tissue stress and injury, and elevated levels are
          associated with body weight loss in numerous chronic human diseases.
