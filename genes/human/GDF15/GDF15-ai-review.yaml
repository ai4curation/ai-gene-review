- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      GDF15 forms a disulfide-linked homodimer, which is the active secreted form. This has been
