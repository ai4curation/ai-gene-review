      shotgun proteomics. This is from a high-throughput proteomic study.
    action: KEEP_AS_NON_CORE
    reason: >-
      Detection of GDF15 in exosomes from prostatic secretions by high-throughput proteomics
      (PMID:23533145) is plausible given that GDF15 is expressed in prostate. However, exosomal
      localization is not the primary functional localization (secreted into plasma).
    supported_by:
      - reference_id: PMID:23533145
        supporting_text: >-
          In-depth proteomic analyses of exosomes isolated from expressed prostatic secretions in
          urine.
