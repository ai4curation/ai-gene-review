- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
    - statement: GDF15 detected in exosomes from prostatic secretions by shotgun proteomics.
- id: PMID:25893289
  title: NAG-1/GDF15 accumulates in the nucleus and modulates transcriptional regulation
    of the Smad pathway.
  findings:
    - statement: Reports nuclear localization of pro-GDF15 and inhibition of Smad signaling.
    - statement: Based on overexpression studies; physiological relevance uncertain.
    - statement: TGF-beta contamination concerns have been raised about GDF15 Smad signaling studies.
- id: PMID:28327460
  title: Comprehensive proteomic characterization of stem cell-derived extracellular
    matrices.
  findings:
    - statement: GDF15 detected in ECM fractions by high-throughput proteomics.
- id: PMID:28572090
  title: GDF15 is a heart-derived hormone that regulates body growth.
  findings:
    - statement: GDF15 is a heart-derived hormone that inhibits GH signaling in hepatocytes.
    - statement: GDF15 is secreted into the bloodstream and acts as an endocrine hormone.
    - statement: Demonstrates role in regulating body growth via inhibition of GH-IGF1 axis.
- id: PMID:28846097
  title: GFRAL is the receptor for GDF15 and the ligand promotes weight loss in mice
    and nonhuman primates.
  findings:
    - statement: Identifies GFRAL as the receptor for GDF15.
    - statement: GDF15 binds GFRAL with high affinity; GFRAL expressed in area postrema and NTS.
    - statement: GFRAL knockout abolishes GDF15 effects on food intake and body weight.
    - statement: GDF15 signaling requires GFRAL-RET interaction.
- id: PMID:28846098
  title: The metabolic effects of GDF15 are mediated by the orphan receptor GFRAL.
  findings:
    - statement: GFRAL is a high-affinity receptor for GDF15.
    - statement: GFRAL-/- mice refractory to GDF15 effects on body weight and food intake.
    - statement: GFRAL mRNA highly expressed in area postrema.
- id: PMID:28846099
  title: GFRAL is the receptor for GDF15 and is required for the anti-obesity effects
    of the ligand.
  findings:
    - statement: GDF15 binds GFRAL with high affinity; requires RET co-receptor for signaling.
    - statement: GFRAL expression limited to hindbrain neurons; not in peripheral tissues.
    - statement: GDF15 effects on food intake abolished in GFRAL-knockout mice.
- id: PMID:28953886
  title: Non-homeostatic body weight regulation through a brainstem-restricted receptor
    for GDF15.
  findings:
    - statement: Identifies GFRAL as brainstem-restricted receptor for GDF15.
    - statement: GDF15 activates neurons in area postrema and nucleus tractus solitarius.
    - statement: Triggers activation of parabrachial nucleus and central amygdala neurons.
    - statement: Gfral-KO mice hyperphagic under stress, resistant to chemotherapy-induced anorexia.
- id: PMID:29046435
  title: 'Long-acting MIC-1/GDF15 molecules to treat obesity: Evidence from mice to
    monkeys.'
  findings:
    - statement: Recombinant GDF15 reduces food intake and body weight in mice, rats, and monkeys.
    - statement: GDF15 crystal structure determined; forms homodimer.
    - statement: GDF15 circulates as a 25 kDa dimer detectable in blood.
- id: PMID:31535977
  title: Cryo-EM analyses reveal the common mechanism and diversification in the activation
    of RET by different ligands.
  findings:
    - statement: Cryo-EM structures of GDF15/GFRAL/RET ternary complex resolved.
    - statement: Shows 2:2:2 ligand/co-receptor/RET architecture.
    - statement: GDF15/GFRAL induces specific RET dimerization for kinase cross-phosphorylation.
- id: PMID:31875646
  title: GDF15 mediates the effects of metformin on body weight and energy balance.
  findings:
    - statement: GDF15 mediates metformin's effects on body weight and appetite.
    - statement: Metformin increases circulating GDF15 levels.
    - statement: GDF15 is produced in kidney in response to metformin treatment.
- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
    - statement: Large-scale interactome mapping study; not specific to GDF15 function.
- id: PMID:32694673
  title: Metformin-induced increases in GDF15 are important for suppressing appetite
    and promoting weight loss.
  findings:
    - statement: Metformin increases GDF15 secretion from hepatocytes.
    - statement: GDF15 mediates metformin's appetite-suppressing effects.
- id: PMID:35177851
  title: Body weight regulation via MT1-MMP-mediated cleavage of GFRAL.
  findings:
    - statement: MT1-MMP cleaves GFRAL, regulating GDF15-GFRAL signaling.
    - statement: Provides mechanism for modulation of GDF15 signaling.
- id: PMID:38092039
  title: GDF15 linked to maternal risk of nausea and vomiting during pregnancy.
  findings:
    - statement: GDF15 from feto-placental unit causes pregnancy nausea/vomiting.
    - statement: Maternal sensitivity to GDF15 determined by pre-pregnancy exposure levels.
    - statement: GDF15 acts as a hormone on the brainstem.
    - statement: Women with beta-thalassemia (chronically high GDF15) report less pregnancy nausea.
- id: PMID:9326641
  title: MIC-1, a novel macrophage inhibitory cytokine, is a divergent member of the
    TGF-beta superfamily.
  findings:
    - statement: Original discovery of GDF15/MIC-1 as a TGF-beta superfamily cytokine.
    - statement: Secreted as a cysteine-rich dimeric protein of ~25 kDa.
    - statement: Inhibits LPS-induced macrophage TNF-alpha production.
- id: PMID:9348093
  title: Human cDNA encoding a novel TGF-beta superfamily protein highly expressed
    in placenta.
  findings:
    - statement: Independent cloning of GDF15 cDNA from human fibrosarcoma.
    - statement: Shows high expression in placenta.
    - statement: 308 amino acid protein with TGF-beta superfamily features.
core_functions:
- description: >-
    GDF15 is a secreted stress-responsive cytokine/hormone of the TGF-beta superfamily. It acts
    as a ligand for the GFRAL-RET receptor complex in brainstem neurons to suppress appetite,
    reduce food intake, and trigger aversive behaviors including nausea. GDF15 is produced in
    response to diverse stresses and acts endocrinally through the bloodstream. It is the key
    mediator of pregnancy-related nausea via feto-placental production (PMID:9326641,
    PMID:28953886, PMID:38092039).
  molecular_function:
    id: GO:0005125
    label: cytokine activity
  directly_involved_in:
