- term:
    id: GO:0062197
    label: cellular response to chemical stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      GDF15 expression is induced by various chemical stresses including drugs (metformin, cisplatin),
      metabolic stress, and dietary challenges (PMID:31875646, PMID:32694673). However, this term
      describes a response OF GDF15 to stress, meaning GDF15 is the product of the response, not
      the responder itself. GDF15 is induced by stress; the cell responds to stress by producing
      GDF15.
    action: KEEP_AS_NON_CORE
    reason: >-
      GDF15 is produced in response to chemical stress (PMID:31875646, PMID:32694673), so the gene
      product is involved in the cellular response to chemical stress. However, this is not the
      primary molecular function but rather a regulatory context annotation.
    supported_by:
      - reference_id: PMID:31875646
        supporting_text: >-
          Here we show-in two independent randomized controlled clinical trials-that metformin
          increases circulating levels of the peptide hormone growth/differentiation factor 15
          (GDF15), which has been shown to reduce food intake and lower body weight through a
          brain-stem-restricted receptor
      - reference_id: PMID:32694673
        supporting_text: >-
          metformin may increase the secretion of a hepatocyte-derived endocrine factor that
          communicates with the central nervous system
