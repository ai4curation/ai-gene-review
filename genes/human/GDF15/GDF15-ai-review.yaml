    action: REMOVE
    reason: >-
      Per curation guidelines, protein binding is uninformative. The specific interaction shown in
      PMID:28953886 is GDF15 binding to GFRAL, which is better captured by cytokine activity
      (GO:0005125) or the GDF15-GFRAL signaling pathway annotation (GO:0160144), both of which
      are already present.
    supported_by:
      - reference_id: PMID:28953886
        supporting_text: >-
          Here we identify glial cell-derived neurotrophic factor (GDNF) receptor alpha-like (GFRAL)
          as a brainstem-restricted receptor for growth and differentiation factor 15 (GDF15).
