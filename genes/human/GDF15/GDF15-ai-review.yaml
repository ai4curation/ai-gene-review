      overexpression of pro-GDF15 in cell lines and has not been reproduced in physiological
      contexts. The 2024 deep research review notes substantial concern that earlier reports of
      GDF15-mediated SMAD signaling may reflect TGF-beta contamination of recombinant preparations.
      This is not a core or well-established function of GDF15.
    supported_by:
