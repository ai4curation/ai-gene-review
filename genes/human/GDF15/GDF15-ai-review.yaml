- term:
    id: GO:0008083
    label: growth factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation comes from InterPro2GO mapping based on GDF15's TGF-beta domain. While GDF15
      is named a growth/differentiation factor, it does not function as a classical growth factor.
      It acts as a stress-responsive hormone/cytokine that suppresses appetite and modulates energy
      balance (PMID:28953886, PMID:38092039). The name is a historical misnomer.
    action: MODIFY
    reason: >-
      GDF15 is more accurately described as a cytokine or hormone rather than a growth factor.
      Its primary function is appetite suppression and stress signaling, not promoting cell growth
      or proliferation. The term cytokine activity (GO:0005125) or hormone activity (GO:0005179)
      are more accurate. This is an artifact of InterPro domain mapping from the TGF-beta family
      classification.
    proposed_replacement_terms:
      - id: GO:0005125
        label: cytokine activity
    supported_by:
      - reference_id: PMID:28953886
        supporting_text: >-
          GDF15 regulates food intake, energy expenditure and body weight in response to metabolic
          and toxin-induced stresses
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19060904
  review:
    summary: >-
      This annotation is from a high-throughput binary interactome mapping study (PMID:19060904).
      The term protein binding is uninformative per GO curation guidelines and should be replaced
      with a more specific term if the interaction partner is known.
    action: REMOVE
    reason: >-
      Per curation guidelines, protein binding (GO:0005515) is uninformative. PMID:19060904 is a
      high-throughput interactome mapping study that does not establish a specific functional binding
      activity for GDF15.
    supported_by:
      - reference_id: PMID:19060904
        supporting_text: >-
          An empirical framework for binary interactome mapping.
- term:
    id: GO:0005515
