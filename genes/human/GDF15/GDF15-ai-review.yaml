- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: TAS
  original_reference_id: PMID:9326641
  review:
    summary: >-
      PMID:9326641 establishes GDF15/MIC-1 as a signaling molecule. The term signal transduction
      is very broad but not incorrect.
    action: KEEP_AS_NON_CORE
    reason: >-
      Signal transduction is accurate but overly broad. The more specific GO:0160144 GDF15-GFRAL
      signaling pathway annotation is preferred for capturing the core signaling function. This
      TAS annotation from the discovery paper predates the identification of GFRAL.
    supported_by:
      - reference_id: PMID:9326641
        supporting_text: >-
          Purified recombinant MIC-1 is able to inhibit lipopolysaccharide -induced macrophage
          TNF-alpha production, suggesting that MIC-1 acts in macrophages as an autocrine
          regulatory molecule
- term:
    id: GO:0007179
    label: transforming growth factor beta receptor signaling pathway
  evidence_type: TAS
  original_reference_id: PMID:9348093
  review:
    summary: >-
      PMID:9348093 identified GDF15 as a TGF-beta superfamily member, leading to this TAS
      annotation. However, we now know GDF15 does NOT signal through TGF-beta receptors. It
      signals exclusively through GFRAL/RET. This annotation is incorrect based on current
      understanding.
    action: REMOVE
    reason: >-
      GDF15 does NOT signal through TGF-beta receptors despite being a TGF-beta superfamily member.
      Its sole established signaling receptor is GFRAL with RET as co-receptor (PMID:28846097,
      PMID:28846098, PMID:28846099, PMID:28953886). The TAS annotation from 1997 was made before
      the receptor was identified and is now known to be incorrect. Multiple 2024 reviews caution
      that TGF-beta receptor/SMAD signaling attributed to GDF15 may reflect TGF-beta contamination
      of recombinant preparations.
    supported_by:
      - reference_id: PMID:28846097
        supporting_text: >-
          we find that GDF15 binds with high affinity to GDNF family receptor alpha-like (GFRAL),
          a distant relative of receptors for a distinct class of the TGF-beta superfamily ligands.
      - reference_id: PMID:28846098
        supporting_text: >-
          GFRAL binds to GDF15 in vitro and is required for the metabolic actions of GDF15
- term:
    id: GO:0007267
    label: cell-cell signaling
  evidence_type: TAS
  original_reference_id: PMID:9326641
  review:
    summary: >-
      PMID:9326641 shows GDF15/MIC-1 is a secreted cytokine that acts as a signaling molecule
      between cells. Cell-cell signaling is accurate but very broad.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cell-cell signaling is accurate but overly general. GDF15 does mediate intercellular
      communication, but the more specific pathway annotations (GO:0160144, GO:0032099) are more
      informative.
    supported_by:
