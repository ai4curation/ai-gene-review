- term:
    id: GO:0040015
    label: negative regulation of multicellular organism growth
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      PMID:28572090 shows that GDF15 from the heart inhibits growth hormone signaling on
      hepatocytes, thereby regulating body growth. This is a real but secondary function,
      demonstrated primarily in the context of pediatric heart disease.
    action: KEEP_AS_NON_CORE
    reason: >-
      GDF15 does inhibit body growth via suppression of GH signaling in hepatocytes (PMID:28572090),
      but this is not its primary core function. The primary function is stress-responsive appetite
      regulation via GFRAL/RET.
    supported_by:
      - reference_id: PMID:28572090
        supporting_text: >-
