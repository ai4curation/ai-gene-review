          GDF15/GFRAL/RET
- term:
    id: GO:0043410
    label: positive regulation of MAPK cascade
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      GDF15 activates GFRAL/RET signaling which includes downstream ERK (MAPK) activation
      (PMID:28846097, PMID:28953886). This is a downstream consequence of the core GFRAL-RET
      signaling pathway.
    action: KEEP_AS_NON_CORE
    reason: >-
      While GDF15 does activate ERK/MAPK signaling downstream of GFRAL/RET, this is a downstream
      signaling event rather than a direct molecular function of GDF15 itself. The GDF15-GFRAL
      pathway annotation (GO:0160144) is more specific and appropriate.
    supported_by:
      - reference_id: PMID:28846097
        supporting_text: >-
          we demonstrate that GDF15-induced cell signaling requires the interaction of GFRAL with
          the coreceptor RET.
