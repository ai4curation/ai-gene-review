id: Q99988
gene_symbol: GDF15
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GDF15 (Growth/differentiation factor 15) is a secreted, stress-inducible hormone of the TGF-beta
  superfamily (also known as MIC-1, NAG-1, PLAB, PDF). It is synthesized as a 308-amino acid precursor
  that is proteolytically processed by furin-like proteases and secreted as a disulfide-linked
  homodimeric mature peptide (~25 kDa). GDF15 acts as an endocrine signal by binding to its cognate
  receptor GFRAL in the area postrema and nucleus tractus solitarius of the brainstem, with RET as an
  essential co-receptor, forming a 2:2:2 ternary complex. This activates downstream ERK, AKT, and
  PLC/PKC signaling pathways to trigger an aversive response characterized by nausea, appetite
  suppression, and avoidance behavior. GDF15 is produced in response to diverse stresses including
  metabolic stress, inflammation, toxins, drugs (metformin, cisplatin), and exercise. It is highly
  expressed in placenta and is the key mediator of pregnancy-related nausea and vomiting, including
  hyperemesis gravidarum. Notably, GDF15 does NOT signal through canonical TGF-beta/SMAD pathways
  despite its superfamily membership; GFRAL is its sole established signaling receptor.
existing_annotations:
- term:
    id: GO:0005125
    label: cytokine activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GDF15 was originally identified as macrophage inhibitory cytokine 1 (MIC-1) and is classified
      as a divergent member of the TGF-beta superfamily of cytokines (PMID:9326641). It functions
      as a secreted signaling molecule acting on distant target cells. The IBA annotation of cytokine
      activity is phylogenetically well-supported and consistent with the literature.
    action: ACCEPT
    reason: >-
      GDF15 is a bona fide cytokine/hormone that signals through the GFRAL-RET receptor complex.
      The term cytokine activity is appropriate as GDF15 acts as a secreted signaling molecule
      affecting target cell behavior (PMID:9326641, PMID:28953886).
    supported_by:
      - reference_id: PMID:9326641
        supporting_text: >-
          MIC-1, a novel macrophage inhibitory cytokine, is a divergent member of the TGF-beta
          superfamily.
      - reference_id: PMID:28953886
        supporting_text: >-
          GDF15 regulates food intake, energy expenditure and body weight in response to metabolic
          and toxin-induced stresses
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GDF15 is a secreted protein detected in plasma and extracellular space (PMID:28572090,
      PMID:29046435). This term is now obsolete in GO and should be replaced with GO:0005576
      extracellular region or a more specific child term.
    action: MODIFY
    reason: >-
      GO:0005615 is obsolete. GDF15 is a secreted protein found in the extracellular space and
      plasma. The annotation should use the current term GO:0005576 extracellular region.
    proposed_replacement_terms:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: PMID:28572090
        supporting_text: >-
          we identify growth differentiation factor 15 (GDF15) as a heart-derived hormone that
          regulates body growth
      - reference_id: PMID:29046435
        supporting_text: >-
          Circulating macrophage inhibitory cytokine 1 (MIC-1)/growth differentiation factor 15
          (GDF15) concentrations were increased in obese mice, rats, and humans
- term:
    id: GO:0007178
    label: cell surface receptor protein serine/threonine kinase signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      This annotation implies GDF15 participates in serine/threonine kinase receptor signaling,
      which is the canonical TGF-beta/SMAD pathway. However, GDF15 does NOT signal through
      classical TGF-beta serine/threonine kinase receptors. Instead, it signals through GFRAL/RET,
      where RET is a receptor tyrosine kinase (PMID:28846097, PMID:28846098, PMID:28846099,
      PMID:28953886). Multiple 2024 reviews caution that earlier reports of GDF15-mediated SMAD
      signaling may reflect TGF-beta contamination of recombinant preparations.
    action: REMOVE
    reason: >-
      GDF15 does not signal through serine/threonine kinase receptors. Its sole established
      signaling receptor is GFRAL with RET (a tyrosine kinase) as co-receptor. The IBA annotation
      likely reflects the broader TGF-beta family placement but is functionally incorrect for GDF15
      specifically (PMID:28846097, PMID:28846098, PMID:28846099, PMID:28953886).
    supported_by:
      - reference_id: PMID:28846097
        supporting_text: >-
          we find that GDF15 binds with high affinity to GDNF family receptor alpha-like (GFRAL),
          a distant relative of receptors for a distinct class of the TGF-beta superfamily ligands.
      - reference_id: PMID:28953886
        supporting_text: >-
          Here we identify glial cell-derived neurotrophic factor (GDNF) receptor alpha-like (GFRAL)
          as a brainstem-restricted receptor for growth and differentiation factor 15 (GDF15).
- term:
    id: GO:0002023
    label: reduction of food intake in response to dietary excess
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GDF15 suppresses food intake through GFRAL-expressing neurons in the brainstem. Multiple
      landmark studies demonstrate this function (PMID:28846097, PMID:28846098, PMID:28846099,
      PMID:28953886, PMID:29046435). This is a core function of GDF15.
    action: ACCEPT
    reason: >-
      Reduction of food intake is one of the primary established functions of GDF15. The IBA
      annotation is well-supported by extensive experimental evidence across multiple independent
      groups (PMID:28846097, PMID:28846098, PMID:28846099, PMID:28953886).
    supported_by:
      - reference_id: PMID:28846099
        supporting_text: >-
          GDF15-mediated reductions in food intake and body weight of mice with obesity were
          abolished in GFRAL-knockout mice.
      - reference_id: PMID:28846097
        supporting_text: >-
          Gfral is expressed in neurons of the area postrema and nucleus of the solitary tract in
          mice and humans, and genetic deletion of the receptor abrogates the ability of GDF15 to
          decrease food intake and body weight in mice
- term:
    id: GO:0032099
    label: negative regulation of appetite
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GDF15 acts via GFRAL/RET in the brainstem to suppress appetite. This is a core biological
      function confirmed by multiple studies (PMID:28846097, PMID:28846098, PMID:28846099,
      PMID:28953886, PMID:38092039).
    action: ACCEPT
    reason: >-
      Negative regulation of appetite is a primary, well-established function of GDF15, supported
      by extensive literature including GFRAL knockout studies (PMID:28846097, PMID:28846099,
      PMID:28953886).
    supported_by:
      - reference_id: PMID:28953886
        supporting_text: >-
          Gfral knockout mice are hyperphagic under stressed conditions and are resistant to
          chemotherapy-induced anorexia and body weight loss.
      - reference_id: PMID:38092039
        supporting_text: >-
          GDF15, a hormone acting on the brainstem, has been implicated in the nausea and vomiting
          of pregnancy
- term:
    id: GO:0160144
    label: GDF15-GFRAL signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The GDF15-GFRAL signaling pathway is the canonical and only well-established signaling
      pathway for GDF15. Four independent papers in 2017 established GFRAL as the receptor
      (PMID:28846097, PMID:28846098, PMID:28846099, PMID:28953886). Cryo-EM structures confirmed
      the 2:2:2 ternary complex with RET (PMID:31535977).
    action: ACCEPT
    reason: >-
      This is the most specific and accurate pathway annotation for GDF15. It represents the core
      signaling mechanism of GDF15 (PMID:28846097, PMID:28846098, PMID:28846099, PMID:28953886,
      PMID:31535977).
    supported_by:
      - reference_id: PMID:28953886
        supporting_text: >-
          Here we identify glial cell-derived neurotrophic factor (GDNF) receptor alpha-like (GFRAL)
          as a brainstem-restricted receptor for growth and differentiation factor 15 (GDF15).
      - reference_id: PMID:31535977
        supporting_text: >-
          we report cryo-EM structures of the extracellular region ternary complexes of
          GDF15/GFRAL/RET, GDNF/GFRalpha1/RET, NRTN/GFRalpha2/RET and ARTN/GFRalpha3/RET.
