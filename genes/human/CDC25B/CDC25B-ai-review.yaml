        inhibitory Thr14 and Tyr15 residues.
      action: ACCEPT
      reason: >-
        This IEA annotation from UniProt keyword mapping is correct. CDC25B is
        classified as EC 3.1.3.48, a protein-tyrosine-phosphatase, and its function
