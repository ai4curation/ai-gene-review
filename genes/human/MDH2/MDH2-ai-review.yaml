core_functions:
- description: >-
    Mitochondrial NAD-dependent L-malate dehydrogenase that catalyzes the
    reversible oxidation of L-malate to oxaloacetate (EC 1.1.1.37) in the
    mitochondrial matrix, completing the final step of the tricarboxylic acid
    cycle.
  molecular_function:
    id: GO:0030060
    label: L-malate dehydrogenase (NAD+) activity
  directly_involved_in:
  - id: GO:0006099
    label: tricarboxylic acid cycle
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:27989324
    supporting_text: >-
      MDH2 encodes mitochondrial malate dehydrogenase (MDH), which is essential
      for the conversion of malate to oxaloacetate as part of the proper
      functioning of the Krebs cycle.
  - reference_id: file:human/MDH2/MDH2-uniprot.txt
    supporting_text: >-
      Reaction=(S)-malate + NAD(+) = oxaloacetate + NADH + H(+);
- description: >-
    Mitochondrial arm of the malate-aspartate shuttle: MDH2 reoxidizes malate to
    oxaloacetate within the matrix, transferring reducing equivalents delivered
    from the cytosol and helping maintain the cytosolic/mitochondrial NAD+/NADH
    redox balance.
  molecular_function:
    id: GO:0030060
    label: L-malate dehydrogenase (NAD+) activity
  directly_involved_in:
  - id: GO:0043490
    label: malate-aspartate shuttle
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:27989324
    supporting_text: >-
      MDH2 plays an essential role in the malate-aspartate NADH shuttle, which
      is the main pathway whereby reducing equivalents from cytosolic NADH are
      transferred to mitochondria.
  - reference_id: PMID:37647199
    supporting_text: >-
      The malate-aspartate shuttle (MAS) is a redox shuttle that transports
      reducing equivalents across the inner mitochondrial membrane while
      recycling cytosolic NADH to NAD+.
