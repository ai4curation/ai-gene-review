- id: PMID:27989324
  title: Mutations in MDH2, Encoding a Krebs Cycle Enzyme, Cause Early-Onset Severe
    Encephalopathy.
  findings:
  - statement: >-
      Bi-allelic loss-of-function MDH2 variants cause early-onset severe
      encephalopathy (DEE51); patient fibroblasts show near-null MDH enzymatic
      activity, rescued by wild-type MDH2 cDNA, with accumulation of malate and
      fumarate.
    reference_section_type: RESULTS
  - statement: >-
      MDH2 is essential for converting malate to oxaloacetate in the Krebs cycle
      and plays an essential role in the malate-aspartate NADH shuttle.
    reference_section_type: DISCUSSION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; primary disease/functional paper. Directly
      establishes MDH2's NAD-dependent malate dehydrogenase activity, its TCA
      and malate-aspartate-shuttle roles, and support for aerobic respiration.
