id: P40926
gene_symbol: MDH2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MDH2 encodes the mitochondrial (NAD-dependent) malate dehydrogenase, an
  enzyme of the tricarboxylic acid (TCA/Krebs) cycle. It catalyzes the
  reversible oxidation of L-malate to oxaloacetate with reduction of NAD+ to
  NADH (EC 1.1.1.37). The protein is synthesized as a cytosolic precursor with
  an N-terminal transit peptide and is imported into the mitochondrial matrix,
  where it assembles into a catalytically active homodimer. Beyond completing
  the final oxidative step of the TCA cycle, MDH2 forms the mitochondrial arm of
  the malate-aspartate shuttle, which transfers reducing equivalents from
  cytosolic NADH into mitochondria and helps maintain the cellular NAD+/NADH
  redox balance across compartments. Its activity is modulated by
  post-translational modifications including lysine acetylation and cysteine
  palmitoylation. The enzyme has also been reported to bind RNA, predominantly
  cytosolic transcripts (including tRNAs and mRNAs), a moonlighting activity of
  as-yet-undefined physiological significance. Bi-allelic loss-of-function
  variants in MDH2 cause an autosomal recessive early-onset epileptic
  encephalopathy (DEE51), and MDH2 is a pheochromocytoma/paraganglioma
  susceptibility gene.
