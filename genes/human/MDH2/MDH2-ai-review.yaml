- id: PMID:37647199
  title: The malate-aspartate shuttle is important for de novo serine biosynthesis.
  findings:
  - statement: >-
      Genetic disruption of each malate-aspartate shuttle component (including
      MDH2) in HEK293 cells demonstrates the shuttle's role in recycling
      cytosolic NADH to NAD+ and supporting de novo serine biosynthesis.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Provides IMP evidence for MDH2 involvement in the
      malate-aspartate shuttle (MDH2 is one of the disrupted MAS components).
- id: PMID:38609156
  title: Cytosolic RNA binding of the mitochondrial TCA cycle enzyme malate dehydrogenase.
  findings:
  - statement: >-
      MDH2 binds RNA in cells (validated by PNK, 2C, eCLIP and EMSA),
      preferentially cytosolic tRNAs and mRNAs, via its NAD+-binding Rossmann
      fold; mitochondrial targeting is dispensable and RNA binding increases
      upon NAD+ depletion.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available. Establishes the moonlighting RNA-binding activity
      (kept as non-core) and confirms mitochondrial-matrix localization of the
      metabolic enzyme.
- id: PMID:6576816
  title: Studies on mitochondrial and cytoplasmic malate dehydrogenase in childhood
    myelodysplastic syndrome.
  findings:
  - statement: >-
      Polymorphonuclear cells with monosomy 7 (the MDH2 locus) show reduced
      mitochondrial malate dehydrogenase activity, consistent with a gene-dosage
      effect, whereas cytoplasmic (chromosome 2) malate dehydrogenase is normal.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Old (1983) case study; provides IMP/dosage support
      linking the chromosome-7 MDH2 locus to mitochondrial malate dehydrogenase
      activity and malate metabolism.
