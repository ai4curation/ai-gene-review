core_functions:
- description: As an essential, non-catalytic structural subunit and protein-interaction
    hub of the multiprotein Fanconi anemia (FA) core complex, FANCA acts as a scaffold/adaptor
    that binds FANCG and FANCF and directly anchors FAAP20, promoting assembly, stability,
    nuclear accumulation and chromatin loading of the core complex so that it can monoubiquitinate
    the FANCD2-FANCI complex during replication-coupled repair of DNA interstrand crosslinks.
