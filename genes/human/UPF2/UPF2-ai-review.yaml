id: Q9HAU5
gene_symbol: UPF2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: UPF2 (regulator of nonsense transcripts 2; RENT2) is a core adaptor of the nonsense-mediated
  mRNA decay (NMD) pathway. Built around tandem MIF4G domains with a C-terminal UPF1-binding
  region, UPF2 bridges UPF1 (bound to the release factors eRF1/eRF3 at a terminating ribosome)
  to UPF3B and the exon-junction complex, nucleating the UPF1-UPF2-UPF3 surveillance complex
  that activates NMD. Binding of UPF2 (together with UPF3B) relieves UPF1 autoinhibition and
  stimulates its ATPase and RNA helicase activities, committing premature-termination-codon
  and certain long-3'UTR transcripts to decay. UPF2 acts mainly at the cytoplasmic/perinuclear
  face of the nuclear envelope and in the cytoplasm, binds spliced mRNA, and has additional
  reported associations (e.g. telomere/TERRA, mRNA export) peripheral to its core NMD adaptor
  role.
