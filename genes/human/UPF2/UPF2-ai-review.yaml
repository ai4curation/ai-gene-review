core_functions:
- description: NMD adaptor that bridges UPF1 (at the terminating ribosome, with eRF1/eRF3) to
    UPF3B and the exon-junction complex, nucleating the UPF1-UPF2-UPF3 surveillance complex.
  molecular_function:
    id: GO:0035145
    label: exon-exon junction complex
  locations:
  - id: GO:0048471
    label: perinuclear region of cytoplasm
  supported_by:
  - reference_id: file:human/UPF2/UPF2-uniprot.txt
    supporting_text: Recruited by UPF3B associated with the EJC core
  - reference_id: file:human/UPF2/UPF2-uniprot.txt
    supporting_text: Involved in nonsense-mediated decay (NMD)
- description: 'Activator of UPF1 in NMD: UPF2 (with UPF3B) relieves UPF1 autoinhibition and
    stimulates its ATPase and RNA helicase activities, driving decay of target mRNAs.'
  molecular_function:
    id: GO:0035145
    label: exon-exon junction complex
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/UPF2/UPF2-uniprot.txt
    supporting_text: stimulates both ATPase and RNA helicase
  - reference_id: file:human/UPF2/UPF2-goa.tsv
    supporting_text: GO:0000184
proposed_new_terms: []
suggested_questions:
- question: How is the competitive binding of UPF3A versus UPF3B to UPF2 regulated, and how
    does it tune NMD efficiency on different transcripts?
- question: Which UPF2-dependent NMD branches require the EJC versus operating in EJC-independent
    NMD?
suggested_experiments:
- description: Domain-resolved UPF2 mutants (MIF4G vs UPF1-binding vs UPF3-binding) with transcriptome-wide
    NMD-target profiling to separate bridging from UPF1-activation functions.
- description: In vitro reconstitution measuring UPF2/UPF3B stimulation of UPF1 ATPase/helicase
    activity on EJC-containing substrates to quantify the activation step.
