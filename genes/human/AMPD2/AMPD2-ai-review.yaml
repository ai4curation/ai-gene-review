proposed_new_terms: []
suggested_questions:
- question: >-
    Do the four AMPD2 splice isoforms (differing mainly in N-terminal extension) differ in
    catalytic regulation, subcellular targeting, or tissue distribution?
- question: >-
    In post-mitotic neurons, where de novo purine synthesis is low, what is the precise
    mechanism by which AMPD2 loss depletes GTP and impairs translation initiation?
suggested_experiments:
- description: >-
    Isoform-resolved enzyme kinetics and allosteric regulation (by ATP, GTP, phosphate) of the
    four AMPD2 splice variants expressed and purified in parallel.
- description: >-
    Metabolic-flux (labeled-adenosine) analysis in AMPD2-null vs rescued human neurons to map
    how the AMP->IMP block redistributes purine flux toward or away from the guanine branch.
