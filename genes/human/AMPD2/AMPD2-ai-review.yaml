- term:
    id: GO:0032263
    label: GMP salvage
  evidence_type: IDA
  original_reference_id: PMID:29079593
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      MGI IDA to GMP salvage citing a red-blood-cell purine-metabolism study. That study
      centers on the erythrocyte AMPD isoform (AMPD3) and the RBC purine salvage/deamination
      network; it does not establish AMPD2 specifically in GMP salvage, and mechanistically
      AMP deaminase produces IMP (not GMP).
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The term is a poor fit for AMP deaminase (which acts on AMP->IMP, upstream of, but not
      within, GMP salvage), and the cited paper foregrounds the erythrocyte AMPD3 isoform and
      the salvage network generally. Per curation policy this experimental annotation is not
      removed; the loose acts_upstream_of_or_within qualifier is retained but marked as an
      over-annotation for AMPD2.
    supported_by:
    - reference_id: PMID:29079593
      supporting_text: enhanced purine salvage reactions in human and mouse red blood cells
