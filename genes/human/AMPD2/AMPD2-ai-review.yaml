  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Core molecular function of AMPD2: hydrolytic deamination of AMP to IMP + ammonia.
      This phylogenetically-inferred MF is the well-established, experimentally supported
      activity of the enzyme and represents the core function of the gene.
    action: ACCEPT
    reason: >-
      AMP deaminase activity is the defining function of AMPD2, confirmed biochemically
      (patient-cell AMP deaminase assays) and by yeast complementation, and captured by
      UniProt catalytic activity (EC 3.5.4.6). The IBA is at the correct level of specificity.
    supported_by:
