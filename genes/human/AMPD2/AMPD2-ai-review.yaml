id: Q01433
gene_symbol: AMPD2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AMPD2 is the liver-type ("L") isoform of AMP deaminase, one of three mammalian
  AMP deaminase paralogs (with muscle-type AMPD1 and erythrocyte-type AMPD3).
  It is broadly expressed, including in brain and neurons, and is highly expressed
  in cerebellum. AMPD2 is a cytosolic, zinc-dependent metalloenzyme (binds one Zn2+
  per subunit; assembles as a homotetramer) that catalyzes the hydrolytic deamination
  of AMP to IMP plus ammonia (AMP + H2O + H+ = IMP + NH4+; EC 3.5.4.6). This reaction
  is the committed entry step of the purine nucleotide cycle and a key point of AMP
  catabolism, so AMPD2 helps set the cellular adenylate energy charge (AMP/ADP/ATP
  ratio) and shapes adenine and guanine nucleotide pools. By lowering AMP/adenosine-
  derived nucleotides, AMPD2 relieves feedback inhibition of de novo purine synthesis
  and thereby sustains the guanine nucleotide (GTP) pool; this is especially important
  in neurons and neural progenitors, where GTP is required for translation initiation.
  Loss-of-function mutations cause severe recessive neurodevelopmental/neurodegenerative
  disease, including pontocerebellar hypoplasia type 9 (PCH9) and a form of hereditary
  spastic paraplegia (SPG63); the cellular defect can be partially rescued by purine
  precursor supplementation.
