id: P08236
gene_symbol: GUSB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GUSB encodes beta-glucuronidase (EC 3.2.1.31), a lysosomal exoglycosidase of glycoside
  hydrolase family 2 (GH2). It catalyses the hydrolysis of terminal, non-reducing
  beta-D-glucuronic acid residues from glycosaminoglycans, acting in the stepwise exolytic
  lysosomal degradation of heparan sulfate, dermatan sulfate, chondroitin sulfate and
  hyaluronan (reaction: a beta-D-glucuronoside + H2O = D-glucuronate + an alcohol). The
  active enzyme is a homotetramer that localises to the lysosomal lumen and is a
  mannose-6-phosphate-tagged, receptor-trafficked lysosomal hydrolase; it is also detectable
  extracellularly (secretion, neutrophil granule exocytosis) and in exosomes. Inherited
  deficiency of beta-glucuronidase causes mucopolysaccharidosis type VII (Sly syndrome), an
  autosomal recessive lysosomal storage disorder with tissue accumulation of undegraded
  glycosaminoglycans and a clinical spectrum ranging from lethal hydrops fetalis to milder
  adult-onset forms.
