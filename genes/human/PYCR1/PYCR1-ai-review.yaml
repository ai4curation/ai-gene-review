  label: Homo sapiens
description: >-
  PYCR1 (pyrroline-5-carboxylate reductase 1) is a mitochondrial NAD(P)H-dependent
  oxidoreductase (EC 1.5.1.2) that catalyzes the final, committed step of proline
  biosynthesis: the reduction of (S)-1-pyrroline-5-carboxylate (P5C) to L-proline.
  P5C is the common intermediate produced from glutamate (via P5C synthase) or from
  ornithine (via ornithine aminotransferase); PYCR1 acts primarily on the glutamate
  route. The enzyme is a homodecamer assembled as five homodimers, with each subunit
  built from an N-terminal Rossmann-fold dinucleotide-binding domain and a C-terminal
  dimerization domain. At physiological substrate and cofactor concentrations it has
  higher activity with NADH than NADPH, and it is competitively inhibited by its
  product proline. Beyond supplying proline for protein synthesis and collagen,
  PYCR1 participates in the proline/P5C redox cycle that shuttles reducing equivalents
  between mitochondria and cytosol, linking it to redox homeostasis and the cellular
  response to oxidative stress. Loss-of-function variants in PYCR1 cause autosomal
  recessive cutis laxa type 2B and 3B (progeroid/De Barsy-like phenotypes), with
  altered mitochondrial morphology and membrane potential and increased apoptosis
  under oxidative stress. PYCR1 is frequently overexpressed in cancers, where
  proline biosynthesis supports tumor growth.
