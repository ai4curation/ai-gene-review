core_functions:
- description: >-
    Catalyzes the terminal step of L-proline biosynthesis: the NAD(P)H-dependent
    reduction of (S)-1-pyrroline-5-carboxylate (P5C) to L-proline, acting mainly on
    P5C derived from glutamate. Functions as a mitochondrial homodecamer with higher
    activity toward NADH than NADPH at physiological concentrations and is competitively
    inhibited by product proline.
