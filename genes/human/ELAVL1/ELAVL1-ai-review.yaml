core_functions:
  -
    description: "Binds U-rich and AU-rich elements in target mRNA 3-prime UTRs through tandem RNA-recognition motifs and commonly protects the bound transcripts from decay during regulated nuclear-to-cytoplasmic trafficking."
    supported_by:
      -
        reference_id: "PMID:8626503"
        supporting_text: "The purified recombinant protein binds avidly to the AU-rich element in c-fos and interleukin-3 mRNAs."
        reference_section_type: "ABSTRACT"
        full_text_unavailable: true
      -
        reference_id: "PMID:14517288"
        supporting_text: "HuR stabilized an ARE(uPA)-containing RNA substrate in vitro"
        reference_section_type: "ABSTRACT"
        full_text_unavailable: true
      -
        reference_id: "PMID:23519412"
        supporting_text: "RRM1 is the primary ARE-binding domain in HuR"
        reference_section_type: "ABSTRACT"
        full_text_unavailable: true
    molecular_function:
      id: "GO:0035925"
      label: "mRNA 3'-UTR AU-rich region binding"
    directly_involved_in:
      -
        id: "GO:0070935"
        label: "3'-UTR-mediated mRNA stabilization"
