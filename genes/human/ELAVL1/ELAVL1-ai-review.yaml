knowledge_gaps:
  -
    gap_statement: "The sequence and structural rules that determine whether a HuR-bound transcript is stabilized, destabilized, or translationally regulated remain incompletely resolved."
    boundary: "AU-rich and U-rich recognition is well established, but target outcome varies with RNA context, competing RNA-binding proteins, miRNAs, and HuR post-translational state."
    gap_kind:
      - "BIOLOGY"
    dark_aspect: "MF_DARK"
    status: "OPEN"
    significance: "Resolving outcome determinants is necessary to predict functional consequences from HuR occupancy rather than treating all binding events as stabilizing."
    resolution: "Combine purified-protein binding and structure-probing with matched time-resolved RNA half-life, ribosome-profiling, and partner-perturbation assays across engineered 3-prime-UTR sequence libraries."
    provenance:
      -
        reference_id: "file:human/ELAVL1/ELAVL1-deep-research-manual.md"
        supporting_text: "Which RNA sequence/structure features, beyond U-richness, determine whether HuR stabilizes, destabilizes, or changes translation of a target?"
  -
    gap_statement: "The reported double-stranded-RNA-binding activity cannot be verified from the locally available article body."
    boundary: "PMID:21266579 is available in full text but does not name ELAVL1/HuR in searchable article text; the assay may be present only in supplementary proteomic data."
    gap_kind:
      - "CURATION"
    dark_aspect: "MF_DARK"
    status: "OPEN"
    significance: "Verification is needed to decide whether double-stranded RNA binding is a genuine additional activity or a proteomic association artifact."
    resolution: "Recover and inspect the original supplementary tables and assay details, then repeat binding with purified ELAVL1 and defined double-stranded versus single-stranded RNA controls."
    provenance:
      -
        reference_id: "file:human/ELAVL1/ELAVL1-deep-research-manual.md"
        supporting_text: "The double-stranded-RNA-binding annotation remains unresolved because the available full text of its cited paper does not expose the ELAVL1-specific assay."
suggested_questions:
  -
    question: "What RNA-sequence, structure, modification, and partner combinations switch HuR from stabilization to destabilization or translational control?"
  -
    question: "Which protein partners are directly recruited by HuR as an adaptor rather than co-recovered through a shared RNA?"
  -
    question: "Does isoform 2 differ from canonical HuR in target selection, oligomerization, localization, or stimulus-dependent shuttling?"
  -
    question: "What experiment underlies the PMID:21266579 double-stranded-RNA-binding annotation?"
suggested_experiments:
  -
    hypothesis: "Local RNA sequence and structure together with defined protein competitors determine whether HuR occupancy stabilizes or destabilizes a transcript."
    description: "Use a barcoded 3-prime-UTR library spanning AU/U-rich sequence, structure, and spacing variants in ELAVL1-null cells rescued with wild-type or RRM mutants; measure binding, RNA half-life, and translation with and without KSRP, TTP, AGO2, and YBX1 perturbation."
    experiment_type: "Massively parallel RNA-binding and transcript-fate assay"
  -
    hypothesis: "HuR protein-RNA adaptor activity depends on direct partner contacts that can be separated from RNA-mediated co-complex recovery."
    description: "Map HuR interactors by crosslinking mass spectrometry and affinity purification with matched RNase conditions, then test separation-of-function interface mutants for partner recruitment, target stabilization, and miRNA antagonism."
    experiment_type: "Interaction-interface mapping and functional complementation"
  -
    hypothesis: "ELAVL1 isoform 2 has altered RNP assembly or nucleocytoplasmic trafficking."
    description: "Generate isoform-specific knock-in tags and matched rescue constructs, then compare RNA targets, partner proteomes, oligomerization, and live-cell trafficking under basal, oxidative-stress, and kinase-activation conditions."
    experiment_type: "Isoform-resolved RNP profiling and live-cell localization"
