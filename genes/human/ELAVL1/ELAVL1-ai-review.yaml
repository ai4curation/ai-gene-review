  label: "Homo sapiens"
description: "ELAVL1 encodes HuR, a ubiquitous ELAV-family RNA-binding protein with three RNA recognition motifs. HuR binds preferentially to U-rich and AU-rich elements in mRNA 3-prime untranslated regions, assembles regulatory messenger ribonucleoproteins, and commonly stabilizes bound transcripts or promotes their translation. The protein shuttles between nucleus and cytoplasm; stimulus-dependent phosphorylation and partner interactions regulate this trafficking and thereby tune post-transcriptional expression of stress-response, inflammatory, proliferative, and differentiation genes. HuR can also oppose miRNA-mediated repression at selected targets, while its many organismal phenotypes reflect the identities of the transcripts regulated in each cell context."
