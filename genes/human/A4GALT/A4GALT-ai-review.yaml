  label: Homo sapiens
description: >-
  A4GALT (lactosylceramide 4-alpha-galactosyltransferase; Gb3/CD77 synthase;
  alpha-1,4-galactosyltransferase, Alpha4Gal-T1; EC 2.4.1.228) is a Golgi
  apparatus membrane enzyme of glycosyltransferase family 32 that initiates the
  globo-series branch of glycosphingolipid biosynthesis. It transfers galactose
  from UDP-alpha-D-galactose, in an alpha-1,4 linkage, onto the terminal
  beta-galactose of lactosylceramide (LacCer) to produce globotriaosylceramide
  (Gb3Cer), also known as CD77 or the P(k) antigen, releasing UDP. Gb3Cer is the
  root structure of the neutral globo-series glycosphingolipids and the basis of
  the P1PK histo-blood group system; it is the precursor of globoside (Gb4Cer)
  and the cell-surface receptor exploited by Shiga toxins (verotoxins). The
  enzyme is a single-pass type II membrane protein with a short N-terminal
  cytoplasmic tail, a transmembrane signal-anchor, and a lumenal catalytic domain
  bearing a conserved DXD motif required for activity. Beyond the canonical
  LacCer acceptor it can also galactosylate galactosylceramide and, depending on
  the residue at position 211, extend its acceptor range to build the P1 and NOR
  blood-group glycotopes. Loss-of-function variants cause the rare p (null) blood
  group phenotype, and the Q211E variant causes NOR polyagglutination syndrome.
