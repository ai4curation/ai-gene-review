- id: PMID:10747952
  title: 'Cloning and expression of the histo-blood group Pk UDP-galactose: Ga1beta-4G1cbeta1-cer
    alpha1, 4-galactosyltransferase. Molecular genetic basis of the p phenotype.'
  findings:
  - statement: >-
      Expression of A4GALT (alpha4Gal-T1) coding constructs in insect cells
      demonstrated P(k) (Gb3) synthase activity, establishing A4GALT as the P(k)
      synthase; the loss-of-function M183K mutation defines the rare p (null)
      phenotype.
    supporting_text: >-
      Expression of full coding constructs of alpha4Gal-T1 in insect cells
      revealed it encoded P(k) but not P(1) synthase activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Original cloning/expression paper identifying A4GALT as the
      Pk (Gb3) synthase and the molecular basis of the p phenotype. Cached entry
      is abstract-only (full_text_available: false).
- id: PMID:10748143
  title: Molecular cloning of globotriaosylceramide/CD77 synthase, a glycosyltransferase
    that initiates the synthesis of globo series glycosphingolipids.
  findings:
  - statement: >-
      Expression cloning of the A4GALT cDNA (Gb3/CD77 synthase) produced
      alpha-1,4-galactosyltransferase activity on lactosylceramide (and
      galactosylceramide), yielding Gb3/CD77 and initiating globo-series
      glycosphingolipid synthesis; the protein is a type II membrane protein.
    supporting_text: >-
      the extracts of the transfectant cells showed alpha1, 4-galactosyltransferase
      activity only on lactosylceramide and galactosylceramide
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Definitive expression-cloning paper for human Gb3/CD77
      synthase; source of the EXP catalytic-activity annotation and EC 2.4.1.228.
      Cached entry is abstract-only (full_text_available: false).
