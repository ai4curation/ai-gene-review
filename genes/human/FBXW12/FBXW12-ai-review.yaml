core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex that binds SKP1 and bridges substrate to the ligase; it ubiquitinates the IL-22 receptor subunit IL22RA1, targeting it for SCF-dependent proteasomal degradation.
  supported_by:
  - reference_id: PMID:26171402
    supporting_text: FBXW12 is a bona fide SCF E3 ligase constituent that can bind to IL-22R and other components of SCF to mediate IL-22R ubiquitination
  locations:
