- id: file:human/FBXW12/FBXW12-deep-research-falcon.md
  title: Falcon deep research report for human FBXW12
  findings:
  - statement: FBXW12 is an SCF-family E3 ligase subunit that physically associates with SKP1 and CUL1 and with IL-22R (IL22RA1), and reconstitutes IL-22R ubiquitination in a cell-free system, confirming it as a substrate-recognition adaptor rather than an enzyme.
    supporting_text: FBXW12 associates with SCF components including **SKP1** and **CUL1**, consistent with being an SCF substrate receptor
  - statement: Ectopic FBXW12 accelerates IL-22R turnover (half-life ~6 h to ~2 h), and FBXW12 knockdown increases IL-22R abundance and IL-22-induced STAT3, ERK and JNK signaling, defining FBXW12 as a negative post-translational regulator of IL-22 signaling and an epithelial growth suppressor.
    supporting_text: IL-22R half-life is reported to be ~**6 hours** at baseline and is accelerated to ~**2 hours** with FBXW12 overexpression
  - statement: Beyond IL-22R no additional validated FBXW12 substrate, ubiquitin linkage type, or definitive subcellular localization has been established, so substrate scope remains open.
    supporting_text: additional validated FBXW12 protein substrates, ubiquitin linkage types, and definitive subcellular localization were not identified in the retrieved materials
  - statement: A circular RNA (circ-FBXW12) from the FBXW12 locus is discussed in diabetic nephropathy, but this circRNA biology is distinct from and must not be conflated with the linear FBXW12 protein's E3-adaptor function.
    supporting_text: This evidence concerns **circRNA biology**, and should not be conflated with the **linear FBXW12 protein**'s E3-ligase substrate receptor activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Falcon synthesis grounded chiefly in Franz et al. 2015 (J Immunol Res, doi:10.1155/2015/912713 = PMID:26171402; full text available and already the basis of this review), which provides SKP1/CUL1 association, IL22RA1 co-IP, cell-free SCF reconstitution of IL22RA1 ubiquitination, accelerated IL22RA1 turnover, and the epithelial growth-suppressor phenotype. Cross-checked against UniProt Q6X9E4 FUNCTION/SUBUNIT statements and ComplexPortal CPX-7822. The 2024 spermatogenesis review (Xuan) reports FBXW12 among high-testis-transcript F-box genes, which is a transcript-level observation that does not override the UniProt 'ubiquitously expressed' tissue-specificity statement; the circ-FBXW12 (diabetic nephropathy) literature is explicitly excluded as it concerns a distinct gene product. No annotation action changed by the falcon report.
core_functions:
- description: Substrate-recognition subunit of an SCF (SKP1-CUL1-F-box) cullin-RING E3 ubiquitin ligase complex that binds SKP1 and bridges substrate to the ligase; it ubiquitinates the IL-22 receptor subunit IL22RA1, targeting it for SCF-dependent proteasomal degradation.
  supported_by:
  - reference_id: PMID:26171402
    supporting_text: FBXW12 is a bona fide SCF E3 ligase constituent that can bind to IL-22R and other components of SCF to mediate IL-22R ubiquitination
