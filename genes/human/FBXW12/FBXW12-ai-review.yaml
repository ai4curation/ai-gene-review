  title: The Human IL-22 Receptor Is Regulated through the Action of the Novel E3
    Ligase Subunit FBXW12, Which Functions as an Epithelial Growth Suppressor.
  findings:
  - statement: FBXW12 destabilizes human IL-22R (IL22RA1) in lung epithelia, binds SKP1, and facilitates IL22RA1 ubiquitination in a defined cell-free SCF system; FBXW12 knockdown increases IL22RA1 abundance and IL-22-induced STAT3 phosphorylation, and FBXW12 acts as an epithelial cell-growth suppressor (knockdown increases proliferation, cell-cycle progression and JNK/ERK activation).
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; full text available. Sole functional study, providing experimental support for SCF assembly (SKP1 binding, in vitro reconstitution), IL22RA1 ubiquitination, and SCF-dependent proteasomal degradation. Basis for proposing the substrate-adaptor molecular function term.
