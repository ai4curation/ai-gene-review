proposed_new_terms:
- proposed_name: ubiquitin-like ligase-substrate adaptor activity
  proposed_definition: Bridging a substrate to a ubiquitin-like protein ligase, as performed by an SCF F-box substrate-recognition subunit that binds both SKP1/the ligase scaffold and the substrate to facilitate the substrate's ubiquitination. This corresponds to the existing GO term GO:1990756, which is not currently in FBXW12's annotation set.
  justification: FBXW12 directly bridges the substrate IL22RA1 to the SCF E3 ligase, binding SKP1 and the substrate and facilitating substrate ubiquitination in a reconstituted system. This substrate-adaptor molecular function is experimentally supported (PMID:26171402) and is more informative than the existing bare protein binding/complex-membership annotations; GO:1990756 should be added as the molecular function for FBXW12 as an SCF substrate receptor.
  proposed_parent:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  supported_by:
  - reference_id: PMID:26171402
    supporting_text: FBXW12 is a bona fide SCF E3 ligase constituent that can bind to IL-22R and other components of SCF to mediate IL-22R ubiquitination
  - reference_id: file:human/FBXW12/FBXW12-deep-research-falcon.md
    supporting_text: FBXW12 associates with SCF components including **SKP1** and **CUL1**, consistent with being an SCF substrate receptor
suggested_questions:
- question: What is the substrate-recognition determinant (e.g. a phosphodegron) on IL22RA1 recognized by the FBXW12 WD40 propeller, and does FBXW12 have additional epithelial substrates beyond IL22RA1?
- question: Does FBXW12 loss-of-function in vivo enhance IL-22-dependent mucosal host defense or epithelial proliferation, as predicted from the cell-based growth-suppressor phenotype?
suggested_experiments:
- description: Map the IL22RA1 region/residues required for FBXW12 binding and ubiquitination, and test whether dephosphorylation or degron mutation abolishes recognition by the FBXW12 WD40 propeller.
- description: Generate FBXW12-knockout epithelial cells and tissues and assess endogenous IL22RA1 stability, IL-22-induced STAT3 signaling, proliferation, and identify the broader SCF(FBXW12) substrate repertoire by ubiquitinome profiling.
