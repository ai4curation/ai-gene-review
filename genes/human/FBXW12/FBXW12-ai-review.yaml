  label: Homo sapiens
description: >-
  FBXW12 (F-box only protein 35; FBXO12/FBXO35) is a member of the F-box/WD40
  (FBXW) family, with an N-terminal F-box motif and a C-terminal beta-propeller of
  WD40 repeats. F-box proteins are the interchangeable substrate-recognition
  subunits of SCF (SKP1-CUL1-F-box)-type cullin-RING E3 ubiquitin ligase
  complexes: the F-box motif binds SKP1 (which bridges to CUL1 and the RBX1-bound
  catalytic RING), while the WD40 propeller recognizes substrates and presents
  them for ubiquitination and proteasomal degradation. FBXW12 is ubiquitously
  expressed. It binds SKP1 and assembles into an SCF complex, and in human
  epithelial cells it functions as a substrate receptor that ubiquitinates the
  interleukin-22 receptor subunit IL22RA1: ectopic FBXW12 accelerates IL22RA1
  degradation in resting and IL-22-stimulated cells, and FBXW12 reconstitutes
  IL22RA1 ubiquitination in a defined cell-free SCF system. Through this activity
  FBXW12 dampens IL-22/STAT3 signaling and acts as an epithelial cell-growth
  suppressor, with its knockdown enhancing proliferation, cell-cycle progression
  and JNK/ERK activation.
