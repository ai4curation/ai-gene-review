- id: PMID:12937168
  title: 'Human mitochondrial C1-tetrahydrofolate synthase: gene structure, tissue
    distribution of the mRNA, and immunolocalization in Chinese hamster ovary calls.'
  findings:
  - statement: >-
      Human MTHFD1L cDNA expressed in an ade3 yeast strain gave ~9-fold elevated
      10-formyl-THF synthetase activity with no detectable dehydrogenase activity,
      identifying it as the human mitochondrial C1-THF synthase.
    reference_section_type: RESULTS
  - statement: >-
      A V5-tagged full-length construct localized exclusively to mitochondrial
      fractions of CHO cells, confirming mitochondrial localization.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text cached and read; establishes the human gene, mitochondrial
      localization (IDA), and 10-formyl-THF synthetase activity. Directly supports
      GO:0004329, GO:0009257, and mitochondrion annotations.
- id: PMID:16171773
  title: Enzymatic characterization of human mitochondrial C1-tetrahydrofolate synthase.
  findings:
  - statement: >-
      Purified recombinant human mitochondrial C1-THF synthase showed only
      10-formyl-THF synthetase activity (no dehydrogenase/cyclohydrolase); it is a
      homodimer, and THF Km decreases sharply with polyglutamylation.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache (full_text_available: false). Definitive enzymatic
      characterization: monofunctional formate--THF ligase, homodimer, ATP Km, and
      polyglutamate substrate preference. Basis for the EXP GO:0004329 and for
      rejecting the dehydrogenase (GO:0004488) prediction.
- id: PMID:19946888
  title: Defining the membrane proteome of NK cells.
  findings:
  - statement: >-
      Large-scale membrane proteome of the YTS NK-like cell line; MTHFD1L was among
      the many proteins detected, but as a soluble matrix enzyme this reflects
      co-fractionation rather than genuine membrane localization.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only. Supports only the HDA membrane annotation, which is an
      over-annotation for this soluble matrix enzyme.
