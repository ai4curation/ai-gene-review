gene_symbol: MTHFD1L
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTHFD1L is the mitochondrial monofunctional C1-tetrahydrofolate synthase
  (formate--tetrahydrofolate ligase, EC 6.3.4.3), a homodimeric matrix enzyme of
  folate-mediated one-carbon metabolism. Although it belongs to the C1-THF
  synthase family, whose members are typically trifunctional (methylene-THF
  dehydrogenase, methenyl-THF cyclohydrolase, and 10-formyl-THF synthetase), the
  human mitochondrial protein retains only the 10-formyl-THF synthetase activity;
  its N-terminal dehydrogenase/cyclohydrolase domain is present but catalytically
  inactive. It catalyzes the reversible, ATP-dependent interconversion of
  tetrahydrofolate + formate + ATP with 10-formyltetrahydrofolate + ADP +
  phosphate, with polyglutamylated tetrahydrofolate as the physiological
  substrate. In the compartmentalized mammalian one-carbon cycle it operates
  predominantly in the direction that hydrolyzes mitochondrially generated
  10-formyl-THF to release free formate, which is exported to the cytosol and
  re-activated for purine and thymidylate synthesis and homocysteine
  remethylation; it thereby provides the reaction that links mitochondrial and
  cytosolic one-carbon metabolism, complementing MTHFD2. The gene is widely
  expressed, highest in placenta, thymus, and brain. Loss of function in the mouse
  ortholog causes neural tube defects, and the human gene is a neural-tube-defect
  susceptibility locus.
