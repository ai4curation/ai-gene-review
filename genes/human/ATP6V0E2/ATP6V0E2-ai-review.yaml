id: Q8NHE4
gene_symbol: ATP6V0E2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  ATP6V0E2 encodes the "e2" form of the V-type proton ATPase (V-ATPase) subunit e,
  a small (81 aa, ~9.2 kDa) integral membrane protein with two transmembrane
  helices. It is one of two e-subunit paralogs in human (e1 = ATP6V0E1, e2 =
  ATP6V0E2) and is an accessory membrane component of the V0 proton-translocation
  sector of the V-ATPase. The V-ATPase is a rotary proton pump composed of a
  peripheral, cytoplasmic V1 sector that hydrolyzes ATP and a membrane-integral V0
  sector that translocates protons across the membrane; together they acidify and
  maintain the pH of intracellular compartments including lysosomes, endosomes,
  the Golgi, secretory vesicles, synaptic vesicles, clathrin-coated vesicles and
  phagosomes, and in some cell types the plasma membrane. As a V0 subunit, e2
  contributes to the assembly and proton-pumping function of the holoenzyme;
  yeast complementation studies show the e-subunit is essential for proper pump
  function. Unlike the ubiquitously expressed e1, ATP6V0E2 has a more restricted
  tissue distribution with high expression in heart, brain and kidney.
