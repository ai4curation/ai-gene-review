proposed_new_terms: []
suggested_questions:
- question: >-
    Do the e1 (ATP6V0E1) and e2 (ATP6V0E2) subunits confer distinct
    compartment-specific or tissue-specific V-ATPase functions, given e2's
    restricted expression in heart, brain and kidney?
- question: >-
    Is e2 incorporated into V-ATPase complexes with particular V0 a-subunit
    isoforms (ATP6V0A1-A4), as suggested by the multiple ComplexPortal variant
    complexes listing this subunit?
suggested_experiments:
- description: >-
    Targeted knockout/knockdown of ATP6V0E2 in cell types with high e2 expression
    (e.g., kidney or brain-derived cells) followed by ratiometric measurement of
    lysosomal/endosomal pH to test its specific contribution to compartment
    acidification relative to e1.
- description: >-
    Affinity purification of assembled V-ATPase from e2-expressing tissues coupled
    to mass spectrometry and cryo-EM to define which V0 a-subunit variant complexes
    incorporate e2 versus e1.
