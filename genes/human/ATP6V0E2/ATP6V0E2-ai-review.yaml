- term:
    id: GO:0016241
    label: regulation of macroautophagy
  evidence_type: NAS
  original_reference_id: PMID:22982048
  qualifier: involved_in
  review:
    summary: >-
      NAS annotation to regulation of macroautophagy citing a lipofuscin/autophagy
      study in senescent fibroblasts. That paper does not mention ATP6V0E2 and
      concerns general lysosomal/autophagy biology; assigning this process to this
      specific V0 subunit is an over-annotation. While V-ATPase-driven
      acidification is broadly upstream of autophagy, this subunit does not have a
      documented direct regulatory role in macroautophagy.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The cited reference does not address ATP6V0E2 and provides no
      assertion-level support for a macroautophagy-regulation role for this
      subunit; the process is several steps removed from the subunit's direct
      function.
    supported_by:
    - reference_id: PMID:22982048
      supporting_text: >-
        Lipofuscin is formed independently of macroautophagy and lysosomal
        activity in stress-induced prematurely senescent human fibroblasts.
      reference_section_type: TITLE
