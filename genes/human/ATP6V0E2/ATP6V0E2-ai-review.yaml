core_functions:
- description: >-
    As an accessory membrane subunit (e2) of the V0 proton-translocation sector of
    the vacuolar H+-ATPase, ATP6V0E2 contributes to ATP-hydrolysis-driven,
    rotational-mechanism proton transport across endomembranes, thereby acidifying
    intracellular compartments such as lysosomes and endosomes.
  molecular_function:
    id: GO:0005198
    label: structural molecule activity
  contributes_to_molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
  - id: GO:1902600
    label: proton transmembrane transport
