taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ATP6V1C2 encodes the C2 subunit of the V1 peripheral domain of the vacuolar-type
  H+-ATPase (V-ATPase), one of two human paralogs of subunit C (the other being ATP6V1C1).
  The V-ATPase is a multisubunit rotary proton pump in which a peripheral V1 complex
  hydrolyzes ATP to drive proton translocation through the membrane-embedded V0 complex,
  acidifying intracellular compartments (endosomes, lysosomes, Golgi, secretory vesicles)
  and, in some specialized cells, the extracellular space. Subunit C is present in
  a single copy per V1 complex and sits at the interface between the catalytic V1
  head and the peripheral stator stalk, where it is required for assembly of the catalytic
  V1 sector. Subunit C is a key regulator of reversible V1-V0 assembly and disassembly:
  it dissociates from both V1 and V0 when the holoenzyme disassembles and re-binds
  during reassembly, making it a regulatory hub for controlling V-ATPase activity.
  ATP6V1C2 is a tissue-restricted isoform, originally reported as kidney- and placenta-enriched
  and broadly expressed in lung/kidney epithelia, in contrast to the ubiquitously
  expressed ATP6V1C1. It does not itself hydrolyze ATP or translocate protons but
  participates in the rotary catalytic mechanism as a structural and regulatory component
  of the V1 domain.'
