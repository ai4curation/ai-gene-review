core_functions:
- description: ATP6V1C2 is a tissue-restricted C subunit of the V1 domain of the vacuolar-type
    H+-ATPase. As a single-copy subunit at the interface of the V1 catalytic head
    and the peripheral stator stalk, it is required for assembly of the catalytic
    V1 sector and contributes to the proton-transporting ATPase activity of the holoenzyme,
    which acidifies intracellular compartments.
  contributes_to_molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
  - id: GO:1902600
    label: proton transmembrane transport
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  in_complex:
    id: GO:0033180
    label: proton-transporting V-type ATPase, V1 domain
- description: Subunit C acts as a regulator of reversible V1-V0 assembly and disassembly.
    It dissociates from both V1 and V0 upon disassembly and re-binds during reassembly,
    providing a regulatory mechanism for controlling V-ATPase activity in response
    to cellular signals.
  contributes_to_molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  in_complex:
    id: GO:0033180
    label: proton-transporting V-type ATPase, V1 domain
