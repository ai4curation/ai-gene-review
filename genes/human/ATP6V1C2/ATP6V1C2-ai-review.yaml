  qualifier: enables
  review:
    summary: The cited paper expressed and purified human V-ATPase peripheral stalk
      subunit isoforms, including C2, using an E. coli cell-free system to study isoform-specific
      interactions. The abstract does not demonstrate C2 self-association (homodimerization);
      moreover, subunit C is present in a single copy per V1 complex, so an identical-protein-binding
