suggested_questions:
- question: Does ATP6V1C2 confer isoform-specific regulatory properties (e.g., different
    V1-V0 assembly/disassembly kinetics or signal responsiveness) relative to the
    ubiquitous ATP6V1C1, consistent with its restricted tissue expression?
- question: In which human tissues and cell types is ATP6V1C2 the predominant C subunit,
    and does it pair preferentially with particular a-subunit (ATP6V0A) variants in
    assembled V-ATPase complexes?
- question: Are there phenotypes or disease associations specific to ATP6V1C2 (e.g.,
    in kidney acid-base handling) that distinguish it from ATP6V1C1?
suggested_experiments:
- hypothesis: ATP6V1C2 governs isoform-specific V1-V0 assembly/disassembly dynamics
    distinct from ATP6V1C1.
  description: Reconstitute V-ATPase containing either C1 or C2 and measure assembly/disassembly
    kinetics and ATP-driven proton pumping in response to glucose deprivation or other
    signals, using blue native PAGE, fluorescent pH probes, and crosslinking mass
    spectrometry.
  experiment_type: BIOCHEMISTRY
- hypothesis: ATP6V1C2 is the functionally predominant C subunit in specific kidney/lung
    epithelial cells and cannot be fully replaced by ATP6V1C1 there.
  description: Generate ATP6V1C2 knockout in relevant epithelial cell models and assess
    lysosomal/compartment acidification, V-ATPase assembly, and whether ectopic ATP6V1C1
    rescues the phenotype.
  experiment_type: CELL_BIOLOGY
