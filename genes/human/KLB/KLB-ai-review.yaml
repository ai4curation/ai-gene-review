- id: PMID:29342135
  title: Structures of β-klotho reveal a 'zip code'-like mechanism for endocrine FGF signalling.
  findings:
  - statement: Human KLB is structurally a catalytically inactive glycoside-hydrolase-like protein.
    supporting_text: The first glutamate in D1 is replaced by N241, whereas the second glutamate in D2
      is replaced by A889, indicating that neither GH domain in β-Klotho can function as an active glycoside-hydrolase
      enzyme.
    reference_section_type: RESULTS
  - statement: KLB is the high-affinity ligand-recognition component of the FGF21-FGFR1c signaling complex.
    supporting_text: In this model, β-Klotho functions as a primary high affinity receptor for FGF21,
      whereas FGFR1c functions as a catalytic subunit that mediates receptor dimerization and intracellular
      signaling.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed identity, PMC full text, human crystal structures, quantitative binding assays,
      mutagenesis, and cell-signaling experiments were verified. This is the decisive source for pseudoenzyme
      status and KLB coreceptor mechanism.
