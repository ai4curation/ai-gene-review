- term:
    id: GO:0004553
    label: hydrolase activity, hydrolyzing O-glycosyl compounds
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro transferred glycoside-hydrolase activity from the ancestral GH1-like fold.
    action: REMOVE
    reason: Human KLB is a receptor-like pseudoenzyme. Each tandem GH-like domain lacks one essential
      catalytic glutamate, and the human structure explicitly concludes that neither domain can function
      as an active glycoside hydrolase.
    additional_reference_ids:
    - PMID:29342135
    supported_by:
    - reference_id: PMID:29342135
      supporting_text: The first glutamate in D1 is replaced by N241, whereas the second glutamate in
        D2 is replaced by A889, indicating that neither GH domain in β-Klotho can function as an active
        glycoside-hydrolase enzyme.
      reference_section_type: RESULTS
