id: Q86Z14
gene_symbol: KLB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'KLB encodes beta-Klotho, a glycosylated single-pass type III plasma-membrane protein whose
  tandem extracellular glycoside-hydrolase-like domains have lost essential catalytic residues and instead
  form a high-affinity recognition surface for the endocrine fibroblast growth factors FGF19 and FGF21.
  KLB associates with FGFR4 and FGFR1-family receptors to assemble ligand-responsive receptor complexes:
  the KLB ectodomain supplies ligand specificity while the FGFR supplies intracellular tyrosine-kinase
  signaling. In liver, FGF19-KLB-FGFR4 signaling represses CYP7A1 and limits bile-acid synthesis; KLB
  also enables tissue-selective FGF21 metabolic signaling.'
