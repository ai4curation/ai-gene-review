core_functions:
- description: At the plasma membrane, KLB acts as the extracellular ligand-recognition and coreceptor
    component of endocrine-FGF receptor complexes. Its repurposed tandem GH-like domains bind FGF19 and
    FGF21, and KLB association with FGFR4 or FGFR1-family receptors permits ligand-dependent receptor
    activation. In the liver, the FGF19-KLB-FGFR4 arm represses CYP7A1 and limits bile-acid synthesis.
  molecular_function:
    id: GO:0015026
    label: coreceptor activity
  directly_involved_in:
  - id: GO:0008543
    label: fibroblast growth factor receptor signaling pathway
  - id: GO:0070858
    label: negative regulation of bile acid biosynthetic process
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:29342135
    supporting_text: In this model, β-Klotho functions as a primary high affinity receptor for FGF21,
      whereas FGFR1c functions as a catalytic subunit that mediates receptor dimerization and intracellular
      signaling.
    reference_section_type: RESULTS
  - reference_id: PMID:17627937
    supporting_text: KLB is required for FGF19 binding to FGFR4, intracellular signaling, and downstream
      modulation of gene expression.
    reference_section_type: ABSTRACT
    full_text_unavailable: true
proposed_new_terms: []
knowledge_gaps:
- gap_statement: The endogenous stoichiometry and ligand-dependent assembly sequence of KLB-FGFR complexes
    in human target tissues remain incompletely resolved.
  boundary: Structures and transfected-cell assays establish the binding interfaces, but do not determine
    native receptor abundance or assembly kinetics in hepatocytes, adipocytes, or neurons.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Native complex architecture is needed to understand tissue selectivity and differences
    between FGF19 and FGF21 signaling.
  resolution: Measure endogenous KLB-FGFR proximity, stoichiometry, and ligand-dependent dynamics in primary
    human target cells using quantitative single-molecule imaging and orthogonal cross-linking mass spectrometry.
  provenance:
  - reference_id: file:human/KLB/KLB-notes.md
    supporting_text: Quantify endogenous human KLB-FGFR stoichiometry and ligand-dependent complex assembly
      in hepatocytes and adipocytes.
- gap_statement: It is unknown whether either KLB GH-like domain retains any physiologically relevant
    residual chemistry despite loss of an essential catalytic glutamate.
  boundary: The human structure establishes that canonical GH1 catalysis is impossible, but a targeted
    search for noncanonical chemistry has not been reported in the evidence set.
  gap_kind:
  - BIOLOGY
  dark_aspect: MF_DARK
  status: OPEN
  significance: Resolving this would distinguish a fully repurposed pseudoenzyme from a receptor that
    retains unusual catalytic activity.
  resolution: Test purified, correctly glycosylated KLB ectodomain against broad glycan libraries with
    sensitive product detection, catalytic-residue controls, and ligand-binding-defective separation-of-function
    mutants.
  provenance:
  - reference_id: PMID:29342135
    supporting_text: The first glutamate in D1 is replaced by N241, whereas the second glutamate in D2
      is replaced by A889, indicating that neither GH domain in β-Klotho can function as an active glycoside-hydrolase
      enzyme.
    reference_section_type: RESULTS
suggested_questions:
- question: How do endogenous KLB-FGFR stoichiometry and complex-assembly kinetics differ between human
    liver, adipose tissue, and nervous-system target cells?
- question: Which KLB residues selectively distinguish FGF19 from FGF21 while preserving FGFR association
    and cell-surface expression?
- question: Does either repurposed GH-like domain retain noncanonical catalytic chemistry under physiological
    conditions?
suggested_experiments:
- hypothesis: KLB uses separable surfaces for endocrine-FGF recognition and FGFR association.
  description: Create structure-guided KLB variants that selectively disrupt FGF19/FGF21 site 1, site
    2, or FGFR binding; verify matched surface expression and test ligand binding, FGFR phosphorylation,
    MAPK signaling, and rescue in KLB-null human hepatocyte and adipocyte models.
  experiment_type: Separation-of-function mutagenesis and receptor-signaling rescue
- hypothesis: Native KLB-FGFR complex stoichiometry determines tissue-selective endocrine-FGF responses.
  description: Quantify endogenous KLB-FGFR1c/FGFR4 complexes before and after FGF19 or FGF21 stimulation
    in primary human hepatocytes and adipocytes using calibrated proximity imaging, cross-linking mass
    spectrometry, and receptor-phosphorylation time courses.
  experiment_type: Endogenous receptor-complex stoichiometry and signaling kinetics
- hypothesis: KLB is catalytically inert despite retaining two GH1-like folds.
  description: Screen purified glycosylated human KLB ectodomain against a chemically diverse glycan panel
    with mass-spectrometric product detection, using active GH1 enzymes as positive controls and KLB ligand-binding
    mutants to separate receptor binding from any residual chemistry.
  experiment_type: Pseudoenzyme catalytic-function screen
