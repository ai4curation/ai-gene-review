- term:
    id: GO:0001694
    label: histamine biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:10318872
  review:
    summary: |
      Histamine biosynthetic process - MBP2 triggers histamine release from
      *basophils* (not mast cells) but does not synthesize histamine. Per PR
      #767 reviewer feedback, the prior MODIFY → GO:0002553 (histamine
      secretion by mast cell) was the wrong cell type; the basophil-stimulating
      activity is already captured by the ACCEPTed GO:0045575 (basophil
      activation) elsewhere in this review. Downgraded to REMOVE.
    action: REMOVE
    reason: |
      MBP2 does not biosynthesize histamine; the documented activity is
      triggering histamine release from basophils, which is fully captured by
      GO:0045575 (basophil activation) already accepted in this review.
      No basophil-specific histamine-secretion GO term currently exists, and
      GO:0002553 (histamine secretion by mast cell) was the wrong cell type.
    supported_by:
    - reference_id: PMID:10318872
      supporting_text: hMBPH had effects similar to hMBP in cell killing and neutrophil
        (superoxide anion production and interleukin-8 release) and basophil (histamine
        and leukotriene C4 release) stimulation assays, but usually with reduced
        potency.
