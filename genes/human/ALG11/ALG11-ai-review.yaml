gene_symbol: ALG11
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: ALG11 is an endoplasmic reticulum membrane alpha-1,2-mannosyltransferase
  (EC 2.4.1.131) of the dolichol-linked oligosaccharide (LLO) assembly pathway. Using
  GDP-mannose as donor, it adds the fourth and fifth mannose residues onto Man3GlcNAc2-PP-dolichol
  to produce Man5GlcNAc2-PP-dolichol, the final cytoplasmic-face LLO intermediate;
  this glycan is then flipped into the ER lumen (by RFT1) for continued assembly and
  eventual transfer to nascent proteins during protein N-linked glycosylation. It
  is a single-pass ER membrane protein whose catalytic domain faces the cytosol and
  belongs to the glycosyltransferase group 1 family (GT4 subfamily). Loss of function
  causes ALG11-CDG (congenital disorder of glycosylation type Ip), a multisystem disorder
  with under-glycosylated serum glycoproteins.
