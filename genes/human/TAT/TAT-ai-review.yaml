    correctness: VERIFIED
    review_notes: >-
      PubMed-verified as the human TAT gene characterization paper; abstract in
      cache. Supports gene structure, size, and the caveat that human upstream
      GREs are degenerate relative to rat.
- id: PMID:7999802
  title: Cloning and expression of human tyrosine aminotransferase cDNA.
  findings:
  - statement: >-
      Human TAT cDNA expressed in HeLa cells produced a ~50 kDa protein that
      specifically converted L-tyrosine to 4-hydroxyphenylpyruvate, establishing
      the core molecular function and involvement in tyrosine catabolism.
    supporting_text: >-
      The expressed protein catalyzed specifically the conversion of
      L-[14C]tyrosine into p-[14C]hydroxyphenylpyruvate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified primary paper demonstrating the human TAT enzymatic
      activity by expression cloning; direct basis for the IDA core-function
      annotations.
- id: PMID:16640556
  title: The narrow substrate specificity of human tyrosine aminotransferase -- the
    enzyme deficient in tyrosinemia type II.
  findings:
  - statement: >-
      Establishes that human TAT has narrow substrate specificity for tyrosine
      with only weak activity toward phenylalanine, and that Ile-294 is important
      for catalytic activity; supports treating phenylalanine/aromatic-amino-acid
      processes as non-core.
    supporting_text: >-
      The narrow substrate specificity of human tyrosine aminotransferase --
      the enzyme deficient in tyrosinemia type II.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Cited in UniProt for FUNCTION and CATALYTIC ACTIVITY; abstract-only in
      cache. Underpins the narrow tyrosine specificity and weak phenylalanine
      activity used to rank Phe/aromatic processes as non-core.
