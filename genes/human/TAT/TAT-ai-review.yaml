- term:
    id: GO:0006559
    label: L-phenylalanine catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetic assertion of involvement in L-phenylalanine catabolism.
      Phenylalanine is degraded via conversion to tyrosine, and UniProt places
      TAT as step 2/6 of the L-phenylalanine degradation pathway (the tyrosine
      transamination step). TAT itself has only weak, low-affinity activity
      directly on phenylalanine.
    action: KEEP_AS_NON_CORE
    reason: >-
      Biologically defensible as pathway membership (Phe -> Tyr -> catabolism),
      matching the UniProt PATHWAY statement, and it is corroborated by an
      independent UniPathway mapping annotation. However, TAT's direct catalytic
      role is on tyrosine; its phenylalanine transaminase activity is much lower.
      Retain as a non-core, pathway-context process rather than a core function.
    supported_by:
    - reference_id: PMID:16640556
      supporting_text: >-
        The narrow substrate specificity of human tyrosine aminotransferase --
        the enzyme deficient in tyrosinemia type II.
