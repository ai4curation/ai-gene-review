id: P17735
gene_symbol: TAT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TAT encodes tyrosine aminotransferase (EC 2.6.1.5), a cytosolic, pyridoxal
  5'-phosphate (PLP)-dependent aminotransferase of the class-I PLP-dependent
  aminotransferase family that is strongly enriched in the liver. It catalyzes
  the first and committed step of L-tyrosine catabolism, transamination of
  L-tyrosine with 2-oxoglutarate to yield 4-hydroxyphenylpyruvate and
  L-glutamate. The reaction is reversible in vitro, and the enzyme has much
  lower affinity and activity toward L-phenylalanine; PLP is bound as a Schiff
  base to Lys-280, and the active protein is a homodimer. Because phenylalanine
  is catabolized via conversion to tyrosine, TAT also functions within the
  overall L-phenylalanine degradation pathway. Expression of the gene is a
  classical target of hormonal induction by glucocorticoids, glucagon and cAMP.
  Loss-of-function variants cause tyrosinemia type II (Richner-Hanhart syndrome),
  an oculocutaneous disorder with elevated plasma and urinary tyrosine,
  palmoplantar keratosis, painful corneal ulcers and intellectual disability.
