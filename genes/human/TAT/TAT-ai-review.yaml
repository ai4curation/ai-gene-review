- id: PMID:1973834
  title: Isolation and characterization of the human tyrosine aminotransferase gene.
  findings:
  - statement: >-
      Characterizes the human TAT gene (12 exons, 454-aa protein, 50,399 Da,
      92% protein identity to rat); notes that the functional glucocorticoid
      response elements present upstream of the rat gene are mutated or
      Alu-replaced in the human gene.
    supporting_text: >-
      The human TAT gene is predicted to code for a 454 amino acid protein of
      molecular weight 50,399 dalton.
  reference_review:
