core_functions:
- description: RPL36A/eL42 is an integral structural protein of the human cytosolic 60S ribosomal subunit.
    It is incorporated into maturing pre-60S particles and persists in assembled, actively translating
    80S ribosomes, thereby contributing to cytoplasmic protein synthesis.
  molecular_function:
    id: GO:0003735
    label: structural constituent of ribosome
  directly_involved_in:
  - id: GO:0002181
    label: cytoplasmic translation
  in_complex:
    id: GO:0022625
    label: cytosolic large ribosomal subunit
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:human/RPL36A/RPL36A-uniprot.txt
    supporting_text: Component of the large ribosomal subunit.
  - reference_id: PMID:25957688
    supporting_text: Structural snapshots of actively translating human ribosomes.
    reference_section_type: TITLE
proposed_new_terms: []
knowledge_gaps:
- gap_statement: The relative incorporation and tissue distribution of RPL36A versus its close paralog
    RPL36AL in native human ribosomes are unresolved.
  boundary: Current human ribosome structures establish eL42 occupancy but do not generally distinguish
    which near-identical gene product supplies each observed chain.
  gap_kind:
  - BIOLOGY
  dark_aspect: BP_DARK
  status: OPEN
  significance: Paralog-resolved occupancy is necessary before assigning tissue-specific or specialized-ribosome
    functions to either gene.
  resolution: Use paralog-specific peptides, targeted proteomics, and ribosome profiling after single-gene
    perturbation across human tissues and cell states.
  provenance:
  - reference_id: file:human/RPL36A/RPL36A-notes.md
    supporting_text: Use paralog-specific proteomics to determine the relative incorporation of
- gap_statement: The HPA endoplasmic-reticulum signal has not been separated from localization of rough-ER-bound
    translating ribosomes.
  boundary: The current annotation reports ER association, but no experiment in the reviewed set shows
    an ER-resident RPL36A pool independent of cytosolic ribosomes.
  gap_kind:
  - BIOLOGY
  dark_aspect: CC_DARK
  status: OPEN
  significance: Resolving this prevents a transient translation-site association from being mistaken for
    a distinct organelle function.
  resolution: Measure RPL36A localization after polysome runoff and disruption of SRP-dependent ER targeting,
    with biochemical fractionation and quantitative imaging.
  provenance:
  - reference_id: file:human/RPL36A/RPL36A-notes.md
    supporting_text: it can reflect rough-ER-bound cytosolic ribosomes.
suggested_questions:
- question: What fraction of native human eL42 is supplied by RPL36A versus RPL36AL in each tissue?
- question: Does RPL36A have any reproducible extraribosomal function after controlling for whole-ribosome
    co-purification?
- question: Is the apparent ER pool entirely explained by rough-ER-bound polysomes?
suggested_experiments:
- hypothesis: RPL36A and RPL36AL contribute unequally to eL42 occupancy in a tissue-dependent manner.
  description: Develop paralog-specific targeted peptides and quantify each protein in affinity-purified
    ribosomes across primary human tissues, coupled to single-gene CRISPR perturbation and rescue.
  experiment_type: Paralog-resolved ribosome proteomics
- hypothesis: The RPL36A ER signal depends on active cotranslational targeting rather than stable ER residence.
  description: Compare endogenous RPL36A imaging and membrane fractionation before and after puromycin-induced
    polysome runoff, translation arrest, and SRP-pathway perturbation.
  experiment_type: Translation-dependent localization analysis
- hypothesis: mRNA interactome recovery reflects assembled-ribosome capture rather than a separate RNA-binding
    function.
  description: Map endogenous RPL36A RNA contacts by stringent UV crosslinking and nucleotide-resolution
    CLIP, then compare contact profiles after ribosome-disassembly conditions and with assembled-ribosome
    controls.
  experiment_type: Ribosome-aware RNA crosslink mapping
