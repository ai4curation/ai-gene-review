id: P83881
gene_symbol: RPL36A
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: RPL36A encodes the 106-residue large ribosomal subunit protein eL42, historically called
  60S ribosomal protein L36a or L44. It is a conserved structural constituent of the human cytosolic 60S
  subunit and participates in cytoplasmic translation. Human 80S and pre-60S cryo-EM structures place
  eL42 in assembled and maturing large subunits. Its primary localization is cytosolic, with endoplasmic-reticulum
  signal plausibly arising from translating ribosomes bound to rough ER; generic interaction and RNA-capture
  records do not establish independent extraribosomal functions.
