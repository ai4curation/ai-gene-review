id: P51688
gene_symbol: SGSH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SGSH encodes N-sulphoglucosamine sulphohydrolase (sulfamidase, also called heparan
  N-sulfatase; EC 3.10.1.1), a lysosomal enzyme of the sulfatase family. It acts in the
  stepwise exolytic degradation of the glycosaminoglycan heparan sulfate, hydrolytically
  removing the N-sulfate group from terminal N-sulfo-D-glucosamine residues (yielding
  D-glucosamine with a free amino group plus sulfate). Like other sulfatases, its activity
  depends on a catalytic formylglycine residue (Cys70 converted to 3-oxoalanine) generated
  post-translationally in the endoplasmic reticulum by the formylglycine-generating enzyme
  SUMF1; the active site also binds a Ca2+ ion. The synthesized precursor is trafficked to
  the lysosome, where the mature enzyme resides in the lysosomal lumen. Loss of SGSH activity
  blocks heparan sulfate catabolism, causing its lysosomal accumulation and the autosomal
  recessive lysosomal storage disease mucopolysaccharidosis type IIIA (Sanfilippo syndrome A),
  characterized by progressive central nervous system neurodegeneration with comparatively
  mild somatic features.
