core_functions:
- description: >-
    Lysosomal N-sulfoglucosamine sulfohydrolase (heparan N-sulfatase) that hydrolytically
    removes the N-sulfate from terminal N-sulfo-D-glucosamine residues, catalysing a step in
    the exolytic lysosomal degradation of the glycosaminoglycan heparan sulfate. Activity
    depends on a catalytic formylglycine residue and the enzyme acts within the lysosomal lumen.
