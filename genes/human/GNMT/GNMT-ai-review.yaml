id: Q14749
gene_symbol: GNMT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Glycine N-methyltransferase (EC 2.1.1.20) is an abundant, predominantly hepatic
  cytosolic enzyme that transfers a methyl group from S-adenosyl-L-methionine
  (SAM/AdoMet) to glycine, forming sarcosine (N-methylglycine) and
  S-adenosyl-L-homocysteine (SAH/AdoHcy). Its major physiological role is not
  biosynthetic but regulatory; by disposing of excess SAM it controls the cellular
  SAM:SAH ratio (methylation capacity), thereby integrating one-carbon and folate
  metabolism. Consistent with this role it is feedback-inhibited by
  5-methyltetrahydrofolate, coupling folate status to methyl-group disposal. It is a
  homotetramer of a class I-like SAM-dependent methyltransferase fold. Loss-of-function
  variants cause glycine N-methyltransferase deficiency (hypermethioninemia), with
  elevated plasma methionine and SAM alongside mild hepatopathy.
