proposed_new_terms: []
suggested_questions:
- question: Beyond systemic effects seen in mouse models, does human GNMT directly
    participate in regulation of gluconeogenesis, or is that solely a downstream consequence
    of altered methylation/one-carbon flux?
- question: Are any of the high-throughput binary interactors (e.g. ARRB1, NTAQ1, SNRNP200)
    physiologically meaningful, or are they screen artifacts?
suggested_experiments:
- description: Structure-guided kinetic dissection of 5-methyltetrahydrofolate feedback
    inhibition to quantify how folate status tunes the SAM:SAH ratio in hepatocytes.
- description: Metabolic flux analysis in GNMT-deficient vs wild-type hepatocytes to
    directly measure the contribution of GNMT to SAM disposal and methylation capacity.
