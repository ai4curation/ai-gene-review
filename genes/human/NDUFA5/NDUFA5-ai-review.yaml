description: >-
  NDUFA5 (Complex I subunit B13; NADH-ubiquinone oxidoreductase 13 kDa-B subunit) is a
  small (116 aa, ~13.5 kDa) nuclear-encoded accessory (supernumerary) subunit of mitochondrial
  respiratory Complex I (NADH:ubiquinone oxidoreductase), the first enzyme of the electron
  transport chain. Human Complex I is an L-shaped ~45-subunit holoenzyme comprising 14 conserved
  core subunits that carry out catalysis and 31 accessory subunits. NDUFA5 is a non-catalytic
  structural subunit of the peripheral (matrix) arm; it carries no redox cofactor and does not
  itself perform the NADH:ubiquinone oxidoreduction. It is a peripheral inner-membrane protein
  exposed on the matrix side and is a stable, structurally resolved component of the mature
  complex. Functionally it acts as a structural molecule that helps stabilize and assemble the
  peripheral arm, thereby contributing to the holoenzyme's NADH dehydrogenase (ubiquinone)
  activity, to electron transfer from NADH to ubiquinone, and to establishment of the proton
  motive force that drives oxidative phosphorylation. It is expressed ubiquitously with highest
  levels in heart, skeletal muscle and brain.
