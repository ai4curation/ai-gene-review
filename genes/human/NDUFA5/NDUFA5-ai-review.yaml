core_functions:
- description: >-
    Structural (non-catalytic) accessory subunit of the peripheral/matrix arm of mitochondrial
    respiratory Complex I (NADH:ubiquinone oxidoreductase). NDUFA5 carries no redox cofactor and does
    not itself catalyze electron transfer; instead it acts as a structural molecule that stabilizes
    the peripheral arm and is required for stable assembly of the functional holoenzyme, thereby
    contributing to the complex-level NADH dehydrogenase (ubiquinone) activity and to electron
    transport from NADH to ubiquinone in the mitochondrial inner membrane.
  molecular_function:
    id: GO:0005198
