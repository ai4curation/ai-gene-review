- term:
    id: GO:0007417
    label: central nervous system development
  evidence_type: TAS
  original_reference_id: PMID:7550325
  qualifier: involved_in
  review:
    summary: A legacy ProtInc TAS linking BTD to central nervous system development.
      The cited paper describes a deficiency-causing mutation and the neurological
      symptoms of the disorder, not a direct developmental role of the enzyme.
    action: MARK_AS_OVER_ANNOTATED
    reason: Biotinidase is a metabolic (biotin-recycling) enzyme; it has no direct
      role in CNS development. The cited reference reports a mutational hotspot causing
      profound biotinidase deficiency and notes the disorder's neurological symptoms
      and the need for early treatment to prevent neurological damage. This is a downstream
      disease phenotype of biotin/carboxylase deficiency, not a developmental function
      of the gene product. Flagged as over-annotated (phenotype-to-process over-interpretation);
      not a core function.
    supported_by:
    - reference_id: PMID:7550325
      supporting_text: it is important that biotinidase deficiency is diagnosed early
        so that permanent neurological damage can be prevented.
