id: P43251
gene_symbol: BTD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Biotinidase (EC 3.5.1.12) is the enzyme responsible for recycling the water-soluble
  vitamin biotin. It hydrolyses biocytin (biotinyl-lysine) and short biotinyl-peptides
  that are released when the biotin-dependent holo-carboxylases are degraded, liberating
  free biotin so it can be reused for biotinylation of newly synthesized apo-carboxylases;
  it also cleaves protein-bound (dietary) biotin, making ingested biotin bioavailable.
  It is a secreted, N-glycosylated glycoprotein found in serum/plasma and other body
  fluids (e.g. colostrum), and belongs to the carbon-nitrogen hydrolase superfamily
  (BTD/VNN family) with a nitrilase-like catalytic triad. Loss of biotinidase activity
  causes biotinidase deficiency, an autosomal recessive, treatable, newborn-screened
  disorder (late-onset/juvenile multiple carboxylase deficiency) in which failure
  to recycle biotin depletes free biotin and secondarily impairs the four biotin-dependent
  carboxylases, producing organic aciduria with neurological, cutaneous, ophthalmological
  and auditory manifestations that are largely preventable with oral biotin supplementation.
