  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: A correct but broader parent of biotinidase activity, capturing the chemistry
      (hydrolysis of a non-peptide C-N bond in a linear amide, i.e. the biotin-amide
      bond).
    action: ACCEPT
    reason: Biotinidase hydrolyses the amide bond linking biotin to the epsilon-amino
      group of lysine (biocytin) or to ammonia (biotin amide), a non-peptide carbon-nitrogen
      bond in a linear amide, so this InterPro/ARBA-based mapping is chemically correct.
      It is more general than the specific GO:0047708 biotinidase activity term but
      is not wrong; retained as a broader IEA.
