  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: enables
  review:
    summary: >-
      Ensembl-Compara ortholog-transfer from rat asserting ASS1 "binds a toxic substance". There is
      no credible biochemical basis for treating ASS1 as a toxin-binding protein; ASS1 is a
      metabolic ligase. This is an anomalous, likely spuriously propagated molecular-function IEA.
    action: REMOVE
    reason: >-
      Biologically implausible for a cytosolic urea-cycle ligase; unsupported by any human evidence
      or by the enzyme's mechanism. The term definition ("Binding to a toxic substance, a poisonous
      substance that causes damage to biological systems") does not fit ASS1. Over-propagated
      ortholog-transfer IEA.
