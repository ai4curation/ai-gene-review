id: Q8IU89
gene_symbol: CERS3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CERS3 (ceramide synthase 3; formerly LASS3) is an endoplasmic reticulum membrane
  enzyme that catalyzes the N-acylation step of de novo ceramide biosynthesis: transfer
  of a fatty acyl group from acyl-CoA onto the amino group of a sphingoid base
  (dihydrosphingosine/sphinganine in the de novo pathway, sphingosine in the
  salvage pathway) to form dihydroceramide/ceramide (sphingosine
  N-acyltransferase, EC 2.3.1.24). Among the six mammalian ceramide synthases it
  is distinguished by its selectivity for very-long- and ultra-long-chain acyl-CoAs
  (chain length greater than C22, up to C26 and longer). CERS3 produces the
  ultra-long-chain ceramides, including omega-hydroxy species and acylceramides,
  that form the extracellular lipid lamellae and cornified lipid envelope of the
  epidermis and are essential for the skin permeability barrier. It is expressed most
  prominently in the epidermis (at the interface between the stratum granulosum and
  stratum corneum) and in testis. It is a multi-pass ER membrane protein whose
  catalytic activity resides in a TLC (TRAM-LAG1-CLN8) domain; it also carries a
  degenerate homeobox-like region that has lost DNA-binding residues and is not
  functional. Loss-of-function variants cause autosomal recessive congenital
  ichthyosis 9 (ARCI9), a keratinization/skin-barrier disorder.
