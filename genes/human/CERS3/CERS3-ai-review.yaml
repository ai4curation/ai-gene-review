- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      Automated InterPro2GO annotation triggered by the homeodomain-like signature
      (IPR001356) that CERS3 shares with the LAG1/LASS/CerS family. CERS3 does
      not bind DNA: its homeobox-like region is degenerate and lacks the residues
      required for DNA binding, and the protein is an ER membrane enzyme.
    action: REMOVE
    reason: >-
      This is a demonstrably wrong electronic (IEA) inference. UniProt explicitly
      cautions that the predicted homeobox domain is degenerated and lacks
      DNA-binding residues, and that ER localization argues against homeobox
      function. The catalytic activity resides in the TLC domain.
    supported_by:
    - reference_id: file:human/CERS3/CERS3-uniprot.txt
      supporting_text: >-
        Contains a predicted homeobox domain which is degenerated, lacking
        residues important for DNA-binding.
