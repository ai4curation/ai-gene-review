core_functions:
- description: >-
    Ceramide synthase (sphingosine N-acyltransferase) that catalyzes the
    N-acylation step of de novo ceramide biosynthesis at the ER membrane,
    transferring a very-long/ultra-long-chain fatty acyl group from acyl-CoA onto
    a sphingoid base (sphinganine) to form (dihydro)ceramide, producing the
    ultra-long-chain ceramides required for the epidermal permeability barrier.
