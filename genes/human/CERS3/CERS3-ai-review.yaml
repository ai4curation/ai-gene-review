suggested_questions:
- question: >-
    What are the specific in vivo acyl-chain-length preferences of human CERS3,
    and how do partner proteins such as ORMDL3, fatty acid elongases, and
    hydroxylases shape the ultra-long-chain acylceramide output in epidermis?
suggested_experiments:
- description: >-
    Reconstitute human CERS3 in a defined membrane system and measure activity
    across a panel of acyl-CoA chain lengths with sphinganine and sphingosine
    acceptors to quantify its ultra-long-chain selectivity.
- description: >-
    Test whether the CERS3-ORMDL3 interaction detected in HuRI modulates CERS3
    activity or sphingolipid flux in differentiating keratinocytes.
