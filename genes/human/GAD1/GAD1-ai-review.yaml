gene_symbol: GAD1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: Glutamate decarboxylase 1 (GAD67; 67 kDa glutamic acid decarboxylase)
  is a pyridoxal-5'-phosphate (PLP)-dependent decarboxylase (EC 4.1.1.15) that catalyzes
  the conversion of L-glutamate to gamma-aminobutyric acid (GABA) plus CO2, thereby
  producing the major inhibitory neurotransmitter of the central nervous system. It
  is the principal constitutively active GABA-synthesizing enzyme responsible for
  basal GABA production, whereas the paralog GAD2 (GAD65) is the synaptic-vesicle-associated
  isoform that is transiently activated on demand. The enzyme is a homodimer that
  covalently binds PLP at an active-site lysine and belongs to the group II decarboxylase
  family. GAD67 is a soluble cytosolic protein expressed predominantly in GABAergic
  neurons of the brain, with additional expression in some non-neural tissues. Bi-allelic
  loss-of-function variants cause an autosomal recessive developmental and epileptic
  encephalopathy, and hypomorphic missense variation has been associated with spastic
  cerebral palsy / spastic paraplegia phenotypes, consistent with its essential role
  in inhibitory neurotransmission.
