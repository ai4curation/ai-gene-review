suggested_questions:
- question: To what extent is GAD67 (versus GAD65) responsible for the pool of GABA
    that supports phasic synaptic inhibition rather than only tonic/basal GABA, and
    does GAD67 have a physiologically meaningful presence at the presynaptic active
    zone in human neurons?
- question: Which of the reported GAD1 disease phenotypes (developmental and epileptic
    encephalopathy vs spastic cerebral palsy / spastic paraplegia) are robustly attributable
    to GAD1 loss of function, given that one cerebral-palsy pedigree was later reattributed
    to HPDL?
suggested_experiments:
- description: Fractionation and imaging of endogenous GAD67 in human GABAergic neurons
    to quantify the cytosolic versus membrane/vesicle-associated pools and directly
    test the Reactome-derived vesicle-membrane localization annotations.
- description: Enzyme kinetics and thermal/holo-apo stability comparison of recombinant
    wild-type GAD67 versus disease-associated variants (e.g. DEE89 alleles) to link
    specific mutations to loss of decarboxylase activity and PLP cofactor binding.
