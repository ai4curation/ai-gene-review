- term:
    id: GO:0006540
    label: GABA shunt
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  qualifier: involved_in
  review:
    summary: Electronic (Ensembl ortholog-transfer) annotation to the GABA shunt, the
      metabolic bypass in which glutamate is decarboxylated to GABA and GABA is subsequently
      transaminated and oxidized back into the TCA cycle. GAD1 catalyzes the entry
      (decarboxylation) step.
    action: KEEP_AS_NON_CORE
    reason: GAD1 genuinely participates in the GABA shunt as the glutamate-decarboxylation
      step, but the shunt as a whole is a multi-enzyme metabolic process; the gene's
      core process is more precisely GABA biosynthesis. Retained as a non-core metabolic-context
      process.
    supported_by:
    - reference_id: file:human/GAD1/GAD1-uniprot.txt
      supporting_text: 'L-glutamate + H(+) = 4-aminobutanoate + CO2'
