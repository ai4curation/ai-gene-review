id: P51659
gene_symbol: HSD17B4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  HSD17B4 encodes the peroxisomal multifunctional enzyme type 2 (MFE-2/MFP-2), also known as
  D-bifunctional protein (DBP), a 736-residue enzyme of the peroxisomal matrix that catalyzes
  the second (hydration) and third (dehydrogenation) reactions of peroxisomal fatty-acid
  beta-oxidation with D (R) stereochemistry. It is a multidomain protein: an N-terminal
  (3R)-hydroxyacyl-CoA dehydrogenase domain of the short-chain dehydrogenase/reductase (SDR)
  family with an NAD(+)-binding Rossmann fold (historically named 17-beta-hydroxysteroid
  dehydrogenase type 4), a central D-specific enoyl-CoA hydratase 2 / (3R)-3-hydroxyacyl-CoA
  dehydratase domain of the MaoC/hot-dog fold, and a C-terminal SCP2-like sterol-carrier /
  lipid-transfer domain. The full-length protein is bifunctional and forms homodimers; in vivo
  it is proteolytically processed into separate dehydrogenase and hydratase chains. DBP is the
  main bifunctional enzyme handling very-long-chain fatty acids, 2-methyl-branched-chain
  (pristanic) acids, C27 bile-acid intermediates (di- and trihydroxycholestanoic acid), and
  long-chain dicarboxylic acids, and it participates in the peroxisomal beta-oxidation step that
  retroconverts C24:6n-3 to docosahexaenoic acid (DHA). Its 3-oxoacyl-CoA product is passed to
  the peroxisomal thiolase step (SCPx/ACAA1). Loss of function causes D-bifunctional protein
  deficiency, a severe Zellweger-like neonatal peroxisomal disorder, while milder hypomorphic
  alleles cause Perrault syndrome (sensorineural deafness with ovarian dysgenesis).
