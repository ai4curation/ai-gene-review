core_functions:
- description: >-
    D-specific enoyl-CoA hydratase 2 (D-3-hydroxyacyl-CoA dehydratase) activity: the central
    MaoC/hot-dog-fold domain hydrates a (2E)-enoyl-CoA to a (3R)-3-hydroxyacyl-CoA (EC 4.2.1.119),
    the second reaction of each peroxisomal beta-oxidation cycle, acting on very-long-chain,
    2-methyl-branched (pristanic) and bile-acid-intermediate acyl-CoAs in the peroxisomal matrix.
  supported_by:
  - reference_id: file:human/HSD17B4/HSD17B4-uniprot.txt
    supporting_text: "hydration of 2-enoyl-CoA (trans-2-enoyl-CoA) to"
  - reference_id: PMID:9089413
    supporting_text: "exhibited only the dehydratase activity"
  molecular_function:
    id: GO:0080023
    label: (2E)-enoyl-CoA hydratase activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005782
    label: peroxisomal matrix
- description: >-
    (3R)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity: the N-terminal SDR/Rossmann-fold domain
    oxidizes a (3R)-3-hydroxyacyl-CoA with NAD+ to a 3-oxoacyl-CoA (EC 1.1.1.n12), the third
    reaction of each peroxisomal beta-oxidation cycle; the 3-oxoacyl-CoA product is handed to the
    peroxisomal thiolase step. Acts on the same VLCFA, branched-chain and bile-acid substrates.
  supported_by:
  - reference_id: file:human/HSD17B4/HSD17B4-uniprot.txt
    supporting_text: "dehydrogenation of (3R)-3-"
  - reference_id: PMID:9482850
    supporting_text: "enoyl-CoA hydratase and 3-hydroxyacyl-CoA dehydrogenase activity"
  molecular_function:
    id: GO:0106386
    label: (3R)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005782
    label: peroxisomal matrix
proposed_new_terms: []
suggested_questions:
- question: >-
    Given that DBP's physiological substrates are fatty-acyl-CoAs, should the historical
    17-beta-hydroxysteroid dehydrogenase (estradiol/androgen/estrogen) activities be retained as
    curated functions, or reclassified as in-vitro side activities?
- question: >-
    Which peroxisomal beta-oxidation substrate classes (VLCFA vs pristanic/bile-acid vs
    dicarboxylic vs PUFA/DHA) depend most non-redundantly on DBP versus the L-bifunctional
    protein (EHHADH)?
suggested_experiments:
- description: >-
    Substrate-resolved metabolomics of DBP-null versus EHHADH-null cells to quantify the
    non-redundant contribution of DBP to each acyl-CoA class (VLCFA, pristanoyl, DHCA/THCA,
    C16DCA, C24:6n-3).
- description: >-
    Structure-guided mutagenesis of the hydratase-2 substrate-binding loops to test whether the
    reported steroid dehydrogenase activity and the fatty-acyl dehydrogenase activity can be
    separated, clarifying the physiological relevance of the 17-beta-HSD activity.
