id: Q9NVI1
gene_symbol: FANCI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FANCI (Fanconi anemia group I protein) is a critical component of the Fanconi
  anemia (FA) DNA damage response pathway. FANCI forms a heterodimeric complex
  with FANCD2 (the ID2 complex) that binds and scans double-stranded DNA for
  damage, particularly interstrand cross-links (ICLs). Upon DNA damage or
  replication stress, FANCI is phosphorylated at multiple conserved S/TQ motifs
  by ATR kinase, which serves as a molecular switch to activate the FA pathway
  by promoting monoubiquitination of both FANCD2 and FANCI by the FA core
  complex E3 ligase (FANCL/UBE2T). The monoubiquitinated ID2 complex is then
  retained on chromatin at damage sites, where it coordinates downstream repair
  events including nucleolytic incision near the ICL and translesion DNA
  synthesis. FANCI is itself monoubiquitinated at Lys-523, though this
  modification is partially dispensable for pathway function. FANCI also
  participates in S phase and G2 phase checkpoint activation. Biallelic
  loss-of-function mutations in FANCI cause Fanconi anemia complementation
  group I (FA-I), characterized by bone marrow failure, congenital
  abnormalities, and cancer predisposition.
