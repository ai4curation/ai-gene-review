- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  review:
    summary: >-
      PMID:19946888 is a proteomic study of the membrane proteome of NK
      cells that identified 1843 proteins. FANCI was detected among
      proteins associated with membranes but this is likely a contaminant
      or transient association. FANCI is not known to be a membrane
      protein; it is a soluble nuclear/cytoplasmic protein.
    action: REMOVE
    reason: >-
      FANCI is a soluble nuclear/cytoplasmic protein with no known
      membrane association. Its detection in a membrane proteome study
      (PMID:19946888) likely represents contamination. The study itself
      notes that approximately 60% of identified proteins were not
      predicted membrane proteins. There is no other evidence supporting
      membrane localization of FANCI.
    supported_by:
      - reference_id: PMID:19946888
        supporting_text: >-
          The remaining species were largely involved in cellular processes
          and molecular functions that could be predicted to be transiently
          associated with membranes
