- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IDA
  original_reference_id: PMID:32269332
  qualifier: enables
  review:
    summary: >-
      DNA binding is FANCI's defining biochemical activity and is absent from the GOA export
      even though UniProt carries the DNA-binding keyword. FANCI (within ID2) binds duplex DNA
      with a preference for branched structures and, when monoubiquitinated, clamps around dsDNA.
    action: NEW
    reason: >-
      Structural and biochemical studies show FANCI binds DNA (preferring Holliday junctions,
      overhangs and replication forks) and the monoubiquitinated ID2 complex encircles duplex
      DNA as a sliding clamp. This core molecular function should be represented.
    supported_by:
    - reference_id: PMID:32269332
      supporting_text: >-
        FANCI and FANCD2 are paralogs that bind to DNA with preference for branched structures
        including Holliday junction, overhang and replication fork DNA
    - reference_id: PMID:32269332
      supporting_text: >-
        the monoubiquitinated ID complex loses its preference for ICL and related branched DNA
        structures, and becomes a sliding DNA clamp that can coordinate the subsequent repair
        reactions
core_functions:
- description: >-
    DNA-binding subunit of the FANCI-FANCD2 (ID2) complex: binds duplex DNA (preferring
    branched replication-fork/junction structures) and, upon FANCL/UBE2T-catalyzed
    monoubiquitination on Lys523, converts the complex into a closed sliding clamp that
    encircles DNA at stalled forks and interstrand crosslinks, coordinating downstream ICL
    repair; FANCI is itself required to promote FANCD2 monoubiquitination that activates
    the pathway.
  supported_by:
  - reference_id: PMID:32269332
    supporting_text: >-
      it forms a closed ring that encircles the DNA
  - reference_id: PMID:19965384
    supporting_text: >-
      Using a cell-free system, we showed that FANCI-FANCD2 is required for
      replication-coupled ICL repair in S phase.
  - reference_id: PMID:18931676
    supporting_text: >-
      FANCI phosphorylation exerts an evolutionarily conserved function in inducing FANCD2
      monoubiqutination in human cells as well.
  molecular_function:
