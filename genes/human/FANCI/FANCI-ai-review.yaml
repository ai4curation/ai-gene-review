existing_annotations:
- term:
    id: GO:0070182
    label: DNA polymerase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      FANCI has been shown to interact with DNA polymerase POLN (Q7Z5Q5) by
      co-immunoprecipitation (PMID:19995904). The IBA annotation based on
      phylogenetic inference is consistent with this experimental evidence.
      POLN participates in cross-link repair and homologous recombination,
      and its interaction with FANCI connects the FA pathway to translesion
      synthesis.
    action: ACCEPT
    reason: >-
      The IBA annotation is well-supported by experimental evidence showing
      physical interaction between FANCI and POLN (PMID:19995904). DNA
      polymerase binding is a core function of FANCI in the context of ICL
      repair, where FANCI helps recruit repair factors including polymerases.
    supported_by:
      - reference_id: PMID:19995904
        supporting_text: >-
          we obtained evidence for physical and functional interaction of POLN
          with factors belonging to the Fanconi anemia pathway, a master
          regulator of cross-link repair
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      FANCI is localized to the nucleus, particularly forming foci at sites
      of DNA damage on chromatin. This is well-established by multiple
      experimental studies (PMID:17460694, PMID:17412408). The IEA annotation
      from UniProt subcellular location mapping is correct but less specific
      than nucleoplasm (GO:0005654).
    action: ACCEPT
    reason: >-
      Nuclear localization of FANCI is well-established experimentally.
      UniProt records confirm nucleus localization (PMID:17412408,
      PMID:17460694, PMID:19465922). While nucleoplasm is more specific
      and also annotated, the broader nucleus term is acceptable as an IEA.
    supported_by:
      - reference_id: PMID:17460694
        supporting_text: >-
          A FANCD2 protein sequence-based homology search facilitated the
          discovery of FANCI, a second monoubiquitinated component of the FA
          pathway
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      FANCI has been detected in the cytoplasm. UniProt notes cytoplasmic
      localization based on PMID:18445686. However, that publication is
      about EML3, a nuclear microtubule-binding protein, and FANCI was
      identified as part of a proteomic screen of nuclear proteins. Cytoplasmic
      localization may reflect the non-nuclear pool of FANCI prior to DNA
      damage-induced nuclear accumulation.
    action: ACCEPT
    reason: >-
      UniProt records cytoplasmic localization for FANCI, and it is
      biologically plausible that FANCI shuttles between cytoplasm and
      nucleus. The IEA mapping from UniProt subcellular location is
      acceptable as a secondary localization.
- term:
    id: GO:0006281
    label: DNA repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      FANCI is a core component of the FA DNA repair pathway. Its role in
      DNA repair, particularly ICL repair, is extensively documented
      (PMID:17460694, PMID:19965384, PMID:18931676). The IEA annotation
      from InterPro is correct but could be more specific (e.g., interstrand
      cross-link repair GO:0036297).
    action: ACCEPT
    reason: >-
      DNA repair is unquestionably a core function of FANCI. While ICL repair
      (GO:0036297) is more specific, the broader DNA repair term is acceptable
      for an IEA annotation derived from InterPro domain recognition.
    supported_by:
      - reference_id: PMID:19965384
        supporting_text: >-
          FANCI-FANCD2 is required for replication-coupled ICL repair in S
          phase. Removal of FANCD2 from extracts inhibits both nucleolytic
          incisions near the ICL and translesion DNA synthesis past the lesion
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17460694
  review:
    summary: >-
      This annotation reflects the physical interaction between FANCI and
      FANCD2 (Q9BXW9) demonstrated in PMID:17460694. The FANCI-FANCD2
      interaction is central to FA pathway function. However, 'protein
      binding' is uninformative; a more specific term would be preferable.
    action: MODIFY
    reason: >-
      The interaction between FANCI and FANCD2 is well-established and
      central to FA pathway function. However, GO:0005515 (protein binding)
      is too vague to be informative. The interaction is specifically with
      FANCD2 to form the ID2 complex, which then functions in DNA damage
      recognition and repair.
    proposed_replacement_terms:
