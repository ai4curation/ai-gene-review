          multiple phosphorylation of FancI but not monoubiquitination is
          critical for FancD2 activation following DNA damage. Thus we
          propose that FancI phosphorylation serves as a molecular switch
          in the FA pathway
      - statement: FANCI and FANCD2 colocalize at chromatin foci with BRCA1 and Rad51
        supporting_text: >-
          FancD2 and FancI are both targeted to chromatin and form
          colocalizing foci together with the HR proteins BRCA1 and Rad51
      - statement: FANCI monoubiquitination is largely dispensable for DNA repair
        supporting_text: >-
          these data indicate that the role of FANCI monoubiquitination is
