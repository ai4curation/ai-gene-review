id: Q9NVI1
gene_symbol: FANCI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Fanconi anemia group I protein (FANCI) is the obligate heterodimeric partner of
  FANCD2, with which it forms the FANCI-FANCD2 (ID2) complex, the central effector
  of the Fanconi anemia (FA) DNA interstrand crosslink (ICL) repair pathway. FANCI
  is a large, predominantly alpha-solenoid nuclear protein that binds double-stranded
  DNA with a preference for branched structures (Holliday junctions, overhangs and
  replication forks). During S phase and following genotoxic stress, FANCI is
  monoubiquitinated on Lys523 by the FANCL/UBE2T ubiquitin ligase acting downstream
  of the multi-subunit FA core complex; this event is mutually interdependent with,
  and required to promote, FANCD2 monoubiquitination. Monoubiquitination converts the
  open, trough-like ID2 complex into a closed sliding clamp that encircles duplex DNA
  at stalled replication forks and ICLs, coordinating downstream repair reactions
  including nucleolytic incision/unhooking, translesion synthesis and homologous
  recombination. ATR-dependent phosphorylation of a conserved S/TQ cluster in FANCI
  acts as a molecular switch that activates the pathway. FANCI also contributes to
  replication fork protection and S/G2 checkpoint signaling. Biallelic loss-of-function
  mutations cause Fanconi anemia complementation group I, characterized by bone marrow
  failure, congenital malformations, chromosomal instability, cellular hypersensitivity
  to crosslinking agents, and cancer predisposition.
