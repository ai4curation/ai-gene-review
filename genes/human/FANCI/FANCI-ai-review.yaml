- term:
    id: GO:0031398
    label: positive regulation of protein ubiquitination
  evidence_type: IDA
  original_reference_id: PMID:18931676
  review:
    summary: >-
      PMID:18931676 demonstrates that FANCI phosphorylation functions as
      a molecular switch to activate FANCD2 monoubiquitination. Multiple
      phosphorylation of FANCI at S/TQ motifs is a prerequisite for
      FANCD2 monoubiquitination. The phosphomimic FANCI Dx6 mutant
      constitutively activates FANCD2 monoubiquitination. This annotation
      captures FANCI's role in positively regulating FANCD2
      ubiquitination.
    action: ACCEPT
    reason: >-
      FANCI phosphorylation directly promotes FANCD2 monoubiquitination,
      which is the central activation event in the FA pathway. This is
      a core function of FANCI demonstrated with strong genetic and
      biochemical evidence (PMID:18931676).
    supported_by:
      - reference_id: PMID:18931676
        supporting_text: >-
          multiple phosphorylation of FancI but not monoubiquitination is
          critical for FancD2 activation following DNA damage. Thus we
          propose that FancI phosphorylation serves as a molecular switch
          in the FA pathway
      - reference_id: PMID:18931676
        supporting_text: >-
          multiple and redundant phosphorylation in the S/TQ cluster domain
          is a prerequisite for induction of monoubiquitination of FancD2
          and FancI, and for their DNA repair function
