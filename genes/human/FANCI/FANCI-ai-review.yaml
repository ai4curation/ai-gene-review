core_functions:
  - description: >-
      FANCI forms a heterodimeric complex with FANCD2 (the ID2 complex) that
      binds and scans double-stranded DNA for damage, particularly at junctions
      between dsDNA and ssDNA. Upon DNA damage, FANCI is phosphorylated at
      multiple S/TQ motifs by ATR kinase, which promotes monoubiquitination of
      both FANCD2 and FANCI by the FANCL E3 ligase. The monoubiquitinated ID2
      complex is retained on chromatin at damage sites where it coordinates
      downstream ICL repair steps including nucleolytic incision and translesion
      synthesis. This is the primary evolved function of FANCI.
    molecular_function:
      id: GO:0003690
      label: double-stranded DNA binding
    locations:
      - id: GO:0005654
        label: nucleoplasm
      - id: GO:0000785
        label: chromatin
    directly_involved_in:
      - id: GO:0036297
        label: interstrand cross-link repair
    supported_by:
      - reference_id: PMID:19965384
        supporting_text: >-
          FANCI-FANCD2 is required for replication-coupled ICL repair in S
          phase. Removal of FANCD2 from extracts inhibits both nucleolytic
          incisions near the ICL and translesion DNA synthesis past the
          lesion. Reversal of these defects requires ubiquitylated
          FANCI-FANCD2
      - reference_id: PMID:18931676
        supporting_text: >-
          multiple phosphorylation of FancI but not monoubiquitination is
          critical for FancD2 activation following DNA damage. Thus we
          propose that FancI phosphorylation serves as a molecular switch
          in the FA pathway
  - description: >-
      FANCI positively regulates protein ubiquitination by promoting
      monoubiquitination of FANCD2 through its phosphorylation-dependent
      activation of the FA pathway. FANCI phosphorylation at S/TQ motifs
      serves as a molecular switch that is required for FANCD2
      monoubiquitination and chromatin targeting.
    molecular_function:
      id: GO:0003690
      label: double-stranded DNA binding
    locations:
      - id: GO:0005654
        label: nucleoplasm
    directly_involved_in:
      - id: GO:0031398
        label: positive regulation of protein ubiquitination
    supported_by:
      - reference_id: PMID:18931676
        supporting_text: >-
          multiple and redundant phosphorylation in the S/TQ cluster domain
          is a prerequisite for induction of monoubiquitination of FancD2
          and FancI, and for their DNA repair function
proposed_new_terms: []
suggested_questions:
  - question: >-
      What is the precise structural mechanism by which FANCI phosphorylation
      promotes FANCD2 monoubiquitination? Does phosphorylation alter the
      conformation of the ID2 complex to expose the ubiquitination site?
  - question: >-
      Does FANCI have additional functions beyond ICL repair, for example in
      replication fork protection or checkpoint signaling independent of FANCD2?
  - question: >-
      What are the relative contributions of individual FANCI S/TQ
      phosphorylation sites to pathway activation in human cells?
suggested_experiments:
  - description: >-
      High-resolution cryo-EM of phosphorylated vs. unphosphorylated
      FANCI-FANCD2 complex to understand how phosphorylation promotes
      ubiquitination.
  - description: >-
      Separation-of-function mutations in FANCI to distinguish its roles in
      ICL repair, HR, and checkpoint activation.
