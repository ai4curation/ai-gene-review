- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:31240132
  review:
    summary: >-
      This annotation reflects the physical interaction between FANCI and
      CTDP1 (Q9Y5B0), a BRCT domain-containing phosphatase, as demonstrated
      in PMID:31240132. CTDP1 regulates multiple aspects of FANCI activity
      including chromatin localization and SQ motif phosphorylation.
      GO:0005515 (protein binding) is uninformative.
    action: MODIFY
    reason: >-
      The FANCI-CTDP1 interaction is real but GO:0005515 does not provide
      useful information about FANCI function. The interaction with CTDP1
      relates to regulation of FANCI phosphorylation and chromatin
      localization in the DNA damage response.
    proposed_replacement_terms:
      - id: GO:0003690
        label: double-stranded DNA binding
    supported_by:
      - reference_id: PMID:31240132
        supporting_text: >-
          CTDP1 expression promotes DNA damage-induced FANCA and FANCD2 foci
          formation and enhances homologous recombination repair efficiency.
          CTDP1 was found to regulate multiple aspects of FANCI activity,
          including chromatin localization, interaction with γ-H2AX, and SQ
          motif phosphorylations
- term:
    id: GO:0000785
    label: chromatin
  evidence_type: NAS
  original_reference_id: PMID:19965384
  review:
    summary: >-
      FANCI localizes to chromatin as part of the FANCI-FANCD2 complex.
      PMID:19965384 demonstrates that ubiquitinated FANCI-FANCD2 is required
      for replication-coupled ICL repair. The NAS annotation from
      ComplexPortal is consistent with extensive evidence that
      monoubiquitinated FANCI-FANCD2 is targeted to chromatin
      (PMID:18931676).
    action: ACCEPT
    reason: >-
      Chromatin localization of FANCI is well-supported. The FANCI-FANCD2
      complex is targeted to chromatin upon monoubiquitination, and this
      chromatin association is essential for DNA repair function
      (PMID:18931676, PMID:19965384).
    supported_by:
      - reference_id: PMID:18931676
        supporting_text: >-
          FancD2 and FancI are both targeted to chromatin and form
          colocalizing foci together with the HR proteins BRCA1 and Rad51
      - reference_id: PMID:19965384
        supporting_text: >-
          FANCI-FANCD2 is required for replication-coupled ICL repair in S
          phase
- term:
    id: GO:0036297
    label: interstrand cross-link repair
  evidence_type: NAS
  original_reference_id: PMID:19965384
  review:
    summary: >-
      FANCI plays a central role in interstrand cross-link repair as part
      of the FANCI-FANCD2 complex. PMID:19965384 directly demonstrates
      that ubiquitinated FANCI-FANCD2 is required for multiple steps of
      replication-coupled ICL repair including nucleolytic incisions and
      translesion synthesis.
    action: ACCEPT
    reason: >-
      ICL repair is a core function of FANCI. The evidence is strong and
      direct from PMID:19965384, which used a cell-free system to
      demonstrate the requirement for FANCI-FANCD2 in ICL repair.
    supported_by:
      - reference_id: PMID:19965384
        supporting_text: >-
          FANCI-FANCD2 is required for replication-coupled ICL repair in S
          phase. Removal of FANCD2 from extracts inhibits both nucleolytic
          incisions near the ICL and translesion DNA synthesis past the
          lesion. Reversal of these defects requires ubiquitylated
          FANCI-FANCD2
