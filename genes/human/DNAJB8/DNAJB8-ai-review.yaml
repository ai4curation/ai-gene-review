gene_symbol: DNAJB8
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  DNAJB8 is a class B J-domain protein (Hsp40/DNAJ family, subfamily B) that functions
  as a potent holdase chaperone suppressing polyglutamine and other aggregation-prone
  protein aggregation. Its domain architecture comprises an N-terminal J-domain (JD),
  a G/F-rich region, an S/T-rich region containing the key 147-AFSSFN-152 steric-zipper
  oligomerization motif, and a C-terminal domain (CTD). A key regulatory mechanism
  is an intramolecular JD-CTD interaction that can sequester the JD surface and control
  Hsp70 recruitment as a reversible switch (DOI:10.1038/s41467-021-21147-x). Unlike
  canonical DNAJ co-chaperones that assist Hsp70-mediated protein refolding, DNAJB8
  acts primarily as a holdase, with anti-aggregation activity largely independent
  of the J-domain residing in the C-terminal serine-rich (SSF-SST) region and C-terminal
  tail (PMID:20159555). DNAJB8 self-assembles into oligomeric puncta via the AFSSFN
  steric-zipper motif (resolved at 0.75 angstrom by MicroED, class 6 steric zipper),
  but engineered monomeric variants retain substrate binding and anti-aggregation
  function, demonstrating that oligomerization is mechanistically separable from chaperone
  activity (DOI:10.1016/j.str.2024.02.015). DNAJB8 uses distinct substrate-binding
  modes: a serine-rich stretch for fibrillar/amyloid aggregation suppression and a
  separate CTD TTK-LKS motif for amorphous inclusion suppression via Hsp70-dependent
  proteasomal degradation (DOI:10.1242/jcs.255596). DNAJB8 is also a cancer-testis
  antigen preferentially expressed in renal and colorectal cancer stem-like cells,
  controlling tumor-initiating capacity (DOI:10.1158/0008-5472.CAN-11-3062), and promotes
  oxaliplatin chemoresistance in colon cancer via TP53 stabilization leading to MDR1/P-gp
  upregulation (DOI:10.1038/s41419-022-04599-x). DNAJB8 is enriched in testis; cytosolic
  proteostasis is the best-supported functional context in accessible sources, while
  DNAJB8-specific nuclear localization evidence is weaker in the local publication
  cache.
