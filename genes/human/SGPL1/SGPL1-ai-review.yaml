id: O95470
gene_symbol: SGPL1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SGPL1 is sphingosine-1-phosphate lyase 1, a pyridoxal 5'-phosphate (PLP)-dependent
  enzyme (EC 4.1.2.27) anchored in the endoplasmic reticulum membrane that catalyzes
  the final, irreversible degradative step of sphingolipid metabolism. It cleaves
  phosphorylated sphingoid bases, chiefly sphingosine-1-phosphate (S1P; also
  sphinganine 1-phosphate), into a long-chain fatty aldehyde ((2E)-hexadecenal or
  hexadecanal) plus phosphoethanolamine. This reaction has no reverse counterpart and
  is the only exit from the sphingolipid pathway, channeling sphingoid-derived carbon
  into glycerolipid and ethanolamine-phosphate metabolism. The catalytic domain faces
  the cytosol; the enzyme is a homodimer that binds PLP covalently through a Schiff
  base to Lys-353. By irreversibly degrading S1P, SGPL1 terminates S1P signaling and
  helps establish the tissue-to-blood/lymph S1P gradient that governs lymphocyte
  egress and immune function, and it acts as a modulator of the ceramide/S1P
  "rheostat" controlling cell survival. Biallelic loss-of-function variants cause an
  autosomal-recessive syndrome (SPLIS / RENI, MIM:617575) featuring steroid-resistant
  nephrotic syndrome, primary adrenal insufficiency, ichthyosis, immunodeficiency, and
  neurological defects.
