core_functions:
- description: >-
    PLP-dependent sphingosine-1-phosphate lyase activity: cleaves phosphorylated sphingoid
    bases (sphingosine-1-phosphate / sphinganine 1-phosphate) into a long-chain fatty aldehyde
    ((2E)-hexadecenal / hexadecanal) and phosphoethanolamine, using covalently bound pyridoxal
    5'-phosphate (Schiff base to Lys-353). This is the final, irreversible step of sphingolipid
    catabolism, performed at the cytoplasmic face of the endoplasmic reticulum membrane.
  molecular_function:
    id: GO:0008117
    label: sphinganine-1-phosphate aldolase activity
  directly_involved_in:
  - id: GO:0030149
    label: sphingolipid catabolic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  supported_by:
  - reference_id: PMID:11018465
    supporting_text: >-
      Sphingosine-1-phosphate lyase catalyzes the last step in sphingolipid breakdown, the
      cleavage of phosphorylated sphingoid bases such as sphingenine-1-phosphate.
  - reference_id: PMID:14570870
    supporting_text: >-
      The recombinant enzyme was active, localized to the endoplasmic reticulum, and
      reduced baseline sphingosine and sphingosine 1-phosphate levels.
  - reference_id: PMID:28165339
    supporting_text: >-
      expression of WT human SGPL1 rescued growth of SGPL1-deficient dpl1Δ yeast strains,
      whereas expression of disease-associated variants did not.
- description: >-
    Pyridoxal 5'-phosphate binding: SGPL1 is a PLP-dependent (fold-type I / group II
    decarboxylase family) enzyme; the PLP cofactor is essential for catalysis and is bound
    covalently at the active site. This molecular-function feature underpins the lyase activity.
  molecular_function:
    id: GO:0030170
    label: pyridoxal phosphate binding
  supported_by:
  - reference_id: PMID:24809814
    supporting_text: >-
      as seen in the cocrystal structure of derivative 31 with the homodimeric human S1P lyase.
proposed_new_terms: []
suggested_questions:
- question: >-
    Beyond homodimerization, does SGPL1 have any physiologically meaningful, specific protein
    partner (e.g. a channeling or regulatory complex), or are the reported binary interactome
    hits largely incidental ER co-localization?
suggested_experiments:
- description: >-
    Structure-guided in-vitro kinetics on purified WT vs SPLIS/RENI disease variants (e.g. R222Q,
    S346I) to quantify how each mutation affects PLP binding, substrate turnover, protein stability,
    and dimerization, mapping enzymatic loss to clinical severity.
  hypothesis: >-
    SPLIS/RENI disease severity correlates with the degree of residual S1P-lyase catalytic activity
    and protein stability of the mutant enzyme.
  experiment_type: enzyme kinetics / protein biochemistry
