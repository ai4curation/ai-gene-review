- description: ATP6V0A4 is the a4 isoform of the membrane-integral V0 a subunit of the V-ATPase. As part of the V0 sector, it contributes to the assembled V-ATPase rotational proton-pump activity, linking ATP hydrolysis by V1 to proton transfer across membranes.
