suggested_questions:
- question: Should ATP6V0A4 be annotated to GO:0007042 lysosomal lumen acidification or GO:0046610 lysosomal proton-transporting V-type ATPase, V0 domain in human, or should those PN projections be limited to V-ATPase a-subunit isoforms with stronger lysosomal evidence? Existing ATP6V0A4 evidence supports V0 membership, broad organellar/vacuolar acidification, and high-throughput lysosomal membrane detection, but its best-supported isoform-specific biology is renal apical plasma membrane acid secretion.
  experts:
  - Karet FE
  - Wagner CA
  - Rubinstein JL
suggested_experiments:
- hypothesis: ATP6V0A4 has a context-specific lysosomal role only in cell types where the a4 isoform is targeted to endolysosomal membranes.
  description: Use endogenous tagging or isoform-specific antibodies in human kidney intercalated-cell models and inner-ear-relevant cells, combined with LAMP1/RAB7 colocalization and lysosomal pH reporters, to distinguish lysosomal ATP6V0A4 from apical plasma membrane pools.
  experiment_type: cell localization and lysosomal pH assay
- hypothesis: PFK-1 binding modulates ATP6V0A4-containing V-ATPase proton transport by affecting V1/V0 coupling rather than complex targeting.
  description: Compare wild-type ATP6V0A4 and PFK-binding-defective disease variants in a human epithelial rescue system, measuring V-ATPase assembly, membrane targeting, ATPase activity, and proton transport separately.
  experiment_type: structure-function rescue assay
