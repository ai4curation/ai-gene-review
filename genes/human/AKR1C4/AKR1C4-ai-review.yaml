- term:
    id: GO:0047086
    label: ketosteroid monooxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Ketosteroid monooxygenase activity (an oxygen-incorporating, Baeyer-Villiger-type reaction)
      is mechanistically wrong for AKR1C4, which is an NADPH-dependent ketosteroid reductase/hydroxysteroid
      dehydrogenase, not a monooxygenase. This appears to be an erroneous IBA propagation.
    action: REMOVE
    reason: >-
      Monooxygenase activity is the wrong enzyme class for a cytosolic NADPH-dependent AKR reductase;
      no support for oxygenase chemistry. IBA over-propagation.
