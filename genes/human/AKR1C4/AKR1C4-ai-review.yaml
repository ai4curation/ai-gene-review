id: P17516
gene_symbol: AKR1C4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AKR1C4 (3-alpha-hydroxysteroid 3-dehydrogenase type 1; historically chlordecone
  reductase / dihydrodiol dehydrogenase 4) is a cytosolic, NADPH-dependent aldo-keto
  reductase of the AKR1C subfamily. It is virtually liver-specific and is the most
  catalytically efficient of the four human AKR1C 3-alpha-hydroxysteroid dehydrogenase
  isoforms. It catalyzes NADPH-dependent reduction of the 3-oxo group of steroids to
  the corresponding 3-alpha- (and 3-beta-) hydroxysteroid, and more broadly reduces
  ketosteroids to hydroxysteroids with positional/stereochemical plasticity, generating
  3-alpha/beta-, 17-beta- and 20-alpha-hydroxysteroids. In bile-acid biosynthesis it
  provides the hepatic 3-alpha-hydroxysteroid dehydrogenase step, reducing the 3-oxo
  group of the 5-beta-reduced bile-acid intermediates downstream of the AKR1D1
  5-beta-reductase. In steroid-hormone metabolism it acts mainly as a pre-receptor
  reductase, inactivating 5-alpha-dihydrotestosterone to 3-alpha/3-beta-androstanediols
  and reducing progestins to their 20-alpha/3-alpha-hydroxy products (including neuroactive
  allopregnanolone-type steroids), and it can reduce sulfate- and glucuronide-conjugated
  androgens. It also biotransforms the pesticide chlordecone to chlordecone alcohol,
  promoting biliary excretion. The enzyme is a monomer with a canonical (alpha/beta)8-barrel
  aldo-keto reductase fold that binds NADP(H).
