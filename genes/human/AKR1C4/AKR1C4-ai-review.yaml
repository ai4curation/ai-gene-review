    summary: >-
      The cited study shows that jasmonic acid / methyl jasmonate (plant-derived anticancer compounds)
      INHIBIT the AKR1C enzymes; i.e. AKR1C4 is a drug target of jasmonates, not a participant in a
      "cellular response to jasmonic acid stimulus" signaling process. Jasmonic-acid signaling is a plant
      process and there is no endogenous jasmonate pathway in human liver. This BP annotation
      mis-casts a pharmacological inhibition assay as a stimulus-response process.
