- id: PMID:10634139
  title: Characterization of a novel variant (S145C/L311V) of 3alpha-hydroxysteroid/dihydrodiol
    dehydrogenase in human liver.
  findings:
  - statement: >-
      Human liver 3alpha-hydroxysteroid/dihydrodiol dehydrogenase (AKR1C4) is involved in the metabolism of
      steroid hormones and polycyclic aromatic hydrocarbons and reduces ketone-containing drugs; the S145C/L311V
      variant has 3-5-fold reduced activity.
    reference_section_type: ABSTRACT
    supporting_text: "Human liver 3alpha-hydroxysteroid/dihydrodiol dehydrogenase (DD) is involved in \nthe metabolism of steroid hormones and polycyclic aromatic hydrocarbons"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports 3alpha-HSD/dihydrodiol dehydrogenase activity of the human liver enzyme and the
      L311V/S145C polymorphism noted in UniProt.
- id: PMID:10998348
  title: 'Human 3alpha-hydroxysteroid dehydrogenase isoforms (AKR1C1-AKR1C4) of the
    aldo-keto reductase superfamily: functional plasticity and tissue distribution
    reveals roles in the inactivation and formation of male and female sex hormones.'
  findings:
  - statement: >-
      AKR1C4 is the type 1 3alpha-HSD, the most catalytically efficient AKR1C isoform, virtually liver-specific,
      and inactivates 5alpha-DHT to 3alpha-androstanediol; the isoforms modulate levels of active androgens,
      estrogens and progestins.
    reference_section_type: ABSTRACT
    supporting_text: "AKR1C4 was virtually liver-specific \nand its high k(cat)/K(m) allows this enzyme to form \n5alpha/5beta-tetrahydrosteroids robustly"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only but foundational characterization of the four AKR1C 3alpha-HSDs including AKR1C4 substrate
      specificity and tissue distribution.
- id: PMID:11158055
  title: 'Human types 1 and 3 3 alpha-hydroxysteroid dehydrogenases: differential
    lability and tissue distribution.'
  findings:
  - statement: >-
      Human type 1 3alpha-HSD (AKR1C4) efficiently converts dihydrotestosterone to 3alpha-diol and is expressed
      exclusively in the liver; 3alpha-HSDs act on glucocorticoids, progestins, prostaglandins, bile acid
      precursors and xenobiotics.
    reference_section_type: ABSTRACT
    supporting_text: "3 alpha-HSDs are involved in the \nmetabolism of glucocorticoids, progestins, prostaglandins, bile acid precursors"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports liver-exclusive expression and 3alpha-HSD activity (including bile-acid-precursor role).
- id: PMID:14672942
  title: 'Human cytosolic 3alpha-hydroxysteroid dehydrogenases of the aldo-keto reductase
    superfamily display significant 3beta-hydroxysteroid dehydrogenase activity: implications
    for steroid hormone metabolism and action.'
  findings:
  - statement: >-
      AKR1C enzymes (including AKR1C4) catalyze reduction of DHT into both 3alpha- and 3beta-androstanediol and
      act as non-positional-specific 3alpha-/17beta-/20alpha-HSDs; in vivo they work preferentially as reductases
      because NADPH inhibits the oxidase direction.
    reference_section_type: ABSTRACT
    supporting_text: "in vivo all AKR1Cs will preferentially \nwork as reductases"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports the 3beta-HSD activity and the in-vivo reductive directionality of AKR1C4.
- id: PMID:19218247
  title: 'Human cytosolic hydroxysteroid dehydrogenases of the aldo-ketoreductase
    superfamily catalyze reduction of conjugated steroids: implications for phase
    I and phase II steroid hormone metabolism.'
  findings:
  - statement: >-
      AKR1C4 reduces conjugated (sulfate/glucuronide) DHT with superior catalytic efficiency unaffected by
      conjugation, and drives the hepatic "conjugation pathway" (UGT2B17 then AKR1C4) for DHT metabolism.
    reference_section_type: RESULTS
    supporting_text: "AKR1C4 is set to be the most important 3-keto reductase for Dht metabolism"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; establishes AKR1C4 as the dominant, most efficient hepatic 3-keto reductase for
      free and conjugated DHT.
- id: PMID:19487289
  title: AKR1C isoforms represent a novel cellular target for jasmonates alongside
    their mitochondrial-mediated effects.
  findings:
  - statement: >-
      Jasmonic acid and methyl jasmonate inhibit all four human AKR1C isoforms; AKR1C enzymes are a
      pharmacological target of jasmonates in cancer cells.
    reference_section_type: ABSTRACT
    supporting_text: "jasmonic acid (JA) and methyl jasmonate \n(MeJ) are capable of inhibiting all four human AKR1C isoforms"
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      The paper shows jasmonate INHIBITION of AKR1C enzymes (drug-target relationship), so its use to support a
      "cellular response to jasmonic acid stimulus" process annotation is a misinterpretation.
- id: PMID:20837989
  title: Naturally occurring variants of human aldo-keto reductases with reduced in
    vitro metabolism of daunorubicin and doxorubicin.
  findings:
  - statement: >-
      The L311V variant of AKR1C4 significantly reduces in-vitro daunorubicin metabolism; ns-SNPs in AKR1C4
      decrease in-vitro metabolism of doxorubicin and daunorubicin to their alcohol metabolites.
    reference_section_type: ABSTRACT
    supporting_text: "the L311V variant of AKR1C4 significantly decreased V(max)"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports AKR1C4 anthracycline (doxorubicin/daunorubicin) carbonyl-reductase drug metabolism.
- id: PMID:21802064
  title: 'Why boys will be boys: two pathways of fetal testicular androgen biosynthesis
    are needed for male sexual differentiation.'
  findings:
  - statement: >-
      A splicing mutation causing loss of AKR1C4 exon 2 co-occurs with causative AKR1C2 mutations in 46,XY DSD
      individuals, worsening the phenotype; AKR1C4 acts as a disease modifier in the alternative (backdoor)
      androgen pathway required for male sexual differentiation.
    reference_section_type: ABSTRACT
    supporting_text: "The 46,XY DSD individuals also \ncarry a mutation causing aberrant splicing in AKR1C4"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports the SRXY8 disease-modifier role and AKR1C4's 3alpha-HSD activity in the backdoor pathway.
- id: PMID:21851338
  title: Retinaldehyde is a substrate for human aldo-keto reductases of the 1C subfamily.
  findings:
  - statement: >-
      Human AKR1C enzymes (all except AKR1C2, so including AKR1C4) show retinaldehyde reductase activity with
      low Km (~1 uM), linking AKR1C to retinoid metabolism.
    reference_section_type: ABSTRACT
    supporting_text: "retinaldehyde reductase activity with low Km values"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; supports retinaldehyde (retinoid) reductase activity as a minor AKR1C4 function.
- id: PMID:2187532
  title: Isolation and characterization of cloned cDNAs encoding human liver chlordecone
    reductase.
  findings:
  - statement: >-
      Chlordecone (Kepone) is bioreduced to chlordecone alcohol in human liver by the cytosolic enzyme
      chlordecone reductase (CDR), later identified as AKR1C4.
    reference_section_type: ABSTRACT
    supporting_text: "Chlordecone (Kepone), a toxic organochlorine pesticide, undergoes bioreduction \nto chlordecone alcohol in human liver"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; cloning of the human liver chlordecone reductase (= AKR1C4), supports chlordecone reductase activity.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: >-
      Large-scale shotgun proteomics of urinary prostatic-secretion exosomes detected ~900 proteins; AKR1C4 was
      among proteins catalogued (basis for the HDA extracellular-exosome annotation).
    reference_section_type: ABSTRACT
    supporting_text: "In pooled EPS-urine exosome \nsamples, ~900 proteins were detected"
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; a bulk proteomic exosome catalog. Correctly cited but not evidence of a functional
      extracellular localization for this cytosolic liver enzyme.
- id: PMID:2427522
  title: Purification and characterization of chlordecone reductase from human liver.
  findings:
  - statement: >-
      Human liver chlordecone reductase was purified and characterized as a hepatic cytosolic aldo-keto
      reductase reducing chlordecone to its alcohol.
    reference_section_type: ABSTRACT
    supporting_text: "We purified this enzyme from human liver"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; direct purification/characterization of chlordecone reductase (= AKR1C4).
- id: PMID:28514442
  title: Architecture of the human interactome defines protein communities and disease
    networks.
  findings:
  - statement: >-
      Proteome-scale affinity-purification (BioPlex) interactome study; source of high-throughput AKR1C4
      protein-protein interaction (protein binding) annotations.
    reference_section_type: ABSTRACT
    supporting_text: Architecture of the human interactome defines protein communities
      and disease networks
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale interactome screen; supports generic protein-binding annotations but not a specific molecular function.
- id: PMID:33961781
  title: Dual proteome-scale networks reveal cell-specific remodeling of the human
    interactome.
  findings:
  - statement: >-
      BioPlex 3.0 proteome-scale interactome study; source of additional high-throughput AKR1C4 protein-protein
      interaction (protein binding) annotations.
    reference_section_type: ABSTRACT
    supporting_text: Dual proteome-scale networks reveal cell-specific remodeling of
      the human interactome
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale interactome screen; supports generic protein-binding annotations but not a specific molecular function.
- id: PMID:7650035
  title: Substrate specificity, gene structure, and tissue-specific distribution of
    multiple human 3 alpha-hydroxysteroid dehydrogenases.
  findings:
  - statement: >-
      The expressed liver type 1 3alpha-HSD (AKR1C4) interconverts 5alpha-dihydrotestosterone and
      5alpha-androstane-3alpha,17beta-diol and its mRNA is found only in the liver.
    reference_section_type: ABSTRACT
    supporting_text: "interconversion between 5 alpha-dihydrotestosterone and 5 \nalpha-androstane-3 alpha,17 beta-diol"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; establishes AKR1C4 (type 1 3alpha-HSD) DHT/3alpha-diol interconversion and liver-restricted expression.
- id: PMID:8172617
  title: Molecular cloning of two human liver 3 alpha-hydroxysteroid/dihydrodiol dehydrogenase
    isoenzymes that are identical with chlordecone reductase and bile-acid binder.
  findings:
  - statement: >-
      DD4 (= AKR1C4) is a human liver 3alpha-hydroxysteroid/dihydrodiol dehydrogenase whose cDNA is virtually
      identical with human chlordecone reductase; the related DD2 corresponds to the "bile-acid binder".
    reference_section_type: ABSTRACT
    supporting_text: "virtually identical with those of human bile-acid \nbinder and human chlordecone reductase cDNAs"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only; cloning identity of AKR1C4 with chlordecone reductase. Note the "bile-acid binder" is the
      related DD2 isoenzyme; the transporter/transport GO annotations attached to this reference over-interpret binding.
- id: PMID:8274401
  title: Molecular cloning of multiple cDNAs encoding human enzymes structurally related
    to 3 alpha-hydroxysteroid dehydrogenase.
  findings:
  - statement: >-
      Cloning of multiple human cDNAs encoding enzymes structurally related to 3alpha-hydroxysteroid dehydrogenase,
      the family that includes AKR1C4, supporting a role in steroid metabolism.
    reference_section_type: ABSTRACT
    supporting_text: "3 alpha-hydroxysteroid dehydrogenase"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cloning paper; supports the general steroid-metabolism annotation.
