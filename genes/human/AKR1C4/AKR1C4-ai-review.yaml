- term:
    id: GO:0032052
    label: bile acid binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      AKR1C4 was historically identified as the human liver "bile-acid binder" (the DD4/
      chlordecone reductase protein). Bile-acid binding is plausible given its role in
      bile-acid biosynthesis, but the biologically salient activity is the enzymatic
      3-alpha-hydroxysteroid dehydrogenase step rather than a binding function per se.
      Retained as non-core.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: PMID:8172617
      supporting_text: "virtually identical with those of human bile-acid \nbinder and human chlordecone reductase cDNAs"
    reason: >-
      Supported by historical identity with "bile-acid binder", but a molecular binding
      term is less informative than the catalytic bile-acid role; kept as non-core.
