- term:
    id: GO:0004032
    label: aldose reductase (NADPH) activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) propagation of a generic aldose/aldehyde reductase activity
      across the AKR1 family. AKR1C4 is characterized as a hydroxysteroid dehydrogenase /
      ketosteroid reductase, not an aldose (aldehyde) reductase; there is no experimental
      support for aldose reductase activity for this liver enzyme. This is a family-level
      over-propagation to the wrong AKR subfunction.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Generic aldose reductase activity is an IBA guess from the broad AKR1 tree; AKR1C4's
      documented catalysis is 3-alpha/beta-hydroxysteroid dehydrogenase/reductase, not aldose reduction.
