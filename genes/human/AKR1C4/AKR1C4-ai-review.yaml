core_functions:
- description: >-
    NADPH-dependent 3-alpha(and 3-beta)-hydroxysteroid dehydrogenase / ketosteroid reductase: reduces the
    3-oxo group of steroids to the 3-hydroxy form (and catalyzes the reverse oxidation), the core catalytic
    activity underlying both bile-acid synthesis and steroid-hormone pre-receptor metabolism.
  molecular_function:
    id: GO:0140169
    label: 3-alpha-hydroxysteroid 3-dehydrogenase [NAD(P)+] activity
  supported_by:
  - reference_id: PMID:10998348
    supporting_text: "type 1 3alpha-HSD \n(AKR1C4)"
  - reference_id: PMID:14672942
    supporting_text: "known to act as non-positional-specific \n3alpha-/17beta-/20alpha-HSDs"
- description: >-
    Binds the NADP(H) cofactor required for its reductase/dehydrogenase chemistry; the crystal structure of
    AKR1C4 in complex with NADP+ defines an extensive cofactor-binding pocket.
  molecular_function:
    id: GO:0050661
    label: NADP binding
  supported_by:
  - reference_id: file:human/AKR1C4/AKR1C4-uniprot.txt
    supporting_text: "COMPLEX WITH NADP(+)"
  - reference_id: file:human/AKR1C4/AKR1C4-uniprot.txt
    supporting_text: "Cytosolic aldo-keto reductase that catalyzes NADPH-dependent"
- description: >-
    Functions in bile-acid biosynthesis as the hepatic 3-alpha-hydroxysteroid dehydrogenase that reduces the
    3-oxo group of the 5-beta-reduced bile-acid intermediates (downstream of the AKR1D1 5-beta-reductase).
  molecular_function:
    id: GO:0140169
    label: 3-alpha-hydroxysteroid 3-dehydrogenase [NAD(P)+] activity
  supported_by:
  - reference_id: PMID:11158055
    supporting_text: "3 alpha-HSDs are involved in the \nmetabolism of glucocorticoids, progestins, prostaglandins, bile acid precursors"
  directly_involved_in:
  - id: GO:0006699
    label: bile acid biosynthetic process
- description: >-
    Functions in steroid-hormone (notably androgen) metabolism, inactivating 5-alpha-dihydrotestosterone to
    3-alpha/3-beta-androstanediols and interconverting other C19/C21 steroids, thereby regulating ligand
    availability for steroid hormone receptors.
  molecular_function:
    id: GO:0140169
    label: 3-alpha-hydroxysteroid 3-dehydrogenase [NAD(P)+] activity
  supported_by:
  - reference_id: PMID:10998348
    supporting_text: "ability to modulate the \nlevels of active androgens, oestrogens and progestins"
  - reference_id: PMID:7650035
    supporting_text: "interconversion between 5 alpha-dihydrotestosterone and 5 \nalpha-androstane-3 alpha,17 beta-diol"
  directly_involved_in:
  - id: GO:0008209
    label: androgen metabolic process
