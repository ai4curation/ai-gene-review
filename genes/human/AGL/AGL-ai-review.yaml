    supporting_text: the antiserum detected no cross-reactive material in any of the liver or muscle samples from patients
proposed_new_terms: []
suggested_questions:
- question: >-
    Do the two catalytic domains of AGL act processively on the same glycogen molecule, and
    what is the structural basis (from cryo-EM structure PDB 8ZEQ) for coordinating the
    transferase and glucosidase activities on a single polypeptide?
- question: >-
    What is the functional significance of AGL's condition-dependent nuclear relocalization
    during glycogenolysis, and does the nuclear pool have a distinct role?
suggested_experiments:
- description: >-
    Structure-guided mutagenesis of the predicted active-site residues (526, 529, 627) to
    dissect the contributions of the transferase versus glucosidase activities to glycogen
    debranching, and to model GSD III subtypes IIIc/IIId (selective loss of one activity).
- description: >-
    Quantitative analysis of AGL subcellular redistribution (cytosol to nucleus) as a function
    of glycogen depletion and hormonal stimulation, to determine whether nuclear localization
    is functional or a regulatory sequestration mechanism.
