id: P35573
gene_symbol: AGL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  AGL (glycogen debranching enzyme, GDE) is a large (~175 kDa, 1532 aa) cytosolic,
  bifunctional enzyme that carries two independent catalytic activities on a single
  polypeptide and, working together with glycogen phosphorylase, completes the
  degradation of glycogen branch points. When phosphorylase stalls about four glucose
  residues from an alpha-1,6 branch point (leaving a phosphorylase limit dextrin),
  AGL's 4-alpha-glucanotransferase activity (EC 2.4.1.25) transfers a maltotriose
  (three-glucose) segment from the branch to a nearby non-reducing alpha-1,4 chain end,
  exposing the single glucose still attached by an alpha-1,6 linkage; AGL's
  amylo-alpha-1,6-glucosidase activity (EC 3.2.1.33) then hydrolyses that alpha-1,6 bond
  to release free glucose. AGL is a monomer and belongs to the glycogen debranching
  enzyme family (glycoside hydrolase families GH13/GH133). Loss of AGL function causes
  glycogen storage disease type III (Cori disease / Forbes disease), characterized by
  accumulation of abnormally structured glycogen with short outer chains
  (limit-dextrin-like), and clinically by hepatomegaly, fasting hypoglycemia, short
  stature, skeletal myopathy and cardiomyopathy.
