    label: glycogen biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >-
      AGL is a glycogen degradation (catabolic) enzyme, not a biosynthetic enzyme. Its
      two activities (transferase and glucosidase) act to break down glycogen branches
      and release glucose; it plays no role in glycogen synthesis.
    action: REMOVE
    reason: >-
      Directionally incorrect electronic mapping. AGL functions in glycogen catabolism,
      and its loss causes accumulation (not deficiency) of glycogen; UniProt describes it
      as acting "in glycogen degradation." Assigning a biosynthetic process to a catabolic
      enzyme is a demonstrably wrong IEA (InterPro2GO/keyword artifact) and should be
      removed. (The "Glycogen biosynthesis" keyword likely reflects family-level signature
      grouping rather than AGL's actual directionality.)
