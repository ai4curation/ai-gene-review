    label: amylo-alpha-1,6-glucosidase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Amylo-alpha-1,6-glucosidase activity (EC 3.2.1.33) is one of the two core
      catalytic activities of AGL: it hydrolyses the alpha-1,6-glucosidic branch
      linkage exposed after the transferase step, releasing free glucose. This is the
      defining, conserved function of the debranching enzyme family and is well
      supported by direct enzymatic study.
    action: ACCEPT
    reason: >-
      Correct core molecular function, matching the UniProt catalytic activity
      "Hydrolysis of (1->6)-alpha-D-glucosidic branch linkages in glycogen
      phosphorylase limit dextrin" (EC 3.2.1.33). IBA is at the appropriate level of
      specificity for this family.
