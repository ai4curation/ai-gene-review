core_functions:
- description: >-
    NDUFA2 acts as a non-catalytic structural subunit of the peripheral (matrix)
    arm of mitochondrial Complex I, where it stabilizes the holoenzyme and its
    structural module and is required for assembly of a functional complex. It
    contributes to, but does not itself catalyze, the complex-level NADH:ubiquinone
    oxidoreductase activity.
