taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NDUFA2 (Complex I-B8/CI-B8) is a small (99 aa) nuclear-encoded accessory
  (supernumerary) subunit of mitochondrial NADH:ubiquinone oxidoreductase
  (respiratory chain Complex I). It resides in the peripheral (matrix) arm of the
  holoenzyme as a peripheral membrane protein on the matrix side of the
  mitochondrial inner membrane. The isolated subunit adopts a thioredoxin-like fold
  and carries a redox-active Cys24-Cys58 disulfide, but it is a non-catalytic
  structural subunit and is not itself an electron-transfer/redox catalyst; the 14
  conserved core subunits perform Complex I catalysis. NDUFA2 is required for
  proper assembly and stability of Complex I, and loss-of-function variants cause
  autosomal-recessive mitochondrial complex I deficiency (Leigh
  disease/leukoencephalopathy, MC1DN13).
