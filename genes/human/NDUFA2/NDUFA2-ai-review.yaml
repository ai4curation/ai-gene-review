    summary: >-
      This annotates NDUFA2 as directly enabling NADH dehydrogenase (ubiquinone)
      activity. NADH:ubiquinone oxidoreductase catalysis is carried out by the 14
      conserved core subunits (FMN/Fe-S-bearing subunits of the holoenzyme).
      UniProt explicitly states NDUFA2 is an accessory subunit "believed not to be
      involved in catalysis." Assigning the catalytic MF directly to a non-catalytic
      accessory subunit is an over-annotation. The honest relationship is captured
      in core_functions via contributes_to_molecular_function (GO:0008137), with
      the subunit's own MF being structural molecule activity (GO:0005198).
    action: MARK_AS_OVER_ANNOTATED
