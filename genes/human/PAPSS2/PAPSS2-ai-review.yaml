gene_symbol: PAPSS2
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PAPSS2 is one of the two human bifunctional 3'-phosphoadenosine 5'-phosphosulfate
  (PAPS) synthases (paralogous to PAPSS1) that catalyzes both consecutive steps of the
  sulfate activation pathway on a single polypeptide. Its C-terminal ATP sulfurylase
  (sulfate adenylyltransferase (ATP); EC 2.7.7.4) domain condenses sulfate with ATP to
  yield adenosine 5'-phosphosulfate (APS) and pyrophosphate, and its N-terminal APS
  kinase (adenylyl-sulfate kinase; EC 2.7.1.25) domain phosphorylates APS with ATP to
  produce PAPS, the universal sulfonate donor used by all cytosolic and Golgi
  sulfotransferases. In mammals PAPS is the sole source of activated sulfate, with APS
  serving only as a pathway intermediate. The enzyme functions predominantly in the
  cytosol but can shuttle to the nucleus. PAPSS2 is the predominant PAPS synthase in
  cartilage and is highly expressed in the adrenal gland; the PAPS it produces is
  required for proteoglycan/glycosaminoglycan sulfation and for DHEA sulfation by
  SULT2A1. Biallelic loss-of-function mutations cause an autosomal-recessive skeletal
  dysplasia (brachyolmia type 4 / spondyloepimetaphyseal dysplasia, Pakistani type) and
  can produce androgen excess with premature pubarche.
