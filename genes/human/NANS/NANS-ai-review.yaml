- id: PMID:10749855
  title: Cloning and expression of the human N-acetylneuraminic acid phosphate synthase
    gene with 2-keto-3-deoxy-D-glycero- D-galacto-nononic acid biosynthetic ability.
  findings:
  - statement: >-
      The human enzyme uses N-acetylmannosamine 6-phosphate and mannose 6-phosphate as
      substrates in vitro to generate phosphorylated forms of Neu5Ac and KDN respectively,
      with much higher activity toward the Neu5Ac-9-phosphate product; it partially restores
      sialic acid synthase activity in a neuB-negative E. coli mutant.
    supporting_text: >-
      In vitro the human enzyme uses N-acetylmannosamine 6-phosphate and mannose 6-phosphate
      as substrates to generate phosphorylated forms of Neu5Ac and KDN, respectively, but
      exhibits much higher activity toward the Neu5Ac phosphate product.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary biochemical characterization of human NANS; PubMed title/authors match the
      cited record. Establishes EC 2.5.1.57 (and the minor EC 2.5.1.132 KDN-9-P) activity.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: >-
      High-throughput shotgun proteomics of urinary expressed-prostatic-secretion exosomes
      detected ~900 proteins; NANS is one of many abundant cytosolic proteins reported in
      this exosome dataset, not a functional localization claim.
    supporting_text: >-
      In pooled EPS-urine exosome samples, ~900 proteins were detected.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Large-scale exosome proteomics; supports only mass-spec detection in an exosome
      preparation (source of the HDA extracellular-exosome annotation), not a curated
      functional location for a cytosolic biosynthetic enzyme.
- id: PMID:31121216
  title: Activity of N-acylneuraminate-9-phosphatase (NANP) is not essential for de
    novo sialic acid biosynthesis.
  findings:
  - statement: >-
      Knockout of NANS (sialic acid synthase) in human cell lines reduced cell-surface
      sialylation and dramatically reduced CMP-sialic acid, placing NANS in the five-step
      de novo CMP-sialic acid biosynthetic pathway.
    supporting_text: >-
      Sialylation of cell surface glycans was reduced by KO of GNE
      (UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase), NANS (sialic
      acid synthase) and CMAS (N-acylneuraminate cytidylyltransferase) genes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Human cell-line loss-of-function study; NANS KO abolishes cell-surface sialylation
      and CMP-sialic acid. Supports the IMP annotations for sialic acid / CMP-sialic acid
      biosynthetic process.
- id: PMID:27213289
  title: NANS-mediated synthesis of sialic acid is required for brain and skeletal development.
  findings:
  - statement: >-
      Biallelic NANS variants cause an autosomal recessive spondyloepimetaphyseal dysplasia
      (Genevieve type / NANS deficiency) with developmental delay, intellectual disability
      and skeletal dysplasia; NANS-mediated sialic acid synthesis is required for brain and
      skeletal development (as summarized in UniProt Q9NR45 FUNCTION and DISEASE).
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Disease/function paper (van Karnebeek et al. 2016) establishing NANS deficiency
      (SEMDG). Not in GOA and not cached locally; included via the UniProt Q9NR45 entry,
      which attributes its FUNCTION and DISEASE statements to this PMID. No verbatim
      supporting_text quoted because the publication is not cached.
- id: Reactome:R-HSA-4084976
  title: NANS converts ManNAc-6-P to Neu5Ac-9-P
  findings:
  - statement: >-
      Reactome reaction: sialic acid synthase NANS converts N-acetylmannosamine 6-phosphate
      to N-acetylneuraminate 9-phosphate.
    supporting_text: >-
      Sialic acid synthase (NANS, SAS) can convert N-acetylmannosamine 6-phosphate
      (ManNAc-6-P) to N-acetylneuraminate 9-phosphate (Neu5Ac-9-P) (Lawrence et al. 2000).
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome human reaction for the NANS catalytic step; consistent with the primary
      literature (Lawrence et al. 2000).
