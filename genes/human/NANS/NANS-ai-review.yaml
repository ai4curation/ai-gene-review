id: Q9NR45
gene_symbol: NANS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  NANS (N-acetylneuraminate-9-phosphate synthase, also called sialic acid synthase
  or sialic acid phosphate synthase; EC 2.5.1.57) is a cytosolic enzyme that catalyzes
  the committed condensation step of de novo sialic acid (Neu5Ac) biosynthesis. It condenses
  phosphoenolpyruvate (PEP) with N-acetylmannosamine 6-phosphate (ManNAc-6-P, produced by
  GNE) to form N-acetylneuraminate 9-phosphate (Neu5Ac-9-P), which is subsequently
  dephosphorylated (NANP) and activated to CMP-sialic acid (CMAS) for use by
  sialyltransferases. NANS can also condense PEP with D-mannose 6-phosphate to produce the
  9-phosphate of deaminoneuraminic acid (KDN-9-P, EC 2.5.1.132), though with much lower
  activity than toward the N-acetyl product. The protein is homologous to the bacterial
  sialic acid synthase NeuB and comprises an N-terminal (beta/alpha)8 TIM-barrel catalytic
  domain and a C-terminal antifreeze-like (AFP-like/SAF) domain. Biallelic loss-of-function
  variants cause NANS deficiency (spondyloepimetaphyseal dysplasia, Genevieve type; SEMDG),
  an autosomal recessive disorder of infantile-onset developmental delay, intellectual
  disability, skeletal dysplasia and short stature, with accumulation of N-acetylmannosamine.
