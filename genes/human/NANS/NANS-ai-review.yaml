- term:
    id: GO:0006055
    label: CMP-N-acetylneuraminate biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:31121216
  qualifier: involved_in
  review:
    summary: >-
      NANS knockout abolishes CMP-sialic acid in human cells, so NANS is functionally
      required for CMP-Neu5Ac production. However, CMP-Neu5Ac is the downstream pathway
      product (made by CMAS after NANP dephosphorylation); NANS's own step yields
      Neu5Ac-9-P. Correct pathway-level involvement but not the core BP for NANS; keep as
      non-core.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: PMID:31121216
      supporting_text: >-
        CMP-sialic acid was dramatically reduced in GNE and NANS KO cells and undetectable
        in CMAS KO.
