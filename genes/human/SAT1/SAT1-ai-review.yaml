    of angiogenesis: induction of ESM-1, (beta)ig-h3, and NrCAM.'
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. SAT1 is a co-identified transcript upregulated in an in-vitro
      angiogenesis model; the paper foregrounds ESM-1/betaig-h3/NrCAM and does not establish
      a causal enzymatic role for SAT1 in angiogenesis. Supports only a context-specific
      expression association (IEP), not a core function.
- id: PMID:15283699
  title: Spermidine/spermine-N1-acetyltransferase-2 (SSAT2) acetylates thialysine
    and is not involved in polyamine metabolism.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. Primary subject is the paralog SSAT2 (SAT2), which the paper
      concludes is NOT a polyamine catabolic enzyme; SSAT1 (this gene, P21673) is used
      throughout as the well-characterized reference standard and its polyamine KM/kcat are
      reported. UniProt cites this PMID as EXP evidence for SAT1 catalytic activity, so the
      GOA IDA to SAT1 diamine N-acetyltransferase activity is appropriate. The IDA to
      polyamine biosynthetic process is wrong-direction (SSAT1 is catabolic).
