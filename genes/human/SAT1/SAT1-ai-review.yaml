- id: Reactome:R-HSA-351200
  title: Interconversion of polyamines
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Reactome pathway describing polyamine back-conversion via SAT1-mediated N1-acetylation
      followed by PAOX/SMOX oxidation. The pathway is catabolic/interconversion; the GOA
      mapping of this reference to polyamine biosynthetic process is a wrong-direction term.
