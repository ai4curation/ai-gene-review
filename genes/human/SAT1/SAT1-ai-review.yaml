id: P21673
gene_symbol: SAT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  SAT1 (diamine acetyltransferase 1; spermidine/spermine N1-acetyltransferase, SSAT1)
  is a cytosolic, acetyl-CoA-dependent N-acetyltransferase of the GNAT (GCN5-related
  N-acetyltransferase) superfamily and the rate-limiting enzyme of polyamine catabolism
  (back-conversion). It catalyzes the N1-acetylation of the higher polyamines spermine
  and spermidine (and related alkane-alpha,omega-diamines) using acetyl-CoA, producing
  N1-acetylspermine or N1-acetylspermidine plus CoA (EC 2.3.1.57). The N1-acetylated
  polyamines are then either exported from the cell or oxidized by acetylpolyamine oxidase
  (PAOX), driving the interconversion spermine -> spermidine -> putrescine. SAT1 is a
  short-lived, highly inducible enzyme (induced by polyamines and their analogues, and by
  diverse stresses) and thereby provides fine control of intracellular polyamine
  concentrations and polyamine efflux. The enzyme is a homodimer of ~171-residue,
  ~20 kDa subunits; catalysis proceeds through a ternary complex with an active-site
  tyrosine (Tyr140) acting as the general acid. It is broadly expressed and acts in the
  cytosol.
