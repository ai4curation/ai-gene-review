  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Reactome reaction; SAT1 acetylates spermine to N-acetylspermine, the
      rate-limiting step of polyamine catabolism. Supports the core MF and cytosol location.
