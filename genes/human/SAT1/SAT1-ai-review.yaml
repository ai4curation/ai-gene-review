- id: PMID:16455797
  title: Structures of wild-type and mutant human spermidine/spermine N1-acetyltransferase,
    a potential therapeutic drug target.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only in cache. High-resolution crystal structures of human SSAT with CoA,
      acetyl-CoA, spermine and inhibitor; establishes the catalytic MF, the homodimer, the
      Y140 catalytic residue, and the role in polyamine level control and export.
