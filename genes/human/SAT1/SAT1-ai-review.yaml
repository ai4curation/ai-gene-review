core_functions:
- description: >-
    Diamine/spermidine-spermine N1-acetyltransferase (SSAT1): the rate-limiting enzyme of
    polyamine catabolism. Using acetyl-CoA, it N1-acetylates the higher polyamines spermine
    and spermidine (and related alkane-alpha,omega-diamines) to N1-acetylspermine /
    N1-acetylspermidine + CoA (EC 2.3.1.57), committing them to export or PAOX-mediated
    oxidative back-conversion (spermine -> spermidine -> putrescine).
  molecular_function:
    id: GO:0004145
    label: diamine N-acetyltransferase activity
  supported_by:
  - reference_id: PMID:17516632
    supporting_text: "The N1-acetylation of spermidine and spermine by spermidine/spermine"
    reference_section_type: ABSTRACT
  - reference_id: PMID:1985966
    supporting_text: "rate-limiting enzyme in the catabolism of polyamines"
    reference_section_type: ABSTRACT
  - reference_id: file:human/SAT1/SAT1-uniprot.txt
    supporting_text: "Enzyme which catalyzes the acetylation of polyamines"
    reference_section_type: DATABASE_ENTRY
  directly_involved_in:
