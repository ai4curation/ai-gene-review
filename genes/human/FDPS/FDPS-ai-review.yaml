core_functions:
- description: >-
    Second condensation step of farnesyl diphosphate synthase: Mg(2+)-dependent head-to-tail
    condensation of isopentenyl diphosphate (IPP) with geranyl diphosphate (GPP) to form
    (2E,6E)-farnesyl diphosphate (FPP), EC 2.5.1.10. This is the defining activity of FDPS
    and the committed step producing the FPP branch-point metabolite of the isoprenoid
    pathway.
