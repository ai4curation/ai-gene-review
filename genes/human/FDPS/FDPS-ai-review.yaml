id: P14324
gene_symbol: FDPS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  FDPS encodes farnesyl pyrophosphate synthase (farnesyl diphosphate synthase, FPPS),
  a cytosolic trans-prenyltransferase of the mevalonate/isoprenoid pathway. Acting as a
  homodimer and requiring Mg(2+), it catalyzes two sequential head-to-tail (1'-4)
  condensations of isopentenyl diphosphate (IPP): first with dimethylallyl diphosphate
  (DMAPP) to give geranyl diphosphate (GPP), and then with GPP to give (2E,6E)-farnesyl
  diphosphate (FPP). FPP is a central branch-point metabolite that feeds into the
  biosynthesis of sterols (via squalene), dolichols, ubiquinone, heme A, and the
  isoprenoid substrates for protein prenylation (farnesylation and, downstream via GGPP,
  geranylgeranylation). Because it controls flux at this branch point, FPPS is the
  molecular target of nitrogen-containing bisphosphonate drugs (e.g. alendronate,
  risedronate, zoledronate) used to treat osteoporosis and other bone-resorption
  disorders; these drugs mimic a carbocation intermediate and bind the allylic
  substrate pocket. Loss-of-function/hypomorphic variants in FDPS cause an autosomal
  disorder of keratinization (porokeratosis 9).
