- id: PMID:16684881
  title: The molecular mechanism of nitrogen-containing bisphosphonates as antiosteoporosis
    drugs.
  findings:
  - statement: >-
      Human FPPS catalyzes the successive condensation of IPP with DMAPP and with GPP; it is
      the key branch-point enzyme of the mevalonate pathway and the target of
      nitrogen-containing bisphosphonate drugs. High-resolution structures of the human
      enzyme with risedronate/zoledronate and Mg(2+)/IPP define the catalytic mechanism.
    reference_section_type: ABSTRACT
    supporting_text: >-
      FPPS, a key branchpoint of the mevalonate pathway, catalyzes the successive
      condensation of isopentenyl pyrophosphate with dimethylallyl pyrophosphate and geranyl
      pyrophosphate.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; source of the EXP molecular-function annotations (EC 2.5.1.1 and
      2.5.1.10) and Mg(2+) cofactor for human FPPS. Abstract-only in cache but the abstract
      explicitly states the two sequential condensations. UniProt cites this PMID for both
      catalytic-activity statements.
