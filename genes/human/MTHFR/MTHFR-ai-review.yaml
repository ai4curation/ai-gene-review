- term:
    id: GO:0072341
    label: modified amino acid binding
  evidence_type: IDA
  original_reference_id: PMID:20031578
  qualifier: enables
  review:
    summary: >-
      The cited reference is a genome-wide association study of plasma homocysteine;
      it contains no direct assay of MTHFR binding to a modified amino acid. There
      is no experimental basis in this reference for an IDA "modified amino acid
      binding" molecular function, and homocysteine is a substrate of methionine
      synthase, not of MTHFR.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The reference does not support a direct modified-amino-acid binding function
      for MTHFR (it is a GWAS), and MTHFR does not bind homocysteine; the IDA MF
      call is unsupported and over-annotated. Not removed outright per policy on
      experimental-code annotations whose full evidence cannot be fully verified.
