id: P42898
gene_symbol: MTHFR
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  MTHFR is the cytosolic, FAD-dependent, NAD(P)H-linked methylenetetrahydrofolate
  reductase (EC 1.5.1.53) that catalyses the committed, physiologically
  irreversible reduction of 5,10-methylenetetrahydrofolate (CH2-THF) to
  5-methyltetrahydrofolate (CH3-THF). Because CH3-THF is used exclusively by
  cobalamin-dependent methionine synthase (MTR) to remethylate homocysteine to
  methionine, MTHFR commits folate one-carbon units to the methionine cycle and
  represents the key regulatory node linking folate and methionine metabolism and,
  through methionine, biosynthesis of the universal methyl donor
  S-adenosylmethionine (SAM). The enzyme is a homodimer built from a conserved
  catalytic TIM-barrel domain that binds FAD and NADPH and a eukaryote-specific
  C-terminal SAM-binding regulatory domain; it is allosterically inhibited by its
  downstream product SAM (reversed by S-adenosylhomocysteine), and phosphorylation
  of an N-terminal serine-rich region increases sensitivity to SAM inhibition,
  allowing methylation status to feed back on flux through the enzyme. Loss of
  function causes severe MTHFR deficiency, an autosomal recessive homocystinuria
  with hyperhomocysteinemia and neurological disease, while the common
  thermolabile c.677C>T (p.Ala222Val) polymorphism reduces activity and is a
  folate-sensitive risk factor for hyperhomocysteinemia, vascular disease and
  neural tube defects.
