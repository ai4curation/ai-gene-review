suggested_questions:
- question: >-
    What are the physiological kinases and signalling contexts that phosphorylate
    the N-terminal serine-rich region of human MTHFR, and how does this tune SAM
    sensitivity in vivo?
- question: >-
    To what extent are the reported roles of MTHFR in centromeric heterochromatin
    maintenance mediated solely through SAM-dependent histone methylation versus a
    more direct nuclear function?
suggested_experiments:
- description: >-
    Quantitative in-cell measurement of MTHFR flux and the SAM/SAH ratio in
    phospho-site mutants to test how N-terminal phosphorylation modulates
    SAM-mediated allosteric inhibition under varying folate and methionine status.
- description: >-
    Structure-function analysis of the inter-domain linker (e.g. disease variants
    such as p.His354Tyr) using cryo-EM to capture SAM/SAH-dependent conformational
    states and their effect on FAD retention and catalysis.
