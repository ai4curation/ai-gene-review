id: P78382
gene_symbol: SLC35A1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: SLC35A1 is the CMP-sialic acid transporter (CMP-SA-Tr/CST), a multipass integral
  Golgi-membrane nucleotide-sugar transporter of the SLC35A subfamily (nucleotide-sugar
  transporter / drug-metabolite transporter superfamily). It functions as an antiporter that
  imports CMP-N-acetylneuraminate (CMP-Neu5Ac, CMP-sialic acid) from the cytosol into the Golgi
  lumen in exchange for CMP, thereby supplying the activated sialic acid donor used by Golgi
  sialyltransferases to add terminal sialic acid to N-glycans, O-glycans, and glycolipids. It can
  also exchange CMP-sialic acid for AMP or UMP, and by similarity transports CDP-ribitol
  (contributing CDP-ribitol for matriglycan synthesis on alpha-dystroglycan). Loss of SLC35A1
  function causes a generalized sialylation defect and the autosomal-recessive congenital disorder
  of glycosylation type IIf (SLC35A1-CDG / CDG2F), which presents with macrothrombocytopenia and
  bleeding diathesis, intellectual disability, seizures, and multisystem involvement.
