core_functions:
- description: CMP-sialic acid (CMP-N-acetylneuraminate) / CMP antiporter that imports CMP-sialic
    acid from the cytosol into the Golgi lumen in exchange for CMP, supplying the activated
    sialic-acid donor for Golgi sialyltransferases.
  molecular_function:
    id: GO:0005456
    label: CMP-N-acetylneuraminate transmembrane transporter activity
  directly_involved_in:
  - id: GO:0015782
    label: CMP-N-acetylneuraminate transmembrane transport
  locations:
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: PMID:15576474
    supporting_text: "full restoration of the\nsialylated phenotype was obtained in the Lec2 cells transfected with the\ncorresponding human wild-type transcript"
  - reference_id: file:human/SLC35A1/SLC35A1-uniprot.txt
    supporting_text: "Transports CMP-sialic acid from the cytosol into the Golgi\napparatus, functioning as an antiporter that exchanges CMP-sialic acid\nfor CMP"
- description: Acts mechanistically as an antiporter (solute:solute exchanger), coupling import of
    CMP-sialic acid to export of CMP (and, less efficiently, AMP or UMP) across the Golgi membrane.
  molecular_function:
    id: GO:0015297
    label: antiporter activity
  locations:
  - id: GO:0000139
    label: Golgi membrane
  supported_by:
  - reference_id: file:human/SLC35A1/SLC35A1-uniprot.txt
    supporting_text: "functioning as an antiporter that exchanges CMP-sialic acid\nfor CMP"
