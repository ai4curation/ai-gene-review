    supporting_text: "SLC35A1 encodes the CMP-sialic acid transporter which mediates the antiport of CMP-sialic acid (CMP-Neu5Ac) into the Golgi lumen in exchange for CMP"
- id: Reactome:R-HSA-727807
  title: SLC35A1 exchanges CMP-Neu5Ac for CMP
  findings:
  - statement: Reactome reaction for the physiological CMP-Neu5Ac/CMP exchange carried out by
      SLC35A1 at the Golgi membrane.
    reference_section_type: OTHER
    supporting_text: "SLC35A1 encodes the CMP-sialic acid transporter which mediates the antiport of CMP-sialic acid (CMP-Neu5Ac) into the Golgi lumen in exchange for CMP"
- id: Reactome:R-HSA-8931838
  title: DAG1 glycosylations
  findings:
  - statement: Pathway describing O-mannosyl/matriglycan glycosylation of alpha-dystroglycan,
      which depends on Golgi sugar-nucleotide supply; SLC35A1 participates by importing the
      relevant nucleotide sugars.
    reference_section_type: OTHER
    supporting_text: "Glycosylation is essential for DAG1(30-653) function"
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Reactome pathway used as TAS source for the protein O-linked glycosylation
      annotation; SLC35A1's role here is indirect (substrate supply), hence non-core.
- id: Reactome:R-HSA-9940804
  title: SLC35A1,4 import CDP-ribitol
  findings:
  - statement: SLC35A1 (with SLC35A4) imports CDP-ribitol from the cytosol into the Golgi in
      exchange for CDP, contributing CDP-ribitol for matriglycan synthesis.
    reference_section_type: OTHER
    supporting_text: "transport CDP-ribitol from cytosol into the Golgi, in exchange for one molecule\nof CDP"
