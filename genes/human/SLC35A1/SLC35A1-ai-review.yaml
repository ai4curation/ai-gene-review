- id: PMID:32296183
  title: A reference map of the human binary protein interactome.
  findings:
  - statement: HuRI is a proteome-scale binary (Y2H) interactome map; it is the source of the
      35 systematic SLC35A1 protein-binding (GO:0005515) IPI calls, which reflect high-throughput
      screening rather than functionally characterized partners.
    reference_section_type: ABSTRACT
    supporting_text: "we present a human 'all-by-all'\nreference interactome map of human binary protein interactions, or 'HuRI'"
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: PubMed-verified high-throughput interactome; correctly cited but supports only
      uninformative bare protein-binding annotations, treated here as over-annotation.
- id: PMID:9644260
  title: Functional expression of human golgi CMP-sialic acid transporter in the Golgi
    complex of a transporter-deficient Chinese hamster ovary cell mutant.
  findings:
  - statement: Human CST cDNA corrected the CMP-sialic acid transporter-deficient Lec2 CHO
      phenotype, restoring CMP-sialic acid transport, and the protein was localized to the Golgi
      membrane by immunofluorescence with the C-terminus exposed to the cytosol.
    reference_section_type: ABSTRACT
    supporting_text: "subcellular localization of the hCST protein in the Golgi membrane\nwas demonstrated by immunofluorescence"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; foundational functional/localization paper. Note the ProtInc
      TAS plasma-membrane annotation derived from this reference is not supported by the paper,
      which localizes the protein to the Golgi.
