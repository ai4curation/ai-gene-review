- id: PMID:15576474
  title: Genetic complementation reveals a novel human congenital disorder of glycosylation
    of type II, due to inactivation of the Golgi CMP-sialic acid transporter.
  findings:
  - statement: Genetic complementation in transporter-deficient Lec2 CHO cells showed that
      neither patient SLC35A1 allele restored sialylation, whereas wild-type SLC35A1 fully
      restored the sialylated phenotype, defining CDG type IIf.
    reference_section_type: ABSTRACT
