    summary: Phylogenetic (IBA) assignment of negative regulation of canonical NF-kappaB, transferred from the mouse ortholog. This direction is contested for human NLRX1 - UniProt states NLRX1 has NO inhibitory function on NF-kappaB and instead ENHANCES NF-kappaB and JNK signaling via ROS production (PMID:18219313).
