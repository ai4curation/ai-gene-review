- term:
    id: GO:0016241
    label: regulation of macroautophagy
  evidence_type: NAS
  original_reference_id: PMID:22982048
  qualifier: involved_in
  review:
    summary: The PMID:22982048 paper (lipofuscin study) concerns lysosomal and autophagic
      activity in senescent fibroblasts. V-ATPase maintains lysosomal acidification
      which is required for autophagy. The NAS annotation connects ATP6V1C1 to regulation
      of macroautophagy indirectly through lysosomal acidification.
    action: MARK_AS_OVER_ANNOTATED
    reason: Regulation of macroautophagy is an indirect downstream consequence of
      lysosomal acidification; ATP6V1C1 is not directly or specifically a regulator
      of macroautophagy. The paper does not study ATP6V1C1 directly. NAS evidence
      code reflects no direct experimental evidence.
    supported_by:
    - reference_id: PMID:22982048
      supporting_text: both the autophagosomes and the lysosomal system are not mandatory
        for the formation of lipofuscin
      reference_section_type: ABSTRACT

