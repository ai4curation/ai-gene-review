core_functions:
- description: ATP6V1C1 is the ubiquitously expressed C1 regulatory subunit of the
    V1 domain of the vacuolar-type H+-ATPase. As a single-copy subunit of the V1
    complex, C1 is necessary for assembly of the catalytic V1 sector and is required
    for V-ATPase function. The assembled V-ATPase complex acidifies lysosomes, endosomes,
    and other intracellular compartments using its proton-transporting ATPase activity
    via a rotational mechanism.
  molecular_function:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  directly_involved_in:
  - id: GO:1902600
    label: proton transmembrane transport
  locations:
  - id: GO:0005765
    label: lysosomal membrane
  in_complex:
    id: GO:0000221
    label: vacuolar proton-transporting V-type ATPase, V1 domain

suggested_questions:
- question: Does the C1 subunit have a direct catalytic role (e.g., direct contact
    with ATP or the rotating central stalk) or is its function purely structural/regulatory
    for V1 assembly?
- question: What is the structural basis for the requirement of subunit C in V1 assembly?
    Are there specific protein-protein contacts in the cryo-EM structure that explain
    why C is assembly-essential?
- question: Under what physiological conditions does V1-V0 disassembly occur in human
    cells, and what happens to the released free C1 subunit?
- question: Are there disease-causing mutations in ATP6V1C1 (analogous to the dominant
    mutations in ATP6V1B2 that cause DDOD/ZLS2)?
- question: Is there functional redundancy between ATP6V1C1 (ubiquitous) and ATP6V1C2
    (testis) in any tissue type?

suggested_experiments:
- hypothesis: Subunit C1 directly contacts the EG peripheral stalk subunits and the
    a-subunit of V0 during V1-V0 assembly.
  description: Use site-specific crosslinking mass spectrometry combined with cryo-EM
    to map direct contacts of C1 within the assembled V-ATPase and during V1-V0 assembly
    intermediates.
  experiment_type: STRUCTURAL_BIOLOGY
- hypothesis: Loss of ATP6V1C1 impairs lysosomal acidification and mTORC1 signaling
    in human cells.
  description: Generate ATP6V1C1 knockout human cell lines using CRISPR-Cas9 and
    measure lysosomal pH by ratiometric fluorescent probes and mTORC1 activity by
    S6K1 phosphorylation.
  experiment_type: CELL_BIOLOGY
- hypothesis: ATP6V1C2 can compensate for loss of ATP6V1C1 in non-testicular cell
    types.
  description: Express ATP6V1C2 ectopically in ATP6V1C1-knockout cells and assess
    rescue of lysosomal acidification and V-ATPase assembly by blue native PAGE and
    lysosomal pH measurements.
  experiment_type: CELL_BIOLOGY
