id: P21283
gene_symbol: ATP6V1C1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: 'ATP6V1C1 encodes the C1 subunit of the V1 peripheral domain of the
  vacuolar-type H+-ATPase (V-ATPase). The V1 complex hydrolyzes ATP to drive proton
  translocation through the membrane-embedded V0 domain. Subunit C (C1) is a regulatory
  subunit present in a single copy per V1 complex, where it is necessary for assembly
  of the catalytic V1 sector and likely has a specific function in its catalytic activity.
  ATP6V1C1 is ubiquitously expressed in human tissues. The paralog ATP6V1C2 is expressed
  specifically in testes. V-ATPase acidifies lysosomes, endosomes, Golgi, and secretory
  vesicles; ATP6V1C1 is found at the lysosomal membrane and at synaptic vesicle and
  clathrin-coated vesicle membranes (by similarity). During regulated V1-V0 disassembly
  under nutrient starvation, the V1 complex including C1 is released into the cytosol.'
existing_annotations:
- term:
    id: GO:0046961
    label: proton-transporting ATPase activity, rotational mechanism
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: V-ATPase enables proton-transporting ATPase activity by the rotational
      mechanism. The C1 subunit is required for V1 assembly and function. The IBA
      annotation from a phylogenetic tree is consistent with the established V-ATPase
      function.
    action: ACCEPT
    reason: Proton-transporting ATPase activity, rotational mechanism is the core
      molecular function of V-ATPase; the C subunit is required for V1 assembly and
      function.
    supported_by:
    - reference_id: PMID:8250920
      supporting_text: are regulated by accessory subunits C, D and E. cDNAs encoding
        subunits C, D, and E were cloned from human osteoclastoma
      reference_section_type: ABSTRACT
    - reference_id: PMID:33065002
      supporting_text: 'The V 1 ATPase is composed of three copies of subunits A,
        B, E, and G, and one copy of subunit C, D, F, and H'
      reference_section_type: INTRODUCTION

