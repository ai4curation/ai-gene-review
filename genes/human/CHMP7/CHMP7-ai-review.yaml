id: Q8WUX9
gene_symbol: CHMP7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  CHMP7 encodes an ESCRT-III-like / ESCRT-II-III hybrid protein that acts most specifically as an
  upstream adaptor for nuclear-envelope ESCRT recruitment. During late anaphase, LEMD2/LEM2 recruits
  CHMP7 to the reforming nuclear envelope and chromatin-disk periphery, where CHMP7 helps recruit
  downstream ESCRT-III components such as CHMP2A and IST1/CHMP8 to seal nuclear-envelope holes and
  coordinate spindle microtubule disassembly. CHMP7 also has evidence for CHMP4B-associated endosomal
  sorting, but this appears secondary to its better-defined nuclear-envelope repair/sealing role.
alternative_products:
- name: '1'
  id: Q8WUX9-1
- name: '2'
  id: Q8WUX9-2
  sequence_note: VSP_056945, VSP_056946
