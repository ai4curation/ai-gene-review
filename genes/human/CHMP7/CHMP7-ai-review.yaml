suggested_questions:
- question: Can endogenous CHMP7 rescue assays separate LEMD2 binding, CHMP4B recruitment, and VPS4-dependent ESCRT turnover
    during nuclear-envelope sealing?
- question: Should CHMP7 endosomal-sorting annotations remain non-core unless supported by endogenous depletion/rescue assays
    distinct from dominant-negative overexpression phenotypes?
- question: Is there a more specific GO process term needed for ESCRT-mediated nuclear-envelope hole sealing during anaphase?
suggested_experiments:
- description: Rescue CHMP7-depleted cells with wild-type CHMP7 and mutants separating LEMD2 binding, CHMP4B binding, and
    ESCRT-III recruitment while measuring CHMP2A/IST1 recruitment, NE sealing reporters, and post-mitotic nuclear leakage.
  hypothesis: CHMP7 nuclear-envelope sealing will require LEMD2-dependent recruitment and downstream ESCRT-III assembly more
    directly than its endosomal-sorting phenotype.
- description: Compare acute endogenous CHMP7 depletion/rescue in EGFR or ubiquitinated-cargo MVB sorting assays versus nuclear-envelope
    sealing assays under matched expression levels.
  hypothesis: The nuclear-envelope phenotype will be the clearest CHMP7-specific core function, whereas endosomal sorting
    will be weaker or context-dependent.
- description: Test whether CHMP7 perturbation affects virus-like particle release only through overexpression/dominant-negative
    ESCRT disruption or through a reproducible endogenous requirement.
  hypothesis: Viral-budding effects will reflect pathway-level ESCRT perturbation rather than a direct core CHMP7 function.
