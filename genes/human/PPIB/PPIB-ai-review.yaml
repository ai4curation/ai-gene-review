    supporting_text: PPIase that catalyzes the cis-trans isomerization of proline
      imidic peptide bonds
  - reference_id: PMID:20676357
    supporting_text: Structural and biochemical characterization of the human cyclophilin
      family
- description: Component of the P3H1/CRTAP/PPIB collagen prolyl 3-hydroxylation complex
    that processes procollagen in the ER; loss of PPIB causes osteogenesis imperfecta
    type IX, establishing a role in collagen biogenesis and bone development.
  molecular_function:
    id: GO:0003755
