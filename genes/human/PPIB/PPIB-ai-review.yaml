id: P23284
gene_symbol: PPIB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: PPIB (peptidyl-prolyl cis-trans isomerase B; cyclophilin B / CypB; also
  called S-cyclophilin/SCYLP and rotamase B) is an endoplasmic reticulum-lumenal cyclophilin-type
  peptidyl-prolyl cis-trans isomerase (EC 5.2.1.8) that catalyzes the rate-limiting
  cis-trans isomerization of Xaa-Pro peptide bonds and thereby accelerates protein
  folding. It is retained in the ER lumen by a C-terminal retention motif and is a
  component of ER chaperone/foldase complexes, including the prolyl 3-hydroxylation
  complex with P3H1 (LEPRE1) and CRTAP that processes procollagen, and an ERp72(PDIA4)-cyclophilin
  B module that accelerates immunoglobulin folding. Loss-of-function mutations in PPIB
  cause autosomal-recessive osteogenesis imperfecta type IX, underscoring its role
  in collagen biogenesis and bone development. Beyond the ER, a secreted/cell-surface
  pool of cyclophilin B signals through the receptor CD147/EMMPRIN to promote leukocyte
  (neutrophil) chemotaxis, and the protein is exploited as a host factor by certain
  viruses (e.g. hepatitis C virus NS5B polymerase, measles virus). Its PPIase activity
  is inhibited by the immunosuppressant cyclosporin A.
