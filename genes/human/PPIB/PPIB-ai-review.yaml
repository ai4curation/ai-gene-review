core_functions:
- description: ER-lumenal cyclophilin-type peptidyl-prolyl cis-trans isomerase that
    catalyzes the cis-trans isomerization of Xaa-Pro peptide bonds, accelerating proline-limited
    steps of protein folding (notably during collagen and immunoglobulin maturation).
  molecular_function:
    id: GO:0003755
    label: peptidyl-prolyl cis-trans isomerase activity
  locations:
