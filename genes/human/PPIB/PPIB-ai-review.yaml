suggested_questions:
- question: Given that PPIB-null osteogenesis imperfecta has normal collagen folding,
    what is the precise non-redundant contribution of PPIB's PPIase activity within
    the P3H1/CRTAP/PPIB complex versus its scaffolding role?
- question: How is the partitioning of PPIB between its ER foldase pool and its secreted/CD147-signaling
    pool regulated, and how much do extracellular functions contribute to disease phenotypes?
suggested_experiments:
- description: Separate-of-function PPIB mutants (catalytically dead PPIase vs complex-assembly
    mutants) expressed in PPIB-null cells, assaying collagen 3-hydroxylation, folding
    kinetics and secretion to dissect catalytic versus scaffolding contributions.
- description: Quantify and perturb the secreted/cell-surface cyclophilin B pool (e.g.
    CD147-blocking) in leukocyte chemotaxis and viral-replication assays to define the
    in vivo relevance of its extracellular functions.
