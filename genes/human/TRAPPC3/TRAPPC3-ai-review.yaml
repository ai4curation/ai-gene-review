- term:
    id: GO:0006891
    label: intra-Golgi vesicle-mediated transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Intra-Golgi transport is plausible through TRAPPII/Golgi trafficking 
      context but is less central than ER-to-Golgi transport for human TRAPPC3.
    action: KEEP_AS_NON_CORE
    reason: Keep as non-core. The TRAPPII/Golgi evidence supports a context-specific 
      trafficking role, while the core TRAPPC3 process remains ER-to-Golgi/TRAPP/RAB1 
      transport.
    additional_reference_ids:
    - PMID:21453443
    - PMID:18930054
    supported_by:
    - &id006
      reference_id: PMID:21453443
      supporting_text: for distinct tethering events at Golgi membranes
    - &id007
      reference_id: PMID:18930054
      supporting_text: different functions in the regulation of ER-to-Golgi traffic
