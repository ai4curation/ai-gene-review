core_functions:
- contributes_to_molecular_function:
    id: GO:0005085
    label: guanyl-nucleotide exchange factor activity
  in_complex:
    id: GO:0030008
    label: TRAPP complex
  description: TRAPPC3 contributes the Bet3 core subunit to TRAPP complexes, supporting 
    complex-level RAB1 guanine-nucleotide exchange and ER-to-Golgi trafficking. It 
    should be modeled as contributing to the TRAPP complex activity rather than 
    independently enabling GEF activity.
