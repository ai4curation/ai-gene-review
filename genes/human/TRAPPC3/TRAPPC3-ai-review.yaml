id: O43617
gene_symbol: TRAPPC3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  TRAPPC3 is the human Bet3 homolog and a core TRAPP-complex subunit. It contributes to complex-level
  RAB1 guanine-nucleotide exchange factor activity, TRAPP/TRAPPII/TRAPPIII complex architecture, and
  ER-to-Golgi vesicle-mediated transport. Autophagophore-recruitment effects are best understood
  through TRAPP complex membership and TRAPPIII/RAB1 context rather than independent TRAPPC3-specific
  autophagy activity.
