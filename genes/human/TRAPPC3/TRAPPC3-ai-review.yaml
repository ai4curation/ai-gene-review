suggested_questions:
- question: Should TRAPPC3 and related TRAPP core subunits retain contributes_to RAB1 
    GEF annotations even when the complex-level catalytic subunit assignment is not 
    fully resolved?
  experts:
  - GO transport editors
  - Reactome TRAPP curators
- question: Should TRAPPIII complex membership be considered sufficient for PN 
    autophagophore-recruitment context without assigning broad autophagy process terms?
  experts:
  - GO autophagy editors
  - ComplexPortal curators
- question: Should TRAPPC3 coat-assembly annotations be replaced by ER-to-Golgi 
    vesicle-mediated transport or by a more specific TRAPPC/COPII recruitment term if 
    one exists?
  experts:
  - GO transport editors
  - ComplexPortal curators
suggested_experiments:
- description: Reconstitute TRAPPC3-containing TRAPP complexes and measure RAB1 GDP-GTP 
    exchange with TRAPPC3 depletion/rescue or interface mutants.
  experiment_type: complex reconstitution and RAB1 GEF assay
  hypothesis: TRAPPC3 is required as a core TRAPP subunit for complex-level RAB1 GEF 
    activity.
- description: Test TRAPPC3 mutants that disrupt TRAPPC6/TRAPPC1 interfaces for effects 
    on ER-to-Golgi cargo trafficking, SEC23/COPII association, and Golgi membrane 
    recruitment.
  experiment_type: trafficking rescue and complex-interface assay
  hypothesis: TRAPPC3 scaffolding of core TRAPP interactions is required for ER-to-Golgi
    vesicle-mediated transport.
- description: Separate TRAPPII and TRAPPIII pools in TRAPPC3 rescue cells and assay 
    ATG9 localization plus canonical ER-to-Golgi transport in parallel.
  experiment_type: TRAPP subtype-specific autophagy/traffic assay
  hypothesis: TRAPPC3 autophagy phenotypes depend on TRAPPIII/RAB1 context and should be
    distinguished from core ER-to-Golgi transport defects.
