id: Q9NVS9
gene_symbol: PNPO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PNPO is pyridoxine-5'-phosphate oxidase (pyridoxine/pyridoxamine 5'-phosphate
  oxidase; EC 1.4.3.5), an FMN-dependent flavoenzyme that catalyzes the terminal,
  rate-limiting step in the biosynthesis of pyridoxal 5'-phosphate (PLP), the
  catalytically active form of vitamin B6. It oxidizes either pyridoxine
  5'-phosphate (PNP) or pyridoxamine 5'-phosphate (PMP) to PLP, using molecular
  oxygen and generating hydrogen peroxide. The enzyme binds one FMN cofactor per
  subunit and functions as a homodimer, with each subunit binding one molecule of
  the product PLP tightly, giving product inhibition. PNPO acts in the cytosol and
  is broadly (housekeeping) expressed, with highest levels in liver, skeletal
  muscle and kidney. Because PLP is the essential cofactor for dozens of enzymes,
  including those of neurotransmitter metabolism, PNPO is critical for maintaining
  PLP supply; loss-of-function variants cause pyridoxal-5'-phosphate-responsive
  neonatal/early-infantile epileptic encephalopathy (PNPO deficiency).
