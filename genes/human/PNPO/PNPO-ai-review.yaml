    summary: >-
      This InterPro2GO/keyword-derived term mislabels the process. PNPO does not
      synthesize pyridoxine (vitamin B6); it oxidizes the already-phosphorylated
      B6 vitamers PNP and PMP to the active cofactor PLP. The specific, correct
