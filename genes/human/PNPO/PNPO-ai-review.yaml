- id: PMID:12824491
  title: Structure and properties of recombinant human pyridoxine 5'-phosphate oxidase.
  findings:
  - statement: >-
      Human PNPO catalyzes the terminal step of PLP synthesis; the purified
      recombinant enzyme is an FMN-containing homodimer with low turnover and
      low-micromolar KM for both PNP and PMP, and binds one PLP product molecule
      tightly per subunit (product inhibition).
    supporting_text: >-
      The purified human enzyme is a homodimer that exhibits a low catalytic
      rate constant of approximately 0.2 sec(-1)
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; abstract directly supports catalytic activity, FMN
      cofactor, homodimer and PLP-binding claims. PDB 1NRG derives from this work.
- id: PMID:15182361
  title: Genomic organization, tissue distribution and deletion mutation of human
    pyridoxine 5'-phosphate oxidase.
  findings:
  - statement: >-
      Human brain PNPO expressed in E. coli; N-terminal 56-residue deletion does
      not affect coenzyme binding or activity; ubiquitous housekeeping-type
      expression highest in liver, skeletal muscle and kidney.
    supporting_text: >-
      deletion of the N-terminal 56 residues affects neither the binding of
      coenzyme nor catalytic activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; supports the EXP catalytic-activity annotation and the
      N-terminal-dispensable truncation biology.
- id: PMID:15772097
  title: Neonatal epileptic encephalopathy caused by mutations in the PNPO gene encoding
    pyridox(am)ine 5'-phosphate oxidase.
  findings:
  - statement: >-
      Biallelic PNPO mutations cause PLP-responsive, pyridoxine-resistant
      neonatal epileptic encephalopathy; expression of human variants in CHO
      cells showed R229W markedly reduces oxidase activity and splice/stop
      mutations are null.
    supporting_text: >-
      having been resistant to treatment with pyridoxine,
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache; establishes disease mechanism and directly supports
      the IDA catalytic-activity annotation via human-variant expression assays.
