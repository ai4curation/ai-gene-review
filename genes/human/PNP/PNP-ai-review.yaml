core_functions:
- description: >-
    Phosphorolytic cleavage of the N-glycosidic bond of 6-oxopurine
    (deoxy)ribonucleosides (inosine, guanosine, 2'-deoxyinosine, 2'-deoxyguanosine),
    using inorganic phosphate to produce the free purine base (hypoxanthine or
    guanine) plus (2'-deoxy)-alpha-D-ribose-1-phosphate.
  molecular_function:
    id: GO:0004731
    label: purine-nucleoside phosphorylase activity
  directly_involved_in:
  - id: GO:0006148
    label: inosine catabolic process
  supported_by:
  - reference_id: PMID:6771276
    supporting_text: "the phosphorolysis of inosine, deoxyinosine, guanosine, and deoxyguanosine with"
  - reference_id: PMID:23438750
    supporting_text: "catalyzes the reversible phosphorolysis of purine (deoxy)-ribonucleosides to the corresponding purine base"
- description: >-
    Generation of free purine bases (hypoxanthine, guanine) from purine nucleosides,
    supplying the purine salvage pathway; the reversible reaction also contributes to
    nucleoside interconversion in purine-containing compound salvage.
  molecular_function:
    id: GO:0004731
    label: purine-nucleoside phosphorylase activity
  directly_involved_in:
  - id: GO:0043101
    label: purine-containing compound salvage
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:9305964
    supporting_text: "highly specific for 6-oxopurine"
