id: P00491
gene_symbol: PNP
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  Purine nucleoside phosphorylase (PNP; EC 2.4.2.1) is a cytosolic homotrimeric
  enzyme of purine catabolism and salvage. It catalyzes the reversible
  phosphorolysis of the N-glycosidic bond of 6-oxopurine (deoxy)ribonucleosides,
  converting inosine, guanosine and their 2'-deoxy forms (plus phosphate) to the
  corresponding free purine base (hypoxanthine or guanine) and
  (2'-deoxy)-alpha-D-ribose-1-phosphate. The liberated bases are either recycled
  by salvage (e.g. by HPRT1) or channeled into oxidative catabolism (hypoxanthine
  to xanthine to urate by xanthine oxidoreductase). PNP is highly specific for
  6-oxopurine nucleosides and essentially inactive on adenine (6-amino) nucleosides.
  It also phosphorolyses the pyridine nucleoside nicotinamide riboside, contributing
  to a kinase-independent NAD+ salvage route. In humans, loss-of-function of PNP
  causes purine nucleoside phosphorylase deficiency, an autosomal recessive disorder
  in which accumulating (deoxy)guanosine and dGTP are toxic to T lymphocytes,
  producing a severe T-cell immunodeficiency (a cause of severe combined
  immunodeficiency) frequently accompanied by neurological impairment.
