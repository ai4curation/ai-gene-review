id: P34059
gene_symbol: GALNS
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  GALNS (N-acetylgalactosamine-6-sulfatase, also known as galactose-6-sulfate sulfatase,
  GalN6S; EC 3.1.6.4) is a lysosomal sulfatase acting in the stepwise degradation of the
  glycosaminoglycans keratan sulfate and chondroitin-6-sulfate. It hydrolytically removes the
  6-O-sulfate group from terminal N-acetyl-D-galactosamine-6-sulfate residues of chondroitin
  sulfate and from D-galactose-6-sulfate residues of keratan sulfate. Like all members of the
  sulfatase family, GALNS requires post-translational conversion of an active-site cysteine
  (Cys79) to Cα-formylglycine (3-oxoalanine) by the formylglycine-generating enzyme SUMF1; this
  modified residue, together with a bound Ca2+ ion, forms the catalytic nucleophile. GALNS is a
  homodimeric N-glycosylated glycoprotein that localises to the lysosome (lysosomal lumen), and,
  as a secreted lysosomal hydrolase, is also detected extracellularly. Deficiency of GALNS causes
  mucopolysaccharidosis type IVA (Morquio A syndrome), an autosomal recessive lysosomal storage
  disease with intracellular accumulation of keratan sulfate and chondroitin-6-sulfate, presenting
  with short stature, skeletal dysplasia, and corneal clouding.
