existing_annotations:
- term:
    id: GO:0004065
    label: arylsulfatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Family-level (arylsulfatase) molecular function assigned by phylogenetic inference across the
      sulfatase family. GALNS is a bona fide sulfatase, so this term is correct but broad relative to
      its specific N-acetylgalactosamine-6-sulfatase activity.
    action: ACCEPT
    reason: >-
      The IBA sulfatase-family term is biologically correct: GALNS catalyses sulfate-ester hydrolysis
      and belongs to the sulfatase family. It is more general than the specific 6-sulfatase activity
      (GO:0043890, also annotated), and it is standard to retain the broader family MF alongside the
      specific one. Kept, though the specific GO:0043890 term better represents the core function.
    supported_by:
    - reference_id: PMID:22940367
      supporting_text: >-
        In sulfatases, highly conserved catalytic machinery couples with diverse active site geometry,
        leading to cleavage of a wide variety of substrates.
    - reference_id: file:human/GALNS/GALNS-uniprot.txt
      supporting_text: Belongs to the sulfatase family.
