- id: PMID:15962010
  title: Sulphatase activities are regulated by the interaction of sulphatase-modifying
    factor 1 with SUMF2.
  findings:
  - statement: >-
      The formylglycine (FGly) modification of an active-site cysteine, generated by SUMF1 within
      the ER, is required for the catalytic activity of the sulphatases (including GALNS); SUMF2
      modulates SUMF1 activity.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PMC full text available. Establishes the SUMF1/formylglycine dependence shared by GALNS; GALNS
      is among the sulphatases assayed. Supports the general sulfatase-maturation requirement rather
      than a GALNS-specific function.
- id: PMID:18285341
  title: Distinct effects of N-acetylgalactosamine-4-sulfatase and galactose-6-sulfatase
    expression on chondroitin sulfates.
  findings:
  - statement: >-
      Galactose-6-sulfatase (GALNS) hydrolyses sulfate groups of chondroitin sulfate; modulating
      GALNS expression (overexpression vs siRNA silencing) inversely changes cellular chondroitin
      sulfate content, demonstrating a role in chondroitin sulfate catabolism.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache, but the abstract explicitly links GALNS expression to cellular chondroitin
      sulfate content in MCF-7 cells; supports the chondroitin sulfate catabolic-process annotation.
- id: PMID:22940367
  title: The structure of human GALNS reveals the molecular basis for mucopolysaccharidosis
    IV A.
  findings:
  - statement: >-
      Crystal structure of human GALNS (EC 3.1.6.4); the enzyme removes 6-sulfate groups from terminal
      N-acetylgalactosamine-6-sulfate (chondroitin-6-sulfate) and galactose-6-sulfate (keratan sulfate).
      Formylglycine-generating enzyme converts Cys79 to a formylglycine nucleophile; the enzyme is a
      Ca2+-binding homodimer.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PMC full text. Definitive structural and enzymological characterisation of human GALNS; the
      primary support for the core molecular function, formylglycine mechanism, and homodimeric Ca2+
      cofactor biology.
- id: PMID:23533145
  title: In-depth proteomic analyses of exosomes isolated from expressed prostatic
    secretions in urine.
  findings:
  - statement: >-
      Shotgun proteomics of exosomes from expressed prostatic secretions in urine detected ~900 proteins,
      among them GALNS, consistent with its presence in the secreted/extracellular-exosome fraction.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      High-throughput proteomic detection in prostatic-secretion exosomes; supports extracellular-exosome
      localisation only, not a core function.
- id: PMID:30760748
  title: Expression, activity and localization of lysosomal sulfatases in Chronic
    Obstructive Pulmonary Disease.
  findings:
  - statement: >-
      Immunostaining of cultured lung fibroblasts shows GALNS in a lysosomal localisation in both ever
      smokers and COPD patients, confirming lysosomal localisation.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PMC full text. Direct immunolocalisation evidence for lysosomal localisation of GALNS; source of
      the IDA lysosome annotation.
- id: PMID:8325655
  title: 'Mucopolysaccharidosis IV A: assignment of the human N-acetylgalactosamine-6-sulfate
    sulfatase (GALNS) gene to chromosome 16q24.'
  findings:
  - statement: >-
      Chromosome-mapping study assigning the human N-acetylgalactosamine-6-sulfate sulfatase (GALNS;
      EC 3.1.6.4) gene to chromosome 16q24; the paper does not assay a 4-sulfatase activity.
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      This is a gene-mapping (FISH/chromosome-assignment) abstract for GALNS. It was cited (TAS) to
      support GO:0003943 N-acetylgalactosamine-4-sulfatase activity, but GALNS is a 6-sulfatase
      (EC 3.1.6.4); the 4-sulfatase is ARSB. The paper does not support a 4-sulfatase activity.
- id: PMID:820716
  title: N-acetylgalactosamine-6-sulfate sulfatase in man. Absence of the enzyme in
    Morquio disease.
  findings:
  - statement: >-
      Original demonstration of N-acetylgalactosamine-6-sulfate sulfatase (GALNS) activity in man and
      its absence in Morquio disease; source of the EC 3.1.6.4 catalytic-activity assignment in UniProt.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      UniProt cites this (ECO:0000269|PubMed:820716) for FUNCTION and CATALYTIC ACTIVITY. Not separately
      annotated in GOA but underpins the core molecular function.
