- term:
    id: GO:0016236
    label: macroautophagy
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Conservative orthology-supported duplicate of a core process assignment. Macroautophagy is 
      appropriate for human PIK3C3.
    action: ACCEPT
    reason: This transfer is consistent with direct human evidence for VPS34 in the autophagy-initiating 
      PI3KC3-C1 complex.
    supported_by:
    - reference_id: PMID:40442316
      supporting_text: All forms of canonical autophagy, bulk and selective, are initiated upon the 
        recruitment and activation of the FIP200 protein4 and the class III phosphatidylinositol 3-OH kinase 
        complex I (PI3KC3-C1)5–7.
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: VPS34-generated PI3P promotes recruitment of WIPI/ATG machinery to phagophore 
        membranes, supporting autophagosome initiation and early biogenesis.
  qualifier: involved_in
- term:
    id: GO:0035032
    label: phosphatidylinositol 3-kinase complex, class III
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: The generic class III PI3K complex term is true but underspecified for human PIK3C3. The 
      literature supports explicit type I and type II complex membership.
    action: MODIFY
    reason: For this gene, the main curatorial distinction is between the autophagy-initiating PI3KC3-C1/type 
      I complex and the contextual endosomal PI3KC3-C2/type II complex.
    proposed_replacement_terms:
    - id: GO:0034271
      label: phosphatidylinositol 3-kinase complex, class III, type I
    - id: GO:0034272
      label: phosphatidylinositol 3-kinase complex, class III, type II
    supported_by:
    - reference_id: PMID:40442316
      supporting_text: PI3KC3-C1 contains one copy each of the lipid kinase VPS34, the pseudokinase VPS15 and 
        the regulatory subunits BECN1 and ATG14
    - reference_id: PMID:40442316
      supporting_text: The former three subunits are also present in PI3KC3-C2 involved in endosomal sorting 
        and late steps in autophagy, while ATG14 is uniquely involved in autophagy initiation5–7.
  qualifier: part_of
- term:
    id: GO:0042149
    label: cellular response to glucose starvation
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Glucose starvation response is a contextual autophagy input, not the core PIK3C3 function.
    action: KEEP_AS_NON_CORE
    reason: Starvation-dependent autophagy is a supported context for VPS34 action, but the direct conserved 
      role is PI3P production in autophagy and endosomal pathways.
    proposed_replacement_terms:
    - id: GO:0016236
      label: macroautophagy
    supported_by:
    - reference_id: PMID:25327288
      supporting_text: PIK-III acutely inhibits autophagy and de novo lipidation of LC3, and leads to the 
        stabilization of autophagy substrates.
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: VPS34-generated PI3P promotes recruitment of WIPI/ATG machinery to phagophore 
        membranes, supporting autophagosome initiation and early biogenesis.
  qualifier: involved_in
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:23878393
  review:
    summary: Protein binding is too generic to serve as an informative molecular-function annotation for 
      PIK3C3. Interaction-derived biology is captured elsewhere through specific complex, localization, or 
      process terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: Per project convention, `protein binding` should not be retained when it does not convey a 
      specific molecular function. For PIK3C3, these interaction data inform complex membership and contextual
      pathway roles rather than a standalone MF annotation.
  qualifier: enables
- term:
    id: GO:0016020
    label: membrane
  evidence_type: HDA
  original_reference_id: PMID:19946888
  review:
    summary: Broad membrane association from large-scale proteomics is weak and uninformative for PIK3C3.
    action: MARK_AS_OVER_ANNOTATED
    reason: PIK3C3 is a cytosolic/peripheral lipid kinase recruited to autophagy and endosomal membranes, so 
      generic membrane association is not entirely wrong, but this broad HDA row is not specific enough for 
      the reviewed function.
    supported_by:
    - reference_id: PMID:19946888
      supporting_text: The remaining species were largely involved in cellular processes and molecular 
        functions that could be predicted to be transiently associated with membranes.
  qualifier: located_in
- term:
    id: GO:0005930
    label: axoneme
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Axoneme localization is supported only by similarity and is non-core.
    action: KEEP_AS_NON_CORE
    reason: UniProt records a ciliary axoneme localization by similarity, but the reviewed human core function
      is VPS34 lipid kinase activity in autophagy/endosomal complexes.
    supported_by:
    - reference_id: file:human/PIK3C3/PIK3C3-uniprot.txt
      supporting_text: Also localizes to discrete punctae along the ciliary axoneme and to the base of the 
        ciliary axoneme (By similarity).
  qualifier: located_in
