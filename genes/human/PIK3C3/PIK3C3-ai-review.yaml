- term:
    id: GO:0005770
    label: late endosome
  evidence_type: IDA
  original_reference_id: PMID:14617358
  review:
    summary: Supported contextual localization. Human VPS34/p150 colocalizes with Rab7 on late endosomes.
    action: KEEP_AS_NON_CORE
    reason: The localization is directly supported in human cells, but it belongs to the contextual 
      endosomal-trafficking side of PIK3C3 biology rather than the core PN autophagy claim.
    supported_by:
    - reference_id: PMID:14617358
      supporting_text: The hVPS34/p150 complex colocalized with rab7 on late endosomes and hVPS34 activity was
        dependent on nucleotide cycling of rab7.
  qualifier: located_in
- term:
    id: GO:0045022
    label: early endosome to late endosome transport
  evidence_type: IMP
  original_reference_id: PMID:14617358
  review:
    summary: Contextual trafficking role supported by human Rab7/VPS34 data. Appropriate to retain as 
      non-core.
    action: KEEP_AS_NON_CORE
    reason: This transport function is part of the broader endosomal deployment of VPS34 PI3P signaling and 
      should remain separate from the core macroautophagy-focused curation.
    supported_by:
    - reference_id: PMID:14617358
      supporting_text: The data identify rab7 as an important regulator of late endosomal hVPS34 function and 
        link rab7 to the regulation of phosphatidylinositol 3'-kinase cycling between early and late 
        endosomes.
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: VPS34 activity is strongly tied to **endosomal PI3P pools** that define **early 
        endosome identity** and sorting, and PI3P serves as a platform for downstream trafficking and 
        maturation processes.
  qualifier: involved_in
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: Reactome:R-HSA-109699
  review:
    summary: Cytosol is a broad Reactome component assignment for PIK3C3 pathway events.
    action: KEEP_AS_NON_CORE
    reason: PIK3C3 complexes are cytosolic/peripheral membrane assemblies recruited to autophagy and endosomal
      membranes; the cytosol rows are retained as non-core pathway context rather than precise localization.
    proposed_replacement_terms:
    - id: GO:0000407
      label: phagophore assembly site
    - id: GO:0005768
      label: endosome
    supported_by:
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: '**PI3KC3 Complex I (PI3KC3-C1)**: VPS34 (**PIK3C3**) + **VPS15 (PIK3R4)** + **BECN1** +
        **ATG14**. This complex is classically associated with **autophagy initiation/autophagosome nucleation**.'
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: '**PI3KC3 Complex II (PI3KC3-C2)**: VPS34 (**PIK3C3**) + **VPS15 (PIK3R4)** + **BECN1** +
        **UVRAG**, classically associated with **endocytic sorting/endosome maturation** and related trafficking.'
  qualifier: located_in
