id: Q8NEB9
gene_symbol: PIK3C3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
description: >-
  PIK3C3 encodes VPS34, the catalytic lipid kinase of class III phosphatidylinositol 3-kinase
  complexes. VPS34 generates phosphatidylinositol 3-phosphate (PI3P) on endomembranes and operates in
  two main Beclin 1-containing assemblies: PI3KC3-C1 with ATG14 for autophagosome initiation and
  PI3KC3-C2 with UVRAG for endosomal sorting and later autophagy-associated trafficking. Autophagy
  initiation and macroautophagy are major VPS34 roles, whereas endosomal trafficking and cytokinesis
  are contextual extensions of the same PI3P-generating biology.
