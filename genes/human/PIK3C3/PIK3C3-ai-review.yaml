core_functions:
- molecular_function:
    id: GO:0016303
    label: 1-phosphatidylinositol-3-kinase activity
  description: PIK3C3/VPS34 is the catalytic lipid kinase of the ATG14-containing class III PI3K complex that 
    generates PI3P at early autophagy membranes to drive phagophore formation and autophagosome assembly 
    during macroautophagy.
  directly_involved_in:
  - id: GO:0036092
    label: phosphatidylinositol-3-phosphate biosynthetic process
  - id: GO:0000045
    label: autophagosome assembly
  - id: GO:0016236
    label: macroautophagy
  - id: GO:0097352
    label: autophagosome maturation
  locations:
  - id: GO:0000407
    label: phagophore assembly site
  - id: GO:0005776
    label: autophagosome
  in_complex:
    id: GO:0034271
    label: phosphatidylinositol 3-kinase complex, class III, type I
  supported_by:
  - reference_id: PMID:7628435
    supporting_text: PtdIns 3-kinase does not associate with p85 and phosphorylates PtdIns, but not PtdIns4P 
      or PtdIns(4,5)P2.
  - reference_id: PMID:40442316
    supporting_text: PI3KC3-C1 contains one copy each of the lipid kinase VPS34, the pseudokinase VPS15 and 
      the regulatory subunits BECN1 and ATG14
  - reference_id: PMID:33637724
    supporting_text: This complex catalyzes the production of PI3P and is required for both bulk and selective
      types of autophagy by controlling both autophagosome formation and maturation
  - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
    supporting_text: Human **PIK3C3** encodes **VPS34**, the *class III phosphatidylinositol 3-kinase* 
      catalytic subunit that produces **phosphatidylinositol 3-phosphate (PI3P)**.
  - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
    supporting_text: '**PI3KC3 Complex I (PI3KC3-C1)**: VPS34 (**PIK3C3**) + **VPS15 (PIK3R4)** + **BECN1** + **ATG14**.
      This complex is classically associated with **autophagy initiation/autophagosome nucleation**.'
  - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
    supporting_text: VPS34-generated PI3P promotes recruitment of WIPI/ATG machinery to phagophore membranes, 
      supporting autophagosome initiation and early biogenesis.
