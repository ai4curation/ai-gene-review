    label: phosphatidylinositol phosphate biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: The process is directionally correct but too broad. For PIK3C3 the literature supports the 
      specific PI3P biosynthetic process term.
    action: MODIFY
    reason: Human VPS34 is specifically responsible for generating phosphatidylinositol 3-phosphate rather 
      than phosphatidylinositol phosphates in general.
    proposed_replacement_terms:
    - id: GO:0036092
      label: phosphatidylinositol-3-phosphate biosynthetic process
    supported_by:
    - reference_id: PMID:33637724
      supporting_text: This complex catalyzes the production of PI3P and is required for both bulk and 
        selective types of autophagy by controlling both autophagosome formation and maturation
  qualifier: involved_in
- term:
    id: GO:0006622
    label: protein targeting to lysosome
  evidence_type: NAS
  original_reference_id: PMID:16467569
  review:
    summary: Protein targeting to lysosome is a contextual trafficking assignment.
    action: MODIFY
    reason: The accessible review evidence supports class III PI3K roles in endocytic membrane traffic, 
      phagosome maturation, and autophagy; a more informative term is endosome organization or early-to-late 
      endosome transport.
    proposed_replacement_terms:
    - id: GO:0007032
      label: endosome organization
    - id: GO:0045022
      label: early endosome to late endosome transport
    supported_by:
    - reference_id: PMID:16467569
      supporting_text: By contrast, class III PI 3-kinases mainly mediate receptor-independent trafficking 
        events, which mostly are related to endocytic membrane traffic, phagosome maturation and autophagy.
  qualifier: involved_in
- term:
    id: GO:0010506
    label: regulation of autophagy
  evidence_type: IDA
  original_reference_id: PMID:16799551
  review:
    summary: This study supports PIK3C3 participation in macroautophagy, but classifying VPS34 itself as a 
      regulator is too indirect. The gene product is part of the executing PI3KC3 complex.
    action: MODIFY
    reason: PIK3C3 is not merely upstream of autophagy in this context; it is a core catalytic component of 
      the autophagy machinery. The process annotation should therefore be macroautophagy rather than 
      regulation of autophagy.
    proposed_replacement_terms:
    - id: GO:0016236
      label: macroautophagy
    supported_by:
    - reference_id: PMID:10625637
      supporting_text: Transfection of a specific class III PI3K antisense oligonucleotide greatly inhibited 
        the rate of macroautophagy.
  qualifier: involved_in
- term:
    id: GO:0016236
    label: macroautophagy
  evidence_type: NAS
  original_reference_id: PMID:40442316
  review:
    summary: Core PN process assignment. Human structural and mechanistic work places PIK3C3 in the 
      autophagy-initiating PI3KC3-C1 complex required for macroautophagy.
    action: ACCEPT
    reason: The human literature now directly frames PI3KC3-C1 as an autophagy core complex, which supports 
      macroautophagy as a central process annotation for PIK3C3.
    supported_by:
    - reference_id: PMID:40442316
      supporting_text: All forms of canonical autophagy, bulk and selective, are initiated upon the 
        recruitment and activation of the FIP200 protein4 and the class III phosphatidylinositol 3-OH kinase 
        complex I (PI3KC3-C1)5–7.
    - reference_id: file:human/PIK3C3/PIK3C3-deep-research-falcon.md
      supporting_text: VPS34-generated PI3P promotes recruitment of WIPI/ATG machinery to phagophore 
        membranes, supporting autophagosome initiation and early biogenesis.
  qualifier: involved_in
- term:
    id: GO:0016241
    label: regulation of macroautophagy
  evidence_type: IDA
  original_reference_id: PMID:10625637
  review:
    summary: The underlying result supports macroautophagy itself rather than a purely regulatory role. PIK3C3
      is required for the process.
    action: MODIFY
    reason: In this experiment class III PI3K activity is necessary for macroautophagy, so the process term is
      more appropriate than a regulation term for PIK3C3.
    proposed_replacement_terms:
    - id: GO:0016236
      label: macroautophagy
    supported_by:
    - reference_id: PMID:10625637
      supporting_text: Transfection of a specific class III PI3K antisense oligonucleotide greatly inhibited 
        the rate of macroautophagy.
  qualifier: involved_in
