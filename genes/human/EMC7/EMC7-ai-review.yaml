- id: PMID:35287476
  title: The Function, Structure, and Origins of the ER Membrane Protein Complex.
  findings:
  - statement: Authoritative review of EMC function, structure, and evolution; places EMC7 as a single-pass subunit contributing a transmembrane helix and cytosolic loops to the dynamic front subdomain near the EMC3/EMC6 catalytic vestibule.
    reference_section_type: LITERATURE_REVIEW
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Annu Rev Biochem 2022). Review synthesizing EMC architecture and mechanism; supports the structural placement and non-catalytic role of EMC7 already described in the review.
- id: PMID:37199759
  title: A selectivity filter in the ER membrane protein complex limits protein misinsertion at the ER.
  findings:
  - statement: EMC7 is experimentally confirmed as a type I single-pass subunit and contributes conserved hydrophobic cytosolic loops (and a C-terminal amphipathic helix) beneath the EMC hydrophilic vestibule that transiently capture substrate TMDs; EMC7 is required for biogenesis of the tail-anchored client squalene synthase (SQS).
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified (J Cell Biol 2023, PMID:37199759). Provides EMC7-specific mechanistic evidence for a substrate-capture/selectivity-filter role and confirms type I single-pass topology and SQS-client dependence.
- id: PMID:37957425
  title: EMC rectifies the topology of multipass membrane proteins.
  findings:
  - statement: The EMC post-translationally rectifies the topology of multipass membrane proteins by inserting terminal/C-terminal TMDs after release from the ribosome-Sec61 complex, a mechanism estimated to apply to ~250 diverse human multipass proteins; EMC7 participates as an EMC subunit.
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Struct Mol Biol 2024, PMID:37957425). Expands the set of EMC-dependent processes (post-translational topology rectification) in which EMC7-containing complexes participate; complex-level, not EMC7-specific catalysis.
- id: PMID:32111841
  title: Selective EMC subunits act as molecular tethers of intracellular organelles exploited during viral entry.
  findings:
  - statement: EMC7 (with EMC4) acts as an ER-late endosome tether supporting SV40 polyomavirus delivery to the ER; EMC7's cytosolic C-terminal tail binds the late-endosomal GTPase Rab7 and EMC7/EMC4 bind the ER SNARE syntaxin-18, and EMC7 depletion blocks SV40 infection.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Nat Commun 2020, PMID:32111841). Non-canonical EMC7-specific role in organelle tethering (ER-endosome contact) and viral entry, mediated by the cytosolic tail binding Rab7 and syntaxin-18.
- id: PMID:38517390
  title: Structural insights into human EMC and its interaction with VDAC.
  findings:
  - statement: Cryo-EM of human EMC apo and VDAC1-bound states; EMC7's transmembrane helix becomes ordered upon VDAC1 binding and contributes a substantial fraction (~one-third) of the EMC-VDAC1 interface at mitochondria-ER contact sites.
    reference_section_type: RESULTS
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified (Aging (Albany NY) 2024, PMID:38517390). Structural evidence that EMC7's TMH mediates the EMC-VDAC1 interaction at ER-mitochondria contact sites; supports a conformationally plastic, interface-forming role for EMC7.
