suggested_questions:
- question: What specific structural or functional contribution does the lumenal beta-sandwich domain of EMC7 make to EMC stability or substrate handling?
- question: Are the EMC7-WLS interactions reported in interactome screens a reflection of EMC client engagement rather than a standalone binding function?
suggested_experiments:
- description: Test whether the EMC7 lumenal beta-sandwich domain binds any carbohydrate ligand in vitro to confirm or refute the InterPro-derived carbohydrate-binding annotation.
- description: Reconstitute EMC complexes lacking EMC7 to assess its contribution to complex assembly, stability, and insertion efficiency of representative tail-anchored and multipass substrates.
