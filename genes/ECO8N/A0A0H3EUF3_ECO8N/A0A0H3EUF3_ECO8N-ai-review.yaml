    supporting_text: "Inactivated oleandomycin was identified as oleandomycin 2'-phosphate by thin-layer chromatography."
  - reference_id: PMID:10428938
    supporting_text: "Macrolide 2'-phosphotransferase [MPH(2')] transfers the gamma phosphate of ATP to the 2'-OH group of macrolide antibiotics."
suggested_questions:
- question: >-
    Does the broad macrolide specificity of MphB extend to clinically important newer macrolides/ketolides
    (e.g. azithromycin, clarithromycin, telithromycin), and how does this compare to MphA and MphE?
suggested_experiments:
- description: >-
    Determine the crystal/cryo-EM structure of MphB in complex with a macrolide and a non-hydrolysable
    nucleotide analog to map the active site and confirm the catalytic roles of D200/D209/D219/D231/D227.
- description: >-
    Measure steady-state kinetics (kcat/Km) of purified MphB against a panel of 14-, 15- and 16-membered
    macrolides with ATP vs GTP/ITP donors to quantify substrate and cofactor preferences.
