core_functions:
# Core function 1: PSII reaction center -- water oxidation and electron transfer
- description: >-
    D1 is the core reaction center subunit of Photosystem II, forming a heterodimer with
    D2 (PsbD) that binds P680, the primary electron donor. D1 provides most of the ligands
    for the Mn4-Ca-O5 cluster of the oxygen-evolving complex (OEC), which catalyzes the
    light-driven oxidation of water to molecular oxygen. The protein mediates the electron
    transfer chain: water -> TyrZ (Tyr-161) -> P680 -> pheophytin -> QA -> QB (plastoquinone).
    D1 also binds multiple chlorophyll a molecules including PD1 (part of the P680 reaction
    center) and accessory ChlzD1. The overall catalytic reaction is water:plastoquinone
    oxidoreductase (EC 1.10.3.9): 2 plastoquinone + 4 hnu + 2 H2O = 2 plastoquinol + O2.
    D1 is subject to light-induced damage (photoinhibition) and undergoes rapid turnover
    via FtsH and Deg1 proteases followed by de novo synthesis.
  molecular_function:
    id: GO:0010242
    label: oxygen evolving activity
  directly_involved_in:
  - id: GO:0009772
    label: photosynthetic electron transport in photosystem II
  locations:
