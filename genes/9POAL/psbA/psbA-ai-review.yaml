id: P48183
gene_symbol: psbA
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:4577
  label: Zea mays
description: >-
  psbA encodes the D1 protein (Photosystem II protein D1), which is the core reaction center
  subunit of Photosystem II (PSII). D1 forms a heterodimer with D2 (PsbD) that binds P680,
  the primary electron donor of PSII, along with pheophytin, plastoquinone QB, and a non-heme
  iron. D1 provides most of the ligands for the Mn4-Ca-O5 cluster of the oxygen-evolving complex
  (OEC), which catalyzes the light-driven oxidation of water to molecular oxygen. The protein
  functions as a water:plastoquinone oxidoreductase (EC 1.10.3.9). D1 is located in the chloroplast
  thylakoid membrane and is a multi-pass transmembrane protein with 5 transmembrane helices. It is
  the primary target of photoinhibition damage and undergoes rapid light-dependent turnover via
  degradation by Deg1 and FtsH proteases followed by de novo synthesis. The QB binding pocket of
  D1 is also the target site for herbicides such as atrazine, diuron, and ioxynil. The protein is
  C-terminally processed by CTPA protease, which is essential for assembly of the OEC. psbA is
  chloroplast-encoded and one of the most conserved genes across all oxygenic photosynthetic
  organisms.
existing_annotations:
- term:
    id: GO:0009523
    label: photosystem II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation placing psbA/D1 as part of the photosystem II complex, inferred by
      phylogenetic analysis across orthologs. D1 is one of the two core reaction center
      subunits of PSII (together with D2/PsbD). This is arguably the single most fundamental
      annotation for this protein. UniProt states: "PSII is composed of 1 copy each of
      membrane proteins PsbA, PsbB, PsbC, PsbD, PsbE, PsbF, PsbH, PsbI, PsbJ, PsbK, PsbL,
      PsbM, PsbT, PsbX, PsbY, PsbZ, Psb30/Ycf12" (HAMAP-Rule:MF_01379). The IBA annotation
      is phylogenetically well-supported and at the correct level of specificity.
    action: ACCEPT
    reason: >-
      psbA/D1 is a core structural and catalytic subunit of PSII. This is the defining
      annotation for this protein. The IBA is appropriately at the photosystem II level
      rather than being overly specific to a sub-complex.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "PSII is composed of 1 copy each of membrane proteins PsbA, PsbB, PsbC, PsbD, PsbE, PsbF, PsbH, PsbI, PsbJ, PsbK, PsbL, PsbM, PsbT, PsbX, PsbY, PsbZ, Psb30/Ycf12"
      - reference_id: UniProt:P48183
        supporting_text: "The D1/D2 (PsbA/PsbD) reaction center heterodimer binds P680, the primary electron donor of PSII as well as several subsequent electron acceptors"
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for iron ion binding, transferred via UniRule UR000352928. D1 does
      bind a non-heme iron atom shared with D2 at the interface of the heterodimer. UniProt
      feature annotations show His-215 and His-272 as Fe cation binding residues with the note
      "ligand shared with heterodimeric partner" (HAMAP-Rule:MF_01379). While accurate, this
      is a secondary cofactor-binding property rather than a core catalytic function.
    action: KEEP_AS_NON_CORE
    reason: >-
      The non-heme iron binding is real and structurally important — it bridges the D1/D2
      heterodimer between the QA and QB quinone binding sites. However, this is a structural
      cofactor role subsidiary to the primary catalytic function. Iron ion binding alone does
      not adequately describe what psbA does.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "ligand shared with heterodimeric partner [Fe cation binding at His-215 and His-272]"
      - reference_id: UniProt:P48183
        supporting_text: "The D1/D2 heterodimer... shares a non-heme iron and each subunit binds pheophytin, quinone, additional chlorophylls, carotenoids and lipids"
- term:
    id: GO:0010242
    label: oxygen evolving activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for oxygen evolving activity (catalysis of 2 H2O = O2 + 4 H+ + 4 e-),
      inferred from EC 1.10.3.9. D1 provides most of the ligands for the Mn4-Ca-O5 cluster
      of the oxygen-evolving complex (OEC). UniProt feature annotations show binding of the
      [CaMn4O5] cluster at residues Asp-170, His-189, Glu-332, His-333, Ala-342, and Ala-344
      (HAMAP-Rule:MF_01379). The Tyr-161 residue forms the redox-active TyrZ radical
      intermediate that directly participates in electron extraction from water.
    action: ACCEPT
    reason: >-
      Oxygen evolving activity is one of the core molecular functions of psbA/D1. The D1
      subunit provides 5 of the 7 amino acid ligands to the Mn4-Ca-O5 cluster and the
      redox-active TyrZ (Tyr-161) that is the immediate electron donor to P680+. This is
      a defining catalytic activity.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "D1 provides most of the ligands for the Mn4-Ca-O5 cluster of the oxygen-evolving complex (OEC)"
      - reference_id: UniProt:P48183
        supporting_text: "Tyr-161 forms a radical intermediate that is referred to as redox-active TyrZ, YZ or Y-Z"
- term:
    id: GO:0015979
    label: photosynthesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for involvement in photosynthesis, transferred via UniRule UR000352928.
      D1 is essential for photosynthesis as the core reaction center subunit of PSII. However,
      this is a very broad BP term. More specific terms like GO:0009772 (photosynthetic electron
      transport in photosystem II) are already annotated and better capture the specific role.
    action: KEEP_AS_NON_CORE
    reason: >-
      While accurate — D1 is absolutely essential for oxygenic photosynthesis — the term
      GO:0015979 is very general. The more specific GO:0009772 (photosynthetic electron
      transport in photosystem II) is already annotated and better represents the specific
      biological process this protein participates in. This broad annotation is redundant
      but not incorrect.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "Photosystem II (PSII) is a light-driven water:plastoquinone oxidoreductase that uses light energy to abstract electrons from H(2)O, generating O(2) and a proton gradient subsequently used for ATP formation"
- term:
    id: GO:0016168
    label: chlorophyll binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for chlorophyll binding, transferred via UniRule UR000352928. D1 binds
      multiple chlorophyll a molecules including ChlzD1 (axial binding at His-118) and PD1
      (axial binding at His-198), one of the pair of chlorophylls constituting the P680
      reaction center. UniProt notes that "2 of the reaction center chlorophylls (ChlD1 and
      ChlD2) are entirely coordinated by water" (HAMAP-Rule:MF_01379).
    action: ACCEPT
    reason: >-
      Chlorophyll binding is a core molecular function of D1. The binding of PD1 chlorophyll
      is essential for formation of the P680 reaction center, and ChlzD1 participates in
      accessory electron transfer pathways. The structural binding sites are well-characterized.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "chlorophyll a binding [ChlzD1] axial binding residue at His-118"
      - reference_id: UniProt:P48183
        supporting_text: "chlorophyll a binding [PD1] axial binding residue at His-198"
      - reference_id: UniProt:P48183
        supporting_text: "2 of the reaction center chlorophylls (ChlD1 and ChlD2) are entirely coordinated by water"
- term:
    id: GO:0016682
    label: oxidoreductase activity, acting on diphenols and related substances as
      donors, oxygen as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation for oxidoreductase activity corresponding to EC 1.10.3.9
      (water:plastoquinone oxidoreductase), transferred via UniRule UR000352928. The PSII
      complex catalyzes: 2 plastoquinone + 4 hnu + 2 H2O = 2 plastoquinol + O2. This
      describes the overall enzymatic reaction of the PSII complex in which D1 is the
      central catalytic subunit.
    action: ACCEPT
    reason: >-
      This term captures the catalytic activity of the PSII reaction center. The catalytic
      activity annotation at EC 1.10.3.9 is specifically assigned to the D1/D2 heterodimer
      and is the defining enzymatic function. D1 binds the QB plastoquinone binding site
      (Ser-264, Phe-265, His-215) where plastoquinone is reduced to plastoquinol.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "Reaction=2 a plastoquinone + 4 hnu + 2 H2O = 2 a plastoquinol + O2; EC=1.10.3.9"
      - reference_id: UniProt:P48183
        supporting_text: "quinone binding [B] at Ser-264/Phe-265 and His-215"
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for electron transfer activity, inferred from InterPro IPR005867
      (PSII D1) and UniRule UR000352928. D1 contains a complete electron transfer chain:
      P680 -> pheophytin (PheoD1) -> QA (on D2) -> QB (on D1). The protein binds
      pheophytin a at Glu-126 and plastoquinone QB at His-215/Ser-264/Phe-265. Tyr-161
      (TyrZ) mediates electron transfer from the Mn4-Ca-O5 cluster to P680+.
    action: ACCEPT
    reason: >-
      Electron transfer activity is a core molecular function of D1. The D1 subunit
      directly participates in the photosynthetic electron transfer chain: TyrZ donates
      electrons to P680+, and the protein provides the QB binding site where the terminal
      electron acceptor plastoquinone is reduced. This is intrinsic to the catalytic
      mechanism.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "each subunit binds pheophytin, quinone, additional chlorophylls, carotenoids and lipids"
      - reference_id: UniProt:P48183
        supporting_text: "pheophytin a binding [D1] at Glu-126"
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for localization to the chloroplast thylakoid membrane, inferred from
      UniProtKB-SubCell SL-0058 and UniRule UR000352928. This localization is experimentally
      confirmed in maize by Fristedt et al. (PMID:22833285), who showed by mass spectrometry
      that D1 is present in thylakoid membranes of both bundle sheath and mesophyll
      chloroplasts, with PSII more abundant in mesophyll cells and in grana lamellae.
    action: ACCEPT
    reason: >-
      Chloroplast thylakoid membrane localization is well-established for D1 by direct
      experimental evidence in Zea mays (PMID:22833285). D1 is a multi-pass transmembrane
      protein with 5 transmembrane helices embedded in the thylakoid membrane.
    supported_by:
      - reference_id: PMID:22833285
        supporting_text: "the photosynthetic apparatus is partitioned over two cell types called mesophyll (M) and bundle sheath (BS), which have different structure and specialization of the photosynthetic thylakoid membranes"
      - reference_id: UniProt:P48183
        supporting_text: "Plastid, chloroplast thylakoid membrane; Multi-pass membrane protein"
- term:
    id: GO:0009536
    label: plastid
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation for localization to plastid, inferred by ARBA machine learning
      (ARBA:ARBA00027316). While technically correct — psbA is chloroplast-encoded and
      the D1 protein resides in the chloroplast — this is a less specific term than the
      already-annotated GO:0009535 (chloroplast thylakoid membrane), which precisely
      captures the sub-organellar localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      The plastid annotation is accurate but redundant with the more specific chloroplast
      thylakoid membrane annotation (GO:0009535). GO:0009536 (plastid) is a broad parent
      term. Since the more precise term is already annotated, this adds no additional
      information, but is not incorrect.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "Plastid, chloroplast thylakoid membrane"
- term:
    id: GO:0009772
    label: photosynthetic electron transport in photosystem II
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for involvement in photosynthetic electron transport in photosystem II,
      inferred from InterPro domains IPR000484 (Photo_RC_L/M) and IPR036854 (Photo_II_D1/D2_sf).
      D1 is the central subunit in PSII electron transport, hosting the primary electron
      transfer chain from water oxidation through TyrZ -> P680 -> PheoD1 -> QA -> QB ->
      plastoquinone pool. This is the most specific and accurate BP term for D1's role.
    action: ACCEPT
    reason: >-
      This is the most appropriate biological process term for psbA/D1. The protein is the
      core catalytic subunit mediating electron transfer from water to plastoquinone within
      PSII. This term is at the right level of specificity — more informative than the broad
      "photosynthesis" term while accurately describing the specific process.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "Photosystem II (PSII) is a light-driven water:plastoquinone oxidoreductase that uses light energy to abstract electrons from H(2)O, generating O(2) and a proton gradient subsequently used for ATP formation"
- term:
    id: GO:0019684
    label: photosynthesis, light reaction
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for involvement in photosynthesis, light reaction, inferred from
      InterPro domains IPR000484 and IPR036854. D1 is essential for the light-dependent
      reactions of photosynthesis as the reaction center where light energy drives charge
      separation. However, this term is intermediate in specificity between GO:0015979
      (photosynthesis) and GO:0009772 (photosynthetic electron transport in photosystem II).
    action: KEEP_AS_NON_CORE
    reason: >-
      Accurate but partially redundant with the more specific GO:0009772 (photosynthetic
      electron transport in photosystem II), which is already annotated. This broader term
      adds little additional information beyond what the PSII-specific electron transport
      term captures. Not wrong, but not the most informative annotation.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "Photosystem II (PSII) is a light-driven water:plastoquinone oxidoreductase that uses light energy to abstract electrons from H(2)O"
# New annotations not covered by existing GOA
- term:
    id: GO:0030145
    label: manganese ion binding
  evidence_type: IEA
  original_reference_id: HAMAP-Rule:MF_01379
  review:
    summary: >-
      D1 provides most of the amino acid ligands for the Mn4-Ca-O5 cluster of the
      oxygen-evolving complex (OEC). UniProt feature annotations show [CaMn4O5] cluster
      binding at residues Asp-170, His-189, Glu-332, His-333, Ala-342, and Ala-344
      (5 of the 7 protein ligands to the cluster). Manganese binding is essential for
      water oxidation activity and is a core molecular function not captured by existing
      annotations.
    action: NEW
    reason: >-
      The existing iron ion binding annotation captures the non-heme Fe, but the much more
      functionally important Mn4-Ca-O5 cluster binding is not annotated. D1 provides the
      majority of ligands to this catalytic metal center. Manganese ion binding is a core
      molecular function that should be annotated.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "D1 provides most of the ligands for the Mn4-Ca-O5 cluster of the oxygen-evolving complex (OEC)"
      - reference_id: UniProt:P48183
        supporting_text: "[CaMn4O5] cluster binding at Asp-170, His-189, Glu-332, His-333, Ala-342, Ala-344"
- term:
    id: GO:0048038
    label: quinone binding
  evidence_type: IEA
  original_reference_id: HAMAP-Rule:MF_01379
  review:
    summary: >-
      D1 provides the QB plastoquinone binding site, which is critical for PSII function.
      UniProt feature annotations show quinone binding at His-215 and Ser-264/Phe-265
      (HAMAP-Rule:MF_01379). The QB site is also the target of herbicides (atrazine,
      diuron, ioxynil) that compete for plastoquinone binding. This is a functionally
      important molecular function not captured by existing annotations.
    action: NEW
    reason: >-
      Quinone (plastoquinone) binding at the QB site is one of the most functionally
      important activities of D1 — it is essential for electron transfer from PSII to the
      plastoquinone pool and is the binding site for major herbicide classes. This is a
      core molecular function that should be annotated.
    supported_by:
      - reference_id: UniProt:P48183
        supporting_text: "quinone binding [B] at His-215 and Ser-264/Phe-265"
      - reference_id: UniProt:P48183
        supporting_text: "Herbicides such as atrazine, BNT, diuron or ioxynil bind in the Q(B) binding site and block subsequent electron transfer"
