id: B5BSU2
gene_symbol: CDT1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: >-
  CDT1 (MsCDT1) is a small cysteine-rich peptide (55 AA, 27% cysteine) from Miscanthus sinensis
  that confers tolerance to heavy metal ions, particularly cadmium and copper. It belongs to the
  CYSTM1 family (Pfam PF12734, PANTHER PTHR35470). The protein localizes to the plasma membrane
  and cell wall, where it chelates heavy metal ions via its cysteine-rich C-terminal domain,
  preventing their entry into root cells and reducing intracellular accumulation. MsCDT1 was
  identified as part of a novel cysteine-rich peptide family first discovered in Digitaria ciliaris
  (DcCDT1) growing in a former mining area. All functional characterization derives from orthologs
  DcCDT1 (A9ZPI1), OsCDT1 (Q5VSB5), and OsCDT3 (Q5VRD7), transferred to MsCDT1 by sequence
  similarity (ISS). Note that despite its name, MsCDT1 falls in PANTHER subfamily SF6 (with
  OsCDT3/OsCDT5) rather than SF12 (with DcCDT1/OsCDT1), suggesting it may be phylogenetically
  closer to the CDT3 subfamily.

existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProt subcellular location mapping. The UniProt entry for MsCDT1
      states "Cell membrane" based on similarity to DcCDT1 (A9ZPI1). Ortholog DcCDT1 was
      experimentally shown to localize to cytoplasmic membranes via GFP fusion experiments
      [PMID:19017626]. This IEA is consistent with multiple ISS annotations and experimental
      data from orthologs.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is central to MsCDT1 function. The protein is predicted to have
      a single transmembrane helix (residues 24-40) and the mechanism of heavy metal chelation
      requires membrane localization. GFP fusion experiments on orthologs DcCDT1 and OsCDT1
      demonstrated targeting to cytoplasmic membranes [PMID:19017626, PMID:19816106].
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Localization of green fluorescent protein fusions suggests that DcCDT1 and OsCDT1 are
        targeted to both cytoplasmic membranes and cell walls of plant cells.
    - reference_id: PMID:19816106
      supporting_text: >-
        GFP fusion experiments demonstrate that DcCDT1 and OsCDT1 are targeted to both the plant
        cytoplasmic membranes and cell walls.

- term:
    id: GO:0010038
    label: response to metal ion
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning models. The term "response to metal ion" is a
      broad biological process term. CDT family genes are transcriptionally upregulated by cadmium
      treatment [PMID:19017626], and the protein itself functions in metal detoxification, so the
      term applies. However, more specific detoxification terms (GO:0071585, GO:0010273) already
      capture the core function better.
    action: KEEP_AS_NON_CORE
    reason: >-
      While CDT1 is involved in responding to metal ions, this broad term is redundant with the
      more specific detoxification of cadmium ion and detoxification of copper ion annotations
      already present. The protein's core function is metal chelation and detoxification, not a
      general stress response. Keeping as non-core since it is technically correct but less
      informative than the specific detoxification annotations.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Five DcCDT1 homologs (here termed OsCDT1-OsCDT5) have been identified in rice, and all
        of them were up-regulated to varying degrees in the above-ground tissues by CdCl(2)
        treatment.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from DcCDT1 (A9ZPI1, Digitaria ciliaris), the founding member of
      the CDT family. DcCDT1 was experimentally localized to cytoplasmic membranes via GFP fusions
      in plant cells [PMID:19017626]. Although DcCDT1 is in PANTHER subfamily SF12 while MsCDT1 is
      in SF6, both share the CYSTM domain and predicted transmembrane helix, making plasma membrane
      localization highly conserved across the family.
    action: ACCEPT
    reason: >-
      Strong experimental evidence from the ortholog DcCDT1 (GFP fusion to plasma membrane),
      consistent predicted transmembrane topology (residues 24-40), and conserved function across
      the CYSTM1 family all support plasma membrane localization for MsCDT1.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Localization of green fluorescent protein fusions suggests that DcCDT1 and OsCDT1 are
        targeted to both cytoplasmic membranes and cell walls of plant cells.

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT1 (Q5VSB5, Oryza sativa), which was also shown to
      localize to cytoplasmic membranes via GFP fusions [PMID:19017626]. This is a duplicate of
      the plasma membrane annotation transferred from a different ortholog. OsCDT1 is in PANTHER
      subfamily SF12 (different from MsCDT1's SF6), but the transmembrane topology and localization
      are conserved across the CYSTM1 family.
    action: ACCEPT
    reason: >-
      Consistent with the other plasma membrane annotations. OsCDT1 GFP fusion data provides
      independent experimental support for membrane localization in a grass species (rice), which
      strengthens the case for the closely related MsCDT1.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Localization of green fluorescent protein fusions suggests that DcCDT1 and OsCDT1 are
        targeted to both cytoplasmic membranes and cell walls of plant cells.

- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT3 (Q5VRD7, rice), which is in the same PANTHER
      subfamily SF6 as MsCDT1. MsCDT1 is a cysteine-rich peptide (15 out of 55 residues are Cys)
      with a conserved CYSTM domain, consistent with metal ion chelation. The broadly conserved
      cysteine residues in the C-terminal region (CECCLDCLCCCCS) are expected to coordinate metal
      ions.
    action: ACCEPT
    reason: >-
      Metal ion binding is well supported by the protein's extreme cysteine content (27.3%) and
      the CYSTM domain architecture. The ISS transfer from OsCDT3 (same subfamily SF6) is
      phylogenetically appropriate. The UniProt function annotation states the protein chelates
      heavy metal ions at the plasma membrane. The more specific GO:0140487 (metal ion
      sequestering activity) is also annotated and captures the function more precisely, but
      metal ion binding is still informative as a general molecular function. Note that a 2024
      study on yeast CYSTM proteins suggests membrane binding may involve palmitoylation of
      cysteine residues rather than a classical TM helix, which could affect the interpretation
      of metal-binding cysteines vs membrane-anchoring cysteines.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        The 521 bp DcCDT1 cDNA contains an open reading frame of 168 bp and encodes a deduced
        peptide, DcCDT1, that is 55 amino acid residues in length, of which 15 (27.3%) are
        cysteine residues.
    - reference_id: file:9POAL/CDT1/CDT1-uniprot.txt
      supporting_text: >-
        Confers resistance to heavy metal ions (e.g. cadmium (CdCl(2)) and copper (CuCl(2)))
        by chelating them at the plasma membrane of root cells.
    - reference_id: file:9POAL/CDT1/CDT1-deep-research-falcon.md
      supporting_text: >-
        CYSTM proteins are described as small peptides/proteins with a conserved cysteine-rich
        C-terminal module and membrane association [with recent evidence that membrane binding
        involves palmitoylation rather than classical TM insertion]

- term:
    id: GO:0140487
    label: metal ion sequestering activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT3 (Q5VRD7, same PANTHER subfamily SF6). Metal ion
      sequestering activity accurately describes the core molecular function of CDT proteins:
      chelating heavy metal ions at the cell surface to prevent their entry into the cell. This
      is more specific than metal ion binding and directly reflects the detoxification mechanism.
    action: ACCEPT
    reason: >-
      This is the most precise molecular function term for CDT1. The protein's mechanism of action
      is to sequester (chelate) heavy metal ions at the plasma membrane, preventing cellular
      uptake. This is supported by yeast and plant experiments showing reduced intracellular Cd
      accumulation when CDT orthologs are expressed [PMID:19017626]. The ISS from OsCDT3 (same
      subfamily) is phylogenetically well-supported.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        DcCDT1 and OsCDT1 function to prevent entry of Cd into yeast and plant cells and thereby
        enhance their Cd tolerance.
    - reference_id: PMID:19816106
      supporting_text: >-
        Constitutive expression of DcCDT1 or OsCDT1 confers Cd-tolerance to transgenic A. thaliana
        plants by lowering the accumulation of Cd in the cells.

- term:
    id: GO:1990748
    label: cellular detoxification
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT3 (Q5VRD7, same PANTHER subfamily SF6). CDT proteins
      are involved in detoxification, but this term is a broad parent of the more specific
      detoxification of cadmium ion (GO:0071585) and detoxification of copper ion (GO:0010273)
      already annotated. It adds no additional information beyond those more specific terms.
    action: KEEP_AS_NON_CORE
    reason: >-
      Cellular detoxification is technically correct but redundant with the more specific child
      terms already present (detoxification of cadmium ion, detoxification of copper ion). The
      specific terms better capture CDT1's known function. Keeping as non-core since it is a valid
      parent term but does not add specificity.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Transgenic Arabidopsis thaliana plants overexpressing DcCDT1 or OsCDT1 displayed a
        Cd-tolerant phenotype and, consistent with our yeast data, accumulated lower amounts
        of Cd when grown on CdCl(2).

- term:
    id: GO:0009505
    label: plant-type cell wall
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT1 (Q5VSB5, rice). GFP fusion experiments on DcCDT1
      and OsCDT1 showed targeting to both cytoplasmic membranes AND cell walls of plant cells
      [PMID:19017626]. The UniProt entry for MsCDT1 also notes cell wall localization based on
      similarity. MsCDT1 has a predicted signal/transmembrane helix that could enable secretion
      to the cell wall.
    action: ACCEPT
    reason: >-
      Cell wall localization is experimentally demonstrated for CDT orthologs via GFP fusions and
      is consistent with the proposed mechanism of chelating metal ions at the cell surface to
      prevent entry. Both plasma membrane and cell wall localization represent core aspects of
      CDT1 function, as the protein needs to be at the cell surface to intercept incoming metal
      ions.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        Localization of green fluorescent protein fusions suggests that DcCDT1 and OsCDT1 are
        targeted to both cytoplasmic membranes and cell walls of plant cells.
    - reference_id: PMID:19816106
      supporting_text: >-
        GFP fusion experiments demonstrate that DcCDT1 and OsCDT1 are targeted to both the plant
        cytoplasmic membranes and cell walls.

- term:
    id: GO:0010273
    label: detoxification of copper ion
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT1 (Q5VSB5, rice). The UniProt function annotation
      for MsCDT1 explicitly mentions resistance to copper (CuCl2) in addition to cadmium, based
      on similarity to DcCDT1. Copper tolerance was demonstrated in the original functional
      characterization [PMID:19017626].
    action: ACCEPT
    reason: >-
      Copper detoxification is part of the demonstrated heavy metal tolerance profile of the CDT
      family. The UniProt annotation specifically mentions copper (CuCl2) chelation at the plasma
      membrane. This represents a core biological process of MsCDT1.
    supported_by:
    - reference_id: file:9POAL/CDT1/CDT1-uniprot.txt
      supporting_text: >-
        Confers resistance to heavy metal ions (e.g. cadmium (CdCl(2)) and copper (CuCl(2)))
        by chelating them at the plasma membrane of root cells, thus stopping their entry and
        reducing their accumulation.

- term:
    id: GO:0071585
    label: detoxification of cadmium ion
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from OsCDT1 (Q5VSB5, rice). Cadmium detoxification is the
      primary characterized function of the CDT family. The founding member DcCDT1 was isolated
      via functional screening for cadmium tolerance in yeast, and transgenic plants showed
      reduced Cd accumulation [PMID:19017626]. This is the most representative annotation for
      MsCDT1's core biological process.
    action: ACCEPT
    reason: >-
      Cadmium detoxification is the defining function of the CDT family. DcCDT1 was discovered
      through Cd tolerance screening, and the gene family name (CADMIUM TOLERANCE) reflects this.
      Orthologs reduce Cd accumulation by 2-fold in yeast and confer Cd tolerance in transgenic
      Arabidopsis. This is unambiguously a core function.
    supported_by:
    - reference_id: PMID:19017626
      supporting_text: >-
        By means of functional screening using the cadmium (Cd)-sensitive ycf1 yeast mutant, we
        have isolated a novel cDNA clone, DcCDT1, from Digitaria ciliaris growing in a former
        mining area in northern Japan, and have shown that it confers Cd tolerance to the yeast
        cells, which accumulated almost 2-fold lower Cd levels than control cells.
    - reference_id: PMID:19816106
      supporting_text: >-
        Constitutive expression of DcCDT1 or OsCDT1 confers Cd-tolerance to transgenic A. thaliana
        plants by lowering the accumulation of Cd in the cells.

references:
- id: PMID:19017626
  title: >-
    Novel cysteine-rich peptides from Digitaria ciliaris and Oryza sativa enhance tolerance to
    cadmium by limiting its cellular accumulation
  findings:
  - statement: >-
      Identified DcCDT1, a 55 AA cysteine-rich peptide (27.3% Cys) from Digitaria ciliaris that
      confers Cd tolerance to yeast and plants by reducing cellular Cd accumulation.
  - statement: >-
      GFP fusions show DcCDT1 and OsCDT1 localize to both cytoplasmic membranes and cell walls.
  - statement: >-
      Transgenic Arabidopsis overexpressing DcCDT1 or OsCDT1 displayed Cd-tolerant phenotype with
      reduced Cd accumulation.
  - statement: >-
      Five rice homologs (OsCDT1-5) were identified, all upregulated by CdCl2 treatment.
- id: PMID:19816106
  title: >-
    A novel plant cysteine-rich peptide family conferring cadmium tolerance to yeast and plants
  findings:
  - statement: >-
      Monocots have multiple CDT homologs (rice has 5), while dicots have a single homolog.
  - statement: >-
      Confirmed plasma membrane and cell wall targeting via GFP fusion experiments.
  - statement: >-
      CDT family defines a novel class of cysteine-rich peptides involved in heavy metal tolerance.
- id: GO_REF:0000024
  title: >-
    Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator
    judgment of sequence similarity
  findings: []
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary
    mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings: []
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings: []
- id: file:9POAL/CDT1/CDT1-uniprot.txt
  title: UniProt entry for CDT1_MISSI (B5BSU2)
  findings:
  - statement: >-
      Function: Confers resistance to cadmium and copper by chelating them at the plasma membrane
      of root cells, preventing entry and reducing accumulation (by similarity to DcCDT1 A9ZPI1).
  - statement: >-
      Subcellular location: Cell membrane (single-pass) and secreted to cell wall.
  - statement: >-
      Belongs to the CYSTM1 family. 55 AA with transmembrane helix at residues 24-40.
- id: file:9POAL/CDT1/CDT1-deep-research-falcon.md
  title: Deep research report on CDT1 (Falcon/Edison Scientific Literature)
  findings:
  - statement: >-
      Confirmed MsCDT1 identity as CYSTM family cadmium tolerance protein, distinct from
      unrelated eukaryotic DNA replication licensing factor CDT1.
  - statement: >-
      2024 mechanistic update: yeast CYSTM proteins bind membranes via S-acylation
      (palmitoylation) rather than classical TM helix (Giolito et al. 2024, JBC), suggesting
      caution in interpreting plant CDT1 membrane topology.
  - statement: >-
      WRKY transcription factors (e.g. GmWRKY142) directly activate CDT1-like gene expression
      under cadmium stress in soybean (Cai et al. 2020, Front Plant Sci).
  - statement: >-
      DcCDT1 also confers nickel hypersensitivity, suggesting metal specificity depends on
      exact cysteine motif arrangement.
- id: file:9POAL/CDT1/CDT1-notes.md
  title: Curator notes on CDT1 review
  findings:
  - statement: >-
      MsCDT1 is in PANTHER subfamily SF6 (with OsCDT3/OsCDT5) rather than SF12 (with
      DcCDT1/OsCDT1), suggesting it is phylogenetically closer to CDT3 despite its CDT1 name.

