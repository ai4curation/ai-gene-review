- id: file:9POAL/rbcL/rbcL-deep-research-falcon.md
  title: Deep research report on rbcL (RuBisCO large subunit) in Poales
  findings:
    - statement: >-
        Comprehensive literature synthesis confirming rbcL encodes the catalytic large subunit
        of Form I RuBisCO (L8S8), performing carboxylation and oxygenation of RuBP in the
        chloroplast stroma. Activation requires carbamylation of Lys-201 and Mg2+ coordination.
        In rice, the PPR protein RCN22 stabilizes rbcL mRNA via its 5' UTR, linking
        photosynthetic capacity to tillering via the TB1-RCN22-RbcL module.
core_functions:
# Core function 1: RuBisCO carboxylase -- Calvin cycle carbon fixation
- description: >-
    rbcL encodes the catalytic large subunit of RuBisCO, which enables
    ribulose-bisphosphate carboxylase activity (EC 4.1.1.39) to fix atmospheric CO2
    onto D-ribulose 1,5-bisphosphate, producing two molecules of 3-phosphoglycerate
    in the reductive pentose-phosphate cycle (Calvin-Benson-Bassham cycle). This is the
    primary carbon fixation reaction in photosynthesis. The enzyme requires Mg2+ as an
    essential cofactor, coordinated at the active site by carbamylated Lys-201, Asp-203,
    and Glu-204 (PMID:22609438). The L8S8 holoenzyme functions as a soluble complex in
    the chloroplast stroma.
  molecular_function:
    id: GO:0016984
    label: ribulose-bisphosphate carboxylase activity
  directly_involved_in:
  - id: GO:0015977
    label: carbon fixation
  - id: GO:0019253
    label: reductive pentose-phosphate cycle
  locations:
  - id: GO:0009570
    label: chloroplast stroma
  supported_by:
  - reference_id: PMID:22609438
    supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate"
  - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
    supporting_text: "RuBisCO catalyzes two reactions: the carboxylation of D-ribulose 1,5-bisphosphate, the primary event in carbon dioxide fixation"
# Core function 2: RuBisCO oxygenase -- photorespiration
- description: >-
    The same active site of RuBisCO also catalyzes the oxygenation of D-ribulose
    1,5-bisphosphate with O2 to produce 2-phosphoglycolate and 3-phosphoglycerate,
    initiating the photorespiratory pathway. This competing reaction is an intrinsic
    property of the enzyme that cannot be separated from the carboxylase activity.
    The oxygenase reaction has significant metabolic consequences, reducing
    photosynthetic efficiency particularly in C3 plants like rice.
  molecular_function:
    id: GO:0016984
    label: ribulose-bisphosphate carboxylase activity
  directly_involved_in:
  - id: GO:0009853
    label: photorespiration
  locations:
  - id: GO:0009570
    label: chloroplast stroma
  supported_by:
  - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
    supporting_text: "the oxidative fragmentation of the pentose substrate in the photorespiration process. Both reactions occur simultaneously and in competition at the same active site"
