id: P0C512
gene_symbol: rbcL
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:4479
  label: Poales
description: >-
  rbcL encodes the large subunit of ribulose-1,5-bisphosphate carboxylase/oxygenase
  (RuBisCO, EC 4.1.1.39), the most abundant protein on Earth and the central enzyme
  in photosynthetic carbon fixation. RuBisCO catalyzes two competing reactions at the
  same active site: (1) carboxylation of D-ribulose 1,5-bisphosphate (RuBP) with CO2
  to produce two molecules of 3-phosphoglycerate in the Calvin-Benson-Bassham cycle,
  and (2) oxygenation of RuBP with O2 to produce 2-phosphoglycolate and
  3-phosphoglycerate, initiating photorespiration. The enzyme is a form I
  heterohexadecamer (L8S8) localized in the chloroplast stroma, requiring Mg2+ as a
  cofactor and activation by Lys-201 carbamylation. This review uses the rice
  (Oryza sativa subsp. japonica, P0C512) entry as a representative for Poales.
existing_annotations:
- term:
    id: GO:0019253
    label: reductive pentose-phosphate cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000104
  review:
    summary: >-
      IEA annotation placing rbcL in the reductive pentose-phosphate cycle (Calvin-Benson-Bassham
      cycle), transferred via UniRule UR000339182 based on shared sequence features. RuBisCO
      catalyzes the carbon-fixing step of this cycle: carboxylation of RuBP to yield two molecules
      of 3-phosphoglycerate. This is the defining reaction of the Calvin cycle and the primary
      biological role of the large subunit.
    action: ACCEPT
    reason: >-
      The reductive pentose-phosphate cycle is the core biological process context for RuBisCO
      function. The large subunit catalyzes the rate-limiting carboxylation step of this pathway.
      UniProt states "RuBisCO catalyzes two reactions: the carboxylation of D-ribulose
      1,5-bisphosphate, the primary event in carbon dioxide fixation" (P0C512 FUNCTION).
      Crystal structure of rice RuBisCO confirms the active site architecture for this reaction
      (PMID:22609438).
    supported_by:
      - reference_id: PMID:22609438
        supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "RuBisCO catalyzes two reactions: the carboxylation of D-ribulose 1,5-bisphosphate, the primary event in carbon dioxide fixation"
      - reference_id: file:9POAL/rbcL/rbcL-deep-research-falcon.md
        supporting_text: "Rice RbcL is the catalytic large subunit of chloroplast Form I Rubisco, catalyzing RuBP carboxylation (CO2 fixation to produce 3PG) [in the reductive pentose-phosphate cycle]"
- term:
    id: GO:0000287
    label: magnesium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for magnesium ion binding, inferred from multiple InterPro signatures
      (IPR000685, IPR020878, IPR020888, IPR036376) and UniRule UR000339182. Mg2+ is an essential
      catalytic cofactor for RuBisCO, binding 1 ion per large subunit at the active site via
      the carbamylated Lys-201 residue. Crystal structure of rice RuBisCO at 1.35 A resolution
      directly demonstrates Mg2+ coordination (PMID:22609438).
    action: ACCEPT
    reason: >-
      Magnesium ion binding is experimentally validated as essential for RuBisCO catalysis.
      The 1.35 A crystal structure of rice RuBisCO (PDB: 1WDD) shows Mg2+ coordinated by
      carbamylated Lys-201, Asp-203, and Glu-204 (PMID:22609438). UniProt confirms
      "Binds 1 Mg(2+) ion per subunit" with experimental evidence ECO:0000269|PubMed:22609438.
    supported_by:
      - reference_id: PMID:22609438
        supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "Binds 1 Mg(2+) ion per subunit"
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for chloroplast localization, inferred from UniProtKB-SubCell SL-0049
      and UniRule. RuBisCO is localized in the chloroplast stroma where it catalyzes carbon
      fixation. The rbcL gene is itself chloroplast-encoded (plastid genome). UniProt states
      "Subcellular location: Plastid, chloroplast" for this entry. While correct, the more
      specific term GO:0009570 (chloroplast stroma) would be more informative, as RuBisCO is
      a soluble stromal enzyme.
    action: MODIFY
    reason: >-
      Chloroplast localization is correct but could be more specific. RuBisCO is a soluble
      enzyme in the chloroplast stroma, not associated with thylakoid membranes. GO:0009570
      (chloroplast stroma) more precisely captures the sub-organellar localization. The crystal
      structure was obtained from stromal extracts (PMID:22609438), and RuBisCO is a canonical
      chloroplast stroma marker protein.
    proposed_replacement_terms:
      - id: GO:0009570
        label: chloroplast stroma
    supported_by:
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Plastid, chloroplast"
      - reference_id: PMID:22609438
        supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate [enzyme purified from leaf chloroplast stroma]"
- term:
    id: GO:0009536
    label: plastid
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation for plastid localization via ARBA machine learning model ARBA00027316.
      This is correct but very general - plastid is the parent term of chloroplast. Since the
      more specific chloroplast annotation (GO:0009507) is already present and we propose
      further refinement to chloroplast stroma (GO:0009570), this broader plastid annotation
      is redundant.
    action: KEEP_AS_NON_CORE
    reason: >-
      Plastid localization is technically correct since chloroplasts are plastids, but this
      annotation is redundant with the more specific chloroplast annotation. It is not
      incorrect and reflects the ARBA automated inference, but does not add information
      beyond the chloroplast annotation. Retained as non-core rather than removed since
      it is not wrong.
    supported_by:
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Plastid, chloroplast"
- term:
    id: GO:0015977
    label: carbon fixation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for carbon fixation, inferred from multiple InterPro signatures
      (IPR017443, IPR020878, IPR020888, IPR036422) and UniRule. Carbon fixation is the
      defining biological function of RuBisCO - the enzyme catalyzes the primary reaction
      by which inorganic CO2 is incorporated into organic carbon (3-phosphoglycerate).
      This is a broader term than GO:0019253 (reductive pentose-phosphate cycle) but
      accurately captures the fundamental role of the enzyme.
    action: ACCEPT
    reason: >-
      Carbon fixation is the core biological function of RuBisCO and an appropriate
      annotation at the broader process level. While the more specific reductive
      pentose-phosphate cycle term (GO:0019253) is also present, carbon fixation as a
      standalone process annotation is warranted because it directly describes what the
      enzyme does - incorporating CO2 into organic molecules. UniProt keywords include
      "Carbon dioxide fixation" and "Calvin cycle" for this entry.
    supported_by:
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "RuBisCO catalyzes two reactions: the carboxylation of D-ribulose 1,5-bisphosphate, the primary event in carbon dioxide fixation"
- term:
    id: GO:0016984
    label: ribulose-bisphosphate carboxylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for ribulose-bisphosphate carboxylase activity (EC 4.1.1.39), inferred
      from multiple InterPro signatures, Rhea reaction RHEA:23124, EC number, and UniRule.
      This is the primary molecular function of the rbcL gene product. The enzyme catalyzes
      the reaction: D-ribulose 1,5-bisphosphate + CO2 + H2O = 2 (2R)-3-phosphoglycerate + 2 H+.
      Crystal structure of rice RuBisCO confirms the active site with substrate binding residues
      and transition state analog 2-CABP bound (PMID:22609438).
    action: ACCEPT
    reason: >-
      This is the defining molecular function of RuBisCO and the most specific appropriate
      MF term. The carboxylase activity is directly demonstrated by the 1.35 A crystal
      structure of rice RuBisCO in complex with transition-state analog 2-CABP
      (PMID:22609438). UniProt assigns EC 4.1.1.39 and the catalytic activity is described
      with Rhea cross-reference RHEA:23124. This is the single most important annotation
      for this gene product.
    supported_by:
      - reference_id: PMID:22609438
        supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "Reaction=2 (2R)-3-phosphoglycerate + 2 H(+) = D-ribulose 1,5-bisphosphate + CO2 + H2O; EC=4.1.1.39"
- term:
    id: GO:0009536
    label: plastid
  evidence_type: IC
  original_reference_id: PMID:12520024
  review:
    summary: >-
      IC (Inferred by Curator) annotation for plastid localization, assigned by Gramene with
      reference to PMID:12520024 (Swiss-Prot knowledgebase description paper). This is a
      curator inference based on the UniProt/Swiss-Prot annotation that rbcL is encoded by
      the plastid genome and localized to the plastid/chloroplast. The reference is a database
      description paper rather than primary research on rbcL localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      This IC annotation is correct - rbcL is indeed located in the plastid (specifically
      chloroplast). However, it is redundant with the IEA chloroplast annotation (GO:0009507)
      and the other IEA plastid annotation (GO:0009536). The reference PMID:12520024 is a
      Swiss-Prot database paper, not primary evidence for rbcL localization, though the
      curator inference itself is sound. Retained as non-core since the IC evidence code
      adds curatorial validation but the term is less specific than chloroplast.
    supported_by:
      - reference_id: PMID:12520024
        supporting_text: "SWISS-PROT provides annotated entries for all species"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Plastid, chloroplast"
- term:
    id: GO:0009853
    label: photorespiration
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      New annotation for photorespiration. RuBisCO catalyzes the oxygenase reaction that
      initiates the photorespiratory pathway: D-ribulose 1,5-bisphosphate + O2 =
      2-phosphoglycolate + 3-phosphoglycerate + 2 H+. This reaction occurs at the same
      active site as carboxylation, in competition with CO2 fixation. UniProt lists
      photorespiration as a keyword and cross-references GO:0009853 via UniProtKB-KW.
      This annotation is present in the UniProt DR lines but was not captured in the GOA
      download.
    action: NEW
    reason: >-
      Photorespiration is a biologically important process directly initiated by RuBisCO's
      oxygenase activity. UniProt explicitly describes this dual function: "the oxidative
      fragmentation of the pentose substrate in the photorespiration process. Both reactions
      occur simultaneously and in competition at the same active site." The oxygenase
      reaction is catalyzed with Rhea cross-reference RHEA:36631. This annotation should
      be included as it represents a core function of rbcL that is absent from the current
      GOA annotation set.
    supported_by:
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "the oxidative fragmentation of the pentose substrate in the photorespiration process. Both reactions occur simultaneously and in competition at the same active site"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "Reaction=D-ribulose 1,5-bisphosphate + O2 = 2-phosphoglycolate + (2R)-3-phosphoglycerate + 2 H(+); Xref=Rhea:RHEA:36631"
- term:
    id: GO:0009570
    label: chloroplast stroma
  evidence_type: IDA
  original_reference_id: PMID:22609438
  review:
    summary: >-
      New annotation for chloroplast stroma localization. RuBisCO is a soluble enzyme in
      the chloroplast stroma where it performs carbon fixation. The crystal structure was
      obtained from rice leaf chloroplast stromal extracts (PMID:22609438). This is a more
      specific localization than the existing chloroplast (GO:0009507) annotation.
    action: NEW
    reason: >-
      RuBisCO is universally recognized as a chloroplast stroma protein. The rice crystal
      structure (PMID:22609438) was obtained from leaf tissue chloroplast preparations, and
      the enzyme functions as a soluble stromal protein. GO:0009570 (chloroplast stroma)
      provides more informative sub-organellar localization than the generic chloroplast term.
    supported_by:
      - reference_id: PMID:22609438
        supporting_text: "Crystal structure of rice Rubisco and implications for activation induced by positive effectors NADPH and 6-phosphogluconate"
      - reference_id: file:9POAL/rbcL/rbcL-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Plastid, chloroplast"
