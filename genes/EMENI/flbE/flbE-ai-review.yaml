  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: flbE encodes a small upstream developmental activator of conidiation in Aspergillus nidulans
  that is functionally and physically associated with the bZIP transcription factor FlbB at the hyphal
  tip. FlbE is required for FlbB activity and for timely induction of conidiation; it also influences
  sexual development. Its own molecular activity is not defined (it has no characterized catalytic or
  DNA-binding function), so it is modeled as an accessory activator.
