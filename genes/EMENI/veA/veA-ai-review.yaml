id: C8VTV4
gene_symbol: veA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: veA (velvet A) is the founding member of the velvet superfamily of fungal regulatory proteins
  and the central light-responsive coordinator of development and secondary metabolism in Aspergillus
  nidulans. VeA is primarily expressed and nuclear in the dark, where it bridges VelB and the methyltransferase
  LaeA to form the heterotrimeric VelB-VeA-LaeA (velvet) complex; light and the phytochrome/white-collar
  system restrict its nuclear import, shifting the balance from sexual toward asexual development and
  modulating secondary-metabolite gene clusters. VeA thus partitions between cytoplasm and nucleus in
  a light-dependent manner.
