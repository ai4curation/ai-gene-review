  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: wetA is the late-acting regulator of the brlA -> abaA -> wetA central regulatory pathway
  controlling asexual sporulation (conidiation) in Aspergillus nidulans. Activated during conidiogenesis
  by the sequential expression of brlA and abaA, WetA is required for synthesis of the conidial cell-wall
  layers that make spores impermeable and for the final maturation stages of the conidium. In wetA mutants,
  conidia form normally but fail to mature (Stages II and III), take up water and autolyse (the "wet-white"
  phenotype). WetA activates spore-specific gene expression, driving conidial wall assembly and pigment
  deposition; its own molecular mechanism is that of a developmental regulator of gene expression rather
  than a characterized sequence-specific DNA-binding factor.
