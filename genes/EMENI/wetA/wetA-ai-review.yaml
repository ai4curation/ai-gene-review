core_functions:
- description: 'Late developmental regulator of conidiation: WetA, activated by the sequential action
    of BrlA and AbaA, drives spore-specific gene expression required for conidial cell-wall layer assembly,
    impermeability and final spore maturation. Its molecular mechanism is that of a regulator of gene
    expression; a specific sequence-specific DNA-binding activity has not been firmly established, so
    no molecular_function term is asserted.'
