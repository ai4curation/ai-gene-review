core_functions:
- description: >-
    Master transcriptional regulator of conidiation: as a sequence-specific C2H2
    zinc-finger DNA-binding transcription factor, BrlA activates the conidiophore
    developmental program (including abaA and wetA), switching hyphae from vegetative
    growth to asexual spore production.
