- term:
    id: GO:0042594
    label: response to starvation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Keep as non-core. Nutrient starvation is a physiological cue that induces brlA and
      hence conidiation; this is a regulatory input rather than a core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      The IBA is phylogenetically propagated, but it is concordant with direct A. nidulans
      evidence (PMID:7894714, IEP) that starvation modulates brlA expression. Nutrient
      limitation is a well-established trigger of conidiation, so the link is real but
      non-core; kept consistent with the IEP annotation to the same term rather than marked
      as over-annotated.
