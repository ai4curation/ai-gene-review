id: P10069
gene_symbol: brlA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194
    / M139)
description: >-
  brlA ("bristle") is a C2H2 zinc-finger transcription factor that acts as the master
  regulator of asexual sporulation (conidiation) in Aspergillus nidulans. It is
  necessary and sufficient to direct the developmental switch from indeterminate apical
  hyphal growth to the budding growth pattern of the conidiophore. BrlA is the top-tier
  regulator of the brlA -> abaA -> wetA central regulatory pathway: its expression,
  induced by the upstream FluG/Flb developmental-competence machinery, activates abaA
  and wetA and drives conidiophore morphogenesis, cessation of vegetative growth, and
  conidium (spore) formation. BrlA binds sequence-specific DNA response elements (BREs)
  and functions in the nucleus. The locus comprises two overlapping, individually
  required transcription units (brlAalpha and brlAbeta). Beyond its core role, brlA
  activity also influences secondary metabolism (sterigmatocystin biosynthesis) and
  asexual-sporulation-associated autolysis.
