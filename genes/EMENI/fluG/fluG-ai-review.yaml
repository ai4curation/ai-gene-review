taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: fluG encodes a cytoplasmic protein related to prokaryotic glutamine synthetase I (GSI) that
  is the upstream-most activator of asexual sporulation (conidiation) in Aspergillus nidulans. FluG is
  required for the production/accumulation of a small extracellular developmental signal; fluG-null strains
  fail to conidiate and grow as undifferentiated 'fluffy' colonies. Signalling from FluG relieves repression
  by SfgA and thereby permits induction of the Flb factors and the master regulator brlA. Although FluG
  belongs to the glutamine synthetase family, its role is signal biosynthesis; a classical in vivo glutamine
  synthetase activity has not been firmly demonstrated (A. nidulans glutamine synthesis is provided by
  GlnA). FluG also influences secondary metabolism (sterigmatocystin).
