taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: flbB encodes a basic-leucine-zipper (bZIP) transcription factor that is one of the upstream
  developmental activators (UDAs) controlling asexual sporulation in Aspergillus nidulans. FlbB shows
  a distinctive dual localization to the hyphal tip and the nucleus, binds DNA, and is required for timely
  induction of brlA and conidiation. It acts together with FlbE (with which it interacts at the hyphal
  tip) and with FlbD/FlbC upstream of the brlA->abaA->wetA central pathway.
