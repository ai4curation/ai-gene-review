taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: flbD encodes a Myb-like DNA-binding transcription factor that is an upstream developmental
  activator coordinating the initiation of conidiophore development in Aspergillus nidulans, and is uniquely
  required for both asexual (conidiation) and sexual (cleistothecium/ascospore) differentiation. FlbD
  acts with FlbB upstream of brlA. Many of its electronic (ARBA/InterPro2GO) annotations are propagated
  from plant/animal Myb orthologs and describe processes absent from filamentous fungi.
