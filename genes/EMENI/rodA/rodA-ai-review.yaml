taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: rodA (originally CAN41/RodA) encodes a class I hydrophobin that is the principal structural
  component of the rodlet layer on the surface of Aspergillus nidulans conidia. Activated early by brlA
  during conidiophore development, RodA self-assembles into the outer hydrophobic rodlet mosaic that confers
  spore-surface hydrophobicity and dispersal; rodA (rodletless) mutants lack the rodlet layer.
