description: 'velB (velvet-like protein B) is a velvet-family regulatory protein and a hub of the fungal
  developmental regulatory network in Aspergillus nidulans. It participates in two light-regulated complexes:
  the VelB-VeA-LaeA (velvet) complex formed in the dark, which promotes sexual development and secondary
  metabolism, and the VosA-VelB complex that controls spore maturation, trehalose biogenesis and repression
  of cell-wall genes. As an NF-kB-like DNA-binding regulator, VelB positively regulates sexual sporulation
  and sterigmatocystin biosynthesis while restraining asexual conidiation, and shuttles between nucleus
  and cytoplasm.'
