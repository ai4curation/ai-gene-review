taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: flbC encodes a nuclear C2H2 zinc-finger transcription factor that is one of the upstream
  developmental activators of asexual sporulation in Aspergillus nidulans. FlbC contributes to induction
  of brlA and conidiation and also influences spore germination; it acts in parallel with FlbB/FlbD upstream
  of the brlA->abaA->wetA central pathway.
