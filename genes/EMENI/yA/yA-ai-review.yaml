taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: yA encodes the conidial laccase (p-diphenol oxidase / hydroquinone:oxygen oxidoreductase),
  a copper-containing enzyme secreted into the Aspergillus nidulans conidial wall. yA catalyzes the final
  oxidation step converting the yellow wA-derived naphthopyrone precursor into the mature green conidial
  pigment; yA (yellow) mutants accumulate the yellow precursor and lack the green color.
