  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: laeA is a nuclear, SAM-dependent methyltransferase (velvet-complex subunit) that acts as
  a global regulator of secondary metabolism in Aspergillus nidulans and related Aspergilli. Deletion
  of laeA blocks expression of diverse secondary-metabolite gene clusters (sterigmatocystin, penicillin,
  lovastatin), while overexpression increases them; LaeA acts at the level of chromatin/cluster activation.
  Biochemically LaeA is a methyltransferase that undergoes automethylation generating S-methylmethionine;
  it forms the VelB-VeA-LaeA velvet complex, coupling development (including sexual sporulation) to secondary
  metabolism, and contributes to chemical defense/virulence via the metabolites it controls.
