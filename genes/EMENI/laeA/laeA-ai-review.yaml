core_functions:
- description: 'Nuclear SAM-dependent methyltransferase and global regulator of secondary metabolism:
    LaeA controls activation of diverse secondary-metabolite gene clusters (sterigmatocystin, penicillin,
    lovastatin) and, as part of the VelB-VeA-LaeA velvet complex, couples secondary metabolism to development.
    A specific physiological methylation substrate beyond automethylation remains under investigation.'
