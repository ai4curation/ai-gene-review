id: P38093
gene_symbol: flbA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: flbA encodes a Regulator of G-protein Signaling (RGS) domain protein that antagonizes FadA
  (G-alpha) signaling in Aspergillus nidulans, stimulating GTP hydrolysis to switch off proliferation
  signaling and thereby license asexual sporulation. flbA loss gives fluffy, aconidial colonies with low
  brlA; flbA overexpression activates brlA and premature development. FlbA also positively influences
  sterigmatocystin biosynthesis.
