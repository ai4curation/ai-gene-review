taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans
description: sfgA (suppressor of fluG) encodes a Zn(II)2Cys6 (zinc-cluster) DNA-binding transcription
  factor that acts as a negative regulator of asexual sporulation in Aspergillus nidulans, functioning
  genetically downstream of FluG and upstream of the Flb activators. FluG-dependent signalling relieves
  SfgA-mediated repression, permitting conidiation. Current GOA annotations for SfgA are entirely electronic
  and describe generic zinc-cluster transcription-factor properties; its characterized repressor role
  in conidiation is not yet captured by GOA.
