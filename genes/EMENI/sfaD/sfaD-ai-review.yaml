  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: sfaD encodes the beta subunit of the heterotrimeric G protein of Aspergillus nidulans. As
  part of the FadA(alpha)-SfaD(beta)-GpgA(gamma) complex it is required for normal vegetative growth and
  for repression of asexual sporulation, and it promotes secondary metabolism (sterigmatocystin) and sexual
  development. SfaD functions as a Gbeta signaling adaptor.
