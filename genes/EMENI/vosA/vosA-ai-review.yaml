  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: vosA ("viability of spores A") is a velvet-family regulatory protein that governs spore maturation
  and dormancy in Aspergillus nidulans. Expressed specifically during formation of both asexual (conidia)
  and sexual (ascospores) spores, VosA couples sporogenesis to trehalose biogenesis and, together with
  VelB, forms an NF-kB-like DNA-binding regulatory complex that represses cell-wall (beta-glucan) biosynthetic
  genes in spores and confers spore viability, trehalose accumulation and long-term stress resistance.
  VosA also feeds back to restrain premature germination and asexual development.
