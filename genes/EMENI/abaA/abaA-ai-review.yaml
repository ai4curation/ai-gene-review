  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: abaA ("abacus") is a TEA/ATTS-domain transcription factor that controls the middle stage
  of asexual sporulation (conidiation) in Aspergillus nidulans. Activated by the master regulator BrlA,
  AbaA drives differentiation of the phialides — the sporogenous cells that bud off conidia — and is required
  for the terminal stages of conidiophore development. AbaA binds the sequence 5'-CATTCY-3' in the cis-regulatory
  regions of many developmentally regulated structural genes and of the regulatory genes brlA, wetA and
  abaA itself, thereby coupling the brlA -> abaA -> wetA central regulatory pathway. Loss of abaA produces
  aberrant, beaded ("abacus") conidiophores that make metula-like cells instead of phialides and fail
  to produce conidia.
