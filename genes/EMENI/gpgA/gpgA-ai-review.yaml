  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: 'gpgA encodes the gamma subunit of the heterotrimeric G protein of Aspergillus nidulans.
  As part of the FadA(alpha)-SfaD(beta)-GpgA(gamma) complex, GpgA governs vegetative growth and development:
  it is required for normal growth and proper conidiation and influences sterigmatocystin production and
  sexual development.'
