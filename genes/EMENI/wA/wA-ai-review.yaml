id: Q03149
gene_symbol: wA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: wA encodes the polyketide synthase responsible for the first step of conidial green-pigment
  biosynthesis in Aspergillus nidulans. wA produces the naphthopyrone (YWA1) precursor of the conidial
  pigment; wA mutants form colorless (white) conidia. The pigment is subsequently modified by downstream
  enzymes including the conidial laccase yA to yield the mature green color.
