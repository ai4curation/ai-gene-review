taxon:
  id: NCBITaxon:227321
  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: fadA encodes the alpha subunit of the principal heterotrimeric G protein of Aspergillus nidulans.
  GTP-bound (active) FadA promotes vegetative (hyphal) proliferation and represses asexual sporulation
  and secondary metabolism; its signaling is attenuated by the RGS protein FlbA, which licenses conidiation.
  FadA (with the Gbeta SfaD and Ggamma GpgA) thus sits at the growth/development decision point, and also
  modulates sterigmatocystin and penicillin production and sexual development.
