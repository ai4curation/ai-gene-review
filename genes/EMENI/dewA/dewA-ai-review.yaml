  label: Emericella nidulans (strain FGSC A4 / ATCC 38163 / CBS 112.46 / NRRL 194 / M139)
description: dewA encodes a class I hydrophobin component of the Aspergillus nidulans spore wall. DewA
  contributes, alongside RodA, to the hydrophobic surface layer of conidia; the small, hydrophobic cell-wall
  protein accumulates during asexual sporulation and confers spore-surface properties such as wettability/hydrophobicity.
