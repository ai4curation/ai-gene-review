    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        Reassessed from NPI to CNN on independent review. The original call rejected
        autophagosome localization outright, but that was too harsh: an independent OpenScientist
        investigation (see file reference), corroborated by a direct QuickGO check, shows the
        human ortholog TBC1D14 (Q9P2M4) carries a curated IDA autophagosome annotation
        (GO:0005776, located_in) from Longatti et al. 2012 (PMID:22613832), plus a phylogenetic
        IBA (GO_REF:0000033). Autophagosome localization is therefore experimentally established
        for the ortholog and defensible for this fish protein by orthology, so the prediction is
        correct (and not novel, as it reflects known ortholog biology). The valid caveat preserved
        from the original review is one of precision, not correctness: autophagosome is a
        secondary, condition-dependent localization -- TBC1D14's primary compartment is the
        RAB11-positive recycling endosome (GO:0055037; relocalizing to the Golgi on starvation),
        and its core role is regulatory (negative regulation of autophagy initiation via ULK1 and
        ATG9 trafficking). Curation guidance: retain GO:0005776, but alongside recycling endosome
        and regulation-of-autophagy terms, never as the sole or primary cellular component. (The
        pre-existing vacuole annotation GO:0005773 remains flagged MARK_AS_OVER_ANNOTATED in the
        curated review.)
      supported_by:
        - reference_id: file:GADMO/A0A8C5FPT8/A0A8C5FPT8-hypotheses/prediction-autophagosome/openscientist.md
          supporting_text: defensible for the fish protein by orthology and should be retained
