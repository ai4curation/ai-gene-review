      summary: >-
        ProtNLM2 predicted GO:0005776 (autophagosome) as a more specific
        replacement for the existing GOA annotation GO:0005773 (vacuole).
        This prediction is incorrect. TBC1D14 is a negative regulator of
        macroautophagy that acts by controlling ATG9 vesicle trafficking from
        recycling endosomes, but it does not localize to autophagosomes
        themselves. Detailed studies of mammalian TBC1D14 (Lamb et al. 2016)
        demonstrate localization to RAB11-positive recycling endosomes, the
        Golgi complex, and tubulo-vesicular transport intermediates between
        these compartments. When TBC1D14 is overexpressed, it causes tubulation
        of recycling endosomes and sequesters ULK1 and ATG9 away from
        autophagosome formation sites, thereby inhibiting autophagy -- but
        TBC1D14 itself remains on the endosomal compartment, not on the
        autophagosome. The existing vacuole annotation (GO:0005773) was already
        flagged as MARK_AS_OVER_ANNOTATED in the curated review because no
        evidence supports vacuolar or lysosomal localization. The ProtNLM2
        prediction of autophagosome appears to conflate functional involvement
        in autophagy regulation (a biological process) with physical residence
        at the autophagosome (a cellular component), a category error. The
        correct cellular component annotations for TBC1D14 would be recycling
        endosome (GO:0055037) and Golgi apparatus (GO:0005794), neither of
        which was predicted.
