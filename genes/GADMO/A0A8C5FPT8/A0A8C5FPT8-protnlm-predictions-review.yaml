description: >-
  ProtNLM2 predicted GO:0005776 (autophagosome) for the Atlantic cod TBC1D14
  ortholog, a Rab-GAP TBC domain-containing protein. While TBC1D14 is functionally
  linked to autophagy -- it negatively regulates macroautophagy by controlling
  ATG9 trafficking from recycling endosomes to autophagosome formation sites --
  the protein itself does not localize to autophagosomes. Studies of mammalian
  TBC1D14 orthologs place it at recycling endosomes, the Golgi complex, and
  tubulo-vesicular transport intermediates (Lamb et al. 2016, EMBO J). The
  existing GOA annotation GO:0005773 (vacuole) was itself flagged as an
  over-annotation in the curated review, and the ProtNLM2 prediction of
  autophagosome -- a child of vacuole in the GO hierarchy -- compounds this
  error by assigning a more specific but still incorrect compartment. The model
  appears to have conflated functional involvement in autophagy regulation with
  physical localization to the autophagosome, a common confusion for proteins
  that regulate organelle biogenesis from a different compartment. Assessment:
  0 correct, 1 incorrect (NPI). Total CS = 0/2.
