  title: Reduced TUBA1A Tubulin Causes Defects in Trafficking and Impaired Adult Motor Behavior.
  findings:
    - statement: Tuba1a ND heterozygotes have reduced microtubule tracks in axons
    - statement: Increased organelle trafficking pausing
    - statement: Adult-onset ataxia
    - statement: Age-related NMJ synapse size reduction without neuronal death
- id: PMID:37865089
  title: De novo protein identification in mammalian sperm using in situ cryoelectron tomography and AlphaFold2 docking.
  findings:
