# ============================================================
# IPI annotation for CYLD interaction (PMID:19893491)
# ============================================================
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19893491
  review:
    summary: PMID:19893491 demonstrates that CYLD interacts with alpha-tubulin through its CAP-Gly domains. The interaction was shown by co-immunoprecipitation in keratinocytes and melanocytes. However, "protein binding" is uninformative.
    action: MODIFY
    reason: The annotation should be more specific. The interaction with CYLD via CAP-Gly domains represents a functional interaction where CYLD inhibits HDAC6-mediated tubulin deacetylation. A better term would be something reflecting the actual binding relationship, but since Tuba1a is the substrate/target rather than having a specific binding activity, this is a legitimate but uninformative annotation.
    proposed_replacement_terms:
      - id: GO:0005515
        label: protein binding
    additional_reference_ids:
      - PMID:19893491
    supported_by:
      - reference_id: PMID:19893491
        supporting_text: "Immunoprecipitation of endogenous CYLD in melanocytes revealed an interaction with alpha-tubulin"
