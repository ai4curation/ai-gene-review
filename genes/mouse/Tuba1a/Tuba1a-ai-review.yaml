# NEW annotations suggested
# ============================================================
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000002
  review:
    summary: Alpha-tubulin has GTPase activity at the E-site (exchangeable site) of beta-tubulin, which is stimulated upon heterodimer incorporation into the microtubule lattice. UniProt annotates Tuba1a with EC 3.6.5.- and catalytic activity for GTP hydrolysis. The GTPase activity is essential for microtubule dynamic instability.
    action: NEW
    reason: GTPase activity is a well-established enzymatic function of alpha-tubulin that is missing from the current GO annotations. UniProt records the catalytic activity (GTP + H2O = GDP + phosphate + H+) based on similarity to human TUBA1B. This is a core molecular function that should be annotated.
    supported_by:
      - reference_id: PMID:17218254
        supporting_text: "GTP bound at the N site does not undergo hydrolysis and is thought to act as a structural cofactor stabilizing the alpha/beta heterodimer"
core_functions:
  - description: Alpha-tubulin is the fundamental structural component of the microtubule cytoskeleton, forming alpha/beta heterodimers with beta-tubulin that polymerize into microtubule filaments.
    molecular_function:
      id: GO:0005200
      label: structural constituent of cytoskeleton
    locations:
    - id: GO:0005874
      label: microtubule
    directly_involved_in:
    - id: GO:0000226
      label: microtubule cytoskeleton organization
    supported_by:
    - reference_id: PMID:17218254
      supporting_text: Tuba1a S140G mutation disrupts microtubule organization in cortical and hippocampal neurons, confirmed by BAC transgene rescue.
  - description: GTP binding at the N-site is essential for alpha/beta heterodimer stability. The S140G mutation in the GTP binding pocket reduces GTP binding approximately 5-fold.
    molecular_function:
      id: GO:0005525
      label: GTP binding
    directly_involved_in:
    - id: GO:0046785
      label: microtubule polymerization
    supported_by:
    - reference_id: PMID:17218254
      supporting_text: S140G mutation in the GTP binding pocket reduces GTP binding approximately 5-fold and heterodimer formation.
    - reference_id: PMID:20603323
      supporting_text: Nine disease-causing TUBA1A mutations cause defects in chaperone interactions and reduced heterodimer formation.
  - description: Alpha-tubulin heterodimerizes with beta-tubulin through the chaperone-dependent folding pathway (CCT, prefoldin, TBCA-TBCE), generating the building block of microtubules.
    molecular_function:
      id: GO:0046982
      label: protein heterodimerization activity
    directly_involved_in: []
    supported_by:
    - reference_id: PMID:20603323
      supporting_text: Disease-associated mutations cause a spectrum of defects in the tubulin folding and heterodimer assembly pathway involving prefoldin, CCT, and TBCB.
  - description: Tuba1a is essential for neuronal migration in the developing brain. Demonstrated by multiple independent mutant alleles in mice and human lissencephaly mutations.
    molecular_function:
      id: GO:0005200
      label: structural constituent of cytoskeleton
    directly_involved_in:
    - id: GO:0001764
      label: neuron migration
    - id: GO:0021987
      label: cerebral cortex development
    - id: GO:0048853
      label: forebrain morphogenesis
    supported_by:
    - reference_id: PMID:17218254
      supporting_text: S140G mutation causes impaired radial migration at E14.5 and E16.5, fractured pyramidal cell layer in hippocampus.
    - reference_id: PMID:28687665
      supporting_text: S140G mutation leads to straighter microtubules, slowed neuronal migration with increased branching, and perturbed nucleus-centrosome coupling.
    - reference_id: PMID:31386652
      supporting_text: Tuba1a null is perinatal lethal with significant forebrain dysmorphology, demonstrating non-redundant role.
  - description: Component of sperm flagellar doublet microtubules, contributing to flagellar structure and motility.
    molecular_function:
      id: GO:0005200
      label: structural constituent of cytoskeleton
    locations:
    - id: GO:0036126
      label: sperm flagellum
    directly_involved_in:
    - id: GO:0030317
      label: flagellated sperm motility
    supported_by:
    - reference_id: PMID:37865089
      supporting_text: Tuba1a identified in sperm flagellar doublet microtubules by cryo-ET at 7.7 angstrom resolution.
