  title: Frmpd2 deep research (falcon provider)
  findings:
  - statement: Comprehensive literature review confirming Frmpd2 functions as a multi-context
      scaffold protein with roles in NMDAR anchoring (hippocampus), photoreceptor
      synapse organization (retina), epithelial polarity/tight junctions, and NOD2
      innate immune signaling. Epilepsy relevance noted from bioRxiv preprint.
suggested_questions:
- question: Does Frmpd2 play a role in NOD2-mediated innate immune signaling in mouse
    intestinal epithelial cells, or is this function specific to human FRMPD2?
  experts:
  - Lipinski S
  - Rosenstiel P
- question: What is the functional significance of the KIND domain in Frmpd2? It is
    present in the protein but its specific role has not been characterized.
  experts: []
- question: Does Frmpd2 interact with actin filaments via its FERM domain in vivo,
    and does this contribute to excitatory synapse morphogenesis as suggested by the
    bioRxiv preprint?
  experts:
  - Lu X
suggested_experiments:
- hypothesis: Frmpd2 knockout in mouse would impair NMDAR-mediated synaptic transmission
    and may cause epilepsy-related phenotypes.
  description: Generate Frmpd2 conditional knockout mice (neuron-specific) and assess
    NMDAR-mediated synaptic transmission via electrophysiology in hippocampal slices.
    Monitor for spontaneous seizures and test in epilepsy paradigms.
  experiment_type: knockout/electrophysiology
- hypothesis: Frmpd2 is required for cone photoreceptor synapse formation independently
    of Lrit1.
  description: Generate Frmpd2 retina-specific knockout mice and assess cone photoreceptor
    pedicle morphology and cone ON-bipolar cell responses by ERG and immunohistochemistry.
  experiment_type: knockout/electrophysiology
