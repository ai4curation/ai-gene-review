- molecular_function:
    id: GO:0035591
    label: signaling adaptor activity
  description: Frmpd2 functions as a signaling adaptor/scaffold protein that organizes
    multi-protein complexes at the membrane. Its PDZ domains mediate specific protein-protein
    interactions while the FERM domain anchors it to the membrane via phosphatidylinositol
    binding. In neurons, it scaffolds NMDA receptor subunits at the postsynaptic density.
    In epithelial cells, it organizes cell junction complexes at the basolateral membrane.
