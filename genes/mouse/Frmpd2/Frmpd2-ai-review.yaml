      NMDA receptors-mediated neural excitatory and neurotoxicity in a PDZ2 domain-dependent
      manner
  - reference_id: PMID:19706687
    supporting_text: FRMPD2 is a potential scaffolding protein consisting of an N-terminal
      KIND domain, a FERM domain and three PDZ domains
- molecular_function:
    id: GO:0035254
    label: glutamate receptor binding
  description: 'The PDZ2 domain of Frmpd2 directly binds the C-termini of NMDA receptor
    subunits GluN2A and GluN2B, with higher affinity for GluN2A. This direct interaction
    anchors NMDARs at synapses and promotes NMDAR-mediated excitatory synaptic transmission.
    Crystal structure of the PDZ2-GluN2A interaction has been solved (PDB: 5ZDS).'
  locations:
  - id: GO:0014069
    label: postsynaptic density
  directly_involved_in:
  - id: GO:0097114
    label: NMDA glutamate receptor clustering
  supported_by:
