  label: Mus musculus
description: FERM and PDZ domain-containing protein 2 (Frmpd2) is a multi-domain scaffold
  protein that organizes signaling complexes at the cell membrane. It contains an
  N-terminal KIND domain, a FERM domain that binds phosphatidylinositols for membrane
  anchoring, and three PDZ domains that mediate protein-protein interactions. In the
  mouse nervous system, Frmpd2 functions as a postsynaptic scaffold that anchors NMDA
  receptor subunits (GluN2A/GluN2B) at synapses via its PDZ2 domain, and participates
  in cone photoreceptor synapse formation through PDZ3-mediated interaction with LRIT1.
  Based on studies of the human ortholog, Frmpd2 also contributes to epithelial cell
  polarity by localizing to the basolateral membrane and regulating tight junction
  formation, and serves as a scaffold for the NOD2 innate immune signalosome in intestinal
  epithelial cells.
