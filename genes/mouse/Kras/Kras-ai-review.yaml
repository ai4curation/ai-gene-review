id: P32883
gene_symbol: Kras
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: 'Kras encodes KRas, a Ras-family small GTPase that functions as a lipid-anchored
  nucleotide switch. KRas cycles between inactive GDP-bound and active GTP-bound states, hydrolyzes
  GTP to GDP and phosphate, and transmits receptor-derived signals primarily from cytoplasmic
  membrane surfaces to RAF-MAPK and PI3K-AKT-mTOR effector pathways. Developmental and cancer
  phenotypes reflect perturbation of this core Ras signaling switch rather than separate primary
  molecular functions.'
alternative_products:
  - name: 2A
    id: P32883-1
  - name: 2B
    id: P32883-2, P08643-1
    sequence_note: VSP_011142, VSP_011143
