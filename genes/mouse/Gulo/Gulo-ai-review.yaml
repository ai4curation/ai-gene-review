- id: PMID:10606751
  title: Different induction of gulonolactone oxidase in aromatic hydrocarbon-responsive or -unresponsive mouse strains.
  findings:
  - statement: Mouse liver microsomes produce ascorbate from gulonolactone.
    supporting_text: >-
      The mRNA level of gulonolactone oxidase and the microsomal ascorbate
      production from p-nitrophenyl glucuronide, D-glucuronic acid or
      gulonolactone in the liver of Ah-responsive and Ah-unresponsive mice were
      compared.
    reference_section_type: ABSTRACT
  - statement: AhR-responsive mice have higher and inducible Gulo expression and microsomal ascorbate production.
    supporting_text: >-
      In Ah-responsive mice, these parameters were higher originally, and they
      further increased upon in vivo addition of 3-methylcholanthrene, while in
      Ah-unresponsive mice the treatment was not effective.
    reference_section_type: ABSTRACT
- id: PMID:10639167
  title: Aortic wall damage in mice unable to synthesize ascorbic acid.
  findings:
  - statement: Inactivation of Gulo makes mice dependent on dietary vitamin C.
    supporting_text: >-
      By inactivating the gene for L-gulono-gamma-lactone oxidase, a key enzyme
      in ascorbic acid synthesis, we have generated mice that, like humans,
      depend on dietary vitamin C.
    reference_section_type: ABSTRACT
- id: PMID:14962674
  title: Functional rescue of vitamin C synthesis deficiency in human cells using adenoviral-based expression of murine l-gulono-gamma-lactone oxidase.
  findings:
  - statement: Murine Gulo cDNA encodes a functional FAD-containing enzyme.
    supporting_text: >-
      Cells infected with Gulo-expressing vectors overexpressed an
      FAD-containing protein that corresponded in size to that predicted for
      recombinant GULO protein and expressed a functional enzyme as measured by
      the conversion of l-gulono-gamma-lactone to ascorbic acid in cell-free
      extracts.
    reference_section_type: ABSTRACT
  - statement: Gulo transcript is highly expressed in mouse liver.
    supporting_text: Northern blot analysis revealed high expression of Gulo transcript in the liver.
    reference_section_type: ABSTRACT
- id: PMID:20410296
  title: 'Ascorbate synthesis pathway: dual role of ascorbate in bone homeostasis.'
  findings:
  - statement: >-
      This paper focuses on upstream D-glucuronate-to-L-gulonate enzymes in the
      mouse ascorbate synthesis pathway rather than directly assaying Gulo.
    supporting_text: >-
      Using mouse gene knock-out models, we identify aldehyde reductase (EC
      1.1.1.2, Akr1a4 (GR)) and aldose reductase (EC 1.1.1.21, Akr1b3 (AR)) as
      the enzymes responsible for conversion of D-glucuronate to L-gulonate, a
      key step in the ascorbate (ASC) synthesis pathway in mice.
    reference_section_type: ABSTRACT
