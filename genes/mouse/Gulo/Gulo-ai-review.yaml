core_functions:
- description: >-
    Gulo catalyzes the terminal oxidation in the mouse L-ascorbate biosynthetic
    pathway: an FAD-dependent ER/microsomal membrane enzyme oxidizes
    L-gulono-1,4-lactone with molecular oxygen to form L-ascorbate and hydrogen
    peroxide. This catalytic activity is the gene's primary conserved molecular
    function; FAD binding and general membrane association support this enzyme
    role but are not separate core functions.
  molecular_function:
    id: GO:0050105
    label: L-gulonolactone oxidase activity
