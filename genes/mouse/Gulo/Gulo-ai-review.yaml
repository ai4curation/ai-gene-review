suggested_questions:
- question: >-
    For mouse Gulo, is the catalytic site experimentally confirmed to face the
    ER lumen, or is that orientation inferred from mammalian GULO topology and
    microsomal studies?
  experts:
  - Ha MN
  - Bánhegyi G
- question: >-
    Does mouse Gulo have measurable physiological activity toward alternative
    aldonolactone substrates, or is L-gulono-1,4-lactone the only relevant in
    vivo substrate?
  experts:
  - Schellhorn HE
suggested_experiments:
- hypothesis: >-
    Mouse Gulo's active site is oriented toward the ER lumen while the protein is
    anchored in the ER/microsomal membrane.
  description: >-
    Express epitope-tagged mouse Gulo in hepatocyte-derived cells and combine
    selective membrane permeabilization, protease protection, and ER-lumenal
    marker colocalization with an L-gulono-1,4-lactone activity assay.
  experiment_type: subcellular topology and enzyme activity assay
- hypothesis: >-
    L-gulono-1,4-lactone is the physiologically preferred substrate for mouse
    Gulo.
  description: >-
    Purify recombinant mouse Gulo or enrich microsomal Gulo and compare kinetic
    parameters for L-gulono-1,4-lactone versus D-arabinono-1,4-lactone and
    related aldonolactones under matched assay conditions.
  experiment_type: comparative enzyme kinetics
