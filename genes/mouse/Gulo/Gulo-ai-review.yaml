id: P58710
gene_symbol: Gulo
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Gulo encodes mouse L-gulonolactone oxidase, an FAD-dependent
  oxygen-dependent oxidoreductase that catalyzes the terminal step of
  L-ascorbate biosynthesis by oxidizing L-gulono-1,4-lactone with molecular
  oxygen to produce L-ascorbate and hydrogen peroxide. The protein is highly
  expressed in liver and is associated with the microsomal/endoplasmic
  reticulum membrane.
references:
- id: UniProtKB:P58710
  title: UniProtKB entry for mouse Gulo/L-gulonolactone oxidase
  findings:
  - statement: >-
      Gulo oxidizes L-gulono-1,4-lactone in the terminal step of L-ascorbate
      biosynthesis.
    supporting_text: >-
      Oxidizes L-gulono-1,4-lactone to hydrogen peroxide and L-
      xylo-hexulonolactone which spontaneously isomerizes to L-ascorbate.
  - statement: Gulo uses FAD as a cofactor.
    supporting_text: 'Name=FAD; Xref=ChEBI:CHEBI:57692'
  - statement: Gulo is an ER/microsomal single-pass membrane protein.
    supporting_text: >-
      Microsome membrane {ECO:0000250}; Single-pass membrane protein
      {ECO:0000250}. Endoplasmic reticulum membrane {ECO:0000250}; Single-pass
      membrane protein {ECO:0000250}.
- id: file:mouse/Gulo/Gulo-deep-research-falcon.md
  title: Falcon deep research report for mouse Gulo
  findings:
  - statement: >-
      Falcon summarizes Gulo as an FAD-dependent ER/microsomal aldonolactone
      oxidoreductase in the terminal step of ascorbate biosynthesis.
    supporting_text: >-
      Enzyme: L‑gulonolactone oxidase (EC 1.1.3.8), terminal ascorbate
      biosynthesis step: L‑gulono‑1,4‑lactone + O2 → L‑ascorbate + H2O2;
      FAD‑dependent AlOR enzyme with N‑terminal FAD‑binding region and
      C‑terminal HWXK motif; integral ER/microsomal membrane protein with
      luminally oriented active site; predominant tissue locus in mammalian
      liver
