id: P39688
gene_symbol: Fyn
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Fyn is a Src-family non-receptor tyrosine kinase with SH3, SH2, and catalytic kinase domains. It localizes to cytosol and membrane/lipid-raft signaling platforms and phosphorylates tyrosine residues in immune receptor, adhesion, reelin, synaptic, axon guidance, and growth-factor-associated signaling pathways.
alternative_products:
- name: 1 (B)
  id: P39688-1
- name: 2 (T)
  id: P39688-2
  sequence_note: VSP_024111, VSP_024112
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Myristoylated and palmitoylated Fyn is targeted to the inner plasma membrane and lipid rafts where it engages receptor-proximal complexes.
    action: ACCEPT
    reason: 'Core membrane localization established by lipid modification and experimental evidence (UniProt: Cell membrane, active in lipid rafts).'
    supported_by:
    - reference_id: UniProt:P39688
      supporting_text: 'FUNCTION: Non-receptor tyrosine-protein kinase that plays a role in regulation of cell growth and survival, cell adhesion, integrin-mediated signaling, cytoskeletal remodeling, cell motility, immune response and axon guidance. CATALYTIC ACTIVITY: L-tyrosyl-[protein] + ATP = O-phospho-L-tyrosyl-[protein] + ADP + H(+). SUBCELLULAR LOCATION: Cytoplasm. Nucleus. Cell membrane. Present and active in lipid rafts.'
    - reference_id: file:mouse/Fyn/Fyn-deep-research-falcon.md
      supporting_text: its SH2/SH3 docking and membrane targeting drive selective incorporation into receptor-proximal and synaptic complexes, while phosphorylation at conserved regulatory tyrosines toggles activity
