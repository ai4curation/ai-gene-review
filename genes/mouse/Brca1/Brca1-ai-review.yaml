id: P48754
gene_symbol: Brca1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Brca1 encodes the mouse homolog of BRCA1, a nuclear genome-maintenance
  protein. Its primary roles are as a BARD1-associated RING E3 ubiquitin ligase and as a
  DNA-damage response scaffold that promotes homologous recombination, DNA end
  resection, repair-checkpoint control, and replication-associated genome stability.
  Transcriptional, metabolic, centrosomal, and developmental annotations are interpreted
  as secondary contexts unless directly tied to DNA repair or BRCA1-BARD1 ubiquitin
  ligase activity.
existing_annotations:
  - term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: Supported as part of the core BRCA1-BARD1 E3 ligase, chromatin/DNA-damage
        response, homologous recombination, or checkpoint function.
      action: ACCEPT
      reason: Core BRCA1 genome-maintenance and BRCA1-BARD1 ubiquitin ligase function
      supported_by:
        - reference_id: UniProt:P48754
          supporting_text: E3 ubiquitin-protein ligase that specifically mediates the
            formation of 'Lys-6'-linked polyubiquitin chains and plays a central role in
            DNA repair by facilitating cellular responses to DNA damage.
        - reference_id: file:mouse/Brca1/Brca1-deep-research-falcon.md
          supporting_text: BRCA1 forms an obligate heterodimer with BARD1 through the
            N-terminal RING domains; the complex acts as an E3 ubiquitin ligase that
            promotes DNA end resection, antagonizes 53BP1 at breaks, and supports
            PALB2-BRCA2-RAD51 loading for homology-directed repair.
