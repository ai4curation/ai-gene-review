- term:
    id: GO:0000724
    label: double-strand break repair via homologous recombination
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: BRCA1-BARD1 channels DSB repair toward homologous recombination by promoting end resection and PALB2-BRCA2-RAD51 loading at resected breaks.
    action: ACCEPT
    reason: Central, defining biological role of BRCA1; broadly supported (IBA/ISO and mechanistic literature).
    supported_by:
    - reference_id: UniProt:P48754
      supporting_text: E3 ubiquitin-protein ligase that specifically mediates the formation of 'Lys-6'-linked polyubiquitin chains and plays a central role in DNA repair by facilitating cellular responses to DNA damage.
    - reference_id: file:mouse/Brca1/Brca1-deep-research-falcon.md
      supporting_text: BRCA1 forms an obligate heterodimer with BARD1 through the N-terminal RING domains; the complex acts as an E3 ubiquitin ligase that promotes DNA end resection, antagonizes 53BP1 at breaks, and supports PALB2-BRCA2-RAD51 loading for homology-directed repair.
