id: P48754
gene_symbol: Brca1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Brca1 encodes the mouse homolog of BRCA1, a nuclear genome-maintenance protein. Its primary roles are as a BARD1-associated RING E3 ubiquitin ligase and as a DNA-damage response scaffold that promotes homologous recombination, DNA end resection, repair-checkpoint control, and replication-associated genome stability. Transcriptional, metabolic, centrosomal, and developmental annotations are interpreted as secondary contexts unless directly tied to DNA repair or BRCA1-BARD1 ubiquitin ligase activity.
