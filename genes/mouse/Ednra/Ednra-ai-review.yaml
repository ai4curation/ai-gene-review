id: Q61614
gene_symbol: Ednra
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: 'Ednra encodes endothelin receptor type A, a plasma-membrane class A
  GPCR that binds endothelins, especially endothelin-1, and signals through G proteins
  to phosphatidylinositol-calcium, Rho/Cdc42, ERK, and related pathways. Its best-supported
  mouse roles are vasoconstrictive endothelin signaling and Edn1-dependent cranial/cardiac
  neural crest patterning.'
existing_annotations:
- term:
    id: GO:0048066
    label: developmental pigmentation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: developmental pigmentation is not supported as an appropriate
      annotation for Ednra after review of the available mouse evidence.
    action: REMOVE
    reason: The term appears to reflect either an unsupported transfer, a
      paralog/family overreach, or a localization/process inconsistent with the
      curated Ednra biology.
    supported_by:
    - reference_id: file:mouse/Ednra/Ednra-notes.md
      supporting_text: 'Curation judgment: developmental pigmentation and enteric
        nervous system development are better-known EDNRB/EDN3-axis phenotypes and
        are not supported by the mouse Ednra evidence reviewed here.'
- term:
    id: GO:0086100
    label: endothelin receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: endothelin receptor signaling pathway is biologically consistent
      with the curated synthesis for Ednra and is supported by IBA evidence
      (GO_REF:0000033).
    action: ACCEPT
    reason: The term matches a direct molecular function, pathway, or
      location/physiological output of Ednra; it is specific enough to retain
      without replacement.
    supported_by:
    - reference_id: file:mouse/Ednra/Ednra-notes.md
      supporting_text: 'Gq/G11 pathway specificity: Sato et al. report that "the dorsoventral
        axis patterning of pharyngeal arches is regulated by the Ednra-selective,
        G(q)/G(11)-dependent signaling."'
    - reference_id: file:mouse/Ednra/Ednra-deep-research-falcon.md
      supporting_text: Falcon describes EDNRA as transducing endothelin signals
        through heterotrimeric G proteins, especially Gq/11-calcium and ERK
        signaling.
