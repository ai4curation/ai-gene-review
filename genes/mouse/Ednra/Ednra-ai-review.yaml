core_functions:
- description: EDNRA is a plasma-membrane endothelin receptor that activates
    GPCR signaling in response to endothelin ligands, especially ET-1, coupling
    to phosphatidylinositol-calcium and small-GTPase pathways that control
    vasoconstriction and developmental patterning.
  molecular_function:
    id: GO:0004962
    label: endothelin receptor activity
  directly_involved_in:
  - id: GO:0086100
    label: endothelin receptor signaling pathway
  - id: GO:0042310
    label: vasoconstriction
  - id: GO:0007204
    label: positive regulation of cytosolic calcium ion concentration
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: file:mouse/Ednra/Ednra-notes.md
    supporting_text: 'Core receptor identity: Ednra encodes endothelin receptor type
      A, a seven-transmembrane G protein-coupled receptor.'
  - reference_id: file:mouse/Ednra/Ednra-deep-research-falcon.md
    supporting_text: Falcon reinforces the core model that EDNRA is a
      plasma-membrane endothelin peptide GPCR mediating endothelin receptor
      signaling, vasoconstriction, calcium signaling, and mandibular neural
      crest patterning.
proposed_new_terms: []
suggested_questions:
- question: Should GO distinguish endothelin A receptor activity from general
    endothelin receptor activity to avoid conflating EDNRA and EDNRB family
    functions?
suggested_experiments:
- hypothesis: EDNRA developmental functions are mediated by specific Gq/G11 and
    Cdc42 pathway branches rather than generic GPCR signaling.
  description: In cranial/cardiac neural crest models, rescue Ednra loss with
    pathway-selective receptor mutants and assay Dlx/Hand2 expression, Cdc42
    localization, and outflow-tract migration.
  experiment_type: pathway-selective rescue
