id: Q02248
gene_symbol: Ctnnb1
product_type: PROTEIN
status: COMPLETE
description: 'Beta-catenin is a multifunctional Armadillo-repeat protein with two conserved core roles: at adherens junctions it binds classical cadherins and alpha-catenin to support cadherin-mediated cell-cell adhesion, and in canonical Wnt signaling it accumulates in the nucleus and acts as a transcriptional coactivator with TCF/LEF-family DNA-binding transcription factors. These molecular roles explain the many developmental, proliferative, differentiation, and tissue-patterning phenotypes in mouse; those organismal processes are generally downstream context-specific consequences rather than separate core molecular functions.'
