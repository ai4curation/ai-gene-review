    action: ACCEPT
    reason: >-
      Negative regulation of urine volume is a direct physiological consequence of V2R-mediated
      renal water reabsorption and is a core function. UniProt describes V2R as binding
      "arginine vasopressin, an antidiuretic that promotes renal water reabsorption."
      Mutations in human AVPR2 cause nephrogenic diabetes insipidus characterized by
