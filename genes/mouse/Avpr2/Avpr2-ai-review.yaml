    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from rat Avpr2 (Q00788) via Ensembl Compara"

- term:
    id: GO:0045777
    label: positive regulation of blood pressure
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat Avpr2 (Q00788) via Ensembl Compara. V2R contributes
