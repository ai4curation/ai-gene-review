# ============================================================
# Annotations citing PMID:10395695 (IRAK paper - likely mis-associated)
# ============================================================
- term:
    id: GO:0038023
    label: signaling receptor activity
  evidence_type: IGI
  original_reference_id: PMID:10395695
  review:
    summary: >-
      This IGI annotation cites PMID:10395695 (Thomas et al. 1999), which is about
      "Impaired cytokine signaling in mice lacking the IL-1 receptor-associated kinase"
      (IRAK knockout mice). The paper studies IL-1 and IL-18 signaling through IRAK, not
      vasopressin receptor signaling. It is unclear how this reference supports a signaling
      receptor activity annotation for Avpr2.
    action: UNDECIDED
    reason: >-
      PMID:10395695 is about IRAK (IL-1 receptor-associated kinase) function in cytokine
      signaling. The abstract describes generation of IRAK-deficient mice and their
      impaired IL-1 and IL-18 signaling. There is no mention of vasopressin, V2 receptor,
      or Avpr2 in the abstract. The WITH/FROM column in the GOA references MGI:MGI:107420
      (which is Irak1), suggesting some genetic interaction was inferred, but the reference
      does not appear to support this annotation. The annotation should be investigated by
      a curator who can access the full text to determine if Avpr2 was somehow involved in
      the IRAK study.
    supported_by:
    - reference_id: PMID:10395695
      supporting_text: "Stimulation of the type 1 IL-1R (IL-1R1) and the IL-18R by their cognate ligands induces recruitment of the IL-1R-associated kinase (IRAK)"

- term:
    id: GO:1902533
    label: positive regulation of intracellular signal transduction
  evidence_type: IMP
  original_reference_id: PMID:10395695
  review:
    summary: >-
      This IMP annotation cites PMID:10395695 (Thomas et al. 1999), which is about IRAK
      knockout mice and impaired cytokine signaling. The paper studies IL-1/IL-18 signaling,
      not vasopressin receptor signaling.
    action: UNDECIDED
    reason: >-
      PMID:10395695 describes IRAK-deficient mice with diminished NF-kappaB activation upon
      IL-1 stimulation and defective IFN-gamma response to IL-18 costimulation. There is no
      apparent connection to Avpr2 or vasopressin signaling in the abstract. The WITH/FROM
      column references MGI:MGI:2384212. This annotation needs curator investigation to
      determine if there is a legitimate connection between Avpr2 and the IRAK study that
      is not evident from the abstract.
    supported_by:
    - reference_id: PMID:10395695
      supporting_text: "IRAK-deficient fibroblasts show diminished activation of NF-kappaB when stimulated with IL-1"

- term:
    id: GO:0010628
    label: positive regulation of gene expression
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred by curator judgment based on sequence similarity to rat
      Avpr2 (Q00788). Generic downstream effect of cAMP/PKA signaling.
    action: KEEP_AS_NON_CORE
    reason: >-
      Positive regulation of gene expression via cAMP/PKA/CREB is a generic downstream
      effect shared by many Gs-coupled GPCRs. Not specific to V2R core function. Consistent
      with other annotations for this term marked as non-core.
    supported_by:
    - reference_id: GO_REF:0000024
      supporting_text: "Manual transfer from Q00788 by curator judgment [gene expression regulation]"

- term:
    id: GO:0034097
    label: response to cytokine
  evidence_type: IMP
  original_reference_id: PMID:10395695
  review:
    summary: >-
      This IMP annotation cites PMID:10395695 (Thomas et al. 1999), which is about IRAK
      knockout mice and cytokine signaling via IL-1 and IL-18 pathways. This paper is about
      IRAK function, not Avpr2. The annotation "response to cytokine" for a vasopressin
      receptor citing an IRAK paper is almost certainly a mis-association.
    action: UNDECIDED
    reason: >-
      PMID:10395695 studies cytokine signaling through IRAK in the context of IL-1 and IL-18
      receptors. There is no connection to vasopressin signaling or Avpr2 in the abstract.
      The GOA shows this annotation appears multiple times (with acts_upstream_of_or_within
      qualifier), suggesting a systematic annotation that may be wrong. Avpr2 is not known
      to participate in cytokine response pathways. This annotation needs curator review to
      determine the basis for associating Avpr2 with this reference.
    supported_by:
    - reference_id: PMID:10395695
      supporting_text: "To study IRAK function in cytokine signaling, we generated cells and mice lacking the IRAK protein"

- term:
    id: GO:0038023
    label: signaling receptor activity
  evidence_type: IMP
  original_reference_id: PMID:10395695
  review:
    summary: >-
      This IMP annotation cites PMID:10395695 (Thomas et al. 1999), about IRAK knockout mice.
      This is a second entry for the same term (signaling receptor activity) with different
      evidence code (IMP vs IGI above) but same problematic reference.
    action: UNDECIDED
    reason: >-
      Same issue as the IGI annotation for this term above. PMID:10395695 is about IRAK,
      not Avpr2. While V2R is indeed a signaling receptor, this particular evidence citation
      does not support the annotation. The annotation needs curator investigation.
    supported_by:
    - reference_id: PMID:10395695
      supporting_text: "Stimulation of the type 1 IL-1R (IL-1R1) and the IL-18R by their cognate ligands induces recruitment of the IL-1R-associated kinase (IRAK)"

