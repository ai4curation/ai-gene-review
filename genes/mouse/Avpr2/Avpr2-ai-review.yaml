- term:
    id: GO:0005768
    label: endosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from human AVPR2 (P30518) via Ensembl Compara. V2R is
      internalized via clathrin-mediated endocytosis following ligand-induced phosphorylation
      and beta-arrestin recruitment, leading to endosomal localization.
    action: ACCEPT
    reason: >-
      Endosomal localization is expected for V2R as part of its receptor desensitization
      cycle. UniProt describes that upon phosphorylation, V2R interacts with ARRB2, leading
      to receptor internalization. Reactome also annotates V2R in clathrin-mediated endocytosis
