      supporting_text: "Automatic transfer from human AVPR2 (P30518) [endosomal localization following receptor internalization]"

- term:
    id: GO:0007189
    label: adenylate cyclase-activating G protein-coupled receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from human AVPR2 (P30518) via Ensembl Compara. V2R
      couples to Gs proteins and activates adenylate cyclase, which is its primary signaling
      mechanism.
    action: ACCEPT
    reason: >-
      Activation of adenylate cyclase via Gs coupling is the core signaling mechanism of V2R.
      UniProt explicitly states that "AVPR2 is coupled to G(s) G alpha proteins and mediates
      activation of adenylate cyclase activity" (by similarity to P30518). Reactome also
      annotates V2R in "G alpha (s) signalling events" (R-MMU-418555).
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from human AVPR2 (P30518) [adenylate cyclase activation via Gs coupling]"

- term:
    id: GO:0008284
    label: positive regulation of cell population proliferation
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat Avpr2 (Q00788) via Ensembl Compara. Vasopressin
      signaling through V2R has been implicated in cell proliferation in some contexts,
      particularly in autosomal dominant polycystic kidney disease (ADPKD).
    action: KEEP_AS_NON_CORE
    reason: >-
      V2R-mediated cell proliferation effects have been reported, particularly in the context
      of ADPKD where V2R antagonists (tolvaptan) slow cyst growth. However, this is not
      a core evolved function of V2R; it is a context-dependent pleiotropic effect. The primary
      function of V2R is renal water reabsorption signaling.
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from rat Avpr2 (Q00788) via Ensembl Compara"

- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from human AVPR2 (P30518) via Ensembl Compara. The same gene
      is annotated for both positive AND negative regulation of cell proliferation, suggesting
      context-dependent effects.
    action: KEEP_AS_NON_CORE
    reason: >-
      The presence of both positive (GO:0008284) and negative (GO:0008285) regulation of cell
      proliferation annotations for the same receptor suggests highly context-dependent effects
      that are not core to V2R function. These are pleiotropic effects downstream of cAMP
      signaling in different cell types.
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from human AVPR2 (P30518) via Ensembl Compara"

- term:
    id: GO:0010628
    label: positive regulation of gene expression
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat Avpr2 (Q00788) via Ensembl Compara. V2R signaling
      via cAMP/PKA pathway can regulate gene expression through CREB and other transcription
      factors, but this is a very generic downstream effect.
    action: KEEP_AS_NON_CORE
    reason: >-
      Positive regulation of gene expression is a generic downstream consequence of
      cAMP/PKA signaling through CREB activation, which is a common feature of many
      Gs-coupled GPCRs. This is not specific to V2R function and represents a pleiotropic
      downstream effect rather than a core function.
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from rat Avpr2 (Q00788) via Ensembl Compara"

- term:
    id: GO:0021537
    label: telencephalon development
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat Avpr2 (Q00788) via Ensembl Compara. This is
      likely an over-annotation. V2R is primarily expressed in kidney collecting duct and
      liver, with little or no expression in brain (PMID:33052234). While vasopressin
      receptors V1a and V1b are expressed in brain, V2R is predominantly renal.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Telencephalon development is an unlikely core or even peripheral function of V2R. The
      UniProt tissue specificity section (PMID:33052234) states that V2R shows "No or extremely
      low expression in left ventricule, muscle, bone and brain (at protein level)." V2R is
      "Highly expressed in kidney" and "moderately expressed in liver." Brain functions of
      vasopressin are primarily mediated by V1a (Avpr1a) and V1b (Avpr1b) receptors. This
      annotation likely arose from a broad annotation on rat Avpr2 that was transferred without
      considering tissue-specific expression.
    supported_by:
    - reference_id: PMID:33052234
      supporting_text: "An extremely low uptake of less than 1% could be detected in muscle and brain, in accordance with the lack of V2R in these organs"

