- id: PMID:10395695
  title: Impaired cytokine signaling in mice lacking the IL-1 receptor-associated kinase.
  is_invalid: false
  findings:
  - statement: >-
      This paper is about IRAK (IL-1 receptor-associated kinase) knockout mice and their
      impaired IL-1 and IL-18 cytokine signaling. It does NOT study Avpr2 or vasopressin
      signaling. The abstract describes generation of IRAK-deficient cells and mice, showing
      diminished NF-kappaB activation with IL-1 stimulation and defective IFN-gamma response
      to IL-18 costimulation. Several GO annotations for Avpr2 cite this reference, which
      appears to be a mis-association. These annotations (signaling receptor activity,
      positive regulation of intracellular signal transduction, response to cytokine) should
      be investigated by curators.
    supporting_text: >-
      Stimulation of the type 1 IL-1R (IL-1R1) and the IL-18R by their cognate ligands
      induces recruitment of the IL-1R-associated kinase (IRAK). Activation of IRAK
      leads in turn to nuclear translocation of NF-kappaB
- id: PMID:33052234
  title: A snake toxin as a theranostic agent for the type 2 vasopressin receptor.
  findings:
  - statement: >-
      This study demonstrates tissue-specific expression of V2R in mice using a snake
      toxin-based imaging agent. V2R is highly expressed in kidney and moderately in liver,
      with no or extremely low expression in brain, muscle, or bone. This is relevant for
      evaluating the telencephalon development annotation.
    supporting_text: >-
      An extremely low uptake of less than 1% could be detected in muscle and brain,
      in accordance with the lack of V2R in these organs
      ...Kidney activity increased over time, reaching a plateau at 23 min compatible
      with specific accumulation due to its high V2R expression

core_functions:
- description: >-
    V2R functions as a vasopressin receptor at the plasma membrane of kidney collecting
    duct principal cells, binding arginine vasopressin and activating adenylate cyclase
    via Gs protein coupling to promote renal water reabsorption through AQP2-dependent
    mechanisms. This is the core evolved function of V2R.
  molecular_function:
    id: GO:0005000
    label: vasopressin receptor activity
  directly_involved_in:
  - id: GO:0007189
    label: adenylate cyclase-activating G protein-coupled receptor signaling pathway
  - id: GO:0070295
    label: renal water absorption
  - id: GO:0035811
    label: negative regulation of urine volume
  locations:
  - id: GO:0005886
    label: plasma membrane
  anatomical_locations:
  - id: UBERON:0001232
    label: collecting duct of renal tubule

- description: >-
    Following ligand stimulation, V2R undergoes phosphorylation-dependent desensitization
    through beta-arrestin 2 (ARRB2) recruitment and clathrin-mediated endocytosis, leading
    to endosomal/endocytic vesicle localization. This is a constitutive aspect of receptor
    regulation.
  molecular_function:
    id: GO:0004930
    label: G protein-coupled receptor activity
  directly_involved_in:
  - id: GO:0032870
    label: cellular response to hormone stimulus
  locations:
  - id: GO:0030139
    label: endocytic vesicle
  - id: GO:0005768
    label: endosome

suggested_questions:
- question: >-
    What is the basis for annotating Avpr2 with GO terms citing PMID:10395695 (Thomas et al.
    1999, about IRAK knockout mice)? Is there a legitimate connection between Avpr2 and the
    IRAK study, or are these annotations mis-associated?
  experts:
  - Thomas JA
- question: >-
    Is there experimental evidence for V2R expression or function in the mouse telencephalon
    that would support the telencephalon development annotation (GO:0021537)?
  experts: []
- question: >-
    Does V2R have a genuine role in positive regulation of vasoconstriction (GO:0045907),
    given that vasoconstriction is primarily attributed to V1a receptors?
  experts: []

suggested_experiments:
- hypothesis: >-
    The PMID:10395695-based annotations for Avpr2 are mis-associated and do not reflect
    genuine V2R biology.
  description: >-
    Review the full text of PMID:10395695 and the MGI curation records to determine the
    basis for associating Avpr2 with this IRAK study. Check whether Avpr2 was used as a
    control gene, mentioned in supplementary data, or if this is a curation error. Also
    check MGI:MGI:107420 (Irak1) and MGI:MGI:2384212 for any cross-references to Avpr2.
  experiment_type: curation_review
- hypothesis: >-
    V2R is not expressed at functionally relevant levels in the telencephalon.
  description: >-
    Query single-cell RNA-seq databases (e.g., Allen Brain Atlas, Mouse Cell Atlas) for
    Avpr2 expression in telencephalon structures. Compare with Avpr1a and Avpr1b expression
    patterns in brain. This would help resolve whether the telencephalon development
    annotation is warranted.
  experiment_type: bioinformatics
