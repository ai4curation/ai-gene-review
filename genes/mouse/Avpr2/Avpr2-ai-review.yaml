id: O88721
gene_symbol: Avpr2
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Avpr2 encodes the vasopressin V2 receptor (V2R), a G protein-coupled receptor
  of the rhodopsin family that binds arginine vasopressin (AVP, antidiuretic hormone)
  and mediates renal water reabsorption. V2R is coupled to Gs G-alpha proteins and
  activates adenylate cyclase, increasing intracellular cAMP, which in turn triggers
  aquaporin-2 (AQP2) insertion into the apical membrane of kidney collecting duct
  principal cells, facilitating water reabsorption. The receptor is highly expressed
  in the kidney and moderately in liver, with little or no expression in brain, muscle,
  or bone (PMID:33052234). Upon ligand binding, V2R undergoes phosphorylation at the
  C-terminal P-X-P-P motif, promoting beta-arrestin 2 (ARRB2) recruitment, receptor
  internalization via clathrin-mediated endocytosis, and desensitization. Mutations in
  the human ortholog (AVPR2, P30518) cause X-linked nephrogenic diabetes insipidus (NDI).
  Most functional annotations for mouse Avpr2 are inferred from the well-characterized
  human V2R (P30518) and rat Avpr2 (Q00788) orthologs. The sole experimental reference
  cited for direct mouse annotations (PMID:10395695) is about IRAK (IL-1 receptor-associated
  kinase) knockout mice, not about Avpr2, raising questions about the validity of those
  annotations.

