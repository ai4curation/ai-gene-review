    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from rat Avpr2 (Q00788) via Ensembl Compara"

- term:
    id: GO:0048471
    label: perinuclear region of cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from human AVPR2 (P30518) via Ensembl Compara. Some
      fraction of V2R may localize to the perinuclear region during biosynthesis or after
      internalization, but this is not a primary functional localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      Perinuclear localization likely reflects ER/Golgi processing during receptor biosynthesis
      or post-internalization trafficking, rather than a site of active function. The primary
      functional localizations are plasma membrane (where it signals) and endocytic vesicles
      (during desensitization). This is not wrong but is not a core localization.
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from human AVPR2 (P30518) via Ensembl Compara"

- term:
    id: GO:0070295
    label: renal water absorption
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from human AVPR2 (P30518) via Ensembl Compara. Renal
      water absorption is the defining physiological role of V2R.
    action: ACCEPT
    reason: >-
      Renal water absorption is the core biological process for V2R. The receptor mediates
      vasopressin-stimulated water reabsorption in the kidney collecting duct by activating
      adenylate cyclase, raising cAMP, activating PKA, and promoting aquaporin-2 insertion
      into the apical membrane. UniProt describes V2R as a receptor for "arginine vasopressin,
      an antidiuretic that promotes renal water reabsorption." Reactome annotates V2R in
      "Vasopressin regulates renal water homeostasis via Aquaporins" (R-MMU-432040).
    supported_by:
    - reference_id: GO_REF:0000107
      supporting_text: "Automatic transfer from human AVPR2 (P30518) [renal water absorption via AQP2]"

