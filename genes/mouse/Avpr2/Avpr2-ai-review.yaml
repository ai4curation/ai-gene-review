# ============================================================
# IBA annotations (phylogenetic inference via PANTHER)
# ============================================================
- term:
    id: GO:0007186
    label: G protein-coupled receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      V2R is a canonical GPCR that signals via G protein-coupled receptor signaling pathways.
      This IBA annotation is well supported by phylogenetic inference from multiple orthologs
      across vertebrate species, and is consistent with the UniProt function description.
    action: ACCEPT
    reason: >-
      GPCR signaling is a core function of Avpr2. The receptor couples to Gs proteins to activate
      adenylate cyclase and raise intracellular cAMP. This is fundamental to V2R biology and is
      confirmed by the UniProt record which states it is a "G-protein-coupled receptor for arginine
      vasopressin" (UniProt O88721, by similarity to P30518).
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family including P30518, P37288, P47901]"

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      V2R is a seven-transmembrane receptor that resides in the plasma membrane. IBA annotation
      supported by phylogenetic inference from orthologs including human P30518 and others.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is a core feature of V2R as a transmembrane GPCR. UniProt
      annotates the subcellular location as "Cell membrane; Multi-pass membrane protein" by
      similarity to human P30518. The protein has 7 transmembrane helices characteristic of
      class A GPCRs.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family]"

- term:
    id: GO:0032870
    label: cellular response to hormone stimulus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      V2R mediates the cellular response to the peptide hormone arginine vasopressin (AVP).
      IBA annotation supported by phylogenetic inference.
    action: ACCEPT
    reason: >-
      Mediating cellular response to vasopressin (a peptide hormone) is the core function of V2R.
      UniProt describes it as a "G-protein-coupled receptor for arginine vasopressin, an antidiuretic
      that promotes renal water reabsorption." The term cellular response to hormone stimulus
      accurately captures this role.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family]"

- term:
    id: GO:0005000
    label: vasopressin receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Avpr2 encodes the vasopressin V2 receptor. Vasopressin receptor activity is the
      most specific and accurate molecular function term for this gene product.
    action: ACCEPT
    reason: >-
      This is the defining molecular function of Avpr2. The IBA annotation is supported by
      phylogenetic inference from confirmed vasopressin receptors (P30518, P37288, P47901).
      UniProt names the protein "Vasopressin V2 receptor" and describes its function as
      binding arginine vasopressin.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family including P30518, P37288, P47901]"

- term:
    id: GO:0001992
    label: regulation of systemic arterial blood pressure by vasopressin
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      V2R mediates vasopressin-dependent regulation of systemic arterial blood pressure
      by controlling renal water reabsorption, which affects blood volume and hence pressure.
      IBA annotation from phylogenetic inference.
    action: KEEP_AS_NON_CORE
    reason: >-
      While V2R does participate in blood pressure regulation through its antidiuretic effects,
      the primary core function is renal water reabsorption via cAMP/AQP2 signaling. Blood
      pressure regulation is a downstream physiological consequence rather than the core evolved
      function. V1a and V1b receptors are more directly involved in vasoconstriction. The IBA
      annotation is phylogenetically sound but represents a secondary/pleiotropic effect for V2R.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family]"

- term:
    id: GO:0045907
    label: positive regulation of vasoconstriction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation suggests V2R positively regulates vasoconstriction. However, V2R is
      primarily associated with antidiuretic effects in the kidney, while V1a receptors
      are the main mediators of vasopressin-induced vasoconstriction.
    action: KEEP_AS_NON_CORE
    reason: >-
      Vasoconstriction is primarily mediated by the V1a receptor (Avpr1a), not V2R. The V2R
      can contribute indirectly to blood pressure regulation through water retention effects,
      and some evidence suggests V2R activation may have a minor vasodilatory rather than
      vasoconstrictive effect. This IBA annotation likely reflects shared ancestry in the
      vasopressin receptor family. Marking as non-core since the primary vasoconstriction role
      belongs to V1a.
    supported_by:
    - reference_id: GO_REF:0000033
      supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family]"

