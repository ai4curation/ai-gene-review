    label: negative regulation of urine volume
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      IEA annotation transferred from rat Avpr2 (Q00788) via Ensembl Compara. V2R mediates
      the antidiuretic effect of vasopressin by promoting water reabsorption in the kidney
