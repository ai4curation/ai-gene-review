- id: PMID:9861014
  title: Targeted disruption of mouse long-chain acyl-CoA dehydrogenase gene reveals
    crucial roles for fatty acid oxidation.
  findings:
  - statement: LCAD-knockout mice show that long-chain acyl-CoA dehydrogenase is crucial for fatty
      acid oxidation, presenting with lipidosis, hypoglycemia, elevated serum free fatty acids and
      nonketotic dicarboxylic aciduria.
    supporting_text: "lipidosis, hypoglycemia, elevated serum free fatty acids, and nonketotic dicarboxylic"
    full_text_unavailable: false
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "The LCAD-knockout mouse paper; grounds the core long-chain acyl-CoA dehydrogenase
      activity and the FAO/lipid/carnitine phenotypes. Abstract-only in cache."
- id: PMID:9802886
  title: Abnormal nonshivering thermogenesis in mice with inherited defects of fatty
    acid oxidation.
  findings:
