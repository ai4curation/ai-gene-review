id: P51174
gene_symbol: Acadl
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Acadl encodes long-chain specific acyl-CoA dehydrogenase (LCAD), a mitochondrial matrix flavoenzyme
  that catalyzes the first, FAD-dependent step of each mitochondrial fatty acid beta-oxidation cycle:
  the alpha,beta-dehydrogenation of a saturated (or unsaturated) long-chain acyl-CoA to the
  corresponding (2E)-enoyl-CoA, passing electrons to the electron-transfer flavoprotein (ETF). LCAD
  acts on acyl-CoAs of roughly C6-C24, with a substrate range that overlaps the very-long/long-chain
  enzymes VLCAD (ACADVL) and ACAD9, and it is the principal dehydrogenase for unsaturated and
  methyl-branched long-chain substrates. The mature enzyme is a homotetramer with one non-covalently
  bound FAD per subunit. Unlike in humans - where VLCAD dominates long-chain oxidation and LCAD is a
  minor activity - LCAD is a physiologically important long-chain dehydrogenase in rodents, and the
  Acadl-knockout mouse is a well-characterized model showing hepatic and cardiac lipidosis,
  hypoglycemia, dicarboxylic aciduria, gestational loss, and cold intolerance / impaired non-shivering
  thermogenesis. These whole-organism knockout phenotypes are the biological basis of LCAD's
  thermoregulation and lipid-homeostasis annotations, and several were mis-propagated by orthology to
  human ACADVL, where they do not belong.
