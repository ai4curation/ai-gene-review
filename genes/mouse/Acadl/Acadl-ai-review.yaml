suggested_questions:
- question: >-
    Given that mouse LCAD is a functionally important long-chain dehydrogenase (overlapping VLCAD)
    whereas human LCAD (ACADL) is minor, which long-chain substrates in vivo depend specifically on
    LCAD versus VLCAD/ACAD9 in the mouse, particularly unsaturated and methyl-branched acyl-CoAs?
- question: >-
    Are the LCAD-knockout thermoregulation and lipid-regulation phenotypes direct consequences of the
    long-chain FAO block, or do they involve secondary PPAR-alpha-mediated transcriptional adaptation?
suggested_experiments:
- description: >-
    Substrate-resolved acylcarnitine and flux profiling in Acadl-/- versus Acadvl-/- mouse tissues to
    delineate the non-redundant long-chain substrate range of LCAD in the rodent.
  hypothesis: >-
    Mouse LCAD is the principal dehydrogenase for unsaturated and methyl-branched long-chain acyl-CoAs,
    a niche not fully covered by VLCAD.
