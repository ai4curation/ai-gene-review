core_functions:
- description: >-
    Long-chain specific acyl-CoA dehydrogenase (EC 1.3.8.8): FAD-dependent alpha,beta-dehydrogenation
    of long-chain (and unsaturated/methyl-branched) acyl-CoA thioesters to (2E)-enoyl-CoA, the first
    step of each mitochondrial fatty acid beta-oxidation cycle, transferring electrons to ETF. In
    rodents this is a physiologically important long-chain dehydrogenase overlapping VLCAD/ACAD9.
  supported_by:
  - reference_id: PMID:9861014
    supporting_text: "long-chain acyl-CoA dehydrogenase gene reveals crucial roles for fatty acid oxidation"
    full_text_unavailable: false
