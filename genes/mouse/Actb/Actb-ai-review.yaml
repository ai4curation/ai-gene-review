    label: structural constituent of cytoskeleton
  description: |-
    Beta-actin polymerizes from ATP-bound G-actin monomers into F-actin filaments, serving as the core structural constituent of the actin cytoskeleton. Formin-nucleated beta-actin networks provide force-generating and scaffolding structures for cell motility, cell shape, and cytokinesis.
