- id: file:mouse/Actb/Actb-deep-research-falcon.md
  title: Falcon deep research report on mouse Actb (beta-actin, P60710)
  findings:
  - statement: |-
      Beta-actin is a central component of the actin cytoskeleton, existing as monomeric (G-actin) and filamentous (F-actin) assemblies; its primary function is to polymerize into F-actin networks that drive cell motility and cytokinesis.
    supporting_text: |-
      β‑actin is a central component of the **actin cytoskeleton**, existing as **monomeric (G‑actin)** and **filamentous (F‑actin)** assemblies that drive processes such as **cell motility** and **cytokinesis**.
    reference_section_type: RESULTS
  - statement: |-
      Actin filaments are nucleated by assembly factors including formins; formin DIAPH3 preferentially generates beta-actin filaments.
    supporting_text: |-
      Actin filaments arise by polymerization of actin monomers and are nucleated by actin assembly factors including **formins**
    reference_section_type: RESULTS
  - statement: |-
      The primary molecular function of beta-actin is to polymerize into F-actin networks that act as force-generating and scaffold structures for processes including cytokinesis.
    supporting_text: |-
      β‑actin’s primary functional contribution is to **polymerize into F‑actin networks** that act as force-generating and scaffold structures for cellular processes including cytokinesis
    reference_section_type: DISCUSSION
  - statement: |-
      Beta-actin networks (but not gamma-actin) are required to maintain RhoA and activated non-muscle myosin-II at the cytokinetic furrow.
    supporting_text: |-
      β‑actin networks are required to maintain key contractile and signaling components at the furrow (RhoA, activated myosin-II)
    reference_section_type: RESULTS
  - statement: |-
      Cytoplasmic actin isoforms form spatially distinct, functionally non-redundant networks despite minimal protein-sequence divergence (4 of 375 residues).
    supporting_text: |-
      **cytoplasmic actin isoforms form spatially distinct, functionally non-redundant networks** despite minimal protein sequence divergence
    reference_section_type: RESULTS
  - statement: |-
      Beta-actin is enriched in specific cytoskeletal structures such as the cleavage furrow during cytokinesis.
    supporting_text: |-
      β‑actin can be enriched in specific cytoskeletal structures such as the **cleavage furrow** during cytokinesis
    reference_section_type: RESULTS
  - statement: |-
      Actin binds and hydrolyzes ATP; the detailed ATP hydrolysis mechanism was not deeply covered in this run, but ATP binding/hydrolysis is intrinsic to actin dynamics.
    supporting_text: |-
      limited direct primary evidence within this run for the detailed **ATP hydrolysis mechanism** of actin
    reference_section_type: CONCLUSIONS
  - statement: |-
      In retina, beta- and gamma-actin localize across retinal layers with enrichment in synaptic layers and microvilli of RPE/Muller cells; loss of beta-actin disrupts microvilli architecture and photoreceptor physiology.
    supporting_text: |-
      both β‑ and γ‑actin are present across retinal layers with prominent enrichment in synaptic layers and microvilli of RPE/Müller cells
    reference_section_type: RESULTS
  - statement: |-
      Activation-induced homotypic clustering of CD8+ T cells requires F-actin assembly; MRTFs act as G-actin sensors driving actin gene expression.
    supporting_text: |-
      **activation-induced homotypic clustering** of CD8+ T cells requires **F‑actin assembly** and supports paracrine **IL‑2 retention/presentation**
    reference_section_type: RESULTS
  - statement: |-
      Although ACTB/Actb is widely used as a housekeeping/reference gene, no single housekeeping gene is universally stable and ACTB should be empirically validated per tissue and condition.
    supporting_text: |-
      no single housekeeping gene is universally stable—hence ACTB should be empirically validated per tissue and condition
    reference_section_type: DISCUSSION
