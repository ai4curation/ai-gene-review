id: P60710
gene_symbol: Actb
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: |-
  Actb encodes beta-actin (actin, cytoplasmic 1; UniProt P60710), one of the two non-muscle cytoplasmic actin isoforms (with gamma-actin/Actg1, from which it differs by only 4 of 375 N-terminal residues). Its core, evolved function is structural: beta-actin polymerizes from ATP-bound G-actin monomers into F-actin filaments, the building blocks of the actin cytoskeleton. Intrinsic ATP binding and hydrolysis drive filament assembly, treadmilling and turnover. Formin-nucleated beta-actin networks (e.g. via DIAPH3) provide force-generating and scaffolding structures for cell motility, cell shape, and cytokinesis, where beta-actin specifically maintains RhoA and non-muscle myosin II at the cleavage furrow. Beta- and gamma-actin form spatially distinct, non-redundant networks despite near-identical sequences. Actb is essential (Actb-null mice are embryonic lethal). A minor monomeric nuclear actin pool participates in chromatin-associated complexes, but the many chromatin-remodeling/SWI-SNF/BAF process annotations on this gene derive from studies of complex subunits rather than beta-actin itself and represent over-annotations.
