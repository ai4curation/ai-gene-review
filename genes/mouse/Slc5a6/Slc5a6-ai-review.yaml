# Core CC: plasma membrane (IBA)
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for plasma membrane localization. SMVT is a multi-pass integral membrane
      protein localized to the plasma membrane.
    action: ACCEPT
    reason: >-
      Core localization. UniProt confirms "Cell membrane; Multi-pass membrane protein." The
      protein has 13 predicted transmembrane helices. PMID:23104561 describes it as "a plasma
      membrane protein involved in the transport of the water-soluble vitamin biotin."
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          The Slc5a6 gene expresses a plasma membrane protein involved in the transport of the
          water-soluble vitamin biotin

# Core BP: sodium ion transport (IBA)
- term:
    id: GO:0006814
    label: sodium ion transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for sodium ion transport. SMVT functions as a Na+-coupled symporter with
      2:1 Na+:substrate stoichiometry, meaning sodium transport is integral to its mechanism.
    action: ACCEPT
    reason: >-
      Sodium transport is mechanistically integral to SMVT function. All substrate transport
      reactions involve co-transport of 2 Na+ ions per substrate molecule. UniProt confirms
      "Functions as a Na(+)-coupled substrate symporter where the stoichiometry of Na(+):substrate
      is 2:1." The IBA correctly captures this aspect of the transporter mechanism.

# Core MF: sodium-dependent multivitamin transmembrane transporter activity (IBA)
- term:
    id: GO:0008523
    label: sodium-dependent multivitamin transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for the primary molecular function of SMVT. This is the most specific and
      informative MF term for this transporter, encompassing its role as a sodium-coupled
      multivitamin transporter. Directly confirmed by mouse intestinal conditional KO studies
      (PMID:23104561).
    action: ACCEPT
    reason: >-
      This is the defining molecular function of Slc5a6/SMVT. The IBA is at the correct level
      of specificity. PMID:23104561 demonstrates that SMVT is "solely responsible for intestinal
      biotin uptake" and transports both biotin and pantothenic acid. UniProt confirms catalytic
      activities for biotin, pantothenate, lipoate, and iodide transport with 2:1 Na+:substrate
      stoichiometry.
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          The Slc5a6 gene expresses a plasma membrane protein involved in the transport of the
          water-soluble vitamin biotin; the transporter is commonly referred to as the
          sodium-dependent multivitamin transporter (SMVT) because it also transports pantothenic
          acid and lipoic acid

