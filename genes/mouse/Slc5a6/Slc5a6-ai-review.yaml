id: Q5U4D8
gene_symbol: Slc5a6
aliases:
  - SMVT
  - Sodium-dependent multivitamin transporter
  - Na(+)-dependent multivitamin transporter
  - Solute carrier family 5 member 6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Mouse Slc5a6 encodes the sodium-dependent multivitamin transporter (SMVT), a plasma membrane
  transporter belonging to the sodium:solute symporter (SSF) family. SMVT mediates the electrogenic
  transport of the water-soluble vitamins biotin and pantothenate, as well as lipoate and iodide,
  with a 2:1 Na+:substrate stoichiometry. The transporter is required for carrier-mediated biotin
  and pantothenate uptake in the intestine across the brush border membrane. Conditional knockout of
  Slc5a6 in mouse intestine results in complete loss of carrier-mediated biotin uptake, demonstrating
  that SMVT is solely responsible for intestinal biotin absorption (PMID:23104561). SMVT also plays
  a role in maintenance of intestinal mucosal integrity by providing the gut mucosa with biotin
  (PMID:27492331). The protein is expressed in intestinal mucosa, liver, kidney, colon, and brain,
  and localizes to the apical plasma membrane and brush border membrane of epithelial cells. SMVT
  also contributes to luminal uptake of biotin and pantothenate into the brain across the
  blood-brain barrier (by similarity to human ortholog). Disruption phenotype includes premature
  lethality, growth retardation, decreased bone density, intestinal abnormalities, chronic
  inflammation, and impaired gut permeability.

