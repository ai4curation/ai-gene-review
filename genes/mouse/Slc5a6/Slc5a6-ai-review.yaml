# ============================================
# EXPERIMENTAL ANNOTATIONS (IMP)
# ============================================

# BP: biotin metabolic process (IMP) - MODIFY
- term:
    id: GO:0006768
    label: biotin metabolic process
  evidence_type: IMP
  original_reference_id: PMID:23104561
  review:
    summary: >-
      IMP annotation for biotin metabolic process based on the conditional KO showing decreased
      biotin status. However, SMVT is a transporter, not a metabolic enzyme. The decreased
      biotin status is a downstream consequence of impaired biotin absorption, not direct
      involvement in biotin metabolism.
    action: MODIFY
    reason: >-
      SMVT does not metabolize biotin; it transports it. The KO mice show "decreased biotin
      status" (PMID:23104561), but this is a consequence of impaired biotin absorption, not
      direct involvement in biotin metabolism. The more accurate annotation is GO:0015878
      (biotin transport) or GO:1905135 (biotin import across plasma membrane), both of which
      are already annotated. The term "biotin metabolic process" over-represents the role of
      a transporter.
    proposed_replacement_terms:
      - id: GO:0015878
        label: biotin transport
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          These studies provide the first in vivo confirmation in native intestine that SMVT is
          solely responsible for intestinal biotin uptake

# Core MF: sodium-dependent multivitamin transmembrane transporter activity (IMP)
- term:
    id: GO:0008523
    label: sodium-dependent multivitamin transmembrane transporter activity
  evidence_type: IMP
  original_reference_id: PMID:23104561
  review:
    summary: >-
      IMP annotation based on intestinal conditional KO mouse studies showing complete loss of
      carrier-mediated biotin and pantothenate uptake. This is the strongest direct evidence for
      this MF annotation.
    action: ACCEPT
    reason: >-
      PMID:23104561 demonstrates using Cre/lox conditional KO that SMVT is solely responsible
      for intestinal biotin uptake, and also transports pantothenate. The transport studies showed
      "complete inhibition in carrier-mediated biotin uptake in the intestine of the KO mice."
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          In vivo (and in vitro) transport studies showed complete inhibition in carrier-mediated
          biotin uptake in the intestine of the KO mice compared with their control littermates.
          These studies provide the first in vivo confirmation in native intestine that SMVT is
          solely responsible for intestinal biotin uptake

