- id: PMID:21183659
  title: Association of PDZ-containing protein PDZD11 with the human sodium-dependent
    multivitamin transporter.
  findings:
    - statement: >-
        PDZD11 is an interacting partner of hSMVT that affects its function and cell biology.
        The interaction enhances biotin uptake and PDZD11 knockdown decreases hSMVT expression
        at the cell membrane.
      supporting_text: >-
        knocking down of PDZD11 with gene-specific small interfering RNA led to a significant
        decrease in biotin uptake; biotinylation assay showed this to be associated with a
        marked decrease in level of expression of hSMVT at the cell membrane
- id: PMID:23104561
  title: Conditional knockout of the Slc5a6 gene in mouse intestine impairs biotin absorption.
  findings:
    - statement: >-
        Intestine-specific conditional knockout of Slc5a6 in mouse demonstrates that SMVT is
        solely responsible for carrier-mediated biotin uptake in the intestine. KO mice show
        complete inhibition of biotin and pantothenate uptake, premature lethality, growth
        retardation, decreased bone density, decreased biotin status, and intestinal
        histological abnormalities.
      supporting_text: >-
        In vivo (and in vitro) transport studies showed complete inhibition in carrier-mediated
        biotin uptake in the intestine of the KO mice compared with their control littermates.
        These studies provide the first in vivo confirmation in native intestine that SMVT is
        solely responsible for intestinal biotin uptake
    - statement: >-
        SMVT also transports pantothenic acid and lipoic acid in addition to biotin.
      supporting_text: >-
        the transporter is commonly referred to as the sodium-dependent multivitamin transporter
        (SMVT) because it also transports pantothenic acid and lipoic acid
    - statement: >-
        KO mice exhibit histological abnormalities including shortened villi, dysplasia, chronic
        active inflammation, and premature lethality.
      supporting_text: >-
        About two-thirds of the KO mice died prematurely between the age of 6 and 10 wk. Growth
        retardation, decreased bone density, decreased bone length, and decreased biotin status
        were observed in the KO mice. Microscopic analysis showed histological abnormalities in
        the small bowel (shortened villi, dysplasia) and cecum (chronic active inflammation,
        dysplasia)
- id: PMID:27492331
  title: Role of the sodium-dependent multivitamin transporter (SMVT) in the maintenance
    of intestinal mucosal integrity.
  full_text_unavailable: true
  findings:
    - statement: >-
        SMVT plays a role in maintaining intestinal mucosal integrity by providing the gut
        mucosa with biotin. Disruption leads to increased gut permeability and changes in tight
        junction protein expression.
      full_text_unavailable: true

core_functions:
  - description: >-
      Sodium-dependent multivitamin transmembrane transporter: mediates electrogenic Na+-coupled
      import of biotin, pantothenate, lipoate, and iodide across the apical plasma membrane with
      2:1 Na+:substrate stoichiometry. This is the primary carrier for intestinal biotin and
      pantothenate absorption.
    molecular_function:
      id: GO:0008523
      label: sodium-dependent multivitamin transmembrane transporter activity
    directly_involved_in:
      - id: GO:0015878
        label: biotin transport
      - id: GO:0015887
        label: pantothenate transmembrane transport
      - id: GO:0006814
        label: sodium ion transport
      - id: GO:1905135
        label: biotin import across plasma membrane
    locations:
      - id: GO:0016324
        label: apical plasma membrane
      - id: GO:0031526
        label: brush border membrane
    substrates:
      - id: CHEBI:57586
        label: biotin
      - id: CHEBI:29032
        label: (R)-pantothenate
      - id: CHEBI:83088
        label: (R)-lipoate
      - id: CHEBI:16382
        label: iodide
      - id: CHEBI:29101
        label: sodium(1+)
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          These studies provide the first in vivo confirmation in native intestine that SMVT is
          solely responsible for intestinal biotin uptake

  - description: >-
      Maintenance of intestinal mucosal integrity: by providing the gut mucosa with biotin, SMVT
      contributes to the maintenance of intestinal epithelial barrier function and tight junction
      protein expression. This is a downstream consequence of its transporter activity rather than
      a separate molecular function.
    molecular_function:
      id: GO:0008523
      label: sodium-dependent multivitamin transmembrane transporter activity
    directly_involved_in:
      - id: GO:0015878
        label: biotin transport
    locations:
      - id: GO:0016324
        label: apical plasma membrane
    supported_by:
      - reference_id: PMID:27492331
        supporting_text: >-
          Role of the sodium-dependent multivitamin transporter (SMVT) in the maintenance of
          intestinal mucosal integrity

proposed_new_terms:
  - proposed_name: lipoate transport
    proposed_definition: >-
      The directed movement of lipoate (lipoic acid) into, out of or within a cell, or between
      cells, by means of some agent such as a transporter or pore.
    justification: >-
      SMVT (SLC5A6) is established to transport lipoate in addition to biotin, pantothenate,
      and iodide. UniProt records a specific catalytic activity for lipoate transport:
      "(R)-lipoate(out) + 2 Na(+)(out) = (R)-lipoate(in) + 2 Na(+)(in)". PMID:23104561 states
      the transporter "also transports pantothenic acid and lipoic acid." No GO term currently
      exists for lipoate transport, preventing proper annotation of this established function.
    proposed_parent:
      id: GO:0006810
      label: transport
    supported_by:
      - reference_id: PMID:23104561
        supporting_text: >-
          the transporter is commonly referred to as the sodium-dependent multivitamin transporter
          (SMVT) because it also transports pantothenic acid and lipoic acid
