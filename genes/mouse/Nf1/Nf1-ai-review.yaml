core_functions:
- molecular_function:
    id: GO:0005096
    label: GTPase activator activity
  description: Functions as a RasGAP that stimulates Ras GTP hydrolysis, thereby converting active Ras-GTP to inactive Ras-GDP and attenuating Ras-dependent signaling.
  locations:
  - id: GO:0005886
    label: plasma membrane
  directly_involved_in:
  - id: GO:0046580
    label: negative regulation of Ras protein signal transduction
  supported_by:
  - reference_id: UniProt:Q04690
    supporting_text: Stimulates the GTPase activity of Ras (By similarity). NF1 shows greater affinity for Ras GAP, but lower specific activity (By similarity). May be a regulator of Ras activity (By similarity).
  - reference_id: file:mouse/Nf1/Nf1-deep-research-falcon.md
    supporting_text: Neurofibromin is a **RAS GTPase-activating protein** that accelerates RAS GTP hydrolysis (RAS-GTP -> RAS-GDP), thereby negatively regulating Ras signaling.
