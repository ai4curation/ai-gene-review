id: Q04690
gene_symbol: Nf1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Nf1 encodes neurofibromin, a large Ras GTPase-activating protein and tumor suppressor. Its core activity is stimulation of Ras GTP hydrolysis, converting active Ras-GTP to inactive Ras-GDP and thereby negatively regulating Ras-dependent intracellular signaling. SEC14/PH-like lipid-binding modules and nuclear or synaptic contexts may modulate localization or disease biology, but the central conserved function is RasGAP-mediated signal attenuation.
existing_annotations:
- term:
    id: GO:0005096
    label: GTPase activator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Neurofibromin's GAP-related domain supplies an arginine finger (Arg1278) that stabilizes the RAS GTP-hydrolysis transition state; this RasGAP activity is the defining function of the protein.
    action: ACCEPT
    reason: Defining biochemical activity (RasGAP); strongly supported by domain architecture and IMP/IGI/ISO evidence.
    supported_by:
    - reference_id: UniProt:Q04690
      supporting_text: Stimulates the GTPase activity of Ras (By similarity). NF1 shows greater affinity for Ras GAP, but lower specific activity (By similarity). May be a regulator of Ras activity (By similarity).
    - reference_id: file:mouse/Nf1/Nf1-deep-research-falcon.md
      supporting_text: Neurofibromin is a **RAS GTPase-activating protein** that accelerates RAS GTP hydrolysis (RAS-GTP -> RAS-GDP), thereby negatively regulating Ras signaling.
