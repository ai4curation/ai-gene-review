- term:
    id: GO:1902600
    label: proton transmembrane transport
  qualifier: involved_in
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  supporting_entities:
  - GO:0004129
  review:
    summary: >-
      Remove. This electronic annotation is a logical consequence of the
      cytochrome-c oxidase activity annotation. It incorrectly propagates the
      proton-pumping process of assembled complex IV to SURF1, which is an
      assembly factor and not the proton-translocating enzyme.
    action: REMOVE
    reason: >-
      SURF1 loss affects proton-pumping capacity indirectly by impairing complex
      IV assembly. The gene product itself is not a transporter or a catalytic
      COX subunit, so GO:1902600 is an over-annotation.
    supported_by:
    - reference_id: UniProt:P09925
      supporting_text: >-
        Regulates cytochrome c oxidase assembly.
    - reference_id: file:mouse/Surf1/Surf1-deep-research-falcon.md
      supporting_text: >-
        SURF1 is not an enzyme catalyzing a chemical transformation; its primary
        biochemical role is as an inner-membrane assembly factor/chaperone-like
        protein that promotes correct maturation and/or progression of COX
        assembly intermediates.
