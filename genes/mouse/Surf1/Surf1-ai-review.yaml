id: P09925
gene_symbol: Surf1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Mouse Surf1 encodes surfeit locus protein 1, a conserved nuclear-encoded
  mitochondrial inner membrane protein in the SURF1/Shy1 family. The curated
  evidence supports Surf1 as a cytochrome c oxidase (mitochondrial respiratory
  chain complex IV) assembly factor rather than as a catalytic complex IV
  subunit. UniProt describes mouse SURF1 as a component of the MITRAC
  mitochondrial translation regulation assembly intermediate, and mouse knockout
  studies show isolated complex IV deficiency with elevated lactate and motor
  phenotypes. Falcon synthesis further places SURF1 at early/intermediate COX
  biogenesis, probably stabilizing COX1-module assembly and/or supporting
  heme a3-CuB catalytic-center maturation. These mechanistic details should be
  treated as assembly-factor biology, not as direct cytochrome-c oxidase or
  proton-transporter activity by SURF1 itself.
