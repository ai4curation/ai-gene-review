  - PANTHER:PTN000603741
  - SGD:S000003344
  - UniProtKB:Q15526
  review:
    summary: >-
      Accept. This is the central conserved role of Surf1. The IBA is supported
      by the SURF1/Shy1 family node and by characterized orthologs including
      human SURF1 and yeast Shy1. Mouse evidence is concordant: Surf1 knockout
      causes isolated cytochrome c oxidase deficiency, while UniProt describes
      SURF1 as a MITRAC component that regulates COX assembly.
    action: ACCEPT
    reason: >-
      GO:0033617 captures the core biological process without assigning SURF1
      catalytic activity. PANTHER/family context is appropriate here because it
      is the explicit basis of this IBA annotation and agrees with mouse
      experimental and UniProt evidence.
    supported_by:
