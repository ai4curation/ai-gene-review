- id: UniProt:P09925
  title: UniProtKB record for mouse Surf1 (P09925)
  findings:
  - statement: >-
      Mouse SURF1 is a MITRAC component that regulates cytochrome c oxidase
      assembly.
    supporting_text: >-
      Component of the MITRAC (mitochondrial translation regulation assembly
      intermediate of cytochrome c oxidase complex) complex. Regulates
      cytochrome c oxidase assembly.
  - statement: >-
      Mouse SURF1 is a mitochondrial multi-pass membrane protein.
    supporting_text: >-
      SUBCELLULAR LOCATION: Mitochondrion membrane; Multi-pass membrane
      protein.
  - statement: >-
      Surf1 disruption causes reduced COX activity and mitochondrial stress
      phenotypes, consistent with an assembly-factor role.
    supporting_text: >-
      DISRUPTION PHENOTYPE: Increases lactate levels in blood and brain;
      decreases COX activity and respiration; in skeletal muscles, results in
      mitochondrial unfolded protein response.
- id: file:mouse/Surf1/Surf1-deep-research-falcon.md
  title: Falcon deep research report for mouse Surf1
  findings:
  - statement: >-
      Falcon verified the target as mouse UniProt P09925 and synthesized SURF1
      as a conserved cytochrome c oxidase assembly factor.
    supporting_text: >-
      The requested target corresponds to the mammalian SURF1-family protein
      homologous to yeast Shy1 that functions as a mitochondrial cytochrome c
      oxidase assembly factor.
  - statement: >-
      Falcon places Surf1 at the mitochondrial inner membrane and within COX
      assembly intermediates.
    supporting_text: >-
      Surf1 is described as synthesized as a larger precursor with an N-terminal
      leader peptide that is cleaved, and the mature protein is embedded in the
      mitochondrial inner membrane where it participates in COX assembly.
  - statement: >-
      Falcon explicitly distinguishes SURF1 assembly-factor biology from direct
      enzyme activity.
    supporting_text: >-
      Surf1 is not an enzyme catalyzing a chemical transformation; its primary
      biochemical role is as an inner-membrane assembly factor/chaperone-like
      protein that promotes correct maturation and/or progression of COX
      assembly intermediates toward functional holoenzyme.
  - statement: >-
      Falcon highlights a mechanistic caveat: heme a3-CuB maturation is
      supported largely by homolog and biochemical model evidence.
    supporting_text: >-
      A mechanistic hypothesis supported by biochemical characterization of
      Surf1p-deficient bacterial oxidase posits that Surf1-family proteins
      facilitate maturation of the heme a3-CuB catalytic center in COX1.
- id: file:mouse/Surf1/Surf1-notes.md
  title: Curator notes for mouse Surf1
  findings:
  - statement: >-
      Local notes summarize Surf1 as a nuclear-encoded assembly factor for
      cytochrome c oxidase and flag proton transport and ATP synthesis as
      downstream effects rather than Surf1 core functions.
    supporting_text: >-
      NOT core functions: Direct proton transport; direct electron transport;
      ATP synthesis.
- id: PMID:12566387
  title: Constitutive knockout of Surf1 is associated with high embryonic lethality, mitochondrial disease and cytochrome c oxidase deficiency in mice.
  full_text_unavailable: true
  findings:
  - statement: >-
      Constitutive Surf1 knockout identifies mouse Surf1 as a COX assembly
      protein and causes isolated COX deficiency.
    supporting_text: >-
      We report here the creation of a constitutive knockout mouse for SURF1, a
      gene encoding one of the assembly proteins involved in the formation of
      cytochrome c oxidase (COX).
  - statement: >-
      Surf1 loss causes severe mouse phenotypes and reduced COX activity but no
      evidence that SURF1 itself is the COX enzyme.
    supporting_text: >-
      The murine phenotype is characterized by high post-implantation embryonic
      lethality, motor performance deficits, and a profound and isolated defect
      of COX activity in skeletal muscle and liver, and, to a lesser extent,
      heart and brain.
- id: PMID:23838831
  title: Decreased in vitro mitochondrial function is associated with enhanced brain metabolism, blood flow, and memory in Surf1-deficient mice.
  findings:
  - statement: >-
      Surf1-deficient brain mitochondria have reduced COX activity, supporting
      an upstream requirement for functional complex IV.
    supporting_text: >-
      ATP production in brain mitochondria isolated from Surf1 KO mice remained
      unchanged despite a 49% reduction in COX activity, a 24% reduction in
      state 3 respiration, and a 24% increase in H 2 O 2 production.
  - statement: >-
      The paper describes Surf1 as participating in efficient assembly and
      function of cytochrome c oxidase.
    supporting_text: >-
      Surf1 participates in the efficient assembly and function of cytochrome C
      oxidase (COX; mitochondrial Complex IV), which is the terminal enzyme of
      the electron transport chain and is critical for ATP synthesis.
- id: PMID:18614015
  title: A mitochondrial protein compendium elucidates complex I disease biology.
  findings:
  - statement: >-
      MitoCarta provides high-throughput support for mitochondrial localization.
    supporting_text: >-
      We performed mass spectrometry, GFP tagging, and machine learning to
      create a mitochondrial compendium of 1098 genes and their protein
      expression across 14 mouse tissues.
- id: PMID:14651853
  title: Integrated analysis of protein composition, tissue diversity, and gene regulation in mouse mitochondria.
  full_text_unavailable: true
  findings:
  - statement: >-
      Mouse mitochondrial proteomics supports broad mitochondrial localization.
    supporting_text: >-
      We performed a proteomic survey of mitochondria from mouse brain, heart,
      kidney, and liver and combined the results with existing gene annotations
      to produce a list of 591 mitochondrial proteins.
core_functions:
- description: >-
    SURF1 is a mitochondrial inner membrane assembly factor for respiratory
    chain complex IV. Its core role is to promote cytochrome c oxidase
    biogenesis within MITRAC/pre-assembly intermediates, especially during
    early COX1-module maturation and progression toward mature complex IV. The
    available mouse evidence supports this assembly role through isolated COX
    deficiency in Surf1 mutants; it does not support annotating SURF1 as an
    independent cytochrome-c oxidase enzyme or proton transporter.
  directly_involved_in:
  - id: GO:0033617
    label: mitochondrial respiratory chain complex IV assembly
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  in_complex:
    id: GO:0062011
    label: mitochondrial respiratory chain complex IV pre-assembly complex
  supported_by:
  - reference_id: UniProt:P09925
    supporting_text: >-
      Component of the MITRAC complex. Regulates cytochrome c oxidase assembly.
  - reference_id: PMID:12566387
    supporting_text: >-
      We report here the creation of a constitutive knockout mouse for SURF1, a
      gene encoding one of the assembly proteins involved in the formation of
      cytochrome c oxidase (COX).
    full_text_unavailable: true
  - reference_id: PMID:23838831
    supporting_text: >-
      Surf1 participates in the efficient assembly and function of cytochrome C
      oxidase (COX; mitochondrial Complex IV).
  - reference_id: file:mouse/Surf1/Surf1-deep-research-falcon.md
    supporting_text: >-
      SURF1 functions within the MITRAC complex, a specialized assembly
      machinery that couples COX1 synthesis with early assembly steps.
  - reference_id: file:mouse/Surf1/Surf1-deep-research-falcon.md
    supporting_text: >-
      Authoritative reviews and primary biochemical work converge on SURF1 as
      an early/intermediate complex IV assembly factor that affects progression
      beyond COX1-containing intermediates and maturation of the catalytic
      heme a3-CuB center.
proposed_new_terms: []
suggested_questions:
- question: >-
    For mouse Surf1 specifically, can the MITRAC/pre-assembly-complex placement
    be demonstrated directly rather than inferred from human SURF1 and homolog
    systems?
- question: >-
    Does mouse SURF1 directly influence heme a3-CuB center maturation, or is
    that mechanistic detail primarily a conserved-family inference from
    bacterial and yeast homolog studies?
- question: >-
    What tissue-specific compensatory mechanisms explain the milder mouse
    phenotype despite substantial complex IV deficiency?
suggested_experiments:
- description: >-
    Perform endogenous tagging or immunoprecipitation of mouse SURF1 followed
    by native complex analysis and mass spectrometry to test direct membership
    in MITRAC/GO:0062011 in mouse tissues or cells.
  experiment_type: proteomics
- description: >-
    Use pulse-labeling, blue-native PAGE, and complex IV assembly-intermediate
    profiling in Surf1 knockout and rescued mouse cells to map the blocked
    assembly step.
  experiment_type: respiratory-chain assembly assay
- description: >-
    Measure COX1 heme a/heme a3 and copper-center maturation in Surf1-deficient
    mouse mitochondria to test whether the heme a3-CuB mechanism inferred from
    homolog systems applies directly to mouse SURF1.
  experiment_type: biochemical cofactor assay
