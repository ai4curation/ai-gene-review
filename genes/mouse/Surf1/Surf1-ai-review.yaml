- term:
    id: GO:0062011
    label: mitochondrial respiratory chain complex IV pre-assembly complex
  evidence_type: IEA
  review:
    summary: >-
      Proposed new annotation. UniProt states that mouse SURF1 is a component of
      MITRAC, and Falcon synthesis identifies MITRAC as the assembly
      intermediate where SURF1 acts during COX1-module maturation. This CC term
      is more informative than a generic protein-binding annotation and captures
      the assembly complex rather than the mature respiratory chain complex.
    action: NEW
    reason: >-
      GO:0062011 describes the mitochondrial respiratory chain complex IV
      pre-assembly complex, which corresponds to MITRAC. The evidence is partly
      by similarity to human SURF1 and homolog studies, so this should be used
      as a conservative proposed CC annotation rather than as proof of a new
      mouse-specific molecular activity.
    supported_by:
    - reference_id: UniProt:P09925
      supporting_text: >-
        SUBUNIT: Component of the MITRAC complex, the core components of this
        complex being COA3/MITRAC12 and COX14. Interacts with COA3.
    - reference_id: file:mouse/Surf1/Surf1-deep-research-falcon.md
      supporting_text: >-
        SURF1 functions within the MITRAC complex, a specialized assembly
        machinery that couples COX1 synthesis with early assembly steps.
