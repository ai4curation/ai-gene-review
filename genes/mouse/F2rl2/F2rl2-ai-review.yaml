description: >-
  F2rl2 encodes proteinase-activated receptor 3 (PAR-3), a seven-transmembrane G protein-coupled
  receptor activated by thrombin-mediated proteolytic cleavage of its N-terminal extracellular domain.
  In mouse platelets, PAR3 does not independently mediate transmembrane signaling but instead functions
  as a cofactor that binds thrombin and promotes productive cleavage and activation of PAR4. PAR3-deficient
  mice are protected against thrombosis, demonstrating the in vivo importance of this cofactor function.
  The proteolytic cleavage of PAR3 exposes a tethered ligand peptide (SFNGGP) that can activate signaling
  through phospholipase C and Ca2+ release from intracellular stores, stimulating insulin secretion from
  pancreatic beta cells.
