suggested_experiments:
- hypothesis: Mouse PAR3 tethered ligand peptide acts on beta cells independently
    of PAR4, via a distinct GPCR signaling mechanism.
  description: Test the effect of PAR3-activating peptide on insulin secretion from
    Par4-/- mouse islets to determine whether PAR3 tethered ligand signaling in
    beta cells is PAR4-independent. Combine with siRNA knockdown of PAR3 itself
    to confirm specificity.
- hypothesis: The PAR3 cofactor function for PAR4 involves specific extracellular
    domain interactions that could be disrupted by targeted peptides.
  description: Use peptide competition assays or domain-swap chimeras between mouse
    and human PAR3 to map the cofactor interaction surface between PAR3 and PAR4
    that enables thrombin presentation. This could clarify the species-specific
    difference in PAR3 signaling.
