- id: PMID:9087410
  title: Protease-activated receptor 3 is a second thrombin receptor in humans.
  findings:
  - statement: PAR3 was cloned as the second thrombin receptor, capable of mediating
      thrombin-triggered phosphoinositide hydrolysis.
    supporting_text: 'cloning and characterization of a new human thrombin receptor,
      designated protease-activated receptor 3 (PAR3). PAR3 can mediate thrombin-triggered
      phosphoinositide hydrolysis and is expressed in a variety of tissues'
    reference_section_type: ABSTRACT
- id: PMID:10766244
  title: PAR3 is a cofactor for PAR4 activation by thrombin.
  findings:
  - statement: Mouse PAR3 does not independently signal but acts as a cofactor to
      present thrombin to PAR4 for activation.
    supporting_text: "This establishes a paradigm for cofactor-assisted PAR activation\
      \ and for a G-protein-coupled receptor's acting as an accessory molecule to present\
      \ ligand to another receptor."
    reference_section_type: ABSTRACT
- id: PMID:11544528
  title: Role of thrombin signalling in platelets in haemostasis and thrombosis.
  findings:
  - statement: PAR4 knockout ablates all thrombin signaling in mouse platelets,
      confirming mPAR3 does not signal independently.
    supporting_text: 'supports the model that mouse PAR3 (mPAR3) does not by itself
      mediate transmembrane signalling but instead acts as a cofactor for thrombin
      cleavage and activation of mPAR4'
    reference_section_type: ABSTRACT
- id: PMID:12384423
  title: Protection against thrombosis in mice lacking PAR3.
  findings:
  - statement: Par3-/- mice are protected against thrombosis, demonstrating the in
      vivo importance of PAR3 cofactor function for hemostasis.
    supporting_text: 'Par3(-/-) mice were protected against ferric chloride-induced
      thrombosis of mesenteric arterioles and against thromboplastin-induced pulmonary
      embolism... even a partial decrease in mouse platelet responsiveness to thrombin
      protected against thrombosis'
    reference_section_type: ABSTRACT
- id: PMID:23405206
  title: Calcium mobilization and protein kinase C activation downstream of protease
    activated receptor 4 (PAR4) is negatively regulated by PAR3 in mouse platelets.
  findings:
  - statement: PAR3 forms constitutive homodimers and heterodimers with PAR4 and
      negatively regulates PAR4-mediated Ca2+ mobilization and PKC activation.
    supporting_text: 'PAR3 negatively regulates PAR4-mediated maximum Ca(2+)
      mobilization and PKC activation in mouse platelets by physical interaction'
    reference_section_type: ABSTRACT
- id: PMID:26742564
  title: Thrombin stimulates insulin secretion via protease-activated receptor-3.
  findings:
  - statement: PAR3-activating peptide stimulates insulin secretion from mouse islets
      via PLC and Ca2+ release from intracellular stores.
    supporting_text: 'Treatment with a peptide corresponding to the PAR3 tethered
      ligand stimulated islet insulin secretion and single beta-cell exocytosis by
      a mechanism that involves activation of phospholipase C and Ca(2+) release
      from intracellular stores'
    reference_section_type: ABSTRACT
  - statement: Thrombin-stimulated insulin secretion is blocked by an antibody
      targeting the PAR3 thrombin cleavage site.
    supporting_text: 'thrombin stimulates insulin secretion, an effect that was prevented
      by an antibody that blocks the thrombin cleavage site of PAR3'
    reference_section_type: ABSTRACT
- id: PMID:16892058
  title: The Rho-GTPase cdc42 regulates neural progenitor fate at the apical surface.
  findings:
  - statement: This paper studies the cell polarity protein Par3 (Pard3) at the
      apical surface of neural progenitors. It does NOT study the thrombin receptor
      F2rl2/PAR3. The GO annotation of F2rl2 to apical plasma membrane based on this
      paper appears to be a gene name confusion.
    supporting_text: 'the apical location of the Par complex and adherens junctions
      are gradually lost'
    reference_section_type: ABSTRACT
- id: PMID:16094321
  title: Asymmetric cell divisions promote stratification and differentiation of mammalian
    skin.
  findings:
  - statement: This paper reports the Par3-LGN-Inscuteable complex in epidermal
      asymmetric cell division. The "Par3" in this context is the cell polarity
      protein PARD3, not the thrombin receptor F2rl2/PAR3. The UniProt interaction
      annotation (with INSC and GPSM2) citing this paper may be misattributed.
    supporting_text: 'integrins and cadherins are essential for the apical localization
      of atypical protein kinase C, the Par3-LGN-Inscuteable complex and
      NuMA-dynactin to align the spindle'
    reference_section_type: ABSTRACT
