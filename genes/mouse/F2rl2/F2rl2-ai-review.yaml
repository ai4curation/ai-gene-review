- term:
    id: GO:0016324
    label: apical plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:16892058
  review:
    summary: This annotation appears to be erroneous. PMID:16892058 (Cappello et al.,
      2006) studies the Rho-GTPase Cdc42 and neural progenitor fate. The paper
      discusses the "Par complex" (aPKC-Par3-Par6) at the apical surface, but this
      refers to the cell polarity protein PARD3, not the thrombin receptor F2rl2/PAR3.
      The two proteins share the name "Par3" but are entirely different genes.
    action: REMOVE
    reason: PMID:16892058 does not study F2rl2 (thrombin receptor PAR3). The "Par3"
      referenced in this paper is the cell polarity protein Pard3 (Q99NH2). This
      annotation appears to result from a gene name confusion between PAR3/PARD3
      (polarity) and PAR3/F2rl2 (thrombin receptor).
    supported_by:
    - reference_id: PMID:16892058
      supporting_text: 'the apical location of the Par complex and adherens junctions
        are gradually lost'
      reference_section_type: ABSTRACT
