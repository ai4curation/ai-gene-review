suggested_questions:
- question: >-
    Does NEMEP interact with glucose transporters beyond class I (GLUT1-4)? BiFC analysis
    validated interactions with all four class I facilitative glucose transporters, but
    interactions with class II or III GLUTs have not been tested. Understanding the breadth
    of interactions could inform whether NEMEP has broader roles in glucose metabolism.
- question: >-
    What is the functional significance of NEMEP's high expression in adult brain? NEMEP
    accumulates in the posterior primitive streak during gastrulation and is enriched in
    adult brain. Given that GLUT1 and GLUT3 are the major brain glucose transporters,
    NEMEP may have a role in neuronal glucose uptake beyond early development.

suggested_experiments:
- description: >-
    Conditional knockout of Smim43/NEMEP in adult mouse brain to assess whether it plays
    a role in neuronal glucose uptake, given its high enrichment in adult brain and its
    interaction with GLUT1/GLUT3, the predominant brain glucose transporters.
  hypothesis: >-
    NEMEP may facilitate glucose uptake in neurons by activating GLUT1/GLUT3 in the adult
    brain, analogous to its role during mesendoderm differentiation.
- description: >-
    Structural characterization (cryo-EM or crosslinking mass spectrometry) of the
    NEMEP-GLUT1 and NEMEP-GLUT3 complexes to determine how this small transmembrane
    peptide activates glucose transporter activity at the molecular level.
  hypothesis: >-
    NEMEP directly contacts GLUT1/GLUT3 transmembrane helices to stabilize an
    outward-open conformation that enhances glucose transport rates.
