id: A0A286YD83
gene_symbol: Smim43
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Smim43 (also known as NEMEP, Nodal Enhanced MEsendoderm Peptide) is a 63 amino acid single-pass
  transmembrane micropeptide originally encoded by the putative lncRNA Gm11549. It is a direct
  transcriptional target of Nodal/TGF-beta signaling during mesendoderm differentiation of mouse
  embryonic stem cells. NEMEP interacts physically with glucose transporters GLUT1 (SLC2A1) and
  GLUT3 (SLC2A3) via its transmembrane domain and C-terminal residues H51-F57, and promotes
  glucose uptake to meet the energy demands of mesendoderm differentiation. NEMEP localizes to
  the plasma membrane where it colocalizes with GLUT1/GLUT3. Knockout of NEMEP in mESCs severely
  impairs mesendoderm differentiation and reduces glucose uptake, glycolysis, and TCA cycle
  metabolite levels. In vivo, NEMEP accumulates in the posterior primitive streak at E7.0, and
  chimeric embryo experiments confirm its requirement for mesendoderm specification. In adult
  mice, it is highly enriched in the brain.

existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Plasma membrane localization is inferred from UniProt subcellular location vocabulary
      mapping. This is strongly supported by experimental data in PMID:35810171 showing that
      NEMEP is a single-pass transmembrane protein that colocalizes with GLUT1 and GLUT3 on
      the cell membrane.
    action: ACCEPT
    reason: >-
      NEMEP is a single-pass transmembrane micropeptide that localizes to the plasma membrane,
      as demonstrated by confocal microscopy and BiFC assays (PMID:35810171). The IEA annotation
      is fully consistent with the direct experimental evidence.
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        confocal microscope images from BiFC assay and transient transfection of both GLUT1-FLAG
        or GLUT3-FLAG and NEMEP-HA vectors into mESCs show the colocalization of GLUT1 and GLUT3
        with NEMEP on the cell membrane

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35810171
  review:
    summary: >-
      This annotation reflects the physical interaction between NEMEP and SLC2A1/GLUT1
      (with UniProtKB:P17809), validated by co-immunoprecipitation and mass spectrometry
      (PMID:35810171). However, 'protein binding' is uninformative; the interaction is
      better captured by the more specific term 'transmembrane transporter binding'
      (GO:0044325) which is already annotated, or ideally by 'transporter activator
      activity' (GO:0141109) since NEMEP functionally activates glucose transporter
      activity.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too generic and uninformative per curation
      guidelines. The biologically meaningful interaction with GLUT1 is already captured by
      the more specific 'transmembrane transporter binding' (GO:0044325) annotation with the
      same evidence and reference. Removing to avoid redundancy with the more informative term.
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        Co-immunoprecipitation (co-IP) studies validated that both GLUT1 and GLUT3 do physically
        interact with NEMEP

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:35810171
  review:
    summary: >-
      This annotation reflects the physical interaction between NEMEP and SLC2A3/GLUT3
      (with UniProtKB:P32037), validated by co-immunoprecipitation and mass spectrometry
      (PMID:35810171). As with the GLUT1 interaction above, 'protein binding' is
      uninformative and the interaction is already captured by the more specific
      'transmembrane transporter binding' annotation.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too generic per curation guidelines. The
      biologically meaningful interaction with GLUT3 is already captured by the more specific
      'transmembrane transporter binding' (GO:0044325) annotation with the same evidence and
      reference. Removing to avoid redundancy.
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        Co-immunoprecipitation (co-IP) studies validated that both GLUT1 and GLUT3 do physically
        interact with NEMEP

- term:
    id: GO:0044325
    label: transmembrane transporter binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000107
  review:
    summary: >-
      This IEA annotation is transferred from an experimentally verified ortholog annotation
      via Ensembl Compara. NEMEP physically interacts with glucose transporters GLUT1 and
      GLUT3, which are transmembrane transporters (PMID:35810171). While the annotation is
      correct, NEMEP does more than bind transporters - it activates their activity.
    action: MODIFY
    reason: >-
      While transmembrane transporter binding is accurate, NEMEP functions as a transporter
      activator rather than a mere binding partner. It binds GLUT1 and GLUT3 and enhances
      their glucose transport activity (PMID:35810171). The term 'transporter activator
      activity' (GO:0141109) more precisely captures this molecular function. Consistent
      with the MODIFY action on the experimentally validated IPI annotations for the same
      term.
    proposed_replacement_terms:
    - id: GO:0141109
      label: transporter activator activity

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:35810171
  review:
    summary: >-
      Direct experimental evidence for plasma membrane localization from confocal microscopy
      and BiFC assays showing NEMEP colocalizes with GLUT1/GLUT3 on the cell membrane
      (PMID:35810171). UniProt also annotates this as cell membrane with evidence at protein
      level.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is a core aspect of NEMEP function. As a single-pass
      transmembrane micropeptide, it resides in the plasma membrane where it interacts with
      glucose transporters GLUT1 and GLUT3 to facilitate glucose uptake. This is directly
      demonstrated by imaging experiments in PMID:35810171.
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        confocal microscope images from BiFC assay and transient transfection of both GLUT1-FLAG
        or GLUT3-FLAG and NEMEP-HA vectors into mESCs show the colocalization of GLUT1 and GLUT3
        with NEMEP on the cell membrane

- term:
    id: GO:0010828
    label: positive regulation of D-glucose transmembrane transport
  evidence_type: IMP
  original_reference_id: PMID:35810171
  review:
    summary: >-
      NEMEP overexpression increases glucose consumption by ~30% and glucose transporter
      activity as measured by Glucose Uptake-Glo assays (PMID:35810171). Conversely, Nemep
      KO EBs show significant reductions in glucose uptake. NEMEP promotes glucose uptake
      likely through physical interactions with GLUT1 and GLUT3, as mutants that cannot
      bind these transporters fail to enhance glucose uptake.
    action: ACCEPT
    reason: >-
      This is a core function of NEMEP. The positive regulation of glucose transport is
      supported by multiple complementary experimental approaches: CRISPRa overexpression
      showing increased glucose consumption/uptake, knockout showing decreased glucose
      uptake, Seahorse metabolic analysis showing increased glycolysis, and demonstration
      that mutants unable to bind GLUT1/GLUT3 fail to promote glucose uptake
      (PMID:35810171).
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        overexpression of NEMEP resulted in a ~30% increase in glucose consumption as well as
        a ~60% increases in lactate excretion
    - reference_id: PMID:35810171
      supporting_text: >-
        the expression of WT NEMEP but not TMD-deletion NEMEP or H51-F57-deletion NEMEP in
        mESCs overexpressing GLUT1 or GLUT3 resulted in significantly higher glucose uptake
        compared to the GLUT1 or GLUT3 overexpressing mESCs

- term:
    id: GO:0044325
    label: transmembrane transporter binding
  evidence_type: IPI
  original_reference_id: PMID:35810171
  review:
    summary: >-
      NEMEP physically interacts with SLC2A1/GLUT1 (with UniProtKB:P17809) as demonstrated by pull-down/mass
      spectrometry, co-immunoprecipitation, BiFC, and endogenous co-IP from NEMEP-3xFLAG
      knock-in mESCs (PMID:35810171). The interaction requires the NEMEP transmembrane domain
      and C-terminal residues H51-F57. This is a well-validated physical interaction with a
      transmembrane transporter.
    action: MODIFY
    reason: >-
      While transmembrane transporter binding is accurate, the function of NEMEP goes beyond
      mere binding: it activates glucose transporter activity. NEMEP promotes GLUT1-mediated
      glucose uptake through physical interaction, and mutants that cannot bind GLUT1 fail to
      enhance glucose uptake. The term 'transporter activator activity' (GO:0141109) more
      precisely captures NEMEP's molecular function of binding to and increasing the activity
      of glucose transporters.
    proposed_replacement_terms:
    - id: GO:0141109
      label: transporter activator activity
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        Co-immunoprecipitation (co-IP) studies validated that both GLUT1 and GLUT3 do physically
        interact with NEMEP
    - reference_id: PMID:35810171
      supporting_text: >-
        the expression of WT NEMEP but not TMD-deletion NEMEP or H51-F57-deletion NEMEP in
        mESCs overexpressing GLUT1 or GLUT3 resulted in significantly higher glucose uptake
        compared to the GLUT1 or GLUT3 overexpressing mESCs

- term:
    id: GO:0044325
    label: transmembrane transporter binding
  evidence_type: IPI
  original_reference_id: PMID:35810171
  review:
    summary: >-
      NEMEP physically interacts with SLC2A3/GLUT3 (with UniProtKB:P32037) as demonstrated by pull-down/mass
      spectrometry, co-immunoprecipitation, BiFC, and endogenous co-IP from NEMEP-3xFLAG
      knock-in mESCs (PMID:35810171). The interaction requires the NEMEP transmembrane domain
      and C-terminal residues H51-F57.
    action: MODIFY
    reason: >-
      As with the GLUT1 interaction, NEMEP does not merely bind GLUT3 but activates its
      glucose transporter activity. The term 'transporter activator activity' (GO:0141109)
      more precisely captures this functional interaction.
    proposed_replacement_terms:
    - id: GO:0141109
      label: transporter activator activity
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        Co-immunoprecipitation (co-IP) studies validated that both GLUT1 and GLUT3 do physically
        interact with NEMEP
    - reference_id: PMID:35810171
      supporting_text: >-
        NEMEP's boosting glucose uptake likely through interactions with the known glucose
        transporters GLUT1 and GLUT3

- term:
    id: GO:0048382
    label: mesendoderm development
  evidence_type: IMP
  original_reference_id: PMID:35810171
  review:
    summary: >-
      NEMEP is essential for mesendoderm differentiation. Nemep KO mESCs show dramatically
      impaired expression of mesendoderm lineage-determining transcription factors (Gsc,
      Mixl1, T, Eomes, Foxa2, Sox17) during EB differentiation (PMID:35810171). Chimeric
      embryo experiments at E7.5 showed that Nemep-/- cells fail to express mesendoderm
      markers FOXA2 and T. Interestingly, NEMEP is not required for ectoderm
      differentiation, indicating specificity for the mesendoderm lineage.
    action: ACCEPT
    reason: >-
      Mesendoderm development is a core biological process for NEMEP. Multiple lines of
      evidence demonstrate this: frameshift KO impairs mesendoderm LDTF expression, promoter
      KO shows reduced mesendoderm gene expression by transcriptomics, chimeric embryos
      confirm in vivo requirement for mesendoderm specification, and the effect is specific
      (ectoderm differentiation is unaffected). The mechanism links to NEMEP's role in
      promoting glucose uptake needed for mesendoderm differentiation energy requirements.
    supported_by:
    - reference_id: PMID:35810171
      supporting_text: >-
        The absence of NEMEP in EBs dramatically impaired the expression of well-known
        mesendoderm LDTFs including Gsc, Mixl1, T, Eomes, Foxa2, and Sox17
    - reference_id: PMID:35810171
      supporting_text: >-
        These chimeric embryo experiments strongly support that NEMEP is necessary for
        mesendoderm specification

