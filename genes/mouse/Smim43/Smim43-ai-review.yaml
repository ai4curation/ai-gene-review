      transporters GLUT1 and GLUT3
  - reference_id: PMID:35810171
    supporting_text: >-
      the expression of WT NEMEP but not TMD-deletion NEMEP or H51-F57-deletion NEMEP in
      mESCs overexpressing GLUT1 or GLUT3 resulted in significantly higher glucose uptake
