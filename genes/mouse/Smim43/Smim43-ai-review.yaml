core_functions:
- molecular_function:
    id: GO:0141109
    label: transporter activator activity
  description: >-
    NEMEP/Smim43 is a single-pass transmembrane micropeptide that physically interacts with
    glucose transporters GLUT1 (SLC2A1) and GLUT3 (SLC2A3) and activates their glucose
    transport activity. The interaction requires NEMEP's transmembrane domain and C-terminal
    residues H51-F57. Overexpression of NEMEP increases glucose transporter activity, glucose
    consumption, and glycolytic flux, while mutants that cannot bind GLUT1/GLUT3 fail to
    enhance glucose uptake. This transporter activator function supports the energy demands
    of mesendoderm differentiation during early embryonic development.
