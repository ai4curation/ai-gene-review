suggested_questions:
- question: Which ERK1 annotations should remain on Mapk3 when phenotypes are largely buffered
    by ERK2?
- question: Are nuclear import and compartment-specific ERK1 signaling mature enough for more
    specific GO annotation extensions?
suggested_experiments:
- description: Test ERK1-specific and ERK2-specific rescue in Mapk3/Mapk1 perturbation backgrounds
    across nuclear, cytosolic, and membrane-associated ERK reporters.
  hypothesis: ERK1 has partially redundant catalytic function but distinct localization/dynamics
    that determine a subset of Mapk3-specific annotations.
  experiment_type: Isoform-specific genetic rescue and live ERK biosensors
