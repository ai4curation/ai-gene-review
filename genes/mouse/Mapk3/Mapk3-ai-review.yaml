id: Q63844
gene_symbol: Mapk3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Mapk3 encodes ERK1/p44 MAPK, a CMGC-family proline-directed serine/threonine
  protein kinase in the ERK1/2 branch of the RAS-RAF-MEK-ERK cascade. ERK1 is activated by
  MEK-mediated dual phosphorylation of the TEY activation-loop motif and phosphorylates many
  cytosolic and nuclear substrates selected by proline-directed motifs, D-motif/CD-site and
  DEF/FRS docking. ERK1 and ERK2 are closely related but not fully interchangeable in mouse;
  therefore direct kinase and ERK cascade terms are core, while developmental, immune, autophagy,
  neuronal, and stress-response phenotypes are curated as context-specific outputs.
