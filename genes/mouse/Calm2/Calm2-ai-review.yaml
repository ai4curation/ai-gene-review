    supporting_text: Progression through G1 and mitosis was affected by changes in CaM levels.
  - reference_id: UniProtKB:P0DP27
    supporting_text: Together with CCP110 and centrin, is involved in a genetic pathway that regulates
      the centrosome cycle and progression through cytokinesis.
proposed_new_terms: []
suggested_questions:
  - question: Which mouse calmodulin locus supplies the calmodulin protein detected at specialized
      neuronal compartments where rat Calm1/2/3 currently share the same annotations?
  - question: Can orthology-transfer rules for ISO annotations be tightened for identical-protein
      paralog families such as Calm1/Calm2/Calm3 to avoid locus-specific over-transfer?
suggested_experiments:
  - description: Use endogenous locus-specific tagging or targeted proteomics to measure Calm1,
      Calm2, and Calm3 contributions in presynaptic terminals, myelin, and cardiomyocytes.
    hypothesis: Specialized neuronal and glial localizations currently transferred by ISO reflect
      locus-specific expression differences more than unique protein chemistry.
    experiment_type: Endogenous tagging and quantitative proteomics
  - description: Perform promoter-aware rescue experiments in Calm2 knockout neurons and cardiomyocytes
      with each calmodulin paralog to separate protein-level interchangeability from locus-specific
      regulation.
    hypothesis: The encoded proteins will be largely interchangeable biochemically, but rescue
      strength will depend on the regulatory context of each locus.
    experiment_type: Genetic rescue under native or promoter-swapped expression
