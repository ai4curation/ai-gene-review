id: P0DP27
gene_symbol: Calm2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Calmodulin-2 is one of three mouse calmodulin genes that encode the same 149 aa calcium sensor
  protein. Calm2 contributes to broadly conserved calmodulin activities including calcium binding, calcium-dependent
  regulation of ion channels and exchangers, activation of calmodulin-responsive kinases and phosphatases,
  and spindle/centrosome functions during cell division. Because Calm1, Calm2, and Calm3 encode identical
  proteins but differ in gene regulation, many fine-grained ISO annotations transferred from rat calmodulin
  paralogs are best treated as non-core or over-annotated for the Calm2 locus.
