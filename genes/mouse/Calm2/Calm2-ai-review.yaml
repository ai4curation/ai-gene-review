core_functions:
- description: Primary intracellular calcium sensor that binds calcium through four EF-hand motifs and
    converts calcium binding into target regulation.
  molecular_function:
    id: GO:0005509
    label: calcium ion binding
  locations:
  - id: GO:0005829
    label: cytosol
  directly_involved_in:
  - id: GO:0005513
    label: detection of calcium ion
  supported_by:
  - reference_id: UniProtKB:P0DP27
    supporting_text: Calmodulin acts as part of a calcium signal transduction pathway by mediating the
      control of a large number of enzymes, ion channels, aquaporins and other proteins through calcium-binding.
- description: Regulates calcium channels and exchangers, including ryanodine receptors and NCKX4, to
    tune calcium release and calcium export.
  molecular_function:
    id: GO:0005246
    label: calcium channel regulator activity
  locations:
  - id: GO:0034704
    label: calcium channel complex
  directly_involved_in:
  - id: GO:0010880
    label: regulation of release of sequestered calcium ion into cytosol by sarcoplasmic reticulum
  - id: GO:0060315
    label: negative regulation of ryanodine-sensitive calcium-release channel activity
  supported_by:
  - reference_id: PMID:33199372
    supporting_text: Calmodulin bound to NCKX4 under basal conditions and suppressed NCKX4 activation
      in a time-dependent manner.
  - reference_id: UniProtKB:P0DP27
    supporting_text: Mediates calcium-dependent inactivation of CACNA1C and regulates RYR2 calcium-release
      channel activity.
- description: Activates calmodulin-responsive kinases and phosphatases to propagate calcium-dependent
    signaling.
  molecular_function:
    id: GO:0043539
    label: protein serine/threonine kinase activator activity
  locations:
  - id: GO:0005829
    label: cytosol
  directly_involved_in:
  - id: GO:0097720
    label: calcineurin-mediated signaling
  supported_by:
  - reference_id: UniProtKB:P0DP27
    supporting_text: Among the enzymes stimulated by the calmodulin-calcium complex are protein kinases
      and phosphatases.
- description: Participates in centrosome and spindle functions required for cytokinesis and cell-cycle
    progression.
  molecular_function:
    id: GO:0019901
    label: protein kinase binding
  locations:
  - id: GO:0005813
    label: centrosome
  - id: GO:0000922
    label: spindle pole
  directly_involved_in:
  - id: GO:0032465
    label: regulation of cytokinesis
  - id: GO:0000086
    label: G2/M transition of mitotic cell cycle
  supported_by:
