id: P47738
gene_symbol: Aldh2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Aldh2 encodes mitochondrial aldehyde dehydrogenase (EC 1.2.1.3), a homotetrameric
  NAD+-dependent enzyme that oxidizes short-chain aliphatic and aromatic aldehydes to
  their corresponding carboxylic acids. Its primary physiological role is catalyzing
  the second step of ethanol metabolism, converting acetaldehyde to acetate in the
  mitochondrial matrix. Aldh2 is also required for clearance of cytotoxic formaldehyde
  and lipid peroxidation-derived aldehydes such as 4-hydroxynonenal. The enzyme is
  regulated by SIRT3-mediated deacetylation, and its activity protects against
  aldehyde-induced cellular damage and oxidative stress.
existing_annotations:
# === IDA / IMP annotations (direct experimental evidence in mouse) ===
- term:
    id: GO:0004029
    label: aldehyde dehydrogenase (NAD+) activity
  evidence_type: IDA
  original_reference_id: PMID:3996732
  review:
    summary: Direct enzymatic assay of purified mouse mitochondrial ALDH isozyme AHD-5 (=Aldh2) demonstrated
      aldehyde dehydrogenase activity with very low Km for acetaldehyde (0.2 µM), confirming it as the
      high-affinity mitochondrial acetaldehyde-oxidizing enzyme.
    action: ACCEPT
    reason: Core enzymatic function directly demonstrated by purification and kinetic characterization.
    supported_by:
    - reference_id: PMID:3996732
      supporting_text: AHD-5 exhibited a low Km value with acetaldehyde of 0.2 microM.
- term:
    id: GO:0005759
    label: mitochondrial matrix
  evidence_type: IDA
  original_reference_id: PMID:3996732
  review:
    summary: Aldh2 (AHD-5) was purified from mouse liver mitochondrial extracts, directly demonstrating
      mitochondrial localization.
    action: ACCEPT
    reason: Core subcellular localization directly demonstrated by subcellular fractionation and enzyme purification.
    supported_by:
    - reference_id: PMID:3996732
      supporting_text: Aldehyde dehydrogenase isozymes (AHD-1 and AHD-5) have been isolated in a highly purified
        state from extracts of mouse liver mitochondria.
- term:
    id: GO:0006068
    label: ethanol catabolic process
  evidence_type: IMP
  original_reference_id: PMID:19356968
  review:
    summary: ALDH2 knockout mice showed significantly higher blood ethanol and acetaldehyde levels and
      lower blood acetate levels after ethanol dosing, confirming Aldh2 is required for normal ethanol
      catabolism (acetaldehyde to acetate conversion).
    action: ACCEPT
    reason: Core biological process directly demonstrated by knockout mouse phenotype.
    supported_by:
    - reference_id: PMID:19356968
      supporting_text: We found that blood acetate levels in ALDH2 KO mice were slightly lower than those
        in wild type (WT), whereas EtOH and AcH levels in ALDH2 KO were significantly higher than those
        in WT
- term:
    id: GO:1903179
    label: regulation of dopamine biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:26711020
  review:
    summary: The paper measured extracellular dopamine levels in Aldh2-KO mouse dorsal striatum by
      microdialysis after acetaldehyde perfusion, not dopamine biosynthesis per se. Acetaldehyde decreased
      extracellular DA in KO but not WT mice, but this is an indirect consequence of acetaldehyde
      accumulation due to Aldh2 loss, not a direct role of Aldh2 in dopamine biosynthesis regulation.
    action: MARK_AS_OVER_ANNOTATED
    reason: The observed effect on dopamine levels is an indirect consequence of acetaldehyde accumulation
      in Aldh2-deficient mice, not a direct enzymatic or regulatory function of Aldh2 in dopamine
      biosynthesis. The paper measured extracellular levels, not biosynthetic rate.
- term:
    id: GO:1905627
    label: regulation of serotonin biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:26711020
  review:
    summary: Similarly to the dopamine annotation, the paper showed acetaldehyde decreased extracellular
      5-HT in Aldh2-KO but not WT mice. This reflects indirect neurotoxic effects of acetaldehyde
      accumulation, not a direct role of Aldh2 in serotonin biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: Indirect consequence of acetaldehyde accumulation in knockout mice, not a direct function
      of Aldh2 in serotonin biosynthesis regulation.
# === IPI annotation ===
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:21720390
  review:
    summary: The paper showed ALDH2 is a direct SIRT3 substrate whose deacetylation increases
      acetaminophen toxic-metabolite binding and enzyme inactivation. While the physical interaction
      with SIRT3 is real, the generic protein binding term is uninformative per curation guidelines.
    action: REMOVE
    reason: Per curation guidelines, protein binding (GO:0005515) is uninformative. The interaction
      reflects ALDH2 being a SIRT3 deacetylase substrate, which is better captured by annotations
      on SIRT3 itself. No specific binding activity of ALDH2 is demonstrated.
    supported_by:
    - reference_id: PMID:21720390
      supporting_text: We show that mitochondrial deacetylase SIRT3(-/-) mice are protected from
        acetaminophen hepatotoxicity, that mitochondrial aldehyde dehydrogenase 2 is a direct SIRT3
        substrate, and that its deacetylation increases acetaminophen toxic-metabolite binding and
        enzyme inactivation
