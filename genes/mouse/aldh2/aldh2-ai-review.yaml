references:
- id: UniProtKB:P47738
  title: UniProtKB entry for mouse Aldh2/mitochondrial aldehyde dehydrogenase
  findings:
  - statement: Aldh2 is a mitochondrial matrix aldehyde dehydrogenase with EC 1.2.1.3 activity.
    supporting_text: 'CATALYTIC ACTIVITY: Reaction=an aldehyde + NAD(+) + H2O = a carboxylate + NADH
      + 2 H(+); EC=1.2.1.3'
  - statement: Aldh2 acts in the final step of ethanol degradation.
    supporting_text: 'PATHWAY: Alcohol metabolism; ethanol degradation; acetate from ethanol: step
      2/2.'
  - statement: Aldh2 is required for cellular formaldehyde clearance and localizes to the mitochondrial
      matrix.
    supporting_text: >-
      Required for clearance of cellular formaldehyde, a cytotoxic and carcinogenic metabolite
      that induces DNA damage. SUBCELLULAR LOCATION: Mitochondrion matrix.
- id: file:mouse/aldh2/aldh2-deep-research-falcon.md
  title: Falcon deep research report for mouse Aldh2
  findings:
  - statement: Falcon verifies the target as mouse Aldh2/UniProt P47738 and summarizes the core
      function as mitochondrial NAD+-dependent oxidation of acetaldehyde and other aldehydes.
    supporting_text: Mouse **Aldh2** (UniProt P47738) encodes **mitochondrial aldehyde dehydrogenase
      2 (ALDH2)**, an NAD\(^+\)-dependent aldehyde-oxidizing enzyme that catalyzes conversion of
      **acetaldehyde to acetate/acetic acid** and also detoxifies multiple **reactive lipid-derived
      aldehydes** (notably **4-hydroxynonenal (4-HNE)** and **acrolein**).
  - statement: Falcon places the core activity in mitochondria and summarizes the main physiological
      ethanol and reactive-aldehyde substrates.
    supporting_text: ALDH2 is described as the **second enzyme in oxidative alcohol metabolism**,
      converting **acetaldehyde to acetic acid**, and is also capable of oxidizing lipid aldehydes
      including **acrolein (ACR), 4-HNE, and MDA**.
