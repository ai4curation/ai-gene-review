- id: PMID:3996732
  title: 'Mouse mitochondrial aldehyde dehydrogenase isozymes: purification and molecular
    properties.'
  findings:
  - statement: Purified two mitochondrial ALDH isozymes from mouse liver. AHD-5 (=Aldh2)
      has very low Km for acetaldehyde (0.2 µM), confirming it as the primary high-affinity
      acetaldehyde-oxidizing enzyme. Both isozymes are dimers with distinct kinetic properties.
- id: PMID:12693930
  title: 'Crystal structure of eta-crystallin: adaptation of a class 1 aldehyde dehydrogenase
    for a new role in the eye lens.'
  findings:
  - statement: Crystal structure of eta-crystallin (class 1 ALDH) reveals a well-ordered
      NAD binding site conserved across ALDH classes 1 and 2, providing structural basis
      for NAD binding annotation of ALDH2.
- id: PMID:14651853
  title: Integrated analysis of protein composition, tissue diversity, and gene regulation
    in mouse mitochondria.
  findings:
  - statement: Proteomic survey detected Aldh2 in mitochondria from mouse brain, heart,
      kidney, and liver, confirming mitochondrial localization across multiple tissues.
- id: PMID:18614015
  title: A mitochondrial protein compendium elucidates complex I disease biology.
  findings:
  - statement: MitoCarta compendium identified Aldh2 as a mitochondrial protein by mass
      spectrometry across 14 mouse tissues, further confirming mitochondrial localization.
- id: PMID:19356968
  title: Ethanol metabolism in ALDH2 knockout mice--blood acetate levels.
  findings:
  - statement: ALDH2 knockout mice showed significantly higher blood ethanol and acetaldehyde
      and lower blood acetate after ethanol dosing, directly demonstrating Aldh2 is required
      for normal ethanol catabolism via acetaldehyde oxidation to acetate.
- id: PMID:21720390
  title: SIRT3-dependent deacetylation exacerbates acetaminophen hepatotoxicity.
  findings:
  - statement: ALDH2 is a direct SIRT3 substrate. SIRT3-mediated deacetylation of ALDH2
      increases binding of acetaminophen toxic metabolites and enzyme inactivation, linking
      ALDH2 post-translational regulation to xenobiotic hepatotoxicity.
- id: PMID:26711020
  title: 'Ethanol and acetaldehyde differentially alter extracellular dopamine and
    serotonin in Aldh2-knockout mouse dorsal striatum: A reverse microdialysis study.'
  findings:
  - statement: In Aldh2-KO mice, acetaldehyde perfusion into dorsal striatum decreased
      extracellular dopamine and serotonin levels, while this effect was absent in WT mice.
      This demonstrates indirect neurotransmitter effects of acetaldehyde accumulation due
      to Aldh2 deficiency.
