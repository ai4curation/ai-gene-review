    label: urate catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Uox participates in urate catabolism by catalyzing urate oxidation.
    action: ACCEPT
    reason: Urate oxidation is an early step in urate degradation, consistent 
      with Uox function.
    supported_by:
    - reference_id: PMID:16462750
      supporting_text: two proteins encoded by mouse genes catalyze two 
        consecutive steps following urate oxidation to 5-hydroxyisourate (HIU)
    - reference_id: file:mouse/Uox/Uox-uniprot.txt
      supporting_text: >-
        PATHWAY: Purine metabolism; urate degradation; (S)-allantoin from urate:
        step 1/3.
    - reference_id: file:mouse/Uox/Uox-deep-research-falcon.md
      supporting_text: >-
        Falcon places Uox downstream of xanthine dehydrogenase/oxidase in
        mammalian purine catabolism, where peroxisomal Uox oxidizes urate to
        5-hydroxyisourate.
