proposed_new_terms: []
suggested_questions:
- question: >-
    What fraction of endogenous mouse liver Uox activity is mitochondrial under
    normal, fasted, or SIRT5-perturbed conditions, compared with the peroxisomal
    pool?
  experts:
  - urate metabolism biochemists
  - peroxisome and mitochondrial proteomics experts
- question: >-
    Should the MGI annotations to specific upstream nucleoside, nucleotide, and
    xanthine catabolic processes be retired or replaced by urate catabolic
    process for Uox?
  experts:
  - GO biological process curators
  - mouse genome annotation curators
suggested_experiments:
- experiment_type: Endogenous localization and activity fractionation
  description: >-
    Quantitatively fractionate mouse liver peroxisomes, mitochondria, and cytosol
    under fed and fasted conditions, measuring endogenous Uox protein,
    peroxisomal and mitochondrial marker purity, and urate oxidase activity in
    each fraction.
  hypothesis: >-
    Most endogenous Uox activity resides in peroxisomes, with any mitochondrial
    pool representing a smaller and condition-dependent non-core localization.
- experiment_type: Purine pathway specificity curation assay
  description: >-
    In Uox-null and rescued mouse hepatocytes, trace labeled urate, xanthine,
    inosine, and AMP into 5-hydroxyisourate/allantoin-pathway products while
    assaying xanthine oxidase separately.
  hypothesis: >-
    Uox loss specifically blocks urate-to-5-hydroxyisourate conversion and does
    not directly impair upstream nucleoside, nucleotide, or xanthine catabolic
    reactions except through pathway accumulation.
