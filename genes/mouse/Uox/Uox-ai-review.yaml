id: P25688
gene_symbol: Uox
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Uox encodes mouse uricase/urate oxidase (EC 1.7.3.3), a uricase-family enzyme
  that oxidizes urate to 5-hydroxyisourate in the urate degradation branch of
  purine catabolism. UniProt describes the reaction as urate + oxygen + water
  producing 5-hydroxyisourate and hydrogen peroxide, and the Falcon literature
  review summarizes structural and evolutionary evidence for a cofactor-independent
  urate oxidase reaction. The conserved primary cellular site is the peroxisome,
  with additional UniProt-cited evidence for a liver mitochondrial pool; broad
  upstream nucleoside/nucleotide catabolic-process annotations are over-extensions
  from the pathway context rather than direct Uox functions.
existing_annotations:
