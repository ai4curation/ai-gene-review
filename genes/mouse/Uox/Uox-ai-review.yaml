  - reference_id: PMID:16462750
    supporting_text: >-
      The two proteins encoded by mouse genes catalyze two consecutive steps
      following urate oxidation to 5-hydroxyisourate (HIU).
  - reference_id: PMID:3200253
    supporting_text: >-
      fatty acyl-CoA oxidase and urate oxidase both of which were indicated as
