references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic annotation transfers urate oxidase activity, urate catabolic
      process, purine nucleobase catabolic process, and peroxisome annotations
      from conserved uricase orthologs.
    supporting_text: >-
      GOA IBA records cite PANTHER uricase orthologs and mouse/rat/zebrafish
      supporting entities for Uox.
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: >-
      Keyword mapping supports a broad oxidoreductase annotation, but the more
      informative molecular function for Uox is urate oxidase activity.
    supporting_text: >-
      GOA maps the UniProt oxidoreductase keyword to GO:0016491 for Uox.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular 
    Location vocabulary mapping, accompanied by conservative changes to GO terms
    applied by UniProt
  findings:
  - statement: >-
      UniProt subcellular-location mapping supports peroxisome and mitochondrion
      annotations for mouse Uox.
    supporting_text: >-
      GOA maps UniProtKB-SubCell peroxisome and mitochondrion entries to Uox.
- id: GO_REF:0000096
  title: Automated transfer of experimentally-verified manual GO annotation data
    to mouse-rat orthologs
  findings:
  - statement: >-
      Orthology transfer supports the same urate oxidase activity, urate
      catabolic process, and peroxisome terms that are directly supported by
      mouse evidence.
    supporting_text: >-
      GOA ISO records transfer experimentally verified rat uricase annotations
      to mouse Uox.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined automated annotation supports urate oxidase activity and urate
      catabolic process; the broader purine nucleobase metabolic-process term is
      retained as non-core.
    supporting_text: >-
      GOA IEA records cite InterPro, Rhea, EC, ARBA, UniPathway, and UniProt
      keyword mappings for Uox.
- id: file:mouse/Uox/Uox-uniprot.txt
  title: UniProtKB record for mouse Uox (P25688)
  findings:
  - statement: >-
      Uox catalyzes oxidation of urate to 5-hydroxyisourate with oxygen and
      water, producing hydrogen peroxide.
    supporting_text: >-
      FUNCTION: Catalyzes the oxidation of uric acid to 5-hydroxyisourate, which
      is further processed to form (S)-allantoin.
    reference_section_type: RESULTS
  - statement: >-
      UniProt places Uox in urate degradation and annotates peroxisome and
      mitochondrion localization.
    supporting_text: >-
      PATHWAY: Purine metabolism; urate degradation; (S)-allantoin from urate:
      step 1/3. SUBCELLULAR LOCATION: Peroxisome. Mitochondrion.
    reference_section_type: RESULTS
- id: file:mouse/Uox/Uox-deep-research-falcon.md
  title: Falcon deep research report for mouse Uox
  findings:
  - statement: >-
      Falcon synthesizes mouse Uox as a uricase-family enzyme whose core
      reaction is cofactor-independent urate oxidation to 5-hydroxyisourate.
    supporting_text: >-
      Uox catalyzes the oxidation of uric acid to 5-hydroxyisourate using
      molecular oxygen, producing hydrogen peroxide as the reduced product of O2.
    reference_section_type: RESULTS
  - statement: >-
      Falcon emphasizes peroxisomal hepatic localization as the conserved
      primary site for mammalian uricase.
    supporting_text: >-
      In terrestrial vertebrates, including rodents, uricase resides in
      peroxisomes and forms a core peroxisomal crystalloid in hepatocytes.
    reference_section_type: RESULTS
  - statement: >-
      Falcon uses knockout and comparative literature to support Uox as a major
      determinant of systemic urate homeostasis.
    supporting_text: >-
      Uox knockout mice develop severe hyperuricemia and early lethality unless
      rescued, reinforcing Uox's essential role in controlling systemic urate.
    reference_section_type: RESULTS
- id: PMID:11461119
  title: Peroxisome proliferator-activated receptor alpha-responsive genes 
    induced in the newborn but not prenatal liver of peroxisomal fatty acyl-CoA 
    oxidase null mice.
  findings:
  - statement: >-
      Uox is among PPARalpha-responsive peroxisome-related liver genes induced
      after birth in fatty acyl-CoA oxidase-null mice.
    supporting_text: >-
      High levels of expression of PPARalpha-responsive genes in the liver
      commenced on the day of birth and persisted throughout the postnatal
      period.
    reference_section_type: ABSTRACT
- id: PMID:14651853
  title: Integrated analysis of protein composition, tissue diversity, and gene 
    regulation in mouse mitochondria.
  findings:
  - statement: >-
      A high-throughput mitochondrial proteome survey reported mouse tissue
      mitochondrial proteins and underlies the HDA mitochondrion annotation.
    supporting_text: >-
      We performed a proteomic survey of mitochondria from mouse brain, heart,
      kidney, and liver and combined the results with existing gene annotations.
    reference_section_type: ABSTRACT
- id: PMID:16462750
  title: Completing the uric acid degradation pathway through phylogenetic 
    comparison of whole genomes.
  findings:
  - statement: >-
      The uric acid degradation pathway proceeds from urate oxidation to
      5-hydroxyisourate and then through two downstream mouse enzymes to
      allantoin.
    supporting_text: >-
      The two proteins encoded by mouse genes catalyze two consecutive steps
      following urate oxidation to 5-hydroxyisourate (HIU).
    reference_section_type: ABSTRACT
- id: PMID:3200253
  title: On the compartmentalization of catalase, fatty acyl-CoA oxidase and 
    urate oxidase in mammalian livers, and the influence of clofibrate treatment
    on this microlocalization.
  findings:
  - statement: >-
      Digitonin extraction indicates mammalian liver urate oxidase is closely
      associated with the peroxisomal compartment.
    supporting_text: >-
      Fatty acyl-CoA oxidase and urate oxidase both were indicated as showing a
      closer association with the peroxisomal compartment than catalase.
    reference_section_type: ABSTRACT
- id: PMID:4207016
  title: Developmental changes of adenosine deaminase, xanthine oxidase, and 
    uricase in mouse tissues.
  findings:
  - statement: >-
      The study separately assessed adenosine deaminase, xanthine oxidase, and
      uricase in mouse tissues, supporting uricase activity while not making Uox
      a xanthine oxidase.
    supporting_text: >-
      Developmental changes of adenosine deaminase, xanthine oxidase, and
      uricase in mouse tissues.
    reference_section_type: ABSTRACT
- id: Reactome:R-MMU-9033925
  title: Pex5l binds Acox1 or Uox
  findings:
  - statement: >-
      Reactome describes Pex5l binding monomeric Uox, consistent with peroxisome
      import context rather than stable cytosolic residence as a core location.
    supporting_text: >-
      Pex5l binds monomeric Acox1 and monomeric Uox in preference to dimeric
      Acox1 and tetrameric Uox.
    reference_section_type: RESULTS
core_functions:
- description: >-
    Catalyzes the first committed urate-degradation step in mouse purine
    catabolism by oxidizing urate to 5-hydroxyisourate with oxygen, generating
    hydrogen peroxide and feeding downstream conversion to (S)-allantoin. This
    urate oxidase activity is the specific core molecular function; broader
    oxidoreductase and upstream nucleotide/nucleoside catabolic-process terms
    are less informative or over-extended.
