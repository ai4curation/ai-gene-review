description: JAK1 is an intracellular receptor-associated non-receptor tyrosine kinase required for many
  cytokine receptor pathways, including type I/type II interferon and interleukin signaling. It phosphorylates
  receptor complexes and STAT transcription factors to propagate JAK-STAT signaling.
