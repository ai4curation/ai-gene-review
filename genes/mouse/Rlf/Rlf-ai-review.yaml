core_functions:
- description: >-
    INSL3 functions as a secreted peptide hormone of the insulin superfamily, produced primarily
    by testicular Leydig cells. It binds to RXFP2 (LGR8), a leucine-rich repeat-containing
    G protein-coupled receptor, to mediate gubernaculum development and testicular descent
    during fetal life. This is the core evolved function of INSL3.
  molecular_function:
    id: GO:0005179
    label: hormone activity
  directly_involved_in:
  - id: GO:0008584
    label: male gonad development
  - id: GO:0007193
    label: adenylate cyclase-inhibiting G protein-coupled receptor signaling pathway
  - id: GO:2000018
    label: regulation of male gonad development
  locations:
  - id: GO:0005576
    label: extracellular region
  supported_by:
    - reference_id: PMID:10319319
      supporting_text: "male mice homozygous for a targeted deletion of the Insl3 locus exhibit bilateral cryptorchidism with free moving testes and genital ducts. These malformations are due to failure of gubernaculum development during embryogenesis"
    - reference_id: PMID:10391220
      supporting_text: "[Insl3 knockout causes bilateral cryptorchidism confirming essential role in testicular descent]"

suggested_questions:
- question: >-
    What is the precise signaling cascade downstream of INSL3-RXFP2 in gubernacular cells?
- question: >-
    Does INSL3 have cAMP-stimulatory (Gs) signaling in any context, or is Gi-mediated inhibition
    the sole mode? This would resolve the conflicting annotations for adenylate cyclase inhibition
    vs positive regulation of cAMP/PKA.
- question: >-
    What is the functional significance of INSL3 expression in ovarian theca cells in mouse?
- question: >-
    Are the cell proliferation and anti-apoptotic effects of INSL3 physiologically relevant or
    artifacts of in vitro overexpression studies?

suggested_experiments:
- hypothesis: >-
    INSL3 has post-developmental functions beyond gubernaculum development.
  description: >-
    Conditional knockout of Insl3 in adult Leydig cells to test post-developmental roles
    independent of the embryonic gubernaculum function.
  experiment_type: genetic
- hypothesis: >-
    INSL3-RXFP2 signaling involves exclusively Gi-mediated cAMP inhibition, not Gs activation.
  description: >-
    Reporter assays measuring cAMP levels in gubernacular cells upon INSL3 stimulation to
    resolve the Gi vs Gs signaling question and clarify whether the positive regulation of
    cAMP/PKA annotation is warranted.
  experiment_type: biochemical
- hypothesis: >-
    INSL3 from ovarian theca cells has a direct role in mouse oocyte maturation.
  description: >-
    Ovary-specific Insl3 deletion to test the reported oocyte maturation phenotype in mouse,
    independent of testicular functions.
  experiment_type: genetic
