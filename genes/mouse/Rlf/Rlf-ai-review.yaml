id: O09107
gene_symbol: Rlf
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Rlf (also known as Insl3, Insulin-like 3, or relaxin-like factor) encodes a secreted peptide
  hormone of the insulin superfamily that is produced primarily by testicular Leydig cells. The
  protein is synthesized as a preproprotein containing a signal peptide, B chain, C peptide, and
  A chain, and is processed into a mature heterodimer of B and A chains linked by two interchain
  disulfide bonds and one intrachain disulfide bond (UniProt O09107). INSL3 signals through RXFP2
  (relaxin family peptide receptor 2, also known as LGR8/GREAT), a leucine-rich repeat-containing
  G protein-coupled receptor that inhibits adenylate cyclase via Gi coupling and also activates
  cAMP/PKA signaling through alternative pathways. The critical physiological role of INSL3 is
  induction of gubernaculum development during fetal life, which is essential for the first
  (transabdominal) phase of testicular descent. Targeted disruption of Insl3 in mice causes
  bilateral cryptorchidism due to failure of gubernaculum development (PMID:10319319,
  PMID:10391220). INSL3 acts in an androgen-independent manner to induce gubernacular outgrowth,
  while androgen-mediated regression of the cranial suspensory ligament occurs independently
  (PMID:10319319). INSL3 is also expressed in theca cells of the postnatal ovary, where it has
  been implicated in oocyte maturation, though this is less well characterized in mouse. UniProt
  keywords include Hormone and Secreted.

existing_annotations:
# ============================================================
# IBA annotations (phylogenetic inference via PANTHER)
# ============================================================
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      INSL3 is a secreted peptide hormone. The IBA annotation to extracellular space is
      phylogenetically well supported, as all members of the insulin/relaxin superfamily are
      secreted. However, GO:0005615 (extracellular space) is now marked as obsolete in GO. The
      appropriate replacement is GO:0005576 (extracellular region) or a more specific child term.
    action: MODIFY
    reason: >-
      The localization of INSL3 to the extracellular space is correct -- UniProt annotates it as
      "Secreted" (UniProt O09107). However, GO:0005615 is obsolete. The annotation should be
      updated to use the non-obsolete replacement term GO:0005576 (extracellular region).
    proposed_replacement_terms:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: GO_REF:0000033
        supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family PTHR10423]"

- term:
    id: GO:0007193
    label: adenylate cyclase-inhibiting G protein-coupled receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      INSL3 signals through RXFP2, a GPCR that couples to Gi proteins to inhibit adenylate cyclase.
      This IBA annotation from PANTHER phylogenetic inference is well supported by the known signaling
      mechanism of the INSL3-RXFP2 axis. Note that the annotation is on the ligand (INSL3) rather
      than the receptor, which is appropriate for the "involved_in" qualifier as the ligand participates
      in the signaling pathway.
    action: ACCEPT
    reason: >-
      RXFP2 (the INSL3 receptor) couples to Gi proteins leading to inhibition of adenylate cyclase.
      This is the primary signaling mode described for INSL3-RXFP2, consistent with the Reactome
      pathway "Relaxin receptors" (R-MMU-444821) annotated in UniProt. INSL3 as a ligand is
      appropriately annotated to this signaling pathway. The IBA is phylogenetically sound across
      the relaxin/insulin-like family.
    supported_by:
      - reference_id: GO_REF:0000033
        supporting_text: "Annotation inferences using phylogenetic trees [IBA from PANTHER family PTHR10423]"

# ============================================================
# IEA annotations (electronic inference)
# ============================================================
- term:
    id: GO:0005179
    label: hormone activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      INSL3 is a bona fide peptide hormone. This IEA annotation is inferred from InterPro domain
      mappings (IPR016179, IPR022352) that classify it in the insulin-like superfamily. UniProt
      lists "Hormone" as a keyword for this protein. INSL3 is produced by Leydig cells and acts
      on distant target tissues (gubernaculum) via the RXFP2 receptor, fulfilling the definition
      of a hormone.
    action: ACCEPT
    reason: >-
      Hormone activity is a core molecular function of INSL3. The protein is secreted by Leydig
      cells and acts on the gubernaculum in a paracrine/endocrine manner through RXFP2 receptor
      binding. UniProt states it "May be a trophic hormone with a role in testicular descent in
      fetal life" (UniProt O09107). The IEA inference from InterPro domains is correct here.
    supported_by:
      - reference_id: GO_REF:0000002
        supporting_text: "Gene Ontology annotation through association of InterPro records with GO terms [InterPro:IPR016179, InterPro:IPR022352]"

- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      INSL3 is a secreted peptide hormone that localizes to the extracellular region. This IEA
      annotation is inferred from InterPro domain (IPR016179) and UniProt subcellular location
      annotation (SL-0243, Secreted). UniProt explicitly states "Secreted" for this protein.
    action: ACCEPT
    reason: >-
      Extracellular region is the correct cellular component for a secreted hormone. UniProt
      annotates the subcellular location as "Secreted" (UniProt O09107). The IEA inference is
      well supported and consistent with the biology of INSL3 as a secreted peptide.
    supported_by:
      - reference_id: GO_REF:0000120
        supporting_text: "Combined Automated Annotation using Multiple IEA Methods [InterPro:IPR016179, UniProtKB-SubCell:SL-0243]"

# ============================================================
# ISO annotations (inferred from sequence orthology)
# ============================================================
- term:
    id: GO:0001556
    label: oocyte maturation
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat (RGD:620117, rat Insl3). INSL3 is expressed
      in theca cells of the postnatal ovary and has been implicated in oocyte maturation via
      RXFP2 signaling. However, the core function of INSL3 is testicular descent, not oocyte
      maturation. The role in oocyte maturation is a secondary function primarily demonstrated
      in species other than mouse.
    action: KEEP_AS_NON_CORE
    reason: >-
      INSL3 expression in theca cells and a role in oocyte maturation have been described, but
      this is not the core evolved function of INSL3. The primary phenotype of Insl3 knockout
      mice is bilateral cryptorchidism (PMID:10319319), not ovarian defects. Oocyte maturation
      represents a secondary, non-core function. The ISO transfer from rat is reasonable but
      this should not be presented as a core annotation.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0002020
    label: protease binding
  evidence_type: ISO
  original_reference_id: GO_REF:0000119
  review:
    summary: >-
      This ISO annotation is transferred from human INSL3 (UniProtKB:P51460). The protease binding
      annotation likely reflects the proteolytic processing of the INSL3 preproprotein (signal
      peptide cleavage and C peptide excision by proprotein convertases). However, "protease binding"
      as a molecular function annotation is not very informative for a substrate -- it describes being
      acted upon rather than an intrinsic activity. This is a low-value annotation for understanding
      INSL3 function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Protease binding for a secreted preproprotein that undergoes proteolytic processing is
      uninformative. Many secreted proteins with signal peptides and propeptides could be annotated
      to protease binding based on their processing. This does not represent a biologically
      meaningful function of INSL3 but rather a generic feature of its maturation pathway. The
      annotation adds noise rather than insight.
    supported_by:
      - reference_id: GO_REF:0000119
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-human orthologs [from UniProtKB:P51460]"

- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      Duplicate annotation of extracellular space, this time via ISO from rat ortholog
      (RGD:620117). As noted above, GO:0005615 is obsolete and should be replaced with
      GO:0005576 (extracellular region). The localization itself is correct for a secreted
      hormone.
    action: MODIFY
    reason: >-
      GO:0005615 is obsolete. The correct localization is GO:0005576 (extracellular region),
      which is already covered by the IEA annotation. This ISO annotation is redundant with
      the IEA but uses the obsolete term. Should be updated to the replacement term.
    proposed_replacement_terms:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0007193
    label: adenylate cyclase-inhibiting G protein-coupled receptor signaling pathway
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      Duplicate annotation of adenylate cyclase-inhibiting GPCR signaling, this time via ISO
      from rat ortholog (RGD:620117). This is consistent with the IBA annotation for the same
      term and accurately reflects INSL3 signaling through RXFP2 coupled to Gi.
    action: ACCEPT
    reason: >-
      The INSL3-RXFP2 signaling axis involves Gi-mediated inhibition of adenylate cyclase. This
      ISO annotation from rat is consistent with the IBA annotation and the known biology.
      Duplicates with different evidence codes are acceptable.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0008284
    label: positive regulation of cell population proliferation
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat Insl3 (RGD:620117). INSL3 has been reported
      to positively regulate cell proliferation in some contexts (e.g., gubernacular cells,
      germ cells). However, this is a very generic term that does not capture the specific
      biological context. Furthermore, seeing both positive and negative regulation of cell
      proliferation annotated to the same gene product is a curation red flag suggesting
      context-dependent effects that should not both be core annotations.
    action: KEEP_AS_NON_CORE
    reason: >-
      Positive regulation of cell proliferation is a generic downstream effect that may occur
      in specific tissue contexts (e.g., gubernacular bulb growth). It does not represent the
      core molecular or biological function of INSL3. The co-existence of both positive
      (GO:0008284) and negative (GO:0008285) regulation of cell proliferation annotations
      suggests context-dependent pleiotropic effects rather than a core function.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat Insl3 (RGD:620117). Having both positive and
      negative regulation of cell proliferation annotated to the same gene suggests context-dependent
      effects. For a secreted hormone like INSL3, downstream proliferative effects are indirect
      and tissue-context dependent, not a core function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Negative regulation of cell proliferation is a generic downstream effect. INSL3 is a
      signaling hormone whose primary role is gubernaculum development and testicular descent.
      Cell proliferation effects are secondary and context-dependent. This annotation does not
      add meaningful insight into the core function of INSL3.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0010634
    label: positive regulation of epithelial cell migration
  evidence_type: ISO
  original_reference_id: GO_REF:0000119
  review:
    summary: >-
      This ISO annotation is transferred from human INSL3 (UniProtKB:P51460). Positive regulation
      of epithelial cell migration is likely a downstream effect observed in specific experimental
      contexts (e.g., wound healing assays with relaxin family peptides). This is not a well-established
      core function of INSL3.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Positive regulation of epithelial cell migration is not a recognized core function of INSL3.
      The primary physiological role of INSL3 is gubernaculum development and testicular descent
      (PMID:10319319, PMID:10391220). Epithelial cell migration effects are likely indirect
      downstream consequences observed in cell culture systems and do not represent the evolved
      function of this hormone.
    supported_by:
      - reference_id: GO_REF:0000119
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-human orthologs [from UniProtKB:P51460]"

- term:
    id: GO:0043066
    label: negative regulation of apoptotic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat Insl3 (RGD:620117). INSL3 has been reported
      to have anti-apoptotic effects in germ cells, which may be relevant to its trophic role
      in the testis. However, anti-apoptotic activity is a generic downstream effect and not the
      core evolved function of INSL3.
    action: KEEP_AS_NON_CORE
    reason: >-
      Anti-apoptotic effects may be a secondary function of INSL3 in the context of Leydig cell
      or germ cell survival, consistent with UniProt's note that it "Seems to play a role in
      testicular function" (UniProt O09107). However, the primary phenotype of Insl3 knockout
      is cryptorchidism due to gubernaculum failure (PMID:10319319), not increased apoptosis.
      This is a non-core, pleiotropic effect.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0048471
    label: perinuclear region of cytoplasm
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat Insl3 (RGD:620117). Perinuclear localization
      likely reflects the ER/Golgi processing of the INSL3 preproprotein before secretion. For a
      secreted protein, transient perinuclear localization in the secretory pathway is expected but
      does not represent the functional localization of the mature protein.
    action: KEEP_AS_NON_CORE
    reason: >-
      INSL3 is a secreted protein that transits through the ER and Golgi (perinuclear region)
      during biosynthesis. The functional localization is extracellular. Perinuclear localization
      represents the biosynthetic intermediate rather than the site of function. UniProt annotates
      the subcellular location as "Secreted" (UniProt O09107), not perinuclear. This annotation
      is technically not wrong but represents biosynthetic transit rather than functional localization.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

- term:
    id: GO:0090303
    label: positive regulation of wound healing
  evidence_type: ISO
  original_reference_id: GO_REF:0000119
  review:
    summary: >-
      This ISO annotation is transferred from human INSL3 (UniProtKB:P51460). Positive regulation
      of wound healing is not a recognized physiological function of INSL3. This is more characteristic
      of relaxin (RLN1/RLN2) family members rather than INSL3 specifically. The annotation likely
      reflects overly broad inference from relaxin family biology applied to INSL3.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Wound healing regulation is a well-established function of relaxin (RLN1/RLN2) but not of
      INSL3. While INSL3 shares structural similarity with relaxins, it signals through a different
      receptor (RXFP2 vs RXFP1) and has distinct biological roles centered on gubernaculum
      development and testicular descent (PMID:10319319). This annotation likely represents
      over-generalization from relaxin family biology to INSL3.
    supported_by:
      - reference_id: GO_REF:0000119
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-human orthologs [from UniProtKB:P51460]"

- term:
    id: GO:0141163
    label: positive regulation of cAMP/PKA signal transduction
  evidence_type: ISO
  original_reference_id: GO_REF:0000096
  review:
    summary: >-
      This ISO annotation is transferred from rat Insl3 (RGD:620117). INSL3 signaling through
      RXFP2 involves complex cAMP modulation. RXFP2 couples primarily to Gi to inhibit adenylate
      cyclase, but can also activate cAMP through alternative Gs-coupling or other mechanisms
      depending on context. The relationship between INSL3-RXFP2 and cAMP is not straightforwardly
      "positive regulation" -- the primary coupling is inhibitory (Gi). This annotation is
      potentially contradictory with the adenylate cyclase-inhibiting annotation.
    action: UNDECIDED
    reason: >-
      The co-existence of adenylate cyclase-inhibiting GPCR signaling (GO:0007193) and positive
      regulation of cAMP/PKA signal transduction (GO:0141163) for the same ligand is confusing.
      RXFP2 is primarily Gi-coupled (inhibiting cAMP), but some studies report biphasic cAMP
      responses or context-dependent Gs coupling. Without access to the specific experimental
      evidence supporting this annotation in rat, it is difficult to determine whether this reflects
      a genuine secondary signaling mode or a curation error. Marking as UNDECIDED pending review
      of the primary literature supporting the rat annotation.
    supported_by:
      - reference_id: GO_REF:0000096
        supporting_text: "Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs [from RGD:620117]"

# ============================================================
# IMP annotations (inferred from mutant phenotype)
# ============================================================
- term:
    id: GO:2000018
    label: regulation of male gonad development
  evidence_type: IMP
  original_reference_id: PMID:10319319
  review:
    summary: >-
      This IMP annotation is based on Zimmermann et al. 1999, which demonstrated that targeted
      disruption of Insl3 causes bilateral cryptorchidism due to failure of gubernaculum
      development. The Insl3 knockout males exhibit "bilateral cryptorchidism with free moving
      testes and genital ducts" and "malformations are due to failure of gubernaculum development
      during embryogenesis" (PMID:10319319). This clearly demonstrates that INSL3 regulates
      male gonad development, specifically the positional development (descent) of the testes.
    action: ACCEPT
    reason: >-
      Regulation of male gonad development is a core function of INSL3. The knockout phenotype
      of bilateral cryptorchidism directly demonstrates that INSL3 is required for normal testicular
      descent, which is an essential aspect of male gonad development. PMID:10319319 provides direct
      experimental evidence via gene disruption.
    supported_by:
      - reference_id: PMID:10319319
        supporting_text: "male mice homozygous for a targeted deletion of the Insl3 locus exhibit bilateral cryptorchidism with free moving testes and genital ducts. These malformations are due to failure of gubernaculum development during embryogenesis"

- term:
    id: GO:0001701
    label: in utero embryonic development
  evidence_type: IMP
  original_reference_id: PMID:10319319
  review:
    summary: >-
      This IMP annotation is based on the Insl3 knockout study (PMID:10319319). The cryptorchidism
      phenotype results from failure of gubernaculum development during embryogenesis, establishing
      that INSL3 acts during in utero embryonic development. However, "in utero embryonic development"
      is a very broad term. INSL3 is not a general embryonic development factor; it has a very specific
      role in gubernaculum induction during fetal testicular descent.
    action: KEEP_AS_NON_CORE
    reason: >-
      While INSL3 does act during embryonic development (specifically during fetal gubernaculum
      development), the term "in utero embryonic development" is overly broad. The gene's role is
      specifically in gubernaculum development and testicular descent, not general embryonic
      development. The more specific annotation to regulation of male gonad development
      (GO:2000018) better captures the actual function. This annotation is kept as non-core since
      it is not wrong but is too general to be informative.
    supported_by:
      - reference_id: PMID:10319319
        supporting_text: "male mice homozygous for a targeted deletion of the Insl3 locus exhibit bilateral cryptorchidism with free moving testes and genital ducts. These malformations are due to failure of gubernaculum development during embryogenesis"

- term:
    id: GO:0008584
    label: male gonad development
  evidence_type: IMP
  original_reference_id: PMID:10319319
  review:
    summary: >-
      This IMP annotation is based on the Insl3 knockout study (PMID:10319319). The knockout
      causes bilateral cryptorchidism due to gubernaculum failure. Male gonad development is an
      appropriate term for this phenotype, as testicular descent is a key component of male gonad
      development. The qualifier "acts_upstream_of_or_within" (from GOA) is appropriate since INSL3
      acts upstream of gubernaculum development to facilitate testicular descent.
    action: ACCEPT
    reason: >-
      Male gonad development is a core biological process for INSL3. The knockout phenotype of
      bilateral cryptorchidism (PMID:10319319) directly demonstrates a role in male gonad
      development, specifically the process of testicular descent which depends on
      gubernaculum outgrowth. INSL3 acts in an androgen-independent manner to induce this
      process. PMID:11342953 further confirmed the role of INSL3 in gubernacular development
      and testicular descent.
    supported_by:
      - reference_id: PMID:10319319
        supporting_text: "male mice homozygous for a targeted deletion of the Insl3 locus exhibit bilateral cryptorchidism with free moving testes and genital ducts. These malformations are due to failure of gubernaculum development during embryogenesis"

# ============================================================
# NEW annotations (suggested additions)
# ============================================================
- term:
    id: GO:0051428
    label: peptide hormone receptor binding
  evidence_type: ISS
  original_reference_id: PMID:10391220
  review:
    summary: >-
      INSL3 binds to RXFP2 (LGR8/GREAT), a G protein-coupled peptide hormone receptor. This is
      a core molecular function that is currently missing from the annotation set. UniProt states
      INSL3 "Is a ligand for LGR8 receptor (By similarity)" (UniProt O09107). The term
      GO:0051428 (peptide hormone receptor binding) accurately captures the ligand-receptor
      binding function of INSL3.
    action: NEW
    reason: >-
      The existing annotations include hormone activity (GO:0005179) but lack a specific
      receptor-binding molecular function term. INSL3 is a peptide hormone that binds to RXFP2,
      and peptide hormone receptor binding is the most appropriate specific MF term available.
      This fills an important gap in the annotation of INSL3 molecular function. PMID:10391220
      (Nef and Parada 1999) describes the function of INSL3 in the context of its receptor
      signaling, and UniProt notes it "Is a ligand for LGR8 receptor."
    supported_by:
      - reference_id: PMID:10391220
        supporting_text: "Cryptorchidism in mice mutant for Insl3 [INSL3 is ligand for LGR8]"

