id: Q9CWH4
gene_symbol: Rec114
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Meiotic recombination protein REC114 is an essential component of the
  MCD recombinosome complex (together with MEI4 and IHO1/CCDC36) that is
  required for programmed DNA double-strand break (DSB) formation by SPO11
  during meiotic recombination. REC114 contains an N-terminal pleckstrin
  homology (PH) domain and a C-terminal domain that mediates direct
  interaction with MEI4. REC114 localizes in discrete foci on the axes of
  meiotic chromosomes, with foci number highest at leptonema and decreasing
  at zygonema. REC114 also directly interacts with ANKRD31, which regulates
  the spatiotemporal patterning of DSB formation, and with TOPOVIBL, a
  subunit of the TOPOVIL catalytic complex. Rec114-null mice are sterile
  due to severely impaired meiotic DSB formation, leading to defects in
  both spermatogenesis and oogenesis. REC114 is expressed primarily in
  testis and embryonic ovary.
existing_annotations:
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:36396648
  review:
    summary: >-
      This annotation reflects the physical interaction between REC114 and
      TOPOVIBL demonstrated in PMID:36396648. While the interaction is real
      and functionally significant, the term 'protein binding' is
      uninformative. The interaction is specifically with TOPOVIBL, a
      subunit of the meiotic DSB catalytic complex.
    action: REMOVE
    reason: >-
      The term 'protein binding' (GO:0005515) is too vague and
      uninformative. The specific interaction with TOPOVIBL is better
      captured by existing process annotations (meiotic DNA DSB formation)
      and complex membership. Per curation guidelines, protein binding
      should be avoided in favor of more informative MF terms.
    supported_by:
    - reference_id: PMID:36396648
      supporting_text: >-
        we show that REC114 is a direct partner of TOPOVIBL, and identify
        their conserved interacting domains by structural analysis
- term:
    id: GO:0005694
    label: chromosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProt subcellular location mapping. REC114
      is known to localize to meiotic chromosome axes in discrete foci
      (PMID:30569039). The term 'chromosome' is broadly correct.
    action: ACCEPT
    reason: >-
      REC114 localizes to chromosome axes during meiosis, forming discrete
      foci that co-localize with MEI4 on axes of meiotic chromosomes
      (PMID:30569039). The IEA annotation is consistent with experimental
      IDA evidence from the same gene. While a more specific CC term for
      meiotic chromosome axis could be considered, 'chromosome' is
      acceptable as a general localization term.
    supported_by:
    - reference_id: PMID:30569039
      supporting_text: >-
        REC114, MEI4, and IHO1 co-localize on the axis of meiotic
        chromosomes
- term:
    id: GO:0042138
    label: meiotic DNA double-strand break formation
  evidence_type: IDA
  original_reference_id: PMID:36396648
  review:
    summary: >-
      PMID:36396648 demonstrates that the TOPOVIBL-REC114 interaction is
      required for efficient meiotic DSB formation. Point mutations in
      TOPOVIBL that disrupt its binding to REC114 strongly reduce DSB
      activity genome-wide in oocytes.
    action: ACCEPT
    reason: >-
      This is the core function of REC114. The study provides direct
      evidence that REC114 interaction with the TOPOVIL catalytic complex
      is required for DSB formation, establishing REC114 as a key member
      of the DSB machinery.
    supported_by:
    - reference_id: PMID:36396648
      supporting_text: >-
        these results suggest that REC114 is a key member of the TOPOVIL
        catalytic complex, and that the REC114/TOPOVIBL interaction ensures
        the efficiency and timing of DSB activity
