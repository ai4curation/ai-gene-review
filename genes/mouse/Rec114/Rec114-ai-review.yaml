- term:
    id: GO:0007283
    label: spermatogenesis
  evidence_type: IDA
  original_reference_id: PMID:30569039
  review:
    summary: >-
      Rec114-null male mice show severe spermatogenesis defects: smaller
      tubule diameter, absence of haploid cells (spermatids and
      spermatozoa), and sterility (PMID:30569039). However, these defects
      are downstream consequences of failed meiotic DSB formation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The spermatogenesis defect is a downstream consequence of the
      primary meiotic DSB formation deficiency. REC114 is not a
      spermatogenesis-specific factor; rather, its absence disrupts meiosis
      which then causes spermatogenesis failure. This is a non-core
      annotation reflecting the phenotypic consequence rather than the
      direct molecular function.
    supported_by:
    - reference_id: PMID:30569039
      supporting_text: >-
        Spermatogenesis was altered in Rec114-/- adult male mice, as
        indicated by the presence of major defects in testis tubule
        development compared with wild-type (Rec114+/+) mice
- term:
    id: GO:0042138
    label: meiotic DNA double-strand break formation
  evidence_type: IDA
  original_reference_id: PMID:30569039
  review:
    summary: >-
      PMID:30569039 provides the definitive demonstration that mouse
      REC114 is essential for meiotic DSB formation. Rec114-null mice show
      a 16-fold and 11-fold reduction in gamma-H2AX signal in
      spermatocytes and oocytes, respectively. DMC1, RAD51, and RPA2
      repair foci are strongly reduced.
    action: ACCEPT
    reason: >-
      This is the primary and most thoroughly documented core function of
      REC114. The study uses a null allele and comprehensive cytological
      analysis to demonstrate that REC114 is essential for meiotic DSB
      formation, phenocopying Spo11, Mei4, and Iho1 knockouts.
    supported_by:
    - reference_id: PMID:30569039
      supporting_text: >-
        Detection of γH2AX revealed that in Rec114−/− mice, meiotic DSBs
        were absent or strongly reduced in both spermatocytes and oocytes,
        whereas chromosome axes formed normally, based on SYCP3 detection
- term:
    id: GO:0048477
    label: oogenesis
  evidence_type: IDA
  original_reference_id: PMID:30569039
  review:
    summary: >-
      Rec114-null females show severely impaired oogenesis with strongly
      reduced primordial follicle numbers at 2 weeks postpartum and near
      absence at 8 weeks (PMID:30569039). However, like spermatogenesis,
      this is a downstream consequence of failed meiotic DSB formation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The oogenesis defect is a downstream consequence of the primary
      meiotic DSB formation deficiency. REC114 is not an
      oogenesis-specific factor; rather, its absence disrupts meiosis
      which then causes oogenesis failure. This is a non-core annotation
      reflecting the phenotypic consequence rather than the direct
      molecular function.
    supported_by:
    - reference_id: PMID:30569039
      supporting_text: >-
        In ovaries from Rec114-/- mice, oogenesis was significantly
        affected, as indicated by the strongly reduced number of
        primordial follicles at 2 wk postpartum and their near absence
        at 8 wk
