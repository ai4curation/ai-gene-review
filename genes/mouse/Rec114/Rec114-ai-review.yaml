- term:
    id: GO:0006310
    label: DNA recombination
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Proposed new annotation. REC114 functions in meiotic DNA
      recombination by promoting DSB formation, which is the initiating
      step of meiotic recombination. UniProt lists DNA recombination as a
      keyword for this protein, and the IEA annotation from UniProt KW
      mapping is appropriate.
    action: NEW
    reason: >-
      This IEA annotation from UniProt keyword mapping (DNA recombination)
      is listed in the UniProt GO cross-references but was not in the GOA
      file. The annotation is appropriate as meiotic DSB formation is the
      initiating event of meiotic recombination. GO:0042138 is a child of
      GO:0006310 in the GO hierarchy.
