- term:
    id: GO:0005694
    label: chromosome
  evidence_type: IDA
  original_reference_id: PMID:30569039
  review:
    summary: >-
      Direct experimental evidence from immunofluorescence shows REC114
      localizes in discrete foci on the axes of meiotic chromosomes
      (PMID:30569039). The number of foci is highest at leptonema and
      decreases at zygonema.
    action: ACCEPT
    reason: >-
      Well-supported by immunostaining data. REC114 forms axis-associated
      foci on meiotic chromosomes. This is a core aspect of REC114
      function, as chromosome axis localization is required for its role
      in promoting meiotic DSB formation.
    supported_by:
    - reference_id: PMID:30569039
      supporting_text: >-
