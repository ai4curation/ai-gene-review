  findings: []
core_functions:
- molecular_function:
    id: GO:0003674
    label: molecular_function
  description: >-
    REC114 does not have a known independent enzymatic activity. Its
    molecular function is mediated through protein-protein interactions
    within the MCD recombinosome complex (with MEI4 and IHO1), with
    ANKRD31, and with TOPOVIBL. REC114 acts as a scaffolding component
    that promotes SPO11-dependent meiotic DSB formation on chromosome
    axes. No specific GO molecular function term currently captures this
    scaffolding role.
  supported_by:
  - reference_id: PMID:30569039
    supporting_text: >-
      MEI4, REC114 and IHO1 form a complex
  - reference_id: PMID:36396648
    supporting_text: >-
      REC114 is a direct partner of TOPOVIBL
suggested_questions:
- question: >-
    Does REC114 have any catalytic activity of its own, or does it function
    purely as a structural scaffolding component of the DSB machinery?
    The PH domain structure and multiple protein-protein interactions
    suggest a scaffolding role, but whether REC114 contributes
    enzymatically to DSB formation remains unclear.
- question: >-
    What is the precise stoichiometry and architecture of the MCD
    recombinosome complex (IHO1-MEI4-REC114)? While all three proteins
    co-immunoprecipitate and co-localize, the molecular architecture
    of the assembled complex is not fully resolved.
suggested_experiments:
- description: >-
    Reconstitution of the full MCD recombinosome complex (IHO1-MEI4-REC114)
    with recombinant proteins to determine stoichiometry and architecture
    by cryo-EM or cross-linking mass spectrometry. This would reveal the
    molecular organization of the DSB-promoting complex and how it
    interfaces with TOPOVIBL/SPO11.
