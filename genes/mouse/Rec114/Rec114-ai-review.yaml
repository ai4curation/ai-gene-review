references:
- id: PMID:20551173
  title: >-
    Functional conservation of Mei4 for meiotic DNA double-strand break
    formation from yeasts to mice.
  findings:
  - statement: >-
      Identified REC114 as an evolutionarily conserved protein required for
      meiotic DSB formation. Demonstrated direct interaction between mouse
      REC114 and MEI4 by yeast two-hybrid assay. Showed REC114 is
      expressed in testis and embryonic ovary.
    supporting_text: >-
      mouse MEI4 and REC114 proteins interact directly, and we identify
      conserved motifs as required for this interaction
- id: PMID:27723721
  title: >-
    Meiotic DNA break formation requires the unsynapsed chromosome
    axis-binding protein IHO1 (CCDC36) in mice.
  findings:
  - statement: >-
      Identified IHO1 (CCDC36) as a direct interactor of HORMAD1 that
      is essential for meiotic DSB formation. Demonstrated that IHO1,
      REC114, and MEI4 assemble chromatin-bound recombinosomes (MCD
      complex) on meiotic chromosome axes. IHO1 interacts with REC114
      in yeast two-hybrid assays.
    supporting_text: >-
      IHO1 and conserved SPO11-auxiliary proteins MEI4 and REC114 assemble
      chromatin-bound recombinosomes that are predicted activators of DSB
      formation
- id: PMID:30569039
  title: >-
    Mouse REC114 is essential for meiotic DNA double-strand break formation
    and forms a complex with MEI4.
  findings:
  - statement: >-
      Definitive demonstration that mouse REC114 is essential for meiotic
      DSB formation using null allele analysis. Showed REC114 is required
      for spermatogenesis and oogenesis. Demonstrated REC114-MEI4 direct
      interaction by co-immunoprecipitation and recombinant protein
      co-purification. Determined crystal structure of REC114 PH domain.
      Showed REC114 localizes to chromosome axes in discrete foci.
    supporting_text: >-
      REC114 is essential for spermatogenesis and oogenesis
- id: PMID:31000436
  title: >-
    Mouse ANKRD31 Regulates Spatiotemporal Patterning of Meiotic
    Recombination Initiation and Ensures Recombination between X and Y
    Sex Chromosomes.
  findings:
  - statement: >-
      Identified ANKRD31 as a key component of DSB-promoting protein
      complexes. ANKRD31 interacts with REC114 and regulates the
      spatiotemporal patterning of meiotic recombination initiation.
    supporting_text: >-
      We identify ANKRD31 as a key component of complexes of
      DSB-promoting proteins that assemble on meiotic chromosome axes
- id: PMID:31003867
  title: >-
    REC114 Partner ANKRD31 Controls Number, Timing, and Location of
    Meiotic DNA Breaks.
  findings:
  - statement: >-
      Solved crystal structure of the REC114 PH domain in complex with
      ANKRD31 C-terminal tail. Demonstrated that ANKRD31 stabilizes
      REC114 localization on meiotic chromosome axes. ANKRD31 deficiency
      reduces REC114 axial foci.
    supporting_text: >-
      mouse ANKRD31 as a lynchpin governing multiple aspects of DSB
      formation
- id: PMID:36396648
  title: TOPOVIBL-REC114 interaction regulates meiotic DNA double-strand breaks.
  findings:
  - statement: >-
      Demonstrated that REC114 is a direct partner of TOPOVIBL (a subunit
      of the TOPOVIL DSB catalytic complex). Identified conserved
      interacting domains by structural analysis. Point mutations in
      TOPOVIBL that disrupt REC114 binding reduce DSB activity.
    supporting_text: >-
      REC114 is a direct partner of TOPOVIBL, and identify their conserved
      interacting domains by structural analysis
