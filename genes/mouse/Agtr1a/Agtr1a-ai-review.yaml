- description: AGTR1A binds angiotensin II as a type 1 angiotensin receptor at the plasma membrane and activates Gq/phospholipase C/calcium signaling that underlies renin-angiotensin control of vasoconstriction, renal output, aldosterone production, and blood pressure.
