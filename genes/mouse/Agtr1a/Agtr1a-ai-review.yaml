suggested_questions:
- question: Which mouse AGTR1A signaling outputs should be represented as direct receptor signaling annotations rather than downstream organismal blood-pressure or kidney phenotypes?
suggested_experiments:
- hypothesis: The clearest direct AGTR1A pathway annotation is Gq/PLC/calcium signaling downstream of angiotensin II.
  description: Measure Ang II-induced PLC activation, calcium mobilization, and ERK/Rho pathway activation in Agtr1a-null and rescued mouse cells, including antagonist controls and Agtr1b comparison.
  experiment_type: cell signaling rescue assay
