id: P29754
gene_symbol: Agtr1a
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: 'Agtr1a encodes the mouse angiotensin II type 1A receptor, a rhodopsin-family GPCR for angiotensin II. The receptor signals mainly through Gq/phospholipase C and calcium mobilization at the plasma membrane and mediates major renin-angiotensin outputs including vasoconstriction, renal sodium/water handling, aldosterone regulation, and blood-pressure control.'
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: plasma membrane is biologically consistent with the curated synthesis for Agtr1a and is supported by IBA evidence (GO_REF:0000033).
    action: ACCEPT
    reason: The term matches a direct molecular function, pathway, or location/physiological output of Agtr1a; it is specific enough to retain without replacement.
    supported_by:
    - reference_id: file:mouse/Agtr1a/Agtr1a-notes.md
      supporting_text: 'Core receptor identity: Agtr1a encodes the mouse type-1 angiotensin II receptor A, a seven-transmembrane G protein-coupled receptor whose primary molecular function is angiotensin type I receptor activity.'
- term:
    id: GO:0001822
    label: kidney development
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: kidney development is supported for Agtr1a in a tissue, developmental, trafficking, or disease-model context, but it is not the core molecular role.
    action: KEEP_AS_NON_CORE
    reason: This annotation captures a real downstream or context-specific consequence of Agtr1a activity. It should be retained as non-core so it does not obscure the primary receptor/ligand signaling function.
    supported_by:
    - reference_id: file:mouse/Agtr1a/Agtr1a-notes.md
      supporting_text: 'Mouse kidney-development evidence: Iosipiv and Schroeder report that "cultured murine UB cells express AT1 receptor protein and mRNA" and that ANG II treatment "elicits a dose-related increase in the number of cells that have primary and secondary branches"; the effect is blocked by the AT1 antagonist candesartan.'
