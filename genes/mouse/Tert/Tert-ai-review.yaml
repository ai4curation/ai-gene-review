id: O70372
gene_symbol: Tert
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Tert encodes telomerase reverse transcriptase, the catalytic protein
  subunit of the telomerase ribonucleoprotein. TERT uses the telomerase RNA template to
  synthesize telomeric TTAGGG repeats at chromosome ends, maintaining telomere length in
  proliferative and stem/progenitor contexts. Reported mitochondrial, transcriptional,
  Wnt, immune, or anti-apoptotic roles are treated as context-dependent non-canonical
  activities rather than the primary function.
existing_annotations:
  - term:
      id: GO:0003720
      label: telomerase activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: 'Supported as part of TERT''s core telomerase reverse-transcriptase activity,
        telomerase complex membership, telomeric localization, or telomere maintenance role.'
      action: ACCEPT
      reason: Core telomerase reverse transcriptase and telomere maintenance function
      supported_by:
        - reference_id: UniProt:O70372
          supporting_text: Catalytic component of the teleromerase holoenzyme complex
            whose main activity is the elongation of telomeres by acting as a reverse
            transcriptase that adds simple sequence repeats to chromosome ends by
            copying a template sequence within the RNA component of the enzyme.
        - reference_id: file:mouse/Tert/Tert-deep-research-falcon.md
          supporting_text: Mouse **Tert (UniProt O70372)** encodes the **telomerase
            reverse transcriptase**, whose primary function is to **extend telomeric
            (TTAGGG)n repeats** at chromosome ends as the catalytic core of the
            telomerase RNP.
