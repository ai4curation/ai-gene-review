id: Q91YT0
gene_symbol: Ndufv1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
aliases:
- CI-51kD
- Complex I-51kD
description: >-
  Mouse NADH dehydrogenase [ubiquinone] flavoprotein 1 (Ndufv1) is the 51 kDa core subunit of
  mitochondrial respiratory chain Complex I (NADH:ubiquinone oxidoreductase, EC 7.1.1.2). It is
  located in the N module (NADH dehydrogenase module) at the top of the hydrophilic peripheral arm
  of Complex I, where it serves as the primary catalytic subunit for NADH oxidation. Ndufv1
  contains the FMN cofactor that is the initial electron acceptor from NADH, as well as iron-sulfur
  cluster N3 (a [4Fe-4S] cluster) through which electrons are transferred along the chain of FeS
  clusters to ubiquinone. The protein is synthesized with a mitochondrial transit peptide (residues
  1-20) and localizes to the matrix side of the mitochondrial inner membrane as a peripheral
  membrane protein. Cryo-EM structures at 3.3 angstrom resolution (PMID:29915388) have resolved the
  complete structure of this subunit within mouse Complex I in both active and deactive states.
  Complex I couples electron transfer from NADH to ubiquinone with the translocation of four
  protons across the inner membrane, contributing to the proton motive force that drives ATP
  synthesis.
