# ===== BIOLOGICAL PROCESS: proton transmembrane transport =====
- term:
    id: GO:1902600
    label: proton transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      Logical inference from GO:0008137 (NADH dehydrogenase (ubiquinone) activity). Complex I
      couples electron transfer to proton translocation across the inner membrane.
    action: KEEP_AS_NON_CORE
    reason: >-
      While Complex I as a whole translocates protons, Ndufv1 is located in the hydrophilic
      peripheral arm (N module) distant from the proton-pumping membrane domain. The proton
      translocation machinery resides in the membrane-embedded ND subunits (ND2, ND4, ND5). It
      is technically correct that Ndufv1 participates in a complex that performs proton transport,
      but the subunit itself does not directly catalyze proton translocation. Keeping as non-core
      to reflect that this is a property of the whole complex rather than this specific subunit.
    supported_by:
    - reference_id: PMID:29915388
      supporting_text: >-
        It powers ATP synthesis by capturing the free energy released by electron transfer from
        NADH to ubiquinone to drive protons across the inner membrane and support the
        proton-motive force.
    - reference_id: PMID:29915388
      supporting_text: >-
        the membrane domain contains four antiporter-like units. They contain elements indicative
        of ion-transport activities, including π-bulges
