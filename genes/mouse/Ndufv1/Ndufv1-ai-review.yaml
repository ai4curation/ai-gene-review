- id: PMID:14651853
  title: Integrated analysis of protein composition, tissue diversity, and gene regulation in mouse mitochondria.
  findings:
  - statement: Ndufv1 identified in proteomic survey of mitochondria from four mouse tissues.
    supporting_text: >-
      To explore its molecular composition, we performed a proteomic survey of
      mitochondria from mouse brain, heart, kidney, and liver and combined the results
      with existing gene annotations to produce a list of 591 mitochondrial proteins,
      including 163 proteins not previously associated with this organelle.
- id: PMID:18614015
  title: A mitochondrial protein compendium elucidates complex I disease biology.
  findings:
  - statement: Ndufv1 is a known Complex I subunit in the MitoCarta compendium of 1098 mitochondrial genes.
    supporting_text: >-
      we performed mass spectrometry, GFP tagging, and
      machine learning to create a mitochondrial compendium of 1098 genes and their
      protein expression across 14 mouse tissues.
- id: PMID:23530063
  title: MCJ/DnaJC15, an endogenous mitochondrial repressor of the respiratory chain that controls metabolic alterations.
  findings:
  - statement: MCJ/DnaJC15 interacts preferentially with Complex I and negatively regulates respiratory chain activity.
    supporting_text: >-
      we identify MCJ/DnaJC15 as a distinct cochaperone
      that localizes at the mitochondrial inner membrane, where it interacts
      preferentially with complex I of the electron transfer chain. We show that MCJ
      impairs the formation of supercomplexes and functions as a negative regulator of
      the respiratory chain.
- id: PMID:29915388
  title: Cryo-EM structures of complex I from mouse heart mitochondria in two biochemically defined states.
  findings:
  - statement: 3.3 angstrom cryo-EM structure of mouse heart Complex I in active state resolved all 45 subunits including Ndufv1 (residues 30-457).
    supporting_text: >-
      The 3.3 Å resolution map contains many well-resolved features and clear side-chain
      densities (Supplementary Figure 3) that enabled confident modelling (with sidechains) of
      96% of the residues (Supplementary Table 1).
  - statement: Ndufv1 contains FMN cofactor and [4Fe-4S] cluster N3 for electron transfer from NADH.
    supporting_text: >-
      In complex I, NADH is oxidized by a flavin mononucleotide in the hydrophilic domain,
      then electrons are transferred along a chain of seven iron-sulfur (FeS) clusters to
      ubiquinone (Figure 1), bound in a long channel at the interface between the hydrophilic
      and membrane domains.
  - statement: Complex I couples electron transfer to proton translocation across the inner membrane.
    supporting_text: >-
      It powers ATP synthesis by capturing the free energy released by electron transfer from
      NADH to ubiquinone to drive protons across the inner membrane and support the
      proton-motive force.
- id: PMID:30030361
  title: Assembly of mammalian oxidative phosphorylation complexes I-V and supercomplexes.
  findings:
  - statement: Review of OXPHOS complex assembly. Complex I is the largest complex with 45 subunits including core catalytic and supernumerary subunits.
    supporting_text: >-
      The assembly of the five oxidative phosphorylation system (OXPHOS) complexes in
      the inner mitochondrial membrane is an intricate process. The human enzymes
      comprise core proteins, performing the catalytic activities, and a large number
      of 'supernumerary' subunits that play essential roles in assembly, regulation
      and stability.
- id: PMID:31536960
  title: Rewiring of the Human Mitochondrial Interactome during Neuronal Reprogramming Reveals Regulators of the Respirasome and Neurogenesis.
  findings:
  - statement: Ndufv1 interaction with RAB5IF demonstrated in mitochondrial interactome mapping.
    supporting_text: >-
      Rewiring of the Human Mitochondrial Interactome during Neuronal Reprogramming
      Reveals Regulators of the Respirasome and Neurogenesis.
- id: PMID:38575788
  title: SCAF1 drives the compositional diversity of mammalian respirasomes.
  findings:
  - statement: Cryo-EM structures of three types of mouse respirasomes resolved Complex I including Ndufv1 within supercomplexes of CI, CIII2, and CIV.
    supporting_text: >-
      using cryogenic electron microscopy, we
      demonstrate that mammalian (mouse) tissues contain three defined types of
      'respirasome', supercomplexes made of CI, CIII2 and CIV.
- id: UniProtKB:Q91YT0
  title: UniProt entry for mouse Ndufv1
  findings:
  - statement: Core subunit of Complex I containing FMN and one [4Fe-4S] cluster for electron transfer from NADH.
    supporting_text: >-
      Core subunit of the mitochondrial membrane respiratory chain
      NADH dehydrogenase (Complex I) which catalyzes electron transfer from
      NADH through the respiratory chain, using ubiquinone as an electron
      acceptor. Part of the peripheral arm of the enzyme, where the electrons
      from NADH are accepted by flavin mononucleotide (FMN) and then passed
      along a chain of iron-sulfur clusters by electron tunnelling to the
      final acceptor ubiquinone. Contains FMN, which is the initial electron
      acceptor as well as one iron-sulfur cluster.
  - statement: Localizes to mitochondrial inner membrane, matrix side, as peripheral membrane protein.
    supporting_text: >-
      SUBCELLULAR LOCATION: Mitochondrion inner membrane
  - statement: Interacts with RAB5IF.
    supporting_text: >-
      Interacts with RAB5IF
      (PubMed:31536960).
core_functions:
- description: >-
    Ndufv1 is the primary catalytic subunit of Complex I where NADH oxidation occurs. It contains
    the FMN cofactor (initial electron acceptor) and [4Fe-4S] cluster N3 that mediate electron
    transfer. As a subunit of the 45-subunit Complex I holoenzyme, Ndufv1 contributes to but
    does not independently catalyze the full NADH dehydrogenase (ubiquinone) reaction (EC 7.1.1.2),
    which also requires proton pumping by the membrane domain subunits.
  molecular_function:
    id: GO:0008137
    label: NADH dehydrogenase (ubiquinone) activity
  directly_involved_in:
  - id: GO:0006120
    label: mitochondrial electron transport, NADH to ubiquinone
  locations:
  - id: GO:0005743
    label: mitochondrial inner membrane
  in_complex:
    id: GO:0045271
    label: respiratory chain complex I
  supported_by:
  - reference_id: PMID:29915388
    supporting_text: >-
      In complex I, NADH is oxidized by a flavin mononucleotide in the hydrophilic domain,
      then electrons are transferred along a chain of seven iron-sulfur (FeS) clusters to
      ubiquinone (Figure 1), bound in a long channel at the interface between the hydrophilic
      and membrane domains.
  - reference_id: UniProtKB:Q91YT0
    supporting_text: >-
      Core subunit of the mitochondrial membrane respiratory chain
      NADH dehydrogenase (Complex I) which catalyzes electron transfer from
      NADH through the respiratory chain, using ubiquinone as an electron
      acceptor. Part of the peripheral arm of the enzyme, where the electrons
      from NADH are accepted by flavin mononucleotide (FMN) and then passed
      along a chain of iron-sulfur clusters by electron tunnelling to the
      final acceptor ubiquinone.
suggested_questions:
- question: Does Ndufv1 have any moonlighting functions independent of Complex I, or is it strictly a Complex I subunit?
- question: What is the functional significance of the post-translational modifications (acetylation, succinylation, methylation) identified on Ndufv1?
- question: Are there tissue-specific differences in Ndufv1 expression or modification that affect Complex I activity?
suggested_experiments:
- description: Targeted mutagenesis of the FMN binding site residues to confirm functional importance in mouse cells.
  hypothesis: Mutation of FMN-coordinating residues (199-247) will abolish NADH oxidation activity of Complex I.
  experiment_type: Site-directed mutagenesis
- description: Analysis of Ndufv1 PTM dynamics under different metabolic conditions (e.g., fasting vs. fed) to understand regulatory significance.
  hypothesis: Post-translational modifications at Lys-81, Lys-104, Lys-375, and Arg-257 regulate Complex I activity in a metabolic state-dependent manner.
  experiment_type: Quantitative proteomics
- description: Investigation of whether Ndufv1 is rate-limiting for Complex I assembly in mouse tissues.
  hypothesis: Ndufv1 availability limits the rate of N-module assembly into the Complex I holoenzyme.
  experiment_type: Conditional knockdown
