- id: PMID:12865426
  title: Proteomic analysis of the mouse liver mitochondrial inner membrane.
  findings:
  - statement: Ndufv1 identified by mass spectrometry from highly purified mouse liver mitochondrial inner membrane.
    supporting_text: >-
      To achieve this goal we have used a novel approach combining the use of highly purified
      mouse liver mitochondrial inner membranes, extraction of membrane proteins with organic
