# ===== BIOLOGICAL PROCESS: aerobic respiration =====
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: NAS
  original_reference_id: PMID:30030361
  review:
    summary: >-
      Non-traceable Author Statement from ComplexPortal, citing a review on assembly of OXPHOS
      complexes (Signes and Fernandez-Vizarra 2018). Aerobic respiration is a broad biological
      process that encompasses oxidative phosphorylation.
    action: KEEP_AS_NON_CORE
    reason: >-
      While technically correct that Ndufv1, as a Complex I subunit, participates in aerobic
      respiration, this term is very broad. The more specific terms GO:0006120 (mitochondrial
      electron transport, NADH to ubiquinone) and GO:0042775 (mitochondrial ATP synthesis
      coupled electron transport) better capture the specific role. Keeping as non-core since it
      is accurate but not the most informative annotation.
    supported_by:
    - reference_id: PMID:30030361
      supporting_text: >-
        The assembly of the five oxidative phosphorylation system (OXPHOS) complexes in
        the inner mitochondrial membrane is an intricate process. The human enzymes
        comprise core proteins, performing the catalytic activities, and a large number
        of 'supernumerary' subunits that play essential roles in assembly, regulation
        and stability.
# ===== BIOLOGICAL PROCESS: proton motive force-driven mitochondrial ATP synthesis =====
- term:
    id: GO:0042776
    label: proton motive force-driven mitochondrial ATP synthesis
  evidence_type: NAS
  original_reference_id: PMID:30030361
  review:
    summary: >-
      Non-traceable Author Statement from ComplexPortal. Complex I contributes to the proton
      motive force that drives ATP synthesis by ATP synthase (Complex V).
    action: KEEP_AS_NON_CORE
    reason: >-
      While Complex I generates part of the proton motive force used for ATP synthesis, Ndufv1
      itself is in the electron input module, not in the proton pumping module. Furthermore, the
      actual ATP synthesis is performed by Complex V, not Complex I. This annotation reflects
      the broader role of the OXPHOS system rather than the specific function of this subunit.
      The term is not wrong but is somewhat indirect for Ndufv1 specifically.
    supported_by:
    - reference_id: PMID:29915388
      supporting_text: >-
        It powers ATP synthesis by capturing the free energy released by electron transfer from
        NADH to ubiquinone to drive protons across the inner membrane and support the
        proton-motive force.
# ===== MOLECULAR FUNCTION: protein binding =====
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:31536960
  review:
    summary: >-
      Physical interaction with RAB5IF (Q9CQT9) demonstrated in the mitochondrial interactome
      study (Moutaoufik et al. 2019). RAB5IF was identified as a regulator of the respirasome.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      'Protein binding' (GO:0005515) is uninformative as per curation guidelines. The actual
      interaction is with RAB5IF, a regulator of respirasome assembly. A more informative
      annotation would specify the type of binding or the partner, but no more specific MF term
      is clearly applicable. The interaction itself is documented in the Complex I membership
      annotations. Since Ndufv1 is a subunit of a 45-subunit complex, it inherently binds many
      other proteins, and generic protein binding does not add useful information.
    supported_by:
    - reference_id: UniProtKB:Q91YT0
      supporting_text: >-
        Interacts with RAB5IF
        (PubMed:31536960).
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:23530063
  review:
    summary: >-
      Physical interaction with MCJ/DnaJC15 (Q78YY6) demonstrated in Hatle et al. 2013. MCJ is
      a cochaperone that localizes to the mitochondrial inner membrane and interacts
      preferentially with Complex I to negatively regulate respiratory chain activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      As above, 'protein binding' is uninformative. MCJ/DnaJC15 was shown to interact
      preferentially with Complex I and act as a negative regulator of the respiratory chain, but
      the interaction is with Complex I as a whole rather than specifically with Ndufv1. The
      generic protein binding annotation does not convey the regulatory relationship.
    supported_by:
    - reference_id: PMID:23530063
      supporting_text: >-
        we identify MCJ/DnaJC15 as a distinct cochaperone
        that localizes at the mitochondrial inner membrane, where it interacts
        preferentially with complex I of the electron transfer chain. We show that MCJ
        impairs the formation of supercomplexes and functions as a negative regulator of
        the respiratory chain.
# ===== CELLULAR COMPONENT: mitochondrion =====
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HDA
  original_reference_id: PMID:18614015
  review:
    summary: >-
      High-throughput Direct Assay from MitoCarta (Pagliarini et al. 2008). Ndufv1 was
      identified in the mitochondrial proteome by mass spectrometry and GFP tagging across 14
      mouse tissues.
    action: ACCEPT
    reason: >-
      Direct proteomic evidence of mitochondrial localization. While the more specific term
      'mitochondrial inner membrane' (GO:0005743) is also annotated, the broader mitochondrion
      term is also correct and supported by this high-quality large-scale study.
    supported_by:
    - reference_id: PMID:18614015
      supporting_text: >-
        we performed mass spectrometry, GFP tagging, and
        machine learning to create a mitochondrial compendium of 1098 genes and their
        protein expression across 14 mouse tissues.
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: HDA
  original_reference_id: PMID:14651853
  review:
    summary: >-
      High-throughput Direct Assay from Mootha et al. 2003. Proteomic survey of mitochondria
      from mouse brain, heart, kidney, and liver identified 591 mitochondrial proteins.
      There are multiple GOA entries with this evidence and reference reflecting different
      tissues or annotation events, but they are all consistent.
    action: ACCEPT
    reason: >-
      Direct proteomic evidence of mitochondrial localization across multiple mouse tissues.
      Consistent with all other localization evidence.
    supported_by:
    - reference_id: PMID:14651853
      supporting_text: >-
        To explore its molecular composition, we performed a proteomic survey of
        mitochondria from mouse brain, heart, kidney, and liver and combined the results
        with existing gene annotations to produce a list of 591 mitochondrial proteins,
        including 163 proteins not previously associated with this organelle.
# ===== NEW: mitochondrial matrix =====
- term:
    id: GO:0005759
    label: mitochondrial matrix
  evidence_type: IDA
  original_reference_id: PMID:29915388
  review:
    summary: >-
      Ndufv1 is located on the matrix side of the mitochondrial inner membrane. The cryo-EM
      structure (PMID:29915388) places it in the hydrophilic peripheral arm extending into the
      matrix. UniProt annotates this explicitly as "Peripheral membrane protein; Matrix side"
      based on PMID:38575788.
    action: NEW
    reason: >-
      Although GO:0005743 (mitochondrial inner membrane) is annotated, the more specific
      localization to the matrix side is well-supported by structural data. Ndufv1 is a
      peripheral membrane protein on the matrix face, not an integral membrane protein. This
      annotation would complement the inner membrane annotation by specifying which side.
    supported_by:
    - reference_id: UniProtKB:Q91YT0
      supporting_text: >-
        SUBCELLULAR LOCATION: Mitochondrion inner membrane
    - reference_id: PMID:29915388
      supporting_text: >-
        Respiratory complex I (NADH:ubiquinone oxidoreductase), one of the largest membrane-bound
        enzymes in the cell, is a major entry point to the electron transport chain in mammalian
        mitochondria
