- id: file:mouse/Top2a/Top2a-deep-research-falcon.md
  title: Falcon deep research report on mouse Top2a (DNA topoisomerase 2-alpha, Q01320)
  findings:
  - statement: |-
      Top2a is an ATP-dependent type IIA DNA topoisomerase that creates a transient enzyme-linked double-strand break in one DNA duplex and passes a second duplex through before religation, thereby relaxing supercoils and decatenating interlinked duplexes.
    supporting_text: |-
      **Top2a/TOP2A** is an **ATP-dependent type IIA DNA topoisomerase** that resolves topological stress by creating a **transient, enzyme-linked double-strand break** in one DNA duplex (the “gate” segment) and transporting a second duplex (the “transport” segment) through the break before **re-ligating** the DNA. This activity changes DNA topology and enables both **relaxation of supercoils** and **decatenation** (unlinking) of interlinked DNA duplexes
    reference_section_type: OTHER
  - statement: |-
      The substrate is double-stranded DNA in topologically constrained forms in vivo: supercoiled DNA from replication/transcription and catenated sister chromatids from DNA replication; the central outputs are supercoil relaxation and decatenation for chromosome segregation.
    supporting_text: |-
      Functionally, TOP2A’s substrate is **double-stranded DNA** in topologically constrained forms encountered in vivo: **supercoiled DNA** produced by replication/transcription and **catenated sister chromatids** produced by DNA replication. Its central physiological outputs are (i) **relaxation of supercoiling** and (ii) **decatenation** required for chromosome segregation
    reference_section_type: OTHER
  - statement: |-
      The catalytic cycle uses an ATPase/N-gate (ATP binding/hydrolysis controls dimer closure), a DNA-gate where cleavage/religation occurs, and a C-gate; assembly of the cleavage-religation center involves TOPRIM-mediated metal (Mg2+) coordination.
    supporting_text: |-
      The catalytic cycle is commonly described in terms of gates: an **ATPase/N-gate** (ATP binding/hydrolysis controls dimer closure), a **DNA-gate** where cleavage/religation occurs, and a **C-gate** that allows release after transport.
    reference_section_type: OTHER
  - statement: |-
      In mouse NIH3T3 cells Top2a is chromatin-associated and enriched at heterochromatin; catalytic inhibition by ICRF-193 increases its chromatin association/retention, consistent with inhibitor-induced trapping on chromatin.
    supporting_text: |-
      In mouse NIH3T3 fibroblasts, Top2α is **chromatin-associated** and described as **enriched at heterochromatin**. Importantly, **catalytic inhibition** with **ICRF-193** (a catalytic Top2 inhibitor) increases Top2α chromatin association and retention (including under high-salt extraction conditions) and reduces its mobility by FRAP, consistent with inhibitor-induced trapping on chromatin rather than free diffusion
    reference_section_type: OTHER
  - statement: |-
      Top2a expression is proliferation-coupled: low in quiescent cells, rising through S phase and peaking at G2/M, consistent with its role managing DNA topology during replication completion and mitosis.
    supporting_text: |-
      TOP2A expression is tightly linked to proliferation: it is low in quiescent cells, increases through **S phase**, and peaks during **G2/M**, consistent with its specialized role in managing DNA topology during replication completion and mitosis
    reference_section_type: OTHER
  - statement: |-
      Sister chromatid decatenation by Top2a is required for individualization and faithful segregation; catalytic inhibition can activate a decatenation/G2 checkpoint, and depletion/inhibition causes chromosome decompaction, bridges, and segregation failure.
    supporting_text: |-
      TOP2A decatenation is required to enable sister chromatid individualization and faithful segregation, and catalytic inhibition can activate a **decatenation checkpoint**/G2 arrest phenotype in cell-based contexts
    reference_section_type: OTHER
  - statement: |-
      Mouse Top2a knockout is embryonic lethal very early (arrest reported as early as the 4-8 cell stage), indicating an essential requirement during cleavage-stage development.
    supporting_text: |-
      A frequently cited mammalian genetic result is that **mouse Top2a null embryos are lethal very early**, with arrest reported **as early as the 4–8 cell stage**, supporting an essential requirement during cleavage-stage development
    reference_section_type: OTHER
