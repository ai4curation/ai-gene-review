- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: |-
      Top2a binds double-stranded DNA as its catalytic substrate, forming
      the DNA-gate where cleavage and religation occur.
    action: ACCEPT
    reason: Core topoisomerase function of TOP2A
    supported_by:
    - reference_id: file:mouse/Top2a/Top2a-deep-research-falcon.md
      supporting_text: |-
        Functionally, TOP2A’s substrate is **double-stranded DNA** in topologically constrained forms encountered in vivo: **supercoiled DNA** produced by replication/transcription and **catenated sister chromatids** produced by DNA replication.
