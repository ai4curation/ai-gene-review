id: Q01320
gene_symbol: Top2a
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Top2a (DNA topoisomerase 2-alpha) is an essential nuclear enzyme that catalyzes ATP-dependent double-strand DNA passage to resolve DNA supercoiling, decatenate sister chromatids, and unknot DNA. Required for DNA replication, chromosome condensation, and mitotic chromosome segregation. Highly expressed in proliferating cells. Target of anticancer drugs like doxorubicin and etoposide.
existing_annotations:
- term:
    id: GO:0003918
    label: DNA topoisomerase type II (double strand cut, ATP-hydrolyzing) activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      Core molecular function. Top2a is an ATP-dependent type IIA DNA
      topoisomerase that cleaves both strands of a DNA duplex, passes a
      second duplex through the transient break, and religates the DNA,
      thereby relaxing supercoils and decatenating sister chromatids.
      Strongly supported by phylogeny and by direct mouse biochemistry.
    action: ACCEPT
    reason: Core topoisomerase function of TOP2A
    supported_by:
    - reference_id: file:mouse/Top2a/Top2a-deep-research-falcon.md
      supporting_text: |-
        **Top2a/TOP2A** is an **ATP-dependent type IIA DNA topoisomerase** that resolves topological stress by creating a **transient, enzyme-linked double-strand break** in one DNA duplex (the “gate” segment) and transporting a second duplex (the “transport” segment) through the break before **re-ligating** the DNA.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      Top2a carries out its catalytic function on chromatin in the nucleus.
      Mouse-cell evidence shows Top2a is chromatin-associated and enriched at
      heterochromatin.
    action: ACCEPT
    reason: Core topoisomerase function of TOP2A
    supported_by:
    - reference_id: file:mouse/Top2a/Top2a-deep-research-falcon.md
      supporting_text: |-
        In mouse NIH3T3 fibroblasts, Top2α is **chromatin-associated** and described as **enriched at heterochromatin**.
- term:
    id: GO:0000819
    label: sister chromatid segregation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      Decatenation of replicated sister chromatids by Top2a is required for
      their individualization and faithful segregation; this is the principal
      biological process the enzyme serves.
    action: ACCEPT
    reason: Core topoisomerase function of TOP2A
    supported_by:
    - reference_id: file:mouse/Top2a/Top2a-deep-research-falcon.md
      supporting_text: |-
        TOP2A decatenation is required to enable sister chromatid individualization and faithful segregation, and catalytic inhibition can activate a **decatenation checkpoint**/G2 arrest phenotype in cell-based contexts
- term:
    id: GO:0000712
    label: resolution of meiotic recombination intermediates
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      Top2a is expressed and active during meiosis in mouse (e.g. male
      meiosis), where decatenation activity can resolve recombination-derived
      DNA interlinks. This is a context-specific, non-core process relative to
      the enzyme's central mitotic/replicative decatenation role.
    action: KEEP_AS_NON_CORE
    reason: Context-specific meiotic role, not the core molecular function
- term:
    id: GO:0030263
    label: apoptotic chromosome condensation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: |-
      Top2a contributes to chromosome condensation; involvement in the
      chromatin condensation that accompanies apoptosis is a downstream,
      context-dependent process rather than the enzyme's core function.
    action: KEEP_AS_NON_CORE
    reason: Context-dependent process, not the core molecular function
