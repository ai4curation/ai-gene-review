- id: PMID:22159717
  title: >-
    The matrisome: in silico definition and in vivo characterization by proteomics
    of normal and tumor extracellular matrices.
  findings:
  - statement: >-
      Col6a3 was detected as a core matrisome component in ECM-enriched fractions
      from murine lung and colon tissues by mass spectrometry.
    supporting_text: >-
      We present here a proteomic strategy developed to characterize the in vivo ECM composition of normal tissues and tumors using enrichment of protein extracts for ECM components and subsequent analysis by mass spectrometry.
  - statement: >-
      The study defined the matrisome as the ensemble of ECM proteins and associated
      factors, identifying over 100 ECM proteins per tissue.
    supporting_text: >-
      we have developed a bioinformatic approach to predict the in silico "matrisome" defined as the ensemble of ECM proteins and associated factors.
- id: PMID:23869615
  title: 'The expanded collagen VI family: new chains and new questions.'
  findings:
  - statement: >-
      Collagen VI assembles as heterotrimers of alpha-1(VI), alpha-2(VI), and
      alpha-3(VI) or one of the newer chains (alpha-4/5/6) in a 1:1:1 ratio.
    supporting_text: >-
      It is clear that these chains are present in collagen VI assemblages in a 1:1:1 ratio, with the assumption that α1α2α3 heterotrimers are the basic monomeric unit of collagen VI.
  - statement: >-
      The alpha-3(VI) chain has ten N-terminal VWA domains that project from the
      microfibril and likely serve as binding sites for other ECM molecules.
    supporting_text: >-
      the N-terminal globular domains of α3(VI) appear to function in the extracellular space, probably as potential binding sites for other ECM molecules
  - statement: >-
      Collagen VI tetramers are assembled intracellularly and secreted, then form
      microfibrils end-to-end in the ECM.
    supporting_text: >-
      This large complex is assembled intracellularly so that only tetrameric collagen VI is secreted from the cells. Individual tetramers then associate end-to-end to form microfibrillar structures in the extracellular matrix by an unknown mechanism.
  - statement: >-
      The alpha-3(VI) chain contains an intact Kunitz protease inhibitor domain at
      the C-terminus with potential roles in tumor biology.
    supporting_text: >-
      Interestingly, the α3(VI) chain contains an intact Kunitz inhibitor domain at the C-terminus and recent evidence suggests a role for this domain in tumor biology
  - statement: >-
      Mutations in COL6A1, COL6A2, and COL6A3 cause Bethlem myopathy and Ullrich
      congenital muscular dystrophy.
    supporting_text: >-
      Nearly 100 mutations have been described in the COL6A1, COL6A2 and COL6A3 genes that cause two types of congenital muscular dystrophies, Bethlem myopathy (BM) and Ulrich congenital muscular dystrophy (UCMD)
- id: PMID:28071719
  title: >-
    Quantitative proteomic profiling of the extracellular matrix of pancreatic
    islets during the angiogenic switch and insulinoma progression.
  findings:
  - statement: >-
      Col6a3 was detected among 120 ECM proteins quantified in pancreatic islet
      ECM fractions during insulinoma progression.
    supporting_text: >-
      In this study, we used quantitative proteomics to profile the composition of the ECM of pancreatic islets in a mouse model of insulinoma characterized by a precisely timed angiogenic switch. Out of the 120 ECM proteins quantified, 35 were detected in significantly different abundance

core_functions:
- molecular_function:
    id: GO:0005201
    label: extracellular matrix structural constituent
  description: >-
    Col6a3 is the alpha-3 chain of collagen type VI, a non-fibrillar collagen that
    forms a unique beaded microfibrillar network in the extracellular matrix. The
    alpha-3(VI) chain assembles with alpha-1(VI) and alpha-2(VI) into heterotrimers,
    which form dimers and then tetramers intracellularly before secretion. The secreted
    tetramers associate end-to-end to form microfibrils that bridge cells to the
    surrounding interstitial matrix and basement membranes. The ten N-terminal VWA
    domains of alpha-3(VI) project from the microfibril and serve as interaction sites
    for other ECM components, contributing to the structural organization and integrity
    of the extracellular matrix in virtually all connective tissues.
  directly_involved_in:
  - id: GO:0030199
    label: collagen fibril organization
  - id: GO:0007155
    label: cell adhesion
  locations:
