id: E9PWQ3
gene_symbol: Col6a3
product_type: PROTEIN
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Col6a3 encodes the alpha-3(VI) chain of collagen type VI, a non-fibrillar collagen that
  assembles into heterotrimers with alpha-1(VI) and alpha-2(VI) chains in a 1:1:1 ratio.
  The alpha-3(VI) chain is the largest of the classical collagen VI chains and is
  distinguished by its extensive N-terminal region containing ten von Willebrand factor
  A-like (VWA) domains, a collagen triple-helical domain with Gly-X-Y repeats, and a
  C-terminal region containing two additional VWA domains, a fibronectin type III domain,
  and a Kunitz-type serine protease inhibitor domain. Collagen VI trimers assemble
  intracellularly into dimers and then tetramers before being secreted, and the tetramers
  associate end-to-end in the extracellular matrix to form a distinctive beaded microfibrillar
  network. Collagen VI is ubiquitously expressed in connective tissues and is closely
  associated with basement membranes. Mutations in COL6A1, COL6A2, and COL6A3 cause Bethlem
  myopathy and Ullrich congenital muscular dystrophy. The N-terminal VWA domains of
  alpha-3(VI) project from the microfibril and serve as binding sites for other ECM
  components. The C-terminal Kunitz domain has been implicated in serine protease inhibitor
  activity and may have roles in tumor biology.

existing_annotations:
- term:
    id: GO:0005615
    label: extracellular space
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Collagen VI alpha-3 chain is a secreted protein that localizes to the extracellular
      space and extracellular matrix. UniProt annotates subcellular location as
      "Secreted, extracellular space, extracellular matrix". IBA annotation is phylogenetically
      inferred and is consistent with known collagen VI biology. Collagen VI tetramers
      are secreted from cells and form microfibrils in the extracellular space (PMID:23869615).
    action: ACCEPT
    reason: >-
      Collagen VI is a well-established secreted ECM protein. The extracellular space
      localization is a core aspect of its biology, supported by both phylogenetic inference
      and extensive biochemical evidence. The IBA annotation is appropriate.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        Individual tetramers then associate end-to-end to form microfibrillar structures in the extracellular matrix by an unknown mechanism.

- term:
    id: GO:0004867
    label: serine-type endopeptidase inhibitor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      This annotation is based on the presence of a Kunitz-type BPTI serine protease
      inhibitor domain (InterPro IPR002223) at the C-terminus of the alpha-3(VI) chain.
      The Kunitz domain is a well-characterized structural fold associated with serine
      protease inhibition. The UniProt entry lists the domain at positions 3228-3278
      and carries keywords "Protease inhibitor" and "Serine protease inhibitor".
      PMID:23869615 notes a role for this domain in tumor biology.
    action: ACCEPT
    reason: >-
      The presence of an intact Kunitz protease inhibitor domain at the C-terminus of
      the alpha-3(VI) chain is well established structurally. The IEA annotation via
      InterPro domain mapping is appropriate. While the in vivo protease inhibitor
      activity of the full-length protein in its native collagen VI context has not been
      extensively characterized, the domain-based inference is standard and reasonable
      for collagen VI alpha-3 specifically, as alpha-3 contains an intact Kunitz domain
      unlike some other collagen VI chains.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        Interestingly, the α3(VI) chain contains an intact Kunitz inhibitor domain at the C-terminus and recent evidence suggests a role for this domain in tumor biology

- term:
    id: GO:0005589
    label: collagen type VI trimer
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      This annotation places Col6a3 as part of the collagen type VI trimer complex,
      inferred electronically by ARBA machine learning models. This is well established:
      collagen VI assembles as trimers of alpha-1(VI), alpha-2(VI), and alpha-3(VI)
      chains in a 1:1:1 ratio (PMID:23869615). The ComplexPortal entry CPX-2965
      confirms the collagen type VI trimer complex.
    action: ACCEPT
    reason: >-
      The alpha-3(VI) chain is a defining component of the collagen type VI trimer.
      This is universally accepted and supported by extensive biochemical evidence.
      The IEA annotation is fully consistent with the TAS annotation below for the
      same term.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        It is clear that these chains are present in collagen VI assemblages in a 1:1:1 ratio, with the assumption that α1α2α3 heterotrimers are the basic monomeric unit of collagen VI.

- term:
    id: GO:0031012
    label: extracellular matrix
  evidence_type: HDA
  original_reference_id: PMID:22159717
  review:
    summary: >-
      This annotation is based on high-throughput proteomic detection of Col6a3 in
      ECM-enriched fractions from murine tissues. Naba et al. (PMID:22159717) developed
      a proteomic strategy to characterize ECM composition using enrichment for ECM
      components and mass spectrometry analysis of murine lung and colon tissues. Collagen
      VI is a core matrisome component and its detection in ECM fractions is expected.
    action: ACCEPT
    reason: >-
      Collagen VI is a well-established core ECM component that forms beaded microfibrils
      in the extracellular matrix. The HDA (high-throughput direct assay) evidence from
      proteomic analysis is appropriate and consistent with known collagen VI biology.
      UniProt annotates this protein to "extracellular matrix" subcellular location.
    supported_by:
    - reference_id: PMID:22159717
      supporting_text: >-
        We present here a proteomic strategy developed to characterize the in vivo ECM composition of normal tissues and tumors using enrichment of protein extracts for ECM components and subsequent analysis by mass spectrometry.

- term:
    id: GO:0005589
    label: collagen type VI trimer
  evidence_type: TAS
  original_reference_id: PMID:23869615
  review:
    summary: >-
      This annotation places Col6a3 as part of the collagen type VI trimer, supported
      by a traceable author statement from the review by Fitzgerald and Bateman (PMID:23869615)
      on the expanded collagen VI family. The review extensively discusses the assembly of
      alpha-1(VI), alpha-2(VI), and alpha-3(VI) into heterotrimers.
    action: ACCEPT
    reason: >-
      This TAS annotation is well supported by the comprehensive review of collagen VI
      biology. The alpha-3(VI) chain is an obligate component of the canonical collagen
      VI trimer. The review provides detailed discussion of the 1:1:1 stoichiometry and
      assembly pathway.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        Three genetically distinct collagen VI chains, α1(VI), α2(VI) and α3(VI), encoded by the COL6A1. COL6A2 and COL6A3 genes, were first described more than 20 years ago.
    - reference_id: PMID:23869615
      supporting_text: >-
        It is clear that these chains are present in collagen VI assemblages in a 1:1:1 ratio, with the assumption that α1α2α3 heterotrimers are the basic monomeric unit of collagen VI.

- term:
    id: GO:0030020
    label: extracellular matrix structural constituent conferring tensile strength
  evidence_type: RCA
  original_reference_id: PMID:22159717
  review:
    summary: >-
      This RCA annotation assigns a tensile strength function to Col6a3 based on its
      detection as an ECM component in proteomic studies (PMID:22159717). However, collagen
      VI is a non-fibrillar microfibrillar collagen that forms a beaded filament network
      rather than the thick fibrils that confer tensile strength (which is the role of
      fibrillar collagens such as types I, II, III). The GO term description states
      "extracellular matrix collagen proteins may be annotated to this term", but collagen
      VI is functionally distinct from tensile strength-providing collagens. The parent
      term GO:0005201 (extracellular matrix structural constituent) would be more accurate.
    action: MODIFY
    reason: >-
      Collagen VI forms a distinctive beaded microfibrillar network in the ECM that
      provides structural support and anchoring rather than tensile strength per se. Tensile
      strength is primarily attributed to fibrillar collagens (types I, II, III, V, XI).
      Collagen VI microfibrils serve as a bridging network connecting cells to the
      surrounding ECM. The broader parent term GO:0005201 (extracellular matrix structural
      constituent) more accurately captures the structural role of collagen VI.
    proposed_replacement_terms:
    - id: GO:0005201
      label: extracellular matrix structural constituent
    supported_by:
    - reference_id: PMID:22159717
      supporting_text: >-
        We present here a proteomic strategy developed to characterize the in vivo ECM composition of normal tissues and tumors using enrichment of protein extracts for ECM components and subsequent analysis by mass spectrometry.

- term:
    id: GO:0030020
    label: extracellular matrix structural constituent conferring tensile strength
  evidence_type: RCA
  original_reference_id: PMID:28071719
  review:
    summary: >-
      Same annotation as above but referenced to PMID:28071719, a proteomic study of
      pancreatic islet ECM during insulinoma progression. Col6a3 was detected as an ECM
      component by mass spectrometry. The same concern applies: collagen VI is a
      microfibrillar, not fibrillar, collagen and does not primarily confer tensile strength.
    action: MODIFY
    reason: >-
      As with the duplicate annotation above, collagen VI is a microfibrillar collagen
      forming beaded filaments, not a fibrillar collagen conferring tensile strength.
      GO:0005201 (extracellular matrix structural constituent) is more appropriate.
    proposed_replacement_terms:
    - id: GO:0005201
      label: extracellular matrix structural constituent
    supported_by:
    - reference_id: PMID:28071719
      supporting_text: >-
        In this study, we used quantitative proteomics to profile the composition of the ECM of pancreatic islets in a mouse model of insulinoma characterized by a precisely timed angiogenic switch.

- term:
    id: GO:0031012
    label: extracellular matrix
  evidence_type: HDA
  original_reference_id: PMID:28071719
  review:
    summary: >-
      This annotation is based on proteomic detection of Col6a3 in ECM fractions of
      pancreatic islets (PMID:28071719). Naba et al. used quantitative proteomics to
      profile ECM composition during the angiogenic switch and insulinoma progression,
      quantifying 120 ECM proteins including collagen VI components.
    action: ACCEPT
    reason: >-
      Collagen VI is a core ECM component. Detection in ECM-enriched fractions from
      pancreatic islets is expected and consistent with the widespread tissue distribution
      of collagen VI. The HDA evidence is appropriate.
    supported_by:
    - reference_id: PMID:28071719
      supporting_text: >-
        In this study, we used quantitative proteomics to profile the composition of the ECM of pancreatic islets in a mouse model of insulinoma characterized by a precisely timed angiogenic switch. Out of the 120 ECM proteins quantified, 35 were detected in significantly different abundance

# NEW annotations - not in GOA but supported by UniProt cross-references and literature
- term:
    id: GO:0005581
    label: collagen trimer
  evidence_type: IDA
  original_reference_id: PMID:23869615
  review:
    summary: >-
      UniProt cross-references indicate IDA evidence for Col6a3 localization to collagen
      trimer (GO:0005581) from MGI. This is the parent term of GO:0005589 (collagen
      type VI trimer) and is consistent with the biology. The more specific child term
      GO:0005589 is already annotated via IEA and TAS.
    action: NEW
    reason: >-
      Col6a3 is part of a collagen trimer (specifically collagen type VI trimer). This
      annotation is present in UniProt GO cross-references with IDA evidence from MGI
      but absent from the GOA file. The broader term complements the more specific
      GO:0005589 annotation.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        It is clear that these chains are present in collagen VI assemblages in a 1:1:1 ratio, with the assumption that α1α2α3 heterotrimers are the basic monomeric unit of collagen VI.

- term:
    id: GO:0007155
    label: cell adhesion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      UniProt lists this IEA annotation based on the keyword "Cell adhesion". UniProt
      notes that "Collagen VI acts as a cell-binding protein". Collagen VI interacts
      with cells via integrin receptors and other cell surface molecules, mediating
      cell-ECM adhesion. Reactome pathway R-MMU-216083 (Integrin cell surface
      interactions) lists Col6a3 as a participant.
    action: NEW
    reason: >-
      Collagen VI is established as a cell-binding protein that mediates cell adhesion
      via integrin and other receptor interactions. This annotation is present in UniProt
      GO cross-references but absent from the GOA file. While this is a broad biological
      process term, it accurately reflects a core function of collagen VI in the ECM.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        the N-terminal globular domains of α3(VI) appear to function in the extracellular space, probably as potential binding sites for other ECM molecules

- term:
    id: GO:0030199
    label: collagen fibril organization
  evidence_type: TAS
  original_reference_id: PMID:23869615
  review:
    summary: >-
      Collagen VI assembles into a distinctive microfibrillar network in the ECM.
      The alpha-3(VI) chain plays a role in microfibril formation, with its N5 VWA
      domain contributing to extracellular microfibril assembly (PMID:23869615).
      Collagen VI tetramers are assembled intracellularly and then associate end-to-end
      to form microfibrils in the extracellular matrix.
    action: NEW
    reason: >-
      Collagen VI forms a unique beaded microfibrillar network, and the alpha-3(VI) chain
      participates in the organization and assembly of these microfibrils. This process
      annotation is supported by the review in PMID:23869615 and is consistent with
      the structural role of collagen VI in the ECM.
    supported_by:
    - reference_id: PMID:23869615
      supporting_text: >-
        Individual tetramers then associate end-to-end to form microfibrillar structures in the extracellular matrix by an unknown mechanism.

