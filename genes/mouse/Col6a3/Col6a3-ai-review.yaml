    supporting_text: >-
      This large complex is assembled intracellularly so that only tetrameric collagen VI is secreted from the cells. Individual tetramers then associate end-to-end to form microfibrillar structures in the extracellular matrix by an unknown mechanism.
  - reference_id: PMID:23869615
    supporting_text: >-
      the N-terminal globular domains of α3(VI) appear to function in the extracellular space, probably as potential binding sites for other ECM molecules

proposed_new_terms: []

suggested_questions:
- question: >-
    What are the specific ECM ligands that bind to the N-terminal VWA domains
    (N1-N10) of the alpha-3(VI) chain? Understanding the interaction partners would
    enable more precise molecular function annotations beyond the generic structural
    constituent role.
- question: >-
    Does the C-terminal Kunitz domain of alpha-3(VI) function as an active serine
    protease inhibitor in vivo, and if so, what are its target proteases? This would
    clarify whether the IEA annotation for serine-type endopeptidase inhibitor
    activity reflects a physiologically relevant function or is primarily structural.

suggested_experiments:
- description: >-
    Biochemical characterization of the isolated Kunitz domain of Col6a3 to determine
    its serine protease inhibitor specificity and kinetic parameters. This would
    validate or refine the IEA annotation for serine-type endopeptidase inhibitor
    activity.
  hypothesis: >-
    The Kunitz domain of Col6a3 alpha-3(VI) chain functions as a serine protease
    inhibitor with specificity for ECM-remodeling proteases.
- description: >-
    Interactome analysis of the N-terminal VWA domains of alpha-3(VI) using proximity
    labeling or pull-down assays to identify ECM binding partners. This would enable
    more specific molecular function annotations for the VWA domain-mediated
    interactions.
  hypothesis: >-
    The VWA domains of alpha-3(VI) mediate specific interactions with basement
    membrane components and other ECM proteins.
