id: Q01279
gene_symbol: Egfr
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Epidermal growth factor receptor is a single-pass receptor tyrosine kinase for
  EGF-family ligands. Ligand-induced dimerization activates receptor autophosphorylation and
  docking of signaling adaptors, coupling the plasma membrane receptor to RAS-MAPK, PI3K-AKT,
  PLC-gamma/PKC, STAT, endocytic trafficking, proliferation, differentiation, and survival
  outputs.
