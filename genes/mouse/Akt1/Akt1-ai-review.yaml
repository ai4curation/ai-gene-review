id: P31750
gene_symbol: Akt1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: RAC-alpha serine/threonine-protein kinase AKT1, a PH-domain AGC kinase that is recruited
  to phosphoinositide-rich membranes downstream of PI3K and phosphorylates protein substrates controlling
  insulin/growth-factor signaling, metabolism, survival, growth, migration, and mTOR pathway feedback.
