core_functions:
- molecular_function:
    id: GO:0005509
    label: calcium ion binding
  description: Binds calcium through four EF-hand motifs; primary molecular mechanism for calmodulin
    activity; triggers conformational change enabling target binding and transduction of calcium signals
- molecular_function:
    id: GO:0043539
    label: protein serine/threonine kinase activator activity
  description: Activates CaMKII, CaMKIV, and myosin light-chain kinases in a calcium-dependent manner;
    core downstream effector function of calmodulin
- molecular_function:
    id: GO:0072542
    label: protein phosphatase activator activity
  description: Activates calcineurin (PP2B) phosphatase for NFAT dephosphorylation and downstream gene
    regulation; core calmodulin signaling function
- molecular_function:
    id: GO:0005246
    label: calcium channel regulator activity
  description: Regulates RyR1, RyR2, L-type Ca2+ channels, and other ion channels; bidirectional
    regulation depending on calcium levels; supported by direct RYR1/RYR2 interaction evidence
    (PMID:18650434)
