id: Q64438
gene_symbol: Ang2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Ang2 encodes mouse angiogenin-related protein (Angrp), a secreted RNase A
  family paralog of canonical mouse/human angiogenin. The directly supported
  function is RNA/tRNA cleavage activity. In contrast, a systematic trace of the
  local ISO block shows that all 46 ISO annotations were transferred from human
  ANG (UniProtKB:P03950) via GO_REF:0000119, and most of the transferred
  angiogenic, signaling, stress-response, and immune terms overstate the biology
  of the divergent non-angiogenic mouse paralog.
