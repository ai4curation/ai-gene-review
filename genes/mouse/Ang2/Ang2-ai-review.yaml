  - id: PMID:8633065
    title: "Characterization of mouse angiogenin-related protein: implications for functional studies on angiogenin."
    findings:
      - statement: Mouse Ang2/Angrp is not angiogenic in assays where mouse angiogenin is active.
        supporting_text: mouse Ang is potently angiogenic, but Angrp is not
        reference_section_type: ABSTRACT
      - statement: Mouse Ang2/Angrp retains ribonucleolytic activity toward tRNA and dinucleotide substrates.
        supporting_text: Angrp has somewhat greater ribonucleolytic activity toward tRNA and dinucleotide substrates than does Ang
        reference_section_type: ABSTRACT
      - statement: Loss of angiogenic activity is attributed to defective cellular receptor binding rather than loss of RNase catalytic capacity.
        supporting_text: an inability to bind cellular receptors is implicated since Angrp does not inhibit Ang-induced angiogenesis
        reference_section_type: ABSTRACT
