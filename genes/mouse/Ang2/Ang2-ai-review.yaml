core_functions:
  - molecular_function:
      id: GO:0004549
      label: tRNA-specific ribonuclease activity
    description: >-
      Secreted angiogenin-related RNase with direct biochemical tRNA cleavage
      activity. Mouse Ang2 retains RNase chemistry but does not share the broad
      angiogenic/signaling program transferred from canonical human ANG.
    locations:
      - id: GO:0005576
        label: extracellular region
    supported_by:
      - reference_id: PMID:8633065
        supporting_text: Angrp has somewhat greater ribonucleolytic activity toward tRNA and dinucleotide substrates than does Ang.
      - reference_id: PMID:23170778
        supporting_text: mAng-2 is almost 80% active compared to the human form of the protein
suggested_questions:
  - question: What endogenous RNA substrates and tissue contexts define the in vivo function of mouse Ang2 beyond the in vitro tRNA-cleavage assays?
  - question: Which human ANG functions truly map to mouse Ang2 versus other murine angiogenin paralogs, and can ISO transfer rules be constrained for this expanded paralog family?
suggested_experiments:
  - description: Compare recombinant mouse Ang2, canonical mouse angiogenin, and additional murine angiogenin paralogs in endothelial proliferation, receptor-binding, RNase-inhibitor binding, and cell-uptake assays.
    hypothesis: Mouse Ang2 retains RNase activity but lacks the receptor-binding and angiogenic outputs of canonical angiogenin.
    experiment_type: Comparative biochemical and cell-based functional assays
  - description: Use endogenous tagging or targeted perturbation in tissues that express Ang2 to identify where the protein localizes and which RNAs are cleaved in vivo.
    hypothesis: The physiological role of Ang2 is RNase-centered and more restricted than the transferred human ANG stress and signaling annotations.
    experiment_type: Endogenous tagging plus RNA substrate profiling
