        supporting_text: High glucose increases angiopoietin-2 transcription in microvascular endothelial cells
        reference_section_type: TITLE
  - id: PMID:23170778
    title: "Crystal structures of murine angiogenin-2 and -3-probing 'structure--function' relationships amongst angiogenin homologues."
    findings:
      - statement: mAng-2 has substantial tRNA-cleavage activity in comparative RNase assays.
        supporting_text: mAng-2 is almost 80% active compared to the human form of the protein
        reference_section_type: RESULTS
      - statement: The mAng-2 crystal structure captured zinc bound at the active site.
        supporting_text: first crystal structures of an Ang with a zinc ion bound at the active site
        reference_section_type: ABSTRACT
      - statement: The structural study reinforces that mAng-2 is not angiogenic despite RNase activity.
