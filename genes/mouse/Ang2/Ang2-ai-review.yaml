  - id: file:mouse/Ang2/Ang2-bioinformatics/RESULTS.md
    title: Ang2 ISO source trace results
    findings:
      - statement: All 46 ISO annotations in the local Ang2 GOA were transferred from human ANG through GO_REF:0000119.
        supporting_text: Every one of those 46 ISO rows is transferred through `GO_REF:0000119` from the same source entity, `UniProtKB:P03950` (human angiogenin/ANG).
      - statement: Mouse Ang2 is a divergent paralog, so human ANG angiogenic, receptor/signaling, nuclear/stress, and immune annotations should not be propagated automatically.
        supporting_text: even ISO terms with real experimental support on human ANG are unsafe to accept automatically for mouse Ang2 when they concern angiogenesis, receptor binding, signaling, stress-granule biology, nuclear trafficking, or immune effector roles.
      - statement: The experimental GOA block contains homonym errors from angiopoietin-2, angiotensin II, and ZNF418 papers.
        supporting_text: The non-ISO experimental block in the local GOA file also contains clear homonym errors
  - id: file:mouse/Ang2/Ang2-deep-research-falcon.md
    title: Falcon deep research report for mouse Ang2
    findings:
      - statement: Falcon verified that mouse Ang2 is angiogenin-2/Angrp rather than angiopoietin-2.
        supporting_text: The UniProt target provided (Q64438) is instead a **murine angiogenin paralog**, commonly referred to as **mouse angiogenin-2 (mAng2)** or **angiogenin-related protein (Angrp)**
      - statement: Falcon identified the best-supported direct function as secreted RNase activity with tRNA/dinucleotide substrates and little or no angiogenic activity.
        supporting_text: "Best-supported annotation for Q64438 is: **secreted RNase A-family paralog with strong in vitro RNase/tRNA-cleaving activity but little or no angiogenic activity**"
      - statement: Falcon found no recent primary studies centered directly on mouse Ang2/Angrp.
        supporting_text: "**Key limitation:** no 2023–2024 primary studies explicitly centered on **mouse Ang2/Angrp** were retrieved here."
