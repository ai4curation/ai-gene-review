- id: PMID:36592658
  title: >-
    Sterol-regulated transmembrane protein TMEM86a couples LXR signaling to
    regulation of lysoplasmalogens in macrophages.
  findings:
  - statement: >-
      TMEM86A is a direct transcriptional target of LXR in macrophages and has
      lysoplasmalogenase activity confirmed by biochemical assay.
    supporting_text: >-
      We demonstrate that TMEM86a is a direct transcriptional target of LXR in
      macrophages and microglia
  - statement: >-
      Both mouse and human TMEM86A display lysoplasmalogenase activity that is
      abrogated by catalytic site mutations H104L and D190V.
    supporting_text: >-
      mutations p.H104L and p.D190V resulted in a decrease in lysoplasmalogenase activity
  - statement: >-
      TMEM86A localizes to the ER in macrophages, colocalizing with calnexin.
    supporting_text: >-
      In BMDM and U2OS cells, TMEM86a colocalized with calnexin to the ER
  - statement: >-
      TMEM86A overexpression in macrophages reduces lysoplasmalogen abundance and
      membrane fluidity; silencing increases basal lysoplasmalogen levels.
    supporting_text: >-
      overexpression of Tmem86a in BMDM markedly reduces lysoplasmalogen abundance and
      membrane fluidity, while reciprocally, silencing of Tmem86a increases basal
      lysoplasmalogen levels
  - statement: >-
      TMEM86A is a catabolic enzyme distinct from the anabolic LPCAT3 pathway.
    supporting_text: >-
      TMEM86a on the other hand is part of a catabolic process

