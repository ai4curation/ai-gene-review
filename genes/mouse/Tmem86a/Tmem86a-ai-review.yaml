- term:
    id: GO:0047408
    label: alkenylglycerophosphocholine hydrolase activity
  evidence_type: IMP
  original_reference_id: PMID:35835749
  review:
    summary: >-
      IMP annotation based on adipocyte-specific TMEM86A knockout mice showing
      elevated lysoplasmalogen content, and TMEM86A overexpression reducing
      lysoplasmalogen levels. Mutagenesis of catalytic residues D82 and D190
      reduced activity (PMID:35835749).
    action: ACCEPT
    reason: >-
      Strong mutant phenotype evidence. Adipocyte-specific TMEM86A knockout mice
      showed significantly elevated lysoplasmalogens (LPC P-18:0 and LPE P-18:0)
      in all adipose tissue depots (BAT, iWAT, gWAT). TMEM86A overexpression
      increased LPE P-18:0 catabolism. Catalytic residue mutations (D82A, D190A)
      reduced lysoplasmalogenase activity. This directly demonstrates the enzymatic
      function in vivo.
    supported_by:
    - reference_id: PMID:35835749
      supporting_text: >-
        TMEM86A overexpression significantly increased LPE P-18:0 catabolism calculated by subtracting residual LPE P-18:0 from the initial levels in the conditioned media
    - reference_id: PMID:35835749
      supporting_text: >-
        We found that D82A or D190A mutation of TMEM86A reduced lysoplasmalogenase activity in HEK293T cells (Fig. 2j, k), further implicating these residues in catalytic activity.
    - reference_id: PMID:35835749
      supporting_text: >-
        TMEM86A AKO elevated the levels of most lysoplasmalogens and plasmalogens in adipose tissues regardless of the anatomical location

- term:
    id: GO:0047408
    label: alkenylglycerophosphocholine hydrolase activity
  evidence_type: IMP
  original_reference_id: PMID:36592658
  review:
    summary: >-
      IMP annotation based on in vitro biochemical assay and cellular gain/loss of
      function studies in macrophages (PMID:36592658). Overexpression reduced
      lysoplasmalogen levels; silencing increased them and abrogated LXR-dependent
      lysoplasmalogen reduction. Catalytic mutations H104L and D190V decreased
      activity.
    action: ACCEPT
    reason: >-
      Complementary evidence to PMID:35835749, this time in macrophages. The authors
      used a coupled biochemical assay measuring NADH oxidation linked to fatty
      aldehyde release, showing 2-2.5-fold increased hydrolysis of both LPC' and
      LPE' by TMEM86A-expressing microsomes. Catalytic site mutations (H104L,
      D190V) reduced activity. In BMDMs, overexpression markedly reduced
      lysoplasmalogens, while shRNA-mediated silencing increased basal LPE' levels
      and attenuated LXR-dependent lysoplasmalogen reduction.
    supported_by:
    - reference_id: PMID:36592658
      supporting_text: >-
        we found that microsomal fractions from HEK293T cells overproducing mTMEM86a or hTMEM86a had a ∼2–2.5-fold increase in the hydrolysis rate of both LPC' and LPE'
    - reference_id: PMID:36592658
      supporting_text: >-
        mutations p.H104L and p.D190V resulted in a decrease in lysoplasmalogenase activity
    - reference_id: PMID:36592658
      supporting_text: >-
        Tmem86a silencing led to an increase in the basal level of LPE', the most prominent lysoplasmalogen species in BMDM, and largely attenuated the ability of LXR activation to reduce this lipid species

# New annotations not present in GOA
- term:
    id: GO:0046485
    label: ether lipid metabolic process
  evidence_type: IMP
  original_reference_id: PMID:35835749
  review:
    summary: >-
      TMEM86A is directly involved in ether lipid metabolism as a lysoplasmalogenase.
      Plasmalogens and lysoplasmalogens are ether lipids containing a vinyl ether bond
      at the sn-1 position. Adipocyte-specific knockout causes accumulation of
      lysoplasmalogens demonstrating a role in ether lipid catabolism (PMID:35835749).
      This BP term is not present in GOA but is directly supported by the enzymatic
      function and knockout phenotype.
    action: NEW
    reason: >-
      The existing GOA annotations capture the molecular function (GO:0047408) and
      cellular component (GO:0005789) but lack a biological process annotation.
      UniProt annotates the broader GO:0006629 (lipid metabolic process) via IEA
      from keywords, but ether lipid metabolic process (GO:0046485) is more specific
      and accurately captures TMEM86A role in plasmalogen/lysoplasmalogen metabolism.
      Lysoplasmalogens are vinyl ether lipids and TMEM86A hydrolyzes their vinyl ether
      bond, placing it squarely in ether lipid metabolism.
    supported_by:
    - reference_id: PMID:35835749
      supporting_text: >-
        TMEM86A AKO elevated the levels of most lysoplasmalogens and plasmalogens in adipose tissues regardless of the anatomical location
    - reference_id: PMID:36592658
      supporting_text: >-
        our key finding is the identification of TMEM86a as a sterol-inducible lysoplasmalogenase that directly governs lysoplasmalogen catabolism in macrophages

- term:
    id: GO:0016042
    label: lipid catabolic process
  evidence_type: IMP
  original_reference_id: PMID:35835749
  review:
    summary: >-
      TMEM86A catabolizes lysoplasmalogen lipids by hydrolysis of the vinyl ether bond,
      producing fatty aldehyde and glycerophosphodiester. This is a catabolic process.
      Knockout mice accumulate the substrates (lysoplasmalogens), confirming catabolic
      function (PMID:35835749, PMID:36592658).
    action: NEW
    reason: >-
      No BP annotation for catabolism is present in GOA. The enzyme function is
      clearly catabolic -- it breaks down lysoplasmalogen lipids. Both publications
      describe TMEM86A as mediating lysoplasmalogen catabolism. This term captures
      the catabolic aspect not covered by the ether lipid metabolic process term.
    supported_by:
    - reference_id: PMID:36592658
      supporting_text: >-
        TMEM86a on the other hand is part of a catabolic process
    - reference_id: PMID:35835749
      supporting_text: >-
        TMEM86A overexpression significantly increased LPE P-18:0 catabolism

