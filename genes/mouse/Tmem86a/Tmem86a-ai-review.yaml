id: Q9D8N3
gene_symbol: Tmem86a
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  TMEM86A (Lysoplasmalogenase TMEM86A) is an integral endoplasmic reticulum membrane protein
  that catalyzes the hydrolysis of the vinyl ether bond of lysoplasmalogen lipids (both choline
  and ethanolamine forms), producing a fatty aldehyde and glycerophosphocholine or
  glycerophosphoethanolamine, respectively (EC 3.3.2.2). It is the second mammalian
  lysoplasmalogenase identified alongside TMEM86B, and belongs to the conserved YhhN protein
  family. TMEM86A is a multi-pass transmembrane protein with 8 predicted transmembrane helices
  and catalytic residues Asp-82, His-104, and Asp-190 that are conserved across the YhhN family
  from bacteria to mammals. It is highly expressed in jejunum, white adipose tissue, kidney, and
  macrophages. In adipocytes, TMEM86A regulates plasmalogen homeostasis and PKA-dependent
  energy metabolism; adipocyte-specific knockout mice show elevated lysoplasmalogens and enhanced
  mitochondrial oxidative metabolism. In macrophages, TMEM86A is a direct transcriptional target
  of the liver X receptor (LXR) and mediates sterol-dependent membrane remodeling by catabolizing
  lysoplasmalogens.

existing_annotations:
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference across the TMEM86 family.
      TMEM86A is indeed a multi-pass integral membrane protein with 8 predicted
      transmembrane helices (PMID:35835749, PMID:36592658). UniProt annotates it
      as a multi-pass membrane protein.
    action: ACCEPT
    reason: >-
      TMEM86A is unequivocally a membrane protein. It has 8 predicted transmembrane
      domains and was experimentally shown to fractionate with the membrane fraction
      (PMID:36592658). The IBA annotation at the level of GO:0016020 membrane is
      correct, though less specific than the ER membrane annotations also present.
      As an IBA annotation it captures the phylogenetically conserved membrane
      localization across the YhhN family.
    supported_by:
    - reference_id: PMID:36592658
      supporting_text: >-
        TMEM86a protein was retrieved in the membrane fraction
    - reference_id: PMID:35835749
      supporting_text: >-
        a high confidence AlphaFold computational model24 predicts a protein with 8 transmembrane regions

- term:
    id: GO:0016787
    label: hydrolase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferring hydrolase activity based on phylogenetic analysis of
      the TMEM86/YhhN family. TMEM86A has been experimentally confirmed as a
      lysoplasmalogenase (EC 3.3.2.2) that hydrolyzes vinyl ether bonds of
      lysoplasmalogens (PMID:35835749, PMID:36592658).
    action: ACCEPT
    reason: >-
      TMEM86A is experimentally validated as a hydrolase. While the more specific
      term GO:0047408 (alkenylglycerophosphocholine hydrolase activity) is also
      annotated, this IBA annotation at the broader hydrolase level is appropriate
      as a phylogenetically supported general classification of the YhhN family
      enzymatic activity. The IBA level is deliberately conservative and captures
      the family-level function correctly.
    supported_by:
    - reference_id: PMID:35835749
      supporting_text: >-
        TMEM86A overexpression significantly increased LPE P-18:0 catabolism
    - reference_id: PMID:36592658
      supporting_text: >-
        both murine and human TMEM86a display active lysoplasmalogenase activity
        that can be abrogated by inactivating mutations in the predicted catalytic site

- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB/Swiss-Prot subcellular location mapping.
      ER membrane localization is strongly supported by experimental evidence from
      both key publications (PMID:35835749, PMID:36592658).
    action: ACCEPT
    reason: >-
      ER membrane localization is a core feature of TMEM86A. GFP-tagged TMEM86A
      colocalized with ER Tracker in C3H10T1/2 cells (PMID:35835749), and
      TMEM86A colocalized with calnexin (an ER marker) in BMDMs (PMID:36592658).
      The IEA annotation is consistent with experimental IDA annotations also present.
    supported_by:
    - reference_id: PMID:35835749
      supporting_text: >-
        green fluorescent protein (GFP)-tagged TMEM86A strongly colocalized with ER Tracker staining in C3H10T1/2 cells both before and after differentiation
    - reference_id: PMID:36592658
      supporting_text: >-
        In BMDM and U2OS cells, TMEM86a colocalized with calnexin to the ER

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR012506, TMEM86B-like) mapping to membrane
      localization. This is consistent with TMEM86A being a multi-pass integral
      membrane protein.
    action: ACCEPT
    reason: >-
      Correct but generic. TMEM86A is a multi-pass membrane protein with 8
      transmembrane domains. The InterPro-based IEA is redundant with the IBA
      annotation for GO:0016020 and the more specific IDA-supported ER membrane
      annotations, but it is not incorrect. It is fine to retain as an independent
      supporting line of evidence.
    supported_by:
