- id: PMID:35835749
  title: >-
    Adipocyte lysoplasmalogenase TMEM86A regulates plasmalogen homeostasis and
    protein kinase A-dependent energy metabolism.
  findings:
  - statement: >-
      TMEM86A functions as a lysoplasmalogenase in adipocytes, hydrolyzing lysoplasmalogens.
      TMEM86A overexpression reduced lysoplasmalogen levels; adipocyte-specific knockout
      increased them.
    supporting_text: >-
      TMEM86A overexpression significantly increased LPE P-18:0 catabolism
  - statement: >-
      TMEM86A localizes to the endoplasmic reticulum in adipocytes.
    supporting_text: >-
      green fluorescent protein (GFP)-tagged TMEM86A strongly colocalized with ER Tracker staining in C3H10T1/2 cells both before and after differentiation (Fig
  - statement: >-
      Catalytic residues Asp-82 and Asp-190 are essential for lysoplasmalogenase activity.
    supporting_text: >-
      We found that D82A or D190A mutation of TMEM86A reduced lysoplasmalogenase activity in HEK293T cells (Fig. 2j, k), further implicating these residues in catalytic activity.
  - statement: >-
      Adipocyte-specific TMEM86A knockout enhances PKA signaling and mitochondrial
      oxidative metabolism via accumulation of lysoplasmalogens.
    supporting_text: >-
      TMEM86A AKO significantly increased phosphorylation of HSL and CREB in BAT and WAT
  - statement: >-
      TMEM86A is highly expressed in adipocytes within white adipose tissue and is
      upregulated by high-fat diet.
    supporting_text: >-
