proposed_new_terms: []

suggested_questions:
- question: >-
    Does TMEM86A have substrate preference for choline vs ethanolamine lysoplasmalogens,
    and does this differ between tissues (adipocytes vs macrophages)? Both LPC' and LPE'
    are substrates, but the relative preference and tissue-specific substrate utilization
    is not fully characterized.
- question: >-
    What is the physiological significance of TMEM86A in tissues beyond adipose and
    macrophages, particularly in jejunum and kidney where it is also highly expressed?
    Expression data shows high levels in these tissues but functional studies are limited
    to adipose tissue and macrophages.

suggested_experiments:
- description: >-
    Crystal or cryo-EM structure determination of TMEM86A to confirm the catalytic
    mechanism and transmembrane topology. The 3D structure is currently only predicted
    by AlphaFold. Experimental structure would clarify the catalytic mechanism involving
    the conserved Asp-82, His-104, and Asp-190 residues.
  hypothesis: >-
    The catalytic residues Asp-82, His-104, and Asp-190 form an active site within the
    transmembrane region that directly cleaves the vinyl ether bond of lysoplasmalogens.
- description: >-
    Generate global Tmem86a knockout mice (not tissue-specific) to assess systemic
    effects on plasmalogen metabolism and identify phenotypes in high-expression tissues
    like jejunum and kidney. Current KO studies are limited to adipocyte-specific
    conditional knockouts and shRNA silencing in macrophages.
  hypothesis: >-
    Global TMEM86A loss will reveal additional physiological roles in lysoplasmalogen
    metabolism in jejunum and kidney beyond those characterized in adipose tissue and
    macrophages.
