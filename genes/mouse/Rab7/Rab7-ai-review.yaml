id: P51150
gene_symbol: Rab7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Mouse Rab7 (official symbol Rab7a; UniProt P51150) is a Rab-family small GTPase
  (EC 3.6.5.2) and the direct ortholog of human RAB7A. It is the master regulator
  of the late endocytic pathway, cycling between an inactive GDP-bound (cytosolic)
  state and an active GTP-bound (membrane-associated) state. GTP-loading by the
  Mon1-Ccz1 GEF on maturing endosomes (the Rab5-to-Rab7 conversion) recruits
  effectors including RILP, the HOPS tethering complex, retromer, FYCO1, PLEKHM1
  and ORP1L to drive early-to-late endosome maturation, late endosome-lysosome
  fusion, autophagosome-lysosome fusion, phagosome maturation, retrograde
  endosome-to-Golgi transport and lysosome positioning. It is inactivated by
  TBC-domain GAPs. Mouse studies have established physiological roles in lipophagy
  and beta-adrenergic lipolysis in adipocytes, synaptic AMPA-receptor trafficking
  during long-term depression in neurons, osteoclast ruffled-border function and
  bone resorption, and secretory-lysosome trafficking. In vivo work in mouse liver
  using LysoTag mice further confirms Rab7 as a mediator of late endosomal
  maturation, where its loss diverts cargo away from the degradative route and
  increases the cytosolic escape of lipid nanoparticles (PMID:41814093).

