  qualifier: located_in
  review:
    summary: >-
      Rab7 detected in a bulk proteomic characterization of abundant Golgi
      membrane proteins.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Rab7 is a late-endosome/lysosome GTPase; detection in a Golgi membrane
      fraction most plausibly reflects co-fractionation/contamination or transient
      retrograde-pathway association rather than a genuine steady-state Golgi pool.
      Not a core localization.

core_functions:
  - molecular_function:
      id: GO:0003924
      label: GTPase activity
    description: >-
      Rab7 functions as a small GTPase molecular switch (EC 3.6.5.2), cycling
      between an inactive GDP-bound (cytosolic) and an active GTP-bound
      (membrane-associated) state. Activation by the Mon1-Ccz1 GEF on maturing
      endosomes and inactivation by TBC-domain GAPs underpins its control of late
      endocytic trafficking, autophagy, phagosome maturation and lysosome
      biogenesis.
    directly_involved_in:
      - id: GO:0008333
        label: endosome to lysosome transport
      - id: GO:0045022
        label: early endosome to late endosome transport
      - id: GO:0042147
        label: retrograde transport, endosome to Golgi
      - id: GO:0090385
        label: phagosome-lysosome fusion
    locations:
      - id: GO:0005770
        label: late endosome
      - id: GO:0005764
        label: lysosome
      - id: GO:0031902
        label: late endosome membrane
    supported_by:
      - reference_id: PMID:16855591
        supporting_text: "TBC-domain GAPs for Rab GTPases accelerate GTP hydrolysis by a dual-finger mechanism."
      - reference_id: PMID:41814093
        supporting_text: "Loss of Rab7, a mediator of late endosomal maturation, increased LNP escape."
  - molecular_function:
      id: GO:1905394
      label: retromer complex binding
    description: >-
      Active Rab7 recruits and binds the retromer complex on late endosomes,
      docking it to the membrane to drive cargo-selective endosome-to-Golgi
      retrograde transport.
    directly_involved_in:
      - id: GO:0042147
        label: retrograde transport, endosome to Golgi
      - id: GO:0022615
        label: protein to membrane docking
    locations:
      - id: GO:0005770
        label: late endosome
  - molecular_function:
      id: GO:0003924
      label: GTPase activity
    description: >-
      Through the same switch activity, Rab7 drives autophagosome-lysosome fusion
      and selective autophagy, including lipophagy of lipid droplets demonstrated
      in mouse adipocytes.
    directly_involved_in:
      - id: GO:0061724
        label: lipophagy
    locations:
      - id: GO:0000421
        label: autophagosome membrane
      - id: GO:0005811
        label: lipid droplet
    supported_by:
      - reference_id: PMID:23708524
        supporting_text: "RAB7 plays a pivotal role in the regulation of this autolysosome-mediated lipid degradation in fat cells."

proposed_new_terms: []

suggested_questions:
  - question: >-
      The Nature Biotechnology study (PMID:41814093) shows that loss of Rab7
      increases cytosolic escape of lipid nanoparticles in mouse liver. Does Rab7
      activity define a general, druggable checkpoint that partitions endocytosed
      cargo between degradation and cytosolic escape, and can transient Rab7
      modulation be exploited to enhance therapeutic nucleic-acid delivery?
  - question: >-
      How are the tissue-specialized Rab7 functions (adipocyte lipophagy,
      synaptic AMPA-receptor turnover, osteoclast ruffled-border trafficking)
      differentially wired through distinct effectors despite a single ubiquitous
      GTPase switch?

suggested_experiments:
  - description: >-
      Use the LysoTag/Lysosomal Barcoding in vivo endosomal-escape assay
      (PMID:41814093) across conditional Rab7 (Rab7a) knockout tissues to quantify,
      in a tissue-resolved manner, how Rab7 loss shifts the balance between
      lysosomal degradation and cytosolic escape of endocytosed cargo.
  - description: >-
      Effector-interaction profiling (proximity labeling) of mouse Rab7 in
      adipocytes, neurons and osteoclasts to map the cell-type-specific effector
      modules that route the common Rab7 switch to lipophagy, synaptic receptor
      degradation and ruffled-border trafficking, respectively.

