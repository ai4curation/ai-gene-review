id: Q9QWV9
gene_symbol: Ccnt1
product_type: PROTEIN
status: COMPLETE
description: 'Cyclin T1 is the cyclin regulatory subunit of P-TEFb, partnering with CDK9 to promote RNA polymerase II pause release and productive transcription elongation. It binds 7SK snRNA in the inactive 7SK snRNP/P-TEFb regulatory pool and is recruited to chromatin and transcription factors during gene activation. The histidine-rich region can support transcription-associated condensate/scaffold behavior, but the conserved core role is activation and targeting of CDK9-dependent transcription elongation rather than general DNA binding or cell division.'
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
