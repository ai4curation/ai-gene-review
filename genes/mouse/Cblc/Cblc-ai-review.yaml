    action: ACCEPT
    reason: >-
      Protein catabolic process is a valid biological process for Cblc, as it
      ubiquitinates substrates to target them for proteasomal degradation.
      The more specific term GO:0006511 (ubiquitin-dependent protein catabolic
      process) is also annotated. This broader IEA term is acceptable.

