# ---- Experimental annotations (IPI, IDA) from PMID:18753381 ----
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:18753381
  review:
    summary: >-
      IPI annotation based on physical interaction with CD2AP (P35546) as
      reported in PMID:18753381. The paper demonstrated that "an interaction
      between CD2AP and Cbl-3 is induced by GDNF stimulation of sympathetic
      neurons." This is a real interaction but the GO term 'protein binding'
      is uninformative.
    action: MODIFY
    reason: >-
      The interaction with CD2AP is real and experimentally demonstrated
      (PMID:18753381), but GO:0005515 (protein binding) is too vague to be
      informative. A more specific term would better capture the actual
      function. However, there may not be a perfect specific GO term for
      CD2AP binding. Consider replacing with a more informative MF term.
    proposed_replacement_terms:
      - id: GO:0030971
        label: receptor tyrosine kinase binding
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          an interaction between CD2AP and Cbl-3 is induced by GDNF stimulation
          of sympathetic neurons, suggesting that CD2AP and Cbl-3 dissociate
          from Ret as a complex

- term:
    id: GO:0030163
    label: protein catabolic process
  evidence_type: IDA
  original_reference_id: PMID:18753381
  review:
    summary: >-
      IDA annotation from PMID:18753381. The paper shows that Cbl-3
      participates in Ret degradation, though its role is context-dependent:
      "Cbl-3 overexpression dramatically stabilizes activated Ret" alone,
      but "In combination with CD2AP, however, Cbl-3 promotes Ret degradation
      rapidly." The qualifier is acts_upstream_of_or_within.
    action: ACCEPT
    reason: >-
      Cblc participates in protein catabolic processes by ubiquitinating
      substrates for proteasomal degradation. The study demonstrates direct
      involvement in Ret degradation in a CD2AP-dependent manner. The
      acts_upstream_of_or_within qualifier is appropriate given the complex
      regulatory role.
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          In combination with CD2AP, however, Cbl-3 promotes Ret degradation
          rapidly and almost completely blocks survival promotion by GDNF
      - reference_id: PMID:18753381
        supporting_text: >-
          CD2AP enhances the degradation of Ret and inhibits GDNF-dependent
          survival, and gene silencing of CD2AP blocks Ret degradation

- term:
    id: GO:0043524
    label: negative regulation of neuron apoptotic process
  evidence_type: IDA
  original_reference_id: PMID:18753381
  review:
    summary: >-
      IDA annotation from PMID:18753381. The paper shows that Cbl-3
      overexpression "dramatically stabilizes activated Ret and enhances
      neuronal survival." However, when combined with CD2AP, Cbl-3 promotes
      Ret degradation and "almost completely blocks survival promotion by
      GDNF." The effect on neuron apoptosis is indirect and context-dependent,
      mediated through Ret stabilization/degradation.
    action: KEEP_AS_NON_CORE
    reason: >-
      The effect on neuronal apoptosis is an indirect, downstream consequence
      of Cblc's regulation of Ret signaling, not a direct anti-apoptotic
      function. The annotation reflects a phenotypic outcome in a specific
      neuronal context rather than a core function. The
      acts_upstream_of_or_within qualifier is appropriate.
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          Cbl-3 overexpression dramatically stabilizes activated Ret and
          enhances neuronal survival
      - reference_id: PMID:18753381
        supporting_text: >-
          Cbl-3 silencing in neurons only inhibited Ret degradation and
          enhanced neuronal survival in combination with CD2AP silencing

- term:
    id: GO:0050821
    label: protein stabilization
  evidence_type: IDA
  original_reference_id: PMID:18753381
  review:
    summary: >-
      IDA annotation from PMID:18753381. The paper shows "Cbl-3 overexpression
      dramatically stabilizes activated Ret." This is surprising for an E3
      ligase that normally promotes degradation, and the authors note this is
      reversed when CD2AP is present. The stabilization effect may represent
      Cbl-3 competing with other degradation pathways or protecting Ret from
      other E3 ligases.
    action: KEEP_AS_NON_CORE
    reason: >-
      Protein stabilization by Cblc is a real experimental observation but
      is context-dependent and somewhat paradoxical for an E3 ligase. It
      occurs when Cbl-3 acts alone without CD2AP, and is reversed in the
      presence of CD2AP. This represents a non-core, context-specific
      function rather than the primary role of Cblc.
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          Surprisingly, Cbl-3 overexpression dramatically stabilizes activated
          Ret and enhances neuronal survival, even though Cbl-family E3 ligases
          normally function to trigger RTK downregulation
      - reference_id: PMID:18753381
        supporting_text: >-
          Cbl-3 acts as a switch that is triggered by CD2AP and oscillates
          between inhibition and promotion of Ret degradation

- term:
    id: GO:1990790
    label: response to glial cell derived neurotrophic factor
  evidence_type: IDA
  original_reference_id: PMID:18753381
  review:
    summary: >-
      IDA annotation from PMID:18753381. The study was performed in the context
      of GDNF-Ret signaling in sympathetic neurons, and Cblc responds to GDNF
      stimulation by dissociating from Ret: "Cbl-3 interacts with unphosphorylated
      Ret and dissociates from Ret after Ret activation." Cblc participates in
      the cellular response to GDNF by modulating Ret degradation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Response to GDNF is the specific biological context studied in
      PMID:18753381 rather than a core function of Cblc. Cblc likely
      participates in regulation of multiple RTK signaling pathways
      (EGFR, Ret, etc.), and GDNF response represents one specific context.
      The annotation is valid but reflects a specific experimental setting
      rather than the core evolved function.
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          the E3-ligase Cbl-3 interacts with unphosphorylated Ret and
          dissociates from Ret after Ret activation

