- id: PMID:11162497
  title: Characterization of the mouse Cblc/Cbl3 gene.
  findings:
    - statement: >-
        The mouse Cblc gene encodes a 496 amino acid protein sharing 67%
        identity with its human ortholog and 70% identity with mouse CBL
        over conserved SH2 and RING finger domains.
      supporting_text: >-
        encodes a putative protein of 496 amino acid residues which shares an
        overall 67% identity with its human ortholog; it also shares 70% of
        amino acid identity with mouse CBL over their conserved SH2 and Ring
        finger domains
    - statement: >-
        Mouse Cblc mRNA is expressed in embryo and adult tissues with a
        rather ubiquitous distribution.
      supporting_text: >-
        Mouse Cblc mRNA is expressed in embryo and adult tissues and has a
        rather ubiquitous distribution
- id: PMID:18753381
  title: >-
    CD2AP and Cbl-3/Cbl-c constitute a critical checkpoint in the regulation
    of ret signal transduction.
  findings:
    - statement: >-
        Cbl-3 interacts with unphosphorylated Ret and dissociates after Ret
        activation by GDNF.
      supporting_text: >-
        the E3-ligase Cbl-3 interacts with unphosphorylated Ret and
        dissociates from Ret after Ret activation
    - statement: >-
        CD2AP and Cbl-3 form an interaction upon GDNF stimulation, suggesting
        they dissociate from Ret as a complex.
      supporting_text: >-
        an interaction between CD2AP and Cbl-3 is induced by GDNF stimulation
        of sympathetic neurons, suggesting that CD2AP and Cbl-3 dissociate
        from Ret as a complex
    - statement: >-
        Cbl-3 alone stabilizes activated Ret and enhances neuronal survival,
        but in combination with CD2AP, promotes Ret degradation and blocks
        GDNF-mediated survival.
      supporting_text: >-
        Surprisingly, Cbl-3 overexpression dramatically stabilizes activated
        Ret and enhances neuronal survival, even though Cbl-family E3 ligases
        normally function to trigger RTK downregulation. In combination with
        CD2AP, however, Cbl-3 promotes Ret degradation rapidly and almost
        completely blocks survival promotion by GDNF
    - statement: >-
        CD2AP and Cbl-3 constitute a checkpoint controlling the extent of
        Ret downregulation and neuronal sensitivity to GFLs.
      supporting_text: >-
        CD2AP and Cbl-3, therefore, constitute a checkpoint that controls the
        extent of Ret downregulation and, thereby, the sensitivity of neurons
        to GFLs
- id: PMID:14560016
  title: Cbl-3-deficient mice exhibit normal epithelial development.
  findings:
    - statement: >-
        Cbl-3-deficient mice show no visible phenotype, suggesting functional
        redundancy with other CBL family members.
    - statement: >-
        Cblc expression is restricted to epithelial cells across many tissues.

core_functions:
- molecular_function:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  description: >-
    Cblc is an E3 ubiquitin-protein ligase (EC 2.3.2.27) that accepts ubiquitin
    from E2 conjugating enzymes (UBE2D1/2/3) via its RING-type zinc finger
    domain and transfers it to substrate proteins, targeting them for
    proteasomal degradation. Key substrates include activated EGFR and Ret.
