id: Q80XL1
gene_symbol: Cblc
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Cblc (also known as Cbl-3 or CBL-C) encodes an E3 ubiquitin-protein ligase
  (EC 2.3.2.27) of the CBL family. The protein contains an N-terminal
  phosphotyrosine binding (PTB/TKB) domain composed of a four-helix bundle, an
  EF-hand-like calcium-binding subdomain, and a divergent SH2-like domain,
  followed by a RING-type zinc finger domain that mediates E2 ubiquitin-conjugating
  enzyme binding and E3 ligase activity. Unlike c-Cbl and Cbl-b, Cblc lacks the
  extended C-terminal proline-rich region and UBA domain, making it a shorter and
  structurally simpler family member. Cblc functions as a negative regulator of
  receptor tyrosine kinase signaling, particularly EGFR, by ubiquitinating
  activated receptors and promoting their proteasomal degradation. In sympathetic
  neurons, Cblc participates in a regulatory checkpoint with CD2AP that controls
  Ret degradation and thereby modulates GDNF-mediated neuronal survival
  (PMID:18753381). Cblc is widely expressed in epithelial cells across many
  tissues (PMID:11162497, PMID:14560016). Cbl-3-deficient mice show no visible
  phenotype, suggesting functional redundancy with other CBL family members
  (PMID:14560016).
