existing_annotations:
# ---- IBA annotations (phylogenetic) ----
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from CBL family members
      including c-Cbl (P22681) and Cbl-b (Q13191). CBL family proteins are
      recruited to activated receptor tyrosine kinases at the plasma membrane,
      consistent with Cblc function as a negative regulator of EGFR and Ret
      signaling. UniProt notes that Cblc interacts with EGFR and RET, both
      of which are plasma membrane receptors.
    action: ACCEPT
    reason: >-
      Plasma membrane localization is consistent with the core function of Cblc
      as an E3 ligase that ubiquitinates receptor tyrosine kinases upon their
      activation at the cell surface. The IBA inference from conserved CBL
      family members is well supported.

- term:
    id: GO:0061630
    label: ubiquitin protein ligase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ubiquitin protein ligase activity based on
      phylogenetic inference across the CBL family. Cblc contains a RING-type
      zinc finger domain (residues 350-389) that mediates E2 binding and
      ubiquitin transfer. UniProt assigns EC 2.3.2.27 by similarity to human
      CBL-C (Q9ULV8). The protein is functionally coupled with UBE2D1, UBE2D2,
      and UBE2D3 E2 conjugating enzymes.
    action: ACCEPT
    reason: >-
      This is the core molecular function of Cblc. The RING-type zinc finger
      domain is conserved and the E3 ligase activity is the defining function
      of CBL family proteins. Well supported by domain architecture and
      phylogenetic conservation.
    supported_by:
      - reference_id: PMID:11162497
        supporting_text: >-
          it also shares 70% of amino acid identity with mouse CBL over their
          conserved SH2 and Ring finger domains

- term:
    id: GO:0042059
    label: negative regulation of epidermal growth factor receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for negative regulation of EGFR signaling, inferred from
      CBL family conservation. UniProt states that Cblc is a "Regulator of EGFR
      mediated signal transduction; upon EGF activation, ubiquitinates EGFR.
      Isoform 1, but not isoform 2, inhibits EGF stimulated MAPK1 activation"
      (by similarity to human Q9ULV8).
    action: ACCEPT
    reason: >-
      Negative regulation of EGFR signaling is a core conserved function across
      CBL family proteins. The IBA annotation is consistent with the known
      mechanism of Cblc ubiquitinating EGFR to promote its degradation. This
      represents a primary biological role.

- term:
    id: GO:0007165
    label: signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for signal transduction, a broad term. Cblc is clearly
      involved in signal transduction as a negative regulator of RTK signaling.
      However, more specific terms (GO:0042059, GO:0043409) already capture
      the specific signaling pathways.
    action: ACCEPT
    reason: >-
      While this is a broad term, it is not incorrect. More specific annotations
      (negative regulation of EGFR signaling, negative regulation of MAPK cascade)
      are also present. The IBA annotation reflects the general role of CBL family
      proteins in signal transduction and is acceptable as a parent-level annotation.

- term:
    id: GO:0045121
    label: membrane raft
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for membrane raft localization, inferred from CBL family
      phylogeny. c-Cbl has been shown to localize to membrane rafts. Given that
      Cblc acts on RTKs at the plasma membrane, localization to membrane rafts
      (where signaling complexes assemble) is plausible.
    action: ACCEPT
    reason: >-
      Membrane rafts are important signaling microdomains where receptor tyrosine
      kinases cluster. CBL family proteins associate with activated RTKs in these
      domains. The IBA inference is phylogenetically sound and consistent with the
      mechanism of action.

- term:
    id: GO:0030971
    label: receptor tyrosine kinase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for receptor tyrosine kinase binding. Cblc binds to RTKs
      including EGFR and RET. UniProt states Cblc "Interacts with EGFR
      (tyrosine phosphorylated)" and "Interacts directly with RET (inactive)."
      PMID:18753381 demonstrated that Cbl-3 interacts with unphosphorylated Ret
      and dissociates after Ret activation.
    action: ACCEPT
    reason: >-
      RTK binding is a core molecular function of Cblc. The protein binds both
      EGFR and RET through its PTB/TKB domain. This is essential for its
      function as an E3 ligase that ubiquitinates RTKs.
    supported_by:
      - reference_id: PMID:18753381
        supporting_text: >-
          the E3-ligase Cbl-3 interacts with unphosphorylated Ret and
          dissociates from Ret after Ret activation

# ---- IEA annotations (electronic) ----
- term:
    id: GO:0001784
    label: phosphotyrosine residue binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from combined automated methods, based on human ortholog
      Q9ULV8 and InterPro domain IPR024159 (Cbl_PTB). Cblc contains a divergent
      SH2-like domain (residues 218-320) within its PTB/TKB domain that binds
      phosphotyrosine residues, and UniProt annotates a binding site at residue
      263 for 4-O-phospho-L-tyrosine.
    action: ACCEPT
    reason: >-
      Phosphotyrosine binding is intrinsic to Cblc function. The SH2-like
      subdomain of the TKB domain recognizes phosphotyrosine on activated RTKs,
      which is the basis for substrate recognition. Well supported by domain
      architecture.

- term:
    id: GO:0004842
    label: ubiquitin-protein transferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain IPR024162 (Adaptor_Cbl). This is
      a parent term of GO:0061630 (ubiquitin protein ligase activity). Cblc
      has established E3 ubiquitin ligase activity (EC 2.3.2.27).
    action: ACCEPT
    reason: >-
      Ubiquitin-protein transferase activity is the broader term that
      encompasses the E3 ligase activity of Cblc. Since GO:0061630 is also
      annotated, this is redundant but not incorrect. The InterPro mapping
      is valid.

- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain IPR014741 (Adaptor_Cbl_EF_hand-like).
      UniProt notes "This protein has one functional calcium-binding site" and
      annotates four Ca2+ binding residues (198, 200, 202, 209) in the EF-hand-like
      subdomain of the TKB/PTB domain.
    action: KEEP_AS_NON_CORE
    reason: >-
      While Cblc does contain a calcium-binding EF-hand-like subdomain and
      likely binds calcium, this is a structural feature of the TKB domain
      rather than a core independent molecular function. Calcium binding is
      ancillary to the primary E3 ligase and RTK-binding functions. The
      annotation is technically correct but does not represent a core function.

- term:
