id: A1JVI8
gene_symbol: Dux
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Dux (Double homeobox) is a transcription factor containing two tandem homeobox
  DNA-binding domains. It is the mouse ortholog of human DUX4 and is encoded within
  a multicopy tandem repeat array. Dux is transiently expressed at the 2-cell stage
  of mouse embryonic development and functions as a transcriptional activator of
  zygotic genome activation (ZGA) target genes. Dux binds the promoters of ZGA-associated
  genes such as Zscan4 and activates their transcription. In mouse embryonic stem
  cells (mESCs), Dux expression drives cycling through a totipotent 2-cell-like
  state. However, Dux knockout studies have shown that while Dux facilitates ZGA,
  it is not strictly essential, as Dux-null embryos can survive to adulthood with
  only modest alterations in ZGA gene expression. Dux expression is activated by
  Dppa2, Dppa4, and p53 (Tp53). The Dux locus is epigenetically regulated by
  TRIM28/KAP1-mediated H3K9me3 repression.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Dux contains two homeobox DNA-binding domains (positions 16-76 and 110-170)
      and has been demonstrated to bind the promoters of ZGA target genes including
      Zscan4 (De Iaco et al. 2017, PMID:28459456). DNA binding is a well-supported
      core function. However, the term GO:0003677 (DNA binding) is overly general
      for a sequence-specific transcription factor with demonstrated promoter binding
      activity.
    action: MODIFY
    reason: >-
      Dux is a double-homeodomain transcription factor that binds specific promoter
      sequences. The general 'DNA binding' term should be replaced with the more
      informative sequence-specific DNA binding or transcription factor activity
      terms that better capture the nature of the interaction.
    proposed_replacement_terms:
    - id: GO:0000987
      label: cis-regulatory region sequence-specific DNA binding
    supported_by:
    - reference_id: PMID:28459456
      supporting_text: both orthologous proteins bind the promoters of ZGA-associated
        genes and activate their transcription
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Nuclear localization of Dux is well-supported by its function as a transcription
      factor with two homeobox domains, which typically contain nuclear localization
      signals. UniProt annotates Dux subcellular location as Nucleus based on
      ARBA, PROSITE-ProRule, and RuleBase predictions. The Reactome entries for
      Dux place it in the nucleoplasm where it binds gene promoters
      (Reactome:R-MMU-9816416).
    action: ACCEPT
    reason: >-
      Nuclear localization is consistent with the role of Dux as a double-homeodomain
      transcription factor that binds DNA promoters. This is supported by domain
      architecture and computational predictions.
    supported_by:
    - reference_id: Reactome:R-MMU-9816416
      supporting_text: Dux, the mouse homolog of human DUX4, binds the promoter of
        the Zscan4 gene and activates expression
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: TAS
  original_reference_id: Reactome:R-MMU-9816403
  review:
    summary: >-
      This annotation derives from the Reactome pathway 'Expression of Dux in the
      embryo' (R-MMU-9816403), which describes Dux expression during the initial
      wave of zygotic genome activation at the 2-cell stage. Nucleoplasm localization
      is consistent with its function as a transcription factor that must access
      chromatin to activate target genes.
    action: ACCEPT
    reason: >-
      Nucleoplasm is an appropriate and specific cellular component term for a
      transcription factor. The Reactome pathway describes Dux as being expressed
      and functioning in the nucleus during early embryonic development.
    supported_by:
    - reference_id: Reactome:R-MMU-9816403
      supporting_text: Dux is expressed during the initial, minor wave of zygotic
        genome activation at the 2-cell stage in mouse embryos
- term:
    id: GO:0005654
    label: nucleoplasm
  evidence_type: TAS
  original_reference_id: Reactome:R-MMU-9816416
  review:
    summary: >-
      This annotation derives from the Reactome pathway 'Dux binds a Zscan4 gene'
      (R-MMU-9816416), which describes Dux binding to the Zscan4 promoter in the
      nucleoplasm and activating its expression (De Iaco et al. 2017).
    action: ACCEPT
    reason: >-
      Nucleoplasm localization is consistent with the demonstrated function of Dux
      binding to the Zscan4 gene promoter. Duplicate of the above nucleoplasm
      annotation with a different Reactome reference, both valid.
    supported_by:
    - reference_id: Reactome:R-MMU-9816416
      supporting_text: Dux, the mouse homolog of human DUX4, binds the promoter of
        the Zscan4 gene and activates expression
- term:
    id: GO:0001216
    label: DNA-binding transcription activator activity
  evidence_type: TAS
  original_reference_id: PMID:28459456
  review:
    summary: >-
      De Iaco et al. (2017, PMID:28459456) demonstrated that Dux binds the promoters
      of ZGA-associated genes and activates their transcription. Overexpression of
      Dux rescues 2C-like state in Dux-knockout mESCs. ChIP-seq data show DUX4
      enrichment around TSS regions of early ZGA genes. Luciferase assays confirmed
      transcriptional activation from MERVL/ZGA promoters. This is a core molecular
      function of Dux.
    action: NEW
    reason: >-
      Dux is a sequence-specific DNA-binding transcription activator. This term
      is not present in the current GOA annotations but is strongly supported by
      multiple lines of experimental evidence demonstrating that Dux binds promoters
      and activates transcription of ZGA target genes.
    supported_by:
    - reference_id: PMID:28459456
      supporting_text: both orthologous proteins bind the promoters of ZGA-associated
        genes and activate their transcription
- term:
    id: GO:0141064
    label: zygotic genome activation
  evidence_type: TAS
  original_reference_id: PMID:28459456
  review:
    summary: >-
      Dux is a key participant in zygotic genome activation. De Iaco et al. (2017,
      PMID:28459456) showed that zygotic depletion of Dux leads to impaired early
      embryonic development and defective ZGA. However, later studies (Chen and Zhang
      2019, PMID:31133747; Bosnakovski et al. 2021, PMID:32997106) showed that
      Dux knockout has only minor effects on ZGA and is compatible with mouse
      development. Nevertheless, Dux clearly participates in this process even if
      it is not strictly essential.
    action: NEW
    reason: >-
      Zygotic genome activation is a core biological process for Dux. Multiple
      studies demonstrate Dux participates in ZGA, even though its loss is survivable.
      This term is absent from the current GOA annotations and should be added.
    additional_reference_ids:
    - PMID:31133747
    - PMID:32997106
    supported_by:
    - reference_id: PMID:28459456
      supporting_text: We conclude that DUX-family proteins are key inducers of zygotic
        genome activation in placental mammals
    - reference_id: PMID:31133747
      supporting_text: loss of DUX has minimal effects on ZGA and most DUX targets
        in 2C-like cells are normally activated in MZ-KO embryos
- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: TAS
  original_reference_id: PMID:28459456
  review:
    summary: >-
      De Iaco et al. (2017, PMID:28459456) demonstrated that Dux activates transcription
      of ZGA target genes from their promoters. Luciferase assays showed Dux-dependent
      transcriptional activation from MERVL-containing promoters. Overexpression of
      Dux induced transcription of ZGA genes in multiple cell contexts.
    action: NEW
    reason: >-
      Dux is a transcriptional activator that positively regulates Pol II-dependent
      transcription of target genes. This is a core biological process annotation
      that should be present.
    supported_by:
    - reference_id: PMID:28459456
      supporting_text: both orthologous proteins bind the promoters of ZGA-associated
        genes and activate their transcription
references:
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: Reactome:R-MMU-9816403
  title: Expression of Dux in the embryo
  findings:
  - statement: Dux is expressed during the initial wave of zygotic genome activation
      at the 2-cell stage in mouse embryos, activated by Dppa2, Dppa4, and Tp53.
    supporting_text: Dux is expressed during the initial, minor wave of zygotic genome
      activation at the 2-cell stage in mouse embryos. Transcription of Dux is directly
      activated by Dppa2 and Dppa4
- id: Reactome:R-MMU-9816416
  title: Dux binds a Zscan4 gene
  findings:
  - statement: Dux binds the promoter of the Zscan4 gene and activates its expression,
      demonstrating sequence-specific transcriptional activator function.
    supporting_text: Dux, the mouse homolog of human DUX4, binds the promoter of the
      Zscan4 gene and activates expression
- id: PMID:28459456
  title: DUX-family transcription factors regulate zygotic genome activation in placental
    mammals
  findings:
  - statement: Dux and DUX4 are expressed before ZGA in their respective species and
      bind promoters of ZGA-associated genes to activate transcription.
    supporting_text: both orthologous proteins bind the promoters of ZGA-associated
      genes and activate their transcription
  - statement: Dux knockout in mESCs prevents cycling through a 2-cell-like state,
      and zygotic depletion leads to impaired development and defective ZGA.
    supporting_text: We conclude that DUX-family proteins are key inducers of zygotic
      genome activation in placental mammals
- id: PMID:17668377
  title: Evolutionary conservation of a coding function for D4Z4, the tandem DNA repeat
    mutated in facioscapulohumeral muscular dystrophy
  findings:
  - statement: The DUX4 open reading frame within D4Z4 repeats is conserved across
      placental mammals for over 100 million years, and the mouse array is transcribed.
    supporting_text: Together with the conservation of the DUX4 ORF for >100 million
      years, this strongly supports a coding function for D4Z4
- id: PMID:31133747
  title: Loss of DUX causes minor defects in zygotic genome activation and is compatible
    with mouse development
  findings:
  - statement: Dux cluster knockout mice are viable and fertile, with only minor
      defects in ZGA, indicating Dux is not strictly essential for ZGA.
    supporting_text: loss of DUX has minimal effects on ZGA and most DUX targets in
      2C-like cells are normally activated in MZ-KO embryos
- id: PMID:32997106
  title: Dux facilitates post-implantation development, but is not essential for zygotic
    genome activation
  findings:
  - statement: Dux knockout embryos still undergo ZGA with only modest alterations,
      but show increased post-implantation developmental failure and smaller litter
      sizes.
    supporting_text: zygotic genome activation still occurs, with only modest alterations
      in 2-cell embryo gene expression, no defect in in vivo preimplantation development,
      but an increased likelihood of post-implantation developmental failure
- id: PMID:34267371
  title: p53 convergently activates Dux/DUX4 in embryonic stem cells and in facioscapulohumeral
    muscular dystrophy cell models
  findings:
  - statement: The tumor suppressor p53 activates Dux expression in mouse ESCs, and
      this p53-DUX regulatory axis is conserved in humans.
    supporting_text: in mouse embryonic stem cells, Dux is activated by the tumor
      suppressor p53, and Dux expression promotes differentiation into expanded-fate
      cell types
core_functions:
- description: >-
    Dux functions as a sequence-specific DNA-binding transcription activator that
    binds promoters of zygotic genome activation (ZGA) target genes (e.g., Zscan4,
    MERVL-driven genes) and activates their transcription. This is its primary
    molecular activity, executed in the nucleoplasm during the 2-cell stage of
    embryonic development.
