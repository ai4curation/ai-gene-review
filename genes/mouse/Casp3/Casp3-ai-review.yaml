- id: file:mouse/Casp3/Casp3-uniprot.txt
  title: UniProt record for mouse Casp3
  findings:
  - statement: Casp3 is the major effector caspase in the execution phase of apoptosis.
    supporting_text: >-
      Thiol protease that acts as a major effector caspase involved in the
      execution phase of apoptosis...mediates execution of apoptosis by
      catalyzing cleavage of many proteins
  - statement: The active Casp3 enzyme is a heterotetramer with p17 and p12 subunits.
    supporting_text: >-
      Heterotetramer that consists of two anti-parallel arranged heterodimers,
      each one formed by a 17 kDa (p17) and a 12 kDa (p12) subunit.
- id: file:mouse/Casp3/Casp3-deep-research-codex.md
  title: Manual deep research synthesis for mouse Casp3
  findings:
  - statement: The strongest curated picture is that Casp3 is a canonical apoptotic effector protease, while many orthology-transferred inflammatory and stimulus-specific terms are non-core or overextended.
core_functions:
- description: >-
    Casp3 is the canonical effector cysteine protease activated by initiator
    caspases. Once processed into the active heterotetramer, it cleaves many
    protein substrates during apoptotic execution.
  molecular_function:
    id: GO:0004197
    label: cysteine-type endopeptidase activity
  directly_involved_in:
  - id: GO:0097194
    label: execution phase of apoptosis
  - id: GO:1902512
    label: positive regulation of apoptotic DNA fragmentation
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:mouse/Casp3/Casp3-uniprot.txt
    supporting_text: >-
      Thiol protease that acts as a major effector caspase involved in the
      execution phase of apoptosis...mediates execution of apoptosis by
      catalyzing cleavage of many proteins
  - reference_id: file:mouse/Casp3/Casp3-deep-research-codex.md
    supporting_text: Casp3 is a major effector caspase activated by initiator caspases and cleaves many substrates during the execution phase of apoptosis.
- description: >-
    The mature Casp3 enzyme functions as an active caspase complex made of p17
    and p12 subunits, matching the biochemical form in which the protease
    carries out apoptotic substrate cleavage.
  molecular_function:
    id: GO:0004197
    label: cysteine-type endopeptidase activity
  directly_involved_in:
  - id: GO:0006508
    label: proteolysis
  locations:
  - id: GO:0008303
    label: caspase complex
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:mouse/Casp3/Casp3-uniprot.txt
    supporting_text: >-
      Heterotetramer that consists of two anti-parallel arranged heterodimers,
      each one formed by a 17 kDa (p17) and a 12 kDa (p12) subunit.
proposed_new_terms: []
suggested_questions:
- question: Which mouse Casp3 inflammatory annotations reflect direct Casp3 biology versus downstream consequences of apoptosis or gasdermin cleavage in specialized contexts?
- question: Should broad orthology-transferred terms such as intracellular signal transduction or protein stability regulation be systematically pruned from effector caspase reviews?
- question: Which non-lethal neuronal remodeling functions of Casp3 are sufficiently direct and conserved to justify dedicated non-core GO process terms?
suggested_experiments:
- description: Use tissue-specific Casp3 catalytic-dead or cleavage-resistant rescue alleles to separate apoptotic execution from non-lethal neuronal pruning functions in vivo.
- description: Perform substrate-trapping proteomics for active Casp3 in apoptotic versus non-apoptotic neurons to distinguish core substrates from context-specific targets.
- description: Test candidate inflammatory and pyroptotic Casp3 functions directly in mouse primary cells with parallel Gsdme and Casp3 perturbations to determine whether those annotations should remain lineage-specific.
