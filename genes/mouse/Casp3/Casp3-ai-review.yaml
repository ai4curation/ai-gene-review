id: P70677
gene_symbol: Casp3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Casp3 encodes mouse caspase-3, the canonical effector cysteine protease that
  executes apoptosis after activation by initiator caspases. The strongest core
  evidence supports cysteine-type endopeptidase activity, cytoplasmic/cytosolic
  localization, active heterotetramer formation, and direct participation in
  the execution phase of apoptosis with downstream DNA fragmentation and broad
  substrate cleavage. Mouse studies also support context-specific roles in
  neuronal apoptosis and local synaptic pruning without cell death. This draft
  is an ISO-focused review pass: ISO annotations have been curated explicitly,
  while the non-ISO annotation set remains pending.
