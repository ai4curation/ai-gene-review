- term:
    id: GO:0008303
    label: caspase complex
  evidence_type: ISO
  original_reference_id: GO_REF:0000119
  review:
    summary: >-
      The mature active enzyme is a p17/p12 heterotetramer, so part_of caspase
      complex is appropriate for active Casp3.
    action: ACCEPT
- term:
    id: GO:0043065
    label: positive regulation of apoptotic process
  evidence_type: ISO
  original_reference_id: GO_REF:0000119
  review:
    summary: >-
      Casp3 clearly promotes apoptosis, but the defining process term for the
      gene is execution phase of apoptosis. Keep this broader regulatory term as
      valid non-core biology.
    action: KEEP_AS_NON_CORE
