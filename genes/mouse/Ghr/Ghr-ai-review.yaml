id: P16882
gene_symbol: Ghr
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Ghr encodes the mouse growth hormone receptor, a single-pass type I cytokine
  receptor whose full-length membrane isoform binds growth hormone at the plasma
  membrane and activates JAK2/STAT5-centered signaling. The locus also produces
  a shorter GH-binding protein isoform (GHBP), so extracellular-space and
  hormone-buffering annotations need to be interpreted in the context of
  alternative splicing rather than assumed to describe the signaling receptor.
  Direct mouse evidence strongly supports receptor activity, plasma-membrane
  localization, and growth-hormone-triggered JAK-STAT signaling, whereas many
  transferred ISO and IBA terms are broad cytokine-family, downstream
  physiology, or circular donor-propagation artifacts.
functional_isoforms:
  - id: GHR_MEMBRANE_RECEPTOR
    name: Full-length signaling receptor isoform
    type: SPLICE_VARIANT
    maps_to:
      - type: UNIPROT_ISOFORM
        ids:
          - P16882-1
    description: >-
      Full-length membrane GHR. This is the signaling-competent form that binds
      growth hormone at the plasma membrane and activates JAK2/STAT signaling.
      Core receptor activity and pathway annotations should be interpreted
      primarily through this isoform.
    isoform_specific_terms:
      - id: GO:0004903
        label: growth hormone receptor activity
      - id: GO:0017046
        label: peptide hormone binding
      - id: GO:0005886
        label: plasma membrane
      - id: GO:0060396
        label: growth hormone receptor signaling pathway
      - id: GO:0060397
        label: growth hormone receptor signaling pathway via JAK-STAT
  - id: GHR_GHBP
    name: GH-binding protein isoform
    type: SPLICE_VARIANT
    maps_to:
      - type: UNIPROT_ISOFORM
        ids:
          - P16882-2
    description: >-
      Shorter alternative product corresponding to the GH-binding protein (GHBP).
      This form contributes extracellular hormone-binding/reservoir biology and
      should not be conflated with the signaling-competent membrane receptor when
      reviewing transferred signaling annotations.
    isoform_specific_terms:
      - id: GO:0005576
        label: extracellular region
      - id: GO:0005615
        label: extracellular space
existing_annotations:
  - term:
      id: GO:0009897
      label: external side of plasma membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        Conserved receptor topology places the ligand-binding ectodomain on the
        external side of the plasma membrane.
      action: ACCEPT
      reason: >-
        This is consistent with the biology of the full-length membrane receptor
        and with accepted plasma-membrane localization.
  - term:
      id: GO:0019221
      label: cytokine-mediated signaling pathway
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        Broad family-level IBA term transferred from cytokine-receptor ancestry.
        Ghr has a specific growth-hormone pathway term available.
      action: MODIFY
      reason: >-
        This is overly broad and likely reflects cytokine-receptor family
        transfer rather than a precise statement about Ghr.
      proposed_replacement_terms:
        - id: GO:0060396
          label: growth hormone receptor signaling pathway
  - term:
      id: GO:0046427
      label: positive regulation of receptor signaling pathway via JAK-STAT
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        Conserved statement that activated GHR promotes receptor-proximal
        JAK-STAT signaling.
      action: ACCEPT
      reason: >-
        This is consistent with the direct mouse JAK-STAT literature and donor
        traces with real receptor-signaling evidence.
  - term:
      id: GO:0004903
      label: growth hormone receptor activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        Core receptor molecular function.
