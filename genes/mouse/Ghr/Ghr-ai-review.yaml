core_functions:
  - description: >-
      Full-length mouse GHR binds growth hormone at the plasma membrane and
      transduces growth-hormone receptor signaling, especially through the
      JAK-STAT branch.
    molecular_function:
      id: GO:0004903
      label: growth hormone receptor activity
    directly_involved_in:
      - id: GO:0060396
        label: growth hormone receptor signaling pathway
      - id: GO:0060397
        label: growth hormone receptor signaling pathway via JAK-STAT
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: PMID:6303755
        supporting_text: >-
          GH receptors were at normal levels in lit/lit mice despite their
          deficiency of pituitary and serum GH.
      - reference_id: PMID:8702683
        supporting_text: >-
          GH-induced tyrosine phosphorylation of STAT5 and the interaction of
          STAT5 with GHR can be observed in mouse 3T3-F442A cells which express
          endogenous mouse GHR.
      - reference_id: file:mouse/Ghr/Ghr-notes.md
        supporting_text: >-
          UniProt records two alternative products: full-length isoform P16882-1
          and the shorter P16882-2 GH-binding protein isoform.
suggested_questions:
  - question: >-
      Should extracellular-space annotations for mouse Ghr be made explicitly
      isoform-aware, so that GHBP biology is separated from the full-length
      signaling receptor?
  - question: >-
      Which ortholog-derived GHR ISO annotations should be globally pruned
      because the donor is itself ISO or explicitly NOT?
suggested_experiments:
  - hypothesis: >-
      Isoform 1 is the signaling-competent receptor whereas isoform 2 primarily
      contributes extracellular GH-binding/GHBP biology.
    description: >-
      Express mouse P16882-1 and P16882-2 separately in the same cell system and
      compare plasma-membrane localization, GH binding, and STAT5 activation.
    experiment_type: isoform-specific expression and signaling assay
  - hypothesis: >-
      Receptor internalization should not be retained as a mouse Ghr annotation
      without direct evidence that distinguishes the full-length receptor from
      GHBP/shed ectodomain behavior.
    description: >-
      Measure GH-induced trafficking/internalization of endogenous mouse GHR with
      isoform-discriminating reagents and quantify receptor versus GHBP pools.
    experiment_type: ligand-induced trafficking assay
