      summary: 'Notch1 is a type I transmembrane receptor that resides at the plasma membrane where it receives ligand signals from adjacent cells.'
      action: ACCEPT
      reason: Plasma membrane localization is essential for Notch1 receptor function. The mature Notch1 heterodimer traffics to and resides at the plasma membrane where it undergoes ligand-dependent activation. UniProt confirms cell membrane localization.
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0007219
      label: Notch signaling pathway
    evidence_type: IC
    original_reference_id: PMID:10551863
    review:
      summary: 'Notch1 is the canonical receptor for the Notch signaling pathway. Upon ligand binding (JAG1/2, DLL1/3/4), Notch1 undergoes proteolytic cleavage releasing NICD which translocates to the nucleus to activate target genes via RBPJ/MAML complex.'
      action: ACCEPT
      reason: This is the core function of Notch1. The protein is THE defining receptor of the Notch signaling pathway, as documented extensively in UniProt and literature (Shi et al. 2024, doi:10.1038/s41392-024-01828-x).
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0048103
      label: somatic stem cell division
    evidence_type: IDA
    original_reference_id: PMID:12717450
    review:
      summary: 'Notch1 has evidence for involvement in somatic stem cell division, but this represents a tissue- or context-specific developmental/signaling output rather than the core receptor mechanism.'
      action: KEEP_AS_NON_CORE
      reason: The core Notch1 function is juxtacrine receptor signaling followed by NICD-mediated transcriptional regulation. This annotation is biologically plausible in mouse but is retained as non-core to avoid conflating downstream pleiotropic phenotypes with the primary molecular/cellular function.
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0007368
      label: determination of left/right symmetry
    evidence_type: IMP
    original_reference_id: PMID:12730124
    review:
      summary: 'Notch1 annotation to determination of left/right symmetry.'
      action: KEEP_AS_NON_CORE
      reason: Transferred annotation - context-specific function.
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0005515
      label: protein binding
    evidence_type: IPI
    original_reference_id: PMID:10551863
    review:
      summary: 'The protein binding annotation records a physical interaction but is too generic to describe Notch1 function.'
      action: REMOVE
      reason: Per curation guidance, generic protein binding should not be retained when the functional biology is a specific Notch receptor/ligand/coactivator pathway. Notch1 interactions are better captured by receptor activity, Notch signaling, and NICD-CSL/RBPJ-MAML transcriptional complex terms.
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0007386
      label: compartment pattern specification
    evidence_type: IMP
    original_reference_id: PMID:12001066
    review:
      summary: 'Notch1 has evidence for involvement in compartment pattern specification, but this represents a tissue- or context-specific developmental/signaling output rather than the core receptor mechanism.'
      action: KEEP_AS_NON_CORE
      reason: The core Notch1 function is juxtacrine receptor signaling followed by NICD-mediated transcriptional regulation. This annotation is biologically plausible in mouse but is retained as non-core to avoid conflating downstream pleiotropic phenotypes with the primary molecular/cellular function.
      supported_by:
