core_functions:
  - description: Notch1 functions as a transmembrane signaling receptor at the plasma membrane, responding to membrane-bound DLL/Jagged-family ligands on neighboring cells and transducing cell-cell contact signals through regulated intramembrane proteolysis.
    molecular_function:
      id: GO:0004888
      label: transmembrane signaling receptor activity
    directly_involved_in:
      - id: GO:0007219
        label: Notch signaling pathway
      - id: GO:0030154
        label: cell differentiation
    locations:
      - id: GO:0005886
        label: plasma membrane
      - id: GO:0009986
        label: cell surface
    supported_by:
      - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
        supporting_text: '[Falcon synthesis describes Notch1 as a mechanosensitive juxtacrine receptor activated by ligand-dependent cleavage.]'
  - description: The cleaved Notch1 intracellular domain (NICD) functions as a transcriptional coactivator in the nucleus by binding CSL/RBPJ and recruiting MAML to activate canonical Notch target genes such as Hes and Hey family members.
    molecular_function:
      id: GO:0003713
      label: transcription coactivator activity
    directly_involved_in:
      - id: GO:0045893
        label: positive regulation of DNA-templated transcription
      - id: GO:0007221
        label: positive regulation of transcription of Notch receptor target
    locations:
      - id: GO:0005634
        label: nucleus
    in_complex:
      id: GO:0002193
      label: MAML1-RBP-Jkappa- ICN1 complex
    supported_by:
      - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
        supporting_text: '[Falcon synthesis describes NICD nuclear entry and CSL/RBPJ-MAML target gene activation.]'
  - description: Notch1 EGF-like repeats bind calcium ions, which supports receptor folding, stability, and ligand-binding competence.
    molecular_function:
      id: GO:0005509
      label: calcium ion binding
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
        supporting_text: '[Falcon synthesis identifies Notch1 as an EGF-repeat transmembrane receptor with ligand-binding extracellular modules.]'
