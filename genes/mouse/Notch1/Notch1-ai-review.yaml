id: Q01705
gene_symbol: Notch1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Notch1 is the canonical mouse Notch receptor, a single-pass transmembrane protein
  that mediates juxtacrine cell-cell signaling. Ligand binding by DLL/JAG family
  proteins triggers ADAM and gamma-secretase cleavage, releasing the Notch intracellular
  domain (NICD), which enters the nucleus and forms an RBPJ/MAML transcriptional
  coactivator complex to activate target genes. In mouse, Notch1 has central roles
  in cell-fate decisions during embryogenesis and tissue homeostasis, with especially
  strong evidence for cardiovascular development, neurogenesis/gliogenesis, hematopoietic
  stem cell regulation, angiogenesis, and inhibition of myogenic differentiation.
