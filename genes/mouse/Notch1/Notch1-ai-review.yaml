  - name: '4'
    id: Q01705-4
    sequence_note: VSP_043065
existing_annotations:
  - term:
      id: GO:0007219
      label: Notch signaling pathway
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: 'Notch1 is the canonical receptor for the Notch signaling pathway. Upon ligand binding (JAG1/2, DLL1/3/4), Notch1 undergoes proteolytic cleavage releasing NICD which translocates to the nucleus to activate target genes via RBPJ/MAML complex.'
      action: ACCEPT
      reason: This is the core function of Notch1. The protein is THE defining receptor of the Notch signaling pathway, as documented extensively in UniProt and literature (Shi et al. 2024, doi:10.1038/s41392-024-01828-x).
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: 'Notch1 is a type I transmembrane receptor that resides at the plasma membrane where it receives ligand signals from adjacent cells.'
      action: ACCEPT
      reason: Plasma membrane localization is essential for Notch1 receptor function. The mature Notch1 heterodimer traffics to and resides at the plasma membrane where it undergoes ligand-dependent activation. UniProt confirms cell membrane localization.
      supported_by:
        - reference_id: file:mouse/Notch1/Notch1-deep-research-falcon.md
          supporting_text: '[Falcon deep-research synthesis used for this annotation decision.]'
  - term:
      id: GO:0007411
      label: axon guidance
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: 'The PANTHER IBA axon-guidance annotation appears to come from the broad PTHR45836 family, which includes both Notch receptors and canonical SLIT axon-guidance ligands.'
      action: REMOVE
      reason: Notch1 is a Notch receptor subfamily member, whereas axon guidance is a primary SLIT-family function in the same broad PANTHER family. The PANTHER metadata and reviewed member table support treating this as a family-transfer artifact rather than a Notch1 core function.
      supported_by:
        - reference_id: file:interpro/panther/PTHR45836/PTHR45836-metadata.yaml
          supporting_text: PTHR45836 is named Notch and Slit guidance protein and includes both Notch signaling and axonal guidance descriptions.
        - reference_id: file:interpro/panther/PTHR45836/PTHR45836-entries.csv
          supporting_text: Reviewed members include mouse Notch1 in subfamily SF12 and mouse/human Slit proteins in separate SLIT subfamilies.
