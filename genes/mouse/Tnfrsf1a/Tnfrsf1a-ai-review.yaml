id: P25118
gene_symbol: Tnfrsf1a
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: 'Tnfrsf1a encodes mouse TNF receptor 1 (p55/CD120a), a type I transmembrane
  TNF receptor with extracellular cysteine-rich ligand-binding domains and an intracellular
  death domain. TNFR1 binds TNF/lymphotoxin-alpha and initiates TNF-mediated signaling,
  especially canonical NF-kappaB/inflammatory signaling and extrinsic apoptotic signaling.'
existing_annotations:
- term:
    id: GO:0043235
    label: receptor complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: receptor complex captures the right general biology for Tnfrsf1a,
      but a more specific GO term is available.
    action: MODIFY
    reason: The current term is too broad or less precise than tumor necrosis
      factor receptor superfamily complex for this gene. Replace with tumor
      necrosis factor receptor superfamily complex to align the annotation with
      the reviewed evidence.
    proposed_replacement_terms:
    - id: GO:0002947
      label: tumor necrosis factor receptor superfamily complex
    supported_by:
    - reference_id: file:mouse/Tnfrsf1a/Tnfrsf1a-notes.md
      supporting_text: 'Membrane and complex localization: UniProt describes TNFRSF1A
        as a type I membrane protein with extracellular ligand-binding and intracellular
        death-domain regions.'
- term:
    id: GO:0005031
    label: tumor necrosis factor receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: tumor necrosis factor receptor activity is biologically consistent
      with the curated synthesis for Tnfrsf1a and is supported by IBA evidence
      (GO_REF:0000033).
    action: ACCEPT
    reason: The term matches a direct molecular function, pathway, or
      location/physiological output of Tnfrsf1a; it is specific enough to retain
      without replacement.
    supported_by:
    - reference_id: file:mouse/Tnfrsf1a/Tnfrsf1a-notes.md
      supporting_text: 'Mouse TNF binding/receptor evidence: Goodwin et al. cloned
        murine TNF receptor type 1 and reported that the "ligand-binding characteristics
        of the recombinant murine receptors mirror those of the human homologs."'
    - reference_id: file:mouse/Tnfrsf1a/Tnfrsf1a-deep-research-falcon.md
      supporting_text: Falcon identifies TNFRSF1A/TNFR1 as a broadly expressed
        cell-surface TNF receptor with extracellular cysteine-rich
        ligand-binding domains and an intracellular death domain.
