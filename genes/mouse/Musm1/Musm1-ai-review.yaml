taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Mus m 1 (major urinary protein 6, MUP6), a secreted lipocalin (calycin superfamily, lipocalin
  family) and the major mouse allergen. MUPs bind and slowly release volatile pheromones from drying urine
  in their beta-barrel calyx, regulating rodent social/sexual behaviour, and act as kairomones. Mus m
  1 is shed in urine and dander and is the dominant mouse inhalant allergen (notably in laboratory-animal
  allergy).
