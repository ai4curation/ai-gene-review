suggested_questions:
- question: >-
    Which non-erythroid Epo annotations in mouse have direct endogenous-ligand evidence strong
    enough to keep in GO, and which should be retired as orthology-transfer over-annotations?
  experts:
  - erythropoietin signaling curators
  - mouse developmental biology curators
- question: >-
    Should GO annotation for Epo use erythropoietin receptor binding plus Epo-mediated signaling
    instead of protein kinase activator activity for ligand-driven JAK2 activation?
  experts:
  - GO molecular function curators
  - cytokine signaling experts
- question: >-
    Can the cardiac/coronary developmental TAS annotations from PMID:20299672 be traced to
    direct Epo-specific statements in full text, or should they be replaced by broader non-core
    angiogenesis context only?
  experts:
  - cardiovascular development curators
  - MGI/Reactome curators
suggested_experiments:
- experiment_type: Endogenous ligand-receptor signaling assay
  description: >-
    In primary mouse erythroid progenitors, perturb endogenous Epo or EPOR and measure JAK2,
    STAT5, ERK, and Bad phosphorylation together with survival and differentiation readouts.
  hypothesis: >-
    Epo core function is EPOR ligand activity that drives JAK2/STAT and survival signaling
    in erythroid progenitors.
- experiment_type: Context-specific non-erythroid validation
  description: >-
    Use Epo conditional loss or neutralization in candidate neural, immune, and cardiac contexts
    represented by transferred annotations, with rescue by physiological Epo, to test whether
    endogenous Epo is required for the annotated process.
  hypothesis: >-
    Most broad non-erythroid transferred annotations will not show a direct endogenous Epo
    requirement comparable to erythropoiesis.
- experiment_type: Secreted versus cell-surface localization check
  description: >-
    Use endogenous tagging or validated antibodies in renal Epo-producing cells and erythroid
    target cells to distinguish intracellular production/secretory pathway signal from extracellular
    ligand and cell-surface receptor localization.
  hypothesis: >-
    Epo protein is secreted/extracellular, and cell-surface signal in GOA reflects EPOR-bound
    ligand or receptor localization rather than Epo as a membrane-resident protein.
