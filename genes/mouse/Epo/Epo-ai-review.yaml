references:
- id: GO_REF:0000024
  title: >-
    Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator
    judgment of sequence similarity
  findings:
  - statement: >-
      Manual orthology transfer supports receptor binding and Epo-mediated signaling from
      experimentally characterized erythropoietin orthologs.
    supporting_text: >-
      GOA ISS rows transfer erythropoietin receptor binding and erythropoietin-mediated signaling
      from human EPO.
    reference_section_type: RESULTS
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      IBA annotations correctly recover conserved Epo receptor-ligand function and erythroid
      signaling, but protein kinase activator activity is better represented as downstream
      kinase regulation.
    supporting_text: >-
      GOA IBA rows include EPOR binding, hormone activity, cytokine activity, erythrocyte
      differentiation, Epo-mediated signaling, STAT signaling, and protein kinase activator
      activity.
    reference_section_type: RESULTS
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: UniProt keyword mapping supports erythrocyte maturation as an Epo outcome.
    supporting_text: GOA maps the UniProt erythrocyte maturation keyword to GO:0043249 for
      Epo.
    reference_section_type: RESULTS
- id: GO_REF:0000096
  title: >-
    Automated transfer of experimentally-verified manual GO annotation data to mouse-rat orthologs
  findings:
  - statement: >-
      Mouse-rat transfer includes plausible downstream proliferation and ERK/neural terms,
      but these are non-core or over-extended relative to mouse Epo erythropoiesis.
    supporting_text: >-
      GOA ISO rows from rat include extracellular space, proliferation, neuron projection
      development, T cell proliferation, cell body, neuron differentiation, and ERK cascade
      terms.
    reference_section_type: RESULTS
- id: GO_REF:0000107
  title: >-
    Automatic transfer of experimentally verified manual GO annotation data to orthologs using
    Ensembl Compara
  findings:
  - statement: >-
      Ensembl Compara transfer contributes many broad response and neural/immune annotations
      that should not be treated as core mouse Epo biology.
    supporting_text: >-
      GOA IEA rows include response to nutrient, salt stress, lipopolysaccharide, vitamin
      A, testosterone, estrogen, axon injury, electrical stimulus, hyperoxia, interleukin-1,
      and dexamethasone.
    reference_section_type: RESULTS
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA assigns a generic response-to-stress annotation that is less informative than hypoxia-regulated
      Epo production and erythropoietic signaling.
    supporting_text: GOA includes an ARBA response to stress annotation for Epo.
    reference_section_type: RESULTS
- id: GO_REF:0000119
  title: >-
    Automated transfer of experimentally-verified manual GO annotation data to mouse-human
    orthologs
  findings:
  - statement: >-
      Mouse-human transfer captures conserved receptor binding, cytokine/hormone activity,
      secreted localization, erythropoiesis, Epo signaling, STAT signaling, and erythroid
      anti-apoptosis, but also transfers broad transcription, cell surface, osmotic, Ras,
      and proteasome terms requiring restraint.
    supporting_text: >-
      GOA ISO rows from human EPO include both canonical Epo signaling terms and many broad
      downstream response annotations.
    reference_section_type: RESULTS
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined IEA methods support receptor binding, hormone activity, extracellular localization,
      and proliferation as broad Epo outcomes.
    supporting_text: >-
      GOA IEA rows include erythropoietin receptor binding, hormone activity, extracellular
      region/space, and positive regulation of cell population proliferation.
    reference_section_type: RESULTS
- id: file:mouse/Epo/Epo-uniprot.txt
  title: UniProtKB record for mouse Epo (P07321)
  findings:
  - statement: >-
      UniProt describes Epo as a hormone that binds EPOR, activates JAK2, and regulates erythrocyte
      proliferation/differentiation and circulating erythrocyte mass.
    supporting_text: >-
      FUNCTION: Hormone involved in the regulation of erythrocyte proliferation and differentiation
      and the maintenance of a physiological level of circulating erythrocyte mass. Binds
      to EPOR leading to EPOR dimerization and JAK2 activation.
    reference_section_type: RESULTS
  - statement: UniProt localizes mouse Epo as secreted and notes kidney/liver production contexts.
    supporting_text: >-
      SUBCELLULAR LOCATION: Secreted. TISSUE SPECIFICITY: Produced by kidney or liver of adult
      mammals and by liver of fetal or neonatal mammals.
    reference_section_type: RESULTS
- id: file:mouse/Epo/Epo-deep-research-falcon.md
  title: Falcon deep research report for mouse Epo
  findings:
  - statement: >-
      Falcon verifies the target as mouse erythropoietin P07321 and identifies the core function
      as a secreted endocrine cytokine required for definitive erythropoiesis.
    supporting_text: >-
      The most strongly supported functional annotation for mouse Epo (UniProt P07321) is
      a secreted, hypoxia-inducible endocrine cytokine produced primarily by renal cortical
      interstitial REP cells that binds EPOR on erythroid progenitors to activate JAK2-dependent
      signaling required for survival and terminal differentiation in definitive erythropoiesis.
    reference_section_type: RESULTS
  - statement: >-
      Falcon summarizes mouse genetic evidence that Epo/Epor loss causes severe anemia and
      embryonic lethality around E13-E13.5 due to impaired definitive erythropoiesis.
    supporting_text: >-
      Mouse Epo and EpoR loss-of-function causes defective definitive erythropoiesis, severe
      anemia, and embryonic lethality around E13-E13.5.
    reference_section_type: RESULTS
  - statement: >-
      Falcon highlights hypoxia/HIF regulation of renal Epo production and context-dependent
      non-erythropoietic tissue effects as secondary to the core erythropoietic function.
    supporting_text: >-
      A central regulatory principle is that Epo expression is strongly induced by hypoxia
      through the HIF system in renal EPO-producing cells.
    reference_section_type: RESULTS
- id: PMID:15016652
  title: Superoxide dismutase-3 promotes full expression of the EPO response to hypoxia.
  full_text_unavailable: true
  findings:
  - statement: >-
      Mouse renal EPO mRNA induction by hypoxia is attenuated in SOD3 knockout mice, supporting
      hypoxia-regulated Epo production.
    supporting_text: hypoxic activation of HIF-1 alpha and its target gene EPO in mouse
    reference_section_type: ABSTRACT
- id: PMID:15591122
  title: BMP4 and Madh5 regulate the erythroid response to acute anemia.
  full_text_unavailable: true
  findings:
  - statement: >-
      Acute anemia/hypoxia mobilizes and differentiates erythroid progenitors in mouse spleen,
      supporting the stress erythropoiesis context for Epo action.
    supporting_text: mobilization and differentiation of erythroid progenitors in the adult
      spleen
    reference_section_type: ABSTRACT
- id: PMID:17300687
  title: >-
    Erythropoietin contributes to implantation: ectopic hemoglobin synthesis in decidual cells
    of mice.
  full_text_unavailable: true
  findings:
  - statement: >-
      Epo signaling in mouse decidua supports implantation through hemoglobin synthesis and
      decidual-cell survival.
    supporting_text: destroyed Hb-containing cells and resulted in apoptosis
    reference_section_type: ABSTRACT
- id: PMID:17981124
  title: SUMO-specific protease 1 is essential for stabilization of HIF1alpha during hypoxia.
  findings:
  - statement: >-
      SENP1 regulates hypoxia-induced Epo production through HIF1alpha stability; defective
      Epo production causes severe fetal anemia.
    supporting_text: embryos show severe fetal anemia stemming from deficient erythropoietin
      (Epo)
    reference_section_type: ABSTRACT
- id: PMID:20299672
  title: Epicardial-myocardial signaling directing coronary vasculogenesis.
  full_text_unavailable: true
  findings:
  - statement: >-
      The cached abstract supports a broad role for secreted growth factors in coronary development
      but does not itself provide direct Epo-specific evidence for the narrow cardiac GO terms.
    supporting_text: mediated in part by secreted growth factors
    reference_section_type: ABSTRACT
- id: PMID:21095239
  title: >-
    Phosphorylation of Bcl-associated death protein (Bad) by erythropoietin-activated c-Jun
    N-terminal protein kinase 1 contributes to survival of erythropoietin-dependent cells.
  findings:
  - statement: >-
      Epo supports survival of immature erythroid cells and Epo-dependent murine cells through
      JNK1-dependent Bad phosphorylation.
    supporting_text: Epo-activated JNK1 phosphorylated Bad at threonine 201
    reference_section_type: ABSTRACT
  - statement: >-
      The phosphorylation event is performed by JNK1, so Epo should be annotated as regulating
      kinase activity and erythroid survival rather than catalyzing phosphorylation.
    supporting_text: proliferation and survival of erythroid cells in response to Epo
    reference_section_type: ABSTRACT
