---
id: P07321
gene_symbol: Epo
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Epo encodes mouse erythropoietin, a secreted glycoprotein cytokine hormone of the EPO/TPO
  family. The mature ligand is produced mainly by kidney in adult mammals and liver in fetal
  or neonatal contexts, is induced by hypoxia-regulated HIF signaling, and circulates to erythroid
  progenitors where it binds EPOR and activates JAK2/STAT and MAPK-linked signaling. The core
  supported function is endocrine receptor-ligand control of definitive erythropoiesis: survival,
  proliferation, differentiation, maturation, and hemoglobinization of erythroid cells. Many
  automated response, neural, immune, cardiac-development, cell-surface, and generic transcription
  annotations reflect downstream or non-core contexts and should not obscure the primary EPOR
  ligand function.
existing_annotations:
- term:
    id: GO:0005128
    label: erythropoietin receptor binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Epo directly functions as the ligand for the erythropoietin receptor.
    action: ACCEPT
    reason: >-
      EPOR binding is the precise molecular function that initiates Epo signaling and erythroid
      outcomes.
    supported_by:
    - reference_id: file:mouse/Epo/Epo-uniprot.txt
      supporting_text: >-
        FUNCTION: Hormone involved in the regulation of erythrocyte proliferation and differentiation
        and the maintenance of a physiological level of circulating erythrocyte mass. Binds
        to EPOR leading to EPOR dimerization and JAK2 activation.
      reference_section_type: RESULTS
    - reference_id: file:mouse/Epo/Epo-deep-research-falcon.md
      supporting_text: >-
        Falcon synthesizes mouse Epo as a secreted hypoxia-inducible endocrine cytokine that
        binds EPOR on erythroid progenitors and activates JAK2-dependent signaling required
        for survival and terminal differentiation in definitive erythropoiesis.
      reference_section_type: RESULTS
    - reference_id: Reactome:R-MMU-9006326
      supporting_text: >-
        Reactome models mouse Epo binding the Epor:JAK2-containing receptor complex as the
        initiating event in erythropoietin signaling.
      reference_section_type: RESULTS
