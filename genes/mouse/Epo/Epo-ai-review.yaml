    Secreted endocrine cytokine/hormone ligand that binds erythropoietin receptor (EPOR) on
    erythroid progenitors, initiating EPOR dimerization and JAK2-dependent signaling. This
    receptor-ligand function is the specific core molecular activity of Epo and is responsible
    for downstream STAT, RAS/MAPK, and survival signaling.
