id: Q9JLN9
gene_symbol: Mtor
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: 'Mtor encodes mechanistic target of rapamycin, a large PI3K-related serine/threonine
  protein kinase. mTOR is the catalytic subunit of mTORC1 and mTORC2 complexes, integrating
  nutrient, growth-factor, energy, and stress inputs to regulate proximal outputs including
  translation, cell growth, autophagy, and AKT/PKC-family kinase signaling. Because mTOR is
  highly pleiotropic, tissue phenotypes and distal metabolic or developmental consequences
  are treated as non-core unless they directly describe TORC kinase signaling.'
