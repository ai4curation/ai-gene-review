---
id: P00184
gene_symbol: Cyp1a1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: Mouse Cyp1a1 encodes cytochrome P450 1A1, a CYP1-family heme-thiolate monooxygenase best supported as an inducible microsomal/endoplasmic-reticulum enzyme in the AHR xenobiotic-response program. Its core activity is paired-donor monooxygenation/hydroxylation of xenobiotic aromatic substrates, especially PAHs and heterocyclic amines, with context-dependent detoxication or metabolic activation. UniProt and homology evidence also support secondary metabolism of endogenous estrogens, retinoids, polyunsaturated fatty acids, and eicosanoid hydroperoxides, but these are not treated here as the primary core function. Mitochondrial localization and HSP70/HSP90 interactions are retained as non-core, homology-supported targeting context.
existing_annotations:
