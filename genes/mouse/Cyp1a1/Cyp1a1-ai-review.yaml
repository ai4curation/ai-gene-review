id: P00184
gene_symbol: Cyp1a1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:10090
  label: Mus musculus
description: >-
  Cytochrome P450 1A1 (CYP1A1) is a heme-containing monooxygenase of the cytochrome
  P450 superfamily that catalyzes Phase I oxidation of xenobiotic compounds, particularly
  polycyclic aromatic hydrocarbons (PAHs), heterocyclic amines, and polychlorinated
  biphenyls. The enzyme is transcriptionally regulated by the aryl hydrocarbon receptor
  (AHR) pathway and is strongly induced by ligands such as TCDD and benzo[a]pyrene.
  CYP1A1 primarily localizes to the endoplasmic reticulum membrane, where it uses
  NADPH and molecular oxygen to hydroxylate substrates, facilitating their detoxification
  and excretion. CYP1A1 can also bioactivate certain procarcinogens into reactive
  metabolites. Minor endogenous substrates include arachidonic acid and hydroperoxy
  fatty acids.
