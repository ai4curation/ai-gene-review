    label: steroid hydroxylase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: CYP1A1 has supported estrogen hydroxylase activities, but the broader steroid hydroxylase/steroid catabolism framing is not the best representation of the evidence and is not the core xenobiotic function.
    action: MODIFY
    reason: Prefer specific estrogen hydroxylase/metabolic terms where retained; do not treat broad steroid catabolism as core.
    proposed_replacement_terms:
    - id: GO:0101021
      label: estrogen 2-hydroxylase activity
    - id: GO:0101020
      label: estrogen 16-alpha-hydroxylase activity
    supported_by:
    - reference_id: file:mouse/Cyp1a1/Cyp1a1-uniprot.txt
      supporting_text: Exhibits high catalytic activity for the formation of hydroxyestrogens from estrone (E1) and 17beta-estradiol (E2), namely 2-hydroxy E1 and E2, as well as D-ring hydroxylated E1 and E2 at the C15alpha and C16alpha positions. Displays different regioselectivities for polyunsaturated fatty acids (PUFA) hydroxylation.
      reference_section_type: DATABASE_ENTRY
    additional_reference_ids:
    - file:mouse/Cyp1a1/Cyp1a1-uniprot.txt
- term:
    id: GO:0016712
    label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Cyp1a1 encodes a CYP1-family heme monooxygenase. UniProt and the Falcon synthesis describe the canonical P450 paired-donor monooxygenase reaction, and mouse enzyme studies support CYP1A1-dependent oxidation of aromatic xenobiotic substrates.
    action: ACCEPT
    reason: Core catalytic activity of CYP1A1.
    supported_by:
    - reference_id: file:mouse/Cyp1a1/Cyp1a1-uniprot.txt
      supporting_text: A cytochrome P450 monooxygenase involved in the metabolism of various endogenous substrates, including fatty acids, steroid hormones and vitamins. Mechanistically, uses molecular oxygen inserting one oxygen atom into a substrate, and reducing the second into a water molecule, with two electrons provided by NADPH via cytochrome P450 reductase (CPR; NADPH-ferrihemoprotein reductase).
      reference_section_type: DATABASE_ENTRY
    - reference_id: file:mouse/Cyp1a1/Cyp1a1-deep-research-falcon.md
      supporting_text: CYP1A1 is a membrane-associated heme-thiolate monooxygenase (cytochrome P450) classically found in microsomal/endoplasmic reticulum (ER) membranes as part of the mixed-function oxidase system.
      reference_section_type: LITERATURE_REVIEW
    - reference_id: PMID:8274012
      supporting_text: Kinetics of benzo[alpha]pyrene hydroxylase (AHH), 7-methoxyresorufin o-demethylase (MROD), and 7-ethoxyresorufin o-deethylase (EROD) were estimated in microsomes of Hep G2 cells infected with a recombinant vaccinia virus bearing mouse CYP1A1 or CYP1A2 cDNAs.
      reference_section_type: ABSTRACT
      full_text_unavailable: true
