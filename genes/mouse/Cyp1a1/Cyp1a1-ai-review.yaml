suggested_questions:
- question: Should mouse Cyp1a1 retain mitochondrial inner membrane and HSP70/HSP90 binding annotations when the cited support is primarily homology to rat CYP1A1 rather than direct mouse localization evidence?
- question: Should highly specific dioxin, vitamin D, flavonoid, and stress-response annotations be narrowed to xenobiotic metabolism/response terms unless direct mouse Cyp1a1 substrate evidence is available?
suggested_experiments:
- description: Perform direct mouse CYP1A1 substrate assays with purified enzyme or Cyp1a1-null rescue microsomes for vitamin D, retinoid, flavonoid, coumarin, and eicosanoid substrates to separate true CYP1A1 activities from broad CYP-family transfer.
- description: Use induced mouse tissues with fractionation or targeted proteomics to test whether mitochondrial CYP1A1 localization is reproducible and functionally significant relative to ER/microsomal CYP1A1.
