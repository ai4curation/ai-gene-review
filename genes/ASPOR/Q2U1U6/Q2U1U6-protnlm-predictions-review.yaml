  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0004553
      label: "hydrolase activity, hydrolyzing O-glycosyl compounds"
    predicted_term_type: GO_MF
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0004553 (hydrolase activity, hydrolyzing O-glycosyl compounds) is
        mechanistically incorrect for Q2U1U6. The protein's only domain annotation is
        Chondroitin_lyas (IPR008929) with a structural match to Chondroitin
        AC/alginate lyase (SSF48230), placing it firmly in the polysaccharide lyase
        (PL) superfamily, not the glycoside hydrolase (GH) superfamily. These are
        fundamentally different enzyme classes in the CAZy classification system.
        Polysaccharide lyases cleave glycosidic bonds via a beta-elimination mechanism,
        abstracting a proton from C5 of a hexuronic acid residue and eliminating across
        C4-O4 to generate products with a characteristic delta-4,5-unsaturated bond.
        Glycoside hydrolases, by contrast, cleave glycosidic bonds through hydrolysis,
        adding water across the bond. The reaction mechanisms, active site
        architectures, and products are categorically different. ProtNLM2 appears to
        have conflated the general concept of polysaccharide-degrading activity with
        glycoside hydrolase activity, likely because glycoside hydrolases are the most
        frequently annotated polysaccharide-degrading enzymes in training data. The
        correct molecular function term would be in the polysaccharide lyase activity
        branch, not the hydrolase branch.
      error_type: FREQUENCY_BIAS
      supported_by:
