description: >-
  ProtNLM2 predicted 2 GO terms for the uncharacterized protein Q2U1U6
  (AO090138000091) from Aspergillus oryzae, which has zero curated GOA annotations.
  The protein contains a Chondroitin_lyas domain (IPR008929) and SUPFAM match to
  Chondroitin AC/alginate lyase (SSF48230), placing it in the polysaccharide lyase
  superfamily. These enzymes cleave glycosidic bonds via beta-elimination, a
  mechanism fundamentally distinct from hydrolysis. GO:0000272 (polysaccharide
  catabolic process) is a correct novel prediction (COR) consistent with the
  predicted lyase activity on glycosaminoglycan substrates. GO:0004553 (hydrolase
  activity, hydrolyzing O-glycosyl compounds) is incorrect (NPI): the
  Chondroitin_lyas domain defines a polysaccharide lyase, not a glycoside
  hydrolase, and lyases and hydrolases employ categorically different catalytic
  mechanisms (beta-elimination vs. hydrolysis) corresponding to different CAZy
  superfamilies (PL vs. GH). Overall assessment: 1 COR (score 2), 1 NPI (score 0);
  combined score 2/4.
