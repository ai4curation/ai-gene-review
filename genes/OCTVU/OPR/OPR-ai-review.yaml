    OPR is a G-protein coupled receptor specific for octopressin, a nonapeptide of
    the oxytocin/vasopressin superfamily. It signals via calcium-mediated pathways
    as demonstrated in Xenopus oocyte assays. Not activated by cephalotocin or
    vertebrate OT/VP peptides. Mediates contractile actions of octopressin on
    rectum, oviduct, branchial vessel, spermatophoric gland, and anterior aorta.
