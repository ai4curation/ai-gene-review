description: >-
  ProtNLM2 predicted 1 GO term for Tetratricopeptide repeat domain 39C (TTC39C).
  Assessment: 1 correct novel (COR), 0 uncertain (UNC), 0 incorrect (NPI/PLI).
  The predicted term GO:0061371 (determination of heart left/right asymmetry) is
  biologically well-supported: the zebrafish ortholog has direct experimental
  evidence (IMP) for this process, heart left/right asymmetry determination is a
  cilium-dependent developmental process conserved across vertebrates, and TTC39C
