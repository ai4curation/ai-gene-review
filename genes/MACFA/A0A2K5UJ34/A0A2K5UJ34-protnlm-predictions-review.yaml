      summary: >-
        ProtNLM2 predicted GO:0061371 (determination of heart left/right
        asymmetry), a biological process term with no overlap in the existing GOA
        annotations for this protein (which contain only GO:0060271 cilium
        assembly and GO:0032474 otolith morphogenesis, both IEA/TreeGrafter).
        This prediction is assessed as correct and novel based on converging
        evidence. First, the zebrafish ortholog of TTC39C (Q1LXE6) has direct
        experimental evidence (IMP) for involvement in determination of heart
        left/right asymmetry, establishing that this function is genuinely
        associated with TTC39C orthologs. Second, heart left/right asymmetry
        determination is a cilium-dependent process in vertebrate development:
        motile cilia at the embryonic node generate leftward fluid flow that
        breaks bilateral symmetry and initiates the Nodal signaling cascade.
        Third, TTC39C has been experimentally confirmed to localize to cilia in
        C. elegans sensory neurons (Pir et al. 2024, Ciliogenics study), and TPR
        domain proteins are well-established ciliary scaffolds. Unlike otolith
        morphogenesis (which is taxonomically inappropriate for a primate), heart
        left/right asymmetry determination via nodal cilia is a conserved
        developmental mechanism in mammals, making this prediction biologically
        appropriate for Macaca fascicularis. The prediction adds a specific
        cilium-dependent developmental outcome beyond the generic cilium assembly
        term already in GOA, representing genuinely informative functional
        annotation.
