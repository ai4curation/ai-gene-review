suggested_questions:
- question: In which giant panda hard-keratin structure(s) is this gene expressed
    - pelage (fur) shaft, claw, or footpad - and does its expression track the hair
    cycle as seen for mammalian KRTAPs?
- question: Which human/mammalian high-sulfur KAP subfamily (e.g. KRTAP1/2/3 B2 high-sulfur
    group) is the true ortholog of this protein, and is the cysteine-repeat copy number
    lineage-specific in Ursidae?
suggested_experiments:
- description: RNA in situ hybridization or single-cell/bulk RNA-seq of giant panda
    skin and claw to localize expression to specific trichocyte compartments and confirm
    a hair/claw keratinization context.
- description: Phylogenetic and domain-architecture analysis placing this protein
    within the mammalian KRTAP high-sulfur (B2) family tree to assign the correct
    subfamily and quantify the cysteine-repeat expansion.
