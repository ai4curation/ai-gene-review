taxon:
  id: NCBITaxon:9646
  label: Ailuropoda melanoleuca
description: Predicted high-sulfur (B2-type) keratin-associated protein (KAP/KRTAP)
  of the giant panda. The protein is short (419 aa) and built almost entirely from
  cysteine-rich pentapeptide-like repeats (e.g. CCKPVCCTPVCC), the diagnostic sequence
  signature of trichocyte hard-keratin matrix proteins, and carries the Pfam high-sulfur
  B2 keratin domain (PF13885, Keratin_B2_2) and the InterPro keratin-associated protein
  signature (IPR002494). Keratin-associated proteins are the structural matrix in
  which keratin intermediate filaments are embedded in hard (trichocyte) keratins
  such as hair, fur, claw, horn and hoof; the high-sulfur, cysteine-rich members cross-link
  adjacent keratin intermediate filaments through inter- and intramolecular disulfide
  bonds, organizing them into macrofibrils and giving the keratinized structure its
  mechanical rigidity, hardness and toughness. The protein is uncharacterized at the
  protein level and all functional inference is by family/domain homology; it most
  plausibly contributes to pelage (fur) and/or claw hard-keratin structure in the
  giant panda.
