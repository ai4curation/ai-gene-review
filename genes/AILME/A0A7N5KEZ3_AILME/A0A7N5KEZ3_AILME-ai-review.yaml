      sequence and Pfam/InterPro KAP signatures are unambiguous.
- id: PMID:29797269
  title: Trichocyte Keratin-Associated Proteins (KAPs).
  findings:
  - statement: In trichocyte (hard) keratins, keratin intermediate filaments are embedded
      in a matrix of keratin-associated proteins (KAPs) that organize the filaments
      into macrofibrils and link them to one another, stabilized predominantly by
      intramolecular disulfide bonds, conferring the mechanical properties of hair,
      wool, hoof, horn, claw, baleen and quill.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified review (Fraser & Parry 2018) establishing the filament-matrix
      structural role of KAPs at the family level. No panda-specific data; used for
      family-level functional inference.
- id: PMID:12895003
  title: Characterization of human keratin-associated protein 1 family members.
  findings:
  - statement: Keratin-associated proteins form the cross-linked network of the keratin
      intermediate filament proteins that support hair fibers; high-sulfur KAP family
      members are characterized by double cysteine-containing pentapeptide repeats,
      the same repeat architecture seen in this giant panda protein.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified review of the human high-sulfur KAP1 family; directly
      relevant because this panda protein shares the diagnostic double-cysteine pentapeptide
      repeat architecture.
existing_annotations:
- term:
    id: GO:0045095
    label: keratin filament
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: ACCEPT. Keratin-associated proteins are the matrix that surrounds and
      cross-links keratin intermediate filaments, so the keratin-filament cellular-component
      term is the standard, well-supported localization for this family. The InterPro
      IPR002494 (KAP) -> keratin filament mapping is the same mapping that places
      human KRTAPs at the keratin filament.
    action: ACCEPT
    reason: The protein is a high-sulfur (B2) keratin-associated protein (Pfam PF13885,
      InterPro IPR002494) whose biological role is structural cross-linking of keratin
      intermediate filaments into the hard-keratin matrix [PMID:29797269]. Keratin
      filament is the appropriate, conventional cellular-component term for KAPs (cross-checked
      against human KRTAP4-3, UniProtKB:Q9BYR4, which carries the identical InterPro
      keratin-filament annotation). This is the most informative existing annotation
      and reflects the core localization, though no panda-specific experimental data
      exist.
    supported_by:
    - reference_id: file:AILME/A0A7N5KEZ3_AILME/A0A7N5KEZ3_AILME-uniprot.txt
      supporting_text: GO; GO:0045095; C:keratin filament; IEA:InterPro.
    - reference_id: PMID:29797269
      supporting_text: keratin intermediate filaments (IF) of diameter 7.5 nm are
        embedded in a matrix formed from at least 89 different types of keratin-associated
        proteins (KAPs)
  qualifier: located_in
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: MARK_AS_OVER_ANNOTATED. A generic, low-information localization that ARBA
      assigns broadly across keratin-associated proteins (human KRTAPs carry the same
      ARBA cytosol annotation, additionally given TAS by Reactome). It is not wrong enough
      to remove, but it does not represent the core function or the informative localization
      of a structural hard-keratin matrix protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: Biologically the relevant location of a KAP is the cross-linked keratin
      matrix of the cornified hair/claw, captured by the keratin-filament term, not
      free cytosol. The cytosol annotation is a broad ARBA rule-based assignment (GO_REF:0000117)
      seen across the KRTAP family rather than a gene-specific finding, so it is a
      generic over-annotation rather than an informative, gene-specific localization.
    supported_by:
    - reference_id: file:AILME/A0A7N5KEZ3_AILME/A0A7N5KEZ3_AILME-uniprot.txt
      supporting_text: GO; GO:0005829; C:cytosol; IEA:UniProtKB-ARBA.
  qualifier: located_in
core_functions:
- description: Acts as a structural high-sulfur keratin-associated (matrix) protein
    that cross-links keratin intermediate filaments via disulfide bonds, contributing
    to the formation and mechanical integrity of hard (trichocyte) keratin structures
    such as fur and claw. Inferred from domain/family homology (Pfam PF13885, InterPro
    IPR002494, cysteine-repeat architecture); no panda-specific experimental evidence
    is available.
