      summary: >-
        ProtNLM2 predicted GO:0006468 (protein phosphorylation), the biological
        process of covalent addition of phosphate groups to amino acid residues in
        proteins. A0BFB4 contains a canonical protein kinase catalytic domain
        (Pfam PF00069, residues 96-348) with a conserved serine/threonine kinase
        active site (IPR008271) and ATP-binding site (IPR017441), and is already
        annotated in GOA with GO:0004674 (protein serine/threonine kinase activity)
        via both IBA and IEA evidence. Protein phosphorylation is the process
        directly enabled by protein kinase activity -- a kinase that catalyzes
        ATP-dependent transfer of phosphate to Ser/Thr residues is by definition
        involved in protein phosphorylation. The prediction is therefore correct but
        not novel: the biological process is logically entailed by the existing
        molecular function annotation. Additionally, GOA already includes
        GO:0005524 (ATP binding), which further corroborates the catalytic competence
        of this kinase. While the specific substrates and pathway context of A0BFB4
        remain unknown (it belongs to a massively expanded kinome of 2606 kinases in
        P. tetraurelia), the general involvement in protein phosphorylation is
        unambiguous from its domain architecture.
