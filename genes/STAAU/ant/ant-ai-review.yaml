  review:
    summary: The negated annotation is retained; this ANT(9) enzyme should not be asserted as aminoglycoside 3''-adenylyltransferase activity.
    action: ACCEPT
    reason: UniProt describes this protein as a spectinomycin 9-adenylyltransferase that mediates spectinomycin but not streptomycin resistance, and the PMID:29871922 study distinguishes ANT(9) enzymes from dual ANT(3'')(9) enzymes. Accepting this row preserves the existing NOT qualifier rather than treating the specific 3'' activity as positive evidence.
    supported_by:
