id: A0A8J0SCI2
gene_symbol: A0A8J0SCI2
taxon:
  id: NCBITaxon:8364
  label: Xenopus tropicalis
status: COMPLETE
description: >-
  ProtNLM2 predicted 4 GO terms for gastrula zinc finger protein XlCGF17.1-like
  (A0A8J0SCI2), a 265-residue Krueppel-type C2H2 zinc finger protein with 8 tandem
  C2H2 zinc finger domains and no KRAB, SCAN, or BTB effector domains. Three of four
  predictions (GO:0000978 cis-regulatory DNA binding, GO:0006357 regulation of Pol II
  transcription, GO:0005634 nucleus) correctly recapitulate existing IBA annotations
  and are scored CNN (correct but not novel). The fourth prediction, GO:0001228
  (transcription activator activity, RNA polymerase II-specific), is scored NPI
  (incorrect) because it unjustifiably specifies activator function for a protein
  whose effector domain architecture (pure zinc finger array, no activation or
  repression domains) provides no evidence of activator versus repressor activity;
  the existing IBA annotation appropriately uses the parent term GO:0000981 which is
  agnostic to directionality. Overall score: 3 CNN (6 points) + 1 NPI (0 points) =
  6/8 points. ProtNLM2 accurately captures the general transcription factor biology
  of this protein but over-specifies the molecular function by predicting activator
  activity without supporting evidence.
source_documents:
  - genes/XENTR/A0A8J0SCI2/A0A8J0SCI2-uniprot.txt
  - genes/XENTR/A0A8J0SCI2/A0A8J0SCI2-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0000978
      label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
    predicted_term_type: GO_MF
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        This prediction correctly identifies sequence-specific DNA binding at RNA
        polymerase II cis-regulatory regions, which is well-supported by the presence
        of 8 tandem C2H2 zinc finger domains spanning residues 37-260. Each zinc finger
        module makes base-specific contacts in the DNA major groove, enabling
        sequence-specific recognition of regulatory DNA elements. However, this is not
        a novel prediction: GO:0000978 is already present as an IBA annotation from
        PANTHER phylogenetic inference (GO_Central, GO_REF:0000033), and the protein
        is classified within the Krueppel C2H2-type zinc finger family where this
        function is expected. The prediction matches an exact existing GOA annotation
        (GO:0003677 DNA binding is the stated comparator but the actual existing
        annotation is the more specific GO:0000978 itself).
      supported_by:
        - reference_id: UniProtKB:A0A8J0SCI2
          supporting_text: >-
            Belongs to the krueppel C2H2-type zinc-finger protein family.
            {ECO:0000256|ARBA:ARBA00006991}.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
    predicted_term_type: GO_BP
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        Regulation of transcription by RNA polymerase II is the expected core biological
        process for a Krueppel-type C2H2 zinc finger transcription factor. The protein
        has the canonical domain architecture (tandem C2H2 zinc fingers) and UniProt
        notes it "may be involved in transcriptional regulation." This prediction is
        correct but not novel: GO:0006357 is already present as an IBA annotation from
        PANTHER phylogenetic inference (GO_Central, GO_REF:0000033). The existing
        annotation GO:0000981 (DNA-binding TF activity, RNA pol II-specific) captures
        the molecular function aspect; GO:0006357 captures the biological process.
        Both are already in GOA.
      supported_by:
        - reference_id: UniProtKB:A0A8J0SCI2
          supporting_text: >-
            FUNCTION: May be involved in transcriptional regulation.
            {ECO:0000256|ARBA:ARBA00003767}.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005634
      label: nucleus
    predicted_term_type: GO_CC
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        Nuclear localization is strongly supported for a C2H2 zinc finger transcription
        factor whose function requires binding genomic DNA in the nucleus. The protein
        has 8 tandem C2H2 zinc finger domains that mediate sequence-specific DNA binding,
        necessitating nuclear localization. UniProt ARBA annotation independently
        predicts nucleus (ARBA00004123). This prediction is correct but not novel:
        GO:0005634 is already annotated twice in GOA -- once via IBA (PANTHER,
        GO_REF:0000033 with qualifier is_active_in) and once via IEA (UniProt subcellular
        location mapping, GO_REF:0000044 with qualifier located_in).
      supported_by:
        - reference_id: UniProtKB:A0A8J0SCI2
          supporting_text: >-
            SUBCELLULAR LOCATION: Nucleus {ECO:0000256|ARBA:ARBA00004123}.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0001228
      label: "DNA-binding transcription activator activity, RNA polymerase II-specific"
    predicted_term_type: GO_MF
    review:
      assessment: NPI
      confidence_score: 0
      error_type: PARALOG_OVERANNOTATION
      summary: >-
        This prediction incorrectly specifies transcription activator activity for a
        protein where no evidence supports activator versus repressor function.
        A0A8J0SCI2 is a pure zinc finger array protein with 8 tandem C2H2 zinc finger
        domains spanning nearly its entire length (residues 37-260) and a short
        N-terminal disordered region (residues 1-27). Critically, it lacks any known
        effector domains -- no KRAB repressor domain, no SCAN dimerization domain, no
        BTB/POZ domain, and no identifiable activation domain. Without an effector
        domain, the directionality of transcriptional regulation (activation vs.
        repression) cannot be inferred from sequence alone. The existing IBA annotation
        appropriately uses the parent term GO:0000981 (DNA-binding transcription factor
        activity, RNA polymerase II-specific), which is agnostic to activator/repressor
        function. As noted in the gene review, ProtNLM2 likely derived this prediction
        from sequence similarity to KRAB-ZNF proteins (CATH FunFam assignments include
        ZNF1184 and ZNF527/577, which are KRAB-containing repressors), but this protein
        lacks the KRAB domain entirely, making the activator/repressor specificity
        prediction unreliable. The error is classified as PARALOG_OVERANNOTATION because
        the prediction inappropriately transfers a specific functional characteristic
        (activator activity) from distantly related zinc finger proteins with different
        domain architectures. An independent OpenScientist investigation (see file reference)
        confirms this NPI: A0A8J0SCI2 is a naked tandem 8x C2H2 array with no accessory effector
        domain of any kind, and because a zinc-finger array encodes DNA sequence specificity
        rather than regulatory direction, activator-versus-repressor cannot be inferred from
        sequence -- so the safest curation is to retain the neutral GO:0000981 and withhold
        GO:0001228. NPI confirmed (an over-specific directional child term); the protein remains
        a legitimate candidate sequence-specific TF, just not demonstrably an activator.
      supported_by:
        - reference_id: file:XENTR/A0A8J0SCI2/A0A8J0SCI2-hypotheses/prediction-tf-activator/openscientist.md
          supporting_text: no accessory effector domain of any kind
        - reference_id: UniProtKB:A0A8J0SCI2
          supporting_text: >-
            FUNCTION: May be involved in transcriptional regulation.
            {ECO:0000256|ARBA:ARBA00003767}.
