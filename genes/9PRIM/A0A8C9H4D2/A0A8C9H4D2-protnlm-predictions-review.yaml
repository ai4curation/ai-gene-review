predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0031012
      label: extracellular matrix
    predicted_term_type: GO_CC
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0031012 (extracellular matrix), a cellular
        component term that is not present in the existing GOA annotations for
        this protein. The existing CC annotation is GO:0005615 (extracellular
        space, IEA:TreeGrafter), which is a broader localization. This
        prediction is assessed as correct and novel based on multiple lines of
        evidence. OLFML2A is a secreted glycoprotein (UniProt keyword
        "Secreted", ARBA evidence) containing a C-terminal olfactomedin-like
        domain (IPR003112, Pfam PF02191). Olfactomedin-family proteins are
        characteristically matricellular glycoproteins that function within the
        extracellular matrix rather than simply being soluble in the
        extracellular space. The AI review of this protein explicitly identifies
        it as a "matricellular regulatory protein involved in
        cell-extracellular matrix communication, cell adhesion, and modulation
        of cell migration," and the core function annotation assigns
        GO:0005201 (extracellular matrix structural constituent) as the
        molecular function. ECM localization is the natural compartment for a
        protein with this domain architecture and functional profile.
        GO:0031012 (extracellular matrix) is a child of GO:0005576
        (extracellular region, the existing GOA annotation from GO_REF:0000044)
        and provides a more precise and informative localization, making this a
        genuinely novel and useful prediction not captured by existing
        annotations.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0030198
      label: extracellular matrix organization
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0030198 (extracellular matrix organization), a
        biological process term absent from the existing GOA annotations for
        this protein. The only existing BP annotation is GO:0007165 (signal
        transduction, IEA:TreeGrafter), which the AI review flagged as an
        over-annotation because OLFML2A's influence on signaling is indirect,
        mediated through ECM interactions rather than conventional signal
        transduction. This prediction is assessed as correct and novel. OLFML2A
        is a secreted olfactomedin-family glycoprotein whose core function is
        described as a "matricellular regulator" that "contributes to
        extracellular matrix organization, cell adhesion, and modulation of
        cell migration." The protein contains the olfactomedin-like domain
        (IPR003112), which adopts a five-bladed beta-propeller fold mediating
        protein-protein interactions in the extracellular space -- a structural
        basis consistent with a role in organizing ECM components. ECM
        organization is a well-established biological process for secreted
        matricellular proteins that modulate the structural and signaling
        properties of the matrix without being classical structural components
        like collagens. This prediction captures a biologically informative
        process that is more specific and accurate than the existing signal
        transduction annotation, and fills a gap in the current functional
        annotation of OLFML2A.
