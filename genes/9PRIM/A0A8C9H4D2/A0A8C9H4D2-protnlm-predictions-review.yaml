id: A0A8C9H4D2
gene_symbol: OLFML2A
taxon:
  id: NCBITaxon:591936
  label: Piliocolobus tephrosceles
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for Olfactomedin-Like 2A (OLFML2A), a secreted
  glycoprotein of the olfactomedin superfamily. Assessment: 2 correct novel
  (COR), 0 uncertain (UNC), 0 incorrect (NPI/PLI). Both predictions --
  GO:0031012 (extracellular matrix) and GO:0030198 (extracellular matrix
  organization) -- are biologically well-supported by the protein's domain
  architecture, secreted localization, and established matricellular function.
  The existing GOA annotations cover only extracellular space (GO:0005615) and
  the overly broad signal transduction (GO:0007165); these ProtNLM2 predictions
  capture the more specific ECM localization and ECM-related biological process
  that are consistent with OLFML2A's role as a matricellular regulatory protein
  but absent from the current curated annotation set.
source_documents:
  - genes/9PRIM/A0A8C9H4D2/A0A8C9H4D2-uniprot.txt
