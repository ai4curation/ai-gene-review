    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        GO:0015276 (ligand-gated monoatomic ion channel activity) is unequivocally
        wrong for D3VIU4. This protein is FliY, the periplasmic substrate-binding
        component of the FliY-YecSC (TcyJLN) ABC transporter for L-cystine import.
        It belongs to bacterial solute-binding protein family 3 (PF00497, IPR001638,
        CDD cd13711 PBP2_Ngo0372_TcyA), a well-characterized family of soluble
        periplasmic proteins that bind amino acids or compatible solutes and deliver
        them to cognate ABC transporter permeases. The protein has a cleavable signal
        peptide (residues 1-28) for periplasmic secretion and no transmembrane helices
        whatsoever. Ligand-gated ion channels, by contrast, are integral membrane
        proteins with multiple transmembrane segments that form a selective ion-
        conducting pore opened by ligand binding -- a completely different protein
        architecture and mechanism. No domain hit (InterPro, Pfam, CDD, PANTHER,
        PROSITE), no eggNOG orthologous group (COG0834, which covers extracellular
        solute-binding proteins), and no literature on FliY orthologs in E. coli or
        other Enterobacterales supports any ion channel activity. The known molecular
        function of FliY is amino acid binding (GO:0016597) in the context of
        L-cystine transport (GO:0015811). This prediction appears to be a frequency-
        biased misassignment, possibly driven by superficial sequence features that
        the model incorrectly associates with channel activity rather than substrate
        binding.
      error_type: FREQUENCY_BIAS
