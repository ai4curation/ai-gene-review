id: D3VIU4
gene_symbol: D3VIU4
taxon:
  id: NCBITaxon:406817
  label: Xenorhabdus nematophila
status: COMPLETE
description: >-
  ProtNLM2 predicted 1 GO term for D3VIU4 (FliY), the periplasmic cystine-binding
  protein of the FliY-YecSC ABC transporter in Xenorhabdus nematophila. The single
  prediction, GO:0015276 (ligand-gated monoatomic ion channel activity), is
  biologically incorrect. FliY is a soluble periplasmic solute-binding protein of
  the bacterial SBP family 3 (PF00497/IPR001638) that captures L-cystine and
  delivers it to the inner-membrane YecSC complex for ATP-driven import. It contains
  an N-terminal signal peptide (residues 1-28) for periplasmic export but lacks any
  transmembrane helices or pore-forming domains. Ligand-gated ion channels are
  integral membrane proteins with multiple transmembrane segments forming a
  selective ion pore, a structural and functional class entirely unrelated to
  periplasmic binding proteins. No domain, family, or literature evidence supports
  ion channel activity for this protein. The prediction likely reflects a
  frequency-biased misassignment by the model, possibly conflating the word
  "ligand-gated" (substrate-activated) with "ligand-binding" (substrate-capturing),
  but the two functional categories are mechanistically and structurally distinct.
  Assessment: 0 correct, 0 uncertain, 1 incorrect (NPI). Total CS = 0/2.
