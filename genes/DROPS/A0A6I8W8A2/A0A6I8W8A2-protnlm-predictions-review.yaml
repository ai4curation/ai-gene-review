      summary: >-
        GO:0016874 (ligase activity) is incorrect for this protein. The
        prediction appears driven by the automated RefSeq protein name
        "Probable E3 ubiquitin-protein ligase HERC3 isoform X3" rather
        than the actual domain content. HERC family E3 ligases require a
        C-terminal HECT (Homologous to E6-AP Carboxyl Terminus) domain to
        catalyze the transfer of ubiquitin from an E2 conjugating enzyme
        to substrate proteins. This 169 AA protein is far too short to
        contain a HECT domain (typically 350+ AA) and its entire domain
        architecture consists exclusively of two RCC1 repeats (positions
        32-87 and 88-142), as confirmed by PROSITE, Pfam (PF00415 RCC1,
        PF13540 RCC1_2), InterPro (IPR000408), and Gene3D
        (2.130.10.30). The RCC1 repeat region in HERC proteins functions
        in substrate recognition and protein-protein interactions, not in
        catalytic ubiquitin ligation. This isoform X3 likely represents
        a truncated splice variant retaining only the N-terminal
        substrate-binding region of the full-length HERC3 ortholog. An
        appropriate molecular function annotation for this fragment would
        be in the protein binding domain (e.g., contributing to substrate
        recognition in a complex), not ligase activity. The protein has
        no curated GOA annotations and is unreviewed in UniProt (PE 4,
        predicted), further indicating that no experimental or curated
        evidence supports ligase activity for this specific gene product.
      error_type: FREQUENCY_BIAS
