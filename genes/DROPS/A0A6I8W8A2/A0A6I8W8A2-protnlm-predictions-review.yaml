description: >-
  ProtNLM2 predicted 1 GO term for A0A6I8W8A2, annotated by RefSeq as
  Probable E3 ubiquitin-protein ligase HERC3 isoform X3. The prediction of
  GO:0016874 (ligase activity) appears to be derived from the protein name
  rather than its actual domain architecture. This 169 AA protein contains
  only RCC1 (Regulator of Chromosome Condensation 1) repeats and entirely
  lacks the HECT catalytic domain that confers E3 ubiquitin-protein ligase
  activity in HERC family proteins. Full-length HERC3 in Drosophila
  melanogaster (and human) contains both an N-terminal RCC1 repeat region
  for substrate recognition and a C-terminal HECT domain for ubiquitin
  transfer; this short isoform X3 retains only the former. Without the HECT
  domain, this fragment cannot catalyze ubiquitin ligation, making the
  ligase activity prediction incorrect. The protein is unreviewed (TrEMBL),
  evidence level PE 4 (predicted), and has no curated GOA annotations.
  Assessment: 0 correct, 1 incorrect (NPI). Total CS = 0/2.
