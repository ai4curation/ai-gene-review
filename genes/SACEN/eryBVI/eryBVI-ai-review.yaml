id: A4F7N4
gene_symbol: eryBVI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBVI is a lyase (dehydratase) of the TDP-L-mycarose biosynthetic branch of erythromycin
  biosynthesis in Saccharopolyspora erythraea (UniProt/EMBL/MIBiG name: NDP-4-keto-6-deoxyglucose
  2,3-dehydratase). It catalyzes a 2,3-dehydration of the TDP-keto-deoxysugar intermediate during
  assembly of the L-mycarose donor.
