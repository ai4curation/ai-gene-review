  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  This protein (locus CAM00053) is a putative erythromycin (macrolide) esterase encoded at the
  edge of the erythromycin cluster in Saccharopolyspora erythraea. Erythromycin esterases of the
  Ere family hydrolyze the macrolactone ring of erythromycin, inactivating the antibiotic - a
  recognized macrolide-resistance mechanism. Its precise role in the producing organism (e.g.
  contribution to self-resistance/homeostasis versus an unrelated function) is not established;
  GOA currently carries only a "response to antibiotic" process annotation.
