  review:
    summary: >-
      Acyl-[ACP] thioesterase/hydrolase activity. The chemistry (hydrolysis of an acyl-thioester
      from the carrier protein) is correct, but GO:0016297 asserts a FATTY-acyl substrate, whereas
      this type II PKS editing thioesterase acts on a POLYKETIDE acyl-ACP. The substrate-specific
      fatty-acyl term is therefore inaccurate.
    action: MODIFY
    reason: >-
      Wrong substrate class (fatty-acyl vs polyketide acyl). Replace with the substrate-neutral
      parent GO:0016790 (thiolester hydrolase activity), which accurately describes the
      thioesterase chemistry without the fatty-acid claim.
