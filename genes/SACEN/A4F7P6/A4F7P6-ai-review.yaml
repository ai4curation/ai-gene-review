  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  This protein (locus CAM00070) is the type II thioesterase (TEII) associated with the
  erythromycin polyketide synthase in Saccharopolyspora erythraea. Type II thioesterases act as
  editing/proofreading enzymes for modular PKSs: they hydrolyze aberrant or stalled acyl groups
  from the acyl carrier protein (ACP) thiol, regenerating functional carrier protein and thereby
  maintaining the fidelity and throughput of polyketide assembly. It is distinct from the
  C-terminal (type I) thioesterase of EryAIII that releases the finished macrolactone.
