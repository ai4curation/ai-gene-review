id: A4F7N1
gene_symbol: eryBVII
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBVII is the dTDP-sugar 3,5-epimerase (RmlC/EvaD-type; EC 5.1.3.13) of the erythromycin
  deoxysugar pathways in Saccharopolyspora erythraea. It catalyzes the 3,5-epimerization of a
  TDP-4-keto-6-deoxyhexose intermediate and is shared between the TDP-L-mycarose and
  TDP-D-desosamine branches that supply the two sugars decorating the macrolactone. The reaction
  (a double epimerization at C-3 and C-5) is the same as that of the rhamnose-pathway epimerase,
  which is why automated tools assign rhamnose-pathway terms; the biological context here is
  erythromycin biosynthesis, not rhamnose biosynthesis.
