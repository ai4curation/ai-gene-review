  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryG is the S-adenosyl-L-methionine-dependent erythromycin 3''-O-methyltransferase
  (EC 2.1.1.254) of the erythromycin biosynthetic pathway in Saccharopolyspora erythraea.
  It O-methylates the 3''-hydroxyl of the L-mycarose sugar to form L-cladinose, the final
  tailoring step that converts erythromycin C to erythromycin A (and erythromycin D to
  erythromycin B). It belongs to the class I SAM-dependent methyltransferase superfamily.
