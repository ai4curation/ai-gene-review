proposed_new_terms:
- proposed_name: dTDP-4-keto-2,6-dideoxyhexose 3-C-methyltransferase activity
  proposed_definition: >-
    Catalysis of the SAM-dependent transfer of a methyl group to C-3 of a
    dTDP-4-keto-2,6-dideoxyhexose, forming the C-3 methyl branch of TDP-L-mycarose.
  justification: >-
