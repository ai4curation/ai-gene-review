  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBIII is the S-adenosyl-L-methionine-dependent C-methyltransferase of the TDP-L-mycarose
  biosynthetic branch of erythromycin biosynthesis in Saccharopolyspora erythraea (UniProt/EMBL/
  MIBiG name: NDP-4-keto-2,6-dideoxyhexose 3-C-methyltransferase). It installs the C-3 methyl
  branch that distinguishes L-mycarose (a branched-chain deoxysugar) from other deoxyhexoses. The
  UniProt entry is a minimally-curated TrEMBL record with no GOA annotations; function is assigned
  from the cluster context and the enzyme name (homology-based).
