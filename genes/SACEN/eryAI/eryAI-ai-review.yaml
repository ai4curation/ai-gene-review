- id: PMID:38501175
  title: 'Architecture of full-length type I modular polyketide synthases revealed by X-ray crystallography, cryo-electron microscopy, and AlphaFold2.'
  findings:
  - statement: >-
      Modular type I PKSs (the DEBS family) build polyketides assembly-line fashion, passing the
      ACP-bound chain between catalytic domains; recent X-ray/cryo-EM/AlphaFold2 structures
      (including DEBS module 1) define the architecture.
    supporting_text: >-
      Type I modular polyketide synthases construct polyketide natural products in an assembly
      line-like fashion, where the growing polyketide chain attached to an acyl carrier protein is
      passed from catalytic domain to catalytic domain
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Recent (2024) authoritative review of full-length modular type I PKS architecture, explicitly
      covering DEBS module 1 (S. erythraea); a structural/expert-synthesis line of evidence
      corroborating the modular erythronolide synthase mechanism. Surfaced by the module
      deep-research run and PubMed-verified.
