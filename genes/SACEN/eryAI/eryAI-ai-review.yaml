  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryAI (DEBS1) is the first subunit of the 6-deoxyerythronolide B synthase (DEBS), the modular
  type I polyketide synthase that assembles the macrolactone core of erythromycin in
  Saccharopolyspora erythraea (EC 2.3.1.94). DEBS comprises three giant multimodular polypeptides
  (EryAI/AII/AIII); EryAI contains the loading didomain plus extension modules 1 and 2. Each
  module is a set of catalytic domains - ketosynthase (KS), acyltransferase (AT, which selects the
  (2S)-methylmalonyl-CoA extender), ketoreductase (KR), and acyl carrier protein (ACP,
  phosphopantetheinylated) - that carry out one round of FAS-like decarboxylative chain extension
  and reduction, building two of the six extension cycles that yield 6-deoxyerythronolide B. DEBS
  is the textbook model of assembly-line (modular) polyketide biosynthesis.
references:
- id: PMID:2024119
  title: Modular organization of genes required for complex polyketide biosynthesis.
  findings:
  - statement: >-
      The erythromycin polyketide synthase genes are organized into six modules, the basis of
      assembly-line polyketide biosynthesis.
    supporting_text: >-
      the genes that govern synthesis of the polyketide portion of the macrolide antibiotic
      erythromycin are organized in six
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified; the seminal description of the modular DEBS architecture.
