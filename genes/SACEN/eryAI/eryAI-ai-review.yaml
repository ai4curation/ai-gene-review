core_functions:
- description: >-
    First subunit (DEBS1) of the modular type I polyketide synthase 6-deoxyerythronolide B synthase
    (EC 2.3.1.94); contains the loading didomain and extension modules 1-2 (KS/AT/KR/ACP), carrying
    out the first chain-extension cycles that build the erythromycin macrolactone. Component
    activities include polyketide ketosynthase, (methyl)malonyl-CoA acyltransferase (AT),
    ketoreductase, and ACP phosphopantetheine carrier.
  molecular_function:
    id: GO:0047879
    label: erythronolide synthase activity
