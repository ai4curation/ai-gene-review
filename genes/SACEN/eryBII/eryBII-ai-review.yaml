id: A4F7P4
gene_symbol: eryBII
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBII is an NAD(P)-dependent oxidoreductase of the TDP-L-mycarose biosynthetic branch of
  erythromycin biosynthesis in Saccharopolyspora erythraea (UniProt/EMBL/MIBiG name:
  TDP-4-keto-6-deoxyhexose 2,3-reductase). It reduces a TDP-keto-deoxysugar intermediate during
  assembly of the L-mycarose donor that EryBV attaches to the macrolactone.
references:
- id: file:SACEN/eryBII/eryBII-uniprot.txt
  title: UniProtKB A4F7P4 (eryBII) record - TDP-4-keto-6-deoxyhexose 2,3-reductase
  findings:
  - statement: >-
      EryBII is a TDP-4-keto-6-deoxyhexose 2,3-reductase of the mycarose pathway.
    supporting_text: >-
      TDP-4-keto-6-deoxyhexose 2,3-reductase
  reference_review:
    relevance: HIGH
    correctness: UNVERIFIED
    review_notes: >-
      TrEMBL entry; name indicates a TDP-sugar 2,3-reductase. The EC 1.1.1.91 / aryl-alcohol
      dehydrogenase mapping in GOA is a substrate-class mismatch (see review).
- id: GO_REF:0000003
  title: Gene Ontology annotation based on the manual assignment of UniProtKB keywords in InterPro records
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple Source Sequence Analysis
existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Cytosolic localization for a soluble deoxysugar-biosynthesis enzyme.
    action: ACCEPT
    reason: Correct cellular component.
- term:
    id: GO:0047681
    label: aryl-alcohol dehydrogenase (NADP+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      Substrate-class mismatch. EryBII reduces a TDP-keto-deoxysugar intermediate (mycarose
      biosynthesis), not an aromatic (aryl) alcohol. The aryl-alcohol dehydrogenase term (and the
      associated EC 1.1.1.91 mapping) is an artifact of the NAD(P)-oxidoreductase signature.
    action: MODIFY
    reason: >-
      The specific aryl-alcohol substrate is wrong; the actual activity is a TDP-sugar
      oxidoreductase/reductase. Rather than merely flag over-annotation, generalize to the
      substrate-neutral parent GO:0016491 (oxidoreductase activity), which captures the sound
      essence (a NAD(P)-dependent oxidoreductase) without the incorrect aryl-alcohol substrate
      claim; no specific GO term for the TDP-sugar 2,3-reductase reaction is available.
    proposed_replacement_terms:
    - id: GO:0016491
      label: oxidoreductase activity
    supported_by:
    - reference_id: file:SACEN/eryBII/eryBII-uniprot.txt
      supporting_text: >-
        TDP-4-keto-6-deoxyhexose 2,3-reductase
