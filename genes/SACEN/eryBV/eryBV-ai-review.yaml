id: A4F7N6
gene_symbol: eryBV
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBV is the mycarosyltransferase of the erythromycin biosynthetic pathway in
  Saccharopolyspora erythraea and the paralog of the desosaminyltransferase EryCIII (both GT-B
  macrolide glycosyltransferases). It transfers L-mycarose from the nucleotide sugar donor
  TDP-L-mycarose onto the erythronolide aglycone (erythronolide B / 6-deoxyerythronolide B),
  forming 3-O-mycarosyl-erythronolide B - the first of the two glycosylation steps that decorate
  the macrolactone before desosaminylation by EryCIII. The UniProt entry is a minimally curated
  TrEMBL record and the GOA terms are electronic (IEA); function is assigned from cluster context
  and the TDP-mycarosyl glycosyltransferase identity.
references:
- id: file:SACEN/eryBV/eryBV-uniprot.txt
  title: UniProtKB A4F7N6 (eryBV) record - "6-DEB TDP-mycarosyl glycosyltransferase"
  findings:
  - statement: >-
      EryBV is a TDP-mycarosyl glycosyltransferase (donor is a TDP-sugar, not a UDP-sugar).
    supporting_text: >-
      6-DEB TDP-mycarosyl glycosyltransferase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      TrEMBL SubName (ECO:0000313|EMBL); establishes the TDP-mycarose donor identity used for the
      donor-specificity correction. No experimental annotation is attached to this gene.
- id: file:SACEN/eryBV/eryBV-notes.md
  title: eryBV review notes (erythromycin pathway concept)
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
- id: GO_REF:0000117
  title: Gene Ontology annotation based on Ensembl/EnsemblGenomes orthology
existing_annotations:
- term:
    id: GO:0008194
    label: UDP-glycosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based (IEA) UDP-glycosyltransferase activity. EryBV uses TDP-L-mycarose, a
      dTDP-sugar, as its donor (UniProt/EMBL name), not a UDP-sugar, so the UDP-specific term is
      incorrect - the same donor-specificity error seen for the paralog EryCIII.
    action: MODIFY
    reason: >-
      Wrong donor specificity (TDP, not UDP). Replace with the accurate GO:0016758
      (hexosyltransferase activity).
    proposed_replacement_terms:
    - id: GO:0016758
      label: hexosyltransferase activity
    supported_by:
    - reference_id: file:SACEN/eryBV/eryBV-uniprot.txt
      supporting_text: >-
        6-DEB TDP-mycarosyl glycosyltransferase
- term:
    id: GO:0016757
    label: glycosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: IEA general glycosyltransferase activity; correct broad parent of the mycarosyl transfer.
    action: ACCEPT
    reason: Accurate general molecular function.
- term:
    id: GO:0016758
    label: hexosyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      IEA hexosyltransferase activity (orthology); accurate for transfer of the deoxyhexose
      L-mycarose.
    action: ACCEPT
    reason: Accurate molecular function (deoxyhexose transfer).
- term:
    id: GO:0017000
    label: antibiotic biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      IEA antibiotic biosynthetic process. Correct (erythromycin is an antibiotic); the more
      specific GO:1901115 erythromycin biosynthetic process is captured in core_functions.
    action: ACCEPT
    reason: Accurate biological process; a more specific child term is proposed as the core annotation.
core_functions:
- description: >-
    Mycarosyltransferase (paralog of EryCIII): transfers L-mycarose from TDP-L-mycarose to the
    erythronolide aglycone, forming 3-O-mycarosyl-erythronolide B - the first glycosylation step
    of erythromycin biosynthesis. Function inferred from cluster context and the TDP-mycarosyl GT
    identity (UniProt A4F7N6; MIBiG BGC0000055).
  molecular_function:
    id: GO:0016758
    label: hexosyltransferase activity
  directly_involved_in:
    - id: GO:1901115
      label: erythromycin biosynthetic process
  supported_by:
  - reference_id: file:SACEN/eryBV/eryBV-uniprot.txt
    supporting_text: >-
      6-DEB TDP-mycarosyl glycosyltransferase
proposed_new_terms:
- proposed_name: TDP-L-mycarose erythronolide-B mycarosyltransferase activity
  proposed_definition: >-
    Catalysis of the transfer of L-mycarose from TDP-L-mycarose to the 3-hydroxyl of an
    erythronolide aglycone (erythronolide B / 6-deoxyerythronolide B), producing
    3-O-mycarosyl-erythronolide B and TDP. The mycarosylation step of erythromycin biosynthesis.
  justification: >-
    There is no specific GO MF term for the mycarosyltransferase reaction; EryBV is annotated only
    with general glycosyltransferase / hexosyltransferase parents (and an incorrect UDP-specific
    term). A specific term would parallel the (also-missing) EryCIII desosaminyltransferase term.
suggested_questions:
- question: >-
    Does EryBV, like its paralog EryCIII, require an auxiliary activator protein for full
    mycarosyltransferase activity, or does it function as a standalone GT?
suggested_experiments:
- description: >-
    Reconstitute EryBV in vitro with TDP-L-mycarose and an erythronolide acceptor (with/without
    candidate activator partners) to confirm donor/acceptor specificity and any activator
    requirement; this would also provide experimental (IDA) support to replace the current IEA-only
    annotations.
