id: A4F7N5
gene_symbol: eryCVI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryCVI is the S-adenosyl-L-methionine-dependent N,N-dimethyltransferase of the TDP-D-desosamine
  biosynthetic pathway in Saccharopolyspora erythraea (UniProt/EMBL/MIBiG name:
  TDP-desosamine-N-dimethyltransferase). It dimethylates the C-3 amino group of the deoxysugar to
  give the N,N-dimethylamino group of D-desosamine, the final step of desosamine biosynthesis
  before the sugar is transferred to the macrolactone by EryCIII. The UniProt entry is a
  minimally-curated TrEMBL record with no GOA annotations; function is assigned from the
  cluster context and the enzyme name (homology-based).
