    supporting_text: >-
      TDP-desosamine-N-dimethyltransferase
proposed_new_terms:
- proposed_name: dTDP-3-amino-3,4,6-trideoxyglucose N,N-dimethyltransferase activity
  proposed_definition: >-
    Catalysis of the SAM-dependent transfer of two methyl groups to the 3-amino group of the
    TDP-aminodeoxysugar precursor of D-desosamine, forming the N,N-dimethylamino group of
    TDP-D-desosamine. 2 S-adenosyl-L-methionine + TDP-3-amino-3,4,6-trideoxy-glucose =
    2 S-adenosyl-L-homocysteine + TDP-D-desosamine.
  justification: >-
    No specific GO MF term exists for the desosamine N,N-dimethyltransferase (EryCVI/DesVI) step;
    EryCVI would otherwise carry only the general methyltransferase parent.
suggested_experiments:
- description: >-
    Reconstitute EryCVI with SAM and the TDP-3-amino-deoxysugar substrate to confirm the
    N,N-dimethyltransferase activity and provide experimental evidence to replace the current
    name-only annotation.
