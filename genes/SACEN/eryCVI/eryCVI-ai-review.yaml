existing_annotations: []
core_functions:
- description: >-
    SAM-dependent N,N-dimethyltransferase that dimethylates the C-3 amino group during
    TDP-D-desosamine biosynthesis (the DesVI-type final tailoring of the aminodeoxysugar),
    contributing to erythromycin biosynthesis. Inferred from the enzyme name and cluster context
    (UniProt A4F7N5; MIBiG BGC0000055).
  molecular_function:
