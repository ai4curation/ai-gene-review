taxon:
  id: NCBITaxon:405948
  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryAIII (DEBS3) is the third subunit of the 6-deoxyerythronolide B synthase (DEBS), the modular
  type I polyketide synthase that assembles the macrolactone core of erythromycin in
  Saccharopolyspora erythraea (EC 2.3.1.94). It carries extension modules 5 and 6 (KS/AT/KR/ACP)
  plus the C-terminal thioesterase (TE) domain that catalyzes macrolactonization, releasing the
  finished 6-deoxyerythronolide B from the assembly line. DEBS is the textbook model of
  assembly-line (modular) polyketide biosynthesis.
references:
- id: PMID:2024119
  title: Modular organization of genes required for complex polyketide biosynthesis.
  findings:
  - statement: The erythromycin polyketide synthase genes are organized into six modules.
    supporting_text: >-
      the genes that govern synthesis of the polyketide portion of the macrolide antibiotic
      erythromycin are organized in six
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; the seminal description of the modular DEBS architecture.
