- term:
    id: GO:0050661
    label: NADP binding
  evidence_type: IDA
  original_reference_id: PMID:7849045
  qualifier: enables
  review:
    summary: >-
      NADP binding (IDA). EryK is a class-I bacterial P450: NADPH is consumed by its
      ferredoxin-reductase partner, not bound by the P450 itself, so direct NADP binding by EryK is
      mechanistically unexpected. The reconstituted assay (PMID:7849045) used an NADPH-dependent
      ferredoxin/reductase system, which may underlie the annotation.
    action: UNDECIDED
    reason: >-
      Class-I P450s do not directly bind NADP(H) (the reductase partner does); the cached entry is
      abstract-only so the curator's exact observation cannot be confirmed. Per the guidelines
      (do not overrule a curator from incomplete evidence), this is left UNDECIDED rather than a
      confident ACCEPT, pending the full text. The dependence is most likely indirect (via redox partners).
    supported_by:
    - reference_id: PMID:7849045
      supporting_text: >-
        Overproduction and characterization of the erythromycin C-12 hydroxylase, EryK
core_functions:
- description: >-
    Cytochrome P450 (CYP113A1) that catalyzes the C-12 hydroxylation of a late erythromycin
    intermediate (erythromycin D -> C, and B -> A; EC 1.14.13.154), a final tailoring step of
    erythromycin A biosynthesis, using a heme-thiolate active site and NAD(P)H-dependent redox
    partners (PMID:8416893, PMID:7849045). GO has no specific MF term for this activity (see
    proposed_new_terms).
  molecular_function:
    id: GO:0016709
    label: oxidoreductase activity, acting on paired donors, with incorporation or reduction
      of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen
  directly_involved_in:
    - id: GO:1901115
      label: erythromycin biosynthetic process
  supported_by:
  - reference_id: PMID:7849045
    supporting_text: >-
      Hydroxylation of C-12 is one of the final steps in the biosynthesis of erythromycin A
proposed_new_terms:
- proposed_name: erythromycin 12-hydroxylase activity
  proposed_definition: >-
    Catalysis of the reaction: erythromycin D + reduced [reductant] + O2 = erythromycin C +
    oxidized [reductant] + H2O (and the analogous erythromycin B -> erythromycin A). A
    cytochrome-P450-dependent C-12 hydroxylation; corresponds to EC 1.14.13.154.
  justification: >-
    EC 1.14.13.154 (erythromycin 12-hydroxylase) has no specific GO molecular function term;
    EryK is annotated only with general P450/oxidoreductase parents. A specific term would
    capture this well-characterized final-step activity.
suggested_questions:
- question: >-
    EryK prefers erythromycin D over erythromycin B as substrate (PMID:7849045); should the
    proposed term specify the D->C reaction, with B->A as a secondary activity?
suggested_experiments:
- description: >-
    Not required for curation - EryK is well characterized biochemically; the open item is the
    GO term request for the specific C-12 hydroxylase activity.
