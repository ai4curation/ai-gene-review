    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryK (CYP113A1) is a cytochrome P450 monooxygenase that catalyzes the C-12 hydroxylation of a
  late erythromycin intermediate (EC 1.14.13.154), one of the final tailoring steps of
  erythromycin A biosynthesis in Saccharopolyspora erythraea: it converts erythromycin D to
  erythromycin C (and erythromycin B to erythromycin A), strongly preferring erythromycin D as
  substrate. As a class-I bacterial P450 it uses a heme-thiolate active site and receives
  electrons from a ferredoxin/ferredoxin-reductase system with NADPH. It is one of two genuine
  catalytic P450s in the cluster (with EryF), contrasting with the heme-less pseudoenzyme EryCII.
