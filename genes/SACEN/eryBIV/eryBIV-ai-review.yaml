description: >-
  EryBIV is an NAD(P)-dependent oxidoreductase (4-reductase) of the TDP-L-mycarose biosynthetic
  branch of erythromycin biosynthesis in Saccharopolyspora erythraea (UniProt/EMBL/MIBiG name:
  dTDP-4-keto-6-deoxy-L-hexose 4-reductase). It reduces the C-4 keto group of the TDP-deoxysugar
  intermediate during assembly of the L-mycarose donor. The UniProt entry is a minimally-curated
  TrEMBL record with no GOA annotations; function is assigned from cluster context and the enzyme
  name (homology-based).
