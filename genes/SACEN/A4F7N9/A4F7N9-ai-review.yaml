description: >-
  This protein (locus CAM00063) is a transposase that lies within the erythromycin gene-cluster
  region of Saccharopolyspora erythraea but is NOT part of erythromycin biosynthesis. Transposases
  catalyze the mobilization of transposable (insertion) elements; this is a mobile-element gene
  that happens to be inserted in or near the cluster, and it is excluded from the biosynthetic
  pathway analysis. The UniProt entry is a minimally-curated TrEMBL record with no GOA annotations.
