  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  ErmE is the rRNA adenine N-6 dimethyltransferase that confers macrolide-lincosamide-
  streptogramin B (MLS) self-resistance in the erythromycin producer Saccharopolyspora
  erythraea. It is the founding member of the Erm family: it dimethylates a specific adenine of
  the 23S rRNA (A2085 in S. erythraea numbering; equivalent to E. coli A2058) in the peptidyl
  transferase region, which sterically blocks erythromycin binding to the 50S ribosomal subunit
  and so protects the producer from its own antibiotic. ermE is not a biosynthetic enzyme but the
  cluster's self-resistance determinant (EC 2.1.1.184).
