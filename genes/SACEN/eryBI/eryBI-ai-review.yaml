  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryBI is a family-3 glycoside hydrolase (beta-glucosidase, EC 3.2.1.21) encoded in the
  erythromycin cluster of Saccharopolyspora erythraea. Its precise role in erythromycin
  biosynthesis is debated: rather than building the macrolactone or its sugars, it is thought to
  act on a glucosylated intermediate - consistent with a proposed glucosylation/deglucosylation
  self-resistance or housekeeping role in which erythromycin is transiently inactivated by
  glucosylation and reactivated by a beta-glucosidase. The molecular function (beta-glucosidase)
  is well supported by sequence; the pathway role is the uncertain part.
