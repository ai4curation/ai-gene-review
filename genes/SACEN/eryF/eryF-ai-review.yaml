proposed_new_terms:
- proposed_name: 6-deoxyerythronolide B 6-hydroxylase activity
  proposed_definition: >-
    Catalysis of the reaction: 6-deoxyerythronolide B + reduced [reductant] + O2 =
    erythronolide B + oxidized [reductant] + H2O. A cytochrome-P450-dependent C-6
    hydroxylation; corresponds to EC 1.14.15.35.
  justification: >-
    EC 1.14.15.35 (6-deoxyerythronolide B hydroxylase) has no specific GO molecular function
    term; EryF is currently annotated only with the general parents (monooxygenase / O2
    oxidoreductase activity). A specific term would capture this well-characterized activity.
suggested_questions:
- question: >-
    EryF is the structural archetype of substrate-assisted proton delivery in P450s; should a
    specific 6-deoxyerythronolide B hydroxylase MF term be created (EC 1.14.15.35)?
suggested_experiments:
- description: >-
    Not required for curation - EryF is well characterized structurally and kinetically; the
    open item is purely the GO term request for the specific hydroxylase activity.
