core_functions:
- description: >-
    Cytochrome P450 (P450eryF/CYP107A1) that catalyzes the C-6 hydroxylation of
    6-deoxyerythronolide B to erythronolide B (EC 1.14.15.35), an early post-PKS tailoring step
    of erythromycin biosynthesis, using its heme-thiolate active site (PMID:1732208,
    PMID:15824115). GO has no specific MF term for this activity (see proposed_new_terms).
  molecular_function:
    id: GO:0004497
    label: monooxygenase activity
  directly_involved_in:
    - id: GO:1901115
      label: erythromycin biosynthetic process
