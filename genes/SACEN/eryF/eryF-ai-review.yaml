description: >-
  EryF (P450eryF, CYP107A1) is a cytochrome P450 monooxygenase of the erythromycin
  biosynthetic pathway in Saccharopolyspora erythraea. It catalyzes the C-6 hydroxylation
  of 6-deoxyerythronolide B (6-dEB) to erythronolide B, an early post-PKS tailoring step
  (EC 1.14.15.35), using molecular oxygen and reducing equivalents delivered to its
  heme-thiolate active site. P450eryF is a classic, structurally characterized bacterial
  P450 (ferrous-dioxygen complex crystal structures; notable for using a substrate hydroxyl
  rather than the canonical I-helix acid-alcohol pair for proton delivery). Unlike the
  cluster's pseudoenzyme EryCII - which carries the same P450 sequence signature but lacks
  the heme-ligating cysteine and heme - EryF is a fully functional, experimentally validated
  P450.
