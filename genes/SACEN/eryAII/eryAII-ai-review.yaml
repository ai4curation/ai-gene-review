  label: Saccharopolyspora erythraea (strain ATCC 11635 / DSM 40517 / JCM 4748 / NBRC
    13426 / NCIMB 8594 / NRRL 2338)
description: >-
  EryAII (DEBS2) is the second subunit of the 6-deoxyerythronolide B synthase (DEBS), the modular
  type I polyketide synthase that assembles the macrolactone core of erythromycin in
  Saccharopolyspora erythraea (EC 2.3.1.94). It carries extension modules 3 and 4, performing two
  of the six chain-extension cycles. Its catalytic domains include ketosynthase (KS),
  acyltransferase (AT, methylmalonyl-CoA-selecting), acyl carrier protein (ACP), and reductive
  domains - ketoreductase and (in the fully-reducing module 4) dehydratase/enoylreductase - which
  account for the oxidoreductase activity. As the central subunit, EryAII carries the growing
  chain through the middle of the DEBS assembly line - the canonical example of modular polyketide
  biosynthesis - handing off to EryAIII.
