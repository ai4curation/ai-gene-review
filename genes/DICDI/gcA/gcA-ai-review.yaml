- term:
    id: GO:0007168
    label: receptor guanylyl cyclase signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This IBA transfers the metazoan receptor-guanylyl-cyclase signaling
      role (as in natriuretic peptide receptors NPR-A/B) to GCA. GCA is not a
      receptor guanylyl cyclase. Metazoan receptor GCs have a single transmembrane
      span and one cyclase domain and are directly activated by extracellular
      peptide ligand binding, whereas GCA has 12 transmembrane spans and two
      cyclase domains (adenylyl-cyclase topology) and is activated indirectly,
      downstream of a G-protein-coupled cAMP receptor. The inference does not
      transfer to this divergent enzyme.
    action: REMOVE
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: PANTHER:PTN000229249
        source_label: "PANTHER node for the guanylyl cyclase family"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "The receptor-guanylyl-cyclase signaling role reflects metazoan single-pass receptor GCs in the family; GCA is a 12-transmembrane, G-protein-activated cyclase and does not use this receptor mechanism"
      - source_id: UniProtKB:P16066
        source_label: "human guanylyl cyclase GUCY2C (heat-stable enterotoxin/guanylin receptor)"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "GUCY2C is a genuine peptide-activated receptor guanylyl cyclase; this signaling-pathway role does not transfer to the topologically distinct GCA"
    reason: GCA does not act in a receptor guanylyl cyclase signaling pathway. It
      is a G-protein-activated 12-transmembrane cyclase, not a ligand-binding
      receptor cyclase; the phylogenetic inference from metazoan peptide-receptor
      guanylyl cyclases is a mis-propagation to a structurally and mechanistically
      distinct enzyme.
    supported_by:
    - reference_id: PMID:11237875
      supporting_text: membrane-bound guanylate cyclase activity is induced after
        cAMP stimulation; a G-protein-coupled cAMP receptor and G-proteins are
        essential for this activation
    - reference_id: PMID:11522784
      supporting_text: DdGCA is a Dictyostelium guanylyl cyclase with a topology
