id: Q553Y7
gene_symbol: gcA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: gcA encodes GCA (DdGCA), a large membrane-bound guanylyl cyclase of
  Dictyostelium discoideum that catalyzes the synthesis of the second messenger
  cGMP from GTP. Unusually for a membrane guanylyl cyclase, GCA has the topology of
  a metazoan membrane adenylyl cyclase, with 12 transmembrane-spanning regions and
  two intramolecular cyclase domains (arranged in transposed order relative to
  adenylyl cyclases) that fold into a single catalytic center. It requires Mg2+,
  is inhibited by calcium, and is activated in vitro by GTPgammaS, apparently
  through a monomeric G protein. In vivo the enzyme is activated by extracellular
  cAMP acting through a G-protein-coupled cAMP receptor. GCA is one of two guanylyl
  cyclases in Dictyostelium (the other being the soluble sGC/sgcA); the two are
  partially redundant, and only the double null loses all detectable guanylyl
  cyclase activity. GCA is expressed mainly during growth and later multicellular
  development, whereas sGC predominates during aggregation. The cGMP produced by
  these cyclases acts as a diffusible second messenger that promotes cortical
  myosin II filament assembly in the rear and sides of chemotaxing cells,
  suppressing lateral pseudopodia and thereby refining directional movement during
  cAMP-mediated chemotaxis, cell streaming, and electrotaxis.
