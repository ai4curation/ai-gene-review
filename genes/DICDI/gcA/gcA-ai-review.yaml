- id: PMID:11237875
  title: Guanylate cyclase in Dictyostelium discoideum with the topology of mammalian
    adenylate cyclase.
  findings:
  - statement: DdGCA encodes a protein with 12 transmembrane spanning regions and
      two cyclase domains, unlike single-pass metazoan receptor guanylyl cyclases.
    supporting_text: We have cloned a Dictyostelium gene, DdGCA, encoding a protein
      with 12 transmembrane spanning regions and two cyclase domains
  - statement: Expressed DdGCA has high guanylate cyclase activity and no detectable
      adenylate cyclase activity.
    supporting_text: DdGCA expressed in Dictyostelium exhibits high guanylate
      cyclase activity and no detectable adenylate cyclase activity
  - statement: DdGCA deletion is not essential for chemotaxis, and a second guanylyl
      cyclase remains active in the knockout.
    supporting_text: The knock-out strain still exhibits substantial guanylate
      cyclase activity, demonstrating that Dictyostelium contains at least one other
      guanylate cyclase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Original cloning and characterization of DdGCA; PubMed-verified,
      establishes topology, catalytic activity, and redundancy with a second
      guanylyl cyclase.
- id: PMID:11522784
  title: GTPgammaS regulation of a 12-transmembrane guanylyl cyclase is retained after
    mutation to an adenylyl cyclase.
  findings:
  - statement: DdGCA is a 12-transmembrane guanylyl cyclase with adenylyl-cyclase
      topology, activated by GTPgammaS possibly via a monomeric G protein.
    supporting_text: GTPgammaS activation is not mediated by a heterotrimeric
      G-protein but possibly by a monomeric G-protein
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Direct assay of GCA activity and regulation; supports the
      guanylate cyclase MF (IDA) annotation.
- id: PMID:11777934
  title: Characterization of two unusual guanylyl cyclases from dictyostelium.
  findings:
  - statement: GCA and sGC are the two Dictyostelium guanylyl cyclases; the double
      null loses all detectable GC activity.
    supporting_text: all detectable GC activity is lost in a cell line in which both
      genes have been inactivated
  - statement: GCA is exclusively membrane-bound and active mainly with Mg2+, and is
      expressed mainly during growth and multicellular development.
    supporting_text: GCA is expressed mainly during growth and multicellular
      development, whereas sGC is expressed mainly during cell aggregation
  - statement: Both enzymes are activated in vivo by extracellular cAMP via a
      G-protein-coupled receptor and inhibited by calcium.
    supporting_text: Ca(2+) inhibits both GCA and sGC with K(i) of about 50 and 200
      nm, respectively
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines GCA versus sGC redundancy, membrane localization,
      expression pattern, and calcium inhibition.
- id: PMID:14710184
  title: 'Chemotaxis: signalling modules join hands at front and tail.'
  findings:
  - statement: A cGMP-signalling cascade regulates myosin filament formation in the
      posterior of the cell and inhibits lateral pseudopod formation.
    supporting_text: a cyclic-GMP-signalling cascade has been identified that
      regulates myosin filament formation in the posterior of the cell, thereby
      inhibiting the formation of lateral pseudopodia that could misdirect the cell
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review framing the cGMP/rear module of chemotaxis; supports
      downstream myosin and pseudopod annotations.
- id: PMID:15473840
  title: Chemoattractant signaling in dictyostelium discoideum.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Broad review of chemoattractant signaling modules; the TAS
      receptor-guanylyl-cyclase pathway annotation derived from it over-specifies
      GCA's mechanism.
- id: PMID:16790492
  title: Guanylyl cyclase protein and cGMP product independently control front and
    back of chemotaxing Dictyostelium cells.
  findings:
  - statement: cGMP mediates cortical myosin II filament formation and suppresses
      pseudopod formation in the back of the cell during chemotaxis.
    supporting_text: cGMP suppresses pseudopod formation in the back of the cell,
      whereas the sGC protein refines pseudopod formation at the leading edge
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Focuses on sGC but establishes the cGMP-myosin rear module to
      which GCA-derived cGMP contributes.
- id: PMID:18073238
  title: The role of cGMP and the rear of the cell in Dictyostelium chemotaxis and
    cell streaming.
  findings:
  - statement: A quiescent, cGMP-controlled rear increases directional movement
      efficiency and maintains cell-cell contacts during streaming.
    supporting_text: a quiescent rear of the cell increases the efficiency of
      directional movement and is essential to maintain stable cell-cell contacts
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports the chemotaxis and lateral pseudopodium retraction
      annotations via the cGMP rear module.
- id: PMID:19346484
  title: Switching direction in electric-signal-induced cell migration by cyclic guanosine
    monophosphate and phosphatidylinositol signaling.
  findings:
  - statement: Genetically modulating both guanylyl cyclases (and GbpC/PI3K)
      reverses the preferred direction of electrotaxis.
    supporting_text: the preferential direction of migration during electrotaxis in
      Dictyostelium cells can be reversed by genetically modulating both guanylyl
      cyclases (GCases)
  - statement: GCase-dependent signaling components localize to the leading edge of
      migrating cells in an actin-dependent manner.
    supporting_text: Molecular components of the GCase- and PI3K-dependent signaling
      pathways localized at the leading edge of migrating cells during electrotaxis
      in an actin-dependent manner
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports the electrotaxis and leading-edge annotations for the
      GCase pathway.
- id: PMID:22081140
  title: 'Dictyostelium chemotaxis: essential Ras activation and accessory signalling
    pathways for amplification.'
  findings:
  - statement: sGC/cGMP signaling is an accessory pathway that is not required for
      basal Ras-driven chemotaxis but improves orientation and sensitivity in
      shallow gradients.
    supporting_text: The signalling enzymes PI3K, TorC2, PLA2 and sGC are not
      required for Ras activation and chemotaxis to folate or to steep gradients of
      cAMP, but they provide a memory of direction and improved orientation of the
      cell
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Places the guanylyl cyclase pathway as accessory/amplifying for
      chemotaxis; supports the regulation of chemotaxis non-core call.
- id: PMID:40295210
  title: Intracellular Calcium Responses to External Calcium Stimuli in Dictyostelium.
  findings:
  - statement: gca/sgc double-null cells still respond to external calcium (only
      slightly delayed), indicating GCA/cGMP is not required for calcium-mediated
      signaling.
    supporting_text: gca/sgc-null cells showed a slightly delayed response
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Genetic-interaction basis for the NOT calcium-mediated signaling
      annotation.
core_functions:
- description: GCA is a membrane-bound guanylyl cyclase that synthesizes the second
    messenger cGMP from GTP at the plasma membrane. It has an adenylyl-cyclase-like
    topology (12 transmembrane spans and two intramolecular cyclase domains),
    requires Mg2+, is inhibited by calcium, and is activated in vivo by
    extracellular cAMP acting through a G-protein-coupled cAMP receptor. The cGMP it
    produces acts as a diffusible second messenger that promotes cortical myosin II
    assembly in the rear of chemotaxing cells; GCA is partially redundant with the
    soluble guanylyl cyclase sGC.
  molecular_function:
