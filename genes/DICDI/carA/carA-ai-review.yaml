- term:
    id: GO:0035589
    label: G protein-coupled purinergic nucleotide receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: This electronically inferred term classifies cAR1 signaling as
      purinergic nucleotide receptor signaling. cAR1 is a cAMP receptor whose
      signaling is distinct from classical purinergic (P2X/P2Y) receptor pathways;
      this is an over-propagation from automated inter-ontology inference.
    action: REMOVE
    reason: cAR1 is not a purinergic (ATP/ADP/UTP) receptor; it recognizes the
      second-messenger-derived chemoattractant cAMP. Its signaling is captured
      accurately by the cAMP receptor / adenylate cyclase-activating cAMP receptor
      terms. This IEA (GO_REF:0000108, logical inference) mislabels the pathway and
      should be removed.
