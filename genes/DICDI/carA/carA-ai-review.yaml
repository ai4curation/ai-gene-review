id: P13773
gene_symbol: carA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Cyclic AMP receptor 1 (cAR1, encoded by carA) is a seven-transmembrane,
  serpentine G protein-coupled receptor (GPCR) of the cAMP receptor (cAR) family in
  the social amoeba Dictyostelium discoideum. It resides in the plasma membrane and
  binds extracellular cAMP, the chemoattractant that coordinates the transition from
  a unicellular to a multicellular organism. Upon cAMP binding, cAR1 couples to
  heterotrimeric G proteins (notably Galpha2 and the single Gbeta) to activate
  downstream effectors including adenylyl cyclase (ACA), guanylyl cyclase,
  phospholipase C, the ERK2/MAP kinase cascade, PI3K, and Ras/Rap1 GTPases, driving
  directed chemotaxis toward cAMP and the pulsatile cAMP relay that propagates
  oscillatory cAMP waves during aggregation. cAR1 also signals through G
  protein-independent routes, including rapid activation of the STAT-family
  transcription factor Dd-STAT. cAR1 is the first of four sequentially expressed cAMP
  receptors (cAR1-cAR4); it is expressed predominantly during early aggregation, and
  its loss arrests development at the onset of aggregation. Receptor signaling is
  attenuated by agonist-induced phosphorylation of C-terminal serine clusters and by
  arrestin-mediated internalization, mechanisms that underlie adaptation and
  desensitization and directional sensing during chemotaxis. cAR1 concentrates at the
  leading edge of chemotaxing cells and in detergent-resistant plasma-membrane
  microdomains, and internalized receptor traffics through early/recycling endosomal
  (acidosome) compartments.
