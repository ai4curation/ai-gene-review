    action: KEEP_AS_NON_CORE
    reason: PKA activity is required for and drives sporulation as part of
      terminal differentiation, a downstream developmental process rather than
      the core molecular function. The specific cited reference does not support
      the claim and is flagged in reference_review, but the process itself is
      well established.
