- id: PMID:8565818
  title: Induction of terminal differentiation of Dictyostelium by cAMP-dependent
    protein kinase and opposing effects of intracellulr and extracellular cAMP on
    stalk cell differentiation.
  findings:
  - statement: Ectopic expression of the PKA catalytic subunit under cell-type
      promoters causes ectopic terminal differentiation, demonstrating PKA drives
      terminal differentiation and gene expression.
    supporting_text: Expression of the catalytic (C) subunit of the cAMP-dependent
      protein kinase (PKA) of Dictyostelium under the control of heterologous,
      cell-type-specific promoters causes ectopic terminal differentiation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PKA activity drives terminal differentiation and cell-type gene
      expression.
- id: PMID:9435289
  title: A cAMP-phosphodiesterase controls PKA-dependent differentiation.
  findings:
  - statement: The RegA cAMP-phosphodiesterase is stimulated by binding the PKA
      regulatory subunit (PKA-R), and PKA activity acts at a checkpoint for
      terminal differentiation.
    supporting_text: A cAMP-specific phosphodiesterase was found that is
      stimulated by binding to the regulatory subunit of cAMP-dependent protein
      kinase, PKA-R
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the RegA-PKA-R interaction and the PKA terminal-
      differentiation checkpoint.
