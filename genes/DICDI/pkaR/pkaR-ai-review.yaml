- id: PMID:7713325
  title: Protein kinase A is a positive regulator of spore coat gene transcription
    in Dictyostelium.
  findings:
  - statement: A dominant PKA inhibitor in prespore cells reduces transcription of
      the spore coat genes cotB and cotC, showing PKA positively regulates spore
