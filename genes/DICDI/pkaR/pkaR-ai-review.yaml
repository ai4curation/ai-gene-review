    supporting_text: expression of a dominant inhibitor of the cAMP dependent
      protein kinase (PKA) in prespore cells greatly reduces the transcription
      rates of the cotB and cotC genes
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Direct evidence that PKA positively regulates spore coat gene
      transcription.
- id: PMID:8373760
  title: An unusual catalytic subunit for the cAMP-dependent protein kinase of Dictyostelium
    discoideum.
  findings:
  - statement: The pkaC catalytic subunit is physically associated with the
      regulatory subunit, and this association inhibits catalytic activity in a
