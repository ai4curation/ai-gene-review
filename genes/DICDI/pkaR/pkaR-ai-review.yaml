- id: PMID:28057864
  title: Adenylate cyclase A acting on PKA mediates induction of stalk formation by
    cyclic diguanylate at the Dictyostelium organizer.
  findings:
  - statement: PKA acts downstream of c-di-GMP to induce stalk gene expression;
      PKA activation bypasses the c-di-GMP requirement.
    supporting_text: knockdown of cAMP-dependent protein kinase (PKA) activity in
      prestalk cells reduced stalk gene induction by c-di-GMP, whereas PKA
      activation bypassed the c-di-GMP requirement for stalk gene expression
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Places PKA as a downstream effector in the c-di-GMP stalk
      induction pathway.
- id: PMID:29135990
  title: Curcumin affects gene expression and reactive oxygen species via a PKA dependent
    mechanism in Dictyostelium discoideum.
  findings:
