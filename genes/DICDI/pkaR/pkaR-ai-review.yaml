- id: PMID:1586944
  title: Culmination in Dictyostelium is regulated by the cAMP-dependent protein kinase.
  findings:
  - statement: PKA activity is required for the movement of prestalk cells at
      culmination and their differentiation into stalk cells.
    supporting_text: the activity of PKA is necessary for the altered pattern of
      movement of prestalk cells at culmination and their differentiation into
      stalk cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the PKA requirement for culmination and stalk cell
      differentiation.
- id: PMID:16453431
  title: A cAMP-dependent protein kinase is present in differentiating Dictyostelium
    discoideum cells.
  findings:
  - statement: The purified regulatory subunit inhibits catalytic-subunit
      activity in a cAMP-reversible manner and binds cAMP with high specificity
      (Kd 4 nM).
    supporting_text: This subunit inhibits the activity of purified catalytic
      subunit from beef heart protein kinase; the inhibition is reversed upon
      addition of cAMP
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Biochemical demonstration of high-affinity cAMP binding and
      cAMP-reversible inhibition of the catalytic subunit.
- id: PMID:1728597
  title: Multiple roles for cAMP-dependent protein kinase during Dictyostelium development.
  findings:
  - statement: The Dictyostelium PKA holoenzyme is a single R plus single C
      subunit, and R-subunit mutants dissect the cAMP-binding and C-inhibition
      functions.
    supporting_text: we have constructed mutants of the R subunit that are
      defective in cAMP binding, in inhibition of the C subunit, or in both
      functions
  - statement: PKA-deficient cells are defective in cAMP relay and fail to
      express postaggregative genes.
    supporting_text: a number of postaggregative genes are not expressed in PKA-
      cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Structure-function mutagenesis of the R subunit and multiple
      developmental roles of PKA.
- id: PMID:2450571
  title: Expression and properties of the regulatory subunit of Dictyostelium cAMP-dependent
    protein kinase encoded by lambda gt11 cDNA clones.
  findings:
  - statement: Recombinant R subunit retains high-affinity cAMP binding and the
      ability to inhibit the catalytic subunit through protein-protein
      interaction.
    supporting_text: the ability to inhibit the catalytic (C) subunit through
      protein-protein interaction
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Recombinant expression confirms cAMP binding and
      catalytic-subunit inhibition are intrinsic R-subunit properties.
- id: PMID:26485773
  title: An unusual adenosine cyclic 3',5'-phosphate-dependent protein kinase from
    Dictyostelium discoideum.
  findings:
  - statement: The Dictyostelium PKA holoenzyme is an unusual dimer of one
