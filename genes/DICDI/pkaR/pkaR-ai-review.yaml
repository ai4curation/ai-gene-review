id: P05987
gene_symbol: pkaR
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: pkaR encodes the single regulatory (R) subunit of cAMP-dependent
  protein kinase (PKA) in Dictyostelium discoideum. It binds the catalytic
  subunit pkaC to form the inactive PKA holoenzyme, which in this organism is an
  unusual R-C dimer rather than the R2C2 tetramer of most eukaryotes, because the
  R subunit lacks the N-terminal dimerization domain. The R subunit carries a
  single high-affinity cAMP-binding site (Kd in the low nanomolar range); binding
  of cAMP releases the active catalytic subunit. Through this cAMP-gated
  inhibition of pkaC, pkaR is the intracellular cAMP sensor that gates PKA
  activity throughout the Dictyostelium developmental program, including
  aggregation and cAMP relay, prespore and prestalk/stalk cell differentiation,
  culmination, and sporulation. Loss-of-function or inhibitor-defective mutations
  in the R subunit, such as the rdeC allele, cause premature heterochronic
  terminal differentiation by unleashing constitutive catalytic-subunit activity.
