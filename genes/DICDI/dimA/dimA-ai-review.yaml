gene_symbol: dimA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: DimA (Basic-leucine zipper transcription factor A; DIF insensitive
  mutant A) is a bZIP/bRLZ transcription factor of the social amoeba Dictyostelium
  discoideum that is required for cellular responses to the chlorinated signalling
  molecule DIF-1. Acting in the nucleus, DimA binds DNA as a dimer through its basic
  region-leucine zipper and both activates prestalk (pstO) gene expression and
  represses prespore gene expression downstream of DIF-1. It forms homodimers and
  heterodimerizes with the related bZIP factor DimB, and in response to DIF-1 it
  accumulates rapidly in the nucleus, a relocalization that depends on DimB. Through
  this transcriptional control DimA integrates DIF-1 signalling with cell-type
  differentiation and patterning during multicellular development, being required
  for stalk-cell differentiation and for repression of the spore fate; loss of dimA
  produces long thin slugs, cell-autonomous differentiation defects, and exclusion
  of mutant cells from the spore mass.
