- term:
    id: GO:0010623
    label: programmed cell death involved in cell development
  evidence_type: IMP
  original_reference_id: PMID:28055008
  qualifier: involved_in
  review:
    summary: In this study the DmtA-null (DIF-1-deficient) strain was used as a
      tool to test whether endogenous DIF-1 is required for developmental cell
      death. Vacuolar developmental cell death and its early hallmarks were
      induced in DmtA-null cells by an exogenous second signal (DIF-1 or
      c-di-GMP), and initial priming did not require endogenous DIF-1. Thus DmtA
      itself is not directly required for the death program; the connection to
      cell death is indirect, via the DIF-1 morphogen it produces.
    action: KEEP_AS_NON_CORE
    reason: The annotation reflects a downstream developmental role of the
      DmtA-produced DIF-1 signal rather than a core molecular or biosynthetic
      function of the protein. DmtA-null cells still undergo developmental cell
      death when supplied exogenous DIF-1, so this is a non-core developmental
      context.
    supported_by:
    - reference_id: PMID:28055008
      supporting_text: DH1.DmtA- mutant cells (Figure 2) unable to synthesize DIF-1
