- id: PMID:11163223
  title: The role of DIF-1 signaling in Dictyostelium development.
  findings:
  - statement: A mutant blocked in DIF-1 biosynthesis lacks pstO cells, identifying
      DIF-1 as the pstO inducer and establishing the developmental role of the
      DIF-1 pathway.
    supporting_text: a mutant blocked in the biosynthesis of DIF-1, a chlorinated
      signal molecule proposed to induce differentiation of both major prestalk
      cell types
  - statement: pstO cell differentiation is restored by exogenous DIF-1, showing
      DIF-1 acts as the diffusible pstO inducer.
    supporting_text: Normal pstO cell differentiation and their patterning in the
      slug are restored by development on a uniform concentration of DIF-1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (full text not cached). Thompson & Kay
      2000 constructed the DIF-1 biosynthesis mutant and established DIF-1 as the
      pstO inducer; underpins the dmtA developmental annotations.
- id: PMID:18402932
  title: DIF-1 induces the basal disc of the Dictyostelium fruiting body.
  findings:
  - statement: The dmtA-null methyltransferase mutant, blocked in the last step of
      DIF-1 synthesis, has delayed tip formation and fewer prestalk-O cells.
    supporting_text: The dmtA(-) methyltransferase mutant, blocked in the last step
      of DIF-1 synthesis, resembles the stlB(-) mutant but has delayed tip
      formation and fewer prestalk-O cells
  - statement: DIF-1 biosynthesis is completed by O-methylation catalyzed by the
      DmtA methyltransferase.
    supporting_text: and then methylated to produce DIF-1, with methylation
      catalyzed by the DmtA methyl transferase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full-text (PMC2726288) available and read; directly describes the
      dmtA-null phenotype and DmtA's role in the terminal methylation step of DIF-1
      biosynthesis.
- id: PMID:28055008
  title: Early nucleolar disorganization in Dictyostelium cell death.
  findings:
  - statement: DmtA-null cells, which cannot synthesize DIF-1, were used to show
      that developmental cell death can be induced by exogenous DIF-1 independently
      of endogenous DIF-1.
    supporting_text: DH1.DmtA- mutant cells (Figure 2) unable to synthesize DIF-1
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text available. DmtA-null strain used only as a
      DIF-1-deficient tool; the gene is not directly required for the death program,
      supporting a non-core assignment of the programmed-cell-death annotation.
- id: PMID:9446571
  title: The biosynthesis of differentiation-inducing factor, a chlorinated signal
    molecule regulating Dictyostelium development.
  findings:
  - statement: The DIF-1 methyltransferase is soluble, SAM-dependent, and strongly
      prefers dichloro-THPH (des-methyl-DIF-1) as substrate.
    supporting_text: The methyltransferase is soluble, uses S-adenosyl-L-methionine
      as a co-substrate, has a Km for dichloro-THPH of about 1.1 microM, and
      strongly prefers this substrate to close analogues
  - statement: DIF-1 biosynthesis from the THPH polyketide requires both
      chlorination and methylation steps.
    supporting_text: Conversion requires both chlorination and methylation of THPH,
      and enzymatic activities able to do this exist in cell lysates
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (full text not cached). Kay 1998
      biochemically characterized the DIF-1 methyltransferase (the DmtA activity),
      the primary evidence for the core catalytic function.
core_functions:
- description: DmtA catalyzes the final, S-adenosyl-L-methionine-dependent
    O-methylation step of DIF-1 biosynthesis, converting des-methyl-DIF-1
    (3,5-dichloro-THPH) to the chlorinated polyketide morphogen DIF-1. This
    terminal methylation completes production of the diffusible signal that induces
    prestalk-O cell differentiation during Dictyostelium development.
