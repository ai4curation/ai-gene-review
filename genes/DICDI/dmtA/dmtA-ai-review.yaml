gene_symbol: dmtA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Des-methyl-DIF-1 methyltransferase A (DmtA) is a soluble,
  S-adenosyl-L-methionine-dependent O-methyltransferase of the cation-independent
  COMT subfamily that catalyzes the final step of DIF-1
  (differentiation-inducing factor 1) biosynthesis in Dictyostelium discoideum.
  DIF-1 is a chlorinated alkyl phenone polyketide morphogen. Its biosynthesis
  begins with assembly of the C12 polyketide (2,4,6-trihydroxyphenyl)-1-hexan-1-one
  (THPH) by the polyketide synthase StlB, which is dichlorinated by the
  flavin-dependent halogenase ChlA to give des-methyl-DIF-1 (dichloro-THPH); DmtA
  then O-methylates des-methyl-DIF-1 to yield mature DIF-1. DIF-1 is a diffusible
  signal that induces prestalk-O (pstO) cell differentiation and specifies the
  anterior-like cells that form the basal disc and much of the lower cup of the
  fruiting body. dmtA is maximally expressed in prespore cells around the
  first-finger/slug stage, is induced by cyclic-AMP, and is repressed by DIF-1.
  Loss of DmtA blocks DIF-1 production and causes accumulation of the biosynthetic
  intermediate des-methyl-DIF-1.
