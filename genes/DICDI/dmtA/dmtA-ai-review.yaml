- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This InterPro2GO annotation derives from the COMT dimerisation domain
      (PF08100) present in the protein. Many cation-independent COMT-family
      O-methyltransferases function as homodimers, so dimerization is plausible on
      structural grounds, but there is no direct experimental evidence that DmtA
      dimerizes and this is not an informative functional annotation.
