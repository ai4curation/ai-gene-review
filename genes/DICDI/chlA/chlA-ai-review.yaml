- term:
    id: GO:0030587
    label: sorocarp development
  evidence_type: HMP
  original_reference_id: PMID:17659086
  qualifier: acts_upstream_of_or_within
  review:
    summary: ChlA is required for normal fruiting body (sorocarp) formation because
      loss of ChlA abolishes DIF-1, causing fragile slugs and collapsed fruiting
      bodies. The gene acts upstream of sorocarp development by supplying the DIF-1
      morphogen rather than acting within the developmental program itself, so this
      broad developmental term is a valid but non-core annotation.
    action: KEEP_AS_NON_CORE
    reason: The developmental defect is a downstream consequence of loss of the
      ChlA-dependent DIF-1 signal. The annotation correctly places ChlA upstream of
      sorocarp development but does not describe its core molecular/biosynthetic
      function.
    supported_by:
    - reference_id: PMID:20231486
      supporting_text: disruption of chlA leads to the characteristic DIF-less
        phenotype of fragile slug formation and collapsed fruiting bodies
