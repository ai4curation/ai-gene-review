id: Q54FI4
gene_symbol: chlA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: ChlA (Chlorination protein A) is a soluble FAD-dependent halogenase
  from the social amoeba Dictyostelium discoideum that catalyzes the two sequential
  chlorination steps in the biosynthesis of DIF-1 (differentiation-inducing factor
  1), the polyketide-derived chlorinated morphogen that drives prestalk/stalk cell
  differentiation. Using reduced flavin (FADH2), molecular oxygen and chloride, ChlA
  converts the polyketide precursor THPH first to monochloro-THPH and then to
  dichloro-THPH; the dichlorinated product is subsequently O-methylated by DmtA to
  yield mature DIF-1. ChlA is encoded in a biosynthetic gene cluster with the
  polyketide synthase StlB, and its transcription rises during mid development in
  concert with stlB and dmtA. A conserved active-site lysine (Lys86) is essential
  for catalysis, consistent with the lysine-chloramine mechanism of flavin-dependent
  halogenases. Loss of ChlA abolishes DIF-1 production and produces the
  characteristic DIF-less developmental phenotype of fragile slugs and collapsed
  fruiting bodies.
