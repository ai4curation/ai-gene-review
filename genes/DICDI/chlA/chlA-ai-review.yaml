  qualifier: enables
  review:
    summary: Root-level catalytic activity assigned by an ARBA machine-learning
      model. This is correct but entirely uninformative given that the specific
      enzymatic activity of ChlA (flavin-dependent halogenase) is experimentally
      established.
    action: MODIFY
    reason: The generic parent term should be replaced by the specific,
      experimentally supported molecular function of ChlA.
    proposed_replacement_terms:
    - id: GO:0140907
      label: flavin-dependent halogenase activity
    supported_by:
    - reference_id: PMID:20231486
      supporting_text: both chlorination events in this pathway are carried out by
        the flavin-dependent halogenase ChlA
- term:
    id: GO:0004497
    label: monooxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro2GO inference from the flavin-dependent halogenase / FAD-binding
      domain. Flavin-dependent halogenases activate O2 to generate a flavin
      C4a-hydroperoxide and hypohalous acid, but the productive reaction transfers
      chloride to the substrate rather than incorporating an oxygen atom into it.
      Monooxygenase activity therefore mischaracterizes the catalytic outcome; the
      accurate molecular function is flavin-dependent halogenase activity, which is
      already directly annotated.
    action: MARK_AS_OVER_ANNOTATED
    reason: The monooxygenase keyword/domain mapping reflects the shared FAD-dependent
      oxidoreductase fold, not a hydroxylation activity. ChlA chlorinates its
      substrate; it does not incorporate oxygen into the product, so this IEA term
      over-annotates the true function captured by GO:0140907.
    supported_by:
    - reference_id: PMID:20231486
      supporting_text: chlA from Dd encodes a flavin-dependent halogenase capable of
        catalyzing both chlorinations in the biosynthesis of DIF-1
- term:
    id: GO:0106266
    label: 3-chloro THPH synthase activity
  evidence_type: EXP
  original_reference_id: PMID:20231486
  qualifier: enables
  review:
    summary: Experimentally supported. Purified ChlA catalyzes the first
      chlorination of the polyketide precursor THPH to monochloro-THPH in vitro,
      exactly matching this specific synthase-activity term. This is a core
      molecular function.
    action: ACCEPT
    reason: Direct in vitro reconstitution with purified ChlA demonstrates the first
      chlorination step, corresponding precisely to this term.
    supported_by:
    - reference_id: PMID:20231486
      supporting_text: The chlorination of THPH and Cl-THPH can be reconstituted in
        vitro using purified ChlA protein
- term:
    id: GO:0106267
    label: 3,5 dichloro-THPH synthase activity
  evidence_type: EXP
  original_reference_id: PMID:20231486
  qualifier: enables
  review:
    summary: Experimentally supported. ChlA catalyzes the second chlorination,
      converting monochloro-THPH to dichloro-THPH, the immediate DIF-1 precursor.
      This specific synthase term captures the second of the two chlorination events
