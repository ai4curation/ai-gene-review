- term:
    id: GO:0018893
    label: dibenzofuran metabolic process
  evidence_type: IMP
  original_reference_id: PMID:36252029
  qualifier: involved_in
  review:
    summary: This IMP annotation cites PMID:36252029, a study of the PKS5-derived
      yellow polyketide pigment and premature hatching in Dictyostelium. The cached
      full text does not mention ChlA, DIF-1, chlorination, or dibenzofuran, and
      dibenzofuran is a distinct chemical class from the chlorinated alkylphenone
      DIF-1 that ChlA produces. The supporting evidence for this term-gene pairing
      could not be verified.
    action: UNDECIDED
    reason: The full text of the cited reference does not appear to support a
      dibenzofuran metabolic role for ChlA, and the term is chemically inconsistent
      with the known DIF-1 substrate. Because the curator may have used data not
      reproduced in the cached text, this is flagged for expert re-examination
      rather than removed.
