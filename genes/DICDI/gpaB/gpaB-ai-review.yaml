id: P16051
gene_symbol: gpaB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: >-
  gpaB encodes Gα2 (G alpha-2), the heterotrimeric G-protein alpha subunit of
  Dictyostelium discoideum that couples the cyclic AMP chemoattractant receptor
  cAR1 to intracellular signaling during the aggregation stage of development.
  Like other Gα subunits it binds guanine nucleotides and cycles between an
  inactive GDP-bound heterotrimeric state (associated with Gβγ) and an active
  GTP-bound state, functioning as a molecular switch with intrinsic GTPase
  activity. Gα2 is N-myristoylated on Gly-2 and S-palmitoylated on Cys-4,
  lipid modifications required for its plasma membrane localization; it also
  maintains a cytosolic pool that is shuttled to the membrane upon receptor
  activation. Upon cAMP stimulation, activated Gα2 engages downstream effectors
  including the Rap1-specific guanine nucleotide exchange factor GflB, thereby
  linking the GPCR to Ras/Rap signaling at the leading edge, as well as the
  RasGAP C2GAP1, and it is required for chemoattractant-stimulated phospholipase
  C activity. Gα2 is essential for cAMP relay, chemotaxis, cell aggregation and
  the transition to multicellular development, and cells lacking Gα2 fail to
  enter the developmental phase. Its amino-terminal MAPK docking (D-) motif is
  required for cAMP-stimulated nucleocytoplasmic shuttling of the GtaC
  transcription factor during aggregation.
