  - reference_id: PMID:11264536
    supporting_text: The G-protein heterotrimer rapidly dissociated and reassociated upon addition and removal of chemoattractant
  - reference_id: PMID:15715993
    supporting_text: G alpha2 is essential for the developmental life cycle of Dictyostelium
- description: >-
    Activated Gα2 directly couples the cAMP receptor to monomeric G-protein
    signaling by binding and stimulating the Rap1-specific guanine nucleotide
    exchange factor GflB, functioning as a Gα-stimulated GEF adaptor that balances
    Ras and Rap signaling at the leading edge during chemotaxis.
  molecular_function:
