core_functions:
- description: >-
    Gα2 is the heterotrimeric G-protein alpha subunit that transduces cAMP
    chemoattractant signals from the cAR1 GPCR during aggregation. As the
    guanine-nucleotide-binding subunit it cycles between an inactive GDP-bound
    heterotrimeric state (with Gβγ) and an active GTP-bound state via its
    intrinsic GTPase activity, acting as the molecular switch for aggregation-stage
    cAMP signaling.
