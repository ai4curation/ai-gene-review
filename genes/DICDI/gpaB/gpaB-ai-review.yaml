  evidence_type: IMP
  original_reference_id: PMID:8280098
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation to small GTPase-mediated signal transduction citing the
      phospholipase C study. Gα2 is a heterotrimeric (not small) GTPase, and the
      cited paper concerns cAMP/GTP-analog regulation of phospholipase C rather
      than small GTPase signaling per se. The cached content does not establish
      this specific term, and I cannot verify the curator's full-text basis.
