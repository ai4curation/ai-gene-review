      development. The specific "adenylate cyclase-activating" wording is a
      curator interpretation of the cAMP-relay role.
    action: KEEP_AS_NON_CORE
    reason: >-
      Gα2 is required for the aggregation-stage cAMP signaling program, but
      adenylate cyclase activation in Dictyostelium is classically driven by
      Gβγ; the core Gα2 processes are better captured by chemotaxis, aggregation,
      and adenylate cyclase-modulating GPCR signaling. Retained as non-core.
