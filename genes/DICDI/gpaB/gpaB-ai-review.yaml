      The cited reference (abstract available) addresses G alpha 2 as the
      stimulatory G protein for phospholipase C, not small GTPase-mediated signal
      transduction. Although Gα2 does act upstream of Ras/Rap small GTPases in
      other studies, the term-to-reference support here cannot be confirmed, so
      per policy this is left UNDECIDED rather than removed.
