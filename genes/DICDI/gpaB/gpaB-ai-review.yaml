- term:
    id: GO:0006909
    label: phagocytosis
  evidence_type: IMP
  original_reference_id: PMID:9647646
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      IMP annotation citing the Gβ-null study. That paper explicitly reports
      that single Gα-subunit nulls, specifically Gα2 (and Gα4), do NOT show
      reduced phagocytosis; the phagocytosis defect is a property of the shared
      Gβ subunit, not Gα2. The annotation is therefore contradicted by its own
      cited reference.
    action: REMOVE
    reason: >-
      The cited reference directly states that Gα2-null mutants are not impaired
      in phagocytosis, so attributing phagocytosis to Gα2 is not supported and is
      contradicted by the evidence. Phagocytosis in this context depends on Gβ,
      not the aggregation-stage Gα2.
    supported_by:
    - reference_id: PMID:9647646
      supporting_text: nor did we find reduced phagocytosis rates in Gα2 and Gα4 null mutants
