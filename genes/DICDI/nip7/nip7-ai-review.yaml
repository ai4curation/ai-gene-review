id: B0G104
gene_symbol: nip7
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: nip7 encodes the D. discoideum homolog of the conserved 60S 
  ribosome subunit biogenesis protein NIP7. The 179-amino-acid protein contains 
  an N-terminal pre-PUA domain for protein-protein interactions and a C-terminal
  PUA domain that binds pre-rRNA with polyuridine preference. Based on extensive
  studies of yeast and human orthologs, nip7 is predicted to function as a 
  nucleolar trans-acting factor required for 27S pre-rRNA processing and 60S 
  ribosomal subunit assembly. The protein associates transiently with pre-60S 
  particles and interacts with other biogenesis factors and exosome components.
references:
- id: PMID:9271378
  title: Saccharomyces cerevisiae Nip7p is required for efficient 60S ribosome 
    subunit biogenesis
  findings:
  - statement: NIP7 is essential for growth and required for 60S ribosomal 
      subunit biogenesis in yeast.
    supporting_text: Nip7-1p-depleted cells showed defective pre-rRNA 
      processing, including accumulation of the 35S rRNA precursor, presence of 
      a 23S aberrant precursor, decreased 20S pre-rRNA levels, and accumulation 
      of 27S pre-rRNA
  - statement: Nip7p cosediments with free 60S subunits and localizes to the 
      nucleolus.
    supporting_text: A fraction of Nip7p cosedimented through sucrose gradients 
      with free 60S ribosomal subunits but not with 80S monosomes or polysomal 
      ribosomes, indicating that it is not a ribosomal protein
  - statement: Nip7p is a nucleolar protein.
    supporting_text: in vivo localization of a Nip7p-green fluorescent protein 
      fusion protein revealed that a significant amount of Nip7p is present 
      inside the nucleus, most probably in the nucleolus
- id: PMID:9891085
  title: Nip7p interacts with Nop8p, an essential nucleolar protein required for
    60S ribosome biogenesis, and the exosome subunit Rrp43p
  findings:
  - statement: Nip7p interacts with nucleolar protein Nop8p and exosome subunit 
      Rrp43p.
    supporting_text: Rrp43p and a second essential protein, Nop8p, were 
      identified in a two-hybrid screen as Nip7p-interacting proteins
  - statement: The three proteins form a dynamic complex in 60S biogenesis.
    supporting_text: Biochemical evidence for an interaction was provided by the
      copurification on immunoglobulin G-Sepharose of Nip7p with protein 
      A-tagged Rrp43p and Nop8p
- id: PMID:18001138
  title: Structural insights into the interaction of the Nip7 PUA domain with 
    polyuridine RNA
  findings:
  - statement: The PUA domain mediates Nip7 interaction with RNA, with conserved
      polyuridine preference.
    supporting_text: Both proteins can bind specifically to polyuridine, and RNA
      interaction requires specific residues of the PUA domain
  - statement: Polyuridine binding is conserved from archaea to eukaryotes.
    supporting_text: the PUA domain mediates Nip7 interaction with RNA and 
      reveals that the preference for interaction with polyuridine sequences is 
      conserved in Archaea and eukaryotic Nip7 proteins
- id: PMID:20798176
  title: The NIP7 protein is required for accurate pre-rRNA processing in human 
    cells
  findings:
  - statement: Human NIP7 is required for pre-rRNA processing and ribosome 
      subunit biogenesis.
    supporting_text: downregulation of NIP7 affects pre-rRNA processing, causing
      an imbalance of the 40S/60S subunit ratio
  - statement: NIP7 localizes to the nuclear compartment and associates with 
      pre-ribosomal particles.
    supporting_text: The NIP7 protein is restricted to the nuclear compartment 
      and co-sediments with complexes with molecular masses in the range of 
      40S-80S
- id: PMID:22195017
  title: The human nucleolar protein FTSJ3 associates with NIP7 and functions in
    pre-rRNA processing
  findings:
  - statement: NIP7 and FTSJ3 interact and colocalize in the nucleolus.
    supporting_text: Both exogenous proteins colocalized to the nucleolus
