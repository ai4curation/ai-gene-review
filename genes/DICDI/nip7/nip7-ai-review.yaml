- id: file:DICDI/nip7/nip7-deep-research-bioreason.md
  title: BioReason-Pro SFT prediction for nip7 (D. discoideum)
  findings:
  - statement: BioReason SFT trace identifies nip7 as a nucleolar assembly 
      factor for 60S ribosomal subunit maturation with bipartite pre-PUA and PUA
      domain architecture.
existing_annotations:
- term:
    id: GO:0005730
    label: nucleolus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference (IBA) that nip7 localizes to the nucleolus 
      is well-supported. In yeast, Nip7p-GFP localizes to the nucleolus, and in 
      human cells NIP7 is restricted to the nuclear compartment and colocalizes 
      with nucleolar markers. The nucleolus is the site of pre-rRNA processing 
      and early ribosome assembly where NIP7 orthologs function.
    action: ACCEPT
    reason: Nucleolar localization is a core conserved feature of NIP7 family 
      proteins across eukaryotes.
    supported_by:
    - reference_id: file:DICDI/nip7/nip7-deep-research-bioreason.md
      supporting_text: A nucleolar assembly factor that promotes maturation of 
        the large ribosomal subunit
    - reference_id: PMID:9271378
      supporting_text: in vivo localization of a Nip7p-green fluorescent protein
        fusion protein revealed that a significant amount of Nip7p is present 
        inside the nucleus, most probably in the nucleolus
    - reference_id: PMID:22195017
      supporting_text: Both exogenous proteins colocalized to the nucleolus
- term:
    id: GO:0042273
    label: ribosomal large subunit biogenesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference that nip7 is involved in ribosomal large 
      subunit biogenesis is strongly supported. Yeast Nip7p depletion causes 
      accumulation of 27S pre-rRNA and deficit of 60S subunits. The protein 
      cosediments with free 60S subunits, confirming direct involvement in large
      subunit maturation.
    action: ACCEPT
    reason: This is the core biological process for NIP7 family proteins, 
      extensively documented in yeast.
    supported_by:
    - reference_id: PMID:9271378
      supporting_text: Delayed processing of 27S pre-rRNA appeared to be the 
        cause of reduced synthesis of 25S rRNA relative to 18S rRNA, which may 
        be responsible for the deficit of 60S subunits in these cells
    - reference_id: PMID:9891085
      supporting_text: Rrp43p and a second essential protein, Nop8p, were 
        identified in a two-hybrid screen as Nip7p-interacting proteins
- term:
    id: GO:0030687
    label: preribosome, large subunit precursor
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference that nip7 is part of the preribosome, large 
      subunit precursor is well-supported. Yeast Nip7p cosediments with free 60S
      subunits and interacts with other pre-60S assembly factors (Nop8p, 
      Rrp43p). NIP7 family proteins are trans-acting factors that associate 
      transiently with pre-60S particles during maturation.
    action: ACCEPT
    reason: Nip7p association with pre-60S particles is demonstrated by 
      cosedimentation and protein interaction data.
    supported_by:
    - reference_id: PMID:9271378
      supporting_text: A fraction of Nip7p cosedimented through sucrose 
        gradients with free 60S ribosomal subunits but not with 80S monosomes or
        polysomal ribosomes
    - reference_id: PMID:9891085
      supporting_text: Biochemical evidence for an interaction was provided by 
        the copurification on immunoglobulin G-Sepharose of Nip7p with protein 
        A-tagged Rrp43p and Nop8p
- term:
    id: GO:0003723
    label: RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: InterPro2GO annotation of RNA binding based on the PUA domain 
      (IPR002478, IPR036974). The PUA domain is a well-characterized RNA-binding
      module. Structural and biochemical studies of archaeal and yeast Nip7 
      proteins confirm that the PUA domain binds RNA, with specificity for 
      polyuridine sequences. This annotation is correct but could be more 
      specific as rRNA binding.
    action: ACCEPT
    reason: RNA binding via the PUA domain is experimentally verified for Nip7 
      orthologs. While rRNA binding (GO:0019843) would be more specific, RNA 
      binding is not incorrect and the IEA evidence appropriately reflects the 
      domain-level annotation.
    supported_by:
    - reference_id: PMID:18001138
      supporting_text: the PUA domain mediates Nip7 interaction with RNA and 
        reveals that the preference for interaction with polyuridine sequences 
        is conserved in Archaea and eukaryotic Nip7 proteins
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: InterPro2GO annotation of nuclear localization based on the NIP7 
      family signature (IPR016686). Yeast and human NIP7 proteins localize to 
      the nucleus/nucleolus. The nucleolus annotation (GO:0005730) is more 
      specific and also present, making this a redundant but not incorrect 
      parent term.
    action: KEEP_AS_NON_CORE
    reason: Correct but less specific than the nucleolus annotation. The 
      nucleolus is within the nucleus, so this is technically true but the more 
      informative annotation is GO:0005730 nucleolus.
    supported_by:
    - reference_id: PMID:9271378
      supporting_text: in vivo localization of a Nip7p-green fluorescent protein
        fusion protein revealed that a significant amount of Nip7p is present 
        inside the nucleus, most probably in the nucleolus
- term:
    id: GO:0005730
    label: nucleolus
