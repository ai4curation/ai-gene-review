suggested_questions:
- question: Is nip7 essential for growth in D. discoideum, as it is in yeast? A 
    knockout or knockdown experiment would clarify whether the functional 
    requirement is conserved.
- question: Does D. discoideum nip7 function primarily in 60S subunit biogenesis
    (as in yeast) or does it also affect 40S biogenesis (as observed for human 
    NIP7)?
suggested_experiments:
- description: Generate a nip7 knockout or conditional knockdown in D. 
    discoideum (e.g., using blasticidin cassette insertion or 
    doxycycline-inducible RNAi). Assess growth, ribosomal subunit profiles by 
    sucrose gradient sedimentation, and pre-rRNA processing by northern blot to 
    determine whether 27S pre-rRNA accumulates as in yeast.
  hypothesis: nip7 is essential for growth and required for 60S ribosomal 
    subunit biogenesis in D. discoideum.
  experiment_type: gene knockout / conditional knockdown
- description: Determine the subcellular localization of nip7 in D. discoideum 
    by expressing a GFP-nip7 fusion. Verify nucleolar localization by 
    co-staining with nucleolar markers such as fibrillarin.
  hypothesis: nip7 localizes to the nucleolus in D. discoideum.
  experiment_type: fluorescence microscopy
