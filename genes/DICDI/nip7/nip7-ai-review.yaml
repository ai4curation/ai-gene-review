# ================== rRNA BINDING (NEW) ==================
- term:
    id: GO:0019843
    label: rRNA binding
  evidence_type: ISS
  original_reference_id: PMID:18001138
  review:
    summary: >-
      The PUA domain of Nip7 binds RNA with polyuridine preference, and this activity
      is conserved from archaea to eukaryotes. Given that Nip7 functions in pre-rRNA
      processing within pre-60S particles, the relevant RNA substrate is pre-rRNA.
      rRNA
      binding (GO:0019843) is more specific than the existing RNA binding (GO:0003723)
      annotation and better reflects the biological context.
    action: NEW
    reason: >-
      Structural and biochemical studies demonstrate that the PUA domain of Nip7 binds
      RNA, and the biological context (pre-60S particle association, 27S pre-rRNA
      processing)
      establishes pre-rRNA as the relevant substrate. This is a more specific annotation
      than the existing GO:0003723 RNA binding.
    supported_by:
    - reference_id: PMID:18001138
      supporting_text: Both proteins can bind specifically to polyuridine, and 
        RNA interaction requires specific residues of the PUA domain
    - reference_id: PMID:9271378
      supporting_text: A fraction of Nip7p cosedimented through sucrose 
        gradients with free 60S ribosomal subunits but not with 80S monosomes or
        polysomal ribosomes
core_functions:
- description: nip7 functions as a nucleolar trans-acting factor in 60S 
    ribosomal subunit biogenesis. Its PUA domain binds pre-rRNA (with 
    polyuridine preference) while the N-terminal pre-PUA domain mediates 
    interactions with other assembly factors. The protein associates transiently
    with pre-60S ribosomal particles during 27S pre-rRNA processing and 
    dissociates as the subunit matures.
  molecular_function:
    id: GO:0019843
    label: rRNA binding
  directly_involved_in:
