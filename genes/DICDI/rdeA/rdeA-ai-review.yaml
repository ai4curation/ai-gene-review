    supporting_text: and aspartate 212 of RegA, and occurs in both directions
  - reference_id: PMID:9582274
    supporting_text: RdeA displays homology around a histidine residue at amino acid
      65 with members of the H2 module family of phosphotransferases that participate
      in multistep phosphoryl relays
