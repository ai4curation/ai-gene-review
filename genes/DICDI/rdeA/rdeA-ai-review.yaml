id: Q54RR8
gene_symbol: rdeA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: RdeA is the histidine-phosphotransfer (HPt / H2-module) intermediate
  of the two-component phosphorelay that controls the rate of Dictyostelium
  discoideum development. It is a small (~28 kDa), highly charged, hydrophilic,
  non-compartmentalised cytosolic protein that carries a conserved
  phosphoaccepting histidine at position 65. In the relay, sensor histidine
  kinases (such as DhkA, the SDF-2 receptor, and DhkC) transfer a phosphoryl group
  to His-65 of RdeA, which in turn exchanges phosphate with the response-regulator
  receiver aspartate (Asp-212) of the cAMP phosphodiesterase RegA; the transfer is
  bidirectional. Phospho-RegA is the active phosphodiesterase, so RdeA-mediated
  phosphotransfer tunes RegA activity, intracellular cAMP levels and hence PKA
  activity. Loss of RdeA (or replacement of His-65) lowers RegA activity and
  causes precocious, rapid development (aggregation and terminal spore/stalk
  differentiation within ~14 h instead of the normal ~24 h). RdeA is functionally
  interchangeable with the H2-module protein Ypd1 of budding yeast.
