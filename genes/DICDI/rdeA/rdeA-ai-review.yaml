core_functions:
- description: RdeA is the histidine-phosphotransfer (HPt / H2-module) intermediate
    of the Dictyostelium two-component phosphorelay, using its His-65 to shuttle
    phosphate bidirectionally between sensor histidine kinases (DhkA, DhkC) and the
    response-regulator cAMP phosphodiesterase RegA (Asp-212), thereby setting RegA
    activity, intracellular cAMP and the rate of development.
  molecular_function:
    id: GO:0009927
    label: histidine phosphotransfer kinase activity
  directly_involved_in:
