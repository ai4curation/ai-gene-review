- term:
    id: GO:0009642
    label: response to light intensity
  evidence_type: HEP
  original_reference_id: PMID:41057014
  qualifier: acts_upstream_of_or_within
  review:
    summary: This annotation derives from a high-throughput expression profiling
      study in which gbfA transcript levels changed with light exposure (gbfA was
      downregulated in the dark during the unicellular phase). This reflects that
      gbfA expression is modulated under different light conditions, not a
      dedicated molecular role of GBF in a light-response pathway. It is a
      peripheral, expression-based observation rather than a core function.
    action: KEEP_AS_NON_CORE
    reason: The evidence is a differential-expression signal from a transcriptomic
      screen, capturing that gbfA responds to (or is co-regulated with)
      light-mediated developmental changes. GBF's core function is transcriptional
      activation of late genes; light responsiveness of its transcript is a
      downstream/contextual observation, so this is retained as non-core.
    supported_by:
    - reference_id: PMID:41057014
      supporting_text: G-box binding factor GbfA and TgrC1 (lagC) have also
        reported to be involved in the post-aggregation stage [42], both of which
        were downregulated under the dark condition from transcriptomic analysis
        in the unicellular phase.
- term:
    id: GO:0110013
    label: positive regulation of aggregation involved in sorocarp development
  evidence_type: IMP
  original_reference_id: PMID:8125261
  qualifier: acts_upstream_of_or_within
  review:
    summary: GBF-null cells arrest at the loose aggregate stage and fail to make
      the transition to multicellular morphogenesis. GBF is required for the
      post-aggregative developmental program. This is a valid developmental-process
      annotation but reflects the downstream consequence of GBF's transcriptional
      activity rather than its molecular function.
    action: KEEP_AS_NON_CORE
    reason: The gene-disruption phenotype (developmental arrest at the loose
      aggregate stage) supports GBF's role in the aggregation-to-morphogenesis
      switch. This is a genuine developmental requirement but is a downstream
      effect of its core transcription-factor activity, so it is kept as non-core.
    supported_by:
    - reference_id: PMID:8125261
      supporting_text: Disruption of the GBF gene by homologous recombination
        results in the loss of all GBF DNA-binding activity, developmental arrest
        at the loose aggregate stage, and the loss of late gene induction during
        development or in response to extracellular cAMP.
- term:
    id: GO:0140582
    label: adenylate cyclase-activating G protein-coupled cAMP receptor signaling
      pathway
  evidence_type: IMP
  original_reference_id: PMID:9698452
  qualifier: acts_upstream_of_or_within
  review:
    summary: gbf-null mounds fail to establish a single dominant cAMP
      signaling-wave center and cannot make the morphogenetic transition from
      random to rotational cell motion. This places GBF upstream of (or within)
      the cAMP-receptor signaling program during mound morphogenesis, but the
      effect is an indirect consequence of GBF's requirement for late-gene
      induction rather than a direct role in the receptor pathway itself.
    action: KEEP_AS_NON_CORE
    reason: The IMP evidence shows a signaling-center defect in gbf-null mounds,
      but this is downstream of GBF-driven transcription of post-aggregative genes
      (e.g. lagC/tgrC1). It is a real developmental phenotype worth retaining but
      is not GBF's core molecular function.
    supported_by:
    - reference_id: PMID:9698452
      supporting_text: One reason for this was the inability of the mutant mounds
        to establish a single, dominant signaling-wave center.
    - reference_id: PMID:9698452
      supporting_text: lagC-null and gbf-null cells fail to induce
        cell-type-specific genes ordinarily expressed during multicellular
        development.
