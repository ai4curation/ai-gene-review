- term:
    id: GO:0048102
    label: autophagic cell death
  evidence_type: IMP
  original_reference_id: PMID:19133302
  qualifier: acts_upstream_of_or_within
  review:
    summary: GbfA is one of several genes whose mutation was used to genetically
      dissect autophagic cell death (ACD) in Dictyostelium, helping to dissociate
      vacuolisation from cell death. This connects GBF to the ACD program, but the
      relationship is indirect - GBF is required for the developmental (late-gene)
      context in which ACD is studied rather than being a dedicated cell-death
      effector.
    action: KEEP_AS_NON_CORE
    reason: The cited review reports GbfA among genes mutated to dissect ACD
      features. This is a developmental/genetic-dissection context rather than a
      core molecular function of GBF, so it is kept as non-core.
    supported_by:
    - reference_id: PMID:19133302
      supporting_text: These mutations allowed the genetic dissection of ACD
        features, dissociating in particular vacuolisation from cell death.
