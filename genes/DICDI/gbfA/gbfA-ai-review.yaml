id: P36417
gene_symbol: gbfA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: G-box-binding factor (GBF) is a developmentally regulated, highly
  basic zinc-finger transcription factor of Dictyostelium discoideum. It contains
  two zinc-finger motifs and binds sequence-specifically to G-box / CA-rich
  regulatory elements (CAEs) found in the promoters of cell-type-specific late
  (post-aggregative) genes, including prestalk and prespore genes. GBF acts in the
  nucleus as a cAMP-responsive transcriptional activator that, in response to the
  high, continuous extracellular cAMP accumulating after aggregation, drives
  induction of the late-gene program marking the developmental switch from the
  loose aggregate to multicellular morphogenesis. GBF is essential for this
  switch; cells lacking GBF arrest at the loose-mound stage, fail to induce
  cell-type-specific genes, and cannot establish a dominant signaling center or
  form a tip. GBF thus sits at the top of the transcriptional hierarchy
  controlling the transition from aggregation to cell differentiation and fruiting
  body (sorocarp) formation.
