core_functions:
- description: sgcA is the principal soluble (class III, sAC-homologous) guanylyl
    cyclase of Dictyostelium, synthesizing the chemoattractant-induced cGMP burst
    from Mg2+/GTP. The enzyme is largely cytosolic at rest and becomes active upon
    membrane/leading-edge association; the diffusible cGMP promotes cortical myosin
    II assembly that suppresses lateral pseudopodia and maintains polarity during
    cAMP chemotaxis.
