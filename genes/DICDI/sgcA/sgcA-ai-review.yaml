  review:
    summary: sgcA is a class III nucleotide cyclase, and these enzymes use a
      divalent metal (Mg2+ or Mn2+) for two-metal-ion catalysis. Physiological
      activity is Mg2+/GTP dependent, so magnesium binding by the catalytic
      domain is biologically real. This is a cofactor requirement supporting the
      guanylate cyclase activity rather than a standalone core function.
