id: Q551V8
gene_symbol: sgcA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: sgcA (sGC) is one of the two guanylyl cyclases of Dictyostelium
  discoideum and provides the great majority of chemoattractant-stimulated cGMP
  synthesis during cAMP chemotaxis. It is an unusually large (2843 aa, ~315 kDa)
  cytosolic enzyme whose central pair of class III adenylyl/guanylyl-cyclase
  catalytic domains is flanked by two large (~1000 aa) N- and C-terminal regions.
  Despite the "soluble guanylyl cyclase" name it is homologous to mammalian
  soluble adenylyl cyclase (a class III cyclase) rather than to the metazoan
  NO-sensitive, heme-containing soluble guanylyl cyclase; its Mg2+/GTP-dependent
  activity is stimulated by GTPgammaS and inhibited by Ca2+, and there is no
  evidence for NO or heme regulation. In resting cells the protein is largely
  cytosolic, and during chemotaxis it translocates to the leading edge, where its
  N-terminal region binds actin filaments in extending pseudopodia and the enzyme
  becomes catalytically active upon membrane association. The rapidly diffusing
  cGMP it produces promotes assembly of myosin II filaments in the cortex and rear
  of the cell, suppressing lateral pseudopodia and thereby maintaining polarity
  and directional movement. The sGC protein also has a cGMP-independent activity in
  which anteriorly localized protein refines and stabilizes pseudopod formation at
  the leading edge. Loss of the gene reduces chemotactic sensitivity toward cAMP and
  impairs aggregation, and the protein additionally influences electrotaxis
  directionality and the timing of intracellular calcium responses.
