id: P34099
gene_symbol: pkaC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: pkaC encodes the single catalytic (C) subunit of cAMP-dependent protein
  kinase (PKA) in Dictyostelium discoideum, an AGC-family serine/threonine protein
  kinase (EC 2.7.11.11). It is unusually large (648 aa, ~73 kDa) relative to metazoan
  PKA-C, owing to an extended low-complexity N-terminal region that precedes a canonical
  C-terminal catalytic domain. The catalytic subunit is held inactive in a holoenzyme
  with a single regulatory (R) subunit (pkaR); binding of cAMP to the R subunit releases
  the active C subunit, which then phosphorylates serine/threonine residues on target
  proteins. PKA is the principal intracellular effector of cAMP and a master regulator
  of the starvation-induced multicellular developmental program. PKA activity is low
  in growing amoebae, rises during aggregation, and peaks at culmination. It is required
  for aggregation and for expression of aggregation-stage and prespore genes, governs
  the prestalk/stalk versus prespore/spore differentiation decisions, and, as intracellular
  cAMP set by adenylyl cyclases (ACA/ACG/ACR) and the phosphodiesterase RegA rises,
  triggers culmination and the terminal maturation of both spore and stalk cells. Beyond
  development, active PKA acts within the cAMP-relay oscillator as a negative-feedback
  element (acting on ERK2, adenylyl cyclase and the CAR1 receptor), contributes to
  spatiotemporal control of chemotactic signaling through Ras/Rap1/TORC2, and mediates
  shutdown of macropinocytosis at the growth-to-development transition.
