core_functions:
- description: Catalytic subunit of cAMP-dependent protein kinase (PKA). As an AGC-family
    Ser/Thr protein kinase, pkaC phosphorylates serine/threonine residues on target
    proteins using ATP, and this catalytic activity is the principal intracellular
    effector of cAMP that drives the Dictyostelium developmental program (aggregation,
    prespore/prestalk gene expression, culmination and terminal spore/stalk maturation).
  molecular_function:
    id: GO:0004691
    label: cAMP-dependent protein kinase activity
  locations:
  - id: GO:0005829
    label: cytosol
  in_complex:
    id: GO:0005952
    label: cAMP-dependent protein kinase complex
  supported_by:
  - reference_id: PMID:1332055
    supporting_text: DdPK3 null cells lack kinase activity that phosphorylates a PKA-specific
      substrate and is specifically inhibitable by recombinant cAMP-dependent protein
      kinase inhibitor
  - reference_id: PMID:8373760
    supporting_text: PkaC copurifies with cAPK activity
- description: Binds the PKA regulatory (R) subunit to form the inactive holoenzyme;
    this cAMP-gated interaction keeps catalytic activity repressed until cAMP binds
    the R subunit and releases the active catalytic subunit. This regulatory-subunit
    binding is central to how rising intracellular cAMP is transduced into PKA activity.
  molecular_function:
    id: GO:0034237
    label: protein kinase A regulatory subunit binding
  in_complex:
    id: GO:0005952
    label: cAMP-dependent protein kinase complex
  supported_by:
