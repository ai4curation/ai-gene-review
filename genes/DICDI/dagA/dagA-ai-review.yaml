core_functions:
- description: CRAC is a cytosolic PH-domain adapter that, upon chemoattractant
    stimulation, binds the PI3K products PI(3,4,5)P3 and PI(3,4)P2 and translocates
    to the plasma membrane (leading-edge inner leaflet), coupling GPCR/PI3K
    signaling to downstream effectors.
