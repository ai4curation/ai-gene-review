id: P35401
gene_symbol: dagA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: dagA encodes CRAC (Cytosolic Regulator of Adenylyl Cyclase), a
  698-residue pleckstrin homology (PH) domain-containing protein of Dictyostelium
  discoideum. CRAC is a cytosolic protein at rest that, upon chemoattractant
  (cAMP) stimulation of G protein-coupled cAMP receptors, binds the PI3K lipid
  products PI(3,4,5)P3 and PI(3,4)P2 through its N-terminal PH domain and
  translocates to the inner leaflet of the plasma membrane, accumulating at the
  leading edge of chemotaxing cells. Through this regulated membrane recruitment
  CRAC is essential for receptor- and G protein (Gbetagamma)-mediated activation
  of the aggregation-stage adenylyl cyclase (ACA), which synthesizes the cAMP
  used for intercellular signal relay. CRAC-dependent PIP3 signaling also
  contributes to directed cell migration (chemotaxis) and to regulation of the
  actin cytoskeleton, and the widely used PH(Crac)-GFP reporter marks sites of
  PIP3 production during gradient sensing. Because ACA-generated cAMP drives
  aggregation, cells lacking CRAC are developmentally defective and fail to
  aggregate normally.
