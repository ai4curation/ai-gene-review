    summary: This annotation derives from a 2D-gel proteomic screen in which the
      CRAC protein spot disappeared after copper exposure. This is a correlative
      change in protein abundance, not evidence that CRAC functions in a copper
      response.
    action: MARK_AS_OVER_ANNOTATED
    reason: The proteomic study shows that CRAC abundance is reduced under copper
      stress (alongside formin-1), which is interpreted as copper disrupting
      aggregation-related proteins. It does not demonstrate that CRAC acts upstream
      of or within a physiological response to copper; the causal direction is the
      reverse (copper affects CRAC). Retained but flagged as over-annotation.
