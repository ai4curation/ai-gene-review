gene_symbol: gbpD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: GbpD (also known as GefU/RasGEFU) is a RasGEF-family guanine
  nucleotide exchange factor in Dictyostelium discoideum that specifically
  activates the small GTPase Rap1. The protein is a large multidomain molecule
  containing an N-terminal RasGEF domain pair (RasGEF_N and catalytic RasGEF), a
  GRAM domain, and cyclic-nucleotide-binding (cNMP/GAF-like) domains that give it
  cGMP-binding capacity. Acting at the plasma membrane, GbpD activates Rap1 both
  in vivo and in vitro but not the other characterized Ras proteins, and this
  Rap1 signal drives the formation of substrate-attached pseudopodia, increasing
  cell-substrate adhesion while suppressing cell polarity and thereby slowing
  chemotaxis. Downstream, Rap1 engages the effector kinase Phg2 for adhesion.
  Although GbpD binds cGMP, its adhesion/polarity phenotype is independent of
  intracellular cGMP or cAMP levels. Its expression rises during the aggregation
  phase of starvation-induced development, consistent with a role in regulating
  motility, spreading and pseudopod dynamics.
