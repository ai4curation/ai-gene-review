- term:
    id: GO:0050920
    label: regulation of chemotaxis
  evidence_type: IMP
  original_reference_id: PMID:15827084
  qualifier: acts_upstream_of_or_within
  review:
    summary: GbpD modulates chemotaxis; overexpression severely reduces chemotaxis
      (through excess adhesion and disorganized protrusions), whereas gbpD-null
      cells chemotax better and are hyperpolar. This chemotaxis effect is a
      downstream consequence of GbpD's control of adhesion and pseudopod dynamics
      rather than a direct core function.
    action: KEEP_AS_NON_CORE
