core_functions:
- description: GbpD is a Rap1-specific guanine nucleotide exchange factor that acts
    at the plasma membrane to convert Rap1-GDP to active Rap1-GTP. Through this
    activity it drives the formation of substrate-attached pseudopodia, promoting
    cell-substrate adhesion and suppressing cell polarity (with downstream effects
    on pseudopod dynamics and chemotactic motility). The Rap1 signal engages the
    effector kinase Phg2 for adhesion.
