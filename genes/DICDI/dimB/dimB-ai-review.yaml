id: Q54ER9
gene_symbol: dimB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: DimB is a basic-region leucine-zipper (bZIP) transcription factor that
  acts as a direct effector of the polyketide morphogen DIF-1 during Dictyostelium
  multicellular development. In unstimulated cells DimB is distributed through the
  cytoplasm, but exposure to DIF-1 triggers its rapid accumulation in the nucleus,
  where it binds sequence-specific cis-regulatory elements in target promoters. DimB
  can bind DNA as a homodimer and as a heterodimer with the related bZIP factor DimA.
  It functions as a dual-mode regulator that directly activates prestalk/basal-disc
  genes such as ecmB in pstB cells, spatially restricts expression of the prestalk
  gene ecmA, and directly represses prespore genes such as pspA. Through these
  activities DimB controls prestalk cell-type patterning, pstB/basal-disc and
  anterior-like-cell differentiation, and the choice between stalk and spore fate.
  Loss of DimB produces abnormally long, thin slugs and defective culmination.
