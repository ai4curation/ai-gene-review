- id: PMID:16396914
  title: The Dictyostelium bZIP transcription factor DimB regulates prestalk-specific
    gene expression.
  findings:
  - statement: DimB is a bZIP transcription factor purified by affinity chromatography
      on ecmA promoter fragments; it spatially restricts ecmA expression rather than
      being essential for it.
    supporting_text: DimB is not essential for normal expression of the ecmA gene,
      instead it spatially limits its expression
  - statement: DimB accumulates rapidly in the nucleus upon DIF-1 exposure and
      associates with the ecmA promoter in vivo.
    supporting_text: DimB rapidly accumulates in the nucleus when cells are exposed
      to DIF-1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed abstract confirms DimB as a DIF-1-regulated bZIP transcription
      factor that binds the ecmA promoter and spatially patterns ecmA expression;
      basis for the DNA-binding, nuclear and prestalk-patterning annotations.
- id: PMID:16410410
  title: bZIP transcription factor interactions regulate DIF responses in Dictyostelium.
  findings:
  - statement: DimB directly interacts with DimA and both proteins form homo- and
      heterodimeric complexes in vitro.
    supporting_text: Pull-down assays with purified proteins showed that DimA and
      DimB can form homodimeric and heterodimeric complexes in vitro
  - statement: DimB (and DimA) rapidly accumulate in the nucleus after DIF-1
      treatment, being uniformly distributed beforehand.
    supporting_text: In the absence of DIF-1, GFP was fairly uniformly distributed
      throughout the cells. However, after DIF-1 treatment, both DimA:GFP and DimB:GFP
      exhibited nuclear accumulation
  - statement: DimB represses non-vacuolar cell death and is required for DimA nuclear
      accumulation.
    supporting_text: nuclear accumulation of DimA in response to DIF-1 is dependent
      on DimB
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text (PMC3531922) verifies DimA-DimB dimerization, DIF-1-induced
      nuclear accumulation, DimB-dependence of DimA localization, and NVCD repression.
- id: PMID:20080085
  title: A new Dictyostelium prestalk cell sub-type.
  findings:
  - statement: Genome-wide analysis of dimB-null cells shows DimB acts as both an
      inducer and a repressor of DIF-1 target genes.
    supporting_text: these genes fall under negative control by the same two
      transcription factors
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text supports the negative-regulation annotation via
      microarray comparison of parental and dimB-null cells.
