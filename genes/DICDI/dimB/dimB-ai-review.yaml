core_functions:
- description: DimB is a DIF-1-responsive bZIP transcription factor that binds
    sequence-specific cis-regulatory elements in target promoters (ecmA, ecmB, pspA)
    and acts as a dual-mode regulator, directly activating prestalk/basal-disc genes
    (e.g. ecmB) and directly repressing prespore genes (e.g. pspA), thereby patterning
    cell-type gene expression in response to the DIF-1 morphogen.
  molecular_function:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:22253818
    supporting_text: In response to the signaling polyketide DIF-1 DimB directly
      activates transcription of the ecmB gene in pstB cells
  - reference_id: PMID:22253818
    supporting_text: DIF-1 represses pspA gene expression in a suspension cell assay
      but this repression is abrogated in a dimB null strain
- description: DimB binds defined cis-regulatory (promoter) regions of its target
    genes in a sequence-specific, DIF-1-induced manner, as shown by affinity
    purification on the ecmA promoter and ChIP at the ecmB and pspA promoters.
  molecular_function:
    id: GO:0000976
