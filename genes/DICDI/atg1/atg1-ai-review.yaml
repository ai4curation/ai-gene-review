- id: PMID:14736886
  title: Dictyostelium macroautophagy mutants vary in the severity of their developmental
    defects.
  findings:
  - statement: atg1, atg6 and atg8 are all required for macroautophagy in Dictyostelium,
      and atg1 mutants show reduced survival during nitrogen starvation.
    supporting_text: genes are required for macroautophagy in Dictyostelium
  - statement: The atg1-1 mutant shows the most severe developmental defect, failing
      to aggregate on bacterial lawns and arresting as loose mounds.
    supporting_text: does not aggregate on bacterial lawns
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary characterization of the Dictyostelium atg1 knockout; establishes
      the requirement of Atg1 for macroautophagy, starvation survival, and multicellular
      development. Abstract-only in cache.
- id: PMID:15358773
  title: Autophagy gene disruption reveals a non-vacuolar cell death pathway in Dictyostelium.
  findings:
  - statement: Disruption of atg1 impairs autophagy and abolishes vacuolization in
      the developmental cell death model, though a non-vacuolar death still occurs.
    supporting_text: led in atg1 mutant cells to impaired autophagy and to no vacuolization
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Shows atg1 is required for autophagic vacuolization; also reveals
      an Atg1-independent non-vacuolar death pathway.
- id: PMID:17031001
  title: Function of the Dictyostelium discoideum Atg1 kinase during autophagy and
    development.
  findings:
  - statement: The kinase domain and conserved C-terminal domain of DdAtg1 are essential
      for autophagy and development; a kinase-negative mutant is dominant-negative.
    supporting_text: these domains
      are essential for autophagy and development
  - statement: Kinase-negative DdAtg1 colocalizes with RFP-Atg8, a marker of preautophagosomal
      structures and autophagosomes.
    supporting_text: a marker of preautophagosomal structures and autophagosomes
  - statement: In dominant-negative Atg1 cells, autophagosomes form and accumulate
      but are non-functional.
    supporting_text: In cells expressing dominant-negative DdAtg1, autophagosomes
      are formed and accumulate but seem not to be functional
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Key functional study of DdAtg1 kinase and C-terminal domains and
      their role in autophagosome formation and localization.
- id: PMID:17150370
  title: From autophagic to necrotic cell death in Dictyostelium.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Review of Dictyostelium cell death; the necrotic pathway is unmasked
      when autophagic death is blocked, so it does not establish a positive Atg1 role
      in necrosis.
- id: PMID:22575510
  title: Lipopolysaccharide induction of autophagy is associated with enhanced bactericidal
    activity in Dictyostelium discoideum.
  findings:
  - statement: LPS-enhanced clearance of phagocytosed S. aureus requires atg1 and
      atg9.
    supporting_text: LPS pre-treatment did not enhance clearance of phagocytized S.
      aureus in cells deficient for either atg1 or atg9
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Links Atg1-dependent autophagy to the antibacterial response.
- id: PMID:25646440
  title: The autophagic machinery ensures nonlytic transmission of mycobacteria.
  findings:
  - statement: Impairing autophagy blocks nonlytic cell-to-cell transmission of mycobacteria
      and compromises host membrane integrity.
    supporting_text: If autophagy is impaired, cell-to-cell transmission is
      inhibited, the host plasma membrane becomes compromised and the host cells die
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Autophagy machinery (including atg1) required for nonlytic mycobacterial
      egress/transmission.
- id: PMID:26246495
  title: Dissecting the function of Atg1 complex in Dictyostelium autophagy reveals
    a connection with the pentose phosphate pathway enzyme transketolase.
  findings:
  - statement: The Dictyostelium Atg1 complex core is Atg1-Atg13-Atg101, more similar
      to the mammalian than the yeast complex.
    supporting_text: The core of this assembly of proteins is formed by Atg1-Atg13-Atg101,
      which seems to be conserved
  - statement: Atg1 physically interacts with transketolase (TKT) and positively regulates
      its activity; TKT activity increases with Atg1 overexpression and decreases
      in atg1-null or kinase-dead cells.
    supporting_text: There is an increase in activity in cells overexpressing Atg1.
      By contrast, TKT activity decreases in cells in which atg1 has been deleted
  - statement: Atg1-GFP has a general cytoplasmic pattern with no specific puncta
      localization.
    supporting_text: Atg1 fused to GFP has been shown previously to have a general
      cytoplasmic pattern in Dictyostelium cells with no specific puncta localization
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines the Dictyostelium Atg1-Atg13-Atg101 complex and the Atg1-transketolase
      regulatory link; full text available.
