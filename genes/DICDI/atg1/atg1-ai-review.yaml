id: Q86CS2
gene_symbol: atg1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: >-
  atg1 encodes the Dictyostelium discoideum ortholog of the Atg1/ULK1
  serine/threonine protein kinase, the most upstream component of the
  macroautophagy induction machinery. The protein has an N-terminal protein
  kinase domain (residues ~7-266) followed by an asparagine/glutamine-rich
  low-complexity region and a conserved C-terminal domain required for its
  localization to forming autophagosomes. Atg1 is the catalytic subunit of the
  Atg1 kinase complex (with Atg13 and Atg101), and its kinase activity initiates
  phagophore/autophagosome formation. Because Dictyostelium undergoes
  starvation-induced multicellular development that depends on autophagy for
  nutrient mobilization, Atg1 is essential for aggregation and for normal
  fruiting-body (sorocarp) formation, and it is required for the vacuolar
  (autophagic) cell death of terminally differentiating cells. Atg1-dependent
  autophagy also contributes to cell-autonomous defense against ingested
  bacteria and yeasts and to nutrient and energy homeostasis, and the kinase
  additionally influences macropinocytosis, cell size and nuclear division, gene
  expression, and mitochondrial energy balance. Atg1 localizes predominantly to
  the cytoplasm and cytosol, with a pool at the preautophagosomal structure
  (phagophore assembly site) membrane.
