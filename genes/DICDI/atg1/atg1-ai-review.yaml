  findings:
  - statement: atg1-null cells show altered ability to predate yeast, implicating
      autophagy in the amoeba-yeast interaction.
    supporting_text: mutants increase (atg1-, kil1-, kil2-) or decrease (atg6-) the
      ability of the
  reference_review:
