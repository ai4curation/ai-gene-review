- id: PMID:31680241
  title: AMPKα promotes basal autophagy induction in Dictyostelium discoideum.
  findings:
  - statement: The AMPK-ATG1 axis is conserved in basal autophagy, shown by co-immunoprecipitation.
    supporting_text: Co-immunoprecipitation studies show conservation of the AMPK-ATG1
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Establishes an AMPK-Atg1 regulatory interaction in Dictyostelium
