- id: PMID:38986731
  title: Trafficking of adhesion and aggregation-modulating proteins during the early
    stages of Dictyostelium development.
  findings:
  - statement: Intracellular and extracellular amounts of the adhesion protein CadA
      are modulated by autophagy genes atg1 and atg9.
    supporting_text: The intracellular and extracellular amounts of CadA are modulated
      by autophagy genes
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Links atg1 to trafficking/secretion of adhesion and aggregation
      proteins during aggregation. Abstract-only in cache.
- id: PMID:39056773
  title: The Multifaceted Interactions of Dictyostelium Atg1 with Mitochondrial Function,
    Endocytosis, Growth, and Development.
  findings:
  - statement: Atg1 positively regulates macropinocytosis; the null mutant has a macropinocytic
      defect and uptake correlates with atg1 expression.
    supporting_text: the atg1 null mutant displayed a macropinocytic defect
  - statement: Atg1 increases tolerance of Dictyostelium to starvation and cAMP treatment.
    supporting_text: Atg1 increases the tolerance of D. discoideum to starvation and
      cAMP treatment
  - statement: Altered atg1 expression yields smaller fruiting bodies and multi-tipped
      aggregates, and Atg1 has a peripheral role in mitochondrial signalling affecting
      respiration.
    supporting_text: knocking out atg1 caused reductions in basal mitochondrial and
      non-mitochondrial respiration
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Comprehensive phenotypic study of atg1 knockout, knockdown and overexpression
      across growth, endocytosis, development, and mitochondrial homeostasis; full
      text available.
