- description: TagC possesses a complete, conserved ABC transporter B-family
    (multidrug-resistance-type) module - a multi-pass transmembrane domain plus an
    ATP-binding cassette - that is proposed to couple ATP binding and hydrolysis to
    transmembrane transport, potentially mediating export of the peptide signal.
    This activity is inferred from the intact domain architecture and has not yet
    been experimentally demonstrated for TagC.
