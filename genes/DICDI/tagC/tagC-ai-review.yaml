- term:
    id: GO:0004252
    label: serine-type endopeptidase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The N-terminal peptidase S8 (subtilisin-like) domain confers
      serine-type endopeptidase activity. This is the demonstrated core molecular
      function of TagC - it cleaves AcbA internally to release the SDF-2 peptide,
      and this activity is blocked by a serine protease inhibitor.
    action: ACCEPT
    reason: The InterPro2GO assignment of serine-type endopeptidase activity is
      confirmed by experimental evidence - TagC processes AcbA to SDF-2, this
      processing requires tagC, and it is abolished by a serine protease
      inhibitor. This is the more specific and appropriate MF term for the
      protease domain.
    supported_by:
    - reference_id: PMID:16672332
      supporting_text: GABA also induces exposure of the protease domain of TagC
        on the surface of prestalk cells where it can convert AcbA to SDF-2
    - reference_id: PMID:15897458
      supporting_text: Addition of the serine protease inhibitor tosyl
        phenylalanyl chloromethylketone to primed cells just before addition of
        AcbA blocked all production of SDF-2
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The C-terminal ABC transporter nucleotide-binding domain contains a
      Walker A/P-loop motif (annotated ATP-binding site in UniProt), so ATP
      binding is a credible biochemical property. It supports the putative
      transporter activity rather than being a core function in itself.
    action: KEEP_AS_NON_CORE
    reason: ATP binding is inferred from the conserved nucleotide-binding cassette
      of the ABC module and is consistent with the annotated Walker A motif, but
      it is a supporting biochemical capacity of the untested transporter module,
      not the demonstrated core function.
