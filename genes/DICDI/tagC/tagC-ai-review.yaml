  review:
    summary: The tag-gene locus (tagB/tagC) is required for prestalk
      specialization, and prestalk cells in turn induce encapsulation of prespore
      cells during culmination. TagC contributes to cell differentiation, but as a
      developmental role acting upstream via signal generation rather than as its
      molecular core function.
    action: KEEP_AS_NON_CORE
