core_functions:
- description: TagC is a subtilisin-like serine endopeptidase that, when its
    protease domain is displayed on the prestalk cell surface, cleaves the
    prespore-derived protein AcbA to release the diffusible spore differentiation
    factor SDF-2, thereby processing a pro-signal into its active peptide form.
