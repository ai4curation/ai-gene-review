id: Q23868
gene_symbol: tagC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: TagC is a large, prestalk-specific, multi-pass membrane protein of
  Dictyostelium discoideum with an unusual bifunctional architecture, combining an
  N-terminal subtilisin-like serine protease (peptidase S8) domain with a
  C-terminal ABC transporter B-family (multidrug-resistance-type) module
  comprising a transmembrane domain and an ATP-binding cassette. During
  culmination TagC is expressed exclusively in prestalk cells, where its protease
  domain becomes exposed on the cell surface in response to the intercellular
  signal GABA. There it cleaves AcbA (acyl-CoA-binding protein), which is released
  from neighboring prespore cells, to generate the spore differentiation factor
  SDF-2. SDF-2 then acts on the histidine kinase receptor DhkA to trigger rapid
  encapsulation of prespore cells into spores, coupling terminal cell
  differentiation to fruiting-body morphogenesis. Loss of TagC abolishes SDF-2
  production and causes a cell-autonomous defect in prestalk specialization.
