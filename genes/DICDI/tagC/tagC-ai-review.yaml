- term:
    id: GO:0042626
    label: ATPase-coupled transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: TagC carries a complete, conserved ABC transporter B-family module
      (transmembrane domain plus an ATP-binding cassette with an intact Walker A
      motif), so an ATPase-coupled transporter activity is structurally plausible
      and phylogenetically inferred. However, no transport substrate or transport
      activity has been demonstrated experimentally; the only demonstrated
      function is the serine protease processing of AcbA. The transporter module
      is hypothesized to participate in export of the peptide signal.
    action: KEEP_AS_NON_CORE
    reason: The ABC transporter activity is inferred from homology to multidrug
      resistance exporters and is biologically plausible given the intact ABC
      module, but it remains untested for TagC and is not the demonstrated core
      function. The proposed role is export of the peptide signal generated by the
      protease domain.
