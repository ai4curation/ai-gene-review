- term:
    id: GO:0016595
    label: glutamate binding
  evidence_type: IDA
  original_reference_id: PMID:16672332
  qualifier: enables
  review:
    summary: Glutamate acts at GrlE as a competitive inhibitor of GABA, and the
      residues that bind the alpha-carboxyl and alpha-amino groups of glutamate
      are conserved in the receptor, consistent with glutamate binding to the
      ligand-binding domain. Binding is retained but is antagonistic rather than
      the core activating function.
    action: KEEP_AS_NON_CORE
    reason: Glutamate binding is experimentally supported (glutamate competes
      with GABA), but at GrlE glutamate is an antagonist that inhibits the GABA
      response, so this is a secondary/modulatory feature rather than the core
      function.
    supported_by:
    - reference_id: PMID:16672332
      supporting_text: Glutamate acts as a competitive inhibitor of GABA
        functions in Dictyostelium
