- term:
    id: GO:0008066
    label: glutamate receptor activity
  evidence_type: IMP
  original_reference_id: PMID:16672332
  qualifier: enables
  review:
    summary: GrlE was originally identified as a metabotropic glutamate
      receptor-like protein and binds glutamate, but functionally glutamate acts
      as a competitive inhibitor of the GABA response rather than as an
      activating agonist. The glutamate-responsive role is secondary to the core
      GABA receptor function.
    action: KEEP_AS_NON_CORE
    reason: Glutamate is a genuine ligand of GrlE but acts antagonistically to
      GABA; classifying GrlE primarily as a glutamate receptor overstates this
      modulatory role, so it is retained as non-core rather than as the core
      molecular function.
    supported_by:
    - reference_id: PMID:16672332
      supporting_text: Glutamate acts as a competitive inhibitor of GABA
        functions in Dictyostelium
