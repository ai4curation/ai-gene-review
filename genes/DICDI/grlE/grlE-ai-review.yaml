- term:
    id: GO:0038039
    label: G protein-coupled receptor heterodimeric complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: part_of
  review:
    summary: This term is transferred by phylogeny from mammalian GABA(B)
      receptors, which are obligate GABABR1/GABABR2 heterodimers. There is no
      evidence that GrlE forms an analogous heterodimeric receptor complex in
      Dictyostelium, which lacks the mammalian two-subunit GABA(B) architecture.
    action: REMOVE
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - COMPARTMENT_OR_COMPLEX_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000828857
        source_label: "PANTHER node for class-C / GABA(B) G-protein-coupled receptors"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Obligate heterodimeric-complex membership is a specific feature of the mammalian GABABR1/GABABR2 pair and does not transfer to the single-gene Dictyostelium receptor"
      - source_id: UniProtKB:Q9UBS5
        source_label: "human GABA(B) receptor subunit 1 (GABBR1)"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Forms an obligate heterodimer with GABBR2 in mammals; Dictyostelium lacks this two-subunit architecture"
    reason: The obligate heterodimer is a specific feature of the mammalian
      GABA(B) receptor pair and does not transfer to this divergent single-gene
      Dictyostelium receptor; there is no experimental support for a
      heterodimeric complex here. This is an IBA over-propagation.
    supported_by:
    - reference_id: PMID:16672332
      supporting_text: The receptor for GABA in Dictyostelium, GrlE, is a
        seven-transmembrane G-protein-coupled receptor that is most similar to
        GABA(B) receptors
