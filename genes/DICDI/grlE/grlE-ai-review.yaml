id: Q54ET0
gene_symbol: grlE
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: GrlE (also called DdmGluPR or GluPR) is a class C (family 3)
  seven-transmembrane G-protein-coupled receptor of the GABA-B/metabotropic
  glutamate receptor family in the social amoeba Dictyostelium discoideum. It
  has a large extracellular Venus-flytrap ligand-binding domain followed by
  seven transmembrane helices and a cytoplasmic tail, and it localizes to the
  plasma membrane. GrlE serves as the receptor for GABA during multicellular
  development, when prespore cells approach the top of the fruiting body and
  GABA released from prespore cells acts through GrlE to trigger release of the
  SDF-2 precursor AcbA, which together with exposure of the TagC protease on
  prestalk cells drives terminal differentiation and encapsulation of spore
  cells, with signaling relayed through PI3-kinase and the PKB-related kinase
  PkbR1. Glutamate, whose alpha-carboxyl and alpha-amino binding residues are
  conserved in the receptor, acts as a competitive antagonist of GABA at GrlE.
  GrlE is also implicated in early development, where loss of the gene causes
  faster growth to higher cell densities, delayed aggregation upon starvation,
  and impaired chemotaxis toward cAMP.
