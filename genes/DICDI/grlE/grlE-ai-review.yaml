- id: PMID:16527814
  title: A metabotropic glutamate receptor family gene in Dictyostelium discoideum.
  findings:
  - statement: GrlE/DdmGluPR is a metabotropic glutamate receptor family GPCR that
      localizes to the plasma membrane.
    supporting_text: DdmGluPR was localized to the plasma membrane of axenically
      grown Ax-2 cells expressed as a green fluorescent protein fusion protein
  - statement: The alpha-carboxyl and alpha-amino glutamate-binding residues are
      conserved in GrlE, but the gamma-carboxyl-interacting residues are not.
    supporting_text: the residues of mGluRs involved in the binding of the
      alpha-carboxylic and alpha-amino groups of glutamate were well conserved in
      DdmGluPR
  - statement: GrlE-null cells grow faster to higher densities, aggregate late,
      and show impaired chemotaxis toward cAMP, implicating GrlE in early
      development.
    supporting_text: DdmGluPR-null cells exhibited delayed aggregates formation
      upon starvation and impaired chemotaxis toward cAMP
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (Taniura et al., J Biol Chem 2006).
      Establishes GrlE identity as an mGluR-family GPCR, plasma membrane
      localization, and the early-development/chemotaxis phenotype used for the
      localization and early-development annotations.
- id: PMID:16672332
  title: GABA induces terminal differentiation of Dictyostelium through a GABAB receptor.
  findings:
  - statement: GrlE is the seven-transmembrane GABA(B)-like receptor for GABA in
      Dictyostelium.
    supporting_text: The receptor for GABA in Dictyostelium, GrlE, is a
      seven-transmembrane G-protein-coupled receptor that is most similar to
      GABA(B) receptors
  - statement: GABA acting through GrlE induces release of the SDF-2 precursor
      AcbA from prespore cells to drive terminal spore differentiation.
    supporting_text: GABA induces the release of the precursor of SDF-2, AcbA,
      from prespore cells
  - statement: GABA/GrlE signaling is relayed through PI3 kinase and the
      PKB-related kinase PkbR1, and glutamate competitively inhibits it.
    supporting_text: The signal transduction pathway from GABA/GrlE appears to be
      mediated by PI3 kinase and the PKB-related protein kinase PkbR1
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified abstract (Anjard & Loomis, Development 2006).
      Directly identifies GrlE as the GABA receptor driving terminal
      differentiation and provides the core GABA receptor and GABA signaling
      annotations; glutamate is described as a competitive inhibitor.
suggested_questions:
- question: >-
    Which heterotrimeric G-protein alpha subunit does GrlE couple to when GABA
    triggers the PI3-kinase / PkbR1 relay that drives AcbA/SDF-2 release during
    culmination?
