core_functions:
- description: ACG is an osmolality-activated adenylate cyclase that converts ATP to
    cAMP at the plasma membrane. High osmolality directly stimulates catalysis, and
    the resulting intracellular cAMP activates PKA to keep spores dormant and inhibit
    premature germination.
