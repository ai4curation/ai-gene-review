- description: ACG functions as a primary, intramolecular osmosensor. Its
    extracellular/transmembrane region detects high osmolality and directly couples
    this stimulus to activation of the cytoplasmic cyclase domain, initiating an
    osmosensory cAMP signaling pathway. This osmosensing is intrinsic to ACG, as it
    is retained when ACG is expressed in a yeast adenylyl cyclase null mutant.
  molecular_function:
