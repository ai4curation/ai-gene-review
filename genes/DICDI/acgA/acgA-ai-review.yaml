- term:
    id: GO:0019887
    label: protein kinase regulator activity
  evidence_type: IMP
  original_reference_id: PMID:8798577
  qualifier: enables
  review:
    summary: ACG activates PKA, but it does so indirectly by synthesizing the
      second messenger cAMP that binds the PKA regulatory subunit. ACG is not
      itself a direct protein kinase regulator; its molecular function is
      adenylate cyclase activity, and PKA activation is a downstream consequence.
    action: MARK_AS_OVER_ANNOTATED
    reason: The IMP phenotype (loss of osmotic control of germination via PKA)
      reflects ACG acting upstream of PKA through cAMP, not a direct
      kinase-regulator molecular function. Assigning protein kinase regulator
      activity conflates the downstream signaling effect with ACG's true
      catalytic activity.
    supported_by:
    - reference_id: PMID:8798577
      supporting_text: These data indicate that ACG is an osmosensor controlling
        spore germination through activation of protein kinase A.
