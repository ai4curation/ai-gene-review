id: Q03101
gene_symbol: acgA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: acgA encodes adenylyl cyclase G (ACG), an atypical, receptor-type
  adenylyl cyclase of the class-4 adenylyl/guanylyl cyclase family. It is a
  single-pass type II membrane protein comprising a large extracellular domain
  (including a CHASE domain), a single transmembrane anchor, and a single
  intracellular catalytic cyclase domain that converts ATP to 3',5'-cyclic AMP.
  ACG is catalytically active as a dimer and, unlike the aggregation-stage
  cyclase ACA, is insensitive to G proteins. Its defining feature is an
  intramolecular osmosensor that directly couples high osmolality to cAMP
  synthesis, a property retained even when ACG is expressed heterologously in
  yeast. ACG is expressed predominantly in prespore and spore cells. In the
  fruiting body, the ambient high osmolality of the spore head activates ACG,
  and the resulting intracellular cAMP maintains high protein kinase A (PKA)
  activity that keeps spores dormant and prevents premature germination. Earlier
  in development ACG protein accumulates in the prespore region, where the cAMP
  it produces promotes prespore differentiation, a role partially redundant with
  the cyclase ACB (AcrA). ACG function in spore dormancy and germination is
  deeply conserved across the Dictyostelia and is thought to derive from an
  ancestral drought/osmolarity-sensing role in the encystation and excystation
  of solitary amoebae.
