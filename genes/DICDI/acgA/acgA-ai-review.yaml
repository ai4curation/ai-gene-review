- term:
    id: GO:0001653
    label: peptide receptor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: This IBA term is propagated from receptor-type cyclase family members
      based on the large extracellular (CHASE) domain. For ACG, however, the
      activating stimulus is high osmolality acting on an intramolecular
      osmosensor, and no peptide ligand has been shown to be required for
      activation (ACG is fully osmoactivatable in yeast without auxiliary
      sensors). A downstream link to the SDF-1 phosphopeptide has been proposed
      but not established as direct ligand binding.
    action: MARK_AS_OVER_ANNOTATED
    reason: There is no experimental demonstration that ACG functions as a peptide
      receptor. Its extracellular domain acts as an intramolecular osmosensor, and
      activation does not require an external peptide ligand, so transferring
      peptide receptor activity from family members over-annotates ACG.
    supported_by:
    - reference_id: PMID:14718564
      supporting_text: This strongly suggests that the ACG osmosensor is
        intramolecular, which would define ACG as the first characterized primary
        osmosensor in eukaryotes.
