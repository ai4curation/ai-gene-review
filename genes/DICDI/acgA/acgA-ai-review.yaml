- id: PMID:14718564
  title: Adenylyl cyclase G is activated by an intramolecular osmosensor.
  findings:
  - statement: ACG is activated by high osmolality and mediates inhibition of spore
      germination by this stress factor.
    supporting_text: Adenylyl cyclase G (ACG) is activated by high osmolality and
      mediates inhibition of spore germination by this stress factor.
  - statement: The ACG osmosensor is intramolecular, defining ACG as the first
      characterized primary osmosensor in eukaryotes.
    supporting_text: This strongly suggests that the ACG osmosensor is
      intramolecular, which would define ACG as the first characterized primary
      osmosensor in eukaryotes.
  - statement: ACG activity requires dimerization via a region outside the catalytic
      domain, but dimerization does not mediate osmotic activation.
    supporting_text: This indicates that ACG activity requires dimerization via a
      region outside the catalytic domain
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PMC full text confirms ACG is an intramolecular osmosensor whose
      osmoactivation is retained in yeast; directly supports the osmosensor
      activity, osmosensory signaling, and germination-control annotations.
- id: PMID:16952277
  title: Pharmacological profiling of the Dictyostelium adenylate cyclases ACA, ACB
    and ACG.
  findings:
  - statement: Caffeine inhibits cAMP accumulation by ACG as well as by ACA and ACB.
    supporting_text: Caffeine, which was previously used to specifically block ACA
      function, also inhibited cAMP accumulation by ACB and ACG.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports the response-to-caffeine annotation and confirms ACG is
      an osmosensor controlling spore germination that is not activated by G
      proteins.
- id: PMID:17267449
  title: cAMP production by adenylyl cyclase G induces prespore differentiation in
    Dictyostelium slugs.
  findings:
  - statement: ACG protein is upregulated in prespore tissue and acg null mutants
      show reduced prespore differentiation, severe when ACB is also deleted.
    supporting_text: acg null mutants show reduced prespore differentiation, which
      becomes very severe when ACB is also deleted.
  - statement: In spores, ACG localizes at the cell periphery as expected for a
      transmembrane osmosensor.
    supporting_text: In spores, ACG was localized at the cell periphery as would be
      expected for a transmembrane osmosensor
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the prespore-differentiation role of ACG-derived cAMP
      and the plasma-membrane localization of ACG in spores.
- id: PMID:18640994
  title: 'From drought sensing to developmental control: evolution of cyclic AMP signaling
    in social amoebas.'
  findings:
