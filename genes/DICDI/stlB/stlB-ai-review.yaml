    supporting_text: this type III PKS efficiently synthesizes PCP
  - reference_id: PMID:16906151
    supporting_text: our definitive identification of Steely2 as the missing
      DIF-pathway PCP synthase (DAPS)
  - reference_id: PMID:16906151
    supporting_text: responsible for biosynthesis of the DIF acylphloroglucinol
      scaffold
