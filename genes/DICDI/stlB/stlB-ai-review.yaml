- term:
    id: GO:0048102
    label: autophagic cell death
  evidence_type: IMP
  original_reference_id: PMID:25518941
  qualifier: acts_upstream_of_or_within
  review:
    summary: stlB disruption (and cerulenin inhibition of polyketide synthesis)
      almost completely prevents c-di-GMP-induced vacuolar cell death, showing that
      an stlB-dependent polyketide (DIF-1) is required for this developmental cell
      death. StlB acts upstream via DIF-1 rather than directly executing cell death.
    action: KEEP_AS_NON_CORE
    reason: The requirement for StlB in developmental (vacuolar/autophagic) cell
