core_functions:
- description: StlB is a hybrid type I FAS / type III PKS ("steely") enzyme that
    synthesizes the acylphloroglucinol backbone (THPH/PCP) of DIF-1. Its N-terminal
    FAS-like module supplies a hexanoyl acyl intermediate that the C-terminal
    CHS-like type III PKS domain extends with three malonyl units and cyclizes,
    catalyzing the committed first step of DIF-1 biosynthesis.
  molecular_function:
    id: GO:0106265
    label: THPH synthase activity
  directly_involved_in:
