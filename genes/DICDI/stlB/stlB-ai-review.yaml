        source_label: "PANTHER node for the type I FAS / PKS family"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Fatty acid biosynthesis reflects canonical type I FAS members; StlB is a hybrid FAS-type III PKS that makes a polyketide (DIF-1 backbone), not fatty acids"
    supported_by:
