- term:
    id: GO:0018893
    label: dibenzofuran metabolic process
  evidence_type: IMP
  original_reference_id: PMID:36252029
  qualifier: involved_in
  review:
    summary: This term appears to be a chemical mis-mapping. DIF-1 is a chlorinated
      acylphloroglucinol (an alkylphenone), not a dibenzofuran, and the cited paper
      is about the pks5-derived dictyodenes and mentions StlB only as being required
      for DIF-1 synthesis. The intended biology is StlB's role in producing the
      DIF-1 polyketide.
    action: MODIFY
    reason: dibenzofuran metabolic process is chemically inappropriate for the DIF-1
      acylphloroglucinol product of StlB, and PMID:36252029 does not characterize
      dibenzofuran metabolism by StlB. The supported biology, that StlB is required
      for DIF-1 synthesis, is better represented by DIF-1 biosynthetic process.
    proposed_replacement_terms:
