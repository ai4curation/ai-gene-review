- id: PMID:16906151
  title: Biosynthesis of Dictyostelium discoideum differentiation-inducing factor
    by a hybrid type I fatty acid-type III polyketide synthase.
  findings:
  - statement: StlB (Steely2) is a hybrid enzyme with six type I FAS-like catalytic
      domains fused to a C-terminal iterative type III (chalcone-synthase-like) PKS
      domain.
    supporting_text: Steely proteins possess six catalytic domains homologous to
      metazoan type I fatty acid synthases (FASs) but feature an iterative type III
      polyketide synthase (PKS)
  - statement: The StlB type III PKS domain synthesizes PCP, the acylphloroglucinol
      skeleton of DIF-1 and its degradation product DIF-3.
    supporting_text: this type III PKS efficiently synthesizes PCP
  - statement: StlB is the DIF-pathway PCP (THPH) synthase; the Steely2 knockout
      does not accumulate DIF-1 and is rescued by exogenous PCP.
    supporting_text: confirms Steely2-mediated catalysis of PCP biosynthesis in vivo
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Primary paper establishing StlB (Steely2) as the DIF-1 pathway
      acylphloroglucinol (THPH/PCP) synthase by combined in vitro enzymology and in
      vivo knockout/rescue; PMID and title verified against the cached record."
- id: PMID:18402932
  title: DIF-1 induces the basal disc of the Dictyostelium fruiting body.
  findings:
  - statement: The stlB (PKS) null mutant makes no DIF-1 and produces long, thin
      slugs, ~35% fewer prestalk cells, and fruiting bodies lacking the basal disc
      and a proper lower cup; defects are rescued by exogenous DIF-1.
    supporting_text: DIF-1 is required for slug migration and crucially for the
      formation of the lower cup and basal disc of the fruiting body
  - statement: The DIF-1 backbone is a 12-carbon polyketide made by the steely B
      (stlB) PKS.
    supporting_text: The backbone of DIF-1 consists of a 12-carbon polyketide
      produced by the steely B (stlB) PKS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Full-text mutant-phenotype study directly establishing the
      developmental roles (prestalk differentiation, basal disc / lower cup) that
      require StlB-dependent DIF-1."
- id: PMID:24096661
  title: Steely enzymes are involved in prestalk and prespore pattern formation.
  findings:
  - statement: DIF-1 (product of SteelyB/StlB) is the major stalk cell inducer, and
      the stlA/stlB double knockout loses pstA marker gene expression.
