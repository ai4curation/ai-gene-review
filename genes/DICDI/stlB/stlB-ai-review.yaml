- term:
    id: GO:0004315
    label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro2GO annotation from the ketoacyl synthase (KS) domain
      signature. StlB does contain a functional beta-ketoacyl synthase (condensing)
      domain used to elongate the acyl intermediate, so this is a genuine component
      activity, but it is not the distinctive core function of the protein.
    action: KEEP_AS_NON_CORE
    reason: The KS domain and its condensation (3-oxoacyl-ACP synthase) chemistry
      are real parts of the StlB catalytic cycle, but the enzyme's defining function
      is synthesis of the DIF-1 acylphloroglucinol backbone (THPH synthase). This
      domain-level activity is best kept as non-core supporting machinery.
