- term:
    id: GO:0006633
    label: fatty acid biosynthetic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic inference of fatty acid biosynthesis from type I FAS
      family members. StlB contains FAS-like catalytic domains but is a hybrid
      polyketide synthase whose physiological output is the acylphloroglucinol
      backbone of DIF-1, not free fatty acids.
    action: REMOVE
    reason: This IBA is an over-propagation from the metazoan type I FAS family.
      The N-terminal FAS-like module of StlB only generates a hexanoyl starter that
      is channeled internally to the C-terminal type III PKS domain to build a
      polyketide; StlB does not produce fatty acids as pathway products. Polyketide
      biosynthetic process and DIF-1 biosynthetic process capture the true biology.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
      source_entities:
