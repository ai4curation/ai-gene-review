    label: fatty acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: InterPro2GO annotation from the ketoacyl synthase active-site
      signature. As with the IBA, this reflects FAS-like domains rather than the
      actual product of StlB, which is a polyketide (DIF-1 backbone).
    action: MARK_AS_OVER_ANNOTATED
    reason: The FAS-like domains of StlB build a hexanoyl intermediate that is fed
