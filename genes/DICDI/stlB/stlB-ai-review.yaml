id: Q54FI3
gene_symbol: stlB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: StlB (Steely B, also called Steely2, PKS37 or dipks37) is a large
  (~2968-residue) multidomain hybrid biosynthetic enzyme of the social amoeba
  Dictyostelium discoideum. It fuses an N-terminal type I fatty-acid-synthase-like
  module (ketosynthase, acyltransferase/malonyl transacylase, dehydratase, enoyl
  reductase, ketoreductase and acyl-carrier-protein domains) to a C-terminal type
  III chalcone-synthase-like polyketide synthase domain, an architecture termed
  "steely" that is unique to dictyostelids. StlB synthesizes the acylphloroglucinol
  backbone (THPH/PCP, 2,4,6-trihydroxyphenyl-hexan-1-one) of DIF-1 by loading a
  hexanoyl starter, performing three malonyl-CoA polyketide extensions and a final
  intramolecular Claisen (C6-to-C1) cyclization. The THPH product is subsequently
  dichlorinated by the halogenase ChlA and O-methylated by the methyltransferase
  DmtA to yield DIF-1 (1-(3,5-dichloro-2,6-dihydroxy-4-methoxyphenyl)hexan-1-one),
  a chlorinated alkylphenone morphogen. Because StlB catalyzes the committed first
  step of DIF-1 biosynthesis, it is required, via DIF-1, for prestalk and stalk
  cell differentiation, formation of the basal disc and lower cup of the fruiting
  body, slug migration, and developmental (vacuolar) cell death. It is expressed
  during multicellular development, coordinately with dmtA.
