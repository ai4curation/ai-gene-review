- term:
    id: GO:0004713
    label: protein tyrosine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: DYRK-family kinases are named for dual-specificity tyrosine
      phosphorylation, but the tyrosine-kinase activity is confined to
      cis-autophosphorylation of the activation loop during folding; the mature
      enzyme is a substrate-directed Ser/Thr kinase. Annotating substrate-directed
      protein tyrosine kinase activity therefore overstates the function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The tyrosine-phosphorylation capacity of DYRK/MNB kinases is an
      intramolecular autophosphorylation event, not a trans-acting tyrosine kinase
      activity toward other proteins. The dual-specificity is better captured by
      the parent term protein serine/threonine/tyrosine kinase activity; a bare
      protein tyrosine kinase annotation implies substrate tyrosine phosphorylation
      that has not been demonstrated for YakA.
    supported_by:
    - reference_id: PMID:11410593
      supporting_text: a subclass of dual-specificity Yak-related kinases (Dyrk)
        with unknown function
