- id: PMID:10375515
  title: Starvation promotes Dictyostelium development by relieving PufA inhibition
    of PKA translation through the YakA kinase pathway.
  findings:
  - statement: YakA governs the growth-to-development transition by regulating the
      cell cycle, repressing growth-phase genes and inducing developmental genes.
    supporting_text: The YakA protein kinase governs this transition by regulating
      the cell cycle, repressing growth-phase genes and inducing developmental genes
  - statement: YakA initiates development by inhibiting PufA, which represses
      translation of pkaC (PKA-C) mRNA.
    supporting_text: YakA regulates the initiation of development by inhibiting the
      expression of PufA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary Kuspa-lab study establishing the YakA-PufA-PKA-C axis;
      abstract verified against PubMed.
- id: PMID:11410593
  title: The protein kinase YakA regulates g-protein-linked signaling responses during
    growth and development of Dictyostelium.
  findings:
  - statement: yakA-null cells resemble G-protein beta-subunit nulls, fail to enter
      development, and have defects in folic acid-induced (G-protein-mediated)
      responses.
    supporting_text: The yakA-null cells have strong defects in folic acid-induced
      responses, such as actin polymerization and cGMP accumulation, indicating that
      they play a role in G-protein-mediated signaling responses
  - statement: YakA-GFP localizes to the cytosol and YakA is proposed to be a
      functional homolog of mammalian Dyrk2/Dyrk3 dual-specificity kinases.
    supporting_text: We localized YakA-GFP to the cytosol suggesting that YakA may
      be a functional homolog of its mammalian counterparts Dyrk2 and Dyrk3
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Provides the direct cytosolic localization and dual-specificity
      DYRK homology; abstract verified against PubMed.
