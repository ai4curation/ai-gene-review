id: Q54QV3
gene_symbol: yakA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: YakA is a large cytoplasmic dual-specificity protein kinase of the
  CMGC/MNB-DYRK subfamily (a homolog of yeast Yak1p and mammalian DYRK2/DYRK3)
  that acts as the master regulator of the growth-to-development transition in
  Dictyostelium discoideum. During vegetative growth it controls the cell cycle,
  setting the interval between cell divisions; its overexpression arrests growth
  while yakA-null cells have an accelerated cell cycle and are smaller than
  wild-type. Upon starvation YakA reprograms gene expression, repressing
  growth-phase genes (including the translational repressor pufA) and inducing
  the earliest developmental genes. By lowering PufA, which otherwise blocks
  translation of pkaC mRNA, YakA raises the level of the PKA catalytic subunit
  (PKA-C), which in turn drives expression of the aggregation-stage adenylyl
  cyclase (acaA/ACA) and the cAMP receptor (carA/cAR1), enabling cAMP relay,
  chemotactic aggregation and fruiting-body (sorocarp) formation. YakA also
  functions as a general sensor of environmental stress and is required for
  cell-cycle arrest and survival under oxidative, nitrosative and heat stress,
  acting through a cAMP/PKA-dependent pathway, and its transcript is induced by
  starvation and by osmotic, oxidative and other stresses. The protein has a
  central protein kinase domain flanked by extensive low-complexity and
  disordered regions and phosphorylates generic substrates such as myelin basic
  protein in vitro.
