id: P42523
gene_symbol: tgrC1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: TgrC1 (Tiger protein C1; historically named gp150 and LagC/lagC1) is a
  large, heavily N-glycosylated single-pass type I transmembrane cell-surface glycoprotein
  of the social amoeba Dictyostelium discoideum. Its long extracellular region contains
  multiple immunoglobulin-like IPT/TIG domains, a single C-terminal transmembrane
  helix, and a short cytoplasmic tail. TgrC1 is expressed upon starvation from the
  aggregation/post-aggregation stage onward and localizes to the plasma membrane,
  becoming enriched at cell-cell contact regions. It functions as the heterophilic
  ligand for the transmembrane receptor TgrB1 displayed on adjacent cells; TgrC1 forms
  cis-homodimers that bind monomeric TgrB1 in trans, nucleating the assembly of large
  TgrB1-TgrC1 adhesion complexes that mediate EDTA-resistant (calcium-independent)
  cell-cell adhesion during the post-aggregation stages of multicellular development.
  This adhesion is required for progression beyond the loose aggregate stage, tip
  formation, slug and fruiting body morphogenesis, and for prestalk/prespore cell-type
  differentiation. The adjacent tgrB1 and tgrC1 genes share a common promoter and
  are among the most polymorphic loci in the genome; a matching pair of tgrB1 and
  tgrC1 alleles is necessary and sufficient for allorecognition (self/kin recognition),
  making the Tgr locus a polychromatic greenbeard that governs strain segregation
  and cooperative development. TgrC1 acts largely non-cell-autonomously (as a ligand),
  whereas its partner TgrB1 signals cell-autonomously as the receptor.
