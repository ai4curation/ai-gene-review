    supporting_text: The ability of TgrC1 to form cis-homodimers spontaneously was
      demonstrated by fluorescence complementation studies and confirmed by chemical
      cross-linking
  - reference_id: PMID:24490801
    supporting_text: the coalescence of TgrB1-TgrC1 clusters results in the formation
      of large adhesion complexes
