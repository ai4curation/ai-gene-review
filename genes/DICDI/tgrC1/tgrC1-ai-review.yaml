core_functions:
- description: TgrC1 acts as the heterophilic cell-surface ligand for the TgrB1 receptor
    on adjacent cells. Its glycosylated IPT/TIG ectodomain, displayed on the external
    side of the plasma membrane, binds TgrB1 in trans in an allele-specific manner,
    driving calcium-independent cell-cell adhesion, allorecognition/self-recognition,
    and activation of TgrB1-mediated signaling required for post-aggregative development.
  molecular_function:
    id: GO:0048018
    label: receptor ligand activity
  directly_involved_in:
  - id: GO:0007157
    label: heterophilic cell-cell adhesion
  - id: GO:0009988
    label: cell-cell recognition
  locations:
  - id: GO:0009897
    label: external side of plasma membrane
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:29038229
    supporting_text: TgrB1 acts as a receptor with TgrC1 as its ligand in cooperative
      aggregation and differentiation
  - reference_id: PMID:29038229
    supporting_text: These non-cell-autonomous phenotypes indicate that TgrC1 functions
      as a ligand and TgrB1 does not
  - reference_id: PMID:23477311
    supporting_text: The heterophilic adhesion protein TgrC1 (Tgr is transmembrane,
      IPT, IG, E-set, repeat protein) is expressed during cell aggregation
- description: TgrC1 self-associates into cis-homodimers on the surface of one cell;
    these homodimers bind monomeric TgrB1 on the neighboring cell and nucleate the
    coalescence of large TgrB1-TgrC1 clusters into the cell-cell adhesion complex.
  molecular_function:
