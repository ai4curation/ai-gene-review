    label: positive regulation of aggregate size involved in sorocarp development
  evidence_type: IGI
  original_reference_id: PMID:17660362
  qualifier: acts_upstream_of_or_within
  review:
    summary: Loss of SmlA causes formation of small groups due to oversecretion of
      counting factor, so SmlA normally acts to promote larger aggregate/group size.
      A genetic interaction with sslA (a second-site suppressor of smlA-null)
      supports SmlA acting within the group-size regulation pathway.
    action: ACCEPT
