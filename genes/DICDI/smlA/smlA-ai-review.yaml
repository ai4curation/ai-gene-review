core_functions:
- description: SmlA is a cytosolic regulator that restrains the secretion (or
    processing) of counting factor, a secreted multisubunit complex that provides
    negative feedback on group size. By limiting counting-factor secretion, SmlA
    promotes formation of normal, larger aggregates during sorocarp development;
    loss of SmlA causes counting-factor oversecretion, excessive stream breakup,
    and many small fruiting bodies. No catalytic molecular function has been
    identified for SmlA.
  supported_by:
