id: P54661
gene_symbol: smlA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: SmlA (small aggregate formation protein) is a cytosolic protein of
  Dictyostelium discoideum that regulates the size of the multicellular aggregates
  formed by starving cells. It is expressed in vegetative and early developing
  cells, with mRNA declining after about 10 hours of development. SmlA itself is
  not secreted and has no recognizable sequence motifs; instead it acts
  intracellularly to restrain the secretion (or processing) of counting factor
  (CF), a secreted multisubunit complex (including countin) that provides negative
  feedback limiting group size. Loss of SmlA causes oversecretion of counting
  factor, so that aggregation streams break up excessively and cells form large
  numbers of small aggregates and fruiting bodies. Downstream of this pathway,
  counting factor lowers intracellular glucose by inhibiting glucose-6-phosphatase,
  so smlA-null cells (with high CF activity) show altered glucose-6-phosphatase
  activity and glucose metabolism. SmlA is thus a size-control regulator acting
  upstream of the secreted counting-factor signalling system rather than an enzyme
  with a defined catalytic activity.
