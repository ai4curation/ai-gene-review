- term:
    id: GO:0045335
    label: phagocytic vesicle
  evidence_type: HDA
  original_reference_id: PMID:19482547
  qualifier: located_in
  review:
    summary: SmlA was detected among 157 proteins in a high-throughput proteomic
      catalog of Legionella-containing phagosomes. This is an incidental mass-
      spectrometry hit that conflicts with the well-established cytosolic
      localization of SmlA and does not reflect a functional phagosomal role.
    action: MARK_AS_OVER_ANNOTATED
    reason: High-throughput phagosome proteomics readily captures abundant cytosolic
      proteins as contaminants. SmlA is directly shown to be cytosolic, so a
      phagocytic-vesicle location is an over-annotation of a large-scale dataset
      rather than a functional localization.
