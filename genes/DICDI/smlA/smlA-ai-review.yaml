  qualifier: acts_upstream_of_or_within
  review:
    summary: SmlA controls the secretion (or processing) of the secreted counting
      factor that limits aggregate size; loss of SmlA leads to oversecretion of this
      factor. The generic regulation-of-secretion term is correct, but the direction
