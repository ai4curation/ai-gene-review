- description: Through localized synthesis and vesicular delivery of cAMP at the
    cell rear, ACA relays the extracellular cAMP chemoattractant to neighboring
    cells, driving chemotactic aggregation (the cAMP relay). ACA activity is
    controlled downstream of the cAR1 receptor via G proteins/CRAC and
    PI3K/Ras/Rap1/TORC2, and its cAMP output also acts through PKA at the
    organizing tip in later development.
