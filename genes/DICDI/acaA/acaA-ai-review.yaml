id: Q03100
gene_symbol: acaA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Adenylate cyclase A (ACA, encoded by acaA) is the aggregation-stage
  adenylyl cyclase of Dictyostelium discoideum, a multi-pass transmembrane enzyme
  of the class-4 adenylyl cyclase/guanylyl cyclase family that catalyzes the
  Mg2+-dependent conversion of ATP to 3',5'-cyclic AMP (cAMP). It is the enzyme
  responsible for cAMP synthesis during the aggregation phase of development,
  generating the oscillatory extracellular cAMP waves that act as the
  chemoattractant driving chemotactic cell aggregation (the cAMP relay). ACA
  activity is controlled downstream of the cAMP receptor cAR1 through
  heterotrimeric G proteins and the cytosolic regulator CRAC, with additional
  input from PI3K, RasG/RasC, Rap1 and TORC2 signaling. In polarized, chemotaxing
  cells ACA is enriched in the plasma membrane at the rear (uropod/trailing edge);
  ACA protein and its mRNA are carried on ACA-containing intracellular vesicles to
  the back of cells, where localized translation and vesicle secretion (as
  multivesicular bodies) relay the cAMP signal head-to-tail to trailing cells to
  enable stream formation. Beyond aggregation, ACA-derived cAMP acts through PKA
  during later development, including at the organizing tip where it mediates
  c-di-GMP-induced stalk cell differentiation. Loss of ACA abolishes cAMP
  synthesis and aggregation and impairs suppression of lateral pseudopods during
  chemotaxis. ACA is distinct from the germination/spore adenylyl cyclase ACG and
  the culmination adenylyl cyclase ACR/ACB.
