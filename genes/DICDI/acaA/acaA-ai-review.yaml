core_functions:
- description: ACA catalyzes the Mg2+-dependent synthesis of 3',5'-cyclic AMP from
    ATP (EC 4.6.1.1) as the aggregation-stage adenylyl cyclase, and is the enzyme
    responsible for cAMP production during Dictyostelium aggregation. It acts as an
    integral plasma membrane enzyme that becomes enriched at the rear (uropod and
    trailing edge) of polarized cells.
