- id: PMID:10930471
  title: The internal phosphodiesterase RegA is essential for the suppression of lateral
    pseudopods during Dictyostelium chemotaxis.
  findings:
  - statement: RegA is required to suppress lateral pseudopod formation during
      chemotaxis in increasing temporal cAMP gradients.
    supporting_text: RegA is essential for specifically suppressing lateral
      pseudopod formation during the response to an increasing temporal gradient
      of cAMP
  - statement: In regA-null cells myosin II fails to localize normally to the
      cortex.
    supporting_text: myosin II does not localize in a normal manner to the cortex
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available; directly supports the chemotaxis/pseudopod
      and cortical myosin localization annotations.
- id: PMID:12796307
  title: Genetic interactions of the E3 ubiquitin ligase component FbxA with cyclic
    AMP metabolism and a histidine kinase signaling pathway during Dictyostelium discoideum
    development.
  findings:
  - statement: regA (and dhkA) suppressor mutations rescue the culmination
      deficiency of fbxA cells.
    supporting_text: both suppressors also rescued substantially the culmination
      deficiency of the fbxA strain
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports RegA's developmental (sporulation/culmination) role via
      suppressor genetics linked to cAMP metabolism.
- id: PMID:14718564
  title: Adenylyl cyclase G is activated by an intramolecular osmosensor.
  findings:
  - statement: Osmotic up-shift converts DokA to a phosphatase that inactivates
      RegA, leading to cell cortex fortification.
    supporting_text: This results in inactivation of the cAMP phosphodiesterase
      RegA and ultimately in fortification of the cell cortex
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Primarily about ACG, but the introduction traces RegA's role in
      the osmotic-stress cAMP response, supporting the osmotic-stress annotation.
- id: PMID:15752425
  title: cAMP controls cytosolic Ca2+ levels in Dictyostelium discoideum.
  findings:
  - statement: The regA-null mutant lacks the main cAMP phosphodiesterase and shows
      altered cAMP metabolism.
    supporting_text: a mutant that is devoid of the main cAMP-phosphodiesterase
      (PDE) RegA and displays an altered cAMP metabolism
  - statement: Loss of RegA is associated with augmented release of Ca2+ from
      internal stores.
    supporting_text: an augmented release of Ca2+ from stores in the mutant
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Links RegA-controlled intracellular cAMP to cytosolic calcium
      regulation; calcium effects are downstream of the core PDE function.
- id: PMID:17040207
  title: Seven Dictyostelium discoideum phosphodiesterases degrade three pools of
    cAMP and cGMP.
  findings:
  - statement: RegA (DdPDE2) is a cAMP-specific PDE localized in the cytosol that
      degrades intracellular cAMP and is regulated by histidine kinase/phosphorelay.
    supporting_text: DdPDE2 (RegA) encodes a cAMP-specific PDE localized in the
      cytosol of the cell where it degrades intracellular cAMP
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Authoritative statement of RegA's cAMP specificity, cytosolic
      localization, and phosphorelay regulation; grounds the core function and the
      cGMP-activity REMOVE.
- id: PMID:17659086
  title: High-throughput analysis of spatio-temporal dynamics in Dictyostelium.
  findings: []
  reference_review:
    relevance: LOW
    correctness: UNVERIFIED
    review_notes: High-throughput phenotype screen; abstract does not contain a
      regA-specific statement, so this reference only corroborates the
      well-established sorocarp-development role indirectly.
- id: PMID:24511612
  title: Loss of cAMP-specific phosphodiesterase rescues spore development in G protein
    mutant in dictyostelium.
  findings:
  - statement: Loss of RegA accelerates spore development, consistent with elevated
      cAMP/PKA driving precocious differentiation.
    supporting_text: Loss of RegA also results in accelerated spore development
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports RegA's role in restraining spore development downstream
      of cAMP/PKA signaling.
- id: PMID:25858552
  title: Response of Dictyostelium discoideum to UV-C and involvement of poly (ADP-ribose)
    polymerase.
  findings:
  - statement: regA was among developmentally regulated genes monitored by RT-PCR
      after UV-C exposure.
    supporting_text: regA, ctnA, ctnB, gp24, hspD and dsn were analysed using
      semiquantitative RT-PCR
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: regA appears only as one of several developmental marker genes in
      an expression assay; provides weak, non-core support for a UV-C response
      role.
- id: PMID:26919666
  title: Differentiation-inducing factor 2 modulates chemotaxis via the histidine
    kinase DhkC-dependent pathway in Dictyostelium discoideum.
  findings:
  - statement: DIF-2 enhances chemotaxis in shallow cAMP gradients via RegA within
      the DhkC-RdeA-RegA two-component system.
    supporting_text: DIF-2 enhances chemotaxis under the same conditions via a
      phosphodiesterase, response regulator A (RegA)
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Abstract-only but directly supports RegA's role in DIF-2-modulated
      chemotaxis via the DhkC-RdeA-RegA pathway.
- id: PMID:31730032
  title: Mitogen-activated protein kinase regulation of the phosphodiesterase RegA
    in early Dictyostelium development.
  findings:
  - statement: The MAP kinase Erk2 physically associates with RegA and
      downregulates its function.
    supporting_text: Co-immunoprecipitation analysis indicated that Erk2
      associates with both RegA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Documents the RegA-Erk2 physical interaction underpinning the
      protein-binding (protein kinase binding) annotation.
- id: PMID:9435289
  title: A cAMP-phosphodiesterase controls PKA-dependent differentiation.
  findings:
  - statement: RegA phosphodiesterase is stimulated by binding to the PKA
      regulatory subunit (PKA-R).
    supporting_text: stimulated by binding to the regulatory subunit of
      cAMP-dependent protein kinase, PKA-R
  - statement: Inhibition of RegA increases PKA activity at a terminal
      differentiation checkpoint.
    supporting_text: inhibition of the phosphodiesterase results in an increase in
      the activity of PKA, which acts at a check point for terminal
      differentiation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes RegA as the cAMP phosphodiesterase controlling
      PKA-dependent differentiation and its stimulation by PKA-R binding.
- id: PMID:9582277
  title: An intersection of the cAMP/PKA and two-component signal transduction systems
    in Dictyostelium.
  findings:
  - statement: RegA has a cAMP phosphodiesterase domain (Km ~5 uM) and a
      response-regulator domain; phosphotransfer depends on Asp212.
    supporting_text: One domain is a cAMP phosphodiesterase (Km approximately 5
      microM); the other is homologous to response regulators
  - statement: Phosphotransfer to RegA is dependent on Asp212, the predicted
      phosphoacceptor.
    supporting_text: with transfer dependent on Asp212, the predicted
      phosphoacceptor
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines the two-domain architecture and the Asp212 phosphoacceptor
      that activates the phosphodiesterase.
core_functions:
- description: RegA is a cytosolic cAMP-specific 3',5'-cyclic-nucleotide
    phosphodiesterase that degrades intracellular cAMP, thereby limiting PKA
    activity and acting as a negative regulator of cAMP/PKA signaling that times
    terminal differentiation.
  molecular_function:
    id: GO:0004115
    label: 3',5'-cyclic-AMP phosphodiesterase activity
  locations:
  - id: GO:0005829
    label: cytosol
  directly_involved_in:
  - id: GO:0141162
    label: negative regulation of cAMP/PKA signal transduction
  supported_by:
  - reference_id: PMID:17040207
    supporting_text: DdPDE2 (RegA) encodes a cAMP-specific PDE localized in the
      cytosol of the cell where it degrades intracellular cAMP
  - reference_id: PMID:9435289
    supporting_text: inhibition of the phosphodiesterase results in an increase in
      the activity of PKA, which acts at a check point for terminal
      differentiation
- description: RegA's N-terminal receiver domain functions as a phosphorelay
    response regulator, accepting phosphate at Asp212 from the histidine
    phosphotransfer protein RdeA within a His-Asp two-component phosphorelay;
    phosphorylation of this domain activates the C-terminal phosphodiesterase.
  molecular_function:
    id: GO:0000156
    label: phosphorelay response regulator activity
  directly_involved_in:
  - id: GO:0000160
    label: phosphorelay signal transduction system
  supported_by:
  - reference_id: PMID:10488068
    supporting_text: The response regulator, RegA, is composed of an N-terminal
      receiver domain linked to a C-terminal cAMP-phosphodiesterase domain
  - reference_id: PMID:10488068
    supporting_text: Phosphorylation of RegA by a heterologous phospho-donor
      protein activates RegA phosphodiesterase activity at least 20-fold
