id: Q23917
gene_symbol: regA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: RegA (also known as PDE2/DdPDE2) is an intracellular, cytosolic
  cAMP-specific 3',5'-cyclic-nucleotide phosphodiesterase of Dictyostelium
  discoideum. It is a two-domain protein comprising an N-terminal response
  regulator (receiver) domain with a conserved phosphoacceptor aspartate
  (Asp212) and a C-terminal class I cyclic-nucleotide phosphodiesterase catalytic
  domain. RegA is the effector component of a His-Asp phosphorelay two-component
  system in which histidine kinases such as DhkA and DhkC feed phosphate through
  the histidine phosphotransfer protein RdeA to the RegA receiver domain, and
  phosphorylation of Asp212 activates the phosphodiesterase, increasing
  degradation of intracellular cAMP. By lowering intracellular cAMP, RegA
  restrains cAMP-dependent protein kinase (PKA) activity, thereby acting as a
  timing checkpoint for terminal differentiation. Loss of RegA elevates PKA
  activity and causes rapid, precocious development and sporulation, while RegA
  activity is required for orderly chemotaxis (suppression of lateral pseudopods)
  and for normal fruiting body (sorocarp) morphogenesis. RegA is developmentally
  regulated, expressed at low levels in vegetative cells and at high levels in
  prespore and prestalk cells, and its activity is further modulated by MAP
  kinase (Erk2) signaling and by osmotic-stress-driven changes in histidine
  kinase/phosphatase activity.
