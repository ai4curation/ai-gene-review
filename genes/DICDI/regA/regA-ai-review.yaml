- term:
    id: GO:0047555
    label: 3',5'-cyclic-GMP phosphodiesterase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: RegA is a cAMP-specific phosphodiesterase with a cAMP/cGMP
      selectivity of ~200. cGMP phosphodiesterase activity is an over-propagation
      from the broader phosphodiesterase family and does not reflect the enzyme's
      demonstrated specificity.
    action: REMOVE
    reason: The IBA inference of cGMP phosphodiesterase activity conflicts with
      the experimentally established cAMP specificity of RegA (UniProt reports a
      cAMP/cGMP selectivity of 200, and characterization describes RegA/DdPDE2 as
      a cAMP-specific PDE). This electronic over-propagation from the general
      PDE family can be argued against on biochemical grounds.
    supported_by:
    - reference_id: PMID:17040207
      supporting_text: DdPDE2 (RegA) encodes a cAMP-specific PDE localized in the
        cytosol of the cell where it degrades intracellular cAMP
