- id: PMID:16606621
  title: A protein in crude cytosol regulates glucose-6-phosphatase activity in crude
    microsomes to regulate group size in Dictyostelium.
  findings:
  - statement: CF represses internal glucose by increasing the Km of
      glucose-6-phosphatase.
    supporting_text: The CF signal transduction pathway involves CF-repressing
