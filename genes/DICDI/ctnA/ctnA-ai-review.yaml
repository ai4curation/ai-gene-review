core_functions:
- description: CtnA is the principal secreted subunit of counting factor, a
    multi-subunit extracellular signal that limits the number of cells per
    aggregate during Dictyostelium development. Secreted CtnA binds a small number
    of high-affinity cell-surface sites and triggers rapid signal transduction that
    represses cell-cell adhesion and increases motility, causing aggregation
    streams to break up into appropriately sized groups; loss of CtnA abolishes CF
    activity and yields abnormally large aggregates.
