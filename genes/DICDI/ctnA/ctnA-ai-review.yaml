gene_symbol: ctnA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Countin-1 (CtnA) is a secreted, glycosylated protein of the social
  amoeba Dictyostelium discoideum and the principal bioactive component of counting
  factor (CF), a ~450 kDa multi-subunit extracellular complex (also containing CF50,
  CF45-1 and CF60) that regulates the size of the multicellular structures formed
  during development. When cells starve they aggregate into streams that break up
  into groups of roughly 2x10^4 cells, each of which becomes a fruiting body;
  secreted CF reports local cell number, and high CF levels promote stream breakup
  so that fewer cells accumulate per group. CtnA carries a saposin B-type domain,
  is exported through a signal peptide after N-glycosylation, and binds a small
  number of high-affinity cell-surface sites to trigger rapid signal transduction.
  Through this signaling it represses cell-cell adhesion, increases cell motility
  and F-actin polymerization, lowers intracellular glucose by inhibiting
  glucose-6-phosphatase, and modulates the cAMP and cGMP relay pulses. Loss of CtnA
  abolishes detectable CF activity, so aggregation streams fail to break up and
  cells form abnormally few, very large aggregates and fruiting bodies.
