  findings: []
- id: PMID:10444594
  title: A cell-counting factor regulating structure size in Dictyostelium.
  findings:
  - statement: Countin is a ~40 kDa secreted, hydrophilic protein with a signal
      sequence, purified as part of a ~450 kDa counting-factor complex.
    supporting_text: The predicted protein, which we have named countin, is
      hydrophilic, has a potential signal sequence upstream of where we observe the
      amino terminus of the secreted protein
  - statement: Disrupting the countin gene abolishes counting-factor secretion so
      aggregation streams do not break up, giving huge fruiting bodies.
    supporting_text: there is no detectable secretion of counting factor, and the
      aggregation streams do not break up
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational paper identifying countin and its gene-disruption
      phenotype; PMC full text confirms the secreted, size-limiting role.
- id: PMID:11090633
  title: A precise group size in Dictyostelium is generated by a cell-counting factor
    modulating cell-cell adhesion.
  findings:
  - statement: Counting factor sets group size by repressing cell-cell adhesion.
    supporting_text: CF regulates group size by repressing cell-cell adhesion
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; abstract directly supports the
      adhesion-repression mechanism of CF/countin.
- id: PMID:11371560
  title: A cell number-counting factor regulates group size in Dictyostelium by differentially
    modulating cAMP-induced cAMP and cGMP pulse sizes.
  findings:
  - statement: CF increases the cAMP-induced cAMP pulse and inhibits the
      cAMP-induced cGMP pulse via guanylyl cyclase.
    supporting_text: down-regulates the cAMP-induced cGMP pulse by inhibiting
      guanylyl cyclase
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; supports the parallel cAMP/cGMP pulse
      modulation outputs of counting factor.
- id: PMID:12070154
  title: Cells respond to and bind countin, a component of a multisubunit cell number
    counting factor.
  findings:
  - statement: Recombinant countin binds ~53 high-affinity cell-surface sites and
      triggers rapid responses including increased motility, decreased adhesion and
      increased F-actin polymerization.
    supporting_text: Recombinant countin increases cell motility, decreases
      cell-cell adhesion
  - statement: Cells have a small number of high-affinity countin-binding sites.
    supporting_text: vegetative and developing cells have approximately 53
      cell-surface sites that bind countin
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only cache; establishes countin as a ligand binding
      cell-surface sites and driving the CF cellular responses.
- id: PMID:12912898
  title: CF45-1, a secreted protein which participates in Dictyostelium group size
    regulation.
  findings:
  - statement: Countin-null cells have elevated cytosolic glucose, higher adhesion
      and lower motility, forming large groups.
    supporting_text: cells lacking countin or CF50 have higher glucose levels,
      higher cell-cell adhesion, and lower motilities
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Primarily about CF45-1 but full text documents the countin-null
