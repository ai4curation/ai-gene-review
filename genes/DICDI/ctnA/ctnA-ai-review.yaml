- term:
    id: GO:0140582
    label: adenylate cyclase-activating G protein-coupled cAMP receptor signaling
      pathway
  evidence_type: IDA
  original_reference_id: PMID:37921687
  qualifier: involved_in
  review:
    summary: This annotation comes from a single-cell transcriptomics study of
      collective cAMP signalling in which ctnA is one of many genes whose
      expression responds to cAMP oscillations. The paper does not present CtnA as
      a component that acts within the adenylate cyclase-activating cAMP receptor
