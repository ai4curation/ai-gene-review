- id: PMID:15643062
  title: Exposure of cells to a cell number-counting factor decreases the activity
    of glucose-6-phosphatase to decrease intracellular glucose levels in Dictyostelium
    discoideum.
  findings:
  - statement: Brief exposure to recombinant countin lowers intracellular glucose.
    supporting_text: an 8-min exposure of cells to recombinant countin decreases
