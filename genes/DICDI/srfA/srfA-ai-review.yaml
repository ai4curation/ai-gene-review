id: Q54TY7
gene_symbol: srfA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: SrfA (DdSRF) is the Dictyostelium discoideum homolog of Serum Response
  Factor, a MADS-box transcription factor. Its MADS-box DNA-binding domain (residues
  67-127) is highly conserved with the human, Drosophila and yeast SRF homologs,
  although several DNA-binding residues have diverged, likely altering its
  target-sequence specificity relative to animal SRFs (the animal CArG box is not
  found in its Dictyostelium targets). SrfA acts in the nucleus as a sequence-specific
  RNA polymerase II transcription factor that activates a subset of late,
  prespore/spore-specific genes (for example the spore-coat marker spiA and the
  SrfA-dependent sigA/sigB/sigC/sigD genes). It is expressed in a complex,
  promoter-dependent pattern across prestalk, prespore and spore cells, with a strong
  induction in prespore cells at culmination that is driven by cAMP-dependent protein
  kinase A (PKA). SrfA is essential for terminal spore differentiation and maturation,
  since srfA-null strains form rounded spores with reduced viability, defective
  actin-rod formation, and progressively degrading spore coats, and the mutants also
  show defective slug migration and a delay in culmination.
