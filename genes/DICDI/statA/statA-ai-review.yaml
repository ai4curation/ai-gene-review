- id: PMID:15470642
  title: Identification of new modes of Dd-STATa regulation of gene expression in
    Dictyostelium by in situ hybridisation.
  findings:
  - statement: In situ hybridization identified candidate directly induced Dd-STATa
      target genes downregulated in null cells.
    supporting_text: 13 genes which are candidates for direct induction by Dd-STATa.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; supports positive (activating) regulation of a
      subset of prestalk target genes.
