gene_symbol: statA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Dd-STATa (STATa/dstA) is the founding STAT-family signal-dependent
  transcription factor of Dictyostelium discoideum, and the clearest example of
  metazoan-like SH2-domain signaling in a non-metazoan. It has the canonical STAT
  domain architecture (a four-domain fold resembling mammalian STAT1/STAT3, an
  N-terminal coiled-coil, a DNA-binding domain, and a C-terminal SH2 domain) and
  is activated by tyrosine phosphorylation on Tyr702 in response to extracellular
  cAMP acting through the serpentine receptor cAR1; the receptor-like tyrosine
  kinase DrkA is implicated as a direct activating kinase. Upon phosphorylation
  it forms homodimers via reciprocal SH2-phosphotyrosine interactions and
  translocates from the cytoplasm into the nucleus, where it binds
  TTGA-containing sequence elements in target-gene promoters. Nuclear residence
  is dynamically controlled, since DIF (the prestalk inducer) promotes nuclear
  accumulation by inhibiting CRM1-dependent export, while GSK-3 (GskA)
  phosphorylation enhances nuclear export. Functionally, Dd-STATa acts chiefly as
  a transcriptional repressor of stalk-cell genes (notably ecmB) but also
  positively regulates a set of prestalk genes (e.g. cudA, mybC, aslA, ecmF),
  either directly or through downstream factors. Nuclear-enriched Dd-STATa marks
  the prestalk cells that form the slug tip organizer, and the protein is
  required for regulated commitment to stalk-cell differentiation, tip organizer
  function, and culmination into a mature fruiting body (sorocarp).
