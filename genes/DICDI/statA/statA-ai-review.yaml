- id: PMID:9670017
  title: Developmentally and spatially regulated activation of a Dictyostelium STAT
    protein by a serpentine receptor.
  findings:
  - statement: Dd-STATa tyrosine phosphorylation and nuclear translocation are
      induced by extracellular cAMP through the serpentine receptor cAR1.
    supporting_text: The tyrosine phosphorylation and nuclear localization of Dd-STAT
      are induced very rapidly by extracellular cAMP through the serpentine cAMP receptor
      cAR1
  - statement: Activated Dd-STAT translocates into nuclei; nuclear enrichment is
      maintained in tip-forming prestalk cells.
    supporting_text: translocates into the nuclei of all cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; full text available. Establishes cAR1-dependent
      activation and the spatial pattern of nuclear Dd-STATa in the tip organizer.
