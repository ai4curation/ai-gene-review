    label: defense response
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Defense response is a metazoan STAT function (immune/cytokine
      signaling) propagated by phylogenetic inference. There is no evidence that
      Dd-STATa participates in a defense response; its documented roles are in
      cAMP-triggered developmental gene regulation.
    action: REMOVE
    reason: This IBA term is an over-propagation from animal STATs. Dictyostelium
      Dd-STATa is activated by developmental cAMP signaling, not by an immune
      pathway, and no defense-response phenotype has been reported for it.
