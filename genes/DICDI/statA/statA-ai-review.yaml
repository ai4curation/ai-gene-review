- id: PMID:10393118
  title: Evidence that the Dictyostelium Dd-STATa protein is a repressor that regulates
    commitment to stalk cell differentiation and is also required for efficient chemotaxis.
  findings:
  - statement: Dd-STATa is the transcriptional repressor that binds stalk-cell gene
      repressor elements and regulates commitment to stalk-cell differentiation.
    supporting_text: Dd-STATa is the repressor protein that regulates commitment
  - statement: Loss of Dd-STATa leads to over-induction of the stalk-cell gene ecmB
      by DIF, confirming its repressor role.
    supporting_text: is greatly overinduced by DIF in Dd-STATa null cells.
  - statement: Dd-STATa null slugs arrest and fail to culminate normally.
    supporting_text: Dd-STATa null slugs remain developmentally arrested for several
      days
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; primary genetic evidence for the repressor role,
      stalk-cell differentiation, chemotaxis, and culmination phenotypes.
