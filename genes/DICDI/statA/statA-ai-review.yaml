- id: PMID:12506009
  title: The Dictyostelium prestalk cell inducer DIF regulates nuclear accumulation
    of a STAT protein by controlling its rate of export from the nucleus.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified. The abstract characterizes the paralog Dd-STATc
