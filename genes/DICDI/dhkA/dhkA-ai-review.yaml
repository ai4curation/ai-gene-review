- term:
    id: GO:0140582
    label: adenylate cyclase-activating G protein-coupled cAMP receptor signaling
      pathway
  evidence_type: IMP
  original_reference_id: PMID:12796307
  qualifier: involved_in
  review:
    summary: This annotation captures the finding that disruption of dhkA strongly
      lowers intracellular cAMP levels, connecting DhkA to cAMP metabolism. However,
      the specific term describes the cell-surface cAMP GPCR (cAR)-driven pathway
      that activates adenylate cyclase during aggregation, which is a poor fit for
      DhkA. DhkA is a histidine kinase that acts on intracellular cAMP through the
      RdeA/RegA phosphodiesterase and PKA during culmination, not a G protein-coupled
      cAMP receptor pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: The underlying genetic evidence (dhkA mutants have severalfold reduced
      cAMP) is real, but the chosen term denotes the GPCR/adenylate-cyclase
      aggregation pathway rather than the intracellular RegA/PKA phosphorelay pathway
      in which DhkA actually acts. The term over-specifies an inappropriate pathway;
      the DhkA cAMP connection is better represented by its phosphorelay and
      sporulation annotations.
    supported_by:
    - reference_id: PMID:12796307
      supporting_text: The levels of cAMP are relatively constant during
        multicellular development in all strains except the dhkA mutant, in which it
        is reduced at least sixfold.
