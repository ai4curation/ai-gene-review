gene_symbol: dhkA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: DhkA is a large multi-domain hybrid histidine kinase that acts as the
  cell-surface receptor for the peptide signal SDF-2 (spore differentiation factor
  2) during terminal differentiation of Dictyostelium discoideum. The N-terminal
  half of the protein forms two transmembrane helices flanking an extracellular
  CHASE-type ligand-binding loop, while the C-terminal half contains the cytoplasmic
  catalytic machinery, comprising a histidine kinase (HisKA/HATPase) core with the
  autophosphorylated His1395 and a C-terminal response-regulator receiver domain
  carrying the relay Asp2075. DhkA autophosphorylates on histidine in an
  ATP-dependent manner and relays the phosphoryl group to its own aspartate and onward
  through the phosphotransfer protein RdeA to the response regulator of the cAMP
  phosphodiesterase RegA. Binding of the SDF-2 ligand (a proteolytic peptide derived
  from the acyl-CoA-binding protein AcbA) inhibits DhkA kinase/phosphorelay activity,
  lowering RegA phosphodiesterase activity so that intracellular cAMP rises and PKA
  is activated, triggering rapid encapsulation of prespore cells into spores. Through
  this two-component phosphorelay DhkA controls prestalk gene expression, spore
  encapsulation, and the timing of culmination in the multicellular fruiting body.
