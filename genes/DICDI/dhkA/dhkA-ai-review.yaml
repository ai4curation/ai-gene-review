- id: PMID:10373524
  title: SDF-2 induction of terminal differentiation in Dictyostelium discoideum is
    mediated by the membrane-spanning sensor kinase DhkA.
  findings:
  - statement: DhkA is a membrane-spanning receptor histidine kinase with an
      extracellular ligand-binding loop and a cytoplasmic catalytic domain that
      mediates the SDF-2 response.
    supporting_text: By inserting MYC 6 epitopes into DhkA, we were able to show that
      the loop is extracellular while the catalytic domain is cytoplasmic.
  - statement: DhkA autophosphorylates on His1395 in an ATP-dependent manner; this
      histidine is essential for activity.
    supporting_text: Site-directed mutagenesis of histidine 1395 to glutamine in the
      catalytic domain blocked autophosphorylation.
  - statement: The cAMP phosphodiesterase RegA and PKA act downstream of DhkA.
    supporting_text: Suppressor studies indicate that the cyclic AMP (cAMP)
      phosphodiesterase RegA and the cAMP-dependent protein kinase PKA act downstream
      of DhkA.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Primary paper establishing DhkA topology, His1395 autophosphorylation,
      Asp2075 relay, and its role as the SDF-2 receptor upstream of RegA/PKA. Quotes
      verified against cached full text.
- id: PMID:12796307
  title: Genetic interactions of the E3 ubiquitin ligase component FbxA with cyclic
    AMP metabolism and a histidine kinase signaling pathway during Dictyostelium discoideum
    development.
  findings:
  - statement: DhkA is a receptor histidine kinase with a CHASE (cytokinin-receptor-like)
      domain and a histidine kinase domain.
    supporting_text: The DhkA molecule has several domains including a CHASE domain,
      which was identified as a receptor for plant cytokinins, and a histidine kinase
      domain
  - statement: dhkA disruption strongly reduces intracellular cAMP levels and
      suppresses the fbxA sporulation defect.
    supporting_text: The levels of cAMP are relatively constant during multicellular
      development in all strains except the dhkA mutant, in which it is reduced at
      least sixfold.
  reference_review:
    relevance: HIGH
    correctness: DISPUTED
    review_notes: >-
      Solid genetic evidence linking dhkA to RegA/cAMP and sporulation. The
      authors' proposed directionality (that DhkA activates RegA
      phosphodiesterase) explicitly contradicts Wang et al.
      (PMID:10373524 / PMID:15897458), who show ligand binding to DhkA inhibits
      phosphorelay to RegA; the direction of DhkA-RegA regulation is therefore
      contested. Hand-curated expert assessment - the Wang/Anjard-Loomis
      inhibition model is the better-supported working model. DhkA
      autophosphorylation on His1395 and phosphorelay through RdeA to the RegA
      receiver aspartate are biochemically demonstrated, and SDF-2 binding lowers
      this relay so RegA is dephosphorylated and inactivated, raising
      intracellular cAMP and activating PKA to trigger encapsulation. The fbxA
      genetic-interaction study reported here infers the opposite direction only
      indirectly, so it is recorded as a contested minority interpretation
      pending direct measurement of the RegA phosphorylation state in dhkA-null
      versus SDF-2-treated cells.
- id: PMID:15897458
  title: Peptide signaling during terminal differentiation of Dictyostelium.
  findings:
  - statement: SDF-2 is a peptide processed from the acyl-CoA-binding protein AcbA and
      is the ligand of the DhkA receptor histidine kinase.
    supporting_text: Using a yeast system we show that ligand binding to the SDF-2
      receptor histidine kinase, DhkA, inhibits phosphorelay, which can account for
      its ability to induce rapid sporulation.
  - statement: DhkA relays phosphate via RdeA to the RegA response regulator; reduced
      phosphorelay lowers RegA activity, raising cAMP and activating PKA.
    supporting_text: Reduced phosphorelay to the internal phosphodiesterase RegA via
      the small H2 protein RdeA results in a decrease in phosphodiesterase activity,
      leading to accumulation of cAMP and resulting activation of PKA
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes SDF-2 as an AcbA-derived peptide ligand and, via a yeast
      reconstitution assay, that ligand binding inhibits DhkA phosphorelay. Quotes
      verified against cached full text.
- id: PMID:17659086
  title: High-throughput analysis of spatio-temporal dynamics in Dictyostelium.
  findings:
  - statement: dhkA insertion mutants show developmental phenotypes specific to the
      slug-to-culmination stage, consistent with a late-development role.
    supporting_text: In contrast, dhkA and acrA show mutant phenotypes only at later
      stages consistent with their specific roles during slug to culmination stage.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Large-scale phenotyping screen; recovers the known late-development
      (long-stalk) dhkA phenotype, supporting the sorocarp development annotation.
- id: PMID:8670894
  title: A two-component histidine kinase gene that functions in Dictyostelium development.
  findings:
  - statement: DhkA encodes a two-component histidine kinase with histidine kinase and
      response regulator domains and functions in prestalk gene regulation and prespore
      terminal differentiation.
    supporting_text: In Dictyostelium, we found that DhkA functions both in the
      regulation of prestalk gene expression and in the control of the terminal
      differentiation of prespore cells.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Original identification and functional characterization of dhkA
      (abstract only in cache; full text read by the dictyBase curator for the IMP
      annotations).
- id: PMID:9191038
  title: Histidine kinases in signal transduction pathways of eukaryotes.
  findings:
  - statement: DhkA is a transmembrane histidine kinase whose activation inhibits the
      RegA cAMP phosphodiesterase, thereby regulating PKA and spore encapsulation.
    supporting_text: Activation of DhkA results in the inhibition of its response
      regulator, RegA, which is a cAMP phosphodiesterase that regulates the cAMP
      dependent protein kinase PKA.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review (TAS) summarizing eukaryotic histidine kinase two-component
      signaling and the DhkA-RegA-PKA circuit; supports ATP-dependent histidine
      kinase activity. Abstract only in cache.
suggested_experiments:
- hypothesis: >-
    SDF-2 binding to DhkA inhibits, rather than activates, the His-Asp
    phosphorelay to RegA, thereby lowering RegA phosphodiesterase activity.
  description: >-
