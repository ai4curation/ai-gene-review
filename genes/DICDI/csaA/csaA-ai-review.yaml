- term:
    id: GO:0010225
    label: response to UV-C
  evidence_type: IDA
  original_reference_id: PMID:25858552
  qualifier: acts_upstream_of_or_within
  review:
    summary: This study reports that csA mRNA expression is markedly reduced
      following UV-C irradiation of Dictyostelium cells. csA is used here as a
      developmentally regulated readout of UV-C-induced developmental impairment,
      not as a functional effector of the UV-C response. There is no evidence that
      csA acts within a UV-C damage-response pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence is a change in csA transcript level after UV-C exposure,
      which reflects downstream disruption of the aggregation program rather than a
      role for csA in responding to UV-C. Annotating csA as acting upstream of or
      within the UV-C response over-interprets an expression readout.
    supported_by:
    - reference_id: PMID:25858552
      supporting_text: expression of csA and ctnA was markedly reduced
