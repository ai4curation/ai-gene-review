gene_symbol: csaA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Contact site A protein (csA, also known as gp80) is a developmentally
  regulated, glycolipid-anchored cell-surface glycoprotein of the social amoeba
  Dictyostelium discoideum. Its expression is restricted to the aggregation stage
  of development and is induced by pulsatile cAMP signaling acting through
  cell-surface cAMP receptors. csA mediates EDTA-resistant (Ca2+-independent)
  cell-cell adhesion through homophilic binding, in which csA molecules on one cell
  surface bind directly to csA molecules on adjacent cells. The mature protein
  carries N-linked glycans and is attached to the outer face of the plasma membrane
  by an unusual phosphoceramide-containing (GPI-like) lipid anchor. csA is enriched
  at cell-cell contact regions and on filopodia, where it partitions into
  sterol-rich, detergent-resistant membrane microdomains and colocalizes with the
  underlying cortical actin cytoskeleton. It provides a fast, shear-resistant form
  of intercellular cohesion during the transition from unicellular amoebae to a
  multicellular aggregate; loss of csA abolishes EDTA-stable adhesion, and under
  natural or semi-natural conditions csA-null cells show reduced cell-cell cohesion,
  increased substratum adhesion, slower motility, and a competitive disadvantage,
  whereas strong overexpression perturbs morphogenesis.
