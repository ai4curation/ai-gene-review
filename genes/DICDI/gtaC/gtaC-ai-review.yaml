- term:
    id: GO:0006351
    label: DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:24653039
  qualifier: involved_in
  review:
    summary: GtaC regulates transcription of target genes but does not itself
      perform DNA-templated transcription (it is a transcription factor, not the
      polymerase). The regulatory term is more appropriate.
    action: MODIFY
    reason: GO:0006351 (DNA-templated transcription) denotes the catalytic process
      of synthesizing RNA from a DNA template, an activity of RNA polymerase, not of
      a sequence-specific transcription factor. GtaC controls the expression of
      target genes by binding cis-regulatory elements, so the regulatory term
      regulation of transcription by RNA polymerase II better captures its role.
    proposed_replacement_terms:
