gene_symbol: gtaC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: GtaC is a GATA-family transcription factor of Dictyostelium discoideum
  that carries a single Cys2-Cys2 (type IV) zinc-finger domain and binds
  sequence-specific GATA-like cis-regulatory elements in the promoters of target
  genes. It is a nuclear DNA-binding transcription factor that activates and
  represses developmental gene expression, and it is essential for early
  development, since cells lacking gtaC fail to aggregate and arrest transcriptional
  and morphological progression. GtaC is a central effector that decodes oscillatory
  extracellular cAMP signals. During early development it undergoes rapid
  nucleocytoplasmic shuttling driven by cAMP-receptor occupancy and reversible
  phosphorylation (mediated by the atypical MAPK Erk2 and GskA), entering the
  nucleus during the falling phase of each cAMP wave and exiting during the rising
  phase. This shuttling converts pulsatile cAMP input into temporally patterned
  bursts of transcription and functions as a developmental timer, allowing cells
  to track low-frequency and filter out high-frequency signals. GtaC directly
  binds the promoters of thousands of genes, including central cAMP-signalling
  components such as the adenylyl cyclase acaA and cAMP receptor carA, and its DNA
  binding is highly dynamic across developmental stages. Beyond aggregation, GtaC
  contributes to later cell-type specification, acting downstream of the diffusible
  morphogen DIF-1 to regulate prestalk/basal-disc (stalk-related) differentiation,
  and it modulates chemotactic behaviour, suppressing chemotaxis toward folate.
