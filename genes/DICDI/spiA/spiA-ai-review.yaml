id: Q02465
gene_symbol: spiA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: spiA encodes Dd31, a late spore-specific, multi-pass membrane protein
  of the SCAMP (secretory carrier-associated membrane protein) family in the social
  amoeba Dictyostelium discoideum. Its transcript is induced specifically in prespore
  cells and spores during culmination, the terminal stage of fruiting body
  (sorocarp) formation, making spiA a widely used sporulation marker. The Dd31
  protein (~30 kDa on Western blots) is associated with the inner face of the spore
  coat in a detergent-resistant manner. Loss of spiA does not detectably perturb
  development or spore morphology, but mutant spores lose viability far more rapidly
  than wild-type spores as they age, especially when submerged in dilute buffer,
  indicating a role in maintaining long-term spore stability and dormancy. The
  precise molecular activity of Dd31 is not established.
existing_annotations:
- term:
    id: GO:0006887
    label: exocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) inference of an exocytosis role transferred from the
      broader SCAMP family, whose canonical members function in post-Golgi membrane
      trafficking and regulated exocytosis. For spiA/Dd31 there is no direct
      evidence of an exocytic function; the experimentally established role is in
      maintaining spore stability, and the demonstrated location is the inner face
      of the spore coat.
    action: KEEP_AS_NON_CORE
    reason: A membrane-trafficking/exocytic role is plausible for a SCAMP-family
      protein and could relate to delivery of spore coat material during
      encapsulation, but it has not been demonstrated for this divergent
      spore-specific paralog and is not the core, experimentally supported function.
    supported_by:
    - reference_id: PMID:1592257
      supporting_text: Dd31 is associated with the inner face of spore coat fragments
        in a detergent-resistant manner.
