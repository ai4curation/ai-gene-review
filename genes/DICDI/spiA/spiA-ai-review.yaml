- term:
    id: GO:0003674
    label: molecular_function
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  qualifier: enables
  review:
    summary: Root molecular_function placeholder (ND) reflecting that no specific
      molecular activity has been assigned to Dd31. This accurately represents the
      current state of knowledge.
    action: ACCEPT
    reason: The molecular function of spiA/Dd31 is genuinely unknown; beyond SCAMP
      family membership and membrane topology, no biochemical activity has been
      demonstrated. The ND annotation is appropriate and should be retained until a
      specific activity is established.
- term:
    id: GO:0030587
    label: sorocarp development
  evidence_type: IMP
  original_reference_id: PMID:1592257
  qualifier: acts_upstream_of_or_within
  review:
    summary: Gene disruption (IMP) shows that spiA is required for normal spore
      properties during fruiting body (sorocarp) development. spiA-null strains
      develop and form morphologically normal spores, but the spores lose viability
      abnormally rapidly with age, a defect rescued by reintroducing the gene.
    action: ACCEPT
    reason: This is the core, experimentally supported developmental role of the
      gene, established by a clean knockout-and-rescue experiment showing a specific
      spore-stability phenotype within sorocarp development.
    supported_by:
    - reference_id: PMID:1592257
      supporting_text: Mutant spores have normal viability when assayed soon after
        the completion of development, but, as the spiA- spores age, they lose
        viability more rapidly than those of the spiA+ parent.
    - reference_id: PMID:1592257
      supporting_text: Reinserting an intact copy of the spiA gene into a spiA-
        strain restores the stability of its spores.
- term:
    id: GO:0031160
    label: spore wall
  evidence_type: IDA
  original_reference_id: PMID:1592257
  qualifier: located_in
  review:
    summary: Direct evidence (IDA) localizes Dd31 to the spore coat/wall, specifically
      to the inner face of spore coat fragments in a detergent-resistant manner. This
      is the core, experimentally established subcellular location of the protein.
    action: ACCEPT
    reason: An antibody against Dd31 showed the protein is stably associated with the
      inner face of the spore coat, directly supporting a spore-wall location that is
      consistent with its role in spore stability.
    supported_by:
    - reference_id: PMID:1592257
      supporting_text: Dd31 is associated with the inner face of spore coat fragments
        in a detergent-resistant manner.
    - reference_id: PMID:1592257
      supporting_text: This location is consistent with its observed role in
        maintaining stability of the spores.
- term:
    id: GO:0031154
    label: culmination involved in sorocarp development
  evidence_type: IEP
  original_reference_id: PMID:25887420
  qualifier: acts_upstream_of_or_within
  review:
    summary: Expression-based (IEP) annotation reflecting that spiA transcript is
      sharply up-regulated during culmination (18-24 h of development) and is used as
      a sporulation marker. Expression timing indicates involvement in this stage but
      does not by itself demonstrate a causal function in culmination.
    action: KEEP_AS_NON_CORE
    reason: The IEP evidence establishes that spiA is expressed specifically during
      culmination, consistent with its spore-maturation role, but expression pattern
      alone is weaker than the knockout evidence and marks stage-specific expression
      rather than a demonstrated driver of culmination; retain as a non-core process
      annotation.
    supported_by:
    - reference_id: PMID:25887420
      supporting_text: spiA was up-regulated between 18 h and 20 h, and accumulated
        rapidly through 24 h.
    - reference_id: PMID:1592257
      supporting_text: The spiA gene of Dictyostelium is expressed specifically in
        prespore cells and spores during culmination, the final stage of development
        during which prespore and prestalk cells undergo terminal differentiation to
        form spores and stalk.
