core_functions:
- description: spiA/Dd31 is a late spore-specific, multi-pass membrane protein of the
    SCAMP family that becomes stably associated with the inner face of the spore coat
    during culmination and is required to maintain long-term spore viability and
    dormancy. Its specific molecular activity is not established; loss of function
    does not block spore formation but accelerates the loss of spore viability with
    age.
