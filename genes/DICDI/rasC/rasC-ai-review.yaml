  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This phylogenetic (IBA) inference of a cytokinesis role is contradicted by
      direct experimental evidence in Dictyostelium, where loss of RasC leaves cytokinesis
      and the division rate essentially normal.
    action: REMOVE
    reason: The IBA annotation is over-propagated from Ras-family members that function
      in cytokinesis. In Dictyostelium, cytokinesis is regulated mainly by RasG/RasB (via
      NdrC), whereas rasC-null cells divide normally, so this term does not represent RasC
      function.
    supported_by:
    - reference_id: PMID:15878331
      supporting_text: there was no change in the rate of cell division
