id: P32253
gene_symbol: rasC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: >-
  RasC is a member of the Ras subfamily of small monomeric GTPases in the social
  amoeba Dictyostelium discoideum. Like other Ras proteins, it cycles between an
  inactive GDP-bound and an active GTP-bound state, possesses intrinsic GTPase
  activity (EC 3.6.5.2), and is post-translationally prenylated at a C-terminal
  geranylgeranyl cysteine that anchors it to the cytoplasmic face of the plasma
  membrane. RasC is activated in response to extracellular cAMP sensed through
  G-protein-coupled cAMP receptors, via its dedicated guanine-nucleotide exchange
  factor RasGEFA (Aimless). Together with the partly redundant paralog RasG, RasC
  is a central regulator of early development. It is required for aggregation, where
  it preferentially controls activation of adenylyl cyclase (ACA) and the cAMP relay,
  and it is the principal Ras that activates the TORC2-PKB (Akt/PKBR1) pathway,
  binding the catalytic domain of TOR and forming a hetero-oligomer with
  phosphorylated GDP-bound RacE to stimulate mTORC2-mediated AKT phosphorylation.
  Through TORC2-PKB signaling, active RasC, enriched at the leading edge of
  chemotaxing cells, sets the temporal and spatial dynamics of the actin
  cytoskeleton, pseudopod formation, and directed cell migration. RasC also
  participates in additional Ras-dependent responses including folate chemotaxis and
  polyphosphate signaling, and it interacts with effectors and regulators such as the
  LATS-family kinase NdrC, the RasGAP C2GAP1, and the scaffold-associated RasGEF
  complex.
