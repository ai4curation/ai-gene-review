- id: PMID:11500376
  title: RasC is required for optimal activation of adenylyl cyclase and Akt/PKB during
    aggregation.
  findings:
  - statement: RasC is required for aggregation and acts downstream of the cAMP receptor
      to activate both PI3K/Akt-PKB and adenylyl cyclase.
    supporting_text: 'RasC appears to be a central regulatory molecule acting downstream
      of serpentine receptor stimulation by cAMP that is required for two distinct effector
      pathways: the activation of Akt/PKB through PI3K and the activation of adenylyl
      cyclase.'
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Foundational rasC-null study establishing RasC's role in cAMP relay
      (ACA activation) and PKB activation during aggregation; PMID/title verified against
      the cached full text.
- id: PMID:15143344
