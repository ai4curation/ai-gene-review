  title: Regulation of a LATS-homolog by Ras GTPases is important for the control of
    cell division.
  findings:
  - statement: NdrC (LATS2 homolog) binds RasG/RasB (and less strongly RasC/Rap1); cell
      division is controlled by RasG/RasB, not by RasC.
    supporting_text: NdrC was the only protein that bound RasC in the yeast two-hybrid
      screen
- id: PMID:26012633
  title: A large-scale screen reveals genes that mediate electrotaxis in Dictyostelium
    discoideum.
  findings: []
- id: PMID:26424797
  title: PP2A/B56 and GSK3/Ras suppress PKB activity during Dictyostelium chemotaxis.
  findings:
  - statement: The PP2A regulatory subunit B56 preferentially binds GDP-bound RasC and
      RasD (not RasG) and contributes to suppression of PKB activity.
    supporting_text: GDP forms of RasC and RasD, but not with RasG in vitro
- id: PMID:27009206
  title: The novel RacE-binding protein GflB sharpens Ras activity at the leading edge
    of migrating cells.
  findings:
  - statement: GflB (a RhoGAP/RasGEF-domain protein) binds RasC and RasG and balances
      Ras/Rho activation to orient signaling toward higher chemoattractant concentrations.
    supporting_text: GflB also binds to Ras GTPases
- id: PMID:27172998
  title: The small GTPases Ras and Rap1 bind to and control TORC2 activity.
  findings:
  - statement: Active RasC binds the catalytic domain of TOR, while Rap1 binds RIP3/SIN1;
      both control TORC2 activity, with RasC playing the major role.
    supporting_text: we found that TOR kinase itself specifically co-purifies with RasCGppNHp
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Shows RasC binds TOR directly, providing a mechanism for RasC-mediated
      TORC2 activation.
- id: PMID:28584190
  title: Extracellular polyphosphate signals through Ras and Akt to prime Dictyostelium
    discoideum cells for development.
  findings:
  - statement: Polyphosphate signals through RasC and Akt to inhibit the proteasome and
      induce CsA expression, priming cells for development.
    supporting_text: mediated by Akt proteins and RasC in Dictyostelium
- id: PMID:29109256
  title: GPCR-controlled membrane recruitment of negative regulator C2GAP1 locally
    inhibits Ras signaling for adaptation and long-range chemotaxis.
  findings:
  - statement: C2GAP1 is a RasGAP that binds Ras and locally inhibits Ras signaling for
      adaptation during chemotaxis.
    supporting_text: the in vitro binding assay indicates that C2GAP1 binds both GTP-
      and GDP-bound Ras protein
- id: PMID:30462573
  title: An endogenous chemorepellent directs cell movement by inhibiting pseudopods
    at one side of cells.
  findings:
  - statement: AprA chemorepulsion uses a subset of chemoattraction pathway components
      including Ras (RasC/RasG redundantly).
    supporting_text: signal transduction pathways including Ras
- id: PMID:31263268
  title: Phosphorylated Rho-GDP directly activates mTORC2 kinase towards AKT through
    dimerization with Ras-GTP to regulate cell migration.
  findings:
  - statement: Chemoattractant-induced phosphorylation of GDP-RacE assembles a RacE-RasC-mTORC2
      supercomplex that phosphorylates AKT.
    supporting_text: assembles the RacE-RasC-mTORC2 supercomplex that phosphorylates
      AKT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Defines the GTP-RasC / phospho-GDP-RacE / mTORC2 mechanism of AKT activation.
- id: PMID:33238110
  title: Hetero-oligomerization of Rho and Ras GTPases Connects GPCR Activation to mTORC2-AKT
    Signaling.
  findings:
  - statement: GTP-RasC and phosphorylated GDP-RacE directly interact and hetero-oligomerize
      to activate mTORC2 toward AKT (but not ERK).
    supporting_text: these two GTPases directly interact in cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes the RasC-RacE hetero-oligomer as the activating input to
      mTORC2-AKT signaling.
- id: PMID:34154396
  title: An Autocrine Negative Feedback Loop Inhibits Dictyostelium discoideum Proliferation
    through Pathways Including IP3/Ca(2).
  findings:
  - statement: Under low-nutrient conditions, loss of RasC blocks polyphosphate-induced
      proliferation inhibition.
    supporting_text: the loss of GrlD or RasC blocked the sensitivity of cells to polyphosphate
core_functions:
