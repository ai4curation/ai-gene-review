id: P08799
gene_symbol: mhcA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: >-
  mhcA encodes the single conventional (class II) myosin heavy chain of
  Dictyostelium discoideum, the ~243 kDa force-generating subunit of non-muscle
  myosin II. Each heavy chain has an N-terminal globular motor (head) domain that
  binds actin and hydrolyzes ATP, a neck/IQ region that binds the essential and
  regulatory light chains, and a long alpha-helical coiled-coil tail. Two heavy
  chains dimerize through their tails and, together with two essential and two
  regulatory light chains, form the two-headed myosin II hexamer, which
  self-assembles tail-to-tail into bipolar thick filaments. Filament assembly is
  regulated by phosphorylation of three C-terminal tail threonines (Thr1823,
  Thr1833, Thr2029) by myosin heavy chain kinases, which drives disassembly. As an
  actin-activated ATPase motor, myosin II slides antiparallel actin filaments to
  generate contractile force at the cell cortex. It is concentrated in the
  posterior/rear cortex of migrating cells and in the equatorial cortex/cleavage
  furrow of dividing cells, where its contractility is essential for cytokinesis
  (myosin-null cells fail to divide in suspension and become large and
  multinucleate), for generating and maintaining three-dimensional cell shape and
  cortical tension, for tail/uropod and pseudopod retraction during chemotactic
  migration, for bleb-based motility, and for multicellular morphogenesis
  (culmination and fruiting body/sorocarp formation). Myosin II also acts as part
  of a cortical mechanosensor that couples mechanical stress to its own
  accumulation, and contributes to contractile-vacuole discharge and cortical
  dynamics during phagocytosis.
