- description: Force-generating, actin-activated ATPase motor. The globular head
    domain binds actin filaments and hydrolyzes ATP to slide antiparallel actin
    filaments, generating contractile force at the cell cortex. As the heavy chain
    of the two-headed myosin II hexamer, it powers cortical tension, cleavage-furrow
    contraction during cytokinesis, and rear/tail retraction during migration.
