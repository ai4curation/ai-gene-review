    label: cell surface receptor signaling pathway via STAT
  evidence_type: IMP
  original_reference_id: PMID:10821768
  qualifier: acts_upstream_of_or_within
  review:
    summary: CudA is the principal transcriptional effector/target of the STATa
      signalling pathway; STATa binds the cudA promoter and directly activates cudA
      transcription in prestalk cells. CudA thus acts within the STATa pathway as a
      downstream node, but this is not its core molecular function.
    action: KEEP_AS_NON_CORE
    reason: The annotation reflects that CudA operates downstream of STATa
      signalling (STATa is a direct activator of cudA), which is an experimentally
      supported and biologically meaningful placement within the pathway. It is,
      however, a pathway-level/developmental involvement rather than CudA's core
      transcription-factor activity.
    supported_by:
