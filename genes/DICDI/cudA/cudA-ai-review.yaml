    UniProt
  findings: []
- id: PMID:10821768
  title: Analysis of the promoter of the cudA gene reveals novel mechanisms of Dictyostelium
    cell type differentiation.
  findings:
  - statement: STATa directly activates cudA transcription in prestalk cells by
      binding an essential site in the prestalk-specific region of the cudA promoter.
    supporting_text: Dd-STATa appears therefore to serve as a direct activator of
      cudA transcription in prestalk cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache; establishes that cudA is a direct
      transcriptional target of the STATa signalling pathway in prestalk cells and
      that distinct promoter elements drive prespore vs prestalk expression.
- id: PMID:18701541
  title: A new family of transcription factors.
  findings:
  - statement: CudA binds in vivo to the cotC prespore promoter and is required for
      prespore-specific gene expression.
    supporting_text: CudA, a nuclear protein required for Dictyostelium
      prespore-specific gene expression, binds in vivo to the promoter of the cotC
      prespore gene.
  - statement: CudA binds an interrupted dyad DNA element and forms a homodimer,
      consistent with a symmetrical binding site.
    supporting_text: consistent with a symmetrical binding site, CudA forms a
      homodimer in the yeast two-hybrid system
  - statement: CudA defines a new family of transcription factors whose conserved
      core region is a presumptive DNA-binding domain related to plant STAT-like
      proteins.
    supporting_text: This region, the presumptive DNA-binding domain, is similar in
      sequence to domains in two Arabidopsis proteins and one Oryza protein.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available (PMC3586674). Defines CudA sequence-specific
      DNA binding (ChIP plus affinity chromatography), homodimerization, and the
      conserved presumptive DNA-binding domain; founding paper for the CudA/PTS
      transcription-factor family.
- id: PMID:19757394
  title: Identification of a target for CudA, the transcription factor which directs
    formation of the Dictyostelium tip organiser.
  findings:
  - statement: CudA acts as a specific transcription factor in prespore cells and in
      the tip-organiser.
    supporting_text: CudA is a nuclear protein which is expressed in prespore cells
      where it acts as a specific transcription factor.
  - statement: CudA directly activates the tip-organiser gene expl7; expl7 is not
      expressed in cudA-null slugs and CudA binds the expl7 promoter.
    supporting_text: there is no detectable expression of expl7 in cudA null slugs
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full text available (PMC3672975). Identifies expl7 as a direct
      CudA target and places CudA downstream of ACA/STATa signalling in
      tip-organiser differentiation.
- id: PMID:25887420
  title: Leaps and lulls in the developmental transcriptome of Dictyostelium discoideum.
  findings:
  - statement: cudA transcript is sharply up-regulated at ~16 h, coincident with the
      slug/culmination phase of development.
    supporting_text: At 16 h, cudA and mybE were up-regulated sharply
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Full text available (PMC4403905). Genome-wide developmental time
      course; cudA appears only as one of many late-development transcription
      factors, supporting expression timing but not mechanism.
- id: PMID:27125566
  title: Regulation of ecmF gene expression and genetic hierarchy among STATa, CudA,
    and MybC on several prestalk A-specific gene expressions in Dictyostelium.
  findings:
  - statement: cudA is the only verified up-regulated target gene of STATa, and CudA
      directly activates expL7 expression in prestalk cells.
    supporting_text: The only verified upregulated target gene of STATa is cudA gene;
      CudA directly activates expL7 gene expression in prestalk cells.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache; supports CudA as a positive transcriptional
      regulator and defines CudA-dependent vs CudA-independent branches downstream
      of STATa.
- id: PMID:9226443
  title: 'cudA: a Dictyostelium gene with pleiotropic effects on cellular differentiation
    and slug behaviour.'
  findings:
  - statement: cudA encodes a nucleoplasmic protein essential for normal culmination.
    supporting_text: The Dictyostelium cudA gene encodes a nucleoplasmic protein
      that is essential for normal culmination.
  - statement: cudA-null cells are defective in both stalk and spore formation,
      indicating a role on both differentiation pathways.
    supporting_text: cudA- mutant cells are indeed defective in both stalk and spore
      formation.
  - statement: cudA-null slugs fail to enter culmination and continue migrating under
      conditions where wild-type slugs culminate.
    supporting_text: the slugs formed by cudA- cells continue to migrate under
      environmental conditions where normal slugs culminate immediately
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Abstract-only in cache but this is the founding cudA study
      (insertional mutagenesis); establishes nucleoplasmic localization, culmination
      requirement, pleiotropic differentiation phenotype, and tip-organiser
      expression.
core_functions:
- description: CudA is a sequence-specific DNA-binding transcription factor that
    binds an interrupted dyad element (with GAA half-sites) in the promoters of
    developmental target genes. Its conserved central core region is a presumptive
    DNA-binding domain and CudA binds DNA as a homodimer, occupying target promoters
    such as cotC in vivo.
