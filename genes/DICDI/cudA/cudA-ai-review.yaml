gene_symbol: cudA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: CudA is a nuclear, sequence-specific DNA-binding transcription factor
  of the social amoeba Dictyostelium discoideum that is essential for normal
  culmination and for the differentiation of both prestalk and prespore cells. It
  is the founding member of a novel family of transcription factors (the CudA/PTS
  family) whose conserved central core region constitutes a presumptive
  DNA-binding domain that is structurally related to the DNA-binding region of
  plant STAT-like proteins. CudA binds an interrupted dyad element containing GAA
  half-sites and forms homodimers, and it directly activates target genes such as
  the cotC spore-coat gene in prespore cells and the expansin-like expl7 gene in
  the slug tip-organiser. CudA is expressed in the nuclei of the prestalk cells of
  the slug tip (the tip-organiser/pstA cells) and in prespore cells, and its
  tip-specific expression is induced by the STATa signalling pathway acting
  downstream of the ACA adenylyl cyclase. Cells lacking cudA fail to culminate,
  continue to migrate as slugs under conditions where wild-type slugs culminate,
  and are defective in both mature stalk and mature spore formation.
