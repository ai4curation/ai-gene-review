- id: PMID:7958880
  title: The cAMP receptor CAR4 regulates axial patterning and cellular differentiation
    during late development of Dictyostelium.
  findings:
  - statement: CAR4 is a cell-surface, G protein-linked cAMP receptor.
    supporting_text: the gene for a new cell-surface, G protein-linked cAMP receptor
  - statement: CAR4 is maximally expressed in the prestalk-rich anterior of the
      pseudoplasmodium, a center for extracellular cAMP signaling and patterning.
    supporting_text: CAR4 is maximally expressed in pseudoplasmodia anteriors which
      are centers for extracellular cAMP signaling and for organization of cellular
      patterning
  - statement: car4 nulls progress through early development but show major
      anteroposterior patterning defects during late development.
    supporting_text: Although car4 null cells progress unperturbed through early
      development, they exhibit major patterning aberrations as the anteroposterior
      axis becomes established
  - statement: CAR4 promotes prestalk gene expression and restricts prespore
      differentiation to the appropriate spatial domain.
    supporting_text: Prestalk gene expression is significantly reduced in car4 nulls,
      whereas prespore-specific markers are overexpressed and detected in zones
      normally restricted to prestalk cells
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Founding CAR4/carD characterization paper (Louis, Ginsburg, Kimmel
      1994). PubMed-verified; the abstract directly supports the receptor, expression,
      localization, and loss-of-function patterning phenotypes cited. Full text not
      cached (abstract-only).
- id: PMID:2722797
  title: The cyclic nucleotide specificity of eight cAMP-binding proteins in Dictyostelium
    discoideum is correlated into three groups.
  findings:
  - statement: The Dictyostelium cell-surface cAMP receptors bind cAMP in a
      hydrophobic cleft and transduce the cAMP signal during chemotaxis and
      differentiation.
    supporting_text: cAMP is probably bound to the surface receptors in the anti
      conformation in a hydrophobic cleft of the receptor
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Biochemical characterization of cAMP-binding proteins including the
      cell-surface cAMP receptors; predates cloning of CAR4 (1994) so supports
      receptor-class cAMP binding rather than CAR4-specific data. Abstract-only.
- id: PMID:12408804
  title: Receptor-dependent and tyrosine phosphatase-mediated inhibition of GSK3 regulates
    cell fate choice.
  findings:
  - statement: CAR4 regulates a protein tyrosine phosphatase that inhibits GSK3
      activity, controlling cell-fate choice in a manner paralleling Wnt/Frizzled-GSK3
      signaling.
    supporting_text: We now show that CAR4 regulates a tyrosine phosphatase that
      inhibits GSK3 activity
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Directly establishes the CAR4 downstream signaling mechanism (PTP
      activation inhibiting GSK3). Supports the tyrosine-phosphatase-activator
      annotation as a signaling-mediated (indirect) role. Abstract-only.
- id: PMID:15473840
  title: Chemoattractant signaling in dictyostelium discoideum.
  findings:
  - statement: Review of Dictyostelium chemoattractant (cAMP) receptor signaling
      modules including cyclic AMP signaling.
    supporting_text: signaling via chemoattractant receptors
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Review of cAMP chemoattractant signaling; source of several TAS
      annotations. General rather than CAR4-specific. Abstract-only.
