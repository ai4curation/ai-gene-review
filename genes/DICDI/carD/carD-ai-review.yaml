gene_symbol: carD
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Cyclic AMP receptor 4 (CAR4/cAR4, encoded by carD) is one of four
  serpentine seven-transmembrane G protein-coupled cAMP receptors of Dictyostelium
  discoideum. It is a low-affinity cAMP receptor and the latest-expressed member of
  the cAR family, with transcript first appearing during tip elongation and
  accumulating through culmination. CAR4 is expressed predominantly in the anterior
  prestalk zone of the migrating pseudoplasmodium, a center where extracellular cAMP
  organizes cell-type patterning. Acting through heterotrimeric G proteins, CAR4
  transduces extracellular cAMP signals that establish anteroposterior polarity,
  promoting prestalk gene expression and restricting prespore differentiation to the
  appropriate spatial domain. Downstream, CAR4 signaling activates a protein
  tyrosine phosphatase that inhibits GSK3, a mechanism paralleling metazoan
  Wnt/Frizzled-GSK3 pathways in controlling cell-fate choice. Loss of CAR4 does not
  perturb early aggregation but causes major axial patterning defects and aberrant
  cellular differentiation during late (slug and culmination) development. CAR4 is a
  paralog of the aggregation-stage receptor cAR1 (CAR1), and the four cARs are
  deployed in a stage-specific developmental sequence.
