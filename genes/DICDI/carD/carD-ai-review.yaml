- term:
    id: GO:0035589
    label: G protein-coupled purinergic nucleotide receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: This term was assigned by an automated inter-ontology logical inference
      (ECO:0000364) from cAMP receptor activity. Purinergic nucleotide receptor
      signaling refers to P2-type receptors for extracellular ATP/ADP/UTP, which is
      a distinct signaling system. Dictyostelium cAMP receptor signaling is not
      purinergic receptor signaling, so this is a spurious mapping.
    action: REMOVE
    reason: The annotation is an automated logical-inference artifact that misplaces
      cAMP receptor signaling into the purinergic (P2 receptor) branch. It is
      biologically incorrect for a cAR-family cAMP receptor and should be removed.
- term:
    id: GO:0008160
    label: protein tyrosine phosphatase activator activity
  evidence_type: TAS
  original_reference_id: PMID:12408804
  qualifier: enables
  review:
    summary: CAR4 signaling activates a protein tyrosine phosphatase that inhibits
      GSK3 to control cell-fate choice. This captures a real, receptor-dependent
      regulatory relationship, but as a direct molecular function of the receptor it
      is an over-interpretation, because CAR4 regulates the phosphatase indirectly
      through G protein signaling rather than acting as a direct enzyme activator.
    action: KEEP_AS_NON_CORE
    reason: The essence is supported by the primary paper (CAR4 regulates a tyrosine
      phosphatase that inhibits GSK3), and it is an important downstream mechanism
      for patterning. However, this is a signaling-mediated regulatory role rather
      than a direct catalytic-activator molecular function of the receptor, so it is
      retained as non-core.
