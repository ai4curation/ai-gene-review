- term:
    id: GO:0007189
    label: adenylate cyclase-activating G protein-coupled receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This IBA term propagates the adenylate-cyclase-activating signaling
      role of aggregation-stage cAR paralogs (notably cAR1) to CAR4. The
      characterized signaling output of CAR4 is regulation of a tyrosine phosphatase
      that inhibits GSK3 during late-development patterning, not activation of
      adenylate cyclase. There is no direct evidence that CAR4 couples to adenylate
      cyclase activation.
    action: MARK_AS_OVER_ANNOTATED
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - WRONG_ORTHOLOG_OR_PARALOG
      source_entities:
      - source_id: PANTHER:PTN000560943
        source_label: "PANTHER node for the Dictyostelium cAMP-receptor (cAR) family"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Adenylate-cyclase-activating role is a property of aggregation-stage cAR1, not of the late-development paralog CAR4 which signals through a tyrosine-phosphatase/GSK3 axis"
      - source_id: dictyBase:DDB_G0273397
        source_label: "Dictyostelium cAR1-type paralog"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "cAR1 activates adenylate cyclase, but this function does not transfer to the divergent CAR4 paralog"
    reason: cAR1-4 are stage-specific paralogs and this IBA is a likely
      over-propagation from receptors that do activate adenylate cyclase. CAR4's
      documented downstream pathway operates through a protein tyrosine
      phosphatase/GSK3 axis controlling cell fate, so the specific
      adenylate-cyclase-activating claim is not supported for this paralog.
    supported_by:
    - reference_id: PMID:12408804
      supporting_text: We now show that CAR4 regulates a tyrosine phosphatase that
        inhibits GSK3 activity
