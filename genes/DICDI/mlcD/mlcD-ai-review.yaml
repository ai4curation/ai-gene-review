  label: Dictyostelium discoideum
description: MlcD is a calmodulin-like myosin light chain that serves as the 
  dedicated light chain for the class I myosin MyoD (Myo1D) in Dictyostelium 
  discoideum. It contains four EF-hand motifs but only retains low-affinity 
  calcium binding (Kd ~52 uM) due to mutations in key Ca2+-coordinating residues
  of EF-hands 2-4, and thus cannot function as a physiological calcium sensor. 
  Two copies of MlcD bind the MyoD IQ motifs in a calcium-insensitive manner, 
  forming the regulatory light chain component of the Myo1D complex. Through its
  association with MyoD, MlcD participates in membrane dynamics at 
  macropinocytic cups and actin waves.
existing_annotations:
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference of calcium ion binding is partially 
      supported but misleading. MlcD retains one functional EF-hand with 
      low-affinity calcium binding (Kd 52 uM), well above physiological levels. 
      The protein cannot function as a sensor of physiological calcium, so this 
      annotation overstates the functional relevance.
    action: KEEP_AS_NON_CORE
    reason: MlcD does bind calcium but with very low affinity that is not 
      physiologically relevant. The IBA inference from calmodulin family members
      with high-affinity calcium binding is misleading for this divergent 
      paralog. The annotation is technically correct but not representative of 
      the core function.
    supported_by:
