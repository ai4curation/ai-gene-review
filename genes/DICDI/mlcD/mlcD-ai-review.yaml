    label: calcium ion binding
  evidence_type: IDA
  original_reference_id: PMID:12826013
  review:
    summary: Direct experimental evidence demonstrates calcium binding by MlcD 
      via electrospray ionization MS and tryptophan fluorescence quenching. 
      However, the binding is low affinity (Kd 52 uM), so while the annotation 
      is experimentally supported, it does not represent the core evolved 
      function.
    action: KEEP_AS_NON_CORE
    reason: The IDA evidence from De La Roche et al. 2003 is solid - MlcD does 
      bind calcium as demonstrated by ESI-MS and fluorescence spectroscopy. 
      However, the authors themselves conclude the binding is not 
      physiologically relevant. This is a vestigial capacity from calmodulin 
      ancestry, not a core function.
    supported_by:
