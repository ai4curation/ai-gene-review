      supporting_text: yielding apparent dissociation constants ( K'(d)) of 52 
        microM for Ca2+ and 450 microM for Mg2+
    - reference_id: PMID:12826013
      supporting_text: The low affinity of MlcD for Ca2+ indicates that it 
        cannot function as a sensor of physiological Ca2+
