- term:
    id: GO:0030234
    label: enzyme regulator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This IBA annotation from the calmodulin family is questionable for 
      MlcD. While calmodulin regulates numerous enzymes, MlcD has diverged 
      substantially and specifically associates only with MyoD. There is no 
      direct evidence that MlcD regulates enzyme activity per se; it functions 
      as a structural light chain of a motor complex rather than as an enzyme 
      regulator.
    action: REMOVE
    reason: MlcD is a dedicated structural light chain for MyoD, not a general 
      enzyme regulator. Unlike calmodulin, which activates kinases and 
      phosphatases, MlcD binds only MyoD in a calcium-insensitive manner. The 
      IBA inference from calmodulin family members does not transfer to this 
      divergent paralog that has lost both high-affinity calcium binding and 
      promiscuous target engagement.
    supported_by:
    - reference_id: PMID:12826013
      supporting_text: FLAG-MlcD expressed in Dictyostelium formed a complex 
        with MyoD, but not with the two other long-tailed Dictyostelium myosin I
        isoenzymes, MyoB and MyoC
    - reference_id: PMID:12826013
      supporting_text: The low affinity of MlcD for Ca2+ indicates that it 
        cannot function as a sensor of physiological Ca2+
- term:
    id: GO:0000226
    label: microtubule cytoskeleton organization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This IBA annotation transfers microtubule-related functions from 
      calmodulin orthologs. There is no evidence that MlcD or its partner MyoD 
      are involved in microtubule cytoskeleton organization. MyoD/Myo1D is an 
      actin-based motor that functions at membranes and actin waves.
    action: REMOVE
    reason: MlcD is a dedicated myosin I light chain with no known connection to
      microtubule biology. All experimental evidence places MlcD/MyoD in the 
      context of actin-based structures (macropinocytic cups, actin waves). The 
      IBA inference from calmodulin, which does participate in microtubule 
      biology through different targets, does not transfer to this divergent 
      paralog.
    supported_by:
    - reference_id: PMID:31774725
      supporting_text: Myo1D localized, like short-tail Myo1E and Myo1F, in the 
        PIP3-rich region encircled by the actin wave
    - reference_id: PMID:12826013
      supporting_text: FLAG-MlcD expressed in Dictyostelium formed a complex 
        with MyoD, but not with the two other long-tailed Dictyostelium myosin I
        isoenzymes, MyoB and MyoC
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: InterPro2GO annotation from the EF-hand domain (IPR002048). While 
      MlcD does contain EF-hand domains and retains low-affinity calcium 
      binding, this annotation overstates functional importance since the 
      binding is not physiologically relevant.
    action: KEEP_AS_NON_CORE
    reason: The InterPro2GO inference from EF-hand domains is technically 
      correct (MlcD does bind calcium) but functionally misleading. Three of 
      four EF-hands have degenerate calcium-coordinating residues, and the 
      measured Kd of 52 uM is far above physiological calcium concentrations. 
      This is not a core function.
    supported_by:
    - reference_id: PMID:12826013
      supporting_text: EF-hands 2-4 contain mutations in key Ca2+-co-ordinating 
        residues that would be predicted to impair Ca2+ binding
    - reference_id: PMID:12826013
      supporting_text: The low affinity of MlcD for Ca2+ indicates that it 
        cannot function as a sensor of physiological Ca2+
