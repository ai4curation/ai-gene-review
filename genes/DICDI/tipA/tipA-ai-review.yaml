core_functions:
- description: TipA is required for the sorting of the initial prestalk (PstO) cell
    type and for formation of the organizing tip during the mound-to-slug transition
    of Dictyostelium multicellular development, acting cell-autonomously upstream of
    slug formation and culmination. Its molecular activity is not established; the
    protein carries a predicted but experimentally unverified PP2C-like (PPM-type)
    phosphatase domain, so no molecular function term is asserted.
