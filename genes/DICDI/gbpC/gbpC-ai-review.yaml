id: Q8MVR1
gene_symbol: gbpC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: GbpC (cyclic GMP-binding protein C, also called GefT/RasGEFT and Roco1)
  is a very large (2631 aa) multidomain Roco-family protein and the principal
  intracellular effector of the second messenger cGMP in Dictyostelium discoideum.
  Its domain arrangement comprises N-terminal leucine-rich repeats, a Ras-like Roc
  GTPase domain, a COR domain, a MAP3K-like serine/threonine protein kinase domain,
  a RasGEF (CDC25) domain with an N-terminal RasGEF-N and DEP module, a GRAM domain,
  and two tandem cyclic-nucleotide-binding (cGMP-binding) domains. GbpC accounts for
  essentially all high-affinity cGMP binding in the soluble fraction of the cell.
  It operates as a self-contained intramolecular signaling cascade in which cGMP binding
  to the cyclic-nucleotide-binding domains stimulates the internal RasGEF domain to
  catalyze GDP/GTP exchange on the Roc domain, and GTP-loaded Roc in turn activates
  the C-terminal MAP3K-like kinase, whose phosphorylation of downstream targets is
  the functional output. GbpC is largely cytoplasmic in resting cells and translocates
  via its GRAM (phospholipid-binding) domain to the plasma membrane and F-actin-rich
  cell cortex upon chemoattractant (cAMP) stimulation. Functionally it governs the
  cGMP branch of chemotactic signaling, controlling myosin II regulation, cell
  polarity and the cell-rear/retraction response, and it contributes to electrotaxis
  directionality and to regulation of bleb-based motility.
