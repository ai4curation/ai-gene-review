- id: PMID:12011437
  title: Identification of four candidate cGMP targets in Dictyostelium.
  findings:
  - statement: GbpC is a nine-domain protein containing leucine-rich repeats, a Ras
      (Roc) domain, a MEK/MAP3K-like kinase, RasGEF-N, DEP, RasGEF, and two cGMP-binding
      domains flanking a GRAM domain.
    supporting_text: 'GbpC contains the following nine domains (in order): leucine-rich
      repeats, Ras, MEK kinase, Ras guanine nucleotide exchange factor N-terminal
      (RasGEF-N), DEP, RasGEF, cGMP-binding, GRAM, and a second cGMP-binding domain'
  - statement: Disruption of gbpC removes all high-affinity cGMP-binding activity
      in the soluble fraction, identifying GbpC as the principal cGMP receptor.
    supporting_text: Disruption of the gbpC gene results in loss of all high-affinity
      cGMP-binding activity present in the soluble cellular fraction
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Original identification of GbpC and its domain architecture; abstract
      confirms it is the dominant high-affinity cGMP-binding protein.
- id: PMID:15827084
  title: RasGEF-containing proteins GbpC and GbpD have differential effects on cell
    polarity and chemotaxis in Dictyostelium.
  findings:
  - statement: gbpC-null cells display strongly reduced chemotaxis because they cannot
      polarize in a chemotactic gradient.
    supporting_text: gbpC-null cells display strongly reduced chemotaxis, because
      they are unable to polarise effectively in a chemotactic gradient
  - statement: cGMP activates GbpC to mediate chemoattractant-induced cell polarity
      through myosin, whereas GbpD promotes substrate attachment.
    supporting_text: cGMP activates GbpC, mediating the chemoattractant-induced establishment
      of cell polarity through myosin
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Establishes GbpC's role in chemotactic polarity via myosin; the
      adhesion phenotype in this paper belongs to the paralog GbpD, not GbpC.
- id: PMID:16546177
  title: Myosin light chain kinase A is activated by cGMP-dependent and cGMP-independent
    pathways.
  findings:
  - statement: Activation of myosin light chain kinase A during chemotaxis depends
      on cGMP levels and on GbpC.
    supporting_text: MLCK-A activation during chemotaxis is highly responsive to cellular
      cGMP levels and the cGMP-binding protein GbpC
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Places GbpC upstream of MLCK-A activation in the chemotaxis myosin
      pathway; supports an indirect kinase-regulatory role.
- id: PMID:18673369
  title: The Legionella pneumophila phosphatidylinositol-4 phosphate-binding type
    IV substrate SidC recruits endoplasmic reticulum vesicles to a replication-permissive
    vacuole.
  findings: []
  reference_review:
    relevance: NONE
    correctness: WRONG_IDENTIFIER
    review_notes: This PMID is a Legionella pneumophila SidC effector study with no
      relation to GbpC or cGMP binding. It is cited in GOA as the reference for GbpC
      cGMP binding (IDA) and regulation of chemotaxis (IMP); those functions are genuine
      but the identifier is mis-attributed. The correct GbpC references are PMID:12011437,
      PMID:18703517 and PMID:15827084.
- id: PMID:18703517
  title: Intramolecular activation mechanism of the Dictyostelium LRRK2 homolog Roco
    protein GbpC.
  findings:
  - statement: The GbpC RasGEF domain specifically accelerates GDP/GTP exchange on
      its own Roc domain and on no other tested Ras/Rap GTPase.
    supporting_text: the RasGEF domain of GbpC specifically accelerates the GDP/GTP
      exchange of the Roc domain
  - statement: cGMP binding stimulates GbpC binding to GTP-agarose, indicating cGMP-stimulated
      GDP/GTP exchange at the Roc domain.
    supporting_text: cGMP binding to GbpC strongly stimulates the binding of GbpC
      to GTP-agarose
  - statement: GbpC operates as a four-step intramolecular cascade from cGMP binding
      through GEF activation and Roc exchange to MAP3K activation.
    supporting_text: 'a four-step intramolecular activation mechanism of the Roco protein
      GbpC: cGMP binding to the cyclic nucleotide-binding domains, activation of the
      GEF domain, GDP/GTP exchange of Roc, and activation of the MAPKKK domain'
  - statement: GbpC is the only high-affinity cGMP target in Dictyostelium; functional
      GEF, Roc, and kinase domains are all required in vivo.
    supporting_text: Mutants that lack a functional guanine exchange factor (GEF),
      Roc, or kinase domain are inactive in vivo
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full-text PMC article; directly demonstrates the intramolecular
      cGMP to GEF to Roc to kinase signaling cascade underpinning several core molecular
      functions.
- id: PMID:19346484
  title: Switching direction in electric-signal-induced cell migration by cyclic guanosine
    monophosphate and phosphatidylinositol signaling.
  findings:
  - statement: Genetic modulation of GbpC together with guanylyl cyclases can reverse
      the direction of migration during electrotaxis.
    supporting_text: the preferential direction of migration during electrotaxis in
      Dictyostelium cells can be reversed by genetically modulating both guanylyl
      cyclases (GCases) and the cyclic guanosine monophosphate (cGMP)-binding protein
      C (GbpC)
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Supports a GbpC role in electrotaxis directionality; the cached
      text does not clearly document GbpC-specific leading-edge localization.
- id: PMID:22119747
  title: Multiple regulatory mechanisms for the Dictyostelium Roco protein GbpC.
  findings:
  - statement: GbpC is cytoplasmic in resting cells and translocates to the cell boundary
      upon cAMP stimulation.
    supporting_text: In resting cells, the protein is present in the cytoplasm, but
      GbpC rapidly translocates to the cell boundary upon stimulation with the chemoattractant
      cAMP
  - statement: The GRAM domain binds phospholipids and mediates GbpC translocation
      to the plasma membrane and cell cortex.
    supporting_text: cAMP induces a GRAM-dependent translocation of GbpC toward the
      plasma membrane and cell cortex
  - statement: cGMP-mediated GbpC activation is essential for proper regulation of
      myosin II during chemotaxis.
    supporting_text: cGMP-mediated GbpC activation is essential for the proper regulation
      of myosin II during chemotaxis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Full-text PMC article; establishes the GRAM-dependent membrane/cortex
      localization and phospholipid-binding activity of GbpC.
- id: PMID:26317626
  title: Microtubule-Mediated Inositol Lipid Signaling Plays Critical Roles in Regulation
    of Blebbing.
  findings:
  - statement: gbpC/gbpD-deficient cells extend blebs more frequently than wild type,
      implicating GbpC in regulation of blebbing.
    supporting_text: cells deficient in gbpC-/gbpD (guanylate cyclases), pkgB (serine/threonine-protein
      kinase), iplA (Ca2+ channel), or pi3k (phosphatidylinositol 3-kinase) extended
      blebs more frequently than wild type cells
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Genetic blebbing screen; note the paper parenthetically mislabels
      gbpC/gbpD as guanylate cyclases, but the mutant blebbing phenotype is the basis
      for the IGI annotation.
