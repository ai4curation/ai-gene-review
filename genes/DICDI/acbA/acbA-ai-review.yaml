- term:
    id: GO:0004860
    label: protein kinase inhibitor activity
  evidence_type: IMP
  original_reference_id: PMID:15897458
  qualifier: enables
  review:
    summary: This annotation reflects the mechanism of the SDF-2 peptide derived from
      AcbA. SDF-2 binds the histidine kinase DhkA and inhibits its kinase activity
      and phosphorelay, as shown in a heterologous yeast assay. The activity is thus
      a real, experimentally supported property mediated by the SDF-2 cleavage
      product rather than a function of full-length acyl-CoA-bound AcbA.
    action: KEEP_AS_NON_CORE
    reason: Direct evidence (yeast reconstitution) shows SDF-2 ligand binding
      inhibits the DhkA histidine kinase. This is the mechanistic basis of the
      sporulation signal, but as an inhibitor-of-a-specific-receptor-kinase activity
      it is a downstream property of the processed peptide; it is kept as non-core
      relative to the acyl-CoA-binding molecular function.
    supported_by:
    - reference_id: PMID:15897458
      supporting_text: ligand binding to the SDF-2 receptor histidine kinase, DhkA,
        inhibits phosphorelay, which can account for its ability to induce rapid
        sporulation
    - reference_id: PMID:15897458
      supporting_text: It appears that DhkA functions as a constitutive kinase in
        yeast that is inhibited upon ligand binding
