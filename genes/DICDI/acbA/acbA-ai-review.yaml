gene_symbol: acbA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: AcbA is a small (84-residue) acyl-CoA-binding protein of the conserved
  ACBP family in Dictyostelium discoideum. Like its animal and plant homologs it
  binds medium- to long-chain acyl-CoA esters (e.g. palmitoyl-CoA) with high affinity
  in a 1:1 stoichiometry, a housekeeping activity linked to intracellular acyl-CoA
  transport and lipid (including sphingolipid) metabolism. AcbA has a second,
  signaling role during multicellular development. It is unconventionally secreted
  from prespore cells via a vesicular, NSF- and GRASP-dependent pathway, and the
  extracellular protein is proteolytically cleaved by the prestalk surface protease
  TagC to release the peptide SDF-2 (spore differentiation factor 2). SDF-2 acts as
  a ligand for the membrane histidine kinase DhkA; ligand binding inhibits the
  DhkA-RdeA-RegA phosphorelay, raising cAMP and PKA activity and triggering rapid,
  synchronous encapsulation of prespore cells during culmination. Loss of AcbA
  abolishes SDF-2 activity and greatly reduces viable spore formation in a
  non-cell-autonomous manner.
existing_annotations:
- term:
    id: GO:0006631
    label: fatty acid metabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) inference that AcbA participates in fatty acid/lipid
      metabolism. This is consistent with the conserved acyl-CoA-binding activity of
      the ACBP family, which shuttles acyl-CoA esters and is implicated in membrane
      lipid and sphingolipid metabolism. It is a genuine but secondary role relative
      to the well-characterized developmental signaling function.
    action: KEEP_AS_NON_CORE
    reason: AcbA does bind acyl-CoA and is linked to lipid/sphingolipid metabolism,
      so the broad metabolic process term is defensible, but in Dictyostelium the
      gene is chiefly studied and functionally important as the precursor of the
      SDF-2 sporulation signal. This general metabolic term is kept as a non-core
      annotation.
    supported_by:
    - reference_id: PMID:15897458
      supporting_text: This small protein binds C 14 -C 22 acyl-CoA esters and is
        involved in membrane mobilization
    - reference_id: PMID:17878305
      supporting_text: acbA encodes an acyl-CoA binding protein, which is involved in
        sphingolipid metabolism and in developmental intercellular signaling
