- term:
    id: GO:0006974
    label: DNA damage response
  evidence_type: IMP
  original_reference_id: PMID:17878305
  qualifier: acts_upstream_of_or_within
  review:
    summary: This annotation derives from a cisplatin-sensitivity screen in which an
      acbA mutant showed altered drug sensitivity. The paper attributes the effect to
      AcbA's role in sphingolipid metabolism (a known modulator of cisplatin
      sensitivity), not to a direct role in the DNA damage response. Framing the
      altered cisplatin sensitivity as DNA damage response over-interprets the
      evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: The mutant phenotype is altered cisplatin sensitivity, mechanistically
      linked to sphingolipid metabolism rather than to a bona fide DNA damage
      response. The term is not flatly wrong (cisplatin is a DNA-damaging agent) but
      it over-annotates AcbA's role, which is metabolic/lipid-signaling.
    supported_by:
    - reference_id: PMID:17878305
      supporting_text: Mutations in five cisplatin response genes (sgkB, csbA, acbA,
        smlA, and atg8) resulted in altered drug sensitivity
    - reference_id: PMID:17878305
      supporting_text: acbA encodes an acyl-CoA binding protein, which is involved in
        sphingolipid metabolism and in developmental intercellular signaling
