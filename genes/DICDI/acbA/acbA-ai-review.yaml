- term:
    id: GO:0031154
    label: culmination involved in sorocarp development
  evidence_type: IEP
  original_reference_id: PMID:25887420
  qualifier: acts_upstream_of_or_within
  review:
    summary: Expression-pattern (IEP) inference from a developmental RNA-seq time
      course. acbA transcript dynamics are consistent with a housekeeping role in
      vegetative growth and a signaling role in terminal (culmination-stage) spore
      differentiation. The evidence is correlative expression timing rather than a
      direct functional assay of culmination.
    action: KEEP_AS_NON_CORE
    reason: SDF-2 signaling does act during culmination, so the term is biologically
      plausible, but the supporting evidence here is only transcript-timing
      correlation. Kept as a non-core annotation; the core sporulation role is
      captured by the IMP annotation.
    supported_by:
    - reference_id: PMID:25887420
