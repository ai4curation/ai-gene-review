- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IDA
  original_reference_id: PMID:7713325
  qualifier: enables
  review:
    summary: This annotation assigns DNA binding to the SP70 gene product, but
      the cited paper describes DNA binding by a distinct trans-acting factor
      that recognizes CA-rich elements upstream of the cotB gene, not by the
      SP70 protein itself. SP70 is a secreted, signal-peptide-bearing spore coat
      glycoprotein with follistatin-like repeats and has no nuclear
      localization or DNA-binding architecture; DNA binding is biologically
      implausible for it.
    action: REMOVE
    reason: The DNA-binding activity in Hopper et al. 1995 belongs to a separate
      regulatory (CA-box-binding) protein that controls transcription of the cot
      genes, whereas cotB/SP70 is the structural spore coat glycoprotein being
      regulated. Attributing DNA binding to the SP70 product is a
      misassignment; the protein's secreted, glycosylated, extracellular nature
      is incompatible with a DNA-binding molecular function.
    supported_by:
    - reference_id: PMID:7713325
      supporting_text: the binding activity that recognizes the CA-rich
        sequences upstream of the cotB gene
    - reference_id: PMID:7713325
      supporting_text: modulating the activity of a DNA binding protein
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:8662961
  qualifier: enables
  review:
    summary: Interaction-based annotation reflecting SP70's participation in the
      PsB multiprotein glycoprotein complex. Bare 'protein binding' is
      uninformative; the biologically meaningful content (membership in the
      preassembled spore coat glycoprotein complex) is better captured by the
      glycoprotein complex annotation.
    action: KEEP_AS_NON_CORE
    reason: SP70 does engage in protein-protein interactions as a subunit of the
      PsB complex, but GO:0005515 is too general to convey function. The
      informative aspect is retained via the glycoprotein complex (GO:0090665)
      annotation, so this term is kept only as non-core.
    supported_by:
    - reference_id: PMID:8662961
      supporting_text: some of these spore coat glycoproteins exist as a
        preassembled multiprotein complex
