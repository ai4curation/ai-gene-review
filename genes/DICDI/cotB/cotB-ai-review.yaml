- term:
    id: GO:0042244
    label: spore wall assembly
  evidence_type: IMP
  original_reference_id: PMID:7813801
  qualifier: involved_in
  review:
    summary: Knockout analysis shows that loss of the major coat proteins
      including SP70 makes spores more porous, indicating a contribution to the
      structure and permeability barrier of the assembled spore coat, even
      though the coat still forms in their absence.
    action: ACCEPT
    reason: SP70 contributes to the structural completeness of the spore coat;
      its loss increases porosity and exposes underlying polysaccharide. This
      places it in spore wall assembly as a structural constituent, which is a
      core function.
    supported_by:
