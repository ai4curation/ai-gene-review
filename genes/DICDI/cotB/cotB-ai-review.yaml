core_functions:
- description: SP70 is a secreted structural glycoprotein subunit of the
    preassembled PsB spore coat glycoprotein complex. Stored in prespore vesicles
    and secreted during sporulation, it is incorporated into the spore coat,
    where it acts as a structural constituent that contributes to the coat's
    cellulose-anchored architecture and permeability barrier. As a complex
    subunit it contributes to, but does not independently enable, the complex's
    cellulose binding activity.
