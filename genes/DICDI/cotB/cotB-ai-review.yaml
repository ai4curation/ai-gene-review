gene_symbol: cotB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Spore coat protein SP70 (also called Beejin) is a developmentally
  regulated, secreted glycoprotein of the social amoeba Dictyostelium discoideum.
  It is synthesized specifically in prespore cells during multicellular
  development, where it is packaged into prespore vesicles as part of a
  preassembled multiprotein glycoprotein complex (the PsB complex). Late in
  culmination this complex is secreted and deposited into the spore coat, the
  cellulose-and-glycoprotein extracellular matrix that surrounds the mature
  dormant spore. SP70 carries an N-terminal signal peptide, a Dictyostelium
  spore-coat (DSCP-N) domain and multiple follistatin-like cysteine-rich
  repeats, and is post-translationally modified by N-linked glycosylation,
  fucosylation and phosphorylation. Together with the other major coat proteins
  SP96 (CotC) and SP60 (CotA) it contributes to the structural integrity and
  permeability barrier of the spore coat; loss of these proteins leaves spores
  viable but more porous. Because its expression is tightly restricted to
  prespore cells, cotB is widely used as a molecular marker of the prespore
  cell type.
