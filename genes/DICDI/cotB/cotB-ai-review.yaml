- term:
    id: GO:0030248
    label: cellulose binding
  evidence_type: IMP
  original_reference_id: PMID:8662961
  qualifier: contributes_to
  review:
    summary: The assembled PsB glycoprotein complex has specific in vitro
      cellulose binding activity that requires all protein subunits to be
      assembled. As a subunit, SP70 contributes to this complex-level activity
      rather than binding cellulose independently, consistent with the
      contributes_to qualifier.
    action: ACCEPT
    reason: Analysis of subunit-deletion mutants showed that the PsB complex must
      be fully assembled for cellulose binding, so individual subunits including
      SP70 contribute to the activity. The contributes_to qualifier correctly
      captures this complex-dependent molecular function.
    supported_by:
    - reference_id: PMID:8662961
      supporting_text: the PsB complex has a specific in vitro cellulose binding
        activity
    - reference_id: PMID:8662961
      supporting_text: the protein subunits must be assembled for cellulose
        binding activity
- term:
    id: GO:0031153
    label: slug development involved in sorocarp development
  evidence_type: IEP
  original_reference_id: PMID:25887420
  qualifier: acts_upstream_of_or_within
  review:
    summary: This annotation derives from expression profiling in which cotB is
      used as a marker of prespore-cell differentiation during the slug stage.
      Expression timing as a cell-type marker indicates when and where the gene
      is transcribed, not that SP70 functionally drives slug development. SP70's
      demonstrated role is structural, in the spore coat.
    action: MARK_AS_OVER_ANNOTATED
    reason: cotB is a prespore marker whose developmental expression profile was
      measured, but there is no evidence that the SP70 protein participates
      causally in slug development. An IEP inference from a marker gene's
      expression pattern overstates a functional role; the gene's core function
      lies in spore coat structure, not in the morphogenesis of the slug.
    supported_by:
    - reference_id: PMID:25887420
      supporting_text: The genes cotB and ecmB are often used to mark the
        differentiation of prespore and prestalk cell-types, respectively
