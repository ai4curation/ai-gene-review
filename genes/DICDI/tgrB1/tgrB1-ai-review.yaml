core_functions:
- description: TgrB1 is the receptor half of the polymorphic TgrB1-TgrC1
    receptor-ligand pair. Displayed on the cell surface via its glycosylated
    IPT/TIG ectodomain, it binds its ligand TgrC1 on adjacent cells in an
    allele-specific manner in trans, driving TgrB1 homodimerization, assembly of
    TgrB1-TgrC1 cell-adhesion complexes, and phosphorylation-coupled transmembrane
    signaling that mediates self/kin recognition and the transition to cooperative
    multicellular development.
