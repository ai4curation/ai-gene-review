  review:
    summary: In chimeras, activation of the TgrB1 receptor drives carrier cells into
      the altruistic prestalk/stalk fate while boosting wild-type spore production,
      whereas tgrB1 inactivation causes allotype-specific cheating. TgrB1 thus
