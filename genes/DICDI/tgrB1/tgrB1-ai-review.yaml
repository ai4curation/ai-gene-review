gene_symbol: tgrB1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: TgrB1 (Tiger protein B1; formerly LagB1) is a highly polymorphic,
  single-pass type I transmembrane glycoprotein of the social amoeba Dictyostelium
  discoideum. Its long, glycosylated extracellular region contains three IPT/TIG
  (immunoglobulin-like) domains, followed by a single transmembrane helix and a
  short cytoplasmic tail. TgrB1 is displayed on the cell surface and functions as
  the receptor of a matched receptor-ligand pair with the adjacent-gene product
  TgrC1, which is its ligand. TgrB1 binds TgrC1 in trans across the gap between
  neighbouring cells in an allele-specific manner; this heterophilic binding drives
  homodimerization of TgrB1 and assembly of large TgrB1-TgrC1 adhesion complexes,
  mediates cell-cell adhesion, and transduces a signal via the cytoplasmic tail
  (which becomes phosphorylated upon ligand engagement). Because tgrB1 and tgrC1
  are among the most polymorphic loci in the genome and only matching allele pairs
  bind productively, the TgrB1-TgrC1 system provides a self/kin-recognition
  (allorecognition) mechanism that governs the transition from unicellular growth
  to cooperative multicellular development, and underlies preferential cooperation
  with kin, protection against cheaters, and the greenbeard behaviour of the
  organism.
