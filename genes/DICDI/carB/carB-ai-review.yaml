- id: PMID:2722797
  title: The cyclic nucleotide specificity of eight cAMP-binding proteins in Dictyostelium
    discoideum is correlated into three groups.
  findings:
  - statement: The four cell-surface cAMP receptors (including cAR2) form one
      pharmacological group and bind cAMP to transduce the signal during chemotaxis
      and cell differentiation.
    supporting_text: the cell surface receptors participate in the transduction of the
      cAMP signal during chemotaxis and cell differentiation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified J Biol Chem 1989 paper; characterizes cAMP binding
      and specificity of the cell-surface receptor group that includes cAR2.
- id: PMID:41057014
  title: Transcriptomic and metabolomic insights into light-mediated unicellular-to-multicellular
