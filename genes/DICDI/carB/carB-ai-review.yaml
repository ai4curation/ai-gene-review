gene_symbol: carB
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Cyclic AMP receptor 2 (cAR2/carB) is one of four serpentine
  (seven-transmembrane) G protein-coupled receptors for extracellular cAMP in the
  social amoeba Dictyostelium discoideum. It is a lower-affinity cAMP receptor that
  is expressed later than cAR1, appearing only after cells have aggregated and then
  preferentially in prestalk cells at the mound-to-slug stage. Signaling through
  heterotrimeric G proteins, cAR2 couples extracellular cAMP to downstream responses
  including adenylyl cyclase activation and developmentally regulated gene
  expression. It is required for cAMP-directed sorting/patterning of prestalk cells,
  for normal tip formation, and for progression through late multicellular
  development; cells lacking cAR2 arrest at the tight-mound stage and over-express
  prespore markers. cAR2 belongs to the Dictyostelium cAR family (cAR1-cAR4), whose
  members are deployed sequentially during development and differ in cAMP affinity
  and C-terminal sequence.
