- term:
    id: GO:0035589
    label: G protein-coupled purinergic nucleotide receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: This term was assigned by an automated inter-ontology logical inference
      from cAMP receptor activity. The Dictyostelium cAR receptors are cyclic-AMP
      chemoattractant receptors, not purinergic (ATP/ADP/adenosine) nucleotide
      receptors in the sense captured by this term. The mapping mischaracterizes the
      receptor's signaling pathway.
    action: REMOVE
    reason: This is an over-propagated electronic inference. cAR2 responds to the
      diffusible second messenger cAMP as a developmental chemoattractant; it is not a
      purinergic nucleotide receptor. The GPCR signaling pathway term already captures
      its role correctly without the misleading purinergic classification.
    supported_by:
    - reference_id: PMID:2722797
      supporting_text: the cell surface receptors participate in the transduction of
        the cAMP signal during chemotaxis and cell differentiation
