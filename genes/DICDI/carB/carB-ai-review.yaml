- id: PMID:8436297
  title: CAR2, a prestalk cAMP receptor required for normal tip formation and late
    development of Dictyostelium discoideum.
  findings:
  - statement: cAR2 is a G protein-linked, seven-transmembrane cell-surface receptor
      for cAMP.
    supporting_text: The receptors for cAMP are members of the family of cell-surface
      receptors that are linked to G proteins and characterized by seven putative
      transmembrane domains.
  - statement: cAR2 is expressed only after aggregation and preferentially in prestalk
      cells.
    supporting_text: CAR2 is expressed only after cells have aggregated and, then,
      preferentially in prestalk cells.
  - statement: cAR2-null cells arrest at the tight-mound stage and over-express
      prespore markers, and cAR2 is required for cAMP-directed prestalk sorting.
    supporting_text: CAR2 may be required for cAMP-directed sorting of prestalk cells
      during pattern formation within the aggregation mound.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified Genes Dev 1993 primary paper defining cAR2; the
      knockout phenotype and prestalk expression underpin the developmental
      annotations. Abstract-only in cache but title and abstract directly support the
      cited claims.
