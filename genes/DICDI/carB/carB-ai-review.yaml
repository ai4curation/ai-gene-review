- id: PMID:1537842
  title: The cyclic nucleotide specificity of three cAMP receptors in Dictyostelium.
  findings:
  - statement: cAR2 was expressed and assayed by [3H]cAMP binding; unlike cAR1 and
      cAR3 it showed no detectable affinity in phosphate buffer and only an 11 nM
      affinity state in ammonium sulfate, marking cAR2 as a comparatively
      low/atypical-affinity cAMP receptor.
    supporting_text: In phosphate buffer, there were two affinity states of about 30
      and 300 nM for cAR1 and 20 and 500 nM for cAR3 but no detectable affinity for
      cAR2.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified J Biol Chem 1992 paper; directly measures cAR2 cAMP
      binding affinity and specificity, supporting the cAMP binding molecular
      function.
