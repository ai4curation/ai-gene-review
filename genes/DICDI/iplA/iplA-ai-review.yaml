- id: file:DICDI/iplA/iplA-hypotheses/ipla-ip3-gated-channel/openscientist.md
  title: OpenScientist function-assignment analysis of the IplA IP3-gated channel hypothesis
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Independent OpenScientist function-assignment run (3 iterations). Verdict
      PARTIALLY SUPPORTED. The IP3R/RyR-superfamily intracellular Ca2+-release
      channel identity is well supported (RIH domain, IP3-receptor-binding-core
      armadillo fold, six-TM pore; single-copy in the genome, so no paralog
      confusion). The specific IP3-GATED molecular function is NOT directly
      supported - the metazoan MIR domain is absent, 0 of 9 canonical
      IP3-coordinating residues map, no primary study demonstrates IP3 binding
      or IP3-gated conductance, and the literature hedges ("putative"), with a
      competing Ca2+-sensing interpretation. Directly corroborates this review's
      MODIFY of GO:0005220 (IP3-gated channel) to the generic GO:0005262
      (calcium channel activity). Best-supported MF is a generalized calcium
      channel term pending direct IP3-binding data.
core_functions:
- description: IplA is the sole Dictyostelium homolog of the metazoan InsP3R/ryanodine
    receptor family and functions as an intracellular ligand-gated calcium-release channel
    in the endoplasmic reticulum membrane, conducting Ca2+ from ER stores into the cytosol.
    Loss of iplA abolishes chemoattractant-stimulated Ca2+ entry and the cytosolic Ca2+
    rise. InsP3 gating is inferred from homology and conserved binding residues but has
    not been demonstrated biochemically.
  molecular_function:
