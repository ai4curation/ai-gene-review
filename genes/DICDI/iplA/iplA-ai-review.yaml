id: Q9NA13
gene_symbol: iplA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: IplA is the sole inositol 1,4,5-trisphosphate/ryanodine receptor family
  member in Dictyostelium discoideum and the only recognizable homolog of the metazoan
  IP3 receptor in this organism. It is a very large (3177 aa) multi-pass endoplasmic
  reticulum membrane protein with a long cytoplasmic N-terminal region containing predicted
  InsP3-binding residues and a C-terminal six-transmembrane channel domain, and it assembles
  into the intracellular ligand-gated calcium-release channel that governs Ca2+ efflux
  from ER stores into the cytosol. Genetic ablation of iplA abolishes the chemoattractant
  (cAMP/folate)-stimulated Ca2+ entry and the accompanying rise in free cytosolic Ca2+,
  while leaving resting cytosolic Ca2+, cAMP chemotaxis, cGMP production and MAP kinase
  signaling intact. IplA is specifically required for chemotaxis up spatial Ca2+ gradients
  and contributes to a wide range of Ca2+-dependent processes, including natural aggregation,
  arachidonate chemotaxis, AprA-mediated chemorepulsion, mechanosensory Ca2+ bursts in
  slugs, regulation of blebbing, DIF-induced autophagic cell death with cellulose shell
  synthesis, and polyphosphate/IP3-Ca2+ feedback inhibition of proliferation. Although
  it is clearly a Ca2+ channel of the InsP3R/RyR family, direct biochemical demonstration
  that IplA is gated by InsP3 is still lacking.
