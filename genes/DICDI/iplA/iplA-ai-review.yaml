- description: Through its calcium-release channel activity, IplA is specifically required
    for cell motility guided by extracellular Ca2+ gradients (Ca2+ chemotaxis), while
    being dispensable for cAMP chemotaxis, and it feeds Ca2+-mediated signaling that contributes
    to natural aggregation, mechanosensory responses, chemorepulsion, autophagic cell
    death, and density-dependent proliferation control.
