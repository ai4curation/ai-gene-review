      full_text_unavailable: true
- id: PMID:12151215
  title: "TRAM, LAG1 and CLN8: members of a novel family of lipid-sensing domains?"
  findings:
    - statement: >-
        Original identification of the TLC domain family shared across TRAM,
        LAG1/ceramide synthases, and CLN8, with predicted functions in lipid
        synthesis, transport, or sensing.
      supporting_text: "A family of membrane-associated proteins related to yeast Lag1p and mammalian TRAM has been identified"
- id: PMID:22144673
  title: >-
    Acyl chain specificity of ceramide synthases is determined within a region
    of 150 residues in the Tram-Lag-CLN8 (TLC) domain
  findings:
    - statement: >-
        CerS acyl chain specificity maps to 150 residues within the TLC domain.
        This work defined the functional architecture of ceramide synthases, but
        TLCD4 lacks the Lag1p motif characteristic of CerS enzymes.
      supporting_text: "a minimal region of 150 residues is sufficient for retaining CerS specificity"
- id: PMID:39970228
  title: >-
    TRAM-LAG1-CLN8 family proteins are acyltransferases regulating phospholipid
    composition
  findings:
    - statement: >-
        Key paper demonstrating that non-CerS TLCD proteins are phospholipid
        acyltransferases, not ceramidases. TLCD1 is a lysophosphatidylethanolamine
        acyltransferase; CLN8 is a lysophosphatidylglycerol acyltransferase.
      supporting_text: "poorly understood TRAM-LAG1-CLN8 domain (TLCD)-containing proteins are phospholipid remodeling enzymes"
- id: PMID:37078207
  title: >-
    Ceramide synthase homolog Tlc4 maintains nuclear envelope integrity via
    its Golgi translocation
  findings:
    - statement: >-
        S. pombe Tlc4 is a CerS homolog with a TLC domain that functions
        through non-catalytic activity at the ER, NE, and Golgi. Demonstrates
        that TLC domain proteins can have structural/regulatory roles beyond
        enzymatic activity.
      supporting_text: "Tlc4 was localized at the NE and endoplasmic reticulum, similar to CerS proteins"
- id: PMID:34793833
  title: >-
    Identification of TRAMs as sphingolipid-binding proteins using a
    photoactivatable and clickable short-chain ceramide analog
  findings:
    - statement: >-
        TRAM1 and TRAM2, TLC domain proteins involved in ER translocation,
        bind ceramide. This demonstrates that TLC domains can interact with
        sphingolipids without necessarily being ceramide synthases.
      supporting_text: "translocating chain-associated membrane protein 2 (TRAM2), a protein known to control RAT of transmembrane 4 L6 subfamily member 20, and TRAM1, a homolog of TRAM2, interacted with molecules derived from pac-C7-Cer"
- id: PMID:39286488
  title: >-
    Complex sphingolipid profiling and identification of an
    inositol-phosphorylceramide synthase in Dictyostelium discoideum
  findings:
    - statement: >-
        D. discoideum produces phosphoinositol-containing sphingolipids with
        phytoceramide backbones. An IPC synthase was identified in the Golgi
        and contractile vacuole. Provides context for sphingolipid biology in
        D. discoideum but does not directly involve tlcd4b.
      supporting_text: "produces phosphoinositol-containing sphingolipids with predominantly phytoceramide backbones"

suggested_questions:
  - question: >-
      Does D. discoideum tlcd4b possess lysophospholipid acyltransferase
      activity like its mammalian TLCD family relatives TLCD1 and CLN8?
    experts:
      - Kasparas Petkevicius
  - question: >-
      What is the substrate specificity of tlcd4b -- does it act on
      lysophosphatidylethanolamine, lysophosphatidylglycerol, or other
      lysophospholipid species?
    experts:
      - Kasparas Petkevicius
      - Michael P Murphy

suggested_experiments:
  - description: >-
      Express and purify recombinant D. discoideum tlcd4b in a cell-free
      system or yeast expression system and test for lysophospholipid
      acyltransferase activity using radiolabeled or fluorescent acyl-CoA
      substrates and various lysophospholipid acceptors.
    hypothesis: >-
      tlcd4b possesses lysophospholipid acyltransferase activity consistent
      with the TLCD family.
    experiment_type: in vitro enzymatic assay
  - description: >-
      Generate a tlcd4b knockout in D. discoideum and perform lipidomic
      profiling to identify changes in phospholipid and sphingolipid
      composition compared to wild-type.
    hypothesis: >-
      Loss of tlcd4b alters membrane phospholipid acyl chain composition,
      consistent with a role in phospholipid remodeling.
    experiment_type: lipidomics
  - description: >-
      Tag tlcd4b with GFP in D. discoideum and determine subcellular
      localization by confocal microscopy, comparing with ER markers and
      other organelle markers.
    hypothesis: >-
      tlcd4b localizes to the ER membrane, consistent with the IBA
      annotation and the known localization of other TLC domain proteins.
    experiment_type: fluorescence microscopy
