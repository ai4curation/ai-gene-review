id: Q550S9
gene_symbol: tlcd4b
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: >-
  tlcd4b encodes a TLC (TRAM/LAG1/CLN8) domain-containing multi-pass integral
  membrane protein in Dictyostelium discoideum. The protein belongs to the TLCD4
  subfamily of TLC domain proteins, which are distinct from the ceramide synthase
  branch of the TLC family. Based on recent characterization of TLCD family
  members as phospholipid acyltransferases (Sheokand et al. 2025), tlcd4b
  likely functions in membrane phospholipid remodeling. No experimental studies
  have been performed directly on this protein; all functional annotations are
  inferred from phylogeny or domain architecture.
existing_annotations:
# ================== ENDOPLASMIC RETICULUM (IBA) ==================
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference. TLC domain proteins,
      including ceramide synthases (CerS) and other TLCD family members,
      are characteristically localized to the ER. The S. pombe homolog
      Tlc4 was localized at the nuclear envelope and ER. TLCD1 also
      localizes to ER membranes. The ER localization is consistent with
      the protein's predicted multi-pass transmembrane topology and the
      known biology of the TLC domain family.
    action: ACCEPT
    reason: >-
      ER localization is well-established across the TLC domain family.
      CerS proteins, TLCD1, and CLN8 all localize to the ER. Phylogenetic
      inference to ER is appropriate and consistent with the transmembrane
      topology of tlcd4b.
    supported_by:
      - reference_id: PMID:37078207
        supporting_text: "Tlc4 was localized at the NE and endoplasmic reticulum, similar to CerS proteins"
      - reference_id: PMID:39970228
        supporting_text: "poorly understood TRAM-LAG1-CLN8 domain (TLCD)-containing proteins are phospholipid remodeling enzymes"

# ================== LIPID HOMEOSTASIS (IBA) ==================
- term:
    id: GO:0055088
    label: lipid homeostasis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for lipid homeostasis based on phylogenetic inference.
      This is a broad term that encompasses the function of TLC domain
      proteins. Recent work shows TLCD family members are phospholipid
      acyltransferases that regulate cellular phospholipid composition,
      which falls under lipid homeostasis. However, the term is quite
      general and does not specify whether the protein acts through
      sphingolipid or phospholipid metabolism.
    action: ACCEPT
    reason: >-
      Lipid homeostasis is an appropriate broad annotation for a TLCD
      family member. TLCD1 regulates cellular phospholipid composition
      and CLN8 catalyzes phospholipid biosynthesis -- both are forms of
      lipid homeostasis. The term is conservative and appropriate given
      the lack of direct experimental data on tlcd4b.
    supported_by:
      - reference_id: PMID:39970228
        supporting_text: "TLCD1 is an evolutionarily conserved lysophosphatidylethanolamine acyltransferase, which regulates cellular phospholipid composition"

# ================== MEMBRANE (IEA) ==================
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation based on InterPro domain IPR006634 (TLC domain) and
      UniProt subcellular location. The protein has six predicted
      transmembrane helices and is annotated as a multi-pass membrane
      protein by UniProt. This annotation is correct but could be more
      specific.
    action: MODIFY
    reason: >-
      While the membrane annotation is correct, GO:0016021 (integral
      component of membrane) would be more informative given the six
      predicted transmembrane helices and multi-pass topology documented
      in UniProt.
    proposed_replacement_terms:
      - id: GO:0016021
        label: integral component of membrane

# ================== MOLECULAR FUNCTION (ND) ==================
- term:
    id: GO:0003674
    label: molecular_function
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND annotation indicating no experimental data for molecular function.
      This is appropriate as no direct experimental characterization of
      tlcd4b enzymatic activity has been performed. Based on the TLCD
      family context, lysophospholipid acyltransferase activity is a
      plausible prediction but remains unconfirmed for this specific protein.
    action: ACCEPT
    reason: >-
      No experimental molecular function data exists for this protein.
      The ND annotation correctly reflects the current state of knowledge.

# ================== BIOLOGICAL PROCESS (ND) ==================
- term:
    id: GO:0008150
    label: biological_process
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND annotation indicating no experimental data for biological process.
      While the IBA annotation for lipid homeostasis provides a phylogenetic
      inference, no direct experimental evidence exists for tlcd4b biological
      process.
    action: ACCEPT
    reason: >-
      The ND annotation from dictyBase correctly indicates the absence of
      direct experimental evidence. The IBA lipid homeostasis annotation
      provides complementary inferred information.

# ================== PROPOSED NEW: LYSOPHOSPHOLIPID ACYLTRANSFERASE ==================
- term:
    id: GO:0071617
    label: lysophospholipid acyltransferase activity
  evidence_type: ISS
  original_reference_id: PMID:39970228
  review:
    summary: >-
      Proposed new annotation based on the 2025 discovery that non-CerS TLCD
      family members are phospholipid acyltransferases. TLCD1 was demonstrated
      to be a lysophosphatidylethanolamine acyltransferase. As tlcd4b belongs
      to the same TLCD branch of the TLC family, lysophospholipid
      acyltransferase activity is the most parsimonious predicted molecular
      function. The BioReason deep research trace incorrectly predicted
      ceramidase activity instead.
    action: NEW
    reason: >-
      Based on the characterization of TLCD family members as phospholipid
      acyltransferases (Sheokand et al. 2025), this is the best-supported
      predicted molecular function for a TLCD4 subfamily member.
    supported_by:
      - reference_id: PMID:39970228
        supporting_text: "poorly understood TRAM-LAG1-CLN8 domain (TLCD)-containing proteins are phospholipid remodeling enzymes"
      - reference_id: file:DICDI/tlcd4b/tlcd4b-deep-research-bioreason.md
        supporting_text: "[BioReason incorrectly predicted ceramidase activity; actual TLCD family function is phospholipid acyltransferase]"

# ================== PROPOSED NEW: PHOSPHOLIPID METABOLIC PROCESS ==================
- term:
    id: GO:0006644
    label: phospholipid metabolic process
  evidence_type: ISS
  original_reference_id: PMID:39970228
  review:
    summary: >-
      Proposed new annotation for phospholipid metabolic process, based on
      the demonstrated phospholipid remodeling activity of TLCD family
      members. More specific than lipid homeostasis (GO:0055088) for
      describing the biological process.
    action: NEW
    reason: >-
      TLCD family members regulate cellular phospholipid composition through
      acyltransferase activity. Phospholipid metabolic process is the
      appropriate biological process term for a phospholipid acyltransferase.
    supported_by:
      - reference_id: PMID:39970228
        supporting_text: "TLCD1 is an evolutionarily conserved lysophosphatidylethanolamine acyltransferase, which regulates cellular phospholipid composition"

