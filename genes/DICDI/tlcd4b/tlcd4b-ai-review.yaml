      (TRAM/LAG1/CLN8) domain. Based on the recent discovery that non-CerS
      TLCD family members are phospholipid acyltransferases, tlcd4b likely
      functions in membrane phospholipid remodeling at the ER. No direct
      experimental evidence exists for this specific protein.
    molecular_function:
      id: GO:0071617
      label: lysophospholipid acyltransferase activity
    directly_involved_in:
