core_functions:
- description: STATc is a latent, signal-activated DNA-binding transcription factor.
    Upon DIF-1 or stress-induced tyrosine phosphorylation and dimerization it
    accumulates in the nucleus and regulates RNA polymerase II transcription of
    specific target genes, acting both as a repressor (restricting graded ecmA
    prestalk-gene expression) and as an activator (driving hyperosmotic
    stress-response genes such as gapA and rtoA).
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:11336701
    supporting_text: Dd-STATc also functions as a repressor, which directs graded
      expression of the ecmA gene in different prestalk cell populations
  - reference_id: PMID:12771188
    supporting_text: These data show that Dd-STATc functions as a transcriptional
      activator in a stress-response pathway
- description: Through its SH2 domain, STATc binds phosphotyrosine residues on the
    tyrosine-kinase-like enzymes Pyk2/Pyk3, which phosphorylate STATc on Tyr922 to
    activate it. This phosphotyrosine-SH2 interaction with its activating kinase is a
    core molecular feature of STATc signaling in the absence of a metazoan JAK.
  molecular_function:
    id: GO:1990782
    label: protein tyrosine kinase binding
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:22699506
    supporting_text: the STATc-Pyk2 complex is formed constitutively by an
      interaction between the STATc SH2 domain and phosphotyrosine residues on Pyk2
  - reference_id: PMID:25143406
    supporting_text: The site(s) that are generated bind the SH2 domain of STATc, and
      then STATc becomes the target of further kinase action
