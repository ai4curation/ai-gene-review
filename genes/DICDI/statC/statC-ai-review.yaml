id: Q54BD4
gene_symbol: statC
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: STATc (Dd-STATc) is one of four STAT-family transcription factors of
  Dictyostelium discoideum. It is a large (931-residue) SH2-domain protein that acts
  as a latent, signal-dependent transcription factor. In unstimulated cells STATc is
  predominantly cytoplasmic; upon exposure to the prestalk morphogen DIF-1 or to
  environmental stress (hyperosmotic shock, heat shock, oxidative stress) it is
  tyrosine-phosphorylated on Tyr922, dimerizes and accumulates in the nucleus, where
  it binds DNA and regulates transcription. Activation is unusual and does not use a
  metazoan JAK; instead the tyrosine-kinase-like enzymes Pyk2 and Pyk3 phosphorylate
  STATc, counterbalanced by the protein tyrosine phosphatase PTP3, whose
  stress-induced serine/threonine phosphorylation inhibits it and shifts the balance
  toward STATc phosphorylation. STATc can act both as a repressor (it restricts
  graded ecmA prestalk-gene expression to specific prestalk cell populations) and as
  a transcriptional activator (it drives a large fraction of the hyperosmotic stress
  transcriptional program, including genes such as gapA and rtoA). Through these
  activities STATc influences the speed of early development, the timing of terminal
  differentiation, prestalk cell-type patterning and the cellular response to osmotic
  and other stresses. Nuclear accumulation is controlled at the level of
  CRM1-dependent nuclear export, and STATc is enriched in pstO cells at the rear of
  the prestalk region of the slug.
