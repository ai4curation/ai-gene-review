core_functions:
- description: DdCAD-1 mediates calcium-dependent homophilic cell-cell adhesion
    at the onset of Dictyostelium development. Its N-terminal betagamma-crystallin
    domain drives self-association into a Ca2+-bound dimer that bridges adjacent
    cells, establishing the earliest EDTA/EGTA-sensitive (contact-site-B)
    adhesions on the outer surface of the plasma membrane.
