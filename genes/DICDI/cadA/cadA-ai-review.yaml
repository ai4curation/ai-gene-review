    invagination in a Ca2+- and conformation-dependent manner.
  findings:
  - statement: DdCAD-1 is made as a soluble cytoplasmic protein and imported into
      contractile vacuoles for transport to the plasma membrane.
    supporting_text: DdCAD-1 is synthesized in the cytoplasm as a soluble protein
      and then transported by contractile vacuoles to the plasma membrane for surface
      presentation or secretion
  - statement: Calcium binding is required for import of DdCAD-1 into contractile
      vacuoles.
    supporting_text: Import of DdCAD-1 was compromised when two of its three Ca(2+)-binding
      sites were mutated, indicating a role for Ca(2+) in the import process
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
