- id: PMID:17057715
  title: Solution structures of the adhesion molecule DdCAD-1 reveal new insights
    into Ca(2+)-dependent cell-cell adhesion.
  findings:
  - statement: DdCAD-1 has two beta-sandwich domains; the N-terminal domain mediates
      homophilic binding and the C-terminal domain tethers it to the membrane.
    supporting_text: Whereas the N-terminal domain has a major role in homophilic
      binding, the C-terminal domain tethers the protein to the cell membrane
  - statement: A Ca2+-bound DdCAD-1 dimer provides the structural basis for
      DdCAD-1-mediated cell-cell adhesion.
    supporting_text: we propose a model for the Ca(2+)-bound DdCAD-1 dimer as a basis
      for understanding DdCAD-1-mediated cell-cell adhesion
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: NMR structures of Ca2+-free and Ca2+-bound DdCAD-1; defines the
      structural mechanism of calcium-dependent homophilic adhesion.
