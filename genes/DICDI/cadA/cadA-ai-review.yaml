id: P54657
gene_symbol: cadA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: DdCAD-1 (also called gp24 or CadA) is the calcium-dependent
  (EDTA/EGTA-sensitive) homophilic cell-cell adhesion molecule of the social
  amoeba Dictyostelium discoideum. It is a 24 kDa, 213-residue protein composed
  of two beta-sandwich domains (an N-terminal betagamma-crystallin-like domain
  and a C-terminal immunoglobulin-like domain); the N-terminal domain mediates
  homophilic binding whereas the C-terminal domain tethers the protein to the
  plasma membrane. DdCAD-1 is a soluble calcium-binding protein that lacks a
  signal peptide and a transmembrane domain; it is synthesized in the cytoplasm
  at the onset of starvation-induced development and reaches the cell surface by
  an unconventional secretion route in which it is imported into and transported
  by contractile vacuoles and then anchored to the plasma membrane by the ABC
  transporter ABCB4. Calcium binding and association with calmodulin are required
  for its import into contractile vacuoles. On the cell surface it establishes
  the earliest (contact-site-B) adhesions that drive aggregation, and its
  differential distribution between prestalk and prespore cells contributes to
  cell sorting, cell-type proportioning, and morphogenesis of the fruiting body
  (sorocarp). Independently of development, secreted DdCAD-1 also acts as a
  calcium-dependent, galactose-specific lectin that agglutinates Gram-negative
  bacteria such as Klebsiella pneumoniae, forming a protective interface that
  shields feeding amoebae from bacterial toxicity.
