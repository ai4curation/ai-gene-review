- id: PMID:8806827
  title: Novel redistribution of the Ca(2+)-dependent cell adhesion molecule DdCAD-1
    during development of Dictyostelium discoideum.
  findings:
  - statement: Before aggregation DdCAD-1 relocates from diffuse cytoplasm to the
      cell periphery and becomes enriched on membrane ruffles, lamellipodia, and
      filopodia at cell contacts.
    supporting_text: A high concentration of DdCAD-1 also becomes associated with
      lamellipodia and filopodia, which often appear to participate in cell contact
      formation
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Documents developmental redistribution of DdCAD-1 to surface
      protrusions; source of ruffle/lamellipodium/filopodium localizations.
- id: PMID:9265658
  title: The cell adhesion molecule DdCAD-1 in Dictyostelium is targeted to the cell
    surface by a nonclassical transport pathway involving contractile vacuoles.
  findings:
  - statement: DdCAD-1 is transported to the cell surface from the cytosol via
      contractile vacuoles, a nonclassical secretion pathway.
    supporting_text: DdCAD-1 is transported to the cell surface via contractile
      vacuoles, which are normally involved in osmoregulation
  - statement: DdCAD-1 preferentially associates with contractile vacuoles and is
      present both on the surface and in the cytosol.
    supporting_text: Immunofluorescence microscopy and subcellular fractionation
      revealed a preferential association of DdCAD-1 with contractile vacuoles
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: First demonstration of contractile-vacuole-mediated unconventional
      secretion of DdCAD-1; full text available.
