  evidence_type: IDA
  original_reference_id: PMID:12135922
  qualifier: involved_in
  review:
    summary: The cadA-null study documents altered cell-type proportioning
      (increased prestalk proportion) and aberrant sorting, but the cached
      abstract does not describe a direct role for DdCAD-1 in regulating gene
      expression, and full text was not available for verification.
    action: UNDECIDED
    reason: The relevant publication is available only as an abstract, which does
      not substantiate a molecular role in regulation of gene expression; the
