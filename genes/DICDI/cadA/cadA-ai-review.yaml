  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Phylogenetic inference of calcium ion binding is well supported by
      direct experimental evidence for DdCAD-1. The protein carries multiple
      Ca2+-binding sites and calcium is required for its adhesion and its import
      into contractile vacuoles.
