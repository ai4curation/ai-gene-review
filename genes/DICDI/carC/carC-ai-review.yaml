- id: PMID:21103944
  title: Chemoattractant-mediated Rap1 activation requires GPCR/G proteins.
  findings:
  - statement: Chemoattractant-induced Rap1 activation requires the cAMP
      receptors cAR1/cAR3 and the G-protein subunit Galpha2.
    supporting_text: The rapid Rap1 activation upon cAMP chemoattractant
      stimulation was absent in cells lacking chemoattractant cAMP receptors
      cAR1/cAR3 or a subunit of the heterotrimeric G-protein complex Gα2
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: Places cAR1/cAR3 upstream of Rap1 activation; supports an
      upstream signaling role but not intrinsic GTPase activator (GAP) activity
      of the receptor.
