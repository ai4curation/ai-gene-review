  title: The cyclic nucleotide specificity of three cAMP receptors in Dictyostelium.
  findings:
  - statement: cAR3 binds cAMP with two affinity states (~20 and 500 nM in
      phosphate buffer), distinct from cAR1 and cAR2.
    supporting_text: there were two affinity states of about 30 and 300 nM for
      cAR1 and 20 and 500 nM for cAR3 but no detectable affinity for cAR2
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: Directly measures cAR3 cAMP-binding affinity by [3H]cAMP
      binding; supports the cAMP binding annotations and intermediate-affinity
      characterization.
