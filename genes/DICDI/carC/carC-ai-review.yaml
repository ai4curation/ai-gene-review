taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: Cyclic AMP receptor 3 (cAR3, carC) is one of four serpentine
  seven-transmembrane G protein-coupled cAMP receptors of the social amoeba
  Dictyostelium discoideum. It is an intermediate-affinity receptor for
  extracellular cAMP that is induced at early aggregation and reaches maximal
  expression during the multicellular mound and slug stages. Like its close
  paralog cAR1 (carA), cAR3 couples through heterotrimeric G proteins (notably
  Galpha2) to intracellular effectors, triggering activation of adenylyl cyclase
  (cAMP relay), guanylyl cyclase, actin polymerization and small-GTPase (Rap1)
  signaling. Through these outputs it mediates chemotaxis toward cAMP and the
  aggregation of individual cells into a multicellular organism, and it
  contributes to the developmentally regulated gene-expression program. cAR1 and
  cAR3 are partially redundant, and cells lacking both receptors are unresponsive
  to cAMP, whereas single mutants retain substantial signaling. The receptor is a
  plasma-membrane glycoprotein whose C-terminal cytoplasmic tail can be
  phosphorylated.
