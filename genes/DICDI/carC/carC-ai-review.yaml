- term:
    id: GO:0035589
    label: G protein-coupled purinergic nucleotide receptor signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: This term was assigned by automated inter-ontology logical
      inference from cAMP receptor activity. Although cAMP is chemically a purine
      nucleotide, purinergic nucleotide receptor signaling denotes the
      P1/P2-type receptor systems responding to extracellular ATP/ADP/adenosine.
      Dictyostelium cAMP chemoattractant signaling is not purinergic signaling in
      that sense.
    action: REMOVE
    reason: The annotation is a mechanical over-propagation from the
      inter-ontology mapping of cAMP receptor activity to a purinergic pathway.
      cAR3 is a cAMP chemoattractant receptor, not a purinergic (ATP/adenosine)
      receptor, so this pathway term mischaracterizes its biology.
    supported_by:
    - reference_id: PMID:7949426
      supporting_text: both interact with the same heterotrimeric G-protein to
        mediate these and other responses
