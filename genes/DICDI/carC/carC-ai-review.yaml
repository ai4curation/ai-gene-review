- term:
    id: GO:0005096
    label: GTPase activator activity
  evidence_type: IDA
  original_reference_id: PMID:21103944
  qualifier: enables
  review:
    summary: This paper shows that rapid Rap1 activation upon cAMP stimulation is
      absent in cells lacking cAR1/cAR3 or Galpha2, placing the receptor upstream
      of Rap1 GTPase activation. However, GTPase activator activity (GO:0005096,
      GAP activity) is a molecular function the receptor does not itself possess,
      because cAR3 is an upstream GPCR and Rap1 activation (GTP loading) is
      mediated by downstream exchange factors, not by a GAP.
    action: MARK_AS_OVER_ANNOTATED
    reason: The receptor is required for chemoattractant-induced Rap1 activation
      but does not have intrinsic GTPase activator (GAP) activity; the effect is
      indirect, transduced through G proteins and downstream regulators. The
      molecular-function assignment over-attributes an effector activity to the
      upstream receptor. Its role is better captured as involvement in the GPCR
      signaling pathway.
    supported_by:
    - reference_id: PMID:21103944
      supporting_text: The rapid Rap1 activation upon cAMP chemoattractant
        stimulation was absent in cells lacking chemoattractant cAMP receptors
        cAR1/cAR3 or a subunit of the heterotrimeric G-protein complex Gα2
