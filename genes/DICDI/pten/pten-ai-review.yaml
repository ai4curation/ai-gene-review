- description: PTEN binds its enzymatic product PtdIns(4,5)P2 (and PI(3,5)P2) through
    an N-terminal basic motif, which stabilizes its association with the rear plasma
    membrane in a positive-feedback manner and drives its posterior accumulation.
    This membrane-targeting binding activity localizes PTEN to the back of migrating
    cells, spatially restricting PIP3 to the anterior.
