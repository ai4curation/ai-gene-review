- term:
    id: GO:0004725
    label: protein tyrosine phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: Protein tyrosine (dual-specificity) phosphatase activity is a
      family-level attribute inherited from the PTEN/tensin catalytic fold. It is a
      biochemical capability of PTEN but is not the physiologically dominant
      activity, which is lipid PIP3 phosphatase.
    action: KEEP_AS_NON_CORE
    reason: The PTEN active site can dephosphorylate phosphotyrosine in vitro, but
      no protein-phosphatase substrate or physiological role has been demonstrated
      for Dictyostelium PTEN. Retain as a non-core catalytic capability.
