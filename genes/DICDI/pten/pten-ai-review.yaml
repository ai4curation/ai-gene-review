id: Q8T9S7
gene_symbol: pten
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: pten (ptenA) is the Dictyostelium discoideum ortholog of the tumor
  suppressor PTEN, a phosphoinositide 3-phosphatase that removes the phosphate at
  the D3 position of the inositol ring of phosphatidylinositol 3,4,5-trisphosphate
  (PtdIns(3,4,5)P3/PIP3), regenerating PtdIns(4,5)P2 and thereby acting as the direct
  antagonist of PI3-kinase. The protein has an N-terminal tensin-type phosphatase
  domain and a C-terminal C2 domain; in vitro it also displays dual-specificity
  protein phosphatase activity and soluble inositol-polyphosphate 3-phosphatase
  activity, but its physiologically dominant activity is lipid PIP3 phosphatase.
  PTEN is a peripheral membrane protein that binds PtdIns(4,5)P2 via an N-terminal
  basic motif; in chemotaxing cells it is enriched on the plasma membrane of the
  lateral sides and rear (uropod/trailing edge) and is depleted from the leading
  edge, showing a distribution reciprocal to PI3-kinase. By restricting PIP3 to the
  anterior, PTEN establishes and maintains front-rear polarity, suppresses lateral
  pseudopod formation, and enables efficient chemotaxis toward cAMP. It also
  localizes to the cleavage furrow and equatorial cortex during division, where it
  contributes to cortical myosin II accumulation and cytokinesis, and participates
  in chemorepulsion, bleb regulation, and density-dependent control of
  proliferation. Loss of PTEN elevates PIP3 and PKB/Akt (PkbA) substrate
  phosphorylation, causing broadened PIP3 responses, excess pseudopods, impaired
  chemotaxis, multinucleation, and aggregation defects.
