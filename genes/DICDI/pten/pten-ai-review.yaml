- id: PMID:12062103
  title: Tumor suppressor PTEN mediates sensing of chemoattractant gradients.
  findings:
  - statement: PTEN-GFP localizes to the plasma membrane at the rear of the cell,
      and membrane localization requires a PI(4,5)P2-binding motif and is required
      for chemotaxis.
    supporting_text: Membrane localization required a putative PI(4,5)P2 binding
      motif and was required for chemotaxis
  - statement: Loss of PTEN broadens and prolongs PIP3 (PH-domain) and actin
      polymerization responses, causing circuitous migration.
    supporting_text: causing the cells lacking PTEN to follow a circuitous route
      toward the attractant
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified primary study establishing PTEN rear-membrane
      localization and its role in gradient sensing; abstract supports the cited
      claims.
- id: PMID:12062104
  title: Spatial and temporal regulation of 3-phosphoinositides by PI 3-kinase and
    PTEN mediates chemotaxis.
  findings:
  - statement: PTEN shows a pattern of localization reciprocal to PI3K, restricting
      PIP3 to the leading edge.
    supporting_text: PTEN, a negative regulator of PI3K pathways, exhibits a
      reciprocal pattern of localization
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; establishes reciprocal PI3K/PTEN localization
      during chemotaxis.
- id: PMID:14764604
  title: Novel mechanism of PTEN regulation by its phosphatidylinositol 4,5-bisphosphate
    binding motif is critical for chemotaxis.
  findings:
  - statement: The lipid phosphatase activity of PTEN mediates chemotaxis, and sharp
      PIP3 localization requires PTEN at the rear.
    supporting_text: the lipid phosphatase activity of PTEN mediates chemotaxis and
      that the sharp localization of PI(3,4,5)P3 requires localization of PTEN to
      the rear of the cell
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; the PI(4,5)P2-binding motif both localizes PTEN
      and regulates its activity. The GO:0034485 5-phosphatase annotation linked to
      this PMID conflicts with PTEN's 3-phosphatase mechanism and could not be
      verified from the abstract.
