  title: Chemoattractant signaling in dictyostelium discoideum.
  findings: []
- id: PMID:16900100
  title: Imaging of cell migration.
  findings: []
- id: PMID:17462897
  title: Chemotaxis in the absence of PIP3 gradients.
  findings:
  - statement: A PI3K1-5/PTEN sextuple mutant chemotaxes near normally but has a
      consistent defect in movement speed.
    supporting_text: There is, however, a consistent defect in movement speed in
      chemotaxis and especially in random movement
- id: PMID:17517960
  title: Chemoattractants and chemorepellents act by inducing opposite polarity in
    phospholipase C and PI3-kinase signaling.
  findings:
  - statement: In chemorepellent gradients the localization of PI3K and PTEN is
      reversed relative to chemoattractant gradients.
    supporting_text: In 8CPT-cAMP gradients, the localization of PI3K and PTEN is
      reversed compared with cAMP gradients
- id: PMID:17606871
  title: Locally controlled inhibitory mechanisms are involved in eukaryotic GPCR-mediated
    chemosensing.
  findings:
  - statement: PTEN redistribution tracks receptor/G-protein activation and returns
      to baseline upon stimulus withdrawal.
    supporting_text: the return of the PIP3 phosphatase PTEN and PHCrac-GFP to their
      pre-stimulus distribution
- id: PMID:17623773
  title: PTEN plays a role in the suppression of lateral pseudopod formation during
    Dictyostelium motility and chemotaxis.
  findings:
  - statement: PTEN is constitutively localized in the cortex of polarized cells.
    supporting_text: PTEN, which is constitutively localized in the cortex of
      polarized cells
  - statement: PTEN plays a fundamental role in suppressing lateral pseudopod
      formation, but not in directional sensing.
    supporting_text: PTEN, therefore, plays a fundamental role in the suppression of
      lateral pseudopod formation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; defines PTEN's core role in suppressing lateral
      pseudopods.
- id: PMID:19011688
  title: Ordered patterns of cell shape and orientational correlation during spontaneous
    cell migration.
  findings:
  - statement: PTEN is localized at the rear of spontaneously migrating cells and
      restricts excess pseudopod formation.
    supporting_text: phosphatase and tensin homolog, (PTEN), is simultaneously
      localized at the rear
- id: PMID:19515202
  title: PTEN is a mechanosensing signal transducer for myosin II localization in
    Dictyostelium cells.
  findings:
  - statement: PTEN co-localizes with myosin II at the posterior of migrating cells
      and the furrow of dividing cells.
    supporting_text: PTEN and myosin II co-localized at the posterior of migrating
      cells and furrow region of dividing cells
  - statement: pten- cells become multinucleated with reduced furrow myosin II,
      indicating a cytokinesis role.
    supporting_text: PTEN knockout (pten(-)) cells became multinucleated, and myosin
      II significantly decreased in amount at the furrow
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; links PTEN to posterior/furrow localization,
      myosin II recruitment, and cytokinesis.
- id: PMID:20562345
  title: Self-organization of the phosphatidylinositol lipids signaling system for
    random cell migration.
  findings:
  - statement: PTEN and PI3K are essential regulators of membrane PtdIns lipid
      concentrations and are required for self-organized PIP3 waves.
    supporting_text: regulators for PtdIns lipid concentrations along the membrane,
      were essential for wave generation
- id: PMID:21169559
  title: Disruption of PKB signaling restores polarity to cells lacking tumor suppressor
    PTEN.
  findings:
  - statement: PTEN maintains cell polarity required for cytokinesis and chemotaxis
      by limiting PIP3 levels.
    supporting_text: tumor suppressor PTEN not only controls cell growth but also
      maintains cell polarity required for cytokinesis and chemotaxis
  - statement: Polarity defects in pten- cells correlate with elevated PKB substrate
      phosphorylation.
    supporting_text: The polarity defects in pten- cells correlate with elevated
      phosphorylations of PKB substrates
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; demonstrates that PTEN's effects on polarity,
      cytokinesis and chemotaxis are mediated through PKB (PkbA) substrate
      phosphorylation.
- id: PMID:23132928
  title: Delineating the core regulatory elements crucial for directed cell migration
    by examining folic-acid-mediated responses.
  findings:
  - statement: PTEN redistributes to the cytosol upon uniform stimulation and is
      distributed on the lateral and trailing edge of the membrane during migration.
    supporting_text: redistribution of PTEN to the cytosol
- id: PMID:25247494
  title: 'PTEN redundancy: overexpressing lpten, a homolog of Dictyostelium discoideum
    ptenA, the ortholog of human PTEN, rescues all behavioral defects of the mutant
    ptenA-.'
  findings:
  - statement: Deletion of ptenA causes defects in motility, chemotaxis, aggregation
      and multicellular morphogenesis, all rescued by overexpressing lpten.
    supporting_text: Deletion of ptenA results in defects in motility, chemotaxis,
      aggregation and multicellular morphogenesis
- id: PMID:26317626
  title: Microtubule-Mediated Inositol Lipid Signaling Plays Critical Roles in Regulation
    of Blebbing.
  findings:
  - statement: PTEN-null cells extend fewer blebs, implicating PTEN in bleb
      regulation via inositol lipid metabolism.
    supporting_text: PTEN-null cells extended fewer blebs
- id: PMID:30462573
  title: An endogenous chemorepellent directs cell movement by inhibiting pseudopods
    at one side of cells.
  findings:
  - statement: In cAMP chemoattraction, PTEN localizes myosin II to the rear of the
      cell.
    supporting_text: PTEN to localize myosin II to the rear of a cell
- id: PMID:32111929
  title: Single-molecule imaging of PI(4,5)P(2) and PTEN in vitro reveals a positive
    feedback mechanism for PTEN membrane binding.
  findings:
  - statement: PTEN's product PI(4,5)P2 stabilizes PTEN membrane binding, creating a
      positive-feedback loop for posterior accumulation.
    supporting_text: the enzymatic product, PI(4,5)P2, stabilizes PTEN's
      membrane-binding
  - statement: PTEN accumulates posteriorly to restrict PIP3 to the anterior,
      enabling efficient migration.
    supporting_text: accumulating PTEN posteriorly to restrict PI(3,4,5)P3
      distribution to the anterior
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; in vitro and in vivo single-molecule evidence for
      PI(4,5)P2-dependent stabilization of PTEN at the rear membrane.
- id: PMID:34154396
  title: An Autocrine Negative Feedback Loop Inhibits Dictyostelium discoideum Proliferation
    through Pathways Including IP3/Ca(2).
  findings:
  - statement: PTEN is required for polyphosphate-induced proliferation inhibition
      and IP3 upregulation.
    supporting_text: Polyphosphate upregulates IP3, and this requires GrlD, GefA,
      PTEN, PLC, and PiaA
- id: PMID:35186938
  title: Gradients of PI(4,5)P(2) and PI(3,5)P(2) Jointly Participate in Shaping the
    Back State of Dictyostelium Cells.
  findings:
  - statement: PTEN preferentially binds liposomes containing PI(4,5)P2 and PI(3,5)P2
      in vitro, consistent with a back (rear) targeting property.
    supporting_text: Pten preferentially bound to liposomes containing PI(4,5)P2 and
      PI(3,5)P2
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified; in vitro liposome binding supports PTEN PI(3,5)P2
      and PI(4,5)P2 binding, though the paper's main focus is the novel back protein
      Teep1.
- id: PMID:38940195
  title: PTEN and the PTEN-like phosphatase CnrN have both distinct and overlapping
    roles in a Dictyostelium chemorepulsion pathway.
  findings:
  - statement: Cells require both PTEN and CnrN to induce chemorepulsion away from
      the secreted chemorepellent AprA and to locally inhibit Ras activation.
    supporting_text: require both PTEN and CnrN to locally inhibit Ras activation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; PTEN and the PTEN-like phosphatase CnrN have
      distinct and overlapping roles in AprA chemorepulsion.
core_functions:
- description: PTEN is a phosphatidylinositol-3,4,5-trisphosphate (PIP3) 3-phosphatase
    that dephosphorylates the D3 position of PIP3 to regenerate PtdIns(4,5)P2,
    directly antagonizing PI3-kinase. Enriched at the rear/lateral plasma membrane
    and cortex, it restricts PIP3 to the leading edge, thereby negatively regulating
    PI3K/PKB (PkbA) signaling and establishing front-rear polarity for suppression
    of lateral pseudopods and directed chemotaxis toward cAMP.
