- term:
    id: GO:0051726
    label: regulation of cell cycle
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: This IBA transfer from the PTEN/tensin family reflects the mammalian
      tumor-suppressor role in cell-cycle control. In Dictyostelium the documented
      cell-division phenotype is a cytokinesis (multinucleation) defect, not
      regulation of cell-cycle progression per se.
    action: MARK_AS_OVER_ANNOTATED
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - FUNCTIONAL_DIVERGENCE
      source_entities:
      - source_id: PANTHER:PTN000959472
        source_label: "PANTHER node for the PTEN/tensin phosphatase family"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Cell-cycle regulation reflects the mammalian tumor-suppressor role of PTEN; Dictyostelium PTEN acts as a PIP3 phosphatase in chemotaxis with no evidence of cell-cycle control"
      - source_id: UniProtKB:P60484
        source_label: "human PTEN"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Mammalian PTEN regulates the cell cycle as a tumor suppressor; this role has diverged and is unsupported in Dictyostelium"
    reason: There is no direct evidence that Dictyostelium PTEN regulates cell-cycle
      progression; the observed division phenotype is failed cytokinesis, which is
      captured more precisely by GO:0000281 mitotic cytokinesis. The general
      cell-cycle term is an over-propagation from mammalian orthologs.
    supported_by:
    - reference_id: PMID:19515202
      supporting_text: PTEN knockout (pten(-)) cells became multinucleated, and
        myosin II significantly decreased in amount at the furrow
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Nuclear localization is inferred phylogenetically from mammalian PTEN,
      which has documented nuclear tumor-suppressor functions. Dictyostelium PTEN is
      consistently reported as a peripheral plasma-membrane, cortical and cytosolic
      protein, with no evidence of nuclear localization or function.
    action: REMOVE
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - COMPARTMENT_OR_COMPLEX_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN000959472
        source_label: "PANTHER node for the PTEN/tensin phosphatase family"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Nuclear localization derives from mammalian PTEN; all experimental Dictyostelium PTEN localization is plasma-membrane and cytosolic"
      - source_id: UniProtKB:P60484
        source_label: "human PTEN"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Mammalian PTEN has a documented nuclear pool; Dictyostelium PTEN does not localize to the nucleus"
    reason: This is an IBA over-propagation. All experimental localization data for
      Dictyostelium PTEN place it at the plasma membrane (rear/lateral),
      cortex/furrow, and cytosol; none support nuclear localization. The nuclear
      role is a mammal-specific attribute that does not transfer to this ortholog.
    supported_by:
    - reference_id: PMID:12062103
