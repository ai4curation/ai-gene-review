core_functions:
- description: RasG is a plasma-membrane-anchored Ras small GTPase that acts as a
    nucleotide-dependent molecular switch. Upon chemoattractant (folate/cAMP)
    stimulation it is rapidly and transiently loaded with GTP at the cell cortex and
    leading edge, where active RasG transduces the signal to downstream effectors;
    its intrinsic GTPase activity (accelerated by RasGAPs such as IqgC, C2GAP1,
    Leep2 and NF1) resets the switch.
  molecular_function:
    id: GO:0003925
    label: G protein activity
  locations:
  - id: GO:0005886
    label: plasma membrane
  - id: GO:0031252
    label: cell leading edge
  - id: GO:0009898
    label: cytoplasmic side of plasma membrane
  directly_involved_in:
  - id: GO:0007264
    label: small GTPase-mediated signal transduction
  supported_by:
  - reference_id: PMID:15534002
    supporting_text: Ras is rapidly and transiently activated in response to
      chemoattractant stimulation and regulates PI3K activity
  - reference_id: PMID:15143344
    supporting_text: the Ras-binding domain (RBD) of mammalian Raf1 was capable of
      binding to the activated form of RasG
- description: Active GTP-RasG binds and activates class I phosphatidylinositol
    3-kinase (PI3K1/2, PI3K4), generating a localized PIP3 patch at the leading
    edge/cortex that drives F-actin-based pseudopod formation, directional sensing
    and PKB(Akt) activation. This RasG-PI3K axis underlies chemotaxis (to folate and
    cAMP), random motility, cell polarity and macropinocytosis.
  molecular_function:
    id: GO:0035014
    label: phosphatidylinositol 3-kinase regulator activity
  locations:
  - id: GO:0031252
    label: cell leading edge
  - id: GO:0044354
    label: macropinosome
  directly_involved_in:
  - id: GO:0051897
    label: positive regulation of phosphatidylinositol 3-kinase/protein kinase B signal
      transduction
  supported_by:
  - reference_id: PMID:23132928
    supporting_text: Ras and phosphoinositide 3-kinase activity were significantly
      decreased in Ras G and Ras C/G nulls
  - reference_id: PMID:15534002
    supporting_text: chemoattractant-induced Akt/PKB activation was decreased in
      rasG null cells
- description: RasG directly engages effectors that couple its activation to actin
    remodeling and bulk endocytosis, most prominently binding class I PI3-kinases and
    directly regulating the Diaphanous-related formin ForG at endocytic cups. Through
    these effectors RasG is a principal driver of macropinocytosis and phagocytosis
    and of the actin reorganization required for cytokinesis and cell motility.
  molecular_function:
    id: GO:0043548
    label: phosphatidylinositol 3-kinase binding
  locations:
  - id: GO:0044354
    label: macropinosome
  - id: GO:0001891
    label: phagocytic cup
  directly_involved_in:
  - id: GO:0044351
    label: macropinocytosis
  supported_by:
  - reference_id: PMID:23843627
    supporting_text: RasG and RasS interact most strongly with PI3K1/2 and PI3K4
  - reference_id: PMID:27821733
    supporting_text: ForG is directly regulated in large-scale endocytosis by RasB
      and RasG, which are highly related to the human proto-oncogene KRas
