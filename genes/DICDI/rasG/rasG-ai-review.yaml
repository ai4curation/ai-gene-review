id: P15064
gene_symbol: rasG
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: RasG (DdrasG) is the most abundant Ras subfamily small GTPase in
  growing Dictyostelium discoideum and the closest amoebozoan relative of
  mammalian K-Ras. Like other Ras proteins it is a C-terminally prenylated,
  plasma-membrane-anchored molecular switch that cycles between an inactive
  GDP-bound and an active GTP-bound state, controlled by guanine-nucleotide
  exchange factors (RasGEFs such as GefR/Aimless) and GTPase-activating proteins
  (RasGAPs such as NF1, IqgC, C2GAP1 and the Leep2 complex). Upon chemoattractant
  (folate or cAMP) stimulation, RasG is rapidly and transiently activated at the
  leading edge and cell cortex, where GTP-loaded RasG binds and activates class I
  phosphatidylinositol 3-kinase to generate PIP3, driving F-actin-based pseudopod
  formation, directional sensing and cell motility. RasG is a principal regulator
  of chemotaxis, random motility and cell polarity, cytokinesis, macropinocytosis
  and phagocytosis, engaging effectors including PI3K, the Diaphanous-related
  formin ForG, the NDR/LATS kinase NdrC, TORC2, the Ras-interacting protein
  RIP3/RipA and the MRL-family adaptor DydA. Its functions overlap partly with the
  paralogs RasC (more specialized for cAMP relay and adenylyl cyclase activation)
  and RasD (which can substitute for RasG in cytokinesis).
