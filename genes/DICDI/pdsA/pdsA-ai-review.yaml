id: P12019
gene_symbol: pdsA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: pdsA (PdsA, DdPDE1, PDE1) is the major extracellular and cell-surface
  cyclic nucleotide phosphodiesterase of Dictyostelium discoideum. It is a secreted
  glycoprotein of the class II cyclic nucleotide phosphodiesterase family that is
  synthesized with a cleaved signal peptide and can either be released into the medium
  or remain attached to the cell surface. The enzyme hydrolyzes extracellular 3',5'-cyclic
  AMP to 5'-AMP with a preference for cAMP over cGMP, but has dual specificity and
  also hydrolyzes 3',5'-cyclic GMP. By degrading the extracellular cAMP chemoattractant,
  PdsA sharpens the spatial cAMP gradient and terminates and resets the propagating
  cAMP waves that guide chemotaxis and streaming during starvation-induced aggregation;
  cells lacking PdsA fail to aggregate. Its activity is negatively modulated by a
  secreted heat-stable glycoprotein inhibitor (PdiA), and this inhibition is relieved
  by reducing agents such as dithiothreitol. PdsA expression is developmentally
  controlled through multiple promoters, including a prestalk-specific promoter whose
  activity is required for later morphogenesis (slug formation and culmination).
existing_annotations:
- term:
    id: GO:0110034
    label: negative regulation of adenylate cyclase-activating glucose-activated G
      protein-coupled receptor signaling pathway
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) inference to a glucose-activated G-protein-coupled
      receptor signaling term. Dictyostelium PdsA modulates cAMP-receptor (cAR) GPCR
      signaling by degrading extracellular cAMP, not a glucose-sensing GPCR pathway.
      The glucose-activated context does not apply to this organism or gene.
    action: REMOVE
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - CONTEXT_OR_TISSUE_MISMATCH
      source_entities:
      - source_id: PANTHER:PTN002001416
        source_label: "PANTHER node for cyclic-nucleotide phosphodiesterases"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "The negative-regulation term traces to a fungal glucose-sensing cAMP-GPCR pathway that does not correspond to PdsA's role in extracellular cAMP turnover"
      - source_id: PomBase:SPCC285.09c
        source_label: "S. pombe glucose-sensing cAMP phosphodiesterase"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Source enzyme acts in a yeast glucose and cAMP-sensing context absent in Dictyostelium"
    reason: This is an over-propagated phylogenetic inference to a glucose-sensing
      GPCR signaling branch that is not relevant to Dictyostelium. PdsA has no known
      role in glucose-activated receptor signaling; its genuine signaling role is
      the extracellular degradation of the cAMP chemoattractant that terminates cAR
      GPCR signaling. That role is better captured by the extracellular regulation
      of signal transduction annotation.
    supported_by:
    - reference_id: PMID:17040207
      supporting_text: DdPDE1 is the main PDE that degrades extracellular cAMP during
        cell aggregation and is thereby essential for shaping cAMP waves
- term:
    id: GO:0141162
    label: negative regulation of cAMP/PKA signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: IBA inference of negative regulation of cAMP/PKA signaling. PdsA acts
      on the extracellular cAMP pool that stimulates cell-surface cAMP receptors,
      not directly on the intracellular cAMP/PKA axis (which in Dictyostelium is
      controlled by the intracellular PDE RegA/DdPDE2). The effect on PKA signaling
      is therefore indirect.
    action: MARK_AS_OVER_ANNOTATED
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
      - ROLE_CONFLATION
      source_entities:
      - source_id: PANTHER:PTN002001416
        source_label: "PANTHER node for cyclic-nucleotide phosphodiesterases"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "PdsA degrades extracellular cAMP acting on cAR GPCRs; casting it as a negative regulator of cAMP/PKA signaling conflates an enzymatic effector with a pathway regulator"
      - source_id: CGD:CAL0000177603
        source_label: "Candida albicans phosphodiesterase ortholog"
        source_status: SUPPORTS_SOURCE_BUT_NOT_TARGET
        comment: "Source PDE participates in cAMP/PKA regulation in fungi; the indirect regulatory framing over-reaches for PdsA"
    reason: PdsA degrades extracellular cAMP that activates cAR GPCRs; it does not
      degrade the intracellular cAMP that drives PKA. Attributing negative regulation
      of cAMP/PKA signal transduction to PdsA over-states its role by conflating the
      extracellular and intracellular cAMP pools, which are handled by distinct
      phosphodiesterases in this organism.
    supported_by:
    - reference_id: PMID:17040207
      supporting_text: The enzyme can be secreted in the medium, or exposed on the
        cell surface.
