      that the intracellular pool is ER rather than plasma membrane; however a
      positive plasma-membrane annotation (PMID:9168471) for the cell-surface form
      stands, so the blanket NOT-plasma-membrane call remains genuinely unresolved
      (distinct pools) rather than being accepted or removed outright.
