core_functions:
- description: Secreted and cell-surface class II cyclic nucleotide phosphodiesterase
    that hydrolyzes extracellular 3',5'-cyclic AMP to 5'-AMP. By degrading the
    extracellular cAMP chemoattractant, PdsA shapes and resets the propagating cAMP
    waves that drive chemotactic streaming and aggregation during starvation-induced
    development.
