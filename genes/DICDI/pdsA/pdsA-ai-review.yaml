- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:19477920
  qualifier: located_in
  negated: true
  review:
    summary: A negated (NOT) plasma membrane annotation from Garcia et al. 2009.
      The cached full text localizes the intracellular pool of PdsA to the ER
      (consistent with a non-plasma-membrane intracellular form), but another IDA
      annotation (PMID:9168471) positively places the cell-surface PDE in plasma
