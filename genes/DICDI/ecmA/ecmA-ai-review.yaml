- id: PMID:23516620
  title: The green tea catechin epigallocatechin gallate (EGCG) blocks cell motility,
    chemotaxis and development in Dictyostelium discoideum.
  findings:
  - statement: EGCG treatment abolishes expression of the prestalk marker ecmA (and
      prespore pspA), reflecting a block of Dictyostelium differentiation rather than
      a specific catechin-response function of EcmA.
    supporting_text: we detected almost no expression of prespore specific pspA and
      prestalk specific ecmA genes in EGCG treated cells at 10 to 12 h into starvation
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: Citation verified against cached full text; supports that ecmA expression
      is suppressed under EGCG-induced developmental arrest. Does not establish a
      dedicated EcmA role in catechin response, hence the over-annotation call.
