- term:
    id: GO:0009642
    label: response to light intensity
  evidence_type: HEP
  original_reference_id: PMID:41057014
  qualifier: acts_upstream_of_or_within
  review:
    summary: High-throughput expression (HEP) annotation reflecting that ecmA transcript
      levels increase upon light exposure during the unicellular-to-multicellular transition.
      This captures the transcriptional responsiveness of the prestalk marker to light,
      not a mechanistic role for the EcmA protein in phototransduction.
    action: KEEP_AS_NON_CORE
    reason: The annotation is based on ecmA being upregulated by light, i.e. it is a
      downstream transcriptional readout of prestalk differentiation, which is known
      to be light-sensitive. EcmA is a structural ECM protein and does not itself mediate
      the light response, so this is retained as a non-core, expression-based association.
    supported_by:
    - reference_id: PMID:41057014
      supporting_text: Our findings revealed that both of ecmA and ecmB genes are upregulated
        when exposed to light
- term:
    id: GO:0099120
    label: socially cooperative development
  evidence_type: IDA
  original_reference_id: PMID:38561423
  qualifier: involved_in
  review:
    summary: Direct assay annotation from a study of prestalk-like cell positioning
      during Dictyostelium development, in which ecmA (as an ecmAO reporter) was used
      as the prestalk cell-type marker and its expression tracked differentiation and
      de-differentiation. The annotation places EcmA within the cooperative developmental
      program.
    action: KEEP_AS_NON_CORE
    reason: Per curation policy this experimental (IDA) annotation is retained. However,
      EcmA participates in cooperative development as a downstream, prestalk-restricted
      structural ECM constituent and differentiation marker, so the very general process
      term is best marked non-core rather than as the protein's core function.
    supported_by:
    - reference_id: PMID:38561423
      supporting_text: Refed (RF) cells harbored prespore (pspA-GFP, green) and prestalk
        (ecmAO-RFP, magenta) markers.
