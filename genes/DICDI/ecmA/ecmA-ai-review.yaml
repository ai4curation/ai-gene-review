  title: Leaps and lulls in the developmental transcriptome of Dictyostelium discoideum.
  findings:
  - statement: ecmA is a prestalk gene strongly upregulated during late development
      (16-18 h), coincident with culmination and fruiting-body formation.
    supporting_text: Expression of the prestalk genes ecmA, ecmB and ecmF ([19,36],
      could be detected as early as 12 h, but were up-regulated more dramatically
      between 16 h and 18 h
