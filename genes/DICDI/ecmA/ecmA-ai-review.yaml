id: Q54YG2
gene_symbol: ecmA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: EcmA (also known as ST430 or Dd63) is a large, secreted, cysteine-rich
  extracellular matrix glycoprotein of the social amoeba Dictyostelium discoideum.
  The mature protein is dominated by dozens of tandem Cys-rich repeats
  (the Dictyostelium "CT"/Dicty_CTDC repeat) and carries a cleaved N-terminal signal
  peptide and numerous N-glycosylation sites, consistent with secretion into the
  extracellular space. EcmA is deposited as a structural constituent of the developmental
  extracellular matrix, contributing to the slime sheath that surrounds the migrating
  slug (pseudoplasmodium) and to the cellulose-rich stalk-tube matrix formed during
  culmination. Its expression is essentially confined to prestalk cells, chiefly the
  anterior-most prestalk zone, and is induced by the chlorinated stalk morphogen DIF-1
  (differentiation-inducing factor). Because of this tightly regulated, cell-type-restricted
  expression, ecmA is a classic molecular marker for prestalk cell differentiation and
  is widely used (often as an ecmA/ecmAO promoter reporter) to follow prestalk fate,
  cell sorting, and morphogenesis in the Dictyostelium developmental cycle.
