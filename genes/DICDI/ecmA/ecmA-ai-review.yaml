- term:
    id: GO:1902168
    label: response to catechin
  evidence_type: IDA
  original_reference_id: PMID:23516620
  qualifier: involved_in
  review:
    summary: Annotation derived from a study showing that the green-tea catechin EGCG
      blocks Dictyostelium development, with near-complete loss of prestalk-specific
      ecmA (and prespore pspA) expression in treated cells. This reflects that ecmA
      expression is suppressed when development is blocked by catechin, not that EcmA
      has a dedicated function in a catechin-response pathway.
    action: MARK_AS_OVER_ANNOTATED
    reason: The evidence is that ecmA transcription is downregulated as a nonspecific
      consequence of EGCG-induced developmental arrest (a general differentiation-marker
      readout), not that EcmA functions in "response to catechin." Treating this as a
      biological function of the protein over-interprets a downstream transcriptional
      effect.
    supported_by:
    - reference_id: PMID:23516620
      supporting_text: we detected almost no expression of prespore specific pspA and
        prestalk specific ecmA genes in EGCG treated cells at 10 to 12 h into starvation
