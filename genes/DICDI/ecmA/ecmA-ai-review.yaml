core_functions:
- description: EcmA is a secreted, cysteine-rich repeat glycoprotein that acts as a
    structural constituent of the Dictyostelium developmental extracellular matrix.
    Deposited by prestalk cells into the slime sheath surrounding the slug and into
    the stalk-tube matrix during culmination, it contributes to the mechanical integrity
    and organization of the ECM that supports multicellular morphogenesis.
