- term:
    id: GO:0099120
    label: socially cooperative development
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic inference that EcmA participates in the multicellular (social)
      developmental program. EcmA is indeed a prestalk-expressed ECM protein deposited
      during slug and fruiting-body morphogenesis, so involvement in cooperative development
      is reasonable, but this is a very general process term that does not capture the
      protein's specific structural role.
    action: KEEP_AS_NON_CORE
    reason: EcmA contributes to development only as a downstream structural ECM constituent
      of prestalk-derived matrix; the broad "socially cooperative development" term is
      correct in spirit but too general to represent the core molecular function.
    supported_by:
    - reference_id: PMID:41057014
      supporting_text: During multicellular development, the ecmA and ecmB genes encode
        extracellular matrix proteins, which are mainly expressed in the most anterior
        prestalk cells of slugs and can regulate the morphogenesis of Dictyostelium
