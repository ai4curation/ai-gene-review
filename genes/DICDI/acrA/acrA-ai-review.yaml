id: Q55F68
gene_symbol: acrA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:44689
  label: Dictyostelium discoideum
description: acrA encodes ACR (also called ACB), the terminal-differentiation
  specific adenylate cyclase of Dictyostelium discoideum. It is a large (2123
  aa) multidomain, multi-pass membrane protein comprising seven transmembrane
  helices, a degenerate histidine kinase region (HisKA plus HATPase-C domains),
  two receiver (response regulator) domains, and a C-terminal class III
  nucleotidyl cyclase catalytic domain that converts ATP to 3',5'-cyclic AMP
  (EC 4.6.1.1), using Mg2+ as cofactor and acting as a homodimer. ACR is
  expressed at low levels in growing cells and strongly induced during
  development, peaking during culmination and in prestalk regions of the
  fruiting body. Unlike the receptor-coupled aggregation adenylate cyclase ACA
  and the osmosensing spore-dormancy adenylate cyclase ACG, ACR provides the
  intracellular cAMP that activates cAMP-dependent protein kinase (PKA) at
  culmination, and is required for spore encapsulation/maturation and for
  formation of robust (non-thin) stalks. Rather than functioning as a
  phosphorelay signaling enzyme, its histidine-kinase-like and receiver domains
  have lost their canonical two-component signaling roles; the dimerizing HisKA
  subdomain instead serves to promote dimerization of the cyclase domain.
  Contrary to the plasma-membrane location of ACA, ACR localizes to the
  endoplasmic reticulum and nuclear envelope. It acts downstream of the
  cytokinin (discadenine) / DhkB signaling pathway that triggers rapid spore
  encapsulation.
