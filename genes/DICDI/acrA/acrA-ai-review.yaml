- term:
    id: GO:0000160
    label: phosphorelay signal transduction system
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This InterPro2GO annotation is inferred from the receiver
      (response-regulator) domain (IPR001789). However, functional dissection of
      ACR showed that its histidine kinase and receiver domains do NOT act as a
      phosphorelay to regulate the enzyme; the phosphoryl-accepting aspartates
      are largely dispensable and the domains have lost the switch-pair residues
      needed for phosphorylation-induced signaling.
    action: REMOVE
    reason: The receiver/histidine-kinase domains are present by ancestry but
      their canonical phosphorelay function has eroded. Experimental evidence
      directly contradicts a role for ACR in phosphorelay signal transduction,
      so this domain-based electronic annotation is an over-annotation.
    supported_by:
    - reference_id: PMID:20966074
      supporting_text: indicating that AC activity is not critically regulated
        by phosphorelay
    - reference_id: PMID:20966074
      supporting_text: This indicates that ACR is not regulated by its
        intramolecular histidine kinase activity
