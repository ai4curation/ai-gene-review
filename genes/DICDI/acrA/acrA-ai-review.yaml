core_functions:
- description: ACR is the terminal-differentiation-specific adenylate cyclase
    that synthesizes cAMP (from ATP, EC 4.6.1.1) at the endoplasmic reticulum and
    nuclear envelope during culmination. The cAMP it produces activates PKA to
    drive spore encapsulation/maturation and proper stalk formation. Catalysis
    requires homodimerization mediated by the degenerate histidine-kinase (HisKA)
    domain rather than any phosphorelay or kinase activity.
