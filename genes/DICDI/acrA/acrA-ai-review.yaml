- term:
    id: GO:0016772
    label: transferase activity, transferring phosphorus-containing groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: This InterPro2GO annotation derives from the histidine-kinase-like
      C-terminal (HATPase) domain (IPR004358), implying phosphotransferase
      activity. But ACR is a lyase (adenylate cyclase, EC 4.6.1.1), and its
      histidine kinase domain is degenerate and catalytically non-functional,
      lacking the phospho-accepting histidine, and mutation of essential
      ATP-binding residues has no effect on activity.
    action: REMOVE
    reason: ACR has no demonstrated phosphotransferase/kinase activity; the
      histidine-kinase-like domain is a pseudokinase used only for
      dimerization. Assigning transferase activity from this degenerate domain
      is a domain-based over-annotation contradicted by experimental evidence.
    supported_by:
    - reference_id: PMID:20966074
      supporting_text: Mutation of three essential ATP-binding residues in the
        histidine kinase domain did not affect the AC activity or phenotypic
        rescue
    - reference_id: PMID:20966074
      supporting_text: the dimerizing histidine phosphoacceptor subdomain, which
        in ACR lacks the canonical histidine for autophosphorylation, was
        essential for AC activity
