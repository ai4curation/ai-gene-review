      growth and induced more than 25-fold during development.
    supporting_text: we discovered a novel adenylyl cyclase gene, acrA, that is
      expressed at low levels in growing cells and at more than 25-fold higher
      levels during development
  - statement: acrA null cells develop normally to the slug stage but fail to make
      viable spores and produce unnaturally long stalks.
    supporting_text: Growth and development up to the slug stage are unaffected in
      acrA(-) mutant strains but the cells make almost no viable spores and produce
      unnaturally long stalks
  - statement: ACR is dispensable until culmination when it is critical for
      sporulation and stalk construction.
    supporting_text: As long as ACA is fully active, ACR is not required until
      culmination but then plays a critical role in sporulation and construction
      of the stalk
