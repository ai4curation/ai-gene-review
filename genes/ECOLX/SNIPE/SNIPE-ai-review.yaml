id: A0A8T9CRB7
gene_symbol: SNIPE
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:562
  label: Escherichia coli
description: >-
  SNIPE (Surface-associated Nuclease Inhibiting Phage Entry) is a 500 amino acid inner membrane-bound
  GIY-YIG family DNA endonuclease that provides direct anti-bacteriophage defence in Escherichia coli.
  SNIPE constitutively localizes to the inner membrane via an N-terminal single-pass transmembrane helix
  (aa 5-24) and pre-associates with the ManYZ mannose permease complex before phage infection. During
  phage genome injection, the central DUF4041 domain (aa 144-262, now designated the SNIPE-associated
  domain, IPR025280) binds both incoming phage DNA and the phage tape measure protein (TMP), positioning
  the C-terminal GIY-YIG nuclease domain (aa 357-450, catalytic residue E414) to cleave phage DNA as it
  crosses the inner membrane. This provides direct defence — the infected cell survives — in contrast
  to abortive infection systems. SNIPE does not affect phage adsorption, does not target pre-existing
  intracellular phage genomes (lysogens), and does not block plasmid transformation, indicating its
  activity is specific to the phage genome injection process. Originally identified as PD-lambda-1 in
  a functional screen of 71 diverse E. coli pangenomes (PMID:36123438), SNIPE homologues (~500 curated)
  are found across many bacterial phyla, with 33% of well-sequenced clades harbouring at least one
  homologue. The N-terminal region is highly variable and functions as a phage-specificity adapter, with
  59% of homologues having one TM domain, 7% having two, and 34% using alternative membrane-targeting
  strategies (DivIVA domains, type III secretion domains, PH domains). SNIPE represents a previously
  unknown self/non-self discrimination strategy based on subcellular localization rather than sequence
  recognition (CRISPR-Cas) or modification detection (restriction-modification).

  Note: UniProt entry A0A8T9CRB7 is from E. coli strain T0181B.E-10. The experimentally characterized
  SNIPE was from strain MOD1-ECOR26 (GenBank RCP76574.1, locus APT27_20780). Both share RefSeq
  WP_001606968.1. SNIPE is not present in E. coli K-12 MG1655.

tags:
  - anti-phage defence
  - nuclease
  - membrane protein
  - innate immunity
  - phage-host interaction

