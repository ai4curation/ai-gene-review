suggested_questions:
- question: >-
    Does the in vitro preference for the 4' vs 1' phosphate of lipid A matter for the level of colistin
    resistance conferred in clinical isolates?
suggested_experiments:
- description: >-
    Reconstitute purified MCR-1 with lipid A and phosphatidylethanolamine and measure steady-state
    kinetics and zinc dependence; compare allelic variants (e.g. MCR-1 vs MCR-3/MCR-8) for catalytic
    efficiency and resistance level.
