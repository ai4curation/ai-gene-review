- id: file:ECOLX/mcr-1/mcr-1-hypotheses/function-hypothesis-go-0016776/openscientist.md
  title: Blinded OpenScientist function-assignment report (TreeGrafter audit)
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Blinded run independently refuted the term: MCR-1 is phosphoethanolamine transferase (EC 2.7.8.43), so the correct parent MF is GO:0016780 (EC 2.7.8.*), not the sibling GO:0016776 (EC 2.7.4.*); error traced to a TAS annotation on EptA at the PTHR30443:SF0 node. Consistent with the curated replacement GO:0043838. Blinded OpenScientist function-assignment run: given only the propagated term (the prior curation action withheld), it independently reached the same conclusion as this review. Corroborating evidence, not a primary source.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: >-
      MCR-1 is an integral inner-membrane (bacterial plasma membrane) protein, with a five-helix
      transmembrane domain anchoring a periplasmic catalytic domain. UniProt records the subcellular
      location as cell inner membrane.
    action: ACCEPT
    reason: >-
      Correct and specific cellular location; consistent with the experimental localization
      (PMID:27655155) and the UniProt 'Cell inner membrane' annotation.
- term:
    id: GO:0009244
    label: lipopolysaccharide core region biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      This electronic (TreeGrafter/PANTHER) annotation is imprecise. MCR-1 modifies lipid A by adding
      phosphoethanolamine to its 4'/1' phosphate; it does not synthesise the LPS core oligosaccharide
      region. The relevant biological process is lipid A modification in the context of antibiotic
      resistance, not core-region biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Mechanistically inaccurate over-propagation: a lipid A phosphoethanolamine transferase is binned
      under 'LPS core region biosynthetic process'. The accurate process is captured by the NEW
      'response to antibiotic' annotation below; the molecular event is lipid A modification, not core
      biosynthesis.
    supported_by:
    - reference_id: PMID:27655155
      supporting_text: "modification of the 1' and 4' phosphate groups of lipid A to neutralize the negative charge and reduce binding of the positively charged colistin"
