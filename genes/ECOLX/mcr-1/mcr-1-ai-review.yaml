core_functions:
- description: >-
    MCR-1 is a zinc-dependent phosphoethanolamine transferase that transfers phosphoethanolamine from
    phosphatidylethanolamine onto the 4'-phosphate of lipid A in the bacterial inner membrane. This
    target modification reduces the net negative charge of lipid A and lowers binding of cationic
    polymyxins, conferring colistin resistance.
