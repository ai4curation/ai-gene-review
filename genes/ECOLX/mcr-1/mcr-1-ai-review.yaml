    label: zinc ion binding
  evidence_type: IDA
  original_reference_id: PMID:27655155
  qualifier: enables
  review:
    summary: >-
      The MCR-1 catalytic domain binds zinc at a conserved active-site position; MCR-1 is a
      metal(zinc)-dependent transferase. UniProt carries the broader 'metal ion binding' keyword term.
