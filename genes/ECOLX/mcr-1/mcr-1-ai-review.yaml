- Phosphatidylethanolamine transferase Mcr-1
- Polymyxin resistance protein MCR-1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:562
  label: Escherichia coli
description: >-
  MCR-1 is the first plasmid-borne (transferable) determinant of colistin (polymyxin) resistance,
  reported from Enterobacteriaceae in China in 2015. It is a phosphoethanolamine (pEtN) transferase
  (EC 2.7.8.43) that transfers phosphoethanolamine from the head group of phosphatidylethanolamine
  onto the 4'- (and 1'-) phosphate of lipid A. This modification neutralises the negative charge of
  lipid A and reduces binding of the cationic polymyxins, conferring colistin resistance — a
  target-modification (not drug-inactivation) mechanism. MCR-1 is an integral inner-membrane protein
  with an N-terminal five-helix transmembrane domain that anchors a C-terminal periplasmic catalytic
  domain; the catalytic domain has the alkaline-phosphatase/sulfatase fold, binds zinc at the active
  site, and uses a threonine nucleophile (Thr285, which is phosphoethanolamine-modified during
  catalysis). Because colistin is a last-resort antibiotic for multidrug-resistant Gram-negative
  infections, the mobilisation of this chromosomal pEtN-transferase activity onto conjugative plasmids
  is of major clinical and public-health significance; mcr-1 and its many allelic variants have since
  disseminated worldwide.
references:
- id: PMID:26603172
  title: "Emergence of plasmid-mediated colistin resistance mechanism MCR-1 in animals and human beings in China: a microbiological and molecular biological study."
  findings:
  - statement: >-
      mcr-1 is the first plasmid-mediated, horizontally transferable colistin-resistance determinant;
      it confers polymyxin resistance and was found in E. coli from animals and humans.
    supporting_text: "Emergence of plasmid-mediated colistin resistance mechanism MCR-1 in animals and human beings in China"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Liu et al., Lancet Infect Dis 2016). The original discovery of MCR-1 as a
      transferable colistin-resistance gene; establishes gene identity and the resistance phenotype.
- id: PMID:27655155
  title: "Structure of the catalytic domain of the colistin resistance enzyme MCR-1."
  findings:
  - statement: >-
      MCR-1 is a phosphoethanolamine transferase that catalyses addition of phosphoethanolamine to
      lipid A; the periplasmic catalytic domain has an alkaline-phosphatase-like fold with active-site
      zinc, and Thr285 is the phosphoethanolamine-modified catalytic residue.
    supporting_text: "MCR-1 is a phosphoethanolamine transferase that catalyzes the addition of phosphoethanolamine to lipid A"
  - statement: >-
      Resistance arises from modification of the 1' and 4' phosphate groups of lipid A, neutralising
      the negative charge and reducing binding of cationic colistin.
    supporting_text: "modification of the 1' and 4' phosphate groups of lipid A to neutralize the negative charge and reduce binding of the positively charged colistin"
  - statement: >-
      A zinc is present at a conserved active-site position, consistent with a metal-dependent enzyme.
    supporting_text: "a zinc is present at a conserved site in addition to three zincs more peripherally located in the active site"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Stojanoski et al., BMC Biol 2016; PMC5025626, full text). 1.32 A structure of
      the MCR-1 catalytic domain; directly supports the pEtN-transferase MF, zinc/metal dependence,
      Thr285 nucleophile (phosphorylation), and the lipid A target-modification mechanism.
- id: PMID:29079699
  title: "Substrate analog interaction with MCR-1 offers insight into the rising threat of the plasmid-mediated transferable colistin resistance."
  findings:
  - statement: >-
      MCR-1 catalyses transfer of phosphoethanolamine to lipid A, the reaction underlying colistin
      resistance.
    supporting_text: "can catalyze the transfer of phosphoethanolamine (PEA) to lipid A, resulting in"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Wei et al., FASEB J 2018). Substrate-analog/structural study supporting
      the pEtN-transferase activity and reaction; corroborates EC 2.7.8.43.
