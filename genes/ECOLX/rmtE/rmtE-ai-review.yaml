description: rmtE encodes a 16S rRNA G1405 N7 methyltransferase in Escherichia coli. UniProt/CARD identify this entry as an acquired aminoglycoside-resistance methyltransferase; methylation of 16S rRNA protects the ribosomal A site from clinically important aminoglycosides. UniProt names the protein '16S rRNA (guanine(1405)-N(7))-methyltransferase' (accession A0A0M5JP06).
