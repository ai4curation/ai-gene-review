        and novel relative to GOA. The prediction is correct but low in added information
        relative to existing orthology-based knowledge; a fuller annotation would capture the
        ESRP1 identity and its mRNA-splicing-regulator molecular function. Caveat: the ISS
        assignment rests on orthology to human ESRP1 rather than direct experimental data for
        the elephant-shark protein.
