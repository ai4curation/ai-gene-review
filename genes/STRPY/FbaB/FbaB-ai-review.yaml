core_functions:
  - description: >-
      FbaB binds host fibronectin via its C-terminal fibronectin-binding repeats
      (shown by ELISA and ligand blotting with recombinant FbaB), the molecular basis
      of its adhesin function. As a fibronectin-bridging surface adhesin it promotes
      adhesion to and invasion of host epithelial cells; an FbaB-deficient mutant has
      ~6-fold lower HEp-2 adhesion/invasion and reduced virulence in mice. The CnaB2
      isopeptide-bond domain provides the mechanical stability inferred to be needed for
      this force-bearing host engagement.
