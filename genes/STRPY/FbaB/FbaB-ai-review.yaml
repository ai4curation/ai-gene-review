suggested_questions:
  - question: >-
      Does the FbaB N-terminal thioester (TED) domain form a covalent bond to a host
      protein (e.g. fibrinogen), analogously to SfbI/Cpa, and does this contribute to
      adhesion or immune evasion?
  - question: >-
      Is the intramolecular CnaB2 isopeptide bond required for FbaB-mediated host-cell
      invasion under physiological shear/force, as the mechanical-stability hypothesis
      predicts?
suggested_experiments:
  - description: >-
      Mass-spectrometry / SDS-PAGE crosslinking assay of recombinant FbaB TED domain with
      host fibrinogen to test for covalent (thioester-mediated) host capture.
    hypothesis: >-
      The FbaB TED domain covalently captures a host plasma/matrix protein, as seen for
      other streptococcal thioester-domain adhesins.
  - description: >-
      Site-directed mutagenesis of the CnaB2 isopeptide-forming Lys/Asp/Glu residues in
      full-length FbaB, then quantify HEp-2 adhesion/invasion under flow.
    hypothesis: >-
      Disrupting the CnaB2 isopeptide bond reduces the mechanical resilience of FbaB and
      lowers force-dependent host-cell invasion.
