id: Q8G9G1
gene_symbol: FbaB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:1314
  label: Streptococcus pyogenes
description: >-
  FbaB (gene fba2) is a cell-wall-anchored fibronectin-binding surface protein of
  group A Streptococcus (Streptococcus pyogenes), found predominantly in invasive
  M3/M18 serotypes and acting as a major virulence factor in host colonization and
  invasion. It is a large (733 aa) multidomain LPXTG surface protein: a C-terminal
  LPXTG sortase-anchor motif covalently attaches it to peptidoglycan; C-terminal
  fibronectin-binding repeats mediate strong binding to host fibronectin, promoting
  bacterial adhesion to and invasion of host epithelial cells; an N-terminal
  thioester domain (TED) of the type that, in related streptococcal adhesins, forms
  covalent "chemical-harpoon" bonds to host proteins such as fibrinogen; and a
  CnaB2/SpaA-like prealbumin-fold (Cna protein B-type) domain that autocatalytically
  forms an intramolecular Lys-Asp isopeptide bond, conferring high mechanical, thermal
  and chemical stability suited to bearing force while the bacterium engages host
  fibronectin during invasion. Loss of FbaB reduces adhesion, host-cell invasion, and
  virulence. The CnaB2 isopeptide-bond domain of FbaB is the natural scaffold from
  which the widely used SpyTag/SpyCatcher covalent protein-conjugation system was
  engineered by splitting the domain into a reactive peptide (SpyTag, bearing the Asp)
  and its protein partner (SpyCatcher, bearing the Lys).
references:
  - id: PMID:12359713
    title: "Molecular characterization of a novel fibronectin-binding protein of Streptococcus pyogenes strains isolated from toxic shock-like syndrome patients."
    findings:
      - statement: >-
          FbaB is a surface-located fibronectin-binding protein of GAS M3/M18 strains,
          carries an LPXTG motif and C-terminal Fn-binding repeats, binds fibronectin
          strongly, and its loss reduces HEp-2 cell adhesion/invasion ~6-fold and
          decreases mouse mortality.
        supporting_text: >-
          recombinant FbaB exhibits a strong Fn-binding ability
    full_text_unavailable: true
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-verified original characterization of FbaB; abstract-only in cache but
        directly establishes the fibronectin-binding, adhesion/invasion, and virulence
        functions asserted here.
  - id: PMID:22366317
    title: "Peptide tag forming a rapid covalent bond to a protein, through engineering a bacterial adhesin."
    findings:
      - statement: >-
          The FbaB CnaB2 domain contains a spontaneous Lys-Asp isopeptide bond; splitting
          it yielded SpyTag/SpyCatcher. The authors note this domain may bear high force
          in bridging S. pyogenes to fibronectin during cell invasion.
        supporting_text: >-
          The resilience of SpyTag:SpyCatcher to pulling forces after isopeptide bond formation suggests that the CnaB2 domain may be exposed to high force in bridging S. pyogenes to fibronectin during cell invasion
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Defines the FbaB CnaB2 isopeptide-bond domain and its split into SpyTag/SpyCatcher;
        directly supports the mechanical-stability role of the CnaB2 domain.
  - id: PMID:24161952
    title: "Structural analysis and optimization of the covalent association between SpyCatcher and a peptide Tag."
    findings:
      - statement: >-
          Crystal structures (PDB 4MLI/4MLS) of the SpyCatcher:SpyTag covalent complex,
          derived from the FbaB CnaB2 domain, with optimization of SpyCatcher.
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        Structural confirmation of the CnaB2-derived covalent complex; corroborating for
        the engineered-derivative context rather than native FbaB function.
  - id: PMID:31822621
    title: "Approaching infinite affinity through engineering of peptide-protein interaction."
    findings:
      - statement: >-
          Engineering of third-generation SpyTag003/SpyCatcher003 (the variant crystallized
          in PDB 9OJ3) with greatly accelerated covalent reaction.
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        Source of the SpyTag003/SpyCatcher003 variant in PDB 9OJ3; engineered-derivative
        context.
  - id: PMID:40531663
    title: "ALS-ENABLE: creating synergy and opportunity at the Advanced Light Source synchrotron structural biology beamlines."
    findings:
      - statement: >-
          Reports a case study characterizing the SpyCatcher-SpyTag protein system; the
          associated structure is PDB 9OJ3 (SpyTag003-SpyCatcher003, 1.43 A).
        supporting_text: >-
          A case study showcasing the main technologies of the resource applied to the characterization of the SpyCatcher-SpyTag protein system is presented
    reference_review:
      relevance: LOW
      correctness: VERIFIED
      review_notes: >-
        Publication associated with PDB 9OJ3; a beamline/resource paper, relevant only as
        the structural-methods context for the engineered complex.
  - id: PMID:26032562
    title: "An internal thioester in a pathogen surface protein mediates covalent host binding."
    findings:
      - statement: >-
          Streptococcal surface protein SfbI uses an internal thioester bond as a covalent
          "chemical harpoon" to bind host fibrinogen; thioester-containing domains of this
          type are present in pathogen adhesins including FbaB.
        supporting_text: >-
          the streptococcal surface protein SfbI mediates covalent interaction with the host protein fibrinogen using an unusual internal thioester bond
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        Background for the FbaB N-terminal thioester (TED) domain covalent-host-binding
        capacity; the experiments are on SfbI/related proteins, not FbaB directly.
  - id: UniProtKB:Q8G9G1
    title: "UniProt entry for Streptococcus pyogenes fibronectin binding protein FbaB (fba2)"
    findings:
      - statement: >-
          733-aa surface protein with an N-terminal thioester domain (PF08341/TED), three
          fibronectin-binding repeats (PF02986), a CnaB2/SpaA-like prealbumin-fold domain
          (PF17802; SSF49478 Cna protein B-type), and an LPXTG anchor (TIGR01167).
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Domain architecture used to ground the molecular-function and localization calls;
        TrEMBL/unreviewed, no GO annotations present.
