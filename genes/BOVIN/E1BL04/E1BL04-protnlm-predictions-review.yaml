id: E1BL04
gene_symbol: E1BL04
taxon:
  id: NCBITaxon:9913
  label: Bos taurus
status: COMPLETE
description: >-
  ProtNLM2 predicted 3 GO terms for XIRP2 (Xin actin-binding repeat-containing protein 2),
  a large (3561 aa) actin-binding protein with 26 Xin repeats that localizes to Z discs and
  intercalated discs in striated muscle. All 3 predictions are biologically correct but less
  precise (LSP) than existing GOA annotations: the model predicted parent terms (actin
  cytoskeleton organization, cell junction, actin binding) where GOA already carries the more
  specific children (actin filament organization, focal adhesion, actin filament binding).
  This pattern suggests ProtNLM2 captures the correct functional category from the Xin repeat
  domain signature but does not resolve to the most informative specificity level available
  in the GO hierarchy. Total score: 6/6 (all concordant at CS=2), but no novel biological
  insight beyond what automated pipelines (InterPro2GO, IBA, Ensembl Compara) already provide.
source_documents:
  - genes/BOVIN/E1BL04/E1BL04-uniprot.txt
  - genes/BOVIN/E1BL04/E1BL04-goa.tsv
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0030036
      label: actin cytoskeleton organization
    predicted_term_type: GO_BP
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0030036 (actin cytoskeleton organization), which is
        the direct parent of the existing IBA annotation GO:0007015 (actin filament
        organization). XIRP2 organizes actin filaments specifically within the sarcomere
        via its 26 Xin repeats that bind F-actin, and mouse knockout studies demonstrate
        disrupted actin filament architecture in cardiomyocytes. The existing annotation
        at GO:0007015 is more informative because XIRP2 acts directly on actin filaments
        rather than the broader actin cytoskeleton (which includes non-filament structures
        such as the Arp2/3 branched network). The ai-review itself marks GO:0030036 as
        MARK_AS_OVER_ANNOTATED relative to GO:0007015. The prediction is biologically
        correct but adds no precision beyond what IBA phylogenetic inference already
        captures.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0030054
      label: cell junction
    predicted_term_type: GO_CC
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0030054 (cell junction), which is a broad ancestor of
        multiple more specific GOA annotations: GO:0005925 (focal adhesion, IBA/IEA),
        GO:0005911 (cell-cell junction, IEA), and GO:0070161 (anchoring junction, IEA).
        XIRP2 localizes to intercalated discs in cardiomyocytes -- specialized cell-cell
        junctions containing adherens junctions -- and colocalizes with focal adhesions
        (or their muscle-equivalent costameres) in non-muscle overexpression assays. The
        UniProt subcellular location annotation already lists "Cell junction" (ARBA),
        and InterPro2GO maps the Xin repeat domain to this same broad term. The prediction
        is correct but at the least informative level of the GO hierarchy; the more specific
        terms already in GOA (focal adhesion, cell-cell junction, anchoring junction) better
        capture XIRP2 biology. The ai-review marks GO:0030054 as MARK_AS_OVER_ANNOTATED.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0003779
      label: actin binding
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0003779 (actin binding), the direct parent of the existing
        IBA and IEA annotation GO:0051015 (actin filament binding). XIRP2 contains 26 Xin
        repeats (PROSITE) / 18 Pfam Xin domains that specifically bind F-actin (filamentous
        actin), not monomeric G-actin. The distinction matters: GO:0003779 encompasses both
        G-actin and F-actin binding, while GO:0051015 correctly restricts to the filamentous
        form that the Xin repeat domain engages. The ai-review explicitly marks GO:0003779
        as MARK_AS_OVER_ANNOTATED and identifies GO:0051015 as the core molecular function.
        Combined IEA methods (GO_REF:0000120) already assign GO:0003779 via InterPro, so
        this prediction recapitulates an existing automated annotation at a less informative
        level than the best available term.
