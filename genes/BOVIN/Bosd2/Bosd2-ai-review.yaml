  label: Bos taurus
description: >-
  Bos d 2, the major cattle dander allergen: a secreted lipocalin (calycin
  superfamily, lipocalin family) of bovine skin/sweat glands, probably functioning
  as a pheromone carrier that binds small hydrophobic ligands in its beta-barrel
  calyx. It is a member of the cross-reactive mammalian lipocalin allergen group.
