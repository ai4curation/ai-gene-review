id: Q9L243
gene_symbol: SCO2678
taxon:
  id: NCBITaxon:100226
  label: Streptomyces coelicolor
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for SCO2678 (Q9L243), a 171-amino-acid secreted
  protein from Streptomyces coelicolor A3(2) containing a HAD_SAK_2 domain
  (PF18143). Assessment: 1 correct novel (COR), 1 uncertain (UNC), 0 incorrect.
  The 5'-nucleotidase activity prediction (GO:0008253) is well-supported by
  convergent evidence from domain architecture (HAD_SAK_2), eggNOG classification
  (COG1877, 5'-nucleotidase/2',3'-cyclic phosphodiesterase), and a characterized
  S. coelicolor homolog SCO4152 that is a PhoP-regulated extracellular
  5'-nucleotidase. GOA contains no curated annotations for this protein, making
  this a genuinely novel computational prediction. The deoxyribonucleotide
  catabolic process prediction (GO:0009264) is plausible given the inferred
  nucleotidase activity but overly specific: no evidence distinguishes
  deoxyribonucleotide from ribonucleotide substrates, and HAD superfamily members
  are known for broad substrate promiscuity.
