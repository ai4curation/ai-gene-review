predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0008253
      label: "5'-nucleotidase activity"
    predicted_term_type: GO_MF
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0008253 (5'-nucleotidase activity), the hydrolysis of
        a 5'-ribonucleotide or 5'-deoxyribonucleotide to a ribonucleoside or
        deoxyribonucleoside and orthophosphate. This prediction is well-supported by
        multiple independent lines of evidence. SCO2678 contains a HAD_SAK_2 domain
        (PF18143), placing it in the haloacid dehalogenase (HAD) superfamily, which
        catalyzes phosphate ester hydrolysis via a conserved nucleophilic aspartate
        mechanism. The protein is classified in eggNOG COG1877
        (5'-nucleotidase/2',3'-cyclic phosphodiesterase and related esterases), which
        directly supports assignment of 5'-nucleotidase activity within the broader
        HAD phosphatase family. A characterized S. coelicolor homolog, SCO4152, is a
        PhoP-regulated extracellular 5'-nucleotidase involved in phosphate scavenging,
        providing direct functional precedent in this organism. S. coelicolor lacks
        organic phosphate transporters (uhp-type systems), necessitating extracellular
        dephosphorylation of nucleotides before phosphate uptake via PstSCAB or PitH
        transporters, which provides strong biological rationale for secreted
        nucleotidase activity. The UniProt entry designates SCO2678 as a secreted
        protein, consistent with an extracellular phosphatase role. GOA contains no
        curated annotations for this protein, so this prediction is genuinely novel.
        The independent AI review of this gene also proposed GO:0008253 as a new
        annotation based on the same convergent evidence. While the exact substrate
        specificity of SCO2678 has not been experimentally determined and HAD
        superfamily members can exhibit substrate promiscuity across nucleotides,
        sugar phosphates, and other phosphomonoesters, the COG1877 classification
        specifically favors 5'-nucleotidase over other HAD activities.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0009264
      label: deoxyribonucleotide catabolic process
    predicted_term_type: GO_BP
    review:
      assessment: NPI
      confidence_score: 0
      summary: >-
        Downgraded from UNC to NPI. An independent OpenScientist investigation (see file
        reference) walked the nested claim chain and refuted GO:0009264 as a core function.
        SCO2678 is a HAD-superfamily phosphohydrolase (motifs intact, AlphaFold pLDDT 85.5,
        PF18143), but PF18143 is the RNA-repair "Swiss Army Knife" HAD family, not a
        characterized 5'-nucleotidase subfamily -- so even the sibling 5'-nucleotidase call
        (assessed COR above) is over-specific and worth a curator re-check. It shares no Pfam
        with dNMP-acting HAD nucleotidases (YjjG/NagD), and even bona fide HAD 5'-nucleotidases
        prefer non-deoxyribonucleotide substrates, so a deoxyribonucleotide-specific role is
        unsupported. GO:0009264 is a physiological process term that requires a defensible
        pathway role, and there is no experimental, pathway, or genomic-context evidence for
        one; the defensible annotation is a low-specificity phosphatase molecular function,
        not this process term. Caveat: HAD enzymes are promiscuous, so weak in-vitro dNMP
        hydrolysis cannot be excluded -- but that would not justify the specific
        catabolic-process annotation.
      supported_by:
        - reference_id: file:STRCO/Q9L243/Q9L243-hypotheses/prediction-deoxyribonucleotide-catabolism/openscientist.md
          supporting_text: even bona fide HAD 5′-nucleotidases prefer non-dNMPs
        - reference_id: file:STRCO/Q9L243/Q9L243-hypotheses/prediction-deoxyribonucleotide-catabolism/openscientist.md
          supporting_text: requires a defensible pathway role, and there is no evidence for one
