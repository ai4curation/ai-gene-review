- id: PMID:12000953
  title: Complete genome sequence of the model actinomycete Streptomyces coelicolor A3(2)
  findings:
    - statement: >-
        Genome sequencing paper that identified fusB (SCO6589) as encoding Elongation factor G 2.
- id: PMID:20132446
  title: A bacterial elongation factor G homologue exclusively functions in ribosome recycling
    in the spirochaete Borrelia burgdorferi
  findings:
    - statement: >-
        Demonstrated functional division between EF-G1 (translocase) and EF-G2 (exclusive
        ribosome recycling factor) in B. burgdorferi.
    - statement: >-
        EF-G2 does not require GTP hydrolysis for ribosome disassembly when IF-3 is present.
    - statement: >-
        Established that bacterial EF-G paralogs mirror the functional division seen in
        mitochondrial EF-G paralogs.
- id: PMID:36472247
  title: Gut colonization by Bacteroides requires translation by an EF-G paralog lacking
    GTPase activity
  findings:
    - statement: >-
        EF-G2 in Bacteroides supports translocation without GTP hydrolysis.
    - statement: >-
        EF-G2 accumulates during carbon starvation and is ~10-fold more abundant than EF-G1
        in bacteria from murine ceca.
    - statement: >-
        A 26-residue region unique to EF-G2 is responsible for absence of GTPase activity.
- id: file:STRCO/fusB/fusB-deep-research-falcon.md
  title: Deep research report on fusB (EF-G 2) in S. coelicolor via Falcon
  findings:
    - statement: >-
        fusB (SCO6589) is part of the WblC/WhiB7 regulon that controls intrinsic resistance
        to translation-targeting antibiotics; fusB expression is induced by sub-MIC lincomycin.
    - statement: >-
        Evolutionary analysis places S. coelicolor fusB in a distinct strepEFG clade near
        EF-G2-like groupings, supporting its identity as an EF-G2 paralog.
- id: PMID:32291305
  title: The WblC/WhiB7 Transcription Factor Controls Intrinsic Resistance to Translation-Targeting
    Antibiotics by Altering Ribosome Composition
  findings:
    - statement: >-
        WblC controls many genes involved in translation including fusB (SCO6589, EF-G paralog)
        in S. coelicolor; WblC promotes translation rate during antibiotic stress by altering
        ribosome-associated protein composition.
- id: PMID:37732750
  title: Phenomenological interpretations of sub-MIC lincomycin effects on Streptomyces
    coelicolor gene expression
  findings:
    - statement: >-
        5 ug/mL lincomycin promoted high but transient expression of WblC regulon mRNAs
        including fusB and tuf3, identified as encoding EF-G and EF-Tu respectively.
- id: PMID:40569974
  title: Cryo-EM structural analyses reveal a unique role for elongation factor G2 (EF-G2)
    in Mycobacteria
  findings:
    - statement: >-
        Mycobacterial EF-G2 does not participate in ribosome recycling or translational elongation.
    - statement: >-
        EF-G2 lacks ribosome-dependent GTPase activity.
    - statement: >-
        EF-G2 is overexpressed during stationary phase and acts as a translation repressor.
    - statement: >-
        Two copies of EF-G2 bind the 50S subunit, preventing 70S ribosome formation.
core_functions:
  - description: >-
      EF-G2 functions primarily in ribosome disassembly/recycling, disaggregating post-termination
      ribosome complexes into subunits. This is supported by phylogenetic inference from the
      PANTHER tree (IBA from human GFM2) and experimental evidence in multiple bacterial EF-G2
      paralogs [PMID:20132446, PMID:36472247, PMID:40569974]. The protein binds GTP via
      conserved motifs in its tr-type G domain.
    molecular_function:
      id: GO:0005525
      label: GTP binding
    directly_involved_in:
      - id: GO:0032790
        label: ribosome disassembly
    locations:
      - id: GO:0005737
        label: cytoplasm
    supported_by:
      - reference_id: PMID:20132446
        supporting_text: >-
          EF-G1 is a translocase, while EF-G2 is an exclusive recycling factor.
      - reference_id: PMID:40569974
        supporting_text: >-
          we report an unprecedented binding mode of two EF-G2 copies on the 50S ribosomal
          subunit that impedes subunit association, thereby preventing the formation of
          active 70S ribosomes.
suggested_questions:
  - question: >-
      Does S. coelicolor EF-G2 retain any GTPase activity (intrinsic or ribosome-stimulated)?
  - question: >-
      fusB is induced by sub-MIC lincomycin via WblC/WhiB7 [PMID:37732750]; is it also
      upregulated during stationary phase or nutrient starvation independent of antibiotic
      stress?
  - question: >-
      Does S. coelicolor EF-G2 function exclusively in ribosome recycling (like Borrelia
      EF-G2) or does it also act as a translation repressor (like mycobacterial EF-G2)?
  - question: >-
      What is the functional relationship between fusB (EF-G2) and fusA (EF-G1) in
      S. coelicolor?
suggested_experiments:
  - hypothesis: >-
      S. coelicolor EF-G2 functions as a ribosome recycling factor rather than a
      translation elongation factor.
    description: >-
      In vitro ribosome recycling assay with purified S. coelicolor EF-G2 and ribosome
      recycling factor (RRF) to test whether EF-G2 can disassemble post-termination ribosome
      complexes.
  - hypothesis: >-
      S. coelicolor EF-G2 lacks ribosome-dependent GTPase activity, as seen in other
      bacterial EF-G2 paralogs.
    description: >-
      GTPase activity assay comparing EF-G1 and EF-G2 from S. coelicolor, both with and
      without ribosomes, to determine whether EF-G2 retains ribosome-dependent GTPase activity.
  - hypothesis: >-
      EF-G2 accumulates during stationary phase or nutrient stress in S. coelicolor.
    description: >-
      Quantitative proteomics comparing EF-G1 and EF-G2 abundance across growth phases
      (exponential vs. stationary) in S. coelicolor.
  - hypothesis: >-
      fusB deletion impacts ribosome recycling efficiency and/or stress survival in
      S. coelicolor.
    description: >-
      Gene deletion or knockdown of fusB to assess phenotypic consequences on growth,
      translation efficiency, and ribosome recycling in S. coelicolor.
