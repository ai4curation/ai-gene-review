id: O87844
gene_symbol: fusB
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:100226
  label: Streptomyces coelicolor (strain ATCC BAA-471 / A3(2) / M145)
description: >-
  Elongation factor G 2 (EF-G 2) is a paralog of canonical EF-G (fusA/EF-G1). In bacteria
  with duplicated EF-G genes, the EF-G2 paralog typically specializes in ribosome recycling
  (disassembly of post-termination ribosome complexes) rather than canonical translational
  elongation. EF-G2 retains the structural GTPase fold and GTP-binding capability of the
  EF-G family but may lack ribosome-dependent GTPase activity, as demonstrated for EF-G2
  paralogs in Borrelia, Bacteroides, and Mycobacterium. The PANTHER subfamily classification
  (PTHR43261:SF1, Ribosome-releasing factor 2) supports a ribosome recycling function. In
  S. coelicolor, fusB is part of the WblC/WhiB7 regulon and is induced by translation-targeting
  antibiotics such as lincomycin [PMID:32291305, PMID:37732750], suggesting a role in
  maintaining translation capacity under antibiotic stress.
existing_annotations:
- term:
    id: GO:0032790
    label: ribosome disassembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from PANTHER tree (PTN000754007),
      with evidence from human mitochondrial GFM2/EF-G2 (Q969S9), which is a ribosome-releasing
      factor that mediates ribosome disassembly during translation termination. This annotation
      is well-supported by the functional divergence pattern of EF-G paralogs across bacteria.
      In Borrelia burgdorferi, EF-G2 is an exclusive ribosome recycling factor [PMID:20132446].
      In Mycobacterium, EF-G2 binds the 50S subunit and prevents 70S formation [PMID:40569974].
      The PANTHER subfamily SF1 specifically corresponds to ribosome-releasing factors, providing
      strong phylogenetic support for this annotation.
    action: ACCEPT
    reason: >-
      Ribosome disassembly is the best-supported core function for EF-G2 paralogs. Multiple
      independent studies across diverse bacterial lineages demonstrate that when EF-G undergoes
      gene duplication, the EF-G2 paralog specializes in ribosome recycling. The phylogenetic
      inference from PANTHER is consistent with experimental evidence in Borrelia [PMID:20132446],
      Bacteroides [PMID:36472247], and Mycobacterium [PMID:40569974], as well as the human
      mitochondrial ortholog GFM2 (Q969S9).
    supported_by:
      - reference_id: PMID:20132446
        supporting_text: >-
          EF-G1 is a translocase, while EF-G2 is an exclusive recycling factor. We further
          demonstrate that B. burgdorferi EF-G2 does not require GTP hydrolysis for ribosome
          disassembly, provided that translation initiation factor 3 (IF-3) is present in
          the reaction.
      - reference_id: PMID:40569974
        supporting_text: >-
          Cryo-EM analysis of the M. smegmatis 70S ribosome purified from the nutrient-starved
          (stationary) phase and complexed with EF-G2 unveiled the structural basis for its
          inability to hydrolyse GTP in a ribosome-dependent manner. Furthermore, we report
          an unprecedented binding mode of two EF-G2 copies on the 50S ribosomal subunit that
          impedes subunit association, thereby preventing the formation of active 70S ribosomes.
      - reference_id: PMID:36472247
        supporting_text: >-
          Here, we identify an EF-G paralog-EF-G2-that supports translocation without hydrolyzing
          GTP in the gut commensal bacterium Bacteroides thetaiotaomicron.
- term:
    id: GO:0003746
    label: translation elongation factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation assigned via InterPro/UniRule mapping based on domain-level similarity
      to the EF-G family (IPR004540). However, EF-G2 paralogs have functionally diverged from
      canonical EF-G1 and typically do not function as translation elongation factors. In
      Borrelia, EF-G2 has no translocase activity [PMID:20132446]. In Mycobacterium, EF-G2
      does not significantly contribute to overall translation [PMID:40569974]. The term
      "translation elongation factor activity" specifically denotes chain elongation during
      polypeptide synthesis, which is not the primary function of EF-G2.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      This annotation is based on domain-level IEA inference from the broader EF-G family.
      While EF-G2 retains the structural fold of elongation factors, functional studies
      consistently show that EF-G2 paralogs do not serve as canonical translation elongation
      factors. In Borrelia, EF-G2 functions exclusively in ribosome recycling, not elongation
      [PMID:20132446]. In Mycobacterium, EF-G2 does not significantly contribute to overall
      translation and instead acts as a translation repressor [PMID:40569974]. The IEA
      mapping conflates structural similarity with functional equivalence.
    supported_by:
      - reference_id: PMID:20132446
        supporting_text: >-
          We demonstrate that EF-G1 is a translocase, while EF-G2 is an exclusive recycling
          factor.
      - reference_id: PMID:40569974
        supporting_text: >-
          Our study reveals that mycobacterial EF-G2, unlike EF-G1, neither participates in
          ribosome-recycling nor significantly contributes to overall translation, suggesting
          that it plays an alternative role in Mycobacteria.
- term:
    id: GO:0003924
    label: GTPase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro domain matching (IPR000795, tr-type G domain). The protein
      retains the structural GTPase fold with conserved GTP-binding motifs. However, multiple
      studies demonstrate that EF-G2 paralogs lack ribosome-dependent GTPase activity. In
      Bacteroides, EF-G2 supports translocation without GTP hydrolysis [PMID:36472247]. In
      Mycobacterium, EF-G2 lacks ribosome-dependent GTPase activity [PMID:40569974]. Whether
      S. coelicolor EF-G2 retains intrinsic (ribosome-independent) GTPase activity is unknown.
    action: UNDECIDED
    reason: >-
      The structural GTPase domain is present, but functional GTPase activity is questionable.
      EF-G2 paralogs in Bacteroides [PMID:36472247] and Mycobacterium [PMID:40569974] lack
      ribosome-dependent GTPase activity. Whether S. coelicolor fusB retains any GTPase
      activity (intrinsic or ribosome-stimulated) has not been experimentally determined.
      The annotation may be technically correct at the structural level but functionally
      misleading.
    supported_by:
      - reference_id: PMID:36472247
        supporting_text: >-
          Moreover, we uncover a 26-residue region unique to EF-G2 that is essential for
          protein synthesis, EF-G2 dissociation from the ribosome, and responsible for
          the absence of GTPase activity.
      - reference_id: PMID:40569974
        supporting_text: >-
          Moreover, EF-G2 lacks ribosome-dependent GTPase activity, an observation consistent
          with previous reports.
- term:
    id: GO:0005525
    label: GTP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation based on UniRule/InterPro mapping. The protein has well-defined GTP
      binding sites (positions 16-23, 80-84, 134-137 per UniProt feature annotations) and
      belongs to the TRAFAC class GTPase superfamily. Even EF-G2 paralogs that lack GTPase
      catalytic activity retain GTP binding capability, as GTP binding is required for
      ribosome interaction.
    action: ACCEPT
    reason: >-
      GTP binding is structurally well-supported by conserved binding motifs in the tr-type
      G domain. UniProt annotates three GTP binding regions by similarity. Even in EF-G2
      paralogs that have lost GTPase catalytic activity, GTP binding is retained and
      functionally important for ribosome interaction.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from UniRule/SubCell mapping. EF-G proteins are cytoplasmic translation
      factors that interact with ribosomes in the cytoplasm. This is a standard and
      well-supported localization for bacterial translation factors.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is expected and well-supported for all bacterial EF-G family
      members. The protein functions on cytoplasmic ribosomes.
- term:
    id: GO:0006414
    label: translational elongation
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation from InterPro/UniRule mapping based on EF-G family membership. However,
      EF-G2 paralogs are functionally divergent from canonical EF-G1 and typically do not
      participate in translational elongation. In Borrelia, EF-G2 functions exclusively in
      ribosome recycling [PMID:20132446]. In Mycobacterium, EF-G2 does not significantly
      contribute to overall translation [PMID:40569974]. The biological process annotation
      should reflect ribosome disassembly rather than translational elongation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Translational elongation is the canonical function of EF-G1, not EF-G2. Multiple
      independent studies show EF-G2 paralogs have diverged to specialize in ribosome
      recycling rather than elongation. The IBA annotation for ribosome disassembly
      (GO:0032790) more accurately captures the biological process role of this protein.
      This IEA annotation results from domain-level similarity to the broad EF-G family
      without distinguishing the functionally distinct EF-G2 clade.
    supported_by:
      - reference_id: PMID:20132446
        supporting_text: >-
          We demonstrate that EF-G1 is a translocase, while EF-G2 is an exclusive recycling
          factor.
      - reference_id: PMID:40569974
        supporting_text: >-
          Our study reveals that mycobacterial EF-G2, unlike EF-G1, neither participates in
          ribosome-recycling nor significantly contributes to overall translation, suggesting
          that it plays an alternative role in Mycobacteria.
