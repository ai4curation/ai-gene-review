id: Q93IY1
gene_symbol: SCO5104
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:100226
  label: Streptomyces coelicolor (strain ATCC BAA-471 / A3(2) / M145)
description: 'OsaC (SCO5104) is a multidomain regulatory protein that modulates SigB
  sigma factor activity in response to osmotic stress in Streptomyces coelicolor. The
  protein contains an N-terminal anti-sigma factor kinase-like domain, two PAS sensory
  domains, a GAF domain, and a C-terminal PP2C-type serine/threonine phosphatase (SpoIIE)
  domain. OsaC functions as a SigB anti-sigma factor through its N-terminal domain,
  sequestering SigB to attenuate the stress-responsive transcriptional program after
  osmotic stress. The C-terminal phosphatase domain likely dephosphorylates anti-anti-sigma
  factor proteins in the partner-switching mechanism. OsaC is required to return osaB
  and sigB expression to constitutive levels following osmotic upshift, thus serving
  as a negative feedback regulator of the osmotic stress response.'
existing_annotations:
- term:
    id: GO:0016791
    label: phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The IBA annotation is based on phylogenetic inference from UniProtKB:P9WLZ7
      (Rv1364c, M. tuberculosis), which has IDA evidence for phosphatase activity. Q93IY1
      belongs to PANTHER family PTHR43156 (Bacterial Sigma Factor Regulator), subfamily
      SF2 (Stage II sporulation protein E). The C-terminal SpoIIE domain (Pfam PF07228)
      is a PP2C-type serine/threonine phosphatase. The annotation is correct but could
      be more specific as protein serine/threonine phosphatase activity (GO:0004722),
      since the SpoIIE domain is a well-characterized PP2C-type Ser/Thr phosphatase
      that dephosphorylates anti-anti-sigma factor proteins.
    action: MODIFY
    reason: The phosphatase activity is well-supported by domain architecture (SpoIIE/PP2C
      domain), phylogenetic inference from experimentally characterized Rv1364c, and
      functional characterization of OsaC showing that deletion of the phosphatase domain
      (OsaC-DeltaPho) alters sigma factor regulation. However, GO:0016791 is too general.
      PP2C-type phosphatases specifically dephosphorylate serine/threonine residues on
      protein substrates, and the biological context (dephosphorylation of anti-anti-sigma
      factor proteins in the partner-switching mechanism) confirms protein serine/threonine
      phosphatase activity.
    proposed_replacement_terms:
    - id: GO:0004722
      label: protein serine/threonine phosphatase activity
    supported_by:
    - reference_id: PMID:19154327
      supporting_text: 'Members of the family have a predicted domain composition consisting
        of an N-terminal kinase domain related to anti-sigma factors, sensory Pas and
        Gaf domains, and a C-terminal phosphatase domain'
    - reference_id: PMID:19700407
      supporting_text: 'An environmental phosphatase controls bacterial transcriptional
        responses through alternative sigma factor subunits of RNA polymerase and a partner
        switching mechanism has been proposed to mediate phosphatase regulation'
    - reference_id: PMID:19016841
      supporting_text: 'the RsbU domain of Rv1364c bears all the conserved features of
        the PP2C-type serine/threonine phosphatase family'
- term:
    id: GO:0016989
    label: sigma factor antagonist activity
  evidence_type: ISS
  original_reference_id: PMID:19154327
  review:
    summary: OsaC functions as a SigB anti-sigma factor through its N-terminal kinase-like
      domain. Co-purification experiments demonstrate direct association of OsaC with
      SigB. Analysis of the OsaC(N92A) mutant (substitution in the kinase domain) confirmed
      that this domain is required for anti-sigma factor function. The homolog Rv1364c
      in M. tuberculosis similarly functions as an anti-sigma factor for SigF, despite
      having lost kinase catalytic activity.
    action: NEW
    reason: This is a core molecular function of OsaC that is not currently annotated
      in GOA. The N-terminal domain of OsaC functions as a sigma factor antagonist (anti-sigma
      factor), directly binding and sequestering SigB. This is experimentally demonstrated
      in S. coelicolor by co-purification and mutagenesis studies.
    supported_by:
    - reference_id: PMID:19154327
      supporting_text: 'From analysis of the activities of OsaC(DeltaPho), lacking the
        C-terminal phosphatase domain, and OsaC(N92A), with a substitution of a critical
        asparagine residue in the kinase domain, we infer that this N-terminal domain
        functions as a sigma(B) anti-sigma factor'
    - reference_id: PMID:19154327
      supporting_text: 'co-purification experiments indicate association of OsaC and
        sigma(B)'
    - reference_id: PMID:19016841
      supporting_text: 'In view of conservation of specific interactions with cognate
        sigma and anti-anti-sigma factor, the loss of kinase activity of Rv1364c and UsfX
        appears to form a missing link in the phosphorylation-dependent interaction involved
        in SigF regulation'
- term:
    id: GO:0006970
    label: response to osmotic stress
  evidence_type: IMP
  original_reference_id: PMID:19154327
  review:
    summary: OsaC is genetically linked to the osmotic stress response gene osaB and
      is required for returning sigB and osaB expression to constitutive levels after
      osmotic stress. The osaC gene was identified as a new osmoregulation gene in S.
      coelicolor. Deletion or mutation of OsaC domains leads to altered osmotic stress
      response kinetics.
    action: NEW
    reason: OsaC plays a direct functional role in the osmotic stress response. It is
      required to attenuate SigB-dependent transcription after osmotic upshift, functioning
      as a negative feedback regulator. This biological process annotation captures a
      core function not present in current GOA annotations.
    supported_by:
    - reference_id: PMID:19154327
      supporting_text: 'we have identified a new osmoregulation gene, osaC, encoding
        a member of a novel family of regulatory proteins'
    - reference_id: PMID:19154327
      supporting_text: 'OsaC is required to return osaB and sigB expression back to constitutive
        levels after osmotic stress'
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: ISS
  original_reference_id: PMID:19154327
  review:
    summary: OsaC regulates transcription by modulating the availability of sigma factor
      SigB. As an anti-sigma factor, OsaC sequesters SigB to prevent transcription of
      SigB-dependent genes. The phosphatase domain likely participates in the partner-switching
      mechanism that controls sigma factor release. The homolog Rv1364c has IDA evidence
      for this term.
    action: NEW
    reason: OsaC functions in transcriptional regulation through the sigma factor partner-switching
      mechanism. This is a core biological process function supported by the direct experimental
      evidence of OsaC-SigB interaction and the functional consequences of osaC mutation
      on sigB-dependent gene expression.
    supported_by:
    - reference_id: PMID:19154327
      supporting_text: 'OsaC is required to return osaB and sigB expression back to constitutive
        levels after osmotic stress'
    - reference_id: PMID:19154327
      supporting_text: 'These results support a model for post-osmotic stress modulation
        of sigma(B) activity by OsaC'
core_functions:
- molecular_function:
    id: GO:0016989
    label: sigma factor antagonist activity
  description: OsaC functions as a SigB anti-sigma factor through its N-terminal kinase-like
    domain, directly binding and sequestering SigB to attenuate stress-responsive transcription
    after osmotic stress. Co-purification confirms the OsaC-SigB interaction. The kinase-like
    domain has lost catalytic kinase activity but retains anti-sigma factor binding function,
    paralleling the homolog Rv1364c in M. tuberculosis.
  supported_by:
  - reference_id: PMID:19154327
    supporting_text: 'we infer that this N-terminal domain functions as a sigma(B) anti-sigma
      factor. Indeed, co-purification experiments indicate association of OsaC and sigma(B)'
- molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: The C-terminal SpoIIE domain of OsaC is a PP2C-type serine/threonine
    phosphatase that likely dephosphorylates anti-anti-sigma factor proteins in the partner-switching
    signal transduction cascade. Deletion of this domain (OsaC-DeltaPho) alters OsaC
    regulatory function. The homologous domain in Rv1364c (M. tuberculosis) has been
    biochemically confirmed as a PP2C-type phosphatase with magnesium and manganese cofactor
    requirements.
  supported_by:
  - reference_id: PMID:19154327
    supporting_text: 'Members of the family have a predicted domain composition consisting
      of an N-terminal kinase domain related to anti-sigma factors, sensory Pas and Gaf
      domains, and a C-terminal phosphatase domain'
  - reference_id: PMID:19016841
    supporting_text: 'the RsbU domain of Rv1364c bears all the conserved features of
      the PP2C-type serine/threonine phosphatase family'
