id: Q93IY1
gene_symbol: SCO5104
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:100226
  label: Streptomyces coelicolor (strain ATCC BAA-471 / A3(2) / M145)
description: 'SCO5104 is a multidomain sensory/signaling protein in Streptomyces coelicolor
  belonging to the OsaC-like family (PANTHER PTHR43156). The protein contains two PAS
  sensory domains, a GAF domain, an HATPase_c (anti-sigma factor kinase-like) domain,
  and a C-terminal SpoIIE (PP2C-type serine/threonine phosphatase) domain. It is predicted
  to be cytosolic (0 transmembrane helices). SCO5104 is a paralogue of OsaC (SCO5747),
  the characterized sigma factor B regulator in osmotic stress, but SCO5104 mutants showed
  no observable phenotype under hyperosmotic conditions. Based on domain architecture
  and phylogenetic inference from the experimentally characterized homolog Rv1364c (M.
  tuberculosis), SCO5104 likely possesses PP2C-type protein serine/threonine phosphatase
  activity and may function in sigma factor regulation, but its specific physiological
  role, ligands, and regulated targets remain experimentally unresolved.'
existing_annotations:
- term:
    id: GO:0016791
    label: phosphatase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: The IBA annotation is based on phylogenetic inference from UniProtKB:P9WLZ7
      (Rv1364c, M. tuberculosis), which has IDA evidence for phosphatase activity. Q93IY1
      belongs to PANTHER family PTHR43156 (Bacterial Sigma Factor Regulator), subfamily
      SF2 (Stage II sporulation protein E). The C-terminal SpoIIE domain (Pfam PF07228)
      is a PP2C-type serine/threonine phosphatase. The annotation is correct but could
      be more specific as protein serine/threonine phosphatase activity (GO:0004722),
      since the SpoIIE domain is a well-characterized PP2C-type Ser/Thr phosphatase
      that dephosphorylates anti-anti-sigma factor proteins.
    action: MODIFY
    reason: The phosphatase activity is well-supported by domain architecture (SpoIIE/PP2C
      domain), phylogenetic inference from experimentally characterized Rv1364c, and
      functional characterization of OsaC showing that deletion of the phosphatase domain
      (OsaC-DeltaPho) alters sigma factor regulation. However, GO:0016791 is too general.
      PP2C-type phosphatases specifically dephosphorylate serine/threonine residues on
      protein substrates, and the biological context (dephosphorylation of anti-anti-sigma
      factor proteins in the partner-switching mechanism) confirms protein serine/threonine
      phosphatase activity.
    proposed_replacement_terms:
    - id: GO:0004722
      label: protein serine/threonine phosphatase activity
    supported_by:
    - reference_id: PMID:19154327
      supporting_text: 'Members of the family have a predicted domain composition consisting
        of an N-terminal kinase domain related to anti-sigma factors, sensory Pas and
        Gaf domains, and a C-terminal phosphatase domain'
    - reference_id: PMID:19700407
      supporting_text: 'An environmental phosphatase controls bacterial transcriptional
        responses through alternative sigma factor subunits of RNA polymerase and a partner
        switching mechanism has been proposed to mediate phosphatase regulation'
    - reference_id: PMID:19016841
      supporting_text: 'the RsbU domain of Rv1364c bears all the conserved features of
        the PP2C-type serine/threonine phosphatase family'
- term:
    id: GO:0016989
    label: sigma factor antagonist activity
  evidence_type: ISS
  original_reference_id: PMID:19016841
  review:
    summary: Inferred from domain architecture and homology. SCO5104 contains an N-terminal
      HATPase_c domain related to anti-sigma factor kinases (COG2172). The characterized
      paralogue OsaC (SCO5747) functions as a SigB anti-sigma factor through this domain,
      and the homolog Rv1364c in M. tuberculosis similarly functions as an anti-sigma
      factor for SigF. However, the co-purification and mutagenesis experiments demonstrating
      anti-sigma factor function were performed on OsaC (SCO5747), not SCO5104. SCO5104
      mutants showed no osmotic stress phenotype, suggesting its regulatory target or
      conditions of action may differ from OsaC.
    action: NEW
    reason: Domain architecture (HATPase_c/anti-sigma kinase-like domain) and membership
      in PANTHER family PTHR43156 (Bacterial Sigma Factor Regulator) strongly suggest
      sigma factor antagonist activity. The homolog Rv1364c has experimentally confirmed
      anti-sigma factor interactions. However, the specific sigma factor target for
      SCO5104 is unknown and may not be SigB (given negative osmotic stress phenotype).
    supported_by:
    - reference_id: PMID:19016841
      supporting_text: 'In view of conservation of specific interactions with cognate
        sigma and anti-anti-sigma factor, the loss of kinase activity of Rv1364c and UsfX
        appears to form a missing link in the phosphorylation-dependent interaction involved
        in SigF regulation'
    - reference_id: PMID:19154327
      supporting_text: 'Members of the family have a predicted domain composition consisting
        of an N-terminal kinase domain related to anti-sigma factors, sensory Pas and
        Gaf domains, and a C-terminal phosphatase domain'
    - reference_id: file:STRCO/Q93IY1/Q93IY1-deep-research-falcon.md
      supporting_text: 'SCO5104 is explicitly listed as one of four S. coelicolor genes
        encoding proteins with a domain composition related to OsaC'
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: ISS
  original_reference_id: PMID:19016841
  review:
    summary: Inferred from homology to Rv1364c (M. tuberculosis), which has IDA evidence
      for regulation of DNA-templated transcription (GO:0006355). SCO5104 belongs to
      the same PANTHER family of bacterial sigma factor regulators that modulate transcription
      through partner-switching mechanisms. The paralogue OsaC (SCO5747) regulates SigB-dependent
      transcription, but the specific transcriptional role of SCO5104 is not experimentally
      established.
    action: NEW
    reason: Strong inference from phylogenetic family membership and domain architecture.
      The Rv1364c homolog has direct experimental evidence for transcriptional regulation,
      and all characterized members of this protein family function in sigma factor-mediated
      transcriptional regulation. However, the specific regulon and conditions under
      which SCO5104 acts remain unknown.
    supported_by:
    - reference_id: PMID:19016841
      supporting_text: 'the loss of kinase activity of Rv1364c and UsfX appears to form
        a missing link in the phosphorylation-dependent interaction involved in SigF regulation'
    - reference_id: file:STRCO/Q93IY1/Q93IY1-deep-research-falcon.md
      supporting_text: 'SCO5104 mutants showed no observable phenotypic difference vs.
        wild-type M145 under hyperosmotic conditions [from full text of PMID:19154327]'
core_functions:
- molecular_function:
    id: GO:0004722
    label: protein serine/threonine phosphatase activity
  description: The C-terminal SpoIIE domain of SCO5104 is a PP2C-type serine/threonine
    phosphatase, inferred from domain architecture and phylogenetic relationship to
    Rv1364c (M. tuberculosis), which has been biochemically confirmed as a PP2C-type
    phosphatase with IDA evidence. The specific substrate of SCO5104 phosphatase
    activity is unknown but likely involves anti-anti-sigma factor proteins in a
    partner-switching signal transduction cascade.
  supported_by:
  - reference_id: PMID:19016841
    supporting_text: 'the RsbU domain of Rv1364c bears all the conserved features of
      the PP2C-type serine/threonine phosphatase family'
  - reference_id: PMID:19154327
    supporting_text: 'Members of the family have a predicted domain composition consisting
      of an N-terminal kinase domain related to anti-sigma factors, sensory Pas and Gaf
      domains, and a C-terminal phosphatase domain'
- molecular_function:
    id: GO:0016989
    label: sigma factor antagonist activity
  description: SCO5104 contains an N-terminal HATPase_c domain related to anti-sigma
    factor kinases. The paralogue OsaC (SCO5747) functions as a SigB anti-sigma factor
    via this domain, and the homolog Rv1364c retains anti-sigma factor binding despite
    loss of kinase activity. SCO5104 likely has sigma factor antagonist activity, but
    the specific sigma factor target is unknown and may differ from OsaC, as SCO5104
    mutants show no osmotic stress phenotype.
  supported_by:
  - reference_id: PMID:19016841
    supporting_text: 'In view of conservation of specific interactions with cognate
      sigma and anti-anti-sigma factor, the loss of kinase activity of Rv1364c and UsfX
      appears to form a missing link in the phosphorylation-dependent interaction involved
      in SigF regulation'
  - reference_id: file:STRCO/Q93IY1/Q93IY1-deep-research-falcon.md
    supporting_text: 'SCO5104 is explicitly listed as one of four S. coelicolor genes
      encoding proteins with a domain composition related to OsaC'
