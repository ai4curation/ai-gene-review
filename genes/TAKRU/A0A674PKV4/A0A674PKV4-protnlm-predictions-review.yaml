id: A0A674PKV4
gene_symbol: gas7a
taxon:
  id: NCBITaxon:31033
  label: Takifugu rubripes
status: COMPLETE
description: >-
  ProtNLM2 predicted 1 GO term for the Takifugu rubripes gas7a protein (Growth
  arrest-specific protein 7a), an F-BAR domain-containing protein involved in
  membrane curvature sensing at clathrin-coated pits. The single prediction,
  GO:0005737 (cytoplasm), is technically correct and already present as an IEA
  annotation in GOA, but it is far less informative than the specific
  localizations that define GAS7a biology. The curated review marks cytoplasm as
  KEEP_AS_NON_CORE because the protein's functionally relevant localizations are
  the plasma membrane (GO:0005886) and clathrin-coated pit (GO:0005905), where
  the F-BAR domain performs its membrane curvature role during clathrin-mediated
  endocytosis. ProtNLM2 failed to predict any of these specific localizations,
  nor did it predict the clathrin-coated vesicle (GO:0030136), clathrin coat
  assembly (GO:0048268), clathrin-dependent endocytosis (GO:0072583), or neuron
  projection morphogenesis (GO:0048812) annotations that capture the core biology
  of this GAS7 family member. Assessment: 0 correct novel, 0 incorrect, 1 less
  precise (LSP). Total CS = 2/2.
