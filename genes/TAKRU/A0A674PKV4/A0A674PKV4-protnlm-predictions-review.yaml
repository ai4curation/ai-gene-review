predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005737
      label: cytoplasm
    predicted_term_type: GO_CC
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0005737 (cytoplasm) is already present as an IEA annotation in GOA for
        this protein, transferred via TreeGrafter from the PANTHER GAS7 subfamily
        (PTHR23065:SF57). While technically correct -- GAS7a is a cytoplasmic
        protein that peripherally associates with membranes via its F-BAR domain
        -- cytoplasm is a highly generic cellular component term that conveys
        almost no functional information. The curated review appropriately marks
        this annotation as KEEP_AS_NON_CORE because the biologically meaningful
        localizations for gas7a are the plasma membrane (GO:0005886) and
        clathrin-coated pit (GO:0005905), where the crescent-shaped F-BAR dimer
        (residues 121-381, CDD: cd07649 F-BAR_GAS7) senses and induces membrane
        curvature during the invagination step of clathrin-mediated endocytosis.
        ProtNLM2 failed to predict any of the six more specific and informative
        annotations already in GOA, including the clathrin-coated pit localization,
        the clathrin-dependent endocytosis process, and the neuron projection
        morphogenesis role that is one of the best-characterized functions of the
        mammalian GAS7 family. This pattern of predicting only a broad parent
        term while missing all specific functional annotations is characteristic
        of frequency bias, as cytoplasm is among the most commonly assigned GO CC
        terms in training data.
      error_type: FREQUENCY_BIAS
