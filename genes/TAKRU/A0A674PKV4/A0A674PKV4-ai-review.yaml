gene_symbol: gas7a
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:31033
  label: Takifugu rubripes
description: >-
  gas7a encodes Growth arrest-specific protein 7a in Takifugu rubripes, a member
  of the GAS7 family of F-BAR domain-containing proteins. The protein contains an
  N-terminal FCH (Fes/CIP4 homology) domain connected via a WW-FCH linker to a
  C-terminal F-BAR domain (residues 121-381). F-BAR domains form crescent-shaped
  dimers that sense and induce membrane curvature, typically associating with the
  cytoplasmic face of the plasma membrane. In mammals, GAS7 was originally
  identified as a gene upregulated during growth arrest and is required for neurite
  outgrowth in cultured cerebellar neurons. GAS7 family members have been shown to
  participate in membrane dynamics including clathrin-mediated endocytosis, where
  the F-BAR domain facilitates recruitment to sites of membrane invagination such
  as clathrin-coated pits. The Takifugu gas7a ortholog is predicted (PE level 4)
  with no direct experimental characterization, so functional inference relies on
  domain architecture and phylogenetic transfer from characterized mammalian
  orthologs via TreeGrafter/PANTHER.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Cytoplasmic localization is consistent with GAS7 family biology. Mammalian
      GAS7 is a cytoplasmic protein that can associate peripherally with
      membranes via its F-BAR domain. The term is broad but correct as a general
      localization. Keeping as non-core since more specific localizations (plasma
      membrane, clathrin-coated pit) are also annotated.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      F-BAR domains are well-established plasma membrane-binding modules that
      sense and induce curvature at the cytoplasmic leaflet. Mammalian GAS7 has
      been shown to localize to the plasma membrane, consistent with the F-BAR
      domain architecture (CDD: cd07649 F-BAR_GAS7). This is a core localization
      for F-BAR proteins. Accept.
    action: ACCEPT
- term:
    id: GO:0005905
    label: clathrin-coated pit
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Clathrin-coated pit localization is consistent with the established role of
      F-BAR domain proteins in clathrin-mediated endocytosis. F-BAR proteins are
      recruited to nascent clathrin-coated pits where they contribute to membrane
      invagination. Mammalian GAS7 has been implicated in clathrin-dependent
      processes. This annotation is transferred via TreeGrafter from the PANTHER
      GAS7 subfamily (PTHR23065:SF57). Accept as reflecting a specific functional
      localization.
    action: ACCEPT
- term:
    id: GO:0030136
    label: clathrin-coated vesicle
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: located_in
  review:
    summary: >-
      Clathrin-coated vesicle localization extends from the role of GAS7/F-BAR
      proteins in clathrin-mediated endocytosis. As F-BAR domain proteins
      participate in the membrane invagination and scission steps that produce
      clathrin-coated vesicles, association with these structures is plausible.
      However, the primary site of action for F-BAR proteins is the
      clathrin-coated pit (membrane invagination stage) rather than the fully
      formed vesicle. Keeping as non-core since clathrin-coated pit is the more
      precise localization.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0048268
    label: clathrin coat assembly
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Involvement in clathrin coat assembly is consistent with the role of F-BAR
      domain proteins in clathrin-mediated endocytosis. F-BAR proteins cooperate
      with clathrin adaptors and other endocytic machinery during coat assembly
      by providing membrane curvature. Mammalian GAS7 has been linked to
      clathrin-dependent membrane dynamics. Accept as a core biological process
      annotation.
    action: ACCEPT
- term:
    id: GO:0048812
    label: neuron projection morphogenesis
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Mammalian GAS7 is required for neurite outgrowth in cultured cerebellar
      neurons and has been shown to promote neuron projection morphogenesis.
      This is one of the best-characterized functions of the GAS7 family.
      The annotation is transferred via TreeGrafter from characterized mammalian
      orthologs. While there is no direct evidence in Takifugu, the phylogenetic
      transfer is well-supported by the conservation of the F-BAR domain
      architecture. Accept.
    action: ACCEPT
- term:
    id: GO:0072583
    label: clathrin-dependent endocytosis
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: involved_in
  review:
    summary: >-
      Clathrin-dependent endocytosis is a well-established biological process for
      F-BAR domain proteins. The F-BAR domain provides membrane curvature sensing
      and generation during the invagination step of clathrin-mediated endocytosis.
      This is consistent with the other clathrin-related annotations (clathrin-coated
      pit, clathrin coat assembly) and the GAS7 family assignment via PANTHER.
      Accept as a core process.
    action: ACCEPT
