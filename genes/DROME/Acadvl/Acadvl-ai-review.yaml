proposed_new_terms: []
suggested_questions:
- question: >-
    In Drosophila, is CG7461/Acadvl the sole ortholog covering both the VLCAD and ACAD9 functions of
    the mammalian clade (the protein carries the ACAD9/ACADVL-type C-terminal domain), and if so does
    it also participate in mitochondrial respiratory-chain complex I assembly as mammalian ACAD9 does?
- question: >-
    What is the physiological substrate-chain-length profile of Acadvl in fly tissues, and how is
    long-chain fatty acid oxidation partitioned between Acadvl and the other fly acyl-CoA
    dehydrogenases across the fed, starved, and flight-muscle-active states?
suggested_experiments:
- description: >-
    Generate an Acadvl (CG7461) loss-of-function allele (or RNAi knockdown) and measure whole-animal
    and tissue acylcarnitine/acyl-CoA profiles by mass spectrometry under fed and starved conditions,
    testing for accumulation of long-chain species characteristic of a VLCAD block.
  hypothesis: >-
    Loss of Acadvl impairs long-chain fatty acid beta-oxidation in Drosophila, producing accumulation
    of long-chain acylcarnitines and reduced starvation resistance, mirroring mammalian VLCAD deficiency.
- description: >-
    Enzymatically characterize recombinant Drosophila Acadvl with a panel of acyl-CoA substrates of
    varying chain length (C8-C24) using an ETF- or ferricenium-based dehydrogenase assay, and test FAD
    dependence.
  hypothesis: >-
    Drosophila Acadvl has maximal acyl-CoA dehydrogenase activity toward long- and very-long-chain
    substrates (C14-C24) and requires bound FAD, confirming conservation of VLCAD substrate specificity.
