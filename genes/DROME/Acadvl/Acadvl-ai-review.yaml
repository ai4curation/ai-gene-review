# --- Annotation 1: VLCAD activity (IBA) ---
- term:
    id: GO:0017099
    label: very-long-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred very-long-chain acyl-CoA dehydrogenase activity (PANTHER
      PTN000856877, whose leaves include the experimentally characterized human VLCAD P49748).
      This is the defining catalytic activity of the VLCAD family and, together with the CDD
      VLCAD hit (cd01161) and the PANTHER subfamily assignment (PTHR43884:SF11, very long-chain
      specific acyl-CoA dehydrogenase), is well supported at this specific level for the fly
      ortholog. This captures the core molecular function.
    action: ACCEPT
    reason: >-
      The IBA call is grounded in a tree whose experimental leaves (human ACADVL) directly
      demonstrate very-long-chain acyl-CoA dehydrogenase activity, and the fly protein carries the
      VLCAD-specific domain architecture and subfamily assignment. UniProt assigns EC 1.3.8.9
      (very-long-chain) to this protein.
    supported_by:
    - reference_id: file:DROME/Acadvl/Acadvl-uniprot.txt
      supporting_text: "very long-chain specific acyl-CoA dehydrogenase acts specifically on"
