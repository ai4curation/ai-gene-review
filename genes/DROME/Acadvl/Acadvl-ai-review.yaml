id: A1ZBJ2
gene_symbol: Acadvl
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Acadvl (CG7461; dACADVL) is the Drosophila melanogaster ortholog of human very-long-chain
  specific acyl-CoA dehydrogenase (VLCAD). It is an FAD-dependent flavoenzyme of the acyl-CoA
  dehydrogenase (ACAD) family that catalyzes the first, committed step of each cycle of
  mitochondrial fatty acid beta-oxidation: the stereospecific alpha,beta-dehydrogenation of
  saturated and unsaturated acyl-CoA thioesters, producing the corresponding trans-2-enoyl-CoA
  and transferring the abstracted electrons to the electron-transfer flavoprotein (ETF). Like
  its mammalian counterpart it acts specifically on long-chain and very-long-chain fatty
  acyl-CoAs (primary chains of roughly 12 to 24 carbons, e.g. palmitoyl-CoA, C16), distinguishing
  it from the medium- and short-chain acyl-CoA dehydrogenases. The protein carries the
  characteristic ACAD N-terminal, middle and C-terminal domains together with the extra
  ACAD9/ACADVL-type C-terminal extension, is FAD-dependent, and is a homodimer that associates
  as a peripheral protein with the matrix face of the mitochondrial inner membrane. Through this
  activity Acadvl feeds long-chain dietary and stored fatty acids into beta-oxidation for the
  production of acetyl-CoA and cellular energy.
