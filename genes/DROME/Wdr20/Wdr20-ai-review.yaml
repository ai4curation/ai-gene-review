id: Q9VBC4
gene_symbol: Wdr20
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  WD repeat-containing protein 20 homolog. Regulatory component of the Usp12-46 deubiquitylase complex
  (consisting of Usp12-46, Wdr20, and Uaf1) that stabilizes the Wingless/Wnt receptor Arrow/LRP6
  by deubiquitylation. This increases cell surface levels of Arrow and enhances sensitivity to
  Wingless signaling, increasing the amplitude and spatial range of morphogen gradient responses.
  Required for Wingless-dependent developmental patterning and intestinal stem cell homeostasis.
existing_annotations:
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from human WDR20 and S. pombe orthologs.
      Human WDR20 has been localized to the nucleus. Plausible for the Drosophila ortholog
      given conservation, but no direct experimental evidence in Drosophila.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference. Cytoplasmic localization is consistent
      with the role of Wdr20 in the USP46 deubiquitylase complex that acts on Arrow/LRP6
      turnover. Plausible but no direct evidence in Drosophila.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0035800
    label: deubiquitinase activator activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from orthologs. Consistent with the experimentally supported
      role of Drosophila Wdr20 as a regulatory/activating subunit of the USP46 deubiquitylase
      complex. Redundant with the TAS annotation below but valid.
    action: ACCEPT
- term:
    id: GO:2000059
    label: negative regulation of ubiquitin-dependent protein catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from orthologs. Consistent with the IDA evidence for this
      same term (see below). The USP46 complex deubiquitylates Arrow, preventing its
      ubiquitin-dependent degradation. Redundant with the IDA annotation.
    action: ACCEPT
- term:
    id: GO:0090263
    label: positive regulation of canonical Wnt signaling pathway
  evidence_type: NAS
  original_reference_id: PMID:37798281
  review:
    summary: >-
      NAS annotation from ComplexPortal referencing Spencer et al. 2023. The paper
      demonstrates that the USP46 complex (including Wdr20) stabilizes Arrow/LRP6
      to enhance Wingless/Wnt signaling. Consistent with the IMP annotation below.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          stabilization of the essential Wingless/Wnt receptor Arrow/LRP6 by the
          evolutionarily conserved Usp46-Uaf1-Wdr20 deubiquitylase complex controls
          signaling strength in Drosophila
- term:
    id: GO:0035800
    label: deubiquitinase activator activity
  evidence_type: TAS
  original_reference_id: PMID:37798281
  review:
    summary: >-
      TAS annotation from FlyBase. Spencer et al. 2023 demonstrates that Wdr20 is a
      regulatory component of the USP46 deubiquitylase complex, where it (together with
      Uaf1) stabilizes and activates Usp12-46 catalytic activity. This is the core
      molecular function of Wdr20.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          Wdr20, and to a lesser extent Uaf1, stabilized Usp46, as knockdown of either
          Uaf1 or Wdr20 reduced Usp46 levels
- term:
    id: GO:0090263
    label: positive regulation of canonical Wnt signaling pathway
  evidence_type: IMP
  original_reference_id: PMID:37798281
  review:
    summary: >-
      IMP annotation from FlyBase. Spencer et al. 2023 showed that Wdr20 null mutant
      clones in the wing disc have decreased Senseless expression (a Wingless target gene),
      and RNAi knockdown of Wdr20 reduces Wingless signaling. This is a key biological
      process mediated by the USP46 complex through Arrow stabilization.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          RNAi-mediated depletion of Wdr20 and Uaf1 had comparable effects
- term:
    id: GO:1905368
    label: peptidase complex
  evidence_type: IPI
  original_reference_id: PMID:37798281
  review:
    summary: >-
      IPI annotation from FlyBase based on physical interaction with Usp12-46 (FBgn0033607)
      and Uaf1 (FBgn0039025). Wdr20 is a component of the USP46 deubiquitylase complex.
      The term "peptidase complex" is appropriate as deubiquitylases are cysteine peptidases.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          V5-tagged Usp46 complex components co-immunoprecipitate with FLAG-tagged Arrow
- term:
    id: GO:2000059
    label: negative regulation of ubiquitin-dependent protein catabolic process
  evidence_type: IDA
  original_reference_id: PMID:37798281
  review:
    summary: >-
      IDA annotation from FlyBase. Spencer et al. 2023 directly demonstrated that
      the USP46 complex (including Wdr20) deubiquitylates Arrow, reducing its
      ubiquitin-dependent turnover and stabilizing the receptor. This is the
      mechanistic basis for the positive regulation of Wnt signaling.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          the Usp46 complex markedly decreased levels of ubiquitylated Arrow
references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: PMID:37798281
  title: >-
    The USP46 deubiquitylase complex increases Wingless/Wnt signaling strength
    by stabilizing Arrow/LRP6.
  findings:
    - statement: >-
        Wdr20 is a regulatory component of the Usp12-46 deubiquitylase complex
        that deubiquitylates the Wnt receptor Arrow/LRP6
      supporting_text: >-
        stabilization of the essential Wingless/Wnt receptor Arrow/LRP6 by the
        evolutionarily conserved Usp46-Uaf1-Wdr20 deubiquitylase complex controls
        signaling strength in Drosophila
      reference_section_type: ABSTRACT
    - statement: >-
        The USP46 complex increases cell surface levels of Arrow by reducing its
        ubiquitylation and turnover
      supporting_text: >-
        By reducing Arrow ubiquitylation and turnover, the Usp46 complex increases
        cell surface levels of Arrow and enhances the sensitivity of target cells to
        stimulation by the Wingless morphogen
      reference_section_type: ABSTRACT
    - statement: >-
        Wdr20 null mutant clones show decreased Arrow levels and reduced Wingless
        target gene expression in wing discs and adult midgut
      supporting_text: >-
        Wdr2033 null mutant clones (magenta) in the adult posterior midgut. Both Arrow
        (green) and cytoplasmic Arm (yellow) are decreased cell autonomously when
        Wdr20 is inactivated
      reference_section_type: RESULTS
    - statement: >-
        Wdr20 is required for Wingless-dependent intestinal stem cell proliferation
      supporting_text: >-
        Wdr20 inactivation also resulted in an increased number of intestinal stem
        and progenitor cells
      reference_section_type: RESULTS
    - statement: >-
        Wdr20 null mutants are viable but sterile with reduced lifespan
      supporting_text: >-
        Usp46, Wdr20, and Uaf1 null mutants were viable but displayed reduction
        in lifespan (Fig. S9), severe defects in the adult intestinal epithelium
        (see below), and sterility
      reference_section_type: RESULTS
core_functions:
  - description: >-
      Regulatory subunit of the USP46 deubiquitylase complex that activates
      the catalytic deubiquitylase Usp12-46, which deubiquitylates the Wingless/Wnt
      receptor Arrow/LRP6 to stabilize it at the cell surface, thereby enhancing
      Wingless signaling strength
    molecular_function:
      id: GO:0035800
      label: deubiquitinase activator activity
    directly_involved_in:
      - id: GO:0090263
        label: positive regulation of canonical Wnt signaling pathway
      - id: GO:2000059
        label: negative regulation of ubiquitin-dependent protein catabolic process
    in_complex:
      id: GO:1905368
      label: peptidase complex
    supported_by:
      - reference_id: PMID:37798281
        supporting_text: >-
          The evolutionarily conserved Usp46-Uaf1-Wdr20 deubiquitylase complex
          controls signaling strength in Drosophila
