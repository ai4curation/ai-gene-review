suggested_questions:
- question: >-
    Does purified recombinant Arc42 protein exhibit short-chain acyl-CoA dehydrogenase activity in
    vitro with the expected C4-C6 substrate preference and butyryl-CoA optimum, confirming the
    in-vivo genetic inference?
- question: >-
    What is the division of labor between the two predicted fly ACADS orthologs Arc42 and CG4860,
    given that only Arc42 loss reproduces the SCAD-deficiency C4 signature while CG4860 loss lowers
    C4 and raises C2 acylcarnitine?
suggested_experiments:
- description: >-
    In-vitro enzyme kinetics of purified recombinant Arc42 across the C4-C8 acyl-CoA range (with ETF
    as electron acceptor) to directly demonstrate short-chain acyl-CoA dehydrogenase activity and
    delimit its substrate specificity relative to fly Mcad.
- description: >-
    Subcellular localization of tagged Arc42 (e.g. immunofluorescence or fractionation) to
    experimentally confirm mitochondrial matrix localization in Drosophila, which currently rests on
    ISS transfer from the pig SCAD ortholog.
- description: >-
    Comparative functional analysis of Arc42 and CG4860 (e.g. tissue-specific rescue, double
    knockouts, and metabolomics) to define whether CG4860 acts in short-chain acyl-CoA synthesis or
    ketone utilization as suggested by its distinct acylcarnitine phenotype.
