  findings:
    - statement: >-
        CRISPR-Cas9 loss-of-function of Arc42, the higher-scoring of two predicted Drosophila ACADS
        orthologs, produces elevated C4 (butyrylcarnitine) that is exacerbated by starvation,
        recapitulating the acylcarnitine signature of human and mouse SCAD deficiency; the paralog
        CG4860 does not, identifying Arc42 as the functional fly short-chain acyl-CoA dehydrogenase.
      supporting_text: >-
        Arc42 knockout flies exhibited the C4 elevation characteristic of humans and mice lacking
        functional SCAD, while CG4860 knockout flies did not
