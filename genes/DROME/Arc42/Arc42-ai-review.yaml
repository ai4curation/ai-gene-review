      PubMed/PMC-verified primary research (G3 Bethesda 2025, PMC12341901); full text available.
      Directly establishes Arc42 as the functional ACADS ortholog in Drosophila via CRISPR knockout
      and acylcarnitine profiling (elevated C4). Basis for the FlyBase IMP annotation on GO:0033539.
      Note the legacy fly name "Activator-recruited cofactor subunit 42" is a misnomer; the closest
      human symbol is ACADS.
core_functions:
- description: >-
    Arc42 catalyzes the first, FAD-dependent step of mitochondrial fatty acid beta-oxidation for
    short-chain substrates: the alpha,beta-dehydrogenation of saturated short-chain (C4-C6, optimum
    butyryl-CoA/C4) acyl-CoA thioesters to the corresponding trans-2-enoyl-CoA, transferring
    electrons to electron-transfer flavoprotein (ETF). It acts in the mitochondrial matrix as the
    functional Drosophila ortholog of human ACADS (SCAD); loss of Arc42 elevates C4 acylcarnitine,
    the biochemical hallmark of SCAD deficiency.
  molecular_function:
