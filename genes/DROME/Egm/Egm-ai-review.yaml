- id: PMID:16434470
  title: Enigma, a mitochondrial protein affecting lifespan and oxidative stress response
    in Drosophila.
  findings:
  - statement: >-
      Egm (= CG9006) encodes a 639-aa mitochondrial protein with homology to acyl-CoA dehydrogenases;
      it is an essential gene (null larvae die at third instar) and localizes to mitochondria.
    supporting_text: >-
      Egm encodes the CG9006 gene, which corresponds to a 639-aa protein with homology to ACADs, the enzymes that catalyze the first of four reactions that constitute one cycle of the β-oxidation pathway
  - statement: >-
      Egm mutants have reduced triglyceride stores and increased paraquat/oxidative-stress resistance
      with a female-specific lifespan extension; the beta-oxidation involvement is described as indirect.
    supporting_text: >-
      indirect evidence suggests that this protein may be involved in β-oxidation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified foundational Drosophila paper. Directly supports mitochondrial localization and the
      essential/lipid/oxidative-stress/lifespan phenotypes. Its beta-oxidation interpretation is explicitly
      indirect and predates the ACAD9 CI-assembly-factor paradigm; the metabolic phenotypes are equally
      consistent with complex I / OXPHOS deficiency.
- id: PMID:18666829
  title: Proteomics reveals novel Drosophila seminal fluid proteins transferred at
    mating.
  findings:
  - statement: >-
      Egm was detected by mass spectrometry among transferred male seminal fluid proteins, in the
      lipid-metabolism functional category. This is a proteomic co-occurrence, not a demonstrated
      insemination function.
    supporting_text: >-
      proteins involved in lipid metabolism
  reference_review:
    relevance: LOW
    correctness: MISCITED
    review_notes: >-
      PubMed-verified seminal-fluid proteomics screen. Egm's presence in seminal fluid is an expression/
      proteomic detection (HEP); it does not establish a functional role in insemination, so the
      GO:0007320 annotation is treated as an over-annotation.
- id: PMID:23667151
  title: Using natural variation in Drosophila to discover previously unknown endoplasmic
    reticulum stress genes.
  findings:
  - statement: >-
      Egm was one of six lipid-metabolism-related association candidates for tunicamycin-induced ER-stress
      survival in the DGRP, suggesting a putative (likely indirect) modifier role in the ER stress response.
    supporting_text: >-
      with known or putative roles in lipid metabolism
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified DGRP natural-variation study. Egm is a genetic-association candidate with a putative
      lipid-metabolism link to ER-stress survival; the connection is plausibly indirect (via mitochondrial/
      lipid metabolism) rather than a dedicated ER-stress function.
- id: PMID:26362788
  title: Proteomic mapping in live Drosophila tissues using an engineered ascorbate
    peroxidase.
  findings:
  - statement: >-
      APEX-based proteomic mapping of the Drosophila muscle mitochondrial matrix ("MitoMax") catalogued
      Egm as a mitochondrial matrix protein.
    supporting_text: >-
      maps the mitochondrial matrix proteome of Drosophila muscle
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified APEX matrix proteomics. Supports the mitochondrial matrix localization annotation,
      consistent with a peripheral, matrix-facing inner-membrane MCIA factor.
- id: PMID:34386730
  title: Dissecting the concordant and disparate roles of NDUFAF3 and NDUFAF4 in mitochondrial
    complex I biogenesis.
  findings:
  - statement: >-
      The Drosophila ortholog of ACAD9 (dACAD9/CG9006/Egm) is a core member of the fly MCIA complex; it
      regulates biogenesis of the PP-b (ND2) sub-module of complex I, and its knockdown destabilizes the
      partner MCIA factors dNDUFAF1 and dECSIT in assembly intermediates.
    supporting_text: >-
      RNAi-mediated knockdown of dACAD9 resulted in a reduction in the amount of dNDUFAF1 and dECSIT that accumulates in AIs in ACAD9-kd samples
  - statement: >-
      The MCIA complex in Drosophila comprises the orthologs of ACAD9, NDUFAF1, ECSIT, TMEM126B and
      TMEM186, all of which associate with CI subcomplexes/holoenzyme.
    supporting_text: >-
      all 5 components of the MCIA complex were associated with subcomplexes in FAF4-kd and FAF3-kd samples
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. The primary Drosophila source establishing Egm/dACAD9 as an MCIA-complex CI
      assembly factor (PP-b/ND2 sub-module), directly supporting the core CI-assembly annotations.
- id: PMID:8913755
  title: Analysis of dominant enhancers and suppressors of activated Notch in Drosophila.
  findings:
  - statement: >-
      Large-scale second-site screen for dominant modifiers of an activated-Notch rough-eye phenotype;
      basis for the IGI compound-eye-morphogenesis annotation (Egm as a genetic modifier of eye development).
    supporting_text: >-
      a second-site mutagenesis screen was performed to isolate enhancers and suppressors of the eye phenotype caused by expression of these activated Notch molecules
  full_text_unavailable: true
  reference_review:
    relevance: LOW
    correctness: UNVERIFIED
    review_notes: >-
      Cached record is abstract-only (full text unavailable); the specific Egm/CG9006 allele data underlying
      the IGI annotation cannot be verified here. This is an experimental FlyBase genetic-interaction
      annotation whose full text was read by the curator; the eye requirement is independently consistent
      with Egm-null eye-clone phenotypes (PMID:16434470).
