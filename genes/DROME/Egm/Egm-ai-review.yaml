# --- Annotation 3: medium-chain fatty acid catabolic process (IBA) ---
- term:
    id: GO:0051793
    label: medium-chain fatty acid catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred participation in medium-chain fatty acid catabolism, propagated from
      medium-chain ACAD (MCAD) family members. There is no evidence that Egm functions specifically in
      medium-chain fatty acid catabolism in Drosophila; the ACAD9 ortholog clade is characterized by
      long/very-long-chain preference and, dominantly, a CI-assembly role.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Medium-chain specificity is a property of dedicated MCAD family members, not of the ACAD9/Egm
      subfamily. The fly protein's dominant, experimentally supported role is CI assembly (PMID:34386730);
      any residual dehydrogenase activity is expected to be long/very-long-chain by orthology to human
      ACAD9. This IBA term over-states a specific medium-chain catabolic role.
    supported_by:
    - reference_id: PMID:34386730
      supporting_text: "ACAD9 regulates biogenesis of some sub-assemblies in the PP-b sub-module"
# --- Annotation 4: fatty acid beta-oxidation using acyl-CoA dehydrogenase (IBA) ---
- term:
    id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred role in the acyl-CoA dehydrogenase step of fatty acid beta-oxidation.
      Egm belongs to the ACAD family and retains the ACAD fold, so a residual FAO-enzyme role is
      plausible by orthology to human ACAD9. However, the fly protein's dehydrogenase activity has not
      been directly demonstrated, and its dominant role is CI assembly. Retained as a non-core,
      by-similarity annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      By orthology to human ACAD9 (a bona fide, if secondary, acyl-CoA dehydrogenase), Egm may
      contribute to the ACAD step of beta-oxidation, and homology-plus-phenotype evidence in the fly
      (PMID:16434470) is consistent with a lipid-metabolism role. This is a plausible secondary function
      but not the core function, which is CI assembly.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "homology to ACADs, the enzymes that catalyze the first of four reactions that constitute one cycle of the β-oxidation pathway"
# --- Annotation 5: medium-chain fatty acyl-CoA dehydrogenase activity (IBA) ---
- term:
    id: GO:0070991
    label: medium-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred medium-chain acyl-CoA dehydrogenase activity, propagated from MCAD-clade
      members. The ACAD9/Egm subfamily is not a dedicated medium-chain dehydrogenase; human ACAD9 has
      optimal activity on long/very-long-chain substrates, with only modest medium-chain activity, and
      Egm's own activity is undemonstrated. The medium-chain-specific MF call over-states Egm's likely
      substrate preference.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Medium-chain acyl-CoA dehydrogenase activity is the defining activity of MCAD, not of the
      ACAD9/Egm subfamily. By orthology to human ACAD9, any residual activity of Egm is expected to be
      long/very-long-chain-biased, and Egm's dominant function is CI assembly (PMID:34386730). This IBA
      term reflects tree-wide propagation rather than Egm-specific specificity.
    supported_by:
    - reference_id: PMID:34386730
      supporting_text: "the MCIA complex is known to consist of ACAD9"
