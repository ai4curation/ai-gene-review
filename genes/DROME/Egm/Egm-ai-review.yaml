# --- Annotation 8: oxidoreductase activity, acting on the CH-CH group of donors (IEA, InterPro) ---
- term:
    id: GO:0016627
    label: oxidoreductase activity, acting on the CH-CH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based electronic annotation to the intermediate oxidoreductase term. The acyl-CoA
      dehydrogenase reaction introduces a double bond between the alpha and beta carbons (oxidation of a
      CH-CH group). Egm contains the ACAD catalytic domains, so the term is structurally appropriate,
      but the activity of the fly protein has not been directly measured.
    action: KEEP_AS_NON_CORE
    reason: >-
      Egm carries the acyl-CoA dehydrogenase domain signature (Pfam PF00441/PF02770/PF02771; InterPro
      IPR006091 etc.), making this intermediate oxidoreductase term appropriate by domain content. It is
      a by-similarity/domain-based call for a residual enzymatic activity, subordinate to the CI-assembly
      core function.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "homology to ACADs, the enzymes that catalyze the first of four reactions that constitute one cycle of the β-oxidation pathway"
# --- Annotation 9: flavin adenine dinucleotide binding (IEA, InterPro) ---
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based electronic annotation for FAD binding. Egm is an ACAD-family flavoprotein (UniProt
      COFACTOR: FAD, by RuleBase), and FAD binding is a conserved feature of the fold. In human ACAD9,
      FAD binding is directly demonstrated and is functionally coupled to the assembly switch
      (ECSIT-induced deflavination). FAD binding of the fly protein is inferred by similarity/domain
      content but not directly measured.
    action: KEEP_AS_NON_CORE
    reason: >-
      FAD binding is a conserved property of the ACAD9/ACAD fold and is annotated in UniProt as a
      cofactor. This is a well-supported by-similarity molecular-function feature, but for Egm it has not
      been directly demonstrated, and in the ACAD9 orthology group the FAD/enzymatic activity is
      secondary to (and, in the human protein, mutually exclusive with) the CI-assembly role.
      Deliberately kept non-core here (unlike the FAD core-function entries in the catabolic ACAD
      reviews Acadvl, Mcad, Arc42, and CG4860), because Egm's primary role is complex I assembly
      (GO:0030674), not fatty acid beta-oxidation.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "homology to ACADs, the enzymes that catalyze the first of four reactions that constitute one cycle of the β-oxidation pathway"
# --- Annotation 10: very-long-chain fatty acyl-CoA dehydrogenase activity (ISS from human ACAD9) ---
- term:
    id: GO:0017099
    label: very-long-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: >-
      ISS annotation transferred by curator judgment of sequence similarity from human ACAD9
      (UniProtKB:Q9H845). Human ACAD9 does have FAD-dependent acyl-CoA dehydrogenase activity toward
      long/very-long-chain acyl-CoA substrates, but this activity is modest (~18% of VLCAD) and is a
      secondary/moonlighting function; in the human ACAD9 review the "very-long-chain" specificity is
      argued to over-state substrate preference (long-chain is the primary specificity). For Egm the
      activity is undemonstrated. Kept as a non-core, by-similarity annotation rather than removed.
    action: KEEP_AS_NON_CORE
    reason: >-
      Transferred from human ACAD9, whose residual dehydrogenase activity is genuine but secondary. The
      "very-long-chain" level may over-state specificity (the human review MODIFIES the corresponding
      IDA annotations toward long-chain), and the fly protein's activity has not been biochemically
      characterized. Retained as non-core because the core role of both ACAD9 and Egm is CI assembly.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "homology to ACADs, the enzymes that catalyze the first of four reactions that constitute one cycle of the β-oxidation pathway"
# --- Annotation 11: protein-macromolecule adaptor activity (ISS from human ACAD9) ---
- term:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: >-
      ISS annotation transferred from human ACAD9 (UniProtKB:Q9H845), where ACAD9 functions as a
      protein-macromolecule adaptor/scaffold bridging ECSIT (and through it NDUFAF1) to CI assembly
      intermediates within the MCIA complex. Drosophila data directly support the same role: Egm
      (dACAD9) is an MCIA core member whose loss destabilizes the other MCIA components in assembly
      intermediates, consistent with a scaffolding/adaptor function. This is the best molecular-function
      representation of Egm's core CI-assembly role.
    action: ACCEPT
    reason: >-
      The adaptor/scaffold molecular function is conserved and supported directly in the fly: dACAD9
      knockdown reduces dNDUFAF1 and dECSIT in assembly intermediates (PMID:34386730), mirroring human
      ACAD9's central, MCIA-stabilizing adaptor role (transferred by ISS from Q9H845). This is far more
      informative than a generic protein-binding term and captures Egm's core function.
    supported_by:
    - reference_id: PMID:34386730
      supporting_text: "RNAi-mediated knockdown of dACAD9 resulted in a reduction in the amount of dNDUFAF1 and dECSIT that accumulates in AIs in ACAD9-kd samples"
# --- Annotation 12: mitochondrial complex I intermediate assembly complex (IDA) ---
- term:
    id: GO:0160295
    label: mitochondrial complex I intermediate assembly complex
  evidence_type: IDA
  original_reference_id: PMID:34386730
  qualifier: part_of
  review:
    summary: >-
      IDA annotation from FlyBase based on Murari et al. 2021, which demonstrated that the fly ortholog
      of ACAD9 (dACAD9/CG9006/Egm) is a core member of the Drosophila MCIA complex, together with the
      orthologs of ECSIT, NDUFAF1, TMEM126B and TMEM186, and that these components co-migrate with CI
      assembly intermediates and the holoenzyme. This is a core cellular-component annotation for Egm.
    action: ACCEPT
    reason: >-
      Direct Drosophila evidence places Egm/dACAD9 in the MCIA complex: all five MCIA components
      (including dACAD9) were found associated with CI subcomplexes/holoenzyme, and dACAD9 knockdown
      destabilizes the other MCIA members (PMID:34386730). This mirrors the well-established human ACAD9
      MCIA membership and is Egm's core localization/complex.
    supported_by:
    - reference_id: PMID:34386730
      supporting_text: "all 5 components of the MCIA complex were associated with subcomplexes in FAF4-kd and FAF3-kd samples"
    - reference_id: PMID:34386730
      supporting_text: "Drosophila orthologs of ACAD9 (CG9006), ECSIT (CG10610), NDUFAF1 (CG7598), TMEM126B (CG13392), TMEM186 (CG4627)"
# --- Annotation 13: insemination (HEP) ---
- term:
    id: GO:0007320
    label: insemination
  evidence_type: HEP
  original_reference_id: PMID:18666829
  qualifier: involved_in
  review:
    summary: >-
      HEP annotation from Findlay et al. 2008, a seminal-fluid proteomics study in which Egm was detected
      among transferred male seminal fluid proteins (classed among lipid-metabolism proteins). This is a
      mass-spectrometric co-occurrence in seminal fluid, not a demonstration that Egm has a dedicated
      insemination/reproductive function; the protein's characterized role is mitochondrial CI assembly.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Detection of a mitochondrial ACAD-family protein in the seminal-fluid proteome (HEP, expression
      pattern evidence) does not establish a functional role in insemination. Many metabolic/mitochondrial
      proteins are incidentally present in seminal fluid; no mechanistic link to the insemination process
      is shown. The annotation over-interprets a proteomic detection.
    supported_by:
    - reference_id: PMID:18666829
      supporting_text: "proteins involved in lipid metabolism"
# --- Annotation 14: mitochondrial respiratory chain complex I assembly (TAS) ---
- term:
    id: GO:0032981
    label: mitochondrial respiratory chain complex I assembly
  evidence_type: TAS
  original_reference_id: PMID:34386730
  qualifier: involved_in
  review:
    summary: >-
      TAS annotation from Murari et al. 2021. Egm/dACAD9 participates in CI assembly as an MCIA-complex
      factor that regulates biogenesis of the PP-b (ND2) sub-module of the CI membrane arm; disruption of
      dACAD9 stalls assembly intermediates and destabilizes partner MCIA factors. This is the core
      biological process for Egm and represents its most important physiological function.
    action: ACCEPT
    reason: >-
      CI assembly is Egm's core biological process, directly supported in the fly: dACAD9 regulates PP-b
      sub-module biogenesis and its knockdown reduces partner MCIA factors in assembly intermediates
      (PMID:34386730), consistent with the essential, conserved ACAD9 CI-assembly role.
    supported_by:
    - reference_id: PMID:34386730
      supporting_text: "ACAD9 regulates biogenesis of some sub-assemblies in the PP-b sub-module"
    - reference_id: PMID:34386730
      supporting_text: "when dACAD9 is disrupted, the paucity of the PP-b sub-module will cause the Q/PP-a AI to stall and accumulate"
