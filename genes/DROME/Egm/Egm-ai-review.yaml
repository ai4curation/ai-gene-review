# --- Annotation 19: fatty acid beta-oxidation (IMP, PMID:16434470) ---
- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IMP
  original_reference_id: PMID:16434470
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation from Mourikis et al. 2006, based on the metabolic phenotype of Egm-null larvae
      (halved triglycerides, upregulated lipase-3, mitochondrial localization, and eye-clone phenotype
      resembling the beta-oxidation mutant scully) plus ACAD homology. The authors are explicit that the
      beta-oxidation involvement is indirect. In light of the later demonstration that ACAD9/Egm is
      primarily a CI assembly factor, these metabolic phenotypes are equally (and more parsimoniously)
      explained by CI/OXPHOS deficiency. Retained as a non-core, experimentally-grounded annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a legitimate experimental (IMP) annotation reflecting real mutant metabolic phenotypes, and
      the full text (which the curator read) contains the supporting data; per review guidelines it should
      not be removed on the grounds that the evidence is indirect. However, because Egm's dominant,
      directly demonstrated role is CI assembly (PMID:34386730) and the paper itself calls the
      beta-oxidation link indirect, it is best treated as non-core rather than a core function.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "indirect evidence suggests that this protein may be involved in β-oxidation"
    - reference_id: PMID:16434470
      supporting_text: "the stored fatty acids in the form of triglycerides are almost halved in larvae lacking zygotically expressed Egm"
# --- Annotation 20: lipid homeostasis (IMP, PMID:16434470) ---
- term:
    id: GO:0055088
    label: lipid homeostasis
  evidence_type: IMP
  original_reference_id: PMID:16434470
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation from Mourikis et al. 2006. Egm-null larvae show markedly reduced triglyceride stores,
      malformed fat bodies, and altered expression of lipid-metabolism genes, demonstrating a mutant
      lipid-homeostasis phenotype. Whether this reflects a direct role of Egm in lipid metabolism or a
      systemic consequence of mitochondrial CI/OXPHOS deficiency is not resolved by the study, but the
      mutant phenotype is real and experimentally established.
    action: KEEP_AS_NON_CORE
    reason: >-
      The lipid-homeostasis phenotype of Egm mutants is directly documented (PMID:16434470) and is a
      valid experimental annotation. It is retained as non-core because it is a downstream/systemic
      metabolic consequence rather than Egm's core molecular role (CI assembly), and the causal
      directness of the lipid link is uncertain.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "the stored fatty acids in the form of triglycerides are almost halved in larvae lacking zygotically expressed Egm"
# --- Annotation 21: negative regulation of cellular response to oxidative stress (IMP, PMID:16434470) ---
- term:
    id: GO:1900408
    label: negative regulation of cellular response to oxidative stress
  evidence_type: IMP
  original_reference_id: PMID:16434470
  qualifier: involved_in
  review:
    summary: >-
      IMP annotation from Mourikis et al. 2006. Reduction of Egm (heterozygous nulls / hypomorphs)
      increases organismal tolerance to paraquat-induced oxidative stress, i.e. reducing Egm enhances
      oxidative-stress resistance. This phenotype connects Egm dosage to the oxidative-stress response,
      most plausibly through its effect on mitochondrial OXPHOS/ROS. It is a systemic phenotype rather
      than a direct molecular function of the protein.
    action: KEEP_AS_NON_CORE
    reason: >-
      The paraquat-resistance phenotype of Egm mutants is experimentally demonstrated (PMID:16434470) and
      links Egm to the oxidative-stress response, but the effect is an indirect, dosage-dependent,
      whole-organism consequence of altered mitochondrial function rather than a core molecular role.
      Retained as non-core.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "Egm mutant flies demonstrate a significantly increased resistance to the toxic effects of 7.5 mM paraquat compared with WT flies"
