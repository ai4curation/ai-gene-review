id: Q5U117
gene_symbol: Egm
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Egm (Complex I assembly factor Egm, mitochondrial; also known as dACAD9 or Enigma; gene
  CG9006) is the single Drosophila melanogaster ortholog of human ACAD9. It is a nuclear-encoded,
  mitochondrially targeted member of the acyl-CoA dehydrogenase (ACAD) family bearing an
  N-terminal transit peptide and the ACAD9/ACADVL-like domain architecture. Its dominant,
  essential role is as a mitochondrial respiratory chain complex I (CI) assembly factor: Egm is
  a core component of the mitochondrial complex I intermediate assembly (MCIA) complex, together
  with the Drosophila orthologs of ECSIT, NDUFAF1, TMEM126B and TMEM186, and it regulates
  biogenesis of the membrane-arm PP-b (ND2) sub-module of CI. Loss of Egm destabilizes the other
  MCIA components in assembly intermediates, and Egm remains associated with the assembled CI
  holoenzyme for a period after assembly, consistent with an assembly-chaperone/adaptor role.
  Egm localizes to mitochondria, including the mitochondrial matrix/inner-membrane compartment.
  Like human ACAD9, Egm retains an ACAD fold and is predicted to bind FAD and may retain residual
  FAD-dependent acyl-CoA dehydrogenase activity toward long/very-long-chain acyl-CoA substrates,
  although direct enzymatic activity of the fly protein has not been biochemically demonstrated.
  Egm is essential for viability: null larvae die at the third instar and show systemic metabolic
  defects (reduced triglycerides, malformed fat bodies, small imaginal discs), while
  partial-loss-of-function alleles confer increased oxidative-stress resistance and a
  female-specific lifespan extension, phenotypes consistent with impaired mitochondrial oxidative
  phosphorylation.
existing_annotations:
# --- Annotation 1: cytoplasm (IBA) ---
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetically inferred cytoplasmic localization propagated across the ACAD family tree.
      Egm is experimentally a mitochondrial protein (matrix/inner-membrane compartment); "cytoplasm"
      is an over-broad and imprecise compartment call for a mitochondrially imported protein whose
      specific localization (mitochondrion, mitochondrial matrix) is captured by more accurate
      annotations.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The IBA cytoplasm call reflects the mixed subcellular localizations of the broad ACAD panel
      used for the phylogenetic inference (some family members are cytosolic/peroxisomal). For Egm,
      direct experimental evidence places the protein in mitochondria (PMID:16434470), so the more
      specific GO:0005739 / GO:0005759 annotations should be preferred over the generic cytoplasm term.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "In Drosophila Kc-167 and SL2 cells, Egm is found almost exclusively in the mitochondrion."
# --- Annotation 2: mitochondrion (IBA) ---
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetically inferred mitochondrial localization. This is correct for Egm and directly
