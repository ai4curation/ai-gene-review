    summary: >-
      IGI annotation from Verheyen et al. 1996, a large second-site screen for dominant modifiers of an
      activated-Notch rough-eye phenotype, in which an Egm allele behaved as a genetic modifier of eye
      development. The cached record is abstract-only (full text unavailable), so the specific Egm allele
      data cannot be verified here; this is an experimental genetic-interaction annotation from FlyBase.
      Egm's requirement for eye development is independently supported by the cell-autonomous aberrant
      morphology of Egm-null eye clones (PMID:16434470), consistent with an essential mitochondrial gene
      being required for the energetically demanding eye morphogenesis rather than a dedicated eye-patterning
      function.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is an experimental (IGI) FlyBase annotation whose full text was read by the curator; per review
      guidelines it should not be removed merely because the cached entry is abstract-only. The eye
      requirement is corroborated by cell-autonomous Egm-null clone phenotypes (PMID:16434470). It is a
      pleiotropic/developmental consequence of Egm's essential mitochondrial role, so it is retained as
      non-core rather than a core function.
    supported_by:
    - reference_id: PMID:16434470
      supporting_text: "null Egm –/– clones show an aberrant morphology"
    - reference_id: PMID:8913755
      supporting_text: "a second-site mutagenesis screen was performed to isolate enhancers and suppressors of the eye phenotype caused by expression of these activated Notch molecules"
core_functions:
- description: >-
    Core function. Egm (dACAD9) is a core component of the mitochondrial complex I intermediate
    assembly (MCIA) complex and functions as a protein-macromolecule adaptor/scaffold that, together
    with the Drosophila orthologs of ECSIT and NDUFAF1, drives biogenesis of the membrane-arm PP-b
    (ND2) sub-module of respiratory chain complex I. Loss of Egm stalls CI assembly intermediates and
    destabilizes the partner MCIA factors, mirroring the essential, conserved CI-assembly role of
    human ACAD9.
  molecular_function:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
