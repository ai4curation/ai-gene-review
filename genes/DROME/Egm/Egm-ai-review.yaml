proposed_new_terms: []
suggested_questions:
- question: >-
    Does Drosophila Egm retain measurable FAD-dependent acyl-CoA dehydrogenase activity, and if so
    with what chain-length preference? By orthology to human ACAD9 a residual long/very-long-chain
    activity is expected, but the fly protein has never been enzymatically characterized, so the
    ISS/IEA enzymatic annotations remain unverified for Drosophila.
- question: >-
    Are the lipid-homeostasis, oxidative-stress and lifespan phenotypes of Egm mutants (PMID:16434470)
    a direct consequence of loss of an acyl-CoA dehydrogenase enzyme, or downstream effects of
    complex I / OXPHOS deficiency? The 2006 study predates the CI-assembly-factor paradigm, and the
    two interpretations make different predictions for a catalytically dead but assembly-competent allele.
suggested_experiments:
- description: >-
    Test the assembly-vs-enzyme separation of function in vivo by rescuing Egm-null larvae with (a)
    wild-type Egm, (b) a catalytically inactive (predicted active-site) Egm variant, and (c) a
    variant predicted to disrupt ECSIT/MCIA binding, then assay complex I assembly (BN-PAGE), CI
    activity, triglyceride levels, oxidative-stress resistance and viability. This would establish
    whether the essential function and the metabolic/longevity phenotypes depend on the CI-assembly
    activity, the dehydrogenase activity, or both.
  hypothesis: >-
    The CI-assembly (adaptor) function of Egm, not its residual dehydrogenase activity, accounts for
    its essential role and for the lipid/oxidative-stress/lifespan phenotypes, paralleling human
    ACAD9 where a catalytically dead mutant still rescues CI biogenesis.
- description: >-
    Biochemically characterize recombinant Egm: measure FAD occupancy and acyl-CoA dehydrogenase
    activity across a chain-length substrate panel (medium-, long-, very-long-chain acyl-CoA), and
    test whether the fly ECSIT ortholog induces deflavination of Egm as it does for human ACAD9.
  hypothesis: >-
    Egm binds FAD and has modest long/very-long-chain (not medium-chain) acyl-CoA dehydrogenase
    activity that is downregulated by ECSIT binding, consistent with the conserved deflavination
    switch of human ACAD9.
