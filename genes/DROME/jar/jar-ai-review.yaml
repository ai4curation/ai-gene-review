    - reference_id: PMID:15454264
      supporting_text: "Myosin VI is crucial for correct cell morphology and maintenance
        of adhesive cellular contacts within epithelial cell layers"

# --- Actin filament-based movement (NAS, PMID:1429838) ---
- term:
    id: GO:0030048
    label: actin filament-based movement
  evidence_type: NAS
  original_reference_id: PMID:1429838
  review:
    summary: >-
      NAS annotation for actin filament-based movement. Based on the original cloning
      paper
      which identified jar as a new unconventional myosin.
    action: ACCEPT
    reason: >-
      Reasonable inference from the original characterization as an unconventional
      myosin
      with a head domain similar to other myosins and ATP-binding, actin-binding motifs
      (PMID:1429838). Later confirmed by direct observation (PMID:8202156).
    supported_by:
    - reference_id: PMID:1429838
      supporting_text: "it represents a new class of unconventional myosin heavy chains...contains
        ATP-binding, actin-binding and calmodulin/myosin light chain-binding motifs"

# --- Actin binding (NAS, PMID:1429838) ---
- term:
    id: GO:0003779
    label: actin binding
  evidence_type: NAS
  original_reference_id: PMID:1429838
  review:
    summary: >-
      NAS annotation for actin binding. Based on original identification as an ATP-sensitive
      actin-binding protein.
    action: ACCEPT
    reason: >-
      jar was originally identified as "a 140-kD ATP-sensitive actin-binding protein"
      (PMID:1429838). The actin-binding domain was identified in the head region.
    supported_by:
    - reference_id: PMID:1429838
      supporting_text: "the molecular analysis of a 140-kD ATP-sensitive actin-binding
        protein"

# --- Actin binding (IDA, PMID:9472041) ---
- term:
    id: GO:0003779
    label: actin binding
  evidence_type: IDA
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IDA annotation for actin binding based on biochemical characterization.
    action: ACCEPT
    reason: >-
      jar is an actin-based motor. Actin binding is a fundamental property confirmed
      by
      multiple approaches (PMID:9472041, PMID:1429838).
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "a class VI unconventional myosin, the Drosophila 95F unconventional
        myosin, transports particles along actin filaments"

# --- Protein binding (IPI, PMID:9472041) ---
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IPI annotation for protein binding based on co-immunoprecipitation with D-CLIP-190.
    action: MODIFY
    reason: >-
      Per curation guidelines, 'protein binding' is uninformative. The specific interaction
      is with D-CLIP-190 (CLIP-170 homolog), a microtubule-binding protein. A more
      specific
      term describing microtubule-associated protein binding would be preferred.
    proposed_replacement_terms:
    - id: GO:0008017
      label: microtubule binding
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "a 195-kD protein that coimmunoprecipitates with a class VI
        myosin, Drosophila 95F unconventional myosin"

# --- Microtubule associated complex ---
- term:
    id: GO:0005875
    label: microtubule associated complex
  evidence_type: IDA
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IDA annotation for microtubule associated complex. jar co-immunoprecipitates
      with
      D-CLIP-190 and both cosediment with microtubules.
    action: ACCEPT
    reason: >-
      Directly demonstrated. jar physically associates with D-CLIP-190, which cosediments
      with microtubules (PMID:9472041). The complex links actin and microtubule systems.
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "Cloning and sequencing of the gene encoding the 195-kD protein
        reveals that it is the first homologue identified of cytoplasmic linker protein
        (CLIP)-170"

# --- Dorsal closure (IEP, PMID:1429838) ---
- term:
    id: GO:0007391
    label: dorsal closure
  evidence_type: IEP
  original_reference_id: PMID:1429838
  review:
    summary: >-
      IEP annotation for dorsal closure based on expression pattern. jar is expressed
      at
      high levels during mid-embryogenesis when dorsal closure occurs.
    action: ACCEPT
    reason: >-
      Although IEP evidence alone is weak, the direct role of jar in dorsal closure
      was
      confirmed by IMP evidence (PMID:15454264) and lethal mutant analysis showing
      defective
      dorsal closure (PMID:15454264). The IEP annotation is consistent with the confirmed
      role.
    supported_by:
    - reference_id: PMID:1429838
      supporting_text: "transcripts and protein are present throughout the life cycle,
        with peak expression occurring during mid-embryogenesis and adulthood"

# --- Microtubule binding ---
- term:
    id: GO:0008017
    label: microtubule binding
  evidence_type: IDA
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IDA annotation for microtubule binding. jar associates with microtubule-associated
      complexes through its interaction with D-CLIP-190.
    action: ACCEPT
    reason: >-
      Supported by co-immunoprecipitation with D-CLIP-190 which cosediments with microtubules,
      and colocalization on particulate structures that resemble vesicles (PMID:9472041).
      Note
      this is indirect microtubule association via D-CLIP-190 rather than direct microtubule
      binding by jar itself.
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "these two proteins may functionally link the actin and microtubule
        cytoskeletons"

# --- Unconventional myosin complex (NAS) ---
- term:
    id: GO:0016461
    label: unconventional myosin complex
  evidence_type: NAS
  original_reference_id: PMID:1429838
  review:
    summary: >-
      NAS annotation for unconventional myosin complex from the original cloning paper.
    action: ACCEPT
    reason: >-
      jar was identified as a new class of unconventional myosin heavy chains (PMID:1429838),
      later confirmed as class VI.
    supported_by:
    - reference_id: PMID:1429838
      supporting_text: "it represents a new class of unconventional myosin heavy chains"

# --- Unconventional myosin complex (IDA) ---
- term:
    id: GO:0016461
    label: unconventional myosin complex
  evidence_type: IDA
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IDA annotation for unconventional myosin complex. jar forms a complex with D-CLIP-190
      and light chains.
    action: ACCEPT
    reason: >-
      Directly demonstrated by immunoprecipitation. jar is a class VI unconventional
      myosin
      that forms multi-protein complexes (PMID:9472041).
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "a 195-kD protein that coimmunoprecipitates with a class VI
        myosin, Drosophila 95F unconventional myosin"

# --- Endocytic vesicle (IDA, PMID:9472041) ---
- term:
    id: GO:0030139
    label: endocytic vesicle
  evidence_type: IDA
  original_reference_id: PMID:9472041
  review:
    summary: >-
      IDA annotation for endocytic vesicle localization. jar colocalizes with D-CLIP-190
      on vesicle-like structures in neurons.
    action: ACCEPT
    reason: >-
      Directly observed. "In the axonal processes of neurons, they are colocalized
      in the same
      particulate structures, which resemble vesicles" (PMID:9472041). D-CLIP-190
      is a homolog
      of CLIP-170 which links endocytic vesicles to microtubules.
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "In the axonal processes of neurons, they are colocalized in
        the same particulate structures, which resemble vesicles"

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with 
    GO terms
  findings: []
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings: []
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular 
    Location vocabulary mapping
  findings: []
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning 
    models
  findings: []
- id: PMID:1429838
  title: An unconventional myosin heavy chain gene from Drosophila melanogaster.
  findings:
  - statement: >-
      jar was identified as a new class of unconventional myosin with a head domain
      29-33%
      identical to other myosins, containing ATP-binding, actin-binding, and calmodulin-binding
      motifs.
    supporting_text: "it represents a new class of unconventional myosin heavy chains...contains
      ATP-binding, actin-binding and calmodulin/myosin light chain-binding motifs"
- id: PMID:7790355
  title: The 95F unconventional myosin is required for proper organization of 
    the Drosophila syncytial blastoderm.
  findings:
  - statement: >-
      jar is required for normal actin-based transient membrane furrow formation,
      nuclear
      positioning, and actin cap organization in the syncytial blastoderm.
    supporting_text: "We propose that 95F myosin function is required to generate
      normal actin-based transient membrane furrows"
- id: PMID:8202156
  title: Transport of cytoplasmic particles catalysed by an unconventional 
    myosin in living Drosophila embryos.
  findings:
  - statement: >-
      jar catalyzes actin-based, ATP-dependent transport of cytoplasmic particles
      in living
      embryos. This was the first direct observation of unconventional myosin-catalyzed
      transport
      in living cells.
    supporting_text: "this transport is actin-based, ATP-dependent and catalysed by
      one such unconventional myosin, the 95F myosin"
- id: PMID:9351468
  title: Drosophila unconventional myosin VI is involved in intra- and 
    intercellular transport during oogenesis.
  findings:
  - statement: >-
      jar mediates microfilament-dependent transport of particles including mitochondria
      from
      nurse cells through ring canals into the oocyte.
    supporting_text: "this unconventional myosin of class VI is involved in the transport
      processes"
- id: PMID:9472041
  title: A class VI unconventional myosin is associated with a homologue of a 
    microtubule-binding protein, cytoplasmic linker protein-170, in neurons and 
    at the posterior pole of Drosophila embryos.
  findings:
  - statement: >-
      jar co-immunoprecipitates with D-CLIP-190 (CLIP-170 homolog), a microtubule-binding
      protein. They colocalize in neurons and at the posterior pole, suggesting a
      role in
      actin-microtubule coordination.
    supporting_text: "these two proteins may functionally link the actin and microtubule
      cytoskeletons"
- id: PMID:10523504
  title: A targeted gene silencing technique shows that Drosophila myosin VI is 
    required for egg chamber and imaginal disc morphogenesis.
  findings:
  - statement: >-
      jar is required for follicle cell migration, egg chamber morphogenesis, and
      imaginal
      disc morphogenesis. Loss causes aberrant follicle cell shapes and lethality.
    supporting_text: "the Drosophila myosin VI is required for follicle cell epithelial
      morphogenesis"
- id: PMID:10588662
  title: Class VI unconventional myosin is required for spermatogenesis in 
    Drosophila.
  findings:
  - statement: >-
      jar is a component of the individualization complex (IC) and is essential for
      spermatid
      individualization. Partial loss-of-function causes male sterility rescued by
      transgene expression.
    supporting_text: "95F myosin is a component of the IC whose function is essential
      for individualization"
- id: PMID:12134162
  title: Myosin VI is required for E-cadherin-mediated border cell migration.
  findings:
  - statement: >-
      jar is required for border cell migration via stabilization of E-cadherin and
      Armadillo.
      jar and Armadillo co-immunoprecipitate.
    supporting_text: "MyoVI is required for border cell migration where it stabilizes
      E-cadherin and Arm"
- id: PMID:12432073
  title: A role for myosin VI in actin dynamics at sites of membrane remodeling 
    during Drosophila spermatogenesis.
  findings:
  - statement: >-
      jar colocalizes with and is required for accumulation of cortactin and Arp2/3
      at actin
      structures during spermatogenesis. jar and dynamin act in parallel to regulate
      actin dynamics.
    supporting_text: "myosin VI and dynamin function in parallel pathways that regulate
      actin dynamics"
- id: PMID:12586070
  title: The Drosophila myosin VI Jaguar is required for basal protein targeting
    and correct spindle orientation in mitotic neuroblasts.
  findings:
  - statement: >-
      jar is required for basal targeting of Miranda and correct spindle orientation
      in
      neuroblasts. Miranda directly binds jar.
    supporting_text: "Miranda localization requires the unconventional myosin VI Jaguar
      (Jar)"
- id: PMID:12620217
  title: 'Asymmetric cell division: Miranda chauffeured by Jaguar?'
  findings:
  - statement: >-
      Review/commentary discussing how myosin VI (Jaguar) transports Miranda basally
      in neuroblasts for asymmetric cell division.
    supporting_text: "a myosin VI (Jaguar) has been shown to be necessary for basal
      targeting of cell fate determinants in neuroblasts"
- id: PMID:15454264
  title: Myosin VI plays a role in cell-cell adhesion during epithelial 
    morphogenesis.
  findings:
  - statement: >-
      jar is required for dorsal closure and maintenance of cell-cell adhesion in
      epithelia.
      Mutants show cell detachment and irregular epithelial sheets.
    supporting_text: "Myosin VI is crucial for correct cell morphology and maintenance
      of adhesive cellular contacts within epithelial cell layers"
- id: PMID:16126191
  title: Drosophila myosin V is required for larval development and spermatid 
    individualization.
  findings:
  - statement: >-
      Study primarily about myosin V (MyoV). Both myosin V and myosin VI contribute
      to
      spermatid individualization, but with distinct roles.
    supporting_text: "MyoV contributes to the formation of the actin-based investment
      cones and acts to coordinate and/or anchor these structures"
- id: PMID:16571671
  title: Myosin VI stabilizes an actin network during Drosophila spermatid 
    individualization.
  findings:
  - statement: >-
      jar stabilizes a branched actin network in actin cones during spermatid individualization.
      FRAP shows jar tethers rather than transports at cone fronts.
    supporting_text: "myosin VI stabilizes a branched actin network in actin structures
      (cones) that mediate the separation of the syncytial spermatids"
- id: PMID:16790438
  title: Androcam is a tissue-specific light chain for myosin VI in the 
    Drosophila testis.
  findings:
  - statement: >-
      Androcam (Acam) is a testis-specific light chain for jar. They colocalize at
      actin
      cone leading edges and co-immunoprecipitate. Androcam replaces calmodulin in
      the testis.
    supporting_text: "Acam and not CaM acts as a myosin VI light chain in the Drosophila
      testis"
- id: PMID:16917818
  title: Native nonmuscle myosin II stability and light chain binding in 
    Drosophila melanogaster.
  findings:
  - statement: >-
      jar (myosin VI) was identified as a binding partner for the essential light
      chain
      by mass spectrometry and co-precipitation.
    supporting_text: "We identify four myosins (myosin II, myosin V, myosin VI and
      myosin VIIA)...as binding partners for the essential light chain"
- id: PMID:19204120
  title: Protein phosphatase 4 mediates localization of the Miranda complex 
    during Drosophila neuroblast asymmetric divisions.
  findings:
  - statement: >-
      PP4 phosphatase pathway mediates Miranda complex localization during neuroblast
      asymmetric divisions. PP4 acts in parallel to or downstream from lgl.
    supporting_text: "Protein Phosphatase 4 (PP4) regulatory subunit PP4R3/Falafel
      (Flfl) as a key mediator specific for the localization of Miranda (Mira)"
- id: PMID:20592219
  title: Evidence that myosin activity opposes microtubule-based axonal 
    transport of mitochondria.
  findings:
  - statement: >-
      jar (myosin VI) opposes microtubule-based retrograde mitochondrial transport
      in neurons.
      Depletion increases retrograde transport velocity and duty cycle.
    supporting_text: "Myosin VI depletion increased the same movement parameters but
      was selective for retrograde movement"
- id: PMID:21368190
  title: Proteomics approach to study the functions of Drosophila myosin VI 
    through identification of multiple cargo-binding proteins.
  findings:
  - statement: >-
      Multiple cargo-binding partners identified for jar including Cornetto. jar and
      Cornetto
      are both required for Hedgehog secretion.
    supporting_text: "the microtubule-associated protein Cornetto bound myosin VI,
      and we demonstrated a role for both in secretion of the lipidated morphogen
      Hedgehog"
- id: PMID:21853045
  title: Myosin VI regulates actin structure specialization through conserved 
    cargo-binding domain sites.
  findings:
  - statement: >-
      Both motor and cargo-binding domains of jar are required for actin cone localization
      and function. Conserved partner-binding sites in the tail are critical.
    supporting_text: "The head (motor) and globular tail (cargo-binding) domains were
      both needed for localization at the cone front and dense meshwork formation"
- id: file:DROME/jar/jar-deep-research-bioreason-sft.md
  title: BioReason deep research for jar
  findings:
  - statement: >-
      BioReason SFT model describes jar as an actin-based, minus-end-directed motor
      using an
      ATP-hydrolyzing head and calmodulin-regulated lever arm. The domain architecture
      analysis
      correctly identifies the motor, lever arm, and cargo-binding domains and their
      functional
      implications.
- id: PMID:25694447
  title: Drosophila CLIP-190 and mammalian CLIP-170 display reduced microtubule 
    plus end association in the nervous system.
  findings:
  - statement: >-
      CLIP-190 forms F-actin-dependent patches in growth cones mediated by binding
      to
      jar (myosin VI). CLIP proteins are not essential for axon extension.
    supporting_text: "CLIP-190 and CLIP-170 form F-actin-dependent patches in growth
      cones, mediated by binding of the coiled-coil domain to myosin-VI"

core_functions:
- description: >-
    Actin-based minus-end-directed motor activity. jar is a class VI unconventional
    myosin
    that catalyzes ATP-dependent transport of cytoplasmic particles along actin filaments
    toward the pointed (minus) end. This motor activity underlies its diverse cellular
    functions
    including particle transport in embryos and nurse cell-to-oocyte transport.
  molecular_function:
    id: GO:0000146
    label: microfilament motor activity
  directly_involved_in:
  - id: GO:0030048
    label: actin filament-based movement
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0016461
    label: unconventional myosin complex
  in_complex:
    id: GO:0031476
    label: myosin VI complex
  supported_by:
  - reference_id: PMID:8202156
    supporting_text: "this transport is actin-based, ATP-dependent and catalysed by
      one such unconventional myosin, the 95F myosin"

- description: >-
    Actin structure stabilization during spermatid individualization. jar stabilizes
    the
    branched actin network in investment cones that mediate membrane remodeling during
    spermatid separation. It acts by tethering/cross-linking actin filaments rather
    than
    transporting cargo, with slow turnover at cone fronts.
  molecular_function:
    id: GO:0051015
    label: actin filament binding
  directly_involved_in:
  - id: GO:0007291
    label: sperm individualization
  - id: GO:0032970
    label: regulation of actin filament-based process
  locations:
  - id: GO:0070865
    label: investment cone
  - id: GO:0070864
    label: sperm individualization complex
  supported_by:
  - reference_id: PMID:16571671
    supporting_text: "myosin VI stabilizes a branched actin network in actin structures
      (cones) that mediate the separation of the syncytial spermatids"
  - reference_id: PMID:16571671
    supporting_text: "myosin VI remains bound to F-actin for minutes, suggesting its
      role is tethering, rather than transporting cargo"

- description: >-
    Basal protein targeting and spindle orientation in neuroblasts. jar binds Miranda
    directly and transports it basally during asymmetric neuroblast division. This
    is
    required for proper spindle orientation and asymmetric cell fate determination.
  molecular_function:
    id: GO:0000146
    label: microfilament motor activity
  directly_involved_in:
  - id: GO:0045175
    label: basal protein localization
  - id: GO:0045167
    label: asymmetric protein localization involved in cell fate determination
  - id: GO:0055057
    label: neuroblast division
  locations:
  - id: GO:0045178
    label: basal part of cell
  - id: GO:0005938
    label: cell cortex
  supported_by:
  - reference_id: PMID:12586070
    supporting_text: "Miranda directly binds to Jar, raising the possibility that
      Miranda and its associated proteins are translocated basally by this actin-based
      motor"

- description: >-
    Border cell migration via E-cadherin stabilization. jar is required for E-cadherin-mediated
    border cell migration during oogenesis by stabilizing E-cadherin and Armadillo
    at
    the membrane.
  molecular_function:
    id: GO:0000146
    label: microfilament motor activity
  directly_involved_in:
  - id: GO:0007298
    label: border follicle cell migration
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:12134162
    supporting_text: "MyoVI is required for border cell migration where it stabilizes
      E-cadherin and Arm"

- description: >-
    Actin-microtubule coordination via D-CLIP-190 interaction. jar associates with
    D-CLIP-190 (CLIP-170 homolog) to coordinate actin- and microtubule-based transport,
    linking endocytic vesicles to both cytoskeletal systems in neurons and at the
    posterior pole of embryos.
  molecular_function:
    id: GO:0008017
    label: microtubule binding
  directly_involved_in:
  - id: GO:0006897
    label: endocytosis
  locations:
  - id: GO:0030139
    label: endocytic vesicle
  supported_by:
  - reference_id: PMID:9472041
    supporting_text: "these two proteins may functionally link the actin and microtubule
      cytoskeletons"
  in_complex:
    id: GO:0005875
    label: microtubule associated complex
