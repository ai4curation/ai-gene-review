- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for cytoplasmic localization. Directly supported by multiple
      IDA
      experiments in Drosophila showing jar localizes to the peripheral cytoplasm
      in
      punctate patterns in embryos.
    action: ACCEPT
    reason: >-
      Consistent with experimental data from multiple studies. jar was detected in
      the
      cytoplasm by immunolocalization in embryos (PMID:1429838), syncytial blastoderm
      (PMID:7790355), and other tissues (PMID:10523504, PMID:12586070).
    supported_by:
    - reference_id: PMID:7790355
      supporting_text: "The 95F myosin, a class VI unconventional myosin, associates
        with particles in the cytoplasm of the Drosophila syncytial blastoderm"

- term:
    id: GO:0000146
    label: microfilament motor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for microfilament motor activity. jar is a class VI unconventional
      myosin
      that catalyzes actin-based ATP-dependent particle translocation. The BioReason
      deep
      research correctly identifies this activity from the domain architecture.
    action: ACCEPT
    reason: >-
      Directly supported by experimental evidence that jar catalyzes actin-based,
      ATP-dependent
      transport of cytoplasmic particles in living embryos (PMID:8202156). The motor
      domain
      contains conserved ATP-binding and actin-binding motifs (PMID:1429838).
    supported_by:
    - reference_id: PMID:8202156
      supporting_text: "this transport is actin-based, ATP-dependent and catalysed
        by one such unconventional myosin, the 95F myosin"
    - reference_id: file:DROME/jar/jar-deep-research-bioreason-sft.md
      supporting_text: "An actin-based, minus-end-directed motor that uses an ATP-hydrolyzing
        head and a calmodulin-regulated lever arm to generate force on actin filaments"

- term:
    id: GO:0006897
    label: endocytosis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for endocytosis based on phylogenetic inference from vertebrate
      myosin VI
      roles in endocytosis. In Drosophila, jar associates with D-CLIP-190, which is
      a homolog of
      CLIP-170, a protein that links endocytic vesicles to microtubules.
    action: ACCEPT
    reason: >-
      Supported by the association with D-CLIP-190 (endocytic vesicle-microtubule
      linker)
      and localization to endocytic vesicles (PMID:9472041). The vertebrate ortholog
      MYO6
      has well-established endocytic functions.
    supported_by:
    - reference_id: PMID:9472041
      supporting_text: "it is the first homologue identified of cytoplasmic linker
        protein (CLIP)-170, a protein that links endocytic vesicles to microtubules"

