id: Q01989
gene_symbol: jar
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  jar (jaguar) encodes the sole Drosophila class VI unconventional myosin (Myosin
  heavy chain 95F).
  Myosin VI is unique among myosins in moving toward the minus (pointed) end of actin
  filaments.
  jar is a pleiotropic motor protein with essential roles in spermatid individualization
  (stabilizing
  actin cones), cytoplasmic particle transport in embryos, syncytial blastoderm organization,
  oogenesis transport through ring canals, neuroblast asymmetric division (basal targeting
  of
  Miranda), border cell migration (stabilizing E-cadherin), dorsal closure, epithelial
  morphogenesis,
  and coordination of actin-microtubule crosstalk via interaction with D-CLIP-190.
  It binds
  Androcam as a testis-specific light chain and calmodulin in other tissues.
alternative_products:
- name: B (G, J, K, Em-3)
  id: Q01989-1
- name: H (C, Em-1)
  id: Q01989-2
  sequence_note: VSP_003343
- name: I (D, Em-5)
  id: Q01989-3
  sequence_note: VSP_003344, VSP_003345
- name: 145 kDa
  id: Q01989-4
  sequence_note: Not described
