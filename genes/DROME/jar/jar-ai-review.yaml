# --- Flagellated sperm motility ---
- term:
    id: GO:0030317
    label: flagellated sperm motility
  evidence_type: IMP
  original_reference_id: PMID:10588662
  review:
    summary: >-
      IMP annotation for flagellated sperm motility. jar mutations cause male sterility
      because spermatids fail to individualize and thus cannot become motile.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is an indirect consequence of the individualization defect rather than
      a direct
      role in sperm motility. jar is not a flagellar motor -- it is required for the
      individualization process that is a prerequisite for motile sperm production.
    supported_by:
    - reference_id: PMID:10588662
      supporting_text: "This reduction of 95F myosin causes male sterility as a result
        of defects in spermatid individualization"

