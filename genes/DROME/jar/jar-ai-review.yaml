# --- Mitochondrion transport ---
- term:
    id: GO:0047497
    label: mitochondrion transport along microtubule
  evidence_type: IDA
  original_reference_id: PMID:20592219
  review:
    summary: >-
      IDA annotation for mitochondrial transport regulation. RNAi depletion of jar
      selectively
      increased retrograde mitochondrial transport in neurons, suggesting jar opposes
      microtubule-based transport to facilitate docking.
    action: ACCEPT
    reason: >-
      Directly demonstrated by RNAi experiments. "Myosin VI depletion increased the
      same
      movement parameters but was selective for retrograde movement" (PMID:20592219).
      While
      jar opposes rather than promotes this transport, it is still directly involved
      in
      regulating the process.
    supported_by:
    - reference_id: PMID:20592219
      supporting_text: "Myosin VI depletion increased the same movement parameters
        but was selective for retrograde movement"

