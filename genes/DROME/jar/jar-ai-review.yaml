# --- Spindle organization ---
- term:
    id: GO:0007051
    label: spindle organization
  evidence_type: IMP
  original_reference_id: PMID:7790355
  review:
    summary: >-
      IMP annotation for spindle organization. Loss of jar function leads to defective
      pseudocleavage furrows that fail to separate adjacent spindles.
    action: KEEP_AS_NON_CORE
    reason: >-
      The spindle defects are secondary to the actin furrow defects. "These furrows
      do not
      separate adjacent mitoses, since microtubules cross over them. These inappropriate
      microtubule interactions lead to aberrant nuclear divisions" (PMID:7790355).
      The primary
      role of jar here is in furrow formation, not directly in spindle assembly.
    supported_by:
    - reference_id: PMID:7790355
      supporting_text: "These furrows do not separate adjacent mitoses, since microtubules
        cross over them. These inappropriate microtubule interactions lead to aberrant
        nuclear divisions"

