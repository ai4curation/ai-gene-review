id: Q9VRR2
gene_symbol: PXo
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  PXo (Pi-sensitive XPR1 ortholog) is a phosphate exporter belonging to the SYG1/XPR1 family
  (solute carrier family 53). It contains an N-terminal SPX domain that senses inositol
  polyphosphates and a C-terminal EXS domain forming the transmembrane pore for phosphate
  transport. PXo localizes to the membranes of novel multilamellar organelles called PXo bodies,
  found primarily in enterocytes and differentiating progenitors of the Drosophila midgut.
  PXo transports cytosolic inorganic phosphate (Pi) into PXo bodies, where the Pi is converted
  and stored as phospholipids. PXo also interacts with and antagonizes the STRIPAK complex
  component Cka, thereby suppressing Cka-JNK-mediated cell proliferation. Upon Pi starvation,
  PXo is downregulated, PXo bodies degrade releasing stored Pi, and Cka-JNK signaling is
  activated to induce regenerative hyperproliferation of the midgut epithelium.
existing_annotations:
- term:
    id: GO:0005315
    label: phosphate transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      PXo is the Drosophila ortholog of mammalian XPR1, a well-characterized phosphate
      transporter. IBA annotation is based on phylogenetic inference from orthologs including
      human XPR1 (Q9UBH6), S. pombe, Arabidopsis, and zebrafish orthologs.
    action: ACCEPT
    reason: >-
      This is a core molecular function of PXo. The paper demonstrates PXo mediates phosphate
      transport from the cytosol into PXo bodies using FRET-based Pi sensors (PMID:37138087).
      UniProt annotates its catalytic activity as phosphate transport. The IBA annotation
      from phylogenetic analysis is well supported by experimental evidence.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo is expected to mediate Pi transport from the cytosol into PXo bodies
    - reference_id: file:genes/DROME/PXo/PXo-uniprot.txt
      supporting_text: >-
        Inorganic ion transporter that mediates phosphate ion export across the cell membrane

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation places PXo at the plasma membrane based on phylogenetic inference from
      orthologs. However, experimental evidence in Drosophila shows PXo predominantly localizes
      to the membranes of PXo bodies (multilamellar organelles), not the plasma membrane.
    action: MODIFY
    reason: >-
      While orthologs such as human XPR1 have been shown at the plasma membrane, the primary
      experimental evidence for Drosophila PXo shows it localizes to organelle membranes
      (PXo bodies), not the plasma membrane. The IDA annotation to organelle membrane
      (GO:0031090) is more accurate for the Drosophila protein. The IBA is based on orthologs
      that may have different localization.
    proposed_replacement_terms:
    - id: GO:0031090
      label: organelle membrane
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        both N-terminal tagged GFP-PXo and C-terminal tagged PXo-HA are markers of oval shape
        structures in the fly midgut
    - reference_id: file:genes/DROME/PXo/PXo-uniprot.txt
      supporting_text: >-
        Localizes to the membrane of multi-membrane-layered organelles called PXo bodies

- term:
    id: GO:0006817
    label: phosphate ion transport
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in phosphate ion transport, based on phylogenetic
      inference across the XPR1/SYG1 family.
    action: ACCEPT
    reason: >-
      This is a core biological process for PXo. The paper demonstrates that PXo transports
      cytosolic Pi into PXo bodies, and PXo knockdown decreases FRET ratios (indicating
      increased cytosolic Pi) in enterocytes (PMID:37138087).
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo transports cytosolic Pi into PXo bodies, which is critical to restrict cytosolic
        Pi levels in ECs

- term:
    id: GO:0000822
    label: inositol hexakisphosphate binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for InsP6 binding, based on phylogenetic inference. The SPX domain of
      XPR1 family members binds inositol polyphosphates to regulate phosphate flux.
    action: ACCEPT
    reason: >-
      The SPX domain of PXo is conserved and the paper describes its role in Pi sensing
      through InsP binding (PMID:37138087). UniProt confirms InsP6 binding by similarity
      with human XPR1. The phylogenetic inference is sound for this conserved domain function.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        a N-terminal SPX domain which faces the cytosol and confers a gating mechanism on
        intracellular Pi levels by undergoing conformational change upon binding with
        Pi-derived InsPs
    - reference_id: file:genes/DROME/PXo/PXo-uniprot.txt
      supporting_text: >-
        Binds inositol hexakisphosphate (Ins6P) and similar inositol polyphosphates, such as
        5-diphospho-inositol pentakisphosphate (5-InsP7)

- term:
    id: GO:0016036
    label: cellular response to phosphate starvation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for involvement in the cellular response to phosphate starvation,
      based on phylogenetic inference from plant orthologs (Arabidopsis).
    action: ACCEPT
    reason: >-
      PXo is centrally involved in the cellular response to phosphate starvation. Upon Pi
      starvation, PXo is downregulated, PXo bodies undergo degradation, and stored Pi is
      released back to the cytosol (PMID:37138087). This is a core function of PXo.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        Pi starvation triggers PXo downregulation and PXo body degradation as a compensatory
        mechanism to increase cytosolic Pi
    - reference_id: PMID:37138087
      supporting_text: >-
        RT-qPCR reveals that PXo expression is down-regulated in the midgut following Pi
        starvation

- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation to membrane based on InterPro EXS domain annotation and UniProt
      subcellular location. This is a broad CC term.
    action: ACCEPT
    reason: >-
      PXo is a multi-pass transmembrane protein with 10 transmembrane helices. This broad
      IEA annotation is correct though less specific than the IDA to organelle membrane.
      It is acceptable as an IEA-level annotation.
    supported_by:
    - reference_id: file:genes/DROME/PXo/PXo-uniprot.txt
      supporting_text: >-
        Membrane; Multi-pass membrane protein

- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation inferred from the phosphate transmembrane transporter activity
      (GO:0005315) via logical inference. Transmembrane transport is a parent process
      of phosphate ion transport.
    action: ACCEPT
    reason: >-
      This is a logically inferred annotation from the MF term GO:0005315 (phosphate
      transmembrane transporter activity). Since PXo is indeed a transmembrane transporter,
      this broad BP annotation is correct, though less specific than GO:0006817 (phosphate
      ion transport).

- term:
    id: GO:0005315
    label: phosphate transmembrane transporter activity
  evidence_type: IMP
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IMP annotation based on the finding that PXo knockdown increases cytosolic Pi levels
      (measured by FRET sensor), and PXo overexpression decreases cytosolic Pi, demonstrating
      PXo transports Pi across membranes (PMID:37138087).
    action: ACCEPT
    reason: >-
      This is a core molecular function of PXo demonstrated experimentally. The FRET-based
      Pi sensor (FLIPPi) showed that PXo knockdown decreases FRET ratios in ECs (indicating
      increased cytosolic Pi), while overexpression increases FRET ratios (decreased cytosolic
      Pi). This directly demonstrates phosphate transmembrane transporter activity.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo knockdown decreases FRET ratios in ECs
    - reference_id: PMID:37138087
      supporting_text: >-
        both the ECs and the progenitors with PXo overexpression exhibit increased FRET ratios

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IPI annotation for binding to Cka (UniProtKB:D3DML3), based on co-immunoprecipitation
      and mass spectrometry interaction data from PMID:37138087. PXo interacts with STRIPAK
      complex component Cka and sequesters it.
    action: MODIFY
    reason: >-
      While the interaction with Cka is well-supported by co-IP data, the term 'protein
      binding' (GO:0005515) is uninformative. The interaction is functionally significant
      as PXo sequesters Cka to prevent JNK activation. A more specific term would be
      appropriate but none exists in GO for transporter-scaffold sequestration. At minimum
      this should be kept but flagged as needing a more informative term.
    proposed_replacement_terms:
    - id: GO:0005515
      label: protein binding
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        We first validated direct PXo:Cka and PXo:Pp2A-29B interactions by co-immunoprecipitation
        (Co-IP)
    - reference_id: PMID:37138087
      supporting_text: >-
        Flag-Cka often co-localizes with GFP-PXo and even gets encased by PXo bodies in ECs

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IPI annotation for binding to Pp2A-29B (UniProtKB:P36179), based on
      co-immunoprecipitation and mass spectrometry data from PMID:37138087. PXo interacts
      with the STRIPAK complex component Pp2A-29B.
    action: MODIFY
    reason: >-
      As with the Cka interaction, the term 'protein binding' is uninformative. The
      interaction with Pp2A-29B (a STRIPAK complex phosphatase subunit) is validated
      by co-IP but a more specific MF term would be desirable.
    proposed_replacement_terms:
    - id: GO:0005515
      label: protein binding
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        We first validated direct PXo:Cka and PXo:Pp2A-29B interactions by co-immunoprecipitation
        (Co-IP)

- term:
    id: GO:0008285
    label: negative regulation of cell population proliferation
  evidence_type: IMP
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IMP annotation based on the observation that PXo knockdown in enterocytes or
      progenitors causes midgut hyperproliferation. PXo overexpression inhibits Pi
      starvation-induced hyperproliferation (PMID:37138087).
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a well-supported downstream biological effect of PXo activity, but it is
      not the core evolved function. PXo is primarily a phosphate transporter. The
      proliferation effect is mediated indirectly through the Cka-JNK signaling cascade
      that PXo regulates via protein sequestration. This is a secondary consequence of
      PXo phosphate homeostasis function.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        Expression of three different PXo RNAi lines...in either ECs or progenitors induces
        mitosis under both normal feeding and tissue damage conditions
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo overexpression in ECs inhibits Pi starvation-induced hyperproliferation

- term:
    id: GO:0030643
    label: intracellular phosphate ion homeostasis
  evidence_type: IMP
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IMP annotation based on FRET sensor data showing PXo restricts cytosolic Pi levels
      by transporting Pi into PXo bodies, where it is stored as phospholipids. PXo knockdown
      elevates cytosolic Pi in enterocytes (PMID:37138087).
    action: ACCEPT
    reason: >-
      This is a core biological process for PXo. The paper directly demonstrates that PXo
      regulates intracellular Pi levels using FRET-based Pi sensors. PXo bodies serve as
      intracellular Pi reserves, and PXo is essential for their biogenesis and maintenance.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        our study uncovers PXo bodies as a critical regulator of cytosolic Pi levels
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo restricts cytosolic Pi levels

- term:
    id: GO:0031090
    label: organelle membrane
  evidence_type: IDA
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IDA annotation based on immunostaining and immunogold electron microscopy showing PXo
      localizes to the membrane of multilamellar organelles (PXo bodies) in the midgut
      (PMID:37138087).
    action: ACCEPT
    reason: >-
      PXo is directly observed on the membrane of PXo bodies by immunostaining, GFP-tagging,
      HA-tagging, and immunogold EM in both plastic and frozen midgut sections. This is the
      primary subcellular localization of PXo in Drosophila.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        Ultrastructural analysis by electron microscopy (EM) with immunogold labeling in both
        plastic and frozen midgut sections reveals GFP-PXo as a membrane marker for
        multilamellar organelles
    - reference_id: PMID:37138087
      supporting_text: >-
        with heat-induced antigen retrieval (HIAR), immunolabeling EM detects the enrichment
        of endogenous PXo in these multilamellar structures in wild type midguts

- term:
    id: GO:0043508
    label: negative regulation of JUN kinase activity
  evidence_type: IMP
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IMP annotation based on the finding that PXo knockdown leads to dramatic JNK induction
      (measured by Puc-lacZ reporter) in enterocytes and progenitors, and that Cka and bsk
      (JNK) knockdown rescues PXo-knockdown-induced hyperproliferation (PMID:37138087).
    action: KEEP_AS_NON_CORE
    reason: >-
      The regulation of JNK activity is well-supported experimentally but is an indirect
      downstream effect of PXo function. PXo antagonizes Cka at the post-translational level;
      when PXo is lost, Cka accumulates and activates JNK (bsk). This is mechanistically
      important but secondary to the core phosphate transport function.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        we observed dramatic JNK induction in ECs and progenitors that are proliferating and
        differentiating towards ECs following PXo knockdown
    - reference_id: PMID:37138087
      supporting_text: >-
        RNAi lines targeting Cka, the JNK pathway kinase bsk, or several other core STRIPAK
        genes (Mob4, Strip, mts) all rescue the hyperproliferation induced by PXo knockdown
        in ECs

- term:
    id: GO:0140255
    label: regulation of cellular response to phosphate starvation
  evidence_type: IMP
  original_reference_id: PMID:37138087
  review:
    summary: >-
      IMP annotation based on the finding that PXo is a central regulator of the cellular
      response to phosphate starvation. PXo overexpression suppresses Pi starvation-induced
      hyperproliferation, while PXo knockdown mimics Pi starvation effects (PMID:37138087).
    action: ACCEPT
    reason: >-
      PXo is a key regulator of the cellular Pi starvation response. PXo bodies store Pi as
      phospholipids and release it upon Pi starvation when PXo is downregulated. PXo
      overexpression blocks the starvation-induced proliferative response. The PXo-Cka-JNK
      cascade is the signaling mechanism that links Pi sensing to tissue homeostasis.
    supported_by:
    - reference_id: PMID:37138087
      supporting_text: >-
        PXo overexpression in ECs inhibits Pi starvation-induced hyperproliferation
    - reference_id: PMID:37138087
      supporting_text: >-
        identifies a Pi-dependent PXo-Cka-JNK signalling cascade controlling tissue
        homeostasis

references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: PXo is annotated by phylogenetic inference as a phosphate transmembrane
      transporter with InsP6 binding activity, located at the plasma membrane.
    supporting_text: >-
      IBA annotations propagated from orthologs including human XPR1, S. pombe, Arabidopsis,
      and zebrafish members of the SYG1/XPR1 family.
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on inter-ontology
    links
  findings:
  - statement: Transmembrane transport is inferred from phosphate transmembrane transporter
      activity via inter-ontology logical links.
    supporting_text: >-
      GO:0055085 (transmembrane transport) is logically inferred from GO:0005315
      (phosphate transmembrane transporter activity).
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Membrane localization inferred from InterPro EXS domain and UniProt
      subcellular location.
    supporting_text: >-
      IEA annotation based on InterPro:IPR004342 (EXS_C domain) and UniProtKB-SubCell:SL-0162.
- id: PMID:37138087
  title: A phosphate-sensing organelle regulates phosphate and tissue homeostasis.
  findings:
  - statement: PXo is a phosphate transporter that localizes to novel multilamellar
      organelles (PXo bodies) in midgut enterocytes and progenitors.
    supporting_text: >-
      PXo is expected to mediate Pi transport from the cytosol into PXo bodies...given
      its predominant localization to the membranes of PXo bodies
  - statement: PXo bodies are intracellular Pi reserves that store phosphate as phospholipids.
    supporting_text: >-
      Pi consumed by the PXo body can be converted and stored in the form of phospholipids
  - statement: PXo restricts cytosolic Pi levels, demonstrated by FRET-based Pi sensor.
    supporting_text: >-
      PXo knockdown decreases FRET ratios in ECs
  - statement: PXo interacts with STRIPAK complex components Cka and Pp2A-29B.
    supporting_text: >-
      We first validated direct PXo:Cka and PXo:Pp2A-29B interactions by co-immunoprecipitation
      (Co-IP)
  - statement: PXo antagonizes Cka at post-translational level to prevent Cka-JNK
      mediated hyperproliferation.
    supporting_text: >-
      PXo interacts with Cka and antagonizes Cka expression via post-translational
      sequestering in ECs
  - statement: Upon Pi starvation, PXo is downregulated and PXo bodies degrade, activating
      Cka-JNK signaling and regenerative proliferation.
    supporting_text: >-
      Pi starvation triggers PXo downregulation and PXo body degradation as a compensatory
      mechanism to increase cytosolic Pi

