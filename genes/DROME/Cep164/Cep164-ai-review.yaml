core_functions:
- description: >-
    Structural component of ciliary transition fibers at the base of cilia in both sensory
    neurons and spermatocytes. Forms ring-like structures surrounding microtubule doublets.
    Although a conserved TF protein, Cep164 is dispensable for IFT-dependent ciliogenesis
    in Drosophila, unlike its vertebrate ortholog.
