  findings:
  - statement: Cep164 is a transition fiber protein that localizes to the ciliary base
    supporting_text: >-
      key TF proteins, FBF1, CEP164, and CEP89, have obvious homologs in Drosophila.
  - statement: Cep164 localizes at the ciliary base in both ciliated cell types in
      Drosophila
    supporting_text: >-
      all three proteins are localized
      like TF proteins at the ciliary base in both sensory neurons and spermatocytes,
      the only two types of ciliated cells in flies.
  - statement: Cep164 is dispensable for ciliogenesis in Drosophila
    supporting_text: >-
      Fbf1 and Cep89 are essential for
      the formation of IFT-dependent neuronal cilia, but Cep164 is dispensable for
      ciliogenesis in flies.
  - statement: None of the three TF proteins are required for basal body docking
    supporting_text: >-
      none are required for basal body docking and
      transition zone (TZ) assembly in IFT-dependent neuronal cilia or IFT-independent
      spermatocyte cilia.
  - statement: Unc recruits all three TF proteins in a hierarchical manner
    supporting_text: >-
      Unc is essential to recruit
      all three TF proteins and establish a hierarchical order, with Cep89 acting on
      Fbf1.
  - statement: TF function in basal body docking has diverged during evolution
    supporting_text: >-
      TF proteins are
      required for IFT-dependent ciliogenesis in Drosophila, in agreement with an
      evolutionarily conserved function of these proteins in regulating ciliary
      protein entry, but also that the basal body docking function of TFs has diverged
      during evolution.
