suggested_questions:
- question: >-
    What is the specific molecular function of Drosophila Cep164 at transition fibers,
    given that it is dispensable for ciliogenesis?
- question: >-
    Does the WW domain of Drosophila Cep164 interact with a TTBK2 ortholog, as in
    vertebrates, and if so, what is the functional consequence?
- question: >-
    Is there genetic redundancy between Cep164 and other TF components in Drosophila that
    could mask Cep164 phenotypes?
- question: >-
    Does Cep164 have any role in spermatogenesis or male fertility that has not been
    detected in standard assays?
suggested_experiments:
- description: >-
    Co-immunoprecipitation and proximity labeling (BioID/TurboID) to identify Cep164
    protein interaction partners at the ciliary base, particularly to test whether the WW
    domain mediates interactions analogous to the vertebrate CEP164-TTBK2 interaction.
- description: >-
    Systematic genetic interaction analysis combining Cep164 mutants with Fbf1 and Cep89
    mutants to test for redundancy and synthetic phenotypes in ciliogenesis.
- description: >-
    Detailed analysis of sensory neuron function (mechanosensation, chemosensation) in
    Cep164 mutants, as subtle ciliary defects may not abolish cilia but could impair
    sensory function.
- description: >-
    Domain deletion analysis of the WW domain in Drosophila Cep164 to determine if it is
    required for transition fiber localization or protein-protein interactions.
