id: Q9VXK9
gene_symbol: Cep164
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Drosophila Cep164 (CG9170) is the ortholog of human CEP164, a component of ciliary
  transition fibers (TFs). The protein contains a WW domain (residues 81-115), coiled-coil
  regions, and extensive disordered regions. Cep164 localizes to the ciliary base in both
  sensory neurons and spermatocytes, the only two types of ciliated cells in Drosophila,
  where it forms ring-like structures surrounding microtubule doublets. Unlike the other
  Drosophila TF proteins Fbf1 and Cep89, Cep164 is dispensable for IFT-dependent
  ciliogenesis in flies. None of the three TF proteins are required for basal body docking
  or transition zone assembly, indicating evolutionary divergence in TF function between
  Drosophila and vertebrates. In vertebrates, CEP164 triggers ciliogenesis by recruiting
  Tau tubulin kinase 2 (TTBK2) to the mother centriole via its WW domain. Mutations in
  human CEP164 cause nephronophthisis-15 (NPHP15). The Drosophila protein is expressed
  maternally and ubiquitously in embryonic stages, with restricted expression in adult
  spermatocytes and spermatids.
existing_annotations:
- term:
    id: GO:0097539
    label: ciliary transition fiber
  evidence_type: IDA
  original_reference_id: PMID:36669498
  review:
    summary: >-
      Cep164 was shown by direct immunofluorescence assay (IDA) to localize at the ciliary
      base in both sensory neurons and spermatocytes, forming ring-like structures consistent
      with transition fiber localization (PMID:36669498). The GO term definition for ciliary
      transition fiber (GO:0097539) explicitly names CEP164 as a component. This is the only
      experimentally determined GO annotation for this gene and is well-supported.
    action: ACCEPT
    reason: >-
      This is a well-supported IDA annotation from the key publication on Drosophila transition
      fibers (PMID:36669498). The paper demonstrates that Cep164 localizes like a TF protein
      at the ciliary base in both ciliated cell types in Drosophila. The abstract explicitly
      states that CEP164 has an obvious homolog in Drosophila and that it is localized like TF
      proteins at the ciliary base. This represents a core localization for this protein.
    supported_by:
    - reference_id: PMID:36669498
      supporting_text: >-
        key TF proteins, FBF1, CEP164, and CEP89, have obvious homologs in Drosophila.
    - reference_id: PMID:36669498
      supporting_text: >-
        all three proteins are localized
        like TF proteins at the ciliary base in both sensory neurons and spermatocytes,
        the only two types of ciliated cells in flies.
- term:
    id: GO:0003674
    label: molecular_function
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND (No biological Data) annotation indicating that no specific molecular function has
      been experimentally characterized for Drosophila Cep164. This is appropriate given the
      current state of knowledge; while the vertebrate ortholog CEP164 has a defined role in
      recruiting TTBK2 via its WW domain, this specific molecular function has not been
      experimentally demonstrated in Drosophila. The fact that Cep164 is dispensable for
      ciliogenesis in flies (PMID:36669498) further complicates assignment of a specific
      molecular function.
    action: ACCEPT
    reason: >-
      The ND annotation is appropriate. No specific molecular function has been experimentally
      demonstrated for Drosophila Cep164. While the protein contains a WW domain that in
      vertebrate CEP164 mediates TTBK2 recruitment, this interaction has not been tested in
      flies. Given that Cep164 is dispensable for ciliogenesis in Drosophila (unlike in
      vertebrates), the molecular function may differ. Retaining the ND annotation is the
      most conservative and accurate approach.
- term:
    id: GO:0008150
    label: biological_process
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND annotation indicating no experimentally characterized biological process. While
      Cep164 localizes to transition fibers, it is dispensable for ciliogenesis in Drosophila
      (PMID:36669498). No specific biological process role has been demonstrated by loss of
      function studies. The Cep164 mutant flies are viable and fertile.
    action: ACCEPT
    reason: >-
      The ND annotation is appropriate. Although Cep164 localizes to transition fibers at
      the ciliary base, the key finding from PMID:36669498 is that Cep164 is dispensable for
      ciliogenesis in flies, unlike the other TF proteins Fbf1 and Cep89. FlyBase reports
      that Cep164 mutant alleles are viable and fertile. Without a demonstrated biological
      process phenotype, the ND annotation is the most accurate representation of current
      knowledge.
    supported_by:
    - reference_id: PMID:36669498
      supporting_text: >-
        Fbf1 and Cep89 are essential for
        the formation of IFT-dependent neuronal cilia, but Cep164 is dispensable for
        ciliogenesis in flies.
- term:
    id: GO:0036064
    label: ciliary basal body
  evidence_type: IDA
  review:
    summary: >-
      Based on the findings in PMID:36669498, Cep164 localizes to the ciliary base in both
      sensory neurons and spermatocytes. In spermatocytes, it localizes to centrioles just
      below the transition zone and at the base of spermatocyte primary-like cilia and
      spermatid ciliary caps, forming ring-like structures. This localization to the base of
      the cilium at the centriole/basal body region is an additional cellular component
      annotation that is informative beyond transition fiber alone.
    action: NEW
    reason: >-
      The transition fiber is physically at the ciliary basal body region, but GO:0036064
      (ciliary basal body) captures the broader structural context of Cep164 localization.
      However, since the transition fiber (GO:0097539) is a substructure of the basal body
      region, and that annotation already exists, this broader term is subsumed. The existing
      GO:0097539 annotation is more specific and informative. This NEW annotation is not
      strictly necessary given the existing more specific term.
    supported_by:
    - reference_id: PMID:36669498
      supporting_text: >-
        all three proteins are localized
        like TF proteins at the ciliary base in both sensory neurons and spermatocytes,
        the only two types of ciliated cells in flies.
