# --- short-chain fatty acyl-CoA dehydrogenase activity (IEA, EC 1.3.8.1) ---
- term:
    id: GO:0016937
    label: short-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      Electronic annotation derived from the EC 1.3.8.1 mapping (GO_REF:0000003). The EC number and
      the short-chain designation for CG4860 come from automated ARBA/EC rule inference on family
      membership, not from measured activity of this protein. As with the IBA short-chain term, the
      chain-length specificity is over-specific for CG4860, whose in vivo knockout does not reproduce
      short-chain (C4) SCAD deficiency (that phenotype maps to the paralog Arc42).
    action: MODIFY
    reason: >-
      The dehydrogenase molecular function is correct, but the EC/rule-derived short-chain
      specificity is not supported for this paralog. Generalize to the parent acyl-CoA dehydrogenase
      activity term.
    proposed_replacement_terms:
      - id: GO:0003995
        label: acyl-CoA dehydrogenase activity
    supported_by:
      - reference_id: PMID:40519079
        supporting_text: "the acylcarnitine profile for Arc42 loss of function mimics that of ACADS loss of function, while that of CG4860 does not"
# --- flavin adenine dinucleotide binding (IEA, InterPro) ---
- term:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-derived FAD binding annotation. Acyl-CoA dehydrogenases are FAD-dependent
      flavoproteins, and UniProt records FAD as the cofactor for CG4860. FAD binding is intrinsic to
      the dehydrogenase mechanism and is well supported by the conserved ACAD flavoprotein
      architecture.
    action: ACCEPT
    reason: >-
      FAD binding is a genuine, mechanistically essential molecular function for any ACAD-family
      enzyme and is consistent with the UniProt cofactor annotation and conserved domains.
    supported_by:
      - reference_id: file:DROME/CG4860/CG4860-uniprot.txt
        supporting_text: "Belongs to the acyl-CoA dehydrogenase family"
