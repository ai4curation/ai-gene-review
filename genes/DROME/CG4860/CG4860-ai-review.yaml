id: Q9VGC2
gene_symbol: CG4860
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  CG4860 (Dmel\CG4860; FBgn0037999; UniProt Q9VGC2) is a Drosophila melanogaster mitochondrial
  flavoenzyme of the acyl-CoA dehydrogenase (ACAD) family. The 415-residue protein contains the
  three canonical ACAD domains (N-terminal, middle and C-terminal) and is assigned to the
  short-/branched-chain ACAD subfamily by CDD (SCAD_SBCAD), with a non-covalently bound FAD
  cofactor; it is predicted to act in mitochondrial fatty acid beta-oxidation, catalyzing the
  FAD-dependent alpha,beta-dehydrogenation of a saturated acyl-CoA thioester to the corresponding
  trans-2-enoyl-CoA with electron transfer to electron-transfer flavoprotein (ETF). It is one of
  two Drosophila genes (the other being its paralog Arc42/CG4703) predicted by orthology to
  correspond to human ACADS/SCAD. The precise acyl-chain-length substrate specificity of CG4860 is
  uncertain: the "short-chain specific"/butyryl-CoA (EC 1.3.8.1) designation carried by the protein
  derives entirely from automated rule-based (ARBA/InterPro/EC) inference rather than direct
  characterization, and the only in vivo functional test in the fly indicates that loss of the
  paralog Arc42, not CG4860, reproduces the short-chain (C4/butyrylcarnitine) profile of human SCAD
  deficiency, so CG4860's exact substrate range and physiological role within fly beta-oxidation
  remain to be established experimentally.
existing_annotations:
# --- short-chain fatty acyl-CoA dehydrogenase activity (IBA) ---
- term:
    id: GO:0016937
    label: short-chain fatty acyl-CoA dehydrogenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetically inferred (IBA) short-chain acyl-CoA dehydrogenase activity, propagated from
      the ACADS/SCAD PANTHER clade. CG4860 is a bona fide ACAD-family member, but its restriction to
      the short-chain (butyryl-CoA/C4) substrate class is not supported for this specific paralog:
      it is a family/clade inference, and the only in vivo fly test (Geronazzo et al. 2025) shows
      that loss of the paralog Arc42 - not CG4860 - reproduces the elevated-C4 (butyrylcarnitine)
      profile of human SCAD deficiency, while CG4860 knockout does not accumulate C4.
    action: MODIFY
    reason: >-
      The molecular function (an acyl-CoA dehydrogenase) is sound, but the short-chain chain-length
      specificity is an over-specific rule/clade inference that direct fly evidence does not support
      (and partly contradicts) for CG4860. Generalize to the parent acyl-CoA dehydrogenase activity
      term, which is well supported by domain architecture and the ISS/IEA evidence. An independent
      OpenScientist analysis (run blinded to this review action as a neutral function-assignment
      hypothesis) reached the same verdict - retain the general GO:0003995 and flag GO:0016937 as
      over-specific - and adds a structural determinant: a Leu-to-Thr substitution at the RIGIA+8
      substrate-specificity position lining CG4860's binding pocket (CG4860 has a small polar Thr,
      whereas both human ACADS and the fly paralog Arc42 carry the bulky hydrophobic Leu), which
      could shift CG4860 away from strict short-chain specificity.
    proposed_replacement_terms:
      - id: GO:0003995
        label: acyl-CoA dehydrogenase activity
    supported_by:
      - reference_id: PMID:40519079
        supporting_text: "In contrast, we did not observe an elevation of acylcarnitine C4 in the homozygous CG4860 mutant flies as compared to controls in either condition"
      - reference_id: file:DROME/CG4860/CG4860-hypotheses/function-hypothesis-go-0016937/openscientist.md
        supporting_text: "The smaller, polar threonine could accommodate longer or differently branched substrates, potentially shifting CG4860's substrate preference away from strict short-chain specificity."
      - reference_id: PMID:40519079
        supporting_text: "the acylcarnitine profile for Arc42 loss of function mimics that of ACADS loss of function, while that of CG4860 does not"
# --- mitochondrion (IBA, is_active_in) ---
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Phylogenetically inferred mitochondrial localization (is_active_in), propagated from the
      mitochondrial ACAD clade. Consistent with the ACAD family (mitochondrial matrix beta-oxidation
      enzymes) and with the UniProt "mitochondrial" naming; there is no fly-specific localization
      datum but the assignment is biologically appropriate for this enzyme class.
    action: ACCEPT
    reason: >-
      Mitochondrial localization is the expected and consistent compartment for an acyl-CoA
      dehydrogenase family beta-oxidation enzyme; the IBA parent term is appropriate.
    supported_by:
      - reference_id: file:DROME/CG4860/CG4860-uniprot.txt
        supporting_text: "Lipid metabolism; mitochondrial fatty acid beta-oxidation"
# --- fatty acid beta-oxidation using acyl-CoA dehydrogenase (IBA) ---
- term:
    id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred involvement in the acyl-CoA dehydrogenase-catalyzed step of fatty
      acid beta-oxidation. CG4860 is an ACAD-family enzyme and its knockout perturbs the fly
      acylcarnitine (beta-oxidation) pool, so participation in the ACAD step of beta-oxidation is a
      reasonable process annotation even though the specific substrate chain length is uncertain.
    action: ACCEPT
    reason: >-
      The process (the ACAD step of fatty acid beta-oxidation) is concordant with CG4860 being an
      ACAD-family enzyme whose loss alters the acylcarnitine profile; this is more informative than
      generic fatty acid beta-oxidation and does not over-commit on substrate specificity.
    supported_by:
      - reference_id: PMID:40519079
        supporting_text: "Instead, we observed a significantly lower concentration of C4, and a significant elevation of C2 (acteylcarnitine)"
      - reference_id: file:DROME/CG4860/CG4860-uniprot.txt
        supporting_text: "Belongs to the acyl-CoA dehydrogenase family"
# --- butyrate catabolic process (IBA) ---
- term:
    id: GO:0046359
    label: butyrate catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      Phylogenetically inferred butyrate (butanoate, C4) catabolic process - a substrate-specific
      restatement of short-chain (butyryl-CoA/C4) ACAD activity. This is precisely the activity that
      the in vivo fly evidence attributes to the paralog Arc42 rather than to CG4860: CG4860 knockout
      does not accumulate C4 (butyrylcarnitine) and if anything shows lower C4. The C4-specific
      catabolic framing is therefore not supported for this paralog.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The narrow C4/butyrate-specific process is an over-specific clade inference that the direct fly
      knockout does not support (and partly contradicts) for CG4860; short-chain/butyryl-CoA function
      maps to the paralog Arc42. Retained but flagged as over-annotated rather than removed, since it
      derives from a genuine phylogenetic propagation.
    supported_by:
      - reference_id: PMID:40519079
        supporting_text: "we did not observe an elevation of acylcarnitine C4 in the homozygous CG4860 mutant flies as compared to controls in either condition"
      - reference_id: PMID:40519079
        supporting_text: "In human individuals with SCAD (short-chain acyl-CoA dehydrogenase) deficiency, the stereotypical acylcarnitine profile is dominated by elevated C4 (butyrylcarnitine)"
# --- acyl-CoA dehydrogenase activity (IEA, ARBA) ---
- term:
    id: GO:0003995
    label: acyl-CoA dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      Electronic (ARBA/InterPro) annotation to the parent acyl-CoA dehydrogenase activity term. This
      family-level molecular function is well supported by the domain architecture (three ACAD
      domains; CDD SCAD_SBCAD) and the FAD cofactor, and it does not over-commit on chain-length
      specificity. This is the most defensible molecular-function annotation for CG4860.
    action: ACCEPT
    reason: >-
      The general ACAD activity is strongly supported by conserved domains and FAD binding and is the
      appropriate, non-over-specific molecular function for this uncharacterized paralog.
    supported_by:
      - reference_id: file:DROME/CG4860/CG4860-uniprot.txt
        supporting_text: "Belongs to the acyl-CoA dehydrogenase family"
# --- oxidoreductase activity, acting on the CH-CH group of donors (IEA, InterPro) ---
