    label: oxidoreductase activity, acting on the CH-CH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-derived electronic annotation to an intermediate oxidoreductase term. The acyl-CoA
