suggested_questions:
- question: >-
    What is the actual acyl-chain-length substrate specificity of CG4860, and does it differ from its
    paralog Arc42 (which appears to carry the canonical short-chain/butyryl-CoA SCAD activity in the
    fly)?
- question: >-
    Given that CG4860 knockout lowers C4 and uniquely elevates C2 (acetylcarnitine), does CG4860 have
    a role in ketone/acetyl-CoA utilization or in short-chain acyl-CoA synthesis rather than classical
    butyryl-CoA dehydrogenation, as tentatively suggested by Geronazzo et al. 2025?
suggested_experiments:
- description: >-
    Enzyme kinetics on purified recombinant CG4860 across a panel of acyl-CoA substrates (C4-C12,
    plus branched-chain substrates such as isovaleryl-CoA, given the CDD SCAD_SBCAD / PANTHER IVD
    subfamily assignment) with ETF as electron acceptor, to define its true substrate preference and
    test whether it is genuinely short-chain-specific or has a different/broader specificity than
    Arc42.
- description: >-
    Metabolic and genetic dissection of the CG4860 knockout (and CG4860; Arc42 double mutant),
    including targeted acyl-CoA/acylcarnitine and ketone-body metabolomics under fed and starved
    conditions, to test the proposed roles in SCAD synthesis and/or ketone (acetyl-CoA) utilization
    and to distinguish CG4860's physiological function from that of Arc42.
