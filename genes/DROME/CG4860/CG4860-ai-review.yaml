- id: PMID:40519079
  title: Characterizing fatty acid oxidation genes in Drosophila.
  findings:
    - statement: >-
        CG4860 and its paralog Arc42 are both DIOPT-predicted Drosophila orthologs of human ACADS,
        with CG4860 receiving the lower prediction score.
      supporting_text: >-
        Two different fly genes were predicted by DIOPT to be orthologs of human ACADS: Arc42 and
        CG4860
    - statement: >-
        A CRISPR-Cas9 knockout of CG4860 does NOT reproduce the elevated-C4 (butyrylcarnitine)
        acylcarnitine profile of human short-chain acyl-CoA dehydrogenase (SCAD/ACADS) deficiency;
        instead C4 is lower and C2 (acetylcarnitine) is elevated. The paralog Arc42 knockout does
        reproduce the elevated-C4 SCAD profile.
      supporting_text: >-
        In contrast, we did not observe an elevation of acylcarnitine C4 in the homozygous CG4860
        mutant flies as compared to controls in either condition
    - statement: >-
        Overall, loss of Arc42 - not CG4860 - mirrors human ACADS loss of function.
      supporting_text: >-
        the acylcarnitine profile for Arc42 loss of function mimics that of ACADS loss of function,
        while that of CG4860 does not
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Primary research paper (Geronazzo et al. 2025, G3), full text available and cached. This is the
      only in vivo, fly-specific functional study of CG4860. It directly tests CG4860 by CRISPR
      knockout and acylcarnitine profiling and shows that CG4860 loss does not phenocopy human SCAD
      (ACADS) deficiency, whereas the paralog Arc42 does. This is the key evidence for treating the
      short-chain/butyryl-CoA substrate-specificity annotations on CG4860 as over-specific and
      unverified for this paralog.
core_functions:
- description: >-
    CG4860 is a mitochondrial FAD-dependent acyl-CoA dehydrogenase (ACAD) family enzyme that acts in
    fatty acid beta-oxidation, catalyzing FAD-dependent oxidation at the CH-CH (alpha,beta) bond of a
    saturated acyl-CoA thioester. The specific acyl-chain-length substrate range is uncertain: the
    short-chain/butyryl-CoA (EC 1.3.8.1) designation is rule-based (ARBA/EC) rather than measured,
    and the sole in vivo fly knockout study shows that CG4860 loss - unlike loss of its paralog
    Arc42 - does not reproduce the short-chain (C4) profile of human SCAD/ACADS deficiency. The
    general (chain-length-agnostic) acyl-CoA dehydrogenase molecular function, FAD binding,
    mitochondrial localization, and participation in fatty acid beta-oxidation are the defensible
    core assignments.
