suggested_questions:
- question: >-
    Is Drosophila Dci exclusively peroxisomal (as UniProt indicates), or does it also contribute a
    mitochondrial delta(3),delta(2)-enoyl-CoA isomerase pool, and is the mitochondrial ECI1 role
    instead carried by the CG4592/CG4594/CG4598 paralog cluster?
suggested_experiments:
- description: >-
    Tagged-protein localization and organelle fractionation of Dci versus the CG4592/CG4594/CG4598
    mitochondrial enoyl-CoA delta-isomerase paralogs to assign the mitochondrial versus peroxisomal
    isomerase steps of unsaturated fatty acid beta-oxidation in the fly.
  hypothesis: >-
    Dci provides the peroxisomal delta(3),delta(2)-enoyl-CoA isomerase activity while the CG459x
    paralogs provide the mitochondrial activity required for the mitochondrial unsaturated-FAO cassette.
