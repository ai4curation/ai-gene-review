description: >-
  Dci (CG13890; also PEC1/PECI) is a Drosophila melanogaster dodecenoyl-CoA delta-isomerase
  (delta(3),delta(2)-enoyl-CoA isomerase, EC 5.3.3.8), an auxiliary enzyme of unsaturated fatty acid
  beta-oxidation. It converts (3Z)- or (3E)-enoyl-CoA intermediates - which arise when a double bond
  of an unsaturated fatty acid reaches the 3,4-position during chain shortening and cannot be handled
  by the core enoyl-CoA hydratase - into the (2E)-enoyl-CoA that re-enters the standard beta-oxidation
  spiral. By gene name and sequence Dci corresponds to the peroxisomal-type isomerase (human ECI2 /
  PECI class) and UniProt annotates it as peroxisomal; Drosophila additionally has a cluster of
  mitochondrial enoyl-CoA delta-isomerase 1 paralogs (CG4592/CG4594/CG4598) that are the more likely
  carriers of the mitochondrial ECI1 role. Dci has also been recovered as a hit in a genetic screen
  for susceptibility to intestinal Vibrio cholerae (Gram-negative) infection.
