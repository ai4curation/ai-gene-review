      Orthology-based mitochondrion localization. Dci is by name and UniProt a peroxisomal
      (PECI/ECI2-class) isomerase; the mitochondrial enoyl-CoA delta-isomerase 1 role in Drosophila
      is more likely carried by the CG4592/CG4594/CG4598 paralog cluster. This ISS call may reflect
