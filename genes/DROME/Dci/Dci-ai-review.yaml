core_functions:
- description: >-
    delta(3),delta(2)-enoyl-CoA isomerase (EC 5.3.3.8): repositions the double bond of (3Z)/(3E)-enoyl-CoA
    intermediates to (2E)-enoyl-CoA, the auxiliary step that lets unsaturated fatty acids with double
    bonds at odd-numbered positions re-enter the beta-oxidation spiral. Dci is the peroxisomal-type
    (PECI/ECI2-class) isomerase in Drosophila.
  supported_by:
