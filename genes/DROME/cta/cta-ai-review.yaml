suggested_questions:
  - question: >-
      What is the relative contribution of Mist versus Smog GPCRs to Cta activation
      in different tissues during gastrulation?
  - question: >-
      Does Cta have functions beyond gastrulation in later Drosophila development,
      given its expression in the mesoderm at the extended germband stage?
  - question: >-
      What is the mechanism by which Ric-8 chaperones inactive Cta to the plasma
      membrane, and is this required for all Cta signaling events?
  - question: >-
      Are there additional downstream effectors of Cta besides RhoGEF2 in Drosophila?
suggested_experiments:
  - description: >-
      Live imaging of fluorescently tagged Cta in gastrulating embryos to track
      the dynamics of Cta membrane association and dissociation during apical
      constriction pulses.
  - description: >-
      Tissue-specific knockdown of Cta in post-gastrulation stages to determine
      whether Cta has additional developmental roles beyond gastrulation.
  - description: >-
      Biochemical GEF assays to directly measure the guanine nucleotide exchange
      activity of Ric-8 on Cta and compare with GPCR-mediated GEF activity.
  - description: >-
      Structure-function analysis of Cta using domain-swap chimeras with other
      Drosophila G-alpha subunits to identify regions conferring specificity for
      RhoGEF2 activation.
