        supporting_text: >-
          Embryos from mothers homozygous for
          mutations in the concertina (cta) gene begin furrow formation by forming a zone
          of tightly apposed cells, constrict some cells, and then fail to constrict
          enough cells to form an organized groove
      - reference_id: PMID:26780298
        supporting_text: >-
          GPCR and G proteins constitute a general pathway for controlling actomyosin
          contractility in epithelia and that the activity of this pathway is polarized by
          tissue-specific regulators
  - description: >-
      Mediates actin-based cell contraction downstream of Fog ligand binding to
      the GPCR Mist. Cta relays the signal through RhoGEF2 to Rho1, which
      activates myosin II via Rho kinase to produce actomyosin contraction.
