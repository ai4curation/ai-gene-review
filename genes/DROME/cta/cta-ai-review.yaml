  - id: PMID:1899050
    title: The Drosophila gastrulation gene concertina encodes a G alpha-like protein.
    findings:
      - statement: >-
          Concertina encodes a G-alpha subunit required for coordinating cell shape
          changes during gastrulation, specifically ventral furrow and posterior midgut
          invaginations via apical constriction.
        supporting_text: >-
          Embryos from mothers homozygous for
          mutations in the concertina (cta) gene begin furrow formation by forming a zone
          of tightly apposed cells, constrict some cells, and then fail to constrict
          enough cells to form an organized groove
      - statement: >-
          Cta encodes an alpha subunit of a G protein, implicating heterotrimeric
          G protein signaling in gastrulation cell movements.
        supporting_text: >-
          sequence analysis suggests that it encodes an alpha subunit of a G protein
  - id: PMID:24006487
    title: >-
      Drosophila Ric-8 interacts with the Gα12/13 subunit, Concertina, during
      activation of the Folded gastrulation pathway.
    findings:
      - statement: >-
          Ric-8 physically interacts with Cta and preferentially binds the inactive
          (GDP-bound/nucleotide-free) form, functioning as a non-canonical GEF and
          regulator of Cta localization.
        supporting_text: >-
          Ric-8 discriminates between Cta nucleotide states and preferentially binds to inactive Cta
      - statement: >-
          Cta localizes to the plasma membrane in S2 cells and its membrane localization
          depends on Ric-8.
        supporting_text: >-
          Myc-Cta normally localizes to the plasma membrane and exhibits enrichment in membrane ruffles
      - statement: >-
          Ric-8 functions at the level of Cta in the Fog signaling pathway, upstream
          of RhoGEF2.
        supporting_text: >-
          Ric-8 functions upstream of RhoGEF2, implying a role for Ric-8 at the level of the putative GPCR, Cta, or the βγ subunits
  - id: PMID:24026125
    title: >-
      Gprk2 adjusts Fog signaling to organize cell movements in Drosophila gastrulation.
    findings:
      - statement: >-
          Gprk2 attenuates Fog-Cta signaling to prevent ectopic apical constriction
          and organize distinct cell movements during mesoderm invagination.
        supporting_text: >-
          Gprk2 attenuates and tunes Fog-Cta signaling to prevent apical constriction in LM
          cells and to support appropriate apical constriction in VM cells
  - id: PMID:24222713
    title: >-
      Regulation of epithelial morphogenesis by the G protein-coupled receptor mist
      and its ligand fog.
    findings:
      - statement: >-
          Mist is a GPCR that acts as a Fog receptor upstream of Cta to drive
          actomyosin-based cell contraction during gastrulation.
        supporting_text: >-
          RNAi-mediated depletion of proteins that act in the epithelial folding pathway, including Cta, RhoGEF2, or Rho1, prevented Fog-induced S2R+ cell contraction
      - statement: >-
          Cta is an integral component of the Fog signaling pathway, providing
          evidence that GPCRs are involved in initiating apical constriction.
        supporting_text: >-
          the Gα12/13 homologue Concertina (Cta) is an integral component of the pathway
  - id: PMID:26345366
    title: >-
      Outside-in signaling--a brief review of GPCR signaling with a focus on the
      Drosophila GPCR family.
    findings:
      - statement: >-
          Review of GPCR signaling in Drosophila classifying Cta as a G-alpha subunit
          involved in GPCR signaling during embryogenesis.
        supporting_text: >-
          GPCRs are seven-transmembrane pass
          proteins that are activated by binding a stimulus (or ligand) in the
          extracellular space and then transduce that information to the inside of the
          cell through conformational changes
  - id: PMID:26780298
    title: >-
      Modular activation of Rho1 by GPCR signalling imparts polarized myosin II
      activation during morphogenesis.
    findings:
      - statement: >-
          Cta (Galpha12/13) and Gbeta13F/Ggamma1 constitute distinct signaling modules
          that regulate myosin II dynamics in tissue-specific patterns during gastrulation.
        supporting_text: >-
          Gα12/13 and the Gβ13F/γ1 complex constitute distinct signalling
          modules, which regulate myosin II dynamics medial-apically and/or junctionally
          in a tissue-dependent manner
      - statement: >-
          The GPCR Smog acts with other GPCRs to quantitatively control G proteins
          including Cta, resulting in stepwise myosin II activation and irreversible
          cell shape changes during gastrulation.
        supporting_text: >-
          Smog functions
          with other GPCRs to quantitatively control G proteins, resulting in stepwise
          activation of myosin II and irreversible cell shape changes
core_functions:
  - description: >-
      G-alpha subunit of the Galpha12/13 subfamily that transduces signals from
      Fog/GPCR (Mist, Smog) activation to RhoGEF2, coupling extracellular Fog
      ligand to intracellular actomyosin contractility. Cta cycles between
      GTP-bound active and GDP-bound inactive states to relay signals.
    molecular_function:
      id: GO:0003925
      label: G protein activity
    locations:
