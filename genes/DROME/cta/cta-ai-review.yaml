        This annotation likely reflects mammalian GNA12/GNA13 coupling to dopamine receptors,
        which is not transferable to Cta.
      action: REMOVE
      reason: >-
        No experimental evidence in Drosophila. Cta's known GPCR partners are Mist and
        Smog, not dopamine receptors. This is a mis-transfer from mammalian ortholog data.
