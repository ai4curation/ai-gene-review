  - term:
      id: GO:0003380
      label: establishment or maintenance of cytoskeleton polarity involved in gastrulation
    evidence_type: IMP
    original_reference_id: PMID:26780298
    review:
      summary: >-
        IMP annotation from Kerridge et al. 2016. This study demonstrated that Cta
        (Galpha12/13) and its associated Gbeta13F/Ggamma1 subunits constitute distinct
        signaling modules that regulate myosin II dynamics in polarized patterns during
        gastrulation. Cta is required for polarized actomyosin activation, establishing
        cytoskeletal polarity in gastrulating cells.
      action: ACCEPT
      reason: >-
        Well-supported by experimental evidence showing that GPCR signaling through
        Cta imparts polarized myosin II activation during morphogenesis.
      supported_by:
        - reference_id: PMID:26780298
          supporting_text: >-
            Gα12/13 and the Gβ13F/γ1 complex constitute distinct signalling
            modules, which regulate myosin II dynamics medial-apically and/or junctionally
            in a tissue-dependent manner
  - term:
