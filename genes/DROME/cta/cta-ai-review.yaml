gene_symbol: cta
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Concertina (Cta) is a heterotrimeric G protein alpha subunit of the Galpha12/13
  subfamily in Drosophila melanogaster. It functions as a key signal transducer in
  the Fog (Folded gastrulation) signaling pathway, coupling GPCR activation to
  Rho1-mediated actomyosin contractility during gastrulation. Cta signals downstream
  of the GPCR Mist (and Smog) to activate RhoGEF2, which in turn activates Rho1 and
  Rho kinase to drive apical constriction of ventral furrow and posterior midgut cells.
  Cta forms a heterotrimeric complex with Gbeta13F and Ggamma1. Its GEF activity is
  regulated by both canonical GPCRs (Mist, Smog) and the non-canonical GEF Ric-8,
  which preferentially binds inactive (GDP-bound/nucleotide-free) Cta and directs its
  subcellular localization. Cta is essential for coordinating cell shape changes during
  gastrulation including ventral furrow formation, posterior midgut invagination,
  convergent extension, and mesectoderm development.
existing_annotations:
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for cytoplasm localization based on phylogenetic inference from
        G-alpha family orthologs. Consistent with UniProt annotation reporting cytoplasmic
        localization (PMID:1899050). G-alpha subunits cycle between membrane-associated and
        cytoplasmic pools.
      action: ACCEPT
      reason: >-
        Consistent with experimental data from Parks and Wieschaus 1991 showing cytoplasmic
        distribution, and with the general biology of G-alpha subunits.
  - term:
      id: GO:0007188
      label: adenylate cyclase-modulating G protein-coupled receptor signaling pathway
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation inferred from phylogenetic trees. Cta belongs to the Galpha12/13
        subfamily, which primarily signals through RhoGEF/Rho rather than adenylate cyclase
        modulation. No direct evidence links Cta to adenylate cyclase modulation in
        Drosophila. This annotation likely reflects functions of other Galpha family members
        included in the phylogenetic tree.
      action: MARK_AS_OVER_ANNOTATED
      reason: >-
        Cta is a Galpha12/13 family member whose established signaling pathway in Drosophila
        is through RhoGEF2/Rho1, not adenylate cyclase. This IBA annotation likely reflects
        functions of Galpha-s/Galpha-i orthologs rather than Galpha12/13 biology.
  - term:
      id: GO:0007266
      label: Rho protein signal transduction
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for Rho protein signal transduction. This is strongly supported by
        experimental evidence showing that Cta activates RhoGEF2, which in turn activates
        Rho1 to drive myosin II activation during gastrulation (PMID:26780298).
      action: ACCEPT
      reason: >-
        Core function of Cta. Galpha12/13 signaling through Rho GTPases is a conserved
        pathway, and Cta's role in Rho1 activation via RhoGEF2 is well established.
  - term:
      id: GO:0003924
      label: GTPase activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for GTPase activity based on phylogenetic inference. Cta contains
        conserved G-protein alpha subunit domain with G1-G5 motifs for GTP binding and
        hydrolysis. GTPase activity is intrinsic to all G-alpha subunits.
      action: ACCEPT
      reason: >-
        Core molecular function. Cta has all conserved GTPase motifs and its signaling
        function depends on GTP binding and hydrolysis cycling.
  - term:
      id: GO:0005834
      label: heterotrimeric G-protein complex
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for heterotrimeric G-protein complex membership. Cta forms a complex
        with Gbeta13F and Ggamma1 subunits. Genetic evidence from PMID:26780298 demonstrates
        that mutations in Gbeta13F and Ggamma1 phenocopy Cta loss of function.
      action: ACCEPT
      reason: >-
        Core aspect of Cta biology. Heterotrimeric G-protein complex formation is fundamental
        to G-alpha subunit function and cycling.
  - term:
      id: GO:0031526
      label: brush border membrane
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for brush border membrane localization inferred from mammalian
        Galpha12/13 orthologs. No evidence supports brush border membrane localization
        for Cta in Drosophila. Cta functions in embryonic epithelial cells during
        gastrulation, not in brush border-containing intestinal cells.
      action: REMOVE
      reason: >-
        No experimental support for this localization in Drosophila. This likely reflects
        mammalian ortholog biology (GNA12/GNA13 in intestinal epithelium) that is not
        transferable to the Drosophila context.
  - term:
      id: GO:0031683
      label: G-protein beta/gamma-subunit complex binding
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
        IBA annotation for beta/gamma-subunit complex binding. As a G-alpha subunit, Cta
        is expected to bind Gbeta/gamma subunits (Gbeta13F/Ggamma1) in the inactive
        heterotrimeric state. This is a fundamental property of all G-alpha subunits.
      action: ACCEPT
      reason: >-
        Core molecular function. G-alpha subunits bind beta/gamma subunits by definition,
        and genetic evidence supports Cta functioning with Gbeta13F and Ggamma1.
  - term:
      id: GO:0031752
      label: D5 dopamine receptor binding
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: >-
