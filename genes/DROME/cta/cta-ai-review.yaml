        label: G protein-coupled receptor signaling pathway
      - id: GO:0007266
        label: Rho protein signal transduction
    supported_by:
      - reference_id: PMID:1899050
        supporting_text: >-
          sequence analysis suggests that it encodes an alpha subunit of a G protein
      - reference_id: PMID:26780298
        supporting_text: >-
          Gα12/13 and the Gβ13F/γ1 complex constitute distinct signalling
          modules, which regulate myosin II dynamics medial-apically and/or junctionally
          in a tissue-dependent manner
  - description: >-
      Drives apical constriction and cell shape changes during gastrulation by
      activating Rho1 via RhoGEF2. Cta signaling coordinates ventral furrow
      formation, posterior midgut invagination, and convergent extension through
      regulation of myosin II activation patterns.
    molecular_function:
