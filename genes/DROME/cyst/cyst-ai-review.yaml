- term:
    id: GO:0040003
    label: chitin-based cuticle development
  evidence_type: IMP
  original_reference_id: PMID:21199819
  review:
    summary: >-
      This annotation references a paper about the Alg5 ortholog Wollknaeuel, not mmy/cyst directly.
      The paper studies glycosylation in cuticle formation; mmy mutants are referenced as controls
      or comparators for glycosylation-deficient phenotypes. The cuticle development role of mmy
      is better supported by other publications (PMID:16368930, PMID:16277981).
    action: KEEP_AS_NON_CORE
    reason: >-
      Chitin-based cuticle development is a downstream consequence of UDP-GlcNAc production
      rather than a core function of the gene. The annotation is valid but reflects a pleiotropic
      downstream effect of loss of the biosynthetic substrate.
    supported_by:
    - reference_id: PMID:21199819
      supporting_text: >-
        The formation of an extracellular matrix (ECM) presupposes an ordered delivery of its components to ensure its stereotypic architecture

- term:
    id: GO:0003977
    label: UDP-N-acetylglucosamine diphosphorylase activity
  evidence_type: IMP
  original_reference_id: PMID:16793242
  review:
    summary: >-
      Experimental demonstration that mmy encodes a UDP-N-acetylglucosamine diphosphorylase.
      Mutant analysis showed glycosylation and GPI-anchorage defects consistent with loss of
      this enzymatic activity.
    action: ACCEPT
    reason: >-
      This is the core molecular function of the mmy/cyst gene product, directly demonstrated
      by mutant analysis showing loss of glycosylation and GPI-anchor formation.
    supported_by:
    - reference_id: PMID:16793242
      supporting_text: >-
        we describe the analysis of the cabrio/mummy gene, which encodes an UDP-N-acetylglucosamine diphosphorylase. This is a well-conserved and central enzyme in the glycosylation pathway

- term:
    id: GO:0007391
    label: dorsal closure
  evidence_type: IMP
  original_reference_id: PMID:16793242
  review:
    summary: >-
      mmy mutants show defects in dorsal closure, attributed to defective glycosylation and
      GPI-anchorage of proteins required for this morphogenetic process.
    action: KEEP_AS_NON_CORE
    reason: >-
      Dorsal closure defects are a downstream consequence of impaired glycosylation pathway.
      The gene is not specifically required for dorsal closure signaling, but the broad
      glycosylation requirement affects this developmental process.
    supported_by:
    - reference_id: PMID:16793242
      supporting_text: >-
        cabrio/mummy mutants show many phenotypic traits ranging from CNS fasciculation defects to defects in dorsal closure and eye development. These phenotypes correlate well with specific glycosylation and GPI-anchorage defects in mummy mutants

- term:
    id: GO:0007413
    label: axonal fasciculation
  evidence_type: IMP
  original_reference_id: PMID:16793242
  review:
    summary: >-
      mmy mutants display CNS fasciculation defects. These are attributed to defective
      glycosylation and GPI-anchorage of neural guidance molecules. Notably, these phenotypes
      are chitin-independent, as chitin synthase mutants (kkv) do not show axon guidance defects.
    action: KEEP_AS_NON_CORE
    reason: >-
      Axonal fasciculation defects reflect the glycosylation-dependent (but chitin-independent)
      branch of mmy function. While a genuine phenotype, it is a downstream consequence of
      impaired protein glycosylation rather than a core function of the enzyme.
    supported_by:
    - reference_id: PMID:16793242
      supporting_text: >-
        cabrio/mummy mutants show many phenotypic traits ranging from CNS fasciculation defects to defects in dorsal closure and eye development. These phenotypes correlate well with specific glycosylation and GPI-anchorage defects in mummy mutants
    additional_reference_ids:
