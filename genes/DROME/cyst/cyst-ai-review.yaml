proposed_new_terms: []

suggested_questions:
- question: >-
    What are the specific glycoproteins and GPI-anchored proteins whose modification is most
    critically affected in mmy mutants? Identifying the key substrates of the glycosylation
    pathway downstream of mmy would help distinguish which phenotypes are due to specific
    protein mis-glycosylation versus general chitin loss.
- question: >-
    Is the axon guidance phenotype in mmy mutants attributable to defective glycosylation of
    specific neural guidance molecules (e.g., Robo, Slit, or other GPI-anchored receptors),
    or is it a more general consequence of impaired cell surface glycoprotein function?
- question: >-
    Does mmy have additional enzymatic activities beyond UDP-GlcNAc pyrophosphorylase activity,
    or are all observed phenotypes fully explained by loss of UDP-GlcNAc production?

suggested_experiments:
- description: >-
    Perform glycoproteomic analysis of mmy mutant versus wild-type embryos to identify specific
    glycoproteins with altered glycosylation. This would help resolve which downstream pathways
    are most critically affected and explain the chitin-independent phenotypes.
  hypothesis: >-
    Specific neural guidance molecules (e.g., Robo, Commissureless) and ECM components show
    altered glycosylation in mmy mutants, explaining the chitin-independent CNS phenotypes.
- description: >-
    Express mmy in a heterologous system and perform in vitro enzyme kinetics to determine
    substrate specificity and catalytic parameters. Test whether mmy has any activity toward
    substrates other than GlcNAc-1-phosphate + UTP.
  hypothesis: >-
    Mmy has strict substrate specificity for GlcNAc-1-phosphate and UTP, and all phenotypes
    can be attributed to loss of UDP-GlcNAc production.
- description: >-
    Tissue-specific rescue experiments using UAS-mmy driven in subsets of tissues (trachea,
    epidermis, CNS) to determine which phenotypes are cell-autonomous versus non-autonomous,
    and whether UDP-GlcNAc can be shared between cells.
  hypothesis: >-
    UDP-GlcNAc production by mmy acts cell-autonomously, and tissue-specific rescue will
