- term:
    id: GO:0001838
    label: embryonic epithelial tube formation
  evidence_type: IMP
  original_reference_id: PMID:16287975
  review:
    summary: >-
      mmy/cyst mutants show tracheal tube morphogenesis defects where epithelial walls do not
      expand uniformly, resulting in grossly misshapen tubes with constricted and distended
      regions. This reflects the requirement for chitin biosynthesis in epithelial tube formation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Epithelial tube formation defects are downstream of the chitin biosynthesis requirement.
      The gene's role is to provide the UDP-GlcNAc substrate needed for chitin synthesis, which
      in turn is required for proper tube morphogenesis.
    supported_by:
    - reference_id: PMID:16287975
      supporting_text: >-
        three genes required for tracheal tube morphogenesis in Drosophila melanogaster encode proteins involved in the synthesis and accumulation of chitin

- term:
    id: GO:0006031
    label: chitin biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:16277981
  review:
    summary: >-
      mmy mutant embryos lack chitin-containing structures, including procuticle at the epidermis
      and taenidial folds in the tracheal lumen. The enzyme produces UDP-GlcNAc, an obligate
      substrate for chitin synthases.
    action: ACCEPT
    reason: >-
      Chitin biosynthesis is a direct functional consequence of UDP-GlcNAc production by mmy.
      The enzyme catalyzes the rate-limiting step providing the substrate for chitin synthases,
      making this a core biological process annotation.
    supported_by:
    - reference_id: PMID:16277981
      supporting_text: >-
        These are mutants of a gene encoding the UDP-N-acetylglucosamine diphosphorylase, an enzyme responsible for the production of UDP-N-acetylglucosamine, an important intermediate in chitin and glycan biosynthesis

