core_functions:
- molecular_function:
    id: GO:0003977
    label: UDP-N-acetylglucosamine diphosphorylase activity
  description: >-
    The core molecular function of mmy/cyst is UDP-N-acetylglucosamine diphosphorylase activity
    (EC 2.7.7.23), catalyzing the production of UDP-GlcNAc from UTP and GlcNAc-1-phosphate.
    UDP-GlcNAc is the obligate substrate for chitin synthases and is also required for protein
    N-glycosylation, O-GlcNAcylation, and GPI-anchor biosynthesis. This places mmy at a
    central metabolic branch point affecting multiple downstream processes.
