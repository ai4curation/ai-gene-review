  evidence_type: NAS
  original_reference_id: PMID:16368930
  review:
    summary: >-
      mmy produces UDP-GlcNAc, which is an obligate substrate for protein glycosylation.
      Loss of mmy results in defective modification and subcellular localization of glycoproteins.
      This is a direct consequence of the enzymatic function of mmy.
    action: NEW
    reason: >-
      UDP-GlcNAc is required for protein N-glycosylation and GPI-anchor formation. The mmy mutant
      phenotype includes defective protein glycosylation, confirming involvement in glycoprotein
      biosynthesis. This is not currently annotated despite strong evidence.
    supported_by:
