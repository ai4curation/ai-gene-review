id: Q8IPJ6
gene_symbol: cyst
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  The cyst/mummy (mmy) gene encodes UDP-N-acetylglucosamine diphosphorylase (UAP1), a central
  enzyme in the glycosylation pathway that catalyzes the production of UDP-N-acetylglucosamine
  (UDP-GlcNAc) from UTP and N-acetylglucosamine-1-phosphate. UDP-GlcNAc is an obligate substrate
  for chitin synthases as well as for protein glycosylation and GPI-anchor formation. Loss of mmy
  function leads to severe defects in chitin biosynthesis, apical extracellular matrix formation,
  tracheal tube morphogenesis, dorsal closure, CNS axon guidance, and embryonic cuticle development.
  Some phenotypes (e.g., axon guidance defects) are chitin-independent, reflecting the broader role
  of UDP-GlcNAc in protein glycosylation and GPI-anchor attachment. The gene is hormonally regulated
  by 20-Hydroxyecdysone and selectively upregulated in epithelia during active apical ECM deposition.

