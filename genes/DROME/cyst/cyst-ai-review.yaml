    action: KEEP_AS_NON_CORE
    reason: >-
      CNS development is a broad downstream phenotypic consequence of impaired glycosylation.
      The gene does not encode a CNS-specific signaling component, but rather provides the
      UDP-GlcNAc substrate needed for proper glycosylation of guidance molecules.
    supported_by:
    - reference_id: PMID:10328928
