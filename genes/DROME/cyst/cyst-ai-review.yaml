  evidence_type: IMP
  original_reference_id: PMID:10887083
  review:
    summary: >-
      mmy/cyst was identified as a tube expansion gene required for proper tracheal tube
      diameter control. This is one of the original genetic identifications of the cyst locus.
    action: KEEP_AS_NON_CORE
    reason: >-
      Regulation of tracheal tube size is a downstream consequence of the chitin/glycosylation
      pathway mediated by mmy. The gene was named cyst because of the cystic tracheal phenotype,
      but this reflects the downstream effect of impaired chitin deposition rather than a direct
      signaling role in tube size regulation.
    supported_by:
    - reference_id: PMID:10887083
      supporting_text: >-
        tube size appears to be controlled by coordinately regulating the apical (lumenal) surface of tracheal cells

- term:
