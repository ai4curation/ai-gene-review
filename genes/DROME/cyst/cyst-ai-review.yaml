- term:
    id: GO:0030198
    label: extracellular matrix organization
  evidence_type: IMP
  original_reference_id: PMID:16368930
  review:
    summary: >-
      mmy is required for apical extracellular matrix formation. Loss of mmy disrupts
      deposition of the cuticle and apical matrices needed for epithelial morphogenesis.
      The enzyme is selectively upregulated in epithelia during active aECM deposition.
    action: ACCEPT
    reason: >-
      Extracellular matrix organization is a direct functional consequence of UDP-GlcNAc
      production, which is required both for chitin (a major ECM component in insects) and
      for proper glycosylation of ECM proteins. This is well-supported and reasonably specific.
    supported_by:
    - reference_id: PMID:16368930
      supporting_text: >-
        mmy expression is selectively upregulated in epithelia at the time they actively deposit aECM, and is altered by the moulting hormone 20-Hydroxyecdysone, suggesting that mmy is part of a developmental genetic programme to promote aECM formation

- term:
    id: GO:0035151
