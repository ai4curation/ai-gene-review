core_functions:
- description: >-
    Mitochondrial delta(3),delta(2)-enoyl-CoA isomerase (EC 5.3.3.8): isomerizes 3Z/3E-enoyl-CoA to
    2E-enoyl-CoA, the auxiliary step that lets unsaturated fatty acids with odd-position double bonds
    re-enter the beta-oxidation spiral. One of three fly mitochondrial ECI1 paralogs (CG4592/CG4594/CG4598).
