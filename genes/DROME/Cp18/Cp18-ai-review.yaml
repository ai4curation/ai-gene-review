core_functions:
  - description: >
      Cp18 is a structural protein of the egg chorion (eggshell) in Drosophila. It is
      secreted by follicle cells during mid to late oogenesis and becomes incorporated
      into the chorion, providing structural integrity and environmental protection for
      the developing oocyte. Cp18 belongs to the S15/S18 chorion protein family.
    molecular_function:
      id: GO:0005213
      label: structural constituent of egg chorion
    directly_involved_in:
      - id: GO:0007304
        label: chorion-containing eggshell formation
    locations:
      - id: GO:0042600
        label: egg chorion
    supported_by:
      - reference_id: PMID:24109603
        supporting_text: "We focus on one of the major families of genes that pattern the Drosophila eggshell, the Chorion protein (Cp)"
      - reference_id: PMID:11744369
        supporting_text: "follicle cells are involved in secretion of proteins that make the eggshell, an essential protective layer for the oocyte"

suggested_questions:
  - question: What is the specific contribution of Cp18 versus other chorion proteins (e.g., Cp15, Cp16) to eggshell structural integrity?
  - question: Does the rapid evolution of Cp18 regulation contribute to reproductive isolation between Drosophila species?
  - question: What is the cross-linking mechanism by which Cp18 is incorporated into the mature chorion?

suggested_experiments:
  - description: CRISPR knockout of Cp18 alone to assess its individual contribution to eggshell integrity and female fertility
    hypothesis: Cp18 loss may cause eggshell structural defects, though redundancy with other S-family chorion proteins may partially compensate
  - description: Mass spectrometry analysis of chorion composition in wild-type versus Cp18 mutant flies to quantify protein contributions
    hypothesis: Cp18 is a major structural component and its loss would alter the stoichiometry of chorion protein assembly
