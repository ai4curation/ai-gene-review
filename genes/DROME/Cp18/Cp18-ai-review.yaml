id: P07184
gene_symbol: Cp18
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >
  Cp18 (Chorion protein S18) is a secreted structural protein of the Drosophila eggshell
  (chorion). It belongs to the chorion protein S15/S18 family and is one of nine chorion
  protein genes expressed dynamically during mid and late stages of oogenesis. Cp18 is
  secreted by follicle cells and becomes incorporated into the chorion, where it serves
  as a structural component providing mechanical protection to the developing oocyte.
  The Cp gene family shows rapidly evolving regulation, with species-specific
  spatiotemporal expression patterns across Drosophila species.
existing_annotations:
- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >
      This IEA annotation is based on the UniProt subcellular location annotation
      indicating Cp18 is a secreted protein. Cp18 has a signal peptide (residues 1-17)
      and is secreted by follicle cells into the extracellular space where it becomes
      part of the chorion. While correct, the more specific annotation to egg chorion
      (GO:0042600) is more informative for this protein.
    action: ACCEPT
    reason: >
      Correct general localization. Cp18 is a secreted protein that functions in the
      extracellular region. The more specific egg chorion annotation provides better
      granularity.

- term:
    id: GO:0042600
    label: egg chorion
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >
      This IEA annotation is derived from InterPro domain mapping (IPR005649, Chorion_2).
      Cp18 belongs to the Chorion_2 Pfam family (PF03964), which is specific to insect
      chorion proteins. This domain assignment correctly places Cp18 as a component of
      the egg chorion.
    action: ACCEPT
    reason: >
      Correct cellular component annotation based on well-characterized domain family.
      The Chorion_2 domain is diagnostic for eggshell structural proteins.

- term:
    id: GO:0042600
    label: egg chorion
  evidence_type: IC
  original_reference_id: PMID:24109603
  review:
    summary: >
      This IC (Inferred by Curator) annotation places Cp18 in the egg chorion, inferred
      from its involvement in chorion-containing eggshell formation (GO:0007304). The
      Niepielko et al. 2014 study systematically characterized the spatiotemporal
      expression of all nine Cp genes in Drosophila follicle cells during oogenesis,
      confirming their role in eggshell patterning and formation.
    action: ACCEPT
    reason: >
      Well-supported annotation. Cp18 is a canonical chorion protein, and its localization
      to the egg chorion is well established through the chorion protein literature.
    supported_by:
      - reference_id: PMID:24109603
        supporting_text: "We focus on one of the major families of genes that pattern the Drosophila eggshell, the Chorion protein (Cp)"

- term:
    id: GO:0005213
    label: structural constituent of egg chorion
  evidence_type: IC
  original_reference_id: PMID:24109603
  review:
    summary: >
      This IC annotation assigns the molecular function of structural constituent of
      egg chorion to Cp18, inferred from its involvement in chorion-containing eggshell
      formation (GO:0007304). The Niepielko et al. 2014 study characterized the
      spatiotemporal patterning of all nine Cp genes in follicle cells, supporting their
      structural role in eggshell formation.
    action: ACCEPT
    reason: >
      Core molecular function annotation. Cp18 is a bona fide structural chorion protein
      with no known enzymatic or signaling activity. Its function is to provide structural
      integrity to the eggshell.
    supported_by:
      - reference_id: PMID:24109603
        supporting_text: "Systematically screening for the spatiotemporal patterning of all nine Cp genes in three species"

- term:
    id: GO:0007304
    label: chorion-containing eggshell formation
  evidence_type: IEP
  original_reference_id: PMID:24109603
  review:
    summary: >
      This IEP (Inferred from Expression Pattern) annotation indicates Cp18 is involved
      in chorion-containing eggshell formation. The Niepielko et al. 2014 study showed
      that Cp genes are expressed dynamically during mid and late stages of oogenesis in
      follicle cells, the period when the eggshell is actively being formed and assembled.
    action: ACCEPT
    reason: >
      Appropriate use of IEP evidence. The temporal expression pattern of Cp18 during
      eggshell formation stages, combined with its identity as a chorion structural
      protein, strongly supports involvement in this biological process.
    supported_by:
      - reference_id: PMID:24109603
        supporting_text: "most genes are expressed dynamically during mid and late stages of oogenesis"

- term:
    id: GO:0005213
    label: structural constituent of egg chorion
  evidence_type: TAS
  original_reference_id: PMID:11744369
  review:
    summary: >
      This TAS (Traceable Author Statement) annotation assigns structural constituent
      of egg chorion function to Cp18. The Kim et al. 2002 paper describes chorion
      proteins in the context of eggshell formation and characterizes Femcoat, another
      eggshell protein, demonstrating the role of secreted proteins in chorion assembly.
      While the paper focuses on Femcoat rather than Cp18 specifically, it provides
      contextual support for the role of chorion proteins as structural components of the
      eggshell.
    action: ACCEPT
    reason: >
      The TAS evidence supports the well-established structural role of chorion proteins
      in eggshell formation. Cp18 is a member of the chorion protein S15/S18 family,
      and its structural function is canonical for this protein family.
    supported_by:
      - reference_id: PMID:11744369
        supporting_text: "follicle cells are involved in secretion of proteins that make the eggshell, an essential protective layer for the oocyte"

