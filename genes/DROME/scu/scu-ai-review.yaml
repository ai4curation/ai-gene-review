- id: PMID:12917011
  title: 'Expanded substrate screenings of human and Drosophila type 10 17beta-hydroxysteroid
    dehydrogenases (HSDs) reveal multiple specificities in bile acid and steroid hormone
    metabolism: characterization of multifunctional 3alpha/7alpha/7beta/17beta/20beta/21-HSD.'
  findings:
  - statement: The purified Drosophila type-10 17-beta-HSD (scully) has the known hydroxyacyl-CoA
      dehydrogenase activity plus broad hydroxysteroid dehydrogenase activities (17-beta-OH, 3-alpha-OH,
      20-beta-OH, 21-OH steroids and 7-beta-OH bile acids), explained by a wide hydrophobic substrate
      cleft; the fly enzyme is essential in development.
    supporting_text: "In addition to the known hydroxyacyl-CoA dehydrogenase"
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "Enzymatic characterization of the purified Drosophila HSD17B10 (scully) establishing
      both the 3-hydroxyacyl-CoA dehydrogenase and the broad 17-beta-hydroxysteroid/bile-acid
      dehydrogenase activities. Abstract-only in cache. Grounds the two enzymatic core functions.
      Note the abstract reports a cytosolic overexpression pattern for the fly protein, whereas the
      RNase P and proteomics evidence support a mitochondrial-matrix functional pool."
