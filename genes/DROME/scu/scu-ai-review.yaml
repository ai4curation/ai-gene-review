core_functions:
- description: >-
    NAD+-dependent (3S)-3-hydroxyacyl-CoA dehydrogenase (EC 1.1.1.35): oxidizes the 3-hydroxyl of
    short/medium-chain (3S)-3-hydroxyacyl-CoA to 3-oxoacyl-CoA, the third step of the mitochondrial
    fatty acid beta-oxidation spiral, and the analogous branched-chain (3-hydroxy-2-methylbutyryl-CoA)
    step of isoleucine catabolism. As the type-II (HSD17B10-class) enzyme, scully fills this step-3
    niche in Drosophila, which lacks a classical type-I HADH1/SCHAD ortholog.
  supported_by:
  - reference_id: PMID:12917011
    supporting_text: "In addition to the known hydroxyacyl-CoA dehydrogenase"
    full_text_unavailable: true
  molecular_function:
    id: GO:0003857
    label: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
  directly_involved_in:
  - id: GO:0006631
    label: fatty acid metabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
- description: >-
    Broad-specificity NAD+-dependent 17-beta-hydroxysteroid dehydrogenase (17-beta-HSD10): oxidizes
    17-beta-OH, 3-alpha-OH, 20-beta-OH and 21-OH groups of steroids and 7-beta-OH groups of bile
    acids. In Drosophila this activity connects to ecdysteroid/steroid metabolism and to the enzyme's
    essential developmental role.
  supported_by:
  - reference_id: PMID:12917011
    supporting_text: "oxidize the 20beta-OH and 21-OH groups in C21 steroids"
    full_text_unavailable: true
