  title: "OpenScientist function-assignment hypothesis: scully (O18404) as the fly step-3 3-hydroxyacyl-CoA dehydrogenase"
  findings:
  - statement: Blinded AI-scientist analysis confirms scully is the ortholog of human HSD17B10 (type-II
