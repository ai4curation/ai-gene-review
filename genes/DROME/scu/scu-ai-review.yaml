proposed_new_terms: []
suggested_questions:
- question: >-
    Which of scully's three roles - 3-hydroxyacyl-CoA dehydrogenase, 17-beta-hydroxysteroid
    dehydrogenase, or the structural MRPP2/mt:RNase P subunit - is responsible for the lethality of
    scully-null Drosophila, and can catalytically-dead but assembly-competent alleles separate the
    enzymatic from the RNA-processing functions?
- question: >-
    Given that Drosophila lacks a classical type-I HADH1/SCHAD, how much of mitochondrial
    short/medium-chain 3-hydroxyacyl-CoA dehydrogenase flux in vivo is carried by scully versus the
    MTP (Mtpalpha) complex?
suggested_experiments:
- description: >-
    Assay purified recombinant scully for (3S)-3-hydroxyacyl-CoA dehydrogenase kinetics across a
    short/medium-chain acyl-CoA series (C4-C12) to define its beta-oxidation substrate range relative
    to the MTP long-chain enzyme.
  hypothesis: >-
    scully preferentially handles short/medium-chain 3-hydroxyacyl-CoA substrates, complementing the
    long-chain specificity of the MTP complex.
- description: >-
    Generate separation-of-function scully alleles (catalytically inactive vs RNase-P-assembly
    defective) and test rescue of the null lethality to dissect the essential moonlighting role.
  hypothesis: >-
    The mt:RNase P (MRPP2) structural role, not the dehydrogenase activity, is the essential function
    underlying scully-null lethality.
