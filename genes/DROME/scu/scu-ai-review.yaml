gene_symbol: scu
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  scully (scu; FlyBase FBgn0016976; CG7113) is the Drosophila melanogaster ortholog of human
  HSD17B10 (17-beta-hydroxysteroid dehydrogenase type 10 / 3-hydroxyacyl-CoA dehydrogenase type 2 /
  MRPP2), a mitochondrial member of the short-chain dehydrogenase/reductase (SDR) superfamily. It is
  a multifunctional, moonlighting enzyme with three distinct roles. (1) As an NAD+-dependent
  (3S)-3-hydroxyacyl-CoA dehydrogenase (EC 1.1.1.35) it can carry out the third step of mitochondrial
  fatty acid beta-oxidation for short/medium-chain substrates and the analogous branched-chain step
  (3-hydroxy-2-methylbutyryl-CoA) of isoleucine catabolism. Because Drosophila lacks a clean ortholog
  of the classical type-I HADH1/SCHAD (the fly genes named Had1/Had2 are instead CRYL1 orthologs),
  scully is the fly enzyme covering this type-II 3-hydroxyacyl-CoA dehydrogenase niche. (2) As a
  broad-specificity hydroxysteroid dehydrogenase (17-beta-HSD10) it oxidizes 17-beta-OH, 3-alpha-OH,
  20-beta-OH and 21-OH groups of steroids and 7-beta-OH groups of bile acids, linking it to steroid
  hormone and, in the fly, ecdysone metabolism; scully is essential for development. (3) As the MRPP2
  subunit of the mitochondrial protein-only ribonuclease P (mt:RNase P) complex it is required for
  5'-end processing of mitochondrial tRNAs; loss of scully causes aberrant mt-tRNA processing and
  lethality. The mature protein is a homotetramer with one NAD(H) per subunit; the functional pools
  relevant to fatty-acid oxidation and to RNase P reside in the mitochondrial matrix (an earlier
  overexpression study reported a cytosolic pattern for the fly protein, attributed to an N-terminal
  difference from the human mitochondrial-targeted form).
