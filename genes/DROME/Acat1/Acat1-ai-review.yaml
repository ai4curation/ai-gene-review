      mitochondrial localization of the ACAT1/T2 thiolase subfamily; peroxisomal thiolase activity in
      flies belongs to distinct ACAA1-type thiolases, not the ACAT1/T2 ortholog.
    supported_by:
    - reference_id: PMID:22758915
      supporting_text: >-
        The subcellular localization of five of these predicted peroxisomal proteins was confirmed.
