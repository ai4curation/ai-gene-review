- id: PMID:35177854
  title: Glia fuel neurons with locally synthesized ketone bodies to sustain memory
    under starvation.
  findings:
  - statement: >-
      Identifies CG10932 as the Drosophila ortholog of human mitochondrial acetoacetyl-CoA thiolase
      ACAT1 (DIOPT 15/15) and shows by RNAi that Acat1 is required in adult mushroom body neurons for
      ketone-body oxidation, generating acetyl-CoA in mitochondria to sustain memory under starvation.
    reference_section_type: RESULTS
  - statement: >-
      Describes ketogenesis in cortex glia as proceeding via a thiolase, HMGS and HMG-CoA lyase; the
      thiolase step of ketogenesis is stated generically rather than assigned to CG10932, whereas the
      gene experimentally assayed as ACAT1 is the neuronal ketone-body-oxidation enzyme.
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available and read; directly establishes the fly Acat1 ortholog identity and its
      neuronal ketone-body catabolic (oxidation) role. Supports the ketone-body-catabolism core; the
      GOA NAS annotations to ketone-body BIOSYNTHESIS from this paper are the weaker reading for Acat1
      and are kept as non-core.
