suggested_questions:
- question: >-
    In Drosophila, does Acat1 act physiologically in the ketogenic (acetoacetyl-CoA condensation)
    direction as well as the demonstrated ketolytic (oxidation) direction, i.e. is the thiolase step of
    glial ketogenesis in Silva et al. 2022 actually catalyzed by CG10932 or by a different thiolase?
- question: >-
    Is the peroxisomal localization prediction for Acat1 (ISM, PMID:22758915) ever experimentally
    realized, or is Acat1 exclusively mitochondrial as expected for the ACAT1/T2 subfamily?
suggested_experiments:
- description: >-
    Assay recombinant Drosophila Acat1 for acetoacetyl-CoA thiolase (EC 2.3.1.9) activity in both
    directions and test cleavage of 2-methylacetoacetyl-CoA, alongside a negative control for cholesterol
    O-acyltransferase (EC 2.3.1.26) activity.
  hypothesis: >-
    Acat1 has bidirectional acetoacetyl-CoA thiolase activity and can cleave the 2-methyl-branched
    isoleucine intermediate, but has no cholesterol-esterifying (SOAT) activity.
- description: >-
    Determine the endogenous subcellular localization of tagged Acat1 in Drosophila tissues by
    fluorescence microscopy and organelle fractionation, comparing mitochondrial versus peroxisomal
    markers.
  hypothesis: >-
    Acat1 localizes to the mitochondrial matrix, and the peroxisomal prediction (PMID:22758915) is a
    targeting-signal artifact not realized in vivo.
- description: >-
    Metabolically profile ketone-body and isoleucine-pathway intermediates (acetoacetyl-CoA turnover,
    2-methylacetoacetyl-CoA, tiglylglycine-equivalents) in Acat1-knockdown versus control flies under
    fed and starved conditions.
  hypothesis: >-
    Acat1 loss impairs both neuronal ketolysis and the final thiolytic step of isoleucine catabolism,
    producing accumulation of 2-methyl-branched intermediates analogous to human beta-ketothiolase
    deficiency.
