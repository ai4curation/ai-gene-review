- term:
    id: GO:0005777
    label: peroxisome
  evidence_type: ISM
  original_reference_id: PMID:22758915
  qualifier: located_in
  review:
    summary: >-
      Sequence-model (ISM) peroxisomal prediction from a Drosophila peroxisomal-proteome inventory.
      This conflicts with the mitochondrial identity of the ACAT1/T2 subfamily (human T2 is a
      mitochondrial-matrix protein) and with the direct LOPIT and phylogenetic mitochondrial
