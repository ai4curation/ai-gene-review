    summary: >-
      NAS annotation to ketogenesis. The reversible thiolase can in principle contribute the
      acetoacetyl-CoA-forming (condensation) step of ketone-body synthesis, and Silva et al. describe
      ketogenesis via "the successive actions of a thiolase, the HMGS and the HMG-CoA lyase". However,
