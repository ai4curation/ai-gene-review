gene_symbol: Acat1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Acat1 (CG10932) is the single Drosophila melanogaster ortholog of human mitochondrial
  acetoacetyl-CoA thiolase (ACAT1 / "T2"; EC 2.3.1.9), a member of the thiolase family with
  the canonical Cys-His-Cys catalytic triad. It is a mitochondrial, CoA-dependent thiolase
  that catalyzes the reversible Claisen condensation/thiolysis at the acetoacetyl-CoA node
  (2 acetyl-CoA <-> acetoacetyl-CoA + CoA), placing it centrally in ketone body metabolism
  (both ketolysis and ketogenesis). By analogy to human T2 it also cleaves the 2-methyl-branched
  intermediate 2-methylacetoacetyl-CoA, the final thiolytic step of L-isoleucine catabolism.
  In vivo, Acat1 is required in adult mushroom body neurons for the mitochondrial oxidation of
  imported ketone bodies to acetyl-CoA, supplying energy that sustains associative memory during
  starvation. Despite the shared historical nickname "ACAT1", this mitochondrial thiolase is
  distinct from the endoplasmic-reticulum cholesterol-esterifying sterol O-acyltransferase
  (SOAT1/SOAT2, EC 2.3.1.26, also called "ACAT"); Acat1 has no cholesterol O-acyltransferase
  activity.
