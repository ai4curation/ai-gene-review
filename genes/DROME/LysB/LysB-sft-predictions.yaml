  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      LysB is a lysozyme, not a chitinase. While both hydrolyze glycosidic bonds, LysB's substrate is peptidoglycan
      (N-acetylmuramic acid - N-acetylglucosamine), not chitin. Chitinase activity is not annotated in GOA
      or the curated review. This is a category error confusing two similar but distinct hydrolase activities.
      An independent OpenScientist investigation (see file reference) confirms this NPI -- LysB is a GH22
      C-type lysozyme (muramidase) with the conserved lysozyme catalytic dyad and no GH18/GH19 chitinase
      domain; any weak chitodextrin side-activity is intrinsic to C-type lysozymes and does not warrant
      a chitinase term.
    supported_by:
    - reference_id: file:DROME/LysB/LysB-hypotheses/prediction-chitinase-immune/openscientist.md
      supporting_text: LysB is a GH22 muramidase with a conserved lysozyme catalytic dyad and no GH18/GH19
        chitinase domain or active-site motif
