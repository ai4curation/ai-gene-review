        phylogenetic analysis of the DDRGK1 family.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
    - statement: >-
        IEA annotation for ER membrane based on UniProt subcellular location
        annotation for Ddrgk1.
- id: PMID:14605208
  title: A protein interaction map of Drosophila melanogaster.
  findings:
    - statement: >-
        Large-scale yeast two-hybrid screen of the Drosophila proteome identified
        interaction between Ddrgk1 (CG5862) and Ufl1 (Q9VI55).
      supporting_text: "a two-hybrid-based protein-interaction map of the fly proteome"
- id: PMID:37061542
  title: Next-generation large-scale binary protein interaction network for Drosophila
    melanogaster.
  findings:
    - statement: >-
        Large-scale binary interaction study validated the Ddrgk1-Ufl1 interaction
        using next-generation Y2H approaches.
      supporting_text: "Four all-by-all yeast two-hybrid (Y2H) screens of > 10,000 Drosophila proteins result in the 'FlyBi' dataset of 8723 PPIs among 2939 proteins"
- id: PMID:37086384
  title: A neuroprotective role of Ufmylation through Atg9 in the aging brain of Drosophila.
  findings:
    - statement: >-
        Ddrgk1 mediates ufmylation of Atg9, which is neuroprotective during aging.
      supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1, a critical regulator of Ufmylation"
    - statement: >-
        The Ufm1 system protects aged neurons through Atg9 by coordinating
        autophagy and mTORC1, and maintaining mitochondrial homeostasis and JNK
        activity.
      supporting_text: "The Ufm1 system ensures the health of aged neurons via Atg9 by coordinating autophagy and mTORC1, and maintaining mitochondrial homeostasis and JNK (c-Jun N-terminal kinase) activity"
    - statement: >-
        Neuron-specific expression of Atg9 can suppress movement defects and
        lethality caused by loss of ufmylation.
      supporting_text: "Neuron-specific expression of Atg9 suppresses the age-associated movement defect and lethality caused by loss of Ufmylation"
    - statement: >-
        Mammalian Ddrgk1 is required for endogenous Atg9A protein stability in
        mouse embryonic fibroblasts, indicating conservation.
      supporting_text: "Mammalian Ddrgk1 was shown to be indispensable for the stability of endogenous Atg9A protein in mouse embryonic fibroblast (MEF) cells"
    - statement: >-
        Ddrgk1 interacts transiently with Atg9.
      supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1"
- id: PMID:38944040
  title: Next-generation Drosophila protein interactome map and its functional implications.
  findings:
    - statement: >-
        AP-MS-based Drosophila protein interaction map (DPIM2) further supports
        the Ddrgk1-Ufl1 interaction.
      supporting_text: "a next-generation Drosophila protein interaction map-\"DPIM2\"-established from affinity purification-mass spectrometry of 5,805 baits"
