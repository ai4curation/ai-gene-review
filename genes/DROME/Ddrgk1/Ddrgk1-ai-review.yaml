        ISS annotations for Ddrgk1 were transferred from human DDRGK1 (Q96HY6),
        including ER localization and ubiquitin-like protein ligase binding.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
