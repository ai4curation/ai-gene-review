id: Q9VDD1
gene_symbol: Ddrgk1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  DDRGK domain-containing protein 1, a substrate adapter for ufmylation (the covalent
  attachment of the ubiquitin-like modifier UFM1 to substrate proteins). Ddrgk1 is an
  ER-anchored single-pass transmembrane protein with its bulk facing the cytoplasm. It
  acts as a critical regulator of the Ufm1 conjugation pathway, mediating ufmylation of
  target proteins including Atg9. In the aging Drosophila brain, Ddrgk1-mediated
  ufmylation of Atg9 is neuroprotective, coordinating autophagy, mTORC1 signaling,
  mitochondrial homeostasis, and JNK activity. Neuronal knockdown of Ddrgk1 causes
  reduced lifespan, progressive locomotor defects, and neurodegeneration. Ddrgk1
  physically interacts with Ufl1, the E3-like ligase of the ufmylation pathway.
existing_annotations:
- term:
    id: GO:0044389
    label: ubiquitin-like protein ligase binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation inferred from phylogenetic analysis. Ddrgk1 interacts with Ufl1
      (Q9VI55), the E3-like ligase of the ufmylation pathway, as confirmed by IntAct
      data (5 experiments) and by PMID:37086384 which identifies Ddrgk1 as a critical
      regulator of Ufm1 conjugation mediated in cooperation with Ufl1. The term
      ubiquitin-like protein ligase binding accurately captures Ddrgk1's binding to
      Ufl1.
    action: ACCEPT
    reason: >-
      Ddrgk1 binds Ufl1, which is the E3-like ligase for UFM1 conjugation. This is
      well-supported by both phylogenetic inference and experimental data including
      co-immunoprecipitation. The IBA annotation is appropriately specific.
    supported_by:
      - reference_id: PMID:37086384
        supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1, a critical regulator of Ufmylation"
- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB/Swiss-Prot subcellular location mapping.
      UniProt records Ddrgk1 as an ER membrane protein with a single transmembrane
      helix (residues 3-23), a short lumenal N-terminus, and a large cytoplasmic
      C-terminal domain. This is consistent with the more specific TAS annotation
      to GO:0098554 (cytoplasmic side of ER membrane).
    action: ACCEPT
    reason: >-
      The ER membrane localization is well-supported by the predicted transmembrane
      domain and by analogy to the human ortholog DDRGK1 (Q96HY6). While the more
      specific term GO:0098554 is also annotated, this broader IEA term is not
      incorrect and is acceptable.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:14605208
  review:
    summary: >-
      IPI annotation from the large-scale Drosophila two-hybrid interaction map
      (Giot et al. 2003). The interacting partner is Ufl1 (Q9VI55). While the
      interaction is likely real, the term 'protein binding' is uninformative.
      The more specific term GO:0044389 (ubiquitin-like protein ligase binding)
      already captures this interaction more precisely.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The term 'protein binding' (GO:0005515) is too vague to be informative. The
      interaction with Ufl1 is better captured by GO:0044389 (ubiquitin-like protein
      ligase binding) which is already annotated. Per GO curation guidelines, protein
      binding should be avoided in favor of more specific terms.
    supported_by:
      - reference_id: PMID:14605208
        supporting_text: "a two-hybrid-based protein-interaction map of the fly proteome"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:37061542
  review:
    summary: >-
      IPI annotation from the next-generation binary protein interaction network
      for Drosophila (Tang et al. 2023). The interacting partner is Ufl1 (Q9VI55).
      Same issue as above -- the term 'protein binding' is uninformative when
      GO:0044389 already captures this interaction more specifically.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The term 'protein binding' is too vague. The interaction with Ufl1 is already
      captured by the more specific GO:0044389 (ubiquitin-like protein ligase binding).
    supported_by:
      - reference_id: PMID:37061542
        supporting_text: "Four all-by-all yeast two-hybrid (Y2H) screens of > 10,000 Drosophila proteins result in the 'FlyBi' dataset of 8723 PPIs among 2939 proteins"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:38944040
  review:
    summary: >-
      IPI annotation from DPIM2, the next-generation Drosophila protein interactome
      map based on AP-MS (Bhat et al. 2024). The interacting partner is Ufl1 (Q9VI55).
      The interaction is validated across three independent studies (Y2H, binary
      interaction, and AP-MS), but 'protein binding' remains uninformative.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      As with the other protein binding annotations, this is too vague. The Ddrgk1-Ufl1
      interaction is better captured by GO:0044389.
    supported_by:
      - reference_id: PMID:38944040
        supporting_text: "a next-generation Drosophila protein interaction map-\"DPIM2\"-established from affinity purification-mass spectrometry of 5,805 baits"
- term:
    id: GO:0030674
    label: protein-macromolecule adaptor activity
  evidence_type: TAS
  original_reference_id: PMID:37086384
  review:
    summary: >-
      TAS annotation from FlyBase based on Li et al. 2023. Ddrgk1 functions as a
      substrate adapter for ufmylation, bridging the E3-like ligase Ufl1 and target
      substrates such as Atg9 for UFM1 conjugation. The term protein-macromolecule
      adaptor activity accurately reflects this bridging/adapter role in the ufmylation
      pathway.
    action: ACCEPT
    reason: >-
      Ddrgk1 is described as a substrate adapter for ufmylation in UniProt based on
      similarity to human DDRGK1, and this is experimentally supported in Drosophila
      by PMID:37086384 which shows Ddrgk1 mediates ufmylation of Atg9. The adaptor
      activity term is appropriate for this function.
    supported_by:
      - reference_id: PMID:37086384
        supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1, a critical regulator of Ufmylation"
- term:
    id: GO:0071569
    label: protein ufmylation
  evidence_type: IMP
  original_reference_id: PMID:37086384
  review:
    summary: >-
      IMP annotation from FlyBase based on Li et al. 2023. The study demonstrates
      that Ddrgk1 is required for ufmylation of Atg9 in Drosophila. Loss of Ddrgk1
      function impairs ufmylation and leads to neurodegeneration. This is the core
      biological process annotation for Ddrgk1.
    action: ACCEPT
    reason: >-
      This is the central biological process of Ddrgk1. The paper directly demonstrates
      that Ddrgk1 mediates ufmylation of Atg9, and that this process is neuroprotective.
      IMP evidence from mutant phenotype analysis is appropriate.
    supported_by:
      - reference_id: PMID:37086384
        supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1, a critical regulator of Ufmylation"
- term:
    id: GO:0098554
    label: cytoplasmic side of endoplasmic reticulum membrane
  evidence_type: TAS
  original_reference_id: PMID:37086384
  review:
    summary: >-
      TAS annotation from FlyBase. Ddrgk1 has a single transmembrane helix near
      the N-terminus (residues 3-23) with a very short lumenal segment (residues 1-2)
      and a large cytoplasmic domain (residues 24-309). This topology places the
      functional DDRGK domain on the cytoplasmic face of the ER membrane, consistent
      with its role in ufmylation of cytoplasmic-facing substrates.
    action: ACCEPT
    reason: >-
      The cytoplasmic side of ER membrane localization is consistent with the
      transmembrane topology of Ddrgk1 (short lumenal N-terminus, large cytoplasmic
      C-terminal domain) and its function in ufmylation of substrates like Atg9.
      This is more specific and informative than the broader ER membrane term.
    supported_by:
      - reference_id: PMID:37086384
        supporting_text: "Atg9 is identified as a conserved target of Ufm1 conjugation mediated by Ddrgk1, a critical regulator of Ufmylation"
- term:
    id: GO:0005783
    label: endoplasmic reticulum
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from human DDRGK1 (Q96HY6) by curator judgment.
      This is consistent with the ER membrane localization supported by the
      transmembrane domain and the more specific annotations to GO:0005789 and
      GO:0098554. As a broader parent term, it is subsumed by the more specific
      ER membrane annotations.
    action: ACCEPT
    reason: >-
      ER localization is well-established for DDRGK1 family members. The ISS
      transfer from human Q96HY6 is appropriate. While more specific terms are
      also annotated, this broader term is not incorrect.
- term:
    id: GO:0044389
    label: ubiquitin-like protein ligase binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: >-
      ISS annotation transferred from human DDRGK1 (Q96HY6). This duplicates the
      IBA annotation for the same term. The annotation is appropriate as Ddrgk1
      interacts with Ufl1, the E3-like ligase of the ufmylation pathway, and this
      is conserved across species.
    action: ACCEPT
    reason: >-
      Duplicate of the IBA annotation but with ISS evidence from human ortholog
      transfer. Both lines of evidence support the same conclusion. Duplicates with
      different evidence codes are acceptable.
