proposed_new_terms: []

suggested_questions:
- question: >-
    Does Drosophila PLEKHM1 also function in endosome-lysosome fusion for endocytic degradation,
    as shown for the mammalian ortholog? The current annotations focus on crinophagy and
    autophagy but the endocytic pathway may also be affected.
- question: >-
    Is the RING-type zinc finger domain of Drosophila PLEKHM1 functionally active as an E3
    ubiquitin ligase, and if so, what are its substrates? The domain architecture suggests
    possible ubiquitin ligase activity but this has not been directly tested.

suggested_experiments:
- description: >-
    Co-immunoprecipitation or proximity labeling experiments in Drosophila tissues to identify
    the full interactome of PLEKHM1, particularly to determine whether it directly binds HOPS
    subunits or other trafficking factors beyond Rab7.
- description: >-
    Analysis of endocytic degradation (e.g. avidin uptake assays in nephrocytes) in Plekhm1
    mutant or RNAi conditions to determine whether PLEKHM1 is also required for
    endosome-lysosome fusion in the endocytic pathway.
