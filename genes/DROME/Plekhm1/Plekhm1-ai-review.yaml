id: Q9W293
gene_symbol: Plekhm1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Drosophila Plekhm1 (Pleckstrin homology and RUN domain containing M1, also known as CG6613)
  is an effector of the small GTPase Rab7 that functions in lysosomal fusion events. The protein
  contains RUN, phorbol-ester/DAG-type, and RING-type zinc finger domains. PLEKHM1 binds
  GTP-locked Rab7 and participates in the HOPS tethering complex-dependent fusion of
  autophagosomes and endosomes with lysosomes. It is also required for crinophagy, the
  developmentally programmed direct fusion of secretory granules with lysosomes in Drosophila
  salivary gland cells during metamorphosis. Knockdown of Plekhm1 blocks glue granule-lysosome
  fusion, resulting in accumulation of intact glue granules that fail to be degraded. The protein
  localizes to late endosomes and participates in multiple vesicular trafficking pathways leading
  to lysosomes.

existing_annotations:
- term:
    id: GO:0005770
    label: late endosome
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      PLEKHM1 is annotated to late endosome based on UniProtKB/Swiss-Prot subcellular location
      vocabulary mapping (GO_REF:0000044). The UniProt entry for Q9W293 includes the annotation
      "SUBCELLULAR LOCATION: Late endosome" based on the ARBA automatic annotation system. This
      is consistent with the known function of PLEKHM1 as a Rab7 effector that operates at late
      endosomes to promote their fusion with lysosomes. In mammalian cells, PLEKHM1 is recruited
      to Rab7-positive late endosomal membranes (PMID:28483915). The Drosophila protein is
      expected to similarly localize to late endosomes given its role in promoting
      endosome-lysosome and autophagosome-lysosome fusion events.
    action: ACCEPT
    reason: >-
      Late endosome localization is consistent with PLEKHM1's established role as a Rab7 effector.
      Rab7 is present on late endosomes, autophagosomes, and lysosomes, and PLEKHM1 binds
      GTP-locked Rab7 to mediate fusion of these compartments (PMID:28483915). The IEA annotation
      from UniProt subcellular location mapping is well supported by the functional literature.
    supported_by:
    - reference_id: PMID:28483915
      supporting_text: >-
        Rab7 is present on lysosomes, autophagosomes, and endosomes
    - reference_id: PMID:28483915
      supporting_text: >-
        In animal cells, Rab7 binds to RILP, ORPL1, FYCO1, and PLEKHM1 to recruit dyneins and HOPS and ensure the fusion of late endosomes and autophagosomes with lysosomes

- term:
    id: GO:0160156
    label: secretory granule-lysosome fusion
  evidence_type: IMP
  original_reference_id: PMID:29066608
  review:
    summary: >-
      Csizmadia et al. (2018) demonstrated that Drosophila Plekhm1 is required for crinophagy,
      the developmentally programmed degradation of excess glue granules via direct fusion with
      lysosomes in salivary gland cells at the onset of metamorphosis. Gland-specific knockdown
      of Plekhm1 caused a glue granule degradation defect: most granules remained intact and
      Lamp1-positive lysosomes accumulated near glue granules rather than forming rings around
      them (indicating a block in fusion). Ultrastructural analysis confirmed that mostly intact
      granules persisted in Plekhm1 RNAi cells. The annotation to GO:0160156 (secretory
      granule-lysosome fusion) accurately captures this role.
    action: ACCEPT
    reason: >-
      This is a well-supported experimental annotation (IMP) based on RNAi knockdown phenotype.
      The publication provides multiple lines of evidence including fluorescence microscopy
      (GlueFlux reporter, Lamp1 ring formation assays) and transmission electron microscopy
      showing that Plekhm1 knockdown blocks the direct fusion of secretory glue granules with
      lysosomes. The term GO:0160156 (secretory granule-lysosome fusion) precisely describes the
      observed phenotype.
    supported_by:
    - reference_id: PMID:29066608
      supporting_text: >-
        Gland-specific knockdown of either Rab2 or Rab7 or Plekhm1 caused a glue granule degradation defect, as most granules remained intact at 0 h RPF, unlike in control cells
    - reference_id: PMID:29066608
      supporting_text: >-
        Moreover, loss of Rab2, Rab7, or PLEKHM1 resulted in the accumulation of Lamp1-positive lysosomes near glue granules instead of ring formation, as in control cells
    - reference_id: PMID:29066608
      supporting_text: >-
        Indeed, most glue granules retained an intact ultrastructure in Rab2, Rab7, Plekhm1, Syx13, Snap29, and Vamp7 RNAi cells, unlike in controls (Fig. 7). Collectively, these findings suggest that Rab2, Rab7 (and its binding partner, PLEKHM1), and the SNAREs Syx13, Snap29, and Vamp7 are all required for glue granule–lysosome fusion.

- term:
    id: GO:0031267
    label: small GTPase binding
  evidence_type: IPI
  original_reference_id: PMID:28483915
  review:
    summary: >-
      Lorincz et al. (2017) demonstrated via yeast two-hybrid (Y2H) assays that GTP-locked
      Drosophila Rab7 directly binds to PLEKHM1. The WITH/FROM column in the GOA references
      FB:FBgn0015795 (Rab7), confirming the interacting partner. This interaction is central to
      PLEKHM1's function: PLEKHM1 serves as a Rab7 effector that helps recruit the HOPS tethering
      complex and promote lysosomal fusion events. The annotation to GO:0031267 (small GTPase
      binding) is appropriate, as Rab7 is a small monomeric GTPase.
    action: ACCEPT
    reason: >-
      The Y2H data directly demonstrates physical interaction between PLEKHM1 and GTP-locked
      Rab7, a small GTPase. The term GO:0031267 (small GTPase binding) accurately describes this
      molecular function. While one could argue for a more specific term such as "Rab GTPase
      binding", GO:0031267 is the standard term used in GO and is not overly broad -- it
      specifies binding to small monomeric GTPases rather than generic protein binding. This is a
      core molecular function of PLEKHM1.
    supported_by:
    - reference_id: PMID:28483915
      supporting_text: >-
        GTP-locked Rab7 bound to its known effector PLEKHM1 in yeast two-hybrid (Y2H) experiments
    - reference_id: PMID:28483915
      supporting_text: >-
        Y2H assays reveal that GTP-locked Drosophila Rab2 binds to Vps39 and Rab7GTP binds to PLEKHM1

- term:
    id: GO:0061909
    label: autophagosome-lysosome fusion
  evidence_type: TAS
  original_reference_id: PMID:28483915
  review:
    summary: >-
      PLEKHM1 is described as an effector of Rab7 that is involved in autophagosome-lysosome
      fusion in both Drosophila and mammalian cells. Lorincz et al. (2017) state that Rab7 binds
      PLEKHM1 to recruit HOPS and ensure the fusion of autophagosomes with lysosomes. Csizmadia
      et al. (2018) describe PLEKHM1 as being involved in autophagosome-lysosome fusion in the
      introduction to their crinophagy study. While the existing GOA annotations do not include
      this term, the literature strongly supports this function.
    action: NEW
    reason: >-
      Both PMID:28483915 and PMID:29066608 describe PLEKHM1 as a Rab7 effector involved in
      autophagosome-lysosome fusion. This is a core conserved function of PLEKHM1 family members
      and is not currently captured in the GOA annotations for the Drosophila gene. This
      annotation would complement the existing secretory granule-lysosome fusion annotation.
    supported_by:
    - reference_id: PMID:28483915
      supporting_text: >-
        In animal cells, Rab7 binds to RILP, ORPL1, FYCO1, and PLEKHM1 to recruit dyneins and HOPS and ensure the fusion of late endosomes and autophagosomes with lysosomes
    - reference_id: PMID:29066608
      supporting_text: >-
        the small GTPases Rab2 and Rab7 and its binding partner, PLEKHM1, which are involved in autophagosome–lysosome fusion

references:
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary
    mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings: []
- id: PMID:28483915
  title: Rab2 promotes autophagic and endocytic lysosomal degradation.
  findings:
  - statement: >-
      GTP-locked Rab7 directly binds PLEKHM1 in yeast two-hybrid assays, establishing PLEKHM1
      as a Rab7 effector in Drosophila.
    supporting_text: >-
      GTP-locked Rab7 bound to its known effector PLEKHM1 in yeast two-hybrid (Y2H) experiments
  - statement: >-
      PLEKHM1 functions as an adaptor between Rab7 and the HOPS tethering complex to promote
      fusion of late endosomes and autophagosomes with lysosomes.
    supporting_text: >-
      In animal cells, Rab7 binds to RILP, ORPL1, FYCO1, and PLEKHM1 to recruit dyneins and HOPS and ensure the fusion of late endosomes and autophagosomes with lysosomes
  - statement: >-
      A model is proposed where Rab7 interacts with HOPS via adaptors such as PLEKHM1 on one
      end while Rab2 binds Vps39 on the other end.
    supporting_text: >-
      Vps41 located on the other end of HOPS may bind Rab7 vesicles via adaptors such as PLEKHM1
- id: PMID:29066608
  title: Molecular mechanisms of developmentally programmed crinophagy in Drosophila.
  findings:
  - statement: >-
      Plekhm1 knockdown in salivary gland cells blocks glue granule-lysosome fusion required
      for crinophagy during metamorphosis.
    supporting_text: >-
      Gland-specific knockdown of either Rab2 or Rab7 or Plekhm1 caused a glue granule degradation defect, as most granules remained intact at 0 h RPF, unlike in control cells
  - statement: >-
      Loss of PLEKHM1 causes accumulation of lysosomes near glue granules without fusion.
    supporting_text: >-
      Moreover, loss of Rab2, Rab7, or PLEKHM1 resulted in the accumulation of Lamp1-positive lysosomes near glue granules instead of ring formation, as in control cells
  - statement: >-
      Ultrastructural analysis confirms that Plekhm1 RNAi prevents crinosome formation.
    supporting_text: >-
      Indeed, most glue granules retained an intact ultrastructure in Rab2, Rab7, Plekhm1, Syx13, Snap29, and Vamp7 RNAi cells, unlike in controls (Fig. 7). Collectively, these findings suggest that Rab2, Rab7 (and its binding partner, PLEKHM1), and the SNAREs Syx13, Snap29, and Vamp7 are all required for glue granule–lysosome fusion.
  - statement: >-
      PLEKHM1 functions together with Rab2, Rab7, HOPS complex, and SNAREs in crinophagy.
    supporting_text: >-
      the tethering complex HOPS (homotypic fusion and protein sorting); the small GTPases Rab2, Rab7, and its effector, PLEKHM1; and a SNAP receptor complex consisting of Syntaxin 13, Snap29, and Vamp7 are all required for the fusion of secretory granules with lysosomes

core_functions:
- molecular_function:
    id: GO:0031267
    label: small GTPase binding
  description: >-
    PLEKHM1 is an effector of the small GTPase Rab7. It binds GTP-loaded Rab7 and serves as an
    adaptor to recruit the HOPS tethering complex, thereby promoting the fusion of late endosomes,
    autophagosomes, and secretory granules with lysosomes. This Rab7 effector function is the core
    molecular activity of PLEKHM1 and is conserved from Drosophila to mammals.
