suggested_questions:
- question: >-
    Do the three tandem mitochondrial enoyl-CoA delta-isomerase paralogs (CG4592/CG4594/CG4598) have
    distinct expression or substrate roles, or are they functionally redundant copies of the
    mitochondrial delta(3),delta(2)-enoyl-CoA isomerase?
suggested_experiments:
- description: >-
    Expression profiling and individual/combined knockouts of CG4592, CG4594 and CG4598 to test
    functional redundancy and confirm the mitochondrial delta(3),delta(2)-enoyl-CoA isomerase step of
    unsaturated fatty acid beta-oxidation in the fly.
  hypothesis: >-
    The CG4592/CG4594/CG4598 cluster provides the mitochondrial delta(3),delta(2)-enoyl-CoA isomerase
    activity (distinct from peroxisomal Dci) required for the mitochondrial unsaturated-FAO cassette.
