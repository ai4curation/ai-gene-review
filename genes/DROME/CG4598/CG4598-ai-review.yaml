  label: Drosophila melanogaster
description: >-
  CG4598 is one of a tandem cluster of three Drosophila melanogaster mitochondrial enoyl-CoA delta
  isomerase 1 paralogs (with CG4592 and CG4594), the mitochondrial-type (human ECI1 class)
  delta(3),delta(2)-enoyl-CoA isomerases (EC 5.3.3.8). It is an auxiliary enzyme of unsaturated fatty
  acid beta-oxidation that isomerizes both 3-cis (3Z) and 3-trans (3E) enoyl-CoA double bonds into the
  2-trans (2E) form (with a preference for (3Z)-enoyl-CoAs), regenerating the substrate of the core
  enoyl-CoA hydratase so that unsaturated fatty acids with double bonds at odd-numbered positions can
  be fully degraded. It localizes to the mitochondrial matrix (also supported by organelle proteomics)
  and, unlike the peroxisomal-type isomerase Dci, is a mitochondrial isomerase relevant to the
  mitochondrial unsaturated-FAO cassette.
