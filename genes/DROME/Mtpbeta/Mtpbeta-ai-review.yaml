id: Q9W1H8
gene_symbol: Mtpbeta
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Mtpbeta (CG4581; dHADHB) is the single Drosophila melanogaster ortholog of human HADHB
  and encodes the beta subunit of the mitochondrial trifunctional protein (MTP), an
  alpha2-beta2 heterotetramer formed with Mtpalpha (the fly HADHA ortholog). Within this
  complex the beta subunit provides the long-chain 3-ketoacyl-CoA thiolase (acetyl-CoA
  C-acyltransferase, EC 2.3.1.16) activity that catalyzes the final, thiolytic-cleavage
  step of each round of mitochondrial long-chain fatty acid beta-oxidation, releasing
  acetyl-CoA and a chain-shortened acyl-CoA. It is a member of the thiolase-like
  superfamily (thiolase family) with tandem N- and C-terminal thiolase domains and is
  imported into mitochondria. Loss of Mtpbeta in the fly impairs long-chain fatty acid
  beta-oxidation, causing accumulation of acylcarnitines and hydroxyacylcarnitines and
  organismal phenotypes including reduced lifespan, defective locomotion and reduced
  fecundity, mirroring human MTP deficiency.
existing_annotations:
- term:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      IBA (phylogenetic) annotation of thiolase/acetyltransferase activity to Mtpbeta.
      Mtpbeta is the fly ortholog of human HADHB and provides the thiolase activity of the
      MTP complex, so a thiolase-family molecular function is correct. GO:0003985 uses the
      C-acetyltransferase (EC 2.3.1.9) label, which is a closely related short-chain
      homolog activity; the specific long-chain MTP beta-subunit activity is better
      captured by GO:0003988 (acetyl-CoA C-acyltransferase, EC 2.3.1.16).
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0003988
      label: acetyl-CoA C-acyltransferase activity
    reason: >-
      The essence (thiolase/acyltransferase activity of the MTP beta subunit) is correct,
      but the more precise term for the long-chain trifunctional-protein thiolase is
      GO:0003988 (EC 2.3.1.16), which is separately annotated by ISS from human HADHB.
- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: >-
      IBA annotation placing Mtpbeta in the fatty acid beta-oxidation pathway. This is the
      core biological process of the MTP complex and is directly supported in the fly by
