- term:
    id: GO:0003985
    label: acetyl-CoA C-acetyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      IEA annotation derived from EC-number mapping (EC:2.3.1.9). This maps to the
      C-acetyltransferase activity, a related thiolase-family reaction, rather than the
      specific long-chain acyltransferase (EC 2.3.1.16) that defines the MTP beta subunit.
      Technically within the thiolase family but not the most precise term.
    action: MODIFY
    proposed_replacement_terms:
    - id: GO:0003988
      label: acetyl-CoA C-acyltransferase activity
    reason: >-
      The thiolase-family activity is correct, but GO:0003988 (EC 2.3.1.16) is the accurate
      MF for the long-chain MTP beta-subunit thiolase; the C-acetyltransferase (EC 2.3.1.9)
      mapping is a broader/related family activity.
- term:
    id: GO:0003988
