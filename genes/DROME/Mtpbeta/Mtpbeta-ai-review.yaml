suggested_questions:
- question: >-
    Does the FlyBase IMP "determination of adult lifespan" annotation (GO:0008340, based on
    the neuron-specific dHADHB knockdown study PMID:30953623) reflect a direct role of
    Mtpbeta in lifespan determination, or an indirect consequence of impaired neuronal
    energy metabolism? This annotation is present in UniProt GO cross-references but not in
    the current QuickGO export reviewed here.
- question: >-
    Is the substrate specificity of the fly MTP beta subunit restricted to long-chain
    3-ketoacyl-CoAs (C10-C16) as in mammals, and does GO:0003985 (C-acetyltransferase,
    EC 2.3.1.9) reflect any genuine short-chain activity or only EC/phylogenetic mapping?
suggested_experiments:
- description: >-
    Assay 3-ketoacyl-CoA thiolase activity of recombinant Mtpbeta (alone and reconstituted
    with Mtpalpha) across acyl-chain lengths.
  hypothesis: >-
    Mtpbeta supplies the sole thiolase activity of the fly MTP complex and prefers
    long-chain (C10-C16) 3-ketoacyl-CoA substrates, consistent with human HADHB.
- description: >-
    Test whether tissue-restricted (e.g. neuronal vs. fat body) rescue of Mtpbeta(KO) flies
    separates the beta-oxidation metabolic defect from the organismal lifespan/locomotor
    phenotypes.
  hypothesis: >-
    The lifespan and locomotor phenotypes of Mtpbeta loss arise from tissue-specific energy
    deficits downstream of impaired long-chain fatty acid beta-oxidation.
