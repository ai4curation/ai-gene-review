      Core molecular function. EC 2.3.1.16 (acetyl-CoA C-acyltransferase / long-chain
      3-ketoacyl-CoA thiolase) is the reaction catalyzed by the MTP beta subunit; UniProt
      assigns this EC to Mtpbeta.
