    Provides the long-chain 3-ketoacyl-CoA thiolase (acetyl-CoA C-acyltransferase,
    EC 2.3.1.16) activity of the Drosophila mitochondrial trifunctional protein, catalyzing
    the thiolytic cleavage of 3-ketoacyl-CoA to acetyl-CoA and a chain-shortened acyl-CoA in
    each cycle of long-chain fatty acid beta-oxidation. Functions as the beta subunit of the
    alpha2-beta2 MTP complex formed with Mtpalpha.
