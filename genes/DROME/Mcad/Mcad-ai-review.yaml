core_functions:
- description: >-
    Mcad catalyzes the FAD-dependent, ETF-coupled alpha,beta-dehydrogenation of medium-chain
    acyl-CoA esters (canonically C6-C12), the first and committed step of each cycle of
    mitochondrial fatty acid beta-oxidation, producing the corresponding trans-2-enoyl-CoA. This
    is the defining molecular function of the enzyme, established in fly by the medium-chain
    acylcarnitine accumulation (C6, C8, C10:1) in Mcad loss-of-function models that phenocopies
    human MCAD deficiency.
  molecular_function:
    id: GO:0070991
    label: medium-chain fatty acyl-CoA dehydrogenase activity
  directly_involved_in:
  - id: GO:0033539
    label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
  - id: GO:0051793
    label: medium-chain fatty acid catabolic process
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: PMID:29563254
    supporting_text: "MCAD's canonical function is to break down medium-chain fatty acids (C6-12)"
  - reference_id: PMID:29563254
    supporting_text: "significant elevations in medium-chain acylcarnitines characteristic of human MCAD deficiency: C6, C8, and C10:1 acylcarnitines"
- description: >-
    Cofactor binding required for catalysis. As an acyl-CoA dehydrogenase family flavoprotein,
    each Mcad subunit binds one non-covalently associated FAD (annotated in UniProt by similarity
    to human MCAD), the redox cofactor that accepts the two electrons removed from the acyl-CoA
    substrate before passing them to the electron-transfer flavoprotein; FAD is essential for the
    FAD-dependent EC 1.3.8.7 dehydrogenation.
  molecular_function:
    id: GO:0050660
    label: flavin adenine dinucleotide binding
  directly_involved_in:
  - id: GO:0006635
    label: fatty acid beta-oxidation
  locations:
  - id: GO:0005759
    label: mitochondrial matrix
  supported_by:
  - reference_id: Q9VSA3
    supporting_text: "Name=FAD; Xref=ChEBI:CHEBI:57692"
proposed_new_terms: []
suggested_questions:
- question: >-
    What is the molecular mechanism by which PINK1-dependent phosphorylation of Mcad at Ser347
    contributes to rescue of PINK1-null climbing, flight, and thoracic/wing phenotypes, given
    that this rescue is independent of Mcad's acyl-CoA dehydrogenase activity and of ATP
    production? Does phosphorylated Mcad acquire a moonlighting (non-catalytic) function or
    protein interaction?
- question: >-
    Does fly Mcad share the same medium-chain substrate optimum (hexanoyl-/octanoyl-CoA) and
    chain-length boundaries as mammalian MCAD, and how does its activity partition with other
    Drosophila acyl-CoA dehydrogenases across the fly FAO chain-length range?
suggested_experiments:
- description: >-
    Purify recombinant fly Mcad and determine its substrate-specificity profile across C4-C16
    saturated acyl-CoAs using an ETF- or artificial-acceptor-coupled dehydrogenase assay, to
    confirm the medium-chain optimum and directly ground the GO:0070991 molecular-function
    annotation in fly biochemistry.
- description: >-
    Use phosphosite-specific (S347A/S347D) Mcad knock-in flies combined with proximity-labeling
    interactomics and metabolomics in wild-type and PINK1-null backgrounds to define the
    catalysis-independent, phosphorylation-dependent function of Mcad.
