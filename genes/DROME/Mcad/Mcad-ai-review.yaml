id: Q9VSA3
gene_symbol: Mcad
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Mcad (CG12262) is the Drosophila melanogaster ortholog of human ACADM (MCAD), a mitochondrial
  medium-chain specific acyl-CoA dehydrogenase (EC 1.3.8.7). It is synthesized with an N-terminal
  mitochondrial transit peptide and, after import, catalyzes the first, committed step of each
  cycle of mitochondrial fatty acid beta-oxidation for medium-chain (C6-C12) acyl-CoA esters:
  the FAD-dependent alpha,beta-dehydrogenation of a saturated medium-chain acyl-CoA to the
  corresponding trans-2-enoyl-CoA, with electrons passed to the electron-transfer flavoprotein
  (ETF) and thence to the respiratory chain. Each subunit carries one non-covalently bound FAD,
  and the mammalian ortholog assembles as a soluble homotetramer. The enzyme resides principally
  in the mitochondrial matrix, with a secondary cytosolic pool detected biochemically in flies.
  Loss of Mcad function in flies (CRISPR deletion, deficiency transheterozygotes, or RNAi
  knockdown) elevates medium-chain acylcarnitines (C6, C8, C10:1), the same biochemical signature
  seen in human MCAD deficiency, establishing Mcad as the medium-chain beta-oxidation enzyme in
  the fly. Mcad is also phosphorylated at Ser347 in a PINK1-dependent manner; this modification
  contributes to Pink1-related metabolic and neuromuscular physiology through a mechanism that is
  independent of its acyl-CoA dehydrogenase activity.
