- id: PMID:29563254
  title: Phosphorylation of MCAD selectively rescues PINK1 deficiencies in behavior and metabolism.
  findings:
  - statement: >-
      Establishes fly Mcad (CG12262) as the medium-chain acyl-CoA dehydrogenase of fatty acid
      beta-oxidation; loss-of-function models elevate C6/C8/C10:1 acylcarnitines as in human MCAD
      deficiency, rescued by wild-type Mcad.
    supporting_text: "significant elevations in medium-chain acylcarnitines characteristic of human MCAD deficiency: C6, C8, and C10:1 acylcarnitines"
  - statement: >-
      Mcad is a mitochondrial matrix protein with a secondary cytosolic pool detected by
      fractionation of fly lysates.
    supporting_text: "both endogenous and transgenic MCAD protein localized to the mitochondria as well as the cytosol, consistent with a previous report in mammals"
  - statement: >-
      Identifies a novel, catalysis-independent role: PINK1-dependent phosphorylation at Ser347
      whose phosphomimetic rescues PINK1-null neuromuscular and metabolic phenotypes.
    supporting_text: "phosphomimetic MCAD S347 likely rescues PINK1 null's organismal phenotypes independently of MCAD's acyl-CoA dehydrogenase activity"
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available (PMC5935071); the sole primary experimental study on fly Mcad and the
      source of the EXP/IDA/IMP annotations. Directly supports the core medium-chain acyl-CoA
      dehydrogenase MF, beta-oxidation BP, and mitochondrial matrix / cytosol localization.
