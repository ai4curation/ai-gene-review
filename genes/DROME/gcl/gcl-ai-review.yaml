id: Q01820
gene_symbol: gcl
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Germ cell-less (GCL) is a maternally provided BTB/POZ-domain protein that functions
  as a substrate-specific adaptor in the Cullin3-RING E3 ubiquitin ligase complex
  (CRL3-GCL). Its primary identified substrate is the receptor tyrosine kinase Torso,
  which GCL targets for polyubiquitination and proteasomal degradation at the posterior
  pole of the early embryo. By eliminating Torso signaling in the nascent primordial
  germ cells, GCL enables pole cell fate specification and establishment of
  transcriptional quiescence in the germline. GCL localizes to the nuclear envelope
  during interphase and translocates to the plasma membrane during mitosis upon nuclear
  envelope breakdown, providing cell-cycle-dependent spatiotemporal control of its E3
  ligase activity. The mammalian homolog GMCL1 is associated with male fertility
  disorders.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Accept. GCL protein is a component of the pole plasm (a specialized cytoplasm)
      at the posterior pole of the embryo. UniProt annotates GCL to "Cytoplasm.
      Note=Pole plasm." This is consistent with the known biology of GCL as a germ
      plasm component [PMID:1380406, PMID:7958883].
    action: ACCEPT
    supported_by:
      - reference_id: PMID:7958883
        supporting_text: "gcl protein associates specifically with the nuclear pores of the pole cell nuclei"
- term:
    id: GO:0007281
    label: germ cell development
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Accept but as non-core. GCL is required for germ cell specification (pole cell
      formation), which is the very first step of germ cell development. However, the
      more specific terms pole cell formation (GO:0007279) and pole cell fate
      determination (GO:0007278) are more informative for GCL's actual role. The IEA
      annotation via InterPro (IPR043380, Germ cell-less protein-like) is correct in
      assigning this broad term. Note there is also an IGI annotation below with direct
      experimental evidence.
    action: KEEP_AS_NON_CORE
    supported_by:
      - reference_id: file:DROME/gcl/gcl-deep-research-bioreason.md
        supporting_text: "pole cell fate determination (GO:0007280) and contributes to germ cell development (GO:0007281)"
- term:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  evidence_type: IDA
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as CORE FUNCTION. This is the primary molecular function of GCL. Pae et
      al. (2017) demonstrated that GCL is a substrate-specific adaptor for the CUL3-RING
      ubiquitin ligase complex (CRL3-GCL). GCL binds CUL3 through the conserved phi-x-E
      motif in its BTB domain, and mutation of this motif (E100K) abolishes the
      interaction and PGC formation. The GCL domain provides substrate recognition for
      Torso RTK. IDA evidence from co-immunoprecipitation, ubiquitination assays, and
      in vivo degradation assays.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "GCL, a conserved BTB (Broad-complex, Tramtrack, and Bric-a-brac) protein, is a substrate-specific adaptor for Cullin3-RING ubiquitin ligase complex (CRL3GCL)"
- term:
    id: GO:0007281
    label: germ cell development
  evidence_type: IGI
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as non-core. The IGI evidence is based on genetic interactions between gcl
      and cul3 (and torso pathway components) demonstrating that CRL3-GCL promotes germ
      cell development by degrading Torso. Dosage-dependent genetic interactions between
      gcl and cul3 LOF alleles showed reduced PGC numbers. The more specific terms pole
      cell formation and fate determination better capture GCL's role.
    action: KEEP_AS_NON_CORE
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "Introduction of a single cul3 loss-of-function (LOF) allele into a gcl heterozygous background (gclΔ/+, cul3LOF/+) led to a significant reduction in PGCs compared to each heterozygous control"
- term:
    id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  evidence_type: IDA
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as core. GCL as part of CRL3-GCL mediates polyubiquitination and
      subsequent proteasomal degradation of the Torso RTK. This was demonstrated
      by in vivo degradation of Torso upon GCL overexpression (blocked by MLN4924,
      a Cullin-RING ligase inhibitor), and by ubiquitination ladders in denaturing
      immunoprecipitation assays.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "CRL3GCL targets Torso for poly-ubiquitylation and degradation"
- term:
    id: GO:0120177
    label: negative regulation of torso signaling pathway
  evidence_type: IMP
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as CORE FUNCTION. This is the central biological role of GCL: negatively
      regulating Torso signaling by mediating degradation of the Torso receptor at the
      posterior pole. Loss of gcl leads to persistent Torso expression and signaling in
      PGCs. Mutations in the torso pathway (tsl LOF) completely rescue the gcl null PGC
      formation defect, directly demonstrating that GCL's major function is to inhibit
      Torso signaling.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "introducing tsl mutations completely restored PGC formation and division in gclΔ/Δ embryos"
- term:
    id: GO:0000209
    label: protein polyubiquitination
  evidence_type: IDA
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as core. GCL induces polyubiquitination of Torso, demonstrated by
      high-molecular-weight ubiquitin ladders on Torso immunoprecipitates under
      denaturing conditions. This activity requires the CUL3 interaction (abolished
      by E100K mutation) and is blocked by MLN4924.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "GCL induced a ladder of several high molecular-weight bands that correspond to ubiquitylated forms of Torso"
- term:
    id: GO:0007278
    label: pole cell fate determination
  evidence_type: IGI
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as CORE FUNCTION. The IGI evidence is from genetic interactions with torso
      pathway genes (tor, tsl) and cul3. GCL determines pole cell fate by preventing
      somatic fate acquisition through degradation of Torso. The gcl/tsl double mutant
      rescue demonstrates that GCL acts upstream of Torso to allow germline fate.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "We show that CRL3GCL promotes PGC fate by mediating degradation of Torso, a receptor tyrosine kinase (RTK) and major determinant of somatic cell fate"
- term:
    id: GO:0031463
    label: Cul3-RING ubiquitin ligase complex
  evidence_type: IPI
  original_reference_id: PMID:28743001
  review:
    summary: >-
      Accept as CORE. GCL physically interacts with CUL3 through its BTB domain to
      form the CRL3-GCL complex. Co-immunoprecipitation demonstrated this interaction
      in both oocyte lysates and Drosophila S2 cells. The BTB phi-x-E motif mediates
      the CUL3 interaction.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "transgenically expressed CUL3 co-immunoprecipitated with endogenous GCL in oocyte lysate extracts"
- term:
    id: GO:0005938
    label: cell cortex
  evidence_type: IDA
  original_reference_id: PMID:19393317
  review:
    summary: >-
      Accept. GCL is detected at the cell cortex. This is consistent with GCL's
      translocation to the plasma membrane during mitosis, where it interacts with and
      degrades the Torso RTK. GCL co-localizes with submembranous F-actin during mitosis.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:19393317
        supporting_text: "Gcl is expressed during oogenesis, and that it is regulated by the translational repressor Bruno (Bru)"
      - reference_id: PMID:28743001
        supporting_text: "However, following nuclear envelope breakdown during mitosis, we found that GCL localized closer to submembranous F-actin"
- term:
    id: GO:0034399
    label: nuclear periphery
  evidence_type: IDA
  original_reference_id: PMID:19393317
  review:
    summary: >-
      Accept. GCL localizes to the nuclear periphery (nucleoplasmic face of the
      nuclear envelope) during interphase. This localization serves as a sequestration
      mechanism to prevent inappropriate CRL3-GCL activity when it is not needed. This
      is consistent with the original observation of nuclear pore association and later
      refined localization studies.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:7958883
        supporting_text: "gcl protein associates specifically with the nuclear pores of the pole cell nuclei"
      - reference_id: PMID:28743001
        supporting_text: "We observed the GCLWT transgene at the nuclear membrane during interphase in blastoderm embryos"
- term:
    id: GO:0005643
    label: nuclear pore
  evidence_type: IDA
  original_reference_id: PMID:7958883
  review:
    summary: >-
      Accept but note that later studies refined the localization. Jongens et al.
      (1994) reported that GCL associates specifically with nuclear pores of pole cell
      nuclei by immunoEM. Subsequent work (Robertson et al. 1999, Pae et al. 2017)
      showed GCL localizes more broadly to the nucleoplasmic face of the nuclear
      envelope, but the original nuclear pore association is well supported by the
      direct experimental evidence in this paper.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:7958883
        supporting_text: "gcl protein associates specifically with the nuclear pores of the pole cell nuclei"
- term:
    id: GO:0007278
    label: pole cell fate determination
  evidence_type: IDA
  original_reference_id: PMID:7958883
  review:
    summary: >-
      Accept as CORE FUNCTION. Jongens et al. (1994) demonstrated that GCL is required
      for pole cell specification. Mothers with reduced gcl levels produce progeny
      lacking pole cells. Overexpression causes a transient increase in pole cells.
      Ectopic anterior localization of gcl causes nuclei there to adopt pole cell fate.
      This is direct evidence (IDA) for pole cell fate determination.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:7958883
        supporting_text: "Ectopic localization of gcl to the anterior pole of the embryo causes nuclei at that location to adopt characteristics of pole cell nuclei"
- term:
    id: GO:0007279
    label: pole cell formation
  evidence_type: TAS
  original_reference_id: PMID:12655640
  review:
    summary: >-
      Accept as CORE. The review by Leatherman & Jongens (2003) discusses GCL as a
      germ plasm component necessary for proper formation of pole cells, establishing
      transcriptional quiescence as a key feature of pole cell formation. This
      TAS annotation is well supported by the primary literature.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:12655640
        supporting_text: "a period of transcriptional quiescence in the early germ cell precursors"
- term:
    id: GO:0007279
    label: pole cell formation
  evidence_type: TAS
  original_reference_id: PMID:8970731
  review:
    summary: >-
      Accept. This review by Williamson & Lehmann (1996) covers germ cell development
      in Drosophila and discusses gcl as a key component required for pole cell
      formation. TAS evidence is appropriate for a review article.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:8970731
        supporting_text: "In this review, we address various aspects of germ cell development in Drosophila, such as germ cell determination, germ cell migration, gonad formation, sex determination, and gametogenesis"
- term:
    id: GO:0016480
    label: negative regulation of transcription by RNA polymerase III
  evidence_type: IMP
  original_reference_id: PMID:12361572
  review:
    summary: >-
      Accept. Leatherman et al. (2002) showed that GCL is required for transcriptional
      quiescence in pole cell precursors, including repression of RNA Pol III-dependent
      transcription. GCL can repress transcription ectopically, independent of other
      germ plasm components. Later work (Pae et al. 2017, Colonnetta et al. 2021)
      showed this repression is mechanistically linked to Torso pathway inhibition,
      but the Pol III repression phenotype is well documented.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:12361572
        supporting_text: "GCL can repress transcription of at least a subset of genes in an ectopic context, independent of other germ plasm components"
- term:
    id: GO:0045892
    label: negative regulation of DNA-templated transcription
  evidence_type: TAS
  original_reference_id: PMID:12655640
  review:
    summary: >-
      Accept. The review discusses GCL's role in establishing transcriptional
      quiescence during germline development, which involves broad transcriptional
      silencing. Later mechanistic studies showed this is achieved through Torso
      degradation, but the transcriptional repression phenotype is the downstream
      biological consequence of GCL activity in the germline.
    action: ACCEPT
    supported_by:
      - reference_id: PMID:12655640
        supporting_text: "a period of transcriptional quiescence in the early germ cell precursors"
      - reference_id: PMID:12361572
        supporting_text: "Germ cell-less (GCL), a germ plasm component necessary for the proper formation of"
