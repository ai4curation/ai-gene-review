- id: PMID:1380406
  title: The germ cell-less gene product, a posteriorly localized component necessary
    for germ cell development in Drosophila.
  findings:
    - statement: gcl mRNA is posteriorly localized in the germ plasm and required for germ cell development
      supporting_text: "Mothers with reduced gcl function give rise to sterile adult progeny that lack germ cells"
    - statement: GCL protein associates with nuclei that will become pole cell nuclei
      supporting_text: "gcl protein specifically associates with those nuclei that later become the nuclei of the germ cell precursors"
- id: PMID:7958883
  title: Germ cell-less encodes a cell type-specific nuclear pore-associated protein
    and functions early in the germ-cell specification pathway of Drosophila.
  findings:
    - statement: GCL protein associates specifically with nuclear pores of pole cell nuclei
      supporting_text: "gcl protein associates specifically with the nuclear pores of the pole cell nuclei"
    - statement: GCL overexpression produces extra pole cells; ectopic localization induces pole cell fate
      supporting_text: "Ectopic localization of gcl to the anterior pole of the embryo causes nuclei at that location to adopt characteristics of pole cell nuclei, with concurrent loss of somatic cells"
    - statement: GCL is required for pole cell specification but not posterior somatic patterning
      supporting_text: "required for specification of pole cells, but not posterior somatic cells"
- id: PMID:8970731
  title: Germ cell development in Drosophila.
  findings:
    - statement: Review discussing gcl as a key pole plasm component for pole cell formation
      supporting_text: "In this review, we address various aspects of germ cell development in Drosophila, such as germ cell determination, germ cell migration, gonad formation, sex determination, and gametogenesis"
- id: PMID:12361572
  title: germ cell-less acts to repress transcription during the establishment of
    the Drosophila germ cell lineage.
  findings:
    - statement: GCL is required for establishing transcriptional quiescence in pole cell precursors
      supporting_text: "this silencing does not occur in embryos that lack GCL activity"
    - statement: GCL can repress transcription ectopically and independently of other germ plasm components
      supporting_text: "GCL can repress transcription of at least a subset of genes in an ectopic context, independent of other germ plasm components"
    - statement: GCL is the earliest known gene acting in germline transcriptional repression
      supporting_text: "Our results place GCL as the earliest gene known to act in the transcriptional repression of the germline"
- id: PMID:12655640
  title: 'Transcriptional silencing and translational control: key features of early
    germline development.'
  findings:
    - statement: Review discussing transcriptional quiescence as a conserved feature of early germ cells
      supporting_text: "a period of transcriptional quiescence in the early germ cell precursors, has been observed in both Drosophila and C. elegans"
- id: PMID:19393317
  title: Bruno negatively regulates germ cell-less expression in a BRE-independent manner.
  findings:
    - statement: GCL is translationally repressed by Bruno during oogenesis
      supporting_text: "Gcl is expressed during oogenesis, and that it is regulated by the translational repressor Bruno (Bru)"
    - statement: Reduction of maternal Bruno leads to ectopic GCL expression and repression of anterior hkb
      supporting_text: "reduction of the maternal dosage of Bruno leads to ectopic Gcl expression in the embryo, which, in turn, represses anterior hückebein (hkb) expression"
- id: PMID:28743001
  title: GCL and CUL3 Control the Switch between Cell Lineages by Mediating Localized
    Degradation of an RTK.
  findings:
    - statement: GCL is a substrate-specific adaptor for CUL3-RING ubiquitin ligase complex
      supporting_text: "GCL, a conserved BTB (Broad-complex, Tramtrack, and Bric-a-brac) protein, is a substrate-specific adaptor for Cullin3-RING ubiquitin ligase complex (CRL3GCL)"
    - statement: CRL3-GCL targets Torso RTK for polyubiquitination and degradation
      supporting_text: "We show that CRL3GCL promotes PGC fate by mediating degradation of Torso, a receptor tyrosine kinase (RTK) and major determinant of somatic cell fate"
    - statement: GCL binds CUL3 through BTB domain phi-x-E motif; E100K abolishes interaction
      supporting_text: "substitution of the glutamic acid within the ϕ-x-E motif of GCL with lysine (E100K) disrupted the interaction between GCL and CUL3"
    - statement: Torso pathway mutations rescue gcl null PGC formation defect
      supporting_text: "introducing tsl mutations completely restored PGC formation and division in gclΔ/Δ embryos"
    - statement: GCL localizes to nuclear envelope during interphase and plasma membrane during mitosis
      supporting_text: "We observed the GCLWT transgene at the nuclear membrane during interphase in blastoderm embryos"
    - statement: Nuclear localization sequesters GCL to prevent excessive CRL3 activity
      supporting_text: "the NLS normally sequesters GCL to the nucleus and prevents GCL from targeting aberrant substrates together with CUL3"
    - statement: Conserved GCL domain is essential for Torso substrate recognition
      supporting_text: "both a deletion of the entire GCL domain (Δ40aa), as well as an alanine substitution of a highly conserved arginine within this domain (R377A), prevented GCL from interacting with endogenous Torso"
- id: PMID:33459591
  title: Antagonism between germ cell-less and Torso receptor regulates transcriptional
    quiescence underlying germline/soma distinction.
  findings:
    - statement: GCL-Torso antagonism regulates transcriptional quiescence in PGCs
      supporting_text: "Inactivation of the terminal signaling pathway by Gcl is critical for silencing transcription in PBs and PGCs"
    - statement: Sex-lethal is a biologically relevant transcriptional target of Gcl
      supporting_text: "the somatic determinant of female fate, Sex-lethal (Sxl), is a biologically relevant transcriptional target of Gcl"
core_functions:
  - molecular_function:
      id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    description: >-
      GCL serves as the substrate-specific adaptor in the CUL3-RING E3 ubiquitin
      ligase complex (CRL3-GCL). Its BTB domain binds CUL3, while the conserved
      GCL domain recognizes the substrate Torso RTK. This adaptor activity is the
      primary molecular function of GCL.
    locations:
      - id: GO:0031463
        label: Cul3-RING ubiquitin ligase complex
      - id: GO:0005938
        label: cell cortex
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "GCL, a conserved BTB (Broad-complex, Tramtrack, and Bric-a-brac) protein, is a substrate-specific adaptor for Cullin3-RING ubiquitin ligase complex (CRL3GCL)"
  - molecular_function:
      id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    directly_involved_in:
      - id: GO:0120177
        label: negative regulation of torso signaling pathway
      - id: GO:0043161
        label: proteasome-mediated ubiquitin-dependent protein catabolic process
    description: >-
      CRL3-GCL degrades the Torso RTK at the posterior pole of the embryo, thereby
      inhibiting Torso signaling and allowing pole cell specification. This is the
      central biological output of GCL function. Torso degradation is independent
      of receptor activation and is cell-cycle regulated by GCL translocation from
      the nuclear envelope to the plasma membrane during mitosis.
    locations:
      - id: GO:0005938
        label: cell cortex
    supported_by:
      - reference_id: PMID:28743001
        supporting_text: "We show that CRL3GCL promotes PGC fate by mediating degradation of Torso, a receptor tyrosine kinase (RTK) and major determinant of somatic cell fate"
  - molecular_function:
      id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    directly_involved_in:
      - id: GO:0007278
        label: pole cell fate determination
      - id: GO:0007279
        label: pole cell formation
    description: >-
      By degrading Torso at the posterior pole, GCL enables pole cell fate
      specification and prevents somatic fate acquisition. This is the primary
      developmental function of GCL. Loss of gcl results in absent or reduced pole
      cells; ectopic gcl expression induces pole cell fate at ectopic locations.
    locations:
      - id: GO:0005938
        label: cell cortex
    supported_by:
      - reference_id: PMID:7958883
        supporting_text: "Ectopic localization of gcl to the anterior pole of the embryo causes nuclei at that location to adopt characteristics of pole cell nuclei"
      - reference_id: PMID:28743001
        supporting_text: "introducing tsl mutations completely restored PGC formation and division in gclΔ/Δ embryos"
