proposed_new_terms: []
suggested_questions:
- question: >-
    Is Drosophila Ech1 mitochondrial (as its UniProt name and phylogenetic annotation indicate),
    peroxisomal (as for human ECH1 and the targeting-signal prediction), or dually localized - and
    which pool supports the mitochondrial polyunsaturated-FAO cassette?
suggested_experiments:
- description: >-
    Tagged-protein localization / organelle fractionation of Ech1 to resolve its mitochondrial versus
    peroxisomal distribution, and an in-vitro assay of recombinant Ech1 on 3E,5Z-dienoyl-CoA to
    confirm the delta(3,5),delta(2,4)-dienoyl-CoA isomerase activity.
  hypothesis: >-
    Fly Ech1 provides the dienoyl-CoA isomerase step of polyunsaturated fatty acid beta-oxidation, with
    a mitochondrial pool serving the mitochondrial cassette even if a peroxisomal pool also exists.
