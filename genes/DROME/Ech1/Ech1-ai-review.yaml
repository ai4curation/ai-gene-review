  label: Drosophila melanogaster
description: >-
  Ech1 (CG9577) is a Drosophila melanogaster delta(3,5),delta(2,4)-dienoyl-CoA isomerase
  (EC 5.3.3.21), an auxiliary enzyme of the beta-oxidation of polyunsaturated fatty acids that have a
  double bond at an odd-numbered carbon. It isomerizes 3-trans,5-cis-dienoyl-CoA (3E,5Z-dienoyl-CoA)
  to 2-trans,4-trans-dienoyl-CoA (2E,4E-dienoyl-CoA), which is then reduced by 2,4-dienoyl-CoA
  reductase and re-isomerized by the delta(3),delta(2)-enoyl-CoA isomerase to rejoin the core
  beta-oxidation spiral. Ech1 is the ortholog of human ECH1; its subcellular localization is not fully
  resolved in the fly - UniProt names it mitochondrial and phylogenetic/orthology evidence places it
  in the mitochondrion, while an electronic and a targeting-signal prediction also assign it to the
  peroxisome (human ECH1 is peroxisomal), so a dual or organism-specific localization is plausible.
