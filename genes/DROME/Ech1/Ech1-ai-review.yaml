core_functions:
- description: >-
    delta(3,5),delta(2,4)-dienoyl-CoA isomerase (EC 5.3.3.21): isomerizes 3E,5Z-dienoyl-CoA to
    2E,4E-dienoyl-CoA, the auxiliary step that allows beta-oxidation of polyunsaturated fatty acids
    with a double bond at an odd-numbered position to proceed (feeding into 2,4-dienoyl-CoA reductase
    and the delta(3),delta(2)-enoyl-CoA isomerase).
  supported_by:
