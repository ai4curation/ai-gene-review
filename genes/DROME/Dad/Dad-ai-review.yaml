suggested_questions:
- question: Does Dad have any direct transcriptional regulatory activity independent of its role in blocking
    BMP receptor signaling, analogous to mammalian Smad7 nuclear functions?
- question: How is Dad protein stability and turnover regulated, and does ubiquitin-mediated degradation
    play a role as it does for mammalian I-SMADs?
- question: What determines the differential sensitivity of different tissues to Dad-mediated BMP signaling
    inhibition, such as the difference between germline stem cell niche and wing disc contexts?
- question: Does Dad interact with other signaling pathway components beyond BMP receptors, such as
    activin pathway components, given that it does not inhibit Baboon?
suggested_experiments:
- description: Perform co-immunoprecipitation and proximity ligation assays to determine whether Dad
    directly interacts with Integrator complex subunits or whether this interaction is mediated entirely
    through Tkv. This would clarify the mechanism of the Integrator-Dad-Tkv regulatory complex.
- description: Generate a Dad-GFP knock-in allele and use live imaging to track Dad subcellular
    localization dynamics in response to BMP signaling activation and inhibition in wing disc and
    germline stem cell contexts.
- description: Use CRISPR-mediated mutagenesis of the Dad MH2 domain to identify specific residues
    required for Tkv binding versus potential nuclear functions, to distinguish receptor-level from
    transcription-level inhibitory mechanisms.
- description: Perform ChIP-seq or CUT&Tag with tagged Dad to determine whether Dad binds chromatin
    directly in Drosophila tissues, which would clarify whether it has transcriptional regulatory
    functions analogous to mammalian I-SMADs.
