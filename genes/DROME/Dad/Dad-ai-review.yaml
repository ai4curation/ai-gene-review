taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: Dad (Daughters against decapentaplegic) is the sole inhibitory SMAD (I-SMAD) in Drosophila
  melanogaster, orthologous to mammalian Smad6 and Smad7. Dad functions as a negative feedback
  regulator of the BMP/Dpp signaling pathway by binding to the type I BMP receptors Thickveins (Tkv)
  and Saxophone (Sax), thereby blocking phosphorylation of the R-SMAD Mad. Dad contains MH1 and MH2
  domains characteristic of the SMAD/dwarfin protein family. Its expression is induced by BMP signaling
  itself, establishing a negative feedback loop that attenuates signaling strength. Dad plays roles
  in multiple developmental contexts including wing patterning, germline stem cell maintenance,
  intestinal stem cell homeostasis, and synaptic growth regulation at the neuromuscular junction.
  Dad localizes to both cytosol and nucleus.
existing_annotations:
- term:
    id: GO:0009653
    label: anatomical structure morphogenesis
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Dad is an I-SMAD that participates in BMP signaling-dependent morphogenesis. Phylogenetic
      inference from SMAD family orthologs supports a role in anatomical structure morphogenesis, consistent
      with known roles of Dad in Drosophila wing disc patterning and other developmental contexts.
    action: KEEP_AS_NON_CORE
    reason: Dad is involved in morphogenesis indirectly through its role as a negative regulator of BMP
      signaling. This is not its core molecular function but rather a downstream developmental consequence.
- term:
    id: GO:0030154
    label: cell differentiation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Phylogenetic inference supports Dad involvement in cell differentiation, consistent with its
      role in modulating BMP signaling which controls multiple cell fate decisions in Drosophila including
      germline stem cell differentiation and copper cell specification.
    action: KEEP_AS_NON_CORE
    reason: Cell differentiation is a downstream consequence of Dad-mediated BMP signaling attenuation,
      not a core function.
- term:
    id: GO:0060395
    label: SMAD protein signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Dad is itself a SMAD protein (I-SMAD) that functions within the SMAD signal transduction
      pathway as a negative regulator. This is directly relevant to Dad's core function.
    action: ACCEPT
- term:
    id: GO:0071144
    label: heteromeric SMAD protein complex
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: While Dad is an I-SMAD and interacts with BMP receptors, it functions to inhibit rather than
      participate in canonical heteromeric SMAD complexes (Mad-Medea). Dad competes with R-SMADs for
      receptor binding rather than forming productive heteromeric complexes. This annotation may represent
      an over-annotation based on SMAD family membership.
    action: MARK_AS_OVER_ANNOTATED
    reason: Dad functions as an inhibitory SMAD that blocks SMAD complex formation rather than being a
      productive member of heteromeric SMAD complexes. The IBA inference from R-SMAD family members does
      not accurately capture Dad's inhibitory role.
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: While canonical R-SMADs directly regulate transcription, Dad functions primarily as an
      inhibitory SMAD that blocks BMP receptor signaling in the cytoplasm. Dad does not have established
      direct transcriptional regulatory activity in the nucleus. This annotation likely reflects
      phylogenetic transfer from R-SMAD family members whose transcriptional role does not apply to I-SMADs.
    action: MARK_AS_OVER_ANNOTATED
    reason: I-SMADs function primarily at the receptor level to block signaling, not as direct
      transcriptional regulators. This annotation is inappropriately transferred from R-SMAD orthologs.
- term:
    id: GO:0140416
    label: transcription regulator inhibitor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: This annotation suggests Dad inhibits transcription regulators. While mammalian Smad6/7 can
      inhibit R-SMAD-mediated transcription, Dad's primary mechanism in Drosophila is receptor-level
      inhibition by competing with Mad for Tkv binding. The evidence for direct transcription regulator
      inhibitor activity by Dad is limited.
    action: UNDECIDED
    reason: The mechanism of Dad inhibition is primarily at the receptor level rather than at the
      transcriptional level. Whether Dad also acts as a direct transcription regulator inhibitor in
      Drosophila needs further investigation.
- term:
    id: GO:0070411
    label: I-SMAD binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: Dad is itself an I-SMAD. This annotation would imply Dad binds other I-SMADs, but Dad is the
      only I-SMAD in Drosophila. This likely reflects inappropriate transfer from mammalian orthologs where
      Smad6 and Smad7 can interact.
    action: REMOVE
    reason: Dad is the sole I-SMAD in Drosophila and cannot bind another I-SMAD. This annotation is
      an artifact of phylogenetic transfer from mammals that have two I-SMADs.
- term:
    id: GO:0005634
