- id: PMID:19254568
  title: Drosophila HNF4 regulates lipid mobilization and beta-oxidation.
  findings:
  - statement: >-
      In Drosophila, yip2 (Acaa) is one of a set of mitochondrial beta-oxidation genes
      that are up-regulated on starvation in controls and coordinately down-regulated in
      dHNF4 (nuclear receptor) mutants, which fail to mobilize lipid stores and are
      starvation-sensitive. Establishes the fly-specific placement of Acaa in the
      mitochondrial fatty acid beta-oxidation program, though it does not directly assay
      Acaa enzyme activity.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text cached and verified; yip2 appears in the beta-oxidation gene list and
      among the most highly dHNF4-down-regulated genes. Supports the fatty acid
      beta-oxidation (GO:0006635) annotation for the fly gene. Transcriptional/genetic
      evidence, not a direct enzyme assay.
- id: PMID:22758915
  title: An inventory of peroxisomal proteins and pathways in Drosophila melanogaster.
  findings:
  - statement: >-
      Genome-wide inventory/prediction of Drosophila organellar (peroxisomal vs
      mitochondrial) proteins; source of the ISM mitochondrion localization annotation
      for Acaa (CG4600 carries a mitochondrial targeting signal). The abstract does not
      describe Acaa individually.
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Abstract-only cache (full_text_available: false). A prediction/inventory study;
      supports mitochondrial (not peroxisomal) targeting of Acaa as a bioinformatic
      inference, with no gene-specific experimental validation.
