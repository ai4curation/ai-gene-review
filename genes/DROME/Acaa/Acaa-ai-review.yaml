proposed_new_terms: []
suggested_questions:
- question: >-
    Does Drosophila Acaa/Yip2 catalyze the degradative 3-ketoacyl-CoA thiolase reaction
    directly (as predicted from ACAA2 orthology), and what is its chain-length substrate
    preference relative to the fly trifunctional-protein thiolase Mtpalpha?
- question: >-
    Is the historical Yippee-Yip2 interaction (the source of the gene name) functionally
    meaningful, or an incidental two-hybrid finding unrelated to its beta-oxidation role?
- question: >-
    Does loss of Acaa produce a beta-oxidation / lipid-mobilization phenotype in flies
    (e.g. starvation sensitivity, TAG accumulation) analogous to the dHNF4 mutant?
suggested_experiments:
- description: >-
    Assay recombinant Drosophila Acaa in vitro against a panel of straight-chain
    3-ketoacyl-CoA substrates (C4-C16) to confirm the EC 2.3.1.16 thiolase activity and
    define its physiological substrate range.
- description: >-
    Generate an Acaa loss-of-function allele (or RNAi) and profile acylcarnitines,
    triacylglycerol levels, and starvation survival to test its in-vivo contribution to
    mitochondrial beta-oxidation flux.
- description: >-
    Confirm mitochondrial-matrix localization of endogenous Acaa in Drosophila tissue by
    fractionation/immunofluorescence, distinguishing it from peroxisomal thiolases.
