core_functions:
- description: >-
    Catalyzes the final thiolytic (CoA-dependent) cleavage step of each cycle of
    mitochondrial fatty acid beta-oxidation, converting a 3-ketoacyl-CoA (3-oxoacyl-CoA)
    into acetyl-CoA and a fatty acyl-CoA shortened by two carbons. Acaa is the
    Drosophila ortholog of human ACAA2, a soluble mitochondrial-matrix thiolase of the
    thiolase family, and participates in the dHNF4-regulated beta-oxidation program that
    supports lipid mobilization.
  supported_by:
  - reference_id: PMID:19254568
    supporting_text: >-
      yip2, CG9577, CG6178, and Acox57D-d, many of which are predicted to act in
      β-oxidation
