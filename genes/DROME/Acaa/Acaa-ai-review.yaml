gene_symbol: Acaa
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Acaa (also called Yip2, "Yippee interacting protein 2"; CG4600; FBgn0040064) is
  the Drosophila melanogaster ortholog of human ACAA2, a mitochondrial 3-ketoacyl-CoA
  thiolase (acetyl-CoA acyltransferase; EC 2.3.1.16). It is a 398-residue member of
  the thiolase family within the thiolase-like superfamily, built from a Thiolase
  N-terminal and a Thiolase C-terminal domain and carrying the conserved catalytic
  cysteine (acyl-thioester intermediate) and proton-acceptor residues typical of
  degradative thiolases. The enzyme is predicted to act in the mitochondrial matrix,
  where it catalyzes the fourth and final, thiolytic step of each cycle of the fatty
  acid beta-oxidation spiral: using free coenzyme A it cleaves a 3-ketoacyl-CoA
  (3-oxoacyl-CoA) into acetyl-CoA and a fatty acyl-CoA shortened by two carbons.
  By the reversibility of the thiolase reaction it can also condense two acetyl-CoA
  units into acetoacetyl-CoA (acetyl-CoA C-acetyltransferase activity, EC 2.3.1.9),
  a secondary/biosynthetic capability. In Drosophila, Yip2 is part of the
  nuclear-receptor dHNF4-regulated mitochondrial beta-oxidation gene program that
  supports lipid mobilization and survival during starvation. The gene name "Yip2"
  reflects a historical yeast-two-hybrid interaction with the Yippee protein and does
  not denote its metabolic activity.
