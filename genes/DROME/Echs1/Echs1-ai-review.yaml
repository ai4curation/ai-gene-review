  review:
    summary: Orthology-based (ISS) transfer of 3-hydroxypropionyl-CoA dehydratase activity
      (hydration/dehydration of acryloyl-CoA), one of the five enoyl-CoA substrate reactions
      measured for purified human ECHS1. This is a valid specific child of the general
      enoyl-CoA hydratase activity, reflecting the enzyme's substrate promiscuity across
      valine/propionate-pathway thioesters.
    action: KEEP_AS_NON_CORE
    reason: A genuine but non-core substrate-specific activity; the core molecular function
      of Echs1 is the general enoyl-CoA hydratase activity (GO:0004300), with acryloyl-CoA
      being one of several accepted substrates by orthology to human ECHS1.
