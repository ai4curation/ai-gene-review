- term:
    id: GO:0019477
    label: L-lysine catabolic process
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: involved_in
  review:
    summary: Orthology-based (ISS) transfer of L-lysine catabolic process. As in human
      ECHS1, the connection to lysine catabolism is indirect — through the enzyme's
      action on the shared crotonyl-CoA pool (crotonyl-CoA is also a lysine-degradation
      intermediate) rather than through a dedicated lysine-degradation reaction.
    action: KEEP_AS_NON_CORE
    reason: Retained as a valid non-core annotation, mirroring the human ortholog assessment.
      Echs1's link to lysine catabolism is via consumption of the shared crotonyl-CoA
      metabolite, not a canonical lysine-specific step, so it is peripheral to the core
      beta-oxidation and valine-catabolism functions.
- term:
    id: GO:0006574
    label: L-valine catabolic process
  evidence_type: IMP
  original_reference_id: PMID:39727068
  qualifier: involved_in
  review:
    summary: Direct experimental (IMP) evidence in Drosophila that Echs1 acts in valine
      catabolism — a fly ECHS1-deficiency model is rescued by dietary valine restriction,
      confirming that the phenotype arises from a block in the valine-degradation pathway
      where Echs1 hydrates the intermediate methacrylyl-CoA.
    action: ACCEPT
    reason: A core biological process for Echs1, established here by an organism-matched
      genetic/dietary-modifier experiment and consistent with the human ECHS1 role in
      valine catabolism.
    supported_by:
    - reference_id: PMID:40056416
      supporting_text: Elevated lysine methacrylation (Kmea) is observed in both HIBCH-
        and ECHS1-deficient cells and fly tissues.
      full_text_unavailable: true
