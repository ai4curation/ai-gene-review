proposed_new_terms: []
suggested_questions:
- question: >-
    Does Drosophila Echs1 exhibit the same broad enoyl-CoA substrate range as human ECHS1
    (crotonyl-CoA, acryloyl-CoA, methacrylyl-CoA, 3-methylcrotonyl-CoA, tiglyl-CoA), or is its
    substrate preference tuned differently in the fly?
- question: >-
    Is the mitochondrial matrix localization of Echs1 experimentally confirmed in Drosophila,
    and is the predicted N-terminal targeting presequence cleaved?
suggested_experiments:
- description: >-
    Assay hydratase kinetics of purified recombinant Drosophila Echs1 against a panel of
    short-chain and branched-chain enoyl-CoA substrates (crotonyl-CoA, methacrylyl-CoA,
    acryloyl-CoA, 3-methylcrotonyl-CoA, tiglyl-CoA) to confirm EC 4.2.1.17 activity and compare
    substrate specificity with the human ortholog.
  hypothesis: >-
    Fly Echs1 is a bona fide short-chain enoyl-CoA hydratase with a substrate profile conserved
    with human ECHS1, explaining functional rescue of the fly null by a human ECHS1 transgene.
- description: >-
    Perform metabolomic tracing of valine and fatty-acid carbon in Echs1-null versus control
    Drosophila to determine which accumulating thioester (methacrylyl-CoA vs beta-oxidation
    enoyl-CoAs) most strongly drives ectopic protein lysine methacrylation and mitochondrial
    dysfunction.
  hypothesis: >-
    Accumulation of the valine-pathway intermediate methacrylyl-CoA, rather than the
    beta-oxidation block per se, is the principal driver of the Echs1-deficiency phenotype in flies.
