id: Q7JR58
gene_symbol: Echs1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: 'Echs1 (CG6543; FlyBase FBgn0033879) is the Drosophila melanogaster ortholog
  of human ECHS1, a short-chain enoyl-CoA hydratase of the crotonase superfamily (EC
  4.2.1.17). Like its human counterpart, it is predicted to act in the mitochondrion,
  where it catalyzes the second step of the fatty acid beta-oxidation spiral: the
  reversible addition of water across the double bond of a short-/medium-chain 2-trans-enoyl-CoA
  to yield the corresponding (3S)-3-hydroxyacyl-CoA. The enzyme carries the canonical
  crotonase-like fold (Pfam ECH_1; InterPro enoyl-CoA hydratase/isomerase signature)
  and is encoded as two isoforms with an N-terminal region resembling a mitochondrial
  targeting presequence. Beyond fatty acid oxidation, Echs1 participates in branched-chain
  amino acid catabolism, most notably valine catabolism, hydrating the reactive valine-pathway
  intermediate methacrylyl-CoA. Loss of Echs1 in Drosophila causes accumulation of
  valine-pathway intermediates, ectopic protein lysine methacrylation, abnormal mitochondrial
  morphology and age-dependent eye degeneration, and the null larval phenotype can
  be rescued by expression of a human ECHS1 transgene, establishing conserved enzymatic
  function between the fly and human enzymes.'
existing_annotations:
- term:
    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Root-level molecular function term assigned electronically from an InterPro
      domain match (IPR018376, the enoyl-CoA hydratase/isomerase conserved site).
      Echs1 is indeed a catalytic enzyme, but this term is uninformative and fully
      subsumed by the specific enoyl-CoA hydratase activity annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: '"catalytic activity" is a high-level placeholder superseded by GO:0004300
      enoyl-CoA hydratase activity, the defining EC 4.2.1.17 function of this crotonase-family
      enzyme.'
- term:
    id: GO:0004300
    label: enoyl-CoA hydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: 'Electronic assignment of the defining EC 4.2.1.17 activity (ARBA:ARBA00086629
      | EC:4.2.1.17). This is the core molecular function of Echs1: hydration of a
      2-trans-enoyl-CoA to the (3S)-3-hydroxyacyl-CoA, the second step of the beta-oxidation
      spiral. The fly protein carries the crotonase-like fold and is the clear ortholog
      of human ECHS1, whose enoyl-CoA hydratase activity is experimentally established,
      and the fly Echs1-null phenotype is rescued by a human ECHS1 transgene (Mele
      et al. 2025).'
    action: ACCEPT
    reason: Enoyl-CoA hydratase activity (EC 4.2.1.17) is the central, conserved function
      of Echs1; the EC/ARBA-based electronic annotation is correct and grounded by
      ortholog biochemistry (PMID:26251176) and by functional complementation of the
      fly mutant by human ECHS1.
    supported_by:
    - reference_id: PMID:26251176
      supporting_text: "Human ECHS1 catalyses the hydration of five substrates via\
        \ different \nmetabolic pathways, with the highest specificity for crotonyl-CoA\
        \ and the lowest \nspecificity for tiglyl-CoA."
      full_text_unavailable: true
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: Phylogenetic (IBA) inference that Echs1 is active in the mitochondrion,
      consistent with the crotonase-family enoyl-CoA hydratases of the beta-oxidation
      spiral, which are matrix enzymes. Directly corroborated by experimental IDA/HDA
      mitochondrial localization for the fly protein (PMID:40056416, PMID:19317464).
    action: ACCEPT
    reason: Mitochondrion is the correct and core site of action for a beta-oxidation
      enoyl-CoA hydratase; the phylogenetic call agrees with organism-matched experimental
      localization evidence.
- term:
    id: GO:0006635
    label: fatty acid beta-oxidation
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: Phylogenetic (IBA) inference that Echs1 participates in fatty acid beta-oxidation,
      the pathway in which its EC 4.2.1.17 enoyl-CoA hydratase activity catalyzes the
      second (hydration) step for short-/medium-chain substrates.
    action: ACCEPT
    reason: Fatty acid beta-oxidation is a core biological process for Echs1; the phylogenetic
