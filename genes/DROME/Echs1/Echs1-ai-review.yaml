  title: 'Clinical, biochemical and metabolic characterisation of a mild form of human
    short-chain enoyl-CoA hydratase deficiency: significance of increased N-acetyl-S-(2-carboxypropyl)cysteine
    excretion.'
  findings:
  - statement: Purified human ECHS1 (the ortholog of fly Echs1) hydrates five enoyl-CoA
      substrates across different metabolic pathways, with highest specificity for
      crotonyl-CoA and lowest for tiglyl-CoA, spanning fatty acid beta-oxidation and
      branched-chain amino acid catabolism.
    supporting_text: Human ECHS1 catalyses the hydration of five substrates via different
      metabolic pathways, with the highest specificity for crotonyl-CoA and the lowest
      specificity for tiglyl-CoA.
    full_text_unavailable: true
  - statement: ECHS1 catalyses mitochondrial short-chain fatty acid beta-oxidation
      and branched-chain amino acid catabolic pathways; its deficiency reflects defective
      valine catabolic and beta-oxidation pathways.
    supporting_text: harbouring defective valine catabolic and β-oxidation pathways
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'Key biochemical characterization of the human ortholog ECHS1 (purified
      enzyme, substrate specificity across five enoyl-CoA thioesters). Abstract-only
      in cache (full_text_available: false); grounds the enoyl-CoA hydratase activity
      annotation and the core function for the fly gene by orthology.'
- id: PMID:40056416
  title: Ectopic protein lysine methacrylation contributes to defects caused by loss
    of HIBCH or ECHS1.
  findings:
  - statement: Loss of ECHS1 (or downstream HIBCH) in Drosophila and in cells elevates
      lysine methacrylation and causes abnormal mitochondrial morphology, respiratory
      defects, and age-dependent fly eye degeneration, consistent with accumulation
      of the valine-pathway intermediate methacrylyl-CoA that Echs1 normally hydrates.
    supporting_text: Elevated lysine methacrylation (Kmea) is observed in both HIBCH-
      and ECHS1-deficient cells and fly tissues.
    full_text_unavailable: true
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: 'Organism-matched (Drosophila) evidence: fly tissues lacking the
      ECHS1 ortholog show elevated lysine methacrylation and eye degeneration, mechanistically
      linking Echs1 loss to valine-pathway intermediate accumulation. Abstract-only
      in cache (full_text_available: false). Supports the valine catabolism / beta-oxidation
      core functions.'
