id: A0A0B4LGA0
gene_symbol: Idit
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Iditarod (Idit) is the Drosophila melanogaster homolog of the mammalian
  Irisin precursor FNDC5. It is a single-pass type I transmembrane protein
  containing a signal peptide, an extracellular fibronectin type III (Irisin)
  domain, and a transmembrane domain. Idit was identified in a genetic screen
  as a regulator of autophagy acting downstream of Atg1/Atg13. Idit-deficient
  flies show reduced exercise endurance, impaired response to exercise training,
  and decreased cold resistance. Overexpression of Idit induces ectopic
  autophagy and increases exercise endurance. Idit is also necessary for
  exercise-induced cardiac autophagy and cardiac stress resistance. The protein
  is highly expressed in adult skeletal muscle, heart, and brain. Structural
  predictions indicate the Irisin domain of Idit is highly similar to
  crystallized human Irisin and likely forms a homodimer with a conserved
  glycosylation site. Unlike mammalian FNDC5, where secreted Irisin functions
  as a systemic hormone, Drosophila Idit appears to exert more cell-autonomous
  regulation of autophagosome formation.
references:
  - id: PMID:37722048
    title: "Iditarod, a Drosophila homolog of the Irisin precursor FNDC5, is critical for exercise performance and cardiac autophagy"
  - id: file:genes/DROME/Idit/Idit-uniprot.txt
    title: UniProt entry A0A0B4LGA0 (Idit)
existing_annotations:
  - term:
      id: GO:0016239
      label: positive regulation of macroautophagy
    evidence_type: IMP
    original_reference_id: PMID:37722048
    review:
      summary: >-
        Idit was identified in a genetic screen as necessary for Atg1/Atg13-induced
        autophagy. RNAi silencing of Idit suppressed Atg1-Atg13-induced autophagic
        cell death, autolysosome formation, Atg9 trafficking, and Atg8 puncta
        accumulation. Conversely, overexpression of Idit induced ectopic autophagy in
        fat bodies, wing imaginal discs, and skeletal muscle (PMID:37722048).
      action: NEW
      reason: >-
        Strong experimental evidence from loss-of-function (RNAi suppression of
        Atg1-Atg13 phenotype) and gain-of-function (ectopic autophagy induction)
        experiments directly demonstrates that Idit positively regulates
        macroautophagy. This is the core molecular role identified for Idit.
      supported_by:
        - reference_id: PMID:37722048
          supporting_text: >-
            Silencing of Idit attenuated such excessive autophagy phenotypes,
            suppressing autolysosomal expansion, Atg8 puncta accumulation, and
            inhibiting autophagic cell death
        - reference_id: PMID:37722048
          supporting_text: >-
            expression in fat body clones (marked by GFP expression) induced
            autophagy, as monitored by elevated Atg8 staining
  - term:
      id: GO:0009409
      label: response to cold
    evidence_type: IMP
    original_reference_id: PMID:37722048
    review:
      summary: >-
        Idit-deficient flies displayed impaired cold resistance (chill coma
        recovery), while transgenic rescue of Idit expression restored cold
        resistance. Ubiquitous Idit RNAi impaired cold resistance, while
        Idit upregulation strengthened it (PMID:37722048).
      action: NEW
      reason: >-
        Direct experimental evidence from mutant and rescue experiments
        demonstrates Idit is required for normal cold resistance in Drosophila.
        This is consistent with the conserved role of FNDC5/Irisin in
        mammalian thermogenesis and cold tolerance.
      supported_by:
        - reference_id: PMID:37722048
          supporting_text: >-
            IditB6 mutant flies displayed impaired cold resistance, while
            transgenic rescue of Idit expression restored cold resistance
        - reference_id: PMID:37722048
          supporting_text: >-
            IditRNAi impaired cold resistance while Idit upregulation
            strengthened it
  - term:
      id: GO:0016021
      label: integral component of membrane
    evidence_type: IDA
    original_reference_id: PMID:37722048
    review:
      summary: >-
        Idit is predicted to be a single-pass type I transmembrane protein with
        a signal peptide (aa 1-15), an extracellular fibronectin type III domain,
        and a transmembrane helix (aa 171-189). UniProt annotations confirm the
        signal peptide and transmembrane domain via Phobius and SignalP predictions.
        The PNAS study describes Idit as a transmembrane protein with domain
        architecture homologous to mammalian FNDC5 (PMID:37722048).
      action: NEW
      reason: >-
        Domain analysis and sequence predictions consistently identify Idit as
        a transmembrane protein. UniProt features include a predicted signal
        peptide and transmembrane helix, and the research paper confirms the
        transmembrane domain architecture based on homology to FNDC5.
      supported_by:
        - reference_id: PMID:37722048
          supporting_text: >-
            Idit has two domains that show substantial homology to human
            FNDC5—extracellular Irisin domain and TM domains
        - reference_id: file:genes/DROME/Idit/Idit-uniprot.txt
          supporting_text: >-
            Membrane; Transmembrane helix
  - term:
      id: GO:0005886
      label: plasma membrane
    evidence_type: IDA
    original_reference_id: PMID:37722048
    review:
      summary: >-
        The Idit protein has a signal peptide, an extracellular domain, and a
        transmembrane domain, consistent with plasma membrane localization. The
        gene-trap allele with mCD8-GFP (which targets GFP to cell membrane)
        driven by the Idit promoter showed expression in skeletal muscle, heart,
        and brain (PMID:37722048). N-terminal tagging disrupted signal sequence
        and prevented proper expression, indicating dependence on proper membrane
        topology.
      action: NEW
      reason: >-
        The protein architecture (signal peptide, extracellular FN3 domain,
        single transmembrane domain, cytoplasmic tail) is consistent with
        plasma membrane localization. While direct immunolocalization to the
        plasma membrane was not explicitly shown, the domain architecture and
        functional data strongly support this localization.
      supported_by:
        - reference_id: PMID:37722048
          supporting_text: >-
            N-terminal tagging, which can interfere with proper membrane
            topology by disrupting signal sequence, prevented expression of Idit
  - term:
      id: GO:0042803
      label: protein homodimerization activity
    evidence_type: ISS
    original_reference_id: PMID:37722048
    review:
      summary: >-
        Structural modeling via AlphaFold and RoseTTAFold predicts the Irisin
        domain of Idit is highly similar to human Irisin crystal structure
        (PDB: 4LSD), including conservation of the dimer interface and a
        predicted glycosylation site. Since human Irisin functions as a
        homodimer, Idit is expected to dimerize as well (PMID:37722048).
      action: NEW
      reason: >-
        Based on structural similarity to human Irisin which is known to
        homodimerize, and conservation of the dimer interface. This is inferred
        from sequence/structural similarity (ISS-level evidence) rather than
        direct experimental demonstration.
      supported_by:
        - reference_id: PMID:37722048
          supporting_text: >-
            Since human Irisin forms a dimer, we expect that Drosophila Idit
            also functions as a dimer with a potential glycosylation site (NxT
            motif) that is also similar to human Irisin
core_functions:
  - description: >-
      Positive regulation of macroautophagy downstream of Atg1/Atg13. Idit is
      a transmembrane protein required for Atg1-Atg13-induced autophagy and
      sufficient to induce ectopic autophagy when overexpressed. This function
      is cell-autonomous and conserved with mammalian FNDC5.
    molecular_function:
      id: GO:0008289
      label: lipid binding
    directly_involved_in:
      - id: GO:0016239
        label: positive regulation of macroautophagy
    locations:
      - id: GO:0016021
        label: integral component of membrane
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: PMID:37722048
        supporting_text: >-
          Idit seems to be an essential component of Atg1-dependent autophagy
          that is also sufficient to induce autophagy when highly expressed
  - description: >-
      Role in exercise endurance physiology. Idit is induced by exercise
      training and PGC-1alpha activation in muscle, and is required for
      exercise-induced endurance extension. Transgenic Idit expression in
      wild-type flies increased endurance to the level of exercise-trained flies.
    molecular_function:
      id: GO:0008289
      label: lipid binding
    directly_involved_in:
