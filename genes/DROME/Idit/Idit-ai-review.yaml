        label: integral component of membrane
    supported_by:
      - reference_id: PMID:37722048
        supporting_text: >-
          Idit is induced upon exercise training, and transgenic expression of
          in wild-type flies increased endurance to the level of exercise
          trained flies
suggested_questions:
  - question: >-
      What is the precise molecular function of Idit? Is it a receptor, a
      signaling adapter, or does it have enzymatic activity? The mechanism by
      which this transmembrane protein activates autophagy downstream of
      Atg1/Atg13 remains unclear.
  - question: >-
      Is the Irisin domain of Idit cleaved and secreted in Drosophila as it is
      for mammalian FNDC5? If so, does the secreted fragment have systemic
      signaling functions?
  - question: >-
      What are the direct binding partners of Idit? Does it interact with
      autophagy machinery components such as Atg9 or Atg8?
suggested_experiments:
  - description: >-
      Perform co-immunoprecipitation or proximity labeling (BioID/TurboID)
      experiments to identify direct binding partners of Idit in Drosophila
      muscle tissue, which would clarify its molecular function.
  - description: >-
      Test whether the Irisin domain is cleaved from Idit in vivo using
      antibodies against the extracellular and intracellular domains, and
      assess whether conditioned media from Idit-expressing cells can induce
      autophagy in recipient cells.
  - description: >-
      Perform tissue-specific rescue experiments (muscle, heart, brain, fat body)
      to determine which tissues require Idit cell-autonomously for the
      exercise endurance and cold resistance phenotypes.
