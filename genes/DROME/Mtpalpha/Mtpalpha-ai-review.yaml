  evidence_type: IMP
  original_reference_id: PMID:22342726
  qualifier: involved_in
  review:
    summary: >-
      IMP based on the fasting hypersensitivity of Mtpalpha(KO) flies, which retain lipid
      droplets and fail to mobilize lipid on fasting. This reflects the inability to catabolize
      fatty acids via beta-oxidation during nutrient deprivation.
    action: KEEP_AS_NON_CORE
    reason: >-
      Physiological consequence of impaired beta-oxidation (defective lipid mobilization on
      fasting), not a distinct core molecular role.
    supported_by:
    - reference_id: PMID:22342726
      supporting_text: "Mtpα(KO) flies were hypersensitive to fasting, and retained lipid droplets in \ntheir fat body cells as in non-fasting conditions."
- term:
    id: GO:0042060
    label: wound healing
  evidence_type: HMP
  original_reference_id: PMID:19884309
  qualifier: involved_in
  review:
    summary: >-
      HMP annotation derived from a high-throughput transposon-insertion screen for embryonic
      epithelial (wound) repair, which recovered 30 lethal insertional mutants with repair
      defects. The abstract foregrounds karst/beta-Heavy-spectrin, DJUN and scab and does not
      name Mtpalpha; the FlyBase curator identified Mtpalpha as one of the screen hits. As a
      broad-phenotype screen hit for an energy-metabolism enzyme, this most likely reflects a
      pleiotropic/indirect requirement rather than a direct molecular role in wound healing.
    action: KEEP_AS_NON_CORE
    reason: >-
      High-throughput screen hit for an essential metabolic gene; the wound-healing phenotype is
      most plausibly an indirect consequence of impaired energy metabolism, not a core function.
    supported_by:
    - reference_id: PMID:19884309
      supporting_text: "identification of 30 lethal insertional mutants with \ndefects in embryonic epithelia repair"
