      The conventional molecular-function term for this reaction in the MTP alpha subunit is
      enoyl-CoA hydratase activity (GO:0004300, EC 4.2.1.17, physiological hydration direction);
      the dehydratase label is the reverse framing of the same reaction.
    proposed_replacement_terms:
