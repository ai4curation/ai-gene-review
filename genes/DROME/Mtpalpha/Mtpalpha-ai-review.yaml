- term:
    id: GO:0005777
    label: peroxisome
  evidence_type: IDA
  original_reference_id: PMID:22758915
  qualifier: located_in
  review:
    summary: >-
      IDA peroxisomal localization from the Drosophila peroxisomal-proteome inventory. A
      peroxisomal pool is plausible for a fatty-acid beta-oxidation enzyme, but the canonical
      and functionally dominant location of the MTP alpha subunit is the mitochondrion. An
      independent OpenScientist analysis (held out from our review and run as a neutral
      function-assignment hypothesis) supports retaining this annotation: it finds a
      Drosophila-lineage-conserved C-terminal SKL peroxisomal targeting signal (PTS1), absent
      from vertebrate HADHA orthologs, and notes that targeting is isoform-dependent - the
      shorter Q8IPE8 isoform lacks the N-terminal mitochondrial presequence carried by the
      longer CG4389 isoform (Q9V397), consistent with genuine dual mitochondrial/peroxisomal
      localization rather than a spurious call. This dissociates Mtpalpha (peroxisome supported)
      from its sister gene Acat1, whose peroxisome prediction the same workflow refuted.
    action: KEEP_AS_NON_CORE
    reason: >-
      Genuine but secondary localization; the core location is the mitochondrion (inner
      membrane) and the MTP complex, while a real peroxisomal pool is supported by a conserved
      C-terminal PTS1 and independent computational analysis.
    supported_by:
    - reference_id: PMID:22758915
      supporting_text: "The subcellular localization of five of \nthese predicted peroxisomal proteins was confirmed."
    - reference_id: file:DROME/Mtpalpha/Mtpalpha-hypotheses/function-hypothesis-go-0005777/openscientist.md
      supporting_text: "which lacks a mitochondrial targeting sequence (MTS) and was directly demonstrated to localize to peroxisomes by fluorescence microscopy"
- term:
