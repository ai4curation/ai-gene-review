- term:
    id: GO:0004300
    label: enoyl-CoA hydratase activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: enables
  review:
    summary: >-
      Enoyl-CoA hydratase activity (EC 4.2.1.17) assigned by curator sequence-similarity
      transfer from the rat MTP alpha subunit (UniProtKB:Q64428). This is one of the two core
      catalytic activities of the alpha subunit, hydrating (2E)-enoyl-CoA to
      (3S)-3-hydroxyacyl-CoA in step 2 of each long-chain beta-oxidation cycle. Mtpalpha has
      the conserved N-terminal crotonase/enoyl-CoA hydratase domain and the residues flagged as
      important for long-chain enoyl-CoA hydratase activity.
    action: ACCEPT
    reason: >-
      Core molecular function of the alpha subunit, conserved from the human/rat ortholog and
      consistent with the domain architecture.
