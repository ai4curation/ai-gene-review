core_functions:
- description: >-
    Long-chain enoyl-CoA hydratase (EC 4.2.1.17): catalyzes step 2 of each mitochondrial
    long-chain fatty acid beta-oxidation cycle, hydrating a (2E)-enoyl-CoA to
    (3S)-3-hydroxyacyl-CoA. This activity resides in the N-terminal crotonase domain of the
    MTP alpha subunit, which acts as part of the membrane-associated alpha2-beta2 complex.
  supported_by:
  - reference_id: file:DROME/Mtpalpha/Mtpalpha-uniprot.txt
