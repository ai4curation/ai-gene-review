proposed_new_terms: []
suggested_questions:
- question: >-
    Does Drosophila Mtpalpha possess the monolysocardiolipin acyltransferase / cardiolipin
    remodeling moonlighting activity described for its human ortholog HADHA, or is the UniProt
    MLCL-acyltransferase annotation purely an ARBA/orthology inference with no fly-specific
    experimental support?
- question: >-
    Is the peroxisomal pool of Mtpalpha functionally significant in Drosophila, or does the
    protein act essentially exclusively at the mitochondrial inner membrane? Given the
    OpenScientist finding of isoform-dependent targeting (the shorter Q8IPE8 isoform lacking the
    N-terminal mitochondrial presequence retained on the longer Q9V397 isoform, plus a conserved
    C-terminal SKL PTS1), do the two CG4389 isoforms partition between peroxisome and mitochondrion,
    and does the peroxisomal pool carry out beta-oxidation there?
suggested_experiments:
- description: >-
    Express and purify recombinant Mtpalpha alone and as the alpha2-beta2 complex with Mtpbeta
    and assay enoyl-CoA hydratase and 3-hydroxyacyl-CoA dehydrogenase activities across an
    acyl-chain-length series (C4-C20).
  hypothesis: >-
    Fly Mtpalpha exhibits hydratase and dehydrogenase activities restricted to long-chain
    (>=C10) acyl-CoA substrates, as for the human ortholog.
- description: >-
    Test whether recombinant fly Mtpalpha can acylate monolysocardiolipin to cardiolipin in
    vitro, and whether Mtpalpha(KO) flies show altered cardiolipin acyl composition, to
    determine whether the cardiolipin-remodeling moonlighting activity is conserved in
    Drosophila.
  hypothesis: >-
    The MLCL acyltransferase / cardiolipin remodeling activity of the MTP alpha subunit is
    conserved in Drosophila and contributes to mitochondrial cardiolipin homeostasis.
