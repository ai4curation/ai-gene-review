id: Q8IPE8
gene_symbol: Mtpalpha
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:7227
  label: Drosophila melanogaster
description: >-
  Mtpalpha (CG4389) encodes the Drosophila alpha subunit of the mitochondrial trifunctional
  protein (MTP), the fly ortholog of human HADHA. With the beta subunit (Mtpbeta) it forms a
  membrane-associated alpha2-beta2 heterotetramer on the matrix face of the mitochondrial inner
  membrane that catalyzes the last three steps of long-chain fatty acid beta-oxidation. The
  alpha subunit carries TWO of these activities: long-chain enoyl-CoA hydratase (EC 4.2.1.17),
  which hydrates (2E)-enoyl-CoA to (3S)-3-hydroxyacyl-CoA, and long-chain 3-hydroxyacyl-CoA
  dehydrogenase (EC 1.1.1.211), which oxidizes (3S)-3-hydroxyacyl-CoA to 3-oxoacyl-CoA using
  NAD+. The third step (thiolytic cleavage to acetyl-CoA) is carried by the beta subunit
  (Mtpbeta), not by the alpha subunit. The protein has the conserved two-domain architecture
  of its human ortholog: an N-terminal enoyl-CoA hydratase/crotonase domain and a central
  NAD-binding 3-hydroxyacyl-CoA dehydrogenase domain. Loss of Mtpalpha in the fly impairs
  long-chain fatty acid beta-oxidation, causing accumulation of acylcarnitine and
  hydroxyacylcarnitine, defective lipid mobilization on fasting, reduced adult lifespan and
  locomotor activity, modeling human MTP deficiency. Like human HADHA, the alpha subunit is
  additionally predicted to have a monolysocardiolipin acyltransferase activity implicated in
  cardiolipin remodeling, though this has not been experimentally demonstrated in Drosophila.
