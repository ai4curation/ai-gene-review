- term:
    id: GO:0018812
    label: 3-hydroxyacyl-CoA dehydratase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      RHEA-based electronic annotation. GO:0018812 describes the same chemical reaction as
      enoyl-CoA hydratase (3-hydroxyacyl-CoA <=> 2-enoyl-CoA + H2O) written in the dehydration
      (reverse) direction. This is the alpha subunit's hydratase activity captured under a
      reverse-direction label.
