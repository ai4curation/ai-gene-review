core_functions:
- molecular_function:
    id: GO:0004833
    label: L-tryptophan 2,3-dioxygenase activity
  description: >-
    TDO is a heme-dependent dioxygenase that catalyzes the oxidative cleavage of the
    L-tryptophan indole ring to produce N-formylkynurenine. It is the sole enzyme
    initiating tryptophan catabolism via the kynurenine pathway in A. gambiae.
    Recombinant enzyme has been biochemically characterized with Michaelis-Menten
    kinetics determined. The enzyme requires a physiological reductant and the
    heme-ferric form is catalytically active after reduction.
  directly_involved_in:
    - id: GO:0006569
      label: L-tryptophan catabolic process
    - id: GO:0006727
      label: ommochrome biosynthetic process
  supported_by:
    - reference_id: PMID:18687401
      supporting_text: "TDO converts l-tryptophan to N-formylkynurenine by catalyzing the heme-dependent oxidative opening of the substrate indole ring"
    - reference_id: PMID:9443379
      supporting_text: "The successful genetic complementation by this construct demonstrated both the proper function of the tryptophan oxygenase product"

proposed_new_terms: []

suggested_questions:
- question: >-
    Does A. gambiae TDO expression change in response to blood feeding, and if so,
    what is the tissue-specific and temporal pattern of induction?
- question: >-
    What are the kinetic parameters (Km, kcat) of A. gambiae TDO for L-tryptophan
    under physiologically relevant reductant conditions?
- question: >-
    Does TDO disruption in A. gambiae affect Plasmodium transmission by altering
    xanthurenic acid levels in the midgut?

suggested_experiments:
- description: >-
    CRISPR knockout of TDO in A. gambiae to assess effects on eye pigmentation,
    blood meal processing, survival, fecundity, and Plasmodium transmission.
  hypothesis: >-
    TDO knockout will produce white/vermilion-like eyes, impair tryptophan
    homeostasis after blood feeding, and alter Plasmodium development in the
    midgut through changes in xanthurenic acid production.
- description: >-
    Tissue-specific and blood meal-responsive transcriptomic profiling of TDO
    and downstream kynurenine pathway genes in A. gambiae.
  hypothesis: >-
    TDO expression is induced in the midgut following blood feeding to process
    the tryptophan load from hemoglobin digestion.
