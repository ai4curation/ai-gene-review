      supporting_text: "Female mosquitoes with spontaneous and induced mutations in the orthologs of the genes encoding kynurenine hydroxylase in Aedes aegypti, Anopheles stephensi and Culex quinquefasciatus exhibited impaired survival and reproductive phenotypes that varied in type and severity among the species"
    - statement: Xanthurenic acid (KP end-product) rescues lethality from pathway disruption
      supporting_text: "Supplemental xanthurenic acid, a KP end-product, rescued lethality and limited microbiota proliferation in Ae. aegypti"
- id: PMID:35437328
  title: Anopheline mosquitoes are protected against parasite infection by tryptophan catabolism in gut microbiota.
  findings:
