      supporting_text: "The chimeric construct, expressed transiently in vermilion (tryptophan oxygenase) mutants of Drosophila melanogaster, partially rescued adult eye color"
    - statement: Demonstrates proper function of the A. gambiae TDO product
      supporting_text: "The successful genetic complementation by this construct demonstrated both the proper function of the tryptophan oxygenase product and the effectiveness of the ie-1 promoter in directing expression of foreign genes in live insects"
