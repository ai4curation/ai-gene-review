  findings:
    - statement: TDO is the only enzyme initiating tryptophan degradation via the kynurenine pathway in A. gambiae
      supporting_text: "In the malaria vector Anopheles gambiae, tryptophan 2,3-dioxygenase (TDO) is the only enzyme able to initiate l-tryptophan degradation through the kynurenine pathway"
    - statement: TDO mRNA is ubiquitously expressed across tissues
      supporting_text: "a RT-PCR-based analysis of the tissue distribution of TDO mRNA in A. gambiae that revealed a ubiquitous expression of the gene"
    - statement: Recombinant TDO purified in heme-ferric form with Michaelis-Menten kinetics determined
      supporting_text: "Spectral analyses showed that the enzyme was purified in its heme-ferric form that was subsequently used to determining the Michaelis-Menten constants"
    - statement: Several kynurenines and tryptophan metabolites modulate TDO activity
      supporting_text: "The screening of a number of compounds as potential TDO modulators showed that several kynurenines and other Tryptophan-derived molecules interfere with the enzyme activity in vitro"
- id: PMID:34999199
