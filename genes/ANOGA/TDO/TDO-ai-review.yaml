  findings:
    - statement: Xanthurenic acid plays a key role in Plasmodium gametogenesis in A. gambiae
      supporting_text: "In Anopheles gambiae, the vector for the most deadly malaria parasite Plasmodium falciparum, xanthurenic acid (XA) plays a key role in parasite gametogenesis and fertility"
- id: PMID:11463462
  title: Both mosquito-derived xanthurenic acid and a host blood-derived factor regulate gametogenesis of Plasmodium in the midgut of the mosquito.
  findings:
    - statement: Xanthurenic acid is a gametocyte-activating factor for Plasmodium
      supporting_text: "Removal of both host and vector sources of GAF totally inhibited both exflagellation and ookinete production"
