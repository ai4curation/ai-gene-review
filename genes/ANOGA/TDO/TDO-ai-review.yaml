  findings:
    - statement: TDO locus inside inversion 2Rb shows introgressive hybridization between species
      supporting_text: "At the tryptophan oxygenase locus inside inversion 2Rb, variation was structured only by inversion orientation and not by taxonomic designation even between An. gambiae and An. arabiensis"
