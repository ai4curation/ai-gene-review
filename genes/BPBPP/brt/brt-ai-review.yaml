      summary: Brt reverse transcriptase is localized to the viral capsid as 
        part of the Bordetella phage BPP-1 structural machinery where it 
        functions in the diversity-generating retroelement system
      action: NEW
      reason: Viral capsid localization is essential for Brt's role in the 
        bacteriophage DGR system. As a phage-encoded reverse transcriptase, Brt 
        must be packaged within the viral capsid to be delivered to host cells 
        where it can catalyze target-primed reverse transcription and generate 
        sequence diversity in the major tropism determinant
      supported_by:
