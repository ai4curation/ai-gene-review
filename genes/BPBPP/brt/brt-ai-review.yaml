id: Q775D8
gene_symbol: brt
taxon:
  id: NCBITaxon:2885909
  label: Bordetella phage BPP-1
description: Brt encodes a reverse transcriptase that drives the 
  diversity-generating retroelement (DGR) system in Bordetella phage BPP-1. This
  RT catalyzes targeted hypermutation during tropism switching, enabling the 
  phage to alter its host receptor specificity. Through target-primed reverse 
  transcription with adenine-specific mutagenesis, Brt generates extraordinary 
  sequence diversity (up to 10^12 variants) in the major tropism determinant 
  (Mtd) protein, the phage tail fiber receptor-binding protein. This mutagenic 
  homing mechanism allows rapid adaptation to different Bordetella host phases 
  regulated by the BvgAS system, representing a unique retroelement function 
  distinct from viral replication or retrotransposition.
