      summary: >-
        ProtNLM2 predicted GO:0106029 (tRNA pseudouridine synthase activity), which is a
        child term of the existing GOA annotation GO:0009982 (pseudouridine synthase
        activity). The prediction is biologically correct: TRUB2 belongs to the TruB
        family of pseudouridine synthases and specifically catalyzes uridine-to-pseudouridine
        isomerization in tRNA substrates. In mammals, TRUB2 acts as a mitochondrial tRNA
        Psi55 synthase, modifying the conserved U55 position in the TPC loop of select
        mitochondrial tRNAs, and the Columba livia ortholog contains the conserved TruB
        N-terminal domain (PF01509) and is classified under InterPro family IPR039048
        (Trub2), supporting functional equivalence. However, this is scored CNN (correct
        but not novel) rather than COR because the tRNA substrate specificity is already
        implicit in the InterPro-derived annotation: IPR039048 specifically identifies the
        protein as Trub2 (a known tRNA pseudouridine synthase), and the existing GO:0009982
        annotation was assigned through that same InterPro mapping. The ProtNLM2 prediction
        thus refines granularity but does not provide genuinely new functional insight beyond
        what domain-based inference already established. Notably, an even more specific term
        GO:0160148 (tRNA pseudouridine(55) synthase activity) would better reflect TRUB2's
        known positional specificity at U55 in the TPC loop.
