description: >-
  ProtNLM2 predicted GO:0106029 (tRNA pseudouridine synthase activity) for Columba livia
  TRUB2 (A0A2I0M3K7), a 142-aa mitochondrial pseudouridine synthase belonging to the TruB
  family. The prediction correctly specifies tRNA substrate specificity beyond the existing
  GOA annotation GO:0009982 (pseudouridine synthase activity), which was assigned via
  InterPro2GO. TRUB2 is established as a tRNA pseudouridine-55 synthase acting on
  mitochondrial tRNAs, so the prediction is biologically accurate but not novel -- the
  protein's tRNA specificity is already captured by its InterPro classification
  (IPR039048, Trub2) and the existing pseudouridine synthase activity annotation
  implicitly covers this. An even more precise term, GO:0160148 (tRNA pseudouridine(55)
  synthase activity), would better capture TRUB2's known positional specificity at U55.
  Assessment: 1 CNN (correct, not novel).
