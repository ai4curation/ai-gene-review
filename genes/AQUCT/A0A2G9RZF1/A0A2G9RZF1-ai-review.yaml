description: >-
  A0A2G9RZF1 is almost certainly a gene prediction fragment from the fragmented
  draft genome assembly of Aquarana catesbeiana (American bullfrog), not a
  standalone protein. The 156-amino acid ORF (AB205_0007200) encodes a single CUB
  domain (residues 31-147), but scaffold KV928989 contains two additional
  consecutive ORFs (A0A2G9RZH1 with EGF+CUB domains, and A0A2G9RZI6 with
  CUB+EGF+CUB domains, the latter explicitly flagged as a fragment by UniProt)
  whose combined domain architecture (CUB-EGF-CUB-CUB-EGF-CUB) matches the
  C-terminal region of a tolloid-family metalloprotease (BMP-1 or TLL1). A 2024
  chromosome-level assembly (GCF_042186555.1) with ~17,000-fold better contiguity
  encodes complete BMP-1 (XP_073478370.1, 1,020 aa, LG03) and TLL1
  (XP_073462190.1, 1,005 aa, LG01), confirming the original draft produced
  fragmented gene models. No experimental data exist for this protein (UniProt
  protein evidence level 4: Predicted), and its precise biological function cannot
  be determined from this fragment. If the complete gene product were annotated,
  its molecular function would be metalloendopeptidase activity, not the
  previously hypothesized extracellular matrix structural constituent.
