id: P10593
gene_symbol: O6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:4577
  label: Zea mays
description: >
  Maize O6 (UniProt P10593), better known in the plant literature as albumin b-32 (also
  "b-32", "RIP1" or "proRIP1") and historically as "Protein opaque-6", is an endosperm
  ribosome-inactivating protein (RIP). It is the founding cereal RIP: an rRNA
  N-glycosidase (EC 3.2.2.22) that catalyses endohydrolysis of the N-glycosidic bond at
  one specific adenosine in the sarcin-ricin loop of large-subunit (28S) rRNA,
  irreversibly inactivating the ribosome and blocking the elongation-factor-dependent
  steps of protein synthesis. b-32 is highly abundant in the developing endosperm
  (up to ~1% of total seed protein), where its transcription is under the control of the
  endosperm bZIP regulator Opaque-2 (O2); b-32 levels are strongly reduced in o2 mutants.
  It is a cytosolic, non-secretory albumin that lacks a signal peptide. Although UniProt
  classifies it in the type-1 RIP subfamily, b-32 is functionally unusual: it accumulates
  as an essentially inactive single-chain zymogen (proRIP) and is converted, during
  germination by endogenous proteases, into a far more active two-chain (alpha-beta) enzyme by
  excision of an N-terminal segment, an internal acidic "inactivation" region and a
  C-terminal segment - a cereal-specific proteolytic-activation strategy that recent
  reviews classify as "type-3"-like. The activated alpha-beta form inhibits translation in
  rabbit reticulocyte lysate with picomolar potency (IC50 ~28-66 pM) and is ~10,000-fold
  more active than proRIP. Cereal RIPs including b-32 show little or no activity on plant
  (maize) ribosomes in vitro while remaining potent on heterologous eukaryotic ribosomes,
  consistent with a defence-oriented enzyme tuned to limit host self-toxicity. b-32 has
  reported antifungal/defence properties: reduction of b-32 in opaque-mutant backgrounds
  correlates with increased fungal/insect susceptibility, and transgenic expression of
  b-32 in tobacco, wheat and rice confers partial protection against fungal pathogens
  (Rhizoctonia solani, Fusarium head blight, Fusarium verticillioides). Because b-32 is a
  genuinely cytotoxic catalytic enzyme, its toxin and translation-inhibitor activities are
  legitimate molecular functions; its defence role is real but operates through that
  enzymatic activity and is better captured by a fungus-specific defence term than by the
  bare "defense response" parent. (All claims are anchored to the falcon deep-research
  synthesis of De Zaeytijd & Van Damme 2017 Toxins, Lanzanova et al. 2011, Iglesias et al.
  2024 Toxins, Mauri et al. 2016, and the UniProt record.)
existing_annotations:
# --- Current GOA annotations (2026 release) ---
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >
      IEA annotation from the UniProt subcellular-location vocabulary mapping. Maize b-32
      is a cytosolic, non-secretory endosperm albumin that lacks a signal peptide.
    action: ACCEPT
    reason: >
      Well supported. The UniProt record gives the subcellular location as "Cytoplasm",
      and the deep-research synthesis confirms that native maize b-32 is a cytosolic
      albumin, is not secreted via the endoplasmic reticulum, and (like cereal RIPs
      generally) lacks a signal peptide - implying cytosolic residence with no evidence for
      a specific organellar targeting route. "Cytoplasm" is the appropriate cellular-
      component term for the native protein.
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "Evidence supports that maize b-32 is a **cytosolic** endosperm protein"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "cereal RIPs generally **lack signal peptides**, implying cytosolic residence"
- term:
    id: GO:0017148
    label: negative regulation of translation
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: >
      IEA annotation from InterPro (RIP-family signatures). The defining consequence of
      b-32's rRNA N-glycosidase activity is irreversible ribosome inactivation and
      blockade of protein synthesis, i.e. negative regulation of translation.
    action: ACCEPT
    reason: >
      Correct and core to RIP biology. RIPs inactivate ribosomes as rRNA N-glycosidases,
      depurinating the conserved sarcin-ricin-loop adenine and thereby blocking the
      elongation-factor-dependent steps of translation; maize b-32 inhibits protein
      synthesis in vitro (IC50 ~28-66 pM for the activated alpha-beta form) consistent with this
      mechanism. The process term is the direct biological consequence of the catalytic
      molecular function (GO:0030598) and is appropriate at this level of specificity.
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "irreversibly inactivate ribosomes"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**inhibiting protein synthesis** in vitro, consistent with the canonical RIP mechanism of SRL depurination"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "The activated αβ form inhibits translation in rabbit reticulocyte lysate with **IC50 ~28–66 pM**."
- term:
    id: GO:0030598
    label: rRNA N-glycosylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >
      IEA annotation derived from EC 3.2.2.22 plus RIP-family InterPro signatures. This is
      the core, defining molecular function of maize b-32: an rRNA N-glycosidase that
      depurinates the sarcin-ricin loop of large-subunit rRNA.
    action: ACCEPT
    reason: >
      This is the correct and central molecular function. UniProt records the catalytic
      activity as "Endohydrolysis of the N-glycosidic bond at one specific adenosine on the
      28S rRNA" (EC 3.2.2.22), and the deep-research synthesis confirms that maize O6/b-32
      functions as an rRNA N-glycosidase that inactivates ribosomes by modifying rRNA. RIP
      activity of b-32 is independently corroborated experimentally (e.g. RIP activity
      demonstrated for the maize b-32 protein in yeast cells; activated alpha-beta form is
      ~10,000-fold more active than the proRIP zymogen). The term is at the right level of
      specificity and should be retained as the gene's core MF.
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "Maize O6/b-32 (RIP1/proRIP1) functions as an **rRNA N-glycosidase** that inactivates ribosomes by **modifying rRNA**"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "They hydrolyze the N-glycosidic bond of a conserved adenine in the **sarcin–ricin loop (SRL)** of the large-subunit rRNA"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "The processed form is **~10,000-fold more active** than proRIP."
# --- SPKW keyword-mapping annotations (GO_REF:0000043) ---
# Present in the goa_uniprot_gcrp snapshot (UniProt keyword -> GO "keyword2GO" pipeline);
# REMOVED from the current (2026) GOA release when GOA retired the keyword2GO pipeline for
# cellular organisms. Re-added here and reviewed retrospectively to assess whether the
# removal was justified. The two SPKW-unique terms for O6 are the UniProt keywords
# "Toxin" (-> GO:0090729) and "Plant defense" (-> GO:0006952). Unlike the biosynthetic-
# enzyme "defense" cases elsewhere in this project, b-32 is a genuinely cytotoxic catalytic
# protein, so the molecular-function "toxin activity" is a LEGITIMATE annotation.
- term:
    id: GO:0090729
    label: toxin activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >
      SPKW (GO_REF:0000043) annotation derived from the UniProt keyword "Toxin";
      snapshot-only, removed in the current GOA release. Maize b-32 is a bona fide toxin:
      ribosome-inactivating proteins catalytically and irreversibly inactivate ribosomes,
      and b-32's activated form is extraordinarily potent.
    action: MODIFY
    reason: >
      Unlike the biosynthetic-enzyme "defense" genes elsewhere in this project, the "toxin"
      keyword for b-32 reflects a REAL, mechanistically defined cytotoxic activity: RIPs are
      classic plant toxins that irreversibly inactivate ribosomes via rRNA N-glycosidase
      depurination of the sarcin-ricin loop, and the activated alpha-beta b-32 inhibits
      translation with picomolar IC50. So "toxin activity" is not wrong. However, GO:0090729
      is a high-level grouping MF; the precise, mechanistic molecular function - rRNA
      N-glycosylase activity (GO:0030598) - is more informative, is the EC-defined activity
      (EC 3.2.2.22), and is already present as a current GOA annotation. The toxin annotation
      should therefore be retained in essence but MODIFIED to the specific catalytic MF that
      explains how b-32 acts as a toxin. (This is the legitimate-toxin case: kept via MODIFY
      to the precise enzymatic term, in contrast to the over-annotated biosynthetic-enzyme
      "defense" genes whose toxin/defense keywords were correctly dropped.)
    proposed_replacement_terms:
    - id: GO:0030598
      label: rRNA N-glycosylase activity
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**Ribosome-inactivating proteins (RIPs)** are enzymes that **irreversibly inactivate ribosomes**"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "RIPs hydrolyze the N-glycosidic bond of a conserved adenine in large-subunit rRNA, irreversibly inactivating ribosomes and blocking translation factor function"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "The activated αβ form inhibits translation in rabbit reticulocyte lysate with **IC50 ~28–66 pM**."
- term:
    id: GO:0006952
    label: defense response
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  retired: true
  review:
    summary: >
      SPKW (GO_REF:0000043) annotation derived from the UniProt keyword "Plant defense";
      snapshot-only, removed in the current GOA release. b-32 does have a defence-associated
      role (notably antifungal), but it acts through its toxin/N-glycosidase activity and
      the bare parent term "defense response" is over-broad.
    action: MARK_AS_OVER_ANNOTATED
    reason: >
      GOA's removal of this generic keyword-derived term was reasonable. b-32's protective
      role is real but operates THROUGH its molecular function (toxin / rRNA N-glycosidase
      activity, GO:0090729 / GO:0030598): reduction of b-32 in opaque-mutant backgrounds
      correlates with increased susceptibility to fungal attack and insect feeding, and
      transgenic b-32 confers partial protection against fungal pathogens (Rhizoctonia
      solani in tobacco; Fusarium head blight in wheat; Fusarium verticillioides in maize
      leaf assays). The biology is therefore specifically ANTIFUNGAL, and b-32's in-planta
      defence role has historically been debated and is activation-state/tissue dependent.
      A bare top-level "defense response" (GO:0006952) adds little once the catalytic MF is
      captured; if a process term is wanted, the specific "defense response to fungus"
      (GO:0050832) better reflects the demonstrated antifungal biology (proposed as a NEW
      term below). The keyword-derived parent term is over-broad and its removal is
      acceptable. Tier A.
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "increased susceptibility to fungal attack and insect feeding"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**Transgenic tobacco** expressing maize b-32 showed increased protection against **Rhizoctonia solani**"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**Transgenic wheat** constitutively expressing b-32 showed **significantly lower Fusarium head blight severity**"
# --- NEW annotation proposed from the literature ---
- term:
    id: GO:0050832
    label: defense response to fungus
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: >
      Proposed replacement for the over-broad "defense response" (GO:0006952): the
      demonstrated protective biology of maize b-32 is specifically antifungal.
    action: NEW
    reason: >
      The defence-associated phenotypes for b-32 are fungus-directed: reduction of b-32 in
      opaque-mutant backgrounds correlates with increased fungal susceptibility, and
      transgenic b-32 confers partial protection against fungal pathogens in tobacco
      (Rhizoctonia solani), wheat (Fusarium head blight) and maize/rice systems. The
      specific term "defense response to fungus" (GO:0050832) captures this biology far more
      informatively than the bare "defense response" parent. The mechanism is the RIP
      toxin/N-glycosidase activity; this process term complements that MF. Evidence remains
      indirect/transgenic and the in-planta role is debated, so a conservative IEA-level
      assignment is appropriate rather than an experimental code.
    supported_by:
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "increased susceptibility to fungal attack and insect feeding"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**Transgenic tobacco** expressing maize b-32 showed increased protection against **Rhizoctonia solani**"
    - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
      supporting_text: "**Transgenic wheat** constitutively expressing b-32 showed **significantly lower Fusarium head blight severity**"
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: RIP-family InterPro signatures (IPR001574, IPR016138, IPR017988, IPR036041)
      map to "negative regulation of translation", reflecting ribosome inactivation by the
      rRNA N-glycosidase activity.
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: SwissProt keyword-derived (SPKW) annotations present in the goa_uniprot_gcrp
      snapshot but removed from the current GOA release after GOA retired the keyword2GO
      pipeline for cellular organisms.
  - statement: For O6/b-32 the keyword "Toxin" mapped to a genuinely correct (if generic)
      molecular function, since RIPs are bona fide ribosome-inactivating toxins; the keyword
      "Plant defense" mapped to an over-broad process term.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: The UniProt subcellular location "Cytoplasm" maps to GO:0005737; consistent
      with b-32 being a cytosolic, non-secretory endosperm albumin lacking a signal peptide.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: EC 3.2.2.22 plus RIP-family InterPro signatures assign rRNA N-glycosylase
      activity (GO:0030598), the core catalytic MF of b-32.
- id: file:MAIZE/O6/O6-deep-research-falcon.md
  title: Deep-research report (falcon / Edison Scientific Literature) - functional
    annotation of maize O6 / albumin b-32 / RIP1 (P10593).
  findings:
  - statement: Identifies P10593/O6 as maize endosperm albumin b-32 (RIP1/proRIP1), a type-1
      (cereal "type-3"-like proenzyme) ribosome-inactivating protein, and confirms the
      identity against the opaque-6 / Opaque-2 endosperm literature.
  - statement: The core molecular function is rRNA N-glycosidase activity (EC 3.2.2.22) -
      hydrolysis of the N-glycosidic bond of a conserved adenine in the sarcin-ricin loop of
      large-subunit rRNA - irreversibly inactivating ribosomes and inhibiting protein
      synthesis; the activated alpha-beta form has IC50 ~28-66 pM and is ~10,000-fold more
      active than the proRIP zymogen.
  - statement: b-32 is a cytosolic, non-secretory endosperm albumin lacking a signal peptide,
      synthesized as an inactive single-chain zymogen and proteolytically activated during
      germination by excision of N-terminal, internal acidic, and C-terminal segments.
  - statement: Expression is endosperm-specific, reaches ~1% of total seed protein, and is
      under the control of the Opaque-2 (O2) transcriptional program (reduced in o2 mutants).
  - statement: Best-supported biological role is antifungal seed/seedling defence acting
      through the RIP activity; reduction of b-32 correlates with increased fungal/insect
      susceptibility, and transgenic b-32 confers partial protection against Rhizoctonia
      solani (tobacco), Fusarium head blight (wheat) and Fusarium verticillioides (maize),
      though the in-planta defence role is debated and activation-state dependent.
  - statement: Cereal RIPs including maize b-32 show little or no N-glycosylase activity on
      plant/maize ribosomes in vitro while remaining potent on heterologous eukaryotic
      ribosomes, consistent with a defence-oriented enzyme tuned to limit host self-toxicity.
core_functions:
- description: >
    Maize b-32 (O6) is an rRNA N-glycosidase (EC 3.2.2.22), the core catalytic activity of
    a ribosome-inactivating protein: it hydrolyses the N-glycosidic bond of a conserved
    adenine in the sarcin-ricin loop of large-subunit rRNA, irreversibly inactivating the
    ribosome. This is a genuinely cytotoxic (toxin) activity; the protein accumulates as an
    inactive zymogen and is proteolytically activated to a far more potent alpha-beta form.
  molecular_function:
    id: GO:0030598
    label: rRNA N-glycosylase activity
  directly_involved_in:
  - id: GO:0017148
    label: negative regulation of translation
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
    supporting_text: "Maize O6/b-32 (RIP1/proRIP1) functions as an **rRNA N-glycosidase** that inactivates ribosomes by **modifying rRNA**"
  - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
    supporting_text: "They hydrolyze the N-glycosidic bond of a conserved adenine in the **sarcin–ricin loop (SRL)** of the large-subunit rRNA"
- description: >
    b-32 is an endosperm storage albumin and a stored, protease-activated defence enzyme:
    abundant in developing endosperm (up to ~1% of seed protein) under Opaque-2 control, it
    contributes to antifungal seed/seedling defence through its RIP/toxin activity. Reduced
    b-32 correlates with greater fungal/insect susceptibility, and transgenic b-32 confers
    partial protection against fungal pathogens. This protective effect is delivered by the
    same RIP/toxin enzymatic activity (rRNA N-glycosidase, GO:0030598; "toxin activity",
    GO:0090729).
  molecular_function:
    id: GO:0030598
    label: rRNA N-glycosylase activity
  directly_involved_in:
  - id: GO:0050832
    label: defense response to fungus
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
    supporting_text: "increased susceptibility to fungal attack and insect feeding"
  - reference_id: file:MAIZE/O6/O6-deep-research-falcon.md
    supporting_text: "can constitute **up to ~1% of total seed proteins**"
proposed_new_terms: []
suggested_questions:
- question: Does native maize b-32 act as a defence protein in planta, or is its protective
    effect only manifest when ectopically/constitutively expressed (transgenic) and
    proteolytically activated? The endogenous in-planta defence role has historically been
    debated.
  experts:
  - Carlotta Balconi
- question: What are the genuine in vivo ribosomal targets of activated b-32, given that
    cereal RIPs including b-32 show little or no activity on maize ribosomes in vitro while
    being potent on heterologous eukaryotic ribosomes - does this reflect selectivity for
    pathogen/fungal ribosomes?
  experts:
  - Els J. M. Van Damme
- question: Which endogenous proteases activate proRIP b-32 during germination and in
    infected tissue, and can pathogen-secreted proteases activate it as part of the defence
    response?
  experts:
  - Mirella Motto
suggested_experiments:
- description: Reconstitute purified activated alpha-beta b-32 with ribosomes from maize, from a
    fungal pathogen (e.g. Fusarium/Rhizoctonia/Aspergillus) and from rabbit reticulocyte
    lysate, and quantify rRNA depurination (aniline cleavage / qPCR depurination assay) and
    translation inhibition to define the true substrate range.
  hypothesis: Activated b-32 selectively depurinates heterologous/fungal ribosomes while
    sparing maize ribosomes, consistent with a defence-oriented enzyme that limits host
    self-toxicity.
  experiment_type: in vitro rRNA N-glycosidase / translation-inhibition assay
- description: Compare fungal/insect susceptibility of near-isogenic maize lines that differ
    in functional b-32 (wild-type vs CRISPR knockout of O6, and complementation), under
    controlled pathogen challenge, to test the endogenous defence role.
  hypothesis: Loss of functional b-32 increases endosperm/seedling susceptibility to fungal
    pathogens, demonstrating a genuine in-planta antifungal defence function.
  experiment_type: reverse-genetics pathogen-challenge assay
- description: Identify the germination/infection proteases that process proRIP to the active
    alpha-beta form (activity-based protein profiling; in vitro processing with candidate plant
    and fungal proteases) and map the cleavage sites.
  hypothesis: Specific germination-induced and/or pathogen-secreted proteases activate
    proRIP by excising the internal acidic inactivation region, coupling activation to the
    defence context.
  experiment_type: protease identification and in vitro proteolytic-activation assay
