id: A0A804UIX9
gene_symbol: A0A804UIX9
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:4577
  label: Zea mays
description: >
  A0A804UIX9 is an uncharacterized 375-amino acid protein from Zea mays (maize,
  cultivar B73) encoded on chromosome 9 (gene model Zm00001eb381380). It is
  classified as a PGG domain-containing protein based on the presence of two PGG
  repeats (Pfam PF13962 / InterPro IPR026961) spanning residues 50-157 and 217-294.
  The PGG domain is named for a conserved Pro-Gly-Gly motif and is relatively
  uncharacterized; no enzymatic activity or specific molecular function has been
  experimentally demonstrated for PGG domain proteins. The protein is predicted by
  Phobius to contain six transmembrane helices (at approximately residues 54-73,
  102-123, 135-154, 166-189, 222-239, and 269-290), indicating it is a multi-pass
  integral membrane protein. The N-terminal region (residues 1-44) is predicted to
  be disordered with a polar residue compositional bias (residues 9-26). PANTHER
  classifies this protein in the CASKIN family (PTHR24177), subfamily SF432. No
  experimental data exist for this protein (UniProt protein evidence level 4:
  Predicted), no gene name has been assigned, and its biological function remains
  unknown. The deep research report for this gene incorrectly interpreted it as a
  polygalacturonase-inhibiting protein (PGIP); PGIPs are extracellular LRR proteins
  that lack transmembrane domains, which is incompatible with the six predicted
  transmembrane helices in A0A804UIX9.
references:
  - id: PMID:34353948
    title: "De novo assembly, annotation, and comparative analysis of 26 diverse maize genomes"
    reference_review:
      relevance: LOW
      correctness: VERIFIED
      review_notes: >
        This is the maize B73 genome paper cited by UniProt for the nucleotide sequence.
        It provides the genomic context but no functional characterization of this specific gene.
  - id: file:MAIZE/A0A804UIX9/A0A804UIX9-hypotheses/core-function-1-go-0003674/openscientist.md
    title: OpenScientist hypothesis investigation - molecular function of PGG domain protein
    findings:
      - statement: >-
          GO:0003674 (root MF) confirmed as correct. No PGG domain protein in any
          species has a specific MF annotation. PANTHER CASKIN classification is a
          cross-kingdom misassignment. ACD6 (closest characterized homolog) has ion
          channel-like activity but requires ankyrin repeats absent from A0A804UIX9.
  - id: file:MAIZE/A0A804UIX9/A0A804UIX9-deep-research-falcon.md
    title: "Deep research report for A0A804UIX9"
    publication_type: DEEP_RESEARCH
    reference_review:
      relevance: MEDIUM
      correctness: MISCITED
      review_notes: >
        The falcon deep research report incorrectly interprets the PGG domain as being
        characteristic of the PGIP (polygalacturonase-inhibiting protein) family. PGIPs are
        completely extracellular LRR proteins lacking transmembrane domains, whereas A0A804UIX9
        has six predicted transmembrane helices and is classified by PANTHER in the CASKIN family
        (PTHR24177), not in a PGIP family. The citations about PGIP biology (Protsenko et al. 2008,
        Murmu et al. 2025, etc.) are about a different protein family and should not be applied
        to this protein. The report provides useful general context on plant defense and cell wall
        biology but its central functional inference is incorrect.
existing_annotations: []
core_functions:
  - description: >-
      The molecular function of A0A804UIX9 is genuinely unknown. OpenScientist
      investigation confirmed that GO:0003674 (root MF) is the correct annotation,
      as no PGG domain protein in any species has a specific molecular function GO
      annotation. The closest characterized homolog is Arabidopsis ACD6, which has
      ion channel-like activity, but ACD6 requires ankyrin repeat domains that
      A0A804UIX9 lacks. The PANTHER CASKIN family classification (PTHR24177) is a
      cross-kingdom misassignment that provides no functional information. The 6-TM
      topology is structurally suggestive of channel or transporter activity, but
      architectural similarity alone is insufficient to justify a specific MF term
      without experimental evidence.
    molecular_function:
      id: GO:0003674
      label: molecular_function
