suggested_questions:
  - question: >
      What is the molecular function of the PGG domain (PF13962/IPR026961)?
      This domain is found in multi-pass transmembrane proteins but has no
      experimentally characterized function. Does it mediate protein-protein
      interactions, transport, or signaling?
  - question: >
      What is the relationship between plant PGG domain-containing transmembrane
      proteins and the CASKIN family (PANTHER PTHR24177)? The CASKIN classification
      seems unexpected for a plant membrane protein.
  - question: >
      Is A0A804UIX9 expressed in specific maize tissues or developmental stages?
      Expression data from RNA-seq atlases (e.g., ExpressionAtlas) could provide
      clues about biological function.
suggested_experiments:
  - hypothesis: A0A804UIX9 is an integral membrane protein localized to a specific endomembrane compartment.
    description: >
      Express GFP-tagged A0A804UIX9 in maize protoplasts or Nicotiana benthamiana
      leaf epidermal cells and examine subcellular localization by confocal microscopy,
      co-staining with organelle markers (ER, Golgi, plasma membrane, tonoplast).
    experiment_type: fluorescence microscopy
  - hypothesis: A0A804UIX9 has a role in maize development or stress response.
    description: >
      Generate CRISPR/Cas9 knockout lines for Zm00001eb381380 in maize B73.
      Phenotype under normal growth conditions and under biotic (fungal infection)
      and abiotic (drought, salt) stress conditions.
    experiment_type: reverse genetics
