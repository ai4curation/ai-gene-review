  label: Zea mays
description: CASP-like protein 1D1 (ZmCASPL1D1) is a small tetraspan plasma-membrane protein of the CASP-like
  (CASPL) subfamily (CASPL1B/1D clade) of the MARVEL-related Casparian strip membrane domain protein family.
  Arabidopsis members of this clade (including AtCASPL1D1/1D2) are expressed in suberized endodermal cells,
  interact with the aquaporin PIP2;1, and weakly modulate suberization; ZmCASPL1D1 itself is uncharacterized.
