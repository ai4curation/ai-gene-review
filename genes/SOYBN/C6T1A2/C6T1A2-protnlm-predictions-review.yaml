          supporting_text: >-
            should NOT be entered as a direct/experimental annotation
        - reference_id: UniProtKB:C6T1A2
          supporting_text: "InterPro; IPR053266; Zinc_finger_protein_7."
        - reference_id: PMID:26268547
          supporting_text: "Soybean transcription factor ORFeome associated with drought
            resistance: a valuable resource to accelerate research on abiotic stress
            resistance"
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0005634
      label: nucleus
    predicted_term_type: GO_CC
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        ProtNLM2 predicted GO:0005634 (nucleus) for C6T1A2, a soybean C2H2-type zinc
        finger transcription factor. This prediction is biologically correct: C2H2-type
        zinc finger transcription factors are canonical nuclear proteins that must localize
        to the nucleus to bind DNA and regulate transcription. Numerous soybean C2H2 zinc
        finger proteins have been experimentally confirmed as nuclear-localized (e.g.,
        GmZFP3, GmZF1), and nuclear localization is essentially a defining characteristic
        of the functional class. However, this is assessed as CNN (correct but not novel)
        rather than COR because the prediction provides no functional insight beyond what
        is already trivially derivable from the protein's domain architecture and family
        classification. The InterPro annotation (IPR053266, Zinc_finger_protein_7;
        IPR036236, Znf_C2H2_sf) and PANTHER classification (PTHR47593, ZINC FINGER
        PROTEIN 4-LIKE) both implicitly predict nuclear localization. The ai-review
        independently proposed this same annotation as a NEW ISS-level annotation based
        on domain architecture, confirming that the ProtNLM2 prediction is redundant with
        standard domain-based inference. While formally correct, a model that predicts
        nucleus for a zinc finger transcription factor demonstrates no discriminative power
        beyond family-level annotation transfer.
      supported_by:
        - reference_id: UniProtKB:C6T1A2
          supporting_text: "InterPro; IPR053266; Zinc_finger_protein_7."
        - reference_id: UniProtKB:C6T1A2
          supporting_text: "PANTHER; PTHR47593; ZINC FINGER PROTEIN 4-LIKE; 1."
        - reference_id: file:SOYBN/C6T1A2/C6T1A2-deep-research-falcon.md
          supporting_text: "Based on InterPro domain annotation showing C2H2-type zinc finger
            domains (IPR013087, IPR036236, IPR053266), this protein is predicted to function
            as a DNA-binding transcription factor localized to the nucleus."
