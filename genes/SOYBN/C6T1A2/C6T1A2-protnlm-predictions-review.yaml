id: C6T1A2
gene_symbol: C6T1A2
taxon:
  id: NCBITaxon:3847
  label: Glycine max
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for C6T1A2 (Glyma17g18110.1), a 210-residue C2H2-type
  zinc finger transcription factor from soybean with a single C2H2 domain (residues 79-106)
  classified in the Zinc_finger_protein_7 family (IPR053266). GO:0005634 (nucleus) is
  assessed as CNN (correct but not novel) because nuclear localization is trivially expected
  for any C2H2-type zinc finger transcription factor and is already captured by domain-based
  inference in the ai-review. GO:0009788 (negative regulation of abscisic acid-activated
  signaling pathway) is assessed as UNC (uncertain): the prediction likely reflects sequence
  similarity to Arabidopsis ZFP7 (Q39266), the closest characterized homolog in the
  IPR053266 family, which has been shown to negatively regulate ABA signaling during
  germination. However, the C2H2 zinc finger superfamily is extraordinarily large and
  functionally diverse, and a shared single-C2H2 domain architecture does not reliably
  predict conservation of specific biological process roles across the Arabidopsis-soybean
  divergence (~90 Mya). No gene-specific experimental data exists for C6T1A2.
  Assessment: 1 CNN, 1 UNC; 0 incorrect.
