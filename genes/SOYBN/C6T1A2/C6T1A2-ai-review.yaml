id: C6T1A2
gene_symbol: C6T1A2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3847
  label: Glycine max
description: >-
  C6T1A2 (Glyma17g18110.1) is a 210-residue unreviewed (TrEMBL) protein from
  soybean (Glycine max) that contains a single C2H2-type zinc finger domain
  (residues 79-106). It was cloned as part of a soybean transcription factor
  ORFeome effort that identified drought-resistance-associated transcription
  factors. InterPro classifies it in the Zinc_finger_protein_7 family
  (IPR053266) and in the C2H2-type zinc finger superfamily (IPR036236,
  IPR013087), while PANTHER places it in the ZINC FINGER PROTEIN 4-LIKE family
  (PTHR47593). The protein has an N-terminal acidic disordered region (residues
  1-31) and a second disordered region (residues 95-116) flanking the zinc
  finger domain. Based on its domain architecture, C6T1A2 is predicted to
  function as a DNA-binding transcription factor localized to the nucleus, with
  zinc ion binding activity mediated by the C2H2 zinc finger. No gene-specific
  experimental studies have been published for this protein; all functional
  inferences derive from domain architecture, family membership, and analogy
  to characterized C2H2 zinc finger proteins in Arabidopsis and other plants.
  The closest characterized relative identified by phmmer is Arabidopsis ZFP7
  (Q39266), which shares the same single-C2H2 domain architecture and
  IPR053266 family membership and has been shown to negatively regulate ABA
  signaling during germination, though whether this specific function is
  conserved in the soybean ortholog remains unknown.
