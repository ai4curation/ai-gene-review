- id: UniProtKB:C6T1A2
  title: UniProtKB entry C6T1A2 (C6T1A2_SOYBN), C2H2-Zn transcription factor, Glycine max.
  findings:
  - statement: 210-aa unreviewed (TrEMBL) protein with a single C2H2-type zinc finger
      domain (residues 79-106), two disordered regions, and an N-terminal acidic
      compositional bias. Keywords include Metal-binding, Zinc, and Zinc-finger.
  - statement: InterPro classifies the protein in IPR053266 (Zinc_finger_protein_7),
      IPR036236 (Znf_C2H2_sf), and IPR013087 (Znf_C2H2_type). PANTHER classifies it
      as PTHR47593:SF9 (C2H2-TYPE DOMAIN-CONTAINING PROTEIN) within the ZINC FINGER
      PROTEIN 4-LIKE family (PTHR47593).
  - statement: The only GO annotation in the UniProt DR lines is GO:0008270 (zinc ion
      binding, IEA:UniProtKB-KW), derived from the Zinc keyword. No annotations appear
      in the GOA QuickGO export.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Direct UniProt entry; protein is evidence level PE 2 (transcript level).
      The entry is unreviewed (TrEMBL) and carries only computationally derived
      annotations.
