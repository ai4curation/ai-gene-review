  review:
    summary: >-
      Proposed new annotation for nuclear localization. As a predicted C2H2-type
      zinc finger transcription factor, C6T1A2 is expected to localize to the
      nucleus where it would bind DNA and regulate transcription. Multiple soybean
      C2H2 zinc finger proteins have been experimentally confirmed as
      nuclear-localized. ProtNLM2 also predicted this localization with high
      confidence (0.97), though it was assessed as trivially derivable from the
      protein's classification.
    action: NEW
