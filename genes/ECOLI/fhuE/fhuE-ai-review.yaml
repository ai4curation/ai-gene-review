- id: PMID:10806384
  title: Proteomic analysis of the Escherichia coli outer membrane.
  findings:
    - statement: >-
        FhuE was identified in the E. coli outer membrane fraction by proteomic analysis
        using 2D gel electrophoresis and mass spectrometry. Its expression is increased
        by iron limitation.
      supporting_text: >-
        like the E. coli iron receptors FhuE and FhuA, the expression of YbiL is markedly
        increased by iron limitation
- id: PMID:20005847
  title: Hydroxyurea induces hydroxyl radical-mediated cell death in Escherichia coli.
  findings:
    - statement: >-
        fhuE is among many iron uptake genes upregulated during hydroxyurea stress. The
        increased iron uptake contributes to hydroxyl radical formation via Fenton chemistry,
        which mediates HU-induced cell death. TonB, which couples FhuE and other outer
        membrane iron transporters to the proton motive force, when deleted increases
        resistance to HU.
      supporting_text: >-
        Continued HU stress activates iron uptake and toxins MazF and RelE, whose activity
        causes the synthesis of incompletely translated proteins and stimulation of envelope
        stress responses
    - statement: >-
        TonB couples the dedicated outer membrane iron transporters FepA, FecA and FhuE to
        the proton-motive force. Disruption of tonB increased resistance to HU stress.
      supporting_text: >-
        TonB is important for iron uptake because it couples the dedicated outer-membrane
        iron transporters FepA, FecA and FhuE to the proton-motive force
- id: PMID:2162465
  title: Sequence of the fhuE outer-membrane receptor gene of Escherichia coli K12 and
    properties of mutants.
  findings:
    - statement: >-
        The fhuE gene was sequenced and shown to encode a 729-residue precursor protein
        (693 residues mature form) required for uptake of iron(III) via coprogen,
        ferrioxamine B, and rhodotorulic acid. Mutations in the TonB box (V44P, V46P)
        abolished transport activity.
      supporting_text: >-
        The fhuE gene of Escherichia coli codes for an outer-membrane receptor protein
        required for the uptake of iron(III) via coprogen, ferrioxamine B and rhodotorulic acid
    - statement: >-
        FhuE contains four regions of homology with other TonB-dependent receptors.
        Point mutations in the TonB box and second homology region impaired transport.
      supporting_text: >-
        A valine to proline exchange in the 'TonB box' abolished transport activity
- id: PMID:31098021
  title: Determination of the molecular basis for coprogen import by Gram-negative bacteria.
  findings:
    - statement: >-
        FhuE crystal structure solved at 2.0 A in complex with coprogen (PDB 6E4V).
        Structure reveals a canonical TBDT fold with a 22-stranded transmembrane beta-barrel
        and a plug domain. A planar binding pocket acts as a selectivity filter for linear
        hydroxamate siderophores.
      supporting_text: >-
        The structure of FhuE consists of a canonical TBDT fold (Noinaj et al., 2010 ▸) consisting of a 22-stranded transmembrane β-barrel, the lumen of which is occluded by a globular plug domain
    - statement: >-
        FhuE binds Fe-coprogen with high affinity (Kd ~508 nM), Fe-rhodotorulic acid with
        lower affinity (Kd ~30 uM), and ferrioxamine B very weakly. It does not transport
        ferrichrome or ferrioxamine E.
      supporting_text: >-
        giving dis­association constants of 508 ± 116 nM for Fe-coprogen and 30 ± 14 µM for Fe-rhodotorulic acid
    - statement: >-
        A strain engineered to depend solely on FhuE for siderophore-iron import confirmed
        that FhuE supports growth on Fe-coprogen, Fe-rhodotorulic acid, and ferrioxamine B
        but not ferrichrome or ferrioxamine E.
      supporting_text: >-
        Transforming the ΔTBDT strain with a plasmid to drive the expression of FhuE supported growth on media containing coprogen, rhodotorulic acid or ferrioxamine B as an iron source, but not those with ferrichrome or ferrioxamine E
    - statement: >-
        Key coprogen-binding residues identified: Arg117, Arg142, Trp275 coordinate
        hydroxamate groups; Asn373 forms hydrogen bond with diketopiperazine ring. Arg142
        acts as a selectivity filter excluding nonplanar siderophores like ferrichrome.
      supporting_text: >-
        The planar nature of the FhuE binding pocket does not allow the coordination of the
        Fe-ferrichrome complex without significant clashes

core_functions:
- description: >-
    FhuE is a TonB-dependent outer membrane receptor that actively transports iron
    complexed with linear hydroxamate siderophores (coprogen, rhodotorulic acid,
    ferrioxamine B) across the outer membrane of E. coli. It binds Fe-coprogen with
    high affinity (Kd ~508 nM) and acts as a selectivity filter for planar siderophore-iron
    complexes. FhuE enables siderophore piracy by importing fungally produced coprogens.
    It requires the TonB-ExbB-ExbD energy-transducing complex for active transport.
