id: P16869
gene_symbol: fhuE
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  FhuE is a TonB-dependent outer membrane receptor (TBDT) in Escherichia coli that mediates
  the active transport of iron complexed with linear hydroxamate siderophores across the outer
  membrane. Its primary high-affinity substrate is Fe(III)-coprogen (Kd ~508 nM), a fungally
  produced trihydroxamate siderophore. FhuE also transports Fe(III)-rhodotorulic acid with
  lower affinity (Kd ~30 uM) and ferrioxamine B very weakly. It does not transport cyclic
  siderophores such as ferrichrome or ferrioxamine E. The crystal structure (PDB 6E4V, 2.0 A)
  reveals a canonical TBDT fold with a 22-stranded transmembrane beta-barrel occluded by a
  plug domain, and a planar binding pocket that acts as a selectivity filter for linear
  (planar) hydroxamate-iron complexes. Key binding residues include Arg117, Arg142, Trp275,
  and Asn373. FhuE requires the TonB-ExbB-ExbD energy-transducing system for active transport.
  Expression is induced under iron-limiting conditions and also by hydroxyurea stress. FhuE
  represents a mechanism of siderophore piracy, enabling E. coli to scavenge iron from
  siderophores produced by competing fungi.
existing_annotations:
- term:
    id: GO:0009279
    label: cell outer membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      FhuE is an integral outer membrane protein. The crystal structure (PDB 6E4V) confirms
      it forms a 22-stranded transmembrane beta-barrel in the outer membrane (PMID:31098021).
      Proteomic analysis directly identified FhuE in the E. coli outer membrane fraction
      (PMID:10806384). The IBA annotation is well supported.
    action: ACCEPT
    reason: >-
      Outer membrane localization is the core location for FhuE function. Confirmed by
      crystal structure, proteomics, and sequence analysis. Multiple independent lines of
      evidence support this annotation.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          The structure of FhuE consists of a canonical TBDT fold (Noinaj et al., 2010 ▸) consisting of a 22-stranded transmembrane β-barrel, the lumen of which is occluded by a globular plug domain
      - reference_id: PMID:10806384
        supporting_text: >-
          like the E. coli iron receptors FhuE and FhuA, the expression of YbiL is markedly
          increased by iron limitation

- term:
    id: GO:0033214
    label: siderophore-iron import into cell
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      FhuE imports iron complexed with hydroxamate siderophores (coprogen, rhodotorulic acid,
      ferrioxamine B) into the cell. This is the core biological process of the protein,
      well established by Grinter & Lithgow 2019 (PMID:31098021) and Sauer et al. 1990
      (PMID:2162465). The IBA annotation is accurate.
    action: ACCEPT
    reason: >-
      Siderophore-iron import is the primary biological function of FhuE. Confirmed by
      growth complementation assays in a strain lacking all TBDTs, binding assays, and
      crystal structure.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          while FhuE is highly active in the import of coprogens, it has some level of
          promiscuity, acting as a low-affinity transporter for related siderophores
      - reference_id: PMID:2162465
        supporting_text: >-
          The fhuE gene of Escherichia coli codes for an outer-membrane receptor protein
          required for the uptake of iron(III) via coprogen, ferrioxamine B and rhodotorulic acid

- term:
    id: GO:0015344
    label: siderophore uptake transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      FhuE functions as a siderophore uptake transmembrane transporter. It transports
      Fe-coprogen with high affinity (Kd ~508 nM), Fe-rhodotorulic acid with lower affinity
      (Kd ~30 uM), and ferrioxamine B weakly (PMID:31098021). The IBA annotation correctly
      captures the molecular function.
    action: ACCEPT
    reason: >-
      This is an appropriate molecular function term for FhuE. It captures the siderophore
      uptake transporter activity without being too specific or too general.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          Taken together, these data show that while FhuE is capable of binding and
          transporting Fe-coprogen, Fe-rhodotorulic acid and ferrioxamine B, there is a
          large difference in substrate affinity and transport efficiency

- term:
    id: GO:0009279
    label: cell outer membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation for outer membrane localization based on InterPro and UniProt subcellular
      location. Consistent with the experimentally validated IDA and IBA annotations for the
      same term.
    action: ACCEPT
    reason: >-
      Correct and consistent with experimental evidence. The IEA provides independent
      computational support for what is already well established experimentally.

- term:
    id: GO:0015343
    label: siderophore-iron transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping (IPR010105, TonB-dependent siderophore receptor).
      FhuE transports siderophore-iron complexes across the outer membrane. This is consistent
      with the IMP annotation for the same term from PMID:31098021.
    action: ACCEPT
    reason: >-
      Correct InterPro-based annotation. Consistent with experimental evidence from
      Grinter & Lithgow 2019.

- term:
    id: GO:0015891
    label: siderophore transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro for siderophore transport. FhuE transports siderophore-iron
      complexes specifically; it is the iron-loaded form that is transported, not free
      siderophores. This term is a parent of more specific terms already annotated.
    action: ACCEPT
    reason: >-
      This is a broader biological process term that is accurate for FhuE. While more specific
      terms like ferric-hydroxamate import (GO:0015687) are also annotated, this parent term
      is not wrong. The IEA correctly captures the general transport function.

- term:
    id: GO:0033214
    label: siderophore-iron import into cell
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      ARBA machine learning annotation for siderophore-iron import. Duplicate of the IBA
      annotation for the same term. Correct.
    action: ACCEPT
    reason: >-
      Accurate IEA annotation consistent with experimental evidence and IBA annotation.

- term:
    id: GO:0034755
    label: iron ion transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      Logical inference from the IMP annotation for high-affinity ferric iron transmembrane
      transporter activity (GO:0015092). Iron ion transmembrane transport is a broader
      biological process that is consistent with FhuE function.
    action: ACCEPT
    reason: >-
      Correct logical inference. FhuE mediates iron ion transmembrane transport as part of
      its siderophore-iron uptake function. This is a parent term that correctly captures
      the transport aspect.

- term:
    id: GO:0038023
    label: signaling receptor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro mapping (IPR010105). While some TonB-dependent receptors
      (e.g., FecA, FpvA) have dual signaling/transport roles through anti-sigma factor
      signaling cascades, FhuE has no documented signaling function. FhuE does not interact
      with a periplasmic sigma factor cascade. The InterPro family IPR010105 broadly
      covers TonB-dependent siderophore receptors, and the signaling receptor activity
      mapping appears to be an overgeneralization from the subset of TBDTs that do signal.
    action: REMOVE
    reason: >-
      There is no experimental evidence that FhuE has signaling receptor activity. FhuE
      functions as a transporter, not a signaling receptor. Unlike FecA which has a
      well-characterized signaling cascade through FecR/FecI, FhuE has no known signaling
      partners. This IEA annotation is an erroneous InterPro mapping that should be removed.

- term:
    id: GO:0006879
    label: intracellular iron ion homeostasis
  evidence_type: NAS
  original_reference_id: PMID:2162465
  review:
    summary: >-
      NAS annotation from ComplexPortal citing the original fhuE gene characterization paper.
      FhuE contributes to iron homeostasis by importing iron-siderophore complexes. However,
      iron homeostasis is a higher-level process involving regulation of intracellular iron
      levels, and FhuE is one of several transporters involved. This is a reasonable but
      peripheral annotation.
    action: KEEP_AS_NON_CORE
    reason: >-
      FhuE contributes to intracellular iron homeostasis by importing iron via siderophore
      complexes, but iron homeostasis regulation involves many genes (Fur, storage proteins,
      etc.). FhuE is a transporter, not a regulator of iron homeostasis per se.
    supported_by:
      - reference_id: PMID:2162465
        supporting_text: >-
          The fhuE gene of Escherichia coli codes for an outer-membrane receptor protein
          required for the uptake of iron(III) via coprogen, ferrioxamine B and rhodotorulic acid

- term:
    id: GO:0016020
    label: membrane
  evidence_type: NAS
  original_reference_id: PMID:2162465
  review:
    summary: >-
      NAS annotation for the generic term "membrane" from ComplexPortal. FhuE is an integral
      outer membrane protein. The term GO:0016020 (membrane) is too generic when the more
      specific GO:0009279 (cell outer membrane) is already annotated with IDA evidence.
    action: MODIFY
    reason: >-
      The term "membrane" is too vague. FhuE is specifically localized to the cell outer
      membrane (GO:0009279), which is already annotated with IDA evidence (PMID:10806384).
      This annotation should be replaced with the more specific term.
    proposed_replacement_terms:
      - id: GO:0009279
        label: cell outer membrane

- term:
    id: GO:0009279
    label: cell outer membrane
  evidence_type: IDA
  original_reference_id: PMID:10806384
  review:
    summary: >-
      IDA annotation based on proteomic analysis of the E. coli outer membrane by Molloy et al.
      2000. FhuE was directly identified in the outer membrane fraction by 2D gel electrophoresis
      and mass spectrometry (PMID:10806384).
    action: ACCEPT
    reason: >-
      Direct experimental identification of FhuE in the outer membrane fraction by proteomics.
      This is strong IDA evidence for outer membrane localization.
    supported_by:
      - reference_id: PMID:10806384
        supporting_text: >-
          like the E. coli iron receptors FhuE and FhuA, the expression of YbiL is markedly
          increased by iron limitation

- term:
    id: GO:0015092
    label: high-affinity ferric iron transmembrane transporter activity
  evidence_type: IMP
  original_reference_id: PMID:31098021
  review:
    summary: >-
      IMP annotation based on Grinter & Lithgow 2019. FhuE binds Fe-coprogen with high affinity
      (Kd ~508 nM) and supports growth of the DELTA-TBDT strain on Fe-coprogen as the sole iron
      source (PMID:31098021). This demonstrates high-affinity ferric iron transport activity.
    action: ACCEPT
    reason: >-
      Well supported by binding assays (Kd ~508 nM for Fe-coprogen) and growth complementation
      in a strain dependent solely on FhuE for siderophore-iron import. The term appropriately
      captures the high-affinity nature of FhuE transport.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          giving dis­association constants of 508 ± 116 nM for Fe-coprogen and 30 ± 14 µM for Fe-rhodotorulic acid

- term:
    id: GO:0015343
    label: siderophore-iron transmembrane transporter activity
  evidence_type: IMP
  original_reference_id: PMID:31098021
  review:
    summary: >-
      IMP annotation based on Grinter & Lithgow 2019. FhuE transports Fe-coprogen,
      Fe-rhodotorulic acid, and ferrioxamine B across the outer membrane (PMID:31098021).
      This is directly demonstrated by growth complementation of ΔTBDT strain.
    action: ACCEPT
    reason: >-
      Experimentally validated by growth assays showing FhuE-dependent utilization of
      siderophore-iron complexes as sole iron source.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          Transforming the ΔTBDT strain with a plasmid to drive the expression of FhuE supported growth on media containing coprogen, rhodotorulic acid or ferrioxamine B as an iron source, but not those with ferrichrome or ferrioxamine E

- term:
    id: GO:0015687
    label: ferric-hydroxamate import into cell
  evidence_type: IMP
  original_reference_id: PMID:31098021
  review:
    summary: >-
      IMP annotation for ferric-hydroxamate import. FhuE specifically imports ferric
      hydroxamate siderophores (coprogen, rhodotorulic acid, ferrioxamine B) into the cell
      (PMID:31098021). This is the most specific biological process term that captures
      the core function of FhuE.
    action: ACCEPT
    reason: >-
      This is an accurate and specific annotation. FhuE imports ferric-hydroxamate
      siderophores, which is precisely what this GO term describes.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          FhuE is a transporter in Gram-negative bacteria that can import iron-loaded
          fungal coprogen

- term:
    id: GO:0042928
    label: ferrichrome import into cell
  evidence_type: IDA
  original_reference_id: PMID:31098021
  negated: true
  review:
    summary: >-
      NOT annotation. FhuE does NOT import ferrichrome. Grinter & Lithgow 2019 showed that
      FhuE cannot support growth on ferrichrome as an iron source, and the crystal structure
      reveals that the planar binding pocket cannot accommodate the nonplanar ferrichrome
      complex (PMID:31098021).
    action: ACCEPT
    reason: >-
      Important negative result. The selectivity filter of FhuE (particularly Arg142)
      excludes nonplanar cyclic siderophores like ferrichrome. Both functional and
      structural evidence support this NOT annotation.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          The planar nature of the FhuE binding pocket does not allow the coordination of the
          Fe-ferrichrome complex without significant clashes

- term:
    id: GO:0044718
    label: siderophore transmembrane transport
  evidence_type: IMP
  original_reference_id: PMID:31098021
  review:
    summary: >-
      IMP annotation for siderophore transmembrane transport. FhuE transports hydroxamate
      siderophores across the outer membrane. This is a broader process term that encompasses
      the more specific ferric-hydroxamate import annotation.
    action: ACCEPT
    reason: >-
      Correct and supported by experimental evidence. This broader term is acceptable
      alongside the more specific annotations.
    supported_by:
      - reference_id: PMID:31098021
        supporting_text: >-
          Taken together, these data show that while FhuE is capable of binding and
          transporting Fe-coprogen, Fe-rhodotorulic acid and ferrioxamine B, there is a
          large difference in substrate affinity and transport efficiency

- term:
    id: GO:0072711
    label: cellular response to hydroxyurea
  evidence_type: IEP
  original_reference_id: PMID:20005847
  review:
    summary: >-
      IEP annotation based on expression data from Davies et al. 2009. fhuE was among
      many iron uptake genes upregulated during hydroxyurea stress, as part of a broad
      Fur-regulated iron uptake response. This is an expression-based annotation reflecting
      transcriptional induction rather than a direct functional role in hydroxyurea response.
    action: KEEP_AS_NON_CORE
    reason: >-
      FhuE expression is induced by hydroxyurea as part of a general iron uptake response,
      not because FhuE has a specific role in hydroxyurea response. The upregulation of iron
      uptake genes (including fhuE) under HU stress contributes to hydroxyl radical-mediated
      cell death via Fenton chemistry. This is a peripheral/downstream effect, not a core
      function of FhuE.
    supported_by:
      - reference_id: PMID:20005847
        supporting_text: >-
          Continued HU stress activates iron uptake and toxins MazF and RelE, whose activity
          causes the synthesis of incompletely translated proteins and stimulation of envelope
          stress responses

