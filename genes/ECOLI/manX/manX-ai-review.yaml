- term:
    id: GO:0008982
    label: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for phosphohistidine-sugar phosphotransferase activity from InterPro domain
