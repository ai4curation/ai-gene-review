  label: ECOLI
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for Skp (ECOLI). 7 GO terms extracted from HF
  protein_catalogue. Skp is a homotrimeric periplasmic chaperone (NOT cytoplasmic)
  that escorts unfolded outer membrane beta-barrel proteins (OMPs) from the Sec
  translocon across the periplasm to the BAM complex for outer membrane insertion.
  The RL model had a fundamental localization error (cytoplasmic). The SFT model
  correctly predicts periplasmic localization (GO:0030288, CNN). Outer membrane
  assembly is CNN. Identical protein binding is CNN (homotrimer). Protein stabilization
  is CNN. Chaperone-mediated protein folding is NPI -- Skp is a holdase/carrier,
  not a foldase; folding occurs after Skp releases the OMP at the BAM complex.
  Response to stress is LSP. Protein insertion into membrane is UNC.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0042802
    label: identical protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Skp forms a stable homotrimer (jellyfish-like architecture with alpha-helical
      tentacles from a beta-barrel body, PMID:15304217). Identical protein binding
      (homotrimerization) is already annotated in the curated GOA (IPI,
      PMID:16858726) and accepted in the curated review. The prediction is correct
      but not novel.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0061077
    label: chaperone-mediated protein folding
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: MULTIPLE_FUNCTIONS
    summary: >-
      Skp is an ATP-independent holdase/carrier chaperone that maintains OMPs in
      an unfolded state during periplasmic transit (PMID:19181847). Folding of the
      OMP beta-barrel does NOT occur while the OMP is bound to Skp; it only folds
      after release at the BAM complex, assisted by LPS (PMID:12509434). The
      curated review annotates Skp's core BP as protein stabilization (GO:0050821)
      and outer membrane assembly (GO:0043165). GO:0061077 (chaperone-mediated
      protein folding) is specifically not annotated for Skp because Skp is a
      holdase, not a foldase. The OmpA beta-barrel is maintained in an unfolded
      state while bound to Skp (PMID:19181847). This prediction incorrectly
      classifies Skp as a foldase.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0050821
    label: protein stabilization
  predicted_term_type: GO_BP
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Skp prevents aggregation of unfolded OMP intermediates in the periplasm.
      In skp/degP double mutants, protein aggregates accumulate in the periplasm
      (PMID:10455120). GO:0050821 (protein stabilization) is already annotated
      (IBA, GO_REF:0000033) and accepted in the curated review as a core function.
      The prediction is correct but not novel.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051205
    label: protein insertion into membrane
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      Skp escorts OMPs to the BAM complex for outer membrane insertion, so it
      participates indirectly in OMP insertion into the outer membrane. However,
      Skp itself does not catalyze membrane insertion -- it releases the OMP to
      the BAM complex and LPS is required for the actual insertion step (PMID:12509434).
      The curated review annotates the biological process as outer membrane assembly
      (GO:0043165) rather than protein insertion into membrane. UNC because there
      is a legitimate indirect connection, but the term may overstate Skp's role
      in the insertion step itself.
