    id: GO:0006950
    label: response to stress
  predicted_term_type: GO_BP
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Skp is induced by and participates in the envelope stress response. skp
      expression increases under conditions that perturb the outer membrane. The
      curated GOA includes GO:0006950 (response to stress, IEA, GO_REF:0000117).
      The prediction is correct but extremely generic -- GO:0006950 is the broadest
      possible stress response term. More specific terms such as GO:0009408
      (response to heat) or envelope stress response terms would be more
      informative. LSP because the annotation is correct but not precise enough
      to add biological value.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
