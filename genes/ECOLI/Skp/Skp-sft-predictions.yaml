status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for Skp (ECOLI). 7 GO terms extracted from HF
  protein_catalogue. Skp is a homotrimeric periplasmic chaperone (NOT cytoplasmic)
  that escorts unfolded outer membrane beta-barrel proteins (OMPs) from the Sec
  translocon across the periplasm to the BAM complex for outer membrane insertion.
  The RL model had a fundamental localization error (cytoplasmic). The SFT model
  correctly predicts periplasmic localization (GO:0030288, CNN). Outer membrane
  assembly is CNN. Identical protein binding is CNN (homotrimer). Protein stabilization
  is CNN. Chaperone-mediated protein folding is NPI -- Skp is a holdase/carrier,
  not a foldase; folding occurs after Skp releases the OMP at the BAM complex.
  Response to stress is LSP. Protein insertion into membrane is UNC.
references:
