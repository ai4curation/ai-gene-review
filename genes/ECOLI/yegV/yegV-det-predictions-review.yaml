id: P76419
gene_symbol: yegV
locus_tag: b2100
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  YegV DeepECTF prediction review. The DeepECTF prediction of dehydro-2-deoxygluconokinase
  (EC 2.7.1.92) is a paralog overannotation error. YegV is correctly identified as a sugar
  kinase (first 3 EC digits correct) but the specific substrate assignment is wrong - that
  activity belongs to KdgK/b3526. YegV's substrate specificity remains unknown.
references:
  - id: PMID:37963869
    title: Functional annotation of enzyme-encoding genes using deep learning with transformer layers
  - id: PMID:40703034
    title: Limitations of current ML models in predicting enzymatic functions (de Crécy-Lagard et al. 2025)
source_documents:
  - genes/ECOLI/yegV/yegV-ai-review.yaml
  - genes/ECOLI/yegV/yegV-uniprot.txt
  - genes/ECOLI/yegV/yegV-goa.tsv
  - genes/ECOLI/yegV/yegV-deep-research-falcon.md
predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:2.7.1.92
      label: dehydro-2-deoxygluconokinase
    predicted_term_type: EC
    review:
      assessment: PLI
      confidence_score: 0
      error_type: PARALOG_OVERANNOTATION
      summary: >-
        The EC:2.7.1.92 prediction is incorrect at the substrate-specific fourth
        EC digit. The allowed evidence supports YegV as a PfkB/ribokinase-family
        carbohydrate kinase or uncharacterized sugar kinase, but not as the specific
        dehydro-2-deoxygluconokinase. De Crécy-Lagard et al. report that DeepECTF
        correctly captured the first three EC digits (2.7.1) while wrongly assigning
        the specific substrate from a nonisofunctional paralog; the actual
        dehydro-2-deoxygluconokinase in E. coli is KdgK/b3526. The local GO review
        therefore proposes the more appropriate broad term GO:0019200 carbohydrate
        kinase activity. This is PLI because the wrong specific activity arose from
        propagation across paralogous sugar-kinase subfamilies.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            b2100 was annotated as a dehydro-2-deoxygluconokinase (EC 2.7.1.92)
            using DeepECTF and as an uncharacterized sugar kinase YegV (EC 2.7.1.-)
            in UniProt.
        - reference_id: PMID:40703034
          supporting_text: >-
            The dehydro-2-deoxygluconokinase (EC 2.7.1.92) activity is encoded by
            another member of this superfamily KdgK/b3526. Here, DeepECTF predicted
            correctly the first 3 digits of the EC number but not the last, making
            an overpropagation mistake.
        - reference_id: file:ECOLI/yegV/yegV-uniprot.txt
          supporting_text: >-
            UniProt names YegV as an uncharacterized sugar kinase with EC:2.7.1.-,
            not EC:2.7.1.92.
