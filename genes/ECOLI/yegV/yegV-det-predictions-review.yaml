  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YegV (P76419). The model
  predicts 5-dehydro-2-deoxygluconokinase activity (EC 2.7.1.92). YegV is an
  uncharacterized PfkB/ribokinase-like carbohydrate kinase, so the family-level call
  (ATP-dependent sugar kinase, EC 2.7.1.-) is reasonable, but the specific substrate
  assignment is not supported by any experimental evidence: YegV has no demonstrated
  substrate, product or kinetics. The predicted substrate (5-dehydro-2-deoxygluconate)
  is a myo-inositol catabolism intermediate, and E. coli K-12 lacks the iol inositol
  degradation pathway, while the gene's own context (the ADP-glucose-responsive
  yegTUV operon linked to glycogen) points toward a different, storage-carbon-related
  substrate. The prediction can therefore be neither validated nor refuted from the
  allowed evidence and is judged uncertain, with the specific substrate considered
  biologically unlikely.
