    - statement: >-
        Unusually, FhuD binding decreases the ATPase activity of FhuCB, deviating from
        the standard model of type II ABC importers.
      supporting_text: >-
        in the case of Fhu importer, upon FhuD binding, its ATPase activity was apparently
        decreased as the Vmax dropped more than five times
    - statement: >-
        55Fe-ferrichrome transport was directly measured in proteoliposomes with an initial
        rate of ~7.5 nmol/mg/min.
      supporting_text: >-
        The transport activity of the right-side-out FhuCB was quantified by liquid
