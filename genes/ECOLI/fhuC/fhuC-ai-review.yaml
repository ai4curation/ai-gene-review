id: P07821
gene_symbol: fhuC
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  FhuC is the cytoplasmic ATP-binding protein (nucleotide-binding domain, NBD) of the FhuCDB
  ABC transporter complex responsible for the import of iron(3+)-hydroxamate siderophores
  (including ferrichrome, aerobactin, and coprogen) across the inner membrane of E. coli K-12.
  FhuC contains canonical Walker A and Walker B ATP-binding motifs and provides the energy for
  substrate translocation via ATP hydrolysis (EC 7.2.2.16). Two copies of FhuC associate with
  a single transmembrane permease subunit FhuB, along with the periplasmic substrate-binding
  protein FhuD. FhuC is a peripheral membrane protein that associates with the cytoplasmic face
  of the inner membrane via interaction with FhuB. Mutagenesis of the conserved Walker A Lys-50
  and Walker B Asp-172 residues abolishes transport activity. A cryo-EM structure at 3.4 A
  resolution (PDB 7LB8) confirmed the type II ABC importer architecture with two FhuC subunits
  on the cytoplasmic side. Unusually, FhuD binding decreases rather than stimulates the ATPase
  activity of FhuCB. The gene is part of the fhuACDB operon and is regulated by iron
  availability via the Fur repressor.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for plasma membrane localization. FhuC is a peripheral membrane protein
      that associates with the cytoplasmic face of the inner membrane (plasma membrane) via
      its interaction with FhuB (PMID:1551849). This is consistent with experimental IDA
      evidence from the same gene.
    action: ACCEPT
    reason: >-
      Correct localization. FhuC associates with the cytoplasmic membrane through its
      interaction with FhuB, as demonstrated by immunoelectron microscopy (PMID:1551849).
      The IBA annotation is phylogenetically sound and experimentally corroborated.
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          Interaction between the two proteins was demonstrated by immunoelectron microscopy
          with anti-FhuC antibodies, which showed FhuB-mediated association of FhuC with
          the cytoplasmic membrane

- term:
    id: GO:0015344
    label: siderophore uptake transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for siderophore uptake transmembrane transporter activity. FhuC is the
      ATPase component of the FhuCDB transporter that imports hydroxamate-type siderophores
      including ferrichrome, aerobactin, and coprogen (PMID:1830209, PMID:9613584). This is
      a well-supported core molecular function.
    action: ACCEPT
    reason: >-
      Accurate annotation at an appropriate level of generality. FhuC provides energy for
      the import of multiple hydroxamate siderophores. This is supported by experimental
      data (PMID:9613584) and structural studies (PMID:34887516).
    supported_by:
      - reference_id: PMID:9613584
        supporting_text: >-
          The Escherichia coli fhu operon, composed of the fhuA, C, D, and B genes, is
          essential for the utilization of ferric siderophores of the hydroxamate type
          and for the uptake of the antibiotic albomycin
      - reference_id: PMID:1830209
        supporting_text: >-
          Transport of iron(III) hydroxamates across the inner membrane into the cytoplasm
          of Escherichia coli is mediated by the FhuC, FhuD and FhuB proteins

- term:
    id: GO:0015687
    label: ferric-hydroxamate import into cell
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ferric-hydroxamate import into cell. FhuC is an essential component
      of the FhuCDB ABC transporter that catalyzes iron(III) hydroxamate import across the
      inner membrane (PMID:1551849, PMID:9613584). This is the core biological process for
      this gene.
    action: ACCEPT
    reason: >-
      Core biological process. FhuC provides the ATP hydrolysis energy required for
      ferric-hydroxamate import. Experimentally demonstrated by multiple studies
      (PMID:1551849, PMID:9613584, PMID:34887516).
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          Iron(III) hydroxamate transport across the cytoplasmic membrane is catalyzed by
          the very hydrophobic FhuB protein and the membrane-associated FhuC protein,
          which contains typical ATP-binding domains
      - reference_id: PMID:9613584
        supporting_text: >-
          The Escherichia coli fhu operon, composed of the fhuA, C, D, and B genes, is
          essential for the utilization of ferric siderophores of the hydroxamate type

- term:
    id: GO:0071281
    label: cellular response to iron ion
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for cellular response to iron ion. The fhu operon is regulated by iron
      availability via the Fur repressor, and FhuC expression is induced under iron-limiting
      conditions. However, FhuC itself is a transport component rather than a regulatory
      sensor of iron. This annotation captures the broader regulatory context in which
      fhuC participates.
    action: KEEP_AS_NON_CORE
    reason: >-
      While FhuC expression is part of the cellular response to iron ion status (the fhu
      operon is Fur-regulated), FhuC itself does not directly sense or respond to iron ions.
      Rather it is a downstream effector of iron acquisition. Keeping as non-core since
      this is more about regulation of the gene than the protein's molecular activity.

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for ATP binding based on InterPro domain mapping (IPR003439, IPR017871).
      FhuC contains canonical Walker A and Walker B motifs for ATP binding, confirmed by
      sequence analysis (PMID:2823072) and mutagenesis of key residues K50 and D172
      (PMID:1551849). The cryo-EM structure (PDB 7LB8) also confirms the ATP-binding
      architecture with a Hill coefficient of ~1.97 indicating cooperativity between
      two binding sites (PMID:34887516).
    action: ACCEPT
    reason: >-
      Correct and well-supported. ATP binding is a fundamental property of FhuC demonstrated
      by sequence homology, mutagenesis, and structural data. The IEA mapping from InterPro
      is accurate. This is duplicated by ISM annotations below but that is fine.
    supported_by:
      - reference_id: PMID:2823072
        supporting_text: >-
          Segments of the FhuC protein display strong homology to ATP-binding proteins,
          suggesting a function in Fe3+ uptake similar to the ATP-binding proteins of
          transport systems that depend on periplasmic proteins

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation for plasma membrane localization based on UniProt subcellular location
      mapping. Consistent with IDA and IBA annotations for the same term and supported by
      experimental evidence (PMID:1551849).
    action: ACCEPT
    reason: >-
      Correct. This IEA mapping from UniProt subcellular location vocabulary is consistent
      with experimental evidence showing FhuC associates with the cytoplasmic membrane
      via FhuB (PMID:1551849).

- term:
    id: GO:0015625
    label: ABC-type ferric hydroxamate transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  review:
    summary: >-
      IEA annotation for ABC-type ferric hydroxamate transporter activity based on EC number
      mapping (EC 7.2.2.16). This is the most specific and accurate molecular function term
      for FhuC, directly reflecting its catalytic activity as part of the FhuCDB complex
      (PMID:1551849, PMID:34887516).
    action: ACCEPT
    reason: >-
      Correct and highly informative annotation. The EC number 7.2.2.16 directly maps to
      this GO term. FhuC is the ATPase subunit of the ABC-type ferric hydroxamate transporter,
      confirmed by enzymatic assays (PMID:34887516) and functional studies (PMID:1551849).

- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation for ATP hydrolysis activity based on InterPro domain mapping. FhuC
      hydrolyzes ATP to provide energy for substrate translocation. ATPase activity was
      directly measured with Vmax of ~745 nmol/mg/min for FhuCB complex (PMID:34887516).
      The E173A Walker-B mutant abolished ATPase activity, confirming intrinsic hydrolysis
      activity.
    action: ACCEPT
    reason: >-
      Correct. FhuC has demonstrable ATPase activity that is essential for its transporter
      function. Directly measured in proteoliposome assays (PMID:34887516). This is a
      broader parent of the more specific transporter activity but is still correct.
    supported_by:
      - reference_id: PMID:34887516
        supporting_text: >-
          the ATPase null-mutant (E173A, in the Walker-B domain of FhuC) was used as a
          negative control as it had no detectable activity

- term:
    id: GO:0098711
    label: iron ion import across plasma membrane
  evidence_type: NAS
  original_reference_id: PMID:1551849
  review:
    summary: >-
      NAS annotation for iron ion import across plasma membrane. FhuC is part of the FhuCDB
      complex that imports iron(III) chelated to hydroxamate siderophores across the inner
      membrane (PMID:1551849). While the iron is imported as a ferric-siderophore complex
      rather than as free iron ions, this annotation captures the biological outcome at a
      more general level.
    action: ACCEPT
    reason: >-
      Acceptable as a broader biological process annotation. The ultimate biological function
      of the FhuCDB system is to bring iron into the cell. While the substrate is technically
      a ferric-hydroxamate complex, iron ion import is the biological goal. The NAS evidence
      code appropriately reflects indirect support from the literature.
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          Iron(III) hydroxamate transport across the cytoplasmic membrane is catalyzed by
          the very hydrophobic FhuB protein and the membrane-associated FhuC protein

- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IDA
  original_reference_id: PMID:1551849
  review:
    summary: >-
      IDA annotation for plasma membrane localization based on immunoelectron microscopy
      showing FhuB-mediated association of FhuC with the cytoplasmic membrane (PMID:1551849).
      FhuC is a peripheral membrane protein on the cytoplasmic face.
    action: ACCEPT
    reason: >-
      Well-supported by direct experimental evidence. Immunoelectron microscopy with anti-FhuC
      antibodies demonstrated that FhuC associates with the cytoplasmic membrane through
      its interaction with FhuB (PMID:1551849).
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          Interaction between the two proteins was demonstrated by immunoelectron microscopy
          with anti-FhuC antibodies, which showed FhuB-mediated association of FhuC with
          the cytoplasmic membrane

- term:
    id: GO:0015091
    label: ferric iron transmembrane transporter activity
  evidence_type: IDA
  original_reference_id: PMID:1551849
  review:
    summary: >-
      IDA annotation for ferric iron transmembrane transporter activity. FhuC is the ATPase
      of the FhuCDB complex that transports ferric iron chelated to hydroxamate siderophores
      across the inner membrane (PMID:1551849). This term is broader than the more specific
      GO:0015625 (ABC-type ferric hydroxamate transporter activity), but is still accurate
      since the substrate contains ferric iron.
    action: ACCEPT
    reason: >-
      Correct at this level of generality. FhuC is part of a transporter that moves ferric
      iron (as hydroxamate complexes) across the membrane. The more specific GO:0015625 is
      also annotated, so this broader annotation provides appropriate coverage. Supported
      by functional studies (PMID:1551849).
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          Iron(III) hydroxamate transport across the cytoplasmic membrane is catalyzed by
          the very hydrophobic FhuB protein and the membrane-associated FhuC protein,
          which contains typical ATP-binding domains

- term:
    id: GO:0015091
    label: ferric iron transmembrane transporter activity
  evidence_type: IDA
  original_reference_id: PMID:34887516
  review:
    summary: >-
      IDA annotation for ferric iron transmembrane transporter activity based on the cryo-EM
      structural and functional characterization of FhuCDB (PMID:34887516). Transport of
      55Fe-ferrichrome was directly demonstrated in proteoliposome assays with an initial
      rate of ~7.5 nmol/mg/min.
    action: ACCEPT
    reason: >-
      Correct and well-supported. Direct transport of 55Fe-ferrichrome was measured in
      reconstituted proteoliposomes, demonstrating ferric iron transmembrane transporter
      activity (PMID:34887516). Consistent with the IDA annotation from PMID:1551849.
    supported_by:
      - reference_id: PMID:34887516
        supporting_text: >-
          The transport activity of the right-side-out FhuCB was quantified by liquid
          scintillation counting as 55Fe-ferrichrome was used as the substrate

- term:
    id: GO:0015625
    label: ABC-type ferric hydroxamate transporter activity
  evidence_type: IDA
  original_reference_id: PMID:1551849
  review:
    summary: >-
      IDA annotation for ABC-type ferric hydroxamate transporter activity. FhuC is the
      ATP-binding component of the FhuCDB ABC transporter that catalyzes iron(III) hydroxamate
      transport. Functional studies demonstrated that FhuC with intact ATP-binding domains
      is essential for transport, and mutations in the Walker A (K50Q) and Walker B (D172E)
      motifs abolish activity (PMID:1551849).
    action: ACCEPT
    reason: >-
      This is the most precise molecular function annotation for FhuC and is directly
      supported by experimental evidence. Mutagenesis of the conserved ATP-binding residues
      K50 and D172 abolished transport, confirming FhuC's role as the ATPase of the
      ferric hydroxamate transporter (PMID:1551849).
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          inactive FhuC derivatives carrying single amino acid replacements in the
          ATP-binding domains suppressed wild-type FhuC transport activity

- term:
    id: GO:0015625
    label: ABC-type ferric hydroxamate transporter activity
  evidence_type: IDA
  original_reference_id: PMID:34887516
  review:
    summary: >-
      IDA annotation for ABC-type ferric hydroxamate transporter activity based on cryo-EM
      structure and functional characterization. The study determined the 3.4 A cryo-EM
      structure of FhuCDB and demonstrated ATPase activity (Vmax ~745 nmol/mg/min) and
      55Fe-ferrichrome transport in proteoliposomes (PMID:34887516).
    action: ACCEPT
    reason: >-
      Well-supported by comprehensive structural and functional characterization. Both
      ATPase activity and substrate transport were directly measured in the reconstituted
      system (PMID:34887516). The E173A Walker-B mutant served as a negative control with
      no detectable activity.
    supported_by:
      - reference_id: PMID:34887516
        supporting_text: >-
          we functionally characterized the ferrichrome, a hydroxamate-type siderophore
          molecule, importer FhuCDB complex from E. coli and determined its structure
          at 3.4 Å resolution by single-particle cryo-electron microscopy (cryo-EM)

- term:
    id: GO:0055052
    label: ATP-binding cassette (ABC) transporter complex, substrate-binding subunit-containing
  evidence_type: IDA
  original_reference_id: PMID:1551849
  review:
    summary: >-
      IDA annotation for localization to an ABC transporter complex with substrate-binding
      subunit. The FhuCDB complex includes FhuD as the periplasmic substrate-binding protein,
      FhuB as the transmembrane permease, and two copies of FhuC as the ATPase. FhuC interacts
      directly with FhuB, demonstrated by immunoelectron microscopy (PMID:1551849).
    action: ACCEPT
    reason: >-
      Correct cellular component annotation. The FhuCDB complex is an ABC transporter that
      includes the substrate-binding protein FhuD. The physical interaction between FhuC and
      FhuB was demonstrated experimentally (PMID:1551849).
    supported_by:
      - reference_id: PMID:1551849
        supporting_text: >-
          the physical interaction between FhuC and FhuB implies a coordinate activity
          of both proteins in the transport of iron(III) hydroxamates through the
          cytoplasmic membrane

- term:
    id: GO:0055052
    label: ATP-binding cassette (ABC) transporter complex, substrate-binding subunit-containing
  evidence_type: IDA
  original_reference_id: PMID:34887516
  review:
    summary: >-
      IDA annotation for localization to an ABC transporter complex with substrate-binding
      subunit, based on the cryo-EM structure showing two FhuC subunits on the cytoplasmic
      side of the complex, one FhuB in the membrane, and one FhuD on the periplasmic side
      (PMID:34887516).
    action: ACCEPT
    reason: >-
      Correct and directly supported by structural data. The cryo-EM structure at 3.4 A
      resolution shows FhuC as part of the FhuCDB complex with clear density for all
      subunits including the substrate-binding protein FhuD (PMID:34887516).
    supported_by:
      - reference_id: PMID:34887516
        supporting_text: >-
          The overall size of the complex was ~130 × 100 × 80 Å3, with one FhuD on the
          periplasmic side, one FhuB in the membrane, and two FhuC on the cytosolic side

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: ISM
  original_reference_id: PMID:2823072
  review:
    summary: >-
      ISM annotation for ATP binding based on sequence motif analysis. Burkhardt and Braun
      (PMID:2823072) identified domains in FhuC homologous to ATP-binding proteins through
      nucleotide sequence analysis, including Walker A and Walker B motifs.
    action: ACCEPT
    reason: >-
      Correct. The original sequence analysis identified ATP-binding domains in FhuC by
      homology to known ATP-binding proteins (PMID:2823072). This has been subsequently
      confirmed by mutagenesis (PMID:1551849) and structural data (PMID:34887516).
    supported_by:
      - reference_id: PMID:2823072
        supporting_text: >-
          Segments of the FhuC protein display strong homology to ATP-binding proteins,
          suggesting a function in Fe3+ uptake similar to the ATP-binding proteins of
          transport systems that depend on periplasmic proteins

- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: ISM
  original_reference_id: PMID:9593292
  review:
    summary: >-
      ISM annotation for ATP binding based on the comprehensive survey of E. coli ABC
      proteins by Linton and Higgins (PMID:9593292). FhuC was identified as one of 79
      ABC proteins in the E. coli genome, with its ABC domain recognized as the
      energy-generating domain of the ferric hydroxamate importer.
    action: ACCEPT
    reason: >-
      Correct. The genome-wide analysis classified FhuC among the ABC protein superfamily
      members containing nucleotide-binding domains (PMID:9593292). Consistent with all
      other ATP binding annotations.
    supported_by:
      - reference_id: PMID:9593292
        supporting_text: >-
          A total of 79 ABC proteins makes this the largest paralogous family of proteins
          in E. coli

- term:
    id: GO:0015344
    label: siderophore uptake transmembrane transporter activity
  evidence_type: EXP
  original_reference_id: PMID:9613584
  review:
    summary: >-
      EXP annotation for siderophore uptake transmembrane transporter activity based on
      the study by Mademidis and Koster (PMID:9613584). Using a polar-effect-free cassette
      system, they demonstrated that FhuC is essential for ferric siderophore uptake and
      that the stoichiometry of components is important for proper function.
    action: ACCEPT
    reason: >-
      Well-supported core molecular function. The experimental system directly tested the
      transport activity of FhuC derivatives in a background free of polar effects, confirming
      FhuC's role in siderophore uptake (PMID:9613584).
    supported_by:
      - reference_id: PMID:9613584
        supporting_text: >-
          The fhu cassette operon expressed in a chromosomal fhu deletion mutant enabled
          us to evaluate the transport activity of mutated FhuA, FhuC, FhuD or FhuB
          derivatives

- term:
    id: GO:0015687
    label: ferric-hydroxamate import into cell
  evidence_type: EXP
  original_reference_id: PMID:9613584
  review:
    summary: >-
      EXP annotation for ferric-hydroxamate import into cell based on the study demonstrating
      FhuC's role in the uptake system using a polar-effect-free expression system
      (PMID:9613584). Transport across the cytoplasmic membrane via FhuC, FhuD, and FhuB
      was shown to not be rate-limiting compared to outer membrane transport.
    action: ACCEPT
    reason: >-
      Core biological process directly supported by experimental evidence. The study confirmed
      that FhuC is essential for iron(III) hydroxamate import and that cytoplasmic membrane
      transport (via FhuCDB) functions efficiently in vivo (PMID:9613584).
    supported_by:
      - reference_id: PMID:9613584
        supporting_text: >-
          transport across the outer membrane (via FhuA, TonB, ExbB, D) rather than
          transport across the cytoplasmic membrane (via FhuC, D, B) was rate limiting

- term:
    id: GO:0043190
    label: ATP-binding cassette (ABC) transporter complex
  evidence_type: TAS
  original_reference_id: PMID:1830209
  review:
    summary: >-
      TAS annotation for localization to an ABC transporter complex. Koster (PMID:1830209)
      described the FhuCDB system as a periplasmic-binding-protein-dependent transport
      mechanism, characteristic of ABC transporters. FhuC, FhuD, and FhuB together form
      the inner membrane transporter complex.
    action: ACCEPT
    reason: >-
      Correct cellular component annotation. The review by Koster comprehensively described
      the FhuCDB system architecture (PMID:1830209). GO:0043190 is the parent of GO:0055052
      which is also annotated with IDA evidence; both are appropriate at their respective
      levels of specificity.
    supported_by:
      - reference_id: PMID:1830209
        supporting_text: >-
          Transport of iron(III) hydroxamates across the inner membrane into the cytoplasm
          of Escherichia coli is mediated by the FhuC, FhuD and FhuB proteins and displays
          characteristics typical of a periplasmic-binding-protein-dependent transport
          mechanism

references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
    - statement: >-
        InterPro domains IPR003439 (ABC transporter-like ATP-binding) and IPR017871
        (ABC transporter-like CS) map to ATP binding and ATP hydrolysis activity GO terms.
      supporting_text: >-
        InterPro domain matching correctly identifies FhuC as an ABC transporter ATPase
        component.
- id: GO_REF:0000003
  title: Gene Ontology annotation based on Enzyme Commission mapping
  findings:
    - statement: >-
        EC 7.2.2.16 maps to GO:0015625 ABC-type ferric hydroxamate transporter activity,
        which is the most specific molecular function term for FhuC.
      supporting_text: >-
        EC number mapping provides the most precise functional annotation for FhuC.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
    - statement: >-
        PANTHER-based phylogenetic inference supports plasma membrane localization,
        siderophore uptake transporter activity, ferric-hydroxamate import, and cellular
        response to iron ion annotations.
      supporting_text: >-
        IBA annotations are consistent with experimentally verified functions and
        appropriate at the phylogenetic level.
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary
    mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
    - statement: >-
        UniProt subcellular location annotation for cell inner membrane correctly maps
        to GO:0005886 plasma membrane.
      supporting_text: >-
        Mapping from UniProt subcellular location vocabulary is consistent with
        experimental evidence.
- id: PMID:1551849
  title: >-
    Iron(III) hydroxamate transport in Escherichia coli K-12: FhuB-mediated membrane
    association of the FhuC protein and negative complementation of fhuC mutants.
  findings:
    - statement: >-
        FhuC associates with the cytoplasmic membrane through interaction with FhuB,
        demonstrated by immunoelectron microscopy.
      supporting_text: >-
        Interaction between the two proteins was demonstrated by immunoelectron microscopy
        with anti-FhuC antibodies, which showed FhuB-mediated association of FhuC with
        the cytoplasmic membrane
    - statement: >-
        Mutations in the ATP-binding domains of FhuC (K50Q, D172E) abolish transport
        activity and can dominantly suppress wild-type FhuC function.
      supporting_text: >-
        inactive FhuC derivatives carrying single amino acid replacements in the
        ATP-binding domains suppressed wild-type FhuC transport activity
    - statement: >-
        FhuC and FhuB physically interact and coordinate transport of iron(III)
        hydroxamates across the cytoplasmic membrane.
      supporting_text: >-
        the physical interaction between FhuC and FhuB implies a coordinate activity
        of both proteins in the transport of iron(III) hydroxamates through the
        cytoplasmic membrane
- id: PMID:1830209
  title: >-
    Iron(III) hydroxamate transport across the cytoplasmic membrane of Escherichia coli.
  findings:
    - statement: >-
        The FhuCDB system is a periplasmic-binding-protein-dependent ABC transporter that
        imports at least six different hydroxamate-type siderophores and the antibiotic
        albomycin.
      supporting_text: >-
        Transport of iron(III) hydroxamates across the inner membrane into the cytoplasm
        of Escherichia coli is mediated by the FhuC, FhuD and FhuB proteins and displays
        characteristics typical of a periplasmic-binding-protein-dependent transport
        mechanism
    - statement: >-
        Multiple hydroxamate siderophores and albomycin serve as substrates of the FhuCDB
        transporter, in contrast to the highly specific outer membrane receptors.
      supporting_text: >-
        In contrast to the highly specific receptor proteins in the outer membrane, at
        least six different siderophores of the hydroxamate type and the antibiotic
        albomycin are accepted as substrates
- id: PMID:2823072
  title: >-
    Nucleotide sequence of the fhuC and fhuD genes involved in iron (III) hydroxamate
    transport: domains in FhuC homologous to ATP-binding proteins.
  findings:
    - statement: >-
        FhuC is a 29.3 kDa protein with domains strongly homologous to ATP-binding
        proteins of periplasmic-binding-protein-dependent transport systems.
      supporting_text: >-
        Segments of the FhuC protein display strong homology to ATP-binding proteins,
        suggesting a function in Fe3+ uptake similar to the ATP-binding proteins of
        transport systems that depend on periplasmic proteins
    - statement: >-
        The fhu operon consists of four genes fhuA fhuC fhuD fhuB in that order on the
        E. coli chromosome.
      supporting_text: >-
        This study completes the nucleotide sequence of the fhu operon which consists
        of the four genes fhuA fhuC fhuD fhuB arranged in this order on the E. coli
        chromosome and transcribed from fhuA to fhuB
- id: PMID:34887516
  title: >-
    Cryo-EM reveals unique structural features of the FhuCDB Escherichia coli
    ferrichrome importer.
  findings:
    - statement: >-
        The FhuCDB complex structure at 3.4 A resolution shows two FhuC subunits on the
        cytoplasmic side, one FhuB in the membrane, and one FhuD on the periplasmic side,
        in an inward-open conformation.
      supporting_text: >-
        The overall size of the complex was ~130 × 100 × 80 Å3, with one FhuD on the
        periplasmic side, one FhuB in the membrane, and two FhuC on the cytosolic side
    - statement: >-
        FhuCB has measurable ATPase activity with Vmax ~745 nmol/mg/min and Km ~0.69 mM
        for ATP, with strong cooperativity (Hill coefficient ~1.97) between the two
        ATP binding sites.
      supporting_text: >-
        the data were fit using an expanded version of the Michaelis–Menten equation with
        Hill coefficient, which yielded the following kinetic constants: Vmax of ~745 ± 31
        nmol/mg/min, Km of ~0.69 ± 0.08 mM, and Hill coefficient of ~1.97 ± 0.08
    - statement: >-
        The E173A Walker-B mutant of FhuC completely abolishes ATPase activity.
      supporting_text: >-
        the ATPase null-mutant (E173A, in the Walker-B domain of FhuC) was used as a
