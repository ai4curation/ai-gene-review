- id: PMID:9613584
  title: >-
    Transport activity of FhuA, FhuC, FhuD, and FhuB derivatives in a system free of
    polar effects, and stoichiometry of components involved in ferrichrome uptake.
  findings:
    - statement: >-
        A polar-effect-free cassette system confirmed that FhuC is essential for
        ferric siderophore utilization, and that stoichiometry of components matters
        for proper function.
      supporting_text: >-
        The fhu cassette operon expressed in a chromosomal fhu deletion mutant enabled
        us to evaluate the transport activity of mutated FhuA, FhuC, FhuD or FhuB
        derivatives
    - statement: >-
        Inner membrane transport (via FhuCDB) is not rate-limiting; outer membrane
        transport (via FhuA/TonB) is the rate-limiting step.
      supporting_text: >-
        transport across the outer membrane (via FhuA, TonB, ExbB, D) rather than
        transport across the cytoplasmic membrane (via FhuC, D, B) was rate limiting

core_functions:
  - description: >-
      FhuC is the ATP-binding (ATPase) subunit of the FhuCDB ABC transporter complex
      that catalyzes the import of ferric hydroxamate siderophores across the inner
      membrane. Assigned EC 7.2.2.16. ATPase activity directly measured with Vmax
      ~745 nmol/mg/min (PMID:34887516). Mutagenesis of Walker A (K50Q) and Walker B
      (D172E, E173A) residues abolishes activity (PMID:1551849, PMID:34887516).
      The transporter accepts at least six different hydroxamate-type siderophores and
      the antibiotic albomycin as substrates (PMID:1830209). Cryo-EM structure at 3.4 A
      confirms the type II ABC importer architecture with two FhuC subunits on the
      cytoplasmic side (PMID:34887516).
