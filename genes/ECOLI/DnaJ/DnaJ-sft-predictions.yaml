- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016032
    label: viral process
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      DnaJ participates in phage lambda replication -- the DnaK/DnaJ/GrpE system
      disassembles the lambda P protein from the preprimosomal complex to free
      DnaB helicase (PMID:1361234). This is an indirect role mediated by the
      chaperone activity. The GOA does not include a viral process annotation for
      DnaJ, and the curated review assigns this as KEEP_AS_NON_CORE under DNA
      replication (GO:0006260). GO:0016032 (viral process) is overly broad and
      does not capture the specific phage replication context. UNC because the
      phage replication role is real but the GO term is not precise enough to
      assess definitively.
