    summary: >-
      Protein-disulfide reductase activity is not a documented function of DnaJ.
      The curated review does not include this term and it is not in the GOA.
      DnaJ has a zinc finger domain with cysteines that coordinate structural zinc,
      not cysteines involved in disulfide reduction. The prediction likely reflects
      confusion with the cysteine-rich domain, misinterpreted as a reductase motif.
      This annotation is refuted by the curated evidence.
