description: >-
  BioReason-Pro SFT predictions for DnaJ (ECOLI). 13 GO terms extracted from HF
  protein_catalogue. DnaJ is an Hsp40-class J-domain co-chaperone for DnaK (Hsp70).
  Core functions: co-chaperone stimulating DnaK ATPase, unfolded protein capture and
  delivery to DnaK, zinc ion binding via cysteine-rich zinc finger domain, sigma32
  inactivation (sigma factor antagonist), and response to heat. Several predictions
  are CNN (already annotated). Protein-disulfide reductase activity (GO:0015035) is
  experimentally supported and retained as non-core, whereas the broader disulfide
  isomerase call is rejected. The viral process prediction is UNC. Membrane
  (GO:0016020) is NPI because DnaJ is cytoplasmic. The raw DNA-replication label uses
  GO:0006267, whose canonical meaning is eukaryotic nuclear pre-replicative-complex
  assembly; that malformed pair is NPI despite DnaJ's secondary bacterial
  replication-complex remodeling role.
