      annotation for DnaJ, and the curated review assigns this as KEEP_AS_NON_CORE under DNA replication
      (GO:0006260). GO:0016032 (viral process) is overly broad and does not capture the specific phage replication
      context. UNC because the phage replication role is real but the GO term is not precise enough to assess
      definitively.
