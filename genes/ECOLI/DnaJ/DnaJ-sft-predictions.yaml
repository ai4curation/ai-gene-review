    label: viral process
  predicted_term_type: GO_BP
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Current-snapshot audit reclassified UNC to CNN because the current AIGR contains a positive exact
      action (KEEP_AS_NON_CORE). This exact-join decision supersedes conflicting conclusions in the earlier
      rationale. Retained biological rationale. DnaJ participates in phage lambda replication -- the DnaK/DnaJ/GrpE
      system disassembles the lambda P protein from the preprimosomal complex to free DnaB helicase (PMID:1361234).
