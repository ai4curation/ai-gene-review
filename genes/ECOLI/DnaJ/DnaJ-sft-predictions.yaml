      DnaJ binds unfolded proteins through its C-terminal substrate-binding domain
      and delivers them to DnaK. GO:0051082 is already annotated (IBA, GO_REF:0000033).
      The curated review recommends modifying to GO:0044183 (protein folding chaperone)
      since DnaJ acts as co-chaperone, but the prediction is factually correct and
