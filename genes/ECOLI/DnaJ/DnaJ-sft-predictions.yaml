  predicted_term:
    id: GO:0003756
    label: protein disulfide isomerase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: CURATION_MISTAKE
    summary: >-
      DnaJ has a cysteine-rich zinc finger domain (residues 131-209) containing 8 cysteines that coordinate
      2 structural Zn(2+) ions. These cysteines are NOT involved in disulfide bond isomerization. Protein
      disulfide isomerase activity is a property of thioredoxin-fold proteins (e.g., DsbA, DsbC, PDI). DnaJ
      has thiol-disulfide oxidoreductase activity (PMID:12941935) mediated by zinc center interactions with
      substrates, but this is distinct from classical PDI activity. The DnaJ family InterPro annotation
      does not include PDI activity. This appears to be a misattribution from the zinc-finger cysteines
      being conflated with oxidoreductase cysteines. The curated review does not include this term. An independent
      OpenScientist investigation (see file reference) confirms this NPI and sharpens it: DnaJ's cysteine-rich-region
      cysteines form four CXXCXGXG motifs coordinating two structural Zn(II) ions (C4-type zinc fingers,
      shown by EXAFS), not a redox-active thioredoxin-fold CXXC; and the isomerase term is contradicted
      by its own source paper (Tang and Wang 2001, PMID:11732919), which found DnaJ has little, if any,
      isomerase activity. The BioReason prediction recapitulates a pre-existing legacy IDA over-annotation.
    supported_by:
    - reference_id: file:ECOLI/DnaJ/DnaJ-hypotheses/prediction-disulfide-isomerase/openscientist.md
      supporting_text: little, if any, isomerase activity
