status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for DnaJ (ECOLI). 13 GO terms extracted from HF
  protein_catalogue. DnaJ is an Hsp40-class J-domain co-chaperone for DnaK (Hsp70).
  Core functions: co-chaperone stimulating DnaK ATPase, unfolded protein capture and
  delivery to DnaK, zinc ion binding via cysteine-rich zinc finger domain, sigma32
  inactivation (sigma factor antagonist), and response to heat. Several predictions
  are CNN (already annotated). Protein disulfide isomerase activity (GO:0003756) and
  protein-disulfide reductase activity (GO:0015035) are NPI -- DnaJ has a cysteine-rich
  zinc finger domain but these cysteines coordinate structural zinc, not disulfide
  bonds. The viral process prediction is UNC. Membrane (GO:0016020) is NPI -- DnaJ
  is cytoplasmic. DNA replication initiation is CNN (non-core function via chaperone
  disassembly of replication complexes).
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0003756
    label: protein disulfide isomerase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: PARALOG_OVERANNOTATION
    summary: >-
      DnaJ has a cysteine-rich zinc finger domain (residues 131-209) containing 8
      cysteines that coordinate 2 structural Zn(2+) ions. These cysteines are
      NOT involved in disulfide bond isomerization. Protein disulfide isomerase
      activity is a property of thioredoxin-fold proteins (e.g., DsbA, DsbC, PDI).
      DnaJ has thiol-disulfide oxidoreductase activity (PMID:12941935) mediated by
      zinc center interactions with substrates, but this is distinct from classical
      PDI activity. The DnaJ family InterPro annotation does not include PDI
      activity. This appears to be a misattribution from the zinc-finger cysteines
      being conflated with oxidoreductase cysteines. The curated review does not
      include this term.
