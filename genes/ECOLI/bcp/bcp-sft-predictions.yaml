  predicted_term_type: GO_MF
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Less Precise. GO:0032843 (hydroperoxide reductase activity) is a parent term
      of GO:0140824 (thioredoxin-dependent peroxiredoxin activity, EC 1.11.1.24),
      which is the most specific and accurate MF term for BCP annotated in the
      curated review. The prediction is not wrong -- BCP does reduce hydroperoxides
      -- but the curated review uses the more specific term GO:0140824 as the
      primary MF annotation because it specifies the thioredoxin-dependent
      mechanism and the EC number. LSP rather than NPI.
