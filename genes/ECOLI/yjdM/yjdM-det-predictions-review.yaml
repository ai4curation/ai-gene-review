    review:
      assessment: NPI
      confidence_score: 0
      error_type: IN_VITRO_NOT_IN_VIVO
      summary: >-
        Three independent lines of evidence refute phosphonoacetate hydrolase as
        YjdM's function. (1) Fold/homology: YjdM is a small zinc-ribbon protein (YjdM
        family, Zn_Ribbon_YjdM domain; CxxC knuckles at C6/C9 and C23/C26) with no
        homology to the alkaline-phosphatase-superfamily phosphonoacetate hydrolases;
        a zinc ribbon is not a C-P bond hydrolase, and the DeepECTF paper itself notes
        YjdM's nearest training homolog is a DNA-directed RNA polymerase (EC 2.7.7.6),
        a zinc-ribbon-containing protein. (2) Genetics: phnA (yjdM) was shown to have
        no role in phosphonate metabolism, with all required genes in the phnC-phnP
        operon, and E. coli K-12 uses the C-P lyase rather than a phosphonoacetate
        hydrolase. (3) Naming: the historical "phnA" name of yjdM collides with the
        unrelated Pseudomonas phosphonoacetate hydrolase PhnA, a likely source of the
        mis-assignment. The reported in vitro activity (139.85 U/mg by a colorimetric
        phosphate-release assay) therefore does not represent an in vivo biological
        function. Assessed independently from the UniProt record, the DeepECTF paper's
        own data, and the classic E. coli phosphonate-genetics literature; the de
        Crecy-Lagard evaluation literature was not used.
