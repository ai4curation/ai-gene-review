predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:3.11.1.2
      label: phosphonoacetate hydrolase
    predicted_term_type: EC
    review:
      assessment: UNC
      confidence_score: 1
      summary: >-
        The EC:3.11.1.2 prediction for YjdM remains uncertain under the allowed
        evidence. Kim et al. reported in vitro phosphonoacetate hydrolase activity
        for purified YjdM, and this activity has propagated into GOA/UniProt, but
        the local review marks the annotation as over-annotated rather than accepted
        as biological function. De Crécy-Lagard et al. note a low-confidence
        prediction, lack of support from genome neighborhood outside E. coli,
        nonhomology to the better established PhnA family, and genetic evidence that
        yjdM/phnA disruption does not affect phosphonate metabolism. These data are
        enough to withhold a correctness call, but not enough to fully refute the
        observed in vitro activity. The missing evidence is a physiological substrate
        or pathway role established by genetics, complementation, kinetics, and
        conserved genomic context.
      supported_by:
        - reference_id: PMID:37963869
          supporting_text: >-
            YjdM was predicted by DeepECtransformer to have the EC number
            EC:3.11.1.2 (phosphonoacetate hydrolase). The specific phosphonoacetate
            hydrolase activity of YjdM obtained by enzyme assay was 139.85 U mg-1.
        - reference_id: PMID:37963869
          supporting_text: >-
            for YjdM, predicted by the neural network as EC:3.11.1.2 with a
            prediction score of 0.6103, the training sequence with the highest
            sequence similarity had a different EC number (EC:2.7.7.6).
        - reference_id: PMID:8335257
          supporting_text: >-
            phnA and phnB have no role in phosphonate metabolism.
        - reference_id: PMID:40703034
          supporting_text: >-
            the PhnA activity observed in vitro is not supported, and additional
            in vivo experiments are required to confirm the biological role of this
            enzyme. This prediction was given a CS of 1.
