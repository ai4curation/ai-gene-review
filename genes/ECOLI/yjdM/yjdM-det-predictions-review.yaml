id: P0AFJ1
gene_symbol: yjdM
locus_tag: b4108
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  YjdM DeepECTF prediction review. The DeepECTF prediction of phosphonoacetate hydrolase
  (EC 3.11.1.2) was validated in vitro but is uncertain for in vivo function. The in vitro
  PhnA activity may not represent the biological function - genome neighborhood analysis
  shows yjdM genes are generally not near phosphonate catabolism genes except in E. coli,
  and the experimentally validated PhnA belongs to a nonhomologous family.
