id: P0AFJ1
gene_symbol: yjdM
locus_tag: b4108
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YjdM (P0AFJ1). The model
  predicts phosphonoacetate hydrolase activity (EC 3.11.1.2), reported as validated
  in vitro by Kim et al. 2023 (139.85 U/mg). The prediction is rejected as the
  biological function. YjdM is a small (~109 aa) zinc-ribbon protein (YjdM family,
  COG2824; Zn_Ribbon_YjdM domain) with two N-terminal CxxC zinc-knuckles, not an
  alkaline-phosphatase-superfamily C-P hydrolase; the real phosphonoacetate
  hydrolases (e.g. Pseudomonas PhnA) are large, nonhomologous, binuclear-metal
  enzymes. Genetic analysis showed that phnA (the historical name for yjdM) has no
  role in phosphonate metabolism, all required genes lie in the phnC-phnP operon, and
  E. coli K-12 catabolizes phosphonates via the C-P lyase. The "phnA" name is a
  collision with the unrelated Pseudomonas hydrolase. The reported in vitro activity
  does not reflect an in vivo function.
