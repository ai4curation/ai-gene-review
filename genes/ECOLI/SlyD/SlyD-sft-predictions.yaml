description: >-
  BioReason-Pro SFT predictions for SlyD (ECOLI). 13 GO terms extracted from HF
  protein_catalogue. SlyD is a multifunctional cytoplasmic protein: (1) FKBP-type
  peptidyl-prolyl cis-trans isomerase (PPIase, EC 5.2.1.8), (2) holdase chaperone
  via the insert-in-flap (IF) domain, and (3) nickel metallochaperone for [NiFe]-
  hydrogenase maturation via C-terminal His/Cys-rich metal-binding tail (GO:0170061).
  PPIase activity (CNN), zinc/nickel/cobalt binding (CNN), protein refolding (CNN),
  protein peptidyl-prolyl isomerization (CNN), unfolded protein binding (CNN).
  Copper ion binding is NPI -- copper is not a well-established metal for SlyD.
  Response to heat is CNN. Protein maturation by protein folding is LSP.
  Modulation of host adenylate cyclase pathway is NPI -- irrelevant to E. coli SlyD.
  Cytosol is CNN. Key gap: the model predicts metal binding but the SFT predictions
  do not include the specific nickel chaperone function (GO:0170061), which is the
  most distinctive and clinically relevant function.
