- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0016419
    label: amino acid prenyltransferase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. This prediction is based on a fabricated domain annotation. P28697
      (MbiA) has ZERO InterPro domain annotations -- the mbiA-bioreason-sft-review.md
      documents that BioReason fabricated InterPro:0009383 (aminoacyl-phosphate
      synthetase family) which is a non-existent entry. MbiA is a 161-aa orphan
      protein that arose by de novo overprinting within the yaaW gene (PMID:18226237);
      it has no recognizable enzymatic domains, no known molecular function, and no
      GO MF annotations in the curated review (the curated annotation is root MF
      GO:0003674 as a placeholder). The amino acid prenyltransferase prediction is
      entirely fabricated.
    error_type: TRAINING_DATA_CONTAMINATION
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0007005
    label: mitochondrion organization
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect and inapplicable. E. coli has no mitochondria. GO:0007005
      (mitochondrion organization) is a eukaryotic process term that cannot apply
      to any E. coli protein. The mbiA-bioreason-sft-review.md documents that
      BioReason attempted to rationalize this with claims about "mitochondrial-like
      membrane dynamics" in E. coli, which is biologically nonsensical. This
      prediction represents hallucination from training data contamination with
      eukaryotic sequence/annotation data.
    error_type: PATHWAY_CONTEXT_IGNORED
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005737
    label: cytoplasm
  predicted_term_type: GO_CC
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      Uncertain. Cytoplasmic localization is the default assumption for a small
      E. coli protein with no signal peptides, transmembrane domains, or secretion
      signals. The curated review notes cytoplasm as NAS (non-traceable author
      statement) with the caveat that no experimental evidence exists for MbiA
      localization (the protein has not been detected at the protein level --
      PE 2, evidence at transcript level only). The prediction is not wrong but
      is no more than a default inference. UNC because the protein has never been
      experimentally detected and localization cannot be validated.
