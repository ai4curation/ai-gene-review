status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for CnoX (ECOLI). 6 GO terms extracted from HF
  protein_catalogue. CnoX is a chaperedoxin (ATP-independent holdase + redox protector)
  activated by HOCl. Core function is GO:0036506 (maintenance of unfolded protein)
  in GO:0005829 (cytosol). Several SFT predictions are CNN or LSP relative to curated
  annotations. The cytosol prediction is CNN. Cellular response to oxidative stress
  is CNN. Protein refolding is CNN (non-core). Unfolded protein binding is CNN/LSP
  (curated review recommends replacing with carrier chaperone term). Chaperone-mediated
  protein folding is NPI -- CnoX is a holdase, not an ATP-dependent foldase; it
  hands off to GroEL/DnaK rather than folding clients itself. Regulation of protein
  stability is LSP at best.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051082
    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      CnoX does bind unfolded proteins (IDA, PMID:29754824). This is already in
      the curated GOA. However, the curated review recommends replacing GO:0051082
      with a carrier chaperone term (GO:0140597 protein carrier chaperone or GO:0140309
      unfolded protein carrier activity) because CnoX not only binds but escorts
      substrates to GroEL/DnaK. CNN because the binding aspect is real and annotated,
      but the term is less specific than the curated replacement. The prediction is
      not novel.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0061077
    label: chaperone-mediated protein folding
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: MULTIPLE_FUNCTIONS
    summary: >-
      CnoX is an ATP-independent holdase chaperedoxin that does NOT directly fold
      proteins. It maintains substrates in an unfolded but non-aggregated state
      and transfers them to GroEL/GroES and DnaK/DnaJ/GrpE for folding (PMID:29754824).
      The curated review annotates CnoX with GO:0036506 (maintenance of unfolded
      protein) as its core BP, not chaperone-mediated protein folding. Predicting
      CnoX as mediating chaperone-dependent folding conflates the holdase function
      with the downstream ATP-dependent foldase function of GroEL/DnaK. This is
      an NPI because the evidence specifically refutes CnoX as a foldase.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031647
    label: regulation of protein stability
  predicted_term_type: GO_BP
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      CnoX prevents protein aggregation during HOCl stress and delivers substrates
      to foldases, which contributes to protein stability. However, GO:0031647
      (regulation of protein stability) is a generic parent term that fails to
      capture the specific holdase/chaperedoxin mechanism. The curated core function
      is GO:0036506 (maintenance of unfolded protein) with GO:0034599 (cellular
      response to oxidative stress), both more specific. LSP because the prediction
      is correct at a high level but not informative.
