    summary: >-
      Protein refolding (GO:0042026) is already annotated in the curated GOA (IDA,
      PMID:29754824) and is accepted in the curated review as KEEP_AS_NON_CORE.
      CnoX participates in protein refolding indirectly by maintaining substrates
      and transferring them to the ATP-dependent foldases. The prediction is correct
      but not novel. Note the curated review marks this as non-core; the primary
      function is holdase/redox protection.
