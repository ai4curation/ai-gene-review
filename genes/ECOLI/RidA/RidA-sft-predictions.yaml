  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Deaminase activity is the core molecular function of RidA (EC 3.5.99.10:
      2-iminobutanoate/2-iminopropanoate deaminase). GO:0019239 (deaminase activity)
      is already annotated in the curated GOA (IBA, GO_REF:0000033; IDA,
      PMID:23696645; ISO, PMID:22094463) and accepted in the curated review.
      The prediction is correct and the most important prediction for this gene.
      However, it is not novel as this is already annotated. The more specific
      term GO:0120241 (2-iminobutanoate/2-iminopropanoate deaminase activity) is
      annotated with IEA evidence but GO:0019239 is an appropriate parent term.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051082
    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: EXPERIMENTAL_MISTAKE
    summary: >-
      Unfolded protein binding (chaperone holdase function) is NOT a constitutive
      property of native RidA. Mueller et al. (2014) demonstrated explicitly that
      native (untreated) RidA has NO chaperone activity. RidA acquires holdase
      activity ONLY after post-translational N-chlorination of lysine and arginine
      residues by HOCl (PMID:25517874). The curated review marks the IDA annotation
      for GO:0051082 as MARK_AS_OVER_ANNOTATED for this reason. Predicting
      unfolded protein binding as a function of RidA is incorrect for the native
      protein. This moonlighting function under stress conditions is conditional
      and secondary to the core deaminase function. The error type is
      EXPERIMENTAL_MISTAKE because the original annotation (PMID:25517874) is
      based on a real experiment but the unconditional annotation overstates the
      native function.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051410
    label: response to nitrosative stress
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      RidA is involved in response to oxidative/reactive species -- specifically,
      it processes reactive enamine/imine intermediates generated under metabolic
      stress. The curated GOA includes GO:0009636 (response to toxic substance,
      IDA, PMID:25517874) based on the HOCl-sensitive phenotype of the ridA mutant.
      There is some evidence for RidA's role under peroxynitrite stress
      (PMID:23696645). However, GO:0051410 (response to nitrosative stress) is not
      specifically annotated in the curated GOA for RidA. UNC because the role in
      nitrosative stress specifically is not definitively established, though related
      reactive species responses are documented.
