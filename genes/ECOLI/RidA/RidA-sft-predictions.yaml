    id: GO:0019239
    label: deaminase activity
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Deaminase activity is the core molecular function of RidA (EC 3.5.99.10:
      2-iminobutanoate/2-iminopropanoate deaminase). GO:0019239 (deaminase activity)
      is already annotated in the curated GOA (IBA, GO_REF:0000033; IDA,
      PMID:23696645; ISO, PMID:22094463) and accepted in the curated review.
      The prediction is correct and the most important prediction for this gene.
      However, it is not novel as this is already annotated. The more specific
      term GO:0120241 (2-iminobutanoate/2-iminopropanoate deaminase activity) is
      annotated with IEA evidence but GO:0019239 is an appropriate parent term.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051082
    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: CURATION_MISTAKE
    summary: >-
      Unfolded protein binding is not a constitutive property of native RidA. RidA acquires holdase activity
      only after HOCl-mediated N-chlorination (PMID:25517874), and the AIGR review therefore marks the unconditional
      GO annotation as MARK_AS_OVER_ANNOTATED. The experiment itself is valid; the error is the curation-level
      loss of the required stress-dependent modification context, so CURATION_MISTAKE is more accurate than
      EXPERIMENTAL_MISTAKE.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051410
    label: response to nitrosative stress
  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      [FROZEN_ONTOLOGY_ADJUDICATION] Assessed the supplied GO ID rather than the intended raw label: GO:0051410
      is 'detoxification of nitrogen compound'. The canonical GO term is supported and absent as an exact
      ID from the frozen GOA. The pair is classified COR; the raw source pair remains unchanged. Historical
      rationale about the intended raw label is retained below for provenance, not as support for the canonical
      GO ID: RidA is involved in response to oxidative/reactive species -- specifically, it processes reactive
      enamine/imine intermediates generated under metabolic stress. The curated GOA includes GO:0009636
      (response to toxic substance, IDA, PMID:25517874) based on the HOCl-sensitive phenotype of the ridA
      mutant. There is some evidence for RidA's role under peroxynitrite stress (PMID:23696645). However,
      GO:0051410 (response to nitrosative stress) is not specifically annotated in the curated GOA for RidA.
      UNC because the role in nitrosative stress specifically is not definitively established, though related
      reactive species responses are documented. [ONTOLOGY_LABEL_AUDIT] Raw model pair mismatch: GO:0051410
      resolves to 'detoxification of nitrogen compound', not 'response to nitrosative stress'. The raw ID
      and label are retained for provenance; the assessment applies to the GO ID and explicitly flags the
      label error.
