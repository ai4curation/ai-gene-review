status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for RidA (ECOLI). 6 GO terms extracted from HF
  protein_catalogue. RidA is a 2-iminobutanoate/2-iminopropanoate deaminase
  (EC 3.5.99.10) that detoxifies reactive enamine/imine intermediates from PLP-
  dependent enzymes in amino acid metabolism. Core function is deaminase activity
  (GO:0019239 / GO:0120241) in the isoleucine biosynthetic pathway (GO:0009082).
  Deaminase activity (GO:0019239) is CNN -- already annotated. Unfolded protein
  binding (GO:0051082) is NPI -- native RidA has no chaperone activity; this only
  arises conditionally after HOCl-mediated N-chlorination. The canonical nitrogen-
  compound detoxification term is COR. Cytosol is CNN. Membrane is NPI. Protein-containing complex is CNN
  (RidA is a homotrimer). The RL model had a notable narrative-GO disconnect:
  described RidA as non-enzymatic while predicting deaminase activity -- the SFT
  model correctly predicts deaminase activity.
references:
