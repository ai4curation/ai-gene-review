  predicted_term:
    id: GO:0044183
    label: protein folding chaperone
  predicted_term_type: GO_MF
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      Correct prediction. Spy is a well-characterized protein folding chaperone.
      The landmark study (PMID:26619265) demonstrated that substrate Im7 folds
      completely through all conformational states while remaining bound to Spy's
      cradle-shaped surface, establishing it as a genuine foldase-capable
      ATP-independent chaperone. This is the core MF annotation in the curated
      review (ACCEPT, IDA). COR because the term is experimentally validated and
      not trivially predictable from sequence alone -- Spy has a novel alpha-helical
      fold unlike canonical chaperone families.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051082
    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and present in the curated annotations (multiple IDA entries with
      PMID:26619265 and PMID:27239796). Spy binds unfolded, intermediate, and
      native Im7 with micromolar affinities. However this prediction is CNN
      (Correct but Not Novel) because GO:0051082 is already in the curated GOA
      and is a standard annotation for chaperones; predicting it from sequence
      features is unsurprising. Note: GO:0051082 is also proposed for obsoletion
      and may be replaced by a holdase NTR.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0061077
    label: chaperone-mediated protein folding
  predicted_term_type: GO_BP
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Less Precise. GO:0061077 (chaperone-mediated protein folding) is technically
      correct but the curated review annotates the more specific GO:0006457
      (protein folding, IDA from PMID:21317898) for this gene. GO:0061077 implies
      involvement of a classical ATP-dependent chaperone system; Spy is an
      ATP-independent holdase/foldase in the periplasm. The biological process
      annotation GO:0006457 is more appropriate and more specific for this
      periplasmic holdase. LSP rather than NPI because Spy does assist protein
      folding in a chaperone-mediated fashion.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0014070
    label: response to organic cyclic compound
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. GO:0014070 (response to organic cyclic compound) has no support
      in the literature or annotations for Spy. Spy is strongly induced by tannin
      (a polyphenol) and butanol stress via the Bae and Cpx two-component systems,
      but this is captured by envelope stress response annotations -- Spy is the
      effector chaperone, not a signaling component responding to organic cyclic
      compounds. This term is not present in the curated GOA and represents a
      spurious prediction, likely arising from frequency bias in training data
      associating stress-response proteins with this broad process term.
    error_type: FREQUENCY_BIAS
