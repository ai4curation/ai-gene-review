- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:16079137
  review:
    summary: IPI annotation for protein binding based on interaction with SdhA
      (P0AC41) detected by blue native PAGE and mass spectrometry (PMID:16079137).
      SdhB forms a stable complex with SdhA as part of the SDH complex.
    action: REMOVE
    reason: Protein binding is uninformative per curation guidelines. The interaction
      with SdhA is a subunit-subunit interaction within the SDH complex and is better
      captured by complex membership annotations. This annotation does not add useful
      information about gene function.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:24561554
  review:
    summary: IPI annotation for protein binding based on yeast two-hybrid interaction
