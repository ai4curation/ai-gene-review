- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IMP
  original_reference_id: PMID:16864590
  review:
    summary: IMP annotation for electron transfer activity. Cheng et al. (2006)
      mutated hydrophobic residues around the [4Fe-4S] cluster in SdhB and showed
      that changes in midpoint potential of the iron-sulfur clusters are accompanied
      by decreased enzyme turnover rate, demonstrating that the clusters direct
      electron flow from succinate to ubiquinone (PMID:16864590).
    action: ACCEPT
    reason: This is experimentally validated by mutagenesis showing that SdhB
      iron-sulfur cluster midpoint potentials are poised to direct electron transfer.
      This is the core molecular function of SdhB.
    supported_by:
    - reference_id: PMID:16864590
      supporting_text: a decrease in midpoint potential of either the [4Fe-4S] cluster
        or the [3Fe-4S] cluster is accompanied by a decrease in the rate of enzyme
        turnover. We hypothesize that this occurs because the midpoint potentials of
        the [Fe-S] clusters in the native enzyme are poised such that direction of
        electron transfer from succinate to ubiquinone is favored
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IEP
  original_reference_id: PMID:7783618
  review:
    summary: IEP annotation for aerobic respiration. Park et al. (1995) showed
      that sdhCDAB expression is highest under aerobic conditions and decreased
      10-fold anaerobically, with regulation by ArcA and Fnr (PMID:7783618).
    action: ACCEPT
    reason: Expression pattern evidence showing aerobic induction of the sdh operon
