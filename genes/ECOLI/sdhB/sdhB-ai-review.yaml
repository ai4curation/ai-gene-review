    supported_by:
    - reference_id: PMID:7783618
      supporting_text: Expression of sdh-lacZ was highest under aerobic conditions
        and was decreased 10-fold in the absence of oxygen. The fnr and arcA gene
        products are required for this oxygen control
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IDA
  original_reference_id: PMID:2997176
  review:
    summary: IDA annotation for iron-sulfur cluster binding. Morningstar et al.
      (1985) used low temperature MCD and EPR spectroscopies to confirm the
      presence of iron-sulfur clusters in fumarate reductase (which shares the
      homologous FrdB subunit with SdhB). The study confirmed [2Fe-2S] and 3Fe
      clusters as intrinsic components (PMID:2997176).
    action: ACCEPT
    reason: Direct spectroscopic evidence confirms iron-sulfur cluster binding.
      Although the study focused on fumarate reductase FrdB, SdhB is the
      homologous iron-sulfur subunit of SDH and shares the same cluster types.
    supported_by:
    - reference_id: PMID:2997176
      supporting_text: The results confirm the presence of one [2Fe-2S] cluster and
        show that the high potential iron-sulfur center is a 3Fe cluster of the type
        found in bacterial ferredoxins
- term:
    id: GO:0051537
    label: 2 iron, 2 sulfur cluster binding
  evidence_type: IMP
  original_reference_id: PMID:1312028
  review:
    summary: IMP annotation for [2Fe-2S] cluster binding. Werth et al. (1992)
      mutated the Cys65 position in FrdB (homologous to SdhB) and showed that
      an aspartic acid (as found natively in SdhB at the equivalent position)
      can serve as a non-cysteinyl ligand for the [2Fe-2S] cluster, while Ala
      at this position abolishes cluster assembly (PMID:1312028).
    action: ACCEPT
    reason: Mutagenesis evidence demonstrates the [2Fe-2S] cluster requires a
      coordinating residue at the position equivalent to SdhB, supporting cluster
      binding. UniProt confirms binding residues at positions 55, 60, and 75.
    supported_by:
    - reference_id: PMID:1312028
      supporting_text: the [2Fe-2S] cluster was not observed in the FrdBCys65Ala
        mutant showing that a coordinating residue is required at this position for
        assembly of this cluster and significant levels of enzymatic activity. These
        results support the presence of one non-cysteinyl, oxygenic ligand for the
        [2Fe-2S] cluster in E. coli succinate dehydrogenase
- term:
    id: GO:0051538
    label: 3 iron, 4 sulfur cluster binding
  evidence_type: IDA
  original_reference_id: PMID:2987254
  review:
    summary: IDA annotation for [3Fe-4S] cluster binding. Johnson et al. (1985) used
      MCD and EPR spectroscopy to identify three distinct iron-sulfur clusters in
      reconstitutively active succinate dehydrogenase, including center S3 identified
      as a [3Fe-xS] cluster. The study showed that S3 is necessary for reconstitutive
      activity and can sustain ubiquinone reductase activity (PMID:2987254).
    action: ACCEPT
    reason: Direct spectroscopic evidence identifies the [3Fe-4S] cluster as an
      intrinsic component of succinate dehydrogenase. UniProt confirms binding
      residues at positions 159, 206, and 212.
    supported_by:
    - reference_id: PMID:2987254
      supporting_text: they indicate that center S3 is a necessary requirement for
        reconstitutive activity and suggest that it is able to sustain ubiquinone
        reductase activity as a [3Fe-xS] center
- term:
    id: GO:0051539
    label: 4 iron, 4 sulfur cluster binding
  evidence_type: IMP
  original_reference_id: PMID:3008846
  review:
    summary: IMP annotation for [4Fe-4S] cluster binding. Cammack et al. (1986)
      performed redox titrations of iron-sulfur clusters in fumarate reductase
      (homologous to SDH) and identified Centre 2 as a [4Fe-4S] cluster based on
      ESR properties and amino acid sequence of the frdB subunit (PMID:3008846).
    action: ACCEPT
    reason: Spectroscopic evidence identifies the [4Fe-4S] cluster in the homologous
      FrdB subunit. SdhB contains the same cluster, confirmed by crystal structures
      (PMID:12560550) and UniProt binding site annotations at positions 149, 152,
      155, and 216.
    supported_by:
    - reference_id: PMID:3008846
      supporting_text: Consideration of the ESR properties of this signal, together
        with the amino acid sequence of the frdB subunit of the enzyme, indicates
        that Centre 2 is a [4Fe-4S] cluster
- term:
    id: GO:0045273
    label: respiratory chain complex II (succinate dehydrogenase)
  evidence_type: IDA
  original_reference_id: PMID:12560550
  review:
    summary: SdhB is a core subunit of respiratory chain complex II (succinate
      dehydrogenase). The crystal structure of E. coli SQR confirms the four-subunit
      complex architecture with SdhA, SdhB, SdhC, and SdhD forming a trimer of
      heterotetramers (PMID:12560550). UniProt and ComplexPortal (CPX-1931) both
      annotate SdhB as a component of this complex.
    action: NEW
    reason: This cellular component annotation is well-supported by crystal
      structures and is already present in UniProt GO annotations (IPI from
      ComplexPortal) but was not included in the GOA input set. It is essential
      for capturing the complex context of SdhB function.
    supported_by:
    - reference_id: PMID:12560550
      supporting_text: The structure of Escherichia coli succinate dehydrogenase (SQR),
        analogous to the mitochondrial respiratory complex II, has been determined
