- id: PMID:12560550
  title: Architecture of succinate dehydrogenase and reactive oxygen species generation.
  findings:
  - statement: Crystal structure of E. coli SQR at 2.6 angstroms reveals the electron
      transport pathway from succinate to ubiquinone through FAD and three iron-sulfur
      clusters, and shows arrangement of redox centers prevents ROS formation.
    supporting_text: revealing the electron transport pathway from the electron
      donor, succinate, to the terminal electron acceptor, ubiquinone. It was found
      that the SQR redox centers are arranged in a manner that aids the prevention
      of reactive oxygen species (ROS) formation at the flavin adenine dinucleotide
- id: PMID:1312028
  title: Evidence for non-cysteinyl coordination of the [2Fe-2S] cluster in Escherichia
    coli succinate dehydrogenase.
  findings:
  - statement: The [2Fe-2S] cluster in E. coli SDH has a non-cysteinyl oxygenic
      ligand at the position equivalent to FrdB Cys65, where SdhB has an aspartic
      acid residue.
    supporting_text: These results support the presence of one non-cysteinyl,
      oxygenic ligand for the [2Fe-2S] cluster in E. coli succinate dehydrogenase
- id: PMID:16079137
  title: Protein complexes of the Escherichia coli cell envelope.
  findings:
  - statement: SDH complex identified as a membrane protein complex in the E. coli
      cell envelope using blue native PAGE and mass spectrometry.
    supporting_text: we have been able to identify 43 distinct protein complexes
- id: PMID:16864590
  title: The iron-sulfur clusters in Escherichia coli succinate dehydrogenase direct
    electron flow.
  findings:
  - statement: Mutagenesis of hydrophobic residues around SdhB iron-sulfur clusters
      shows that midpoint potentials are poised to direct electron transfer from
      succinate to ubiquinone. Decreasing midpoint potential of [4Fe-4S] or [3Fe-4S]
      clusters decreases enzyme turnover.
    supporting_text: a decrease in midpoint potential of either the [4Fe-4S] cluster
      or the [3Fe-4S] cluster is accompanied by a decrease in the rate of enzyme
      turnover. We hypothesize that this occurs because the midpoint potentials of
      the [Fe-S] clusters in the native enzyme are poised such that direction of
      electron transfer from succinate to ubiquinone is favored
- id: PMID:24561554
  title: The binary protein-protein interaction landscape of Escherichia coli.
  findings:
  - statement: Large-scale yeast two-hybrid study identified binary protein-protein
      interactions in E. coli, including SdhB-SdhA interaction.
    supporting_text: we performed yeast two-hybrid screens of 3,305 baits against
      3,606 preys
- id: PMID:2987254
  title: Magnetic circular dichroism studies of succinate dehydrogenase. Evidence
    for [2Fe-2S], [3Fe-xS], and [4Fe-4S] centers in reconstitutively active enzyme.
  findings:
  - statement: MCD and EPR spectroscopy identifies three distinct iron-sulfur clusters
      in reconstitutively active succinate dehydrogenase, including [2Fe-2S] (S1),
      [4Fe-4S] (S2), and [3Fe-xS] (S3). Center S3 is required for reconstitutive
      activity.
    supporting_text: Reconstitutively active succinate dehydrogenase is found to
      contain three spectroscopically distinct Fe-S clusters...they indicate that
      center S3 is a necessary requirement for reconstitutive activity
- id: PMID:2997176
  title: The high potential iron-sulfur center in Escherichia coli fumarate reductase
    is a three-iron cluster.
  findings:
  - statement: MCD and EPR spectroscopy confirms [2Fe-2S] and 3Fe clusters in E. coli
      fumarate reductase, demonstrating the 3Fe cluster is an intrinsic component of
      the functional enzyme.
    supporting_text: The results confirm the presence of one [2Fe-2S] cluster and
      show that the high potential iron-sulfur center is a 3Fe cluster of the type
      found in bacterial ferredoxins
- id: PMID:3008846
  title: Evidence that centre 2 in Escherichia coli fumarate reductase is a [4Fe-4S]cluster.
  findings:
  - statement: ESR spectroscopy and redox titrations identify Centre 2 in E. coli
      fumarate reductase as a [4Fe-4S] cluster with Em = -320 mV.
    supporting_text: Consideration of the ESR properties of this signal, together
      with the amino acid sequence of the frdB subunit of the enzyme, indicates
      that Centre 2 is a [4Fe-4S] cluster
- id: PMID:7783618
  title: 'Regulation of succinate dehydrogenase (sdhCDAB) operon expression in Escherichia
    coli in response to carbon supply and anaerobiosis: role of ArcA and Fnr.'
  findings:
  - statement: The sdhCDAB operon is maximally expressed aerobically and repressed
      10-fold anaerobically via ArcA and Fnr transcription factors. Expression also
      varies with carbon source.
    supporting_text: Expression of sdh-lacZ was highest under aerobic conditions
      and was decreased 10-fold in the absence of oxygen. The fnr and arcA gene
      products are required for this oxygen control and each acts to repress
      sdhC-lacZ expression
