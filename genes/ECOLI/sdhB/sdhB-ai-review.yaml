id: P07014
gene_symbol: sdhB
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: SdhB is the iron-sulfur subunit of succinate dehydrogenase (Complex II,
  SQR, EC 1.3.5.1) in E. coli. It is part of the four-subunit SdhCDAB complex that
  catalyzes the oxidation of succinate to fumarate coupled to ubiquinone reduction
  during aerobic respiration. SdhB contains three iron-sulfur clusters ([2Fe-2S],
  [3Fe-4S], and [4Fe-4S]) that form an electron transfer relay between the FAD
  cofactor on SdhA and the ubiquinone-binding site near the membrane subunits SdhC
  and SdhD (PMID:12560550). The complex is membrane-associated and is the sole
  membrane-bound enzyme of the tricarboxylic acid cycle. Expression of the sdhCDAB
  operon is upregulated under aerobic conditions and repressed anaerobically by ArcA
  and Fnr (PMID:7783618). Crystal structures at 2.4-2.6 angstrom resolution have
  revealed the architecture of the electron transport pathway and the arrangement of
  redox centers that minimizes reactive oxygen species formation (PMID:12560550).
existing_annotations:
- term:
    id: GO:0009060
    label: aerobic respiration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for aerobic respiration. SdhB is a core subunit of succinate
      dehydrogenase (Complex II), which functions exclusively during aerobic respiration
      in E. coli. The sdhCDAB operon is highly expressed under aerobic conditions and
      repressed anaerobically (PMID:7783618). The crystal structure confirms SQR is
      expressed during aerobic respiration rather than the related fumarate reductase
      (PMID:12560550).
    action: ACCEPT
    reason: Aerobic respiration is the primary biological process context for succinate
      dehydrogenase function. IBA annotation is well-supported by phylogenetic
      conservation and extensive experimental evidence.
    supported_by:
    - reference_id: PMID:12560550
      supporting_text: This is likely to be the main reason SQR is expressed during
        aerobic respiration rather than the related enzyme fumarate reductase
    - reference_id: PMID:7783618
      supporting_text: Expression of sdh-lacZ was highest under aerobic conditions
        and was decreased 10-fold in the absence of oxygen
- term:
    id: GO:0022904
    label: respiratory electron transport chain
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for respiratory electron transport chain. SdhB contains
      the iron-sulfur cluster relay that transfers electrons from succinate (via FAD
      on SdhA) to ubiquinone, feeding electrons into the aerobic respiratory chain
      (PMID:12560550, PMID:16864590).
    action: ACCEPT
    reason: SdhB is an integral component of the respiratory electron transport chain,
      transferring electrons from succinate to ubiquinone via its three iron-sulfur
      clusters. IBA is well-supported.
    supported_by:
    - reference_id: PMID:12560550
      supporting_text: revealing the electron transport pathway from the electron
        donor, succinate, to the terminal electron acceptor, ubiquinone
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: IEA annotation for plasma membrane localization. UniProt annotates SdhB
      as located at the cell inner membrane as a peripheral membrane protein, based
      on PMID:16079137. In E. coli, the plasma membrane is equivalent to the cell
      inner membrane.
    action: ACCEPT
    reason: SdhB is a peripheral membrane protein associated with the inner membrane
      via the membrane-spanning SdhC and SdhD subunits. The IEA mapping from UniProt
      subcellular location is correct.
    supported_by:
    - reference_id: PMID:16079137
      supporting_text: Protein complexes of the Escherichia coli cell envelope
- term:
    id: GO:0006099
    label: tricarboxylic acid cycle
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: IEA annotation for TCA cycle involvement. Succinate dehydrogenase
      catalyzes the oxidation of succinate to fumarate, which is step 6 of the TCA
      cycle. UniProt pathway annotation confirms this (UPA00223).
    action: ACCEPT
    reason: Succinate dehydrogenase is the sole membrane-bound enzyme of the TCA
      cycle. SdhB is an essential subunit of this complex. The annotation is accurate.
    supported_by:
    - reference_id: PMID:16864590
      supporting_text: Succinate dehydrogenase is an indispensable enzyme involved
        in the Krebs cycle as well as energy coupling in the mitochondria and certain
        prokaryotes
- term:
    id: GO:0008177
    label: succinate dehydrogenase (quinone) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: IEA annotation for succinate dehydrogenase (quinone) activity based on
      EC 1.3.5.1 mapping. This is the correct enzymatic activity for the SQR complex.
      SdhB contributes to this activity as part of the complex but does not independently
      catalyze it -- the flavoprotein subunit SdhA contains the FAD cofactor and the
      succinate-binding site.
    action: MODIFY
    reason: SdhB is the iron-sulfur subunit that relays electrons but does not
      independently catalyze succinate oxidation. The catalytic activity belongs to
      the complex as a whole. SdhB contributes to this activity but its intrinsic
      molecular function is electron transfer activity. The annotation should be
      electron transfer activity to reflect what SdhB specifically does.
    proposed_replacement_terms:
    - id: GO:0009055
      label: electron transfer activity
- term:
    id: GO:0009055
    label: electron transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation for electron transfer activity from InterPro domain
      mapping. SdhB contains three iron-sulfur clusters that form an electron relay,
      which is its core molecular function within the complex.
    action: ACCEPT
    reason: Electron transfer activity is the primary molecular function of SdhB.
      Its iron-sulfur clusters relay electrons from FAD on SdhA to ubiquinone at the
      membrane subunits.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation for oxidoreductase activity from InterPro mapping.
      This is a broad parent of the more specific succinate dehydrogenase activity.
      The complex is indeed an oxidoreductase (EC 1.3.5.1).
    action: ACCEPT
    reason: This is a broad but correct IEA annotation. The complex performs
      oxidoreductase activity. SdhB contributes to this as part of the electron
      relay. It is acceptable alongside the more specific electron transfer activity
      annotation.
- term:
    id: GO:0051536
    label: iron-sulfur cluster binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation for iron-sulfur cluster binding from InterPro domain
