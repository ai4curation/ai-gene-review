description: >-
  YjhQ DeepECTF prediction review. The DeepECTF prediction of mycothiol synthase
  (EC 2.3.1.189) is incorrect. Mycothiol is not synthesized by E. coli, and the
  remaining pathway enzymes are absent from the genome. YjhQ is actually an antitoxin
  component of the TopAI-YjhQ toxin-antitoxin system.
