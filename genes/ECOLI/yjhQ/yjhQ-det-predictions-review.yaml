  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YjhQ (P39368). The model
  predicts mycothiol synthase activity (EC 2.3.1.189). The family-level signal is
  reasonable - YjhQ is a GNAT-family N-acetyltransferase and mycothiol synthase
  (MshD) is a GNAT acetyltransferase - but the specific substrate is wrong because
  mycothiol biosynthesis is restricted to Actinobacteria and is entirely absent from
  E. coli, which uses glutathione as its low-molecular-weight thiol. The msh
  pathway (MshA/B/C/D) does not exist in E. coli K-12, so there is no
  desacetylmycothiol acceptor. Independently, YjhQ's characterized role is as the
  antitoxin of the YjhX(TopAI)-YjhQ toxin-antitoxin system, unrelated to thiol
  biosynthesis. The prediction is an over-propagation from the GNAT superfamily to an
  actinobacterial substrate whose pathway is missing here.
