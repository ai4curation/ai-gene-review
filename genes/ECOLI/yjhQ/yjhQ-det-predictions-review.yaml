id: P39368
gene_symbol: yjhQ
locus_tag: b4307
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  YjhQ DeepECTF prediction review. The DeepECTF prediction of mycothiol synthase
  (EC 2.3.1.189) is incorrect. Mycothiol is not synthesized by E. coli, and the
  remaining pathway enzymes are absent from the genome. YjhQ is actually an antitoxin
  component of the TopAI-YjhQ toxin-antitoxin system.
references:
  - id: PMID:37963869
    title: Functional annotation of enzyme-encoding genes using deep learning with transformer layers
  - id: PMID:40703034
    title: Limitations of current ML models in predicting enzymatic functions (de Crécy-Lagard et al. 2025)
  - id: PMID:26553797
    title: YjhQ as antitoxin in the TopAI-YjhQ toxin-antitoxin system
source_documents:
  - genes/ECOLI/yjhQ/yjhQ-ai-review.yaml
  - genes/ECOLI/yjhQ/yjhQ-uniprot.txt
  - genes/ECOLI/yjhQ/yjhQ-goa.tsv
  - genes/ECOLI/yjhQ/yjhQ-deep-research-falcon.md
  - publications/PMID_26553797.md
predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:2.3.1.189
      label: mycothiol synthase
    predicted_term_type: EC
    review:
      assessment: NPI
      confidence_score: 0
      error_type: PATHWAY_CONTEXT_IGNORED
      summary: >-
        The EC:2.3.1.189 mycothiol synthase prediction for YjhQ is refuted by
        E. coli pathway context. De Crécy-Lagard et al. state that mycothiol is
        not synthesized by E. coli and that the remaining mycothiol pathway genes
        are absent, so the predicted pathway-specific activity is biologically
        incompatible with this organism. The local GO review supports only a broad
        GNAT/acyltransferase-domain annotation and does not support any
        mycothiol-specific substrate assignment. Independent experimental evidence
        instead shows YjhQ functions as the antitoxin partner of TopAI, interacting
        with and neutralizing the toxin. This is therefore a nonparalog incorrect
        prediction caused by ignoring pathway context.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            YjhQ/b4307 is predicted to be a mycothiol synthase (EC 2.3.1.189),
            but mycothiol is not a molecule synthesized by E. coli, and the
            remaining pathway genes are absent from the genome (BioCyc ID: PWY1G-0).
        - reference_id: PMID:26553797
          supporting_text: >-
            YjhQ functions as the antitoxin for TopAI toxin and forms a stable
            complex with TopAI in a novel E. coli toxin-antitoxin system.
        - reference_id: file:ECOLI/yjhQ/yjhQ-uniprot.txt
          supporting_text: >-
            UniProt describes YjhQ as an uncharacterized N-acetyltransferase with
            EC:2.3.1.- and GNAT-domain signatures, not as mycothiol synthase.
