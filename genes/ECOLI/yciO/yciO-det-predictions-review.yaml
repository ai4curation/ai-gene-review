id: P0AFR4
gene_symbol: yciO
locus_tag: b1267
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YciO (P0AFR4). The model
  predicts L-threonylcarbamoyladenylate (TC-AMP) synthase activity (EC 2.7.7.87),
  the first step of t6A tRNA modification. The same study (Kim et al. 2023) reports
  a weak in vitro activity for purified YciO (0.0705 U/mg). The prediction is judged
  a paralog over-annotation. YciO is a degenerate, non-essential paralog of TsaC
  (YrdC), the dedicated and essential TC-AMP synthase in E. coli. An independent
  alignment (see yciO-bioinformatics/) shows YciO retains the YrdC/Sua5 fold
  (~29% identity to TsaC) but has lost the conserved catalytic Asn of the Sua5/TsaC
  active-site motif (TsaC STSANL -> YciO STSLML). Because t6A is essential and
  tsaC/yrdC is essential despite the presence of YciO, YciO does not provide
  redundant TC-AMP-synthase function in vivo; the measured activity (which UniProt
  pairs with uncoupled ATP hydrolysis to AMP) is best read as promiscuous residual
  family chemistry, not YciO's dedicated function.
