description: >-
  YciO DeepECTF prediction review. The DeepECTF prediction of L-threonylcarbamoyladenylate
  synthase (EC 2.7.7.87) is incorrect - a classic paralog overannotation error. YciO is a
  paralog of TsaC but shows 10,000x weaker activity and does not complement tsaC mutants
  in vivo. Structural and genomic context evidence suggests a distinct role in rRNA metabolism.
