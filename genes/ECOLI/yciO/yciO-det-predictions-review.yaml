predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:2.7.7.87
      label: L-threonylcarbamoyladenylate synthase
    predicted_term_type: EC
    review:
      assessment: PLI
      confidence_score: 0
      error_type: PARALOG_OVERANNOTATION
      summary: >-
        The EC:2.7.7.87 prediction for YciO is a paralog-overannotation case.
        Although this EC-derived activity appears in current GOA/UniProt due to the
        Kim et al. in vitro assay, the local review marks those annotations for
        removal because the allowed evidence indicates the biological function is
        not TsaC/Sua5 activity. De Crécy-Lagard et al. report that YciO is a TsaC
        paralog with more than 4 orders of magnitude weaker TC-AMP production than
        E. coli TsaC and that YciO does not substitute for TsaC in vivo. The weak
        in vitro activity is best interpreted as residual/promiscuous ancestral
        activity, not the in vivo function. This is therefore PLI rather than CNN,
        despite the problematic curated EC/GO propagation.
      supported_by:
        - reference_id: PMID:37963869
          supporting_text: >-
            DeepECtransformer predicted YciO as EC:2.7.7.87 and the specific
            activity of YciO was measured to be 0.0705 U mg-1 in vitro.
        - reference_id: PMID:40703034
          supporting_text: >-
            the activity reported (0.14 nM/min TC-AMP production rate) for E. coli
            YciO is more than 4 orders of magnitude weaker than that of E. coli
            TsaC (2.8 uM/min) at the same enzyme concentration and similar reaction
            conditions.
        - reference_id: PMID:40703034
          supporting_text: >-
            YciO does not perform the same function as TsaC/Susa5 in vivo experiments.
