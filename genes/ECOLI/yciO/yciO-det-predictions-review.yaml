      summary: >-
        YciO belongs to the Sua5/TsaC(YrdC) family and the model assigned it the
        family's signature reaction (TC-AMP synthesis, the first committed step of
        t6A). That dedicated activity belongs to the TsaC/YrdC subfamily, not to its
        paralog YciO. Independent evidence: (1) a pairwise alignment shows YciO keeps
        the YrdC fold (~29% identity) but the conserved catalytic Asn of the Sua5/TsaC
        S-x-N motif is replaced (TsaC STSANL -> YciO STSLML), i.e. the active site is
        degenerate; (2) t6A is essential and tsaC/yrdC is essential despite YciO being
        present, so YciO cannot supply TC-AMP-synthase function in vivo; (3) the in
        vitro activity reported by Kim et al. 2023 (0.0705 U/mg) is weak, and UniProt
        records that YciO also hydrolyses ATP to AMP, consistent with promiscuous,
        non-productive turnover. The prediction is therefore a paralog over-annotation;
        YciO's true in vivo function remains unresolved. Assessed independently from
        the UniProt record, the DeepECTF paper's own numbers, the YciO/TsaC structures,
        and an in-house sequence/active-site comparison; the de Crecy-Lagard
        evaluation literature was not used.
