description: >-
  FepE DeepECTF prediction review. FepE was one of 12 proteins incorrectly predicted
  as histidine kinase (EC 2.7.13.3) by DeepECTF. This is a frequency-biased repetition
  error - none of the 12 predicted histidine kinases have sequence similarity to
  histidine kinase families, and 8 (including FepE) have experimentally validated
  different functions. FepE is a Wzz-family polysaccharide co-polymerase that regulates
  O-antigen chain length.
