predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:2.7.13.3
      label: histidine kinase
    predicted_term_type: EC
    review:
      assessment: REP
      confidence_score: 0
      error_type: FREQUENCY_BIAS
      summary: >-
        DeepECTF predicted histidine kinase (EC:2.7.13.3) for FepE, but the allowed
        evidence refutes a kinase assignment. The local GO review removes a related
        kinase annotation because FepE is a Wzz/PCP-1 polysaccharide co-polymerase
        with Wzz/LPS chain-length-regulator domains and no histidine kinase or
        tyrosine kinase domain. De Crécy-Lagard et al. identified FepE among a set
        of histidine kinase predictions where none had sequence similarity to
        histidine kinase families and several, including FepE, had different
        experimentally validated functions. Literature and structural evidence
        supports O-antigen chain-length regulation rather than phosphorylation. This
        is therefore a REP/frequency-bias error, not a plausible enzyme prediction.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            out of the 12 proteins annotated as histidine kinase (EC 2.7.13.3)
            in the 453 DeepECTF predictions, none of them have sequence similarity
            to histidine kinase families, and 8 have been annotated with different
            and experimentally validated functions (such as ferric enterobactin
            transport protein FepE for b0587)
        - reference_id: PMID:12603743
          supporting_text: >-
            wzzfepE, a homologue of Escherichia coli fepE, is responsible for
            the production of very long modal length LPS Oag.
        - reference_id: PMID:22437828
          supporting_text: >-
            Wzz FepE is an O-antigen chain length regulator whose mutant form
            attenuates production of very long O-antigen polymers.
