        label: plasma membrane
    supported_by:
      - reference_id: DOI:10.1038/s41586-026-10207-1
        supporting_text: >-
          SNIPE directly cleaves phage DNA during genome injection...Substituting a
          predicted catalytic residue in the nuclease domain (E414A) abolished defence
proposed_new_terms:
  - proposed_name: defense response to bacteriophage via membrane-bound nuclease
    proposed_definition: >-
      A defense response to bacteriophage in which a membrane-bound nuclease cleaves
      phage DNA during genome injection, exploiting the spatial organization of phage
      injection machinery to distinguish self from non-self DNA.
    justification: >-
      SNIPE represents a novel defense mechanism distinct from CRISPR-Cas,
      restriction-modification, and abortive infection. GO:0051607 (defense
      response to virus) is too general. A more specific term would better annotate
      the 500+ SNIPE homologues and related systems (Zorya, Kiwa).
    proposed_parent:
      id: GO:0051607
      label: defense response to virus
  - proposed_name: phage DNA endonuclease activity
    proposed_definition: >-
      Catalysis of the endonucleolytic cleavage of phage DNA during genome injection
      into the bacterial cell. The activity is directed specifically at incoming phage
      DNA by spatial association with phage injection machinery at the cell membrane.
    justification: >-
      GO:0004520 (DNA endonuclease activity) does not capture the specificity of
      SNIPE's nuclease activity for phage DNA during injection. A more specific MF
      term would distinguish this from general DNA endonuclease activities.
    proposed_parent:
      id: GO:0004520
      label: DNA endonuclease activity
suggested_questions:
  - question: >-
      What is the exact UniProt accession for the SNIPE protein characterized
      in Saxton et al. 2026? The protein was originally from prophage phiR26.1
      in a diverse E. coli strain, not E. coli K-12.
  - question: >-
      Should SNIPE homologues that use DivIVA-like domains instead of TM domains
      for membrane anchoring be considered functionally equivalent, or is the
      membrane-targeting mechanism significant for annotation?
  - question: >-
      The GIY-YIG InterPro-to-GO mapping (IPR047296 to GO:0006289, nucleotide-
      excision repair) would misannotate SNIPE homologues. Should this mapping
      be revised or should SNIPE-type proteins be excluded?
suggested_experiments:
  - description: >-
      Determine the crystal or cryo-EM structure of SNIPE in complex with the
      phage lambda tape measure protein and DNA substrate to reveal the molecular
      basis of DUF4041-mediated phage recognition.
  - description: >-
      Test SNIPE defense activity against a broader panel of phages, including
      myoviruses and podoviruses that do not use tape measure proteins, to define
      the host range of SNIPE-mediated defense.
