description: >-
  SNIPE (Surface-associated Nuclease Inhibiting Phage Entry) is a single-gene
  bacterial anti-phage defense system that constitutively localizes to the inner
  membrane of E. coli. It contains three functional domains: an N-terminal
  transmembrane domain that associates with the ManYZ complex (mannose PTS
  permease used by phages as a DNA injection receptor), a central DUF4041
  domain that binds phage tape measure protein (TMP) and incoming phage DNA,
  and a C-terminal GIY-YIG nuclease domain that directly cleaves phage DNA
  during genome injection. SNIPE achieves self/non-self discrimination through
  spatial context rather than sequence recognition — it only encounters DNA
  passing through the phage injection apparatus at the membrane. Originally
  identified as PD-lambda-1 in a functional screen of diverse E. coli strains,
  SNIPE has over 500 homologues across bacterial phyla, making it one of the
  most widespread anti-phage defense systems. It was found in prophage phiR26.1
  from the ECOR collection.
references:
  - id: DOI:10.1038/s41586-026-10207-1
    title: A membrane-bound nuclease directly cleaves phage DNA during genome injection
    findings:
      - statement: >-
          SNIPE constitutively localizes to the bacterial cell membrane and directly
          cleaves phage DNA during genome injection, as demonstrated by radiolabeled
          phage DNA tracking and time-lapse microscopy.
      - statement: >-
          SNIPE associates with host ManYZ complex and phage lambda tape measure protein
          via proximity labeling experiments.
      - statement: >-
          Catalytic residue E414 in the GIY-YIG nuclease domain and the DUF4041 domain
          are both essential for defense. deltaTM construct is toxic (cleaves host DNA)
          unless E414A mutation is introduced.
      - statement: >-
          500+ SNIPE homologues found across bacterial phyla. 33% of well-sequenced
          bacterial clades harbor at least one homologue. GIY-YIG domain is most
          conserved; N-terminal region is most variable.
      - statement: >-
          SNIPE also defends against diverse siphoviruses through interactions with
          their tape measure proteins.
  - id: PMID:36123438
    title: A functional selection reveals previously undetected anti-phage defence systems in the E. coli pangenome
    findings:
      - statement: >-
          PD-lambda-1 (later renamed SNIPE) was identified in a functional selection screen
          of 71 diverse E. coli strains. It was one of 21 conserved defense systems found,
          none of which were previously detected as enriched in defense islands.
  - id: DOI:10.1371/journal.ppat.1013959
    title: "It's not me, it's you: Anti-phage nuclease specificity inside a bacterium"
    findings:
      - statement: >-
          SNIPE is placed alongside Zorya and Kiwa as membrane-localized defense systems
          that use spatial localization as a specificity determinant for distinguishing
          self from non-self DNA.
existing_annotations: []
core_functions:
  - description: >-
      Membrane-bound anti-phage nuclease. SNIPE constitutively localizes to the inner
      membrane via its N-terminal TM domain and associates with the ManYZ mannose PTS
      complex. Upon phage infection, the DUF4041 domain binds the phage tape measure
      protein and incoming DNA, positioning the GIY-YIG nuclease domain to cleave phage
      DNA during genome injection. This provides defense against phage lambda and diverse
      siphoviruses.
