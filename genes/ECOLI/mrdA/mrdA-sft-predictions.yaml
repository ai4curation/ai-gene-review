  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      Correct. GO:0008696 (serine-type D,D-peptidase activity) corresponds to
      EC 3.4.16.4 and captures the transpeptidase mechanism of MrdA/PBP2. MrdA
      catalyzes cross-linking of peptidoglycan stem peptides via the active site
      serine (Ser330) forming an acyl-enzyme intermediate, with subsequent
      transpeptidation. The curated review annotates GO:0008696 as ACCEPT. COR
      because this correctly distinguishes MrdA as a D,D-transpeptidase from the
      many other serine protease families and is substantiated by biochemical and
      structural evidence (PMID:1103132, PMID:37620344).
