  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      Correct. GO:0008360 (regulation of cell shape) is in the curated GOA for
      MrdA (IEA from GO_REF:0000043, accepted in the curated review). Unlike
      FtsI (which is specifically for division), MrdA/PBP2 is the penicillin-
      binding protein specifically responsible for cell rod morphology -- its
      inhibition by mecillinam produces spherical cells (PMID:1103132), directly
