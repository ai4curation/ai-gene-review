  predicted_term:
    id: GO:0046677
    label: response to antibiotic
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      Incorrect. GO:0046677 (response to antibiotic) is not a biological process
      for MrdA in the curated review. MrdA is a target of beta-lactam antibiotics
      (mecillinam, ampicillin) and DBO inhibitors (avibactam), but being inhibited
      by an antibiotic is not the same as participating in a response to antibiotics.
      The "response to antibiotic" process refers to genes in adaptive or resistance
      pathways (e.g., efflux pumps, beta-lactamases, transcriptional regulators).
      This confuses MrdA's role as an antibiotic target with participation in an
      antibiotic response. Not in the curated GOA.
    error_type: FREQUENCY_BIAS
