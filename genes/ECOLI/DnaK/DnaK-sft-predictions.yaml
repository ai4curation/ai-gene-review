  review:
    assessment: NPI
    confidence_score: 0
    error_type: PARALOG_OVERANNOTATION
    summary: >-
      DnaK does not have a zinc-binding domain. DnaK (Hsp70) lacks the cysteine-rich
      zinc finger domain that is present in its co-chaperone DnaJ. The curated
      review does not include a zinc ion binding annotation for DnaK. The prediction
      likely arose from confusion with DnaJ, which does bind zinc. This is NPI --
      the prediction is refuted by DnaK's well-characterized domain structure
      (N-terminal ATPase NBD + C-terminal substrate-binding SBD with lid).
