description: >-
  BioReason-Pro SFT predictions for DnaK (ECOLI). 16 GO terms extracted from HF
  protein_catalogue. DnaK is the E. coli Hsp70, an ATP-dependent cytoplasmic
  foldase. Core functions include protein folding chaperone (GO:0044183), ATP
  hydrolysis (GO:0016887), unfolded protein binding (GO:0051082), ATP binding
  (GO:0005524), ADP binding (GO:0043531), sigma factor antagonist activity
  (GO:0016989), and cytosol localization (GO:0005829). Most predictions are CNN
  (already annotated). Zinc ion binding is NPI -- DnaK does not have a zinc-binding
  domain. Membrane is NPI for the cytoplasmic DnaK. Inclusion body is NPI.
  Protein-containing complex disassembly is a legitimate non-core function.
