id: P0AE85
gene_symbol: CpxP
taxon:
  id: uniprot:ECOLI
  label: ECOLI
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for CpxP (ECOLI). 5 GO terms extracted from
  HF protein_catalogue. Assessment: 1 CNN (GO:0030288 periplasmic space, correct
  and in GOA), 1 CNN/over-generic (GO:0005515 protein binding, in GOA but too
  vague), and 3 NPI/REP errors. The SFT model's chaperone predictions
  (GO:0044183, GO:0061077) reflect frequency bias toward canonical chaperone
  annotations and mischaracterize CpxP, whose primary functions are signaling
  inhibitor activity (inhibiting CpxA autophosphorylation) and periplasmic
  adaptor for DegP-mediated proteolysis — not general protein folding chaperone
  activity. GO:0014070 (response to organic cyclic compound) has no experimental
  support and appears to be a spurious prediction.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
# Prediction 1: protein folding chaperone (MF)
# CpxP has only "mild protein chaperone activity" (PMID:21317898); its primary
# functions are CpxA inhibition and DegP adaptor activity. "Protein folding
# chaperone" mischaracterizes the protein as a general chaperone. Not in GOA.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0044183
    label: protein folding chaperone
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    error_type: FREQUENCY_BIAS
    summary: >-
      CpxP is not a general protein folding chaperone. UniProt explicitly
      describes it as having only "mild protein chaperone activity" (PMID:21317898),
      and the curated review marks the existing unfolded protein binding (GO:0051082)
      annotations as MARK_AS_OVER_ANNOTATED. CpxP's primary evolved functions are
      inhibition of CpxA sensor kinase autophosphorylation (signaling receptor
      inhibitor activity, GO:0030547) and serving as a periplasmic adaptor that
      delivers misfolded substrates to DegP protease. The chaperone prediction
      likely reflects frequency bias in the training data toward canonical
      chaperone terms for proteins that interact with misfolded proteins.
      Not present in GOA.

# Prediction 2: protein binding (MF)
# Present in GOA with IDA evidence (PMID:17259177, PMID:25207645). However,
# the curated review recommends MODIFY to GO:0030547 (signaling receptor
# inhibitor activity) as "protein binding" is too vague and uninformative.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 1
    summary: >-
      GO:0005515 (protein binding) is present in GOA with IDA evidence from
      two publications (PMID:17259177, PMID:25207645), both demonstrating direct
      physical interaction between CpxP and the sensor kinase CpxA. The term is
      therefore correct and not novel (CNN). However, the curated review
      recommends replacing it with the more informative GO:0030547 (signaling
      receptor inhibitor activity), since CpxP binds CpxA specifically to inhibit
      its autophosphorylation activity. The prediction is accurate but uninformative
      — a less precise characterization than what the biology warrants.

# Prediction 3: chaperone-mediated protein folding (BP)
# Not in GOA. CpxP is not a canonical chaperone and does not promote protein
# folding. Its interaction with misfolded proteins is in service of DegP-mediated
# degradation and Cpx signaling modulation, not folding assistance.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0061077
    label: chaperone-mediated protein folding
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: FREQUENCY_BIAS
    summary: >-
      CpxP does not mediate protein folding. The protein binds misfolded periplasmic
      substrates (e.g., PapE pilus subunits) not to refold them, but to deliver
      them to the DegP protease for degradation (PMID:16303867) and to modulate
      CpxA signaling. The curated review marks the unfolded protein binding
      annotations (GO:0051082) as MARK_AS_OVER_ANNOTATED because CpxP has only
      mild chaperone activity and its primary role is adaptor/inhibitor. This
      prediction reflects frequency bias: proteins annotated with stress-response
      and misfolded-protein interactions tend to be over-predicted as chaperones.
      Not present in GOA.

# Prediction 4: response to organic cyclic compound (BP)
# Not in GOA. No experimental evidence supports a specific role for CpxP in
# responding to organic cyclic compounds. This appears to be a spurious prediction
# with no mechanistic basis.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0014070
    label: response to organic cyclic compound
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      No experimental evidence supports a role for CpxP in responding to organic
      cyclic compounds. CpxP responds to envelope stress signals including alkaline
      pH, high salt, and misfolded periplasmic proteins (PMID:9473036, PMID:25207645).
      The curated GOA includes GO:0006950 (response to stress) with IDA evidence,
      but nothing related to organic cyclic compounds. This appears to be a spurious
      prediction with no mechanistic basis. Not present in GOA.

# Prediction 5: outer membrane-bounded periplasmic space (CC)
# Present in GOA with both IDA (PMID:9473036, EcoCyc) and IBA (GO_REF:0000033,
# GO_Central) evidence. This is a well-established and correct localization.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0030288
    label: outer membrane-bounded periplasmic space
  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      GO:0030288 (outer membrane-bounded periplasmic space) is well-supported in
      GOA by IDA evidence (PMID:9473036) and IBA evidence (GO_REF:0000033). CpxP
      has a signal peptide (residues 1-21) that directs it to the periplasm, and
      its periplasmic localization is essential for its function as an inhibitor
      of the periplasmic sensor domain of CpxA. The curated review ACCEPTs this
      annotation. This is a correct prediction, but not novel (CNN). Notably, the
      RL narrative review scored poorly on localization — BioReason-RL incorrectly
      described CpxP as "cytoplasmic," while the SFT model correctly identifies
      the periplasmic localization.
