id: P0AE85
gene_symbol: CpxP
taxon:
  id: uniprot:ECOLI
  label: ECOLI
status: COMPLETE
description: >-
  BioReason-Pro SFT predictions for CpxP (ECOLI). 5 GO terms extracted from
  HF protein_catalogue. Assessment: 1 CNN (GO:0030288 periplasmic space, correct
  and in GOA), 1 CNN/over-generic (GO:0005515 protein binding, in GOA but too
  vague), and 3 NPI/REP errors. The SFT model's chaperone predictions
  (GO:0044183, GO:0061077) reflect frequency bias toward canonical chaperone
  annotations and mischaracterize CpxP, whose primary functions are signaling
  inhibitor activity (inhibiting CpxA autophosphorylation) and periplasmic
  adaptor for DegP-mediated proteolysis — not general protein folding chaperone
  activity. GO:0014070 (response to organic cyclic compound) has no experimental
  support and appears to be a spurious prediction.
references:
- id: doi:10.64898/2026.03.19.712954
  title: BioReason-Pro (Fallahpour et al. 2026)
predictions:
# Prediction 1: protein folding chaperone (MF)
# CpxP has only "mild protein chaperone activity" (PMID:21317898); its primary
# functions are CpxA inhibition and DegP adaptor activity. "Protein folding
# chaperone" mischaracterizes the protein as a general chaperone. Not in GOA.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0044183
    label: protein folding chaperone
  predicted_term_type: GO_MF
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      Uncertain rather than refuted. CpxP has reported mild protein-chaperone activity, but its established
      core roles are CpxA inhibition and delivery of misfolded substrates to DegP. The available evidence
      does not establish a general protein-folding chaperone function, yet it also does not support a confident
      NPI call.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0005515
    label: protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      GO:0005515 (protein binding) is present in GOA with IDA evidence from two publications (PMID:17259177,
      PMID:25207645), both demonstrating direct physical interaction between CpxP and the sensor kinase
      CpxA. The term is therefore correct and not novel (CNN). However, the curated review recommends replacing
      it with the more informative GO:0030547 (signaling receptor inhibitor activity), since CpxP binds
      CpxA specifically to inhibit its autophosphorylation activity. The prediction is accurate but uninformative
      — a less precise characterization than what the biology warrants.
