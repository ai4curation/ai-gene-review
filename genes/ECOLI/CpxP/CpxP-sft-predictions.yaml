  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0061077
    label: chaperone-mediated protein folding
  predicted_term_type: GO_BP
  review:
    assessment: UNC
    confidence_score: 1
    summary: >-
      [FROZEN_ONTOLOGY_ADJUDICATION] Assessed the supplied GO ID rather than the intended raw label: GO:0061077
      is 'obsolete chaperone-mediated protein folding'. The canonical GO term is not resolved by the current
      reference evidence. The pair is classified UNC; the raw source pair remains unchanged. Historical
      rationale about the intended raw label is retained below for provenance, not as support for the canonical
      GO ID: Uncertain rather than refuted. CpxP binds misfolded periplasmic proteins and has mild chaperone
      activity, but direct participation in productive protein folding is not established. Its adaptor role
      in DegP degradation does not by itself prove or disprove this broader process prediction. [ONTOLOGY_LABEL_AUDIT]
      Raw model pair mismatch: GO:0061077 resolves to 'obsolete chaperone-mediated protein folding', not
      'chaperone-mediated protein folding'. The raw ID and label are retained for provenance; the assessment
      applies to the GO ID and explicitly flags the label error.
