    relevance: HIGH
    correctness: DISPUTED
    review_notes: >-
      Correctly cited as the source of the robust in vitro glucose 1-dehydrogenase
      activity and EC assignment for YgfF. The biochemical activity is well supported,
      but its interpretation as YgfF's physiological function is contested: glucose
      oxidation is not an established E. coli K-12 pathway, SDRs are promiscuous, and
      the paper itself notes YgfF's closest homolog is a 3-oxoacyl-ACP reductase.
suggested_questions:
- question: >-
    What is YgfF's physiological substrate - a sugar, a 3-oxoacyl/keto substrate
    (FabG-like), or another alcohol/ketone - and in which pathway does it act?
- question: >-
    Does a ygfF deletion produce any metabolic phenotype, and does YgfF contribute to
    fatty-acid/polyketide or sugar-acid metabolism in vivo?
suggested_experiments:
- description: >-
    Full kinetic characterization (kcat, KM) of YgfF against glucose versus
    3-oxoacyl-CoA/ACP and other ketone/alcohol substrates, with NAD+ vs NADP+, to
    determine the catalytically preferred (likely physiological) substrate.
- description: >-
    Metabolomic and lipidomic profiling of a ygfF deletion strain to detect an
    accumulating substrate or product.
- description: >-
    Phylogenetic placement of YgfF within the SDR superfamily relative to FabG and
    characterized glucose dehydrogenases to predict the physiological reaction.
status: DRAFT
