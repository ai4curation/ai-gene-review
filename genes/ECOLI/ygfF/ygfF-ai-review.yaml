id: P52037
gene_symbol: ygfF
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YgfF is a cytoplasmic NAD(H)-dependent oxidoreductase of the classical short-chain
  dehydrogenase/reductase (SDR) superfamily (COG1028; Pfam adh_short_C2; Rossmann
  NAD-binding fold) in E. coli K-12, with the canonical SDR catalytic machinery
  (catalytic Tyr at position 156 and an N-terminal NAD-binding motif). Purified
  recombinant YgfF robustly oxidizes D-glucose to D-glucono-1,5-lactone with NAD+
  in vitro (specific activity comparable to dedicated bacterial glucose
  1-dehydrogenases), which is the basis of its current UniProt EC:1.1.1.47 name.
  However, E. coli K-12 has no established cytoplasmic NAD-dependent glucose-oxidation
  pathway (glucose is taken up and phosphorylated by the PTS), SDR enzymes are
  characteristically promiscuous toward sugars and other alcohols, and YgfF's nearest
  sequence relatives are 3-oxoacyl-[acyl-carrier-protein] reductases (FabG-like;
  EC 1.1.1.100). Its physiological substrate and metabolic role therefore remain
  unresolved; the protein is best described as an NAD-dependent CH-OH oxidoreductase
  of unknown dedicated substrate.
existing_annotations:
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) assignment of generic oxidoreductase activity, consistent
      with the SDR fold and the NAD-binding/Tyr-based catalytic machinery.
    action: ACCEPT
    reason: >-
      YgfF is unambiguously an SDR-family NAD(H)-dependent oxidoreductase; this
      general molecular-function term is correct and appropriately conservative.
- term:
    id: GO:0016614
    label: oxidoreductase activity, acting on CH-OH group of donors
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      More specific (but still general) molecular-function term capturing that YgfF
      oxidizes a hydroxyl-bearing substrate using NAD+.
    action: ACCEPT
    reason: >-
      Well supported by the demonstrated NAD+-dependent oxidation of a CH-OH
      substrate (glucose, in vitro) and by SDR-family chemistry. This is the most
      defensible level of molecular-function specificity given that the physiological
      substrate is unknown.
- term:
    id: GO:0047934
    label: glucose 1-dehydrogenase (NAD+) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: >-
      Specific molecular-function term (Rhea/EC mapping) reflecting the in vitro
      glucose 1-dehydrogenase activity reported by Kim et al. 2023; mirrors the IDA
      below.
    action: KEEP_AS_NON_CORE
    reason: >-
      The in vitro activity is genuine and robust, so the term is retained, but it is
      kept as non-core because glucose oxidation is not an established E. coli K-12
      pathway and SDRs are promiscuous; this is likely an in-vitro/promiscuous activity
      rather than the protein's dedicated physiological function.
- term:
    id: GO:0047936
    label: glucose 1-dehydrogenase [NAD(P)+] activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      EC-to-GO term for the dual-cofactor [NAD(P)+] glucose 1-dehydrogenase activity.
      The experimental assay specifically used NAD+ (the reaction scheme shows
      NAD -> NADH), so the NAD(P)+ form is less precisely supported.
    action: KEEP_AS_NON_CORE
    reason: >-
      Same rationale as the NAD+ glucose-dehydrogenase term: a real in vitro activity
      that is kept as non-core. The NADP+ cofactor was not specifically demonstrated,
      so this dual-cofactor term is additionally over-precise.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:15690043
  qualifier: enables
  review:
    summary: >-
      Generic "protein binding" from a large-scale affinity-purification interaction
      study. Uninformative about molecular function.
    action: KEEP_AS_NON_CORE
    reason: >-
      High-throughput interaction data; the bare "protein binding" term carries no
      functional information for YgfF and is not part of its core enzymatic function.
- term:
    id: GO:0047934
    label: glucose 1-dehydrogenase (NAD+) activity
  evidence_type: IDA
  original_reference_id: PMID:37963869
  qualifier: enables
  review:
    summary: >-
      Experimental in vitro annotation from the DeepECTF study (Kim et al. 2023),
      which purified YgfF and measured a high specific glucose 1-dehydrogenase
      activity (305.55 U/mg, NAD+).
    action: KEEP_AS_NON_CORE
    reason: >-
      The activity is robustly demonstrated in vitro, so the annotation is retained,
      but it should not be treated as YgfF's core/physiological function. E. coli K-12
      has no cytoplasmic NAD-glucose-dehydrogenase pathway; SDRs are broadly
      promiscuous; and YgfF's closest sequence relatives are 3-oxoacyl-ACP reductases
      (FabG-like, EC 1.1.1.100), suggesting its true role may be ketoreduction rather
      than glucose oxidation. Kept as a demonstrated but non-core activity.
    supported_by:
    - reference_id: PMID:37963869
      supporting_text: >-
        the enzyme assay results showed that YgfF exhibited a specific glucose
        1-dehydrogenase activity of 305.55 U mg-1
    - reference_id: PMID:37963869
      supporting_text: >-
        although YgfF exhibited a higher sequence identity with a different enzyme
        (A0A069CGU9_ECOLX; EC:1.1.1.100) from the training dataset than glucose
        1-dehydrogenase exhibiting the maximum sequence identity within the training
        dataset, the neural network made an accurate prediction
core_functions:
- description: >-
    Cytoplasmic SDR-family NAD(H)-dependent oxidoreductase acting on a CH-OH
    substrate. It robustly oxidizes D-glucose in vitro, but its physiological
    substrate/role is unresolved and it is most closely related to FabG-like
    3-oxoacyl-ACP reductases, so the specific glucose-dehydrogenase assignment is not
    treated as the core function.
  molecular_function:
    id: GO:0016614
    label: oxidoreductase activity, acting on CH-OH group of donors
  supported_by:
