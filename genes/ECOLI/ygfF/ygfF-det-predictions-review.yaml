taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  YgfF DeepECTF prediction review. The DeepECTF prediction of glucose 1-dehydrogenase
  (EC 1.1.1.47) is a successful prediction, validated by SDR nomenclature classification
  (SDR63C subgroup) and consistent with published biochemical data.
references:
  - id: PMID:37963869
    title: Functional annotation of enzyme-encoding genes using deep learning with transformer layers
  - id: PMID:40703034
    title: Limitations of current ML models in predicting enzymatic functions (de Crécy-Lagard et al. 2025)
source_documents:
  - genes/ECOLI/ygfF/ygfF-ai-review.yaml
  - genes/ECOLI/ygfF/ygfF-uniprot.txt
  - genes/ECOLI/ygfF/ygfF-goa.tsv
  - genes/ECOLI/ygfF/ygfF-deep-research-falcon.md
  - publications/PMID_37963869.md
predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:1.1.1.47
      label: glucose 1-dehydrogenase
    predicted_term_type: EC
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        The predicted EC:1.1.1.47 assignment is correct, but it is no longer novel
        relative to the curated local annotation set. UniProt and GOA already record
        glucose 1-dehydrogenase activity for YgfF, including the more specific GO
        term GO:0047934 for glucose 1-dehydrogenase (NAD+) activity. Kim et al.
        predicted this EC number and validated recombinant YgfF in vitro with a
        glucose dehydrogenase assay. The existing gene review accepts the exact
        activity as the core molecular function and notes that SDR63C subgroup
        classification is concordant with this assignment. This is therefore CNN:
        a correct prediction already represented in curated annotations.
      supported_by:
        - reference_id: PMID:37963869
          supporting_text: >-
            For YgfF, DeepECtransformer predicted its EC number to be EC:1.1.1.47
            (glucose 1-dehydrogenase). The enzyme assay results showed that YgfF
            exhibited a specific glucose 1-dehydrogenase activity of 305.55 U mg-1.
        - reference_id: PMID:40703034
          supporting_text: >-
            This resource predicts YgfF is part of the SDR63C/Glucose
            1-dehydrogenase subgroup, the activity predicted and validated in the
            Kim et al. study.
