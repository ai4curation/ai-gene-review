predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:1.1.1.47
      label: glucose 1-dehydrogenase
    predicted_term_type: EC
    review:
      assessment: UNC
      confidence_score: 1
      summary: >-
        Unlike a weak/promiscuous hit, YgfF's predicted activity is robustly
        demonstrated in vitro (305.55 U/mg, comparable to dedicated bacterial glucose
        dehydrogenases), and YgfF has an intact SDR catalytic apparatus (Tyr156,
        NAD-binding motif), so the biochemical prediction is correct at the activity
        level. However, the allowed evidence cannot establish that glucose
        1-dehydrogenase is YgfF's biological function: (i) E. coli K-12 has no
        cytoplasmic NAD-glucose-dehydrogenase pathway (glucose enters via the PTS);
        (ii) SDR enzymes are notoriously promiscuous, so a high in vitro rate on
        glucose does not prove glucose is the physiological substrate; and (iii) Kim
        et al. note YgfF's nearest training homolog is a 3-oxoacyl-ACP reductase
        (EC 1.1.1.100, FabG-like), suggesting a ketoreductase rather than
        sugar-oxidase role. Because the activity is real but its in vivo relevance is
        unresolved (and the true substrate unknown), the prediction is judged
        uncertain rather than confidently correct or incorrect. This contrasts with
        YciO, where the activity is weak and the active site degenerate (a clearer
        over-annotation). Assessed independently from the UniProt record, the DeepECTF
        paper's own data, and SDR/EC pathway reasoning; the de Crecy-Lagard evaluation
        literature was not used.
