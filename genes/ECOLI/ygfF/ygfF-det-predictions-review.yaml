id: P52037
gene_symbol: ygfF
locus_tag: b2902
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YgfF (P52037). The model
  predicts glucose 1-dehydrogenase activity (EC 1.1.1.47), which Kim et al. 2023
  validated in vitro with a high specific activity (305.55 U/mg, NAD+). The
  biochemical activity is robust and not in dispute. What is uncertain is whether
  glucose oxidation is YgfF's physiological function: E. coli K-12 has no established
  cytoplasmic NAD-dependent glucose-1-dehydrogenase pathway (glucose is taken up and
  phosphorylated by the PTS), the SDR superfamily is characteristically promiscuous
  toward sugars/alcohols, and the prediction paper itself notes YgfF's closest
  sequence relative is a 3-oxoacyl-ACP reductase (FabG-like, EC 1.1.1.100). The
  in vitro activity therefore cannot be taken as proof of the in vivo role, but it
  also cannot be refuted; the physiological substrate of this SDR remains unresolved.
references:
  - id: PMID:37963869
    title: Functional annotation of enzyme-encoding genes using deep learning with transformer layers
