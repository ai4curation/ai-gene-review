id: P46857
gene_symbol: yrhB
locus_tag: b3446
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli K-12
status: COMPLETE
description: >-
  YrhB DeepECTF prediction review. The DeepECTF prediction of 6-carboxytetrahydropterin
  synthase (EC 4.1.2.50) is incorrect. This activity is already catalyzed by QueD/b2765
  in E. coli, and queD mutants lack this activity entirely, demonstrating no redundancy.
  YrhB contains an Imm35 domain suggesting a role in bacteriocin immunity.
references:
  - id: PMID:37963869
    title: Functional annotation of enzyme-encoding genes using deep learning with transformer layers
  - id: PMID:40703034
    title: Limitations of current ML models in predicting enzymatic functions (de Crécy-Lagard et al. 2025)
source_documents:
  - genes/ECOLI/yrhB/yrhB-ai-review.yaml
  - genes/ECOLI/yrhB/yrhB-uniprot.txt
  - genes/ECOLI/yrhB/yrhB-goa.tsv
  - genes/ECOLI/yrhB/yrhB-deep-research-falcon.md
predictions:
  - source_method: DeepECTF
    source_version: "2023"
    source_reference_id: PMID:37963869
    predicted_term:
      id: EC:4.1.2.50
      label: 6-carboxytetrahydropterin synthase
    predicted_term_type: EC
    review:
      assessment: NPI
      confidence_score: 0
      error_type: PATHWAY_CONTEXT_IGNORED
      summary: >-
        The EC:4.1.2.50 prediction for YrhB is refuted by organismal and curated
        pathway context rather than by a close-paralog substrate swap. The local
        review records no existing GOA enzyme annotation for YrhB and UniProt
        describes it as an uncharacterized protein with an Imm35 domain, supporting
        a bacteriocin-immunity/inhibitor-family interpretation rather than queuosine
        biosynthesis. De Crécy-Lagard et al. specifically note that E. coli already
        encodes 6-carboxytetrahydropterin synthase as QueD/b2765 and that a queD
        mutant lacks this activity. Because the predicted reaction is assigned to a
        different E. coli gene and is unsupported for YrhB, this is a nonparalog
        incorrect prediction.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            YrhB/b3446 is predicted to be a 6-carboxytetrahydropterin synthase
            (EC 4.1.2.50), but E. coli already encodes this enzyme (QueD/b2765)
            and a queD mutant lacks this activity.
        - reference_id: file:ECOLI/yrhB/yrhB-uniprot.txt
          supporting_text: >-
            UniProt lists YrhB as an uncharacterized protein with an Imm35 domain
            and no EC number or GO enzyme activity.
