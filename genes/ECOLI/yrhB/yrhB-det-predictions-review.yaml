  label: Escherichia coli K-12
status: COMPLETE
description: >-
  Independent review of the DeepECTF EC prediction for YrhB (P46857). The model
  predicts 6-carboxytetrahydropterin synthase activity (EC 4.1.2.50), the first step
  of queuosine biosynthesis. The prediction is rejected. YrhB is a 94-residue
  protein whose only recognizable feature is an Imm35 (colicin/bacteriocin-immunity)
  domain; it has no homology to the 6-carboxytetrahydropterin synthase enzyme and
  lacks any 6-pyruvoyltetrahydropterin-synthase (PTPS) tunnel fold. In E. coli this
  step is catalyzed by the dedicated, structurally unrelated enzyme QueD (ygcM,
  b2765), so the activity is neither missing nor plausibly provided by an immunity
  protein. The prediction has no structural basis and assigns an enzymatic activity,
  already accounted for by QueD, to an unrelated small protein.
