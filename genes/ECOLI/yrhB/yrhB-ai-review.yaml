id: P46857
gene_symbol: yrhB
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YrhB is a small (94 aa, 10.6 kDa) uncharacterized protein in E. coli K12 encoded by b3446.
  It belongs to the Imm35 (Immunity protein 35) family (Pfam PF15567 / InterPro IPR029082),
  which was identified computationally as part of the polymorphic toxin system immunity
  protein repertoire (Zhang et al. 2012, PMID:22731697). Imm35 family proteins are predicted
  to confer immunity against Ntox40-type toxin domains in bacterial inter-cellular competition
  systems. A study in BL21(DE3) reported chaperone-like activity for YrhB under heat shock
  conditions (Ahn et al. 2012, PMID:22569261), though this has not been independently confirmed
  in K12 and the primary evolved function is more likely related to its Imm35 domain.
  The protein remains at UniProt evidence level PE 4 (Predicted).
  Notably, DeepECTF (a deep learning enzyme function predictor) incorrectly predicted
  EC 4.1.2.50 (6-carboxytetrahydropterin synthase) for YrhB (de Crecy-Lagard et al. 2025,
  PMID:40703034). This is a logic error because E. coli already encodes the bona fide
  6-carboxytetrahydropterin synthase as QueD (b2765), and a queD mutant lacks this
  activity (Zallot et al. 2014, PMID:24914732), proving there is no functional redundancy
  with YrhB.
tags:
  - uncharacterized
  - polymorphic-toxin-system
  - ML-misannotation-case-study
existing_annotations:
# NOTE: The GOA file for yrhB (P46857) returned 0 annotations from QuickGO.
# This is consistent with UniProt PE level 4 (Predicted) and RecName "Uncharacterized protein YrhB".
# There are no existing GO annotations to review.
# Below we propose annotations based on domain architecture and literature evidence.

- term:
    id: GO:0030153
    label: bacteriocin immunity
  evidence_type: ISS
  original_reference_id: PMID:22731697
  review:
    summary: >-
      YrhB contains the Imm35 domain (Pfam PF15567, InterPro IPR029082), which was
      identified by Zhang et al. (2012) as an immunity protein family in polymorphic
      toxin systems. Imm35 proteins are predicted to neutralize Ntox40-type toxin
      domains. While not experimentally validated for YrhB specifically, the domain
      assignment is robust and based on comprehensive bioinformatic analysis of
      polymorphic toxin-immunity gene neighborhoods across bacteria.
    action: NEW
    reason: >-
      The Imm35 domain (PF15567) is the only recognized domain in YrhB. Zhang et al.
      (2012) systematically characterized immunity protein families in bacterial
      polymorphic toxin systems using comparative genomics, identifying Imm35 as
      conferring immunity against Ntox40-type toxins. GO:0030153 (bacteriocin immunity)
      is the closest available GO biological process term for this predicted function.
      This would be an ISS-level annotation based on sequence similarity to characterized
      immunity protein families.
    additional_reference_ids:
      - PMID:22731697
    supported_by:
      - reference_id: PMID:22731697
        supporting_text: >-
          Polymorphic toxin systems: Comprehensive characterization of trafficking modes,
          processing, mechanisms of action, immunity and ecology using comparative genomics
          [Zhang et al. identified Imm35 (PF15567) as an immunity protein family associated
          with Ntox40-type toxin domains in bacterial polymorphic toxin systems]

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: ISS
  original_reference_id: PMID:22731697
  review:
    summary: >-
      Immunity proteins in polymorphic toxin systems are typically cytoplasmic, as they
      must be present in the cytoplasm to protect the producing cell from auto-intoxication.
      The Ahn et al. (2012) study also identified YrhB as a cytoplasmic protein in BL21(DE3).
    action: NEW
    reason: >-
      Immunity proteins in polymorphic toxin systems are characteristically cytoplasmic.
      Ahn et al. (2012, PMID:22569261) showed YrhB is a soluble intracellular protein.
      Cytoplasmic localization is consistent with both the immunity protein function and
      the experimental data from BL21(DE3).
    additional_reference_ids:
      - PMID:22569261
    supported_by:
      - reference_id: PMID:22569261
        supporting_text: >-
          Escherichia coli YrhB (10.6 kDa) from strain BL21(DE3) [is] a stable
          chaperone-like protein...through systematic proteome-wide analyses, the
          intracellular level of YrhB was found to significantly increase only in
          response to heat shock

references:
- id: PMID:22731697
  title: >-
    Polymorphic toxin systems: Comprehensive characterization of trafficking modes,
    processing, mechanisms of action, immunity and ecology using comparative genomics
  findings:
    - statement: >-
        Imm35 (PF15567) was identified as an immunity protein family in bacterial
        polymorphic toxin systems, associated with Ntox40-type toxin domains.
      supported_by:
        - reference_id: PMID:22731697
          supporting_text: >-
            [Zhang et al. 2012 characterized over 150 toxin domains and over 90
            immunity protein families in polymorphic toxin systems across bacteria.
            Imm35 was identified as conferring immunity against Ntox40 toxin domains.]
- id: PMID:22569261
  title: >-
    YrhB is a highly stable small protein with unique chaperone-like activity in
    Escherichia coli BL21(DE3)
  findings:
    - statement: >-
        YrhB from E. coli BL21(DE3) showed chaperone-like activity: it prevented
        heat-induced aggregation of PurK, promoted in vitro refolding of uridine
        phosphorylase, and reduced inclusion body formation. YrhB was upregulated
        only under heat shock. However, this was demonstrated in BL21(DE3), not K12.
      supported_by:
        - reference_id: PMID:22569261
          supporting_text: >-
            Escherichia coli YrhB (10.6 kDa) from strain BL21(DE3) that is commonly
            used for protein overexpression is a stable chaperone-like protein and
            indispensable for supporting the growth of BL21(DE3) at 48 degrees C but
            not defined as conventional heat shock protein (HSP)...YrhB effectively
            prevented heat-induced aggregation of ribonucleotide synthetase (PurK),
            and without ATP, YrhB alone promoted in vitro refolding of uridine
            phosphorylase (UDP)...Unlike conventional small HSPs, YrhB remained monomer
            under heat shock condition
- id: PMID:40703034
  title: >-
    de Crecy-Lagard et al. 2025 - Analysis of DeepECTF enzyme function predictions
  findings:
    - statement: >-
        DeepECTF incorrectly predicted EC 4.1.2.50 (6-carboxytetrahydropterin synthase)
        for YrhB. This is a logic error because E. coli already encodes this enzyme
        as QueD (b2765), and a queD mutant lacks the activity entirely.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            [DeepECTF predicted EC 4.1.2.50 for YrhB, classified as NPI (Non-Paralog
            Incorrect). E. coli already encodes 6-carboxytetrahydropterin synthase as
            QueD/b2765. A queD mutant lacks this activity, proving QueD is the
            responsible gene and YrhB cannot have this function.]
    - statement: >-
        This exemplifies how ML models can ignore existing gene-function assignments
        in the organism, leading to logically impossible predictions.
      supported_by:
        - reference_id: PMID:40703034
          supporting_text: >-
            [The case of yrhB/QueD demonstrates that supervised ML models cannot
            account for the biological context of existing functional assignments
            when predicting enzyme functions for uncharacterized genes.]
- id: PMID:9278503
  title: The complete genome sequence of Escherichia coli K-12
  findings:
    - statement: yrhB (b3446) was identified in the E. coli K12 genome sequencing.

core_functions:
- statement: >-
    Predicted immunity protein in polymorphic toxin system. YrhB contains the Imm35
    domain (PF15567), a computationally identified immunity protein family that is
    predicted to confer resistance against Ntox40-type toxin domains in bacterial
    inter-cellular competition. This remains the most likely core function based on
    domain architecture, though it has not been experimentally validated for YrhB.
  findings:
    - statement: >-
        Domain-based function prediction: Imm35 immunity protein
      supported_by:
        - reference_id: PMID:22731697
          supporting_text: >-
            [Imm35 (PF15567) identified as immunity protein family against Ntox40
            toxin domains in polymorphic toxin systems]

proposed_new_terms: []

suggested_questions:
  - >-
    What is the cognate toxin for YrhB/Imm35 in E. coli K12? Is there an Ntox40-type
    toxin gene in the genomic neighborhood of yrhB (b3446)?
  - >-
    Is the chaperone-like activity reported by Ahn et al. (2012) in BL21(DE3) a
    moonlighting function, or is it an artifact of high-level expression? Does K12
    YrhB show the same activity?
  - >-
    Has the DeepECTF misprediction of EC 4.1.2.50 for YrhB been propagated into any
    databases?

suggested_experiments:
  - >-
    Test whether yrhB deletion in K12 affects susceptibility to polymorphic toxins
    from competing strains, particularly those encoding Ntox40-type toxin domains.
  - >-
    Examine the genomic neighborhood of yrhB (b3446) for adjacent toxin-encoding genes
    to identify the cognate toxin.
  - >-
    Replicate the chaperone-like activity assays from Ahn et al. (2012) using purified
    K12 YrhB to determine if this is strain-specific.
