id: P23839
gene_symbol: yicC
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: YicC is an endoribonuclease (EC 3.1.26.-) belonging to the highly conserved
  YicC/YloC family (UPF0701). It endonucleolytically cleaves single-stranded RNA,
  generating products with 3'-OH and 5'-phosphate ends, with a preference for pyrimidine
  residues (PMID:34815358). YicC is a metal-dependent enzyme requiring divalent cations
  (Mg2+, Mn2+, or Co2+) for activity. In vivo, YicC triggers rapid degradation of
  the iron-responsive small RNA RyhB via collaboration with the 3'-to-5' exoribonuclease
  PNPase, suggesting it functions to initiate endonucleolytic cleavage of sRNA targets
  that are then processively degraded by PNPase (PMID:34210798, PMID:34815358). YicC
  exists in an oligomeric form, likely a hexamer, similar to the B. subtilis ortholog
  YloC (PMID:34815358). The protein is localized to the cytosol (PMID:18304323) and
  is nonessential but important for survival at high temperature and in stationary
  phase (PMID:1925027).
existing_annotations:
- term:
    id: GO:0006401
    label: RNA catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for RNA catabolic process, based on phylogenetic inference
      across the YicC/YloC family. YicC contributes to RNA degradation in vivo,
      specifically triggering rapid decay of the small RNA RyhB (PMID:34210798),
      and both YicC and its ortholog YloC demonstrate endonucleolytic cleavage of
      ssRNA in vitro (PMID:34815358).
    action: ACCEPT
    reason: RNA catabolic process is well-supported as a core biological process
      for YicC. The IBA annotation is consistent with experimental evidence from
      both IMP (PMID:34210798) and IDA (PMID:34815358) annotations on the same
      gene, as well as the conserved function across the YicC/YloC family.
    supported_by:
      - reference_id: PMID:34210798
        supporting_text: "YicC, a previously uncharacterized but widely conserved
          protein, triggers rapid RyhB degradation via collaboration with the exoribonuclease
          PNPase."
      - reference_id: PMID:34815358
        supporting_text: "We tested YicC for ribonuclease activity and found that
          the cleavage pattern for the IR800-labeled substrate was identical to that
          of YloC, with a somewhat slower initial rate of cleavage"
- term:
    id: GO:0016891
    label: RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: IBA annotation for RNA endonuclease activity producing 5'-phosphomonoesters
      via hydrolytic mechanism. Phylogenetic inference based on both YicC (E. coli)
      and YloC (B. subtilis, O34441). Ligation assays on YloC cleavage products
      demonstrated that the enzyme generates a 3'-OH and presumably a 5'-phosphate
      (PMID:34815358), and YicC shows the same cleavage pattern.
    action: ACCEPT
    reason: This is the core molecular function of YicC. The IBA annotation is
      strongly supported by direct experimental evidence from IDA on E. coli YicC
      (PMID:34815358) and biochemical characterization of the ortholog YloC showing
      the products are 3'-OH and 5'-phosphate.
    supported_by:
      - reference_id: PMID:34815358
        supporting_text: "YloC cleaves to leave a 3\u2032 hydroxyl and, presumably,
          a 5\u2032 phosphate."
      - reference_id: PMID:34815358
        supporting_text: "We tested YicC for ribonuclease activity and found that
          the cleavage pattern for the IR800-labeled substrate was identical to that
          of YloC, with a somewhat slower initial rate of cleavage"
- term:
    id: GO:0004521
    label: RNA endonuclease activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: IEA annotation from InterPro (IPR005229, YicC/YloC-like family) mapping
      to RNA endonuclease activity. This is a broader parent term of the more specific
      GO:0016891 (RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic
      mechanism) which is annotated with IBA and IDA evidence.
    action: ACCEPT
    reason: This broader IEA annotation is correct and consistent with the more
      specific IBA and IDA annotations. It is acceptable to retain alongside the
      more specific term since the IEA mapping from InterPro is independently valid.
    supported_by:
      - reference_id: PMID:34815358
        supporting_text: "YloC is an endoribonuclease and is a member of the highly
          conserved \"YicC family\" of proteins that is widespread in bacteria."
- term:
    id: GO:0006401
    label: RNA catabolic process
  evidence_type: IMP
  original_reference_id: PMID:34210798
  review:
    summary: IMP annotation for RNA catabolic process based on mutant phenotype
      data from Chen et al. (2021). The yicC deletion showed a slight decrease in
      suppression of RyhB-silencing of a sodB reporter, while overexpression of
      YicC led to rapid decay of RyhB sRNA, demonstrating involvement in RNA
      catabolic process via mutant phenotype analysis.
    action: ACCEPT
    reason: The IMP evidence directly supports YicC involvement in RNA catabolism.
      Overexpression of YicC from a plasmid led to rapid decay of RyhB sRNA, and
      this effect required PNPase activity, consistent with a role in RNA degradation.
    supported_by:
      - reference_id: PMID:34210798
        supporting_text: "YicC, a previously uncharacterized but widely conserved
          protein, triggers rapid RyhB degradation via collaboration with the exoribonuclease
          PNPase."
- term:
    id: GO:0016891
    label: RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism
  evidence_type: IDA
  original_reference_id: PMID:34815358
  review:
    summary: IDA annotation based on direct biochemical assay of purified E. coli
      YicC protein. Ingle et al. (2022) expressed and purified YicC and showed it
      has the same endonucleolytic cleavage pattern as B. subtilis YloC on both
      IR800-labeled and 32P-5'-end-labeled RNA substrates. Ligation assays on YloC
      products demonstrated 3'-OH and 5'-phosphate ends, consistent with this GO
      term (PMID:34815358).
    action: ACCEPT
    reason: This is the strongest evidence for the core molecular function of YicC.
      Direct in vitro assay of purified YicC protein demonstrated endoribonuclease
      activity identical to the characterized YloC ortholog, which was shown to
      produce 5'-phosphomonoester ends via hydrolytic cleavage.
    supported_by:
      - reference_id: PMID:34815358
        supporting_text: "The E. coli yicC gene encodes a nonessential protein
          that is 30% identical and 52% similar to YloC. We tested YicC for ribonuclease
          activity and found that the cleavage pattern for the IR800-labeled substrate
          was identical to that of YloC, with a somewhat slower initial rate of cleavage"
      - reference_id: PMID:34815358
        supporting_text: "YloC cleaves to leave a 3\u2032 hydroxyl and, presumably,
          a 5\u2032 phosphate."
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:34210798
  review:
    summary: IPI annotation for protein binding based on interaction with PNPase
      (P05055). Chen et al. (2021) demonstrated that YicC-mediated RyhB degradation
      requires PNPase activity, suggesting a functional interaction. Ingle et al.
      (2022) confirmed this with a bacterial two-hybrid assay showing interaction
      between YicC/YloC and PNPase (PMID:34815358).
    action: MODIFY
    reason: While the interaction between YicC and PNPase is supported by evidence,
      the generic term 'protein binding' (GO:0005515) is uninformative per GO curation
      guidelines. A more specific term should be used to capture the functional
      nature of this interaction, such as ribonuclease binding or enzyme binding.
    proposed_replacement_terms:
      - id: GO:0019899
        label: enzyme binding
    supported_by:
      - reference_id: PMID:34210798
        supporting_text: "YicC, a previously uncharacterized but widely conserved
          protein, triggers rapid RyhB degradation via collaboration with the exoribonuclease
          PNPase."
      - reference_id: PMID:34815358
        supporting_text: "Indeed, like YicC, YloC interacts with PNPase in vivo"
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IDA
  original_reference_id: PMID:18304323
  review:
    summary: IDA annotation for cytosol localization based on mass spectrometry
      proteomics of the E. coli cytosolic fraction. Ishihama et al. (2008) identified
      1103 proteins from the cytosolic fraction of E. coli MC4100, and YicC was
      among the identified proteins.
    action: ACCEPT
    reason: Cytosolic localization is consistent with the soluble nature of YicC
      and its function as an endoribonuclease acting on cytoplasmic RNA substrates.
      The proteomics-based IDA evidence from a large-scale study is reliable for
      localization.
    supported_by:
      - reference_id: PMID:18304323
        supporting_text: "we identified 1103 proteins from the cytosolic fraction
          of the Escherichia coli strain MC4100"
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
    - statement: InterPro family IPR005229 (YicC/YloC-like) maps to RNA endonuclease
        activity (GO:0004521).
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
    - statement: PANTHER phylogenetic analysis supports RNA endonuclease activity
        producing 5'-phosphomonoesters and RNA catabolic process for the YicC/YloC
        family, based on conserved function across E. coli YicC and B. subtilis YloC.
- id: PMID:18304323
  title: Protein abundance profiling of the Escherichia coli cytosol.
  findings:
    - statement: YicC was identified in the cytosolic fraction of E. coli MC4100
        by mass spectrometry proteomics, establishing its cytosolic localization.
      supporting_text: "we identified 1103 proteins from the cytosolic fraction
        of the Escherichia coli strain MC4100"
- id: PMID:34210798
  title: A fluorescence-based genetic screen reveals diverse mechanisms silencing
    small RNA signaling in E. coli.
  findings:
    - statement: YicC was identified as a specific regulator of the iron-responsive
        sRNA RyhB. Overexpression of YicC triggers rapid RyhB degradation in a
        PNPase-dependent manner.
      supporting_text: "YicC, a previously uncharacterized but widely conserved protein,
        triggers rapid RyhB degradation via collaboration with the exoribonuclease
        PNPase."
    - statement: YicC acts upstream of or together with PNPase to degrade RyhB,
        suggesting it may function as an adaptor or endonuclease that provides
        initial cleavage for PNPase-mediated processive degradation.
      supporting_text: "YicC, a previously uncharacterized but widely conserved protein,
        triggers rapid RyhB degradation via collaboration with the exoribonuclease
        PNPase."
- id: PMID:34815358
  title: Discovery and initial characterization of YloC, a novel endoribonuclease
    in Bacillus subtilis.
  findings:
    - statement: E. coli YicC has endoribonuclease activity identical in cleavage
        pattern to B. subtilis YloC, cleaving single-stranded RNA to produce
        3'-OH and 5'-phosphate ends.
      supporting_text: "We tested YicC for ribonuclease activity and found that
        the cleavage pattern for the IR800-labeled substrate was identical to that
        of YloC, with a somewhat slower initial rate of cleavage"
    - statement: YloC/YicC family enzymes are metal-dependent endoribonucleases
        that preferentially cleave at pyrimidine residues in single-stranded RNA,
        with preference for poly(U).
      supporting_text: "YloC is a metal-dependent enzyme that catalyzes the cleavage
        of single-stranded RNA, preferentially at U residues, and exists in an
        oligomeric form, most likely a hexamer."
    - statement: YicC and YloC both interact with PNPase in vivo and have similar
        effects on RyhB sRNA levels when expressed in E. coli.
      supporting_text: "Indeed, like YicC, YloC interacts with PNPase in vivo"
    - statement: The model proposed is that YicC cleaves RyhB near the 3' end,
        allowing PNPase access for rapid degradation.
      supporting_text: "which may suggest a different model in which YicC cleaves
        RyhB near the 3\u2032 end, allowing PNPase access for rapid degradation"
- id: PMID:1925027
  title: Three genes preceding pyrE on the Escherichia coli chromosome are essential
    for survival and normal cell morphology in stationary culture and at high temperature.
  findings:
    - statement: A double yicC-dniD deletion causes filamentous cell morphology
        with reduced DNA content in stationary phase and inability to grow at 45
        degrees Celsius.
      supporting_text: "cultures of the mutants grown to a stationary state in rich
        media contained bacterial filaments of abnormal morphology"
