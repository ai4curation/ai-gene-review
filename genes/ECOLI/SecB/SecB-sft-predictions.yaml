description: >-
  BioReason-Pro SFT predictions for SecB (ECOLI). 4 GO terms extracted from HF
  protein_catalogue. SecB is a cytosolic export chaperone (anti-folding holdase/carrier)
  that maintains presecretory proteins in an unfolded, translocation-competent state
  and delivers them to SecA in the Sec pathway. Core functions: unfolded protein
  carrier activity (GO:0140309), maintenance of unfolded protein (GO:0036506),
  protein transport by the Sec complex (GO:0043952), preprotein binding (GO:0070678),
  and cytosol (GO:0005829). Unfolded protein binding is CNN but the curated review
  recommends replacing with GO:0140309 (carrier activity). Protein transport by
  the Sec complex is CNN. Cytosol is CNN. Regulation of protein stability is NPI --
  SecB prevents folding (anti-folding activity) rather than regulating stability.
