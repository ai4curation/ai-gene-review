    label: protein transport by the Sec complex
  predicted_term_type: GO_BP
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      SecB is a dedicated component of the Sec-dependent protein export pathway.
      GO:0043952 (protein transport by the Sec complex) is already annotated in
      the curated GOA (IBA, GO_REF:0000033) and accepted in the curated review
      as a core function. SecB binds preproteins and delivers them to SecA, the
      ATPase component of the SecYEG translocon (PMID:2170023, PMID:9321390).
      The original secB mutants were isolated based on defects in protein secretion
      (PMID:6403503). The prediction is correct but not novel.
