  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0051082
    label: unfolded protein binding
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      SecB does bind unfolded/partially folded presecretory proteins, and
      GO:0051082 (unfolded protein binding) is already annotated in the curated
      GOA (IBA, GO_REF:0000033). However, the curated review notes that this term
      underdescribes SecB's function. SecB is a canonical carrier chaperone that
      not only binds but actively escorts preproteins to SecA at the membrane
      (PMID:2170023, PMID:16962134). The curated review recommends replacing
      GO:0051082 with GO:0140309 (unfolded protein carrier activity) since SecB
      fits the carrier paradigm precisely. The prediction is correct but not novel
      and less specific than the curated recommended term.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0031647
    label: regulation of protein stability
  predicted_term_type: GO_BP
  review:
    assessment: NPI
    confidence_score: 0
    error_type: MULTIPLE_FUNCTIONS
    summary: >-
      SecB does not "regulate protein stability" in the conventional sense.
      SecB is specifically an anti-folding holdase that PREVENTS presecretory
      proteins from folding into a stable, export-incompetent state (PMID:2834066,
      PMID:2848249). Its function is the maintenance of an unfolded (translocation-
      competent) state. The curated review annotates SecB with GO:0036506
      (maintenance of unfolded protein, IBA) as a core function, not regulation
      of protein stability. GO:0031647 fails to capture SecB's dedicated
      anti-folding role and is therefore incorrect. SecB's function is precisely
      opposite to protein stabilization -- it retards folding to maintain the
      unfolded state for export.
