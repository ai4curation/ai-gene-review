  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      Correct. GO:0070043 (rRNA (uracil-C5-)-methyltransferase activity) is the
      most specific and accurate molecular function term for RlmC. The curated
      review accepts this term (IBA from GO_REF:0000033 and IEA from GO_REF:0000104)
      and it is supported by the key in vivo knockout experiment (PMID:12907714)
      showing that only the m5U747 modification was lost in the rlmC/ybjF deletion
      strain. Note: GO:0070043 is a child of GO:0016436 (rRNA (uridine)
      methyltransferase activity) and specifies C5 position, consistent with the
      experimental evidence. COR because this correctly identifies the specific
      substrate site and mechanism beyond the generic SAM-dependent methyltransferase
      family assignment.
