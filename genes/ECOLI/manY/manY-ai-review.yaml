# --- mannose transmembrane transport (NAS from Erni 1987) ---
- term:
    id: GO:0015761
    label: mannose transmembrane transport
  evidence_type: NAS
  original_reference_id: PMID:2951378
  review:
    summary: Erni et al. (1987) described the mannose permease and its role in
