  evidence_type: IPI
  original_reference_id: PMID:31209249
  review:
    summary: The UniProt record lists GO:1902495 (transmembrane transporter complex,
      IPI, ComplexPortal) based on the cryo-EM structure showing ManY-ManZ heterodimer
