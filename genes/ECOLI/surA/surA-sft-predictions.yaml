  predicted_term_type: GO_CC
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and already in the curated GOA (IBA from GO_REF:0000033, IEA from
      GO_REF:0000002, and IDA from multiple proteomics studies including
