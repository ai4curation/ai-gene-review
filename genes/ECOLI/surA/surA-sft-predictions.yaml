  predicted_term_type: GO_BP
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Less Precise. GO:0061077 (chaperone-mediated protein folding) is technically
      correct but is less specific than the curated annotation. The curated review
      accepts GO:0006457 (protein folding, IBA) and also includes GO:0043165
      (Gram-negative-bacterium-type cell outer membrane assembly, IBA) for SurA,
