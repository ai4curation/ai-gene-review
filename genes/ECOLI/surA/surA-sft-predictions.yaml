      in OMP biogenesis. GO:0061077 implies general chaperone-assisted folding
      without capturing SurA's specific role in OMP delivery to the BAM complex.
      LSP rather than NPI because SurA does participate in chaperone-mediated
      protein folding.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
