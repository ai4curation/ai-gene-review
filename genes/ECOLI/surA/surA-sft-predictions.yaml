  predicted_term_type: GO_BP
  review:
    assessment: LSP
    confidence_score: 2
    summary: >-
      Less Precise. GO:0050821 (protein stabilization) is an accurate but general
      description of SurA's holdase function -- it prevents aggregation of unfolded
      OMPs in the periplasm. The curated review uses GO:0006457 (protein folding)
      and GO:0043165 (outer membrane assembly) as the key biological process
      annotations, which are more specific and informative. The stabilization
      function of SurA is better captured in the context of the OMP biogenesis
      pathway. LSP because protein stabilization is accurate but does not convey
      the OMP-specific chaperone role.
- source_method: BioReason-Pro-SFT
  source_version: wanglab/protein_catalogue
  source_reference_id: doi:10.64898/2026.03.19.712954
  predicted_term:
    id: GO:0043165
    label: Gram-negative-bacterium-type cell outer membrane assembly
  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      Correct. GO:0043165 is in the curated GOA for SurA (IBA from GO_REF:0000033,
      ACCEPT). SurA is the primary periplasmic chaperone for outer membrane protein
      (OMP) biogenesis in E. coli -- it escorts unfolded OMPs (OmpA, OmpF, LamB,
      FimD) from the Sec translocon across the periplasm to the BAM complex for
      insertion into the outer membrane (PMID:17908933). This is the most specific
      and most informative biological process term for SurA, correctly identifying
      its role in the Gram-negative outer membrane assembly pathway. COR because
      this term is specific to the biologically relevant process and is not
      trivially predicted from generic chaperone annotations.
