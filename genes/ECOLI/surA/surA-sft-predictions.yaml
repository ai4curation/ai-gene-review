    summary: >-
      Repetition/frequency bias. GO:0005515 (protein binding) is uninformative
      for SurA and is not a meaningful annotation in the curated GOA. Per curation
      guidelines, generic protein binding annotations should be avoided. SurA's
      specific substrate binding is captured by GO:0051082 (unfolded protein
      binding) and GO:0042277 (peptide binding) in the curated review. This
      prediction reflects systematic frequency bias in training data associating
      chaperones with generic protein binding annotations.
