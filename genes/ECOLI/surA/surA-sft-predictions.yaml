    label: peptidyl-prolyl cis-trans isomerase activity
  predicted_term_type: GO_MF
  review:
    assessment: CNN
    confidence_score: 2
    summary: >-
      Correct and already in the curated GOA (IBA from GO_REF:0000033 and IEA
      from GO_REF:0000120). SurA has confirmed PPIase activity (EC 5.2.1.8)
      residing in its second parvulin domain (PMID:8985185). CNN because the
      parvulin PPIase domain (IPR000297) is detectable by InterPro and directly
      predicts this activity. Note: the PPIase activity is dispensable for SurA's
      primary in vivo chaperone function (PMID:11226178), which the SFT model
      does not capture in this term prediction.
