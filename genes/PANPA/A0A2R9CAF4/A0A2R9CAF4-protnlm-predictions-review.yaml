id: A0A2R9CAF4
gene_symbol: A0A2R9CAF4
taxon:
  id: NCBITaxon:9597
  label: Pan paniscus
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for the bonobo SLC26A11 ortholog (sodium-independent
  sulfate anion transporter). Both predictions are correct at a superficial level but
  less precise than existing curated annotations. GO:0008509 (monoatomic anion
  transmembrane transporter activity) is already in GOA and is a broad parent of the
  protein's actual core functions: secondary active sulfate transmembrane transporter
  activity (GO:0008271) and chloride channel activity (GO:0005254). GO:0016020
  (membrane) is trivially correct for any multi-pass transmembrane protein but
  uninformative compared to the specific lysosomal membrane (GO:0005765) localization
  established by recent confocal microscopy studies. Neither prediction captures the
  distinctive biology of SLC26A11 -- its dual transporter-channel mechanism, its
  lysosomal sulfate export function, or its pH-sensitive substrate selectivity mediated
  by the Glu-320 switch. Assessment: 0 correct novel, 0 incorrect, 2 less precise
  (LSP). Total CS = 4/4.
source_documents:
  - genes/PANPA/A0A2R9CAF4/A0A2R9CAF4-uniprot.txt
  - genes/PANPA/A0A2R9CAF4/A0A2R9CAF4-goa.tsv
  - genes/PANPA/A0A2R9CAF4/A0A2R9CAF4-ai-review.yaml
predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0008509
      label: monoatomic anion transmembrane transporter activity
    predicted_term_type: GO_MF
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0008509 (monoatomic anion transmembrane transporter activity) is already
        present as an existing GOA annotation for this protein. As a broad parent
        term, it correctly captures that SLC26A11 transports monoatomic anions
        (sulfate, chloride, and others), but it is far less informative than the
        specific molecular functions already annotated. The protein's core activity
        is secondary active sulfate transmembrane transporter activity (GO:0008271),
        demonstrated by reconstitution studies showing proton-coupled sulfate/chloride
        exchange with a KM of approximately 40 uM for sulfate. It also possesses a
        distinct chloride channel activity (GO:0005254) confirmed by electrophysiology.
        The task description notes an EXACT match to GO:0140900 (chloride:bicarbonate
        antiporter activity), but the curated review flags GO:0140900 for modification
        because recent biochemical reconstitution data show bicarbonate has minimal
        competition for the SLC26A11 substrate binding site -- the actual exchange
        mechanism is proton-coupled sulfate/chloride antiport, not chloride/bicarbonate
        exchange. ProtNLM2 failed to predict the more specific and biologically
        accurate transport activities that define this protein's function.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0016020
      label: membrane
    predicted_term_type: GO_CC
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        GO:0016020 (membrane) is trivially correct for SLC26A11, which has 10-14
        transmembrane helices and is unambiguously an integral membrane protein.
        However, this prediction is uninformative and already marked as
        MARK_AS_OVER_ANNOTATED in the curated review. The biologically meaningful
        localization is the lysosomal membrane (GO:0005765), where SLC26A11
        functions as the primary sulfate exporter using the lysosomal proton
        gradient. Confocal microscopy with Lamp1 co-staining shows Manders
        coefficients of 0.45-0.50 for lysosomal overlap across multiple mammalian
        cell types (HEK293T, COS1, CHO, renal intercalated cells). By contrast,
        overlap with ER markers is minimal (0.09-0.12). The generic membrane term
        fails to distinguish this specific lysosomal residence from any other
        membrane protein. This type of over-generic cellular component prediction
        is characteristic of frequency bias, as membrane is among the most commonly
        assigned GO CC terms in training data.
      error_type: FREQUENCY_BIAS
