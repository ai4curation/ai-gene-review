taxon:
  id: NCBITaxon:9685
  label: Felis catus
description: >-
  Fel d 8, a secreted salivary protein of the domestic cat belonging to the
  BPI/LBP/PLUNC superfamily (PLUNC family) and a minor cat allergen. PLUNC-family
  proteins are latherin-like, lipid-binding surfactant proteins of oral/airway
  secretions that lower surface tension and participate in airway-surface-liquid
  and surfactant homeostasis and innate mucosal defense. Fel d 8 is produced in the
  submandibular salivary gland and spread to fur during grooming, where it binds
  IgE. Its specific molecular ligand and function in the cat are inferred from the
  PLUNC family rather than directly demonstrated (the UniProt entry is unreviewed).
