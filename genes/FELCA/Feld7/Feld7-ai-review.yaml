id: E5D2Z5
gene_symbol: Feld7
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:9685
  label: Felis catus
description: >-
  Fel d 7, a secreted lipocalin of the domestic cat (calycin superfamily,
  lipocalin family) and a minor cat allergen. It is homologous to the canine
  allergen Can f 1 and to von Ebner's gland protein/tear lipocalins, and like other
  secretory lipocalins is expected to bind small hydrophobic ligands in its
  beta-barrel calyx. The protein is produced in the tongue/salivary tissue and
  deposited on fur; it binds IgE and contributes, with Fel d 1 and Fel d 4, to
  co-sensitization. Its specific endogenous ligand and physiological role are not
  experimentally established (the UniProt entry is unreviewed, with no curated
  function).
