description: >-
  Chain 1 (alpha chain) of the major cat allergen Fel d 1, a secreted
  secretoglobin (uteroglobin-family) glycoprotein of the domestic cat. The
  mature 70-residue chain 1 pairs with chain 2 (CH2) through three interchain
  disulfide bonds to form a heterodimer; two heterodimers associate
  non-covalently into the ~35-38 kDa Fel d 1 heterotetramer. The all-alpha
  secretoglobin fold closely resembles uteroglobin and encloses an internal
  amphipathic cavity of unknown endogenous ligand; the tetramer binds calcium
  ions at defined sites. Fel d 1 is secreted, being produced chiefly by
  sebaceous glands and also found in saliva, anal glands, skin and fur. Its
  endogenous biological function is unresolved, with proposed roles in skin/
  epithelial protection (by analogy to uteroglobin) or in transport of lipophilic
  molecules. It is the dominant cat allergen, recognized by IgE in the great
  majority of cat-allergic people.
