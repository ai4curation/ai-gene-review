existing_annotations:
- term:
    id: GO:0005496
    label: steroid binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) inference of steroid binding propagated from the
      secretoglobin/uteroglobin family. Uteroglobin binds steroids such as
      progesterone, but for Fel d 1 itself there is no direct evidence of steroid
      binding. The crystal structures show an internal cavity that could
      accommodate an (as yet unidentified) amphipathic ligand, and the
      biological function remains unknown. This is therefore a plausible
      family-level inference but an over-annotation for this protein.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      No experimental evidence demonstrates steroid binding by Fel d 1; the
      annotation rests on similarity to uteroglobin. The only ligand binding
      documented experimentally for Fel d 1 is calcium ion binding. The internal
      cavity is described as one that "could" bind an amphipathic ligand, not as
      a demonstrated steroid-binding site.
    supported_by:
    - reference_id: PMID:12851385
      supporting_text: Fel d 1 that could bind an endogenous ligand
    - reference_id: PMID:29643919
      supporting_text: The biological function of Fel d 1 is still unknown
