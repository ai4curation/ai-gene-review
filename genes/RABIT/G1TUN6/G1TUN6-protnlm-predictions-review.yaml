      summary: >-
        ProtNLM2 predicted GO:0016740 (transferase activity) for rabbit
        UBE2L6, a prediction that is biologically correct but substantially
        less precise than the existing curated annotations. UBE2L6 is an E2
        ubiquitin-conjugating enzyme (EC 2.3.2.23) whose primary
        physiological role is as the dedicated E2 for ISG15 conjugation
        (ISGylation), an interferon-stimulated post-translational
        modification system central to innate antiviral defense. The E2
        reaction mechanism is a transthioesterification -- the activated
        ubiquitin-like modifier (ISG15 or ubiquitin) is transferred from the
        E1 thioester to the conserved active-site cysteine (Cys86) of the E2
        via a new thioester bond -- placing UBE2L6 squarely in the
        transferase catalytic class. However, GO:0016740 (transferase
        activity) is a very high-level term that encompasses all enzymes
        transferring any functional group; the GOA already contains the far
        more informative descendant terms GO:0019787 (ubiquitin-like protein
        transferase activity) and GO:0042296 (ISG15 transferase activity),
        both transferred via Ensembl Compara from the experimentally
        characterized human ortholog (O14933). GO:0016740 is an ancestor of
        both these terms in the GO molecular function hierarchy, so the
        ProtNLM2 prediction adds no novel information and is less
        informative than what existing automated methods have already
        assigned. This is scored LSP (less precise than existing annotation)
        rather than CNN because the prediction does not match an existing
        annotation at the same granularity -- it is a strict generalization
        that would never be annotated alongside the more specific terms under
        standard GO annotation practice.
