  label: Oryctolagus cuniculus
status: COMPLETE
description: >-
  ProtNLM2 predicted 1 GO term for rabbit UBE2L6 (G1TUN6), a 153-aa E2
  ubiquitin-conjugating enzyme that serves as the dedicated E2 for ISG15
  conjugation (ISGylation) in the interferon-stimulated innate immune
  response. The single prediction, GO:0016740 (transferase activity), is
  biologically correct -- UBE2L6 is classified as EC 2.3.2.23, a
  transferase that catalyzes the transthioesterification of ubiquitin or
  ISG15 from E1 to E2 -- but it is substantially less precise than the
  existing GOA annotations GO:0019787 (ubiquitin-like protein transferase
  activity) and GO:0042296 (ISG15 transferase activity), both of which are
  descendant terms of GO:0016740 in the GO hierarchy. The prediction
  provides no functional insight beyond what is already captured by these
  more specific annotations. Assessment: 1 LSP (correct but less precise
  than existing annotation).
