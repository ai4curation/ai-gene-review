- term:
    id: GO:0019207
    label: kinase regulator activity
  evidence_type: IMP
  original_reference_id: PMID:27634403
  review:
    summary: |-
      Tsa1 redox-regulates protein kinase A: it promotes oxidative modification
      of a conserved cysteine (Cys243) in the PKA catalytic subunit, blocking
      activation-loop Thr241 phosphorylation and reducing kinase activity. This
      is a genuine but specialized signaling role (the Ras-cAMP-PKA/longevity
      axis), distinct from the core peroxidase function.
    action: KEEP_AS_NON_CORE
    reason: |-
      Real redox-signaling function surfaced by falcon, but peripheral to the
      core antioxidant/chaperone activities.
    additional_reference_ids:
    - file:yeast/TSA1/TSA1-deep-research-falcon.md
    supported_by:
    - reference_id: file:yeast/TSA1/TSA1-deep-research-falcon.md
      supporting_text: |-
        Specifically, Tsa1 represses the **Ras–cAMP–PKA pathway** by promoting oxidative modifications of PKA catalytic subunits; redox modification of a conserved cysteine (reported as **Cys243** in the catalytic subunit) inhibits phosphorylation of **Thr241** in the activation loop and reduces kinase activity.
