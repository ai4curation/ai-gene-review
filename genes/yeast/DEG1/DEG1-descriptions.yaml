taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Formation of pseudouridines at positions 38 and 39 in the anticodon stem and
    loop of transfer RNAs.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P31115
  source_id: P31115
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Correct: pseudouridine synthesis at positions 38 and 39.'
    - rubric: utility
      score: 3
      notes: Correct but too brief to be broadly useful.
    - rubric: compactness
      score: 5
      notes: Maximally concise.
    - rubric: completeness
      score: 2
      notes: Misses mitochondrial tRNA modification, mRNA modification, localization,
        and growth importance.
    - rubric: specificity
      score: 4
      notes: Specific positions mentioned but lacks enzyme name.
    overall_notes: Accurate but very minimal; covers only the core catalytic function.
- source: Alliance_Imported
  text: tRNA:pseudouridine synthase; introduces pseudouridines at position 38 or 39
    in tRNA both cytoplasmic and mitochondrial tRNAs; also responsible for pseudouracil
    modification of some mRNAs; important for maintenance of translation efficiency
    and normal cell growth, localizes to both the nucleus and cytoplasm; non-essential
    for viability
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001895
  source_id: SGD:S000001895
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and comprehensive.
    - rubric: utility
      score: 5
      notes: Highly informative about substrate scope and biological importance.
    - rubric: compactness
      score: 4
      notes: Well-structured multi-clause description.
    - rubric: completeness
      score: 5
      notes: Covers catalytic activity, substrate scope, localization, growth impact,
        and essentiality.
    - rubric: specificity
      score: 5
      notes: 'Specific: positions 38/39, cytoplasmic and mitochondrial tRNAs, mRNA
        pseudouridylation.'
    overall_notes: 'Best source: covers tRNA and mRNA modification, cytoplasmic and
      mitochondrial targets, translation efficiency, and essentiality.'
- source: Alliance_Automated
  text: Enables tRNA pseudouridine(38/39) synthase activity. Involved in mRNA pseudouridine
    synthesis and tRNA pseudouridine synthesis. Located in nucleus. Is active in mitochondrion.
    Orthologous to human PUS3 (pseudouridine synthase 3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001895
  source_id: SGD:S000001895
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct GO annotations.
    - rubric: utility
      score: 3
      notes: Formulaic GO listing.
    - rubric: compactness
      score: 3
      notes: Brief boilerplate.
    - rubric: completeness
      score: 3
      notes: Covers activity, some processes, and localization.
    - rubric: specificity
      score: 3
      notes: GO terms; mentions specific activity name.
    overall_notes: GO-derived; covers activity, localization, and ortholog but formulaic.
- source: RefSeq
  text: Enables pseudouridine synthase activity. Involved in mRNA pseudouridine synthesis
    and tRNA pseudouridine synthesis. Located in cytoplasm and nucleus. Orthologous
    to human PUS3 (pseudouridine synthase 3). [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850550
  source_id: GeneID:850550
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Uses the more general "pseudouridine synthase activity" instead of position-specific
        term.
    - rubric: utility
      score: 2
      notes: Less specific than Alliance_Automated.
    - rubric: compactness
      score: 3
      notes: Brief boilerplate.
    - rubric: completeness
      score: 3
      notes: Similar to Alliance_Automated; adds cytoplasm localization.
    - rubric: specificity
      score: 2
      notes: Less specific activity term than Alliance_Automated.
    overall_notes: Similar to Alliance_Automated but with slight differences; uses
      less specific activity term.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: All agree on pseudouridine synthase function; Alliance_Imported uniquely
      covers mRNA modification and mitochondrial substrates.
  overall_notes: Alliance_Imported is by far the best source, covering the full scope
    of DEG1 function. UniProt is correct but minimal. Automated sources provide GO
    annotations but miss substrate scope and biological significance.
