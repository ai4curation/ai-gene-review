taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Formation of pseudouridines at positions 38 and 39 in the anticodon stem and
    loop of transfer RNAs.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P31115
  source_id: P31115
- source: Alliance_Imported
  text: tRNA:pseudouridine synthase; introduces pseudouridines at position 38 or 39
    in tRNA both cytoplasmic and mitochondrial tRNAs; also responsible for pseudouracil
    modification of some mRNAs; important for maintenance of translation efficiency
    and normal cell growth, localizes to both the nucleus and cytoplasm; non-essential
    for viability
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001895
  source_id: SGD:S000001895
- source: Alliance_Automated
  text: Enables tRNA pseudouridine(38/39) synthase activity. Involved in mRNA pseudouridine
    synthesis and tRNA pseudouridine synthesis. Located in nucleus. Is active in mitochondrion.
    Orthologous to human PUS3 (pseudouridine synthase 3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001895
  source_id: SGD:S000001895
- source: RefSeq
  text: Enables pseudouridine synthase activity. Involved in mRNA pseudouridine synthesis
    and tRNA pseudouridine synthesis. Located in cytoplasm and nucleus. Orthologous
    to human PUS3 (pseudouridine synthase 3). [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850550
