- source: Alliance_Imported
  text: Autophagy-related protein and dual specificity member of the E1 family; mediates
    the attachment of Atg12p to Atg5p and Atg8p to phosphatidylethanolamine which
    are required steps in autophagosome formation; E1 enzymes are also known as ubiquitin-activating
    enzymes; involved in methionine restriction extension of chronological lifespan
    in an autophagy-dependent manner
  source_type: curated
