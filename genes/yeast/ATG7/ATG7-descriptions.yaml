gene_symbol: ATG7
organism: yeast
uniprot_id: P38862
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: E1-like activating enzyme involved in the 2 ubiquitin-like systems required
    for cytoplasm to vacuole transport (Cvt) and autophagy. Activates ATG12 for its
    conjugation with ATG5 and ATG8 for its conjugation with phosphatidylethanolamine.
    Both systems are needed for the ATG8 association to Cvt vesicles and autophagosomes
    membranes. Autophagy is essential for maintenance of amino acid levels and protein
    synthesis under nitrogen starvation. Required for selective autophagic degradation
    of the nucleus (nucleophagy) as well as for mitophagy which contributes to regulate
    mitochondrial quantity and quality by eliminating the mitochondria to a basal
    level to fulfill cellular energy requirements and preventing excess ROS production.
    Plays a role in the regulation of filamentous growth and chronological longevity.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38862
  source_id: P38862
- source: Alliance
  text: Autophagy-related protein and dual specificity member of the E1 family; mediates
    the attachment of Atg12p to Atg5p and Atg8p to phosphatidylethanolamine which
    are required steps in autophagosome formation; E1 enzymes are also known as ubiquitin-activating
    enzymes; involved in methionine restriction extension of chronological lifespan
    in an autophagy-dependent manner
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001214
  source_id: SGD:S000001214
- source: Alliance
  text: Enables Atg12 activating enzyme activity; Atg8 activating enzyme activity;
    and identical protein binding activity. Involved in several processes, including
    cytoplasm to vacuole targeting by the Cvt pathway; piecemeal microautophagy of
    the nucleus; and post-translational protein modification. Located in cytosol;
    membrane; and phagophore assembly site. Is extrinsic component of phagophore assembly
    site membrane. Used to study nervous system disease. Human ortholog(s) of this
    gene implicated in autosomal recessive spinocerebellar ataxia 31. Orthologous
    to human ATG7 (autophagy related 7).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001214
  source_id: SGD:S000001214
- source: RefSeq
  text: Enables Atg12 activating enzyme activity and Atg8 activating enzyme activity.
