review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Strong agreement between curated sources on HMG2 stabilization. Automated
      descriptions are minimal and misleading ("unfolded protein binding").
  overall_notes: 'UniProt and Alliance_Imported are both excellent and complementary:
    UniProt provides the molecular mechanism (SSD binding, HRD1 degradation), SGD
    adds biological context (localization dynamics, INSIG homology, paralogy). Automated
    descriptions are misleading with "unfolded protein binding." Best sources: Both
    curated descriptions together.'
