descriptions:
- source: UniProt
  text: Stabilizes the HMG-CoA reductase HMG2 by preventing its HRD1- dependent degradation.
    Binds directly to the sterol-sensing domain (SSD)-containing transmembrane region
    of HMG2, promoting its folding to protect it from degradation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38837
  source_id: P38837
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and detailed.
    - rubric: utility
      score: 5
      notes: Conveys the specific mechanism of HMG2 regulation.
    - rubric: compactness
      score: 5
      notes: Three concise sentences.
    - rubric: completeness
      score: 4
      notes: Covers mechanism well. Misses INSIG homology, localization dynamics,
        and NSG2 paralog.
    - rubric: specificity
      score: 5
      notes: Names HMG2, HRD1, sterol-sensing domain, and folding protection mechanism.
    overall_notes: Excellent mechanistic description. Covers HMG2 stabilization, HRD1-dependent
      degradation prevention, sterol-sensing domain binding, and folding promotion.
- source: Alliance_Imported
  text: Protein involved in regulation of sterol biosynthesis; stabilizes Hmg2p, one
    of two HMG-CoA isoenzymes that catalyze the rate-limiting step in sterol biosynthesis;
    localizes to the nucleus and ER; localizes to the nucleus-vacuole junction during
    glucose restriction; forms foci at the nuclear periphery upon DNA replication
    stress; relocalizes to the cytosol in response to hypoxia; homolog of mammalian
    INSIG proteins; NSG1 has a paralog, NSG2, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001175
  source_id: SGD:S000001175
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and current.
    - rubric: utility
      score: 5
      notes: Comprehensive overview including localization dynamics and paralogy.
    - rubric: compactness
      score: 3
      notes: Lengthy but information-dense.
    - rubric: completeness
      score: 5
      notes: Covers regulation, localization dynamics, stress responses, homology,
        and paralogy.
    - rubric: specificity
      score: 5
      notes: Names Hmg2p, HMG-CoA isoenzymes, INSIG, NSG2, WGD, and specific localization
        changes.
    overall_notes: Comprehensive SGD description. Covers sterol biosynthesis regulation,
      Hmg2p stabilization, multiple localizations, stress responses, INSIG homology,
      and NSG2 paralog.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in sterol biosynthetic
    process. Located in cytosol; endoplasmic reticulum; and nucleus. Orthologous to
    human INSIG1 (insulin induced gene 1) and INSIG2 (insulin induced gene 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001175
  source_id: SGD:S000001175
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: '''Unfolded protein binding'' is misleading; NSG1 stabilizes folded HMG2
        via SSD interaction, not classical unfolded protein binding.'
    - rubric: utility
      score: 2
      notes: Too minimal to understand NSG1 function.
    - rubric: compactness
      score: 4
      notes: Brief.
    - rubric: completeness
      score: 2
      notes: Misses HMG2 specificity, HRD1, and mechanism.
    - rubric: specificity
      score: 2
      notes: Sterol biosynthetic process is relevant; rest is generic.
    overall_notes: Minimal GO-derived description. Mentions sterol biosynthesis and
      localization. Unfolded protein binding is questionable for NSG1.
