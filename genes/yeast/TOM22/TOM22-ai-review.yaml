- term:
    id: GO:0008320
    label: protein transmembrane transporter activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: contributes_to
  review:
    summary: Accepted as a contribution to TOM complex protein transmembrane transporter activity. Tom22 is the central receptor/scaffold that recognizes preproteins and transfers them to the Tom40 pore; the `contributes_to` qualifier is the appropriate semantic for a complex subunit that does not independently carry out transmembrane transport but is required for the activity of the complex that does.
    action: ACCEPT
    reason: 'Upstream go-annotation issue #6466 raised the concern that "tom40 is the channel, we don''t know the MF of tom22" and suggested removing this IBA propagation. The annotation is retained because (a) it carries the `contributes_to` qualifier, which by GO semantics indicates a subunit-level contribution to a complex-level activity (not a claim that Tom22 independently translocates substrate); (b) the same propagation is annotated by SGD as an experimental IMP (PMID:10519552) — Tom22 is required for tight control of channel gating and the higher-order organisation that sustains import; and (c) the parallel human TOMM22 review (genes/human/TOMM22/TOMM22-ai-review.yaml) reaches the same conclusion. Tom40 should retain `enables GO:0008320` while Tom22 retains `contributes_to GO:0008320`.'
    additional_reference_ids:
    - file:human/TOMM22/TOMM22-deep-research-falcon.md
    - PMID:10519552
    supported_by:
    - reference_id: PMID:10519552
      supporting_text: In the absence of Tom22, the translocase dissociates into core complexes, representing the basic import units, but lacks a tight control of channel gating.
    - reference_id: PMID:10519552
