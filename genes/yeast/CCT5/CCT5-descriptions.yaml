gene_symbol: CCT5
organism: yeast
uniprot_id: P40413
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40413
  source_id: P40413
- source: Alliance
  text: Subunit of the cytosolic chaperonin Cct ring complex; related to Tcp1p, required
    for the assembly of actin and tubulins in vivo
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003825
  source_id: SGD:S000003825
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in protein folding. Part
    of chaperonin-containing T-complex. Used to study Bardet-Biedl syndrome 10. Human
    ortholog(s) of this gene implicated in autosomal recessive sensory neuropathy
    with spastic paraplegia. Orthologous to human CCT5 (chaperonin containing TCP1
    subunit 5).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003825
  source_id: SGD:S000003825
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in protein folding. Part
