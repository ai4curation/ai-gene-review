review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: 'Good agreement on core function. Minor difference: automated sources understate
      the primary catalytic role with "contributes to" language.'
  overall_notes: 'Strong concordance on H3K4 methyltransferase and COMPASS complex
    membership. UniProt and SGD curated are complementary: UniProt covers the biochemistry
    (methylation states, RNA binding, H2B crosstalk) while SGD covers downstream biology
    (Nrd1-dependent termination, silencing). Automated descriptions are generic and
    miss the core functional details.'
