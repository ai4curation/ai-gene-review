    - rubric: correctness
      score: 5
      notes: Accurate; Nrd1-dependent termination role is well-established.
    - rubric: utility
      score: 5
      notes: Excellent functional context including downstream effects of H3K4me.
    - rubric: compactness
      score: 4
      notes: Dense but informative.
    - rubric: completeness
      score: 4
      notes: Misses RNA binding, H2B-ub crosstalk, and mono/di/tri distinction.
    - rubric: specificity
