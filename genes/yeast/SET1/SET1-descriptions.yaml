      notes: Names Nrd1p, Nab3p, Sen1p pathway, snoRNAs, CUTs, and SET domain.
    overall_notes: 'Focuses on transcriptional context: snoRNA/CUT termination via
      Nrd1-Nab3-Sen1, histone acetylation modulation, and telomeric/HM silencing.
      Complements UniProt well with additional functional details.'
- source: Alliance_Automated
  text: Enables RNA binding activity and protein-lysine N-methyltransferase activity.
    Contributes to histone H3K4 methyltransferase activity. Involved in several processes,
    including meiosis I cell cycle process; positive regulation of synaptonemal complex
    assembly; and regulation of macromolecule metabolic process. Located in chromosome,
    telomeric region. Part of Set1C/COMPASS complex. Human ortholog(s) of this gene
    implicated in early-onset epilepsy 2 and neurodevelopmental disorder with speech
    impairment and dysmorphic facies. Orthologous to human SETD1A (SET domain containing
    1A, histone lysine methyltransferase) and SETD1B (SET domain containing 1B, histone
    lysine methyltransferase).
