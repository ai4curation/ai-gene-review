gene_symbol: SET1
organism: yeast
uniprot_id: P38827
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Catalytic component of the COMPASS (Set1C) complex that specifically mono-,
    di- and trimethylates histone H3 to form H3K4me1/2/3 (PubMed:11742990, PubMed:11751634,
    PubMed:11752412, PubMed:11805083, PubMed:11818070, PubMed:12060701, PubMed:12353038,
    PubMed:12845608, PubMed:14636589, PubMed:15949446, PubMed:29071121). Binds RNAs
    involved in chromosome segregation, splicing and transcriptional regulation; appears
    to bind transcripts both co- and post-transcriptionally and binding might negatively
    affect its histone methyltransferase activity (PubMed:16787775, PubMed:29071121).
    COMPASS recognizes ubiquitinated H2B on one face of the nucleosome which stimulates
    the methylation of H3 on the opposing face (PubMed:31922488). Plays a role in
    telomere length maintenance and transcription elongation regulation (PubMed:11742990,
    PubMed:11751634, PubMed:11805083, PubMed:11818070, PubMed:14636589, PubMed:15949446,
    PubMed:9398665, PubMed:9988274).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38827
  source_id: P38827
- source: Alliance_Imported
  text: Histone methyltransferase, subunit of the COMPASS (Set1C) complex; COMPASS
    methylates histone H3K4; Set1p-dependent H3K4 trimethylation recruits Nrd1p, allowing
    efficient termination of snoRNAs and cryptic unstable transcripts (CUTs) by Nrd1p-Nab3p-Sen1p
    pathway; modulates histone acetylation levels in promoter proximal regions to
    ensure efficient Nrd1p-dependent termination; required in transcriptional silencing
    near telomeres and at silent mating type loci; has a SET domain
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001161
  source_id: SGD:S000001161
- source: Alliance_Automated
  text: Enables RNA binding activity and protein-lysine N-methyltransferase activity.
    Contributes to histone H3K4 methyltransferase activity. Involved in several processes,
    including meiosis I cell cycle process; positive regulation of synaptonemal complex
    assembly; and regulation of macromolecule metabolic process. Located in chromosome,
    telomeric region. Part of Set1C/COMPASS complex. Human ortholog(s) of this gene
    implicated in early-onset epilepsy 2 and neurodevelopmental disorder with speech
    impairment and dysmorphic facies. Orthologous to human SETD1A (SET domain containing
    1A, histone lysine methyltransferase) and SETD1B (SET domain containing 1B, histone
    lysine methyltransferase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001161
  source_id: SGD:S000001161
- source: RefSeq
  text: Enables RNA binding activity and protein-lysine N-methyltransferase activity.
    Contributes to histone H3K4 methyltransferase activity. Involved in several processes,
    including DNA metabolic process; ascospore formation; and regulation of macromolecule
    metabolic process. Part of Set1C/COMPASS complex. Human ortholog(s) of this gene
    implicated in early-onset epilepsy 2 and neurodevelopmental disorder with speech
    impairment and dysmorphic facies. Orthologous to human SETD1A (SET domain containing
    1A, histone lysine methyltransferase) and SETD1B (SET domain containing 1B, histone
    lysine methyltransferase). [provided by Alliance of Genome Resources, Apr 2025]
  source_type: automated
