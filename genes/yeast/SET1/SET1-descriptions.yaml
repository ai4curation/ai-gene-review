        complex (COMPASS).
    overall_notes: Comprehensive description of SET1 as the catalytic subunit of COMPASS,
      covering H3K4 methylation (mono/di/tri), RNA binding, H2B-ubiquitin crosstalk,
      and roles in telomere maintenance and transcription elongation. Well-referenced.
- source: Alliance_Imported
  text: Histone methyltransferase, subunit of the COMPASS (Set1C) complex; COMPASS
    methylates histone H3K4; Set1p-dependent H3K4 trimethylation recruits Nrd1p, allowing
    efficient termination of snoRNAs and cryptic unstable transcripts (CUTs) by Nrd1p-Nab3p-Sen1p
    pathway; modulates histone acetylation levels in promoter proximal regions to
    ensure efficient Nrd1p-dependent termination; required in transcriptional silencing
    near telomeres and at silent mating type loci; has a SET domain
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001161
  source_id: SGD:S000001161
  review:
    reviewer: AI
