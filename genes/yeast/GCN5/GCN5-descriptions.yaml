- source: Alliance
  text: Catalytic subunit of ADA and SAGA histone acetyltransferase complexes; modifies
    N-terminal lysines on histones H2B and H3; acetylates Rsc4p, a subunit of the
    RSC chromatin-remodeling complex, altering replication stress tolerance; relocalizes
    to the cytosol in response to hypoxia; mutant displays reduced transcription elongation
    in the G-less-based run-on (GLRO) assay; greater involvement in repression of
    RNAPII-dependent transcription than in activation
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003484
  source_id: SGD:S000003484
- source: Alliance
  text: Enables N-acyltransferase activity; histone reader activity; and transcription
    coregulator activity. Involved in chromatin remodeling and positive regulation
    of transcription elongation by RNA polymerase II. Located in chromosome, centromeric
    region; cytosol; and nucleus. Part of ADA complex; SAGA complex; and SLIK (SAGA-like)
    complex. Orthologous to several human genes including KAT2A (lysine acetyltransferase
    2A).
  source_type: automated
