gene_symbol: GET3
organism: yeast
uniprot_id: Q12154
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Strong concordance on the core TA-protein targeting function. All sources agree
    on the ATPase activity and tail-anchored protein insertion role. UniProt provides
    the most detailed mechanistic description of the ATP-driven conformational cycle.
    SGD curated uniquely highlights the GEF activity for Gpa1p and the oxidative-stress
    chaperone moonlighting function. The automated descriptions correctly list GO terms
    but fail to convey the elegant mechanistic cycle. A notable divergence: SGD leads
    with the GEF function while UniProt leads with TA-protein targeting, reflecting
    historical annotation order vs. current understanding that TA targeting is the
    primary function. Best source: UniProt curated for mechanistic depth on the core
    function; SGD curated for breadth including moonlighting functions. Together they
    are highly complementary.
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: >-
      Agreement on TA targeting is strong. Divergence on emphasis: SGD leads with GEF
      function; UniProt focuses on TA targeting. Oxidative stress chaperone role only
      in SGD curated.
descriptions:
- source: UniProt
  text: ATPase required for the post-translational delivery of tail- anchored (TA)
    proteins to the endoplasmic reticulum. Recognizes and selectively binds the transmembrane
    domain of TA proteins in the cytosol. This complex then targets to the endoplasmic
    reticulum by membrane-bound receptors GET1 and GET2, where the tail-anchored protein
    is released for insertion. This process is regulated by ATP binding and hydrolysis.
    ATP binding drives the homodimer towards the closed dimer state, facilitating
    recognition of newly synthesized TA membrane proteins. ATP hydrolysis is required
    for insertion. Subsequently, the homodimer reverts towards the open dimer state,
    lowering its affinity for the GET1-GET2 receptor, and returning it to the cytosol
    to initiate a new round of targeting. Cooperates with the HDEL receptor ERD2 to
    mediate the ATP-dependent retrieval of resident ER proteins that contain a C-terminal
    H-D-E-L retention signal from the Golgi to the ER. Involved in low-level resistance
    to the oxyanions arsenite and arsenate, and in heat tolerance.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q12154
  source_id: Q12154
  review:
    reviewer: AI
    overall_notes: >-
      Exceptionally detailed mechanistic description of the TA-protein targeting cycle.
      The ATP-driven conformational switch is clearly explained. Also covers the
      ERD2-mediated retrograde transport and stress tolerance. Misses the GEF activity
      and the oxidative-stress chaperone moonlighting.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All mechanistic details well-supported (PMID:18724936, PMID:19675567, PMID:21866104).
    - rubric: utility
      score: 5
      notes: Provides a complete functional narrative for the core TA-targeting mechanism.
    - rubric: compactness
      score: 3
      notes: Quite long (8 sentences); could be trimmed while preserving key details.
    - rubric: completeness
      score: 4
      notes: Excellent on TA targeting; misses GEF activity and chaperone moonlighting.
    - rubric: specificity
      score: 5
      notes: Names specific partners (GET1, GET2, ERD2), conformational states, and substrates.
- source: Alliance_Imported
  text: Guanine nucleotide exchange factor for Gpa1p; amplifies G-protein signaling;
    subunit of the GET complex involved in ATP-dependent Golgi-to-ER trafficking;
    binds as a dimer to the transmembrane domain of tail-anchored proteins in the
    cytosol, shielding them from aqueous solvent until the Get1p/Get2p heterodimer
    releases the substrate and inserts it into the ER membrane; acts as a chaperone
    under ATP-depleted oxidative stress conditions; protein abundance increases under
    DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002258
  source_id: SGD:S000002258
  review:
    reviewer: AI
    overall_notes: >-
      Broad coverage including moonlighting functions (GEF, oxidative stress chaperone)
      not found in UniProt. The TA-targeting description is accurate but less detailed
      than UniProt's mechanistic account. Leading with GEF activity is historically
      motivated but does not reflect the primary function by current understanding.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All statements accurate; GEF activity (PMID:18261907), chaperone (PMID:25242142).
    - rubric: utility
      score: 4
      notes: Good breadth; the GEF-first ordering may mislead about primary function.
    - rubric: compactness
      score: 4
      notes: Dense semicolon-delimited format; reasonable length for the breadth covered.
    - rubric: completeness
      score: 5
      notes: Covers TA targeting, GEF, chaperone moonlighting, and stress response.
    - rubric: specificity
      score: 4
      notes: Names Gpa1p, Get1p/Get2p; "Golgi-to-ER trafficking" is slightly vague for the ERD2 role.
- source: Alliance_Automated
  text: Enables several functions, including ATP hydrolysis activity; guanyl-nucleotide
    exchange factor activity; and unfolded protein binding activity. Involved in several
    processes, including pheromone-dependent signal transduction involved in conjugation
    with cellular fusion; post-translational protein targeting to endoplasmic reticulum
    membrane; and tail-anchored membrane protein insertion into ER membrane. Located
    in cytosol and endoplasmic reticulum. Part of GET complex. Human ortholog(s) of
    this gene implicated in dilated cardiomyopathy. Orthologous to human GET3 (guided
    entry of tail-anchored proteins factor 3, ATPase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002258
  source_id: SGD:S000002258
  review:
    reviewer: AI
    overall_notes: >-
      Lists key GO terms accurately. "Unfolded protein binding" is an over-simplification
      of the TA-protein TMD recognition. The disease association (dilated cardiomyopathy)
      adds human-relevance context. Loses all mechanistic detail.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" is misleading; Get3 binds TA TMDs and acts as holdase
        under oxidative stress, not a general unfolded protein binder.
    - rubric: utility
      score: 3
      notes: Lists functions but without explaining how they relate or which is primary.
    - rubric: compactness
      score: 4
      notes: Reasonable length for an automated description.
    - rubric: completeness
      score: 3
      notes: Covers breadth of functions but no mechanistic depth.
    - rubric: specificity
      score: 3
      notes: GO terms are reasonably specific but "unfolded protein binding" is too generic.
- source: RefSeq
  text: Enables several functions, including ATP hydrolysis activity; guanyl-nucleotide
    exchange factor activity; and unfolded protein binding activity. Involved in several
    processes, including establishment of protein localization to membrane; pheromone-dependent
    signal transduction involved in conjugation with cellular fusion; and retrograde
    vesicle-mediated transport, Golgi to endoplasmic reticulum. Located in cytosol
    and endoplasmic reticulum. Part of GET complex. Human ortholog(s) of this gene
    implicated in dilated cardiomyopathy. Orthologous to human GET3 (guided entry
    of tail-anchored proteins factor 3, ATPase). [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/851458
  source_id: GeneID:851458
  review:
    reviewer: AI
    overall_notes: >-
      Similar to Alliance automated but uses slightly different GO terms (e.g.,
      "establishment of protein localization to membrane" instead of TA insertion).
      This is actually less specific. Same misleading "unfolded protein binding" issue.
    rubrics:
    - rubric: correctness
      score: 3
      notes: Same "unfolded protein binding" issue; "establishment of protein localization to membrane" is vague.
    - rubric: utility
      score: 2
      notes: Less useful than Alliance automated due to vaguer process terms.
    - rubric: compactness
      score: 4
      notes: Similar length.
    - rubric: completeness
      score: 3
      notes: Adds retrograde transport but loses TA-specific insertion term.
    - rubric: specificity
      score: 2
      notes: Uses more generic terms than Alliance automated version.
