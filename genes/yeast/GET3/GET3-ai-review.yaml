id: Q12154
gene_symbol: GET3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  GET3 encodes an ATPase that is the central targeting factor in the GET
  (Guided Entry of Tail-anchored proteins) pathway. As a homodimer, Get3p
  recognizes and binds the transmembrane domain of newly synthesized
  tail-anchored (TA) membrane proteins in the cytosol, shielding the
  hydrophobic segment from aqueous solvent. ATP binding drives a closed dimer
  conformation that facilitates TA substrate capture, and the Get3p-substrate
  complex is then delivered to the ER membrane via the Get1p/Get2p receptor,
  where ATP hydrolysis triggers substrate release and membrane insertion. Get3p
  also cooperates with the HDEL receptor Erd2p in ATP-dependent retrograde
  retrieval of ER-resident proteins from the Golgi, and functions as a
  guanine nucleotide exchange factor for Gpa1p in pheromone signaling. Under
  oxidative stress with ATP depletion, Get3p undergoes a conformational switch
  to act as a holdase chaperone. Orthologous to human GET3/TRC40.
