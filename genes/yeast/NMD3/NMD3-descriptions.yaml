gene_symbol: NMD3
organism: yeast
uniprot_id: P38861
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Acts as an adapter for the XPO1/CRM1-mediated export of the 60S ribosomal
    subunit. Unlikely to play a significant role in nonsense- mediated mRNA decay
    (NMD).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38861
  source_id: P38861
- source: Alliance_Imported
  text: Protein involved in nuclear export of the large ribosomal subunit; acts as
    a Crm1p-dependent adapter protein for export of nascent ribosomal subunits through
    the nuclear pore complex
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001213
  source_id: SGD:S000001213
- source: Alliance_Automated
  text: Enables large ribosomal subunit rRNA binding activity; protein-macromolecule
    adaptor activity; and ribosomal large subunit binding activity. Involved in ribosomal
    large subunit export from nucleus. Located in cytosol. Orthologous to human NMD3
    (NMD3 ribosome export adaptor).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001213
  source_id: SGD:S000001213
- source: RefSeq
  text: Enables large ribosomal subunit rRNA binding activity; protein-macromolecule
    adaptor activity; and ribosomal large subunit binding activity. Involved in ribosomal
    large subunit export from nucleus. Located in cytosol. Orthologous to human NMD3
    (NMD3 ribosome export adaptor). [provided by Alliance of Genome Resources, Jul
    2025]
  source_type: automated
