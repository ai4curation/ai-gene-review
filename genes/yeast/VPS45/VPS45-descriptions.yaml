gene_symbol: VPS45
organism: yeast
uniprot_id: P38932
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Essential for vacuolar protein sorting. Function in membrane traffic between
    the Golgi and the vacuole.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38932
  source_id: P38932
- source: Alliance
  text: Protein of the Sec1p/Munc-18 family; essential for vacuolar protein sorting;
    required for the function of Pep12p and the early endosome/late Golgi SNARE Tlg2p;
    essential for fusion of Golgi-derived vesicles with the prevacuolar compartment;
    mutation in human VPS45 is associated with congenital neutropenia and primary
    myelofibrosis of infancy
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003063
  source_id: SGD:S000003063
- source: Alliance
  text: Enables SNARE binding activity and unfolded protein binding activity. Involved
    in several processes, including Golgi vesicle transport; positive regulation of
    SNARE complex assembly; and vacuole inheritance. Located in Golgi membrane and
    cytosol. Part of SNARE complex. Human ortholog(s) of this gene implicated in severe
    congenital neutropenia 5. Orthologous to human VPS45 (vacuolar protein sorting
    45 homolog).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003063
  source_id: SGD:S000003063
- source: RefSeq
