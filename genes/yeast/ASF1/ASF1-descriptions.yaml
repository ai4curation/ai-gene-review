  overall_notes: 'UniProt provides the most detailed description with extensive PMID
    references, covering histone chaperone function, CAF-1 and HIR complex cooperation,
    replication fork maintenance, and RTT109-dependent acetylation. Alliance_Imported
    complements with anti-silencing and Ty1 transposition roles. Automated sources
    are generic. Best source: UniProt.'
