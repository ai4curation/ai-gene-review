gene_symbol: ASF1
organism: yeast
uniprot_id: P32447
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Histone chaperone that facilitates histone deposition and histone exchange
    and removal during nucleosome assembly and disassembly (PubMed:11172707, PubMed:11331602,
    PubMed:11404324, PubMed:11856374, PubMed:14680630, PubMed:15071494, PubMed:15175160,
    PubMed:15452122, PubMed:15542829, PubMed:15766286, PubMed:15891116, PubMed:16039596,
    PubMed:16303565, PubMed:16407267, PubMed:16678113, PubMed:16936140). Facilitates
    histone deposition through both replication-dependent and replication-independent
    chromatin assembly pathways (PubMed:14585955, PubMed:15632066, PubMed:16678113).
    Cooperates with chromatin assembly factor 1 (CAF-1) to promote replication-dependent
    chromatin assembly and with the HIR complex to promote replication-independent
    chromatin assembly, which may occur during transcription and DNA repair (PubMed:10591219,
    PubMed:11404324, PubMed:11412995, PubMed:11731479, PubMed:11731480, PubMed:11756556,
    PubMed:12093919, PubMed:15542840, PubMed:15821127, PubMed:16020781, PubMed:16141196,
    PubMed:16143623, PubMed:16303565, PubMed:16501045, PubMed:16582440). May be required
    for the maintenance of a subset of replication elongation factors, including DNA
    polymerase epsilon, the RFC complex and PCNA, at stalled replication forks (PubMed:11412995,
    PubMed:15901673). Also required for RTT109-dependent acetylation of histone H3
    on 'Lys-9' and 'Lys-56' (PubMed:15840725, PubMed:16627621, PubMed:16815704, PubMed:17046836,
    PubMed:17107956, PubMed:17320445, PubMed:21256037). Promotion of RTT109-mediated
    histone H3 'Lys-56' acetylation is dependent on interactions with histone H3 pre-acetylated
    on 'Lys-14' (PubMed:31194870).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32447
  source_id: P32447
- source: Alliance_Imported
  text: Nucleosome assembly factor; involved in chromatin assembly, disassembly; required
    for recovery after DSB repair; role in H3K56 acetylation required for expression
    homeostasis, buffering mRNA synthesis rate against gene dosage changes in S phase;
    anti-silencing protein, derepresses silent loci when overexpressed; role in regulating
    Ty1 transposition; relocalizes to cytosol under hypoxia; growth defect of asf1
    null is functionally complemented by either human ASF1A or ASF1B
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003651
  source_id: SGD:S000003651
- source: Alliance_Automated
  text: Enables acetyltransferase activator activity and histone binding activity.
    Involved in several processes, including DNA replication-dependent chromatin assembly;
    chromatin remodeling; and regulation of primary metabolic process. Located in
    cytosol and nucleus. Part of H3 histone acetyltransferase complex. Orthologous
    to several human genes including ASF1A (anti-silencing function 1A histone chaperone).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003651
  source_id: SGD:S000003651
- source: RefSeq
  text: Enables histone binding activity. Involved in several processes, including
    DNA replication-dependent chromatin assembly; chromatin remodeling; and positive
    regulation of transcription elongation by RNA polymerase II. Located in cytosol
    and nucleus. Orthologous to several human genes including ASF1A (anti-silencing
    function 1A histone chaperone). [provided by Alliance of Genome Resources, Jul
    2025]
  source_type: automated
