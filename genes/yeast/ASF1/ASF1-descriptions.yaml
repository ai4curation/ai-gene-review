  text: Enables acetyltransferase activator activity and histone binding activity.
    Involved in several processes, including DNA replication-dependent chromatin assembly;
    chromatin remodeling; and regulation of primary metabolic process. Located in
    cytosol and nucleus. Part of H3 histone acetyltransferase complex. Orthologous
    to several human genes including ASF1A (anti-silencing function 1A histone chaperone).
