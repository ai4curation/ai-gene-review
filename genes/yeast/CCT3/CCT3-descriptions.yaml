descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P39077
  source_id: P39077
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate. The identical text is shared across CCT subunits which is somewhat
        generic.
    - rubric: utility
      score: 4
      notes: Informative about CCT complex function.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 3
      notes: Does not distinguish CCT3 from other CCT subunits. Misses Q/N-rich protein
        binding.
    - rubric: specificity
      score: 3
      notes: Generic CCT description, not CCT3-specific.
    overall_notes: Good description covering molecular chaperone function, ATP dependence,
      actin/tubulin folding, and spindle formation role.
- source: Alliance_Imported
  text: Subunit of the cytosolic chaperonin Cct ring complex; related to Tcp1p, required
    for the assembly of actin and tubulins in vivo; capable of binding Q/N rich proteins
    and mediating their folding
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003551
  source_id: SGD:S000003551
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 4
      notes: Informative and distinguishes CCT3 from other subunits via Q/N binding.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 4
      notes: Covers Cct ring complex, actin/tubulin assembly, and Q/N binding.
    - rubric: specificity
      score: 4
      notes: Mentions Q/N-rich protein binding which is specific to this subunit.
    overall_notes: Good description. Adds Q/N-rich protein binding capability which
      is a notable CCT3 function.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in protein folding. Part
