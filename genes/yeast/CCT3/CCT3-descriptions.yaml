review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: High concordance across all sources on the chaperonin function for actin/tubulin
      folding.
  overall_notes: 'UniProt and Alliance_Imported agree closely on CCT3 as a subunit
    of the TRiC/CCT chaperonin involved in actin and tubulin folding. Alliance_Imported
    adds Q/N-rich protein binding. UniProt provides more mechanistic context (ATP
    hydrolysis, spindle formation). Automated sources are minimal boilerplate. Best
    source: Alliance_Imported for specificity.'
