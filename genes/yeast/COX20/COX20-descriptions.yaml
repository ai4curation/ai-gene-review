gene_symbol: COX20
organism: yeast
uniprot_id: Q04935
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in the assembly of the cytochrome oxidase complex. Required for the
    maturation and subsequent assembly of the mitochondrially encoded COX2, the precursor
    of subunit 2 of cytochrome oxidase.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04935
  source_id: Q04935
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurately describes COX20 role in cytochrome oxidase complex assembly
        and COX2 maturation.
    - rubric: utility
      score: 4
      notes: Clearly conveys the core function; lacks mention of membrane localization.
    - rubric: compactness
      score: 4
      notes: Concise and well-structured.
    - rubric: completeness
      score: 3
      notes: Misses unfolded protein binding, inner membrane localization, and role
        in programmed cell death.
    - rubric: specificity
      score: 5
      notes: 'Uses specific terms: cytochrome oxidase complex, COX2 maturation.'
    overall_notes: Accurate curated description focusing on cytochrome oxidase assembly
      and COX2 maturation.
- source: Alliance_Imported
  text: Mitochondrial inner membrane protein; required for proteolytic processing
    of Cox2p and its assembly into cytochrome c oxidase
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002639
  source_id: SGD:S000002639
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Correct: inner membrane protein required for Cox2p processing and assembly.'
    - rubric: utility
      score: 5
      notes: Very useful; covers localization, processing, and assembly.
    - rubric: compactness
      score: 5
      notes: Brief but informative.
    - rubric: completeness
      score: 4
      notes: Covers key aspects but omits unfolded protein binding and cell death
        roles.
    - rubric: specificity
      score: 5
      notes: 'Specific: proteolytic processing, cytochrome c oxidase.'
    overall_notes: Strong curated description that adds inner membrane localization
      and proteolytic processing detail.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in mitochondrial respiratory
    chain complex IV assembly and negative regulation of programmed cell death. Located
    in mitochondrial inner membrane. Human ortholog(s) of this gene implicated in
    mitochondrial complex IV deficiency nuclear type 11. Orthologous to human COX20
    (cytochrome c oxidase assembly factor COX20).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002639
  source_id: SGD:S000002639
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Statements are correct but the negative regulation of programmed cell
        death is a less-established role.
    - rubric: utility
      score: 3
      notes: Formulaic GO term listing; less readable than curated sources.
    - rubric: compactness
      score: 3
      notes: Somewhat verbose with human ortholog info that adds little for yeast
        context.
    - rubric: completeness
      score: 4
      notes: Covers MF, BP, and CC annotations plus ortholog info.
    - rubric: specificity
      score: 3
      notes: Uses GO terms verbatim; generic structure.
    overall_notes: GO-derived boilerplate. Includes unfolded protein binding and cell
      death roles but reads as a list.
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in mitochondrial cytochrome
    c oxidase assembly and negative regulation of programmed cell death. Located in
    mitochondrial inner membrane. Human ortholog(s) of this gene implicated in mitochondrial
    complex IV deficiency nuclear type 11. Orthologous to human COX20 (cytochrome
    c oxidase assembly factor COX20). [provided by Alliance of Genome Resources, Jul
    2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/851817
  source_id: GeneID:851817
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Same content as Alliance_Automated; correct.
    - rubric: utility
      score: 2
      notes: Duplicates Alliance_Automated verbatim with attribution tag.
    - rubric: compactness
      score: 3
      notes: Same length as Alliance_Automated.
    - rubric: completeness
      score: 4
      notes: Same coverage as Alliance_Automated.
    - rubric: specificity
      score: 3
      notes: Same GO-derived terms.
    overall_notes: Nearly identical to Alliance_Automated with minor wording differences;
      duplicative.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: All sources agree on cytochrome oxidase assembly; automated sources add
      additional GO-derived annotations.
  overall_notes: Good concordance across sources on core function (cytochrome oxidase
    assembly, COX2 maturation). Alliance_Imported is the best single source, combining
    localization and function concisely. UniProt is also strong. Automated sources
    add unfolded protein binding and cell death roles but are formulaic. RefSeq duplicates
    Alliance_Automated.
