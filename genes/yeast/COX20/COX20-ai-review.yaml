- id: PMID:10671482
  title: Identification of Cox20p, a novel protein involved in the maturation and assembly of cytochrome oxidase subunit 2.
  findings:
  - statement: Cox20 is a mitochondrial inner membrane Cox2 chaperone required for Cox2 maturation and cytochrome oxidase assembly.
    supporting_text: "Cox20p specifically binds the newly synthesized pCox2p, a step required to present the exported pCox2p as a substrate to the Imp1p peptidase."
- id: PMID:16823961
  title: 'Toward the complete yeast mitochondrial proteome: multidimensional separation techniques for mitochondrial proteomics.'
  findings:
  - statement: Proteomics support mitochondrial localization of Cox20.
    supporting_text: "Toward the complete yeast mitochondrial proteome"
- id: PMID:24769239
  title: Quantitative variations of the mitochondrial proteome and phosphoproteome during fermentative and respiratory growth in Saccharomyces cerevisiae.
  findings:
