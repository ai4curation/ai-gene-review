id: Q04935
gene_symbol: COX20
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  COX20 encodes a mitochondrial inner-membrane assembly chaperone required for
  maturation and assembly of mitochondrially encoded Cox2, subunit 2 of
  cytochrome c oxidase (respiratory complex IV). Cox20 binds newly synthesized
  precursor Cox2, supports its Imp1-dependent processing and Cox18-linked
  topogenesis, stabilizes unassembled Cox2, and enables Cox2 incorporation into
  complex IV. Stress and programmed-cell-death phenotypes are supported but are
  secondary to this core Cox2/complex IV assembly function.
