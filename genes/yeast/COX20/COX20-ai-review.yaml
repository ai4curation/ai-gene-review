suggested_questions:
- question: "Which Cox2 maturation step is most directly dependent on Cox20 under normal respiratory growth: pCox2 processing, C-tail export, Cox2 stabilization, or handoff to later complex IV modules?"
  experts:
  - mitochondrial assembly experts
  - yeast respiratory-chain biochemists
- question: Is the programmed-cell-death protection phenotype a direct Cox20 activity or an indirect consequence of altered Cox2/complex IV assembly and mitochondrial redox state?
  experts:
  - mitochondrial stress-response researchers
suggested_experiments:
- experiment_type: time-resolved Cox2 assembly assay
  description: Pulse-label mitochondrially translated Cox2 after acute Cox20 depletion and quantify pCox2 processing, C-tail export, Cox20-Cox18 association, and complex IV incorporation over time.
  hypothesis: Cox20 loss first destabilizes or misroutes Cox2 maturation intermediates before global complex IV assembly defects accumulate.
- experiment_type: stress epistasis assay
  description: Test oxidative-stress and programmed-cell-death phenotypes in cox20 alleles that separate Cox2 binding, Imp1 processing support, and Cox18-linked topogenesis.
  hypothesis: COX20-dependent programmed-cell-death tolerance tracks with a specific Cox2 maturation step rather than an independent anti-apoptotic activity.
