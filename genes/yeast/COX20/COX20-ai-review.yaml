id: Q04935
gene_symbol: COX20
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  COX20 (YDR231C) encodes a 23.8-kDa multi-pass protein of the mitochondrial inner
  membrane that acts as a membrane-bound assembly chaperone for cytochrome c
  oxidase (Complex IV). Cox20p binds the newly synthesised mitochondrially
  encoded precursor of subunit 2 (pCox2p) after its export across the inner
  membrane and presents it as a substrate to the Imp1p/Imp2p inner-membrane
  peptidase for N-terminal processing; in cox20 null mutants pCox2p
  accumulates and cytochrome oxidase fails to assemble (PMID:10671482). After
  cleavage, mature Cox2p remains associated with Cox20p before being handed
  off to subsequent assembly intermediates of the cytochrome c oxidase
  complex. COX20 has additionally been implicated in tolerance to oxidative
  stress and reduction of programmed cell death under acetic acid and
  hydrogen peroxide stress (PMID:31752220), but this is a downstream
  consequence of competent Complex IV assembly rather than a separate core
  function.
