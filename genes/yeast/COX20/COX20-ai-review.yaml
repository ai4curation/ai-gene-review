- term:
    id: GO:0051082
    label: unfolded protein binding
  evidence_type: IDA
  original_reference_id: PMID:10671482
  review:
    summary: >-
      IDA annotation for unfolded protein binding from Hell et al. 2000
      (PMID:10671482), based on direct binding of Cox20p to the unprocessed
      pCox2p precursor before Imp1p-mediated N-terminal cleavage. GO:0051082
      is being obsoleted; the recommended replacement is GO:0044183 (protein
      folding chaperone), which captures Cox20p's membrane-bound assembly
      chaperone activity for Cox2p maturation.
    action: MODIFY
    reason: >-
      Cox20p does bind a non-native (precursor) form of Cox2p, but
      GO:0051082 is being obsoleted and is uninformative for Cox20p's defined
      role as a Cox2p-specific assembly chaperone. The recommended replacement
      GO:0044183 (protein folding chaperone) better captures the holdase-style
      activity. Hell et al. (PMID:10671482) directly demonstrated Cox20p
      binding to pCox2p and its requirement for Imp1p-dependent processing.
    proposed_replacement_terms:
    - id: GO:0044183
      label: protein folding chaperone
    supported_by:
    - reference_id: PMID:10671482
      supporting_text: >-
        Cox20p specifically binds the newly synthesized pCox2p, a step required
        to present the exported pCox2p as a substrate to the Imp1p peptidase.
- term:
    id: GO:0044183
    label: protein folding chaperone
  evidence_type: ISS
  original_reference_id: PMID:10671482
  review:
    summary: >-
      NEW annotation. Cox20p is a Cox2p-specific membrane-bound assembly
      chaperone: it binds newly exported pCox2p, presents it to the Imp1p
      peptidase for N-terminal processing, and retains mature Cox2p prior to
      hand-off to subsequent Complex IV assembly intermediates (PMID:10671482).
      GO:0044183 (protein folding chaperone) is the recommended replacement for
      the existing GO:0051082 annotation and captures the Cox20p activity at
      the appropriate level of specificity.
    action: NEW
    reason: >-
      The existing annotations lack a precise molecular-function term for
      Cox20p's chaperone activity. GO:0044183 (protein folding chaperone)
      replaces the obsoleting GO:0051082 and accurately captures Cox20p's
      direct chaperoning of pCox2p during Complex IV assembly.
    supported_by:
    - reference_id: PMID:10671482
      supporting_text: >-
        We propose that Cox20p acts as a membrane-bound chaperone necessary
        for cleavage of pCox2p and for interaction of the mature protein with
        other subunits of cytochrome oxidase in a later step of the assembly
        process.
core_functions:
- description: >-
    Membrane-bound assembly chaperone that binds the newly exported pCox2p
    precursor and presents it to the Imp1p inner-membrane peptidase for
    N-terminal cleavage, then retains mature Cox2p until it can be handed off
    to subsequent cytochrome c oxidase assembly intermediates.
  molecular_function:
