    supporting_text: "Quantitative variations of the mitochondrial proteome"
- id: PMID:31752220
  title: A Role for COX20 in Tolerance to Oxidative Stress and Programmed Cell Death in Saccharomyces cerevisiae.
  findings:
  - statement: COX20 expression reduces oxidative-stress-associated apoptotic and necrotic cell populations, but the study frames this around the known Cox2 chaperone role.
    supporting_text: "Overexpression of COX20 reduced the presence of apoptotic cells in assays with hydrogen peroxide, cobalt, copper, manganese iron and cadmium"
- id: file:yeast/COX20/COX20-deep-research-falcon.md
  title: Falcon deep research report on COX20
  findings:
  - statement: Falcon synthesis identifies Cox20 as a Cox2-specific inner-membrane chaperone that coordinates Cox2 processing, C-tail export, and stability.
    supporting_text: "COX20 encodes an integral mitochondrial inner-membrane Cox2-specific chaperone/assembly factor required for productive cytochrome c oxidase (Complex IV) biogenesis."
