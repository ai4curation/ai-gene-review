      involved in the biogenesis of the yeast cytochrome oxidase complex.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro2GO mapping from the COX20-family signature assigns the
      mitochondrial respiratory chain complex IV assembly term (GO:0033617) to
      Cox20p based on its conserved family membership.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      PANTHER phylogenetic propagation transfers the conserved COX20-family
      annotations (mitochondrion localisation, mitochondrial respiratory chain
      complex IV assembly) across COX20 orthologues consistent with the
      experimental evidence in S. cerevisiae.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: >-
      Combined automated IEA pipelines annotate Cox20p with mitochondrial inner
      membrane localisation (GO:0005743) consistent with the multi-pass
      transmembrane topology recorded in UniProt.
- id: PMID:10671482
  title: Identification of Cox20p, a novel protein involved in the maturation and assembly of cytochrome oxidase subunit 2.
  findings:
  - statement: >-
      Cox20p is a 23.8-kDa mitochondrial inner membrane protein required for
      maturation of mitochondrially encoded Cox2p; cox20 null mutants
      accumulate the unprocessed precursor pCox2p, demonstrating that Cox20p
      is required upstream of Imp1p-mediated N-terminal cleavage.
    supporting_text: >-
      We have identified Cox20p, a 23.8-kDa protein of the mitochondrial inner
      membrane that is involved in the biogenesis of the yeast cytochrome
      oxidase complex. Cytochrome oxidase subunit 2 (Cox2p) accumulates as a
      precursor in cox20 mutants, suggesting a defect in biogenesis of this
      mitochondrially encoded protein.
    reference_section_type: ABSTRACT
  - statement: >-
      Cox20p directly binds newly synthesised pCox2p and presents it as a
      substrate to the Imp1p peptidase; mature Cox2p remains associated with
      Cox20p before assembling with other cytochrome oxidase subunits, defining
      Cox20p as a membrane-bound assembly chaperone for Cox2p.
    supporting_text: >-
      Cox20p specifically binds the newly synthesized pCox2p, a step required
      to present the exported pCox2p as a substrate to the Imp1p peptidase.
      ... Following maturation Cox2p remained associated with Cox20p, prior to
      assembling into the cytochrome oxidase complex. We propose that Cox20p
      acts as a membrane-bound chaperone necessary for cleavage of pCox2p and
      for interaction of the mature protein with other subunits of cytochrome
      oxidase in a later step of the assembly process.
    reference_section_type: ABSTRACT
- id: PMID:16823961
  title: 'Toward the complete yeast mitochondrial proteome: multidimensional separation techniques for mitochondrial proteomics.'
  findings:
  - statement: >-
      Cox20p is identified by multidimensional LC-MS/MS, 1D-SDS-PAGE/nano-LC-MS/MS
      and 2D-PAGE/MALDI in the PROMITO yeast mitochondrial proteome (851 proteins),
      providing high-confidence proteomic evidence for mitochondrial localisation.
    supporting_text: >-
      A total of 851 different proteins (PROMITO dataset) were identified by use
      of multidimensional LC-MS/MS, 1D-SDS-PAGE combined with nano-LC-MS/MS and
      2D-PAGE with subsequent MALDI-mass fingerprinting.
    reference_section_type: ABSTRACT
- id: PMID:24769239
  title: Quantitative variations of the mitochondrial proteome and phosphoproteome during fermentative and respiratory growth in Saccharomyces cerevisiae.
  findings:
  - statement: >-
      Cox20p is detected in the quantitative yeast mitochondrial proteome under
      fermentative (glucose, galactose) and respiratory (lactate) growth
      conditions, supporting the assigned mitochondrial localisation.
    supporting_text: >-
      we performed an overall quantitative proteomic and phosphoproteomic study
      of isolated mitochondria extracted from yeast grown on fermentative
      (glucose or galactose) and respiratory (lactate) media.
    reference_section_type: ABSTRACT
- id: PMID:31752220
  title: A Role for COX20 in Tolerance to Oxidative Stress and Programmed Cell Death in Saccharomyces cerevisiae.
  findings:
  - statement: >-
      COX20 expression reduces reactive oxygen species levels under H2O2 and
      metal-induced oxidative stress and decreases the apoptotic/necrotic
      fraction relative to a COX20-deficient strain, linking competent
      cytochrome c oxidase assembly to tolerance of oxidative stress and
      reduced programmed cell death.
    supporting_text: >-
      Analysis using flow cytometry revealed that COX20 expression was
      associated with reduced levels of reactive oxygen species (ROS) in
      hydrogen peroxide and metal-induced stress, and there was a reduction in
      apoptotic and necrotic cells when compared with a strain without COX20.
    reference_section_type: ABSTRACT
  - statement: >-
      Overexpression of COX20 induces respiratory growth in Δimp1 and Δcox18
      backgrounds, consistent with Cox20p acting at the pCox2p
      maturation/assembly step downstream of Cox2p export.
    supporting_text: >-
      overexpression of COX20 induced respiratory growth in Δimp1 and Δcox18
    reference_section_type: ABSTRACT
suggested_questions:
- question: >-
    How does Cox20p hand off matured Cox2p to subsequent Complex IV assembly
    intermediates (Cox1p-containing modules, Mss51, Coa1/Coa3, Shy1) and what
    structural switches release Cox2p from Cox20p once Imp1p cleavage is
    complete?
- question: >-
    Is the disulfide-bond formation in Cox20p mediated by the protein-disulfide
    reductase DMO2 (PMID:39753782) required for substrate binding, for
    presentation to Imp1p, or for Cox20p stability itself?
- question: >-
    Is the oxidative-stress/cell-death tolerance phenotype of COX20
    (PMID:31752220) entirely explained by competent Complex IV assembly and
    reduced electron leakage, or does Cox20p have a separable role in
    mitochondrial stress signalling?
- question: >-
    Does the assembly chaperone role of Cox20p extend to other inner-membrane
    proteins beyond Cox2p, particularly under heat or proteotoxic stress, or is
    its substrate selectivity strictly confined to pCox2p?
suggested_experiments:
- description: >-
    Reconstitute pCox2p maturation in vitro using purified Cox20p, Imp1p/Imp2p,
    and synthetic pCox2p in proteoliposomes to measure the kinetics and
    stoichiometry of substrate binding, peptidase presentation, and product
    release with wild-type and disulfide-defective Cox20p variants.
- description: >-
    Use proximity labelling (BioID/TurboID) of Cox20p in fermentative versus
    respiratory growth conditions and during heat/oxidative stress to map the
    Cox20p interactome and test whether substrate scope expands beyond pCox2p.
- description: >-
    Combine cryo-electron tomography of mitochondrial cristae with split-FP
    Cox20p-Cox2p reporters to visualise the spatial organisation of the
    pCox2p/Cox20p/Imp1p maturation hub relative to translating mitoribosomes
    and pre-Complex IV intermediates.
- description: >-
    Quantitatively compare ROS production and apoptotic markers in cox20
    null, Cox2p-overexpressing rescue, and assembly-bypass strains to test
    whether the oxidative-stress/cell-death phenotype of COX20 is explained
    purely by Complex IV competence or requires the Cox20p chaperone activity
    itself.
