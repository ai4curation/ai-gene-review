descriptions:
- source: UniProt
  text: PPIases accelerate the folding of proteins. It catalyzes the cis-trans isomerization
    of proline imidic peptide bonds in oligopeptides. Plays a major role in negative
    regulation of the heat shock transcription factor (HSF).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P47103
  source_id: P47103
