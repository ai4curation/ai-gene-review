descriptions:
- source: UniProt
  text: PPIases accelerate the folding of proteins. It catalyzes the cis-trans isomerization
    of proline imidic peptide bonds in oligopeptides. Plays a major role in negative
    regulation of the heat shock transcription factor (HSF).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P47103
  source_id: P47103
- source: Alliance
  text: Peptidyl-prolyl cis-trans isomerase (cyclophilin); catalyzes the cis-trans
    isomerization of peptide bonds N-terminal to proline residues; binds to Hsp82p
    and contributes to chaperone activity; plays a role in determining prion variants
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003793
  source_id: SGD:S000003793
- source: Alliance
  text: Enables peptidyl-prolyl cis-trans isomerase activity and unfolded protein
    binding activity. Involved in protein refolding. Located in cytosol.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003793
  source_id: SGD:S000003793
