    - rubric: utility
      score: 5
      notes: Comprehensive and informative.
    - rubric: compactness
      score: 4
      notes: Concise for the breadth covered.
    - rubric: completeness
      score: 4
      notes: Covers main functions but misses translation termination role.
    - rubric: specificity
      score: 5
      notes: 'Specific: nuclear pore complex, mRNA export, ethanol stress.'
    overall_notes: Good curated description covering mRNA export, protein removal
      at NPC, ethanol stress, and transcription roles.
- source: Alliance_Imported
  text: Cytoplasmic ATP-dependent RNA helicase of the DEAD-box family; involved in
    mRNA export from the nucleus, remodeling messenger ribonucleoprotein particles
    (mRNPs), with ATPase activity stimulated by Gle1p, IP6 and Nup159p; involved in
    translation termination along with Sup45p (eRF1); role in the cellular response
    to heat stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005572
  source_id: SGD:S000005572
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Most complete single description.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized.
    - rubric: completeness
      score: 5
      notes: Covers mRNA export, mRNP remodeling, ATPase stimulation, translation
        termination, and stress response.
    - rubric: specificity
      score: 5
      notes: 'Specific: Gle1p, IP6, Nup159p, Sup45p/eRF1.'
    overall_notes: 'Best overall source: covers mRNA export, mRNP remodeling, ATPase
      regulation, translation termination, and heat stress.'
- source: Alliance_Automated
  text: Enables RNA helicase activity. Contributes to inositol hexakisphosphate binding
    activity. Involved in poly(A)+ mRNA export from nucleus; tRNA export from nucleus;
    and translational termination. Located in cellular bud tip; cytoplasmic stress
    granule; and nucleus. Part of nuclear pore cytoplasmic filaments. Orthologous
    to human DDX19A (DEAD-box helicase 19A); DDX19B (DEAD-box helicase 19B); and DDX25
    (DEAD-box helicase 25).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005572
