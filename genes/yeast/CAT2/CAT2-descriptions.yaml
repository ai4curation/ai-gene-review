  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: All sources agree on carnitine acetyltransferase activity. Alliance_Imported
      best captures the dual mitochondrial/peroxisomal localization and shuttle function.
  overall_notes: 'Alliance_Imported provides the best balance of accuracy and informativeness,
