descriptions:
- source: UniProt
  text: Carnitine acetylase is specific for short chain fatty acids. Carnitine acetylase
    seems to affect the flux through the pyruvate dehydrogenase complex. It may be
    involved as well in the transport of acetyl-CoA into mitochondria.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32796
  source_id: P32796
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Correct but hedging language understates established functions.
    - rubric: utility
      score: 3
      notes: Gives basic function but lacks clarity on the shuttle mechanism.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 3
      notes: Misses peroxisomal localization and acetylcarnitine shuttle mechanism.
    - rubric: specificity
      score: 3
      notes: Mentions short chain fatty acid specificity and pyruvate dehydrogenase
        complex.
    overall_notes: Accurate but uses somewhat vague language (seems to affect, may
      be involved). The function is better understood now than this description suggests.
- source: Alliance_Imported
  text: Carnitine acetyl-CoA transferase; present in both mitochondria and peroxisomes;
    transfers activated acetyl groups to carnitine to form acetylcarnitine which can
    be shuttled across membranes
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004506
  source_id: SGD:S000004506
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 5
      notes: Clear explanation of function and biological role.
    - rubric: compactness
      score: 5
      notes: Concise and well-structured.
    - rubric: completeness
      score: 4
      notes: Covers enzyme activity, localization, and shuttle; misses substrate specificity
        for short-chain fatty acids.
    - rubric: specificity
      score: 5
      notes: Names the reaction (acetyl group transfer to carnitine) and dual organelle
        localization.
    overall_notes: Best description. Clearly states the enzyme activity, dual localization,
      and acetylcarnitine shuttle mechanism.
- source: Alliance_Automated
  text: Enables carnitine O-acetyltransferase activity. Involved in carnitine metabolic
    process. Located in mitochondrion and peroxisome. Human ortholog(s) of this gene
    implicated in Alzheimer's disease; congenital myasthenic syndrome 6; and neurodegeneration
    with brain iron accumulation. Orthologous to several human genes including CRAT
    (carnitine O-acetyltransferase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004506
  source_id: SGD:S000004506
  review:
    reviewer: AI
