      growth.
- source: Alliance_Imported
  text: Transcriptional activator that enhances pseudohyphal growth; physically interacts
    with the Tup1-Cyc8 complex and recruits Tup1p to its targets; regulates expression
    of FLO11, an adhesin required for pseudohyphal filament formation; similar to
    StuA, an A. nidulans developmental regulator; potential Cdc28p substrate; PHD1
    has a paralog, SOK2, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001526
  source_id: SGD:S000001526
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Highly informative about mechanism and targets.
    - rubric: compactness
      score: 3
      notes: Dense but necessary.
    - rubric: completeness
      score: 5
      notes: Covers interactions, targets, substrates, and paralog.
    - rubric: specificity
      score: 5
      notes: Names FLO11, Tup1-Cyc8, StuA, Cdc28p specifically.
    overall_notes: Rich curated description with protein interactions and regulatory
      targets.
