gene_symbol: SWI1
organism: yeast
uniprot_id: P09547
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Component of the SWI/SNF complex,
    an ATP-dependent chromatin remodeling complex, which is required for the positive
    and negative regulation of gene expression of a large number of genes. It changes
    chromatin structure by altering DNA-histone contacts within a nucleosome, leading
    eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P09547
  source_id: P09547
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of SWI/SNF complex function and chromatin remodeling
        mechanism.
    - rubric: utility
      score: 4
      notes: Good overview of the complex function but lacks SWI1-specific details.
    - rubric: compactness
      score: 4
      notes: Moderately concise; two sentences covering complex function.
    - rubric: completeness
      score: 3
      notes: Misses the prion [SWI+] biology, specific target genes, and ARID domain.
    - rubric: specificity
      score: 3
      notes: Describes the complex generically; does not distinguish SWI1-specific
        roles.
    overall_notes: Accurate description of SWI1 as a SWI/SNF complex component involved
      in chromatin remodeling. Describes the general mechanism but does not identify
      SWI1-specific contributions.
- source: Alliance_Imported
  text: Subunit of the SWI/SNF chromatin remodeling complex; regulates transcription
    by remodeling chromatin; required for transcription of many genes, including ADH1,
    ADH2, GAL1, HO, INO1 and SUC2; self-assembles to form [SWI+] prion and to alter
    expression pattern; human homolog ARID1A is a candidate tumor suppressor gene
    in breast cancer
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005937
  source_id: SGD:S000005937
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; correctly names target genes and [SWI+] prion formation.
    - rubric: utility
      score: 5
      notes: Highly informative with specific target genes and disease relevance.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized semicolon format.
    - rubric: completeness
      score: 5
      notes: Covers chromatin remodeling, target genes, prion biology, and human disease
        relevance.
    - rubric: specificity
      score: 5
      notes: Names specific genes, prion state, and human homolog ARID1A.
    overall_notes: Excellent curated description. Names specific target genes (ADH1,
      ADH2, GAL1, HO, INO1, SUC2), the [SWI+] prion, and the human homolog ARID1A
      cancer connection.
- source: Alliance_Automated
  text: Enables RNA polymerase II-specific DNA-binding transcription factor binding
    activity. Involved in several processes, including cellular response to amino
    acid starvation; positive regulation of mating type switching; and positive regulation
    of transcription by RNA polymerase II. Located in nucleus. Part of SWI/SNF complex.
    Orthologous to human ARID5B (AT-rich interaction domain 5B).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005937
  source_id: SGD:S000005937
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: The ARID5B ortholog assignment is questionable; SWI1 is more closely
        related to ARID1A.
    - rubric: utility
      score: 2
      notes: Generic terms do not capture SWI1-specific function.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses target genes, prion biology, and chromatin remodeling mechanism.
    - rubric: specificity
      score: 2
      notes: Generic; "transcription factor binding activity" is uninformative.
    overall_notes: Generic GO-derived description. The ortholog assignment to ARID5B
      appears questionable; SWI1 is more commonly compared to ARID1A/ARID1B.
