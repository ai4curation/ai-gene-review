review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Good agreement on SWI/SNF chromatin remodeling function. SGD adds substantial
      gene-specific detail. Possible discrepancy in automated ortholog assignment.
  overall_notes: SGD curated is clearly the best source, providing target genes, prion
    biology, and disease relevance. UniProt describes the SWI/SNF complex mechanism
    well but generically. Automated sources are weak and may have an incorrect ortholog
    assignment (ARID5B instead of ARID1A). Good concordance on core SWI/SNF function.
