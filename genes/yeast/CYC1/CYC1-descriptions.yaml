gene_symbol: CYC1
organism: yeast
uniprot_id: P00044
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Electron carrier protein. The oxidized form of the cytochrome c heme group
    can accept an electron from the heme group of the cytochrome c1 subunit of ubiquinol-cytochrome
    c oxidoreductase. Cytochrome c then transfers this electron to the dinuclear copper
    A center (CU(A)) of the COX2 subunit of cytochrome oxidase, the final protein
    carrier in the mitochondrial electron-transport chain. Isoform 1 (CYC1) is the
    predominant cytochrome c during aerobic/normoxic growth.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P00044
  source_id: P00044
- source: Alliance_Imported
  text: Cytochrome c, isoform 1; also known as iso-1-cytochrome c; electron carrier
    of mitochondrial intermembrane space that transfers electrons from ubiquinone-cytochrome
    c oxidoreductase to cytochrome c oxidase during cellular respiration; CYC1 has
    a paralog, CYC7, that arose from the whole genome duplication; human homolog CYC1
    can complement yeast null mutant; mutations in human CYC1 cause insulin-responsive
    hyperglycemia
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003809
  source_id: SGD:S000003809
- source: Alliance_Automated
  text: Enables cardiolipin binding activity and electron transfer activity. Involved
    in mitochondrial electron transport, cytochrome c to oxygen and mitochondrial
    electron transport, ubiquinol to cytochrome c. Located in mitochondrial intermembrane
    space. Used to study hyperglycemia and thrombocytopenia. Human ortholog(s) of
    this gene implicated in cholangiocarcinoma; lung non-small cell carcinoma; pancreatic
    cancer; and thrombocytopenia. Orthologous to human CYCS (cytochrome c, somatic).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003809
  source_id: SGD:S000003809
