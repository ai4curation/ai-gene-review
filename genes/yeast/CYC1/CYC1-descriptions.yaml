- source: Alliance_Automated
  text: Enables cardiolipin binding activity and electron transfer activity. Involved
    in mitochondrial electron transport, cytochrome c to oxygen and mitochondrial
    electron transport, ubiquinol to cytochrome c. Located in mitochondrial intermembrane
    space. Used to study hyperglycemia and thrombocytopenia. Human ortholog(s) of
    this gene implicated in cholangiocarcinoma; lung non-small cell carcinoma; pancreatic
    cancer; and thrombocytopenia. Orthologous to human CYCS (cytochrome c, somatic).
  source_type: automated
