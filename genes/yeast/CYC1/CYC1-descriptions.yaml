descriptions:
- source: UniProt
  text: Electron carrier protein. The oxidized form of the cytochrome c heme group
    can accept an electron from the heme group of the cytochrome c1 subunit of ubiquinol-cytochrome
    c oxidoreductase. Cytochrome c then transfers this electron to the dinuclear copper
    A center (CU(A)) of the COX2 subunit of cytochrome oxidase, the final protein
    carrier in the mitochondrial electron-transport chain. Isoform 1 (CYC1) is the
    predominant cytochrome c during aerobic/normoxic growth.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P00044
  source_id: P00044
