      notes: Accurate mechanistic description of electron carrier function.
    - rubric: utility
      score: 5
      notes: Detailed and highly informative about the electron transfer pathway.
    - rubric: compactness
      score: 3
      notes: Lengthy but the detail is warranted for this well-studied protein.
    - rubric: completeness
      score: 5
      notes: Covers electron transfer, interaction partners, and isoform biology.
    - rubric: specificity
      score: 5
      notes: 'Highly specific: cytochrome c1, CU(A) center, COX2 subunit.'
    overall_notes: Excellent detailed description of electron transfer mechanism and
      isoform context.
- source: Alliance_Imported
  text: Cytochrome c, isoform 1; also known as iso-1-cytochrome c; electron carrier
    of mitochondrial intermembrane space that transfers electrons from ubiquinone-cytochrome
    c oxidoreductase to cytochrome c oxidase during cellular respiration; CYC1 has
    a paralog, CYC7, that arose from the whole genome duplication; human homolog CYC1
    can complement yeast null mutant; mutations in human CYC1 cause insulin-responsive
    hyperglycemia
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003809
  source_id: SGD:S000003809
