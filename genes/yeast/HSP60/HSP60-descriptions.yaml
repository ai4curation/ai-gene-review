review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: All agree HSP60 is a mitochondrial chaperone, but quality ranges from excellent
      (SGD) to inadequate (UniProt). Automated descriptions are generic.
  overall_notes: 'UniProt is disappointingly vague and hedged for such a well-characterized
    essential chaperonin. Alliance_Imported (SGD) is the clear best description. Automated
    sources add little value and waste space on human disease associations. Best source:
    Alliance_Imported.'
