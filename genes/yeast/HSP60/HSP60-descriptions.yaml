taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: May participate in assembly and/or disassembly of proteins imported into the
    mitochondrion. HSP60 are ATPases and have affinity for unfolded proteins.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P19882
  source_id: P19882
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: '''May participate'' is unnecessarily hedged; HSP60 chaperonin function
        is well-established.'
    - rubric: utility
      score: 2
      notes: Too vague to understand HSP60 as a tetradecameric chaperonin.
    - rubric: compactness
      score: 5
      notes: Very brief.
    - rubric: completeness
      score: 1
      notes: Misses tetradecameric structure, ATP-dependent folding, heat shock refolding,
        and mtDNA role.
    - rubric: specificity
      score: 2
      notes: 'Generic: could apply to many mitochondrial chaperones.'
    overall_notes: Vague and hedged. Uses 'May participate' despite HSP60 being an
      essential, well-characterized mitochondrial chaperonin.
- source: Alliance_Imported
  text: Tetradecameric mitochondrial chaperonin; required for ATP-dependent folding
    of precursor polypeptides and complex assembly; prevents aggregation and mediates
    protein refolding after heat shock; role in mtDNA transmission; phosphorylated
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004249
  source_id: SGD:S000004249
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and well-established.
    - rubric: utility
      score: 5
      notes: Comprehensive overview of HSP60 biology.
    - rubric: compactness
      score: 5
      notes: Dense semicolon-delimited format packs in key details.
    - rubric: completeness
      score: 5
      notes: Covers structure, mechanism, heat shock response, and mtDNA role.
    - rubric: specificity
      score: 5
      notes: Tetradecameric, ATP-dependent, mtDNA transmission are all specific details.
    overall_notes: Excellent. Identifies tetradecameric structure, ATP-dependent folding,
      complex assembly, heat shock refolding, and mtDNA transmission role.
- source: Alliance_Automated
  text: Enables several functions, including ATP hydrolysis activity; DNA binding
    activity; and unfolded protein binding activity. Involved in several processes,
    including chaperone-mediated protein complex assembly; protein folding; and protein
    stabilization. Located in mitochondrion. Is active in mitochondrial nucleoid.
    Human ortholog(s) of this gene implicated in several diseases, including artery
    disease (multiple); autistic disorder; glucose intolerance; hereditary spastic
    paraplegia (multiple); and hypomyelinating leukodystrophy 4. Orthologous to human
    HSPD1 (heat shock protein family D (Hsp60) member 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004249
  source_id: SGD:S000004249
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: GO terms are accurate; human disease info is correct but irrelevant for
        yeast.
    - rubric: utility
      score: 2
      notes: Does not convey tetradecameric structure or mechanism.
    - rubric: compactness
      score: 3
      notes: Wastes space on human disease associations.
    - rubric: completeness
      score: 2
      notes: Misses oligomeric structure, heat shock refolding, and mtDNA role.
    - rubric: specificity
      score: 2
