id: Q12198
gene_symbol: HSU1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  HSU1 (Hydrogen Sulfide Utilizing 1, also known as YLL058W) encodes a PLP-dependent
  homocysteine/cysteine synthase that plays a role in inorganic sulfur assimilation under
  sulfur-limited conditions. It catalyzes the conversion of O-acetyl-L-homoserine and
  hydrogen sulfide into L-homocysteine (EC 2.5.1.49), and can also convert O-acetyl-L-serine
  and hydrogen sulfide into L-cysteine (EC 2.5.1.47). The enzyme is structurally related to
  Met15/Met17 and the cystathionine gamma-synthase Str2, but is monomeric rather than
  tetrameric. HSU1 is induced during sulfur limitation and confers a growth advantage under
  low-sulfur conditions. It is less catalytically efficient than Met15 (approximately 10-fold
  lower Vmax) but is sufficient to support growth when Met15 is absent, particularly when
  hydrogen sulfide accumulates. In yeast, cysteine biosynthesis via OAS may serve a regulatory
  rather than metabolic role, as cysteine is primarily synthesized through the transsulfuration
  pathway.
existing_annotations:
- term:
    id: GO:0003962
    label: cystathionine gamma-synthase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from PANTHER. HSU1/YLL058W is a paralog
      of STR2 (cystathionine gamma-synthase) and groups in the same PANTHER family
      (PTHR42699:SF1, CYSTATHIONINE GAMMA-SYNTHASE-RELATED). However, experimental
      characterization shows that HSU1 functions primarily as a homocysteine synthase
      (O-acetylhomoserine sulfhydrylase) rather than a cystathionine gamma-synthase.
      Van Oss et al. (PMID:36379252) demonstrated direct enzyme kinetics showing OAH
      sulfhydrylase activity. Yu et al. (PMID:36455053) confirmed this and showed it
      catalyzes homocysteine synthesis from OAH and sulfide. No cystathionine gamma-synthase
      activity has been demonstrated for HSU1.
    action: MODIFY
    reason: >-
      Although HSU1 is phylogenetically related to cystathionine gamma-synthases (Str2),
      the actual experimentally characterized activity is O-acetylhomoserine sulfhydrylase
      (homocysteine synthase). The IBA annotation reflects the ancestral/family function but
      not the actual activity of this diverged paralog. The correct term is
      GO:0051009 (O-acetylhomoserine sulfhydrylase activity), which is already annotated
      from IDA evidence.
    proposed_replacement_terms:
    - id: GO:0051009
      label: O-acetylhomoserine sulfhydrylase activity
    additional_reference_ids:
    - PMID:36379252
    - PMID:36455053
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        We then measured enzyme kinetic parameters by performing analogous reactions with
        varying amounts of the limiting substrate, OAH (Fig. 3E). Yll058w activity was
        consistently above background and increased with increasing OAH concentrations
        (Vmax: 1.62; Km: 4.29)
    - reference_id: PMID:36455053
      supporting_text: >-
        Hsu1p acts as a homocysteine synthase and allows the cells to substitute for Met17p
        by reassimilating hydrosulfide ions leaked from met17Δ cells into O-acetyl-homoserine
        and forming homocysteine.

- term:
    id: GO:0019346
    label: transsulfuration
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference. HSU1 is a paralog of STR2 which is
      involved in transsulfuration. However, the primary biological role of HSU1 is in
      direct sulfur incorporation (sulfide fixation into homocysteine) rather than the
      classical transsulfuration pathway (which involves cystathionine as an intermediate).
      The transsulfuration pathway in yeast involves Str2 (cystathionine gamma-synthase) and
      Str3 (cystathionine beta-lyase). HSU1 bypasses this by directly incorporating sulfide
      into OAH.
    action: MODIFY
    reason: >-
      HSU1 does not participate in transsulfuration (the interconversion of cysteine and
      homocysteine via cystathionine). Instead it catalyzes a direct sulfur fixation route,
      converting OAH + H2S to homocysteine. The appropriate process term would be
      L-homocysteine biosynthetic process (GO:0071269), which is already annotated from IDA
      evidence, or de novo L-methionine biosynthetic process (GO:0071266).
    proposed_replacement_terms:
    - id: GO:0071269
      label: L-homocysteine biosynthetic process
    additional_reference_ids:
    - PMID:36455053
    - PMID:36379252
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Hsu1p resolves organosulfur auxotrophy by substituting for Met17p, catalyzing the
        incorporation of inorganic sulfide ions with OAHS to form homocysteine, thereby
        replenishing the central organosulfur pool
    - reference_id: PMID:36379252
      supporting_text: >-
        We therefore conclude that YLL058W encodes an inefficient homocysteine synthase
        capable of catalyzing the same reaction as Met15.

- term:
    id: GO:0003961
    label: O-acetylhomoserine aminocarboxypropyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation based on Rhea mapping (RHEA:10048) and EC 2.5.1.49. This GO term
      represents the activity of converting O-acetyl-L-homoserine + methanethiol to
      L-methionine + acetate. This is the methanethiol-utilizing reaction. The primary
      demonstrated activity for HSU1 is the sulfide-utilizing reaction (OAH + H2S ->
      homocysteine), which corresponds to GO:0051009 (O-acetylhomoserine sulfhydrylase
      activity). The methanethiol-utilizing activity (this term) is annotated in UniProt
      by similarity to the Neurospora crassa ortholog (P06106) but has not been
      directly demonstrated for HSU1.
    action: ACCEPT
    reason: >-
      Both activities fall under EC 2.5.1.49. The IEA mapping from EC number is reasonable.
      The enzyme has been assigned this EC number based on UniProt curation. While the
      sulfhydrylase activity is more directly demonstrated, this broader annotation
      captures the EC classification appropriately.
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        Yll058w activity was consistently above background and increased with increasing
        OAH concentrations (Vmax: 1.62; Km: 4.29), although remaining less efficient than
        Met15 activity at all OAH concentrations (Vmax: 89.21; Km: 8.03).

- term:
    id: GO:0004124
    label: cysteine synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation based on Rhea mapping (RHEA:14829) and EC 2.5.1.47. Yu et al.
      (PMID:36455053) demonstrated cysteine synthase activity in vitro, showing conversion
      of O-acetylserine (OAS) to cysteine with hydrogen sulfide as sulfur donor. However,
      UniProt notes that in S. cerevisiae, cysteine biosynthesis occurs exclusively through
      the cystathionine pathway, not via direct sulfur incorporation into OAS, so HSU1 may
      have no metabolic role in cysteine biosynthesis and may only have a regulatory role
      controlling OAS levels.
    action: ACCEPT
    reason: >-
      The enzymatic activity has been directly demonstrated in vitro by Yu et al.
      (PMID:36455053). Even though the in vivo metabolic significance is uncertain (cysteine
      is made via the cystathionine pathway in yeast), the molecular function annotation is
      appropriate as the enzyme does possess this catalytic capability.
    additional_reference_ids:
    - PMID:36455053
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        We also tested the ability of the enzyme to function as a cysteine synthase using
        O-acetylserine (OAS) as an alternative substrate... Cysteine synthase activity was
        observed at high enzyme concentrations (RCT_100; S3D Fig).

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation from UniProtKB subcellular location vocabulary mapping. UniProt records
      cytoplasmic localization based on similarity to the N. crassa ortholog (P06106).
    action: ACCEPT
    reason: >-
      Cytoplasmic localization is consistent with the function of a soluble PLP-dependent
      enzyme involved in amino acid biosynthesis. The annotation is based on similarity
      to a well-characterized ortholog. No contradicting localization data exists.

- term:
    id: GO:0016765
    label: transferase activity, transferring alkyl or aryl (other than methyl) groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning model. This is a broad parent term that
      encompasses the more specific O-acetylhomoserine sulfhydrylase and
      O-acetylhomoserine aminocarboxypropyltransferase activities already annotated.
    action: ACCEPT
    reason: >-
      This is a correct but general parent term. As an IEA annotation, it is appropriately
      broad. More specific child terms (GO:0051009, GO:0003961) are already present with
      experimental evidence. Keeping this IEA is acceptable as it captures the general
      transferase classification.

- term:
    id: GO:0019344
    label: L-cysteine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation inferred from cysteine synthase activity (GO:0004124) via logical
      inference. While HSU1 has been shown to have cysteine synthase activity in vitro,
      UniProt notes that in S. cerevisiae cysteine is synthesized exclusively through the
      cystathionine pathway. HSU1's cysteine synthase activity may only serve a regulatory
      role controlling OAS levels rather than contributing metabolically to cysteine
      biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Although the enzyme can produce cysteine from OAS in vitro (PMID:36455053), the
      biological significance is questionable. UniProt states (by similarity to P06106)
      that S. cerevisiae cysteine biosynthesis occurs exclusively through the cystathionine
      pathway, and HSU1 may only have a regulatory role controlling OAS levels. The in
      vivo contribution to L-cysteine biosynthesis is therefore likely minimal, making this
      an over-annotation.
    additional_reference_ids:
    - PMID:36455053
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        We also tested the ability of the enzyme to function as a cysteine synthase using
        O-acetylserine (OAS) as an alternative substrate... Cysteine synthase activity was
        observed at high enzyme concentrations (RCT_100; S3D Fig).

- term:
    id: GO:0019346
    label: transsulfuration
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR000277, Cys/Met-Metab_PyrdxlP-dep_enz). This is
      a duplicate of the IBA annotation for the same term, and the same concerns apply.
      HSU1 catalyzes direct sulfide fixation rather than transsulfuration.
    action: MODIFY
    reason: >-
      Same rationale as for the IBA annotation of this term. HSU1 does not catalyze a
      transsulfuration reaction (which involves cystathionine as intermediate). It directly
      incorporates sulfide into OAH to form homocysteine. The InterPro domain is shared
      with true transsulfuration enzymes like Str2, but the biochemical function of HSU1
      is distinct.
    proposed_replacement_terms:
    - id: GO:0071269
      label: L-homocysteine biosynthetic process
    additional_reference_ids:
    - PMID:36455053
    - PMID:36379252
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Hsu1p resolves organosulfur auxotrophy by substituting for Met17p, catalyzing the
        incorporation of inorganic sulfide ions with OAHS to form homocysteine

- term:
    id: GO:0030170
    label: pyridoxal phosphate binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro (IPR000277). HSU1 belongs to the PLP-dependent
      transferase superfamily. UniProt annotates PLP as a cofactor by similarity to
      P06106. The catalytic lysine K376 is the predicted PLP-binding residue
      (PMID:36379252), and K376A mutation abolishes catalytic activity.
    action: ACCEPT
    reason: >-
      PLP-dependence is well-supported by domain classification, the conserved catalytic
      lysine K376, and mutagenesis data showing K376A abolishes activity (PMID:36379252).
      The enzyme requires PLP for catalysis.
    additional_reference_ids:
    - PMID:36379252
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        The predicted structures of both Met15 and Yll058w are highly similar to MetY
        within the active site, including the catalytic lysine K376

- term:
    id: GO:0050667
    label: homocysteine metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: >-
      IEA annotation from ARBA machine learning model. HSU1 catalyzes biosynthesis of
      homocysteine from OAH and sulfide, so involvement in homocysteine metabolism is
      correct. The more specific term GO:0071269 (L-homocysteine biosynthetic process)
      is already annotated with IDA evidence.
    action: ACCEPT
    reason: >-
      This is a correct but general parent term for the more specific L-homocysteine
      biosynthetic process annotation. As an IEA it is appropriately placed and subsumes
      the experimentally validated function.

- term:
    id: GO:0051009
    label: O-acetylhomoserine sulfhydrylase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  review:
    summary: >-
      IEA annotation based on Rhea mapping (RHEA:27822). This represents the primary
      catalytic activity of HSU1: conversion of O-acetyl-L-homoserine + hydrogen sulfide
      to L-homocysteine + acetate. This activity is directly demonstrated by enzyme
      kinetics in both PMID:36379252 and PMID:36455053.
    action: ACCEPT
    reason: >-
      Correct annotation. This is the core molecular function of HSU1, well-supported by
      direct enzyme assays in both key publications. Also annotated with IDA evidence from
      PMID:36379252.
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        Yll058w activity was consistently above background and increased with increasing
        OAH concentrations (Vmax: 1.62; Km: 4.29)

- term:
    id: GO:0071266
    label: "'de novo' L-methionine biosynthetic process"
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      IEA annotation inferred from having both GO:0003961 (O-acetylhomoserine
      aminocarboxypropyltransferase activity) and GO:0051009 (O-acetylhomoserine
      sulfhydrylase activity). HSU1 synthesizes homocysteine, which is a precursor of
      methionine. The pathway annotation in UniProt confirms L-methionine biosynthesis
      via de novo pathway. Both publications establish HSU1 as part of the methionine
      biosynthesis pathway.
    action: ACCEPT
    reason: >-
      HSU1 catalyzes the step producing homocysteine from OAH and sulfide, which is
      a step in de novo L-methionine biosynthesis. Both publications confirm this
      pathway role. The annotation is appropriate.
    additional_reference_ids:
    - PMID:36455053
    - PMID:36379252
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Hsu1p acts as a homocysteine synthase and allows the cells to substitute for Met17p
        by reassimilating hydrosulfide ions leaked from met17Δ cells into O-acetyl-homoserine
        and forming homocysteine.

- term:
    id: GO:0000103
    label: sulfate assimilation
  evidence_type: IMP
  original_reference_id: PMID:36455053
  review:
    summary: >-
      IMP annotation based on genetic evidence from Yu et al. (PMID:36455053). Deletion
      of HSU1 decreases growth under sulfur-limited conditions. HSU1 enables cells to
      reassimilate sulfide (the reduced product of sulfate assimilation) into organic
      sulfur compounds. However, the term "sulfate assimilation" (GO:0000103) specifically
      refers to the reductive pathway from sulfate to sulfide, while HSU1 acts downstream,
      incorporating sulfide into organic molecules.
    action: ACCEPT
    reason: >-
      The GO definition of sulfate assimilation (GO:0000103) is "The pathways by which
      inorganic sulfate is processed and incorporated into sulfated compounds." HSU1
      is part of the broader process that results in incorporation of inorganic sulfur
      into organic compounds. The genetic evidence supports involvement in this overall
      process: hsu1 deletion impairs growth under sulfur limitation and the enzyme is
      co-regulated with sulfur assimilation genes by Met4p.
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Hsu1p was found up-regulated in both datasets, together with Mmp1p (high-affinity
        S-methylmethionine permease), Jlp1p (Fe(II)-dependent sulfonate/alpha-ketoglutarate
        dioxygenase), Yct1p (high-affinity cysteine-specific transporter), Soa1p (sulfonate
        and inorganic sulfur transporter), and Bds1 (bacterially derived sulfatase).
        Therefore, the induction of HSU1 in parallel with other genes involved in the
        uptake or utilization of alternative sulfur sources suggested a functional
        association of these genes to a sulfur limitation response.

- term:
    id: GO:0003961
    label: O-acetylhomoserine aminocarboxypropyltransferase activity
  evidence_type: IDA
  original_reference_id: PMID:36455053
  review:
    summary: >-
      IDA annotation from Yu et al. (PMID:36455053). The authors directly demonstrated
      that recombinant Hsu1p catalyzes the conversion of O-acetylhomoserine and sulfide
      into homocysteine using Ellman's reagent and spectrophotometry. This is the same
      reaction class as the O-acetylhomoserine aminocarboxypropyltransferase activity
      (EC 2.5.1.49), which encompasses both the methanethiol-utilizing and the
      sulfide-utilizing reactions.
    action: ACCEPT
    reason: >-
      Directly demonstrated by in vitro enzyme assays. The enzyme produces homocysteine
      from OAH substrates, consistent with EC 2.5.1.49. Both immunoprecipitated and
      recombinant enzyme showed this activity.
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        We observed an increase in homocysteine in the presence of OAHS for both Met17p
        and Hsu1p, again indicating that Hsu1p possesses homocysteine synthase activity.

- term:
    id: GO:0006791
    label: sulfur utilization
  evidence_type: IMP
  original_reference_id: PMID:36455053
  review:
    summary: >-
      IMP annotation from Yu et al. (PMID:36455053). HSU1 deletion impairs sulfide
      utilization. The genetic screen showed that YLL058W deletion led to loss of the
      ability to utilize H2S for growth, and the double mutant met17/hsu1 was unable
      to grow without exogenous organosulfur.
    action: ACCEPT
    reason: >-
      Well-supported by multiple genetic experiments. HSU1 is essential for utilizing
      hydrogen sulfide as a sulfur source when MET17 is absent. Even in a MET17+ background,
      HSU1 provides a growth advantage under sulfur limitation. Sulfur utilization
      accurately captures this biological role.
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Intriguingly, we observed that YLL058WΔ led to the loss of the ability to utilize
        H2S for growth (Fig 3A)

- term:
    id: GO:0071269
    label: L-homocysteine biosynthetic process
  evidence_type: IDA
  original_reference_id: PMID:36455053
  review:
    summary: >-
      IDA annotation from Yu et al. (PMID:36455053). Direct enzyme assays demonstrated
      that Hsu1p catalyzes the formation of homocysteine from OAH and sulfide. Both
      immunoprecipitated Hsu1-GFP and recombinant His-Hsu1 showed homocysteine synthase
      activity. Supplementation with reaction products rescued growth of organosulfur
      auxotrophs.
    action: ACCEPT
    reason: >-
      This is a core annotation for HSU1, directly demonstrated by multiple in vitro enzyme
      assays and in vivo complementation experiments. L-homocysteine biosynthesis is the
      primary biological role of HSU1.
    supported_by:
    - reference_id: PMID:36455053
      supporting_text: >-
        Critically, we observed that supplementation with postreaction supernatant generated
        in the presence of immunoprecipitated Hsu1-GFP restores growth in the mutant
        backgrounds, akin to direct supplementation with an organosulfur compound

- term:
    id: GO:0005575
    label: cellular_component
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND (No biological Data) annotation indicating no experimental cellular component
      data is available. UniProt annotates cytoplasm by similarity (ISS) and the IEA
      annotation for cytoplasm is present.
    action: ACCEPT
    reason: >-
      Standard ND annotation indicating absence of experimental localization data.
      This is a valid placeholder. No experimental CC data exists for HSU1 currently.

- term:
    id: GO:0006790
    label: sulfur compound metabolic process
  evidence_type: IMP
  original_reference_id: PMID:36379252
  review:
    summary: >-
      IMP annotation from Van Oss et al. (PMID:36379252) assigned by SGD. The met15/yll058w
      double mutant shows synthetic lethality on media lacking organosulfurs, demonstrating
      a role in sulfur compound metabolism. The enzyme directly catalyzes conversion of
      inorganic sulfide into organic sulfur compounds (homocysteine).
    action: ACCEPT
    reason: >-
      Correct but general annotation. HSU1 is involved in sulfur compound metabolism as
      it converts inorganic sulfide into homocysteine. The more specific terms
      (L-homocysteine biosynthetic process, sulfur utilization, sulfate assimilation) are
      already annotated. This broader term is acceptable as a parent annotation.
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        Strikingly however, the FY4-met15Δ yll058wΔ double mutant showed little to no growth
        in the absence of exogenous organosulfurs

- term:
    id: GO:0051009
    label: O-acetylhomoserine sulfhydrylase activity
  evidence_type: IDA
  original_reference_id: PMID:36379252
  review:
    summary: >-
      IDA annotation from Van Oss et al. (PMID:36379252) assigned by SGD. The authors
      purified recombinant Yll058w and performed detailed enzyme kinetics with varying
      concentrations of OAH substrate. They measured Vmax of 1.62 and Km of 4.29 uM for
      OAH. The catalytic dead K376A mutant had no detectable activity.
    action: ACCEPT
    reason: >-
      This is the primary molecular function of HSU1, demonstrated with rigorous enzyme
      kinetics including Km and Vmax measurements. The K376A catalytic dead mutant serves
      as an excellent negative control. This is a core annotation.
    supported_by:
    - reference_id: PMID:36379252
      supporting_text: >-
        Yll058w activity was consistently above background and increased with increasing
        OAH concentrations (Vmax: 1.62; Km: 4.29), although remaining less efficient than
        Met15 activity at all OAH concentrations (Vmax: 89.21; Km: 8.03). The putative
        catalytic dead mutant Yll058w (K376A) had no detectable activity.

