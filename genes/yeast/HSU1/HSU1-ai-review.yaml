suggested_questions:
- question: >-
    What is the precise in vivo contribution of HSU1 cysteine synthase activity? Does it
    regulate OAS levels as suggested by UniProt?
- question: >-
    What are the relative contributions of HSU1 and Met17/Met15 to homocysteine biosynthesis
    under different sulfur availability conditions?
- question: >-
    Is HSU1 active as a monomer as predicted by structural analysis, or does it form
    higher-order oligomers?

suggested_experiments:
- description: >-
    Experimental determination of subcellular localization using fluorescence microscopy
    of the Hsu1-GFP strain under sulfur limitation conditions.
  experiment_type: fluorescence microscopy
  hypothesis: >-
    HSU1 localizes to the cytoplasm as predicted by similarity to the N. crassa ortholog.
- description: >-
    Metabolomics comparing OAS and OAH levels in hsu1 deletion vs. wild-type under
    sulfur limitation to clarify regulatory vs. metabolic role in cysteine biosynthesis.
  experiment_type: targeted metabolomics
  hypothesis: >-
    HSU1 cysteine synthase activity regulates OAS levels rather than contributing
    metabolically to cysteine biosynthesis in vivo.
- description: >-
    Crystal structure determination to confirm the predicted monomeric active site
    architecture.
  experiment_type: X-ray crystallography
  hypothesis: >-
    HSU1 functions as a monomer with a unique 180-aa insertion that completes the
    active site, unlike the tetrameric Met15/MetY homologs.
