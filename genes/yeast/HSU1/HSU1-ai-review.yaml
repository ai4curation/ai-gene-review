- id: PMID:36379252
  title: 'On the illusion of auxotrophy: met15Δ yeast cells can grow on inorganic
    sulfur, thanks to the previously uncharacterized homocysteine synthase Yll058w.'
  findings:
  - statement: >-
      YLL058W encodes an inefficient homocysteine synthase capable of catalyzing the
      same reaction as Met15 (O-acetylhomoserine + sulfide -> homocysteine).
    supporting_text: >-
      We therefore conclude that YLL058W encodes an inefficient homocysteine synthase
      capable of catalyzing the same reaction as Met15.
  - statement: >-
      Enzyme kinetics showed Vmax 1.62 and Km 4.29 uM for OAH, compared to Met15
      Vmax 89.21 and Km 8.03.
    supporting_text: >-
      Yll058w activity was consistently above background and increased with increasing
      OAH concentrations (Vmax: 1.62; Km: 4.29), although remaining less efficient than
      Met15 activity at all OAH concentrations (Vmax: 89.21; Km: 8.03).
  - statement: >-
      K376A catalytic lysine mutant abolishes activity, confirming PLP-dependent mechanism.
    supporting_text: >-
      The putative catalytic dead mutant Yll058w (K376A) had no detectable activity.
  - statement: >-
      Met15/YLL058W double mutant shows synthetic lethality without exogenous organosulfurs.
    supporting_text: >-
      Strikingly however, the FY4-met15Δ yll058wΔ double mutant showed little to no growth
      in the absence of exogenous organosulfurs
  - statement: >-
      Growth defect of met15 cells is largely due to H2S toxicity, not inability to
      fix sulfur.
    supporting_text: >-
      Thus, the growth defect (in some settings) and auxotrophic-like behavior (in other
      settings) of met15Δ cells grown without organosulfurs is at least partially
      attributable to H2S toxicity.
- id: PMID:36455053
  title: Inorganic sulfur fixation via a new homocysteine synthase allows yeast cells
    to cooperatively compensate for methionine auxotrophy.
  findings:
  - statement: >-
      YLL058Wp/Hsu1p acts as a homocysteine synthase, reassimilating hydrosulfide ions
      into O-acetyl-homoserine to form homocysteine.
    supporting_text: >-
      Hsu1p acts as a homocysteine synthase and allows the cells to substitute for Met17p
      by reassimilating hydrosulfide ions leaked from met17Δ cells into O-acetyl-homoserine
      and forming homocysteine
  - statement: >-
      Hsu1p also possesses cysteine synthase activity using O-acetylserine as substrate.
    supporting_text: >-
      We also tested the ability of the enzyme to function as a cysteine synthase using
      O-acetylserine (OAS) as an alternative substrate
  - statement: >-
      HSU1 is induced under sulfur limitation and confers a growth advantage under
      low-sulfur conditions.
    supporting_text: >-
      we observed that HSU1 expression confers a moderate but significant 1.2-fold growth
      advantage under sulfur-limited conditions, which was not observed when sulfur was
      replete
  - statement: >-
      HSU1 expression is regulated by sulfur/organosulfur limitation, part of the Met4p
      sulfur limitation regulon.
    supporting_text: >-
      the induction of HSU1 in parallel with other genes involved in the uptake or
      utilization of alternative sulfur sources suggested a functional association of
      these genes to a sulfur limitation response
  - statement: >-
      YLL058W deletion abolishes the ability to utilize H2S for growth in met17 background.
    supporting_text: >-
      Intriguingly, we observed that YLL058WΔ led to the loss of the ability to utilize
      H2S for growth (Fig 3A)

core_functions:
- description: >-
    Primary homocysteine synthase activity: catalyzes conversion of O-acetyl-L-homoserine
    + hydrogen sulfide to L-homocysteine + acetate. Uses PLP as cofactor (catalytic
    lysine K376). Less efficient than Met15 (Vmax 1.62 vs 89.21) but sufficient to
    support growth under sulfur limitation. Also possesses secondary cysteine synthase
    activity (OAS + H2S -> cysteine) of uncertain in vivo significance.
  molecular_function:
    id: GO:0051009
    label: O-acetylhomoserine sulfhydrylase activity
  directly_involved_in:
  - id: GO:0071269
    label: L-homocysteine biosynthetic process
  - id: GO:0006791
    label: sulfur utilization
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:36379252
    supporting_text: >-
      We therefore conclude that YLL058W encodes an inefficient homocysteine synthase
      capable of catalyzing the same reaction as Met15.
  - reference_id: PMID:36455053
    supporting_text: >-
      Hsu1p acts as a homocysteine synthase and allows the cells to substitute for Met17p
      by reassimilating hydrosulfide ions leaked from met17 cells into O-acetyl-homoserine
      and forming homocysteine.

