gene_symbol: SWI2
organism: yeast
uniprot_id: P22082
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Catalytic component of the SWI/SNF
    complex, an ATP-dependent chromatin-remodeling complex, which is required for
    the positive and negative regulation of gene expression of a large number of genes.
    It changes chromatin structure by altering DNA-histone contacts within a nucleosome,
    leading eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P22082
  source_id: P22082
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; correctly identifies SWI2 as the catalytic ATPase subunit.
    - rubric: utility
      score: 4
      notes: Good but shares most content with other SWI/SNF subunit descriptions.
    - rubric: compactness
      score: 4
      notes: Same structure as SWI1/SWI3 entries; moderately concise.
    - rubric: completeness
      score: 3
      notes: Misses DNA-stimulated ATPase activity, specific functional partners (SNF5,
        SNF6), and human disease associations.
    - rubric: specificity
      score: 4
      notes: The "catalytic component" designation is SWI2-specific, distinguishing
        it from other subunits.
    overall_notes: Describes SWI2/SNF2 as the catalytic component of SWI/SNF with
      ATP-dependent chromatin remodeling. Very similar to SWI1 and SWI3 descriptions,
      reflecting shared complex function.
- source: Alliance_Imported
  text: Catalytic subunit of the SWI/SNF chromatin remodeling complex; involved in
    transcriptional regulation; contains DNA-stimulated ATPase activity; functions
    interdependently in transcriptional activation with Snf5p and Snf6p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005816
  source_id: SGD:S000005816
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; DNA-stimulated ATPase and partner interdependence are well-established.
    - rubric: utility
      score: 5
      notes: Clearly distinguishes SWI2 from other subunits by its catalytic and ATPase
        roles.
    - rubric: compactness
      score: 5
      notes: Concise semicolon format covering key aspects.
    - rubric: completeness
      score: 4
      notes: Covers catalytic role, ATPase, and partner interdependence. Misses disease
        associations.
    - rubric: specificity
      score: 5
      notes: Names DNA-stimulated ATPase, Snf5p, Snf6p as specific functional partners.
    overall_notes: Good curated description. Identifies the catalytic subunit role,
      DNA-stimulated ATPase activity, and interdependent function with Snf5p and Snf6p.
- source: Alliance_Automated
  text: Enables several functions, including ATP-dependent chromatin remodeler activity;
    DNA binding activity; and histone reader activity. Involved in several processes,
    including DNA metabolic process; aggrephagy; and positive regulation of macromolecule
    biosynthetic process. Located in nucleus. Part of SWI/SNF complex. Used to study
    cancer. Human ortholog(s) of this gene implicated in Coffin-Siris syndrome 4;
    cancer; hepatocellular carcinoma; lung non-small cell carcinoma; and rhabdoid
    tumor predisposition syndrome 2. Orthologous to human SMARCA4 (SWI/SNF related
    BAF chromatin remodeling complex subunit ATPase 4).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005816
  source_id: SGD:S000005816
