gene_symbol: SWI2
organism: yeast
uniprot_id: P22082
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Catalytic component of the SWI/SNF
    complex, an ATP-dependent chromatin-remodeling complex, which is required for
    the positive and negative regulation of gene expression of a large number of genes.
    It changes chromatin structure by altering DNA-histone contacts within a nucleosome,
    leading eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P22082
  source_id: P22082
- source: Alliance_Imported
  text: Catalytic subunit of the SWI/SNF chromatin remodeling complex; involved in
    transcriptional regulation; contains DNA-stimulated ATPase activity; functions
    interdependently in transcriptional activation with Snf5p and Snf6p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005816
  source_id: SGD:S000005816
- source: Alliance_Automated
  text: Enables several functions, including ATP-dependent chromatin remodeler activity;
    DNA binding activity; and histone reader activity. Involved in several processes,
    including DNA metabolic process; aggrephagy; and positive regulation of macromolecule
    biosynthetic process. Located in nucleus. Part of SWI/SNF complex. Used to study
    cancer. Human ortholog(s) of this gene implicated in Coffin-Siris syndrome 4;
    cancer; hepatocellular carcinoma; lung non-small cell carcinoma; and rhabdoid
    tumor predisposition syndrome 2. Orthologous to human SMARCA4 (SWI/SNF related
    BAF chromatin remodeling complex subunit ATPase 4).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005816
  source_id: SGD:S000005816
- source: RefSeq
  text: Enables several functions, including ATP-dependent chromatin remodeler activity;
    DNA binding activity; and lysine-acetylated histone binding activity. Involved
    in several processes, including DNA metabolic process; aggrephagy; and positive
    regulation of cell adhesion involved in single-species biofilm formation. Located
    in nucleus. Part of SWI/SNF complex. Used to study cancer. Human ortholog(s) of
    this gene implicated in Coffin-Siris syndrome 4; cancer; hepatocellular carcinoma;
    lung non-small cell carcinoma; and rhabdoid tumor predisposition syndrome 2. Orthologous
    to human SMARCA4 (SWI/SNF related BAF chromatin remodeling complex subunit ATPase
    4). [provided by Alliance of Genome Resources, Apr 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/854465
  source_id: GeneID:854465
fetch_date: '2026-03-06'
