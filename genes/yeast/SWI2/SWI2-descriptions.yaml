review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Strong agreement on catalytic chromatin remodeling role. Minor differences
      in automated GO term selections between Alliance and RefSeq.
  overall_notes: Good concordance on SWI2 as the catalytic ATPase of SWI/SNF. SGD
    curated best distinguishes SWI2 from other subunits with DNA-stimulated ATPase
    and partner interdependence. UniProt is accurate but generic for the complex.
    Automated sources provide useful disease context via SMARCA4 orthology.
