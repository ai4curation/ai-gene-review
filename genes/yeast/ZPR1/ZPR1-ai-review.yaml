- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Zpr1 contains two C4-type zinc finger domains (residues 54-86 and 295-327) that coordinate zinc ions.
      Atomic absorption spectroscopy confirmed two zinc atoms per molecule (PMID:9852145 citing Galcheva-Gargova
      et al. 1996). InterPro mapping to zinc finger domain supports this IEA annotation.
    action: ACCEPT
    reason: >-
      Zinc ion binding is structurally integral to ZPR1 function. The protein has two well-characterized
      C4-type zinc fingers that are essential for its chaperone activity. The C-terminal zinc finger
      is required for viability (PMID:9852145), and mutations in the zinc finger hydrophobic residues
      abolish eEF1A chaperoning (PMID:36630955). IEA annotation at this level is appropriate.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "This protein contains two zinc fingers with the primary structure: Cys-Xaa2-Cys-Xaa25-Cys-Xaa2-Cys. Atomic absorption spectroscopy confirmed the presence of two zinc atoms in each ZPR1 molecule"
      - reference_id: PMID:36630955
        supporting_text: "the ZnFC and ZnFNC mutations abolished the ability of plasmid-borne Zpr1 to suppress Hsf1 induction following depletion of endogenous Zpr1"

- term:
    id: GO:0006458
    label: "'de novo' protein folding"
  evidence_type: IMP
  original_reference_id: PMID:36630955
  review:
    summary: >-
      Sabbarini et al. 2023 showed that Zpr1 is required specifically for de novo folding of newly synthesized
      eEF1A. Mature eEF1A does not require Zpr1 for conformational stability, but biosynthetic intermediates
      do (PMID:36630955).
    action: ACCEPT
    reason: >-
      This is a highly specific and accurate annotation. The authors demonstrated through transcriptional shutoff
      experiments that Zpr1 prevents misfolding of eEF1A biosynthetic intermediates but is dispensable for
      conformational stability of mature eEF1A. IMP evidence is appropriate since the phenotype of Zpr1
      depletion (eEF1A misfolding and aggregation of newly-synthesized protein) directly implicates Zpr1
      in de novo protein folding.
    supported_by:
      - reference_id: PMID:36630955
        supporting_text: "these data suggest that Zpr1 prevents misfolding of eEF1A biosynthetic intermediates but is dispensable for conformational stability of mature eEF1A"
      - reference_id: PMID:36630955
        supporting_text: "eEF1A biogenesis is the primary driver of proteotoxic stress induced by Zpr1 depletion"

- term:
    id: GO:0044183
    label: protein folding chaperone
  evidence_type: IMP
  original_reference_id: PMID:36630955
  review:
    summary: >-
      Sabbarini et al. 2023 demonstrated that Zpr1 functions as a dedicated chaperone for eEF1A. Zpr1 depletion
      causes misfolding and aggregation of newly synthesized eEF1A, and biochemical reconstitution showed Zpr1
      can enable eEF1A to achieve a protease-resistant conformation (PMID:36630955).
    action: ACCEPT
    reason: >-
      Protein folding chaperone is the core molecular function of Zpr1. The IMP evidence from Sabbarini et al.
      is robust: depletion causes eEF1A misfolding phenotype, and reconstitution with recombinant Zpr1 rescues
      eEF1A folding both in cell extracts and with purified proteins.
    supported_by:
      - reference_id: PMID:36630955
        supporting_text: "Critically, restoring Zpr1-depleted extracts with near-physiological concentrations of recombinant Zpr1-3ˣFLAG (Figure S5F) prior to in vitro translation rescued eEF1A protease resistance to the wild-type level (Figure 4E)"
      - reference_id: PMID:36630955
        supporting_text: "Our work uncovers the long-sought-after function of Zpr1 as a bespoke chaperone tailored to the biogenesis of one of the most abundant proteins in the cell."

- term:
    id: GO:0061770
    label: translation elongation factor binding
  evidence_type: IDA
  original_reference_id: PMID:9852145
  review:
    summary: >-
      Gangwani et al. 1998 demonstrated direct binding between ZPR1 and eEF-1alpha using purified recombinant
      proteins, mass spectrometry identification, co-immunoprecipitation, and deletion mapping (PMID:9852145).
    action: ACCEPT
    reason: >-
      Direct binding was demonstrated using purified CBP-ZPR1 and GST-eEF-1alpha fusion proteins, mass
      spectrometry identification of the 50-kD binding partner as eEF-1alpha, and co-immunoprecipitation.
      IDA evidence is strong and this is a core molecular function.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "eEF-1alpha directly binds to cZPR1"
      - reference_id: PMID:9852145
        supporting_text: "The 50-kD protein was digested with l-tosylamido-2-phenyl ethyl chloromethyl ketone-treated trypsin and examined by mass spectroscopy using the MALDI-TOF technique. A comparison of the masses of the polypeptides obtained with the MS-Fit data base led to the identification of the 50-kD protein as eEF-1alpha"

- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IDA
  original_reference_id: PMID:36630955
  review:
    summary: >-
      Sabbarini et al. 2023 showed by biochemical reconstitution that Zpr1 directly enables eEF1A to achieve
      a protease-resistant conformation, both in cell extracts and with purified proteins (PMID:36630955).
    action: ACCEPT
    reason: >-
      IDA evidence for protein folding is strong. The in vitro reconstitution with purified Zpr1 and eEF1A
      showed Zpr1 directly induces eEF1A conversion to a protease-resistant conformation in the presence
      of GTP. This directly assays the folding activity.
    supported_by:
      - reference_id: PMID:36630955
        supporting_text: "addition of Zpr1 in the presence of GTP but not GDP induced eEF1A protease resistance, while GTP alone was not sufficient to induce stabilization"

- term:
    id: GO:0044183
    label: protein folding chaperone
  evidence_type: IDA
  original_reference_id: PMID:36630955
  review:
    summary: >-
      Sabbarini et al. 2023 directly demonstrated protein folding chaperone activity for Zpr1 using two
      complementary biochemical reconstitution approaches: (1) trypsin protection assay of eEF1A synthesized
      in cell extracts with or without Zpr1, and (2) purified eEF1A stabilization by recombinant Zpr1 in
      presence of GTP (PMID:36630955).
    action: ACCEPT
    reason: >-
      This is the most precisely characterized molecular function of Zpr1. IDA evidence from two independent
      biochemical reconstitution systems demonstrates intrinsic chaperone activity. This is a core annotation.
    supported_by:
      - reference_id: PMID:36630955
        supporting_text: "our two biochemical reconstitution approaches demonstrate Zpr1's intrinsic biochemical ability to induce eEF1A conversion into a protease-resistant conformation"

- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: RCA
  original_reference_id: PMID:30358795
  review:
    summary: >-
      Wang et al. 2018 performed a bioinformatics analysis of the yeast zinc proteome, identifying 582 known
      or potential zinc-binding proteins including ZPR1. The RCA evidence is based on reviewed computational
      analysis of zinc-binding domains (PMID:30358795).
    action: ACCEPT
    reason: >-
      ZPR1 is unambiguously a zinc-binding protein with two C4-type zinc fingers confirmed by atomic
      absorption spectroscopy. The RCA annotation from the zinc proteome study is correct and consistent
      with the IEA annotation from InterPro and experimental data.
    supported_by:
      - reference_id: PMID:30358795
        supporting_text: "The yeast zinc proteome of 582 known or potential zinc-binding proteins was identified using a bioinformatics analysis that combined global domain searches with local motif searches."

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:22842922
  review:
    summary: >-
      Tkach et al. 2012 performed a large-scale analysis of protein localization and abundance changes during
      DNA replication stress. ZPR1 was detected in the nucleus in this high-throughput study (PMID:22842922).
    action: ACCEPT
    reason: >-
      HDA annotation is consistent with the detailed experimental evidence from Gangwani et al. 1998
      showing nuclear localization of ZPR1-GFP in growing yeast (PMID:9852145). The high-throughput
      data provides independent confirmation.

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: HDA
  original_reference_id: PMID:22842922
  review:
    summary: >-
      Tkach et al. 2012 detected ZPR1 in the cytoplasm in their large-scale protein localization study
      (PMID:22842922). Consistent with known dual cytoplasm/nucleus localization.
    action: ACCEPT
    reason: >-
      HDA annotation is consistent with established cytoplasmic localization, particularly under
      nutrient-deprived conditions (PMID:9852145). Zpr1 shuttles between cytoplasm and nucleus.

- term:
    id: GO:0000086
    label: G2/M transition of mitotic cell cycle
  evidence_type: IMP
  original_reference_id: PMID:9852145
  review:
    summary: >-
      Gangwani et al. 1998 showed that yeast expressing ZPR1 mutants (D5) that cannot bind eEF-1alpha
      accumulate cells with 2N DNA content, consistent with G2/M arrest (PMID:9852145). However, this
      is an indirect consequence of defective eEF1A chaperoning rather than a direct role of ZPR1 in
      cell cycle regulation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The G2/M accumulation observed by Gangwani et al. is a downstream consequence of disrupted ZPR1-eEF1A
      interaction, not evidence that ZPR1 directly participates in G2/M transition. The authors themselves
      noted that "the interaction of cZPR1 with eEF-1alpha may be required for normal cell cycle progression"
      but this is a secondary effect. Sabbarini et al. 2023 subsequently showed the core function is eEF1A
      chaperoning, and that Zpr1 depletion leads to growth arrest through eEF1A insufficiency and the
      integrated stress response (PMID:36630955). Annotating ZPR1 to G2/M transition implies a direct
      role in cell cycle control that is not supported.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "the majority of the mutant yeast cells contained 2N DNA (Fig. 8 D), consistent with an accumulation in the G2/M phase of the cell cycle (Fig. 8 C)."
      - reference_id: PMID:36630955
        supporting_text: "prolonged Zpr1 depletion results in terminal growth arrest by inducing an unresolved form of the ISR that leads to severe inhibition of protein synthesis"

- term:
    id: GO:0009749
    label: response to glucose
  evidence_type: IDA
  original_reference_id: PMID:9852145
  review:
    summary: >-
      Gangwani et al. 1998 showed that ZPR1-GFP in yeast redistributes from cytoplasm to nucleus upon glucose
      re-addition after starvation (PMID:9852145). The protein responds to glucose as a nutrient signal by
      changing its subcellular localization.
    action: KEEP_AS_NON_CORE
    reason: >-
      ZPR1 does change localization in response to glucose, so the annotation is technically accurate.
      However, this is not a core function of ZPR1 -- it reflects the regulation of ZPR1 localization
      rather than ZPR1 being a glucose-responsive signaling protein. The core function is eEF1A chaperoning.
      Glucose response is a regulatory input that controls where ZPR1 acts, not what it does.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "Starvation of the yeast in glucose-free medium caused the redistribution of cZPR1 from the nucleus to the cytoplasm (Fig. 6). Readdition of glucose to the starved cells induced the translocation of cZPR1 from the cytoplasm to the nucleus."

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:9852145
  review:
    summary: >-
      Gangwani et al. 1998 directly observed ZPR1-GFP localization in the nucleus of growing S. cerevisiae
      cells using fluorescence microscopy (PMID:9852145).
    action: ACCEPT
    reason: >-
      Clear IDA evidence from GFP fluorescence microscopy showing nuclear localization in proliferating
      yeast. This is well established and is the primary localization during normal growth.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "the cZPR1-GFP fusion protein (green) was present mainly in the nucleus of S. cerevisiae (CONTROL)"

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:9852145
  review:
    summary: >-
      Gangwani et al. 1998 observed ZPR1-GFP localization in the cytoplasm of nutrient-starved yeast cells
      using fluorescence microscopy (PMID:9852145).
    action: ACCEPT
    reason: >-
      Clear IDA evidence from GFP fluorescence microscopy showing cytoplasmic localization during nutrient
      starvation. Zpr1 shuttles between cytoplasm and nucleus depending on growth state. Cytoplasm is
      also where the eEF1A chaperoning activity occurs (PMID:36630955).
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "Starvation of the yeast in glucose-free medium caused the redistribution of cZPR1 from the nucleus to the cytoplasm"

