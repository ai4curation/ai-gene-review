id: P53303
gene_symbol: ZPR1
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  ZPR1 encodes a conserved zinc finger chaperone protein that is essential for viability in S. cerevisiae. Its core
  biochemical function is as a bespoke (dedicated) chaperone for eukaryotic translation elongation factor 1A (eEF1A),
  enabling eEF1A to achieve its native folded conformation during de novo biogenesis (PMID:36630955). Zpr1 contains
  two C4-type zinc finger domains and two alpha-helical hairpin structures that mediate interactions with the three
  domains of eEF1A, masking aggregation-prone hydrophobic interfaces. Depletion of Zpr1 leads to acute proteotoxic
  stress driven by misfolding and aggregation of newly synthesized eEF1A, followed by eEF1A insufficiency that
  triggers the integrated stress response and inhibition of protein synthesis (PMID:36630955). Zpr1 is a member
  of the Hsf1 regulon and is heat-shock inducible. The protein shuttles between the cytoplasm and nucleus in
  a nutrient-dependent manner, localizing preferentially to the nucleus in proliferating cells and relocating
  to the cytoplasm during nutrient starvation (PMID:9852145). ZPR1 is present at approximately 39,900 molecules
  per cell in log phase.
existing_annotations:
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Zpr1 functions as a dedicated chaperone for eEF1A biogenesis, enabling eEF1A to achieve its native folded
      conformation. Phylogenetic inference of protein folding involvement is well supported by experimental data
      from multiple species (PMID:36630955, PMID:9852145).
    action: ACCEPT
    reason: >-
      IBA annotation of protein folding is well supported. Sabbarini et al. 2023 demonstrated that Zpr1 is essential
      for eEF1A to achieve a protease-resistant conformation, both in vivo and in biochemical reconstitution
      (PMID:36630955). This annotation captures the core biological process at an appropriate level of generality.
    supported_by:
      - reference_id: PMID:36630955
        supporting_text: "Our work uncovers the long-sought-after function of Zpr1 as a bespoke chaperone tailored to the biogenesis of one of the most abundant proteins in the cell."
      - reference_id: PMID:36630955
        supporting_text: "our two biochemical reconstitution approaches demonstrate Zpr1's intrinsic biochemical ability to induce eEF1A conversion into a protease-resistant conformation."

- term:
    id: GO:0061770
    label: translation elongation factor binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Zpr1 directly binds eEF1A (translation elongation factor 1-alpha), a conserved interaction demonstrated across
      yeast and mammals (PMID:9852145, PMID:36630955). Phylogenetic inference is strongly supported.
    action: ACCEPT
    reason: >-
      Gangwani et al. 1998 first demonstrated direct binding of ZPR1 to eEF-1alpha using purified recombinant
      proteins (PMID:9852145). Sabbarini et al. 2023 confirmed eEF1A as the dominant interactor of Zpr1 by mass
      spectrometry and showed newly-synthesized eEF1A fluxes through Zpr1 (PMID:36630955). This is a core
      molecular function of the protein.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "eEF-1alpha directly binds to cZPR1"
      - reference_id: PMID:36630955
        supporting_text: "Besides the dominant presence of eEF1A, we also found strong hits among components of the cytosolic Hsp70 and Hsp90 folding systems"

- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Zpr1 localizes to the cytoplasm, particularly during nutrient starvation in yeast and in quiescent
      mammalian cells. This is a conserved localization pattern (PMID:9852145).
    action: ACCEPT
    reason: >-
      Cytoplasmic localization of Zpr1 is well established across species. In yeast, Gangwani et al. 1998
      showed glucose starvation causes redistribution of Zpr1 from nucleus to cytoplasm (PMID:9852145).
      The chaperone function for eEF1A biogenesis occurs in the cytoplasm (PMID:36630955). IBA annotation
      is appropriate.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "nutrient deprivation of yeast, like serum starvation of mammalian cells, caused the redistribution of ZPR1 from the nucleus to the cytoplasm"

- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Zpr1 localizes to the nucleus in proliferating cells. In yeast, Zpr1-GFP was found predominantly
      in the nucleus during normal growth (PMID:9852145). Nuclear localization is conserved.
    action: ACCEPT
    reason: >-
      Nuclear localization of Zpr1 in proliferating cells is well established. Gangwani et al. 1998 showed
      Zpr1-GFP was present mainly in the nucleus of S. cerevisiae during growth, and that glucose re-addition
      after starvation induced nuclear translocation (PMID:9852145). IBA annotation is well supported.
    supported_by:
      - reference_id: PMID:9852145
        supporting_text: "the cZPR1-GFP fusion protein (green) was present mainly in the nucleus of S. cerevisiae (CONTROL)"

- term:
    id: GO:0005634
