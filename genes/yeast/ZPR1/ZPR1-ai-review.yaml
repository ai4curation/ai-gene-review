core_functions:
- molecular_function:
    id: GO:0044183
    label: protein folding chaperone
  description: >-
    Zpr1 is a bespoke chaperone dedicated to the de novo folding of eEF1A. This is its essential function,
    demonstrated by biochemical reconstitution showing Zpr1 directly enables eEF1A to achieve a protease-resistant
    conformation (PMID:36630955). Depletion causes proteotoxic stress from eEF1A misfolding, followed by growth
    arrest from eEF1A insufficiency. The chaperone mechanism involves zinc finger domains masking aggregation-prone
    hydrophobic interfaces on eEF1A, and alpha-helical hairpin interactions at the eEF1A domain interfaces.
  supported_by:
    - reference_id: PMID:36630955
      supporting_text: "Our work uncovers the long-sought-after function of Zpr1 as a bespoke chaperone tailored to the biogenesis of one of the most abundant proteins in the cell."
- molecular_function:
    id: GO:0061770
    label: translation elongation factor binding
  description: >-
    Direct binding to eEF1A is the molecular basis of Zpr1 chaperone function. Demonstrated by purified protein
    binding assays (PMID:9852145), mass spectrometry of Zpr1 interactors showing eEF1A as the dominant partner
    (PMID:36630955), and pulse-chase showing newly-synthesized eEF1A fluxes through Zpr1 (PMID:36630955).
  supported_by:
    - reference_id: PMID:9852145
      supporting_text: "eEF-1alpha directly binds to cZPR1"
    - reference_id: PMID:36630955
      supporting_text: "Besides the dominant presence of eEF1A, we also found strong hits among components of the cytosolic Hsp70 and Hsp90 folding systems"

proposed_new_terms: []

suggested_questions:
- question: >-
    Does Zpr1 have any additional chaperone substrates beyond eEF1A, or is it truly a single-substrate
    dedicated chaperone? The interactome analysis in PMID:36630955 showed eEF1A as the dominant interactor,
    but Hsp70, Hsp90 components, and ribosomal proteins were also found.
- question: >-
    What is the functional significance of Zpr1 nuclear localization if its chaperone activity for eEF1A
    operates in the cytoplasm? Zpr1 is predominantly nuclear in proliferating cells (PMID:9852145), yet
    eEF1A biogenesis occurs in the cytoplasm.

suggested_experiments:
- description: >-
    Systematic interactome analysis of Zpr1 under different stress conditions to identify
    whether Zpr1 has additional substrates beyond eEF1A. While eEF1A is clearly the dominant substrate,
    confirming exclusivity would strengthen the bespoke chaperone model.
- description: >-
    Live-cell imaging of Zpr1 and eEF1A co-localization dynamics during active growth to
    determine where in the cell the chaperoning interaction occurs. The apparent paradox of nuclear
    Zpr1 localization versus cytoplasmic eEF1A biogenesis needs resolution.
