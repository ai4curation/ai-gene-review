review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Good agreement on NAD-dependent deacetylase function and silencing roles.
      Curated sources differ in emphasis (cytoplasmic vs nuclear).
  overall_notes: 'Alliance_Imported (SGD) provides the best description, correctly
    emphasizing cytoplasmic localization and targets. UniProt focuses more on nuclear
    silencing effects. Alliance_Automated adds useful H4K16 specificity. RefSeq loses
    that detail. Best source: Alliance_Imported.'
