status: COMPLETE
descriptions:
- source: UniProt
  text: NAD-dependent histone deacetylase that is involved in nuclear silencing events.
    Derepresses subtelomeric silencing and increases repression in nucleolar (rDNA)
    silencing. Its function is negatively regulated by active nuclear export.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53686
  source_id: P53686
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of HST2 silencing roles and export regulation.
    - rubric: utility
      score: 4
      notes: Conveys key aspects of HST2 function.
    - rubric: compactness
      score: 5
      notes: Concise three-sentence description.
    - rubric: completeness
      score: 3
      notes: Misses cytoplasmic localization and that primary targets are cytoplasmic
        proteins. Does not mention Sir2 family membership.
    - rubric: specificity
      score: 4
      notes: Names subtelomeric and rDNA silencing, nuclear export regulation.
    overall_notes: Good description of NAD-dependent deacetylase role in nuclear silencing.
      Covers both subtelomeric and rDNA silencing modulation, and nuclear export regulation.
- source: Alliance_Imported
  text: Cytoplasmic NAD(+)-dependent protein deacetylase; deacetylation targets are
    primarily cytoplasmic proteins; member of the silencing information regulator
    2 (Sir2) family of NAD(+)-dependent protein deacetylases; modulates nucleolar
    (rDNA) and telomeric silencing; possesses NAD(+)-dependent histone deacetylase
    activity in vitro; contains a nuclear export signal (NES); function regulated
    by its nuclear export
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005936
  source_id: SGD:S000005936
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and nuanced.
    - rubric: utility
      score: 5
      notes: Best single source for understanding HST2.
    - rubric: compactness
      score: 4
      notes: Dense but comprehensive.
    - rubric: completeness
      score: 5
      notes: Covers localization, targets, family, silencing, in vitro activity, NES,
        and regulation.
    - rubric: specificity
      score: 5
      notes: Cytoplasmic NAD(+)-dependent deacetylase, NES, Sir2 family.
    overall_notes: Excellent. Correctly emphasizes cytoplasmic localization and cytoplasmic
      protein targets, while also covering silencing modulation. Mentions NES and
      Sir2 family.
- source: Alliance_Automated
  text: Enables histone H4K16 deacetylase activity, NAD-dependent. Involved in negative
    regulation of mitotic recombination and rDNA heterochromatin formation. Located
    in cytoplasm and nucleus. Orthologous to several human genes including SIRT2 (sirtuin
    2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005936
  source_id: SGD:S000005936
  review:
