proposed_new_terms: []

suggested_questions:
- question: >-
    What is the precise mechanism by which the Trp122 residue mediates CUE2 recruitment
    in the NGDRQC+ pathway? This residue is critical for NGDRQC+ but does not appear to
    be involved in ubiquitin binding, suggesting a distinct interaction surface.
- question: >-
    Does CUE2 have any functions outside of No-Go Decay, such as in other mRNA surveillance
    pathways (e.g., Nonsense-Mediated Decay or Non-Stop Decay)?
- question: >-
    What determines the relative flux through NGDRQC+ versus NGDRQC- pathways under
    different cellular conditions or stress states?

suggested_experiments:
- description: >-
    Cryo-EM structure of CUE2 bound to collided ribosomes to reveal the structural basis
    of mRNA cleavage site selection and the role of the Trp122 residue in NGDRQC+.
  hypothesis: >-
    CUE2 adopts distinct conformations when engaged with collided ribosomes in the NGDRQC+
    versus NGDRQC- pathways, with Trp122 mediating a specific protein-protein interaction.
- description: >-
    Quantitative proteomics to measure CUE2 abundance and stoichiometry relative to
    ribosomes under various stress conditions to understand pathway regulation.
  hypothesis: >-
    CUE2 levels or post-translational modifications change under conditions that increase
    ribosome stalling, shifting the balance between endo- and exonucleolytic decay.
- description: >-
    In vitro reconstitution of CUE2-mediated mRNA cleavage with purified collided ribosome
    complexes and ubiquitinated ribosomal proteins to define minimal requirements for each
    NGD mode.
  hypothesis: >-
    Reconstitution will show that K63-polyubiquitinated eS7 is sufficient to recruit CUE2
    for NGDRQC- cleavage, while NGDRQC+ requires additional factors from the RQT complex.
