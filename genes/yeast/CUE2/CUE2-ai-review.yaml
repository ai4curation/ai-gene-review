id: P36075
gene_symbol: CUE2
product_type: PROTEIN
status: IN_PROGRESS
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  CUE2 (Endonuclease CUE2) is an mRNA endonuclease that functions in the No-Go Decay (NGD)
  pathway in S. cerevisiae. It contains two N-terminal CUE (coupling of ubiquitin to ER
  degradation) domains that bind polyubiquitinated ribosomal protein eS7, a UBA-like domain,
  and a C-terminal SMR (small MutS-related) endonuclease domain that catalyzes mRNA cleavage.
  CUE2 is recruited to collided ribosomes where it cleaves stalled mRNAs through two distinct
  modes: NGDRQC- (cleavage upstream of collided ribosomes, dependent on CUE domain-mediated
  recognition of K63-polyubiquitinated eS7) and NGDRQC+ (cleavage within collided ribosomes,
  dependent on Slh1-mediated ribosome splitting and the Trp122 residue). CUE2 acts downstream
  of the E3 ubiquitin ligase Hel2, which ubiquitinates ribosomal proteins to signal ribosome
  collision. The mammalian homolog is N4BP2 and the C. elegans homolog is NONU-1, indicating
  evolutionary conservation of this mRNA quality control mechanism.

existing_annotations:
- term:
    id: GO:0004519
    label: endonuclease activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation based on phylogenetic inference from PANTHER. CUE2 has well-established
      endonuclease activity demonstrated experimentally in multiple publications (PMID:31219035,
      PMID:36583309). However, this term is less specific than the experimentally supported
      GO:0004521 (RNA endonuclease activity), since CUE2 specifically cleaves mRNA, not DNA.
    action: ACCEPT
    reason: >-
      The IBA annotation is correct and phylogenetically sound. While more specific terms exist
      (GO:0004521, RNA endonuclease activity), this broader IBA term is not wrong and captures
      the conserved endonuclease function across the protein family. The more specific annotations
      are already present with IDA evidence.
    supported_by:
    - reference_id: PMID:31219035
      supporting_text: >-
        we identify Cue2 as the conserved endonuclease that is recruited to stalled ribosomes to promote NGD
    - reference_id: PMID:36583309
      supporting_text: >-
        The Cue2 endonuclease has been identified as a crucial endonuclease for NGD in yeast (21).

- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro based on the CUE domain (IPR003892). CUE2 contains two
      CUE domains that bind ubiquitin, confirmed by NMR structure of CUE-ubiquitin complex
      (PMID:12787503) and functional studies showing CUE domains bind polyubiquitinated eS7
      (PMID:36583309). However, more specific terms are available.
    action: ACCEPT
    reason: >-
      This IEA annotation is correct but less specific than the IDA annotations for
      polyubiquitin-dependent binding already present. However, IEA annotations at a broader
      level than IDA annotations are acceptable. The CUE domains do bind ubiquitin, as confirmed
      experimentally.
    supported_by:
    - reference_id: PMID:12787503
      supporting_text: >-
        The solution structure of a CUE domain of the yeast Cue2 protein in complex with ubiquitin reveals intermolecular interactions involving conserved hydrophobic surfaces, including the Leu8-Ile44-Val70 patch on ubiquitin
    - reference_id: PMID:12628920
      supporting_text: >-
        CUE domains bind directly to monoubiquitin and we have defined crucial interaction surfaces on both binding partners

- term:
    id: GO:0004521
    label: RNA endonuclease activity
  evidence_type: IDA
  original_reference_id: PMID:36583309
  review:
    summary: >-
      IDA annotation from PMID:36583309 (Tomomatsu et al. 2023). This study demonstrated that
      CUE2 cleaves mRNAs at stalled ribosomes through two distinct NGD modes using northern blot
      analysis of NGD cleavage intermediates and primer extension mapping of cleavage sites.
      Deletion of CUE2 abolished production of 5-prime NGD mRNA intermediates.
    action: ACCEPT
    reason: >-
      Directly supported by experimental evidence showing CUE2-dependent mRNA cleavage in NGD.
      RNA endonuclease activity is the core molecular function of CUE2.
    supported_by:
    - reference_id: PMID:36583309
      supporting_text: >-
        no 5′ NGD-IMs were detected in cue2Δski2Δ mutant cells (Figure 1A), indicating a general role for Cue2 in NGD

- term:
    id: GO:0031593
    label: polyubiquitin modification-dependent protein binding
  evidence_type: IDA
  original_reference_id: PMID:36583309
  review:
    summary: >-
      IDA annotation from PMID:36583309. This study showed that CUE2 CUE domains specifically
      recognize polyubiquitinated ribosomal protein eS7. Mutations in conserved ubiquitin-binding
      residues of CUE-D1 (F20P->AA, L46L47->AA) and CUE-D2 (F67P->AA, L93L94->AA) eliminated
      the NGDRQC- cleavage upstream of collided ribosomes, demonstrating that polyubiquitin
      binding is required for substrate recognition.
    action: ACCEPT
    reason: >-
      Well supported by mutagenesis data in PMID:36583309 showing that CUE domain mutations
      eliminating polyubiquitin binding abolished NGDRQC- cleavage. CUE2 recognizes
      polyubiquitinated eS7 on collided ribosomes via its CUE domains.
    supported_by:
    - reference_id: PMID:36583309
      supporting_text: >-
        These results suggest that CUE-D1 and CUE-D2 domains are required for NGDRQC− upstream of the collided ribosomes but are dispensable for NGDRQC+ within the collided ribosomes

- term:
    id: GO:0072344
    label: rescue of stalled cytosolic ribosome
  evidence_type: IDA
  original_reference_id: PMID:36583309
  review:
    summary: >-
      IDA annotation from PMID:36583309. CUE2 functions in the resolution of stalled ribosomes
      by cleaving the mRNA, which is a prerequisite for ribosome rescue. CUE2-mediated mRNA
      cleavage produces fragments that are then degraded by Xrn1 and the exosome, and the
      resulting ribosome rescue involves Dom34 (PMID:31219035).
    action: ACCEPT
    reason: >-
      CUE2-mediated mRNA cleavage at stalled ribosomes is a key step in the rescue of stalled
      cytosolic ribosomes during No-Go Decay. The mRNA cleavage enables downstream ribosome
      rescue by Dom34/Pelota. This is a core biological process for CUE2.
    supported_by:
    - reference_id: PMID:36583309
      supporting_text: >-
        Ribosome collisions are recognized by E3 ubiquitin ligase Hel2/ZNF598, leading to RQC (ribosome-associated quality control) and to endonucleolytic cleavage and degradation of the mRNA termed NGD (no-go decay)
    - reference_id: PMID:31219035
      supporting_text: >-
        Translation of problematic sequences in mRNAs leads to ribosome collisions that trigger a series of quality control events including ribosome rescue, degradation of the stalled nascent polypeptide, and targeting of the mRNA for decay

- term:
    id: GO:0004521
    label: RNA endonuclease activity
  evidence_type: IDA
  original_reference_id: PMID:31219035
  review:
    summary: >-
      IDA annotation from PMID:31219035 (D'Orazio et al. 2019), the landmark paper identifying
      CUE2 as the NGD endonuclease. The study showed that CUE2 overexpression substantially
      reduced NGD reporter mRNA levels, deletion of CUE2 abolished endonucleolytic cleavage
      intermediates, and SMR domain mutations (D348A/F349A/H350A) abolished cleavage activity.
    action: ACCEPT
    reason: >-
      This is the primary experimental demonstration that CUE2 is an RNA endonuclease. The
      study provides multiple lines of evidence including overexpression, deletion, and
      catalytic site mutagenesis data. RNA endonuclease activity is the core molecular function
      of CUE2.
    supported_by:
    - reference_id: PMID:31219035
      supporting_text: >-
        Ribosome profiling and biochemistry provide strong evidence that Cue2 cleaves mRNA within the A site of the colliding ribosome
    - reference_id: PMID:31219035
      supporting_text: >-
        These data provide strong support for a hydrolytic role for Cue2 in the endonucleolytic cleavage of problematic mRNAs in the NGD pathway

- term:
    id: GO:0022626
    label: cytosolic ribosome
  evidence_type: IDA
  original_reference_id: PMID:31219035
  review:
    summary: >-
      IDA annotation indicating CUE2 is active in the cytosolic ribosome. PMID:31219035
      demonstrated via ribosome profiling and biochemical assays that CUE2 cleaves mRNAs at
      collided cytosolic ribosomes, specifically within the A site of the colliding ribosome.
      PMID:36583309 confirmed CUE2 association with collided ribosomes via sucrose gradient
      fractionation experiments.
    action: ACCEPT
    reason: >-
      CUE2 functions at the cytosolic ribosome, where it is recruited to collided ribosomes
      to perform mRNA cleavage. This localization is directly tied to its core function in
      No-Go Decay. The qualifier is_active_in is appropriate as CUE2 performs its enzymatic
      activity at the ribosome.
    supported_by:
    - reference_id: PMID:31219035
      supporting_text: >-
        Ribosome profiling and biochemistry provide strong evidence that Cue2 cleaves mRNA within the A site of the colliding ribosome
    - reference_id: PMID:36583309
      supporting_text: >-
        Ribosome profiling and biochemical assays suggest that Cue2 cleaves mRNAs in the A site of collided ribosomes in the presence of Slh1 (21)

- term:
    id: GO:0070530
    label: K63-linked polyubiquitin modification-dependent protein binding
  evidence_type: TAS
  original_reference_id: PMID:36583309
  review:
    summary: >-
      TAS annotation for K63-linked polyubiquitin binding. PMID:36583309 demonstrated that
      CUE2 CUE domains recognize polyubiquitinated eS7, where the polyubiquitin chain is
      K63-linked (formed by Not4 monoubiquitination followed by Hel2-mediated K63
      polyubiquitination). The CUE-D1 and CUE-D2 domains are specifically required for
      recognition of K63-polyubiquitinated eS7 in the NGDRQC- pathway.
    action: ACCEPT
    reason: >-
      This is a more specific child term of GO:0031593 (polyubiquitin modification-dependent
      protein binding) and captures the K63-linkage specificity that is mechanistically
      important for CUE2 function in NGDRQC-. The TAS evidence is appropriate as the K63
      linkage specificity comes from prior work on Hel2-mediated ubiquitination cited in
      the paper.
    supported_by:
    - reference_id: PMID:36583309
      supporting_text: >-
        the E3 ligase Not4 first monoubiquitinates eS7 which is then followed by Hel2-mediated polyubiquitination (13)
    - reference_id: PMID:36583309
      supporting_text: >-
        Cue2 binds to the K63-linked polyubiquitin chains on eS7 with two CUE domains, CUE-D1 and CUE-D2

- term:
    id: GO:0004519
    label: endonuclease activity
  evidence_type: IDA
  original_reference_id: PMID:31219035
  review:
    summary: >-
      IDA annotation from SGD based on PMID:31219035. CUE2 was identified as an endonuclease
      through a reverse genetic screen, and its endonuclease activity was confirmed by
      demonstrating dependence on the catalytic SMR domain residues D348, H350, and R402.
    action: ACCEPT
    reason: >-
      Directly supported by experimental data. This is a parent term of GO:0004521 (RNA
      endonuclease activity) and both are appropriate annotations. The IDA annotation from
      SGD is based on the original identification paper and is valid.
    supported_by:
    - reference_id: PMID:31219035
      supporting_text: >-
        By far, the strongest outlier by Z-score causing reduced GFP expression for both NGD reporters, without affecting the OPT reporter, resulted from overexpression of the gene CUE2 (Figure 1C–1D)
    - reference_id: PMID:31219035
      supporting_text: >-
        To further refine this analysis, we made combined mutations in CUE2 at D348 and H350 and observed a complete abolishment of endonucleolytic cleavage activity (Figure 2H, lane 4)

- term:
    id: GO:0070966
    label: nuclear-transcribed mRNA catabolic process, no-go decay
  evidence_type: IDA
  original_reference_id: PMID:31219035
  review:
    summary: >-
      IDA annotation from SGD based on PMID:31219035. CUE2 is the primary endonuclease
      responsible for mRNA cleavage in No-Go Decay. Deletion of CUE2 eliminates
      endonucleolytic cleavage intermediates in NGD reporter assays. The study further showed
      that CUE2-dependent cleavage becomes a major contributor to NGD when factors required
      for resolution of stalled ribosomes (e.g., Slh1) are absent.
    action: ACCEPT
    reason: >-
      This is the most specific and accurate biological process term for CUE2 function.
      No-Go Decay is the core biological process in which CUE2 participates. This annotation
      is strongly supported by multiple experimental approaches in the landmark paper.
    supported_by:
    - reference_id: PMID:31219035
      supporting_text: >-
        we identify Cue2 as the conserved endonuclease that is recruited to stalled ribosomes to promote NGD
    - reference_id: PMID:31219035
      supporting_text: >-
        the Cue2-dependent pathway becomes a major contributor to NGD in cells depleted of factors required for the resolution of stalled ribosome complexes
    - reference_id: PMID:36583309
      supporting_text: >-
        NGD in yeast requires the Cue2 endonuclease and occurs in two modes, either coupled to RQC (NGDRQC+) or RQC uncoupled (NGDRQC−)

- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IDA
  original_reference_id: PMID:12628920
  review:
    summary: >-
      IDA annotation from SGD based on PMID:12628920 (Shih et al. 2003). This study identified
      the CUE domain as a ubiquitin-binding motif using yeast two-hybrid and in vitro binding
      assays. CUE2 was among the CUE domain-containing proteins characterized, though the
      primary focus was on the Vps9 CUE domain. The study demonstrated that CUE domains bind
      directly to monoubiquitin.
    action: ACCEPT
    reason: >-
      This is an early characterization of the ubiquitin-binding activity of CUE domains.
      While more specific terms (polyubiquitin binding) are now available based on later work,
      this annotation correctly captures the fundamental ubiquitin-binding property of the CUE
      domains. The evidence is based on direct binding assays.
    supported_by:
    - reference_id: PMID:12628920
      supporting_text: >-
        CUE domains bind directly to monoubiquitin and we have defined crucial interaction surfaces on both binding partners

- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IDA
  original_reference_id: PMID:12787503
  review:
    summary: >-
      IDA annotation from SGD based on PMID:12787503 (Kang et al. 2003). This study solved the
      NMR structure of the CUE2 CUE domain (residues 6-54) in complex with ubiquitin, revealing
      the molecular basis of CUE-ubiquitin interaction via the Leu8-Ile44-Val70 hydrophobic
      patch on ubiquitin.
    action: ACCEPT
    reason: >-
      This annotation is based on direct structural evidence of CUE2 CUE domain binding to
      ubiquitin. The NMR structure provides atomic-level detail of the interaction. This is
      strong experimental support for ubiquitin binding.
    supported_by:
    - reference_id: PMID:12787503
      supporting_text: >-
        The solution structure of a CUE domain of the yeast Cue2 protein in complex with ubiquitin reveals intermolecular interactions involving conserved hydrophobic surfaces, including the Leu8-Ile44-Val70 patch on ubiquitin

