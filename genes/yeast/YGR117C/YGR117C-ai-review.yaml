- term:
    id: GO:0005515
    label: protein binding
  evidence_type: ISS
  original_reference_id: PMID:14562095
  review:
    summary: >-
      Proposed annotation based on domain architecture. YGR117C contains LisH (IPR006594) and WD40
      (IPR036322) domains, both of which are well-characterized protein-protein interaction modules.
      The LisH motif mediates dimerization and the WD40 propeller provides a multivalent interaction
      platform. BioGRID reports 9 physical interactors from large-scale studies. However, no specific
      binding partner has been validated in a gene-specific study, making this a tentative annotation.
    action: NEW
    reason: >-
      The combination of LisH dimerization motif and WD40 beta-propeller domain strongly suggests
      protein binding activity. Both domains are established protein-protein interaction modules.
      BioGRID reports 9 physical interactors from systematic studies (Y2H, AP-MS). While GO:0005515
      is generic, it is the most specific molecular function that can be supported given the lack of
      gene-specific functional data.
    supported_by:
    - reference_id: PMID:14562095
      supporting_text: >-
        Here we describe the construction and analysis of a collection of yeast strains expressing
        full-length, chromosomally tagged green fluorescent protein fusion proteins. We classify these
        proteins, representing 75% of the yeast proteome, into 22 distinct subcellular localization
        categories
