descriptions:
- source: UniProt
  text: PPIases accelerate the folding of proteins. It catalyzes the cis-trans isomerization
    of proline imidic peptide bonds in oligopeptides.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53691
  source_id: P53691
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but the generic PPIase statement is shared across many cyclophilins.
    - rubric: utility
      score: 3
      notes: Too generic to distinguish CPR6 from other PPIases.
    - rubric: compactness
      score: 4
      notes: Very brief.
    - rubric: completeness
      score: 2
      notes: Misses Hsp82 chaperone interaction, prion variant role, and ribosome
        binding.
    - rubric: specificity
      score: 2
      notes: Generic PPIase description not specific to CPR6.
    overall_notes: Accurate but generic PPIase description; misses Hsp82 interaction
      and prion role.
- source: Alliance_Imported
  text: Peptidyl-prolyl cis-trans isomerase (cyclophilin); catalyzes the cis-trans
    isomerization of peptide bonds N-terminal to proline residues; plays a role in
    determining prion variants; binds to Hsp82p and contributes to chaperone activity;
    protein abundance increases in response to DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004206
  source_id: SGD:S000004206
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All statements supported by literature.
    - rubric: utility
      score: 5
      notes: Comprehensive and distinguishes CPR6 from other cyclophilins.
    - rubric: compactness
      score: 4
      notes: Concise multi-clause description.
    - rubric: completeness
      score: 5
      notes: Covers catalytic activity, chaperone interaction, prion role, and stress
        response.
    - rubric: specificity
      score: 5
      notes: 'Specific: Hsp82p binding, prion variants, DNA replication stress.'
    overall_notes: 'Best source: covers PPIase activity, Hsp82 binding, prion role,
      and stress response.'
- source: Alliance_Automated
  text: Enables peptidyl-prolyl cis-trans isomerase activity; ribosome binding activity;
    and unfolded protein binding activity. Involved in protein refolding. Located
    in cytoplasm. Orthologous to human PPID (peptidylprolyl isomerase D).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004206
  source_id: SGD:S000004206
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
