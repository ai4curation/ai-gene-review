    - rubric: compactness
      score: 3
      notes: Moderate length boilerplate.
    - rubric: completeness
      score: 3
      notes: Covers some MF/BP/CC but misses Hsp82 interaction and prion role.
    - rubric: specificity
      score: 3
      notes: GO term listing; generic structure.
    overall_notes: GO-derived listing; covers PPIase, ribosome binding, and protein
