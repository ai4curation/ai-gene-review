  description: >-
    YCR023C functions as an outward-rectifying chloride channel on the vacuolar membrane.
    Electrophysiological recordings in HeLa cells demonstrate that YCR023C expression increases
    whole-cell Cl− currents with properties characteristic of chloride channels including outward
    rectification and sensitivity to blockers DIDS, NFA, and NPPB (PMID:34910516). This is the
    yeast ortholog of human CLN7 which mediates endolysosomal Cl- conductance regulating
    lysosomal pH, membrane potential, and calcium homeostasis.
