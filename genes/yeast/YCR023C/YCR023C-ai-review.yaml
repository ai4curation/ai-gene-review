- id: PMID:12562762
  title: Localization and function of the yeast multidrug transporter Tpo1p.
  findings:
  - statement: Describes localization of Tpo1p and homologs Tpo2p-4p to the plasma membrane
      using sucrose gradient ultracentrifugation
    supporting_text: >-
      Using sucrose gradient ultracentrifugation we found that an hemagglutinin (HA)-tagged
      Tpo1p as well as its HA-tagged Tpo2p-4p homologues co-localize with plasma membrane
      markers.
  - statement: Tpo1p is a plasma membrane polyamine exporter involved in spermidine detoxification
    supporting_text: >-
      The results obtained strongly suggest that Tpo1p is a plasma membrane-bound exporter,
      involved in the detoxification of excess spermidine in yeast.
- id: PMID:34910516
  title: CLN7 is an organellar chloride channel regulating lysosomal function.
  findings:
  - statement: Identified CLN7 (MFSD8) as a novel endolysosomal chloride channel
    supporting_text: >-
      Here, we identified CLN7 as a novel endolysosomal chloride channel.
  - statement: YCR023C is the yeast homolog of CLN7, sharing conserved chloride channel function
      despite less than 25% sequence identity
    supporting_text: >-
      YCR023C is less than 25% identical to that of hCLN7 and therefore unlikely to serve as
      an auxiliary subunit for a human protein
  - statement: YCR023C expressed in HeLa cells increases whole-cell Cl− currents with outward
      rectification and sensitivity to DIDS, NFA, and NPPB
    supporting_text: >-
      The expression of YCR023C also increased the whole-cell Cl− currents (Fig. 4, G and H). In addition, the
      whole-cell currents recorded in YCR023C-expressing cells had the similar characteristics
      as those of hCLN7 currents, including outward rectification and sensitivities to DIDS,
      NFA, and NPPB
  - statement: YCR023C has predicted 12-transmembrane topology consistent with MFS domain
      architecture
    supporting_text: >-
      The yeast CLN7 homolog, YCR023C (from Saccharomyces cerevisiae), is also predicted to
      have 12 membrane-spanning domains
  - statement: Human CLN7 regulates lysosomal chloride conductance, luminal pH, and membrane
      potential
    supporting_text: >-
      CLN7 regulates lysosomal chloride conductance, luminal pH, and lysosomal membrane
      potential and promotes the release of lysosomal Ca2+ through transient receptor potential
      mucolipin 1 (TRPML1).
