id: P25351
gene_symbol: YCR023C
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  YCR023C encodes a major facilitator superfamily (MFS) domain-containing protein that functions
  as an outward-rectifying chloride channel. It is the yeast homolog of human CLN7 (MFSD8), a
  lysosomal membrane protein whose loss-of-function causes variant late-infantile neuronal ceroid
  lipofuscinosis (vLINCL). When heterologously expressed in HeLa cells, YCR023C localizes to both
  plasma membrane and intracellular compartments and mediates whole-cell Cl− currents with
  outward rectification and sensitivity to chloride channel blockers DIDS, NFA, and NPPB
  (PMID:34910516). In yeast, the protein localizes to the vacuolar membrane, consistent with the
  lysosomal/endolysosomal localization of its human ortholog. Despite being classified as an MFS
  transporter by domain architecture, electrophysiological evidence demonstrates it functions as
  a chloride channel rather than a secondary active transporter. The protein has 12 predicted
  transmembrane domains and is phosphorylated at Ser-313 and Ser-603. YCR023C shares less than
  25% sequence identity with human CLN7 but retains conserved chloride channel function.
existing_annotations:
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      IEA annotation based on UniProtKB subcellular location mapping. YCR023C is a multi-pass
      membrane protein with 12 predicted transmembrane domains. UniProt annotates it as a membrane
      protein with experimental support (PMID:34910516).
    action: ACCEPT
    reason: >-
      Correct but very general. YCR023C is unambiguously a membrane protein given its 12
      transmembrane domains and experimental localization data. This broad CC term is acceptable
      as a parent annotation alongside the more specific vacuole membrane annotation.
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        The yeast CLN7 homolog, YCR023C (from Saccharomyces cerevisiae), is also predicted to
        have 12 membrane-spanning domains
- term:
    id: GO:0022857
    label: transmembrane transporter activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro MFS domain mapping (IPR011701, IPR020846). While YCR023C
      contains an MFS domain, electrophysiological evidence from PMID:34910516 demonstrates it
      functions as a chloride channel rather than a classical secondary active transporter.
    action: MODIFY
    reason: >-
      The MFS domain classification leads InterPro to infer transmembrane transporter activity,
      but the experimental evidence clearly shows chloride channel activity. The protein exhibits
      outward-rectifying currents and sensitivity to chloride channel blockers (DIDS, NFA, NPPB),
      characteristic of channels not transporters. The more accurate MF term is chloride channel
      activity (GO:0005254), which is already annotated with IDA evidence.
    proposed_replacement_terms:
    - id: GO:0005254
      label: chloride channel activity
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        Human CLN7 and its yeast homolog exhibit characteristics of chloride channels and are
        sensitive to chloride channel blockers.
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation from InterPro MFS domain mapping. Transmembrane transport is a broad BP
      term. While chloride ions do move across the membrane, a more specific BP term describing
      chloride transmembrane transport is already present (GO:1902476).
    action: ACCEPT
    reason: >-
      This is a valid parent term. Chloride channel activity does result in transmembrane transport
      of chloride ions. While there is a more specific annotation (GO:1902476, chloride
      transmembrane transport) already present, keeping this broader IEA annotation is acceptable
      as it is not incorrect.
- term:
    id: GO:1902476
    label: chloride transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      IEA annotation inferred from chloride channel activity (GO:0005254) via inter-ontology
      logical inference. Since YCR023C has experimentally demonstrated chloride channel activity,
      the inference that it is involved in chloride transmembrane transport is sound.
    action: ACCEPT
    reason: >-
      This is a correct logical inference from the experimentally supported chloride channel
      activity annotation. YCR023C mediates Cl− currents when expressed in HeLa cells
      (PMID:34910516), directly supporting involvement in chloride transmembrane transport.
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        The expression of YCR023C also increased the whole-cell Cl− currents
- term:
    id: GO:0005254
    label: chloride channel activity
  evidence_type: IDA
  original_reference_id: PMID:34910516
  review:
    summary: >-
      IDA annotation based on direct electrophysiological recordings. Wang et al. (2021)
      expressed YCR023C in HeLa cells and measured whole-cell Cl− currents using patch-clamp
      electrophysiology. YCR023C expression significantly increased Cl− currents compared to
      mock-transfected cells. The currents displayed outward rectification and were sensitive
      to the chloride channel blockers DIDS, NFA, and NPPB, all hallmark properties of chloride
      channels.
    action: ACCEPT
    reason: >-
      This is the core molecular function of YCR023C, supported by direct electrophysiological
      evidence. The data show that YCR023C itself conducts chloride ions rather than acting as
      an auxiliary subunit, since YCR023C shares less than 25% identity with human CLN7 and
      would be unlikely to interact with human endogenous channel subunits.
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        The expression of YCR023C also increased the whole-cell Cl− currents (Fig. 4, G and H). In addition, the
        whole-cell currents recorded in YCR023C-expressing cells had the similar characteristics
        as those of hCLN7 currents, including outward rectification and sensitivities to DIDS,
        NFA, and NPPB
    - reference_id: PMID:34910516
      supporting_text: >-
        YCR023C is less than 25% identical to that of hCLN7 and therefore unlikely to serve as
        an auxiliary subunit for a human protein, the data from both the PM-targeting CLN7 mutant
        and the yeast CLN7 homolog suggest that CLN7 is more like a Cl−-conducting protein than
        as an auxiliary subunit.
- term:
    id: GO:0000329
    label: fungal-type vacuole membrane
  evidence_type: IDA
  original_reference_id: PMID:12562762
  review:
    summary: >-
      IDA annotation from SGD citing PMID:12562762. This paper primarily describes the
      localization of Tpo1p (a polyamine transporter) and its homologs Tpo2p-4p using sucrose
      gradient ultracentrifugation and HA-tagging. The paper does not appear to directly study
      YCR023C. However, YCR023C is an MFS family member like Tpo1-4p, and SGD may have used
      this reference in the context of broader localization data for MFS family members. The
      vacuolar membrane localization is consistent with YCR023C being the yeast homolog of
      human CLN7, which localizes to the lysosomal/endolysosomal membrane.
    action: ACCEPT
    reason: >-
      The vacuolar membrane localization is biologically plausible given that the human ortholog
      CLN7 localizes to lysosomal/endolysosomal membranes (PMID:34910516). While the cited
      reference primarily focuses on Tpo1p, the annotation was made by SGD curators who may
      have had access to supplementary or associated localization data. The vacuole is the yeast
      equivalent of the lysosome, making this localization consistent with the conserved function.
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        CLN7 is located in lysosomes and endosomes
- term:
    id: GO:0003674
    label: molecular_function
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND (No biological Data) annotation for molecular function root term. This is a placeholder
      indicating no experimental MF annotation was available at the time of annotation (2013).
      However, chloride channel activity (GO:0005254) has since been experimentally demonstrated
      (PMID:34910516, 2021).
    action: REMOVE
    reason: >-
      This ND annotation is now obsolete because an IDA annotation for chloride channel activity
      (GO:0005254) based on PMID:34910516 has superseded it. The ND annotation should be removed
      since experimental molecular function data now exists.
- term:
    id: GO:0008150
    label: biological_process
  evidence_type: ND
  original_reference_id: GO_REF:0000015
  review:
    summary: >-
      ND (No biological Data) annotation for biological process root term. This is a placeholder
      from 2013. Since then, chloride transmembrane transport (GO:1902476) has been inferred
      from the experimentally supported chloride channel activity.
    action: REMOVE
    reason: >-
      This ND annotation should be removed because biological process annotations now exist,
      including chloride transmembrane transport (GO:1902476) inferred from the IDA chloride
      channel activity annotation. The ND placeholder is no longer appropriate.
- term:
    id: GO:0006821
    label: chloride transport
  evidence_type: IDA
  original_reference_id: PMID:34910516
  review:
    summary: >-
      Suggested new annotation. YCR023C mediates chloride transport as demonstrated by
      electrophysiological recordings showing increased Cl− currents upon expression in HeLa
      cells (PMID:34910516). This is the core biological process for YCR023C.
    action: NEW
    reason: >-
      While GO:1902476 (chloride transmembrane transport) is present as an IEA inference, the
      parent term chloride transport (GO:0006821) could be directly supported by the experimental
      evidence in PMID:34910516. This would provide a direct experimental BP annotation rather
      than relying solely on logical inference from the MF term.
    supported_by:
    - reference_id: PMID:34910516
      supporting_text: >-
        The expression of YCR023C also increased the whole-cell Cl− currents (Fig. 4, G and H). In addition, the
        whole-cell currents recorded in YCR023C-expressing cells had the similar characteristics
        as those of hCLN7 currents, including outward rectification and sensitivities to DIDS,
        NFA, and NPPB
