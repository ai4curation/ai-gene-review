description: >-
  BioReason-Pro SFT predictions for TOR1 (yeast). GO terms extracted from HF
  protein_catalogue (wanglab/protein_catalogue). Reviewed against curated AIGR
  review (P35169) and GOA annotation file. TOR1 was a BioReason RL SUCCESS case
  (correctness 5/5); SFT GO predictions are evaluated here for comparison.
  The SFT model correctly identifies the PIKK kinase family and TOR signaling
  pathway from domain architecture (FRB domain IPR009076 is the key discriminator).
  Most core function terms (kinase activity, TOR signaling, TORC1 complex,
  autophagy regulation, ribosome biogenesis) match GOA (CNN). The SFT model
  performs well on this gene because the InterPro domain annotations are highly
  specific and point directly to TOR/mTOR biology. Key gap: vacuolar membrane
  localization (the primary TORC1 signaling platform) is not captured by
  the SFT domain-based approach. Summary: 8 CNN, 0 COR, 1 LSP, 2 UNC, 0 NPI.
