gene_symbol: TOR1
organism: yeast
uniprot_id: P35169
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Phosphatidylinositol 3-kinase homolog, component of TORC1, which regulates
    multiple cellular processes to control cell growth in response to environmental
    signals. Nutrient limitation and environmental stress signals cause inactivation
    of TORC1. Active TORC1 positively controls ribosome biogenesis via control of
    rRNA, ribosomal protein and tRNA gene expression, and rRNA processing. TORC1 positively
    controls protein biosynthesis by regulation of mRNA stability, translation initiation
    factor activity, and high-affinity amino acid permeases that serve to provide
    amino acids for use by the translation machinery. TORC1 also promotes growth by
    sequestering a number of nutrient and general stress-responsive transcription
    factors in the cytoplasm. TORC1 negatively controls macroautophagy, a process
    to recycle surplus cytoplasmic mass under nutrient starvation conditions. TORC1
    controls many of these processes via TIP41-TAP42-mediated inhibition of the type
    2A-related phosphatases PP2A and SIT4 (PubMed:10198052, PubMed:10329624, PubMed:10604478,
    PubMed:10995454, PubMed:11741537, PubMed:15620355, PubMed:28993463, PubMed:7606777,
    PubMed:8741837, PubMed:9539725, PubMed:9843498). In nutrient-rich conditions,
    responsible for the phosphorylation of AGC S6 kinase (S6K) YPK3, activating YPK3
    kinase activity and promoting phosphorylation of ribosomal protein S6 (PubMed:25767889).
    Phosphorylates kinase SCH9 at 6 amino acids in the C-terminus, activating SCH9
    kinase activity to properly regulate ribosome biogenesis, translation initiation,
    and entry into stationary phase (PubMed:17560372). Activates dormant ribosomes
    by mediating phosphorylation of STM1, leading to STM1 inactivation and reactivation
    of translation (PubMed:36691768).
