- source: Alliance_Automated
  text: Enables protein serine/threonine kinase activity. Involved in several processes,
    including gene expression; intracellular signal transduction; and regulation of
    primary metabolic process. Located in bounding membrane of organelle; nucleus;
    and plasma membrane. Part of TORC1 complex. Used to study cancer. Human ortholog(s)
    of this gene implicated in autosomal dominant polycystic kidney disease; kidney
    angiomyolipoma; lung disease (multiple); prostate cancer; and type 2 diabetes
    mellitus. Orthologous to human MTOR (mechanistic target of rapamycin kinase).
