review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: Perfect agreement on TORC1 function and nutrient-responsive growth control.
      Curated sources complement each other with different details.
  overall_notes: UniProt provides an encyclopedic TORC1 description with specific
    substrates and mechanisms. SGD curated adds unique metabolite inhibitor information.
    Both curated sources are excellent but very different in style. Automated sources
    fail to capture the richness of TOR signaling. Strong concordance on core nutrient-responsive
    kinase function.
