- source: Alliance
  text: PIK-related protein kinase and rapamycin target; subunit of TORC1, a complex
    that controls growth in response to nutrients by regulating translation, transcription,
    ribosome biogenesis, nutrient transport and autophagy; involved in meiosis; indole-3-acetic
    acid, an ATP-competitive TORC1 inhibitor, accumulates upon entry into stationary
    phase; malonyl-CoA is a direct ATP-competitive inhibitor of TORC1; TOR1 has a
    paralog, TOR2, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003827
  source_id: SGD:S000003827
- source: Alliance
  text: Enables protein serine/threonine kinase activity. Involved in several processes,
    including gene expression; intracellular signal transduction; and regulation of
    primary metabolic process. Located in bounding membrane of organelle; nucleus;
    and plasma membrane. Part of TORC1 complex. Used to study cancer. Human ortholog(s)
    of this gene implicated in autosomal dominant polycystic kidney disease; kidney
    angiomyolipoma; lung disease (multiple); prostate cancer; and type 2 diabetes
    mellitus. Orthologous to human MTOR (mechanistic target of rapamycin kinase).
