gene_symbol: EGD1
organism: yeast
uniprot_id: Q02642
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the nascent polypeptide-associated complex (NAC), a dynamic component
    of the ribosomal exit tunnel, protecting the emerging polypeptides from interaction
    with other cytoplasmic proteins to ensure appropriate nascent protein targeting.
    The NAC complex also promotes mitochondrial protein import by enhancing productive
    ribosome interactions with the outer mitochondrial membrane and blocks the inappropriate
    interaction of ribosomes translating non-secretory nascent polypeptides with translocation
    sites in the membrane of the endoplasmic reticulum EGD1 may act as a transcription
    factor that exert a negative effect on the expression of several genes that are
    transcribed by RNA polymerase II. Can enhance DNA binding of the GAL4 protein
    activator.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q02642
  source_id: Q02642
- source: Alliance
  text: Subunit beta1 of the nascent polypeptide-associated complex (NAC); involved
    in protein targeting to mitochondria; peripheral component of cytoplasmic ribosomes;
    regulates Atg32p phosphorylation to promote respiration-induced mitophagy; enhances
    DNA binding of the Gal4p; homolog of human BTF3b; EGD1 has a paralog, BTT1, that
    arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005958
  source_id: SGD:S000005958
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in cotranslational protein
    targeting to membrane and macroautophagy. Acts upstream of or within mitophagy.
    Located in cytoplasm. Part of nascent polypeptide-associated complex. Orthologous
    to human BTF3 (basic transcription factor 3) and BTF3L4 (basic transcription factor
    3 like 4).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005958
  source_id: SGD:S000005958
