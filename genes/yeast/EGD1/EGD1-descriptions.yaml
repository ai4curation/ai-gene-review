descriptions:
- source: UniProt
  text: Component of the nascent polypeptide-associated complex (NAC), a dynamic component
    of the ribosomal exit tunnel, protecting the emerging polypeptides from interaction
    with other cytoplasmic proteins to ensure appropriate nascent protein targeting.
    The NAC complex also promotes mitochondrial protein import by enhancing productive
    ribosome interactions with the outer mitochondrial membrane and blocks the inappropriate
    interaction of ribosomes translating non-secretory nascent polypeptides with translocation
    sites in the membrane of the endoplasmic reticulum EGD1 may act as a transcription
    factor that exert a negative effect on the expression of several genes that are
    transcribed by RNA polymerase II. Can enhance DNA binding of the GAL4 protein
    activator.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q02642
  source_id: Q02642
