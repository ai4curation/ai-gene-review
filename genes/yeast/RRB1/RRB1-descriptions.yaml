gene_symbol: RRB1
organism: yeast
uniprot_id: Q04225
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in regulation of L3 expression and stability and plays a role in
    early 60S ribosomal subunit assembly. May be required for proper assembly of pre-ribosomal
    particles during early ribosome biogenesis, presumably by targeting L3 onto the
    35S precursor rRNA.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04225
  source_id: Q04225
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate but uses hedging language ("may be required").
    - rubric: utility
      score: 4
      notes: Informative about 60S assembly role.
    - rubric: compactness
      score: 4
      notes: Appropriately concise.
    - rubric: completeness
      score: 3
      notes: Covers L3 regulation and pre-ribosomal assembly but not co-translational
        association.
    - rubric: specificity
      score: 4
      notes: Mentions L3 (Rpl3) targeting to 35S rRNA.
    overall_notes: Good description of L3 assembly and ribosome biogenesis role.
- source: Alliance_Imported
  text: Specific assembly chaperone for ribosomal protein Rpl3p; co-translationally
    associates with nascent Rpl3p, preventing aggregation, and facilitating nuclear
    import; required for biogenesis of preribosomal particles; essential gene; contains
    five WD-repeat motifs
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004738
  source_id: SGD:S000004738
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Highly informative about co-translational chaperoning and import.
    - rubric: compactness
      score: 4
      notes: Appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers co-translational association, aggregation prevention, nuclear
        import, and WD repeats.
    - rubric: specificity
      score: 5
      notes: Names specific mechanism (co-translational), structural feature (WD repeats).
    overall_notes: Comprehensive curated description of assembly chaperone function.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in ribosome biogenesis.
    Located in nucleolus. Orthologous to human GRWD1 (glutamate rich WD repeat containing
    1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004738
  source_id: SGD:S000004738
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Correct but extremely vague.
    - rubric: utility
      score: 2
      notes: Very limited utility.
    - rubric: compactness
      score: 5
      notes: Very concise.
    - rubric: completeness
      score: 1
      notes: Only ribosome biogenesis and unfolded protein binding; misses L3 specificity.
    - rubric: specificity
      score: 2
      notes: Generic GO terms.
    overall_notes: GO-derived minimal automated description.
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in ribosome biogenesis.
    Located in nucleolus. Orthologous to human GRWD1 (glutamate rich WD repeat containing
    1). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/855161
  source_id: GeneID:855161
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 2
      notes: Redundant.
    - rubric: compactness
      score: 5
      notes: Same.
    - rubric: completeness
      score: 1
      notes: Same gaps.
    - rubric: specificity
      score: 2
      notes: Same.
    overall_notes: Near-duplicate of Alliance_Automated.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Moderate concordance; curated sources agree on ribosome assembly role but
      differ in specificity. Automated sources are too vague.
  overall_notes: Alliance_Imported is clearly the best description. UniProt is good
    but hedging. Automated sources lose the critical Rpl3p specificity.
