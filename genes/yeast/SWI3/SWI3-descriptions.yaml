gene_symbol: SWI3
organism: yeast
uniprot_id: P32591
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Component of the SWI/SNF complex,
    an ATP-dependent chromatin-remodeling complex, which is required for the positive
    and negative regulation of gene expression of a large number of genes. It changes
    chromatin structure by altering DNA-histone contacts within a nucleosome, leading
    eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32591
  source_id: P32591
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate for the complex but does not describe SWI3-specific functions.
    - rubric: utility
      score: 3
      notes: Same description as other SWI/SNF subunits; does not distinguish SWI3.
    - rubric: compactness
      score: 4
      notes: Moderately concise.
    - rubric: completeness
      score: 2
      notes: Misses SANT domain, H2A-H2B dimer displacement, cytosolic relocalization
        under hypoxia, two-copy stoichiometry.
    - rubric: specificity
      score: 2
      notes: Nearly identical to SWI1 and SWI2 descriptions; nothing SWI3-specific.
    overall_notes: Generic SWI/SNF complex description, identical to SWI1 entry except
      for subunit identity. Does not describe SWI3-specific features like the SANT
      domain.
- source: Alliance_Imported
  text: Subunit of the SWI/SNF chromatin remodeling complex; SWI/SNF regulates transcription
    by remodeling chromosomes; contains SANT domain that is required for SWI/SNF assembly;
    is essential for displacement of histone H2A-H2B dimers during ATP-dependent remodeling;
    required for transcription of many genes, including ADH1, ADH2, GAL1, HO, INO1
    and SUC2; relocates to the cytosol under hypoxic conditions
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003712
  source_id: SGD:S000003712
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; SANT domain, H2A-H2B displacement, and hypoxic relocalization
        are all well-documented.
    - rubric: utility
      score: 5
      notes: Highly informative with SWI3-specific functional details.
    - rubric: compactness
      score: 4
      notes: Dense but comprehensive.
    - rubric: completeness
      score: 5
      notes: Covers SANT domain, dimer displacement, target genes, and relocalization.
    - rubric: specificity
      score: 5
      notes: Names SANT domain, H2A-H2B dimers, specific target genes, and hypoxia
        response.
    overall_notes: Excellent SWI3-specific description. Covers the SANT domain required
      for SWI/SNF assembly, histone H2A-H2B dimer displacement, target genes, and
      hypoxic cytosol relocalization.
- source: Alliance_Automated
  text: Enables DNA binding activity and histone binding activity. Involved in chromatin
    remodeling; positive regulation of mating type switching; and positive regulation
    of transcription by RNA polymerase II. Located in cytosol and nucleus. Part of
    SWI/SNF complex. Human ortholog(s) of this gene implicated in Coffin-Siris syndrome
    8 and hydrocephalus. Orthologous to several human genes including SMARCC2 (SWI/SNF
    related BAF chromatin remodeling complex subunit C2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003712
  source_id: SGD:S000003712
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but generic.
    - rubric: utility
      score: 3
      notes: SWI/SNF complex membership and SMARCC2 orthology are useful.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses SANT domain, H2A-H2B displacement, hypoxic relocalization.
    - rubric: specificity
      score: 3
      notes: SMARCC2 orthology adds some specificity.
    overall_notes: Standard GO-derived description. Mentions DNA/histone binding and
      SWI/SNF complex membership. Disease associations from human orthologs add some
      value.
