review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: All agree on SWI/SNF membership but there is a significant information
      gap between SGD curated and UniProt. UniProt lacks SWI3-specific features.
  overall_notes: SGD curated is far superior to UniProt for SWI3, providing subunit-specific
    details (SANT domain, H2A-H2B displacement, hypoxic relocalization). UniProt uses
    a copy-paste complex description shared with SWI1 and SWI2. Automated sources
    are generic but correctly identify SWI/SNF membership.
