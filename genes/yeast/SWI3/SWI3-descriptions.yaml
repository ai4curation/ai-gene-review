gene_symbol: SWI3
organism: yeast
uniprot_id: P32591
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Component of the SWI/SNF complex,
    an ATP-dependent chromatin-remodeling complex, which is required for the positive
    and negative regulation of gene expression of a large number of genes. It changes
    chromatin structure by altering DNA-histone contacts within a nucleosome, leading
    eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32591
  source_id: P32591
- source: Alliance_Imported
  text: Subunit of the SWI/SNF chromatin remodeling complex; SWI/SNF regulates transcription
    by remodeling chromosomes; contains SANT domain that is required for SWI/SNF assembly;
    is essential for displacement of histone H2A-H2B dimers during ATP-dependent remodeling;
    required for transcription of many genes, including ADH1, ADH2, GAL1, HO, INO1
    and SUC2; relocates to the cytosol under hypoxic conditions
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003712
  source_id: SGD:S000003712
- source: Alliance_Automated
  text: Enables DNA binding activity and histone binding activity. Involved in chromatin
    remodeling; positive regulation of mating type switching; and positive regulation
    of transcription by RNA polymerase II. Located in cytosol and nucleus. Part of
    SWI/SNF complex. Human ortholog(s) of this gene implicated in Coffin-Siris syndrome
    8 and hydrocephalus. Orthologous to several human genes including SMARCC2 (SWI/SNF
    related BAF chromatin remodeling complex subunit C2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003712
  source_id: SGD:S000003712
