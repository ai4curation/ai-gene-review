  - id: file:yeast/SWI3/SWI3-deep-research-falcon.md
    title: Falcon (Edison) deep research report on SWI3 (YJL176C, P32591)
    findings:
      - statement: |-
          SWI3 (YJL176C) is a core, non-catalytic structural/regulatory subunit of the
          SWI/SNF chromatin remodeling complex; it is not an enzyme.
        reference_section_type: OTHER
        supporting_text: |-
          SWI3 is **not an enzyme**; it is a **core structural/regulatory subunit** within SWI/SNF.
      - statement: |-
          The Swi3 SWIRM domain directly binds DNA (including cruciform/nucleosomal DNA)
          with apparent Kd ~72-105 nM in vitro, and contributes to SWI/SNF assembly and stability.
        reference_section_type: OTHER
        supporting_text: |-
          and a KD of **~105.36 ± 7.65 nM** reported for binding to cruciform DNA in vitro.
      - statement: |-
          Cryo-EM resolves two copies of Swi3 (Swi3A/Swi3B) that, with Swi1, form the
          structural backbone of the complex; Swi3 SWIRM domains contact Snf5 RPT regions.
        reference_section_type: OTHER
        supporting_text: |-
          The model contains **two Swi3 instances (Swi3A and Swi3B)**.
      - statement: |-
          Swi3 is predominantly nuclear under normoxia but relocalizes to the cytosol under
          hypoxia (>95% cytosolic), reversing on reoxygenation.
        reference_section_type: OTHER
        supporting_text: |-
          Swi3 is predominantly **nuclear** under normoxia but undergoes regulated **cytosolic relocalization under hypoxia** (>95% cytosolic)
      - statement: |-
          Beyond activation, Swi/Snf (and Swi3) contributes to context-specific gene
          repression via transcriptional interference, shown by the swi3-E815X allele.
        reference_section_type: OTHER
        supporting_text: |-
          A 2024 Molecular Cell study found that SWI/SNF remodeling regulates transcriptional interference and gene repression.
  - id: PMID:9121424
    title: Interaction of a Swi3 homolog with Sth1 provides evidence for a
      Swi/Snf-related complex with an essential function in Saccharomyces
      cerevisiae
    findings:
      - statement: |-
          The Swi3 paralog Swh3 (which partners with Sth1 in an essential RSC-related
          complex) is functionally distinct from Swi3 and does not substitute for it,
          aiding disambiguation of SWI3 from SWI3-like proteins.
        reference_section_type: ABSTRACT
        supporting_text: |-
          Swh3 and Swi3 are functionally
  - id: PMID:32636384
    title: Structure of the yeast Swi/Snf complex in a nucleosome free state
    findings:
      - statement: |-
          Cryo-EM shows the conserved subunits Swi1 and Swi3 form the backbone of the
          Swi/Snf complex, with a Swi3 dimer (coiled-coils, SANT, SWIRM domains)
          enwrapping Swi1.
        reference_section_type: RESULTS
        supporting_text: |-
          Swi1 and Swi3 form the backbone of the complex and closely connect with surrounding subunits.
      - statement: |-
          The Snf5 RPT domains interact with the SWIRM domains of Swi3A and Swi3B by
          electrostatic interaction within the nucleosome-binding module.
        reference_section_type: RESULTS
        supporting_text: |-
          interact with the SWIRM domains of Swi3A and Swi3B by electrostatic interaction
  - id: PMID:39043178
    title: Swi/Snf chromatin remodeling regulates transcriptional interference
      and gene repression
    findings:
      - statement: |-
          Swi/Snf chromatin remodeling is required for co-transcriptional nucleosome
          remodeling that drives LUTI-based gene repression via transcriptional interference.
        reference_section_type: ABSTRACT
        supporting_text: |-
          playing a direct role in gene repression via a cis transcriptional interference
      - statement: |-
          The swi3-E815X allele (a nonsense mutant of the structural subunit Swi3)
          reduces Swi/Snf repressive activity at proximal TSSs, though less strongly
          than the snf2-W935R ATPase mutant.
        reference_section_type: RESULTS
        supporting_text: |-
          swi3-E815X mutation also reduces repressive activity by Swi/Snf at the TSSPROX but to a lesser extent than the snf2-W935R mutant.
