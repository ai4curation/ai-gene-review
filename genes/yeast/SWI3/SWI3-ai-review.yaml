id: P32591
gene_symbol: SWI3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: |
  SWI3 is a core structural and regulatory subunit of the SWI/SNF chromatin remodeling complex. Unlike the catalytic ATPase subunits (SWI1/SWI2), SWI3 functions as a scaffold that organizes other subunits, stabilizes complex assembly, and regulates targeting to chromatin. SWI3 contains SWIRM, SANT, and leucine zipper domains; the SWIRM domain mediates both protein-protein interactions and direct DNA/nucleosomal DNA binding (apparent Kd ~72-105 nM in vitro), and is required for complex assembly/stability. It is essential for SWI/SNF complex formation and plays regulatory roles in transcriptional activation, chromatin remodeling, cell wall stress responses, and oxygen-dependent gene regulation. Cryo-EM shows two copies of Swi3 (Swi3A/Swi3B) that, together with Swi1, form the structural backbone of the complex, with the Swi3 SWIRM domains contacting the Snf5 RPT regions. Beyond activation, Swi/Snf (and Swi3) also contributes to context-specific gene repression via transcriptional interference at tandem promoters.

core_functions:
  - molecular_function:
      id: GO:0003677
      label: DNA binding
    description: |-
      DNA/nucleosomal DNA binding via the SWIRM domain - the Swi3 SWIRM domain
      directly binds DNA (including nucleosomal and cruciform DNA) in vitro, and
      structure-guided SWIRM mutations both abolish DNA binding and impair SWI/SNF
      assembly/stability, so this binding contributes to nucleosome engagement and
      complex integrity. This replaces an earlier uninformative "protein binding"
      (GO:0005515) molecular_function entry.
    supported_by:
      - reference_id: PMID:16461455
        supporting_text: |-
          Structure and function of the SWIRM domain, a conserved protein module
          found in chromatin regulatory complexes.
      - reference_id: file:yeast/SWI3/SWI3-deep-research-falcon.md
        supporting_text: |-
          and a KD of **~105.36 ± 7.65 nM** reported for binding to cruciform DNA in vitro.
  - molecular_function:
      id: GO:0042393
      label: histone binding
    description: Chromatin remodeling through histone interactions - SWI3
      interacts with histone H3 and H4 tails (particularly acetylated forms) to
      facilitate complex nucleosome engagement and ATP-dependent remodeling that
      controls transcriptional access to chromatin
    supported_by:
      - reference_id: PMID:17496903
        supporting_text: "Swi3p controls SWI/SNF assembly and ATP-dependent H2A-H2B
          displacement."

existing_annotations:
  - term:
      id: GO:0045893
      label: positive regulation of DNA-templated transcription
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: SWI3 is a core component of the SWI/SNF complex, which activates 
        transcription through ATP-dependent nucleosome remodeling. The complex 
        is recruited to promoters by transcription factors and remodels 
        nucleosomes to facilitate transcription factor binding and RNA 
        polymerase II recruitment. IBA evidence is appropriate as this function 
        is conserved across eukaryotes. This is a primary function of SWI3.
      action: ACCEPT
      reason: SWI3 function as part of the SWI/SNF complex in positive 
        transcriptional regulation is extensively documented and represents a 
        core function. The complex is required for transcriptional activation of
        approximately 5% of yeast genes. This is supported by conservation 
        across organisms (mammalian BAF155/170, plant ATSWI3 orthologs).
      supported_by:
        - reference_id: PMID:1339306
          supporting_text: "Characterization of the yeast SWI1, SWI2, and SWI3 genes,
            which encode a global activator of transcription."
        - reference_id: PMID:8159677
          supporting_text: "Five SWI/SNF gene products are components of a large multisubunit
            complex required for transcriptional enhancement."

        - reference_id: file:yeast/SWI3/SWI3-deep-research-perplexity.md
          supporting_text: 'provider: perplexity'
