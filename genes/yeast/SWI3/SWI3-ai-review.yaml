        assembly are coupled rather than mutually exclusive.
      action: ACCEPT
      reason: |-
        This direct experimental (IDA) annotation, matching UniProt's curated
        SGD IDA DNA binding annotation, is the strongest evidence for SWI3
        molecular function and overturns the earlier REMOVE reasoning. Falcon deep
        research confirms quantitative in vitro DNA binding by the SWIRM domain,
        and UniProt annotates the corresponding SWIRM residues as "Loss of
        DNA-binding". This is a core informative molecular function for SWI3.
      supported_by:
        - reference_id: PMID:16461455
          supporting_text: "Structure and function of the SWIRM domain, a conserved
            protein module found in chromatin regulatory complexes."
        - reference_id: file:yeast/SWI3/SWI3-deep-research-falcon.md
          supporting_text: |-
            Swi3 SWIRM cruciform DNA binding KD **~105.36 ± 7.65 nM**, with other apparent binding estimates in the **~72–90 nM** range.

