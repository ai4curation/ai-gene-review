  review:
    summary: >-
      Phylogenetic (IBA) assignment to the endoplasmic reticulum, consistent with CPR4's
      N-terminal signal peptide and entry into the secretory pathway.
    action: KEEP_AS_NON_CORE
    reason: >-
      CPR4's signal peptide (UniProt SIGNAL 1..20) and C-terminal TM helix direct it into the ER
