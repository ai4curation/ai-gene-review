review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Curated sources agree well on disaggregase function. Automated sources
      introduce misleading terms ("TRC complex", "ER protein folding") creating significant
      discordance.
  overall_notes: 'Both curated descriptions are excellent and complementary: UniProt
    excels on mechanism and prion biology, while SGD adds phase transition and stress
    biology. Automated descriptions are poor -- "TRC complex" and "ER protein folding"
    are misleading for this cytoplasmic disaggregase. Best sources: UniProt and Alliance_Imported
    together.'
