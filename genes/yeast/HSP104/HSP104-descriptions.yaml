      notes: 'Questionable: "protein folding in endoplasmic reticulum" and "Part of
        TRC complex" are misleading for a cytoplasmic disaggregase.'
    - rubric: utility
      score: 2
      notes: Fails to convey the disaggregase function; misleading GO terms.
    - rubric: compactness
      score: 3
      notes: Standard length but wastes space on human disease orthology.
    - rubric: completeness
      score: 2
      notes: Misses disaggregation mechanism, prion biology, and partner specificity.
    - rubric: specificity
      score: 2
      notes: Generic GO terms; does not mention disaggregase activity.
    overall_notes: GO-derived boilerplate. Misleadingly includes "protein folding
      in endoplasmic reticulum" and "TRC complex" which are likely incorrect for HSP104
      (a cytoplasmic disaggregase).
