gene_symbol: HSP104
organism: yeast
uniprot_id: P31539
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Required, in concert with Hsp40 (YDJ1) and Hsp70 (SSA1) and small Hsps (HSP26),
    for the dissociation, resolubilization and refolding of aggregates of damaged
    proteins after heat or other environmental stresses. Extracts proteins from aggregates
    by unfolding and threading them in an ATP-dependent process through the axial
    channel of the protein hexamer, after which they can be refolded by components
    of the Hsp70/Hsp40 chaperone system. Substrate binding is ATP-dependent, and release
    of bound polypeptide is triggered by ATP hydrolysis. Also responsible for the
    maintenance of prions by dissociating prion fibrils into smaller oligomers, thereby
    producing transmissible seeds that can infect daughter cells during mitosis and
    meiosis. Loss of HSP104 can cure yeast cells of the prions [PSI+], [URE3] and
    [PIN+]. Excess HSP104 can also specifically cure cells of [PSI+].
  source_type: curated
  url: https://www.uniprot.org/uniprot/P31539
  source_id: P31539
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and detailed; covers threading mechanism, prion propagation,
        and curing.
    - rubric: utility
      score: 5
      notes: Comprehensive understanding of HSP104 function from this single entry.
    - rubric: compactness
      score: 3
      notes: Lengthy but justified given the complexity of HSP104 biology.
    - rubric: completeness
      score: 5
      notes: Covers disaggregation, mechanism, chaperone cooperation, and prion biology.
    - rubric: specificity
      score: 5
      notes: Names specific partners (YDJ1, SSA1, HSP26), prions ([PSI+], [URE3],
        [PIN+]), and mechanism.
    overall_notes: Outstanding description. Covers disaggregase mechanism, ATP-dependent
      threading, Hsp70/Hsp40 cooperation, and prion biology in detail.
- source: Alliance_Imported
  text: Disaggregase; heat shock protein that cooperates with Ydj1p (Hsp40) and Ssa1p
    (Hsp70) to refold and reactivate denatured, protein aggregates; responds to stresses
    (heat, ethanol, and sodium arsenite); required for the protein aggregate solid-to-liquid
    phase transition and dispersal of liquid condensates; involved in [PSI+] propagation;
    potentiated variants eliminate TDP-43 cytoplasmic aggregates to reduce proteotoxicity;
    becomes more abundant and forms cytoplasmic foci during replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003949
  source_id: SGD:S000003949
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and up to date.
    - rubric: utility
      score: 5
      notes: Complements UniProt with additional biological context.
    - rubric: compactness
      score: 4
      notes: Dense but readable; covers many aspects.
    - rubric: completeness
      score: 5
      notes: Covers disaggregation, stress responses, phase transitions, prions, and
        replication stress.
    - rubric: specificity
      score: 5
      notes: Names Ydj1p, Ssa1p, specific stresses, TDP-43, and cytoplasmic foci.
    overall_notes: Excellent SGD description. Adds phase transition biology and replication
      stress response not in UniProt. Covers TDP-43 aggregates and potentiated variants.
- source: Alliance_Automated
  text: Enables several functions, including ATP hydrolysis activity; adenyl ribonucleotide
    binding activity; and unfolded protein binding activity. Involved in several processes,
    including cellular heat acclimation; protein folding in endoplasmic reticulum;
    and protein unfolding. Located in cytoplasm and nuclear periphery. Part of TRC
    complex. Human ortholog(s) of this gene implicated in 3-methylglutaconic aciduria
    type 7a; 3-methylglutaconic aciduria type 7b; and severe congenital neutropenia.
    Orthologous to human CLPB (ClpB family mitochondrial disaggregase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003949
  source_id: SGD:S000003949
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
