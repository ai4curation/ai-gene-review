review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: All sources agree on ATP synthase assembly role. Alliance_Imported uniquely
      specifies the alpha/beta subunit chaperone function and propionylation.
  overall_notes: 'Alliance_Imported provides the most informative description, specifying
    the molecular chaperone role for F1 alpha and beta subunit assembly. UniProt is
    similar but less specific. Automated sources are generic GO boilerplate. Best
    source: Alliance_Imported.'
