descriptions:
- source: UniProt
  text: Essential for the assembly of the mitochondrial F1-F0 complex. May interact
    with the alpha and/or beta subunits of F1-ATPase.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32453
  source_id: P32453
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct. The alpha/beta interaction is now well established, so 'may'
        is overly cautious.
    - rubric: utility
      score: 3
      notes: Gives the basic function but lacks detail.
    - rubric: compactness
      score: 5
      notes: Very concise.
    - rubric: completeness
      score: 3
      notes: Misses molecular chaperone classification and propionylation.
    - rubric: specificity
      score: 3
      notes: Mentions alpha/beta subunits but with uncertainty.
    overall_notes: Accurate but brief. Mentions F1-F0 assembly and possible alpha/beta
      interaction but hedges with may.
- source: Alliance_Imported
  text: Molecular chaperone; required for the assembly of alpha and beta subunits
    into the F1 sector of mitochondrial F1F0 ATP synthase; N-terminally propionylated
    in vivo
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005259
  source_id: SGD:S000005259
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 4
      notes: Clear and informative.
    - rubric: compactness
      score: 5
      notes: Concise.
    - rubric: completeness
      score: 4
      notes: Covers chaperone role, F1 sector specificity, and post-translational
        modification.
    - rubric: specificity
      score: 5
      notes: Specifies F1 sector, alpha/beta subunits, and propionylation.
    overall_notes: Best description. Specifies molecular chaperone role for F1 sector
      alpha/beta assembly and propionylation modification.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in mitochondrial proton-transporting
    ATP synthase complex assembly. Located in mitochondrial matrix. Orthologous to
    human ATPAF1 (ATP synthase mitochondrial F1 complex assembly factor 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005259
  source_id: SGD:S000005259
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Correct but generic.
    - rubric: utility
      score: 2
      notes: Generic.
    - rubric: compactness
      score: 4
      notes: Brief.
    - rubric: completeness
