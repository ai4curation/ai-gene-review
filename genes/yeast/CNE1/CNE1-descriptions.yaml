gene_symbol: CNE1
organism: yeast
uniprot_id: P27825
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Interacts with newly synthesized monoglucosylated glycoproteins in the endoplasmic
    reticulum. It may act in assisting protein assembly and/or in the retention within
    the ER of unassembled protein subunits. It seems to play a major role in the quality
    control apparatus of the ER by the retention of incorrectly folded proteins.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P27825
  source_id: P27825
- source: Alliance
  text: Calnexin; integral membrane ER chaperone involved in folding and quality control
    of glycoproteins; chaperone activity is inhibited by Mpd1p, with which Cne1p interacts;
    24% identical to mammalian calnexin; Ca+ binding not yet shown in yeast
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000054
  source_id: SGD:S000000054
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in ERAD pathway and protein
    folding. Located in endoplasmic reticulum membrane. Orthologous to several human
    genes including CANX (calnexin).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000054
  source_id: SGD:S000000054
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in ERAD pathway and protein
    folding. Located in endoplasmic reticulum membrane. Orthologous to several human
    genes including CANX (calnexin). [provided by Alliance of Genome Resources, Jul
    2025]
  source_type: automated
