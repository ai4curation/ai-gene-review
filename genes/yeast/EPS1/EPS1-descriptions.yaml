gene_symbol: EPS1
organism: yeast
uniprot_id: P40557
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Acts as a membrane-bound chaperone in endoplasmic reticulum quality control.
    Probably facilitates presentation of substrate to membrane-bound components of
    the degradation machinery.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40557
  source_id: P40557
- source: Alliance_Imported
  text: ER protein with chaperone and co-chaperone activity; involved in retention
    of resident ER proteins; has a role in recognizing proteins targeted for ER-associated
    degradation (ERAD), member of the protein disulfide isomerase family
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001267
  source_id: SGD:S000001267
- source: Alliance_Automated
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
    (glutathione) activity; and unfolded protein binding activity. Involved in ERAD
    pathway and protein retention in ER lumen. Located in endoplasmic reticulum membrane.
    Orthologous to human PDIA5 (protein disulfide isomerase family A member 5) and
    TXNDC5 (thioredoxin domain containing 5).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001267
  source_id: SGD:S000001267
