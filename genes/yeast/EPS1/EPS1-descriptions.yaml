- source: Alliance_Automated
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
    (glutathione) activity; and unfolded protein binding activity. Involved in ERAD
    pathway and protein retention in ER lumen. Located in endoplasmic reticulum membrane.
    Orthologous to human PDIA5 (protein disulfide isomerase family A member 5) and
    TXNDC5 (thioredoxin domain containing 5).
  source_type: automated
