descriptions:
- source: UniProt
  text: Plays a role in mitochondrial biogenesis and protein folding.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P35191
  source_id: P35191
- source: Alliance
  text: Co-chaperone that stimulates HSP70 protein Ssc1p ATPase activity; involved
    in protein folding/refolding in the mitochodrial matrix; required for proteolysis
    of misfolded proteins; member of the HSP40 (DnaJ) family of chaperones
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001878
  source_id: SGD:S000001878
- source: Alliance
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in protein folding; protein quality control for misfolded or incompletely synthesized
    proteins; and response to heat. Located in mitochondrial matrix. Orthologous to
    human DNAJA3 (DnaJ heat shock protein family (Hsp40) member A3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001878
  source_id: SGD:S000001878
- source: RefSeq
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in several processes, including protein folding; protein quality control for misfolded
    or incompletely synthesized proteins; and response to heat. Located in mitochondrial
    matrix. Orthologous to human DNAJA3 (DnaJ heat shock protein family (Hsp40) member
    A3). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850530
  source_id: GeneID:850530
