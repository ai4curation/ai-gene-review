descriptions:
- source: UniProt
  text: Molecular chaperone that promotes the maturation, structural maintenance and
    proper regulation of specific target proteins involved in cell cycle control and
    signal transduction. Undergoes a functional cycle that is linked to its ATPase
    activity. The nucleotide-free form of the dimer is found in an open conformation
    in which the N-termini are not dimerized and the complex is ready for client protein
    binding. Binding of ATP induces large conformational changes, resulting in the
    formation of a ring-like closed structure in which the N-terminal domains associate
    intramolecularly with the middle domain and also dimerize with each other, stimulating
    their intrinsic ATPase activity and acting as a clamp on the substrate. Finally,
    ATP hydrolysis results in the release of the substrate. This cycle probably induces
    conformational changes in the client proteins, thereby causing their activation.
    Interacts dynamically with various co-chaperones that modulate its substrate recognition,
    ATPase cycle and chaperone function. Required for growth at high temperatures.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P02829
  source_id: P02829
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of the Hsp90 cycle.
    - rubric: utility
      score: 4
      notes: Very informative about mechanism, but could better convey yeast-specific
        biology.
    - rubric: compactness
      score: 2
      notes: Quite lengthy; the ATPase cycle description is more detailed than necessary
        for a gene summary.
    - rubric: completeness
      score: 4
      notes: Covers mechanism well but misses telomerase, pheromone signaling, and
        Hsc82p redundancy.
    - rubric: specificity
      score: 4
      notes: Good mechanistic detail but generic to Hsp90 family rather than yeast
        HSP82.
    overall_notes: Detailed mechanistic description of the Hsp90 ATPase cycle and
      client protein maturation. Thorough but reads more like a textbook entry than
      a gene summary.
- source: Alliance_Imported
  text: Hsp90 chaperone; functionally redundant with Hsc82p; required for pheromone
    signaling; negative regulator of the Hsf1p-dependent heat shock response with
    Cpr7p; docks with Tom70p for mitochondrial preprotein delivery; promotes telomerase
    DNA binding, nucleotide addition; promotes solubility of chaperone-substrate complexes;
    DNA damage induced nuclear import is Aha1p dependent; protein abundance increases
    in response to DNA replication stress; human homolog, HSP90AB1, complements null
    mutant
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000006161
  source_id: SGD:S000006161
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Immediately conveys what is unique about HSP82 in yeast.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized semicolon format.
    - rubric: completeness
      score: 5
      notes: Covers redundancy, signaling, telomerase, mitochondrial targeting, DNA
        damage, and complementation.
    - rubric: specificity
      score: 5
      notes: Names Hsc82p, Tom70p, Aha1p, HSP90AB1, and specific pathways.
    overall_notes: Excellent yeast-specific description. Covers pheromone signaling,
      telomerase, Hsc82p redundancy, mitochondrial preprotein delivery, and stress
      responses.
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity; identical protein binding activity; and unfolded
    protein binding activity. Involved in several processes, including positive regulation
    of telomere maintenance via telomerase; protein folding; and protein-containing
    complex assembly. Located in cytoplasm and nucleus. Human ortholog(s) of this
    gene implicated in multiple sclerosis. Orthologous to several human genes including
    HSP90AB1 (heat shock protein 90 alpha family class B member 1).
