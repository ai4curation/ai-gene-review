id: Q03691
gene_symbol: ROT1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  ROT1 encodes an essential endoplasmic-reticulum membrane protein that acts as
  an ER protein-folding chaperone or chaperone-associated assembly factor. Rot1
  faces the ER lumen, genetically and physically cooperates with ER folding and
  glycosylation factors such as Kar2/BiP and Ost3, prevents aggregation in vitro,
  and supports maturation of secretory and membrane proteins. Its defects cause
  impaired ER protein folding, reduced N- and O-glycosylation of glycoproteins,
  cell wall defects, altered actin polarity, and bud-growth phenotypes; these
  downstream phenotypes are best interpreted as consequences of the core ER
  proteostasis/glycoprotein maturation role.
