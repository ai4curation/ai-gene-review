  description: >-
    Rot1 is an essential ER membrane chaperone or chaperone-associated assembly
    factor that supports folding and maturation of newly synthesized secretory
    and membrane proteins. It cooperates with Kar2/BiP and with the
    Ost3-containing glycosylation machinery, preventing degradation or
    underglycosylation of a subset of ER clients. N-glycosylation is therefore
    a direct core process coupled to Rot1-dependent ER proteostasis, while
    cell-wall, actin-polarity, and bud-growth phenotypes are downstream
    readouts.
  supported_by:
