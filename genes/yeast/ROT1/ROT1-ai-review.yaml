    supporting_text: >-
      Rot1 functions as a chaperone in vivo supporting the folding of those
      proteins.
  - reference_id: file:yeast/ROT1/ROT1-deep-research-falcon.md
    supporting_text: >-
      Rot1's primary function is best described as an ER chaperone/assembly
      factor required for efficient glycosylation rather than a catalytic enzyme
      with a discrete small-molecule substrate.
  - reference_id: file:interpro/panther/PTHR28090/PTHR28090-metadata.yaml
    supporting_text: PANTHER family PTHR28090 is named PROTEIN ROT1, supporting that the reviewed protein belongs to the conserved Rot1 family.
proposed_new_terms: []
suggested_questions:
- question: >-
    Is Rot1 primarily a client-binding ER chaperone, an OST/PMT assembly factor,
    or a factor that couples both activities during glycoprotein maturation?
- question: >-
    Which Rot1-dependent clients directly cause the cell wall and actin-polarity
    phenotypes when they fail to mature correctly?
suggested_experiments:
- experiment_type: client proteomics
  hypothesis: >-
    Rot1 has a restricted client set enriched for secretory-pathway and
    cell-wall glycoproteins.
  description: >-
    Compare ER-associated degradation substrates, glycosylation occupancy, and
    Rot1 proximity-labeling partners in wild-type, rot1 temperature-sensitive,
    and complemented strains under permissive and restrictive conditions.
- experiment_type: glycosylation complex reconstitution
  hypothesis: >-
    Rot1 directly improves Ost3-containing OST function through physical
    association with Ost3 rather than only indirectly through global ER stress.
  description: >-
    Reconstitute Ost3-containing and Ost6-containing OST complexes with or
    without purified Rot1 in microsomal or proteoliposome assays and measure
    substrate-specific N-glycosylation efficiency.
