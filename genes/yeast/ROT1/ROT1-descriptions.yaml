      notes: Accurate description of multiple functional roles.
    - rubric: utility
      score: 4
      notes: Informative about the pleiotropic functions.
    - rubric: compactness
      score: 4
      notes: Well-structured.
    - rubric: completeness
      score: 4
      notes: Covers cell wall, chaperone, autophagy, and cytoskeleton.
    - rubric: specificity
      score: 4
      notes: Mentions 1,6-beta-glucan and CLB2 specifically.
    overall_notes: Good description of cell wall, chaperone, and cytoskeleton roles.
- source: Alliance_Imported
  text: Molecular chaperone involved in protein folding in ER; mutation causes defects
    in cell wall synthesis and lysis of autophagic bodies, suppresses tor2 mutations,
    and is synthetically lethal with kar2-1 and with rot2 mutations; involved in N-linked
    glycosylation and O-mannosylation; transmembrane helix Ser250 is essential for
    Rot1p to interact with other membrane components and exert its functional role,
    avoiding exposure of Ser H-bonding group at lipid-exposed surface
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004813
  source_id: SGD:S000004813
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and detailed.
    - rubric: utility
      score: 5
      notes: Very useful with mechanistic and genetic interaction details.
    - rubric: compactness
      score: 3
      notes: Dense but informative.
    - rubric: completeness
      score: 5
      notes: Covers chaperone, cell wall, autophagy, glycosylation, TM helix, and
        genetic interactions.
    - rubric: specificity
      score: 5
      notes: Names specific genetic interactions (kar2-1, rot2) and Ser250 importance.
    overall_notes: Comprehensive curated description with ER chaperone focus.
