gene_symbol: ROT1
organism: yeast
uniprot_id: Q03691
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Required for normal levels of the cell wall 1,6-beta-glucan. Involved in a
    protein folding machinery chaperoning proteins acting in various physiological
    processes including cell wall synthesis and lysis of autophagic bodies. Controls
    actin cytoskeleton polarization to the mother-bud neck and CLB2 protein stability.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q03691
  source_id: Q03691
- source: Alliance
  text: Molecular chaperone involved in protein folding in ER; mutation causes defects
    in cell wall synthesis and lysis of autophagic bodies, suppresses tor2 mutations,
    and is synthetically lethal with kar2-1 and with rot2 mutations; involved in N-linked
    glycosylation and O-mannosylation; transmembrane helix Ser250 is essential for
    Rot1p to interact with other membrane components and exert its functional role,
    avoiding exposure of Ser H-bonding group at lipid-exposed surface
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004813
  source_id: SGD:S000004813
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in several processes,
    including budding cell apical bud growth; glycoprotein biosynthetic process; and
    protein folding. Located in endoplasmic reticulum membrane.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004813
  source_id: SGD:S000004813
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in several processes,
    including budding cell apical bud growth; protein folding; and protein glycosylation.
    Located in endoplasmic reticulum membrane. [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/855240
  source_id: GeneID:855240
