descriptions:
- source: UniProt
  text: Protein kinase that positively regulates proper entry into stationary phase
    of cells under nutrient starvation conditions. Involved in glycogen and trehalose
    accumulation, derepression of stress-induced genes, induction of thermotolerance
    and starvation resistance, and proper G1 cell cycle arrest. Also involved in the
    activation of a meiotic genes activation pathway. Phosphorylates IGO1 and IGO2,
    both involved in the TORC1 control of gene expression and chronological life span.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P43565
  source_id: P43565
