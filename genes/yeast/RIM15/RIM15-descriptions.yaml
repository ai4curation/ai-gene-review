gene_symbol: RIM15
organism: yeast
uniprot_id: P43565
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Protein kinase that positively regulates proper entry into stationary phase
    of cells under nutrient starvation conditions. Involved in glycogen and trehalose
    accumulation, derepression of stress-induced genes, induction of thermotolerance
    and starvation resistance, and proper G1 cell cycle arrest. Also involved in the
    activation of a meiotic genes activation pathway. Phosphorylates IGO1 and IGO2,
    both involved in the TORC1 control of gene expression and chronological life span.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P43565
  source_id: P43565
- source: Alliance
  text: Protein kinase involved in cell proliferation in response to nutrients; glucose-repressible;
    involved in signal transduction during cell proliferation in response to nutrients,
    specifically the establishment of stationary phase; identified as a regulator
    of IME2; phosphorylates Igo1p and Igo2p; substrate of Pho80p-Pho85p kinase
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001861
  source_id: SGD:S000001861
- source: Alliance
  text: Enables protein serine/threonine kinase activity. Involved in several processes,
    including cellular response to heat; positive regulation of cell cycle process;
    and positive regulation of metabolic process. Acts upstream of or within cellular
    response to hydrogen peroxide. Located in cytoplasm and nucleus. Human ortholog(s)
    of this gene implicated in thrombocytopenia. Orthologous to human MASTL (microtubule
    associated serine/threonine kinase like).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001861
  source_id: SGD:S000001861
