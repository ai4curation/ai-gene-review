- source: Alliance_Automated
  text: Enables protein serine/threonine kinase activity. Involved in several processes,
    including cellular response to heat; positive regulation of cell cycle process;
    and positive regulation of metabolic process. Acts upstream of or within cellular
    response to hydrogen peroxide. Located in cytoplasm and nucleus. Human ortholog(s)
    of this gene implicated in thrombocytopenia. Orthologous to human MASTL (microtubule
    associated serine/threonine kinase like).
