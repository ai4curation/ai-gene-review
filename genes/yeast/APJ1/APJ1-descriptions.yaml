descriptions:
- source: UniProt
  text: Putative chaperone involved in protein folding. Interferes with propagation
    of [PSI+] prion when overproduced.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53940
  source_id: P53940
- source: Alliance
  text: Hsp40 chaperone with a role in SUMO-mediated protein degradation; works in
    concert with Hsp70 and Hsp110 (Sse1p) to promote disaggregation of intranuclear
    protein inclusions; competes with Hsp104 in disaggregation, supporting turnover
    instead of refolding; member of DnaJ-like family, conserved across eukaryotes;
    overexpression interferes with propagation of the [Psi+] prion; forms nuclear
    foci upon DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005021
  source_id: SGD:S000005021
- source: Alliance
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in protein sumoylation and protein unfolding. Located in nuclear periphery. Is
    active in nuclear inclusion body. Orthologous to human DNAJA1 (DnaJ heat shock
    protein family (Hsp40) member A1) and DNAJA4 (DnaJ heat shock protein family (Hsp40)
    member A4).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005021
  source_id: SGD:S000005021
- source: RefSeq
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
