        knowledge.
    - rubric: utility
      score: 2
      notes: Too brief to understand the distinctive role of APJ1.
    - rubric: compactness
      score: 4
      notes: Very concise.
    - rubric: completeness
      score: 2
      notes: Misses SUMO-mediated degradation, Hsp70/Hsp110 cooperation, and nuclear
        foci formation.
    - rubric: specificity
      score: 2
      notes: Generic chaperone description without specifying the DnaJ family or SUMO
        connection.
    overall_notes: Accurate but very brief. Only mentions putative chaperone function
      and prion interference on overproduction.
- source: Alliance_Imported
  text: Hsp40 chaperone with a role in SUMO-mediated protein degradation; works in
    concert with Hsp70 and Hsp110 (Sse1p) to promote disaggregation of intranuclear
    protein inclusions; competes with Hsp104 in disaggregation, supporting turnover
    instead of refolding; member of DnaJ-like family, conserved across eukaryotes;
    overexpression interferes with propagation of the [Psi+] prion; forms nuclear
    foci upon DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005021
  source_id: SGD:S000005021
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Excellent for understanding APJ1 distinctive functions.
    - rubric: compactness
      score: 3
      notes: Dense but informative; could be slightly more concise.
    - rubric: completeness
      score: 5
      notes: Covers chaperone class, SUMO degradation, disaggregation vs refolding,
        prion interference, and stress response.
    - rubric: specificity
      score: 5
      notes: Names specific partners (Sse1p, Hsp104) and pathways (SUMO-mediated degradation).
    overall_notes: Comprehensive and specific. Covers Hsp40 family membership, SUMO-mediated
      degradation, disaggregation competition with Hsp104, prion biology, and DNA
      replication stress response.
- source: Alliance_Automated
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in protein sumoylation and protein unfolding. Located in nuclear periphery. Is
    active in nuclear inclusion body. Orthologous to human DNAJA1 (DnaJ heat shock
    protein family (Hsp40) member A1) and DNAJA4 (DnaJ heat shock protein family (Hsp40)
    member A4).
