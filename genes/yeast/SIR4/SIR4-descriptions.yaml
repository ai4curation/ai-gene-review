review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Agreement on silencing function but UniProt fails to provide SIR4-specific
      detail, making it nearly interchangeable with its SIR3 entry.
  overall_notes: 'SGD curated is by far the best source. UniProt provides an identical
    generic SIR-complex description that fails to distinguish SIR4 from SIR3 or SIR2;
    this is a notable curation weakness. Automated sources are adequate for basic
    classification. Best source for SIR4-specific biology: SGD curated.'
