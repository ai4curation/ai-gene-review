gene_symbol: SIR4
organism: yeast
uniprot_id: P11978
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: The proteins SIR1 through SIR4 are required for transcriptional repression
    of the silent mating type loci, HML and HMR (PubMed:18039933). The proteins SIR2
    through SIR4 repress mulitple loci by modulating chromatin structure (PubMed:18039933).
    Involves the compaction of chromatin fiber into a more condensed form (PubMed:18039933).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P11978
  source_id: P11978
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but vague; same "mulitple" typo as SIR3 entry.
    - rubric: utility
      score: 2
      notes: Fails to convey what makes SIR4 unique; could describe any SIR protein.
    - rubric: compactness
      score: 4
      notes: Brief three sentences.
    - rubric: completeness
      score: 1
      notes: Misses scaffold role, Ku-mediated telomerase recruitment, lifespan alleles,
        SIR2/SIR3 interactions.
    - rubric: specificity
      score: 1
      notes: Completely generic; no SIR4-specific information.
    overall_notes: Nearly identical to the SIR3 UniProt entry. Generic SIR1-4 description
      that does not distinguish SIR4-specific functions (scaffold, Ku interaction,
      telomerase recruitment). Contains same "mulitple" typo.
- source: Alliance_Imported
  text: SIR protein involved in assembly of silent chromatin domains; silent information
    regulator (SIR) along with SIR2 and SIR3; involved in assembly of silent chromatin
    domains at telomeres and the silent mating-type loci; some SIR4 alleles prolong
    lifespan; required for Ku-mediated telomerase recruitment, telomere lengthening,
    and telomere hypercluster formation in quiescent yeast cells
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002635
  source_id: SGD:S000002635
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-established.
    - rubric: utility
      score: 5
      notes: Clearly conveys SIR4 unique contributions to the silencing complex.
    - rubric: compactness
      score: 4
      notes: Appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers scaffold role, silencing targets, lifespan alleles, telomerase
        recruitment, hypercluster formation.
    - rubric: specificity
      score: 5
      notes: Names SIR2, SIR3, Ku, and specific biological outcomes.
    overall_notes: Much better. Covers SIR4 as a scaffold protein, silent chromatin
      assembly at telomeres and HM loci, lifespan-extending alleles, Ku-mediated telomerase
      recruitment, and telomere hypercluster formation.
- source: Alliance_Automated
  text: Enables double-stranded DNA binding activity; molecular adaptor activity;
    and nucleosome binding activity. Involved in several processes, including constitutive
    heterochromatin formation; establishment of protein-containing complex localization
    to telomere; and positive regulation of heterochromatin formation. Located in
    chromosome, telomeric region. Part of chromatin silencing complex.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002635
  source_id: SGD:S000002635
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; molecular adaptor activity is appropriate for SIR4 scaffold
        function.
    - rubric: utility
      score: 3
      notes: Basic but relevant terms.
    - rubric: compactness
      score: 4
      notes: Standard automated format.
    - rubric: completeness
      score: 2
      notes: Misses Ku interaction, telomerase recruitment, lifespan alleles, specific
        SIR partnerships.
    - rubric: specificity
      score: 3
      notes: Molecular adaptor activity is reasonably specific for SIR4.
    overall_notes: GO-derived summary with useful terms (molecular adaptor, heterochromatin
      formation, chromatin silencing complex). Better fit than SIR3 automated since
      the terms are more appropriate.
- source: RefSeq
  text: Enables double-stranded DNA binding activity; molecular adaptor activity;
    and nucleosome binding activity. Involved in several processes, including constitutive
    heterochromatin formation; establishment of protein-containing complex localization
    to telomere; and positive regulation of heterochromatin formation. Located in
    chromosome, telomeric region. Part of chromatin silencing complex. [provided by
    Alliance of Genome Resources, Jul 2025]
  source_type: automated
