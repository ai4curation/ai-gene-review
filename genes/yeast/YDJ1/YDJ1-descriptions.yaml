review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Poor concordance between curated sources. UniProt focuses on different
      functions than SGD. Not contradictory but very different emphasis. SGD is more
      current.
  overall_notes: SGD curated is far superior to UniProt for YDJ1. UniProt focuses
    on secondary functions (mitochondrial import, HAP1) while SGD captures the primary
    Hsp40 co-chaperone identity and pleiotropic roles. This is a case where UniProt
    would benefit from updating to reflect the well-established J-protein function.
