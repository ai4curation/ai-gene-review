gene_symbol: YDJ1
organism: yeast
uniprot_id: P25491
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Probably involved in mitochondrial protein import. Is also required for efficient
    translocation of pre-pro-alpha-factor. Involved in heme regulation of HAP1, as
    a component of the high-molecular-weight (HMC) complex.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P25491
  source_id: P25491
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct for the specific functions described but misses the core co-chaperone
        identity.
    - rubric: utility
      score: 2
      notes: Misleading focus on mitochondrial import and HAP1 regulation rather than
        the primary Hsp40 co-chaperone role.
    - rubric: compactness
      score: 4
      notes: Three short sentences.
    - rubric: completeness
      score: 2
      notes: Misses Hsp40/HSP70/HSP90 co-chaperone role, Rsp5p-mediated ubiquitination,
        cell size determination, amyloid formation.
    - rubric: specificity
      score: 3
      notes: Names HAP1 and HMC complex but misses the primary functional context.
    overall_notes: Dated and incomplete description. Mentions mitochondrial import,
      pre-pro-alpha-factor translocation, and HAP1/HMC complex involvement, but misses
      the primary Hsp40 co-chaperone function.
- source: Alliance_Imported
  text: Type I HSP40 co-chaperone; regulates HSP90 and HSP70 functions; acts as an
    adaptor that helps Rsp5p recognize and ubiquitinate misfolded, cytosolic proteins
    after heat shock; critical for determining cell size at Start as a function of
    growth rate; involved in protein translocation across membranes; forms cytotoxic
    amyloidogenic-like structures in vitro; DnaJ family member; chimeric protein in
    which the human p58IPK J domain replaces the yeast Ydj1p J domain can complement
    yeast ydj1 mutant
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005008
  source_id: SGD:S000005008
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; covers the breadth of well-established YDJ1 functions.
    - rubric: utility
      score: 5
      notes: Comprehensive view of YDJ1 as a pleiotropic Hsp40 co-chaperone.
    - rubric: compactness
      score: 3
      notes: Long but information-dense.
    - rubric: completeness
      score: 5
      notes: Covers co-chaperone role, Rsp5p adapter, cell size, translocation, amyloid,
        DnaJ family, human complementation.
    - rubric: specificity
      score: 5
      notes: Names HSP90, HSP70, Rsp5p, DnaJ family, p58IPK J domain.
    overall_notes: Excellent comprehensive description. Covers Hsp40 co-chaperone
      identity, HSP90/HSP70 regulation, Rsp5p ubiquitination adapter, cell size determination,
      protein translocation, and amyloid formation.
- source: Alliance_Automated
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in several processes, including chaperone-mediated protein complex assembly; protein
    folding; and proteolysis involved in protein catabolic process. Located in cytosol
    and perinuclear region of cytoplasm. Part of TRC complex. Used to study Alzheimer's
    disease. Orthologous to several human genes including DNAJA2 (DnaJ heat shock
    protein family (Hsp40) member A2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005008
  source_id: SGD:S000005008
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; "ATPase activator activity" is appropriate for a J-domain protein.
    - rubric: utility
      score: 3
      notes: TRC complex and orthology are informative; core description is generic.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses Rsp5p adapter, cell size, HSP90 regulation, amyloid formation.
    - rubric: specificity
      score: 3
      notes: DNAJA2 orthology and TRC complex add specificity.
    overall_notes: GO-derived description. Correctly identifies ATPase activator activity
      and protein folding. TRC complex membership and DNAJA2 orthology add value.
- source: RefSeq
  text: Enables ATPase activator activity and unfolded protein binding activity. Involved
    in several processes, including protein folding; protein targeting; and proteolysis
    involved in protein catabolic process. Located in cytosol and perinuclear region
