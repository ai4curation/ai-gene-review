  review:
    summary: >-
      IBA annotation from phylogenetic inference. CRH1 is a GPI-anchored cell wall protein that
      is secreted and covalently attached to the outer cell wall. While "extracellular region" is
      not wrong for a secreted protein, the more specific and accurate term is "fungal-type cell
