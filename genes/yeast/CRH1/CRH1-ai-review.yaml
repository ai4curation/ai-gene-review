core_functions:
- description: >-
    CRH1 is a GPI-anchored chitin transglycosylase that cross-links chitin to glucan
    polymers in the yeast cell wall. It cleaves chitin donor chains and transfers them to
    beta(1-3)- and beta(1-6)-glucan acceptors via a retaining glycosyl transfer mechanism.
    This cross-linking activity is essential for cell wall integrity and is the primary
    evolved function of CRH1, operating at chitin-rich sites during polarized growth.
