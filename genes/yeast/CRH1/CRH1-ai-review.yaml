  label: Saccharomyces cerevisiae
description: >-
  CRH1 (Congo Red Hypersensitive protein 1) encodes a GPI-anchored cell wall transglycosylase
  of the GH16 family that cross-links chitin to both beta(1-3)- and beta(1-6)-glucan in the
  S. cerevisiae cell wall. The enzyme uses a retaining double-displacement mechanism: it cleaves
  a chitin donor chain and transfers it to glucan acceptors, thereby integrating chitin into the
  glucan network. CRH1 has a secondary weak endochitinase activity (EC 3.2.1.14) but its primary
  biological role is as a chitin transglycosylase (EC 2.4.-.-). The protein is GPI-anchored at the
  cell surface and concentrated at chitin-rich areas including the incipient bud site, septum, and
  bud scars. CRH1 acts redundantly with its paralog CRH2/UTR2; the double mutant completely lacks
  chitin-glucan cross-links and shows strong sensitivity to Congo Red and Calcofluor White. CRH1
  expression is cell-cycle regulated, induced during sporulation, and upregulated by the cell wall
  integrity pathway (MPK1/RLM1) in response to heat stress and cell wall damage. Present at
  approximately 44,000 wall-bound copies per cell in log phase.
