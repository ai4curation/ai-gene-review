suggested_questions:
- question: >-
    Is there a more specific GO term for chitin transglycosylase activity that could
    distinguish the primary transglycosylation function from the secondary endochitinase
    activity? Currently both activities are annotated under different parent terms
    (glycosyltransferase vs endochitinase), but there is no specific "chitin
    transglycosylase activity" term in GO.
- question: >-
    What is the relative in vivo contribution of the endochitinase activity versus the
    transglycosylase activity of CRH1? Is the chitinase activity biologically relevant
    or simply a side reaction of the GH16 catalytic mechanism?
suggested_experiments:
- hypothesis: >-
    CRH1 chitin transglycosylase activity may have distinct substrate preferences in
    different cell wall compartments (bud scar vs lateral wall vs septum).
  description: >-
    Use compartment-specific fluorescent chitin acceptors with conditional CRH1 expression
    to determine whether transglycosylation rates differ at different cell surface locations.
    Compare with CRH2 localization and activity patterns.
  experiment_type: fluorescence microscopy with functional assay
