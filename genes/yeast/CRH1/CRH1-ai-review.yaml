  - reference_id: PMID:23919454
    supporting_text: >-
      Both proteins act as chitin transglycosylases; they use soluble chitin derivatives,
      such as carboxymethyl chitin, glycol-chitin and/or N-acetyl chito-oligosaccharides of
      DP (degree of polymerization)≥5 as the oligoglycosyl donors, and oligosaccharides
      derived from chitin, β-(1,3)-glucan (laminarin) and β-(1,6)-glucan (pustulan),
      fluorescently labelled with sulforhodamine or FITC as acceptors
  - reference_id: PMID:19734368
    supporting_text: >-
      Crh1p and Crh2p catalyze the transfer of chitin to both beta(1-3)- and beta(1-6)glucan,
      and the biosynthetic mechanism for all chitin cross-links in the cell wall has been
      established
