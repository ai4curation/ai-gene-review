- id: PMID:10757808
  title: >-
    A novel family of cell wall-related proteins regulated differently during the yeast
    life cycle.
  findings:
  - statement: >-
      CRH1 and CRH2 encode a novel family of cell wall proteins with homology to
      beta-glucanases. Deletion causes Congo Red sensitivity. CRH1-GFP localizes to
      incipient bud site, septum, and ascospore envelopes.
    supporting_text: >-
      Crh1-green fluorescent protein was found at the incipient bud site, around the septum
      area in later stages of budding, and in ascospore envelopes...the alkali-soluble glucan
      fraction in the crh1Delta crh2Delta strain was almost twice the level in the wild-type
- id: PMID:15781460
  title: >-
    Comprehensive proteomic analysis of Saccharomyces cerevisiae cell walls: identification
    of proteins covalently attached via glycosylphosphatidylinositol remnants or mild
    alkali-sensitive linkages.
  findings:
  - statement: >-
      CRH1 identified as a GPI-modified cell wall protein by mass spectrometry of isolated
      cell walls.
    supporting_text: >-
      The identified proteins include 12 predicted glycosylphosphatidylinositol-modified CWPs
      ...seven of the identified proteins (Gas1p, Gas3p, Gas5p, Crh1p, Utr2p, Scw4p, and
      Scw10p) are classified as glycoside hydrolases
- id: PMID:17302808
  title: >-
    Crh1p and Crh2p are required for the cross-linking of chitin to beta(1-6)glucan in the
    Saccharomyces cerevisiae cell wall.
  findings:
  - statement: >-
      CRH1 and CRH2 are required for chitin-beta(1-6)glucan cross-links. Double mutant
      completely lacks these cross-links. Heat stress increases cross-linking and CRH1
      expression via cell integrity pathway.
    supporting_text: >-
      chitin linked to beta(1-6)glucan is diminished in mutants of the CRH1 or the CRH2/UTR2
      gene and completely absent in a double mutant...Crh1p and Crh2p are the first proteins
      directly implicated in the formation of cross-links between cell wall components in fungi
- id: PMID:18694928
  title: >-
    Assembly of the yeast cell wall. Crh1p and Crh2p act as transglycosylases in vivo and
    in vitro.
  findings:
  - statement: >-
      CRH1 and CRH2 act as transglycosylases in vivo and in vitro, transferring chitin chains
      to beta(1-6)glucan. High activity at bud scars. Demonstrated using fluorescent acceptors
      in intact cells, permeabilized cells, and isolated cell walls.
    supporting_text: >-
      the Crh proteins act by transferring chitin chains to beta(1-6)glucan, with a newly
      observed high activity in the bud scar. The importance of transglycosylation for cell
      wall assembly is thus firmly established
- id: PMID:19734368
  title: >-
    Two novel techniques for determination of polysaccharide cross-links show that Crh1p and
    Crh2p attach chitin to both beta(1-6)- and beta(1-3)glucan in the Saccharomyces cerevisiae
    cell wall.
  findings:
  - statement: >-
      CRH1 and CRH2 catalyze transfer of chitin to both beta(1-3)- and beta(1-6)-glucan.
      All chitin in crh1/crh2 double mutant is free (unlinked). Previous apparent residual
      beta(1-3)glucan-linked chitin was an artifact of chitinase contamination in zymolyase.
    supporting_text: >-
      Crh1p and Crh2p catalyze the transfer of chitin to both beta(1-3)- and beta(1-6)glucan,
      and the biosynthetic mechanism for all chitin cross-links in the cell wall has been
      established
- id: PMID:23919454
  title: >-
    A novel fluorescence assay and catalytic properties of Crh1 and Crh2 yeast cell wall
    transglycosylases.
  findings:
  - statement: >-
      Heterologously expressed CRH1 and CRH2 act as chitin transglycosylases. Both also have
      weak endochitinase activity. pH optimum 3.5, temperature optimum 37C. Minimal acceptor
      requires 2 hexopyranose units.
    supporting_text: >-
      Both proteins act as chitin transglycosylases; they use soluble chitin derivatives, such
      as carboxymethyl chitin, glycol-chitin and/or N-acetyl chito-oligosaccharides of
      DP (degree of polymerization)≥5 as the oligoglycosyl donors...Both proteins exhibited
      a weak chitinolytic activity
