gene_symbol: SAS2
organism: yeast
uniprot_id: P40963
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Histone acetyltransferase (HAT) subunit of the SAS complex, a multiprotein
    complex that acetylates 'Lys-16' of histone H4 and 'Lys- 14' of histone H3. The
    SAS complex is however unable to acetylate nucleosomal histones. The complex is
    involved in transcriptional silencing at telomeres and at HML locus. Also involved
    in rDNA silencing and G0 control.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40963
  source_id: P40963
- source: Alliance
  text: Histone acetyltransferase (HAT) catalytic subunit of the SAS complex; acetylates
    free histones and nucleosomes and regulates transcriptional silencing; member
    of the MYSTacetyltransferase family; other members are Sas4p and Sas5p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004734
  source_id: SGD:S000004734
- source: Alliance
  text: Enables histone acetyltransferase activity. Involved in silent mating-type
    cassette heterochromatin formation and subtelomeric heterochromatin formation.
    Located in chromatin. Part of SAS acetyltransferase complex. Orthologous to human
    KAT8 (lysine acetyltransferase 8).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004734
  source_id: SGD:S000004734
- source: RefSeq
  text: Enables histone acetyltransferase activity. Involved in silent mating-type
    cassette heterochromatin formation and subtelomeric heterochromatin formation.
    Located in chromatin. Part of SAS acetyltransferase complex. Orthologous to human
    KAT8 (lysine acetyltransferase 8). [provided by Alliance of Genome Resources,
