descriptions:
- source: Alliance_Imported
  text: ATPase involved in protein folding and the response to stress; plays a role
    in SRP-dependent cotranslational protein-membrane targeting and translocation;
    member of the heat shock protein 70 (HSP70) family; localized to the cytoplasm;
    SSA3 has a paralog, SSA4, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000171
  source_id: SGD:S000000171
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 4
      notes: Good overview; conveys stress-responsiveness and key functions.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 4
      notes: Covers core functions and paralogy. Could mention stress induction conditions
        more specifically.
    - rubric: specificity
      score: 4
      notes: Names SRP-dependent pathway and SSA4 paralog.
    overall_notes: Good overview of SSA3 as a stress-responsive HSP70. Covers ATPase
      function, protein folding, SRP-dependent targeting, cytoplasmic localization,
      and SSA4 paralogy.
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in SRP-dependent cotranslational protein targeting to membrane, translocation;
    protein folding; and protein quality control for misfolded or incompletely synthesized
    proteins. Located in cytosol. Human ortholog(s) of this gene implicated in several
    diseases, including Kawasaki disease; artery disease (multiple); autoimmune disease
    of musculoskeletal system (multiple); neurodegenerative disease (multiple); and
    schizophrenia (multiple). Orthologous to several human genes including HSPA1L
    (heat shock protein family A (Hsp70) member 1 like); HSPA1A (heat shock protein
    family A (Hsp70) member 1A); and HSPA1B (heat shock protein family A (Hsp70) member
    1B).
  source_type: automated
