gene_symbol: LSM1
organism: yeast
uniprot_id: P47017
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the cytoplasmic LSM1-LSM7 complex which is involved in mRNA degradation
    by activating the decapping step (PubMed:10747033, PubMed:10913177, PubMed:10761922,
    PubMed:24513854). Together with PAT1, the LSM1-LSM7 complex binds to osmotic stress-
    activated mRNAs to attenuate the osmotic stress response, probably by limiting
    ribosome access to the mRNA and consequently translation (PubMed:30059503).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P47017
  source_id: P47017
- source: Alliance_Imported
  text: Lsm (Like Sm) protein; forms heteroheptameric complex (with Lsm2p, Lsm3p,
    Lsm4p, Lsm5p, Lsm6p, and Lsm7p) involved in degradation of cytoplasmic mRNAs;
    also enters the nucleus and positively regulates transcription initiation; unlike
    most Sm-like proteins, Lsm1p requires both its SM-domain and C-terminal domain
    for RNA-binding; binds to mRNAs under glucose starvation, most often in the 3'
    UTR; forms cytoplasmic foci upon DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003660
  source_id: SGD:S000003660
- source: Alliance_Automated
  text: Enables chromatin binding activity and mRNA binding activity. Involved in
    deadenylation-dependent decapping of nuclear-transcribed mRNA. Located in P-body
    and nucleus. Part of Lsm1-7-Pat1 complex. Orthologous to human LSM1 (LSM1 homolog,
    mRNA degradation associated).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003660
  source_id: SGD:S000003660
