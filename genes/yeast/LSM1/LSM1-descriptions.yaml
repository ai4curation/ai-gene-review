      notes: Best single source for understanding LSM1.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized.
    - rubric: completeness
      score: 5
      notes: Covers complex members, cytoplasmic and nuclear roles, RNA-binding, starvation
        response, and stress foci.
    - rubric: specificity
