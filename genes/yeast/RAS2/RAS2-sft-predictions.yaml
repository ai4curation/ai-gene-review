description: >-
  BioReason-Pro SFT predictions for RAS2 (yeast). 15 GO terms extracted from HF
  protein_catalogue. Reviewed against the local AIGR reference: 11 terms are CNN,
  activation of adenylate cyclase is COR, the Cvt direct-process term is LSP, an
  embryonic-development ID paired with a carbon-catabolite label is NPI, and generic
  protein binding is REP. Notably, the SFT GO predictions capture
  the cAMP/PKA signaling biology that the RL narrative completely missed (2/5 correctness).
