  predicted_term:
    id: GO:0007190
    label: activation of adenylate cyclase activity
  predicted_term_type: GO_BP
  review:
    assessment: COR
    confidence_score: 2
    summary: >-
      NOT in GOA. Genuinely novel and correct. This is arguably the single most
      important biological function of RAS2: RAS2-GTP directly binds and activates
      adenylate cyclase (CYR1/CDC35), increasing cAMP levels and triggering the
      PKA pathway. The curated review describes this as the primary effector mechanism.
      This prediction captures the core biology that the RL narrative (2/5 correctness)
      completely missed (it described vesicle trafficking instead). A notable success
      for the SFT GO prediction pipeline.
