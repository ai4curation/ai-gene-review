description: >-
  BioReason-Pro SFT predictions for RAS2 (yeast). 15 GO terms extracted from HF
  protein_catalogue. Reviewed against curated AIGR review. 12/15 match GOA (CNN);
  1 is a genuinely novel correct prediction (GO:0007190 activation of adenylate cyclase
  activity); 2 reproduce GOA directional errors (autophagy and Cvt annotated without
  negative-regulation polarity); 1 uncertain. Notably, the SFT GO predictions capture
  the cAMP/PKA signaling biology that the RL narrative completely missed (2/5 correctness).
