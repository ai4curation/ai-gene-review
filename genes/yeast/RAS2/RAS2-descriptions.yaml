descriptions:
- source: UniProt
  text: The S.cerevisiae Ras proteins modulate the activity of the adenylate cyclase
    catalytic subunit and therefore affect the biosynthesis of cyclic-AMP.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P01120
  source_id: P01120
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but incomplete; Ras2 has broader signaling roles.
    - rubric: utility
      score: 2
      notes: Too narrow to capture the full breadth of RAS2 function.
    - rubric: compactness
      score: 5
      notes: Very concise.
    - rubric: completeness
      score: 1
      notes: Misses filamentous growth, sporulation, starvation response, and lipid
        modifications.
    - rubric: specificity
      score: 3
      notes: Mentions adenylate cyclase specifically but misses other pathways.
    overall_notes: Minimal UniProt description focusing only on adenylate cyclase
      modulation.
- source: Alliance_Imported
  text: GTP-binding protein; regulates nitrogen starvation response, sporulation,
    and filamentous growth; farnesylation and palmitoylation required for activity
    and localization to plasma membrane; activated by increased levels of glycolysis
    intermediate fructose-1,6-bisphosphate; homolog of mammalian Ras proto-oncogenes;
    RAS2 has a paralog, RAS1, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005042
  source_id: SGD:S000005042
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and comprehensive.
    - rubric: utility
      score: 5
      notes: Highly informative about multiple signaling roles.
    - rubric: compactness
      score: 3
      notes: Dense but necessary.
    - rubric: completeness
      score: 5
      notes: Covers GTP binding, starvation, sporulation, filamentous growth, lipid
        modifications, and paralog.
    - rubric: specificity
      score: 5
      notes: Names specific metabolites (fructose-1,6-bisphosphate) and modifications.
    overall_notes: Comprehensive curated description of signaling and regulatory roles.
- source: Alliance_Automated
  text: Enables GTP binding activity and GTPase activity. Involved in several processes,
    including cytoplasm to vacuole targeting by the Cvt pathway; positive regulation
    of transcription by galactose; and protein localization to bud neck. Located in
    several cellular components, including endoplasmic reticulum membrane; mitochondrion;
    and nucleus. Used to study colorectal cancer. Human ortholog(s) of this gene implicated
    in Noonan syndrome 12 and colorectal cancer. Orthologous to human RRAS2 (RAS related
    2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005042
  source_id: SGD:S000005042
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: GO terms are correct but the selection is eclectic (Cvt pathway, bud
        neck).
    - rubric: utility
      score: 2
      notes: Low utility due to unfocused selection of processes.
    - rubric: compactness
      score: 3
      notes: Moderately verbose.
    - rubric: completeness
      score: 2
      notes: Misses the core cAMP-PKA signaling pathway.
    - rubric: specificity
      score: 2
      notes: Generic and eclectic GO terms.
    overall_notes: GO-derived automated with diverse but unfocused processes.
