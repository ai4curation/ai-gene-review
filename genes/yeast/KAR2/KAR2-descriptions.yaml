gene_symbol: KAR2
organism: yeast
uniprot_id: P16474
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Probably plays a role in facilitating the assembly of multimeric protein complexes
    inside the ER. Is required for secretory polypeptide translocation. May physically
    associate with SEC63 protein in the endoplasmic reticulum and this interaction
    may be regulated by ATP hydrolysis.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P16474
  source_id: P16474
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Content is correct but hedging is inappropriate for this well-characterized
        gene.
    - rubric: utility
      score: 2
      notes: Vague; does not identify KAR2 as the yeast BiP/Hsp70 homolog.
    - rubric: compactness
      score: 4
      notes: Brief but too brief.
    - rubric: completeness
      score: 2
      notes: Misses Hsp70 identity, UPR regulation via Ire1p, chaperone function,
        and protein folding role.
    - rubric: specificity
      score: 3
      notes: Mentions SEC63 interaction and ATP hydrolysis but lacks Hsp70 family
        context.
    overall_notes: Hedged and outdated. Uses 'Probably' and 'May' despite KAR2/BiP
      being one of the best-characterized ER chaperones.
- source: Alliance_Imported
  text: ATPase involved in protein import into the ER; also acts as a chaperone to
    mediate protein folding in the ER and may play a role in ER export of soluble
    proteins; regulates the unfolded protein response via interaction with Ire1p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003571
  source_id: SGD:S000003571
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and current.
    - rubric: utility
      score: 5
      notes: Conveys the key roles of KAR2 in ER biology.
    - rubric: compactness
      score: 5
      notes: Three concise clauses.
    - rubric: completeness
      score: 4
      notes: Covers import, folding, export, and UPR. Could mention Hsp70 family and
        Sec63 interaction.
    - rubric: specificity
      score: 5
      notes: Names Ire1p, ER lumen, and specific processes.
    overall_notes: Good SGD description. Identifies KAR2 as an ATPase involved in
      ER import, folding, export, and UPR regulation via Ire1p.
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity; protein-transporting ATPase activity; and
    unfolded protein binding activity. Involved in several processes, including fungal-type
    cell wall beta-glucan biosynthetic process; intracellular protein transmembrane
    transport; and karyogamy involved in conjugation with cellular fusion. Located
    in endoplasmic reticulum. Part of luminal surveillance complex. Human ortholog(s)
    of this gene implicated in dopamine beta-hydroxylase deficiency. Orthologous to
    human HSPA5 (heat shock protein family A (Hsp70) member 5).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003571
  source_id: SGD:S000003571
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate GO terms; beta-glucan biosynthesis is a downstream effect.
    - rubric: utility
      score: 2
      notes: Tangential processes obscure core ER chaperone function.
    - rubric: compactness
      score: 3
      notes: Standard length.
    - rubric: completeness
      score: 3
      notes: Has ATPase, transport, and localization but includes tangential terms.
    - rubric: specificity
      score: 3
      notes: Protein-transporting ATPase is specific; karyogamy is relevant but secondary.
    overall_notes: GO-derived description. Includes some useful terms but diluted
      with tangential processes (cell wall, beta-glucan).
- source: RefSeq
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in several processes, including fungal-type cell wall beta-glucan biosynthetic
    process; intracellular protein transmembrane transport; and karyogamy involved
    in conjugation with cellular fusion. Located in endoplasmic reticulum. Part of
    luminal surveillance complex. Human ortholog(s) of this gene implicated in dopamine
    beta-hydroxylase deficiency. Orthologous to human HSPA5 (heat shock protein family
    A (Hsp70) member 5). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/853418
  source_id: GeneID:853418
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate but less specific.
    - rubric: utility
      score: 2
      notes: Same dilution issues as Alliance_Automated.
    - rubric: compactness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Loses protein-transporting ATPase detail.
    - rubric: specificity
      score: 2
      notes: More generic than Alliance_Automated.
    overall_notes: Similar to Alliance_Automated but drops protein-transporting ATPase
      activity. Less informative.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Agreement on ER chaperone function but quality varies dramatically. UniProt
      is hedged; SGD is clear; automated descriptions are diluted.
  overall_notes: 'UniProt is disappointingly hedged for one of the best-characterized
    ER chaperones. Alliance_Imported (SGD) provides the best description with clear
    roles in ER import, folding, export, and UPR regulation. Automated descriptions
    are diluted with tangential GO terms. Best source: Alliance_Imported.'
