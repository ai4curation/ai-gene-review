taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Catalytic component of the RPD3C(S) histone deacetylase complex responsible
    for the deacetylation of lysine residues on the N- terminal part of the core histones
    (H2A, H2B, H3 and H4). Histone deacetylation gives a tag for epigenetic repression
    and plays an important role in transcriptional regulation, cell cycle progression,
    DNA damage response, osmotic stress response and developmental events.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04779
  source_id: Q04779
- source: Alliance
