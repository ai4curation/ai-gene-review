gene_symbol: RCO1
organism: yeast
uniprot_id: Q04779
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Catalytic component of the RPD3C(S) histone deacetylase complex responsible
    for the deacetylation of lysine residues on the N- terminal part of the core histones
    (H2A, H2B, H3 and H4). Histone deacetylation gives a tag for epigenetic repression
    and plays an important role in transcriptional regulation, cell cycle progression,
    DNA damage response, osmotic stress response and developmental events.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04779
  source_id: Q04779
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Misleadingly attributes catalytic activity to RCO1; RPD3 is the deacetylase.
    - rubric: utility
      score: 3
      notes: Useful description of the complex function but misattributes the role.
    - rubric: compactness
      score: 3
      notes: Moderate length.
    - rubric: completeness
      score: 3
      notes: Describes complex function well but not RCO1-specific contribution.
    - rubric: specificity
      score: 3
      notes: Specific about histone targets and biological roles.
    overall_notes: Describes RPD3C(S) complex function; RCO1 is not the catalytic
      component.
- source: Alliance_Imported
  text: Essential component of the Rpd3S histone deacetylase complex; interacts with
    Eaf3p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004680
  source_id: SGD:S000004680
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurately identifies RCO1 as an essential component, not the catalytic
        subunit.
    - rubric: utility
      score: 3
      notes: Brief; limited utility beyond identifying the complex.
    - rubric: compactness
      score: 5
      notes: Very concise.
    - rubric: completeness
      score: 2
      notes: Only mentions Eaf3p interaction; misses chromodomain reading and Sin3
        bridging.
    - rubric: specificity
      score: 3
      notes: Mentions specific interactor Eaf3p.
    overall_notes: Brief but accurate description as essential Rpd3S component.
- source: Alliance_Automated
  text: Predicted to enable zinc ion binding activity. Involved in regulation of nucleobase-containing
    compound metabolic process and transcription elongation by RNA polymerase II.
    Located in nucleus. Part of Rpd3S complex.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004680
  source_id: SGD:S000004680
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Zinc ion binding is predicted, not experimentally verified for RCO1.
    - rubric: utility
      score: 2
      notes: Limited utility.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 2
      notes: Missing the bridging function between Rpd3 and chromatin.
    - rubric: specificity
      score: 2
      notes: Generic GO terms.
    overall_notes: GO-derived automated description.
- source: RefSeq
  text: Predicted to enable zinc ion binding activity. Involved in regulation of nucleobase-containing
    compound metabolic process and transcription elongation by RNA polymerase II.
    Located in nucleus. Part of Rpd3S complex. [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/855097
  source_id: GeneID:855097
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 2
      notes: Redundant.
    - rubric: compactness
      score: 4
      notes: Same.
    - rubric: completeness
      score: 2
      notes: Same gaps.
    - rubric: specificity
      score: 2
      notes: Same.
    overall_notes: Near-duplicate of Alliance_Automated.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Moderate concordance; UniProt misattributes catalytic role. All sources
      incomplete on the scaffolding function.
  overall_notes: UniProt misleadingly describes RCO1 as catalytic. Alliance_Imported
    is accurate but brief. Both curated sources could better describe the bridging/scaffolding
    role.
