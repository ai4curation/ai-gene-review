    notes: Good agreement on deubiquitinase and ribophagy roles. SGD adds substantially
      more recent functional detail than UniProt.
  overall_notes: SGD curated is the best source, covering the full breadth of UBP3
    functions including recent RQC and signaling discoveries. UniProt is accurate
    but somewhat dated. Automated sources capture the core deubiquitinase identity
