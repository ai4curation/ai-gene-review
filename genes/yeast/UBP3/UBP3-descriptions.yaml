      notes: Accurate for the functions described.
    - rubric: utility
      score: 4
      notes: Good coverage of multiple roles; misses more recently discovered functions.
    - rubric: compactness
      score: 3
      notes: Moderately long.
    - rubric: completeness
      score: 3
      notes: Misses K48/K63 chain cleavage from Rps20p for RQC, Hog1p phosphorylation,
        Ira2p/Ras inhibition.
    - rubric: specificity
      score: 4
      notes: Names SEC23, BRE5, SIR4 and specific enzymatic mechanism.
    overall_notes: Good description covering isopeptidase activity, SIR4 silencing
      regulation, SEC23 ubiquitination via BRE5, and ribophagy role. Somewhat dated;
      misses newer RQC and Hog1p functions.
- source: Alliance_Imported
  text: Ub-specific protease; Ubp3p-Bre5p complex subunit that mediates retention
    of Golgi membrane proteins; deubiquitinates Sec23p and Sec27p with Bre5p, regulating
    Golgi-ER retrograde transport; cleaves K48-linked di-Ub and K48/K63 mixed-linkage
    polyUb chains from Rps20p on translating ribosomes to enhance RQC; phosphorylated
    by Hog1p to regulate the osmotic stress response; inhibits Ras/PKA signaling through
    Ira2p; role in ribophagy; protein abundance increases in response to DNA replication
    stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000953
  source_id: SGD:S000000953
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and up-to-date with recent RQC and signaling discoveries.
    - rubric: utility
      score: 5
      notes: Comprehensive view of the pleiotropic deubiquitinase functions.
    - rubric: compactness
      score: 3
      notes: Long but information-dense.
    - rubric: completeness
      score: 5
      notes: Covers Golgi, RQC, osmotic stress, Ras signaling, and ribophagy roles.
    - rubric: specificity
      score: 5
      notes: Names specific substrates (Sec23p, Sec27p, Rps20p), linkage types (K48,
        K63), and regulators (Hog1p, Ira2p).
    overall_notes: Excellent comprehensive description. Covers Golgi retention, Sec23p/Sec27p
      deubiquitination, K48/K63 mixed-linkage chain cleavage on Rps20p for RQC, Hog1p
      osmotic stress, Ira2p/Ras signaling, and ribophagy.
- source: Alliance_Automated
  text: Enables cysteine-type deubiquitinase activity and mRNA binding activity. Involved
    in several processes, including protein retention in Golgi apparatus; ribophagy;
    and stress granule assembly. Located in cytosol and mitochondrion. Part of Ubp3-Bre5
    deubiquitination complex. Orthologous to human USP10 (ubiquitin specific peptidase
    10).
