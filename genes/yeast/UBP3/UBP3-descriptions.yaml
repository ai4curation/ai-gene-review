gene_symbol: UBP3
organism: yeast
uniprot_id: Q01477
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Has an ATP-independent isopeptidase activity, cleaving at the C-terminus of
    the ubiquitin moiety in natural or engineered linear fusion proteins, irrespective
    of their size or the presence of an N- terminal extension to ubiquitin (PubMed:12778054,
    PubMed:17632125). Plays a role in regulation of silencing by interacting with
    SIR4 (PubMed:8752220). Also, in conjunction with BRE5, cleaves ubiquitin, leading
    to the subsequent mono-ubiquitination of SEC23 (PubMed:12778054). Required for
    ribophagy, a process which relocalizes ribosomal particles into the vacuole for
    degradation in response to starvation (PubMed:20508643).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q01477
  source_id: Q01477
- source: Alliance
  text: Ub-specific protease; Ubp3p-Bre5p complex subunit that mediates retention
    of Golgi membrane proteins; deubiquitinates Sec23p and Sec27p with Bre5p, regulating
    Golgi-ER retrograde transport; cleaves K48-linked di-Ub and K48/K63 mixed-linkage
    polyUb chains from Rps20p on translating ribosomes to enhance RQC; phosphorylated
    by Hog1p to regulate the osmotic stress response; inhibits Ras/PKA signaling through
    Ira2p; role in ribophagy; protein abundance increases in response to DNA replication
    stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000953
  source_id: SGD:S000000953
- source: Alliance
  text: Enables cysteine-type deubiquitinase activity and mRNA binding activity. Involved
    in several processes, including protein retention in Golgi apparatus; ribophagy;
    and stress granule assembly. Located in cytosol and mitochondrion. Part of Ubp3-Bre5
    deubiquitination complex. Orthologous to human USP10 (ubiquitin specific peptidase
    10).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000953
  source_id: SGD:S000000953
- source: RefSeq
  text: Enables cysteine-type deubiquitinase activity and mRNA binding activity. Involved
    in several processes, including protein retention in Golgi apparatus; regulation
    of ER to Golgi vesicle-mediated transport; and ribophagy. Located in cytoplasm.
    Part of Ubp3-Bre5 deubiquitination complex. Orthologous to human USP10 (ubiquitin
    specific peptidase 10). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856895
  source_id: GeneID:856895
