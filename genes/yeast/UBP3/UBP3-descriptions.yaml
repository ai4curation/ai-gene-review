descriptions:
- source: UniProt
  text: Has an ATP-independent isopeptidase activity, cleaving at the C-terminus of
    the ubiquitin moiety in natural or engineered linear fusion proteins, irrespective
    of their size or the presence of an N- terminal extension to ubiquitin (PubMed:12778054,
    PubMed:17632125). Plays a role in regulation of silencing by interacting with
    SIR4 (PubMed:8752220). Also, in conjunction with BRE5, cleaves ubiquitin, leading
    to the subsequent mono-ubiquitination of SEC23 (PubMed:12778054). Required for
    ribophagy, a process which relocalizes ribosomal particles into the vacuole for
    degradation in response to starvation (PubMed:20508643).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q01477
  source_id: Q01477
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
