gene_symbol: EUG1
organism: yeast
uniprot_id: P32474
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Probably interacts with nascent polypeptides in the endoplasmic reticulum.
    It is an essential gene only in the absence of PDI. Its native disulfide isomerase
    activity is very low.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32474
  source_id: P32474
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but somewhat vague about EUG1 own activity.
    - rubric: utility
      score: 3
      notes: Understanding EUG1 requires knowing its PDI context.
    - rubric: compactness
      score: 4
      notes: Brief.
    - rubric: completeness
      score: 3
      notes: Misses ER lumen localization, PDI family membership, and paralog info.
    - rubric: specificity
      score: 3
      notes: Mentions low disulfide isomerase activity but vague on "interacts with
        nascent polypeptides."
    overall_notes: Accurate but focuses on relationship with PDI rather than EUG1
      intrinsic function.
- source: Alliance_Imported
  text: Protein disulfide isomerase of the endoplasmic reticulum lumen; EUG1 has a
    paralog, PDI1, that arose from the whole genome duplication; function overlaps
    with that of Pdi1p; may interact with nascent polypeptides in the ER
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002926
  source_id: SGD:S000002926
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Accurate: PDI of ER lumen with functional overlap with Pdi1p.'
    - rubric: utility
      score: 5
      notes: Informative about identity, localization, and paralog relationship.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 4
      notes: Covers identity, localization, paralog, and functional overlap.
    - rubric: specificity
      score: 5
      notes: 'Specific: PDI family, PDI1 paralog, whole genome duplication.'
    overall_notes: 'Best source: covers PDI identity, ER lumen, paralog PDI1, and
      functional overlap.'
- source: Alliance_Automated
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
    (glutathione) activity; and unfolded protein binding activity. Involved in protein
    folding. Located in endoplasmic reticulum. Human ortholog(s) of this gene implicated
    in Cole-Carpenter syndrome and autoimmune hepatitis. Orthologous to several human
    genes including PDIA3 (protein disulfide isomerase family A member 3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002926
  source_id: SGD:S000002926
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct GO annotations; human disease associations are for orthologs.
    - rubric: utility
      score: 3
      notes: Formulaic GO listing.
    - rubric: compactness
      score: 3
      notes: Moderate boilerplate.
    - rubric: completeness
      score: 3
      notes: Covers MF, BP, CC; human disease info not relevant.
    - rubric: specificity
      score: 3
      notes: GO terms; generic structure.
    overall_notes: GO-derived listing; covers PDI activity and ER localization.
- source: RefSeq
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
