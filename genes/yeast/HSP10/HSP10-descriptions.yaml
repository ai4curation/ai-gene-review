gene_symbol: HSP10
organism: yeast
uniprot_id: P38910
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Eukaryotic CPN10 homolog which is essential for mitochondrial protein biogenesis,
    together with CPN60. Binds to CPN60 in the presence of Mg-ATP and suppresses the
    ATPase activity of the latter.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38910
  source_id: P38910
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Accurate: essential co-chaperonin, binds CPN60 with Mg-ATP, suppresses
        ATPase.'
    - rubric: utility
      score: 4
      notes: Conveys the key mechanistic relationship with Hsp60p.
    - rubric: compactness
      score: 5
      notes: Two concise sentences.
    - rubric: completeness
      score: 3
      notes: Misses mitochondrial matrix localization, protein folding/sorting role,
        and heat shock context.
    - rubric: specificity
      score: 4
      notes: Names CPN60 partner and Mg-ATP requirement; lacks yeast-specific gene
        names.
    overall_notes: Good curated description covering co-chaperonin role with CPN60/Hsp60p
      and ATPase suppression. Uses older CPN10/CPN60 nomenclature rather than yeast
      gene names.
- source: Alliance_Imported
  text: Mitochondrial matrix co-chaperonin; inhibits the ATPase activity of Hsp60p,
    a mitochondrial chaperonin; involved in protein folding and sorting in the mitochondria;
    10 kD heat shock protein with similarity to E. coli groES
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005546
  source_id: SGD:S000005546
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims are accurate.
    - rubric: utility
      score: 5
      notes: Immediately conveys function, localization, and evolutionary context.
    - rubric: compactness
      score: 5
      notes: Packed with information in a single sentence with semicolons.
    - rubric: completeness
      score: 5
      notes: Covers localization, ATPase inhibition, folding/sorting, and homology.
    - rubric: specificity
      score: 5
      notes: Names Hsp60p, mitochondrial matrix, groES homology.
    overall_notes: Excellent SGD description. Identifies it as a co-chaperonin in
      the mitochondrial matrix, names Hsp60p, and covers protein folding and sorting
      roles. Mentions groES similarity.
- source: Alliance_Automated
  text: Enables protein-folding chaperone binding activity and unfolded protein binding
    activity. Involved in chaperone-mediated protein complex assembly; protein import
    into mitochondrial intermembrane space; and protein refolding. Located in mitochondrial
    matrix. Orthologous to human HSPE1 (heat shock protein family E (Hsp10) member
    1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005546
  source_id: SGD:S000005546
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate GO terms, though listing activities separately obscures the
        co-chaperonin mechanism.
    - rubric: utility
      score: 2
      notes: Boilerplate GO sentence structure; does not convey mechanism.
    - rubric: compactness
      score: 3
      notes: Verbose for the information content delivered.
    - rubric: completeness
      score: 3
      notes: Covers binding, folding, import, and localization but misses the Hsp60p
        partnership.
    - rubric: specificity
      score: 2
      notes: Generic GO term listing; no partner names or mechanistic detail.
    overall_notes: GO-derived boilerplate. Correct but generic; lists GO terms without
      explaining the mechanistic relationship.
- source: RefSeq
  text: Enables protein-folding chaperone binding activity and unfolded protein binding
    activity. Involved in chaperone-mediated protein complex assembly; protein import
    into mitochondrial intermembrane space; and protein refolding. Located in mitochondrial
    matrix. Orthologous to human HSPE1 (heat shock protein family E (Hsp10) member
    1). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/854185
  source_id: GeneID:854185
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 2
      notes: Duplicates Alliance_Automated content.
    - rubric: compactness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 2
      notes: Same as Alliance_Automated.
    overall_notes: Nearly identical to Alliance_Automated with attribution tag. Same
      limitations apply.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: All sources agree on chaperonin function and mitochondrial localization.
      Quality gap between curated (excellent) and automated (generic).
  overall_notes: 'Strong concordance on core function as a mitochondrial co-chaperonin
    that works with Hsp60p. Alliance_Imported (SGD) is the best single description,
    combining localization, mechanism, and homology. UniProt is accurate but uses
    older nomenclature. Automated descriptions are correct but fail to convey the
    cooperative chaperonin mechanism. Best source: Alliance_Imported.'
