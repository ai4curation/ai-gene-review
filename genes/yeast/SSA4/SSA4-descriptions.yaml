descriptions:
- source: Alliance_Imported
  text: Heat shock protein that is highly induced upon stress; plays a role in SRP-dependent
    cotranslational protein-membrane targeting and translocation; translocates to
    the nucleus under Cd2+ stress to mediate tolerance by regulating VHS1 expression;
    cytoplasmic protein that concentrates in nuclei upon starvation; member of the
    HSP70 family; SSA4 has a paralog, SSA3, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000905
  source_id: SGD:S000000905
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 5
      notes: Conveys SSA4-specific biology (Cd2+ response, VHS1 regulation, starvation
        behavior).
    - rubric: compactness
      score: 4
      notes: Dense but informative.
    - rubric: completeness
      score: 5
      notes: Covers stress induction, SRP targeting, Cd2+ nuclear translocation, VHS1
        regulation, starvation, paralogy.
    - rubric: specificity
      score: 5
      notes: Names specific stress conditions (Cd2+, starvation), target gene (VHS1),
        and paralog (SSA3).
    overall_notes: Good description of SSA4 as a stress-induced HSP70. Unique details
      include nuclear translocation under Cd2+ stress for VHS1 regulation, starvation-induced
      nuclear concentration, and SRP-dependent targeting.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in SRP-dependent cotranslational
    protein targeting to membrane, translocation and protein folding. Located in cytoplasm
    and nucleus. Human ortholog(s) of this gene implicated in several diseases, including
    Kawasaki disease; artery disease (multiple); autoimmune disease of musculoskeletal
    system (multiple); neurodegenerative disease (multiple); and schizophrenia (multiple).
    Orthologous to several human genes including HSPA1L (heat shock protein family
    A (Hsp70) member 1 like); HSPA1A (heat shock protein family A (Hsp70) member 1A);
    and HSPA1B (heat shock protein family A (Hsp70) member 1B).
  source_type: automated
