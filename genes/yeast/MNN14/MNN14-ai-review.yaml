knowledge_gaps:
  - gap_statement: >-
      The molecular function of MNN14 is undetermined. It is not known whether
      MNN14 is itself a catalytic transferase (e.g. a mannosylphosphate
      transferase) or, like its paralog MNN4, a positive regulator/activator of
      the mannosylphosphate transferase. No enzymatic or biochemical assay of
      MNN14 has been reported.
    boundary: >-
      What is firmly established: MNN14 is a Golgi type II membrane protein of
      the MNN4 family (LicD/fukutin-related nucleotidyltransferase fold; Pfam
      PF04991; InterPro IPR007074/IPR009644) that carries a conserved DXD motif
      (residues 498-500, by similarity to MNN4/P36044) and is genetically
      required, redundantly with MNN4, for N-glycan mannosylphosphorylation. In
      yeast the catalytic mannosylphosphate transferase is Mnn6/Ktr6 and MNN4 is
      its positive regulator; MNN4's curated molecular function is enzyme
      activator activity (GO:0008047).
    gap_kind:
      - BIOLOGY
    dark_aspect: MF_DARK
    status: OPEN
    significance: >-
      Whether MNN14 catalyzes mannosylphosphate transfer or activates the enzyme
      that does determines the correct GO molecular-function term (GO:0000031
      mannosylphosphate transferase activity vs GO:0008047 enzyme activator
      activity) and clarifies how the MNN4/MNN14 pair controls this
      fungal-specific glycan modification, which is a target for yeast
      glyco-engineering.
    resolution: >-
      In-vitro mannosylphosphate transferase assay on recombinant MNN14 (with
      GDP-mannose and defined mannan acceptors), a DXD-motif catalytic mutant to
      test whether the motif is required for catalysis versus a structural/
      regulatory role, and reconstitution/co-purification tests of whether MNN14
      stimulates Mnn6/Ktr6 activity as MNN4 does.
    provenance:
      - reference_id: UniProt:P40355
        supporting_text: "could be an indication that MNN14 has transferase activity"
      - reference_id: PMID:28101612
        supporting_text: "an MNN4 paralog with unknown function"
      - reference_id: PMID:9459307
        supporting_text: "Mannosylphosphate transfer to cell wall mannan is regulated by the transcriptional level of the MNN4 gene"
  - gap_statement: >-
      The direct molecular substrate and the exact reaction step of MNN14 are
      unknown: which glycan/mannan position it acts on, and whether it transfers
      mannose-1-phosphate at all or contributes only indirectly to the
      mannosylphosphorylation reaction.
    boundary: >-
      It is established at the pathway level that MNN14 activity is required for
      N-glycan mannosylphosphorylation and that N-glycan mannosylphosphorylation
      is abolished only when both MNN4 and MNN14 are deleted; the readout is the
      N-glycan mannosylphosphate profile of cell-wall mannoproteins and secreted
      glycoprotein, not a defined enzymatic step assigned to MNN14.
    gap_kind:
      - BIOLOGY
    dark_aspect: MF_DARK
    status: OPEN
    significance: >-
      Identifying the acceptor and the precise step would convert a genetic
      pathway placement into a defined, curatable molecular reaction and would
      resolve whether MNN4 and MNN14 act on the same or different acceptor
      positions.
    resolution: >-
      Structural mannan/N-glycan analysis (e.g. by mass spectrometry) of defined
      acceptors in wild-type versus mnn14 single and mnn4 mnn14 double mutants,
      combined with in-vitro reactions on candidate acceptor substrates.
    provenance:
      - reference_id: PMID:28101612
        supporting_text: "essential for N-glycan mannosylphosphorylation"
  - gap_statement: >-
      The basis of the functional redundancy between MNN14 and MNN4, and any
      distinct or condition-specific role of MNN14, are unknown. There is no
      described standalone loss-of-function phenotype for an mnn14 single mutant
      beyond the residual mannosylphosphate profile.
    boundary: >-
      Established: single deletion of either MNN4 or MNN14 leaves residual
      N-glycan mannosylphosphorylation, and only the double deletion eliminates
      it, so the two paralogs have overlapping but individually non-essential
      activities. MNN14 is a non-essential gene, and its expression is repressed
      by RIM101.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: >-
      Understanding whether MNN14 and MNN4 differ in acceptor specificity,
      substrate class (N- vs O-linked; core vs outer chain), or expression
      context would explain why two paralogs are maintained and would sharpen the
      mannosylphosphorylation model relevant to glyco-engineering.
    resolution: >-
      Comparative glycan profiling and genetic-interaction/expression analyses of
      mnn4 and mnn14 single mutants under varied growth conditions, and tests of
      RIM101-dependent regulation of MNN14 relative to MNN4.
    provenance:
      - reference_id: PMID:28101612
        supporting_text: "Double disruption of MNN4 and MNN14 genes was enough to eliminate N-glycan"
      - reference_id: UniProt:P40355
        supporting_text: "partially redundant function with MNN4"
suggested_questions:
  - question: >-
      Is MNN14 a catalytic mannosylphosphate transferase, or a positive
      regulator/activator of the Mnn6/Ktr6 mannosylphosphate transferase as
      inferred for its paralog MNN4?
  - question: >-
      Does the conserved DXD motif of MNN14 support catalysis, and is it required
      for MNN14 function in vivo?
suggested_experiments:
  - hypothesis: >-
      MNN14 is a mannosylphosphate transferase (or a required activator of one)
      whose activity depends on the conserved DXD motif.
    description: >-
      Express and purify recombinant MNN14 (lumenal domain) and assay
      mannosylphosphate transfer using GDP-mannose and defined mannan/N-glycan
      acceptors; compare wild-type MNN14 with a DXD-motif mutant; and test whether
      MNN14 stimulates purified Mnn6/Ktr6 activity in a reconstituted reaction.
    experiment_type: in-vitro enzymology / reconstitution
  - hypothesis: >-
      MNN14 and MNN4 act on distinct acceptor positions or substrate classes,
      explaining their partial redundancy.
    description: >-
      Perform quantitative N-glycan and mannan structural analysis (mass
      spectrometry) of cell-wall mannoproteins and a secreted reporter
      glycoprotein from wild-type, mnn4, mnn14, and mnn4 mnn14 strains to map
      which mannosylphosphate positions depend on each paralog.
    experiment_type: comparative glycomics
