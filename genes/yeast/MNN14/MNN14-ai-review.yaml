core_functions:
  - description: >-
      Golgi-localized factor required for N-glycan mannosylphosphorylation in
      S. cerevisiae, acting partially redundantly with its paralog MNN4. The
      experimentally supported statement is a biological-process role in
      outer-chain N-glycan maturation (mannosylphosphate addition); the
      underlying molecular activity of MNN14 is not established.
    supported_by:
