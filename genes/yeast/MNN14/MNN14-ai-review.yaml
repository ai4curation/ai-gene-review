id: P40355
gene_symbol: MNN14
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  MNN14 (systematic name YJR061W) encodes a 935-residue single-pass type II
  membrane protein of the Golgi apparatus in Saccharomyces cerevisiae. It is a
  paralog of MNN4 and belongs to the MNN4 family within the
  LicD/fukutin-related nucleotidyltransferase superfamily (Pfam PF04991 LicD;
  InterPro IPR007074 and IPR009644; PANTHER PTHR15407 fukutin-related). It is a
  distinct fold from the KRE2/MNT1 (GT15) mannosyltransferases. Genetically,
  MNN14 acts in N-glycan mannosylphosphorylation with a function that is
  partially redundant with MNN4: single deletions leave residual
  mannosylphosphate, whereas simultaneous deletion of MNN4 and MNN14 abolishes
  N-glycan mannosylphosphorylation. Mannosylphosphorylation adds mannose-1-
  phosphate to the outer-chain mannans of fungal glycoproteins and is
  fungal-specific, so loss of MNN4 plus MNN14 is used in yeast glyco-engineering
  to make human-compatible glycoproteins. The protein retains a conserved DXD
  motif characteristic of sugar/phosphate transferases, but its own molecular
  activity has not been determined experimentally: like MNN4 it may be a
  positive regulator (activator) of the mannosylphosphate transferase
  (Mnn6/Ktr6) rather than a transferase itself. Its direct acceptor substrate,
  the exact reaction it participates in, and the basis of its redundancy with
  MNN4 remain unknown.
