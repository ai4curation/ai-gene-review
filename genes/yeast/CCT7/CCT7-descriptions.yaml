gene_symbol: CCT7
organism: yeast
uniprot_id: P42943
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation (By similarity).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P42943
  source_id: P42943
- source: Alliance
  text: Subunit of the cytosolic chaperonin Cct ring complex; related to Tcp1p, required
    for the assembly of actin and tubulins in vivo; mutant has increased aneuploidy
    tolerance
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003647
  source_id: SGD:S000003647
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in protein folding. Located
    in cytoplasm. Part of chaperonin-containing T-complex. Orthologous to human CCT7
    (chaperonin containing TCP1 subunit 7).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003647
  source_id: SGD:S000003647
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in protein folding. Located
