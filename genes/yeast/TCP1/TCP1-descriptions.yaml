gene_symbol: TCP1
organism: yeast
uniprot_id: P12612
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P12612
  source_id: P12612
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but hedged; "may play a role in mitotic spindle formation" and
        "in vitro" undersell established functions.
    - rubric: utility
      score: 3
      notes: Does not distinguish TCP1 from other TRiC/CCT subunits.
    - rubric: compactness
      score: 4
      notes: Three short sentences.
    - rubric: completeness
      score: 3
      notes: Misses alpha subunit identity, ring complex architecture, essentiality.
    - rubric: specificity
      score: 3
      notes: Names actin and tubulin substrates but lacks TCP1-specific information.
    overall_notes: Same generic TRiC/CCT description shared with CCT2 and other subunits.
      Does not identify TCP1 as the alpha (founding) subunit.
- source: Alliance_Imported
  text: Alpha subunit of chaperonin-containing T-complex; complex mediates protein
    folding in the cytosol; involved in actin cytoskeleton maintenance; overexpression
    in neurons suppresses formation of pathogenic conformations of huntingtin protein
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002620
  source_id: SGD:S000002620
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; alpha subunit identity and huntingtin suppression are well-established.
    - rubric: utility
      score: 5
      notes: Distinguishes TCP1 from other subunits and adds disease-relevant context.
    - rubric: compactness
      score: 5
      notes: Compact semicolon format.
    - rubric: completeness
      score: 4
      notes: Covers subunit identity, cytoskeleton, and disease relevance. Misses
        ATP dependence.
    - rubric: specificity
      score: 5
      notes: Names alpha subunit, chaperonin-containing T-complex, actin cytoskeleton,
        huntingtin.
    overall_notes: Good curated description. Identifies TCP1 as the alpha subunit,
      mentions actin cytoskeleton maintenance, and the interesting huntingtin suppression
      finding.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in protein folding. Located
    in plasma membrane. Part of chaperonin-containing T-complex. Orthologous to human
    TCP1 (t-complex 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002620
  source_id: SGD:S000002620
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but generic.
    - rubric: utility
      score: 2
      notes: Does not distinguish TCP1 from other chaperonin subunits.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses alpha subunit identity, actin/tubulin specificity, huntingtin
        suppression.
    - rubric: specificity
      score: 2
      notes: Generic "protein folding" and "unfolded protein binding" terms.
    overall_notes: Generic GO-derived description. Same as many other CCT subunit
      automated entries.
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in protein folding. Located
    in plasma membrane. Part of chaperonin-containing T-complex. Orthologous to human
    TCP1 (t-complex 1). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/851798
  source_id: GeneID:851798
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 2
      notes: Same as Alliance_Automated.
    - rubric: compactness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 2
      notes: Same as Alliance_Automated.
    overall_notes: Identical to Alliance_Automated with attribution tag.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Good agreement on chaperonin function. SGD provides subunit-specific detail
      that UniProt lacks.
  overall_notes: SGD curated is clearly the best source, identifying TCP1 as the alpha
    subunit with disease-relevant huntingtin context. UniProt uses a shared CCT subunit
    description. Automated sources are generic boilerplate. Same pattern as CCT2.
