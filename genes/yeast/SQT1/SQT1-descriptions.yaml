status: COMPLETE
descriptions:
- source: UniProt
  text: May be involved in the late step of 60S ribosomal subunit assembly or modification
    in the cytoplasm.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P35184
  source_id: P35184
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Overly tentative for a well-characterized essential protein. "May be
        involved" is misleading.
    - rubric: utility
      score: 2
      notes: Too vague to be useful.
    - rubric: compactness
      score: 5
      notes: One sentence.
    - rubric: completeness
      score: 1
      notes: Misses Rpl10p specificity, co-translational association, WD repeats,
        Qsr1p interaction, essentiality.
    - rubric: specificity
      score: 1
      notes: No specific information about SQT1 unique function.
    overall_notes: Very brief and hedging. Says "may be involved" in 60S assembly,
      which understates the well-characterized role as a specific Rpl10p assembly
      chaperone.
- source: Alliance_Imported
  text: Specific assembly chaperone for ribosomal protein Rpl10p; co-translationally
    associates with nascent Rpl10p, preventing aggregation; involved in biogenesis
    of the ribosomal large subunit; contains multiple WD repeats; interacts genetically
    and physically with Qsr1p; protein abundance increases in response to DNA replication
    stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001451
  source_id: SGD:S000001451
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Clearly conveys the dedicated chaperone function with mechanistic detail.
    - rubric: compactness
      score: 4
      notes: Dense but informative.
    - rubric: completeness
      score: 5
      notes: Covers substrate (Rpl10p), mechanism (co-translational, anti-aggregation),
        structure (WD repeats), interactions.
    - rubric: specificity
      score: 5
      notes: Names Rpl10p, Qsr1p, WD repeats, and co-translational mechanism.
    overall_notes: Excellent description. Identifies SQT1 as a specific assembly chaperone
      for Rpl10p, co-translational association mechanism, WD repeat structure, Qsr1p
      interaction, and DNA replication stress response.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in ribosomal large subunit
    assembly. Located in cytosol. Orthologous to human AAMP (angio associated migratory
    cell protein).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001451
  source_id: SGD:S000001451
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Unfolded protein binding oversimplifies the specific Rpl10p chaperone
        function.
    - rubric: utility
      score: 2
      notes: Very limited information.
    - rubric: compactness
      score: 5
      notes: Very short.
    - rubric: completeness
      score: 1
      notes: Misses Rpl10p specificity, co-translational mechanism, WD repeats, Qsr1p.
    - rubric: specificity
      score: 1
      notes: Completely generic.
    overall_notes: Minimal GO-derived summary. "Unfolded protein binding" is a loose
      fit for a dedicated ribosomal protein chaperone. AAMP orthology is of limited
      relevance.
