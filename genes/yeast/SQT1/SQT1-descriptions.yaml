review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Agreement on ribosome assembly role but vast difference in quality. UniProt
      and automated sources undersell this well-characterized chaperone.
  overall_notes: SGD curated is the only adequate description. UniProt is surprisingly
    vague for a well-characterized essential gene. Automated sources provide minimal
    information. There is no contradiction between sources, just a vast difference
    in depth and specificity.
