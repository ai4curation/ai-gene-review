suggested_questions:
- question: >-
    What is the order of events at the Rpl10 nascent chain — does Sqt1 engage
    Rpl10 strictly co-translationally on cytosolic ribosomes, or can it also
    bind newly released Rpl10, and how is hand-off to pre-60S particles
    coordinated with the GTPase Lsg1 and the assembly factor Nmd3?
- question: >-
    Does the WD-repeat β-propeller of Sqt1 use a single client-binding mode
    for Rpl10, or are there secondary clients of Sqt1 that explain its
    essentiality beyond its role with Rpl10?
- question: >-
    Are there post-translational modifications or stress-regulated cues
    (e.g., heat shock, nutrient signalling) that modulate Sqt1 binding
    affinity for Rpl10 and thereby tune the rate of late 60S maturation?
suggested_experiments:
- description: >-
    Perform selective ribosome profiling and SeRP-Mass-Spec on Sqt1-tagged
    polysomes to map exactly when on the RPL10 nascent chain Sqt1 engages,
    and compare to Yar1/Rps3 and Syo1/Rpl5 hand-off kinetics.
- description: >-
    Combine cryo-EM of pre-60S particles with chemical cross-linking of
    Sqt1-Rpl10 to capture the Sqt1-bound state of Rpl10 immediately preceding
    its incorporation, and compare to the Lsg1/Nmd3-mediated release step.
- description: >-
    Use auxin-inducible degron depletion of Sqt1 followed by quantitative
    polysome profiling, half-mer accumulation analysis, and pulse-SILAC of
    Rpl10 to dissect whether the lethality of Sqt1 loss reflects Rpl10
    aggregation, mis-incorporation, or accelerated turnover.
- description: >-
    Cross-link IP/MS in Sqt1-AID strains and structure-guided point mutations
    of the Sqt1 β-propeller binding pocket to test whether non-Rpl10 clients
    contribute to Sqt1 essentiality.
