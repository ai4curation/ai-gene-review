  label: Saccharomyces cerevisiae
description: >-
  SQT1 (YIR012W) encodes an essential WD40-repeat β-propeller protein that
  acts as a dedicated cytoplasmic chaperone for the 60S ribosomal protein
  Rpl10 (Qsr1) (PMID:9271392). Sqt1 was identified as a high-copy suppressor
  of dominant-negative QSR1 mutations that cause half-mer polysomes and
  defective 40S/60S subunit joining, placing Sqt1 in the late cytoplasmic
  steps of 60S ribosomal subunit biogenesis. Crystallographic and
  affinity-purification evidence shows that Sqt1's WD-repeat β-propeller
  shields the N-terminal rRNA-binding residues of nascent Rpl10 and that the
  Rpl10 mRNA is selectively co-purified with Sqt1, supporting a
  co-translational capture mechanism that prevents unspecific interactions
  and aggregation prior to Rpl10 incorporation into pre-60S subunits
  (PMID:26112308). The chaperone-client relationship places Sqt1 alongside
  Rrb1 (Rpl3), Syo1 (Rpl5) and Yar1 (Rps3) in a family of dedicated
  ribosomal-protein chaperones.
