core_functions:
- description: >-
    Dedicated cytoplasmic chaperone (WD40 β-propeller) that captures nascent
    Rpl10 co-translationally, shields its N-terminal rRNA-binding region from
    unspecific interactions and aggregation, and delivers Rpl10 to the late
    cytoplasmic step of 60S ribosomal subunit biogenesis required for
    competent 40S/60S subunit joining.
