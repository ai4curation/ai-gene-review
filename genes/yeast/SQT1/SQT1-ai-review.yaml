      Sqt1 is captured as a component of a soluble, ribosome-associated
      complex in the genome-scale TAP-MS proteome survey of yeast, consistent
      with its role as a dedicated 60S-pathway ribosomal-protein chaperone.
    supporting_text: >-
      Proteome survey reveals modularity of the yeast cell machinery.
    reference_section_type: TITLE
- id: PMID:16554755
  title: Global landscape of protein complexes in the yeast Saccharomyces cerevisiae.
  findings:
  - statement: >-
      Sqt1 is recovered in the global yeast protein-complex landscape with
      ribosome-biogenesis-associated complex partners, supporting its position
      in the late 60S subunit assembly machinery.
    supporting_text: >-
      Global landscape of protein complexes in the yeast Saccharomyces cerevisiae.
    reference_section_type: TITLE
- id: PMID:26112308
  title: Co-translational capturing of nascent ribosomal proteins by their dedicated chaperones.
  findings:
  - statement: >-
      Affinity purification of Sqt1 selectively enriches the RPL10 mRNA, and
      X-ray crystallography shows that Sqt1's WD-repeat β-propeller shields
      the N-terminal rRNA-binding residues of Rpl10, defining Sqt1 as a
      co-translational chaperone that prevents Rpl10 aggregation prior to
      pre-60S incorporation.
    supporting_text: >-
      Affinity purification of four chaperones (Rrb1, Syo1, Sqt1 and Yar1)
      selectively enriched the mRNAs encoding their specific ribosomal protein
      clients (Rpl3, Rpl5, Rpl10 and Rps3). X-ray crystallography reveals how
      the N-terminal, rRNA-binding residues of Rpl10 are shielded by Sqt1's
      WD-repeat β-propeller, providing mechanistic insight into the
      incorporation of Rpl10 into pre-60S subunits.
    reference_section_type: ABSTRACT
  - statement: >-
      Co-translational capture of nascent ribosomal proteins by dedicated
      chaperones, including Sqt1, is proposed as a general mechanism to
      prevent unspecific interactions and aggregation of ribosomal proteins
      en route to ribosome assembly.
    supporting_text: >-
      Co-translational capturing of nascent ribosomal proteins by dedicated
      chaperones constitutes an elegant mechanism to prevent unspecific
      interactions and aggregation of ribosomal proteins on their road to
      incorporation.
    reference_section_type: ABSTRACT
