review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: Perfect agreement on uS5/Rps2p chaperone and rRNA processing functions.
      No contradictions.
  overall_notes: Both curated sources are excellent. SGD curated provides the most
    comprehensive view with strain-dependent essentiality and human homologs. UniProt
    is concise and accurate. Automated sources correctly categorize but lack all specificity.
    Strong concordance on the dedicated ribosomal protein chaperone function.
