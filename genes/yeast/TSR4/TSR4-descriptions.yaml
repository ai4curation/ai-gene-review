gene_symbol: TSR4
organism: yeast
uniprot_id: P25040
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Cytoplasmic chaperone for ribosomal protein uS5; cotranslationally associates
    with uS5 to facilitate its expression and solubility and is released prior to
    nuclear import of uS5 (PubMed:31062022). Required for processing of the 20S pre-rRNA
    at site D to generate mature 18S rRNA (PubMed:19806183).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P25040
  source_id: P25040
- source: Alliance_Imported
  text: Cytoplasmic assembly chaperone for ribosomal protein Rps2p; co-translationally
    associates with the N-terminal extension of Rps2p to facilitate expression, solubility
    and ribosome assembly; released prior to the nuclear import of Rps2p; required
    for correct processing of 20S pre-rRNA at site D to generate mature 18S rRNA;
    essential gene in the S288C background but not in CEN.PK2; homologous to human
    PDCD2L and PDCD2
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005382
  source_id: SGD:S000005382
- source: Alliance_Automated
  text: Enables protein carrier chaperone and unfolded protein binding activity. Involved
    in maturation of SSU-rRNA. Located in cytosol. Orthologous to human PDCD2 (programmed
    cell death 2) and PDCD2L (programmed cell death 2 like).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005382
  source_id: SGD:S000005382
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in maturation of SSU-rRNA.
    Located in cytoplasm. Orthologous to human PDCD2 (programmed cell death 2) and
    PDCD2L (programmed cell death 2 like). [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/854136
