descriptions:
- source: UniProt
  text: Cytoplasmic chaperone for ribosomal protein uS5; cotranslationally associates
    with uS5 to facilitate its expression and solubility and is released prior to
    nuclear import of uS5 (PubMed:31062022). Required for processing of the 20S pre-rRNA
    at site D to generate mature 18S rRNA (PubMed:19806183).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P25040
  source_id: P25040
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; both the chaperone function and rRNA processing role are well-documented.
    - rubric: utility
      score: 5
      notes: 'Clearly explains the dual function: uS5 chaperone and rRNA processing.'
    - rubric: compactness
      score: 5
      notes: Two concise sentences covering both functions.
    - rubric: completeness
      score: 4
      notes: Covers chaperone and rRNA processing. Misses the strain-dependent essentiality.
    - rubric: specificity
      score: 5
      notes: Names uS5, 20S pre-rRNA, site D, and 18S rRNA.
    overall_notes: Accurate and concise description of TSR4 as a dedicated chaperone
      for ribosomal protein uS5, with cotranslational association and 20S pre-rRNA
      processing role.
- source: Alliance_Imported
  text: Cytoplasmic assembly chaperone for ribosomal protein Rps2p; co-translationally
    associates with the N-terminal extension of Rps2p to facilitate expression, solubility
    and ribosome assembly; released prior to the nuclear import of Rps2p; required
    for correct processing of 20S pre-rRNA at site D to generate mature 18S rRNA;
    essential gene in the S288C background but not in CEN.PK2; homologous to human
    PDCD2L and PDCD2
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005382
  source_id: SGD:S000005382
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate throughout; strain-dependent essentiality is a notable detail.
    - rubric: utility
      score: 5
      notes: Comprehensive view covering assembly, import, processing, and strain
        background effects.
    - rubric: compactness
      score: 4
      notes: Longer but highly informative.
    - rubric: completeness
      score: 5
      notes: Covers cotranslational association, N-terminal specificity, nuclear import,
        rRNA processing, essentiality, and homologs.
    - rubric: specificity
      score: 5
      notes: Names Rps2p, N-terminal extension, site D, S288C, CEN.PK2, PDCD2L, PDCD2.
    overall_notes: Excellent detailed description. Adds N-terminal extension specificity,
      nuclear import release, strain-dependent essentiality, and human homologs.
- source: Alliance_Automated
  text: Enables protein carrier chaperone and unfolded protein binding activity. Involved
    in maturation of SSU-rRNA. Located in cytosol. Orthologous to human PDCD2 (programmed
    cell death 2) and PDCD2L (programmed cell death 2 like).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005382
  source_id: SGD:S000005382
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; "protein carrier chaperone" is appropriate for TSR4.
    - rubric: utility
      score: 2
      notes: Too generic to be useful.
    - rubric: compactness
      score: 4
      notes: Short.
    - rubric: completeness
      score: 2
      notes: Misses uS5/Rps2p specificity, cotranslational association, and nuclear
        import.
    - rubric: specificity
      score: 2
      notes: Generic; PDCD2/PDCD2L orthology is useful.
    overall_notes: Brief GO-derived description. Correctly identifies protein carrier
