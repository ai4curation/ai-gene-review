gene_symbol: CCT2
organism: yeast
uniprot_id: P39076
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Good concordance on the core chaperonin subunit function. All sources agree on
    protein folding and the chaperonin complex membership. UniProt provides the most
    functional detail, specifying ATP-dependent folding and naming actin and tubulin
    as key substrates. SGD curated is more concise, identifying CCT2 as the beta subunit
    and specifying in vivo actin/tubulin assembly. The automated descriptions are
    generic GO-term summaries. A weakness across all sources: none adequately describe
    the TRiC/CCT ring architecture or the obligate hetero-oligomeric nature. Both
    curated sources are good but somewhat thin compared to descriptions of other genes.
    Best source: SGD curated for the subunit identity and in vivo confidence;
    UniProt curated for the ATP-dependence and substrate specification.
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: >-
      Strong agreement. Both curated sources name actin and tubulin substrates.
      No contradictions. UniProt adds ATP hydrolysis; SGD adds subunit identity (beta).
descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P39076
  source_id: P39076
  review:
    reviewer: AI
    overall_notes: >-
      Accurate but somewhat tentative ("may play a role"). The in vitro qualification
      for actin/tubulin folding undersells what is a well-established in vivo function.
      Mentions ATP hydrolysis mechanism. Does not identify CCT2 as a specific subunit
      of the TRiC/CCT ring complex.
    rubrics:
    - rubric: correctness
      score: 4
      notes: >-
        Correct but overly hedged; "may play a role in mitotic spindle formation" and
        "in vitro" qualifiers understate established functions.
    - rubric: utility
      score: 3
      notes: Does not convey the essential chaperonin complex context.
    - rubric: compactness
      score: 4
      notes: Three short sentences; reasonably concise.
    - rubric: completeness
      score: 3
      notes: Misses subunit identity, ring complex architecture, essentiality.
    - rubric: specificity
      score: 3
      notes: Names actin and tubulin but lacks complex context (TRiC/CCT).
- source: Alliance_Imported
  text: Subunit beta of the cytosolic chaperonin Cct ring complex; related to Tcp1p,
    required for the assembly of actin and tubulins in vivo
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001404
  source_id: SGD:S000001404
  review:
    reviewer: AI
    overall_notes: >-
      Compact and informative. Clearly identifies the subunit (beta), the complex (Cct),
      and the key substrates (actin and tubulins) with in vivo confidence. Relationship
      to Tcp1p is useful context. Missing: ATP-dependence, essentiality, broader
      substrate range.
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; "in vivo" is appropriately confident for this well-characterized function.
    - rubric: utility
      score: 4
      notes: Good for understanding the gene's place in the chaperonin complex.
    - rubric: compactness
      score: 5
      notes: One dense sentence with no wasted words.
    - rubric: completeness
      score: 3
      notes: Misses ATP-dependence, essentiality, other substrates beyond actin/tubulin.
    - rubric: specificity
      score: 5
      notes: Names the specific subunit (beta), complex (Cct ring), and substrates.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in protein folding. Located
    in cytoplasm. Part of chaperonin-containing T-complex. Used to study Leber congenital
    amaurosis. Human ortholog(s) of this gene implicated in Leber congenital amaurosis.
    Orthologous to human CCT2 (chaperonin containing TCP1 subunit 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001404
  source_id: SGD:S000001404
  review:
    reviewer: AI
    overall_notes: >-
      Generic but includes useful complex membership and disease context. "Unfolded
      protein binding" is technically true for a chaperonin subunit but uninformative.
      The Leber congenital amaurosis disease link and human ortholog are valuable additions.
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; "unfolded protein binding" is technically accurate for a chaperonin but generic.
    - rubric: utility
      score: 3
      notes: Complex membership and disease info are useful; lacks substrate specificity.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses actin/tubulin specificity, beta subunit identity, ATP-dependence.
    - rubric: specificity
      score: 2
      notes: Very generic; "protein folding" and "unfolded protein binding" could describe any chaperone.
