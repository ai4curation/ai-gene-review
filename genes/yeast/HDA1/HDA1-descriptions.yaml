gene_symbol: HDA1
organism: yeast
uniprot_id: P53973
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Responsible for the deacetylation of lysine residues on the N-terminal part
    of the core histones (H2A, H2B, H3 and H4). Histone deacetylation gives a tag
    for epigenetic repression and plays an important role in transcriptional regulation,
    cell cycle progression and developmental events. Histone deacetylases act via
    the formation of large multiprotein complexes.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53973
  source_id: P53973
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of HDAC function.
    - rubric: utility
      score: 4
      notes: Informative but somewhat generic for HDACs in general.
    - rubric: compactness
      score: 3
      notes: Moderately detailed.
    - rubric: completeness
      score: 3
      notes: Misses class II identity, HDA1 complex subunit details, azole resistance,
        and heat shock response roles.
    - rubric: specificity
      score: 3
      notes: Describes HDAC function generally; not highly HDA1-specific.
    overall_notes: Good general description of histone deacetylase function covering
      substrates and epigenetic role.
- source: Alliance_Imported
  text: Catalytic subunit of class II HDA1 histone deacetylase complex; role in azole
    resistance via Hsp90p, and in heat shock response; Hda1p interacts with Hda2p-Hda3p
    subcomplex to form an active tetramer; deletion increases histone H2B, H3 and
    H4 acetylation; the HDA1 histone deacetylase complex regulates aging through trehalose
    metabolism
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004966
  source_id: SGD:S000004966
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and comprehensive.
    - rubric: utility
      score: 5
      notes: Highly informative about HDA1-specific biology.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized.
    - rubric: completeness
      score: 5
      notes: Covers class II identity, complex subunits, azole resistance, heat shock,
        histone acetylation effects, and aging.
    - rubric: specificity
      score: 5
      notes: 'Specific: class II, Hda2p-Hda3p subcomplex, Hsp90p, trehalose metabolism.'
    overall_notes: 'Best source: covers class II identity, complex composition, azole
      resistance, heat shock, and aging regulation.'
- source: Alliance_Automated
  text: Enables chromatin binding activity and identical protein binding activity.
    Contributes to histone deacetylase activity. Involved in negative regulation of
    transcription by RNA polymerase II and positive regulation of transcription by
    RNA polymerase II. Part of HDA1 complex. Human ortholog(s) of this gene implicated
    in several diseases, including ataxia telangiectasia; chondrodysplasia with platyspondyly,
    distinctive brachydactyly, hydrocephaly, and microphthalmia; eating disorder;
    obesity; and polycystic liver disease 1. Orthologous to several human genes including
    HDAC6 (histone deacetylase 6).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004966
  source_id: SGD:S000004966
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct GO annotations; disease associations are for human orthologs.
    - rubric: utility
      score: 3
      notes: Formulaic; human disease info not relevant for yeast.
    - rubric: compactness
      score: 3
      notes: Moderate boilerplate with disease list.
    - rubric: completeness
      score: 3
      notes: Covers some activities; misses HDA1-specific biology.
    - rubric: specificity
      score: 3
      notes: GO terms; mentions HDA1 complex.
    overall_notes: GO-derived listing; includes chromatin binding and transcription
      regulation.
- source: RefSeq
  text: Enables chromatin binding activity. Contributes to histone deacetylase activity.
    Involved in negative regulation of transcription by RNA polymerase II; negative
    regulation of transcription by transcription factor localization; and positive
    regulation of transcription by RNA polymerase II. Part of HDA1 complex. Human
    ortholog(s) of this gene implicated in several diseases, including ataxia telangiectasia;
    chondrodysplasia with platyspondyly, distinctive brachydactyly, hydrocephaly,
    and microphthalmia; eating disorder; obesity; and polycystic liver disease 1.
    Orthologous to several human genes including HDAC6 (histone deacetylase 6). [provided
    by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/855710
  source_id: GeneID:855710
