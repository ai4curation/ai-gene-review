review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: All agree on histone deacetylase function; only Alliance_Imported captures
      HDA1-specific roles in azole resistance, heat shock, and aging.
  overall_notes: Alliance_Imported is clearly the best source, covering HDA1-specific
    biology. UniProt provides accurate but generic HDAC description. Automated sources
    are formulaic with irrelevant disease associations. RefSeq is largely duplicative.
