id: P53137
gene_symbol: CUE3
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  CUE3 (also known as RQT3) is a subunit of the ribosome quality control trigger (RQT) complex,
  which is composed of Slh1/RQT2, Cue3/RQT3, and Rqt4. The RQT complex recognizes collided
  ribosomes that have been ubiquitinated on uS10 by the E3 ligase Hel2 and triggers their
  disassembly as part of the ribosome-associated quality control (RQC) pathway. CUE3 contains
  a CUE domain (residues 316-359) that specifically binds K63-linked polyubiquitin chains on
  ubiquitinated uS10, facilitating recruitment of the RQT complex to stalled ribosomes. CUE3
  and Rqt4 function as two independent ubiquitin-recognition arms of the RQT complex; single
  deletion of CUE3 only partially reduces RQC activity, but the cue3/rqt4 double deletion
  completely abolishes RQC function. CUE3 interacts directly with Slh1 via its N-terminal
  helical domain and associates with translating ribosomes as part of the RQT complex.
existing_annotations:
# ================== MOLECULAR FUNCTION: UBIQUITIN BINDING ==================
- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      IBA annotation for ubiquitin binding is well supported. CUE3 contains a CUE domain
      (aa 316-359) that directly binds ubiquitin (PMID:28757607, PMID:12628920). The CUE
      domain is the defining feature of this protein family and ubiquitin binding is
      phylogenetically conserved.
    action: ACCEPT
    reason: >-
      Ubiquitin binding is a core molecular function of CUE3, demonstrated by in vitro
      binding assays and mutagenesis. The IBA inference is conservative and appropriate
      at this level of specificity. The more specific K63-linked polyubiquitin binding
      is captured by a separate IDA annotation.
    supported_by:
      - reference_id: PMID:28757607
        supporting_text: "CUE domain of Rqt3 was directly bound to ubiquitin, and it was completely abolished by the mutations (Ub-m) in the conserved residues of CUE domain"
      - reference_id: PMID:12628920
        supporting_text: "CUE domains bind directly to monoubiquitin and we have defined crucial interaction surfaces on both binding partners"

- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      IEA annotation based on InterPro CUE domain (IPR003892) mapping to ubiquitin binding.
      This is a straightforward and correct domain-to-function mapping.
    action: ACCEPT
    reason: >-
      CUE3 contains the CUE domain (PROSITE PS51140, Pfam PF02845) which is a well-characterized
      ubiquitin-binding domain. The IEA mapping from InterPro is appropriate and consistent
      with experimental evidence.
    supported_by:
      - reference_id: PMID:12628920
        supporting_text: "the CUE motif is an evolutionarily conserved monoubiquitin-binding domain that mediates intramolecular monoubiquitylation"

- term:
    id: GO:0043130
    label: ubiquitin binding
  evidence_type: IDA
  original_reference_id: PMID:12628920
  review:
    summary: >-
      IDA annotation from Shih et al. (2003) who characterized the CUE domain as a ubiquitin-binding
      motif. Although the study focused primarily on Vps9 CUE domain, it established that CUE domains
      in general, including that in Cue3, bind ubiquitin directly.
    action: ACCEPT
    reason: >-
      The original characterization of the CUE domain as a ubiquitin-binding motif provides
      direct experimental evidence for this annotation. This is a core molecular function.
    supported_by:
      - reference_id: PMID:12628920
        supporting_text: "CUE domains bind directly to monoubiquitin and we have defined crucial interaction surfaces on both binding partners"

# ================== MOLECULAR FUNCTION: K63-LINKED UBIQUITIN BINDING ==================
- term:
    id: GO:0070530
    label: K63-linked polyubiquitin modification-dependent protein binding
  evidence_type: IDA
  original_reference_id: PMID:36627279
  review:
    summary: >-
      IDA annotation from Matsuo et al. (2023) who demonstrated that CUE3 via its CUE domain
      specifically binds K63-linked tetraubiquitin chains but not K48-linked chains. Pull-down
      assays showed the Slh1-Cue3 heterodimer bound K63-linked tetraubiquitin, and deletion
      of the CUE domain abolished this binding.
    action: ACCEPT
    reason: >-
      This is a highly specific and well-supported molecular function annotation. The K63
      linkage specificity is directly demonstrated by pull-down assays comparing K63 vs K48
      tetraubiquitin chains, and is functionally critical because Hel2 modifies uS10 with
      K63-linked chains to mark colliding ribosomes for RQC.
    supported_by:
      - reference_id: PMID:36627279
        supporting_text: "the RQT complex was specifically bound to the K63-linked tetraubiquitin chain but not to the K48-linked tetraubiquitin chain"
      - reference_id: PMID:36627279
        supporting_text: "Deletion of the CUE domain did not affect the interaction between Cue3 and Slh1 (Fig"

# ================== MOLECULAR FUNCTION: PROTEIN BINDING ==================
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:28223409
  review:
    summary: >-
      IPI annotation based on co-immunoprecipitation of CUE3 with Rqt4 (YKR023W, UniProtKB:P36119)
      from Sitron et al. (2017). CUE3 and Ykr023w physically interacted on co-IP and immunoblot.
    action: MODIFY
    reason: >-
      The term 'protein binding' (GO:0005515) is uninformative. The actual interaction is with
      Rqt4 as part of the RQT complex. However, there is no more specific GO MF term that
      captures this adapter/scaffold function well. Since ubiquitin binding is already captured
      by GO:0043130 and GO:0070530, and the protein-protein interaction with Rqt4 and Slh1 is
      part of the complex assembly, this annotation should be removed in favor of the existing
      more informative annotations.
    proposed_replacement_terms:
      - id: GO:0043130
        label: ubiquitin binding
    supported_by:
      - reference_id: PMID:28223409
        supporting_text: "Cue3 and Ykr023w also physically interacted with each other on co-IP and immunoblot"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:37968396
  review:
    summary: >-
      IPI annotation from a large-scale yeast interactome study. The WITH column indicates
      interaction with UniProtKB:P36119 (Rqt4). This is a high-throughput protein-protein
      interaction study.
    action: MODIFY
    reason: >-
      As above, 'protein binding' is uninformative. The interaction with Rqt4 is real and
      documented, but the GO term does not convey any specific information about CUE3's
      function. The core molecular functions (ubiquitin binding, K63-linked polyubiquitin
      binding) are already captured by more specific terms.
    proposed_replacement_terms:
      - id: GO:0043130
        label: ubiquitin binding

# ================== BIOLOGICAL PROCESS: RESCUE OF STALLED RIBOSOME ==================
- term:
    id: GO:0072344
    label: rescue of stalled cytosolic ribosome
  evidence_type: IDA
  original_reference_id: PMID:36627279
  review:
    summary: >-
      IDA annotation from Matsuo et al. (2023) who demonstrated that CUE3 as part of the RQT
      complex is required for disassembly of colliding ribosomes. The study showed that
      the ubiquitin-binding activity of CUE3 (and Rqt4) is essential for the RQT complex to
      split ubiquitinated stalled ribosomes in an in vitro ribosome splitting assay.
    action: ACCEPT
    reason: >-
      Rescue of stalled cytosolic ribosome is the primary biological process in which CUE3
      functions. The in vitro splitting assay directly demonstrates ribosome disassembly
      mediated by the RQT complex, and CUE3's ubiquitin-binding function is essential for
      this activity.
    supported_by:
      - reference_id: PMID:36627279
        supporting_text: "the RQT complex interacted with the K63-linked ubiquitin chain via two arms composed of Cue3 and Rqt4, and recruited itself into the ubiquitinated colliding ribosome, thereby facilitating the disassembly of the colliding ribosomes using the helicase activity of Slh1"

- term:
    id: GO:0072344
    label: rescue of stalled cytosolic ribosome
  evidence_type: IMP
  original_reference_id: PMID:28757607
  review:
    summary: >-
      IMP annotation from Matsuo et al. (2017) who demonstrated that deletion of CUE3 (rqt3)
      leads to defective RQC, as shown by reporter assays for arrest product accumulation.
      Mutations in the CUE domain ubiquitin-binding residues also diminished RQC substrate
      production. The cue3/rqt4 double mutant completely abolished RQC.
    action: ACCEPT
    reason: >-
      Mutant phenotype data (IMP) robustly supports involvement in rescue of stalled ribosomes.
      The rqt3 deletion and CUE domain mutations both impair RQC pathway function, and
      the cue3/rqt4 double deletion eliminates it entirely.
    supported_by:
      - reference_id: PMID:28757607
        supporting_text: "Despite of weaker phenotype of a single deletion mutant of Cue3 and yKR023W, RQC substrates were not accumulated anymore in the double mutant of them (Fig"
      - reference_id: PMID:28757607
        supporting_text: "R(CGN)12 reporter assay revealed that this mutation significantly diminished the production of the RQC substrate (Fig"

# ================== BIOLOGICAL PROCESS: RIBOSOME DISASSEMBLY ==================
- term:
    id: GO:0032790
    label: ribosome disassembly
  evidence_type: NAS
  original_reference_id: PMID:28757607
  review:
    summary: >-
      NAS annotation from ComplexPortal, citing PMID:28757607. CUE3 as part of the RQT complex
      is involved in the disassembly of stalled ribosomes. Matsuo et al. (2017) showed that
      the RQT complex triggers subunit dissociation of ubiquitinated stalled ribosomes.
    action: ACCEPT
    reason: >-
      Ribosome disassembly is a core aspect of RQT complex function. While this is partially
      redundant with GO:0072344 (rescue of stalled cytosolic ribosome), ribosome disassembly
      describes the specific mechanistic step that the RQT complex performs. NAS evidence
      is appropriate given the narrative support in the publication.
    supported_by:
      - reference_id: PMID:28757607
        supporting_text: "Rqt1 specifically ubiquitinates these arrested ribosomes to target them to the RQT complex, allowing subsequent RQC reactions including dissociation of the stalled ribosome into subunits"

- term:
    id: GO:0032790
    label: ribosome disassembly
  evidence_type: IDA
  original_reference_id: PMID:36627279
  review:
    summary: >-
      IDA annotation from Matsuo et al. (2023) who used in vitro ribosome splitting assays
      to directly demonstrate that the RQT complex disassembles colliding ribosomes, and that
      this activity requires the ubiquitin-binding functions of both CUE3 and Rqt4.
    action: ACCEPT
    reason: >-
      Direct experimental evidence from in vitro splitting assays demonstrates that the RQT
      complex including CUE3 mediates ribosome disassembly. CUE3's role is to recognize
      the K63-linked ubiquitin mark that licenses the splitting event.
    supported_by:
      - reference_id: PMID:36627279
        supporting_text: "the RQT complex interacted with the K63-linked ubiquitin chain via two arms composed of Cue3 and Rqt4, and recruited itself into the ubiquitinated colliding ribosome, thereby facilitating the disassembly of the colliding ribosomes using the helicase activity of Slh1"

# ================== BIOLOGICAL PROCESS: RIBOSOME-ASSOCIATED UBIQUITIN-DEPENDENT PROTEIN CATABOLISM ==================
- term:
    id: GO:1990116
    label: ribosome-associated ubiquitin-dependent protein catabolic process
  evidence_type: NAS
  original_reference_id: PMID:28757607
  review:
    summary: >-
      NAS annotation from ComplexPortal. CUE3 functions in the RQC pathway which ultimately
      leads to ubiquitin-dependent proteasomal degradation of nascent chains from stalled
      ribosomes. However, CUE3 itself acts at the upstream triggering step (ribosome splitting),
      not directly in the proteolytic degradation step.
    action: KEEP_AS_NON_CORE
    reason: >-
      CUE3 participates in the RQC pathway that leads to ribosome-associated ubiquitin-dependent
      protein catabolism, but its direct role is at the triggering/splitting step, not the
      downstream Ltn1-dependent ubiquitination and proteasomal degradation of nascent chains.
      This annotation is not wrong but represents a broader pathway context rather than CUE3's
      specific function.
    supported_by:
      - reference_id: PMID:28757607
        supporting_text: "these three proteins were not involved in uS10 ubiquitination (Fig"

- term:
    id: GO:1990116
    label: ribosome-associated ubiquitin-dependent protein catabolic process
  evidence_type: IMP
  original_reference_id: PMID:28757607
  review:
    summary: >-
      IMP annotation based on mutant phenotype data from Matsuo et al. (2017). Deletion
      of CUE3 impairs production of RQC substrates, which are normally degraded by
      the proteasome via Ltn1-dependent ubiquitination.
    action: KEEP_AS_NON_CORE
    reason: >-
      Same reasoning as the NAS annotation above. CUE3 deletion impairs the upstream
      triggering step of RQC, which secondarily affects the ribosome-associated
      ubiquitin-dependent catabolic process. The annotation captures pathway membership
      rather than direct function. The core process terms are GO:0072344 (rescue of
      stalled cytosolic ribosome) and GO:0032790 (ribosome disassembly).
    supported_by:
      - reference_id: PMID:28757607
        supporting_text: "All three of these factors are required genetically for the efficient production of RQC substrates in vivo"

