core_functions:
- description: >-
    CUE3 is an accessory subunit of the RQT complex that functions as a ubiquitin-recognition
    arm. Its CUE domain specifically binds K63-linked polyubiquitin chains on ubiquitinated
    uS10, facilitating recruitment of the RQT complex to colliding ribosomes and enabling
    ribosome disassembly by the Slh1 helicase. CUE3 does not have the helicase/splitting
    activity itself but contributes to the overall splitting function of the RQT complex
    through its ubiquitin-recognition role.
  molecular_function:
    id: GO:0070530
    label: K63-linked polyubiquitin modification-dependent protein binding
  directly_involved_in:
    - id: GO:0072344
      label: rescue of stalled cytosolic ribosome
    - id: GO:0032790
      label: ribosome disassembly
  locations:
    - id: GO:0022626
      label: cytosolic ribosome
    - id: GO:0005737
      label: cytoplasm
  supported_by:
    - reference_id: PMID:36627279
      supporting_text: "the RQT complex interacted with the K63-linked ubiquitin chain via two arms composed of Cue3 and Rqt4, and recruited itself into the ubiquitinated colliding ribosome, thereby facilitating the disassembly of the colliding ribosomes using the helicase activity of Slh1"
    - reference_id: PMID:28757607
      supporting_text: "All three of these factors are required genetically for the efficient production of RQC substrates in vivo"

proposed_new_terms: []

suggested_questions:
  - question: >-
      Does CUE3 have any function independent of the RQT complex? Its CUE domain was
      originally named for 'coupling of ubiquitin conjugation to ER degradation,' yet
      no ERAD function has been documented.
  - question: >-
      Is CUE3 phosphorylated at S377 by Cdk1 (PMID:19779198) in a cell-cycle-dependent
      manner, and does this regulate RQT complex activity?
  - question: >-
      What is the functional significance of the large disordered C-terminal region
      (residues ~435-624) of CUE3?

suggested_experiments:
  - description: >-
      Structure-function analysis of CUE3 phosphorylation at S377 to determine if
      Cdk1-dependent phosphorylation regulates RQT complex recruitment or activity.
  - description: >-
      Systematic truncation analysis of the CUE3 C-terminal disordered region to
      determine if it contributes to ribosome association or RQT complex function.
