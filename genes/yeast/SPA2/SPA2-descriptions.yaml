gene_symbol: SPA2
organism: yeast
uniprot_id: P23201
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in pheromone-induced morphogenesis and efficient mating, perhaps
    as a cytoskeletal protein.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P23201
  source_id: P23201
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but vague; "perhaps as a cytoskeletal protein" is overly tentative
        for an established polarisome component.
    - rubric: utility
      score: 2
      notes: Too brief and hedging to be useful.
    - rubric: compactness
      score: 5
      notes: One sentence.
    - rubric: completeness
      score: 1
      notes: Misses polarisome, actin organization, MAPK scaffold, budding, and polarized
        growth roles.
    - rubric: specificity
      score: 1
      notes: Very vague.
    overall_notes: Very brief and outdated. Mentions pheromone-induced morphogenesis
      and mating but hedges on cytoskeletal role. Misses polarisome membership and
      MAPK scaffold function.
- source: Alliance_Imported
  text: Component of the polarisome; functions in actin cytoskeletal organization
    during polarized growth; acts as a scaffold for Mkk1p and Mpk1p cell wall integrity
    signaling components; potential Cdc28p substrate; coding sequence contains length
    polymorphisms in different strains; SPA2 has a paralog, SPH1, that arose from
    the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003944
  source_id: SGD:S000003944
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-established.
    - rubric: utility
      score: 5
      notes: Comprehensive functional overview.
    - rubric: compactness
      score: 4
      notes: Dense but informative.
    - rubric: completeness
      score: 5
      notes: Covers polarisome, actin organization, MAPK scaffolding, Cdc28p substrate,
        polymorphism, and paralog.
    - rubric: specificity
      score: 5
      notes: Names specific kinases (Mkk1p, Mpk1p, Cdc28p) and complex (polarisome).
    overall_notes: Much more informative. Identifies polarisome membership, actin
      cytoskeletal organization, MAPK scaffold function (Mkk1p/Mpk1p), Cdc28p substrate,
      and strain polymorphism.
- source: Alliance_Automated
  text: Enables MAP-kinase scaffold activity. Involved in several processes, including
    bipolar cellular bud site selection; budding cell apical bud growth; and pseudohyphal
    growth. Located in several cellular components, including cellular bud tip; incipient
    cellular bud site; and mating projection tip. Part of polarisome.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003944
  source_id: SGD:S000003944
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Correct.
    - rubric: utility
      score: 4
      notes: MAP-kinase scaffold and polarisome are informative. Localization terms
        are specific.
    - rubric: compactness
      score: 4
      notes: Concise automated format.
    - rubric: completeness
      score: 3
      notes: Covers scaffold and polarisome but misses actin organization and specific
        kinase partners.
    - rubric: specificity
      score: 4
      notes: MAP-kinase scaffold activity is a specific and informative GO term.
    overall_notes: GO-derived summary that captures MAP-kinase scaffold activity and
      polarisome membership. Process terms (bud site selection, apical growth, pseudohyphal
      growth) are relevant.
- source: RefSeq
  text: Enables MAP-kinase scaffold activity. Involved in several processes, including
    bipolar cellular bud site selection; budding cell apical bud growth; and pseudohyphal
    growth. Located in several cellular components, including cellular bud tip; incipient
    cellular bud site; and mating projection tip. Part of polarisome. [provided by
    Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850639
  source_id: GeneID:850639
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: compactness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 4
      notes: Same as Alliance_Automated.
    overall_notes: Identical to Alliance_Automated with attribution tag.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Agreement on polarity role but UniProt is outdated and vague. Curated and
      automated sources agree on polarisome and MAPK scaffold.
  overall_notes: SGD curated is the best source by a large margin. UniProt is significantly
    outdated and uninformative. Automated sources are surprisingly good here, correctly
    capturing the MAPK scaffold and polarisome roles. All sources agree on cytoskeletal/polarity
    function.
