gene_symbol: SPA2
organism: yeast
uniprot_id: P23201
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Involved in pheromone-induced morphogenesis and efficient mating, perhaps
    as a cytoskeletal protein.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P23201
  source_id: P23201
- source: Alliance
  text: Component of the polarisome; functions in actin cytoskeletal organization
    during polarized growth; acts as a scaffold for Mkk1p and Mpk1p cell wall integrity
    signaling components; potential Cdc28p substrate; coding sequence contains length
    polymorphisms in different strains; SPA2 has a paralog, SPH1, that arose from
    the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003944
  source_id: SGD:S000003944
- source: Alliance
  text: Enables MAP-kinase scaffold activity. Involved in several processes, including
    bipolar cellular bud site selection; budding cell apical bud growth; and pseudohyphal
    growth. Located in several cellular components, including cellular bud tip; incipient
    cellular bud site; and mating projection tip. Part of polarisome.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003944
  source_id: SGD:S000003944
- source: RefSeq
  text: Enables MAP-kinase scaffold activity. Involved in several processes, including
    bipolar cellular bud site selection; budding cell apical bud growth; and pseudohyphal
    growth. Located in several cellular components, including cellular bud tip; incipient
    cellular bud site; and mating projection tip. Part of polarisome. [provided by
    Alliance of Genome Resources, Jul 2025]
