descriptions:
- source: UniProt
  text: Required for V-ATPase activity.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38784
  source_id: P38784
- source: Alliance
  text: Protein that is required for vacuolar H+-ATPase (V-ATPase) function; peripheral
    membrane protein; not an actual component of the V-ATPase complex; functions in
    the assembly of the V-ATPase; localized to the yeast endoplasmic reticulum (ER)
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001102
  source_id: SGD:S000001102
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in vacuolar acidification
    and vacuolar proton-transporting V-type ATPase complex assembly. Located in nucleus.
    Part of Vma12-Vma22 assembly complex. Used to study congenital disorder of glycosylation
    type IIo. Human ortholog(s) of this gene implicated in congenital disorder of
    glycosylation type IIo. Orthologous to human VMA22 (vacuolar ATPase assembly factor
    VMA22).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001102
  source_id: SGD:S000001102
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in vacuolar acidification
    and vacuolar proton-transporting V-type ATPase complex assembly. Located in nucleus.
    Part of Vma12-Vma22 assembly complex. Used to study congenital disorder of glycosylation
    type IIo. Human ortholog(s) of this gene implicated in congenital disorder of
    glycosylation type IIo. Orthologous to human CCDC115 (coiled-coil domain containing
    115). [provided by Alliance of Genome Resources, Jul 2025]
