gene_symbol: VMA22
organism: yeast
uniprot_id: P38784
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Required for V-ATPase activity.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38784
  source_id: P38784
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but so vague it barely conveys function.
    - rubric: utility
      score: 2
      notes: Minimal utility; does not explain how VMA22 contributes to V-ATPase function.
    - rubric: compactness
      score: 5
      notes: One sentence; maximally compact.
    - rubric: completeness
      score: 1
      notes: Misses assembly role, ER localization, peripheral membrane nature, Vma12p
        partnership.
    - rubric: specificity
      score: 1
      notes: Completely generic; could apply to any V-ATPase assembly factor.
    overall_notes: Extremely terse description. States only that VMA22 is required
      for V-ATPase activity without any mechanistic or localization detail.
- source: Alliance_Imported
  text: Protein that is required for vacuolar H+-ATPase (V-ATPase) function; peripheral
    membrane protein; not an actual component of the V-ATPase complex; functions in
    the assembly of the V-ATPase; localized to the yeast endoplasmic reticulum (ER)
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001102
  source_id: SGD:S000001102
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; peripheral membrane, ER localization, assembly factor not a
        subunit.
    - rubric: utility
      score: 5
      notes: 'Clearly explains the role: assembly factor in the ER, not a V-ATPase
        component itself.'
    - rubric: compactness
      score: 4
      notes: Good density of information.
    - rubric: completeness
      score: 4
      notes: Covers assembly role, ER localization, and non-subunit nature. Could
        mention Vma12p/Vma21p partners.
    - rubric: specificity
      score: 4
      notes: ER localization, peripheral membrane, and non-subunit distinction are
        specific.
    overall_notes: Much more informative. Identifies VMA22 as a peripheral membrane
      protein in the ER that functions in V-ATPase assembly but is not a V-ATPase
      subunit.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in vacuolar acidification
    and vacuolar proton-transporting V-type ATPase complex assembly. Located in nucleus.
    Part of Vma12-Vma22 assembly complex. Used to study congenital disorder of glycosylation
    type IIo. Human ortholog(s) of this gene implicated in congenital disorder of
    glycosylation type IIo. Orthologous to human VMA22 (vacuolar ATPase assembly factor
    VMA22).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001102
  source_id: SGD:S000001102
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: '"Nucleus" localization is questionable; VMA22 is primarily ER-localized.
        "Unfolded protein binding" is misleading.'
    - rubric: utility
      score: 3
      notes: Vma12-Vma22 complex name is useful; disease association adds context.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 3
      notes: Mentions assembly and complex but has incorrect localization.
    - rubric: specificity
      score: 3
      notes: Vma12-Vma22 complex and VMA22 orthology add specificity.
    overall_notes: GO-derived description. Mentions V-ATPase assembly and Vma12-Vma22
      complex which adds useful partner information. Disease link to glycosylation
      disorder is informative.
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in vacuolar acidification
    and vacuolar proton-transporting V-type ATPase complex assembly. Located in nucleus.
    Part of Vma12-Vma22 assembly complex. Used to study congenital disorder of glycosylation
    type IIo. Human ortholog(s) of this gene implicated in congenital disorder of
    glycosylation type IIo. Orthologous to human CCDC115 (coiled-coil domain containing
    115). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856457
  source_id: GeneID:856457
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Same nucleus localization issue. CCDC115 is the older name for human
        VMA22.
    - rubric: utility
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: compactness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 3
      notes: Same as Alliance_Automated.
    overall_notes: Similar to Alliance_Automated. Lists CCDC115 as human ortholog
      rather than VMA22, which is a nomenclature difference.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: All agree on V-ATPase involvement but there is a large information gap.
      UniProt is nearly useless. Possible localization discrepancy (ER vs nucleus)
      between SGD curated and automated sources.
  overall_notes: SGD curated is far superior to the minimalist UniProt entry. UniProt
    provides almost no useful information. Automated sources add the Vma12p partnership
    but have a questionable nucleus localization. The contrast between UniProt and
    SGD is striking for this gene.
