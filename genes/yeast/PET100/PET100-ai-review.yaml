- id: PMID:11498004
  title: Structure and function of Pet100p, a molecular chaperone required for the assembly of cytochrome c oxidase in Saccharomyces cerevisiae.
  findings:
  - statement: Pet100 is required for cytochrome c oxidase assembly and its C-terminal region is essential for function.
    supporting_text: "Pet100p is a molecular chaperone required for the assembly of cytochrome c oxidase."
- id: PMID:15507444
  title: 'A role for Pet100p in the assembly of yeast cytochrome c oxidase: interaction with a subassembly that accumulates in a pet100 mutant.'
  findings:
  - statement: Pet100 associates with a Cox7/Cox8/Cox9-containing assembly intermediate rather than the mature complex IV holoenzyme.
    supporting_text: "Pet100p physically interacts with a subassembly intermediate and is not present in the fully assembled holoenzyme."
