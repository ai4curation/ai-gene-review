core_functions:
- description: >-
    Pet100 is a mitochondrial inner-membrane complex IV assembly adaptor that
    promotes productive incorporation of the Cox7/Cox8/Cox9-containing module
    into cytochrome c oxidase. This assembly-factor activity is the core
    molecular role behind the petite/respiratory-deficient phenotype of pet100
    mutants.
