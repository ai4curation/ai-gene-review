suggested_questions:
- question: What is the direct Pet100 binding interface on the Cox7/Cox8/Cox9 assembly module and on later complex IV intermediates?
  experts:
  - mitochondrial respiratory-chain assembly experts
  - structural biologists
- question: Does Pet100 function primarily as a scaffold for subassembly docking, a stabilizer of an otherwise unstable module, or both?
  experts:
  - yeast mitochondrial biochemists
suggested_experiments:
- experiment_type: crosslinking mass spectrometry
  description: Map Pet100 contacts in wild-type and pet100 mutant-rescue strains during respiratory growth, focusing on Cox7, Cox8, Cox9, and later complex IV assembly intermediates.
  hypothesis: Pet100 makes specific contacts with the Cox7/Cox8/Cox9 module and a downstream complex IV intermediate, explaining its adaptor-like assembly role.
- experiment_type: blue-native PAGE pulse-chase assembly assay
  description: Follow newly synthesized complex IV subunits after acute Pet100 depletion or allele replacement and quantify accumulation or loss of defined Cox7/Cox8/Cox9-containing intermediates.
  hypothesis: Pet100 loss blocks conversion of a late subassembly into holo-complex IV rather than causing a general mitochondrial protein-import defect.
