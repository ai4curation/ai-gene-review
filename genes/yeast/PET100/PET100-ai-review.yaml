id: P38958
gene_symbol: PET100
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  PET100 encodes a small nuclear-encoded mitochondrial inner-membrane protein
  required for cytochrome c oxidase (respiratory complex IV) biogenesis. Pet100
  acts after mitochondrial import as a complex IV assembly factor associated
  with a late assembly intermediate containing Cox7, Cox8, and Cox9, promoting
  productive incorporation of this module into the holoenzyme. The evidence
  supports a complex IV assembly/adaptor role rather than generic unfolded
  protein binding. The conserved PANTHER family PTHR33968 contains mitochondrial
  PET100 homologs and is consistent with this specific respiratory-chain
  assembly function.
