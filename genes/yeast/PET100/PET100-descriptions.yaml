  text: Chaperone that facilitates the assembly of cytochrome c oxidase; integral
    to the mitochondrial inner membrane; interacts with a subcomplex of subunits VII,
    VIIa, and VIII (Cox7p, Cox9p, and Cox8p) but not with the holoenzyme
  source_type: curated
