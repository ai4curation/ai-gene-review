gene_symbol: PET100
organism: yeast
uniprot_id: P38958
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Good concordance on cytochrome c oxidase assembly. All sources agree on the
    mitochondrial localization and complex IV assembly function. SGD curated is the
    most informative, identifying PET100 as a chaperone, specifying the inner membrane
    localization, and naming the specific subcomplex it interacts with (subunits VII,
    VIIa, VIII / Cox7p, Cox9p, Cox8p). UniProt is disappointingly vague ("probably
    for its assembly into an active holoenzyme"). The automated descriptions are minimal.
    A notable issue: "unfolded protein binding" in the automated descriptions is
    questionable for PET100, which is an assembly factor, not a classical chaperone.
    Best source: Alliance (SGD) curated, which provides the most specific and accurate
    description. UniProt curated needs updating.
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: >-
      Agreement on core function (CcO assembly) is strong. Quality gap between SGD
      curated (excellent) and UniProt curated (minimal). "Unfolded protein binding"
      in automated descriptions is questionable.
descriptions:
- source: UniProt
  text: Required for the biogenesis of cytochrome c oxidase. Probably for its assembly
    into an active holoenzyme.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38958
  source_id: P38958
  review:
    reviewer: AI
    overall_notes: >-
      Very sparse and hedged. "Probably" suggests low confidence that is no longer
      warranted given current evidence. Does not identify PET100 as a chaperone/assembly
      factor, or specify which subunits it interacts with, or its membrane localization.
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but hedged unnecessarily; the assembly role is well-established.
    - rubric: utility
      score: 2
      notes: Too vague to distinguish PET100 from other CcO assembly factors.
    - rubric: compactness
      score: 5
      notes: Two short sentences; extreme brevity is a weakness here.
    - rubric: completeness
      score: 1
      notes: Misses chaperone identity, subunit specificity, membrane localization, subcomplex interaction.
    - rubric: specificity
      score: 1
      notes: '"Cytochrome c oxidase" is the only specific term; nothing distinguishes PET100 from other assembly factors.'
- source: Alliance_Imported
  text: Chaperone that facilitates the assembly of cytochrome c oxidase; integral
    to the mitochondrial inner membrane; interacts with a subcomplex of subunits VII,
    VIIa, and VIII (Cox7p, Cox9p, and Cox8p) but not with the holoenzyme
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002486
  source_id: SGD:S000002486
  review:
    reviewer: AI
    overall_notes: >-
      Excellent description. Identifies PET100 as a chaperone, specifies inner membrane
      localization, and names the exact subcomplex it interacts with. The negative
      detail (does not interact with holoenzyme) is valuable for understanding the
      temporal role in assembly. Most informative single description.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and specific.
    - rubric: utility
      score: 5
      notes: Immediately conveys what PET100 does, where, and with what partners.
    - rubric: compactness
      score: 5
      notes: Three clauses packed with information; no wasted words.
    - rubric: completeness
      score: 5
      notes: Covers function, localization, partners, and temporal specificity.
    - rubric: specificity
      score: 5
      notes: Names Cox7p, Cox9p, Cox8p subunits and specifies "not with the holoenzyme."
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in mitochondrial respiratory
    chain complex IV assembly. Located in mitochondrial inner membrane.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002486
  source_id: SGD:S000002486
  review:
    reviewer: AI
    overall_notes: >-
      Minimal. "Unfolded protein binding" is questionable for an assembly factor.
      "Complex IV assembly" is correct and specific enough for an automated description.
      Inner membrane localization matches SGD curated.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" is questionable; PET100 is an assembly factor that
        interacts with folded subunits in a subcomplex.
    - rubric: utility
      score: 2
      notes: Too minimal to understand PET100's specific role.
    - rubric: compactness
      score: 4
      notes: Very short.
    - rubric: completeness
      score: 2
      notes: Misses subunit specificity, chaperone identity, and temporal role.
    - rubric: specificity
      score: 3
      notes: '"Complex IV assembly" is reasonably specific; "unfolded protein binding" is generic.'
