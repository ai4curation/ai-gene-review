status: COMPLETE
descriptions:
- source: UniProt
  text: Mitochondrial intermembrane chaperone that participates in the import and
    insertion of multi-pass transmembrane proteins into the mitochondrial inner membrane.
    Also required for the transfer of beta- barrel precursors from the TOM complex
    to the sorting and assembly machinery (SAM complex) of the outer membrane. Acts
    as a chaperone-like protein that protects the hydrophobic precursors from aggregation
    and guide them through the mitochondrial intermembrane space. Compared to TIM10,
    it may have a strong structural role.
  source_type: curated
  url: https://www.uniprot.org/uniprot/O74700
  source_id: O74700
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; structural role distinction from TIM10 is well-supported.
    - rubric: utility
      score: 5
      notes: Comprehensive functional view with TIM10 comparison.
    - rubric: compactness
      score: 3
      notes: Same length as TIM10 description; moderately long.
    - rubric: completeness
      score: 5
      notes: Covers inner membrane import, beta-barrel transfer, chaperone function,
        and TIM10 comparison.
    - rubric: specificity
      score: 5
      notes: Names TOM, SAM complexes and distinguishes structural role from TIM10
        sensor role.
    overall_notes: Comprehensive description paralleling TIM10. Covers inner membrane
      and beta-barrel substrate transfer. Notes the structural role compared to TIM10
      substrate sensor role.
- source: Alliance_Imported
  text: Essential protein of the mitochondrial intermembrane space; forms a complex
    with Tim10p (TIM10 complex) that delivers hydrophobic proteins to the TIM22 complex
    for insertion into the inner membrane
