gene_symbol: TIM9
organism: yeast
uniprot_id: O74700
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Mitochondrial intermembrane chaperone that participates in the import and
    insertion of multi-pass transmembrane proteins into the mitochondrial inner membrane.
    Also required for the transfer of beta- barrel precursors from the TOM complex
    to the sorting and assembly machinery (SAM complex) of the outer membrane. Acts
    as a chaperone-like protein that protects the hydrophobic precursors from aggregation
    and guide them through the mitochondrial intermembrane space. Compared to TIM10,
    it may have a strong structural role.
  source_type: curated
  url: https://www.uniprot.org/uniprot/O74700
  source_id: O74700
- source: Alliance_Imported
  text: Essential protein of the mitochondrial intermembrane space; forms a complex
    with Tim10p (TIM10 complex) that delivers hydrophobic proteins to the TIM22 complex
    for insertion into the inner membrane
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000007256
  source_id: SGD:S000007256
- source: Alliance_Automated
  text: Enables protein transporter activity and unfolded protein binding activity.
    Involved in protein insertion into mitochondrial inner membrane. Located in mitochondrial
    inner membrane and mitochondrial intermembrane space. Part of TIM22 mitochondrial
    import inner membrane insertion complex and mitochondrial intermembrane space
    chaperone complex. Orthologous to several human genes including TIMM9 (translocase
    of inner mitochondrial membrane 9).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000007256
  source_id: SGD:S000007256
- source: RefSeq
  text: Enables protein transporter activity and unfolded protein binding activity.
    Involved in protein insertion into mitochondrial inner membrane. Located in mitochondrion.
    Part of TIM22 mitochondrial import inner membrane insertion complex and mitochondrial
    intermembrane space protein transporter complex. Orthologous to several human
    genes including TIMM9 (translocase of inner mitochondrial membrane 9). [provided
    by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856693
