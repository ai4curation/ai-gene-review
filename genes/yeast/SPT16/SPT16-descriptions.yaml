      notes: Quite lengthy; covers multiple aspects in detail.
    - rubric: completeness
      score: 5
      notes: Covers elongation, replication, repair, H2A-H2B dynamics, cryptic initiation
        suppression, TBP binding.
    - rubric: specificity
