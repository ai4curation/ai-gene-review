gene_symbol: SAN1
organism: yeast
uniprot_id: P22470
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Plays a specific role in mating-type regulation of yeast, by acting post-translationally
    to control the stability or activity of the SIR4 proteins.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P22470
  source_id: P22470
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 2
      notes: Outdated; SAN1 is now known as an E3 ubiquitin ligase for misfolded nuclear
        proteins.
    - rubric: utility
      score: 2
      notes: Misleading; gives wrong impression of primary function.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 1
      notes: Misses the ubiquitin ligase activity and protein quality control role.
    - rubric: specificity
      score: 2
      notes: Only mentions SIR4, which is a historical context not the core function.
    overall_notes: Outdated UniProt description focusing on SIR4 regulation; misses
      E3 ligase role.
- source: Alliance_Imported
  text: Ubiquitin-protein ligase; role in proteasome-dependent degradation of aberrant
    nuclear proteins; targets substrates with regions of exposed hydrophobicity; contains
    intrinsically disordered regions involved in substrate recognition; prefers a
    window of exposed hydrophobicity that causes a particular level of protein insolubility,
    suggesting that San1p evolved to target highly aggregation-prone proteins; localizes
    to the cytoplasm, nucleus and peroxisomes
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002550
  source_id: SGD:S000002550
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and current.
    - rubric: utility
      score: 5
      notes: Highly informative about substrate recognition and localization.
    - rubric: compactness
      score: 3
      notes: Dense but comprehensive.
    - rubric: completeness
      score: 5
      notes: Covers E3 ligase, proteasome degradation, hydrophobicity recognition,
        IDRs, and localization.
    - rubric: specificity
      score: 5
      notes: Describes specific recognition mechanism (exposed hydrophobicity, aggregation-prone
        targets).
    overall_notes: Excellent curated description of E3 ligase role in nuclear protein
      quality control.
- source: Alliance_Automated
  text: Enables denatured protein binding activity and ubiquitin-protein transferase
    activity. Involved in nuclear protein quality control by the ubiquitin-proteasome
    system and positive regulation of proteolysis involved in protein catabolic process.
    Located in cytoplasm and nucleus.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002550
  source_id: SGD:S000002550
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
