    - rubric: utility
      score: 3
      notes: Useful overview.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 3
      notes: Misses the substrate recognition mechanism.
    - rubric: specificity
      score: 4
      notes: Denatured protein binding is relatively specific.
    overall_notes: Good automated description capturing protein quality control.
- source: RefSeq
  text: Enables ubiquitin-protein transferase activity. Involved in nuclear protein
