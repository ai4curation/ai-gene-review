gene_symbol: ZNG1
organism: yeast
uniprot_id: P53729
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Zinc chaperone that directly transfers zinc cofactor to target metalloproteins,
    thereby activating them (PubMed:35584675). Catalyzes zinc insertion into the active
    site of methionine aminopeptidase MAP1, which function to cleave the initiator
    methionine from polypeptides during or after protein translation (PubMed:35584675).
    Mechanistically, the N-terminal psi-PxLVp motif binds to the C6H2-type zinc finger
    of inactive form of MAP1 (PubMed:35584675). After formation of the docked complex,
    zinc is transferred from the CXCC motif in the GTPase domain of ZNG1 to the zinc
    binding site in the peptidase domain of MAP1 in a process requiring GTP hydrolysis
    (PubMed:35584675). GTP/GDP exchange is required for release of active MAP1 (PubMed:35584675).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53729
  source_id: P53729
- source: Alliance
  text: GTP-dependent zinc transferase; couples GTP hydrolysis to the activation of
    methionine aminopeptidase Map1p, especially during zinc starvation; deletion confers
    reduced fitness in saline; contains GTPase sequence motifs and a CxCC metal-binding
    motif
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005312
  source_id: SGD:S000005312
- source: Alliance
  text: Enables GTPase activity; enzyme activator activity; and zinc chaperone activity.
    Involved in cellular response to zinc ion starvation and protein maturation. Located
    in cytoplasm. Orthologous to several human genes including ZNG1A (Zn regulated
    GTPase metalloprotein activator 1A); ZNG1B (Zn regulated GTPase metalloprotein
    activator 1B); and ZNG1C (Zn regulated GTPase metalloprotein activator 1C).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005312
  source_id: SGD:S000005312
