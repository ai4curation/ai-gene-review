gene_symbol: CDC37
organism: yeast
uniprot_id: P06101
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Good concordance across sources on the core co-chaperone / kinase-stabilization function.
    UniProt and Alliance curated descriptions are complementary: UniProt emphasizes the
    kinase-binding and stress-signaling role, while SGD highlights essentiality, cell-cycle
    requirement, and kinase nascent-chain stabilization. The automated descriptions are
    largely derivative of GO annotations and add little beyond ortholog mapping. UniProt
    curated is the most balanced single description; SGD curated adds the important detail
    about nascent-chain stabilization not found in UniProt. Neither curated description
    mentions spindle pole body duplication, which is a documented but non-core function.
    Best source: Alliance (SGD) curated, for its inclusion of essentiality and the
    mechanistic nascent-chain detail, though it would benefit from the stress-signaling
    context found in UniProt.
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: >-
      High agreement on Hsp90 co-chaperone and kinase stabilization. Minor divergence:
      SGD emphasizes cell cycle/nascent chain; UniProt emphasizes MAPK cascades.
      Automated descriptions add SPB duplication detail not in either curated source.
descriptions:
- source: UniProt
  text: Co-chaperone that binds to numerous kinases and promotes their interaction
    with the Hsp90 complex, resulting in stabilization and promotion of their activity.
    Involved in both the HOG and the PKC MAP kinase signaling cascade necessary for
    adaptation to stress conditions due to high osmolarity or cell wall perturbation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P06101
  source_id: P06101
  review:
    reviewer: AI
    overall_notes: >-
      Accurate and informative. Clearly conveys the kinase co-chaperone function and
      stress-signaling role. Misses the essential nature of CDC37, the cell-cycle
      requirement, and the nascent-chain stabilization mechanism. The MAPK cascade
      detail is valuable but arguably non-core.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All statements are well-supported by literature.
    - rubric: utility
      score: 4
      notes: Good for understanding Hsp90/kinase relationship; lacks cell-cycle context.
    - rubric: compactness
      score: 4
      notes: Concise two-sentence summary; could be slightly tighter.
    - rubric: completeness
      score: 3
      notes: Misses essentiality, cell-cycle role, nascent-chain stabilization, and SPB duplication.
    - rubric: specificity
      score: 4
      notes: Names specific pathways (HOG, PKC MAPK) which is good; does not name specific kinase clients.
- source: Alliance_Imported
  text: Essential Hsp90p co-chaperone; necessary for passage through the START phase
    of the cell cycle; stabilizes protein kinase nascent chains and participates along
    with Hsp90p in their folding
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002575
  source_id: SGD:S000002575
  review:
    reviewer: AI
    overall_notes: >-
      Excellent compact summary that uniquely captures essentiality, cell-cycle
      requirement, and nascent-chain stabilization mechanism. Lacks the stress-signaling
      (HOG/PKC) context that UniProt provides. The most mechanistically informative
      of the curated descriptions.
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; nascent chain stabilization is well-documented (PMID:17242065).
    - rubric: utility
      score: 5
      notes: Immediately conveys what CDC37 does and why it matters (essential, cell cycle, mechanism).
    - rubric: compactness
      score: 5
      notes: Three tightly packed clauses; no wasted words.
    - rubric: completeness
      score: 4
      notes: Misses stress-signaling pathways and SPB duplication, but captures the core well.
    - rubric: specificity
      score: 4
      notes: '"Nascent chains" and "START phase" are specific; could name example kinase clients.'
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in several processes,
    including p38MAPK cascade; protein stabilization; and spindle pole body duplication.
    Located in cytoplasm. Orthologous to several human genes including CDC37 (cell
    division cycle 37, HSP90 cochaperone).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002575
  source_id: SGD:S000002575
  review:
    reviewer: AI
    overall_notes: >-
      Generic GO-derived description. "Unfolded protein binding" is misleading for CDC37,
      which is a kinase-specific co-chaperone, not a general unfolded protein binder.
      The p38MAPK reference is a reasonable functional annotation but lacks context.
      Ortholog mapping is useful.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" is misleading; CDC37 binds kinase clients specifically,
        not generic unfolded proteins. Other statements are correct.
    - rubric: utility
      score: 2
      notes: Flat list of GO terms provides little mechanistic insight.
    - rubric: compactness
      score: 4
      notes: Short, but brevity here reflects lack of content rather than good editing.
    - rubric: completeness
      score: 2
      notes: Misses co-chaperone function, essentiality, Hsp90 partnership.
    - rubric: specificity
      score: 2
      notes: Uses generic "unfolded protein binding" rather than kinase-specific co-chaperone terminology.
