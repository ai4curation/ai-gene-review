  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cdc37 does bind non-native kinase clients, but the broad "unfolded protein
      binding" term obscures the kinase-specific co-chaperone mechanism.
    action: MODIFY
    reason: >-
      Replace the generic binding term with protein-folding chaperone activity;
      kinase client binding is already captured by the accepted GO:0019901 annotation.
    proposed_replacement_terms:
