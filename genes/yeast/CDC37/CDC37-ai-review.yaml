suggested_questions:
- question: >-
    Which yeast kinase clients require Cdc37 primarily for nascent-chain
    stabilization versus later Hsp90-dependent maturation?
- question: >-
    Are there yeast stress conditions that shift Cdc37 client specificity beyond
    the kinases already surveyed by abundance and interaction assays?
suggested_experiments:
- experiment_type: quantitative proteomics
  hypothesis: >-
    Distinct kinase subclasses show different dependence on Cdc37 for
    nascent-chain stabilization versus post-translational maturation.
  description: >-
    Pulse-SILAC or equivalent time-resolved proteomics in phosphosite and
    temperature-sensitive cdc37 mutants, paired with kinase activity assays, to
    separate defects in kinase synthesis, stability, and maturation.
