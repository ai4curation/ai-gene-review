id: P06101
gene_symbol: CDC37
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  CDC37 encodes an essential cytosolic Hsp90 co-chaperone that specializes the
  Hsp90 system for protein kinase clients. Cdc37 binds protein kinases and Hsp90,
  promotes Hsp90-kinase complex formation, protects nascent kinase chains from
  rapid degradation, and supports post-translational kinase maturation. Its
  client effects explain downstream roles in Cdc28/Cak1-dependent cell-cycle
  progression, MAP kinase signaling, osmotic and cell wall stress responses, and
  spindle pole body duplication, but the core function is kinase-specific
  chaperone/adaptor activity rather than those downstream pathways themselves.
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The phylogenetic cytoplasm annotation is consistent with experimental
      localization and with Cdc37 acting in cytosolic Hsp90-kinase complexes.
    action: ACCEPT
    reason: >-
      Cdc37 is experimentally detected in the cytoplasm and its core Hsp90
      co-chaperone activity is carried out in the cytosolic chaperone machinery.
    supported_by:
    - reference_id: PMID:14562095
      supporting_text: Global analysis of protein localization in budding yeast.
    - reference_id: file:yeast/CDC37/CDC37-deep-research-falcon.md
      supporting_text: >-
        Cdc37's functional locale is best described as the cytosolic chaperone
        machinery, where it forms transient Cdc37-kinase and
        Hsp90-Cdc37-kinase complexes.
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Cdc37 is a kinase-directed Hsp90 co-chaperone required for productive
      folding and maturation of protein kinases.
    action: ACCEPT
    reason: >-
      Although Cdc37 is not a general foldase for all proteins, the annotation
      accurately captures its core role in protein kinase folding/maturation in
      the Hsp90 pathway.
    supported_by:
    - reference_id: PMID:17242065
      supporting_text: >-
        Cdc37 functions at distinct steps in kinase biogenesis that involves
        protecting nascent chains from rapid degradation followed by its folding
        function in association with Hsp90.
    - reference_id: file:yeast/CDC37/CDC37-deep-research-falcon.md
      supporting_text: >-
        Cdc37 selectively recognizes kinase clients and promotes their
        stabilization and productive engagement with Hsp90 to achieve
        folding/maturation and functional activation.
- term:
    id: GO:0031072
    label: heat shock protein binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The annotation reflects the well-established physical and functional
      interaction between Cdc37 and Hsp90.
    action: ACCEPT
    reason: >-
      Hsp90 binding is central to Cdc37 function as a kinase-targeting adaptor
      and is supported by biochemical and genetic evidence for Hsp90-Cdc37-kinase
      complexes.
    supported_by:
    - reference_id: PMID:9242486
      supporting_text: >-
        The identification of Cdc37 as the 50-kD protein in several Hsp90-kinase
        complexes, together with other data, led to the recent suggestion that
        Cdc37 is a kinase-targeting "subunit" of Hsp90.
    - reference_id: PMID:17220467
      supporting_text: >-
        The interaction of Hsp90, Slt2p, and Hog1p with Cdc37p depends on the
        phosphorylation status of Cdc37p.
- term:
    id: GO:0050821
    label: protein stabilization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Protein stabilization is a core biological process for Cdc37, specifically
      stabilization of protein kinase clients.
    action: ACCEPT
    reason: >-
      Multiple studies show that Cdc37 maintains kinase abundance and protects
      newly synthesized kinases from degradation.
    supported_by:
    - reference_id: PMID:17242065
      supporting_text: >-
        showed that 51 had decreased abundance compared with levels in the
        wild-type strain.
    - reference_id: file:yeast/CDC37/CDC37-deep-research-falcon.md
      supporting_text: >-
        In a panel of 65 kinases, 51 showed decreased abundance in a cdc37
        mutant, supporting a broad role in kinase homeostasis.
- term:
