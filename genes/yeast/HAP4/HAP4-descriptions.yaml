gene_symbol: HAP4
organism: yeast
uniprot_id: P14064
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Acts a component of the CCAT-binding factor, which is a transcriptional activator
    and binds to the upstream activation site (UAS2) of the CYC1 gene and other genes
    involved in mitochondrial electron transport and activates their expression. Recognizes
    the sequence 5'-CCAAT-3'. HAP4 encodes a regulatory subunit of the DNA- bound
    complex and seems to provide the principal transcriptional activation domains.
    Does not bind DNA directly, but augments the binding of HAP2 and HAP3.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P14064
  source_id: P14064
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of HAP4 as regulatory/activation subunit.
    - rubric: utility
      score: 5
      notes: Highly informative about transcriptional mechanism.
    - rubric: compactness
      score: 3
      notes: Moderately detailed.
    - rubric: completeness
      score: 4
      notes: Covers CCAAT binding, UAS2, activation domain, and HAP2/HAP3 interaction;
        misses glucose repression and diauxic shift.
    - rubric: specificity
      score: 5
      notes: 'Specific: CCAAT, UAS2, CYC1, HAP2/HAP3 augmentation.'
    overall_notes: Detailed description of CCAAT-binding factor component role, CYC1
      activation, and HAP2/HAP3 interaction.
- source: Alliance_Imported
  text: Transcription factor; subunit of the heme-activated, glucose-repressed Hap2p/3p/4p/5p
    CCAAT-binding complex, a transcriptional activator and global regulator of respiratory
    gene expression; provides the principal activation function of the complex; involved
    in diauxic shift
  source_type: curated
