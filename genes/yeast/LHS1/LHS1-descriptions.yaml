- source: Alliance
  text: Molecular chaperone of the endoplasmic reticulum lumen; involved in polypeptide
    translocation and folding; nucleotide exchange factor for the ER lumenal Hsp70
    chaperone Kar2p; regulated by the unfolded protein response pathway
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001556
  source_id: SGD:S000001556
- source: Alliance
  text: Enables ATP binding activity; adenyl-nucleotide exchange factor activity;
    and unfolded protein binding activity. Involved in post-translational protein
    targeting to membrane, translocation and response to unfolded protein. Located
    in endoplasmic reticulum lumen. Human ortholog(s) of this gene implicated in immunodeficiency
    59. Orthologous to human HYOU1 (hypoxia up-regulated 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001556
