review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Agreement on ER chaperone function. SGD uniquely identifies the Kar2p NEF
      role. UniProt is too minimal.
  overall_notes: 'UniProt is too brief to be useful. Alliance_Imported (SGD) is excellent,
    identifying LHS1 as a Kar2p nucleotide exchange factor regulated by UPR. Automated
    descriptions capture NEF activity but miss the Kar2p specificity. Best source:
    Alliance_Imported.'
