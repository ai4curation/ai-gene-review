gene_symbol: SSA1
organism: yeast
uniprot_id: P10591
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: May play a role in the transport of polypeptides both across the mitochondrial
    membranes and into the endoplasmic reticulum. A functional difference between
    SSA1 and SSA2 proteins is expected. SSA1 can participate in the ATP-dependent
    disassembly of clathrin-coated vesicles.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P10591
  source_id: P10591
- source: Alliance_Imported
  text: ATPase involved in protein folding and NLS-directed nuclear transport; HSP70
    family member; required for ubiquitin-dependent degradation of short-lived proteins;
    forms a chaperone complex with Ydj1p; localizes to the nucleus, cytoplasm and
    cell wall; unique functional specificity in the propagation of yeast [URE3] prions
    and vacuolar-mediated degradation of gluconeogenic enzymes; general targeting
    factor of Hsp104p to prion fibrils; 98% identity with paralog Ssa2p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000004
  source_id: SGD:S000000004
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity; tRNA binding activity; and unfolded protein
    binding activity. Involved in several processes, including gene expression; intracellular
    protein transport; and protein-containing complex disassembly. Located in fungal-type
    cell wall; fungal-type vacuole membrane; and nucleus. Human ortholog(s) of this
    gene implicated in several diseases, including Kawasaki disease; artery disease
    (multiple); autoimmune disease of musculoskeletal system (multiple); neurodegenerative
    disease (multiple); and schizophrenia (multiple). Orthologous to several human
    genes including HSPA1L (heat shock protein family A (Hsp70) member 1 like); HSPA1A
    (heat shock protein family A (Hsp70) member 1A); and HSPA1B (heat shock protein
    family A (Hsp70) member 1B).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000004
  source_id: SGD:S000000004
- source: RefSeq
  text: Enables ATP hydrolysis activity; tRNA binding activity; and unfolded protein
    binding activity. Involved in several processes, including establishment of protein
    localization to organelle; gene expression; and protein-containing complex disassembly.
    Located in fungal-type cell wall; fungal-type vacuole membrane; and nucleus. Human
    ortholog(s) of this gene implicated in several diseases, including Kawasaki disease;
    artery disease (multiple); autoimmune disease of musculoskeletal system (multiple);
    neurodegenerative disease (multiple); and schizophrenia (multiple). Orthologous
    to several human genes including HSPA1L (heat shock protein family A (Hsp70) member
    1 like); HSPA1A (heat shock protein family A (Hsp70) member 1A); and HSPA1B (heat
    shock protein family A (Hsp70) member 1B). [provided by Alliance of Genome Resources,
    Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/851259
  source_id: GeneID:851259
