review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Agreement on general chaperone/ATPase function. UniProt misses major roles;
      SGD curated is clearly the best source.
  overall_notes: SGD curated provides the most comprehensive description by far. UniProt
    is outdated and misses major functions (folding, prion, degradation). Automated
    sources are generic. All agree on the general chaperone role but differ greatly
    in depth.
