    - rubric: compactness
      score: 4
      notes: Appropriately concise.
    - rubric: completeness
      score: 2
      notes: Omits actin/tubulin targets and transcription elongation role.
    - rubric: specificity
      score: 3
      notes: Mentions c-CPN but not specific substrates.
    overall_notes: General description of prefoldin chaperone function without yeast-specific
      detail.
- source: Alliance_Imported
  text: Subunit of heterohexameric prefoldin; prefoldin binds cytosolic chaperonin
    and transfers target proteins to it; involved in the biogenesis of actin and of
    alpha- and gamma-tubulin; prefoldin complex also localizes to chromatin of actively
    transcribed genes in the nucleus and facilitates transcriptional elongation
  source_type: curated
