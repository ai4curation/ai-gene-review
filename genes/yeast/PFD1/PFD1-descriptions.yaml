gene_symbol: PFD1
organism: yeast
uniprot_id: P46988
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Binds specifically to cytosolic chaperonin (c-CPN) and transfers target proteins
    to it. Binds to nascent polypeptide chain and promotes folding in an environment
    in which there are many competing pathways for nonnative proteins.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P46988
  source_id: P46988
- source: Alliance
  text: Subunit of heterohexameric prefoldin; prefoldin binds cytosolic chaperonin
    and transfers target proteins to it; involved in the biogenesis of actin and of
    alpha- and gamma-tubulin; prefoldin complex also localizes to chromatin of actively
    transcribed genes in the nucleus and facilitates transcriptional elongation
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003715
  source_id: SGD:S000003715
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in cytoskeleton organization;
    positive regulation of transcription elongation by RNA polymerase II; and protein
    folding. Part of prefoldin complex. Orthologous to human PFDN1 (prefoldin subunit
    1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003715
  source_id: SGD:S000003715
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in cytoskeleton organization;
    positive regulation of transcription elongation by RNA polymerase II; and protein
    folding. Part of prefoldin complex. Orthologous to human PFDN1 (prefoldin subunit
    1). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
