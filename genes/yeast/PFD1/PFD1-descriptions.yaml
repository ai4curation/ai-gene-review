descriptions:
- source: UniProt
  text: Binds specifically to cytosolic chaperonin (c-CPN) and transfers target proteins
    to it. Binds to nascent polypeptide chain and promotes folding in an environment
    in which there are many competing pathways for nonnative proteins.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P46988
