descriptions:
- source: UniProt
  text: Not known. One of the major polypeptides produced on heat shock.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P15992
  source_id: P15992
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 2
      notes: States "Not known" which was true historically but is now incorrect given
        established chaperone function.
    - rubric: utility
      score: 1
      notes: Provides essentially no functional information.
    - rubric: compactness
      score: 5
      notes: Very short, but only because it says almost nothing.
    - rubric: completeness
      score: 1
      notes: Misses chaperone activity, oligomerization, aggregation suppression,
        mRNA binding, and heat-activation.
    - rubric: specificity
      score: 1
      notes: No specific functional information at all.
    overall_notes: Extremely outdated and uninformative. Simply states function is
      not known, despite extensive characterization of HSP26 as a small heat shock
      protein with chaperone activity.
- source: Alliance_Imported
  text: Small heat shock protein (sHSP) with chaperone activity; forms hollow, sphere-shaped
    oligomers that suppress unfolded proteins aggregation; long-lived protein that
    is preferentially retained in mother cells and forms cytoplasmic foci; oligomer
    activation requires heat-induced conformational change; also has mRNA binding
    activity
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000276
  source_id: SGD:S000000276
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims well-supported by literature.
    - rubric: utility
      score: 5
      notes: Comprehensive view of HSP26 biology.
    - rubric: compactness
      score: 4
      notes: Dense but well-organized.
    - rubric: completeness
      score: 5
      notes: Covers chaperone activity, structure, inheritance, activation mechanism,
        and mRNA binding.
    - rubric: specificity
      score: 5
      notes: Mentions sphere-shaped oligomers, conformational change activation, mother
        cell retention.
    overall_notes: Excellent and current. Covers sHSP identity, chaperone activity,
      oligomerization, aggregation suppression, asymmetric inheritance, heat activation,
      and mRNA binding.
- source: Alliance_Automated
  text: Enables identical protein binding activity; mRNA binding activity; and unfolded
    protein binding activity. Involved in cellular response to heat and protein folding.
    Located in cytoplasmic stress granule and nucleus.
