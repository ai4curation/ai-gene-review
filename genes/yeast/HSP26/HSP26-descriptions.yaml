- source: Alliance_Imported
  text: Small heat shock protein (sHSP) with chaperone activity; forms hollow, sphere-shaped
    oligomers that suppress unfolded proteins aggregation; long-lived protein that
    is preferentially retained in mother cells and forms cytoplasmic foci; oligomer
    activation requires heat-induced conformational change; also has mRNA binding
    activity
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000276
  source_id: SGD:S000000276
- source: Alliance_Automated
  text: Enables identical protein binding activity; mRNA binding activity; and unfolded
    protein binding activity. Involved in cellular response to heat and protein folding.
    Located in cytoplasmic stress granule and nucleus.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000276
  source_id: SGD:S000000276
