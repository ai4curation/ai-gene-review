    - rubric: utility
      score: 1
      notes: Nearly useless; does not explain what YAR1 does.
    - rubric: compactness
      score: 5
      notes: Maximally compact.
    - rubric: completeness
      score: 1
      notes: Misses the ribosomal protein chaperone function, Rps3p delivery, ankyrin
        repeats, stress adaptation.
    - rubric: specificity
