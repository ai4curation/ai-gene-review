- source: UniProt
  text: Required for normal rate of cell proliferation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P46683
  source_id: P46683
- source: Alliance
  text: Nucleocytoplasmic shuttling assembly chaperone; co-translationally associates
    with nascent Rps3p in the cytoplasm and delivers it to pre-ribosomal subunits
    in the nucleus; required for 40S ribosomal subunit nuclear export, biogenesis
    and adaptation to osmotic and oxidative stress;  contains ankyrin-repeats; expression
    repressed by heat shock
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000006160
  source_id: SGD:S000006160
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in several processes,
    including cellular response to oxidative stress; response to osmotic stress; and
    ribosome biogenesis. Located in nucleus.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000006160
