      notes: Completely generic; "required for normal rate of cell proliferation"
        tells nothing specific.
    overall_notes: Extremely terse and uninformative. States only a cell proliferation
      rate requirement without explaining the molecular function.
- source: Alliance_Imported
  text: Nucleocytoplasmic shuttling assembly chaperone; co-translationally associates
    with nascent Rps3p in the cytoplasm and delivers it to pre-ribosomal subunits
    in the nucleus; required for 40S ribosomal subunit nuclear export, biogenesis
    and adaptation to osmotic and oxidative stress;  contains ankyrin-repeats; expression
    repressed by heat shock
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000006160
  source_id: SGD:S000006160
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; cotranslational Rps3p association, nuclear delivery, and stress
        roles are well-documented.
    - rubric: utility
      score: 5
      notes: Comprehensive functional view of YAR1 as a dedicated ribosomal protein
        chaperone.
    - rubric: compactness
      score: 4
      notes: Information-dense with semicolon format.
    - rubric: completeness
      score: 5
      notes: Covers chaperone function, Rps3p delivery, 40S export, stress adaptation,
        ankyrin repeats, heat shock regulation.
    - rubric: specificity
      score: 5
      notes: Names Rps3p, 40S subunit, ankyrin repeats, osmotic and oxidative stress,
        heat shock repression.
    overall_notes: Excellent description. Identifies YAR1 as a nucleocytoplasmic shuttling
      assembly chaperone for Rps3p, with roles in 40S biogenesis, stress adaptation,
      ankyrin repeats, and heat shock regulation.
