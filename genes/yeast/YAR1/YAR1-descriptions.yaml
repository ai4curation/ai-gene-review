review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 2
    notes: Poor concordance. UniProt describes a growth phenotype while SGD describes
      a ribosomal protein chaperone. No contradiction but a massive information gap.
  overall_notes: Extreme contrast between sources. UniProt is nearly useless for YAR1,
    providing only a generic growth phenotype. SGD curated is outstanding, covering
    the full ribosomal protein chaperone function. This is one of the largest quality
    gaps between UniProt and SGD in the yeast gene set.
