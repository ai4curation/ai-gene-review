gene_symbol: SAS3
organism: yeast
uniprot_id: P34218
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Catalytic component of the NuA3 histone acetyltransferase complex, that acetylates
    H3K14 (PubMed:10600516, PubMed:10817755, PubMed:11731478, PubMed:16581777, PubMed:17157260,
    PubMed:25104842). The NuA3 HAT complex has 2 functionally distinct forms. NuA3a
    binds H3K4me3, through the PHD finger of YNG1, and acetylates H3K14 at the promoter
    region of actively transcribed genes to promote transcription initiation. NuA3b
    binds H3K36me3 at the coding regions of actively transcribed genes, through the
    PWWP domain of PDP3, and coordinates transcription elongation (PubMed:17157260,
    PubMed:25104842). In vitro, SAS3 acetylates free histones H3 and H4 (PubMed:10600516).
    It is involved in silencing the HMR locus (PubMed:16581777, PubMed:8782818).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P34218
  source_id: P34218
- source: Alliance
  text: Histone acetyltransferase catalytic subunit of NuA3 complex; acetylates histone
    H3, involved in transcriptional silencing; homolog of the mammalian MOZ proto-oncogene;
    mutant has aneuploidy tolerance; sas3gcn5 double mutation is lethal
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000148
  source_id: SGD:S000000148
- source: Alliance
  text: Enables histone acetyltransferase activity. Involved in silent mating-type
    cassette heterochromatin formation and subtelomeric heterochromatin formation.
    Part of NuA3a histone acetyltransferase complex and NuA3b histone acetyltransferase
    complex. Human ortholog(s) of this gene implicated in Ohdo syndrome, SBBYS variant;
    bipolar disorder; breast cancer; and leiomyoma. Orthologous to human KAT6B (lysine
    acetyltransferase 6B) and KAT7 (lysine acetyltransferase 7).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000148
  source_id: SGD:S000000148
