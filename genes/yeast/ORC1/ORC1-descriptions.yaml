gene_symbol: ORC1
organism: yeast
uniprot_id: P54784
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the origin recognition complex (ORC) that binds origins of replication.
    It has a role in both chromosomal replication and mating type transcriptional
    silencing. Binds to the ARS consensus sequence (ACS) of origins of replication.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P54784
  source_id: P54784
- source: Alliance_Imported
  text: Largest subunit of the origin recognition complex; involved in directing DNA
    replication by binding to replication origins; also involved in transcriptional
    silencing; exhibits ATPase activity; role in chromatin organization at replication
    origins, along with chromatin remodellers; ORC1 has a paralog, SIR3, that arose
    from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004530
  source_id: SGD:S000004530
- source: Alliance_Automated
  text: Enables several functions, including ATP binding activity; ATP hydrolysis
    activity; and DNA replication origin binding activity. Involved in DNA metabolic
    process and silent mating-type cassette heterochromatin formation. Acts upstream
    of or within nucleosome organization. Located in nucleus. Part of DNA replication
    preinitiation complex; nuclear origin of replication recognition complex; and
    nuclear pre-replicative complex. Used to study Meier-Gorlin syndrome. Human ortholog(s)
    of this gene implicated in Meier-Gorlin syndrome 1. Orthologous to human ORC1
    (origin recognition complex subunit 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004530
  source_id: SGD:S000004530
- source: RefSeq
