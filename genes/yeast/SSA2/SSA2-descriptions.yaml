    - rubric: compactness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 3
      notes: Proteasome-mediated degradation is a useful specific process.
    overall_notes: Similar to Alliance_Automated with slightly different process terms
      (proteasome-mediated degradation instead of protein folding). Same limitations.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Agreement on HSP70 chaperone function. UniProt is uninformative about SSA2-specific
      roles. SGD curated provides the critical distinctions.
  overall_notes: SGD curated is clearly the best source with SSA2-specific biology.
    UniProt fails to distinguish SSA2 from SSA1 despite claiming a functional difference
    exists. Automated sources provide some pathway-level detail. No contradictions
    across sources.
