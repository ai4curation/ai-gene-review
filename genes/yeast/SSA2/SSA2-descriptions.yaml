descriptions:
- source: UniProt
  text: May play a role in the transport of polypeptides both across the mitochondrial
    membranes and into the endoplasmic reticulum. A functional difference between
    SSA1 and SSA2 proteins is expected. SSA2 can participate in the ATP-dependent
    disassembly of clathrin-coated vesicles.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P10592
  source_id: P10592
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but tentative and uninformative about SSA2-specific function.
    - rubric: utility
      score: 2
      notes: Does not distinguish SSA2 from SSA1 despite asserting functional differences.
    - rubric: compactness
      score: 4
      notes: Three sentences.
    - rubric: completeness
      score: 2
      notes: 'Same gaps as SSA1 UniProt: misses HSP70, protein folding, degradation,
        prion roles.'
    - rubric: specificity
      score: 2
      notes: No SSA2-specific information despite claiming functional difference.
    overall_notes: Nearly identical to SSA1 UniProt entry. Same hedging and same gaps.
      Does not explain what distinguishes SSA2 from SSA1 despite noting a functional
      difference is expected.
- source: Alliance_Imported
  text: HSP70 family ATP-binding protein; role in protein folding and vacuolar protein
    import; required for Ub-dependent degradation of short-lived proteins; associated
    with the chaperonin-containing T-complex; unique specificity in propagation of
    [URE3] prions and vacuolar degradation of gluconeogenic enzymes; contributes to
    tRNA nuclear import during starvation; targeted to vacuoles via the AP-3 pathway;
    localizes to exosomes during heat stress with a role in thermotolerance; 98% identity
    with Ssa1p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003947
  source_id: SGD:S000003947
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate with good coverage of SSA2-specific biology.
    - rubric: utility
      score: 5
      notes: Excellent. Clearly conveys SSA2-specific roles (exosome, tRNA import,
        AP-3 targeting).
    - rubric: compactness
      score: 4
      notes: Dense but appropriately detailed for multifunctional protein.
    - rubric: completeness
      score: 5
      notes: Covers enzymatic activity, folding, degradation, prion, tRNA import,
        exosome, AP-3, paralogy.
    - rubric: specificity
      score: 5
      notes: Names T-complex, URE3, AP-3 pathway, exosomes, and specific pathways.
    overall_notes: Comprehensive. Covers HSP70 ATPase function, protein folding, vacuolar
      import, ubiquitin-dependent degradation, T-complex association, prion propagation,
      tRNA import, AP-3 vacuolar targeting, exosome thermotolerance role, and 98%
      identity with Ssa1p.
- source: Alliance_Automated
  text: Enables ATP binding activity; tRNA binding activity; and unfolded protein
    binding activity. Involved in several processes, including SRP-dependent cotranslational
    protein targeting to membrane, translocation; protein folding; and tRNA import
    into nucleus. Located in several cellular components, including fungal-type cell
    wall; fungal-type vacuole membrane; and mitochondrion. Is active in extracellular
    vesicle. Human ortholog(s) of this gene implicated in several diseases, including
    Kawasaki disease; artery disease (multiple); autoimmune disease of musculoskeletal
    system (multiple); neurodegenerative disease (multiple); and schizophrenia (multiple).
    Orthologous to several human genes including HSPA1L (heat shock protein family
    A (Hsp70) member 1 like); HSPA1A (heat shock protein family A (Hsp70) member 1A);
    and HSPA1B (heat shock protein family A (Hsp70) member 1B).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003947
  source_id: SGD:S000003947
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
