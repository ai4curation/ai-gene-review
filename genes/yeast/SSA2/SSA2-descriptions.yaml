- source: RefSeq
  text: Enables ATP binding activity; tRNA binding activity; and unfolded protein
    binding activity. Involved in several processes, including SRP-dependent cotranslational
    protein targeting to membrane, translocation; proteasome-mediated ubiquitin-dependent
    protein catabolic process; and tRNA import into nucleus. Located in several cellular
    components, including fungal-type cell wall; fungal-type vacuole membrane; and
    mitochondrion. Is active in extracellular vesicle. Human ortholog(s) of this gene
    implicated in several diseases, including Kawasaki disease; artery disease (multiple);
    autoimmune disease of musculoskeletal system (multiple); neurodegenerative disease
    (multiple); and schizophrenia (multiple). Orthologous to several human genes including
    HSPA1L (heat shock protein family A (Hsp70) member 1 like); HSPA1A (heat shock
    protein family A (Hsp70) member 1A); and HSPA1B (heat shock protein family A (Hsp70)
    member 1B). [provided by Alliance of Genome Resources, Apr 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850636
  source_id: GeneID:850636
