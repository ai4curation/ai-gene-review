descriptions:
- source: UniProt
  text: Mitochondrial intermembrane chaperone that participates in the import and
    insertion of multi-pass transmembrane proteins into the mitochondrial inner membrane.
    Also required for the transfer of beta- barrel precursors from the TOM complex
    to the sorting and assembly machinery (SAM complex) of the outer membrane. Acts
    as a chaperone-like protein that protects the hydrophobic precursors from aggregation
    and guide them through the mitochondrial intermembrane space. Compared to TIM9,
    it may function as a substrate sensor.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P87108
  source_id: P87108
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-cited mechanistic description.
    - rubric: utility
      score: 5
      notes: Excellent functional context including dual role (inner and outer membrane
        substrates).
    - rubric: compactness
      score: 3
      notes: Moderately long for a gene description.
    - rubric: completeness
      score: 5
      notes: Covers inner membrane import, beta-barrel transfer, chaperone function,
        and TIM9 comparison.
    - rubric: specificity
      score: 5
      notes: Names TOM, SAM, TIM22 complexes and the substrate sensor role.
    overall_notes: Comprehensive description covering inner membrane protein import,
      outer membrane beta-barrel transfer via SAM complex, chaperone function in IMS,
      and substrate sensor role compared to TIM9.
