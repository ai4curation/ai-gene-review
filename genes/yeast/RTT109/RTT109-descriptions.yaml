descriptions:
- source: UniProt
  text: Histone chaperone-dependent acetylase that modifies 'Lys-9', 'Lys-14', 'Lys-23',
    'Lys-27', and 'Lys-56' on histone H3 (H3K9Ac, H3K14Ac and H3K23Ac, H3K27Ac, and
    H3K56Ac) to promote nucleosome assembly, genomic stability, DNA repair and transcriptional
    regulation during mitotic S-phase (PubMed:17046836, PubMed:17272723, PubMed:17320445,
    PubMed:17369253, PubMed:18723682, PubMed:19172748, PubMed:19683497, PubMed:20560668,
    PubMed:21256037, PubMed:29300933, PubMed:31194870). Its residue selectivity is
    influenced by the acetylation status of histone H3, and also the presence of histone
    chaperone ASF1 that shifts selectivity to 'Lys-56' when H3K14Ac is already present
    (PubMed:31194870). H3K56 acetylation weakens the interaction between the histone
    core and the surrounding DNA in the nucleosomal particle and drives chromatin
    disassembly (PubMed:18577595). Autoacetylates (PubMed:18568037, PubMed:18707894,
    PubMed:18719104). Independently of acetyltransferase activity, stimulates histone
    deposition by VPS75 (PubMed:19172748). Involved in regulation of Ty1 transposition
    (PubMed:11779788).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q07794
  source_id: Q07794
- source: Alliance_Imported
  text: Histone acetyltransferase; critical for cell survival in presence of DNA damage
    during S phase, required for recovery after DSB repair; acetylates H3K56, H3K9;
    H3K56 acetylation activity required for expression homeostasis, buffering of mRNA
    synthesis rate against changes in gene dosage during S phase; involved in non-homologous
    end joining and regulation of Ty1 transposition; prevents hyper-amplification
    of rDNA; interacts physically with Vps75p
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003925
  source_id: SGD:S000003925
- source: Alliance_Automated
  text: Enables histone H3 acetyltransferase activity. Involved in several processes,
    including DNA metabolic process; DNA replication-dependent chromatin assembly;
    and regulation of macromolecule metabolic process. Located in chromatin and nucleus.
    Part of H3 histone acetyltransferase complex.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003925
  source_id: SGD:S000003925
