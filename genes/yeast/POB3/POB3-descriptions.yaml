gene_symbol: POB3
organism: yeast
uniprot_id: Q04636
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the FACT complex, a general chromatin factor that acts to reorganize
    nucleosomes. The FACT complex is involved in multiple processes that require DNA
    as a template such as mRNA elongation, DNA replication and DNA repair. During
    transcription elongation the FACT complex acts as a histone chaperone that both
    destabilizes and restores nucleosomal structure. It facilitates the passage of
    RNA polymerase II and transcription by promoting the dissociation of one histone
    H2A-H2B dimer from the nucleosome, then subsequently promotes the reestablishment
    of the nucleosome following the passage of RNA polymerase II. Transcription elongation
    is promoted by the repression of transcription initiation from cryptic sites.
    Also acts in establishing transcription initiation complexes and promotes SPT15/TBP-binding
    to a TATA box. Together with replication factor-A protein (RPA), FACT may play
    a role in nucleosome deposition during DNA replication.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04636
  source_id: Q04636
- source: Alliance_Imported
  text: Subunit of the heterodimeric FACT complex (Spt16p-Pob3p); FACT associates
    with chromatin via interaction with Nhp6Ap and Nhp6Bp, and reorganizes nucleosomes
    to facilitate access to DNA by RNA and DNA polymerases; protein abundance increases
    in response to DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004534
  source_id: SGD:S000004534
- source: Alliance_Automated
  text: Contributes to histone binding activity and nucleosome binding activity. Involved
    in DNA-templated DNA replication; chromatin organization; and positive regulation
    of RNA polymerase II transcription preinitiation complex assembly. Located in
    chromatin. Part of FACT complex. Used to study cancer. Orthologous to human SSRP1
    (structure specific recognition protein 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004534
  source_id: SGD:S000004534
