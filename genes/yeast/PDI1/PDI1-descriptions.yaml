gene_symbol: PDI1
organism: yeast
uniprot_id: P17967
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Excellent concordance across sources. All descriptions agree on the core protein
    disulfide isomerase activity and ER lumen localization. The SGD curated description
    is the most comprehensive, covering the ERAD/Mnl1p complex, Ero1p activation, and
    retrotranslocation. UniProt curated is a good second, covering Man8->Man7 processing
    and the unfolded protein response connection. The automated descriptions correctly
    list the key activities but flatten the rich mechanistic story into generic GO terms.
    Both curated sources agree on essentiality (implied by "required for" / "essential").
    Best source: Alliance (SGD) curated, which is the most complete and mechanistically
    detailed. UniProt is a close second, with clearer glycan-processing detail.
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: >-
      Near-perfect agreement on core function. SGD and UniProt curated descriptions
      are complementary; automated descriptions are derivative and less informative.
descriptions:
- source: UniProt
  text: Protein disulfide isomerase of ER lumen required for formation of disulfide
    bonds in secretory and cell-surface proteins and which unscrambles non-native
    disulfide bonds. Forms a complex with MNL1 to process unfolded protein-bound Man8GlcNAc2
    oligosaccharides to Man7GlcNAc2, promoting degradation in unfolded protein response.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P17967
  source_id: P17967
  review:
    reviewer: AI
    overall_notes: >-
      Strong description covering both the catalytic disulfide isomerase function and
      the ERAD glycan-processing role. The Man8->Man7 detail is precise and informative.
      Misses the Ero1p activation role and the retrotranslocation mechanism.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims well-supported; glycan processing detail is precise.
    - rubric: utility
      score: 4
      notes: Covers two major roles; missing Ero1p activation diminishes completeness.
    - rubric: compactness
      score: 4
      notes: Two sentences with good information density.
    - rubric: completeness
      score: 4
      notes: Covers disulfide isomerase + ERAD; misses Ero1p activation and Mnl1p solubility roles.
    - rubric: specificity
      score: 5
      notes: Specific glycan structures named (Man8GlcNAc2 to Man7GlcNAc2).
- source: Alliance_Imported
  text: "Protein disulfide isomerase; multifunctional oxidoreductase of the ER lumen,\
    \ essential for disulfide bond formation in secretory and cell-surface proteins,\
    \ and processing non-native disulfide bonds; complexes with exomannosidase, Mnl1p,\
    \ recognizing misfolded glycoproteins, and reducing disulfide bonds of demannosylated\
    \ substrates to generate an unfolded polypeptide that can be retrotranslocated across\
    \ the ER membrane, as part of ERAD; maintains Mnl1p solubility in the ER lumen;\
    \ Ero1p activator"
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000548
  source_id: SGD:S000000548
  review:
    reviewer: AI
    overall_notes: >-
      The most comprehensive description of the four. Covers the catalytic function,
      the ERAD pathway role with Mnl1p, the retrotranslocation mechanism, Mnl1p
      solubility maintenance, and Ero1p activation. Dense but packed with accurate
      mechanistic detail.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and well-supported by PMID:21700223, PMID:27053108.
    - rubric: utility
      score: 5
      notes: Gives a complete picture of PDI1 function in a single description.
    - rubric: compactness
      score: 3
      notes: >-
        Dense semicolon-delimited text; somewhat hard to parse as a single sentence.
        Information density is high but readability suffers.
    - rubric: completeness
      score: 5
      notes: Covers all major functions including Ero1p activation and Mnl1p solubility.
    - rubric: specificity
      score: 5
      notes: Names specific partners (Mnl1p, Ero1p) and mechanisms (retrotranslocation, demannosylation).
- source: Alliance_Automated
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
    activity; and unfolded protein binding activity. Involved in mannose trimming
    involved in glycoprotein ERAD pathway; positive regulation of endoplasmic reticulum
    unfolded protein response; and protein folding. Located in endoplasmic reticulum
    lumen. Part of mannosyl-oligosaccharide 1,2-alpha-mannosidase complex. Human ortholog(s)
    of this gene implicated in autoimmune hepatitis. Orthologous to several human
    genes including PDIA3 (protein disulfide isomerase family A member 3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000548
  source_id: SGD:S000000548
  review:
    reviewer: AI
    overall_notes: >-
      Competent GO-derived summary that captures the key activities and complex membership.
      "Unfolded protein binding" is an over-annotation for PDI1; it binds substrates via
      disulfide chemistry, not as a generic chaperone. The human disease and ortholog info
      adds context not in curated descriptions.
    rubrics:
    - rubric: correctness
      score: 4
      notes: >-
        Mostly correct; "unfolded protein binding" is over-simplified. The PDIA3 orthology
        is correct but other family members (P4HB/PDIA1) may be closer functional orthologs.
    - rubric: utility
      score: 3
      notes: Lists activities but lacks mechanistic context for how they relate.
    - rubric: compactness
      score: 4
      notes: Concise but formulaic.
    - rubric: completeness
      score: 3
      notes: Misses Ero1p activation, Mnl1p solubility, and retrotranslocation mechanism.
    - rubric: specificity
      score: 3
      notes: GO terms are reasonably specific but the description flattens the biology.
- source: RefSeq
  text: Enables protein disulfide isomerase activity; protein-disulfide reductase
    activity; and unfolded protein binding activity. Involved in mannose trimming
    involved in glycoprotein ERAD pathway and protein folding. Located in endoplasmic
    reticulum lumen. Human ortholog(s) of this gene implicated in autoimmune hepatitis.
    Orthologous to several human genes including PDIA3 (protein disulfide isomerase
    family A member 3). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/850314
  source_id: GeneID:850314
  review:
    reviewer: AI
    overall_notes: >-
      Slightly less complete than Alliance automated (omits UPR regulation and complex
      membership). Otherwise same strengths and weaknesses.
    rubrics:
    - rubric: correctness
      score: 4
      notes: Same as Alliance automated; "unfolded protein binding" is over-simplified.
    - rubric: utility
      score: 3
      notes: Slightly less useful than Alliance automated due to missing UPR detail.
    - rubric: compactness
      score: 4
      notes: Shorter than Alliance automated but at cost of information.
    - rubric: completeness
      score: 3
      notes: Less complete than Alliance automated; same core gaps as all automated descriptions.
    - rubric: specificity
      score: 3
      notes: Same generic GO-derived terms.
