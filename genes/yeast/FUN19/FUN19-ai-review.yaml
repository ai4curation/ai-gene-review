  - term:
      id: GO:0045893
      label: positive regulation of DNA-templated transcription
    evidence_type: IEA
    original_reference_id: GO_REF:0000108
    qualifier: involved_in
    review:
      summary: >-
        This IEA is an inter-ontology logical inference derived FROM the
