descriptions:
- source: UniProt
  text: Acts as a probably catalytic component of the CCR4-NOT core complex, which
    in the nucleus seems to be a general transcription factor, and in the cytoplasm
    the major mRNA deadenylase involved in mRNA turnover. In vitro, POP2 has 3'-exoribonuclease
    activity with a preference for poly(A) RNAs, but also degrades poly(U) and poly(C)
    RNAs. Is part of a glucose-sensing system involved in growth control in response
    to glucose availability.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P39008
  source_id: P39008
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate but hedges with "probably catalytic" when the activity is well-established.
    - rubric: utility
      score: 5
      notes: Excellent for understanding the dual transcription/mRNA decay roles.
    - rubric: compactness
      score: 3
      notes: Moderately long but justified.
    - rubric: completeness
      score: 5
      notes: Covers enzymatic activity, complex membership, substrate specificity,
        and metabolic signaling.
    - rubric: specificity
      score: 5
      notes: Specifies poly(A)/poly(U)/poly(C) preference and glucose-sensing system.
    overall_notes: Comprehensive description of the catalytic exoribonuclease activity,
      CCR4-NOT complex roles in transcription and mRNA turnover, substrate preference,
      and glucose-sensing function.
