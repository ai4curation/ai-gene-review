gene_symbol: CAF1
organism: yeast
uniprot_id: P39008
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Acts as a probably catalytic component of the CCR4-NOT core complex, which
    in the nucleus seems to be a general transcription factor, and in the cytoplasm
    the major mRNA deadenylase involved in mRNA turnover. In vitro, POP2 has 3'-exoribonuclease
    activity with a preference for poly(A) RNAs, but also degrades poly(U) and poly(C)
    RNAs. Is part of a glucose-sensing system involved in growth control in response
    to glucose availability.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P39008
  source_id: P39008
- source: Alliance_Imported
  text: Subunit of Ccr4-Not complex that mediates 3' to 5' mRNA deadenylation; exonuclease
    of the DEDD superfamily
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005335
  source_id: SGD:S000005335
- source: Alliance_Automated
  text: Enables 3'-5'-RNA exonuclease activity. Involved in nuclear-transcribed mRNA
    poly(A) tail shortening; positive regulation of transcription elongation by RNA
    polymerase II; and transcription elongation by RNA polymerase II. Located in P-body.
    Part of CCR4-NOT core complex. Orthologous to several human genes including CNOT7
    (CCR4-NOT transcription complex subunit 7).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005335
  source_id: SGD:S000005335
- source: RefSeq
