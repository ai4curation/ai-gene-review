- source: Alliance_Automated
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in several processes, including cellular response to glucose starvation; gene
    expression; and ribosomal subunit export from nucleus. Located in cytoplasmic
    stress granule and plasma membrane.
