gene_symbol: SSB2
organism: yeast
uniprot_id: P40150
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Ribosome-bound, Hsp70-type chaperone that assists in the cotranslational folding
    of newly synthesized proteins in the cytosol. Stimulates folding by interacting
    with nascent chains, binding to short, largely hydrophobic sequences exposed by
    unfolded proteins, thereby stabilizing longer, more slowly translated, and aggregation-
    prone nascent polypeptides and domains that cannot fold stably until fully synthesized.
    The Hsp70-protein substrate interaction depends on ATP-binding and on allosteric
    regulation between the NBD and the SBD. The ATP-bound state is characterized by
    a fast exchange rate of substrate (low affinity state), while in the ADP-bound
    state exchange is much slower (high affinity state). During the Hsp70 cycle, the
    chaperone switches between the ATP-bound state (open conformation) and the ADP-bound
    state (closed conformation) by major conformational rearrangements involving mainly
    the lid domain. Ssb cooperates with a specific Hsp40/Hsp70 co-chaperone termed
    the ribosome-associated complex (RAC), which stimulates the ATPase activity of
    the ribosome- associated pool of Ssbs and switches it to the high affinity substrate
    binding state. Hsp110 chaperone SSE1 and FES1 act as nucleotide exchange factors
    that cause substrate release.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40150
  source_id: P40150
- source: Alliance_Imported
  text: Cytoplasmic ATPase that is a ribosome-associated molecular chaperone; functions
    with J-protein partner Zuo1p; may be involved in the folding of newly-synthesized
    polypeptide chains; member of the HSP70 family; SSB2 has a paralog, SSB1, that
    arose from the whole genome duplication
  source_type: curated
