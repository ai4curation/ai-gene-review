    - rubric: specificity
      score: 5
      notes: Names specific partners (SSE1, FES1, RAC), domains (NBD, SBD, lid), and
        mechanistic details.
    overall_notes: Exceptionally detailed description of the Hsp70 chaperone cycle,
      ATP/ADP conformational states, and cooperation with RAC. Accurate and thorough
      but very long for a gene summary.
- source: Alliance_Imported
  text: Cytoplasmic ATPase that is a ribosome-associated molecular chaperone; functions
    with J-protein partner Zuo1p; may be involved in the folding of newly-synthesized
    polypeptide chains; member of the HSP70 family; SSB2 has a paralog, SSB1, that
    arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005153
  source_id: SGD:S000005153
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate but "may be involved in folding" undersells the well-established
        cotranslational folding role.
    - rubric: utility
      score: 4
      notes: Good overview; identifies key partner Zuo1p and HSP70 family membership.
    - rubric: compactness
      score: 5
      notes: Concise single statement with semicolons; no wasted words.
    - rubric: completeness
      score: 3
      notes: Misses the Hsp70 cycle details, SSE1/FES1 nucleotide exchange, and substrate
        specificity.
    - rubric: specificity
      score: 4
      notes: Names Zuo1p, J-protein partnership, and ATPase activity; lacks mechanistic
        depth.
    overall_notes: Compact curated description identifying SSB2 as a ribosome-associated
      Hsp70 chaperone with Zuo1p partner. Notes the paralog SSB1 from whole genome
      duplication.
