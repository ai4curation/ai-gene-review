gene_symbol: SHR3
organism: yeast
uniprot_id: Q02774
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Good concordance on the ER packaging chaperone / amino acid permease trafficking
    function. Both curated sources agree on the core role in helping amino acid permeases
    exit the ER. UniProt provides more mechanistic detail about the Sec62/Sec63 complex
    interaction and the biological rationale (rapid permease expression under changing
    conditions). SGD curated is more precise about the COPII vesicle packaging step.
    The automated descriptions are generic and the "unfolded protein binding" annotation
    is misleading -- SHR3 is an ER membrane-resident packaging chaperone that assists
    permease folding and ER exit, not a general unfolded protein binder. "Protein
    folding" in the automated descriptions is also too generic.
    Best source: UniProt curated for mechanistic detail and biological rationale;
    SGD curated for precision about the COPII packaging step. Both are good but
    UniProt is slightly more informative as a standalone.
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: >-
      Good agreement on amino acid permease trafficking. UniProt emphasizes Sec62/63
      mechanism; SGD emphasizes COPII packaging. No contradictions. Automated
      descriptions lose the permease specificity entirely.
descriptions:
- source: UniProt
  text: Involved in amino acid permease processing and required for the efficient
    translocation of structurally related amino acid permeases from the endoplasmic
    reticulum to the plasma membrane. SHR3 may function as a permease-specific 'adaptor'
    molecule that functions in conjunction with the SEC62/SEC63 complex. Yeast cells
    may require SHR3 to expedite the processing of permeases to ensure their rapid
    expression at the plasma membrane in response to changing environmental conditions.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q02774
  source_id: Q02774
  review:
    reviewer: AI
    overall_notes: >-
      Good mechanistic description with the Sec62/Sec63 interaction detail and the
      biological rationale for rapid permease expression. The "adaptor" concept is
      informative. Some hedging ("may function", "may require") is present but less
      problematic given the model nature of these claims.
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; hedging with "may" is somewhat outdated given current evidence.
    - rubric: utility
      score: 4
      notes: Good for understanding why SHR3 exists and how it works.
    - rubric: compactness
      score: 3
      notes: Three sentences; the last sentence is somewhat redundant with the first.
    - rubric: completeness
      score: 4
      notes: Covers mechanism and rationale; misses COPII vesicle detail and ER membrane localization.
    - rubric: specificity
      score: 4
      notes: Names SEC62/SEC63 and "amino acid permeases" as specific substrates.
- source: Alliance_Imported
  text: Endoplasmic reticulum packaging chaperone; required for incorporation of amino
    acid permeases into COPII coated vesicles for transport to the cell surface
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002371
  source_id: SGD:S000002371
  review:
    reviewer: AI
    overall_notes: >-
      Compact and precise. "ER packaging chaperone" is an excellent functional label.
      The COPII vesicle detail specifies exactly where in the pathway SHR3 acts.
      Missing: Sec62/63 interaction, the biological rationale, and substrate range.
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and specific.
    - rubric: utility
      score: 4
      notes: Conveys the core function clearly; lacks mechanistic depth.
    - rubric: compactness
      score: 5
      notes: One perfectly dense sentence with two clauses.
    - rubric: completeness
      score: 3
      notes: Misses Sec62/63 interaction, biological rationale, ER membrane localization.
    - rubric: specificity
      score: 5
      notes: '"ER packaging chaperone" and "COPII coated vesicles" are highly specific.'
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in COPII-coated vesicle
    budding and protein folding. Located in endoplasmic reticulum membrane.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002371
  source_id: SGD:S000002371
  review:
    reviewer: AI
    overall_notes: >-
      "Unfolded protein binding" is misleading; SHR3 is a permease-specific packaging
      chaperone, not a general unfolded protein binder. "COPII-coated vesicle budding"
      is useful and correct. "Protein folding" is too generic. The ER membrane
      localization is a good addition not in either curated description.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" and "protein folding" are misleading for this
        substrate-specific packaging chaperone.
    - rubric: utility
      score: 2
      notes: Loses the crucial amino acid permease substrate specificity.
    - rubric: compactness
      score: 4
      notes: Short.
    - rubric: completeness
      score: 2
      notes: Misses permease specificity, Sec62/63, and biological rationale.
    - rubric: specificity
      score: 2
      notes: >-
        "COPII-coated vesicle budding" is specific but "unfolded protein binding"
        and "protein folding" are generic and misleading.
