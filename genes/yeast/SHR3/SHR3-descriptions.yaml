gene_symbol: SHR3
organism: yeast
uniprot_id: Q02774
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Involved in amino acid permease processing and required for the efficient
    translocation of structurally related amino acid permeases from the endoplasmic
    reticulum to the plasma membrane. SHR3 may function as a permease-specific 'adaptor'
    molecule that functions in conjunction with the SEC62/SEC63 complex. Yeast cells
    may require SHR3 to expedite the processing of permeases to ensure their rapid
    expression at the plasma membrane in response to changing environmental conditions.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q02774
  source_id: Q02774
- source: Alliance
  text: Endoplasmic reticulum packaging chaperone; required for incorporation of amino
    acid permeases into COPII coated vesicles for transport to the cell surface
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002371
  source_id: SGD:S000002371
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in COPII-coated vesicle
