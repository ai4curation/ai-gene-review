descriptions:
- source: UniProt
  text: Molecular chaperone that promotes the maturation, structural maintenance and
    proper regulation of specific target proteins involved in cell cycle control and
    signal transduction such as CNA2. Undergoes a functional cycle that is linked
    to its ATPase activity (By similarity). Interacts dynamically with various co-chaperones
    that modulate its substrate recognition, ATPase cycle and chaperone function.
    Required for growth at high temperatures.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P15108
  source_id: P15108
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Accurate: Hsp90 chaperone, ATPase cycle, co-chaperone interactions,
        temperature requirement.'
    - rubric: utility
      score: 4
      notes: Informative about chaperone mechanism.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 3
      notes: Misses constitutive expression, redundancy with HSP82, prion biology,
        and acid-rich regions.
    - rubric: specificity
      score: 4
      notes: 'Specific: CNA2 client, ATPase cycle, co-chaperone interactions.'
    overall_notes: Good description of Hsp90 molecular chaperone function with CNA2
      client example.
- source: Alliance_Imported
  text: Cytoplasmic chaperone of the Hsp90 family; plays a role in determining prion
    variants; redundant in function and nearly identical with Hsp82p, and together
    they are essential; expressed constitutively at 10-fold higher basal levels than
    HSP82 and induced 2-3 fold by heat shock; contains two acid-rich unstructured
    regions that promote the solubility of chaperone-substrate complexes; HSC82 has
    a paralog, HSP82, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004798
  source_id: SGD:S000004798
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and comprehensive.
    - rubric: utility
      score: 5
      notes: Highly informative about what distinguishes HSC82 from HSP82.
    - rubric: compactness
      score: 3
      notes: Lengthy but all information is relevant.
    - rubric: completeness
      score: 5
      notes: Covers chaperone family, prion biology, redundancy, expression, structural
        features, and paralog.
    - rubric: specificity
      score: 5
      notes: 'Specific: 10-fold higher basal expression, 2-3 fold heat shock induction,
        acid-rich unstructured regions, HSP82 paralog.'
    overall_notes: 'Best source: covers Hsp90 family, prion role, HSP82 redundancy,
      expression levels, acid-rich regions, and paralog.'
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in several processes, including cellular response to heat; protein folding; and
    protein-containing complex assembly. Located in mitochondrion and plasma membrane.
    Used to study cancer. Human ortholog(s) of this gene implicated in multiple sclerosis.
    Orthologous to several human genes including HSP90AB1 (heat shock protein 90 alpha
    family class B member 1).
  source_type: automated
