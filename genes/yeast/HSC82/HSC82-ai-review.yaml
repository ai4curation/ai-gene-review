suggested_questions:
- question: Under non-stress conditions, which Hsp90 clients are predominantly chaperoned by the constitutive HSC82 isoform versus the inducible HSP82, and how does the relative paralog abundance shape clientele selection?
- question: What is the functional significance of HSP82-HSC82 heterodimer formation, and is heterodimerization required for engagement of specific clients or co-chaperones?
- question: Do mitochondrial and plasma-membrane-associated HSC82 pools have specialized functions (e.g., mitochondrial protein import support, membrane raft proteostasis), or do they reflect non-functional spillover?
suggested_experiments:
- description: Quantitatively profile co-chaperone occupancy and client maturation efficiency in single (hsc82Δ, hsp82Δ) and double-paralog deletion/over-expression strains by AP-MS and Western to deconvolve constitutive vs inducible chaperone contributions.
- description: Reconstitute HSP82-HSC82 heterodimers in vitro with purified proteins and a panel of co-chaperones (Sti1, Aha1, Sba1, Cdc37) and measure ATPase rates plus client (e.g., glucocorticoid receptor) activation efficiency relative to the homodimers.
- description: Perform proximity-labeling proteomics (TurboID) of HSC82 in mitochondrial and plasma-membrane subfractions versus cytosol to test whether minor pools have distinctive interactomes.
