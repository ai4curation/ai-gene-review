    label: cytoplasm
- description: >-
    ATPase activity is fundamental to the Hsp90 chaperone cycle. Directly demonstrated by
    IDA (PMID:18492664). Intra- and intermonomer interactions synergistically facilitate
    ATP hydrolysis.
  molecular_function:
    id: GO:0016887
    label: ATP hydrolysis activity
  directly_involved_in:
  - id: GO:0006457
    label: protein folding
  locations:
  - id: GO:0005737
    label: cytoplasm
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: HSC82 is annotated to GO:0140662 ATP-dependent protein folding chaperone via InterPro-to-GO mapping reflecting Hsp90 family membership.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: PANTHER phylogenetic-tree annotation propagates conserved Hsp90 chaperone functions (ATP binding, ATP hydrolysis, protein folding, cellular response to heat, protein stabilization, identical protein binding, cytosol localization) to S. cerevisiae HSC82.
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: UniProtKB keyword 'Nucleotide-binding' maps to GO:0000166 nucleotide binding for HSC82 based on its conserved Hsp90 ATPase domain.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: HSC82 UniProt subcellular location annotations (cytoplasm, mitochondrion) are mapped to corresponding cellular component GO terms.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA machine-learning model assigns HSC82 to box C/D snoRNP assembly and proteasome assembly based on Hsp90 family signatures and chaperone client patterns.
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings:
  - statement: Combined automated IEA pipelines annotate HSC82 with ATP binding, ATP hydrolysis activity, protein folding, and unfolded protein binding from UniProt features.
- id: PMID:11805826
  title: Functional organization of the yeast proteome by systematic analysis of protein complexes.
  findings:
  - statement: HSC82 was identified in multi-protein complexes by systematic functional organization of the yeast proteome.
    supporting_text: Functional organization of the yeast proteome by systematic analysis of protein complexes.
    reference_section_type: ABSTRACT
- id: PMID:11805837
  title: Systematic identification of protein complexes in Saccharomyces cerevisiae by mass spectrometry.
  findings:
  - statement: HSC82 was identified in multi-protein complexes by systematic affinity-purification mass spectrometry.
    supporting_text: Systematic identification of protein complexes in Saccharomyces cerevisiae by mass spectrometry.
    reference_section_type: ABSTRACT
- id: PMID:12853471
  title: The molecular chaperone Hsp90 plays a role in the assembly and maintenance of the 26S proteasome.
  findings:
  - statement: HSC82/Hsp90 is required for assembly and maintenance of the 26S proteasome in vivo, supporting GO:0043248 proteasome assembly as a client-dependent secondary function.
    supporting_text: The molecular chaperone Hsp90 plays a role in the assembly and maintenance of the 26S proteasome.
    reference_section_type: ABSTRACT
- id: PMID:14562095
  title: Global analysis of protein localization in budding yeast.
  findings:
  - statement: Genome-wide GFP localization study assigns HSC82 to the cytoplasm in S. cerevisiae.
    supporting_text: Global analysis of protein localization in budding yeast.
    reference_section_type: RESULTS
- id: PMID:14576278
  title: The proteome of Saccharomyces cerevisiae mitochondria.
  findings:
  - statement: HSC82 was detected in the yeast mitochondrial proteome, supporting a minor mitochondrial pool.
    supporting_text: The proteome of Saccharomyces cerevisiae mitochondria.
    reference_section_type: RESULTS
- id: PMID:15699485
  title: Analysis of polyubiquitin conjugates reveals that the Rpn10 substrate receptor contributes to the turnover of multiple proteasome targets.
  findings:
  - statement: HSC82 appears in polyubiquitin conjugate analysis as a Rpn10-relevant proteasome substrate context, consistent with chaperone roles in client triage.
    supporting_text: Analysis of polyubiquitin conjugates reveals that the Rpn10 substrate receptor contributes to the turnover of multiple proteasome targets.
    reference_section_type: ABSTRACT
- id: PMID:15766533
