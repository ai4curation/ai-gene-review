- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      HSC82 is a cytosolic protein. IBA annotation is correct.
    action: ACCEPT
    reason: >-
