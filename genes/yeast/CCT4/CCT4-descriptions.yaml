- source: Alliance
  text: Subunit of the cytosolic chaperonin Cct ring complex; related to Tcp1p, required
    for the assembly of actin and tubulins in vivo
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002302
  source_id: SGD:S000002302
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in protein folding. Part
