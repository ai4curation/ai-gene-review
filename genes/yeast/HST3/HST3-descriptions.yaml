    - rubric: utility
      score: 4
      notes: Good overview of function and phenotypic roles.
    - rubric: compactness
      score: 5
      notes: Single comprehensive sentence.
    - rubric: completeness
      score: 4
      notes: Covers H3K56, HST4 cooperation, silencing, cell cycle, DNA damage, and
        genomic maintenance. Misses fatty acid metabolism.
    - rubric: specificity
      score: 4
      notes: Names H3 Lys-56, HST4, and specific phenotypic categories.
    overall_notes: Good description. Correctly identifies H3K56 deacetylation as the
      key activity and covers the broad phenotypic consequences (silencing, cell cycle,
      DNA damage, genomic maintenance).
