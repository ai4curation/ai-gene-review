gene_symbol: HST3
organism: yeast
uniprot_id: P53687
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: NAD-dependent histone deacetylase, which contributes together with HST4 to
    histone H3 'Lys-56' deacetylation, regulation of telomeric silencing, proper cell
    cycle progression, DNA damage control, DNA recombination, and genomic maintenance.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53687
  source_id: P53687
- source: Alliance
  text: Sirtuin, histone H3 deacetylase; involved along with Hst4p in telomeric silencing,
    cell cycle progression, radiation resistance, genomic stability and short-chain
    fatty acid metabolism; member of the Sir2 family of NAD(+)-dependent protein deacetylases
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005551
  source_id: SGD:S000005551
- source: Alliance
  text: Enables histone deacetylase activity, NAD-dependent. Involved in several processes,
    including mRNA transcription; replication-born double-strand break repair via
    sister chromatid exchange; and subtelomeric heterochromatin formation. Predicted
    to be located in chromosome, telomeric region and cytoplasm. Predicted to be active
    in nucleus.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005551
  source_id: SGD:S000005551
