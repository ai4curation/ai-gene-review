      copy. This is the reference behind UniProt's DISRUPTION PHENOTYPE. Note a
      curated-source discrepancy on direction: UniProt states deletion "increases" while
      SGD states "reduced" frequency of mitochondrial genome loss (see knowledge_gaps).
