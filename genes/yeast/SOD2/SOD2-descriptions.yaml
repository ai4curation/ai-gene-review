gene_symbol: SOD2
organism: yeast
uniprot_id: P00447
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Destroys superoxide anion radicals which are normally produced within the
    cells and which are toxic to biological systems.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P00447
  source_id: P00447
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate but minimal.
    - rubric: utility
      score: 2
      notes: Too generic; could describe any SOD.
    - rubric: compactness
      score: 5
      notes: One sentence.
    - rubric: completeness
      score: 1
      notes: Misses Mn cofactor, mitochondrial localization, oxidative stress specifics,
        human complementation.
    - rubric: specificity
      score: 1
      notes: Does not distinguish from SOD1 or specify the manganese cofactor.
    overall_notes: Very brief and generic. States the general superoxide dismutase
      function without specifying the manganese cofactor, mitochondrial localization,
      or oxidative stress protection context.
- source: Alliance_Imported
  text: Mitochondrial manganese superoxide dismutase; protects cells against oxygen
    toxicity and oxidative stress; human mitochondrial SOD2 can complement a yeast
    null mutant and human cytoplasmic SOD1 can also complement when targeted to the
    mitochondrial matrix
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001050
  source_id: SGD:S000001050
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 5
      notes: Clearly distinguishes this SOD from others; cross-species complementation
        is a valuable detail.
    - rubric: compactness
      score: 4
      notes: Concise with useful details.
    - rubric: completeness
      score: 4
      notes: Covers cofactor, localization, function, and complementation. Could mention
        substrate (superoxide radical).
    - rubric: specificity
      score: 5
      notes: Names Mn cofactor, mitochondrial location, and specific complementation
        experiments.
    overall_notes: Much more informative. Specifies mitochondrial localization, manganese
      cofactor, oxygen toxicity protection, and notable cross-species complementation
      by human SOD2 and SOD1.
- source: Alliance_Automated
  text: Enables superoxide dismutase activity. Involved in reactive oxygen species
    metabolic process. Located in mitochondrial matrix. Used to study Alzheimer's
    disease; Parkinson's disease; and cancer. Human ortholog(s) of this gene implicated
    in several diseases, including artery disease (multiple); autoimmune disease of
    musculoskeletal system (multiple); diabetes mellitus (multiple); liver disease
    (multiple); and optic nerve disease (multiple). Orthologous to human SOD2 (superoxide
    dismutase 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001050
  source_id: SGD:S000001050
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but generic.
    - rubric: utility
      score: 3
      notes: Mitochondrial matrix localization is useful; disease list is excessive.
    - rubric: compactness
      score: 3
      notes: Heavy disease padding.
    - rubric: completeness
      score: 2
      notes: Misses Mn cofactor specificity and oxidative stress protection context.
    - rubric: specificity
      score: 3
      notes: Names SOD activity and mitochondrial matrix localization.
    overall_notes: GO-derived summary with correct activity and localization. Extensive
      human disease list is of limited value for understanding yeast SOD2 function.
- source: RefSeq
  text: Enables superoxide dismutase activity. Involved in reactive oxygen species
    metabolic process. Located in mitochondrial matrix. Used to study Alzheimer's
    disease; Parkinson's disease; and cancer. Human ortholog(s) of this gene implicated
    in several diseases, including artery disease (multiple); autoimmune disease (multiple);
    cardiomyopathy (multiple); liver disease (multiple); and optic nerve disease (multiple).
    Orthologous to human SOD2 (superoxide dismutase 2). [provided by Alliance of Genome
    Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856399
  source_id: GeneID:856399
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: utility
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: compactness
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 3
      notes: Same as Alliance_Automated.
    overall_notes: Nearly identical to Alliance_Automated with slightly different
      disease groupings. Same strengths and weaknesses.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: Full agreement on core function. No contradictions. Quality varies markedly
      by source.
  overall_notes: All sources agree on superoxide dismutase function. SGD curated is
    clearly the best source, adding critical distinctions (Mn cofactor, mitochondrial
    localization, cross-species complementation). UniProt is unusually sparse. Automated
    sources provide basic function and disease associations.
