gene_symbol: SOD2
organism: yeast
uniprot_id: P00447
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Destroys superoxide anion radicals which are normally produced within the
    cells and which are toxic to biological systems.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P00447
  source_id: P00447
- source: Alliance_Imported
  text: Mitochondrial manganese superoxide dismutase; protects cells against oxygen
    toxicity and oxidative stress; human mitochondrial SOD2 can complement a yeast
    null mutant and human cytoplasmic SOD1 can also complement when targeted to the
    mitochondrial matrix
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001050
  source_id: SGD:S000001050
- source: Alliance_Automated
  text: Enables superoxide dismutase activity. Involved in reactive oxygen species
    metabolic process. Located in mitochondrial matrix. Used to study Alzheimer's
    disease; Parkinson's disease; and cancer. Human ortholog(s) of this gene implicated
    in several diseases, including artery disease (multiple); autoimmune disease of
    musculoskeletal system (multiple); diabetes mellitus (multiple); liver disease
    (multiple); and optic nerve disease (multiple). Orthologous to human SOD2 (superoxide
    dismutase 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001050
  source_id: SGD:S000001050
- source: RefSeq
  text: Enables superoxide dismutase activity. Involved in reactive oxygen species
    metabolic process. Located in mitochondrial matrix. Used to study Alzheimer's
    disease; Parkinson's disease; and cancer. Human ortholog(s) of this gene implicated
    in several diseases, including artery disease (multiple); autoimmune disease (multiple);
    cardiomyopathy (multiple); liver disease (multiple); and optic nerve disease (multiple).
    Orthologous to human SOD2 (superoxide dismutase 2). [provided by Alliance of Genome
