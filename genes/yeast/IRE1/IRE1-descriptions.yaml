gene_symbol: IRE1
organism: yeast
uniprot_id: P32361
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Senses unfolded proteins in the lumen of the endoplasmic reticulum via its
    N-terminal domain which leads to enzyme auto- activation (PubMed:8663458, PubMed:8670804,
    PubMed:9528768). The active endoribonuclease domain splices HAC1 precursor mRNA
    to produce the mature form which then induces transcription of UPR target genes
    (PubMed:18191223, PubMed:9323131).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32361
  source_id: P32361
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-cited.
    - rubric: utility
      score: 5
      notes: Conveys the key mechanism of IRE1-mediated UPR signaling.
    - rubric: compactness
      score: 4
      notes: Two sentences covering the essential mechanism.
    - rubric: completeness
      score: 4
      notes: Covers sensing, activation, splicing, and transcription. Misses kinase
        activity and Kar2p regulation.
    - rubric: specificity
      score: 5
      notes: Names HAC1, N-terminal domain, endoribonuclease domain, and UPR pathway.
    overall_notes: Good mechanistic description of UPR signaling. Covers unfolded
      protein sensing, auto-activation, HAC1 mRNA splicing, and UPR target gene induction
      with PMID citations.
- source: Alliance_Imported
  text: Serine-threonine kinase and endoribonuclease; transmembrane protein that mediates
    the unfolded protein response (UPR) by regulating Hac1p synthesis through HAC1
    mRNA splicing; role in homeostatic adaptation to ER stress; Kar2p binds inactive
    Ire1p and releases from it upon ER stress; involved in UPR-mediated suppression
    of aneuploidy
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001121
  source_id: SGD:S000001121
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate and current.
    - rubric: utility
      score: 5
      notes: Comprehensive view of IRE1 biology.
    - rubric: compactness
      score: 4
      notes: Dense semicolon format.
    - rubric: completeness
      score: 5
      notes: Covers dual enzymatic activities, membrane topology, Kar2p regulation,
        and aneuploidy link.
    - rubric: specificity
      score: 5
      notes: Names serine-threonine kinase, endoribonuclease, Hac1p, Kar2p, transmembrane
        protein.
    overall_notes: Excellent SGD description. Covers dual kinase/endoribonuclease
      activities, transmembrane nature, HAC1 splicing, Kar2p regulation, and aneuploidy
      suppression.
- source: Alliance_Automated
  text: Enables several functions, including RNA endonuclease activity; identical
    protein binding activity; and unfolded protein binding activity. Involved in several
    processes, including IRE1-mediated unfolded protein response; fungal-type cell
    wall organization; and inositol metabolic process. Located in endoplasmic reticulum
    membrane and nucleus. Part of Ire1 complex. Human ortholog(s) of this gene implicated
    in hepatocellular carcinoma. Orthologous to several human genes including ERN2
    (endoplasmic reticulum to nucleus signaling 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001121
  source_id: SGD:S000001121
  review:
