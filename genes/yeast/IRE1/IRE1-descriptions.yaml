review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Strong agreement on UPR sensing and HAC1 splicing. Curated sources complement
      each other on kinase vs endonuclease emphasis.
  overall_notes: 'Both curated sources are excellent and complementary. UniProt focuses
    on the endoribonuclease/HAC1 splicing mechanism; SGD adds kinase activity, Kar2p
    regulation, and aneuploidy suppression. Automated descriptions are adequate but
    diluted. Best sources: Both curated descriptions together.'
