- source: RefSeq
  text: Enables RNA endonuclease activity; protein serine/threonine kinase activity;
    and unfolded protein binding activity. Involved in several processes, including
    endoplasmic reticulum unfolded protein response; fungal-type cell wall organization;
    and inositol metabolic process. Located in endoplasmic reticulum membrane and
    nucleus. Human ortholog(s) of this gene implicated in hepatocellular carcinoma.
    Orthologous to several human genes including ERN2 (endoplasmic reticulum to nucleus
    signaling 2). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856478
