gene_symbol: NAP1
organism: yeast
uniprot_id: P25293
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Good concordance on the histone chaperone core function. Both curated sources agree
    on H2A-H2B chaperone activity, nuclear import, and cell-cycle regulation. UniProt
    provides the most mechanistically detailed account of the histone chaperoning
    (KAP114, GSP1/RAN involvement) and uniquely identifies the ribosomal subunit
    assembly chaperone role (eS6/RPS6A/B). SGD curated is broader, adding histone
    exchange, Rps6a solubility, microtubule dynamics, cyclin interaction, and bud
    morphogenesis. Automated descriptions are formulaic but include some useful terms
    (H2A-H2B chaperone activity in Alliance automated). A notable divergence: RefSeq
    automated includes "unfolded protein binding" while Alliance automated uses the
    more specific "H2A-H2B histone complex chaperone activity."
    Best source: UniProt curated for mechanistic depth on histone chaperoning;
    SGD curated for breadth. They are highly complementary.
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: >-
      Strong agreement on histone chaperone core. UniProt uniquely covers ribosome
      assembly chaperone role. SGD uniquely covers microtubule/cyclin/bud morphogenesis.
      Automated sources diverge on MF terms (H2A-H2B chaperone vs unfolded protein binding).
descriptions:
- source: UniProt
  text: Histone H2A-H2B chaperone that together with karyopherin KAP114 co-chaperones
    histone H2A-H2B dimers into the nucleus; subsequent binding of RAN(GTP) GSP1 to
    this complex promotes specific and accurate deposition of H2A-H2B into nucleosomes
    (PubMed:18086883, PubMed:2016313, PubMed:27225933). Also acts as an assembly chaperone
    for the small ribosomal subunit protein eS6 (RPS6A and RPS6B), thereby functioning
    in 40S ribosomal subunit biogenesis (PubMed:31062022). May also chaperone the
    large ribosomal subunit proteins eL39 and eL42 (PubMed:31062022). Plays a role
    in the regulation of the cell cycle; regulates the localization and function of
    septins during mitosis, and the function of B-type cyclins (PubMed:12058072, PubMed:18086883,
    PubMed:7622566).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P25293
  source_id: P25293
  review:
    reviewer: AI
    overall_notes: >-
      Detailed mechanistic description covering the histone nuclear import pathway
      (KAP114/GSP1), the ribosomal subunit chaperone role, and cell-cycle regulation.
      The ribosome assembly function is unique to this source and well-cited. Inline
      PMIDs are cluttered but the content is excellent.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims well-cited and accurate.
    - rubric: utility
      score: 5
      notes: >-
        Covers both the histone chaperone and ribosome assembly roles with mechanistic
        detail; also mentions cell-cycle function.
    - rubric: compactness
      score: 3
      notes: Four sentences with many inline PMIDs; content-rich but cluttered.
    - rubric: completeness
      score: 4
      notes: >-
        Excellent on histone chaperoning and ribosome role. Misses histone exchange,
        bud morphogenesis, and CK2 phosphorylation found in SGD.
    - rubric: specificity
      score: 5
      notes: Names KAP114, GSP1, RPS6A/B, eS6, eL39, eL42, septins, B-type cyclins.
- source: Alliance_Imported
  text: Histone chaperone and assembly chaperone for Rps6a/b; involved in histone
    exchange, replacing histone H2A-H2B dimers or histone variant dimers from assembled
    nucleosomes; promotes solubility of Rps6a, and 40S ribosomal subunit biogenesis;
    role in transport of H2A and H2B histones to the nucleus; regulates microtubule
    dynamics during mitosis; interacts with mitotic cyclin Clb2p; controls bud morphogenesis;
    phosphorylated by CK2; protein abundance increases in response to DNA replication
    stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001756
  source_id: SGD:S000001756
  review:
    reviewer: AI
    overall_notes: >-
      Impressively broad coverage. Uniquely includes histone exchange/variant replacement,
      Rps6a solubility, microtubule regulation, Clb2p interaction, bud morphogenesis,
      and CK2 phosphorylation. Less mechanistic detail on the histone import pathway
      than UniProt. The breadth is both a strength and a weakness -- hard to distinguish
      core from peripheral functions.
    rubrics:
    - rubric: correctness
      score: 5
      notes: All statements accurate.
    - rubric: utility
      score: 4
      notes: Broad but the flat list format makes it hard to prioritize functions.
    - rubric: compactness
      score: 3
      notes: Dense semicolon list with many clauses; quite long for this format.
    - rubric: completeness
      score: 5
      notes: Most comprehensive single description; covers functions missing from all other sources.
    - rubric: specificity
      score: 4
      notes: Names Rps6a/b, Clb2p, CK2; less specific on the nuclear import mechanism.
- source: Alliance_Automated
  text: Enables several functions, including H2A-H2B histone complex chaperone activity;
    cyclin binding activity; and histone binding activity. Involved in several processes,
    including NLS-bearing protein import into nucleus; nucleosome organization; and
    positive regulation of transcription elongation by RNA polymerase II. Located
    in cellular bud neck septin collar. Part of Gin4 complex. Human ortholog(s) of
    this gene implicated in pancreatic cancer. Orthologous to several human genes
    including NAP1L2 (nucleosome assembly protein 1 like 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001756
  source_id: SGD:S000001756
  review:
    reviewer: AI
    overall_notes: >-
      Better than average automated description. "H2A-H2B histone complex chaperone
      activity" is a specific and accurate MF term. Gin4 complex membership and septin
      collar localization add unique structural context. The disease/ortholog info
      is useful.
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; "H2A-H2B histone complex chaperone" is the right specific term.
    - rubric: utility
      score: 3
      notes: Better than most automated descriptions due to specific MF term and complex membership.
    - rubric: compactness
      score: 4
      notes: Standard length.
    - rubric: completeness
      score: 3
      notes: Misses ribosome assembly role, histone exchange, and mechanistic detail.
    - rubric: specificity
      score: 4
      notes: "H2A-H2B histone complex chaperone activity" is quite specific; Gin4 complex is informative.
- source: RefSeq
  text: Enables several functions, including cyclin binding activity; histone binding
    activity; and unfolded protein binding activity. Involved in several processes,
    including NLS-bearing protein import into nucleus; nucleosome organization; and
    positive regulation of transcription elongation by RNA polymerase II. Located
    in cellular bud neck septin collar. Human ortholog(s) of this gene implicated
    in pancreatic cancer. Orthologous to several human genes including NAP1L2 (nucleosome
    assembly protein 1 like 2). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/853922
  source_id: GeneID:853922
  review:
    reviewer: AI
    overall_notes: >-
      Notably worse than Alliance automated: replaces the specific "H2A-H2B histone
      complex chaperone activity" with the generic "unfolded protein binding activity"
      and drops the Gin4 complex membership. This is a clear loss of specificity.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" is misleading for NAP1; it is a histone chaperone,
        not a general unfolded protein binder.
    - rubric: utility
      score: 2
      notes: Less useful than Alliance automated due to loss of specific MF term.
    - rubric: compactness
      score: 4
      notes: Same length.
    - rubric: completeness
      score: 2
      notes: Loses Gin4 complex and H2A-H2B specificity from Alliance automated.
    - rubric: specificity
      score: 2
      notes: >-
        "Unfolded protein binding" and "histone binding" are much less specific than
        Alliance automated's "H2A-H2B histone complex chaperone activity."
