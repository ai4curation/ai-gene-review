gene_symbol: NAP1
organism: yeast
uniprot_id: P25293
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Histone H2A-H2B chaperone that together with karyopherin KAP114 co-chaperones
    histone H2A-H2B dimers into the nucleus; subsequent binding of RAN(GTP) GSP1 to
    this complex promotes specific and accurate deposition of H2A-H2B into nucleosomes
    (PubMed:18086883, PubMed:2016313, PubMed:27225933). Also acts as an assembly chaperone
    for the small ribosomal subunit protein eS6 (RPS6A and RPS6B), thereby functioning
    in 40S ribosomal subunit biogenesis (PubMed:31062022). May also chaperone the
    large ribosomal subunit proteins eL39 and eL42 (PubMed:31062022). Plays a role
    in the regulation of the cell cycle; regulates the localization and function of
    septins during mitosis, and the function of B-type cyclins (PubMed:12058072, PubMed:18086883,
    PubMed:7622566).
  source_type: curated
  url: https://www.uniprot.org/uniprot/P25293
  source_id: P25293
- source: Alliance
  text: Histone chaperone and assembly chaperone for Rps6a/b; involved in histone
    exchange, replacing histone H2A-H2B dimers or histone variant dimers from assembled
    nucleosomes; promotes solubility of Rps6a, and 40S ribosomal subunit biogenesis;
    role in transport of H2A and H2B histones to the nucleus; regulates microtubule
    dynamics during mitosis; interacts with mitotic cyclin Clb2p; controls bud morphogenesis;
    phosphorylated by CK2; protein abundance increases in response to DNA replication
    stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001756
  source_id: SGD:S000001756
- source: Alliance
  text: Enables several functions, including H2A-H2B histone complex chaperone activity;
    cyclin binding activity; and histone binding activity. Involved in several processes,
    including NLS-bearing protein import into nucleus; nucleosome organization; and
    positive regulation of transcription elongation by RNA polymerase II. Located
    in cellular bud neck septin collar. Part of Gin4 complex. Human ortholog(s) of
    this gene implicated in pancreatic cancer. Orthologous to several human genes
    including NAP1L2 (nucleosome assembly protein 1 like 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001756
  source_id: SGD:S000001756
- source: RefSeq
  text: Enables several functions, including cyclin binding activity; histone binding
    activity; and unfolded protein binding activity. Involved in several processes,
    including NLS-bearing protein import into nucleus; nucleosome organization; and
    positive regulation of transcription elongation by RNA polymerase II. Located
    in cellular bud neck septin collar. Human ortholog(s) of this gene implicated
    in pancreatic cancer. Orthologous to several human genes including NAP1L2 (nucleosome
    assembly protein 1 like 2). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
