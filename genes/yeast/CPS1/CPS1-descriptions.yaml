descriptions:
- source: UniProt
  text: Necessary for use of certain peptides as sole nitrogen source. May also cleave
    intracellularly generated peptides to recycle amino acids for protein synthesis.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P27614
  source_id: P27614
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but could be more precise about the enzyme type.
    - rubric: utility
      score: 4
      notes: Useful for understanding biological context.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 3
      notes: Misses vacuolar localization, trafficking pathways, and metallopeptidase
        identity.
    - rubric: specificity
      score: 3
      notes: Does not specify carboxypeptidase type or vacuolar location.
    overall_notes: Focuses on physiological role (nitrogen utilization, peptide recycling)
      rather than enzymatic identity.
- source: Alliance_Imported
  text: Vacuolar carboxypeptidase S; targeted to vacuole via Vps10p-dependent endosomal
    vacuolar protein sorting pathway and via AP-3 pathway; expression induced under
    low-nitrogen conditions
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003708
  source_id: SGD:S000003708
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Accurate: vacuolar carboxypeptidase S, Vps10p and AP-3 pathway sorting.'
    - rubric: utility
      score: 5
      notes: Highly informative about identity, sorting, and regulation.
    - rubric: compactness
      score: 4
      notes: Concise multi-clause description.
    - rubric: completeness
      score: 5
      notes: Covers enzyme identity, localization, trafficking, and regulation.
    - rubric: specificity
      score: 5
      notes: 'Specific: Vps10p-dependent, AP-3 pathway, low-nitrogen induction.'
    overall_notes: 'Best source: names the enzyme, describes trafficking pathways,
      and mentions expression regulation.'
- source: Alliance_Automated
  text: Enables carboxypeptidase activity. Involved in proteolysis involved in protein
    catabolic process. Located in fungal-type vacuole lumen. Orthologous to human
    PM20D1 (peptidase M20 domain containing 1).
