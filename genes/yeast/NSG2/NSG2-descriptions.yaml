gene_symbol: NSG2
organism: yeast
uniprot_id: P53898
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Stabilizes the HMG-CoA reductase HMG2 by preventing its HRD1- dependent degradation.
    Binds directly to the sterol-sensing domain (SSD)-containing transmembrane region
    of HMG2, promoting its folding to protect it from degradation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53898
  source_id: P53898
- source: Alliance
  text: Protein involved in regulation of sterol biosynthesis; stabilizes Hmg2p, one
    of two HMG-CoA isoenzymes that catalyze the rate-limiting step in sterol biosynthesis;
    localizes to the ER; localizes to the nucleus-vacuole junction during glucose
    restriction; homolog of mammalian INSIG proteins; NSG2 has a paralog, NSG1, that
    arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005100
  source_id: SGD:S000005100
- source: Alliance
  text: Enables unfolded protein binding activity. Involved in sterol biosynthetic
    process. Located in endoplasmic reticulum. Orthologous to human INSIG1 (insulin
    induced gene 1) and INSIG2 (insulin induced gene 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005100
  source_id: SGD:S000005100
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in sterol biosynthetic
    process. Located in endoplasmic reticulum. Orthologous to human INSIG1 (insulin
