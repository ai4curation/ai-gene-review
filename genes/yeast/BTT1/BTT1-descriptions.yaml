gene_symbol: BTT1
organism: yeast
uniprot_id: P40314
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Acts as a component of the nascent polypeptide-associated complex (NAC), which
    promotes mitochondrial protein import by enhancing productive ribosome interactions
    with the outer mitochondrial membrane. Also blocks the inappropriate interaction
    of ribosomes translating non- secretory nascent polypeptides with translocation
    sites in the membrane of the endoplasmic reticulum. BTT1 may act as a transcription
    factor that exert a negative effect on the expression of several genes that are
    transcribed by RNA polymerase II.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40314
  source_id: P40314
- source: Alliance_Imported
  text: Heterotrimeric nascent polypeptide-associated complex beta3 subunit; complex
    binds ribosomes via its beta-subunits in close proximity to nascent polypeptides;
    interacts with Caf130p of the CCR4-NOT complex; similar to human BTF3; BTT1 has
    a paralog, EGD1, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002660
  source_id: SGD:S000002660
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in cotranslational protein
    targeting to membrane. Part of CCR4-NOT core complex and nascent polypeptide-associated
    complex. Orthologous to human BTF3 (basic transcription factor 3) and BTF3L4 (basic
    transcription factor 3 like 4).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002660
  source_id: SGD:S000002660
