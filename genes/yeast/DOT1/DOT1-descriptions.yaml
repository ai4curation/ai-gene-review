review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Strong agreement on H3K79 methylation and silencing function across all
      sources.
  overall_notes: UniProt provides the most mechanistically detailed description. Alliance_Imported
    adds unique isoform biology. Both curated sources are excellent. Automated sources
    are formulaic but do capture the specific methyltransferase activity. RefSeq is
    largely duplicative of Alliance_Automated.
