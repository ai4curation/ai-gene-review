gene_symbol: DOT1
organism: yeast
uniprot_id: Q04089
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Histone methyltransferase that specifically trimethylates histone H3 to form
    H3K79me3. This methylation is required for telomere silencing and for the pachytene
    checkpoint during the meiotic cell cycle by allowing the recruitment of RAD9 to
    double strand breaks. Nucleosomes are preferred as substrate compared to free
    histones. Can bind to DNA (in vitro).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04089
  source_id: Q04089
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: 'Accurate: H3K79me3, telomere silencing, pachytene checkpoint, RAD9 recruitment.'
    - rubric: utility
      score: 5
      notes: Comprehensive and mechanistically detailed.
    - rubric: compactness
      score: 4
      notes: Appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers methylation target, biological roles, substrate preference, and
        DNA binding.
    - rubric: specificity
      score: 5
      notes: 'Highly specific: H3K79me3, RAD9, pachytene checkpoint, nucleosome preference.'
    overall_notes: Excellent curated description covering H3K79 methylation, telomere
      silencing, meiotic checkpoint, and substrate preference.
- source: Alliance_Imported
  text: Nucleosomal histone H3-Lys79 methylase; methylation is required for telomeric
    silencing, meiotic checkpoint control, and DNA damage response; single DOT1 gene
    produces two Dot1p isoforms from alternative translation start sites as a result
    of leaky scanning by the ribosome
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002848
  source_id: SGD:S000002848
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate.
    - rubric: utility
      score: 5
      notes: Covers silencing, checkpoint, DNA damage, and isoform biology.
    - rubric: compactness
      score: 4
      notes: Concise multi-clause description.
    - rubric: completeness
      score: 4
      notes: Covers main functions plus isoform info; misses substrate preference
        details.
    - rubric: specificity
      score: 5
      notes: 'Specific: Lys79, leaky ribosomal scanning, alternative start sites.'
    overall_notes: Strong curated description with unique details about alternative
      translation start sites.
- source: Alliance_Automated
  text: Enables histone H3K79 methyltransferase activity. Involved in several processes,
    including DNA metabolic process; chromatin remodeling; and negative regulation
    of cell cycle phase transition. Located in nucleus. Used to study leukemia. Human
    ortholog(s) of this gene implicated in Nil-Deshwan neurodevelopmental syndrome
    and acute biphenotypic leukemia. Orthologous to human DOT1L (DOT1 like histone
    lysine methyltransferase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002848
  source_id: SGD:S000002848
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct but "DNA metabolic process" is vague for DOT1 role.
    - rubric: utility
      score: 3
      notes: Formulaic; disease associations are for human ortholog.
    - rubric: compactness
      score: 3
      notes: Moderate boilerplate.
    - rubric: completeness
      score: 3
      notes: Covers some processes but misses telomere silencing and meiotic checkpoint
        specifics.
    - rubric: specificity
      score: 3
      notes: GO terms; H3K79 methyltransferase activity is specific.
    overall_notes: GO-derived listing; covers activity and some processes but formulaic.
- source: RefSeq
  text: Enables histone H3K79 methyltransferase activity. Involved in several processes,
    including DNA repair; chromatin remodeling; and negative regulation of cell cycle
    phase transition. Located in nucleus. Used to study leukemia. Human ortholog(s)
    of this gene implicated in acute biphenotypic leukemia. Orthologous to human DOT1L
    (DOT1 like histone lysine methyltransferase). [provided by Alliance of Genome
    Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/852050
  source_id: GeneID:852050
