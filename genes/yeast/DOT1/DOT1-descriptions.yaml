gene_symbol: DOT1
organism: yeast
uniprot_id: Q04089
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Histone methyltransferase that specifically trimethylates histone H3 to form
    H3K79me3. This methylation is required for telomere silencing and for the pachytene
    checkpoint during the meiotic cell cycle by allowing the recruitment of RAD9 to
    double strand breaks. Nucleosomes are preferred as substrate compared to free
    histones. Can bind to DNA (in vitro).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04089
  source_id: Q04089
- source: Alliance_Imported
  text: Nucleosomal histone H3-Lys79 methylase; methylation is required for telomeric
    silencing, meiotic checkpoint control, and DNA damage response; single DOT1 gene
    produces two Dot1p isoforms from alternative translation start sites as a result
    of leaky scanning by the ribosome
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002848
  source_id: SGD:S000002848
- source: Alliance_Automated
  text: Enables histone H3K79 methyltransferase activity. Involved in several processes,
    including DNA metabolic process; chromatin remodeling; and negative regulation
    of cell cycle phase transition. Located in nucleus. Used to study leukemia. Human
    ortholog(s) of this gene implicated in Nil-Deshwan neurodevelopmental syndrome
    and acute biphenotypic leukemia. Orthologous to human DOT1L (DOT1 like histone
    lysine methyltransferase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002848
  source_id: SGD:S000002848
- source: RefSeq
  text: Enables histone H3K79 methyltransferase activity. Involved in several processes,
    including DNA repair; chromatin remodeling; and negative regulation of cell cycle
    phase transition. Located in nucleus. Used to study leukemia. Human ortholog(s)
    of this gene implicated in acute biphenotypic leukemia. Orthologous to human DOT1L
    (DOT1 like histone lysine methyltransferase). [provided by Alliance of Genome
    Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/852050
  source_id: GeneID:852050
