gene_symbol: SSZ1
organism: yeast
uniprot_id: P38788
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the ribosome-associated complex (RAC), a heterodimeric chaperone
    complex involved in regulation of accurate translation termination and in folding
    or maintaining nascent polypeptides in a folding-competent state. RAC stimulates
    the ATPase activity of the ribosome-associated pool of Hsp70-type chaperones SSB1/SSB2
    that bind to the nascent polypeptide chain. SSZ1 is required for ZUO1 to function
    efficiently as a J-protein for SSB1/SSB2. Also involved in pleiotropic drug resistance
    by post-translational activation of transcription factor PDR1.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38788
  source_id: P38788
- source: Alliance_Imported
  text: Hsp70 protein that interacts with Zuo1p (a DnaJ homolog); interacts with Zuo1p
    to form a ribosome-associated complex that binds the ribosome via the Zuo1p subunit;
    also involved in pleiotropic drug resistance via sequential activation of PDR1
    and PDR5; binds ATP
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001106
  source_id: SGD:S000001106
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in gene expression and
    regulation of translational fidelity. Located in cytoplasm. Part of protein folding
    chaperone complex. Orthologous to human HSPA14 (heat shock protein family A (Hsp70)
    member 14).
  source_type: automated
