id: P38788
gene_symbol: SSZ1
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
status: COMPLETE
description: >-
  InterPro2GO domain-based review for SSZ1 (P38788), an atypical ribosome-associated
  Hsp70-family protein. SSZ1 carries the Hsp70 nucleotide-binding domain
  (InterPro:IPR013126), from which InterPro2GO predicts two GO molecular functions:
  ATP binding (GO:0005524) and ATP-dependent protein folding chaperone (GO:0140662).
  Assessment: 1 CNN (ATP binding, already in GOA) and 1 PLI (ATP-dependent protein
  folding chaperone). The PLI is a paralog over-annotation: the Hsp70 domain confers
  the ancestral ATP-driven foldase molecular function by homology, but SSZ1 has
  functionally diverged - it binds nucleotide yet does not detectably hydrolyze ATP,
  and neither ATP binding nor ATP hydrolysis is required for its in vivo function
  (its role is to enable Zuo1 to stimulate the ATPase of the partner Hsp70 Ssb1/2).
  This is exactly the paralog-subfamily failure mode that domain- and foundation-model
  function predictors commit when they propagate a superfamily's ancestral activity
  onto a diverged member. See projects/VIRTUAL_YEAST for the aggregate benchmark.
source_documents:
  - genes/yeast/SSZ1/SSZ1-uniprot.txt
  - genes/yeast/SSZ1/SSZ1-goa.tsv
  - genes/yeast/SSZ1/SSZ1-ai-review.yaml
  - rules/arba/_interpro2go.txt
predictions:
  - source_method: InterPro2GO
    source_version: "rules/arba/_interpro2go.txt (repo snapshot)"
    predicted_term:
      id: GO:0140662
      label: ATP-dependent protein folding chaperone
    predicted_term_type: GO_MF
    review:
      assessment: PLI
      confidence_score: 0
      error_type: PARALOG_OVERANNOTATION
      summary: >-
        InterPro2GO maps the Hsp70 nucleotide-binding domain (IPR013126) to
        GO:0140662 (ATP-dependent protein folding chaperone), the ancestral molecular
        function of the Hsp70 superfamily. This is a paralog over-annotation for SSZ1.
        SSZ1 is a non-canonical Hsp70 that forms the ribosome-associated complex (RAC)
        with the J-protein Zuo1: it binds nucleotide but does NOT detectably hydrolyze
        ATP, and neither ATP binding nor ATP hydrolysis is required for its in vivo
        function. Its operative role is to enable Zuo1 to stimulate the ATPase of the
        partner ribosome-bound Hsp70 Ssb1/2 - i.e. it is a co-chaperone scaffold, not
        an ATP-driven foldase. Curated GOA reflects this divergence: SSZ1 carries
        GO:0044183 (protein folding chaperone) and GO:0051083 ('de novo' cotranslational
        protein folding, IDA/IMP) but is deliberately NOT annotated to any ATP-dependent
        foldase activity. Asserting GO:0140662 would attribute an ATPase-driven folding
        mechanism the protein does not use. The same InterPro2GO prediction is correct
        for the canonical paralogs SSA1 (cytosolic foldase) and SSQ1 (mitochondrial,
        ATP-dependent Fe-S transfer) - the discordance is specific to this diverged
        subfamily member, which is the signature of a PLI error.
      supported_by:
        - reference_id: UniProtKB:P38788
          supporting_text: >-
            RAC stimulates the ATPase activity of the ribosome-associated pool of
            Hsp70-type chaperones SSB1/SSB2 that bind to the nascent polypeptide chain.
            SSZ1 is required for ZUO1 to function efficiently as a J-protein for SSB1/SSB2.
  - source_method: InterPro2GO
    source_version: "rules/arba/_interpro2go.txt (repo snapshot)"
    predicted_term:
      id: GO:0005524
      label: ATP binding
    predicted_term_type: GO_MF
    review:
      assessment: CNN
      confidence_score: 2
      summary: >-
        GO:0005524 (ATP binding) is correct - SSZ1 retains a functional Hsp70
        nucleotide-binding domain and binds ATP - but it is not novel: GOA already
        annotates SSZ1 with GO:0005524 (IEA). This is a Correct-but-Not-Novel
        prediction that recapitulates an existing annotation from domain homology.
        Note the contrast with GO:0140662 above: SSZ1 binds ATP (this term stands)
        but does not hydrolyze it productively for folding (so the ATP-dependent
        foldase term does not).
