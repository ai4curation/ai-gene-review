gene_symbol: NTE1
organism: yeast
uniprot_id: Q04958
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Intracellular phospholipase B that catalyzes the double deacylation of phosphatidylcholine
    (PC) to glycerophosphocholine (GroPCho). Plays an important role in membrane lipid
    homeostasis. Responsible for the rapid PC turnover in response to inositol, elevated
    temperatures, or when choline is present in the growth medium (PubMed:15044461,
    PubMed:15611060, PubMed:16777854). NTE1 activity impacts the repressing transcriptional
    activity of OPI1, the main regulator of phospholipid synthesis gene transcription
    (PubMed:19841481).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q04958
  source_id: Q04958
- source: Alliance_Imported
  text: Serine esterase; homolog of human neuropathy target esterase (NTE); Nte1p-mediated
    phosphatidylcholine turnover influences transcription factor Opi1p localization,
    affecting transcriptional regulation of phospholipid biosynthesis genes
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004524
  source_id: SGD:S000004524
- source: Alliance_Automated
  text: Enables phosphatidylcholine lysophospholipase activity. Involved in phosphatidylcholine
    catabolic process and regulation of phospholipid biosynthetic process. Located
    in endoplasmic reticulum. Human ortholog(s) of this gene implicated in Boucher-Neuhauser
    syndrome; Laurence-Moon syndrome; Oliver-McFarlane syndrome; and hereditary spastic
    paraplegia 39. Orthologous to several human genes including PNPLA6 (patatin like
    domain 6, lysophospholipase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004524
  source_id: SGD:S000004524
- source: RefSeq
  text: Enables lysophospholipase activity. Involved in phosphatidylcholine catabolic
    process and regulation of phospholipid biosynthetic process. Located in endoplasmic
