descriptions:
- source: UniProt
  text: Molecular chaperone; assists the folding of proteins upon ATP hydrolysis.
    Known to play a role, in vitro, in the folding of actin and tubulin. In yeast
    may play a role in mitotic spindle formation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P39079
  source_id: P39079
- source: Alliance_Imported
  text: Subunit of the cytosolic chaperonin Cct ring complex; related to Tcp1p, essential
    protein that is required for the assembly of actin and tubulins in vivo; contains
    an ATP-binding motif
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002596
  source_id: SGD:S000002596
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in protein folding. Part
    of chaperonin-containing T-complex. Orthologous to several human genes including
    CCT6A (chaperonin containing TCP1 subunit 6A).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002596
  source_id: SGD:S000002596
