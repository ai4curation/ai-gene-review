    - rubric: compactness
      score: 3
      notes: Moderately verbose.
    - rubric: completeness
      score: 3
      notes: Covers ribosome biogenesis and SSU export but adds distracting proteasome
        info.
    - rubric: specificity
      score: 3
      notes: Mix of specific and generic terms.
    overall_notes: GO-derived automated description; includes proteasome assembly
