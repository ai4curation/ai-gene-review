gene_symbol: PNO1
organism: yeast
uniprot_id: Q99216
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Required for small ribosomal subunit (SSU) synthesis. Has a role in the processing
    of early nucleolar and late cytoplasmic pre-RNA species. Recruits DIM1 to nucleolar
    pre-RNAs. Indirectly required for cleavage at the A2 site of the 20S pre-rRNA,
    forming 18S rRNA, and at A1 and A2 sites of other pre-rRNAs.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q99216
  source_id: Q99216
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of rRNA processing function.
    - rubric: utility
      score: 5
      notes: Very useful for understanding the molecular role.
    - rubric: compactness
      score: 4
      notes: Appropriately detailed for a complex function.
    - rubric: completeness
      score: 4
      notes: Covers SSU synthesis, DIM1 recruitment, and cleavage sites.
    - rubric: specificity
      score: 5
      notes: Mentions specific cleavage sites (A1, A2) and interactors.
    overall_notes: Detailed description of SSU synthesis role and pre-rRNA processing.
- source: Alliance_Imported
  text: Essential nucleolar protein required for pre-18S rRNA processing; interacts
    with Dim1p, an 18S rRNA dimethyltransferase, and also with Nob1p, which is involved
    in proteasome biogenesis; contains a KH domain
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005671
  source_id: SGD:S000005671
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 4
      notes: Useful context about interactions and KH domain.
    - rubric: compactness
      score: 4
      notes: Concise.
    - rubric: completeness
      score: 4
      notes: Covers interactions (Dim1p, Nob1p) and KH domain but not specific cleavage
        sites.
    - rubric: specificity
      score: 4
      notes: Names specific interactors and structural domain.
    overall_notes: Good curated description emphasizing essentiality and protein interactions.
- source: Alliance_Automated
  text: Enables rRNA primary transcript binding activity and unfolded protein binding
    activity. Involved in proteasome assembly and ribosome biogenesis. Acts upstream
    of or within ribosomal small subunit export from nucleus. Located in nucleolus.
    Part of small-subunit processome. Orthologous to human PNO1 (partner of NOB1 homolog).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005671
  source_id: SGD:S000005671
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
