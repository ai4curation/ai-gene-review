      nuclear/nucleolar and nucleocytoplasmic ribosome biogenesis factor.
    action: ACCEPT
    reason: >-
      Pno1 acts in nuclear and nucleolar stages of SSU biogenesis and has direct
      experimental nuclear/nucleolar localization support.
