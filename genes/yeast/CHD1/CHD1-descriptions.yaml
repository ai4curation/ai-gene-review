review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: Curated sources agree on chromatin remodeling and SAGA/SLIK membership.
      UniProt emphasizes the HAT complex substrate recognition role while Alliance_Imported
      emphasizes transcription elongation chromatin maintenance.
  overall_notes: 'UniProt provides an exceptionally detailed description of CHD1 chromatin
    remodeling functions, SAGA/SLIK complex roles, histone acetylation specificity,
    and transcription regulation. Alliance_Imported complements with Isw1b cooperation
    and chromatin integrity during elongation. Automated sources are reasonable but
    miss the depth. Best source: UniProt.'
