gene_symbol: CHD1
organism: yeast
uniprot_id: P32657
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: ATP-dependent chromatin-remodeling factor which functions as substrate recognition
    component of the transcription regulatory histone acetylation (HAT) complexes
    SAGA and SLIK. It recognizes H3K4me. SAGA is involved in RNA polymerase II-dependent
    transcriptional regulation of approximately 10% of yeast genes. At the promoters,
    SAGA is required for recruitment of the basal transcription machinery. It influences
    RNA polymerase II transcriptional activity through different activities such as
    TBP interaction (SPT3, SPT8 and SPT20) and promoter selectivity, interaction with
    transcription activators (GCN5, ADA2, ADA3 and TRA1), and chromatin modification
    through histone acetylation (GCN5) and deubiquitination (UBP8). SAGA acetylates
    nucleosomal histone H3 to some extent (to form H3K9ac, H3K14ac, H3K18ac and H3K23ac).
    SAGA interacts with DNA via upstream activating sequences (UASs). SLIK is proposed
    to have partly overlapping functions with SAGA. It preferentially acetylates methylated
    histone H3, at least after activation at the GAL1-10 locus. Acts in opposition
    to the FACT complex in regulating polymerase II transcription. Also required for
    efficient transcription by RNA polymerase I, and more specifically the pol I transcription
    termination step. Negatively regulates DNA replication. Not only involved in transcription-related
    chromatin-remodeling, but also required to maintain a specific chromatin configuration
    across the genome.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P32657
  source_id: P32657
- source: Alliance_Imported
  text: Chromatin remodeler that regulates various aspects of transcription; acts
    in conjunction with Isw1b to regulate chromatin structure, maintain chromatin
    integrity during transcription elongation by RNAP II by preventing trans-histone
    exchange over coding regions; component of both SAGA and SLIK complexes; ATPase
    motor stimulates DNA unwrapping from nucleosomes; contains two chromodomains,
    a helicase domain and a DNA-binding domain; human ortholog CHD1 is a prostate
    cancer tumor suppressor
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000966
  source_id: SGD:S000000966
- source: Alliance_Automated
  text: Enables DNA binding activity; histone H3K4me3 reader activity; and nucleosome
    array spacer activity. Involved in several processes, including DNA-templated
    transcription; double-strand break repair; and regulation of nucleobase-containing
    compound metabolic process. Located in nucleolar chromatin. Part of SAGA complex
    and SLIK (SAGA-like) complex. Is active in site of double-strand break. Used to
    study prostate cancer. Human ortholog(s) of this gene implicated in castration-resistant
    prostate carcinoma; developmental and epileptic encephalopathy 94; and prostate
    cancer. Orthologous to human CHD1 (chromodomain helicase DNA binding protein 1)
    and CHD2 (chromodomain helicase DNA binding protein 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000966
  source_id: SGD:S000000966
- source: RefSeq
  text: Enables ATP-dependent chromatin remodeler activity; DNA binding activity;
    and methylated histone binding activity. Involved in several processes, including
    DNA-templated transcription; double-strand break repair; and regulation of nucleobase-containing
    compound metabolic process. Located in nucleolar chromatin. Part of SAGA complex
    and SLIK (SAGA-like) complex. Is active in site of double-strand break. Used to
    study prostate cancer. Human ortholog(s) of this gene implicated in castration-resistant
    prostate carcinoma; developmental and epileptic encephalopathy 94; and prostate
