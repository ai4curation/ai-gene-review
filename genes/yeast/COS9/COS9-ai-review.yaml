  original_reference_id: GO_REF:0000015
  qualifier: enables
  review:
    summary: >-
      No molecular function has been assigned to COS9, and the DUP/COS family is
      enzymatically uncharacterized (InterPro IPR001142 describes it as membrane proteins "of
      unknown function"). The ND (no data) annotation accurately records this molecular-
      function gap. Accepted as an honest statement of the unknown; see knowledge_gaps.
