gene_symbol: SSQ1
organism: yeast
uniprot_id: Q05931
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Required for the assembly of iron-sulfur (Fe/S) clusters in mitochondria (PubMed:10779357,
    PubMed:11273703, PubMed:12756240, PubMed:15123690, PubMed:15958384, PubMed:16431909,
    PubMed:31040179, PubMed:9660806). Assisted by the DnaJ-like co-chaperone JAC1
    and the nucleotide exchange factor MGE1, it mediates ATP-dependent Fe-S cluster
    transfer from the scaffold proteins ISU1/ISU2 to GRX5 (PubMed:11273703, PubMed:12756240,
    PubMed:15123690, PubMed:15958384, PubMed:16431909, PubMed:23615440, PubMed:26545917,
    PubMed:31040179).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q05931
  source_id: Q05931
- source: Alliance
  text: Mitochondrial hsp70-type molecular chaperone; required for assembly of iron/sulfur
    clusters into proteins at a step after cluster synthesis; involved in maturation
    of Grx5p and Yfh1p, which is a homolog of human frataxin implicated in Friedreich's
    ataxia
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004361
  source_id: SGD:S000004361
- source: Alliance
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in [2Fe-2S] cluster assembly and intracellular iron ion homeostasis. Located in
    mitochondrial matrix. Is active in mitochondrion.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004361
  source_id: SGD:S000004361
