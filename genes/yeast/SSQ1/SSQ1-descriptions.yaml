gene_symbol: SSQ1
organism: yeast
uniprot_id: Q05931
taxon_id: NCBITaxon:559292
review:
  reviewer: AI
  overall_notes: >-
    Excellent concordance on the core Fe-S cluster assembly chaperone function. All
    sources agree on the mitochondrial Hsp70 identity and iron-sulfur cluster role.
    UniProt is the most mechanistically precise, describing the JAC1/MGE1-assisted
    ATP-dependent transfer from ISU1/ISU2 scaffolds to GRX5. SGD curated adds the
    important context about Grx5p and Yfh1p maturation and the human frataxin/Friedreich's
    ataxia connection. The automated descriptions are minimal but correct. Best source:
    UniProt curated for mechanistic precision; SGD curated for disease-relevance context.
    UniProt is the better standalone description for functional understanding.
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: >-
      Near-perfect agreement. All sources converge on mitochondrial Hsp70 / Fe-S
      cluster assembly. No contradictions. UniProt adds mechanistic detail; SGD adds
      disease context.
descriptions:
- source: UniProt
  text: Required for the assembly of iron-sulfur (Fe/S) clusters in mitochondria (PubMed:10779357,
    PubMed:11273703, PubMed:12756240, PubMed:15123690, PubMed:15958384, PubMed:16431909,
    PubMed:31040179, PubMed:9660806). Assisted by the DnaJ-like co-chaperone JAC1
    and the nucleotide exchange factor MGE1, it mediates ATP-dependent Fe-S cluster
    transfer from the scaffold proteins ISU1/ISU2 to GRX5 (PubMed:11273703, PubMed:12756240,
    PubMed:15123690, PubMed:15958384, PubMed:16431909, PubMed:23615440, PubMed:26545917,
    PubMed:31040179).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q05931
  source_id: Q05931
  review:
    reviewer: AI
    overall_notes: >-
      Highly precise mechanistic description naming all key partners in the Fe-S
      transfer chain (JAC1, MGE1, ISU1/ISU2, GRX5). Well-cited. Does not mention
      the Hsp70 identity explicitly or the disease connection. Inline PMIDs add clutter.
    rubrics:
    - rubric: correctness
      score: 5
      notes: Impeccable accuracy with extensive citation support.
    - rubric: utility
      score: 5
      notes: Immediately conveys the specific biochemical mechanism.
    - rubric: compactness
      score: 3
      notes: Many inline PMIDs make it hard to read; the core text is only 2 sentences.
    - rubric: completeness
      score: 4
      notes: >-
        Covers the core mechanism perfectly. Misses the Hsp70 family identity,
        Yfh1p/frataxin connection, and human disease relevance.
    - rubric: specificity
      score: 5
      notes: Names all pathway components (JAC1, MGE1, ISU1, ISU2, GRX5).
- source: Alliance_Imported
  text: Mitochondrial hsp70-type molecular chaperone; required for assembly of iron/sulfur
    clusters into proteins at a step after cluster synthesis; involved in maturation
    of Grx5p and Yfh1p, which is a homolog of human frataxin implicated in Friedreich's
    ataxia
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004361
  source_id: SGD:S000004361
  review:
    reviewer: AI
    overall_notes: >-
      Concise and well-contextualized. Identifies SSQ1 as an Hsp70-type chaperone
      (missing from UniProt), specifies the post-synthesis step, and provides the
      valuable frataxin/Friedreich's ataxia disease connection. Less mechanistic
      detail than UniProt (no JAC1, MGE1, ISU1/2 mentioned).
    rubrics:
    - rubric: correctness
      score: 5
      notes: All claims accurate.
    - rubric: utility
      score: 5
      notes: >-
        Excellent standalone summary: protein family, function, pathway step, and
        disease relevance in three clauses.
    - rubric: compactness
      score: 5
      notes: Three perfectly balanced semicolon clauses; no wasted words.
    - rubric: completeness
      score: 4
      notes: Misses the specific transfer mechanism (JAC1/MGE1/ISU1/2 to GRX5).
    - rubric: specificity
      score: 4
      notes: Names Grx5p, Yfh1p, and Friedreich's ataxia; less specific on the transfer machinery.
- source: Alliance_Automated
  text: Enables ATP hydrolysis activity and unfolded protein binding activity. Involved
    in [2Fe-2S] cluster assembly and intracellular iron ion homeostasis. Located in
    mitochondrial matrix. Is active in mitochondrion.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004361
  source_id: SGD:S000004361
  review:
    reviewer: AI
    overall_notes: >-
      Minimal but reasonably accurate. "[2Fe-2S] cluster assembly" is specific and
      correct. "Unfolded protein binding" is misleading -- SSQ1 binds the ISU scaffold
      to facilitate Fe-S transfer, not generic unfolded proteins. "Iron ion homeostasis"
      is an indirect consequence, not a direct function.
    rubrics:
    - rubric: correctness
      score: 3
      notes: >-
        "Unfolded protein binding" is a mischaracterization of the ISU-binding mechanism.
        "[2Fe-2S] cluster assembly" is correct.
    - rubric: utility
      score: 2
      notes: Too sparse to understand SSQ1's actual role in Fe-S biogenesis.
    - rubric: compactness
      score: 4
      notes: Very short; brevity reflects missing content.
    - rubric: completeness
      score: 2
      notes: Misses chaperone identity, all partner proteins, disease relevance.
    - rubric: specificity
      score: 3
      notes: '"[2Fe-2S] cluster assembly" is specific; other terms are generic.'
