review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: 'Agreement on core snoRNP assembly function. Discrepancy: "unfolded protein
      binding" in automated sources is a poor fit for SHQ1 mechanism.'
  overall_notes: All sources agree on the H/ACA snoRNP assembly role. UniProt is unusually
    terse for a curated source. SGD curated is by far the best, providing mechanistic
    detail (RNA mimicry, specific interactors). Automated sources apply a generic
    "unfolded protein binding" term that is misleading for this RNA mimic chaperone.
