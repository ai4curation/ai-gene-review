- source: Alliance_Imported
  text: Chaperone protein; required for the assembly of box H/ACA snoRNPs and thus
    for pre-rRNA processing; functions as an RNA mimic; forms a complex with Naf1p
    and interacts with H/ACA snoRNP components Nhp2p and Cbf5p; homology with known
    Hsp90p cochaperones; relocalizes to the cytosol in response to hypoxia
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001366
  source_id: SGD:S000001366
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-characterized.
    - rubric: utility
      score: 5
      notes: Excellent functional overview with mechanistic insight.
    - rubric: compactness
      score: 4
      notes: Dense but appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers chaperone function, interactions, RNA mimicry, pre-rRNA processing,
        relocalization.
    - rubric: specificity
      score: 5
      notes: Names specific interactors (Naf1p, Nhp2p, Cbf5p) and functional mechanisms.
    overall_notes: Most informative description. Covers chaperone function, RNA mimicry,
      specific protein interactions (Naf1p, Nhp2p, Cbf5p), Hsp90 cochaperone homology,
      pre-rRNA processing role, and hypoxia response.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in box H/ACA snoRNP assembly.
    Located in cytosol and nucleoplasm. Human ortholog(s) of this gene implicated
    in dystonia 35, childhood-onset. Orthologous to human SHQ1 (SHQ1, H/ACA ribonucleoprotein
    assembly factor).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001366
  source_id: SGD:S000001366
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Unfolded protein binding is a stretch for SHQ1 which acts as an RNA mimic
        rather than a classical chaperone.
    - rubric: utility
      score: 2
      notes: Basic but limited.
    - rubric: compactness
      score: 4
