core_functions:
- description: >-
    Shq1 is a Cbf5-directed chaperone/assembly factor required for box H/ACA
    snoRNP biogenesis. It binds Cbf5, prevents premature or inappropriate RNA
    engagement through its RNA-mimic domain, and supports productive early H/ACA
    RNP assembly before handoff to subsequent assembly factors.
