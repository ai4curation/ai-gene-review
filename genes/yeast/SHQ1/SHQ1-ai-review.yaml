suggested_questions:
- question: What triggers release of Cbf5 from Shq1 and handoff to Naf1 or nascent H/ACA RNA during yeast RNP assembly?
  experts:
  - snoRNP assembly experts
  - RNA-protein complex biochemists
- question: Does the oxygen-dependent cytosolic pool of Shq1 have a regulated assembly function or represent sequestration away from nuclear H/ACA biogenesis?
  experts:
  - yeast stress-response researchers
suggested_experiments:
- experiment_type: time-resolved assembly reconstitution
  description: Reconstitute yeast Cbf5-Shq1-Naf1-H/ACA RNA transitions and monitor handoff by fluorescence, EMSA, and activity assays using wild-type and RNA-mimic-domain mutants.
  hypothesis: Shq1 prevents premature Cbf5-RNA engagement until a defined handoff step promotes productive H/ACA RNP assembly.
- experiment_type: localization-function separation assay
  description: Engineer Shq1 mutants or conditional anchors that selectively alter nuclear versus cytosolic localization, then measure H/ACA snoRNA accumulation and pseudouridylation under normoxia and hypoxia.
  hypothesis: Nuclear/nucleoplasmic Shq1 is sufficient for core H/ACA assembly, while cytosolic relocalization modulates availability under oxygen stress.
