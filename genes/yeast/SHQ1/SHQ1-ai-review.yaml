id: P40486
gene_symbol: SHQ1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  SHQ1 encodes an essential conserved chaperone/assembly factor for box H/ACA
  small nucleolar RNP biogenesis. Shq1 binds the pseudouridine synthase Cbf5,
  uses an RNA-mimic domain to block premature RNA engagement, and promotes early
  assembly before handoff to later factors such as Naf1. The best-supported core
  function is protein chaperoning in box H/ACA snoRNP assembly in the nucleus or
  nucleoplasm; oxygen-dependent cytosolic relocalization is supported but is not
  the central conserved function.
