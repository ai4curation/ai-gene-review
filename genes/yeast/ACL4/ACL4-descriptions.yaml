gene_symbol: ACL4
organism: yeast
uniprot_id: Q03771
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Acts as a chaperone for the L4 ribosomal subunit encoded by RPL4A and PRPL4B,
    required for hierarchical ribosome assembly. Shields ribosomal protein L4 until
    timely release and insertion into the pre- ribosome is possible, once ribosomal
    protein L18 is present.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q03771
  source_id: Q03771
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate but contains a likely typo (PRPL4B instead of RPL4B).
    - rubric: utility
      score: 4
      notes: Clearly conveys the chaperone role and assembly mechanism.
    - rubric: compactness
      score: 4
      notes: Concise and well-structured.
    - rubric: completeness
      score: 3
      notes: Misses co-translational association and transcriptional co-regulation
        details.
    - rubric: specificity
      score: 4
      notes: Names specific ribosomal proteins (L4, L18) and the pre-ribosome.
    overall_notes: 'Accurate description of the chaperone role for Rpl4. Mentions
      hierarchical assembly and L18 dependency. Minor issue: refers to PRPL4B (likely
      typo for RPL4B).'
- source: Alliance_Imported
  text: Specific assembly chaperone for ribosomal protein Rpl4a/Rpl4b; associates
    co-translationally with a evolutionarily conserved internal loop of nascent Rpl4a/b,
    and is released only after an the eukaryotic-specific extension of nascent Rpl4a/b
    mediates nuclear import, incorporation into the pre-ribosome and complex disassembly;
    role in biogenesis of the 60S ribosomal subunit; transcriptionally co-regulated
    with rRNA and ribosome biosynthesis genes
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002568
  source_id: SGD:S000002568
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported by literature.
    - rubric: utility
      score: 5
      notes: Excellent for understanding the full scope of ACL4 function.
    - rubric: compactness
      score: 3
      notes: Somewhat dense but justified by the complexity of the mechanism.
    - rubric: completeness
      score: 5
      notes: Covers chaperone role, co-translational binding, nuclear import, pre-ribosome
        incorporation, and co-regulation.
    - rubric: specificity
      score: 5
      notes: Mentions specific substrates (Rpl4a/b), "nascent chains" is specific,
        and refers to eukaryotic-specific extension.
    overall_notes: Most comprehensive description. Covers co-translational association,
      nuclear import, and transcriptional co-regulation. Highly specific and informative.
- source: Alliance_Automated
  text: Enables protein transporter activity and unfolded protein binding activity.
    Involved in ribosomal large subunit biogenesis. Located in cytoplasm and nucleus.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002568
  source_id: SGD:S000002568
