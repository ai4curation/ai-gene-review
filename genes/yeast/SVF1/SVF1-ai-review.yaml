- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Electronic annotation from InterPro domain (IPR013931, Svf1-like N-terminal domain)
      mapping to response to oxidative stress. This is based on the original characterization
      of SVF1 as required for survival under oxidative stress.
    action: ACCEPT
