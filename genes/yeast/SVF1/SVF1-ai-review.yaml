      and cytosolic states.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Together, our results demonstrate that Svf1 localizes at the cis-Golgi apparatus as well as in the cytoplasm (Fig"
- term:
    id: GO:0030148
    label: sphingolipid biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Mutant phenotype evidence showing that svf1 deletion results in decreased levels of complex
      sphingolipids (IPC, MIPC) with concomitant ceramide accumulation, demonstrating SVF1
      contributes to sphingolipid biosynthesis (PMID:36897280).
    action: ACCEPT
    reason: >-
      Limar et al. (PMID:36897280) performed extensive lipidomics showing that svf1 deletion
      causes decreased IPC and MIPC levels and increased ceramide levels. Multi-pathway flux
      analysis confirmed decreased synthesis rate of inositol-containing sphingolipids. SVF1
      contributes to sphingolipid biosynthesis by supplying ceramide substrates to the Golgi
      where IPC synthase (Aur1) converts them to complex sphingolipids. The qualifier
      acts_upstream_of_or_within is appropriate as SVF1 is not itself a biosynthetic enzyme
      but rather enables the pathway by providing substrate transport.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "However, we also detected increased levels of the major ceramide species (CER 44:0;4) in svf1\u0394 cells compared to WT cells (Fig"
      - reference_id: PMID:36897280
        supporting_text: "Consistent with a potential function of Svf1 in ceramide transport, we detected a decrease in the SP species IPC and MIPC in svf1\u0394 cells compared to WT cells."
- term:
    id: GO:0030148
    label: sphingolipid biosynthetic process
  evidence_type: IGI
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Genetic interaction evidence (with NVJ2, SGD:S000006295) supporting SVF1 involvement in
      sphingolipid biosynthesis. The svf1/nvj2 double deletion shows sensitivity to myriocin
      (sphingolipid biosynthesis inhibitor), while single deletions do not (PMID:36897280).
    action: ACCEPT
    reason: >-
      Limar et al. (PMID:36897280) demonstrated that the svf1/nvj2 double deletion is sensitive
      to chemical inhibition of sphingolipid biosynthesis by myriocin, while both single mutants
      grow similarly to wild type. Additionally, epistasis analysis of svf1 with osh2/osh3/osh4
      deletions showed additive depletion of all complex sphingolipid species. The IGI evidence
      with NVJ2 supports a parallel ceramide transport pathway model.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "While both single mutants grow similar to a WT strain, the double deletion of SVF1 and NVJ2 is sensitive to chemical inhibition of SP biosynthesis, further supporting a role in SP homeostasis (Fig"
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:14562095
  review:
    summary: >-
      High-throughput data analysis from the global GFP-fusion protein localization study in
      budding yeast (PMID:14562095). SVF1 was classified as having nuclear localization in
      addition to cytoplasmic localization.
    action: ACCEPT
    reason: >-
      The Huh et al. (PMID:14562095) study is the seminal high-throughput protein localization
      study in yeast, classifying 75% of the yeast proteome into subcellular compartments using
      GFP-tagged proteins. Nuclear localization for SVF1 was detected in this study. While
      subsequent focused work (PMID:36897280) emphasized cis-Golgi and cytoplasmic localization,
      nuclear localization was not specifically excluded. The HDA evidence is acceptable.
    supported_by:
      - reference_id: PMID:14562095
        supporting_text: "Here we describe the construction and analysis of a collection of yeast strains expressing full-length, chromosomally tagged green fluorescent protein fusion proteins"
