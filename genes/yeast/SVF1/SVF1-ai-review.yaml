    summary: >-
      SVF1 localizes to both the cytoplasm and cis-Golgi puncta, with dynamic exchange between
      these two pools depending on the amphipathic helix at the N-terminus (PMID:36897280).
      The IBA annotation for cytoplasm is well supported by multiple lines of experimental evidence.
    action: ACCEPT
    reason: >-
      Cytoplasmic localization of SVF1 is confirmed by IDA evidence from both PMID:36897280
      (fluorescence microscopy showing Svf1-GFP in the cytoplasm alongside punctate cis-Golgi signal)
      and PMID:14562095 (global GFP-fusion localization study). The IBA annotation from phylogenetic
      inference is consistent and appropriate.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Our analysis reveals that Svf1 is localized at the cis-Golgi apparatus and the cytoplasm."
      - reference_id: PMID:14562095
        supporting_text: "Here we describe the construction and analysis of a collection of yeast strains expressing full-length, chromosomally tagged green fluorescent protein fusion proteins."
