        supporting_text: "Our analysis reveals that Svf1 is localized at the cis-Golgi apparatus and the cytoplasm."
- term:
    id: GO:0034599
    label: cellular response to oxidative stress
  evidence_type: IMP
  original_reference_id: PMID:16034825
  review:
    summary: >-
      Mutant phenotype evidence showing that svf1 deletion mutants are hypersensitive to
      oxidative stress and show increased reactive oxygen species (ROS) levels. SVF1
      promotes survival under conditions of oxidative stress (PMID:16034825).
    action: KEEP_AS_NON_CORE
    reason: >-
      Brace et al. (PMID:16034825) demonstrated that svf1 deletion cells are hypersensitive
      to oxidative stress conditions and show elevated ROS levels. This phenotype is real and
      experimentally supported. However, in light of the subsequent discovery that SVF1 is
      a ceramide-binding protein involved in sphingolipid metabolism (PMID:36897280), the
      oxidative stress sensitivity is more likely a secondary consequence of disrupted
      sphingolipid homeostasis and ceramide accumulation (ceramides are known to promote cell
      death and affect membrane integrity) rather than a direct role in oxidative stress
      response. The annotation should be retained as non-core.
    supported_by:
      - reference_id: PMID:16034825
        supporting_text: "Here we demonstrate that the Svf1 protein is required for yeast survival under conditions of oxidative stress, including cold stress"
      - reference_id: PMID:36897280
        supporting_text: "The deletion of SVF1 results in the accumulation of ceramides with a concomitant decrease in complex SPs suggesting that Svf1 transports ceramides between the ER"
