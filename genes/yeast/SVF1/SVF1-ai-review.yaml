- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Electronic annotation for ER membrane from UniProt subcellular location. UniProt lists SVF1
      as an ER membrane peripheral protein based on PMID:36897280. However, SVF1 interaction with
      the ER is very transient under normal conditions and only becomes detectable when the
      amphipathic helix glycines are mutated to alanines (G7A/G8A).
    action: ACCEPT
    reason: >-
      UniProt explicitly annotates SVF1 as localizing to the ER membrane as a peripheral membrane
      protein (PMID:36897280). While the ER interaction is transient and normally difficult to
      detect by fluorescence microscopy, Limar et al. showed that the G7A/G8A mutant with
      increased AH folding capacity is recruited to the ER membrane, and immuno-purification of
      SVF1 identified ER-resident interaction partners including Sec12 and VLCFA elongases.
      The annotation is acceptable as it reflects a functionally relevant transient association
      with the ER membrane during ceramide pick-up.
    supported_by:
      - reference_id: PMID:36897280
