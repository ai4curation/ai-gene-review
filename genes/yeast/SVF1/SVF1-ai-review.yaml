      supporting_text: "Interestingly, the additional deletion of SVF1 in a sec12ts strain resulted in even stronger depletion of complex SP, suggesting that Svf1 rather transports ceramides in a parallel pathway to the COP-II vesicular transport pathway."
    - statement: Multi-pathway flux analysis confirmed decreased IPC synthesis in svf1 deletion
    - statement: About 40% of SVF1 puncta co-localize with both cis-Golgi and ER exit sites
