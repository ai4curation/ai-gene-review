    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Svf1 co-localizes with the cis-Golgi apparatus, marked with Mnn9-mKate, but not with the late Golgi (Sec7-mKate), endosomes (Vps4-3xmCherry), or the endoplasmic reticulum marked with dsRed-HDEL (Fig"
- term:
    id: GO:0035621
    label: ER to Golgi ceramide transport
  evidence_type: IMP
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Mutant phenotype evidence showing that svf1 deletion leads to ceramide accumulation and
      decreased complex sphingolipid levels, consistent with impaired ER to Golgi ceramide
      transport. Epistasis analysis with sec12ts and nvj2 deletion demonstrates SVF1 acts in
      a parallel pathway to vesicular transport (PMID:36897280).
    action: ACCEPT
    reason: >-
      This is a central function of SVF1. Limar et al. (PMID:36897280) showed: (1) svf1 deletion
      increases ceramide levels and decreases complex sphingolipid (IPC, MIPC) levels; (2) the
      svf1/sec12ts double mutant shows additive depletion of complex sphingolipids, indicating
      SVF1 acts in a parallel non-vesicular pathway; (3) multi-pathway flux analysis confirmed
      decreased IPC synthesis rate in svf1 deletion cells specifically, without affecting PI or
      PS metabolism; (4) the V12D membrane-targeting mutant phenocopies the deletion. The IMP
      evidence is strong and well-supported.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Interestingly, the additional deletion of SVF1 in a sec12ts strain resulted in even stronger depletion of complex SP, suggesting that Svf1 rather transports ceramides in a parallel pathway to the COP-II vesicular transport pathway."
      - reference_id: PMID:36897280
        supporting_text: "This multi-pathway flux analysis revealed a decreased synthesis rate of the inositol-containing SPs in svf1Δ and Svf1V12D expressing cells (Fig"
- term:
    id: GO:0070971
    label: endoplasmic reticulum exit site
  evidence_type: IDA
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Approximately 40% of SVF1 puncta co-localize with both cis-Golgi (Mnn9) and ER exit
      sites (Sec31), reflecting the close apposition of these structures at the ER-Golgi
      interface (PMID:36897280).
    action: ACCEPT
    reason: >-
      Limar et al. (PMID:36897280) performed systematic co-localization of Svf1-GFP with
      Mnn9-mKate (cis-Golgi) and Sec31-Halo (ER exit sites), finding that approximately 40%
      of SVF1 dots co-localize with both markers simultaneously. This is consistent with the
      proposed function of SVF1 at the ER-Golgi interface where ceramide transfer occurs.
      The "hug-and-kiss" behavior between cis-Golgi and ER exit sites places SVF1 at this
      functional interface.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Our analysis confirmed that \u223C40% of Svf1 dots co-localized with both Mnn9 positive cis-Golgi and Sec31 containing ER-exit sites (Fig"
- term:
    id: GO:0097001
    label: ceramide binding
  evidence_type: IDA
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Direct experimental evidence for ceramide binding from targeted lipidomics of purified
      SVF1 protein, molecular docking studies, and mutagenesis of the binding pocket
      (PMID:36897280). This is a core molecular function of SVF1.
    action: ACCEPT
    reason: >-
      Limar et al. (PMID:36897280) demonstrated ceramide binding by multiple approaches:
      (1) targeted lipidomics of FLAG-purified SVF1 showed high amounts of co-purified ceramide
      44:0;4 compared to general cellular levels; (2) molecular docking identified a hydrophobic
      binding pocket between the two lipocalin domains as the most favorable ceramide binding site;
      (3) mutation of H273/H274 in the cap region strongly inhibits ceramide binding and abolishes
      cis-Golgi localization; (4) ceramide binding is independent of the amphipathic helix (V12D
      and G7A/G8A mutants retain ceramide binding). This is the defining molecular function of SVF1.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "We detected 44:0;4 ceramide co-purified with Svf1 in high amounts compared to general ceramide levels in the cell."
      - reference_id: PMID:36897280
        supporting_text: "The most probable interaction was found to be at the inter-barrel cleft near an \u03B1-helix cap (Fig"
- term:
    id: GO:0005801
    label: cis-Golgi network
  evidence_type: IDA
  original_reference_id: PMID:36897280
  review:
    summary: >-
