id: Q05515
gene_symbol: SVF1
aliases:
  - YDR346C
  - SGI1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  Ceramide-binding protein that contributes to non-vesicular ceramide transport from the endoplasmic
  reticulum to the cis-Golgi network, where ceramides serve as substrates for complex sphingolipid
  biosynthesis. SVF1 contains two lipocalin-like domains with a hydrophobic cleft between them that
  accommodates ceramide binding. It is dynamically targeted to the cis-Golgi membrane via an
  N-terminally acetylated amphipathic helix (residues 1-18). Deletion of SVF1 leads to ceramide
  accumulation and decreased complex sphingolipid levels, acting in a parallel pathway to COP-II
  vesicular transport and NVJ2-dependent non-vesicular transport. SVF1 was originally identified
  as a survival factor required for resistance to oxidative stress and freeze-thaw stress.
core_functions:
  - description: >-
      Binds ceramides via a hydrophobic pocket between two lipocalin domains and contributes to
      non-vesicular ceramide transport from the ER to the cis-Golgi for complex sphingolipid
      biosynthesis
    molecular_function:
      id: GO:0097001
      label: ceramide binding
    directly_involved_in:
      - id: GO:0035621
        label: ER to Golgi ceramide transport
      - id: GO:0030148
        label: sphingolipid biosynthetic process
    locations:
      - id: GO:0033106
        label: cis-Golgi network membrane
      - id: GO:0005737
        label: cytoplasm
