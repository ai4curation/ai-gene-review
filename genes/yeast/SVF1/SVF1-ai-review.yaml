- term:
    id: GO:0120009
    label: intermembrane lipid transfer
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: >-
      Logical inference from lipid transfer activity (GO:0120013) annotation. SVF1 is proposed
      to transfer ceramides between the ER membrane and cis-Golgi membrane, which constitutes
      intermembrane lipid transfer.
    action: ACCEPT
    reason: >-
      This annotation is logically inferred from the lipid transfer activity annotation and is
      well supported by the evidence from PMID:36897280. Limar et al. showed that SVF1 deletion
      results in ceramide accumulation and reduced complex sphingolipid levels, acting in a
      parallel non-vesicular pathway to COP-II-mediated transport. The flux analysis confirmed
      decreased synthesis rate of inositol-containing sphingolipids in svf1 deletion cells.
      This biological process term accurately captures the inter-organelle lipid transfer role.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Together, our data suggest that Svf1 is a ceramide binding protein that is involved in SP biosynthesis at the cis-Golgi most likely by transporting ceramide from the ER to the Golgi apparatus."
- term:
    id: GO:0120013
    label: lipid transfer activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Electronic annotation from InterPro domain (IPR051385, Ceramide-binding SVF1) mapping to
      lipid transfer activity. This is consistent with the proposed ceramide transfer function.
    action: ACCEPT
    reason: >-
      SVF1 is proposed to function as a ceramide transfer protein that transports ceramides
      from the ER to the cis-Golgi (PMID:36897280). Direct ceramide binding was demonstrated
      by targeted lipidomics of purified protein, and functional evidence from lipidomics and
      flux analysis support a role in ceramide transfer. While the direct transfer activity has
      not been formally demonstrated in a reconstituted in vitro transfer assay, the combined
      evidence strongly supports lipid transfer activity. The IEA is acceptable.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "We detected 44:0;4 ceramide co-purified with Svf1 in high amounts compared to general ceramide levels in the cell."
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:36897280
  review:
    summary: >-
      Direct experimental evidence for cytoplasmic localization from fluorescence microscopy
      of Svf1-GFP showing cytosolic signal alongside punctate cis-Golgi structures (PMID:36897280).
    action: ACCEPT
    reason: >-
      Limar et al. (PMID:36897280) directly observed cytoplasmic localization of Svf1-GFP by
      fluorescence microscopy. The protein shows dual localization between the cytoplasm and
      cis-Golgi, with the cytoplasmic pool representing the unbound/untargeted fraction. This
      is confirmed by membrane fractionation showing SVF1 in both pellet and supernatant
      fractions. The cytoplasmic pool is thought to represent SVF1 that has not yet bound
      ceramide or has released its cargo.
    supported_by:
      - reference_id: PMID:36897280
        supporting_text: "Our analysis reveals that Svf1 is localized at the cis-Golgi apparatus and the cytoplasm."
