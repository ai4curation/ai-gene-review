gene_symbol: PNC1
organism: yeast
uniprot_id: P53184
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Catalyzes the deamidation of nicotinamide, an early step in the NAD(+) salvage
    pathway. Positively regulates SIR2-mediated silencing and longevity by preventing
    the accumulation of intracellular nicotinamide, an inhibitor of SIR2, during times
    of stress. Also acts on nicotinyl hydroxamate.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53184
  source_id: P53184
- source: Alliance
  text: Nicotinamidase that converts nicotinamide to nicotinic acid; part of the NAD(+)
    salvage pathway; required for life span extension by calorie restriction; lacks
    a peroxisomal targeting signal but is imported into peroxisomes via binding to
    Gpd1p; PNC1 expression responds to all known stimuli that extend replicative life
    span; protein increases in abundance and relative distribution to cytoplasmic
    foci decreases upon DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003005
  source_id: SGD:S000003005
- source: Alliance
  text: Enables nicotinamidase activity. Involved in heterochromatin formation; negative
    regulation of DNA amplification; and nicotinate nucleotide salvage. Located in
    nucleus and peroxisome.
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003005
  source_id: SGD:S000003005
- source: RefSeq
  text: Enables nicotinamidase activity. Involved in negative regulation of macromolecule
    biosynthetic process and nicotinate nucleotide salvage. Located in nucleus and
    peroxisome. [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/852846
  source_id: GeneID:852846
fetch_date: '2026-03-06'
