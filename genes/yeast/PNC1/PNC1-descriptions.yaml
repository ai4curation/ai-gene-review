      notes: Accurate enzymatic and regulatory description.
    - rubric: utility
      score: 5
      notes: Highly informative about core function and longevity connection.
    - rubric: compactness
      score: 4
      notes: Appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers enzyme activity, NAD+ salvage, SIR2 regulation, and substrate
        range.
    - rubric: specificity
      score: 5
      notes: Names specific enzyme activity, pathway, and regulatory target.
    overall_notes: Excellent description of nicotinamidase activity, NAD+ salvage,
      and SIR2 regulation.
- source: Alliance_Imported
  text: Nicotinamidase that converts nicotinamide to nicotinic acid; part of the NAD(+)
    salvage pathway; required for life span extension by calorie restriction; lacks
    a peroxisomal targeting signal but is imported into peroxisomes via binding to
    Gpd1p; PNC1 expression responds to all known stimuli that extend replicative life
    span; protein increases in abundance and relative distribution to cytoplasmic
    foci decreases upon DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003005
  source_id: SGD:S000003005
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-supported.
    - rubric: utility
      score: 5
      notes: Adds important biological context about lifespan and localization.
    - rubric: compactness
      score: 3
      notes: Dense but valuable.
    - rubric: completeness
      score: 5
      notes: Covers enzyme, salvage pathway, lifespan, peroxisomal import, and stress
        response.
    - rubric: specificity
      score: 5
      notes: Names Gpd1p for import, calorie restriction connection.
    overall_notes: Comprehensive curated description adding calorie restriction and
      peroxisomal import.
