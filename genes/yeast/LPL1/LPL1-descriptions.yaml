gene_symbol: LPL1
organism: yeast
uniprot_id: Q08448
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Phospholipase involved in maintaining the lipid droplet morphology (PubMed:25014274).
    Has phospholipase activity with broad substrate specificity, acting on glycerophospholipids
    phosphatidylethanolamine (PE), phosphatidic acid (PA), phosphatidycholine (PC)
    and phosphatidylserine (PS), primarily at sn-2 position (PubMed:25014274). It
    can later remove fatty acids from the sn-1 position of the produced lysophospholipids
    such as lysophosphatidylethanolamine (LPE) (PubMed:25014274). Also shows activity
    toward phosphatidylglycerol, but, in contrast to what was observed with the other
    phospholipids tested, prefers the sn-1 position (PubMed:25014274).
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q08448
  source_id: Q08448
- source: Alliance
  text: Phospholipase; contains lipase specific GXSXG motif; maintains lipid droplet
    (LD) morphology; induced by transcription factor Rpn4p; protein abundance increases
    in response to DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000005585
  source_id: SGD:S000005585
- source: Alliance
  text: Enables phosphatidylcholine lysophospholipase activity. Involved in lipid
    homeostasis. Located in lipid droplet. Orthologous to human FAM135A (family with
    sequence similarity 135 member A) and FAM135B (family with sequence similarity
    135 member B).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000005585
  source_id: SGD:S000005585
- source: RefSeq
  text: Enables lysophospholipase activity. Involved in lipid homeostasis. Located
    in lipid droplet. Orthologous to human FAM135A (family with sequence similarity
