gene_symbol: SIR3
organism: yeast
uniprot_id: P06701
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: The proteins SIR1 through SIR4 are required for transcriptional repression
    of the silent mating type loci, HML and HMR. The proteins SIR2 through SIR4 repress
    mulitple loci by modulating chromatin structure. Involves the compaction of chromatin
    fiber into a more condensed form.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P06701
  source_id: P06701
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: 'Correct but contains a typo: "mulitple". Also somewhat vague.'
    - rubric: utility
      score: 3
      notes: Provides general context but does not distinguish SIR3 from other SIR
        proteins.
    - rubric: compactness
      score: 4
      notes: Three short sentences.
    - rubric: completeness
      score: 2
      notes: Misses nucleosome binding, homodimerization, Rap1p recruitment, ORC1
        paralog, telomere hypercluster role.
    - rubric: specificity
      score: 2
      notes: Very generic; does not describe what makes SIR3 unique among the SIR
        proteins.
    overall_notes: Brief and somewhat generic. Describes the SIR1-4 silencing complex
      role and chromatin compaction but lacks specificity about SIR3 unique contributions
      (nucleosome binding, homodimerization, spreading). Contains a typo ("mulitple").
- source: Alliance_Imported
  text: Silencing protein; interacts with Sir2p, Sir4p, and histone H3/H4 tails to
    establish transcriptionally silent chromatin; required for spreading of silenced
    chromatin; recruited to chromatin through interaction with Rap1p; C-terminus assumes
    variant winged helix-turn-helix (wH) fold that mediates homodimerization, which
    is critical for holo-SIR complex loading; required for telomere hypercluster formation
    in quiescent yeast cells; has paralog ORC1 from whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004434
  source_id: SGD:S000004434
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and specific.
    - rubric: utility
      score: 5
      notes: Excellent for understanding SIR3 unique role in silencing complex.
    - rubric: compactness
      score: 4
      notes: Dense but appropriately detailed.
    - rubric: completeness
      score: 5
      notes: Covers interactions, spreading, recruitment, structural domain, telomere
        role, paralogy.
    - rubric: specificity
      score: 5
      notes: Names specific interactors (Sir2p, Sir4p, Rap1p), domain (wHTH), and
        paralog (ORC1).
    overall_notes: 'Much more informative. Covers SIR3-specific functions: interactions
      with Sir2p/Sir4p/histones, silencing spreading, Rap1p recruitment, wHTH dimerization
      domain, telomere hypercluster formation, and ORC1 paralogy.'
- source: Alliance_Automated
  text: Enables DNA binding activity; identical protein binding activity; and nucleosome
    binding activity. Involved in several processes, including double-strand break
    repair via nonhomologous end joining; establishment of protein-containing complex
    localization to telomere; and negative regulation of macromolecule metabolic process.
    Located in chromosome, telomeric region; heterochromatin; and nucleolus. Part
    of chromatin silencing complex. Human ortholog(s) of this gene implicated in Meier-Gorlin
    syndrome 1. Orthologous to human ORC1 (origin recognition complex subunit 1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000004434
  source_id: SGD:S000004434
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Stating SIR3 is "orthologous to human ORC1" is misleading; they are paralogs
        in yeast.
    - rubric: utility
      score: 3
      notes: Chromatin silencing complex membership is useful; DSB repair mention
        is secondary.
    - rubric: compactness
      score: 3
      notes: Standard padded automated format.
    - rubric: completeness
      score: 2
      notes: Misses silencing spreading, Rap1p recruitment, wHTH domain, Sir2p/Sir4p
        interactions.
    - rubric: specificity
      score: 2
      notes: Generic GO terms.
    overall_notes: GO-derived summary with some useful terms (chromatin silencing
      complex, nucleosome binding). ORC1 orthology to human is misleading since SIR3
      and ORC1 are paralogs in yeast.
- source: RefSeq
  text: Enables DNA replication origin binding activity; nucleosome binding activity;
    and single-stranded DNA binding activity. Involved in several processes, including
    double-strand break repair via nonhomologous end joining; establishment of protein-containing
    complex localization to telomere; and negative regulation of macromolecule metabolic
    process. Located in chromosome, telomeric region; heterochromatin; and nucleolus.
    Part of chromatin silencing complex. Human ortholog(s) of this gene implicated
    in Meier-Gorlin syndrome 1. Orthologous to human ORC1 (origin recognition complex
    subunit 1). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/851163
  source_id: GeneID:851163
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: DNA replication origin binding may be misattributed from ORC1 orthology
        and is misleading for SIR3.
    - rubric: utility
      score: 2
      notes: Some GO terms may reflect paralog function rather than SIR3-specific.
    - rubric: compactness
      score: 3
      notes: Standard automated format.
    - rubric: completeness
      score: 2
      notes: Same gaps as Alliance_Automated.
    - rubric: specificity
      score: 2
      notes: Terms may reflect paralog function rather than SIR3-specific.
    overall_notes: Similar to Alliance_Automated but lists different activities (DNA
      replication origin binding, single-stranded DNA binding) that may be inherited
      from the ORC1 paralog rather than SIR3-specific.
review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 3
    notes: Agreement on silencing role but automated sources may conflate SIR3 with
      paralog ORC1. UniProt is too generic to distinguish SIR3.
  overall_notes: 'Mixed concordance. SGD curated is clearly the best source, providing
    SIR3-specific detail. UniProt is surprisingly generic and does not distinguish
    SIR3 from other SIR proteins. Automated sources are problematic: they appear to
    conflate SIR3 with its paralog ORC1, leading to misleading GO term assignments.'
fetch_date: '2026-03-06'
