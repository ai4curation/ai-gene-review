review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: Full agreement on dual enzymatic activities and serine biosynthesis. No
      contradictions.
  overall_notes: Good concordance on the core 3-PGDH function in serine biosynthesis.
    All sources agree on the dual enzymatic activity. SGD curated is clearly the best
    source, adding TORC1 regulation and D-2HG production. UniProt is enzymatically
    precise but narrower in scope. Automated sources are adequate but incomplete.
