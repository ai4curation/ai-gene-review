taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Catalyzes the reversible oxidation of 3-phospho-D-glycerate to 3-phosphonooxypyruvate,
    the first step of the phosphorylated L- serine biosynthesis pathway. Also catalyzes
    the reversible oxidation of 2-hydroxyglutarate to 2-oxoglutarate.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P40054
  source_id: P40054
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate catalytic activities with correct substrates and products.
    - rubric: utility
      score: 4
      notes: Good for understanding enzymatic function but lacks regulatory and localization
        context.
    - rubric: compactness
      score: 5
      notes: Two concise sentences covering dual enzymatic activities.
    - rubric: completeness
      score: 3
      notes: Misses TORC1 phosphorylation, paralog SER33, cytoplasmic localization.
    - rubric: specificity
      score: 5
      notes: Names specific substrates, products, and pathway position.
    overall_notes: Accurate enzymatic description covering both 3-PGDH and 2-oxoglutarate
      reductase activities. Clear about the serine biosynthesis pathway context.
- source: Alliance_Imported
  text: 3-phosphoglycerate dehydrogenase and alpha-ketoglutarate reductase; 3PG dehydrogenase
    that catalyzes the first step in serine and glycine biosynthesis; alpha-ketoglutarate
    reductase, converting alpha-ketoglutarate to D-2-hydroxyglutarate (D-2HG); directly
    phosphorylated by TORC1 in a Pib2-dependent manner; localizes to the cytoplasm;
    ER3 has a paralog, SER33, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000883
  source_id: SGD:S000000883
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; well-established functions.
    - rubric: utility
      score: 5
      notes: Excellent overview covering enzymology, regulation, localization, and
        paralogy.
    - rubric: compactness
      score: 4
      notes: Dense but appropriately so given the breadth of information.
    - rubric: completeness
      score: 5
      notes: Covers dual enzymatic activities, TORC1 phosphorylation, localization,
        and paralog.
    - rubric: specificity
      score: 5
      notes: Names specific metabolites (D-2HG), kinase (TORC1), and regulator (Pib2).
    overall_notes: Most comprehensive description. Covers both enzymatic activities,
      TORC1 regulation, localization, and paralog information. The mention of D-2HG
      production is a valuable biochemical detail.
- source: Alliance_Automated
  text: Enables (S)-2-hydroxyglutarate dehydrogenase activity and phosphoglycerate
    dehydrogenase activity. Involved in L-serine biosynthetic process. Located in
    cytoplasm. Human ortholog(s) of this gene implicated in Neu-Laxova syndrome 1;
    PHGDH deficiency; and amino acid metabolic disorder. Orthologous to human PHGDH
    (phosphoglycerate dehydrogenase).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000000883
  source_id: SGD:S000000883
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: (S)-2-hydroxyglutarate dehydrogenase activity is technically the reverse
        reaction name.
    - rubric: utility
      score: 3
      notes: Basic functional information with useful human ortholog context.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses TORC1 regulation, D-2HG production context, paralog SER33.
    - rubric: specificity
      score: 3
      notes: Names enzymatic activities but uses GO term names rather than biochemical
        specifics.
    overall_notes: Standard GO-derived summary. Correctly identifies both enzymatic
      activities and serine biosynthesis. Human disease associations add some context.
- source: RefSeq
  text: Enables alpha-ketoglutarate reductase activity and phosphoglycerate dehydrogenase
    activity. Involved in L-serine biosynthetic process. Located in cytoplasm. Human
    ortholog(s) of this gene implicated in Neu-Laxova syndrome 1; PHGDH deficiency;
    and amino acid metabolic disorder. Orthologous to human PHGDH (phosphoglycerate
    dehydrogenase). [provided by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/856814
  source_id: GeneID:856814
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Correct; alpha-ketoglutarate reductase naming is clearer.
    - rubric: utility
      score: 3
      notes: Same utility as Alliance_Automated.
    - rubric: compactness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Same gaps as Alliance_Automated.
    - rubric: specificity
      score: 3
      notes: Slightly better naming of the reductase activity.
    overall_notes: Near-identical to Alliance_Automated but uses alpha-ketoglutarate
