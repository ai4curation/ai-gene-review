- term:
    id: GO:0047545
    label: (S)-2-hydroxyglutarate dehydrogenase activity
  evidence_type: IDA
  original_reference_id: PMID:26774271
  review:
    summary: This annotation captures a real secondary activity of Ser3p, but the stereochemical term
      is wrong. The evidence shows Ser3/Ser33 interconvert α-ketoglutarate and D/R-2-hydroxyglutarate,
      not S-2-hydroxyglutarate.
    action: MODIFY
    reason: The current precise GO term for the demonstrated reaction is (R)-2-hydroxyglutarate (NAD+)
      dehydrogenase activity.
    proposed_replacement_terms:
    - id: GO:0120568
      label: (R)-2-hydroxyglutarate (NAD+) dehydrogenase activity
    supported_by:
    - reference_id: PMID:26774271
      supporting_text: Ser3 and Ser33, which are primarily known for oxidizing 3-phosphoglycerate in the
        main serine biosynthesis pathway, in addition reduce α-ketoglutarate to d-2HG using NADH and represent
        major intracellular sources of d-2HG in yeast
- term:
    id: GO:0047545
    label: (S)-2-hydroxyglutarate dehydrogenase activity
  evidence_type: IMP
  original_reference_id: PMID:26774271
  review:
    summary: This provides mutant-phenotype support for the same D/R-2-hydroxyglutarate activity, but the
      existing annotation uses the S-stereoisomer term.
    action: MODIFY
    reason: The phenotype evidence supports the R/D-2-hydroxyglutarate reaction and should be moved to
      GO:0120568 rather than accepted as an S-2-hydroxyglutarate annotation.
    proposed_replacement_terms:
    - id: GO:0120568
      label: (R)-2-hydroxyglutarate (NAD+) dehydrogenase activity
    supported_by:
    - reference_id: PMID:26774271
      supporting_text: in addition catalyze the nadh-dependent conversion of α-ketoglutarate to d -2hg
- term:
    id: GO:0047545
    label: (S)-2-hydroxyglutarate dehydrogenase activity
  evidence_type: IGI
  original_reference_id: PMID:26774271
  review:
    summary: This provides genetic interaction evidence for the D/R-2-hydroxyglutarate activity. The
      original term assignment has the wrong stereochemistry.
    action: MODIFY
    reason: The evidence complements the direct biochemical evidence for D/R-2-hydroxyglutarate chemistry,
      so the replacement should be GO:0120568.
    proposed_replacement_terms:
    - id: GO:0120568
      label: (R)-2-hydroxyglutarate (NAD+) dehydrogenase activity
    supported_by:
    - reference_id: PMID:26774271
      supporting_text: Ser3 and Ser33, which are primarily known for oxidizing 3-phosphoglycerate in the
        main serine biosynthesis pathway, in addition reduce α-ketoglutarate to d-2HG using NADH
- term:
    id: GO:0004617
    label: phosphoglycerate dehydrogenase activity
  evidence_type: IMP
  original_reference_id: PMID:12525494
  review:
    summary: This is strong experimental support for the primary function of Ser3p. This key study demonstrated
      that Ser3p and Ser33p are the yeast phosphoglycerate dehydrogenases through mutant phenotype analysis.
    action: ACCEPT
    reason: Mutant analysis directly supports phosphoglycerate dehydrogenase activity as SER3's core biochemical function.
    supported_by:
    - reference_id: PMID:12525494
      supporting_text: These dehydrogenases catalyze the first reaction of serine and glycine biosynthesis
        from the glycolytic metabolite 3-phosphoglycerate.
- term:
    id: GO:0006564
    label: L-serine biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:12525494
  review:
    summary: Excellent experimental evidence for SER3 role in serine biosynthesis. This study showed that
      deletion of both SER3 and SER33 renders yeast auxotrophic for serine, confirming their essential
      role in serine production.
    action: ACCEPT
    reason: The serine auxotrophy and loss of detectable phosphoglycerate dehydrogenase activity in ser3/ser33 mutants directly support SER3 participation in L-serine biosynthesis.
    supported_by:
    - reference_id: PMID:12525494
      supporting_text: the ser3Delta ser33Delta double mutant lacks detectable phosphoglycerate dehydrogenase
        activity and is auxotrophic for serine or glycine for growth on glucose media.
