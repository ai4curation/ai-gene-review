- term:
    id: GO:0006979
    label: response to oxidative stress
  evidence_type: NAS
  original_reference_id: PMID:26527276
  review:
    summary: This annotation appears to be based on the SESAME complex study. However, SER3 primary function
      is serine biosynthesis, not oxidative stress response. While serine metabolism may be affected by
      cellular redox state, this is not a core function of SER3.
    action: REMOVE
    supported_by:
    - reference_id: PMID:26527276
      supporting_text: "Serine and SAM Responsive Complex SESAME Regulates Histone Modification Crosstalk by Sensing Cellular Metabolism."
- term:
    id: GO:0040029
    label: epigenetic regulation of gene expression
  evidence_type: NAS
  original_reference_id: PMID:26527276
  review:
    summary: This appears to be based on the SESAME complex study linking serine metabolism to histone
      modifications. However, this is an indirect connection through metabolite availability rather than
      a direct function of SER3. The primary function of SER3 is serine biosynthesis.
    action: MARK_AS_OVER_ANNOTATED
    reason: SER3 is physically part of the SESAME complex that influences histone modifications and gene expression, but this process term overstates SER3 as a direct epigenetic regulator rather than a metabolic enzyme in the complex.
    supported_by:
    - reference_id: PMID:26527276
      supporting_text: "Serine and SAM Responsive Complex SESAME Regulates Histone Modification Crosstalk by Sensing Cellular Metabolism."
- term:
    id: GO:1902494
    label: catalytic complex
  evidence_type: NAS
  original_reference_id: PMID:26527276
  review:
    summary: This cellular component term is too generic. Ser3p is reported as part of the SESAME catalytic
      complex, but the annotation does not provide a specific, informative localization or complex name.
    action: MARK_AS_OVER_ANNOTATED
    reason: The SESAME evidence supports complex membership, so the annotation is not wrong; it is over-general and less useful than identifying the specific SER3 serine-biosynthetic role and SESAME context.
    supported_by:
    - reference_id: PMID:26527276
