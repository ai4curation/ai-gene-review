product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae S288C
description: SER3 encodes D-3-phosphoglycerate dehydrogenase 1, the enzyme that catalyzes the first and
  committed step of L-serine biosynthesis via the phosphorylated pathway. Ser3p oxidizes 3-phosphoglycerate
  to 3-phosphohydroxypyruvate with concurrent reduction of NAD+ to NADH. The enzyme also exhibits alpha-ketoglutarate
  reductase activity, converting α-ketoglutarate to D-2-hydroxyglutarate. SER3 is subject to complex transcriptional
  regulation including repression by the SRG1 lncRNA in serine-replete conditions and activation by Gcn4p
  during amino acid starvation. The protein is also post-translationally regulated by TORC1-mediated phosphorylation.
existing_annotations:
- term:
    id: GO:0004617
    label: phosphoglycerate dehydrogenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the primary and well-established function of Ser3p. Multiple experimental studies
      confirm Ser3p catalyzes the oxidation of 3-phosphoglycerate to 3-phosphohydroxypyruvate with NAD+
      as cofactor. This is supported by IMP evidence in PMID:12525494.
    action: ACCEPT
    reason: This is SER3's primary molecular function in the phosphorylated L-serine biosynthetic pathway.
    supported_by:
    - reference_id: file:yeast/SER3/SER3-deep-research.md
      supporting_text: See deep research file for comprehensive analysis
    - reference_id: file:yeast/SER3/SER3-deep-research-falcon.md
      supporting_text: Falcon literature synthesis supports SER3 as a D-3-phosphoglycerate dehydrogenase in serine biosynthesis.
    - reference_id: file:interpro/panther/PTHR42789/PTHR42789-metadata.yaml
      supporting_text: PANTHER PTHR42789 identifies SER3 in the D-isomer specific 2-hydroxyacid dehydrogenase family.
- term:
    id: GO:0006564
    label: L-serine biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Correct - Ser3p catalyzes the first step of the phosphorylated L-serine biosynthetic pathway.
      Loss of both SER3 and SER33 renders yeast auxotrophic for serine, confirming this role. Supported
      by IMP evidence in PMID:12525494.
    action: ACCEPT
    reason: SER3 encodes one of the yeast phosphoglycerate dehydrogenases required for de novo serine biosynthesis.
- term:
    id: GO:0008652
    label: amino acid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: This is a correct but overly general annotation. While Ser3p does participate in amino acid
      biosynthesis (specifically serine), the more specific term GO:0006564 (L-serine biosynthetic process)
      is more informative and appropriate.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: This is correct but too general. Ser3p is indeed an oxidoreductase that uses NAD+ as cofactor,
      but the more specific terms GO:0004617 (phosphoglycerate dehydrogenase activity) and GO:0016616
      provide more informative functional descriptions.
    action: KEEP_AS_NON_CORE
- term:
    id: GO:0016616
    label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This accurately describes the biochemical mechanism of Ser3p, which oxidizes the CH-OH group
      of 3-phosphoglycerate using NAD+ as electron acceptor. This is mechanistically correct and more
      specific than the general oxidoreductase activity term.
    action: ACCEPT
- term:
    id: GO:0051287
    label: NAD binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Correct - Ser3p requires NAD+ as a cofactor for its dehydrogenase activity. The protein contains
      a Rossmann fold domain for NAD+ binding, which is conserved across phosphoglycerate dehydrogenases.
    action: ACCEPT
