suggested_questions:
- question: >-
    Should the SER3/Ser33 side activity be represented with alpha-ketoglutarate
    reductase terminology in addition to the current 2-hydroxyglutarate term?
suggested_experiments:
- description: >-
    Measure Ser3p and Ser33p contributions to D-2HG production under defined
    carbon and nitrogen conditions to separate primary serine biosynthesis from
    secondary 2-hydroxyglutarate metabolism.
