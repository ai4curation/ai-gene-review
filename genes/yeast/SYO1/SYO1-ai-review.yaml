core_functions:
- description: >-
    Symportin / nuclear import adapter that simultaneously binds Rpl5 and
    Rpl11, recruits the karyopherin Kap104, and synchronously co-imports the
    Rpl5-Rpl11 cargo pair into the nucleus where it is released on RanGTP and
    handed off directly to the nascent 5S rRNA. This activity ensures
    stoichiometric incorporation of the two 5S-rRNA-binding ribosomal proteins
    into pre-60S particles and supports ribosomal large subunit biogenesis.
  molecular_function:
    id: GO:0140597
    label: protein carrier chaperone
  directly_involved_in:
  - id: GO:0006606
    label: protein import into nucleus
  - id: GO:0042273
    label: ribosomal large subunit biogenesis
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:23118189
    supporting_text: >-
      we identify a transport adaptor, symportin 1 (Syo1), that facilitates
      synchronized coimport of the two 5S-rRNA binding proteins Rpl5 and
      Rpl11.
  - reference_id: PMID:23118189
    supporting_text: >-
      Syo1 concomitantly binds Rpl5-Rpl11 and furthermore recruits the import
      receptor Kap104. The Syo1-Rpl5-Rpl11 import complex is released from
      Kap104 by RanGTP and can be directly transferred onto the 5S rRNA.
  - reference_id: PMID:26112308
    supporting_text: >-
      Affinity purification of four chaperones (Rrb1, Syo1, Sqt1 and Yar1)
      selectively enriched the mRNAs encoding their specific ribosomal protein
      clients (Rpl3, Rpl5, Rpl10 and Rps3).
references:
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      PANTHER phylogenetic propagation transfers the conserved Syo1
      symportin/r-protein-carrier functions (protein import into nucleus,
      ribosomal large subunit biogenesis, unfolded protein binding)
      across SYO1 orthologues consistent with the experimental yeast data.
- id: GO_REF:0000043
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot keyword mapping
  findings:
  - statement: >-
      UniProtKB keywords KW-0653 (Protein transport) and KW-0690 (Ribosome
      biogenesis) on SYO1 are mapped to protein transport (GO:0015031) and
      ribosome biogenesis (GO:0042254) respectively.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: >-
      UniProtKB Subcellular Location annotation for Syo1 (Cytoplasm; Nucleus,
      transported by Kap104) is mapped to nucleus (GO:0005634) and cytoplasm
      (GO:0005737).
- id: PMID:14562095
  title: Global analysis of protein localization in budding yeast.
  findings:
  - statement: >-
      Genome-wide GFP-fusion localisation in budding yeast classifies Syo1 in
      cytoplasmic and nuclear compartments, consistent with its role as a
      shuttling nuclear import adapter for Rpl5 and Rpl11.
    supporting_text: >-
      We classify these proteins, representing 75% of the yeast proteome, into
      22 distinct subcellular localization categories, and provide
      localization information for 70% of previously unlocalized proteins.
    reference_section_type: ABSTRACT
- id: PMID:19806183
  title: Rational extension of the ribosome biogenesis pathway using network-guided genetics.
  findings:
  - statement: >-
      Network-guided genetic screening implicates Syo1 in the ribosome
      biogenesis pathway, providing systematic evidence for involvement in
      ribosomal subunit maturation/particle association.
    supporting_text: >-
      we employ network-guided genetics-an approach for associating candidate
      genes with biological processes that capitalizes on recent advances in
      functional genomic and proteomic studies-to computationally identify
      additional ribosomal biogenesis genes. We experimentally evaluated >100
      candidate yeast genes in a battery of assays, confirming involvement of
      at least 15 new genes
    reference_section_type: ABSTRACT
- id: PMID:23118189
  title: Synchronizing nuclear import of ribosomal proteins with ribosome assembly.
  findings:
  - statement: >-
      Syo1 (symportin 1) was identified as a transport adapter that
      synchronously co-imports the two 5S-rRNA-binding ribosomal proteins
      Rpl5 and Rpl11 by simultaneously binding both cargoes and recruiting
      the import receptor Kap104.
    supporting_text: >-
      we identify a transport adaptor, symportin 1 (Syo1), that facilitates
      synchronized coimport of the two 5S-rRNA binding proteins Rpl5 and
      Rpl11. In vitro studies revealed that Syo1 concomitantly binds
      Rpl5-Rpl11 and furthermore recruits the import receptor Kap104.
    reference_section_type: ABSTRACT
  - statement: >-
      The Syo1-Rpl5-Rpl11 import complex is released from Kap104 by RanGTP and
      directly transferred onto 5S rRNA; Syo1 then shuttles back to the
      cytoplasm via FG-nucleoporin interactions, defining the symportin
      cycle of synchronised r-protein delivery.
    supporting_text: >-
      The Syo1-Rpl5-Rpl11 import complex is released from Kap104 by RanGTP
      and can be directly transferred onto the 5S rRNA. Syo1 can shuttle back
      to the cytoplasm by interaction with phenylalanine-glycine
      nucleoporins.
    reference_section_type: ABSTRACT
  - statement: >-
      X-ray crystallography of Syo1 reveals an α-solenoid that accommodates
      the Rpl5 N-terminus (normally bound to 5S rRNA) in an extended groove,
      providing the structural basis for stoichiometric Rpl5-Rpl11 co-import
      ahead of pre-60S incorporation.
    supporting_text: >-
      X-ray crystallography uncovered how the α-solenoid symportin
      accommodates the Rpl5 amino terminus, normally bound to 5S rRNA, in an
      extended groove. Symportin-mediated coimport of Rpl5-Rpl11 could ensure
      coordinated and stoichiometric incorporation of these proteins into
      pre-60S ribosomes.
    reference_section_type: ABSTRACT
- id: PMID:37291423
  title: Structure of nascent 5S RNPs at the crossroad between ribosome assembly
    and MDM2-p53 pathways.
  findings:
  - statement: >-
      Structural reconstitution places Syo1 in the conserved hexameric nascent
      5S RNP precursor with 5S rRNA, uL18/Rpl5, uL5/Rpl11, Rpf2 and Rrs1.
    supporting_text: >-
      This reveals how the nascent 5S rRNA associates with the initial
      nuclear import complex Syo1-uL18-uL5 and, upon further recruitment of
      the nucleolar factors Rpf2 and Rrs1, develops into the 5S RNP precursor
      that can assemble into the pre-ribosome.
    reference_section_type: ABSTRACT
- id: PMID:26112308
  title: Co-translational capturing of nascent ribosomal proteins by their dedicated chaperones.
  findings:
  - statement: >-
      Affinity purification of Syo1 selectively enriches the RPL5 mRNA,
      establishing Syo1 as a co-translational chaperone for Rpl5 alongside
      Rrb1 (Rpl3), Sqt1 (Rpl10) and Yar1 (Rps3).
    supporting_text: >-
      Affinity purification of four chaperones (Rrb1, Syo1, Sqt1 and Yar1)
      selectively enriched the mRNAs encoding their specific ribosomal
      protein clients (Rpl3, Rpl5, Rpl10 and Rps3).
    reference_section_type: ABSTRACT
suggested_questions:
- question: >-
    How is the timing of Syo1-Rpl5 co-translational engagement coordinated
    with subsequent recruitment of Rpl11 and Kap104, and is there a defined
    Syo1 binding state on the Rpl5 nascent chain?
- question: >-
    What controls the cytoplasmic-versus-nuclear hand-off equilibrium of the
    Syo1-Rpl5-Rpl11 ternary complex relative to the hexameric 5S RNP
    precursor (5S rRNA, Rrs1, Rpf2, Rpl5, Rpl11A/B, Syo1)?
- question: >-
    Are there stress conditions (heat shock, ribosomal protein
    over/under-expression, RanGTP perturbation) under which Syo1 becomes
    rate-limiting for 5S RNP delivery, and does mis-stoichiometric import
    feed back on r-protein turnover?
- question: >-
    How is the symportin-style synchronised co-import generalised across
    eukaryotes, given that PANTHER propagates Syo1 functions to orthologues
    but its exact higher-eukaryote counterpart is incompletely defined?
suggested_experiments:
- description: >-
    Perform selective ribosome profiling of Syo1-tagged polysomes to map the
    Rpl5 nascent-chain register at which Syo1 first engages, and use
    cross-linking IP/MS to determine when Rpl11 joins the complex relative to
    Rpl5 release from the ribosome.
- description: >-
    Reconstitute the full Syo1-Rpl5-Rpl11-Kap104 import cycle in vitro with
    purified components and RanGTP, and use single-molecule FRET to measure
    the kinetics of cargo binding, Kap104 release on RanGTP, and 5S rRNA
    transfer in the nucleus.
- description: >-
    Use auxin-inducible degron depletion of Syo1 in synchronised yeast
    cultures to quantify accumulation of free Rpl5/Rpl11, mis-incorporation
    into pre-60S, half-mer formation, and 5S RNP precursor stalling by
    pulse-SILAC and BN-PAGE.
- description: >-
    Combine cryo-EM of pre-60S particles with structure-guided Syo1 binding
    pocket mutants to test whether disrupting the α-solenoid Rpl5 N-terminal
    groove uncouples synchronised import from competent 5S RNP assembly.
