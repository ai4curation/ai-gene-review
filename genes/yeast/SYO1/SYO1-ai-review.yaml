gene_symbol: SYO1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  SYO1 (YDR333C, "symportin 1") encodes an α-solenoid nuclear import adapter
  that synchronously co-imports the topologically and functionally linked 5S
  rRNA-binding ribosomal proteins Rpl5 and Rpl11 (encoded by RPL11A/B) from
  the cytoplasm to the nucleus, ensuring stoichiometric delivery to the
  nascent 5S rRNA during pre-60S assembly (PMID:23118189). Syo1 binds Rpl5
  and Rpl11 simultaneously, recruits the karyopherin Kap104 for import,
  releases the cargo on RanGTP, transfers Rpl5-Rpl11 directly onto 5S rRNA,
  and shuttles back to the cytoplasm via FG-nucleoporin contacts. X-ray
  crystallography shows that Syo1 accommodates the Rpl5 N-terminus
  (normally bound to 5S rRNA) in an extended α-solenoid groove. Syo1 also
  contributes to ribosomal large subunit biogenesis (PMID:19806183), is a
  component of the hexameric 5S RNP precursor complex (5S rRNA, Rrs1, Rpf2,
  Rpl5, Rpl11A/B, Syo1) (UniProt SUBUNIT: PMID:37291423), and is detected
  with co-localised cytoplasmic/nuclear distribution in yeast GFP fusion
  surveys (PMID:14562095). Together with Rrb1, Sqt1 and Yar1, Syo1 belongs
  to a family of dedicated ribosomal-protein chaperones that capture
  individual r-proteins co-translationally and prevent unspecific
  aggregation prior to ribosome assembly (PMID:26112308).
