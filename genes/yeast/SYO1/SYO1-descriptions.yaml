gene_symbol: SYO1
organism: yeast
uniprot_id: Q07395
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Nuclear import adapter that specifically recruits the two functionally and
    topologically linked ribosomal proteins RPL5 and RPL11 (encoded by RPL11A and
    RPL11B). Guarantees that this cargo pair remains bound together from the time
    of synthesis in the cytoplasm until delivery to the nascent 5S rRNA in the nucleus.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q07395
  source_id: Q07395
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of the nuclear import adapter function for RPL5/RPL11.
    - rubric: utility
      score: 5
      notes: Clearly explains the unique symportin function.
    - rubric: compactness
      score: 5
      notes: Two concise sentences covering the essential function.
    - rubric: completeness
      score: 4
      notes: Covers import adapter and cargo pair maintenance. Misses cotranslational
        association with Rpl5p and KAP104 receptor.
    - rubric: specificity
      score: 5
      notes: Names RPL5, RPL11, RPL11A, RPL11B, and 5S rRNA.
    overall_notes: Clear, focused description of SYO1 as a nuclear import adapter
      for RPL5/RPL11. Captures the symportin concept and co-chaperoning of the cargo
      pair.
- source: Alliance_Imported
  text: Transport adaptor or symportin; assembly chaperone that co-translationally
    associates with nascent Rpl5p, preventing aggregation; facilitates synchronized
    nuclear coimport of two 5S-rRNA binding proteins, Rpl5p and Rpl11p, mediated by
    import receptor Kap104p; required for biogenesis of the large ribosomal subunit;
    green fluorescent protein (GFP)-fusion protein localizes to the cytoplasm and
    nucleus
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002221
  source_id: SGD:S000002221
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate; cotranslational association, Kap104p receptor, and anti-aggregation
        all well-supported.
    - rubric: utility
      score: 5
      notes: Comprehensive view of SYO1 function from synthesis through import.
    - rubric: compactness
      score: 4
      notes: Longer but information-dense.
    - rubric: completeness
      score: 5
      notes: Covers cotranslational association, anti-aggregation, nuclear coimport
        via Kap104p, and ribosome biogenesis.
    - rubric: specificity
      score: 5
      notes: Names Rpl5p, Rpl11p, Kap104p, 5S rRNA, and GFP localization.
    overall_notes: Excellent detailed description. Adds cotranslational association,
      anti-aggregation function, Kap104p import receptor, and ribosomal large subunit
      biogenesis role.
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in protein import into
    nucleus and ribosomal large subunit biogenesis. Located in cytoplasm and nucleus.
    Used to study Diamond-Blackfan anemia. Human ortholog(s) of this gene implicated
    in Diamond-Blackfan anemia. Orthologous to human HEATR3 (HEAT repeat containing
    3).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002221
  source_id: SGD:S000002221
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: '"Unfolded protein binding" is a poor description of SYO1 anti-aggregation
        chaperone function.'
    - rubric: utility
      score: 2
      notes: Fails to convey the symportin/import adapter function.
    - rubric: compactness
      score: 4
      notes: Standard automated length.
    - rubric: completeness
      score: 2
      notes: Misses RPL5/RPL11 cargo, Kap104p receptor, cotranslational association.
    - rubric: specificity
      score: 2
      notes: Generic terms; only disease link and HEATR3 orthology add specificity.
    overall_notes: Generic description. "Unfolded protein binding" is misleading for
      a nuclear import adapter. Diamond-Blackfan anemia disease link is informative.
