review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 5
    notes: Perfect agreement between curated sources on RPL5/RPL11 nuclear coimport
      function. Automated sources are inadequate.
  overall_notes: 'Both curated sources excel at describing the symportin function.
