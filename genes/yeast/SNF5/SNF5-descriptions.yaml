gene_symbol: SNF5
organism: yeast
uniprot_id: P18480
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Involved in transcriptional activation. Component of the SWI/SNF complex,
    an ATP-dependent chromatin-remodeling complex, which is required for the positive
    and negative regulation of gene expression of a large number of genes. It changes
    chromatin structure by altering DNA-histone contacts within a nucleosome, leading
    eventually to a change in nucleosome position, thus facilitating or repressing
    binding of gene-specific transcription factors.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P18480
  source_id: P18480
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of SWI/SNF function and mechanism.
    - rubric: utility
      score: 4
      notes: Good complex-level context but does not convey SNF5 subunit-specific
        role.
    - rubric: compactness
      score: 4
      notes: Moderate length; slightly verbose on mechanism.
    - rubric: completeness
      score: 3
      notes: Misses SNF5-specific functions (interdependent activation with Snf2p/Snf6p,
        hypoxia relocalization).
    - rubric: specificity
      score: 3
      notes: Describes complex function rather than SNF5-specific contribution.
    overall_notes: Good general description of SNF5 as a SWI/SNF complex component.
      Explains chromatin remodeling mechanism (nucleosome repositioning). Does not
      distinguish SNF5-specific contributions.
- source: Alliance_Imported
  text: Subunit of the SWI/SNF chromatin remodeling complex; involved in transcriptional
    regulation; functions interdependently in transcriptional activation with Snf2p
    and Snf6p; relocates to the cytosol under hypoxic conditions
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000000493
  source_id: SGD:S000000493
  review:
    reviewer: AI
