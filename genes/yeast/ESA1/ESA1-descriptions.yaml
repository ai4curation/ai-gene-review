- source: Alliance_Automated
  text: Enables histone H4 acetyltransferase activity; histone crotonyltransferase
    activity; and transcription coregulator activity. Involved in several processes,
    including DNA-templated transcription elongation; positive regulation of metabolic
    process; and rDNA heterochromatin formation. Located in chromatin. Part of NuA4
    histone acetyltransferase complex; nucleosome; and piccolo histone acetyltransferase
    complex. Used to study cancer. Orthologous to human KAT5 (lysine acetyltransferase
    5).
