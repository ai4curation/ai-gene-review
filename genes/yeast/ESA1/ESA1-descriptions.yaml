- source: RefSeq
  text: Enables histone H4 acetyltransferase activity; histone crotonyltransferase
    activity; and transcription coregulator activity. Involved in several processes,
    including DNA-templated transcription elongation; positive regulation of macroautophagy;
    and regulation of gene expression. Located in chromatin. Part of NuA4 histone
    acetyltransferase complex and piccolo histone acetyltransferase complex. Used
    to study cancer. Orthologous to human KAT5 (lysine acetyltransferase 5). [provided
    by Alliance of Genome Resources, Jul 2025]
