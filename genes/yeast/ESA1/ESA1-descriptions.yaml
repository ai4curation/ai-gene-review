- source: Alliance_Imported
  text: Catalytic subunit of the histone acetyltransferase complex (NuA4); acetylates
    four conserved internal lysines of histone H4 N-terminal tail and can acetylate
    histone H2A; master regulator of cellular acetylation balance; required for cell
    cycle progression and transcriptional silencing at the rDNA locus and regulation
    of autophagy; human ortholog TIP60/KAT5 is implicated in cancer and other diseases,
    functionally complements lethality of the esa1 null mutation
  source_type: curated
