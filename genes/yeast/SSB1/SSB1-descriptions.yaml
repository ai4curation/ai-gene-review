gene_symbol: SSB1
organism: yeast
uniprot_id: P10080
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Functions in the transition of mRNAs from translation to an mRNP complex destined
    for decapping. High-copy-number suppressor of decapping defects. Overexpression
    suppresses decapping defects in both DCP1-2 and DCP2-7 mutations. Acts to promote
    translational repression of mRNA in conjunction with DHH1 and subsequent mRNA
    localization to P bodies. Promotes translational repression of mRNA during glucose
    deprivation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P10080
  source_id: P10080
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of decapping and translational repression functions.
    - rubric: utility
      score: 4
      notes: Good functional overview; covers the DCP1/DCP2 genetic interactions and
        DHH1 cooperation.
    - rubric: compactness
      score: 4
      notes: Five sentences; moderate length.
    - rubric: completeness
      score: 3
      notes: Misses 5-UTR binding specificity, arginine methylation regulation, RGG
        motif, stress granule localization.
    - rubric: specificity
      score: 4
      notes: Names DCP1-2, DCP2-7, DHH1, and P bodies.
    overall_notes: 'Note: yeast SSB1 (SBP1) encodes a single-stranded nucleic acid-binding
      protein involved in mRNA decapping and translational repression. UniProt accurately
      describes the mRNA-to-mRNP transition, decapping suppression, and DHH1 cooperation.'
- source: Alliance_Imported
  text: mRNA-binding translational repressor and P-body disassembly factor; binds
    to the 5'UTR of mRNAs and inhibits cap-dependent and independent translational
    initiation; involved in mRNA binding under glucose starvation stress; associates
    with snR10 and snR11; HMT1-dependent arginine monomethylation modulates translational
    repression, mRNA decay and stress granule localization during glucose starvation;
    contains an intrinsically disordered RGG motif; localizes to P bodies and stress
    granules
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001026
  source_id: SGD:S000001026
