    - rubric: completeness
      score: 5
      notes: Covers translational repression, 5-UTR binding, glucose starvation, snoRNA
        association, methylation, RGG motif, P-bodies, stress granules.
    - rubric: specificity
      score: 5
      notes: Names HMT1, snR10/snR11, RGG motif, 5-UTR, P bodies, stress granules.
    overall_notes: Comprehensive description of SBP1/SSB1 as an mRNA-binding translational
      repressor and P-body disassembly factor. Covers 5-UTR binding, cap-dependent/independent
      initiation inhibition, glucose starvation, snoRNA association, arginine methylation
      by HMT1, RGG motif, and stress granule/P-body localization.
