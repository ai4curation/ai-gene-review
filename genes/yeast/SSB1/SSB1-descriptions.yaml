      functions. No contradictions.
  overall_notes: Good concordance on translational repression and P-body function.
    Note that yeast SSB1 (SBP1) is a single-stranded nucleic acid-binding translational
    repressor, not the ribosome-associated Hsp70 (which is SSB1/2 in the SSB subfamily).
    SGD curated is the most comprehensive, adding methylation regulation and stress
    granule biology. All sources agree on the core function.
