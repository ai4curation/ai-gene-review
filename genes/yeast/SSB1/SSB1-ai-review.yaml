- term:
    id: GO:0035617
    label: stress granule disassembly
  evidence_type: IDA
  original_reference_id: PMID:35440550
  review:
    summary: |-
      Sbp1 is a granule DISASSEMBLY factor during recovery from stress. Roy et al. 2022
      showed that after sodium-azide stress and recovery, delta-sbp1 cells are defective
      in disassembly of foci marked by Edc3, Dhh1 and Scd6, and that purified Sbp1
      dissolves Edc3 assemblies in vitro in an RGG- and arginine-methylation-dependent
      manner. Note the primary demonstrated activity is P-body disassembly; a closely
      related granule-disassembly term GO:0035617 is applied here. This is a major,
      well-supported aspect of Sbp1 function and is treated as a core process.
    action: ACCEPT
    reason: Strong direct experimental evidence (genetic, complementation, and in vitro
      reconstitution) for a granule-disassembly role; revised from KEEP_AS_NON_CORE.
      The most precise term is P-body disassembly; consider GO:0035617 vs a P-body
      disassembly term.
    additional_reference_ids:
    - file:yeast/SSB1/SSB1-deep-research-falcon.md
    supported_by:
    - reference_id: file:yeast/SSB1/SSB1-deep-research-falcon.md
      supporting_text: |-
        A major advance is the identification of Sbp1 as a **PB disassembly factor** during recovery from stress. Using sodium azide stress followed by recovery, Δsbp1 cells show defective disassembly (persistence) of PB foci marked by Edc3, Dhh1, and Scd6
