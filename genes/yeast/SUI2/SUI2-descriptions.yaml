      SGD differ in emphasis; UniProt describes the complex while SGD describes the
      subunit-specific regulation.
  overall_notes: 'Interesting divergence: SGD curated is more informative than UniProt
    for this gene, identifying the alpha subunit-specific Ser51 phosphorylation. UniProt
    describes the eIF2 complex generically. Automated sources provide complex membership
