gene_symbol: SUI2
organism: yeast
uniprot_id: P20459
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: eIF-2 functions in the early steps of protein synthesis by forming a ternary
    complex with GTP and initiator tRNA. This complex binds to a 40S ribosomal subunit,
    followed by mRNA binding to form a 43S pre-initiation complex. Junction of the
    60S ribosomal subunit to form the 80S initiation complex is preceded by hydrolysis
    of the GTP bound to eIF-2 and release of an eIF-2-GDP binary complex. In order
    for eIF-2 to recycle and catalyze another round of initiation, the GDP bound to
    eIF-2 must exchange with GTP by way of a reaction catalyzed by eIF2B.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P20459
  source_id: P20459
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate description of eIF2 function but describes the complex rather
        than the specific alpha subunit.
    - rubric: utility
      score: 3
      notes: Useful for understanding eIF2 generally but not SUI2-specific contributions.
    - rubric: compactness
      score: 3
      notes: Moderately long for what is essentially a textbook description of eIF2
        function.
    - rubric: completeness
      score: 3
      notes: Misses Ser51 phosphorylation, the key regulatory feature of the alpha
        subunit.
    - rubric: specificity
      score: 3
      notes: Describes the complex generically; does not distinguish alpha subunit-specific
        roles.
    overall_notes: Describes the eIF2 complex function in translation initiation in
      general terms. Does not specifically identify SUI2 as the alpha subunit or mention
      its regulatory phosphorylation.
- source: Alliance_Imported
  text: Alpha subunit of the translation initiation factor eIF2; eIF2 is involved
    in identification of the start codon; phosphorylation of Ser51 is required for
    regulation of translation by inhibiting the exchange of GDP for GTP; protein abundance
    increases in response to DNA replication stress
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003767
  source_id: SGD:S000003767
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurately identifies alpha subunit role and Ser51 phosphorylation regulation.
    - rubric: utility
      score: 5
      notes: Excellent utility; the Ser51 phosphorylation is the defining feature
        of eIF2alpha.
    - rubric: compactness
      score: 5
      notes: Concise with key information densely packed.
    - rubric: completeness
      score: 4
      notes: Covers subunit identity, start codon recognition, Ser51 regulation; misses
        GCN2 kinase.
    - rubric: specificity
      score: 5
      notes: Names specific residue (Ser51) and regulatory mechanism.
    overall_notes: More informative than UniProt for this gene. Identifies SUI2 as
      the alpha subunit and highlights the critical Ser51 phosphorylation regulatory
      mechanism.
- source: Alliance_Automated
  text: Enables translation initiation factor activity. Contributes to GTP binding
    activity and methionyl-initiator methionine tRNA binding activity. Involved in
    formation of translation preinitiation complex. Located in ribosome. Part of eukaryotic
    48S preinitiation complex; eukaryotic translation initiation factor 2 complex;
    and multi-eIF complex. Is active in cytoplasm. Used to study leukodystrophy. Human
    ortholog(s) of this gene implicated in Alzheimer's disease. Orthologous to human
    EIF2S1 (eukaryotic translation initiation factor 2 subunit alpha).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003767
  source_id: SGD:S000003767
