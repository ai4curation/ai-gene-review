- id: GO_REF:0000015
  title: Use of the ND evidence code for Gene Ontology (GO) terms
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Standard GO_REF documenting the ND (no biological data) evidence code, used
