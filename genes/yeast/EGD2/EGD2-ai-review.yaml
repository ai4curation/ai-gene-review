suggested_questions:
- question: >-
    Do EGD2 lipid-binding observations represent a physiologic NAC regulatory
    function, or are they in vitro/non-core binding properties?
suggested_experiments:
- description: >-
    Test EGD2 UBA-domain mutants for effects on nascent-chain aggregation,
    ribosome association, and cotranslational targeting in NAC/Ssb sensitized
    backgrounds.
