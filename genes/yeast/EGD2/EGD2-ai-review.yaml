id: P38879
gene_symbol: EGD2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:559292
  label: Saccharomyces cerevisiae
description: >-
  EGD2 encodes the alpha subunit of the yeast nascent polypeptide-associated
  complex (NAC). EGD2 pairs with the beta subunits EGD1 or BTT1 to form
  ribosome-associated NAC heterodimers that contact emerging nascent chains,
  modulate early cotranslational folding, and help prevent inappropriate
  targeting of ribosome-nascent-chain complexes to membranes. The lipid-binding
  annotations are retained as peripheral biochemical observations rather than
  the central NAC function.
