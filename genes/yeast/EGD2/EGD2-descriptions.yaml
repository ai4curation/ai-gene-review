gene_symbol: EGD2
organism: yeast
uniprot_id: P38879
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Component of the nascent polypeptide-associated complex (NAC), a dynamic component
    of the ribosomal exit tunnel, protecting the emerging polypeptides from interaction
    with other cytoplasmic proteins to ensure appropriate nascent protein targeting.
    The NAC complex also promotes mitochondrial protein import by enhancing productive
    ribosome interactions with the outer mitochondrial membrane and blocks the inappropriate
    interaction of ribosomes translating non-secretory nascent polypeptides with translocation
    sites in the membrane of the endoplasmic reticulum. EGD2 may also be involved
    in transcription regulation.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P38879
  source_id: P38879
- source: Alliance
  text: Alpha subunit of the nascent polypeptide-associated complex (NAC); involved
    in protein sorting and translocation; associated with cytoplasmic ribosomes
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000001236
  source_id: SGD:S000001236
- source: Alliance
  text: Enables phospholipid binding activity and unfolded protein binding activity.
    Involved in cotranslational protein targeting to membrane. Located in cytoplasm.
    Part of nascent polypeptide-associated complex. Orthologous to several human genes
    including NACA2 (nascent polypeptide associated complex subunit alpha 2).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000001236
  source_id: SGD:S000001236
