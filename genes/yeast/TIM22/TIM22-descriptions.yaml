gene_symbol: TIM22
organism: yeast
uniprot_id: Q12328
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: Essential core component of the TIM22 complex, a complex that mediates the
    import and insertion of multi-pass transmembrane proteins, such as mitochondrial
    carrier family members, into the mitochondrial inner membrane. In the TIM22 complex,
    it constitutes the voltage- activated and signal-gated channel. Forms a twin-pore
    translocase that uses the membrane potential as external driving force in 2 voltage-
    dependent steps. Mediates the insertion of precursor proteins in a 3 step process.
    After the precursor is tethered to the translocase without losing energy from
    the Delta(psi), 2 energy-requiring steps are needed. First, Delta(psi) acts on
    the precursor protein and promotes its docking in the translocase complex. Then,
    Delta(psi) and an internal signal peptide together induce rapid gating transitions
    in one pore and closing of the other pore and drive membrane insertion to completion.
  source_type: curated
  url: https://www.uniprot.org/uniprot/Q12328
  source_id: Q12328
- source: Alliance
  text: Essential core component of mitochondrial TIM22 complex; involved in insertion
    of polytopic proteins into inner membrane; forms channel through which proteins
    are imported; different regions of Tim22p have functionally diverse roles in recruiting
    partner subunits to core channel
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002376
  source_id: SGD:S000002376
- source: Alliance
  text: Enables mitochondrion targeting sequence binding activity; protein transmembrane
    transporter activity; and structural molecule activity. Involved in protein insertion
    into mitochondrial inner membrane. Located in mitochondrion. Part of TIM22 mitochondrial
    import inner membrane insertion complex. Is active in mitochondrial inner membrane.
    Used to study mitochondrial myopathy. Human ortholog(s) of this gene implicated
    in combined oxidative phosphorylation deficiency 43. Orthologous to human TIMM22
    (translocase of inner mitochondrial membrane 22).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002376
  source_id: SGD:S000002376
