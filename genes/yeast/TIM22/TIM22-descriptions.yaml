- source: Alliance_Automated
  text: Enables mitochondrion targeting sequence binding activity; protein transmembrane
    transporter activity; and structural molecule activity. Involved in protein insertion
    into mitochondrial inner membrane. Located in mitochondrion. Part of TIM22 mitochondrial
    import inner membrane insertion complex. Is active in mitochondrial inner membrane.
    Used to study mitochondrial myopathy. Human ortholog(s) of this gene implicated
    in combined oxidative phosphorylation deficiency 43. Orthologous to human TIMM22
    (translocase of inner mitochondrial membrane 22).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002376
  source_id: SGD:S000002376
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: '"Structural molecule activity" is misleading for the channel-forming
        core; TIM22 is a transporter.'
    - rubric: utility
      score: 3
      notes: Disease associations and TIMM22 orthology add value.
    - rubric: compactness
      score: 3
      notes: Somewhat verbose with disease associations.
    - rubric: completeness
      score: 2
      notes: Misses channel mechanism, voltage dependence, twin-pore architecture.
    - rubric: specificity
      score: 3
      notes: TIMM22 orthology and disease links add some specificity.
    overall_notes: GO-derived description. Lists molecular functions and disease associations.
      The "structural molecule activity" annotation is questionable for a channel
      protein.
