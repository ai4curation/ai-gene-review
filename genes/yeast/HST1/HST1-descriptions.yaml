gene_symbol: HST1
organism: yeast
uniprot_id: P50111
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Has a role in establishing cell polarity. Together with cAMP- dependent protein
    kinase regulatory subunit BCY1, provides a negative feedback control on the cell
    wall integrity-signaling pathway by acting as a negative regulator of MAP kinase
    SLT2/MPK1. In heat-stressed cells appears to play a role in localizing BCY1 to
    the cytoplasm. Seems to interact with, and down-regulate, CDC42. Also acts as
    a suppressor of PKC1. May act as an integration point for distinct signaling pathways
    helping to maintain a balance among these different pathways. When associated
    with DBP5, GFD1 and nucleoporins at the cytosolic fibrils of the nuclear pore
    complex, is required for mRNA export form the nucleus.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P50111
  source_id: P50111
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 4
      notes: Accurate for ZDS1/HST1 protein; some hedging with 'Seems to' and 'May
        act'.
    - rubric: utility
      score: 3
      notes: Covers multiple signaling roles but the pleiotropic description may obscure
        core function.
    - rubric: compactness
      score: 3
      notes: Lengthy description covering many pathways.
    - rubric: completeness
      score: 4
      notes: Covers cell polarity, CWI pathway, Bcy1p, Cdc42, PKC1, and mRNA export.
    - rubric: specificity
      score: 4
      notes: Names Bcy1p, Cdc42, Slt2/Mpk1, Pkc1, Dbp5, Gfd1 and specific pathways.
    overall_notes: This UniProt entry is for ZDS1 (HST1 is a synonym). Describes cell
      polarity, CWI pathway regulation, Bcy1p localization, Cdc42 interaction, and
      mRNA export. Accurate for ZDS1 but may confuse users expecting sirtuin HST1.
- source: Alliance_Imported
  text: Protein with a role in regulating Swe1p-dependent polarized growth; involved
    in maintaining Cdc55p in the cytoplasm where it promotes mitotic entry; involved
    in mitotic exit through Cdc14p regulation; interacts with silencing proteins at
    telomeres; has a role in Bcy1p localization; implicated in mRNA nuclear export;
    ZDS1 has a paralog, ZDS2, that arose from the whole genome duplication
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000004886
  source_id: SGD:S000004886
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and current.
    - rubric: utility
      score: 4
      notes: Good overview of the pleiotropic roles.
    - rubric: compactness
      score: 4
