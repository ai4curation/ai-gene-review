    - rubric: completeness
      score: 5
      notes: Covers polarized growth, mitotic regulation, silencing, mRNA export,
        and paralogy.
    - rubric: specificity
      score: 5
      notes: Names Swe1p, Cdc55p, Cdc14p, Bcy1p, ZDS2, and WGD origin.
    overall_notes: SGD description for ZDS1. Covers Swe1p-dependent polarized growth,
      Cdc55p regulation, mitotic exit, telomere silencing, Bcy1p, and mRNA export.
      Notes ZDS2 paralog.
- source: Alliance_Automated
  text: Enables protein phosphatase inhibitor activity. Involved in several processes,
    including heterochromatin formation; mRNA export from nucleus; and positive regulation
    of G2/M transition of mitotic cell cycle. Located in several cellular components,
    including cellular bud neck; cellular bud tip; and incipient cellular bud site.
  source_type: automated
