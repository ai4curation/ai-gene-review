  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      PAP2/Trf4 does not have RNA helicase activity. The RNA helicase in TRAMP is Mtr4p,
      not PAP2. PAP2 does contributes_to 3'-5' RNA helicase activity (GO:0034458) as
      part of the TRAMP complex by stimulating Mtr4p's unwinding activity (PMID:22532666),
      but it does not itself catalyze RNA helicase activity. The GOA correctly uses the
      contributes_to qualifier for GO:0034458. Predicting GO:0003724 (RNA helicase
      activity) as an enables annotation is incorrect and misidentifies the catalytic
      subunit.
    error_type: IN_VITRO_NOT_IN_VIVO
