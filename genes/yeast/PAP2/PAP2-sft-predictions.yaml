  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      RNA 3'-phosphatase activity is not a known function of PAP2/Trf4. PAP2 is a
      poly(A) RNA polymerase (nucleotidyltransferase) that adds adenosine residues to
      RNA 3' ends; it does not remove phosphate groups from RNA 3' termini. The 5'-deoxyribose-5-phosphate
