    id: GO:0046425
    label: DNA 3'-phosphatase activity
  predicted_term_type: GO_MF
  review:
    assessment: NPI
    confidence_score: 0
    summary: >-
      DNA 3'-phosphatase activity is not a known function of PAP2/Trf4. PAP2 functions
      primarily as a poly(A) RNA polymerase; its documented DNA-associated activity is a
      5'-deoxyribose-5-phosphate lyase (GO:0051575, PMID:17983848) involved in base
      excision repair, not a 3'-phosphatase. Trf4 was originally misidentified as a DNA
      polymerase (hence the name TRF4 = topoisomerase I-related function 4) but was
      definitively shown to lack DNA polymerase or phosphatase activity (PMID:16260630).
      This prediction conflates the historical DNA polymerase misidentification with
      phosphatase activity.
    error_type: FREQUENCY_BIAS
