gene_symbol: SHY1
organism: yeast
uniprot_id: P53266
taxon_id: NCBITaxon:559292
status: COMPLETE
descriptions:
- source: UniProt
  text: Required for efficient assembly of cytochrome c oxidase in the mitochondrial
    inner membrane. Involved in a step that couples MSS51-COX14-dependent regulation
    of COX1 translation to early steps of cytochrome c oxidase assembly.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P53266
  source_id: P53266
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate description of the assembly factor role.
    - rubric: utility
      score: 4
      notes: Good mechanistic detail on the COX1 translation regulation coupling.
    - rubric: compactness
      score: 5
      notes: Two concise sentences.
    - rubric: completeness
      score: 3
      notes: Misses SURF1 homology, complex III/IV supercomplex association, peroxisome
        localization.
    - rubric: specificity
      score: 4
      notes: Names MSS51, COX14, and the regulatory coupling mechanism.
    overall_notes: Focuses on cytochrome c oxidase assembly and the MSS51-COX14 regulatory
      coupling. Clear about the mitochondrial inner membrane location and assembly
      step specificity.
- source: Alliance_Imported
  text: Mitochondrial inner membrane protein required for complex IV assembly; associates
    with complex IV assembly intermediates and complex III/complex IV supercomplexes;
    similar to human SURF1 involved in Leigh Syndrome; complex IV is also known as
    cytochrome c oxidase; also localizes to the peroxisome
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000003344
  source_id: SGD:S000003344
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 5
      notes: Accurate and well-established.
    - rubric: utility
      score: 5
      notes: Comprehensive with disease relevance and subcellular context.
    - rubric: compactness
      score: 4
      notes: Dense but informative.
    - rubric: completeness
      score: 5
      notes: Covers assembly function, supercomplex association, SURF1 homology, disease
        link, dual localization.
    - rubric: specificity
      score: 5
      notes: Names complex III/IV supercomplexes, SURF1, Leigh Syndrome.
    overall_notes: Broader description covering complex IV assembly, supercomplex
      association, SURF1 homology, Leigh syndrome connection, and dual localization
      (mitochondria and peroxisome).
- source: Alliance_Automated
  text: Enables unfolded protein binding activity. Involved in mitochondrial respiratory
    chain complex IV assembly. Located in mitochondrial inner membrane. Used to study
    Leigh disease. Human ortholog(s) of this gene implicated in Charcot-Marie-Tooth
    disease type 4K; Leigh disease; and mitochondrial complex IV deficiency nuclear
    type 1. Orthologous to human SURF1 (SURF1 cytochrome c oxidase assembly factor).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000003344
  source_id: SGD:S000003344
  review:
    reviewer: AI
    rubrics:
    - rubric: correctness
      score: 3
      notes: Unfolded protein binding is misleading for a cytochrome c oxidase assembly
        factor.
    - rubric: utility
      score: 3
      notes: Disease context is useful; basic functional info present.
    - rubric: compactness
      score: 4
      notes: Standard length.
    - rubric: completeness
      score: 2
      notes: Misses supercomplex association, MSS51/COX14 coupling, peroxisome localization.
    - rubric: specificity
      score: 3
      notes: Names complex IV and SURF1 orthology.
    overall_notes: GO-derived summary with correct complex IV assembly function. "Unfolded
      protein binding" is questionable for an assembly factor. Disease associations
      are useful.
- source: RefSeq
  text: Enables unfolded protein binding activity. Involved in mitochondrial cytochrome
    c oxidase assembly. Located in mitochondrial inner membrane. Used to study Leigh
    disease. Human ortholog(s) of this gene implicated in Charcot-Marie-Tooth disease
    type 4K; Leigh disease; and mitochondrial complex IV deficiency nuclear type 1.
    Orthologous to human SURF1 (SURF1 cytochrome c oxidase assembly factor). [provided
    by Alliance of Genome Resources, Jul 2025]
  source_type: automated
  url: https://www.ncbi.nlm.nih.gov/gene/853009
