    - rubric: utility
      score: 3
      notes: Same as Alliance_Automated.
    - rubric: compactness
      score: 4
      notes: Same as Alliance_Automated.
    - rubric: completeness
      score: 2
      notes: Same as Alliance_Automated.
    - rubric: specificity
      score: 3
