review:
  reviewer: AI
  rubrics:
  - rubric: overall_concordance
    score: 4
    notes: 'Agreement on complex IV assembly. Minor discrepancy: automated sources
      incorrectly assign "unfolded protein binding".'
  overall_notes: Good concordance on cytochrome c oxidase assembly factor role. UniProt
    provides unique mechanistic detail (MSS51-COX14 coupling), while SGD curated provides
    the broadest context including supercomplex association and SURF1 homology. Automated
    sources misapply unfolded protein binding to an assembly factor.
