description: 'CHS7 encodes an endoplasmic-reticulum membrane export chaperone for the chitin synthase Chs3, promoting Chs3
  folding/proteostasis, ER-to-Golgi export, and normal chitin synthase III-dependent cell wall chitin deposition.'
