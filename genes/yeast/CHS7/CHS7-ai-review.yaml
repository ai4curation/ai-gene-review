core_functions:
- description: Chs7 acts as a client-specific ER membrane chaperone/escort for Chs3, licensing productive Chs3
    biogenesis and export rather than acting as the chitin synthase enzyme itself.
  supported_by:
  - reference_id: file:yeast/CHS7/CHS7-deep-research-falcon.md
    supporting_text: Chs7 acts at the earliest licensing step for the Chs3 trafficking itinerary
  molecular_function:
    id: GO:0044183
    label: protein folding chaperone
  directly_involved_in:
  - id: GO:0006888
    label: endoplasmic reticulum to Golgi vesicle-mediated transport
  - id: GO:0006031
    label: chitin biosynthetic process
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
proposed_new_terms:
- proposed_name: chitin synthase export chaperone activity
  proposed_definition: A protein folding chaperone activity that binds or escorts a chitin synthase client in the
    endoplasmic reticulum to promote its productive folding, ER quality-control evasion, and export toward the Golgi.
  justification: Chs7 is not a generic unfolded-protein binder; the yeast evidence supports a dedicated export-chaperone
    activity for Chs3/chitin synthase III that is more specific than existing chaperone terms. The 2023 Sanchez et al.
    MBoC study strengthens this by showing that Chs7 also functions as a degron shield, masking Chs3 cytosolic degrons
    to prevent ERAD-C targeting.
  proposed_parent:
    id: GO:0044183
    label: protein folding chaperone
  supported_by:
  - reference_id: file:yeast/CHS7/CHS7-deep-research-falcon.md
    supporting_text: dedicated chaperones like Chs7 can simultaneously function as **folding/escort factors and degron
      shields**
suggested_questions:
- question: Does Chs7 have physiologically important clients other than Chs3, or is its conserved role essentially
    dedicated to chitin synthase export?
  experts: []
- question: Which Chs3 surfaces are shielded by Chs7 during ER quality control and ERAD avoidance?
  experts: []
suggested_experiments:
- hypothesis: Chs7 promotes Chs3 ER export by masking Chs3 degrons while maintaining an export-competent conformation.
  description: Map Chs3 regions that require Chs7 using endogenous tagged Chs3 truncation or degron mutants, ER export
    assays, co-immunoprecipitation, and ERAD/INMAD pathway perturbations.
  experiment_type: client-mapping and trafficking assay
