- source: Alliance_Imported
  text: Histone deacetylase, component of both Rpd3S and Rpd3L complexes; regulates
    transcription, silencing, autophagy and other processes by influencing chromatin
    remodeling; forms at least two different complexes which have distinct functions
    and members; Rpd3(L) recruitment to the subtelomeric region is regulated by interaction
    with the Hmt1p methyltransferase; delays late firing of single copy origins by
    opposing the Fkh1/2 origin activation pathway
