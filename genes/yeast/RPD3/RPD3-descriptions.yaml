descriptions:
- source: UniProt
  text: Catalytic component of the RPD3 histone deacetylase (HDAC) complexes RPD3C(L)
    and RPD3C(S) responsible for the deacetylation of lysine residues on the N-terminal
    part of the core histones (H2A, H2B, H3 and H4). Histone deacetylation plays an
    important role in transcriptional regulation, cell cycle progression, DNA damage
    response, osmotic stress response and developmental events. Is involved in rDNA
    and telomere silencing and in double strand breaks repair. Required for both full
    transcription repression and activation of many genes including cell type-specific
    genes (STE6, TY2 and HO), cell differentiation-specific genes (SPO13), genes that
    respond to external signals (PHO5) and TRK2. The RPD3 complexes regulate also
    chromosomal replication timing.
  source_type: curated
