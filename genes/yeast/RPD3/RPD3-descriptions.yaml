- source: Alliance_Automated
  text: Enables histone deacetylase activity; transcription coactivator activity;
    and transcription corepressor activity. Involved in several processes, including
    mitotic cell cycle phase transition; nucleolus organization; and regulation of
    macromolecule metabolic process. Located in nuclear periphery. Part of Rpd3L complex;
    Rpd3S complex; and Snt2C complex. Human ortholog(s) of this gene implicated in
    stomach cancer. Orthologous to human HDAC1 (histone deacetylase 1) and HDAC2 (histone
    deacetylase 2).
