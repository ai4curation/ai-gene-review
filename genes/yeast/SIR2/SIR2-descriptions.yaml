gene_symbol: SIR2
organism: yeast
uniprot_id: P06700
taxon_id: NCBITaxon:559292
descriptions:
- source: UniProt
  text: NAD-dependent deacetylase, which participates in a wide range of cellular
    events including chromosome silencing, chromosome segregation, DNA recombination
    and the determination of life span. Involved in transcriptional repression of
    the silent mating-type loci HML and HMR and telomeric silencing via its association
    with SIR3 and SIR4. Plays a central role in ribosomal DNA (rDNA) silencing via
    its association with the RENT complex, preventing hyperrecombination, and repressing
    transcription from foreign promoters, which contributes to extending life span.
    Probably represses transcription via the formation of heterochromatin structure,
    which involves the compaction of chromatin fiber into a more condensed form, although
    this complex in at least one case can still bind euchromatic levels of positive
    transcription regulators. Although it displays some NAD-dependent histone deacetylase
    activity on histone H3K9Ac and H3K14Ac and histone H4K16Ac in vitro, such activity
    is unclear in vivo and may not be essential.
  source_type: curated
  url: https://www.uniprot.org/uniprot/P06700
  source_id: P06700
- source: Alliance_Imported
  text: Conserved NAD+ dependent histone deacetylase of the Sirtuin family; deacetylation
    targets are primarily nuclear proteins; required for telomere hypercluster formation
    in quiescent yeast cells; involved in regulation of lifespan; plays roles in silencing
    at HML, HMR, telomeres, and rDNA; negatively regulates initiation of DNA replication,
    suppressing early firing of multicopy rDNA origins; functions as regulator of
    autophagy like mammalian homolog SIRT1, and also of mitophagy
  source_type: curated
  url: https://www.yeastgenome.org/locus/S000002200
  source_id: SGD:S000002200
- source: Alliance_Automated
  text: Enables DNA replication origin binding activity and histone deacetylase activity,
    NAD-dependent. Contributes to nucleosome binding activity. Involved in several
    processes, including establishment of protein-containing complex localization
    to telomere; negative regulation of macromolecule metabolic process; and regulation
    of DNA stability. Located in chromosome, telomeric region; heterochromatin; and
    nucleolus. Part of RENT complex. Is active in nucleus. Used to study Alzheimer's
    disease; Parkinson's disease; diabetes mellitus; and prostate cancer. Human ortholog(s)
    of this gene implicated in Huntington's disease. Orthologous to human SIRT1 (sirtuin
    1).
  source_type: automated
  url: https://www.yeastgenome.org/locus/S000002200
  source_id: SGD:S000002200
