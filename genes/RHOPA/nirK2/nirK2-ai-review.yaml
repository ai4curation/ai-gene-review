id: Q6N2A5
gene_symbol: nirK2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:258594
  label: Rhodopseudomonas palustris (strain ATCC BAA-98 / CGA009)
description: >-
  nirK2 encodes a second predicted copper-containing nitrite reductase in
  Rhodopseudomonas palustris CGA009. The UniProt/GOA profile supports
  NO-forming nitrite reductase activity and denitrification pathway membership.
existing_annotations:
- term:
    id: GO:0005507
    label: copper ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      ACCEPT. Copper binding is expected for a copper-containing nitrite
      reductase.
    action: ACCEPT
    reason: >-
      nirK2 has the same conserved copper nitrite reductase architecture as
      bacterial NirK enzymes, including NO2-reductase_Cu/cupredoxin signatures
      and type 1 copper-site features.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: InterPro; IPR001287; NO2-reductase_Cu.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      KEEP_AS_NON_CORE. The annotation is correct but less informative than the
      specific nitrite reductase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Oxidoreductase activity is a true parent for the nitrite reductase
      reaction, but GO:0050421 captures the specific molecular function and
      should be treated as the core activity.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'RecName: Full=Copper-containing nitrite reductase; EC=1.7.2.1.'
- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      ACCEPT. NirK-family nitrite reductases are periplasmic enzymes.
    action: ACCEPT
    reason: >-
      UniProt predicts periplasmic localization and a signal peptide, consistent
      with exported bacterial copper nitrite reductase biology.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Periplasm.'
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: SIGNAL          1..26
- term:
    id: GO:0050421
    label: nitrite reductase (NO-forming) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      ACCEPT. This specific molecular function is consistent with the
      copper-containing nitrite reductase assignment.
    action: ACCEPT
    reason: >-
      This is the precise EC-supported activity for the predicted enzyme.
      UniProt assigns EC 1.7.2.1 and both NCBIfam and PANTHER place the sequence
      in conserved multicopper/copper nitrite reductase families. The broad
      PTHR11709 family is functionally diverse, so the specific activity is
      justified by EC 1.7.2.1 plus TIGR02376/NO2-reductase_Cu rather than by
      multicopper oxidase membership alone.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'RecName: Full=Copper-containing nitrite reductase; EC=1.7.2.1.'
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: NCBIfam; TIGR02376; Cu_nitrite_red; 1.
    - reference_id: file:interpro/panther/PTHR11709/PTHR11709-deep-research-falcon.md
      supporting_text: >-
        PTHR11709 family research found multicopper oxidases are functionally
        diverse, so substrate-specific nitrite reductase activity requires
        specific EC/clade evidence.
- term:
    id: GO:0019333
    label: denitrification pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: >-
      ACCEPT. UniPathway adds appropriate denitrification-pathway context for a
      NO-forming nitrite reductase.
    action: ACCEPT
    reason: >-
      NO-forming nitrite reductase activity is the denitrification nitrite-to-NO
      step. The evidence is conserved EC/family inference plus UniProt pathway
      mapping, and no conflicting local evidence was found for nirK2.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'PATHWAY: Nitrogen metabolism; nitrate reduction (denitrification); dinitrogen from nitrate: step 2/4.'
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings: []
- id: GO_REF:0000041
  title: Gene Ontology annotation based on UniPathway vocabulary mapping
  findings: []
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB Subcellular Location vocabulary mapping
  findings: []
- id: GO_REF:0000118
  title: Manual transfer of experimentally verified manual GO annotation data to orthologs by Ensembl Compara
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:RHOPA/nirK2/nirK2-uniprot.txt
  title: UniProt record for nirK2
  findings:
  - statement: >-
      UniProt/GOA support a copper nitrite reductase assignment for Q6N2A5.
- id: file:interpro/panther/PTHR11709/PTHR11709-deep-research-falcon.md
  title: Falcon family deep research for PTHR11709 multicopper oxidases
  findings:
  - statement: >-
      Family research supports a cautious evolutionary interpretation: the
      multicopper oxidase family is broad, but nirK2 has additional
      NO2-reductase_Cu, TIGR02376, and EC evidence for NO-forming nitrite
      reductase activity.
- id: file:RHOPA/nirK2/nirK2-deep-research-manual.md
  title: Manual deep research synthesis for nirK2
  findings:
  - statement: >-
      Falcon and OpenScientist did not complete for nirK2; manual synthesis
      supports NO-forming copper nitrite reductase activity and denitrification
      pathway from EC 1.7.2.1, NO2-reductase_Cu/TIGR02376 signatures, and the
      PTHR11709 caution that broad multicopper-oxidase membership alone is not
      enough.
core_functions:
- description: >-
    Catalyzes NO-forming nitrite reduction as part of bacterial denitrification.
  molecular_function:
    id: GO:0050421
    label: nitrite reductase (NO-forming) activity
  directly_involved_in:
  - id: GO:0019333
    label: denitrification pathway
  supported_by:
  - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
    supporting_text: >-
      UniProt/GOA identify Q6N2A5 as a nitrite reductase family protein with
      nitrite reductase (NO-forming) activity.
  - reference_id: file:RHOPA/nirK2/nirK2-deep-research-manual.md
    supporting_text: >-
      Manual synthesis accepts nitrite reductase (NO-forming) activity and
      denitrification pathway for nirK2, while treating broad oxidoreductase
      activity as non-core.
