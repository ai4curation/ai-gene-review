id: Q6N2A5
gene_symbol: nirK2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:258594
  label: Rhodopseudomonas palustris (strain ATCC BAA-98 / CGA009)
description: >-
  nirK2 encodes a second predicted copper-containing nitrite reductase in
  Rhodopseudomonas palustris CGA009. The UniProt/GOA profile supports
  NO-forming nitrite reductase activity; organism-level evidence supports
  nitrite reduction and NOx metabolism in CGA009, even though a dissimilatory
  nitrate reductase was not evident in the cited genome survey.
existing_annotations:
- term:
    id: GO:0005507
    label: copper ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      ACCEPT. Copper binding is expected for a copper-containing nitrite
      reductase.
    action: ACCEPT
    reason: >-
      nirK2 has the same conserved copper nitrite reductase architecture as
      bacterial NirK enzymes, including NO2-reductase_Cu/cupredoxin signatures
      and type 1 copper-site features. Falcon recovered RPA4145/nirK2 in
      comparative NirK literature but no purified nirK2 metal biochemistry.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: InterPro; IPR001287; NO2-reductase_Cu.
    - reference_id: file:RHOPA/nirK2/nirK2-deep-research-falcon.md
      supporting_text: >-
        Comparative NirK analyses include R. palustris CGA009 nirK2/RPA4145
        with conserved copper-nitrite-reductase motifs.
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: >-
      KEEP_AS_NON_CORE. The annotation is correct but less informative than the
      specific nitrite reductase activity.
    action: KEEP_AS_NON_CORE
    reason: >-
      Oxidoreductase activity is a true parent for the nitrite reductase
      reaction, but GO:0050421 captures the specific molecular function and
      should be treated as the core activity.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'RecName: Full=Copper-containing nitrite reductase; EC=1.7.2.1.'
- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      ACCEPT. NirK-family nitrite reductases are periplasmic enzymes.
    action: ACCEPT
    reason: >-
      UniProt predicts periplasmic localization and a signal peptide, consistent
      with exported bacterial copper nitrite reductase biology.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Periplasm.'
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: SIGNAL          1..26
- term:
    id: GO:0050421
    label: nitrite reductase (NO-forming) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      ACCEPT. This specific molecular function is consistent with the
      copper-containing nitrite reductase assignment.
    action: ACCEPT
    reason: >-
      This is the precise EC-supported activity for the predicted enzyme.
      UniProt assigns EC 1.7.2.1 and both NCBIfam and PANTHER place the sequence
      in conserved multicopper/copper nitrite reductase families. The broad
      PTHR11709 family is functionally diverse, so the specific activity is
      justified by EC 1.7.2.1 plus TIGR02376/NO2-reductase_Cu rather than by
      multicopper oxidase membership alone. Falcon adds organism-level support:
      CGA009 cells grown with nitrite show detectable nitrite reductase activity
      and taxis toward nitrite, although those data are not a purified nirK2
      assay.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'RecName: Full=Copper-containing nitrite reductase; EC=1.7.2.1.'
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: NCBIfam; TIGR02376; Cu_nitrite_red; 1.
    - reference_id: file:interpro/panther/PTHR11709/PTHR11709-deep-research-falcon.md
      supporting_text: >-
        PTHR11709 family research found multicopper oxidases are functionally
        diverse, so substrate-specific nitrite reductase activity requires
        specific EC/clade evidence.
    - reference_id: file:RHOPA/nirK2/nirK2-deep-research-falcon.md
      supporting_text: >-
        R. palustris CGA009 encodes nitrite reductase and NO-reductase genes,
        and nitrite-grown cells show detectable nitrite reductase activity,
        supporting physiological NO-forming nitrite reduction capacity.
- term:
    id: GO:0019333
    label: denitrification pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: >-
      ACCEPT. UniPathway adds appropriate denitrification-pathway context for a
      NO-forming nitrite reductase.
    action: ACCEPT
    reason: >-
      NO-forming nitrite reductase activity is the denitrification nitrite-to-NO
      step. The evidence is conserved EC/family inference plus UniProt pathway
      mapping. Falcon adds an important boundary: CGA009 encodes nitrite
      reductase and NO-reductase genes but lacked an obvious dissimilatory
      nitrate reductase in the cited genome survey, so this should be read as
      step-level denitrification/NOx pathway context rather than proof of a full
      nitrate-to-N2 route from nitrate.
    supported_by:
    - reference_id: file:RHOPA/nirK2/nirK2-uniprot.txt
      supporting_text: 'PATHWAY: Nitrogen metabolism; nitrate reduction (denitrification); dinitrogen from nitrate: step 2/4.'
    - reference_id: file:RHOPA/nirK2/nirK2-deep-research-falcon.md
      supporting_text: >-
        CGA009 genome information indicates nitrite reductase and nitric oxide
        reductase capacity but no obvious dissimilatory nitrate reductase,
        supporting a nitrite/NOx segment rather than overclaiming complete
        nitrate respiration.
