core_functions:
  - description: >-
      Septum-localized cell-wall N-acetylmuramoyl-L-alanine amidase that hydrolyzes the amide
      bond between the stem-peptide L-alanine and the N-acetylmuramic acid of peptidoglycan.
      Inferred by orthology (ISS) from the characterized Anabaena PCC 7120 AmiC1: beyond
      peptidoglycan turnover, it is expected to remodel and perforate the septal peptidoglycan
      to generate/pattern the nanopore array through which septal junctions connect neighboring
      cells, contributing to intercellular communication. AmiC1 (Q3MD48) is the tandem paralog
      of AmiC2 (Q3MD47).
