proposed_new_terms: []
suggested_questions:
  - question: >-
      Is the A. variabilis AmiC1 (Ava_1465), like its Anabaena PCC 7120 ortholog, the dominant
      of the two tandem amidases, and does it (rather than AmiC2/Q3MD47) drive septal nanopore
      formation and cell-cell communication in this organism?
  - question: >-
      Is the AMIN domain necessary and sufficient for septal targeting of A. variabilis AmiC1,
      and how is its site-specific/temporal activity regulated to avoid autolysis?
suggested_experiments:
  - description: >-
      Targeted inactivation and GFP-tagging of Ava_1465 in Anabaena variabilis to test directly
      whether this AmiC1 ortholog localizes to the septum and is required for nanopore
      formation, cell-cell communication and heterocyst development (mirroring the Anabaena PCC
      7120 AmiC1 experiments).
    experiment_type: gene knockout and localization
  - description: >-
      In vitro amidase assay on purified peptidoglycan (release of the stem peptide from
      MurNAc) with recombinant Q3MD48 to confirm N-acetylmuramoyl-L-alanine amidase activity
      biochemically and to measure Zn dependence.
    experiment_type: enzyme assay
