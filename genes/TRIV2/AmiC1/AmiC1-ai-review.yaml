    review:
      summary: >-
        Core molecular function. Q3MD48 carries an Amidase_3 catalytic domain
        (IPR002508/PF01520; CDD cd02696 MurNAc-LAA; PANTHER PTHR30404) and is annotated with EC
        3.5.1.28; the conserved catalytic IDPGHGG motif is present. The IEA (from InterPro/EC)
