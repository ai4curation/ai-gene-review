taxon:
  id: NCBITaxon:240292
  label: Trichormus variabilis (strain ATCC 29413 / PCC 7937)
description: >-
  AmiC1 (locus Ava_1465; UniProt Q3MD48) is a secreted, cell-wall-lytic
  N-acetylmuramoyl-L-alanine amidase (murein hydrolase / autolysin, EC 3.5.1.28) of the
  filamentous, heterocyst-forming cyanobacterium Anabaena variabilis (Trichormus variabilis)
  ATCC 29413. Its architecture combines an N-terminal signal peptide and AMIN domain(s)
  (IPR021731/PF11741), which target the enzyme to the division septum, with a Zn-dependent
  Amidase_3 catalytic domain (IPR002508/PF01520; PANTHER PTHR30404), which cleaves the amide
  bond linking the stem-peptide N-terminal L-alanine to the N-acetylmuramic acid of the
  peptidoglycan backbone. It is the AmiC1 paralog, arranged in tandem with the adjacent AmiC2
  (Q3MD47). In the heterocyst-forming cyanobacteria, the AmiC amidases remodel and perforate the
  septal peptidoglycan to generate the array of nanopores through which septal junctions connect
  the cytoplasms of neighboring cells in the filament, a process required for intercellular
  communication, heterocyst differentiation and diazotrophic growth. This A. variabilis protein
  is the reciprocal-best-hit ortholog of the experimentally characterized Anabaena (Nostoc sp.
  PCC 7120) AmiC1 (alr0092), from which its functional attributes are inferred by orthology.
references:
  - id: PMID:22821973
    title: >-
      Cell wall amidase AmiC1 is required for cellular communication and heterocyst
      development in the cyanobacterium Anabaena PCC 7120 but not for filament integrity.
    findings:
      - statement: >-
          In Anabaena (Nostoc sp. PCC 7120), the amiC1 (alr0092) mutant fails to differentiate
          heterocysts and to grow diazotrophically, FRAP shows a specific loss of cell-cell
          communication, and GFP-AmiC1 localizes to the septum of newly dividing cells and the
          polar neck of differentiating heterocysts. Basis for ISS transfer to the A. variabilis
          AmiC1 ortholog (Q3MD48).
        supporting_text: >-
          The amiC1 (alr0092) mutant was not able to differentiate heterocysts or to
          grow diazotrophically
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-verified (J Bacteriol 2012;194:5218-27; DOI 10.1128/JB.00912-12). Primary,
        AmiC1-specific characterization of the Anabaena PCC 7120 AmiC1 ortholog; used here as
        the ISS source. Does not directly assay A. variabilis Q3MD48.
  - id: PMID:28929086
    title: >-
      Role of Two Cell Wall Amidases in Septal Junction and Nanopore Formation in the
      Multicellular Cyanobacterium Anabaena sp. PCC 7120.
    findings:
      - statement: >-
          In Anabaena, inactivation of amiC1 reduces the septal peptidoglycan nanopore count to
          about half of wild type with impaired intercellular tracer exchange; AmiC1 and AmiC2
          localize to the septa. Basis for ISS transfer to the A. variabilis AmiC1 ortholog.
        supporting_text: >-
          the amiC1 mutants SR477 and FQ1633 showed 47 and 52% of the count of nanopores,
          respectively
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        PubMed-verified (Front Cell Infect Microbiol 2017;7:386). Compares AmiC1 and AmiC2 in
        Anabaena PCC 7120; ISS source for the A. variabilis AmiC1 ortholog. Note the direct
        N. punctiforme amidase characterization in the wider literature is of AmiC2, a different
        gene, not of this AmiC1.
