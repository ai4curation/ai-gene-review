proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of small
      molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD).
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. FraD (anchor) and SepN (plug) are components of this structure and would
      be annotated to it.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Do the fraC-fraD-fraE operon and septal-junction machinery function equivalently in
      Anabaena variabilis ATCC 29413, and does deletion of Ava_0209 (fraD) reproduce the PCC
      7120 filament-fragmentation and diazotrophy phenotypes?
suggested_experiments:
  - hypothesis: >-
      Q3MGQ1 (FraD) is a functional septal-junction anchor in A. variabilis equivalent to PCC
      7120 FraD.
    description: >-
      Construct an Ava_0209 (fraD) deletion in A. variabilis and assay filament integrity
      under nitrogen deprivation, septal-junction ultrastructure by cryoET, and intercellular
      calcein/FRAP transfer, complementing with PCC 7120 fraD to test functional
      interchangeability.
