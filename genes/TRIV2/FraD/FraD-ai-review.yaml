  label: Trichormus variabilis (strain ATCC 29413 / PCC 7937)
description: >-
  FraD (locus Ava_0209; UniProt Q3MGQ1) is a polytopic cytoplasmic-membrane protein of the
  filamentous, heterocyst-forming cyanobacterium Anabaena variabilis (Trichormus variabilis)
  ATCC 29413. It is the ortholog of the characterized Nostoc sp. PCC 7120 FraD (alr2393), the
  third gene of the fraC-fraD-fraE operon, and is a member of the FraD-specific DUF5357 family
  (Pfam PF17310 / InterPro IPR020360), a family restricted to filamentous heterocyst-forming
  cyanobacteria. By orthology, FraD is a core structural component of the septal junction (SJ),
  the gap-junction-like intercellular channel that traverses the septal peptidoglycan and
  connects adjacent cells in a filament to allow gated cell-cell molecular exchange. It has an
  N-terminal bundle of transmembrane helices that span the cytoplasmic membrane and a large
  C-terminal periplasmic domain that forms the SJ periplasmic anchoring module, thus acting as
  the membrane-spanning and periplasmic anchor of the SJ and as an assembly platform for the
  plug (SepN) and cap modules, enabling intercellular communication along the filament during
  diazotrophic multicellular growth.
references:
  - id: PMID:42424141
    title: "The SepN-FraD structural module serves as an anchor and assembly platform for septal junctions in cyanobacteria."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Characterization of the PCC 7120 FraD ortholog (Kieninger et al., Cell Rep 2026):
        defines FraD as the transmembrane/periplasmic anchor of the septal junction via
        cryoET, AlphaFold 3 and MD. Used here as the basis for ISS transfer to the
        A. variabilis ortholog Q3MGQ1; no experiment was done on Q3MGQ1 itself.
  - id: PMID:20487302
    title: "Fra proteins influencing filament integrity, diazotrophy and localization of septal protein SepJ in the heterocyst-forming cyanobacterium Anabaena sp."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Establishes fraD = alr2393 in the fraC-fraD-fraE operon, septal localization of FraD
        (GFP fusions) and fra-mutant defects in calcein transfer, filament integrity and
        diazotrophy in PCC 7120. Basis for ISS transfer of membrane localization and
        cell-cell communication to the A. variabilis ortholog. Abstract-only in cache.
  - id: PMID:36470860
    title: "SepN is a septal junction component required for gated cell-cell communication in the filamentous cyanobacterium Nostoc."
    reference_review:
      relevance: MEDIUM
      correctness: VERIFIED
      review_notes: >-
        Identifies SepN as the FraD-interacting SJ plug component and shows SepN co-occurs
        phylogenetically with FraD; supports the family-level SJ role transferred by
        orthology. Full text available in cache.
  - id: file:TRIV2/FraD/FraD-notes.md
    title: FraD (Q3MGQ1 / Ava_0209) research notes
