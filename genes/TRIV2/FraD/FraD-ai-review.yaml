- term:
    id: GO:0042597
    label: periplasmic space
  evidence_type: ISS
  original_reference_id: PMID:42424141
  review:
    summary: >-
      NEW (proposed, by orthology). In PCC 7120, FraD's C-terminal domain forms the
      septal-junction periplasmic anchor; the periplasmic-anchor density is present in the WT
      cryoET average but absent in the fraD-deltaPP mutant, and the periplasmic domain is
      required for nanopore formation and SJ assembly. The conserved C-terminal periplasmic
