- term:
    id: GO:0005198
    label: structural molecule activity
  evidence_type: ISS
  original_reference_id: PMID:42424141
  review:
    summary: >-
      NEW (proposed, by orthology). Q3MGQ1 is the FraD ortholog of PCC 7120 FraD (P46079;
      reciprocal best hit, forward phmmer E = 1.9e-233, 97.7% identity; same FraD-specific
      family IPR020360; conserved fraC-fraD-fraE operon synteny). In PCC 7120, FraD provides
      the transmembrane and periplasmic anchor of the septal junction and serves as the
      structural assembly platform for the SepN plug and cap module - a structural
      (non-catalytic) role best captured by structural molecule activity. Inferred for Q3MGQ1
      by sequence/structural similarity (ISS).
