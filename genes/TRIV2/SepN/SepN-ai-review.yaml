product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:240292
  label: Trichormus variabilis (strain ATCC 29413 / PCC 7937)
description: >-
  SepN (locus Ava_0796; UniProt Q3MF16) is a bitopic cytoplasmic-membrane protein of the
  filamentous, heterocyst-forming cyanobacterium Trichormus variabilis (Anabaena variabilis)
  ATCC 29413. It is the ortholog of the experimentally characterized SepN of Nostoc sp.
  PCC 7120, the plug-forming structural component of the septal junction (SJ) - the
  gap-junction-like intercellular channel that traverses the septal peptidoglycan and
  connects adjacent cells in a filament to allow gated cell-cell molecular exchange. SepN
  has an N-terminal transmembrane helix that anchors it in the cytoplasmic membrane and a
  large cytoplasmic domain; in the characterized ortholog five SepN copies assemble into a
  central pentameric plug that is surrounded by peripheral FraD anchors and gates (opens and
  closes) the intercellular channel, thereby controlling cell-cell communication along the
  filament. SepN lacks any Pfam/InterPro/PANTHER family model and is a signature protein of
  the order Nostocales that co-occurs with FraD.
references:
  - id: PMID:36470860
    title: "SepN is a septal junction component required for gated cell-cell communication in the filamentous cyanobacterium Nostoc."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Discovery/characterization paper for the PCC 7120 SepN ortholog (Kieninger et al.,
        Nat Commun 2022). Identifies SepN as the FraD-interacting septal-junction plug
        component required for gated cell-cell communication. Functional statements are
        transferred to A. variabilis Q3MF16 by orthology (ISS); no direct assay on Q3MF16.
        Full text available in cache; PMID matches title.
  - id: PMID:42424141
    title: "The SepN-FraD structural module serves as an anchor and assembly platform for septal junctions in cyanobacteria."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Structural paper for the PCC 7120 SepN ortholog (Kieninger et al., Cell Rep 2026).
        Models SepN as a pentameric plug anchored by FraD. Basis for the transferred
        structural-plug function; PubMed-verified.
  - id: file:TRIV2/SepN/SepN-notes.md
    title: SepN (Q3MF16 / Ava_0796) research notes
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Orthology-evidence notes for Q3MF16: reciprocal-best-hit homology to PCC 7120 SepN
        (forward E = 4.6e-151, 96.6% identity), absence of any family model (exemplar-homology
