  label: Trichormus variabilis (strain ATCC 29413 / PCC 7937)
description: >-
  Q3MGV3 (locus Ava_0157) is a large (751-residue) multidomain integral cytoplasmic
  (inner) membrane protein of the filamentous, heterocyst-forming cyanobacterium
  Anabaena variabilis (Trichormus variabilis) ATCC 29413, and is the SepJ/FraG ortholog
  of the well-characterized septal protein SepJ (FraG, alr2338) of Nostoc/Anabaena sp.
  PCC 7120. Like its ortholog it has an N-terminal coiled-coil region within a long
  extramembrane N-terminal section, a central proline/serine/threonine-rich low-complexity
  linker, and a C-terminal multi-pass integral-membrane permease domain of the
  drug/metabolite transporter (DMT / EamA) superfamily. By orthology, SepJ is a structural,
  multimer-forming component of the cyanobacterial septal junction machinery that localizes
  to the intercellular septa (cell poles): its coiled-coil domain anchors adjacent cells and
  binds septal peptidoglycan, and the protein is required for filament integrity, septal-junction/
  nanopore formation and the gated intercellular transfer of small molecules (cell-cell
  communication) that underpins diazotrophic growth. Although the C-terminal permease domain
  resembles small-molecule transporters, no specific transport substrate has been established,
  so its characterized role is architectural rather than catalytic.
