core_functions:
  - description: >-
      Acts (by orthology to PCC 7120 SepJ) as a structural, multimer-forming component of the
      cyanobacterial septal junction machinery at the intercellular septa: its N-terminal
      coiled-coil domain anchors adjacent cells and binds septal peptidoglycan, while the whole
      protein is required for filament integrity, septal-junction/nanopore formation and gated
      intercellular molecular exchange (cell-cell communication) that underpins diazotrophic
      growth. The C-terminal DMT/EamA permease domain is implicated in intercellular molecular
      exchange, but no specific transport substrate has been established, so the core molecular
      function is annotated as a structural (non-catalytic) role rather than a transporter
      activity.
