proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the septal
      peptidoglycan through a nanopore and directly connects the cytoplasms of adjacent cells in
      a filament, mediating and gating the intercellular diffusion of small molecules.
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. SepJ (FraG) is required for septal-junction formation and is a candidate
      structural component, and would be annotated to this term.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Does the SepJ C-terminal DMT/EamA permease domain transport a specific small-molecule
      substrate across the cytoplasmic membrane, or is its role purely architectural within the
      septal junction?
  - question: >-
      Given the ~97% identity between A. variabilis Q3MGV3 and PCC 7120 SepJ, are the septal
      localization, multimerization and intercellular-transfer phenotypes quantitatively
      identical, or does A. variabilis (which also fixes N2 under microoxic vegetative
      conditions) show SepJ-dependent differences?
suggested_experiments:
  - hypothesis: >-
      SepJ's coiled-coil domain mediates cell-cell anchoring by trans interactions between SepJ
      molecules of adjacent cells and/or by binding septal peptidoglycan.
    description: >-
      Combine site-directed coiled-coil mutants with in vivo split-GFP / BACTH trans-interaction
      assays and quantitative peptidoglycan co-sedimentation to map the anchoring interface and
      test trans-filament SepJ-SepJ contacts.
  - hypothesis: >-
      The SepJ permease domain transports a defined metabolite/regulator between cells.
    description: >-
      Reconstitute the isolated C-terminal permease domain in proteoliposomes and screen candidate
      small-molecule substrates (amino acids, sucrose, regulatory peptides) by transport assays;
      correlate with intercellular FRAP tracer exchange in permease-domain point mutants.
