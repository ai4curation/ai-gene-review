  evidence_type: IDA
  original_reference_id: PMID:19060881
  qualifier: enables
  review:
    summary: >-
      NEW (proposed). Der p 2 is a functional homolog of MD-2 (LY96), the
      LPS-binding component of the TLR4 complex, and reconstitutes LPS-driven TLR4
      signalling in the absence of MD-2 — substituting for MD-2's LPS-presenting
      role, which implies LPS (lipid A) binding by its ML-domain cavity. This is the
      molecular basis of its auto-adjuvant activity and directly parallels the LPS
      binding annotated for cat Fel d 1.
    action: NEW
    reason: >-
      Der p 2 functionally substitutes for MD-2 (the LPS-binding TLR4 co-receptor),
      reconstituting LPS-driven TLR4 signalling; LPS/lipid-A binding by its ML domain
      is the mechanistic basis and a more specific MF than generic sterol binding for
      its immunomodulatory role.
    supported_by:
    - reference_id: PMID:19060881
      supporting_text: reconstituting LPS-driven TLR4 signalling in the absence of MD-2.
