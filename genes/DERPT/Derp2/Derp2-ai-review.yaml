  label: Dermatophagoides pteronyssinus
description: >-
  Der p 2, a major house dust mite allergen of the NPC2 (ML-domain) family. It is a
  secreted lipid/sterol-binding protein structurally and functionally homologous to
  MD-2 (LY96), the LPS-binding component of the TLR4 signalling complex: Der p 2
  reconstitutes LPS-driven TLR4 signalling in the absence of MD-2, giving it
  auto-adjuvant properties that drive allergic sensitization. It is recognized by IgE
  in most dust-mite-allergic patients, and is the archetype of the "lipid-binding
  protein as auto-adjuvant" allergen concept that also frames cat Fel d 1.
