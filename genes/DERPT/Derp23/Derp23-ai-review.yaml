taxon:
  id: NCBITaxon:6956
  label: Dermatophagoides pteronyssinus
description: >-
  Der p 23, a major house dust mite allergen associated with the peritrophic matrix
  of mite faecal pellets. It contains a peritrophin-A-type (ChtBD2) chitin-binding
  domain fold, but direct assays found no chitin binding in vitro, so its molecular
  function is unresolved. Despite its small size and minor abundance it is a major
  allergen, recognized by IgE in a large fraction of dust-mite-allergic patients.
