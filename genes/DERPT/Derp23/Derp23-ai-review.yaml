core_functions:
- description: >-
    Secreted (faecal-pellet peritrophic-matrix) major mite allergen with a
    peritrophin-A (ChtBD2) chitin-binding domain fold. Its molecular function is
    unresolved: despite the domain, direct assays found no chitin binding in vitro.
  locations:
  - id: GO:0005576
    label: extracellular region
  knowledge_gaps:
  - gap_statement: >-
      The molecular function of Der p 23 is undetermined: it has a peritrophin-A
      chitin-binding-domain fold but does not bind chitin in vitro, and no alternative
      ligand or activity has been established.
    boundary: >-
      Established: Der p 23 is a secreted peritrophin-like mite protein of the faecal
      peritrophic matrix. Unknown: its actual ligand/biochemical activity (chitin
      binding is contradicted by direct assay).
    gap_kind:
    - BIOLOGY
    provenance:
    - reference_id: file:DERPT/Derp23/Derp23-uniprot.txt
      supporting_text: Does not bind chitin in vitro.
proposed_new_terms: []
suggested_questions:
- question: If Der p 23 does not bind chitin, what is the endogenous ligand/function of its peritrophin-A domain in the mite peritrophic matrix?
  experts: []
suggested_experiments:
- hypothesis: Der p 23's peritrophin domain binds a peritrophic-matrix component other than chitin (e.g. a glycoprotein or glycan).
  description: Screen recombinant Der p 23 for binding to peritrophic-matrix glycans/glycoproteins by pull-down and glycan-array assays.
  experiment_type: ligand identification / binding assay
