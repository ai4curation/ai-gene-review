  label: Dermatophagoides pteronyssinus
description: >-
  Der p 1, a major house dust mite allergen and a secreted papain-like cysteine
  protease (peptidase C1 family). Produced in the mite digestive tract and excreted
  in faecal pellets, its proteolytic activity is central to its allergenicity: it
  cleaves epithelial tight-junction and immune proteins and activates host receptors
  (e.g. MRGPRX1), promoting allergic sensitization. It is recognized by IgE in the
  large majority of dust-mite-allergic patients.
