          P. tricornutum thermal stress response systems.
  - id: file:PHATC/B7FXQ8/B7FXQ8-hypotheses/core-function-1-go-0051082/openscientist.md
    title: OpenScientist hypothesis investigation - unfolded protein binding as core function of HSP20A
    findings:
      - statement: >-
          GO:0051082 (unfolded protein binding) is officially obsolete. Recommended
          replacement is GO:0044183 (protein folding chaperone), following precedent
          of 25 reviewed sHSPs in Swiss-Prot. B7FXQ8 has zero GO annotations in any
          database; only one of seven P. tricornutum sHSPs has any GO annotation.
      - statement: >-
          All seven independent domain databases (CDD, InterPro, Pfam, PROSITE,
          PANTHER, SMART, Gene3D) classify B7FXQ8 as an sHSP. The IXI motif (IAI at
          position 150) is present, supporting oligomeric assembly capability.

suggested_questions:
  - question: >-
      Is HSP20A transcriptionally induced under heat stress in P. tricornutum,
      and if so, which HSF transcription factor(s) regulate its expression?
  - question: >-
      What is the subcellular localization of HSP20A? Does it remain cytosolic
      or is it imported into chloroplasts or mitochondria under stress conditions?
  - question: >-
      Does HSP20A show functional specialization compared to other sHSP family
      members in the P. tricornutum genome, or are they redundant?
  - question: >-
      What oligomeric state does HSP20A adopt under native vs. heat stress
      conditions, and does oligomeric state correlate with chaperone activity?

suggested_experiments:
  - hypothesis: >-
      HSP20A is transcriptionally upregulated in response to heat stress in
      P. tricornutum.
    description: >-
      Perform RT-qPCR or RNA-seq on P. tricornutum cultures subjected to
      temperature shift (e.g., 20C to 30C) to measure HSP20A transcript
      abundance over a time course. Compare with expression of other sHSP
      family members and known heat-responsive genes.
  - hypothesis: >-
      HSP20A has holdase chaperone activity that prevents aggregation of
      thermally denatured client proteins.
    description: >-
      Express and purify recombinant HSP20A, then test its ability to suppress
      aggregation of model substrates (e.g., citrate synthase, luciferase) under
      thermal stress using light-scattering or turbidity assays. Include
      alpha-crystallin domain mutants as negative controls.
  - hypothesis: >-
      Knockout or knockdown of HSP20A reduces thermal tolerance in
      P. tricornutum.
    description: >-
      Generate HSP20A loss-of-function lines using CRISPR-Cas9 or antisense
      approaches and measure growth and viability under heat stress conditions
      compared to wild-type controls.
