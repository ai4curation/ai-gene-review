status: DRAFT
taxon:
  id: NCBITaxon:556484
  label: Phaeodactylum tricornutum (strain CCAP 1055/1)
description: >-
  HSP20A is a small heat shock protein (sHSP) of the HSP20/alpha-crystallin
  family from the marine diatom Phaeodactylum tricornutum. The 163-amino-acid
  protein contains a conserved alpha-crystallin domain (residues 47-155,
  IPR002068, Pfam PF00011) flanked by variable N-terminal and C-terminal
  extensions. Based on domain architecture and membership in PANTHER family
  PTHR11527 (Heat-Shock Protein 20 Family Member), HSP20A is predicted to
  function as an ATP-independent holdase chaperone that binds partially unfolded
  or misfolded proteins and prevents their irreversible aggregation, maintaining
  client proteins in a folding-competent state for subsequent handoff to
  ATP-dependent chaperone systems such as HSP70. sHSPs form dynamic oligomeric
  assemblies ranging from dimers to large complexes of 24 or more subunits, with
  the oligomeric state regulating chaperone activity. P. tricornutum possesses an
  exceptionally expanded heat shock transcription factor (HSF) repertoire that
  controls thermal tolerance programs, and HSP20 family members in related marine
  microalgae are transcriptionally upregulated under heat stress. No direct
  experimental characterization of HSP20A has been reported; functional inference
  relies on conserved domain architecture and family biology.

existing_annotations: []

core_functions:
  - molecular_function:
      id: GO:0044183
      label: protein folding chaperone
    description: >-
      HSP20A functions as an ATP-independent holdase chaperone that binds
      partially unfolded or aggregation-prone client proteins through recognition
      of exposed hydrophobic surface regions, maintaining them in a
      folding-competent state for handoff to ATP-dependent chaperone systems
      (Hsp70/Hsp100). The conserved alpha-crystallin domain (residues 47-155,
      CDD cd06464, InterPro IPR002068) mediates this activity. OpenScientist
      investigation confirmed strong support for this function but identified
      that GO:0051082 (unfolded protein binding) is officially obsolete in the
      Gene Ontology. GO:0044183 (protein folding chaperone) is the recommended
      replacement, following the annotation precedent of 25 reviewed sHSPs in
      UniProt/Swiss-Prot including HSPB1 (IDA evidence). The more mechanistically
      precise GO:0140309 (unfolded protein holdase activity) is an alternative
      but currently has no sHSP annotation precedent.
    directly_involved_in:
      - id: GO:0009408
        label: response to heat
      - id: GO:0051259
        label: protein complex oligomerization
      - id: GO:0034620
        label: cellular response to unfolded protein
    locations:
      - id: GO:0005737
        label: cytoplasm
    supported_by:
      - reference_id: UniProt:B7FXQ8
        supporting_text: >-
          Belongs to the small heat shock protein (HSP20) family.
          {ECO:0000256|PROSITE-ProRule:PRU00285, ECO:0000256|RuleBase:RU003616}.
      - reference_id: UniProt:B7FXQ8
        supporting_text: >-
          DOMAIN 47..155 /note="SHSP" /evidence="ECO:0000259|PROSITE:PS01031";
          InterPro IPR002068 A-crystallin/Hsp20_dom; Pfam PF00011 HSP20;
          CDD cd06464 ACD_sHsps-like.
      - reference_id: file:PHATC/B7FXQ8/B7FXQ8-deep-research-falcon.md
        supporting_text: >-
          HSP20A functions as an ATP-independent molecular chaperone,
          distinguishing it from ATP-dependent chaperones such as HSP70 and
          HSP90. Small heat shock proteins operate as holdase chaperones -- they
          bind to partially unfolded, misfolded, or aggregation-prone proteins
          and maintain them in a folding-competent state.
      - reference_id: file:PHATC/B7FXQ8/B7FXQ8-deep-research-falcon.md
        supporting_text: >-
          HSP20 family proteins form dynamic oligomeric structures ranging from
          dimers to large assemblies of 24 or more subunits. The oligomeric
          state is functionally significant: dimers often represent the active
          chaperone form, while larger oligomers may serve as inactive storage
          pools.
      - reference_id: file:PHATC/B7FXQ8/B7FXQ8-deep-research-falcon.md
        supporting_text: >-
          In P. tricornutum, heat-shock transcription factor networks are
          unusually expanded and are implicated in temperature adaptation, with
          HSFs directly controlling thermal-tolerance programs. In related
          marine microalgae, HSP20-family genes are associated with heat
          tolerance and adaptation to environmental fluctuation.

