id: B7FXQ8
gene_symbol: B7FXQ8
taxon:
  id: NCBITaxon:556484
  label: Phaeodactylum tricornutum
status: COMPLETE
description: >-
  ProtNLM2 predicted 6 GO term(s) for HSP20A, a small heat shock protein
  (sHSP/alpha-crystallin domain family) from the marine diatom P. tricornutum.
  HSP20A contains a conserved alpha-crystallin domain (residues 47-155) and
  belongs to the HSP20 family of ATP-independent holdase chaperones. sHSPs bind
  partially unfolded or misfolded proteins, prevent their irreversible
  aggregation, and maintain them in a folding-competent state for handoff to
  ATP-dependent chaperones (HSP70/HSP100). P. tricornutum has an expanded HSF
  transcription factor repertoire (69 genes) that regulates HSP expression during
  thermal stress, and HSP20 family members in related marine microalgae are
  transcriptionally upregulated under heat stress. The protein has no curated GOA
  annotations. Assessment: 3 correct novel (COR), 1 less precise (LSP),
  2 uncertain (UNC), 0 incorrect.
