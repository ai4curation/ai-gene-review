predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0009651
      label: response to salt stress
    predicted_term_type: GO_BP
    review:
      assessment: UNC
      confidence_score: 1
      summary: >-
        While sHSPs can be induced by multiple abiotic stresses beyond heat,
        there is no direct evidence that HSP20A in P. tricornutum is specifically
        involved in the response to salt stress. The deep research report focuses
        exclusively on thermal stress roles for this protein family in diatoms,
        with no mention of salinity-induced expression. P. tricornutum is a
        marine diatom and does experience osmotic stress, but the expanded HSF
        regulatory network described in this organism (Huang et al. 2025, Lin et
        al. 2024) is characterized in the context of thermal tolerance, not salt
        acclimation. Some plant sHSPs are salt-inducible, but extrapolating this
        to a diatom HSP20 without organism-specific evidence is speculative.
        ProtNLM2 may have learned a general association between stress-response
        proteins and salt stress from plant training data, but this remains
        unvalidated for HSP20A. Cannot be confirmed or refuted without
        transcriptomic or genetic evidence under salinity stress conditions.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0051259
      label: protein complex oligomerization
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        This is a correct novel prediction. Oligomerization is a defining and
        functionally essential feature of the HSP20/sHSP family. Small heat shock
        proteins assemble into dynamic oligomeric structures ranging from dimers
        to large complexes of 24 or more subunits, with dimers serving as
        building blocks that associate through their N-terminal and C-terminal
        regions to form higher-order assemblies (Sprague-Piercy et al. 2021, Gu
        et al. 2023). The oligomeric state is functionally significant: dimers
        often represent the active chaperone form, while larger oligomers may
        serve as inactive storage pools. HSP20A contains the conserved
        alpha-crystallin domain (residues 47-155) that mediates dimerization, and
        its variable terminal extensions regulate higher-order oligomerization.
        Since B7FXQ8 has no existing GOA annotations, this represents a genuine
        novel prediction consistent with the well-established structural biology
        of the sHSP family.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0006457
      label: protein folding
    predicted_term_type: GO_BP
    review:
      assessment: LSP
      confidence_score: 2
      summary: >-
        This prediction is broadly correct but less precise than the actual
        biological role. sHSPs like HSP20A do not actively fold proteins; they
        function as holdase chaperones that prevent irreversible aggregation of
        partially unfolded or misfolded proteins and maintain them in a
        folding-competent state (Mitra et al. 2022, Albinhassan et al. 2025). The
        actual refolding is carried out by ATP-dependent chaperones (HSP70,
        HSP100) to which sHSPs hand off their client proteins. A more precise
        annotation would be GO:0061077 (chaperone-mediated protein folding) or
        terms related to the prevention of protein aggregation, such as
        GO:0051085 (chaperone cofactor-dependent protein refolding) or the
        broader protein quality control pathway. GO:0006457 (protein folding) is
        a general term that encompasses de novo folding, which is not the primary
        role of sHSPs. The prediction captures the correct functional domain
        (proteostasis) but at insufficient specificity.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0009408
      label: response to heat
    predicted_term_type: GO_BP
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        This is a correct novel prediction and arguably the most biologically
        well-supported of all six predictions. HSP20A is named as a heat shock
        protein and belongs to the sHSP/HSP20 family, whose defining biological
        role is the cellular response to heat stress. In P. tricornutum
        specifically, recent research has established that the organism possesses
        an exceptionally expanded heat shock transcription factor (HSF) repertoire
        (69 HSF genes, 44.2% of all transcription factors) that controls thermal
        tolerance programs, with HSP proteins as downstream effectors (Huang et
        al. 2025, Lin et al. 2024). In the related marine dinoflagellate
        Scrippsiella trochoidea, HSP20 transcripts are strongly upregulated under
        heat stress (Deng et al. 2020). The UniProt entry for B7FXQ8 carries a
        keyword annotation for stress response, and the ARBA automated rule
        (ARBA00023016) supports this assignment. Since P. tricornutum thrives
        across temperatures from 5 to 28 degrees C in diverse marine
        environments, heat shock proteins are critical for its thermal
        adaptability. This is a high-confidence correct prediction.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0042542
      label: response to hydrogen peroxide
    predicted_term_type: GO_BP
    review:
      assessment: UNC
      confidence_score: 1
      summary: >-
        There is no direct evidence that HSP20A in P. tricornutum is involved in
        the response to hydrogen peroxide. While some sHSPs in other organisms
        (particularly plant and mammalian systems) have been shown to confer
        protection against oxidative stress, and oxidative stress and heat stress
        response pathways can overlap, the deep research report for this protein
        does not mention any oxidative stress role. The alpha-crystallin domain
        in vertebrate lens crystallins does protect against oxidative damage, but
        this function has not been demonstrated for diatom HSP20 proteins.
        ProtNLM2 may have learned an association between sHSPs and oxidative
        stress responses from well-characterized plant or mammalian training
        examples, but without P. tricornutum-specific evidence (e.g.,
        transcriptomic upregulation under H2O2 treatment or genetic perturbation
        data), this prediction cannot be validated or refuted.
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0051082
      label: unfolded protein binding
    predicted_term_type: GO_MF
    review:
      assessment: COR
      confidence_score: 2
      summary: >-
        This is a correct novel prediction of the core molecular function of
        sHSPs. The alpha-crystallin domain of HSP20 family proteins mediates
        direct binding to partially unfolded, misfolded, or aggregation-prone
        client proteins through recognition of exposed hydrophobic surface
        regions that are normally buried in properly folded structures
        (Sprague-Piercy et al. 2021, Mitra et al. 2022, Gu et al. 2023). This
        holdase activity -- binding non-native proteins to prevent their
        irreversible aggregation -- is the primary molecular function of sHSPs
        and is mediated by the conserved alpha-crystallin domain present in
        HSP20A (residues 47-155, InterPro IPR002068, Pfam PF00011). The CDD
        annotation ACD_sHsps-like (cd06464) on this protein further confirms the
        presence of a functional alpha-crystallin domain competent for substrate
        binding. sHSPs exhibit broad, promiscuous substrate specificity for
        non-native proteins rather than targeting specific individual clients.
        Since B7FXQ8 has no existing GOA annotations, this is a genuinely novel
        and well-supported prediction.
