        Three isozymes of lignostilbene-alpha,beta-dioxygenase (LSD) from Pseudomonas
suggested_questions:
- question: >-
    LSD-III already carries the correct specific IDA annotations (lignostilbene alpha,beta-dioxygenase
    activity; lignin catabolic process); should the contradictory TreeGrafter carotenoid terms
    (GO_REF:0000118) be removed, and the TreeGrafter rule corrected for the SCO branch of the CCO family?
