    supported_by:
      - reference_id: PMID:7763880
        supporting_text: >-
          Three isozymes of lignostilbene-alpha,beta-dioxygenase (LSD) from Pseudomonas
- term:
    id: GO:0050054
    label: lignostilbene alpha beta-dioxygenase activity
  evidence_type: IDA
  original_reference_id: PMID:7763880
  qualifier: enables
  review:
    summary: >-
      Direct experimental (IDA) annotation of lignostilbene alpha,beta-dioxygenase activity from the
      purification and enzymatic characterization of the three LSD isozymes. The core, correct molecular
      function of LSD-III.
    action: ACCEPT
    reason: >-
      Core catalytic function, directly demonstrated (EC 1.13.11.43). This is the specific term the
      TreeGrafter carotenoid annotations should never have overridden.
    supported_by:
      - reference_id: PMID:7763880
        supporting_text: >-
          Three isozymes of lignostilbene-alpha,beta-dioxygenase (LSD) from Pseudomonas
core_functions:
- description: >-
    Non-heme iron lignostilbene-alpha,beta-dioxygenase (EC 1.13.11.43): cleaves the interphenyl
    Calpha-Cbeta double bond of lignostilbene (1,2-bis(4-hydroxy-3-methoxyphenyl)ethylene) with O2 to
    yield two molecules of vanillin, in the catabolism of lignin-derived stilbenes. GO:0050054 is the
    exact, experimentally-supported MF term (a sibling of the resveratrol leaf GO:7770086 and a child of
    the proposed stilbene alpha,beta-dioxygenase grouping).
  molecular_function:
    id: GO:0050054
    label: lignostilbene alpha beta-dioxygenase activity
  directly_involved_in:
    - id: GO:0046274
      label: lignin catabolic process
  supported_by:
    - reference_id: PMID:7763880
