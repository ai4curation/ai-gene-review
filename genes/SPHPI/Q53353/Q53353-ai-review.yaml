core_functions:
- description: >-
    Non-heme iron lignostilbene-alpha,beta-dioxygenase (EC 1.13.11.43): cleaves the interphenyl
    Calpha-Cbeta double bond of lignostilbene with O2 to two molecules of vanillin, in lignin-derived
    stilbene catabolism. GO:0050054 is the exact, experimentally-supported MF term (a sibling of the
    resveratrol leaf GO:7770086 and a child of the proposed stilbene alpha,beta-dioxygenase grouping).
  molecular_function:
    id: GO:0050054
    label: lignostilbene alpha beta-dioxygenase activity
  directly_involved_in:
    - id: GO:0046274
      label: lignin catabolic process
  supported_by:
    - reference_id: PMID:7763880
      supporting_text: >-
        Three isozymes of lignostilbene-alpha,beta-dioxygenase (LSD) from Pseudomonas
suggested_questions:
- question: >-
    Like LSD-III, LSD-I carries the correct specific IDA annotations yet also the contradictory
    TreeGrafter carotenoid terms; should these be removed and the TreeGrafter rule corrected for the SCO
    branch of the CCO family?
