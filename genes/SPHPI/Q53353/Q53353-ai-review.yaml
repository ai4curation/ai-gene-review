  label: Sphingomonas paucimobilis
description: >-
  Q53353 (LSD-I) is lignostilbene-alpha,beta-dioxygenase isozyme I of Sphingomonas (Pseudomonas)
  paucimobilis TMY1009, one of the founding members of the stilbene cleavage oxygenase (SCO) /
  carotenoid cleavage oxygenase (CCO) superfamily and a companion isozyme to LSD-III (lsdB). It is a
  non-heme iron dioxygenase that cleaves the interphenyl (Calpha-Cbeta) double bond of lignostilbene
  (1,2-bis(4-hydroxy-3-methoxyphenyl)ethylene) with molecular oxygen to yield two molecules of vanillin
  (EC 1.13.11.43), acting in the catabolism of lignin-derived stilbenes. Despite automated annotations
  to the contrary, LSD-I is not a carotenoid cleavage enzyme.
existing_annotations:
- term:
    id: GO:0010436
    label: carotenoid dioxygenase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  qualifier: enables
  review:
    summary: >-
      Automated (IEA / TreeGrafter) carotenoid dioxygenase activity - wrong substrate class and directly
      contradicted by this gene's own experimental annotation to lignostilbene alpha,beta-dioxygenase
      activity (GO:0050054, IDA). A TreeGrafter over-propagation from the mixed CCO family.
    action: REMOVE
    reason: >-
      LSD-I is an experimentally characterized lignostilbene dioxygenase (EC 1.13.11.43), not a
      carotenoid enzyme; the correct specific MF (GO:0050054) is already present by IDA. Same
      substrate-class error as LSD-III, NOV1/NOV2, Rco1, and cao-1.
