core_functions:
  - description: Protein serine/threonine kinase that mediates rapid
      auxin-triggered phosphorylation signaling across the proteome,
      acting downstream of ABP1 and TMK1.
    supported_by:
      - reference_id: PMID:38128538
        supporting_text: >-
          RAF phosphorylation is strongly disturbed in both abp1 and tmk1
          mutants, whereas the phosphorylation patterns on RAF proteins in
          the afb1 mutant more closely resemble those in WT
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    directly_involved_in:
      - id: GO:0010928
        label: regulation of auxin mediated signaling pathway
    locations:
      - id: GO:0005737
        label: cytoplasm
  - description: Mediates rapid cellular response to auxin by controlling
      auxin-dependent acceleration of cytoplasmic streaming, likely through
      phosphorylation of myosin-binding proteins and actin-bundling proteins.
    supported_by:
      - reference_id: PMID:38128538
        supporting_text: >-
          The response to IAA in accelerating cytoplasmic streaming in
          Arabidopsis was fully restored by the introduction of RAF20-sYFP
          and RAF24-sYFP
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    directly_involved_in:
      - id: GO:0071365
        label: cellular response to auxin stimulus
    locations:
      - id: GO:0005737
        label: cytoplasm
  - description: Required for general growth and developmental processes
      including plant height, rosette area, root growth, and germination,
      acting redundantly with other B4 RAF-like kinases.
    supported_by:
      - reference_id: PMID:38128538
        supporting_text: >-
