  - id: PMID:16429265
    title: Genome-wide analysis and experimentation of plant serine/
      threonine/tyrosine-specific protein kinases.
    findings:
      - statement: RAF20 (STY14) was identified as part of a family of 57
          Arabidopsis protein kinases with tyrosine kinase motifs, classified
          as dual-specificity STY kinases.
        supporting_text: >-
          The Arabidopsis thaliana genome encodes 57 different protein kinases
          that have tyrosine kinase motifs
  - id: PMID:38128538
    title: RAF-like protein kinases mediate a deeply conserved, rapid auxin
      response.
    findings:
      - statement: RAF-like kinases are central mediators of rapid
          auxin-triggered phosphorylation that is conserved across land plants
          and algae.
        supporting_text: >-
          identified rapidly accelerated fibrosarcoma (RAF)-like protein
          kinases as central mediators of auxin-triggered phosphorylation
          across species
      - statement: B4 RAF-like kinases are hyperphosphorylated in response to
          auxin treatment across multiple plant and algal species.
        supporting_text: >-
          most of the B4 RAF-like kinases are hyperphosphorylated in response
          to auxin treatment across species
      - statement: Loss of RAF kinases causes growth and developmental defects
          in Arabidopsis including reduced plant height, rosette area, root
          growth, and germination.
        supporting_text: >-
          In Arabidopsis, we found a range of defects in plant height
          (Figures 5A, 5B, and S5A), rosette area (Figures 5C, 5D, and S5B),
          root growth (Figures 5E, 5F, S5C, and S5D), and germination
      - statement: RAF20-sYFP localizes broadly to membrane-associated and
          intracellular punctate structures in root tips.
        supporting_text: >-
          The fluorescent signals in these transgenic lines were broadly
          distributed to both membrane-associated and intracellular punctate
          structures
      - statement: RAF mutants lose 73% of auxin-triggered phosphosites and
          are insensitive to auxin-dependent cytoplasmic streaming.
        supporting_text: >-
          73% of the differential phosphosites in WT were lost in the
          Arabidopsis raf mutant
      - statement: RAF proteins do not have a major role in transcriptional
          auxin responses, indicating they act in a pathway distinct from the
          nuclear auxin pathway.
        supporting_text: >-
          analysis of individual auxin-regulated genes (Figures 6B and 6D)
          showed that mutants did not have an obvious defect in auxin-induced
          transcription
      - statement: RAF phosphorylation requires ABP1 and TMK1 but not AFB1
          as upstream components.
        supporting_text: >-
          RAF phosphorylation is strongly disturbed in both abp1 and tmk1
          mutants, whereas the phosphorylation patterns on RAF proteins in
          the afb1 mutant more closely resemble those in WT
      - statement: Complementation with individual RAF20 or RAF24 rescues
          growth phenotypes and cytoplasmic streaming response to auxin.
        supporting_text: >-
          The response to IAA in accelerating cytoplasmic streaming in
          Arabidopsis was fully restored by the introduction of RAF20-sYFP
          and RAF24-sYFP
