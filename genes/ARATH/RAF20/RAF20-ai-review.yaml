        label: response to auxin
    locations:
      - id: GO:0005737
        label: cytoplasm
suggested_questions:
  - question: What are the direct phosphorylation substrates of RAF20, and how
      do they differ from those of its paralog RAF24?
    experts:
      - Plant kinase biochemists
      - Phosphoproteomics researchers
  - question: How is RAF20 kinase activity regulated by ABP1 and TMK1 at the
      molecular level, and is there a direct physical interaction?
    experts:
      - Plant receptor signaling specialists
      - Protein-protein interaction researchers
  - question: What is the specific role of the PB1 domain in RAF20 function,
      and does it mediate oligomerization or interactions with other
      PB1-containing proteins?
    experts:
      - Structural biologists
      - Plant signaling domain specialists
  - question: Do individual RAF20 and RAF24 have distinct or fully redundant
      roles in auxin signaling, and what explains the retention of 7 paralogs
      in the Arabidopsis B4 clade?
    experts:
      - Plant evolutionary biologists
      - Gene duplication specialists
suggested_experiments:
  - hypothesis: RAF20 directly phosphorylates myosin-binding proteins MYOB1 and
      MYOB7 and actin-bundling protein VILLIN4 to control cytoplasmic streaming
    description: Perform in vitro kinase assays with purified recombinant RAF20
      kinase domain and candidate substrates (MYOB1, MYOB7, VILLIN4) identified
      from phosphoproteomics. Map phosphorylation sites using mass spectrometry
      and test phospho-mimetic and phospho-dead mutants of these substrates for
      effects on cytoplasmic streaming velocity in vivo.
  - hypothesis: RAF20 activation requires direct phosphorylation by TMK1
      receptor kinase upon auxin perception by ABP1
    description: Test for direct physical interaction between RAF20 and TMK1
      using co-immunoprecipitation and bimolecular fluorescence complementation
      in planta. Perform in vitro kinase assays with TMK1 kinase domain and
      RAF20 to determine if TMK1 can directly phosphorylate RAF20. Generate
      phospho-site mutants at key RAF20 phosphorylation sites and test for
      complementation of raf mutant phenotypes.
  - hypothesis: The PB1 domain mediates RAF20 self-oligomerization and is
      required for its punctate localization pattern and kinase activity
    description: Generate PB1 domain deletion and point mutant variants of
      RAF20-sYFP and express under the native promoter in raf mutant background.
      Assess localization pattern changes, complementation of growth phenotypes,
      and auxin-triggered phosphorylation responses. Test PB1-mediated
      oligomerization using co-immunoprecipitation and size exclusion
      chromatography with purified protein.
