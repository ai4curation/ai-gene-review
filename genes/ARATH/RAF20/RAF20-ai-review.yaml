id: Q9SAJ2
gene_symbol: RAF20
product_type: PROTEIN
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  RAF20 (RAF-like serine/threonine-protein kinase 20, also known as STY14) is a
  member of the B4 clade of RAF-like kinases in Arabidopsis thaliana. It acts,
  together with its paralog RAF24, as a central mediator of a rapid,
  phosphorylation-based auxin response pathway that is deeply conserved across
  land plants and streptophyte algae. RAF20 is activated by auxin via rapid
  phosphorylation downstream of ABP1 and TMK1 signaling, and mediates
  proteome-wide hyperphosphorylation within seconds of auxin perception. This
  fast phosphorylation response is mechanistically distinct from the slower
  nuclear auxin pathway (NAP) that controls gene expression. RAF20 contains
  a PB1 oligomerization domain and a C-terminal protein kinase domain. The
  protein localizes to the cytoplasm, broadly distributed to both
  membrane-associated and intracellular punctate structures. Loss of B4 RAF-like
  kinases causes growth and developmental defects in plant height, rosette area,
  root growth, and germination, reduced root sensitivity to auxin-mediated growth
  inhibition, drastic reduction of auxin-triggered hyperphosphorylated proteins,
  and insensitivity to the promoting effect of auxin on cytoplasmic streaming.
  Transcriptional auxin responses are not impaired in raf mutants, indicating
  RAF20 operates in a pathway distinct from the NAP.
