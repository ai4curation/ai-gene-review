- term:
    id: GO:0003684
    label: damaged DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Electronic annotation based on InterPro domain matches (XPC-binding domain). RAD23 family
      members contain an XPC-binding domain that mediates interaction with RAD4/XPC rather than
      directly binding damaged DNA. The damaged DNA binding activity is a property of the
      RAD4-RAD23 complex rather than RAD23 alone.
    action: MODIFY
    reason: >-
      RAD23C contains an XPC-binding domain but does not itself bind damaged DNA. Rather, it
      interacts with RAD4/XPC which is the actual damaged DNA recognition factor. The annotation
      conflates the domain match with the function of the complex partner.
