id: Q84L31
gene_symbol: RAD23C
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  RAD23C (AtRAD23c) is a ubiquitin receptor belonging to the RAD23 family of UBL/UBA domain-containing
  proteins in Arabidopsis thaliana. It functions as a shuttle factor that binds polyubiquitinated substrates
  via its two UBA domains (preferring Lys-48-linked chains) and delivers them to the 26S proteasome via
  interaction with the proteasomal subunit RPN10 through its N-terminal ubiquitin-like (UBL) domain.
  RAD23C is one of four RAD23 family members (RAD23A-D) in Arabidopsis that provide an essential and
  partially redundant connection between ubiquitinated proteins and proteasome-mediated degradation.
  RAD23C also contributes to UV tolerance in a dark-specific manner, consistent with a role in
  nucleotide excision repair, where it likely interacts with RAD4/XPC for DNA damage recognition.
  The protein localizes to both nucleus and cytoplasm.
