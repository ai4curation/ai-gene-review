- term:
    id: GO:0006289
    label: nucleotide-excision repair
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Electronic annotation based on InterPro RAD23 family membership. RAD23 proteins are
      historically named for their role in NER (radiation sensitivity). In Arabidopsis,
      rad23c mutants show dark-specific UV sensitivity consistent with NER involvement,
      and RAD23B interacts with RAD4/XPC. However, direct evidence for RAD23C in NER
      is limited to the UV sensitivity phenotype.
    action: KEEP_AS_NON_CORE
    reason: >-
      While RAD23C contributes to UV tolerance (PMID:29283431), its primary characterized
      function is as a ubiquitin shuttle factor for proteasomal degradation. The NER role
      may be secondary or indirect (e.g., through stabilization of RAD4 or delivery of
      NER factors). Direct demonstration of RAD23C in the NER pathway is lacking.
    supported_by:
