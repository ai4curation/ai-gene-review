      supporting_text: "The nuclear-enriched RAD23 proteins bind Ub conjugates, especially those linked internally through Lys-48, via their UBA domains, and associate with the 26S proteasome Ub receptor RPN10 via their N-terminal UBL domains."

- term:
    id: GO:0043161
    label: proteasome-mediated ubiquitin-dependent protein catabolic process
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of involvement in proteasome-mediated ubiquitin-dependent protein
      catabolism. This is strongly supported by direct experimental evidence showing RAD23C
      binds polyubiquitin chains and associates with the 26S proteasome via RPN10, functioning
      as a ubiquitin receptor that delivers substrates for proteasomal degradation.
    action: ACCEPT
    reason: >-
      Core function of RAD23C is well established experimentally. RAD23C shuttles ubiquitinated
      substrates to the proteasome, and higher-order rad23 mutant combinations cause severe
      developmental defects due to impaired UPS function.
    supported_by:
    - reference_id: PMID:20086187
      supporting_text: "RAD23 proteins appear to play an essential role in the cell cycle, morphology, and fertility of plants through their delivery of UPS substrates to the 26S proteasome."

