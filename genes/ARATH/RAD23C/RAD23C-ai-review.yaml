- id: PMID:20059542
  title: >-
    Cross-species divergence of the major recognition pathways of ubiquitylated
    substrates for ubiquitin/26S proteasome-mediated proteolysis.
  findings:
  - statement: >-
      RAD23 and DSK2 homologs serve as major indirect ubiquitin receptors that shuttle
      ubiquitinated substrates to the proteasome, with cross-species divergence in the
      recognition pathways.
    supporting_text: "For indirect recognition, the RAD23 and DSK2 homologs (except for the human DSK2 homolog) are major receptors."
  - statement: >-
      In Arabidopsis, the proteasomal subunit RPN10 is the sole critical factor for both
      direct and indirect recognition of ubiquitinated substrates, using distinct UIMs to
      bind RAD23 and DSK2.
    supporting_text: "Arabidopsis uses UIM1 and UIM3 of RPN10 to bind DSK2 and RAD23, respectively."
  - statement: >-
      RPN10 is uniquely important in Arabidopsis for both direct ubiquitin chain recognition
      and indirect recognition via RAD23/DSK2 shuttle factors.
    supporting_text: "a single proteasome subunit, RPN10, is critical for both the direct and indirect recognition pathways in Arabidopsis."
- id: PMID:20086187
  title: >-
    The RAD23 family provides an essential connection between the 26S proteasome
    and ubiquitylated proteins in Arabidopsis.
  findings:
  - statement: >-
      The RAD23 family in Arabidopsis consists of four UBL/UBA proteins that shuttle
      ubiquitinated substrates to the 26S proteasome.
    supporting_text: "Here, we describe the collection of UBL/UBA proteins in Arabidopsis thaliana, including four isoforms that comprise the RADIATION SENSITIVE23 (RAD23) family."
  - statement: >-
      RAD23 proteins bind ubiquitin conjugates (preferring Lys-48 linked chains) via
      UBA domains and associate with the proteasome via RPN10 through UBL domains.
    supporting_text: "The nuclear-enriched RAD23 proteins bind Ub conjugates, especially those linked internally through Lys-48, via their UBA domains, and associate with the 26S proteasome Ub receptor RPN10 via their N-terminal UBL domains."
  - statement: >-
      Single rad23c mutants show no visible phenotype, but higher-order combinations
      cause severe developmental defects including reproductive lethality in the
      quadruple mutant.
    supporting_text: "Whereas homozygous mutants individually affecting the four RAD23 genes are without phenotypic consequences (rad23a, rad23c, and rad23d) or induce mild phyllotaxy and sterility defects (rad23b), higher-order mutant combinations generate severely dwarfed plants, with the quadruple mutant displaying reproductive lethality."
  - statement: >-
      RAD23 proteins play essential roles in cell cycle, morphology, and fertility
      through delivery of UPS substrates to the proteasome.
    supporting_text: "RAD23 proteins appear to play an essential role in the cell cycle, morphology, and fertility of plants through their delivery of UPS substrates to the 26S proteasome."
- id: PMID:21764993
  title: >-
    The defective proteasome but not substrate recognition function is responsible
    for the null phenotypes of the Arabidopsis proteasome subunit RPN10.
  findings:
  - statement: >-
      RAD23 and DSK2 family members display strong affinities for Lys-48-linked
      ubiquitin chains, the major signals for proteasomal degradation.
    supporting_text: "RPN10 and members of the UBL-UBA-containing RAD23 and DSK2 families displayed strong affinities for Lys-48-linked ubiquitin chains (the major UPP signals), indicating that they are involved in ubiquitylated substrate recognition."
  - statement: >-
      RPN10 uses distinct interfaces as primary proteasomal docking sites for
      RAD23 and DSK2 families.
    supporting_text: "Additionally, RPN10 uses distinct interfaces as primary proteasomal docking sites for RAD23s and DSK2s."
  - statement: >-
      Redundant recognition pathways exist in Arabidopsis for targeting ubiquitinated
      substrates to the proteasome.
    supporting_text: "Our results suggest that redundant recognition pathways likely are used in Arabidopsis to target ubiquitylated substrates for proteasomal degradation and that their specific roles in vivo require further examination."
- id: PMID:25293756
  title: A proteomic strategy for global analysis of plant protein complexes.
  findings:
  - statement: >-
      RAD23C was detected in the cytosolic fraction of Arabidopsis leaves by
      size exclusion chromatography coupled with LC-MS/MS proteomics.
    supporting_text: "Applying this approach to the crude cytosolic fraction of Arabidopsis thaliana leaves using size exclusion chromatography, we identified hundreds of cytosolic proteins that appeared to exist as components of stable protein complexes."
- id: PMID:28887381
  title: >-
    Global Analysis of Membrane-associated Protein Oligomerization Using Protein
    Correlation Profiling.
  findings:
  - statement: >-
      Proteomic profiling detected RAD23C in both cytosolic and potentially
      membrane-associated fractions of Arabidopsis leaves.
    supporting_text: "Over 150 proteins had a complicated localization pattern, and were clearly partitioned between cytosolic and membrane-associated pools."
- id: PMID:29283431
  title: RAD4 and RAD23/HMR Contribute to Arabidopsis UV Tolerance.
  findings:
  - statement: >-
      The rad23c mutant exhibits increased UV sensitivity specifically in dark-grown
      hypocotyls, consistent with a role in nucleotide excision repair.
    supporting_text: "The mutant rad23c was sensitive in dark-grown hypocotyls only"
  - statement: >-
      RAD23 family members and the RAD23-like protein HEMERA contribute to Arabidopsis
      UV tolerance, with all tested rad23 single mutants showing dark-specific UV
      sensitivity.
    supporting_text: "We found that hmr and rad23a,b,c all exhibit dark-specific UV sensitivity, consistent with roles for both HMR and the RAD23s in Arabidopsis nucleotide excision repair."
  - statement: >-
      RAD4/XPC interacts with RAD23B in yeast two-hybrid assays, supporting the
      conserved RAD4-RAD23 complex formation for DNA damage recognition.
    supporting_text: "the RAD23 pGADT7 and RAD4 pGBKT7 constructs did not result in growth alone, but did together, indicating an interaction"

