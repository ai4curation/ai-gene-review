    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      Phylogenetic inference of cytosol localization based on ortholog data. Direct experimental
      evidence (IDA) from Farmer et al. 2010 shows RAD23C localizes to the cytoplasm (GO:0005737),
      and proteomic studies (HDA) detected it in the cytosol fraction. Cytosol is a reasonable
      more specific subcompartment of cytoplasm.
    action: ACCEPT
    reason: >-
      Consistent with direct experimental evidence from IDA and HDA studies showing cytoplasmic/cytosolic
      localization of RAD23C.
    supported_by:
