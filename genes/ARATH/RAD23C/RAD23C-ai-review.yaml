suggested_questions:
- question: >-
    Does RAD23C directly interact with RAD4/XPC, as demonstrated for RAD23B, or does
    it contribute to NER through an alternative mechanism such as stabilization of other
    NER factors via the UPS?
- question: >-
    What is the specific in vivo substrate repertoire that RAD23C delivers to the 26S
    proteasome, and does it differ from the substrates recognized by RAD23A, RAD23B,
    and RAD23D?
- question: >-
    Why does the rad23c single mutant specifically show UV sensitivity in hypocotyls
    but not roots, while rad23a and rad23b show different tissue-specific patterns?
    Does this reflect tissue-specific expression or functional specialization?
- question: >-
    What is the functional significance of the two alternative splice isoforms
    (alpha and beta) of RAD23C, given that isoform beta lacks part of the UBL domain?

suggested_experiments:
- description: >-
    Perform co-immunoprecipitation or pull-down assays to test whether RAD23C directly
    interacts with RAD4/XPC, as has been shown for RAD23B by yeast two-hybrid analysis.
- description: >-
    Generate tissue-specific promoter-reporter constructs to map the expression pattern
    of RAD23C across different tissues and developmental stages, to explain the
    hypocotyl-specific UV sensitivity phenotype.
- description: >-
    Use ubiquitin-affinity proteomics comparing wild-type and rad23c mutant plants to
    identify specific ubiquitinated substrates that accumulate in the absence of RAD23C.
- description: >-
    Create double and triple mutant combinations of rad23c with rad23a, rad23b, and
    rad23d to assess the degree of functional redundancy specifically for UV tolerance,
    complementing the existing developmental phenotype analysis.
