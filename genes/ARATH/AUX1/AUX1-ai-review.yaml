core_functions:
- description: >-
    High-affinity, proton-coupled auxin (IAA) influx transporter that imports the
    auxin hormone across the plasma membrane, the founding biochemical activity
    of the AUX1/LAX family.
  molecular_function:
    id: GO:0010328
    label: auxin influx transmembrane transporter activity
  directly_involved_in:
  - id: GO:0060919
    label: auxin import into cell
  - id: GO:0009926
    label: auxin polar transport
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:16677815
    supporting_text: Upon expression of AUX1 in Xenopus oocytes, saturable,
      pH-dependent uptake of 3H-IAA was measured.
  - reference_id: PMID:18614710
    supporting_text: we determine a K(d) of 2.6 mum, comparable with estimates for
      the K(m) for IAA transport.
- description: >-
    By importing auxin into specific root apical cells (protophloem, columella,
    lateral root cap, epidermis), AUX1 establishes the auxin gradients that drive
    root gravitropism; aux1 mutants are agravitropic and auxin-resistant.
  molecular_function:
    id: GO:0010328
    label: auxin influx transmembrane transporter activity
  directly_involved_in:
  - id: GO:0009958
    label: positive gravitropism
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:8688077
    supporting_text: Mutations within the AUX1 gene confer an auxin-resistant root
      growth phenotype and abolish root gravitropic curvature.
  - reference_id: PMID:11641271
    supporting_text: AUX1 is necessary for root gravitropism by facilitating
      basipetal auxin transport to distal elongation zone tissues.
proposed_new_terms:
- proposed_name: auxin:proton symporter activity
  proposed_definition: Enables the transfer of auxin (indole-3-acetic acid) from
    one side of a membrane to the other, coupled to the transport of a proton in
    the same direction, driven by the transmembrane proton-motive force.
  proposed_parent:
    id: GO:0015293
    label: symporter activity
  justification: AUX1 mediates proton-driven, pH-dependent auxin uptake and AUX/LAX
    proteins act as IAA-H+ symporters; a substrate-specific symporter term would
    capture both the mechanism (proton coupling) and the substrate (auxin), which
    neither GO:0010328 (substrate-specific, mechanism-agnostic) nor GO:0015293
    (mechanism only) fully expresses.
  supported_by:
  - reference_id: PMID:18614710
    supporting_text: Members of the AUX/LAX family of membrane transporters,
      conserved in all higher plant species, are believed to act as IAA-H +
      symporters.
suggested_questions:
- Does AUX1 transport any amino acids or other AAAP-family substrates in addition
  to IAA, or is its substrate specificity restricted to auxins in planta?
- What structural features (from the recent cryo-EM structures) determine proton
  coupling and the asymmetric (polar) plasma membrane localization of AUX1 in
  protophloem cells?
