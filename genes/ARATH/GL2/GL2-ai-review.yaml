suggested_questions:
- question: Should GL2 lipid-binding annotations from START-domain InterPro mapping remain in GOA without direct Arabidopsis ligand evidence?
- question: Can GL2 target-gene annotations be split between root epidermis, trichome, seed coat mucilage, and secondary-wall contexts?
suggested_experiments:
- description: Use GL2 DNA-binding-domain and START-domain variants in complementation assays with ChIP-qPCR/RNA-seq to distinguish direct transcriptional targets from domain-dependent protein stability effects.
