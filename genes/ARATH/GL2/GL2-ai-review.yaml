description: 'GLABRA2 (GL2/ATHB10) is an Arabidopsis class IV HD-ZIP transcription factor that acts in the nucleus downstream of MBW epidermal fate complexes. GL2 binds cis-regulatory DNA through its homeodomain and regulates epidermal cell identity: it promotes non-root-hair/atrichoblast and trichome differentiation programs while repressing root-hair-promoting bHLH genes in non-hair cells. Seed oil, mucilage, anthocyanin, and other developmental effects are downstream outputs of this transcriptional regulator.'
