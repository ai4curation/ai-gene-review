references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: InterPro domain mappings support conserved molecular features but can over-project broad DNA/lipid/dimerization functions without Arabidopsis-specific evidence.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: UniProt subcellular-location mappings provide conservative localization support when consistent with transcription-factor biology.
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on on inter-ontology links
  findings:
  - statement: Logical inference supplies broad transcriptional-regulation process annotations from molecular function terms; these should often be narrowed to the gene-specific regulatory context.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA machine-learning annotations should be treated as broad predictions and retained only where consistent with experimental Arabidopsis evidence.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: AtSubP prediction supports localization hypotheses but is weaker than direct localization experiments.
- id: PMID:11118137
  title: 'Arabidopsis transcription factors: genome-wide comparative analysis among eukaryotes.'
  findings: []
- id: PMID:11844112
  title: Entopically additive expression of GLABRA2 alters the frequency and spacing of trichome initiation.
  findings:
  - statement: Ectopic GL2 expression alters trichome initiation frequency and spacing.
- id: PMID:16581911
  title: Transcriptional and posttranscriptional regulation of transcription factor expression in Arabidopsis roots.
  findings: []
- id: PMID:25533953
  title: An Arabidopsis gene regulatory network for secondary cell wall synthesis.
  findings:
  - statement: A yeast-one-hybrid network detected GL2 binding to secondary-cell-wall gene promoters; this supports cis-regulatory binding but is not central epidermal GL2 biology.
- id: PMID:26486447
  title: GLABRA2 Directly Suppresses Basic Helix-Loop-Helix Transcription Factor Genes with Diverse Functions in Root Hair Development.
  findings:
  - statement: GL2 directly suppresses root-hair-promoting bHLH transcription factor genes through promoter binding.
- id: PMID:28526410
  title: Adaptor proteins GIR1 and GIR2. I. Interaction with the repressor GLABRA2 and regulation of root hair development.
  findings:
  - statement: GIR1/GIR2 interact with GL2 and GL2 localizes to the nucleus in root hair regulatory assays.
- id: PMID:7926739
  title: The GLABRA2 gene encodes a homeo domain protein required for normal trichome development in Arabidopsis.
  findings:
  - statement: GL2 encodes a homeodomain protein required for normal trichome development.
- id: PMID:8620852
  title: The homeobox gene GLABRA2 is required for position-dependent cell differentiation in the root epidermis of Arabidopsis thaliana.
  findings:
  - statement: GL2 is required for position-dependent root epidermal cell differentiation and represses root hair fate in non-hair cells.
- id: file:ARATH/GL2/GL2-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis GL2
  findings:
  - statement: GL2 is a class IV HD-ZIP transcription factor downstream of MBW complexes and a central regulator of trichome, root non-hair, and seed coat epidermal cell fates.
  - statement: GL2 recognizes L1 box-like cis-elements in target promoters and acts in the nucleus as a DNA-binding transcriptional regulator.
- id: file:ARATH/GL2/GL2-uniprot.txt
  title: UniProt record for Arabidopsis GL2
  findings:
  - statement: UniProt identifies GL2/P46607 as a class IV HD-ZIP homeobox transcription factor required for trichome maturation, trichome initiation spacing, and negative regulation of root hair development.
- id: file:interpro/panther/PTHR45654/PTHR45654-entries.csv
  title: PANTHER PTHR45654 family entries for Arabidopsis GL2
  findings:
  - statement: PTHR45654 places GL2 in the homeobox-leucine zipper protein family, supporting conserved HD-ZIP DNA-binding transcription factor activity while leaving GL2-specific epidermal functions to Arabidopsis evidence.
