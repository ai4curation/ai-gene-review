proposed_new_terms:
- proposed_name: superoxide-generating NAD(P)H oxidase activity
  proposed_definition: Catalysis of the reaction NAD(P)H + O2 = NAD(P)+ + superoxide
    (O2-), as performed by the plasma-membrane RBOH/NOX enzymes that produce the
    apoplastic oxidative burst.
  proposed_parent:
    id: GO:0050664
    label: oxidoreductase activity, acting on NAD(P)H, oxygen as acceptor
  justification: GO:0016175 already exists in GO (verified via OLS) and is the
    accurate catalytic term for RBOHD; listed here to flag it as the preferred
    molecular function replacing GO:0016174 (H2O2-forming) for RBOH-family
    superoxide generators.
  supported_by:
  - reference_id: PMID:11756663
    supporting_text: O is the first ROI produced
suggested_questions:
- Which kinase (BIK1, SIK1, CPKs, LecRK-IX.2) phosphorylation events are necessary
  versus sufficient for RBOHD activation in vivo, and how do they integrate with
  EF-hand calcium binding?
- To what extent is RBOHD a hub for the systemic ROS wave, and what determines
  cell-to-cell propagation of its activation across tissues?
- How do the recently described negative-regulatory and turnover mechanisms (PB1CP-mediated
  BIK1 displacement and endocytosis, PBL13/PIRE-mediated ubiquitination/vacuolar
  degradation, and CBE1-mediated translational repression of RBOHD accumulation)
  quantitatively shape the amplitude and transience of the immune ROS burst?
