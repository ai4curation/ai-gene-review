id: Q9SG02
gene_symbol: RDR6
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: RDR6/SGS2/SDE1 is an Arabidopsis RNA-dependent RNA polymerase that converts selected single-stranded
  RNAs, especially aberrant or targeted transcripts, into double-stranded RNA substrates for DCL2/DCL4-dependent
  secondary siRNA production. It functions with SGS3/SDE5 in post-transcriptional gene silencing, trans-acting/phased
  siRNA biogenesis, virus-induced gene silencing spread, and transitive silencing. Developmental and reproductive
  phenotypes are downstream consequences of defective secondary-siRNA regulation rather than separate primary
  functions.
