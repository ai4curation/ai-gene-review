suggested_questions:
- question: Should GOA replace broad RNA-templated transcription/Rhea-derived polymerase annotations with
    RNA-directed RNA polymerase activity for plant RDR proteins?
- question: Is PANTHER transfer of nuclear RNA-directed RNA polymerase complex appropriate for Arabidopsis
    RDR6, or should curation prefer SGS3-associated silencing complex descriptions?
suggested_experiments:
- description: Quantify RDR6 template preference for polyadenylated versus aberrant/unpolyadenylated RNAs
    using endogenous Arabidopsis RDR6 complexes.
- description: Map endogenous RDR6 localization and activity across nuclear, SGS3 granule, and cytoplasmic
    fractions during ta-siRNA and antiviral silencing.
