  - term:
      id: GO:0042754
      label: negative regulation of circadian rhythm
    evidence_type: IMP
    original_reference_id: PMID:21499259
    review:
      summary: CCA1 is a transcriptional repressor of evening-phased clock genes
        (TOC1, ELF4, etc.), and this repressive activity within the interlocked
        feedback loop constitutes negative regulation of the circadian
        oscillator. The IMP source (PMID:21499259) directly shows CCA1/LHY
        suppress ELF4 expression at dawn, and overexpression (PMID:9657153)
        abolishes rhythms, both consistent with a negative regulatory role. This
        is a genuine but secondary characterization relative to CCA1's core
        "circadian rhythm" and DNA-binding transcription factor functions.
      action: KEEP_AS_NON_CORE
      reason: The original REMOVE rationale conflated "CCA1 is essential for the
        clock" with "CCA1 cannot negatively regulate the clock." These are not
        mutually exclusive. CCA1's mechanism is repression of evening clock
        genes, which is a form of negative regulation of the circadian rhythm.
        The IMP evidence (PMID:21499259) demonstrates CCA1/LHY directly suppress
        ELF4 at dawn, and constitutive CCA1 overexpression abolishes rhythms
        (PMID:9657153). The annotation is therefore correct and should be
        retained, but marked non-core because CCA1's core characterization is as
        a sequence-specific DNA-binding transcription factor in the core
        oscillator (GO:0007623) rather than the directional regulation term.
      supported_by:
        - reference_id: PMID:21499259
          supporting_text: the circadian-controlled CCA1 and LHY proteins
            directly suppress ELF4 expression periodically at dawn through
            physical interactions with these transcription-promoting factors
        - reference_id: PMID:9657153
          supporting_text: Constitutive expression of CCA1 protein in transgenic
            plants abolished the circadian rhythm of several genes
