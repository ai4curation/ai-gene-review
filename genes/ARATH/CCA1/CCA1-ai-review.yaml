proposed_new_terms:
  - proposed_name: circadian regulation of endoplasmic reticulum stress response
    proposed_definition: The process in which circadian clock components 
      modulate the unfolded protein response and ER stress recovery in a 
      time-dependent manner
    proposed_parent:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    justification: Falcon research indicates CCA1 is involved in the regulation 
      of endoplasmic reticulum (ER) stress responses. By modulating target genes
      involved in the unfolded protein response (UPR), CCA1 helps facilitate 
      recovery from ER stress, thereby coupling the circadian clock to cellular 
      proteostasis mechanisms
    supported_by:
      - reference_id: file:ARATH/CCA1/CCA1-falcon-research.md
        supporting_text: CCA1 is involved in the regulation of endoplasmic
          reticulum (ER) stress responses. By modulating target genes involved
          in the unfolded protein response (UPR), CCA1 helps facilitate recovery
          from ER stress
suggested_questions:
  - question: "How does CCA1 switch between repressor and activator activity at different Evening Element / CCA1-binding-site target promoters, and what corepressor versus coactivator complexes mediate each mode in vivo?"
  - question: "What are the in vivo functional consequences of CK2-mediated phosphorylation of CCA1 - does phosphorylation modulate DNA-binding affinity, dimerization, nuclear retention, or protein turnover, and does each role contribute independently to clock period determination?"
  - question: "How do CCA1 and LHY partition their target binding sites genome-wide under matched circadian time points, and which CCA1-specific (non-LHY) targets account for the residual short-period phenotype of cca1 single mutants?"
suggested_experiments:
  - description: "Time-resolved CCA1 ChIP-seq paired with nascent transcript profiling (e.g. PRO-seq or GRO-seq) under matched dawn time points in wild-type and cca1 lhy double mutants, with parallel rve8 mutant samples to map the EE-binding repressor (CCA1)/activator (RVE) balance genome-wide."
    hypothesis: "CCA1 occupancy is largely shared with LHY at EE/CBS motifs, but a defined subset of CCA1-specific or CCA1-preferred targets accounts for the residual short-period phenotype of cca1 single mutants."
    experiment_type: "ChIP-seq with nascent transcription profiling"
  - description: "CRISPR-engineered phosphosite mutants of CCA1 (CK2-target serines/threonines to alanine or aspartate) introduced at the endogenous locus, with parallel free-running clock phenotyping, leaf-movement assays, hypocotyl length, and CCA1 ChIP-seq to dissect which CK2 phosphorylations control which activities."
    hypothesis: "Distinct CK2 phosphorylation events on CCA1 separately tune DNA-binding affinity, dimerization with LHY, and turnover; combinatorial mutation phenocopies different CK2 perturbations."
    experiment_type: "CRISPR phosphosite editing with circadian phenotyping"
  - description: "Inducible (estradiol-driven) CCA1 expression in cca1 lhy double-mutant plants combined with single-cell RNA-seq at the shoot apex across the day, to define which CCA1-controlled gene modules recover with which CCA1 dose and timing."
    hypothesis: "Transient pulses of CCA1 at subjective dawn are sufficient to rescue most clock-output gene rhythms in cca1 lhy plants, with dose-dependent thresholds for separable output modules (cold response, nitrogen metabolism, flowering)."
    experiment_type: "Inducible complementation with single-cell RNA-seq"
status: DRAFT
