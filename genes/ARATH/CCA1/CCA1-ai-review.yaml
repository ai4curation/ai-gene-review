  - id: PMID:10535927
    title: The protein kinase CK2 is involved in regulation of circadian rhythms
      in Arabidopsis.
    findings:
      - statement: "Overexpression of the CK2 regulatory subunit CKB3 in Arabidopsis increases CK2 activity and shortens the period of CCA1/LHY rhythmic expression, demonstrating that CK2-mediated phosphorylation of CCA1 regulates clock period in vivo."
        supporting_text: "we show that plants overexpressing CKB3, a regulatory subunit of CK2, display increased CK2 activity and shorter periods of rhythmic expression of CCA1 and LHY."
        reference_section_type: ABSTRACT
      - statement: "Overexpression of CKB3 also shortens the periods of multiple circadian clock-controlled output genes with different phase angles, indicating that CK2-CCA1 phosphorylation affects diverse clock outputs."
        supporting_text: "overexpression of CKB3 shortened the periods of four known circadian clock-controlled genes with different phase angles, demonstrating that many clock outputs are affected."
        reference_section_type: ABSTRACT
  - id: PMID:11118137
    title: 'Arabidopsis transcription factors: genome-wide comparative analysis among
      eukaryotes.'
    findings:
      - statement: "Genome-wide Arabidopsis transcription factor catalog catalogues CCA1 as a sequence-specific DNA-binding MYB-related TF, providing the basis for ISS/TAS DNA-binding-TF and transcription-regulation annotations."
        supporting_text: "Arabidopsis dedicates over 5% of its genome to code for more than 1500 transcription factors, about 45% of which are from families specific to plants."
        reference_section_type: ABSTRACT
  - id: PMID:11486091
    title: Reciprocal regulation between TOC1 and LHY/CCA1 within the
      Arabidopsis circadian clock.
    findings:
      - statement: "LHY and CCA1 negatively regulate TOC1 expression; both proteins bind a region in the TOC1 promoter critical for its clock regulation, providing direct evidence for CCA1's cis-regulatory binding and negative regulation of an evening-phased clock gene."
        supporting_text: "The MYB transcription factors LHY and CCA1 negatively regulate TOC1 expression. We show that both proteins bind to a region in the TOC1 promoter that is critical for its clock regulation."
        reference_section_type: ABSTRACT
      - statement: "TOC1 participates in the positive regulation of LHY and CCA1 expression, completing the LHY/CCA1-TOC1 reciprocal feedback loop that is critical for clock function."
        supporting_text: "TOC1 appears to participate in the positive regulation of LHY and CCA1 expression. Our results indicate that these interactions form a loop critical for clock function in Arabidopsis."
        reference_section_type: ABSTRACT
  - id: PMID:14978263
    title: CK2 phosphorylation of CCA1 is necessary for its circadian oscillator
      function in Arabidopsis.
    findings:
      - statement: "CK2-mediated phosphorylation of CCA1 is required for normal circadian oscillator function in Arabidopsis; abrogating CK2-target phosphorylation sites compromises CCA1's clock function, supporting a regulated post-translational modification of CCA1 in the oscillator."
        supporting_text: "Phosphorylation of some of the central oscillator proteins is necessary for the generation of normal circadian rhythms"
        reference_section_type: ABSTRACT
  - id: PMID:18344319
    title: Systems approach identifies an organic nitrogen-responsive gene
      network that is regulated by the master clock control gene CCA1.
    findings:
      - statement: "Genome-wide network analysis identifies CCA1 as the central transcription factor regulating an organic-nitrogen-responsive gene network in Arabidopsis, linking the circadian clock to nitrogen metabolic gene expression."
        supporting_text: "Genes that responded to organic N"
        reference_section_type: ABSTRACT
  - id: PMID:19011118
    title: Circadian clock proteins LHY and CCA1 regulate SVP protein
      accumulation to control flowering in Arabidopsis.
    findings:
      - statement: "CCA1 (with LHY) represses the floral transition under both short-day and long-day photoperiods and accelerates flowering under continuous light, placing it upstream of photoperiodic flowering as a clock-output role."
        supporting_text: "the circadian clock proteins LATE ELONGATED HYPOCOTYL (LHY) and CIRCADIAN CLOCK-ASSOCIATED1 (CCA1) not only repressed the floral transition under short-day and long-day conditions but also accelerated flowering when the plants were grown under continuous light (LL)"
        reference_section_type: ABSTRACT
      - statement: "LHY/CCA1 regulate the FT-SVP module, modulating accumulation of the flowering repressor SVP and FT expression; this is a clock-output role rather than core oscillator function for CCA1."
        supporting_text: "Circadian clock proteins LHY and CCA1 regulate SVP protein accumulation to control flowering in Arabidopsis."
        reference_section_type: TITLE
  - id: PMID:19218364
    title: CIRCADIAN CLOCK ASSOCIATED1 and LATE ELONGATED HYPOCOTYL function
      synergistically in the circadian clock of Arabidopsis.
    findings:
      - statement: "CCA1 colocalizes with LHY in the nucleus and heterodimerizes with LHY both in vitro and in vivo, providing experimental EXP support for nuclear localization and a basis for CCA1/LHY dimerization activity."
        supporting_text: "they also colocalize in the nucleus and heterodimerize in vitro and in vivo"
        reference_section_type: ABSTRACT
      - statement: "Single cca1 and lhy mutants each show short-period rhythms, and the cca1 lhy double mutant has a still shorter period than either single, indicating only partial functional redundancy and synergistic CCA1/LHY action in the oscillator."
        supporting_text: "cca1 lhy double mutants show an even shorter period phenotype than the cca1 single mutant, suggesting that CCA1 and LHY are only partially functionally redundant"
        reference_section_type: ABSTRACT
      - statement: "CCA1 and LHY can form homodimers and are present in the same large (>400 kDa) nuclear complex in planta, supporting their assembly into a clock transcriptional module."
        supporting_text: "CCA1 and LHY can form homodimers, and they also colocalize in the nucleus and heterodimerize in vitro and in vivo"
        reference_section_type: RESULTS
  - id: PMID:20007447
    title: The role of casein kinase II in flowering time regulation has
      diversified during evolution.
    findings:
      - statement: "CCA1 is the relevant CK2 target in Arabidopsis influencing photoperiodic flowering; cross-species comparison shows that CK2's role in flowering time has diversified in evolution but the Arabidopsis CCA1-CK2 axis remains central."
        supporting_text: "The circadian clock component CIRCADIAN CLOCK ASSOCIATED1 (CCA1) is a CK2 target in Arabidopsis, where it influences photoperiodic flowering."
        reference_section_type: ABSTRACT
  - id: PMID:21471455
    title: Circadian clock-associated 1 and late elongated hypocotyl regulate
      expression of the C-repeat binding factor (CBF) pathway in Arabidopsis.
    findings:
      - statement: "CCA1 (with LHY) directly binds CBF1-3 promoters (presumably at EE/CBS motifs) and circadian-regulates the CBF cold-response regulon, contributing to plant freezing tolerance as a clock-output function."
        supporting_text: "this circadian regulation is caused by the direct action of CCA1 and LHY binding at the CBF1-3 locus—presumably at the EE, CBS, and related motifs"
        reference_section_type: RESULTS
      - statement: "The cca1-11/lhy-21 double mutant shows impaired freezing tolerance in both nonacclimated and cold-acclimated plants, demonstrating that CCA1 contributes to cold tolerance as a clock output (best framed as circadian regulation of cold response)."
        supporting_text: "the cca1-11/lhy-21 double mutation resulted in impaired freezing tolerance in both nonacclimated and cold-acclimated plants"
        reference_section_type: RESULTS
  - id: PMID:21499259
    title: Coordinated transcriptional regulation underlying the circadian clock
      in Arabidopsis.
    findings:
      - statement: "CCA1 (with LHY) directly suppresses ELF4 expression at dawn through physical interactions with the FHY3/FAR1/HY5 transcription-promoting factors at the ELF4 promoter, providing IMP support for negative regulation of circadian rhythm."
        supporting_text: "the circadian-controlled CCA1 and LHY proteins directly suppress ELF4 expression periodically at dawn through physical interactions with these transcription-promoting factors"
        reference_section_type: ABSTRACT
      - statement: "A coordinated set of light- and circadian-regulated transcription factors (FHY3, FAR1, HY5 activating; CCA1/LHY repressing) acts at the ELF4 promoter to generate its cyclic expression, providing a molecular link from light signaling to the central oscillator."
        supporting_text: "a set of light- and circadian-regulated transcription factors act directly and coordinately at the ELF4 promoter to regulate its cyclic expression"
        reference_section_type: ABSTRACT
  - id: PMID:23638299
    title: Accurate timekeeping is controlled by a cycling activator in
      Arabidopsis.
    findings:
      - statement: "REVEILLE8 (RVE8), a CCA1/LHY-related MYB protein, is a direct transcriptional activator of EE-containing clock and output genes; the prevailing model of the Arabidopsis clock as exclusively transcriptional repressors at the EE (where CCA1 acts) is revised to include this counter-balancing activator at the same cis-elements."
        supporting_text: "a related Myb-like protein, REVEILLE8 (RVE8), is a direct transcriptional activator of EE-containing clock and output genes."
        reference_section_type: ABSTRACT
      - statement: "Loss of RVE8 and close homologs reduces and delays evening-phased clock-gene transcripts and significantly lengthens clock period, providing context for CCA1-mediated repression versus RVE-mediated activation at shared EE promoters."
        supporting_text: "Loss of RVE8 and its close homologs causes a delay and reduction in levels of evening-phased clock gene transcripts and significant lengthening of clock pace."
        reference_section_type: ABSTRACT
  - id: PMID:25246594
    title: FBH1 affects warm temperature responses in the Arabidopsis circadian
      clock.
    findings:
      - statement: "FBH1 is identified as an additional regulator of the circadian clock affecting warm-temperature responses, providing the framework in which CCA1 is the dominant transcription factor for temperature compensation and warm-temperature timing."
        supporting_text: "an important feature of the clock is the ability to maintain a relatively constant period over a range of physiological temperatures; this ability is referred to as \"temperature compensation.\""
        reference_section_type: ABSTRACT
  - id: PMID:28790150
    title: 'Phosphorylation of Histone H2A at Serine 95: A Plant-Specific Mark Involved
      in Flowering Time Regulation and H2A.Z Deposition.'
    findings:
      - statement: "Arabidopsis MLK4 phosphorylates histone H2A on serine 95 (a plant-specific modification) and regulates flowering time and H2A.Z deposition; this chromatin layer interacts with the CCA1-regulated flowering network, providing context for CCA1-controlled gene expression."
        supporting_text: "Arabidopsis thaliana MUT9P-LIKE-KINASE (MLK4) phosphorylates histone H2A on serine 95, a plant-specific modification in the histone core domain. Mutations in MLK4 caused late flowering under long-day"
        reference_section_type: ABSTRACT
  - id: PMID:31948398
    title: Receptor kinase FERONIA regulates flowering time in Arabidopsis.
    findings:
      - statement: "FERONIA receptor kinase regulates flowering time in Arabidopsis, providing additional regulatory input into the photoperiodic flowering pathway in which CCA1 acts as a clock-derived modulator."
        reference_section_type: ABSTRACT
  - id: PMID:9144958
    title: A Myb-related transcription factor is involved in the phytochrome
      regulation of an Arabidopsis Lhcb gene.
    findings:
      - statement: "Original cloning of CCA1 as a MYB-related transcription factor that binds the Lhcb1*3 (CAB) promoter at the imperfect repeats AAA/CAATCT and is required for phytochrome-induced Lhcb1*3 expression; first identification of CCA1 as a sequence-specific cis-regulatory region binder."
        supporting_text: "We have isolated the gene for a protein designated CCA1. This protein can bind to a region of the promoter of an Arabidopsis light-harvesting chlorophyll a/b protein gene, Lhcb1*3, which is necessary for its regulation by phytochrome."
        reference_section_type: ABSTRACT
      - statement: "The MYB-related N-terminal repeat of CCA1 is required for binding to the Lhcb1*3 promoter; antisense lines reduce phytochrome induction of Lhcb1*3 specifically, establishing CCA1 as a specific transcriptional activator of Lhcb1*3 in response to red light."
        supporting_text: "the CCA1 protein acts as a specific activator of Lhcb1*3 transcription in response to brief red illumination."
        reference_section_type: ABSTRACT
  - id: PMID:9657153
    title: Constitutive expression of the CIRCADIAN CLOCK ASSOCIATED 1 (CCA1)
      gene disrupts circadian rhythms and suppresses its own expression.
    findings:
      - statement: "Constitutive overexpression of CCA1 abolishes the circadian rhythms of multiple clock-output genes with different phases, causes longer hypocotyls and delayed flowering, and suppresses endogenous CCA1 and LHY expression, establishing CCA1 as part of a feedback loop closely associated with the central oscillator."
        supporting_text: "Constitutive expression of CCA1 protein in transgenic plants abolished the circadian rhythm of several genes with dramatically different phases. These plants also had longer hypocotyls and delayed flowering"
        reference_section_type: ABSTRACT
      - statement: "Endogenous CCA1 and LHY are suppressed by constitutive CCA1, indicating CCA1 autorepression and cross-repression of LHY through a negative feedback loop in the oscillator."
        supporting_text: "the expression of both endogenous CCA1 and the related LHY gene was suppressed."
        reference_section_type: ABSTRACT
  - id: PMID:9724822
    title: Protein kinase CK2 interacts with and phosphorylates the Arabidopsis
      circadian clock-associated 1 protein.
    findings:
      - statement: "CK2 regulatory beta subunit CKB3 was identified as a CCA1 interactor in yeast two-hybrid, and recombinant CK2 phosphorylates CCA1 in vitro; this defines the CK2-CCA1 phosphorylation axis."
        supporting_text: "CKB3 interacts specifically with CCA1 both in a yeast two-hybrid system and in an in vitro interaction assay."
        reference_section_type: ABSTRACT
      - statement: "CK2 beta-subunits stimulate CCA1 binding to the CCA1-binding site on the Lhcb1*3 promoter, indicating that CK2 modulates CCA1's DNA-binding activity in addition to its overall activity."
        supporting_text: "CK2 beta-subunits stimulate binding of CCA1 to the CCA1 binding site on the Lhcb1*3 gene promoter, and recombinant CK2 is able to phosphorylate CCA1 in vitro."
        reference_section_type: ABSTRACT
  - id: file:ARATH/CCA1/CCA1-falcon-research.md
    title: FutureHouse Falcon research report on Arabidopsis CCA1 (UniProt P92973)
    findings:
      - statement: "CCA1 acts as a master regulator within the circadian clock, binding promoter regions of key clock genes to repress or promote transcription, and forming homodimers and heterodimers (particularly with LHY) critical for efficient target binding."
        supporting_text: "CCA1 acts as a master regulator within the circadian clock. CCA1 binds to promoter regions of key clock genes to either repress or promote transcription"
      - statement: "CCA1 contributes to regulation of the endoplasmic-reticulum (ER) stress response and the unfolded protein response (UPR), suggesting a clock-output role in proteostasis."
        supporting_text: "CCA1 is involved in the regulation of endoplasmic reticulum (ER) stress responses. By modulating target genes involved in the unfolded protein response (UPR), CCA1 helps facilitate recovery from ER stress"
  - id: file:ARATH/CCA1/CCA1-deep-research-falcon.md
    title: Falcon (Edison Scientific) deep research report on Arabidopsis CCA1
      (UniProt P92973)
    findings:
      - statement: CCA1 is a dawn-phased MYB/SANT-domain DNA-binding transcription
          factor of the core circadian oscillator that acts largely as a repressor
          of evening-phased clock genes and as a dual regulator of selected outputs.
        reference_section_type: OTHER
        supporting_text: |-
          CIRCADIAN CLOCK ASSOCIATED 1 (CCA1; At2g46830; UniProt P92973) is a dawn-phased, MYB/SANT-domain DNA-binding transcription factor that functions in the **core transcription–translation feedback loops (TTFLs)** of the Arabidopsis circadian oscillator, acting largely as a repressor of evening-phased clock genes while also serving as an activator or dual regulator for selected outputs
      - statement: CCA1's primary molecular role is sequence-specific
          transcriptional regulation through promoter binding, not catalysis or
          transport.
        reference_section_type: OTHER
        supporting_text: |-
          CCA1’s primary molecular role is **sequence-specific transcriptional regulation** through promoter binding, rather than catalysis or transport.
      - statement: CCA1 binds canonical promoter motifs, most prominently the
          Evening Element (EE) and the CCA1-binding site (CBS), to regulate target
          gene expression.
        reference_section_type: OTHER
        supporting_text: |-
          binds to canonical promoter motifs—most prominently the **Evening Element (EE)** and the **CCA1-binding site (CBS)**—to regulate target gene expression.
      - statement: Functional evidence places CCA1 in the nucleus, where it binds
          promoters and is assayed by ChIP/ChIP-seq.
        reference_section_type: OTHER
        supporting_text: |-
          Functional evidence places CCA1 in the **nucleus**, where it binds promoters and is assayed by ChIP/ChIP-seq.
      - statement: CCA1 peaks near dawn and, with LHY, forms the morning loop of
          the oscillator, repressing evening-phased genes such as TOC1 in
          interlocked feedback.
        reference_section_type: OTHER
        supporting_text: |-
          CCA1 peaks near **dawn** and, together with LHY, forms the **morning loop** of the Arabidopsis circadian oscillator.
      - statement: CCA1/LHY are essential for robust circadian rhythms; cca1 lhy
          double mutants show severe rhythmic disruption with low amplitude.
        reference_section_type: OTHER
        supporting_text: |-
          CCA1/LHY are essential for robust circadian rhythms: single mutants often shorten period, while cca1 lhy double mutants show severe disruption/low amplitude.
      - statement: CCA1's strongest functional partner is LHY; they act redundantly
          and form heterodimers in vivo.
        reference_section_type: OTHER
        supporting_text: |-
          Strongest functional partner is **LHY**; CCA1 and LHY can act redundantly and also form heterodimers in vivo.
      - statement: Up to ~30% of the transcriptome is clock-controlled under
          constant conditions and up to 90% with light/temperature cues, indicating
          the broad downstream impact of core clock TFs such as CCA1.
        reference_section_type: OTHER
        supporting_text: |-
          A 2024 review notes that under constant conditions ~**30%** of the transcriptome can be clock-controlled, and with light/temperature cues this can reach **up to 90%**, illustrating the potentially broad downstream impact of core clock TFs such as CCA1.
