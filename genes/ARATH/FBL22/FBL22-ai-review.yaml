    complex, recruiting specific (unknown) substrates for ubiquitination and
    proteasomal degradation via its LRR domain. No direct experimental evidence
    exists; PE level 4 (Predicted). Transcript is NO-upregulated in Cd-stressed
    roots, suggesting possible involvement in stress-responsive proteolysis.
