core_functions:
- description: >-
    Predicted SCF-complex-binding F-box/LRR adaptor-like protein. The conserved
    F-box domain supports binding to the SKP1/SCF core, while the LRR region is
    a plausible substrate-recognition interface. No direct experimental evidence
    identifies FBL22 substrates, SCF partners, complex membership, localization,
    or mutant phenotypes; PE level 4 (Predicted). Transcript is NO-upregulated
    in Cd-stressed roots, suggesting a hypothesis of stress-responsive
    proteolysis that remains untested.
  molecular_function:
    id: GO:1905761
    label: SCF ubiquitin ligase complex binding
  supported_by:
