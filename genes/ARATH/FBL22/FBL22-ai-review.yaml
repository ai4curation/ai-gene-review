gene_symbol: FBL22
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  FBL22 (F-box/LRR-repeat protein 22) is a putative substrate-recognition subunit
  of an SCF (SKP1-CUL1-RBX1-F-box) E3 ubiquitin ligase complex in Arabidopsis
  thaliana. The protein contains an N-terminal F-box domain (aa 24-71) that mediates
  interaction with the SKP1/ASK adaptor of the SCF core, and five C-terminal
  leucine-rich repeats (LRRs) that are predicted to serve as the substrate-recognition
  interface. FBL22 belongs to PANTHER family PTHR38926 (Arabidopsis F-box/LRR-repeat),
  subfamily SF2 (F-BOX_LRR-REPEAT PROTEIN 21-RELATED). No direct experimental
  characterization of FBL22 exists; the protein has UniProt evidence level PE 4
  (Predicted). Its transcript was noted as NO-upregulated in cadmium-stressed
  Arabidopsis roots in a microarray study, suggesting a potential role in
  stress-responsive proteolysis. However, no specific substrates, interacting
  partners, or mutant phenotypes have been reported for this protein. Functional
  inference is based entirely on conserved domain architecture and membership in
  the large (~700 member) Arabidopsis F-box protein family.
existing_annotations:
- term:
    id: GO:1905761
    label: SCF ubiquitin ligase complex binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      FBL22 contains a conserved F-box domain (aa 24-71) that is the canonical
      motif mediating interaction with SKP1/ASK proteins within the SCF ubiquitin
      ligase complex. IBA annotation is phylogenetically inferred from the PANTHER
      family PTHR38926, which groups F-box/LRR proteins that function as SCF
      complex substrate adaptors. The F-box motif binds the SKP1/CRL core while
      LRR domains recruit substrates [PMID:11077244, Saxena et al. 2023].
    action: ACCEPT
    reason: >-
      The F-box domain is well-established as the SCF complex-binding interface.
      FBL22 has a clearly identifiable F-box domain (PROSITE PS50181), and the
      IBA annotation from phylogenetic inference is well-supported by the
      conserved domain architecture. F-box proteins are defined by this
      interaction with the SCF complex core.
    supported_by:
      - reference_id: PMID:11077244
        supporting_text: "F-box proteins in Arabidopsis"
        full_text_unavailable: true
      - reference_id: file:ARATH/FBL22/FBL22-deep-research-falcon.md
        supporting_text: "FBL22 is most plausibly a substrate-recognition subunit of an SCF-type E3 ubiquitin ligase, coupling SKP1 binding (via its F-box motif) to target binding (via LRRs)"
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  review:
    summary: >-
      This annotation is computationally predicted by AtSubP (Arabidopsis
      subcellular localization prediction). No experimental localization data
      exists for FBL22. SCF complexes can function in both nuclear and
      cytoplasmic compartments depending on the specific F-box adaptor and
      its substrates. Without direct experimental evidence, this prediction
      cannot be confidently accepted or rejected.
    action: UNDECIDED
    reason: >-
      The ISM prediction from AtSubP provides weak evidence. SCF complexes
      are known to operate in both nucleus and cytoplasm in Arabidopsis.
      No localization experiments (e.g., GFP fusion, fractionation) have been
      performed for FBL22. The deep research explicitly notes that FBL22
      localization should be treated as unknown without direct evidence.
    supported_by:
      - reference_id: file:ARATH/FBL22/FBL22-deep-research-falcon.md
        supporting_text: "No localization experiment for FBL22 (e.g., GFP fusion microscopy, fractionation) was identified in the retrieved sources"
- term:
    id: GO:0006511
    label: ubiquitin-dependent protein catabolic process
  evidence_type: TAS
  original_reference_id: PMID:11019805
  review:
    summary: >-
      PMID:11019805 (Callis & Vierstra, 2000) is a general review of protein
      degradation in plant signaling pathways via the ubiquitin/proteasome
      pathway. The review discusses how proteolysis by the ubiquitin/proteasome
      pathway is linked to hormone responses, light perception, environmental
      adaptation, and floral development, but it does not specifically mention
      FBL22 or At4g05490.
    action: REMOVE
    reason: >-
      This general UPS review does not provide FBL22-specific evidence for a
      biological process annotation. FBL22's F-box/LRR architecture supports
      predicted SCF complex binding/adaptor function, but not a curated process
      assertion from this source.
    supported_by:
      - reference_id: PMID:11019805
        supporting_text: "Recent studies have linked proteolysis by the ubiquitin/proteasome pathway to a variety of signaling pathways in higher plants"
      - reference_id: file:ARATH/FBL22/FBL22-deep-research-falcon.md
        supporting_text: "At4g05490 encodes FBL22, displaying a ubiquitin protein ligase activity [from Besson-Bard et al. 2009]"
- term:
    id: GO:0006511
    label: ubiquitin-dependent protein catabolic process
  evidence_type: TAS
  original_reference_id: PMID:11077244
  review:
    summary: >-
      PMID:11077244 (Xiao & Jang, 2000) is a review of F-box proteins in
      Arabidopsis that established the nomenclature for the gene family,
      including FBL22. The paper classifies Arabidopsis F-box proteins and
      discusses F-box protein classification and SCF-complex biology. The cached
      source available locally does not provide the full text needed to verify
      whether FBL22 specifically is tied to a ubiquitin-dependent catabolic
      process.
    action: REMOVE
    reason: >-
      The paper may support FBL22 as a named F-box family member, but family
      classification is not enough to support a FBL22-specific biological-process
      annotation. Do not retain or upgrade this process term without FBL22-specific
      process or complex/substrate evidence.
    supported_by:
      - reference_id: PMID:11077244
        supporting_text: "F-box proteins in Arabidopsis"
        full_text_unavailable: true
