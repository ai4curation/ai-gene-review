proposed_new_terms: []
suggested_questions:
- question: What are the specific substrates recognized by FBL22 via its LRR domain?
- question: Does FBL22 play a role in cadmium stress response or nitric oxide signaling as suggested by the Besson-Bard et al. 2009 microarray data?
- question: What is the subcellular localization of FBL22 and does it differ between stress and normal conditions?
- question: Is FBL22 functionally redundant with other F-box/LRR proteins in the PTHR38926:SF2 subfamily (e.g., FBL21, FBL9, SKIP17)?
suggested_experiments:
- description: Co-immunoprecipitation of FBL22 with Arabidopsis SKP1/ASK proteins and CUL1 to confirm SCF complex assembly
- description: FBL22-GFP fusion under native promoter to determine subcellular localization
- description: IP-MS interactomics or comparative ubiquitinomics in fbl22 loss-of-function lines to identify substrates
- description: CRISPR knockout or T-DNA insertion alleles tested under cadmium stress and NO perturbation conditions
- description: Yeast two-hybrid or split-ubiquitin screen using FBL22 LRR domain as bait to identify interacting substrates
