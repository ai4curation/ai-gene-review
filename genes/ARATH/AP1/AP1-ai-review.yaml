      label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
    supported_by:
    - reference_id: PMID:15604664
      supporting_text: >-
        the MADS domain that mediates DNA binding and dimerization
    - reference_id: PMID:17428825
      supporting_text: >-
        in vivo AP1 binding to the cis-regulatory regions of these genes.
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 is a DNA-binding transcription factor, but the RNA polymerase
