- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 functions in the nucleus as a DNA-binding transcription factor and
      participates in nuclear MADS-domain complexes.
    action: ACCEPT
    reason: >-
      Nuclear localization is consistent with domain-based inference, UniProt,
      and experimental AP1-containing MADS complex studies.
    supported_by:
    - reference_id: PMID:22238427
      supporting_text: >-
        MADS-domain protein complexes can coexist within the nucleus
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      UniProt records AP1 as nuclear, matching its molecular role and
      experimental evidence that AP1-containing MADS complexes operate in the
      nucleus.
    action: ACCEPT
    reason: >-
      This cellular component annotation is accurate and biologically central for
      AP1's transcriptional regulatory function.
    supported_by:
    - reference_id: file:ARATH/AP1/AP1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Nucleus.'
    - reference_id: PMID:22238427
      supporting_text: >-
        MADS-domain protein complexes can coexist within the nucleus
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 regulates DNA-templated transcription, but for a eukaryotic
      DNA-binding transcription factor the RNA polymerase II-specific process is
      the better term and is already present in AP1 GOA.
    action: MODIFY
    reason: >-
      The broad term should be replaced by regulation of transcription by RNA
      polymerase II to reflect AP1's target gene context.
    proposed_replacement_terms:
    - id: GO:0006357
      label: regulation of transcription by RNA polymerase II
    supported_by:
    - reference_id: PMID:17428825
      supporting_text: >-
        directly suppressing the expression of flowering time genes, thus
        preventing the continuation of the shoot developmental program.
- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 can contribute to transcriptional activation of floral organ identity
      programs, but AP1 is also a direct repressor of flowering-time genes in
      emerging floral meristems. The positive-regulation term captures one
      supported mode, not AP1's complete core regulatory function.
    action: KEEP_AS_NON_CORE
    reason: >-
      Retain as a valid context-specific activity, but do not treat it as AP1's
      full core function because AP1 has both activating and repressing roles.
    supported_by:
    - reference_id: PMID:11206550
      supporting_text: >-
        vegetative leaves of triply transgenic plants,
        35S::PI;35S::AP3;35S::AP1 or 35S::PI;35S::AP3;35S::SEP3, are transformed
        into petaloid organs
    - reference_id: PMID:17428825
      supporting_text: >-
        it acts partly as a master repressor in floral meristems by directly
        suppressing the expression of flowering time genes
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Dimerization is a conserved and experimentally supported MADS protein
      property, and AP1 functions in homo- and heteromeric MADS-domain complexes.
    action: ACCEPT
    reason: >-
      Although broad, this term captures a real molecular capability needed for
      AP1's MADS complex activity. More specific heterodimerization is proposed
      for individual generic protein-binding rows where the source supports a
      particular MADS partner interaction.
    supported_by:
    - reference_id: PMID:15604664
      supporting_text: >-
        the MADS domain that mediates DNA binding and dimerization, and the K
        domain that mediates protein protein interaction.
    - reference_id: PMID:22238427
      supporting_text: >-
        five major floral homeotic MADS-domain proteins (AP1, AP3, PI, AG, and
        SEP3) interact in floral tissues as proposed in the "floral quartet"
        model.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:11439126
  review:
    summary: >-
      The source supports AP1 interaction with SEP3 during flower development, but
