id: P35631
gene_symbol: AP1
product_type: PROTEIN
aliases:
- AGL7
- At1g69120
- F4N2.9
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  APETALA1 (AP1/AGL7; At1g69120) encodes a 256 amino acid nuclear MIKC-type
  MADS-box transcription factor required for Arabidopsis floral meristem identity
  and normal sepal and petal development. AP1 binds CArG-containing
  cis-regulatory regions through its MADS domain and uses its K domain and
  C-terminal region to form homo- and heteromeric MADS transcription factor
  complexes with partners such as SEP3, AP3/PI, AGL24, SVP, SOC1, and SEU/LUG
  corepressor-associated proteins. The best-supported core function is
  context-dependent RNA polymerase II transcriptional regulation during the
  inflorescence-to-floral meristem transition: AP1 acts with LFY/CAL/FUL-related
  networks to promote floral fate, supports outer-whorl organ identity, activates
  floral organ programs in some contexts, and directly represses inflorescence or
  flowering-time genes such as SVP, AGL24, and SOC1 in emerging floral
  meristems. PANTHER PTHR48019 places AP1 in the broad MADS-box/MEF2
  transcription factor family; this family context supports DNA-binding,
  dimerization, and developmental regulatory roles but is too broad to transfer
  AP1-specific floral identity annotations without Arabidopsis experimental
  evidence.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro domain mappings identify AP1 as a MADS-box/K-box transcription
      factor, but domain-only mappings should be kept to conserved molecular
      functions and not over-interpret AP1-specific developmental directionality.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      Phylogenetic inference supports conserved MADS transcription factor
      cis-regulatory DNA binding and transcriptional regulation, consistent with
      AP1 family placement and Arabidopsis experimental data.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: UniProt records AP1 as a nuclear protein.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: AtSubP predicts nuclear localization, consistent with AP1 function as
      a DNA-binding transcription factor.
- id: PMID:10368173
  title: Interactions among APETALA1, LEAFY, and TERMINAL FLOWER1 specify meristem
    fate.
  findings:
  - statement: AP1 and LFY cooperatively assign floral fate to lateral meristems and
      antagonize TFL1 expression during the meristem fate transition.
    supporting_text: >-
      Assignment of floral fate to lateral meristems is primarily due to the
      cooperative activity of the flower meristem identity genes LEAFY (LFY),
      APETALA1 (AP1), and CAULIFLOWER.
  - statement: AP1 can positively regulate LFY and repress TFL1-associated shoot
      meristem identity.
    supporting_text: >-
      We have found that AP1, in turn, can positively regulate LFY, because LFY is
      expressed prematurely in the converted floral meristems of plants
      constitutively expressing AP1.
- id: PMID:10948247
  title: Prenylation of the floral transcription factor APETALA1 modulates its
    function.
  findings:
  - statement: AP1 is described as a MADS-box transcription factor regulating the
      transition to floral meristems and sepal/petal development.
    supporting_text: >-
      The Arabidopsis MADS box transcription factor APETALA1 (AP1) was identified
      as a substrate for farnesyltransferase and shown to be farnesylated
      efficiently both in vitro and in vivo.
  - statement: The cached abstract supports AP1-GFP functional assays but does not
      contain the AP1 nuclear localization details used by the original GOA IDA
      annotation.
    supporting_text: >-
      AP1 fused to green fluorescent protein (GFP) retained transcription factor
      activity and directed the expected terminal flower phenotype when
      ectopically expressed in transgenic Arabidopsis.
    full_text_unavailable: true
- id: PMID:11118137
  title: 'Arabidopsis transcription factors: genome-wide comparative analysis among
    eukaryotes.'
  findings:
  - statement: Arabidopsis encodes a large transcription factor repertoire and many
      conserved DNA-binding domains.
    supporting_text: >-
      Arabidopsis dedicates over 5% of its genome to code for more than 1500
      transcription factors, about 45% of which are from families specific to
      plants.
- id: PMID:11206550
  title: Complexes of MADS-box proteins are sufficient to convert leaves into floral
    organs.
  findings:
  - statement: AP1 participates with AP3/PI and SEP3 in higher-order MADS complexes
      sufficient to impose floral organ identity on leaves.
    supporting_text: >-
      Here we show that the class B proteins of Arabidopsis, PISTILLATA (PI) and
      APETALA3 (AP3), interact with APETALA1 (AP1, a class A protein) and
      SEPALLATA3 (SEP3, previously AGL9), and with AGAMOUS (AG, a class C
      protein) through SEP3.
  - statement: AP1-containing MADS complexes can drive petaloid organ identity in
      ectopic expression assays.
    supporting_text: >-
      vegetative leaves of triply transgenic plants,
      35S::PI;35S::AP3;35S::AP1 or 35S::PI;35S::AP3;35S::SEP3, are transformed
      into petaloid organs
- id: PMID:11439126
  title: APETALA1 and SEPALLATA3 interact to promote flower development.
  findings:
  - statement: AP1 and CAL have overlapping flower meristem identity roles, and AP1
      is later required for sepal and petal development.
    supporting_text: >-
      In Arabidopsis, the closely related APETALA1 (AP1) and CAULIFLOWER (CAL)
      MADS-box genes share overlapping roles in promoting flower meristem
      identity. Later in flower development, the AP1 gene is required for normal
      development of sepals and petals.
  - statement: SEP3 interacts functionally with AP1 during normal flower
      development.
    supporting_text: >-
      Taken together, these studies suggest that SEP3 interacts with AP1 to
      promote normal flower development.
- id: PMID:12837945
  title: 'Molecular and phylogenetic analyses of the complete MADS-box transcription
    factor family in Arabidopsis: new openings to the MADS world.'
  findings:
  - statement: MADS-box transcription factors are plant developmental regulators
      and AP1 belongs to this transcription factor family.
    supporting_text: >-
      MADS-box transcription factors are key regulators of several plant
      development processes.
- id: PMID:15604664
  title: Defining subdomains of the K domain important for protein-protein
    interactions of plant MADS proteins.
  findings:
  - statement: The MADS domain mediates DNA binding and dimerization, while the K
      domain mediates protein-protein interactions in floral MADS proteins.
    supporting_text: >-
      All of these floral MADS proteins conserve two domains: the MADS domain
      that mediates DNA binding and dimerization, and the K domain that mediates
      protein protein interaction.
  - statement: The cached abstract focuses on AP3/PI/SEP interactions and does not
      provide AP1-specific interaction evidence for retaining a generic protein
      binding annotation.
    supporting_text: >-
      Here we report on our studies on the interactions of the B class MADS
      proteins AP3 and PI with the E class MADS proteins SEP1, SEP2, and SEP3.
    full_text_unavailable: true
- id: PMID:15805477
  title: Comprehensive interaction map of the Arabidopsis MADS Box transcription
    factors.
  findings:
  - statement: A matrix yeast two-hybrid screen of Arabidopsis MADS-box proteins
      identified specific heterodimers and some homodimers.
    supporting_text: >-
      A matrix-based yeast two-hybrid screen of >100 members of this family
      revealed a collection of specific heterodimers and a few homodimers.
  - statement: MADS protein interaction patterns help define floral induction and
      organ-formation networks.
    supporting_text: >-
      a model is proposed that integrates the floral induction and floral organ
      formation networks based on the interactions between the proteins involved.
- id: PMID:16080001
  title: Mutant analysis, protein-protein interactions and subcellular localization
    of the Arabidopsis B sister (ABS) protein.
  findings:
  - statement: The cached abstract supports ABS/TT16 interaction with floral
      homeotic proteins but does not provide AP1-specific text for the GOA AP1
      protein binding row.
    supporting_text: >-
      Transgenic plants that ectopically express ABS show changes in the growth
      and identity of floral organs, suggesting that ABS can interact with floral
      homeotic proteins.
    full_text_unavailable: true
- id: PMID:16679456
  title: AGL24, SHORT VEGETATIVE PHASE, and APETALA1 redundantly control AGAMOUS
    during early stages of flower development in Arabidopsis.
  findings:
  - statement: AP1 and LFY downregulate AGL24 to establish floral meristem
      identity.
    supporting_text: >-
      AGL24 promotes inflorescence identity, and its expression is downregulated
      by APETALA1 (AP1) and LEAFY to establish floral meristem identity.
  - statement: AP1-AGL24 and AP1-SVP dimers interact with the LUG-SEU corepressor
      complex.
    supporting_text: >-
      Protein interaction studies showed that dimers composed of AP1-AGL24 and
      AP1-SVP interact with the LUG-SEU corepressor complex.
- id: PMID:16854969
  title: APETALA1 and SEPALLATA3 interact with SEUSS to mediate transcription
    repression during flower development.
  findings:
  - statement: AP1 and SEP3 physically interact with SEU and can mediate
      transcriptional repression with SEU/LUG.
    supporting_text: >-
      Using the yeast two-hybrid assay and a co-immunoprecipitation assay, we
      showed that APETALA1 (AP1) and SEPALLATA3 (SEP3), both MADS box
      DNA-binding proteins, interacted with SEU.
  - statement: AP1 and SEP3 may tether SEU/LUG corepressors to DNA regulatory
      elements.
    supporting_text: >-
      These results suggest that AP1 and SEP3 may serve as the DNA-binding
      partners of SEU/LUG.
- id: PMID:17428825
  title: Specification of Arabidopsis floral meristem identity by repression of
    flowering time genes.
  findings:
  - statement: AP1 specifies floral meristem identity in part by directly repressing
      SVP, AGL24, and SOC1 in emerging floral meristems.
    supporting_text: >-
      We show here that the emerging floral meristems require AP1 to partly
      specify their floral identities by directly repressing a group of flowering
      time genes, including SHORT VEGETATIVE PHASE (SVP), AGAMOUS-LIKE 24 (AGL24)
      and SUPPRESSOR OF OVEREXPRESSION OF CO1 (SOC1).
  - statement: AP1 binds the cis-regulatory regions of these target genes in vivo.
    supporting_text: >-
      By post-translational activation of an AP1-GR fusion protein and chromatin
      immunoprecipitation assays, we further demonstrate the repression of these
      flowering time genes by induced AP1 activity and in vivo AP1 binding to the
      cis-regulatory regions of these genes.
- id: PMID:20626659
  title: Arabidopsis BLADE-ON-PETIOLE1 and 2 promote floral meristem fate and
    determinacy in a previously undefined pathway targeting APETALA1 and
    AGAMOUS-LIKE24.
  findings:
  - statement: LFY and AP1 expression in inflorescence-meristem primordia confers
      floral fate.
    supporting_text: >-
      In Arabidopsis, LEAFY (LFY) and APETALA1 (AP1) are key regulators of this
      transition and expression of these genes in primordia produced by the
      inflorescence meristem confers floral fate.
  - statement: bop1 bop2 ap1 triple mutants convert flowers into highly branched
      inflorescence-like shoots, supporting AP1 involvement in floral meristem
      determinacy.
    supporting_text: >-
      The most dramatic changes occur in bop1 bop2 ap1-1 triple mutants where
      flowers are converted into highly branched inflorescence-like shoots.
- id: PMID:21798944
  title: Evidence for network evolution in an Arabidopsis interactome map.
  findings:
  - statement: The paper reports a proteome-wide binary interaction map; AP1 rows
      from this source should not be treated as AP1 core function without
      independent biological validation.
    supporting_text: >-
      We describe a proteome-wide binary protein-protein interaction map for the
      interactome network of the plant Arabidopsis thaliana containing about 6200
      highly reliable interactions between about 2700 proteins.
- id: PMID:22238427
  title: Characterization of MADS-domain transcription factor complexes in
    Arabidopsis flower development.
  findings:
  - statement: AP1, AP3, PI, AG, and SEP3 interact in floral tissues in a manner
      consistent with the floral quartet model.
    supporting_text: >-
      Here, we show using affinity purification and mass spectrometry that five
      major floral homeotic MADS-domain proteins (AP1, AP3, PI, AG, and SEP3)
      interact in floral tissues as proposed in the "floral quartet" model.
  - statement: MADS-domain protein complexes can coexist in the nucleus and bind
      CArG boxes in target promoters.
    supporting_text: >-
      Based on our in vitro EMSA studies, we propose that different heteromeric
      MADS-domain protein complexes can coexist within the nucleus and may
      compete for partly overlapping sets of DNA-binding sites.
- id: PMID:24714165
  title: Phytoplasma effector SAP54 hijacks plant reproduction by degrading MADS-box
    proteins and promotes insect colonization in a RAD23-dependent manner.
  findings:
  - statement: Phytoplasma effector SAP54 interacts with AP1 and other MADS-domain
      transcription factors and promotes their degradation.
    supporting_text: >-
      We find that phytoplasma produce a novel effector protein (SAP54) that
      interacts with members of the MADS-domain transcription factor (MTF) family,
      including key regulators SEPALLATA3 and APETALA1, that occupy central
      positions in the regulation of floral development.
- id: PMID:28650476
  title: 'CrY2H-seq: a massively multiplexed assay for deep-coverage interactome
    mapping.'
  findings:
  - statement: CrY2H-seq produced a high-throughput Arabidopsis transcription
      factor interactome; AP1 interactions from this source are useful as
      screening data but are not sufficient to make generic protein binding a core
      AP1 function.
    supporting_text: >-
      We applied CrY2H-seq to comprehensively screen a collection of 1,956
      Arabidopsis transcription factors and regulators (hereafter collectively
      called TFs) against itself in ten independent "all-by-all" screens.
  - statement: The study reports thousands of binary TF interactions.
    supporting_text: >-
      We report a deep coverage Arabidopsis transcription factor interactome
      composed of 8,577 binary interactions, 7,994 of which are novel.
- id: PMID:31806676
  title: A PXY-Mediated Transcriptional Network Integrates Signaling Mechanisms to
    Control Vascular Development in Arabidopsis.
  findings:
  - statement: The paper maps a high-throughput transcription factor-promoter
      network for vascular development; the cached text does not discuss AP1
      specifically.
    supporting_text: >-
      Here, we mapped a putative PXY-mediated transcriptional regulatory network
      comprising 690 transcription factor-promoter interactions in Arabidopsis
      (Arabidopsis thaliana).
- id: PMID:37965720
  title: Protein interaction mapping reveals widespread targeting of
    development-related host transcription factors by phytoplasma effectors.
  findings:
  - statement: The paper reports a broad phytoplasma effector-host transcription
      factor interaction network and should be treated as host-pathogen screening
      context rather than AP1 core function evidence.
    supporting_text: >-
      we generated a protein-protein interaction network between a broad set of
      phytoplasma effectors and a large, unbiased collection of Arabidopsis
      thaliana transcription factors and transcriptional regulators.
- id: file:ARATH/AP1/AP1-uniprot.txt
  title: UniProt record P35631 for APETALA1
  findings:
  - statement: >-
      UniProt describes AP1 as a nuclear MADS-box transcription factor that
      promotes early floral meristem identity, controls sepal/petal development,
      interacts with MADS partners, and represses flowering-time genes in emerging
      floral meristems.
- id: file:ARATH/AP1/AP1-deep-research-falcon.md
  title: Falcon deep research report for Arabidopsis AP1
  findings:
  - statement: >-
      The Falcon report synthesizes AP1 as a MIKC-type MADS transcription factor,
      floral meristem identity regulator, context-dependent activator/repressor,
      and member of higher-order floral MADS complexes; it also highlights recent
      AP1 chromatin/pioneer-factor literature that is useful context but not yet
      present in GOA.
- id: file:interpro/panther/PTHR48019/PTHR48019-metadata.yaml
  title: PANTHER family metadata for PTHR48019
  findings:
  - statement: >-
      PTHR48019 is the broad MADS-box/MEF2 transcription factor family; its
      description supports conserved DNA binding, transcriptional regulation,
      dimerization, and flower-development roles in plants, but the family is too
      broad for AP1-specific floral identity transfer without direct evidence.
existing_annotations:
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      AP1 is a DNA-binding MADS transcription factor that directly regulates RNA
      polymerase II target genes during floral meristem specification. This
      specific regulatory term is supported by AP1-GR/ChIP evidence showing
      direct AP1 binding to and repression of SVP, AGL24, and SOC1, plus
      higher-order MADS complex data.
    action: ACCEPT
    reason: >-
      This is a core AP1 function. Phylogenetic inference is consistent with the
      conserved MADS transcription factor role, and Arabidopsis experiments
      provide direct evidence for AP1-dependent regulation of Pol II-transcribed
      developmental regulators.
    supported_by:
    - reference_id: PMID:17428825
      supporting_text: >-
        By post-translational activation of an AP1-GR fusion protein and
        chromatin immunoprecipitation assays, we further demonstrate the
        repression of these flowering time genes by induced AP1 activity and in
        vivo AP1 binding to the cis-regulatory regions of these genes.
    - reference_id: PMID:22238427
      supporting_text: >-
        Here, we show using affinity purification and mass spectrometry that five
        major floral homeotic MADS-domain proteins (AP1, AP3, PI, AG, and SEP3)
        interact in floral tissues as proposed in the "floral quartet" model.
    - reference_id: file:ARATH/AP1/AP1-deep-research-falcon.md
      supporting_text: >-
        Falcon synthesis supports AP1 as a MIKC-type MADS transcription factor,
        floral meristem identity regulator, and context-dependent activator and
        repressor in AP1-containing MADS complexes.
- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      AP1 binds cis-regulatory regions of RNA polymerase II target genes as a
      MADS-domain transcription factor. ChIP assays show AP1 binding to
      cis-regulatory regions of SVP, AGL24, and SOC1, and MADS complex studies
      support CArG-box binding by AP1-containing complexes.
    action: ACCEPT
    reason: >-
      This is the most informative molecular-function term among the existing DNA
      binding annotations and should be retained as core.
    supported_by:
    - reference_id: PMID:17428825
      supporting_text: >-
        in vivo AP1 binding to the cis-regulatory regions of these genes.
    - reference_id: PMID:22238427
      supporting_text: >-
        may compete for partly overlapping sets of DNA-binding sites.
    - reference_id: file:ARATH/AP1/AP1-deep-research-falcon.md
      supporting_text: >-
        Falcon synthesis highlights AP1's MADS-domain DNA binding, CArG-box
        target recognition, and higher-order MADS complex context.
- term:
    id: GO:0000977
    label: RNA polymerase II transcription regulatory region sequence-specific DNA
      binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 does bind RNA polymerase II regulatory regions, but GO:0000978 is the
      current, more precise term already present in GOA for AP1's
      cis-regulatory-region sequence-specific DNA binding activity.
    action: MODIFY
    reason: >-
      The annotation is directionally correct but less precise than the existing
      AP1 IBA term. Replace with the more specific cis-regulatory region binding
      term supported by AP1 ChIP evidence.
    proposed_replacement_terms:
    - id: GO:0000978
      label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
    supported_by:
    - reference_id: PMID:17428825
      supporting_text: >-
        in vivo AP1 binding to the cis-regulatory regions of these genes.
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      AP1 is certainly DNA-binding, but this root-level term is too generic for a
