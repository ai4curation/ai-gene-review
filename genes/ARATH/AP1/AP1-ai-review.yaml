      supporting_text: >-
        directly repressing a group of flowering time genes, including SHORT
        VEGETATIVE PHASE (SVP), AGAMOUS-LIKE 24 (AGL24) and SUPPRESSOR OF
        OVEREXPRESSION OF CO1 (SOC1).
    - reference_id: PMID:12837945
      supporting_text: MADS-box transcription factors are key regulators of several
