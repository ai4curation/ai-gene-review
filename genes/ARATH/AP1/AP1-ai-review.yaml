core_functions:
- description: >-
    AP1 is a nuclear RNA polymerase II-specific MADS-box DNA-binding
    transcription factor that binds cis-regulatory regions and regulates
    floral meristem/outer floral organ gene expression. It acts in MADS
    transcription factor complexes, with context-dependent activation and
    repression: AP1-containing complexes can promote floral organ programs, while
    AP1 directly represses flowering-time/inflorescence identity genes such as
    SVP, AGL24, and SOC1 to stabilize floral meristem identity.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  - id: GO:0010582
    label: floral meristem determinacy
  - id: GO:0009908
    label: flower development
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:17428825
    supporting_text: >-
      By post-translational activation of an AP1-GR fusion protein and chromatin
      immunoprecipitation assays, we further demonstrate the repression of these
      flowering time genes by induced AP1 activity and in vivo AP1 binding to the
      cis-regulatory regions of these genes.
  - reference_id: PMID:22238427
    supporting_text: >-
      Here, we show using affinity purification and mass spectrometry that five
      major floral homeotic MADS-domain proteins (AP1, AP3, PI, AG, and SEP3)
      interact in floral tissues as proposed in the "floral quartet" model.
  - reference_id: PMID:11439126
    supporting_text: >-
      the closely related APETALA1 (AP1) and CAULIFLOWER (CAL) MADS-box genes
      share overlapping roles in promoting flower meristem identity.
proposed_new_terms:
- proposed_name: floral meristem identity specification
  proposed_definition: >-
    The developmental process in which a lateral meristem is committed to floral
    meristem fate rather than shoot or inflorescence meristem fate.
  justification: >-
    AP1 literature repeatedly describes "floral meristem identity" or "assignment
    of floral fate" as distinct from general meristem structural organization and
    not identical to determinacy. GO:0010582 (floral meristem determinacy) is the
    closest existing term in the local ontology cache, but a fate-specification
    term would better capture AP1/LFY/CAL biology.
  proposed_parent:
    id: GO:0010228
    label: vegetative to reproductive phase transition of meristem
  supported_by:
  - reference_id: PMID:10368173
    supporting_text: >-
      Assignment of floral fate to lateral meristems is primarily due to the
      cooperative activity of the flower meristem identity genes LEAFY (LFY),
      APETALA1 (AP1), and CAULIFLOWER.
suggested_questions:
- question: >-
    Should AP1's GO biological process annotations distinguish floral meristem
    identity specification from floral meristem determinacy, or is GO:0010582 the
    intended curator term for both concepts?
  experts:
  - Yanofsky MF
  - Meyerowitz EM
  - Kaufmann K
- question: >-
    Which AP1 protein interactions should be retained as curated GO molecular
    functions versus left as interaction database records, especially
    high-throughput CrY2H/phytoplasma-effector interactions?
  experts:
  - Immink RG
  - Kaufmann K
  - Angenent GC
suggested_experiments:
- hypothesis: >-
    AP1's direct transcriptional targets in early floral meristems can be divided
    into activation and repression modules based on partner complex composition.
  description: >-
    Perform stage-resolved AP1 ChIP-seq or CUT&RUN with matched nascent RNA-seq
    in early floral meristems, combined with AP1 partner perturbations such as
    SEP3, AGL24/SVP, and SEU/LUG, to classify direct AP1-bound targets by
    regulatory direction and complex context.
  experiment_type: ChIP/CUT&RUN plus transcriptomics
- hypothesis: >-
    AP1 high-throughput interaction candidates are enriched for non-core or
    context-specific interactions unless validated in floral tissue.
  description: >-
    Validate selected AP1 partners from CrY2H-seq and phytoplasma-effector
    screens by reciprocal co-IP or BiFC in floral meristem/inflorescence tissue,
    then test whether disrupting each interaction changes AP1 target gene
    expression or flower development.
  experiment_type: interaction validation and functional genetics
