id: Q9LY00
gene_symbol: WRKY70
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: 'WRKY70 is an Arabidopsis group III WRKY DNA-binding transcription factor that acts in the nucleus to integrate salicylic-acid, jasmonic-acid, defense, and senescence transcriptional programs. Its core role is sequence-specific transcriptional regulation of target genes: it generally promotes SA-associated defense outputs, represses subsets of JA/ethylene-responsive defense genes, and cooperates with related WRKY factors as a negative regulator of developmental leaf senescence. Many pathogen, osmotic, stomatal, hormone, and metabolite annotations are downstream or context-specific outputs of this transcriptional regulator rather than separate molecular functions.'
