suggested_questions:
- question: Should WRKY70 defense-output annotations be narrowed upstream to regulatory terms that capture its transcription-factor role and direction of regulation?
- question: Can direct AtWRKY70 chromatin-binding datasets distinguish primary targets from downstream defense and senescence phenotypes?
suggested_experiments:
- description: Perform WRKY70 ChIP-seq or CUT&RUN under SA, JA, and senescence conditions and pair it with rapid WRKY70 perturbation RNA-seq to distinguish direct targets from downstream outputs.
- description: Test WRKY70 DNA-binding and activation/repression activity on WT-box, W-box, PR, JA-responsive, and senescence-associated promoters using mutant binding motifs and WRKY70 DNA-binding-domain variants.
