core_functions:
- description: Nuclear WRKY transcriptional regulator integrating defense hormone and senescence programs. WRKY70 binds cis-regulatory DNA motifs through its WRKY domain, promotes SA-associated defense gene expression, represses subsets of JA-responsive genes, and cooperates with related WRKY factors to delay developmental leaf senescence.
