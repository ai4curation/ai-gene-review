id: Q9SZF7
gene_symbol: SHR
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: SHORT-ROOT (SHR) is a plant-specific GRAS-family transcriptional
  regulator that controls radial patterning of the Arabidopsis root. SHR mRNA is
  restricted to the central vascular cylinder (stele), but the SHR protein moves
  cell-to-cell through plasmodesmata into the immediately adjacent cell layer,
  where it enters the nucleus. There, acting together with the related GRAS
  protein SCARECROW (SCR), it specifies ground-tissue/endodermis identity and the
  quiescent centre, and drives the asymmetric (formative) division of the
  cortex/endodermis initial daughter cell. SHR directly promotes transcription of
  SCR, establishing a SHR/SCR positive-feedback loop; SCR in turn sequesters SHR
  in the nucleus, restricting SHR movement to a single endodermal layer. SHR and
  SCR form a head-to-head heterodimer through their GRAS domains, and the SHR-SCR
  dimer recruits BIRD/INDETERMINATE DOMAIN (IDD) zinc-finger transcription factors
  (e.g. JACKDAW/JKD, MAGPIE/MGP, NUTCRACKER) that provide the sequence-specific
  DNA contact; SHR-SCR thus function largely as transcriptional cofactors rather
  than direct DNA-binding transcription factors. Intercellular movement of SHR
  depends on the cytoplasmic pool, intact microtubules, and the endosome-associated
  protein SIEL, and SHR is detected on early, late and recycling endosomes as part
  of this trafficking route. Beyond the root, SHR-SCR also act in leaves, where
  they specify bundle-sheath cell fate and promote cell proliferation by driving
  S-phase progression of the cell cycle.
