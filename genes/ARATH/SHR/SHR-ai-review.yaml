core_functions:
- description: Acts as a transcriptional coregulator/cofactor that, in a GRAS-domain
    heterodimer with SCARECROW (SCR), is recruited to target promoters by DNA-binding
    BIRD/IDD zinc-finger transcription factors (e.g. JKD, MGP) to control transcription
    of SCR and downstream ground-tissue patterning genes.
