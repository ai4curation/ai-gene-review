proposed_new_terms:
- proposed_name: regulated intercellular movement of transcription factor via plasmodesmata
  proposed_definition: The regulated, microtubule- and SIEL/endosome-dependent
    transport of a transcription regulator (e.g. SHR) from one cell into an adjacent
    cell through plasmodesmata, enabling it to act as a non-cell-autonomous positional
    signal in tissue patterning. No precise existing GO BP term for this process
    could be confirmed without OLS access, so it is recorded here as a candidate.
  justification: SHR's regulated cell-to-cell movement is a defining, well-documented
    feature not captured by current annotations.
  supported_by:
  - reference_id: PMID:25124761
    supporting_text: The movement of the non-cell-autonomous transcription factor,
      SHORT-ROOT relies on the endomembrane system.
suggested_questions:
- Under physiological conditions in planta, does SHR ever contact DNA directly, or
  is promoter occupancy always mediated by IDD/BIRD transcription factors?
- Which IDD/BIRD partner combinations determine SHR target-gene selectivity in
  different cell types, and how do higher-order SHR-SCR-IDD complex conformations
  encode distinct outputs?
