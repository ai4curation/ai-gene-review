    supporting_text: These results suggest that SHR-SCR are transcriptional cofactors
      that regulate target gene transcription via binding of SHR to BIRD transcription
      factors.
  - reference_id: PMID:16640459
    supporting_text: confirms that at least four of the eight direct targets identified
      by the meta-analysis are directly bound by SHR in vivo.
- description: Heterodimerizes with the GRAS protein SCARECROW through its GRAS-domain
    alpha-helical cap; this interaction sequesters SHR in the nucleus, restricts its
    movement to a single endodermal layer, and is required for the SHR/SCR feedback
    loop and ground-tissue patterning.
