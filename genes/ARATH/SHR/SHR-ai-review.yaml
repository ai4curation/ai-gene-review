- id: PMID:10850497
  title: The SHORT-ROOT gene controls radial patterning of the Arabidopsis root through
    radial signaling.
  findings:
  - statement: SHR is required for the asymmetric cell division forming ground tissue
      and for endodermis specification, and acts upstream of SCR.
    supporting_text: The SHORT-ROOT (SHR) gene is required for the asymmetric cell
      division responsible for formation of ground tissue (endodermis and cortex)
      as well as specification of endodermis in the Arabidopsis root.
- id: PMID:11118137
  title: 'Arabidopsis transcription factors: genome-wide comparative analysis among
    eukaryotes.'
  findings: []
- id: PMID:11565032
  title: Intercellular movement of the putative transcription factor SHR in root patterning.
  findings:
  - statement: SHR protein moves from the stele into a single adjacent cell layer and
      enters the nucleus, acting as a non-cell-autonomous signal.
    supporting_text: the SHR protein, a putative transcription factor, moves from
      the stele to a single layer of adjacent cells, where it enters the nucleus.
- id: PMID:15498493
  title: Mechanisms regulating SHORT-ROOT intercellular movement.
  findings:
  - statement: A cytoplasmic pool of SHR is required for, and intrinsic features of
      SHR regulate, its intercellular movement.
    supporting_text: SHR must be present in the cytoplasm to move, providing evidence
      that SHR movement is regulated.
- id: PMID:16640459
  title: Whole-genome analysis of the SHORT-ROOT developmental pathway in Arabidopsis.
  findings:
  - statement: SHR binds in vivo (ChIP) to promoters of direct targets including SCR,
      MGP, NUC and TRI and has transcription factor activity within its expression domain.
    supporting_text: this demonstrates that SHR has transcription factor activity
      and, most important, confirms that at least four of the eight direct targets
      identified by the meta-analysis are directly bound by SHR in vivo.
- id: PMID:17446396
  title: An evolutionarily conserved mechanism delimiting SHR movement defines a single
    layer of endodermis in plants.
  findings:
  - statement: SCR sequesters SHR in the nucleus via protein-protein interaction and a
      SHR/SCR-dependent positive feedback loop, restricting SHR to one endodermal layer.
    supporting_text: SCARECROW (SCR) blocks SHR movement by sequestering it into the
      nucleus through protein-protein interaction and a safeguard mechanism that
      relies on a SHR/SCR-dependent positive feedback loop for SCR transcription.
- id: PMID:17785527
  title: Arabidopsis JACKDAW and MAGPIE zinc finger proteins delimit asymmetric cell
    division and stabilize tissue boundaries by restricting SHORT-ROOT action.
  findings:
  - statement: SHR interacts with the zinc-finger proteins JKD and MGP in a feed-forward
      loop that regulates the range of SHR/SCR action.
    supporting_text: JACKDAW and MAGPIE genes, which encode members of a plant-specific
      family of zinc finger proteins, act in a SHR-dependent feed-forward loop to
      regulate the range of action of SHORT-ROOT and SCARECROW.
- id: PMID:18500650
  title: Large-scale analysis of the GRAS gene family in Arabidopsis thaliana.
  findings:
  - statement: Confirmed SHR-SCR interaction by Y2H and identified SCL23 as a new
      SHR-interacting GRAS protein.
    supporting_text: we confirmed the protein-protein interaction between SHORT-ROOT
      (SHR) and SCARECROW (SCR). Furthermore, we identified a new SHR-interacting
      protein, SCARECROW-LIKE23 (SCL23).
- id: PMID:19726572
  title: Identification of the endodermal vacuole as the iron storage compartment
    in the Arabidopsis embryo.
  findings:
  - statement: Iron is stored in endodermal vacuoles of the embryo; the paper does not
      directly study SHR, so the SHR-iron link is indirect via endodermis specification.
    supporting_text: in dry seeds Fe is primarily stored in the endodermis cell layer,
      within the vacuoles, from which it is remobilized during germination.
- id: PMID:20739610
  title: SHORT-ROOT and SCARECROW regulate leaf growth in Arabidopsis by stimulating
    S-phase progression of the cell cycle.
  findings:
  - statement: In leaves SHR and SCR act as general regulators of cell proliferation by
      driving S-phase progression, a role distinct from their root patterning function.
    supporting_text: SHR and SCR primarily function as general regulators of cell
      proliferation in leaves... primarily drive S-phase progression, presumably by
      a stimulation of E2F action.
- id: PMID:22921914
  title: A bistable circuit involving SCARECROW-RETINOBLASTOMA integrates cues to
    inform asymmetric stem cell division.
  findings:
  - statement: SHR and SCR transcriptionally control CYCLIND6;1 in a bistable circuit
      governing asymmetric stem cell division.
    supporting_text: This cyclin is itself under transcriptional control of SCR and
      its partner SHORT ROOT (SHR), creating a robust bistable
- id: PMID:24517883
  title: SCARECROW, SCR-LIKE 23 and SHORT-ROOT control bundle sheath cell fate and
    function in Arabidopsis thaliana.
  findings:
  - statement: SHR moves into leaf bundle-sheath cells where it directly regulates SCR
      and SCL23 and is essential for BS cell-fate specification.
    supporting_text: the SHR protein moves into the BS cells, where it directly
      regulates SCR and SCL23 expression.
- id: PMID:25124761
  title: The movement of the non-cell-autonomous transcription factor, SHORT-ROOT
    relies on the endomembrane system.
  findings:
  - statement: SHR localizes to early, late and recycling endosomes in a SIEL-dependent
      manner; endosome function is required for SHR intercellular movement.
    supporting_text: in the cytoplasm of root or leaf cells, SHR localizes to endosomes
      in a SIEL-dependent manner. Interference of early and late endosomes disrupts
      intercellular movement of SHR.
- id: PMID:25533953
  title: An Arabidopsis gene regulatory network for secondary cell wall synthesis.
  findings:
  - statement: An enhanced yeast-one-hybrid GRN scored SHR as binding cis-regulatory
      regions of secondary-cell-wall genes; given GRAS biology this is likely indirect.
    supporting_text: Yeast one-hybrid (Y1H) protein-DNA interaction assays
- id: PMID:28211915
  title: Structure of the SHR-SCR heterodimer bound to the BIRD/IDD transcriptional
    factor JKD.
  findings:
  - statement: SHR and SCR form a GRAS-domain heterodimer; the SHR-SCR complex binds
      the zinc fingers of IDD TFs (JKD/MGP) and acts as a transcription cofactor, with
      no evidence for direct DNA binding by SHR.
    supporting_text: there is no evidence for direct binding of SHR-SCR or other GRAS
      proteins to DNA. We did not find any DNA-binding motifs in our structure of the
      SHR-SCR complex
  - statement: SHR-SCR regulate target gene transcription via binding of SHR to BIRD
      transcription factors, which provide DNA contact.
    supporting_text: These results suggest that SHR-SCR are transcriptional cofactors
      that regulate target gene transcription via binding of SHR to BIRD transcription
      factors.
- id: PMID:28746306
  title: In vivo FRET-FLIM reveals cell-type-specific protein interactions in Arabidopsis
    roots.
  findings:
  - statement: SHR forms cell-type-specific complexes with SCR and JKD in roots,
      including higher-order complexes whose conformation tunes target-gene regulation.
    supporting_text: three fully functional fluorescently tagged cell fate regulators
      establish cell-type-specific interactions at endogenous expression levels and
      can form higher order complexes.
- id: file:ARATH/SHR/SHR-deep-research-falcon.md
  title: Falcon (Edison Scientific) deep research report for SHR
  findings:
  - statement: SHR is a mobile, non-cell-autonomous GRAS transcription factor that
      moves from the stele into adjacent cells through plasmodesmata to deliver
      positional information, acting in protein complexes with SCR, SCL23 and
      BIRD/IDD (JKD) factors to pattern ground tissue and drive formative division.
    supporting_text: SHR is synthesized in one tissue domain but acts in neighboring
      cells after intercellular movement through plasmodesmata, thereby delivering
      positional information.
