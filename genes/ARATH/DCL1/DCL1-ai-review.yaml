    summary: The InterPro-derived DNA-binding row is not supported by the DCL1 evidence reviewed here.
    action: REMOVE
    reason: DCL1 is a pri-/pre-miRNA-processing RNase III enzyme whose accessible evidence supports RNA
      substrate recognition, not DNA binding.
