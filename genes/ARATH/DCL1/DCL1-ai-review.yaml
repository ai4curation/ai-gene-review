core_functions:
- description: Nuclear Dicer/RNase III activity for plant miRNA biogenesis. DCL1 measures and cleaves
    structured pri-/pre-miRNA hairpins in the DCL1-HYL1/DRB1-SERRATE microprocessor to produce miRNA/miRNA-star
    duplexes.
  molecular_function:
    id: GO:0004525
    label: ribonuclease III activity
  directly_involved_in:
  - id: GO:0031053
    label: primary miRNA processing
  supported_by:
  - reference_id: file:ARATH/DCL1/DCL1-deep-research-falcon.md
    supporting_text: DCL1 is the central RNase III enzyme that processes pri-miRNAs in the nucleus to
      release a miRNA/miRNA-star duplex.
