id: Q9SP32
gene_symbol: DCL1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: DCL1 is the Arabidopsis nuclear Dicer-like RNase III enzyme that processes structured pri-
  and pre-miRNA hairpins into miRNA/miRNA-star duplexes. It works with DRB1/HYL1, SERRATE, and other nuclear
  microprocessor factors in D-bodies to control the precision and efficiency of plant miRNA biogenesis.
  Developmental, antiviral, lsiRNA, ta-siRNA, and seed/flower phenotypes arise mainly from this nuclear
  small-RNA processing role rather than from separate primary functions.
