    action: ACCEPT
    reason: >-
      Dark induction is a central regulatory feature of CCaP1. Both transcript and protein
      levels accumulate in darkness, and the gene name (CCaP - Cytosolic Calcium-binding Protein)
      was characterized precisely through this dark-induction phenotype.
    supported_by:
    - reference_id: PMID:17145720
      supporting_text: >-
