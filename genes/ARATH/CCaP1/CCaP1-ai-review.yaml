gene_symbol: CCaP1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  CCaP1 (Cytosolic calcium-binding protein 1) is a small (152 aa) cytosolic protein in Arabidopsis
  thaliana that binds Ca2+ even in the presence of high Mg2+ concentrations. It contains seven
  approximate repeats of V-E-E-K-K motif and a large intrinsically disordered region. CCaP1 is
  predominantly expressed in petioles and its expression follows a circadian cycle, being induced
  by darkness, sucrose depletion, gibberellic acid, salt stress, and sugar alcohols (mannitol,
  sorbitol), while being suppressed by light, sucrose, and high concentrations of Ca2+ and other
  metal ions. CCaP1 likely functions as a calcium signal mediator or calcium buffer in the cytosol,
  potentially linking carbon status and light signaling to calcium homeostasis.
