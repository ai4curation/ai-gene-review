  review:
    summary: >-
      CCaP1 expression is suppressed by light, with transcript levels following a circadian
      cycle showing lower levels during light phases. This IEP annotation captures the
      transcriptional regulation of the gene by light.
    action: ACCEPT
    reason: >-
      CCaP1 transcript levels are clearly regulated by light stimulus. The gene is repressed
      by light and induced in darkness, showing this is a genuine response to light stimulus
      at the expression level.
    supported_by:
    - reference_id: PMID:17145720
