    action: ACCEPT
    reason: >-
      This is the core molecular function of CCaP1. The protein was directly demonstrated to
      bind calcium using 45Ca2+ overlay assays, and this binding persisted in the presence of
      competing Mg2+ ions.
    supported_by:
    - reference_id: PMID:17145720
      supporting_text: >-
