core_functions:
- molecular_function:
    id: GO:0005509
    label: calcium ion binding
  description: >-
    CCaP1 is a cytosolic calcium-binding protein that binds Ca2+ with specificity over Mg2+.
    It contains seven approximate repeats of a V-E-E-K-K motif within an intrinsically
    disordered region that likely mediates calcium binding. CCaP1 may function as a calcium
    signal mediator or calcium buffer in the cytosol, with expression tightly regulated by
    light/dark cycles, carbon status (sucrose availability), gibberellic acid, and metal ion
    concentrations. Its predominant expression in petioles and dark-induction suggest a role
    in calcium signaling during darkness-associated metabolic changes.
  directly_involved_in:
  - id: GO:0009646
    label: response to absence of light
  - id: GO:0043617
    label: cellular response to sucrose starvation
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: PMID:17145720
    supporting_text: >-
      CCaP1, which consists of 152 amino acid residues, and binds (45)Ca2+ even in the presence of a high concentration of Mg2+.
  - reference_id: PMID:17145720
    supporting_text: >-
      These results suggest that CCaP1 functions as a mediator in response to continuous dark or gibberellic acid.

proposed_new_terms: []

suggested_questions:
- question: >-
    What is the precise calcium-binding mechanism of CCaP1? The V-E-E-K-K repeat motifs
    are unlike canonical EF-hand or C2 calcium-binding domains. Understanding the structural
    basis of calcium binding would clarify whether CCaP1 functions as a high-affinity signal
    mediator or a low-affinity buffer.
- question: >-
    What is the functional consequence of CCaP1 accumulation in darkness? Does CCaP1 modulate
    cytosolic calcium levels during the night phase, and does this affect downstream signaling
    pathways such as circadian clock or starch metabolism?
- question: >-
    Does CCaP1 function redundantly with CCaP2 and CCaP3? CCaP2 is expressed in roots while
    CCaP1 is in petioles, suggesting tissue-specific roles. What are the phenotypic consequences
    of single vs. multiple knockouts?

suggested_experiments:
- description: >-
    Generate ccap1 knockout or CRISPR mutant lines and characterize cytosolic calcium dynamics
    using genetically encoded calcium indicators (e.g., GCaMP or R-GECO) under dark/light
    transitions. This would directly test whether CCaP1 buffers or modulates calcium transients
    during darkness.
  hypothesis: >-
    Loss of CCaP1 will alter cytosolic calcium dynamics specifically during dark periods,
    with elevated or altered calcium transients in petiole cells.
- description: >-
    Perform isothermal titration calorimetry (ITC) or surface plasmon resonance with purified
    recombinant CCaP1 to determine calcium binding affinity, stoichiometry, and selectivity
    over magnesium and other divalent cations. Test truncated forms to map the binding sites
    within the V-E-E-K-K repeat region.
  hypothesis: >-
    CCaP1 binds multiple calcium ions with moderate affinity through its glutamate-rich
    repeat region, functioning as a calcium buffer rather than a high-affinity sensor.
