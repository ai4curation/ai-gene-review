- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Electronic annotation of nuclear localization. PI is a transcription
      factor that functions in the nucleus; nuclear import requires heterodimerization
      with AP3. This is well supported by direct experimental evidence (IDA).
    action: ACCEPT
    reason: Nucleus is the functional location of the active AP3/PI heterodimer and is
      experimentally confirmed.
    supported_by:
    - reference_id: PMID:8698240
      supporting_text: coexpression of AP3-GUS with PI, or PI-GUS with AP3, resulted
        in nuclear localization of GUS activity
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Generic InterPro-based annotation for regulation of DNA-templated
      transcription. Correct but a broad parent of the more specific RNA Pol II
      transcription regulation (GO:0006357) already annotated for PI.
    action: ACCEPT
    reason: PI regulates transcription of floral target genes; the term is accurate
