- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:8698240
  qualifier: located_in
  review:
    summary: Direct experimental (IDA) evidence that PI localizes to the nucleus when co-expressed with AP3. Nuclear localization of the AP3/PI heterodimer is the functionally relevant compartment where PI acts as a transcription factor.
    action: ACCEPT
    reason: Nucleus is the active site of PI function; nuclear import of the AP3/PI heterodimer is directly demonstrated.
    supported_by:
    - reference_id: PMID:8698240
      supporting_text: coexpression of AP3-GUS with PI, or PI-GUS with AP3, resulted in nuclear localization of GUS activity
