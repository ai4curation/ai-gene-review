    summary: ARBA machine-learning electronic annotation to the core biological process of PI, specification of floral organ identity. This is the central developmental role of the B-class gene PI and is independently supported by classical genetic (IMP) evidence.
    action: ACCEPT
    reason: Specification of petal and stamen identity is the defining biological process of PI; the electronic call agrees with strong experimental evidence.
    supported_by:
