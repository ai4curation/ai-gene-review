    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro-based electronic annotation of DNA-binding transcription factor
      activity, the core molecular function of PI. Redundant with the ISS- and
