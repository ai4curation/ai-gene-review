- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IDA
  original_reference_id: PMID:8698240
  qualifier: located_in
  review:
    summary: Direct experimental (IDA) evidence that PI expressed alone (as a PI-GUS fusion, without AP3) is retained in the cytoplasm. This cytoplasmic localization reflects the inactive PI monomer that has not heterodimerized with AP3; upon AP3 co-expression PI relocates to the nucleus. The cytoplasmic pool is real but represents the non-functional, pre-import state rather than PI's site of action.
    action: KEEP_AS_NON_CORE
    reason: Cytoplasmic localization is genuine (directly observed for the PI monomer) but is the inactive state; the functional/core location of PI is the nucleus, so cytoplasm is retained as a non-core localization.
    supported_by:
    - reference_id: PMID:8698240
      supporting_text: Transient transformation assays of either the AP3-GUS or PI-GUS fusion protein alone resulted in cytoplasmic localization of GUS activity
