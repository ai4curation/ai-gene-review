id: P48007
gene_symbol: PI
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: |-
  PISTILLATA (PI) is a B-class floral homeotic MADS-box (MIKC-type) transcription
  factor of Arabidopsis thaliana that specifies petal (whorl 2) and stamen (whorl 3)
  identity within the ABC model of flower development. PI functions as an obligate
  heterodimer with APETALA3 (AP3); the AP3/PI heterodimer binds CArG-box DNA motifs
  in the cis-regulatory regions of target genes through its MADS domain and acts
  within higher-order floral quartet complexes together with SEPALLATA (SEP) and
  APETALA1/AGAMOUS proteins to regulate RNA polymerase II transcription. The protein
  has the canonical MIKC architecture: an N-terminal MADS domain (DNA binding and
  dimerization), an intervening I region, a K-box (coiled-coil region governing
  dimerization specificity), and a C-terminal domain. Nuclear import of PI requires
  co-expression with AP3, so heterodimer formation couples partner availability to
  nuclear accumulation and transcriptional activity. Loss of PI function transforms
  petals into sepals and stamens into carpels. AP3/PI both autoregulates the AP3 and
  PI genes and directly regulates downstream targets such as NAP, AP1, and the GATA
  factors GNC/GNL.
