id: P48007
gene_symbol: PI
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: |-
  PISTILLATA (PI) is a B-class floral homeotic MADS-box (MIKC-type) transcription
  factor of Arabidopsis thaliana that specifies petal (whorl 2) and stamen (whorl 3)
  identity within the ABC model of flower development. PI functions as an obligate
  heterodimer with APETALA3 (AP3); the AP3/PI heterodimer binds CArG-box DNA motifs
  in the cis-regulatory regions of target genes through its MADS domain and acts
  within higher-order floral quartet complexes together with SEPALLATA (SEP) and
  APETALA1/AGAMOUS proteins to regulate RNA polymerase II transcription. The protein
  has the canonical MIKC architecture: an N-terminal MADS domain (DNA binding and
  dimerization), an intervening I region, a K-box (coiled-coil region governing
  dimerization specificity), and a C-terminal domain. Nuclear import of PI requires
  co-expression with AP3, so heterodimer formation couples partner availability to
  nuclear accumulation and transcriptional activity. Loss of PI function transforms
  petals into sepals and stamens into carpels. AP3/PI both autoregulates the AP3 and
  PI genes and directly regulates downstream targets such as NAP, AP1, and the GATA
  factors GNC/GNL.
existing_annotations:
- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: As a MIKC MADS-box transcription factor, the AP3/PI heterodimer binds
      CArG-box cis-regulatory motifs in the promoters of floral target genes to
      regulate their RNA polymerase II transcription. This phylogenetically inferred
      term accurately captures PI's core sequence-specific cis-regulatory DNA binding.
    action: ACCEPT
    reason: Sequence-specific cis-regulatory (CArG-box) DNA binding is a core
      molecular function of PI, supported experimentally by direct promoter binding
      (ChIP) and by the documented CArG-box specificity of the AP3/PI heterodimer.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: the floral homeotic PISTILLATA (PI) protein, required for petal
        and stamen development, has the ability to bind directly to the promoter region
        of AP1
    - reference_id: file:ARATH/PI/PI-notes.md
      supporting_text: Forms a heterodimer with APETALA3, capable of binding to CArG-box
        sequences.
- term:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: PI is a sequence-specific DNA-binding transcription factor that, as the
      AP3/PI heterodimer, regulates RNA polymerase II transcription of floral
      identity genes. This RNA Pol II-specific TF activity term is the most precise
      molecular-function descriptor for PI and is well supported.
    action: ACCEPT
    reason: DNA-binding transcription factor activity is the defining molecular
      function of PI; the RNA Pol II-specific qualifier is appropriate for a
      eukaryotic protein-coding gene regulator.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: the floral homeotic PISTILLATA (PI) protein, required for petal
        and stamen development, has the ability to bind directly to the promoter region
        of AP1
    - reference_id: PMID:12837945
      supporting_text: 'Molecular and phylogenetic analyses of the complete MADS-box
        transcription factor family in Arabidopsis'
- term:
    id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: PI participates in RNA polymerase II transcriptional regulation of
      floral target genes as part of the AP3/PI heterodimer and floral quartet
      complexes. This process term is correct but is a general parent of the more
      specific floral specification process; it is retained as a valid process
      annotation.
    action: ACCEPT
    reason: Regulation of RNA Pol II transcription is the mechanistic process through
      which PI exerts its developmental function and is well supported by direct
      target regulation studies.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: provides independent support for the hypothesis that AP1 is a
        direct target of the AP3/PI heterodimer
    - reference_id: file:ARATH/PI/PI-notes.md
      supporting_text: AP3/PI both autoregulates the AP3 and PI genes and directly
        regulates downstream targets such as NAP, AP1, and the GATA factors GNC/GNL.
- term:
    id: GO:0000977
    label: RNA polymerase II transcription regulatory region sequence-specific DNA
      binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: InterPro-based electronic annotation for sequence-specific binding to
      RNA Pol II regulatory regions. This is consistent with PI's experimentally
      established CArG-box DNA binding as part of the AP3/PI heterodimer and overlaps
      the more curator-preferred IBA term GO:0000978.
    action: ACCEPT
    reason: Accurate for a MADS-box TF; PI binds sequence-specific cis-regulatory
      DNA. Slightly redundant with GO:0000978 but biologically correct.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: the floral homeotic PISTILLATA (PI) protein, required for petal
        and stamen development, has the ability to bind directly to the promoter region
        of AP1
