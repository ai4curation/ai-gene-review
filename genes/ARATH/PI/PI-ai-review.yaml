- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: As a MIKC MADS-box transcription factor, the AP3/PI heterodimer binds CArG-box cis-regulatory motifs in the promoters of floral target genes to regulate their RNA polymerase II transcription. This phylogenetically inferred term accurately captures PI's core sequence-specific cis-regulatory DNA binding.
    action: ACCEPT
    reason: Sequence-specific cis-regulatory (CArG-box) DNA binding is a core molecular function of PI, supported experimentally by direct promoter binding (ChIP) and by the documented CArG-box specificity of the AP3/PI heterodimer.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: the floral homeotic PISTILLATA (PI) protein, required for petal and stamen development, has the ability to bind directly to the promoter region of AP1
