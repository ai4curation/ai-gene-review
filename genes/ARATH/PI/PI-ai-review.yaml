- term:
    id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: InterPro-based electronic annotation asserting positive (activating) regulation of RNA Pol II transcription. PI/AP3 does activate some targets (e.g. NAP), but it also directly represses others (AP1, GNC/GNL), so PI is a context- dependent dual regulator rather than a dedicated activator. The directional term over-specifies one mode of action.
    action: MARK_AS_OVER_ANNOTATED
    reason: PI acts as both an activator and a repressor of RNA Pol II targets; the activator-only directional term is not generally accurate and over-states a single regulatory direction inferred electronically from domain signatures.
    supported_by:
    - reference_id: PMID:16640596
      supporting_text: AP3/PI directly acts, in combination with other factors, to restrict the expression of AP1
    - reference_id: file:ARATH/PI/PI-notes.md
      supporting_text: AP3/PI represses GATA21/GNC and GATA22/GNL.
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: Protein dimerization activity is a core molecular function of PI. PI functions as an obligate heterodimer with AP3; heterodimer formation (via the MADS and K domains) is required for DNA binding, nuclear import, and all known PI activity. This is one of the most central and well-supported functions of PI.
    action: ACCEPT
    reason: AP3/PI obligate heterodimerization is essential for PI function; dimerization is therefore a core molecular function, consistent with project guidance to retain PI/AP3 heterodimerization as core.
    supported_by:
    - reference_id: PMID:15604664
      supporting_text: the MADS domain that mediates DNA binding and dimerization, and the K domain that mediates protein protein interaction
    - reference_id: file:ARATH/PI/PI-notes.md
      supporting_text: Forms a heterodimer with APETALA3, capable of binding to CArG-box sequences.
    - reference_id: file:ARATH/PI/PI-deep-research-falcon.md
      supporting_text: Class B proteins AP3 and PI bind DNA only as a heterodimer; AP3-PI is the core B-class functional unit required for autoregulatory maintenance.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:15604664
  qualifier: enables
  review:
    summary: Generic protein binding from an IPI interaction with SEP3 (UniProtKB O22456) via the K domain. The underlying biology (PI participating in protein-protein interactions / heterodimer and floral-quartet complex formation) is real and important, but the generic protein binding term is uninformative; the specific function is better captured by protein dimerization activity (GO:0046983).
    action: MARK_AS_OVER_ANNOTATED
    reason: Bare protein binding (GO:0005515) provides no functional specificity; per curation guidelines a more informative term is preferred, and PI's dimerization function is already represented by GO:0046983.
    supported_by:
    - reference_id: PMID:15604664
      supporting_text: the K domain that mediates protein protein interaction
- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IPI
  original_reference_id: PMID:25533953
  qualifier: enables
  review:
    summary: This IPI annotation derives from a large-scale yeast-one-hybrid (Y1H) secondary cell wall gene regulatory network screen, in which PI scored as binding the promoter of the xylan-biosynthesis gene IRX14 (AT4G36890). The molecular activity (binding cis-regulatory DNA) is genuinely true for a MADS-box TF such as PI. However, the supporting evidence is a high-throughput Y1H hit in a root/xylem context where PI is not normally expressed (each promoter bound an average of 38 TFs), so it most likely reflects in vitro DNA-binding capacity rather than an in vivo floral regulatory function. The general cis-regulatory binding term is retained but flagged as non-core; PI's physiologically relevant DNA binding is the CArG-box binding of the AP3/PI heterodimer at floral targets.
    action: KEEP_AS_NON_CORE
    reason: The MF term is correct for a MADS TF, but the single supporting datum is a high-throughput Y1H interaction with a secondary-cell-wall promoter outside PI's normal expression domain and is not part of PI's core floral function. Per guidelines an experimental annotation is not removed; it is retained as non-core.
    supported_by:
    - reference_id: PMID:25533953
      supporting_text: Each promoter interacted with an average of 38 different proteins, generating even more possibilities for combinatorial, redundant, or condition-specific gene regulation.
    - reference_id: file:ARATH/PI/PI-notes.md
      supporting_text: PI is a floral organ-identity TF not normally expressed in root xylem; this Y1H hit is best treated as a non-core/over-annotated interaction
