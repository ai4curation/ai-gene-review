taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  IPGAL2 (INCREASED PETAL GROWTH ANISOTROPY 1-like protein 2) is a microtubule-associated
  protein encoded by At1g48280 in Arabidopsis thaliana. It is a member of the IPGA1 family,
  sharing conserved C-terminal motifs and predicted coiled-coil domains with IPGA1, IPGAL1,
  and CHUP1. IPGAL2 localizes to cortical microtubule arrays and directly binds microtubules.
  The IPGA1 family is conserved among land plants and is implicated in the regulation of
  cortical microtubule organization, which influences anisotropic cell expansion and organ
  morphogenesis. IPGAL2 may function redundantly with IPGA1 and IPGAL1 in modulating
  microtubule alignment.
