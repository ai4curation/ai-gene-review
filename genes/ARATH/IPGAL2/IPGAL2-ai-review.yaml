- id: PMID:31198941
  title: Arabidopsis IPGA1 is a microtubule-associated protein essential for cell
    expansion during petal morphogenesis.
  findings:
  - statement: >-
      IPGA1 is a microtubule-associated protein that colocalizes with and directly binds
      cortical microtubules, and negatively regulates cortical microtubule organization
      into parallel arrays, affecting petal growth anisotropy.
    supporting_text: "INCREASED PETAL GROWTH ANISOTROPY 1 (IPGA1), a previously uncharacterized microtubule-associated protein, regulates petal growth and shape by affecting cortical microtubule organization"
  - statement: >-
      IPGAL2 (AT1G48280) is a homolog of IPGA1 that shares conserved C-terminal motifs
      and coiled-coil domains with IPGA1, IPGAL1, and CHUP1.
    supporting_text: "there are three genes (AT3G25690, AT1G07120, and AT1G48280) that encode proteins strikingly similar to the C-terminal region of IPGA1"
  - statement: >-
      IPGAL2 localizes to cortical microtubule arrays in Arabidopsis epidermal cells,
      as demonstrated by confocal microscopy of GFP-tagged protein.
    supporting_text: "both IPGA1L1 and IPGA1L2 localized to cortical microtubule arrays in all of 20 observed cells"
  - statement: >-
      The IPGA1 family members including IPGAL2 represent a previously unidentified
      small MAP family associated with cortical microtubules.
    supporting_text: "IPGA proteins represent a previously unidentified small MAP family"
  - statement: >-
      IPGAL2 may function redundantly with IPGA1 and other family members in
      regulating microtubule alignment, which could explain the relatively weak
      phenotype of ipga1 single mutants.
    supporting_text: "Other potential homologs of IPGA1, including IPGAL1, IPGAL2, and in particular CHUP1...might also participate the regulation of microtubule alignments"
  - statement: >-
      The IPGA1 family is conserved among land plants including mosses, monocots, and
      dicots, but is absent from algae, animals, and yeast.
    supporting_text: "the IPGA1 gene is conserved in diverse plant species, including mosses, monocots, and dicots, but is not found in algae"
core_functions:
- description: >-
    IPGAL2 is a microtubule-associated protein that binds cortical microtubules and
    likely participates in the regulation of cortical microtubule organization. As a
    member of the IPGA1 family, it may function redundantly with IPGA1 in modulating
    microtubule alignment and stability, which in turn influences anisotropic cell
    expansion during organ morphogenesis.
