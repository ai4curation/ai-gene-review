- term:
    id: GO:0005856
    label: cytoskeleton
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: >-
      Cytoskeleton annotation is a broad parent term consistent with the more specific
      cortical microtubule localization observed for IPGAL2. This IEA annotation is
