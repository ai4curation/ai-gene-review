- term:
    id: GO:0008017
    label: microtubule binding
  evidence_type: IDA
  original_reference_id: PMID:31198941
  review:
    summary: >-
      Microtubule binding is supported by direct evidence. The paper demonstrates that
      the homolog IPGA1 directly binds microtubules in co-sedimentation assays, and
      IPGAL2-GFP colocalizes with cortical microtubule arrays in Arabidopsis epidermal
      cells. The UniProt entry also states that the protein colocalizes with cortical
      microtubules and binds directly to microtubules.
    action: ACCEPT
    reason: >-
      The annotation is well supported by localization data for IPGAL2 and biochemical
      binding data for the closely related IPGA1 protein.
    supported_by:
    - reference_id: PMID:31198941
      supporting_text: "both IPGA1L1 and IPGA1L2 localized to cortical microtubule arrays in all of 20 observed cells"
- term:
    id: GO:0055028
    label: cortical microtubule
  evidence_type: IDA
  original_reference_id: PMID:31198941
  review:
    summary: >-
      Cortical microtubule localization is directly demonstrated for IPGAL2 by confocal
      microscopy of GFP-tagged IPGAL2 expressed in Arabidopsis epidermal cells. Both
      IPGAL1 and IPGAL2 localized to cortical microtubule arrays.
    action: ACCEPT
    reason: >-
      The annotation is directly supported by experimental localization data for IPGAL2.
    supported_by:
    - reference_id: PMID:31198941
      supporting_text: "both IPGA1L1 and IPGA1L2 localized to cortical microtubule arrays in all of 20 observed cells"
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  review:
    summary: >-
      Chloroplast localization is predicted by the AtSubP subcellular prediction method.
      However, IPGAL2 is a member of the IPGA1 family of microtubule-associated proteins
      and has been experimentally shown to localize to cortical microtubules, not
      chloroplasts. The chloroplast prediction may be influenced by sequence similarity
      to CHUP1, a related family member that does associate with chloroplasts, but
      IPGAL2 itself lacks a chloroplast transit peptide and the experimental evidence
      contradicts chloroplast localization.
    action: REMOVE
    reason: >-
      Computational prediction is contradicted by direct experimental evidence showing
      IPGAL2 localizes to cortical microtubules, not chloroplasts.
- term:
    id: GO:0000226
    label: microtubule cytoskeleton organization
  evidence_type: ISS
  original_reference_id: PMID:31198941
  review:
    summary: >-
      IPGAL2 is a member of the IPGA1 family of microtubule-associated proteins. IPGA1
      negatively regulates cortical microtubule organization into parallel arrays, and
      IPGAL2 may function redundantly with IPGA1 in modulating microtubule organization.
      IPGAL2 localizes to cortical microtubule arrays, consistent with a role in
      microtubule cytoskeleton organization.
    action: NEW
    reason: >-
      Inferred from sequence similarity to IPGA1, which is directly demonstrated to
      regulate microtubule organization, and from IPGAL2 localization to cortical
      microtubule arrays.
    supported_by:
    - reference_id: PMID:31198941
      supporting_text: "Other potential homologs of IPGA1, including IPGAL1, IPGAL2, and in particular CHUP1...might also participate the regulation of microtubule alignments"
