id: Q9SCZ4
gene_symbol: FER
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: FERONIA (FER) is a plasma-membrane receptor-like protein kinase of the
  CrRLK1L (Catharanthus roseus RLK1-like) subfamily and a master cell-surface sensor
  in Arabidopsis. It has an extracellular tandem malectin-like domain that, together
  with GPI-anchored co-receptors of the LORELEI/LLG family, perceives secreted RALF
  (rapid alkalinization factor) peptide ligands, and an intracellular serine/threonine
  protein kinase domain (EC 2.7.11.1) that autophosphorylates and phosphorylates
  downstream substrates. RALF binding activates FER, which acts as an upstream regulator
  of RAC/ROP GTPase signaling through ROPGEFs, driving NADPH-oxidase-dependent reactive
  oxygen species production; FER thereby couples cell-wall integrity sensing to control
  of polarized cell growth (root hairs, trichomes, general cell elongation) and to
  inhibition of cell expansion via phosphorylation-dependent down-regulation of the
  plasma-membrane H+-ATPase and apoplastic alkalinization. In the female gametophyte
  FER accumulates asymmetrically at the synergid filiform apparatus and is essential
  for pollen tube reception, sperm release, and the polytubey block during fertilization,
  acting in heterocomplexes with the related CrRLK1Ls HERK1 and ANJEA. FER is broadly
  expressed (absent only in mature pollen) and serves as a signaling hub that integrates
  hormone responses (abscisic acid, brassinosteroid, ethylene, auxin), mechanosensing,
  flowering-time control, plant immunity, and powdery-mildew susceptibility. Although
  FER is a genuine active kinase, several of its functions (notably pollen tube
  reception) can be supported by kinase-inactive FER, indicating scaffolding/co-receptor
  roles in addition to catalysis.
existing_annotations:
- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FER is a bona fide protein kinase; the IEA captures a correct but general
      molecular function.
    action: KEEP_AS_NON_CORE
    reason: Correct but superseded by the more specific serine/threonine kinase terms
      (GO:0004674/GO:0106310) and by the IDA protein kinase activity annotation from
      PMID:17673660. The core MF for FER is the receptor serine/threonine kinase activity.
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: 'RecName: Full=Receptor-like protein kinase FERONIA'
- term:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: FER is a serine/threonine protein kinase (EC 2.7.11.1); this is a correct
      and central molecular function.
    action: ACCEPT
    reason: UniProt assigns EC 2.7.11.1 and the Ser/Thr protein kinase family; the
      kinase domain (536-810) with active-site Asp-661 and ATP-binding Lys-565 is
      experimentally validated (K565R abolishes activity). FER also autophosphorylates
      on Thr residues in vitro.
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: Belongs to the protein kinase superfamily. Ser/Thr protein
        kinase family.
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: 'MUTAGEN         565'
- term:
    id: GO:0004714
    label: transmembrane receptor protein tyrosine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: The receptor-kinase framing is correct, but the tyrosine specificity is
      wrong - FER is a serine/threonine receptor kinase, not a tyrosine kinase.
    action: MODIFY
    reason: This IEA derives from InterPro IPR045272 (ANXUR1/2-like) mapped through a
      generic Tyr/Ser-Thr catalytic-domain signature (Pfam PK_Tyr_Ser-Thr). UniProt
      and Rhea assign FER only Ser/Thr activity (EC 2.7.11.1), and plant CrRLK1Ls are
      Ser/Thr (RD) kinases. The correct receptor molecular function is transmembrane
      receptor protein serine/threonine kinase activity (GO:0004675), which also
      captures the single-pass transmembrane receptor architecture.
    proposed_replacement_terms:
    - id: GO:0004675
      label: transmembrane receptor protein serine/threonine kinase activity
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: Belongs to the protein kinase superfamily. Ser/Thr protein
        kinase family.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: FER binds ATP as the phosphate donor for its kinase activity.
    action: KEEP_AS_NON_CORE
    reason: Correct cofactor-binding function supporting the kinase activity; FER has
      a defined ATP-binding site (residues 542-550 and Lys-565). Standard supporting
      MF for an active kinase rather than a core distinguishing function.
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: /ligand="ATP"
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: located_in
  review:
    summary: Plasma membrane is the correct and core subcellular location of this
      single-pass receptor kinase.
    action: ACCEPT
    reason: FER is a single-pass type I plasma-membrane protein, confirmed by multiple
      IDA/HDA studies; the electronic localization agrees with experiment.
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: Single-pass type I membrane protein
- term:
    id: GO:0106310
    label: protein serine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: Consistent with FER being a Ser/Thr kinase; RALF-activated FER is
      phosphorylated on serines and autophosphorylates.
    action: KEEP_AS_NON_CORE
    reason: Rhea-based electronic annotation for the serine-directed half of the
      Ser/Thr kinase reaction. Correct and supported (FER phosphosites Ser-858/871/874),
      but redundant with the broader serine/threonine kinase term that is the core MF.
    supported_by:
    - reference_id: file:ARATH/FER/FER-uniprot.txt
      supporting_text: Phosphorylated at Ser-858, Ser-871 and Ser-874 upon activation
        by RALF1.
