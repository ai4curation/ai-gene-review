suggested_questions:
- question: Which RALF peptide(s) and cell-wall ligands activate FER in each biological
    context (root cell expansion, root hair growth, pollen tube reception, immunity),
    and how is signaling specificity achieved through different LLG/LRE co-receptors?
  experts:
  - Plant peptide-signaling researchers
  - CrRLK1L receptor biologists
- question: Which FER functions require catalytic kinase activity versus scaffolding,
    and what are the bona fide in vivo phosphorylation substrates of FER beyond AHA2?
  experts:
  - Plant receptor-kinase biochemists
  - Phosphoproteomics specialists
- question: How does FER mechanistically convert cell-wall perturbation into RAC/ROP-ROS
    output, and what role does the malectin-like domain's pectin/polygalacturonic-acid
    binding play?
  experts:
  - Cell-wall integrity signaling researchers
suggested_experiments:
- hypothesis: FER's pollen-tube-reception function is kinase-independent (scaffolding)
    whereas its RALF-induced root growth inhibition requires catalytic activity.
  description: Complement fer-4 with kinase-dead (K565R) versus wild-type FER and
    quantitatively assay pollen tube reception/sperm release, micropylar ROS, and
    RALF1-induced root growth inhibition and AHA2 phosphorylation in parallel.
- hypothesis: FER directly senses cell-wall pectin status via its malectin-like domain
    to trigger RAC/ROP-ROS signaling.
  description: Use purified FER ectodomain binding assays against defined pectin
    fragments (polygalacturonic acid, de-/methyl-esterified) combined with in planta
    ROS imaging after enzymatic cell-wall modification in wild-type versus fer mutants.
- hypothesis: Distinct LLG/LRE co-receptors define FER ligand specificity and tissue-
    specific outputs.
  description: Reconstitute FER with LLG1, LLG2/3, or LRE in protoplasts/heterologous
    systems and measure binding and signaling responses to a panel of RALF peptides.
