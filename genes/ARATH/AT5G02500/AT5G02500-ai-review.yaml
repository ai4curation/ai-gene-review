        supporting_text: HSP70/HSC70 proteins are **ATP-dependent molecular chaperones**
          central to cytosolic proteostasis
      - reference_id: file:ARATH/AT5G02500/AT5G02500-uniprot.txt
        supporting_text: In cooperation with other chaperones, Hsp70s are key components
          that facilitate folding of de novo synthesized proteins, assist translocation
          of precursor proteins into organelles, and are responsible for degradation
          of damaged protein under stress conditions
      - reference_id: PMID:11402207
        supporting_text: comprehensive reverse transcriptase-polymerase chain reaction
          analysis for 11 hsp70s was conducted including analysis of organ-specific
          and developmental expression
  - description: Negative regulation of basal thermotolerance through interaction
      with HsfA transcription factors and control of Hsp101 expression.
    molecular_function:
