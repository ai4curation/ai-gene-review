  - term:
      id: GO:0010187
      label: negative regulation of seed germination
    evidence_type: IMP
    original_reference_id: PMID:21586649
    review:
      summary: HSC70-1 negatively regulates seed germination as shown by IMP in PMID:21586649,
        consistent with its negative regulation of ABA responses.
      action: KEEP_AS_NON_CORE
      reason: IMP evidence supports HSC70-1's role in ABA-mediated germination control.
        This is retained as a non-core, ABA-linked physiological effect rather than
        as the central molecular function of this Hsp70 chaperone.
      additional_reference_ids: [PMID:21586649]
      supported_by:
        - reference_id: PMID:21586649
          supporting_text: Plants overexpressing HSC70-1 or with reduced HSP90.2 activity
            are hypersensitive to ABA in seed germination assays
  - term:
      id: GO:0090332
      label: stomatal closure
    evidence_type: IMP
    original_reference_id: PMID:21586649
    review:
      summary: HSC70-1 negatively regulates stomatal closure as shown by IMP in PMID:21586649.
      action: KEEP_AS_NON_CORE
      reason: The stomatal closure annotation is valid IMP evidence but HSC70-1 acts
        as a NEGATIVE regulator - overexpression compromises closure. The term is
        retained as a non-core physiological process because it reflects stress and
        ABA signaling context rather than the primary chaperone activity.
      supported_by:
        - reference_id: PMID:21586649
          supporting_text: Plants overexpressing HSC70-1 or with reduced HSP90.2 activity
            are compromised in the dark-, CO(2)-, flagellin 22 peptide-, and abscisic
            acid (ABA)-induced stomatal closure.
  - term:
      id: GO:0005829
      label: cytosol
    evidence_type: RCA
    original_reference_id: PMID:21166475
    negated: true
    review:
      summary: Negated cytosol localization based on RCA conflicts with positive
        cytosol evidence for HSC70-1.
      action: REMOVE
      reason: The NOT qualifier means the annotation asserts that HSC70-1 is not
        located in the cytosol, not merely that it is not exclusively cytosolic. That
        interpretation conflicts with positive cytosol annotations, UniProt
        cytosolic localization, and the PMID:21166475 cytosolic proteome context.
      supported_by:
        - reference_id: PMID:21166475
          supporting_text: The cytosolic protein fraction from cell suspensions of
            Arabidopsis thaliana was isolated and analyzed using offline strong
            cation exchange liquid chromatography and LC-MS/MS.
