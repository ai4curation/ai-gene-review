          supporting_text: Upon exposure to elevated temperatures, HSC70-1 undergoes
            rapid translocation to the nucleus in a process that is dependent on simultaneous
            nuclear import of heat shock factor 1 (HSF1).
        - reference_id: PMID:18065690
          supporting_text: Arabidopsis SGT1a and SGT1b proteins associate with HSC70
            in vivo and distribute with HSC70 in the cytosol and nucleus.
        - reference_id: PMID:32573848
          supporting_text: AtHsc70-1 negatively regulates the basal heat tolerance
            in Arabidopsis thaliana through affecting the activity of HsfAs and Hsp101.
  - term:
      id: GO:0006952
      label: defense response
    evidence_type: IEA
    original_reference_id: GO_REF:0000043
    review:
      summary: HSC70-1 contributes to defense response through its role in maintaining
        NB-LRR immune receptor stability and function.
      action: KEEP_AS_NON_CORE
      reason: HSC70-1 does participate in immune responses (PMID:18065690), but this
        is a pleiotropic function rather than core molecular activity. Overexpression
        actually impairs immunity, suggesting a complex regulatory role.
      supported_by:
        - reference_id: PMID:18065690
          supporting_text: HSC70-1 overexpression disables resistance to virulent
            and avirulent pathogens.
  - term:
      id: GO:0009408
      label: response to heat
    evidence_type: IEA
    original_reference_id: GO_REF:0000117
    review:
      summary: HSC70-1 responds to heat stress through nuclear translocation and regulation
        of HSF activity, though paradoxically its loss enhances basal thermotolerance.
      action: ACCEPT
      reason: The term 'response to heat' is appropriate but doesn't fully capture
        HSC70-1's NEGATIVE regulatory role. However, there isn't a perfect replacement
        term. The annotation is accurate as HSC70-1 does respond to and participate
        in heat stress responses, even though it paradoxically acts as a negative
        regulator of basal thermotolerance. Accept with this caveat.
      supported_by:
        - reference_id: PMID:32573848
          supporting_text: Arabidopsis hsc70-1 mutant seedlings show elevated basal
            heat tolerance compared with wild-type.
