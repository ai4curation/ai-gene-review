      - reference_id: PMID:32573848
        supporting_text: We provide genetic evidence that Hsc70-1 is a negative regulator
          affecting HsfA1d/A1e/A2 activators, which in turn regulate Hsp101 expression
          and basal thermotolerance.
existing_annotations:
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSC70-1 is predominantly localized to the cytoplasm under non-stress
        conditions, where it maintains HSF transcription factors in their inactive
        state and performs housekeeping protein folding functions.
      action: ACCEPT
      reason: Well-supported by IBA phylogenetic inference and experimental evidence.
        PMID:32573848 demonstrates cytoplasmic localization and shows HSC70-1 sequesters
        HsfA1d and HsfA1e in the cytosol under non-heat stress conditions. PMID:18065690
        confirms cytoplasmic distribution. This is a core cellular localization for
        HSC70-1's primary functions.
      supported_by:
        - reference_id: PMID:32573848
          supporting_text: Hsc70-1 showed physical interaction with HsfA1d and HsfA1e
            protein in the cytosol under non-HS conditions.
        - reference_id: PMID:18065690
          supporting_text: Arabidopsis SGT1a and SGT1b proteins associate with HSC70
            in vivo and distribute with HSC70 in the cytosol and nucleus.
  - term:
      id: GO:0016887
      label: ATP hydrolysis activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSC70-1 possesses ATP hydrolysis activity that is essential for its
        chaperone function, driving conformational changes between ATP-bound (low
        substrate affinity) and ADP-bound (high substrate affinity) states.
      action: ACCEPT
      reason: Core molecular function of all Hsp70 family members. ATP hydrolysis
        is the central enzymatic activity that powers the protein folding cycle. Deep
        research confirms ATP-dependent conformational cycles are fundamental to HSC70-1
        function.
      additional_reference_ids:
        - file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
      supported_by:
        - reference_id: file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
          supporting_text: In its ATP-bound conformation, HSC70-1 adopts an open state
            with substantially reduced affinity for protein substrates... Upon binding
            of a J-domain protein cochaperone... the ATPase activity of HSC70-1 is
            stimulated approximately 20-100 fold, accelerating the hydrolysis of ATP
            to ADP.
  - term:
      id: GO:0031072
      label: heat shock protein binding
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSC70-1 binds to other heat shock proteins, particularly through interactions
        with HSF transcription factors and potentially other Hsps in chaperone complexes.
      action: MODIFY
      reason: The local experimental support is physical interaction with HsfA1d and
        HsfA1e, which are DNA-binding heat shock transcription factors rather than
        unfolded protein substrates. The more specific replacement captures the
        supported HSF-client interaction without converting it to unfolded protein
        binding.
      proposed_replacement_terms:
        - id: GO:0140297
          label: DNA-binding transcription factor binding
      supported_by:
        - reference_id: PMID:32573848
          supporting_text: Hsc70-1 showed physical interaction with HsfA1d and HsfA1e
            protein in the cytosol under non-HS conditions.
  - term:
      id: GO:0044183
      label: protein folding chaperone
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSC70-1 functions as a protein folding chaperone, facilitating ATP-dependent
        folding of nascent and misfolded proteins.
      action: ACCEPT
      reason: Core molecular function well-supported by IBA and literature. HSC70-1
        is a canonical member of the Hsp70 chaperone family with established protein
        folding activity.
      additional_reference_ids:
        - file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
      supported_by:
        - reference_id: file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
          supporting_text: HSC70-1 functions as a molecular chaperone through an ATP-driven
            cycle that enables rapid, reversible binding to client protein substrates
            while maintaining extremely low intrinsic ATP hydrolysis rates that must
            be stimulated by cochaperones.
  - term:
      id: GO:0042026
      label: protein refolding
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSC70-1 participates in protein refolding through ATP-dependent cycles
        of substrate binding and release, particularly during stress recovery.
      action: ACCEPT
      reason: Well-supported by IBA phylogenetic evidence. Protein refolding is a
        core Hsp70 family function, particularly important during recovery from heat
        stress when aggregated proteins must be resolubilized.
      additional_reference_ids:
        - file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
      supported_by:
        - reference_id: file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
          supporting_text: HSC70-1 possesses the capacity to actively unfold and disaggregate
            stable, pre-formed protein aggregates through a mechanism termed entropic
            pulling.
  - term:
      id: GO:0000166
      label: nucleotide binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000043
    review:
      summary: HSC70-1 binds ATP and ADP nucleotides as part of its chaperone cycle.
      action: ACCEPT
      reason: Accurate but generic IEA annotation. Nucleotide binding is essential
        for HSC70-1 function, though 'ATP binding' is more specific and already annotated.
