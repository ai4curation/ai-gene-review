---
id: P22953
gene_symbol: HSP70-1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: HSP70-1/HSC70-1 is a cytosolic and nuclear Arabidopsis Hsp70-family
  molecular chaperone. Its best-supported core role is ATP-dependent chaperone function
  in protein folding/refolding and proteostasis. Experimental evidence also supports
  a regulatory role in basal thermotolerance through physical interaction with HsfA1d
  and HsfA1e and modulation of Hsp101 expression. Additional roles in immunity, ABA-linked
  stomatal closure, seed germination, mRNA binding, and protein interactions are retained
  where supported by existing annotations, but they are treated as non-core or context-specific
  rather than as the primary function of the gene product.
core_functions:
  - description: ATP-dependent Hsp70-family chaperone activity supporting protein
      folding, refolding, and proteostasis in the cytosol and nucleus.
