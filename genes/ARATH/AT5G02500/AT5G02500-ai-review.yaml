        label: cytosol
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: file:ARATH/AT5G02500/AT5G02500-deep-research-falcon.md
        supporting_text: HSC70-1 physically interacts with **HsfA1d and HsfA1e**
          (Y2H and BiFC), with interaction signals reported primarily in the cytosol,
          supporting a model in which HSC70-1 restrains HSF activity under non-stress
