  - term:
      id: GO:0005634
      label: nucleus
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: HSC70-1 can translocate to the nucleus, particularly during heat stress
        when it co-localizes with HSF1.
      action: ACCEPT
      reason: Accurate IEA annotation supported by experimental evidence. HSC70-1
        contains nuclear localization signals and undergoes stress-induced nuclear
        translocation.
      additional_reference_ids:
        - file:ARATH/AT5G02500/AT5G02500-deep-research-perplexity.md
        - PMID:32573848
      supported_by:
