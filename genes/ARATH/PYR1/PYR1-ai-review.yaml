      (Figure 4C, SOM Figures 4 and 5), which shows that ABA binds PYR1
  - reference_id: PMID:19933100
    supporting_text: >-
      ABA binds directly to PYR1 within a large internal water-filled cavity, rather
      than acting as a molecular glue at an interface with PP2Cs
  - reference_id: file:ARATH/PYR1/PYR1-deep-research-falcon.md
    supporting_text: >-
      to PYR1 observed by NMR chemical shift perturbations upon ABA addition
- description: >-
    Upon ABA binding, PYR1 binds to and inhibits clade-A type-2C protein phosphatases
    (ABI1, ABI2, HAB1, AHG3/PP2CA), the negative regulators of ABA signaling; this
    ABA-dependent phosphatase inhibition is the central signal-transduction output of
    the receptor and de-represses downstream SnRK2 kinases.
