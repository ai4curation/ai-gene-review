- term:
    id: GO:0019207
    label: kinase regulator activity
  evidence_type: IDA
  original_reference_id: PMID:19407142
  qualifier: enables
  review:
    summary: >-
      This TAIR annotation reflects PYR1's role upstream of SnRK2 kinase activity:
      by inhibiting PP2Cs, ABA-bound PYR1 indirectly de-represses SnRK2 kinases. The
      measured molecular activity in the paper is PP2C inhibition, not direct kinase
      regulation.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      PYR1 does not directly bind or regulate a kinase; its effect on SnRK2 kinase
      activity is indirect, via inhibition of the PP2Cs that repress SnRK2. The
      direct, experimentally measured molecular function is protein phosphatase
      inhibitor activity (GO:0004864). Retained but flagged because the term implies
      a direct kinase-regulatory activity that the data do not show.
    supported_by:
    - reference_id: PMID:19407142
      supporting_text: >-
        we propose a hypothetical model (Figure 4D) for ABA action in which ABA and
        PYR/PYLs inhibit PP2Cs, which in turn relieves repression of positive factors
        such as the SnRK2s
