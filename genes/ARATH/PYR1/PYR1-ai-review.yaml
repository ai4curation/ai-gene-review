suggested_questions:
- question: >-
    Is PYR1's nuclear pool functionally distinct from its cytosolic pool, and does it
    regulate a distinct set of nuclear PP2Cs or downstream targets?
- question: >-
    How do the multiple regulatory routes (CARK phosphorylation, RSL1/FREE1-mediated
    ubiquitylation and vacuolar degradation, CAR-mediated membrane recruitment)
    integrate to set PYR1 abundance and ABA sensitivity in vivo?
