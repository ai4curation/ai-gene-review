id: O49686
gene_symbol: PYR1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  PYR1 (PYRABACTIN RESISTANCE 1; also RCAR11/ABIP6) is the founding member of the
  PYR/PYL/RCAR family of intracellular abscisic acid (ABA) receptors in Arabidopsis
  thaliana. It is a small (191 aa) soluble protein with a START/Bet v1-like
  helix-grip fold that binds the phytohormone ABA within a large internal cavity.
  PYR1 acts as a homodimer; ABA binding triggers a gate-latch-lock conformational
  change that closes loops over the hormone and creates a surface enabling the
  receptor to dock into and inhibit the catalytic site of clade-A type-2C protein
  phosphatases (PP2Cs such as ABI1, ABI2, HAB1 and AHG3/PP2CA). Because these PP2Cs
  are negative regulators of ABA signaling, ABA-dependent PP2C inhibition by PYR1
  de-represses downstream SnRK2 protein kinases (e.g. OST1/SnRK2.6), driving ABA
  responses including stomatal closure, inhibition of seed germination, and
  drought/abiotic-stress tolerance. PYR1 functions chiefly in the cytosol and
  nucleus; it is also transiently recruited to the plasma membrane by C2-domain CAR
  proteins and targeted for ubiquitin-mediated vacuolar degradation via the RING E3
  ligase RSL1 and FREE1/FYVE1. Its activity is further tuned by phosphorylation
  (e.g. at Thr78 by the cytosolic ABA receptor kinases CARK1/CARK2/4/5/7/11), which
  modulates receptor stability, monomerization and ABA-binding affinity. PYR1 can be
  activated by both natural (+)-ABA and synthetic (-)-ABA, and by the synthetic
  agonist pyrabactin.
