id: Q9LDI3
gene_symbol: CIPK24
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: CIPK24 (also known as SOS2, SALT OVERLY SENSITIVE 2; SnRK3.11) is a calcium-regulated
  serine/threonine protein kinase of the SnRK3/CIPK (CBL-INTERACTING PROTEIN KINASE)
  family and the central kinase of the SOS salt-stress signaling pathway in Arabidopsis.
  It comprises an N-terminal SNF1/AMPK-like catalytic kinase domain and a C-terminal
  regulatory region containing a NAF/FISL autoinhibitory motif and a PPI motif. In the
  resting state the kinase is autoinhibited; binding of a Ca2+-loaded calcineurin-B-like
  (CBL) calcium sensor to the NAF motif relieves autoinhibition and activates the kinase
  in a calcium-dependent manner. CBL4/SOS3 (myristoylated, EF-hand) recruits and activates
  the kinase at the plasma membrane, where the CBL4-CIPK24 complex phosphorylates the
  autoinhibitory C-terminus of the plasma-membrane Na+/H+ antiporter SOS1/NHX7 to drive
  Na+ extrusion, while CBL10 recruits the kinase to the tonoplast to regulate vacuolar Na+
  sequestration. The kinase also phosphorylates its activating CBL partners (e.g. CBL10/SCaBP8),
  binds the PP2C phosphatase ABI2 (a negative regulator) through its PPI motif, and connects
  to additional salt- and reactive-oxygen-signaling factors. Through these activities CIPK24
  maintains intracellular Na+/K+ homeostasis and confers salt-stress tolerance.
