core_functions:
- description: Acts as a calcium-dependent serine/threonine protein kinase that is autoinhibited
    by its C-terminal NAF motif and activated upon binding of Ca2+-loaded CBL calcium sensors
    (CBL4/SOS3, CBL10) to that motif
  supported_by:
  - reference_id: PMID:10725382
    supporting_text: Autophosphorylation assays show that SOS2 is an active protein kinase.
  - reference_id: PMID:11402167
    supporting_text: Removal of the regulatory domain of SOS2, including the SOS3 binding motif,
      resulted in constitutive activation of the protein kinase, indicating that the SOS3 binding
      motif can serve as a kinase autoinhibitory domain
  - reference_id: file:ARATH/CIPK24/CIPK24-deep-research-falcon.md
