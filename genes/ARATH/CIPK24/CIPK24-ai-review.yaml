proposed_new_terms: []
suggested_questions:
- question: Beyond SOS1 and the CBL sensors, what is the full physiological substrate repertoire
    of CIPK24 (e.g. CAX1, AKT-type K+ channels, NDPK2), and which are direct in vivo targets?
- question: How do plasma-membrane (CBL4/SOS3) versus tonoplast (CBL10) recruitment quantitatively
    partition CIPK24 activity between Na+ extrusion and vacuolar Na+ sequestration in different
    tissues?
- question: What is the in vivo significance and regulation of the recently described nuclear
    SOS2-PIF4 salt-body branch relative to the canonical membrane-transport role?
suggested_experiments:
- description: Phosphoproteomics of wild-type versus sos2 plants under salt stress to define
    the in vivo CIPK24 substrate network.
- description: Quantitative co-localization and activity assays of CBL4/SOS3-CIPK24 (plasma
    membrane) versus CBL10-CIPK24 (tonoplast) complexes to map spatial control of ion transport.
- description: Structure-guided separation-of-function mutants (NAF motif, PPI motif, activation-loop
    Thr-168) to dissect activation, phosphatase regulation, and substrate selection in planta.
