core_functions:
- description: >-
    HSP17.6A is an ATP-independent holdase chaperone (class I cytosolic sHSP) that binds
    non-native/unfolding client proteins to prevent their irreversible aggregation, keeping them
    soluble and refoldable for downstream ATP-dependent chaperones (HSP70/HSP100). It does not
    catalyze folding itself. This is the core molecular function. GO:0051082 is used as interim
    until a holdase chaperone activity NTR is created; GO:0140309 does not fit (carrier-specific)
    and GO:0044183 does not fit (sHSPs do not actively refold). In vitro chaperone activity was
    demonstrated (PMID:11576425).
