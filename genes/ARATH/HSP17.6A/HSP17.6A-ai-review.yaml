- term:
    id: GO:0051082
    label: unfolded protein binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      GO:0051082 (unfolded protein binding) is proposed for obsoletion (go-ontology#30962).
      HSP17.6A is a classic ATP-independent sHSP holdase that binds non-native/unfolding proteins
      to prevent aggregation but does not actively refold them. Per UPB project decision rules,
      sHSPs should be reannotated to a holdase chaperone activity NTR when created. GO:0140309
      (unfolded protein carrier activity) does not fit because it is carrier-specific (created for
      TIM chaperones per go-ontology#30552), whereas sHSPs are in-situ holdases. GO:0044183
      (protein folding chaperone) does not fit because sHSPs do not catalyze folding. Retain
      GO:0051082 until the holdase NTR is available. This is the core molecular function.
    action: MODIFY
    reason: >-
      sHSPs like HSP17.6A are ATP-independent holdases: they bind denaturing proteins to prevent
      aggregation in situ but do not actively refold them. GO:0044183 is inappropriate (no active
      folding) and GO:0140309 is carrier-specific (go-ontology#30552). A general holdase chaperone
      activity NTR is needed; retain GO:0051082 until it exists.
    proposed_replacement_terms:
    - id: NTR
      label: holdase chaperone activity (NTR needed; GO:0140309 does not fit -- carrier-specific)
    additional_reference_ids:
    - go-ontology#30962
    - go-ontology#30552
    supported_by:
    - reference_id: file:ARATH/HSP17.6A/HSP17.6A-deep-research-falcon.md
      supporting_text: |-
        They bind **non-native (unfolded or partially unfolded) client proteins** in an **ATP-independent** manner, keeping clients soluble so that other ATP-dependent systems (e.g., HSP70/HSP100) can later refold them. Because they do not actively refold proteins themselves, sHSPs are described as **“holdases.”**
    - reference_id: file:ARATH/HSP17.6A/HSP17.6A-deep-research-falcon.md
      supporting_text: |-
        ATP-independent molecular chaperone/holdase contributing to proteostasis under conditions that increase protein misfolding (especially heat stress).
- term:
    id: GO:0006457
    label: protein folding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      The IBA annotation to GO:0006457 (protein folding) is phylogenetically inferred for the
      HSP20 family. sHSPs participate in the broader protein folding/quality-control pathway by
      binding unfolding proteins and preventing aggregation, holding substrates folding-competent
      for downstream ATP-dependent chaperones, but they do not themselves catalyze folding. Falcon
      corroborates the family-level holdase mechanism. The involved_in/process-level annotation is
      acceptable.
    action: ACCEPT
    reason: >-
      While sHSPs do not actively fold proteins, they participate in the protein folding process at
      the BP level by preventing irreversible aggregation and maintaining substrates for refolding
      by HSP70-type foldases. The IBA inference is phylogenetically sound for the HSP20 family.
    supported_by:
    - reference_id: file:ARATH/HSP17.6A/HSP17.6A-deep-research-falcon.md
      supporting_text: |-
        HSP17.6A most plausibly contributes to **proteostasis** by binding unfolding proteins and preventing aggregation during stress, acting upstream of ATP-dependent refolding systems.
