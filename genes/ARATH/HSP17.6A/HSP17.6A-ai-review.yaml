- term:
    id: GO:0051259
    label: protein complex oligomerization
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      sHSPs characteristically form large, dynamic oligomeric complexes that dissociate and
      reassociate in response to stress; substrate binding is coupled to this dynamic
      oligomerization. UniProt notes HSP17.6A forms oligomeric structures, and falcon corroborates
      the family-level dynamic oligomerization mechanism. The IBA annotation is well supported
      across the sHSP family.
    action: ACCEPT
    reason: >-
      Oligomerization is a core structural and functional property of sHSPs, integral to the
      holdase chaperone mechanism rather than a peripheral function. The IBA annotation is
      phylogenetically sound and consistent with UniProt.
    supported_by:
    - reference_id: file:ARATH/HSP17.6A/HSP17.6A-deep-research-falcon.md
      supporting_text: |-
        ACD-type sHSPs form large oligomers (reported in the review as commonly **~150–800 kDa**), and these oligomers are **dynamic** and can rearrange with temperature or other conditions.
