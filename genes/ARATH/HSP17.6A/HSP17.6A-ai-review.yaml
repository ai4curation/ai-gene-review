id: Q9XIE3
gene_symbol: HSP17.6A
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  HSP17.6A (AtHsp17.6A-CI; locus At1g59860; UniProt Q9XIE3) is a 17.6 kDa class I
  cytosolic small heat shock protein (sHSP) of the HSP20/alpha-crystallin family. Like
  other sHSPs it is defined by a conserved alpha-crystallin domain (ACD) flanked by a
  variable N-terminal region and short C-terminal extension, and it functions as an
  ATP-independent holdase chaperone: it binds non-native (unfolding/denaturing) client
  proteins to prevent their irreversible aggregation and keeps them soluble and
  refoldable, with actual refolding delegated to downstream ATP-dependent systems
  (e.g. HSP70/HSP100). It is not an enzyme or transporter; its functional "substrate"
  is misfolded protein. sHSPs form large dynamic oligomers, and oligomerization is
  integral to the chaperone mechanism. HSP17.6A is a canonical heat shock response gene
  under strong positive control by the HsfA1 transcription factor regulon (perfect HSE
  in its promoter) and is additionally modulated by miR160/ARF circuitry; its expression
  is induced by heat, osmotic and salt stress, and overexpression enhances osmotolerance
  (PMID:11576425). It is annotated as cytosol/nucleus (c/n). Single-gene loss-of-function
  phenotypes are expected to be subtle because Arabidopsis has multiple highly similar
  cytosolic class I sHSP paralogs (e.g. AtHsp17.6B-CI, AtHsp17.6C-CI), which complicates
  assigning unique in vivo functions and means much functional evidence is paralog-shared.
