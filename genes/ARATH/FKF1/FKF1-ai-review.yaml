suggested_questions:
- question: >-
    What is the precise biochemical mechanism by which FKF1 stabilizes CONSTANS
    protein, and is it separable from its SCF-mediated degradation of CDF
    repressors?
  experts:
  - Plant photoperiodism researchers
  - Ubiquitin-proteasome biochemists
- question: >-
    Are the secondary roles of FKF1 in cellulose biosynthesis and chloroplast
    photorelocation mediated by SCF-dependent degradation of specific substrates
    (e.g. CHUP1), or by non-degradative mechanisms?
  experts:
  - Cell wall biologists
  - Chloroplast movement researchers
suggested_experiments:
- hypothesis: >-
    FKF1 regulates chloroplast photorelocation by promoting ubiquitin-dependent
    degradation of CHUP1 via its SCF activity.
  description: >-
    Test whether CHUP1 is ubiquitinated and degraded in an FKF1/SCF-dependent,
    blue-light-dependent manner using in vivo ubiquitination assays, cell-free
    degradation assays with proteasome inhibitors, and F-box-mutant FKF1
    (defective in ASK/SKP1 binding) to determine whether SCF complex formation is
    required for the effect on CHUP1 abundance.
- hypothesis: >-
    The balance between FKF1-mediated CDF degradation and FKF1-mediated CO
    stabilization quantitatively determines FT induction across day lengths.
  description: >-
    Use separation-of-function FKF1 alleles (e.g. F-box mutants vs LOV/CO-binding
    mutants) in cdf and CO backgrounds to dissect the relative contribution of
    each mechanism to FT transcription, combining time-course ChIP, protein
    stability assays, and flowering-time phenotyping under controlled
    photoperiods.
