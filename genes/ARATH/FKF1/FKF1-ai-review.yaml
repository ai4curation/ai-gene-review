gene_symbol: FKF1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  FKF1 (FLAVIN-BINDING, KELCH REPEAT, F-BOX 1; also ADAGIO 3/ADO3) is a
  blue-light photoreceptor that serves as the substrate-recognition F-box subunit
  of an SCF (SKP1-CUL1-F-box) E3 ubiquitin ligase in Arabidopsis. It combines an
  N-terminal LOV (PAS-type, flavin-binding) photosensory domain that covalently
  binds an FMN chromophore at Cys-91 in a blue-light-dependent, dark-reversible
  manner, a central F-box that recruits SKP1/ASK proteins into the SCF complex,
  and C-terminal Kelch repeats forming a beta-propeller that recognizes
  substrates. Blue light drives formation of an FKF1-GIGANTEA (GI) complex that
  targets the CYCLING DOF FACTOR (CDF1/CDF2/CDF3) transcriptional repressors for
  ubiquitin-dependent degradation, relieving repression of CONSTANS (CO) and
  FLOWERING LOCUS T (FT). FKF1 also binds and stabilizes CO protein in the
  long-day afternoon. Because FKF1 mRNA oscillates with a circadian rhythm and
  peaks in the late afternoon, the coincidence of its expression with daytime
  light in long days underlies day-length measurement and the promotion of
  photoperiodic flowering. FKF1 localizes to both the nucleus and the cytoplasm.
  Additional roles have been reported in negative regulation of cellulose
  biosynthesis and in blue-light chloroplast photorelocation.
