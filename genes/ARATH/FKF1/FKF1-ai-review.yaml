- id: PMID:22628657
  title: FKF1 conveys timing information for CONSTANS stabilization in photoperiodic
    flowering.
  findings:
  - statement: "FKF1 directly interacts with CO protein through its LOV domain in a blue-light-enhanced manner and stabilizes CO in the late afternoon of long days, providing a second (post-translational) mechanism by which FKF1 promotes CO function."
    supporting_text: "we demonstrate that FLAVIN-BINDING, KELCH REPEAT, F-BOX 1 (FKF1) protein stabilizes CO protein in the afternoon in long days. FKF1 interacts with CO through its LOV domain, and blue light enhances this interaction."
    reference_section_type: ABSTRACT
  - statement: "FKF1 simultaneously removes the CDF1 repressor of CO and FT transcription while stabilizing CO protein, integrating multiple feedforward mechanisms that ensure robust FT mRNA induction and accurate timing of flowering."
    supporting_text: "FKF1 simultaneously removes CYCLING DOF FACTOR 1 (CDF1), which represses CO and FLOWERING LOCUS T (FT) transcription. Together with CO transcriptional regulation, FKF1 protein controls robust FT mRNA induction through multiple feedforward mechanisms that accurately control flowering timing."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Full text available; shows FKF1 stabilizes CO protein via its LOV domain in
      a blue-light-enhanced manner and degrades CDF repressors to control FT.
      Confirms nuclear and cytosolic localization.
- id: PMID:23166809
  title: A comprehensive analysis of interaction and localization of Arabidopsis SKP1-like
    (ASK) and F-box (FBX) proteins.
  findings:
  - statement: "Comprehensive yeast two-hybrid plus in vivo interaction and subcellular localization analysis of Arabidopsis ASK x F-box pairs documents which ASKs assemble with FKF1 and related Kelch-domain F-box proteins, supporting SCF(FKF1) complex assembly."
    supporting_text: "we carried out a large-scale interaction analysis between FBX and ASK proteins using yeast two-hybrid assay (Y2H) in Arabidopsis thaliana. FBX proteins randomly chosen from those proteins that interacted with more than one ASK protein were further analyzed for their subcellular localization and in vivo interaction with ASK proteins."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Comprehensive ASK x F-box Y2H/localization study; supports SCF assembly for
      Kelch-domain F-box proteins. Source of generic protein-binding IPIs.
- id: PMID:31221729
  title: The Photoperiodic Flowering Time Regulator FKF1 Negatively Regulates Cellulose
    Biosynthesis.
  findings:
  - statement: "Genetic suppressor screen using the cellulose-deficient c1,c3 (cesa1aegeus,cesa3ixr1-2) mutant identifies FKF1 as a negative regulator of cellulose biosynthesis - a secondary, pleiotropic FKF1 role beyond photoperiodic flowering."
    supporting_text: "Here, we characterize the role of FLAVIN-BINDING KELCH REPEAT, F-BOX 1 (FKF1), another blue light receptor and well-known photoperiodic flowering time regulator, in cellulose biosynthesis. A phenotype suppression screen using a cellulose deficient mutant"
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Genetic/biochemical evidence (suppressor screen, T-DNA mutant, OE) that
      FKF1 negatively regulates cellulose biosynthesis; a secondary role.
- id: PMID:36771626
  title: FKF1 Interacts with CHUP1 and Regulates Chloroplast Movement in Arabidopsis.
  findings:
  - statement: "FKF1 physically interacts with the chloroplast outer-membrane protein CHUP1 (Y2H and BiFC) and modulates blue-light-driven chloroplast photorelocation (avoidance) in Arabidopsis - a secondary pleiotropic role with the molecular mechanism not yet resolved."
    supporting_text: "This study discovered that another blue light receptor, FLAVIN-BINDING KELCH REPEAT F-BOX1 (FKF1), regulates chloroplast photorelocation by physically interacting with chloroplast unusual positioning protein 1 (CHUP1)"
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Full text; Y2H/BiFC FKF1-CHUP1 interaction and mutant/OE effects on
      blue-light chloroplast avoidance response; a secondary pleiotropic role,
      mechanism unresolved.
- id: file:ARATH/FKF1/FKF1-deep-research-falcon.md
  title: "Falcon/Edison deep research report: FKF1"
  findings:
  - statement: "FKF1 is a blue-light-responsive LOV-domain photoreceptor combined with an F-box motif and Kelch-repeat substrate-recognition module; it functions as the substrate-recognition subunit of an SCF(FKF1) E3 ubiquitin ligase."
  - statement: "FKF1 has two coupled photoperiodic functions: (i) blue-light-enhanced GI complex formation and CDF1 degradation on the CO promoter in late afternoon of long days, and (ii) direct LOV-mediated stabilization of CO protein in the late-afternoon long-day window, jointly driving FT expression."
  - statement: "FKF1 mRNA peaks ~10 h after dawn under long days; this expression phasing, together with blue light availability, sets the long-day-specific window in which FKF1-GI complexes assemble on the CO promoter."
  - statement: "Secondary FKF1 roles include negative regulation of cellulose biosynthesis (PMID:31221729) and modulation of chloroplast photorelocation via CHUP1 (PMID:36771626); these are pleiotropic and mechanistically less well established than the photoperiodic flowering function."
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      AI-generated (Falcon/Edison) deep-research synthesis used as supporting
      context; trace individual claims to primary literature before treating as
      definitive.
