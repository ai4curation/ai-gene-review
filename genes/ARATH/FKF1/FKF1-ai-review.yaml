- id: PMID:10847687
  title: FKF1, a clock-controlled gene that regulates the transition to flowering
    in Arabidopsis.
  findings:
  - statement: "Original positional cloning of FKF1 from a late-flowering Arabidopsis mutant; FKF1 encodes a protein with a PAS/LOV flavin-binding photoreceptor domain, an F-box motif, and six kelch repeats predicted to fold into a beta-propeller, defining the ADO/FKF/LKP/ZTL family architecture."
    supporting_text: "We positionally cloned FKF1, which encodes a novel protein with a PAS domain similar to the flavin-binding region of certain photoreceptors, an F box characteristic of proteins that direct ubiquitin-mediated degradation, and six kelch repeats predicted to fold into a beta propeller."
    reference_section_type: ABSTRACT
  - statement: "FKF1 mRNA levels oscillate with a circadian rhythm and FKF1 deletion alters the waveform of two clock-controlled genes, implicating FKF1 in modulating the Arabidopsis circadian clock."
    supporting_text: "FKF1 mRNA levels oscillate with a circadian rhythm, and deletion of FKF1 alters the waveform of rhythmic expression of two clock-controlled genes, implicating FKF1 in modulating the Arabidopsis circadian clock."
    reference_section_type: ABSTRACT
  - statement: "The fkf1 mutant late-flowering phenotype is rescued by vernalization or gibberellin treatment, placing FKF1 specifically in the photoperiodic flowering pathway rather than in the vernalization or gibberellin pathways."
    supporting_text: "We isolated a late-flowering Arabidopsis mutant, fkf1, that is rescued by vemalization or gibberellin treatment."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Original cloning of FKF1; establishes domain architecture (PAS/flavin,
      F-box, Kelch), circadian mRNA oscillation, and the late-flowering loss-of-
      function phenotype. Abstract-only in cache but consistent with UniProt.
- id: PMID:11019805
  title: Protein degradation in signaling.
  findings:
  - statement: "Review describing how ubiquitin/proteasome-mediated proteolysis in higher plants connects to hormone responses, light perception, environmental adaptation, and floral development; cited as a TAS source for FKF1's ubiquitin-dependent catabolic role."
    supporting_text: "Recent studies have linked proteolysis by the ubiquitin/proteasome pathway to a variety of signaling pathways in higher plants."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: >-
      Review on ubiquitin/proteasome proteolysis in plant signaling; TAS source
      for FKF1's ubiquitin-dependent catabolism role. Background/contextual.
- id: PMID:14749489
  title: Expression and interaction analysis of Arabidopsis Skp1-related genes.
  findings:
  - statement: "Yeast two-hybrid screen establishes that ASK1, ASK2, ASK11 and ASK12 interact directly with FKF1 (and other F-box proteins), supporting assembly of SCF(FKF1) complexes."
    supporting_text: "ASK1, ASK2, ASK11 and ASK12 interacted well with COI1, FKF1, UFO-like protein, LRR-containing F-box proteins, and other F-box proteins with unknown C-terminal motifs."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Y2H establishing FKF1 binding to ASK/SKP1 proteins, supporting SCF complex
      assembly. Abstract names FKF1 explicitly.
- id: PMID:15310821
  title: Identification of ASK and clock-associated proteins as molecular partners
    of LKP2 (LOV kelch protein 2) in Arabidopsis.
  findings:
  - statement: "LKP2 interacts with FKF1 and LKP1 in yeast two-hybrid, demonstrating that members of the ADO/FKF/LKP/ZTL LOV-F-box-Kelch family form hetero- and homo-typic interactions, with the LOV domain being necessary and sufficient for TOC1 binding by LKP2."
    supporting_text: "LKP2 interacted not only with itself but also with other members of the family, LKP1 and FKF1."
    reference_section_type: ABSTRACT
  - statement: "Members of the ADO/FKF/LKP/ZTL family interact with ASK/Skp1-like proteins to assemble SCF E3 ligase complexes, framing FKF1 as a substrate-recognition F-box of an SCF complex."
    supporting_text: "LKP2 interacted with some Arabidopsis Skp1-like proteins (ASK), as do other ADO/FKF/LKP/ZTL family proteins, suggesting that LKP2 can form an SCF (Skp1-Cullin-F-box protein) complex that functions as a ubiquitin E3 ligase."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Primarily an LKP2 study but explicitly reports LKP2-FKF1 interaction and
      family ASK binding; supports SCF/family interactions for FKF1.
- id: PMID:16002617
  title: FKF1 F-box protein mediates cyclic degradation of a repressor of CONSTANS
    in Arabidopsis.
  findings:
  - statement: "FKF1 physically interacts with the Dof transcription factor CYCLING DOF FACTOR 1 (CDF1), targets it for proteasomal degradation, and thereby relieves CDF1-mediated repression of CONSTANS (CO); CDF1 protein is more stable in fkf1 mutants and elevated CDF1 levels reduce CO expression and delay flowering."
    supporting_text: "We demonstrate here that FKF1 controls the stability of a Dof transcription factor, CYCLING DOF FACTOR 1 (CDF1). FKF1 physically interacts with CDF1, and CDF1 protein is more stable in fkf1 mutants. Plants with elevated levels of CDF1 flower late and have reduced expression of CO."
    reference_section_type: ABSTRACT
  - statement: "FKF1 controls daily CO transcription in part by degrading the CDF1 repressor of CO transcription, establishing the FKF1-CDF1-CO regulatory axis that times photoperiodic flowering."
    supporting_text: "FKF1 controls daily CO expression in part by degrading CDF1, a repressor of CO transcription."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Key paper establishing FKF1 as an F-box protein that degrades the CDF1
      repressor to control CO expression. Abstract-only in cache but central and
      consistent with UniProt FUNCTION.
- id: PMID:17704763
  title: ZEITLUPE is a circadian photoreceptor stabilized by GIGANTEA in blue light.
  findings:
  - statement: "Defines the family blue-light/LOV-GIGANTEA paradigm: ZTL-GI interaction is strongly and specifically enhanced by blue light through ZTL's N-terminal LOV domain, with GI stabilizing ZTL in vivo - this paradigm directly informs FKF1's analogous LOV-dependent, blue-light-enhanced interaction with GI."
    supporting_text: "the ZTL-GI interaction is strongly and specifically enhanced by blue light, through the amino-terminal flavin-binding LIGHT, OXYGEN OR VOLTAGE (LOV) domain of ZTL."
    reference_section_type: ABSTRACT
  - statement: "GIGANTEA-mediated stabilization sustains oscillations of LOV-F-box family proteins, with mutations in the LOV domain (e.g. C82A) diminishing the interaction and reducing protein levels - paralleling the LOV-dependent interaction reported for FKF1-GI."
    supporting_text: "GIGANTEA (GI) is essential to establish and sustain oscillations of ZTL by a direct protein-protein interaction."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Primarily about ZTL but defines the family blue-light/LOV-GI paradigm;
      GOA IPI from this PMID records the FKF1-GI interaction (WITH/FROM Q9SQI2).
- id: PMID:17872410
  title: FKF1 and GIGANTEA complex formation is required for day-length measurement
    in Arabidopsis.
  findings:
  - statement: "FKF1 and GIGANTEA (GI) proteins form a complex in a blue-light-dependent manner; the timing of this interaction in the late afternoon under long days regulates the timing of daytime CO transcription, providing the molecular basis for day-length measurement."
    supporting_text: "We demonstrate that FKF1 and GI proteins form a complex in a blue-light-dependent manner. The timing of this interaction regulates the timing of daytime CO expression."
    reference_section_type: ABSTRACT
  - statement: "FKF1, GI, and CDF1 all associate with CO chromatin; FKF1-GI complex formation on the CO promoter in late afternoon coordinates light coincidence with circadian timing to regulate photoperiodic flowering."
    supporting_text: "GI, FKF1, and CDF1 proteins associate with CO chromatin. Thus, the FKF1-GI complex forms on the CO promoter in late afternoon to regulate CO expression, providing a mechanistic view of how the coincidence of light with circadian timing regulates photoperiodic flowering."
    reference_section_type: ABSTRACT
  - statement: "FKF1 function is dependent on GI, which interacts with the CO repressor CYCLING DOF FACTOR 1 (CDF1) and controls CDF1 stability, embedding the FKF1-CDF1-CO axis within a larger GI-dependent module."
    supporting_text: "FKF1 function is dependent on GI, which interacts with a CO repressor, CYCLING DOF FACTOR 1 (CDF1), and controls CDF1 stability."
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      Establishes blue-light-dependent FKF1-GI complex formation, LOV-domain
      requirement (Cys-91/Arg-92/Gln-163 mutagenesis), and timing of CO
      regulation. Source of multiple IDA annotations.
- id: PMID:21798944
  title: Evidence for network evolution in an Arabidopsis interactome map.
  findings:
  - statement: "Large-scale binary yeast two-hybrid interactome map of Arabidopsis used to derive generic protein-binding (IPI) annotations for FKF1, including SKP1B and SRK2G; these are high-throughput hits without confirmed functional context."
    reference_section_type: ABSTRACT
  reference_review:
