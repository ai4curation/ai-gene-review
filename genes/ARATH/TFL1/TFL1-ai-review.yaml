- term:
    id: GO:0009744
    label: response to sucrose
  evidence_type: IMP
  original_reference_id: PMID:11553753
  review:
    summary: >-
      The sucrose paper reports that sucrose effects on flowering were more
      pronounced in tfl1 mutants, but it does not establish TFL1 as a direct
      sucrose-response factor. The phenotype is better interpreted through
      TFL1's role in flowering-time/meristem phase transition.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      A differential flowering response in a tfl1 mutant background is
      insufficient to make response to sucrose a core or direct TFL1 process.
      This is a broad physiological response annotation derived from a secondary
      phenotype.
    supported_by:
    - reference_id: PMID:11553753
      supporting_text: >-
        This inhibition was more pronounced in tfl1, an early flowering mutant,
        than in the wild type.
      full_text_unavailable: true
    - reference_id: PMID:11553753
      supporting_text: >-
        These results suggest that sugar may affect floral transition by
        activating or inhibiting genes that act to control floral transition,
        depending on the concentration of sugars, the genetic background of the
        plants, and when the sugar is introduced.
      full_text_unavailable: true
