id: P93003
gene_symbol: TFL1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  Arabidopsis thaliana TFL1 (AT5G03840) encodes a PEBP/CETS-family protein
  that antagonizes FT/TSF floral activation to maintain indeterminate
  inflorescence meristem identity and restrain premature floral meristem
  conversion. TFL1 is a non-DNA-binding transcriptional regulatory mediator:
  genetic, fusion-protein, and BiFC evidence support FD-dependent
  transcriptional repression in the nucleus, while cytoplasmic localization and
  intercellular mobility support movement through meristem tissues. A separate
  PSV/endomembrane trafficking study supports vacuolar trafficking and
  membrane/vesicle localization, but this is best treated as non-core relative
  to the conserved flowering-time and inflorescence-architecture role.
