suggested_questions:
- question: >-
    Is the PSV/endomembrane trafficking phenotype a direct conserved activity of
    endogenous TFL1 in meristems, or a secondary/pleiotropic consequence of TFL1
    perturbation and tagging context?
  experts:
  - Natasha V. Raikhel
  - Elena Rojo
  - Francisco Madueño
- question: >-
    Which FD/FDP-bound genomic targets and corepressor or 14-3-3 partners are
    directly controlled by TFL1 in the inflorescence meristem?
  experts:
  - Sachiko Hanano
  - Koji Goto
  - Ji Hoon Ahn
suggested_experiments:
- experiment_type: genomics
  hypothesis: >-
    TFL1 represses a defined subset of FD-bound floral meristem identity targets
    at the inflorescence meristem.
  description: >-
    Perform FD CUT&RUN or ChIP-seq and nascent RNA profiling in matched wild
    type, tfl1 loss-of-function, TFL1 rescue, and FT/TSF perturbation backgrounds
    at the floral transition to identify direct FD targets whose expression is
    TFL1-dependent.
- experiment_type: cell_biology
  hypothesis: >-
    Endogenous TFL1 occupies distinct nuclear/cytoplasmic and endomembrane pools,
    with only a subset contributing to PSV trafficking.
  description: >-
    Generate native-locus fluorescent and proximity-labeling TFL1 alleles that
    fully rescue tfl1 phenotypes, then quantify meristem localization,
    FD/14-3-3 proximity, and AP-3/PSV marker colocalization under identical
    imaging conditions.
