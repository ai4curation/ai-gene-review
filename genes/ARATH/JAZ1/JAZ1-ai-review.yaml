id: Q9LMA8
gene_symbol: JAZ1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  JAZ1, also known as TIFY10A, is a nuclear JASMONATE ZIM-domain repressor in
  Arabidopsis jasmonate signaling. In low-jasmonate states, JAZ proteins repress
  MYC transcription factors and recruit co-repressor machinery through the
  TIFY/ZIM domain. JA-Ile promotes COI1-JAZ1 interaction and JAZ1 degradation,
  releasing jasmonate-responsive transcription. Defense, flower, pollen,
  wounding, and alkaline-stress annotations are downstream or specialized
  outputs of this core jasmonate-repressor module.
