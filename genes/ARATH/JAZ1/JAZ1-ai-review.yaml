core_functions:
- description: >-
    Nuclear transcriptional corepressor activity in jasmonate signaling. JAZ1
    represses MYC-centered JA-responsive transcriptional output in the
    unelicited state and is removed by COI1-dependent degradation after JA-Ile
    perception; TIFY-mediated homo/heteromeric interactions support these
    repressor assemblies.
