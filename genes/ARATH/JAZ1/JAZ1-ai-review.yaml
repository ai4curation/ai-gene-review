suggested_questions:
- question: Should JAZ-family annotations use transcription corepressor activity directly, or should this be represented through a more specific JAZ-NINJA-TOPLESS complex model?
- question: Which JAZ1 defense and alkaline-stress annotations remain direct enough for gene-level GO annotation?
suggested_experiments:
- description: Test native JAZ1 occupancy and MYC transcriptional repression before and after JA-Ile treatment using time-resolved chromatin and proteomics assays.
- description: Separate TIFY-domain dimerization effects from NINJA/TOPLESS recruitment using JAZ1 domain mutants in native expression contexts.
