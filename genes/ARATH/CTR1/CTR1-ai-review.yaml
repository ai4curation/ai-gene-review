id: Q05609
gene_symbol: CTR1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  CTR1 is an Arabidopsis Raf-like protein serine/threonine kinase that acts as a
  central negative regulator of ethylene signaling. In the absence of ethylene,
  CTR1 is associated with the ER-localized ethylene receptor complex and
  phosphorylates EIN2, preventing downstream EIN2/EIN3 signaling. Ethylene
  perception relieves CTR1 inhibition, allowing EIN2 signaling to activate
  nuclear ethylene responses. Root, stem cell, floral transition, sugar,
  gibberellin, and hypoxia phenotypes are retained as downstream or cross-talk
  outputs, but the core function is ER-associated protein kinase control of the
  ethylene pathway.
