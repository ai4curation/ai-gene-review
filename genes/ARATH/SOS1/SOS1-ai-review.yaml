core_functions:
- description: >-
    Electroneutral plasma-membrane Na+/H+ antiporter that exchanges intracellular
    Na+ (or Li+) for extracellular H+, driven by the proton-motive force, to extrude
    toxic Na+ from the cytosol to the apoplast.
