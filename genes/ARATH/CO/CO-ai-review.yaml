core_functions:
- description: >-
    CO is a nuclear sequence-specific RNA polymerase II transcriptional
    activator that binds FT promoter CORE/TGTG cis-elements as part of CO-NF-Y
    complexes with NF-YB/NF-YC histone fold subunits. This direct promoter
    binding activates FT and other early target genes in leaves during
    inductive long-day photoperiods.
  molecular_function:
    id: GO:0001228
    label: DNA-binding transcription activator activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0048578
    label: positive regulation of long-day photoperiodism, flowering
  - id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:28526714
    supporting_text: >-
      CONSTANS (CO/B-BOX PROTEIN1 BBX1), a master flowering regulator, forms a
      trimer with Arabidopsis thaliana NF-YB2/NF-YC3 to efficiently bind the
      CORE element of the FLOWERING LOCUS T promoter.
  - reference_id: PMID:33693873
    supporting_text: >-
      the four previously characterized cis-elements in the FT promoter proximal
      region, CORE1, CORE2, P1, and P2, are all direct CO binding sites.
    full_text_unavailable: true
  - reference_id: PMID:11323677
    supporting_text: >-
      expression of CONSTANS (CO), a gene that accelerates flowering in response
      to long days, is modulated by the circadian clock and day length.
    full_text_unavailable: true
