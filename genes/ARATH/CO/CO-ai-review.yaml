id: Q39057
gene_symbol: CO
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  CONSTANS (CO/BBX1; At5g15840) encodes a 373 amino acid Arabidopsis
  CONSTANS-family nuclear B-box/CCT transcriptional regulator. CO integrates
  circadian phase, photoperiod, and light-quality control of protein stability
  to activate FLOWERING LOCUS T (FT) and other early targets in leaves under
  inductive long days. Mechanistically, CO uses N-terminal B-box zinc finger
  domains for metal-dependent folding, oligomerization, and regulatory protein
  interactions, and its C-terminal CCT domain partners with NF-YB/NF-YC histone
  fold subunits to form sequence-specific CO-NF-Y complexes that bind TGTG/CORE
  cis-elements in the FT promoter. The core curated function is therefore
  RNA polymerase II transcriptional activation in the nucleus during positive
  regulation of long-day photoperiodic flowering, not general flower organ
  morphogenesis or generic protein binding. PANTHER PTHR31319 places CO in the
  CONSTANS-like family and subfamily PTHR31319:SF82; this family context supports
  conserved BBX/CCT transcription-regulatory biology, but species-specific
  photoperiod directionality should be curated from Arabidopsis evidence because
  related grass CO/HD1 proteins can have different long-day effects.
alternative_products:
- name: '1'
  id: Q39057-1
  description: >-
    Canonical full-length CO isoform containing the tandem B-box region and the
    C-terminal CCT domain required for NF-Y-associated DNA binding and nuclear
    transcriptional regulation.
- name: '2'
  id: Q39057-2
  sequence_note: VSP_036312, VSP_036313
  description: >-
    UniProt records an alternatively spliced product with a changed segment at
    residues 255-274 and loss of residues 275-373, removing the C-terminal CCT
    domain. The cached evidence does not establish that this product is a stable
    functional isoform in vivo, so no isoform-specific GO functions are curated.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
  - statement: >-
      InterPro domain mappings support conserved BBX/CCT family molecular
      features such as zinc ion binding and transcriptional regulation, but
      should not by themselves assign CO-specific flowering directionality.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      PANTHER/IBA supports a conserved CONSTANS-like role in regulation of
      photoperiodism and flowering, but Arabidopsis experimental evidence is
      needed to specify CO as a positive long-day flowering regulator.
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied by
    UniProt
  findings:
  - statement: >-
      UniProt maps CO to the nucleus, consistent with the experimental role of
      CO as a nuclear DNA-binding transcriptional regulator.
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on on inter-ontology
    links
  findings:
  - statement: >-
      Logical inference from transcription factor activity supports a broad
      transcription-regulation annotation, but the experimentally supported
      process should be RNA polymerase II transcriptional activation of flowering
      pathway targets.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: >-
      AtSubP predicts nuclear localization, consistent with direct experimental
      reports that CO localizes to nuclear/subnuclear foci.
- id: PMID:11118137
  title: 'Arabidopsis transcription factors: genome-wide comparative analysis among
    eukaryotes.'
  findings:
  - statement: >-
      This genome-wide analysis establishes that Arabidopsis encodes a large
      transcription factor repertoire, but the cached abstract does not expose
      CO-specific evidence for the seeded ISS annotation.
    supporting_text: >-
      Arabidopsis dedicates over 5% of its genome to code for more than 1500
      transcription factors, about 45% of which are from families specific to
      plants.
    full_text_unavailable: true
- id: PMID:10834834
  title: Distinct roles of CONSTANS target genes in reproductive development of
    Arabidopsis.
  findings:
  - statement: >-
      CO promotes Arabidopsis flowering in response to day length and rapidly
      induces target genes including FT and SOC1.
    supporting_text: >-
      CONSTANS (CO) promotes flowering of Arabidopsis in response to day length.
      Four early target genes of CO were identified using a steroid-inducible
      version of the protein.
    full_text_unavailable: true
- id: PMID:11323677
  title: CONSTANS mediates between the circadian clock and the control of flowering
    in Arabidopsis.
  findings:
  - statement: >-
      CO expression is clock- and daylength-regulated, FT expression follows a
      related daily window, and CO overexpression rescues flowering defects in
      circadian mutants.
    supporting_text: >-
      expression of CONSTANS (CO), a gene that accelerates flowering in response
      to long days, is modulated by the circadian clock and day length.
    full_text_unavailable: true
- id: PMID:17138697
  title: CONSTANS and the CCAAT box binding complex share a functionally important
    domain and interact to regulate flowering of Arabidopsis.
  findings:
  - statement: >-
      CO interacts with AtHAP3/NF-YB and AtHAP5/NF-YC subunits and these
      interactions are functionally tied to FT expression in phloem companion
      cells.
    supporting_text: >-
      CONSTANS (CO), which promotes Arabidopsis flowering, interacts with At
      HAP3 and At HAP5 in yeast, in vitro, and in planta.
    full_text_unavailable: true
- id: PMID:18296627
  title: COP1-mediated ubiquitination of CONSTANS is implicated in cryptochrome regulation
    of flowering in Arabidopsis.
  findings:
  - statement: >-
      COP1 physically binds CO, ubiquitinates it, and lowers CO protein
      abundance, explaining part of cryptochrome-dependent stabilization of CO.
    supporting_text: >-
      COP1 physically interacts with CO and functions as an E3 ligase,
      ubiquitinating CO in vitro and reducing CO levels in vivo.
- id: PMID:18388858
  title: Arabidopsis COP1 shapes the temporal pattern of CO accumulation conferring
    a photoperiodic flowering response.
  findings:
  - statement: >-
      COP1 and CO interact through the C-terminal region of CO, and COP1-mediated
      turnover limits CO protein abundance in the dark.
    supporting_text: >-
      COP1 and CO interact in vivo and in vitro through the C-terminal region of
      CO.
- id: PMID:18587275
  title: Isolation of CONSTANS as a TGA4/OBF4 interacting protein.
  findings:
  - statement: >-
      OBF4/TGA4 was identified as a CO interactor and may regulate FT together
      with CO, but the cached source is abstract-only.
    supporting_text: >-
      We identified CONSTANS (CO), a positive regulator of floral induction, as
      an OBF4-interacting protein, in a yeast two-hybrid library screen.
    full_text_unavailable: true
- id: PMID:18667727
  title: Regulation of CONSTANS and FLOWERING LOCUS T expression in response to changing
    light quality.
  findings:
  - statement: >-
      Far-red-enriched light increases CO mRNA and protein accumulation, and co
      mutants are relatively insensitive to far-red-enriched light promotion of
      flowering.
    supporting_text: >-
      Consistent with the model that FREL promotes flowering through CO, mutants
      for co or gigantea, which are required for CO transcript accumulation, are
      relatively insensitive to FREL.
    full_text_unavailable: true
- id: PMID:18790998
  title: Acceleration of flowering during shade avoidance in Arabidopsis alters the
    balance between FLOWERING LOCUS C-mediated repression and photoperiodic induction
    of flowering.
  findings:
  - statement: >-
      Low red:far-red shade conditions require CO for full long-day acceleration
      of flowering and enhance CO expression/activity.
    supporting_text: >-
      A low red to far-red ratio required the photoperiod-pathway genes GIGANTEA
      (GI) and CONSTANS (CO) to fully accelerate flowering in long days and did
      not promote flowering in short days.
    full_text_unavailable: true
- id: PMID:21798944
  title: Evidence for network evolution in an Arabidopsis interactome map.
  findings:
  - statement: >-
      The paper reports a high-throughput Arabidopsis interactome map, but the
      cached text does not expose the exact CO-BBX32 interaction underlying the
      seeded GOA row.
    supporting_text: >-
      We describe a proteome-wide binary protein-protein interaction map for the
      interactome network of the plant Arabidopsis thaliana containing about
      6200 highly reliable interactions between about 2700 proteins.
    full_text_unavailable: true
- id: PMID:24127609
  title: PHYTOCHROME-DEPENDENT LATE-FLOWERING accelerates flowering through physical
    interactions with phytochrome B and CONSTANS.
  findings:
  - statement: >-
      PHL forms a red-light-dependent phyB-PHL-CO regulatory complex that
      modulates photoperiodic flowering, but this is better treated as a
      regulatory interaction than as generic protein binding.
    supporting_text: >-
      in the presence of phyB under red light, PHL interacted with CO as well.
    full_text_unavailable: true
- id: PMID:26801684
  title: DELLA proteins physically interact with CONSTANS to regulate flowering under
    long days in Arabidopsis.
  findings:
  - statement: >-
      DELLA proteins bind CO and inhibit CO-NF-YB2 interaction, linking
      gibberellin signaling to long-day flowering control.
    supporting_text: >-
      DELLA proteins physically interact with CONSTANS (CO).
    full_text_unavailable: true
- id: PMID:27015278
  title: MicroProtein-Mediated Recruitment of CONSTANS into a TOPLESS Trimeric Complex
    Represses Flowering in Arabidopsis.
  findings:
  - statement: >-
      miP1a/miP1b bind CO and recruit TOPLESS/TOPLESS-related corepressors,
      reducing CO-dependent FT induction and delaying flowering.
    supporting_text: >-
      Both miP1a and miP1b interact with CO in yeast, in vitro and in planta.
  - statement: >-
      CO is observed in nuclear/subnuclear foci in transient expression assays.
    supporting_text: >-
      GFP:CO localizes to sub-nuclear speckles
- id: PMID:28526714
  title: CONSTANS Imparts DNA Sequence Specificity to the Histone Fold NF-YB/NF-YC
    Dimer.
  findings:
  - statement: >-
      CO forms an NF-CO trimer with NF-YB2/NF-YC3, confers sequence specificity
      to histone fold DNA binding, and binds CORE elements in the FT promoter.
    supporting_text: >-
      CONSTANS (CO/B-BOX PROTEIN1 BBX1), a master flowering regulator, forms a
      trimer with Arabidopsis thaliana NF-YB2/NF-YC3 to efficiently bind the
      CORE element of the FLOWERING LOCUS T promoter.
  - statement: >-
      The CCT domain mutation co-7 abolishes NF-CO DNA binding, supporting CO's
      direct role in sequence-specific transcription factor activity.
    supporting_text: >-
      The co-7 mutation in the CCT domain, corresponding to an NF-YA arginine
      directly involved in CCAAT recognition, abolishes NF-CO binding to DNA.
- id: PMID:28650476
  title: 'CrY2H-seq: a massively multiplexed assay for deep-coverage interactome mapping.'
  findings:
  - statement: >-
      CrY2H-seq provides high-throughput Arabidopsis transcription factor
      interaction data, but the cached full text does not expose the exact CO
      interaction pairs used in the seeded GOA annotation.
    supporting_text: >-
      we demonstrate CrY2H-seq's improved screening capacity, efficiency, and
      sensitivity over those of existing technologies.
- id: PMID:33082412
  title: B-box transcription factor 28 regulates flowering by interacting with constans.
  findings:
  - statement: >-
      BBX28 binds CO, decreases CO recruitment to the FT locus, and negatively
      regulates flowering under long days.
    supporting_text: >-
      the interaction between BBX28 and CO decreases the recruitment of CO to FT
      locus without affecting the transcriptional activation activity of CO.
- id: PMID:33693873
  title: Structural insights into the multivalent binding of the Arabidopsis FLOWERING
    LOCUS T promoter by the CO-NF-Y master transcription factor complex.
  findings:
  - statement: >-
      Structural and biochemical data show that CO-NF-Y directly recognizes
      CORE1/CORE2/P1/P2 elements in the FT promoter through TGTG-containing
      motifs.
    supporting_text: >-
      the four previously characterized cis-elements in the FT promoter proximal
      region, CORE1, CORE2, P1, and P2, are all direct CO binding sites.
    full_text_unavailable: true
  - statement: >-
      CO binds FT promoter DNA as a complex with NF-YB/NF-YC and uses B-box
      multimerization for multivalent promoter occupancy.
    supporting_text: >-
      Structural analysis of CO in complex with NUCLEAR FACTOR-YB/YC (NF-YB/YC)
      and the CORE2 or CORE1 elements revealed the molecular basis for the
      specific recognition of the shared TGTG motifs.
    full_text_unavailable: true
- id: file:ARATH/CO/CO-deep-research-falcon.md
  title: Falcon deep research synthesis for Arabidopsis CO
  findings:
  - statement: >-
      The local research synthesis identifies CO as a nuclear sequence-specific
      transcriptional activator of FT and emphasizes clock/light-dependent CO
      protein stability as central to long-day flowering.
- id: file:interpro/panther/PTHR31319/PTHR31319-entries.csv
  title: PANTHER PTHR31319 CONSTANS-like family entries
  findings:
  - statement: >-
      PANTHER places Arabidopsis CO in PTHR31319:SF82, a CONSTANS-specific
      subfamily, while related rice HD1/CO3 entries occur in other subfamilies.
    supporting_text: >-
      Q39057,Zinc finger protein CONSTANS,protein,3702,Arabidopsis thaliana,Arabidopsis thaliana
      (Mouse-ear cress),CO,373,PTHR31319:SF82,ZINC FINGER PROTEIN CONSTANS,True
