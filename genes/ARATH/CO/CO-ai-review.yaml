suggested_questions:
- question: >-
    Should legacy CO biological-process annotations to broad flower development
    be replaced by positive regulation of long-day photoperiodism, flowering for
    Arabidopsis CO?
  experts:
  - Coupland G
  - Imaizumi T
  - Valverde F
- question: >-
    How should CO-NF-Y, CO-COP1, and CO-microProtein/TOPLESS interactions be
    represented in GO without retaining uninformative protein binding rows?
  experts:
  - Coupland G
  - Wenkel S
  - Holt BF 3rd
- question: >-
    Is the UniProt Q39057-2 splice product translated and stable in vivo, or is
    it primarily a nonproductive transcript lacking the CCT domain?
  experts:
  - Coupland G
  - Wenkel S
suggested_experiments:
- hypothesis: >-
    Native CO isoform 2 is not a stable transcriptional activator because it
    lacks the C-terminal CCT domain required for NF-Y-associated DNA binding.
  description: >-
    Use isoform-specific RT-PCR/RNA-seq junction quantification plus
    native-locus epitope tagging or targeted proteomics under long-day and
    shade/far-red-enriched conditions to test whether Q39057-2 is translated and
    whether it binds CO regulatory partners.
  experiment_type: isoform-specific expression and proteomics
- hypothesis: >-
    CO regulatory partners shift CO from activating NF-Y promoter complexes to
    repressive or destabilized complexes depending on light phase and hormonal
    state.
  description: >-
    Perform time-resolved native CO CUT&RUN or ChIP-seq with matched CO
    interactome profiling under long day, short day, far-red-enriched light, and
    gibberellin perturbation to quantify partner-dependent changes in FT promoter
    occupancy and target transcription.
  experiment_type: chromatin profiling and protein-interaction proteomics
