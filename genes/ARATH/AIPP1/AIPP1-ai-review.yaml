core_functions:
  - description: >-
      AIPP1/EDM3 functions as an RNA-binding protein that regulates
      alternative polyadenylation of intronic heterochromatin-containing
      genes. Through its RRM domain, it associates with transcripts at
      proximal polyadenylation sites and promotes distal polyadenylation,
      ensuring production of full-length functional transcripts of target
      genes including IBM1 and RPP7.
    molecular_function:
      id: GO:0003723
      label: RNA binding
    directly_involved_in:
      - id: GO:0006396
        label: RNA processing
      - id: GO:0040029
        label: epigenetic regulation of gene expression
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: PMID:28808009
        supporting_text: >-
          dysfunction of AIPP1 impedes the use of distal polyadenylation
          sites at tested intronic HC-containing genes, such as the
          histone demethylase gene IBM1, resulting in a lack of functional
          full-length transcripts
      - reference_id: PMID:30407670
        supporting_text: >-
          EDM3-FLAG specifically associates with RPP7 transcripts at the
          proximal RPP7 polyadenylation site
  - description: >-
      AIPP1/EDM3 serves as a bridge protein in the ASI1-AIPP1-EDM2 (AAE)
      complex, directly binding both ASI1 and EDM2. This complex
      co-associates with H3K9me2-marked chromatin and nascent transcripts
      at proximal polyadenylation sites to suppress premature transcript
      termination and regulate epigenetic marks at target loci.
    molecular_function:
      id: GO:0030674
      label: protein-macromolecule adaptor activity
