        supporting_text: >-
          ASI1 and EDM2 form a protein complex in vivo via a bridge
          protein, ASI1-Immunoprecipitated Protein 1 (AIPP1), which is
          another RNA recognition motif-containing protein
  - description: >-
      AIPP1/EDM3 mediates race-specific innate immune defense by controlling
      H3K9me2-dependent alternative polyadenylation of RPP7 immune receptor
      transcripts. Loss of EDM3 abolishes RPP7-mediated resistance to the
      oomycete pathogen H. arabidopsidis isolate Hiks1.
    molecular_function:
