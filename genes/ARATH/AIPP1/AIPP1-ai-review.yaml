suggested_questions:
  - question: >-
      What is the RNA sequence or structural specificity of AIPP1/EDM3 RRM
      domain binding? Does it recognize specific sequence motifs at proximal
      polyadenylation sites?
  - question: >-
      How does the AAE complex mechanistically suppress proximal
      polyadenylation - does it directly compete with polyadenylation
      machinery or act through H3K9me2-dependent mechanisms?
  - question: >-
      What determines the context-dependent role of EDM3 in promoting
      H3K9me2 at RPP7 while suppressing it at most other target genes?
  - question: >-
      Are the effects of edm3 mutants on most H3K9me2-hypermethylated loci
      indirect, mediated through loss of IBM1 full-length transcripts?
suggested_experiments:
  - description: >-
      Perform in vitro RNA binding assays (e.g. EMSA, RNA pull-down) with
      purified AIPP1 RRM domain to determine RNA binding specificity and
      affinity for sequences around proximal polyadenylation sites
    hypothesis: >-
      AIPP1 RRM domain binds specific RNA sequences near proximal
      polyadenylation sites, which is essential for suppressing premature
      transcript termination
  - description: >-
      Generate edm3 ibm1 double mutants to distinguish direct effects of
      EDM3 loss from indirect effects mediated through IBM1 misregulation
    hypothesis: >-
      Many of the genome-wide H3K9me2 and cytosine methylation changes in
      edm3 mutants are indirect consequences of IBM1 loss rather than direct
      EDM3 targets
  - description: >-
      Perform CLIP-seq or eCLIP for AIPP1 to identify its complete
      transcriptome-wide RNA binding targets
    hypothesis: >-
      AIPP1 binds RNA at proximal polyadenylation sites of many intronic
      heterochromatin-containing genes beyond RPP7 and IBM1
