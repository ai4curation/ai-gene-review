taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  ASI1-immunoprecipitated protein 1 (AIPP1), also known as ENHANCED DOWNY
  MILDEW 3 (EDM3), is an RNA recognition motif (RRM)-containing nuclear
  protein that functions as a bridge component within the ASI1-AIPP1-EDM2
  (AAE) complex. This complex regulates RNA processing of intronic
  heterochromatin-containing genes by promoting distal 3' polyadenylation,
  thereby ensuring accumulation of full-length transcripts of target genes
  such as IBM1 and RPP7. AIPP1/EDM3 prevents gene silencing by suppressing
  CHG methylation and histone H3 lysine 9 dimethylation (H3K9me2) at target
  loci genome-wide, while at RPP7 it promotes H3K9me2 at the proximal
  polyadenylation site to suppress premature transcript termination.
  Through its role in controlling RPP7 alternative polyadenylation,
  AIPP1/EDM3 mediates race-specific disease resistance against the
  Hyaloperonospora arabidopsidis isolate Hiks1. AIPP1 binds directly to
  both ASI1 and EDM2, bridging these two proteins, and co-associates with
  EDM2 on H3K9me2-marked chromatin and transcripts at the proximal RPP7
  polyadenylation site.
