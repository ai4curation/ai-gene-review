id: O22456
gene_symbol: SEP3
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SEPALLATA3 (SEP3/AGL9; At1g24260) encodes a nuclear MIKC-type MADS-box
  transcription factor that acts as an E-class floral homeotic regulator in
  Arabidopsis thaliana. SEP3 binds CArG-box cis-regulatory DNA through its MADS
  domain and uses its K-box/coiled-coil region to form homo- and heteromeric
  MADS transcription-factor complexes. In floral tissues, these complexes
  cooperate with AP1, AP3/PI, AG, SHP/STK/TT16-class MADS proteins and
  transcription/chromatin coregulators to regulate RNA-polymerase-II target
  genes controlling floral organ identity, floral organ morphogenesis, ovule
  development and floral meristem determinacy. The strongest core evidence
  supports SEP3 as a chromatin-associated transcription factor and interaction
  hub for floral quartet-like complexes; seed coat and mucilage phenotypes are
  reported but require full-text review before being treated as curated SEP3
  functions.
alternative_products:
- name: '1'
  id: O22456-1
  description: >-
    Canonical SEP3 isoform. No reviewed evidence in the local corpus indicates
    an isoform-specific function distinct from the gene-level MADS-box
    transcription-factor role.
- name: '2'
  id: O22456-2
  sequence_note: VSP_008893
  description: >-
    Alternative splice isoform lacking residue 90. The local evidence does not
    establish a distinct biological or molecular function for this isoform.
