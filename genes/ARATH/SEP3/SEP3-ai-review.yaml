suggested_questions:
- question: >-
    Is SEP3 required directly for seed coat development and mucilage extrusion,
    or are the reported seed phenotypes indirect consequences of altered
    reproductive development or seed ageing?
  experts:
  - J. Renard
  - R. Niñoles
- question: >-
    Which endogenous SEP3-containing complexes act at ovule and seed-coat loci,
    and how do their target genes differ from the floral organ identity and
    meristem determinacy targets?
  experts:
  - G. C. Angenent
  - M. M. Kater
- question: >-
    Does isoform O22456-2, which lacks residue 90, measurably alter SEP3
    dimerization, tetramerization or target-gene selection in vivo?
  experts:
  - C. Zubieta
  - F. Parcy
suggested_experiments:
- experiment_type: seed coat phenotyping and complementation
  hypothesis: >-
    SEP3 has a direct, genetically separable role in seed coat development or
    mucilage extrusion.
  description: >-
    In matched sep3 and higher-order sep backgrounds complemented with
    native-promoter SEP3, quantify seed coat morphology, mucilage extrusion and
    seed longevity, then compare with floral phenotype severity to separate
    direct seed-coat effects from pleiotropic reproductive defects.
- experiment_type: staged ChIP-seq or CUT&Tag
  hypothesis: >-
    SEP3 binds distinct cis-regulatory targets in ovules and developing seed
    coats compared with floral organ primordia.
  description: >-
    Profile SEP3 occupancy in staged floral meristems, ovules and seed coats
    using native-tagged SEP3, then integrate RNA-seq from sep3/SEP-reduced
    tissues to identify direct targets for organ identity, ovule and seed-coat
    programs.
- experiment_type: isoform rescue assay
  hypothesis: >-
    SEP3 isoform 2 retains core MADS transcription-factor activity but may alter
    K-domain-dependent complex formation or target selection.
  description: >-
    Express isoform 1 and isoform 2 from comparable native SEP3 regulatory
    contexts in a sep3 sensitized background, then assay floral organ identity,
    determinacy, protein interactions and target-gene occupancy.
