    label: cell fate specification
  evidence_type: IMP
  original_reference_id: PMID:10821278
  review:
    summary: >-
      The sep1 sep2 sep3 mutant phenotype supports a role in specifying floral
      organ fates, but the parent term cell fate specification is too broad for
      the available evidence.
    action: MODIFY
    reason: >-
      The source evidence concerns floral organ identity, specifically loss of
      petals, stamens and carpels in SEP1/2/3-deficient flowers. A
      floral-organ-specific replacement captures the same biology without
      generalizing to cell fate specification outside flower development.
    proposed_replacement_terms:
