- description: >-
    SEP3 forms homo- and heteromeric MADS transcription-factor complexes with
    AP1, AP3/PI, AG, SHP/STK/TT16-class proteins and coregulators. These
    complexes provide the interaction framework for floral quartet-like control
    of organ identity, ovule programs and floral meristem determinacy.
