- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:30542810
  qualifier: enables
  review:
    summary: >-
      This IPI annotation records the interaction of PAL1 with the Kelch repeat
      F-box protein SAGL1 (AT1G55270), which targets PAL1 for proteasome-mediated
      degradation. The interaction is real and biologically meaningful (PAL1 is
      the regulated substrate), but bare "protein binding" is an uninformative
      molecular function and PAL1 is not an adapter; it should not be a core MF.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      GO:0005515 conveys no specific function. The biology is that PAL1 is a
      substrate of SAGL1-mediated ubiquitin-proteasome turnover, captured better
      in the notes/regulation context than as a generic binding MF.
    supported_by:
    - reference_id: PMID:30542810
      supporting_text: >-
        SMALL AND GLOSSY LEAVES1 (SAGL1), a Kelch repeat F-box protein,
        interacts with PAL1 protein for proteasome-mediated degradation
