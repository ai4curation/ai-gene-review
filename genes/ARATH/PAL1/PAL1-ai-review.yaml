- term:
    id: GO:0046244
    label: salicylic acid catabolic process
  evidence_type: IMP
  original_reference_id: PMID:20566705
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      This annotation is mis-directed. The cited study shows that quadruple pal
      mutants accumulate REDUCED levels of salicylic acid, i.e. PAL activity is
      required for salicylate BIOSYNTHESIS (phenylpropanoid/benzoate route), not
      its catabolism. Annotating PAL1 to salicylic acid catabolic process
      inverts the biology.
    action: REMOVE
    reason: >-
      The evidence supports a role in salicylate biosynthesis (loss of PAL
      reduces SA), the opposite of catabolism. The catabolic-process term is
      incorrect for PAL1.
    supported_by:
    - reference_id: PMID:20566705
      supporting_text: >-
        The quadruple mutants also accumulated substantially reduced levels of
        salicylic acid
- term:
    id: GO:0046274
    label: lignin catabolic process
  evidence_type: IMP
  original_reference_id: PMID:20566705
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      This annotation is mis-directed. PAL1 supplies precursors (via
      trans-cinnamate) for lignin BIOSYNTHESIS; loss of PAL reduces, not
      degrades, lignin. Lignin catabolic process inverts the enzyme's role and
      is not supported by the cited study.
    action: REMOVE
    reason: >-
      PAL feeds the monolignol/lignin biosynthetic branch of phenylpropanoid
      metabolism; it does not catabolize lignin. The catabolic-process term is
      incorrect.
    supported_by:
