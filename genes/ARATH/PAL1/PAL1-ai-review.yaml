    supporting_text: >-
      recombinant native AtPAL1, 2, and 4 were demonstrated to be catalytically
      competent for l-phenylalanine deamination
  - reference_id: P35510
    supporting_text: >-
      Reaction=L-phenylalanine = (E)-cinnamate + NH4(+); ... EC=4.3.1.24
proposed_new_terms: []
suggested_questions:
- question: >-
    How is metabolic flux partitioned between PAL1 and PAL2 (and the minor PAL3/
    PAL4 isoforms) across tissues, developmental stages, and stress conditions,
    given their functional redundancy?
- question: >-
    Does PAL1 participate in a metabolon with downstream phenylpropanoid enzymes
    (e.g., C4H) at the ER surface, and how does the KFB/SAGL1-mediated proteasomal
    turnover integrate with such channeling to control flux?
suggested_experiments:
- description: >-
    Isoform-resolved metabolic flux analysis (e.g., 13C-Phe labeling) in pal1,
    pal2, and pal1 pal2 mutants to quantify the specific contribution of PAL1 to
    lignin, flavonoid, and salicylate branches.
- description: >-
    Quantitative in vivo measurement of PAL1 protein half-life in kfb and sagl1
    mutant backgrounds under defense induction to dissect how F-box-mediated
    turnover shapes phenylpropanoid output.
