core_functions:
- description: >-
    Catalyzes the first, rate-limiting step of the phenylpropanoid pathway: the
    non-oxidative deamination of L-phenylalanine to (E)-cinnamate plus ammonia,
    using an autocatalytically formed MIO cofactor. This commits carbon from the
    phenylalanine pool to phenylpropanoid metabolism.
  molecular_function:
    id: GO:0045548
    label: phenylalanine ammonia-lyase activity
  directly_involved_in:
