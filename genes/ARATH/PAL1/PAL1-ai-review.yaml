id: P35510
gene_symbol: PAL1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  PAL1 is a phenylalanine ammonia-lyase (EC 4.3.1.24) that catalyzes the first
  and rate-limiting step of the phenylpropanoid pathway, the non-oxidative
  deamination of L-phenylalanine to (E)-cinnamate (trans-cinnamic acid) plus
  ammonia. It is a cytosolic, homotetrameric enzyme of the PAL/histidase family
  whose active site contains a 4-methylidene-imidazol-5-one (MIO) electrophilic
  cofactor formed autocatalytically by cyclization and dehydration of an
  internal Ala-Ser-Gly motif. By generating trans-cinnamate, PAL1 directs
  carbon flux from primary metabolism (the shikimate/phenylalanine pool) into
  phenylpropanoid metabolism, feeding the biosynthesis of lignin, flavonoids,
  anthocyanins, condensed tannins, and salicylate, as well as a broad range of
  defense- and stress-related phenolic compounds. In Arabidopsis, PAL1 is one
  of a small family of four PAL genes (PAL1-PAL4); PAL1 and PAL2 are the
  predominant, functionally redundant isoforms responsible for the bulk of
  flux into soluble phenolics and tissue-specific lignin, while higher-order
  pal mutants reveal roles in pigmentation, UV-B protection, salicylate-dependent
  defense against pathogens, and normal growth and fertility. PAL enzyme levels
  are tightly controlled, including post-translationally through Kelch-repeat
  F-box (KFB/SAGL1) proteins that target PAL isozymes for ubiquitin-26S
  proteasome degradation.
