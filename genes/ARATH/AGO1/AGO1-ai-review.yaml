    summary: AGO1 is a guide-RNA-bound Argonaute, but nucleic acid binding is too broad for its curated
      role.
    action: MODIFY
    reason: The informative molecular functions are small-RNA guide binding and PIWI-domain RNA slicing,
      not generic nucleic acid binding.
    proposed_replacement_terms: &id001
