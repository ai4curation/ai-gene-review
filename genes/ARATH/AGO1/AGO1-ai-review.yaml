proposed_new_terms: []
suggested_questions:
- question: Should broad AGO1 immune annotations be replaced consistently with RNAi-mediated antiviral
    immune response where the evidence is small-RNA silencing?
- question: Which AGO1 condensate or membrane-associated RISC localizations should be curated directly
    versus described in literature notes?
suggested_experiments:
- description: Measure AGO1 guide-RNA loading, target slicing, and translational repression across defined
    miRNA, ta-siRNA, and viral siRNA substrates.
- description: Compare AGO1 cytoplasmic, nuclear, membrane-associated, and granule-localized pools under
    stress to determine which compartments carry active RISC function.
