id: O04379
gene_symbol: AGO1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: AGO1 is the principal Arabidopsis Argonaute effector for miRNA- and siRNA-guided post-transcriptional
  gene silencing. It binds guide small RNAs in RISC, recognizes complementary target RNAs, and represses
  them by PIWI-domain slicing and, in some contexts, translational inhibition. AGO1 acts mainly in cytoplasmic
  and membrane-associated contexts, with documented nuclear localization and stress-induced cytosolic
  condensate or granule-associated contexts also reported; leaf, auxin, light, stem-cell, and immune phenotypes
  are downstream outputs of this small-RNA effector role.
