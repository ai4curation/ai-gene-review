core_functions:
- description: Guide-RNA-bound Argonaute/RISC effector for post-transcriptional gene silencing. AGO1 loads
    21-22 nt miRNA/siRNA guides, recognizes complementary target RNAs, and represses them by PIWI-domain
    slicing and translational inhibition.
  molecular_function:
    id: GO:0004521
    label: RNA endonuclease activity
  directly_involved_in:
  - id: GO:0035195
    label: miRNA-mediated post-transcriptional gene silencing
  - id: GO:0016441
    label: post-transcriptional gene silencing
  supported_by:
  - reference_id: PMID:16081530
    supporting_text: We also show that AGO1 has Slicer activity.
  - reference_id: file:ARATH/AGO1/AGO1-deep-research-falcon.md
    supporting_text: AGO1 is the main Arabidopsis PTGS Argonaute and predominant loader of most miRNAs.
  - reference_id: file:interpro/panther/PTHR22891/PTHR22891-entries.csv
    supporting_text: O04379,Protein argonaute 1,Arabidopsis thaliana,AGO1
- description: siRNA guide selection and antiviral/endogenous silencing output. AGO1 binds siRNA guides
    in Argonaute effector complexes and participates in antiviral RNAi and secondary-siRNA regulatory
    pathways.
  molecular_function:
    id: GO:0035197
    label: siRNA binding
  directly_involved_in:
