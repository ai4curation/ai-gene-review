    supporting_text: AGO1 recruits virus-derived small interfering RNAs (siRNAs) in vivo
  - reference_id: file:ARATH/AGO1/AGO1-deep-research-falcon.md
    supporting_text: AGO1 preferentially loads 5-prime U, 21-22 nt guide small RNAs and integrates miRNA/siRNA
