    Should SOC1 annotations currently represented as response to cold or
    response to gibberellin be replaced in GOA by flowering-pathway terms when
    the evidence is expression/regulatory output rather than direct stress or
    hormone response?
  experts:
  - Coupland G
  - Lee I
  - Yu H
