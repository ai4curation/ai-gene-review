    Is maintenance of inflorescence meristem identity appropriate for SOC1, or
    should that annotation be removed or replaced after checking the full text
    and genotype details of PMID:20626659?
  experts:
  - Hepworth SR
  - Yu H
- question: >-
    Should GO add a more specific plant MIKC-type MADS transcription factor
    complex cellular-component term to represent SOC1/AGL24 and related floral
    quartet-like complexes?
  experts:
  - Angenent GC
  - Immink RG
  - Coupland G
