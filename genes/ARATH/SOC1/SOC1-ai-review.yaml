suggested_experiments:
- hypothesis: >-
    SOC1 partner identity determines which floral-transition targets are
    activated at distinct shoot-apex stages.
  description: >-
    Perform native-promoter SOC1 CUT&RUN or ChIP-seq together with
    partner-specific perturbations of AGL24, SVP, AP1, and SPL factors, paired
    with nascent RNA-seq across the floral transition.
  experiment_type: chromatin binding and transcriptional profiling
- hypothesis: >-
    The cytoplasmic SOC1 pool is a regulated reservoir that becomes nuclear
    only after partner availability or signaling-dependent modification.
  description: >-
    Quantify native SOC1-GFP localization dynamics under long-day, short-day,
    vernalization, and gibberellin treatments in wild type and agl24 mutants.
  experiment_type: live imaging
- hypothesis: >-
    SOC1's root-development role uses a subset of the same MADS partner and
    chromatin-recruitment mechanisms used at the shoot apex.
  description: >-
    Map SOC1 binding and transcriptomic effects in roots of soc1, agl24, xal2,
    and higher-order mutant backgrounds, with rescue by DNA-binding and
    partner-interaction mutant SOC1 alleles.
  experiment_type: genetics and functional genomics
