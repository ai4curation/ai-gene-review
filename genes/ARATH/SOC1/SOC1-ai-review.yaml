references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro mappings correctly identify SOC1 as a MADS-box transcription
      factor but some seeded terms are broader than the gene-specific evidence.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      PANTHER/IBA inference supports conserved MADS-box cis-regulatory DNA
      binding and transcriptional regulation by RNA polymerase II.
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping
  findings:
  - statement: >-
      UniProt records SOC1 in nucleus and cytoplasm, with cytoplasmic SOC1
      relocating to the nucleus in the presence of AGL24.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      The ARBA regulation of developmental process annotation is correct only
      at a very broad level and should be replaced by the flowering meristem
      transition term.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: >-
      AtSubP nuclear localization is consistent with experimental SOC1
      localization and transcription-factor function.
- id: PMID:10834834
  title: Distinct roles of CONSTANS target genes in reproductive development of Arabidopsis.
  findings:
  - statement: >-
      SOC1 and FT are early CONSTANS target genes required for CO-mediated
      promotion of flowering.
- id: PMID:10995392
  title: The AGAMOUS-LIKE 20 MADS domain protein integrates floral inductive pathways in Arabidopsis.
  findings:
  - statement: >-
      AGL20/SOC1 overexpression suppresses late flowering and SOC1 expression
      integrates vernalization/autonomous and photoperiod pathway inputs.
- id: PMID:11118137
  title: "Arabidopsis transcription factors: genome-wide comparative analysis among eukaryotes."
  findings:
  - statement: >-
      Genome-wide analysis supports Arabidopsis transcription factor family
      assignments, including MADS-domain regulators.
- id: PMID:11123798
  title: A MADS domain gene involved in the transition to flowering in Arabidopsis.
  findings:
  - statement: >-
      AGL20/SOC1 is activated in shoot apical meristems during the transition
      to flowering, and agl20 mutants flower late.
- id: PMID:11439126
  title: APETALA1 and SEPALLATA3 interact to promote flower development.
  findings:
  - statement: >-
      The cached abstract describes AP1/CAL yeast two-hybrid screening but does
      not identify SOC1; full text is needed to verify SOC1-specific rows.
- id: PMID:12837945
  title: >-
    Molecular and phylogenetic analyses of the complete MADS-box transcription
    factor family in Arabidopsis: new openings to the MADS world.
  findings:
  - statement: >-
      Arabidopsis MADS-box proteins are key plant developmental transcription
      factors and SOC1 belongs to this conserved family.
- id: PMID:15805477
  title: Comprehensive interaction map of the Arabidopsis MADS Box transcription factors.
  findings:
  - statement: >-
      Matrix yeast two-hybrid mapping found specific heterodimers and some
      homodimers among Arabidopsis MADS-box transcription factors.
- id: PMID:16507079
  title: Quantitative effects of vernalization on FLC and SOC1 expression.
  findings:
  - statement: >-
      SOC1 is quantitatively induced by vernalization as FLC is repressed,
      supporting non-core cold/vernalization response context.
- id: PMID:18339670
  title: Direct interaction of AGL24 and SOC1 integrates flowering signals in Arabidopsis.
  findings:
  - statement: >-
      AGL24 directly binds and activates SOC1, and SOC1 directly binds and
      activates AGL24, creating a positive-feedback loop at the shoot apex.
  - statement: >-
      AGL24-SOC1 interaction mediates gibberellin effects on flowering under
      short-day conditions.
- id: PMID:18466303
  title: SOC1 translocated to the nucleus by interaction with AGL24 directly regulates leafy.
  findings:
  - statement: >-
      SOC1 binds the LFY promoter and requires AGL24 interaction for nuclear
      relocation and LFY activation.
- id: PMID:20129060
  title: Pin1At encoding a peptidyl-prolyl cis/trans isomerase regulates flowering time in Arabidopsis.
  findings:
  - statement: >-
      Pin1At interacts with phosphorylated SOC1 and AGL24 and regulates
      flowering through prolyl cis/trans isomerization of these factors.
- id: PMID:20626659
  title: >-
    Arabidopsis BLADE-ON-PETIOLE1 and 2 promote floral meristem fate and
    determinacy in a previously undefined pathway targeting APETALA1 and
    AGAMOUS-LIKE24.
  findings:
  - statement: >-
      Cached abstract does not mention SOC1, so the SOC1 annotation to
      maintenance of inflorescence meristem identity remains unresolved.
- id: PMID:21798944
  title: Evidence for network evolution in an Arabidopsis interactome map.
  findings:
  - statement: >-
      Proteome-wide Arabidopsis binary interactome mapping provides physical
      interaction records but does not itself define SOC1's molecular activity.
- id: PMID:24714165
  title: >-
    Phytoplasma effector SAP54 hijacks plant reproduction by degrading MADS-box
    proteins and promotes insect colonization in a RAD23-dependent manner.
  findings:
  - statement: >-
      SAP54 physically associates with Type II MADS-box transcription factors,
      including SOC1, and promotes degradation of MADS proteins.
- id: PMID:30946745
  title: >-
    Floral regulators FLC and SOC1 directly regulate expression of the B3-type
    transcription factor TARGET OF FLC AND SVP 1 at the Arabidopsis shoot apex
    via antagonistic chromatin modifications.
  findings:
  - statement: >-
      SOC1 directly activates TFS1 and opposes PRC function through recruitment
      of REF6 and BRM during floral transition.
- id: PMID:31540691
  title: OXIDATIVE STRESS 3 regulates drought-induced flowering through APETALA 1.
  findings:
  - statement: >-
      OXS3 binds SOC1 in vitro and in vivo, and SOC1 is required for full OXS3
      repression of the AP1 promoter in transient assays.
- id: file:ARATH/SOC1/SOC1-uniprot.txt
  title: UniProtKB record O64645 for Arabidopsis thaliana SOC1
  findings:
  - statement: >-
      UniProt summarizes SOC1 as a transcription activator active in flowering
      time control, forming a heterodimer with AGL24 and localizing to nucleus
      and cytoplasm.
- id: file:ARATH/SOC1/SOC1-deep-research-falcon.md
  title: Falcon deep research report on SOC1
  findings:
  - statement: >-
      Deep research synthesis identifies SOC1 as a MIKC-type MADS-box
      transcription factor integrating flowering signals, activating LFY and
      TFS1-related targets, and showing additional root-development roles in
      recent literature.
- id: file:interpro/panther/PTHR48019/PTHR48019-metadata.yaml
  title: PANTHER PTHR48019 MADS-box/MEF2 transcription factor family context
  findings:
  - statement: >-
      PTHR48019 groups MADS-box/MEF2 transcription factors that regulate
      developmental processes through homo- and heterodimer formation and
      sequence-specific DNA binding.
core_functions:
- description: >-
    SOC1 is a nuclear MADS-box RNA polymerase II transcription factor that
    binds cis-regulatory regions of floral-transition genes and activates
    transcriptional programs promoting the vegetative-to-reproductive meristem
    transition. Direct targets and outputs include AGL24 positive feedback,
    LFY promoter activation, and TFS1 activation with recruitment of chromatin
    regulators REF6 and BRM.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  - id: GO:0045944
    label: positive regulation of transcription by RNA polymerase II
  - id: GO:0010228
    label: vegetative to reproductive phase transition of meristem
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:18466303
    supporting_text: >-
      SOC1 directly binds to the distal and proximal region of the LFY promoter
      where critical cis-elements are located.
  - reference_id: PMID:18339670
    supporting_text: >-
      positive-feedback loop conferred by direct transcriptional regulation
      between AGL24 and SOC1 at the shoot apex integrates flowering signals.
  - reference_id: PMID:30946745
    supporting_text: >-
      SOC1 opposes PRC function at TFS1 through recruitment of the histone
      demethylase RELATIVE OF EARLY FLOWERING 6 (REF6) and the SWI/SNF
      chromatin remodeler ATPase BRAHMA (BRM).
- description: >-
    SOC1 forms MADS-domain partner complexes, most clearly a SOC1-AGL24
    heterodimer, that regulate SOC1 nuclear accumulation and enable floral
    transition target activation. This dimerization/heterodimerization is a
    core mechanism but should be interpreted in the context of SOC1's
    transcription factor activity, not as generic protein binding.
  molecular_function:
    id: GO:0046982
    label: protein heterodimerization activity
  directly_involved_in:
  - id: GO:0010228
    label: vegetative to reproductive phase transition of meristem
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:18466303
    supporting_text: >-
      heterodimerization of SOC1 and AGL24 is a key mechanism in activating LFY
      expression.
  - reference_id: file:ARATH/SOC1/SOC1-uniprot.txt
    supporting_text: >-
      Forms a heterodimer with AGL24 through MADS-box domain.
