id: O64645
gene_symbol: SOC1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SOC1/AGL20 encodes a 214 aa MIKC-type MADS-box transcription factor in
  Arabidopsis thaliana. It is a nuclear, sequence-specific RNA polymerase
  II transcription regulator that integrates photoperiod, vernalization/FLC,
  gibberellin, and age-related flowering signals at the shoot apical meristem.
  SOC1 promotes the vegetative-to-reproductive meristem transition by forming
  MADS-domain partner complexes, especially with AGL24, and by directly
  regulating flowering and floral-transition targets such as LFY, AGL24, and
  TFS1. SOC1 can be observed in the cytoplasm when expressed alone, but AGL24
  interaction promotes nuclear accumulation, consistent with partner-dependent
  MADS transcription factor function.
existing_annotations:
- term:
    id: GO:0009409
    label: response to cold
  evidence_type: IEP
  original_reference_id: PMID:16507079
  review:
    summary: >-
      The source supports SOC1 transcript induction by vernalization/cold in
      reciprocal relationship to FLC repression. This is useful evidence that
      SOC1 is an output of cold-dependent flowering regulation, but it does not
      make cold response the core function of the protein.
    action: KEEP_AS_NON_CORE
    reason: >-
      SOC1 is a flowering-time transcription factor whose expression responds to
      vernalization. The response-to-cold annotation should be retained as a
      non-core regulatory input rather than treated as a stress-response
      function.
    supported_by:
    - reference_id: PMID:16507079
      supporting_text: >-
        SUPPRESSOR OF OVER-EXPRESSION OF CO 1 (SOC1), a downstream target of
        FLC, is quantitatively induced by vernalization in a reciprocal manner
        to FLC.
