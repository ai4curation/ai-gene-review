suggested_questions:
  - question: >-
      Does CHL1 (At5g40090) pair with a specific neighboring TNL receptor
      analogous to the CHS1-SOC3 pairing? If so, what is the identity of the
      partner TNL and what pathogen or stress signal does the complex detect?
  - question: >-
      What is the precise subcellular localization of CHL1? Is it
      cytoplasmic, chloroplast-associated, or does it shuttle between
      compartments in response to cold stress?
  - question: >-
      Does CHL1 possess NADase activity in vitro, and if so, what are the
      specific products generated (pRib-AMP, di-ADPR, etc.)?
suggested_experiments:
  - hypothesis: CHL1 has NADase activity that generates immune signaling molecules.
    description: >-
      Express and purify recombinant CHL1 TIR domain. Perform in vitro NADase
      assays with NAD+ substrate, analyzing products by LC-MS. Compare activity
      of wild-type vs catalytic mutant (E/A mutation in conserved TIR catalytic
      residue). Test whether TIR domain self-association is required for activity
      by comparing monomeric vs oligomeric protein preparations.
    experiment_type: biochemical assay
  - hypothesis: CHL1 pairs with a neighboring TNL receptor to form a functional
      immune complex.
    description: >-
      Perform co-immunoprecipitation experiments using tagged CHL1 expressed under
      its native promoter. Identify interacting partners by mass spectrometry.
      Test candidate neighboring TNL genes by genetic epistasis (knockout of
      neighboring TNLs should suppress any chl1 gain-of-function phenotypes).
    experiment_type: protein interaction and genetic analysis
