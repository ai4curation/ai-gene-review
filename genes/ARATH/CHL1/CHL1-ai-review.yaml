  - id: PMID:23617639
    title: A TIR-NBS protein encoded by Arabidopsis Chilling Sensitive 1 (CHS1)
      limits chloroplast damage and cell death at low temperature.
    findings:
      - statement: CHS1 (At1g17610) and its paralog CHL1 (At5g40090) are TIR-NBS
          proteins that limit chloroplast damage and cell death at low temperature.
        supporting_text: >-
          Over-expression of CHS1 or CHL1 alleviates chilling damage and enhances
          plant growth at moderate (24°C) and chilling (13°C) temperatures
      - statement: The chilling-sensitive phenotype depends on defense regulators EDS1
          and PAD4.
        supporting_text: >-
          chs1-1 chilling sensitivity requires the TIR-NBS-LRR and basal
          resistance regulators encoded by EDS1 and PAD4 but not salicylic acid
  - id: PMID:23651299
    title: A missense mutation in CHS1, a TIR-NB protein, induces chilling
      sensitivity in Arabidopsis.
    findings:
      - statement: CHS1 protein stability is positively regulated by low temperature
          independently of the 26S proteasome pathway.
        supporting_text: >-
          the stability of the CHS1 protein was positively regulated by low
          temperatures independently of the 26S proteasome pathway
  - id: PMID:27699788
    title: Temperature-dependent autoimmunity mediated by chs1 requires its
      neighboring TNL gene SOC3.
    findings:
      - statement: CHS1 physically interacts with the neighboring TNL gene SOC3 to
          form a paired immune receptor complex.
        supporting_text: >-
          CHS1 interacted with the NB and LRR domains of SOC3; however, mutated
          chs1 interacted with the TIR, NB and LRR domains of SOC3 in vitro and
          in vivo
      - statement: Loss of SOC3 completely suppresses the chilling-sensitive phenotype
          of chs1-2.
        supporting_text: >-
          downregulation of SOC3 by an artificial microRNA construct fully rescued
          the chilling sensitivity and defense defects of chs1-2
