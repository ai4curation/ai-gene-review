      NAD+ hydrolase activity through the TIR domain, generating signaling
      molecules (pRib-AMP, di-ADPR) that activate the EDS1-PAD4-ADR1 immune
      signaling node. Acts as a truncated TIR-NBS adaptor/regulator, pairing
      with full-length TNL receptors to integrate temperature sensing with
      innate immune signaling. Limits chloroplast damage and cell death at
      low temperatures.
