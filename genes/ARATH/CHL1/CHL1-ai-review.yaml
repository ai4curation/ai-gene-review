  - term:
      id: GO:0015112
      label: nitrate transmembrane transporter activity
    evidence_type: IMP
    original_reference_id: PMID:9844028
    review:
      summary: >-
        Nitrate transmembrane transporter activity is the core molecular function of
        CHL1/NRT1.1, demonstrated by mutant analysis (chl1 alleles cause reduced
        nitrate uptake and chlorate resistance) and by heterologous expression in
        Xenopus oocytes, where CHL1 transports nitrate by proton-coupled symport over
        a wide concentration range (dual-affinity, biphasic kinetics; Km ~50 uM
        high-affinity and ~4 mM low-affinity phases).
      action: ACCEPT
      reason: >-
        This is the well-established, experimentally validated core function of
        CHL1/NRT1.1, the first cloned plant nitrate transporter. Supported by decades
        of primary literature (PMID:8453665, PMID:10330471, PMID:24572362,
        PMID:24572366) and corroborated by the falcon deep research synthesis.
      supported_by:
        - reference_id: PMID:9844028
          supporting_text: >-
            The Arabidopsis CHL1 protein plays a major role in high-affinity nitrate
            uptake
        - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
          supporting_text: |-
            NPF6.3/CHL1/NRT1.1 is widely regarded as a **dual-affinity** nitrate transporter with **biphasic kinetics**, enabling transport across a wide external nitrate range.
        - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
          supporting_text: |-
            NPF6.3 is described as a **proton-coupled nitrate symporter**.
  - term:
      id: GO:0015706
      label: nitrate transmembrane transport
    evidence_type: IMP
    original_reference_id: PMID:9844028
    review:
      summary: >-
        CHL1/NRT1.1 mediates nitrate transmembrane transport, the biological-process
        counterpart of its nitrate transporter activity, contributing a large
        fraction of root nitrate uptake across a broad external nitrate range.
      action: ACCEPT
      reason: >-
        Directly supported by mutant uptake assays and heterologous expression. The
        falcon synthesis estimates CHL1/NPF6.3 contributes roughly 10-80% of
        whole-plant nitrate uptake depending on nitrate concentration.
      supported_by:
        - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
          supporting_text: |-
            AtNPF6.3 has been estimated to contribute roughly 10–80% of whole-plant nitrate uptake.
