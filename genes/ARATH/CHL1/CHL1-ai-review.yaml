description: >-
  CHL1 (NPF6.3 / NRT1.1; At1g12110, UniProt Q05085) is the founding member of the
  plant NRT1/PTR (NPF) nitrate transporter family and the first cloned plant
  nitrate transporter. It is a plasma-membrane, proton-coupled nitrate symporter
  belonging to the major facilitator superfamily (MFS), expressed most strongly in
  roots (epidermal and vascular cells) as well as guard cells. CHL1 is a
  dual-affinity transporter showing biphasic kinetics, with a high-affinity phase
  (Km ~50 uM) and a low-affinity phase (Km ~4 mM). The affinity mode is switched by
  phosphorylation of Thr101 by the CBL1/CBL9-CIPK23 kinase module: phosphorylation
  favors high-affinity transport while dephosphorylation favors low-affinity
  transport. Beyond transport, CHL1 acts as a nitrate sensor ("transceptor") that
  initiates the primary nitrate response and regulates expression of other nitrate
  transport genes such as NRT2.1; its sensing function is separable from its uptake
  activity. CHL1 also facilitates basipetal auxin transport, linking local nitrate
  availability to lateral root development, and contributes to stomatal opening and
  to root-to-shoot nitrate translocation. The gene was originally identified through
  chlorate-resistance screens (chlorate is a toxic nitrate analog), giving rise to
  the CHL1 name.
existing_annotations:
