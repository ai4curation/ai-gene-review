      id: GO:0006857
      label: oligopeptide transport
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Oligopeptide transport is inferred from membership in the proton-dependent
        oligopeptide transporter (POT/PTR) family (InterPro IPR018456). The
        NPF/NRT1-PTR family is evolutionarily related to peptide transporters, but
        CHL1/NRT1.1 specifically transports nitrate, not peptides.
      action: REMOVE
      reason: >-
        Family-level (InterPro) over-annotation. CHL1/NRT1.1 recognizes specifically
        nitrate and chlorate but NOT the di-peptide Ala-Ala (UniProt FUNCTION), so
        peptide transport is not a function of this protein. The PTR family name
        reflects ancestry, not CHL1 substrate specificity.
      supported_by:
        - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
          supporting_text: |-
            Across sources, nitrate (NO3−) is the core substrate, and NPF6.3 contributes substantially to nitrate uptake
