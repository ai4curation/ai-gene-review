core_functions:
  - description: >-
      Plasma-membrane proton-coupled nitrate symporter mediating dual-affinity
      (biphasic) nitrate uptake from the soil solution, the first and rate-limiting
      step of root nitrogen acquisition. The high-affinity (Km ~50 uM) vs
      low-affinity (Km ~4 mM) mode is switched by Thr101 phosphorylation via the
      CBL1/CBL9-CIPK23 kinase module.
    molecular_function:
      id: GO:0015112
      label: nitrate transmembrane transporter activity
    directly_involved_in:
      - id: GO:0015706
        label: nitrate transmembrane transport
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: PMID:10330471
        supporting_text: >-
          CHL1 is a dual-affinity nitrate transporter of Arabidopsis involved in
          multiple phases of nitrate uptake
      - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
        supporting_text: |-
          NPF6.3/CHL1/NRT1.1 is widely regarded as a **dual-affinity** nitrate transporter with **biphasic kinetics**, enabling transport across a wide external nitrate range.
  - description: >-
      Nitrate sensor ("transceptor") that initiates the primary nitrate response
      and regulates nitrate-responsive gene expression (including NRT2.1),
      independently of its transport activity. Phosphorylation of Thr101 by CIPK23
      controls both the affinity switch and the signaling output.
    molecular_function:
      id: GO:0015112
      label: nitrate transmembrane transporter activity
    directly_involved_in:
      - id: GO:0010167
        label: response to nitrate
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: PMID:19766570
        supporting_text: >-
          CHL1 functions as a nitrate sensor in plants
      - reference_id: file:ARATH/CHL1/CHL1-deep-research-falcon.md
        supporting_text: |-
          A core concept in nitrate biology is that NPF6.3 acts as a **transceptor**—a transporter with receptor-like signaling capability—helping initiate the **primary nitrate response (PNR)** and modulating expression of other nitrate transport genes (e.g., **NRT2.1**) and developmental programs.
proposed_new_terms:
  - proposed_name: nitrate-activated signaling pathway
    proposed_definition: >-
      A signaling cascade initiated by perception of extracellular nitrate by a
      nitrate sensor/transceptor (such as CHL1/NRT1.1), leading to CBL/CIPK-mediated
      phosphorylation events and downstream transcriptional reprogramming (primary
      nitrate response).
    justification: >-
      No precise GO term currently captures the transceptor-initiated nitrate
      signaling pathway distinct from the generic "response to nitrate"
      (GO:0010167). The falcon synthesis describes nitrate-induced Ca2+ signals
      perceived by CBL1/CBL9, activating CIPK23, which phosphorylates NRT1.1 at
      Thr101 and shifts apparent affinity from Km ~4 mM to Km ~40 uM.
    proposed_parent:
      id: GO:0010167
      label: response to nitrate
suggested_questions:
  - question: >-
      Beyond Thr101, how do the CNGC15 Ca2+ channel complex and ABI2/ABA inputs
      quantitatively tune the balance between CHL1's transport and signaling outputs
      in vivo?
  - question: >-
      What structural changes accompany the homodimer-to-monomer transition upon
      Thr101 phosphorylation, and how do they convert the transporter between high-
      and low-affinity kinetic modes?
suggested_experiments:
  - hypothesis: >-
      CHL1's nitrate-sensing (transceptor) function is mechanistically separable
      from its transport activity and depends on distinct residues.
    description: >-
      Compare transport-dead but sensing-competent mutants (e.g., Pro492 variants)
      with sensing-dead variants in planta, measuring both nitrate uptake (15N flux,
      electrophysiology in oocytes) and primary-nitrate-response gene induction
      (e.g., NRT2.1, NIA1) to dissect the two functions.
    experiment_type: structure-function and physiological analysis
  - hypothesis: >-
      The CBL1/CBL9-CIPK23 module phosphorylates Thr101 in a nitrate-concentration-
      dependent manner to switch transport affinity.
    description: >-
