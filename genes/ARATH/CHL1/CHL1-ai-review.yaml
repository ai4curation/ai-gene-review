description: >-
  CHL1 (CHS1-Like 1, At5g40090) is a truncated TIR-NBS immune receptor that
  lacks a leucine-rich repeat (LRR) domain. It belongs to a class of atypical
  NLR proteins (TN proteins) that function as adaptors or regulators within the
  plant immune system, often pairing with neighboring full-length TNL receptors.
  Its paralog CHS1 (At1g17610) was identified through a chilling-sensitive
  mutant screen; overexpression of either CHS1 or CHL1 alleviates chilling
  damage and enhances plant growth at both moderate and cold temperatures. The
  TIR domain possesses NAD+ hydrolase (NADase) enzymatic activity (EC 3.2.2.6),
  generating small-molecule signals that activate the EDS1-PAD4-ADR1 immune
  signaling node. CHL1 limits chloroplast damage and cell death at low
  temperatures, integrating temperature sensing with innate immune signaling
  pathways. The chilling phenotype of the paralog chs1 mutant depends on EDS1
  and PAD4 defense regulators, and requires the neighboring TNL gene SOC3,
  establishing a paired immune receptor mechanism.
existing_annotations:
  - term:
      id: GO:0043531
      label: ADP binding
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        ADP binding is inferred from the NB-ARC domain (IPR002182). NB-ARC
        domains are nucleotide-binding switches that cycle between ADP-bound
        (inactive) and ATP-bound (active) states to regulate NLR activation.
        ADP binding is a genuine molecular function of the NB-ARC domain.
      action: ACCEPT
      reason: >-
        ADP binding is a well-established function of NB-ARC domains in plant
        NLR proteins. The NB-ARC domain acts as a molecular switch gating
        immune activation. This IEA annotation from InterPro is correct.
      supported_by: []
  - term:
      id: GO:0061809
      label: NAD+ nucleosidase activity, cyclic ADP-ribose generating
    evidence_type: IEA
    original_reference_id: GO_REF:0000003
    review:
      summary: >-
        NAD+ nucleosidase activity is inferred from the EC number 3.2.2.6
        assigned to this protein. Plant TIR domains have been shown to possess
        NADase enzymatic activity, cleaving NAD+ to produce signaling molecules
        including pRib-AMP, pRib-ADP, di-ADPR, and ADPr-ATP that activate
        downstream immune signaling through EDS1-PAD4 heterodimers.
      action: ACCEPT
      reason: >-
        TIR domain NADase activity is now well-established for plant NLR
        proteins. The enzymatic activity requires TIR domain self-association
        and oligomerization. This is a core molecular function of TIR-containing
        immune receptors. While the specific cyclic ADP-ribose generating
        subtype (GO:0061809) may be slightly narrower than the full range of
        TIR NADase products, it captures the key enzymatic function.
      supported_by:
        - reference_id: PMID:23617639
          supporting_text: >-
            The sequence of another TIR-NBS gene (At5g40090) named CHL1
            (CHS1-like 1) is related to that of CHS1
  - term:
      id: GO:0006952
      label: defense response
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Defense response is inferred from the disease resistance protein family
        membership (IPR044974). CHL1 is classified as a disease resistance
        protein based on its TIR-NB-ARC domain architecture. The paralog CHS1
        mutant activates defense-associated phenotypes including SA accumulation
        and PR gene expression at low temperatures, and the chilling sensitivity
        requires defense regulators EDS1 and PAD4.
      action: ACCEPT
      reason: >-
        While CHL1 has not been directly shown to mediate pathogen resistance,
        its domain architecture, family membership, and the defense-associated
        phenotypes of its paralog CHS1 strongly support involvement in defense
        response. The defense signaling pathway (EDS1/PAD4 dependence) is
        experimentally validated for the CHS1 paralog.
      supported_by:
        - reference_id: PMID:23617639
          supporting_text: >-
            chs1-1 chilling sensitivity requires the TIR-NBS-LRR and basal
            resistance regulators encoded by EDS1 and PAD4
  - term:
      id: GO:0007165
      label: signal transduction
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: >-
        Signal transduction is inferred from the TIR domain (IPR000157). TIR
        domains mediate intracellular immune signaling by generating NAD+
        cleavage products that activate downstream EDS1-PAD4-ADR1 signaling
        complexes.
      action: ACCEPT
      reason: >-
        TIR domain-mediated signal transduction is a well-characterized
        function of plant immune receptors. The TIR domain generates
        enzymatic products that serve as signaling molecules to activate
        downstream immune pathways.
      supported_by:
        - reference_id: PMID:27699788
          supporting_text: >-
            the TN protein CHS1 interacts with the TNL protein SOC3 to modulate
            temperature-dependent autoimmunity
  - term:
      id: GO:0005737
      label: cytoplasm
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: >-
        Cytoplasmic localization is annotated from UniProt subcellular
        location data. Plant NLR proteins are typically cytoplasmic, where
        they function as intracellular immune receptors.
      action: ACCEPT
      reason: >-
        Cytoplasmic localization is consistent with the known biology of plant
        NLR immune receptors, which function as intracellular surveillance
        proteins.
      supported_by: []
  - term:
      id: GO:0009507
      label: chloroplast
    evidence_type: ISM
    original_reference_id: GO_REF:0000122
    review:
      summary: >-
        Chloroplast localization is predicted by TAIR computational methods.
        CHL1/CHS1 function involves limiting chloroplast damage at low
        temperatures, so chloroplast proximity or association is biologically
        plausible, though direct experimental localization data is lacking.
      action: KEEP_AS_NON_CORE
      reason: >-
        The ISM prediction is plausible given that CHS1/CHL1 function involves
        protection of chloroplasts from chilling damage. However, this is a
        computational prediction without direct experimental support for CHL1
        localization to chloroplasts. Keep as non-core pending experimental
        validation.
      supported_by:
        - reference_id: PMID:23617639
          supporting_text: >-
            alterations in photosynthetic complexes and thylakoid membrane
            integrity precede leaf cell death
  - term:
      id: GO:0009409
      label: response to cold
    evidence_type: IMP
    original_reference_id: PMID:23617639
    review:
      summary: >-
        Overexpression of CHL1 alleviates chilling damage and enhances plant
        growth at low temperatures. The paralog CHS1 was identified in a
        chilling-sensitive mutant screen, and CHL1 has the same protective
        function when overexpressed. This establishes CHL1 as involved in
        the response to cold.
      action: NEW
      reason: >-
        Response to cold is the primary experimentally characterized function
        of CHL1. Overexpression experiments show CHL1 alleviates chilling
        damage. This annotation is missing from the current GOA and should be
        added. Supported by deep research analysis in
        CHL1-deep-research-bioreason-sft.md which correctly identified the TIR-NBS
        domain architecture underlying this function.
      supported_by:
        - reference_id: PMID:23617639
          supporting_text: >-
            Over-expression of CHS1 or CHL1 alleviates chilling damage and enhances
            plant growth at moderate (24°C) and chilling (13°C) temperatures
        - reference_id: file:ARATH/CHL1/CHL1-deep-research-bioreason-sft.md
          supporting_text: >-
            [BioReason correctly identified TIR-NB-ARC domain architecture
            consistent with immune/stress response function]
