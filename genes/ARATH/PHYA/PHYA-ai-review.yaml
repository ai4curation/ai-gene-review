id: P14712
gene_symbol: PHYA
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  PHYA encodes Arabidopsis phytochrome A, a type I red/far-red biliprotein
  photoreceptor. PHYA is synthesized as a soluble cytoplasmic Pr-form
  phytochrome with a covalently attached phytochromobilin chromophore and
  reversibly photoconverts to signaling-active Pfr after red/far-red light
  absorption. Its best-supported biological roles are perception and signaling
  under continuous far-red light high-irradiance response conditions and very
  low fluence light, where PHYA promotes seedling de-etiolation,
  photomorphogenesis, nuclear accumulation/photobody localization, and
  light-responsive transcriptional reprogramming. Mechanistically, PHYA nuclear
  import and signaling depend on FHY1/FHL interactions, while downstream output
  includes modulation of PIF transcription factors, COP1/SPA-associated
  attenuation, HEMERA-linked photobody/PIF degradation pathways, and
  phyA-dependent phosphorylation of FHY1. PANTHER places PHYA in the conserved
  plant phytochrome photoreceptor family PTHR47876:SF3, supporting a
  photoreceptor-centered interpretation of its histidine-kinase-like domain
  rather than a bacterial-style phosphorelay assignment.
alternative_products:
- name: '1'
  id: P14712-1
  description: >-
    Canonical UniProt isoform. The available GO evidence supports the gene
    product as a whole; no reviewed annotation was judged isoform-specific.
- name: '2'
  id: P14712-2
  sequence_note: VSP_036311
  description: >-
    N-terminally truncated annotated splice isoform missing residues 1-108.
    No curated evidence in the reviewed PHYA GOA set established a distinct
    isoform-specific function for this product.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings:
  - statement: >-
      InterPro/domain-derived annotations capture phytochrome family features,
      but phosphorelay-specific inferences should be interpreted cautiously for
      plant PHYA because the family context supports photoreceptor signaling.
- id: GO_REF:0000033
  title: Annotation inferences using phylogenetic trees
  findings:
  - statement: >-
      The IBA phosphorelay sensor kinase call follows a broad phylogenetic
      inference across histidine-kinase-like photoreceptors and is not specific
      enough for Arabidopsis PHYA's experimentally supported output.
- id: GO_REF:0000044
  title: >-
    Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location
    vocabulary mapping, accompanied by conservative changes to GO terms applied
    by UniProt
  findings:
  - statement: >-
      UniProt subcellular-location mappings for cytoplasm, nucleoplasm, and
      nuclear speck are consistent with PHYA's light-dependent cytoplasmic to
      nuclear redistribution.
- id: GO_REF:0000108
  title: >-
    Automatic assignment of GO terms using logical inference, based on on
    inter-ontology links
  findings:
  - statement: >-
      Logical inference from far-red photoreceptor activity is appropriate for
      far-red signaling pathway, but not for phosphorelay signal transduction
      system when the underlying kinase call is rejected.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: >-
      ARBA's identical protein binding annotation is consistent with
      phytochrome dimerization but should be represented by the more informative
      homodimerization term.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: >-
      AtSubP computational predictions to plasma membrane and chloroplast are
      not supported by the curated PHYA literature or UniProt localization.
- id: file:ARATH/PHYA/PHYA-uniprot.txt
  title: UniProtKB record for Arabidopsis thaliana PHYA (P14712)
  findings:
  - statement: >-
      UniProt summarizes PHYA as a regulatory red/far-red photoreceptor that
      shuttles between cytoplasm and nucleus and contains covalently linked
      phytochromobilin.
- id: file:ARATH/PHYA/PHYA-deep-research-falcon.md
  title: Falcon deep research report for Arabidopsis PHYA
  findings:
  - statement: >-
      The deep research synthesis supports PHYA as a conserved red/far-red
      photoreceptor specialized for very-low-fluence and far-red
      high-irradiance responses.
- id: file:interpro/panther/PTHR47876/PTHR47876-metadata.yaml
  title: PANTHER PTHR47876 metadata for plant phytochrome photoreceptors
  findings:
  - statement: >-
      PANTHER PTHR47876 defines the family as plant phytochrome
      photoreceptors, matching PHYA's experimentally supported core role.
- id: file:interpro/panther/PTHR47876/PTHR47876-entries.csv
  title: PANTHER PTHR47876 member entries
  findings:
  - statement: >-
      PHYA (P14712) is listed in PTHR47876:SF3 together with plant
      phytochrome A/B/C/D/E family members.
- id: PMID:10348744
  title: PKS1, a substrate phosphorylated by phytochrome that modulates light signaling in Arabidopsis.
  findings:
  - statement: >-
      PKS1 is a phytochrome-binding substrate for light-regulated phytochrome
      kinase activity, supporting PHYA pathway interactions and kinase output
      without making generic protein binding a useful core MF.
- id: PMID:10524631
  title: Phytochrome signalling is mediated through nucleoside diphosphate kinase 2.
  findings:
  - statement: >-
      NDPK2 preferentially binds activated phytochrome in vitro and acts as a
      positive phytochrome signaling component.
- id: PMID:10995393
  title: HFR1 encodes an atypical bHLH protein that acts in phytochrome A signal transduction.
  findings:
  - statement: >-
      HFR1 is a phyA signaling component, but the paper reports that HFR1 did
      not directly bind phyA or phyB in the tested assay.
- id: PMID:11069292
  title: >-
    Phytochrome B binds with greater apparent affinity than phytochrome A to
    the basic helix-loop-helix factor PIF3 in a reaction requiring the PAS
    domain of PIF3.
  findings:
  - statement: >-
      phyA binds PIF3 selectively and reversibly after photoconversion to Pfr,
      but with lower apparent affinity than phyB.
- id: PMID:12006496
  title: >-
    PIF4, a phytochrome-interacting bHLH factor, functions as a negative
    regulator of phytochrome B signaling in Arabidopsis.
  findings:
  - statement: >-
      PIF4 is primarily a phyB pathway factor and has little affinity for phyA,
      arguing against a strong PHYA-specific protein-binding annotation.
- id: PMID:12119377
  title: >-
    Missense mutation in the PAS2 domain of phytochrome A impairs subnuclear
    localization and a subset of responses.
  findings:
  - statement: >-
      PHYA-GFP translocates from cytosol to nucleus under continuous far-red
      light and nuclear spots are linked to HIR signaling.
- id: PMID:14686433
  title: Phytochromes play a role in phototropism and gravitropism in Arabidopsis roots.
  findings:
  - statement: >-
      phyA and phyB mediate red-light-based root phototropism, whereas root
      gravitropism defects in this abstract are attributed to phyB and phyAB,
      not phyA alone.
- id: PMID:15155879
  title: >-
    Constitutive photomorphogenesis 1 and multiple photoreceptors control
    degradation of phytochrome interacting factor 3, a transcription factor
    required for light signaling in Arabidopsis.
  findings:
  - statement: >-
      Light promotes phyA/phyB interaction with PIF3 and phytochrome-dependent
      PIF3 degradation during the dark-to-light transition.
- id: PMID:15273290
  title: Heterodimerization of type II phytochromes in Arabidopsis.
  findings:
  - statement: >-
      All five Arabidopsis phytochromes are present as dimers, while type II
      phytochromes can form heterodimers.
- id: PMID:15448264
  title: Phytochrome-interacting factor 1 is a critical bHLH regulator of chlorophyll biosynthesis.
  findings:
  - statement: >-
      PIF1 interacts with photoactivated phytochromes A and B and links
      phytochrome signaling to chlorophyll biosynthesis regulation.
- id: PMID:15695459
  title: The roles of phytochromes in elongation and gravitropism of roots.
  findings:
  - statement: >-
      The abstract supports roles for phytochromes in root elongation and
      gravitropic curvature, but does not establish a PHYA single-mutant
      gravitropism defect.
- id: PMID:15707897
  title: >-
    Phytochrome-specific type 5 phosphatase controls light signal flux by
    enhancing phytochrome stability and affinity for a signal transducer.
  findings:
  - statement: >-
      PAPP5 dephosphorylates active phytochromes and tunes phytochrome
      stability and affinity for NDPK2.
- id: PMID:16332538
  title: Nuclear accumulation of the phytochrome A photoreceptor requires FHY1.
  findings:
  - statement: >-
      FHY1 physically interacts with PHYA and is required for light-regulated
      PHYA nuclear accumulation.
- id: PMID:16861711
  title: FHY1 and FHL act together to mediate nuclear accumulation of the phytochrome A photoreceptor.
  findings:
  - statement: >-
      FHY1 and FHL jointly mediate PHYA nuclear accumulation and colocalize
      with PHYA in nuclear speckles.
- id: PMID:17076805
  title: >-
    phyA dominates in transduction of red-light signals to rapidly responding
    genes at the initiation of Arabidopsis seedling de-etiolation.
  findings:
  - statement: >-
      PHYA has a quantitatively dominant early role in red-light-induced gene
      expression during seedling de-etiolation.
- id: PMID:17335514
  title: >-
    Identification of an arsenic tolerant double mutant with a thiol-mediated
    component and increased arsenic tolerance in phyA mutants.
  findings:
  - statement: >-
      phyA loss-of-function alleles show increased arsenic tolerance, indicating
      non-core stress-response crosstalk.
- id: PMID:18722184
  title: >-
    Arabidopsis COP1/SPA1 complex and FHY1/FHY3 associate with distinct
    phosphorylated forms of phytochrome A in balancing light signaling.
  findings:
  - statement: >-
      PHYA phosphorylation state controls differential association with
      FHY1/FHY3 signaling intermediates and COP1/SPA attenuation machinery.
- id: PMID:19208901
  title: >-
    Phytochrome A mediates rapid red light-induced phosphorylation of
    Arabidopsis FAR-RED ELONGATED HYPOCOTYL1 in a low fluence response.
  findings:
  - statement: >-
      PHYA directly interacts with FHY1/FHL and recombinant PHYA phosphorylates
      FHY1 in vitro.
- id: PMID:19286967
  title: >-
    Obligate heterodimerization of Arabidopsis phytochromes C and E and
    interaction with the PIF3 basic helix-loop-helix transcription factor.
  findings:
  - statement: >-
      PHYA is present as a homodimer and interacts with PIF3 in vivo after red
      light in an FR-reversible manner.
- id: PMID:19482971
  title: >-
    FAR-RED ELONGATED HYPOCOTYL1 and FHY1-LIKE associate with the Arabidopsis
    transcription factors LAF1 and HFR1 to transmit phytochrome A signals for
    inhibition of hypocotyl elongation.
  findings:
  - statement: >-
      PHYA, FHY1, FHL, LAF1, and HFR1 form protein complexes that transmit
      far-red PHYA signals for de-etiolation.
- id: PMID:21884939
  title: Photoconversion and nuclear trafficking cycles determine phytochrome A's response profile to far-red light.
  findings:
  - statement: >-
      The response peak of PHYA in far-red light is determined by
      photoconversion and FHY1/FHL nuclear-import complex dynamics.
- id: PMID:21969386
  title: Missense mutation in the amino terminus of phytochrome A disrupts the nuclear import of the photoreceptor.
  findings:
  - statement: >-
      A PHYA N-terminal mutant has reduced FHY1/FHL binding, impaired nuclear
      import, and reduced VLFR/HIR signaling.
- id: PMID:22232680
  title: Phytochrome regulates translation of mRNA in the cytosol.
  findings:
  - statement: >-
      The Pfr form of phytochromes can regulate PORA mRNA translation in the
      cytosol through PNT1; PHYA involvement is suggested but not resolved
      as a core PHYA function.
- id: PMID:22895253
  title: Photoactivated phytochromes interact with HEMERA and promote its accumulation to establish photomorphogenesis in Arabidopsis.
  findings:
  - statement: >-
      Photoactivated phytochromes directly interact with HEMERA to promote
      HMR accumulation, photobody localization, and PIF degradation.
- id: PMID:23708772
  title: Phytochrome-interacting factors have both shared and distinct biological roles.
  findings:
  - statement: >-
      This review summarizes phytochrome-PIF regulation and stimulus-responsive
      PIF expression, but the cached text does not validate a PHYA-specific cold
      response annotation.
- id: PMID:27729395
  title: In Planta Determination of the mRNA-Binding Proteome of Arabidopsis Etiolated Seedlings.
  findings:
  - statement: >-
      The high-throughput mRNA interactome study captured more than 700
      Arabidopsis proteins, but the cached text does not provide PHYA-specific
      mechanistic mRNA-binding evidence.
- id: PMID:31732705
  title: PHYTOCHROME INTERACTING FACTOR8 Inhibits Phytochrome A-Mediated Far-Red Light Responses in Arabidopsis.
  findings:
  - statement: >-
      PIF8 represses PHYA-mediated far-red responses mainly through indirect
      pathway effects and binds PHYA weakly, if at all.
- id: PMID:36508461
  title: A role for brassinosteroid signalling in decision-making processes in the Arabidopsis seedling.
  findings:
  - statement: >-
      The cached abstract describes a light and water-withdrawal screen but
      does not provide PHYA-specific evidence for a generic light-response
      annotation.
- id: PMID:8400877
  title: Arabidopsis HY8 locus encodes phytochrome A.
  findings:
  - statement: >-
      HY8 is PHYA; hy8 mutants lacking functional PHYA are defective in
      prolonged far-red high-irradiance responses.
- id: PMID:9351250
  title: >-
    The VLF loci, polymorphic between ecotypes Landsberg erecta and Columbia,
    dissect two branches of phytochrome A signal transduction that correspond
    to very-low-fluence and high-irradiance responses.
  findings:
  - statement: >-
      PHYA initiates very-low-fluence and far-red high-irradiance response
      pathways in Arabidopsis seedlings.
- id: PMID:9845368
  title: >-
    PIF3, a phytochrome-interacting factor necessary for normal photoinduced
    signal transduction, is a novel basic helix-loop-helix protein.
  findings:
  - statement: >-
      PIF3 binds phyA/phyB C-terminal domains and acts in phytochrome signaling
      to photoregulated genes.
