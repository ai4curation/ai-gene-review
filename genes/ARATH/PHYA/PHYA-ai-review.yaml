core_functions:
- description: >-
    PHYA acts as the Arabidopsis type I far-red photoreceptor that detects
    red/far-red visible light through Pr/Pfr photoconversion and transduces
    continuous far-red and very-low-fluence light signals to nuclear
    photomorphogenesis programs. The signaling cycle includes cytoplasmic dark
    localization, FHY1/FHL-dependent nuclear import, nuclear body/speckle
    localization, and regulation of PIF/COP1/FHY pathway outputs.
