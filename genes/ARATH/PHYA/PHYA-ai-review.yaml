suggested_questions:
- question: >-
    Is there PHYA-specific evidence for cold-response expression or function
    beyond secondary database mappings from the PIF review literature?
  experts:
  - Jeong J
  - Choi G
- question: >-
    Does PHYA directly contribute to PNT1/PORA translational repression, or is
    the cytosolic translation effect primarily mediated by PHYB under the tested
    conditions?
  experts:
  - Choi G
suggested_experiments:
- experiment_type: isoform functional assay
  hypothesis: >-
    The annotated N-terminally truncated PHYA isoform lacks normal FHY1/FHL
    interaction and therefore has altered nuclear import or far-red signaling.
  description: >-
    Express matched PHYA isoform 1 and isoform 2 fluorescent fusions from the
    native PHYA promoter in a phyA-null background, then quantify FHY1/FHL
    binding, nuclear import kinetics, nuclear body formation, and rescue of VLFR
    and FR-HIR seedling phenotypes.
- experiment_type: targeted RNA-binding and translation assay
  hypothesis: >-
    PHYA is not a direct mRNA-binding protein and any PORA translational
    repression reflects recruitment through PNT1 or another adapter.
  description: >-
    Test PHYA association with PORA mRNA by UV crosslinking/RIP in wild type,
    phyA, phyB, and pnt1 backgrounds under red and far-red light, with
    parallel PORA polysome profiling to distinguish direct RNA binding from
    indirect photoreceptor effects.
