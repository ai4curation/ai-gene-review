core_functions:
- description: ABA- and osmotic-stress-activated serine/threonine protein kinase
    (subclass III SnRK2). OST1 autophosphorylates (Ser-175 in the activation loop)
    and phosphorylates downstream substrates (SLAC1, KAT1, RBOHF, AREB/ABF and AKS
    transcription factors), transducing the ABA signal once PYR/PYL/RCAR receptors
    de-repress group A PP2C phosphatases.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  directly_involved_in:
  - id: GO:0009738
    label: abscisic acid-activated signaling pathway
  locations:
  - id: GO:0005737
    label: cytoplasm
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:12468729
    supporting_text: In-gel assays indicated that OST1 is an ABA-activated protein
      kinase related to the Vicia faba ABA-activated protein kinase (AAPK).
  - reference_id: PMID:22090030
    supporting_text: Activation of SnRK2s requires autophosphorylation.
- description: Positive regulator of the abscisic acid-activated signaling pathway
    that promotes stomatal closure. OST1 is essential for stomatal closure in response
    to drought, low humidity, darkness, elevated CO2, reactive oxygen species and
    pathogen-associated molecular patterns, and confers drought/water-stress tolerance.
  molecular_function:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  directly_involved_in:
  - id: GO:0090333
    label: regulation of stomatal closure
  - id: GO:0009414
    label: response to water deprivation
  locations:
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: PMID:30361234
    supporting_text: Genetic studies have established that SLAC1 and OST1 define the
      core pathway regulating rapid stomatal responses to most closure-inducing cues.
  - reference_id: PMID:19880399
    supporting_text: srk2d srk2e srk2i (srk2d/e/i) triple mutants exhibit greatly
      reduced tolerance to drought stress and highly enhanced insensitivity to ABA.
- description: Activator of the guard-cell slow-type anion channel SLAC1. OST1 binds
    and phosphorylates SLAC1 to activate anion efflux, driving the loss of guard-cell
    turgor that closes the stomatal pore.
  molecular_function:
    id: GO:0099106
    label: ion channel regulator activity
  directly_involved_in:
  - id: GO:0090333
    label: regulation of stomatal closure
  locations:
  - id: GO:0005886
    label: plasma membrane
  supported_by:
  - reference_id: PMID:19955427
    supporting_text: the OST1 kinase interacts with the SLAC1 anion channel, leading
      to its activation via phosphorylation.
  - reference_id: PMID:19955405
    supporting_text: we identified OST1 as an interaction partner of SLAC1 and ABI1.
suggested_questions:
- question: Is OST1's influence on sucrose metabolism, fatty-acid desaturation and
    seed-oil (triglyceride) accumulation a direct consequence of substrate phosphorylation,
    or an indirect outcome of altered ABA/stress physiology in overexpression lines?
- question: What is the full in-vivo guard-cell substrate repertoire of OST1, and
    which phosphorylation events are rate-limiting for rapid stomatal closure across
    different stimuli (ABA vs CO2 vs darkness vs ROS)?
