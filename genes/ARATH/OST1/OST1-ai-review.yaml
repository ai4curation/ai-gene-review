id: Q940H6
gene_symbol: OST1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: OST1 (SRK2E/SnRK2.6) is an ABA-activated serine/threonine protein
  kinase of the plant-specific subclass III SnRK2 family (SNF1-related kinase 2)
  in Arabidopsis thaliana. It is a central positive regulator of abscisic acid
  (ABA) signaling, most prominently in stomatal guard cells, where it triggers
  stomatal closure in response to drought, low atmospheric humidity, darkness,
  elevated CO2, reactive oxygen species, and pathogen-associated molecular
  patterns. In the resting state OST1 is held inactive by group A type-2C protein
  phosphatases (ABI1, ABI2, PP2CA/AHG3, HAB1); upon ABA perception, PYR/PYL/RCAR
  receptors inhibit these phosphatases, allowing OST1 to autophosphorylate (Ser-175
  in its activation loop is critical) and become active. Activated OST1
  phosphorylates and activates the guard-cell slow-type anion channel SLAC1,
  phosphorylates the K+ channel KAT1 and the NADPH oxidase RBOHF (driving ROS
  production), and phosphorylates downstream transcription factors of the AREB/ABF
  bZIP and AKS bHLH families to reprogram ABA-responsive gene expression. OST1 is
  expressed in guard cells and vascular tissue but is broadly present, and acts in
  the cytoplasm/cytosol, at the plasma membrane (where SLAC1 resides), and in the
  nucleus (where it interacts with AREB1 and MAPKKK18). Beyond stomatal control,
  OST1 confers drought and osmotic-stress tolerance and influences primary
  metabolism, including sucrose synthesis, fatty-acid desaturation and seed oil
  accumulation.
