- id: PMID:9484457
  title: 'Plant O-methyltransferases: molecular analysis, common signature and classification.'
  findings:
  - statement: >-
      Classifies plant O-methyltransferases into families based on sequence conservation
      and substrate specificity. Identifies five conserved regions as signatures, with
      regions I and IV involved in SAM and metal binding respectively.
    supporting_text: >-
      Five highly conserved regions are proposed as a signature for plant O-methyltransferases,
      two of which (regions I and IV) are believed to be involved in S-adenosyl-L-methionine
      and metal binding, respectively.
- id: PMID:9662519
  title: >-
    Developmental expression and substrate specificities of alfalfa caffeic acid
    3-O-methyltransferase and caffeoyl coenzyme A 3-O-methyltransferase in relation
    to lignification.
  findings:
  - statement: >-
      Alfalfa CCoAOMT catalyzes O-methylation of caffeoyl and 5-hydroxyferuloyl CoA,
      with preference for caffeoyl CoA. Expression in vascular tissue precedes lignin
      deposition.
    supporting_text: >-
      Alfalfa CCOMT expressed in Escherichia coli catalyzes O-methylation of caffeoyl
      and 5-hydroxyferuloyl CoA, with preference for caffeoyl CoA. It has low activity
      against the free acids.
- id: PMID:12941960
  title: >-
    A novel Mg(2+)-dependent O-methyltransferase in the phenylpropanoid metabolism
    of Mesembryanthemum crystallinum.
  findings:
  - statement: >-
      Characterized CCoAOMT-like enzymes from ice plant, chickweed, Arabidopsis, and
      tobacco. The Arabidopsis Class II member showed broader substrate specificity including
      flavonols and caffeoylglucose, forming a novel subclass with functions potentially
      divergent from lignin biosynthesis.
    supporting_text: >-
      the enzymes from the Centrospermae, along with the predicted gene product from
      A. thaliana, form a novel subclass within the caffeoyl coenzyme A-dependent
      O-methyltransferases, with potential divergent functions not restricted to lignin
      monomer biosynthesis
- id: PMID:18557837
  title: >-
    Tapetum-specific location of a cation-dependent O-methyltransferase in Arabidopsis
    thaliana.
  findings:
  - statement: >-
      At1g67990 (AtTSM1), the tandem duplicate of At1g67980, is tapetum-specific and
      functions in spermidine hydroxycinnamic acid conjugate biosynthesis. This demonstrates
      that CCoAOMT family members have divergent, tissue-specific functions beyond lignin.
    supporting_text: >-
      The gene At1g67990 is specifically expressed in flower buds, and is not detected in
      any other organ, such as roots, leaves or stems...the corresponding CCoAOMT-like
      protein, termed AtTSM1, is located exclusively in the tapetum of developing stamen
- id: PMID:18547395
  title: >-
    Scopoletin is biosynthesized via ortho-hydroxylation of feruloyl CoA by a
    2-oxoglutarate-dependent dioxygenase in Arabidopsis thaliana.
  findings:
  - statement: >-
      CCoAOMT1 (At4g34050) is required for scopoletin biosynthesis. T-DNA insertion
      mutants showed reduced scopoletin/scopolin levels. This establishes At4g34050 as
      the principal functional CCoAOMT in Arabidopsis, distinct from At1g67980.
    supporting_text: >-
      T-DNA insertion mutants of caffeoyl CoA O-methyltransferase 1 (CCoAOMT1) showed
      significant reduction in scopoletin and scopolin levels in the roots
- id: PMID:30685696
  title: >-
    Isolation and functional characterization of two Caffeoyl Coenzyme A
    3-O-methyltransferases from the fern species Polypodiodes amoena.
  findings:
  - statement: >-
      Fern CCoAOMTs localize to cytoplasm and can methylate caffeoyl CoA along with
      flavones and flavonols. Overexpression in Arabidopsis boosted lignin content.
    supporting_text: >-
      The transient expression of a PaCCoAOMT-GFP fusion gene in tobacco demonstrated
      that in planta, PaCCoAOMTs are likely directed to the cytoplasm
