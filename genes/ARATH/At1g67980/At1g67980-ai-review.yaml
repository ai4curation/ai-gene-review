id: Q9C9W3
gene_symbol: At1g67980
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  At1g67980 encodes a putative caffeoyl-CoA O-methyltransferase (CCoAOMT-6), a Class II member
  of the 7-gene Arabidopsis CCoAOMT family. The protein has the canonical cation-dependent,
  SAM-dependent O-methyltransferase fold (IPR050362, IPR002935) but has NOT been directly
  biochemically characterized. Its function is inferred entirely by similarity to characterized
  CCoAOMT enzymes from alfalfa and other species. At1g67980 is a tandem duplicate of At1g67990
  (AtTSM1), which is tapetum-specific and methylates spermidine-hydroxycinnamic acid conjugates
  rather than lignin precursors. The principal lignin-pathway CCoAOMT in Arabidopsis is CCoAOMT1
  (At4g34050, Class I). Class II members including At1g67980 may have broader substrate specificity
  toward flavonoids and other phenolics, with functions potentially divergent from lignin
  biosynthesis. In the absence of direct experimental evidence, the biological role of At1g67980
  remains uncertain.
existing_annotations:
- term:
    id: GO:0008757
    label: S-adenosylmethionine-dependent methyltransferase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: >-
      At1g67980 contains the Class I-like SAM-dependent O-methyltransferase domain (IPR002935)
      and the SAM-dependent methyltransferase superfamily fold (IPR029063). The IBA annotation
      via PANTHER phylogenetic inference is well-supported by sequence conservation of SAM-binding
      residues documented across the CCoAOMT family.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:9484457
      supporting_text: >-
        Five highly conserved regions are proposed as a signature for plant O-methyltransferases,
        two of which (regions I and IV) are believed to be involved in S-adenosyl-L-methionine
        and metal binding, respectively.
- term:
    id: GO:0008171
    label: O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      The O-methyltransferase activity annotation is inferred from the IPR002935 (Class I-like
      SAM-dependent O-methyltransferase) domain. This is a broad functional term that is
      consistent with the domain architecture and family membership. However, it is less
      specific than the caffeoyl-CoA O-methyltransferase annotation (GO:0042409) and is
      redundant with it.
    action: KEEP_AS_NON_CORE
    reason: >-
      This is a parent term of caffeoyl-CoA O-methyltransferase activity and is redundant
      if the more specific term is retained. Keep as non-core since it is technically correct
      but adds no information beyond GO:0042409.
- term:
    id: GO:0042409
    label: caffeoyl-CoA O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: >-
      Assigned based on EC 2.1.1.104 via Rhea reaction mapping. At1g67980 has the canonical
      CCoAOMT domain architecture and is classified in the CCoAOMT subfamily by UniProt.
      However, no direct biochemical assay has been performed on the At1g67980 gene product
      itself. The neighboring tandem duplicate At1g67990 (AtTSM1) has been shown to prefer
      caffeic acid esters and spermidine conjugates over caffeoyl-CoA, and Ibdah et al. (2003)
      showed that Arabidopsis Class II CCoAOMTs can have broader substrate specificity including
      flavonols and caffeoylglucose. The annotation is plausible but should be considered
      provisional.
    action: ACCEPT
    reason: >-
      The EC number assignment and domain architecture support this annotation, and the IEA
      evidence appropriately reflects the uncertainty. Accepting as the most specific MF
      term available, but note the protein is genuinely putative.
    supported_by:
    - reference_id: PMID:12941960
      supporting_text: >-
        the enzymes from the Centrospermae, along with the predicted gene product from
        A. thaliana, form a novel subclass within the caffeoyl coenzyme A-dependent
        O-methyltransferases, with potential divergent functions not restricted to lignin
        monomer biosynthesis
    - reference_id: file:ARATH/At1g67980/At1g67980-deep-research-bioreason-sft.md
      supporting_text: >-
        BioReason domain analysis correctly identifies the SAM-dependent methyltransferase
        fold and cation-dependent O-methyltransferase family, supporting the CCoAOMT
        activity annotation
- term:
    id: GO:0009699
    label: phenylpropanoid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000041
  review:
    summary: >-
      Inferred from UniPathway mapping (UPA00711). CCoAOMT enzymes operate within the
      phenylpropanoid pathway broadly, catalyzing methylation of hydroxycinnamic acid CoA
      esters. This is a reasonable general biological process annotation for any CCoAOMT
      family member, since even Class II members with broader substrate specificity act on
      phenylpropanoid-derived substrates.
    action: ACCEPT
    reason: >-
      Phenylpropanoid biosynthesis is appropriate as a broad process annotation. Even if
      At1g67980 does not specifically function in lignin biosynthesis, it would still
      participate in phenylpropanoid metabolism given its domain architecture and family
      membership.
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  review:
    summary: >-
      Predicted by AtSubP subcellular localization analysis. CCoAOMT enzymes are generally
      soluble cytoplasmic proteins. The protein lacks signal peptides or transmembrane domains.
      The neighboring At1g67990 (AtTSM1) was confirmed cytoplasmic. This annotation is
      consistent but cytosol (GO:0005829) is more specific.
    action: KEEP_AS_NON_CORE
    reason: >-
      The cytoplasm annotation is technically correct but less specific than the cytosol
      annotation (GO:0005829) already present. Redundant with cytosol.
- term:
    id: GO:0009507
    label: chloroplast
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  review:
    summary: >-
      Predicted by AtSubP subcellular localization analysis. However, CCoAOMT enzymes are
      characteristically cytosolic. The protein lacks a chloroplast transit peptide. The
      related At1g67990 protein was demonstrated to be cytoplasmic. CCoAOMT1 (At4g34050)
      is also cytosolic. No published evidence supports chloroplast localization for any
      CCoAOMT family member. This is likely a false positive from the prediction algorithm.
    action: REMOVE
    reason: >-
      No evidence supports chloroplast localization for any CCoAOMT. The protein lacks
      a transit peptide, and characterized family members are cytosolic. This is likely
      a computational false positive.
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: TAS
  original_reference_id: PMID:9484457
  review:
    summary: >-
      The TAS annotation references Ibrahim et al. (1998), a review of plant O-methyltransferases
      that classifies them and discusses their conserved features. CCoAOMT-type enzymes are
      soluble, cation-dependent methyltransferases that function in the cytosol. The fern
      PaCCoAOMT-GFP fusion was shown to localize to cytoplasm. The neighboring At1g67990
      (AtTSM1) is also cytoplasmic. The TAS evidence is appropriate given the broad family
      characterization.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:9484457
      supporting_text: >-
        Comparative analysis of the predicted amino acid sequences of a number of plant
        O-methyltransferase cDNA clones show that they share some 32-71% sequence identity
    - reference_id: PMID:30685696
      supporting_text: >-
        The transient expression of a PaCCoAOMT-GFP fusion gene in tobacco demonstrated
        that in planta, PaCCoAOMTs are likely directed to the cytoplasm.
- term:
    id: GO:0009809
    label: lignin biosynthetic process
  evidence_type: ISS
  original_reference_id: PMID:9662519
  review:
    summary: >-
      The ISS annotation is based on sequence similarity to alfalfa CCoAOMT, which is
      directly involved in lignin monolignol biosynthesis. However, this annotation is
      problematic for At1g67980 specifically. The principal lignin-pathway CCoAOMT in
      Arabidopsis is CCoAOMT1 (At4g34050, Class I). At1g67980 is a Class II member, and
      its tandem duplicate At1g67990 functions in tapetum-specific spermidine conjugate
      biosynthesis rather than lignin. Ibdah et al. (2003) showed Class II members may have
      divergent functions beyond lignin. Without direct evidence that At1g67980 contributes
      to lignin biosynthesis, this annotation may represent over-annotation by similarity.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The ISS evidence is from alfalfa CCoAOMT (Class I equivalent). At1g67980 is a Class II
      CCoAOMT whose closest paralog (At1g67990) has a non-lignin function. The actual lignin
      CCoAOMT in Arabidopsis is At4g34050. Annotating At1g67980 to lignin biosynthesis based
      on similarity to a different class of CCoAOMT is likely over-annotation.
    supported_by:
    - reference_id: PMID:18557837
      supporting_text: >-
        In Arabidopsis thaliana individual members of this gene family are temporally and
        spatially regulated...The gene At1g67990 is specifically expressed in flower buds
    - reference_id: PMID:12941960
      supporting_text: >-
        the enzymes from the Centrospermae, along with the predicted gene product from
        A. thaliana, form a novel subclass...with potential divergent functions not restricted
        to lignin monomer biosynthesis
