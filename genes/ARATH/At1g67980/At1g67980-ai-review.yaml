core_functions:
- description: >-
    Putative cation-dependent, SAM-dependent O-methyltransferase activity on phenylpropanoid
    CoA ester substrates. At1g67980 is predicted to catalyze the transfer of a methyl group
    from SAM to the 3-hydroxyl of caffeoyl-CoA (forming feruloyl-CoA), requiring a divalent
    metal cation (Mg2+ or Mn2+) as cofactor. However, the exact substrate specificity is
    unknown since the protein has not been biochemically characterized. Class II CCoAOMTs
    may have broader specificity toward flavonoids and other phenolic substrates.
  molecular_function:
    id: GO:0042409
    label: caffeoyl-CoA O-methyltransferase activity
  directly_involved_in:
  - id: GO:0009699
    label: phenylpropanoid biosynthetic process
  locations:
  - id: GO:0005829
    label: cytosol
suggested_questions:
- question: >-
    What is the true substrate specificity of the At1g67980 protein? Does it preferentially
    methylate caffeoyl-CoA (like Class I CCoAOMTs), or does it have broader specificity
    toward flavonoids and other phenolics (as suggested for Class II members)?
  experts:
  - Thomas Vogt
- question: >-
    What is the expression pattern of At1g67980? Is it co-expressed with lignin biosynthetic
    genes (suggesting a role in lignin) or with flavonoid/pollen coat genes (suggesting
    a function more similar to its tandem duplicate At1g67990/AtTSM1)?
  experts:
  - Christin Fellenberg
  - Thomas Vogt
- question: >-
    Does At1g67980 have redundant function with CCoAOMT1 (At4g34050) in lignin biosynthesis,
    or does it serve a distinct biological role?
  experts:
  - Richard A Dixon
suggested_experiments:
- hypothesis: At1g67980 has caffeoyl-CoA O-methyltransferase activity with potentially broader substrate specificity than CCoAOMT1.
  description: >-
    Express recombinant At1g67980 protein in E. coli and test enzymatic activity against
    a panel of substrates including caffeoyl-CoA, 5-hydroxyferuloyl-CoA, caffeic acid,
    caffeoylglucose, and common flavonoids (quercetin, luteolin). Compare kinetic parameters
    (Km, kcat) with those of CCoAOMT1 (At4g34050) and AtTSM1 (At1g67990).
  experiment_type: biochemical assay
- hypothesis: At1g67980 has a tissue-specific expression pattern distinct from CCoAOMT1.
  description: >-
    Generate promoter-GUS reporter lines for At1g67980 and examine expression across
    developmental stages and tissues. Compare with published expression data for CCoAOMT1
    (vascular tissue, roots) and AtTSM1 (tapetum-specific). Alternatively, analyze
    publicly available RNA-seq data from TAIR/Araport for tissue-specific expression.
  experiment_type: gene expression analysis
- hypothesis: At1g67980 contributes to lignin biosynthesis or other phenylpropanoid pathways.
  description: >-
    Obtain T-DNA insertion mutants for At1g67980 and analyze cell wall composition
    (lignin content and monomer composition by thioacidolysis), scopoletin/scopolin levels
    in roots, and phenolic profiles in various tissues. Compare with ccoaomt1 mutant
    phenotypes. Generate double mutants if single mutants show no phenotype.
  experiment_type: reverse genetics and metabolite profiling
