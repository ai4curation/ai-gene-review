    label: negative regulation of gibberellic acid mediated signaling pathway
  - id: GO:1905614
    label: negative regulation of developmental vegetative growth
  locations:
  - id: GO:0005634
    label: nucleus
- description: Serves as a receiver for activated gibberellin receptors - the N-terminal
    DELLA domain binds the GA-GID1 complex, coupling GA perception to DELLA recognition
    and proteasomal turnover; this GA-GID1-DELLA interaction is the input that toggles
    GAI between its growth-repressing and degraded states.
  supported_by:
  - reference_id: PMID:17416730
    supporting_text: the GAI DELLA domain alone can mediate GA-dependent GID1A interactions
  - reference_id: PMID:19037309
    supporting_text: the amino-terminal DELLA domain of GAI
