id: Q9LQT8
gene_symbol: GAI
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  GAI (GIBBERELLIC ACID INSENSITIVE) is one of five Arabidopsis DELLA-subfamily
  proteins of the GRAS family and functions as a nuclear growth-repressor in the
  gibberellin (GA) signaling pathway. GAI lacks a DNA-binding domain and acts
  through protein-protein interactions. Its N-terminal DELLA domain serves as the
  receiver for GA-activated GID1 receptors, and its C-terminal GRAS domain
  mediates interactions with diverse transcription factors and cofactors. GAI
  represses GA responses both by titrating growth-promoting transcription factors
  (such as PIFs and BZR1) and by acting as a transcriptional coactivator of
  DNA-binding IDD-family transcription factors (GAF1/IDD2, ENY/IDD1) at GA-feedback
  genes such as GA20OX2, thereby controlling GA homeostasis. When GA levels rise,
  GA-GID1 binding promotes DELLA recognition and ubiquitin-proteasome degradation,
  derepressing growth. GAI acts redundantly with its closest paralog RGA in
  repressing vegetative elongation and floral induction, and additionally
  participates in seed germination, prefoldin-mediated cortical microtubule
  organization, photoperiodic flowering (via CONSTANS), and male reproductive
  development. GAI is the Arabidopsis orthologue of the cereal green revolution
  Rht/d8 dwarfing genes.
