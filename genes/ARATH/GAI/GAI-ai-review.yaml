core_functions:
- description: Acts as a transcriptional coactivator of DNA-binding IDD-family transcription
    factors (GAF1/IDD2, ENY/IDD1) to promote expression of GA-feedback genes, mediating
    gibberellin homeostasis; GAI itself has no DNA-binding domain and works via protein-protein
    interaction.
  supported_by:
  - reference_id: PMID:25035403
    supporting_text: DELLAs and TOPLESS-RELATED (TPR) act as coactivators and a corepressor
      of GAF1, respectively
  - reference_id: PMID:25035403
    supporting_text: providing a mechanism for the integrative regulation of plant
      growth and GA homeostasis
  - reference_id: file:ARATH/GAI/GAI-deep-research-falcon.md
    supporting_text: GAI physically interacts with GAF1/IDD-family factors and TPR4
  molecular_function:
    id: GO:0003713
