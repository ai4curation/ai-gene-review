- description: Functions as a nuclear repressor of gibberellin signaling, restraining
    GA-promoted vegetative growth redundantly with its paralog RGA, by titrating growth-promoting
    transcription factors (such as PIFs and BZR1) through direct binding; GA-GID1 binding
    to the GAI DELLA domain triggers DELLA degradation and derepression.
  supported_by:
  - reference_id: PMID:11606552
    supporting_text: RGA and GAI have partially redundant functions in maintaining
      the repressive state of the GA-signaling pathway
  - reference_id: PMID:17416730
    supporting_text: GAI and its close homolog REPRESSOR OF ga1-3 are the major growth
      repressors in a GA receptor mutant background
  directly_involved_in:
