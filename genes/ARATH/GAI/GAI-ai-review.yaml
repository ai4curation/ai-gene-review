- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IPI
  original_reference_id: PMID:25533953
  qualifier: enables
  review:
    summary: Derived from a large yeast-one-hybrid (Y1H) protein-DNA screen of a secondary
      cell wall gene regulatory network in which GRAS-family TFs were over-represented.
      However, DELLA proteins (including GAI) lack a DNA-binding domain and do not
      bind DNA sequence-specifically, so a direct cis-region-binding molecular function
      is mechanistically implausible for GAI.
    action: MARK_AS_OVER_ANNOTATED
    reason: GAI lacks a DNA-binding domain; DELLAs associate with promoters only indirectly
      via DNA-binding partners. A Y1H positive does not establish direct, sequence-specific
      DNA binding by GAI, so this MF is an over-annotation.
    supported_by:
    - reference_id: PMID:25035403
      supporting_text: although DELLAs lack known DNA binding motifs
