suggested_questions:
- question: How is the dual (positive vs negative) regulatory role of PIF3
    partitioned between target genes, and what determines whether PIF3 recruits
    corepressors such as HDA15 versus activating transcription?
  experts:
  - Plant photobiology researchers
  - Transcriptional regulation specialists
- question: To what extent are PIF3's documented hormone- and stress-responsive
    expression changes (ABA, ethylene, auxin, salt, cold, heat) functionally
    relevant versus passive transcript induction?
  experts:
  - Plant hormone signaling researchers
suggested_experiments:
- hypothesis: PIF3 recruits HDA15 to a defined set of chlorophyll/photosynthesis
    promoters in the dark, and red light triggers their co-dissociation.
  description: Perform time-resolved ChIP-seq for PIF3 and HDA15 across a dark-to-red
    light transition, combined with histone-acetylation profiling, to map
    co-occupancy dynamics and the kinetics of dissociation.
