id: O80536
gene_symbol: PIF3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  PIF3 (PHYTOCHROME-INTERACTING FACTOR 3, also known as AtbHLH8/bHLH008,
  PAP3, EN100; locus At1g09530) is a nuclear basic helix-loop-helix (bHLH)
  transcription factor of Arabidopsis thaliana and the founding member of the
  phytochrome-interacting factor (PIF) family (bHLH subgroup 15). It binds
  G-box (CACGTG) cis-regulatory elements in the promoters of light-responsive
  genes through its bHLH DNA-binding domain and forms homodimers as well as
  heterodimers with other PIFs. PIF3 is a central early component of the
  red/far-red (phytochrome) light signaling pathway: it physically interacts
  with the photoactivated Pfr forms of phytochromes A and B, and this
  light-induced, conformer-specific binding (together with light-triggered
  phosphorylation and proteasomal degradation of PIF3) couples photoreceptor
  activation to changes in gene expression. PIF3 acts largely as a negative
  regulator of photomorphogenesis, promoting skotomorphogenic development in
  darkness; mechanistically it represses chlorophyll biosynthesis and
  photosynthesis genes in etiolated seedlings by recruiting the histone
  deacetylase HDA15 to their promoters, while also positively regulating
  anthocyanin biosynthesis in an HY5-dependent manner and promoting hypocotyl
  cell elongation (in part by activating the microtubule-destabilizing protein
  MDP60 in response to light and ethylene). PIF3 thereby integrates light and
  hormone (ethylene, gibberellin) signals to control de-etiolation, hypocotyl
  growth, pigment accumulation, and chloroplast/photosynthesis gene expression.
