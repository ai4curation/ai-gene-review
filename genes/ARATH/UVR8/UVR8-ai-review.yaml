- term:
    id: GO:0005085
    label: guanyl-nucleotide exchange factor activity
  evidence_type: ISS
  original_reference_id: PMID:12226503
  qualifier: enables
  review:
    summary: >-
      Homology-based (ISS) inference from UVR8's sequence similarity to human RCC1, a
      Ran GEF. This is directly contradicted by experiment: UVR8 has negligible Ran
      GEF activity, does not interact with Arabidopsis Ran, and does not complement a
      yeast RCC1 mutant.
    action: REMOVE
    reason: >-
      Over-propagated electronic/homology (ISS) inference from RCC1 similarity that is
      experimentally refuted - UVR8 has only about 7 percent of RCC1's GEF activity,
      does not bind Ran, and does not complement yeast RCC1 loss.
    supported_by:
    - reference_id: PMID:16330762
      supporting_text: UVR8 has sequence similarity to the eukaryotic guanine nucleotide
        exchange factor RCC1, but we found that it has little exchange activity
    - reference_id: PMID:16330762
      supporting_text: UVR8 did not interact with Arabidopsis Ran1 and Ran2 in yeast
        two-hybrid assays and did not complement the yeast prp20 mutant lacking yeast
        RCC1
