id: Q9FN03
gene_symbol: UVR8
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  UVR8 (UV RESISTANCE LOCUS 8) is the plant UV-B photoreceptor, a seven-bladed
  beta-propeller protein of the RCC1 structural family. In the absence of UV-B it
  exists as a homodimer; specific intrinsic tryptophan residues (principally Trp-285
  and Trp-233) act as the UV-B chromophore, and UV-B absorption disrupts the
  cross-dimer salt-bridge/cation-pi network, causing instantaneous monomerization.
  The UVR8 monomer accumulates rapidly in the nucleus, where it binds the E3 ubiquitin
  ligase COP1 through its C-terminal C27 region. This interaction stabilizes the bZIP
  transcription factor HY5 and triggers UV-B photomorphogenesis, acclimation, and
  UV-protective gene expression (including flavonoid and sinapate biosynthesis, DNA
  photorepair, and antioxidant genes). UVR8 also associates with chromatin in the HY5
  promoter region via histone H2B. The negative regulators RUP1 and RUP2, themselves
  UV-B-induced, bind UVR8 and mediate its redimerization to reset the photoreceptor.
  Although UVR8 is structurally homologous to human RCC1, a guanine-nucleotide exchange
  factor for the GTPase Ran, it has negligible Ran GEF activity and does not function
  as a RanGEF.
