- term:
    id: GO:0048564
    label: photosystem I assembly
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: PsbP1 is a photosystem II (PSII) oxygen-evolving complex extrinsic protein,
      not a photosystem I (PSI) protein. Falcon deep research unambiguously and repeatedly
      assigns At1g06680/PsbP1 to PSII/OEC, with no evidence for any role in PSI assembly.
      This IBA annotation appears to be an erroneous phylogenetic/paralog propagation
      (photosystem I rather than photosystem II) and should be removed.
    action: REMOVE
    supported_by:
    - reference_id: file:ARATH/AT1G06680/AT1G06680-deep-research-falcon.md
      supporting_text: |-
        a curated thylakoid-lumen protein table explicitly lists **At1g06680 = PsbP1** and assigns it to **PSII/OEC**
    - reference_id: file:ARATH/AT1G06680/AT1G06680-deep-research-falcon.md
      supporting_text: |-
        PSBP1/PsbP1 functions as an **extrinsic lumenal PSII subunit** associated with the **oxygen-evolving complex**
    reason: Removed because PsbP1 is a PSII/OEC subunit; falcon deep research provides
      no support for photosystem I assembly and the PSII evidence contradicts a PSI role.
