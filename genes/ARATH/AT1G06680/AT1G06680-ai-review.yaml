id: Q42029
gene_symbol: AT1G06680
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: AT1G06680 (PSBP1/PSBP-1) encodes PsbP1 (OEE2; the 23 kDa subunit of the
  photosystem II oxygen-evolving system), a "true" PsbP-family protein in Arabidopsis.
  PsbP1 is a chloroplast thylakoid lumen extrinsic protein of photosystem II (PSII)
  and is one of the three plant oxygen-evolving complex (OEC) extrinsic proteins
  (PsbO, PsbP, PsbQ). It supports PSII stability and oxygen-evolving capacity and is
  implicated in PSII repair dynamics, rather than catalyzing an independent metabolic
  reaction or transporting a substrate. It is found both as a soluble lumen pool and
  a membrane-associated lumen pool near the PSII supercomplex.
