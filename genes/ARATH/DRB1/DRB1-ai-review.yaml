core_functions:
- description: Double-stranded RNA substrate binding in the Arabidopsis miRNA microprocessor. DRB1/HYL1
    binds pri-/pre-miRNA stem-loop substrates with dsRBD domains and helps DCL1 recognize and cleave them
    accurately.
  molecular_function: *id001
  directly_involved_in:
  - id: GO:0031054
    label: pre-miRNA processing
  - &id002
    id: GO:0035196
    label: miRNA processing
  supported_by:
  - reference_id: file:ARATH/DRB1/DRB1-deep-research-falcon.md
    supporting_text: DRB1/HYL1 helps to position DCL1 on pri-miRNAs and to improve efficiency and precision
      of DCL1-catalyzed cleavage.
  - reference_id: file:ARATH/DRB1/DRB1-uniprot.txt
    supporting_text: Binds and assist DCL1 for accurate processing of precursor miRNAs (pre-miRNA).
  - reference_id: file:interpro/panther/PTHR11207/PTHR11207-entries.csv
    supporting_text: O04492,Double-stranded RNA-binding protein 1
- description: Nuclear DCL1/HYL1/SERRATE microprocessor cofactor activity. DRB1/HYL1 promotes efficient
    and precise primary/pre-miRNA processing and thereby supports AGO1-loaded miRNA regulatory pathways.
  molecular_function: *id001
  directly_involved_in:
  - *id002
  supported_by:
  - reference_id: file:ARATH/DRB1/DRB1-deep-research-falcon.md
    supporting_text: The plant Microprocessor complex core includes DCL1 plus HYL1/DRB1 plus SERRATE (SE).
  - reference_id: file:ARATH/DRB1/DRB1-uniprot.txt
    supporting_text: Forms a complex with SERRATE (SE) and DCL1 to promote accurate processing of pri-miRNAs
      by DCL1.
proposed_new_terms: []
suggested_questions:
- question: Should ribonuclease III activity IBA transfer be blocked for non-enzymatic DRB/HYL dsRNA-binding
    cofactors?
- question: Is there an existing GO molecular function that better captures HYL1/DRB1 microprocessor adaptor/cofactor
    activity than generic protein binding?
suggested_experiments:
- description: Quantify processing accuracy of DCL1 on pri-miRNA substrates with DRB1/HYL1 dsRBD mutants
    that separate RNA binding from DCL1/SERRATE interaction.
- description: Map DRB1/HYL1 nuclear dicing body, nucleoplasmic, and cytoplasmic pools under stress to
    determine which pools support processing versus translational repression.
