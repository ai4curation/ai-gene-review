id: O04492
gene_symbol: DRB1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: DRB1/HYL1 is an Arabidopsis double-stranded RNA-binding protein and core non-enzymatic cofactor
  of the DCL1-SERRATE microprocessor. It binds pri-/pre-miRNA stem-loop substrates through dsRBD domains,
  promotes accurate and efficient DCL1 cleavage, and localizes mainly to the nucleus and nuclear dicing
  bodies with additional regulated pools. Hormone, leaf patterning, stress, and cell-fate phenotypes are
  downstream outputs of altered miRNA biogenesis rather than independent primary functions.
