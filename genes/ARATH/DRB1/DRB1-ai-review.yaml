- id: file:ARATH/DRB1/DRB1-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis DRB1/HYL1
  findings:
  - statement: DRB1/HYL1 is a dsRNA-binding, non-enzymatic DCL1 cofactor that promotes accurate pri-/pre-miRNA
      processing in nuclear dicing bodies.
