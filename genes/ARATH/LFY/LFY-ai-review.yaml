suggested_questions:
  - question: >-
      Which endogenous LFY-UFO-dependent LUBS elements are required in vivo for
      AP3 and other organ identity targets, and which are redundant?
    experts:
      - Francois Parcy
      - Doris Wagner
  - question: >-
      Does LFY pioneer activity require distinct SWI/SNF subunit compositions at
      AP1, AP3 and AG, or does LFY recruit a common remodeler module to all
      floral target classes?
    experts:
      - Doris Wagner
      - Nobutoshi Yamaguchi
suggested_experiments:
  - experiment_type: genome editing and chromatin profiling
    hypothesis: >-
      LFY pioneer activity at AP1 depends on the endogenous LFY binding site and
      separable recruitment of SWI/SNF remodelers.
    description: >-
      Introduce precise mutations in the endogenous AP1 LFY binding site and
      measure LFY occupancy, H1 occupancy, SWI/SNF recruitment, chromatin
      accessibility and AP1 induction during floral transition using ChIP/CUT&Tag
      and ATAC-seq in staged inflorescences.
  - experiment_type: cis-regulatory reporter and CRISPR tiling
    hypothesis: >-
      UFO-dependent LFY retargeting through LUBS elements is necessary for a
      defined subset of floral organ identity gene activation in vivo.
    description: >-
      CRISPR-mutate candidate LUBS elements near AP3, PI and RBE, then compare
      LFY and UFO occupancy, reporter expression and floral organ phenotypes
      against matched LFY-only binding-site mutants.
