  - id: PMID:10417387
    title: Transcriptional activation of APETALA1 by LEAFY.
    full_text_unavailable: true
    findings:
      - statement: LFY directly induces early AP1 expression during floral fate acquisition.
        supporting_text: >-
          Use of steroid-inducible activation of LFY demonstrated that early
          expression of AP1 is a result of transcriptional induction by LFY.
        reference_section_type: ABSTRACT
      - statement: >-
          Direct AP1 induction by LFY does not require new protein synthesis and
          is developmentally restricted.
        supporting_text: >-
          This AP1 induction is independent of protein synthesis and occurs
          specifically in the tissues and at the developmental stage in which
          floral fate is assumed.
        reference_section_type: ABSTRACT
  - id: PMID:11063709
    title: Quantitative trait loci for floral morphology in Arabidopsis thaliana.
    full_text_unavailable: true
    findings:
      - statement: >-
          The cached abstract describes floral morphology QTL mapping but does
          not verify an LFY-specific flower development annotation.
        supporting_text: >-
          We propose several candidate genes that may underlie these QTL on the
          basis of positional information and functional arguments.
        reference_section_type: ABSTRACT
  - id: PMID:12324613
    title: LEAFY, a Homeotic Gene That Regulates Inflorescence Development in Arabidopsis.
    full_text_unavailable: true
    findings:
      - statement: LFY is required for development of flower-bearing metamers.
        supporting_text: >-
          These data suggest that the LFY gene is required for the development
          of type 3 metamers and that the transition from type 2 to type 3
          metamers is a developmental step distinct from that between vegetative
          and reproductive growth
        reference_section_type: ABSTRACT
      - statement: LFY acts upstream of floral organ identity genes.
        supporting_text: >-
          Results from double mutant analysis, showing that lfy-1 is epistatic
          to the floral organ homeotic gene ap2-6, are consistent with the
          hypothesis that a functional LFY gene is necessary for the expression
          of downstream genes controlling floral organ identity.
        reference_section_type: ABSTRACT
  - id: PMID:18287201
    title: >-
      An Arabidopsis F-box protein acts as a transcriptional co-factor to
      regulate floral development.
    full_text_unavailable: true
    findings:
      - statement: UFO physically interacts with LFY and helps recruit UFO to the AP3 promoter.
        supporting_text: >-
          Here, we show that UFO physically interacts with LFY both in vitro and
          in vivo, and this interaction is necessary to recruit UFO to the AP3
          promoter.
        reference_section_type: ABSTRACT
      - statement: LFY and UFO act in a transcriptional complex at AP3.
        supporting_text: >-
          Furthermore, a transcriptional repressor domain fused to UFO reduces
          endogenous LFY activity in plants, supporting the idea that UFO acts
          as part of a transcriptional complex at the AP3 promoter.
        reference_section_type: ABSTRACT
  - id: PMID:18298668
    title: >-
      Regulatory networks that function to specify flower meristems require the
      function of homeobox genes PENNYWISE and POUND-FOOLISH in Arabidopsis.
    full_text_unavailable: true
    findings:
      - statement: LFY participates in floral meristem specification.
        supporting_text: >-
          floral meristems are specified on the periphery of the inflorescence
          meristem by the combined activities of the FLOWERING LOCUS T (FT)-FD
          complex and the flower meristem identity gene, LEAFY (LFY).
        reference_section_type: ABSTRACT
      - statement: pny pnf lfy genetic interactions reduce floral specification.
        supporting_text: >-
          Genetic analysis shows that when mutations in pny and pnf genes are
          combined with lfy, a synergistic phenotype is displayed that
          significantly reduces floral specification and alters inflorescence
          patterning events.
        reference_section_type: ABSTRACT
  - id: PMID:18784751
    title: >-
      Structural basis for LEAFY floral switch function and similarity with
      helix-turn-helix proteins.
    full_text_unavailable: true
    findings:
      - statement: >-
          The original structural paper is not cached in this worktree; external
          abstract text supports LFY DNA-binding-domain structures bound to
          target promoter DNA.
        supporting_text: >-
          Here, we report crystal structures for the DNA-binding domain of
          Arabidopsis thaliana LFY bound to two target promoter elements.
        full_text_unavailable: true
        reference_section_type: ABSTRACT
  - id: PMID:20626659
    title: >-
      Arabidopsis BLADE-ON-PETIOLE1 and 2 promote floral meristem fate and
      determinacy in a previously undefined pathway targeting APETALA1 and
      AGAMOUS-LIKE24.
    full_text_unavailable: true
    findings:
      - statement: LFY and AP1 confer floral fate in inflorescence primordia.
        supporting_text: >-
          LEAFY (LFY) and APETALA1 (AP1) are key regulators of this transition
          and expression of these genes in primordia produced by the
          inflorescence meristem confers floral fate.
        reference_section_type: ABSTRACT
      - statement: lfy enhances floral meristem fate and determinacy defects in bop mutants.
        supporting_text: >-
          Loss-of-function bop1 bop2 mutants show subtle defects in
          inflorescence and floral architecture but in combination with lfy or
          ap1, synergistic defects in floral meristem fate and determinacy are
          revealed.
        reference_section_type: ABSTRACT
  - id: PMID:21750030
    title: LATE MERISTEM IDENTITY2 acts together with LEAFY to activate APETALA1.
    findings:
      - statement: LFY interacts physically with LMI2 while activating AP1.
        supporting_text: >-
          Like LFY, LMI2 activates AP1 directly; moreover, LMI2 and LFY interact
          physically.
        reference_section_type: ABSTRACT
      - statement: LFY is a central meristem identity regulator.
        supporting_text: >-
          LFY is considered to be a central meristem identity regulator because
          lfy null mutants cause a very dramatic delay in the meristem identity
          transition
        reference_section_type: INTRODUCTION
  - id: PMID:22323601
    title: >-
      SWI2/SNF2 chromatin remodeling ATPases overcome polycomb repression and
      control floral organ identity with the LEAFY and SEPALLATA3 transcription
      factors.
    findings:
      - statement: SYD and BRM physically interact with LFY and SEP3.
        supporting_text: >-
          SYD and BRM physically interact with two tissue- and stage-specific
