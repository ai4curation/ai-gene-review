id: Q00958
gene_symbol: LFY
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  LEAFY (LFY; At5g61850) is a plant-specific nuclear FLO/LFY-family
  DNA-binding transcription factor that commits Arabidopsis primordia to floral
  fate. Its core activity is sequence-specific binding to cis-regulatory DNA at
  floral meristem and floral organ identity loci, including AP1, AP3, AG and
  CAL, followed by transcriptional activation. Recent mechanistic work
  synthesized in the Falcon research file supports LFY as a pioneer
  transcription factor: LFY binds nucleosome-occupied AP1 regulatory DNA,
  displaces linker histone H1, recruits SWI/SNF chromatin remodelers, and
  licenses chromatin for floral fate reprogramming. Its target selection is
  modulated by oligomerization through an N-terminal SAM domain and by cofactors
  such as UFO, LMI2, SYD and BRM.
