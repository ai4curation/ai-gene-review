        reference_section_type: ABSTRACT
  - id: PMID:9596637
    title: Gibberellins promote flowering of arabidopsis by activating the LEAFY promoter.
    full_text_unavailable: true
    findings:
      - statement: GA promotes LFY promoter induction during flowering.
        supporting_text: >-
          We have found that the failure of gibberellin-deficient ga1-3 mutants
          to flower in short days was paralleled by the absence of LEAFY
          promoter induction.
        reference_section_type: ABSTRACT
      - statement: Constitutive LFY can bypass the ga1-3 flowering failure in short days.
        supporting_text: >-
          A causal connection between these two events was confirmed by the
          ability of a constitutively expressed LEAFY transgene to restore
          flowering to ga1-3 mutants in short days.
        reference_section_type: ABSTRACT
