proposed_new_terms:
  - proposed_name: pioneer DNA-binding transcription factor activity
    proposed_definition: >-
      A DNA-binding transcription factor activity in which a gene product binds
      cognate cis-regulatory DNA in nucleosome-occupied or otherwise closed
      chromatin and initiates local chromatin opening to enable subsequent
      transcriptional activation.
    proposed_parent:
      id: GO:0000981
      label: DNA-binding transcription factor activity, RNA polymerase II-specific
    justification: >-
      Existing LFY annotations capture DNA-binding transcription factor activity
      and chromatin DNA binding separately, but not the experimentally supported
      pioneer activity that couples nucleosomal DNA binding to H1 displacement,
      SWI/SNF recruitment and competence for floral fate reprogramming.
    supported_by:
      - reference_id: file:ARATH/LFY/LFY-deep-research-falcon.md
