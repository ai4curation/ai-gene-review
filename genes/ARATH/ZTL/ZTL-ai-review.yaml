id: F4KAN2
gene_symbol: ZTL
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  ZTL (ZEITLUPE; also ADAGIO 1/ADO1, LKP1) is a blue-light photoreceptor F-box
  protein of the ZTL/FKF1/LKP2 family in Arabidopsis. It has a unique tripartite
  architecture, an N-terminal LOV (light, oxygen, voltage) domain (a specialized PAS
  domain that binds an FMN chromophore and senses blue light) fused to an F-box and a
  C-terminal Kelch-repeat beta-propeller. The F-box recruits SKP1 and CUL1 to assemble an
  SCF-ZTL E3 ubiquitin ligase in which ZTL serves as the substrate-recognition subunit,
  and the Kelch repeats bind substrates. ZTL targets the core circadian clock proteins
  TIMING OF CAB EXPRESSION 1 (TOC1/PRR1) and PSEUDO-RESPONSE REGULATOR 5 (PRR5) for
  ubiquitin-dependent proteasomal degradation, thereby setting the pace (period) of the
  circadian oscillator and contributing to photomorphogenesis and photoperiodic flowering.
  ZTL activity and stability are gated by blue light through its LOV/FMN photosensor and
  through direct, blue-light-enhanced interaction with GIGANTEA (GI), which stabilizes ZTL.
  ZTL is found predominantly in the cytoplasm/cytosol, where it heterodimerizes with GI and
  acts on nucleocytoplasmically shuttling clock proteins.
