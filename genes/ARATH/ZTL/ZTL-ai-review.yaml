- term:
    id: GO:1990756
    label: ubiquitin-like ligase-substrate adaptor activity
  evidence_type: IMP
  original_reference_id: PMID:17693530
  qualifier: enables
  review:
    summary: ZTL is the F-box substrate-recognition subunit of an SCF-ZTL E3 ubiquitin ligase
      that targets TOC1 and PRR5 for degradation. The appropriate molecular function for an
      F-box subunit is substrate-adaptor activity (it recruits substrates to the ligase), not
      the catalytic ubiquitin-protein ligase activity, which resides in the RBX1/cullin core.
      Proposed by the reviewer; absent from the GOA TSV.
    action: NEW
    reason: As the F-box/Kelch substrate-recognition subunit of SCF-ZTL, ZTL provides
      ubiquitin-ligase substrate-adaptor activity (GO:1990756), bridging clock substrates
      (TOC1, PRR5) to the SCF core for ubiquitination; the catalytic ligase activity itself is
      contributed by RBX1/cullin, so GO:0061630 (ubiquitin protein ligase activity) would be
      incorrect for the F-box subunit. Proposed as a NEW annotation based on experimental
      evidence (substrate stabilization in ztl mutants), not the GOA keyword pipeline.
    supported_by:
    - reference_id: PMID:17693530
      supporting_text: ZTL targets PRR5 for degradation by 26S proteasomes in the circadian
        clock and in early photomorphogenesis
      full_text_unavailable: true
    - reference_id: file:ARATH/ZTL/ZTL-deep-research-falcon.md
