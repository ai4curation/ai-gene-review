predictions:
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0016310
      label: phosphorylation
    predicted_term_type: GO_BP
    review:
      assessment: PLI
      confidence_score: 0
      summary: >-
        GO:0016310 (phosphorylation) predicts that RIC7 is involved in a
        phosphorylation process, implying it acts as or with a kinase. This is
        incorrect. RIC7 is a ROP GTPase effector protein whose characterized
        biological roles are negative regulation of stomatal opening
        (GO:1902457) and regulation of stomatal movement (GO:0010119), mediated
        by binding activated ROP2 via its CRIB domain and inhibiting Exo70B1.
        RIC7 belongs to the receptor-like protein (RLP) family, which by
        definition lacks the intracellular kinase domain present in the related
        receptor-like kinase (RLK) family. The UniProt entry for F4JLB7 lists
        no kinase-related domains, keywords, or functions. InterPro annotations
        show only LRR domains (IPR001611, IPR032675) and a stomatal
        development/plant interaction regulator domain (IPR052941), with no
        protein kinase domain. The FunFam classification with the ERECTA
        kinase superfamily (3.80.10.10:FF:000041) reflects shared LRR
        structural domains, not shared kinase function -- ERECTA is an RLK
        with a kinase domain, while RIC7 is an RLP without one. No
        experimental evidence from Wu et al. 2001 (PMID:11752391) or
        subsequent functional studies supports any role for RIC7 in
        phosphorylation. This prediction is a paralog overannotation error
        arising from failure to distinguish kinase-containing from
        kinase-lacking members of the LRR superfamily. An independent OpenScientist
        investigation (see file reference) confirms the dispute: F4JLB7 has no
        protein-kinase catalytic domain of any kind (no VAIK/HRD/DFG active-site
        machinery; the HRD catalytic aspartate is absent), so it is mechanistically
        incapable of catalyzing phosphotransfer. It also flags a gene-symbol collision --
        the characterized RIC7 (ROP2/CRIB effector) is the adjacent locus At4g28556
        (Q1G3K8), while F4JLB7 itself appears to be an LRR receptor-like protein; under
        either identity the kinase/phosphorylation terms are unsupported. PLI confirmed.
      error_type: PARALOG_OVERANNOTATION
      supported_by:
        - reference_id: file:ARATH/F4JLB7/F4JLB7-hypotheses/prediction-kinase-activity/openscientist.md
          supporting_text: no protein-kinase catalytic domain of any kind
        - reference_id: file:ARATH/F4JLB7/F4JLB7-hypotheses/prediction-kinase-activity/openscientist.md
          supporting_text: mechanistically incapable of catalyzing phosphotransfer
  - source_method: ProtNLM2
    source_version: UniProt 2024_06 pilot
    predicted_term:
      id: GO:0016301
      label: kinase activity
    predicted_term_type: GO_MF
    review:
      assessment: PLI
      confidence_score: 0
      summary: >-
        GO:0016301 (kinase activity) predicts that RIC7 catalyzes the transfer
        of a phosphate group to a substrate. This is incorrect. RIC7's
        characterized molecular function is small GTPase binding (GO:0031267),
        not kinase activity. The protein functions as a signaling adaptor
        downstream of ROP2, not as a catalytic enzyme. Structurally, RIC7
        contains a CRIB (Cdc42/Rac-interactive binding) motif for GTPase
        interaction and LRR domains for protein-protein interactions, but no
        kinase domain of any type. The Pfam annotations for F4JLB7 are
        exclusively LRR_1 (PF00560, 3 copies) and LRR_8 (PF13855, 1 copy),
        with no Pkinase (PF00069) or Pkinase_Tyr (PF07714) domains. This
        distinguishes RIC7 from LRR-RLK proteins like ERECTA (AT2G26330),
        which share the LRR extracellular domain but additionally possess a
        cytoplasmic kinase domain. The curated ai-review explicitly notes that
        RIC7 "lacks a kinase domain and functions as a cytoplasmic effector
        rather than a receptor." ProtNLM2 likely propagated kinase activity
        from LRR-RLK superfamily members in its training data to this
        kinase-lacking RLP family member, a classic Type 6 paralog
        overannotation error where the model fails to distinguish
        nonisofunctional members of a protein superfamily. An independent OpenScientist
        investigation (see file reference) confirms the dispute: F4JLB7 has no
        protein-kinase catalytic domain of any kind (no VAIK/HRD/DFG; HRD catalytic
        aspartate absent), so it is mechanistically incapable of catalyzing
        phosphotransfer. Caveat on identity: OpenScientist found F4JLB7 to be an LRR
        receptor-like protein and places the characterized CRIB-motif RIC7 (ROP2 effector)
        at the adjacent locus At4g28556 (Q1G3K8) -- so the CRIB-domain attribution above may
        belong to that paralog. Either way the kinase-activity term is refuted. PLI confirmed.
      error_type: PARALOG_OVERANNOTATION
      supported_by:
        - reference_id: file:ARATH/F4JLB7/F4JLB7-hypotheses/prediction-kinase-activity/openscientist.md
          supporting_text: no protein-kinase catalytic domain of any kind
        - reference_id: file:ARATH/F4JLB7/F4JLB7-hypotheses/prediction-kinase-activity/openscientist.md
          supporting_text: mechanistically incapable of catalyzing phosphotransfer
