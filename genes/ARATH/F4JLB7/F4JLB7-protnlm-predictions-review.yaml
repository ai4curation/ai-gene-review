id: F4JLB7
gene_symbol: F4JLB7
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
status: COMPLETE
description: >-
  ProtNLM2 predicted 2 GO terms for Arabidopsis RIC7 (ROP-interactive CRIB
  motif-containing protein 7, F4JLB7): phosphorylation (GO:0016310) and kinase
  activity (GO:0016301). Both predictions are incorrect. RIC7 is a signaling
  adaptor that binds activated ROP GTPases via its CRIB domain and inhibits the
  exocyst subunit Exo70B1 to negatively regulate stomatal opening. Although RIC7
  contains leucine-rich repeat (LRR) domains that place it in the receptor-like
  protein (RLP) family, it critically lacks the intracellular kinase domain that
  distinguishes receptor-like kinases (RLKs) from RLPs. ProtNLM2 appears to have
  confused the RLP and RLK subfamilies: FunFam classifies F4JLB7 with the LRR
  receptor-like serine/threonine-protein kinase ERECTA superfamily, but RIC7 has
  no kinase domain in its InterPro/Pfam annotations (only LRR_1 and LRR_8), no
  kinase activity keywords in UniProt, and no experimental evidence of
  phosphorylation or kinase function. The curated core molecular function is
  small GTPase binding (GO:0031267), not kinase activity. Both predictions
  represent paralog-level overannotation from a kinase-containing superfamily
  member to a kinase-lacking effector protein. Assessment: 0 correct, 0
  uncertain, 2 incorrect (PLI). Total CS = 0/4.
