  findings:
  - statement: >-
      The DNA-binding domain of CBF1 binds directly to Arabidopsis ADA2
      coactivator proteins, linking CBF1 to the SAGA-like ADA2/GCN5 complex.
    supporting_text: >-
      the DNA-binding domain of CBF1 (and of a related protein, TINY), rather
      than its transcriptional activation domain, can bind directly to the
      Arabidopsis ADA2 proteins.
- id: PMID:18093929
  title: Arabidopsis CBF1 and CBF3 have a different function than CBF2 in cold acclimation
    and define different gene classes in the CBF regulon.
  findings:
  - statement: >-
      CBF1 (with CBF3) is a positive regulator of cold acclimation;
      RNAi/antisense lines are defective in cold acclimation but not in
      constitutive freezing tolerance.
    supporting_text: >-
      CBF1 and CBF3 RNAi lines are defective in cold acclimation but are not
      affected in their constitutive freezing tolerance.
- id: PMID:28344081
  title: Plasma Membrane CRPK1-Mediated Phosphorylation of 14-3-3 Proteins Induces
    Their Nuclear Import to Fine-Tune CBF Signaling during Cold Response.
  findings:
  - statement: >-
      Phosphorylated 14-3-3 proteins move to the nucleus and interact with and
      destabilize CBF proteins to fine-tune cold signaling.
    supporting_text: >-
      they interact with and destabilize the key cold-responsive
      C-repeat-binding factor (CBF) proteins.
- id: PMID:9023378
  title: Arabidopsis thaliana CBF1 encodes an AP2 domain-containing transcriptional
    activator that binds to the C-repeat/DRE, a cis-acting DNA regulatory element
    that stimulates transcription in response to low temperature and water deficit.
  findings:
  - statement: >-
      Recombinant CBF1 binds the C-repeat/DRE element in gel-shift assays.
    supporting_text: >-
      Binding of CBF1 to the C-repeat/DRE was demonstrated in gel shift assays
      using recombinant CBF1 protein expressed in Escherichia coli.
  - statement: >-
      CBF1 activates transcription of CRT/DRE-driven reporters but not mutant
      elements in yeast; acts as a transcriptional activator.
    supporting_text: >-
      expression of CBF1 in yeast was found to activate transcription of
      reporter genes containing the C-repeat/DRE as an upstream activator
      sequence but not mutant versions of the DNA element.
  - statement: >-
      CBF1 has an AP2 DNA-binding domain, a potential NLS, and an acidic
      activation domain.
    supporting_text: >-
      the protein has a molecular mass of 24 kDa, a potential nuclear
      localization sequence, and a possible acidic activation domain.
- id: PMID:9525853
  title: Arabidopsis CBF1 overexpression induces COR genes and enhances freezing tolerance.
  findings:
  - statement: >-
      CBF1 overexpression induces COR gene expression and increases freezing
      tolerance of non-acclimated plants; CBF1 is a regulator of cold
      acclimation.
    supporting_text: >-
      Increased expression of Arabidopsis CBF1, a transcriptional activator that
      binds to the CRT/DRE sequence, induced COR gene expression and increased
      the freezing tolerance of nonacclimated Arabidopsis plants.
- id: PMID:9707537
  title: Two transcription factors, DREB1 and DREB2, with an EREBP/AP2 DNA binding
    domain separate two cellular signal transduction pathways in drought- and low-temperature-responsive
    gene expression, respectively, in Arabidopsis.
  findings:
  - statement: >-
      DREB1 (= CBF) factors act in the low-temperature pathway, separate from
      the DREB2 drought pathway; DREB proteins bind DRE and activate
      transcription.
    supporting_text: >-
      two independent families of DREB proteins, DREB1 and DREB2, function as
      trans-acting factors in two separate signal transduction pathways under
      low-temperature and dehydration conditions, respectively.
- id: PMID:9735350
  title: An Arabidopsis gene family encoding DRE/CRT binding proteins involved in
    low-temperature-responsive gene expression.
  findings:
  - statement: >-
      DREB1B (= CBF1) is part of a three-gene cold-induced DRE/CRT-binding
      family induced mainly by cold, not osmotic stress.
    supporting_text: >-
      the 3 DREB1 genes are induced mainly by cold stress but not by osmotic
      stress in leaves, roots, and stems.
