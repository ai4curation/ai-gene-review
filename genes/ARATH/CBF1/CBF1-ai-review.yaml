id: P93835
gene_symbol: CBF1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  CBF1 (also DREB1B; ERF029) is an Arabidopsis thaliana AP2/ERF-family
  transcription factor of the ERF subfamily and one of three tandemly arrayed
  cold-induced CBF/DREB1 factors (CBF1/DREB1B, CBF2/DREB1C, CBF3/DREB1A) on
  chromosome 4. The 213-residue protein contains a single AP2/ERF DNA-binding
  domain, a nuclear localization signal, and an acidic C-terminal
  transcriptional activation domain. CBF1 binds in a sequence-specific manner to
  the C-repeat/dehydration-responsive element (CRT/DRE, core 5'-[AG]CCGAC-3')
  present in the promoters of cold-regulated (COR) genes and activates their
  transcription. Through induction of the COR regulon, CBF1 is a central
  positive regulator of cold acclimation and freezing tolerance: its
  overexpression induces COR genes and confers freezing tolerance on
  non-acclimated plants, and loss of CBF1 (together with CBF3) impairs cold
  acclimation. CBF1 acts in the nucleus, where its activity is modulated by
  recruitment of the SAGA-like ADA2/GCN5 coactivator complex (which binds the
  CBF1 DNA-binding domain) and by 14-3-3 (GRF) proteins that destabilize CBF
  protein during freezing, and CBF1 is subject to 26S proteasome turnover.
