- term:
    id: GO:0009414
    label: response to water deprivation
  evidence_type: IEP
  original_reference_id: PMID:9023378
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      The CRT/DRE element bound by CBF1 stimulates transcription in response to
      both low temperature and water deficit, and CBF1 overexpression confers
      some drought tolerance via the regulon. However, CBF1/DREB1 transcript
      itself is induced mainly by cold, not by osmotic stress, so a direct role
      of CBF1 in the water-deprivation response is peripheral.
    action: KEEP_AS_NON_CORE
    reason: >-
      CBF1 acts primarily in the cold arm of the DRE response; the DREB1/CBF
      branch is distinguished from the DREB2 drought branch, and DREB1 genes are
      induced by cold but not osmotic stress. The water-deprivation link is real
      (shared cis-element, downstream tolerance) but not a core function of CBF1.
    supported_by:
    - reference_id: PMID:9023378
      supporting_text: >-
        a cis-acting DNA regulatory element in plants, the
        C-repeat/dehydration responsive element (DRE), that stimulates
        transcription in response to low temperature and water deficit.
    - reference_id: PMID:9735350
      supporting_text: >-
        the 3 DREB1 genes are induced mainly by cold stress but not by osmotic
        stress in leaves, roots, and stems.
    - reference_id: file:ARATH/CBF1/CBF1-deep-research-falcon.md
      supporting_text: >-
        The CRT/DRE element is a shared regulatory node for cold- and
        dehydration-responsive gene expression, and CBF/DREB-type factors are
        widely used to connect these stress responses.
