      The 14-3-3 interaction is experimentally supported but the generic
      'protein binding' term carries no functional specificity per curation
      guidelines. This is a regulatory (CBF-destabilizing) interaction, not the
      gene's core function, so it is retained as non-core rather than treated as
      a core annotation.
