  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      CBF1 is a sequence-specific DNA-binding protein; it binds the C-repeat/DRE
      element via its AP2/ERF domain. DNA binding is directly demonstrated
      experimentally.
    action: ACCEPT
    reason: >-
      The InterPro-based IEA to DNA binding is correct and is corroborated by
      direct experimental evidence (gel-shift). DNA binding is a true parent of
      the more specific sequence-specific binding; retained. More specific terms
      are proposed as new terms.
    supported_by:
    - reference_id: PMID:9023378
      supporting_text: >-
        Binding of CBF1 to the C-repeat/DRE was demonstrated in gel shift assays
        using recombinant CBF1 protein expressed in Escherichia coli.
    - reference_id: file:ARATH/CBF1/CBF1-deep-research-falcon.md
      supporting_text: >-
        recombinant CBF1 binds the CRT/DRE sequence by gel-shift assays
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      CBF1 is a transcriptional activator that binds the CRT/DRE element and
      activates transcription of CRT/DRE-driven reporters and COR genes. This is
      a core molecular function.
    action: ACCEPT
    reason: >-
      Strongly supported by both InterPro/ISS and direct experimental evidence
      of sequence-specific DNA binding combined with transactivation.
    supported_by:
    - reference_id: PMID:9023378
      supporting_text: >-
        expression of CBF1 in yeast was found to activate transcription of
        reporter genes containing the C-repeat/DRE as an upstream activator
        sequence but not mutant versions of the DNA element.
    - reference_id: file:ARATH/CBF1/CBF1-deep-research-falcon.md
      supporting_text: >-
        CBF1 encodes an AP2-domain transcriptional activator that binds CRT/DRE
        motifs and can activate CRT/DRE-containing reporters in heterologous
        assays (yeast), supporting that it acts as a bona fide transcriptional
        activator rather than merely binding DNA.
