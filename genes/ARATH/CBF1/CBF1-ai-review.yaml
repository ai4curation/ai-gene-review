suggested_questions:
- question: Has CBF1 nuclear localization been demonstrated directly in planta
    (e.g., fluorescent fusion), or is it inferred from the NLS and function?
- question: To what extent does CBF1 contribute directly to the
    water-deprivation/drought response versus acting only through the shared
    CRT/DRE element, given that CBF1 transcript is induced by cold but not
    osmotic stress?
- question: What is the genome-wide set of direct CBF1 target promoters
    (ChIP-seq) and how much does it overlap with CBF3 versus CBF2?
