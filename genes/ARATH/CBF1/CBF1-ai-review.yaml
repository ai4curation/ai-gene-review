  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Loss-of-function (RNAi/antisense) analysis shows CBF1, together with CBF3,
      is a positive regulator of cold acclimation, activating a subset of the
      CBF regulon. CBF1/CBF3 RNAi lines are defective in cold acclimation.
