      Strong genetic loss-of-function evidence that CBF1 is required for the
      full development of cold acclimation. This is a core biological role.
    supported_by:
    - reference_id: PMID:18093929
      supporting_text: >-
        CBF1 and CBF3 RNAi lines are defective in cold acclimation but are not
        affected in their constitutive freezing tolerance.
    - reference_id: file:ARATH/CBF1/CBF1-deep-research-falcon.md
      supporting_text: >-
        antisense downregulation of **CBF1 and CBF3** reduces cold-induced
        freezing tolerance by about **60%**
