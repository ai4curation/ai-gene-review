- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:28344081
  qualifier: enables
  review:
    summary: >-
      CBF1 interacts with 14-3-3 (GRF) proteins in the nucleus; phosphorylated
      14-3-3 proteins bind and destabilize CBF proteins to fine-tune cold
      signaling. The interaction is real but 'protein binding' is uninformative
      and regulatory rather than a core molecular function.
