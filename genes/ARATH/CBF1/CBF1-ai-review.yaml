- term:
    id: GO:0000977
    label: RNA polymerase II transcription regulatory region sequence-specific DNA binding
  evidence_type: IDA
  original_reference_id: PMID:9023378
  qualifier: enables
  review:
    summary: >-
      CBF1 binds in a sequence-specific manner to the C-repeat/DRE cis-element in
      the promoters (Pol II regulatory regions) of COR genes. Gel-shift assays
      with recombinant CBF1 demonstrate direct binding to the C-repeat/DRE, and
      CBF1 specifically activates transcription from reporters carrying this
      element but not mutant versions, establishing sequence specificity. This is
      a more informative molecular-function term than the bare 'DNA binding'
      (GO:0003677).
    action: NEW
    reason: >-
      Added as a NEW annotation to capture the specific molecular function:
      sequence-specific binding to a Pol II promoter regulatory element. Directly
      supported by gel-shift (EMSA) evidence and by the demonstrated specificity
      of CRT/DRE-driven transactivation versus mutant elements. This term
      already exists in GO and was previously (incorrectly) listed under
      proposed_new_terms; it is moved here with IDA evidence.
    supported_by:
    - reference_id: PMID:9023378
      supporting_text: >-
        Binding of CBF1 to the C-repeat/DRE was demonstrated in gel shift assays
        using recombinant CBF1 protein expressed in Escherichia coli.
    - reference_id: PMID:9023378
      supporting_text: >-
        expression of CBF1 in yeast was found to activate transcription of
        reporter genes containing the C-repeat/DRE as an upstream activator
        sequence but not mutant versions of the DNA element.
