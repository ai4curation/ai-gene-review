- id: PMID:31665522
  title: DAY-LENGTH-DEPENDENT DELAYED-GREENING1, the Arabidopsis Homolog of the Cyanobacterial
    H+-Extrusion Protein, Is Essential for Chloroplast pH Regulation and Optimization
    of Non-Photochemical Quenching.
  findings:
  - statement: >-
      DLDG1 is a nuclear-encoded protein that associates with the chloroplast envelope
      membrane and functionally interacts with the plastid-encoded Ycf10/cemA to control
      H+ homeostasis in chloroplasts.
    supporting_text: "DLDG1 functionally interacts with Ycf10 to control H+ homeostasis in chloroplasts, which is important for the light-acclimation response, by optimizing the extent of NPQ"
  - statement: >-
      DLDG1 shows K+/H+ antiport activity when expressed in E. coli, supporting the
      classification of the DLDG1-cemA system as a potassium/proton antiporter.
    supporting_text: "the everted membrane vesicles of the E. coli expressing DLDG1 show the K+/H+ antiport activity"
  - statement: >-
      The dldg1 mutant displays excessive non-photochemical quenching (NPQ) under
      continuous light, indicating the DLDG1-cemA system optimizes light energy usage.
    supporting_text: "the dldg1 mutant had a large NPQ value compared with wild type"
  - statement: >-
      DLDG1 shows amino acid sequence similarity to Ycf10/cemA encoded in the plastid genome
      and to the cyanobacterial proton-extrusion-protein A.
    supporting_text: "also shows similarity in its amino-acid sequence to that of Ycf10 encoded in the plastid genome"
core_functions:
- description: >-
    cemA functions as a potassium/proton antiporter in the chloroplast inner envelope membrane,
    contributing to K+/H+ antiport activity that controls proton homeostasis in chloroplasts.
    This function is carried out in collaboration with the nuclear-encoded DLDG1 protein and
    is important for optimizing non-photochemical quenching under continuous light conditions.
  molecular_function:
