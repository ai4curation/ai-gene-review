gene_symbol: cemA
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  cemA (also known as Ycf10) is a chloroplast-encoded integral membrane protein that functions
  as a potassium/proton antiporter in the chloroplast inner envelope membrane. It contributes
  to K+/H+ antiport activity, supporting proton efflux to control proton homeostasis in
  chloroplasts in a light-dependent manner. This activity is important for modulating
  photosynthesis by optimizing non-photochemical quenching (NPQ) under continuous light
  conditions. cemA functionally interacts with the nuclear-encoded DLDG1 protein to control
  H+ homeostasis in chloroplasts, which is critical for the light-acclimation response.
  The protein contains three predicted transmembrane helices and belongs to the CemA family.
existing_annotations:
- term:
    id: GO:0015386
    label: potassium:proton antiporter activity
  evidence_type: IDA
  original_reference_id: PMID:31665522
  review:
    summary: >-
      The IDA annotation for K+/H+ antiporter activity is based on PMID:31665522 which
      demonstrated K+/H+ antiport activity using everted membrane vesicles of E. coli
      expressing the homologous DLDG1 protein. The paper concludes that DLDG1 functionally
      interacts with Ycf10 (cemA) to control H+ homeostasis. UniProt describes cemA as
      contributing to K+/H+ antiport activity. While the direct biochemical demonstration
      was on DLDG1 rather than cemA itself, the functional interaction and sequence similarity
      support this annotation.
    action: ACCEPT
    reason: >-
      The annotation is supported by direct experimental evidence from the Harada et al. 2019
      study showing K+/H+ antiport activity for the homologous DLDG1 protein and functional
      interaction with Ycf10/cemA for H+ homeostasis in chloroplasts. UniProt curators assigned
      this as IDA based on the combined evidence.
    supported_by:
    - reference_id: PMID:31665522
      supporting_text: "DLDG1 functionally interacts with Ycf10 to control H+ homeostasis in chloroplasts"
      full_text_unavailable: true
- term:
    id: GO:0051453
    label: regulation of intracellular pH
  evidence_type: IDA
  original_reference_id: PMID:31665522
  review:
    summary: >-
      cemA contributes to regulation of intracellular pH in chloroplasts through its K+/H+
      antiport activity. The study showed that the functional interaction between DLDG1 and
      Ycf10/cemA controls H+ homeostasis in chloroplasts, which is essential for chloroplast
      pH regulation.
    action: ACCEPT
    reason: >-
      The paper directly demonstrates the role of the DLDG1-Ycf10 system in chloroplast pH
      regulation. The title itself states the system is essential for chloroplast pH regulation.
    supported_by:
    - reference_id: PMID:31665522
      supporting_text: "DLDG1 functionally interacts with Ycf10 to control H+ homeostasis in chloroplasts"
      full_text_unavailable: true
