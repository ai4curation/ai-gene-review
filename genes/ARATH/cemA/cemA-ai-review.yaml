suggested_questions:
- question: >-
    Does cemA/Ycf10 have K+/H+ antiport activity on its own, or does it require DLDG1 as a
    partner? The existing IDA annotations suggest direct activity, but the experimental evidence
    in PMID:31665522 primarily tested DLDG1, not cemA directly.
- question: >-
    What is the stoichiometry and physical interaction mechanism between cemA and DLDG1 in the
    chloroplast envelope? Do they form a heteromeric complex?
- question: >-
    How does the cemA-DLDG1 system interact with other chloroplast ion transport systems to
    regulate thylakoid lumen pH during photosynthesis?
suggested_experiments:
- description: >-
    Express cemA alone in E. coli and test for K+/H+ antiport activity using everted membrane
    vesicles, to determine if cemA has intrinsic antiporter activity independent of DLDG1.
  hypothesis: >-
    cemA may have intrinsic K+/H+ antiport activity, or may require DLDG1 as an obligate
    partner for transport function.
  experiment_type: biochemical assay
- description: >-
    Generate Arabidopsis cemA knockout or knockdown lines (e.g., via chloroplast transformation)
    and measure chloroplast pH, NPQ, and photosynthetic efficiency under continuous light to
    directly assess cemA function in planta.
  hypothesis: >-
    Loss of cemA would phenocopy the dldg1 mutant with excessive NPQ and impaired
    chloroplast pH homeostasis.
  experiment_type: reverse genetics
- description: >-
    Perform co-immunoprecipitation or split-GFP assays to test for direct physical interaction
    between cemA and DLDG1 in the chloroplast envelope membrane.
  hypothesis: >-
    cemA and DLDG1 form a physical complex in the chloroplast inner envelope membrane to
    mediate K+/H+ antiport activity.
  experiment_type: protein-protein interaction
