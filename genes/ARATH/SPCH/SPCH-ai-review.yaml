suggested_questions:
- question: Which direct genomic targets of the SPCH-SCRM/ICE1 heterodimer drive the
    asymmetric entry division, and how do these differ from MUTE and FAMA target sets?
  experts:
  - Stomatal development researchers
  - Plant transcription factor genomics specialists
- question: How do the multiple kinases acting on SPCH (MPK3/6, BIN2, CDKA;1) combinatorially
    set SPCH activity and stability in space and time within a single dividing cell?
  experts:
  - Plant signaling researchers
  - Cell polarity and asymmetric division specialists
suggested_experiments:
- description: Genome-wide DNA-binding profiling (e.g. ChIP-seq or DAP-seq) of SPCH
    and SPCH-SCRM/ICE1 complexes to define direct target genes and the cis-motifs underlying
    stomatal lineage initiation.
- description: Quantitative live-imaging of phosphosite-variant SPCH reporters (MPK3/6,
    BIN2, and CDKA;1-Ser186 sites) to dissect how phosphorylation integrates to control
    SPCH abundance and the asymmetric entry division.
