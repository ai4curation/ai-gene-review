- term:
    id: GO:0010052
    label: guard cell differentiation
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: This family-level (InterPro FAMA/SPEECHLESS/MUTE) electronic annotation
      assigns terminal guard cell differentiation. SPCH acts at lineage initiation
      and amplifying asymmetric divisions; terminal guard cell differentiation is the
      role of FAMA. SPCH contributes upstream but is not the direct effector of guard
      cell differentiation.
    action: MARK_AS_OVER_ANNOTATED
    reason: Family-propagated term that conflates the three stomatal bHLHs; SPCH's
      specific role is initiation/asymmetric division, whereas guard cell differentiation
      is FAMA's terminal step. A stomatal-lineage term is more precise.
    supported_by:
    - reference_id: PMID:17183265
      supporting_text: SPCH and two paralogues are successively required for the initiation,
        proliferation and terminal differentiation of cells in the stomatal lineage
