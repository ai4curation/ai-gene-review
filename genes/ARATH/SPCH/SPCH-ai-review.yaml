  review:
    summary: Under osmotic stress, SPCH protein is post-transcriptionally decreased
      via a MAPK cascade, reducing MMC number and growth. SPCH is the developmental
      effector whose abundance is modulated by stress, rather than a dedicated osmotic-stress
      response protein. Environmental/non-core role.
    action: KEEP_AS_NON_CORE
    reason: SPCH participates in the osmotic-stress growth response as a regulated effector
      (its level is decreased), but this is downstream environmental modulation, not
      a core developmental function of SPCH.
    supported_by:
    - reference_id: PMID:25381317
      supporting_text: in response to osmotic stress, post-transcriptionally decrease
        the protein level of SPEECHLESS, the transcription factor promoting MMC identity,
        through the action of a mitogen-activated protein kinase (MAPK) cascade
