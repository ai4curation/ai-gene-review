id: Q700C7
gene_symbol: SPCH
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SPEECHLESS (SPCH) is a subgroup-Ia basic helix-loop-helix (bHLH) transcription
  factor that initiates the stomatal cell lineage in the Arabidopsis leaf and
  hypocotyl epidermis. It is necessary and sufficient to trigger the asymmetric
  entry divisions of meristemoid mother cells (MMCs), and to drive the subsequent
  amplifying asymmetric divisions that establish and maintain the stomatal lineage.
  SPCH is the first-acting factor of a three-bHLH cascade (SPCH then MUTE then
  FAMA) that successively controls lineage initiation, the meristemoid-to-guard-mother-cell
  transition, and terminal guard cell differentiation. As a sequence-specific
  DNA-binding transcription factor, SPCH binds DNA and activates target gene
  transcription as a nuclear heterodimer with the broadly expressed bHLH proteins
  SCRM/ICE1 and SCRM2. SPCH activity and abundance are tightly controlled by
  phosphorylation: MPK3/MPK6 of the EPF-ERECTA/TMM-YODA MAPK cascade phosphorylate
  a unique disordered domain to inhibit SPCH and limit stomatal production, the
  GSK3-like kinase BIN2 also phosphorylates and inhibits SPCH, and CDKA;1-mediated
  phosphorylation at Ser186 stabilizes and promotes SPCH function. This regulation
  integrates developmental, brassinosteroid, and environmental (osmotic stress,
  humidity) signals into the control of stomatal density and patterning.
