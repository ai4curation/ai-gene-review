core_functions:
  - description: FAE1/KCS18 is the seed condensing enzyme (3-ketoacyl-CoA synthase) of
      the ER fatty acid elongase, catalyzing the chain-length-determining condensation of
      acyl-CoA with malonyl-CoA to elongate C18 to C20/C22 very-long-chain fatty acids
      that are stored in seed triacylglycerols.
    molecular_function:
      id: GO:0009922
      label: fatty acid elongase activity
    directly_involved_in:
      - id: GO:0030497
        label: fatty acid elongation
      - id: GO:0000038
        label: very long-chain fatty acid metabolic process
    locations:
      - id: GO:0005783
        label: endoplasmic reticulum
    supported_by:
      - reference_id: PMID:12135493
        supporting_text: >-
          Wild-type recombinant FAE1 KCS was active with several acyl-CoA substrates, with highest
          activity towards saturated and monounsaturated C16 and C18.
      - reference_id: PMID:7734965
        supporting_text: >-
          The product of the FAE1 gene is presumed to be a condensing enzyme that extends the
          chain length of fatty acids from C18 to C20 and C22.
      - reference_id: file:ARATH/FAE1/FAE1-deep-research-falcon.md
        supporting_text: seed-specialized KCS; fae1 reduces seed VLCFAs from ~28% to <1%
references:
  - id: GO_REF:0000002
    title: Gene Ontology annotation through association of InterPro records with GO terms
    findings:
      - statement: InterPro2GO mapping electronically transfers KCS/FAE1 condensing-enzyme and acyltransferase GO terms onto FAE1 from its KCS/3-ketoacyl-CoA synthase InterPro signatures; consistent with the experimentally established beta-ketoacyl-CoA synthase activity.
  - id: GO_REF:0000117
    title: Electronic Gene Ontology annotations created by ARBA machine learning models
    findings:
      - statement: ARBA machine-learning rules propagate GO:0005783 (endoplasmic reticulum) localization to FAE1 from the KCS family; consistent with and corroborated by experimental ER localization of Arabidopsis KCSs including KCS18.
  - id: GO_REF:0000120
    title: Combined Automated Annotation using Multiple IEA Methods
    findings:
      - statement: Combined IEA pipelines (InterPro/UniRule/ARBA) converge on fatty-acid elongation and integral-membrane terms for FAE1, all consistent with KCS18 as the ER membrane-bound condensing enzyme of the seed FAE complex.
  - id: GO_REF:0000122
    title: AtSubP analysis
    findings:
      - statement: AtSubP subcellular-prediction-based annotation predicts GO:0009507 (chloroplast) localization for FAE1, which contradicts the experimentally established ER/microsomal localization of KCS18 and was therefore marked REMOVE in this review.
  - id: PMID:11341960
    title: Active-site residues of a plant membrane-bound fatty acid elongase
      beta-ketoacyl-CoA synthase, FAE1 KCS.
    findings:
      - statement: Identifies catalytic active-site residues of the FAE1 KCS condensing
          enzyme, confirming its beta-ketoacyl-CoA synthase activity.
        reference_section_type: RESULTS
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Direct enzymatic/active-site characterization supporting the IDA
        fatty acid elongase activity annotation.
  - id: PMID:12135493
    title: Engineering and mechanistic studies of the Arabidopsis FAE1 beta-ketoacyl-CoA
      synthase, FAE1 KCS.
    findings:
      - statement: FAE1 KCS is active on saturated and monounsaturated C16-C18 acyl-CoAs,
          elongating to C20-C22 VLCFAs, with no activity on polyunsaturated substrates;
          microsome (ER) membrane localization.
        reference_section_type: RESULTS
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Source of EXP fatty acid elongase activity and microsome localization.
  - id: PMID:36798704
    title: Tackling functional redundancy of Arabidopsis fatty acid elongase complexes.
    findings:
      - statement: Systematic reconstitution of Arabidopsis KCS isoforms; KCS18 localizes
          to the ER and shows a strong bias toward monounsaturated C20 products.
        reference_section_type: RESULTS
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Source of IDA ER localization; full text available.
  - id: PMID:7734965
    title: Directed tagging of the Arabidopsis FATTY ACID ELONGATION1 (FAE1) gene with
      the maize transposon activator.
    findings:
      - statement: Identifies FAE1 by transposon tagging; fae1 mutant seeds are strongly
          depleted of very-long-chain fatty acids, establishing FAE1's role in seed VLCFA
          elongation.
        reference_section_type: RESULTS
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: Source of IMP annotations for VLCFA metabolism and fatty acid
        elongation.
  - id: file:ARATH/FAE1/FAE1-deep-research-falcon.md
    title: Falcon/Edison deep research report for FAE1/KCS18, Arabidopsis thaliana
    findings:
      - statement: Synthesizes FAE1/KCS18 as the seed-specialized, chain-length-determining
          condensing enzyme of the ER FAE complex; fae1 reduces seed VLCFAs from ~28% to
          <1%; a key metabolic-engineering control point for long-chain monounsaturated
          seed oils.
        reference_section_type: OTHER
suggested_questions:
  - question: How is FAE1/KCS18 substrate chain-length specificity (favoring C18->C20->C22
      monounsaturated products) encoded structurally, and can it be re-engineered to tune
      seed-oil VLCFA profiles in oilseed feedstocks?
suggested_experiments:
  - description: Solve a cryo-EM or crystal structure of FAE1/KCS18 (alone and in complex with an acyl-CoA substrate analog) to identify the active-site residues controlling chain-length preference for C18->C20->C22 elongation.
  - description: Perform structure-guided mutagenesis of the substrate-binding tunnel residues of FAE1/KCS18 and assay the variants in vitro and in transgenic Arabidopsis or Camelina seeds to quantify shifts in C20/C22 vs C24 product distributions.
  - description: Reconstitute the seed FAE complex (KCS18 with KCR1, HCD/PAS2, and ECR) in yeast or insect microsomes to define the minimal complex composition required for processive C18->C22 elongation and to test whether other KCS isoforms can functionally substitute for KCS18.
