gene_symbol: AP3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: APETALA3 (AP3) is a MIKC-type MADS-box transcription factor of Arabidopsis
  thaliana and the B-class floral homeotic gene of the classical ABC model. It
  specifies petal (whorl 2) and stamen (whorl 3) identity during flower development.
  AP3 functions as an obligate heterodimer with PISTILLATA (PI); neither protein is
  active alone, and heterodimer formation is required for nuclear import, sequence-
  specific DNA binding, and downstream regulatory activity. The AP3/PI heterodimer
  binds CArG-box DNA elements in the regulatory regions of target genes and assembles
  with APETALA1 or SEPALLATA3 into higher-order MADS-domain protein complexes (the
  floral quartet). Through these complexes AP3/PI activates and represses target genes
  (for example, direct activation of the NAC-domain gene NAP and repression of the GATA
  genes GNC/GNL) and maintains its own expression through an AP3/PI autoregulatory loop.
  Loss of AP3 function transforms petals into sepals and stamens into carpels. The
  protein contains an N-terminal MADS-box DNA-binding domain, a K-box (keratin-like
  coiled-coil) dimerization domain, and a C-terminal region, and localizes to the
  nucleus when co-expressed with PI.
