proposed_new_terms: []
suggested_questions:
- question: What is the complete set of direct genome-wide targets of the AP3/PI
    heterodimer in petal versus stamen primordia, and how is target selection
    partitioned between these two organ types?
  experts:
  - Floral developmental biologists
  - Plant transcriptomics researchers
- question: How do floral quartet complexes (AP3/PI with AP1 or SEP3) reprogram AP3/PI
    DNA-binding specificity and activation/repression output at individual target loci?
  experts:
  - MADS-box protein complex specialists
  - Plant gene-regulation researchers
suggested_experiments:
- hypothesis: AP3/PI heterodimerization is strictly required for all AP3 in vivo
    functions, including nuclear import and target binding
  description: Generate dimerization-deficient AP3 variants (MADS/K-box interface
    mutations) and assay nuclear localization, ChIP-seq occupancy at CArG-box targets,
    and complementation of the ap3 homeotic phenotype.
- hypothesis: AP3/PI acts as both activator and repressor depending on partner
    composition in floral quartet complexes
  description: Perform ChIP-seq plus RNA-seq in wild type and ap1/sep3 mutant
    backgrounds to determine how AP1/SEP3 partnership shifts AP3/PI between activation
    (e.g. NAP) and repression (e.g. GNC/GNL) of target genes.
