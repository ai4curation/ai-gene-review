    title: Large-scale analysis of in vivo phosphorylated membrane proteins by
      immobilized metal ion affinity chromatography and mass spectrometry.
    findings:
      - statement: Large-scale phosphoproteomics study identified phosphorylated
          plasma membrane proteins in Arabidopsis, including protein kinases.
        supporting_text: "We present a scheme for two-dimensional peptide
          separation using strong anion exchange chromatography prior to IMAC
          that both decreases the complexity of IMAC-purified phosphopeptides
          and yields a far greater coverage of monophosphorylated peptides"
  - id: PMID:16429265
    title: Genome-wide analysis and experimentation of plant serine/
      threonine/tyrosine-specific protein kinases.
    findings:
      - statement: Genome-wide survey classified Arabidopsis protein kinases
          with tyrosine kinase motifs, including CBC2 (STY52), as putative
          dual-specificity STY kinases.
        supporting_text: "The Arabidopsis thaliana genome encodes 57 different
          protein kinases that have tyrosine kinase motifs"
  - id: PMID:16618929
