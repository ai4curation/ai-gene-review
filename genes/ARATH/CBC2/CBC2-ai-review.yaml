        supporting_text: "Global Analysis of Membrane-associated Protein
          Oligomerization Using Protein Correlation Profiling"
  - id: PMID:29101334
    title: Blue light and CO(2) signals converge to regulate light-induced
      stomatal opening.
    findings:
      - statement: CBC1 and CBC2 are Raf-like kinases that integrate blue light
          and CO2 signals to regulate stomatal opening by inhibiting S-type
          anion channels.
        supporting_text: "CBC1/CBC2 redundantly stimulate stomatal opening by
          inhibition of S-type anion channels in response to both BL and low
          concentrations of CO2"
      - statement: CBC2 was identified as At5g50000 in the same clade as CBC1
          in the MAPKKK family and localizes to the cytosol of guard cells.
        supporting_text: "GFP fluorescence was found in the cytosol of guard
          cells"
      - statement: CBC1 and CBC2 possess protein kinase activity and
          autophosphorylate.
        supporting_text: "GST fusions of CBC1 (GST-CBC1) and CBC2 (GST-CBC2)
          were autophosphorylated"
      - statement: CBC2 kinase-dead mutant D245N loses autophosphorylation
          activity, confirming catalytic activity requires the kinase domain.
        supporting_text: "A mutation introduced in the kinase domain caused the
          loss of their autophosphorylation activities in the mutated CBCs
          (CBC1 (D271N), CBC2 (D245N))"
      - statement: HT1 kinase phosphorylates both CBC1 and CBC2, but not
          vice versa, indicating CBCs function downstream of HT1.
        supporting_text: "HT1 phosphorylated both CBC1 and CBC2, but CBC1 and
          CBC2 did not phosphorylate HT1"
      - statement: CBC1 and CBC2 function in the same signaling pathway as HT1
          for CO2-induced stomatal responses.
        supporting_text: "The triple mutant cbc1 cbc2 ht1-9 revealed the same
          stomatal phenotype as the cbc1 cbc2 and ht1-9 mutants"
      - statement: The cbc2 single mutant exhibits partial impairment in
          temperature decrease, and the cbc1 cbc2 double mutant is severely
          impaired.
        supporting_text: "A T-DNA insertion mutant of At5g50000 (cbc2)
          exhibited partial impairment in the temperature decrease"
      - statement: CBC2 interacts with CBC1 and both interact with HT1 in
          BiFC assays.
        supporting_text: "both CBC1 and CBC2 interacted with either CBC1 or
          CBC2"
  - id: PMID:31904040
    title: Raf-like kinases CBC1 and CBC2 negatively regulate stomatal opening
      by negatively regulating plasma membrane H(+)-ATPase phosphorylation in
      Arabidopsis.
    findings:
      - statement: CBC1 and CBC2 act as negative regulators of stomatal opening
          by inhibiting PM H+-ATPase C-terminal Thr phosphorylation in guard
          cells.
        supporting_text: "we conclude that CBC1 and CBC2 act as negative
          regulators of stomatal opening, probably via inhibition of PM
          H+-ATPase activity"
      - statement: The cbc1cbc2 double mutant shows larger stomatal opening and
          increased PM H+-ATPase phosphorylation.
        supporting_text: "the cbc1cbc2 double mutant showed larger stomatal
          opening under both dark and blue light conditions"
      - statement: CBC1 and CBC2 interact with BLUS1 and PM H+-ATPase
          in vitro.
        supporting_text: "CBC1 and CBC2 interacted with BLUS1 and PM H+-ATPase
          in vitro"
      - statement: CBC1 and CBC2 were identified as phot-interacting protein
          kinases through in vitro screening.
        supporting_text: "through an in vitro screening of phot-interacting
          protein kinases, we obtained the CBC1 and CBC2"
      - statement: CBC1/CBC2 function is specific to stomatal responses and
          does not affect phototropism, chloroplast movement, or leaf
          flattening.
        supporting_text: "Single and double knockout mutants of CBC1 and CBC2
          showed no lesions in the context of phot-mediated phototropism,
          chloroplast movement, or leaf flattening"
core_functions:
  - description: CBC2 is a Raf-like serine/threonine protein kinase that
      integrates blue light and CO2 signaling to regulate stomatal aperture
      in guard cells, primarily by inhibiting S-type anion channels
      (SLAC1/SLAH3) downstream of phototropin receptors and HT1 kinase.
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    supported_by:
      - reference_id: PMID:29101334
        supporting_text: "CBC1/CBC2 redundantly stimulate stomatal opening by
          inhibition of S-type anion channels in response to both BL and low
          concentrations of CO2"
      - reference_id: PMID:29101334
        supporting_text: "GST fusions of CBC1 (GST-CBC1) and CBC2 (GST-CBC2)
          were autophosphorylated"
  - description: CBC2 negatively regulates stomatal opening by inhibiting
      plasma membrane H+-ATPase C-terminal Thr phosphorylation in guard cells,
      functioning as part of a regulatory mechanism to control gas exchange.
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    supported_by:
      - reference_id: PMID:31904040
        supporting_text: "we conclude that CBC1 and CBC2 act as negative
          regulators of stomatal opening, probably via inhibition of PM
          H+-ATPase activity"
suggested_questions:
  - question: What are the direct substrates of CBC2 kinase activity in vivo,
      and does CBC2 directly phosphorylate SLAC1, SLAH3, or AHA1/AHA2?
  - question: Are the phosphorylation sites on CBC2 by HT1 different from
      those by phot1, and what are the functional consequences of each
      phosphorylation event?
  - question: How is the dual role of CBC2 (stimulating stomatal opening via
      anion channel inhibition vs. negatively regulating opening via H+-ATPase
      inhibition) resolved in the physiological context of guard cells?
  - question: Does CBC2 have tyrosine kinase activity as suggested by the STY
      kinase classification, or is it strictly a Ser/Thr kinase?
suggested_experiments:
  - description: Perform in vitro kinase assays with purified CBC2 and
      recombinant SLAC1/SLAH3 cytoplasmic domains to determine whether CBC2
      directly phosphorylates S-type anion channels.
  - description: Use phosphoproteomics on guard cell protoplasts from cbc1
      cbc2 mutant vs wild-type to identify the full set of CBC2-dependent
      phosphorylation events in vivo.
  - description: Generate phospho-mimetic and phospho-dead mutations at
      HT1-dependent phosphorylation sites on CBC2 to determine the functional
      significance of HT1-mediated phosphorylation.
  - description: Test CBC2 kinase activity on tyrosine-containing peptide
      substrates to experimentally determine whether CBC2 has dual-specificity
      (Ser/Thr/Tyr) or is strictly a Ser/Thr kinase.
