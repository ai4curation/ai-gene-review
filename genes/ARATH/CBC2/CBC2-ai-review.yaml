          compartments including plasma membrane.
        supporting_text: "the density gradient distributions of 689 proteins
          from Arabidopsis thaliana were determined, enabling confident and
          simultaneous localization of 527 proteins to the endoplasmic
          reticulum, Golgi apparatus, vacuolar membrane, plasma membrane, or
          mitochondria and plastids"
  - id: PMID:21533090
