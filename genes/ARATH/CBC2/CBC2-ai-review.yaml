taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  CBC2 (CONVERGENCE OF BLUE LIGHT AND CO2 2), also known as STY52, is a
  Raf-like serine/threonine protein kinase expressed in guard cells that
  functions redundantly with CBC1 to regulate stomatal aperture. CBC2
  integrates blue light and CO2 signaling in guard cells by inhibiting S-type
  anion channels (SLAC1/SLAH3) downstream of phototropin receptors and HT1
  kinase. Under blue light and low CO2 conditions, CBC1/CBC2 stimulate
  stomatal opening by suppressing anion efflux, thereby maximizing
  photosynthetic gas exchange. CBC2 also acts as a negative regulator of
  stomatal opening by inhibiting plasma membrane H+-ATPase phosphorylation,
  indicating a dual regulatory role. CBC2 interacts with CBC1, phototropins
  (phot1, phot2), BLUS1, and plasma membrane H+-ATPase (AHA1), and is
  phosphorylated by HT1 kinase. CBC2 localizes to the cytosol of guard cells
  and contributes to leaf temperature regulation through its effects on
  stomatal conductance.
