  review:
    summary: Negated annotation reflecting the 2009 finding that TOC1 did not bind the
      CCA1 promoter (TCP-binding-site region) directly by EMSA/Y1H and was instead recruited
      via CHE. Later work (2012) showed TOC1 does bind other elements (T1ME/G-box) directly
