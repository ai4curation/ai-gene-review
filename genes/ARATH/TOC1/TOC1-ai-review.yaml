    reason: The published negative result is valid as stated (no direct TOC1 binding
      detected to the CCA1 promoter region tested). It does not contradict the later
      positive DNA-binding annotations, which concern different cis-elements and assays.
      Per guidance, an experimental annotation is retained rather than removed.
    supported_by:
    - reference_id: PMID:19286557
      supporting_text: A direct interaction of TOC1 with the CCA1 promoter was investigated
        by electrophoretic mobility shift assays and the yeast one-hybrid system, but no
        binding was detected using these approaches (data not shown), suggesting that TOC1
        is unable to bind directly to the CCA1 promoter.
