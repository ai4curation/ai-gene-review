- term:
    id: GO:0009736
    label: cytokinin-activated signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: involved_in
  review:
    summary: Electronic annotation propagated from the ARR-like InterPro family signature.
      TOC1 is a pseudo-response regulator with no role in cytokinin signaling, and it
      lacks the phospho-accepting Asp required for the cytokinin two-component phosphorelay.
    action: REMOVE
    reason: GO:0009736 is the cytokinin two-component signaling cascade ending in
      transcription. TOC1 is not a cytokinin-signaling response regulator (those are the
      type-A/type-B ARRs); it lacks the catalytic Asp and there is no experimental
      evidence linking TOC1 to cytokinin signaling. This is an over-propagated electronic
      annotation from the receiver-domain family signature.
    supported_by:
