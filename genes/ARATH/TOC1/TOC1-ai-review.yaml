suggested_questions:
- question: How does TOC1 reconcile its genetic role as a positive regulator (necessary
    for CCA1/LHY reactivation) with its biochemical activity as a direct transcriptional
    repressor of CCA1/LHY?
- question: To what extent is TOC1 promoter occupancy dependent on partner transcription
    factors (e.g. CHE, PIFs) versus direct CCT-domain DNA binding at different target loci?
suggested_experiments:
- description: Genome-wide ChIP-seq of native-promoter-driven tagged TOC1 across the
    circadian cycle to define direct in vivo targets and the cis-elements bound.
- description: Structure-guided separation-of-function CCT-domain mutants to dissect direct
    DNA binding from protein-protein recruitment in TOC1 target regulation.
