- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  qualifier: located_in
  review:
    summary: This mitochondrial localization is an electronic prediction (ISM, AtSubP
      tool, GO_REF:0000122) that is biologically implausible. CLV3 has an N-terminal
      secretory signal peptide (residues 1-21), is processed into a secreted CLE peptide,
      and is experimentally localized to the apoplast/extracellular space. There is
      no evidence for a mitochondrial pool, and the signal-peptide-driven secretory
      route is incompatible with mitochondrial targeting.
    action: REMOVE
    reason: Demonstrably wrong algorithmic subcellular-location prediction. CLV3 is
      a signal-peptide-bearing secreted peptide localized to the extracellular space;
      mitochondrial localization contradicts both the protein architecture and direct
      experimental evidence.
    supported_by:
    - reference_id: PMID:12034890
      supporting_text: export to the extracellular space is required for its function
        in activating the CLV1/CLV2 receptor complex
    - reference_id: file:ARATH/CLV3/CLV3-notes.md
      supporting_text: Signal peptide 1-21; chain "Protein CLAVATA 3" 22-96.
