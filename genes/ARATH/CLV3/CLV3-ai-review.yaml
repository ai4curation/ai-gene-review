suggested_questions:
- question: What protease(s) process the CLV3 precursor into the mature 12-13 residue
    MCLV3/CLV3p peptide in vivo, and where in the secretory pathway or apoplast does
    processing occur?
  experts:
  - Plant peptide hormone biochemists
  - Protease/proteomics specialists
- question: How do hydroxyproline arabinosylation and the C-terminal residues jointly
    determine receptor selectivity among CLV1, BAM1/2 and CLV2-CRN?
  experts:
  - Glycobiology researchers
  - Plant receptor kinase structural biologists
- question: Is the proposed CLV3p-FLS2 immune signaling a genuine endogenous function,
    and if so under what conditions, given the conflicting reports?
  experts:
  - Plant innate immunity researchers
  - Stem-cell signaling researchers
suggested_experiments:
- hypothesis: Arabinosylation of hydroxyproline Pro-76 is required for high-affinity
    binding to CLV1/BAM receptors in vivo
  description: Compare receptor binding and meristem-consumption activity of synthetic
    MCLV3 peptides with and without the triarabinose chain, and test in arabinosyltransferase
    (e.g. HPAT/RGP) mutant backgrounds, measuring Kd by quantitative binding assays
    and WUS repression by reporter readouts.
- hypothesis: CLV1/BAM and CLV2-CRN form two parallel receptor complexes that each
    perceive CLV3 to control stem-cell number
  description: Use quantitative co-immunoprecipitation and ligand-binding assays in
    receptor single and higher-order mutants to dissect the contribution of each complex
    to CLV3 perception and WUS repression in the SAM.
- hypothesis: The reported CLV3p-FLS2 immune signaling is not a reproducible endogenous
    function
  description: Independently repeat direct binding (radiolabeled CLV3p to FLS2), MAPK
    activation, and pathogen-resistance assays across multiple labs and FLS2 alleles,
    with rigorous peptide purity controls, to resolve the discrepancy between PMID:21499263
    and PMID:22923673.
