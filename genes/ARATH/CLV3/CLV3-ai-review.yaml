id: Q9XF04
gene_symbol: CLV3
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: CLV3 (CLAVATA3) is a secreted signaling peptide of the CLV3/ESR (CLE)
  family that controls stem-cell homeostasis in the shoot apical and floral meristems
  of Arabidopsis. It is synthesized as a 96-residue precursor with an N-terminal signal
  peptide and is proteolytically processed and post-translationally modified into a
  short (12-13 amino acid) arabinosylated glycopeptide (MCLV3 / CLV3p) derived from
  the conserved C-terminal CLE motif. The mature peptide carries hydroxyprolines at
  Pro-73 and Pro-76 and an O-linked arabinose chain on hydroxyproline Pro-76 that
  enhances receptor-binding affinity, with His-81 essential for activity. CLV3 is
  expressed specifically in the stem cells of the central zone at the meristem apex,
  is secreted into the extracellular space (apoplast), and acts cell-non-autonomously
  as a ligand. It binds the extracellular leucine-rich-repeat domains of the receptor
  serine/threonine kinases CLV1, BAM1 and BAM2, and of the receptor-like protein CLV2
  (which acts with the pseudokinase CRN/CORYNE), with similar nanomolar affinities.
  Receptor activation triggers a signal transduction cascade that represses the
  homeodomain transcription factor WUSCHEL (WUS) in the underlying organizing center,
  establishing a CLV3-WUS negative feedback loop that balances stem-cell proliferation
  against differentiation. Loss of CLV3 function enlarges shoot and floral meristems
  and increases organ number, whereas elevated CLV3 signaling consumes the meristem
  and drives premature differentiation.
