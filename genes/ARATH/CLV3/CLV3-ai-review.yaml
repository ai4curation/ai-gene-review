- term:
    id: GO:0045087
    label: innate immune response
  evidence_type: IDA
  original_reference_id: PMID:21499263
  qualifier: acts_upstream_of_or_within
  review:
    summary: Based on Lee, Chah & Sheen (2011), which reported that CLV3p triggers
      FLS2/BAK1-dependent immune signaling and pathogen resistance and binds FLS2
      directly. This proposed immunity function was subsequently contradicted by Segonzac
      et al. (2012, PMID:22923673), who could not reproduce CLV3p recognition by FLS2,
      and is recorded as a NOT annotation against GO:0002221 in this same dataset.
      The innate immune function is therefore contested and not a reliable core function
      of CLV3. The experimental IDA is not removed (full text reports direct binding
      and resistance assays), but it should not be treated as a representative function.
    action: MARK_AS_OVER_ANNOTATED
    reason: The CLV3p-FLS2 immunity claim is disputed and could not be independently
      reproduced (PMID:22923673); innate immune response does not represent the established
      core function of CLV3, which is meristem stem-cell regulation. Retained rather
      than removed because the underlying experimental study cannot be overruled from
      the cached text alone. The Falcon deep-research synthesis independently treats
      apoptosis/immunity/inflammatory roles as unsupported for CLV3, corroborating
      this over-annotation assessment.
    supported_by:
    - reference_id: PMID:21499263
      supporting_text: can trigger immune signalling and pathogen resistance via the
        flagellin receptor kinase FLS2
    - reference_id: PMID:22923673
      supporting_text: FLS2 does not recognize CLV3 and that the shoot apical meristem
