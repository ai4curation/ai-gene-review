  review:
    summary: This InterPro2GO-derived (IEA) annotation assigns the CLV3/ESR family
      the molecular function of binding receptor serine/threonine kinases. This is
      the most informative molecular function for CLV3 and is independently confirmed
      by experimental IPI annotations showing the mature CLV3 peptide binds the LRR
