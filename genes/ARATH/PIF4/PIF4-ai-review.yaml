id: Q8W2F3
gene_symbol: PIF4
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  PIF4 (PHYTOCHROME INTERACTING FACTOR 4) is a nuclear basic helix-loop-helix
  (bHLH, subgroup 15) transcription factor of Arabidopsis thaliana that binds
  G-box and E-box (CACGTG/CA[CT]GTG) cis-elements in light-regulated promoters
  and acts as a central, growth-promoting regulator integrating light,
  temperature and hormone cues. It functions as a negative component of
  phytochrome B (phyB) red-light signaling, where photoactivated phyB (Pfr)
  binds PIF4 and promotes its degradation, restraining cell elongation in the
  light. PIF4 is the master positive regulator of thermomorphogenesis, whereby
  warm ambient temperature stabilizes and activates PIF4 to drive hypocotyl
  elongation, acting together with the coactivator HEMERA (HMR) and the Mediator
  subunit MED14 to activate auxin biosynthesis and auxin-signaling genes. PIF4
  also relays blue-light cues through direct interaction with cryptochromes
  CRY1/CRY2, and integrates gibberellin (via DELLA proteins) and brassinosteroid
  (via BZR1) signaling at shared growth-gene targets. It forms homodimers and
  heterodimers (including non-DNA-binding heterodimers with HFR1 that inhibit its
  activity) and its abundance and activity are tuned by phosphorylation
  (PP6/FyPP phosphatases) and stress-responsive degradation. PIF4 localizes to
  the nucleus, is expressed mainly in leaves, stems and seedlings, and shows a
  circadian expression rhythm.
