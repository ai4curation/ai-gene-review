core_functions:
- description: Sequence-specific transcriptional activation through heat shock
    element binding. HSFA1E has the conserved HSF DNA-binding domain and
    homotrimerization/activation architecture expected for class A HSFs, and its
    supported core function is regulation of stress-responsive transcription from
    the nucleus. Its current heat-response annotation should be treated as
    secondary relative to HSFA1A/B/D unless HSFA1E-specific process evidence is
    added.
