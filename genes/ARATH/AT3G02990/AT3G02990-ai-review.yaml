    label: nucleus
  - id: GO:0005737
    label: cytoplasm
  supported_by:
  - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-falcon.md
    supporting_text: HSFA1E is not an enzyme or transporter; its primary function
      is DNA-binding transcription factor activity.
  - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
    supporting_text: "A key aspect of HSFA1E's function involves its capacity to form hetero-oligomeric complexes with other HSFA1 family members, particularly with HSFA1a, HSFA1b, and HSFA1d. These hetero-oligomeric complexes are highly active transcriptional regulators with enhanced capacity to activate target gene expression compared to homotrimeric complexes composed of single HSFA1 types. The observation that hetero-oligomeric HSFA1 complexes form preferentially over homotrimeric complexes suggests that this assembly represents a dynamic equilibrium controlled by stoichiometry and cellular conditions."
  - reference_id: file:ARATH/AT3G02990/AT3G02990-uniprot.txt
    supporting_text: "Transcriptional activator that specifically binds DNA sequence 5'-AGAAnnTTCT-3' known as heat shock promoter elements (HSE). Homotrimer."
  - reference_id: file:ARATH/AT3G02990/AT3G02990-notes.md
    supporting_text: "Forms homotrimers for high-affinity DNA binding. Forms hetero-oligomeric complexes with HSFA1A/B/D (highly active)."
