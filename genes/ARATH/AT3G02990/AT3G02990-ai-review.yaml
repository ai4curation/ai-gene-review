- term:
    id: GO:0043565
    label: sequence-specific DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: HSFA1E exhibits sequence-specific DNA binding through recognition of the palindromic heat shock element (HSE) sequence 5'-AGAAnnTTCT-3'. This is a core molecular function.
    action: ACCEPT
    reason: This annotation correctly describes HSFA1E's sequence-specific DNA binding capability. The protein specifically recognizes the HSE palindromic sequence through its conserved DNA-binding domain with winged-helix structure. The specificity is achieved through direct base-specific hydrogen bonding in the major groove and DNA shape recognition mechanisms. This is well-supported by structural and functional studies.
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "The precise three-dimensional architecture of this domain endows HSFA1E with remarkable specificity for recognizing the palindromic DNA sequence 5'-AGAAnnTTCT-3', which constitutes the canonical heat shock element (HSE). The DNA-binding domain achieves its specificity through a combination of direct base-specific hydrogen bonding interactions formed in the major groove of DNA and indirect recognition mechanisms that exploit DNA shape."
      - reference_id: file:ARATH/AT3G02990/AT3G02990-uniprot.txt
        supporting_text: "Transcriptional activator that specifically binds DNA sequence 5'-AGAAnnTTCT-3' known as heat shock promoter elements (HSE)."
