- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: HSFA1E localizes to the cytoplasm under non-stress conditions where it is maintained in an inactive state through interactions with chaperone proteins HSP70/HSP90. This is part of its regulatory mechanism.
    action: ACCEPT
    reason: Cytoplasmic localization is well-documented and functionally important for HSFA1E regulation. Under non-stress conditions, HSFA1E is predominantly cytoplasmic where it is sequestered by molecular chaperones (Hsp70/Hsp90). Upon stress, the protein undergoes nuclear translocation. The protein contains both nuclear localization and nuclear export signals, enabling dynamic shuttling between cytoplasm and nucleus. UniProt confirms both cytoplasmic and nuclear localization.
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "HSFA1E functions as a shuttling protein that dynamically translocates between the cytoplasm and nucleus in response to cellular stress. Under non-stressed conditions, HSFA1E is predominantly localized in the cytoplasm, where it is maintained in an inactive state through interactions with chaperone proteins. These chaperone proteins bind to HSFA1E in the cytoplasm and functionally repress its transcriptional activity through multiple mechanisms."
      - reference_id: file:ARATH/AT3G02990/AT3G02990-uniprot.txt
        supporting_text: "SUBCELLULAR LOCATION: Cytoplasm. Nucleus."
