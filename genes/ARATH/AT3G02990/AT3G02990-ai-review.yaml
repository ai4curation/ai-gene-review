gene_symbol: HSFA1E
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: Heat stress transcription factor A-1E (HSFA1E) is a class A heat shock
  factor and sequence-specific DNA-binding transcriptional activator. Like other
  HSF family members, it recognizes heat shock promoter elements through its
  conserved HSF DNA-binding domain, is annotated to both cytoplasm and nucleus,
  and acts in transcriptional regulation of stress-responsive genes. Available
  evidence supports its molecular transcription factor activity more strongly than
  any HSFA1E-specific biological process; current heat-response annotations should
  be interpreted as a secondary/minor role relative to the better-characterized
  HSFA1A/B/D master regulators.
existing_annotations:
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: HSFA1E functions as a DNA-binding transcription factor that specifically recognizes heat shock elements (HSE) with the sequence 5'-AGAAnnTTCT-3' and activates transcription of stress-responsive genes. This is a core molecular function conserved across all HSFA1 family members.
    action: ACCEPT
    reason: This annotation accurately represents the primary molecular function of HSFA1E. The deep research document extensively describes HSFA1E's role as a transcriptional activator with sequence-specific DNA binding activity, supported by structural and functional studies showing the conserved DNA-binding domain and trimerization-dependent activation mechanism. UniProt entry confirms "Transcriptional activator that specifically binds DNA sequence 5'-AGAAnnTTCT-3'".
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "HSFA1E possesses a highly conserved modular protein architecture typical of eukaryotic heat shock factors. At the amino-terminal end of the protein lies the DNA-binding domain (DBD), which is the most evolutionarily conserved component of all heat shock transcription factors. This domain comprises a trimerization interface consisting of three α-helical bundles and four antiparallel β-sheets arranged in a characteristic winged-helix structure. The precise three-dimensional architecture of this domain endows HSFA1E with remarkable specificity for recognizing the palindromic DNA sequence 5'-AGAAnnTTCT-3', which constitutes the canonical heat shock element (HSE)."
      - reference_id: file:ARATH/AT3G02990/AT3G02990-uniprot.txt
        supporting_text: "Transcriptional activator that specifically binds DNA sequence 5'-AGAAnnTTCT-3' known as heat shock promoter elements (HSE)."
- term:
    id: GO:0000978
    label: RNA polymerase II cis-regulatory region sequence-specific DNA binding
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: HSFA1E binds to RNA polymerase II cis-regulatory regions containing heat shock elements (HSE) in the promoters of target genes to activate their transcription. This is a core molecular function.
    action: ACCEPT
    reason: This annotation accurately captures HSFA1E's mechanism of action. The deep research describes how HSFA1E trimers bind to HSE sequences in promoter regions and recruit RNA polymerase II transcriptional machinery. This is consistent with its role in activating transcription of heat shock proteins, HSFA2, DREB2A, and other stress-responsive genes through promoter binding.
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "Once activated, HSFA1E trimers bind to heat shock elements in the promoter regions of target genes and recruit transcriptional machinery to initiate their expression. The AHA motif is characterized by the presence of aromatic, large hydrophobic, and acidic amino acid residues arranged in a pattern that enables interaction with transcriptional co-activators and components of the RNA polymerase II transcriptional machinery."
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "HSFA1d and HSFA1e specifically regulate the expression of HSFA2 through binding to a heat shock element cluster in the 5′-flanking region of the HSFA2 gene."
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: HSFA1E localizes to the nucleus, particularly under stress conditions, where it binds to DNA and activates transcription. This is a core localization for its transcription factor function.
    action: ACCEPT
    reason: Nuclear localization is well-established for HSFA1E. The protein contains a nuclear localization signal (NLS) and accumulates in the nucleus upon stress activation. Deep research describes stress-dependent nuclear accumulation with rapid kinetics (within minutes of heat stress). UniProt confirms nuclear localization and experimental evidence from PMID:21931939 demonstrates nuclear accumulation.
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "HSFA1E contains a nuclear localization signal (NLS) positioned adjacent to its oligomerization domain. The nuclear localization of HSFA1E becomes dramatically enhanced during heat stress, as trimerized active HSFA1E is released from cytoplasmic chaperones and translocates to the nucleus where it can access its target genes. This stress-dependent nuclear accumulation is highly dynamic, with HSFA1E accumulating in the nucleus within minutes of heat stress exposure."
      - reference_id: PMID:21931939
        supporting_text: "HsfA1 protein accumulation in the nucleus was negatively regulated by their interactions with HSP90, and other factors potentially strongly activate the HsfA1 proteins under HS stress."
- term:
    id: GO:0034605
    label: cellular response to heat
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: HSFA1E participates in cellular response to heat as a member of the
      HSFA1 family, but available synthesis indicates its heat-response contribution
      is weaker than the better-characterized HSFA1A/B/D regulators.
    action: KEEP_AS_NON_CORE
    reason: The IBA annotation is plausible for an HSF-family transcription factor,
      but HSFA1E-specific process evidence in the cached local inputs is limited.
      The heat-response term should therefore be retained as non-core rather than
      used to claim that HSFA1E is a primary heat-shock master regulator.
    supported_by:
      - reference_id: file:ARATH/AT3G02990/AT3G02990-deep-research-perplexity.md
        supporting_text: "HSFA1e plays a more secondary role compared to its paralogs in the core heat stress response, particularly relative to HSFA1a, HSFA1b, and HSFA1d. Analysis of multiple hsfa1 mutant combinations has demonstrated that HSFA1a, HSFA1b, and HSFA1d function as the primary master regulators of the heat shock response, with these three genes together controlling the expression of more than 65% of all heat stress-induced genes in Arabidopsis. In contrast, analysis of quadruple knockout mutants (hsfa1a/hsfa1b/hsfa1d/hsfa1e) versus triple knockouts lacking only HSFA1e (hsfa1a/hsfa1b/hsfa1d) revealed that HSFA1e makes a relatively minor contribution to the acquisition of thermotolerance upon heat acclimation."
