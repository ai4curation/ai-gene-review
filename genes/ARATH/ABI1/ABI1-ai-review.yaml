id: P49597
gene_symbol: ABI1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: ABI1 is an Arabidopsis clade A PP2C protein serine/threonine phosphatase and a core negative
  regulator of abscisic acid signaling. In the absence of ABA, ABI1 dephosphorylates and inhibits SnRK2
  kinases and ABA signaling outputs; ABA-bound PYR/PYL/RCAR receptors inhibit ABI1, allowing SnRK2 activation.
  ABI1 participates in stomatal movement, stress responses, and ABA-dependent transcriptional programs,
  but those outputs are downstream of its phosphatase and signaling-regulator role. Generic protein-binding
  annotations are less informative than receptor/kinase complex regulation and PP2C phosphatase activity.
