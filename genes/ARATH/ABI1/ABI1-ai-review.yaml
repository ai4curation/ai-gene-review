suggested_questions:
- question: Which generic ABI1 protein-binding annotations should be split into specific ABA receptor
    binding, SnRK kinase binding, or other regulatory-complex terms?
- question: Are calcium/cation-binding annotations appropriate for ABI1, or should they be removed in
    favor of PP2C phosphatase activity only?
suggested_experiments:
- experiment_type: substrate phosphoproteomics
  hypothesis: ABI1 directly dephosphorylates a defined subset of SnRK2 and ABA-response substrates in
    vivo.
  description: Compare ABA time-course phosphoproteomes in abi1 loss-of-function, catalytic-dead rescue,
    and receptor-resistant ABI1 backgrounds.
- experiment_type: complex reconstitution
  hypothesis: ABA-bound PYR/PYL receptors switch off ABI1 phosphatase activity toward SnRK2 substrates.
  description: Reconstitute ABI1, ABA receptors, ABA, and SnRK2 substrates in vitro and quantify substrate
    dephosphorylation and receptor-dependent inhibition.
