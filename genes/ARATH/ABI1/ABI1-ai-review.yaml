- description: Clade A PP2C protein serine/threonine phosphatase activity that negatively regulates abscisic
    acid signaling by dephosphorylating and inhibiting ABA-activated SnRK kinases until ABA-bound PYR/PYL/RCAR
    receptors inhibit ABI1.
