- Which downstream enzyme(s) convert ICS1-derived isochorismate to salicylic
  acid in the Arabidopsis plastid/cytosol, and is the isochorismate channeled or
  freely diffusible?
- Does the isoform 2 (Q9S7H8-2, altered C-terminus) retain isochorismate
