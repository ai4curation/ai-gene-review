- id: file:ARATH/LHY/LHY-deep-research-falcon.md
  title: 'Falcon/Edison deep research report: LHY'
  findings:
  - statement: LHY (with CCA1) forms the core negative feedback architecture of the plant circadian oscillator by directly repressing evening-phase clock genes, summarizing the consensus literature view.
    supporting_text: forming the core negative feedback architecture of the plant oscillator
  - statement: LHY recognizes Evening Element and CCA1-binding-site cis-elements (closely related AAATATCT/AGATTTTT-like motifs) in clock-gene promoters.
    supporting_text: LHY recognizes promoter cis-elements closely related to one another
  - statement: LHY contributes to photoperiodic flowering primarily through control of clock phase rather than direct binding of FT-promoter cis-elements, consistent with reports that LHY (unlike CCA1) does not directly bind the FT promoter.
    supporting_text: LHY affects photoperiodic flowering primarily through **clock phase control**, not necessarily by direct binding to floral integrator promoters
  - statement: LHY's role in cold tolerance is best framed as circadian regulation of the cold response (CBF regulon) rather than general cold tolerance.
    supporting_text: annotate as circadian regulation of cold response rather than general "cold tolerance" unless specifically justified
  - statement: Loss of LHY (and CCA1) abolishes sustained free-running rhythms, establishing essentiality for robust circadian oscillation.
    supporting_text: demonstrating essentiality for robust oscillation
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: AI-generated (Falcon/Edison) deep-research synthesis used as supporting context; trace individual claims to primary literature before treating as definitive.
suggested_questions:
- question: How does LHY achieve target specificity at clock-gene promoters when CCA1 and LHY recognize overlapping (Evening Element / CCA1-binding-site) motifs, and to what extent are their in vivo binding repertoires shared versus distinct?
- question: Is LHY-mediated repression of clock-gene promoters direct (recruitment of a corepressor) or indirect (e.g., competition with TCP21/CHE or activator displacement), and which chromatin-modifying complexes interact with LHY at target promoters?
- question: Does LHY directly bind any floral integrator promoters in vivo (the deep research suggests it may not, unlike CCA1), or is its photoperiodic-flowering effect entirely mediated by clock-phase control?
suggested_experiments:
- description: Genome-wide LHY ChIP-seq under matched circadian time points in wild-type and lhy mutant backgrounds, compared with parallel CCA1 ChIP-seq, to map shared versus distinct in vivo binding sites and quantify the LHY/CCA1 cis-regulome.
  hypothesis: LHY and CCA1 share most binding sites but each has a distinct subset, accounting for their non-redundant short-period phenotypes.
  experiment_type: ChIP-seq
- description: Affinity purification of LHY (TAP-tag or proximity labeling such as TurboID) followed by mass spectrometry across day/night time points to define LHY-containing complexes and identify candidate corepressors and chromatin modifiers.
  hypothesis: LHY operates through stable interactions with TPL/TPR-type corepressors and SWI/SNF-related chromatin remodelers to repress evening-phase clock genes.
  experiment_type: Affinity-purification mass spectrometry
- description: Inducible (e.g. estradiol-driven) LHY expression in cca1 lhy double mutants, with high-resolution circadian assays and time-resolved RNA-seq, to define which clock-output rhythms LHY can rescue and on what timescale.
  hypothesis: Transient pulses of LHY at subjective dawn are sufficient to restore robust oscillator function and clock-output rhythms in cca1 lhy plants.
  experiment_type: Inducible complementation with circadian phenotyping and RNA-seq
