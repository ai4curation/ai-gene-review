id: Q6R0H1
gene_symbol: LHY
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: LHY (LATE ELONGATED HYPOCOTYL) is a single-MYB (MYB-related, SHAQKYF/SANT-class) sequence-specific DNA-binding transcription factor that forms the morning-expressed arm of the Arabidopsis circadian oscillator together with its close paralog CCA1. LHY transcript and protein peak around one hour after dawn, and the protein is nuclear. It binds the Evening Element (AAATATCT) and related CCA1-binding-site motifs in target promoters and acts predominantly as a transcriptional repressor, directly repressing evening-phased clock genes such as TOC1/APRR1 and TCP21/CHE, repressing CCA1, and autorepressing its own gene. Through these negative feedback loops LHY (acting partly redundantly with CCA1) is required to sustain robust circadian oscillations. LHY also drives clock outputs, including positive circadian and cold regulation of the CBF cold-response regulon (contributing to freezing tolerance) and the photoperiodic control of flowering. LHY can homodimerize and heterodimerize with CCA1 and is found in a large nuclear protein complex.
