- id: PMID:12007421
  title: Critical role for CCA1 and LHY in maintaining circadian rhythmicity in Arabidopsis.
  findings:
  - statement: CCA1 and LHY are partially redundant; LHY can only partially compensate for loss of CCA1, producing a short-period clock phenotype in cca1-1 plants.
    supporting_text: cca1-1 plants, which lack CCA1 protein, show a short-period phenotype for the expression of several genes when assayed under constant light conditions. This suggests that LHY function is able to only partially compensate for the lack of CCA1 protein, resulting in a clock with a faster pace in cca1-1 plants.
    reference_section_type: ABSTRACT
  - statement: cca1-1 lhy-R double mutants lacking CCA1 and with strongly reduced LHY cannot maintain sustained circadian oscillations in either constant light or constant darkness, establishing that LHY is required for robust free-running rhythms.
    supporting_text: these plants are unable to maintain sustained oscillations in both constant light and constant darkness
    reference_section_type: ABSTRACT
  - statement: Some residual circadian behaviour persists in light/dark cycles in cca1-1 lhy-R plants, indicating the Arabidopsis clock is not entirely dependent on CCA1/LHY when external entrainment is provided.
    supporting_text: these plants exhibit some circadian function in light/dark cycles, showing that the Arabidopsis circadian clock is not entirely dependent on CCA1 and LHY activities
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; cca1-1 lhy-R plants fail to maintain sustained oscillations, directly supporting LHY's core role in regulating circadian rhythm.
- id: PMID:19011118
  title: Circadian clock proteins LHY and CCA1 regulate SVP protein accumulation to control flowering in Arabidopsis.
  findings:
  - statement: LHY and CCA1 repress the floral transition under both short-day and long-day photoperiods, and conversely accelerate flowering under continuous light, placing them upstream of photoperiodic flowering control.
    supporting_text: the circadian clock proteins LATE ELONGATED HYPOCOTYL (LHY) and CIRCADIAN CLOCK-ASSOCIATED1 (CCA1) not only repressed the floral transition under short-day and long-day conditions but also accelerated flowering when the plants were grown under continuous light (LL)
    reference_section_type: ABSTRACT
  - statement: LHY/CCA1 regulate the FT-SVP module, modulating accumulation of the flowering repressor SVP and FT expression, implicating them in long-day photoperiodism of flowering as a clock-output (not core oscillator) role.
    supporting_text: 'Circadian clock proteins LHY and CCA1 regulate SVP protein accumulation to control flowering in Arabidopsis.'
    reference_section_type: TITLE
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: PubMed-verified full text; supports the photoperiodic-flowering (clock-output) annotation via LHY/CCA1 control of FT and SVP.
- id: PMID:19218364
  title: CIRCADIAN CLOCK ASSOCIATED1 and LATE ELONGATED HYPOCOTYL function synergistically in the circadian clock of Arabidopsis.
  findings:
  - statement: LHY localizes to the nucleus and colocalizes with CCA1 there; LHY heterodimerizes with CCA1 and homodimerizes both in vitro and in vivo, providing the experimental (EXP) basis for nuclear localization.
    supporting_text: they also colocalize in the nucleus and heterodimerize in vitro and in vivo
    reference_section_type: ABSTRACT
  - statement: CCA1 and LHY are recovered together in the same large (>400 kDa) nuclear protein complex in planta, supporting their joint function as a clock transcriptional module.
    supporting_text: CCA1 and LHY can form homodimers, and they also colocalize in the nucleus and heterodimerize in vitro and in vivo
    reference_section_type: RESULTS
  - statement: LHY and CCA1 bind to the same region of a Lhcb (CAB) promoter, providing direct evidence that LHY acts as a sequence-specific cis-regulatory region binder at clock-output promoters.
    supporting_text: LHY and CCA1 bind to the same region of the promoter of a Light-harvesting chlorophyll a/b protein (Lhcb, also known as CAB)
    reference_section_type: RESULTS
  - statement: Single cca1 and lhy mutants each show short-period rhythms, and the cca1 lhy double mutant has a still shorter period than either single mutant, indicating only partial functional redundancy and a synergistic role in the central oscillator.
    supporting_text: cca1 lhy double mutants show an even shorter period phenotype than the cca1 single mutant, suggesting that CCA1 and LHY are only partially functionally redundant
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified full text; demonstrates nuclear colocalization, homo/heterodimerization with CCA1, presence in a large complex, and promoter binding. Primary support for the EXP nucleus annotation.
- id: PMID:19286557
  title: A functional genomics approach reveals CHE as a component of the Arabidopsis circadian clock.
  findings:
  - statement: LHY (with CCA1) directly represses TOC1 transcription by binding the TOC1 promoter region, providing IDA evidence for LHY's core DNA-binding transcription factor activity and cis-regulatory region binding.
    supporting_text: CCA1 and LHY are DNA binding proteins that repress TOC1 expression through direct binding to its promoter region
    reference_section_type: INTRODUCTION
  - statement: Electrophoretic mobility shift assays (EMSA) demonstrate that LHY specifically binds the CCA1-binding site in the CHE promoter, establishing sequence-specific cis-regulatory binding at a clock-gene target.
    supporting_text: electrophoretic mobility shift assays indicate that CCA1 and LHY specifically bind to the CCA1-binding site in CHE promoter
    reference_section_type: RESULTS
  - statement: LHY is partially redundant with CHE in repressing CCA1 expression; the che/lhy double mutant has a significantly shorter clock period than the lhy single mutant, supporting LHY's IMP-evidence role in regulating circadian rhythm.
    supporting_text: the pace of the clock in che/lhy double mutant lines exhibited a significantly shorter period length compared to the lhy single mutant
    reference_section_type: RESULTS
  - statement: LHY inhibits CCA1 expression by binding to a CCA1-binding site (AGATTTTT) located ~479 nt upstream of the TCP-binding site in the CCA1 promoter.
    supporting_text: LHY inhibits CCA1 expression (17) probably through direct binding to a CCA1-binding site (18) (AGATTTTT) located 479 nucleotides upstream of the TCP-binding site
    reference_section_type: RESULTS
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified full text; EMSA shows LHY binds the CHE/CCA1 promoter cis-element and LHY represses CCA1. Primary IDA support for DNA-binding TF activity and cis-regulatory region binding.
- id: PMID:21471455
  title: Circadian clock-associated 1 and late elongated hypocotyl regulate expression of the C-repeat binding factor (CBF) pathway in Arabidopsis.
  findings:
  - statement: LHY (with CCA1) directly binds the CBF1-3 promoter region (at EE/CBS and related motifs) and is required for circadian regulation of the CBF cold-response regulon.
    supporting_text: this circadian regulation is caused by the direct action of CCA1 and LHY binding at the CBF1-3 locus—presumably at the EE, CBS, and related motifs
    reference_section_type: RESULTS
  - statement: The cca1-11/lhy-21 double mutant shows impaired freezing tolerance in both nonacclimated and cold-acclimated plants, demonstrating that LHY contributes to cold tolerance as a clock output.
    supporting_text: the cca1-11/lhy-21 double mutation resulted in impaired freezing tolerance in both nonacclimated and cold-acclimated plants
    reference_section_type: RESULTS
  - statement: CCA1/LHY-mediated regulation of the CBF cold-response pathway represents an output of the circadian clock that contributes to plant cold tolerance, framing this as circadian regulation of the cold response rather than a direct cold-sensing function.
    supporting_text: CCA1/LHY-mediated output from the circadian clock contributes to plant cold tolerance through regulation of the CBF cold-response pathway
    reference_section_type: ABSTRACT
  - statement: LHY (with CCA1) is a core component of the central oscillator and acts upstream of CBF1-3, integrating temporal regulation with cold-stress responses.
    supporting_text: two transcription factors that are core components of the clock, i.e., Circadian Clock-Associated 1 (CCA1) and Late Elongated Hypocotyl (LHY)
    reference_section_type: INTRODUCTION
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified full text; ChIP and genetics show CCA1/LHY directly regulate the CBF cold-response pathway and contribute to freezing tolerance (clock-output cold response and circadian rhythm annotations).
- id: PMID:21499259
  title: Coordinated transcriptional regulation underlying the circadian clock in Arabidopsis.
  findings:
  - statement: LHY (with CCA1) directly suppresses ELF4 expression periodically at dawn through physical interactions with the FHY3/FAR1/HY5 transcription-promoting factors at the ELF4 promoter, providing IMP support for negative regulation of circadian rhythm.
    supporting_text: the circadian-controlled CCA1 and LHY proteins directly suppress ELF4 expression periodically at dawn through physical interactions with these transcription-promoting factors
    reference_section_type: ABSTRACT
  - statement: A coordinated set of light- and circadian-regulated transcription factors (FHY3, FAR1, HY5 activating; CCA1/LHY repressing) acts at the ELF4 promoter to generate its cyclic expression, linking light input to the central oscillator.
    supporting_text: a set of light- and circadian-regulated transcription factors act directly and coordinately at the ELF4 promoter to regulate its cyclic expression
    reference_section_type: ABSTRACT
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: PubMed-verified; CCA1/LHY directly suppress ELF4 expression at dawn, supporting negative regulation of circadian rhythm.
- id: PMID:30356219
  title: Transcriptional regulation of nitrogen-associated metabolism and growth.
  findings:
