    id: GO:0009867
    label: jasmonic acid mediated signaling pathway
  evidence_type: IC
  original_reference_id: file:ARATH/MYC2/MYC2-deep-research-falcon.md
  review:
    summary: MYC2 acts as a central transcriptional regulator in the jasmonate signaling pathway.
    action: NEW
    reason: GOA captures jasmonate response and multiple downstream outputs, but does not directly capture
      MYC2's role within jasmonic acid mediated signaling.
    additional_reference_ids:
    - PMID:17616737
    - PMID:21321051
    supported_by:
    - reference_id: file:ARATH/MYC2/MYC2-deep-research-falcon.md
      supporting_text: MYC2's primary function is sequence-specific transcriptional regulation downstream
        of jasmonate perception.
    - reference_id: PMID:17616737
      supporting_text: These results provide new insights into the function of MYC2 and the transcriptional
        coordination of the JA signaling pathway.
      reference_section_type: ABSTRACT
    - reference_id: PMID:21321051
      supporting_text: MYC2 is the only transcription factor known to interact directly with JAZ proteins
        and regulate early JA responses.
      reference_section_type: ABSTRACT
