suggested_questions:
- question: Which MYC2 protein interactions should be represented as specific transcriptional co-regulator
    or repressor-complex biology rather than generic protein binding?
- question: Which downstream jasmonate phenotypes warrant direct MYC2 process annotations versus remaining
    non-core transcriptional outputs?
suggested_experiments:
- experiment_type: ChIP-seq perturbation
  hypothesis: MYC2 direct binding sites define the subset of jasmonate-response annotations that should
    be curated as direct regulatory targets.
  description: Combine native MYC2 ChIP-seq with rapid JA treatment and myc2 loss-of-function RNA-seq
    to separate direct targets from indirect downstream outputs.
- experiment_type: interaction mapping
  hypothesis: JAZ, MED25, kinase, and photoreceptor interactions modulate distinct MYC2 target classes.
  description: Quantitatively map MYC2 complexes before and after jasmonate and test partner-specific
    mutants for target-gene and phenotype effects.
