id: Q39204
gene_symbol: MYC2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: MYC2/JIN1 is an Arabidopsis nuclear basic helix-loop-helix transcription factor and central
  regulator of jasmonate responses. Its core molecular role is sequence-specific cis-regulatory DNA binding
  and transcriptional regulation of jasmonate-responsive genes, with protein interactions such as JAZ
  repressors, MED25, DELLA, and MAPK pathway components modulating activity. Phenotypes in wounding, herbivory,
  glucosinolate and flavonoid metabolism, root development, stomatal development, and secondary cell wall
  regulation are downstream transcriptional outputs rather than distinct biochemical functions.
existing_annotations:
