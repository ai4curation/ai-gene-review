- id: PMID:32612234
  title: Extensive signal integration by the phytohormone protein network.
  full_text_unavailable: true
  findings:
  - statement: >-
      The study generated a large Arabidopsis phytohormone signaling
      protein-protein interaction network; GI-specific interactions require
      unavailable supplemental detail to assess.
    supporting_text: >-
      Here, we experimentally generated a systems-level map of the Arabidopsis
      phytohormone signalling network, consisting of more than 2,000 binary
