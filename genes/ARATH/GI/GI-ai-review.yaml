    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as non-core because the evidence is a stress-tolerance phenotype
      rather than the central clock/photoperiod mechanism of GI.
    supported_by:
    - reference_id: PMID:9681039
      supporting_text: >-
