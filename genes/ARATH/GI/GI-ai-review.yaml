id: Q9SQI2
gene_symbol: GI
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  GI encodes Arabidopsis GIGANTEA, a conserved plant-specific regulatory protein
  in the GIGANTEA/PTHR36319 family. GI has no known catalytic activity; its best
  supported molecular role is as a timing-dependent nuclear and cytoplasmic
  interaction hub/coregulator. In the photoperiodic flowering pathway, GI forms
  blue-light-dependent complexes with FKF1/ZTL-family F-box proteins and binds
  CDF and other DNA-binding transcriptional regulators to control CO and FT
  expression. In the circadian clock, GI stabilizes ZTL-family F-box proteins
  and contributes to robust circadian rhythms and temperature compensation.
  GI also participates in cold, oxidative, shade, salt, and hormone/stress
  responses, but many of those phenotypes are downstream or context-specific
  consequences of its core clock/photoperiod regulatory functions.
existing_annotations:
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IDA
  original_reference_id: PMID:17872410
  review:
    summary: >-
      The Sawa et al. study directly supports transcriptional regulation: GI and
      FKF1 regulate CO transcription, GI binds the CO repressor CDF1, and the
      GI-FKF1-CDF1 complex associates with CO chromatin. The existing term is
      correct but too broad for the reported positive control of CO transcription.
    action: MODIFY
    reason: >-
      Replace the broad parent with the more specific positive regulation of
      RNA polymerase II transcription, reflecting de-repression/activation of
      CO expression by the GI-FKF1-CDF1 module.
    proposed_replacement_terms:
    - id: GO:0045944
      label: positive regulation of transcription by RNA polymerase II
    supported_by:
    - reference_id: PMID:17872410
      supporting_text: >-
        The timing of this interaction regulates the timing of daytime CO
        expression. FKF1 function is dependent on GI, which interacts with a CO
        repressor, CYCLING DOF FACTOR 1 (CDF1), and controls CDF1 stability.
        GI, FKF1, and CDF1 proteins associate with CO chromatin.
      full_text_unavailable: true
- term:
    id: GO:0007623
    label: circadian rhythm
  evidence_type: IDA
  original_reference_id: PMID:17872410
  review:
    summary: >-
      GI is a well-supported regulator of circadian outputs and clock protein
      stability, but the term "circadian rhythm" is a broad process rather than
      the regulatory role of the GI gene product. Mizoguchi et al. and Kim et al.
      support a more specific regulation-of-circadian-rhythm annotation.
    action: MODIFY
    reason: >-
      GI regulates circadian rhythm robustness, phase, and ZTL/TOC1 proteostasis;
      GO:0042752 is more informative than the broad process term.
    proposed_replacement_terms:
    - id: GO:0042752
      label: regulation of circadian rhythm
    supported_by:
    - reference_id: PMID:16006578
      supporting_text: >-
        Therefore, GI plays a general role in controlling circadian rhythms, and
        this is different from its effect on the amplitude of expression of CO
        and FT.
    - reference_id: file:ARATH/GI/GI-deep-research-falcon.md
      supporting_text: >-
        GI participates in circadian timing by controlling post-translational
        stability of key clock proteins through interactions with F-box
        photoreceptors
    - reference_id: PMID:17704763
      supporting_text: >-
        This mechanism of establishing and sustaining robust oscillations of ZTL
        results in the high-amplitude TOC1 rhythms necessary for proper clock
        function.
      full_text_unavailable: true
- term:
    id: GO:0009409
    label: response to cold
  evidence_type: IMP
  original_reference_id: PMID:16231185
  review:
    summary: >-
      The cold-response annotation is supported by mutant and expression evidence:
      GI is cold-induced and gi-3 plants are more freezing sensitive. This is a
      real stress-response role, but it is not the primary conserved function of
      GI.
    action: KEEP_AS_NON_CORE
    reason: >-
      Keep as a non-core process annotation because the evidence supports GI
      involvement in cold stress tolerance, while the core function remains
      clock/photoperiod regulatory control.
    supported_by:
    - reference_id: PMID:16231185
      supporting_text: >-
        GI gene was induced by cold stress, but not by salt, mannitol, and
        abscisic acid. Moreover, gi-3 plants showed an increased sensitivity to
        freezing stress.
      full_text_unavailable: true
- term:
    id: GO:0009637
    label: response to blue light
  evidence_type: IDA
  original_reference_id: PMID:17872410
  review:
    summary: >-
      Blue light is mechanistically relevant because GI forms light-dependent
      complexes with FKF1/ZTL-family F-box proteins. However, the experiment
      supports blue-light signaling through the FKF1-GI timing module more
      specifically than a generic response-to-blue-light annotation.
    action: MODIFY
    reason: >-
      Replace with blue light signaling pathway to capture the blue-light-
      dependent FKF1-GI complex formation that controls photoperiodic timing.
    proposed_replacement_terms:
    - id: GO:0009785
      label: blue light signaling pathway
    supported_by:
    - reference_id: PMID:17872410
      supporting_text: >-
        We demonstrate that FKF1 and GI proteins form a complex in a
        blue-light-dependent manner.
      full_text_unavailable: true
