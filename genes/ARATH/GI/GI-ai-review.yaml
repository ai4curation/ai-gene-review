- id: PMID:21709243
  title: GIGANTEA directly activates Flowering Locus T in Arabidopsis thaliana.
  full_text_unavailable: true
  findings:
  - statement: >-
      GI expressed in mesophyll or vascular tissues increases FT expression and
      GI binds FT repressors SVP, TEM1, and TEM2 near the FT promoter.
    supporting_text: >-
      We found that GI can bind to three FT repressors: SHORT VEGETATIVE PHASE
