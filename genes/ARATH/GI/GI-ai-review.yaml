suggested_questions:
- question: >-
    Does GI directly bind DNA at CO, FT, or COR promoters, or are published ChIP
    and promoter-association signals mediated entirely through DNA-binding
    transcription factors and chromatin-modifying complexes?
  experts:
  - Masaki Sawa
  - Steve A. Kay
  - Won Y. Kim
- question: >-
    Which of the high-throughput phytohormone-network interactions reported for
    GI are reproducible at endogenous protein levels and relevant to GI's
    physiological stress phenotypes?
  experts:
  - Pascal Falter-Braun
- question: >-
    What GO molecular function term best captures GI's scaffold/co-chaperone
    role with ZTL/FKF1/LKP2 and transcriptional repressors, given that generic
    protein binding is not informative?
  experts:
  - David E. Somers
  - Takato Imaizumi
suggested_experiments:
- hypothesis: >-
    GI promoter occupancy is mediated by partner transcription factors or
    chromatin complexes rather than sequence-specific DNA binding by GI itself.
  description: >-
    Test purified GI in EMSA or fluorescence anisotropy assays against CO, FT,
    and COR15A promoter fragments, then compare with ChIP-reChIP or CUT&RUN
    using tagged GI plus CDF1, SVP/TEM, HOS15, and HD2C in planta.
  experiment_type: biochemical DNA-binding and chromatin-occupancy assay
- hypothesis: >-
    GI's core clock function depends on direct binding to ZTL/FKF1/LKP2 F-box
    proteins and HSP90-assisted stabilization of the ZTL-family complex.
  description: >-
    Reconstitute GI-ZTL/FKF1/LKP2 complexes with HSP90 in vitro and measure
    binding affinities, light dependence, and effects on F-box protein stability;
    validate key interfaces by endogenous genome-edited GI separation-of-function
    alleles.
  experiment_type: protein interaction and proteostasis assay
- hypothesis: >-
    GI stress-response phenotypes are separable from its photoperiodic flowering
    and circadian functions through distinct partner complexes.
  description: >-
    Generate endogenous tagged GI lines and perform time-of-day-resolved
    interactome profiling under long-day control, blue light, cold, salt, and
    low red:far-red treatments, followed by reciprocal co-IP and phenotyping of
    partner-specific GI interface mutants.
  experiment_type: endogenous interactomics and genetics
