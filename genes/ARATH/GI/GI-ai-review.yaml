    supporting_text: >-
      Optical sectioning by using the green fluorescent protein-GI fusion
      protein showed green fluorescence throughout the nucleoplasm.
    full_text_unavailable: true
- id: PMID:15155885
  title: >-
    SPINDLY and GIGANTEA interact and act in Arabidopsis thaliana pathways
    involved in light responses, flowering, and rhythms in cotyledon movements.
  full_text_unavailable: true
  findings:
  - statement: >-
      GI interacts with SPY and genetic data place SPY and GI in overlapping
      flowering, light-response, and cotyledon-rhythm pathways.
    supporting_text: >-
      GI and SPY also interacted in Escherichia coli and in vitro pull-down
      assays.
    full_text_unavailable: true
- id: PMID:16006578
  title: Distinct roles of GIGANTEA in promoting flowering and regulating circadian rhythms in Arabidopsis.
  findings:
  - statement: >-
      GI promotes long-day flowering by increasing CO and FT expression, and it
      has a distinct general role in circadian rhythm regulation.
    supporting_text: >-
      These experiments demonstrated that GI acts between the circadian
      oscillator and CO to promote flowering by increasing CO and FT mRNA
      abundance.
  - statement: >-
      Functional GI:GFP localizes to the nucleus in transgenic Arabidopsis.
    supporting_text: >-
      Functional GI:green fluorescent protein is localized to the nucleus in
      transgenic Arabidopsis plants
- id: PMID:16231185
  title: Involvement of GIGANTEA gene in the regulation of the cold stress response in Arabidopsis.
  full_text_unavailable: true
  findings:
  - statement: >-
      GI is induced by cold stress and positively contributes to freezing
      tolerance through a CBF-independent pathway.
    supporting_text: >-
      These results suggest that GI gene positively regulates freezing tolerance
      via a CBF-independent pathway.
    full_text_unavailable: true
- id: PMID:16617099
  title: The molecular basis of temperature compensation in the Arabidopsis circadian clock.
  findings:
  - statement: >-
      GI contributes to circadian temperature compensation and rhythmic
      robustness over physiological temperature ranges.
    supporting_text: >-
      At 27 degrees C, a dynamic balance between GI and LHY allows temperature
      compensation in wild-type plants, but circadian function is impaired in
      lhy and gi mutant plants.
- id: PMID:17704763
  title: ZEITLUPE is a circadian photoreceptor stabilized by GIGANTEA in blue light.
  full_text_unavailable: true
  findings:
  - statement: >-
      GI directly interacts with and stabilizes ZTL in a blue-light-enhanced
      mechanism required for robust TOC1 rhythms.
    supporting_text: >-
      GI, a large plant-specific protein with a previously undefined molecular
      role, stabilizes ZTL in vivo.
    full_text_unavailable: true
- id: PMID:17872410
  title: FKF1 and GIGANTEA complex formation is required for day-length measurement in Arabidopsis.
  full_text_unavailable: true
  findings:
  - statement: >-
      FKF1 and GI form a blue-light-dependent complex that controls CO
      transcription through CDF1 stability and CO chromatin association.
    supporting_text: >-
      We demonstrate that FKF1 and GI proteins form a complex in a
      blue-light-dependent manner.
    full_text_unavailable: true
  - statement: >-
      GI interacts with CDF1 and the GI-FKF1-CDF1 module associates with CO
      chromatin.
    supporting_text: >-
      GI, FKF1, and CDF1 proteins associate with CO chromatin.
    full_text_unavailable: true
- id: PMID:18790998
  title: >-
    Acceleration of flowering during shade avoidance in Arabidopsis alters the
    balance between FLOWERING LOCUS C-mediated repression and photoperiodic
    induction of flowering.
  full_text_unavailable: true
  findings:
  - statement: >-
      Low red:far-red acceleration of flowering depends on the photoperiod
      pathway genes GI and CO in long days.
    supporting_text: >-
      A low red to far-red ratio required the photoperiod-pathway genes
      GIGANTEA (GI) and CONSTANS (CO) to fully accelerate flowering in long
      days and did not promote flowering in short days.
    full_text_unavailable: true
- id: PMID:19061637
  title: COP1 and ELF3 control circadian function and photoperiodic flowering by regulating GI stability.
  findings:
  - statement: >-
      COP1 and ELF3 regulate circadian function and photoperiodic flowering by
      modulating GI stability and accumulation.
    supporting_text: >-
      We propose a model in which ELF3 acts as a substrate adaptor, enabling
      COP1 to modulate light input signal to the circadian clock through
      targeted destabilization of GI.
- id: PMID:19452453
  title: Proteomic profiling of tandem affinity purified 14-3-3 protein complexes in Arabidopsis thaliana.
  findings:
  - statement: >-
      TAP-MS of 14-3-3 omega complexes identified many putative clients, but the
