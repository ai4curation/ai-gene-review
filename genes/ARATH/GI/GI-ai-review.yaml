    full_text_unavailable: true
- id: PMID:40157149
  title: GIGANTEA functions as a co-repressor of cold stress response with a histone-modifying complex.
  full_text_unavailable: true
  findings:
  - statement: >-
      GI acts with HOS15 and HD2C as a cold-response co-repressor affecting
