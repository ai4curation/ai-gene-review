core_functions:
- description: >-
    GI acts as a nuclear transcriptional coregulator for photoperiodic
    flowering. In late afternoon under long days, GI cooperates with FKF1 and
    CDF repressors at CO chromatin to promote CO expression, and GI also
    contributes to FT activation through interactions with FT repressors.
  molecular_function:
