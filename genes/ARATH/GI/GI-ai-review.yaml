      full_text_unavailable: true
- term:
    id: GO:0010218
    label: response to far red light
  evidence_type: IMP
  original_reference_id: PMID:18790998
  review:
    summary: >-
      Low red:far-red conditions require GI and CO to fully accelerate flowering
      in long days. The source supports a shade/far-red effect on the
      photoperiodic flowering pathway rather than direct far-red photoreceptor
      activity or a broad far-red response by GI.
    action: MODIFY
    reason: >-
      The more accurate annotation is regulation of photoperiodism, flowering,
      because the phenotype measured was shade/far-red acceleration of flowering
      through the GI-CO pathway.
    proposed_replacement_terms:
    - id: GO:2000028
      label: regulation of photoperiodism, flowering
    supported_by:
    - reference_id: PMID:18790998
      supporting_text: >-
        A low red to far-red ratio required the photoperiod-pathway genes
        GIGANTEA (GI) and CONSTANS (CO) to fully accelerate flowering in long
        days and did not promote flowering in short days.
      full_text_unavailable: true
- term:
    id: GO:0010378
    label: temperature compensation of the circadian clock
  evidence_type: IMP
  original_reference_id: PMID:16617099
  review:
    summary: >-
      The annotation is well supported. Gould et al. show that GI contributes
      to temperature compensation and rhythmic robustness at high and low
      temperatures through temperature-dependent effects on the Arabidopsis
      clock network.
    action: ACCEPT
    reason: >-
      Temperature compensation is a specific, experimentally supported component
      of GI's circadian regulatory role.
    supported_by:
    - reference_id: PMID:16617099
      supporting_text: >-
        At 27 degrees C, a dynamic balance between GI and LHY allows temperature
        compensation in wild-type plants, but circadian function is impaired in
        lhy and gi mutant plants.
- term:
