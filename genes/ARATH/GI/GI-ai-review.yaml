- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:17704763
  supporting_entities:
  - UniProtKB:Q8W420
  - UniProtKB:Q94BT6
  - UniProtKB:Q9C9W9
  review:
    summary: >-
      This annotation represents GI interaction with ZTL/FKF1/LKP2-family F-box
      photoreceptors. The source shows that GI stabilizes ZTL through a direct,
      blue-light-enhanced interaction. A specific ubiquitin protein ligase
      binding term is more informative than generic protein binding.
    action: MODIFY
    reason: >-
      ZTL-family proteins are F-box components of SCF ubiquitin ligase systems;
      the functionally meaningful activity is binding these ubiquitin ligase
      components to regulate clock protein stability.
    proposed_replacement_terms:
    - id: GO:0031625
      label: ubiquitin protein ligase binding
    supported_by:
    - reference_id: PMID:17704763
      supporting_text: >-
        Here we show that GIGANTEA (GI) is essential to establish and sustain
        oscillations of ZTL by a direct protein-protein interaction. GI, a large
        plant-specific protein with a previously undefined molecular role,
        stabilizes ZTL in vivo.
      full_text_unavailable: true
