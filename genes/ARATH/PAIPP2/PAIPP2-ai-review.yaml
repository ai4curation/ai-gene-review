id: F4KE59
gene_symbol: PAIPP2
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: "PAIPP2 (PARALOG OF AIPP2, also known as PHD2) is a PHD finger-containing protein that functions as a component of the BAH-PHD-CPL2 (BPC) transcriptional repression complex in Arabidopsis. Its PHD domain reads unmethylated H3K4 (H3K4me0), while cooperating with the BAH domain protein AIPP3/BDT1 (which reads H3K27me3) to form a bivalent histone reader module. This module recruits CPL2 phosphatase to dephosphorylate Pol II CTD Ser5, thereby inhibiting Pol II release from the TSS and silencing H3K27me3-enriched loci including flowering genes (FT, SOC1, AGL6, FUL) and the RNA silencing effector AGO5."
existing_annotations:
# ================== MOLECULAR FUNCTION ==================
- term:
    id: GO:0061628
    label: histone H3K27me3 reader activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: "Phylogenetic inference assigns H3K27me3 reader activity to PAIPP2. However, PAIPP2 itself does not directly read H3K27me3 - that is the function of AIPP3/BDT1 via its BAH domain. PAIPP2's PHD domain reads unmethylated H3K4. PAIPP2 enhances AIPP3/BDT1 binding to H3K27me3 but does not itself possess H3K27me3 reader activity."
    action: MODIFY
    reason: "PAIPP2's PHD domain specifically recognizes H3K4me0, not H3K27me3. The H3K27me3 reading is performed by AIPP3/BDT1. PAIPP2 enhances this binding but the direct reader activity is not attributed to PAIPP2. A more accurate term would reflect its role as an unmethylated H3K4 reader."
    proposed_replacement_terms:
      - id: GO:0140566
        label: histone reader activity
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "the BAH domain protein AIPP3 and the PHD proteins AIPP2 and PAIPP2 cooperate to read H3K27me3 and unmodified H3K4 histone marks, respectively, in Arabidopsis"
      - reference_id: PMID:33433058
        supporting_text: "Pull-down assays showed that the PHD finger-containing proteins can enhance the binding of BDT1 to the H3K27me3 peptide"

- term:
    id: GO:0061628
    label: histone H3K27me3 reader activity
  evidence_type: IDA
  original_reference_id: PMID:33277495
  review:
    summary: "IDA annotation for H3K27me3 reader activity. PMID:33277495 shows PAIPP2 enhances AIPP3/BDT1 binding to H3K27me3 and demonstrates the BAH-PHD module reads H3K27me3 collectively. However, PAIPP2's PHD domain itself reads H3K4me0, not H3K27me3. The D306K mutation in the PHD domain disrupts H3K4me0 binding, not H3K27me3 binding."
    action: MODIFY
    reason: "The paper shows PAIPP2 reads unmethylated H3K4 via its PHD domain. H3K27me3 reading is the function of AIPP3's BAH domain. PAIPP2 promotes AIPP3-H3K27me3 binding but does not directly read H3K27me3."
    proposed_replacement_terms:
      - id: GO:0140566
        label: histone reader activity
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "the BAH domain-containing protein anti-silencing 1 (ASI1)-IMMUNOPRECIPITATED PROTEIN 3 (AIPP3) and two PHD domain-containing proteins AIPP2/PARALOG OF AIPP2 (PAIPP2) could form a BAH-PHD module to read H3K27me3 and unmethylated H3K4, respectively"

- term:
    id: GO:0140566
    label: histone reader activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: "IEA annotation for histone reader activity based on InterPro domain IPR049914. PAIPP2 contains a PHD finger domain that reads unmethylated H3K4. This general histone reader activity term is appropriate."
    action: ACCEPT
    reason: "The PHD domain of PAIPP2 is a bona fide histone reader module that specifically recognizes H3K4me0."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "The PAIPP2-PHD finger prefers to bind to unmethylated H3K4 and the binding affinities were clearly decreased when the methylation level of the H3K4 peptide was increased"

- term:
    id: GO:0042393
    label: histone binding
  evidence_type: IDA
  original_reference_id: PMID:33277495
  review:
    summary: "IDA annotation for histone binding. PMID:33277495 directly demonstrates PAIPP2 binds histone H3 via its PHD domain, with specificity for unmethylated H3K4."
    action: ACCEPT
    reason: "Direct experimental evidence for histone binding. The D306K mutation abolishes this binding, confirming PAIPP2 directly engages histone H3."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "the D306K mutation of PAIPP2-PHD finger almost totally disrupts the peptide binding"

- term:
