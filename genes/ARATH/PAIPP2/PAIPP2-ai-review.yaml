        supporting_text: "PAIPP2 could also interact with AIPP3 and CPL2, but not with AIPP2"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:33433058
  review:
    summary: "IPI annotation for protein binding based on interaction with AIPP3/BDT1 demonstrated in PMID:33433058."
    action: REMOVE
    reason: "Protein binding is uninformative. The specific interaction with AIPP3/BDT1 is biologically meaningful but GO:0005515 does not capture this specificity."
    supported_by:
      - reference_id: PMID:33433058
        supporting_text: "BDT1 interacts with a family of PHD finger-containing proteins, which we named PHD1-6, and with CPL2, a Pol II carboxyl terminal domain (CTD) phosphatase responsible for transcriptional repression"

- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:36711532
  review:
    summary: "IPI annotation for protein binding from MOM1 complex study. PAIPP2 was identified as an interactor in the AIPP3 IP-MS, linking it to the MOM1/RdDM pathway."
    action: REMOVE
    reason: "Protein binding is uninformative. The PAIPP2-AIPP3 interaction is captured through BPC complex membership; the MOM1 link is indirect via AIPP3."
    supported_by:
      - reference_id: PMID:36711532
        supporting_text: "Previous IP-MS of the AIPP3 protein pulled down other protein components such as PHD2 (also called PAIPP2), PHD3 (also called AIPP2) and CPL2"

# ================== BIOLOGICAL PROCESS ==================
- term:
    id: GO:0034244
    label: negative regulation of transcription elongation by RNA polymerase II
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: "Phylogenetic inference for negative regulation of Pol II transcription elongation. PAIPP2 participates in the BPC complex that dephosphorylates Pol II CTD Ser5, inhibiting Pol II release from the TSS."
    action: ACCEPT
    reason: "The BPC complex mechanism involves CPL2-mediated dephosphorylation of Ser5P-Pol II, which inhibits Pol II release from the TSS. This is consistent with negative regulation of transcription elongation."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "The BPC complex represses transcription through CPL2-mediated CTD dephosphorylation, thereby causing inhibition of Pol II release from the transcriptional start site"

- term:
    id: GO:0034244
    label: negative regulation of transcription elongation by RNA polymerase II
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: "IEA annotation for the same process based on InterPro domain. Redundant with IBA and IMP annotations but computationally appropriate."
    action: ACCEPT
    reason: "Consistent with experimental evidence from PMID:33277495 showing BPC-mediated inhibition of Pol II elongation."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "the BAH-PHD bivalent histone reader recognizes H3K27me3, and unmodified H3K4 marks and recruits CPL2 to dephosphorylate the Ser5P of Pol II CTD, resulting in the inhibition of Pol II release from a transcriptional initiation state to elongation"

- term:
    id: GO:0034244
    label: negative regulation of transcription elongation by RNA polymerase II
  evidence_type: IMP
  original_reference_id: PMID:33277495
  review:
    summary: "IMP annotation based on the aipp2-1 paipp2-1 double mutant showing higher accumulation of activated Ser5P-Pol II, indicating loss of transcription elongation repression."
    action: ACCEPT
    reason: "The double mutant phenotype directly demonstrates that PAIPP2 (with AIPP2) is required for normal repression of Pol II elongation."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "higher accumulations of Ser5P-Pol II were observed at the selected target genes in aipp3-1, cpl2-2, and aipp2-1/paipp2-1 mutants"

- term:
    id: GO:0045814
    label: negative regulation of gene expression, epigenetic
  evidence_type: IDA
  original_reference_id: PMID:33277495
  review:
    summary: "IDA annotation for epigenetic gene silencing. PAIPP2 as part of the BPC complex silences H3K27me3-enriched loci through bivalent histone reading coupled with Pol II dephosphorylation."
    action: ACCEPT
    reason: "PAIPP2 functions in epigenetic gene silencing by reading histone marks (H3K4me0) and coupling this to transcriptional repression. The silencing of H3K27me3/H3K4me0-enriched loci is inherently epigenetic."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "The BAH-PHD bivalent histone reader complex silences a substantial subset of H3K27me3-enriched loci, including a number of development and stress response-related genes"

- term:
    id: GO:2000028
    label: regulation of photoperiodism, flowering
  evidence_type: IMP
  original_reference_id: PMID:33277495
  review:
    summary: "IMP annotation for regulation of flowering time. The aipp2-1 paipp2-1 double mutant exhibits early flowering, and the BPC complex represses flowering genes FT, SOC1, AGL6, and FUL."
    action: KEEP_AS_NON_CORE
    reason: "Flowering regulation is a downstream consequence of PAIPP2's core function in H3K27me3-mediated transcriptional repression. The core function is histone reading and transcriptional silencing; flowering regulation is one of many biological outcomes."
    supported_by:
      - reference_id: PMID:33277495
        supporting_text: "the BPC complex represses flowering primarily by repressing the expression of FT"
      - reference_id: PMID:33433058
        supporting_text: "Mutations in all of the PHD genes caused increased expression of flowering genes and an early-flowering phenotype"

