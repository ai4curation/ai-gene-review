    summary: Mutant-phenotype annotation to potassium ion transport based on altered xylem K+ content in athkt1 alleles.
    action: MARK_AS_OVER_ANNOTATED
    reason: This TAIR IMP annotation reflects an indirect, secondary effect on K+, not direct K+ transport by HKT1. The paper itself states the influence on K+ is smaller, inverse, and that "K+ transport may be indirectly affected". Annotating HKT1 to potassium ion transport over-states an indirect downstream consequence as a transport function; the gene does not transport K+ in planta. (The annotation is not removed because it rests on an experimental phenotype, but the K+-transport term is an over-annotation.)
