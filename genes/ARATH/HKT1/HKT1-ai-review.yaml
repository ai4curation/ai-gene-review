id: Q84TI7
gene_symbol: HKT1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  AtHKT1;1 (HKT1, At4g10310) is a plasma-membrane cation transporter of the
  HKT/Trk/Ktr superfamily and the sole HKT-family member in Arabidopsis thaliana.
  It is a Class I HKT transporter that functions in planta as a sodium-selective
  uniporter. Its central physiological role is sodium retrieval and recirculation;
  it unloads Na+ from the xylem sap into xylem-parenchyma cells (and is implicated
  in Na+ loading into the phloem in shoots and unloading in roots), thereby
  limiting Na+ accumulation in photosynthetic shoot tissues and conferring
  tolerance to salt stress. The protein has a K-channel-like four
  transmembrane-pore-transmembrane architecture but, unlike potassium channels,
  lacks a conserved glycine in its first pore loop (position 68), which accounts
  for its selectivity for Na+ over K+; in planta it does not transport K+ and
  instead influences K+/Na+ balance indirectly through its effect on Na+
  homeostasis. AtHKT1;1 is expressed in vascular tissues of all organs,
  predominantly in the phloem and in xylem-parenchyma cells, and its locus
  underlies natural variation in leaf Na+ content among Arabidopsis accessions.
