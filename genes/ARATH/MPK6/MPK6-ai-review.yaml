- term:
    id: GO:0035556
    label: intracellular signal transduction
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: involved_in
  review:
    summary: IBA phylogenetic annotation placing MPK6 in intracellular signal transduction. Correct at
      the family level (MAPKs are universal intracellular signaling modules) but broad relative to MPK6's
      well-characterized MAPK-cascade role.
    action: ACCEPT
    reason: Accurate and conservative; MPK6 is unambiguously an intracellular signal-transduction kinase.
      IBA annotations from the well-curated MAPK family are reliable. The more specific MAPK cascade term
      is also annotated.
    supported_by:
    - reference_id: PMID:12119167
      supporting_text: Mitogen-activated protein kinase (MAPK) cascades are universal signal transduction
        modules in eukaryotes, including yeasts, animals and plants.
- term:
    id: GO:0000165
    label: MAPK cascade
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  qualifier: involved_in
  review:
    summary: MPK6 is the terminal MAP kinase of numerous MAP kinase cascades (e.g. MEKK1-MKK4/MKK5-MPK3/MPK6
      in immunity; YDA-MKK4/MKK5-MPK3/MPK6 in stomatal development; MKK2-MPK4/MPK6 in cold/salt; MKK9-MPK6
