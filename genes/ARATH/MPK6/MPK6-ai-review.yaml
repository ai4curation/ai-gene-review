id: Q39026
gene_symbol: MPK6
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: MPK6 (AtMPK6, At2g43790) is a TEY-motif mitogen-activated protein kinase of the CMGC/MAPK
  family and one of the central stress- and development-responsive MAPKs in Arabidopsis. As the terminal
  kinase of multiple MAP kinase cascades, MPK6 is activated by dual phosphorylation of its Thr-Glu-Tyr
  (TEY) activation-loop motif (Thr221/Tyr223) by upstream MAP kinase kinases (MKK2, MKK3, MKK4, MKK5,
  MKK6, MKK7 and MKK9), which are themselves activated by MAPKKKs such as MEKK1, YODA (YDA), ANP1 and
  MKKK20 downstream of cell-surface receptors including the flagellin receptor FLS2 and the ERECTA receptor-like
  kinase. Once activated, MPK6 phosphorylates serine/threonine residues (preferring a proline-directed
  S/T-P motif) on numerous substrates, including the ethylene-biosynthesis enzymes ACS2/ACS6, the transcription
  factors EIN3, WRKY33/WRKY34 and MYB41, the stomatal regulators SPEECHLESS (SPCH) and SCREAM/ICE1, the
  ethylene response factor ERF104, VQ-motif proteins, and the polarity protein BASL. Through these substrates
  MPK6 functions largely redundantly with the closely related MPK3 in innate immunity (PAMP-triggered
  responses and camalexin phytoalexin biosynthesis), abiotic-stress signaling (oxidative/ROS, ozone, osmotic,
  salt, cold and freezing, UV-B), hormone signaling (ethylene, jasmonate, abscisic acid), and a range
  of developmental processes (stomatal patterning and asymmetric cell division, inflorescence and organ
  architecture, ovule and pollen development, and root development with cell-division-plane control).
  MPK6 is predominantly cytoplasmic and nuclear, translocating to the nucleus upon activation, and is
  additionally recruited to the cell cortex and to cytoskeletal cell-division structures (preprophase
  band, phragmoplast) and the trans-Golgi network. Its activity is negatively controlled by protein phosphatases
  including the PP2C AP2C1 and the dual-specificity/protein-tyrosine phosphatases MKP1, MKP2 (DSPTP1B)
  and PTP1.
