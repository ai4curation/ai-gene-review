proposed_new_terms:
- proposed_name: MAP kinase substrate binding
  proposed_definition: Binding of a MAP kinase to a protein substrate that it phosphorylates, typically
    via a docking (D-) motif on the substrate, distinct from generic protein binding.
  proposed_parent:
    id: GO:0019901
    label: protein kinase binding
  justification: Many of MPK6's IPI 'protein binding' annotations actually represent well-documented kinase-substrate
    interactions (ERF104, MYB41, VQ proteins, LIP5, ICE1, BASL, AHL13). A dedicated MF term for MAP-kinase-substrate
    binding would capture these informatively rather than discarding them as generic protein binding.
  supported_by:
  - reference_id: PMID:19416906
    supporting_text: the in vivo enzyme-substrate interaction of the Arabidopsis thaliana MAP kinase,
      MPK6, with an ethylene response factor (ERF104)
suggested_questions:
- How is signaling specificity achieved among the many overlapping MPK6 cascades (immunity, ethylene,
  ABA, JA, cold) that share the same terminal kinase, given the broad substrate consensus motif?
- To what extent are individual MPK6 biological-process annotations attributable to MPK6 specifically
  versus shared redundantly with MPK3, and which outputs are MPK6-unique?
