core_functions:
- description: Protein serine/threonine MAP kinase (EC 2.7.11.24) that, upon dual phosphorylation of its
    TEY activation-loop motif (Thr221/Tyr223) by upstream MAP kinase kinases, phosphorylates proline-directed
    S/T-P motifs on diverse substrates; the terminal catalytic step of multiple MAPK cascades.
