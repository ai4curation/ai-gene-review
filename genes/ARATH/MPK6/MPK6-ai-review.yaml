- description: Acts as the convergent terminal kinase of innate-immune and stress MAPK cascades (e.g.
    MEKK1-MKK4/MKK5-MPK3/MPK6 downstream of FLS2), phosphorylating transcription factors and other substrates
    to mediate defense gene expression, camalexin biosynthesis and pathogen resistance, largely redundantly
    with MPK3.
