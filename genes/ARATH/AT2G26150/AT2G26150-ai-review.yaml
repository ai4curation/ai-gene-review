core_functions:
  - description: Transcriptional activation through binding heat shock elements
      in promoters of stress-protective genes. HSFA2 activates heat shock protein
      and stress-response targets during recovery from heat stress, amplifying the
      HSFA1-initiated response and supporting acquired thermotolerance.
    molecular_function:
      id: GO:0003700
      label: DNA-binding transcription factor activity
    directly_involved_in:
      - id: GO:0010286
        label: heat acclimation
      - id: GO:0045893
        label: positive regulation of DNA-templated transcription
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: file:ARATH/AT2G26150/AT2G26150-deep-research-falcon.md
        supporting_text: HSFA2 functions as a **DNA-binding transcription factor**
          that recognizes HSEs and activates expression of heat-response genes
  - description: Promoter-specific chromatin binding in heat-acclimation and
      thermomemory circuits. HSFA2 binds regulatory chromatin at targets such as
      SGIP1 and participates in the REF6-HSFA2 feedback loop that supports
      sustained and transgenerational heat-acclimation responses.
    molecular_function:
      id: GO:1990841
      label: promoter-specific chromatin binding
    directly_involved_in:
      - id: GO:0010286
        label: heat acclimation
    locations:
      - id: GO:0005634
        label: nucleus
    supported_by:
      - reference_id: file:ARATH/AT2G26150/AT2G26150-deep-research-falcon.md
        supporting_text: Time-course ChIP evidence shows heat-dependent
          enrichment of HSFA3 (and HSFA2) at HSE-containing promoters of memory
          genes, with binding dynamics during recovery consistent with sustained
          memory-phase activation.
suggested_questions:
