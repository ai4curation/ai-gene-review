        specific thermomemory/acclimation process.
      action: KEEP_AS_NON_CORE
      reason: PMID:20089772 supports heat-inducible HSFA2 expression in anoxia
        and oxidative-stress contexts. That evidence is sufficient to retain the
        broad cellular response to heat annotation, but not to replace this entry
        with the more specific heat acclimation term.
      supported_by:
        - reference_id: PMID:20089772
          supporting_text: A significant overlap between the anoxic and the heat
            responses was observed by whole-genome microarray analysis.
  - term:
      id: GO:0042542
      label: response to hydrogen peroxide
    evidence_type: IEP
    original_reference_id: PMID:20089772
    review:
      summary: HSFA2 is induced by H2O2 which triggers its activation under 
        anoxia.
      action: KEEP_AS_NON_CORE
      reason: PMID:20089772 shows H2O2 produced at onset of anoxia induces 
        HSFA2, and H2O2 treatment confers anoxia tolerance. HSFA2 is indeed 
        H2O2-responsive [deep-research], but this is NOT the core function. It's
        a regulatory input signal. Marking NON-CORE.
      supported_by:
        - reference_id: PMID:20089772
          supporting_text: Exogenous H 2 O 2 treatment induces HsfA2 and confers
            anoxia tolerance
  - term:
      id: GO:0034620
      label: cellular response to unfolded protein
    evidence_type: IEP
    original_reference_id: PMID:19244141
    review:
      summary: Expression pattern evidence from cytosolic unfolded protein 
        response study.
      action: KEEP_AS_NON_CORE
      reason: HSFA2 responds to unfolded protein stress as part of its general 
        role in proteostasis through HSP induction. However, this is downstream 
        of its primary heat stress memory function. The unfolded protein 
        response is a consequence/component of heat stress, not HSFA2's defining
        feature. NON-CORE.
      supported_by:
        - reference_id: PMID:19244141
          supporting_text: The cytosolic protein response as a subcomponent of 
            the wider heat shock response in Arabidopsis.
  - term:
      id: GO:0034620
      label: cellular response to unfolded protein
    evidence_type: IMP
    original_reference_id: PMID:19244141
    review:
      summary: Mutant phenotype evidence for role in unfolded protein response.
      action: KEEP_AS_NON_CORE
      reason: Same as IEP annotation above - this is a component of the broader 
        heat stress response but not HSFA2's defining core function. NON-CORE.
      supported_by:
        - reference_id: PMID:19244141
          supporting_text: The cytosolic protein response as a subcomponent of 
            the wider heat shock response in Arabidopsis.
  - term:
      id: GO:0009408
      label: response to heat
    evidence_type: IEP
    original_reference_id: PMID:15247379
    review:
      summary: Expression pattern evidence from tomato HsfA2 study (ortholog).
      action: KEEP_AS_NON_CORE
      reason: Cross-species evidence from tomato. Third instance of GO:0009408. 
        Same issue - too general to capture HSFA2's specific MEMORY role. 
        NON-CORE.
      supported_by:
        - reference_id: PMID:15247379
          supporting_text: Jul 9. Role of Hsp17.4-CII as coregulator and 
            cytoplasmic retention factor of tomato heat stress transcription 
            factor HsfA2.
  - term:
      id: GO:0003700
      label: DNA-binding transcription factor activity
    evidence_type: ISS
    original_reference_id: PMID:11118137
    review:
      summary: Sequence similarity evidence from genome-wide transcription 
        factor analysis.
      action: ACCEPT
      reason: ISS (inferred from sequence similarity) annotation based on 
        conserved HSF domain. Consistent with all other TF activity annotations.
        CORE molecular function.
      supported_by:
        - reference_id: PMID:11118137
          supporting_text: 'Arabidopsis transcription factors: genome-wide comparative
            analysis among eukaryotes.'
