  - term:
      id: GO:0034605
      label: cellular response to heat
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSFA2 participates in the cellular response to heat, but the broad
        heat-response term should be treated as non-core relative to the better
        supported acquired thermotolerance and thermomemory annotations.
      action: KEEP_AS_NON_CORE
      reason: The broad cellular response to heat term is not wrong because HSFA2
        is heat inducible and contributes to heat-stress transcriptional programs.
        It should not be replaced wholesale by heat acclimation here, because this
        IBA annotation does not itself establish the more specific acquired-memory
        process. Retain it as a broad, non-core heat-response annotation.
      additional_reference_ids:
        - file:ARATH/AT2G26150/AT2G26150-deep-research-perplexity.md
        - file:ARATH/AT2G26150/AT2G26150-notes.md
