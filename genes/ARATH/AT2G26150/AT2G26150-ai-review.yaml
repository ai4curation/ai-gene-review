id: O80982
gene_symbol: HSFA2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: Heat-inducible transcription factor that functions downstream of
  HSFA1 to amplify heat-stress transcription and extend acquired thermotolerance
  during recovery from heat stress. HSFA2 binds heat shock elements in target
  promoters, activates stress-protective genes such as APX2 and heat shock
  protein genes, and participates in chromatin-level thermomemory circuits
  including the REF6-HSFA2 feedback loop described for transgenerational heat
  acclimation. Distinct from constitutively expressed HSFA1 master regulators,
  HSFA2 is strongly heat inducible and is especially important for acquired and
  sustained thermotolerance rather than basal heat tolerance.
existing_annotations:
  - term:
      id: GO:0003700
      label: DNA-binding transcription factor activity
    evidence_type: IBA
    original_reference_id: GO_REF:0000033
    review:
      summary: HSFA2 is a bona fide transcription factor with DNA-binding 
        activity specific for heat shock elements (HSE) with consensus sequence 
        AGAAnnTTCT. This is a core molecular function supported by phylogenetic 
        inference and extensive experimental evidence.
      action: ACCEPT
      reason: This annotation correctly captures HSFA2's core molecular function
        as a DNA-binding transcription factor. The IBA evidence is supported by 
        multiple experimental studies showing direct DNA binding to HSE 
        sequences [PMID:19352026]. HSFA2 contains a conserved DNA-binding domain
        with helix-turn-helix motif characteristic of HSF family members 
        [deep-research]. This is a CORE function.
      additional_reference_ids:
        - PMID:19352026
      supported_by:
        - reference_id: PMID:19352026
          supporting_text: "Electrophoretic mobility shift assay demonstrated that
            the increase in protein complex formation onto the HSE was markedly suppressed
            during high-light stress and recovery from the stress in knockout HsfA2
            plants"
        - reference_id: file:ARATH/AT2G26150/AT2G26150-deep-research-perplexity.md
          supporting_text: HSFA2 functions fundamentally as a transcriptional
            activator that binds to heat shock element sequences in the promoters
            of target genes to modulate their expression
