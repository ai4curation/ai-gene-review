id: F4HVY0
gene_symbol: CER1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: Very-long-chain aldehyde decarbonylase that catalyzes the conversion of very-long-chain fatty aldehydes to alkanes through an oxidative decarbonylation reaction. Core component of the alkane biosynthetic pathway in cuticular wax formation, working in a multiprotein complex with CER3 and cytochrome b5 isoforms at the endoplasmic reticulum membrane. Specifically expressed in epidermis of aerial organs and essential for cuticle formation, drought tolerance, and pollen fertility.
existing_annotations:
- term:
    id: GO:0005506
    label: iron ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: CER1 contains tripartite histidine-rich motifs (HX3H+HX2HH+HX2HH) that coordinate a di-iron catalytic center essential for aldehyde decarbonylase activity. The di-iron center is characteristic of the sterol desaturase family to which CER1 belongs.
    action: ACCEPT
    reason: This annotation correctly captures CER1's iron ion binding through its conserved histidine-rich motifs that coordinate the di-iron active site. This is a core molecular function essential for catalytic activity.
    supported_by:
    - reference_id: PMID:22773744
      supporting_text: Site-directed mutagenesis showed that CER1 His clusters are essential for alkane synthesis, whereas those of CER3 are not, suggesting that CYTB5s are specific CER1 cofactors
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 contains essential His-rich motifs consistent with a di-iron catalytic center
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 His→Ala mutants lose alkane synthesis but still interact with CER3, indicating these residues are catalytic rather than structural for complex assembly
- term:
    id: GO:0005789
    label: endoplasmic reticulum membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: CER1 is a multi-pass transmembrane protein localized to the endoplasmic reticulum membrane where cuticular wax biosynthesis occurs. This localization is essential for CER1 function in the alkane-forming pathway.
    action: ACCEPT
    reason: Correct cellular localization. CER1 is an integral ER membrane protein and this is where it performs its aldehyde decarbonylase function as part of the wax biosynthesis machinery.
    supported_by:
    - reference_id: PMID:22773744
      supporting_text: CER1 protein located to the endoplasmic reticulum ( ER ), where wax biosynthesis takes place
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 is experimentally supported to be **ER-localized**, colocalizing with CYTB5 isoforms at the ER, consistent with its role in wax precursor synthesis prior to export to the cuticle
- term:
    id: GO:0008610
    label: lipid biosynthetic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Lipid biosynthetic process is a broad parent of the specific biological processes GO:0010025 (wax biosynthetic process) and GO:0043447 (alkane biosynthetic process), both already annotated with experimental evidence. Cuticular wax alkanes are surface lipids, so the term is not incorrect, but it is far less informative than the specific terms.
    action: MARK_AS_OVER_ANNOTATED
    reason: Redundant generic parent of the specific and correctly supported biological process terms (wax/alkane biosynthetic process).
    supported_by:
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 functions in the conversion of **VLC aldehydes to VLC alkanes** (one carbon shorter), i.e., the **decarbonylation step**
- term:
    id: GO:0016491
    label: oxidoreductase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Oxidoreductase activity is a broad parent of the specific molecular function GO:0071771 (aldehyde oxygenase (deformylating) activity), which is already annotated. The CER1 reaction is redox-dependent and consumes NADPH and O2, so this term is not incorrect, but it is far less informative than the specific decarbonylase activity.
    action: MARK_AS_OVER_ANNOTATED
    reason: Redundant generic parent of the specific and correct molecular function GO:0071771. The decarbonylation reaction is redox-coupled (NADPH/O2-dependent), but the specific term better captures the actual catalysis.
    supported_by:
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        coexpression of CYTB5 enhances alkane output in yeast—supporting CYTB5 as an **electron-transfer cofactor** for CER1 decarbonylation
- term:
    id: GO:0016829
    label: lyase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: Lyase activity is a generic parent derived from the UniProt Lyase keyword (EC class 4). The specific molecular function GO:0071771 (aldehyde oxygenase (deformylating) activity, EC 4.1.99.5) is already annotated and is far more informative.
    action: MARK_AS_OVER_ANNOTATED
    reason: Redundant generic parent of the specific and correct molecular function GO:0071771. Note that GO_REF:0000043 (SwissProt keyword mapping) annotations have been retired by GOA for cellular organisms; this term adds no specific information.
- term:
    id: GO:0071771
    label: aldehyde oxygenase (deformylating) activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: This is the precise core molecular function of CER1. It catalyzes the oxidative decarbonylation of a very-long-chain fatty aldehyde to an alkane that is one carbon shorter, plus formate (EC 4.1.99.5; RHEA:21440), consistent with the UniProt catalytic activity record. This term is more informative than the generic parent terms GO:0016491 (oxidoreductase activity) and GO:0016829 (lyase activity) also present in GOA.
    action: ACCEPT
    reason: Accurately captures the specific enzymatic reaction catalyzed by CER1 and represents its core molecular function. Strongly supported by genetic and yeast-reconstitution evidence.
    supported_by:
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 functions in the conversion of **VLC aldehydes to VLC alkanes** (one carbon shorter), i.e., the **decarbonylation step**
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 is best supported as the **catalytic decarbonylase** component of an ER-localized alkane-synthesis complex.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:38456566
  review:
    summary: |-
      The generic protein binding term is uninformative. The IPI annotation cites an interaction with the wound-induced P450 CYP96A4 (AT5G52320); PMID:38456566 reports that CYP96A4 interacts with CER1 and CER3 and functions as a cofactor of the alkane synthesis complex. CER1's other documented interactions are with CER3 and with cytochrome b5 isoforms (CYTB5-B/-C/-D/-E) to form the very-long-chain alkane synthesis complex (PMID:22773744). All of these are heterocomplex/partner interactions rather than a defined informative molecular function, and the generic protein binding term does not capture the catalytic role; CER1's informative molecular function is already annotated as GO:0071771 (aldehyde oxygenase (deformylating) activity).
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:38456566
      supporting_text: CYP96A4 interacted with CER1 and CER3, the core enzymes in the alkane-forming pathway associated with wax biosynthesis
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        CER1 physically interacts with CER3 and ER-localized cytochrome b5 isoforms; CER1/CER3 coexpression is mandatory for alkane production in yeast
    reason: The generic protein binding term is uninformative and over-annotated. The underlying IPI interaction (CER1-CYP96A4) and the documented CER1-CER3/CYTB5 complex interactions are heterocomplex associations, not a specific molecular function; CER1's informative molecular function is already captured by GO:0071771. UniProt also records CER1 as a homodimer (PMID:22773744), but no verbatim self-interaction evidence is available in the cached sources to justify proposing GO:0042803 here.
