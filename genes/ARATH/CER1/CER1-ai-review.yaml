  evidence_type: IMP
  original_reference_id: PMID:1847001
  review:
    summary: |-
      This annotation duplicates the wax biosynthetic process annotation (above) but cites PMID:1847001, which is an unrelated publication about chrysotile asbestos and health in Zimbabwe. This is a mislabeled/erroneous reference in the source GOA (TAIR) and the cited paper provides no support for any CER1 function. The underlying GO term (wax biosynthetic process) is itself correct for CER1 and is already accepted via the properly referenced PMID:8718622 annotation.
    action: UNDECIDED
    reason: The cited reference (PMID:1847001) is an unrelated asbestos epidemiology paper and cannot support this annotation. The annotation is a redundant, mis-referenced duplicate of the PMID:8718622-supported wax biosynthetic process annotation; the reference error should be corrected at source.
core_functions:
- description: |-
    Iron-dependent aldehyde oxygenase (deformylating) / very-long-chain aldehyde decarbonylase. CER1 catalyzes the oxidative decarbonylation of very-long-chain fatty aldehydes (preferentially C28-C32, often a C30 precursor) to odd-chain alkanes one carbon shorter (e.g., C29), plus formate, consuming NADPH and O2 (EC 4.1.99.5; RHEA:21440). This is the committed alkane-forming step of cuticular wax biosynthesis. CER1 acts as an integral endoplasmic reticulum membrane protein, using a His-coordinated di-iron catalytic center, and functions within a complex with the acyl-CoA reductase CER3 (which supplies the aldehyde substrate) and cytochrome b5 isoforms (CYTB5-B/-C/-D/-E) that serve as electron-transfer cofactors.
  molecular_function:
