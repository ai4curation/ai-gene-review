- term:
    id: GO:0160062
    label: cutin-based cuticle development
  evidence_type: IMP
  original_reference_id: PMID:8718622
  review:
    summary: CER1 contributes to the formation of the cuticle by supplying very-long-chain alkanes, the major wax component of the epicuticular layer. Loss of CER1 disrupts wax crystal deposition on aerial surfaces. CER1 acts in wax (alkane) biosynthesis rather than cutin polyester synthesis per se, so this broader cuticle-development term is retained as a valid but non-core developmental context.
    action: KEEP_AS_NON_CORE
    supported_by:
    - reference_id: PMID:8718622
      supporting_text: Molecular characterization of the CER1 gene of arabidopsis involved in epicuticular wax biosynthesis and pollen fertility.
    - reference_id: file:ARATH/CER1/CER1-deep-research-falcon.md
      supporting_text: |-
        cer1 mutants are wax-deficient/waxless, have strongly reduced or trace alkane levels, altered wax crystal deposition, increased aldehydes, and can show male sterility due to defective pollen coat formation
    reason: Cuticle development is a downstream developmental outcome of CER1-mediated wax alkane biosynthesis; retained as non-core context, as CER1's direct, core role is the enzymatic alkane biosynthesis step.
