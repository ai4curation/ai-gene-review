id: O48814
gene_symbol: BIK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: BIK1 (BOTRYTIS-INDUCED KINASE 1) is a plasma membrane-anchored
  receptor-like cytoplasmic kinase (RLCK subfamily VII) of Arabidopsis thaliana and a
  catalytically active dual-specificity Ser/Thr protein kinase (EC 2.7.11.1). It is
  tethered to the inner leaflet of the plasma membrane via N-terminal myristoylation
  (Gly-2) and palmitoylation (Cys-4), where it constitutively associates with
  pattern-recognition receptor (PRR) complexes such as FLS2-BAK1, EFR-BAK1, PEPR1 and
  MIK2. Upon perception of pathogen-/damage-associated molecular patterns (PAMPs/DAMPs,
  e.g. flg22, elf18, AtPep1, SCOOP peptides), BIK1 is rapidly trans-phosphorylated in a
  BAK1- and PRR-dependent manner, dissociates from the receptor complex, and relays
  immune signaling by directly phosphorylating downstream substrates. Key substrates
  include the NADPH oxidase RBOHD (driving the apoplastic reactive oxygen species burst
  in a calcium-independent manner) and the calcium-permeable channel OSCA1.3 (promoting
  cytosolic Ca2+ influx and stomatal closure). BIK1 thereby functions as a central
  convergence node of PAMP-triggered immunity (PTI), controlling the ROS burst, calcium
  signaling, stomatal immunity, and defense against bacterial and fungal pathogens. A
  pool of activated, phosphorylated BIK1 relocates to the nucleus where it phosphorylates
  WRKY transcription factors to regulate jasmonic acid and salicylic acid defense-hormone
  homeostasis, and a portion is internalized into endosomes following ligand-induced
  monoubiquitination. BIK1 activity is tightly tuned by the phosphatase PP2C38, the
  calcium-dependent kinase CPK28 (turnover), and the MAP4K SIK1 (stabilization), and is
  inactivated by the Xanthomonas effector AvrAC/XopAC via uridylylation of activation-loop
  residues. Beyond immunity, BIK1 negatively regulates brassinosteroid signaling (via
  BRI1), modulates ethylene signaling (via EIN3), and contributes to growth and
  developmental processes (root hair growth, leaf and inflorescence architecture via
  ERECTA), reflecting its role in the growth-defense tradeoff.
existing_annotations:
- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: BIK1 is a catalytically active protein kinase; this InterPro-based
      electronic annotation is correct but less specific than the experimentally
      supported Ser/Thr kinase terms.
    action: MODIFY
    reason: Correct but general. BIK1 is a proven Ser/Thr (dual-specificity) protein
      kinase (EC 2.7.11.1); the more specific term protein serine/threonine kinase
      activity is preferred and is independently supported by experimental annotations.
    proposed_replacement_terms:
    - id: GO:0004674
      label: protein serine/threonine kinase activity
    supported_by:
    - reference_id: PMID:24104392
      supporting_text: "we identified nineteen in vitro autophosphorylation sites of
        BIK1 including three phosphotyrosine sites, thereby proving BIK1 is a
        dual-specificity kinase for the first time."
- term:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Electronic EC-based annotation of Ser/Thr protein kinase activity; correct
      and a core molecular function of BIK1.
    action: ACCEPT
    reason: BIK1 is an experimentally validated Ser/Thr protein kinase (EC 2.7.11.1)
      that phosphorylates RBOHD, OSCA1.3, FLS2, BAK1 and WRKY transcription factors. The
      electronic EC mapping correctly captures the core catalytic function.
    supported_by:
    - reference_id: PMID:32846426
      supporting_text: "This phosphorylation is dependent on BIK1 kinase activity, since
        a kinase-dead variant, GST–BIK1(KD), did not phosphorylate OSCA1.3-loop1"
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ATP binding is required for BIK1 kinase catalysis; supported by a defined
      ATP-binding site and an ATP-binding Lys-105 whose mutation abolishes activity.
    action: ACCEPT
    reason: BIK1 has a canonical protein kinase ATP-binding pocket (Gly-rich loop
      73-81, catalytic Lys-105). Mutation of Lys-105 (with Lys-106) gives a kinase-dead
      enzyme, confirming functional ATP binding. Standard supporting MF for an active
      kinase.
    supported_by:
    - reference_id: file:ARATH/BIK1/BIK1-notes.md
      supporting_text: "ATP-binding Lys-105; active-site (proton acceptor) Asp-202."
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Nuclear localization is supported by a focused study showing
      activation-dependent relocation of BIK1 to the nucleus; this electronic
      subcellular-location annotation is corroborated experimentally.
    action: ACCEPT
    reason: A pool of phosphorylated/activated BIK1 moves to the nucleus and
      phosphorylates WRKY transcription factors. Although BIK1 is predominantly plasma
      membrane-anchored, nuclear localization is a genuine, mechanistically defined
      secondary location.
    supported_by:
    - reference_id: PMID:29649442
      supporting_text: "BIK1 also localizes to the nucleus and interacts directly with
        WRKY transcription factors involved in the JA and salicylic acid (SA)
        regulation."
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Plasma membrane is the principal location of BIK1; this electronic
      annotation is strongly supported by lipid-anchoring and multiple focused studies.
    action: ACCEPT
    reason: BIK1 is myristoylated (Gly-2) and palmitoylated (Cys-4) and resides at the
      plasma membrane where it associates with PRR complexes. Core location for its
      immune signaling function.
    supported_by:
    - reference_id: PMID:16339855
      supporting_text: "BIK1 is membrane-localized, suggesting possible involvement in
        early stages of the recognition or transduction of pathogen response."
- term:
    id: GO:0010008
    label: endosome membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: BIK1 is internalized into endocytic compartments after ligand-induced
      monoubiquitination; endosome membrane localization is experimentally supported.
    action: KEEP_AS_NON_CORE
    reason: Endosomal localization reflects ligand-induced internalization of BIK1 with
      FLS2, a regulated trafficking step downstream of activation rather than the primary
      site of catalytic immune signaling.
    supported_by:
    - reference_id: file:ARATH/BIK1/BIK1-notes.md
      supporting_text: "supported by ligand-induced internalization study"
- term:
    id: GO:0106310
    label: protein serine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000116
  qualifier: enables
  review:
    summary: Rhea/EC-based electronic annotation of protein serine kinase activity;
      consistent with experimentally proven BIK1 catalytic activity.
    action: ACCEPT
    reason: BIK1 phosphorylates serine residues on substrates such as RBOHD (S39/S339/
      S343) and OSCA1.3 (S54). The electronic annotation correctly captures part of the
      core kinase activity; it is independently supported by EXP annotations.
    supported_by:
    - reference_id: PMID:32846426
      supporting_text: "BIK1 predominantly phosphorylates S54"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:20018686
  qualifier: enables
  review:
    summary: Bare protein binding from the BIK1-FLS2/BAK1 interaction study;
      uninformative as a molecular function although the interaction itself is real and
      central.
    action: MARK_AS_OVER_ANNOTATED
    reason: "Per curation guidelines, bare GO:0005515 protein binding is uninformative.
      The underlying interaction (BIK1 associating with and trans-phosphorylating the
      FLS2/BAK1 receptor complex) is genuine and is captured by the kinase activity MF
      and the PRR signaling BP terms; the bare binding term should not be treated as a
      core function."
    supported_by:
    - reference_id: PMID:20018686
      supporting_text: "BIK1 associates with FLS2 and BAK1 in vivo and in vitro. BIK1
        is phosphorylated by BAK1, and BIK1 also directly phosphorylates BAK1 and FLS2
        in vitro."
- term:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  evidence_type: TAS
  original_reference_id: PMID:30584105
  qualifier: enables
  review:
    summary: Traceable assertion of Ser/Thr protein kinase activity; correct and a core
      molecular function of BIK1.
    action: ACCEPT
    reason: BIK1 is an experimentally validated Ser/Thr protein kinase. This is one of
      several annotations capturing the core catalytic function and is well supported.
    supported_by:
    - reference_id: PMID:24104392
      supporting_text: "Arabidopsis BOTRYTIS-INDUCED KINASE1 (BIK1) is a receptor-like
        cytoplasmic kinase acting early in multiple signaling pathways important for
        plant growth and innate immunity."
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: EXP
  original_reference_id: PMID:26021844
  qualifier: located_in
  review:
    summary: Experimental support for plasma membrane localization via myristoylation
      at Gly-2; core location.
    action: ACCEPT
    reason: This study mapped N-myristoylation at Gly-2 and showed that Gly-2 mutation
      drastically reduces plasma membrane localization, directly demonstrating
      lipid-anchored PM residence. Core to BIK1 function.
    supported_by:
    - reference_id: file:ARATH/BIK1/BIK1-notes.md
      supporting_text: "Drastic reduction of plasma membrane localization and strong
        increase of cytoplasmic localization."
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: EXP
  original_reference_id: PMID:32404997
  qualifier: located_in
  review:
    summary: Experimental support for plasma membrane localization where BIK1 resides
      with FLS2 before ligand-induced internalization; core location.
    action: ACCEPT
    reason: BIK1 is monoubiquitinated and internalized from the plasma membrane upon
      flg22 perception, establishing the PM as the resting site of BIK1 within the
      receptor complex. Core location.
    supported_by:
    - reference_id: PMID:32404997
      supporting_text: "Ligand-induced monoubiquitination of BIK1 regulates plant
        immunity."
- term:
    id: GO:0010008
    label: endosome membrane
  evidence_type: EXP
  original_reference_id: PMID:32404997
  qualifier: located_in
  review:
    summary: Experimentally supported endosome membrane localization following
      ligand-induced internalization; a regulated downstream trafficking step.
    action: KEEP_AS_NON_CORE
    reason: BIK1 internalizes into endocytic compartments after monoubiquitination upon
      flg22 perception. Real but a downstream regulatory localization, not the primary
      site of signaling activity.
    supported_by:
    - reference_id: PMID:32404997
      supporting_text: "Ligand-induced monoubiquitination of BIK1 regulates plant
        immunity."
- term:
    id: GO:0106310
    label: protein serine kinase activity
  evidence_type: EXP
  original_reference_id: PMID:24104392
  qualifier: enables
  review:
    summary: Experimentally demonstrated protein serine kinase activity (and
      dual-specificity autophosphorylation); core molecular function.
    action: ACCEPT
    reason: This study profiled BIK1 autophosphorylation, demonstrating serine
      phosphorylation activity and establishing BIK1 as a dual-specificity kinase. Core
      catalytic function.
    supported_by:
    - reference_id: PMID:24104392
      supporting_text: "we identified nineteen in vitro autophosphorylation sites of
        BIK1 including three phosphotyrosine sites, thereby proving BIK1 is a
        dual-specificity kinase for the first time."
- term:
    id: GO:0106310
    label: protein serine kinase activity
  evidence_type: EXP
  original_reference_id: PMID:32846426
  qualifier: enables
  review:
    summary: Experimentally demonstrated serine kinase activity toward OSCA1.3 (S54);
      core molecular function.
    action: ACCEPT
    reason: BIK1 directly phosphorylates the OSCA1.3 channel at Ser-54 in a
      kinase-activity-dependent manner, directly demonstrating protein serine kinase
      activity on a physiological substrate. Core catalytic function.
    supported_by:
    - reference_id: PMID:32846426
      supporting_text: "BIK1 predominantly phosphorylates S54"
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:31803215
  qualifier: enables
  review:
    summary: Bare protein binding from the BIK1-ERECTA developmental study;
      uninformative MF although the interaction (and phosphorylation of ER) is real.
    action: MARK_AS_OVER_ANNOTATED
    reason: "Bare GO:0005515 is uninformative. The specific relationship (BIK1 interacts
      with and phosphorylates ERECTA-family RLKs in leaf/inflorescence development) is a
      genuine kinase-substrate interaction captured by the kinase MF; the bare binding
      term is not a core function."
    supported_by:
    - reference_id: PMID:31803215
      supporting_text: "BIK1 interacts with ER-family proteins and directly
        phosphorylates ER."
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: HDA
  original_reference_id: PMID:15610358
  qualifier: located_in
  review:
    summary: Nucleus from a generic high-throughput GFP-ORF screen; the location is
      independently corroborated by a focused activation-dependent study so it is
      retained.
    action: KEEP_AS_NON_CORE
    reason: This HDA call comes from a generic GFP-ORF overexpression localization
      screen rather than a focused BIK1 study, but nuclear localization is independently
      supported (PMID:29649442) as a regulated, activation-dependent secondary location.
    supported_by:
    - reference_id: PMID:29649442
      supporting_text: "BIK1 also localizes to the nucleus and interacts directly with
        WRKY transcription factors"
- term:
    id: GO:0005730
    label: nucleolus
  evidence_type: HDA
  original_reference_id: PMID:15610358
  qualifier: located_in
  review:
    summary: Nucleolar localization derives only from a generic GFP-ORF overexpression
      screen and is not substantiated by any focused BIK1 study; likely an
      over-annotation.
    action: MARK_AS_OVER_ANNOTATED
    reason: "The nucleolus call comes from a high-throughput GFP-ORF transient
      overexpression screen that classified proteins into broad categories including
      nucleolar. It is biologically implausible for a myristoylated/palmitoylated,
      membrane-anchored immune kinase and is not corroborated by any dedicated BIK1
      study (focused work supports plasma membrane, nucleus and endosomes only)."
    supported_by:
    - reference_id: PMID:15610358
      supporting_text: "These patterns have been classified into five main categories,
        including cytoplasmic, nuclear, nucleolar, organellar and endomembrane
        compartments."
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: HDA
  original_reference_id: PMID:15610358
  qualifier: located_in
  review:
    summary: Cytoplasm from a generic GFP-ORF overexpression screen; weakly supported
      and likely an artifact of overexpression, kept as non-core.
    action: KEEP_AS_NON_CORE
    reason: The cytoplasmic HDA call is from a generic overexpression localization
      screen. A cytoplasmic pool can appear when membrane targeting (myristoylation/
      palmitoylation) is overwhelmed or disrupted (e.g. Gly-2 mutation increases
      cytoplasmic signal), so it is biologically plausible but not a core functional
      location; retained as non-core.
    supported_by:
    - reference_id: file:ARATH/BIK1/BIK1-notes.md
      supporting_text: "strong increase of cytoplasmic localization"
