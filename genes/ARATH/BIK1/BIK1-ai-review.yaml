suggested_questions:
- question: What determines the partitioning of BIK1 between the plasma membrane,
    nucleus, and endosomes, and how is the activation-dependent nuclear pool sized and
    timed relative to the ROS/Ca2+ outputs at the membrane?
  experts:
  - Plant immune signaling researchers
  - Cell biologists
- question: How is substrate specificity of BIK1 (RBOHD vs OSCA1.3 vs WRKYs vs receptor
    kinases) encoded, given its many phosphorylation sites and dual-specificity activity?
  experts:
  - Plant kinase biochemists
  - Structural biologists
- question: To what extent are BIK1's developmental roles (root hair growth, leaf/
    inflorescence architecture via ERECTA, BR signaling via BRI1) separable from its
    immune signaling function in the growth-defense tradeoff?
  experts:
  - Plant developmental biologists
suggested_experiments:
- hypothesis: BIK1 nuclear relocation is required specifically for hormone-branch
    immunity but dispensable for the membrane ROS/Ca2+ burst.
  description: Engineer nuclear-excluded (membrane-tethered) and constitutively nuclear
    BIK1 variants and quantify the ROS burst, Ca2+ influx, stomatal closure, JA/SA
    levels, and bacterial resistance for each, separating membrane from nuclear outputs.
- hypothesis: Distinct BIK1 phosphosites gate distinct downstream substrates.
  description: Systematically combine activation-loop and Tyr phosphosite mutants with in
    vitro and in vivo phosphorylation assays against RBOHD, OSCA1.3, FLS2/BAK1 and WRKY
    substrates to map a site-to-substrate code.
