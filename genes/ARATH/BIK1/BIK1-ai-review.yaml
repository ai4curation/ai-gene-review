  title: Ligand-induced monoubiquitination of BIK1 regulates plant immunity.
  findings: []
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: "DOI resolves to Ma et al. 2020 Nature (= PMID:32404997, also in
      this reference list). Establishes flg22-induced monoubiquitination of BIK1 by
      ATL44/RHA3A and ATL45/RHA3B, dissociation from FLS2 complex, internalization into
      endosomes, and requirement for ROS and antibacterial immunity."
- id: PMID:15610358
  title: High-throughput protein localization in Arabidopsis using Agrobacterium-mediated
    transient expression of GFP-ORF fusions.
  findings: []
  reference_review:
    relevance: LOW
    correctness: VERIFIED
    review_notes: "PubMed-verified high-throughput GFP-ORF transient-expression
      localization screen of 155 fusion proteins (cytoplasmic/nuclear/nucleolar/
      organellar/endomembrane categories). Generic overexpression assay that bypasses
      native N-myristoylation/palmitoylation membrane targeting; source of the
      cytoplasm/nucleus/nucleolus HDA annotations. The nucleolus call is not
      substantiated by any focused BIK1 study and is biologically implausible for a
      membrane-anchored kinase."
