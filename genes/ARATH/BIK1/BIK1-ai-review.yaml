id: O48814
gene_symbol: BIK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: BIK1 (BOTRYTIS-INDUCED KINASE 1) is a plasma membrane-anchored
  receptor-like cytoplasmic kinase (RLCK subfamily VII) of Arabidopsis thaliana and a
  catalytically active dual-specificity Ser/Thr protein kinase (EC 2.7.11.1). It is
  tethered to the inner leaflet of the plasma membrane via N-terminal myristoylation
  (Gly-2) and palmitoylation (Cys-4), where it constitutively associates with
  pattern-recognition receptor (PRR) complexes such as FLS2-BAK1, EFR-BAK1, PEPR1 and
  MIK2. Upon perception of pathogen-/damage-associated molecular patterns (PAMPs/DAMPs,
  e.g. flg22, elf18, AtPep1, SCOOP peptides), BIK1 is rapidly trans-phosphorylated in a
  BAK1- and PRR-dependent manner, dissociates from the receptor complex, and relays
  immune signaling by directly phosphorylating downstream substrates. Key substrates
  include the NADPH oxidase RBOHD (driving the apoplastic reactive oxygen species burst
  in a calcium-independent manner) and the calcium-permeable channel OSCA1.3 (promoting
  cytosolic Ca2+ influx and stomatal closure). BIK1 thereby functions as a central
  convergence node of PAMP-triggered immunity (PTI), controlling the ROS burst, calcium
  signaling, stomatal immunity, and defense against bacterial and fungal pathogens. A
  pool of activated, phosphorylated BIK1 relocates to the nucleus where it phosphorylates
  WRKY transcription factors to regulate jasmonic acid and salicylic acid defense-hormone
  homeostasis, and a portion is internalized into endosomes following ligand-induced
  monoubiquitination. BIK1 activity is tightly tuned by the phosphatase PP2C38, the
  calcium-dependent kinase CPK28 (turnover), and the MAP4K SIK1 (stabilization), and is
  inactivated by the Xanthomonas effector AvrAC/XopAC via uridylylation of activation-loop
  residues. Beyond immunity, BIK1 negatively regulates brassinosteroid signaling (via
  BRI1), modulates ethylene signaling (via EIN3), and contributes to growth and
  developmental processes (root hair growth, leaf and inflorescence architecture via
  ERECTA), reflecting its role in the growth-defense tradeoff.
