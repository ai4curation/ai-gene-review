id: O48814
gene_symbol: BIK1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: BIK1 (BOTRYTIS-INDUCED KINASE 1) is a plasma membrane-anchored
  receptor-like cytoplasmic kinase (RLCK subfamily VII) of Arabidopsis thaliana and a
  catalytically active dual-specificity Ser/Thr protein kinase (EC 2.7.11.1). It is
  tethered to the inner leaflet of the plasma membrane via N-terminal myristoylation
  (Gly-2) and palmitoylation (Cys-4), where it constitutively associates with
  pattern-recognition receptor (PRR) complexes such as FLS2-BAK1, EFR-BAK1, PEPR1 and
  MIK2. Upon perception of pathogen-/damage-associated molecular patterns (PAMPs/DAMPs,
  e.g. flg22, elf18, AtPep1, SCOOP peptides), BIK1 is rapidly trans-phosphorylated in a
  BAK1- and PRR-dependent manner, dissociates from the receptor complex, and relays
  immune signaling by directly phosphorylating downstream substrates. Key substrates
  include the NADPH oxidase RBOHD (driving the apoplastic reactive oxygen species burst
  in a calcium-independent manner) and the calcium-permeable channel OSCA1.3 (promoting
  cytosolic Ca2+ influx and stomatal closure). BIK1 thereby functions as a central
  convergence node of PAMP-triggered immunity (PTI), controlling the ROS burst, calcium
  signaling, stomatal immunity, and defense against bacterial and fungal pathogens. A
  pool of activated, phosphorylated BIK1 relocates to the nucleus where it phosphorylates
  WRKY transcription factors to regulate jasmonic acid and salicylic acid defense-hormone
  homeostasis, and a portion is internalized into endosomes following ligand-induced
  monoubiquitination. BIK1 activity is tightly tuned by the phosphatase PP2C38, the
  calcium-dependent kinase CPK28 (turnover), and the MAP4K SIK1 (stabilization), and is
  inactivated by the Xanthomonas effector AvrAC/XopAC via uridylylation of activation-loop
  residues. Beyond immunity, BIK1 negatively regulates brassinosteroid signaling (via
  BRI1), modulates ethylene signaling (via EIN3), and contributes to growth and
  developmental processes (root hair growth, leaf and inflorescence architecture via
  ERECTA), reflecting its role in the growth-defense tradeoff.
existing_annotations:
- term:
    id: GO:0004672
    label: protein kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: BIK1 is a catalytically active protein kinase; this InterPro-based
      electronic annotation is correct but less specific than the experimentally
      supported Ser/Thr kinase terms.
    action: MODIFY
    reason: Correct but general. BIK1 is a proven Ser/Thr (dual-specificity) protein
      kinase (EC 2.7.11.1); the more specific term protein serine/threonine kinase
      activity is preferred and is independently supported by experimental annotations.
    proposed_replacement_terms:
    - id: GO:0004674
      label: protein serine/threonine kinase activity
    supported_by:
    - reference_id: PMID:24104392
      supporting_text: "we identified nineteen in vitro autophosphorylation sites of
        BIK1 including three phosphotyrosine sites, thereby proving BIK1 is a
        dual-specificity kinase for the first time."
- term:
    id: GO:0004674
    label: protein serine/threonine kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: Electronic EC-based annotation of Ser/Thr protein kinase activity; correct
      and a core molecular function of BIK1.
    action: ACCEPT
    reason: BIK1 is an experimentally validated Ser/Thr protein kinase (EC 2.7.11.1)
      that phosphorylates RBOHD, OSCA1.3, FLS2, BAK1 and WRKY transcription factors. The
      electronic EC mapping correctly captures the core catalytic function.
    supported_by:
    - reference_id: PMID:32846426
      supporting_text: "This phosphorylation is dependent on BIK1 kinase activity, since
        a kinase-dead variant, GST–BIK1(KD), did not phosphorylate OSCA1.3-loop1"
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ATP binding is required for BIK1 kinase catalysis; supported by a defined
      ATP-binding site and an ATP-binding Lys-105 whose mutation abolishes activity.
    action: ACCEPT
    reason: BIK1 has a canonical protein kinase ATP-binding pocket (Gly-rich loop
      73-81, catalytic Lys-105). Mutation of Lys-105 (with Lys-106) gives a kinase-dead
      enzyme, confirming functional ATP binding. Standard supporting MF for an active
      kinase.
    supported_by:
    - reference_id: file:ARATH/BIK1/BIK1-notes.md
      supporting_text: "ATP-binding Lys-105; active-site (proton acceptor) Asp-202."
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Nuclear localization is supported by a focused study showing
      activation-dependent relocation of BIK1 to the nucleus; this electronic
      subcellular-location annotation is corroborated experimentally.
    action: ACCEPT
    reason: A pool of phosphorylated/activated BIK1 moves to the nucleus and
      phosphorylates WRKY transcription factors. Although BIK1 is predominantly plasma
      membrane-anchored, nuclear localization is a genuine, mechanistically defined
      secondary location.
    supported_by:
    - reference_id: PMID:29649442
      supporting_text: "BIK1 also localizes to the nucleus and interacts directly with
        WRKY transcription factors involved in the JA and salicylic acid (SA)
        regulation."
