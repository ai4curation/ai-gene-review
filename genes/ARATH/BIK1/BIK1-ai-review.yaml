core_functions:
- description: Acts as a dual-specificity (predominantly Ser/Thr) protein kinase that,
    upon trans-phosphorylation by BAK1 within ligand-activated PRR complexes, directly
    phosphorylates downstream immune substrates to relay PAMP-triggered immunity
    signaling.
  supported_by:
  - reference_id: PMID:20018686
    supporting_text: "BIK1 is likely first phosphorylated upon flagellin perception and
      subsequently transphosphorylates FLS2/BAK1 to propagate flagellin signaling."
  - reference_id: PMID:24104392
    supporting_text: "we identified nineteen in vitro autophosphorylation sites of BIK1
      including three phosphotyrosine sites, thereby proving BIK1 is a dual-specificity
      kinase for the first time."
  - reference_id: file:ARATH/BIK1/BIK1-deep-research-falcon.md
    supporting_text: "connecting PRR activation to early defense outputs such as reactive
      oxygen species"
