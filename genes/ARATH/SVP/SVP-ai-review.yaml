- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on on inter-ontology
    links
  findings:
  - statement: >-
      The negative-regulation-of-translation annotation is a logical consequence
      of the seeded GO:0000900 annotation. The local SVP evidence supports
      transcriptional repression, not translational repression; both the source
      annotation and this propagated inference should be flagged upstream to
      TAIR/GOA.
