core_functions:
- description: >-
    SVP is a nuclear RNA polymerase II-specific MADS-box DNA-binding
    transcription factor. It binds CArG-containing cis-regulatory regions and
    regulates transcription of flowering-time and floral developmental genes,
    with the strongest evidence for repression of targets such as FT and TFS1.
    This transcriptional repression explains SVP's role as a negative regulator
    of floral transition and as a component of ambient-temperature and
    vernalization-linked flowering control.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
