- description: >-
    SVP functions in MADS transcription factor complexes. Its K-box-containing
    architecture and experimental interaction evidence support protein
    dimerization, especially heteromeric interactions with MADS partners such as
    AP1, FLC, and FLM, which modulate floral regulator transcription in different
    developmental and environmental contexts.
