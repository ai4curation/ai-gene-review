proposed_new_terms:
- proposed_name: negative regulation of vegetative to reproductive phase transition of meristem
  proposed_definition: >-
    Any process that decreases the rate, frequency, or extent of the transition
    of a shoot apical meristem from vegetative to reproductive development.
  justification: >-
    SVP literature repeatedly describes repression of the floral transition,
    which is more specific than negative regulation of flower development but is
    not represented by a specific negative-regulation child term in the local GO
    cache.
  proposed_parent:
