taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SHORT VEGETATIVE PHASE (SVP/AGL22; At2g22540) encodes a nuclear MIKC-type
  MADS-box transcription factor in Arabidopsis thaliana. The protein has a
  conserved N-terminal MADS DNA-binding domain and a K-box domain typical of
  plant MADS transcription factors that form homo- and heteromeric regulatory
  complexes. The best-supported role of SVP is repression of the floral
  transition and early floral developmental programs through RNA polymerase
  II-dependent transcriptional regulation. SVP binds CArG-containing
  cis-regulatory regions at floral regulator genes such as FT and TFS1 and acts
  with partner MADS proteins, including FLC, FLM, and AP1, and with SEU/LUG
  corepressor-associated complexes in context-dependent transcriptional
  repression. Genetic and expression evidence place SVP in ambient-temperature,
  circadian/light, and vernalization-linked flowering-time networks, but these
  developmental and environmental phenotypes are downstream consequences of its
  core nuclear transcription factor activity rather than separate biochemical
  activities. No curated evidence in the local sources supports the seeded
  translation-repressor annotations.
