suggested_experiments:
- hypothesis: >-
    SVP splice isoforms differ in their ability to dimerize and repress
    flowering-time targets because isoform 2 lacks most of the K-box and
    C-terminal region.
  description: >-
    Express tagged SVP isoforms at comparable levels in svp mutant backgrounds,
    then compare flowering time rescue, nuclear localization, partner binding by
    reciprocal co-IP, and target occupancy at FT and TFS1 by ChIP-qPCR or
    CUT&RUN.
  experiment_type: isoform-rescue, interaction assay, and chromatin occupancy
- hypothesis: >-
    SVP-containing complexes use different partner combinations to repress
    distinct target loci in temperature, vernalization, and floral meristem
    contexts.
  description: >-
    Perform stage- and temperature-resolved SVP CUT&RUN with matched RNA-seq in
    wild type and flc, flm, ap1, and seu/lug-perturbed backgrounds to separate
    direct SVP targets by partner dependency and regulatory direction.
  experiment_type: chromatin profiling plus transcriptomics
