- description: >-
    IPGA1 cooperates with ANGUSTIFOLIA (AN) to regulate cortical microtubule organisation in
    response to mechanical stress, modulating pavement cell morphogenesis and interdigitation.
    IPGA1 forms granules on microtubules upon mechanical perturbation and interacts with
    the microtubule-severing enzyme KATANIN (KTN1) to regulate this process.
