core_functions:
- description: >-
    IPGA1 is a microtubule-associated protein that directly binds cortical microtubules via its
    N-terminal region. It negatively regulates microtubule ordering into parallel arrays, acting
    as a microtubule destabilizer. This microtubule binding activity underlies all of its roles
    in regulating anisotropic cell growth, petal morphogenesis, and pavement cell shape.
