id: Q8L7S5
gene_symbol: IPGA1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  IPGA1 (INCREASED PETAL GROWTH ANISOTROPY 1) is a microtubule-associated protein that negatively
  regulates cortical microtubule ordering and anisotropic cell expansion during late stages of petal
  development and pavement cell morphogenesis in Arabidopsis. IPGA1 directly binds to cortical
  microtubules via its N-terminal region and prevents their organization into parallel arrays oriented
  perpendicular to the axis of cell elongation, thereby limiting anisotropic cell growth. IPGA1
  cooperates with ANGUSTIFOLIA (AN) to regulate microtubule organisation in response to mechanical
  stress and modulates pavement cell interdigitation, likely in a KATANIN (KTN1)-dependent manner.
  Loss of function results in longer and narrower petals and cotyledons due to increased microtubule
  ordering and enhanced anisotropic cell expansion. The IPGA1 family is conserved among land plants.

