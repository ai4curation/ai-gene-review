- term:
    id: GO:0045727
    label: positive regulation of translation
  evidence_type: IMP
  original_reference_id: PMID:23439916
  review:
    summary: AtHsp101 supports HSA32 protein accumulation during recovery after heat
      treatment, but the evidence is narrower than a core translation-recovery role.
    action: KEEP_AS_NON_CORE
    reason: PMID:23439916 supports a post-transcriptional HSP101-HSA32 feedback
      loop that prolongs heat acclimation memory and suggests HSP101 may affect
      HSA32 synthesis or stability. The paper does not establish stress granule
      disassembly or broad translation recovery as a primary HSP101 function, so
      this existing annotation is retained as a non-core, context-specific process.
    supported_by:
    - reference_id: PMID:23439916
      supporting_text: Results of immunoblot analyses suggest that HSP101 enhances
        the translation of HSA32 during recovery after heat treatment, and in turn,
        HSA32 retards the decay of HSP101.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-notes.md
      supporting_text: "HSP101 enhances HSA32 translation/accumulation during recovery;
        HSA32 retards HSP101 decay. This is a feedback loop for long-term heat
        acclimation memory."
