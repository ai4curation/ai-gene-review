- term:
    id: GO:0043335
    label: protein unfolding
  evidence_type: IMP
  original_reference_id: PMID:15659638
  review:
    summary: This annotation describes protein unfolding as a biological process.
      However, AtHsp101's primary activity is protein disaggregation and refolding,
      not unfolding per se.
    action: MODIFY
    reason: While AtHsp101 does mechanically extract and unfold polypeptides during
      disaggregation, the term "protein unfolding" can imply the protein's primary
      role is to unfold native proteins. The better biological-process replacement
      is protein refolding, because the demonstrated outcome is recovery of aggregated
      heat-damaged proteins through the Hsp100/ClpB and sHsp/Hsp70 chaperone network.
    proposed_replacement_terms:
    - id: GO:0042026
      label: protein refolding
    supported_by:
    - reference_id: PMID:15659638
      supporting_text: substrate unfolding may be coupled to threading through the
        axial channel of the ClpB hexamer
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: The threading mechanism involves passage of unfolded substrate
        polypeptides through the central hexameric pore in a processive, directional
        manner. The actual extraction of individual polypeptides from aggregates involves
        continuous withdrawal of unfolded protein chains.
