- term:
    id: GO:0140545
    label: ATP-dependent protein disaggregase activity
  evidence_type: TAS
  original_reference_id: PMID:15659638
  review:
    summary: CLPB1/HSP101 is the Arabidopsis cytosolic Hsp100/ClpB AAA+ chaperone
      whose core molecular activity is ATP-dependent protein disaggregation.
    action: NEW
    reason: The current annotations include ATP binding and ATP hydrolysis but miss
      the more informative activity term that captures the Hsp100/ClpB disaggregase
      function. The Arabidopsis genetic evidence, domain analysis, and conserved ClpB
      mechanism support ATP-dependent extraction and remodeling of aggregated heat-damaged
      proteins during thermotolerance recovery.
    supported_by:
    - reference_id: PMID:15659638
      supporting_text: In addition, the strongest Class 2 suppressors restored solubility
        of aggregated small heat shock proteins (sHsps) after heat stress, revealing
        genetic interaction of the Hsp100/ClpB and sHsp chaperone systems.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-falcon.md
      supporting_text: The most strongly supported primary biochemical role of Arabidopsis
        HSP101 is as a protein disaggregase/remodeling chaperone that promotes recovery
        from heat damage.
- term:
    id: GO:0042026
    label: protein refolding
  evidence_type: TAS
  original_reference_id: PMID:15659638
  review:
    summary: AtHsp101 disaggregates heat-denatured protein aggregates, enabling
      downstream refolding by the cooperating chaperone network.
    action: NEW
    reason: While protein refolding is not currently annotated, HSP101's
      ATP-dependent disaggregase activity enables refolding outcomes by extracting
      or resolubilizing heat-damaged proteins for handling by Hsp70 and related
      chaperones. The term is justified as the biological outcome of the chaperone
      network, not as evidence that HSP101 alone performs all refolding steps.
    supported_by:
    - reference_id: PMID:15659638
      supporting_text: The strongest Class 2 suppressors restored solubility of
        aggregated small heat shock proteins (sHsps) after heat stress, revealing
        genetic interaction of the Hsp100/ClpB and sHsp chaperone systems.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-notes.md
      supporting_text: "Hierarchical partnership: sHsps (ATP-independent stabilization)\
        \ → ClpB1 (ATP-dependent disaggregation) → Hsp70 (refolding)."
