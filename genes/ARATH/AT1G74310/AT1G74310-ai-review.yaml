- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:19452453
  review:
    summary: This annotation is based on detection of protein-protein interactions
      in a 14-3-3 protein complex proteomics study. However, this generic term does
      not inform about the specific functional interactions.
    action: MODIFY
    reason: The supporting paper is a tandem-affinity purification study using 14-3-3
      omega (At1g78300) as bait, so the supported interaction is more specifically
      14-3-3 protein binding. The generic protein binding term obscures that this is
      a putative 14-3-3 client interaction and should not be repurposed to annotate
      CLPB1 substrate binding or Hsp70 cooperation.
    proposed_replacement_terms:
    - id: GO:0071889
      label: 14-3-3 protein binding
    supported_by:
    - reference_id: PMID:19452453
      supporting_text: To uncover new clients, 14-3-3 omega (At1g78300) from Arabidopsis
        was engineered with a tandem affinity purification tag and expressed in transgenic
        plants. Purified complexes were analyzed by tandem MS.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-goa.tsv
      supporting_text: The original GOA IPI annotation lists WITH/FROM
        AGI_LocusCode:At1g78300, the 14-3-3 omega bait used for the interaction
