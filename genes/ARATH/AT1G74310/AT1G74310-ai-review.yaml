core_functions:
- description: "ATP-dependent disaggregation and refolding of heat-damaged protein\
    \ aggregates. CLPB1/HSP101 is a hexameric Hsp100/ClpB AAA+ chaperone that couples\
    \ ATP binding and hydrolysis to extraction/remodeling of aggregated proteins,\
    \ working with the sHsp and Hsp70 chaperone systems during heat-stress recovery.\
    \ This activity underlies acquired thermotolerance and contributes to the naturally\
    \ high basal thermotolerance of germinating seedlings."
