id: P42730
gene_symbol: CLPB1
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: "CLPB1/HSP101/HOT1 is the cytosolic/nuclear Arabidopsis Hsp100/ClpB\
  \ AAA+ chaperone that provides ATP-dependent protein disaggregase activity during\
  \ heat-stress recovery. Genetic and transgenic studies show that reduced or mutant\
  \ HSP101 strongly compromises acquired thermotolerance, while domain analysis supports\
  \ a hexameric threading mechanism that extracts polypeptides from heat-damaged protein\
  \ aggregates. CLPB1 also supports basal thermotolerance in germinating seeds and,\
  \ with HSA32, helps maintain long-term acquired thermotolerance through post-transcriptional\
  \ control of HSA32 and HSP101 protein accumulation."
existing_annotations:
- term:
    id: GO:0005737
    label: cytoplasm
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: AtHsp101/CLPB1 is a cytosolic/nuclear protein that functions in the cytoplasm
      as part of the heat shock response machinery. The protein lacks transit peptides
      that would direct it to organelles, distinguishing it from organellar ClpB homologs
      (ClpB3 in chloroplasts, ClpB4 in mitochondria).
    action: ACCEPT
    reason: This annotation is well-supported by phylogenetic analysis, protein structure
      (no transit peptides), and functional studies showing cytoplasmic localization
      and activity. The IBA evidence correctly assigns cytoplasmic localization based
      on orthology to well-characterized ClpB/Hsp100 proteins.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: AtHsp101/CLPB1 is a cytosolic protein localized to the soluble
        fraction of the cell, where it functions in the cytoplasm and nucleus as part
        of the cellular stress response machinery. The protein lacks transit peptides
        that would direct it to organelles, distinguishing it from the organellar
        ClpB homologs (ClpB3 in chloroplasts and ClpB4 in mitochondria) that are present
        in Arabidopsis.
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: AtHsp101/CLPB1 is an AAA+ ATPase with two nucleotide-binding domains
      (NBD1/AAA1 and NBD2/AAA2) that hydrolyze ATP to drive protein disaggregation.
      ATP hydrolysis is coupled to conformational changes that enable mechanical extraction
      of polypeptides from aggregates through the central hexameric pore.
    action: ACCEPT
    reason: This is a core molecular function. The protein contains conserved Walker
      A, Walker B, and sensor motifs in both NBD1 and NBD2. ATP hydrolysis activity
      is essential for chaperone function and thermotolerance, as demonstrated by
      mutants in ATPase domains that lose function. IBA evidence correctly identifies
      this conserved AAA+ family activity.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: The architecture consists of several critical structural elements
        an N-terminal domain (NTD), two tandem AAA+ nucleotide-binding domains (designated
        AAA1/NBD1 and AAA2/NBD2), and a unique coiled-coil middle domain (M-domain)
        that is inserted between the two nucleotide-binding domains. The first nucleotide-binding
        domain (NBD1), also termed the large subdomain, contains the Walker A and
        Walker B motifs essential for ATP binding and hydrolysis.
    - reference_id: PMID:15659638
      supporting_text: The ATPase activity of both NBDs, as well as an intact coiled-coil
        domain, are essential for chaperone activity and in vivo thermotolerance
- term:
    id: GO:0034605
    label: cellular response to heat
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  review:
    summary: AtHsp101/CLPB1 is ESSENTIAL for cellular response to heat stress. The
      protein mediates acquired thermotolerance and basal thermotolerance through
      ATP-dependent disaggregation of heat-denatured protein aggregates. Expression
      increases 50-100 fold within 15-30 minutes of heat stress.
    action: ACCEPT
    reason: This is the primary biological process for AtHsp101. Multiple lines of
      evidence demonstrate this is not just "involved in" but ESSENTIAL for heat response.
      hot1 null mutants completely lack acquired thermotolerance and have dramatically
      reduced basal thermotolerance. The massive heat-induced transcriptional response
      and essential role in thermotolerance make this a core annotation.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: Loss-of-function mutations in CLPB1/HSP101 nearly completely
        abolish this acquired thermotolerance response, rendering hsp101 mutant seedlings
        sensitive to the same lethal temperature regardless of prior heat conditioning.
        The transcriptional response of CLPB1/HSP101 to heat stress is among the most
        robust in the plant transcriptome, with mRNA levels increasing 50- to 100-fold
        within 15-30 minutes following shift to elevated temperature.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-notes.md
      supporting_text: hot1 mutants COMPLETELY LACK acquired thermotolerance. hot1-1
        (E637K in NBD2), hot1-3 (null), hot1-4 (A499T in M-domain). Cannot survive
        44-45 degrees C even with heat conditioning.
- term:
    id: GO:0000166
    label: nucleotide binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: Nucleotide binding is a molecular function of AtHsp101 through its two
      AAA+ domains. However, this term is too general compared to the more specific
      ATP binding annotation.
    action: MODIFY
    reason: While technically correct, this annotation is less specific than GO:0005524
      (ATP binding). AtHsp101 specifically binds and hydrolyzes ATP, not other nucleotides.
      The more specific ATP binding term better captures the molecular function.
    proposed_replacement_terms:
    - id: GO:0005524
      label: ATP binding
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: The first nucleotide-binding domain (NBD1), also termed the
        large subdomain, contains the Walker A and Walker B motifs essential for ATP
        binding and hydrolysis, along with conserved sensor residues and an arginine
        finger motif. The second nucleotide-binding domain (NBD2) similarly contains
        ATP-binding machinery.
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: AtHsp101 contains two ATP-binding domains (NBD1 and NBD2) with conserved
      Walker A and Walker B motifs for ATP binding. ATP binding is essential for the
      conformational changes that drive protein disaggregation.
    action: ACCEPT
    reason: This is a core molecular function that is more specific and accurate than
      the general nucleotide binding term. Both NBD1 and NBD2 bind ATP specifically,
      and ATP binding is required for the protein's chaperone activity. The IEA evidence
      from InterPro domain matches correctly identifies this conserved function.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: Structural analysis demonstrates that ATP binding induces stabilization
        of the D1 pore loops at the central pore opening, providing a high-affinity
        substrate-binding state. Upon ATP hydrolysis in the AAA1 ring, conformational
        changes occur that promote substrate translocation and reduce substrate affinity.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: AtHsp101 localizes to both cytoplasm and nucleus. UniProt annotations
      indicate nuclear localization, and the protein functions in both compartments
      as part of the heat shock response machinery.
    action: ACCEPT
    reason: Nuclear localization is supported by UniProt subcellular location data
      and consistent with the protein's role in cellular stress response. The cytosolic/nuclear
      localization distinguishes it from organellar ClpB homologs.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm, cytosol. Nucleus.'
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: AtHsp101 is a cytosolic protein that functions in the soluble fraction
      of the cell. This is the primary localization where the protein performs its
      disaggregase activity on heat-denatured protein aggregates.
    action: ACCEPT
    reason: Cytosol is the primary and most specific subcellular localization for
      AtHsp101. The protein lacks organellar targeting sequences and functions in
      the cytosolic compartment. This is more specific than the general cytoplasm
      annotation and is well-supported by experimental evidence.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm, cytosol. Nucleus.'
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: AtHsp101/CLPB1 is a cytosolic protein localized to the soluble
        fraction of the cell, where it functions in the cytoplasm and nucleus as part
        of the cellular stress response machinery.
- term:
    id: GO:0009408
    label: response to heat
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: AtHsp101 is ESSENTIAL for response to heat stress. The protein is massively
      induced by heat (50-100 fold increase in mRNA), and hot1 mutants completely
      lack acquired thermotolerance. This is the defining biological process for this
      gene.
    action: ACCEPT
    reason: Response to heat is the primary biological process for AtHsp101. The protein
      is one of the most heat-inducible genes in Arabidopsis and is absolutely essential
      for thermotolerance. While GO:0034605 (cellular response to heat) is more specific,
      this broader term is also accurate and complements the cellular response annotation.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-notes.md
      supporting_text: 'ESSENTIAL for acquired thermotolerance - hot1 mutants completely
        lack thermotolerance. Massive induction: 50-100 fold increase within 15-30
        min of heat stress.'
    - reference_id: PMID:7866032
      supporting_text: An Arabidopsis heat shock protein complements a thermotolerance
        defect in yeast
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: This is a duplicate of the IBA annotation for ATP hydrolysis activity
      (GO:0016887). Both annotations refer to the same core molecular function.
    action: ACCEPT
    reason: While this is a duplicate annotation with different evidence (IEA from
      InterPro vs IBA from phylogenetic inference), both correctly identify the same
      core function. It is acceptable to have the same GO term with different evidence
      codes, as they provide independent support for the annotation.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: The primary catalytic function of AtHsp101/CLPB1 is to disaggregate
        heat-denatured proteins that have undergone irreversible aggregation due to
        thermal stress. This function depends critically on ATP hydrolysis coupled
        to conformational changes that enable mechanical work.
- term:
    id: GO:0009644
    label: response to high light intensity
  evidence_type: IEP
  original_reference_id: PMID:37947266
  review:
    summary: This annotation is based on expression profiling showing AtHsp101 mRNA
      changes during light stress and recovery. However, this appears to be a secondary
      or indirect effect rather than a core function of the gene.
    action: KEEP_AS_NON_CORE
    reason: The reference (PMID:37947266) focuses on mRNA dynamics during light stress
      and recovery. AtHsp101 may be induced as part of a general stress response,
      but light stress is not the primary biological process for this gene. The core
      function is heat stress response. This annotation represents a pleiotropic effect
      where heat shock proteins are induced by multiple stresses, but should not be
      considered a defining feature of AtHsp101 function.
    supported_by:
    - reference_id: PMID:37947266
      supporting_text: 'Dynamics of mRNA fate during light stress and recovery: from
        transcription to stability and translation.'
- term:
    id: GO:0009570
    label: chloroplast stroma
  evidence_type: HDA
  original_reference_id: PMID:20061580
  review:
    summary: This annotation is based on a chloroplast proteomics study (AT_CHLORO
      database) that detected AtHsp101 in chloroplast fractions. However, this conflicts
      with the well-established cytosolic/nuclear localization of AtHsp101 (CLPB1)
      and likely represents contamination or misidentification.
    action: REMOVE
    reason: This annotation is inconsistent with extensive evidence that AtHsp101/CLPB1
      is a CYTOSOLIC protein that lacks chloroplast transit peptides. Arabidopsis
      has a distinct chloroplast-targeted ClpB homolog (ClpB3/APG6) that is different
      from the cytosolic CLPB1. The detection in PMID:20061580 likely represents cytosolic
      contamination in chloroplast preparations, which is common in organellar proteomics.
      The protein sequence has no predicted chloroplast targeting signal, and all
      functional studies demonstrate cytosolic localization.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: AtHsp101/CLPB1 is a cytosolic protein localized to the soluble
        fraction of the cell. The protein lacks transit peptides that would direct
        it to organelles, distinguishing it from the organellar ClpB homologs (ClpB3
        in chloroplasts and ClpB4 in mitochondria) that are present in Arabidopsis.
    - reference_id: file:ARATH/AT1G74310/AT1G74310-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cytoplasm, cytosol. Nucleus.'
    - reference_id: PMID:20061580
      supporting_text: Epub 2010 Jan 10. AT_CHLORO, a comprehensive chloroplast proteome
        database with subplastidial localization and curated information on envelope
        proteins.
- term:
    id: GO:0009941
    label: chloroplast envelope
  evidence_type: HDA
  original_reference_id: PMID:20061580
  review:
    summary: This annotation is from the same chloroplast proteomics study (PMID:20061580)
      and suffers from the same problem as the chloroplast stroma annotation - likely
      contamination or misidentification.
    action: REMOVE
    reason: AtHsp101/CLPB1 is a cytosolic protein, not a chloroplast protein. The
      detection in chloroplast envelope fractions is inconsistent with all genetic,
      biochemical, and sequence evidence showing cytosolic localization. Arabidopsis
      has a separate chloroplast-targeted ClpB (ClpB3) that is distinct from cytosolic
      CLPB1. High-throughput proteomics of organellar fractions frequently suffer
      from cytosolic contamination.
    supported_by:
    - reference_id: file:ARATH/AT1G74310/AT1G74310-deep-research-perplexity.md
      supporting_text: The identification of distinct organellar and cytosolic ClpB
        proteins represents an important evolutionary development, as early work on
        the Arabidopsis ClpB family identified four putative ClpB homologs designated
        ClpB1-4. The cytosolic AtHsp101 (ClpB1) lacks transit peptides distinguishing
        it from ClpB3 in chloroplasts and ClpB4 in mitochondria.
    - reference_id: PMID:20061580
      supporting_text: Epub 2010 Jan 10. AT_CHLORO, a comprehensive chloroplast proteome
        database with subplastidial localization and curated information on envelope
        proteins.
- term:
    id: GO:0071456
    label: cellular response to hypoxia
  evidence_type: HEP
  original_reference_id: PMID:31519798
  review:
    summary: This annotation is based on high-throughput expression profiling showing
      changes in AtHsp101 expression during hypoxia stress. However, this represents
      a secondary stress response rather than a core function.
    action: KEEP_AS_NON_CORE
    reason: The HEP (high-throughput expression pattern) evidence indicates AtHsp101
      expression changes during hypoxia, but this is not the primary biological process
      for this gene. Heat shock proteins are often induced by multiple stresses as
      part of a general stress response. The core function of AtHsp101 is heat stress
      response and protein disaggregation. Hypoxia response should be considered a
      pleiotropic or secondary effect.
    supported_by:
    - reference_id: PMID:31519798
      supporting_text: Integrative Analysis from the Epigenome to Translatome Uncovers
        Patterns of Dominant Nuclear Regulation during Transient Stress.
