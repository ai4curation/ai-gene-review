id: P10896
gene_symbol: RCA
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  RCA (Rubisco activase) is a nuclear-encoded, chloroplast stroma-localized
  AAA+ ATPase chaperone that uses ATP hydrolysis to remodel the active sites of
  ribulose-1,5-bisphosphate carboxylase/oxygenase (Rubisco), removing tightly bound
  inhibitory sugar-phosphates (ribulose-1,5-bisphosphate and, in some species,
  2-carboxyarabinitol-1-phosphate) and thereby restoring and maintaining Rubisco
  carbamylation and carboxylation activity. By controlling the activation state of
  Rubisco it is a major determinant of the kinetics of photosynthetic induction and
  of the thermal sensitivity of photosynthesis. In Arabidopsis the protein is
  expressed as two isoforms generated by alternative splicing that differ only at
  the C-terminus: a larger alpha (Long) isoform and a smaller beta (Short) isoform.
  The alpha isoform carries a C-terminal extension with two redox-active cysteines
  whose disulfide is reduced by thioredoxin-f; this redox switch, together with the
  stromal ADP/ATP ratio, couples Rubisco activase ATPase and Rubisco-activation
  activity to the light-driven redox and energy status of the chloroplast stroma.
  RCA belongs to the AAA+ superfamily, with a P-loop nucleotide-binding domain, and
  is one of the most abundant soluble proteins in photosynthetic leaf tissue.
