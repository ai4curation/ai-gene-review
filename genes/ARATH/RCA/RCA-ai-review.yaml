existing_annotations:
- term:
    id: GO:0005524
    label: ATP binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: RCA is an AAA+ ATPase with a P-loop (Walker A) nucleotide-binding motif;
      ATP binding is a core molecular function and is independently supported by an
      experimental (IDA) annotation and by the crystal structure.
    action: ACCEPT
    reason: ATP binding is a well-established, structurally and experimentally documented
      core function of Rubisco activase as an AAA+ ATPase.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: "ATP-binding Walker A / P-loop: BINDING 165..172 ligand ATP"
- term:
    id: GO:0009570
    label: chloroplast stroma
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Chloroplast stroma is the authentic primary subcellular location of RCA,
      consistent with the UniProt-curated subcellular location and with multiple
      experimental (HDA) stromal proteomics annotations.
    action: ACCEPT
    reason: Stroma is the bona fide site of action where RCA reactivates Rubisco;
      this electronic annotation agrees with curated and experimental evidence.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: 'UniProt SUBCELLULAR LOCATION: "Plastid, chloroplast stroma.'
- term:
    id: GO:0010287
    label: plastoglobule
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: Plastoglobule localization derives from a UniProt subcellular-location
      mapping backed by a single plastoglobule proteomics study (PubMed:16461379).
      RCA is an extremely abundant stromal protein and is a common contaminant of
      subplastidial fractions; plastoglobule is a minor/incidental location rather
      than a site of Rubisco activation.
    action: KEEP_AS_NON_CORE
    reason: Experimentally derived (UniProt ECO:0000269|PubMed:16461379) but not a
      core functional location; the relevant site of action is the stroma.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: plastoglobule (GO:0010287, UniProt-validated ECO:0000269|PubMed:16461379)
- term:
    id: GO:0016887
    label: ATP hydrolysis activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: ATP hydrolysis is the catalytic activity that powers RCA's remodeling of
      Rubisco active sites; this is a core molecular function of the AAA+ ATPase and
      is experimentally documented in the activase literature.
    action: ACCEPT
    reason: ATP hydrolysis is the energy-yielding step driving Rubisco reactivation
      and is intrinsic to RCA function.
    supported_by:
    - reference_id: PMID:10430961
      supporting_text: the 46-kDa isoform has minimal ATP hydrolysis and Rubisco activation
        activity in comparison with the 43-kDa isoform
- term:
    id: GO:0009505
    label: plant-type cell wall
  evidence_type: HDA
  original_reference_id: PMID:16287169
  qualifier: located_in
  review:
    summary: Detection of RCA in a cell-wall proteome is almost certainly abundant-protein
      contamination. RCA is a soluble stromal chloroplast protein and one of the most
      abundant proteins in leaves; it has no known role at the cell wall.
    action: MARK_AS_OVER_ANNOTATED
    reason: High-throughput proteomic detection in a non-chloroplast fraction; biologically
      implausible as a genuine location for a stromal AAA+ ATPase. Retained (not removed)
      because it is an experimentally coded HDA annotation.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: RCA is one of the most abundant soluble leaf proteins and is
        a near-ubiquitous contaminant of subcellular proteomics fractions
- term:
    id: GO:0009535
    label: chloroplast thylakoid membrane
  evidence_type: HDA
  original_reference_id: PMID:15322131
  qualifier: located_in
  review:
    summary: RCA is a soluble stromal protein; its recovery in a thylakoid membrane
      proteome reflects loose/peripheral association or co-fractionation of an abundant
      stromal protein rather than an intrinsic membrane location.
    action: KEEP_AS_NON_CORE
    reason: Plausible peripheral/co-fractionation signal within the chloroplast, but
      not the functional site (the stroma); retained as a non-core localization.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: thylakoid / thylakoid membrane (GO:0009579, GO:0009535)
- term:
    id: GO:0048046
    label: apoplast
  evidence_type: HDA
  original_reference_id: PMID:18538804
  qualifier: located_in
  review:
    summary: Apoplast detection of this abundant stromal chloroplast protein is best
      explained as contamination in a whole-plant proteomics workflow; RCA has no
      established extracellular function.
    action: MARK_AS_OVER_ANNOTATED
    reason: High-throughput proteomic detection outside the chloroplast; biologically
      implausible localization for a stromal Rubisco activase. Retained as an HDA
      annotation rather than removed.
    supported_by:
    - reference_id: file:ARATH/RCA/RCA-notes.md
      supporting_text: 'place RCA outside the chloroplast: plant-type cell wall (GO:0009505,
        PMID:16287169), apoplast (GO:0048046, PMID:18538804)'
- term:
    id: GO:0009570
    label: chloroplast stroma
  evidence_type: HDA
  original_reference_id: PMID:16207701
  qualifier: located_in
  review:
    summary: Experimental (HDA) detection in the oligomeric stromal proteome confirms
      the chloroplast stroma as the authentic, functionally relevant location of RCA,
      where it acts on stromal Rubisco.
    action: ACCEPT
    reason: Stroma is the bona fide site of RCA function; supported by experimental
