suggested_questions:
- question: What is the physiological significance of CXE15 dual localization to both
    nucleus and cytosol? Does CXE15 catabolize SLs in both compartments, or is one
    localization functionally more important?
- question: What are the endogenous SL substrates of CXE15 in vivo, and does it act
    on non-canonical strigolactones such as carlactone and methyl carlactonoate?
- question: Is CXE15 the primary SL catabolic enzyme in Arabidopsis, or do other carboxylesterases
    (e.g., CXE20) play redundant roles in specific tissues?
- question: What is the fate of the hydrolyzed D-ring product after CXE15-catalyzed
    SL breakdown? Does the D-ring undergo further enzymatic modification?
suggested_experiments:
- description: Measure endogenous SL levels (5-deoxystrigol, orobanchol, carlactone)
    in cxe15 single and cxe15/cxe20 double mutant plants across different tissues
    to determine the relative contributions of each enzyme to SL homeostasis.
- description: Perform tissue-specific and subcellular-specific complementation of
    cxe15 mutants with nucleus-targeted or cytosol-restricted CXE15 variants to determine
    the functional compartment for SL catabolism.
- description: Test CXE15 enzymatic activity against non-canonical SLs (carlactone,
    carlactonoic acid, methyl carlactonoate) to determine substrate scope beyond canonical
    SLs.
