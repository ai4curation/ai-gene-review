gene_symbol: CXE15
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: CXE15 (Carboxylesterase 15) is a strigolactone (SL) hydrolase belonging
  to the GDXG lipolytic enzyme family. It catalyzes the hydrolysis of strigolactones
  including 5-deoxystrigol, orobanchol, and synthetic analogs such as GR24, cleaving
  the enol ether bridge between the butenolide D-ring and the ABC-ring. The catalytic
  mechanism involves a Ser-His-Glu catalytic triad (S169, H302, E271) and an oxyanion
  hole. CXE15 displays robust hydrolytic activity with significantly higher turnover
  rates than the SL receptor D14, functioning as a bona fide SL catabolic enzyme rather
  than a signaling receptor. Overexpression promotes shoot branching by depleting
  endogenous SLs, thereby dampening SL-inhibited axillary bud outgrowth. The N-terminal
  helix domain undergoes a dynamic open-to-closed conformational transition upon SL
  binding that is critical for efficient catalysis. CXE15 localizes to both the nucleus
  and cytosol.
