- id: PMID:14738307
  title: The carboxylesterase gene family from Arabidopsis thaliana.
  findings:
  - statement: CXE15 is a member of the carboxylesterase gene family in Arabidopsis
      thaliana
- id: PMID:34764442
  title: Catabolism of strigolactones by a carboxylesterase.
  findings:
  - statement: CXE15 is an efficient hydrolase of strigolactones that promotes shoot
      branching when overexpressed
    supporting_text: overexpression of AtCXE15 promotes shoot branching by dampening
      SL-inhibited axillary bud outgrowth
  - statement: CXE15 can bind and hydrolyze diverse strigolactone analogs both in
      vitro and in planta
    supporting_text: AtCXE15 could bind and efficiently hydrolyse SLs both in vitro
      and in planta
  - statement: CXE15-dependent SL catabolism is evolutionarily conserved in seed plants
    supporting_text: AtCXE15 is capable of catalysing hydrolysis of diverse SL analogues
      and that such CXE15-dependent catabolism of SLs is evolutionarily conserved
      in seed plants
- id: PMID:39090154
  title: Structural insights into strigolactone catabolism by carboxylesterases reveal
    a conserved conformational regulation.
  findings:
  - statement: Crystal structures of CXE15 reveal a catalytic triad and N-terminal
      helix conformational dynamics critical for SL hydrolysis
    supporting_text: our analysis revealed a major transition of the NTH from an open
      (apo) to a closed state (CXE15-SL) acting as a lid covering the catalytic pocket
  - statement: CXE15 has much higher catalytic efficiency for SL hydrolysis than CXE20
    supporting_text: AtCXE15 demonstrates superior enzymatic performance in YLG catalysis,
      with remarkable catalytic efficiency of 4.0 × 10−2 s−1 μM−1, while AtCXE20 at
      only 6% of this efficiency, measuring just 0.25 × 10−2 s−1 μM−1
  - statement: The catalytic residues S169 and E271 are essential for SL hydrolysis
    supporting_text: CXE15 exhibited significant hydrolytic activity compared to the
      catalytic mutants CXE15S169A and CXE15E271A, which were unable to hydrolyze
      YLG
  - statement: Crystal structure of CXE15 trapped with hydrolyzed SL intermediate
      reveals the mechanism of catalysis
    supporting_text: Inspection of the electron density revealed the presence of a
      hydrolyzed lactone D-ring of rac-GR24 covalently linked to S169 of the catalytic
      triad
