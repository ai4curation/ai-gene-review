- term:
    id: GO:2000032
    label: regulation of secondary shoot formation
  evidence_type: IMP
  original_reference_id: PMID:34764442
  review:
    summary: CXE15 overexpression promotes shoot branching by depleting strigolactones
      that inhibit axillary bud outgrowth. Grafting experiments and CXE15-OE phenotypes
      resemble SL-deficient mutants. This is an indirect consequence of SL catabolism
      rather than a direct role in shoot formation regulation.
    action: KEEP_AS_NON_CORE
    reason: Regulation of secondary shoot formation is an indirect phenotypic consequence
      of CXE15's core enzymatic function in SL catabolism. The protein does not directly
      regulate shoot formation but rather modulates SL levels, which in turn affects
      branching. This is a legitimate but non-core annotation.
    supported_by:
    - reference_id: PMID:34764442
      supporting_text: overexpression of AtCXE15 promotes shoot branching by dampening
        SL-inhibited axillary bud outgrowth
    - reference_id: PMID:39090154
      supporting_text: overexpression of CXE15 (CXE15-OE) resulted in axillary shoot
        outgrowth compared to overexpression of citrine as control
core_functions:
- description: CXE15 functions as a strigolactone hydrolase, catalyzing the cleavage
    of the enol ether bridge between the D-ring and ABC-ring of strigolactones. It
    uses a Ser-His-Glu catalytic triad (S169, H302, E271) with an oxyanion hole for
    catalysis. The N-terminal helix undergoes an open-to-closed conformational transition
    upon substrate binding that is critical for efficient catalysis. CXE15 displays
    significantly higher catalytic efficiency than the SL receptor D14, acting as
    the primary SL catabolic enzyme for hormonal homeostasis.
