  review:
    summary: Hydrolase activity is well supported by phylogenetic inference and confirmed
      by direct experimental evidence. CXE15 is a highly efficient hydrolase of strigolactones.
      However, GO:0016787 is a broad parent term; the more specific carboxylic ester
      hydrolase activity (GO:0052689) is more appropriate for this enzyme.
    action: MODIFY
    reason: CXE15 is experimentally characterized as a carboxylic ester hydrolase
      that cleaves strigolactones. The general term hydrolase activity should be replaced
      with the more specific carboxylic ester hydrolase activity to accurately reflect
      its biochemical function.
