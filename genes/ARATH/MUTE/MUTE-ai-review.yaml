- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: MUTE is a bHLH protein that acts as a dimer; experimentally it forms
      heterodimers with ICE1/SCRM and SCRM2, so the more specific heterodimerization
      term is preferred.
    action: MODIFY
    reason: Experimental evidence (Y2H and BiFC in epidermal nuclei) shows MUTE associates
      with the broadly expressed bHLH-LZ proteins ICE1/SCRM and SCRM2, indicating
      heterodimerization activity rather than generic dimerization. This is a core
      molecular function.
    proposed_replacement_terms:
    - id: GO:0046982
      label: protein heterodimerization activity
    supported_by:
    - reference_id: PMID:18641265
      supporting_text: three stomatal bHLHs, SPCH, MUTE, and FAMA, that exhibit transient
        expression within a specific precursor state of the stomatal cell lineage
        function as heterodimers with broadly expressed ICE1.
