gene_symbol: MUTE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: MUTE is a basic helix-loop-helix (bHLH) transcription factor of Arabidopsis
  thaliana that is a central regulator of stomatal development. It is expressed
  transiently in late meristemoids, where it terminates the amplifying (asymmetric)
  divisions of the meristemoid and triggers its transition into a guard mother cell
  (GMC); the GMC then divides once symmetrically to produce the pair of guard cells
  that form a stoma. MUTE acts in the stomatal lineage downstream of SPEECHLESS (SPCH),
  which initiates the lineage, and upstream of FAMA, which directs terminal guard
  cell morphogenesis. As a nuclear, sequence-specific DNA-binding transcription factor,
  MUTE functions as a heterodimer with the broadly expressed bHLH-leucine-zipper
  proteins ICE1/SCRM and SCRM2, which specify its activity at the meristemoid-to-GMC
  transition. Loss of MUTE produces stomata-less plants whose meristemoids arrest
  after excessive asymmetric divisions, whereas constitutive MUTE expression converts
  the entire epidermis to guard cell identity. Timely MUTE expression also influences
  the fate of stomatal lineage ground cells and their differentiation into pavement
  cells.
