taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: 'GLABRA3 (GL3/AtbHLH1/MYC6) is an Arabidopsis basic helix-loop-helix transcription factor and bHLH component of MBW regulatory complexes. In the nucleus it partners with GL1/MYB23 or WER-family MYBs and TTG1 to activate epidermal cell-fate, trichome initiation, branching, and root non-hair programs; in other complexes it contributes to anthocyanin regulation. Generic protein-binding rows reflect real partner interactions but obscure the more informative bHLH transcription-factor and MBW-complex role.'
