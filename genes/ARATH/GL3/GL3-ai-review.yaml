- id: file:ARATH/GL3/GL3-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis GL3
  findings:
  - statement: GL3 is a nuclear bHLH transcription factor that forms MBW complexes with MYB and TTG1 partners to regulate epidermal cell fate.
  - statement: GL3 activity promotes trichome initiation and activates downstream differentiation and inhibitory patterning genes.
- id: file:ARATH/GL3/GL3-uniprot.txt
  title: UniProt record for Arabidopsis GL3
  findings:
  - statement: UniProt identifies GL3/Q9FN69 as a nuclear bHLH transcription activator that promotes trichome formation, branching, endoreplication, and epidermal cell fate specification with MYB and TTG1 partners.
- id: file:interpro/panther/PTHR46266/PTHR46266-entries.csv
  title: PANTHER PTHR46266 family entries for Arabidopsis GL3
  findings:
  - statement: PTHR46266 places GL3 and TT8 in plant-specific bHLH transcription activators; the unchecked family description is useful background, while subfamily assignment supports conserved bHLH transcription factor and dimerization functions.
