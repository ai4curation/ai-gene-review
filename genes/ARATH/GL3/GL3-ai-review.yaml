suggested_questions:
- question: Should GL3/TT8 family members use a shared bHLH transcription activator term when evidence supports activation rather than only generic DNA-binding TF activity?
- question: Can GOA distinguish GL3 trichome/root epidermis core functions from non-core anthocyanin-context functions?
suggested_experiments:
- description: Map GL3 genomic occupancy and rapid transcriptional targets in trichome initials and root epidermis using inducible GL3 nuclear entry combined with CUT&RUN and time-course RNA-seq.
