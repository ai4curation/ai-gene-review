core_functions:
- description: Nuclear bHLH transcription factor in Arabidopsis MBW complexes. GL3 dimerizes through its bHLH domain and cooperates with GL1/MYB23/WER-family MYBs and TTG1 to regulate transcriptional programs for epidermal cell fate, trichome initiation, trichome branching, and root non-hair specification.
