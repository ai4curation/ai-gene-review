- term:
    id: GO:0031262
    label: Ndc80 complex
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  qualifier: part_of
  review:
    summary: >-
      Membership in the NDC80 complex, transferred by sequence similarity from
      human SPC24 (UniProtKB:Q8NBT2). Strongly confirmed experimentally in
      Arabidopsis: the UniProt SUBUNIT statement reports SPC24 as a component of
      the NDC80 complex, and AtSPC24/MUN physically interacts with AtNDC80
      (AT3G54630), AtNUF2 (AT1G61000) and AtSPC25 (AT3G48210) [PMID:29356153].
    action: ACCEPT
    reason: >-
      Well supported and a core annotation. Beyond the ISS transfer, the
      NDC80-complex membership is directly demonstrated in Arabidopsis by
      yeast two-hybrid and in planta co-immunoprecipitation with all three other
      subunits [PMID:29356153]. This cellular-component annotation captures the
      gene's core structural role.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        Interactions among the components of the NDC80 complex were confirmed in
        a yeast two-hybrid assay and in planta co-immunoprecipitation.
    - reference_id: PMID:29356153
      supporting_text: >-
        The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
        SPC25, is localized at the outer kinetochore and connects spindle fibers
        to the kinetochore.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: ISM
  original_reference_id: GO_REF:0000122
  qualifier: located_in
  review:
    summary: >-
      Computational (AtSubP/TAIR) prediction of nuclear localization.
      Consistent with the protein's centromere/kinetochore localization but
      far less specific, and redundant with the IDA nucleus annotation.
    action: ACCEPT
    reason: >-
      Correct but uninformative. A centromere/kinetochore protein is nuclear, so
      the prediction is not wrong, but the experimentally supported
      kinetochore (GO:0000776) and centromeric-region (GO:0000775) annotations
      describe the localization at the appropriate granularity. Kept as a valid,
      generic, electronic supporting annotation.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
        SPC25, is localized at the outer kinetochore and connects spindle fibers
        to the kinetochore.
- term:
    id: GO:0000776
    label: kinetochore
  evidence_type: IDA
  original_reference_id: PMID:29356153
  qualifier: located_in
  review:
    summary: >-
      Direct experimental localization to the kinetochore. AtSPC24/MUN is an
      NDC80-complex subunit that localizes to the centromere/kinetochore,
      colocalizing with CENH3 [PMID:29356153].
    action: ACCEPT
    reason: >-
      Strong experimental cellular-component annotation (IDA) and a core
      localization for this gene. As an NDC80-complex subunit at the outer
      kinetochore, kinetochore localization is exactly the expected and observed
      compartment. Defer to the TAIR curator who annotated from the full text.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
        SPC25, is localized at the outer kinetochore and connects spindle fibers
        to the kinetochore.
- term:
    id: GO:0009933
    label: meristem structural organization
  evidence_type: IMP
  original_reference_id: PMID:29356153
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Phenotype-based annotation: mun mutants exhibit an unstructured shoot
      apical meristem with ectopic WUSCHEL expression [PMID:29356153]. This is a
      downstream developmental consequence of impaired kinetochore function and
      cell division.
    action: KEEP_AS_NON_CORE
    reason: >-
      The annotation is valid (supported by the mun loss-of-function phenotype
      and correctly qualified acts_upstream_of_or_within), but meristem
      structural organization is a tissue-level developmental outcome secondary
      to the gene's molecular role as a kinetochore/NDC80-complex subunit.
      Impaired chromosome segregation and reduced cell division in the meristem
      lead to disorganized meristem architecture and ectopic stem-cell niche
      generation; it is not the core function and is retained as non-core.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        In addition, we report the ectopic generations of stem cell niches by
        the malfunction of kinetochore components.
- term:
    id: GO:0051781
    label: positive regulation of cell division
  evidence_type: IMP
  original_reference_id: PMID:29356153
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Phenotype-based annotation: mun mutants show a reduced cell-division rate,
      and null mutants arrest cell division in early embryogenesis
      [PMID:29356153]. Reflects the requirement of the NDC80 kinetochore complex
      for mitotic cell division.
    action: ACCEPT
    reason: >-
      Supported by the loss-of-function phenotype (low cell-division rate;
      embryonic division arrest) and correctly qualified
      acts_upstream_of_or_within. The gene is required for proper mitotic cell
      division as a structural component of the kinetochore machinery; the
      annotation captures this at the cell-division level. Retained as a valid
      experimental annotation, though the most mechanistic descriptors of the
      gene's role are the kinetochore (GO:0000776), Ndc80 complex (GO:0031262)
      and chromosome-segregation (GO:0051983) annotations.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        The mutant exhibits stunted growth, embryo arrest, DNA aneuploidy, and
        defects in chromosome segregation with a low cell division rate.
- term:
    id: GO:0051983
    label: regulation of chromosome segregation
  evidence_type: IMP
  original_reference_id: PMID:29356153
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Experimental (IMP) annotation: loss of AtSPC24/MUN causes defects in
      chromosome segregation and DNA aneuploidy [PMID:29356153], consistent with
      its role as an essential NDC80-complex kinetochore subunit.
    action: ACCEPT
    reason: >-
      A core biological-process annotation, directly supported by the mutant
      chromosome-segregation defect and aneuploidy. The NDC80 complex mediates
      kinetochore-microtubule attachment and chromosome segregation and
      contributes to spindle-checkpoint control, so involvement in
      (regulation of) chromosome segregation is well founded. Defer to the TAIR
      curator's full-text-based annotation.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        The mutant exhibits stunted growth, embryo arrest, DNA aneuploidy, and
        defects in chromosome segregation with a low cell division rate.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:29356153
  qualifier: enables
  review:
    summary: >-
      Three IPI interaction annotations (collapsed here) recording physical
      binding of AtSPC24/MUN to the three other NDC80-complex subunits:
      AtNDC80 (AT3G54630), AtNUF2 (AT1G61000) and AtSPC25 (AT3G48210), shown by
      yeast two-hybrid and in planta co-immunoprecipitation [PMID:29356153].
    action: ACCEPT
    reason: >-
      The interactions are genuine and important experimental evidence — they
      establish assembly of the Arabidopsis NDC80 complex. The GO molecular
      function term "protein binding" (GO:0005515) is itself uninformative and
      should not be treated as a core molecular function; its biological meaning
      is fully captured by the GO:0031262 "Ndc80 complex" cellular-component
      annotation. Retained (per standard practice for IPI evidence to named
      partners) but not promoted to a core function. No more-specific MF term is
      warranted, as SPC24's contribution is structural (anchoring, via SPC25)
      rather than a distinct catalytic or binding activity.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        Interactions among the components of the NDC80 complex were confirmed in
        a yeast two-hybrid assay and in planta co-immunoprecipitation.
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IDA
  original_reference_id: PMID:29356153
  qualifier: located_in
  review:
    summary: >-
      Direct experimental nuclear localization [PMID:29356153]. The protein
      localizes to the centromere/kinetochore, which is within the nucleus.
    action: ACCEPT
    reason: >-
      Valid experimental localization, but generic relative to the
      centromere/kinetochore compartment where the protein actually resides
      (GO:0000775, GO:0000776). Kept as a correct, broader CC annotation; defer
      to the TAIR curator's imaging-based annotation.
    supported_by:
    - reference_id: PMID:29356153
      supporting_text: >-
        The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
        SPC25, is localized at the outer kinetochore and connects spindle fibers
        to the kinetochore.
core_functions:
- description: >-
    Structural subunit of the NDC80 outer-kinetochore complex (with NDC80, NUF2
    and SPC25); SPC24 pairs with SPC25 to anchor the microtubule-binding
    NDC80-NUF2 module to the inner kinetochore, demonstrated by physical
    interaction with all three other Arabidopsis subunits.
  supported_by:
  - reference_id: PMID:29356153
    supporting_text: >-
      The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
      SPC25, is localized at the outer kinetochore and connects spindle fibers
      to the kinetochore.
  - reference_id: PMID:29356153
    supporting_text: >-
      Interactions among the components of the NDC80 complex were confirmed in a
      yeast two-hybrid assay and in planta co-immunoprecipitation.
- description: >-
    Kinetochore/centromere-localized factor required for accurate chromosome
    segregation during mitotic cell division; loss causes DNA aneuploidy,
    chromosome-segregation defects and embryonic division arrest.
  supported_by:
  - reference_id: PMID:29356153
    supporting_text: >-
      The mutant exhibits stunted growth, embryo arrest, DNA aneuploidy, and
      defects in chromosome segregation with a low cell division rate.
  - reference_id: PMID:29356153
    supporting_text: >-
      MUN is co-localized at the centromere with HTR12/CENH3, which is a
      centromere-specific histone variant, but MUN is not required to recruit
      HTR12/CENH3 to the kinetochore.
suggested_questions:
- question: >-
    Does AtSPC24/MUN contribute to spindle-assembly-checkpoint signaling in
    Arabidopsis, as its NDC80-complex orthologs do in other eukaryotes, or is its
    role limited to kinetochore-microtubule attachment?
- question: >-
    Is the meristem disorganization in mun mutants entirely a downstream
    consequence of impaired cell division, or does ectopic WUSCHEL expression
    reflect a more direct link between kinetochore function and stem-cell-niche
    patterning?
suggested_experiments:
- description: >-
    Map the AtSPC24-AtSPC25 and AtSPC24-(NDC80/NUF2) binding interfaces by
    truncation/point-mutation interaction assays and, if feasible, reconstitute
    the recombinant Arabidopsis NDC80 complex to test microtubule binding.
  hypothesis: >-
    AtSPC24 binds SPC25 via its C-terminal RWD domain to form the
    inner-kinetochore-anchoring module, while microtubule binding is contributed
    by the NDC80-NUF2 module.
  experiment_type: protein interaction / in vitro reconstitution
- description: >-
    Use live-cell imaging of fluorescently tagged AtSPC24/MUN through the cell
    cycle to quantify kinetochore loading dynamics and test for
    spindle-checkpoint-dependent behavior under spindle poisons.
  hypothesis: >-
    AtSPC24 occupies kinetochores throughout mitosis and participates in
    checkpoint-controlled kinetochore-microtubule attachment.
  experiment_type: live-cell imaging / cell biology
