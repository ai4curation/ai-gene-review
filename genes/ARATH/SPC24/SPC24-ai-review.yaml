id: Q67XT3
gene_symbol: SPC24
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SPC24 (also MUN, MERISTEM UNSTRUCTURED; locus At3g08880) is the Arabidopsis
  thaliana homolog of kinetochore protein SPC24, one of the four subunits of the
  NDC80 outer-kinetochore complex (NDC80, NUF2, SPC24, SPC25). It is a small
  (201 aa) protein with a central coiled-coil and a C-terminal RWD-like globular
  domain; together with SPC25 it forms the inner-kinetochore-anchoring module of
  the NDC80 complex, while NDC80 and NUF2 form the microtubule-binding module.
  The NDC80 complex localizes to the outer kinetochore at centromeres and
  provides the principal end-on attachment site coupling spindle microtubules to
  chromosomes, and is required for accurate chromosome segregation and
  spindle-checkpoint signaling during cell division. AtSPC24/MUN localizes to
  the centromere/kinetochore, colocalizing with the centromeric histone variant
  CENH3, and physically interacts with the other three NDC80-complex subunits
  (AtNDC80, AtNUF2, AtSPC25). It is highly expressed in actively dividing tissues
  (shoot and root apical meristems, vasculature, emerging leaves). Loss of
  function is essential: null mun mutants arrest in early embryogenesis (division
  arrest before the globular stage), while weak alleles show stunted growth, DNA
  aneuploidy, reduced cell-division rate and chromosome-segregation defects, with
  secondary disorganization of the shoot apical meristem (ectopic WUSCHEL
  expression).
