    label: chromosome, centromeric region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  qualifier: located_in
  review:
    summary: >-
      Centromeric localization derived from the UniProt "Chromosome, centromere"
      subcellular-location term. Experimentally corroborated: AtSPC24/MUN
      colocalizes with CENH3 at the centromere [PMID:29356153].
    action: ACCEPT
    reason: >-
      Accurate. The protein is an NDC80-complex kinetochore subunit localizing
      to the centromeric region; AtSPC24/MUN was shown to colocalize with the
      centromere-specific histone variant CENH3. GO:0000775 is correct, and the
      more specific child term GO:0000776 "kinetochore" is also separately
      annotated (IDA).
