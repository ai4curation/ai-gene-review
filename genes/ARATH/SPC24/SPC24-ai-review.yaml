- id: PMID:29356153
  title: MUN (MERISTEM UNSTRUCTURED), encoding a SPC24 homolog of NDC80 kinetochore
    complex, affects development through cell division in Arabidopsis thaliana.
  reference_review:
    relevance: HIGH
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified (Shin et al. 2018, Plant J). The defining functional study
      of AtSPC24/MUN, supplying FUNCTION, SUBUNIT, SUBCELLULAR LOCATION, TISSUE
      SPECIFICITY and DISRUPTION PHENOTYPE, and the source of all experimental
      (IDA/IMP/IPI) annotations. Cached as abstract-only (full text not in
      cache); the TAIR experimental annotations were made from the full text.
  findings:
  - statement: >-
      SPC24 is a subunit of the four-protein NDC80 outer-kinetochore complex
      that connects spindle microtubules to the kinetochore and mediates
      chromosome segregation during cell division.
    supporting_text: >-
      The NDC80 complex, composed of four proteins, NDC80, NUF2, SPC24 and
      SPC25, is localized at the outer kinetochore and connects spindle fibers
      to the kinetochore.
  - statement: >-
      AtSPC24/MUN colocalizes with the centromeric histone variant CENH3 at the
      centromere; interactions among NDC80-complex components were confirmed by
      yeast two-hybrid and in planta co-immunoprecipitation.
    supporting_text: >-
      Interactions among the components of the NDC80 complex were confirmed in a
      yeast two-hybrid assay and in planta co-immunoprecipitation.
  - statement: >-
      mun mutants show embryo arrest, DNA aneuploidy, chromosome-segregation
      defects and a low cell-division rate; null alleles are embryonic lethal.
    supporting_text: >-
      The mutant exhibits stunted growth, embryo arrest, DNA aneuploidy, and
      defects in chromosome segregation with a low cell division rate.
- id: PMID:33993566
  title: AtNUF2 modulates spindle microtubule organization and chromosome segregation
    during mitosis.
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      PubMed-verified. Characterizes AtNUF2, a direct partner subunit of
      AtSPC24 in the NDC80 complex (NUF2 binds SPC25), corroborating the
      complex's role in spindle organization and chromosome segregation in plant
      mitosis.
  findings:
  - statement: >-
      The NDC80-complex subunit AtNUF2 modulates spindle microtubule
      organization and chromosome segregation during mitosis, corroborating the
      complex's mitotic role.
