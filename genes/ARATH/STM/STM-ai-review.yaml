core_functions:
- description: >-
    STM enables RNA polymerase II-specific DNA-binding transcription factor
    activity in the nucleus as a TALE/KNOX homeodomain protein. Through this
    activity and BELL/BLH partner-dependent nuclear import, STM suppresses
    differentiation and promotes cell division in the shoot apical meristem,
    contributes to CLV3/stem-cell homeostasis, and activates cytokinin
    biosynthesis to maintain meristematic identity.
  molecular_function:
    id: GO:0000981
    label: DNA-binding transcription factor activity, RNA polymerase II-specific
  directly_involved_in:
  - id: GO:0006357
    label: regulation of transcription by RNA polymerase II
  - id: GO:0009934
    label: regulation of meristem structural organization
  - id: GO:0019827
    label: stem cell population maintenance
  - id: GO:0009691
    label: cytokinin biosynthetic process
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:12070094
    supporting_text: STM suppresses differentiation independently of WUS and is required and sufficient to promote cell division
  - reference_id: PMID:16139212
    supporting_text: activation of cytokinin biosynthesis mediates KNOXI function in meristem maintenance
  - reference_id: PMID:16513846
    supporting_text: STM is targeted into the nuclear compartment through heterodimerization with BLH partner proteins
  - reference_id: file:ARATH/STM/STM-uniprot.txt
    supporting_text: Probably binds to the DNA sequence 5'-TGAC-3'
proposed_new_terms: []
suggested_questions:
- question: >-
    Which STM-BELL/BLH heterodimer combinations are required for specific direct
    transcriptional targets in central, peripheral, and boundary domains of the
    shoot apical meristem?
- question: >-
    Is RNA binding an experimentally demonstrable activity of Arabidopsis STM
    itself, or should the current RNA-binding annotation be restricted to maize
    KN1/MPB2C-related evidence?
- question: >-
    Which STM trafficking states are required for transcriptional function
    versus non-cell-autonomous signaling through plasmodesmata?
suggested_experiments:
- description: >-
    Perform native-promoter STM ChIP-seq or CUT&RUN in STM complementation lines
    with and without specific BLH partners to assign direct targets to defined
    STM heterodimer complexes.
  hypothesis: >-
    Distinct BLH partners confer domain-specific target selection for STM in the
    shoot apical meristem.
  experiment_type: ChIP-seq/CUT&RUN
- description: >-
    Test purified Arabidopsis STM for direct RNA binding using EMSA or
    fluorescence anisotropy with STM mRNA and unrelated RNA controls, alongside
    maize KN1 and MPB2C controls.
  hypothesis: >-
    The current STM RNA-binding annotation may reflect KN1/MPB2C trafficking
    literature rather than a direct Arabidopsis STM RNA-binding activity.
  experiment_type: in vitro RNA-binding assay
- description: >-
    Use STM variants defective in BLH binding, MBP2C binding, or FTIP-dependent
    trafficking in stm rescue backgrounds to separate nuclear transcriptional
    activity from plasmodesmata-mediated mobility.
  hypothesis: >-
    STM meristem maintenance requires BLH-dependent nuclear import, while
    plasmodesmata-associated mobility contributes to boundary and tissue-level
    patterning.
  experiment_type: structure-function rescue and live imaging
