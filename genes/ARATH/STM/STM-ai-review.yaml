id: Q38874
gene_symbol: STM
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  SHOOT MERISTEMLESS (STM; At1g62360) encodes a class I KNOX/TALE
  homeobox transcription factor that is central to Arabidopsis shoot apical
  meristem initiation and maintenance. STM acts primarily as a sequence-specific
  DNA-binding transcription factor in the nucleus, where its activity depends on
  KNOX/TALE homeodomain architecture and heterodimerization with BELL/BLH
  homeodomain partners. It suppresses differentiation and promotes cell division
  in the meristem dome, contributes to CLV3/stem-cell homeostasis with WUSCHEL,
  and activates cytokinin biosynthesis as part of the meristem maintenance
  program. STM is also a mobile protein whose localization is regulated by
  BELL/BLH partners, MBP2C, and FTIP3/FTIP4; it can traffic through
  plasmodesmata, with cytoplasm, endosome, plasma membrane, and microtubule-
  associated puncta representing trafficking/regulatory states rather than the
  primary site of transcriptional activity. Later reproductive roles in floral
  fate and carpel initiation are well supported, but are best treated as
  developmental contexts downstream of the core STM function in maintaining
  meristematic identity.
existing_annotations:
- term:
    id: GO:0009691
    label: cytokinin biosynthetic process
  evidence_type: TAS
  original_reference_id: PMID:16139212
  review:
    summary: >-
      STM is not a cytokinin biosynthetic enzyme, but the annotation uses a BP
      qualifier and is supported by evidence that inducible STM rapidly increases
      AtIPT7 expression and cytokinin levels, and that cytokinin can partially
      rescue stm defects.
    action: ACCEPT
    reason: >-
      Activation of cytokinin biosynthesis is a direct and biologically central
      part of the KNOX/STM meristem maintenance program, so retaining this BP
      annotation is appropriate.
    supported_by:
    - reference_id: PMID:16139212
      supporting_text: activation of cytokinin biosynthesis mediates KNOXI function in meristem maintenance
    - reference_id: PMID:16139212
      supporting_text: rapid and dramatic increase in cytokinin levels following activation of the KNOXI protein SHOOT MERISTEMLESS (STM)
- term:
    id: GO:0009934
    label: regulation of meristem structural organization
  evidence_type: IMP
  original_reference_id: PMID:12070094
  review:
    summary: >-
      STM suppresses differentiation across the meristem dome and promotes cell
      division independently of WUS, matching a role in regulating meristem
      organization.
    action: ACCEPT
    reason: >-
      This is a core biological process for STM. The publication directly
      separates STM's function from WUS and places STM in maintenance of the
      undifferentiated meristem structure.
    supported_by:
    - reference_id: PMID:12070094
      supporting_text: STM suppresses differentiation independently of WUS and is required and sufficient to promote cell division
    - reference_id: PMID:12070094
      supporting_text: STM is required to suppress differentiation throughout the meristem dome
- term:
    id: GO:0010582
    label: floral meristem determinacy
  evidence_type: IGI
  original_reference_id: PMID:29743198
  review:
    summary: >-
      STM contributes to floral fate in sensitized reproductive backgrounds,
      including AP1 and UFO genetic contexts. This is a real later developmental
      role, but it is not the primary evolved molecular function of STM.
    action: KEEP_AS_NON_CORE
    reason: >-
      The term is supported for reproductive development, but STM's core role is
      maintenance of meristematic identity by transcriptional regulation. Floral
      meristem determinacy should be retained as a context-specific developmental
      function rather than promoted as the core function.
    supported_by:
    - reference_id: PMID:29743198
      supporting_text: Here, we uncover a role for STM in the specification of flower meristem identity
    - reference_id: PMID:29743198
      supporting_text: stm-2 enhanced the ufo-2 floral fate phenotype
