id: Q9SJN0
gene_symbol: ABI5
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: ABI5 (ABSCISIC ACID-INSENSITIVE 5) is a group-A basic leucine zipper
  (bZIP) transcription factor of Arabidopsis thaliana and a central effector of
  abscisic acid (ABA) signaling. It binds ABA-responsive elements (ABREs;
  ACGT-containing G-box-like cis-elements) in the promoters of ABA- and seed
  maturation-regulated genes, acting as a transcriptional activator. The protein
  contains a C-terminal bZIP domain (basic DNA-contacting region plus a leucine
  zipper) that mediates sequence-specific DNA binding and dimerization; ABI5 binds
  DNA as a homodimer and also forms heterodimers with related ABI5-subfamily
  bZIP factors such as AREB3/DPBF3 and EEL/DPBF4. ABI5 is predominantly expressed
  in seeds and accumulates in the embryo during the latest stages of seed
  maturation, where it activates late embryogenesis-abundant (LEA) genes (e.g.
  Em1, Em6) and other ABA-responsive genes (e.g. RD29B) that confer
  osmotolerance. ABI5 is the major downstream factor mediating ABA inhibition of
  germination and the postgermination developmental arrest checkpoint, holding
  germinated embryos in a quiescent state when water availability is unfavorable,
  and it acts as a common repressor of germination integrating the antagonistic
  ABA and gibberellin pathways. ABI5 transcript and protein levels and activity
  are tightly controlled by ABA through transcriptional induction, SnRK2-mediated
  phosphorylation, ubiquitin/proteasome-dependent degradation (via the E3 ligase
  KEG and others) and SUMO modification. The protein is nuclear-localized,
  consistent with its role as a transcription factor.
