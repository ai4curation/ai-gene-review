core_functions:
- description: Sequence-specific DNA-binding transcription factor that recognizes
    and binds the ABA-responsive element (ABRE) in the promoters of ABA- and seed
    maturation-regulated genes, acting as a transcriptional activator. Binds DNA as
    a homodimer or as heterodimers with related ABI5-subfamily bZIP factors.
  molecular_function:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  directly_involved_in:
  - id: GO:0045893
    label: positive regulation of DNA-templated transcription
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:10760247
    supporting_text: it encodes a member of the basic leucine zipper transcription
      factor family. The previously characterized abi5-1 allele encodes a protein
      that lacks the DNA binding and dimerization domains required for ABI5 function
  - reference_id: PMID:16463099
    supporting_text: ABI3, ABI5 and AREB1 activated transcription of a GUS reporter
      gene driven by the RD29B promoter strongly
- description: Central transcriptional effector of abscisic acid signaling that
    activates late embryogenesis-abundant (LEA) and other ABA-responsive genes
    during seed maturation, and mediates ABA-dependent repression of seed
    germination and the postgermination developmental growth-arrest checkpoint.
  molecular_function:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  directly_involved_in:
  - id: GO:0010187
    label: negative regulation of seed germination
  - id: GO:0009737
    label: response to abscisic acid
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:18941053
    supporting_text: ABI5 acts as the final common repressor of germination in
      response to changes in ABA and GA levels
  - reference_id: PMID:11287670
    supporting_text: ABI5 is necessary to maintain germinated embryos in a quiescent
      state thereby protecting plants from drought
proposed_new_terms: []
suggested_questions:
- question: Through which specific molecular mechanism does ABI5 switch from a
    repressor of germination to an activator of LEA gene transcription, and how is
    this controlled by SnRK2 phosphorylation versus its many interacting regulators
    (KEG, SIZ1, AFP, TAP46/PP2A)?
- question: Are the genome-scale yeast one-hybrid interactions of ABI5 with
    cell-wall, nitrogen, and vascular gene promoters biologically relevant in
    planta, given that ABI5 is predominantly seed-expressed?
