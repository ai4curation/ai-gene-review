- term:
    id: GO:0042176
    label: regulation of protein catabolic process
  evidence_type: IMP
  original_reference_id: PMID:19717618
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      This cell-free study characterizes how RGA (TAP-RGA substrate) is degraded
      via Lys-29-linked ubiquitin chains by SCF(SLY1); it dissects DELLA
      degradation, i.e. RGA is the regulated substrate, not a regulator of a
      protein catabolic process. Assigning RGA the role 'regulation of protein
      catabolic process' over-interprets RGA as an upstream controller of
      proteolysis.
    action: REMOVE
    reason: >-
      The evidence shows RGA being degraded (it is the target of ubiquitin-mediated
      catabolism), not RGA regulating a protein catabolic process. The annotation
      mis-assigns a regulatory role. RGA's own ubiquitination/degradation is a PTM
      captured by UniProt, not a function it enables on other proteins.
    supported_by:
    - reference_id: PMID:19717618
      supporting_text: we used the cell-free degradation of TAP-RGA to test the
        competitive efficiencies of exogenously added mutant ubiquitins.
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IDA
  original_reference_id: PMID:17933900
  qualifier: enables
  review:
    summary: >-
      This annotation assigns intrinsic DNA-binding transcription factor activity
      to RGA based on ChIP evidence of in vivo DELLA-promoter association. However,
      RGA lacks any DNA-binding domain; its in vivo promoter association is
      mediated by partner DNA-binding TFs (IDDs, etc.). DELLAs act as
      transcriptional coactivators/corepressors, not as sequence-specific
      DNA-binding transcription factors.
    action: MODIFY
    reason: >-
      RGA has no DNA-binding domain and does not act as a sequence-specific
      DNA-binding transcription factor; multiple primary studies state DELLAs lack
      DNA-binding motifs. The accurate molecular function is transcription
      coregulator activity (acting through partner TFs).
    proposed_replacement_terms:
    - id: GO:0003712
      label: transcription coregulator activity
    supported_by:
    - reference_id: PMID:17933900
      supporting_text: These GA-signaling repressors are nuclear localized and likely
