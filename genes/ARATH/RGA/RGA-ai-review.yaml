taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  RGA (REPRESSOR OF ga1-3, also RGA1/GRS; locus AT2G01570) is one of the five
  Arabidopsis DELLA proteins, a subfamily within the plant-specific GRAS family
  of transcriptional regulators. It is a nuclear-localized growth repressor that
  acts immediately downstream of the gibberellin (GA) receptor to repress GA
  signaling. RGA has an N-terminal regulatory region containing the conserved
  DELLA and VHYNP/TVHYNP motifs and a C-terminal GRAS domain (LRI, VHIID, LRII,
  PFYRE and SAW subdomains). The DELLA/VHYNP region serves as a receiver domain;
  when bioactive GA binds the soluble GID1 receptors (GID1A/B/C), the GA-GID1
  complex binds the DELLA region of RGA, which promotes recruitment of RGA by
  the F-box protein SLY1/GID2 of an SCF E3 ubiquitin ligase, leading to
  polyubiquitination and rapid 26S-proteasome degradation of RGA and consequent
  derepression of GA responses. RGA lacks a recognizable DNA-binding domain;
  instead it acts largely through protein-protein interactions, functioning as a
  transcriptional cofactor. It binds and titrates/inhibits DNA-binding
  transcription factors (e.g. the bHLH PIFs, BZR1, SPT, MYC2, the MYB-type CCA1,
  and SPL factors), thereby blocking their transcriptional activity, and it also
  acts as a transcriptional coactivator by binding INDETERMINATE-DOMAIN (IDD)
  zinc-finger transcription factors (such as GAF1/IDD2, ENY/IDD1, MGP/IDD3) that
  tether it to target promoters to activate genes including SCL3 and GA
  biosynthetic/receptor genes during GA feedback homeostasis. Through these
  interactions RGA integrates GA signaling with light, brassinosteroid,
  jasmonate, auxin, ethylene, cold and circadian-clock pathways. RGA acts
  partially redundantly with the closely related DELLA GAI, with RGA playing the
  more dominant role in repressing GA-promoted vegetative growth (stem and
  hypocotyl elongation, leaf expansion), trichome initiation, floral initiation,
  fertility/anther and pollen development, and root growth. Its activity is
  further modulated by phosphorylation and by O-fucosylation by SPINDLY.
