- term:
    id: GO:0000976
    label: transcription cis-regulatory region binding
  evidence_type: IPI
  original_reference_id: PMID:22037706
  qualifier: enables
  review:
    summary: >-
      This annotation derives from a high-throughput enhanced yeast one-hybrid
      (eY1H) screen in which RGA scored as binding stele-expressed promoters. RGA
      lacks any recognizable DNA-binding domain and is well documented to
      associate with promoters only indirectly, via DNA-binding transcription
      factors (e.g. IDDs). eY1H readouts for GRAS/DELLA proteins reflect this
      indirect tethering or assay artifacts rather than intrinsic
      sequence-specific DNA binding.
    action: REMOVE
    reason: >-
      RGA has no DNA-binding domain; multiple primary studies state DELLAs lack
      DNA-binding motifs and associate with promoters only indirectly through
      partner transcription factors. A direct cis-regulatory-region-binding MF
      annotation mis-assigns DNA-binding activity to RGA.
    supported_by:
    - reference_id: PMID:25035403
      supporting_text: a chromatin immunoprecipitation ( ChIP ) assay showed an in
        vivo association of DELLAs with promoters of several genes, although DELLAs
        lack known DNA binding motifs
    - reference_id: PMID:24821766
      supporting_text: because DELLA lacks a DNA-binding domain, intermediate
        protein(s) mediating the DELLA/DNA interaction are believed to be necessary
        for activating DELLA target genes.
