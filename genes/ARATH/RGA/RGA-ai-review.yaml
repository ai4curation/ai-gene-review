  review:
    summary: >-
      RGA is a nuclear-localized protein. Both transient GFP-RGA in onion
      epidermis and stable GFP-RGA in transgenic Arabidopsis localize to the
      nucleus, and nuclear localization is required for its function as a
      transcriptional repressor. This electronic location annotation is well
      supported.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:9490740
      supporting_text: we demonstrated that a transiently expressed green fluorescent
        protein-RGA fusion protein is localized to the nucleus in onion epidermal
        cells.
- term:
    id: GO:0009740
    label: gibberellic acid mediated signaling pathway
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      RGA is a core repressor acting in the GA-mediated signaling pathway,
      immediately downstream of the GID1 receptor. This ARBA electronic
      annotation captures the central, defining role of RGA and is strongly
      supported by experimental literature.
    action: ACCEPT
    reason: >-
      This is the central, defining biological process for RGA. While the bare
      pathway term is less specific than the negative-regulation child term, it
      is correct and is the core function. Retained as a core annotation.
    supported_by:
    - reference_id: PMID:9490740
      supporting_text: This indicates that RGA is a negative regulator of the GA signal
        transduction pathway.
- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:15155881
  qualifier: enables
  review:
    summary: >-
      This IPI captures the direct interaction of RGA (via its C-terminal GRAS
      domain) with the F-box protein SLY1/GID2, which recruits RGA to the
      SCF(SLY1) E3 ubiquitin ligase for GA-induced degradation. The bare
      'protein binding' term is uninformative.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Per curation guidelines, GO:0005515 protein binding is too generic and
      should be avoided in favor of an informative MF term. The real interaction
      (RGA GRAS domain binding the SLY1 F-box protein) is meaningful and central
      to RGA turnover, but is flagged rather than removed because the underlying
      interaction is genuine.
    supported_by:
    - reference_id: PMID:15155881
      supporting_text: we demonstrated that SLY1 interacts directly with RGA and GA
        INSENSITIVE (GAI, a closely related DELLA protein) via their C-terminal GRAS
        domain.
