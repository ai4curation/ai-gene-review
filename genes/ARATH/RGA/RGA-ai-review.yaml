core_functions:
- description: >-
    Nuclear repressor of the gibberellin (GA) signaling pathway; RGA acts
    immediately downstream of the GID1 GA receptor as one of the major DELLA
    growth repressors, maintaining the repressed state of GA responses until GA
    triggers its degradation.
  molecular_function:
    id: GO:0003712
    label: transcription coregulator activity
  directly_involved_in:
  - id: GO:0009938
    label: negative regulation of gibberellic acid mediated signaling pathway
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:11606552
    supporting_text: These results demonstrate that RGA and GAI have partially
      redundant functions in maintaining the repressive state of the GA-signaling
      pathway, but RGA plays a more dominant role than GAI.
  - reference_id: PMID:11449051
    supporting_text: the GA signal appears to derepress the GA signaling pathway by
      degrading the repressor protein RGA.
- description: >-
    Transcriptional cofactor that, lacking its own DNA-binding domain, binds
    DNA-binding transcription factors to control gene expression. It inhibits
    (titrates) growth-promoting transcription factors such as the bHLH PIFs,
    BZR1, SPT, the MYB CCA1, SPL factors and CO, blocking their DNA
    binding/activity, and coactivates IDD zinc-finger factors (GAF1/IDD2,
    ENY/IDD1, MGP/IDD3) to activate DELLA-induced genes (e.g. SCL3, GA
    biosynthetic and GA receptor genes) during GA feedback homeostasis.
  molecular_function:
    id: GO:0140297
    label: DNA-binding transcription factor binding
  directly_involved_in:
  - id: GO:0006355
    label: regulation of DNA-templated transcription
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:24821766
    supporting_text: the coregulators DELLA and SCL3, using IDDs as transcriptional
      scaffolds for DNA binding, antagonistically regulate the expression of their
      downstream targets
  - reference_id: PMID:22820377
    supporting_text: These results indicate that RGA specifically interacts with
      BZR1 to inhibit its abilities to bind DNA and regulate transcription.
- description: >-
    Substrate of the GA-GID1-SCF(SLY1) degradation module. RGA binds the
    activated GA-GID1 receptor complex through its N-terminal DELLA/VHYNP receiver
    region, which promotes recruitment by the F-box protein SLY1 and subsequent
    SCF(SLY1)-mediated ubiquitination and 26S-proteasome degradation, thereby
    derepressing GA responses; this is the key regulatory switch controlling RGA
    activity.
  molecular_function:
    id: GO:0003712
    label: transcription coregulator activity
  directly_involved_in:
  - id: GO:0009740
    label: gibberellic acid mediated signaling pathway
  locations:
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: PMID:17194763
    supporting_text: the GA-GID1 complex promotes the interaction between RGA and
      the F-box protein SLY1, a component of the SCF(SLY1) E3 ubiquitin ligase that
      targets the DELLA protein for degradation.
  - reference_id: PMID:15155881
    supporting_text: SLY1 interacts directly with RGA and GA INSENSITIVE (GAI, a
      closely related DELLA protein) via their C-terminal GRAS domain.
proposed_new_terms:
- proposed_name: gibberellin receptor binding
  proposed_definition: >-
    Binding to a gibberellin (GA) receptor, such as the soluble GID1 GA receptor;
    for DELLA proteins this GA-dependent binding via the DELLA/VHYNP receiver
    region is the regulatory event that triggers DELLA inactivation and
    degradation.
  proposed_parent:
    id: GO:0005515
    label: protein binding
  justification: >-
    Multiple studies document direct, GA-dependent binding of RGA to the GID1A/B/C
    receptors via its DELLA domain as the key upstream regulatory step; no existing
    MF term specifically captures GA-receptor binding by a DELLA substrate.
  supported_by:
  - reference_id: PMID:17416730
    supporting_text: we propose that the DELLA domain functions as a receiver domain
      for activated GA receptors.
  - reference_id: PMID:16709201
    supporting_text: A two-hybrid yeast system only showed in vivo interaction in
      the presence of GA(4) between each AtGID1 and the Arabidopsis DELLA proteins
      (AtDELLAs)
suggested_questions:
- Which DELLA target genes are activated through the IDD/GAF1 coactivator route
  versus repressed through TF titration, and how is the balance set in different
  tissues?
- To what extent does O-fucosylation by SPINDLY versus phosphorylation
  quantitatively tune RGA's affinity for its various transcription-factor partners
  in vivo?
suggested_experiments:
- Genome-wide profiling (ChIP-seq plus partner-TF co-occupancy) of RGA across
  tissues to define the direct coactivated versus titrated target sets and confirm
  that RGA promoter occupancy depends on partner DNA-binding transcription factors.
- Structure-guided separation-of-function mutations in the GRAS subdomains (LRI,
  SAW) to uncouple coactivator (IDD-binding) from inhibitory (PIF/BZR1-binding)
  functions and test their distinct developmental outputs.
