      processed C-terminal domain.
    action: NEW
    reason: >-
      The Falcon synthesis and primary literature support EIN2 as the central
      non-enzymatic signaling transducer/adaptor in the ethylene pathway, while
      no existing GOA row captures this direct molecular role.
    supported_by:
    - reference_id: file:ARATH/EIN2/EIN2-deep-research-falcon.md
      supporting_text: >-
        The report summarizes EIN2 as the central ethylene signaling transducer
