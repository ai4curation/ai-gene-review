  title: Falcon deep research report for Arabidopsis EIN2
  findings:
  - statement: >-
      EIN2 is the central ethylene signaling transducer, with an ER-localized
      NRAMP-like N-terminal region and a processed C-terminal signaling domain
      that acts in nuclear and P-body-linked outputs.
  - statement: >-
      The report treats NRAMP-family metal transporter inferences as misleading
      for EIN2 because Arabidopsis evidence supports ethylene signaling rather
      than iron or manganese transport.
