core_functions:
- description: >-
    ER membrane EIN2 acts as the central ethylene signaling adaptor downstream
    of ethylene receptors and CTR1. Ethylene relieves CTR1 phosphorylation,
    enabling EIN2 C-terminal processing and movement of the C-terminal signaling
    domain to downstream nuclear and cytoplasmic signaling sites.
  molecular_function:
    id: GO:0035591
    label: signaling adaptor activity
  directly_involved_in:
  - id: GO:0009873
    label: ethylene-activated signaling pathway
  locations:
  - id: GO:0005789
    label: endoplasmic reticulum membrane
  - id: GO:0005634
    label: nucleus
  supported_by:
  - reference_id: file:ARATH/EIN2/EIN2-deep-research-falcon.md
    supporting_text: >-
      The Falcon report summarizes EIN2 as an ER membrane signal transducer
      whose C-terminal domain is released for downstream ethylene signaling.
  - reference_id: PMID:23132950
    supporting_text: >-
      Here we demonstrate that CTR1 interacts with and directly phosphorylates
      the cytosolic C-terminal domain of EIN2.
    reference_section_type: ABSTRACT
  - reference_id: PMID:22936567
    supporting_text: >-
      phosphorylation-regulated proteolytic processing of EIN2 triggers its
      endoplasmic reticulum (ER)-to-nucleus translocation.
    reference_section_type: ABSTRACT
- description: >-
    The cleaved EIN2 C-terminal domain binds EBF1/EBF2 mRNA 3' UTRs and directs
    translational repression in cytoplasmic P-bodies, promoting accumulation of
    EIN3/EIL1 and activation of ethylene responses.
  molecular_function:
    id: GO:0003730
    label: mRNA 3'-UTR binding
  directly_involved_in:
  - id: GO:0009873
    label: ethylene-activated signaling pathway
  locations:
  - id: GO:0000932
    label: P-body
  supported_by:
