id: Q9S814
gene_symbol: EIN2
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  EIN2 is the central Arabidopsis ethylene signal transducer. Full-length EIN2
  is an ER membrane protein with an NRAMP-like N-terminal membrane domain and a
  large cytosolic C-terminal signaling domain. Ethylene inactivates receptor/CTR1
  repression, allowing EIN2 C-terminal dephosphorylation, proteolytic release,
  nuclear and P-body localization, repression of EBF1/EBF2 mRNA translation,
  EIN3/EIL1 stabilization, and chromatin-level activation of ethylene-responsive
  genes. The NRAMP-like domain supports membrane localization and evolutionary
  context, but available Arabidopsis evidence does not support annotating EIN2 as
  a metal transporter.
existing_annotations:
