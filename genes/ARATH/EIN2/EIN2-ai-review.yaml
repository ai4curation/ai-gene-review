suggested_questions:
- question: >-
    What protease or protease complex directly cleaves EIN2-CEND during ethylene
    signaling, and is the same processing machinery used during methyl
    jasmonate- or hypoxia-triggered EIN2 activation?
  experts:
  - Hong Qiao
  - Joseph R. Ecker
  - Hongwei Guo
- question: >-
    Does the NRAMP-like N-terminal domain of EIN2 retain any ion transport or
    ion-sensing activity, or is it a structurally repurposed membrane-tethering
    module in the EIN2 subfamily?
  experts:
  - Joseph R. Ecker
  - Chi-Kuang Wen
suggested_experiments:
- hypothesis: >-
    EIN2's NRAMP-like membrane domain is not an active metal transporter in
    planta.
  description: >-
    Express full-length EIN2 and N-terminal EIN2 membrane-domain constructs in a
    transporter-deficient yeast or plant heterologous assay alongside Arabidopsis
    NRAMP positive controls; measure manganese and iron transport, localization,
    and ethylene-pathway complementation separately.
  experiment_type: heterologous transport assay
- hypothesis: >-
    EIN2 nuclear chromatin regulation and P-body translational repression are
    separable outputs of the cleaved C-terminal domain.
  description: >-
    Generate endogenous EIN2 separation-of-function alleles that selectively
    disrupt ENAP1/chromatin association or EBF1/2 3'UTR/P-body association, then
    compare histone acetylation, EBF translation, EIN3 stabilization, and
    ethylene response phenotypes.
  experiment_type: endogenous allele engineering and multi-omic phenotyping
