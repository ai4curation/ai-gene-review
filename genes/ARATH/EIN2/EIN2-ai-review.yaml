    reference_section_type: ABSTRACT
  - reference_id: PMID:26496607
    supporting_text: >-
      ethylene induces EIN2 to associate with 3' UTRs and target ... EBF1/2 mRNA
      to cytoplasmic processing-body (P-body)
    reference_section_type: ABSTRACT
  - reference_id: PMID:26496608
    supporting_text: >-
      the signaling molecule EIN2 and the nonsense-mediated decay proteins UPFs
      play a central role in this ethylene-induced translational response.
    reference_section_type: ABSTRACT
- description: >-
    Nuclear EIN2-CEND associates with chromatin/histone regulatory machinery and
