proposed_new_terms: []
suggested_questions:
- question: >-
    Which AG-bound regulatory elements and cofactors distinguish direct
    activation targets from direct repression targets during stages 3-6 of
    floral meristem termination?
- question: >-
    Which AG protein interactions beyond SEP-containing MADS complexes are
    physiologically required in vivo, and which are only detectable in
    interaction screens or in vitro assays?
- question: >-
    How much of the cytoplasmic AG pool reported in live imaging reflects
    regulated trafficking, protein storage, or experimental fusion behavior?
suggested_experiments:
- experiment_type: Time-resolved ChIP-seq and perturbation transcriptomics
  hypothesis: >-
    Stage-specific AG binding and partner composition determine whether a target
    is activated or repressed.
  description: >-
    Perform stage-resolved AG ChIP-seq or CUT&RUN in floral meristems, paired
    with rapid AG perturbation RNA-seq and chromatin mark profiling, to separate
    direct activation targets from direct repression targets such as WUS.
- experiment_type: Structure-guided interaction rescue
  hypothesis: >-
    SEP-dependent AG tetramerization is required for a subset of AG targets and
    for normal stamen/carpel identity.
  description: >-
    Test AG K-domain and SEP-interaction interface variants in ag mutant
    complementation lines, then compare floral phenotype, complex formation,
    and target-gene occupancy.
- experiment_type: In vivo validation of non-MADS AG interactors
  hypothesis: >-
    Some non-MADS AG interactors from in vitro or high-throughput screens are
    context-specific cofactors rather than generic binding partners.
  description: >-
    Use reciprocal co-immunoprecipitation or proximity labeling in staged floral
    tissue, followed by mutant or knockdown assays for candidate partners such
    as FLOR1/VSP1 and gynoecium TF-screen hits.
