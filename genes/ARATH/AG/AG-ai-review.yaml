id: P17839
gene_symbol: AG
product_type: PROTEIN
status: COMPLETE
taxon:
  id: NCBITaxon:3702
  label: Arabidopsis thaliana
description: >-
  AGAMOUS (AG; At4g18960; UniProt P17839) encodes the canonical Arabidopsis
  C-class floral homeotic MIKC-type MADS-box transcription factor. AG contains
  an N-terminal MADS DNA-binding domain and a plant MADS K-box/coiled-coil
  region that supports homo- and heteromeric MADS protein complex formation.
  The protein acts primarily in the nucleus of developing floral meristems and
  inner floral whorls, where it binds CArG-containing cis-regulatory regions as
  part of AG/SEPALLATA-containing MADS complexes. Its core developmental roles
  are specification and development of stamens and carpels, maintenance of
  reproductive organ identity, and termination of floral meristem stem cell
  activity through transcriptional regulation, including repression of WUSCHEL
  and activation of downstream organogenesis and determinacy programs. PANTHER
  family PTHR48019 and InterPro signatures place AG in the MADS-box/MEF2
  transcription factor family, consistent with the experimentally supported
  DNA-binding and dimerization functions.
