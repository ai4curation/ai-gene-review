- id: file:ARATH/GL1/GL1-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis GL1
  findings:
  - statement: GL1 is the R2R3-MYB activator in MBW complexes with GL3/EGL3 and TTG1 that promote trichome cell fate and epidermal patterning.
  - statement: Recent synthesis emphasizes competitive GL1/GL3/TTG1 and R3-MYB interactions as the mechanism for trichome spacing rather than a catalytic activity.
- id: file:ARATH/GL1/GL1-uniprot.txt
  title: UniProt record for Arabidopsis GL1
  findings:
  - statement: UniProt identifies GL1/P27900 as trichome differentiation protein GL1/AtMYB0, a nuclear transcription activator that promotes trichome formation with TTG1 and GL3.
- id: file:interpro/panther/PTHR47999/PTHR47999-entries.csv
  title: PANTHER PTHR47999 family entries for Arabidopsis GL1
  findings:
  - statement: PTHR47999 places GL1 in a broad plant MYB transcription factor family and subfamily related to WER-like R2R3-MYB regulators; this supports conserved DNA-binding transcription-factor function but not every GL1-specific developmental annotation.
