description: 'GLABRA1 (GL1/AtMYB0) is an Arabidopsis R2R3-MYB transcription factor that acts in the nucleus as the MYB component of trichome-promoting MYB-bHLH-WD40 regulatory complexes. GL1 partners primarily with GL3/EGL3-family bHLH proteins and TTG1 to activate epidermal cell-fate and trichome differentiation programs, including GL2 and mobile R3-MYB inhibitor circuits. Hormone annotations for gibberellin and jasmonate reflect upstream or contextual modulation of this transcriptional module rather than separate biochemical activities.'
