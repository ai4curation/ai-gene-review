references:
- id: GO_REF:0000044
  title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping, accompanied by conservative changes to GO terms applied by UniProt
  findings:
  - statement: UniProt subcellular-location mappings provide conservative localization support when consistent with transcription-factor biology.
- id: GO_REF:0000108
  title: Automatic assignment of GO terms using logical inference, based on on inter-ontology links
  findings:
  - statement: Logical inference supplies broad transcriptional-regulation process annotations from molecular function terms; these should often be narrowed to the gene-specific regulatory context.
- id: GO_REF:0000117
  title: Electronic Gene Ontology annotations created by ARBA machine learning models
  findings:
  - statement: ARBA machine-learning annotations should be treated as broad predictions and retained only where consistent with experimental Arabidopsis evidence.
- id: GO_REF:0000122
  title: AtSubP analysis
  findings:
  - statement: AtSubP prediction supports localization hypotheses but is weaker than direct localization experiments.
