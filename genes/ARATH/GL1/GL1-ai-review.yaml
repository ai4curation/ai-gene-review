suggested_questions:
- question: Should GL1 DNA-binding rows be normalized to transcription cis-regulatory region binding when direct promoter-binding evidence is available?
- question: Should hormone-context annotations for GL1 be represented as regulation of the trichome MBW module rather than GL1 acting in hormone signaling pathways?
suggested_experiments:
- description: Perform GL1 ChIP-seq or CUT&RUN in young leaf primordia together with rapid GL1 perturbation RNA-seq to separate direct trichome regulatory targets from downstream epidermal phenotypes.
