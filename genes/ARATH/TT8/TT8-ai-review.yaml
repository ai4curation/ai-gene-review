  label: Arabidopsis thaliana
description: 'TRANSPARENT TESTA8 (TT8/bHLH42) is an Arabidopsis bHLH transcription factor and MBW-complex subunit specialized for seed coat and flavonoid transcriptional regulation. TT8 works with TT2, MYB5, MYB75/PAP1-family MYBs, and TTG1 to activate late flavonoid, anthocyanin, and proanthocyanidin pathway genes such as DFR and BAN/ANR. Trichome and jasmonate annotations reflect context-dependent MBW regulation, but TT8 core biology is nuclear transcriptional regulation of flavonoid/proanthocyanidin programs.'
