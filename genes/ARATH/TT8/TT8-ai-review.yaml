- id: file:ARATH/TT8/TT8-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis TT8
  findings:
  - statement: TT8 is the bHLH component of MYB-bHLH-WD40 transcriptional activation complexes controlling seed proanthocyanidin and anthocyanin/flavonoid genes.
  - statement: The major seed MBW complex TT2-TT8-TTG1 activates direct targets including DFR, LDOX/ANS, BAN/ANR, TT12, TT19, and AHA10.
- id: file:ARATH/TT8/TT8-uniprot.txt
  title: UniProt record for Arabidopsis TT8
  findings:
  - statement: UniProt identifies TT8/Q9FT81 as a bHLH transcription activator that controls flavonoid pigmentation and regulates BANYULS and DFR expression.
- id: file:interpro/panther/PTHR46266/PTHR46266-entries.csv
  title: PANTHER PTHR46266 family entries for Arabidopsis TT8
  findings:
  - statement: PTHR46266 places TT8 and GL3 in plant-specific bHLH transcription activators; TT8 subfamily assignment supports conserved bHLH transcription factor and dimerization functions, while seed flavonoid specificity comes from Arabidopsis evidence.
