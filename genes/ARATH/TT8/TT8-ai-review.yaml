suggested_questions:
- question: Should TT8 core process annotations emphasize proanthocyanidin/flavonoid transcriptional regulation over broad seed development?
- question: Can direct TT8 localization evidence be added to strengthen nucleus annotations beyond bHLH-domain inference?
suggested_experiments:
- description: Perform TT8 CUT&RUN/ChIP-seq in developing siliques with matched tt8 rescue RNA-seq to refine direct proanthocyanidin and seed coat target genes.
