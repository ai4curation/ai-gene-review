core_functions:
- description: Nuclear bHLH transcription factor in seed and flavonoid MBW complexes. TT8 partners with TT2/MYB5/MYB75-family MYBs and TTG1 to bind regulatory regions and activate RNA polymerase II transcription of late flavonoid, anthocyanin, and proanthocyanidin biosynthetic and transport genes in seed coat and seedling contexts.
