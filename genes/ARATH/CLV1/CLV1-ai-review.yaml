core_functions:
  - description: >-
      Plasma membrane CLV3/CLE peptide receptor kinase signaling. CLV1 binds
      CLV3-family CLE peptides through its extracellular LRR domain, forms
      CLV1/BAM/CIK receptor complexes, and uses its cytoplasmic Ser/Thr kinase
      activity to phosphorylate signaling partners such as KAPP, CIKs, and
      PBL34/35/36. This pathway restricts meristem stem cell proliferation and
      maintains shoot, floral, and root meristem homeostasis.
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    directly_involved_in:
      - id: GO:0007172
        label: signal complex assembly
      - id: GO:0009934
        label: regulation of meristem structural organization
      - id: GO:0035556
        label: intracellular signal transduction
    locations:
      - id: GO:0005886
        label: plasma membrane
    supported_by:
      - reference_id: PMID:19525968
        supporting_text: >-
          Post-translational arabinosylation of CLV3 is critical for its
          biological activity and high-affinity binding to its receptor CLV1.
      - reference_id: PMID:29581511
        supporting_text: >-
          CIKs function as co-receptors of CLV1, CLV2/CRN and RPK2 to mediate
          CLV3 signalling through phosphorylation.
      - reference_id: PMID:34935965
        supporting_text: >-
          Further biochemical assays revealed that PBL34/35/36 interacted with
          CLV1, BAM1/3, and CIKs, and were phosphorylated by CLV1 and BAM1.
      - reference_id: PMID:9160749
        supporting_text: >-
          Arabidopsis plants homozygous for mutations at the CLAVATA1 (CLV1)
          locus accumulate excess undifferentiated cells.
proposed_new_terms: []
suggested_questions:
  - question: >-
      Which CLV1-family binding partners from high-throughput LRR-RK interaction
      datasets are reproducible in native meristem tissue, and which are
      biologically relevant CLV1 signaling partners?
  - question: >-
      How much of CLV1's root and stomatal patterning activity is unique to
      CLV1 versus redundant with BAM1/BAM3 and other CLV1-family receptors?
  - question: >-
      What are the in vivo phosphorylation sites on CIK, MAZ/Pti1-like, and
      PBL34/35/36 proteins that are directly dependent on CLV1 catalytic
      activity after specific CLE peptide treatments?
suggested_experiments:
  - hypothesis: >-
      CLV1 directly phosphorylates a defined subset of CIK and PBL/RLCK targets
      after CLV3 perception in shoot meristems.
    description: >-
      Compare phosphoproteomes from native-pCLV1 rescue lines expressing wild
      type CLV1 versus kinase-dead CLV1(K720E), with and without short CLV3p
      treatment. Enrich CLV1 complexes from dissected apices and quantify CIK,
      PBL34/35/36, MAZ/Pti1-like, and KAPP phosphorylation sites by targeted
      mass spectrometry.
    experiment_type: phosphoproteomics
  - hypothesis: >-
      Ligand-dependent CLV1 trafficking to the lytic vacuole tunes signal output
      without being required for initial CLV3 perception.
    description: >-
      Use endocytosis- or vacuolar-trafficking-impaired backgrounds carrying
      functional CLV1 fluorescent reporters, then measure CLV3 dose-response,
      WUS reporter output, receptor abundance at the plasma membrane, and
      meristem size over time.
    experiment_type: live imaging and genetic epistasis
