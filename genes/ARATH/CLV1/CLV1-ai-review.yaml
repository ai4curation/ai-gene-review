  - meristem-homeostasis
description: >-
  CLV1 is the Arabidopsis CLAVATA1 leucine-rich repeat receptor-like Ser/Thr
  kinase. It is a single-pass plasma membrane receptor with extracellular LRRs
  and a cytoplasmic kinase domain, placed by PANTHER in the plant LRR
  receptor-like Ser/Thr kinase family and CLAVATA1 subfamily. CLV1 binds CLV3
  and related CLE peptides, forms CLV1/BAM receptor complexes with CIK
  co-receptors and cytoplasmic kinase effectors, and transduces phosphorylation
  signals that restrict stem cell proliferation and promote meristem
  homeostasis. Ligand perception also promotes CLV1 removal from the plasma
  membrane and trafficking to the lytic vacuole, consistent with feedback
  attenuation of receptor signaling.
existing_annotations:
  - term:
      id: GO:0007172
      label: signal complex assembly
    evidence_type: IDA
    original_reference_id: PMID:10072399
    review:
      summary: >-
        CLV1 is experimentally observed in 185-kD and CLV3-dependent 450-kD
        receptor complexes; the 450-kD complex includes KAPP and a Rho
        GTPase-related protein. This directly supports signal complex assembly
        as part of the CLV3-CLV1 signaling mechanism.
      action: ACCEPT
      reason: >-
        The term captures a specific mechanistic event in CLV1 signaling rather
        than a downstream developmental phenotype.
      supported_by:
        - reference_id: PMID:10072399
          supporting_text: >-
            CLV1 is present in two protein complexes in vivo. One is approximately
            185 kD, and the other is approximately 450 kD.
        - reference_id: PMID:10072399
          supporting_text: >-
            CLV3 functions to promote the assembly of the active 450-kD complex,
            which then relays signal transduction through a Rho GTPase.
  - term:
      id: GO:0009934
      label: regulation of meristem structural organization
    evidence_type: IMP
    original_reference_id: PMID:9160749
    review:
      summary: >-
        Loss of CLV1 causes Arabidopsis shoot and floral meristems to accumulate
        excess undifferentiated cells. This is the canonical biological process
        regulated by CLV1 and is supported by mutant phenotype and expression
        data.
      action: ACCEPT
      reason: >-
        This is a core biological role of CLV1 in maintaining meristem size and
        organization through CLV3/CLE receptor signaling.
      supported_by:
        - reference_id: PMID:9160749
          supporting_text: >-
            Arabidopsis plants homozygous for mutations at the CLAVATA1 (CLV1)
            locus accumulate excess undifferentiated cells.
        - reference_id: PMID:9160749
          supporting_text: >-
            CLV1 expression in the inflorescence is specifically associated with
            meristematic activity.
        - reference_id: file:ARATH/CLV1/CLV1-deep-research-falcon.md
          supporting_text: >-
            CLV1 (Q9SYQ8) is best annotated as a plasma-membrane LRR receptor
            Ser/Thr kinase
  - term:
