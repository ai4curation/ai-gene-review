references:
  - id: GO_REF:0000002
    title: Gene Ontology annotation through association of InterPro records with GO terms
    findings:
      - statement: >-
          InterPro/PANTHER kinase-domain annotations correctly identify CLV1 as
          a plant LRR receptor-like protein kinase, but generic kinase and ATP
          binding terms should be interpreted through the specific CLV1
          receptor-kinase evidence.
  - id: GO_REF:0000003
    title: Gene Ontology annotation based on Enzyme Commission mapping
    findings:
      - statement: >-
          EC-based Ser/Thr kinase mapping is consistent with CLV1 catalytic
          evidence from KAPP phosphorylation, autophosphorylation, and
          phosphorylation of PBL34/35/36.
  - id: GO_REF:0000024
    title: Manual transfer of experimentally-verified manual GO annotation data to orthologs by curator judgment of sequence similarity
    findings:
      - statement: >-
          Orthology transfer to protein serine kinase activity is consistent
          with direct CLV1 autophosphorylation evidence.
  - id: GO_REF:0000044
    title: Gene Ontology annotation based on UniProtKB/Swiss-Prot Subcellular Location vocabulary mapping
    findings:
      - statement: >-
          UniProtKB subcellular-location mapping to plasma membrane is supported
          by multiple CLV1 localization experiments.
  - id: GO_REF:0000116
    title: Automatic Gene Ontology annotation based on Rhea mapping
    findings:
      - statement: >-
          Rhea-based protein serine kinase inference is compatible with CLV1's
          experimentally supported Ser/Thr kinase activity.
  - id: GO_REF:0000117
    title: Electronic Gene Ontology annotations created by ARBA machine learning models
    findings:
      - statement: >-
          ARBA broad developmental annotations are directionally correct but
          should be replaced with meristem-specific terms for CLV1.
  - id: GO_REF:0000122
    title: AtSubP analysis
    findings:
      - statement: >-
          Computational plasma membrane localization is supported by direct CLV1
          localization studies.
  - id: PMID:9160749
    title: The CLAVATA1 gene encodes a putative receptor kinase that controls shoot and floral meristem size in Arabidopsis.
    findings:
      - statement: CLV1 controls shoot and floral meristem size.
        supporting_text: >-
          Arabidopsis plants homozygous for mutations at the CLAVATA1 (CLV1)
          locus accumulate excess undifferentiated cells.
      - statement: CLV1 encodes an LRR receptor kinase associated with meristematic activity.
        supporting_text: >-
          It encodes a putative receptor kinase, suggesting a role in signal
          transduction. The extracellular domain is composed of 21 tandem
          leucine-rich repeats
  - id: PMID:10080719
    title: Genetic and physical characterization of a region of Arabidopsis chromosome 1 containing the CLAVATA1 gene.
    findings:
      - statement: >-
          This reference primarily supports genomic characterization of the CLV1
          locus, not a specific cell differentiation function.
        supporting_text: >-
          We have characterized a region of chromosome 1, surrounding the
          CLAVATA1 (CLV1) locus.
  - id: PMID:10072399
    title: The CLAVATA1 receptor-like kinase requires CLAVATA3 for its assembly into a signaling complex that includes KAPP and a Rho-related protein.
    findings:
      - statement: CLV1 forms a CLV3-dependent 450-kD signaling complex.
        supporting_text: >-
          CLV3 functions to promote the assembly of the active 450-kD complex,
          which then relays signal transduction through a Rho GTPase.
      - statement: The 450-kD CLV1 complex contains KAPP and a Rho GTPase-related protein.
        supporting_text: >-
          The 450-kD complex contains the protein phosphatase KAPP, which is a
          negative regulator of CLV1 signaling, and a Rho GTPase-related protein.
  - id: PMID:9294234
    title: A possible role for kinase-associated protein phosphatase in the Arabidopsis CLAVATA1 signaling pathway.
    findings:
      - statement: CLV1 phosphorylates itself and KAPP.
        supporting_text: >-
          CLV1 has kinase activity: it phosphorylates both itself and KAPP.
      - statement: KAPP binds and dephosphorylates CLV1.
        supporting_text: >-
          KAPP binds and dephosphorylates CLV1.
  - id: PMID:9701578
    title: Control of meristem development by CLAVATA1 receptor kinase and kinase-associated protein phosphatase interactions.
    findings:
      - statement: KAPP binds autophosphorylated CLV1 in vitro and co-immunoprecipitates with CLV1 from meristematic tissue.
        supporting_text: >-
          KAPP binds directly to autophosphorylated CLV1 in vitro and
          co-immunoprecipitates with CLV1 in plant extracts derived from
          meristematic tissue.
      - statement: KAPP acts as a negative regulator of CLV1 signaling.
        supporting_text: >-
          These data suggest that KAPP functions as a negative regulator of CLV1
          signaling in plant development.
  - id: PMID:10393905
    title: Kinase interaction domain of kinase-associated protein phosphatase, a phosphoprotein-binding domain.
    findings:
      - statement: The KAPP kinase interaction domain binds plant receptor-like kinases, including CLV1.
        supporting_text: >-
          Kinase-associated protein phosphatase interacts specifically with plant
          receptor-like protein kinases.
  - id: PMID:19452453
    title: Proteomic profiling of tandem affinity purified 14-3-3 protein complexes in Arabidopsis thaliana.
    findings:
      - statement: >-
          The study identifies putative 14-3-3 clients by TAP-MS; any CLV1
          interaction from this source should be treated as high-throughput and
          non-core unless independently validated.
        supporting_text: >-
          The identification here of 121 putative clients provides support for
          in vivo 14-3-3 interactions with a diverse array of proteins
  - id: PMID:19525968
    title: A glycopeptide regulating stem cell fate in Arabidopsis thaliana.
    findings:
      - statement: Arabinosylated mature CLV3 peptide binds CLV1 with high affinity.
        supporting_text: >-
          Post-translational arabinosylation of CLV3 is critical for its
          biological activity and high-affinity binding to its receptor CLV1.
  - id: PMID:19843317
    title: Analysis of interactions among the CLAVATA3 receptors reveals a direct interaction between CLAVATA2 and CORYNE in Arabidopsis.
    findings:
      - statement: CLV1 interacts weakly with CRN and can interact with CLV2-CRN heterodimers.
        supporting_text: >-
          Additional LCI assays showed that CLV1 did not interact with CLV2, but
          can interact weakly with CRN.
  - id: PMID:19933383
    title: Stem cell signaling in Arabidopsis requires CRN to localize CLV2 to the plasma membrane.
    findings:
      - statement: CLV1 forms homomers at the plasma membrane independently of CLV2 and CRN.
        supporting_text: >-
          CLV1 forms homomers independently of CLV2 and CRN at the PM.
      - statement: CLV3 signal perception involves a plasma membrane CLV1 homodimer.
        supporting_text: >-
          We propose that the CLV3 signal is perceived by a tetrameric CLV2/CRN
          complex and a CLV1 homodimer that localize to the PM and can interact
          via CRN.
  - id: PMID:20626648
    title: CLAVATA2 forms a distinct CLE-binding receptor complex regulating Arabidopsis stem cell specification.
    findings:
      - statement: CLV1 binds the CLV3-derived CLE peptide and forms CLV1/BAM receptor complexes.
        supporting_text: >-
          CLV2, CLV1 and the CLV1 homologs BAM1 and BAM2 all bind to the
          CLV3-derived CLE peptide with similar kinetics
      - statement: CLV1 and BAM receptor kinases form stable complexes.
        supporting_text: >-
          We observed robust co-IP between CLV1-CLV1, CLV1-BAM1, CLV1-BAM2,
          BAM1-BAM1, and BAM1-BAM2
  - id: PMID:21051944
    title: Membrane distributions of two ligand-binding receptor complexes in the CLAVATA pathway.
    findings:
      - statement: CLV1 primarily co-localizes with a plasma membrane marker.
        supporting_text: >-
          All tested proteins measurably accumulate at the plasma membrane.
      - statement: CLV1 is more plasma-membrane enriched than CLV2 in these assays.
        supporting_text: >-
          While CLV1 primarily co-localizes with a plasma membrane marker, CLV2
          shows greater co-localization with an endoplasmic reticulum (ER)
          marker.
  - id: PMID:21333538
    title: Plant stem cell signaling involves ligand-dependent trafficking of the CLAVATA1 receptor kinase.
    findings:
      - statement: CLV3 promotes CLV1 depletion from the plasma membrane and trafficking to lytic vacuoles.
        supporting_text: >-
          plasma membrane-localized CLV1 is reduced in concentration by CLV3,
          which causes trafficking of CLV1 to lytic vacuoles.
      - statement: CLV3 is necessary and sufficient for CLV1 lytic vacuole trafficking in apical meristems.
        supporting_text: >-
          CLV3 is both necessary and sufficient to drive depletion of CLV1 from
          the PM in apical meristems, followed by trafficking to the lytic
          vacuole in a post-transcriptional manner.
  - id: PMID:23394827
    title: Moderation of Arabidopsis root stemness by CLAVATA1 and ARABIDOPSIS CRINKLY4 receptor kinase complexes.
    findings:
      - statement: CLV1 and ACR4 localize to the plasma membrane and plasmodesmata in distal root meristem cells.
        supporting_text: >-
          Both CLV1 and ACR4 overlap in their expression domains in the distal
          root meristem and localize to the plasma membrane (PM) and
          plasmodesmata (PDs), where ACR4 preferentially accumulates.
      - statement: CLV1 and ACR4 form subcellular-location-dependent receptor complexes.
        supporting_text: >-
          CLV1 and ACR4 can form homo- and heteromeric complexes that differ in
          their composition depending on their subcellular localization.
  - id: PMID:29320478
    title: An extracellular network of Arabidopsis leucine-rich repeat receptor kinases.
    findings:
      - statement: >-
          This high-throughput LRR-RK extracellular interaction study provides
          network-level context, but the cached text reviewed here does not
          expose the specific CLV1 interaction rows used by IntAct.
        supporting_text: >-
          we investigated 40,000 potential ECD interactions using a sensitized
          high-throughput interaction assay, and produced an LRR-based cell
          surface interaction network (CSILRR) that consists of 567 interactions.
  - id: PMID:29581511
    title: A group of receptor kinases are essential for CLAVATA signalling to maintain stem cell homeostasis.
    findings:
      - statement: CIK receptor kinases act as CLV1 co-receptors in CLV3 signaling.
        supporting_text: >-
          CIKs function as co-receptors of CLV1, CLV2/CRN and RPK2 to mediate
          CLV3 signalling through phosphorylation.
      - statement: Loss of CIK1/2/3/4 enlarges the shoot apical meristem.
        supporting_text: >-
          The cik1 2 3 4 quadruple mutant exhibits a significantly enlarged SAM,
          resembling clv mutants.
  - id: PMID:33909893
    title: Receptor-like cytoplasmic kinase MAZZA mediates developmental processes with CLAVATA1 family receptors in Arabidopsis.
    findings:
      - statement: MAZ and Pti1-like kinases interact in vivo with CLV1-family receptors.
        supporting_text: >-
          the membrane-associated receptor-like cytoplasmic kinase (RLCK) MAZZA
          (MAZ) and additional members of the Pti1-like protein family interact
          in vivo with CLV1f receptors.
      - statement: CLV1-MAZ signaling contributes to stomatal and root development.
        supporting_text: >-
          We identified a role for a CLV1-MAZ signaling module during stomatal
          and root development
  - id: PMID:34651321
    title: A CLE-BAM-CIK signalling module controls root protophloem differentiation in Arabidopsis.
    findings:
      - statement: CLE25/26/45, BAM1/3 and CIKs regulate protophloem differentiation.
        supporting_text: >-
          CLE25/26/45, BARELY ANY MERISTEM1/3 (BAM1/3) and CLV3 INSENSITIVE
          KINASEs (CIKs) are involved in regulating protophloem differentiation.
      - statement: CIK phosphorylation depends on CLV1/BAM receptor function.
        supporting_text: >-
          CLE25/26/45 enhanced the phosphorylation levels of CIKs, which were
          greatly impaired in clv1 bam1 3 mutant.
  - id: PMID:34935965
    title: Receptor-like cytoplasmic kinases PBL34/35/36 are required for CLE peptide-mediated signaling to maintain shoot apical meristem and root apical meristem homeostasis in Arabidopsis.
    findings:
      - statement: PBL34/35/36 interact with CLV1/BAM/CIK signaling components and are phosphorylated by CLV1 and BAM1.
        supporting_text: >-
          Further biochemical assays revealed that PBL34/35/36 interacted with
          CLV1, BAM1/3, and CIKs, and were phosphorylated by CLV1 and BAM1.
      - statement: PBL34/35/36 act downstream of CLV1 and BAM1/3 in CLE signaling.
        supporting_text: >-
          PBL34/35/36 act downstream of CLV1 and BAM1/3 to mediate the CLV3 and
          CLE25/26/45 signals in maintaining SAM and RAM homeostasis,
          respectively.
