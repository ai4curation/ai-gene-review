- description: WD40-repeat transcriptional coregulator/scaffold for MYB-bHLH-WD40 complexes. TTG1 binds specific MYB and bHLH partners to enable transcriptional regulatory complexes controlling epidermal cell fate, trichome differentiation, root non-hair fate, anthocyanin/proanthocyanidin biosynthesis, and seed coat mucilage programs.
