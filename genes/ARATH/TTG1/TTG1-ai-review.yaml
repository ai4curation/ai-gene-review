  label: Arabidopsis thaliana
description: 'TRANSPARENT TESTA GLABRA1 (TTG1) is an Arabidopsis WD40-repeat transcriptional coregulator/scaffold reused in multiple MYB-bHLH-WD40 complexes. TTG1 has no DNA-binding domain; instead, it binds bHLH/MYB partners to stabilize transcriptional regulatory complexes that control trichome initiation and patterning, root epidermal non-hair fate, seed coat proanthocyanidin and mucilage programs, and anthocyanin accumulation. DNA-binding annotations for TTG1 should be interpreted as complex-level promoter targeting, not direct TTG1 DNA binding.'
