suggested_questions:
- question: Should TTG1 GOA replace direct DNA binding with transcription coregulator activity for the WD40 scaffold subunit of MBW complexes?
- question: Can TTG1 annotations distinguish nucleus-localized transcriptional coregulator activity from cytoplasmic/mobile pools and hormone-regulated relocalization?
suggested_experiments:
- description: Test TTG1 variants defective in GL3/TT8/MYB binding in trichome, root hair, anthocyanin, proanthocyanidin, and mucilage reporter assays to define partner-specific MBW functions.
