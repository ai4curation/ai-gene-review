- id: PMID:10402433
  title: The TRANSPARENT TESTA GLABRA1 locus, which regulates trichome differentiation and anthocyanin biosynthesis in Arabidopsis, encodes a WD40 repeat protein.
  findings:
  - statement: TTG1 encodes a WD40-repeat protein regulating trichome differentiation and anthocyanin biosynthesis.
- id: PMID:11063707
  title: GL3 encodes a bHLH protein that regulates trichome development in arabidopsis through interaction with GL1 and TTG1.
  findings:
  - statement: TTG1 interacts with GL3 in the trichome-promoting GL1/GL3/TTG1 regulatory module.
- id: PMID:12917293
  title: A network of redundant bHLH proteins functions in all TTG1-dependent pathways of Arabidopsis.
  findings: []
- id: PMID:14561633
  title: A contradictory GLABRA3 allele helps define gene interactions controlling trichome development in Arabidopsis.
  findings: []
- id: PMID:15255866
  title: TT2, TT8, and TTG1 synergistically specify the expression of BANYULS and proanthocyanidin biosynthesis in Arabidopsis thaliana.
  findings:
  - statement: TT2, TT8, and TTG1 synergistically regulate BANYULS and seed proanthocyanidin biosynthesis.
- id: PMID:18434419
  title: The TTG1-bHLH-MYB complex controls trichome cell fate and patterning through direct targeting of regulatory loci.
  findings:
  - statement: TTG1-bHLH-MYB complexes directly target loci controlling trichome cell fate and patterning.
- id: PMID:18547143
  title: 'Two-dimensional patterning by a trapping/depletion mechanism: the role of TTG1 and GL3 in Arabidopsis trichome formation.'
  findings:
  - statement: TTG1 protein localizes in nucleus and cytoplasm, moves between cells, and is trapped/depleted through GL3-dependent trichome patterning.
- id: PMID:21427279
  title: Auxin and ethylene induce flavonol accumulation through distinct transcriptional networks.
  findings:
  - statement: Auxin and ethylene induce flavonol accumulation through transcriptional networks involving TTG1-related regulatory outputs.
- id: PMID:22334670
  title: A single amino acid substitution in IIIf subfamily of basic helix-loop-helix transcription factor AtMYC1 leads to trichome and root hair patterning defects by abolishing its interaction with partner proteins in Arabidopsis.
  findings: []
- id: PMID:24771765
  title: Brassinosteroids control root epidermal cell fate via direct regulation of a MYB-bHLH-WD40 complex by GSK3-like kinases.
  findings:
  - statement: Brassinosteroid signaling modulates root epidermal cell fate through regulation of the MYB-bHLH-WD40 complex.
- id: PMID:28650476
  title: 'CrY2H-seq: a massively multiplexed assay for deep-coverage interactome mapping.'
  findings: []
- id: PMID:32612234
  title: Extensive signal integration by the phytohormone protein network.
  findings:
  - statement: Phytohormone protein-network data identify additional TTG1 interactions, useful as context but not as a specific molecular-function annotation.
- id: PMID:7813791
  title: The TTG gene is required to specify epidermal cell fate and cell patterning in the Arabidopsis root.
  findings:
  - statement: TTG1 is required for epidermal cell fate and root epidermal patterning.
- id: file:ARATH/TTG1/TTG1-deep-research-falcon.md
  title: Falcon deep research for Arabidopsis TTG1
  findings:
  - statement: TTG1 encodes a WD40-repeat scaffold protein that functions primarily as the WD40 subunit of MBW transcriptional activator complexes.
  - statement: TTG1-dependent MBW complexes regulate epidermal cell fate, trichome initiation, root hair patterning, anthocyanin accumulation, proanthocyanidin accumulation, and seed coat mucilage.
- id: file:ARATH/TTG1/TTG1-uniprot.txt
  title: UniProt record for Arabidopsis TTG1
  findings:
  - statement: UniProt identifies TTG1/Q9XGN1 as a WD-repeat protein that promotes trichome formation with GL1 and GL3, activates GL2 transcription, and contributes to root hair, seed mucilage, and anthocyanin pathways.
- id: file:interpro/panther/PTHR19919/PTHR19919-entries.csv
  title: PANTHER PTHR19919 family entries for Arabidopsis TTG1
  findings:
  - statement: PTHR19919 places TTG1 in a broad WD-repeat-containing protein family; this supports a scaffold/interaction role but is too broad to transfer TTG1-specific MBW pathway annotations without Arabidopsis evidence.
