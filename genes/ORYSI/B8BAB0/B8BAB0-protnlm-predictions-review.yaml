description: >-
  ProtNLM2 predicted 1 GO term for B8BAB0, a BURP domain-containing protein from
  rice (Oryza sativa subsp. indica, ORF OsI_29064). The protein belongs to the
  PG1beta-like subfamily based on PANTHER classification (PTHR31458:SF2,
  POLYGALACTURONASE 1 BETA-LIKE PROTEIN 2) and contains the InterPro PG-associated
  BURP domain (IPR051897). PG1beta-like BURP proteins in rice (e.g. OsBURP14,
  OsBURP16) function as non-catalytic beta subunits of polygalacturonase isozyme 1,
  modulating cell wall pectin remodeling under ethylene and ABA signaling. ProtNLM2
  predicted pollen maturation (GO:0010152), a biological process more closely
  associated with the BNM2-like subfamily and OsRAFTIN1 (an anther-expressed BURP
  protein required for male fertility). While BURP family members do participate in
  reproductive development, the specific assignment of pollen maturation to a
  PG1beta-like protein lacks direct evidence and may reflect conflation of BURP
  subfamily functions. With no existing GOA annotations and protein evidence at
  level 4 (Predicted), there is insufficient information to confirm or refute the
  prediction. Assessment: 0 correct (CNN/LSP), 1 uncertain (UNC), 0 incorrect
  (NPI/PLI). Total CS = 1/2.
