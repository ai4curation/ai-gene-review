  title: 'Cleavage of resveratrol in fungi: characterization of the enzyme Rco1 from Ustilago maydis.'
  findings:
  - statement: >-
      Purified Um Rco1 cleaves the interphenyl double bond of resveratrol and piceatannol and is
      inactive on carotenoids; U. maydis Cco1 is the separate beta-carotene cleaver.
    supporting_text: >-
