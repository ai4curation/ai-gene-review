core_functions:
- description: >-
    Non-heme iron stilbene cleavage dioxygenase that oxidatively cleaves the interphenyl Calpha-Cbeta
    double bond of resveratrol and piceatannol into aromatic aldehydes; highly specific and inactive on
    carotenoids. GO:0016702 is the validated MF term; the specific term is GO:7770086 (resveratrol
    dioxygenase activity, RHEA:73735).
  molecular_function:
    id: GO:0016702
    label: oxidoreductase activity, acting on single donors with incorporation of
      molecular oxygen, incorporation of two atoms of oxygen
  directly_involved_in:
    - id: GO:0046272
      label: stilbene catabolic process
  supported_by:
    - reference_id: PMID:21073977
      supporting_text: >-
        the phytoalexin resveratrol and its derivative piceatannol
suggested_questions:
- question: >-
    U. maydis has the same carotenoid/stilbene paralog split as Neurospora (Cco1/beta-carotene vs
    Rco1/resveratrol); is the biological role of fungal resveratrol cleavage (detoxification vs
    competition) shared between the two fungi?
