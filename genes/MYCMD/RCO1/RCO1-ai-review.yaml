taxon:
  id: NCBITaxon:5270
  label: Mycosarcoma maydis
description: >-
  RCO1 encodes Rco1 (Resveratrol cleavage oxygenase 1) of Ustilago maydis (Mycosarcoma maydis), a
  fungal member of the carotenoid cleavage oxygenase (CCO) superfamily and a close functional analog of
  Neurospora CAO-1. It is a non-heme iron dioxygenase that oxidatively cleaves the interphenyl
  Calpha-Cbeta double bond of the stilbene phytoalexin resveratrol (and its derivative piceatannol) to
  yield 3,5-dihydroxybenzaldehyde and 4-hydroxybenzaldehyde. Rco1 is highly substrate-specific and does
  not act on carotenoids. U. maydis encodes two CCO-family paralogs: Cco1, a genuine beta-carotene
  cleavage enzyme, and Rco1, the resveratrol/stilbene cleaver reviewed here - the same carotenoid- vs
  stilbene-cleaver paralog split seen in Neurospora (CAO-2 vs cao-1).
existing_annotations:
- term:
    id: GO:0010436
    label: carotenoid dioxygenase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Phylogenetic (IBA) carotenoid dioxygenase activity. Experimentally refuted: purified Rco1 cleaves
      resveratrol and piceatannol but has no activity on carotenoids (PMID:21073977). A CCO-family
      over-propagation identical to the cao-1 case.
    action: REMOVE
    reason: >-
      Contradicted by direct enzyme assays showing Rco1 is a resveratrol/stilbene cleaver, not a
      carotenoid enzyme. The correct specific term is GO:7770086 (resveratrol dioxygenase activity,
      RHEA:73735); the general activity is already covered by GO:0016702.
    propagation_review:
      root_cause: PROPAGATION_BAD
      failure_modes:
        - FUNCTIONAL_DIVERGENCE
    supported_by:
      - reference_id: PMID:21073977
        supporting_text: >-
          Um Rco1 exhibits a high degree of substrate specificity, as suggested by the lack of activity
          on carotenoids and the other resveratrol-related compounds tested
