id: A0A0F6UJI1
gene_symbol: COMT
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: Caffeic acid 3-O-methyltransferase catalyzing SAM-dependent methylation of caffeate to ferulate in phenylpropanoid/lignin biosynthesis.
existing_annotations:
- term:
    id: GO:0008168
    label: methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: COMT is a methyltransferase, but this parent term is too broad for the enzyme's substrate-specific SAM-dependent caffeate O-methyltransferase activity.
    action: MODIFY
    reason: Replace the generic parent with the specific EC/Rhea-supported caffeate O-methyltransferase activity annotation.
    proposed_replacement_terms:
    - id: GO:0047763
      label: caffeate O-methyltransferase activity
- term:
    id: GO:0008171
    label: O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: O-methyltransferase activity is directionally correct but still less specific than the supported caffeate O-methyltransferase term.
    action: MODIFY
    reason: The UniProt catalytic reaction and EC 2.1.1.68 support the more specific caffeate O-methyltransferase activity.
    proposed_replacement_terms:
    - id: GO:0047763
      label: caffeate O-methyltransferase activity
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: UniProt describes COMT as a homodimer, so the dimerization annotation is plausible, but it is structural context rather than the core catalytic function.
    action: KEEP_AS_NON_CORE
    reason: Retain as non-core because caffeate O-methyltransferase activity captures the main molecular role.
- term:
    id: GO:0047763
    label: caffeate O-methyltransferase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The specific EC/Rhea-backed activity matches the UniProt catalytic reaction converting caffeate and SAM to ferulate and S-adenosyl-L-homocysteine.
    action: ACCEPT
    reason: This is the best supported and most specific molecular-function annotation for Miscanthus COMT.
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO terms
  findings: []
- id: GO_REF:0000120
  title: Combined Automated Annotation using Multiple IEA Methods
  findings: []
- id: file:MISSI/COMT/COMT-uniprot.txt
  title: UniProtKB entry for Miscanthus sinensis COMT
  findings:
  - statement: UniProt identifies COMT as caffeic acid 3-O-methyltransferase EC 2.1.1.68 with a caffeate-to-ferulate catalytic reaction and phenylpropanoid pathway context.
core_functions:
- description: Catalyzes SAM-dependent O-methylation of caffeate to ferulate during phenylpropanoid/lignin biosynthesis.
  molecular_function:
    id: GO:0047763
    label: caffeate O-methyltransferase activity
  directly_involved_in:
  - id: GO:0009809
    label: lignin biosynthetic process
  supported_by:
  - reference_id: file:MISSI/COMT/COMT-uniprot.txt
    supporting_text: Reaction=(E)-caffeate + S-adenosyl-L-methionine = (E)-ferulate + S-adenosyl-L-homocysteine + H(+)
  - reference_id: file:MISSI/COMT/COMT-uniprot.txt
    supporting_text: 'PATHWAY: Aromatic compound metabolism; phenylpropanoid biosynthesis.'
  - reference_id: file:MISSI/COMT/COMT-uniprot.txt
    supporting_text: 'SUBUNIT: Homodimer.'
proposed_new_terms: []
suggested_questions:
- question: Which Miscanthus COMT paralogs or alleles most strongly affect lignin composition and digestibility?
suggested_experiments:
- description: Measure caffeate O-methyltransferase activity, lignin monomer composition, and ferulate levels after COMT perturbation.
  experiment_type: targeted functional assay
