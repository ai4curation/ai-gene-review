suggested_questions:
- question: Is Miscanthus MnSOD activity dynamically regulated during drought, cold, or high-light oxidative stress?
suggested_experiments:
- description: Measure mitochondrial SOD activity and ROS accumulation in Miscanthus stress treatments.
  experiment_type: targeted functional assay
