id: A0A088MDT8
gene_symbol: MnSOD
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: Mitochondrial manganese superoxide dismutase that detoxifies superoxide radicals in the mitochondrial matrix by converting superoxide to hydrogen peroxide and oxygen.
existing_annotations:
- term:
    id: GO:0004784
    label: superoxide dismutase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: The EC/RHEA-supported UniProt annotation matches the protein name, catalytic reaction, and MnSOD family assignment.
    action: ACCEPT
    reason: Superoxide dismutase activity is the defining catalytic activity of MnSOD and is directly supported by the UniProt EC 1.15.1.1 reaction.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: Reaction=2 superoxide + 2 H(+) = H2O2 + O2
- term:
    id: GO:0005739
    label: mitochondrion
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: Mitochondrial localization is supported, but the matrix annotation is more specific for this MnSOD entry.
    action: KEEP_AS_NON_CORE
    reason: The broader mitochondrion term is true but less informative than the mitochondrial matrix annotation.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Mitochondrion matrix'
- term:
    id: GO:0005759
    label: mitochondrial matrix
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: UniProt subcellular-location annotation places the protein in the mitochondrial matrix.
    action: ACCEPT
    reason: The matrix is the specific mitochondrial compartment supported by the UniProt entry.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Mitochondrion matrix'
- term:
    id: GO:0006801
    label: superoxide metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Superoxide metabolism is supported by the SOD reaction, although the specific removal-of-superoxide-radicals annotation captures the core process more precisely.
    action: KEEP_AS_NON_CORE
    reason: This broader process term is correct but less specific than GO:0019430 for MnSOD's core role.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: Destroys superoxide anion radicals which are normally produced within the cells and which are toxic to biological systems.
- term:
    id: GO:0006950
    label: response to stress
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Oxidative radical detoxification contributes to stress response, but this term is broad and not the core biochemical function.
    action: KEEP_AS_NON_CORE
    reason: Stress response is a downstream biological context for MnSOD activity rather than its defining molecular role.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: Destroys radicals which are normally produced within the cells and which are toxic to biological systems.
- term:
    id: GO:0019430
    label: removal of superoxide radicals
  evidence_type: IEA
  original_reference_id: GO_REF:0000108
  review:
    summary: The GO term matches the catalytic SOD reaction converting superoxide radicals to hydrogen peroxide and oxygen.
    action: ACCEPT
    reason: Removal of superoxide radicals is the direct biological process accomplished by MnSOD activity.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: Reaction=2 superoxide + 2 H(+) = H2O2 + O2
- term:
    id: GO:0030145
    label: manganese ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000118
  review:
    summary: Mn(2+) cofactor binding is explicitly recorded in UniProt and is consistent with a manganese superoxide dismutase.
    action: ACCEPT
    reason: Manganese binding is the specific metal cofactor association for MnSOD catalysis.
    supported_by:
    - reference_id: file:MISSI/MnSOD/MnSOD-uniprot.txt
      supporting_text: 'COFACTOR: Name=Mn(2+)'
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Generic metal ion binding is true through the manganese cofactor but less specific than GO:0030145.
    action: KEEP_AS_NON_CORE
    reason: The specific manganese ion binding annotation should represent the core cofactor-binding aspect; the parent metal-binding term is non-core.
references:
