id: S5E2M2
gene_symbol: APQ
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: Putative PIP-type aquaporin, a multi-pass plasma membrane water channel in the major intrinsic protein family.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Plasma membrane localization is supported.
    action: ACCEPT
    reason: UniProt places this PIP-type aquaporin in the cell/plasma membrane.
    supported_by:
    - reference_id: file:MISSI/APQ/APQ-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell membrane'
    - reference_id: file:MISSI/APQ/APQ-uniprot.txt
      supporting_text: 'GO; GO:0005886; C:plasma membrane'
- term:
    id: GO:0015267
    label: channel activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Channel activity is true but too broad for a PIP-type aquaporin.
    action: MODIFY
    reason: Use the substrate-specific water channel activity term for this aquaporin-family membrane channel.
    supported_by:
    - reference_id: file:MISSI/APQ/APQ-uniprot.txt
      supporting_text: 'SubName: Full=Putative PIP-type aquaporin'
    - reference_id: file:interpro/panther/PTHR45687/PTHR45687-entries.csv
      supporting_text: P30302,Aquaporin PIP2-3
    proposed_replacement_terms:
    - id: GO:0015250
      label: water channel activity
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Membrane localization is true but less informative than plasma membrane.
    action: MARK_AS_OVER_ANNOTATED
    reason: The generic membrane term is redundant with the supported plasma membrane annotation.
    supported_by:
    - reference_id: file:MISSI/APQ/APQ-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell membrane'
    - reference_id: file:MISSI/APQ/APQ-goa.tsv
      supporting_text: "APQ\tlocated_in\tGO:0016020\tmembrane"
- term:
    id: GO:0055085
    label: transmembrane transport
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Transmembrane transport is true but too broad for a PIP-type aquaporin.
    action: MODIFY
    reason: The aquaporin family assignment supports water transport as the more informative process.
    supported_by:
    - reference_id: file:MISSI/APQ/APQ-uniprot.txt
      supporting_text: 'SubName: Full=Putative PIP-type aquaporin'
    - reference_id: file:interpro/panther/PTHR45687/PTHR45687-entries.csv
      supporting_text: Q6EU94,Aquaporin PIP1-1
    proposed_replacement_terms:
    - id: GO:0006833
      label: water transport
