  findings:
  - statement: UniProt identifies LHS1 as a leafy hull sterile 1-like protein fragment with MADS-box/K-box domains and nuclear localization.
- id: file:MISSI/LHS1/LHS1-goa.tsv
  title: QuickGO GOA annotations for Miscanthus sinensis LHS1
  findings:
  - statement: GOA rows supplied the existing annotations reviewed in this file.
- id: file:interpro/panther/PTHR48019/PTHR48019-entries.csv
  title: PANTHER PTHR48019 family entries for MADS-box transcription factors
  findings:
  - statement: The family contains reviewed plant MADS-box transcription factors, supporting the transcription-factor interpretation.
