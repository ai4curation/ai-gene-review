id: H6UM09
gene_symbol: LHS1
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: Fragment of a leafy hull sterile 1-like MADS-box/K-box transcription factor, predicted to function as a nuclear DNA-binding transcriptional regulator.
existing_annotations:
- term:
    id: GO:0003677
    label: DNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DNA binding is true but less informative than the specific transcription factor activity already present.
    action: MARK_AS_OVER_ANNOTATED
    reason: The MADS-box/K-box domain evidence supports DNA-binding transcription factor activity; retaining the broad DNA binding parent as core would be redundant.
    supported_by:
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'GO; GO:0003677; F:DNA binding'
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'GO; GO:0003700; F:DNA-binding transcription factor activity'
- term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: DNA-binding transcription factor activity is the core molecular function.
    action: ACCEPT
    reason: The protein is a MADS-box/K-box transcription factor fragment, and InterPro supports the DNA-binding transcription factor annotation.
    supported_by:
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'GO; GO:0003700; F:DNA-binding transcription factor activity'
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'InterPro; IPR002487; TF_Kbox'
- term:
    id: GO:0005634
    label: nucleus
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Nuclear localization is supported.
    action: ACCEPT
    reason: UniProt places this transcription factor fragment in the nucleus.
    supported_by:
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Nucleus'
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'GO; GO:0005634; C:nucleus'
- term:
    id: GO:0006355
    label: regulation of DNA-templated transcription
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Regulation of transcription is an appropriate biological process for a MADS-box transcription factor.
    action: ACCEPT
    reason: The annotation follows from the supported MADS-box/K-box transcription factor domains and nuclear localization.
    supported_by:
    - reference_id: file:MISSI/LHS1/LHS1-goa.tsv
      supporting_text: "LHS1\tinvolved_in\tGO:0006355\tregulation of DNA-templated transcription"
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'KW   Transcription regulation'
- term:
    id: GO:0046983
    label: protein dimerization activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: Protein dimerization is plausible for a MADS-box/K-box protein but is not the main curated function.
    action: KEEP_AS_NON_CORE
    reason: MADS/K-box transcription factors commonly dimerize, and InterPro supports this annotation, but the core function is transcriptional regulation.
    supported_by:
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'GO; GO:0046983; F:protein dimerization activity'
    - reference_id: file:MISSI/LHS1/LHS1-uniprot.txt
      supporting_text: 'InterPro; IPR002100; TF_MADSbox'
references:
- id: GO_REF:0000002
  title: Gene Ontology annotation through association of InterPro records with GO
    terms
  findings:
