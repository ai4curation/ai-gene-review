id: B5BSU2
gene_symbol: CDT1
product_type: PROTEIN
status: DRAFT
taxon:
  id: NCBITaxon:62337
  label: Miscanthus sinensis
description: Small plasma membrane and cell-wall-associated cadmium tolerance protein that sequesters heavy metal ions and limits cadmium and copper accumulation in root cells.
existing_annotations:
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: Plasma membrane localization is consistent with the UniProt cell membrane annotation.
    action: ACCEPT
    reason: CDT1 is annotated as a single-pass membrane protein at the cell membrane/plasma membrane.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell membrane'
- term:
    id: GO:0010038
    label: response to metal ion
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Metal-ion response is directionally correct but broad relative to detoxification.
    action: KEEP_AS_NON_CORE
    reason: The protein directly contributes to metal detoxification by chelation; response to metal ion is a broader process outcome.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: Confers resistance to heavy metal ions (e.g. cadmium (CdCl(2)) and copper (CuCl(2)))
- term:
    id: GO:0005886
    label: plasma membrane
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: ISS plasma membrane localization is supported by the UniProt location statement.
    action: ACCEPT
    reason: The orthology-supported plasma membrane annotation matches the UniProt cell membrane location.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: 'SUBCELLULAR LOCATION: Cell membrane'
- term:
    id: GO:0046872
    label: metal ion binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Metal ion binding is real but less informative than metal ion sequestering activity.
    action: KEEP_AS_NON_CORE
    reason: The biological role is chelation/sequestration of cadmium and copper at the membrane, so generic metal ion binding is not the core annotation.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: Confers resistance to heavy metal ions (e.g. cadmium (CdCl(2)) and copper (CuCl(2))) by chelating them
- term:
    id: GO:0140487
    label: metal ion sequestering activity
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: This captures the core molecular role of CDT1.
    action: ACCEPT
    reason: UniProt states that CDT1 chelates cadmium and copper at the plasma membrane, which is metal ion sequestering activity.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: by chelating them at the plasma membrane of root cells
- term:
    id: GO:1990748
    label: cellular detoxification
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Cellular detoxification is the correct process-level role.
    action: ACCEPT
    reason: CDT1 reduces heavy-metal entry and accumulation through chelation at the membrane.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: thus stopping their entry and reducing their accumulation
- term:
    id: GO:0009505
    label: plant-type cell wall
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Cell-wall association is supported by UniProt.
    action: ACCEPT
    reason: UniProt places CDT1 both at the cell membrane and secreted/cell-wall compartment.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: Secreted, cell wall
- term:
    id: GO:0010273
    label: detoxification of copper ion
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Copper detoxification is supported by the UniProt functional statement.
    action: ACCEPT
    reason: UniProt names copper among the heavy metals whose accumulation CDT1 reduces.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: copper (CuCl(2))) by chelating them
- term:
    id: GO:0071585
    label: detoxification of cadmium ion
  evidence_type: ISS
  original_reference_id: GO_REF:0000024
  review:
    summary: Cadmium detoxification is directly supported.
    action: ACCEPT
    reason: Cadmium tolerance is the named phenotype and biochemical role for CDT1.
    supported_by:
    - reference_id: file:MISSI/CDT1/CDT1-uniprot.txt
      supporting_text: cadmium (CdCl(2)) and copper (CuCl(2))) by chelating them
