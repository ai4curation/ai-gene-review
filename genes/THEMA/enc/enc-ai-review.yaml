taxon:
  id: NCBITaxon:243274
  label: Thermotoga maritima (strain ATCC 43589 / DSM 3109 / JCM 10099 / NBRC 100826
    / MSB8)
description: >-
  Type 1 encapsulin shell protein of Thermotoga maritima and the prototypical,
  most extensively characterized encapsulin. Sixty copies of the monomer, which
  adopts an HK97-like (viral capsid-derived) fold, self-assemble into a thin T=1
  icosahedral proteinaceous shell about 23-24 nm in diameter with 2.0-2.5 nm thick
  walls, forming an intracellular non-membrane-bound nanocompartment. The shell
  interior is lined with conserved binding sites that recognize a C-terminal
  targeting peptide, through which it encapsulates its cognate cargo, a
  ferritin-like protein (Flp) implicated in iron storage and oxidative-stress
  response; empty shells can also be isolated. The assembled shell binds FMN near
  its three-fold axis channels (it is a flavoprotein), and iron ions can pass
  through the pentameric and dimer-interface channels of the shell. Historically
  the protein was first described as a thermostable chymotrypsin/trypsin-like
  protease ("maritimacin"/"Thermotoga bacteriocin") before its role as an
  encapsulin shell was established.
