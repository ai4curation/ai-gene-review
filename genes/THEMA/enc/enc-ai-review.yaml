          peptides of oxidative-stress-response cargo enzymes.
        supporting_text: >-
          60 copies of the monomer assemble into a thin, icosahedral shell with a
          diameter of 240 angstroms. The interior of this nanocompartment is lined
          with conserved binding sites for short polypeptide tags present as
          C-terminal extensions of enzymes involved in oxidative-stress response.
        reference_section_type: ABSTRACT
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Founding structural paper (Sutter et al., Nat Struct Mol Biol 2008) that
        coined "encapsulin" and is the IDA anchor for GO:0140737. Abstract-only in
        cache but the quoted text directly establishes the shell architecture and
        cargo-encapsulation mechanism.
