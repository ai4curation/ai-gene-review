  - term:
      id: GO:0005198
      label: structural molecule activity
    evidence_type: IDA
    original_reference_id: PMID:19172747
    review:
      summary: >-
        NEW (proposed). GOA currently annotates this protein only to the
        cellular-component term GO:0140737, with no molecular function. Its core
        molecular function is structural: 60 copies assemble into the icosahedral
        shell that constitutes the nanocompartment, so structural molecule
        activity is the appropriate MF term.
      action: NEW
      reason: >-
        The founding crystal structure and subsequent cryo-EM studies show the
        monomer's function is to oligomerize into a rigid, self-assembling
        proteinaceous shell (an HK97-like capsid-derived fold) rather than to
        catalyze a reaction; GO:0005198 structural molecule activity captures this
        and fills the MF gap in the existing annotations.
      supported_by:
        - reference_id: PMID:19172747
          supporting_text: >-
            60 copies of the monomer assemble into a thin, icosahedral shell with
            a diameter of 240 angstroms.
