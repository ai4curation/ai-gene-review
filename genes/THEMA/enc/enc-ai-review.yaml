    title: Structural basis of enzyme encapsulation into a bacterial nanocompartment.
    findings:
      - statement: >-
          3.1 A crystal structure showing 60 copies of the T. maritima encapsulin
          monomer assemble into a thin icosahedral shell 240 A in diameter, whose
