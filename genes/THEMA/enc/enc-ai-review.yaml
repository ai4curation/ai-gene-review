suggested_questions:
  - question: >-
      Is the historical "maritimacin" chymotrypsin/trypsin-like protease activity
      a genuine physiological function of the encapsulin shell protein, or an
      artefact/secondary activity superseded by the shell-protein interpretation?
      UniProt retains GO:0008233 (peptidase activity) and GO:0006508 (proteolysis)
      as keyword-derived IEAs and flags "probably does not have antibacterial
      activity", so these should be scrutinized before propagation.
  - question: >-
      Should iron handling (GO:0006826 iron ion transport, currently a
      keyword-derived IEA) be attributed to the shell protein via its channels, or
      solely to the encapsulated Flp cargo?
suggested_experiments:
  - description: >-
      Assay purified, cargo-free recombinant shell for chymotrypsin/trypsin-like
      protease activity under the reported conditions (Ca/Co activation, pH ~7.1,
      90-93 C) to test whether proteolysis is intrinsic to the shell protein or
      attributable to a co-purifying contaminant.
    experiment_type: enzyme activity assay
