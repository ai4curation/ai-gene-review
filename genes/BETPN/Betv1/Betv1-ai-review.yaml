    id: GO:0004864
    label: protein phosphatase inhibitor activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  qualifier: enables
  review:
    summary: >-
      This activity is propagated from the structurally related PYR/PYL/RCAR abscisic
      acid receptors, which share the START/Bet v 1 fold and inhibit PP2C phosphatases.
      It is not established for Bet v 1, a PR-10 pollen protein, and reflects fold-based
      over-propagation.
    action: MARK_AS_OVER_ANNOTATED
    reason: Fold-based over-propagation from PYR/PYL ABA receptors; not demonstrated for Bet v 1.
