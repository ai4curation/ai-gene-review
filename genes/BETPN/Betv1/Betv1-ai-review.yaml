taxon:
  id: NCBITaxon:3505
  label: Betula pendula
description: >-
  Bet v 1 (isoform Bet v 1-A / Bet v 1.0101), the major birch pollen allergen and the
  prototype of the pathogenesis-related protein 10 (PR-10 / Bet v 1) family. It has
  the START-like Bet v 1 fold with a large hydrophobic cavity that promiscuously binds
  plant secondary metabolites (sterols, flavonoids, cytokinins, fatty acids), and is
  proposed to act as a general plant lipophilic-ligand/steroid carrier and a defence
  (PR) protein. It is the dominant sensitizer in birch pollinosis and the basis of the
  PR-10 birch–food cross-reactivity syndrome. Its precise in-planta ligand and
  physiological role remain unresolved.
existing_annotations:
