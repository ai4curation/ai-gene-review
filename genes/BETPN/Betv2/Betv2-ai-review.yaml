  label: Betula pendula
description: >-
  Bet v 2, birch profilin and a cross-reactive plant pan-allergen. Profilins are
  small actin-monomer-binding proteins that regulate cytoskeletal actin dynamics
  (sequestering G-actin and, depending on concentration, inhibiting or promoting
  polymerization) and bind poly-L-proline and phosphatidylinositol 4,5-bisphosphate
  (PIP2). Conserved across pollens, latex and plant foods, Bet v 2 underlies broad
  profilin cross-reactivity in pollen-allergic patients.
