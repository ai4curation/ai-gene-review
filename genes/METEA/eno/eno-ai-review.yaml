  original_reference_id: GO_REF:0000120
  review:
    summary: This is the primary and essential catalytic activity of enolase - the
      reversible conversion of 2-phosphoglycerate to phosphoenolpyruvate plus water.
      This is step 4/5 in the conversion of glyceraldehyde-3-phosphate to pyruvate.
      [file:METEA/eno/eno-uniprot.txt, "Catalyzes the reversible conversion of 2-phosphoglycerate
      (2-PG) into phosphoenolpyruvate (PEP)"]
    action: ACCEPT
    reason: Core molecular function, supported by HAMAP/InterPro family assignment
      and consistent with the canonical EC 4.2.1.11 reaction. Falcon deep research
      independently confirms this as the conserved, family-level enolase activity
      and the recommended high-confidence primary function for C5AVP6.
