    id: GO:0000015
    label: phosphopyruvate hydratase complex
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: Enolase functions as a homodimer (or sometimes higher oligomers), forming
      the phosphopyruvate hydratase complex. This quaternary structure is important
      for activity and stability. [file:METEA/eno/eno-uniprot.txt, "Mg(2+) is required
      for catalysis and for stabilizing the dimer"]
    action: ACCEPT
    reason: Quaternary structure of the active enzyme. Falcon deep research notes
      bacterial enolase exists as a dimer or octamer, consistent with the phosphopyruvate
      hydratase complex; the structural Mg2+ stabilizes the dimer per UniProt. This
      oligomeric state is inferred from family homology rather than an AM1-specific
      assay.
    supported_by:
