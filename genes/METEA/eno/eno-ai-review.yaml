- term:
    id: GO:0005576
    label: extracellular region
  evidence_type: IEA
  original_reference_id: GO_REF:0000044
  review:
    summary: This IEA annotation is propagated from the generic enolase HAMAP rule
      (MF_00318), which records Secreted/Cell surface localization reflecting moonlighting
      behavior observed in other (often pathogenic) bacteria. Falcon deep research
      is explicit that no AM1-specific evidence for surface or secreted enolase was
      found, and that M. extorquens AM1 is a non-pathogenic methylotroph for which
      such moonlighting localization should not be assigned without direct experimental
      support. [file:METEA/eno/eno-uniprot.txt, "Secreted"]
    action: MARK_AS_OVER_ANNOTATED
    reason: Extracellular/secreted localization is a rule-propagated moonlighting
      annotation with no organism-specific support in AM1. Falcon deep research recommends
      against transferring pathogen-derived surface/secreted enolase localization
      to this non-pathogenic methylotroph absent direct evidence, so it is an over-annotation
      for AM1 rather than a validated non-core function.
    supported_by:
    - reference_id: file:METEA/eno/eno-deep-research-falcon.md
      supporting_text: no AM1-specific evidence of surface enolase or plasminogen binding
