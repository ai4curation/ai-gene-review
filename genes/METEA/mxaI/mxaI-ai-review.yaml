        supporting_text: Active MxaF MDHs, thus lacking the β subunit, have been
          purified before, suggesting that this subunit is not always essential
          for enzyme activity per se
      - reference_id: file:METEA/mxaI/mxaI-claude-deep-research.md
        supporting_text: forms an integral structural component of the
