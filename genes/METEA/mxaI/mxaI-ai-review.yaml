          dependent MxaFI methanol dehydrogenase, encoded in the mxa/mox (MOX)
          gene cluster of M. extorquens AM1.
        supporting_text: is the **small (β) subunit** of the canonical Ca2+/PQQ-
          dependent MDH system encoded in the **mxa/mox (MOX) gene cluster**
        reference_section_type: OTHER
      - statement: The canonical MxaFI MDH is an alpha2 beta2 heterotetramer of
          two catalytic MxaF subunits and two small MxaI subunits.
        supporting_text: described as an **α2β2 heterotetramer** containing two
          catalytic MxaF subunits and two MxaI subunits
        reference_section_type: OTHER
      - statement: The MxaFI holoenzyme catalyzes oxidation of methanol to
          formaldehyde using PQQ; MxaI is a structural contributor and not the
          catalytic active site.
        supporting_text: MxaI contributes structurally to this enzyme complex
          rather than forming the catalytic active site itself
        reference_section_type: OTHER
      - statement: MxaI functions as part of the periplasm-localized MxaFI
          enzyme complex, although direct MxaI-specific signal-peptide/processing
          evidence was not found in the retrieved corpus.
        supporting_text: MxaI functions as part of a periplasm-localized MxaFI
          enzyme complex
        reference_section_type: OTHER
      - statement: MDH-cytochrome cL interaction is associated mainly with the
          MxaF alpha-subunit, implying MxaI is not the dominant cytochrome
          cL-contacting interface.
        supporting_text: implying MxaI is not the dominant cytochrome
          cL-contacting interface
        reference_section_type: OTHER
      - statement: Under the lanthanide (REE) switch, rare earth elements
          suppress MxaFI-type expression and promote XoxF-type MDH expression,
          affecting deployment of the MxaI-containing MxaFI system.
        supporting_text: the presence of rare earth elements tending to suppress
          MxaFI-type expression and promote XoxF-type MDH expression
        reference_section_type: OTHER
  - id: file:METEA/mxaI/mxaI-claude-deep-research.md
    title: Deep research on mxaI small subunit of methanol dehydrogenase
    findings:
      - statement: MxaI does not directly participate in substrate binding or
          catalysis; the catalytic machinery resides in the MxaF large subunit.
        supporting_text: MxaI does not directly participate in substrate binding
