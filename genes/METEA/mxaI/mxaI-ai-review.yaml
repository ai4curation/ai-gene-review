id: P14775
gene_symbol: mxaI
product_type: PROTEIN
taxon:
  id: NCBITaxon:272630
  label: Methylorubrum extorquens AM1
description: mxaI encodes the small subunit (β) of the calcium-dependent 
  methanol dehydrogenase (MxaFI-MDH), a heterotetrameric (α₂β₂) enzyme. MxaI is 
  a small protein of approximately 69 amino acids (~8.5 kDa) that tightly wraps 
  around the MxaF large subunit, forming an essentially inseparable complex. 
  While the precise function of MxaI remains unclear, it is not required for 
  catalytic activity per se, as active MxaF enzymes lacking MxaI have been 
  purified. MxaI likely plays structural, stability, or assembly roles rather 
  than direct participation in catalysis. The small subunit can only efficiently
  associate with MxaF after PQQ incorporation, suggesting it may stabilize the 
  properly configured active site. MxaI is unique to MxaFI-type 
  calcium-dependent methanol dehydrogenases and is not found in XoxF-type 
  lanthanide-dependent enzymes or other quinoproteins.
existing_annotations:
  - term:
      id: GO:0004022
      label: alcohol dehydrogenase (NAD+) activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Incorrect - MxaI is a non-catalytic structural subunit that does
        not possess enzymatic activity, and the catalytic activity resides
        entirely in MxaF [file:METEA/mxaI/mxaI-claude-deep-research.md, "MxaI
        does not directly participate in substrate binding or catalysis"].
        Additionally, this InterPro-derived term is doubly wrong because the
        MxaFI methanol dehydrogenase is a PQQ/Ca2+-dependent quinoprotein that
        donates electrons to cytochrome c(L), not an NAD+-dependent alcohol
        dehydrogenase (UniProt EC 1.1.2.7). Falcon deep research confirms MxaI
        contributes structurally rather than forming the catalytic active site.
      action: REMOVE
  - term:
      id: GO:0015945
      label: methanol metabolic process
    evidence_type: IEA
    original_reference_id: GO_REF:0000043
    review:
      summary: Correct - MxaI is the small (beta) structural subunit of the
        MxaFI methanol dehydrogenase complex and therefore participates in
        methanol metabolism, albeit in a non-catalytic role. Falcon deep
        research independently confirms MxaI as the structural/auxiliary
        subunit required for the functional periplasmic MxaFI methanol
        dehydrogenase that enables the organism's canonical methanol oxidation
        capacity.
      action: ACCEPT
      supported_by:
        - reference_id: file:METEA/mxaI/mxaI-claude-deep-research.md
          supporting_text: this enzyme consists of the MxaF and MxaI proteins,
            which make up the large and small subunits of this heterotetrameric
            enzyme
        - reference_id: file:METEA/mxaI/mxaI-deep-research-falcon.md
          supporting_text: MxaI is the small **β** subunit of the canonical
            **MxaFI** methanol dehydrogenase
  - term:
      id: GO:0015946
      label: methanol oxidation
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    review:
      summary: Correct - MxaI is a structural subunit of the MxaFI enzyme
        complex that oxidizes methanol to formaldehyde in the periplasm. Falcon
        deep research confirms that the MxaFI holoenzyme catalyzes the oxidation
        of methanol to formaldehyde, with MxaI contributing structurally rather
        than forming the catalytic active site itself.
      action: ACCEPT
      supported_by:
        - reference_id: file:METEA/mxaI/mxaI-claude-deep-research.md
          supporting_text: the first step in methylotrophic growth is the
            oxidation of methanol to formaldehyde in the periplasm by methanol
            dehydrogenase
        - reference_id: file:METEA/mxaI/mxaI-deep-research-falcon.md
          supporting_text: MxaI contributes structurally to this enzyme complex
            rather than forming the catalytic active site itself
  - term:
      id: GO:0016491
      label: oxidoreductase activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000043
    review:
      summary: Incorrect - MxaI is a structural subunit without catalytic
        activity. The oxidoreductase (methanol-oxidizing) activity resides
        entirely in the MxaF large subunit, which carries the PQQ prosthetic
        group and active-site Ca2+ [file:METEA/mxaI/mxaI-claude-deep-research.md,
        "MxaI does not directly participate in substrate binding or catalysis"].
        Falcon deep research likewise places the catalytic chemistry on the
        MxaFI holoenzyme via MxaF, with MxaI contributing structurally rather
        than forming the active site.
      action: REMOVE
  - term:
      id: GO:0042597
      label: periplasmic space
    evidence_type: IEA
    original_reference_id: GO_REF:0000044
    review:
      summary: Correct - MxaI is part of the MxaFI methanol dehydrogenase
        complex located in the periplasmic space. The UniProt record assigns a
        cleaved signal peptide (residues 1-22) consistent with Sec-dependent
        periplasmic export. Falcon deep research describes MxaI as functioning
        as part of a periplasm-localized MxaFI enzyme complex, although it notes
        that direct MxaI-specific signal-peptide/processing evidence was not
        located in the retrieved corpus, so periplasmic localization of MxaI is
        inferred from its role as a subunit of the periplasmic MxaFI complex.
      action: ACCEPT
      supported_by:
        - reference_id: file:METEA/mxaI/mxaI-deep-research-falcon.md
          supporting_text: MxaI functions as part of a periplasm-localized MxaFI
            enzyme complex
  - term:
      id: GO:0052933
      label: alcohol dehydrogenase (cytochrome c(L)) activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: Incorrect - MxaI has no catalytic activity. The EC 1.1.2.7
        cytochrome c(L)-coupled alcohol dehydrogenase activity is carried out
        exclusively by the MxaF large subunit, which houses the PQQ prosthetic
        group and active-site Ca2+ [file:METEA/mxaI/mxaI-claude-deep-research.md,
        "The large subunit contains the active-site residues and the PQQ
        prosthetic group, which is coordinated to a calcium ion in the active
        site"]. MxaI itself does not contribute the active site
        [file:METEA/mxaI/mxaI-claude-deep-research.md, "MxaI does not directly
        participate in substrate binding or catalysis"]. Falcon deep research
        independently states that MxaI contributes structurally rather than
        forming the catalytic active site. This activity should be retained on
        MxaF, not the beta subunit.
      action: REMOVE
  - term:
      id: GO:0005198
      label: structural molecule activity
    evidence_type: NAS
    review:
      summary: MxaI is the small (beta) structural subunit of the MxaFI methanol
        dehydrogenase; it contributes to the structural integrity of the alpha2
        beta2 heterotetrameric complex (GO:0005198, "The action of a molecule
        that contributes to the structural integrity of a complex") rather than
        contributing catalytic residues. This replaces the removed catalytic MF
        terms (GO:0004022, GO:0016491, GO:0052933) with the molecular function
        that actually describes MxaI's role. Falcon deep research describes MxaI
        as the structural/auxiliary small subunit required for the functional
        MxaFI complex and confirms it contributes structurally rather than
        forming the catalytic active site.
      action: NEW
      reason: MxaI provides no catalytic activity; its molecular function is to
        maintain the structural integrity of the MxaFI heterotetramer, which is
        the gene product's core function. The catalytic MF terms inherited from
        InterPro/EC mapping are removed and this structural MF term is the
        correct replacement at the molecular-function level.
      supported_by:
        - reference_id: file:METEA/mxaI/mxaI-claude-deep-research.md
          supporting_text: forms an integral structural component of the
            heterotetrameric
        - reference_id: file:METEA/mxaI/mxaI-deep-research-falcon.md
          supporting_text: MxaI contributes structurally to this enzyme complex
            rather than forming the catalytic active site itself
core_functions:
  - description: MxaI serves as a structural subunit of the MxaFI methanol 
      dehydrogenase heterotetrameric complex. The small subunit tightly wraps 
      around the MxaF large subunit, forming an essentially inseparable complex.
      While MxaI's precise function remains unclear and it is not absolutely 
      required for catalytic activity, it likely plays roles in enzyme 
      stability, proper quaternary structure organization, or protection from 
      proteolysis. MxaI can only efficiently associate with MxaF after PQQ 
      incorporation, suggesting it may stabilize the properly configured active 
      site.
    molecular_function:
      id: GO:0005198
      label: structural molecule activity
    directly_involved_in:
      - id: GO:0015945
        label: methanol metabolic process
      - id: GO:0015946
        label: methanol oxidation
    locations:
