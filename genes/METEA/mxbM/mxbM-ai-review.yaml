  review:
    summary: Correct, with a mechanistic caveat - MxbM is inferred to bind cis-regulatory
      regions of the mxa and xox1 promoters to activate or repress transcription. The
      genetic evidence (mxa activation, xox1 repression) and the OmpR/PhoB-type winged
