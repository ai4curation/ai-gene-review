suggested_questions:
- question: Does phosphorylated MxbM bind directly to the mxa and xox1 promoter regions,
    and what is the operator/recognition sequence?
- question: Is Asp53 (the predicted receiver-domain phosphoacceptor) required for MxbM
    activity, and does MxbD phosphorylate MxbM directly?
- question: How does a single response regulator achieve reciprocal control - activating
    mxa while repressing xox1 - at the level of promoter architecture?
suggested_experiments:
- description: Electrophoretic mobility shift assays (EMSA) and DNase I footprinting
    with purified MxbM (and phospho-mimetic variants) on the mxa and xox1 promoters
    to demonstrate direct DNA binding and map operator sites.
  hypothesis: Phosphorylated MxbM binds directly to cis-regulatory elements in the
    mxa and xox1 promoters.
- description: In vitro phosphotransfer assays between purified MxbD and MxbM, plus a
    D53A receiver-domain mutant complementation in M. extorquens AM1, to test the
    phosphorylation-dependence of mxa activation and xox1 repression.
  hypothesis: MxbD phosphorylates the MxbM receiver-domain aspartate (Asp53), and this
    phosphorylation is required for mxa activation and xox1 repression.
- description: RNA-seq/ChIP-seq of an MxbM-tagged strain under Ca2+ versus lanthanide
    conditions to define the MxbM regulon and direct binding sites genome-wide.
  hypothesis: MxbM directly controls a defined regulon centered on the methanol
    oxidation operons under the lanthanide switch.
status: DRAFT
