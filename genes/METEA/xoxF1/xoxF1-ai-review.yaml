proposed_new_terms:
- proposed_name: lanthanide ion binding
  proposed_definition: Binding to a lanthanide (rare-earth) ion, for example La(3+), Ce(3+), Pr(3+) or Nd(3+). GO currently provides only the general parent term metal ion binding (GO:0046872), which cannot capture the lanthanide-specific cofactor requirement that distinguishes XoxF-type methanol dehydrogenases from calcium-dependent MxaFI enzymes.
  justification: XoxF1 and related XoxF-type methanol dehydrogenases specifically require lanthanides, not calcium, and a dedicated molecular function term would allow accurate annotation distinct from generic metal ion binding.
  supported_by:
  - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
    supporting_text: XoxF1 is a PQQ-dependent dehydrogenase whose active site requires Ln(III) rather than Ca(II), distinguishing it from Ca-dependent MxaFI
suggested_questions:
- question: Does XoxF1 form a stable physical complex with XoxG (cytochrome cL) and XoxJ in the periplasm, and what is the stoichiometry of this electron-transfer assembly?
- question: To what extent does XoxF1 act as a lanthanide-sensory module influencing transcription of the mxa and xox1 operons, and is this regulatory role separable from its catalytic activity?
suggested_experiments:
- description: Reconstitute purified XoxF1 with XoxG in vitro and measure cytochrome cL reduction kinetics across the light lanthanide series (La, Ce, Pr, Nd) to determine electron-acceptor specificity tuning.
- description: Use a catalytically inactive Asp320 variant in vivo to test whether XoxF1 retains its regulatory (lanthanide-switch) function independently of methanol oxidation activity.
