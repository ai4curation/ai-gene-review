- term:
    id: GO:0052933
    label: alcohol dehydrogenase (cytochrome c(L)) activity
  evidence_type: IDA
  original_reference_id: PMID:23209751
  review:
    summary: 'NEW - CORE FUNCTION. This term is more specific than the general "oxidoreductase activity, acting on CH-OH group of donors" (GO:0016614) and accurately captures XoxF1''s electron acceptor specificity. XoxF1 transfers electrons to XoxG, which is cytochrome cL. The GO definition "Catalysis of the reaction: 2 [Fe(III)cytochrome cL] + a primary alcohol = 2 [Fe(II)cytochrome cL] + an aldehyde + 2 H+" precisely describes XoxF1''s mechanism - oxidizing methanol (primary alcohol) to formaldehyde (aldehyde) while reducing cytochrome cL.'
    action: NEW
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: XoxF1 also functions as an MDH and is La(3+)-dependent
- term:
    id: GO:0042803
    label: protein homodimerization activity
  evidence_type: IDA
  original_reference_id: PMID:23209751
  review:
    summary: NEW - STRUCTURAL PROPERTY. XoxF1 functions as a homodimer (α2) with a native molecular weight of ~117 kDa. Each subunit is ~61 kDa. This is in contrast to the heterotetrameric (α2β2) structure of the calcium-dependent MxaFI methanol dehydrogenase. Homodimerization appears essential for catalytic function, as both lanthanide and PQQ binding sites are present in each subunit of the functional dimer.
    action: NEW
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: These results indicated that the purified MDH is a homodimer of only the α subunit...the native molecular weight of the purified protein was estimated to be ca. 117 kDa
