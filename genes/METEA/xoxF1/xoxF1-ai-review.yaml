- term:
    id: GO:0070968
    label: pyrroloquinoline quinone binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: CORRECT - ESSENTIAL COFACTOR. PQQ is the prosthetic group essential for XoxF1 catalytic activity. Crystal structure shows PQQ coordinated in the active site with multiple hydrogen bonding interactions. The PQQ quinone functionality serves as the actual redox center mediating methanol oxidation. Binds 1 PQQ per subunit (homodimer contains 2 PQQ molecules total). Falcon deep research confirms a dual requirement for PQQ and lanthanide.
    action: ACCEPT
