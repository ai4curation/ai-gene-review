    id: GO:0003824
    label: catalytic activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  review:
    summary: Correct but uninformative parent term. XoxF1 is an enzyme with well-characterized catalytic activity for methanol oxidation. This is a general root-level term subsumed by the more specific molecular function annotations (GO:0016614, GO:0052933) that should be retained as the core function.
    action: MARK_AS_OVER_ANNOTATED
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: The purified MDH had a specific activity of 10.0 U/mg of protein
    - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
      supporting_text: XoxF-type MDHs (including XoxF1) are active when Ln(III) (e.g., La(III), Ce(III), Pr(III), Nd(III)) are available and oxidize methanol → formaldehyde
- term:
    id: GO:0005509
    label: calcium ion binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000120
  review:
    summary: INCORRECT. XoxF1 binds LANTHANIDES (La³⁺, Nd³⁺, Ce³⁺, Pr³⁺), not calcium. When calcium is bound in the absence of lanthanides, the enzyme is inactive. This is a fundamental misannotation - likely from automated annotation that failed to recognize lanthanide specificity. XoxF1 has a diagnostic aspartate residue (Asp320) unique to lanthanide-dependent methanol dehydrogenases that is essential for lanthanide but not calcium coordination. Falcon deep research confirms XoxF purified from lanthanide-grown cells incorporated lanthanide and lacked Ca.
    action: REMOVE
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: The purified enzyme contained 0.91 atoms of La3+ and 0.39 atoms of Ca2+ per dimer. After treatment with 50 mM EDTA, the La3+ and Ca2+ contents in the enzyme were shown to be 1.24 and 0.10 per dimer, respectively, suggesting that the La3+ is tightly bound to the enzyme
    - reference_id: PMID:32366463
      supporting_text: XoxF1 and XoxF1 D320A, when produced in the absence of La3+, coordinated Ca2+ but exhibited little or no catalytic activity
    - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
      supporting_text: XoxF purified from lanthanide-grown cells incorporated ~1.24 atoms of La and lacked Ca
- term:
    id: GO:0015945
    label: methanol metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000043
  review:
    summary: CORRECT - CORE FUNCTION. XoxF1 catalyzes the first committed step in methanol metabolism by oxidizing methanol to formaldehyde. Genetic studies show deletion of both xoxF paralogs prevents methanol utilization under lanthanide-rich conditions. This is the primary biological role of the enzyme and represents essential function for lanthanide-dependent methylotrophy. Falcon deep research documents that loss of xoxF1 reduces methanol-growth performance under lanthanides and double loss of xoxF1/xoxF2 causes a stronger defect.
    action: ACCEPT
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: methanol is first oxidized to formaldehyde via methanol dehydrogenase (MDH) in the periplasm
    - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
      supporting_text: XoxF-type MDHs (including XoxF1) are active when Ln(III) (e.g., La(III), Ce(III), Pr(III), Nd(III)) are available and oxidize methanol → formaldehyde
    - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
      supporting_text: loss of either phenocopies loss of xoxF1/xoxF2 for Ln-dependent methanol growth
- term:
    id: GO:0016020
    label: membrane
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: INCORRECT. XoxF1 is a periplasmic protein, not membrane-bound. The N-terminal signal peptide directs the protein to the periplasm via the Sec pathway, where it is cleaved. While it may loosely associate with the membrane surface, the proper cellular component annotation is "periplasmic space" (GO:0042597), not membrane. Falcon deep research consistently describes XoxF1 as periplasmic.
    action: REMOVE
    supported_by:
    - reference_id: PMID:23209751
      supporting_text: XoxF1 is predicted to be a PQQ-dependent periplasmic MDH...XoxF1 may have a signal peptide for periplasmic localization
    - reference_id: file:METEA/xoxF1/xoxF1-deep-research-falcon.md
      supporting_text: AM1 xoxF1 is repeatedly described/annotated as periplasmic, consistent with the general statement that methylotrophic PQQ-ADHs are periplasmic enzymes
