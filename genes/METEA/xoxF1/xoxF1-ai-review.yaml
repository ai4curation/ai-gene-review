id: C5B120
gene_symbol: xoxF1
product_type: PROTEIN
taxon:
  id: NCBITaxon:272630
  label: Methylorubrum extorquens AM1
description: Lanthanide-dependent methanol dehydrogenase (EC 1.1.2.10) that catalyzes the oxidation of methanol to formaldehyde in the periplasm. Unlike the calcium-dependent MxaFI enzyme, XoxF1 specifically requires lanthanide ions (La³⁺, Nd³⁺, Ce³⁺, Pr³⁺) as cofactors and uses pyrroloquinoline quinone (PQQ) as its prosthetic group. Forms a homodimer and transfers electrons to XoxG (cytochrome cL). Essential for lanthanide-dependent methylotrophy and is highly upregulated in the presence of lanthanides. Lanthanide ions in the active site act as Lewis acids that facilitate hydride transfer to PQQ during alcohol oxidation, and XoxF1 also contributes to the lanthanide-sensing transcriptional switch that coordinates xox and mxa operon expression.
