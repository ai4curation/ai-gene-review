- id: file:METEA/mllH/mllH-deep-research-falcon.md
  title: Falcon deep research on mllH (C5B1I9) acetyltransferase in methylolanthanin biosynthesis
  findings:
  - supporting_text: >-
      Zytnick et al. explicitly refer to **“putative acetyltransferase mllH
      (META1p4137)”** in *Methylobacterium/Methylorubrum extorquens* AM1
    reference_section_type: OTHER
  - supporting_text: >-
      Zytnick et al. describe an **mll biosynthetic gene cluster spanning
      META1p4129–META1p4138** in *M. extorquens* AM1, responsible for
      production of a lanthanide-binding metallophore named **methylolanthanin
      (MLL)**
    reference_section_type: OTHER
  - supporting_text: >-
      it contains a **central citrate** linked to **two 4-hydroxybenzoate
      moieties via acetylated homospermidine residues**
    reference_section_type: OTHER
  - supporting_text: >-
      **mllH (META1p4137)** is annotated as a **putative acetyltransferase**, and
      Zytnick et al. state that its presence suggested incorporation of an
      **acetylated (homo)spermidine linker**, by analogy to rhodopetrobactin-like
      pathways
    reference_section_type: OTHER
  - supporting_text: >-
      mllH is not biochemically characterized at the single-enzyme level
    reference_section_type: OTHER
  - supporting_text: >-
      no purified enzyme assay, no confirmed substrate range/kinetics, no
      gene-specific knockout phenotype reported
    reference_section_type: OTHER
  - supporting_text: >-
      the most conservative current annotation is that MllH acts
      **intracellularly (likely cytosolic)** during methylolanthanin biosynthesis
    reference_section_type: OTHER
  - supporting_text: >-
      mllH is embedded in a functional lanthanophore pathway and should be
      interpreted primarily as a **biosynthetic accessory enzyme**, not as a
      global protein acetyltransferase
    reference_section_type: OTHER
- id: file:METEA/mllH/mllH-deep-research-perplexity.md
  title: Perplexity deep research on mllH in lanthanophore biosynthesis
  findings:
  - supporting_text: >-
      META1p4137 (mllH) is homologous to genes involved in rhodopetrobactin
      biosynthesis
    reference_section_type: OTHER
  - supporting_text: >-
      The presence of mllH suggests incorporation of acetylated homospermidine
      linker
    reference_section_type: OTHER
