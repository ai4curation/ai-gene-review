id: C5B1I9
gene_symbol: mllH
product_type: PROTEIN
taxon:
  id: NCBITaxon:272630
  label: Methylorubrum extorquens AM1
description: >-
  mllH (MexAM1_META1p4137; UniProt C5B1I9) encodes a predicted GCN5-related
  N-acetyltransferase (GNAT superfamily) located within the methylolanthanin
  (mll) biosynthetic gene cluster of Methylorubrum extorquens AM1.
  Methylolanthanin is a small-molecule lanthanide-binding metallophore
  (lanthanophore) - NOT an iron siderophore - composed of a central citrate
  linked to two 4-hydroxybenzoate moieties via acetylated homospermidine
  residues. Because the final product contains acetylated homospermidine,
  MllH is inferred to catalyze the N-acetylation step on a polyamine
  (homo)spermidine-derived linker during methylolanthanin assembly. This
  function is a bioinformatic/cluster-level inference: in the available
  literature MllH has no purified-enzyme assay, no confirmed substrate
  specificity or kinetics, and no gene-specific knockout phenotype. The mll
  cluster as a whole is experimentally supported (deletion abolishes
  methylolanthanin; the locus is ~32-fold upregulated under poorly soluble
  Nd2O3) and mediates lanthanide acquisition/homeostasis.
existing_annotations:
- term:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      MllH is a GNAT-family acetyltransferase. The generic acyltransferase
      term is correct but underspecified; the GNAT domain plus the predicted
      N-acetylation of a (homo)spermidine linker support the more informative
      child term N-acetyltransferase activity (GO:0008080).
    action: MODIFY
    reason: >-
      The IEA term GO:0016747 is a correct but high-level parent. The protein
      carries a GNAT (GCN5-related N-acetyltransferase) domain and is predicted
      to acetylate a polyamine (homospermidine) amine, i.e. transfer an acetyl
      group to a nitrogen atom. The descendant term GO:0008080 (N-acetyltransferase
      activity) is therefore more informative and still consistent with the
      domain evidence. Substrate-specific terms (e.g. diamine N-acetyltransferase)
      are not used because the actual substrate is experimentally unresolved.
    proposed_replacement_terms:
    - id: GO:0008080
      label: N-acetyltransferase activity
    supported_by:
    - reference_id: file:METEA/mllH/mllH-uniprot.txt
      supporting_text: 'SubName: Full=GCN5-related N-acetyltransferase'
    - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
      supporting_text: >-
        GNATs are a widespread superfamily of acetyltransferases that
        (canonically) transfer an acetyl group from **acetyl-coenzyme A
        (AcCoA)** to a nucleophilic amine on a substrate
    - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
      supporting_text: >-
        MllH likely catalyzes an **acetylation step on a polyamine
        (homo)spermidine-derived linker** used to assemble the
        lanthanide-binding metallophore
- term:
    id: GO:0044550
    label: secondary metabolite biosynthetic process
  evidence_type: IGC
  original_reference_id: GO_REF:0000002
  review:
    summary: >-
      Proposed new biological-process annotation. MllH is part of the mll
      cluster that biosynthesizes methylolanthanin, a secreted lanthanide-binding
      metallophore (a specialized/secondary metabolite). No siderophore term
      is used because methylolanthanin chelates lanthanides, not iron.
    action: NEW
    reason: >-
      The mll cluster is experimentally required for methylolanthanin
      production and MllH is a predicted biosynthetic tailoring enzyme within
      it. secondary metabolite biosynthetic process (GO:0044550) is the most
      appropriate available BP term for lanthanophore biosynthesis; GO:0019290
      (siderophore biosynthetic process) is explicitly inappropriate because
      methylolanthanin is a lanthanide chelator, not an Fe(III)-siderophore.
      This is a cluster-level/bioinformatic inference, not a gene-specific
      knockout result for mllH.
    supported_by:
    - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
      supporting_text: >-
        Zytnick et al. describe an **mll biosynthetic gene cluster spanning
        META1p4129–META1p4138** in *M. extorquens* AM1, responsible for
        production of a lanthanide-binding metallophore named **methylolanthanin
        (MLL)**
    - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
      supporting_text: >-
        mllH is embedded in a functional lanthanophore pathway and should be
        interpreted primarily as a **biosynthetic accessory enzyme**, not as a
        global protein acetyltransferase
core_functions:
- description: >-
    Predicted N-acetylation of a polyamine (homospermidine) linker during
    methylolanthanin (lanthanophore) biosynthesis. Acetyl-CoA donor and
    homospermidine substrate are inferred from GNAT enzymology and the
    structure of methylolanthanin; not directly demonstrated for MllH.
  molecular_function:
    id: GO:0008080
    label: N-acetyltransferase activity
  directly_involved_in:
  - id: GO:0044550
    label: secondary metabolite biosynthetic process
  supported_by:
  - reference_id: file:METEA/mllH/mllH-uniprot.txt
    supporting_text: 'SubName: Full=GCN5-related N-acetyltransferase'
  - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
    supporting_text: >-
      it contains a **central citrate** linked to **two 4-hydroxybenzoate
      moieties via acetylated homospermidine residues**
  - reference_id: file:METEA/mllH/mllH-deep-research-falcon.md
    supporting_text: >-
      should be interpreted primarily as a **biosynthetic accessory enzyme**,
      not as a global protein acetyltransferase
