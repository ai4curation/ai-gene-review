          reference_section_type: OTHER
  - term:
      id: GO:0042597
      label: periplasmic space
    evidence_type: IEA
    original_reference_id: GO_REF:0000120
    review:
      summary: >-
        ACCEPT. MxaJ is an exported precursor protein that functions in the
