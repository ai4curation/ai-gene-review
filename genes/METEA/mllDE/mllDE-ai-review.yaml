      supported_by:
        - reference_id: file:METEA/mllDE/mllDE-deep-research-falcon.md
          supporting_text: >-
            No retrieved source directly determines the **subcellular
            localization** of the mllDE gene product
core_functions:
  - description: >-
      Acyl/aryl carrier protein (ACP-like) function: holds the
      4'-phosphopantetheine prosthetic group on the CARRIER/PP-binding domain to
      tether and shuttle biosynthetic intermediates during methylolanthanin
      assembly.
    molecular_function:
      id: GO:0031177
      label: phosphopantetheine binding
    supported_by:
      - reference_id: file:METEA/mllDE/mllDE-deep-research-falcon.md
        supporting_text: >-
          an inferred **carrier/PP-binding ACP-like role somewhere within the
          core mll biosynthetic machinery
references:
  - id: file:METEA/mllDE/mllDE-deep-research-falcon.md
    title: Falcon deep research on mllDE (C5B1I6) in Methylorubrum extorquens AM1
    findings:
      - supporting_text: >-
          The gene symbol **mllDE** is verified in *Methylorubrum extorquens*
          AM1 (also referred to as *Methylobacterium extorquens* AM1 in the cited
          work) as a component of the **methylolanthanin (mll) biosynthetic gene
          cluster** spanning **META1p4129–META1p4138**, where **mllDE corresponds
          to META1p4134** in the cluster map and gene list.
        reference_section_type: OTHER
      - supporting_text: >-
          Zytnick et al. report **methylolanthanin (MLL)** as a secreted small
          molecule that forms complexes with lanthanides and is required for
          normal lanthanide accumulation in *M. extorquens* AM1 under some
          conditions, positioning MLL as a **lanthanide-specific metallophore
          (“lanthanophore”)**.
        reference_section_type: OTHER
      - supporting_text: >-
          mllA/mllBC/mllDE/mllF are described as homologous to petrobactin **asb**
          genes, supporting assignment of mllDE to an **NRPS-independent
          siderophore-like biosynthetic module** that has been repurposed for
          lanthanide chelation.
        reference_section_type: OTHER
      - supporting_text: >-
          but the evidence snippets do **not** assign the PP-binding or DUF6005
          motif specifically to **mllDE** alone
        reference_section_type: OTHER
      - supporting_text: >-
          the mll locus (META1p4129–META1p4138) shows **~32-fold average
          upregulation** and is among the most strongly induced regions.
        reference_section_type: OTHER
      - supporting_text: >-
          No retrieved source directly determines the **subcellular
          localization** of the mllDE gene product (e.g., cytosolic vs
          periplasmic, membrane association), nor does it present
          imaging/fractionation evidence for mllDE specifically.
        reference_section_type: OTHER
  - id: file:METEA/mllDE/mllDE-deep-research-perplexity.md
    title: Perplexity deep research on mllDE fusion protein in metallophore biosynthesis
status: COMPLETE
