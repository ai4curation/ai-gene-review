      summary: >-
        ProtNLM2 predicted GO:0008033 (tRNA processing) for this PRORP enzyme.
        The prediction is biologically correct: A0A1S3Y076 is a proteinaceous
        RNase P that catalyzes endonucleolytic cleavage of 5-prime leader
        sequences from precursor tRNAs (EC 3.1.26.5), which is indeed a form of
        tRNA processing. However, the prediction is less precise than the
        existing GOA annotation GO:0001682 (tRNA 5'-leader removal), which is a
        direct child of GO:0008033 and specifically names the exact processing
        step carried out by RNase P. The existing IBA annotation for GO:0001682
        was inferred from experimentally characterized Arabidopsis PRORP orthologs
        (PRORP1/AT2G16650, PRORP2/AT2G32230, PRORP3/AT4G21900) and is well
        supported by the conserved PPR + NYN metallonuclease domain architecture
        of this protein. Classified as LSP rather than CNN because the model
        failed to resolve the specific tRNA processing step despite the clear
        domain signature pointing to RNase P cleavage activity.
