description: >-
  ProtNLM2 predicted 1 GO term for A0A1S3Y076, a proteinaceous RNase P (PRORP)
  from Nicotiana tabacum. The single prediction, GO:0008033 (tRNA processing),
  is biologically correct but less precise than the existing GOA annotation
  GO:0001682 (tRNA 5'-leader removal), which specifies the exact step of tRNA
  maturation catalyzed by PRORP enzymes. The protein is a well-characterized
  protein-only RNase P that endonucleolytically cleaves 5-prime leader sequences
  from precursor tRNAs using its NYN metallonuclease domain, with Mg2+ as cofactor.
  Assessment: 1 correct but less precise (LSP), 0 uncertain, 0 incorrect.
