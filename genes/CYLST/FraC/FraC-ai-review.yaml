proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of
      small molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD); FraC is a
      septal integral-membrane protein required for its normal architecture and function.
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial/cyanobacterial
      septal junction. GO:0005918 "septate junction" denotes the arthropod epithelial
      junction and is not appropriate. FraC, FraD, SepN and SepJ would all be annotated to
      this structure.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Does the C. stagnale FraC ortholog (K9WTD1) recapitulate the PCC 7120 fraC-mutant
      phenotypes (filament fragmentation under nitrogen deprivation, SepJ mislocalization,
      impaired calcein transfer), confirming the orthology-based function transfer?
  - question: >-
      Is FraC a stoichiometric subunit of the septal-junction core, or an
      accessory/architectural factor that assembles at the septum independently of that core?
suggested_experiments:
  - hypothesis: >-
      K9WTD1 is functionally equivalent to PCC 7120 FraC and is required for filament
      integrity and intercellular communication in C. stagnale.
    description: >-
      Construct a Cylst_1330 (fraC) insertional mutant in C. stagnale and assay filament
      integrity under nitrogen deprivation, SepJ localization by GFP fusion, and
      intercellular calcein (FRAP) transfer, comparing to wild type and a complemented strain.
  - hypothesis: >-
      FraC physically associates with its operon partner FraD (Cylst_1329) at the
      intercellular septum.
    description: >-
      Test FraC-FraD interaction by co-immunoprecipitation / split-GFP (BiFC) at the septa
      and by cryo-electron tomography of tagged strains to localize FraC density within the
      septal-junction complex.
