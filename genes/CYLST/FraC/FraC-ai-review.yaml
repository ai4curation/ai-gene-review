        matches title; abstract-only in cache but annotations rest on the full-text assays.
  - id: PMID:7883709
    title: "A short-filament mutant of Anabaena sp. strain PCC 7120 that fragments in nitrogen-deficient medium."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Discovery/cloning of fraC in the PCC 7120 short-filament fragmentation strain 129;
        179-aa phenylalanine-rich protein; insertional inactivation reproduces the
        phenotype; establishes the filament/cell-junction integrity role distinct from
        differentiation and N2 fixation. Cited here as ISS source for the C. stagnale
        ortholog; PMID matches title; abstract + short full text in cache.
