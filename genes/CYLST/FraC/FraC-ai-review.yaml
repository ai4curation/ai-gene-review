core_functions:
  - description: >-
      Structural integral-membrane component of the cyanobacterial septal-junction machinery
      (inferred by orthology to PCC 7120 FraC / P46078). Localized to the intercellular septa
      in the cytoplasmic membrane, FraC (with SepJ and FraD) builds and maintains the
      intercellular junctions that connect adjacent cells of the filament, and is required
      for filament integrity, correct SepJ localization, and gated intercellular molecular
      exchange (calcein transfer) that underpins diazotrophic multicellular growth.
