  label: Cylindrospermum stagnale PCC 7417
description: >-
  FraC (locus Cylst_1330; first gene of the fraC-fraD-fraE operon) is a small polytopic
  integral cytoplasmic-(inner)-membrane protein of the filamentous, heterocyst-forming
  cyanobacterium Cylindrospermum stagnale PCC 7417. It has four predicted transmembrane
  helices and belongs to the FraC-specific protein family (InterPro IPR054663 / Pfam
  PF24301), which is restricted to filamentous heterocyst-forming cyanobacteria. It is the
  ortholog of the characterized Nostoc/Anabaena sp. PCC 7120 filament-integrity protein FraC
  (UniProt P46078; reciprocal best hit, 56.2% identity, conserved fraC-fraD-fraE operon). By
  orthology, FraC is inferred to localize to the intercellular septa, where it acts as a
  structural component of the septal-junction machinery that joins adjacent cells in a
  filament and mediates gated intercellular exchange of small molecules across the septal
  peptidoglycan. FraC is required for filament integrity, correct localization of the septal
  protein SepJ, and intercellular molecular transfer, which underpin diazotrophic
  multicellular growth.
