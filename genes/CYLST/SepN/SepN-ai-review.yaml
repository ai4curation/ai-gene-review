  label: Cylindrospermum stagnale PCC 7417
description: >-
  SepN (locus Cylst_2059; UniProt K9WXR0) is a bitopic cytoplasmic-membrane protein of the
  filamentous, heterocyst-forming cyanobacterium Cylindrospermum stagnale PCC 7417 (order
  Nostocales). It is the ortholog of the experimentally characterized SepN of Nostoc sp.
  PCC 7120, the plug-forming structural component of the septal junction (SJ) - the
  gap-junction-like intercellular channel that traverses the septal peptidoglycan and
  connects adjacent cells in a filament to allow gated cell-cell molecular exchange. SepN
  has an N-terminal transmembrane helix that anchors it in the cytoplasmic membrane and a
  large cytoplasmic domain; in the characterized ortholog five SepN copies assemble into a
  central pentameric plug that is surrounded by peripheral FraD anchors and gates (opens and
  closes) the intercellular channel, thereby controlling cell-cell communication along the
  filament. SepN lacks any Pfam/InterPro/PANTHER family model and is detectable only by
  homology to its representative members; it is a signature protein of the order Nostocales
  that co-occurs with FraD.
references:
