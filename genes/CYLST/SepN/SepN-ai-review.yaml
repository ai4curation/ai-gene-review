      review_notes: >-
        Discovery/characterization paper for the PCC 7120 SepN ortholog (Kieninger et al.,
        Nat Commun 2022). Identifies SepN as the FraD-interacting septal-junction plug
        component required for gated cell-cell communication. Functional statements are
        transferred to C. stagnale K9WXR0 by orthology (ISS); no direct assay on K9WXR0.
        Full text available in cache; PMID matches title.
  - id: PMID:42424141
