proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the
      septal peptidoglycan through a nanopore and directly connects the cytoplasms of
      adjacent cells in a filament, mediating and gating the intercellular diffusion of
      small molecules. It comprises a cytoplasmic cap, a membrane-embedded plug (SepN), a
      septum-spanning tube, and a transmembrane/periplasmic anchor (FraD).
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. SepN (plug) and FraD (anchor) are components of this structure and would
      be annotated to it.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Does C. stagnale K9WXR0 form a pentameric plug and gate septal junctions as its
      PCC 7120 ortholog does, and are the gating phenotypes conserved in this species?
suggested_experiments:
  - hypothesis: >-
      K9WXR0 is functionally equivalent to PCC 7120 SepN and is required for gated
      cell-cell communication in C. stagnale.
    description: >-
      Delete/disrupt Cylst_2059 in C. stagnale and assay septal-junction plug formation
      (cryo-ET) and intercellular molecular exchange (calcein FRAP with and without CCCP),
      comparing to the characterized PCC 7120 sepN phenotypes.
