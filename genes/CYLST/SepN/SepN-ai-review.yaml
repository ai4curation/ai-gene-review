core_functions:
  - description: >-
      Forms the membrane-embedded plug of the septal junction. By orthology to the
      characterized Nostoc sp. PCC 7120 SepN, SepN copies assemble into a central plug
      anchored in the cytoplasmic (plasma) membrane by their N-terminal transmembrane
      helices and, together with peripheral FraD, gate (open and close) the intercellular
      channel, controlling cell-cell communication along the filament.
