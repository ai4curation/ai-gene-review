      - reference_id: file:CYLST/FraE/FraE-notes.md
        supporting_text: >-
          K9WTV4 is the FraE ortholog of Nostoc sp. PCC 7120 FraE (A0ACD7RSN5) by reciprocal-best-hit
          phmmer homology (forward E = 7.2e-109, 70.3% identity) and by conserved operon synteny of the
          fraC-fraD-fraE operon (Cylst_1330-Cylst_1329-Cylst_1328 in C. stagnale).
      - reference_id: PMID:20487302
        supporting_text: >-
          was constitutively expressed as an operon together with two downstream genes,
          alr2393 (fraD) and alr2394 (fraE)
      - reference_id: PMID:20487302
        supporting_text: >-
          Single mutants of these genes showed filament fragmentation under
          nitrogen deprivation and did not grow diazotrophically, although they formed
          heterocysts
proposed_new_terms: []
suggested_questions:
  - question: >-
      Does K9WTV4 (FraE) function as a substrate-transporting ABC-2 permease, or (like its operon
      partners FraC and FraD) primarily as a structural component of the septal junction?
  - question: >-
      With which nucleotide-binding (ATPase) partner, if any, does the FraE permease associate to form
      a functional ABC transporter, and what is the transported substrate?
suggested_experiments:
  - hypothesis: >-
      FraE (K9WTV4) is an integral cytoplasmic-membrane protein that localizes to the intercellular
      septa, like FraC and FraD.
    description: >-
      Construct a functional FraE-GFP fusion in C. stagnale and image its subcellular localization
      under nitrogen-replete and nitrogen-deprived conditions to test septal vs dispersed membrane
      localization.
  - hypothesis: >-
      FraE provides a transmembrane translocation pathway for a specific substrate required for
      filament integrity / diazotrophic growth.
    description: >-
      Combine affinity purification of tagged FraE (to identify a nucleotide-binding partner and
      complex) with metabolite/transport assays in a fraE mutant to identify a candidate transported
      substrate; interpret cautiously given the possibility of a structural role.
