  label: Cylindrospermum stagnale PCC 7417
description: >-
  FraE (locus Cylst_1328; UniProt K9WTV4) is the Cylindrospermum stagnale PCC 7417 ortholog of the
  Nostoc/Anabaena sp. PCC 7120 FraE protein and, like it, is a predicted polytopic integral-membrane
  protein and the third gene of the fraC-fraD-fraE operon of this filamentous, heterocyst-forming
  cyanobacterium. By domain architecture it belongs to the ABC-2-type transporter permease family
  (NosY-like; InterPro IPR032688, Pfam PF12679, PANTHER PTHR43471), i.e. it is a membrane permease
  component that provides a transmembrane translocation pathway rather than the ATP-hydrolyzing
  (nucleotide-binding) subunit of an ABC transporter; Phobius predicts six transmembrane helices,
  consistent with a polytopic integral membrane permease. In the characterized PCC 7120 orthologous
  system the fraC-fraD-fraE operon is constitutively expressed, single mutants of its genes fragment
  under nitrogen deprivation and fail to grow diazotrophically despite forming heterocysts, and the
  operon partners FraC and FraD localize to the intercellular septa as structural components of the
  septal junction. FraE has little direct functional characterization: its transporter/permease
  classification is domain-based, no specific transported substrate has been established (the UniProt
  "multi-copper enzyme maturation" SubName is an unreviewed genome-annotation string, not experimental
  evidence), and a purely structural role (as for its operon partners) cannot be excluded.
