  - term:
      id: GO:0140359
      label: ABC-type transporter activity
    evidence_type: IEA
    original_reference_id: GO_REF:0000002
    qualifier: enables
    review:
      summary: >-
        Domain-based IEA from InterPro IPR032688. The term is not wrong for the transporter as a
        whole, but the "enables" qualifier over-claims for a permease-only subunit: FraE is the ABC-2
        permease (membrane translocation) component, not the ATP-hydrolyzing nucleotide-binding
        subunit, so it does not independently enable ATP-coupled ABC-type transporter activity. It
        contributes to that complex-level activity. Marked as over-annotated at the "enables" level;
        the correct relationship (contributes_to GO:0140359, with a subunit-level transmembrane
        transporter activity) is captured in core_functions. Mirrors the PCC 7120 FraE review decision.
      action: MARK_AS_OVER_ANNOTATED
      supported_by:
        - reference_id: file:CYLST/FraE/FraE-notes.md
          supporting_text: >-
            A permease component of an ABC transporter provides the transmembrane translocation pathway
            but does not itself hydrolyze ATP; full "ABC-type transporter activity" (ATP-coupled primary
            active transport) is a property of the complete transporter (permease + nucleotide-binding
            domain), not of the permease subunit alone.
