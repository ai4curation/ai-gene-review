core_functions:
  - description: >-
      Integral cytoplasmic-membrane protein of the ABC-2-type transporter permease family (NosY-like),
      the Cylindrospermum stagnale ortholog of PCC 7120 FraE and the third gene of the constitutively
      expressed fraC-fraD-fraE operon. As a permease component it provides the transmembrane
      translocation pathway of an ABC transporter (contributing to, but not independently enabling,
      ATP-coupled ABC-type transporter activity), and by orthology is inferred to be required together
      with FraC and FraD for filament integrity and diazotrophic growth under nitrogen limitation. The
      transported substrate is unknown, and a purely structural role (as for its operon partners)
      cannot be excluded; the molecular assignment here is domain- and orthology-based.
    molecular_function:
