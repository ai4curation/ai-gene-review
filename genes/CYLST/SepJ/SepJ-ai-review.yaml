    title: "Septum-localized protein required for filament integrity and diazotrophy in the heterocyst-forming cyanobacterium Anabaena sp. strain PCC 7120."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Flores et al. 2007 (J Bacteriol). Original description of the PCC 7120 ortholog sepJ
        (= alr2338): SepJ-GFP localizes to the intercellular septa and forms a Z-ring-like ring
        during division; the mutant fragments, arrests heterocyst maturation and cannot fix N2;
        multidomain protein with a permease-like C-terminal domain. Full text cached; PMID
        matches title. Used here as the ISS basis for K9WRN1 (septal location, multidomain
        architecture).
  - id: PMID:21299655
    title: "Functional dissection of the three-domain SepJ protein joining the cells in cyanobacterial trichomes."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Mariscal et al. 2011 (Mol Microbiol). Domain-swap/deletion dissection of PCC 7120 SepJ:
        coiled-coil domain drives polar localization, filament integrity, tracer transfer and
        diazotrophy; the permease domain provides intercellular molecular exchange. Abstract
        cached; PMID matches title. ISS basis for the cell-cell signaling / anchoring role.
  - id: PMID:20487302
    title: "Fra proteins influencing filament integrity, diazotrophy and localization of septal protein SepJ in the heterocyst-forming cyanobacterium Anabaena sp."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Merino-Puerto et al. 2010 (Mol Microbiol). FraC/FraD are required for correct SepJ
        septal localization and for intercellular calcein transfer; places SepJ among the
        septal proteins governing intercellular communication. Abstract cached; PMID matches
        title.
  - id: PMID:28979840
    title: "Septal protein SepJ from the heterocyst-forming cyanobacterium Anabaena forms multimers and interacts with peptidoglycan."
    reference_review:
      relevance: HIGH
      correctness: VERIFIED
      review_notes: >-
        Ramos-León et al. 2017 (FEBS Open Bio). Primary evidence that PCC 7120 SepJ forms
        multimeric complexes and binds peptidoglycan (via its coiled-coil domain), and that
        SepJ/FraC/FraD are cytoplasmic-membrane proteins at the intercellular septa. Full text
        cached; PMID matches title. PRIMARY ISS basis for the structural role and plasma
        membrane location.
  - id: file:CYLST/SepJ/SepJ-notes.md
    title: SepJ (FraG, Cylst_0707 / K9WRN1) research notes
    reference_review:
      relevance: HIGH
