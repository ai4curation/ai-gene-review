proposed_new_terms:
  - proposed_name: septal junction
    proposed_definition: >-
      A proteinaceous cell-cell junction of filamentous cyanobacteria that traverses the septal
      peptidoglycan through a nanopore and directly connects the cytoplasms of adjacent cells in
      a filament, mediating and gating the intercellular diffusion of small molecules.
    justification: >-
      There is no dedicated GO cellular-component term for the bacterial septal junction.
      GO:0005918 "septate junction" denotes the arthropod epithelial junction and is not
      appropriate. SepJ (FraG) is required for septal-junction formation and is a candidate
      structural component, and would be annotated to this term.
    proposed_parent:
      id: GO:0030054
      label: cell junction
suggested_questions:
  - question: >-
      Is Cylst_0707 (K9WRN1) functionally equivalent to PCC 7120 SepJ - does its deletion cause
      filament fragmentation and loss of diazotrophy in C. stagnale, and does the protein
      localize to the intercellular septa?
  - question: >-
      Does the SepJ C-terminal DMT/EamA permease domain transport a specific small-molecule
      substrate across the cytoplasmic membrane, or is its role purely architectural within the
      septal junction?
suggested_experiments:
  - hypothesis: >-
      K9WRN1 is the functional SepJ ortholog in C. stagnale, required for filament integrity
      and intercellular communication.
    description: >-
      Construct a Cylst_0707 deletion/insertion mutant and assay filament integrity, septal
      SepJ-GFP localization, septal nanopore number and intercellular fluorescent-tracer (FRAP)
      transfer, and diazotrophic growth, comparing against the PCC 7120 sepJ phenotypes.
  - hypothesis: >-
      The SepJ permease domain transports a defined metabolite/regulator between cells.
    description: >-
      Reconstitute the isolated C-terminal permease domain in proteoliposomes and screen
      candidate small-molecule substrates (amino acids, sucrose, regulatory peptides) by
      transport assays; correlate with intercellular FRAP tracer exchange in permease-domain
      point mutants.
