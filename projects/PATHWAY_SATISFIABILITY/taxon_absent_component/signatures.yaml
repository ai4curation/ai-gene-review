# Obligate-component signatures for the genome-content satisfiability check.
#
# Each case links a process/pathway GO term (that appeared as an IBA over-
# propagation candidate) to the OBLIGATE COMPONENT its definition entails, using
# TWO oracles for "does the target genome encode this component?":
#
#   panther:  PANTHER family (PTHR...) membership. DIVERGENCE-ROBUST — IBA is
#             propagated *along the PANTHER tree*, so even a highly divergent
#             ortholog that has lost its domain signature is still placed in the
#             family. This is the PRIMARY oracle.
#   interpro: InterPro domain signature membership. Sensitive to domain loss and
#             to sequence divergence, so it UNDER-calls in distant lineages. Kept
#             as a contrast oracle: panther-present + interpro-absent == a
#             divergent ortholog the domain screen would have wrongly flagged.
#
# A zero under PANTHER (with a non-zero control) is a strong absence; a zero
# under InterPro alone is not. `corroboration` records the independent evidence.
#
# All accessions were looked up live (InterPro API entry search; PANTHER xrefs
# from UniProt records), not guessed.

target_taxon: 44689      # Dictyostelium discoideum
control_taxon: 9606      # Homo sapiens (positive control: components known present)

cases:
  - id: jak_stat
    go_term: GO:0007259
    go_label: cell surface receptor signaling pathway via JAK-STAT
    obligate_component: Janus kinase (JAK)
    panther: [PTHR45807]         # Janus Kinase (JAK)
    interpro: [IPR051286]        # Janus Kinase (JAK)
    rationale: >-
      The term names JAK as the receptor-associated tyrosine kinase that
      phosphorylates STAT. No JAK in the genome -> the pathway cannot be wired up.
    corroboration: >-
      TRUE ABSENCE (both oracles agree). Dictyostelium STATs (Dd-STATa/c) are
      activated JAK-independently by the TKL kinases Pyk2/Pyk3; no JAK-family
      kinase is encoded. Correct annotation: the JAK-independent parent
      GO:0097696 (STAT signaling).
    expected: ABSENT

  - id: stat_divergence_control
    go_term: GO:0097696
    go_label: STAT signaling (control - STAT itself IS present in Dictyostelium)
    obligate_component: STAT transcription factor (divergent in Dictyostelium)
    panther: [PTHR11801]               # STAT transcription factor family
    interpro: [IPR013801, IPR012345]   # STAT DNA-binding domain / N-terminal superfamily
    rationale: >-
      Divergence control: Dictyostelium HAS STATs, so a "component absent" call
      would be a false positive.
    corroboration: >-
      PRESENT (divergent). PANTHER recovers the four Dd-STATs; the InterPro
      domain signature misses them because they are too sequence-divergent from
      metazoan STATs. The panther/interpro DISAGREEMENT is the divergence flag.
    expected: PRESENT

  - id: gpcr_purinergic
    go_term: GO:0035589
    go_label: G protein-coupled purinergic nucleotide receptor signaling pathway
    obligate_component: metabotropic (P2Y-type, GPCR) purinergic receptor
    panther: [PTHR24231]               # Purinoceptor-related GPCR (P2Y)
    interpro: [IPR000142, IPR000018]   # P2Y purinoceptor 1 / 4
    rationale: >-
      This term is specifically the metabotropic (GPCR) purinergic pathway,
      which requires a P2Y-type receptor. Ionotropic P2X channels do not satisfy
      it (see the p2x case).
    corroboration: >-
      ABSENT (both oracles agree). P2Y GPCRs are a metazoan expansion, absent
      from Dictyostelium. Note this is specific to the GPCR pathway - the
      organism does have ionotropic P2X receptors (next case).
    expected: ABSENT

  - id: p2x_divergence_control
    go_term: GO:0035590
    go_label: purinergic nucleotide receptor signaling pathway (P2X, ionotropic - control)
    obligate_component: P2X ionotropic receptor (divergent in Dictyostelium)
    panther: [PTHR10125]               # P2X purinoceptor family
    interpro: [IPR001429]              # P2X purinoreceptor family
    rationale: >-
      Second divergence control. Dictyostelium encodes divergent P2X receptors
      (P2XA-E).
    corroboration: >-
      PRESENT (divergent). PANTHER recovers ~5 Dictyostelium P2X receptors,
      matching Fountain et al. 2007 (Nature 448:200); the InterPro P2X family
      signature misses them. Another panther/interpro divergence flag.
    expected: PRESENT
