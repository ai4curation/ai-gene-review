# Obligate-component signatures for the genome-content satisfiability check.
#
# Each case links a process/pathway GO term (that appeared as an IBA over-
# propagation candidate) to the OBLIGATE COMPONENT its definition entails, and
# gives that component one or more InterPro signature accessions. The detector
# (detect.py) asks, for each component, whether the TARGET taxon encodes any
# member of the signature, using a positive-control taxon to prove the query
# itself is sound.
#
# IMPORTANT: an InterPro-signature count of 0 in the target is a CANDIDATE
# absence, not a proof — highly divergent orthologs can escape a metazoan
# signature (see the STAT and P2X demonstration cases below). `corroboration`
# records the independent evidence that decides whether the absence is real.
#
# InterPro accessions were looked up live via the InterPro API
# (https://www.ebi.ac.uk/interpro/api/entry/interpro/?search=...), not guessed.

target_taxon: 44689      # Dictyostelium discoideum
control_taxon: 9606      # Homo sapiens (positive control: components known present)

cases:
  - id: jak_stat
    go_term: GO:0007259
    go_label: cell surface receptor signaling pathway via JAK-STAT
    obligate_component: Janus kinase (JAK)
    interpro: [IPR051286]        # Janus Kinase (JAK)
    rationale: >-
      The term names JAK as the receptor-associated tyrosine kinase that
      phosphorylates STAT. If the genome encodes no JAK, the JAK-STAT pathway
      as defined cannot be wired up.
    corroboration: >-
      TRUE ABSENCE. Dictyostelium STATs (Dd-STATa/c) are activated
      JAK-independently by the TKL-family kinases Pyk2/Pyk3; no JAK-family
      kinase is present in the genome. The correct annotation is the
      JAK-independent parent GO:0097696 (STAT signaling).
    expected: ABSENT

  - id: stat_divergence_control
    go_term: GO:0097696
    go_label: STAT signaling (control - STAT itself IS present in Dictyostelium)
    obligate_component: STAT transcription factor (divergent in Dictyostelium)
    interpro: [IPR013801, IPR012345]   # STAT DNA-binding domain / N-terminal superfamily
    rationale: >-
      Negative control for the detector: Dictyostelium demonstrably HAS STATs,
      so a "component absent" call here would be a FALSE POSITIVE.
    corroboration: >-
      FALSE-POSITIVE DEMONSTRATION. Dd-STATa/c are functional STATs but are so
      sequence-divergent from metazoan STATs that they do not carry the
      metazoan InterPro STAT signatures. Signature-absence therefore does NOT
      equal genome-absence in a distant lineage.
    expected: PRESENT_BUT_SIGNATURE_MISSES

  - id: gpcr_purinergic
    go_term: GO:0035589
    go_label: G protein-coupled purinergic nucleotide receptor signaling pathway
    obligate_component: metabotropic (P2Y-type, GPCR) purinergic receptor
    interpro: [IPR000142, IPR000018]   # P2Y purinoceptor 1 / 4 (representative)
    rationale: >-
      This term is specifically the metabotropic (GPCR) purinergic pathway,
      which requires a P2Y-type receptor. Ionotropic P2X channels do not
      satisfy it.
    corroboration: >-
      LIKELY ABSENT but signature is narrow (single subfamilies). P2Y GPCRs are
      a metazoan expansion. Treat as candidate; confirm with a broader P2Y
      panel before a confident call.
    expected: ABSENT

  - id: p2x_divergence_control
    go_term: GO:0035590
    go_label: purinergic nucleotide receptor signaling pathway (P2X, ionotropic - control)
    obligate_component: P2X ionotropic receptor (divergent in Dictyostelium)
    interpro: [IPR001429]              # P2X purinoreceptor family
    rationale: >-
      Second false-positive control. Dictyostelium encodes divergent P2X
      receptors (P2XA-E) on intracellular membranes.
    corroboration: >-
      FALSE-POSITIVE DEMONSTRATION. Fountain et al. 2007 (Nature 448:200)
      characterised functional P2X receptors in Dictyostelium, yet they are
      divergent enough that the metazoan P2X InterPro family may not annotate
      them. Signature-absence is not proof of genome-absence.
    expected: PRESENT_BUT_SIGNATURE_MISSES
