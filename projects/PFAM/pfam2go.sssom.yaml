# Pfam -> GO mapping (SSSOM) -- curated NEW mappings for cases where an
# InterPro-level mapping is NOT viable.
#
# Each subject Pfam family sits in a *heterogeneous* InterPro entry that groups
# functionally distinct member families under one fold; that entry therefore carries
# no interpro2go term (a function-specific term would be wrong for the sibling family).
# The specific function is real at the Pfam level, so a Pfam->GO mapping is viable
# where an InterPro->GO mapping is not. See ../PFAM.md, PROPOSED_MAPPINGS.md, HEADROOM.md.
#
# Predicates: MF -> RO:0002327 'enables'; BP -> RO:0002331 'involved in'.
# These are CANDIDATE proposals (reviewer judgement grounded in the Pfam family
# definition); each needs curator / experimental validation. Every GO id/label is
# verified non-obsolete against go-basic, every Pfam membership and the 'parent entry
# has no equivalent term' premise are verified by propose_mappings.py.
#
# Validate (structural, against the SSSOM schema):
#   just validate-pfam-mappings

mapping_set_id: https://w3id.org/ai4curation/ai-gene-review/mappings/pfam2go
mapping_set_title: Pfam to GO mapping (curated, where InterPro2GO is not viable)
mapping_set_description: >-
  Curated Pfam family -> GO mappings for Pfam families that sit in heterogeneous InterPro entries (entries grouping functionally distinct member families under one fold). Such entries carry no interpro2go term, so the specific function can only be asserted at the Pfam level. enables (RO:0002327) rows are molecular functions; involved-in (RO:0002331) rows are biological processes. Every GO id/label is verified non-obsolete against go-basic; Pfam membership and the 'parent InterPro entry carries no equivalent term' premise are verified by propose_mappings.py. These seed curation of new Pfam->GO mappings and quality-check GO annotation of the corresponding proteins; each is a candidate needing curator / experimental validation.
license: https://creativecommons.org/licenses/by/4.0/
creator_label:
- AI Gene Review project
mapping_date: "2026-06-20"
subject_source: pfam
object_source: GO
curie_map:
  Pfam: https://www.ebi.ac.uk/interpro/entry/pfam/
  InterPro: https://www.ebi.ac.uk/interpro/entry/InterPro/
  GO: http://purl.obolibrary.org/obo/GO_
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  sssom: https://w3id.org/sssom/
  obo: http://purl.obolibrary.org/obo/

mappings:
- subject_id: Pfam:PF14681
  subject_label: "UPRTase"
  predicate_id: RO:0002327
  predicate_label: enables
  object_id: GO:0004845
  object_label: uracil phosphoribosyltransferase activity
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.9
  comment: >-
    Pfam family 'UPRTase' specifically models uracil phosphoribosyltransferases (Upp); the parent PRTase_dom domain spans many PRT substrates, so a uracil-specific term cannot sit on the entry but is correct for this family. Parent InterPro entry IPR000836 (PRTase_dom, 2 Pfam members) has no interpro2go term; blocked at InterPro by PF00156 Pribosyltran (generic phosphoribosyltransferase domain shared by APRT/HGPRT/OPRT/etc.). CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
