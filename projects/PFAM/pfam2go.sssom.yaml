- subject_id: Pfam:PF16363
  subject_label: "GDP_Man_Dehyd"
  predicate_id: RO:0002327
  predicate_label: enables
  object_id: GO:0008446
  object_label: GDP-mannose 4,6-dehydratase activity
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.9
  comment: >-
    Pfam family 'GDP_Man_Dehyd' models GDP-mannose 4,6-dehydratase (Gmd); the parent InterPro entry is a generic NAD(P)-binding fold, which cannot take a substrate-specific dehydratase term. Parent InterPro entry IPR016040 (NAD(P)-bd_dom, 2 Pfam members) has no interpro2go term; blocked at InterPro by PF13460 NAD_binding_10 (generic NAD(P)-binding Rossmann domain shared by many oxidoreductases). CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
- subject_id: Pfam:PF09043
  subject_label: "Lys-AminoMut_A"
  predicate_id: RO:0002327
  predicate_label: enables
  object_id: GO:0047826
  object_label: D-lysine 5,6-aminomutase activity
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.9
  comment: >-
    Pfam family 'Lys-AminoMut_A' is the alpha-subunit TIM-barrel domain of D-lysine 5,6-aminomutase (adenosylcobalamin/B12-dependent). The entry groups two distinct B12 aminomutases (D-lysine 5,6 vs D-ornithine 4,5), so neither specific activity can be placed on the entry. Parent InterPro entry IPR015130 (Lys-AminoMut_A, 2 Pfam members) has no interpro2go term; blocked at InterPro by PF16552 OAM_alpha (D-ornithine 4,5-aminomutase alpha subunit -- a different adenosylcobalamin aminomutase sharing the fold). CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
