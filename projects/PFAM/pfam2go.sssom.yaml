- subject_id: Pfam:PF02431
  subject_label: "Chalcone"
  predicate_id: RO:0002327
  predicate_label: enables
  object_id: GO:0045430
  object_label: chalcone isomerase activity
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.9
  comment: >-
    Pfam family 'Chalcone' is chalcone-flavanone isomerase (CHI). The parent entry also groups CHI-like proteins (CHIL) that are not isomerases, so the catalytic term cannot sit on the entry but is correct for CHI. Parent InterPro entry IPR016087 (Chalcone_isomerase, 3 Pfam members) has no interpro2go term; blocked at InterPro by PF16035/PF16036 Chalcone_2/3 (chalcone-isomerase-like (CHIL) families that include non-catalytic fatty-acid-binding members). CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
- subject_id: Pfam:PF13360
  subject_label: "PQQ_2"
  predicate_id: RO:0002331
  predicate_label: involved in
  object_id: GO:0043165
  object_label: Gram-negative-bacterium-type cell outer membrane assembly
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.9
  comment: >-
    Pfam family 'PQQ_2' is the outer-membrane protein assembly factor BamB, a BAM-complex accessory lipoprotein. The parent entry is a generic beta-propeller shared with quinoprotein dehydrogenases, so an OM-assembly term cannot sit on the entry; BamB is involved in Gram-negative OM biogenesis. Parent InterPro entry IPR002372 (PQQ_rpt_dom, 3 Pfam members) has no interpro2go term; blocked at InterPro by PF01011 PQQ (quinoprotein-dehydrogenase beta-propeller) and PF13570 (beta-alanine-activating enzyme propeller) -- catalytic propellers sharing the fold. CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
- subject_id: Pfam:PF07228
  subject_label: "SpoIIE"
  predicate_id: RO:0002331
  predicate_label: involved in
  object_id: GO:0030435
  object_label: sporulation resulting in formation of a cellular spore
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.6
  comment: >-
    Pfam family 'SpoIIE' is the Stage II sporulation protein E phosphatase that activates sigma-F during Bacillus endospore formation. Its PP2C phosphatase activity is shared with the generic siblings (so MF is not Pfam-specific), but the sporulation process is -- and cannot sit on the generic PP2C entry. MEDIUM: some SpoIIE homologues occur outside canonical sporulation. Parent InterPro entry IPR001932 (PPM-type_phosphatase-like_dom, 3 Pfam members) has no interpro2go term; blocked at InterPro by PF00481/PF13672 PP2C (the generic PP2C-type protein-phosphatase domain, not sporulation-specific). CANDIDATE (MEDIUM confidence) -- needs curator/experimental validation.
- subject_id: Pfam:PF13561
  subject_label: "adh_short_C2"
  predicate_id: RO:0002327
  predicate_label: enables
  object_id: GO:0016631
  object_label: enoyl-[acyl-carrier-protein] reductase [NAD(P)H] activity
  mapping_justification: semapv:ManualMappingCuration
  confidence: 0.6
  comment: >-
    Pfam family 'adh_short_C2' is annotated as enoyl-(acyl-carrier-protein) reductase (FabI/FabL-type). The parent SDR_fam entry is one of the most functionally diverse domains in nature, so no specific activity is assignable at entry level. Cofactor-agnostic NAD(P)H term pending confirmation of cofactor specificity. Parent InterPro entry IPR002347 (SDR_fam, 2 Pfam members) has no interpro2go term; blocked at InterPro by PF00106 adh_short (the generic short-chain dehydrogenase/reductase (SDR) domain -- thousands of distinct substrates). CANDIDATE (MEDIUM confidence) -- needs curator/experimental validation.
