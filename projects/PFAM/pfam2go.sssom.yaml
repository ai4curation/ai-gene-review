  confidence: 0.9
  comment: >-
    Pfam family 'OAM_alpha' is the alpha subunit of D-ornithine 4,5-aminomutase (adenosylcobalamin-dependent). Same heterogeneous entry as PF09043; the specific activity belongs at the Pfam level only. Parent InterPro entry IPR015130 (Lys-AminoMut_A, 2 Pfam members) has no interpro2go term; blocked at InterPro by PF09043 Lys-AminoMut_A (D-lysine 5,6-aminomutase alpha subunit -- a different adenosylcobalamin aminomutase sharing the fold). CANDIDATE (HIGH confidence) -- needs curator/experimental validation.
