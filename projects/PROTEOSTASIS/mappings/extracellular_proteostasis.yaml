id: pn_mapping_set:extracellular_proteostasis
label: Extracellular proteostasis PN mappings
references:
- proteostasis-workbook-2024
- proteostasis-ms1
notes: >-
  Curated PN-to-GO mappings for extracellular proteostasis categories.
subject_curations:
- subject_code: Extracellular proteostasis
  subject_level: branch
  curation_status: no_mapping
  rationale: Reviewed as a top-level PN branch. This is a systems/taxonomy umbrella, not a
    direct GO assertion; narrower child curations carry any propagating GO mappings.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Extracellular proteostasis|Chaperone
  subject_level: class
  curation_status: no_mapping
  rationale: Reviewed as a broad PN category rather than a specific GO class. The member
    genes span multiple activities, complexes, or contexts, so propagation from this node
    would overstate the shared biology; use narrower child or gene-level curations.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Extracellular proteostasis|Protease
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0008233
    label: peptidase activity
  mapping_scope: ok_for_propagation_to_go
  rationale: This PN class contains extracellular/intracellular proteases in the
    extracellular proteostasis branch. The shared molecular-function assertion is peptidase
    activity; narrower metallopeptidase propagation is handled by the child bucket.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Extracellular proteostasis|Chaperone|Extracellular and intracellular
  subject_level: group
  curation_status: no_mapping
  rationale: Reviewed as a contextual PN bucket. The label is useful for curator triage, but
    no direct GO mapping is appropriate because propagation would add a process, activity,
    or localization not shared cleanly by all members.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
