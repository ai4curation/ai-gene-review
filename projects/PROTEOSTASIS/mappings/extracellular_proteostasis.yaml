- subject_code: Extracellular proteostasis|Protease|Extracellular and intracellular
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0004222
    label: metalloendopeptidase activity
  mapping_scope: ok_for_propagation_to_go
  rationale: This PN child bucket is represented by IDE in the current taxonomy and
    converges on metallopeptidase biology. The GO metalloendopeptidase activity term is the
    clearest shared target for propagation.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Extracellular proteostasis|Protease|Plasma membrane
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0005886
    label: plasma membrane
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN group captures plasma-membrane-localized extracellular proteases.
    The source category is location-based rather than a strict GO-equivalent
    class, so the plasma membrane cellular-component term is used at
    propagation scope.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Extracellular proteostasis|Chaperone|Plasma membrane, chaperone domain
    released by proteolysis|BRICHOS domain containing chaperone
  subject_level: type
  curation_status: no_mapping
  rationale: Reviewed as a BRICHOS-domain/extracellular-chaperone subtype. The current
    SFTPC/ITM2B members support extracellular proteostasis context, but there is no clean GO
    target that should be propagated from the subtype label itself.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
