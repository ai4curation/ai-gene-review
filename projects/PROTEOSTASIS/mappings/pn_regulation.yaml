id: pn_mapping_set:pn_regulation
label: PN regulation mappings
references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
notes: >-
  Curated PN-to-GO mappings for proteostasis-regulation pathways.
mappings:
  - subject_code: PN regulation|Transcription factor|Integrated stress response
    subject_level: group
    target_term:
      id: GO:0140467
      label: integrated stress response signaling
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path groups transcription factors that execute the transcriptional
      arm of the integrated stress response. The source category is a regulator
      subclass within the signaling program, so propagation to the GO ISR
      signaling term is appropriate.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Transcription factor|Oxidative stress response
    subject_level: group
    target_term:
      id: GO:1900407
      label: regulation of cellular response to oxidative stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures transcription factors assigned to oxidative-stress
      response programs. Those factors regulate the oxidative-stress response,
      so the GO regulation term is the appropriate propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Transcription factor|Oxidative stress
      response|Transcription of oxidative response genes
    subject_level: type
    target_term:
      id: GO:1900407
      label: regulation of cellular response to oxidative stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type names the transcriptional arm of the oxidative-stress
      response. Mapping to regulation of cellular response to oxidative stress
      preserves the process-level meaning without overclaiming exactness.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Transcription factor|Inflammatory response
    subject_level: group
    target_term:
      id: GO:0006954
      label: inflammatory response
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures transcription factors assigned to inflammatory
      response signaling as a proteostasis-regulatory context. The source is a
      context-defined regulator bucket rather than an exact GO-equivalent class.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Transcription factor|Unfolded protein response|Transcription
      of unfolded protein response genes
    subject_level: type
    target_term:
      id: GO:0006986
      label: response to unfolded protein
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type captures transcriptional outputs of the unfolded-protein
      response. The broader GO response-to-unfolded-protein process is a
      conservative propagation target for this label.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Transcription factor regulator|Oxidative stress response
    subject_level: group
    target_term:
      id: GO:1900407
      label: regulation of cellular response to oxidative stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures regulators of oxidative-stress-responsive
      transcription factors. Propagation to regulation of cellular response to
      oxidative stress preserves the intended process context.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Transcription factor regulator|Oxidative stress response|
      NFE2L2 modulator
    subject_level: type
    target_term:
      id: GO:0006979
      label: response to oxidative stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      NFE2L2 modulators are upstream regulators of the oxidative-stress
      response program. GO response to oxidative stress is the conservative
      propagation target here.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Translation regulator|Integrated stress response
    subject_level: group
    target_term:
      id: GO:0140467
      label: integrated stress response signaling
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path covers translation-regulator components of the integrated
      stress response, including EIF2S1 phosphorylation control. These genes are
      participants in integrated stress response signaling, but the PN group is
      a mechanistic slice of the process rather than a GO-equivalent class.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Translation regulator|Unfolded protein response
    subject_level: group
    target_term:
      id: GO:1903894
      label: regulation of IRE1-mediated unfolded protein response
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group marks the translational control arm of the unfolded
      protein response. Regulation of IRE1-mediated unfolded protein response
      is the cleanest propagation target in the local GO cache.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Translation regulator|Integrated stress
      response|Phosphorylation of EIF2alpha/EIF2S1
    subject_level: type
    target_term:
      id: GO:0032055
      label: negative regulation of translation in response to stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      EIF2S1 phosphorylation is the canonical mechanism that suppresses global
      translation during the integrated stress response. The GO term negative
      regulation of translation in response to stress is therefore an
      appropriate propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Translation regulator|Unfolded protein response|Phosphorylation
      of EIF2alpha/EIF2S1
    subject_level: type
    target_term:
      id: GO:1903894
      label: regulation of IRE1-mediated unfolded protein response
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type links eIF2alpha phosphorylation to unfolded-protein-response
      control. The exact GO response-to-unfolded-protein term is broader than
      the mechanistic subtype, so propagation to the IRE1-mediated UPR
      regulation term is conservative and still informative.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Translation regulator|Integrated stress
      response|Dephosphorylation of EIF2alpha/EIF2S1
    subject_level: type
    target_term:
      id: GO:0032055
      label: negative regulation of translation in response to stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      EIF2S1 dephosphorylation resets the integrated stress response machinery
      that had imposed stress-responsive translational repression. The PN type
      remains part of this translation-regulatory stress module and can
      propagate to the same GO stress-translation term.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      PN regulation|Translation regulator|Unfolded protein response|XBP1
      modulator
    subject_level: type
    target_term:
      id: GO:1903894
      label: regulation of IRE1-mediated unfolded protein response
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      XBP1 modulators are direct participants in IRE1-mediated unfolded protein
      response control. The GO regulation of IRE1-mediated unfolded protein
      response term is the conservative propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Stress response integration
    subject_level: class
    target_term:
      id: GO:0006950
      label: response to stress
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class is an umbrella bucket for multiple stress-response axes.
      GO response to stress is intentionally broad but is still the most
      conservative propagation target for the class-level label.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Transcription factor regulator|Inflammatory response
    subject_level: group
    target_term:
      id: GO:0006954
      label: inflammatory response
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures transcription-factor regulators assigned to
      inflammatory-response control. Propagation to inflammatory response keeps
      the source-side process context while remaining conservative about exact
      equivalence.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: PN regulation|Translation regulator
    subject_level: class
    target_term:
      id: GO:0006417
      label: regulation of translation
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class is the broad translation-regulatory bucket. GO regulation
      of translation is the conservative propagation target for the umbrella
      label.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
