id: pn_mapping_set:pn_regulation
label: PN regulation mappings
references:
- proteostasis-workbook-2024
- proteostasis-ms1
notes: >-
  Curated PN-to-GO mappings for proteostasis-regulation pathways.
subject_curations:
- subject_code: PN regulation
  subject_level: branch
  curation_status: no_mapping
  rationale: Reviewed as a top-level PN branch. This is a systems/taxonomy umbrella, not a
    direct GO assertion; narrower child curations carry any propagating GO mappings.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: PN regulation|Stress response integration
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0006950
    label: response to stress
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN class is an umbrella bucket for multiple stress-response axes.
    GO response to stress is intentionally broad but is still the most
    conservative propagation target for the class-level label.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: PN regulation|Transcription factor
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0003700
    label: DNA-binding transcription factor activity
  mapping_scope: ok_for_propagation_to_go
  rationale: This PN class is the transcription-factor branch of proteostasis regulation.
    Current members converge on DNA-binding transcription-factor activity, making this an
    appropriate class-level propagation target.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: PN regulation|Transcription factor regulator
  subject_level: class
  curation_status: no_mapping
  rationale: Reviewed as a broad PN category rather than a specific GO class. The member
    genes span multiple activities, complexes, or contexts, so propagation from this node
    would overstate the shared biology; use narrower child or gene-level curations.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
