id: pn_mapping_set:nuclear_proteostasis
label: Nuclear proteostasis PN mappings
references:
- proteostasis-workbook-2024
- proteostasis-ms1
notes: >-
  Curated PN-to-GO mappings for nuclear proteostasis transport entries.
subject_curations:
- subject_code: Nuclear proteostasis
  subject_level: branch
  curation_status: pending_review
  rationale: Reviewed as a top-level PN branch. This is a systems membership umbrella, not a direct
    GO assertion; GO propagation should be made only from narrower curated child codes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms1
  notes: Coverage-completion placeholder generated from the PN 4.3.11 2026-04-17 taxonomy so every
    source node is tracked. Status pending_review means this is not a completed manual no-map
    conclusion and must be revisited before treating it as curated non-map.
- subject_code: Nuclear proteostasis|Chaperone
  subject_level: class
  curation_status: pending_review
  rationale: Reviewed during PN taxonomy coverage completion. No defensible universal PN-to-GO
    mapping was selected because the source code is broader, narrower, or more contextual than a GO
    assertion.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms1
  notes: Coverage-completion placeholder generated from the PN 4.3.11 2026-04-17 taxonomy so every
    source node is tracked. Status pending_review means this is not a completed manual no-map
    conclusion and must be revisited before treating it as curated non-map.
- subject_code: Nuclear proteostasis|Protein transport
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0015031
    label: protein transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    The PN nuclear Protein transport class covers the machinery and routes
    that move proteins across the nuclear envelope. GO protein transport is
    the correct propagation target, although the PN class is specialized to
    the nuclear compartment.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Nuclear proteostasis|Chaperone|Histone chaperone
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0140713
    label: histone chaperone activity
  mapping_scope: ok_for_propagation_to_go
  representative_genes:
  - ASF1A
  - ASF1B
  - NPM1
  - CHAF1A
  rationale: >-
    This PN group collects nuclear histone-chaperone factors involved in
    histone handling, deposition, or exchange. The PN bucket is narrower than
    general nuclear proteostasis and aligns well with the GO molecular
    function histone chaperone activity.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Nuclear proteostasis|Protein transport|Nuclear pore complex
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0005643
    label: nuclear pore
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN group denotes core components of the nuclear pore complex. The closest current
    GO target in the local ontology cache is the cellular-component term nuclear pore.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Nuclear proteostasis|Protein transport|Nuclear transport receptor
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  mapping_scope: ok_for_propagation_to_go
  representative_genes:
  - KPNB1
  - KPNA2
  - XPO1
  - HIKESHI
  rationale: >-
    This PN group is not a clean molecular-function class. In the workbook it
    includes canonical karyopherin-beta transport receptors, importin-alpha
    cargo-recognition adaptors, and other dedicated nuclear-transport factors
    such as SNUPN and HIKESHI. The shared biology is participation in
    receptor-mediated traffic through the nuclear pore, not a single GO
    receptor-activity term, so the defensible target is the broader process
    nucleocytoplasmic transport.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: Nuclear proteostasis|Protein transport|Nuclear transport, RAN system
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    The PN Ran-system group captures the directionality and cargo-release machinery that
    powers nuclear import and export. This is a mechanistic subsystem within the broader
    GO process nucleocytoplasmic transport.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: >-
    Nuclear proteostasis|Protein transport|Nuclear transport receptor|Importin, alpha type
  subject_level: type
  curation_status: mapped
  target_term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    Importin-alpha factors are primarily cargo-recognition adaptors that bind
    NLS-containing cargo and work with karyopherin-beta transport receptors,
    rather than forming a clean standalone GO receptor-activity class in the
    local ontology. The PN type is therefore better propagated to the process
    nucleocytoplasmic transport than forced into an MF mapping.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: >-
    Nuclear proteostasis|Protein transport|Nuclear transport receptor|Importin, beta type
  subject_level: type
  curation_status: mapped
  target_term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    Importin-beta family members are the closest thing in this PN branch to a
    transport-receptor activity class, but the current validated GO cache does
    not expose a clean family-level importin/exportin receptor MF term for
    this mapping set. The source type is therefore propagated to the broader
    process nucleocytoplasmic transport.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
- subject_code: >-
    Nuclear proteostasis|Protein transport|Nuclear transport receptor|Non-importin transport receptor
  subject_level: type
  curation_status: mapped
  target_term:
    id: GO:0006913
    label: nucleocytoplasmic transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN type groups dedicated nuclear-transport factors outside the
    canonical importin-alpha/importin-beta classes, including factors such as
    SNUPN and HIKESHI. Because this is a mixed mechanistic bucket rather than
    a single shared molecular activity, propagation to nucleocytoplasmic
    transport is the appropriate level.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
