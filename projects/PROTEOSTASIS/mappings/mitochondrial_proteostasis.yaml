id: pn_mapping_set:mitochondrial_proteostasis
label: Mitochondrial proteostasis PN mappings
references:
  - proteostasis-workbook-2024
  - proteostasis-ms1
notes: >-
  Curated PN-to-GO mappings for mitochondrial proteostasis transport and chaperone entries.
mappings:
  - subject_code: Mitochondrial proteostasis|Protein transport
    subject_level: class
    target_term:
      id: GO:0015031
      label: protein transport
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN mitochondrial Protein transport class groups protein-targeting and
      import pathways into mitochondria. GO protein transport is the appropriate
      propagation target, while the source class remains mitochondria-specific
      and broader than any single GO transport subtype.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Protein transport|Protein import
    subject_level: group
    target_term:
      id: GO:0017038
      label: protein import
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures the mitochondrial protein-import machinery at the
      level above TOMM and TIMM route-specific subcategories. GO protein import
      is the best current propagation target in the local cache.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Chaperone|Small intermembrane space chaperone
    subject_level: group
    target_term:
      id: GO:0042719
      label: mitochondrial intermembrane space chaperone complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures the small intermembrane-space chaperone system
      that stabilizes imported proteins in the mitochondrial intermembrane
      space. The GO cellular-component term for the mitochondrial intermembrane
      space chaperone complex is an appropriate propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Chaperone
    subject_level: class
    target_term:
      id: GO:0042719
      label: mitochondrial intermembrane space chaperone complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class is the broad mitochondrial chaperone bucket. The local GO
      cache exposes a clear mitochondrial intermembrane-space chaperone
      complex term, which is the best propagation target for the class-level
      label.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Chaperone|HSP60 system|HSP60
    subject_level: type
    target_term:
      id: GO:0140662
      label: ATP-dependent protein folding chaperone
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The mitochondrial HSP60 PN category corresponds to canonical chaperonins
      that carry out ATP-dependent protein folding. The source label denotes the
      family/system member type rather than the GO molecular-function class
      itself, so propagation scope is the better fit.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Membrane protein folding|Sorting and assembly machinery outer membrane
    subject_level: group
    target_term:
      id: GO:0005741
      label: mitochondrial outer membrane
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group denotes the SAM outer-membrane assembly system. The GO
      mitochondrial outer membrane cellular-component term is a conservative
      propagation target for this assembly-focused bucket.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Membrane protein folding|Insertase for helical
      proteins into the outer membrane
    subject_level: group
    target_term:
      id: GO:0045040
      label: protein insertion into mitochondrial outer membrane
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group covers the machinery that inserts helical membrane proteins
      into the mitochondrial outer membrane. The corresponding GO process term
      protein insertion into mitochondrial outer membrane is an appropriate
      propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Organelle-specific protein degradation|Matrix protease
    subject_level: group
    target_term:
      id: GO:0005759
      label: mitochondrial matrix
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group identifies matrix-local protease systems. The source is a
      compartmental proteostasis bucket, so the mitochondrial matrix
      cellular-component term is the conservative propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Mitochondrial protein maturation|Processing
      peptidase
    subject_level: group
    target_term:
      id: GO:0017087
      label: mitochondrial processing peptidase complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures the mitochondrial processing peptidase machinery
      that removes targeting presequences from imported mitochondrial proteins.
      The GO cellular-component term for the mitochondrial processing
      peptidase complex is the best supported propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Protein transport|Protein import|Cytosolic
      mitochondria import stimulation factor
    subject_level: type
    target_term:
      id: GO:0030150
      label: protein import into mitochondrial matrix
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type captures the cytosolic factors that stimulate mitochondrial
      import. The GO protein-import process term is the closest conservative
      propagation target in the local cache.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Protein transport|Protein import|Outer
      membrane import|TOMM complex
    subject_level: subtype
    target_term:
      id: GO:0005742
      label: mitochondrial outer membrane translocase complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN subtype denotes TOMM-complex component membership for outer-
      membrane import. The source is a component-role category that maps
      naturally to the GO cellular-component term for the mitochondrial outer
      membrane translocase complex.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Protein transport|Protein import|Inner membrane import
    subject_level: type
    target_term:
      id: GO:0042721
      label: TIM22 mitochondrial import inner membrane insertion complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type captures the inner-membrane import route centered on TIM22
      and closely related insertion machinery. The GO TIM22 insertion complex
      term is the best conservative propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: Mitochondrial proteostasis|Protein transport|Protein import|Outer membrane import
    subject_level: type
    target_term:
      id: GO:0005741
      label: mitochondrial outer membrane
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type covers the outer-membrane entry route for mitochondrial
      protein import. The GO outer membrane cellular-component term is the
      conservative propagation target for the route label.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
  - subject_code: >-
      Mitochondrial proteostasis|Protein transport|Protein import|Inner
      membrane import|TIMM22 complex
    subject_level: subtype
    target_term:
      id: GO:0042721
      label: TIM22 mitochondrial import inner membrane insertion complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN subtype captures TIMM22-complex components responsible for a
      specific inner-membrane import route. The GO cellular-component term for
      the TIM22 insertion complex is an appropriate propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms1
