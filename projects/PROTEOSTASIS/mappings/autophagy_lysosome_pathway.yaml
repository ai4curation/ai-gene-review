id: pn_mapping_set:autophagy_lysosome_pathway
label: Autophagy-Lysosome Pathway PN mappings
references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
notes: >-
  Curated PN-to-GO mappings for the Autophagy-Lysosome Pathway branch.
mappings:
  - subject_code: Autophagy-Lysosome Pathway|Chaperone-mediated autophagy
    subject_level: class
    target_term:
      id: GO:0061684
      label: chaperone-mediated autophagy
    mapping_scope: exact
    rationale: >-
      The PN class label is semantically equivalent to the GO biological process
      term for chaperone-mediated autophagy.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      Starter exact mapping. This is the cleanest class-level alignment
      currently identified in the PN hierarchy.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Chaperone-mediated autophagy|Effectors of
      chaperone-mediated autophagy|Substrate delivery
    subject_level: type
    target_term:
      id: GO:0061740
      label: protein targeting to lysosome involved in chaperone-mediated autophagy
    mapping_scope: exact
    rationale: >-
      Within the CMA branch, the PN type "Substrate delivery" denotes the step
      in which CMA substrates are delivered to the lysosome, which matches the
      GO process term for lysosomal targeting in CMA.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      This mapping is specific to the CMA effector group and should not be
      applied to unrelated delivery or targeting categories elsewhere in the
      workbook.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Aggrephagy
    subject_level: type
    target_term:
      id: GO:0035973
      label: aggrephagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path denotes receptors that recognize aggregation cargo for the
      aggrephagy pathway. The category is not identical to the GO process term,
      but propagation to aggrephagy is appropriate because membership in this
      receptor class implies direct participation in that process.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      Process-propagation mapping from a receptor-role category to the matching
      selective autophagy process.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|ERphagy
    subject_level: type
    target_term:
      id: GO:0061709
      label: reticulophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN uses the community label ERphagy for selective autophagy of the
      endoplasmic reticulum, while GO uses the synonym reticulophagy. Receptor
      members of this PN category are suitable for propagation to the GO
      reticulophagy process.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      GO uses reticulophagy rather than ERphagy for this process.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Ferritinophagy
    subject_level: type
    target_term:
      id: GO:0160247
      label: autophagy cargo adaptor activity
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN ferritinophagy receptor category captures factors such as NCOA4
      that bind ferritin cargo and recruit the autophagy machinery. GO does not
      currently provide a dedicated ferritinophagy process term in the local
      ontology cache, so autophagy cargo adaptor activity is the narrowest
      defensible target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      Chosen as an activity-level fallback because a ferritinophagy process term
      is absent from the current GO cache used for validation.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Glycophagy
    subject_level: type
    target_term:
      id: GO:0061723
      label: glycophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path groups receptors dedicated to selective glycogen autophagy.
      The receptor role is narrower than the full pathway, but members of this
      class can reasonably propagate to the GO glycophagy process.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Mitophagy
    subject_level: type
    target_term:
      id: GO:0000423
      label: mitophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path denotes selective-autophagy receptors for mitochondrial
      cargo. The source category is a mechanistic sub-role within mitophagy, so
      propagation rather than exact equivalence is the correct scope.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Nucleophagy
    subject_level: type
    target_term:
      id: GO:0044804
      label: nucleophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      Receptors in this PN category participate specifically in selective
      autophagic turnover of nuclear material. That supports propagation to the
      GO nucleophagy process even though the PN source is receptor-centric.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Pexophagy
    subject_level: type
    target_term:
      id: GO:0000425
      label: pexophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN path groups receptors for selective autophagic turnover of
      peroxisomes. The role is part of, but not equivalent to, the full GO
      pexophagy process, so propagation scope is appropriate.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Ribophagy
    subject_level: type
    target_term:
      id: GO:0034517
      label: ribophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN category covers receptors for autophagic turnover of ribosomes.
      These genes belong in the ribophagy process, but the PN label denotes a
      receptor role rather than the entire process class.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Lysophagy
    subject_level: type
    target_term:
      id: GO:0160247
      label: autophagy cargo adaptor activity
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN lysophagy receptor class denotes factors that recognize damaged
      lysosomal cargo and couple it to autophagic clearance. Since the current
      GO cache lacks a dedicated lysophagy process term, autophagy cargo
      adaptor activity is the most specific supported target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Midbody autophagy
    subject_level: type
    target_term:
      id: GO:0160247
      label: autophagy cargo adaptor activity
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      Midbody-autophagy receptors such as SQSTM1 link ubiquitinated midbody
      material to the autophagy machinery. GO does not currently expose a
      dedicated midbody-autophagy process term in the local ontology cache, so
      the receptor activity term is the best available mapping target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Xenophagy
    subject_level: type
    target_term:
      id: GO:0098792
      label: xenophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN category captures receptors for selective autophagy of pathogens
      or pathogen-derived material. The receptor class is narrower than the GO
      xenophagy process, so this is a propagation mapping.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Synaptophagy
    subject_level: type
    target_term:
      id: GO:0160247
      label: autophagy cargo adaptor activity
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN synaptophagy receptor category includes factors that recruit
      synaptic cargo to autophagosomes. Because the validated GO cache has no
      dedicated synaptophagy process term, autophagy cargo adaptor activity is
      the narrowest current target that preserves the receptor semantics.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Individual substrates
    subject_level: type
    target_term:
      id: GO:0160247
      label: autophagy cargo adaptor activity
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN category groups receptors such as TRIM-family factors that bind
      specific substrates and recruit autophagy components for their turnover.
      That aligns best with autophagy cargo adaptor activity rather than with a
      single selective-autophagy process term.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagy substrate selection|Selective
      autophagy receptor|Chaperone assisted selective autophagy|CASA complex
      component
    subject_level: subtype
    target_term:
      id: GO:0035973
      label: aggrephagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      The PN CASA subtype covers BAG3-HSPB8-HSP70-system machinery that directs
      damaged or aggregation-prone substrates into selective autophagic
      clearance. GO lacks a dedicated CASA term in the current cache, and this
      subtype includes chaperones and cofactors beyond pure cargo adaptors, so
      aggrephagy is the closest available process target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
    notes: >-
      Mapped to aggrephagy rather than autophagy cargo adaptor activity because
      the PN subtype includes mixed machinery roles, not only receptor/adaptor
      functions.
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagophore initiation and elongation
    subject_level: class
    target_term:
      id: GO:0016236
      label: macroautophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class covers the initiation and elongation phase of canonical
      autophagosome formation. The class represents a major segment of the
      macroautophagy process rather than the entire process, so propagation is
      appropriate but exact equivalence is not.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagosome closure maturation and lysosome
