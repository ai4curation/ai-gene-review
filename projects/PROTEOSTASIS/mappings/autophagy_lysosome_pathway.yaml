      label: regulation of autophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class is explicitly organized around upstream signaling pathways
      that modulate autophagy initiation. Since it includes both activating and
      inhibiting inputs, the correct GO target is the generic regulation of
      autophagy term rather than a directional child.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
