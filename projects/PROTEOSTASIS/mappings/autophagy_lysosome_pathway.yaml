    GO assertion; GO propagation should be made only from narrower curated child codes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
  notes: Coverage-completion placeholder generated from the PN 4.3.11 2026-04-17 taxonomy so every
