id: pn_mapping_set:autophagy_lysosome_pathway
label: Autophagy-Lysosome Pathway PN mappings
references:
- proteostasis-workbook-2024
- proteostasis-ms2
notes: >-
  Curated PN-to-GO mappings for the Autophagy-Lysosome Pathway branch.
subject_curations:
- subject_code: Autophagy-Lysosome Pathway
  subject_level: branch
  curation_status: no_mapping
  rationale: Reviewed as the top-level PN branch. It is a project taxonomy umbrella rather than a
    direct GO assertion; all propagation must come from manually curated child nodes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0007040
    label: lysosome organization
  mapping_scope: too_broad_to_propagate
  rationale: >-
    Autophagic lysosome reformation is the lysosome-regeneration phase that
    follows autolysosome formation and cargo degradation. As a class, it is
    better aligned to lysosome organization than to generic autophagy, but
    the PN members are mechanistically mixed across membrane remodeling,
    tubulation, product efflux, and unknown late-stage roles, so class-level
    propagation would still over-annotate.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    Recorded as a non-propagating broad relation. Safer propagation should
    happen from narrower group-level nodes such as lysosomal tubulation rather
    than from the class as a whole.
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagophore initiation and elongation
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0016236
    label: macroautophagy
  mapping_scope: too_broad_to_propagate
  rationale: >-
    This class is a real macroautophagy context, but its descendants include core factors, component buckets,
    upstream modulators, localization roles, and residual categories. Projecting generic macroautophagy
    from this ancestor creates TRAPP-like overpropagation, so candidate GO annotations must come from
    narrower curated nodes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagosome closure maturation and lysosome fusion
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0016236
    label: macroautophagy
  mapping_scope: too_broad_to_propagate
  rationale: >-
    This class is a late macroautophagy context, but the subtree mixes docking, fusion, localization,
    membrane-composition, and unknown late-stage roles. The class-level relation is useful for display
    while propagation is restricted to narrower mechanism nodes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: Autophagy-Lysosome Pathway|Autophagy gene expression
  subject_level: class
  curation_status: context_only
  rationale: This class records autophagy-linked gene-expression programs, but many nodes are
    transcription program names or upstream modulators rather than direct GO regulation assertions.
    It is kept as context only; transcription factor or cofactor activities are mapped at narrower
    nodes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
  target_term:
    id: GO:0010506
    label: regulation of autophagy
  mapping_scope: too_broad_to_propagate
- subject_code: Autophagy-Lysosome Pathway|Autophagy substrate selection
  subject_level: class
  curation_status: no_mapping
  rationale: Reviewed as a broad substrate-selection container. GO has useful targets for specific
    receptor, cargo-adaptor, and selective-autophagy leaves, but this class mixes marking,
    recognition, receptor regulation, and unknown roles and should not propagate as one term.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: Autophagy-Lysosome Pathway|Chaperone-mediated autophagy
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0061684
    label: chaperone-mediated autophagy
  mapping_scope: too_broad_to_propagate
  rationale: >-
    The class label matches the GO CMA process, but the subtree includes both effectors and positive or
    negative modulators. The relation is retained as context so modulators are not projected as direct
    CMA participants unless a narrower node supports it.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: Autophagy-Lysosome Pathway|Lysosomal catabolism
  subject_level: class
  curation_status: no_mapping
  rationale: Reviewed as a broad lysosomal-degradation container. The subtree includes carbohydrate,
    lipid, protein, nuclease, phosphatase, sulfatase, and environment-regulation roles, so mapping
    should occur at the enzyme or process subtype level.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: Autophagy-Lysosome Pathway|Microautophagy
  subject_level: class
  curation_status: context_only
  rationale: The class names a real GO process, but the subtree includes machinery components and
    mitochondrion-derived-vesicle contexts as well as process labels. Propagation is restricted to
    narrower nodes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
  target_term:
    id: GO:0016237
    label: microautophagy
  mapping_scope: too_broad_to_propagate
- subject_code: >-
    Autophagy-Lysosome Pathway|Pre-initiation autophagy signaling
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0010506
    label: regulation of autophagy
  mapping_scope: too_broad_to_propagate
  rationale: >-
    This class organizes upstream signaling inputs to autophagy initiation. Because the subtree contains
    generic insulin, AMPK, mTORC1, nutrient-sensing, and miscellaneous signaling components, class-level
    propagation to regulation of autophagy would over-annotate many genes.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: Autophagy-Lysosome Pathway|Specific function in autophagy unknown
  subject_level: class
  curation_status: no_mapping
  rationale: Reviewed as an explicit unknown-function class. The source label does not provide a
    GO-mappable shared function or process.
  references:
  - proteostasis-workbook-2026
  - proteostasis-ms2
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation|Efflux of autophagy products
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0007041
    label: lysosomal transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN leaf denotes export of degradation products from the autolysosome
    during late-stage autophagic lysosome reformation. The closest current GO
    process term is lysosomal transport, because the key shared semantics are
    transport across the lysosomal/autolysosomal membrane rather than a
    specific cargo chemistry.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    For SPNS1, existing GOA already captures cargo-level biology such as
    lysophospholipid transport and phospholipid efflux, but those terms do
    not capture the autophagic-lysosome-reformation context highlighted by
    the PN curation and the underlying starvation-recovery literature.
    Propagating to lysosomal transport would therefore add new process-level
    context rather than a wholly new molecular capability. This is useful but
    still incomplete, because GO lacks a more explicit term for efflux of
    autolysosomal degradation products during lysosome reformation.
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation|Lysosomal tubulation
  subject_level: group
  curation_status: context_only
  target_term:
    id: GO:0007040
    label: lysosome organization
  mapping_scope: too_broad_to_propagate
  representative_genes:
  - KIF5B
  - RAB7A
  - RAB7B
  rationale: >-
    This PN group specifically captures the tubulation and membrane-remodeling
    step that regenerates lysosomes from autolysosomes. That aligns better to
    lysosome organization than to generic autophagy, but the current member
    set mixes factors annotated in GO to lysosome localization and
    phagosome/lysosome fusion rather than a clean shared lysosome-organization
    process role, so propagation would overstate the evidence.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    Recorded as contextual alignment only. KIF5B currently carries lysosome
    localization in UniProt/GOA rather than lysosome organization, and RAB7A
    and RAB7B are captured by related late endolysosomal fusion/location
    terms.
