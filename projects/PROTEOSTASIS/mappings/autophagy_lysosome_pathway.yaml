    subject_level: class
    target_term:
      id: GO:0016236
      label: macroautophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN class captures the closure, maturation, trafficking, and
      lysosome-fusion stages of autophagosome handling. Those events are part
      of macroautophagy, but the PN class is a process segment rather than a
      full GO process class.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Autophagic lysosome reformation
    subject_level: class
    target_term:
      id: GO:0006914
      label: autophagy
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      Autophagic lysosome reformation is a downstream stage of the autophagy
      cycle that restores lysosome capacity after autolysosome resolution.
      GO does not expose a dedicated term in the local cache for this stage, so
      broad autophagy is the narrowest supported process target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms2
  - subject_code: >-
      Autophagy-Lysosome Pathway|Pre-initiation autophagy signaling
    subject_level: class
    target_term:
