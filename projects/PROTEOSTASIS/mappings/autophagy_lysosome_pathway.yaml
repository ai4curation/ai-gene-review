- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation|Efflux of autophagy products
  subject_level: group
  curation_status: mapped
  target_term:
    id: GO:0007041
    label: lysosomal transport
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN leaf denotes export of degradation products from the autolysosome
    during late-stage autophagic lysosome reformation. The closest current GO
    process term is lysosomal transport, because the key shared semantics are
    transport across the lysosomal/autolysosomal membrane rather than a
    specific cargo chemistry.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    For SPNS1, existing GOA already captures cargo-level biology such as
    lysophospholipid transport and phospholipid efflux, but those terms do
    not capture the autophagic-lysosome-reformation context highlighted by
    the PN curation and the underlying starvation-recovery literature.
    Propagating to lysosomal transport would therefore add new process-level
    context rather than a wholly new molecular capability. This is useful but
    still incomplete, because GO lacks a more explicit term for efflux of
    autolysosomal degradation products during lysosome reformation.
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation|Lysosomal tubulation
  subject_level: group
  curation_status: context_only
  target_term:
    id: GO:0007040
    label: lysosome organization
  mapping_scope: too_broad_to_propagate
  representative_genes:
  - KIF5B
  - RAB7A
  - RAB7B
  rationale: >-
    This PN group specifically captures the tubulation and membrane-remodeling
    step that regenerates lysosomes from autolysosomes. That aligns better to
    lysosome organization than to generic autophagy, but the current member
    set mixes factors annotated in GO to lysosome localization and
    phagosome/lysosome fusion rather than a clean shared lysosome-organization
    process role, so propagation would overstate the evidence.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    Recorded as contextual alignment only. KIF5B currently carries lysosome
    localization in UniProt/GOA rather than lysosome organization, and RAB7A
    and RAB7B are captured by related late endolysosomal fusion/location
    terms.
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation|Regulation of autolysosome membrane composition
  subject_level: group
  curation_status: deferred
  rationale: >-
    This PN leaf points to a very specific late-autolysosome membrane
    remodeling role, but the current GO candidates are either too generic
    (for example lysosome organization) or too centered on upstream
    phosphoinositide biochemistry rather than the autolysosome context.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    Revisit if a more explicit GO term for autolysosome membrane remodeling
    or phosphoinositide-dependent lysosome reformation becomes available.
