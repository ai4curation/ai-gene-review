- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagic lysosome reformation
  subject_level: class
  curation_status: context_only
  target_term:
    id: GO:0007040
    label: lysosome organization
  mapping_scope: too_broad_to_propagate
  rationale: >-
    Autophagic lysosome reformation is the lysosome-regeneration phase that
    follows autolysosome formation and cargo degradation. As a class, it is
    better aligned to lysosome organization than to generic autophagy, but
    the PN members are mechanistically mixed across membrane remodeling,
    tubulation, product efflux, and unknown late-stage roles, so class-level
    propagation would still over-annotate.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
  notes: >-
    Recorded as a non-propagating broad relation. Safer propagation should
    happen from narrower group-level nodes such as lysosomal tubulation rather
    than from the class as a whole.
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagophore initiation and elongation
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0016236
    label: macroautophagy
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN class covers the initiation and elongation phase of canonical
    autophagosome formation. The class represents a major segment of the
    macroautophagy process rather than the entire process, so propagation is
    appropriate but exact equivalence is not.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
- subject_code: >-
    Autophagy-Lysosome Pathway|Autophagosome closure maturation and lysosome fusion
  subject_level: class
  curation_status: mapped
  target_term:
    id: GO:0016236
    label: macroautophagy
  mapping_scope: ok_for_propagation_to_go
  rationale: >-
    This PN class captures the closure, maturation, trafficking, and
    lysosome-fusion stages of autophagosome handling. Those events are part
    of macroautophagy, but the PN class is a process segment rather than a
    full GO process class.
  references:
  - proteostasis-workbook-2024
  - proteostasis-ms2
