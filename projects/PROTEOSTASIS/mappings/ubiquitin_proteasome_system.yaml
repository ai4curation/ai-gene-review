id: pn_mapping_set:ubiquitin_proteasome_system
label: Ubiquitin Proteasome System PN mappings
references:
  - proteostasis-workbook-2024
  - proteostasis-ms3
notes: >-
  Curated PN-to-GO mappings for high-confidence UPS context labels. These are
  primarily propagation mappings from PN context buckets to GO process,
  component, or activity terms.
mappings:
  - subject_code: >-
      Ubiquitin Proteasome System|E3 ubiquitin and UBL ligases|Anaphase
      Promoting Complex
    subject_level: group
    target_term:
      id: GO:0005680
      label: anaphase-promoting complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group denotes APC/C components within the UPS hierarchy. The GO
      cellular-component term anaphase-promoting complex is the appropriate
      propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: >-
      Ubiquitin Proteasome System|Ubiquitin and UBL binding|DNA repair
    subject_level: group
    target_term:
      id: GO:0006281
      label: DNA repair
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures ubiquitin/UBL-binding factors assigned to DNA
      repair contexts. The group is context-defined rather than GO-equivalent,
      but propagation to DNA repair is appropriate.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: >-
      Ubiquitin Proteasome System|Ubiquitin and UBL binding|DNA replication
    subject_level: group
    target_term:
