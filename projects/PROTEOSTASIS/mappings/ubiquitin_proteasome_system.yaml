id: pn_mapping_set:ubiquitin_proteasome_system
label: Ubiquitin Proteasome System PN mappings
references:
  - proteostasis-workbook-2024
  - proteostasis-ms3
notes: >-
  Curated PN-to-GO mappings for high-confidence UPS context labels. These are
  primarily propagation mappings from PN context buckets to GO process,
  component, or activity terms.
mappings:
  - subject_code: >-
      Ubiquitin Proteasome System|E3 ubiquitin and UBL ligases|idiosyncratic
      RING complex|Anaphase Promoting Complex
    subject_level: type
    target_term:
      id: GO:0005680
      label: anaphase-promoting complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      In `4.3.11`, APC/C is nested under the idiosyncratic RING-complex branch
      rather than appearing as a direct group. The GO cellular-component term
      anaphase-promoting complex remains the appropriate propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: >-
      Ubiquitin Proteasome System|Ubiquitin and UBL binding|DNA repair
    subject_level: group
    target_term:
      id: GO:0006281
      label: DNA repair
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures ubiquitin/UBL-binding factors assigned to DNA
      repair contexts. The group is context-defined rather than GO-equivalent,
      but propagation to DNA repair is appropriate.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: >-
      Ubiquitin Proteasome System|Ubiquitin and UBL binding|DNA replication
    subject_level: group
    target_term:
      id: GO:0006260
      label: DNA replication
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group is defined by ubiquitin/UBL-binding roles in DNA
      replication. The source category is narrower than the GO process itself
      and is therefore treated as a propagation mapping.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: Ubiquitin Proteasome System|Ubiquitin and UBL binding|translation
    subject_level: group
    target_term:
      id: GO:0006412
      label: translation
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN group captures ubiquitin/UBL-binding factors assigned to
      translation-related contexts. Propagation to GO translation preserves the
      source-side biological context without asserting exact equivalence.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
  - subject_code: >-
      Ubiquitin Proteasome System|DUBs and UBL demodifiers|JAMM / MPN|EIF3
      complex
    subject_level: type
    target_term:
      id: GO:0005852
      label: eukaryotic translation initiation factor 3 complex
    mapping_scope: ok_for_propagation_to_go
    rationale: >-
      This PN type captures JAMM/MPN proteins assigned to the eIF3 complex,
      notably proteostasis-linked eIF3 subunits with metalloprotease-like MPN
      domains. The GO eIF3 complex term is the correct propagation target.
    references:
      - proteostasis-workbook-2024
      - proteostasis-ms3
