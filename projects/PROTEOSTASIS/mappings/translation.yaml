- subject_code: Translation|Cytosolic translation|Ribosome-associated QC|Deubiquitination
  subject_level: type
  curation_status: mapped
  target_term:
    id: GO:0101005
    label: deubiquitinase activity
  mapping_scope: ok_for_propagation_to_go
