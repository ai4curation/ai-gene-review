# ===== substrate-HETEROGENEOUS family: split by clade (OpenScientist structural verification) =====
# NF002326 is a single NCBIFAM equivalog accession, but structural verification (2026-07-18) showed it
# is substrate-heterogeneous, so there is NO single specific exactMatch. We represent it faithfully with
# three rows: one family-level exactMatch to the common parent true for ALL members (GO:0016793 -- NCBI's
# original hmm_PGAP value, vindicated) + two narrowMatch rows for the two verified sub-clades (which a
# propagation tool should resolve per-member, not blanket-propagate). This is the mirror of the DUF1156
# case: there the seed UNDER-specified (a DUF hid a real MF); here an earlier "refine" to strict
# GO:0008832 OVER-specified a heterogeneous family. Evidence:
# ../NCBIFam/NF002326-hypotheses/dgtpase_activity_check/COMPARISON.md.

- subject_id: NCBIFAM:NF002326
  subject_label: "deoxyguanosinetriphosphate triphosphohydrolase / dGTPase (equivalog)"
  predicate_id: skos:exactMatch
  predicate_label: exact match
  object_id: GO:0016793
  object_label: triphosphoric monoester hydrolase activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Family-level term, true for ALL members and the safely-propagatable ncbifam2go row: every member is
    an HD-superfamily (deoxy)nucleoside-triphosphate triphosphohydrolase. This is NCBI's original go_terms
    value; our earlier refine to the specific GO:0008832 over-reached at the family level because the
    family is substrate-heterogeneous (see the two narrowMatch rows). Gain vs this parent ~0 (near-
    universal, adds no annotations) -- but it is the honest all-member call.

- subject_id: NCBIFAM:NF002326
  subject_label: "deoxyguanosinetriphosphate triphosphohydrolase / dGTPase (equivalog)"
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0008832
  object_label: dGTPase activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    STRICT-dGTPase sub-clade (E. coli Dgt-like; product name = dGTPase, EC 3.1.5.1; ec2go EC 3.1.5.1 ->
    GO:0008832). narrowMatch: this specific activity fits the family's dGTPase core (the ~59 reviewed
    members already carrying GO:0008832), NOT every member. Against this term gain_all=456 of 3719. Do
    NOT blanket-propagate -- the raw gain_rev=13 is the "-like" clade, which belongs to the broad-dNTPase
    row below (structurally SAMHD1-like, not strict dGTP). For the strict core this is the correct
    informative term.

- subject_id: NCBIFAM:NF002326
  subject_label: "deoxyguanosinetriphosphate triphosphohydrolase / dGTPase (equivalog)"
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0106375
  object_label: deoxynucleoside triphosphate hydrolase activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    BROAD-dNTPase "-like" sub-clade. narrowMatch: applies to the SAMHD1-like members UniProt cautiously
    names "...triphosphohydrolase-LIKE protein" with no EC (e.g. DGTL1_RHIME Q92Q32, DGTL1_BRUA2 Q2YNK0
    -- the 13 reviewed that lack GO:0008832). OpenScientist 2026-07-18 (blinded structural run on Q92Q32;
    COMPARISON.md): catalytically INTACT HD-domain metallocenter (AF pLDDT 94.8) -- so an MF is warranted
    -- but closest to human SAMHD1 (33.1% id, a broad dNTPase), distant from strict E. coli Dgt (26.2%),
    so strict dGTP is not supported. GO:0106375 and GO:0008832 are siblings under GO:0016793, so this
    clade takes the sibling, not GO:0008832. Exact substrate remains UNDECIDED pending an in-vitro assay
    of all four dNTPs; this vindicates the curators' "-like" caution.

