# Matrisome family -> GO mapping (SSSOM)
#
# The matrisome (Naba/Hynes; Matrisome AnalyzeR masterlist) is a curated membership list that
# assigns each ECM / ECM-associated gene to one of six families under two categories:
#
#   Core matrisome        : Collagens, ECM Glycoproteins, Proteoglycans
#   Matrisome-associated  : ECM-affiliated Proteins, ECM Regulators, Secreted Factors
#
# Only the THREE CORE families are mapped to a GO cellular-component term, because only they make a
# defensible blanket localization statement ("members are located in the extracellular matrix").
# The three matrisome-ASSOCIATED families are deliberately recorded as sssom:NoTermFound gap rows:
# they are functional/relational groupings (proteases, cross-linkers, secreted cytokines/growth
# factors) whose members are NOT necessarily ECM-localized, so propagating GO:0031012 to them would
# manufacture over-annotations (e.g. a TGF-beta "Secreted Factor" is secreted, not ECM-structural).
#
# These mappings are LEADS for a curator (used to surface candidate MISSING annotations), not
# automatic assertions. The matrisome itself does not deposit GO annotations; ECM GO:0031012 HDA
# annotations in GOA are made independently by GO curators (GO_Central, BHF-UCL) citing the
# underlying proteomics papers.
#
# Source list: Matrisome/MatrisomeAnalyzeR @ d8aec6d (data/matrisome.list.rda), GPL (>=3).
#
# Validate with:
#   just validate-matrisome-mappings

mapping_set_id: https://w3id.org/ai4curation/ai-gene-review/mappings/matrisome2go
mapping_set_title: Matrisome family to GO mapping (ECM cellular-component localization)
mapping_set_description: >-
  Curated mappings from the six matrisome families (Naba/Hynes matrisome "parts list") to Gene
  Ontology cellular-component terms. Only the three core-matrisome families (Collagens, ECM
  Glycoproteins, Proteoglycans) are mapped to a GO ECM localization term; the three
  matrisome-associated families are recorded as gap rows (sssom:NoTermFound) because their members
  are not reliably ECM-localized. Used to find candidate missing ECM localization annotations, not
  to auto-assert. GO ids/labels verified against the Gene Ontology.
license: https://creativecommons.org/licenses/by/4.0/
creator_label:
- AI Gene Review project
mapping_date: "2026-06-22"
curie_map:
  matrisome: https://ai4curation.io/ai-gene-review/matrisome/family/
  GO: http://purl.obolibrary.org/obo/GO_
  RO: http://purl.obolibrary.org/obo/RO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  sssom: https://w3id.org/sssom/
  obo: http://purl.obolibrary.org/obo/

mappings:
# --- Core matrisome families -> ECM cellular component (located in) ---
- subject_id: matrisome:Collagens
  subject_label: Collagens
  predicate_id: RO:0001025
  predicate_label: located in
  object_id: GO:0031012
  object_label: extracellular matrix
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Collagen-family members are structural components of, and located in, the extracellular matrix.
    NB: the more specific GO:0062023 "collagen-containing extracellular matrix" was OBSOLETED and
    merged back into GO:0031012 (replaced_by GO:0031012; go-ontology#29475, "not clearly defined and
    usage has been inconsistent"), so GO:0031012 is now the correct localization term for collagens.

- subject_id: matrisome:ECM Glycoproteins
  subject_label: ECM Glycoproteins
  predicate_id: RO:0001025
  predicate_label: located in
  object_id: GO:0031012
  object_label: extracellular matrix
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Core-matrisome ECM glycoproteins are located in the extracellular matrix. GO:0031012 is the
    general, undisputed term (the former child GO:0062023 collagen-containing ECM is now obsolete).

- subject_id: matrisome:Proteoglycans
  subject_label: Proteoglycans
  predicate_id: RO:0001025
  predicate_label: located in
  object_id: GO:0031012
  object_label: extracellular matrix
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Core-matrisome proteoglycans are located in the extracellular matrix (GO:0031012).

# --- Matrisome-associated families -> deliberately unmapped (gap rows) ---
- subject_id: matrisome:ECM-affiliated Proteins
  subject_label: ECM-affiliated Proteins
  predicate_id: skos:relatedMatch
  predicate_label: related match
  object_id: sssom:NoTermFound
  object_source: obo:go.owl
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Heterogeneous family (lectins, syndecans, semaphorins, mucins, ...) that associate with but are
    not necessarily located in the ECM. No single GO term applies; not propagated.

- subject_id: matrisome:ECM Regulators
  subject_label: ECM Regulators
  predicate_id: skos:relatedMatch
  predicate_label: related match
  object_id: sssom:NoTermFound
  object_source: obo:go.owl
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Enzymes acting on the ECM (MMPs/proteases, LOX/cross-linkers, ...). Their molecular functions
    vary widely and they act on rather than reside in the ECM; at most a BP (GO:0030198 extracellular
    matrix organization) would apply, which is out of scope for this localization-focused mapping.

- subject_id: matrisome:Secreted Factors
  subject_label: Secreted Factors
  predicate_id: skos:relatedMatch
  predicate_label: related match
  object_id: sssom:NoTermFound
  object_source: obo:go.owl
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Cytokines, growth factors and other secreted signalling molecules (TGF-beta, Wnts, ...). These
    are secreted (GO:0005576 extracellular region), not ECM-structural; mapping to GO:0031012 would
    be an over-annotation, so this family is deliberately not propagated.
