  or ambiguous). Evidence in each comment; full table in data/propagation_evidence.tsv. Verdicts: {''UNCERTAIN'':
  91, ''JUSTIFIED'': 80, ''NOT_JUSTIFIED_AT_LEVEL'': 23}.'
