mapping_set_title: TC -> GO propagation verdicts (GO xref leads scored by UniProt evidence)
mapping_set_description: 'Every GO->TC xref source (tc2go.from_go.sssom.yaml), scored for propagation
  justifiability against UniProt member evidence: fraction of reviewed proteins carrying the TC id that
  also carry the GO term (closure). exactMatch = JUSTIFIED (activity shared across the TC group); narrowMatch
