# TCDB -> GO mapping (SSSOM) -- curated seed of TC-family -> GO molecular-function mappings
#
# GO curates some TC references on its terms (see tc2go.from_go.sssom.yaml: 170 MF terms / 63
# families), but there is NO tc2go external2go ANNOTATION pipeline (unlike rhea2go / ec2go), so a
# protein's TC classification is never propagated to a GO term. TCDB also publishes a per-protein GO
# dump (https://tcdb.org/cgi-bin/projectv/public/go.py) but it is a noisy multi-aspect aggregation,
# not a curated pipeline (see ../TCDB.md, TCDB-METHODOLOGY.md). These are hand-curated TC-family ->
# GO transporter-activity (molecular function) mappings, each backed by a REVIEWED (Swiss-Prot)
# transporter that carries the activity, most already reviewed in this repo with experimental
# evidence. 4 of the 6 families (2.A.17, 2.A.18, 2.A.36, 2.A.38) are ALSO GO-xref'd (independent
# confirmation); 1.A.8 and 2.A.69 are not yet in GO's xrefs.
#
# Predicate classes encode the well-known TCDB<->GO specificity problem (a TC family often spans many
# substrate specificities that GO resolves as distinct MF children):
#   * skos:exactMatch -- the family is mono-specific (one GO term fits the whole family): the GO term IS the family's
#                        activity. A ready-to-add tc2go row.
#   * skos:narrowMatch -- the GO term is NARROWER than the family (it applies to a substrate-specific
#                        subfamily). The family as a whole is poly-specific; the row records the
#                        subfamily-appropriate term with the backing entry named in the comment.
#   * skos:broadMatch -- only a BROADER activity term exists; the comment names the narrower GO term
#                        that should be requested (proposed_new_terms).
#
# Provenance: every TC number + family name is from the UniProtKB DR TCDB cross-reference of the
# backing entry; every GO id/label was verified non-obsolete and molecular_function against QuickGO;
# "no tc2go mapping exists" was checked against the GO external2go directory. Validate with:
#   just validate-tcdb-mappings

curie_map:
  TC: http://www.tcdb.org/search/result.php?tc=
  GO: http://purl.obolibrary.org/obo/GO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  sssom: https://w3id.org/sssom/
  obo: http://purl.obolibrary.org/obo/

mapping_set_id: https://w3id.org/ai4curation/ai-gene-review/mappings/tc2go
mapping_set_title: TCDB to GO mapping (curated seed for a missing tc2go)
mapping_set_description: >-
  Curated TC-family -> GO molecular-function (transporter activity) mappings. TCDB has no external2go
  mapping into GOA, so its IUBMB-endorsed transporter classification does not propagate to GO the way
  EC (ec2go) and RHEA (rhea2go) do. Each row maps a TC family to a transporter-activity MF term,
  backed by a reviewed Swiss-Prot transporter (mostly reviewed in this repo with experimental
  evidence: PIN1 Q9C6B8, AUX1 Q96247, SOS1 Q9LKW9, CHL1/NRT1.1 Q05085, HKT1 Q84TI7, AQP1 P29972).
  exactMatch rows are mono-specific (ready-to-add); narrowMatch rows attach a substrate-specific term
  to a poly-specific family (subfamily-level); broadMatch rows flag a narrower term to request. Seeds
  a tc2go pipeline and quality-checks GO transporter-activity annotation of these families.
license: https://creativecommons.org/licenses/by/4.0/
creator_label:
- AI Gene Review project
mapping_date: "2026-07-18"
subject_source: tcdb
object_source: GO

mappings:
# ===== exactMatch: mono-specific family, ready-to-add tc2go row =====

- subject_id: TC:2.A.69
  subject_label: The Auxin Efflux Carrier (AEC) Family
  predicate_id: skos:exactMatch
  predicate_label: exact match
  object_id: GO:0010329
  object_label: auxin efflux transmembrane transporter activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    AEC family (PIN proteins) is mono-specific: auxin efflux. Backed by Arabidopsis PIN1 (Q9C6B8,
    DR TCDB 2.A.69.1.1) reviewed in this repo with GO:0010329 by IDA and IMP. TCDB go.py already
    asserts this exact term for 2.A.69; not in any external2go mapping.

- subject_id: TC:1.A.8
  subject_label: The Major Intrinsic Protein (MIP) Family
  predicate_id: skos:exactMatch
  predicate_label: exact match
  object_id: GO:0015250
  object_label: water channel activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Classical aquaporins (MIP family) are water channels. Backed by human AQP1 (P29972,
    DR TCDB 1.A.8.8.1) which carries GO:0015250 (verified live from the UniProt entry). The MIP
    family also contains glycerol-permeable aquaglyceroporins (a narrowMatch subfamily distinction),
    but the water-channel activity is the family archetype. Not in any external2go mapping.

# ===== narrowMatch: GO term applies to a substrate-specific subfamily of a poly-specific family =====

- subject_id: TC:2.A.17
  subject_label: The Proton-dependent Oligopeptide Transporter (POT/PTR) Family
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0015112
  object_label: nitrate transmembrane transporter activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    Worked too-general-family case. The POT/PTR family is broadly a proton-dependent oligopeptide transporter,
    but the plant NRT1/NPF subfamily transports nitrate. Backed by Arabidopsis CHL1/NRT1.1 (Q05085,
    DR TCDB 2.A.17.3.1) reviewed in this repo with GO:0015112 nitrate transmembrane transporter
    activity by IMP. The family-level term would be peptide transport; GO:0015112 is the
    subfamily-appropriate MF term. Not in any external2go mapping.

- subject_id: TC:2.A.18
  subject_label: The Amino Acid/Auxin Permease (AAAP) Family
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0010328
  object_label: auxin influx transmembrane transporter activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    The AAAP family is broadly an amino acid permease (family-level term GO:0015171 amino acid
    transmembrane transporter activity); the AUX/LAX subfamily is a proton-driven auxin importer.
    Backed by Arabidopsis AUX1 (Q96247, DR TCDB 2.A.18.1.1) reviewed in this repo with GO:0010328
    auxin influx transmembrane transporter activity by IDA. Not in any external2go mapping.

- subject_id: TC:2.A.36
  subject_label: The Monovalent Cation:Proton Antiporter-1 (CPA1) Family
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0015385
  object_label: sodium:proton antiporter activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    The CPA1 family comprises monovalent-cation:proton antiporters; the exact cation (Na+, K+) varies
    by member, so this is a subfamily-level substrate specification. Backed by Arabidopsis SOS1
    (Q9LKW9, DR TCDB 2.A.36.7.6) reviewed in this repo, a plasma-membrane Na+/H+ antiporter carrying
    GO:0015385 (family-level term is GO:0015297 antiporter activity). Not in any external2go mapping.

- subject_id: TC:2.A.38
  subject_label: The K+ Transporter (Trk) Family
  predicate_id: skos:narrowMatch
  predicate_label: narrow match
  object_id: GO:0015079
  object_label: potassium ion transmembrane transporter activity
  mapping_justification: semapv:ManualMappingCuration
  comment: >-
    The Trk/Ktr/HKT family is a K+ transporter family; the plant HKT subfamily includes Na+-selective
    members, so substrate is subfamily-dependent. Backed by Arabidopsis HKT1 (Q84TI7,
    DR TCDB 2.A.38.3.2) reviewed in this repo, which carries GO:0015079 (K+) and GO:0015081 (Na+,
    IDA). GO:0015079 is the family archetype. Not in any external2go mapping.
