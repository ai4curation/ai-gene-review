- procedure_key: IMPC_CSD_003
  name: Combined SHIRPA and Dysmorphology
  level: experiment
  mp_terms: ''
  description: SHIRPA and dysmorphology were originally always separate assessments.&nbsp; However they
    have recently been combined as assessments, so that they take place at the same time.The purpose of
    the assessments is to examine mice for obvious physical characteristics, behaviors and morphological
    abnormalities.Descriptions include abnormal locomotion/appearance/behavior/reflex reactions.
