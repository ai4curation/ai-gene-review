  level: experiment
  mp_terms: ''
  description: Light-Dark test monitors the anxiety-related behaviour of mice
- procedure_key: IMPC_OFD_001
  name: Open Field
  level: experiment
  mp_terms: ''
  description: The Open Field test is used to assess anxiety and exploratory behaviors. It is based on
    the natural tendency of an animal to explore and to protect itself using avoidance which translates
    to a normal animal spending more time in the periphery of the Open Field arena than in the center
    (the most anxiogenic area).
