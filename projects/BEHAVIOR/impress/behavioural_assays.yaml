  example_description: 'The grip strength test is used to measure the neuromuscular function as maximal
    muscle strength of forelimbs and combined forelimbs and hind limbs. These are assessed by the grasping
    applied by the mouse on a grid that is connected to a sensor. Three trials are carried out in succession
    measuring forelimb-strength only, followed by three successive trials measuring the combined forelimb/hindlimb
    grip strength. All grip strength values obtained are normalized against mouse body weight.Ontological
    description: MP:0001515 - abnormal grip strength.'
