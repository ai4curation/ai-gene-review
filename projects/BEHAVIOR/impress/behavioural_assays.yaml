- procedure_key: IMPC_GRS_001
  name: Grip Strength
  level: experiment
  mp_terms: MP:0001515
  description: 'The grip strength test is used to measure the neuromuscular function as maximal muscle
    strength of forelimbs and combined forelimbs and hind limbs. These are assessed by the grasping applied
    by the mouse on a grid that is connected to a sensor. Three trials are carried out in succession measuring
    forelimb-strength only, followed by three successive trials measuring the combined forelimb/hindlimb
    grip strength. Ontological description: MP:0001515 - abnormal grip strength.'
- procedure_key: IMPC_CAL_001
  name: Indirect Calorimetry
  level: experiment
  mp_terms: MP:0005266
  description: 'Indirect calorimetry provides detailed information on the energy metabolism of mutant
    mice. Energy expenditure is evaluated through indirect calorimetry by measuring oxygen consumption
    with an open flow respirometric system. CO2 and O2 sensors measure the difference in CO2 and O2 concentrations
    in air volumes flowing through control or animal cages. The amount of oxygen consumed over a given
    period of time can thus be calculated, as far as the air flow through the cage is known. Data are
    expressed as ml O2 h-1animal-1. The system also monitors CO2 production, therefore, the respiratory
    exchange ratio (RER) and heat production can be calculated. An activity and food and water intake
    monitoring system can also be integrated into the set up in order to investigate circadian pattern
    and behaviour.Ontological description: MP:0005266 - abnormal metabolism.'
