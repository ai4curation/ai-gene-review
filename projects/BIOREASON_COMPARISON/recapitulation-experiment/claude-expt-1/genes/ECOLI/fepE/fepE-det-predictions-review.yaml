      summary: >-
        FepE is a Wzz-family polysaccharide co-polymerase (Pfam PF02706; COG3765;
        crystal structure determined) anchored in the inner membrane by two TM
        helices with a large periplasmic domain and only an ~18-residue cytoplasmic
        tail. It has none of the conserved modules of a two-component histidine
        kinase (DHp/HisKA + HATPase_c/GHKL), no Walker/ATP-binding motif, and no
        reported phosphotransfer activity; its established function is non-catalytic
        O-antigen chain-length regulation. EC 2.7.13.3 is therefore structurally
        impossible for this protein. Because histidine kinase is among the most
        abundant enzyme classes in bacterial genomes and a known default label for
        uncharacterized membrane proteins, the prediction is best categorized as a
        frequency-biased repetition rather than a specific paralog/homology error.
        Assessed independently from the UniProt record, the crystal-structure
        literature (Kalynych 2012) and the Wzz functional literature (Murray 2003).
