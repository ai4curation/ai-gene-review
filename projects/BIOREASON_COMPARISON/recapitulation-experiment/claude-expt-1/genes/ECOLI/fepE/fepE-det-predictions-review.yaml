description: >-
  Independent review of the DeepECTF EC prediction for FepE (P26266). The model
  predicts histidine protein kinase activity (EC 2.7.13.3). This is rejected.
  FepE is an inner-membrane Wzz/Cld/Rol-family polysaccharide co-polymerase (PCP-1)
  that determines LPS O-antigen modal chain length. It has the canonical Wzz
  topology (two transmembrane helices flanking a large periplasmic domain) with
  only an ~18-residue C-terminal cytoplasmic tail, and it carries none of the
  domains required for a sensor histidine kinase (no DHp/HisKA phosphoacceptor
  domain and no HATPase_c/GHKL catalytic ATPase domain). No kinase activity of any
  kind has been demonstrated for FepE; the crystal structure and mutational data
  establish a non-catalytic chain-length-regulator role. Histidine kinase is one
  of the most frequent enzyme classes in bacterial genomes and is a textbook
  default/frequency-biased label for uncharacterized membrane proteins, so the
  prediction is best explained as a frequency-bias repetition error rather than a
  specific homology-based confusion.
