suggested_questions:
- question: >-
    What is the native oligomeric state of full-length FepE in the inner membrane,
    and how does it template very-long versus long O-antigen modality?
- question: >-
    Does FepE retain any role connected to its location in the enterobactin gene
    cluster, or is the historical transport association purely a naming/mapping
    artifact?
suggested_experiments:
- description: >-
    Cryo-EM of full-length FepE (and a FepE-Wzy complex) reconstituted in lipid
    nanodiscs to resolve the oligomeric state and the cavity that sets VL modality.
- description: >-
    Quantitative O-antigen modal-length assays (silver-stained LPS) comparing FepE,
    WzzB and chimeras in an O-antigen-restored E. coli background to map determinants
    of very-long versus long modality.
- description: >-
    Direct ferric-enterobactin uptake assays in a clean fepE deletion (Fep+,
    O-antigen background) to formally test whether FepE contributes to siderophore
    import.
status: DRAFT
