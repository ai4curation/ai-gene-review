- term:
    id: GO:0004713
    label: protein tyrosine kinase activity
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      This IBA molecular-function annotation is incorrect for FepE. FepE is a
      PCP-1/Wzz-type polysaccharide co-polymerase that lacks any cytoplasmic
      kinase module. The annotation originates from the over-broad PANTHER family
      PTHR32309 (labelled "TYROSINE-PROTEIN KINASE"), which lumps non-enzymatic
      Wzz proteins together with the bacterial tyrosine (BY-) kinases such as Wzc.
    action: REMOVE
    reason: >-
      Polysaccharide co-polymerases are subdivided by whether they carry a
      cytosolic tyrosine-kinase domain: PCP-2a/PCP-3 members (e.g. Wzc, Etk) have a
      ~230-residue C-terminal cytoplasmic kinase domain (Walker A motif + C-terminal
      Tyr cluster), whereas PCP-1/Wzz members such as FepE do not. FepE's C-terminal
      cytoplasmic tail is only ~18 residues (UniProt TOPO_DOM 360-377), far too short
      to encode a kinase, and it has no Walker A or other kinase catalytic motif. The
      protein has no demonstrated kinase activity and its established function (Wzz
      O-antigen chain-length regulation) is unrelated to phosphotransfer. This is an
      over-propagated phylogenetic inference that should be removed.
    supported_by:
    - reference_id: PMID:22437828
      supporting_text: >-
        further subdivided into various subfamilies depending on the type of the
        polysaccharide biosynthetic pathway they are part of and the presence of
        a cytosolic tyrosine kinase domain
    - reference_id: file:ECOLI/fepE/fepE-uniprot.txt
      supporting_text: 'TOPO_DOM        360..377'
