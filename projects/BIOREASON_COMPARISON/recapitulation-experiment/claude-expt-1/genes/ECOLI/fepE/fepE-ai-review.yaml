id: P26266
gene_symbol: fepE
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  FepE is an inner-membrane polysaccharide co-polymerase (PCP) of the Wzz/Cld/Rol
  family that determines the modal chain length of the lipopolysaccharide (LPS)
  O-antigen. It is anchored in the inner membrane by two transmembrane helices
  near the N- and C-termini that flank a large periplasmic alpha-helical domain,
  and it assembles into a bell-shaped homo-oligomer whose internal cavity is
  thought to template/regulate the growing undecaprenyl-pyrophosphate-linked
  O-antigen polymer made by the Wzy polymerase. FepE specifies a very-long (VL)
  O-antigen modality (>80 repeat units), in contrast to the short/long modality
  set by the housekeeping WzzB. It is a non-catalytic regulator rather than an
  enzyme or transporter. Despite its historical name and its location within the
  enterobactin/fep gene cluster (it was originally implicated in ferric-enterobactin
  uptake on the basis of a polar insertion phenotype), FepE is not a siderophore
  transporter; its crystal structure and mutational analyses establish the Wzz
  chain-length-regulator function. In E. coli K-12 the chromosomal O-antigen locus
  is cryptic (IS-disrupted wbbL), so the VL O-antigen phenotype is documented in
  O-antigen-producing strains (e.g. E. coli O157:H7) and in Salmonella, where
  wzz(fepE) confers very-long O-antigen.
