- term:
    id: GO:0015620
    label: ferric-enterobactin transmembrane transporter activity
  evidence_type: IMP
  original_reference_id: PMID:2956250
  qualifier: enables
  review:
    summary: >-
      This molecular-function annotation is contradicted by subsequent structural
      and functional evidence. FepE is a Wzz-family polysaccharide co-polymerase
      (crystal structure determined), not a siderophore transporter. The original
      assignment came from a 1987 study that defined fepE by an insertion in the
      ent/fep region that disrupted iron transport and proposed (not demonstrated)
      that FepE acts with FepC to form the ferric-enterobactin permease.
    action: REMOVE
    reason: >-
      The actual ferric-enterobactin importer is the FepB/FepC/FepD/FepG ABC system
      with the FepA outer-membrane receptor; FepE has the canonical Wzz/PCP
      architecture (two TM helices + large periplasmic domain) incompatible with a
      transmembrane permease, and its molecular role is non-catalytic O-antigen
      chain-length regulation. The transporter assignment is a legacy of the gene's
      name and chromosomal position within the enterobactin cluster, based on a
      polar/indirect insertion phenotype that was explicitly framed as a proposal.
      No direct ferric-enterobactin uptake activity has been demonstrated for FepE.
    supported_by:
    - reference_id: PMID:2956250
      supporting_text: >-
        It is proposed that these newly identified genes, fepD and fepE, provide
        functions which act in conjunction with the fepC product to form the ferric
        enterobactin-specific cytoplasmic membrane permease.
      full_text_unavailable: true
    - reference_id: PMID:12603743
      supporting_text: >-
        wzzfepE, a homologue of Escherichia coli fepE, is responsible for the
        production of very long (VL) modal length LPS Oag
- term:
    id: GO:0015685
    label: ferric-enterobactin import into cell
  evidence_type: IMP
  original_reference_id: PMID:2956250
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Biological-process counterpart of the legacy transporter annotation, from the
      same 1987 study. Superseded by the identification of FepE as a Wzz O-antigen
      chain-length regulator.
    action: REMOVE
    reason: >-
      The annotation rests on an insertion phenotype in the ent/fep gene cluster
      interpreted as disrupting enterobactin-mediated iron uptake, but the modern,
      structure-supported function of FepE is regulation of O-antigen chain length,
      not siderophore import. fepE is a monocistronic gene, and the protein's PCP
      fold and mutational behaviour are inconsistent with a direct role in
      ferric-enterobactin transport. The correct biological process for FepE is
      O-antigen/LPS biosynthesis (see the proposed NEW annotation below).
    supported_by:
    - reference_id: PMID:2956250
      supporting_text: >-
        Another insertion mutation between entF and fepC was also shown to disrupt
        iron transport via enterobactin and thus defined the fepE locus
      full_text_unavailable: true
    - reference_id: PMID:23393150
      supporting_text: >-
        The Escherichia coli O157:H7 FepE protein regulates lipopolysaccharide (LPS)
        O-antigen (Oag) chain length to confer a very long modal chain length of >80
        Oag repeat units (RUs)
- term:
    id: GO:0009243
    label: O antigen biosynthetic process
  evidence_type: IMP
  original_reference_id: PMID:23393150
  qualifier: acts_upstream_of_or_within
  review:
    summary: >-
      Proposed annotation capturing FepE's actual biological role: as a Wzz-family
      polysaccharide co-polymerase it determines the very-long modal chain length of
      the LPS O-antigen produced by the Wzx/Wzy-dependent pathway.
    action: NEW
    reason: >-
      Direct mutational evidence in E. coli O157:H7 FepE (single substitutions of
      L168 and D268 shorten the O-antigen) and complementation/genetic evidence in
      Salmonella (wzz(fepE) confers very-long O-antigen) establish FepE as an
      O-antigen modal chain-length determinant. The crystal structure of Wzz(FepE)
      confirms the PCP fold. In E. coli K-12 the O-antigen locus is cryptic
      (IS-disrupted wbbL), so the phenotype is observed in O-antigen-producing
      backgrounds, but the molecular role of the protein is the same.
    supported_by:
    - reference_id: PMID:23393150
      supporting_text: >-
        amino acid substitutions of leucine 168 (L168) and aspartic acid 268 (D268)
        resulted in LPS with consistently shortened Oag chain lengths
    - reference_id: PMID:12603743
      supporting_text: >-
        wzzfepE, a homologue of Escherichia coli fepE, is responsible for the
        production of very long (VL) modal length LPS Oag, estimated to contain >
        100 Oag RUs
core_functions:
- description: >-
    Inner-membrane Wzz-family polysaccharide co-polymerase (PCP-1) that determines
    the very-long modal chain length of the LPS O-antigen by regulating
    Wzy-dependent polymerization of undecaprenyl-PP-linked O-units; acts as a
    non-catalytic oligomeric scaffold/regulator rather than an enzyme or transporter.
