id: P0AFJ1
gene_symbol: yjdM
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YjdM is a small (~109 aa) cytosolic zinc-ribbon protein, the founding member of
  the YjdM family (COG2824; InterPro IPR004624; Pfam YjdM PF03831 plus a
  Zn_Ribbon_YjdM domain PF08274). Its N-terminus carries two CxxC zinc-knuckle
  motifs (C6-P-K-C9 and C23-P-E-C26) characteristic of a structural zinc-binding
  treble-clef/zinc-ribbon fold, the kind of module found in nucleic-acid-associated
  proteins (e.g. RNA-polymerase subunits and transcription factors). The protein was
  historically named phnA because it lies near the phosphonate (phn) gene region, but
  genetic analysis showed that phnA (yjdM) has no role in phosphonate metabolism; all
  genes required for phosphonate use are in the phnC-to-phnP operon, and E. coli K-12
  degrades phosphonates via the C-P lyase rather than a phosphonoacetate hydrolase.
  YjdM is therefore not homologous to the alkaline-phosphatase-superfamily
  phosphonoacetate hydrolases (PhnA) of other bacteria, and its true molecular
  function remains unknown; the most defensible inference is structural zinc binding.
