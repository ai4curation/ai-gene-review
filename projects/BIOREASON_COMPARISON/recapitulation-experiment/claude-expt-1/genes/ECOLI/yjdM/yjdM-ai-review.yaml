- term:
    id: GO:0008270
    label: zinc ion binding
  evidence_type: ISS
  original_reference_id: GO_REF:0000033
  qualifier: enables
  review:
    summary: >-
      Proposed molecular-function annotation reflecting the conserved Zn-ribbon
      (Zn_Ribbon_YjdM) domain and the two N-terminal CxxC zinc-knuckle motifs, which
      together strongly indicate structural zinc binding.
    action: NEW
    reason: >-
      The YjdM family contains a dedicated zinc-ribbon domain (Pfam Zn_Ribbon_YjdM,
      PF08274) and the sequence has paired CxxC motifs (C6-P-K-C9 and C23-P-E-C26)
      that form a treble-clef zinc-binding site. Zinc binding is the most defensible
      molecular function for this protein given its fold; it is far better supported
      than the phosphonoacetate hydrolase assignment.
    supported_by:
    - reference_id: file:ECOLI/yjdM/yjdM-uniprot.txt
      supporting_text: 'Pfam; PF08274; Zn_Ribbon_YjdM; 1.'
core_functions:
- description: >-
    Small cytosolic zinc-ribbon protein of the YjdM family with two CxxC zinc-knuckle
    motifs; most plausibly a structural zinc-binding module (as found in
    nucleic-acid-associated proteins). Its specific physiological role is unknown, and
    it is not a phosphonate-metabolism enzyme.
  molecular_function:
    id: GO:0008270
    label: zinc ion binding
