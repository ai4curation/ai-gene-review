- term:
    id: GO:0047400
    label: phosphonoacetate hydrolase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      EC-to-GO annotation mirroring the UniProt EC:3.11.1.2 assignment, which itself
      comes from the single in vitro study (Kim et al. 2023). The assignment conflicts
      with the protein's fold and with genetic evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      YjdM is a zinc-ribbon protein, not an alkaline-phosphatase-superfamily C-P
      hydrolase; genuine phosphonoacetate hydrolases (PhnA of Pseudomonas etc.) are
      large, nonhomologous enzymes with a binuclear metal centre. C-P bond hydrolysis
      is not a credible activity for this small zinc-ribbon fold, and the historical
      "phnA" name is a misnomer (phnA/yjdM has no role in phosphonate metabolism).
      The automated EC2GO term therefore over-annotates YjdM's molecular function.
    supported_by:
    - reference_id: PMID:8335257
      supporting_text: >-
        The construction of these plasmids showed that phnA and phnB have no role in
        Pn metabolism.
      full_text_unavailable: true
- term:
    id: GO:0047400
    label: phosphonoacetate hydrolase activity
  evidence_type: IDA
  original_reference_id: PMID:37963869
  qualifier: enables
  review:
    summary: >-
      Experimental in vitro annotation from the DeepECTF study (Kim et al. 2023),
      reporting a phosphonoacetate hydrolase specific activity of 139.85 U/mg for
      purified YjdM. The activity does not reflect YjdM's biological function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      Multiple independent lines of evidence contradict phosphonoacetate hydrolase as
      YjdM's function: (i) YjdM is a ~109-residue zinc-ribbon protein with no homology
      to the alkaline-phosphatase-superfamily phosphonoacetate hydrolases, and a
      zinc-ribbon fold is not a C-P bond hydrolase; (ii) genetic analysis shows that
      phnA (yjdM) has no role in phosphonate metabolism (all required genes are in the
      phnC-phnP operon); and (iii) E. coli K-12 uses the C-P lyase, not a
      phosphonoacetate hydrolase. The reported in vitro activity (a colorimetric
      phosphate-release assay) is best treated as non-physiological/possibly
      non-specific and is an over-annotation of YjdM's function.
    supported_by:
    - reference_id: PMID:37963869
      supporting_text: >-
        The specific phosphonoacetate hydrolase activity of YjdM obtained by enzyme
        assay was 139.85 U mg-1
    - reference_id: PMID:8335257
      supporting_text: >-
        all genes required for Pn use are in the 10.9-kb, fourteen-gene,
        phnCDEFGHIJKLMNOP locus
      full_text_unavailable: true
