id: P76419
gene_symbol: yegV
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YegV is an uncharacterized carbohydrate/sugar kinase of the PfkB (ribokinase-like)
  family (Pfam PF00294; COG0524) in E. coli K-12. By family membership it is an
  ATP-dependent small-molecule (sugar) kinase (EC 2.7.1.-), but no substrate, product,
  kinetic parameters or active-site data have been experimentally determined, so its
  specific catalytic activity is unknown. The gene is the third cistron of the
  yegTUV operon (with the putative nucleoside transporter YegT and the putative
  hydrolase YegU); this operon is repressed by the GntR-family transcription factor
  GgaR (YegW), which senses ADP-glucose and links yegTUV expression to glycogen
  accumulation, suggesting (but not proving) a role for the operon's products in
  sugar/storage-carbon metabolism. The protein is presumed cytosolic.
