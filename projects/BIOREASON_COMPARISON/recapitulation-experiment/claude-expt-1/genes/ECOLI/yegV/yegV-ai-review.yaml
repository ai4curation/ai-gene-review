    id: GO:0006796
    label: phosphate-containing compound metabolic process
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: involved_in
  review:
    summary: >-
      Generic ARBA-derived biological-process annotation. Consistent with a kinase
      (phosphotransfer) but uninformatively broad.
    action: ACCEPT
    reason: >-
      YegV is a PfkB-family kinase, so it participates in phosphate-transfer
      metabolism. The term is correct, if very general; no more specific process can
      be assigned because the substrate/pathway is unknown.
- term:
    id: GO:0016301
    label: kinase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro-based molecular-function annotation to the generic "kinase activity"
      term, supported by the PfkB carbohydrate-kinase domain.
    action: ACCEPT
    reason: >-
      The PfkB/ribokinase-like domain (PF00294) robustly identifies YegV as an
      ATP-dependent kinase. This is the appropriate level of specificity given that
      the exact sugar substrate is uncharacterized.
- term:
    id: GO:0016772
    label: transferase activity, transferring phosphorus-containing groups
  evidence_type: IEA
  original_reference_id: GO_REF:0000117
  qualifier: enables
  review:
    summary: >-
      Generic ARBA-derived molecular-function annotation; a parent of kinase
      activity.
    action: ACCEPT
    reason: >-
      Correct but redundant with the kinase-activity annotation; appropriate as a
      conservative, family-level call for an uncharacterized PfkB kinase.
core_functions:
- description: >-
    Putative ATP-dependent carbohydrate (sugar) kinase of the PfkB/ribokinase-like
    family with no experimentally established substrate; encoded in the
    ADP-glucose-responsive yegTUV operon implicated in glycogen/carbon-storage
    physiology. The specific phosphoryl-acceptor remains unknown.
  molecular_function:
    id: GO:0016301
    label: kinase activity
  supported_by:
  - reference_id: file:ECOLI/yegV/yegV-uniprot.txt
    supporting_text: 'SIMILARITY: Belongs to the carbohydrate kinase PfkB family.'
  - reference_id: PMID:38257942
    supporting_text: >-
      a previous study suggested their involvement in the production of ADP-glucose
      (ADPG), a glycogen precursor
