    K-12.
  findings: []
  reference_review:
    relevance: MEDIUM
    correctness: VERIFIED
    review_notes: >-
      Establishes the yegTUV operon (containing yegV) as an ADP-glucose-responsive,
      GgaR-repressed module linked to glycogen accumulation; describes YegV only as
      a putative sugar kinase, with no direct enzymology.
suggested_questions:
- question: >-
    What is the physiological phosphoryl-acceptor substrate of YegV, and is it related
    to the ADP-glucose/glycogen metabolism implied by the yegTUV operon?
- question: >-
    Do YegT (transporter), YegU (hydrolase) and YegV (kinase) act sequentially on a
    common substrate?
suggested_experiments:
- description: >-
    Broad in vitro substrate screen (ATP-dependent phosphorylation, NADH-coupled or
    ADP-detection assays) against panels of sugars, sugar-acids and nucleosides,
    including candidates suggested by the yegTUV operon context.
- description: >-
    Structure determination (or AlphaFold-guided docking) of YegV to identify the
    substrate-binding pocket and discriminate it from characterized PfkB kinases.
- description: >-
    Metabolomic comparison of yegV deletion versus wild type under glycogen-inducing
    conditions to detect an accumulating substrate.
status: DRAFT
