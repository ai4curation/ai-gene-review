suggested_questions:
- question: >-
    What is the dedicated in vivo function of YciO, given that it is a non-essential,
    catalytically degenerate paralog of TsaC?
- question: >-
    Does YciO bind a specific RNA or small-molecule substrate, and is its weak in
    vitro TC-AMP-synthase signal productive synthesis or uncoupled ATP hydrolysis?
suggested_experiments:
- description: >-
    Steady-state kinetics of purified YciO for true TC-AMP synthesis (HPLC/MS
    detection of TC-AMP and pyrophosphate) versus ATP hydrolysis, side by side with
    TsaC/YrdC, to quantify whether YciO performs productive synthesis.
- description: >-
    In vivo complementation test: can plasmid-borne yciO rescue a conditional
    tsaC/yrdC depletion for t6A formation and viability? (predicted: no).
- description: >-
    Structure-guided restoration of the catalytic motif (e.g. Met->Asn at the SxN
    position) to test whether the degenerate active site explains the low activity.
- description: >-
    Unbiased screen for YciO interaction partners / RNA targets (CLIP, pull-downs,
    cofitness) to identify its physiological role.
status: DRAFT
