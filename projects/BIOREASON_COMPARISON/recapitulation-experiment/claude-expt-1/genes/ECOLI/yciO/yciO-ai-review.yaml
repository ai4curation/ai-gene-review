id: P0AFR4
gene_symbol: yciO
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YciO is a small (206 aa), cytosolic, single-domain member of the Sua5/TsaC(YrdC)
  family (Pfam PF01300) in E. coli. It adopts the YrdC/Sua5 fold (crystal structures
  PDB 1K7J, 1KK9) and is a paralog of TsaC (YrdC), the dedicated, essential enzyme
  that synthesizes L-threonylcarbamoyl-AMP (TC-AMP), the activated intermediate of
  the universal N6-threonylcarbamoyladenosine (t6A37) tRNA modification. Unlike TsaC,
  YciO is non-essential, its conserved active-site motif is degenerate (the catalytic
  Asn of the Sua5/TsaC "S-x-N" signature is replaced; see bioinformatics analysis),
  and it does not substitute for TsaC in vivo. Purified YciO exhibits only weak,
  likely promiscuous TC-AMP-synthase-like activity in vitro (together with ATP
  hydrolysis to AMP), so its dedicated physiological function is not the t6A pathway
  and remains unresolved. The protein localizes to the cytosol.
existing_annotations:
- term:
    id: GO:0005829
    label: cytosol
  evidence_type: IBA
  original_reference_id: GO_REF:0000033
  qualifier: is_active_in
  review:
    summary: >-
      Cytosolic localization inferred from the phylogenetic tree of the Sua5/TsaC
      family; consistent with experimental proteomic localization of YciO.
    action: ACCEPT
    reason: >-
      YciO is a soluble cytoplasmic protein and the t6A-related chemistry of this
      family is cytosolic; the IBA agrees with two independent IDA cytosol
      annotations.
- term:
    id: GO:0003725
    label: double-stranded RNA binding
  evidence_type: IEA
  original_reference_id: GO_REF:0000002
  qualifier: enables
  review:
    summary: >-
      InterPro2GO annotation from the Sua5-like domain signature (IPR006070). The
      "double-stranded RNA binding" assignment is a generic, outdated family-level
      inference (the YrdC/Sua5 fold was historically proposed to bind dsRNA before
      its TC-AMP-synthase role was known) and is not supported by any direct evidence
      for YciO.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The YrdC/Sua5 fold has a basic concave surface implicated in nucleotide/tRNA
      substrate binding, but specific double-stranded-RNA-binding activity has not
      been demonstrated for YciO and does not reflect the family's established
      chemistry (acyl-adenylate synthesis on free substrates). The annotation
      over-states a generic structural feature.
- term:
    id: GO:0061710
    label: L-threonylcarbamoyladenylate synthase activity
  evidence_type: IEA
  original_reference_id: GO_REF:0000003
  qualifier: enables
  review:
    summary: >-
      EC-to-GO electronic annotation mirroring the UniProt EC:2.7.7.87 assignment,
      which itself derives from the single in vitro study (Kim et al. 2023). It is a
      propagation of a contested EC assignment rather than independent evidence.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The EC:2.7.7.87 assignment for YciO rests on weak in vitro activity of a
      degenerate TsaC paralog. The dedicated, essential TC-AMP synthase in E. coli is
      TsaC/YrdC; YciO lacks the conserved catalytic Asn and does not perform this
      function in vivo. The automated EC2GO term therefore over-annotates YciO's
      molecular function.
    supported_by:
    - reference_id: file:ECOLI/yciO/yciO-bioinformatics/RESULTS.md
      supporting_text: >-
        the conserved catalytic Asn is replaced by Met (SAN -> SLM) and the SG is
        lost. YciO therefore lacks part of the canonical TC-AMP-synthase catalytic
        apparatus.
- term:
    id: GO:0061710
    label: L-threonylcarbamoyladenylate synthase activity
  evidence_type: IDA
  original_reference_id: PMID:37963869
  qualifier: enables
  review:
    summary: >-
      Experimental in vitro annotation from the DeepECTF study (Kim et al. 2023),
      which purified YciO and measured a specific TC-AMP-synthase activity of
      0.0705 U/mg. The activity is real but weak/promiscuous and is not established
      as YciO's biological (in vivo) function.
    action: MARK_AS_OVER_ANNOTATED
    reason: >-
      The measurement documents a genuine in vitro activity, but it should not be
      treated as YciO's function. (i) YciO is a degenerate paralog of the dedicated
      enzyme TsaC/YrdC and lacks the conserved catalytic Asn (see bioinformatics
      analysis); (ii) t6A is essential and tsaC/yrdC is essential despite the presence
      of YciO, so YciO does not provide redundant TC-AMP-synthase function in vivo;
      (iii) UniProt notes YciO also shows ATP hydrolysis to AMP in vitro, so part of
      the signal may reflect uncoupled ATP turnover rather than productive TC-AMP
      synthesis. This is best regarded as a promiscuous residual activity, i.e. an
      over-annotation of the protein's molecular function.
    supported_by:
    - reference_id: PMID:37963869
      supporting_text: >-
        The specific activity of YciO was measured to be 0.0705 U mg-1 (Fig. 4b and
        Supplementary Table 1), which was higher than the previously reported specific
        activity range of L-threonylcarbamoyladenylate synthase (0.00556-0.01112 U
        mg-1) from Bacillus subtilis
    - reference_id: PMID:23072323
      supporting_text: >-
        Both YwlC (in the presence of pyrophosphatase) and its Escherichia coli
        homologue YrdC catalyze the formation of TC-AMP
