  evidence_type: IDA
  original_reference_id: PMID:18304323
  qualifier: located_in
  review:
    summary: >-
      Second independent experimental (cytosolic proteome abundance) localization of
      YciO to the cytosol.
    action: ACCEPT
    reason: >-
      Corroborates the cytosolic localization; appropriate cellular component.
core_functions:
- description: >-
    Cytosolic, single-domain Sua5/TsaC(YrdC)-family protein; an ancient, degenerate
    paralog of the dedicated TC-AMP synthase TsaC. Its catalytic motif is incomplete
    and it does not act as the t6A-pathway enzyme in vivo; the weak in vitro
    TC-AMP-synthase/ATP-hydrolysis activity is not established as its biological
    function, which remains unresolved.
  locations:
  - id: GO:0005829
    label: cytosol
  supported_by:
  - reference_id: file:ECOLI/yciO/yciO-bioinformatics/RESULTS.md
    supporting_text: >-
      YciO is a degenerate paralog of TsaC. The fold is conserved ... but the
      catalytic motif is not.
  - reference_id: PMID:23072323
    supporting_text: >-
      Both YwlC (in the presence of pyrophosphatase) and its Escherichia coli
      homologue YrdC catalyze the formation of TC-AMP
