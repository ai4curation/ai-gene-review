id: P46857
gene_symbol: yrhB
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YrhB is a small (94-residue) protein of E. coli K-12 of unknown function (UniProt
  evidence level: Predicted). Its only recognizable feature is a single Imm35 domain
  (Pfam PF15567; InterPro IPR029082), a family related to colicin/bacteriocin
  immunity proteins; this is a sequence-level domain assignment that carries no
  associated GO term and has not been experimentally validated. YrhB has no curated
  GO annotations and no experimentally determined molecular function, biological
  process, or subcellular localization. The only gene-specific experimental signal in
  the literature is modest transcriptional up-regulation under metal-chelation (TPEN)
  stress, which is indirect and does not establish a function. Its biological role
  remains unknown.
existing_annotations: []
core_functions:
- description: >-
    Function unknown. YrhB is a small uncharacterized protein whose only feature is an
    Imm35 (colicin/bacteriocin-immunity-like) domain prediction; no molecular function,
    process or localization is established, and the Imm35 signature itself carries no
    GO mapping. A possible role in immunity/protein-protein interaction is a hypothesis
    only.
  supported_by:
  - reference_id: file:ECOLI/yrhB/yrhB-uniprot.txt
    supporting_text: 'Pfam; PF15567; Imm35; 1.'
suggested_questions:
- question: >-
    What is the molecular function of YrhB, and does its Imm35 domain confer immunity
    against a colicin/bacteriocin or mediate a specific protein-protein interaction?
- question: >-
    Is the up-regulation of yrhB under metal-chelation stress a direct functional link
    or an indirect co-regulation effect?
suggested_experiments:
- description: >-
    Structure determination (or AlphaFold model analysis) of YrhB to test the Imm35
    immunity-protein fold assignment and look for a binding partner.
- description: >-
    Phenotypic screening of a yrhB deletion (and overexpression) against colicins,
    bacteriocins and metal-stress conditions to test an immunity/stress role.
- description: >-
    Affinity-purification/co-IP to identify YrhB interaction partners (e.g. a cognate
    toxin or membrane target) consistent with an immunity-protein function.
status: DRAFT
