- term:
    id: GO:0005515
    label: protein binding
  evidence_type: IPI
  original_reference_id: PMID:26553797
  qualifier: enables
  review:
    summary: >-
      Experimental protein-protein interaction from the study that defined the
      yjhX-yjhQ TA system: YjhQ (antitoxin) binds the toxin YjhX/TopAI (pull-down
      assay). Although "protein binding" is generic, here it captures YjhQ's
      best-characterized, functionally central interaction.
    action: ACCEPT
    reason: >-
      The interaction is experimentally demonstrated and biologically meaningful (the
      antitoxin-toxin interaction that neutralizes the topoisomerase-I inhibitor
      TopAI). The specific partner (TopAI/YjhX) carries the information that the bare
      GO:0005515 term lacks; the annotation is retained as evidence of the antitoxin
      function.
    supported_by:
    - reference_id: PMID:26553797
      supporting_text: >-
        we demonstrate that YjhX-YjhQ is a new E. coli TA system consisting of a
        toxin, YjhX and an antitoxin, YjhQ
core_functions:
- description: >-
    GNAT-family N-acetyltransferase that functions as the antitoxin of the
    YjhX(TopAI)-YjhQ type II toxin-antitoxin system, binding and neutralizing the
    topoisomerase-I inhibitor toxin TopAI to restore cell growth. Its physiological
    acetyl-acceptor substrate is unknown, and whether acetyltransferase activity
    underlies its antitoxin function has not been established.
  molecular_function:
    id: GO:0016747
    label: acyltransferase activity, transferring groups other than amino-acyl groups
  supported_by:
  - reference_id: PMID:26553797
    supporting_text: >-
      Induction of YjhX (85 amino acid residues) causes cell-growth arrest resulting
      in cell death, while YjhQ (181 residues) co-induction resumes cell growth
  - reference_id: file:ECOLI/yjhQ/yjhQ-uniprot.txt
    supporting_text: 'SIMILARITY: Belongs to the acetyltransferase family.'
