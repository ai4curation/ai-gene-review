gene_symbol: yjhQ
product_type: PROTEIN
status: INITIALIZED
taxon:
  id: NCBITaxon:83333
  label: Escherichia coli (strain K12)
description: >-
  YjhQ is a ~181-residue cytoplasmic GNAT-family N-acetyltransferase (Pfam
  Acetyltransf_1 / GNAT domain PS51186; COG3153; EC 2.3.1.-) in E. coli K-12. Its
  best-characterized role is as the antitoxin of the yjhX-yjhQ (TopAI-YjhQ) type II
  toxin-antitoxin system: the small toxin YjhX/TopAI is a specific protein inhibitor
  of topoisomerase I whose induction arrests growth, and co-induction of YjhQ binds
  and neutralizes TopAI to restore growth. Although YjhQ has a GNAT acetyltransferase
  fold, no acetyl-acceptor substrate has been experimentally identified and it is not
  known whether its acetyltransferase activity is required for antitoxin function.
  YjhQ does not participate in mycothiol biosynthesis, a thiol pathway restricted to
  Actinobacteria and entirely absent from E. coli (which uses glutathione).
