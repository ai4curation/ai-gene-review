suggested_questions:
- question: >-
    What is the acetyl-acceptor substrate of the YjhQ GNAT domain, and is its
    acetyltransferase activity required to neutralize the TopAI toxin?
- question: >-
    Does YjhQ neutralize TopAI purely by stoichiometric binding/sequestration, or by
    covalent (acetylation) modification of TopAI or another target?
suggested_experiments:
- description: >-
    In vitro acetyltransferase assays of purified YjhQ against candidate acceptors
    (TopAI, aminoglycosides, polyamines, amino acids, tRNA) with acetyl-CoA to
    identify the physiological substrate.
- description: >-
    Structure of the YjhQ-TopAI complex and a YjhQ GNAT active-site mutant to test
    whether catalysis (versus binding) is needed for antitoxin function.
- description: >-
    Co-induction/neutralization assays with catalytically dead YjhQ to dissect the
    antitoxin mechanism.
status: DRAFT
