  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: Carnitine acetylase is specific for short chain fatty acids. Carnitine acetylase
      seems to affect the flux through the pyruvate dehydrogenase complex. It may
      be involved as well in the transport of acetyl-CoA into mitochondria.
    source_type: curated
    url: https://www.uniprot.org/uniprot/P32796
    source_id: P32796
  - source: Alliance
    text: Carnitine acetyl-CoA transferase; present in both mitochondria and peroxisomes;
      transfers activated acetyl groups to carnitine to form acetylcarnitine which
      can be shuttled across membranes
    source_type: curated
    url: https://www.yeastgenome.org/locus/S000004506
    source_id: SGD:S000004506
  - source: Alliance
    text: Enables carnitine O-acetyltransferase activity. Involved in carnitine metabolic
      process. Located in mitochondrion and peroxisome. Human ortholog(s) of this
      gene implicated in Alzheimer's disease; congenital myasthenic syndrome 6; and
      neurodegeneration with brain iron accumulation. Orthologous to several human
      genes including CRAT (carnitine O-acetyltransferase).
    source_type: automated
    url: https://www.yeastgenome.org/locus/S000004506
    source_id: SGD:S000004506
  - source: RefSeq
