      cellular response to dithiothreitol. Located in cytosol. Human ortholog(s) of
      this gene implicated in autosomal recessive spinocerebellar ataxia 32 and methylmalonic
      aciduria and homocystinuria type cblC. Orthologous to several human genes including
      PRDX1 (peroxiredoxin 1) and PRDX2 (peroxiredoxin 2).
    source_type: automated
    url: https://www.yeastgenome.org/locus/S000004490
    source_id: SGD:S000004490
