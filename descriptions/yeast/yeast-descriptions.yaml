- gene_symbol: BTT1
  organism: yeast
  uniprot_id: P40314
  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: Acts as a component of the nascent polypeptide-associated complex (NAC),
      which promotes mitochondrial protein import by enhancing productive ribosome
      interactions with the outer mitochondrial membrane. Also blocks the inappropriate
      interaction of ribosomes translating non- secretory nascent polypeptides with
      translocation sites in the membrane of the endoplasmic reticulum. BTT1 may act
      as a transcription factor that exert a negative effect on the expression of
      several genes that are transcribed by RNA polymerase II.
    source_type: curated
    url: https://www.uniprot.org/uniprot/P40314
    source_id: P40314
