  - source: Alliance
    text: Specific assembly chaperone for ribosomal protein Rpl4a/Rpl4b; associates
      co-translationally with a evolutionarily conserved internal loop of nascent
      Rpl4a/b, and is released only after an the eukaryotic-specific extension of
      nascent Rpl4a/b mediates nuclear import, incorporation into the pre-ribosome
      and complex disassembly; role in biogenesis of the 60S ribosomal subunit; transcriptionally
      co-regulated with rRNA and ribosome biosynthesis genes
    source_type: curated
