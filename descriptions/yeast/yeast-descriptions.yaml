    text: Hsp40 chaperone with a role in SUMO-mediated protein degradation; works
      in concert with Hsp70 and Hsp110 (Sse1p) to promote disaggregation of intranuclear
      protein inclusions; competes with Hsp104 in disaggregation, supporting turnover
      instead of refolding; member of DnaJ-like family, conserved across eukaryotes;
      overexpression interferes with propagation of the [Psi+] prion; forms nuclear
      foci upon DNA replication stress
    source_type: curated
    url: https://www.yeastgenome.org/locus/S000005021
