- gene_symbol: ASF1
  organism: yeast
  uniprot_id: P32447
  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: Histone chaperone that facilitates histone deposition and histone exchange
      and removal during nucleosome assembly and disassembly (PubMed:11172707, PubMed:11331602,
      PubMed:11404324, PubMed:11856374, PubMed:14680630, PubMed:15071494, PubMed:15175160,
      PubMed:15452122, PubMed:15542829, PubMed:15766286, PubMed:15891116, PubMed:16039596,
      PubMed:16303565, PubMed:16407267, PubMed:16678113, PubMed:16936140). Facilitates
      histone deposition through both replication-dependent and replication-independent
      chromatin assembly pathways (PubMed:14585955, PubMed:15632066, PubMed:16678113).
      Cooperates with chromatin assembly factor 1 (CAF-1) to promote replication-dependent
      chromatin assembly and with the HIR complex to promote replication-independent
      chromatin assembly, which may occur during transcription and DNA repair (PubMed:10591219,
      PubMed:11404324, PubMed:11412995, PubMed:11731479, PubMed:11731480, PubMed:11756556,
      PubMed:12093919, PubMed:15542840, PubMed:15821127, PubMed:16020781, PubMed:16141196,
      PubMed:16143623, PubMed:16303565, PubMed:16501045, PubMed:16582440). May be
      required for the maintenance of a subset of replication elongation factors,
      including DNA polymerase epsilon, the RFC complex and PCNA, at stalled replication
      forks (PubMed:11412995, PubMed:15901673). Also required for RTT109-dependent
      acetylation of histone H3 on 'Lys-9' and 'Lys-56' (PubMed:15840725, PubMed:16627621,
      PubMed:16815704, PubMed:17046836, PubMed:17107956, PubMed:17320445, PubMed:21256037).
      Promotion of RTT109-mediated histone H3 'Lys-56' acetylation is dependent on
      interactions with histone H3 pre-acetylated on 'Lys-14' (PubMed:31194870).
    source_type: curated
    url: https://www.uniprot.org/uniprot/P32447
    source_id: P32447
  - source: Alliance
    text: Nucleosome assembly factor; involved in chromatin assembly, disassembly;
      required for recovery after DSB repair; role in H3K56 acetylation required for
      expression homeostasis, buffering mRNA synthesis rate against gene dosage changes
      in S phase; anti-silencing protein, derepresses silent loci when overexpressed;
      role in regulating Ty1 transposition; relocalizes to cytosol under hypoxia;
      growth defect of asf1 null is functionally complemented by either human ASF1A
      or ASF1B
    source_type: curated
    url: https://www.yeastgenome.org/locus/S000003651
    source_id: SGD:S000003651
  - source: Alliance
    text: Enables acetyltransferase activator activity and histone binding activity.
      Involved in several processes, including DNA replication-dependent chromatin
      assembly; chromatin remodeling; and regulation of primary metabolic process.
      Located in cytosol and nucleus. Part of H3 histone acetyltransferase complex.
      Orthologous to several human genes including ASF1A (anti-silencing function
      1A histone chaperone).
    source_type: automated
    url: https://www.yeastgenome.org/locus/S000003651
    source_id: SGD:S000003651
  - source: RefSeq
    text: Enables histone binding activity. Involved in several processes, including
      DNA replication-dependent chromatin assembly; chromatin remodeling; and positive
      regulation of transcription elongation by RNA polymerase II. Located in cytosol
      and nucleus. Orthologous to several human genes including ASF1A (anti-silencing
      function 1A histone chaperone). [provided by Alliance of Genome Resources, Jul
      2025]
    source_type: automated
    url: https://www.ncbi.nlm.nih.gov/gene/853327
    source_id: GeneID:853327
  fetch_date: '2026-03-06'
- gene_symbol: ATG7
  organism: yeast
  uniprot_id: P38862
  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: E1-like activating enzyme involved in the 2 ubiquitin-like systems required
      for cytoplasm to vacuole transport (Cvt) and autophagy. Activates ATG12 for
      its conjugation with ATG5 and ATG8 for its conjugation with phosphatidylethanolamine.
      Both systems are needed for the ATG8 association to Cvt vesicles and autophagosomes
      membranes. Autophagy is essential for maintenance of amino acid levels and protein
      synthesis under nitrogen starvation. Required for selective autophagic degradation
      of the nucleus (nucleophagy) as well as for mitophagy which contributes to regulate
      mitochondrial quantity and quality by eliminating the mitochondria to a basal
      level to fulfill cellular energy requirements and preventing excess ROS production.
      Plays a role in the regulation of filamentous growth and chronological longevity.
    source_type: curated
    url: https://www.uniprot.org/uniprot/P38862
    source_id: P38862
  - source: Alliance
    text: Autophagy-related protein and dual specificity member of the E1 family;
      mediates the attachment of Atg12p to Atg5p and Atg8p to phosphatidylethanolamine
      which are required steps in autophagosome formation; E1 enzymes are also known
      as ubiquitin-activating enzymes; involved in methionine restriction extension
      of chronological lifespan in an autophagy-dependent manner
    source_type: curated
    url: https://www.yeastgenome.org/locus/S000001214
    source_id: SGD:S000001214
  - source: Alliance
    text: Enables Atg12 activating enzyme activity; Atg8 activating enzyme activity;
      and identical protein binding activity. Involved in several processes, including
      cytoplasm to vacuole targeting by the Cvt pathway; piecemeal microautophagy
      of the nucleus; and post-translational protein modification. Located in cytosol;
      membrane; and phagophore assembly site. Is extrinsic component of phagophore
      assembly site membrane. Used to study nervous system disease. Human ortholog(s)
      of this gene implicated in autosomal recessive spinocerebellar ataxia 31. Orthologous
      to human ATG7 (autophagy related 7).
    source_type: automated
    url: https://www.yeastgenome.org/locus/S000001214
    source_id: SGD:S000001214
  - source: RefSeq
    text: Enables Atg12 activating enzyme activity and Atg8 activating enzyme activity.
      Involved in several processes, including cytoplasm to vacuole targeting by the
      Cvt pathway; piecemeal microautophagy of the nucleus; and post-translational
      protein modification. Located in cytosol; membrane; and phagophore assembly
