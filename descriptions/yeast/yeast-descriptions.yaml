- gene_symbol: TSA1
  organism: yeast
  uniprot_id: P34760
  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: Thiol-specific peroxidase that catalyzes the reduction of hydrogen peroxide
      and organic hydroperoxides to water and alcohols, respectively. Plays a role
      in cell protection against oxidative stress by detoxifying peroxides and as
      sensor of hydrogen peroxide-mediated signaling events (PubMed:10681558, PubMed:15210711,
      PubMed:19106090, PubMed:2895105, PubMed:7961686). Protects the cell against
      the oxidative stress caused by nascent-protein misfolding and aggregation (PubMed:24424024).
      Relays hydrogen peroxide as a signal to the transcription factor YAP1 by inducing
      the formation of intramolecular disulfide bonds in YAP1, which causes its nuclear
      accumulation and activation (PubMed:15706081, PubMed:19106090). Can act alternatively
      as peroxidase and molecular chaperone. Oxidative stress and heat shock exposure
      cause a reversible shift of the protein structure from low MW species to high
      MW complexes, triggering a peroxidase-to-chaperone functional switch. The chaperone
      function of the protein enhances resistance to heat shock (PubMed:15163410).
    source_type: curated
    url: https://www.uniprot.org/uniprot/P34760
    source_id: P34760
  - source: Alliance
    text: Thioredoxin peroxidase; acts as both ribosome-associated and free cytoplasmic
      antioxidant; self-associates to form a HMW chaperone complex under oxidative
      stress; chaperone activity essential for growth in zinc deficiency; hydrogen
      peroxide receptor and signal transducer in a light sensing pathway; required
      for telomere length maintenance; binds and modulates Cdc19p activity; protein
      abundance increases and forms cytoplasmic foci during DNA replication stress
    source_type: curated
    url: https://www.yeastgenome.org/locus/S000004490
    source_id: SGD:S000004490
  - source: Alliance
    text: Enables several functions, including identical protein binding activity;
