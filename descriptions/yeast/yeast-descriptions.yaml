      DNA as a template such as mRNA elongation, DNA replication and DNA repair. During
      transcription elongation the FACT complex acts as a histone chaperone that both
      destabilizes and restores nucleosomal structure. It facilitates the passage
      of RNA polymerase II and transcription by promoting the dissociation of one
      histone H2A-H2B dimer from the nucleosome, then subsequently promotes the reestablishment
