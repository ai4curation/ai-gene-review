  descriptions:
  - source: UniProt
    text: Acts as a chaperone for the L4 ribosomal subunit encoded by RPL4A and PRPL4B,
      required for hierarchical ribosome assembly. Shields ribosomal protein L4 until
      timely release and insertion into the pre- ribosome is possible, once ribosomal
      protein L18 is present.
    source_type: curated
