- gene_symbol: GET3
  organism: yeast
  uniprot_id: Q12154
  taxon_id: NCBITaxon:559292
  descriptions:
  - source: UniProt
    text: ATPase required for the post-translational delivery of tail- anchored (TA)
      proteins to the endoplasmic reticulum. Recognizes and selectively binds the
      transmembrane domain of TA proteins in the cytosol. This complex then targets
      to the endoplasmic reticulum by membrane-bound receptors GET1 and GET2, where
      the tail-anchored protein is released for insertion. This process is regulated
      by ATP binding and hydrolysis. ATP binding drives the homodimer towards the
      closed dimer state, facilitating recognition of newly synthesized TA membrane
      proteins. ATP hydrolysis is required for insertion. Subsequently, the homodimer
      reverts towards the open dimer state, lowering its affinity for the GET1-GET2
      receptor, and returning it to the cytosol to initiate a new round of targeting.
      Cooperates with the HDEL receptor ERD2 to mediate the ATP-dependent retrieval
      of resident ER proteins that contain a C-terminal H-D-E-L retention signal from
      the Golgi to the ER. Involved in low-level resistance to the oxyanions arsenite
      and arsenate, and in heat tolerance.
    source_type: curated
    url: https://www.uniprot.org/uniprot/Q12154
    source_id: Q12154
  - source: Alliance
    text: Guanine nucleotide exchange factor for Gpa1p; amplifies G-protein signaling;
      subunit of the GET complex involved in ATP-dependent Golgi-to-ER trafficking;
      binds as a dimer to the transmembrane domain of tail-anchored proteins in the
      cytosol, shielding them from aqueous solvent until the Get1p/Get2p heterodimer
      releases the substrate and inserts it into the ER membrane; acts as a chaperone
      under ATP-depleted oxidative stress conditions; protein abundance increases
