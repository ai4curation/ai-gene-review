      which involves the compaction of chromatin fiber into a more condensed form,
      although this complex in at least one case can still bind euchromatic levels
      of positive transcription regulators. Although it displays some NAD-dependent
      histone deacetylase activity on histone H3K9Ac and H3K14Ac and histone H4K16Ac
