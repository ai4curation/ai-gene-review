id: https://ai4curation.io/ai-gene-review/schema/interpro_go_mapping
name: interpro_go_mapping
title: InterPro to GO Mapping Schema (term-validatable)
description: >-
  Sidecar LinkML schema for the curated InterPro->GO mapping review whose canonical SSSOM source is
  projects/INTERPRO/interpro2go.sssom.yaml. The object (GO) is modeled as an id/label tuple with a
  binding so that linkml-term-validator can check, for every mapping, that the GO CURIE resolves AND
  that the supplied label matches the ontology label. The subject (InterPro entry) is a curated
  id/label tuple that is NOT bound to an ontology enum (InterPro is not loaded in the GO oak config),
  so only the GO side is hard-validated. The nested data file (projects/INTERPRO/interpro2go.terms.yaml)
  is generated from the SSSOM file by projects/INTERPRO/sssom_to_terms.py.

prefixes:
  linkml: https://w3id.org/linkml/
  iprgo: https://ai4curation.io/ai-gene-review/interpro_go_mapping/
  InterPro: https://www.ebi.ac.uk/interpro/entry/InterPro/
  GO: http://purl.obolibrary.org/obo/GO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: iprgo
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term.
  label:
    slot_uri: rdfs:label
    description: Human-readable label for the term (validated against the ontology where bound).
  subject:
    range: InterProTerm
    inlined: true
    required: true
    description: InterPro source entry as an id/label tuple (label = entry name; not enum-bound).
  predicate:
    range: PredicateTerm
    inlined: true
    required: true
    description: Mapping predicate (id/label tuple; SKOS, not ontology-label-validated).
  object:
    range: GOTerm
    inlined: true
    required: true
    description: GO target term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  mapping_justification:
    range: string
    required: true
    description: SSSOM mapping justification (e.g. semapv:ManualMappingCuration).
  comment:
    range: string
    description: Free-text note on the mapping.
  mappings:
    range: InterProGOMapping
    multivalued: true
    inlined_as_list: true
    description: The curated InterPro->GO mappings.

classes:
  InterProTerm:
    description: An InterPro entry represented as an id/label (entry name) pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  GOTerm:
    description: A GO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  PredicateTerm:
    description: A mapping predicate represented as an id/label pair (SKOS).
    slots:
      - id
      - label

  InterProGOMapping:
    description: One curated review of an InterPro->GO (InterPro2GO) mapping.
    slots:
      - subject
      - predicate
      - object
      - mapping_justification
      - comment

  InterProGOMappingSet:
    tree_root: true
    description: The set of reviewed InterPro->GO mappings (nested term-tuple form).
    slots:
      - mappings

enums:
  GOTermEnum:
    description: A term in the Gene Ontology (any of the three top-level branches).
    reachable_from:
      source_nodes:
        - GO:0003674
        - GO:0008150
        - GO:0005575
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
