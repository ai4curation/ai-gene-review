id: https://ai4curation.io/ai-gene-review/schema/matrisome_go_mapping
name: matrisome_go_mapping
title: Matrisome family to GO Mapping Schema (term-validatable)
description: >-
  Sidecar LinkML schema for the curated matrisome-family->GO mapping whose canonical SSSOM source is
  projects/MATRISOME/matrisome2go.sssom.yaml. The matrisome divides the ECM "parts list" into six
  families (Collagens, ECM Glycoproteins, Proteoglycans = core matrisome; ECM-affiliated Proteins,
  ECM Regulators, Secreted Factors = matrisome-associated). The matrisome is a curated membership
  list, not an ontology, so the subject (matrisome family) is an id/label tuple that is NOT bound to
  an ontology enum. Only the GO object is hard-validated: it is modeled as an id/label tuple with a
  binding so that linkml-term-validator can check, for every mapping, that the GO CURIE resolves AND
  that the supplied label matches the ontology label. The nested data file
  (projects/MATRISOME/matrisome2go.terms.yaml) is generated from the SSSOM file by
  projects/MATRISOME/sssom_to_terms.py.

prefixes:
  linkml: https://w3id.org/linkml/
  matgo: https://ai4curation.io/ai-gene-review/matrisome_go_mapping/
  matrisome: https://ai4curation.io/ai-gene-review/matrisome/family/
  GO: http://purl.obolibrary.org/obo/GO_
  RO: http://purl.obolibrary.org/obo/RO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: matgo
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term.
  label:
    slot_uri: rdfs:label
    description: Human-readable label for the term (validated against the ontology where bound).
  subject:
    range: MatrisomeFamilyTerm
    inlined: true
    required: true
    description: Matrisome family as an id/label tuple (label = family name; not enum-bound).
  predicate:
    range: PredicateTerm
    inlined: true
    required: true
    description: Mapping predicate (id/label tuple; SKOS/RO, not ontology-label-validated).
  object:
    range: GOTerm
    inlined: true
    required: true
    description: GO target term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  mapping_justification:
    range: string
    required: true
    description: SSSOM mapping justification (e.g. semapv:ManualMappingCuration).
  comment:
    range: string
    description: Free-text note on the mapping.
  mappings:
    range: MatrisomeGOMapping
    multivalued: true
    inlined_as_list: true
    description: The curated matrisome-family->GO mappings.

classes:
  MatrisomeFamilyTerm:
    description: A matrisome family represented as an id/label pair (family name).
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  GOTerm:
    description: A GO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  PredicateTerm:
    description: A mapping predicate represented as an id/label pair (SKOS/RO).
    slots:
      - id
      - label

  MatrisomeGOMapping:
    description: One curated matrisome-family->GO mapping.
    slots:
      - subject
      - predicate
      - object
      - mapping_justification
      - comment

  MatrisomeGOMappingSet:
    tree_root: true
    description: The set of curated matrisome-family->GO mappings (nested term-tuple form).
    slots:
      - mappings

enums:
  GOTermEnum:
    description: A term in the Gene Ontology (any of the three top-level branches).
    reachable_from:
      source_nodes:
        - GO:0003674
        - GO:0008150
        - GO:0005575
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
