id: https://ai4curation.io/ai-gene-review/schema/tcdb_go_mapping
name: tcdb_go_mapping
title: TCDB to GO Mapping Schema (term-validatable)
description: >-
  Sidecar LinkML schema for the curated TCDB->GO mapping set whose canonical SSSOM source is
  projects/TCDB/tc2go.sssom.yaml (and the generated projects/TCDB/tc2go.generated.sssom.yaml). The
  object (GO) is modeled as an id/label tuple with a binding so that linkml-term-validator can check,
  for every mapping, that the GO CURIE resolves AND that the supplied label matches the ontology
  label. The subject (a TCDB Transporter Classification number/family) is a curated id/label tuple
  that is NOT bound to an ontology enum (TC is an external classification, not an OBO ontology), so
  only the GO side is hard-validated. The nested data files (projects/TCDB/tc2go.terms.yaml,
  tc2go.generated.terms.yaml) are generated from the SSSOM files by projects/TCDB/sssom_to_terms.py.
  The GO object is bound to the molecular-function branch: TCDB->GO curation targets transporter
  *activity* terms (is_a GO:0022857 / GO:0005215), so cellular-component or biological-process terms
  from TCDB's raw go.py dump are deliberately out of scope here.

prefixes:
  linkml: https://w3id.org/linkml/
  tcdbgo: https://ai4curation.io/ai-gene-review/tcdb_go_mapping/
  TC: http://www.tcdb.org/search/result.php?tc=
  GO: http://purl.obolibrary.org/obo/GO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: tcdbgo
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term.
  label:
    slot_uri: rdfs:label
    description: Human-readable label for the term (validated against the ontology where bound).
  subject:
    range: TCDBTerm
    inlined: true
    required: true
    description: TCDB source as an id/label tuple (label = transporter family name; not enum-bound).
  predicate:
    range: PredicateTerm
    inlined: true
    required: true
    description: Mapping predicate (id/label tuple; SKOS, not ontology-label-validated).
  object:
    range: GOTerm
    inlined: true
    required: true
    description: GO molecular-function target term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  mapping_justification:
    range: string
    required: true
    description: SSSOM mapping justification (e.g. semapv:ManualMappingCuration).
  comment:
    range: string
    description: Free-text note on the mapping.
  mappings:
    range: TCDBGOMapping
    multivalued: true
    inlined_as_list: true
    description: The curated TCDB->GO mappings.

classes:
  TCDBTerm:
    description: A TCDB Transporter Classification entry represented as an id/label (family) pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  GOTerm:
    description: A GO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  PredicateTerm:
    description: A mapping predicate represented as an id/label pair (SKOS).
    slots:
      - id
      - label

  TCDBGOMapping:
    description: One mapping from a TCDB Transporter Classification entry to a GO molecular-function term.
    slots:
      - subject
      - predicate
      - object
      - mapping_justification
      - comment

  TCDBGOMappingSet:
    tree_root: true
    description: The set of TCDB->GO mappings (nested term-tuple form).
    slots:
      - mappings

enums:
  GOTermEnum:
    description: A term in the Gene Ontology molecular-function branch.
    reachable_from:
      source_nodes:
        - GO:0003674
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
