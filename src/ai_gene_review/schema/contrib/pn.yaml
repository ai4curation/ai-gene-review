id: https://ai4curation.io/ai-gene-review/schema/contrib/pn
name: proteostasis_network
title: Proteostasis Network taxonomy and GO mapping schema
description: Minimal LinkML schema for representing Proteostasis Consortium taxonomy paths and curated mappings from those
  paths to Gene Ontology terms. Hierarchy labels are derived from the Human Proteostasis Network workbook release HPN2.0-2024-04-15.
  Workbook placeholders such as '(no Group)', '(no Type)', and '(no Subtype)' are normalized to missing values rather than
  treated as vocabulary members.
prefixes:
  linkml: https://w3id.org/linkml/
  pn: https://ai4curation.io/ai-gene-review/pn/
  GO: http://purl.obolibrary.org/obo/GO_
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
imports:
- linkml:types
default_prefix: pn
default_range: string
slots:
  id:
    identifier: true
  label:
    required: true
    slot_uri: rdfs:label
    description: Human-readable label for the entity.
  notes:
    range: string
    description: Supplementary notes or curation comments.
  references:
    range: string
    multivalued: true
    description: Supporting manuscript IDs, workbook IDs, PMIDs, or local file references.
  branch:
    range: PNBranchEnum
    required: true
    description: Top-level Proteostasis Network branch.
  pn_class:
    range: PNClassEnum
    description: Proteostasis Network class label.
  pn_group:
    range: PNGroupEnum
    description: Proteostasis Network group label.
  pn_type:
    range: PNTypeEnum
    description: Proteostasis Network type label.
  pn_subtype:
    range: PNSubtypeEnum
    description: Proteostasis Network subtype label.
  path:
    range: PNPath
    required: true
    inlined: true
    description: Proteostasis Network path being mapped to GO.
  relation:
    range: string
    required: true
    description: Semantic relationship between the PN path and the GO target. Suggested values include exact, pn_narrower_than_go,
      requires_composition, ontology_gap, and non_go_category.
  go_terms:
    range: uriorcurie
    multivalued: true
    description: Mapped GO term CURIEs, when an existing GO target is appropriate.
  rationale:
    range: string
    required: true
    description: Human-authored explanation of the mapping decision.
classes:
  PNPath:
    description: A contiguous Proteostasis Network path at any granularity.
    slots:
    - branch
    - pn_class
    - pn_group
    - pn_type
    - pn_subtype
    - notes
  PNToGOMapping:
    tree_root: true
    description: A curated mapping from a PN path to one or more GO terms.
    slots:
    - id
    - label
    - path
    - relation
    - go_terms
    - rationale
    - references
    - notes
