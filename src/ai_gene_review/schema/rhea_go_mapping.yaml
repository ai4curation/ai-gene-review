id: https://ai4curation.io/ai-gene-review/schema/rhea_go_mapping
name: rhea_go_mapping
title: RHEA to GO Mapping Schema (term-validatable)
description: >-
  Sidecar LinkML schema for the curated RHEA->GO mapping set whose canonical SSSOM source is
  projects/RHEA/rhea2go.sssom.yaml. The object (GO) is modeled as an id/label tuple with a binding so
  that linkml-term-validator can check, for every mapping, that the GO CURIE resolves AND that the
  supplied label matches the ontology label. The subject (RHEA reaction) is a curated id/label tuple
  that is NOT bound to an ontology enum (its label is the reaction equation, not an ontology rdfs:label),
  so only the GO side is hard-validated. The nested data file (projects/RHEA/rhea2go.terms.yaml) is
  generated from the SSSOM file by projects/RHEA/sssom_to_terms.py.

prefixes:
  linkml: https://w3id.org/linkml/
  rheago: https://ai4curation.io/ai-gene-review/rhea_go_mapping/
  RHEA: http://rdf.rhea-db.org/
  GO: http://purl.obolibrary.org/obo/GO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: rheago
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term.
  label:
    slot_uri: rdfs:label
    description: Human-readable label for the term (validated against the ontology where bound).
  subject:
    range: RHEATerm
    inlined: true
    required: true
    description: RHEA source reaction as an id/label tuple (label = reaction equation; not enum-bound).
  predicate:
    range: PredicateTerm
    inlined: true
    required: true
    description: Mapping predicate (id/label tuple; SKOS, not ontology-label-validated).
  object:
    range: GOTerm
    inlined: true
    required: true
    description: GO molecular-function target term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  mapping_justification:
    range: string
    required: true
    description: SSSOM mapping justification (e.g. semapv:ManualMappingCuration).
  comment:
    range: string
    description: Free-text note on the mapping.
  mappings:
    range: RHEAGOMapping
    multivalued: true
    inlined_as_list: true
    description: The curated RHEA->GO mappings.

classes:
  RHEATerm:
    description: A RHEA reaction represented as an id/label (equation) pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  GOTerm:
    description: A GO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  PredicateTerm:
    description: A mapping predicate represented as an id/label pair (SKOS).
    slots:
      - id
      - label

  RHEAGOMapping:
    description: One curated mapping from a RHEA reaction to a GO molecular-function term.
    slots:
      - subject
      - predicate
      - object
      - mapping_justification
      - comment

  RHEAGOMappingSet:
    tree_root: true
    description: The set of curated RHEA->GO mappings (nested term-tuple form).
    slots:
      - mappings

enums:
  GOTermEnum:
    description: A term in the Gene Ontology molecular-function branch.
    reachable_from:
      source_nodes:
        - GO:0003674
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
