id: https://ai4curation.io/ai-gene-review/schema/aro_go_mapping
name: aro_go_mapping
title: ARO to GO Mapping Schema (term-validatable)
description: >-
  Sidecar LinkML schema for the curated ARO->GO mapping set whose canonical SSSOM source is
  projects/mappings/aro2go.sssom.yaml. Subject (ARO) and object (GO) are modeled as id/label
  tuples with bindings so that linkml-term-validator can check, for every mapping, that the CURIE
  resolves in the ontology AND that the supplied label matches the ontology label (the "curie+label
  tuple" guarantee). The nested data file (projects/mappings/aro2go.terms.yaml) is generated from the
  SSSOM file by projects/mappings/sssom_to_terms.py.

prefixes:
  linkml: https://w3id.org/linkml/
  arogo: https://ai4curation.io/ai-gene-review/aro_go_mapping/
  ARO: http://purl.obolibrary.org/obo/ARO_
  GO: http://purl.obolibrary.org/obo/GO_
  RO: http://purl.obolibrary.org/obo/RO_
  skos: http://www.w3.org/2004/02/skos/core#
  semapv: https://w3id.org/semapv/vocab/
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: arogo
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term.
  label:
    slot_uri: rdfs:label
    description: Human-readable label for the term (validated against the ontology where bound).
  subject:
    range: AROTerm
    inlined: true
    required: true
    description: ARO source term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: AROTermEnum
        obligation_level: REQUIRED
  predicate:
    range: PredicateTerm
    inlined: true
    required: true
    description: Mapping predicate (id/label tuple; RO/SKOS, not ontology-label-validated).
  object:
    range: GOTerm
    inlined: true
    required: true
    description: GO target term as an id/label tuple.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  mapping_justification:
    range: string
    required: true
    description: SSSOM mapping justification (e.g. semapv:ManualMappingCuration).
  comment:
    range: string
    description: Free-text note on the mapping.
  mappings:
    range: AROGOMapping
    multivalued: true
    inlined_as_list: true
    description: The curated ARO->GO mappings.

classes:
  AROTerm:
    description: An ARO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  GOTerm:
    description: A GO term represented as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      label:
        required: true

  PredicateTerm:
    description: A mapping predicate represented as an id/label pair (SKOS or RO).
    slots:
      - id
      - label

  AROGOMapping:
    description: One curated mapping from an ARO term to a GO term.
    slots:
      - subject
      - predicate
      - object
      - mapping_justification
      - comment

  AROGOMappingSet:
    tree_root: true
    description: The set of curated ARO->GO mappings (nested term-tuple form).
    slots:
      - mappings

enums:
  AROTermEnum:
    description: >-
      A term in the Antibiotic Resistance Ontology (CARD), reachable from the ARO root
      'process or component of antibiotic biology or chemistry' (ARO:1000001).
    reachable_from:
      source_nodes:
        - ARO:1000001
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf

  GOTermEnum:
    description: A term in the Gene Ontology (any of the three top-level branches).
    reachable_from:
      source_nodes:
        - GO:0003674
        - GO:0008150
        - GO:0005575
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
