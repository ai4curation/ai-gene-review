id: https://ai4curation.io/ai-gene-review/schema/pfam_entry_review
name: pfam_entry_review
title: Pfam Entry Review Schema
description: >-
  Sidecar LinkML schema for *curating a single Pfam family as its own entry*, stored
  next to the machine-fetched record at
  ``interpro/pfam/<PFAM>/<PFAM>-review.yaml`` (the fetched
  ``<PFAM>-metadata.yaml`` is never hand-edited).

  This is the entry-centric alternative to a flat SSSOM mapping set: instead of one
  subject->predicate->object row per assertion, a review captures the full curation
  context for one Pfam family -- its parent InterPro entry and the *sibling* member
  families lumped under it, why an InterPro-level GO mapping is or is not viable, and
  a list of proposed GO annotations each with its own relation, aspect, evidence,
  confidence and status.

  GO targets are id/label tuples bound to a GO branch enum so that
  ``linkml-term-validator`` checks every proposed term id resolves and its label
  matches the ontology. The Pfam/InterPro ids are curated id/label tuples and are not
  ontology-label-validated here (their labels are short names, not rdfs:labels).

prefixes:
  linkml: https://w3id.org/linkml/
  pfamreview: https://ai4curation.io/ai-gene-review/pfam_entry_review/
  Pfam: https://www.ebi.ac.uk/interpro/entry/pfam/
  InterPro: https://www.ebi.ac.uk/interpro/entry/InterPro/
  GO: http://purl.obolibrary.org/obo/GO_
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  rdfs: http://www.w3.org/2000/01/rdf-schema#

imports:
  - linkml:types

default_prefix: pfamreview
default_range: string

slots:
  id:
    identifier: true
    description: CURIE of the term (e.g. Pfam:PF14681, GO:0004845).
  label:
    slot_uri: rdfs:label
    description: Human-readable label (validated against the ontology where the slot is enum-bound).

  # --- top-level entry slots ---
  pfam_id:
    range: string
    required: true
    pattern: "^PF[0-9]{5}$"
    description: The Pfam accession this review is about (e.g. PF14681).
  pfam_name:
    range: string
    required: true
    description: Pfam family short name (e.g. UPRTase).
  pfam_description:
    range: string
    description: Short curator-facing description of the family's function.
  parent_interpro:
    range: InterProEntry
    inlined: true
    description: The InterPro entry this Pfam is integrated into (its member_list parent).
  interpro_go_status:
    range: InterProGOStatusEnum
    required: true
    description: Whether/how the parent InterPro entry currently carries an interpro2go term.
  interpro_mapping_viability:
    range: MappingViabilityEnum
    required: true
    description: >-
      Whether a function-specific GO mapping is viable at the InterPro entry level.
      NOT_VIABLE is the case this schema is designed for: the entry lumps functionally
      distinct member families, so a specific term cannot sit on the whole entry.
  viability_reason:
    range: string
    description: Why the InterPro-level mapping is (not) viable.
  sibling_members:
    range: SiblingMember
    inlined_as_list: true
    multivalued: true
    description: >-
      Other member families lumped under the same InterPro entry, with a note on how
      they differ functionally (the evidence that the entry is heterogeneous).
  proposed_annotations:
    range: ProposedAnnotation
    inlined_as_list: true
    multivalued: true
    description: Proposed GO annotations for THIS Pfam family.
  notes:
    range: string
    description: Free-text curator notes.
  curator:
    range: string
    description: Who authored the review.
  review_date:
    range: string
    description: ISO date the review was authored/updated.

  # --- nested-object slots ---
  type:
    range: string
    description: InterPro entry type (Domain, Family, Homologous_superfamily, Repeat, ...).
  n_pfam_members:
    range: integer
    description: Number of Pfam families that are members of the InterPro entry.
  note:
    range: string
    description: Free-text note.
  term:
    range: GOTerm
    inlined: true
    required: true
    description: The proposed GO term (id/label), validated against the GO branch enum.
    bindings:
      - binds_value_of: id
        range: GOTermEnum
        obligation_level: REQUIRED
  relation:
    range: RelationTerm
    inlined: true
    required: true
    description: How the Pfam relates to the GO term (enables for MF, involved_in for BP, part_of for CC).
  aspect:
    range: GOAspectEnum
    required: true
    description: GO aspect of the proposed term.
  confidence:
    range: ConfidenceEnum
    required: true
    description: Reviewer confidence in the proposed annotation.
  evidence:
    range: string
    required: true
    description: Reviewer rationale grounded in the Pfam family definition / biochemistry.
  status:
    range: AnnotationStatusEnum
    required: true
    description: Curation status of the proposed annotation.

classes:
  InterProEntry:
    description: The parent InterPro entry, as a curated id/label tuple plus type/membership context.
    slots:
      - id
      - label
      - type
      - n_pfam_members
    slot_usage:
      id:
        pattern: "^InterPro:IPR[0-9]{6}$"

  SiblingMember:
    description: A sibling member family lumped under the same InterPro entry.
    slots:
      - id
      - label
      - note

  GOTerm:
    description: A GO term as an id/label pair.
    slots:
      - id
      - label
    slot_usage:
      id:
        pattern: "^GO:[0-9]{7}$"
      label:
        required: true

  RelationTerm:
    description: The Pfam->GO relation as an id/label pair (RO/BFO predicate).
    slots:
      - id
      - label

  ProposedAnnotation:
    description: One proposed GO annotation for the Pfam family.
    slots:
      - term
      - relation
      - aspect
      - confidence
      - evidence
      - status

  PfamEntryReview:
    tree_root: true
    description: A curated review of a single Pfam family (entry-centric, not a flat mapping row).
    slots:
      - pfam_id
      - pfam_name
      - pfam_description
      - parent_interpro
      - interpro_go_status
      - interpro_mapping_viability
      - viability_reason
      - sibling_members
      - proposed_annotations
      - notes
      - curator
      - review_date

enums:
  InterProGOStatusEnum:
    permissible_values:
      ABSENT:
        description: The parent InterPro entry has no interpro2go term.
      PRESENT_GENERAL:
        description: The parent InterPro entry has only general (high-level) GO term(s).
      PRESENT_SPECIFIC:
        description: The parent InterPro entry already has a specific GO term.

  MappingViabilityEnum:
    permissible_values:
      NOT_VIABLE:
        description: >-
          A function-specific GO term cannot be placed on the InterPro entry (it would be
          wrong for a functionally distinct sibling member); the term belongs at the Pfam level.
      VIABLE:
        description: >-
          A GO term could equally be placed at the InterPro entry level (e.g. the entry is
          1 Pfam = 1 entry, or all members share the function); recorded for completeness.

  GOAspectEnum:
    permissible_values:
      molecular_function:
      biological_process:
      cellular_component:

  ConfidenceEnum:
    permissible_values:
      HIGH:
      MEDIUM:
      LOW:

  AnnotationStatusEnum:
    permissible_values:
      PROPOSED:
        description: Candidate proposed by review; needs curator / experimental validation.
      ACCEPTED:
        description: Confirmed by a curator.
      REJECTED:
        description: Rejected after review.

  GOTermEnum:
    description: Any term in the Gene Ontology (MF, BP, or CC branch).
    reachable_from:
      source_nodes:
        - GO:0003674
        - GO:0008150
        - GO:0005575
      is_direct: false
      include_self: true
      relationship_types:
        - rdfs:subClassOf
