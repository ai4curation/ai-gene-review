id: MODULE:rrna_modification_ribosome_maturation_boundary
title: rRNA modification and ribosome maturation boundary
description: Boundary module for PSEPK rRNA methyltransferases and pseudouridine synthases from the translation/RNA-processing
  umbrella. The module keeps site-specific 16S/23S rRNA methylation and pseudouridylation reactions distinct from generic
  RNA binding, broad methyltransferase, and unresolved methyltransferase-domain side nodes.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_rrna_modification_methyltransferase_pseudouridine.tsv
  title: PSEPK translation/RNA rRNA modification split
  statement: The batch records Rsm/Rlm/Rlu/Rsu-family rRNA methyltransferases and pseudouridine synthases, including dual
    rRNA/tRNA enzymes and unresolved methyltransferase-domain side nodes.
- source_id: file:PSEPK/rsmG/rsmG-ai-review.yaml
  title: Curated rsmG review
  statement: rsmG encodes the cytoplasmic 16S rRNA guanine-527 N7 methyltransferase RsmG/GidB, which installs the m7G527 modification
    during bacterial small-subunit maturation.
- source_id: file:PSEPK/rsmB/rsmB-ai-review.yaml
  title: Curated rsmB review
  statement: rsmB encodes cytoplasmic 16S rRNA cytosine-967 C5 methyltransferase RsmB, a conserved SUN/RsmB-family enzyme
    that installs m5C967 in small-subunit rRNA.
- source_id: file:PSEPK/rsmA/rsmA-ai-review.yaml
  title: Curated rsmA review
  statement: rsmA encodes KsgA/RsmA, a cytoplasmic 16S rRNA adenine dimethyltransferase that dimethylates adjacent A1518/A1519
    residues near the 3' end of 16S rRNA during 30S biogenesis.
- source_id: file:PSEPK/rluD/rluD-ai-review.yaml
  title: Curated rluD review
  statement: rluD encodes an RluA-family 23S rRNA pseudouridine synthase that converts uridines 1911, 1915, and 1917 in 23S
    rRNA to pseudouridines.
- source_id: file:PSEPK/rsmC/rsmC-ai-review.yaml
  title: Curated rsmC review
  statement: rsmC encodes cytoplasmic 16S rRNA guanine-1207 N2 methyltransferase RsmC, which methylates G1207 in the 30S particle.
- source_id: file:PSEPK/rlmN/rlmN-ai-review.yaml
  title: Curated rlmN review
  statement: rlmN encodes a radical-SAM dual-specificity RNA methyltransferase that C2-methylates A2503 in 23S rRNA and A37
    in tRNAs using an iron-sulfur cluster-dependent mechanism.
- source_id: file:PSEPK/rlmF/rlmF-ai-review.yaml
  title: Curated rlmF review
  statement: rlmF encodes cytoplasmic 23S rRNA adenine-1618 N6 methyltransferase RlmF, a SAM-dependent large-subunit rRNA
    methyltransferase.
- source_id: file:PSEPK/PP_1191/PP_1191-ai-review.yaml
  title: Curated PP_1191 review
  statement: PP_1191 encodes a dual-specificity RluF-like RNA pseudouridine synthase with a supported 23S rRNA pseudouridine-2604
    synthase role and possible tRNA(Tyr) pseudouridylation context.
- source_id: file:PSEPK/rsmI/rsmI-ai-review.yaml
  title: Curated rsmI review
  statement: rsmI encodes cytoplasmic 16S rRNA cytidine-1402 2'-O-ribose methyltransferase RsmI.
- source_id: file:PSEPK/rsmH/rsmH-ai-review.yaml
  title: Curated rsmH review
  statement: rsmH encodes cytoplasmic 16S rRNA cytosine-1402 N4 methyltransferase RsmH/MraW.
- source_id: file:PSEPK/rsuA/rsuA-ai-review.yaml
  title: Curated rsuA review
  statement: rsuA encodes RsuA, a 16S rRNA pseudouridine synthase that forms pseudouridine at position 516 in small-subunit
    rRNA.
- source_id: file:PSEPK/rsmJ/rsmJ-ai-review.yaml
  title: Curated rsmJ review
  statement: rsmJ encodes cytoplasmic 16S rRNA guanine-1516 N2 methyltransferase RsmJ.
- source_id: file:PSEPK/rlmAA/rlmAA-ai-review.yaml
  title: Curated rlmAA review
  statement: rlmAA encodes 23S rRNA guanine-745 N1 methyltransferase RlmA-like activity.
- source_id: file:PSEPK/rlmD/rlmD-ai-review.yaml
  title: Curated rlmD review
  statement: rlmD encodes 23S rRNA uridine-1939 C5 methyltransferase RlmD/RumA, an RNA methyltransferase with auxiliary RNA-binding
    and iron/iron-sulfur context.
- source_id: file:PSEPK/rluC/rluC-ai-review.yaml
  title: Curated rluC review
  statement: rluC encodes an RluA-family 23S rRNA pseudouridine synthase that modifies uridines 955, 2504, and 2580 in large-subunit
    rRNA.
- source_id: file:PSEPK/rlmL/rlmL-ai-review.yaml
  title: Curated rlmL review
  statement: rlmL encodes bifunctional RlmK/RlmL, a large-subunit rRNA methyltransferase with 23S rRNA G2445 N2 and G2069
    N7 methyltransferase activities.
- source_id: file:PSEPK/PP_2110/PP_2110-ai-review.yaml
  title: Curated PP_2110 review
  statement: PP_2110 encodes a ribosomal large-subunit pseudouridine synthase candidate in the RluA-like family.
- source_id: file:PSEPK/rlmM/rlmM-ai-review.yaml
  title: Curated rlmM review
  statement: rlmM encodes cytoplasmic 23S rRNA cytidine-2498 2'-O-ribose methyltransferase RlmM.
- source_id: file:PSEPK/PP_4306/PP_4306-ai-review.yaml
  title: Curated PP_4306 review
  statement: PP_4306 encodes a SAM-dependent methyltransferase-domain protein with weak rRNA-methyltransferase family context
    but no resolved target site.
- source_id: file:PSEPK/rluB/rluB-ai-review.yaml
  title: Curated rluB review
  statement: rluB encodes 23S rRNA pseudouridine-2605 synthase RluB, an RsuA/RluB-family RNA pseudouridine synthase.
- source_id: file:PSEPK/rlmG/rlmG-ai-review.yaml
  title: Curated rlmG review
  statement: rlmG encodes cytoplasmic 23S rRNA guanine-1835 N2 methyltransferase RlmG.
- source_id: file:PSEPK/rlmE/rlmE-ai-review.yaml
  title: Curated rlmE review
  statement: rlmE encodes cytoplasmic 23S rRNA uridine-2552 2'-O-ribose methyltransferase RlmE/FtsJ.
- source_id: file:PSEPK/rlmH/rlmH-ai-review.yaml
  title: Curated rlmH review
  statement: rlmH encodes 23S rRNA pseudouridine-1915 N3 methyltransferase RlmH, a SPOUT-family enzyme that methylates a pre-existing
    pseudouridine in helix 69.
- source_id: file:PSEPK/rlmB/rlmB-ai-review.yaml
  title: Curated rlmB review
  statement: rlmB encodes 23S rRNA guanosine-2251 2'-O-ribose methyltransferase RlmB.
- source_id: file:PSEPK/rlmJ/rlmJ-ai-review.yaml
  title: Curated rlmJ review
  statement: rlmJ encodes 23S rRNA adenine-2030 N6 methyltransferase RlmJ.
- source_id: file:PSEPK/rsmE/rsmE-ai-review.yaml
  title: Curated rsmE review
  statement: rsmE encodes cytoplasmic 16S rRNA uridine-1498 N3 methyltransferase RsmE.
- source_id: file:PSEPK/PP_5019/PP_5019-ai-review.yaml
  title: Curated PP_5019 review
  statement: PP_5019 encodes a second RsmE-family 16S rRNA uridine-1498 N3 methyltransferase candidate.
- source_id: file:PSEPK/PP_5114/PP_5114-ai-review.yaml
  title: Curated PP_5114 review
  statement: PP_5114 encodes 16S rRNA guanine-966 N2 methyltransferase RsmD-like activity.
- source_id: file:PSEPK/rlmI/rlmI-ai-review.yaml
  title: Curated rlmI review
  statement: rlmI encodes an RlmI-family SAM-dependent large-subunit rRNA methyltransferase candidate with an unresolved target
    site in this first pass.
