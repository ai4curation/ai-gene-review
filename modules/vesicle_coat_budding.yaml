id: MODULE:vesicle_coat_budding
title: Generic coat-mediated vesicle budding motif
description: >-
  The minimal, reusable vesicle-budding motif: a membrane-associated small GTPase
  (Arf or Sar1, switched on by its GEF) nucleates assembly of a protein coat on
  the donor membrane; coat adaptors capture transmembrane cargo and concentrate
  it into the forming bud; polymerization of the coat deforms the membrane and
  drives scission of a coated vesicle; and the coat is then shed (uncoating,
  often on GTP hydrolysis) to yield a transport-competent vesicle. The same motif
  is reused by the COPII (ER exit), COPI (Golgi-to-ER), and clathrin (post-Golgi/
  endocytic) systems. The motif is gene-free and taxon-neutral, fixing only the
  coat, adaptor, and budding roles and the recruit -> capture -> bud -> uncoat
  topology. Grounded in GO:0006900 (vesicle budding from membrane).
status: DRAFT
evidence:
  - source_id: GO:0006900
    title: vesicle budding from membrane
    statement: The motif culminates in coat-driven vesicle budding from the donor membrane.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: vesicle_coat_budding}]` when a coat is recruited
  (typically by an Arf/Sar1 GTPase), captures cargo, deforms the membrane to bud
  a vesicle, and is shed. The coat identity (COPII/COPI/clathrin) and cargo are
  realization-specific. The GTPase-priming step is itself an instance of
  MODULE:gtpase_switch.
