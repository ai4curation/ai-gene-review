id: MODULE:glyoxylate_dicarboxylate_metabolism_boundary
title: Glyoxylate and dicarboxylate metabolism boundary
description: >-
  Boundary module for KEGG ppu00630 in Pseudomonas putida KT2440. The
  organism-specific map combines glyoxylate shunt context, glycolate/glyoxylate
  oxidation and carboligase chemistry, phosphoglycolate repair, formate
  oxidation/respiration, one-carbon and TCA overlap, acyl-CoA side routes, and
  redox-chain spillovers. It is curated here as a set of separable side modules
  rather than one linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00630
    title: Glyoxylate and dicarboxylate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00630 provides the PSEPK curation batch. Its membership spans
      glycolate/glyoxylate, formate oxidation, one-carbon, TCA, and broad
      respiratory/redox side nodes, so this module records pathway boundaries
      and step-level satisfiability.
module:
  id: glyoxylate_dicarboxylate_metabolism_boundary
  label: Glyoxylate and dicarboxylate metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glyoxylate catabolic process
      term:
        id: GO:0009436
        label: glyoxylate catabolic process
      description: Glyoxylate conversion through glyoxylate carboligase and tartronate-semialdehyde-route enzymes.
    - preferred_term: glycolate dehydrogenase activity
      term:
        id: GO:0019154
        label: glycolate dehydrogenase activity
      description: Multi-subunit glycolate oxidase/dehydrogenase activity represented by glcD, glcE, and glcF.
    - preferred_term: tartronate-semialdehyde synthase activity
      term:
        id: GO:0009028
        label: tartronate-semialdehyde synthase activity
      description: Glyoxylate carboligase activity represented by gcl.
    - preferred_term: hydroxypyruvate isomerase activity
      term:
        id: GO:0008903
        label: hydroxypyruvate isomerase activity
      description: Tartronate semialdehyde/hydroxypyruvate route step represented by hyi.
    - preferred_term: 2-hydroxy-3-oxopropionate reductase activity
      term:
        id: GO:0008679
        label: 2-hydroxy-3-oxopropionate reductase activity
      description: Tartronate semialdehyde reductase activity represented by glxR.
    - preferred_term: phosphoglycolate phosphatase activity
      term:
        id: GO:0008967
        label: phosphoglycolate phosphatase activity
      description: Phosphoglycolate dephosphorylation represented by PP_0416 and possible HAD-family side candidates.
    - preferred_term: formate dehydrogenase (quinone) activity
      term:
        id: GO:0036397
        label: formate dehydrogenase (quinone) activity
      description: Respiratory formate oxidation side route represented by Fdo/Fdh-like complexes.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Soluble glycolate/glyoxylate and phosphoglycolate enzymes are treated as cytosolic context.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Formate dehydrogenase and NADH-quinone oxidoreductase side nodes are membrane-associated respiratory enzymes.
  parts:
    - order: 1
      role: Glycolate oxidation and glyoxylate carboligase route
      node:
        id: glycolate_glyoxylate_carboligase_route
        label: Glycolate/glyoxylate carboligase route
        module_type: METABOLIC_PATHWAY
        description: >-
          Glycolate oxidation through GlcDEF and glyoxylate conversion through
          Gcl/Hyi/GlxR form the most direct ppu00630 glyoxylate/dicarboxylate
          route in KT2440.
        annotons:
          - id: glcD_glycolate_oxidase_subunit
            label: "glcD: glycolate oxidase FAD-linked subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glcD
            function:
              preferred_term: glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
            role_description: FAD-linked subunit of the glycolate oxidase/dehydrogenase complex.
          - id: glcE_glycolate_oxidase_subunit
            label: "glcE: glycolate oxidase FAD-binding subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glcE
            function:
              preferred_term: glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
            role_description: FAD-binding subunit of the glycolate oxidase/dehydrogenase complex.
          - id: glcF_glycolate_oxidase_iron_sulfur_subunit
            label: "glcF: glycolate oxidase iron-sulfur subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glcF
            function:
              preferred_term: glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
            role_description: Iron-sulfur subunit of the glycolate oxidase/dehydrogenase complex.
          - id: gcl_glyoxylate_carboligase
            label: "gcl: glyoxylate carboligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gcl
            function:
              preferred_term: tartronate-semialdehyde synthase activity
              term:
                id: GO:0009028
                label: tartronate-semialdehyde synthase activity
            role_description: Condenses glyoxylate to tartronate semialdehyde.
          - id: hyi_hydroxypyruvate_isomerase
            label: "hyi: hydroxypyruvate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hyi
            function:
              preferred_term: hydroxypyruvate isomerase activity
              term:
                id: GO:0008903
                label: hydroxypyruvate isomerase activity
            role_description: Isomerase step in the glyoxylate/tartronate semialdehyde route.
          - id: glxR_tartronate_semialdehyde_reductase
            label: "glxR: tartronate semialdehyde reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glxR
            function:
              preferred_term: 2-hydroxy-3-oxopropionate reductase activity
              term:
                id: GO:0008679
                label: 2-hydroxy-3-oxopropionate reductase activity
            role_description: Reduces tartronate semialdehyde/hydroxypyruvate-route intermediate.
    - order: 2
      role: Phosphoglycolate repair and HAD-family side context
      node:
        id: phosphoglycolate_HAD_side_context
        label: Phosphoglycolate repair and HAD-family side context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_0416 is the direct phosphoglycolate phosphatase candidate. PP_0094
          and PP_1907 are related HAD-family side nodes whose current specific
          substrate assignments need separation from pathway-level claims.
        annotons:
          - id: PP_0416_phosphoglycolate_phosphatase
            label: "PP_0416: phosphoglycolate phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0416
            function:
              preferred_term: phosphoglycolate phosphatase activity
              term:
                id: GO:0008967
                label: phosphoglycolate phosphatase activity
            role_description: Direct phosphoglycolate phosphatase candidate.
          - id: PP_0094_5_nucleotidase_side_context
            label: "PP_0094: 5'-nucleotidase/HAD side node"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0094
            function:
              preferred_term: 5'-nucleotidase activity
              term:
                id: GO:0008253
                label: 5'-nucleotidase activity
            role_description: HAD-family nucleotidase side node, not pathway-defining glyoxylate chemistry.
          - id: PP_1907_HAD_hydrolase_candidate
            label: "PP_1907: HAD-family hydrolase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1907
            function:
              preferred_term: phosphoglycolate phosphatase activity candidate
              term:
                id: GO:0008967
                label: phosphoglycolate phosphatase activity
            role_description: Candidate phosphoglycolate phosphatase/HAD-family hydrolase; substrate evidence remains weaker than PP_0416.
    - order: 3
      role: Formate oxidation and respiratory side context
      node:
        id: formate_oxidation_respiratory_side_context
        label: Formate oxidation and respiratory side context
        module_type: METABOLIC_PATHWAY
        description: >-
          Fdo/Fdh-like subunits and Nuo-like redox-chain components appear in
          ppu00630 through formate and respiratory electron-transfer overlap.
          They are curated as formate oxidation or respiratory side context, not
          as glyoxylate-specific enzymes.
        annotons:
          - id: fdoG_formate_dehydrogenase_major_subunit
            label: "fdoG: formate dehydrogenase-O major subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdoG
            function:
              preferred_term: formate dehydrogenase (cytochrome-c-553) activity
              term:
                id: GO:0047111
                label: formate dehydrogenase (cytochrome-c-553) activity
            role_description: Catalytic molybdopterin-containing subunit in formate oxidation context.
          - id: fdoH_formate_dehydrogenase_iron_sulfur_subunit
            label: "fdoH: formate dehydrogenase iron-sulfur subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdoH
            function:
              preferred_term: electron transfer activity
              term:
                id: GO:0009055
                label: electron transfer activity
            role_description: Iron-sulfur electron-transfer subunit of formate dehydrogenase.
          - id: fdoI_formate_dehydrogenase_gamma_subunit
            label: "fdoI: formate dehydrogenase gamma subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdoI
            function:
              preferred_term: formate dehydrogenase (quinone) activity
              term:
                id: GO:0036397
                label: formate dehydrogenase (quinone) activity
            role_description: Membrane electron-transfer subunit in formate oxidation.
          - id: PP_2185_formate_dehydrogenase_alpha_subunit
            label: "PP_2185/Q88KV4: formate dehydrogenase alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: Q88KV4
            function:
              preferred_term: formate dehydrogenase (NAD+) activity
              term:
                id: GO:0008863
                label: formate dehydrogenase (NAD+) activity
            role_description: Alternate formate dehydrogenase alpha subunit in respiratory/formate side context.
          - id: PP_2186_formate_dehydrogenase_delta_subunit
            label: "PP_2186: formate dehydrogenase delta subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2186
            role_description: Delta subunit with no fetched GOA terms; retained as formate dehydrogenase complex context.
          - id: PP_2183_NDH1_subunit_E
            label: "PP_2183/Q88KV6: NADH-quinone oxidoreductase subunit E"
            participant:
              selector_type: GENE
              gene:
                preferred_term: Q88KV6
            function:
              preferred_term: oxidoreductase activity
              term:
                id: GO:0016491
                label: oxidoreductase activity
            role_description: Respiratory-chain redox side node.
          - id: PP_2184_NDH1_subunit_F
            label: "PP_2184: NADH-quinone oxidoreductase subunit F"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2184
            function:
              preferred_term: NADH dehydrogenase (ubiquinone) activity
              term:
                id: GO:0008137
                label: NADH dehydrogenase (ubiquinone) activity
            role_description: Respiratory-chain NADH-quinone oxidoreductase side node.
  notes: >-
    The full KEGG ppu00630 membership includes many previously curated overlap
    genes from TCA, one-carbon, glyoxylate shunt, amino-acid, acetate/CoA, and
    respiration batches. This module focuses on the newly curated or
    pathway-defining boundary nodes and keeps those overlaps as context.
