id: MODULE:nadp_synthesis_and_nr_salvage
title: NADP+ synthesis (NAD kinases NADK/NADK2) and nicotinamide riboside salvage (NMRK1/NMRK2)
description: >-
  Two committed reactions that complete the cellular NAD(P) cofactor network beyond the core NAD+
  biosynthesis hub. First, the nicotinamide riboside (NR) salvage entry: nicotinamide riboside kinases
  NMRK1 (ubiquitous) and NMRK2 (muscle-enriched) phosphorylate the dietary/circulating NAD+ precursor
  nicotinamide riboside (and nicotinic acid riboside, and the reduced vitamers) with ATP to nicotinamide
  mononucleotide (NMN) / nicotinic acid mononucleotide (NaMN). NMN then enters the NMNAT step of the
  NAD+ biosynthesis hub (see MODULE:nad_biosynthesis_salvage), making NR the shortest two-step route to
  NAD+ and the basis for NR/NMN nutraceutical supplementation. Second, the NADP+ branch: NAD kinases
  phosphorylate the 2'-hydroxyl of the adenine ribose of NAD+ with ATP to give NADP+, the sole de novo
  source of the NADP(H) pool that drives reductive biosynthesis and antioxidant defence (glutathione and
  thioredoxin regeneration). Humans have two compartment-specific NAD kinases from distinct families:
  cytosolic NADK supplies the cytosolic/nuclear NADP(H) pool, and mitochondrial NADK2 supplies the matrix
  NADP(H) pool required for proline biosynthesis (feeding NADPH to ALDH18A1/P5CS), mitochondrial
  one-carbon metabolism and fatty-acid oxidation. NADK2 deficiency causes a severe metabolic
  encephalopathy (hyperlysinemia, 2,4-dienoyl-CoA reductase deficiency); NADK activity is itself
  redox- and growth-signal-regulated.
status: DRAFT
evidence:
  - source_id: GO:0006741
    title: NADP+ biosynthetic process
    statement: NADK and NADK2 carry out NADP+ biosynthesis (GO:0006741) by phosphorylating NAD+.
  - source_id: GO:0034355
    title: NAD+ biosynthetic process via the salvage pathway
    statement: NMRK1/NMRK2 provide the nicotinamide-riboside salvage entry into NAD+ biosynthesis (GO:0034355).
  - source_id: file:human/NADK/NADK-ai-review.yaml
    title: NADK gene review (human)
    statement: The cytosolic NAD+->NADP+ step (UniProtKB:O95544, GO:0003951) matches the completed human NADK review.
  - source_id: file:human/NADK2/NADK2-ai-review.yaml
    title: NADK2 gene review (human)
    statement: The mitochondrial NAD+->NADP+ step (UniProtKB:Q4G0N4, GO:0003951) matches the completed human NADK2 review.
  - source_id: file:human/NMRK1/NMRK1-ai-review.yaml
    title: NMRK1 gene review (human)
    statement: The NR->NMN salvage step (UniProtKB:Q9NWW6, GO:0050262) matches the completed human NMRK1 review.
  - source_id: file:human/NMRK2/NMRK2-ai-review.yaml
    title: NMRK2 gene review (human)
    statement: The muscle NR->NMN salvage step (UniProtKB:Q9NPI5, GO:0050262) matches the completed human NMRK2 review.
module:
  id: nadp_synthesis_and_nr_salvage
  label: NADP+ synthesis (NAD kinases) and nicotinamide riboside salvage
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: NADP+ biosynthetic process
      term:
        id: GO:0006741
        label: NADP+ biosynthetic process
      description: Phosphorylation of NAD+ to NADP+ by NAD kinases (the sole de novo NADP source).
    - preferred_term: NAD+ biosynthetic process via the salvage pathway
      term:
        id: GO:0034355
        label: NAD+ biosynthetic process via the salvage pathway
      description: Nicotinamide-riboside salvage entry (NR -> NMN) feeding the NMNAT step of NAD+ synthesis.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: NMRK1/NMRK2 and NADK act in the cytosol (NADK also supplies the nuclear pool).
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: NADK2 acts in the mitochondrial matrix, supplying the matrix NADP(H) pool.
  parts:
    - order: 1
      role: nicotinamide riboside salvage to NMN
      node:
        id: nr_to_nmn
        label: Nicotinamide riboside kinases (NMRK1/NMRK2)
        module_type: REACTION
        annotons:
          - id: nmrk_activity
            label: "NMRK1/NMRK2: nicotinamide riboside kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NMRK / nicotinamide riboside kinase (uridine-kinase / NRK) family
                term:
                  id: PANTHER:PTHR10285
                  label: URIDINE KINASE
                representative_members:
                  - preferred_term: NMRK1 (human)
                    term:
                      id: UniProtKB:Q9NWW6
                      label: Nicotinamide riboside kinase 1
                  - preferred_term: NMRK2 (human)
                    term:
                      id: UniProtKB:Q9NPI5
                      label: Nicotinamide riboside kinase 2
            function:
              preferred_term: ribosylnicotinamide kinase activity
              term:
                id: GO:0050262
                label: ribosylnicotinamide kinase activity
              substrates:
                - preferred_term: nicotinamide riboside (NR)
                - preferred_term: ATP (with Mg2+)
              products:
                - preferred_term: nicotinamide mononucleotide (NMN)
                - preferred_term: ADP
              evidence:
                - source_id: file:human/NMRK1/NMRK1-ai-review.yaml
                  statement: NMRK1 phosphorylates NR to NMN (GO:0050262) and nicotinate riboside to NaMN (GO:0061769), the salvage entry into NAD+ synthesis; also activates the prodrugs tiazofurin/benzamide riboside
                - source_id: file:human/NMRK2/NMRK2-ai-review.yaml
                  statement: NMRK2 (ITGB1BP3/MIBP) is the muscle-enriched paralog with the same NR->NMN kinase activity; it additionally has a genuine integrin-binding role (GO:0005178)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Phosphorylates nicotinamide riboside to NMN (shortest salvage route to NAD+).
    - order: 2
      role: cytosolic NAD+ phosphorylation to NADP+
      node:
        id: nad_to_nadp_cytosolic
        label: Cytosolic NAD kinase (NADK)
        module_type: REACTION
        annotons:
          - id: nadk_activity
            label: "NADK: cytosolic NAD+ kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NADK / cytosolic NAD kinase family
                term:
                  id: PANTHER:PTHR20275
                  label: NAD KINASE
                representative_members:
                  - preferred_term: NADK (human)
                    term:
                      id: UniProtKB:O95544
                      label: NAD kinase
            function:
              preferred_term: NAD+ kinase activity
              term:
                id: GO:0003951
                label: NAD+ kinase activity
              substrates:
                - preferred_term: NAD+
                - preferred_term: ATP (with divalent metal)
              products:
                - preferred_term: NADP+
                - preferred_term: ADP
              evidence:
                - source_id: file:human/NADK/NADK-ai-review.yaml
                  statement: Homotetrameric divalent-metal-dependent kinase; sole de novo source of cytosolic/nuclear NADP+; highly selective for NAD/ATP (does not phosphorylate NAAD, so makes no NAADP)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Phosphorylates NAD+ to NADP+ in the cytosol/nucleus.
    - order: 3
      role: mitochondrial NAD+ phosphorylation to NADP+
      node:
        id: nad_to_nadp_mitochondrial
        label: Mitochondrial NAD kinase (NADK2)
        module_type: REACTION
        annotons:
          - id: nadk2_activity
            label: "NADK2: mitochondrial NAD+ kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NADK2 / mitochondrial NAD kinase family
                term:
                  id: PANTHER:PTHR13158
                  label: NAD KINASE 2, MITOCHONDRIAL
                representative_members:
                  - preferred_term: NADK2 (human)
                    term:
                      id: UniProtKB:Q4G0N4
                      label: NAD kinase 2, mitochondrial
            function:
              preferred_term: NAD+ kinase activity
              term:
                id: GO:0003951
                label: NAD+ kinase activity
              substrates:
                - preferred_term: NAD+
                - preferred_term: ATP (with divalent metal)
              products:
                - preferred_term: NADP+
                - preferred_term: ADP
              evidence:
                - source_id: file:human/NADK2/NADK2-ai-review.yaml
                  statement: Matrix NAD kinase (homodimer); supplies the mitochondrial NADP(H) pool for proline synthesis (NADPH to ALDH18A1/P5CS), one-carbon metabolism and FAO; deficiency = DECRD/hyperlysinemia
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Phosphorylates NAD+ to NADP+ in the mitochondrial matrix.
  connections:
    - source: nr_to_nmn
      target: nad_to_nadp_cytosolic
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The NMN made by NMRK1/NMRK2 is adenylylated to NAD+ by the NMNAT step of the NAD+ biosynthesis
        hub (node nmnat_hub in MODULE:nad_biosynthesis_salvage); that NAD+ pool is in turn the substrate
        for the NAD kinases, linking NR salvage (input) to NADP+ synthesis (output).
  notes: >-
    NADP+ synthesis and nicotinamide-riboside salvage (GO:0006741 / GO:0034355), grounded to the
    completed human gene reviews. Two NAD kinases from DISTINCT PANTHER families phosphorylate NAD+ to
    NADP+ in separate compartments: cytosolic NADK (O95544, PTHR20275, GO:0003951; homotetramer, sole de
    novo cytosolic/nuclear NADP source, does not make NAADP) and mitochondrial NADK2 (Q4G0N4, PTHR13158,
    GO:0003951; supplies matrix NADP(H) for proline synthesis and FAO — deficiency causes DECRD /
    hyperlysinemia). The nicotinamide-riboside kinases NMRK1 (Q9NWW6) and NMRK2 (Q9NPI5) share one family
    (PTHR10285) and one activity (GO:0050262 ribosylnicotinamide kinase + GO:0061769 nicotinate riboside
    kinase), phosphorylating NR to NMN as the shortest salvage entry to NAD+; NMRK2 is muscle-enriched and
    additionally a genuine integrin-binding protein (ITGB1BP3/MIBP, GO:0005178). NR salvage feeds NMN into
    the NMNAT step of the sibling module MODULE:nad_biosynthesis_salvage (node nmnat_hub); the resulting
    NAD+ pool is the substrate for the NAD kinases here, so this module extends the NAD+ hub to cover the
    NADP branch and the NR entry point. GO term ids/labels verified against the local go.db. All four
    genes are cofactor-metabolism enzymes without EC/localization over-annotation concerns (see per-gene
    reviews for annotation-level actions).
