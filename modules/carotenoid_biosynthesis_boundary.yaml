id: MODULE:carotenoid_biosynthesis_boundary
title: Carotenoid biosynthesis boundary
description: >-
  Boundary/partial module for KEGG ppu00906 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only crtZ/PP_3246, a predicted
  beta-carotene hydroxylase. This supports a carotenoid/xanthophyll tailoring
  step but not, by itself, a complete carotenoid biosynthesis pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00906
    title: Carotenoid biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00906 provides the PSEPK curation batch. Its specific membership
      contains only crtZ/PP_3246, annotated by UniProt/GOA as a predicted
      beta-carotene hydroxylase.
  - source_id: file:PSEPK/crtZ/crtZ-uniprot.txt
    title: UniProt record for crtZ
    statement: >-
      UniProt names crtZ as beta-carotene hydroxylase, assigns a fatty-acid
      hydroxylase domain and BETA-OHASE-like InterPro family, and marks the
      protein as membrane/transmembrane.
module:
  id: carotenoid_biosynthesis_boundary
  label: Carotenoid biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: xanthophyll biosynthetic process
      term:
        id: GO:0016123
        label: xanthophyll biosynthetic process
      description: Hydroxylated carotenoid product formation inferred for crtZ.
    - preferred_term: carotene metabolic process
      term:
        id: GO:0016119
        label: carotene metabolic process
      description: Broader carotene substrate/product context for the single mapped hydroxylase.
    - preferred_term: beta-carotene 3-hydroxylase activity
      term:
        id: GO:0010291
        label: beta-carotene 3-hydroxylase activity
      description: Specific molecular function assigned to crtZ by TreeGrafter/PANTHER.
  parts:
    - order: 1
      role: Beta-carotene hydroxylation side step
      node:
        id: beta_carotene_hydroxylation_boundary
        label: Beta-carotene to xanthophyll hydroxylation
        module_type: REACTION
        description: >-
          The only PSEPK ppu00906 member is crtZ, a predicted membrane-associated
          beta-carotene hydroxylase. It is retained as a carotenoid-tailoring
          boundary step while upstream carotenoid backbone and desaturation
          steps remain unsupported by this KEGG bucket.
        annotons:
          - id: crtZ_beta_carotene_hydroxylase
            label: "crtZ: beta-carotene hydroxylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: crtZ
            function:
              preferred_term: beta-carotene 3-hydroxylase activity
              term:
                id: GO:0010291
                label: beta-carotene 3-hydroxylase activity
            processes:
              - preferred_term: xanthophyll biosynthetic process
                term:
                  id: GO:0016123
                  label: xanthophyll biosynthetic process
            role_description: Predicted carotenoid hydroxylation/tailoring step; not evidence for a complete carotenoid-biosynthesis route in KT2440.
  notes: >-
    This module intentionally treats ppu00906 as a one-gene boundary/partial
    pathway. The first-pass PSEPK candidate set does not contain the broader
    crtE/crtB/crtI/crtY-style route that would establish complete carotenoid
    biosynthesis from central isoprenoid precursors.
