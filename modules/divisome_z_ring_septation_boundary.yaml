id: MODULE:divisome_z_ring_septation_boundary
title: Divisome, Z-ring, and septation boundary
description: Boundary module for Pseudomonas putida KT2440 FtsZ-dependent cytokinesis and septation factors from the chromosome/cell-cycle functional bucket. The module captures the FtsZ ring, FtsA/ZipA membrane anchoring, the FtsB-FtsL-FtsQ subcomplex, Z-ring accessory proteins ZapA/ZapE/ZapG, EngB septation context, and SPOR-domain peptidoglycan-binding septal factors.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition.tsv
  title: PSEPK chromosome/cell-cycle functional-bucket partition
  statement: The chromosome/cell-cycle functional bucket was split into curation-scale sub-batches; twelve genes form the divisome, Z-ring, and septation boundary sub-batch.
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_divisome.tsv
  title: PSEPK divisome/Z-ring/septation sub-batch
  statement: The completed divisome sub-batch includes engB, PP_1309, zapE, ftsL, ftsQ, ftsA, ftsZ, ftsB, dedD, zipA, PP_5090, and PP_5202.
- source_id: file:projects/P_PUTIDA/batches/module_cell_envelope_division_cell_division_regulatory_spillovers.tsv
  title: PSEPK cell-envelope/division cell-division regulatory spillover sub-batch
  statement: The cell-envelope/division partition added sulA, PP_2199, and PP_2352 as regulatory or ZapE-family cell-division spillover candidates for this existing divisome/Z-ring boundary.
- source_id: file:PSEPK/ftsZ/ftsZ-ai-review.yaml
  title: PSEPK ftsZ gene review
  statement: The existing ftsZ review supports FtsZ as the central GTPase and Z-ring organizer of FtsZ-dependent cytokinesis.
- source_id: file:PSEPK/ftsA/ftsA-ai-review.yaml
  title: PSEPK ftsA gene review
  statement: The curated ftsA review supports FtsA as the cytoplasmic-side membrane Z-ring anchor and FtsZ-interacting cytokinesis factor.
- source_id: file:PSEPK/zipA/zipA-ai-review.yaml
  title: PSEPK zipA gene review
  statement: The curated zipA review supports ZipA as an inner-membrane FtsZ-ring anchor and downstream division-protein recruitment factor.
- source_id: file:PSEPK/ftsB/ftsB-ai-review.yaml
  title: PSEPK ftsB gene review
  statement: The curated ftsB review supports FtsB as an FtsB-FtsL-FtsQ subcomplex member at the septal division site.
- source_id: file:PSEPK/ftsL/ftsL-ai-review.yaml
  title: PSEPK ftsL gene review
  statement: The curated ftsL review supports FtsL as an FtsB-FtsL-FtsQ subcomplex member at the septal division site.
- source_id: file:PSEPK/ftsQ/ftsQ-ai-review.yaml
  title: PSEPK ftsQ gene review
  statement: The curated ftsQ review supports FtsQ as an FtsB-FtsL-FtsQ subcomplex member involved in divisome assembly and septation.
- source_id: file:PSEPK/sulA/sulA-ai-review.yaml
  title: PSEPK sulA gene review
  statement: The curated sulA review supports SulA as a SulA-family SOS-response cell division inhibitor.
- source_id: file:PSEPK/PP_2199/PP_2199-ai-review.yaml
  title: PSEPK PP_2199 gene review
  statement: The curated PP_2199 review supports a predicted AFG1/ZapE-family ATPase, keeping cell-division context as candidate family-level evidence.
- source_id: file:PSEPK/PP_2352/PP_2352-ai-review.yaml
  title: PSEPK PP_2352 gene review
  statement: The curated PP_2352 review supports a predicted AFG1/ZapE-family ATPase, keeping cell-division context as candidate family-level evidence.
