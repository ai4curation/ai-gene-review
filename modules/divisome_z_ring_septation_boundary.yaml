notes: This module is a first-pass boundary for core Z-ring/divisome/septation factors from the chromosome/cell-cycle functional bucket. It intentionally excludes MinCDE septum-site selection, Tol-Pal envelope/division coordination, and chromosome segregation/dimer-resolution factors, which are handled as separate sub-batches. The later cell-envelope/division partition added SulA and two additional ZapE-like ATPases as regulatory or candidate spillover context; SulA is not a structural divisome subunit, and PP_2199/PP_2352 should remain candidate AFG1/ZapE-family ATPases until direct FtsZ interaction, midcell localization, or division phenotype evidence is available.
