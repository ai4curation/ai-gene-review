id: MODULE:selenocompound_metabolism_boundary
title: Selenocompound metabolism boundary
description: >-
  Boundary module for KEGG ppu00450 in Pseudomonas putida KT2440. The
  organism-specific map contains a selenium-specific Sec-tRNA biosynthesis
  spine, SelD selenophosphate synthase followed by SelA L-seryl-tRNA(Sec)
  selenium transferase, plus methionine, cysteine, sulfate-assimilation, and
  aminoacyl-tRNA side nodes included by broad KEGG selenocompound chemistry.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00450
    title: Selenocompound metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00450 provides the PSEPK curation batch. The mapped genes combine
      selenium-specific SelD/SelA enzymes with methionine, cysteine, sulfate,
      and aminoacyl-tRNA metabolism genes.
  - source_id: UniProtKB:P59392
    title: SelD selenide, water dikinase
    statement: >-
      UniProt identifies SelD as selenide, water dikinase/selenophosphate
      synthase that forms selenophosphate from selenide and ATP.
  - source_id: UniProtKB:Q88QJ8
    title: SelA L-seryl-tRNA(Sec) selenium transferase
    statement: >-
      UniProt identifies SelA as the enzyme converting
      L-seryl-tRNA(Sec) and selenophosphate to selenocysteinyl-tRNA(Sec).
module:
  id: selenocompound_metabolism_boundary
  label: Selenocompound metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-selenocysteine biosynthetic process
      term:
        id: GO:0016260
        label: L-selenocysteine biosynthetic process
      description: Biosynthesis of selenocysteine, including formation of selenocysteinyl-tRNA(Sec).
    - preferred_term: selenide, water dikinase activity
      term:
        id: GO:0004756
        label: selenide, water dikinase activity
      description: ATP-dependent synthesis of selenophosphate from selenide.
    - preferred_term: L-seryl-tRNA(Sec) selenium transferase activity
      term:
        id: GO:0004125
        label: L-seryl-tRNA(Sec) selenium transferase activity
      description: Conversion of L-seryl-tRNA(Sec) to L-selenocysteinyl-tRNA(Sec).
    - preferred_term: selenocompound metabolism boundary
      description: >-
        KEGG-map boundary interpretation separating the selenium-specific
        SelD/SelA route from sulfur and methionine side chemistry.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: The ppu00450 member enzymes are soluble cytoplasmic metabolic or translation enzymes.
  parts:
    - order: 1
      role: Selenophosphate synthesis
      node:
        id: selenophosphate_synthesis
        label: Selenide plus ATP to selenophosphate
        module_type: REACTION
        description: >-
          SelD synthesizes selenophosphate from hydrogenselenide, ATP, and
          water; this activated selenium donor is consumed by SelA.
        annotons:
          - id: selD_selenide_water_dikinase
            label: "selD: selenide, water dikinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: selD
            function:
              preferred_term: selenide, water dikinase activity
              term:
                id: GO:0004756
                label: selenide, water dikinase activity
              substrates:
                - preferred_term: hydrogenselenide
                - preferred_term: ATP
                - preferred_term: H2O
              products:
                - preferred_term: selenophosphate
                - preferred_term: AMP
                - preferred_term: phosphate
            role_description: Upstream selenium-donor synthesis step in bacterial selenocysteine biosynthesis.
    - order: 2
      role: Selenocysteinyl-tRNA(Sec) formation
      node:
        id: sec_trna_synthesis
        label: Seryl-tRNA(Sec) to selenocysteinyl-tRNA(Sec)
        module_type: REACTION
        description: >-
          SelA transfers selenium from selenophosphate to
          L-seryl-tRNA(Sec), forming L-selenocysteinyl-tRNA(Sec) for
          selenocysteine incorporation.
        annotons:
          - id: selA_sec_synthase
            label: "selA: L-seryl-tRNA(Sec) selenium transferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: selA
            function:
              preferred_term: L-seryl-tRNA(Sec) selenium transferase activity
              term:
                id: GO:0004125
                label: L-seryl-tRNA(Sec) selenium transferase activity
              substrates:
                - preferred_term: L-seryl-tRNA(Sec)
                - preferred_term: selenophosphate
                - preferred_term: H(+)
              products:
                - preferred_term: L-selenocysteinyl-tRNA(Sec)
                - preferred_term: phosphate
            role_description: Selenium-specific Sec-tRNA formation step.
    - order: 3
      role: Methionyl-tRNA side context
      node:
        id: methionyl_trna_side_context
        label: Methionyl-tRNA synthetase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          MetG is included by the KEGG selenocompound map because selenium and
          sulfur analog chemistry intersects with methionine-related nodes, but
          its curated core role is canonical methionyl-tRNA aminoacylation.
        annotons:
          - id: metG_methionine_trna_ligase
            label: "metG: methionine-tRNA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metG
            function:
              preferred_term: methionine-tRNA ligase activity
              term:
                id: GO:0004825
                label: methionine-tRNA ligase activity
            role_description: Translation/met-tRNA side node, not a selenium-specific enzyme.
    - order: 4
      role: Sulfate assimilation side context
      node:
        id: sulfate_assimilation_side_context
        label: ATP sulfurylase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          CysD and CysNC form ATP sulfurylase for sulfate assimilation. They
          are included on broad selenium/sulfur maps but do not define a
          selenocompound-specific route.
        annotons:
          - id: cysD_sulfate_adenylyltransferase
            label: "cysD: sulfate adenylyltransferase subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cysD
            function:
              preferred_term: sulfate adenylyltransferase (ATP) activity
              term:
                id: GO:0004781
                label: sulfate adenylyltransferase (ATP) activity
            role_description: Sulfate-assimilation side context.
          - id: cysNC_sulfate_adenylyltransferase
            label: "cysNC: sulfate adenylyltransferase subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cysNC
            function:
              preferred_term: sulfate adenylyltransferase (ATP) activity
              term:
                id: GO:0004781
                label: sulfate adenylyltransferase (ATP) activity
            role_description: Sulfate-assimilation side context.
    - order: 5
      role: Methionine and transsulfuration side context
      node:
        id: methionine_transsulfuration_side_context
        label: Methionine/cysteine sulfur-metabolism side context
        module_type: METABOLIC_PATHWAY
        description: >-
          The remaining ppu00450 enzymes are methionine synthase,
          methyltransferase, PLP-dependent carbon-sulfur lyase, cystathionine
          lyase/synthase, and related sulfur-amino-acid side nodes.
        annotons:
          - id: metB_cystathionine_gamma_synthase_context
            label: "metB: cystathionine gamma-synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metB
            function:
              preferred_term: carbon-sulfur lyase activity
              term:
                id: GO:0016846
                label: carbon-sulfur lyase activity
            role_description: Methionine/transsulfuration side context.
          - id: mdeA_methionine_gamma_lyase
            label: "mdeA: methionine gamma-lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mdeA
            function:
              preferred_term: methionine gamma-lyase activity
              term:
                id: GO:0018826
                label: methionine gamma-lyase activity
            role_description: Methionine catabolic or sulfur-amino-acid side context.
          - id: metH_methionine_synthase_context
            label: "metH: methionine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metH
            function:
              preferred_term: methionine synthase activity
              term:
                id: GO:0008705
                label: methionine synthase activity
            role_description: Cobalamin-dependent methionine biosynthesis side context.
          - id: metE_homocysteine_methyltransferase_context
            label: "metE: homocysteine methyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metE
            function:
              preferred_term: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
              term:
                id: GO:0003871
                label: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
            role_description: Cobalamin-independent methionine biosynthesis side context.
          - id: PP_4348_cystathionine_beta_lyase_context
            label: "PP_4348: cystathionine beta-lyase family enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4348
            function:
              preferred_term: cysteine-S-conjugate beta-lyase activity
              term:
                id: GO:0047804
                label: cysteine-S-conjugate beta-lyase activity
            role_description: PLP-dependent sulfur-amino-acid side context.
          - id: PP_4594_cystathionine_gamma_lyase_context
            label: "PP_4594: cystathionine gamma-lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4594
            function:
              preferred_term: cystathionine gamma-lyase activity
              term:
                id: GO:0004123
                label: cystathionine gamma-lyase activity
            role_description: Methionine/cysteine transsulfuration side context.
          - id: PP_4637_homocysteine_methyltransferase_context
            label: "PP_4637: homocysteine methyltransferase family protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4637
            function:
              preferred_term: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
              term:
                id: GO:0003871
                label: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
            role_description: Candidate methionine-biosynthesis side node with uncertain specificity.
  connections:
    - source: selenophosphate_synthesis
      target: sec_trna_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: SelD produces selenophosphate, the selenium donor substrate used by SelA.
      chaining_status: VERIFIED
      chaining_note: >-
        Selenophosphate is an explicit product of the SelD reaction and an
        explicit substrate of the SelA reaction.
  notes: >-
    This module is intentionally a boundary module. Only SelD and SelA are
    selenium-specific Sec-tRNA biosynthesis enzymes in the ppu00450 membership
    set. MetG, CysD/CysNC, MetB, MdeA, MetH, MetE, PP_4348, PP_4594, and
    PP_4637 should remain sulfur, methionine, sulfate-assimilation, translation,
    or candidate side-context nodes unless gene-specific selenium substrate
    evidence is found.
