id: MODULE:pinene_camphor_geraniol_degradation_boundary
title: Pinene, camphor and geraniol degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00907 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains HMG-CoA lyase paralogs and broadly reused
  CoA-thioester beta-oxidation/hydration enzymes, but does not establish a
  complete monoterpene degradation route for pinene, camphor, or geraniol.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00907
    title: Pinene, camphor and geraniol degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00907 provides the PSEPK curation batch. Its seven mapped members
      are fadA__Q88L84, fadB, fadA__Q88L01, PP_2217, paaF, PP_3394, and mvaB;
      these are already curated primarily as fatty-acid beta-oxidation,
      phenylacetate/CoA-thioester, or HMG-CoA lyase side-context enzymes.
module:
  id: pinene_camphor_geraniol_degradation_boundary
  label: Pinene, camphor and geraniol degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: hydroxymethylglutaryl-CoA lyase activity
      term:
        id: GO:0004419
        label: hydroxymethylglutaryl-CoA lyase activity
      description: HMG-CoA lyase activity represented by PP_3394 and mvaB.
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
      description: Fatty-acid beta-oxidation context for FadA/FadB-like spillover enzymes.
    - preferred_term: 3-hydroxyacyl-CoA dehydratase activity
      term:
        id: GO:0018812
        label: 3-hydroxyacyl-CoA dehydratase activity
      description: CoA-thioester hydration/isomerase context for FadB/PP_2217/paaF-like enzymes.
  parts:
    - order: 1
      role: Monoterpene-route absence
      node:
        id: monoterpene_degradation_absence
        label: Pinene, camphor, and geraniol upper-route absence
        module_type: METABOLIC_PATHWAY
        description: >-
          The PSEPK ppu00907 membership does not include route-defining pinene,
          camphor, or geraniol monooxygenase/dehydrogenase upper-pathway
          candidates. The KEGG bucket is therefore treated as boundary overlap
          with generic CoA-thioester metabolism rather than satisfiable
          monoterpene degradation.
        annotons: []
    - order: 2
      role: HMG-CoA lyase side branch
      node:
        id: hmg_coa_lyase_side_branch
        label: HMG-CoA lyase side branch
        module_type: REACTION
        description: >-
          PP_3394 and mvaB are HMG-CoA lyase-family enzymes. In prior curation
          they are interpreted as leucine/butanoate/isoprenoid side-context
          enzymes, not as route-defining pinene, camphor, or geraniol
          catabolic enzymes.
        annotons:
          - id: PP_3394_hmg_coa_lyase_candidate
            label: "PP_3394: HMG-CoA lyase-family candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3394
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
            role_description: Predicted HMG-CoA lyase paralog; retained as side context for ppu00907.
          - id: mvaB_hmg_coa_lyase
            label: "mvaB: hydroxymethylglutaryl-CoA lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mvaB
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
            role_description: HMG-CoA lyase side-context enzyme shared with leucine/butanoate/isoprenoid maps.
    - order: 3
      role: CoA-thioester beta-oxidation and hydration spillovers
      node:
        id: coa_thioester_beta_oxidation_spillovers
        label: CoA-thioester beta-oxidation spillovers
        module_type: METABOLIC_PATHWAY
        description: >-
          FadA/FadB, PP_2217, and paaF are CoA-thioester thiolase,
          dehydrogenase, hydratase, or isomerase enzymes with stronger
          placements in fatty-acid beta-oxidation, phenylacetate degradation,
          caprolactam, or other CoA-metabolism boundary maps.
        annotons:
          - id: fadA_Q88L84_thiolase_side_context
            label: "fadA__Q88L84: FadA-like thiolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadA__Q88L84
            processes:
              - preferred_term: fatty acid beta-oxidation
                term:
                  id: GO:0006635
                  label: fatty acid beta-oxidation
            role_description: FadA-like thiolase side node; not monoterpene-route specific.
          - id: fadB_beta_oxidation_multienzyme_alpha
            label: "fadB: fatty-acid oxidation complex alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadB
            processes:
              - preferred_term: fatty acid beta-oxidation
                term:
                  id: GO:0006635
                  label: fatty acid beta-oxidation
            role_description: FadBA beta-oxidation multienzyme subunit reused by multiple KEGG maps.
          - id: fadA_Q88L01_beta_oxidation_thiolase
            label: "fadA__Q88L01: fatty-acid oxidation complex beta subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadA__Q88L01
            processes:
              - preferred_term: fatty acid beta-oxidation
                term:
                  id: GO:0006635
                  label: fatty acid beta-oxidation
            role_description: FadA thiolase side node; not monoterpene-route specific.
          - id: PP_2217_enoyl_coa_hydratase
            label: "PP_2217: enoyl-CoA hydratase-family enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2217
            function:
              preferred_term: 3-hydroxyacyl-CoA dehydratase activity
              term:
                id: GO:0018812
                label: 3-hydroxyacyl-CoA dehydratase activity
            role_description: CoA-thioester hydratase side node shared with several degradation maps.
          - id: paaF_enoyl_coa_hydratase_isomerase
            label: "paaF: enoyl-CoA hydratase/isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaF
            role_description: Phenylacetate-pathway enoyl-CoA hydratase/isomerase side node.
  notes: >-
    This module intentionally records boundary/absence status. The seven KEGG
    ppu00907 members are plausible lower CoA-thioester or HMG-CoA side
    chemistry, but the batch lacks the upper-route enzymes needed to claim
    complete pinene, camphor, or geraniol degradation in KT2440.
