id: MODULE:caprolactam_degradation_boundary
title: Caprolactam degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00930 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only shared CoA-thioester hydration and
  fatty-acid/phenylacetate beta-oxidation side enzymes (`fadB`, PP_2217, and
  `paaF`). It lacks route-defining caprolactam lactamase, 6-aminohexanoate
  conversion, or adipate/semialdehyde upper-pathway enzymes, so this bucket
  should not be interpreted as a complete caprolactam degradation pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00930
    title: Caprolactam degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00930 provides the PSEPK curation batch. Its mapped members are
      fadB, PP_2217, and paaF, all of which are already curated as shared
      CoA-thioester hydratase/isomerase or beta-oxidation side enzymes.
  - source_id: file:projects/P_PUTIDA/batches/ppu00930_caprolactam_degradation_boundary.tsv
    title: PSEPK ppu00930 caprolactam-degradation batch
    statement: >-
      The batch records the three PSEPK members and shows that all already have
      review files, Asta reports, and curated GOA decisions.
module:
  id: caprolactam_degradation_boundary
  label: Caprolactam degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
      description: Stronger native pathway context for fadB/PP_2217 side annotations.
    - preferred_term: 3-hydroxyacyl-CoA dehydratase activity
      term:
        id: GO:0018812
        label: 3-hydroxyacyl-CoA dehydratase activity
      description: CoA-thioester hydratase/dehydratase activity represented by fadB and PP_2217.
    - preferred_term: enoyl-CoA hydratase activity
      term:
        id: GO:0004300
        label: enoyl-CoA hydratase activity
      description: Hydratase/isomerase activity represented by paaF.
  parts:
    - order: 1
      role: Caprolactam-route absence
      node:
        id: caprolactam_upper_route_absence
        label: Caprolactam upper-route absence
        module_type: METABOLIC_PATHWAY
        description: >-
          The PSEPK ppu00930 membership does not include route-defining
          caprolactam lactamase or 6-aminohexanoate upper-pathway enzymes.
          The KEGG bucket is therefore treated as boundary overlap with generic
          CoA-thioester metabolism rather than a satisfiable caprolactam
          degradation route.
        annotons: []
    - order: 2
      role: CoA-thioester hydratase and beta-oxidation spillovers
      node:
        id: coa_thioester_hydratase_spillovers
        label: CoA-thioester hydratase and beta-oxidation spillovers
        module_type: METABOLIC_PATHWAY
        description: >-
          fadB, PP_2217, and paaF are CoA-thioester hydration/isomerase enzymes
          with stronger placements in fatty-acid beta-oxidation,
          phenylacetate degradation, or other CoA-metabolism boundary maps.
        annotons:
          - id: fadB_beta_oxidation_multienzyme_alpha
            label: "fadB: fatty-acid oxidation complex alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadB
            function:
              preferred_term: 3-hydroxyacyl-CoA dehydratase activity
              term:
                id: GO:0018812
                label: 3-hydroxyacyl-CoA dehydratase activity
            processes:
              - preferred_term: fatty acid beta-oxidation
                term:
                  id: GO:0006635
                  label: fatty acid beta-oxidation
            role_description: FadBA beta-oxidation multienzyme subunit reused by multiple KEGG maps.
          - id: PP_2217_enoyl_coa_hydratase_side_node
            label: "PP_2217: enoyl-CoA hydratase-family enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2217
            function:
              preferred_term: 3-hydroxyacyl-CoA dehydratase activity
              term:
                id: GO:0018812
                label: 3-hydroxyacyl-CoA dehydratase activity
            processes:
              - preferred_term: fatty acid beta-oxidation
                term:
                  id: GO:0006635
                  label: fatty acid beta-oxidation
            role_description: Enoyl-CoA hydratase side node shared with caprolactam and monoterpene-degradation boundary maps.
          - id: paaF_enoyl_coa_hydratase_isomerase_side_node
            label: "paaF: enoyl-CoA hydratase/isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaF
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Phenylacetate-pathway enoyl-CoA hydratase/isomerase side node reused by the caprolactam KEGG map.
  notes: >-
    This module records boundary/absence status. The three KEGG ppu00930
    members are real CoA-thioester enzymes, but the batch lacks the upper-route
    caprolactam enzymes needed to claim complete caprolactam degradation in
    KT2440.
