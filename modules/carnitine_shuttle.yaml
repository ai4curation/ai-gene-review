id: MODULE:carnitine_shuttle
title: Carnitine shuttle (mitochondrial import of long-chain fatty acids)
description: >-
  The carnitine shuttle is the system that imports long-chain fatty acids into the
  mitochondrial matrix for beta-oxidation. Long-chain acyl-CoA cannot cross the
  inner mitochondrial membrane, so it is transiently converted to acylcarnitine,
  transported across the membrane, and converted back to acyl-CoA inside the
  matrix. First, the plasma-membrane sodium-dependent carnitine transporter
  SLC22A5 (OCTN2) imports L-carnitine into the cell (and mediates its renal
  reabsorption), supplying the carnitine pool. Carnitine palmitoyltransferase 1
  (CPT1; the liver isoform is CPT1A), on the mitochondrial OUTER membrane,
  catalyses the committed, rate-limiting, malonyl-CoA-inhibited step: transfer of
  a long-chain acyl group from acyl-CoA to carnitine, giving long-chain
  acylcarnitine + CoA. The carnitine/acylcarnitine translocase SLC25A20 (CACT), an
  SLC25 carrier of the INNER membrane, then antiports acylcarnitine into the matrix
  in exchange for free carnitine. Finally carnitine palmitoyltransferase 2 (CPT2),
  on the matrix face of the inner membrane, reverses the CPT1 reaction —
  regenerating long-chain acyl-CoA (and releasing carnitine, which CACT recycles
  back out) so that beta-oxidation can proceed. Inherited defects of each component
  cause fatty-acid-oxidation disorders that typically present with hypoketotic
  hypoglycemia, cardiomyopathy/arrhythmia and/or myopathy: SLC22A5 → primary
  (systemic) carnitine deficiency; CPT1A → CPT1A deficiency; SLC25A20 → carnitine-
  acylcarnitine translocase deficiency; CPT2 → CPT2 deficiency (the myopathic form
  is a common cause of exercise-induced rhabdomyolysis).
status: DRAFT
evidence:
  - source_id: GO:0006853
    title: carnitine shuttle
    statement: >-
      The module is grounded in the GO carnitine shuttle biological process
      (GO:0006853); every step is annotated within it and it feeds fatty acid
      beta-oxidation (GO:0006635).
  - source_id: Reactome:R-HSA-200425
    title: Carnitine shuttle
    statement: >-
      Step order and reaction directions follow the human Reactome "Carnitine
      shuttle" pathway (R-HSA-200425): R-HSA-165026 (SLC22A5 uptake), R-HSA-200406
      (CPT1A), R-HSA-200424 (SLC25A20 antiport) and R-HSA-200410 (CPT2).
  - source_id: file:human/SLC22A5/SLC22A5-ai-review.yaml
    title: SLC22A5 gene review (human)
    statement: >-
      The plasma-membrane carnitine-uptake step (UniProtKB:O76082, GO:0015226
      carnitine transmembrane transporter activity) matches the completed human
      SLC22A5/OCTN2 review.
  - source_id: file:human/CPT1A/CPT1A-ai-review.yaml
    title: CPT1A gene review (human)
    statement: >-
      The CPT1 step grounding (UniProtKB:P50416, GO:0004095 carnitine
      O-palmitoyltransferase activity, mitochondrial outer membrane) matches the
      completed human CPT1A review.
  - source_id: file:human/SLC25A20/SLC25A20-ai-review.yaml
    title: SLC25A20 gene review (human)
    statement: >-
      The carnitine/acylcarnitine translocase step (UniProtKB:O43772, GO:0015227
      O-acyl-L-carnitine transmembrane transporter activity, inner membrane)
      matches the completed human SLC25A20 review.
  - source_id: file:human/CPT2/CPT2-ai-review.yaml
    title: CPT2 gene review (human)
    statement: >-
      The CPT2 step grounding (UniProtKB:P23786, GO:0004095 carnitine
      O-palmitoyltransferase activity, inner membrane) matches the completed human
      CPT2 review.
module:
  id: carnitine_shuttle
  label: Carnitine shuttle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: carnitine shuttle
      term:
        id: GO:0006853
        label: carnitine shuttle
      description: >-
        Carnitine-dependent import of long-chain fatty acids across the
        mitochondrial membranes for beta-oxidation.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Location of the SLC22A5 cellular carnitine-uptake step.
      - preferred_term: mitochondrial outer membrane
        term:
          id: GO:0005741
          label: mitochondrial outer membrane
        description: Location of CPT1A.
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: Location of the SLC25A20 translocase and CPT2.
  parts:
    - order: 1
      role: cellular carnitine uptake (supplies the carnitine pool)
      node:
        id: slc22a5_step
        label: L-carnitine import across the plasma membrane (Na+-dependent)
        module_type: TRANSPORT_STEP
        annotons:
          - id: slc22a5_activity
            label: "SLC22A5/OCTN2: Na+-dependent carnitine transporter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Solute carrier family 22 (organic cation/carnitine transporter, OCTN) (SLC22A5)
                term:
                  id: PANTHER:PTHR24064
                  label: SOLUTE CARRIER FAMILY 22 MEMBER
                representative_members:
                  - preferred_term: SLC22A5 / OCTN2 (human)
                    term:
                      id: UniProtKB:O76082
                      label: Organic cation/carnitine transporter 2
            function:
              preferred_term: carnitine transmembrane transporter activity
              term:
                id: GO:0015226
                label: carnitine transmembrane transporter activity
              substrates:
                - preferred_term: L-carnitine (extracellular)
                - preferred_term: sodium ion (cotransported)
              products:
                - preferred_term: L-carnitine (cytosol)
              evidence:
                - source_id: Reactome:R-HSA-165026
                  statement: "OCTN2 / SLC22A5 transports CAR from extracellular space to cytosol (human Reactome reaction)"
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              High-affinity, sodium-dependent plasma-membrane carnitine importer
              (also polyspecific for organic cations); supplies the cellular
              carnitine used by the shuttle and mediates renal carnitine
              reabsorption. Deficiency causes primary (systemic) carnitine deficiency.
    - order: 2
      role: committed, rate-limiting acyl transfer to carnitine (outer membrane)
      node:
        id: cpt1_step
        label: long-chain acyl-CoA + L-carnitine to long-chain acylcarnitine + CoA
        module_type: REACTION
        annotons:
          - id: cpt1a_activity
            label: "CPT1A: carnitine palmitoyltransferase 1 (liver)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Carnitine O-acyltransferase family (CPT1/CPT2/CRAT/CROT)
                term:
                  id: PANTHER:PTHR22589
                  label: CARNITINE O-ACYLTRANSFERASE
                representative_members:
                  - preferred_term: CPT1A (human, liver isoform)
                    term:
                      id: UniProtKB:P50416
                      label: Carnitine O-palmitoyltransferase 1, liver isoform
            function:
              preferred_term: carnitine O-palmitoyltransferase activity
              term:
                id: GO:0004095
                label: carnitine O-palmitoyltransferase activity
              substrates:
                - preferred_term: long-chain acyl-CoA
                - preferred_term: L-carnitine
              products:
                - preferred_term: long-chain O-acylcarnitine
                - preferred_term: coenzyme A
              evidence:
                - source_id: EC:2.3.1.21
                  statement: carnitine O-palmitoyltransferase
                - source_id: Reactome:R-HSA-200406
                  statement: "CPT1A transfers PALM to CAR (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial outer membrane
                term:
                  id: GO:0005741
                  label: mitochondrial outer membrane
            role_description: >-
              Committed, rate-limiting step of long-chain fatty-acid oxidation,
              allosterically inhibited by malonyl-CoA (linking to lipogenesis).
              Converts acyl-CoA to acylcarnitine on the outer membrane. Deficiency
              causes CPT1A deficiency (hypoketotic hypoglycemia). Muscle/brain use
              the CPT1B/CPT1C isoforms.
    - order: 3
      role: acylcarnitine/carnitine antiport across the inner membrane
      node:
        id: slc25a20_step
        label: acylcarnitine (cytosolic) / carnitine (matrix) antiport
        module_type: TRANSPORT_STEP
        annotons:
          - id: slc25a20_activity
            label: "SLC25A20/CACT: carnitine-acylcarnitine translocase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial carnitine/acylcarnitine carrier family (SLC25A20)
                term:
                  id: PANTHER:PTHR45624
                  label: MITOCHONDRIAL BASIC AMINO ACIDS TRANSPORTER-RELATED
                representative_members:
                  - preferred_term: SLC25A20 / CACT (human)
                    term:
                      id: UniProtKB:O43772
                      label: Mitochondrial carnitine/acylcarnitine carrier protein
            function:
              preferred_term: O-acyl-L-carnitine transmembrane transporter activity
              term:
                id: GO:0015227
                label: O-acyl-L-carnitine transmembrane transporter activity
              substrates:
                - preferred_term: long-chain acylcarnitine (intermembrane space)
                - preferred_term: L-carnitine (matrix)
              products:
                - preferred_term: long-chain acylcarnitine (matrix)
                - preferred_term: L-carnitine (intermembrane space)
              evidence:
                - source_id: Reactome:R-HSA-200424
                  statement: "Exchange of acylcarnitine and carnitine across the inner mitochondrial membrane (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Inner-membrane antiporter that imports acylcarnitine into the matrix
              in exchange for exporting the free carnitine released by CPT2, coupling
              the two CPT reactions. Deficiency causes carnitine-acylcarnitine
              translocase deficiency (severe neonatal FAO disorder).
    - order: 4
      role: regeneration of matrix acyl-CoA (completes the shuttle)
      node:
        id: cpt2_step
        label: long-chain acylcarnitine + CoA to long-chain acyl-CoA + L-carnitine
        module_type: REACTION
        annotons:
          - id: cpt2_activity
            label: "CPT2: carnitine palmitoyltransferase 2"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Carnitine O-acyltransferase family (CPT1/CPT2/CRAT/CROT)
                term:
                  id: PANTHER:PTHR22589
                  label: CARNITINE O-ACYLTRANSFERASE
                representative_members:
                  - preferred_term: CPT2 (human)
                    term:
                      id: UniProtKB:P23786
                      label: Carnitine O-palmitoyltransferase 2, mitochondrial
            function:
              preferred_term: carnitine O-palmitoyltransferase activity
              term:
                id: GO:0004095
                label: carnitine O-palmitoyltransferase activity
              substrates:
                - preferred_term: long-chain O-acylcarnitine (matrix)
                - preferred_term: coenzyme A
              products:
                - preferred_term: long-chain acyl-CoA
                - preferred_term: L-carnitine
              evidence:
                - source_id: EC:2.3.1.21
                  statement: carnitine O-palmitoyltransferase
                - source_id: Reactome:R-HSA-200410
                  statement: "CPT2 converts acylcarnitine to acyl-CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Matrix-facing inner-membrane transferase that reverses the CPT1
              reaction, regenerating long-chain acyl-CoA for beta-oxidation and
              releasing carnitine for recycling by SLC25A20. Deficiency causes CPT2
              deficiency (myopathic form: exercise-induced rhabdomyolysis).
  connections:
    - source: slc22a5_step
      target: cpt1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        SLC22A5 supplies the cytosolic L-carnitine that CPT1 uses to acylate
        long-chain acyl-CoA.
    - source: cpt1_step
      target: slc25a20_step
      connection_type: PROVIDES_INPUT_FOR
      description: Acylcarnitine made by CPT1 is imported into the matrix by SLC25A20.
    - source: slc25a20_step
      target: cpt2_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Matrix acylcarnitine delivered by SLC25A20 is converted back to acyl-CoA by
        CPT2.
    - source: cpt2_step
      target: slc25a20_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Free carnitine released by CPT2 is exported by SLC25A20 (the antiport
        counter-substrate), recycling carnitine and closing the shuttle.
  notes: >-
    Four-component carnitine shuttle for mitochondrial long-chain fatty-acid import,
    grounded to the human proteins SLC22A5/OCTN2 (UniProtKB:O76082, GO:0015226),
    CPT1A (P50416, GO:0004095, EC 2.3.1.21), SLC25A20/CACT (O43772, GO:0015227) and
    CPT2 (P23786, GO:0004095, EC 2.3.1.21). GO molecular-function/cellular-component
    terms were taken from the human GOA records; Reactome reaction ids and titles
    were verified against the local reactome cache. Each step uses a PANTHER family
    selector (generic over paralogs and orthologs) plus a concrete human
    representative member; CPT1A and CPT2 both belong to the carnitine
    O-acyltransferase family (PTHR22589), which also includes the tissue-specific
    CPT1B/CPT1C isoforms and the medium/short-chain and peroxisomal carnitine
    acyltransferases CRAT and CROT (not modelled here). Downstream, the regenerated
    matrix long-chain acyl-CoA enters mitochondrial fatty-acid beta-oxidation
    (GO:0006635; see the fatty_acid_beta_oxidation module).
