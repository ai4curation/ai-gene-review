id: MODULE:siderophore_biosynthesis_boundary
title: Siderophore biosynthesis boundary
description: Boundary/partial module for Pseudomonas putida KT2440 siderophore and pyoverdine biosynthesis. It includes the
  ppu00975/ppu01053 precursor and carrier-activation boundary genes plus the PvdL/PvdI/PvdJ/PvdD ferribactin/pyoverdine NRPS
  assembly genes routed out of the translation/RNA-processing bucket.
status: DRAFT
evidence:
- source_id: KEGG:ppu00975
  title: Biosynthesis of various siderophores - Pseudomonas putida KT2440
  statement: KEGG ppu00975 provides the PSEPK curation batch. Its mapped members are pvdH, PP_2800, and pvdY, all interpreted
    as siderophore precursor or tailoring boundary enzymes rather than a complete siderophore pathway.
- source_id: file:projects/P_PUTIDA/batches/ppu00975_siderophore_biosynthesis_boundary.tsv
  title: PSEPK ppu00975 siderophore-biosynthesis batch
  statement: The batch records the three PSEPK members and shows that all have review files, Asta reports, and curated GOA
    decisions.
- source_id: KEGG:ppu01053
  title: Biosynthesis of siderophore group nonribosomal peptides - Pseudomonas putida KT2440
  statement: KEGG ppu01053 adds PP_1183 and PP_2170 as siderophore-group NRPS boundary context. PP_1183 provides EntD-family
    carrier-protein activation support, while PP_2170 remains a chorismate-mutase precursor-context candidate.
- source_id: file:projects/P_PUTIDA/batches/ppu01053_siderophore_biosynthesis_boundary.tsv
  title: PSEPK ppu01053 siderophore-group NRPS batch
  statement: The batch records PP_1183 and PP_2170 as the PSEPK ppu01053 members and tracks their review, Asta, and curation
    status for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_nonribosomal_peptide_synthetase_spillovers.tsv
  title: PSEPK translation/RNA NRPS spillover batch
  statement: The batch records pvdD, pvdJ, pvdI, and pvdL as non-ribosomal peptide synthetase spillovers from the translation/RNA-processing
    bucket and routes them to siderophore biosynthesis context.
- source_id: file:PSEPK/pvdD/pvdD-deep-research-falcon.md
  title: pvdD Falcon pyoverdine NRPS pathway context
  statement: The pvdD pathway report summarizes the canonical PvdL/PvdI/PvdJ/PvdD pyoverdine NRPS assembly line, cytoplasmic
    synthesis, and terminal PvdD context.
module:
  id: siderophore_biosynthesis_boundary
  label: Siderophore biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
  - preferred_term: siderophore biosynthetic process
    term:
      id: GO:0019290
      label: siderophore biosynthetic process
    description: General siderophore-biosynthesis context used for pvdY and the KEGG bucket.
  - preferred_term: pyoverdine biosynthetic process
    term:
      id: GO:0002049
      label: pyoverdine biosynthetic process
    description: Specific PvdH-supported pyoverdine precursor context.
  - preferred_term: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
    term:
      id: GO:0045303
      label: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
    description: Diaminobutyrate aminotransferase chemistry represented by pvdH and predicted for PP_2800.
  - preferred_term: N-acyltransferase activity
    term:
      id: GO:0016410
      label: N-acyltransferase activity
    description: MbtK/IucB-like N-acyltransferase activity represented by pvdY.
  - preferred_term: holo-[acyl-carrier-protein] synthase activity
    term:
      id: GO:0008897
      label: holo-[acyl-carrier-protein] synthase activity
    description: EntD-family 4'-phosphopantetheinyltransferase activity represented by PP_1183.
  - preferred_term: enterobactin biosynthetic process
    term:
      id: GO:0009239
      label: enterobactin biosynthetic process
    description: UniProt/GOA enterobactin or enterochelin siderophore context for PP_1183.
  - preferred_term: chorismate mutase activity
    term:
      id: GO:0004106
      label: chorismate mutase activity
    description: Chorismate-to-prephenate branch chemistry represented by PP_2170.
  - preferred_term: aromatic amino acid family biosynthetic process
    term:
      id: GO:0009073
      label: aromatic amino acid family biosynthetic process
    description: Broader chorismate-branch precursor context for PP_2170.
  - preferred_term: non-ribosomal peptide synthetase activity
    term:
      id: GO:1904091
      label: non-ribosomal peptide synthetase activity
    description: General NRPS activity used for PvdL/PvdI/PvdJ/PvdD assembly subunits.
  - preferred_term: amino acid ligation activity by nonribosomal peptide synthase
    term:
      id: GO:0097429
      label: amino acid ligation activity by nonribosomal peptide synthase
    description: General amino acid ligation activity for pyoverdine NRPS modules.
  - preferred_term: phosphopantetheine-dependent carrier activity
    term:
      id: GO:0140414
      label: phosphopantetheine-dependent carrier activity
    description: Carrier-domain activity for phosphopantetheine-dependent NRPS intermediates.
  parts:
  - order: 1
    role: Siderophore-route boundary
    node:
      id: siderophore_route_boundary
      label: Siderophore-route boundary
      module_type: METABOLIC_PATHWAY
      description: The PSEPK ppu00975 membership captures selected precursor/tailoring enzymes, but it lacks the complete
        pyoverdine NRPS assembly system and downstream maturation/export context. Treat this KEGG bucket as a boundary module
        rather than a satisfiable full siderophore pathway.
      annotons: []
  - order: 2
    role: Diaminobutyrate precursor aminotransferases
    node:
      id: diaminobutyrate_precursor_aminotransferases
      label: Diaminobutyrate precursor aminotransferases
      module_type: REACTION
      description: pvdH is the more strongly resolved L-2,4-diaminobutyrate aminotransferase linked to pyoverdine precursor
        biosynthesis. PP_2800 is a second predicted diaminobutyrate aminotransferase-family enzyme retained as pathway-boundary
        context until its physiological substrate and route placement are resolved.
      annotons:
      - id: pvdH_diaminobutyrate_transaminase
        label: 'pvdH: L-2,4-diaminobutyrate aminotransferase'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdH
        function:
          preferred_term: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
          term:
            id: GO:0045303
            label: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
        processes:
        - preferred_term: pyoverdine biosynthetic process
          term:
            id: GO:0002049
            label: pyoverdine biosynthetic process
        role_description: Supplies L-2,4-diaminobutyrate precursor chemistry for pyoverdine/siderophore biosynthesis.
      - id: PP_2800_predicted_diaminobutyrate_transaminase
        label: 'PP_2800: predicted diaminobutyrate aminotransferase'
        participant:
          selector_type: GENE
          gene:
            preferred_term: PP_2800
        function:
          preferred_term: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
          term:
            id: GO:0045303
            label: L-2,4-diaminobutyrate:2-oxoglutarate transaminase activity
        role_description: Predicted paralog or related class-III aminotransferase; retained as unresolved siderophore/diaminobutyrate
          boundary context.
  - order: 3
    role: MbtK/IucB-like acyltransferase tailoring
    node:
      id: mbtk_iucb_like_acyltransferase_tailoring
      label: MbtK/IucB-like acyltransferase tailoring
      module_type: REACTION
      description: pvdY is annotated as a hydroxyproline acetylase and MbtK/IucB-like N-acyltransferase associated with siderophore
        biosynthesis. The first-pass evidence supports a general siderophore-tailoring role, but the direct acyl acceptor
        and donor specificity remain open.
      annotons:
      - id: pvdY_siderophore_acyltransferase
        label: 'pvdY: siderophore-associated N-acyltransferase'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdY
        function:
          preferred_term: N-acyltransferase activity
          term:
            id: GO:0016410
            label: N-acyltransferase activity
        processes:
        - preferred_term: siderophore biosynthetic process
          term:
            id: GO:0019290
            label: siderophore biosynthetic process
        role_description: Predicted hydroxyproline acetylase/MbtK-IucB-like tailoring enzyme in siderophore biosynthesis.
  - order: 4
    role: Carrier-protein phosphopantetheinylation
    node:
      id: carrier_protein_phosphopantetheinylation
      label: Carrier-protein phosphopantetheinylation
      module_type: REACTION
      description: PP_1183 is an EntD-family phosphopantetheinyltransferase that activates apo aryl- and peptidyl-carrier
        protein domains. This is plausible siderophore NRPS support chemistry, but it is not itself a complete siderophore
        assembly pathway.
      annotons:
      - id: PP_1183_entd_phosphopantetheinyltransferase
        label: 'PP_1183: EntD-family phosphopantetheinyltransferase'
        participant:
          selector_type: GENE
          gene:
            preferred_term: PP_1183
        function:
          preferred_term: holo-[acyl-carrier-protein] synthase activity
          term:
            id: GO:0008897
            label: holo-[acyl-carrier-protein] synthase activity
        processes:
        - preferred_term: siderophore metabolic process
          term:
            id: GO:0009237
            label: siderophore metabolic process
        - preferred_term: enterobactin biosynthetic process
          term:
            id: GO:0009239
            label: enterobactin biosynthetic process
        role_description: EntD-family 4'-phosphopantetheinyltransferase that activates siderophore carrier-protein domains.
  - order: 5
    role: Chorismate precursor boundary node
    node:
      id: chorismate_precursor_boundary_node
      label: Chorismate precursor boundary node
      module_type: REACTION
      description: PP_2170 is a predicted chorismate mutase. Its KEGG ppu01053 placement may reflect siderophore-group aryl-acid
        precursor context, but the direct evidence currently supports chorismate/aromatic-amino-acid metabolism rather than
        salicylic acid or a complete NRPS siderophore route.
      annotons:
      - id: PP_2170_chorismate_mutase_boundary
        label: 'PP_2170: chorismate mutase boundary context'
        participant:
          selector_type: GENE
          gene:
            preferred_term: PP_2170
        function:
          preferred_term: chorismate mutase activity
          term:
            id: GO:0004106
            label: chorismate mutase activity
        processes:
        - preferred_term: aromatic amino acid family biosynthetic process
          term:
            id: GO:0009073
            label: aromatic amino acid family biosynthetic process
        role_description: Predicted chorismate mutase retained as precursor/boundary context for ppu01053 pending direct siderophore
          evidence.
  - order: 6
    role: Pyoverdine/ferribactin NRPS assembly
    node:
      id: pyoverdine_ferribactin_nrps_assembly
      label: Pyoverdine/ferribactin NRPS assembly
      module_type: BIOLOGICAL_PROCESS
      description: PvdL, PvdI, PvdJ, and PvdD are the large NRPS assembly-line proteins for the ferribactin/pyoverdine precursor.
        KT2440-specific residue assignments remain unresolved, but product identity, domain architecture, and Pseudomonas
        pyoverdine pathway evidence support routing these genes to pyoverdine/siderophore biosynthesis rather than translation.
      annotons:
      - id: pvdl_pyoverdine_nrps
        label: 'pvdL: pyoverdine/ferribactin NRPS subunit'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdL
        function:
          preferred_term: non-ribosomal peptide synthetase activity
          term:
            id: GO:1904091
            label: non-ribosomal peptide synthetase activity
        processes:
        - preferred_term: pyoverdine biosynthetic process
          term:
            id: GO:0002049
            label: pyoverdine biosynthetic process
        - preferred_term: siderophore biosynthetic process
          term:
            id: GO:0019290
            label: siderophore biosynthetic process
        role_description: Initiation/early ferribactin NRPS subunit with multiple A/C/PCP modules and FAAL/FAAC-like starter-unit
          context.
      - id: pvdi_pyoverdine_nrps
        label: 'pvdI: pyoverdine/ferribactin NRPS subunit'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdI
        function:
          preferred_term: non-ribosomal peptide synthetase activity
          term:
            id: GO:1904091
            label: non-ribosomal peptide synthetase activity
        processes:
        - preferred_term: pyoverdine biosynthetic process
          term:
            id: GO:0002049
            label: pyoverdine biosynthetic process
        - preferred_term: siderophore biosynthetic process
          term:
            id: GO:0019290
            label: siderophore biosynthetic process
        role_description: Ferribactin/pyoverdine NRPS subunit with repeated A/C/PCP modules for internal peptide assembly.
        locations:
        - preferred_term: cytosol
          term:
            id: GO:0005829
            label: cytosol
      - id: pvdj_pyoverdine_nrps
        label: 'pvdJ: pyoverdine/ferribactin NRPS subunit'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdJ
        function:
          preferred_term: non-ribosomal peptide synthetase activity
          term:
            id: GO:1904091
            label: non-ribosomal peptide synthetase activity
        processes:
        - preferred_term: pyoverdine biosynthetic process
          term:
            id: GO:0002049
            label: pyoverdine biosynthetic process
        - preferred_term: siderophore biosynthetic process
          term:
            id: GO:0019290
            label: siderophore biosynthetic process
        role_description: Ferribactin/pyoverdine NRPS subunit with repeated A/C/PCP modules for later peptide assembly.
      - id: pvdd_pyoverdine_nrps
        label: 'pvdD: pyoverdine/ferribactin NRPS subunit'
        participant:
          selector_type: GENE
          gene:
            preferred_term: pvdD
        function:
          preferred_term: non-ribosomal peptide synthetase activity
          term:
            id: GO:1904091
            label: non-ribosomal peptide synthetase activity
        processes:
        - preferred_term: pyoverdine biosynthetic process
          term:
            id: GO:0002049
            label: pyoverdine biosynthetic process
        - preferred_term: siderophore biosynthetic process
          term:
            id: GO:0019290
            label: siderophore biosynthetic process
        role_description: Terminal pyoverdine NRPS subunit; existing review supports cytosolic assembly and terminal thioesterase
          context.
        locations:
        - preferred_term: cytosol
          term:
            id: GO:0005829
            label: cytosol
  notes: This module is deliberately scoped as a boundary/partial siderophore module. The ppu00975/ppu01053 members cover
    precursor, tailoring, carrier-activation, and chorismate-boundary chemistry; the added PvdL/PvdI/PvdJ/PvdD node records
    the main ferribactin/pyoverdine NRPS assembly machinery that was misrouted to translation/RNA processing by the string
    'non-ribosomal'. Exact KT2440 module substrate assignments remain open.
