id: MODULE:quorum_sensing_boundary
title: Quorum-sensing umbrella boundary
description: >-
  Umbrella boundary module for KEGG ppu02024 in Pseudomonas putida KT2440. The
  PSEPK primary set is not a single LuxI/LuxR quorum-sensing pathway; it is a
  mixed map dominated by ABC importers, transport and efflux components,
  QseBC-like two-component regulators, iron regulation, surface adhesion, and
  other side contexts. This parent module records the partition and prevents
  broad quorum-sensing claims from being propagated to all 60 primary members.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02024
    title: Quorum sensing - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02024 supplies the PSEPK quorum-sensing umbrella map used for
      this boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu02024_quorum_sensing_boundary.tsv
    title: PSEPK ppu02024 quorum-sensing batch
    statement: >-
      The original primary-only batch table records 60 selected PSEPK members;
      it is retained as the pathway input table, although its status columns
      can lag the partition table.
  - source_id: file:projects/P_PUTIDA/batches/ppu02024_quorum_sensing_partition.tsv
    title: PSEPK ppu02024 quorum-sensing partition table
    statement: >-
      The current partition table records all 60 primary members as present,
      curated, and Asta-backed, separated into nine curation-scale buckets.
  - source_id: file:projects/P_PUTIDA/batches/ppu02024_quorum_sensing_partition.md
    title: PSEPK ppu02024 quorum-sensing partition report
    statement: >-
      The partition report records completed sub-batches and the decision not
      to curate ppu02024 as one satisfiable quorum-sensing module.
module:
  id: quorum_sensing_boundary
  label: Quorum-sensing umbrella boundary
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: quorum sensing
      term:
        id: GO:0009372
        label: quorum sensing
      description: Broad pathway label for the KEGG umbrella map.
    - preferred_term: ABC-type transporter activity
      term:
        id: GO:0140359
        label: ABC-type transporter activity
      description: Transporter component class that dominates the PSEPK ppu02024 map.
    - preferred_term: transmembrane transport
      term:
        id: GO:0055085
        label: transmembrane transport
      description: Transport process shared by polyamine, amino-acid, phosphonate, peptide, and efflux buckets.
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: QseBC-like two-component regulatory context in the partition.
    - preferred_term: regulation of DNA-templated transcription
      term:
        id: GO:0006355
        label: regulation of DNA-templated transcription
      description: Regulatory output for Fur and QseBC-like response regulators.
    - preferred_term: cell adhesion
      term:
        id: GO:0007155
        label: cell adhesion
      description: Surface-adhesion singleton side context.
    - preferred_term: efflux transmembrane transporter activity
      term:
        id: GO:0015562
        label: efflux transmembrane transporter activity
      description: RND multidrug-efflux side context.
  parts:
    - order: 1
      role: Umbrella-map boundary
      node:
        id: ppu02024_umbrella_boundary
        label: ppu02024 umbrella boundary
        module_type: SIGNALING_PATHWAY
        description: >-
          ppu02024 should be treated as a partitioned KEGG umbrella map. The
          partition has no direct LuxI/LuxR quorum-signal synthesis/reception
          core for PSEPK in this first pass.
        annotons: []
    - order: 2
      role: Transport-dominated buckets
      node:
        id: ppu02024_transport_bucket_index
        label: Transport bucket index
        module_type: TRANSPORT_STEP
        description: >-
          Polyamine import uses `polyamine_transport_boundary`; branched-chain
          amino-acid import uses `branched_chain_amino_acid_abc_import_boundary`;
          phosphonate/AEP import uses `phosphonate_phosphinate_metabolism`; and
          peptide/opine/glutathione import uses
          `peptide_opine_glutathione_abc_import_boundary`.
        annotons: []
    - order: 3
      role: Regulatory side buckets
      node:
        id: ppu02024_regulatory_bucket_index
        label: Regulatory bucket index
        module_type: REGULATORY_STEP
        description: >-
          QseBC-like two-component regulation uses
          `qsebc_like_two_component_regulation_boundary`; Fur/iron regulation
          uses `iron_homeostasis_regulation_boundary`.
        annotons: []
    - order: 4
      role: Efflux and membrane-transporter side buckets
      node:
        id: ppu02024_efflux_membrane_side_index
        label: Efflux and membrane-transporter side index
        module_type: TRANSPORT_STEP
        description: >-
          RND multidrug efflux uses `rnd_multidrug_efflux_boundary`, and the
          DMT/YdcZ-family singleton uses `dmt_transporter_boundary`.
        annotons: []
    - order: 5
      role: Surface adhesion side bucket
      node:
        id: ppu02024_surface_adhesion_index
        label: Surface adhesion side index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The large BapA/Bap-like PP_0806 surface-adhesion singleton is tracked
          under `surface_adhesion_boundary`, not as a direct quorum-signal
          synthesis or reception component.
        annotons: []
  notes: >-
    This parent module records pathway satisfiability for ppu02024. The
    partition table is the current 60/60 curation status source; the original
    boundary table and candidate table can lag because the work was completed
    through sub-batches. Use the submodules for gene-level biological claims.
