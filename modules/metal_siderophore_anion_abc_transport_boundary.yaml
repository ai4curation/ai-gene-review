id: MODULE:metal_siderophore_anion_abc_transport_boundary
title: Metal, siderophore, and anion ABC transport boundary
description: Boundary module for PSEPK ABC importer components associated with iron, ferric siderophores, heme/hemin, phosphate,
  and generic metal substrates.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_metal_siderophore_anion_abc_transporters.tsv
  title: PSEPK transport/membrane/efflux metal/siderophore/anion ABC transporter batch
  statement: The partition groups 11 ATPase, permease, and substrate-binding components for first-pass metal/siderophore/anion
    ABC importer curation.
notes: 'First-pass interpretation: keep ATPase, permease, and substrate-binding roles component-level. Ferric-siderophore
  import is retained only for ferric-siderophore/FatD permeases; iron/heme/generic metal components are broadened where needed.'
