        module_type: REGULATORY_STEP
        description: >-
          Mating pheromone activates the GPCR Ste2/Ste3; the freed G-protein
          beta-gamma dimer recruits Ste20 (PAK) and the Ste5 scaffold to
          activate the MAP3K Ste11.
        annotons:
