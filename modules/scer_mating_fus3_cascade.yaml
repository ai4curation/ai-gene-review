id: MODULE:scer_mating_fus3_cascade
title: Budding yeast (S. cerevisiae) pheromone-response (Ste11-Ste7-Fus3) MAPK cascade module
description: >-
  A decomposition of the Saccharomyces cerevisiae pheromone-response (mating)
  MAP kinase cascade, the fungal realization of the generic three-tier MAP
  kinase relay (MODULE:mapk_relay). Mating pheromone (a-factor or alpha-factor)
  activates a G-protein-coupled receptor (Ste2/Ste3); the released G-protein
  beta-gamma dimer and the PAK kinase Ste20, organized on the scaffold Ste5,
  activate the MAP3K Ste11, which phosphorylates the MAP2K Ste7, which dually
  phosphorylates the MAPK Fus3 (and the partially redundant Kss1) on its TEY
  activation-loop motif. Active Fus3 phosphorylates the transcription factor
  Ste12 and the cell-cycle inhibitor Far1, driving the mating transcriptional
  program, G1 arrest, and polarized shmoo formation for conjugation. The kinase
  relay - Ste11 -> Ste7 -> Fus3 - is declared as an inner bundle that
  `conforms_to` mapk_relay, while the pheromone/GPCR input and the Ste12/Far1
  output are this cascade's free extensions around the conforming core. Grounded
  in GO:0000750 (pheromone-dependent signal transduction involved in conjugation
  with cellular fusion).
status: DRAFT
evidence:
  - source_id: GO:0000750
    title: pheromone-dependent signal transduction involved in conjugation with cellular fusion
    statement: >-
      The module is grounded in the GO biological process term for the yeast
      pheromone-response signaling pathway that drives mating.
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The relay tier conforms to the generic three-tier MAPK cascade motif
      (MODULE:mapk_relay).
notes: >-
  This module is the Saccharomyces cerevisiae mating-pathway realization of the
  generic three-tier MAP kinase relay (MODULE:mapk_relay): the inner `fus3_relay`
  node bundles the Ste11 -> Ste7 -> Fus3 tiers and declares conformance to that
  motif, while the pheromone/GPCR input and the downstream Ste12/Far1 output are
  this cascade's free extensions around the conforming core. The cascade is
  organized on the Ste5 scaffold. Representative UniProt members (Ste11 P23561,
  Ste7 P06784, Fus3 P16892, Kss1 P14681) were verified against UniProt.
module:
