        term:
          id: NCBITaxon:4932
          label: Saccharomyces cerevisiae
        description: >-
          The pheromone-response cascade is a budding-yeast (S. cerevisiae)
          pathway; the three-tier relay is conserved with the metazoan MAPK
          cascades, but the ortholog set (Ste11/Ste7/Fus3) is S. cerevisiae
          specific.
    cellular_components:
