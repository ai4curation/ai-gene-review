            label: pheromone-response MAP3K input
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: pheromone-dependent signal transduction involved in conjugation with cellular fusion
                term:
                  id: GO:0000750
                  label: pheromone-dependent signal transduction involved in conjugation with cellular fusion
            role_description: Couples pheromone/GPCR signaling to the Fus3 relay.
    - order: 2
