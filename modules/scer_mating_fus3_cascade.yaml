          relay is assembled on the Ste5 scaffold.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              Ste11 -> Ste7 -> Fus3 fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
