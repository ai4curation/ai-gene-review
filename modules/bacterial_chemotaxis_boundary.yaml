id: MODULE:bacterial_chemotaxis_boundary
title: Bacterial chemotaxis boundary
description: >-
  Umbrella boundary module for KEGG ppu02030 in Pseudomonas putida KT2440. The
  organism-specific chemotaxis map combines core Che phosphorelay signaling,
  named methyl-accepting chemotaxis receptor inputs, orphan MCP and aerotaxis
  receptor candidates, adaptation/accessory proteins, and periplasmic
  binding-protein transport spillovers. This module indexes those subroutes and
  should not be curated as one undifferentiated chemotaxis pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02030 provides the PSEPK bacterial-chemotaxis umbrella map. Its
      primary set includes receptor panels, Che signal-transduction proteins,
      adaptation/accessory proteins, and transport-binding spillovers.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.tsv
    title: PSEPK ppu02030 bacterial chemotaxis partition table
    statement: >-
      The partition separates the 41 primary genes into named receptor, orphan
      MCP/aerotaxis receptor, transport-spillover, core Che cluster, and
      adaptation/accessory buckets.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.md
    title: PSEPK ppu02030 bacterial chemotaxis partition
    statement: >-
      The partition report records completed first-pass sub-batches for core
      Che signaling, adaptation/accessory proteins, named receptors, and orphan
      MCP/aerotaxis receptors.
module:
  id: bacterial_chemotaxis_boundary
  label: Bacterial chemotaxis boundary
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: chemotaxis
      term:
        id: GO:0006935
        label: chemotaxis
      description: Directed movement in response to chemical stimuli.
    - preferred_term: transmembrane signaling receptor activity
      term:
        id: GO:0004888
        label: transmembrane signaling receptor activity
      description: MCP receptor input into chemotaxis signaling.
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: CheA/CheY/CheB-family histidine-to-aspartate signaling.
    - preferred_term: protein histidine kinase activity
      term:
        id: GO:0004673
        label: protein histidine kinase activity
      description: CheA autophosphorylation and phosphotransfer activity.
    - preferred_term: regulation of chemotaxis
      term:
        id: GO:0050920
        label: regulation of chemotaxis
      description: Adaptation and output-reset control of chemotaxis.
    - preferred_term: protein-glutamate methylesterase activity
      term:
        id: GO:0008984
        label: protein-glutamate methylesterase activity
      description: CheB-family receptor-demethylation chemistry.
  parts:
    - order: 1
      role: Umbrella chemotaxis boundary
      node:
        id: chemotaxis_umbrella_boundary
        label: Bacterial chemotaxis umbrella boundary
        module_type: SIGNALING_PATHWAY
        description: >-
          ppu02030 is an umbrella map for receptor input, core Che signaling,
          adaptation, and transport-spillover contexts. Curate it through the
          component submodules below rather than as a single pathway.
        annotons: []
    - order: 2
      role: Core Che phosphorelay signaling
      node:
        id: core_che_signaling_index
        label: Core Che signaling index
        module_type: SIGNALING_PATHWAY
        description: >-
          Core Che signaling is represented by
          `bacterial_chemotaxis_core_boundary`, including CheW-like adaptors,
          CheA, CheY, CheZ, and CheB1.
        annotons: []
    - order: 3
      role: Named MCP receptor panel
      node:
        id: named_mcp_receptor_panel_index
        label: Named MCP receptor panel index
        module_type: SIGNALING_PATHWAY
        description: >-
          Characterized and named methyl-accepting chemotaxis receptors are
          represented by `chemotaxis_receptor_panel_boundary`; each receptor
          contributes ligand-specific input to the shared Che pathway.
        annotons: []
    - order: 4
      role: Orphan MCP and aerotaxis receptor candidates
      node:
        id: orphan_mcp_aerotaxis_index
        label: Orphan MCP and aerotaxis receptor index
        module_type: SIGNALING_PATHWAY
        description: >-
          Generic MCP and aerotaxis receptor candidates are represented by
          `orphan_mcp_aerotaxis_receptors_boundary`. Ligand specificity remains
          unresolved for many members.
        annotons: []
    - order: 5
      role: Chemotaxis adaptation and accessory proteins
      node:
        id: chemotaxis_adaptation_accessory_index
        label: Chemotaxis adaptation/accessory index
        module_type: SIGNALING_PATHWAY
        description: >-
          CheV-like proteins, CheR/CheB-like adaptation proteins, and compact
          CheY-like or membrane accessory candidates are represented by
          `chemotaxis_adaptation_accessory_boundary`.
        annotons: []
    - order: 6
      role: Transport-binding spillovers
      node:
        id: transport_binding_spillover_index
        label: Transport-binding spillover index
        module_type: TRANSPORT_STEP
        description: >-
          Dipeptide, ribose, and sugar-binding proteins mapped by KEGG ppu02030
          are retained with transport modules unless direct receptor-level
          chemotaxis evidence is selected.
        annotons: []
  notes: >-
    This parent module is a chemotaxis boundary index over completed
    curation-scale submodules. It prevents transport spillovers and unresolved
    receptor candidates from being over-annotated as one generic bacterial
    chemotaxis pathway.
