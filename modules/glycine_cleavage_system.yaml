id: MODULE:glycine_cleavage_system
title: Glycine cleavage system (glycine decarboxylase complex) — nonketotic hyperglycinemia
description: >-
  The glycine cleavage system (GCS, glycine decarboxylase complex) is the mitochondrial
  multienzyme system that carries out the major route of glycine catabolism, degrading
  glycine to CO2 and ammonia while transferring a one-carbon (methylene) unit to
  tetrahydrofolate — thereby coupling glycine breakdown to folate/one-carbon metabolism.
  It comprises four components acting on a lipoyl-swinging-arm relay: the P-protein
  (GLDC, glycine decarboxylase) is a pyridoxal-5'-phosphate enzyme that decarboxylates
  glycine and transfers the residual aminomethyl group to the lipoic-acid arm of the
  H-protein (GCSH), a small non-catalytic lipoylated carrier; the T-protein (AMT,
  aminomethyltransferase) then releases ammonia from the aminomethyl-dihydrolipoyl
  H-protein and transfers the methylene carbon to tetrahydrofolate, forming
  5,10-methylenetetrahydrofolate; and the L-protein (DLD, dihydrolipoyl dehydrogenase —
  the same flavoenzyme shared with the pyruvate, 2-oxoglutarate and branched-chain
  2-oxoacid dehydrogenase complexes) reoxidises the H-protein dihydrolipoyl group,
  reducing NAD+ to NADH and regenerating the oxidised lipoyl arm. Inherited deficiency
  causes nonketotic hyperglycinemia (glycine encephalopathy) — neonatal seizures,
  encephalopathy and a raised CSF:plasma glycine ratio: most cases are due to GLDC
  (~80%), fewer to AMT (~20%), and GCSH deficiency is rare.
status: DRAFT
evidence:
  - source_id: GO:0019464
    title: glycine decarboxylation via glycine cleavage system
    statement: >-
      The module is grounded in glycine decarboxylation via the glycine cleavage system
      (GO:0019464), assembled as the glycine cleavage complex (GO:0005960).
  - source_id: Reactome:R-HSA-6783984
    title: Glycine degradation
    statement: >-
      Reactions follow the human Reactome "Glycine degradation" pathway (R-HSA-6783984):
      R-HSA-5693967 (GLDC), R-HSA-5693977 (AMT) and R-HSA-5694018 (DLD reoxidises the
      H-protein).
  - source_id: file:human/GLDC/GLDC-ai-review.yaml
    title: GLDC gene review (human)
    statement: >-
      The P-protein glycine-decarboxylase step (UniProtKB:P23378, GO:0004375) matches
      the completed human GLDC review.
  - source_id: file:human/GCSH/GCSH-ai-review.yaml
    title: GCSH gene review (human)
    statement: >-
      The H-protein lipoyl-carrier (UniProtKB:P23434, GO:0031405) matches the completed
      human GCSH review.
  - source_id: file:human/AMT/AMT-ai-review.yaml
    title: AMT gene review (human)
    statement: >-
      The T-protein aminomethyltransferase step (UniProtKB:P48728, GO:0004047) matches
      the completed human AMT review.
  - source_id: file:human/DLD/DLD-ai-review.yaml
    title: DLD gene review (human)
    statement: >-
      The L-protein dihydrolipoyl-dehydrogenase step (UniProtKB:P09622, GO:0004148)
      matches the completed human DLD review (the shared E3 flavoenzyme).
