  notes: >-
    The mitochondrial glycine cleavage system modelled as a PROTEIN_COMPLEX with its four
    components grounded to the human proteins GLDC (P-protein, UniProtKB:P23378, GO:0004375,
    EC 1.4.4.2), GCSH (H-protein, P23434, GO:0031405 lipoic acid binding), AMT (T-protein,
    P48728, GO:0004047, EC 2.1.2.10) and DLD (L-protein, P09622, GO:0004148, EC 1.8.1.4). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids and
    titles were verified against the local reactome cache. Each subunit annoton uses a PANTHER
    family selector with the human protein as representative. The H-protein (GCSH) is a
    non-catalytic lipoylated carrier, so its annoton uses lipoic acid binding (GO:0031405)
    rather than a catalytic MF. The L-protein DLD is the shared dihydrolipoyl dehydrogenase (E3)
    common to the pyruvate (pyruvate_metabolism), 2-oxoglutarate (TCA) and branched-chain
    2-oxoacid (branched_chain_amino_acid_catabolism) dehydrogenase complexes, reviewed previously
    and cross-linked here. Reaction cycle: GLDC decarboxylates glycine and loads the aminomethyl
    onto the GCSH lipoyl arm; AMT releases NH3 and transfers the methylene to tetrahydrofolate
    (-> 5,10-methylene-THF, feeding one-carbon/folate metabolism); DLD reoxidises the H-protein
    lipoate with NAD+ -> NADH. Disorders: nonketotic hyperglycinemia / glycine encephalopathy
    (GLDC ~80%, AMT ~20%, GCSH rare); DLD deficiency additionally affects the other oxoacid
    dehydrogenase complexes.
