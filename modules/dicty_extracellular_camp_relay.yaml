id: MODULE:dicty_extracellular_camp_relay
title: Dictyostelium extracellular cAMP relay / aggregation oscillator
description: >-
  The defining Dictyostelium discoideum aggregation system — a self-organising
  extracellular cAMP oscillator that propagates chemotactic waves so that starving
  amoebae stream together into a mound. Secreted cAMP is detected by the
  seven-transmembrane receptor cAR1 (carA), which couples through the
  heterotrimeric G protein Galpha2 (gpaB); receptor activation recruits the
  PH-domain adaptor CRAC (dagA) that is required to activate the aggregation
  adenylyl cyclase ACA (acaA), which synthesises cAMP. The newly made cAMP is
  secreted and activates cAR1 on neighbouring cells (the RELAY, a positive
  feedback), while the extracellular phosphodiesterase PdsA degrades secreted
  cAMP and the intracellular response-regulator phosphodiesterase RegA degrades
  internal cAMP — the negative feedback / adaptation that lets the system
  oscillate and produce propagating waves rather than saturate. This is the
  extracellular-cAMP CHEMOTACTIC oscillator, distinct from the generic
  intracellular GPCR->cAMP->PKA cassette. OUT OF SCOPE: the downstream PKA-driven
  developmental gene expression (cAMP effector; see the pkaC review and the SDF-2
  relay module), the actin/PI3K chemotaxis motor, and the later adenylyl cyclases
  ACG/ACR. Phrased over functions and family selectors with D. discoideum
  representatives.
status: DRAFT
evidence:
  - source_id: GO:0031152
    title: aggregation involved in sorocarp development
    statement: >-
      The module's biological output is chemotactic aggregation (GO:0031152),
      driven by the relayed cAMP oscillator.
  - source_id: file:DICDI/carA/carA-ai-review.yaml
    title: carA gene review (Dictyostelium discoideum)
    statement: >-
      cAMP receptor cAR1 grounding (UniProtKB:P13773, GO:0001646 cAMP receptor
      activity).
  - source_id: file:DICDI/gpaB/gpaB-ai-review.yaml
    title: gpaB gene review (Dictyostelium discoideum)
    statement: >-
      Galpha2 grounding (UniProtKB:P16051, GO:0003925 G protein activity);
      couples cAR1 to downstream effectors.
  - source_id: file:DICDI/dagA/dagA-ai-review.yaml
    title: dagA gene review (Dictyostelium discoideum)
    statement: >-
      CRAC adaptor grounding (UniProtKB:P35401, GO:0008047 enzyme activator
      activity); required to activate ACA.
  - source_id: file:DICDI/acaA/acaA-ai-review.yaml
    title: acaA gene review (Dictyostelium discoideum)
    statement: >-
      Aggregation adenylyl cyclase ACA grounding (UniProtKB:Q03100, GO:0004016
      adenylate cyclase activity); the cAMP source of the relay.
  - source_id: file:DICDI/pdsA/pdsA-ai-review.yaml
    title: pdsA gene review (Dictyostelium discoideum)
    statement: >-
      Extracellular cAMP phosphodiesterase grounding (UniProtKB:P12019, GO:0004115);
      sharpens/resets the secreted cAMP wave.
  - source_id: file:DICDI/regA/regA-ai-review.yaml
    title: regA gene review (Dictyostelium discoideum)
    statement: >-
      Intracellular cAMP phosphodiesterase grounding (UniProtKB:Q23917, GO:0004115);
      adaptation of the internal cAMP response.
notes: >-
  Dictyostelium-specific extracellular-cAMP chemotactic oscillator grounded to
  cAR1 (P13773, GO:0001646), Galpha2 (P16051, GO:0003925), CRAC (P35401,
  GO:0008047), ACA (Q03100, GO:0004016), PdsA (P12019, GO:0004115) and RegA
  (Q23917, GO:0004115). GO molecular-function terms were taken from the completed
  DICDI reviews; nodes use PANTHER family selectors plus D. discoideum
  representative members. Explicitly named "extracellular_camp_relay" so it does
  not collide with the generic gpcr_camp_pka_signaling module: the discriminating
  feature is that the cAMP ligand is SECRETED and relayed between cells, driving
  chemotactic waves. PKA (the intracellular cAMP effector) is downstream and out
  of scope here.
module:
  id: dicty_extracellular_camp_relay
  label: Extracellular cAMP relay (cAR1/Galpha2 -> CRAC -> ACA -> secreted cAMP; PdsA/RegA reset)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: aggregation involved in sorocarp development
      term:
        id: GO:0031152
        label: aggregation involved in sorocarp development
      description: >-
        Chemotactic streaming of starving cells into a mound, driven by relayed
        cAMP waves.
  parts:
    - order: 1
      role: extracellular cAMP reception
      node:
        id: camp_reception
        label: cAR1 senses secreted cAMP and activates Galpha2
        module_type: REGULATORY_STEP
        annotons:
          - id: car1_activity
            label: "cAR1 (carA): cAMP receptor GPCR"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: cAMP receptor (cAR) GPCR family
                term:
                  id: PANTHER:PTHR23112
                  label: G PROTEIN-COUPLED RECEPTOR
                representative_members:
                  - preferred_term: cAR1 (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P13773
                      label: Cyclic AMP receptor 1
            function:
              preferred_term: cAMP receptor activity
              term:
                id: GO:0001646
                label: cAMP receptor activity
              evidence:
                - source_id: file:DICDI/carA/carA-ai-review.yaml
                  statement: cAR1 is the serpentine receptor for extracellular cAMP
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Seven-transmembrane receptor that binds secreted cAMP and drives
              chemotaxis and the relay; first of the cAR1-4 series.
          - id: galpha2_activity
            label: "Galpha2 (gpaB): heterotrimeric G-protein alpha subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Heterotrimeric G-protein alpha subunit family
                term:
                  id: PANTHER:PTHR10218
                  label: GTP-BINDING PROTEIN ALPHA SUBUNIT
                representative_members:
                  - preferred_term: Galpha2 (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P16051
                      label: Guanine nucleotide-binding protein alpha-2 subunit
            function:
              preferred_term: G protein activity
              term:
                id: GO:0003925
                label: G protein activity
              evidence:
                - source_id: file:DICDI/gpaB/gpaB-ai-review.yaml
                  statement: Galpha2 couples cAR1 to downstream aggregation effectors
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              G-protein alpha subunit that transduces cAR1 activation to the
              adenylyl-cyclase-activation machinery.
    - order: 2
      role: adenylyl cyclase activation (cAMP synthesis)
      node:
        id: aca_activation
        label: CRAC activates ACA to synthesise cAMP
        module_type: REACTION
        annotons:
          - id: crac_activity
            label: "CRAC (dagA): PH-domain activator of ACA"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Tandem-PH-domain CRAC adaptor family
                term:
                  id: PANTHER:PTHR14336
                  label: TANDEM PH DOMAIN CONTAINING PROTEIN
                representative_members:
                  - preferred_term: CRAC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P35401
                      label: Cytosolic regulator of adenylyl cyclase (CRAC)
            function:
              preferred_term: enzyme activator activity
              term:
                id: GO:0008047
                label: enzyme activator activity
              evidence:
                - source_id: file:DICDI/dagA/dagA-ai-review.yaml
                  statement: CRAC translocates to the membrane and is required to activate ACA
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Pleckstrin-homology-domain adaptor that binds PIP3 at the membrane
              and is required for receptor/G-protein activation of ACA.
          - id: aca_activity
            label: "ACA (acaA): aggregation adenylyl cyclase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenylyl cyclase class-4/guanylyl cyclase family (ACA)
                term:
                  id: PANTHER:PTHR45627
                  label: ADENYLATE CYCLASE
                representative_members:
                  - preferred_term: ACA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q03100
                      label: Adenylate cyclase A
            function:
              preferred_term: adenylate cyclase activity
              term:
                id: GO:0004016
                label: adenylate cyclase activity
              substrates:
                - preferred_term: ATP
              products:
                - preferred_term: 3',5'-cyclic AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: file:DICDI/acaA/acaA-ai-review.yaml
                  statement: ACA synthesises the cAMP that is secreted for the relay
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Aggregation-stage adenylyl cyclase that makes the cAMP secreted to
              relay the chemotactic signal to neighbouring cells.
    - order: 3
      role: cAMP degradation and adaptation (oscillator reset)
      node:
        id: camp_degradation
        label: PdsA and RegA degrade extracellular and intracellular cAMP
        module_type: REACTION
        annotons:
          - id: pdsa_activity
            label: "PdsA: extracellular cAMP phosphodiesterase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Extracellular cyclic-nucleotide phosphodiesterase family (PdsA)
                term:
                  id: PANTHER:PTHR28283
                  label: 3',5'-CYCLIC-NUCLEOTIDE PHOSPHODIESTERASE
                representative_members:
                  - preferred_term: PdsA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P12019
                      label: Extracellular cAMP phosphodiesterase PdsA
            function:
              preferred_term: cAMP phosphodiesterase activity
              term:
                id: GO:0004115
                label: 3',5'-cyclic-AMP phosphodiesterase activity
              substrates:
                - preferred_term: 3',5'-cyclic AMP (extracellular)
              products:
                - preferred_term: AMP
              evidence:
                - source_id: file:DICDI/pdsA/pdsA-ai-review.yaml
                  statement: PdsA degrades secreted cAMP to sharpen and reset the wave
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Secreted/cell-surface phosphodiesterase that degrades extracellular
              cAMP between waves, sharpening the chemotactic gradient.
          - id: rega_activity_relay
            label: "RegA: intracellular cAMP phosphodiesterase (adaptation)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Response-regulator cyclic-nucleotide phosphodiesterase family (RegA)
                term:
                  id: PANTHER:PTHR11347
                  label: CYCLIC NUCLEOTIDE PHOSPHODIESTERASE
                representative_members:
                  - preferred_term: RegA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q23917
                      label: Response regulator / cAMP phosphodiesterase RegA
            function:
              preferred_term: cAMP phosphodiesterase activity
              term:
                id: GO:0004115
                label: 3',5'-cyclic-AMP phosphodiesterase activity
              substrates:
                - preferred_term: 3',5'-cyclic AMP (intracellular)
              products:
                - preferred_term: AMP
              evidence:
                - source_id: file:DICDI/regA/regA-ai-review.yaml
                  statement: RegA degrades intracellular cAMP for adaptation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Intracellular cAMP phosphodiesterase providing adaptation so the
              oscillator can reset and fire repetitively.
  connections:
    - source: camp_reception
      target: aca_activation
      connection_type: POSITIVELY_REGULATES
      description: >-
        cAR1/Galpha2 activation recruits CRAC, which is required to activate ACA
        (the receptor-to-cyclase limb).
    - source: aca_activation
      target: camp_reception
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The cAMP synthesised by ACA is secreted and activates cAR1 on neighbouring
        cells — the RELAY / positive-feedback that propagates the wave.
    - source: camp_degradation
      target: camp_reception
      connection_type: NEGATIVELY_REGULATES
      description: >-
        PdsA degrades secreted cAMP, terminating cAR1 stimulation between waves.
    - source: camp_degradation
      target: aca_activation
      connection_type: NEGATIVELY_REGULATES
      description: >-
        RegA degrades intracellular cAMP (adaptation), letting the oscillator
        reset rather than saturate.
