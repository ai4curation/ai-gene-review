id: MODULE:glycerophospholipid_metabolism
title: Glycerophospholipid metabolism
description: >-
  Broad bacterial glycerophospholipid metabolism module for KEGG ppu00564 in
  Pseudomonas putida KT2440. The organism-specific map combines
  phosphatidic-acid and CDP-diacylglycerol precursor chemistry,
  phosphatidylglycerol/cardiolipin, phosphatidylserine/phosphatidylethanolamine,
  phosphatidylcholine, glycerophosphodiester turnover, glycerol-3-phosphate
  supply, and ethanolamine side metabolism. The module treats the lipid
  precursor and membrane-phospholipid enzymes as the pathway core while keeping
  glycerol-3-phosphate and ethanolamine nodes as boundary context unless
  gene-level evidence supports a direct membrane-lipid role.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00564
    title: Glycerophospholipid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00564 provides the PSEPK curation batch. Its membership includes
      Pls/Cls/Pgs/Pgp/Pss/Psd/Pcs lipid enzymes together with GlpD/GpsA,
      UgpQ/PchP, and EutB/EutC side nodes.
module:
  id: glycerophospholipid_metabolism
  label: Glycerophospholipid metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycerophospholipid biosynthetic process
      term:
        id: GO:0046474
        label: glycerophospholipid biosynthetic process
      description: Broad membrane glycerophospholipid biosynthesis context.
    - preferred_term: phospholipid biosynthetic process
      term:
        id: GO:0008654
        label: phospholipid biosynthetic process
      description: General bacterial membrane phospholipid assembly context.
    - preferred_term: CDP-diacylglycerol biosynthetic process
      term:
        id: GO:0016024
        label: CDP-diacylglycerol biosynthetic process
      description: Conversion of phosphatidic acid into the activated CDP-diacylglycerol donor.
    - preferred_term: phosphatidylethanolamine biosynthetic process
      term:
        id: GO:0006646
        label: phosphatidylethanolamine biosynthetic process
      description: Phosphatidylserine decarboxylation branch to phosphatidylethanolamine.
    - preferred_term: glycerophosphodiester phosphodiesterase activity
      term:
        id: GO:0008889
        label: glycerophosphodiester phosphodiesterase activity
      description: Glycerophosphodiester turnover and scavenging context.
  context:
    cellular_components:
      - preferred_term: membrane
        term:
          id: GO:0016020
          label: membrane
        description: Most core glycerophospholipid enzymes in this batch are membrane-associated.
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble precursor, dehydrogenase, or microcompartment-associated side enzymes.
  parts:
    - order: 1
      role: Phosphatidic acid and CDP-diacylglycerol precursor synthesis
      node:
        id: phosphatidic_acid_and_cdp_dag_precursors
        label: Phosphatidic acid and CDP-DAG precursors
        module_type: METABOLIC_PATHWAY
        description: >-
          PlsX/PlsY/PlsB/PlsC and PP_0058 form or elaborate lysophosphatidic
          acid and phosphatidic acid. DgkA paralogs can recycle diacylglycerol
          to phosphatidic acid, and CdsA activates phosphatidic acid as
          CDP-diacylglycerol.
        annotons:
          - id: plsX_phosphate_acyltransferase
            label: "plsX: phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsX
            role_description: Generates acyl-phosphate for PlsY-dependent phospholipid precursor synthesis.
          - id: plsY_glycerol_3_phosphate_acyltransferase
            label: "plsY: glycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsY
            function:
              preferred_term: glycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0004366
                label: glycerol-3-phosphate O-acyltransferase activity
            role_description: Membrane acyltransferase forming lysophosphatidic acid from glycerol-3-phosphate.
          - id: plsB_glycerol_3_phosphate_acyltransferase
            label: "plsB: glycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsB
            function:
              preferred_term: glycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0004366
                label: glycerol-3-phosphate O-acyltransferase activity
            role_description: Alternative glycerol-3-phosphate acyltransferase route to lysophosphatidic acid.
          - id: plsC_1_acylglycerol_3_phosphate_acyltransferase
            label: "plsC: 1-acylglycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsC
            function:
              preferred_term: 1-acylglycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0003841
                label: 1-acylglycerol-3-phosphate O-acyltransferase activity
            role_description: Converts lysophosphatidic acid to phosphatidic acid.
          - id: PP_0058_1_acylglycerol_3_phosphate_acyltransferase
            label: "PP_0058: candidate 1-acylglycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0058
            function:
              preferred_term: 1-acylglycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0003841
                label: 1-acylglycerol-3-phosphate O-acyltransferase activity
            role_description: Candidate paralogous lysophosphatidic-acid acyltransferase.
          - id: dgkA_I_diacylglycerol_kinase
            label: "dgkA-I: diacylglycerol kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dgkA-I
            function:
              preferred_term: diacylglycerol kinase activity
              term:
                id: GO:0004143
                label: diacylglycerol kinase activity
            role_description: Diacylglycerol-to-phosphatidic-acid recycling candidate.
          - id: dgkA_II_diacylglycerol_kinase
            label: "dgkA-II: diacylglycerol kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dgkA-II
            function:
              preferred_term: diacylglycerol kinase activity
              term:
                id: GO:0004143
                label: diacylglycerol kinase activity
            role_description: Second diacylglycerol-to-phosphatidic-acid recycling candidate.
          - id: cdsA_phosphatidate_cytidylyltransferase
            label: "cdsA: phosphatidate cytidylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cdsA
            function:
              preferred_term: phosphatidate cytidylyltransferase activity
              term:
                id: GO:0004605
                label: phosphatidate cytidylyltransferase activity
            role_description: Activates phosphatidic acid as CDP-diacylglycerol for downstream headgroup transfer.
    - order: 2
      role: Phosphatidylglycerol and cardiolipin branch
      node:
        id: phosphatidylglycerol_and_cardiolipin_branch
        label: Phosphatidylglycerol and cardiolipin branch
        module_type: METABOLIC_PATHWAY
        description: >-
          PgsA transfers phosphatidyl groups from CDP-diacylglycerol to
          glycerol-3-phosphate, PgpA dephosphorylates phosphatidylglycerol
          phosphate, and Cls-family enzymes synthesize cardiolipin. PLD-family
          candidates are kept as cardiolipin/PG boundary nodes until their
          exact substrate specificity is reviewed.
        annotons:
          - id: pgsA_cdp_dag_glycerol_3_phosphate_phosphatidyltransferase
            label: "pgsA: CDP-DAG-glycerol-3-phosphate phosphatidyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgsA
            function:
              preferred_term: CDP-diacylglycerol-glycerol-3-phosphate 3-phosphatidyltransferase activity
              term:
                id: GO:0008444
                label: CDP-diacylglycerol-glycerol-3-phosphate 3-phosphatidyltransferase activity
            role_description: Committed phosphatidylglycerol-phosphate synthesis reaction from CDP-diacylglycerol.
          - id: pgpA_phosphatidylglycerophosphatase
            label: "pgpA: phosphatidylglycerophosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgpA
            function:
              preferred_term: phosphatidylglycerophosphatase activity
              term:
                id: GO:0008962
                label: phosphatidylglycerophosphatase activity
            role_description: Dephosphorylates phosphatidylglycerol phosphate to phosphatidylglycerol.
          - id: clsA_cardiolipin_synthase
            label: "clsA: cardiolipin synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: clsA
            function:
              preferred_term: cardiolipin synthase activity
              term:
                id: GO:0008808
                label: cardiolipin synthase activity
            role_description: Cardiolipin synthase branch enzyme.
          - id: clsB_cardiolipin_synthase
            label: "clsB: cardiolipin synthase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: clsB
            function:
              preferred_term: cardiolipin synthase activity
              term:
                id: GO:0008808
                label: cardiolipin synthase activity
            role_description: Cardiolipin synthase paralog/candidate in the KEGG batch.
          - id: PP_0892_pld_family_boundary
            label: "PP_0892: PLD-family lipid boundary candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0892
            role_description: PLD-family lipid enzyme candidate; substrate specificity requires gene-level review.
          - id: PP_5276_pld_family_boundary
            label: "PP_5276: PLD-family lipid boundary candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_5276
            role_description: PLD-family lipid enzyme candidate; substrate specificity requires gene-level review.
    - order: 3
      role: Phosphatidylserine, phosphatidylethanolamine, and phosphatidylcholine branch
      node:
        id: ps_pe_pc_branch
        label: PS, PE, and PC branch
        module_type: METABOLIC_PATHWAY
        description: >-
          PssA and PP_4677 are phosphatidylserine synthase candidates, Psd
          decarboxylates phosphatidylserine to phosphatidylethanolamine, and
          Pcs synthesizes phosphatidylcholine.
        annotons:
          - id: pssA_phosphatidylserine_synthase
            label: "pssA: phosphatidylserine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pssA
            function:
              preferred_term: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
              term:
                id: GO:0003882
                label: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
            role_description: CDP-diacylglycerol-serine phosphatidyltransferase candidate.
          - id: PP_4677_phosphatidylserine_synthase
            label: "PP_4677: phosphatidylserine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4677
            function:
              preferred_term: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
              term:
                id: GO:0003882
                label: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
            role_description: Paralogs/alternative phosphatidylserine synthase candidate.
          - id: psd_phosphatidylserine_decarboxylase
            label: "psd: phosphatidylserine decarboxylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: psd
            function:
              preferred_term: phosphatidylserine decarboxylase activity
              term:
                id: GO:0004609
                label: phosphatidylserine decarboxylase activity
            role_description: Produces phosphatidylethanolamine from phosphatidylserine.
          - id: pcs_phosphatidylcholine_synthase
            label: "pcs: phosphatidylcholine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pcs
            function:
              preferred_term: phosphatidylcholine synthase activity
              term:
                id: GO:0050520
                label: phosphatidylcholine synthase activity
            role_description: Synthesizes phosphatidylcholine in the bacterial membrane.
    - order: 4
      role: Glycerol-3-phosphate supply and turnover side context
      node:
        id: glycerol_3_phosphate_supply_and_turnover
        label: Glycerol-3-phosphate supply and turnover
        module_type: METABOLIC_PATHWAY
        description: >-
          GpsA and GlpD control glycerol-3-phosphate availability and redox
          state. They are important membrane-lipid precursor context but should
          not be conflated with headgroup transfer chemistry.
        annotons:
          - id: gpsA_biosynthetic_glycerol_3_phosphate_dehydrogenase
            label: "gpsA: biosynthetic glycerol-3-phosphate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gpsA
            role_description: Produces glycerol-3-phosphate for lipid precursor metabolism.
          - id: glpD_glycerol_3_phosphate_dehydrogenase
            label: "glpD: glycerol-3-phosphate dehydrogenase (quinone)"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glpD
            function:
              preferred_term: glycerol-3-phosphate dehydrogenase (quinone) activity
              term:
                id: GO:0004368
                label: glycerol-3-phosphate dehydrogenase (quinone) activity
            role_description: Glycerol-3-phosphate catabolism/respiratory side context.
    - order: 5
      role: Glycerophosphodiester and ethanolamine side nodes
      node:
        id: glycerophosphodiester_and_ethanolamine_side_nodes
        label: Glycerophosphodiester and ethanolamine side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          UgpQ and PchP are phosphodiester/phosphatase turnover nodes, while
          EutB/EutC belong to ethanolamine ammonia-lyase metabolism. These genes
          are retained in the ppu00564 batch as headgroup scavenging or
          ethanolamine side context, not as direct phospholipid synthesis steps.
        annotons:
          - id: ugpQ_glycerophosphodiester_phosphodiesterase
            label: "ugpQ: glycerophosphodiester phosphodiesterase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ugpQ
            function:
              preferred_term: glycerophosphodiester phosphodiesterase activity
              term:
                id: GO:0008889
                label: glycerophosphodiester phosphodiesterase activity
            role_description: Glycerophosphodiester turnover/scavenging enzyme.
          - id: pchP_phosphoethanolamine_phosphocholine_phosphatase
            label: "pchP: phosphoethanolamine/phosphocholine phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pchP
            role_description: Phosphoethanolamine/phosphocholine phosphatase candidate; exact in vivo substrate context needs review.
          - id: eutB_ethanolamine_ammonia_lyase_large_subunit
            label: "eutB: ethanolamine ammonia-lyase large subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: eutB
            function:
              preferred_term: ethanolamine ammonia-lyase activity
              term:
                id: GO:0008851
                label: ethanolamine ammonia-lyase activity
            role_description: Ethanolamine catabolism side node linked to membrane headgroup turnover/scavenging context.
          - id: eutC_ethanolamine_ammonia_lyase_small_subunit
            label: "eutC: ethanolamine ammonia-lyase small subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: eutC
            function:
              preferred_term: ethanolamine ammonia-lyase activity
              term:
                id: GO:0008851
                label: ethanolamine ammonia-lyase activity
            role_description: Ethanolamine catabolism side node linked to membrane headgroup turnover/scavenging context.
  notes: >-
    This is a broad metabolic module rather than a linear pathway. The
    gene-level pass should distinguish core membrane-phospholipid reactions
    from precursor supply, turnover, and KEGG side nodes, and should scrutinize
    PLD-family transfers that can over-propagate cardiolipin or
    phosphatidylglycerol functions to the wrong paralog.
