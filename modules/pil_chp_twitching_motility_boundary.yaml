id: MODULE:pil_chp_twitching_motility_boundary
title: Pil/Chp twitching-motility signaling boundary
description: Boundary module for the Pil/Chp-type signaling sub-bucket selected from KEGG ppu02025 biofilm
  formation in Pseudomonas putida KT2440. It includes PilJ/MCP-like receptor input, CheW-like adaptor
  candidates PP_4987 and PilI, the CheA-family kinase PP_4988, and receiver-domain PilH/PilG candidates.
  The first pass treats type IV pilus-dependent motility as pathway context rather than a directly proven
  gene-level output for every component.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
  title: PSEPK ppu02025 biofilm partition table
  statement: The partition table selects PP_4987, PP_4988, pilJ, pilI, pilH, and pilG as the Pil/Chp twitching-regulation
    bucket.
- source_id: file:PSEPK/PP_4987/PP_4987-ai-review.yaml
  title: Curated PP_4987 review
  statement: The PP_4987 review supports its Pil/Chp boundary role.
- source_id: file:PSEPK/PP_4988/PP_4988-ai-review.yaml
  title: Curated PP_4988 review
  statement: The PP_4988 review supports its Pil/Chp boundary role.
- source_id: file:PSEPK/pilJ/pilJ-ai-review.yaml
  title: Curated pilJ review
  statement: The pilJ review supports its Pil/Chp boundary role.
- source_id: file:PSEPK/pilI/pilI-ai-review.yaml
  title: Curated pilI review
  statement: The pilI review supports its Pil/Chp boundary role.
- source_id: file:PSEPK/pilH/pilH-ai-review.yaml
  title: Curated pilH review
  statement: The pilH review supports its Pil/Chp boundary role.
- source_id: file:PSEPK/pilG/pilG-ai-review.yaml
  title: Curated pilG review
  statement: The pilG review supports its Pil/Chp boundary role.
notes: This bucket is adjacent to type IV pilus-dependent motility and biofilm behavior, but the available
  first-pass evidence is mostly UniProt/InterPro domain context. Direct KT2440 phosphotransfer partners
  and twitching outputs should be tested experimentally.
