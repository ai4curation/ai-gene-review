id: MODULE:methane_metabolism_boundary
title: Methane metabolism boundary
description: >-
  Boundary/absence module for KEGG ppu00680 in Pseudomonas putida KT2440. The
  organism-specific "methane metabolism" map is not evidence that KT2440 carries
  methane oxidation or methanogenesis. Its candidate genes instead partition
  into formaldehyde detoxification, formate oxidation and respiratory
  electron-transfer context, tetrahydrofolate/serine one-carbon chemistry,
  gluconeogenic and acetate/acetyl-CoA side nodes, and one predicted
  quinohaemoprotein amine dehydrogenase alpha subunit.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00680
    title: Methane metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00680 provides the PSEPK curation batch. Its KT2440 membership is
      dominated by formaldehyde/formate enzymes, serine/folate and central
      carbon enzymes, formate dehydrogenase components, and PeaA amine
      dehydrogenase context rather than route-defining methane monooxygenase or
      methanogenesis genes.
  - source_id: file:genes/PSEPK/frmA/frmA-ai-review.yaml
    title: frmA review
    statement: >-
      FrmA is curated as glutathione-dependent formaldehyde detoxification
      through S-(hydroxymethyl)glutathione dehydrogenase activity.
  - source_id: file:genes/PSEPK/frmC/frmC-ai-review.yaml
    title: frmC review
    statement: >-
      FrmC is curated as S-formylglutathione hydrolase acting downstream of
      FrmA in formaldehyde catabolism.
module:
  id: methane_metabolism_boundary
  label: Methane metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: formaldehyde catabolic process
      term:
        id: GO:0046294
        label: formaldehyde catabolic process
      description: Detoxification/catabolism of formaldehyde through glutathione-dependent and related routes.
    - preferred_term: formaldehyde dehydrogenase (NAD+) activity
      term:
        id: GO:0018467
        label: formaldehyde dehydrogenase (NAD+) activity
      description: FdhA glutathione-independent formaldehyde oxidation context.
    - preferred_term: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
      term:
        id: GO:0106322
        label: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
      description: FrmA glutathione-dependent formaldehyde oxidation step.
    - preferred_term: S-formylglutathione hydrolase activity
      term:
        id: GO:0018738
        label: S-formylglutathione hydrolase activity
      description: FrmC hydrolysis of S-formylglutathione to formate and glutathione.
    - preferred_term: formate oxidation
      term:
        id: GO:0015944
        label: formate oxidation
      description: Formate dehydrogenase respiratory or redox context.
    - preferred_term: formate dehydrogenase (NAD+) activity
      term:
        id: GO:0008863
        label: formate dehydrogenase (NAD+) activity
      description: Broad formate dehydrogenase activity used by several ppu00680 candidates.
    - preferred_term: tetrahydrofolate interconversion
      term:
        id: GO:0035999
        label: tetrahydrofolate interconversion
      description: GlyA-linked one-carbon/folate chemistry pulled into the methane map.
    - preferred_term: glycine hydroxymethyltransferase activity
      term:
        id: GO:0004372
        label: glycine hydroxymethyltransferase activity
      description: Serine hydroxymethyltransferase activity of GlyA paralogs.
    - preferred_term: L-serine biosynthetic process
      term:
        id: GO:0006564
        label: L-serine biosynthetic process
      description: SerA/SerC/SerB phosphoserine pathway side context.
    - preferred_term: methylamine dehydrogenase (amicyanin) activity
      term:
        id: GO:0052876
        label: methylamine dehydrogenase (amicyanin) activity
      description: PeaA candidate quinohaemoprotein amine dehydrogenase context.
    - preferred_term: gluconeogenesis
      term:
        id: GO:0006094
        label: gluconeogenesis
      description: PpsA/Fbp and lower-carbon side nodes in the KEGG map.
    - preferred_term: acetyl-CoA biosynthetic process
      term:
        id: GO:0006085
        label: acetyl-CoA biosynthetic process
      description: Pta/Acs acetate and acetyl-CoA side-node context.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Most soluble formaldehyde, folate/serine, and central-carbon enzymes in this boundary act in the bacterial cytosol.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Formate dehydrogenase and respiratory electron-transfer components can be membrane-associated in bacteria.
  parts:
    - order: 1
      role: Methane route absence and boundary guardrail
      node:
        id: methane_route_absence_guardrail
        label: Methane route absence guardrail
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu00680 membership does not establish a complete methane
          oxidation or methanogenesis pathway in KT2440. No route-defining
          methane monooxygenase or methanogenesis-specific spine is represented
          in the curated candidate set. Downstream C1 detoxification and formate
          oxidation genes should therefore not be used to infer methane use.
    - order: 2
      role: Formaldehyde detoxification and formate production
      node:
        id: formaldehyde_detoxification
        label: Formaldehyde detoxification
        module_type: METABOLIC_PATHWAY
        description: >-
          FdhA, FrmA, and FrmC cover formaldehyde detoxification chemistry.
          FrmA oxidizes S-(hydroxymethyl)glutathione, FrmC hydrolyzes
          S-formylglutathione to formate and glutathione, and FdhA provides a
          predicted NAD-dependent formaldehyde dehydrogenase side route.
        annotons:
          - id: fdhA_formaldehyde_dehydrogenase
            label: "fdhA: formaldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdhA
            function:
              preferred_term: formaldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0018467
                label: formaldehyde dehydrogenase (NAD+) activity
            role_description: Predicted NAD-dependent formaldehyde dehydrogenase.
          - id: frmA_hydroxymethylglutathione_dehydrogenase
            label: "frmA: S-(hydroxymethyl)glutathione dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: frmA
            function:
              preferred_term: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
              term:
                id: GO:0106322
                label: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
            role_description: Glutathione-dependent formaldehyde oxidation step.
          - id: frmC_s_formylglutathione_hydrolase
            label: "frmC: S-formylglutathione hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: frmC
            function:
              preferred_term: S-formylglutathione hydrolase activity
              term:
                id: GO:0018738
                label: S-formylglutathione hydrolase activity
            role_description: Hydrolyzes S-formylglutathione to formate and glutathione.
    - order: 3
      role: Formate oxidation and respiratory electron-transfer context
      node:
        id: formate_oxidation_respiratory_context
        label: Formate oxidation and respiratory context
        module_type: PROTEIN_COMPLEX
        description: >-
          The FdoGHI and PP_2185/PP_2186-associated formate dehydrogenase
          candidates are retained as formate oxidation and respiratory redox
          context. PP_2183 and PP_2184 are NDH-like electron-transfer side
          components rather than methane-specific enzymes.
        annotons:
          - id: fdoG_formate_dehydrogenase
            label: "fdoG: formate dehydrogenase major subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdoG
            function:
              preferred_term: formate dehydrogenase (cytochrome-c-553) activity
              term:
                id: GO:0047111
                label: formate dehydrogenase (cytochrome-c-553) activity
            role_description: Major formate dehydrogenase-O subunit in formate oxidation context.
          - id: fdoH_fdoI_formate_dehydrogenase_context
            label: "fdoH/fdoI: formate dehydrogenase accessory subunits"
            participant:
              selector_type: ANY_PARTICIPANT
            function:
              preferred_term: electron transfer activity
              term:
                id: GO:0009055
                label: electron transfer activity
            role_description: Iron-sulfur or membrane subunit context for formate oxidation.
          - id: PP_2185_formate_dehydrogenase_alpha
            label: "PP_2185: formate dehydrogenase alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2185
            function:
              preferred_term: formate dehydrogenase (NAD+) activity
              term:
                id: GO:0008863
                label: formate dehydrogenase (NAD+) activity
            role_description: Predicted formate dehydrogenase alpha subunit.
    - order: 4
      role: Folate, serine, and hydroxypyruvate side chemistry
      node:
        id: folate_serine_side_chemistry
        label: Folate and serine side chemistry
        module_type: METABOLIC_PATHWAY
        description: >-
          GlyA1/GlyA2 and the SerA/SerC/SerB phosphoserine pathway are pulled
          into ppu00680 through one-carbon and serine-cycle-like map structure.
          In KT2440 they should remain curated as folate/serine biosynthesis
          and hydroxypyruvate/glycerate side chemistry unless direct methylotrophy
          evidence is added.
        annotons:
          - id: glyA_serine_hydroxymethyltransferase
            label: "glyA1/glyA2: serine hydroxymethyltransferase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glycine hydroxymethyltransferase activity
                term:
                  id: GO:0004372
                  label: glycine hydroxymethyltransferase activity
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
            role_description: THF-linked serine/glycine one-carbon transfer.
          - id: serABC_phosphoserine_pathway
            label: "serA/serC/serB: phosphoserine pathway"
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: L-serine biosynthetic process
                term:
                  id: GO:0006564
                  label: L-serine biosynthetic process
            role_description: Serine biosynthesis side context in the broad KEGG map.
          - id: hydroxypyruvate_reductase_context
            label: Hydroxypyruvate/glycerate reductase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: hydroxypyruvate reductase [NAD(P)H] activity
                term:
                  id: GO:0016618
                  label: hydroxypyruvate reductase [NAD(P)H] activity
            function:
              preferred_term: hydroxypyruvate reductase [NAD(P)H] activity
              term:
                id: GO:0016618
                label: hydroxypyruvate reductase [NAD(P)H] activity
            role_description: Hydroxypyruvate/glycerate redox side chemistry represented by ttuD/HprA-family context.
    - order: 5
      role: Central-carbon and acetate side nodes
      node:
        id: central_carbon_acetate_side_nodes
        label: Central-carbon and acetate side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          PpsA, Fbp, Fba, Eno, GpmI, Mdh, Ppc, Pta, AcsA1/AcsA2, PP_2213, and
          PP_2533 are reusable central-carbon, gluconeogenic, acetate/acetyl-CoA,
          or unresolved acyl-CoA/redox side nodes. They should not satisfy
          methane-specific pathway steps.
        annotons:
          - id: gluconeogenic_lower_carbon_context
            label: Gluconeogenic/lower-carbon context
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: gluconeogenesis
                term:
                  id: GO:0006094
                  label: gluconeogenesis
            role_description: PpsA/Fbp and neighboring lower-carbon reactions represented in broad one-carbon maps.
          - id: acetate_acetyl_CoA_context
            label: Acetate and acetyl-CoA context
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: acetyl-CoA biosynthetic process
                term:
                  id: GO:0006085
                  label: acetyl-CoA biosynthetic process
            role_description: Pta and Acs enzymes in acetate/acetyl-CoA side context.
    - order: 6
      role: Quinohaemoprotein amine dehydrogenase candidate
      node:
        id: quinohaemoprotein_amine_dehydrogenase_candidate
        label: Quinohaemoprotein amine dehydrogenase candidate
        module_type: PROTEIN_COMPLEX
        description: >-
          PeaA is an exported quinohaemoprotein amine dehydrogenase alpha
          subunit candidate with an EC-derived methylamine dehydrogenase term.
          It is retained as amine-dehydrogenase context, with partner subunits
          and physiological substrate unresolved.
        annotons:
          - id: peaA_methylamine_dehydrogenase_alpha
            label: "peaA: quinohaemoprotein amine dehydrogenase alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: peaA
            function:
              preferred_term: methylamine dehydrogenase (amicyanin) activity
              term:
                id: GO:0052876
                label: methylamine dehydrogenase (amicyanin) activity
            role_description: Candidate alpha subunit contributing to methylamine/amine dehydrogenase activity.
