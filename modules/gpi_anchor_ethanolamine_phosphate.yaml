id: MODULE:gpi_anchor_ethanolamine_phosphate
title: GPI anchor biosynthesis III — ethanolamine-phosphate additions; PIGN/PIGG/PIGF/PIGO
description: >-
  As the trimannosyl core of the glycosylphosphatidylinositol (GPI) anchor is built, three
  ethanolamine-phosphate (EtNP) groups are transferred from phosphatidylethanolamine onto the
  mannoses by three ER-membrane EtNP transferases. PIGN (GPI-ET-I) adds EtNP to the first
  mannose; PIGG (GPI-ET-II), together with its accessory subunit PIGF, adds EtNP to the second
  mannose (a side-branch EtNP removed after the anchor is attached to protein); and PIGO
  (GPI-ET-III), also partnered by PIGF, adds the bridging EtNP to the third mannose — the
  ethanolamine-phosphate whose amino group forms the amide bond to the protein C-terminus at the
  transamidation step. PIGF is a non-catalytic accessory subunit shared by PIGO and PIGG,
  required to stabilise both. Defects cause GPI-deficiency disease: PIGN (multiple congenital
  anomalies-hypotonia-seizures syndrome 1, MCAHS1), PIGO (hyperphosphatasia with mental
  retardation syndrome 2, HPMRS2), PIGG (an intellectual-disability/seizure GPIBD) and PIGF
  (inherited GPI deficiency).
status: DRAFT
evidence:
  - source_id: GO:0006506
    title: GPI anchor biosynthetic process
    statement: >-
      The module is grounded in GPI anchor biosynthetic process (GO:0006506); it covers the three
      ethanolamine-phosphate transfers onto the GPI mannoses.
  - source_id: Reactome:R-HSA-162710
    title: Synthesis of glycosylphosphatidylinositol (GPI)
    statement: >-
      Step order and intermediates follow the human Reactome "Synthesis of
      glycosylphosphatidylinositol (GPI)" sub-pathway (reactions R-HSA-162798 PIGN, R-HSA-162742 PIGG).
  - source_id: file:human/PIGN/PIGN-ai-review.yaml
    title: PIGN gene review (human)
    statement: >-
      The first-mannose EtNP transfer (UniProtKB:O95427, GO:0051377) matches the completed human PIGN review.
  - source_id: file:human/PIGG/PIGG-ai-review.yaml
    title: PIGG gene review (human)
    statement: >-
      The second-mannose EtNP transfer (UniProtKB:Q5H8A4, GO:0051377) matches the completed human PIGG review.
  - source_id: file:human/PIGF/PIGF-ai-review.yaml
    title: PIGF gene review (human)
    statement: >-
      The non-catalytic PIGO/PIGG accessory-subunit role (UniProtKB:Q07326) matches the completed
      human PIGF review.
  - source_id: file:human/PIGO/PIGO-ai-review.yaml
    title: PIGO gene review (human)
    statement: >-
      The bridging third-mannose EtNP transfer (UniProtKB:Q8TEQ8, GO:0051377) matches the completed
      human PIGO review.
