  notes: >-
    GPI ethanolamine-phosphate-addition segment, grounded to the human enzymes PIGN
    (UniProtKB:O95427, GO:0051377), PIGG (Q5H8A4, GO:0051377) and PIGO (Q8TEQ8, GO:0051377), all
    mannose-ethanolamine phosphotransferases, plus the shared non-catalytic accessory subunit PIGF
    (Q07326; no PANTHER family — the InterPro family IPR009580 GPI-biosynthesis-protein Pig-F is
    used as its family selector). GO molecular-function/BP/location terms were taken from the
    completed human gene reviews and verified against the local go.db; Reactome reaction ids/titles
    (R-HSA-162798 PIGN, R-HSA-162742 PIGG; PIGO has no cached WT reaction so its node is grounded on
    its review and the umbrella pathway R-HSA-162710) were verified against the local reactome cache.
    Each step uses a family selector (PANTHER for PIGN/PIGG/PIGO, InterPro for PIGF); the PIGG and
    PIGO steps are PROTEIN_COMPLEX nodes pairing each catalytic transferase with the shared PIGF
    accessory subunit (modelled by its BP role, as it has no catalytic MF). All three transferases
    use phosphatidylethanolamine as the EtNP donor. This segment interleaves with the mannosylation
    module: PIGN acts on mannose-I (between PIGM and PIGV), PIGG on mannose-II (after PIGV), and PIGO
    adds the bridging EtNP on mannose-III (after PIGB) — the last modification before the completed
    GPI is transferred to protein by the GPI transamidase (PIGK/PIGS/PIGT/PIGU/GPAA1; separate module).
    Disorders: MCAHS1 (PIGN), HPMRS2 (PIGO), and GPIBD intellectual disability/seizures (PIGG, PIGF).
