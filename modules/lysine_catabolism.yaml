id: MODULE:lysine_catabolism
title: L-lysine catabolism (saccharopine pathway to glutaryl-CoA; glutaric aciduria type 1)
description: >-
  The main (saccharopine) pathway of L-lysine degradation in humans, a
  mitochondrial route that also handles L-hydroxylysine and the final steps of
  L-tryptophan catabolism, converging on glutaryl-CoA and ultimately acetyl-CoA.
  The bifunctional alpha-aminoadipic semialdehyde synthase (AASS) catalyses the
  first two committed steps: its lysine-2-oxoglutarate reductase (saccharopine
  dehydrogenase, NADP+) activity condenses L-lysine with 2-oxoglutarate to
  saccharopine, and its saccharopine dehydrogenase (NAD+) activity then oxidises
  saccharopine to L-2-aminoadipate-6-semialdehyde + L-glutamate. Downstream
  (semialdehyde -> L-2-aminoadipate by ALDH7A1; L-2-aminoadipate -> 2-oxoadipate by
  the aminotransferase AADAT — not modelled here) yields 2-oxoadipate, which the
  2-oxoadipate dehydrogenase complex (OADHC) oxidatively decarboxylates to
  glutaryl-CoA. The OADHC is a paralogous sibling of the 2-oxoglutarate
  dehydrogenase complex: a dedicated E1 (DHTKD1, TPP-dependent) plus the shared E2
  succinyltransferase core (DLST, acting as a glutaryltransferase here) and the
  shared E3 (DLD). Finally the FAD-dependent glutaryl-CoA dehydrogenase (GCDH)
  oxidatively decarboxylates glutaryl-CoA to crotonyl-CoA + CO2, passing electrons
  to the electron-transfer flavoprotein system (ETF -> ETFDH -> respiratory chain).
  Inherited defects: AASS deficiency causes (largely benign) hyperlysinemia /
  saccharopinuria; DHTKD1 deficiency causes 2-aminoadipic/2-oxoadipic aciduria
  (and is linked to Charcot-Marie-Tooth 2Q); and GCDH deficiency causes glutaric
  aciduria type 1 (GA1), a serious encephalopathy with striatal injury.
status: DRAFT
evidence:
  - source_id: GO:0019477
    title: L-lysine catabolic process
    statement: >-
      The module is grounded in the GO L-lysine catabolic process (GO:0019477);
      each step is annotated within it (converging on glutaryl-CoA).
  - source_id: Reactome:R-HSA-71064
    title: Lysine catabolism
    statement: >-
      Step order follows the human Reactome "Lysine catabolism" pathway; the
      glutaryl-CoA-forming (R-HSA-9858590, DLST) and glutaryl-CoA dehydrogenase
      (R-HSA-71046, GCDH) reactions were verified against the local cache.
  - source_id: file:human/AASS/AASS-ai-review.yaml
    title: AASS gene review (human)
    statement: >-
      The bifunctional entry step (UniProtKB:Q9UDR5, GO:0047130 + GO:0047131)
      matches the completed human AASS review.
  - source_id: file:human/DHTKD1/DHTKD1-ai-review.yaml
    title: DHTKD1 gene review (human)
    statement: >-
      The 2-oxoadipate dehydrogenase E1 grounding (UniProtKB:Q96HY7, GO:0160166,
      GO:0160167 complex) matches the completed human DHTKD1 review.
  - source_id: file:human/DLST/DLST-ai-review.yaml
    title: DLST gene review (human)
    statement: >-
      The shared E2 core grounding (UniProtKB:P36957, GO:0120571 dihydrolipoyllysine-
      residue glutaryltransferase activity for the OADHC) matches the completed
      human DLST review.
  - source_id: file:human/DLD/DLD-ai-review.yaml
    title: DLD gene review (human)
    statement: >-
      The shared E3 grounding (UniProtKB:P09622, GO:0004148) matches the completed
      human DLD review.
  - source_id: file:human/GCDH/GCDH-ai-review.yaml
    title: GCDH gene review (human)
    statement: >-
      The glutaryl-CoA dehydrogenase step (UniProtKB:Q92947, GO:0004361) matches
      the completed human GCDH review (glutaric aciduria type 1).
module:
  id: lysine_catabolism
  label: L-lysine catabolism (saccharopine pathway)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-lysine catabolic process
      term:
        id: GO:0019477
        label: L-lysine catabolic process
      description: >-
        Mitochondrial degradation of L-lysine via saccharopine to glutaryl-CoA and
        thence crotonyl-CoA / acetyl-CoA.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of all modelled steps.
  parts:
    - order: 1
      role: bifunctional entry (saccharopine pathway, first two steps)
      node:
        id: aass_step
        label: L-lysine + 2-oxoglutarate to L-2-aminoadipate-6-semialdehyde (via saccharopine)
        module_type: REACTION
        annotons:
          - id: aass_lkr
            label: "AASS: lysine-2-oxoglutarate reductase (saccharopine-forming)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Alpha-aminoadipic semialdehyde synthase / saccharopine dehydrogenase family (AASS)
                term:
                  id: PANTHER:PTHR11133
                  label: SACCHAROPINE DEHYDROGENASE
                representative_members:
                  - preferred_term: AASS (human, bifunctional)
                    term:
                      id: UniProtKB:Q9UDR5
                      label: Alpha-aminoadipic semialdehyde synthase, mitochondrial
            function:
              preferred_term: saccharopine dehydrogenase (NADP+, L-lysine-forming) activity
              term:
                id: GO:0047130
                label: saccharopine dehydrogenase (NADP+, L-lysine-forming) activity
              substrates:
                - preferred_term: L-lysine
                - preferred_term: 2-oxoglutarate
                - preferred_term: NADPH
              products:
                - preferred_term: saccharopine
              evidence:
                - source_id: EC:1.5.1.8
                  statement: saccharopine dehydrogenase (NADP+); LKR activity of AASS
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              N-terminal lysine-2-oxoglutarate reductase (LKR) domain; condenses
              lysine and 2-oxoglutarate to saccharopine (NADPH-dependent), the
              committed first step of lysine degradation.
          - id: aass_sdh
            label: "AASS: saccharopine dehydrogenase (glutamate-forming)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Alpha-aminoadipic semialdehyde synthase / saccharopine dehydrogenase family (AASS)
                term:
                  id: PANTHER:PTHR11133
                  label: SACCHAROPINE DEHYDROGENASE
                representative_members:
                  - preferred_term: AASS (human, bifunctional)
                    term:
                      id: UniProtKB:Q9UDR5
                      label: Alpha-aminoadipic semialdehyde synthase, mitochondrial
            function:
              preferred_term: saccharopine dehydrogenase (NAD+, L-glutamate-forming) activity
              term:
                id: GO:0047131
                label: saccharopine dehydrogenase (NAD+, L-glutamate-forming) activity
              substrates:
                - preferred_term: saccharopine
                - preferred_term: NAD+
              products:
                - preferred_term: L-2-aminoadipate-6-semialdehyde
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:1.5.1.9
                  statement: saccharopine dehydrogenase (NAD+); SDH activity of AASS
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              C-terminal saccharopine dehydrogenase (SDH) domain; oxidises
              saccharopine to L-2-aminoadipate-6-semialdehyde + glutamate. (Downstream
              ALDH7A1 and AADAT steps to 2-oxoadipate are not modelled here.)
    - order: 2
      role: oxidative decarboxylation of 2-oxoadipate (multienzyme complex)
      node:
        id: oadhc_step
        label: 2-oxoadipate + CoA + NAD+ to glutaryl-CoA + CO2 + NADH
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: dhtkd1_e1
            label: "DHTKD1: 2-oxoadipate dehydrogenase E1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 2-oxoglutarate/2-oxoadipate dehydrogenase E1 family (DHTKD1/OGDH)
                term:
                  id: PANTHER:PTHR23152
                  label: 2-OXOGLUTARATE DEHYDROGENASE
                representative_members:
                  - preferred_term: DHTKD1 (human)
                    term:
                      id: UniProtKB:Q96HY7
                      label: Probable 2-oxoglutarate dehydrogenase E1 component DHKTD1, mitochondrial
            function:
              preferred_term: 2-oxoadipate dehydrogenase activity
              term:
                id: GO:0160166
                label: 2-oxoadipate dehydrogenase activity
              substrates:
                - preferred_term: 2-oxoadipate
                - preferred_term: thiamine diphosphate (cofactor)
              products:
                - preferred_term: (decarboxylated glutaryl-lipoyl intermediate)
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:1.2.4.2
                  statement: 2-oxoadipate dehydrogenase; TPP-dependent E1 (OGDH paralog)
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              TPP-dependent E1 that decarboxylates 2-oxoadipate; the substrate-
              specific subunit of the 2-oxoadipate dehydrogenase complex (OADHC),
              paralogous to OGDH. Deficiency causes 2-aminoadipic/2-oxoadipic aciduria.
          - id: dlst_e2
            label: "DLST: shared E2 (glutaryltransferase core)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydrolipoyllysine-residue succinyl/glutaryl-transferase E2 family (DLST)
                term:
                  id: PANTHER:PTHR43416
                  label: DIHYDROLIPOYLLYSINE-RESIDUE SUCCINYLTRANSFERASE COMPONENT OF 2-OXOGLUTARATE DEHYDROGENASE COMPLEX, MITOCHONDRIAL-RELATED
                representative_members:
                  - preferred_term: DLST (human)
                    term:
                      id: UniProtKB:P36957
                      label: Dihydrolipoyllysine-residue succinyltransferase component of 2-oxoglutarate dehydrogenase complex, mitochondrial
            function:
              preferred_term: dihydrolipoyllysine-residue glutaryltransferase activity
              term:
                id: GO:0120571
                label: dihydrolipoyllysine-residue glutaryltransferase activity
              substrates:
                - preferred_term: S-glutaryl-dihydrolipoyl intermediate
                - preferred_term: coenzyme A
              products:
                - preferred_term: glutaryl-CoA
              evidence:
                - source_id: Reactome:R-HSA-9858590
                  statement: "DLST transfers glutaryl to CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              The E2 core, shared with the TCA-cycle 2-oxoglutarate dehydrogenase
              complex (where it acts as a succinyltransferase); in the OADHC it
              transfers the glutaryl group to CoA forming glutaryl-CoA.
          - id: dld_e3
            label: "DLD: shared E3 (dihydrolipoyl dehydrogenase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydrolipoyl dehydrogenase family (DLD)
                term:
                  id: PANTHER:PTHR22912
                  label: DISULFIDE OXIDOREDUCTASE
                representative_members:
                  - preferred_term: DLD (human)
                    term:
                      id: UniProtKB:P09622
                      label: Dihydrolipoyl dehydrogenase, mitochondrial
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
              substrates:
                - preferred_term: dihydrolipoyl-E2
                - preferred_term: NAD+
              products:
                - preferred_term: lipoyl-E2 (reoxidised)
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.8.1.4
                  statement: dihydrolipoyl dehydrogenase; E3 shared with PDC/OGDH/BCKDH
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              FAD-dependent E3 that reoxidises the dihydrolipoyl arm; the common E3
              shared across the 2-oxoacid dehydrogenase complexes.
    - order: 3
      role: FAD-dependent oxidative decarboxylation of glutaryl-CoA
      node:
        id: gcdh_step
        label: glutaryl-CoA + FAD to crotonyl-CoA + CO2 + FADH2
        module_type: REACTION
        annotons:
          - id: gcdh_activity
            label: "GCDH: glutaryl-CoA dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acyl-CoA dehydrogenase family, glutaryl-CoA subfamily (GCDH)
                term:
                  id: PANTHER:PTHR42807
                  label: GLUTARYL-COA DEHYDROGENASE, MITOCHONDRIAL
                representative_members:
                  - preferred_term: GCDH (human)
                    term:
                      id: UniProtKB:Q92947
                      label: Glutaryl-CoA dehydrogenase, mitochondrial
            function:
              preferred_term: glutaryl-CoA dehydrogenase activity
              term:
                id: GO:0004361
                label: glutaryl-CoA dehydrogenase activity
              substrates:
                - preferred_term: glutaryl-CoA
                - preferred_term: FAD
              products:
                - preferred_term: crotonyl-CoA
                - preferred_term: carbon dioxide
                - preferred_term: FADH2
              evidence:
                - source_id: EC:1.3.8.6
                  statement: glutaryl-CoA dehydrogenase (ETF-linked; oxidative decarboxylation)
                - source_id: Reactome:R-HSA-71046
                  statement: "glutaryl-CoA + FAD => crotonyl-CoA + FADH2 + CO2 (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              FAD-dependent acyl-CoA dehydrogenase performing a combined
              dehydrogenation and decarboxylation of glutaryl-CoA to crotonyl-CoA;
              electrons pass to the ETF system (see the ETF module). Deficiency
              causes glutaric aciduria type 1.
  connections:
    - source: aass_step
      target: oadhc_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        AASS begins lysine degradation; after the (unmodelled) ALDH7A1 and AADAT
        steps, the resulting 2-oxoadipate is oxidatively decarboxylated by the OADHC.
    - source: oadhc_step
      target: gcdh_step
      connection_type: PROVIDES_INPUT_FOR
      description: Glutaryl-CoA made by the OADHC is dehydrogenated/decarboxylated by GCDH.
  notes: >-
    L-lysine (and L-tryptophan) degradation converging on glutaryl-CoA, grounded to
    the human enzymes AASS (UniProtKB:Q9UDR5; bifunctional GO:0047130 LKR + GO:0047131
    SDH), the 2-oxoadipate dehydrogenase complex — DHTKD1 E1 (Q96HY7, GO:0160166),
    the shared E2 DLST (P36957, GO:0120571 glutaryltransferase / GO:0004149
    succinyltransferase in the TCA OGDHC) and the shared E3 DLD (P09622, GO:0004148),
    assembled as GO:0160167 — and glutaryl-CoA dehydrogenase GCDH (Q92947, GO:0004361,
    EC 1.3.8.6). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome cache.
    Each step uses a PANTHER family selector (generic over paralogs and orthologs)
    plus concrete human representative members; the OADHC is modelled as a
    PROTEIN_COMPLEX node whose E2 (DLST) and E3 (DLD) are shared with the TCA-cycle
    2-oxoglutarate dehydrogenase complex. The intermediate ALDH7A1 (antiquitin;
    pyridoxine-dependent epilepsy) and AADAT steps between AASS and the OADHC are
    noted but not yet modelled. Downstream, GCDH-derived crotonyl-CoA is further
    catabolised to acetyl-CoA and its electrons feed the ETF system
    (see MODULE:electron_transfer_flavoprotein_system).
