id: MODULE:tetr_acrr_transcriptional_regulator_boundary
title: TetR/AcrR-family transcriptional regulator boundary
description: Boundary module for TetR/AcrR-family regulators from the broad PSEPK regulation/signal-transduction bucket. It
  separates named or experimentally anchored regulators from generic HTH TetR/AcrR candidates, low-information DNA-binding-only
  records, and one membrane-associated no-core record.
