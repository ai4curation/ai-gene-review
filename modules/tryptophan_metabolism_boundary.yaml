id: MODULE:tryptophan_metabolism_boundary
title: Tryptophan metabolism boundary
description: >-
  Boundary module for KEGG ppu00380 in Pseudomonas putida KT2440. The
  organism-specific map is broad and mixes tryptophan-related reactions with
  catalase/peroxidase, glutaryl-CoA dehydrogenase, beta-oxidation-like CoA
  enzymes, lipoamide enzymes, thiolases, and aromatic amino-acid side nodes.
  In the current partition, only gcdH and katG are primary to this bucket.
  Their gene-level reviews support glutaryl-CoA dehydrogenase activity and
  hydrogen-peroxide detoxification, respectively, but do not by themselves make
  a satisfiable dedicated tryptophan-catabolic module. Strict tryptophan
  biosynthesis is tracked separately in the tryptophan_biosynthesis module.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00380
    title: Tryptophan metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00380 provides the PSEPK curation batch; the membership includes
      many side-node enzymes from CoA metabolism, oxidative stress, lipoamide
      metabolism, beta-oxidation, and aromatic amino-acid metabolism.
  - source_id: GO:0006569
    title: L-tryptophan catabolic process
    statement: >-
      This GO process defines the biological target of a strict tryptophan
      degradation module, but current ppu00380 primary genes are not sufficient
      to assert a complete route in this first-pass module.
  - source_id: file:PSEPK/gcdH/gcdH-ai-review.yaml
    title: Curated gcdH review
    statement: >-
      gcdH is curated as glutaryl-CoA dehydrogenase rather than as a
      fatty-acid-beta-oxidation enzyme.
  - source_id: file:PSEPK/katG/katG-ai-review.yaml
    title: Curated katG review
    statement: >-
      katG is curated as bifunctional catalase-peroxidase in hydrogen peroxide
      detoxification and oxidative-stress response.
module:
  id: tryptophan_metabolism_boundary
  label: Tryptophan metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-tryptophan catabolic process
      term:
        id: GO:0006569
        label: L-tryptophan catabolic process
      description: Breakdown of L-tryptophan.
    - preferred_term: glutaryl-CoA dehydrogenase activity
      term:
        id: GO:0004361
        label: glutaryl-CoA dehydrogenase activity
      description: GcdH activity represented among the primary ppu00380 genes.
    - preferred_term: hydrogen peroxide catabolic process
      term:
        id: GO:0042744
        label: hydrogen peroxide catabolic process
      description: KatG detoxification process represented among the primary ppu00380 genes.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most soluble enzymes in this broad KEGG map operate in the bacterial cytoplasm.
  parts:
    - order: 1
      role: Primary ppu00380 CoA-acid side node
      node:
        id: gcdh_glutaryl_coa_dehydrogenase_side_node
        label: GcdH glutaryl-CoA dehydrogenase
        module_type: REACTION
        description: >-
          GcdH is the only CoA-acid dehydrogenase assigned primarily to ppu00380
          by the partition. It may be adjacent to tryptophan/lysine/aromatic CoA
          metabolism, but the gene review supports the substrate-specific
          glutaryl-CoA dehydrogenase activity, not generic fatty-acid
          beta-oxidation.
        annotons:
          - id: gcdH_glutaryl_coa_dehydrogenase
            label: "gcdH: glutaryl-CoA dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gcdH
            function:
              preferred_term: glutaryl-CoA dehydrogenase activity
              term:
                id: GO:0004361
                label: glutaryl-CoA dehydrogenase activity
              substrates:
                - preferred_term: glutaryl-CoA
              products:
                - preferred_term: glutaconyl-CoA
            role_description: >-
              GcdH supplies a glutaryl-CoA dehydrogenase side node in the broad
              KEGG tryptophan-metabolism map.
    - order: 2
      role: Primary ppu00380 oxidative-stress side node
      node:
        id: katg_catalase_peroxidase_side_node
        label: KatG catalase-peroxidase
        module_type: REACTION
        description: >-
          KatG appears in the KEGG tryptophan-metabolism map, but gene-level
          curation supports peroxide detoxification and oxidative-stress
          response rather than a core tryptophan-catabolic step.
        annotons:
          - id: katG_catalase_activity
            label: "katG: catalase activity"
            participant:
              selector_type: GENE
              gene:
                preferred_term: katG
            function:
              preferred_term: catalase activity
              term:
                id: GO:0004096
                label: catalase activity
              substrates:
                - preferred_term: hydrogen peroxide
              products:
                - preferred_term: water
                - preferred_term: oxygen
            role_description: Detoxifies hydrogen peroxide by catalase activity.
          - id: katG_peroxidase_activity
            label: "katG: peroxidase activity"
            participant:
              selector_type: GENE
              gene:
                preferred_term: katG
            function:
              preferred_term: peroxidase activity
              term:
                id: GO:0004601
                label: peroxidase activity
              substrates:
                - preferred_term: hydrogen peroxide
                - preferred_term: organic electron donor
              products:
                - preferred_term: water
                - preferred_term: oxidized donor
            role_description: Detoxifies hydrogen peroxide by broad-spectrum peroxidase activity.
  notes: >-
    The module should be revisited if a future module-level synthesis identifies
    a complete KT2440 tryptophan degradation route. For now, ppu00380 is tracked
    as a boundary bucket whose primary members have well-supported non-tryptophan
    core functions.
