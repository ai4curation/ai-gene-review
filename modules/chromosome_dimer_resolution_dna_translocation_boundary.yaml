id: MODULE:chromosome_dimer_resolution_dna_translocation_boundary
title: Chromosome dimer resolution and DNA translocation boundary
description: Boundary module for Pseudomonas putida KT2440 chromosome dimer resolution and division-coupled DNA translocation. The module captures XerC and XerD as the cytoplasmic tyrosine recombinases that resolve chromosome dimers, FtsK as the septal membrane DNA translocase that coordinates chromosome segregation with cell division and activates Xer recombination, and PP_2841 as a related integrase-family recombinase candidate outside the core XerCD-FtsK system.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition.tsv
  title: PSEPK chromosome/cell-cycle functional-bucket partition
  statement: The chromosome/cell-cycle functional bucket was split into curation-scale sub-batches; xerD, PP_2841, ftsK, and xerC form the chromosome dimer resolution and DNA translocation boundary sub-batch.
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_xer_ftsk.tsv
  title: PSEPK Xer/FtsK chromosome dimer resolution sub-batch
  statement: The completed sub-batch separates the core XerC/XerD-FtsK chromosome dimer resolution system from the related PP_2841 integrase-family side candidate.
- source_id: file:PSEPK/xerC/xerC-ai-review.yaml
  title: PSEPK xerC gene review
  statement: The curated xerC review supports XerC as a cytoplasmic tyrosine-based site-specific recombinase involved in chromosome dimer resolution and chromosome segregation.
- source_id: file:PSEPK/xerD/xerD-ai-review.yaml
  title: PSEPK xerD gene review
  statement: The curated xerD review supports XerD as a cytoplasmic tyrosine-based site-specific recombinase involved in chromosome dimer resolution and chromosome segregation.
- source_id: file:PSEPK/ftsK/ftsK-ai-review.yaml
  title: PSEPK ftsK gene review
  statement: The curated ftsK review supports FtsK as a septal membrane DNA translocase coupling cell division with chromosome segregation and XerCD-mediated chromosome dimer resolution.
- source_id: file:PSEPK/PP_2841/PP_2841-ai-review.yaml
  title: PSEPK PP_2841 gene review
  statement: The curated PP_2841 review supports a predicted tyrosine recombinase/integrase-family activity but does not support including PP_2841 in the core XerCD-FtsK chromosome dimer resolution system.
