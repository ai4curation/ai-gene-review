knowledge_gaps:
  - gap_statement: Kinase vs. Scaffold Function of IRAK4 remains unresolved in the IL-1 signaling 
      pathway module.
    boundary: A major unresolved question concerns the relative importance of IRAK4's kinase 
      activity versus its scaffolding function. The clinical failure of the IRAK4 kinase inhibitor 
      zimlovisertib in rheumatoid arthritis and hidradenitis suppurativa suggests that kinase-only 
      inhibition may be insufficient in some inflammatory contexts 
      (kalliolias2024targetingtlrsignaling pages 8-10, kalliolias2024targetingtlrsignaling pages 
      5-6...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/il1_signaling-deep-research-falcon.md
  - gap_statement: IRAK Compensation and Redundancy remains unresolved in the IL-1 signaling pathway
      module.
    boundary: Evidence indicates that IRAK1 can compensate for IRAK4 loss in certain leukemia 
      models, suggesting that monotherapy targeting IRAK4 alone may be insufficient 
      (vick2025iraksignalingin pages 11-12).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/il1_signaling-deep-research-falcon.md
  - gap_statement: Myddosome Spatial Organization remains unresolved in the IL-1 signaling pathway 
      module.
    boundary: The recent discovery that myddosome clustering regulates both digital and analog 
      signaling outputs raises questions about how this spatial organization is achieved in 
      different cell types and physiological contexts (cao2023myddosomeclusteringin pages 13-15, 
      cao2023myddosomeclusteringin pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/il1_signaling-deep-research-falcon.md
  - gap_statement: Developmental Compensation remains unresolved in the IL-1 signaling pathway 
      module.
    boundary: Intriguingly, germline IL-1R2 knockout mice do not recapitulate the augmented germinal
      center phenotype observed upon conditional adult deletion, implying that developmental 
      compensatory mechanisms can counteract IL-1R2 loss when it occurs early in life 
      (kim2024il1receptordynamics pages 4-5). The molecular nature of this compensation is unknown.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/il1_signaling-deep-research-falcon.md
  - gap_statement: Evolutionary Questions remains unresolved in the IL-1 signaling pathway module.
    boundary: While TIR domains are found across all kingdoms of life-in bacterial defense systems, 
      plant NLR immunity, and animal innate immunity-the functional relationship between these 
      domains remains incompletely understood (boraschi2022whatisil1 pages 2-3, 
      wang2025il1superfamilyacross pages 11-12).
