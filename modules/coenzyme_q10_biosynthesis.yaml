id: MODULE:coenzyme_q10_biosynthesis
title: Coenzyme Q10 (ubiquinone) biosynthesis (PDSS1/2, COQ2-COQ9)
description: >-
  Coenzyme Q10 (ubiquinone-10) is the lipophilic electron/proton carrier of the mitochondrial inner
  membrane that shuttles electrons from respiratory Complexes I and II (and from electron-transfer
  flavoprotein, dihydroorotate dehydrogenase and others) to Complex III, and is a membrane antioxidant.
  Its biosynthesis has two arms that meet at the matrix face of the inner membrane. First, the C50
  polyisoprenoid tail is built: the all-trans-decaprenyl-diphosphate synthase, a heterotetramer of PDSS1
  and PDSS2, condenses (2E,6E)-farnesyl diphosphate with isopentenyl diphosphate units to all-trans-
  decaprenyl diphosphate. The polytopic inner-membrane prenyltransferase COQ2 then attaches this tail to
  the ring precursor 4-hydroxybenzoate, committing it to the pathway. A series of ring modifications,
  carried out by a membrane-associated multienzyme assembly (the "COQ synthome"/complex Q), converts the
  polyprenyl-hydroxybenzoate to ubiquinol: FAD-dependent hydroxylation by COQ6, C-methylation by the
  SAM-dependent methyltransferase COQ5, Zn-dependent C1 decarboxylation by COQ4, di-iron C6 hydroxylation
  by COQ7 (whose lipophilic substrate is bound and presented by the lipid-binding protein COQ9), and the
  two O-methylation steps performed by COQ3 (not covered here). Assembly and activity of the synthome
  require the atypical UbiB-family kinase/ATPases COQ8A and COQ8B. The exact order of the head-group
  modifications in humans is not fully resolved, and the enzymes act within the synthome complex rather
  than as free-standing steps. Defects in any of these genes cause primary coenzyme Q10 deficiency, a
  clinically heterogeneous mitochondrial disease (encephalomyopathy, cerebellar ataxia, steroid-resistant
  nephrotic syndrome, Leigh syndrome), some forms of which are partially responsive to oral CoQ10.
status: DRAFT
evidence:
  - source_id: GO:0006744
    title: ubiquinone biosynthetic process
    statement: PDSS1/2 and COQ2-COQ9 together carry out ubiquinone (CoQ10) biosynthesis (GO:0006744).
  - source_id: file:human/PDSS1/PDSS1-ai-review.yaml
    title: PDSS1 gene review (human)
    statement: The decaprenyl-diphosphate synthase subunit (UniProtKB:Q5T2R2, GO:0097269) matches the completed human PDSS1 review.
  - source_id: file:human/PDSS2/PDSS2-ai-review.yaml
    title: PDSS2 gene review (human)
    statement: The decaprenyl-diphosphate synthase subunit (UniProtKB:Q86YH6, GO:0097269) matches the completed human PDSS2 review.
  - source_id: file:human/COQ2/COQ2-ai-review.yaml
    title: COQ2 gene review (human)
    statement: The 4-hydroxybenzoate polyprenyltransferase step (UniProtKB:Q96H96, GO:0008412) matches the completed human COQ2 review.
  - source_id: file:human/COQ6/COQ6-ai-review.yaml
    title: COQ6 gene review (human)
    statement: The FAD-dependent ring hydroxylase step (UniProtKB:Q9Y2Z9, GO:0106364) matches the completed human COQ6 review.
  - source_id: file:human/COQ5/COQ5-ai-review.yaml
    title: COQ5 gene review (human)
    statement: The C-methyltransferase step (UniProtKB:Q5HYK3, GO:0008425) matches the completed human COQ5 review.
  - source_id: file:human/COQ4/COQ4-ai-review.yaml
    title: COQ4 gene review (human)
    statement: The Zn-dependent decarboxylase / synthome-organizer (UniProtKB:Q9Y3A0, GO:0120539) matches the completed human COQ4 review.
  - source_id: file:human/COQ7/COQ7-ai-review.yaml
    title: COQ7 gene review (human)
    statement: The di-iron 3-demethoxyubiquinone hydroxylase step (UniProtKB:Q99807, GO:0160224) matches the completed human COQ7 review.
  - source_id: file:human/COQ9/COQ9-ai-review.yaml
    title: COQ9 gene review (human)
    statement: The lipid-binding substrate-presenter for COQ7 (UniProtKB:O75208, GO:0008289/GO:0019840) matches the completed human COQ9 review.
  - source_id: file:human/COQ8A/COQ8A-ai-review.yaml
    title: COQ8A gene review (human)
    statement: The atypical UbiB-family kinase/ATPase synthome regulator (UniProtKB:Q8NI60, GO:0006744) matches the completed human COQ8A review.
  - source_id: file:human/COQ8B/COQ8B-ai-review.yaml
    title: COQ8B gene review (human)
    statement: The atypical UbiB-family kinase synthome regulator (UniProtKB:Q96D53, GO:0006744) matches the completed human COQ8B review.
module:
  id: coenzyme_q10_biosynthesis
  label: Coenzyme Q10 (ubiquinone) biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: ubiquinone biosynthetic process
      term:
        id: GO:0006744
        label: ubiquinone biosynthetic process
      description: De novo synthesis of coenzyme Q10 from 4-hydroxybenzoate and the decaprenyl tail.
  context:
    cellular_components:
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: COQ2 and the COQ synthome are associated with the matrix face of the inner membrane.
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: PDSS1/2, COQ5, COQ8A/B and other synthome subunits act on the matrix side.
  parts:
    - order: 1
      role: decaprenyl (C50) tail synthesis
      node:
        id: decaprenyl_pp_synthesis
        label: Decaprenyl-diphosphate synthase (PDSS1 + PDSS2)
        module_type: REACTION
        annotons:
          - id: pdss_activity
            label: "PDSS1/PDSS2: all-trans-decaprenyl-diphosphate synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PDSS / trans-polyprenyl-diphosphate synthase family
                term:
                  id: PANTHER:PTHR12001
                  label: TRANS-PRENYLTRANSFERASE
                representative_members:
                  - preferred_term: PDSS1 (human)
                    term:
                      id: UniProtKB:Q5T2R2
                      label: All trans-polyprenyl-diphosphate synthase PDSS1
                  - preferred_term: PDSS2 (human)
                    term:
                      id: UniProtKB:Q86YH6
                      label: All trans-polyprenyl-diphosphate synthase PDSS2
            function:
              preferred_term: all-trans-decaprenyl-diphosphate synthase activity
              term:
                id: GO:0097269
                label: all-trans-decaprenyl-diphosphate synthase activity
              substrates:
                - preferred_term: (2E,6E)-farnesyl diphosphate
                - preferred_term: isopentenyl diphosphate (7x)
              products:
                - preferred_term: all-trans-decaprenyl diphosphate
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/PDSS1/PDSS1-ai-review.yaml
                  statement: PDSS1+PDSS2 form the heterotetrameric decaprenyl-diphosphate synthase (GO:0032478 complex) that builds the C50 CoQ10 side chain
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Builds the all-trans-decaprenyl (C50) tail of CoQ10.
    - order: 2
      role: ring prenylation
      node:
        id: ring_prenylation
        label: 4-hydroxybenzoate polyprenyltransferase (COQ2)
        module_type: REACTION
        annotons:
          - id: coq2_activity
            label: "COQ2: 4-hydroxybenzoate polyprenyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ2 / UbiA prenyltransferase family
                term:
                  id: PANTHER:PTHR11048
                  label: 4-HYDROXYBENZOATE POLYPRENYLTRANSFERASE
                representative_members:
                  - preferred_term: COQ2 (human)
                    term:
                      id: UniProtKB:Q96H96
                      label: 4-hydroxybenzoate polyprenyltransferase, mitochondrial
            function:
              preferred_term: 4-hydroxybenzoate polyprenyltransferase activity
              term:
                id: GO:0008412
                label: 4-hydroxybenzoate polyprenyltransferase activity
              substrates:
                - preferred_term: 4-hydroxybenzoate
                - preferred_term: all-trans-decaprenyl diphosphate (Mg2+)
              products:
                - preferred_term: 3-decaprenyl-4-hydroxybenzoate
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/COQ2/COQ2-ai-review.yaml
                  statement: Polytopic inner-membrane UbiA-family prenyltransferase; attaches the decaprenyl tail to 4-hydroxybenzoate, committing the ring to CoQ synthesis
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: Attaches the decaprenyl tail to 4-hydroxybenzoate.
    - order: 3
      role: ring C5 hydroxylation
      node:
        id: c5_hydroxylation
        label: Ubiquinone biosynthesis monooxygenase (COQ6)
        module_type: REACTION
        annotons:
          - id: coq6_activity
            label: "COQ6: FAD-dependent ring hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ6 / ubiquinone biosynthesis monooxygenase family
                term:
                  id: PANTHER:PTHR43876
                  label: UBIQUINONE BIOSYNTHESIS MONOOXYGENASE COQ6
                representative_members:
                  - preferred_term: COQ6 (human)
                    term:
                      id: UniProtKB:Q9Y2Z9
                      label: Ubiquinone biosynthesis monooxygenase COQ6, mitochondrial
            function:
              preferred_term: 4-hydroxy-3-all-trans-polyprenylbenzoate oxygenase activity
              term:
                id: GO:0106364
                label: 4-hydroxy-3-all-trans-polyprenylbenzoate oxygenase activity
              substrates:
                - preferred_term: 3-decaprenyl-4-hydroxybenzoate ring intermediate
                - preferred_term: O2 (FAD; electrons via ferredoxin FDX2/FDXR)
              products:
                - preferred_term: hydroxylated (C5) ring intermediate
              evidence:
                - source_id: file:human/COQ6/COQ6-ai-review.yaml
                  statement: FAD-dependent (GO:0071949) flavoprotein monooxygenase; ring hydroxylation step of the COQ synthome; deficiency = COQ10D6 (nephrotic syndrome + deafness)
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: FAD-dependent hydroxylation of the CoQ ring intermediate.
    - order: 4
      role: ring C2 methylation
      node:
        id: c2_methylation
        label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase (COQ5)
        module_type: REACTION
        annotons:
          - id: coq5_activity
            label: "COQ5: C-methyltransferase (SAM)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ5 / 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase family
                term:
                  id: PANTHER:PTHR43591
                  label: 2-METHOXY-6-POLYPRENYL-1,4-BENZOQUINOL METHYLASE, MITOCHONDRIAL
                representative_members:
                  - preferred_term: COQ5 (human)
                    term:
                      id: UniProtKB:Q5HYK3
                      label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase, mitochondrial
            function:
              preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              term:
                id: GO:0008425
                label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              substrates:
                - preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: C2-methylated ring intermediate
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: file:human/COQ5/COQ5-ai-review.yaml
                  statement: Class I SAM-dependent methyltransferase; sole C-methylation (C2) of the CoQ ring; part of the COQ synthome
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: SAM-dependent C-methylation of the CoQ ring.
    - order: 5
      role: ring C1 decarboxylation (+ synthome organization)
      node:
        id: c1_decarboxylation
        label: COQ4 (Zn decarboxylase / synthome organizer)
        module_type: REACTION
        annotons:
          - id: coq4_activity
            label: "COQ4: 4-hydroxy-3-methoxy-5-polyprenylbenzoate decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ4 family
                term:
                  id: PANTHER:PTHR12922
                  label: UBIQUINONE BIOSYNTHESIS PROTEIN COQ4
                representative_members:
                  - preferred_term: COQ4 (human)
                    term:
                      id: UniProtKB:Q9Y3A0
                      label: Ubiquinone biosynthesis protein COQ4 homolog, mitochondrial
            function:
              preferred_term: 4-hydroxy-3-methoxy-5-polyprenylbenzoate decarboxylase activity
              term:
                id: GO:0120539
                label: 4-hydroxy-3-methoxy-5-polyprenylbenzoate decarboxylase activity
              substrates:
                - preferred_term: 4-hydroxy-3-methoxy-5-polyprenylbenzoate ring intermediate (Zn2+)
              products:
                - preferred_term: C1-decarboxylated ring intermediate
                - preferred_term: CO2
              evidence:
                - source_id: file:human/COQ4/COQ4-ai-review.yaml
                  statement: Zn2+-dependent C1 decarboxylase (recent 2024 biochemistry) that also structurally organizes/stabilizes the COQ synthome; deficiency = COQ10D7
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: Zn-dependent C1 decarboxylation; scaffolds the COQ synthome.
    - order: 6
      role: ring C6 hydroxylation
      node:
        id: c6_hydroxylation
        label: 3-demethoxyubiquinone hydroxylase (COQ7)
        module_type: REACTION
        annotons:
          - id: coq7_activity
            label: "COQ7: di-iron 3-demethoxyubiquinone 3-hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ7 / di-iron demethoxyubiquinone hydroxylase family
                term:
                  id: PANTHER:PTHR11237
                  label: 5-DEMETHOXYUBIQUINONE HYDROXYLASE, MITOCHONDRIAL
                representative_members:
                  - preferred_term: COQ7 (human)
                    term:
                      id: UniProtKB:Q99807
                      label: 5-demethoxyubiquinone hydroxylase, mitochondrial
            function:
              preferred_term: 3-demethoxyubiquinone 3-hydroxylase (NADH) activity
              term:
                id: GO:0160224
                label: 3-demethoxyubiquinone 3-hydroxylase (NADH) activity
              substrates:
                - preferred_term: 3-demethoxyubiquinol (DMQ)
                - preferred_term: O2 (carboxylate-bridged di-iron center)
              products:
                - preferred_term: 3-demethylubiquinol
              evidence:
                - source_id: file:human/COQ7/COQ7-ai-review.yaml
                  statement: Ferritin-like carboxylate-bridged di-iron hydroxylase (NOT flavin); penultimate CoQ step; substrate presented by COQ9; deficiency = COQ10D8
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: Di-iron C6 hydroxylation of demethoxyubiquinol (penultimate step).
    - order: 7
      role: substrate presentation to COQ7
      node:
        id: substrate_presentation
        label: Lipid-binding presenter (COQ9)
        module_type: REACTION
        annotons:
          - id: coq9_activity
            label: "COQ9: lipid-binding substrate presenter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ9 family
                term:
                  id: PANTHER:PTHR21427
                  label: UBIQUINONE BIOSYNTHESIS PROTEIN COQ9
                representative_members:
                  - preferred_term: COQ9 (human)
                    term:
                      id: UniProtKB:O75208
                      label: Ubiquinone biosynthesis protein COQ9, mitochondrial
            processes:
              - preferred_term: ubiquinone biosynthetic process
                term:
                  id: GO:0006744
                  label: ubiquinone biosynthetic process
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Non-catalytic lipid-binding protein; binds and presents the lipophilic DMQ substrate to
              COQ7 (COQ7:COQ9 module), activating the penultimate hydroxylation. Deficiency = COQ10D5.
    - order: 8
      role: synthome assembly/activation
      node:
        id: synthome_regulation
        label: Atypical UbiB-family kinase/ATPase (COQ8A + COQ8B)
        module_type: REACTION
        annotons:
          - id: coq8_activity
            label: "COQ8A/COQ8B: atypical kinase/ATPase synthome regulator"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COQ8 / ADCK (UbiB) atypical kinase family
                term:
                  id: PANTHER:PTHR43851
                  label: ATYPICAL KINASE COQ8A, MITOCHONDRIAL
                representative_members:
                  - preferred_term: COQ8A (human)
                    term:
                      id: UniProtKB:Q8NI60
                      label: Atypical kinase COQ8A, mitochondrial
                  - preferred_term: COQ8B (human)
                    term:
                      id: UniProtKB:Q96D53
                      label: Atypical kinase COQ8B, mitochondrial
            processes:
              - preferred_term: ubiquinone biosynthetic process
                term:
                  id: GO:0006744
                  label: ubiquinone biosynthetic process
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              ATP-binding UbiB-family enzymes required for assembly/activity of the COQ synthome. COQ8A's
              demonstrated activity is an ATPase (not canonical protein kinase); COQ8B has a COQ3-directed
              protein-kinase activity. COQ8A -> COQ10D4/ARCA2 ataxia; COQ8B -> COQ10D9 steroid-resistant
              nephrotic syndrome.
  connections:
    - source: decaprenyl_pp_synthesis
      target: ring_prenylation
      connection_type: PROVIDES_INPUT_FOR
      description: The decaprenyl diphosphate made by PDSS1/2 is the prenyl donor for COQ2.
    - source: ring_prenylation
      target: c5_hydroxylation
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        3-decaprenyl-4-hydroxybenzoate enters the COQ synthome for ring modification (the precise order of
        hydroxylations, methylations and decarboxylation, including the COQ3 O-methylation steps not
        modelled here, is not fully resolved in humans).
    - source: c5_hydroxylation
      target: c2_methylation
      connection_type: PROVIDES_INPUT_FOR
      description: The hydroxylated ring intermediate is C-methylated by COQ5.
    - source: c2_methylation
      target: c1_decarboxylation
      connection_type: PROVIDES_INPUT_FOR
      description: The methylated ring intermediate is decarboxylated by COQ4.
    - source: c1_decarboxylation
      target: c6_hydroxylation
      connection_type: PROVIDES_INPUT_FOR
      description: The decarboxylated demethoxyubiquinol is the substrate for the COQ7 di-iron hydroxylase.
    - source: substrate_presentation
      target: c6_hydroxylation
      connection_type: POSITIVELY_REGULATES
      description: COQ9 binds and presents the lipophilic DMQ substrate to COQ7, activating hydroxylation.
    - source: synthome_regulation
      target: c1_decarboxylation
      connection_type: POSITIVELY_REGULATES
      description: >-
        The COQ8A/COQ8B atypical kinase/ATPases are required for assembly and activity of the COQ synthome
        (represented here on the COQ4 organizer node); loss destabilises the whole complex.
  notes: >-
    Coenzyme Q10 (ubiquinone) biosynthesis (GO:0006744), grounded to ten completed human gene reviews.
    Tail: PDSS1 (Q5T2R2) + PDSS2 (Q86YH6) share PTHR12001 and form the heterotetrameric decaprenyl-
    diphosphate synthase (GO:0097269; complex GO:0032478). Ring commitment: COQ2 (Q96H96 PTHR11048,
    GO:0008412 4-HB polyprenyltransferase, inner membrane). Head-group modification (the membrane-
    associated "COQ synthome"/complex Q, GO:0110142): COQ6 (Q9Y2Z9 PTHR43876, GO:0106364 FAD monooxygenase),
    COQ5 (Q5HYK3 PTHR43591, GO:0008425 SAM C-methyltransferase), COQ4 (Q9Y3A0 PTHR12922, GO:0120539 Zn C1
    decarboxylase + synthome scaffold — the catalytic role is from 2024 biochemistry, superseding the older
    "non-catalytic scaffold" view), COQ7 (Q99807 PTHR11237, GO:0160224 di-iron C6 hydroxylase — di-iron, NOT
    flavin), with COQ9 (O75208 PTHR21427) a non-catalytic lipid-binding protein that presents the DMQ
    substrate to COQ7. The two O-methylation steps (COQ3) are not covered (COQ3 is not in the dismech gene
    set). Assembly/activity of the synthome requires the atypical UbiB-family enzymes COQ8A (Q8NI60) and
    COQ8B (Q96D53), which share PTHR43851: COQ8A's demonstrated activity is an ATPase (it explicitly LACKS
    canonical in-trans protein-kinase activity — a NOT annotation), whereas COQ8B has a demonstrated
    COQ3-directed protein-kinase activity; both are ATP-binding and regulatory rather than pathway-metabolite
    enzymes, so they are modelled with `processes` (GO:0006744) not a catalytic `function`. CoQ10 is the
    electron carrier feeding the OXPHOS Complex III curated in the respiratory-chain modules. GO term
    ids/labels verified against the local go.db. Disorders: primary CoQ10 deficiency COQ10D1-D9 (COQ2 D1,
    PDSS1 D2, PDSS2 D3, COQ8A D4, COQ9 D5, COQ6 D6, COQ4 D7, COQ7 D8, COQ8B D9), variably CoQ10-responsive.
