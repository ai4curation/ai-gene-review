id: MODULE:inorganic_nutrient_homeostasis_regulation_boundary
title: Inorganic nutrient homeostasis regulation boundary
description: Boundary module for the ppu02020 nutrient-homeostasis partition in Pseudomonas putida KT2440.
  It captures nitrogen regulation through GlnD and the NtrB/NtrC pair, phosphate starvation regulation
  through PhoR/PhoB, and potassium homeostasis through KdpD/KdpE and the KdpFABC transporter. This is
  a partition of the broad KEGG two-component-system map, not a single linear pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella two-component-system membership, but the nutrient homeostasis
    genes are curated here as a smaller boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups glnD, glnL/glnG, phoB/phoR, and the kdp genes into the nitrogen,
    phosphate, and potassium homeostasis bucket.
notes: The kdpE response regulator was curated earlier in the ppu02024 QseBC-like regulatory bucket; it
  is included here as the cognate KdpD partner for module completeness without creating a duplicate gene
  review.
