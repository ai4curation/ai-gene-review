id: MODULE:glycolate_glyoxylate_assimilation
title: Bacterial glycolate and glyoxylate assimilation
description: >-
  A reusable bacterial central-carbon module for conversion of glycolate and
  glyoxylate into metabolites that can re-enter core carbon metabolism. The
  core module starts at glycolate oxidation to glyoxylate and continues through
  the glyoxylate carboligase/tartronate-semialdehyde branch that converts
  glyoxylate-derived carbon toward glycerate. Optional glycolate-source routes,
  including phosphoglycolate salvage, can feed this core but are not required in
  every organism. Pseudomonas putida KT2440 provides local exemplars for GlcDEF
  glycolate dehydrogenase, Gcl, Hyi, and GlxR; PP_0416/PP_1907 remain
  housekeeping phosphoglycolate-salvage candidates rather than the physiological
  ppu00630 entry route.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0046487
    title: glyoxylate metabolic process
    statement: >-
      GO:0046487 grounds the module as metabolism of glyoxylate and connected
      two-carbon inputs.
  - source_id: KEGG:ppu00630
    title: Pseudomonas putida KT2440 glyoxylate and dicarboxylate metabolism
    statement: >-
      The PSEPK partition table assigns PP_0094, PP_0416, PP_1907, glcD, glcE,
      glcF, gcl, hyi, and glxR as primary KT2440 genes in the ppu00630 bucket.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_partition.tsv
    title: PSEPK pathway partition table
    statement: >-
      The local partition table separates the nine primary ppu00630 genes from
      broad KEGG spillover involving catalases, formate dehydrogenases,
      one-carbon enzymes, glycine cleavage, TCA/glyoxylate shunt enzymes, and
      other neighboring carbon-metabolism steps.
  - source_id: file:projects/P_PUTIDA/batches/ppu00630_glycolate_glyoxylate_assimilation.tsv
    title: PSEPK ppu00630 batch table
    statement: >-
      The batch table records the full 62-member KEGG ppu00630 map and marks the
      nine primary-bucket genes selected for this module pass.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__glycolate_glyoxylate_assimilation__ppu00630-deep-research-openscientist.md
    title: OpenScientist species/pathway review for PSEPK ppu00630
    statement: >-
      The species-aware report supports GlcDEF, Gcl, Hyi, and GlxR as the
      physiologically relevant PSEPK module core, flags phosphoglycolate
      phosphatase as housekeeping salvage rather than the ppu00630 entry route,
      and records GclR-mediated conditional activity as a pathway caveat.
  - source_id: file:modules/glycolate_glyoxylate_assimilation-deep-research-openscientist.md
    title: OpenScientist module review for bacterial glycolate/glyoxylate assimilation
    statement: >-
      The generic module report identifies glycolate oxidation, glyoxylate
      carboligation, and tartronate-semialdehyde reduction as the obligatory
      backbone; it treats phosphoglycolate dephosphorylation as a conditional
      feeder and hydroxypyruvate isomerization as an accessory branch.
  - source_id: file:PSEPK/PP_0416/PP_0416-uniprot.txt
    title: UniProt record for PSEPK PP_0416
    statement: >-
      UniProtKB:Q88QS2 is a reviewed phosphoglycolate phosphatase carrying
      EC 3.1.3.18 and GO:0008967 support.
  - source_id: file:PSEPK/glcD/glcD-goa.tsv
    title: GOA record for PSEPK glcD
    statement: >-
      Q88GH8 GOA includes glycolate dehydrogenase activity and membership in the
      glycolate oxidase complex.
  - source_id: file:PSEPK/glcE/glcE-goa.tsv
    title: GOA record for PSEPK glcE
    statement: >-
      Q88GH7 GOA includes EC-derived glycolate dehydrogenase activity for the
      FAD-binding GlcE subunit.
  - source_id: file:PSEPK/glcF/glcF-goa.tsv
    title: GOA record for PSEPK glcF
    statement: >-
      Q88GH6 GOA includes EC-derived glycolate dehydrogenase activity and
      iron-sulfur cluster binding annotations for the GlcF electron-transfer
      subunit.
  - source_id: file:PSEPK/gcl/gcl-goa.tsv
    title: GOA record for PSEPK gcl
    statement: >-
      Q88F03 GOA includes tartronate-semialdehyde synthase activity and
      glyoxylate catabolic process support.
  - source_id: file:PSEPK/hyi/hyi-goa.tsv
    title: GOA record for PSEPK hyi
    statement: >-
      Q88F02 GOA includes hydroxypyruvate isomerase activity and glyoxylate
      metabolic process support.
  - source_id: file:PSEPK/glxR/glxR-goa.tsv
    title: GOA record for PSEPK glxR
    statement: >-
      Q88F01 GOA includes 2-hydroxy-3-oxopropionate reductase activity and
      glyoxylate metabolic process support.
notes: >-
  PSEPK interpretation after species-aware review: GlcDEF, Gcl, Hyi, and GlxR
  form the physiologically relevant glycolate-to-glycerate module core. PP_0416,
  PP_1907, and PP_0094 may be phosphoglycolate/small-phosphometabolite salvage
  enzymes, but they should not be counted as the physiological glycolate-entry
  route for KT2440 ppu00630 because KT2440 lacks the CBB/photorespiratory
  context that makes 2-phosphoglycolate a major glycolate source. The Gcl/Hyi/
  GlxR branch is genetically present but conditionally active because the branch
  is repressed in wild-type KT2440 and derepressed in ethylene-glycol-adapted
  contexts. This module deliberately excludes the broader KEGG ppu00630 spillover
  into catalase, formate dehydrogenase, glycine cleavage, one-carbon folate, TCA,
  glyoxylate shunt, and downstream glycerate kinase reactions. AceA/GlcB
  glyoxylate-shunt logic should remain in a separate glyoxylate-bypass module.
module:
  id: glycolate_glyoxylate_assimilation
  label: Bacterial glycolate and glyoxylate assimilation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glyoxylate metabolic process
      term:
        id: GO:0046487
        label: glyoxylate metabolic process
      description: >-
        Process-level grounding for glyoxylate conversion and linked glycolate
        assimilation steps.
  context:
    taxa:
      - preferred_term: bacteria
        term:
          id: NCBITaxon:2
          label: Bacteria
        description: >-
          This module represents bacterial glycolate/glyoxylate assimilation
          routes using GlcDEF-like glycolate dehydrogenase and Gcl/GlxR-like
          downstream enzymes.
  parts:
    - order: 1
      role: optional phosphoglycolate salvage input to glycolate
      optional: true
      node:
        id: phosphoglycolate_dephosphorylation
        label: Optional 2-phosphoglycolate to glycolate salvage
        module_type: REACTION
        description: >-
          A phosphoglycolate phosphatase hydrolyzes 2-phosphoglycolate to
          glycolate. This route can supply glycolate in organisms or conditions
          with appreciable 2-phosphoglycolate production, but it is optional for
          the glycolate/glyoxylate assimilation core.
        annotons:
          - id: phosphoglycolate_phosphatase
            label: Phosphoglycolate phosphatase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial phosphoglycolate phosphatase family
                term:
                  id: InterPro:IPR037512
                  label: PGPase_prok
                representative_members:
                  - preferred_term: PSEPK PP_0416 exemplar
                    term:
                      id: UniProtKB:Q88QS2
                      label: Phosphoglycolate phosphatase
                    description: Pseudomonas putida KT2440 PP_0416.
            function:
              preferred_term: phosphoglycolate phosphatase activity
              term:
                id: GO:0008967
                label: phosphoglycolate phosphatase activity
              substrates:
                - preferred_term: 2-phosphoglycolate
              products:
                - preferred_term: glycolate
                - preferred_term: phosphate
              evidence:
                - source_id: file:PSEPK/PP_0416/PP_0416-goa.tsv
                  statement: >-
                    Q88QS2 GOA includes UniRule/Rhea/EC-supported
                    phosphoglycolate phosphatase activity.
            processes:
              - preferred_term: glycolate biosynthetic process
                term:
                  id: GO:0046295
                  label: glycolate biosynthetic process
            role_description: >-
              Optional hydrolytic source of glycolate from 2-phosphoglycolate.
              In PSEPK ppu00630 this should be treated as housekeeping salvage
              context rather than the physiological glycolate-entry route.
    - order: 2
      role: glycolate oxidation to glyoxylate
      node:
        id: glcdef_glycolate_dehydrogenase
        label: GlcDEF glycolate dehydrogenase complex
        module_type: PROTEIN_COMPLEX
        description: >-
          A multicomponent bacterial glycolate dehydrogenase oxidizes glycolate
          to glyoxylate using FAD and iron-sulfur electron-transfer subunits.
        concepts:
          - preferred_term: glycolate oxidase complex
            term:
              id: GO:0009339
              label: glycolate oxidase complex
        annotons:
          - id: glcd_flavoprotein_subunit
            label: GlcD FAD-linked glycolate dehydrogenase subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GlcD glycolate oxidase/dehydrogenase family
                term:
                  id: InterPro:IPR004490
                  label: GlcD
                representative_members:
                  - preferred_term: PSEPK glcD exemplar
                    term:
                      id: UniProtKB:Q88GH8
                      label: Glycolate oxidase, putative FAD-linked subunit
                    description: Pseudomonas putida KT2440 glcD/PP_3745.
            function:
              preferred_term: glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
              substrates:
                - preferred_term: glycolate
              products:
                - preferred_term: glyoxylate
              cofactors:
                - preferred_term: FAD
                  term:
                    id: GO:0071949
                    label: FAD binding
              evidence:
                - source_id: file:PSEPK/glcD/glcD-goa.tsv
                  statement: >-
                    Q88GH8 GOA includes glycolate dehydrogenase activity and
                    glycolate oxidase complex membership.
            processes:
              - preferred_term: glyoxylate metabolic process
                term:
                  id: GO:0046487
                  label: glyoxylate metabolic process
            role_description: >-
              FAD-linked catalytic subunit of the GlcDEF glycolate dehydrogenase
              complex.
          - id: glce_fad_binding_subunit
            label: GlcE FAD-binding glycolate dehydrogenase subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GlcE glycolate oxidase/dehydrogenase family
                term:
                  id: PANTHER:PTHR11748:SF103
                  label: GLYCOLATE OXIDASE SUBUNIT GLCE
                representative_members:
                  - preferred_term: PSEPK glcE exemplar
                    term:
                      id: UniProtKB:Q88GH7
                      label: Glycolate oxidase, putative FAD-binding subunit
                    description: Pseudomonas putida KT2440 glcE/PP_3746.
            function:
              preferred_term: contributes to glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
              substrates:
                - preferred_term: glycolate
              products:
                - preferred_term: glyoxylate
              cofactors:
                - preferred_term: FAD
                  term:
                    id: GO:0071949
                    label: FAD binding
              evidence:
                - source_id: file:PSEPK/glcE/glcE-goa.tsv
                  statement: >-
                    Q88GH7 GOA includes EC-derived glycolate dehydrogenase
                    activity and FAD-binding support.
            role_description: >-
              FAD-binding component of the GlcDEF complex; represented as a
              contribution to the complex-level glycolate dehydrogenase activity.
          - id: glcf_iron_sulfur_subunit
            label: GlcF iron-sulfur glycolate dehydrogenase subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GlcF glycolate oxidase iron-sulfur subunit family
                term:
                  id: InterPro:IPR012257
                  label: Glc_ox_4Fe-4S
                representative_members:
                  - preferred_term: PSEPK glcF exemplar
                    term:
                      id: UniProtKB:Q88GH6
                      label: Glycolate oxidase iron-sulfur subunit
                    description: Pseudomonas putida KT2440 glcF/PP_3747.
            function:
              preferred_term: contributes to glycolate dehydrogenase activity
              term:
                id: GO:0019154
                label: glycolate dehydrogenase activity
              substrates:
                - preferred_term: glycolate
              products:
                - preferred_term: glyoxylate
              cofactors:
                - preferred_term: 4 iron, 4 sulfur cluster
                  term:
                    id: GO:0051539
                    label: 4 iron, 4 sulfur cluster binding
              evidence:
                - source_id: file:PSEPK/glcF/glcF-goa.tsv
                  statement: >-
                    Q88GH6 GOA includes glycolate dehydrogenase activity and
                    iron-sulfur cluster binding.
            role_description: >-
              Iron-sulfur electron-transfer component of the GlcDEF complex;
              represented as a contribution to the complex-level glycolate
              dehydrogenase activity.
    - order: 3
      role: glyoxylate condensation to tartronate semialdehyde
      node:
        id: glyoxylate_carboligase
        label: Glyoxylate to tartronate semialdehyde
        module_type: REACTION
        description: >-
          Glyoxylate carboligase condenses two glyoxylate molecules to
          tartronate semialdehyde with carbon dioxide release.
        annotons:
          - id: gcl_activity
            label: Glyoxylate carboligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: glyoxylate carboligase family
                term:
                  id: InterPro:IPR006397
                  label: Glyox_carbo_lig
                representative_members:
                  - preferred_term: PSEPK gcl exemplar
                    term:
                      id: UniProtKB:Q88F03
                      label: Glyoxylate carboligase
                    description: Pseudomonas putida KT2440 gcl/PP_4297.
            function:
              preferred_term: tartronate-semialdehyde synthase activity
              term:
                id: GO:0009028
                label: tartronate-semialdehyde synthase activity
              substrates:
                - preferred_term: glyoxylate
              products:
                - preferred_term: 2-hydroxy-3-oxopropanoate
                - preferred_term: carbon dioxide
              cofactors:
                - preferred_term: thiamine diphosphate
                  term:
                    id: GO:0030976
                    label: thiamine pyrophosphate binding
                - preferred_term: magnesium ion
                  term:
                    id: GO:0000287
                    label: magnesium ion binding
              evidence:
                - source_id: file:PSEPK/gcl/gcl-goa.tsv
                  statement: >-
                    Q88F03 GOA includes tartronate-semialdehyde synthase
                    activity and glyoxylate catabolic process support.
            processes:
              - preferred_term: glyoxylate catabolic process
                term:
                  id: GO:0009436
                  label: glyoxylate catabolic process
            role_description: >-
              Thiamine-diphosphate enzyme that channels glyoxylate into the
              tartronate-semialdehyde branch.
    - order: 4
      role: hydroxypyruvate and tartronate-semialdehyde interconversion
      node:
        id: hydroxypyruvate_isomerization
        label: Hydroxypyruvate isomerization
        module_type: REACTION
        description: >-
          Hydroxypyruvate isomerase interconverts hydroxypyruvate and
          tartronate semialdehyde, connecting hydroxypyruvate metabolism to the
          glyoxylate-derived tartronate-semialdehyde branch.
        annotons:
          - id: hyi_activity
            label: Hydroxypyruvate isomerase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: hydroxypyruvate isomerase family
                term:
                  id: InterPro:IPR017643
                  label: Hydroxypyruvate_isomerase
                representative_members:
                  - preferred_term: PSEPK hyi exemplar
                    term:
                      id: UniProtKB:Q88F02
                      label: Hydroxypyruvate isomerase
                    description: Pseudomonas putida KT2440 hyi/PP_4298.
            function:
              preferred_term: hydroxypyruvate isomerase activity
              term:
                id: GO:0008903
                label: hydroxypyruvate isomerase activity
              substrates:
                - preferred_term: hydroxypyruvate
              products:
                - preferred_term: 2-hydroxy-3-oxopropanoate
              evidence:
                - source_id: file:PSEPK/hyi/hyi-goa.tsv
                  statement: >-
                    Q88F02 GOA includes EC-derived hydroxypyruvate isomerase
                    activity and glyoxylate metabolic process support.
            processes:
              - preferred_term: glyoxylate metabolic process
                term:
                  id: GO:0046487
                  label: glyoxylate metabolic process
            role_description: >-
              Isomerase connecting hydroxypyruvate with the
              tartronate-semialdehyde intermediate used by GlxR.
    - order: 5
      role: tartronate semialdehyde reduction to glycerate
      node:
        id: tartronate_semialdehyde_reduction
        label: Tartronate semialdehyde to glycerate
        module_type: REACTION
        description: >-
          Tartronate semialdehyde reductase reduces
          2-hydroxy-3-oxopropanoate to glycerate, completing the branch modeled
          in this module.
        annotons:
          - id: glxr_activity
            label: Tartronate semialdehyde reductase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: tartronate semialdehyde reductase family
                term:
                  id: InterPro:IPR006398
                  label: Tartro_sem_red
                representative_members:
                  - preferred_term: PSEPK glxR exemplar
                    term:
                      id: UniProtKB:Q88F01
                      label: Tartronate semialdehyde reductase
                    description: Pseudomonas putida KT2440 glxR/PP_4299.
            function:
              preferred_term: 2-hydroxy-3-oxopropionate reductase activity
              term:
                id: GO:0008679
                label: 2-hydroxy-3-oxopropionate reductase activity
              substrates:
                - preferred_term: 2-hydroxy-3-oxopropanoate
                - preferred_term: NADH or NADPH
              products:
                - preferred_term: glycerate
                - preferred_term: NAD+ or NADP+
              cofactors:
                - preferred_term: NAD binding
                  term:
                    id: GO:0051287
                    label: NAD binding
                - preferred_term: NADP binding
                  term:
                    id: GO:0050661
                    label: NADP binding
              evidence:
                - source_id: file:PSEPK/glxR/glxR-goa.tsv
                  statement: >-
                    Q88F01 GOA includes 2-hydroxy-3-oxopropionate reductase
                    activity and glyoxylate metabolic process support.
            processes:
              - preferred_term: glyoxylate metabolic process
                term:
                  id: GO:0046487
                  label: glyoxylate metabolic process
            role_description: >-
              NAD(P)-dependent reductase that converts tartronate semialdehyde
              to glycerate.
  connections:
    - source: phosphoglycolate_dephosphorylation
      target: glcdef_glycolate_dehydrogenase
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Phosphoglycolate phosphatase can produce glycolate, the substrate
        oxidized by the GlcDEF glycolate dehydrogenase complex, but this is an
        optional glycolate-source route rather than the physiological PSEPK
        ppu00630 entry route.
      evidence:
        - source_id: file:PSEPK/PP_0416/PP_0416-uniprot.txt
          statement: >-
            PP_0416 UniProt records 2-phosphoglycolate hydrolysis to glycolate
            and phosphate.
        - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__glycolate_glyoxylate_assimilation__ppu00630-deep-research-openscientist.md
          statement: >-
            The species-aware report flags phosphoglycolate phosphatase as
            housekeeping salvage rather than the physiological glycolate-entry
            route in KT2440.
        - source_id: file:PSEPK/glcD/glcD-goa.tsv
          statement: >-
            GlcD GOA includes glycolate dehydrogenase activity.
    - source: glcdef_glycolate_dehydrogenase
      target: glyoxylate_carboligase
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        GlcDEF oxidizes glycolate to glyoxylate, supplying the glyoxylate used
        by glyoxylate carboligase.
      evidence:
        - source_id: file:PSEPK/glcF/glcF-uniprot.txt
          statement: >-
            GlcF UniProt records the glycolate-to-glyoxylate reaction for the
            glycolate oxidase/dehydrogenase complex.
        - source_id: file:PSEPK/gcl/gcl-goa.tsv
          statement: >-
            Gcl GOA includes tartronate-semialdehyde synthase activity and
            glyoxylate catabolic process.
    - source: glyoxylate_carboligase
      target: tartronate_semialdehyde_reduction
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Glyoxylate carboligase produces tartronate semialdehyde
        (2-hydroxy-3-oxopropanoate), the substrate reduced by GlxR.
      evidence:
        - source_id: file:PSEPK/gcl/gcl-uniprot.txt
          statement: >-
            Gcl UniProt records condensation of two glyoxylate molecules to
            2-hydroxy-3-oxopropanoate and carbon dioxide.
        - source_id: file:PSEPK/glxR/glxR-goa.tsv
          statement: >-
            GlxR GOA includes 2-hydroxy-3-oxopropionate reductase activity.
    - source: hydroxypyruvate_isomerization
      target: tartronate_semialdehyde_reduction
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Hyi can provide the same tartronate-semialdehyde intermediate from
        hydroxypyruvate, connecting hydroxypyruvate metabolism to the GlxR
        reduction step.
      evidence:
        - source_id: file:PSEPK/hyi/hyi-goa.tsv
          statement: >-
            Hyi GOA includes hydroxypyruvate isomerase activity and glyoxylate
            metabolic process support.
        - source_id: file:PSEPK/glxR/glxR-goa.tsv
          statement: >-
            GlxR GOA includes 2-hydroxy-3-oxopropionate reductase activity.
