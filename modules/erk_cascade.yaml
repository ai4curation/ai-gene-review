id: MODULE:erk_cascade
title: ERK1/2 (Ras-RAF-MEK-ERK) MAPK cascade module
description: >-
  A taxon-neutral decomposition of the canonical Ras-RAF-MEK-ERK
  mitogen-activated protein kinase cascade, the concrete ERK1/2 realization of
  the generic three-tier MAP kinase relay (MODULE:mapk_relay). The cascade
  converts receptor-proximal tyrosine-phosphorylation events into ERK1/ERK2
  activity and a proliferative/differentiation transcriptional program, and is
  deployed downstream of many distinct receptor systems: receptor tyrosine
  kinases (EGFR, FGFR, PDGFR, insulin/IGF), cytokine receptors signaling through
  JAKs, G-protein-coupled receptors, and integrins. The module captures: (1)
  recruitment of SH2/SH3 adaptors (GRB2, SHC) to a receptor phosphotyrosine; (2)
  GRB2-mediated recruitment of the Ras guanine nucleotide exchange factor SOS;
  (3) the Ras GTPase switch (HRAS/KRAS/NRAS) loaded with GTP; (4) the conforming
  ERK kinase relay - Ras-driven RAF(MAP3K) -> MEK1/2(MAP2K) -> ERK1/2(MAPK) on
  the TEY motif - declared as an inner bundle that `conforms_to` mapk_relay; (5)
  ERK action on nuclear (ELK1/Ets, RSK, MSK) and cytoplasmic substrates to drive
  transcription, proliferation, and differentiation; and (6) negative regulation
  by RasGAPs (e.g. NF1), DUSP/MKP dual-specificity phosphatases, and
  Sprouty/SPRED feedback inhibitors. Grounded in GO:0000165 (MAPK cascade) /
  GO:0070371 (ERK1 and ERK2 cascade).
status: DRAFT
evidence:
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The module is grounded in the GO biological process term for the MAPK
      cascade, an intracellular protein kinase cascade containing at least a
      MAPK, a MAP2K, and a MAP3K acting in series.
  - source_id: GO:0070371
    title: ERK1 and ERK2 cascade
    statement: >-
      The terminal tier of this module is the ERK1/ERK2 cascade, the
      classical mitogen-responsive MAPK module.
  - source_id: GO:0007265
    title: Ras protein signal transduction
    statement: >-
      The switch tier is grounded in Ras protein signal transduction: GTP-bound
      Ras transmits the signal from receptor-recruited GEFs to the RAF kinases.
notes: >-
  This module is the concrete ERK1/2 branch of the generic three-tier MAP kinase
  relay (MODULE:mapk_relay): the inner `erk_relay` node bundles the RAF -> MEK ->
  ERK tiers and declares conformance to that motif, while the receptor-proximal
  adaptor/GEF/Ras-switch steps and the downstream ERK-output and negative-feedback
  steps are this cascade's free extensions around the conforming core. The module
  is intentionally a reusable "sidecar": it is deployed downstream of many
  receptor systems rather than being specific to one. It is referenced as a
  branch-point interface by the JAK-STAT signaling module
  (MODULE:jak_stat_signaling), where JAK-phosphorylated receptor tyrosines recruit
  GRB2/SHC and fork into this cascade in parallel with STAT activation; ERK in
  turn feeds back onto STATs via C-terminal serine phosphorylation. The same
  module is deployed by RTKs, GPCRs (often via PI3K/PKC or transactivation), and
  integrins. Representative UniProt members were verified against curated reviews
  in this repository; tiers without a verified local exemplar are given as family
  descriptors with preferred_term and description.
module:
  id: erk_cascade
  label: ERK1/2 (Ras-RAF-MEK-ERK) cascade
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: MAPK cascade
      term:
        id: GO:0000165
        label: MAPK cascade
      description: Three-tier MAP3K -> MAP2K -> MAPK protein kinase relay.
    - preferred_term: ERK1 and ERK2 cascade
      term:
        id: GO:0070371
        label: ERK1 and ERK2 cascade
      description: The classical mitogen-activated ERK module that this cascade culminates in.
  context:
    taxa:
      - preferred_term: eukaryotes
        description: >-
          MAPK cascades are conserved across eukaryotes; the Ras-ERK module is a
          metazoan elaboration deployed by many receptor classes.
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: receptor-proximal adaptor recruitment
      node:
        id: adaptor_recruitment
        label: GRB2/SHC adaptor recruitment to receptor phosphotyrosine
        module_type: REGULATORY_STEP
        description: >-
          SH2-domain adaptors (GRB2 directly, or SHC then GRB2) recognize a
          phosphotyrosine motif on an activated receptor (or receptor-associated
          kinase) and use their SH3 domains to recruit the Ras GEF SOS to the
          membrane. This step couples the upstream receptor to the Ras switch.
        annotons:
          - id: grb2_shc_adaptor
            label: GRB2/SHC adaptor function
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GRB2/SHC adaptor proteins
                description: SH2/SH3 (GRB2) and PTB/SH2 (SHC) adaptors that link receptor phosphotyrosines to SOS.
            function:
              preferred_term: phosphotyrosine residue binding
              term:
                id: GO:0001784
                label: phosphotyrosine residue binding
              description: SH2/PTB recognition of the activated-receptor phosphotyrosine docking site.
            role_description: Bridges the activated receptor to the Ras guanine nucleotide exchange factor.
    - order: 2
      role: Ras GEF activation
      node:
        id: ras_gef_activation
        label: SOS guanine nucleotide exchange on Ras
        module_type: REACTION
        description: >-
          The recruited GEF (SOS1/SOS2) catalyzes GDP-for-GTP exchange on Ras,
          switching Ras to its active GTP-bound state.
        annotons:
          - id: sos_gef
            label: SOS Ras GEF activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SOS Ras GEFs
                description: Son-of-sevenless guanine nucleotide exchange factors SOS1/SOS2.
            function:
              preferred_term: guanyl-nucleotide exchange factor activity
              term:
                id: GO:0005085
                label: guanyl-nucleotide exchange factor activity
              targets:
                - preferred_term: Ras GTPase
            role_description: Loads GTP onto Ras, activating the switch.
    - order: 3
      role: Ras GTPase switch
      node:
        id: ras_switch
        label: Ras GTPase switch
        module_type: REACTION
        description: >-
          GTP-bound Ras (HRAS, KRAS, or NRAS) adopts the active conformation and
          recruits/activates RAF kinases. Intrinsic and GAP-stimulated GTP
          hydrolysis returns Ras to the off state.
        concepts:
          - preferred_term: Ras protein signal transduction
            term:
              id: GO:0007265
              label: Ras protein signal transduction
        annotons:
          - id: ras_gtpase
            label: Ras GTPase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ras GTPases (HRAS/KRAS/NRAS)
                description: Classical Ras small GTPases that act as the binary switch of the cascade.
                representative_members:
                  - preferred_term: KRAS
                    term:
                      id: UniProtKB:P01116
                      label: GTPase KRas
                  - preferred_term: HRAS
                    term:
                      id: UniProtKB:P01112
                      label: GTPase HRas
                  - preferred_term: NRAS
                    term:
                      id: UniProtKB:P01111
                      label: GTPase NRas
            function:
              preferred_term: GTPase activity
              term:
                id: GO:0003924
                label: GTPase activity
            processes:
              - preferred_term: Ras protein signal transduction
                term:
                  id: GO:0007265
                  label: Ras protein signal transduction
            role_description: Binary molecular switch coupling SOS to RAF.
    - order: 4
      role: ERK kinase relay (conforms to mapk_relay)
      node:
        id: erk_relay
        label: ERK kinase relay (RAF -> MEK -> ERK)
        module_type: REACTION
        description: >-
          The three-tier kinase relay of the ERK cascade: GTP-Ras-activated RAF
          (MAP3K) phosphorylates MEK1/2 (MAP2K), which dually phosphorylates
          ERK1/2 (MAPK) on its TEY activation-loop motif. This bundle is an
          instance of the generic three-tier MAP kinase relay.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              RAF -> MEK1/2 -> ERK1/2 fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
          - order: 1
            role: MAP3K tier (RAF)
            node:
              id: raf_map3k
              label: RAF MAP kinase kinase kinase activation
              module_type: REACTION
              description: >-
                Active Ras recruits RAF kinases (RAF1/CRAF, BRAF, ARAF) to the
                membrane, where they dimerize and become active MAP3Ks that
                phosphorylate MEK.
              annotons:
                - id: raf_kinase
                  label: RAF MAP3K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RAF kinases
                      description: RAF1/CRAF, BRAF, ARAF serine/threonine MAP3Ks.
                      representative_members:
                        - preferred_term: BRAF
                          term:
                            id: UniProtKB:P15056
                            label: Serine/threonine-protein kinase B-raf
                  function:
                    preferred_term: MAP kinase kinase kinase activity
                    term:
                      id: GO:0004709
                      label: MAP kinase kinase kinase activity
                    targets:
                      - preferred_term: MEK1/MEK2
                  role_description: Top kinase tier; phosphorylates and activates MEK.
          - order: 2
            role: MAP2K tier (MEK)
            node:
              id: mek_map2k
              label: MEK1/MEK2 MAP kinase kinase activation
              module_type: REACTION
              description: >-
                RAF phosphorylates the dual-specificity MAP2Ks MEK1 (MAP2K1) and
                MEK2 (MAP2K2), which in turn phosphorylate ERK on both threonine
                and tyrosine of its activation-loop TEY motif.
              annotons:
                - id: mek_kinase
                  label: MEK MAP2K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: MEK1/MEK2 (MAP2K1/MAP2K2)
                      description: Dual-specificity MAP kinase kinases dedicated to the ERK tier.
                  function:
                    preferred_term: MAP kinase kinase activity
                    term:
                      id: GO:0004708
                      label: MAP kinase kinase activity
                    targets:
                      - preferred_term: ERK1/ERK2 TEY motif
                  role_description: Middle kinase tier; dual-specificity activation of ERK.
          - order: 3
            role: MAPK tier (ERK)
            node:
              id: erk_mapk
              label: ERK1/ERK2 MAP kinase activation
              module_type: REACTION
              description: >-
                Dually phosphorylated ERK1 (MAPK3) and ERK2 (MAPK1) become active
                proline-directed serine/threonine kinases, dimerize, and act on
                cytoplasmic and (after nuclear translocation) nuclear substrates.
              annotons:
                - id: erk_kinase
                  label: ERK1/ERK2 MAP kinase activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: ERK1/ERK2 (MAPK3/MAPK1)
                      description: The terminal effector kinases of the classical MAPK cascade.
                      representative_members:
                        - preferred_term: ERK2 (MAPK1)
                          term:
                            id: UniProtKB:P28482
                            label: Mitogen-activated protein kinase 1
                  function:
                    preferred_term: MAP kinase activity
                    term:
                      id: GO:0004707
                      label: MAP kinase activity
                  locations:
                    - preferred_term: nucleus
                      term:
                        id: GO:0005634
                        label: nucleus
                  role_description: Effector kinase that transduces the cascade output to substrates.
        connections:
          - source: raf_map3k
            target: mek_map2k
            connection_type: CAUSES
            description: RAF phosphorylates and activates MEK1/2.
          - source: mek_map2k
            target: erk_mapk
            connection_type: CAUSES
            description: MEK dually phosphorylates ERK1/2.
    - order: 5
      role: ERK transcriptional and effector output
      node:
        id: erk_output
        label: ERK effector and transcriptional output
        module_type: REGULATORY_STEP
        description: >-
          Active ERK phosphorylates nuclear transcription factors and kinases
          (ELK1 and other Ets factors, RSK, MSK) and numerous cytoplasmic
          substrates, driving immediate-early gene transcription, cell-cycle
          entry, proliferation, and differentiation.
        annotons:
          - id: erk_substrate_output
            label: ERK substrate phosphorylation and transcriptional activation
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            processes:
              - preferred_term: positive regulation of transcription by RNA polymerase II
                term:
                  id: GO:0045944
                  label: positive regulation of transcription by RNA polymerase II
            role_description: Converts ERK activity into a proliferation/differentiation gene program.
    - order: 6
      role: negative regulation and feedback
      node:
        id: mapk_negative_regulation
        label: Negative regulation of the MAPK cascade
        module_type: REGULATORY_STEP
        description: >-
          The cascade is restrained by RasGAPs that accelerate Ras GTP hydrolysis
          (e.g. NF1/neurofibromin), DUSP/MKP dual-specificity phosphatases that
          dephosphorylate ERK, and ERK-induced Sprouty/SPRED feedback inhibitors.
        parts:
          - order: 1
            role: RasGAP-mediated switch-off
            node:
              id: rasgap_step
              label: RasGAP acceleration of Ras GTP hydrolysis
              module_type: REACTION
              annotons:
                - id: rasgap_role
                  label: RasGAP function
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RasGAPs (e.g. NF1, RASA1)
                      description: GTPase-activating proteins that switch Ras off.
                      representative_members:
                        - preferred_term: NF1 (neurofibromin)
                          term:
                            id: UniProtKB:P21359
                            label: Neurofibromin
                  processes:
                    - preferred_term: negative regulation of Ras signaling
                      description: Stimulates Ras GTP hydrolysis to terminate the signal.
                  role_description: Returns Ras to its inactive GDP-bound state.
          - order: 2
            role: DUSP/MKP dephosphorylation of ERK
            node:
              id: dusp_step
              label: DUSP/MKP dephosphorylation of ERK
              module_type: REACTION
              annotons:
                - id: dusp_role
                  label: DUSP/MKP phosphatase function
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: DUSP/MKP dual-specificity phosphatases
                      description: ERK-inactivating dual-specificity (Thr/Tyr) MAP kinase phosphatases.
                  role_description: Dephosphorylates the ERK activation loop to terminate signaling.
  connections:
    - source: adaptor_recruitment
      target: ras_gef_activation
      connection_type: PROVIDES_INPUT_FOR
      description: Adaptors recruit the Ras GEF SOS to the membrane.
    - source: ras_gef_activation
      target: ras_switch
      connection_type: CAUSES
      description: SOS loads GTP onto Ras, activating the switch.
    - source: ras_switch
      target: erk_relay
      connection_type: CAUSES
      description: GTP-Ras recruits and activates the RAF tier of the ERK relay.
    - source: erk_relay
      target: erk_output
      connection_type: PROVIDES_INPUT_FOR
      description: Active ERK phosphorylates nuclear and cytoplasmic substrates.
    - source: mapk_negative_regulation
      target: ras_switch
      connection_type: NEGATIVELY_REGULATES
      description: RasGAPs switch Ras off.
    - source: mapk_negative_regulation
      target: erk_mapk
      connection_type: NEGATIVELY_REGULATES
      description: DUSP/MKP phosphatases dephosphorylate ERK.
