id: MODULE:bacterial_dna_replication
title: Bacterial DNA replication
description: Boundary module for KEGG ppu03030 DNA replication in Pseudomonas putida KT2440. The strict chromosome-replication
  core includes DnaA origin recognition/initiation, DnaB/DnaG primosome function, SSB-coated single-stranded DNA, DNA polymerase
  III synthesis with beta-clamp and clamp-loader subunits, DnaQ proofreading, RNA-primer removal by RNase H and PolA, and
  NAD-dependent nick sealing by LigA. The KEGG map also includes LigB and DnaQ-like exonuclease or DnaB-like helicase candidates
  that are retained as satisfiable boundary members pending module-level evidence.
status: DRAFT
evidence:
- source_id: KEGG:ppu03030
  title: DNA replication - Pseudomonas putida KT2440
  statement: KEGG ppu03030 provides the organism-specific PSEPK DNA-replication batch containing primosome, SSB, DNA polymerase
    III, RNase H, PolA, ligase, and exonuclease/helicase boundary proteins.
- source_id: file:projects/P_PUTIDA/batches/ppu03030_bacterial_dna_replication.tsv
  title: ppu03030 first-pass batch table
  statement: The batch table records 18 KEGG ppu03030 membership genes and their local first-pass review, curation, and Asta-retrieval
    status.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The ppu02020 partition table classifies dnaA as a DNA-replication spillover rather than a two-component-system
    member.
- source_id: file:PSEPK/dnaA/dnaA-ai-review.yaml
  title: Curated dnaA review
  statement: The dnaA review accepts DNA replication origin binding, ATP binding, cytoplasm, DNA replication, DNA replication
    initiation, and regulation of DNA replication.
- source_id: file:PSEPK/dnaB/dnaB-ai-review.yaml
