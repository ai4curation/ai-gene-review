  statement: PP_0978 is retained as a low-evidence Pol III chi-like candidate and no GO function is promoted from the ProtNLM-only
    product name.
notes: 'First-pass interpretation: dnaA, dnaB, dnaG, ssb, dnaEA, dnaN, dnaQ, dnaX, holA, holB, holC, rnhA, rnhB, polA, and
  ligA form the main satisfiable DNA replication story. PP_3893, PP_0353, PP_4768, and ligB are retained as boundary members
  whose pathway placement should be revisited after Falcon or literature-level module review. dnaA was added from the ppu02020
  spillover partition because it is DNA-replication initiation context, not two-component signaling. The replication-accessory/polymerase
  split adds Hda reinitiation control, PP_2270 helicase/primase context, PP_2273 type-A polymerase boundary context, RarA
  stalled-replication ATPase context, and Rep helicase. PP_0978 remains an unpromoted low-evidence chi-like candidate.'
