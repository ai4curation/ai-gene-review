          - id: pp2482_moaa_like_candidate
            label: "PP_2482: MoaA-like radical-SAM candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2482
            function:
              preferred_term: GTP 3',8'-cyclase activity
              term:
                id: GO:0061798
                label: GTP 3',8'-cyclase activity
            processes:
              - preferred_term: Mo-molybdopterin cofactor biosynthetic process
