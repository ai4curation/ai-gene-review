id: MODULE:molybdopterin_biosynthesis_sulfur_relay_boundary
title: Molybdopterin biosynthesis sulfur relay boundary
description: >-
  Boundary module for the ppu04122 molybdopterin/MoCo sulfur-relay subset in
  Pseudomonas putida KT2440. The satisfiable first-pass pathway covers MoaA and
  MoaC formation of cyclic pyranopterin monophosphate, MoeB activation of the
  MoaD sulfur-carrier subunit, MoaE/MoaD molybdopterin synthase chemistry, and
  MoaB/Mog-family support for Mo-molybdopterin cofactor biosynthesis. The
  PP_1969 and PP_2482 MoaA-like paralogs and the moaB-I/moaB-II paralog pair
  remain boundary candidates with unresolved paralog-specific roles.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04122
    title: Sulfur relay system - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04122 provides the organism-specific sulfur-relay umbrella that
      includes the molybdopterin/MoCo subset alongside Tus/MnmA tRNA thiolation,
      ThiS thiamine sulfur-carrier context, and rhodanese/mercaptopyruvate
      sulfurtransferase side nodes.
  - source_id: file:projects/P_PUTIDA/batches/ppu04122_sulfur_relay_system_partition.tsv
    title: ppu04122 sulfur-relay partition table
    statement: >-
      The partition separates moeB, moaC, moaD, moaE, PP_1969, moaB-I,
      PP_2482, moaA, and moaB-II into the molybdopterin/MoCo sulfur-relay bucket.
  - source_id: file:PSEPK/moeB/moeB-ai-review.yaml
    title: Curated moeB review
    statement: >-
      The moeB review accepts molybdopterin-synthase adenylyltransferase
      activity and removes electronic rhodanese/sulfotransferase assignments
      that do not match the MoaD activation reaction.
  - source_id: file:PSEPK/moaD/moaD-ai-review.yaml
    title: Curated moaD review
    statement: >-
      The moaD review accepts Mo-molybdopterin cofactor biosynthesis and
      molybdopterin adenylyltransferase-complex context for the MoaD sulfur
      carrier subunit.
  - source_id: file:PSEPK/moaE/moaE-ai-review.yaml
    title: Curated moaE review
    statement: >-
      The moaE review accepts molybdopterin synthase activity as the catalytic
      sulfur-insertion endpoint for molybdopterin formation.
  - source_id: file:PSEPK/moaA/moaA-ai-review.yaml
    title: Curated moaA review
    statement: >-
      The moaA review accepts GTP 3',8'-cyclase activity and Mo-molybdopterin
      cofactor biosynthesis for the canonical radical-SAM MoaA enzyme.
notes: >-
  First-pass interpretation: moaA is the canonical MoaA radical-SAM GTP
  cyclase, while PP_1969 and PP_2482 are MoaA-like paralog candidates retained
  as boundary members. moaC performs the cyclic pyranopterin monophosphate
  synthase step. moeB adenylylates MoaD, and MoaD/MoaE carry out the
  molybdopterin synthase sulfur-transfer step. moaB-I and moaB-II are
  MoaB/Mog-family support proteins for MoCo biosynthesis but their exact
  paralog-specific assignments remain unresolved.
module:
  id: molybdopterin_biosynthesis_sulfur_relay_boundary
  label: Molybdopterin biosynthesis sulfur relay boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: Mo-molybdopterin cofactor biosynthetic process
      term:
        id: GO:0006777
        label: Mo-molybdopterin cofactor biosynthetic process
      description: Biosynthesis of the molybdenum-containing molybdopterin cofactor branch.
    - preferred_term: GTP 3',8'-cyclase activity
      term:
        id: GO:0061798
        label: GTP 3',8'-cyclase activity
      description: MoaA radical-SAM conversion of GTP to the cyclic GTP-derived precursor.
    - preferred_term: cyclic pyranopterin monophosphate synthase activity
      term:
        id: GO:0061799
        label: cyclic pyranopterin monophosphate synthase activity
      description: MoaC formation of cyclic pyranopterin monophosphate.
    - preferred_term: molybdopterin-synthase adenylyltransferase activity
      term:
        id: GO:0061605
        label: molybdopterin-synthase adenylyltransferase activity
      description: MoeB ATP-dependent adenylylation of the MoaD sulfur-carrier subunit.
    - preferred_term: sulfur carrier activity
      term:
        id: GO:0097163
        label: sulfur carrier activity
      description: MoaD sulfur-carrier role in the molybdopterin synthase relay.
    - preferred_term: molybdopterin synthase activity
      term:
        id: GO:0030366
        label: molybdopterin synthase activity
      description: MoaE/MoaD sulfur insertion into cPMP to produce molybdopterin.
    - preferred_term: molybdopterin adenylyltransferase complex
      term:
        id: GO:1990133
        label: molybdopterin adenylyltransferase complex
      description: MoeB/MoaD activation-complex context.
  context:
    cellular_components:
