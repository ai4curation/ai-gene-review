        label: MoaA-family GTP cyclization
        module_type: REACTION
        description: >-
          MoaA is the radical-SAM GTP 3',8-cyclase. PP_1969 and PP_2482 are
          MoaA-like paralog candidates retained as boundary members until their
          exact division of labor is resolved.
        annotons:
          - id: moaa_canonical_gtp_cyclase
            label: "moaA: canonical MoaA radical-SAM GTP cyclase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: moaA
            function:
              preferred_term: GTP 3',8'-cyclase activity
              term:
                id: GO:0061798
                label: GTP 3',8'-cyclase activity
            processes:
              - preferred_term: Mo-molybdopterin cofactor biosynthetic process
                term:
                  id: GO:0006777
                  label: Mo-molybdopterin cofactor biosynthetic process
            role_description: Canonical MoaA radical-SAM enzyme for the first cPMP-branch reaction.
          - id: pp1969_moaa_like_candidate
