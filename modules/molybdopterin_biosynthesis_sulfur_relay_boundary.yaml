                label: molybdopterin-synthase adenylyltransferase activity
            processes:
              - preferred_term: Mo-molybdopterin cofactor biosynthetic process
                term:
                  id: GO:0006777
                  label: Mo-molybdopterin cofactor biosynthetic process
            role_description: ATP-dependent adenylyltransferase for the MoaD sulfur carrier.
