  knowledge_gaps:
    - gap_statement: >-
        The paralog-specific roles of PP_1969, PP_2482, and canonical moaA in
        KT2440 molybdopterin cofactor biosynthesis are unresolved.
      boundary: >-
        All three proteins have MoaA-like radical-SAM annotations, but current
        first-pass evidence does not explain whether they are redundant,
        condition-specific, or tied to different molybdoenzyme branches.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        The functional division between moaB-I and moaB-II is unresolved.
      boundary: >-
        Both proteins are MoaB/Mog-family candidates with Mo-molybdopterin
        biosynthesis annotations, but their exact biochemical step or partner
        specificity was not established in the first-pass review.
      gap_kind:
        - BIOLOGY
        - CURATION
