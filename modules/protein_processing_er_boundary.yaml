id: MODULE:protein_processing_er_boundary
title: Protein processing in endoplasmic reticulum boundary
description: >-
  Boundary/absence module for KEGG ppu04141 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains PP_3234 and PP_3312, predicted
  HSP20-family small heat shock proteins, plus htpG/PP_4179, the bacterial
  Hsp90-family ATP-dependent chaperone. These are bacterial cytosolic
  heat-shock/protein-quality-control factors and should not be interpreted as
  evidence for endoplasmic-reticulum protein processing in a bacterium.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04141
    title: Protein processing in endoplasmic reticulum - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04141 provides the PSEPK curation batch, but the
      organism-specific membership is limited to PP_3234, PP_3312, and
      htpG/PP_4179.
  - source_id: file:projects/P_PUTIDA/batches/ppu04141_protein_processing_er_boundary.tsv
    title: ppu04141 first-pass batch table
    statement: >-
      The batch table records two HSP20-family proteins and HtpG as the three
      candidate review rows for this KEGG bucket.
  - source_id: UniProtKB:Q88HW9
    title: Heat shock protein, HSP20 family
    statement: >-
      UniProt classifies PP_3234 as a small heat shock protein with an
      alpha-crystallin/HSP20 domain.
  - source_id: UniProtKB:Q88HP1
    title: Heat shock protein
    statement: >-
      UniProt classifies PP_3312 as a small heat shock protein with an
      alpha-crystallin/HSP20 domain.
  - source_id: UniProtKB:Q88FB9
    title: Chaperone protein HtpG
    statement: >-
      UniProt describes htpG as bacterial Hsp90/HtpG, a cytoplasmic
      ATP-dependent protein folding chaperone with ATPase activity.
  - source_id: file:PSEPK/PP_3234/PP_3234-ai-review.yaml
    title: Curated PP_3234 review
    statement: >-
      The first-pass PP_3234 review adds a conservative NEW unfolded-protein
      binding annotation from HSP20-family/domain evidence.
  - source_id: file:PSEPK/PP_3312/PP_3312-ai-review.yaml
    title: Curated PP_3312 review
    statement: >-
      The first-pass PP_3312 review adds a conservative NEW unfolded-protein
      binding annotation from HSP20-family/domain evidence.
  - source_id: file:PSEPK/htpG/htpG-ai-review.yaml
    title: Curated htpG review
    statement: >-
      The htpG review accepts ATP-dependent protein folding chaperone, ATP
      hydrolysis, protein folding, and cytoplasmic localization.
module:
  id: protein_processing_er_boundary
  label: Protein processing in endoplasmic reticulum boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: endoplasmic-reticulum protein-processing pathway absence
      description: >-
        Boundary interpretation of the KEGG map: KT2440 is a bacterium and the
        ppu04141 members are cytosolic heat-shock chaperones, not ER-resident
        folding, glycosylation, translocation, or ERAD machinery.
    - preferred_term: unfolded protein binding
      term:
        id: GO:0051082
        label: unfolded protein binding
      description: Conservative molecular function inferred for the two HSP20-family proteins.
    - preferred_term: ATP-dependent protein folding chaperone
      term:
        id: GO:0140662
        label: ATP-dependent protein folding chaperone
      description: Native HtpG/Hsp90 molecular function.
    - preferred_term: ATP hydrolysis activity
      term:
        id: GO:0016887
        label: ATP hydrolysis activity
      description: ATPase activity driving the HtpG conformational cycle.
    - preferred_term: protein folding
      term:
        id: GO:0006457
        label: protein folding
      description: Bacterial proteostasis context for HtpG and heat-shock chaperones.
  parts:
    - order: 1
      role: Endoplasmic-reticulum pathway absence
      node:
        id: er_protein_processing_absence
        label: Endoplasmic-reticulum protein-processing absence in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 lacks an endoplasmic reticulum. The ppu04141
          membership is treated as a KEGG cross-map artifact around conserved
          chaperones rather than as a satisfiable ER pathway.
        annotons: []
    - order: 2
      role: Small heat shock protein holdase side nodes
      node:
        id: hsp20_holdase_chaperones
        label: HSP20-family small heat shock proteins
        module_type: MOLECULAR_FUNCTION
        description: >-
          PP_3234 and PP_3312 are predicted HSP20-family small heat shock
          proteins. The conservative first-pass call is unfolded-protein
          binding/holdase chaperone context; specific client proteins and stress
          phenotypes remain unresolved.
        annotons:
          - id: pp3234_hsp20_unfolded_protein_binding
            label: "PP_3234: HSP20-family unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3234
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            role_description: Predicted small heat shock protein/holdase side node; not ER protein processing.
          - id: pp3312_hsp20_unfolded_protein_binding
            label: "PP_3312: HSP20-family unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3312
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            role_description: Predicted small heat shock protein/holdase side node; not ER protein processing.
    - order: 3
      role: Bacterial Hsp90/HtpG chaperone side node
      node:
        id: htpG_hsp90_chaperone
        label: htpG bacterial Hsp90-family chaperone
        module_type: MOLECULAR_FUNCTION
        description: >-
          htpG encodes the bacterial Hsp90-family chaperone HtpG, a cytoplasmic
          ATP-dependent protein-folding chaperone that contributes to protein
          quality control and stress-responsive proteostasis.
        annotons:
          - id: htpG_atp_dependent_chaperone
            label: "htpG: ATP-dependent protein folding chaperone"
            participant:
              selector_type: GENE
              gene:
                preferred_term: htpG
            function:
              preferred_term: ATP-dependent protein folding chaperone
              term:
                id: GO:0140662
                label: ATP-dependent protein folding chaperone
              substrates:
                - preferred_term: non-native client protein
              cofactors:
                - preferred_term: ATP
            processes:
              - preferred_term: protein folding
                term:
                  id: GO:0006457
                  label: protein folding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Bacterial cytosolic Hsp90/HtpG chaperone; not an ER-resident folding factor.
          - id: htpG_atpase_activity
            label: "htpG: chaperone ATPase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: htpG
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
              substrates:
                - preferred_term: ATP
              products:
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: ATPase cycle supporting HtpG chaperone conformational changes.
  notes: >-
    This module records an explicit boundary/absence call. The PSEPK members
    belong with bacterial cytosolic heat-shock/proteostasis biology; no
    endoplasmic-reticulum protein-processing GO annotation is proposed for any
    KT2440 gene.
