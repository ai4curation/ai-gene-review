id: MODULE:dicty_dif1_biosynthesis
title: Dictyostelium DIF-1 (differentiation-inducing factor 1) biosynthesis
description: >-
  Biosynthesis of DIF-1, the chlorinated polyketide morphogen that induces
  prestalk/stalk cell differentiation in the social amoeba Dictyostelium
  discoideum. The pathway builds and tailors a hexanoyl-primed acylphloroglucinol
  in three enzymatic stages: (1) the hybrid type I/type III "steely" polyketide
  synthase StlB condenses a hexanoyl-CoA starter with malonyl-CoA extender units
  to make the acylphloroglucinol backbone THPH (1-(3,5-dihydroxy-... phloro-
  caprophenone); (2) the flavin-dependent halogenase ChlA chlorinates THPH,
  first to 3-chloro-THPH and then to 3,5-dichloro-THPH (des-methyl-DIF-1); and
  (3) the O-methyltransferase DmtA methylates des-methyl-DIF-1 to yield mature
  DIF-1. DIF-1 is then secreted and read out by the prestalk transcriptional
  machinery (DimA/DimB). This module is Dictyostelium-specific but phrased over
  enzyme functions and family selectors with D. discoideum representative members
  rather than a fixed gene list, so a related steely-PKS / halogenase / O-MT
  route in another dictyostelid could be substituted. OUT OF SCOPE: the DIF-1
  RESPONSE (DimA/DimB-driven prestalk/prespore patterning; a separate module),
  DIF-1 dechlorination/inactivation (the DIF catabolic arm), and the additional
  O-methylation intermediates upstream of chlorination — only the three named,
  reviewed enzymes StlB, ChlA and DmtA are grounded here.
status: DRAFT
evidence:
  - source_id: GO:0031148
    title: DIF-1 biosynthetic process
    statement: >-
      The module is grounded in the GO term DIF-1 biosynthetic process
      (GO:0031148); all three steps carry this process annotation.
  - source_id: file:DICDI/stlB/stlB-ai-review.yaml
    title: stlB gene review (Dictyostelium discoideum)
    statement: >-
      The backbone-synthesis step grounding (UniProtKB:Q54FI3, GO:0106265 THPH
      synthase activity) matches the completed stlB review, which identifies StlB
      as the steely PKS making the acylphloroglucinol backbone of DIF-1.
  - source_id: file:DICDI/chlA/chlA-ai-review.yaml
    title: chlA gene review (Dictyostelium discoideum)
    statement: >-
      The chlorination step grounding (UniProtKB:Q54FI4, GO:0140907 flavin-
      dependent halogenase activity; GO:0106266 / GO:0106267 chloro-THPH synthase
      activities) matches the completed chlA review.
  - source_id: file:DICDI/dmtA/dmtA-ai-review.yaml
    title: dmtA gene review (Dictyostelium discoideum)
    statement: >-
      The final O-methylation step grounding (UniProtKB:Q8T638, GO:0106268
      3,5-dichloro-THPH methyltransferase activity) matches the completed dmtA
      review, which identifies DmtA as the des-methyl-DIF-1 methyltransferase.
notes: >-
  Dictyostelium-specific secondary-metabolite/morphogen module grounded to the
  three reviewed enzymes StlB (Q54FI3, GO:0106265), ChlA (Q54FI4, GO:0140907)
  and DmtA (Q8T638, GO:0106268). GO molecular-function terms were taken from the
  completed DICDI gene reviews; each step uses a PANTHER family selector (generic
  over orthologs) plus the concrete D. discoideum representative member. The
  canonical pathway also includes O-methylation intermediates between the StlB
  product and the ChlA chlorination steps; these are noted but not separately
  grounded here because only StlB, ChlA and DmtA are experimentally characterised
  and reviewed. Named to signal Dictyostelium scope so it does not collide with a
  generic reusable polyketide/secondary-metabolite module.
module:
  id: dicty_dif1_biosynthesis
  label: DIF-1 biosynthesis (StlB -> ChlA -> DmtA)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: DIF-1 biosynthetic process
      term:
        id: GO:0031148
        label: DIF-1 biosynthetic process
      description: >-
        Synthesis of the chlorinated acylphloroglucinol morphogen DIF-1 that
        induces prestalk/stalk differentiation.
  parts:
    - order: 1
      role: polyketide backbone synthesis (acylphloroglucinol)
      node:
        id: stlb_step
        label: hexanoyl-CoA + malonyl-CoA to THPH (acylphloroglucinol backbone) + CoA + CO2
        module_type: REACTION
        annotons:
          - id: stlb_activity
            label: "StlB: steely (hybrid type I/III) polyketide synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Polyketide synthase 44 / steely PKS family (StlB)
                term:
                  id: PANTHER:PTHR45681
                  label: POLYKETIDE SYNTHASE 44-RELATED
                representative_members:
                  - preferred_term: StlB (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54FI3
                      label: Steely2 / polyketide synthase StlB
            function:
              preferred_term: THPH synthase activity
              term:
                id: GO:0106265
                label: THPH synthase activity
              substrates:
                - preferred_term: hexanoyl-CoA (starter)
                - preferred_term: malonyl-CoA (extender)
              products:
                - preferred_term: THPH (an acylphloroglucinol / phlorocaprophenone)
                - preferred_term: CoA
                - preferred_term: carbon dioxide
              evidence:
                - source_id: file:DICDI/stlB/stlB-ai-review.yaml
                  statement: StlB makes the acylphloroglucinol backbone of DIF-1
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Hybrid type I fatty-acid-synthase / type III chalcone-synthase
              "steely" enzyme that primes with hexanoyl-CoA and cyclises malonyl
              extensions into the acylphloroglucinol THPH, the polyketide backbone
              of DIF-1.
    - order: 2
      role: chlorination of the backbone (to des-methyl-DIF-1)
      node:
        id: chla_step
        label: THPH + 2 chloride to 3,5-dichloro-THPH (des-methyl-DIF-1)
        module_type: REACTION
        annotons:
          - id: chla_activity
            label: "ChlA: FAD-dependent halogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: FAD-binding halogenase family (ChlA)
                term:
                  id: PANTHER:PTHR43747
                  label: FAD-BINDING PROTEIN
                representative_members:
                  - preferred_term: ChlA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54FI4
                      label: Flavin-dependent halogenase ChlA
            function:
              preferred_term: flavin-dependent halogenase activity
              term:
                id: GO:0140907
                label: flavin-dependent halogenase activity
              substrates:
                - preferred_term: THPH
                - preferred_term: chloride
                - preferred_term: reduced FAD
                - preferred_term: dioxygen
              products:
                - preferred_term: 3,5-dichloro-THPH (des-methyl-DIF-1)
                - preferred_term: water
              evidence:
                - source_id: file:DICDI/chlA/chlA-ai-review.yaml
                  statement: ChlA chlorinates THPH to 3-chloro- then 3,5-dichloro-THPH
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Flavin-dependent halogenase that installs the two chlorines,
              converting THPH via 3-chloro-THPH (GO:0106266) to 3,5-dichloro-THPH
              (GO:0106267), i.e. des-methyl-DIF-1.
    - order: 3
      role: final O-methylation (yields mature DIF-1)
      node:
        id: dmta_step
        label: 3,5-dichloro-THPH (des-methyl-DIF-1) + SAM to DIF-1 + SAH
        module_type: REACTION
        annotons:
          - id: dmta_activity
            label: "DmtA: des-methyl-DIF-1 O-methyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DIF-1 methyltransferase family (DmtA)
                term:
                  id: PANTHER:PTHR43712
                  label: PUTATIVE (AFU_ORTHOLOGUE AFUA_4G14580)-RELATED
                representative_members:
                  - preferred_term: DmtA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q8T638
                      label: Des-methyl-DIF-1 methyltransferase DmtA
            function:
              preferred_term: 3,5-dichloro-THPH methyltransferase activity
              term:
                id: GO:0106268
                label: 3,5-dichloro-THPH methyl transferase activity
              substrates:
                - preferred_term: 3,5-dichloro-THPH (des-methyl-DIF-1)
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: DIF-1
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: file:DICDI/dmtA/dmtA-ai-review.yaml
                  statement: DmtA methylates des-methyl-DIF-1 to yield mature DIF-1
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              O-methyltransferase catalysing the final step, methylating
              des-methyl-DIF-1 (3,5-dichloro-THPH) to the active morphogen DIF-1.
  connections:
    - source: stlb_step
      target: chla_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The THPH acylphloroglucinol backbone made by StlB is the substrate that
        ChlA chlorinates.
    - source: chla_step
      target: dmta_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The 3,5-dichloro-THPH (des-methyl-DIF-1) made by ChlA is the substrate
        DmtA methylates to give mature DIF-1.
