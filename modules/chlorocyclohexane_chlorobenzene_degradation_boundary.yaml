id: MODULE:chlorocyclohexane_chlorobenzene_degradation_boundary
title: Chlorocyclohexane/chlorobenzene degradation boundary
description: >-
  Boundary module for KEGG ppu00361 in Pseudomonas putida KT2440. The PSEPK
  organism-specific map contains only catechol ortho-cleavage/beta-ketoadipate
  lower-pathway enzymes, not a complete chlorocyclohexane or chlorobenzene
  upper degradation route. The module therefore records the supported catechol
  ring-cleavage and muconate-cycloisomerase chemistry while explicitly treating
  chlorinated-aromatic degradation as pathway-map context rather than a
  satisfiable KT2440 module.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00361
    title: Chlorocyclohexane and chlorobenzene degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00361 provides the PSEPK curation batch; its KT2440 membership is
      limited to CatA paralogs and CatB, which are catechol ortho-cleavage
      beta-ketoadipate enzymes.
  - source_id: GO:0019615
    title: catechol catabolic process, ortho-cleavage
    statement: >-
      The supported biology is catechol ortho-cleavage rather than a complete
      chlorinated-aromatic upper pathway.
  - source_id: GO:0042952
    title: beta-ketoadipate pathway
    statement: >-
      The member enzymes feed the catechol branch of the beta-ketoadipate
      pathway.
module:
  id: chlorocyclohexane_chlorobenzene_degradation_boundary
  label: Chlorocyclohexane/chlorobenzene degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: catechol catabolic process, ortho-cleavage
      term:
        id: GO:0019615
        label: catechol catabolic process, ortho-cleavage
      description: Ortho ring cleavage of catechol to cis,cis-muconate.
    - preferred_term: beta-ketoadipate pathway
      term:
        id: GO:0042952
        label: beta-ketoadipate pathway
      description: Aromatic ring-cleavage funnel that metabolizes catechol-derived intermediates.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: The catechol branch enzymes are soluble bacterial aromatic-catabolism enzymes.
  parts:
    - order: 1
      role: Catechol ortho ring cleavage
      node:
        id: catechol_ortho_cleavage_boundary
        label: Catechol to cis,cis-muconate
        module_type: METABOLIC_PATHWAY
        description: >-
          CatA-I and CatA-II catalyze intradiol cleavage of catechol. Their
          presence in KEGG ppu00361 supports catechol lower-pathway capacity,
          but not chlorocyclohexane or chlorobenzene upper-pathway specificity.
        annotons:
          - id: catA_I_catechol_1_2_dioxygenase
            label: "catA-I/catA: catechol 1,2-dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: catA
            function:
              preferred_term: catechol 1,2-dioxygenase activity
              term:
                id: GO:0018576
                label: catechol 1,2-dioxygenase activity
              substrates:
                - preferred_term: catechol
                - preferred_term: O2
              products:
                - preferred_term: cis,cis-muconate
            role_description: Primary CatA paralog in the cat regulon catechol branch.
          - id: catA_II_catechol_1_2_dioxygenase
            label: "catA-II: catechol 1,2-dioxygenase paralog"
            participant:
              selector_type: GENE
              gene:
                preferred_term: catA-II
            function:
              preferred_term: catechol 1,2-dioxygenase activity
              term:
                id: GO:0018576
                label: catechol 1,2-dioxygenase activity
              substrates:
                - preferred_term: catechol
                - preferred_term: O2
              products:
                - preferred_term: cis,cis-muconate
            role_description: Additional catechol 1,2-dioxygenase paralog in KT2440.
    - order: 2
      role: Muconate cycloisomerization
      node:
        id: muconate_cycloisomerase_boundary
        label: cis,cis-Muconate to muconolactone
        module_type: REACTION
        description: >-
          CatB cycloisomerizes cis,cis-muconate downstream of catechol
          1,2-dioxygenase. Gene-level curation rejects chloromuconate
          cycloisomerase over-transfer for wild-type KT2440 CatB.
        annotons:
          - id: catB_muconate_cycloisomerase
            label: "catB: muconate cycloisomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: catB
            function:
              preferred_term: muconate cycloisomerase activity
              term:
                id: GO:0018849
                label: muconate cycloisomerase activity
              substrates:
                - preferred_term: cis,cis-muconate
              products:
                - preferred_term: muconolactone
            role_description: Converts cis,cis-muconate in the beta-ketoadipate catechol branch.
  connections:
    - source: catechol_ortho_cleavage_boundary
      target: muconate_cycloisomerase_boundary
      connection_type: PRECEDES
      description: CatA products feed the CatB muconate cycloisomerase step.
      chaining_status: VERIFIED
      chaining_note: >-
        Catechol 1,2-dioxygenase produces cis,cis-muconate, the substrate of
        muconate cycloisomerase.
  notes: >-
    This module is intentionally named as a boundary module. PSEPK has the
    catechol lower-pathway enzymes found on the KEGG ppu00361 map, but the
    first-pass curation does not support annotating these genes as a complete
    chlorocyclohexane/chlorobenzene degradation pathway.
