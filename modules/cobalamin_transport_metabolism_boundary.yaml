id: MODULE:cobalamin_transport_metabolism_boundary
title: Cobalamin transport and metabolism boundary
description: >-
  Boundary module for KEGG ppu04980 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains pduO/PP_1349, a corrinoid
  adenosyltransferase in cobalamin/cobamide metabolism, and metH/PP_2375, a
  cobalamin-dependent methionine synthase. This bucket supports cobalamin
  metabolism as enzyme/cofactor context, but should not be interpreted as
  evidence for a complete cobalamin transport pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04980
    title: Cobalamin transport and metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04980 provides the PSEPK curation batch, but the
      organism-specific membership is limited to pduO/PP_1349 and metH/PP_2375.
  - source_id: file:projects/P_PUTIDA/batches/ppu04980_cobalamin_transport_metabolism_boundary.tsv
    title: ppu04980 first-pass batch table
    statement: >-
      The batch table records pduO and metH as the only candidate rows for this
      KEGG bucket after worklist extraction.
  - source_id: UniProtKB:Q88N66
    title: Corrinoid adenosyltransferase
    statement: >-
      UniProt describes pduO as a corrinoid adenosyltransferase with
      cobinamide/cobalamin adenosyltransferase activity and adenosylcobalamin
      biosynthesis pathway context.
  - source_id: UniProtKB:Q88KB5
    title: Methionine synthase
    statement: >-
      UniProt describes metH as cobalamin-dependent methionine synthase
      catalyzing methyl transfer from 5-methyltetrahydrofolate to homocysteine
      to form methionine.
  - source_id: file:PSEPK/pduO/pduO-ai-review.yaml
    title: Curated pduO review
    statement: >-
      The first-pass pduO review accepts corrinoid adenosyltransferase activity
      and cobalamin biosynthetic/metabolic process terms.
  - source_id: file:PSEPK/metH/metH-ai-review.yaml
    title: Curated metH review
    statement: >-
      The first-pass metH review accepts methionine synthase activity,
      cobalamin binding, zinc binding, and homocysteine/methionine-biosynthesis
      context.
module:
  id: cobalamin_transport_metabolism_boundary
  label: Cobalamin transport and metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: cobalamin transport pathway absence
      description: >-
        Boundary interpretation of the KEGG map: the KT2440 membership contains
        cobalamin-related enzymes but no dedicated cobalamin transporter system
        components in this extracted bucket.
    - preferred_term: corrinoid adenosyltransferase activity
      term:
        id: GO:0008817
        label: corrinoid adenosyltransferase activity
      description: Native molecular function of pduO.
    - preferred_term: cobalamin biosynthetic process
      term:
        id: GO:0009236
        label: cobalamin biosynthetic process
      description: Corrinoid/cobalamin biosynthesis context for pduO.
    - preferred_term: methionine synthase activity
      term:
        id: GO:0008705
        label: methionine synthase activity
      description: Native molecular function of metH.
    - preferred_term: L-methionine biosynthetic process
      term:
        id: GO:0071265
        label: L-methionine biosynthetic process
      description: Terminal methylation of homocysteine to methionine by the MetH route.
  parts:
    - order: 1
      role: Cobalamin transport boundary
      node:
        id: cobalamin_transport_absence
        label: Cobalamin transport boundary in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The ppu04980 bucket does not by itself define a satisfiable
          cobalamin transport pathway in KT2440. The mapped genes are enzymes
          using or modifying cobalamin-family cofactors rather than transporter
          subunits.
        annotons: []
    - order: 2
      role: Corrinoid adenosylation branch
      node:
        id: pduO_corrinoid_adenosylation
        label: pduO cobalamin adenosylation
        module_type: REACTION
        description: >-
          pduO adenosylates cobinamide/cobalamin-family corrinoids and belongs
          with cobalamin/cobamide metabolism, overlapping the broader
          porphyrin/tetrapyrrole metabolism boundary.
        annotons:
          - id: pduO_corrinoid_adenosyltransferase
            label: "pduO: corrinoid adenosyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pduO
            function:
              preferred_term: corrinoid adenosyltransferase activity
              term:
                id: GO:0008817
                label: corrinoid adenosyltransferase activity
              substrates:
                - preferred_term: cob(II)alamin or cobinamide-family corrinoid
                - preferred_term: ATP
              products:
                - preferred_term: adenosylcobalamin-family corrinoid
                - preferred_term: triphosphate
            processes:
              - preferred_term: cobalamin biosynthetic process
                term:
                  id: GO:0009236
                  label: cobalamin biosynthetic process
            role_description: Corrinoid adenosylation/cobalamin-metabolism enzyme; not a transporter.
    - order: 3
      role: Cobalamin-dependent methionine biosynthesis branch
      node:
        id: metH_methionine_synthase
        label: metH cobalamin-dependent methionine synthase
        module_type: REACTION
        description: >-
          metH uses cobalamin as a cofactor to transfer a methyl group from
          5-methyltetrahydrofolate to homocysteine, connecting this KEGG bucket
          to methionine biosynthesis and one-carbon/folate metabolism.
        annotons:
          - id: metH_cobalamin_dependent_methionine_synthase
            label: "metH: cobalamin-dependent methionine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metH
            function:
              preferred_term: methionine synthase activity
              term:
                id: GO:0008705
                label: methionine synthase activity
              substrates:
                - preferred_term: 5-methyltetrahydrofolate
                - preferred_term: L-homocysteine
              products:
                - preferred_term: tetrahydrofolate
                - preferred_term: L-methionine
              cofactors:
                - preferred_term: methylcobalamin
                - preferred_term: zinc ion
            processes:
              - preferred_term: L-methionine biosynthetic process
                term:
                  id: GO:0071265
                  label: L-methionine biosynthetic process
              - preferred_term: homocysteine metabolic process
                term:
                  id: GO:0050667
                  label: homocysteine metabolic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: B12-dependent methionine synthase; cobalamin is cofactor context, not evidence for transport.
  notes: >-
    This module records a boundary interpretation for the KEGG title. pduO is
    also represented in the porphyrin/tetrapyrrole cobalamin branch, while metH
    is represented in methionine and one-carbon/folate contexts. No cobalamin
    transport GO annotation is proposed from this two-gene bucket.
