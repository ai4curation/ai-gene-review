id: MODULE:bacterial_nonhomologous_end_joining
title: Bacterial non-homologous end joining
description: >-
  Species-neutral bacterial module for Ku/LigD-mediated repair of DNA
  double-strand breaks by non-homologous end joining. The module covers the
  compact prokaryotic system in which Ku binds broken double-stranded DNA ends,
  protects and aligns them, and recruits the multifunctional LigD enzyme for
  end processing and ATP-dependent ligation. It excludes homologous
  recombination, mismatch repair, nucleotide excision repair, and eukaryotic
  multi-protein NHEJ factors.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: KEGG:ppu03450
    title: Pseudomonas putida KT2440 non-homologous end joining
    statement: >-
      The local PSEPK pathway partition assigns ku/PP_3255 and ligD/PP_3260 as
      the two primary genes in the compact KEGG ppu03450 NHEJ bucket.
  - source_id: GO:0006303
    title: double-strand break repair via nonhomologous end joining
    statement: >-
      GO:0006303 captures repair of double-strand breaks by ligating DNA ends
      without a homologous template.
  - source_id: file:PSEPK/ku/ku-uniprot.txt
    title: UniProtKB entry for PSEPK ku
    statement: >-
      Q88HU8 is a P. putida KT2440 prokaryotic Ku protein. UniProt describes it
      as acting with LigD in NHEJ, binding linear double-stranded DNA ends, and
      recruiting/stimulating LigD.
  - source_id: file:PSEPK/ligD/ligD-uniprot.txt
    title: UniProtKB entry for PSEPK ligD
    statement: >-
      Q88HU3 is a P. putida KT2440 LigD-family protein with ATP-dependent DNA
      ligase, polymerase, phosphoesterase, and NHEJ-family domain signatures.
notes: >-
  First-pass PSEPK interpretation: ku and ligD satisfy the compact bacterial
  NHEJ module. LigD carries several catalytic domains, but this module should
  not be expanded with unrelated ligases, RecA-dependent homologous
  recombination proteins, or mismatch-repair/excision-repair enzymes unless
  curating a broader DNA double-strand break response module.
