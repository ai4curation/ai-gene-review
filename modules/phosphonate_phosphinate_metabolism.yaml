  connections:
    - source: phosphonate_abc_import
      target: aep_transamination
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The PP_0824-PP_0827 transporter likely supplies intracellular organic
        phosphonate substrate(s), but this first pass does not verify that AEP
        is the transported substrate feeding PhnW.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        PhnC/PhnE/PtxB/PtxC support phosphonate import, while PhnW specifically
        transaminates AEP. The exact substrate range and direct route continuity
        need experimental or stronger comparative evidence.
    - source: pp1722_pp1726_aep_phosphonate_abc_import
      target: aep_transamination
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The PP_1722-PP_1726 transporter is annotated as a
        2-aminoethylphosphonate/phosphonate ABC import candidate, but this first
        pass does not verify direct delivery of AEP to PhnW.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        PP_1723 and PP_1724 provide stronger AEP-specific naming than the
        generic PP_1726 binding-protein record, but substrate range and pathway
        handoff still need genetic or biochemical evidence.
    - source: aep_transamination
      target: phosphonoacetaldehyde_hydrolysis
      connection_type: PRECEDES
      description: PhnW produces phosphonoacetaldehyde, the substrate hydrolyzed by PhnX.
      chaining_status: VERIFIED
      chaining_note: >-
        The upstream PhnW reaction product phosphonoacetaldehyde is explicitly
        the downstream PhnX substrate.
  notes: >-
    PSEPK ppu00440 should be interpreted as PhnWX AEP catabolism. The
    PP_0824-PP_0827 ppu02010 ABC-transporter block and PP_1722-PP_1726 ppu02024
    ABC-transporter block are curated here as phosphonate/AEP import context
    because they are substrate-coherent, not because the full ppu02010 or
    ppu02024 umbrella maps are satisfiable pathways. The module still does not
    establish a broad phosphinate route or the multi-subunit C-P lyase system;
    those would require additional mapped genes and evidence.
