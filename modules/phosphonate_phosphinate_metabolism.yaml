id: MODULE:phosphonate_phosphinate_metabolism
title: Phosphonate and phosphinate metabolism
description: >-
  Pseudomonas putida KT2440 phosphonate module combining the compact KEGG
  ppu00440 PhnW/PhnX 2-aminoethylphosphonate (AEP) catabolic route with
  separately curated phosphonate ABC import blocks from KEGG ppu02010 and
  ppu02024. PhnW transaminates AEP to phosphonoacetaldehyde, and PhnX
  hydrolyzes phosphonoacetaldehyde to acetaldehyde and inorganic phosphate.
  The transporter records capture organic phosphonate uptake capacity, including
  a PP_1722-PP_1726 AEP/phosphonate import candidate, but the exact transported
  substrate(s) and direct handoff to the PhnW/PhnX route remain a knowledge gap.
  This module is not evidence for a broad C-P lyase or phosphinate metabolism
  system.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00440
    title: Phosphonate and phosphinate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00440 provides the PSEPK curation batch. In KT2440 the mapped
      genes are PhnW and PhnX, forming a compact AEP-to-phosphate route.
  - source_id: UniProtKB:Q88KT0
    title: PhnW 2-aminoethylphosphonate--pyruvate transaminase
    statement: >-
      UniProt identifies PhnW as involved in phosphonate degradation and
      assigns the reaction converting 2-aminoethylphosphonate and pyruvate to
      phosphonoacetaldehyde and L-alanine.
  - source_id: UniProtKB:Q88KT1
    title: PhnX phosphonoacetaldehyde hydrolase
    statement: >-
      UniProt identifies PhnX as involved in phosphonate degradation and
      assigns the phosphonoacetaldehyde hydrolysis reaction that releases
      acetaldehyde and phosphate.
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contains a large ABC-transporter umbrella map. The
      PP_0824-PP_0827 locus is a coherent phosphonate-transporter sub-batch
      that belongs with phosphonate uptake context rather than with a single
      satisfiable ABC-transporter pathway.
  - source_id: UniProtKB:Q88PM5
    title: PhnC phosphonates import ATP-binding protein
    statement: >-
      UniProt describes PhnC as part of the ABC transporter complex PhnCDE
      involved in phosphonates import and assigns EC 7.3.2.2.
  - source_id: KEGG:ppu02024
    title: Quorum sensing - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02024 is an umbrella map for KT2440 that includes a coherent
      PP_1722-PP_1726 ABC-import block. This block is curated here as
      phosphonate/AEP uptake context rather than as quorum-sensing machinery.
  - source_id: UniProtKB:Q88M51
    title: PP_1723 2-aminoethylphosphonate transport system permease
    statement: >-
      UniProt names PP_1723 as a 2-aminoethylphosphonate transport-system
      permease, supporting substrate-specific context for the PP_1722-PP_1726
      importer candidate.
  - source_id: UniProtKB:Q88M50
    title: PP_1724 ABC-type 2-aminoethylphosphonate transporter permease
    statement: >-
      UniProt names PP_1724 as an ABC-type 2-aminoethylphosphonate transporter
      permease, supporting a second membrane component for the PP_1722-PP_1726
      importer candidate.
  - source_id: UniProtKB:Q88M48
    title: PP_1726 ABC transporter periplasmic binding protein
    statement: >-
      UniProt names PP_1726 as an ABC transporter periplasmic binding protein
      and predicts a signal peptide, consistent with a Gram-negative
      solute-binding component.
