id: MODULE:dicty_starvation_initiation
title: Dictyostelium starvation / growth-to-development initiation
description: >-
  The switch that commits starving Dictyostelium discoideum cells to development.
  Two inputs converge. (1) Density sensing: growing and early-starving cells
  secrete conditioned-medium factor (CMF, cmfA); only when CMF accumulates above
  a threshold (i.e. enough cells are present) can cells respond to cAMP pulses and
  aggregate, coupling cell density to developmental onset. (2) The
  growth-to-development kinase: on starvation the DYRK-family dual-specificity
  kinase YakA arrests the cell cycle and drives developmental initiation, in part
  by down-regulating the Pumilio-family translational repressor PufA; PufA
  normally binds the pkaC (PKA catalytic subunit) mRNA and represses its
  translation, so relieving PufA de-represses PKA-C, and rising PKA activity turns
  on early developmental gene expression and the cAMP-signalling machinery. The
  net YakA -| PufA -| pkaC logic is a double negative — YakA activates PKA. OUT OF
  SCOPE: the downstream cAMP relay (dicty_extracellular_camp_relay) and PKA's many
  later developmental roles; the CMF receptor CMFR1 (not yet reviewed). Phrased
  over functions and family selectors with D. discoideum representatives.
status: DRAFT
evidence:
  - source_id: GO:0031152
    title: aggregation involved in sorocarp development
    statement: >-
      The module's output is entry into the developmental (aggregation) program
      (GO:0031152) on starvation and sufficient density.
  - source_id: file:DICDI/cmfA/cmfA-ai-review.yaml
    title: cmfA gene review (Dictyostelium discoideum)
    statement: >-
      Density-sensing signal grounding (UniProtKB:P34090, GO:0048018 receptor
      ligand activity); secreted CMF gates the cAMP response.
  - source_id: file:DICDI/yakA/yakA-ai-review.yaml
    title: yakA gene review (Dictyostelium discoideum)
    statement: >-
      Growth-to-development kinase grounding (UniProtKB:Q54QV3, GO:0004712 protein
      serine/threonine/tyrosine kinase activity).
  - source_id: file:DICDI/pufA/pufA-ai-review.yaml
    title: pufA gene review (Dictyostelium discoideum)
    statement: >-
      Translational repressor grounding (UniProtKB:Q54WA7, GO:0003730 mRNA 3'-UTR
      binding); PufA represses pkaC translation.
  - source_id: file:DICDI/pkaC/pkaC-ai-review.yaml
    title: pkaC gene review (Dictyostelium discoideum)
    statement: >-
      PKA catalytic subunit grounding (UniProtKB:P34099, GO:0004691); its
      de-repression drives developmental onset.
notes: >-
  Dictyostelium-specific growth-to-development initiation module grounded to CMF
  (P34090), YakA (Q54QV3), PufA (Q54WA7) and PKA-C (P34099). GO molecular-function
  terms were taken from the completed DICDI reviews; nodes use PANTHER family
  selectors plus D. discoideum representative members, except CMF which has no
  PANTHER family and uses a GENE selector. The YakA -| PufA -| pkaC double-negative
  logic follows the pufA/yakA reviews. CMF is a parallel density-permission input.
  Named to signal Dictyostelium scope.
module:
  id: dicty_starvation_initiation
  label: Starvation initiation (CMF density gate; YakA -| PufA -| pkaC)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: aggregation involved in sorocarp development
      term:
        id: GO:0031152
        label: aggregation involved in sorocarp development
      description: >-
        Commitment of starving, sufficiently dense cells to the developmental
        (aggregation) program.
  parts:
    - order: 1
      role: cell-density sensing (quorum permission)
      node:
        id: cmf_sensing
        label: secreted CMF signals sufficient cell density
        module_type: REGULATORY_STEP
        annotons:
          - id: cmf_activity
            label: "CMF (cmfA): conditioned-medium factor / density signal"
            participant:
              selector_type: GENE
              gene:
                preferred_term: Conditioned medium factor (CMF)
                term:
                  id: UniProtKB:P34090
                  label: Conditioned medium factor
            function:
              preferred_term: receptor ligand activity
              term:
                id: GO:0048018
                label: receptor ligand activity
              evidence:
                - source_id: file:DICDI/cmfA/cmfA-ai-review.yaml
                  statement: CMF is a secreted density-sensing signal permitting the cAMP response
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Secreted glycoprotein whose accumulation reports cell density; above
              threshold it licenses cells to respond to cAMP pulses and aggregate.
    - order: 2
      role: growth-to-development kinase switch
      node:
        id: yaka_switch
        label: YakA arrests growth and initiates development on starvation
        module_type: REGULATORY_STEP
        annotons:
          - id: yaka_activity
            label: "YakA: DYRK-family growth-to-development kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DYRK dual-specificity protein kinase family (YakA)
                term:
                  id: PANTHER:PTHR24058
                  label: DUAL SPECIFICITY PROTEIN KINASE
                representative_members:
                  - preferred_term: YakA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54QV3
                      label: Dual specificity protein kinase YakA
            function:
              preferred_term: protein serine/threonine/tyrosine kinase activity
              term:
                id: GO:0004712
                label: protein serine/threonine/tyrosine kinase activity
              evidence:
                - source_id: file:DICDI/yakA/yakA-ai-review.yaml
                  statement: YakA drives the growth-to-development transition on starvation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              DYRK-family dual-specificity kinase that couples starvation to
              cell-cycle arrest and developmental initiation, down-regulating PufA.
    - order: 3
      role: translational repression of PKA (relieved by YakA)
      node:
        id: pufa_repression
        label: PufA represses pkaC mRNA translation
        module_type: REGULATORY_STEP
        annotons:
          - id: pufa_activity
            label: "PufA: Pumilio-family translational repressor of pkaC"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pumilio/PUF RNA-binding protein family (PufA)
                term:
                  id: PANTHER:PTHR12537
                  label: PUMILIO / PUF RNA-BINDING PROTEIN
                representative_members:
                  - preferred_term: PufA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54WA7
                      label: Pumilio homolog PufA
            function:
              preferred_term: mRNA 3'-UTR binding
              term:
                id: GO:0003730
                label: mRNA 3'-UTR binding
              evidence:
                - source_id: file:DICDI/pufA/pufA-ai-review.yaml
                  statement: PufA binds the pkaC mRNA 3'-UTR and represses its translation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Pumilio/PUF-family sequence-specific mRNA-binding protein that
              represses pkaC translation; its down-regulation by YakA de-represses
              PKA-C.
    - order: 4
      role: PKA de-repression and developmental onset
      node:
        id: pka_derepression
        label: de-repressed PKA-C activity drives developmental gene expression
        module_type: REGULATORY_STEP
        annotons:
          - id: pkac_activity_init
            label: "PKA-C (pkaC): cAMP-dependent protein kinase catalytic subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: cAMP-dependent protein kinase catalytic subunit family (PKA-C)
                term:
                  id: PANTHER:PTHR24353
                  label: CYCLIC NUCLEOTIDE-DEPENDENT PROTEIN KINASE
                representative_members:
                  - preferred_term: PkaC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P34099
                      label: cAMP-dependent protein kinase catalytic subunit
            function:
              preferred_term: cAMP-dependent protein kinase activity
              term:
                id: GO:0004691
                label: cAMP-dependent protein kinase activity
              evidence:
                - source_id: file:DICDI/pkaC/pkaC-ai-review.yaml
                  statement: rising PKA-C activity switches on early development
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Catalytic subunit whose translation is de-repressed as PufA falls;
              rising PKA activity turns on early developmental gene expression and
              the cAMP-signalling machinery.
  connections:
    - source: cmf_sensing
      target: yaka_switch
      connection_type: POSITIVELY_REGULATES
      description: >-
        CMF-reported sufficient density permits the developmental response; a
        parallel density gate acting alongside the YakA starvation switch.
    - source: yaka_switch
      target: pufa_repression
      connection_type: NEGATIVELY_REGULATES
      description: >-
        YakA down-regulates the PufA translational repressor at the
        growth-to-development transition.
    - source: pufa_repression
      target: pka_derepression
      connection_type: NEGATIVELY_REGULATES
      description: >-
        PufA represses pkaC translation; as YakA lowers PufA, pkaC is de-repressed
        and PKA-C activity rises (net YakA -| PufA -| pkaC double negative).
