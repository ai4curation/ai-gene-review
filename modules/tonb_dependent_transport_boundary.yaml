id: MODULE:tonb_dependent_transport_boundary
title: TonB-dependent transport energy-transduction and receptor boundary
description: Boundary module for PSEPK TonB-dependent transport. It covers TonB/ExbB/ExbD energy-transduction proteins plus
  the first-pass TonB-dependent outer-membrane receptor panel, with substrate specificity represented gene by gene.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_tonb_exbb_exbd_energy_transduction.tsv
  title: PSEPK transport/membrane/efflux TonB-ExbB-ExbD partition batch
  statement: The transport/membrane/efflux partition separates TonB/ExbB/ExbD energy-transduction proteins from TonB-dependent
    receptors and generic membrane transporters.
- source_id: PMID:11514511
  title: Involvement of the TonB system in tolerance to solvents and drugs in Pseudomonas putida DOT-T1E
  statement: The existing exbB and tonB reviews cite this Pseudomonas TonB-system study for exbB-exbD-tonB linkage and iron-limitation
    phenotypes in a close P. putida strain.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_tonb_dependent_outer_membrane_receptors.tsv
  title: PSEPK transport/membrane/efflux TonB-dependent receptor partition batch
  statement: The receptor split covers 30 TonB-dependent outer-membrane receptor genes, including ferric siderophore, CntO,
    heme, B12-family, copper-receptor, and generic receptor candidates.
module:
  id: tonb_dependent_transport_boundary
  label: TonB-dependent transport energy-transduction and receptor boundary
  module_type: TRANSPORT_STEP
  concepts:
