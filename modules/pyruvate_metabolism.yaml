id: MODULE:pyruvate_metabolism
title: Mitochondrial pyruvate fates — pyruvate dehydrogenase complex and pyruvate carboxylase
description: >-
  The two committed mitochondrial fates of pyruvate (imported from glycolysis via
  the mitochondrial pyruvate carrier). (1) Oxidative decarboxylation by the
  pyruvate dehydrogenase complex (PDC) links glycolysis to the TCA cycle:
  pyruvate + CoA + NAD+ -> acetyl-CoA + CO2 + NADH. The PDC is a giant
  mitochondrial-matrix multienzyme machine built on a 60-mer E2 (DLAT) core, with
  the thiamine-pyrophosphate-dependent E1 decarboxylase (an alpha2-beta2
  heterotetramer of PDHA1 and PDHB), the E3-binding structural subunit PDHX
  (component X) that anchors the shared E3 dihydrolipoyl dehydrogenase (DLD), and
  DLD itself which reoxidises the lipoyl arms (passing electrons to NAD+). PDC flux
  is switched off by phosphorylation of E1alpha (by the pyruvate dehydrogenase
  kinases PDK1-4) and on by dephosphorylation (by the phosphatases PDP1/2). (2)
  Carboxylation by the biotin-dependent pyruvate carboxylase (PC): pyruvate + HCO3-
  + ATP -> oxaloacetate, the principal anaplerotic reaction replenishing TCA-cycle
  oxaloacetate and the committed first step of gluconeogenesis from
  pyruvate/lactate; PC is allosterically activated by acetyl-CoA (the PDC product),
  coordinating the two fates. Inherited defects cause severe lactic acidosis and
  neurological disease: PDHA1 (X-linked, the commonest), PDHB, DLAT and PDHX
  deficiencies cause pyruvate dehydrogenase complex deficiency (Leigh syndrome
  spectrum), and PC deficiency causes lactic acidosis with hypoglycemia; DLD
  deficiency (the shared E3) gives a combined phenotype (see the BCAA and
  homocysteine/cobalamin contexts).
status: DRAFT
evidence:
  - source_id: GO:0006090
    title: pyruvate metabolic process
    statement: >-
      The module is grounded in the GO pyruvate metabolic process (GO:0006090),
      covering the oxidative-decarboxylation (PDC) and carboxylation (PC) fates.
  - source_id: Reactome:R-HSA-70268
    title: Pyruvate metabolism
    statement: >-
      Reaction stoichiometries follow the human Reactome pyruvate-metabolism
      reactions R-HSA-9861559 (PDC synthesizes acetyl-CoA from pyruvate) and
      R-HSA-70501 (PC carboxylates pyruvate to oxaloacetate).
  - source_id: file:human/PDHA1/PDHA1-ai-review.yaml
    title: PDHA1 gene review (human)
    statement: >-
      The PDC E1-alpha grounding (UniProtKB:P08559, GO:0004739 pyruvate
      dehydrogenase (acetyl-transferring) activity, GO:0045254 complex) matches the
      completed human PDHA1 review.
  - source_id: file:human/PDHB/PDHB-ai-review.yaml
    title: PDHB gene review (human)
    statement: >-
      The PDC E1-beta grounding (UniProtKB:P11177, GO:0004739, GO:0045254) matches
      the completed human PDHB review.
  - source_id: file:human/DLAT/DLAT-ai-review.yaml
    title: DLAT gene review (human)
    statement: >-
      The PDC E2 core grounding (UniProtKB:P10515, GO:0004742 dihydrolipoyllysine-
      residue acetyltransferase activity, GO:0045254) matches the completed human
      DLAT review.
  - source_id: file:human/PDHX/PDHX-ai-review.yaml
    title: PDHX gene review (human)
    statement: >-
      The E3-binding structural subunit grounding (UniProtKB:O00330, GO:0030674
      protein-macromolecule adaptor activity, GO:0045254) matches the completed
      human PDHX review (a non-catalytic scaffold anchoring DLD).
  - source_id: file:human/DLD/DLD-ai-review.yaml
    title: DLD gene review (human)
    statement: >-
      The shared E3 grounding (UniProtKB:P09622, GO:0004148 dihydrolipoyl
      dehydrogenase (NADH) activity) matches the completed human DLD review.
  - source_id: file:human/PC/PC-ai-review.yaml
    title: PC gene review (human)
    statement: >-
      The pyruvate carboxylase grounding (UniProtKB:P11498, GO:0004736 pyruvate
      carboxylase activity) matches the completed human PC review.
module:
  id: pyruvate_metabolism
  label: Mitochondrial pyruvate metabolism (PDC + pyruvate carboxylase)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyruvate metabolic process
      term:
        id: GO:0006090
        label: pyruvate metabolic process
      description: >-
        The two committed mitochondrial fates of pyruvate: oxidation to acetyl-CoA
        (PDC) and carboxylation to oxaloacetate (PC).
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of both the PDC and PC.
  parts:
    - order: 1
      role: oxidative decarboxylation to acetyl-CoA (glycolysis-to-TCA gateway)
      node:
        id: pdc_step
        label: pyruvate + CoA + NAD+ to acetyl-CoA + CO2 + NADH (pyruvate dehydrogenase complex)
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: pdha1_activity
            label: "PDHA1: PDC E1 alpha (TPP decarboxylase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pyruvate dehydrogenase E1 alpha family (PDHA1)
                term:
                  id: PANTHER:PTHR11516
                  label: PYRUVATE DEHYDROGENASE E1 COMPONENT, ALPHA SUBUNIT BACTERIAL AND ORGANELLAR
                representative_members:
                  - preferred_term: PDHA1 (human)
                    term:
                      id: UniProtKB:P08559
                      label: Pyruvate dehydrogenase E1 component subunit alpha, somatic form, mitochondrial
            function:
              preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
              term:
                id: GO:0004739
                label: pyruvate dehydrogenase (acetyl-transferring) activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: thiamine diphosphate (cofactor)
              products:
                - preferred_term: (hydroxyethyl-TPP intermediate)
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:1.2.4.1
                  statement: pyruvate dehydrogenase (acetyl-transferring); E1 component
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              TPP-dependent decarboxylase; with PDHB forms the alpha2-beta2 E1 that
              decarboxylates pyruvate and reductively acetylates the E2 lipoyl arm.
              The phosphoregulated subunit (PDK off / PDP on). X-linked; commonest
              PDC deficiency.
          - id: pdhb_activity
            label: "PDHB: PDC E1 beta"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pyruvate dehydrogenase E1 beta / transketolase-like family (PDHB)
                term:
                  id: PANTHER:PTHR11624
                  label: DEHYDROGENASE RELATED
                representative_members:
                  - preferred_term: PDHB (human)
                    term:
                      id: UniProtKB:P11177
                      label: Pyruvate dehydrogenase E1 component subunit beta, mitochondrial
            function:
              preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
              term:
                id: GO:0004739
                label: pyruvate dehydrogenase (acetyl-transferring) activity
              evidence:
                - source_id: EC:1.2.4.1
                  statement: E1 beta component of the pyruvate dehydrogenase complex
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Beta subunit of the E1 heterotetramer; completes the TPP-binding
              active site with PDHA1. Deficiency causes PDC (E1-beta) deficiency.
          - id: dlat_activity
            label: "DLAT: PDC E2 (dihydrolipoyl acetyltransferase core)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 2-oxoacid dehydrogenase E2 (dihydrolipoyl acyltransferase) family (DLAT)
                term:
                  id: PANTHER:PTHR23151
                  label: DIHYDROLIPOAMIDE ACETYL/SUCCINYL-TRANSFERASE-RELATED
                representative_members:
                  - preferred_term: DLAT (human)
                    term:
                      id: UniProtKB:P10515
                      label: Dihydrolipoyllysine-residue acetyltransferase component of pyruvate dehydrogenase complex, mitochondrial
            function:
              preferred_term: dihydrolipoyllysine-residue acetyltransferase activity
              term:
                id: GO:0004742
                label: dihydrolipoyllysine-residue acetyltransferase activity
              substrates:
                - preferred_term: S-acetyl-dihydrolipoyl intermediate
                - preferred_term: coenzyme A
              products:
                - preferred_term: acetyl-CoA
              evidence:
                - source_id: EC:2.3.1.12
                  statement: dihydrolipoyllysine-residue acetyltransferase; E2 core component
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Lipoyl-bearing E2 subunit forming the 60-mer structural core of the
              PDC; transfers the acetyl group from the lipoyl arm to CoA, yielding
              acetyl-CoA. Deficiency causes PDC (E2) deficiency; also a primary
              biliary cholangitis autoantigen.
          - id: pdhx_activity
            label: "PDHX: PDC component X / E3-binding protein (structural)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 2-oxoacid dehydrogenase E3-binding-protein family (PDHX)
                term:
                  id: PANTHER:PTHR23151
                  label: DIHYDROLIPOAMIDE ACETYL/SUCCINYL-TRANSFERASE-RELATED
                representative_members:
                  - preferred_term: PDHX (human)
                    term:
                      id: UniProtKB:O00330
                      label: Pyruvate dehydrogenase protein X component, mitochondrial
            function:
              preferred_term: protein-macromolecule adaptor activity
              term:
                id: GO:0030674
                label: protein-macromolecule adaptor activity
              evidence:
                - source_id: file:human/PDHX/PDHX-ai-review.yaml
                  statement: >-
                    Non-catalytic E3-binding scaffold (its E2-type catalytic His is
                    replaced by Ser); anchors DLD (E3) to the E2 core.
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Structural E3-binding subunit (component X): built into the E2 core,
              it binds and positions the shared E3 (DLD). Not a classic enzyme
              (catalytically dead). Deficiency causes PDC (E3BP) deficiency.
          - id: dld_activity
            label: "DLD: shared E3 (dihydrolipoyl dehydrogenase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydrolipoyl dehydrogenase / pyridine-nucleotide-disulphide oxidoreductase family (DLD)
                term:
                  id: PANTHER:PTHR22912
                  label: DISULFIDE OXIDOREDUCTASE
                representative_members:
                  - preferred_term: DLD (human)
                    term:
                      id: UniProtKB:P09622
                      label: Dihydrolipoyl dehydrogenase, mitochondrial
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
              substrates:
                - preferred_term: dihydrolipoyl-E2 (reduced lipoyl arm)
                - preferred_term: NAD+
              products:
                - preferred_term: lipoyl-E2 (reoxidised)
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.8.1.4
                  statement: dihydrolipoyl dehydrogenase; E3 component (FAD flavoenzyme, shared with OGDH/BCKDH)
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              FAD-dependent E3 that reoxidises the dihydrolipoyl arm, passing
              electrons to NAD+. The common E3 shared with the 2-oxoglutarate and
              branched-chain 2-oxoacid dehydrogenase complexes and the glycine
              cleavage system (see the BCAA catabolism module).
    - order: 2
      role: anaplerotic / gluconeogenic carboxylation to oxaloacetate
      node:
        id: pc_step
        label: pyruvate + HCO3- + ATP to oxaloacetate + ADP + Pi
        module_type: REACTION
        annotons:
          - id: pc_activity
            label: "PC: pyruvate carboxylase (biotin-dependent)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pyruvate carboxylase family (PC)
                term:
                  id: PANTHER:PTHR43778
                  label: PYRUVATE CARBOXYLASE
                representative_members:
                  - preferred_term: PC (human)
                    term:
                      id: UniProtKB:P11498
                      label: Pyruvate carboxylase, mitochondrial
            function:
              preferred_term: pyruvate carboxylase activity
              term:
                id: GO:0004736
                label: pyruvate carboxylase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
                - preferred_term: biotin (covalent cofactor)
              products:
                - preferred_term: oxaloacetate
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.4.1.1
                  statement: pyruvate carboxylase (biotin-dependent, acetyl-CoA-activated)
                - source_id: Reactome:R-HSA-70501
                  statement: "PC carboxylates PYR to OA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Biotin-dependent homotetramer; the principal anaplerotic reaction
              (replenishing TCA oxaloacetate) and the committed first step of
              gluconeogenesis from pyruvate/lactate. Allosterically activated by
              acetyl-CoA (the PDC product). Deficiency causes pyruvate carboxylase
              deficiency (severe lactic acidosis, hypoglycemia).
  connections:
    - source: pdc_step
      target: pc_step
      connection_type: POSITIVELY_REGULATES
      description: >-
        Acetyl-CoA produced by the PDC is the obligate allosteric activator of
        pyruvate carboxylase, coordinating the oxidative and anaplerotic fates of
        pyruvate (and, together, supplying acetyl-CoA + oxaloacetate for citrate
        synthesis / the TCA cycle).
  notes: >-
    The two committed mitochondrial fates of pyruvate, grounded to the human
    enzymes of the pyruvate dehydrogenase complex — PDHA1 (UniProtKB:P08559) and
    PDHB (P11177) of E1 (GO:0004739, EC 1.2.4.1), the E2 core DLAT (P10515,
    GO:0004742, EC 2.3.1.12), the E3-binding structural subunit PDHX (O00330,
    GO:0030674) and the shared E3 DLD (P09622, GO:0004148, EC 1.8.1.4), assembled
    as GO:0045254 — and pyruvate carboxylase PC (P11498, GO:0004736, EC 6.4.1.1).
    GO molecular-function/cellular-component terms were taken from the human GOA
    records; Reactome reaction ids and titles were verified against the local
    reactome cache. Each step uses a PANTHER family selector (generic over paralogs
    and orthologs) plus a concrete human representative member; the PDC is modelled
    as a PROTEIN_COMPLEX node with its five subunit types. PDHX is deliberately
    grounded as a non-catalytic adaptor (its E2-type catalytic His is replaced by
    Ser); DLD is the shared E3 of multiple 2-oxoacid dehydrogenase complexes.
    Upstream, pyruvate comes from glycolysis (via the mitochondrial pyruvate
    carrier); downstream, PDC-derived acetyl-CoA and PC-derived oxaloacetate feed
    the TCA cycle, and PC also feeds gluconeogenesis. PDC activity is
    phospho-regulated by the PDK kinases / PDP phosphatases (not modelled here).
