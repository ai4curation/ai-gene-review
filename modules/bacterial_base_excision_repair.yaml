              - preferred_term: DNA alkylation repair
                term:
                  id: GO:0006307
                  label: DNA alkylation repair
            role_description: AlkA-family alkylbase glycosylase creating AP sites after alkylated-base removal.
          - id: pp4812_mpg_glycosylase
