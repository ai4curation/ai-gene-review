id: MODULE:bacterial_base_excision_repair
title: Bacterial base excision repair
description: >-
  Boundary module for KEGG ppu03410 base excision repair in Pseudomonas putida
  KT2440. The strict BER core includes damage-specific DNA glycosylases that
  remove alkylated, deaminated, mismatched, and oxidized bases, followed by
  AP-site processing by endonuclease III/MutM and ExoIII-like AP/ExoA-family
  nucleases. PolA and NAD-dependent ligases support downstream repair synthesis
  and nick sealing. RecJ is retained as a shared repair exonuclease side node
  rather than a BER-specific lesion-recognition factor.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03410
    title: Base excision repair - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03410 provides the organism-specific PSEPK curation batch with
      Tag, MutY, AlkA/MPG-like glycosylases, Nth, Ung, MutM, ExoIII-like
      AP/ExoA nucleases, RecJ, PolA, LigA, and LigB.
  - source_id: file:projects/P_PUTIDA/batches/ppu03410_bacterial_base_excision_repair.tsv
    title: ppu03410 first-pass batch table
    statement: >-
      The batch table records 14 KEGG ppu03410 membership genes and their
      local first-pass review, curation, and Asta-retrieval status.
  - source_id: file:PSEPK/tag/tag-ai-review.yaml
    title: Curated tag review
    statement: >-
      The tag review accepts DNA-3-methyladenine glycosylase activity and
      base-excision repair.
  - source_id: file:PSEPK/mutY/mutY-ai-review.yaml
    title: Curated mutY review
    statement: >-
      The mutY review accepts purine-specific mismatch base-pair DNA
      N-glycosylase activity, adenine/guanine mispair binding, oxidized purine
      DNA binding, 4Fe-4S binding, and base-excision repair.
  - source_id: file:PSEPK/PP_0705/PP_0705-ai-review.yaml
    title: Curated PP_0705 review
    statement: >-
      The PP_0705 review accepts alkylbase and DNA-3-methyladenine glycosylase
      activities, alkylated DNA binding, AP-site formation, DNA alkylation
      repair, and base-excision repair.
  - source_id: file:PSEPK/nth/nth-ai-review.yaml
    title: Curated nth review
    statement: >-
      The nth review accepts DNA N-glycosylase activity, class I AP-site
      endonuclease activity, 4Fe-4S binding, and base-excision repair.
  - source_id: file:PSEPK/ung/ung-ai-review.yaml
    title: Curated ung review
    statement: >-
      The ung review accepts uracil DNA N-glycosylase activity, cytoplasm, and
      deaminated-base AP-site formation in base-excision repair.
  - source_id: file:PSEPK/PP_2707/PP_2707-ai-review.yaml
    title: Curated PP_2707 review
    statement: >-
      The PP_2707 review accepts endonuclease activity, double-stranded DNA
      3'-5' exonuclease activity, cytoplasm, and DNA repair.
  - source_id: file:PSEPK/xthA/xthA-ai-review.yaml
    title: Curated xthA review
    statement: >-
      The xthA review accepts endonuclease activity, double-stranded DNA 3'-5'
      exonuclease activity, cytoplasm, and DNA repair.
  - source_id: file:PSEPK/PP_4812/PP_4812-ai-review.yaml
    title: Curated PP_4812 review
    statement: >-
      The PP_4812 review accepts alkylbase DNA N-glycosylase activity and
      base-excision repair.
  - source_id: file:PSEPK/mutM/mutM-ai-review.yaml
    title: Curated mutM review
    statement: >-
      The mutM review accepts oxidized purine lesion DNA N-glycosylase
      activity, damaged DNA binding, AP-site endonuclease activity, zinc ion
      binding, and base-excision repair.
  - source_id: file:PSEPK/PP_5292/PP_5292-ai-review.yaml
    title: Curated PP_5292 review
    statement: >-
      The PP_5292 review accepts endonuclease activity, double-stranded DNA
      3'-5' exonuclease activity, cytoplasm, and DNA repair despite a generic
      submitted product name.
  - source_id: file:PSEPK/polA/polA-ai-review.yaml
    title: Curated polA review
    statement: >-
      The polA review accepts DNA-directed DNA polymerase activity, DNA repair,
      DNA replication, and both 3'-5' and 5'-3' exonuclease activities.
  - source_id: file:PSEPK/ligA/ligA-ai-review.yaml
    title: Curated ligA review
    statement: >-
      The ligA review accepts NAD-dependent DNA ligase activity and DNA repair.
  - source_id: file:PSEPK/ligB/ligB-ai-review.yaml
    title: Curated ligB review
    statement: >-
      The ligB review accepts NAD-dependent DNA ligase activity and DNA repair.
notes: >-
  Hole-filling follow-up: PP_2707, xthA, and PP_5292 are ExoIII-like
  AP/ExoA-family nucleases in KEGG ppu03410 whose current GOA annotations stop
  at generic DNA repair and nuclease activities; base-excision repair should be
  considered after module-level literature review. Remaining open questions are
  which ExoIII-like paralog is the dominant AP endonuclease under alkylation or
  oxidative damage, whether PP_4812 and PP_0705 have distinct alkylated-base
  substrate ranges, and whether RecJ has a specific P. putida BER role or is a
  broad repair-exonuclease side node.
module:
  id: bacterial_base_excision_repair
  label: Bacterial base excision repair
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: base-excision repair
      term:
        id: GO:0006284
        label: base-excision repair
      description: Repair of small base lesions by damaged-base removal, AP-site processing, synthesis, and ligation.
    - preferred_term: base-excision repair, AP site formation
      term:
        id: GO:0006285
        label: base-excision repair, AP site formation
      description: DNA glycosylase-driven AP-site formation after damaged-base excision.
    - preferred_term: DNA alkylation repair
      term:
        id: GO:0006307
        label: DNA alkylation repair
      description: Repair of alkylation-damaged DNA bases.
    - preferred_term: base-excision repair, AP site formation via deaminated base removal
      term:
        id: GO:0097510
        label: base-excision repair, AP site formation via deaminated base removal
      description: Uracil-DNA glycosylase-mediated AP-site formation.
    - preferred_term: DNA-3-methyladenine glycosylase activity
      term:
        id: GO:0008725
        label: DNA-3-methyladenine glycosylase activity
      description: Removal of 3-methyladenine and related alkylated bases.
    - preferred_term: alkylbase DNA N-glycosylase activity
      term:
        id: GO:0003905
        label: alkylbase DNA N-glycosylase activity
      description: Broad alkylbase DNA N-glycosylase activity.
    - preferred_term: purine-specific mismatch base pair DNA N-glycosylase activity
      term:
        id: GO:0000701
        label: purine-specific mismatch base pair DNA N-glycosylase activity
      description: MutY adenine excision from purine mispairs.
    - preferred_term: uracil DNA N-glycosylase activity
      term:
        id: GO:0004844
        label: uracil DNA N-glycosylase activity
      description: Ung removal of uracil from DNA.
    - preferred_term: oxidized purine nucleobase lesion DNA N-glycosylase activity
      term:
        id: GO:0008534
        label: oxidized purine nucleobase lesion DNA N-glycosylase activity
      description: MutM/Fpg removal of oxidized purine lesions.
    - preferred_term: class I DNA-(apurinic or apyrimidinic site) endonuclease activity
      term:
        id: GO:0140078
        label: class I DNA-(apurinic or apyrimidinic site) endonuclease activity
      description: AP-site cleavage activity of Nth/MutM-family bifunctional enzymes.
    - preferred_term: double-stranded DNA 3'-5' DNA exonuclease activity
      term:
        id: GO:0008311
        label: double-stranded DNA 3'-5' DNA exonuclease activity
      description: ExoIII-like AP/ExoA-family nuclease activity in repair processing.
    - preferred_term: DNA-directed DNA polymerase activity
      term:
        id: GO:0003887
        label: DNA-directed DNA polymerase activity
      description: PolA repair-synthesis activity after excision processing.
    - preferred_term: DNA ligase (NAD+) activity
      term:
        id: GO:0003911
        label: DNA ligase (NAD+) activity
      description: NAD-dependent sealing of repair nicks by LigA and LigB.
    - preferred_term: 5'-3' exonuclease activity
      term:
        id: GO:0008409
        label: 5'-3' exonuclease activity
      description: RecJ/PolA-associated exonuclease activity shared across repair contexts.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Bacterial BER factors act on chromosomal DNA in the cytoplasm/nucleoid region.
  parts:
    - order: 1
      role: Damaged-base recognition and AP-site formation
      node:
        id: ber_dna_glycosylase_core
        label: DNA glycosylase lesion-recognition core
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Damage-specific DNA glycosylases initiate BER by recognizing
          alkylated, deaminated, mismatched, or oxidized bases and creating
          abasic repair intermediates.
        annotons:
          - id: tag_3_methyladenine_glycosylase
            label: "tag: DNA-3-methyladenine glycosylase I"
            participant:
              selector_type: GENE
