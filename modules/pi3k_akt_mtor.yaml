id: MODULE:pi3k_akt_mtor
title: Generic PI3K-AKT-mTOR signaling module
description: >-
  A taxon-neutral decomposition of the class I PI3K-AKT-mTOR signaling axis, the
  reusable survival/growth/metabolism arm deployed downstream of many receptor
  systems. Like the Ras-MAPK cascade it is a "sidecar" module: the same
  PI3K->PIP3->AKT->mTOR core is engaged by receptor tyrosine kinases
  (insulin/IGF, EGFR, PDGFR), by insulin-receptor-substrate (IRS) adaptors, by
  cytokine receptors signaling through JAKs, by GPCRs (class IB PI3K-gamma), and
  by active Ras. The module captures: (1) recruitment and activation of class I
  PI3K (p110 catalytic + p85 regulatory subunits) at a receptor phosphotyrosine,
  via IRS, or by Ras; (2) PI3K conversion of PIP2 to the second messenger PIP3;
  (3) PIP3-dependent membrane recruitment of PH-domain proteins PDK1 and AKT; (4)
  AKT activation by dual phosphorylation (PDK1 on Thr308, mTORC2 on Ser473); (5)
  AKT-driven activation of mTORC1 via inhibition of the TSC1/2 GAP and consequent
  Rheb-GTP accumulation; (6) downstream outputs - mTORC1 activation of S6K and
  4E-BP1 (translation/growth) and AKT inhibition of FOXO and GSK3 (survival,
  metabolism); and (7) negative regulation, principally the lipid phosphatase
  PTEN (which removes the 3-phosphate from PIP3), plus PHLPP (AKT
  dephosphorylation) and the TSC complex. Grounded in GO:0043491
  (phosphatidylinositol 3-kinase/protein kinase B signal transduction) and
  GO:0031929 (TOR signaling).
status: DRAFT
evidence:
  - source_id: GO:0043491
    title: phosphatidylinositol 3-kinase/protein kinase B signal transduction
    statement: >-
      The module is grounded in the GO biological process term for
      PI3K/protein kinase B (AKT) signal transduction.
  - source_id: GO:0031929
    title: TOR signaling
    statement: >-
      The growth-control output tier is grounded in TOR signaling, the
      mTOR-centered control of translation and cell growth.
  - source_id: GO:0046934
    title: 1-phosphatidylinositol-4,5-bisphosphate 3-kinase activity
    statement: >-
      The initiating biochemistry is class I PI3K phosphorylation of PIP2 at the
      3-position to generate the PIP3 second messenger.
  - source_id: PANTHER:PTN000683254
    title: PAINT AKT-family kinase ancestral node
    statement: >-
      Local PAINT IBD seed rows place curated AKT exemplars in a
      serine/threonine kinase node with protein kinase activity and intracellular
      signal transduction terms, anchoring the AKT effector tier where the cache
      supports it.
  - source_id: PANTHER:PTN000959472
    title: PAINT PTEN phosphatase node
    statement: >-
      Local PAINT IBD seed rows place the curated PTEN exemplar in PTHR12305
      node PTN000959472 with protein tyrosine phosphatase activity, anchoring the
      lipid/protein phosphatase negative-regulatory tier where supported.
notes: >-
  This is a reusable sidecar module referenced as a branch-point interface by the
  JAK-STAT signaling module (MODULE:jak_stat_signaling): JAK-phosphorylated
  receptor tyrosines (often via IRS adaptors, e.g. for IL-4 and growth-hormone
  receptors) recruit class I PI3K and fork into this axis in parallel with STAT
  activation. The same module is deployed by RTKs, GPCRs, and active Ras. Concrete
  realizations specialize the PI3K isoform, the recruitment route (direct pY vs
  IRS vs Ras), the AKT paralog, and the effector set. Representative UniProt
  members and PTEN's lipid-phosphatase terms were verified against curated reviews
  in this repository; tiers without a verified local exemplar are given as family
  descriptors.
module:
  id: pi3k_akt_mtor
  label: PI3K-AKT-mTOR signaling axis
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: phosphatidylinositol 3-kinase/protein kinase B signal transduction
      term:
        id: GO:0043491
        label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
      description: PI3K-generated PIP3 activating the AKT/PKB kinase arm.
    - preferred_term: TOR signaling
      term:
        id: GO:0031929
        label: TOR signaling
      description: mTOR-centered growth/translation control downstream of AKT.
  context:
    taxa:
      - preferred_term: eukaryotes
        description: >-
          The PI3K-AKT-TOR axis is broadly conserved in eukaryotes; class I
          PI3K-AKT signaling from cell-surface receptors is a metazoan elaboration.
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
  parts:
    - order: 1
      role: class I PI3K recruitment and activation
      node:
        id: pi3k_activation
        label: Class I PI3K recruitment and activation
        module_type: REACTION
        description: >-
          Class IA PI3K (p110 catalytic subunit, e.g. PIK3CA, with a p85
          regulatory subunit, e.g. PIK3R1) is recruited to the membrane by
          binding of the p85 SH2 domains to receptor or IRS phosphotyrosines, and
          can be co-activated by GTP-bound Ras. Class IB PI3K-gamma is recruited
          by GPCR Gbeta-gamma. This activates the lipid kinase.
        concepts:
          - preferred_term: phosphatidylinositol 3-kinase complex
            term:
              id: GO:0005942
              label: phosphatidylinositol 3-kinase complex
        annotons:
          - id: pi3k_recruitment
            label: PI3K regulatory-subunit docking
            participant:
              selector_type: FAMILY
              family:
                preferred_term: class I PI3K (p110/p85)
                description: Heterodimeric class I phosphoinositide 3-kinases that produce PIP3.
            function:
              preferred_term: insulin receptor substrate binding
              term:
                id: GO:0043560
                label: insulin receptor substrate binding
              description: p85 SH2 recognition of IRS/receptor phosphotyrosine docking sites (one of several recruitment routes).
            role_description: Membrane recruitment that positions PI3K at its lipid substrate.
          - id: pi3k_lipid_kinase
            label: PI3K lipid kinase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: class I PI3K catalytic subunit
                description: p110 catalytic subunits (PIK3CA/PIK3CB/PIK3CD/PIK3CG).
            function:
              preferred_term: 1-phosphatidylinositol-4,5-bisphosphate 3-kinase activity
              term:
                id: GO:0046934
                label: 1-phosphatidylinositol-4,5-bisphosphate 3-kinase activity
              substrates:
                - preferred_term: phosphatidylinositol 4,5-bisphosphate (PIP2)
              products:
                - preferred_term: phosphatidylinositol 3,4,5-trisphosphate (PIP3)
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Generates the PIP3 second messenger.
    - order: 2
      role: PIP3 second messenger and AKT/PDK1 recruitment
      node:
        id: pip3_akt_recruitment
        label: PIP3 generation and PH-domain recruitment of PDK1/AKT
        module_type: REGULATORY_STEP
        description: >-
          PIP3 accumulates in the inner leaflet and recruits PH-domain-containing
          proteins - the kinase PDK1 (PDPK1) and AKT - to the membrane, bringing
          the kinase and its activating kinase into proximity.
        annotons:
          - id: pip3_effector_recruitment
            label: PIP3-dependent membrane recruitment
            participant:
              selector_type: ANY_WITH_DOMAIN
              required_domain:
                preferred_term: pleckstrin homology (PH) domain
                description: PH domains that bind PIP3 and mediate membrane recruitment of PDK1 and AKT.
            function:
              preferred_term: phosphatidylinositol-3,4,5-trisphosphate binding
              description: PH-domain recognition of PIP3 at the membrane.
            role_description: Converts the lipid signal into co-localization of AKT and its activators.
    - order: 3
      role: AKT activation
      node:
        id: akt_activation
        label: AKT/PKB dual-site activation
        module_type: REACTION
        description: >-
          Membrane-recruited AKT (AKT1/2/3) is activated by PDK1 phosphorylation
          of Thr308 in its activation loop and by mTORC2 phosphorylation of Ser473
          in its hydrophobic motif, yielding the active kinase.
        annotons:
          - id: akt_kinase
            label: AKT serine/threonine kinase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: AKT/PKB kinases
                description: AKT1, AKT2, AKT3 serine/threonine protein kinases.
                representative_members:
                  - preferred_term: AKT1
                    term:
                      id: UniProtKB:P31749
                      label: RAC-alpha serine/threonine-protein kinase
            function:
              preferred_term: protein serine/threonine kinase activity
              term:
                id: GO:0004674
                label: protein serine/threonine kinase activity
              targets:
                - preferred_term: TSC2
                - preferred_term: FOXO transcription factors
                - preferred_term: GSK3
            role_description: Central effector kinase relaying PIP3 to growth/survival substrates.
    - order: 4
      role: mTORC1 activation via TSC/Rheb
      node:
        id: mtorc1_activation
        label: mTORC1 activation
        module_type: REACTION
        description: >-
          Active AKT phosphorylates and inhibits the TSC1/TSC2 GTPase-activating
          complex, relieving its suppression of the small GTPase Rheb; Rheb-GTP
          then activates mTOR complex 1 (mTORC1).
        concepts:
          - preferred_term: TOR signaling
            term:
              id: GO:0031929
              label: TOR signaling
        annotons:
          - id: mtorc1_kinase
            label: mTORC1 kinase activity
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: mTOR complex 1 (mTORC1)
                description: mTOR-RAPTOR growth-control kinase complex activated downstream of AKT.
            function:
              preferred_term: protein serine/threonine kinase activity
              term:
                id: GO:0004674
                label: protein serine/threonine kinase activity
              targets:
                - preferred_term: S6K1 (RPS6KB1)
                - preferred_term: 4E-BP1 (EIF4EBP1)
            role_description: Master growth-control kinase driving translation and biosynthesis.
    - order: 5
      role: downstream growth/survival/metabolic output
      node:
        id: akt_mtor_output
        label: AKT/mTORC1 effector output
        module_type: REGULATORY_STEP
        description: >-
          mTORC1 activates S6K1 and inhibits 4E-BP1 to promote cap-dependent
          translation and cell growth; AKT phosphorylates and inhibits FOXO
          transcription factors (suppressing pro-apoptotic genes) and GSK3
          (altering metabolism and stability of many substrates), together
          producing the survival/growth/metabolic program.
        annotons:
          - id: akt_mtor_effectors
            label: Translation, survival, and metabolic effectors
            participant:
              selector_type: ANY_PARTICIPANT
              description: S6K1, 4E-BP1, FOXO1/3, GSK3 and related effectors.
            role_description: Executes the pro-growth/pro-survival output of the axis.
    - order: 6
      role: negative regulation
      node:
        id: pi3k_negative_regulation
        label: Negative regulation of PI3K-AKT signaling
        module_type: REGULATORY_STEP
        description: >-
          The axis is restrained chiefly by PTEN, the lipid phosphatase that
          dephosphorylates PIP3 back to PIP2 (the principal off-switch), and by
          AKT-directed phosphatases (PHLPP) and the TSC complex.
        annotons:
          - id: pten_role
            label: PTEN PIP3 3-phosphatase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PTEN
                term:
                  id: UniProtKB:P60484
                  label: Phosphatidylinositol 3,4,5-trisphosphate 3-phosphatase and dual-specificity protein phosphatase PTEN
            function:
              preferred_term: phosphatidylinositol-3,4,5-trisphosphate 3-phosphatase activity
              term:
                id: GO:0016314
                label: phosphatidylinositol-3,4,5-trisphosphate 3-phosphatase activity
              substrates:
                - preferred_term: phosphatidylinositol 3,4,5-trisphosphate (PIP3)
              products:
                - preferred_term: phosphatidylinositol 4,5-bisphosphate (PIP2)
            role_description: >-
              Principal negative regulator; removes the 3-phosphate from PIP3 to
              shut off the axis. A tumor suppressor frequently lost in cancer.
  connections:
    - source: pi3k_activation
      target: pip3_akt_recruitment
      connection_type: CAUSES
      description: PI3K-generated PIP3 recruits PDK1 and AKT to the membrane.
    - source: pip3_akt_recruitment
      target: akt_activation
      connection_type: PROVIDES_INPUT_FOR
      description: Membrane co-localization enables PDK1/mTORC2 phosphorylation of AKT.
    - source: akt_activation
      target: mtorc1_activation
      connection_type: CAUSES
      description: AKT inhibits TSC1/2, activating Rheb-mTORC1.
    - source: mtorc1_activation
      target: akt_mtor_output
      connection_type: PROVIDES_INPUT_FOR
      description: mTORC1 (with AKT) drives the translation/growth/survival output.
    - source: pi3k_negative_regulation
      target: pi3k_activation
      connection_type: NEGATIVELY_REGULATES
      description: PTEN dephosphorylates PIP3, the principal off-switch for the axis.
