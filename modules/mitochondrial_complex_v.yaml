        ATPAF2 builds the F1 alpha3-beta3 catalytic core and TMEM70 promotes assembly/dimerisation
        of the holoenzyme.
    - source: complex_v_fo
      target: complex_v_f1
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Proton conduction through the Fo c-ring rotates the central stalk, driving ATP synthesis at
        the F1 catalytic head.
  notes: >-
    Mitochondrial respiratory Complex V (F1Fo ATP synthase), grounded to the human subunits ATP5F1A
    (UniProtKB:P25705), ATP5F1B (P06576), ATP5F1D (P30049), ATP5F1E (P56381), ATP5PO (P48047),
    ATP5MC3 (P48201), ATP5MD/DAPIT (Q96IX5) and the assembly factors ATPAF2 (Q8N5M1, GO:0044183) and
    TMEM70 (Q9BUB7). GO molecular-function/BP/location terms were taken from the completed human gene
    reviews and verified against the local go.db; Reactome reaction ids/titles were verified against
    the local reactome cache. The complex is modelled as F1 (catalytic head + central stalk) and Fo
    (membrane/proton-conducting) PROTEIN_COMPLEX nodes plus an assembly node; the catalytic activity
    (GO:0046933) is carried by the alpha/beta subunits, while the central-stalk/OSCP/DAPIT subunits
    are structural (GO:0005198). The a-subunit (MT-ATP6/MT-ATP8) and additional peripheral-stalk
    subunits (ATP5PB/PD/PF, ATP5ME/MF/MG) are mtDNA-encoded or reviewed elsewhere; the current ATP
    synthase complex term is GO:0045259 (proton-transporting ATP synthase complex). Complex V is
    driven by the proton gradient built by Complexes I-IV (oxphos.yaml, Complex III and Complex IV
    modules). Disorders: mitochondrial complex V (ATP synthase) deficiency nuclear types 1-9 —
    typically neonatal encephalopathy with 3-methylglutaconic aciduria, lactic acidosis and
    cardiomyopathy (ATPAF2 = MC5DN1, TMEM70 = MC5DN2 the commonest, ATP5F1E = MC5DN3, ATP5F1D = MC5DN5).
    NOTE: the ATP5MD folder was initially mis-fetched as Q9UI09 (NDUFA12, Complex I) and re-fetched
    with the correct DAPIT accession Q96IX5.
