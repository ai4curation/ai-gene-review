id: MODULE:mitochondrial_complex_v
title: Mitochondrial respiratory Complex V (F1Fo ATP synthase) — subunits and F1 assembly; ATP5F1A/ATP5F1B/ATP5F1D/ATP5F1E/ATP5PO/ATP5MC3/ATP5MD + ATPAF2/TMEM70
description: >-
  Complex V, the F1Fo ATP synthase, is the terminal enzyme of oxidative phosphorylation: it uses
  the proton-motive force generated by the electron transport chain (Complexes I-IV) to drive the
  synthesis of ATP from ADP and inorganic phosphate. It is a rotary molecular motor with two
  coupled sectors. The membrane-embedded Fo sector — the c-ring (ATP5MC1/2/3), the a-subunit
  (mtDNA-encoded MT-ATP6) and small membrane subunits including DAPIT (ATP5MD) and 6.8PL — conducts
  protons and rotates the central stalk; the matrix-facing F1 sector is the catalytic head, an
  alpha3-beta3 hexamer (ATP5F1A/ATP5F1B) whose three catalytic nucleotide sites are turned through
  their conformational cycle by the rotating central stalk (gamma/ATP5F1C, delta/ATP5F1D,
  epsilon/ATP5F1E). The peripheral (stator) stalk, anchored at the top by OSCP (ATP5PO), holds the
  F1 head stationary against the rotor so that rotation is converted into ATP synthesis rather than
  futile spinning. Assembly is factor-dependent: ATPAF2 (ATP12) is a matrix chaperone that binds
  the F1 alpha subunit to build the alpha3-beta3 catalytic core, and TMEM70 promotes assembly and
  dimerisation of the whole complex. Inherited defects in the subunits or assembly factors cause
  mitochondrial complex V (ATP synthase) deficiency — commonly a neonatal encephalopathy with
  3-methylglutaconic aciduria, lactic acidosis and cardiomyopathy.
status: DRAFT
evidence:
  - source_id: GO:0042776
    title: proton motive force-driven mitochondrial ATP synthesis
    statement: >-
      The module is grounded in proton motive force-driven mitochondrial ATP synthesis
      (GO:0042776) — the reaction catalysed by Complex V.
  - source_id: GO:0033615
    title: mitochondrial proton-transporting ATP synthase complex assembly
    statement: >-
      The dedicated factors (ATPAF2, TMEM70) mediate mitochondrial proton-transporting ATP synthase
      complex assembly (GO:0033615).
  - source_id: Reactome:R-HSA-8949580
    title: F1Fo ATP synthase dimerizes
    statement: >-
      The catalytic cycle and assembly follow the human Reactome ATP-synthase reactions
      R-HSA-164832 (ATP synthesis) and R-HSA-8949580 (F1Fo dimerisation).
  - source_id: file:human/ATP5F1A/ATP5F1A-ai-review.yaml
    title: ATP5F1A gene review (human)
    statement: >-
      The F1 alpha catalytic subunit (UniProtKB:P25705, GO:0005524) matches the previously completed
      human ATP5F1A review (on main).
  - source_id: file:human/ATP5F1B/ATP5F1B-ai-review.yaml
    title: ATP5F1B gene review (human)
    statement: >-
      The F1 beta catalytic subunit (UniProtKB:P06576, GO:0005524) matches the previously completed
      human ATP5F1B review (on main).
  - source_id: file:human/ATP5MC3/ATP5MC3-ai-review.yaml
    title: ATP5MC3 gene review (human)
    statement: >-
      The Fo c-ring subunit (UniProtKB:P48201, GO:0015078) matches the previously completed human
      ATP5MC3 review (on main).
  - source_id: file:human/TMEM70/TMEM70-ai-review.yaml
    title: TMEM70 gene review (human)
    statement: >-
      The ATP synthase assembly factor (UniProtKB:Q9BUB7, GO:0030674) matches the previously
      completed human TMEM70 review (on main).
  - source_id: file:human/ATP5F1D/ATP5F1D-ai-review.yaml
    title: ATP5F1D gene review (human)
    statement: >-
      The F1 delta central-stalk subunit (UniProtKB:P30049, GO:0005198) matches the completed human ATP5F1D review.
  - source_id: file:human/ATP5F1E/ATP5F1E-ai-review.yaml
    title: ATP5F1E gene review (human)
    statement: >-
      The F1 epsilon central-stalk subunit (UniProtKB:P56381, GO:0005198) matches the completed human ATP5F1E review.
  - source_id: file:human/ATP5PO/ATP5PO-ai-review.yaml
    title: ATP5PO gene review (human)
    statement: >-
      The OSCP peripheral-stalk subunit (UniProtKB:P48047, GO:0005198) matches the completed human ATP5PO review.
  - source_id: file:human/ATP5MD/ATP5MD-ai-review.yaml
    title: ATP5MD gene review (human)
    statement: >-
      The DAPIT Fo membrane subunit (UniProtKB:Q96IX5, GO:0005198) matches the completed human ATP5MD review.
  - source_id: file:human/ATPAF2/ATPAF2-ai-review.yaml
    title: ATPAF2 gene review (human)
    statement: >-
      The F1 assembly chaperone (UniProtKB:Q8N5M1, GO:0044183) matches the completed human ATPAF2 review.
