id: MODULE:branched_chain_amino_acid_degradation
title: Branched-chain amino acid degradation
description: >-
  A bacterial boundary module for catabolism of the branched-chain amino acids
  L-valine, L-leucine, and L-isoleucine. The strict pathway begins with
  transamination to branched-chain 2-oxo acids, oxidative decarboxylation by a
  branched-chain alpha-keto acid dehydrogenase complex, and branch-specific
  acyl-CoA oxidation, carboxylation, hydration, dehydrogenation, cleavage, and
  CoA-transfer or ligase steps. In Pseudomonas putida KT2440, KEGG ppu00280 also
  pulls in fatty-acid beta-oxidation paralogs, propanoate/butanoate nodes,
  lipoamide E3 components, generic thiolases, and CoA-transferases. Those genes
  are treated as boundary context unless gene-level evidence supports a
  committed branched-chain amino acid catabolic role.
status: DRAFT
evidence:
  - source_id: GO:0009083
    title: branched-chain amino acid catabolic process
    statement: >-
      The module is grounded in the GO biological-process term for catabolism of
      branched-chain amino acids.
  - source_id: GO:0006552
    title: L-leucine catabolic process
    statement: >-
      The KEGG ppu00280 map contains the methylcrotonyl-CoA and
      methylglutaconyl-CoA branch of leucine degradation.
  - source_id: GO:0006574
    title: L-valine catabolic process
    statement: >-
      The KEGG ppu00280 map contains 3-hydroxyisobutyrate and
      methylmalonate-semialdehyde branch chemistry for valine degradation.
  - source_id: GO:0006550
    title: L-isoleucine catabolic process
    statement: >-
      The module keeps isoleucine catabolism in scope where gene-level evidence
      supports the relevant branch.
  - source_id: KEGG:ppu00280
    title: Valine, leucine and isoleucine degradation - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      strict BCAA catabolic enzymes with fatty-acid, lipoamide, propanoate,
      butanoate, lysine-degradation, and aromatic-catabolism side nodes.
module:
  id: branched_chain_amino_acid_degradation
  label: Branched-chain amino acid degradation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: branched-chain amino acid catabolic process
      term:
        id: GO:0009083
        label: branched-chain amino acid catabolic process
      description: Catabolism of L-valine, L-leucine, and L-isoleucine.
    - preferred_term: L-leucine catabolic process
      term:
        id: GO:0006552
        label: L-leucine catabolic process
      description: Branch-specific catabolism of L-leucine.
    - preferred_term: L-valine catabolic process
      term:
        id: GO:0006574
        label: L-valine catabolic process
      description: Branch-specific catabolism of L-valine.
    - preferred_term: L-isoleucine catabolic process
      term:
        id: GO:0006550
        label: L-isoleucine catabolic process
      description: Branch-specific catabolism of L-isoleucine.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most bacterial BCAA catabolic enzymes operate in the cytoplasm.
  parts:
    - order: 1
      role: branched-chain amino acid transamination
      node:
        id: bcaa_transamination
        label: BCAA transamination to branched-chain 2-oxo acids
        module_type: REACTION
        description: >-
          Branched-chain amino acid aminotransferase produces the corresponding
          2-oxo acids from L-valine, L-leucine, and L-isoleucine. In PSEPK this
          role is expected to overlap the biosynthesis bucket.
        annotons:
          - id: ilvE_bcaa_aminotransferase_context
            label: IlvE branched-chain amino acid aminotransferase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: branched-chain-amino-acid transaminase activity
            role_description: >-
              Shared reversible transamination step; review in ppu00280 should
              distinguish catabolic from biosynthetic direction when evidence
              permits.
    - order: 2
      role: branched-chain 2-oxo acid oxidative decarboxylation
      node:
        id: bckdh_complex
        label: Branched-chain alpha-keto acid dehydrogenase complex
        module_type: PROTEIN_COMPLEX
        description: >-
          The multienzyme BCKDH-like system converts branched-chain 2-oxo acids
          to acyl-CoA products. KEGG ppu00280 includes bkdAA, bkdAB, bkdB, and
          lipoamide dehydrogenase paralogs; these are also lipoic-acid and
          central-carbon boundary nodes.
        concepts:
          - preferred_term: branched-chain 2-oxo acid dehydrogenase activity
            term:
              id: GO:0003863
              label: branched-chain 2-oxo acid dehydrogenase activity
        annotons:
          - id: bkdAA_bkdAB_e1_context
            label: BkdAA/BkdAB BCKDH E1 context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: branched-chain 2-oxo acid dehydrogenase activity
                term:
                  id: GO:0003863
                  label: branched-chain 2-oxo acid dehydrogenase activity
            function:
              preferred_term: branched-chain 2-oxo acid dehydrogenase activity
              term:
                id: GO:0003863
                label: branched-chain 2-oxo acid dehydrogenase activity
            role_description: E1 decarboxylase/dehydrogenase component context.
    - order: 3
      role: L-leucine branch
      node:
        id: leucine_degradation_branch
        label: L-leucine degradation branch
        module_type: METABOLIC_PATHWAY
        description: >-
          The leucine branch proceeds through isovaleryl-CoA, methylcrotonyl-CoA,
          methylglutaconyl-CoA, hydroxymethylglutaryl-CoA, and acetoacetate or
          acetyl-CoA products. In PSEPK the primary ppu00280 center includes ivd,
          mccA, mccB, liuC, and downstream acetoacetyl-CoA handling enzymes.
        concepts:
          - preferred_term: L-leucine catabolic process
            term:
              id: GO:0006552
              label: L-leucine catabolic process
        annotons:
          - id: ivd_isovaleryl_coa_dehydrogenase
            label: Ivd isovaleryl-CoA dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ivd
            function:
              preferred_term: 3-methylbutanoyl-CoA dehydrogenase activity
              term:
                id: GO:0008470
                label: 3-methylbutanoyl-CoA dehydrogenase activity
            role_description: Oxidizes isovaleryl-CoA in leucine catabolism.
          - id: mccAB_methylcrotonyl_coa_carboxylase
            label: MccAB methylcrotonyl-CoA carboxylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: methylcrotonoyl-CoA carboxylase activity
                term:
                  id: GO:0004485
                  label: methylcrotonoyl-CoA carboxylase activity
            function:
              preferred_term: methylcrotonoyl-CoA carboxylase activity
              term:
                id: GO:0004485
                label: methylcrotonoyl-CoA carboxylase activity
            role_description: Carboxylates 3-methylcrotonyl-CoA in the leucine branch.
          - id: liuC_methylglutaconyl_coa_hydratase
            label: LiuC methylglutaconyl-CoA hydratase
            participant:
              selector_type: GENE
              gene:
                preferred_term: liuC
            function:
              preferred_term: methylglutaconyl-CoA hydratase activity
              term:
                id: GO:0004490
                label: methylglutaconyl-CoA hydratase activity
            role_description: Hydrates methylglutaconyl-CoA in the leucine branch.
    - order: 4
      role: L-valine branch
      node:
        id: valine_degradation_branch
        label: L-valine degradation branch
        module_type: METABOLIC_PATHWAY
        description: >-
          The valine branch includes 3-hydroxyisobutyrate dehydrogenase and
          methylmalonate-semialdehyde dehydrogenase chemistry, with overlap to
          beta-alanine and propanoate metabolism.
        concepts:
          - preferred_term: L-valine catabolic process
            term:
              id: GO:0006574
              label: L-valine catabolic process
        annotons:
          - id: mmsB_hydroxyisobutyrate_dehydrogenase
            label: MmsB 3-hydroxyisobutyrate dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: mmsB
            function:
              preferred_term: 3-hydroxyisobutyrate dehydrogenase activity
              term:
                id: GO:0008442
                label: 3-hydroxyisobutyrate dehydrogenase activity
            role_description: Oxidizes 3-hydroxyisobutyrate in valine catabolism.
    - order: 5
      role: acetoacetate and acyl-CoA boundary handling
      optional: true
      node:
        id: acetoacetate_acyl_coa_boundary
        label: Acetoacetate and acyl-CoA boundary handling
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00280 includes acetoacetyl-CoA synthetase, 3-oxoadipate
          CoA-transferase subunits, thiolases, enoyl-CoA hydratases, and
          acyl-CoA dehydrogenases. These functions can be valid endpoints or
          shared acyl-CoA processing context, but they should not be counted as
          strict BCAA-specific steps without substrate/pathway evidence.
        annotons:
          - id: aacs_acetoacetate_coa_ligase
            label: Aacs acetoacetate-CoA ligase
            participant:
              selector_type: GENE
              gene:
                preferred_term: aacs
            function:
              preferred_term: acetoacetate-CoA ligase activity
              term:
                id: GO:0030729
                label: acetoacetate-CoA ligase activity
            role_description: Acetoacetate activation endpoint or side-node context.
          - id: atoAB_coa_transferase_context
            label: AtoAB 3-oxoadipate CoA-transferase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 3-oxoadipate CoA-transferase activity
                term:
                  id: GO:0047569
                  label: 3-oxoadipate CoA-transferase activity
            function:
              preferred_term: 3-oxoadipate CoA-transferase activity
              term:
                id: GO:0047569
                label: 3-oxoadipate CoA-transferase activity
            role_description: CoA-transferase boundary context shared with other organic-acid pathways.
notes: >-
  First-pass ppu00280 curation should separate strict BCAA catabolic evidence
  from shared acyl-CoA, fatty-acid beta-oxidation, lipoamide, propanoate,
  butanoate, and aromatic-degradation context. Many KEGG members are likely
  legitimate enzyme reviews but not committed valine/leucine/isoleucine
  degradation steps.
