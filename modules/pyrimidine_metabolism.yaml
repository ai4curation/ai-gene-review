        label: pyrimidine nucleotide biosynthetic process
      description: Biosynthesis of pyrimidine nucleotides.
    - preferred_term: CTP biosynthetic process
      term:
        id: GO:0006241
        label: CTP biosynthetic process
      description: Biosynthesis of cytidine triphosphate.
    - preferred_term: dTMP biosynthetic process
      term:
        id: GO:0006231
        label: dTMP biosynthetic process
