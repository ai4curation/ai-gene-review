notes: >-
  First-pass PSEPK curation should separate the strict de novo UMP route
  (CarAB/PyrB/PyrC/PyrD/PyrE/PyrF), UTP/CTP branch (PyrH/Ndk/PyrG/Cmk),
  deoxypyrimidine and thymidylate branch (NrdAB/Dcd/Dut/ThyA), salvage
  (Upp/PyrR/PpnP), reductive catabolism (PydX/PydA/PydB/beta-ureidopropionase
  candidates), and generic nucleotide housekeeping or uncertain side nodes.
