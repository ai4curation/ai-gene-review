id: MODULE:pyrimidine_metabolism
title: Pyrimidine metabolism
description: >-
  A bacterial pyrimidine-metabolism boundary module covering de novo UMP
  formation from carbamoyl phosphate and aspartate, conversion of UMP to UDP,
  UTP, and CTP, deoxyribonucleotide and dTMP branch chemistry, pyrimidine-base
  and nucleoside salvage, reductive pyrimidine catabolism, and general
  nucleotide-pool maintenance reactions that act on pyrimidine substrates. In
  Pseudomonas putida KT2440, KEGG ppu00240 is broader than a single linear
  pathway: it also includes carbamoyl-phosphate supply shared with arginine
  metabolism, ribonucleotide reduction, beta-alanine-generating catabolism,
  nucleotidase and nucleoside phosphorylase side nodes, and generic nucleotide
  sanitizing enzymes. Those are tracked as boundary context unless gene-level
  evidence supports a committed pyrimidine role.
status: DRAFT
evidence:
  - source_id: GO:0044205
    title: "'de novo' UMP biosynthetic process"
    statement: >-
      The module is grounded in the bacterial de novo route to UMP, starting
      with carbamoyl phosphate and aspartate and ending with orotidine
      5'-phosphate decarboxylation.
  - source_id: GO:0006221
    title: pyrimidine nucleotide biosynthetic process
    statement: >-
      Downstream UMP phosphorylation and CTP synthesis convert the de novo UMP
      product into the major pyrimidine ribonucleotide pools.
  - source_id: GO:0006231
    title: dTMP biosynthetic process
    statement: >-
      The thymidylate branch is represented separately because it uses
      pyrimidine deoxyribonucleotide substrates and one-carbon folate chemistry.
  - source_id: GO:0072529
    title: pyrimidine-containing compound catabolic process
    statement: >-
      Reductive uracil/thymine catabolism and beta-alanine-generating reactions
      form a connected but distinct pyrimidine-catabolism submodule.
  - source_id: KEGG:ppu00240
    title: Pyrimidine metabolism - Pseudomonas putida KT2440
    statement: >-
      The KEGG PSEPK bucket provides the first-pass candidate set, but combines
      strict de novo pyrimidine biosynthesis, salvage, catabolism, and broad
      nucleotide side chemistry.
