id: MODULE:bacterial_non_homologous_end_joining
title: Bacterial non-homologous end joining
description: >-
  Compact DNA double-strand-break repair module for Pseudomonas putida KT2440
  KEGG ppu03450. The organism-specific pathway contains the bacterial Ku
  DNA-end-binding protein and multifunctional LigD enzyme. Ku binds linear
  double-stranded DNA ends and recruits/stimulates LigD, while LigD supplies
  ATP-dependent DNA ligase activity and NHEJ-associated polymerase and
  exonuclease/phosphoesterase end-processing activities.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03450
    title: Non-homologous end-joining - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03450 contains ku/PP_3255 and ligD/PP_3260 in PSEPK, matching a
      compact bacterial Ku-LigD non-homologous end-joining module.
  - source_id: UniProtKB:Q88HU8
    title: Non-homologous end joining protein Ku
    statement: >-
      UniProt/HAMAP describes Ku as forming an NHEJ repair enzyme with LigD,
      binding linear dsDNA ends, and recruiting/stimulating LigD ligase
      activity.
  - source_id: UniProtKB:Q88HU3
    title: DNA ligase (ATP) LigD
    statement: >-
      UniProt records LigD as an ATP-dependent DNA ligase with NHEJ DNA
      polymerase naming, LigD ligase, polymerase, phosphoesterase, and NHEJ_LigD
      domain evidence.
  - source_id: file:PSEPK/ku/ku-ai-review.yaml
    title: Curated ku review
    statement: >-
      The first-pass ku review accepts double-stranded DNA binding and
      double-strand break repair via nonhomologous end joining as core.
  - source_id: file:PSEPK/ligD/ligD-ai-review.yaml
    title: Curated ligD review
    statement: >-
      The first-pass ligD review accepts ATP-dependent DNA ligase activity and
      adds missing NHEJ-associated polymerase, exonuclease, and NHEJ process
      annotations from UniProt metadata.
