              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: >-
              Master antioxidant-response transcription factor; induces multiple
              ferroptosis defenses (system xc-, GPX4, glutathione synthesis,
              ferritin, FSP1), so a positive regulator of the suppressor arms.
            gocam_associations:
              - model: "696022cd00003889"
                title: TRIM36-mediated inhibition of the GPX4-NRF2 axis (Human)
                description: >-
                  TRIM36 inhibits the GPX4-NRF2 antioxidant axis; the model
                  carries NRF2 and GPX4 negative-regulation-of-ferroptosis
                  activities.
