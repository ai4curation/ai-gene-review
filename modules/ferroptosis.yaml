id: MODULE:ferroptosis
title: Ferroptosis (iron-dependent lipid-peroxidation cell death) module
description: >-
  A decomposition of ferroptosis: the iron-dependent form of regulated cell
  death in which polyunsaturated-fatty-acid (PUFA) phospholipids in cellular
  membranes undergo iron-catalysed peroxidation to lipid hydroperoxides,
  ultimately rupturing the membrane. Ferroptosis is morphologically and
  biochemically distinct from apoptosis, necroptosis, and pyroptosis: there is
  no caspase cascade and no dedicated executioner enzyme. Instead the program is
  defined by the balance between (a) a driver arm that supplies the oxidisable
  substrate (PUFA phospholipids) and the redox-active iron that catalyses
  peroxidation, and (b) several biochemically independent defense arms that
  detoxify lipid hydroperoxides or quench the propagating radicals. Death occurs
  when the defenses are overwhelmed, so ferroptosis is best modelled as one
  execution node negatively regulated, in parallel and redundantly, by multiple
  suppressor systems.

  Design intent: the module is organized as a driver layer (PUFA-phospholipid
  supply and labile-iron supply) that provides input to a central execution node
  (GO:0097707 ferroptosis), opposed by four independent suppressor sub-modules
  that each NEGATIVELY_REGULATE the execution node: the canonical GPX4-glutathione
  axis, the FSP1-CoQ10 axis, the mitochondrial DHODH-CoQ10 axis, and the GCH1-BH4
  (tetrahydrobiopterin) axis. A transcriptional/regulatory sub-module (NRF2/KEAP1,
  ATF4, p53) tunes the set point of these defenses and is kept optional. The
  module is framed for the mammalian in-vivo implementation, using human gene
  products as concrete representatives. The core chemistry (iron + O2 + PUFA
  membranes) and the principal defenses (GPX4, the CoQ system) are deeply
  conserved across eukaryotes, with ferroptosis-like death reported in plants,
  fungi, and protozoa. Genes are grounded to UniProt and GO ids taken from the
  matching per-gene reviews under genes/human/; GO ids are used only in their
  correct aspect (MF in function, BP in processes/concepts, CC in locations).
status: DRAFT
evidence:
  - source_id: GO:0097707
    title: ferroptosis
    statement: >-
      The module is grounded in the GO biological-process term for ferroptosis,
      defined by GO as a programmed cell death involving iron and reactive
      oxygen species accumulation - i.e. an evolved process, not merely a
      pathological accident.
  - source_id: PMID:31634900
    title: "The CoQ oxidoreductase FSP1 acts parallel to GPX4 to inhibit ferroptosis"
    statement: >-
      Established FSP1 (AIFM2) as a glutathione/GPX4-independent ferroptosis
      suppressor that regenerates reduced CoQ10 at the membrane, defining the
      second, parallel defense axis modelled here.
  - source_id: file:projects/FERROPTOSIS.md
    title: Ferroptosis project page
    statement: >-
      The sibling gene-by-gene ferroptosis curation project (22 reviewed human
      genes) that this module generalizes into a recursively decomposable
      mechanistic plan; all UniProt/GO groundings here are taken from those reviews.
notes: >-
  Ferroptosis has no single linear execution effector, which is the key contrast
  with cuproptosis: the interesting structure is several biochemically
  independent suppressor arms (GPX4-GSH, FSP1-CoQ, DHODH-CoQ, GCH1-BH4) acting as
  redundant NEGATIVELY_REGULATES edges onto one execution node, so loss of any
  single arm is buffered by the others. The execution node is modelled as a
  process-level effect (GO:0097707) with an ANY_PARTICIPANT annoton rather than a
  distinct MF, because the lethal event is radical-chain lipid peroxidation and
  membrane rupture, for which there is no exact GO molecular function. Iron
  handling and PUFA-phospholipid biosynthesis are upstream physiology that set
  the death threshold: NCOA4-driven ferritinophagy and TFRC import raise the
  labile-iron pool (pro-ferroptotic), while FTH1 storage and SLC40A1 export lower
  it (protective). p53 (TP53) is included as a context-dependent regulator that
  is pro-ferroptotic in the canonical SLC7A11-repression context. Scope
  boundaries: general fatty-acid/phospholipid metabolism (FADS1/2, ELOVL5,
  LPCAT3's housekeeping remodelling), general glutathione and one-carbon
  metabolism, and the broader NRF2 antioxidant program are adjacent and are
  treated here only insofar as they supply substrate to, or gate, ferroptosis.
module:
  id: ferroptosis
  label: Ferroptosis
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: ferroptosis
      term:
        id: GO:0097707
        label: ferroptosis
      description: >-
        Iron-dependent regulated cell death driven by peroxidation of
        PUFA-containing membrane phospholipids to lipid hydroperoxides.
  context:
    taxa:
      - preferred_term: Mammalia
        term:
          id: NCBITaxon:40674
          label: Mammalia
        description: >-
          Mammalian implementation of ferroptosis, represented here with human
          gene products. The underlying chemistry and GPX4/CoQ defenses are
          ancient and broadly conserved; ferroptosis-like death is reported in
          plants, fungi, and protozoa.
    cellular_components:
      - preferred_term: cellular membranes (PUFA-phospholipid bilayers)
        description: >-
          The execution event occurs in PUFA-containing membrane bilayers
          (plasma membrane, ER, mitochondria); the defenses act at these
          membranes and in the cytosol.
  parts:
    - order: 1
      role: PUFA-phospholipid supply (provides the oxidisable substrate)
      node:
        id: pufa_phospholipid_supply
        label: PUFA-phospholipid supply
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Esterification of polyunsaturated fatty acids into membrane
          phospholipids generates the bis-allylic substrate that is peroxidised
          during ferroptosis. ACSL4 activates PUFAs as acyl-CoAs and LPCAT3
          inserts them into phospholipids; cells enriched in PUFA-PLs are
          ferroptosis-sensitive. FADS1/FADS2 and ELOVL5 (reviewed in the
          project) feed the upstream PUFA pool.
        annotons:
          - id: acsl4_pufa_activation
            label: ACSL4 PUFA-CoA synthesis
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: ACSL4
                term:
                  id: UniProtKB:O60488
                  label: Long-chain-fatty-acid--CoA ligase 4
            function:
              preferred_term: arachidonate-CoA ligase activity
              term:
                id: GO:0047676
                label: arachidonate-CoA ligase activity
              substrates:
                - preferred_term: arachidonic acid / adrenic acid (PUFA)
              products:
                - preferred_term: arachidonoyl-CoA (PUFA-CoA)
            processes:
              - preferred_term: positive regulation of ferroptosis
                term:
                  id: GO:0160020
                  label: positive regulation of ferroptosis
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Preferentially activates long-chain PUFAs; loss of ACSL4 depletes
              PUFA-phospholipids and confers ferroptosis resistance, making ACSL4
              a pro-ferroptotic driver.
          - id: lpcat3_pufa_incorporation
            label: LPCAT3 PUFA incorporation into phospholipids
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LPCAT3 (MBOAT5)
                term:
                  id: UniProtKB:Q6P1A2
                  label: Lysophospholipid acyltransferase 5
            function:
              preferred_term: 1-acylglycerophosphocholine O-acyltransferase activity
              term:
                id: GO:0047184
                label: 1-acylglycerophosphocholine O-acyltransferase activity
            processes:
              - preferred_term: phosphatidylethanolamine acyl-chain remodeling
                term:
                  id: GO:0036152
                  label: phosphatidylethanolamine acyl-chain remodeling
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Re-acylates lysophospholipids with PUFA-CoA, installing the
              oxidisable PUFA chains (esp. in phosphatidylethanolamine) that are
              the peroxidation substrate; cooperates with ACSL4 as a driver.
    - order: 2
      role: labile-iron supply (catalyses peroxidation; sets the threshold)
      node:
        id: labile_iron_supply
        label: Labile-iron supply and buffering
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Redox-active Fe(II) catalyses lipid-radical generation (Fenton
          chemistry) and is a cofactor of lipoxygenases. Import (TFRC) and
          ferritinophagy (NCOA4) raise the labile-iron pool and sensitize cells;
          ferritin storage (FTH1) and export (SLC40A1) lower it and protect.
        annotons:
          - id: tfrc_iron_import
            label: TFRC transferrin-bound iron import
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: TFRC (CD71)
                term:
                  id: UniProtKB:P02786
                  label: Transferrin receptor protein 1
            function:
              preferred_term: transferrin receptor activity
              term:
                id: GO:0004998
                label: transferrin receptor activity
            processes:
              - preferred_term: iron ion transport
                term:
                  id: GO:0006826
                  label: iron ion transport
            locations:
              - preferred_term: external side of plasma membrane
                term:
                  id: GO:0009897
                  label: external side of plasma membrane
            role_description: >-
              Principal route of transferrin-bound iron uptake; higher import
              raises the labile-iron pool and ferroptosis sensitivity (TFRC is
              also used as a ferroptosis marker).
          - id: ncoa4_ferritinophagy
            label: NCOA4 ferritinophagy (iron release)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: NCOA4
                term:
                  id: UniProtKB:Q13772
                  label: Nuclear receptor coactivator 4
            function:
              preferred_term: autophagy cargo adaptor activity
              term:
                id: GO:0160247
                label: autophagy cargo adaptor activity
            processes:
              - preferred_term: intracellular iron ion homeostasis
                term:
                  id: GO:0006879
                  label: intracellular iron ion homeostasis
            locations:
              - preferred_term: autophagosome
                term:
                  id: GO:0005776
                  label: autophagosome
            role_description: >-
              Selective autophagy receptor that delivers ferritin to the
              lysosome; ferritinophagy releases stored iron into the labile pool,
              a pro-ferroptotic input.
          - id: fth1_iron_storage
            label: FTH1 ferritin iron storage (protective)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FTH1
                term:
                  id: UniProtKB:P02794
                  label: Ferritin heavy chain
            function:
              preferred_term: iron ion sequestering activity
              term:
                id: GO:0140315
                label: iron ion sequestering activity
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Ferroxidase subunit of the ferritin complex that sequesters iron in
              a redox-inert form, lowering the labile-iron pool; protective
              against ferroptosis (and a NCOA4 substrate).
          - id: slc40a1_iron_export
            label: SLC40A1 (ferroportin) iron export (protective)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SLC40A1 (ferroportin)
                term:
                  id: UniProtKB:Q9NP59
                  label: Solute carrier family 40 member 1
            function:
              preferred_term: ferrous iron transmembrane transporter activity
              term:
                id: GO:0015093
                label: ferrous iron transmembrane transporter activity
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              The only known cellular iron exporter; export lowers intracellular
              iron and is protective against ferroptosis.
    - order: 3
      role: execution of ferroptosis (lipid peroxidation -> membrane rupture)
      node:
        id: ferroptosis_execution
        label: Ferroptosis execution
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Iron-catalysed (enzymatic via lipoxygenases/POR and non-enzymatic
          autoxidative) peroxidation of PUFA-phospholipids generates lipid
          hydroperoxides; when these outrun the suppressor arms, propagating
          radicals and reactive breakdown products destabilize and rupture the
          membrane, killing the cell.
        concepts:
          - preferred_term: ferroptosis
            term:
              id: GO:0097707
              label: ferroptosis
        annotons:
          - id: lipid_peroxidation_execution
            label: PUFA-phospholipid peroxidation and membrane rupture
            participant:
              selector_type: ANY_PARTICIPANT
              description: >-
                Cell-level outcome integrating PUFA-PL peroxidation, radical
                propagation, and membrane rupture; not a single gene product.
            function:
              preferred_term: ferroptosis (execution)
              description: >-
                Process-level death execution by radical-chain lipid
                peroxidation; no exact GO MF exists for the lethal membrane
                event, so only the BP is grounded.
            processes:
              - preferred_term: ferroptosis
                term:
                  id: GO:0097707
                  label: ferroptosis
            role_description: >-
              Integrates PUFA-PL peroxidation and iron-catalysed radical
              propagation into membrane-rupturing cell death; the node that every
              suppressor arm negatively regulates.
            evidence:
              - source_id: GO:0097707
                statement: >-
                  GO defines ferroptosis as an iron- and ROS-dependent programmed
                  cell death.
    - order: 4
      role: GPX4-glutathione defense (canonical suppressor)
      node:
        id: gpx4_gsh_defense
        label: GPX4-glutathione defense
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The classical ferroptosis-suppressing axis: system xc- (SLC7A11/SLC3A2)
          imports cystine for glutathione synthesis (GCLC then GSS), and GPX4
          uses glutathione to reduce phospholipid hydroperoxides to non-reactive
          alcohols. GPX4 is the central suppressor node.
        annotons:
          - id: slc7a11_cystine_import
            label: SLC7A11 (xCT) cystine/glutamate antiport
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SLC7A11 (xCT)
                term:
                  id: UniProtKB:Q9UPY5
                  label: Cystine/glutamate transporter
            function:
              preferred_term: cystine:glutamate antiporter activity
              term:
                id: GO:0015327
                label: cystine:glutamate antiporter activity
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Imports cystine in exchange for glutamate, supplying cysteine for
              glutathione synthesis; the rate-limiting input to the GPX4 axis and
              the target of erastin and of p53-mediated repression.
          - id: slc3a2_xct_partner
            label: SLC3A2 (4F2hc) xCT chaperone subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SLC3A2 (4F2hc)
                term:
                  id: UniProtKB:P08195
                  label: 4F2 cell-surface antigen heavy chain
            function:
              preferred_term: protein heterodimerization activity
              term:
                id: GO:0046982
                label: protein heterodimerization activity
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Obligate heavy-chain partner that traffics and stabilizes SLC7A11
              at the plasma membrane; required for system xc- function.
          - id: gclc_gsh_synthesis
            label: GCLC rate-limiting glutathione synthesis
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GCLC
                term:
                  id: UniProtKB:P48506
                  label: Glutamate--cysteine ligase catalytic subunit
            function:
              preferred_term: glutamate-cysteine ligase activity
              term:
                id: GO:0004357
                label: glutamate-cysteine ligase activity
            role_description: >-
              Catalyses the rate-limiting step of glutathione biosynthesis
              (gamma-glutamylcysteine formation); supplies the GPX4 cofactor.
          - id: gss_gsh_synthesis
            label: GSS glutathione synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GSS
                term:
                  id: UniProtKB:P48637
                  label: Glutathione synthetase
            function:
              preferred_term: glutathione synthase activity
              term:
                id: GO:0004363
                label: glutathione synthase activity
            role_description: >-
              Completes glutathione synthesis from gamma-glutamylcysteine and
              glycine; provides the reducing cofactor for GPX4.
          - id: gpx4_plooh_reduction
            label: GPX4 phospholipid-hydroperoxide reduction (central suppressor)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GPX4
                term:
                  id: UniProtKB:P36969
                  label: Phospholipid hydroperoxide glutathione peroxidase
            function:
              preferred_term: phospholipid-hydroperoxide glutathione peroxidase activity
              term:
                id: GO:0047066
                label: phospholipid-hydroperoxide glutathione peroxidase activity
              substrates:
                - preferred_term: phospholipid hydroperoxide (PL-OOH)
                - preferred_term: glutathione (GSH)
              products:
                - preferred_term: phospholipid alcohol (PL-OH)
                - preferred_term: glutathione disulfide (GSSG)
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
              - preferred_term: mitochondrion
                term:
                  id: GO:0005739
                  label: mitochondrion
            role_description: >-
              The central ferroptosis suppressor: directly reduces phospholipid
              hydroperoxides to alcohols using glutathione, defusing the lethal
              substrate. GPX4 inhibition (e.g. RSL3) is the canonical way to
              trigger ferroptosis.
    - order: 5
      role: FSP1-CoQ10 defense (GPX4-independent, parallel)
      node:
        id: fsp1_coq_defense
        label: FSP1-CoQ10 defense
        module_type: MOLECULAR_FUNCTION
        description: >-
          A glutathione/GPX4-independent suppressor axis: FSP1 (AIFM2) reduces
          ubiquinone (CoQ10) to ubiquinol, a lipophilic radical-trapping
          antioxidant that halts lipid-peroxidation chain propagation at the
          membrane. Parallel to and redundant with GPX4.
        annotons:
          - id: fsp1_coq_reduction
            label: FSP1 (AIFM2) CoQ10 reduction
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FSP1 (AIFM2)
                term:
                  id: UniProtKB:Q9BRQ8
                  label: Apoptosis-inducing factor mitochondria-associated 2
            function:
              preferred_term: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
              term:
                id: GO:0016655
                label: oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor
              substrates:
                - preferred_term: ubiquinone (CoQ10)
                - preferred_term: NAD(P)H
              products:
                - preferred_term: ubiquinol (CoQ10-H2, radical-trapping antioxidant)
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
              - preferred_term: ubiquinone metabolic process
                term:
                  id: GO:0006743
                  label: ubiquinone metabolic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
              - preferred_term: lipid droplet
                term:
                  id: GO:0005811
                  label: lipid droplet
            role_description: >-
              Myristoylation-targeted NAD(P)H:ubiquinone oxidoreductase that
              regenerates ubiquinol at membranes to trap lipid radicals,
              suppressing ferroptosis independently of glutathione/GPX4.
            gocam_associations:
              - model: "6796b94c00002691"
                title: SLC25A1 negatively regulates ferroptosis (Human)
                description: >-
                  FSP1 (AIFM2) negative-regulation-of-ferroptosis activity
                  supported by the SLC25A1/ACLY/KAT2B acetyl-supply arm.
              - model: "680ad14200003459"
                title: >-
                  ALDH7A1 protects against ferroptosis by generating membrane
                  NADH, thereby supporting AIFM2 activity (Human).
                description: >-
                  FSP1 activity supported by ALDH7A1-generated membrane NADH
                  (cofactor-supply arm, not a stability switch).
              - model: "62f58d8800005413"
                title: >-
                  Inhibition of vitamin K metabolic process via inhibition of
                  VKORC1 by warfarin; antidotal effect of AIFM2/FSP1 that
                  suppresses ferroptosis (Human)
                description: FSP1 antidotal, anti-ferroptotic CoQ/vitamin-K reductase activity.
            evidence:
              - source_id: PMID:31634900
                statement: >-
                  FSP1 acts parallel to GPX4, using NAD(P)H to regenerate reduced
                  CoQ10 and inhibit ferroptosis.
    - order: 6
      role: DHODH-CoQ10 defense (mitochondrial, parallel)
      node:
        id: dhodh_coq_defense
        label: DHODH-CoQ10 defense (mitochondrial)
        module_type: MOLECULAR_FUNCTION
        description: >-
          The mitochondrial inner-membrane arm of CoQ-based defense: DHODH
          reduces CoQ to ubiquinol in the inner membrane (coupled to its role in
          de novo pyrimidine synthesis), counteracting mitochondrial lipid
          peroxidation in parallel with mitochondrial GPX4.
        annotons:
          - id: dhodh_coq_reduction
            label: DHODH dihydroorotate:CoQ oxidoreduction
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: DHODH
                term:
                  id: UniProtKB:Q02127
                  label: Dihydroorotate dehydrogenase (quinone), mitochondrial
            function:
              preferred_term: dihydroorotate dehydrogenase (quinone) activity
              term:
                id: GO:0106430
                label: dihydroorotate dehydrogenase (quinone) activity
              substrates:
                - preferred_term: dihydroorotate
                - preferred_term: ubiquinone (CoQ)
              products:
                - preferred_term: orotate
                - preferred_term: ubiquinol (CoQ-H2)
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Reduces CoQ to ubiquinol at the mitochondrial inner membrane;
              proposed to defend mitochondrial membranes against lipid
              peroxidation in parallel with GPX4, especially where GPX4 is low.
    - order: 7
      role: GCH1-BH4 defense (tetrahydrobiopterin antioxidant, parallel)
      node:
        id: gch1_bh4_defense
        label: GCH1-BH4 defense
        module_type: BIOLOGICAL_PROCESS
        description: >-
          GTP cyclohydrolase I (GCH1) is rate-limiting for biosynthesis of
          tetrahydrobiopterin (BH4), a lipophilic radical-trapping antioxidant
          that protects membrane PUFAs (and helps regenerate CoQ); PTS and SPR
          complete BH4 synthesis. A third independent suppressor axis.
        concepts:
          - preferred_term: tetrahydrobiopterin biosynthetic process
            term:
              id: GO:0006729
              label: tetrahydrobiopterin biosynthetic process
        annotons:
          - id: gch1_bh4_synthesis
            label: GCH1 rate-limiting BH4 synthesis
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GCH1
                term:
                  id: UniProtKB:P30793
                  label: GTP cyclohydrolase 1
            function:
              preferred_term: GTP cyclohydrolase I activity
              term:
                id: GO:0003934
                label: GTP cyclohydrolase I activity
            processes:
              - preferred_term: tetrahydrobiopterin biosynthetic process
                term:
                  id: GO:0006729
                  label: tetrahydrobiopterin biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-limiting enzyme of BH4 synthesis; GCH1/BH4 levels set
              ferroptosis resistance by supplying a radical-trapping antioxidant
              that protects PUFA-phospholipids.
          - id: pts_bh4_synthesis
            label: PTS (PTPS) BH4 synthesis
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PTS (PTPS)
                term:
                  id: UniProtKB:Q03393
                  label: 6-pyruvoyl tetrahydrobiopterin synthase
            function:
              preferred_term: 6-pyruvoyltetrahydropterin synthase activity
              term:
                id: GO:0003874
                label: 6-pyruvoyltetrahydropterin synthase activity
            processes:
              - preferred_term: tetrahydrobiopterin biosynthetic process
                term:
                  id: GO:0006729
                  label: tetrahydrobiopterin biosynthetic process
