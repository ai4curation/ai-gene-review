        label: Transcriptional and modulatory regulators
        module_type: REGULATORY_STEP
        description: >-
          Transcriptional set-point controllers of the defense arms: NRF2
          (NFE2L2) induces SLC7A11, GPX4, GCLC, FTH1, and FSP1; KEAP1 represses
          NRF2; ATF4 (integrated stress response) induces SLC7A11; p53 (TP53) is
          context-dependent and, in the canonical context, represses SLC7A11 to
          promote ferroptosis.
