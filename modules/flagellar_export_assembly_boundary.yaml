id: MODULE:flagellar_export_assembly_boundary
title: Flagellar export and assembly boundary
description: >-
  Boundary module for the ppu02040 flagellar export/assembly subset in
  Pseudomonas putida KT2440. The first-pass module covers the FlhA/FlhB/FliPQR
  membrane export gate, FliO accessory context, the FliI/FliH/FliJ
  cytosolic-side export-energy module, hook-length control by FliK, and
  assembly/chaperone support from FliT, FliS, FlgA, and PP_4396/FlgN-like.
  The motility/chemotaxis/biofilm functional-bucket extension adds PP_4328,
  PP_4329, PP_4342, flhF, and PP_4377 as flagellar hook-length, export-gate,
  localization/number-control, and FlaG accessory spillovers. It separates
  export and assembly support from the motor/switch/stator, basal-body/hook/
  filament structural, flagellar-regulation, and nonflagellar envelope buckets.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02040
    title: Flagellar assembly - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02040 provides the organism-specific flagellar assembly umbrella
      that includes export apparatus, basal-body/hook/filament structural
      proteins, motor/switch/stator components, and regulators.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.tsv
    title: ppu02040 bacterial flagellar assembly partition table
    statement: >-
      The partition separates flhA, flhB, fliR, fliQ, fliP, fliO, fliK, fliJ,
      fliI, fliH, fliT, fliS, flgA, and PP_4396 into the flagellar export and
      assembly/chaperone bucket.
  - source_id: file:PSEPK/flhA/flhA-ai-review.yaml
    title: Curated flhA review
    statement: flhA is curated as a multi-pass FlhA/FHIPEP-family membrane export-gate component for flagellar assembly.
  - source_id: file:PSEPK/flhB/flhB-ai-review.yaml
    title: Curated flhB review
    statement: flhB is curated as a type-III secretion exporter-family membrane component of the flagellar export apparatus.
  - source_id: file:PSEPK/fliR/fliR-ai-review.yaml
    title: Curated fliR review
    statement: fliR is curated as a FliR-family membrane export-gate component in the flagellar basal-body context.
  - source_id: file:PSEPK/fliQ/fliQ-ai-review.yaml
    title: Curated fliQ review
    statement: fliQ is curated as a small FliQ-family export-gate component for flagellar assembly.
  - source_id: file:PSEPK/fliP/fliP-ai-review.yaml
    title: Curated fliP review
    statement: fliP is curated as a FliP-family membrane component of the flagellum-specific export system.
  - source_id: file:PSEPK/fliO/fliO-ai-review.yaml
    title: Curated fliO review
    statement: fliO is curated as a FliO/MopB-family accessory membrane protein associated with flagellar organization.
  - source_id: file:PSEPK/fliK/fliK-ai-review.yaml
    title: Curated fliK review
    statement: fliK is curated as a hook-length control factor for flagellar assembly despite an empty fetched GOA table.
  - source_id: file:PSEPK/fliJ/fliJ-ai-review.yaml
    title: Curated fliJ review
    statement: fliJ is curated as a cytoplasmic-side export-apparatus factor, not as a torque-generating motor protein.
  - source_id: file:PSEPK/fliI/fliI-ai-review.yaml
    title: Curated fliI review
    statement: fliI is curated as the protein-exporting ATPase of the flagellar type-III-like export apparatus.
  - source_id: file:PSEPK/fliH/fliH-ai-review.yaml
    title: Curated fliH review
    statement: fliH is curated as a cytosolic accessory/regulatory component of the FliI-powered export apparatus.
  - source_id: file:PSEPK/fliT/fliT-ai-review.yaml
    title: Curated fliT review
    statement: fliT is curated conservatively as a cytosolic flagellar organization factor.
  - source_id: file:PSEPK/fliS/fliS-ai-review.yaml
    title: Curated fliS review
    statement: fliS is curated as the cytosolic FliS secretion chaperone supporting flagellar assembly.
  - source_id: file:PSEPK/flgA/flgA-ai-review.yaml
    title: Curated flgA review
    statement: flgA is curated as a periplasmic P-ring formation factor for basal-body assembly.
  - source_id: file:PSEPK/PP_4396/PP_4396-ai-review.yaml
    title: Curated PP_4396 review
    statement: PP_4396 is curated as a FlgN-family assembly factor required for efficient initiation of filament assembly.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_flagellar_assembly_regulation_spillovers.tsv
    title: Motility-bucket flagellar assembly/regulation spillover table
    statement: >-
      The motility functional-bucket partition routes PP_4328, PP_4329,
      PP_4342, flhF, and PP_4377 into the flagellar export/assembly boundary
      while routing ycfJ to transport/envelope spillover context and ycgR to
      flagellar motor braking context.
  - source_id: file:PSEPK/PP_4328/PP_4328-ai-review.yaml
    title: Curated PP_4328 review
    statement: PP_4328 is curated as a FliK-like hook-length-control accessory candidate with no current GOA row.
  - source_id: file:PSEPK/PP_4329/PP_4329-ai-review.yaml
    title: Curated PP_4329 review
    statement: PP_4329 is curated as a short FlhB-family type-III substrate exporter spillover adjacent to the canonical flhB export-gate component.
  - source_id: file:PSEPK/PP_4342/PP_4342-ai-review.yaml
    title: Curated PP_4342 review
    statement: PP_4342 is curated as a FlhG/FleN-family ATPase candidate for flagellar organization, with the MinD-family cell-division annotation removed.
  - source_id: file:PSEPK/flhF/flhF-ai-review.yaml
    title: Curated flhF review
    statement: flhF is curated as a GTPase required for flagellar biosynthesis/organization, with SRP-targeting spillovers removed.
  - source_id: file:PSEPK/PP_4377/PP_4377-ai-review.yaml
    title: Curated PP_4377 review
    statement: PP_4377 is curated as a FlaG-domain flagellar accessory candidate with broad flagellar organization support.
notes: >-
  First-pass interpretation: the membrane export gate is represented by
  FlhA/FlhB and FliP/FliQ/FliR with FliO as accessory context. FliI is the
  ATPase, while FliH and FliJ are cytosolic-side export-energy/accessory
  components. FliK controls hook length. FliS, FliT, FlgA, and PP_4396/FlgN-like
  provide assembly-chaperone or late-assembly support. Broad protein secretion,
  protein targeting, chemotaxis, motility, and ATP-synthase-like automated terms
  are retained only where appropriate or marked as over-broad in the individual
  gene reviews.
  The motility functional-bucket extension adds a short PP_4329 FlhB-family
  exporter next to the canonical flhB/Q88EV1 component, a PP_4328 FliK-like
  hook-control candidate, FlhF/PP_4342 placement or number-control GTPase/ATPase
  context, and PP_4377 FlaG accessory context.
