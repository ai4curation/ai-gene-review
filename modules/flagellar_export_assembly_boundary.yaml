        protein export through the membrane export gate.
    - source: flagellar_export_gate
      target: flagellar_late_assembly_support
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Export-gate activity enables delivery and assembly of rod, hook, and
        filament substrates whose timing and folding are supported by FliK,
        FliS/FliT, FlgA, and PP_4396/FlgN-like.
