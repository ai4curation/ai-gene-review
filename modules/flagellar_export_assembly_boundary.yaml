        export/assembly and localization context adjacent to the core
        export/assembly support branch.
  knowledge_gaps:
    - gap_statement: >-
        The fetched GOA table for fliK is empty, so its hook-length-control role
        is represented in core_functions and the module from UniProt/Asta domain
        evidence rather than a reviewed GOA row.
      boundary: >-
        The module records fliK as a flagellar assembly factor but does not add a
        synthetic existing_annotation row solely to silence validation warnings.
    - gap_statement: >-
        FliT and FliH have sparse GOA coverage in KT2440.
      boundary: >-
        Their first-pass reviews use UniProt/Asta domain and keyword context for
        flagellar organization, while leaving specific regulatory interactions
        with FliI, export substrates, or transcriptional regulators unresolved.
    - gap_statement: >-
        PP_4396 is retained under the locus-tag review name with FlgN-like alias
        context, but the exact substrate/chaperone specificity has not been
        established in this first pass.
      boundary: >-
        PP_4396 remains in the export/assembly-support bucket until direct
        KT2440 evidence resolves its late-assembly partners.
    - gap_statement: >-
        PP_4329 is a short FlhB-family exporter candidate distinct from the
        canonical flhB/PP_4352 protein.
      boundary: >-
        The module retains PP_4329 as an accessory/spillover exporter candidate
        rather than merging it with the canonical FlhB export-gate annoton.
    - gap_statement: >-
        FlhF, PP_4342, and PP_4377 flagellar localization or accessory roles
        are unresolved at the KT2440-specific mechanistic level.
      boundary: >-
        Their first-pass reviews keep broad flagellar organization context while
        avoiding claims about exact flagellar number, polar placement, or late
        assembly targets until direct evidence is available.
