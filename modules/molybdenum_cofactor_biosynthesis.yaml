id: MODULE:molybdenum_cofactor_biosynthesis
title: Prokaryotic molybdenum cofactor biosynthesis from GTP to Mo-molybdopterin and optional dinucleotide variants
description: >-
  A reusable prokaryotic module for molybdenum cofactor biosynthesis constructs
  the pyranopterin dithiolene ligand from GTP, loads it with molybdenum, and may
  append a nucleotide to produce a client-class-specific cofactor variant. MoaA
  first performs radical-SAM cyclization of GTP and MoaC rearranges the cyclic
  intermediate to cyclic pyranopterin monophosphate (cPMP). Molybdopterin
  synthase then inserts two sulfurs: MoeB activates the small MoaD sulfur
  carrier, and the MoaD-MoaE synthase converts cPMP to molybdopterin (MPT).
  Across prokaryotic realizations, MPT is adenylylated by a separate bacterial
  MogA or by a catalytically competent prokaryotic MoaB lineage, and MoeA then
  inserts molybdate to form Mo-MPT. Some realizations stop at Mo-MPT, whereas
  others use MobA to make MGD or MocA to make MCD. The module excludes upstream
  sulfur supply, molybdate transport, terminal cofactor sulfuration, cofactor
  insertion into client apoenzymes, mature molybdoenzyme reactions, pathway
  regulation, eukaryotic MOCS/CNX/GPHN fusion organization, and human disease.
status: DRAFT
scope: CONCRETE
evidence:
- source_id: file:modules/molybdenum_cofactor_biosynthesis-deep-research-openscientist.md
  title: OpenScientist research for the reusable molybdenum-cofactor biosynthesis module
  statement: >-
    The report was critically restricted to conserved cofactor-building chemistry;
    organism-specific disease, transport, sulfuration, and client-enzyme material
    is outside the module boundary.
module:
  id: molybdenum_cofactor_biosynthesis
  label: Prokaryotic molybdenum cofactor biosynthesis
  module_type: METABOLIC_PATHWAY
  description: Conserved prokaryotic formation of Mo-MPT from GTP with optional MGD and MCD nucleotide maturation.
  concepts:
  - preferred_term: Mo-molybdopterin cofactor biosynthetic process
    term:
      id: GO:0006777
      label: Mo-molybdopterin cofactor biosynthetic process
  parts:
  - order: 1
    role: cyclic pyranopterin monophosphate formation
    node:
      id: cpmp_formation
      label: Cyclic pyranopterin monophosphate formation
      module_type: METABOLIC_PATHWAY
      description: Two sequential reactions convert GTP to cPMP.
      parts:
      - order: 1
        role: radical-SAM GTP cyclization
        node:
          id: moaA_gtp_cyclization
          label: MoaA GTP cyclization
          module_type: REACTION
          annotons:
          - id: moaA_gtp_38_cyclase
            label: MoaA GTP 3',8'-cyclase
            participant:
              selector_type: ORTHOLOG_OF
              ortholog_of:
                preferred_term: PSEPK canonical MoaA
                term:
                  id: UniProtKB:Q88E69
                  label: GTP 3',8-cyclase
                description: >-
                  Orthologs of the curated KT2440 moaA/PP_4597 enzyme that
                  retain canonical GTP 3',8'-cyclase specialization; broader
                  MoaA-like radical-SAM paralogs require gene-specific adjudication.
            function:
              preferred_term: GTP 3',8'-cyclase activity
              term:
                id: GO:0061798
                label: GTP 3',8'-cyclase activity
              substrates:
              - preferred_term: GTP
              - preferred_term: S-adenosyl-L-methionine
              products:
              - preferred_term: (8S)-3',8-cyclo-7,8-dihydroguanosine 5'-triphosphate
              cofactors:
              - preferred_term: two [4Fe-4S] clusters
            role_description: Forms the cyclic GTP intermediate used by MoaC.
            evidence:
            - source_id: file:interpro/panther/PTHR22960/PTHR22960-entries.csv
              statement: The local PANTHER export contains PSEPK Q88E69 and E. coli P30745 as MoaA-lineage proteins.
            - source_id: file:PSEPK/moaA/moaA-ai-review.yaml
              statement: The curated KT2440 review accepts GO:0061798 for Q88E69 and distinguishes it from divergent MoaA-family paralogs.
      - order: 2
        role: cyclic intermediate rearrangement to cPMP
        node:
          id: moaC_cpmp_synthesis
          label: MoaC cPMP synthesis
          module_type: REACTION
          annotons:
          - id: moaC_cpmp_synthase
            label: MoaC cyclic pyranopterin monophosphate synthase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial MoaC cPMP synthase family
                term:
                  id: PANTHER:PTHR22960:SF29
                  label: CYCLIC PYRANOPTERIN MONOPHOSPHATE SYNTHASE
                representative_members:
                - preferred_term: PSEPK moaC exemplar
                  term:
                    id: UniProtKB:Q88NC0
                    label: Cyclic pyranopterin monophosphate synthase
                  description: Pseudomonas putida KT2440 moaC/PP_1292.
                - preferred_term: Listeria welshimeri MoaC exemplar
                  term:
                    id: UniProtKB:A0AHF9
                    label: Cyclic pyranopterin monophosphate synthase
                  description: MoaC exemplar in the same PANTHER subfamily.
            function:
              preferred_term: cyclic pyranopterin monophosphate synthase activity
              term:
                id: GO:0061799
                label: cyclic pyranopterin monophosphate synthase activity
              substrates:
              - preferred_term: (8S)-3',8-cyclo-7,8-dihydroguanosine 5'-triphosphate
              products:
              - preferred_term: cyclic pyranopterin monophosphate (cPMP)
              - preferred_term: diphosphate
            role_description: Rearranges the MoaA product to cPMP.
            evidence:
            - source_id: file:interpro/panther/PTHR22960/PTHR22960-entries.csv
              statement: The local PANTHER export contains Q88NC0 and A0AHF9 in cPMP synthase subfamily PTHR22960:SF29.
            - source_id: file:PSEPK/moaC/moaC-ai-review.yaml
              statement: The curated KT2440 review accepts cyclic pyranopterin monophosphate synthase activity for Q88NC0.
      connections:
      - source: moaA_gtp_cyclization
        target: moaC_cpmp_synthesis
        connection_type: PROVIDES_INPUT_FOR
        description: The cyclic GTP product of MoaA is the substrate for MoaC.
        chaining_status: VERIFIED
  - order: 2
    role: sulfur-carrier activation and molybdopterin synthesis
    node:
      id: mpt_formation
      label: Sulfur-carrier activation and MPT formation
      module_type: METABOLIC_PATHWAY
      description: MoeB activates MoaD; sulfur-loaded MoaD and MoaE then convert cPMP to MPT.
      parts:
      - order: 1
        role: MoaD sulfur-carrier activation
        node:
          id: moaD_activation
          label: MoeB-dependent MoaD activation
          module_type: REACTION
          annotons:
          - id: moeB_moaD_adenylylation
            label: MoeB molybdopterin-synthase sulfur-carrier adenylyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial MoeB molybdopterin-synthase sulfur-carrier adenylyltransferase family
                term:
                  id: PANTHER:PTHR10953:SF194
                  label: MOLYBDOPTERIN-SYNTHASE ADENYLYLTRANSFERASE
                representative_members:
                - preferred_term: PSEPK moeB exemplar
                  term:
                    id: UniProtKB:Q88PW3
                    label: Molybdopterin-synthase adenylyltransferase
                  description: Pseudomonas putida KT2440 moeB/PP_0735.
                - preferred_term: Escherichia coli MoeB exemplar
                  term:
                    id: UniProtKB:P12282
                    label: Molybdopterin-synthase adenylyltransferase
                  description: Escherichia coli K-12 MoeB exemplar.
            function:
              preferred_term: molybdopterin-synthase adenylyltransferase activity
              term:
                id: GO:0061605
                label: molybdopterin-synthase adenylyltransferase activity
              substrates:
              - preferred_term: MoaD sulfur carrier with a C-terminal glycine
              - preferred_term: ATP
              products:
              - preferred_term: adenylylated MoaD C terminus
              - preferred_term: diphosphate
            role_description: Activates the MoaD C terminus for thiocarboxylate formation.
            evidence:
            - source_id: file:interpro/panther/PTHR10953/PTHR10953-entries.csv
              statement: The local PANTHER export contains E. coli MoeB P12282 in adenylyltransferase subfamily PTHR10953:SF194.
            - source_id: file:PSEPK/moeB/moeB-ai-review.yaml
              statement: The curated KT2440 review accepts GO:0061605 for Q88PW3 and rejects broader sulfurtransferase interpretations.
          - id: moaD_sulfur_carrier
            label: MoaD molybdopterin-synthase sulfur carrier
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial MoaD molybdopterin-synthase sulfur-carrier family
                term:
                  id: PANTHER:PTHR33359:SF1
                  label: MOLYBDOPTERIN SYNTHASE SULFUR CARRIER SUBUNIT
                representative_members:
                - preferred_term: PSEPK moaD exemplar
                  term:
                    id: UniProtKB:Q88NB9
                    label: Molybdopterin synthase sulfur carrier subunit
                  description: Pseudomonas putida KT2440 moaD/PP_1293.
                - preferred_term: Escherichia coli MoaD exemplar
                  term:
                    id: UniProtKB:P30748
                    label: Molybdopterin synthase sulfur carrier subunit
                  description: Escherichia coli K-12 MoaD exemplar.
            role_description: Accepts activation at its C-terminal glycine and carries sulfur as a thiocarboxylate.
            evidence:
            - source_id: file:interpro/panther/PTHR33359/PTHR33359-entries.csv
              statement: The local PANTHER export contains E. coli MoaD P30748 in sulfur-carrier subfamily PTHR33359:SF1.
            - source_id: file:PSEPK/moaD/moaD-ai-review.yaml
              statement: The curated KT2440 review identifies Q88NB9 as the MoaD sulfur-carrier subunit of molybdopterin synthase.
      - order: 2
        role: sulfur insertion into cPMP
        node:
          id: moaDE_mpt_synthesis
          label: MoaD-MoaE molybdopterin synthesis
          module_type: REACTION
          annotons:
          - id: moaDE_mpt_synthase_complex
            label: MoaD2-MoaE2 molybdopterin synthase complex
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: prokaryotic MoaD2-MoaE2 molybdopterin synthase complex
                term:
                  id: GO:1990140
                  label: molybdopterin synthase complex
                description: >-
                  Conserved heterotetramer containing two MoaE catalytic
                  subunits and two thiocarboxylated MoaD sulfur-carrier subunits.
                active_units:
                - id: moaE_catalytic_units
                  label: MoaE catalytic subunits
                  participant:
                    selector_type: ORTHOLOG_OF
                    ortholog_of:
                      preferred_term: PSEPK MoaE
                      term:
                        id: UniProtKB:Q88NB8
                        label: Molybdopterin synthase catalytic subunit
                      description: Orthologs of the curated Pseudomonas putida KT2440 moaE/PP_1294 enzyme.
                  role: Catalytic subunits that bind cPMP and receive sulfur from the paired MoaD C termini.
                  stoichiometry: "2 per heterotetramer"
                  function:
                    preferred_term: molybdopterin synthase activity
                    term:
                      id: GO:0030366
                      label: molybdopterin synthase activity
                  evidence:
                  - source_id: file:PSEPK/moaE/moaE-ai-review.yaml
                    statement: The curated KT2440 review accepts molybdopterin synthase activity for Q88NB8.
                - id: moaD_sulfur_carrier_units
                  label: MoaD sulfur-carrier subunits
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: prokaryotic MoaD molybdopterin synthase sulfur-carrier family
                      term:
                        id: PANTHER:PTHR33359:SF1
                        label: MOLYBDOPTERIN SYNTHASE SULFUR CARRIER SUBUNIT
                      representative_members:
                      - preferred_term: PSEPK moaD exemplar
                        term:
                          id: UniProtKB:Q88NB9
                          label: Molybdopterin synthase sulfur carrier subunit
                        description: Pseudomonas putida KT2440 moaD/PP_1293.
                      - preferred_term: Escherichia coli MoaD exemplar
                        term:
                          id: UniProtKB:P30748
                          label: Molybdopterin synthase sulfur carrier subunit
                        description: Escherichia coli K-12 MoaD exemplar.
                  role: Thiocarboxylated sulfur-carrier subunits that donate the two dithiolene sulfurs.
                  stoichiometry: "2 per heterotetramer"
                  evidence:
                  - source_id: file:PSEPK/moaD/moaD-ai-review.yaml
                    statement: The curated KT2440 review places Q88NB9 in the MoaD-MoaE molybdopterin synthase complex GO:1990140.
            function:
              preferred_term: molybdopterin synthase activity
              term:
                id: GO:0030366
                label: molybdopterin synthase activity
              substrates:
              - preferred_term: cyclic pyranopterin monophosphate (cPMP)
              - preferred_term: two sulfur equivalents carried by the MoaD thiocarboxylates
              products:
              - preferred_term: molybdopterin (MPT)
              - preferred_term: two discharged MoaD sulfur carriers
            role_description: >-
              The required MoaD2-MoaE2 complex incorporates two sulfur
              equivalents into cPMP to form the molybdopterin dithiolene.
            evidence:
            - source_id: file:interpro/panther/PTHR23404/PTHR23404-entries.csv
              statement: The local PANTHER export contains E. coli MoaE P30749 as a molybdopterin synthase catalytic subunit.
            - source_id: file:interpro/panther/PTHR33359/PTHR33359-entries.csv
              statement: The local PANTHER export contains E. coli MoaD P30748 in sulfur-carrier subfamily PTHR33359:SF1.
            - source_id: file:PSEPK/moaE/moaE-ai-review.yaml
              statement: The curated KT2440 review accepts molybdopterin synthase activity for Q88NB8.
            - source_id: file:PSEPK/moaD/moaD-ai-review.yaml
              statement: The curated KT2440 review places Q88NB9 in the MoaD-MoaE molybdopterin synthase complex GO:1990140.
      connections:
      - source: moaD_activation
        target: moaDE_mpt_synthesis
        connection_type: PRECEDES
        description: Activated MoaD is sulfur-loaded by an external sulfur-donor system before supplying the MoaE reaction.
  - order: 3
    role: MPT adenylylation and molybdate insertion
    node:
      id: mo_mpt_formation
      label: Mo-molybdopterin formation
      module_type: METABOLIC_PATHWAY
      description: Across prokaryotes, MPT is first adenylylated by a separate bacterial MogA or a catalytically competent prokaryotic MoaB and then loaded with molybdate by MoeA.
      parts:
      - order: 1
        role: MPT adenylylation
        node:
          id: mpt_adenylylation
          label: Molybdopterin adenylylation
          module_type: REACTION
          variant_sets:
          - id: mpt_adenylyltransferase_variants
            label: MPT adenylyltransferase implementations
            axis: prokaryotic enzyme lineage
            selection: ONE_OR_MORE
            variants:
            - id: mogA_variant
              label: Separate MogA adenylyltransferase
              module_type: REACTION
              annotons:
              - id: mogA_mpt_adenylyltransferase
                label: MogA molybdopterin adenylyltransferase
                participant:
                  selector_type: FAMILY
                  family:
                    preferred_term: bacterial MogA molybdopterin adenylyltransferase family
                    term:
                      id: PANTHER:PTHR43764:SF1
                      label: MOLYBDOPTERIN MOLYBDOTRANSFERASE
                    description: >-
                      MogA-family MPT adenylyltransferases; no exact KT2440
                      representative was found in this family.
                    representative_members:
                    - preferred_term: Escherichia coli MogA exemplar
                      term:
                        id: UniProtKB:P0AF03
                        label: Molybdopterin adenylyltransferase
                      description: Escherichia coli K-12 MogA exemplar.
                function:
                  preferred_term: molybdopterin adenylyltransferase activity
                  term:
                    id: GO:0061598
                    label: molybdopterin adenylyltransferase activity
                  substrates:
                  - preferred_term: molybdopterin (MPT)
                  - preferred_term: ATP
                  products:
                  - preferred_term: adenylyl-molybdopterin
                  - preferred_term: diphosphate
                role_description: Activates MPT for molybdate insertion.
                evidence:
                - source_id: file:interpro/panther/PTHR43764/PTHR43764-entries.csv
                  statement: The local PANTHER export contains E. coli MogA P0AF03 as a molybdopterin adenylyltransferase.
            - id: active_moaB_variant
              label: Catalytically competent prokaryotic MoaB adenylyltransferase
              module_type: REACTION
              annotons:
              - id: active_moaB_mpt_adenylyltransferase
                label: Catalytically competent prokaryotic MoaB molybdopterin adenylyltransferase
                participant:
                  selector_type: ORTHOLOG_OF
                  ortholog_of:
                    preferred_term: Pyrococcus furiosus MoaB
                    term:
                      id: UniProtKB:Q8U3T3
                      label: Molybdopterin adenylyltransferase
                  description: Restricted to prokaryotic MoaB lineages with demonstrated or independently supported catalytic activity.
                function:
                  preferred_term: molybdopterin adenylyltransferase activity
                  term:
                    id: GO:0061598
                    label: molybdopterin adenylyltransferase activity
                  substrates:
                  - preferred_term: molybdopterin (MPT)
                  - preferred_term: ATP
                  products:
                  - preferred_term: adenylyl-molybdopterin
                  - preferred_term: diphosphate
                role_description: Provides the MogA-equivalent reaction only in catalytically competent prokaryotic MoaB lineages.
                evidence:
                - source_id: file:interpro/panther/PTHR43232/PTHR43232-entries.csv
                  statement: The local PANTHER export identifies P. furiosus MoaB Q8U3T3 as a molybdopterin adenylyltransferase.
      - order: 2
        role: molybdate insertion into adenylyl-MPT
        node:
          id: molybdate_insertion
          label: Molybdopterin molybdotransfer
          module_type: REACTION
          annotons:
          - id: moeA_molybdotransferase
            label: MoeA molybdopterin molybdotransferase
            participant:
              selector_type: ORTHOLOG_OF
              ortholog_of:
                preferred_term: PSEPK MoeA
                term:
                  id: UniProtKB:Q88L14
                  label: Molybdopterin molybdenumtransferase
                description: Orthologs of the curated Pseudomonas putida KT2440 moeA/PP_2123 enzyme.
            function:
              preferred_term: molybdopterin molybdotransferase activity
              term:
                id: GO:0061599
                label: molybdopterin molybdotransferase activity
              substrates:
              - preferred_term: adenylyl-molybdopterin
              - preferred_term: molybdate
              products:
              - preferred_term: Mo-molybdopterin (Mo-MPT)
              - preferred_term: AMP
            role_description: Inserts molybdate into activated MPT.
            evidence:
            - source_id: file:interpro/panther/PTHR10192/PTHR10192-entries.csv
              statement: The local PANTHER export contains E. coli MoeA P12281 as a molybdopterin molybdenumtransferase.
            - source_id: file:PSEPK/moeA/moeA-ai-review.yaml
              statement: The curated KT2440 review accepts molybdopterin molybdotransferase activity for Q88L14.
      connections:
      - source: mpt_adenylylation
        target: molybdate_insertion
        connection_type: PROVIDES_INPUT_FOR
        description: Adenylyl-MPT produced by the selected activation variant is the substrate for molybdate insertion.
        chaining_status: VERIFIED
  - order: 4
    role: optional nucleotide maturation of Mo-MPT
    optional: true
    node:
      id: nucleotide_maturation
      label: Optional Mo-MPT nucleotide maturation
      module_type: METABOLIC_PATHWAY
      description: A realization may retain Mo-MPT or append guanine and/or cytosine nucleotides for compatible client classes.
      variant_sets:
      - id: nucleotide_maturation_variants
        label: Mo-MPT dinucleotide variants
        axis: appended nucleotide
        selection: ZERO_OR_MORE
        variants:
        - id: mgd_variant
          label: MGD formation by MobA
          module_type: REACTION
          annotons:
          - id: mobA_mgd_synthesis
            label: MobA molybdenum cofactor guanylyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial MobA molybdenum cofactor guanylyltransferase family
                term:
                  id: PANTHER:PTHR19136:SF81
                  label: MOLYBDENUM COFACTOR GUANYLYLTRANSFERASE
                representative_members:
                - preferred_term: PSEPK mobA exemplar
                  term:
                    id: UniProtKB:Q88HA3
                    label: Molybdenum cofactor guanylyltransferase
                  description: Pseudomonas putida KT2440 mobA/PP_3457.
                - preferred_term: Escherichia coli MobA exemplar
                  term:
                    id: UniProtKB:P32173
                    label: Molybdenum cofactor guanylyltransferase
                  description: Escherichia coli K-12 MobA exemplar.
            function:
              preferred_term: molybdenum cofactor guanylyltransferase activity
              term:
                id: GO:0061603
                label: molybdenum cofactor guanylyltransferase activity
              substrates:
              - preferred_term: Mo-molybdopterin (Mo-MPT)
              - preferred_term: GTP
              products:
              - preferred_term: Mo-molybdopterin guanine dinucleotide (MGD)
              - preferred_term: diphosphate
            role_description: Produces the guanine-dinucleotide cofactor variant.
            evidence:
            - source_id: file:interpro/panther/PTHR19136/PTHR19136-entries.csv
              statement: The local PANTHER export contains PSEPK Q88HA3 and E. coli P32173 in guanylyltransferase subfamily PTHR19136:SF81.
            - source_id: file:PSEPK/mobA/mobA-ai-review.yaml
              statement: The curated KT2440 review accepts molybdenum cofactor guanylyltransferase activity for Q88HA3.
        - id: mcd_variant
          label: MCD formation by MocA
          module_type: REACTION
          annotons:
          - id: mocA_mcd_synthesis
            label: MocA molybdenum cofactor cytidylyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial MocA molybdenum cofactor cytidylyltransferase family
                term:
                  id: PANTHER:PTHR43777:SF1
                  label: MOLYBDENUM COFACTOR CYTIDYLYLTRANSFERASE
                description: >-
                  MocA proteins supported by orthology and subfamily context;
                  the broader PTHR43777 family also contains non-MocA proteins.
                representative_members:
                - preferred_term: PSEPK PP_2483 predicted MocA exemplar
                  term:
                    id: UniProtKB:Q88K10
                    label: MobA-like NTP transferase domain-containing protein
                  description: >-
                    Pseudomonas putida KT2440 PP_2483; K07141 and PANTHER
                    subfamily support MocA activity, but no direct CTP assay is available.
                - preferred_term: PSEPK PP_4230 predicted MocA exemplar
                  term:
                    id: UniProtKB:Q88F68
                    label: MobA-like NTP transferase domain-containing protein
                  description: >-
                    Pseudomonas putida KT2440 PP_4230; K07141 and PANTHER
                    subfamily support MocA activity, but no direct CTP assay is available.
                - preferred_term: Escherichia coli MocA exemplar
                  term:
                    id: UniProtKB:Q46810
                    label: Molybdenum cofactor cytidylyltransferase
                  description: Experimentally characterized MocA exemplar.
            function:
              preferred_term: molybdenum cofactor cytidylyltransferase activity
              term:
                id: GO:0061602
                label: molybdenum cofactor cytidylyltransferase activity
              substrates:
              - preferred_term: Mo-molybdopterin (Mo-MPT)
              - preferred_term: CTP
              products:
              - preferred_term: Mo-molybdopterin cytosine dinucleotide (MCD)
              - preferred_term: diphosphate
            role_description: Produces the cytosine-dinucleotide cofactor variant.
            evidence:
