id: MODULE:molybdenum_cofactor_biosynthesis
title: Molybdenum cofactor (MoCo) biosynthesis and maturation (MOCS1/MOCS2/MOCS3/GPHN/MOCOS + SUOX)
description: >-
  The molybdenum cofactor (MoCo) is the essential prosthetic group of the human molybdoenzymes —
  sulfite oxidase (SUOX), xanthine dehydrogenase/oxidase (XDH) and aldehyde oxidase (AOX1) — and is
  synthesised de novo from GTP through a conserved four-step pathway. First, the bifunctional MOCS1
  (MOCS1A + MOCS1B) converts GTP to cyclic pyranopterin monophosphate (cPMP): its MOCS1A domain is a
  radical-SAM enzyme carrying two [4Fe-4S] clusters that makes the cyclic pterin intermediate, and
  MOCS1B completes cPMP. Second, molybdopterin synthase — the (MOCS2A)2(MOCS2B)2 heterotetramer of
  the bicistronic MOCS2 gene — inserts two sulfurs into cPMP to form molybdopterin (MPT), with the
  sulfur delivered by the thiocarboxylated C-terminus of the ubiquitin-like MOCS2A, which is
  regenerated by the adenylyltransferase/sulfurtransferase MOCS3 (which also activates URM1 for tRNA
  thiolation). Third, the bifunctional scaffold protein gephyrin (GPHN) completes MoCo: its G domain
  adenylylates MPT and its E domain inserts molybdenum to give the mature cofactor (GPHN also
  moonlights as the master scaffold clustering glycine and GABA-A receptors at inhibitory synapses).
  Finally, the PLP-dependent molybdenum cofactor sulfurase MOCOS converts MoCo to its terminal-sulfido
  form required specifically by XDH and AOX1, whereas SUOX uses the mature dioxo-MoCo (with a b5-type
  heme) directly to oxidise sulfite to sulfate. Loss of the biosynthetic enzymes causes molybdenum
  cofactor deficiency (types A/B/C) — a devastating neonatal epileptic encephalopathy phenotypically
  identical to isolated SUOX deficiency; MOCOS defects cause xanthinuria type II.
status: DRAFT
evidence:
  - source_id: GO:0006777
    title: Mo-molybdopterin cofactor biosynthetic process
    statement: The pathway carries out Mo-molybdopterin cofactor (MoCo) biosynthesis (GO:0006777) from GTP.
  - source_id: file:human/MOCS1/MOCS1-ai-review.yaml
    title: MOCS1 gene review (human)
    statement: The GTP->cPMP step (UniProtKB:Q9NZB8, GO:0061798/GO:0061799) matches the completed human MOCS1 review.
  - source_id: file:human/MOCS2/MOCS2-ai-review.yaml
    title: MOCS2 gene review (human)
    statement: The molybdopterin synthase (cPMP->MPT) step (UniProtKB:O96007, GO:0030366) matches the completed human MOCS2 review.
  - source_id: file:human/MOCS3/MOCS3-ai-review.yaml
    title: MOCS3 gene review (human)
    statement: The MOCS2A/URM1 sulfur-carrier activation step (UniProtKB:O95396, GO:0061605/GO:0061604) matches the completed human MOCS3 review.
  - source_id: file:human/GPHN/GPHN-ai-review.yaml
    title: GPHN gene review (human)
    statement: The MPT->MoCo completion step (UniProtKB:Q9NQX3, GO:0061598/GO:0061599) matches the completed human GPHN review.
  - source_id: file:human/MOCOS/MOCOS-ai-review.yaml
    title: MOCOS gene review (human)
    statement: The MoCo sulfuration (sulfido-MoCo for XDH/AOX) step (UniProtKB:Q96EN8, GO:0008265) matches the completed human MOCOS review.
  - source_id: file:human/SUOX/SUOX-ai-review.yaml
    title: SUOX gene review (human)
    statement: The MoCo-dependent sulfite oxidase (UniProtKB:P51687, GO:0008482) matches the completed human SUOX review.
module:
  id: molybdenum_cofactor_biosynthesis
  label: Molybdenum cofactor (MoCo) biosynthesis and maturation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: Mo-molybdopterin cofactor biosynthetic process
      term:
        id: GO:0006777
        label: Mo-molybdopterin cofactor biosynthetic process
      description: De novo synthesis of MoCo from GTP (cPMP -> molybdopterin -> MoCo).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The MoCo-biosynthesis enzymes and MOCOS act (largely) in the cytosol.
      - preferred_term: mitochondrial intermembrane space
        term:
          id: GO:0005758
          label: mitochondrial intermembrane space
        description: The MoCo-dependent SUOX acts in the mitochondrial intermembrane space.
  parts:
    - order: 1
      role: GTP -> cyclic pyranopterin monophosphate (cPMP)
      node:
        id: gtp_to_cpmp
        label: cPMP synthesis (MOCS1)
        module_type: REACTION
        annotons:
          - id: mocs1_activity
            label: "MOCS1: GTP 3',8'-cyclase / cPMP synthase (bifunctional, radical-SAM)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MOCS1 / molybdenum cofactor biosynthesis protein 1 family
                term:
                  id: PANTHER:PTHR22960
                  label: MOLYBDENUM COFACTOR BIOSYNTHESIS PROTEIN 1
                representative_members:
                  - preferred_term: MOCS1 (human)
                    term:
                      id: UniProtKB:Q9NZB8
                      label: GTP 3',8-cyclase
            function:
              preferred_term: GTP 3',8'-cyclase activity
              term:
                id: GO:0061798
                label: GTP 3',8'-cyclase activity
              substrates:
                - preferred_term: GTP
                - preferred_term: S-adenosyl-L-methionine (radical-SAM; 2x [4Fe-4S])
              products:
                - preferred_term: cyclic pyranopterin monophosphate (cPMP) (via cyclic intermediate + MOCS1B, GO:0061799)
              evidence:
                - source_id: file:human/MOCS1/MOCS1-ai-review.yaml
                  statement: bifunctional MOCS1A (radical-SAM, GO:0061798 + GO:0051539 [4Fe-4S]) + MOCS1B (cPMP synthase, GO:0061799); first committed MoCo step; deficiency = MoCo deficiency type A (cPMP-treatable)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Converts GTP to cyclic pyranopterin monophosphate (cPMP).
    - order: 2
      role: cPMP -> molybdopterin (MPT) with sulfur-carrier regeneration
      node:
        id: cpmp_to_mpt
        label: Molybdopterin synthesis (MOCS2, MOCS3)
        module_type: REACTION
        annotons:
          - id: mocs2_activity
            label: "MOCS2: molybdopterin synthase (MOCS2A/MOCS2B)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MOCS2 / molybdopterin synthase family
                term:
                  id: PANTHER:PTHR23404
                  label: MOLYBDOPTERIN SYNTHASE
                representative_members:
                  - preferred_term: MOCS2 (human)
                    term:
                      id: UniProtKB:O96007
                      label: Molybdopterin synthase catalytic subunit
            function:
              preferred_term: molybdopterin synthase activity
              term:
                id: GO:0030366
                label: molybdopterin synthase activity
              substrates:
                - preferred_term: cyclic pyranopterin monophosphate (cPMP)
                - preferred_term: thiocarboxylated MOCS2A (sulfur donor)
              products:
                - preferred_term: molybdopterin (MPT)
              evidence:
                - source_id: file:human/MOCS2/MOCS2-ai-review.yaml
                  statement: (MOCS2A)2(MOCS2B)2 heterotetramer; inserts two sulfurs into cPMP to make molybdopterin; deficiency = MoCo deficiency type B
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Converts cPMP to molybdopterin (inserts two sulfurs).
          - id: mocs3_activity
            label: "MOCS3: MOCS2A/URM1 adenylyltransferase-sulfurtransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MOCS3 / UBA4 sulfur-carrier-activating family
                term:
                  id: PANTHER:PTHR10953
                  label: ADENYLYLTRANSFERASE AND SULFURTRANSFERASE MOCS3
                representative_members:
                  - preferred_term: MOCS3 (human)
                    term:
                      id: UniProtKB:O95396
                      label: Adenylyltransferase and sulfurtransferase MOCS3
            function:
              preferred_term: molybdopterin-synthase adenylyltransferase activity
              term:
                id: GO:0061605
                label: molybdopterin-synthase adenylyltransferase activity
              substrates:
                - preferred_term: MOCS2A (and URM1) C-terminus
                - preferred_term: ATP + sulfur (from persulfide)
              products:
                - preferred_term: thiocarboxylated MOCS2A (regenerated sulfur carrier)
              evidence:
                - source_id: file:human/MOCS3/MOCS3-ai-review.yaml
                  statement: adenylylates then thiocarboxylates the MOCS2A C-terminus (GO:0061604 sulfurtransferase); also activates URM1 for tRNA 2-thiolation (GO:0042292)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Regenerates the thiocarboxylated MOCS2A sulfur carrier (and activates URM1).
    - order: 3
      role: molybdopterin -> mature molybdenum cofactor (MoCo)
      node:
        id: mpt_to_moco
        label: MoCo completion (GPHN)
        module_type: REACTION
        annotons:
          - id: gphn_activity
            label: "GPHN (gephyrin): MPT adenylyltransferase + molybdotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GPHN / gephyrin (MogA+MoeA) family
                term:
                  id: PANTHER:PTHR10192
                  label: GEPHYRIN
                representative_members:
                  - preferred_term: GPHN (human)
                    term:
                      id: UniProtKB:Q9NQX3
                      label: Gephyrin
            function:
              preferred_term: molybdopterin adenylyltransferase activity
              term:
                id: GO:0061598
                label: molybdopterin adenylyltransferase activity
              substrates:
                - preferred_term: molybdopterin (MPT)
                - preferred_term: ATP + molybdate
              products:
                - preferred_term: mature molybdenum cofactor (MoCo)
              evidence:
                - source_id: file:human/GPHN/GPHN-ai-review.yaml
                  statement: bifunctional G-domain adenylyltransferase (GO:0061598) + E-domain molybdotransferase (GO:0061599); completes MoCo; also the inhibitory-synapse scaffold clustering GlyR/GABA-A receptors; deficiency = MoCo deficiency type C
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Adenylylates MPT and inserts molybdenum to make mature MoCo (also a synaptic scaffold).
    - order: 4
      role: MoCo maturation (sulfido-MoCo) and utilization
      node:
        id: moco_maturation_use
        label: MoCo sulfuration and utilization (MOCOS, SUOX)
        module_type: REACTION
        annotons:
          - id: mocos_activity
            label: "MOCOS: molybdenum cofactor sulfurase (for XDH/AOX)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MOCOS / molybdenum cofactor sulfurase family
                term:
                  id: PANTHER:PTHR14237
                  label: MOLYBDENUM COFACTOR SULFURASE
                representative_members:
                  - preferred_term: MOCOS (human)
                    term:
                      id: UniProtKB:Q96EN8
                      label: Molybdenum cofactor sulfurase
            function:
              preferred_term: molybdenum cofactor sulfurtransferase activity
              term:
                id: GO:0008265
                label: molybdenum cofactor sulfurtransferase activity
              substrates:
                - preferred_term: mature MoCo (dioxo form)
                - preferred_term: L-cysteine (sulfur donor; PLP-dependent)
              products:
                - preferred_term: sulfido-MoCo (for xanthine dehydrogenase/aldehyde oxidase)
              evidence:
                - source_id: file:human/MOCOS/MOCOS-ai-review.yaml
                  statement: PLP-dependent (GO:0030170) NifS-like cysteine-desulfurase; converts MoCo to the terminal-sulfido form required by XDH/AOX; deficiency = xanthinuria type II
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Sulfurates MoCo to the sulfido form (for XDH/AOX).
          - id: suox_activity
            label: "SUOX: sulfite oxidase (MoCo + heme; a MoCo-dependent enzyme)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SUOX / sulfite oxidase family
                term:
                  id: PANTHER:PTHR19372
                  label: SULFITE OXIDASE
                representative_members:
                  - preferred_term: SUOX (human)
                    term:
                      id: UniProtKB:P51687
                      label: Sulfite oxidase, mitochondrial
            function:
              preferred_term: sulfite oxidase activity
              term:
                id: GO:0008482
                label: sulfite oxidase activity
              substrates:
                - preferred_term: sulfite
                - preferred_term: cytochrome c (via MoCo, GO:0043546; and heme, GO:0020037)
              products:
                - preferred_term: sulfate
              evidence:
                - source_id: file:human/SUOX/SUOX-ai-review.yaml
                  statement: MoCo (GO:0043546) + b5-heme (GO:0020037)-dependent oxidase; terminal step of sulfur-amino-acid catabolism (sulfite -> sulfate); deficiency = isolated sulfite oxidase deficiency
            locations:
              - preferred_term: mitochondrial intermembrane space
                term:
                  id: GO:0005758
                  label: mitochondrial intermembrane space
            role_description: MoCo-dependent oxidation of sulfite to sulfate (a MoCo target enzyme).
  connections:
    - source: gtp_to_cpmp
      target: cpmp_to_mpt
      connection_type: PROVIDES_INPUT_FOR
      description: cPMP from MOCS1 is converted to molybdopterin by MOCS2 (with MOCS3-regenerated sulfur carrier).
    - source: cpmp_to_mpt
      target: mpt_to_moco
      connection_type: PROVIDES_INPUT_FOR
      description: Molybdopterin is adenylylated and molybdenum-loaded by gephyrin (GPHN) to mature MoCo.
    - source: mpt_to_moco
      target: moco_maturation_use
      connection_type: PROVIDES_INPUT_FOR
      description: Mature MoCo is used directly by SUOX and sulfurated by MOCOS to the sulfido form for XDH/AOX.
  notes: >-
    Molybdenum cofactor (MoCo) biosynthesis (GO:0006777) from GTP, grounded to the completed human
    gene reviews: MOCS1 (Q9NZB8, GO:0061798 GTP 3',8'-cyclase + GO:0061799 cPMP synthase + [4Fe-4S]),
    MOCS2 (O96007, GO:0030366 molybdopterin synthase), MOCS3 (O95396, GO:0061605 adenylyltransferase +
    GO:0061604 sulfurtransferase; also GO:0042292 URM1-activating for tRNA thiolation), gephyrin GPHN
    (Q9NQX3, GO:0061598 MPT adenylyltransferase + GO:0061599 molybdotransferase; also the inhibitory-
    synapse GlyR/GABA-A scaffold, GO:0030674), MOCOS (Q96EN8, GO:0008265 MoCo sulfurase + PLP, making
    sulfido-MoCo for XDH/AOX) and the MoCo-dependent SUOX (P51687, GO:0008482 sulfite oxidase + MoCo
    GO:0043546 + heme GO:0020037). GO term ids/labels verified against the local go.db. MoCo is the
    cofactor of SUOX, XDH (on main) and AOX1. Disorders: MoCo deficiency types A/B/C (MOCS1/MOCS2/GPHN)
    and isolated SUOX deficiency — severe neonatal epileptic encephalopathy; MOCOS — xanthinuria type
    II; GPHN also — hyperekplexia/epilepsy via its synaptic-scaffold role.
