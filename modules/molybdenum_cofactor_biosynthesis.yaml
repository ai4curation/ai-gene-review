    connection_type: PROVIDES_INPUT_FOR
    description: Mo-MPT may be retained directly or converted to MGD and/or MCD.
knowledge_gaps:
- gap_statement: >-
    Whether the KT2440 MoaB-family paralogs moaB-I (UniProtKB:Q88L15) and
    moaB-II (UniProtKB:Q88E67) catalyze MPT adenylylation, serve an accessory
