id: MODULE:osmotic_envelope_efflux_regulation_boundary
title: Osmotic envelope and efflux regulation boundary
description: Boundary module for the ppu02020 osmotic/envelope/efflux partition in Pseudomonas putida
  KT2440. It captures EnvZ/OmpR and EvgS/EvgA-like phosphorelay regulators plus the adjacent MdtABC RND
  multidrug efflux pump context. This is a partition of the broad KEGG two-component-system map, not a
  single linear pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups ompR, envZ, PP_2100, evgA, mdtC, mdtB, and mdtA into the osmotic/envelope/efflux
    regulation bucket.
notes: The MdtABC efflux pump is transport context for the regulatory bucket, not a His-Asp phosphorelay
  component. Its subunits are kept in the same boundary module because the KEGG ppu02020 umbrella groups
  local regulatory and efflux context together.
