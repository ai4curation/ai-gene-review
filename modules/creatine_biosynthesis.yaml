id: MODULE:creatine_biosynthesis
title: Creatine biosynthesis (vertebrate, two-step AGAT to GAMT)
description: >-
  De novo biosynthesis of creatine, the two-step pathway that supplies the
  phosphocreatine/creatine system used for cellular energy buffering in tissues
  with high and fluctuating ATP demand (skeletal and cardiac muscle, brain). The
  pathway is short and committed: L-arginine and glycine are first condensed by
  L-arginine:glycine amidinotransferase (AGAT/GATM) to give guanidinoacetate
  (GAA) and L-ornithine, then guanidinoacetate is methylated by
  guanidinoacetate N-methyltransferase (GAMT) using S-adenosyl-L-methionine
  (SAM) as the methyl donor to yield creatine and S-adenosyl-L-homocysteine
  (SAH). The two activities are characteristically split both by subcellular
  compartment and, in mammals, by organ: AGAT/GATM is a mitochondrial
  intermembrane-space enzyme and catalyses the first, committed, feedback-
  regulated step (creatine represses GATM), whereas GAMT is a cytosolic enzyme
  and is the second, methylation step. The first step is most active in kidney
  and pancreas and the second predominates in liver, so guanidinoacetate is an
  inter-organ intermediate that is exported and taken up before methylation;
  finished creatine is distributed in the blood and imported into target tissues
  by the creatine transporter SLC6A8. GAMT is also the largest single consumer of
  SAM-derived methyl groups in the body, tying creatine synthesis to one-carbon /
  methionine-cycle metabolism. Inherited deficiency of either enzyme (and of the
  SLC6A8 transporter) causes cerebral creatine-deficiency syndromes. Creatine
  utilization by the creatine kinases (the phosphocreatine shuttle and the
  "futile creatine cycle") is downstream of this module and is not part of the
  biosynthetic pathway itself.
status: DRAFT
evidence:
  - source_id: GO:0006601
    title: creatine biosynthetic process
    statement: The module is grounded in the GO biological-process term for creatine biosynthesis.
  - source_id: EC:2.1.4.1
    title: glycine amidinotransferase
    statement: >-
      Step 1 (AGAT/GATM) corresponds to EC 2.1.4.1, L-arginine:glycine
      amidinotransferase (KEGG:R00565; MetaCyc:GLYCINE-AMINOTRANSFERASE-RXN).
  - source_id: EC:2.1.1.2
    title: guanidinoacetate N-methyltransferase
    statement: >-
      Step 2 (GAMT) corresponds to EC 2.1.1.2, guanidinoacetate
      N-methyltransferase (KEGG:R01883; MetaCyc:GUANIDINOACETATE-N-METHYLTRANSFERASE-RXN).
  - source_id: file:rat/Gamt/Gamt-ai-review.yaml
    title: Rat Gamt gene review
    statement: >-
      The GAMT molecular-function and creatine-biosynthesis groundings are
      consistent with the reviewed rat Gamt annotations (GO:0030731, GO:0006601).
module:
  id: creatine_biosynthesis
  label: Creatine biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: creatine biosynthetic process
      term:
        id: GO:0006601
        label: creatine biosynthetic process
      description: >-
        Formation of creatine from L-arginine and glycine in two enzymatic
        steps via the guanidinoacetate intermediate.
  context:
    cellular_components:
      - preferred_term: mitochondrial intermembrane space
        term:
          id: GO:0005758
          label: mitochondrial intermembrane space
        description: Compartment of the first step (AGAT/GATM).
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Compartment of the second step (GAMT).
  parts:
    - order: 1
      role: first committed step (amidino transfer)
      node:
        id: agat_step
        label: L-arginine + glycine to guanidinoacetate + L-ornithine
        module_type: REACTION
        annotons:
          - id: gatm_activity
            label: "GATM/AGAT: glycine amidinotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: GATM (L-arginine:glycine amidinotransferase, AGAT)
                term:
                  id: UniProtKB:P50440
                  label: Glycine amidinotransferase, mitochondrial
            function:
              preferred_term: glycine amidinotransferase activity
              term:
                id: GO:0015068
                label: glycine amidinotransferase activity
              substrates:
                - preferred_term: L-arginine
                - preferred_term: glycine
              products:
                - preferred_term: guanidinoacetate
                - preferred_term: L-ornithine
              evidence:
                - source_id: EC:2.1.4.1
                  statement: L-arginine:glycine amidinotransferase
                  notes: "KEGG:R00565; MetaCyc:GLYCINE-AMINOTRANSFERASE-RXN"
            locations:
              - preferred_term: mitochondrial intermembrane space
                term:
                  id: GO:0005758
                  label: mitochondrial intermembrane space
            role_description: >-
              First and committed step of creatine biosynthesis: transfers the
              amidino group of L-arginine to glycine, producing guanidinoacetate
              and L-ornithine. Feedback-repressed by creatine, making this the
              regulated entry point of the pathway. Most active in kidney and
              pancreas.
    - order: 2
      role: terminal methylation step
      node:
        id: gamt_step
        label: guanidinoacetate + SAM to creatine + SAH
        module_type: REACTION
        annotons:
          - id: gamt_activity
            label: "GAMT: guanidinoacetate N-methyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: GAMT (guanidinoacetate N-methyltransferase)
                term:
                  id: UniProtKB:Q14353
                  label: Guanidinoacetate N-methyltransferase
            function:
              preferred_term: guanidinoacetate N-methyltransferase activity
              term:
                id: GO:0030731
                label: guanidinoacetate N-methyltransferase activity
              substrates:
                - preferred_term: guanidinoacetate
                - preferred_term: S-adenosyl-L-methionine (SAM)
              products:
                - preferred_term: creatine
                - preferred_term: S-adenosyl-L-homocysteine (SAH)
              evidence:
                - source_id: EC:2.1.1.2
                  statement: guanidinoacetate N-methyltransferase
                  notes: "KEGG:R01883; MetaCyc:GUANIDINOACETATE-N-METHYLTRANSFERASE-RXN"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal step of creatine biosynthesis: SAM-dependent N-methylation
              of guanidinoacetate to creatine, releasing SAH. Predominates in
              liver and is a major consumer of SAM-derived methyl groups, linking
              creatine synthesis to the methionine / one-carbon cycle.
  connections:
    - source: agat_step
      target: gamt_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Guanidinoacetate produced by AGAT/GATM is the substrate methylated by
        GAMT. In mammals the two steps are partly distributed across organs
        (kidney/pancreas to liver), so guanidinoacetate is an inter-organ
        intermediate.
  notes: >-
    Two-step vertebrate creatine biosynthesis grounded to the human enzymes
    GATM/AGAT (UniProtKB:P50440, GO:0015068, EC 2.1.4.1) and GAMT
    (UniProtKB:Q14353, GO:0030731, EC 2.1.1.2). GO molecular-function terms were
    verified via QuickGO; the GAMT groundings are consistent with the reviewed
    rat Gamt annotations. Downstream creatine utilization (creatine kinases,
    phosphocreatine shuttle, the "futile creatine cycle"; e.g. GO-CAM
    gomodel:60ad85f700000898) and the SLC6A8 creatine transporter are
    deliberately excluded as they are not part of the biosynthetic pathway.
