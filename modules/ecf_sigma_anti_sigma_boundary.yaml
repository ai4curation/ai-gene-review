id: MODULE:ecf_sigma_anti_sigma_boundary
title: ECF sigma and anti-sigma regulation boundary
description: Boundary module for the ppu02020 ECF sigma/anti-sigma partition in Pseudomonas putida KT2440.
  It captures predicted sigma-70 ECF sigma factors and adjacent or orphan FecR-like transmembrane anti-sigma/sensor
  proteins. This is a curated regulatory boundary from the broad KEGG two-component-system map rather
  than a canonical His-Asp phosphorelay.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups PP_0161, PP_0162, PP_0351, PP_0352, PP_0667, PP_0703, PP_0704,
    PP_0866, PP_3085, and PP_3086 into the ECF sigma/anti-sigma bucket.
notes: The bucket is intentionally a boundary module. Paired local anti-sigma/sigma systems are represented
  where adjacent partners are present, while PP_0667 and PP_0866 are retained as orphan ECF sigma or anti-sigma
  context pending regulon-level evidence.
