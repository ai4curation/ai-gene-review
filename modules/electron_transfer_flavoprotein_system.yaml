id: MODULE:electron_transfer_flavoprotein_system
title: Electron-transfer flavoprotein (ETF) system — electron sink for mitochondrial FAD dehydrogenases
description: >-
  The electron-transfer flavoprotein (ETF) system is the shared electron-relay
  that couples a large set of mitochondrial matrix FAD-dependent dehydrogenases to
  the respiratory chain. At least a dozen matrix flavoenzymes — the acyl-CoA
  dehydrogenases of fatty-acid beta-oxidation (ACADVL, ACADM, ACADS, ACAD9, etc.),
  the branched-chain and other acyl-CoA dehydrogenases of amino-acid catabolism
  (IVD, GCDH, etc.), sarcosine and dimethylglycine dehydrogenases, and others —
  do not pass their electrons directly to the respiratory chain. Instead they
  reduce a common, soluble matrix heterodimeric flavoprotein, ETF (the ETFA
  alpha subunit, which carries the FAD, plus the ETFB beta subunit, which carries
  AMP and provides the docking surface for the partner dehydrogenases). Reduced
  ETF then diffuses to the inner-membrane iron-sulfur flavoprotein ETF-ubiquinone
  oxidoreductase (ETFDH / ETF-QO), which reoxidises ETF and transfers the electrons
  to ubiquinone (CoQ) in the respiratory chain, linking these oxidations to
  oxidative phosphorylation. Because ETF/ETFDH is the common electron sink for so
  many dehydrogenases, its inherited deficiency (ETFA, ETFB or ETFDH) causes
  multiple acyl-CoA dehydrogenase deficiency (MADD / glutaric acidemia type 2), a
  severe fatty-acid-oxidation and amino-acid-oxidation disorder; the ETFDH form is
  frequently riboflavin-responsive and can present as a myopathy with secondary
  coenzyme-Q10 deficiency.
status: DRAFT
evidence:
  - source_id: GO:0045251
    title: electron transfer flavoprotein complex
    statement: >-
      The soluble electron acceptor is grounded in the GO electron transfer
      flavoprotein complex (GO:0045251, the ETFA/ETFB heterodimer).
  - source_id: Reactome:R-HSA-169270
    title: "ETFDH oxidises ETF (reduced) to ETF, reduces CoQ to CoQH2"
    statement: >-
      The relay follows the human Reactome reactions R-HSA-169260 (acyl-CoA
      dehydrogenases reduce ETF) and R-HSA-169270 (ETFDH reoxidises ETF and
      reduces ubiquinone), feeding respiratory electron transport (R-HSA-611105).
  - source_id: file:human/ETFA/ETFA-ai-review.yaml
    title: ETFA gene review (human)
    statement: >-
      The ETF alpha-subunit grounding (UniProtKB:P13804, GO:0009055 electron
      transfer activity, FAD binding, GO:0045251 complex) matches the completed
      human ETFA review.
  - source_id: file:human/ETFB/ETFB-ai-review.yaml
    title: ETFB gene review (human)
    statement: >-
      The ETF beta-subunit grounding (UniProtKB:P38117, GO:0009055, GO:0045251
      complex) matches the completed human ETFB review.
  - source_id: file:human/ETFDH/ETFDH-ai-review.yaml
    title: ETFDH gene review (human)
    statement: >-
      The ETF-ubiquinone oxidoreductase grounding (UniProtKB:Q16134, GO:0004174
      electron-transferring-flavoprotein dehydrogenase activity, inner membrane)
      matches the completed human ETFDH review.
