                  label: mitochondrial inner membrane
            role_description: >-
              Inner-membrane FAD + [4Fe-4S] flavoprotein that reoxidises reduced
              ETF and delivers the electrons to ubiquinone, linking the many
              matrix FAD dehydrogenases to the respiratory chain. Deficiency causes
              MADD / glutaric acidemia type 2 (type III), often riboflavin-
              responsive, with secondary CoQ10 deficiency.
  connections:
    - source: etf_reduction_step
      target: etfdh_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Reduced ETF produced when the matrix dehydrogenases transfer electrons to
        the ETFA/ETFB heterodimer is the substrate reoxidised by ETFDH, which then
        reduces ubiquinone.
  notes: >-
    The electron-transfer flavoprotein system grounded to the human proteins ETFA
    (UniProtKB:P13804, GO:0009055, FAD-bearing alpha subunit) and ETFB (P38117,
    GO:0009055, AMP-binding beta subunit) forming the ETF heterodimer (GO:0045251),
    and ETFDH (Q16134, GO:0004174, EC 1.5.5.1) the inner-membrane ETF-ubiquinone
    oxidoreductase. GO molecular-function/cellular-component terms were taken from
    the human GOA records; Reactome reaction ids and titles were verified against
    the local reactome cache. Each step uses a PANTHER family selector (generic
    over paralogs and orthologs) plus a concrete human representative member; the
    ETF heterodimer is modelled as a PROTEIN_COMPLEX node. Upstream, the electron
    donors are the many matrix FAD-dependent acyl-CoA dehydrogenases (of fatty-acid
    beta-oxidation — see the fatty_acid_beta_oxidation and carnitine_shuttle
    modules — and of amino-acid catabolism, e.g. IVD in the leucine_catabolism
    module and GCDH); downstream, ubiquinol feeds respiratory complex III
    (GO:0022904). Combined deficiency of any component causes multiple acyl-CoA
    dehydrogenase deficiency (MADD / glutaric acidemia type 2).
