id: MODULE:histidine_catabolism
title: Histidine catabolism (histidine -> glutamate; HAL/UROC1/AMDHD1/FTCD)
description: >-
  Histidine catabolism degrades the essential amino acid L-histidine to L-glutamate in four steps,
  channelling the imidazole-ring one-carbon unit into folate metabolism at the final step. The
  pathway, most active in liver and skin, begins with histidine ammonia-lyase (HAL, histidase),
  which uses an autocatalytically-formed MIO prosthetic group to deaminate L-histidine to
  trans-urocanate plus ammonia. Urocanate hydratase (UROC1, urocanase) then adds water across the
  urocanate double bond (with a tightly bound NAD+ as an electrophilic cofactor) to give
  4-imidazolone-5-propanoate. The zinc-dependent amidohydrolase imidazolonepropionase (AMDHD1)
  hydrolyses the imidazolone ring to N-formimidoyl-L-glutamate. Finally the bifunctional
  glutamate formimidoyltransferase-cyclodeaminase (FTCD) transfers the formimino one-carbon group
  to tetrahydrofolate — releasing L-glutamate and 5-formimino-THF — and then cyclodeaminates
  5-formimino-THF to 5,10-methenyltetrahydrofolate, feeding a one-carbon unit into folate metabolism.
  Inherited defects cause characteristic aminoacidopathies: HAL — histidinemia (usually benign);
  UROC1 — urocanic aciduria; and FTCD — glutamate formiminotransferase deficiency, the second most
  common inborn error of folate metabolism, marked by urinary excretion of formiminoglutamate
  (FIGLU).
status: DRAFT
evidence:
  - source_id: GO:0006548
    title: L-histidine catabolic process
    statement: The four enzymes carry out L-histidine catabolism to glutamate (GO:0006548).
  - source_id: GO:0035999
    title: tetrahydrofolate interconversion
    statement: The final FTCD step channels the histidine one-carbon unit into tetrahydrofolate interconversion (GO:0035999).
  - source_id: file:human/HAL/HAL-ai-review.yaml
    title: HAL gene review (human)
    statement: The histidine ammonia-lyase step (UniProtKB:P42357, GO:0004397) matches the completed human HAL review.
  - source_id: file:human/UROC1/UROC1-ai-review.yaml
    title: UROC1 gene review (human)
    statement: The urocanate hydratase step (UniProtKB:Q96N76, GO:0016153) matches the completed human UROC1 review.
  - source_id: file:human/AMDHD1/AMDHD1-ai-review.yaml
    title: AMDHD1 gene review (human)
    statement: The imidazolonepropionase step (UniProtKB:Q96NU7, GO:0050480) matches the completed human AMDHD1 review.
  - source_id: file:human/FTCD/FTCD-ai-review.yaml
    title: FTCD gene review (human)
    statement: The bifunctional formimidoyltransferase-cyclodeaminase step (UniProtKB:O95954, GO:0030409/GO:0030412) matches the completed human FTCD review.
