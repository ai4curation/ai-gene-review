    GO:0030409 glutamate formimidoyltransferase + GO:0030412 formimidoyltetrahydrofolate
    cyclodeaminase). The final FTCD step links histidine catabolism to folate one-carbon metabolism
    (5,10-methenyl-THF, GO:0035999), connecting to the folate_one_carbon_interconversion module.
    FTCD's Golgi/58K-Golgi-protein association is a genuine secondary localization (kept non-core);
    its rat-derived microtubule/vimentin-binding is over-annotation for the human protein. GO term
    ids/labels verified against the local go.db (note the UniProt DR terms GO:0019556/GO:0019557 are
    obsolete → GO:0006548 used as concept). Disorders: HAL — histidinemia; UROC1 — urocanic aciduria;
    FTCD — glutamate formiminotransferase deficiency (formiminoglutamic aciduria, the 2nd commonest
    inborn error of folate metabolism).
