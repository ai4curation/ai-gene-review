id: MODULE:pentose_phosphate_pathway
title: Pentose phosphate pathway
description: >-
  A taxon-neutral module for the oxidative and non-oxidative pentose phosphate
  pathway (PPP). The oxidative branch converts glucose 6-phosphate to ribulose
  5-phosphate while producing NADPH and CO2. The non-oxidative branch
  interconverts ribulose 5-phosphate, ribose 5-phosphate, xylulose 5-phosphate,
  sedoheptulose 7-phosphate, glyceraldehyde 3-phosphate, fructose 6-phosphate,
  and erythrose 4-phosphate through epimerase, isomerase, transketolase, and
  transaldolase reactions. Bacterial pathway maps often include adjacent
  Entner-Doudoroff, gluconate, ribose/PRPP, amino-sugar, riboflavin, and
  MEP-pathway nodes; these share metabolites with the PPP but are not strict PPP
  steps.
status: DRAFT
evidence:
  - source_id: GO:0006098
    title: pentose-phosphate shunt
    statement: The module is grounded in the GO biological-process term for the pentose phosphate pathway.
  - source_id: KEGG:ppu00030
    title: Pentose phosphate pathway - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00030 membership. The
      module distinguishes strict oxidative and non-oxidative PPP reactions from
      KEGG-adjacent sugar-acid, ED, PRPP, and cofactor-biosynthesis reactions.
module:
  id: pentose_phosphate_pathway
  label: Pentose phosphate pathway
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pentose-phosphate shunt
      term:
        id: GO:0006098
        label: pentose-phosphate shunt
      description: >-
        Metabolic route generating NADPH and pentose phosphates through oxidative
        reactions and reversible sugar-phosphate rearrangements.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: In bacteria the PPP enzymes are soluble cytoplasmic enzymes.
  parts:
