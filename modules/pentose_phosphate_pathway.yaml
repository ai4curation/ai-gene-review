id: MODULE:pentose_phosphate_pathway
title: Pentose phosphate pathway
description: >-
  A reusable central-carbon module for the pentose phosphate pathway, covering
  the oxidative conversion of glucose 6-phosphate to ribulose 5-phosphate and
  the non-oxidative interconversion of pentose phosphates with fructose
  6-phosphate and glyceraldehyde 3-phosphate. The oxidative branch generates
  NADPH through glucose-6-phosphate dehydrogenase and 6-phosphogluconate
  dehydrogenase, with 6-phosphogluconolactonase hydrolyzing the intermediate
  lactone. The non-oxidative branch uses ribose-5-phosphate isomerase,
  ribulose-phosphate 3-epimerase, transketolase, and transaldolase to balance
  ribose 5-phosphate, xylulose 5-phosphate, sedoheptulose 7-phosphate,
  erythrose 4-phosphate, fructose 6-phosphate, and glyceraldehyde 3-phosphate.
  Pseudomonas putida KT2440 proteins are used as concrete exemplars, but the
  boundary is the conserved PPP chemistry rather than a KT2440-specific KEGG
  map.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0006098
    title: pentose-phosphate shunt
    statement: >-
      GO:0006098 grounds the overall pathway as the pentose-phosphate shunt,
      spanning oxidative and non-oxidative pentose-phosphate chemistry.
  - source_id: GO:0009051
    title: pentose-phosphate shunt, oxidative branch
    statement: >-
      GO:0009051 grounds the oxidative branch from glucose 6-phosphate to
      ribulose 5-phosphate with NADPH production.
  - source_id: GO:0009052
    title: pentose-phosphate shunt, non-oxidative branch
    statement: >-
      GO:0009052 grounds the non-oxidative branch that rearranges pentose
      phosphates with glycolytic sugar phosphates.
  - source_id: KEGG:ppu00030
    title: Pseudomonas putida KT2440 pentose phosphate pathway
    statement: >-
      The PSEPK KEGG ppu00030 membership bucket contains core PPP genes plus
      ED, gluconate, glycolysis, and nucleotide-biosynthesis spillovers; this
      module records only the core oxidative and non-oxidative PPP steps.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      The local membership table supplies the ppu00030 candidate list that was
      partitioned into core PPP steps and adjacent pathway spillovers.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__pentose_phosphate_pathway__ppu00030-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00030 pathway satisfiability review
    statement: >-
      OpenScientist concluded that canonical PPP steps are satisfiable in
      KT2440 and that the main curation issue is the broad KEGG ppu00030
      boundary, which mixes PPP with ED, peripheral glucose/gluconate
      oxidation, PRPP synthesis, and other spillovers.
  - source_id: file:modules/pentose_phosphate_pathway-deep-research-openscientist.md
    title: OpenScientist module-level review for the pentose phosphate pathway
    statement: >-
      OpenScientist describes the PPP as two coupled biochemical modules: an
      irreversible oxidative branch and a reversible non-oxidative branch,
      while treating Entner-Doudoroff routing and downstream NADPH consumers as
      adjacent biology outside the module boundary.
  - source_id: file:genes/PSEPK/zwfA/zwfA-ai-review.yaml
    title: PSEPK zwfA review
    statement: >-
      zwfA is a KT2440 glucose-6-phosphate dehydrogenase paralog and a primary
      exemplar for the oxidative branch first step.
  - source_id: file:genes/PSEPK/zwfB/zwfB-ai-review.yaml
    title: PSEPK zwfB review
    statement: >-
      zwfB is a KT2440 glucose-6-phosphate dehydrogenase paralog and a primary
      exemplar for the oxidative branch first step.
  - source_id: file:genes/PSEPK/zwf/zwf-ai-review.yaml
    title: PSEPK zwf/zwfC review
    statement: >-
      The curated zwf review supports G6PDH chemistry for PP_5351 but treats it
      as a minor or condition-specific paralog relative to zwfA and zwfB.
  - source_id: file:genes/PSEPK/pgl/pgl-ai-review.yaml
    title: PSEPK pgl review
    statement: >-
      pgl is curated as 6-phosphogluconolactonase, the hydrolysis step after
      glucose-6-phosphate dehydrogenase.
  - source_id: file:genes/PSEPK/gntZ/gntZ-ai-review.yaml
    title: PSEPK gntZ review
    statement: >-
      gntZ is the KT2440 6-phosphogluconate dehydrogenase exemplar for the
      oxidative branch decarboxylation step.
  - source_id: file:genes/PSEPK/rpe/rpe-ai-review.yaml
    title: PSEPK rpe review
    statement: >-
      rpe is the KT2440 ribulose-phosphate 3-epimerase exemplar for xylulose
      5-phosphate supply in the non-oxidative branch.
  - source_id: file:genes/PSEPK/rpiA/rpiA-ai-review.yaml
    title: PSEPK rpiA review
    statement: >-
      rpiA is the KT2440 ribose-5-phosphate isomerase exemplar for ribose
      5-phosphate supply in the non-oxidative branch.
  - source_id: file:genes/PSEPK/tktA/tktA-ai-review.yaml
    title: PSEPK tktA review
    statement: >-
      tktA is the KT2440 transketolase exemplar for both two-carbon transfer
      steps in the non-oxidative branch.
  - source_id: file:genes/PSEPK/tal/tal-ai-review.yaml
    title: PSEPK tal review
    statement: >-
      tal is the KT2440 transaldolase exemplar for the three-carbon transfer
      step in the non-oxidative branch.
notes: >-
  Boundary decision for PSEPK ppu00030: keep the core PPP reactions in this
  module and treat glucose/gluconate oxidation, Entner-Doudoroff dehydratase and
  aldolase, lower glycolysis, phosphoglucomutase, and PRPP synthesis as adjacent
  modules or exits. The pgl product 6-phosphogluconate can feed either the ED
  route or the oxidative PPP decarboxylation step; that branch point is recorded
  here without pulling ED enzymes into the PPP module. The KT2440 G6PDH family
  has paralogs; zwfA and zwfB are represented as the main local exemplars, while
  PP_5351/zwfC is retained as a condition-specific paralog caveat from the
  existing curated review.
