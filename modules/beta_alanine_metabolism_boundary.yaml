id: MODULE:beta_alanine_metabolism_boundary
title: Beta-alanine metabolism boundary
description: >-
  Broad boundary module for KEGG ppu00410 in Pseudomonas putida KT2440. The
  organism-specific map combines reductive pyrimidine catabolism toward
  beta-alanine, beta-alanine transamination, pantothenate ligation, and several
  aldehyde or acyl-CoA metabolism side nodes. The module records those supported
  activities while keeping fatty-acid beta-oxidation, phenylacetate, valine, and
  polyamine aldehyde chemistry separate from a strict beta-alanine route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00410
    title: Beta-alanine metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00410 provides the PSEPK curation batch. Its membership combines
      pyrimidine-catabolic enzymes, beta-alanine transamination, pantothenate
      synthetase, methylmalonate-semialdehyde dehydrogenases, aldehyde
      dehydrogenases, and acyl-CoA side nodes.
  - source_id: GO:0072529
    title: pyrimidine-containing compound catabolic process
    statement: >-
      PydX/PydA, PydB, and beta-ureidopropionase-family enzymes represent the
      reductive pyrimidine-catabolic context that can feed beta-alanine-related
      metabolism.
  - source_id: GO:0015940
    title: pantothenate biosynthetic process
    statement: >-
      PanC uses beta-alanine as a substrate to form pantothenate, but most
      ppu00410 members are not strict pantothenate-biosynthesis enzymes.
module:
  id: beta_alanine_metabolism_boundary
  label: Beta-alanine metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: beta-alanine metabolism boundary
      description: >-
        A broad KEGG-map module covering beta-alanine-associated reactions and
        explicitly separating them from fatty-acid, phenylacetate, valine, and
        polyamine aldehyde side chemistry.
    - preferred_term: pyrimidine-containing compound catabolic process
      term:
        id: GO:0072529
        label: pyrimidine-containing compound catabolic process
      description: Reductive pyrimidine catabolism producing beta-alanine-related intermediates.
    - preferred_term: pantothenate biosynthetic process
      term:
        id: GO:0015940
        label: pantothenate biosynthetic process
      description: Pantothenate formation from pantoate and beta-alanine.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: The ppu00410 member enzymes are soluble bacterial metabolic enzymes.
  parts:
    - order: 1
      role: Reductive pyrimidine catabolism to beta-alanine-related intermediates
      node:
        id: pyrimidine_to_beta_alanine_context
        label: Pyd and beta-ureidopropionase pyrimidine-catabolic context
        module_type: METABOLIC_PATHWAY
        description: >-
          PydX/PydA, PydB, and beta-ureidopropionase-family enzymes represent
          reductive uracil/thymine catabolism and beta-alanine-related
          intermediate release.
        annotons:
          - id: pydX_dihydropyrimidine_dehydrogenase
            label: "pydX: dihydropyrimidine dehydrogenase component"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pydX
            function:
              preferred_term: dihydropyrimidine dehydrogenase (NAD+) activity
              term:
                id: GO:0004159
                label: dihydropyrimidine dehydrogenase (NAD+) activity
            role_description: Pyrimidine-catabolic/beta-alanine-context oxidoreductase component.
          - id: pydA_dihydropyrimidine_dehydrogenase
            label: "pydA: dihydropyrimidine dehydrogenase component"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pydA
            function:
              preferred_term: dihydropyrimidine dehydrogenase (NAD+) activity
              term:
                id: GO:0004159
                label: dihydropyrimidine dehydrogenase (NAD+) activity
            role_description: Pyrimidine-catabolic/beta-alanine-context oxidoreductase component.
          - id: pydB_dihydropyrimidinase
            label: "pydB: dihydropyrimidinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pydB
            function:
              preferred_term: dihydropyrimidinase activity
              term:
                id: GO:0004157
                label: dihydropyrimidinase activity
            role_description: Dihydropyrimidine hydrolase in pyrimidine catabolism.
          - id: PP_0614_beta_ureidopropionase
            label: "PP_0614: beta-ureidopropionase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0614
            function:
              preferred_term: beta-ureidopropionase activity
              term:
                id: GO:0003837
                label: beta-ureidopropionase activity
            role_description: M20-family amidohydrolase in beta-alanine/pyrimidine-catabolic context.
          - id: hyuC_beta_ureidopropionase
            label: "hyuC: beta-ureidopropionase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hyuC
            function:
              preferred_term: beta-ureidopropionase activity
              term:
                id: GO:0003837
                label: beta-ureidopropionase activity
            role_description: M20-family amidohydrolase in beta-alanine/pyrimidine-catabolic context.
    - order: 2
      role: Beta-alanine transamination
      node:
        id: beta_alanine_transamination
        label: Beta-alanine transamination
        module_type: REACTION
        description: >-
          PP_0596 is curated as a PLP-dependent beta-alanine:pyruvate or omega
          amino acid aminotransferase boundary enzyme.
        annotons:
          - id: PP_0596_beta_alanine_pyruvate_transaminase
            label: "PP_0596: beta-alanine:pyruvate transaminase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0596
            function:
              preferred_term: beta-alanine:pyruvate transaminase activity
              term:
                id: GO:0016223
                label: beta-alanine:pyruvate transaminase activity
            role_description: Beta-alanine/omega-amino-acid aminotransferase boundary enzyme.
    - order: 3
      role: Pantothenate ligation using beta-alanine
      node:
        id: pantothenate_beta_alanine_ligation
        label: Pantoate plus beta-alanine to pantothenate
        module_type: REACTION
        description: >-
          PanC ligates pantoate and beta-alanine to form pantothenate. This is a
          true beta-alanine-consuming reaction but belongs to the pantothenate
          biosynthesis module for strict CoA-pathway satisfiability.
        annotons:
          - id: panC_pantoate_beta_alanine_ligase
            label: "panC: pantoate-beta-alanine ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: panC
            function:
              preferred_term: pantoate-beta-alanine ligase activity
              term:
                id: GO:0004592
                label: pantoate-beta-alanine ligase activity
            role_description: Pantothenate synthetase; beta-alanine-consuming endpoint for pantothenate biosynthesis.
    - order: 4
      role: Aldehyde and methylmalonate-semialdehyde side nodes
      node:
        id: aldehyde_dehydrogenase_side_context
        label: Aldehyde dehydrogenase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00410 includes methylmalonate-semialdehyde and
          aminobutyraldehyde/gamma-guanidinobutyraldehyde dehydrogenases. These
          are retained as beta-alanine-map context but overlap valine,
          propanoate, lysine, and polyamine side routes.
        annotons:
          - id: mmsA_I_methylmalonate_semialdehyde_dehydrogenase
            label: "mmsA-I: methylmalonate-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mmsA-I
            function:
              preferred_term: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
              term:
                id: GO:0004491
                label: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
            role_description: Valine/thymine/propanoate side-node dehydrogenase in the broad beta-alanine map.
          - id: mmsA_II_methylmalonate_semialdehyde_dehydrogenase
            label: "mmsA-II: methylmalonate-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mmsA-II
            function:
              preferred_term: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
              term:
                id: GO:0004491
                label: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
            role_description: Valine/thymine/propanoate side-node dehydrogenase in the broad beta-alanine map.
          - id: patD_aminobutyraldehyde_dehydrogenase
            label: "patD: aminobutyraldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: patD
            function:
              preferred_term: aminobutyraldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0019145
                label: aminobutyraldehyde dehydrogenase (NAD+) activity
            role_description: Beta-alanine/polyamine-side aldehyde dehydrogenase context.
          - id: prr_aminobutyraldehyde_dehydrogenase
            label: "prr: aminobutyraldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prr
            function:
              preferred_term: aminobutyraldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0019145
                label: aminobutyraldehyde dehydrogenase (NAD+) activity
            role_description: Beta-alanine/polyamine-side aldehyde dehydrogenase context.
    - order: 5
      role: Acyl-CoA and fatty-acid-like side nodes
      node:
        id: acyl_CoA_side_context
        label: Acyl-CoA side context
        module_type: METABOLIC_PATHWAY
        description: >-
          Several ppu00410 members are acyl-CoA dehydrogenase, hydratase, or
          beta-oxidation enzymes. They are kept as side nodes because their
          primary curated roles are fatty-acid, phenylacetate, or generic
          acyl-CoA metabolism rather than strict beta-alanine metabolism.
        annotons:
          - id: acd_acyl_CoA_dehydrogenase
            label: "acd: acyl-CoA dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: acd
            function:
              preferred_term: acyl-CoA dehydrogenase activity
              term:
                id: GO:0003995
                label: acyl-CoA dehydrogenase activity
            role_description: CoA-thioester dehydrogenase/desulfinase side enzyme in the broad beta-alanine map.
          - id: fadB_long_chain_hydroxyacyl_CoA_dehydrogenase
            label: "fadB: fatty acid beta-oxidation multienzyme subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadB
            function:
              preferred_term: long-chain (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
              term:
                id: GO:0016509
                label: long-chain (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
            role_description: Fatty acid beta-oxidation enzyme included as broad-map acyl-CoA side context.
          - id: PP_2217_enoyl_CoA_hydratase
            label: "PP_2217: enoyl-CoA hydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2217
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Generic CoA-thioester hydration side-node enzyme.
          - id: paaF_enoyl_CoA_hydratase
            label: "paaF: enoyl-CoA hydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaF
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Phenylacetate-catabolism CoA-thioester enzyme included as broad-map side context.
  notes: >-
    This module intentionally distinguishes the beta-alanine/pyrimidine and
    pantothenate-relevant core from KEGG side inclusions. FadB, PP_2217, PaaF,
    Acd, MmsA-I/MmsA-II, PatD, and Prr should not by themselves be used to
    satisfy a strict beta-alanine pathway without substrate-specific evidence.
