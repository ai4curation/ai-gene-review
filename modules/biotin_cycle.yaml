id: MODULE:biotin_cycle
title: Biotin cycle — holocarboxylase synthetase and biotinidase (multiple carboxylase deficiency)
description: >-
  The biotin cycle activates and recycles the cofactor biotin for the five human
  biotin-dependent carboxylases, and its two enzymes are the causes of multiple
  carboxylase deficiency. Holocarboxylase synthetase (HLCS, biotin-protein ligase)
  covalently attaches biotin to a specific lysine in the biotin-carboxyl-carrier
  domain of each apo-carboxylase — pyruvate carboxylase (PC), propionyl-CoA
  carboxylase (PCCA/PCCB), 3-methylcrotonyl-CoA carboxylase (MCCC1/MCCC2) and the
  cytosolic and mitochondrial acetyl-CoA carboxylases (ACACA, ACACB) — via a
  two-step reaction (biotin + ATP -> biotinyl-5'-AMP, then transfer to the
  carrier lysine), converting inactive apo-enzymes to active holo-carboxylases.
  When these holo-carboxylases are proteolytically degraded, the biotin remains
  bound as biocytin (biotinyl-lysine) or short biotinyl-peptides; biotinidase (BTD)
  hydrolyses these to liberate free biotin for reuse, and also releases dietary
  protein-bound biotin, making it bioavailable. Free biotin then re-enters the
  cycle as the HLCS substrate. Inherited deficiency of either enzyme produces
  multiple carboxylase deficiency (simultaneous functional loss of all biotin
  carboxylases, with lactic acidosis and organic aciduria): HLCS deficiency is the
  early-onset (neonatal) form, and BTD (biotinidase) deficiency is the late-onset
  form — a classic treatable, newborn-screened disorder rescued by biotin
  supplementation.
status: DRAFT
evidence:
  - source_id: GO:0006768
    title: biotin metabolic process
    statement: >-
      The module is grounded in the GO biotin metabolic process (GO:0006768):
      HLCS uses biotin to activate the carboxylases and BTD recycles it.
  - source_id: Reactome:R-HSA-196780
    title: Biotin transport and metabolism
    statement: >-
      Reactions follow the human Reactome "Biotin transport and metabolism"
      pathway (R-HSA-196780): HLCS biotinylation of the apo-carboxylases
      (R-HSA-2993447, R-HSA-2993799, ...) and BTD hydrolysis of biocytin
      (R-HSA-3076905).
  - source_id: file:human/HLCS/HLCS-ai-review.yaml
    title: HLCS gene review (human)
    statement: >-
      The biotinylation step grounding (UniProtKB:P50747, GO:0004077 biotin--[biotin
      carboxyl-carrier protein] ligase activity) matches the completed human HLCS
      review.
  - source_id: file:human/BTD/BTD-ai-review.yaml
    title: BTD gene review (human)
    statement: >-
      The biotin-recycling step grounding (UniProtKB:P43251, GO:0047708 biotinidase
      activity) matches the completed human BTD review.
  - source_id: file:human/PC/PC-ai-review.yaml
    title: PC gene review (human)
    statement: >-
      One of the biotin-dependent carboxylase clients activated by HLCS
      (pyruvate carboxylase; see the pyruvate_metabolism module).
  - source_id: file:human/PCCA/PCCA-ai-review.yaml
    title: PCCA gene review (human)
    statement: >-
      A biotin-dependent carboxylase client of HLCS (propionyl-CoA carboxylase;
      see the propionyl_coa_catabolism module).
  - source_id: file:human/MCCC1/MCCC1-ai-review.yaml
    title: MCCC1 gene review (human)
    statement: >-
      A biotin-dependent carboxylase client of HLCS (3-methylcrotonyl-CoA
      carboxylase; see the leucine_catabolism module).
module:
  id: biotin_cycle
  label: Biotin cycle (HLCS + biotinidase)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: biotin metabolic process
      term:
        id: GO:0006768
        label: biotin metabolic process
      description: >-
        Activation of the biotin-dependent carboxylases with biotin (HLCS) and
        salvage/recycling of biotin from degraded holo-carboxylases (BTD).
  parts:
    - order: 1
      role: biotin attachment to the apo-carboxylases (activation)
      node:
        id: hlcs_step
        label: apo-carboxylase + biotin + ATP to holo-carboxylase (biotinylated) + AMP + PPi
        module_type: REACTION
        annotons:
          - id: hlcs_activity
            label: "HLCS: holocarboxylase synthetase (biotin-protein ligase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biotin-protein ligase family (HLCS)
                term:
                  id: PANTHER:PTHR12835
                  label: BIOTIN PROTEIN LIGASE
                representative_members:
                  - preferred_term: HLCS (human)
                    term:
                      id: UniProtKB:P50747
                      label: Biotin--protein ligase
            function:
              preferred_term: biotin--[biotin carboxyl-carrier protein] ligase activity
              term:
                id: GO:0004077
                label: biotin--[biotin carboxyl-carrier protein] ligase activity
              substrates:
                - preferred_term: apo-carboxylase (PC / PCC / MCC / ACC)
                - preferred_term: biotin
                - preferred_term: ATP
              products:
                - preferred_term: holo-(biotinylated) carboxylase
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:6.3.4.10
                  statement: biotin--protein ligase (holocarboxylase synthetase)
                - source_id: Reactome:R-HSA-2993447
                  statement: "HLCS biotinylates 6x(PCCA:PCCB) (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Biotin-protein ligase that (via a biotinyl-5'-AMP intermediate)
              attaches biotin to the carrier lysine of all five human biotin-
              dependent carboxylases (PC, PCCA, MCCC1, ACACA, ACACB), converting
              apo- to holo-enzymes. Deficiency causes early-onset (neonatal)
              multiple carboxylase deficiency (biotin-responsive).
    - order: 2
      role: biotin recycling / salvage (regenerates free biotin)
      node:
        id: btd_step
        label: biocytin (biotinyl-lysine) + H2O to biotin + L-lysine
        module_type: REACTION
        annotons:
          - id: btd_activity
            label: "BTD: biotinidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biotinidase / nitrilase-like amidohydrolase family (BTD)
                term:
                  id: PANTHER:PTHR10609
                  label: BIOTINIDASE-RELATED
                representative_members:
                  - preferred_term: BTD (human)
                    term:
                      id: UniProtKB:P43251
                      label: Biotinidase
            function:
              preferred_term: biotinidase activity
              term:
                id: GO:0047708
                label: biotinidase activity
              substrates:
                - preferred_term: biocytin (biotinyl-L-lysine)
                - preferred_term: water
              products:
                - preferred_term: biotin
                - preferred_term: L-lysine
              evidence:
                - source_id: EC:3.5.1.12
                  statement: biotinidase (biotin-amide amidohydrolase)
                - source_id: Reactome:R-HSA-3076905
                  statement: "Extracellular BTD hydrolyses BCTN (human Reactome reaction)"
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Secreted glycoprotein that hydrolyses biocytin and biotinyl-peptides
              (from holo-carboxylase turnover) and dietary protein-bound biotin,
              liberating free biotin for reuse. Deficiency causes late-onset
              multiple carboxylase deficiency — a treatable, newborn-screened
              disorder (biotin supplementation).
  connections:
    - source: btd_step
      target: hlcs_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Free biotin liberated by BTD (from biocytin/dietary sources) is the
        substrate HLCS uses to re-biotinylate the apo-carboxylases, closing the
        biotin cycle.
  notes: >-
    The biotin cofactor cycle grounded to the human enzymes HLCS
    (UniProtKB:P50747, GO:0004077, EC 6.3.4.10) and BTD (P43251, GO:0047708, EC
    3.5.1.12). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector (generic over paralogs and
    orthologs) plus a concrete human representative member. HLCS activates all five
    human biotin-dependent carboxylases — pyruvate carboxylase (PC; pyruvate_metabolism
    module), propionyl-CoA carboxylase (PCCA/PCCB; propionyl_coa_catabolism module),
    3-methylcrotonyl-CoA carboxylase (MCCC1/MCCC2; leucine_catabolism module) and the
    acetyl-CoA carboxylases (ACACA/ACACB, of fatty-acid synthesis, not yet reviewed) —
    so deficiency of either HLCS or BTD produces MULTIPLE carboxylase deficiency
    affecting all of those pathways simultaneously. The reported nuclear/histone-
    biotinylation moonlighting role of HLCS is kept out of this metabolic module (it
    is captured non-core in the HLCS gene review).
