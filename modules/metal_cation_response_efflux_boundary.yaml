id: MODULE:metal_cation_response_efflux_boundary
title: Heavy-metal/copper/zinc response and efflux boundary
description: Boundary module for the ppu02020 heavy-metal/copper/zinc response partition in Pseudomonas
  putida KT2440. It captures CusR/CopR-like response regulators, CztS/SilS/CopS-like sensor kinases, and
  the czcC-cusBAF copper or metal-cation RND efflux locus. This is a metal-response boundary from the
  broad KEGG two-component-system map, not one canonical His-Asp relay.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups czcR-I, czrSA, czcR-II, PP_1437, czcR-III, PP_2157, copR-I, copR-II,
    copS, czcC, cusB, cusA, and cusF into the heavy-metal/copper/zinc bucket.
notes: The regulatory pairs and efflux locus are kept in one boundary because the ppu02020 membership
  mixes two-component regulation with the downstream cation/copper efflux machinery. Direct metal specificity
  remains a first-pass knowledge gap for several paralogous regulators.
