          - order: 2
            role: differentiate Bergmann glia and assemble the radial scaffold
            node:
              id: bergmann_glia_scaffold
              label: Bergmann-glial differentiation and radial-scaffold formation
              module_type: DEVELOPMENTAL_PROCESS
              description: >-
                Mouse Dner loss-of-function retards Bergmann-glial radial-fiber
                differentiation and cerebellar maturation, supporting a
                Purkinje-to-glia developmental contribution. Although an
                initial study attributed this to a noncanonical NOTCH1 response,
                a later direct replication found that DNER neither binds nor
                activates NOTCH1, so the molecular target remains unresolved.
                In parallel, PTPN11 (SHP2)-ERK signaling specifies Bergmann
                glia; loss of this program uncouples granule-cell invagination
                from cortical folding and abolishes normal foliation.
              concepts:
                - preferred_term: Bergmann glial cell differentiation
                  term:
                    id: GO:0060020
                    label: Bergmann glial cell differentiation
              context:
                cell_types:
                  - preferred_term: Bergmann glial cell
                    term:
                      id: CL:0000644
                      label: Bergmann glial cell
              annotons:
                - id: dner_purkinje_signal
                  label: Purkinje-cell DNER contribution to Bergmann-glial maturation
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: DNER
                      term:
                        id: UniProtKB:Q8NFT8
                        label: Delta and Notch-like epidermal growth factor-related receptor
                      description: Somatodendritic neuronal membrane protein with an unresolved extracellular signaling mechanism.
                  function:
                    preferred_term: unresolved DNER-dependent intercellular maturation activity
                    description: The developmental phenotype is supported, but no direct receptor or ligand molecular function is established.
                  processes:
                    - preferred_term: Bergmann glial cell differentiation
                      term:
                        id: GO:0060020
                        label: Bergmann glial cell differentiation
                  locations:
                    - preferred_term: plasma membrane
                      term:
                        id: GO:0005886
                        label: plasma membrane
                  role_description: Dner loss impairs radial-fiber differentiation and cerebellar maturation, but its direct glial receptor is unresolved.
                  evidence:
                    - source_id: PMID:15965470
                      title: DNER acts as a neuron-specific Notch ligand during Bergmann glial development.
                      statement: The original study reports a Dner-dependent Bergmann-glial differentiation phenotype and proposes a noncanonical Notch mechanism.
                      supporting_text: "Additionally, deficiency of DNER retards the formation of radial fibers and results in abnormal arrangement of Bergmann glia."
                    - source_id: PMID:16298139
                      title: Impaired cerebellar functions in mutant mice lacking DNER.
                      statement: Independent mouse loss-of-function evidence supports DNER involvement in Bergmann-glial maturation and cerebellar development.
                      supporting_text: "Our results indicate that DNER takes part in stimulation of BG maturation via intercellular communication and is essential for precise cerebellar development."
                    - source_id: PMID:27622512
                      title: Delta/Notch-Like EGF-Related Receptor (DNER) Is Not a Notch Ligand.
                      statement: Direct binding and reporter assays do not reproduce the proposed DNER-NOTCH1 mechanism.
                      supporting_text: "DNER is not a Notch ligand and its true function remains unknown."
                - id: ptpn11_erk_bg_specification
                  label: PTPN11-ERK Bergmann-glial specification program
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: PTPN11 (SHP2)
                      term:
                        id: UniProtKB:Q06124
                        label: Tyrosine-protein phosphatase non-receptor type 11
                      description: Cytoplasmic phosphatase coupling FGF inputs to ERK during Bergmann-glial induction.
                  function:
                    preferred_term: protein tyrosine phosphatase activity
                    term:
                      id: GO:0004725
                      label: protein tyrosine phosphatase activity
                  processes:
                    - preferred_term: Bergmann glial cell differentiation
                      term:
                        id: GO:0060020
                        label: Bergmann glial cell differentiation
                  locations:
                    - preferred_term: cytoplasm
                      term:
                        id: GO:0005737
                        label: cytoplasm
                  role_description: Enables ERK-dependent conversion of radial glia into Bergmann glia and thereby supports foliation.
                  evidence:
                    - source_id: PMID:24431450
                      title: Shp2-dependent ERK signaling is essential for induction of Bergmann glia and foliation of the cerebellum.
                      statement: Conditional mouse genetics and MEK rescue establish a PTPN11-ERK requirement for Bergmann-glial specification and foliation.
                      supporting_text: "Our results demonstrate an essential role of Shp2 in BG specification via fibroblast growth factor/extracellular signal-regulated protein kinase signaling, and reveal a crucial function of BG in organizing cerebellar foliation."
    - order: 6
      role: establish regional foliation
      node:
        id: regional_foliation
        label: Regional cerebellar foliation
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Coordinated growth of the granule-cell precursor layer, the
          Bergmann-glial scaffold, the Purkinje layer, and the basement membrane
          produces fissures and folia. EN1 and EN2 provide a late regional
          patterning program that distinguishes medial vermis from lateral
          hemisphere foliation. This node captures regional fold patterning,
          not subsequent molecular maturation or mature circuit physiology.
        concepts:
          - preferred_term: cerebellum morphogenesis
            term:
              id: GO:0021587
              label: cerebellum morphogenesis
        annotons:
