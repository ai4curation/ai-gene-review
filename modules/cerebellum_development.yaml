id: MODULE:cerebellum_development
title: Mammalian cerebellum development module
description: >-
  A mammalian developmental program that builds the cerebellum from dorsal
  rhombomere 1. The program begins with allocation of the cerebellar anlage by
  the midbrain-hindbrain (isthmic) organizer, followed by segregation of two
  principal germinal-zone programs: an ATOH1-positive rhombic-lip program that
  generates glutamatergic lineages and a PTF1A-positive ventricular-zone program
  that generates GABAergic lineages. Reelin-dependent reorientation of an
  early/posterior-born Purkinje-cell subset initiates early plate formation. As
  Purkinje cells differentiate, they provide Sonic hedgehog (SHH) to expand
  granule-cell precursors in the transient external granule layer. Partly
  overlapping granule-neuron migration and Bergmann-glial differentiation
  assemble the cortical layers, while Engrailed-dependent regional patterning
  coordinates foliation of the vermis and hemispheres. The module ends with
  formation of the layered, foliated cerebellum; mature synaptic physiology,
  motor learning, adult homeostasis, and tumorigenesis are outside its boundary.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0021549
    title: cerebellum development
    statement: The module is grounded in the GO term for development of the cerebellum from formation to maturity.
  - source_id: PMID:25336734
    title: "Development of the cerebellum: simple steps to make a 'little brain'."
    statement: >-
      This review motivates the module's separation of territorial allocation,
      transit amplification, and neuronal-lineage diversification.
    supporting_text: "allocation of the cerebellar anlage, the significance of transit amplification and the generation of neuronal diversity"
notes: >-
  This is a mammalian scaffold, with most causal evidence coming from mouse. Reviewed human UniProt proteins are used as concrete orthologous exemplars; they do not imply that every mechanism was tested directly in human or that cerebellum development is the protein's core function. Detailed receptor and intracellular machinery is factored into the existing fgfr_signaling and hedgehog_signaling modules. An initial study proposed a noncanonical DNER-NOTCH1 mechanism in Bergmann glia, but a later direct replication found that DNER neither bound nor activated NOTCH1. The supported Dner loss-of-function phenotype is therefore retained without a molecular Notch edge. Purkinje-cell development, granule-cell-precursor proliferation, granule-neuron migration, and Bergmann-glial differentiation partially overlap in developmental time; their order records causal organization, not completion of one program before the next begins. The current definitions of GO:0021695 through GO:0021699 incorrectly describe a six-layered cerebral cortex rather than the three-layered cerebellar cortex,
  so those definitions were not used to organize this module. Deep cerebellar nuclei are represented as outputs of the early ATOH1/PTF1A lineage split but are not yet decomposed into nucleus-specific submodules. The explicit macro-process -> cell-process -> reusable-pathway layering, and the use of SHH to connect Purkinje-cell development to granule-cell-precursor proliferation, follow the "Decomposition of macro biological processes" Google Slides deck (presentation 1q7PE8VGRGYWyohbLMwpiYpd6dnCJQVuomyzsK5dC9bc, accessed through gog/Drive export on 2026-07-14). ModuleReview has no arbitrary module-include field, so the receiving context points to hedgehog_signaling and anchors it with SMO instead of copying the generic PTCH1-SMO-SUFU-GLI topology or misusing template conformance.
module:
  id: cerebellum_development
  label: Mammalian cerebellum development
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: cerebellum development
      term:
        id: GO:0021549
        label: cerebellum development
      description: Progression of the cerebellum from its initial formation to a mature structure.
  context:
    taxa:
      - preferred_term: mammals
        term:
          id: NCBITaxon:40674
          label: Mammalia
        description: >-
          The overall lineage logic is vertebrate-conserved, but the external
          granule layer, postnatal amplification, and foliation program here are
          represented in their best-characterized mammalian form.
    anatomical_locations:
      - preferred_term: cerebellum
        term:
          id: UBERON:0002037
          label: cerebellum
    cell_types:
      - preferred_term: Purkinje cell
        term:
          id: CL:0000121
          label: Purkinje cell
      - preferred_term: cerebellar granule cell
        term:
          id: CL:0001031
          label: cerebellar granule cell
      - preferred_term: Bergmann glial cell
        term:
          id: CL:0000644
          label: Bergmann glial cell
  parts:
    - order: 1
      role: allocate and pattern the cerebellar anlage
      node:
        id: anlage_allocation
        label: Cerebellar anlage allocation at the isthmic organizer
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          The OTX2-positive midbrain and GBX2-positive anterior hindbrain meet
          at the midbrain-hindbrain boundary. FGF8 emitted immediately caudal to
          this lineage boundary maintains organizer activity, prevents posterior
          expansion of OTX2, and permits dorsal rhombomere 1 to form the
          cerebellar anlage. This thin step points to modules/fgfr_signaling.yaml
          for the generic receptor-to-ERK machinery.
        concepts:
          - preferred_term: cerebellum formation
            term:
              id: GO:0021588
              label: cerebellum formation
        context:
          anatomical_locations:
            - preferred_term: cerebellum
              term:
                id: UBERON:0002037
                label: cerebellum
        annotons:
          - id: gbx2_hindbrain_identity
            label: GBX2 anterior-hindbrain identity program
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GBX2
                term:
                  id: UniProtKB:P52951
                  label: Homeobox protein GBX-2
                description: Homeobox regulator of anterior-hindbrain and organizer identity.
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: cerebellum formation
                term:
                  id: GO:0021588
                  label: cerebellum formation
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: >-
              Establishes anterior-hindbrain identity and maintains the
              midbrain-hindbrain organizer needed for cerebellum formation.
            evidence:
              - source_id: PMID:12367504
                title: Changing requirements for Gbx2 in development of the cerebellum and maintenance of the mid/hindbrain organizer.
                statement: Conditional mouse genetics separates the changing organizer and cerebellar requirements for Gbx2.
                supporting_text: "Our work has uncovered distinct requirements for Gbx2 during cerebellum formation"
          - id: isthmic_fgf8_signal
            label: Isthmic FGF8 organizer signal
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FGF8
                term:
                  id: UniProtKB:P55075
                  label: Fibroblast growth factor 8
                description: Secreted organizer signal at the midbrain-hindbrain boundary.
            function:
              preferred_term: growth factor activity
              term:
                id: GO:0008083
                label: growth factor activity
              targets:
                - preferred_term: FGF receptors on adjacent neural progenitors
            processes:
              - preferred_term: fibroblast growth factor receptor signaling pathway
                term:
                  id: GO:0008543
                  label: fibroblast growth factor receptor signaling pathway
              - preferred_term: cerebellum formation
                term:
                  id: GO:0021588
                  label: cerebellum formation
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Maintains and patterns the isthmic organizer; sustained signaling
              keeps OTX2 out of the anterior hindbrain so the cerebellar anlage
              can form.
            evidence:
              - source_id: PMID:19793884
                title: The duration of Fgf8 isthmic organizer expression is key to patterning different tectal-isthmo-cerebellum structures.
                statement: Temporal conditional ablation establishes a duration-dependent requirement for Fgf8 in cerebellar territory formation.
                supporting_text: "One crucial role for sustained Fgf8 function is in repressing Otx2 in the hindbrain, thereby allowing the isthmus and cerebellum to form."
    - order: 2
      role: establish germinal zones and specify principal neuronal lineages
      node:
        id: germinal_zone_lineage_specification
        label: Rhombic-lip and ventricular-zone lineage specification
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Spatially segregated progenitors use mutually antagonistic bHLH
          factors to establish the major neurotransmitter lineages. ATOH1 in the
          rhombic lip specifies glutamatergic derivatives, including deep-nuclear
          projection neurons, granule cells, and unipolar brush cells. PTF1A in
          the ventricular zone specifies GABAergic derivatives, including
          Purkinje cells and inhibitory interneurons. The variants coexist in a
          normal cerebellum; they are alternatives at the level of progenitor
          identity, not alternatives for the organ as a whole.
        concepts:
          - preferred_term: cerebellar neuron development
            term:
              id: GO:0098749
              label: cerebellar neuron development
        variant_sets:
          - id: progenitor_zone_lineages
            label: Major cerebellar progenitor-zone programs
            axis: progenitor zone and neurotransmitter fate
            selection: ONE_OR_MORE
            variants:
              - id: rhombic_lip_glutamatergic_lineage
                label: ATOH1-positive rhombic-lip glutamatergic lineage
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  ATOH1-positive progenitors leave the upper rhombic lip in
                  temporally ordered waves. Early cohorts generate excitatory
                  deep-nuclear neurons; later cohorts seed the external granule
                  layer and generate granule cells and unipolar brush cells.
                concepts:
                  - preferred_term: cerebellar granule cell differentiation
                    term:
                      id: GO:0021707
                      label: cerebellar granule cell differentiation
                context:
                  anatomical_locations:
                    - preferred_term: rhombic lip
                      term:
                        id: UBERON:0006215
                        label: rhombic lip
                  cell_types:
                    - preferred_term: cerebellar granule cell precursor
                      term:
                        id: CL:0002362
                        label: cerebellar granule cell precursor
                annotons:
                  - id: atoh1_glutamatergic_identity
                    label: ATOH1 glutamatergic-lineage determinant
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: ATOH1
                        term:
                          id: UniProtKB:Q92858
                          label: Transcription factor ATOH1
                        description: bHLH determinant of rhombic-lip-derived glutamatergic identity.
                    function:
                      preferred_term: DNA-binding transcription factor activity
                      term:
                        id: GO:0000981
                        label: DNA-binding transcription factor activity, RNA polymerase II-specific
                    processes:
                      - preferred_term: cerebellar granule cell differentiation
                        term:
                          id: GO:0021707
                          label: cerebellar granule cell differentiation
                    locations:
                      - preferred_term: nucleus
                        term:
                          id: GO:0005634
                          label: nucleus
                    role_description: >-
                      Specifies the glutamatergic identity of rhombic-lip
                      progenitors and their granule-cell/deep-nuclear outputs.
                    evidence:
                      - source_id: PMID:24695699
                        title: Specification of spatial identities of cerebellar neuron progenitors by ptf1a and atoh1 for proper production of GABAergic and glutamatergic neurons.
                        statement: Reciprocal knock-in experiments establish that Atoh1 is sufficient to redirect ventricular-zone cells to glutamatergic fates.
                        supporting_text: "ectopically Atoh1-expressing VZ cells produced glutamatergic neurons, including granule cells and deep cerebellar nuclei neurons"
              - id: ventricular_zone_gabaergic_lineage
                label: PTF1A-positive ventricular-zone GABAergic lineage
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  PTF1A-positive ventricular-zone progenitors generate the
                  GABAergic cerebellar repertoire. Early cohorts produce
                  Purkinje cells and inhibitory nucleo-olivary projection
                  neurons; later cohorts produce inhibitory interneurons.
                concepts:
                  - preferred_term: cerebellar Purkinje cell differentiation
                    term:
                      id: GO:0021702
                      label: cerebellar Purkinje cell differentiation
                context:
                  cell_types:
                    - preferred_term: Purkinje cell
                      term:
                        id: CL:0000121
                        label: Purkinje cell
                annotons:
                  - id: ptf1a_gabaergic_identity
                    label: PTF1A GABAergic-lineage determinant
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: PTF1A
                        term:
                          id: UniProtKB:Q7RTS3
                          label: Pancreas transcription factor 1 subunit alpha
                        description: bHLH determinant of ventricular-zone-derived GABAergic identity.
                    function:
                      preferred_term: DNA-binding transcription factor activity
                      term:
                        id: GO:0000981
                        label: DNA-binding transcription factor activity, RNA polymerase II-specific
                    processes:
                      - preferred_term: cerebellar Purkinje cell differentiation
                        term:
                          id: GO:0021702
                          label: cerebellar Purkinje cell differentiation
                    locations:
                      - preferred_term: nucleus
                        term:
                          id: GO:0005634
                          label: nucleus
                    role_description: >-
                      Specifies the GABAergic identity of ventricular-zone
                      progenitors and their Purkinje-cell, nucleo-olivary, and
                      interneuron outputs.
                    evidence:
                      - source_id: PMID:24695699
                        title: Specification of spatial identities of cerebellar neuron progenitors by ptf1a and atoh1 for proper production of GABAergic and glutamatergic neurons.
                        statement: Reciprocal knock-in experiments establish that Ptf1a is sufficient to redirect rhombic-lip cells to GABAergic fates.
                        supporting_text: "ectopically Ptf1a-expressing RL cells produced GABAergic populations, such as Purkinje cells and GABAergic interneurons"
                      - source_id: PMID:22363268
                        title: "The genesis of cerebellar GABAergic neurons: fate potential and specification mechanisms."
                        statement: A synthesis of lineage studies includes inhibitory projection neurons as well as interneurons among PTF1A-positive ventricular-zone outputs.
                        supporting_text: "Ptf1-a-positive progenitors in the VZ generate the full repertoire of GABAergic projection neurons and interneurons through different neurogenic strategies."
    - order: 3
      role: form the Purkinje plate, differentiate Purkinje cells, and produce the SHH output
      node:
        id: purkinje_cell_development
        label: Purkinje-cell differentiation and SHH output
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Purkinje-cell development includes Reelin-dependent reorientation of the tested early/posterior-born subset during plate formation, followed by a RORA-dependent differentiation program that enables SHH production. SHH biogenesis and secretion is retained as a nested pathway-sized output, following the deck's separation of a cell process from the pathway that produces its intercellular signal.
        concepts:
          - preferred_term: cerebellar Purkinje cell differentiation
            term:
              id: GO:0021702
              label: cerebellar Purkinje cell differentiation
        context:
          cell_types:
            - preferred_term: Purkinje cell
              term:
                id: CL:0000121
                label: Purkinje cell
        annotons:
          - id: purkinje_rora_program
            label: RORA-dependent Purkinje differentiation program
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: RORA
                term:
                  id: UniProtKB:P35398
                  label: Nuclear receptor ROR-alpha
                description: Nuclear receptor required for Purkinje-cell differentiation and reciprocal signaling.
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
              targets:
                - preferred_term: Sonic hedgehog promoter and Purkinje differentiation genes
            processes:
              - preferred_term: cerebellar Purkinje cell differentiation
                term:
                  id: GO:0021702
                  label: cerebellar Purkinje cell differentiation
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Couples Purkinje differentiation to production of mitogenic signals for granule-cell precursors.
            evidence:
              - source_id: PMID:14687547
                title: RORalpha coordinates reciprocal signaling in cerebellar development through sonic hedgehog and calcium-dependent pathways.
                statement: RORalpha loss blocks Purkinje differentiation and reduces the SHH-dependent support of granule precursors.
                supporting_text: "One target promoter is Sonic hedgehog, and recombinant Sonic hedgehog restores granule precursor proliferation in RORalpha-deficient cerebellum."
        parts:
          - order: 1
            role: establish the early Purkinje plate
            node:
              id: early_purkinje_plate_formation
              label: Reelin-dependent reorientation during early Purkinje-plate formation
              module_type: DEVELOPMENTAL_PROCESS
              description: >-
                In the developing lateral mouse cerebellum, early/posterior-born
                Purkinje cells undergo a Reelin-dependent reorientation that initiates
                Purkinje-plate formation. The cited experiment does not establish that
                the same behavior applies to later-arriving or other Purkinje-cell
                populations, so this node is explicitly limited to the tested subset.
                DAB1 expression observed in that study is not modeled as a causal
                executor because DAB1 was not functionally perturbed there.
              concepts:
                - preferred_term: cerebellar Purkinje cell layer formation
                  term:
                    id: GO:0021694
                    label: cerebellar Purkinje cell layer formation
              context:
                cell_types:
                  - preferred_term: Purkinje cell
                    term:
                      id: CL:0000121
                      label: Purkinje cell
                anatomical_locations:
                  - preferred_term: Purkinje cell layer of cerebellar cortex
                    term:
                      id: UBERON:0002979
                      label: Purkinje cell layer of cerebellar cortex
              annotons:
                - id: reelin_subset_reorientation
                  label: Reelin signal for early/posterior-born Purkinje-cell reorientation
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: RELN
                      term:
                        id: UniProtKB:P78509
                        label: Reelin
                      description: Secreted extracellular cue superficial to the nascent Purkinje plate.
                  function:
                    preferred_term: extracellular Reelin positioning cue
                    description: A positional signal that reorients the tested early/posterior-born Purkinje-cell subset.
                  locations:
                    - preferred_term: extracellular region
                      term:
                        id: GO:0005576
                        label: extracellular region
                  role_description: >-
                    Initiates plate-forming reorientation in the early/posterior-born
                    Purkinje-cell population studied in the lateral mouse cerebellum.
                  evidence:
                    - source_id: PMID:20809939
                      title: Migration, early axonogenesis, and Reelin-dependent layer-forming behavior of early/posterior-born Purkinje cells in the developing mouse lateral cerebellum.
                      statement: Live and genetic analyses identify Reelin-dependent reorientation in the tested early/posterior-born lateral Purkinje-cell population.
                      supporting_text: "Reelin-dependent reorientation initiating PP formation"
          - order: 2
            role: produce and secrete the intercellular Hedgehog signal
            node:
              id: purkinje_hedgehog_output
              label: Hedgehog biogenesis and secretion output in Purkinje cells
              module_type: SIGNALING_PATHWAY
              description: >-
                Context-specific anchor for SHH production and
                secretion by differentiating Purkinje cells. A
                reusable generic Hedgehog-biogenesis module is not
                yet present in modules/, so the internal processing
                and export machinery is intentionally not expanded
                or guessed here.
              gocam_associations:
                - model: "696022cd00000016"
                  title: Protein maturation of SHH by autocleavage, autocholesterylation and palmitoylation by HHAT (Human).
                  description: >-
                    Production GO-CAM grounding for the reusable
                    SHH maturation subprogram represented here in
                    a Purkinje-cell developmental context.
              annotons:
                - id: purkinje_shh_signal
                  label: Purkinje-derived SHH mitogenic signal
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: SHH
                      term:
                        id: UniProtKB:Q15465
                        label: Sonic hedgehog protein
                      description: Secreted morphogen produced by differentiating Purkinje cells.
                  function:
                    preferred_term: morphogen activity
                    term:
                      id: GO:0016015
                      label: morphogen activity
                    targets:
                      - preferred_term: PTCH-SMO pathway in external-granule-layer precursors
                  processes:
                    - preferred_term: cerebellar Purkinje cell-granule cell precursor cell signaling
                      term:
                        id: GO:0021937
                        label: cerebellar Purkinje cell-granule cell precursor cell signaling
                    - preferred_term: positive regulation of cerebellar granule cell precursor proliferation
                      term:
                        id: GO:0021940
                        label: positive regulation of cerebellar granule cell precursor proliferation
                  locations:
                    - preferred_term: extracellular region
                      term:
                        id: GO:0005576
                        label: extracellular region
                  role_description: Supplies the extracellular morphogen that connects Purkinje-cell differentiation to the GCP Smoothened pathway.
                  gocam_associations:
                    - model: "696022cd00000016"
                      activity: gomodel:696022cd00000016/696022cd00000017
                      title: Protein maturation of SHH by autocleavage, autocholesterylation and palmitoylation by HHAT (Human).
                      description: Mature ShhN output of the generic production GO-CAM.
                    - model: "696022cd00000812"
                      activity: gomodel:696022cd00000812/696022cd00000900
                      title: Activation of the smoothened signaling pathway by SHH, which relieves SMO inhibition by PTCH1 (Human).
                      description: Mature ShhN input to the generic receiving GO-CAM.
                  evidence:
                    - source_id: PMID:10027293
                      title: Control of neuronal precursor proliferation in the cerebellum by Sonic Hedgehog.
                      statement: Purkinje-derived Shh is necessary and sufficient to drive a sustained granule-cell-precursor proliferative response.
                      supporting_text: "We show that Sonic hedgehog (Shh), which is made by Purkinje cells, regulates the division of granule cell precursors (GCPs)."
                    - source_id: PMID:26499980
                      title: Sonic hedgehog patterning during cerebellar development.
                      statement: The review explicitly identifies Purkinje cells as the source of SHH for postnatal neurogenic-niche amplification.
                      supporting_text: "Later, Shh secreted by Purkinje cells sustains the amplification of postnatal neurogenic niches: the external granular layer and the prospective white matter, where excitatory granule cells and inhibitory interneurons are produced, respectively."
        connections:
          - source: purkinje_rora_program
            target: purkinje_shh_signal
            connection_type: POSITIVELY_REGULATES
            description: RORA directly supports SHH expression as part of the differentiating Purkinje-cell program.
    - order: 4
      role: receive Purkinje-derived SHH, deploy canonical Smoothened signaling, and expand the GCP pool
      node:
        id: granule_cell_precursor_proliferation
        label: Granule-cell-precursor proliferation in the external granule layer
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Granule-cell precursors in the external granule layer receive
          Purkinje-derived SHH through the canonical PTCH-SMO-SUFU-GLI
          pathway. This cell-level proliferation process owns the contextual
          Smoothened-pathway deployment while pointing to the reusable generic
          pathway rather than copying its full topology.
        concepts:
          - preferred_term: cerebellar granule cell precursor proliferation
            term:
              id: GO:0021930
              label: cerebellar granule cell precursor proliferation
          - preferred_term: cerebellar Purkinje cell-granule cell precursor cell signaling
            term:
              id: GO:0021937
              label: cerebellar Purkinje cell-granule cell precursor cell signaling
          - preferred_term: positive regulation of cerebellar granule cell precursor proliferation
            term:
              id: GO:0021940
              label: positive regulation of cerebellar granule cell precursor proliferation
        context:
          anatomical_locations:
            - preferred_term: cerebellum external granule cell layer
              term:
                id: UBERON:0008829
                label: cerebellum external granule cell layer
          cell_types:
            - preferred_term: cerebellar granule cell precursor
              term:
                id: CL:0002362
                label: cerebellar granule cell precursor
        evidence:
          - source_id: PMID:32554107
            title: Interactions Between Purkinje Cells and Granule Cells Coordinate the Development of Functional Cerebellar Circuits.
            statement: This review situates Purkinje-cell signaling as a guide for later granule-cell development.
            supporting_text: "There are multiple morphogenetic and signaling mechanisms that Purkinje cells use to guide granule cell development"
        parts:
          - order: 1
            role: reuse the canonical Hedgehog/Smoothened pathway in GCPs
            node:
              id: gcp_smoothened_pathway_deployment
              label: Contextual Smoothened-pathway deployment in granule-cell precursors
              module_type: SIGNALING_PATHWAY
              description: >-
                Contextual anchor for modules/hedgehog_signaling.yaml.
                SMO is shown here to connect the cell-level outcome
                to the reusable pathway; PTCH1, SUFU, and GLI roles
                remain defined in that generic module.
              concepts:
                - preferred_term: smoothened signaling pathway
                  term:
                    id: GO:0007224
                    label: smoothened signaling pathway
              gocam_associations:
                - model: "696022cd00000812"
                  title: Activation of the smoothened signaling pathway by SHH, which relieves SMO inhibition by PTCH1 (Human).
                  description: >-
                    Production GO-CAM grounding for the reusable
                    receiving pathway deployed here in GCPs.
              annotons:
                - id: gcp_smoothened_transducer
                  label: SMO transducer in granule-cell precursors
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: SMO
                      term:
                        id: UniProtKB:Q99835
                        label: Protein smoothened
                      description: Contextual anchor for the generic canonical Hedgehog/Smoothened pathway.
                  function:
                    preferred_term: G protein-coupled receptor activity
                    term:
                      id: GO:0004930
                      label: G protein-coupled receptor activity
                  processes:
                    - preferred_term: smoothened signaling pathway
                      term:
                        id: GO:0007224
                        label: smoothened signaling pathway
                    - preferred_term: positive regulation of cerebellar granule cell precursor proliferation
                      term:
                        id: GO:0021940
                        label: positive regulation of cerebellar granule cell precursor proliferation
                  locations:
                    - preferred_term: non-motile cilium membrane
                      term:
                        id: GO:0098804
                        label: non-motile cilium membrane
                  role_description: Receives the SHH input and anchors the reusable canonical pathway that sustains GCP proliferation.
                  gocam_associations:
                    - model: "696022cd00000812"
                      activity: gomodel:696022cd00000812/696022cd00000824
                      title: Activation of the smoothened signaling pathway by SHH, which relieves SMO inhibition by PTCH1 (Human).
                      description: SMO activity in the generic production GO-CAM.
                  evidence:
                    - source_id: PMID:16571625
                      title: The level of sonic hedgehog signaling regulates the complexity of cerebellar foliation.
                      statement: Genetic reduction of canonical pathway components, including Smoothened, shortens GCP proliferation and reduces foliation.
                      supporting_text: "By progressively lowering signaling by removing Gli1 and Gli2 or the Shh receptor smoothened, we found the extent of foliation is gradually reduced, and that this correlates with a decrease in the duration of GCP proliferation."
    - order: 5
      role: coordinate concurrent neuronal migration and glial scaffold assembly
      node:
        id: post_specification_growth_and_lamination
        label: Concurrent cerebellar cortical-assembly programs
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          After lineage allocation, postmitotic granule neurons migrate inward while Purkinje-to-glia signaling differentiates Bergmann glia into a radial scaffold. These partly overlapping programs are concurrent ordinary parts of cerebellar cortical assembly, not alternative variants.
        parts:
          - order: 1
            role: position postmitotic granule neurons in the internal granule layer
            node:
              id: granule_cell_migration
              label: Granule-cell inward migration
              module_type: DEVELOPMENTAL_PROCESS
              description: >-
                Postmitotic granule neurons leave the external granule layer,
                cross the molecular and Purkinje layers, and settle in the
                internal granule layer. Cytoplasmic FBXO41 is a direct
                cell-intrinsic promoter of this migration.
              concepts:
