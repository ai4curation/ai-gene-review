                    term:
                      id: UniProtKB:Q05925
                      label: Homeobox protein engrailed-1
                  - preferred_term: EN2
                    term:
                      id: UniProtKB:P19622
                      label: Homeobox protein engrailed-2
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: cerebellum morphogenesis
                term:
                  id: GO:0021587
                  label: cerebellum morphogenesis
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Patterns the positions and identities of vermal and hemispheric folia after initial cell-type specification.
            evidence:
              - source_id: PMID:20081196
                title: The Engrailed homeobox genes determine the different foliation patterns in the vermis and hemispheres of the mammalian cerebellum.
                statement: Temporal conditional mutants demonstrate a late EN1/EN2 requirement for region-specific foliation.
                supporting_text: "both En genes are required to ensure that folia exclusive to the vermis or hemispheres form in the appropriate mediolateral position"
