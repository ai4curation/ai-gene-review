id: MODULE:cationic_antimicrobial_peptide_resistance_boundary
title: Cationic antimicrobial peptide resistance boundary
description: >-
  Boundary module for KEGG ppu01503 in Pseudomonas putida KT2440. The
  organism-specific CAMP-resistance map combines surface lipid/LPS modification,
  PhoPQ/Cpx-like envelope-stress regulation, RND efflux components, periplasmic
  folding/protease functions, and peptidoglycan remodeling enzymes. These genes
  do not form one linear pathway; the module records the resistance-map context
  while keeping each gene grounded in its direct molecular function.
status: DRAFT
evidence:
  - source_id: KEGG:ppu01503
    title: Cationic antimicrobial peptide (CAMP) resistance - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu01503 provides the PSEPK curation batch. Its 21 mapped members
      span LPS/lipid A and phospholipid modification genes, two-component
      regulators, RND efflux components, periplasmic protein quality-control
      factors, and peptidoglycan remodeling enzymes.
  - source_id: file:projects/P_PUTIDA/batches/ppu01503_cationic_antimicrobial_peptide_resistance_boundary.tsv
    title: PSEPK ppu01503 CAMP-resistance boundary batch
    statement: >-
      The batch records all 21 PSEPK members and their review/Asta status after
      the first-pass curation sweep.
module:
  id: cationic_antimicrobial_peptide_resistance_boundary
  label: Cationic antimicrobial peptide resistance boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: CAMP-resistance boundary
      description: >-
        A resistance-map boundary interpretation: KT2440 has genes that can
        affect envelope charge, stress response, efflux, folding, and
        peptidoglycan remodeling, but these should not be collapsed into one
        generic antimicrobial peptide resistance function for every member.
    - preferred_term: response to antibiotic
      term:
        id: GO:0046677
        label: response to antibiotic
      description: Broad resistance/stress-response context used cautiously.
    - preferred_term: phosphatidylglycerol lysyltransferase activity
      term:
        id: GO:0050071
        label: phosphatidylglycerol lysyltransferase activity
      description: PP_1202/MprF-like phospholipid aminoacylation that can reduce membrane negative charge.
    - preferred_term: lipid A biosynthetic process
      term:
        id: GO:0009245
        label: lipid A biosynthetic process
      description: Lipid A biosynthesis represented by lpxA.
    - preferred_term: lipopolysaccharide core region biosynthetic process
      term:
        id: GO:0009244
        label: lipopolysaccharide core region biosynthetic process
      description: LPS-core modification context represented by PP_0024 and PP_4592.
    - preferred_term: phosphorelay response regulator activity
      term:
        id: GO:0000156
        label: phosphorelay response regulator activity
      description: PhoP/CpxR/PP_4503 response-regulator activity.
    - preferred_term: phosphorelay sensor kinase activity
      term:
        id: GO:0000155
        label: phosphorelay sensor kinase activity
      description: PhoQ membrane sensor kinase activity.
    - preferred_term: efflux transmembrane transporter activity
      term:
        id: GO:0015562
        label: efflux transmembrane transporter activity
      description: Complex-level efflux transporter context for RND systems.
    - preferred_term: xenobiotic transmembrane transporter activity
      term:
        id: GO:0042910
        label: xenobiotic transmembrane transporter activity
      description: RND inner-membrane transporter activity represented by PP_0906, TtgB, and MexB.
    - preferred_term: efflux pump complex
      term:
        id: GO:1990281
        label: efflux pump complex
      description: Tripartite efflux assembly context for RND/MFP/OMF components.
    - preferred_term: disulfide oxidoreductase activity
      term:
        id: GO:0015036
        label: disulfide oxidoreductase activity
      description: DsbA periplasmic oxidative-folding activity.
    - preferred_term: serine-type endopeptidase activity
      term:
        id: GO:0004252
        label: serine-type endopeptidase activity
      description: PP_1430 DegP/HtrA-like protease activity.
    - preferred_term: peptidyl-prolyl cis-trans isomerase activity
      term:
        id: GO:0003755
        label: peptidyl-prolyl cis-trans isomerase activity
      description: PpiA protein-folding isomerase activity.
    - preferred_term: peptidoglycan L,D-transpeptidase activity
      term:
        id: GO:0071972
        label: peptidoglycan L,D-transpeptidase activity
      description: PP_2320 predicted peptidoglycan cross-linking/remodeling activity.
    - preferred_term: N-acetylmuramoyl-L-alanine amidase activity
      term:
        id: GO:0008745
        label: N-acetylmuramoyl-L-alanine amidase activity
      description: AmiC peptidoglycan amidase/remodeling activity.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Site of PhoQ, phospholipid modification, and inner-membrane RND transporters.
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
        description: DsbA, DegP-like protease, and peptidoglycan remodeling context.
      - preferred_term: outer membrane
        term:
          id: GO:0009279
          label: cell outer membrane
        description: Outer-membrane-factor efflux components.
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble response regulators and LpxA context.
  parts:
    - order: 1
      role: CAMP-resistance map boundary
      node:
        id: camp_resistance_boundary_guardrail
        label: CAMP-resistance map boundary guardrail
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu01503 membership is a resistance-mechanism collection, not a
          single reaction sequence. Treat surface modification, regulation,
          efflux, folding, and peptidoglycan remodeling as separate context
          nodes.
        annotons: []
    - order: 2
      role: Surface lipid and LPS modification context
      node:
        id: surface_lipid_lps_modification_context
        label: Surface lipid and LPS modification context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_1202 provides the clearest direct CAMP-resistance chemistry through
          MprF-like phosphatidylglycerol lysylation. LpxA supports lipid A
          biosynthesis, while PP_0024 and PP_4592 are unresolved EptA-like
          LPS-core modification candidates.
        annotons:
          - id: PP_1202_phosphatidylglycerol_lysyltransferase
            label: "PP_1202: phosphatidylglycerol lysyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1202
            function:
              preferred_term: phosphatidylglycerol lysyltransferase activity
              term:
                id: GO:0050071
                label: phosphatidylglycerol lysyltransferase activity
            role_description: MprF/LPG-synthase-family phospholipid aminoacylation and surface-charge modification context.
          - id: lpxA_lipid_a_acyltransferase
            label: "lpxA: lipid A acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpxA
            function:
              preferred_term: acyl-[acyl-carrier-protein]-UDP-N-acetylglucosamine O-acyltransferase activity
              term:
                id: GO:0008780
                label: acyl-[acyl-carrier-protein]-UDP-N-acetylglucosamine O-acyltransferase activity
            processes:
              - preferred_term: lipid A biosynthetic process
                term:
                  id: GO:0009245
                  label: lipid A biosynthetic process
            role_description: First acyltransferase step in lipid A biosynthesis; envelope target context.
          - id: PP_0024_epta_like_lps_boundary
            label: "PP_0024: EptA-like LPS-core modification candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0024
            function:
              preferred_term: phosphotransferase activity, phosphate group as acceptor
              term:
                id: GO:0016776
                label: phosphotransferase activity, phosphate group as acceptor
            processes:
              - preferred_term: lipopolysaccharide core region biosynthetic process
                term:
                  id: GO:0009244
                  label: lipopolysaccharide core region biosynthetic process
            role_description: Unresolved EptA-like phosphotransferase/hydrolase-family LPS-core modification candidate.
          - id: PP_4592_epta_like_lps_boundary
            label: "PP_4592: EptA-like LPS-core modification candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4592
            function:
              preferred_term: phosphotransferase activity, phosphate group as acceptor
              term:
                id: GO:0016776
                label: phosphotransferase activity, phosphate group as acceptor
            processes:
              - preferred_term: lipopolysaccharide core region biosynthetic process
                term:
                  id: GO:0009244
                  label: lipopolysaccharide core region biosynthetic process
            role_description: Second unresolved EptA-like phosphotransferase/hydrolase-family LPS-core modification candidate.
    - order: 3
      role: Envelope-stress two-component regulation
      node:
        id: envelope_stress_two_component_regulation
        label: Envelope-stress two-component regulation
        module_type: REGULATORY_STEP
        description: >-
          PhoP/PhoQ and CpxR-like response regulators provide regulatory
          context for envelope-stress and CAMP-resistance maps. The first pass
          keeps these as response-regulator and sensor-kinase functions rather
          than assigning direct antimicrobial peptide binding or detoxification.
        annotons:
          - id: phoQ_sensor_kinase
            label: "phoQ: sensor histidine kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: phoQ
            function:
              preferred_term: phosphorelay sensor kinase activity
              term:
                id: GO:0000155
                label: phosphorelay sensor kinase activity
            role_description: Membrane sensor kinase partner in PhoPQ-type envelope regulation.
          - id: phoP_response_regulator
            label: "phoP: response regulator"
            participant:
              selector_type: GENE
              gene:
                preferred_term: phoP
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
            role_description: OmpR/PhoB-family transcriptional response regulator.
          - id: cpxR_response_regulator
            label: "cpxR: Cpx response regulator"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cpxR
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
            role_description: Cpx-type envelope-stress transcriptional response regulator.
          - id: PP_4503_response_regulator
            label: "PP_4503: response regulator"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4503
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
            role_description: Unresolved OmpR/PhoB-family DNA-binding response regulator.
    - order: 4
      role: RND efflux and outer-membrane export context
      node:
        id: rnd_efflux_export_context
        label: RND efflux and outer-membrane export context
        module_type: TRANSPORT_STEP
        description: >-
          Multiple ppu01503 members are reused from beta-lactam and efflux
          maps. They are retained as broad xenobiotic/efflux context, not as
          cationic-peptide-specific enzymes.
        annotons:
          - id: PP_0906_rnd_transporter
            label: "PP_0906: RND transporter"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0906
            function:
              preferred_term: xenobiotic transmembrane transporter activity
              term:
                id: GO:0042910
                label: xenobiotic transmembrane transporter activity
            role_description: Inner-membrane RND transporter boundary context.
          - id: PP_0907_efflux_mfp
            label: "PP_0907: RND membrane-fusion component"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0907
            role_description: Membrane-fusion/adaptor component of an RND efflux assembly.
          - id: ttgA_efflux_adaptor
            label: "ttgA: TtgABC membrane-fusion adaptor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ttgA
            role_description: TtgABC efflux adaptor boundary context.
          - id: ttgB_rnd_transporter
            label: "ttgB: TtgABC RND transporter"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ttgB
            function:
              preferred_term: xenobiotic transmembrane transporter activity
              term:
                id: GO:0042910
                label: xenobiotic transmembrane transporter activity
            role_description: Inner-membrane RND transporter of the TtgABC efflux system.
          - id: PP_1798_outer_membrane_efflux
            label: "PP_1798: outer-membrane efflux factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1798
            role_description: Outer-membrane-factor component retained as export boundary context.
          - id: PP_3455_efflux_mfp
            label: "PP_3455: RND membrane-fusion component"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3455
            role_description: Membrane-fusion/adaptor component of an RND efflux assembly.
          - id: mexB_rnd_transporter
            label: "mexB: RND transporter"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mexB
            function:
              preferred_term: xenobiotic transmembrane transporter activity
              term:
                id: GO:0042910
                label: xenobiotic transmembrane transporter activity
            role_description: Inner-membrane RND transporter boundary context.
          - id: PP_4923_outer_membrane_efflux
            label: "PP_4923: outer-membrane efflux factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4923
            role_description: Outer-membrane-factor component retained as export boundary context.
    - order: 5
      role: Periplasmic protein quality control
      node:
        id: periplasmic_protein_quality_control
        label: Periplasmic protein quality control
        module_type: METABOLIC_PATHWAY
        description: >-
          DsbA, the DegP/HtrA-like protease PP_1430, and PpiA provide
          protein-folding and proteolysis support for envelope stress rather
          than direct antimicrobial peptide modification.
        annotons:
          - id: dsbA_disulfide_oxidoreductase
            label: "dsbA: disulfide oxidoreductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dsbA
            function:
              preferred_term: disulfide oxidoreductase activity
              term:
                id: GO:0015036
                label: disulfide oxidoreductase activity
            role_description: Periplasmic oxidative folding and redox-homeostasis support.
          - id: PP_1430_degp_like_serine_protease
            label: "PP_1430: DegP-like serine endoprotease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1430
            function:
              preferred_term: serine-type endopeptidase activity
              term:
                id: GO:0004252
                label: serine-type endopeptidase activity
            role_description: Periplasmic HtrA/DegP-like protein quality-control protease.
          - id: ppiA_peptidyl_prolyl_isomerase
            label: "ppiA: peptidyl-prolyl isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ppiA
            function:
              preferred_term: peptidyl-prolyl cis-trans isomerase activity
              term:
                id: GO:0003755
                label: peptidyl-prolyl cis-trans isomerase activity
            role_description: Cyclophilin-family folding catalyst in protein-folding stress context.
    - order: 6
      role: Peptidoglycan remodeling context
      node:
        id: peptidoglycan_remodeling_context
        label: Peptidoglycan remodeling context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_2320 and AmiC are envelope-remodeling enzymes. Their CAMP-map
          membership is treated as cell-wall integrity context, not as direct
          peptide detoxification.
        annotons:
          - id: PP_2320_ld_transpeptidase
            label: "PP_2320: L,D-transpeptidase-family enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2320
            function:
              preferred_term: peptidoglycan L,D-transpeptidase activity
              term:
                id: GO:0071972
                label: peptidoglycan L,D-transpeptidase activity
            role_description: Predicted YkuD/L,D-transpeptidase peptidoglycan cross-linking/remodeling enzyme.
          - id: amiC_peptidoglycan_amidase
            label: "amiC: N-acetylmuramoyl-L-alanine amidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: amiC
            function:
              preferred_term: N-acetylmuramoyl-L-alanine amidase activity
              term:
                id: GO:0008745
                label: N-acetylmuramoyl-L-alanine amidase activity
            role_description: Periplasmic peptidoglycan amidase in cell-wall turnover/remodeling.
  notes: >-
    This module is deliberately scoped as a resistance-boundary checkpoint. Only
    PP_1202 has a clear surface-charge modification mechanism directly tied to
    cationic peptide tolerance. The other members are retained as envelope
    regulation, efflux, folding, or remodeling context unless direct KT2440
    CAMP-resistance evidence is added later.
