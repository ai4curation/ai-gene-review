id: MODULE:sodium_solute_symporter_mate_boundary
title: Sodium-solute symporter and MATE efflux boundary
description: Boundary module for PSEPK AGCS, GltS, ArcD, ActP, PutP, TcyP, broad SSF, MATE, and ACR3 transport-family entries
  from the transport ion/metal split.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_sodium_solute_symporters_and_mate_efflux.tsv
  title: PSEPK sodium-solute/MATE transporter batch
  statement: The batch table records 14 PSEPK ion/metal-bucket genes assigned to sodium-solute symporters, ArcD/ActP carriers,
    MATE efflux, and an ACR3 arsenical-resistance outlier.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates this non-ABC solute transport set from monovalent cation antiporters,
    P-type ATPases, metal transporters, redox spillovers, and membrane enzyme side nodes.
notes: 'First-pass interpretation: retain substrate-specific transporter calls when product, family, and GOA agree. PP_0670
  is treated as an ACR3 arsenite/antimonite transporter despite the batch''s sodium-solute label. PP_3331 and PP_4524 remain
  broad symporter candidates until direct substrate evidence is available.'
