id: MODULE:glutamate_aspartate_abc_import_boundary
title: Glutamate/aspartate ABC import boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 PP_1068-PP_1071 GltIJKL
  ABC-transporter locus pulled from the KEGG ppu02010 ABC-transporter umbrella
  map. GltL is the ATP-binding energy-coupling subunit, GltK and GltJ are
  multi-pass inner-membrane permeases, and GltI is a signal-peptide-bearing
  periplasmic solute-binding component. The module records a coherent predicted
  acidic-amino-acid uptake system while leaving direct substrate preference
  between L-glutamate and L-aspartate open.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_1068-PP_1071 locus as a coherent
      amino-acid ABC transporter sub-batch within the broad ABC-transporter
      umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records cluster C23 as gltL, gltK, gltJ, and
      gltI after first-pass curation.
  - source_id: UniProtKB:Q88NY5
    title: GltL glutamate/aspartate ABC transporter ATP-binding subunit
    statement: >-
      UniProt names GltL as a glutamate/aspartate ABC transporter ATP-binding
      subunit, places it at the cell inner membrane as a peripheral membrane
      protein, and records ABC transporter ATP-binding domains.
  - source_id: UniProtKB:Q88NY4
    title: GltK glutamate/aspartate import permease
    statement: >-
      UniProt names GltK as a glutamate/aspartate import permease and states
      that it is part of the GltIJKL ABC transporter complex involved in
      glutamate and aspartate uptake.
  - source_id: UniProtKB:Q88NY3
    title: GltJ glutamate/aspartate ABC transporter permease
    statement: >-
      UniProt names GltJ as a glutamate/aspartate ABC transporter permease,
      predicts a multi-pass cell inner-membrane protein, and records
      MetI-like/binding-protein-dependent transporter domains.
  - source_id: UniProtKB:Q88NY2
    title: GltI glutamate/aspartate ABC transporter periplasmic binding protein
    statement: >-
      UniProt names GltI as a glutamate/aspartate ABC transporter periplasmic
      binding protein, records a signal peptide, and places the mature protein
      in the periplasm.
