        label: cobalamin transport
      description: >-
        Relay of cobalamin from the gut lumen into peripheral cells via haptocorrin/intrinsic
        factor, the cubam receptor, transcobalamin and CD320.
    - preferred_term: receptor-mediated endocytosis
      term:
        id: GO:0006898
        label: receptor-mediated endocytosis
      description: The cubam (CUBN/AMN) and CD320 uptake steps are receptor-mediated endocytosis.
  context:
