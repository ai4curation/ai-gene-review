id: MODULE:cobalamin_absorption_transport
title: Cobalamin (vitamin B12) absorption and transport; TCN1/CBLIF/CUBN/AMN/TCN2/CD320
description: >-
  Dietary cobalamin (vitamin B12) reaches the cytoplasm of peripheral cells through a relay of
  binding proteins and endocytic receptors. In saliva and the acidic stomach, cobalamin is
  first bound and protected by haptocorrin (TCN1); in the duodenum pancreatic proteases degrade
  haptocorrin and the cobalamin is transferred to gastric intrinsic factor (CBLIF/GIF), secreted
  by parietal cells. The intrinsic-factor-cobalamin complex is then recognised in the ileum by
  the cubam receptor, a complex of the large peripheral membrane protein cubilin (CUBN) and its
  transmembrane partner amnionless (AMN), which internalises it by receptor-mediated endocytosis;
  the cobalamin is released and exported to the blood. In plasma, newly absorbed cobalamin is
  bound by transcobalamin (TCN2), the physiologically essential delivery carrier, and the
  transcobalamin-cobalamin complex is taken up by peripheral cells through the cell-surface
  receptor CD320 (TCblR). Inherited defects along this route cause B12-deficiency disorders:
  CBLIF (hereditary intrinsic factor deficiency / juvenile pernicious anaemia), CUBN and AMN
  (Imerslund-Grasbeck syndrome, megaloblastic anaemia with proteinuria), TCN2 (transcobalamin
  deficiency, severe infantile megaloblastic anaemia with immunodeficiency) and CD320 (a usually
  mild/transient methylmalonic acidaemia detected on newborn screening).
status: DRAFT
evidence:
  - source_id: GO:0015889
    title: cobalamin transport
    statement: >-
      The module is grounded in cobalamin transport (GO:0015889); it covers the binding-protein
      and receptor relay that carries dietary B12 from the gut lumen into peripheral cells.
  - source_id: Reactome:R-HSA-3000137
    title: "CUBN:AMN-mediated CBLIF:RCbl uptake and delivery to lysosome"
    statement: >-
      The ileal intrinsic-factor-cobalamin uptake step follows the human Reactome
      "CUBN:AMN-mediated CBLIF:RCbl uptake" reaction; the plasma-transport/CD320 steps follow
      R-HSA-3000074/3000112/3000122.
  - source_id: file:human/TCN1/TCN1-ai-review.yaml
    title: TCN1 gene review (human)
    statement: >-
      The haptocorrin cobalamin-binding step (UniProtKB:P20061, GO:0031419) matches the completed
      human TCN1 review.
  - source_id: file:human/CBLIF/CBLIF-ai-review.yaml
    title: CBLIF gene review (human)
    statement: >-
      The intrinsic-factor cobalamin-binding step (UniProtKB:P27352, GO:0031419) matches the
      completed human CBLIF review.
  - source_id: file:human/CUBN/CUBN-ai-review.yaml
    title: CUBN gene review (human)
    statement: >-
      The cubilin cargo-receptor step (UniProtKB:O60494, GO:0038024) matches the completed human
      CUBN review.
  - source_id: file:human/AMN/AMN-ai-review.yaml
    title: AMN gene review (human)
    statement: >-
      The amnionless cubam co-receptor step (UniProtKB:Q9BXJ7, GO:0038024) matches the completed
      human AMN review.
  - source_id: file:human/TCN2/TCN2-ai-review.yaml
    title: TCN2 gene review (human)
    statement: >-
      The transcobalamin plasma-transport step (UniProtKB:P20062, GO:0031419) matches the completed
      human TCN2 review.
  - source_id: file:human/CD320/CD320-ai-review.yaml
    title: CD320 gene review (human)
    statement: >-
      The CD320 transcobalamin-receptor uptake step (UniProtKB:Q9NPF0, GO:0038024) matches the
      completed human CD320 review.
module:
