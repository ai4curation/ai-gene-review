      target: cblif_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        After pancreatic proteases degrade haptocorrin in the duodenum, cobalamin is transferred
        to intrinsic factor (CBLIF).
    - source: cblif_step
      target: cubam_step
      connection_type: PROVIDES_INPUT_FOR
      description: The IF-cobalamin complex is the ligand internalised by the ileal cubam receptor.
    - source: cubam_step
      target: tcn2_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Cobalamin absorbed via cubam is exported to the blood and bound by transcobalamin (TCN2).
    - source: tcn2_step
      target: cd320_step
      connection_type: PROVIDES_INPUT_FOR
      description: The TC-cobalamin complex is taken up by peripheral cells through the CD320 receptor.
  notes: >-
    Cobalamin (vitamin B12) absorption and transport, grounded to the human proteins TCN1
    (UniProtKB:P20061, GO:0031419), CBLIF (P27352, GO:0031419), the cubam receptor (CUBN O60494 +
    AMN Q9BXJ7, GO:0038024), TCN2 (P20062, GO:0031419) and CD320 (Q9NPF0, GO:0038024). GO
    molecular-function/location terms were taken from the completed human gene reviews and verified
    against the local go.db; Reactome reaction ids/titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector with the human protein as representative; the
    soluble transcobalamin-family carriers TCN1, CBLIF and TCN2 share PTHR10559, and the ileal
    cubam receptor is modelled as a PROTEIN_COMPLEX node (cubilin ligand-binding subunit + amnionless
    membrane anchor). This is a small-molecule trafficking pathway (binding proteins + endocytic
    receptors, not enzymes). Downstream, internalised cobalamin is released in the lysosome and
    processed in the cytosol by MMACHC (cblC) and MMADHC (cblD), then routed to adenosylcobalamin
    (MMAB/MMAA -> MMUT, methylmalonyl-CoA mutase) and methylcobalamin (MTR/MTRR, methionine synthase)
    — separate modules (MMAA/MMAB/MMUT already in the propionyl-CoA module; MTR/MTRR reviewed).
    Disorders span the route: CBLIF (juvenile pernicious anaemia), CUBN/AMN (Imerslund-Grasbeck
    syndrome), TCN2 (transcobalamin deficiency) and CD320 (newborn-screen methylmalonic acidaemia).
