id: MODULE:fatty_acid_elongation_cycle
title: Microsomal fatty-acid elongation cycle (ELOVL -> HSD17B12 -> HACD1/2 -> TECR)
description: >-
  Most fatty acids longer than the C16 palmitate made by cytosolic fatty-acid synthase are produced by the
  microsomal elongation system, a four-reaction cycle on the cytosolic face of the endoplasmic-reticulum
  membrane that adds two carbons per turn. Each round begins with the rate-limiting, substrate-selective
  condensation of an acyl-CoA with malonyl-CoA to a 3-oxoacyl-CoA (releasing CO2), catalysed by one of seven
  fatty-acid elongases (ELOVL1-7) whose chain-length and saturation preferences define which fatty acids a
  cell makes: ELOVL1/3/6 handle saturated and monounsaturated substrates (ELOVL6 the C16->C18 lipogenic step,
  ELOVL1 the C22->C26 very-long-chain step for sphingolipids/myelin, ELOVL3 skin/brown-fat lipids), ELOVL2/5
  the C20/C22 polyunsaturated fatty acids en route to DHA, ELOVL7 C18-C20 substrates, and ELOVL4 the unique
  ultra-long-chain (C26-C38) fatty acids of retina, skin and brain. The 3-oxoacyl-CoA is then reduced by the
  NADPH-dependent 3-ketoacyl-CoA reductase HSD17B12 (KAR) to (3R)-3-hydroxyacyl-CoA, dehydrated by the
  3-hydroxyacyl-CoA dehydratases HACD1/HACD2 to (2E)-enoyl-CoA, and reduced by the NADPH-dependent
  trans-2-enoyl-CoA reductase TECR to the two-carbon-extended saturated acyl-CoA, which re-enters the cycle.
  The reductase/dehydratase/reductase enzymes are shared across all ELOVLs; substrate specificity resides in
  the elongase. Inherited defects span the products: ELOVL1 (IKSHD ichthyosis/spastic quadriplegia), ELOVL4
  (Stargardt-like macular dystrophy, SCA34, ichthyosis), HACD1 (congenital myopathy), TECR (intellectual
  disability), reflecting the roles of very-long-chain and ultra-long-chain fatty acids in skin barrier,
  myelin, retina and muscle.
status: DRAFT
evidence:
  - source_id: GO:0030497
    title: fatty acid elongation
    statement: ELOVLs, HSD17B12, HACD1/2 and TECR run the microsomal fatty-acid elongation cycle (GO:0030497).
  - source_id: GO:0042761
    title: very long-chain fatty acid biosynthetic process
    statement: The cycle produces very-long-chain (and ultra-long-chain) fatty acids (GO:0042761).
  - source_id: file:human/ELOVL1/ELOVL1-ai-review.yaml
    title: ELOVL1 gene review (human)
    statement: The condensation step (UniProtKB:Q9BW60, GO:0009922) matches the completed human ELOVL1 review.
  - source_id: file:human/ELOVL2/ELOVL2-ai-review.yaml
    title: ELOVL2 gene review (human)
    statement: The PUFA condensation step (UniProtKB:Q9NXB9, GO:0009922) matches the completed human ELOVL2 review.
  - source_id: file:human/ELOVL3/ELOVL3-ai-review.yaml
    title: ELOVL3 gene review (human)
    statement: The condensation step (UniProtKB:Q9HB03, GO:0009922) matches the completed human ELOVL3 review.
  - source_id: file:human/ELOVL4/ELOVL4-ai-review.yaml
    title: ELOVL4 gene review (human)
    statement: The ultra-long-chain condensation step (UniProtKB:Q9GZR5, GO:0009922) matches the completed human ELOVL4 review.
  - source_id: file:human/ELOVL6/ELOVL6-ai-review.yaml
    title: ELOVL6 gene review (human)
    statement: The C16->C18 condensation step (UniProtKB:Q9H5J4, GO:0009922) matches the completed human ELOVL6 review.
  - source_id: file:human/ELOVL7/ELOVL7-ai-review.yaml
    title: ELOVL7 gene review (human)
    statement: The condensation step (UniProtKB:A1L3X0, GO:0009922) matches the completed human ELOVL7 review.
  - source_id: file:human/HSD17B12/HSD17B12-ai-review.yaml
    title: HSD17B12 gene review (human)
    statement: The 3-ketoacyl-CoA reduction step (UniProtKB:Q53GQ0, GO:0141040) matches the completed human HSD17B12 review.
  - source_id: file:human/HACD1/HACD1-ai-review.yaml
    title: HACD1 gene review (human)
    statement: The 3-hydroxyacyl-CoA dehydration step (UniProtKB:B0YJ81, GO:0102158) matches the completed human HACD1 review.
  - source_id: file:human/HACD2/HACD2-ai-review.yaml
    title: HACD2 gene review (human)
    statement: The 3-hydroxyacyl-CoA dehydration step (UniProtKB:Q6Y1H2, GO:0102158) matches the completed human HACD2 review.
  - source_id: file:human/TECR/TECR-ai-review.yaml
    title: TECR gene review (human)
    statement: The trans-2-enoyl-CoA reduction step (UniProtKB:Q9NZ01, GO:0102758) matches the completed human TECR review.
module:
  id: fatty_acid_elongation_cycle
  label: Microsomal fatty-acid elongation cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid elongation
      term:
        id: GO:0030497
        label: fatty acid elongation
      description: Two-carbon-per-turn ER elongation cycle (condensation/reduction/dehydration/reduction).
    - preferred_term: very long-chain fatty acid biosynthetic process
      term:
        id: GO:0042761
        label: very long-chain fatty acid biosynthetic process
      description: Production of VLCFAs (and ultra-long-chain FAs) beyond C16.
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: All four cycle enzymes are ER-membrane proteins (fatty acid elongase complex).
  parts:
    - order: 1
      role: condensation (rate-limiting; substrate selectivity)
      node:
        id: condensation
        label: Fatty-acid elongases (ELOVL1-7)
        module_type: REACTION
        annotons:
          - id: elovl_activity
            label: "ELOVL1/2/3/4/6/7: fatty acid elongase (condensing enzyme)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ELOVL / ELO fatty-acid elongase family
                term:
                  id: PANTHER:PTHR11157
                  label: ELONGATION OF VERY LONG CHAIN FATTY ACIDS PROTEIN
                representative_members:
                  - preferred_term: ELOVL1 (human; sat/monounsat C22->C26)
                    term:
                      id: UniProtKB:Q9BW60
                      label: Elongation of very long chain fatty acids protein 1
                  - preferred_term: ELOVL2 (human; C20/C22 PUFA)
                    term:
                      id: UniProtKB:Q9NXB9
                      label: Elongation of very long chain fatty acids protein 2
                  - preferred_term: ELOVL3 (human; sat/monounsat C16-C22)
                    term:
                      id: UniProtKB:Q9HB03
                      label: Elongation of very long chain fatty acids protein 3
                  - preferred_term: ELOVL4 (human; ultra-long-chain C26-C38)
                    term:
                      id: UniProtKB:Q9GZR5
                      label: Elongation of very long chain fatty acids protein 4
                  - preferred_term: ELOVL6 (human; C16->C18)
                    term:
                      id: UniProtKB:Q9H5J4
                      label: Elongation of very long chain fatty acids protein 6
                  - preferred_term: ELOVL7 (human; C18-C20)
                    term:
                      id: UniProtKB:A1L3X0
                      label: Elongation of very long chain fatty acids protein 7
            function:
              preferred_term: fatty acid elongase activity
              term:
                id: GO:0009922
                label: fatty acid elongase activity
              substrates:
                - preferred_term: acyl-CoA (chain-length/saturation per ELOVL isoform)
                - preferred_term: malonyl-CoA
              products:
                - preferred_term: 3-oxoacyl-CoA (2 carbons longer)
                - preferred_term: CO2 + CoA
              evidence:
                - source_id: file:human/ELOVL1/ELOVL1-ai-review.yaml
                  statement: Seven ELOVLs catalyse the rate-limiting condensation; substrate specificity defines cell fatty-acid profile (ELOVL6 C16->C18; ELOVL1 sat/monounsat VLCFA; ELOVL2/5 PUFA->DHA; ELOVL4 ultra-long-chain)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Condense acyl-CoA + malonyl-CoA to 3-oxoacyl-CoA (rate-limiting; sets specificity).
    - order: 2
      role: 3-ketoacyl-CoA reduction
      node:
        id: ketoreduction
        label: 3-ketoacyl-CoA reductase (HSD17B12 / KAR)
        module_type: REACTION
        annotons:
          - id: hsd17b12_activity
            label: "HSD17B12: very-long-chain 3-oxoacyl-CoA reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HSD17B12 / 3-ketoacyl-CoA reductase (SDR) family
                term:
                  id: PANTHER:PTHR43899
                  label: VERY-LONG-CHAIN 3-OXOACYL-COA REDUCTASE
                representative_members:
                  - preferred_term: HSD17B12 (human)
                    term:
                      id: UniProtKB:Q53GQ0
                      label: Very-long-chain 3-oxoacyl-CoA reductase
            function:
              preferred_term: very-long-chain 3-oxoacyl-CoA reductase activity
              term:
                id: GO:0141040
                label: very-long-chain 3-oxoacyl-CoA reductase activity
              substrates:
                - preferred_term: 3-oxoacyl-CoA
                - preferred_term: NADPH
              products:
                - preferred_term: (3R)-3-hydroxyacyl-CoA
                - preferred_term: NADP+
              evidence:
                - source_id: file:human/HSD17B12/HSD17B12-ai-review.yaml
                  statement: NADPH-dependent SDR reducing the 3-oxoacyl-CoA to (3R)-3-hydroxyacyl-CoA (second cycle step; the KAR of VLCFA elongation); historical 17-beta-HSD/estradiol activity is non-core
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Reduce 3-oxoacyl-CoA to (3R)-3-hydroxyacyl-CoA (NADPH).
    - order: 3
      role: 3-hydroxyacyl-CoA dehydration
      node:
        id: dehydration
        label: 3-hydroxyacyl-CoA dehydratase (HACD1/HACD2)
        module_type: REACTION
        annotons:
          - id: hacd_activity
            label: "HACD1/HACD2: very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HACD / 3-hydroxyacyl-CoA dehydratase family
                term:
                  id: PANTHER:PTHR11035
                  label: 3-HYDROXYACYL-COA DEHYDRATASE
                representative_members:
                  - preferred_term: HACD1 (human; muscle-enriched)
                    term:
                      id: UniProtKB:B0YJ81
                      label: Very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase 1
                  - preferred_term: HACD2 (human; ubiquitous)
                    term:
                      id: UniProtKB:Q6Y1H2
                      label: Very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase 2
            function:
              preferred_term: very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase activity
              term:
                id: GO:0102158
                label: very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase activity
              substrates:
                - preferred_term: (3R)-3-hydroxyacyl-CoA
              products:
                - preferred_term: (2E)-enoyl-CoA
                - preferred_term: H2O
              evidence:
                - source_id: file:human/HACD1/HACD1-ai-review.yaml
                  statement: Third cycle step, dehydrating (3R)-3-hydroxyacyl-CoA to (2E)-enoyl-CoA; HACD1 muscle-enriched (congenital myopathy), HACD2 ubiquitous
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Dehydrate (3R)-3-hydroxyacyl-CoA to (2E)-enoyl-CoA.
    - order: 4
      role: trans-2-enoyl-CoA reduction (cycle completion)
      node:
        id: enoyl_reduction
        label: trans-2-enoyl-CoA reductase (TECR)
        module_type: REACTION
        annotons:
          - id: tecr_activity
            label: "TECR: very-long-chain trans-2-enoyl-CoA reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: TECR / trans-2-enoyl-CoA reductase family
                term:
                  id: PANTHER:PTHR10556
                  label: TRANS-2,3-ENOYL-COA REDUCTASE
                representative_members:
                  - preferred_term: TECR (human)
                    term:
                      id: UniProtKB:Q9NZ01
                      label: Very-long-chain enoyl-CoA reductase
            function:
              preferred_term: very-long-chain enoyl-CoA reductase activity
              term:
                id: GO:0102758
                label: very-long-chain enoyl-CoA reductase activity
              substrates:
                - preferred_term: (2E)-enoyl-CoA
                - preferred_term: NADPH
              products:
                - preferred_term: acyl-CoA (fully saturated, 2 carbons longer)
                - preferred_term: NADP+
              evidence:
                - source_id: file:human/TECR/TECR-ai-review.yaml
                  statement: NADPH-dependent final cycle step reducing (2E)-enoyl-CoA to the 2-carbon-extended saturated acyl-CoA; also saturates trans-2-hexadecenal in sphingosine degradation; deficiency = intellectual disability (MRT14)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Reduce (2E)-enoyl-CoA to the elongated saturated acyl-CoA (NADPH; completes cycle).
  connections:
    - source: condensation
      target: ketoreduction
      connection_type: PROVIDES_INPUT_FOR
      description: The 3-oxoacyl-CoA made by the ELOVLs is reduced by HSD17B12.
    - source: ketoreduction
      target: dehydration
      connection_type: PROVIDES_INPUT_FOR
      description: The (3R)-3-hydroxyacyl-CoA is dehydrated by HACD1/HACD2.
    - source: dehydration
      target: enoyl_reduction
      connection_type: PROVIDES_INPUT_FOR
      description: The (2E)-enoyl-CoA is reduced by TECR.
    - source: enoyl_reduction
      target: condensation
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The 2-carbon-elongated saturated acyl-CoA re-enters the ELOVL condensation step, iterating the
        cycle until the target chain length is reached.
  notes: >-
    Microsomal fatty-acid elongation cycle (GO:0030497 + GO:0042761), grounded to ten completed human gene
    reviews, all ER-membrane enzymes of the fatty acid elongase complex (GO:0009923). CONDENSATION
    (rate-limiting, substrate-selective): six of the seven ELOVLs reviewed here (ELOVL1 Q9BW60, ELOVL2
    Q9NXB9, ELOVL3 Q9HB03, ELOVL4 Q9GZR5, ELOVL6 Q9H5J4, ELOVL7 A1L3X0) share PTHR11157 and all carry
    GO:0009922 fatty acid elongase activity (the single correct MF — no finer chain-length GO term exists;
    specificity noted per-gene: ELOVL6 C16->C18, ELOVL1 sat/monounsat VLCFA, ELOVL2 C20/C22 PUFA->DHA, ELOVL3
    skin/brown-fat, ELOVL4 ultra-long-chain C26-C38, ELOVL7 C18-C20; ELOVL5 already reviewed earlier). The
    other three steps are SHARED across all ELOVLs: HSD17B12/KAR (Q53GQ0 PTHR43899, GO:0141040 3-oxoacyl-CoA
    reductase — its legacy 17-beta-HSD/estradiol activity is non-core), HACD1 (B0YJ81, muscle) + HACD2
    (Q6Y1H2, ubiquitous) sharing PTHR11035 (GO:0102158 (3R)-3-hydroxyacyl-CoA dehydratase), and TECR (Q9NZ01
    PTHR10556, GO:0102758 trans-2-enoyl-CoA reductase). Recurrent curation note: several reviews flag
    PMID:10970790 (HELO1 = the ELOVL5/ELOVL2 clone) as a WRONG_IDENTIFIER Reactome-EXP source though the
    elongase MF itself is correct. GO term ids/labels verified against the local go.db. Products feed
    sphingolipid/ceramide synthesis (curated modules), membrane phospholipids and skin/myelin/retina lipids.
    Disorders: ELOVL1 IKSHD; ELOVL4 Stargardt-like STGD3 / SCA34 / ISQMR; HACD1 congenital myopathy; TECR
    intellectual disability (MRT14).
