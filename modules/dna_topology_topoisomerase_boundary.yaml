      id: GO:0003918
      label: DNA topoisomerase type II (double strand cut, ATP-hydrolyzing) activity
    description: Type II topoisomerase activity used by DNA gyrase and Topo IV.
  - preferred_term: DNA topoisomerase type I (single strand cut, ATP-independent) activity
    term:
      id: GO:0003917
      label: DNA topoisomerase type I (single strand cut, ATP-independent) activity
    description: Type I topoisomerase activity used by TopA, TopB, and PP_3831.
  - preferred_term: DNA negative supercoiling activity
    term:
      id: GO:0034335
