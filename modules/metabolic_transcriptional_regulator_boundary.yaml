id: MODULE:metabolic_transcriptional_regulator_boundary
title: Metabolic transcriptional regulator boundary
description: Boundary module for compact PSEPK metabolic transcriptional regulators from the broad regulation/signal-transduction
  functional bucket. It groups AsnC/Lrp, DeoR/LacI, IclR/RpiR, and Crp/Fnr-family regulators while keeping target regulons
  and effector ligands unresolved unless separately curated.
