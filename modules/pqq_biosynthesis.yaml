id: MODULE:pqq_biosynthesis
title: Pyrroloquinoline quinone biosynthesis
description: >-
  Pyrroloquinoline quinone (PQQ) is made from conserved glutamate and tyrosine
  residues in the short ribosomally synthesized precursor peptide PqqA. A
  PqqD-family peptide chaperone presents PqqA to the radical-SAM enzyme PqqE,
  which forms the defining carbon-carbon cross-link. Proteolytic processing and
  PqqB-dependent oxygenation both contribute to formation of a late
  small-molecule precursor, although their relative order is unresolved. PqqC
  completes oxidative ring closure to mature PQQ. PQQ export and use by
  quinoprotein dehydrogenases are downstream of this module.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00539
    title: Pyrroloquinoline quinone biosynthesis
    statement: >-
      UniPathway UPA00539 identifies the PqqA, PqqD, PqqE, PqqB, and PqqC
      pathway roles, together with PqqF as one implementation of the required
      precursor-proteolysis operation.
  - source_id: GO:0018189
    title: pyrroloquinoline quinone biosynthetic process
    statement: >-
      GO:0018189 provides the biological-process identity for conversion of a
      peptide precursor into the PQQ cofactor.
  - source_id: PMID:27287323
    title: Regulation of Pyrroloquinoline Quinone-Dependent Glucose Dehydrogenase Activity in the Model Rhizosphere-Dwelling Bacterium Pseudomonas putida KT2440.
    statement: >-
      The KT2440 operon study maps pqqFABCDEG, identifies PP_0375 as a putative
      pqqG by locus and sequence conservation, and places pqqG on the pqqCDEG
      transcript while leaving its biochemical role unresolved.
  - source_id: PMID:19902179
    title: The PQQ biosynthetic operons and their transcriptional regulation in Pseudomonas aeruginosa.
    statement: >-
      Genetics in Pseudomonas aeruginosa separates the PA1990/PqqH phenotype,
      loss of extracellular PQQ, from the inability of a pqqF mutant to produce
      PQQ. This distinction leaves the direct biochemical role of S9-family
      PqqH/PqqG candidates unresolved.
  - source_id: PMID:31427437
    title: A two-component protease in Methylorubrum extorquens with high activity toward the peptide precursor of the redox cofactor pyrroloquinoline quinone.
    statement: >-
      Biochemical characterization identifies a heterodimeric M16B PqqF/PqqG
      protease that cleaves PqqA, providing a distinct implementation from the
      S9-family Pseudomonas protein also named PqqG or PqqM.
  - source_id: RHEA:56836
    title: PqqE-dependent PqqA cross-linking
    statement: >-
      Rhea 56836 defines radical-SAM formation of the glutamate-tyrosine
      carbon-carbon cross-link in the PQQ precursor peptide.
  - source_id: RHEA:10692
    title: pyrroloquinoline-quinone synthase reaction
    statement: >-
      Rhea 10692 defines the terminal PqqC oxidation of the late quinoline
      precursor to mature PQQ.
  - source_id: file:PSEPK/pqqD1/pqqD1-ai-review.yaml
    title: PqqD1 gene review
    statement: >-
      The PqqD1 review supports a PqqA-binding peptide-chaperone role and does
      not treat generic quinone binding as its core molecular function.
  - source_id: file:PSEPK/pqqE/pqqE-ai-review.yaml
    title: PqqE gene review
    statement: >-
      The PqqE review supports radical-SAM PqqA peptide cyclase activity in PQQ
      biosynthesis.
  - source_id: file:PSEPK/PP_0375/PP_0375-ai-review.yaml
    title: PP_0375 PqqG-candidate gene review
    statement: >-
      The PP_0375 review assesses the S9 serine-peptidase annotation and the
      literature-supported association of this Pseudomonas pqqG candidate with
      the PQQ pathway without assigning an unproven pathway substrate or
      conflating precursor maturation with PQQ excretion.
  - source_id: file:PSEPK/pqqB/pqqB-ai-review.yaml
    title: PqqB gene review
    statement: >-
      The PqqB review supports an inferred non-heme hydroxylase role while
      retaining uncertainty about the native substrate and exact product.
  - source_id: file:PSEPK/pqqC/pqqC-ai-review.yaml
    title: PqqC gene review
    statement: >-
      The PqqC review supports the terminal pyrroloquinoline-quinone synthase
      reaction.
notes: >-
  This is a reusable pathway module. Pseudomonas putida KT2440 proteins are
  representative members, not a taxonomic restriction or an exhaustive member
  list. Two PqqD paralogs from KT2440 illustrate that one family role may have
  multiple concrete implementations; the module does not require two PqqD
  proteins in every organism. Proteolytic processing and PqqB oxygenation are
  maturation operations, but their exact substrate handoff and order are left
  unresolved. PP_0375 is a strong Pseudomonas pqqG candidate, but its S9
  peptidase family differs from the M16B PqqG partner characterized in some
  other bacteria; neither is forced into the conserved core without a defined
  reaction. PQQ-dependent dehydrogenases, transport, pathway regulation, and
  unrelated proteins adjacent to pqq loci are outside the boundary.
module:
  id: pqq_biosynthesis
  label: Pyrroloquinoline quinone biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyrroloquinoline quinone biosynthetic process
      term:
        id: GO:0018189
        label: pyrroloquinoline quinone biosynthetic process
      description: Formation of PQQ from a ribosomally synthesized peptide precursor.
  parts:
    - order: 1
      role: PqqA precursor-peptide supply
      node:
        id: pqqa_precursor_supply
        label: PqqA precursor-peptide supply
        module_type: BIOLOGICAL_PROCESS
        description: >-
          PqqA supplies the conserved glutamate and tyrosine residues from
          which the PQQ ring system is constructed.
        annotons:
          - id: pqqa_precursor_role
            label: PqqA precursor-peptide role
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PqqA precursor-peptide family
                term:
                  id: InterPro:IPR011725
                  label: Coenzyme PQQ biosynthesis protein A
                description: >-
                  Short PQQ precursor peptides recognized by InterPro
                  IPR011725 and Pfam PF08042.
                representative_members:
                  - preferred_term: PqqA (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QV4
                      label: Coenzyme PQQ synthesis protein A
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            role_description: >-
              Provides the peptide-bound glutamate and tyrosine substrates for
              PqqE-dependent cross-link formation.
    - order: 2
      role: PqqD-assisted radical-SAM cross-link formation
      node:
        id: pqqde_crosslinking
        label: PqqD-assisted PqqE cross-linking
        module_type: REACTION
        description: >-
          A PqqD-family peptide chaperone binds PqqA and presents it to PqqE.
          PqqE then forms the carbon-carbon bond between the precursor
          glutamate and tyrosine residues.
        annotons:
          - id: pqqd_peptide_chaperone
            label: PqqD peptide-chaperone role
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PqqD peptide-chaperone family
                term:
                  id: InterPro:IPR022479
                  label: Coenzyme PQQ synthesis D, bacteria
                description: >-
                  PqqA-binding proteins recognized by InterPro IPR008792,
                  IPR022479, and IPR041881.
                representative_members:
                  - preferred_term: PqqD1 (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QV7
                      label: PqqA binding protein 1
                  - preferred_term: PqqD2 (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88JG8
                      label: PqqA binding protein 2
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            role_description: >-
              Presents the PqqA precursor peptide to PqqE; no specific GO
              molecular-function term currently captures this chaperone role.
          - id: pqqe_peptide_cyclase
            label: PqqE PqqA peptide cyclase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PqqE radical-SAM peptide cyclase family
                term:
                  id: InterPro:IPR011843
                  label: Coenzyme PQQ biosynthesis protein E, bacteria
                representative_members:
                  - preferred_term: PqqE (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QV8
                      label: PqqA peptide cyclase
            function:
              preferred_term: cyclase activity
              term:
                id: GO:0009975
                label: cyclase activity
              substrates:
                - preferred_term: PQQ precursor protein
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: glutamate-tyrosine-cross-linked PQQ precursor protein
                - preferred_term: 5'-deoxyadenosine
                - preferred_term: L-methionine
              evidence:
                - source_id: RHEA:56836
                  title: PqqE-dependent PqqA cross-linking
                  statement: >-
                    Rhea 56836 defines the PqqE radical-SAM cross-linking
                    reaction and its peptide substrate and products.
                - source_id: file:PSEPK/pqqE/pqqE-ai-review.yaml
                  statement: >-
                    The PSEPK pqqE review accepts GO:0009975 as the direct
                    catalytic activity of Q88QV8.
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            role_description: >-
              Creates the first committed covalent modification of the PqqA
              precursor peptide.
    - role: Proteolytic release of a PqqA-derived intermediate
      node:
        id: pqqa_proteolysis
        label: PqqA-derived precursor proteolysis
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Proteolysis removes peptide context during maturation toward a
          small-molecule PQQ intermediate. The responsible protease repertoire
          varies among PQQ-producing organisms, and more than one protease may
          contribute in a given organism.
        variant_sets:
          - id: pqqa_proteolysis_implementation
            label: PQQ precursor-proteolysis implementation
            axis: protease repertoire
            selection: ONE_OR_MORE
            notes: >-
              Single-chain PqqF/M16A-like proteases and two-component M16B
              PqqF/PqqG complexes are distinct supported implementations. Some
              PQQ producers lack PqqF, implying replacement by other cellular
              proteases whose identities and division of labor may be unresolved.
            variants:
              - id: single_chain_pqqf_m16a_route
                label: Single-chain PqqF/M16A-like protease route
                module_type: REACTION
                description: >-
                  A full-length PqqF-family M16 peptidase contains the catalytic
                  and substrate-enclosing regions in one polypeptide. Its exact
                  native PqqA-derived substrate state may remain unresolved.
                annotons:
                  - id: single_chain_pqqf_metalloendopeptidase
                    label: Single-chain PqqF metalloendopeptidase activity
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: single-chain PqqF M16 peptidase family
                        term:
                          id: InterPro:IPR011844
                          label: Coenzyme PQQ biosynthesis protein PqqF
                        representative_members:
                          - preferred_term: Structurally characterized PqqF (Serratia sp. FS14)
                            term:
                              id: UniProtKB:A0ACD6BAY6
                              label: Coenzyme PQQ synthesis protein F
                          - preferred_term: PqqF (Pseudomonas putida KT2440)
                            term:
                              id: UniProtKB:Q88QV3
                              label: Coenzyme PQQ synthesis protein F
                    function:
                      preferred_term: metalloendopeptidase activity
                      term:
                        id: GO:0004222
                        label: metalloendopeptidase activity
                      substrates:
                        - preferred_term: PqqA-derived peptide precursor
                      products:
                        - preferred_term: smaller PqqA-derived peptide intermediates
                      evidence:
                        - source_id: PDB:5CIO
                          statement: >-
                            The Serratia sp. FS14 PqqF structure is a
                            single-chain M16A-type clamshell protease.
                        - source_id: file:PSEPK/pqqF/pqqF-ai-review.yaml
                          statement: >-
                            The PSEPK pqqF review accepts GO:0004222 and
                            identifies InterPro IPR011844 as the
                            PQQ-synthesis PqqF family.
                    processes:
                      - preferred_term: pyrroloquinoline quinone biosynthetic process
                        term:
                          id: GO:0018189
                          label: pyrroloquinoline quinone biosynthetic process
                    role_description: >-
                      Provides the single-polypeptide PqqF implementation of
                      pathway-associated precursor proteolysis.
              - id: two_component_pqqfg_m16b_route
                label: Two-component PqqF/PqqG M16B protease route
                module_type: REACTION
                description: >-
                  Separate M16B PqqF and PqqG subunits assemble into a
                  heterodimeric protease that cleaves PqqA-derived peptide.
                annotons:
                  - id: pqqfg_m16b_metalloendopeptidase
                    label: PqqF/PqqG M16B metalloendopeptidase complex
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: PqqF/PqqG M16B protease complex
                        active_units:
                          - id: pqqf_m16b_catalytic_subunit
                            label: PqqF catalytic subunit
                            role: zinc-dependent catalytic M16B subunit
                            stoichiometry: "1"
                            participant:
                              selector_type: ORTHOLOG_OF
                              ortholog_of:
                                preferred_term: Methylorubrum extorquens AM1 PqqF
                                term:
                                  id: UniProtKB:C5AQL6
                                  label: Protease PqqF
                          - id: pqqg_m16b_partner_subunit
                            label: PqqG partner subunit
                            role: noncatalytic M16B complex partner
                            stoichiometry: "1"
                            participant:
                              selector_type: ORTHOLOG_OF
                              ortholog_of:
                                preferred_term: Methylorubrum extorquens AM1 PqqG
                                term:
                                  id: UniProtKB:C5AQL7
                                  label: Protease PqqG
                    function:
                      preferred_term: metalloendopeptidase activity
                      term:
                        id: GO:0004222
                        label: metalloendopeptidase activity
                      substrates:
                        - preferred_term: PqqA-derived peptide precursor
                      products:
                        - preferred_term: smaller PqqA-derived peptide intermediates
                      evidence:
                        - source_id: PMID:31427437
                          title: A two-component protease in Methylorubrum extorquens with high activity toward the peptide precursor of the redox cofactor pyrroloquinoline quinone.
                          supporting_text: demonstrated the formation of a complex PqqF/PqqG
                          statement: >-
                            Purified Methylorubrum PqqF and PqqG form the
                            biochemically characterized two-component M16B route.
                    processes:
                      - preferred_term: pyrroloquinoline quinone biosynthetic process
                        term:
                          id: GO:0018189
                          label: pyrroloquinoline quinone biosynthetic process
                    role_description: >-
                      Provides the split-subunit M16B implementation of
                      pathway-associated precursor proteolysis.
              - id: alternative_cellular_protease_route
                label: Alternative cellular-protease route
                module_type: BIOLOGICAL_PROCESS
                description: >-
                  In PQQ producers without PqqF, other cellular proteases must
                  provide the required precursor processing. This alternative
                  is represented by the required peptidase activity without
                  assigning an unsupported protein family.
                annotons:
                  - id: alternative_pqqa_peptidase
                    label: Alternative PqqA-pathway peptidase activity
                    participant:
                      selector_type: ANY_WITH_FUNCTION
                      required_function:
                        preferred_term: peptidase activity
                        term:
                          id: GO:0008233
                          label: peptidase activity
                    function:
                      preferred_term: peptidase activity
                      term:
                        id: GO:0008233
                        label: peptidase activity
                      substrates:
                        - preferred_term: PqqA-derived peptide precursor
                      products:
                        - preferred_term: smaller PqqA-derived peptide intermediates
                    processes:
                      - preferred_term: pyrroloquinoline quinone biosynthetic process
                        term:
                          id: GO:0018189
                          label: pyrroloquinoline quinone biosynthetic process
                    role_description: >-
                      Captures the required proteolysis atom when the responsible
                      pathway-specific protease family is unknown.
    - role: PqqB-dependent oxygenation
      node:
        id: pqqb_oxygenation
        label: PqqB-dependent precursor oxygenation
        module_type: REACTION
        description: >-
          PqqB is a metal-dependent hydroxylase implicated in oxygenation of a
          PqqA-derived pathway intermediate. The native substrate and product
          remain incompletely defined.
        annotons:
          - id: pqqb_hydroxylase
            label: PqqB oxygen-incorporating oxidoreductase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PqqB family
                term:
                  id: InterPro:IPR011842
                  label: Coenzyme PQQ biosynthesis protein B
                representative_members:
                  - preferred_term: PqqB (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QV5
                      label: Coenzyme PQQ synthesis protein B
            function:
              preferred_term: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
              term:
                id: GO:0016705
                label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
              substrates:
                - preferred_term: PqqA-derived PQQ-pathway intermediate
                - preferred_term: molecular oxygen
              products:
                - preferred_term: oxygenated PQQ-pathway intermediate
              evidence:
                - source_id: PMID:30811189
                  title: Discovery of Hydroxylase Activity for PqqB Provides a Missing Link in the Pyrroloquinoline Quinone Biosynthetic Pathway.
                  statement: >-
                    Biochemical and structural work identifies PqqB as a
                    non-heme hydroxylase in PQQ biosynthesis.
                - source_id: file:PSEPK/pqqB/pqqB-ai-review.yaml
                  statement: >-
                    The PSEPK pqqB review uses GO:0016705 as a broad inferred
                    activity while recording the missing target-specific
                    reaction definition.
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            role_description: >-
              Introduces oxygen-dependent chemistry required before terminal
              PqqC ring closure.
    - order: 5
      role: Terminal oxidative ring closure
      node:
        id: pqqc_ring_closure
        label: PqqC terminal PQQ formation
        module_type: REACTION
        description: >-
          PqqC catalyzes oxidative ring closure and multi-electron oxidation of
          the late quinoline precursor to mature PQQ.
        annotons:
          - id: pqqc_pqq_synthase
            label: Pyrroloquinoline-quinone synthase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PqqC-like family
                term:
                  id: InterPro:IPR011845
                  label: Coenzyme PQQ biosynthesis protein C
                representative_members:
                  - preferred_term: PqqC (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QV6
                      label: Pyrroloquinoline-quinone synthase
            function:
              preferred_term: pyrroloquinoline-quinone synthase activity
              term:
                id: GO:0033732
                label: pyrroloquinoline-quinone synthase activity
              substrates:
                - preferred_term: 6-(2-amino-2-carboxyethyl)-7,8-dioxo-1,2,3,4,7,8-hexahydroquinoline-2,4-dicarboxylate
                - preferred_term: molecular oxygen
              products:
                - preferred_term: pyrroloquinoline quinone
                - preferred_term: hydrogen peroxide
                - preferred_term: water
              evidence:
                - source_id: RHEA:10692
                  title: Pyrroloquinoline-quinone synthase reaction
                  statement: >-
                    Rhea 10692 defines the terminal oxygen-dependent formation
                    of PQQ and the reaction stoichiometry.
                - source_id: file:PSEPK/pqqC/pqqC-ai-review.yaml
                  statement: >-
                    The PSEPK pqqC review accepts GO:0033732 as the core
                    molecular function of Q88QV6.
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            role_description: Produces mature PQQ from the late pathway intermediate.
  connections:
    - source: pqqa_precursor_supply
      target: pqqde_crosslinking
      connection_type: PROVIDES_INPUT_FOR
      description: PqqA supplies the precursor peptide bound by PqqD and modified by PqqE.
    - source: pqqde_crosslinking
      target: pqqa_proteolysis
      connection_type: PROVIDES_INPUT_FOR
      description: A PqqA-derived precursor undergoes pathway-associated proteolytic processing.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        The exact modification state presented to each protease and the enzyme
        responsible in every organism are not fully resolved.
    - source: pqqde_crosslinking
      target: pqqb_oxygenation
      connection_type: PROVIDES_INPUT_FOR
      description: PqqB acts on an intermediate derived from cross-linked PqqA.
    - source: pqqa_proteolysis
      target: pqqc_ring_closure
      connection_type: PROVIDES_INPUT_FOR
      description: Proteolysis is required to generate the small-molecule precursor used late in the pathway.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        The exact order and substrate handoff among proteolysis, PqqB
        oxygenation, and PqqC are not fully resolved by the current evidence.
    - source: pqqb_oxygenation
      target: pqqc_ring_closure
      connection_type: PROVIDES_INPUT_FOR
      description: PqqB-dependent oxygenation contributes to formation of the late PqqC substrate.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        The native PqqB product has not been mapped unambiguously to the PqqC
        substrate in the current PSEPK evidence.
  knowledge_gaps:
    - gap_statement: >-
        The division of labor between multiple PqqD paralogs is not generally
        established and may differ among organisms.
      boundary: >-
        The module represents one PqqD-family peptide-chaperone role and uses
        the two KT2440 proteins only as representative members.
      gap_kind:
        - BIOLOGY
        - CURATION
      status: OPEN
      provenance:
        - reference_id: file:PSEPK/pqqD1/pqqD1-ai-review.yaml
          supporting_text: Are pqqD1 and pqqD2 functionally redundant in KT2440 PQQ biosynthesis, or do they support different PqqA/PqqE complexes or growth conditions?
    - gap_statement: >-
        The native PqqB substrate, product, and placement relative to
        proteolytic processing remain incompletely defined.
      boundary: >-
        The broad oxygen-incorporating oxidoreductase term and generic
        precursor names are retained pending a precise reaction definition.
      gap_kind:
        - BIOLOGY
        - ONTOLOGY
      status: OPEN
      provenance:
        - reference_id: PMID:30811189
          supporting_text: the precise nature and order of the remaining transformations in the pathway are unknown
    - gap_statement: >-
        The name PqqG covers non-equivalent pathway-associated proteins. The
        KT2440 candidate PP_0375 is an S9 serine peptidase co-transcribed with
        pqqCDE, whereas the biochemically characterized PqqF/PqqG complex in
        Methylorubrum uses an M16B partner. A close Pseudomonas aeruginosa
        ortholog is required for extracellular PQQ accumulation, while
        disruption of the B16 PqqM ortholog abolishes the reported PQQ signal
        in culture filtrate. Neither extracellular assay distinguishes failed
        biosynthesis from failed export. The substrate and whether these S9
        proteins act in precursor maturation, PQQ excretion, or both remain
        unknown.
      boundary: >-
        PP_0375 is tracked as a species-level pathway candidate but is not
        asserted as a required PqqF partner or assigned an unverified reaction.
        Organism-specific PqqG implementations can be added as proteolysis
        variants when their molecular roles are established.
      gap_kind:
        - BIOLOGY
        - CURATION
      status: OPEN
      provenance:
        - reference_id: file:PSEPK/PP_0375/PP_0375-bioinformatics/RESULTS.md
          supporting_text: It does not establish the native PP_0375 substrate or prove that this S9 peptidase directly processes PqqA.
        - reference_id: file:PSEPK/PP_0375/PP_0375-bioinformatics/RESULTS.md
          supporting_text: B16 full text names `pqqM` among 11 ORFs and states that "the Tn3-gusA insertions in each ORF abolished PQQ production"
        - reference_id: PMID:19902179
          supporting_text: Gene PA1990 of Pseudomonas aeruginosa, located downstream of pqqE and encoding a putative peptidase, was shown to be involved in excretion of PQQ into the culture supernatant.
