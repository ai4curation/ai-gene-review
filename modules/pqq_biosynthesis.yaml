id: MODULE:pqq_biosynthesis
title: Pyrroloquinoline quinone biosynthesis
description: >-
  A Pseudomonas putida KT2440 pyrroloquinoline quinone (PQQ) biosynthesis module
  grounded in UniPathway UPA00539. The strict pathway includes the ribosomally
  synthesized PqqA precursor peptide, PqqD-family peptide chaperones that
  present PqqA to PqqE, the radical-SAM PqqE cross-linking step, PqqF
  proteolytic processing, PqqB oxygenase/hydroxylase maturation chemistry, and
  the terminal PqqC oxidative ring-closure step that forms mature PQQ. Mature
  PQQ use by periplasmic quinoproteins is downstream utilization context and is
  not part of this biosynthetic module.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00539
    title: Pyrroloquinoline quinone biosynthesis
    statement: >-
      UniPathway UPA00539 supplies the compact local PQQ-biosynthesis member set:
      pqqE, pqqD1, pqqC, pqqB, pqqA, pqqF, and pqqD2.
  - source_id: GO:0018189
    title: pyrroloquinoline quinone biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      pyrroloquinoline quinone from a small peptide precursor.
  - source_id: file:PSEPK/pqqA/pqqA-ai-review.yaml
    title: Curated pqqA review
    statement: >-
      The pqqA review accepts PQQ biosynthesis for the precursor peptide and
      treats PqqA as the pathway substrate rather than a catalytic enzyme.
  - source_id: file:PSEPK/pqqD1/pqqD1-ai-review.yaml
    title: Curated pqqD1 review
    statement: >-
      The pqqD1 review accepts PQQ biosynthesis and marks generic quinone
      binding as over-annotated relative to the PqqA peptide-chaperone role.
  - source_id: file:PSEPK/pqqD2/pqqD2-ai-review.yaml
    title: Curated pqqD2 review
    statement: >-
      The pqqD2 review accepts PQQ biosynthesis and keeps the PqqD1/PqqD2
      division of labor as an open KT2440-specific question.
  - source_id: file:PSEPK/pqqE/pqqE-ai-review.yaml
    title: Curated pqqE review
    statement: >-
      The pqqE review accepts cyclase activity and PQQ biosynthesis for the
      radical-SAM PqqA Glu-Tyr cross-linking enzyme.
  - source_id: file:PSEPK/pqqF/pqqF-ai-review.yaml
    title: Curated pqqF review
    statement: >-
      The pqqF review accepts M16 metalloendopeptidase activity in PQQ
      biosynthesis and treats generic proteolysis and zinc binding as non-core
      context.
  - source_id: file:PSEPK/pqqB/pqqB-ai-review.yaml
    title: Curated pqqB review
    statement: >-
      The pqqB review accepts PQQ biosynthesis and proposes the oxygen-
      incorporating oxidoreductase activity as the best current molecular
      function for PqqB maturation chemistry.
  - source_id: file:PSEPK/pqqC/pqqC-ai-review.yaml
    title: Curated pqqC review
    statement: >-
      The pqqC review accepts pyrroloquinoline-quinone synthase activity and
      PQQ biosynthesis for the terminal oxidative ring-closure enzyme.
notes: >-
  First-pass interpretation: UPA00539 is a compact, satisfiable cofactor
  biosynthesis module in KT2440. The module deliberately excludes
  PQQ-dependent alcohol/glucose dehydrogenases and other quinoprotein
  utilization nodes. It also excludes a speculative pqqG part because the
  current UniProt/pathway metadata do not provide an unambiguous KT2440 pqqG
  gene product in the UPA00539 member set.
module:
  id: pqq_biosynthesis
  label: Pyrroloquinoline quinone biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyrroloquinoline quinone biosynthetic process
      term:
        id: GO:0018189
        label: pyrroloquinoline quinone biosynthetic process
      description: Biosynthesis of the peptide-derived redox cofactor PQQ.
    - preferred_term: cyclase activity
      term:
        id: GO:0009975
        label: cyclase activity
      description: Current GO molecular-function parent used for PqqE PqqA peptide cyclase activity.
    - preferred_term: metalloendopeptidase activity
      term:
        id: GO:0004222
        label: metalloendopeptidase activity
      description: Current GO molecular-function term for PqqF M16-family proteolytic processing.
    - preferred_term: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
      term:
        id: GO:0016705
        label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
      description: Broad current GO parent used for the inferred PqqB oxygenase/hydroxylase role.
    - preferred_term: pyrroloquinoline-quinone synthase activity
      term:
        id: GO:0033732
        label: pyrroloquinoline-quinone synthase activity
      description: PqqC terminal oxidative ring-closure activity.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: >-
          The PQQ precursor peptide and soluble biosynthetic enzymes are treated
          as cytoplasmic pathway components in the current gene reviews.
  parts:
    - order: 1
      role: Precursor peptide substrate
      node:
        id: pqqa_precursor_peptide
        label: PqqA precursor peptide
        module_type: REACTION
        description: >-
          PqqA is the short ribosomally synthesized peptide substrate whose
          conserved glutamate and tyrosine residues are transformed into the PQQ
          scaffold.
        annotons:
          - id: pqqA_precursor
            label: "pqqA: PQQ precursor peptide"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqA
                term:
                  id: UniProtKB:Q88QV4
                  label: Coenzyme PQQ synthesis protein A
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Supplies the Glu-Tyr precursor residues for mature PQQ.
    - order: 2
      role: PqqA peptide presentation
      node:
        id: pqqd_peptide_chaperones
        label: PqqD peptide chaperones
        module_type: REACTION
        description: >-
          PqqD-family proteins bind PqqA and present it to PqqE as part of the
          PqqA-PqqD-PqqE complex required for productive radical-SAM chemistry.
          KT2440 has two UPA00539 PqqD paralogs, pqqD1 and pqqD2.
        annotons:
          - id: pqqD1_peptide_chaperone
            label: "pqqD1: PqqA binding protein 1"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqD1
                term:
                  id: UniProtKB:Q88QV7
                  label: PqqA binding protein 1
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Presents PqqA to PqqE during early PQQ biosynthesis.
          - id: pqqD2_peptide_chaperone
            label: "pqqD2: PqqA binding protein 2"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqD2
                term:
                  id: UniProtKB:Q88JG8
                  label: PqqA binding protein 2
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Second KT2440 PqqD-family PqqA-presenting protein.
    - order: 3
      role: Radical-SAM PqqA cross-linking
      node:
        id: pqqe_glu_tyr_crosslinking
        label: PqqE PqqA peptide cyclase
        module_type: REACTION
        description: >-
          PqqE uses radical-SAM chemistry to form the first committed Glu-Tyr
          carbon-carbon cross-link in the PqqA precursor peptide.
        annotons:
          - id: pqqE_peptide_cyclase
            label: "pqqE: PqqA peptide cyclase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqE
                term:
                  id: UniProtKB:Q88QV8
                  label: PqqA peptide cyclase
            function:
              preferred_term: cyclase activity
              term:
                id: GO:0009975
                label: cyclase activity
              substrates:
                - preferred_term: PqqA precursor peptide
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: Glu-Tyr cross-linked PqqA precursor peptide
                - preferred_term: 5'-deoxyadenosine
                - preferred_term: L-methionine
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Initiating radical-SAM cross-linking step of PQQ biosynthesis.
    - order: 4
      role: PqqA proteolytic processing
      node:
        id: pqqf_peptide_processing
        label: PqqF precursor-peptide processing
        module_type: REACTION
        description: >-
          PqqF is a zinc-dependent M16-family metalloendopeptidase inferred to
          process the modified PqqA precursor, helping liberate the Glu/Tyr-
          derived intermediate for later maturation.
        annotons:
          - id: pqqF_metalloendopeptidase
            label: "pqqF: PqqA-processing metalloendopeptidase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqF
                term:
                  id: UniProtKB:Q88QV3
                  label: Coenzyme PQQ synthesis protein F
            function:
              preferred_term: metalloendopeptidase activity
              term:
                id: GO:0004222
                label: metalloendopeptidase activity
              substrates:
                - preferred_term: modified PqqA precursor peptide
              products:
                - preferred_term: PqqA-derived PQQ precursor intermediate
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Proteolytic processing of the PqqA-derived precursor.
    - order: 5
      role: Oxygenase/hydroxylase maturation
      node:
        id: pqqb_oxygenase_maturation
        label: PqqB oxygenase/hydroxylase maturation
        module_type: REACTION
        description: >-
          PqqB is a conserved PQQ-pathway metallo-beta-lactamase-fold protein
          curated as an inferred oxygen-incorporating oxidoreductase acting on a
          PqqA-derived intermediate.
        annotons:
          - id: pqqB_oxygenase
            label: "pqqB: PQQ-pathway oxygenase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqB
                term:
                  id: UniProtKB:Q88QV5
                  label: Coenzyme PQQ synthesis protein B
            function:
              preferred_term: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
              term:
                id: GO:0016705
                label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen
              substrates:
                - preferred_term: PqqA-derived PQQ precursor intermediate
                - preferred_term: molecular oxygen
              products:
                - preferred_term: hydroxylated PQQ precursor intermediate
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Inferred oxygen-insertion/hydroxylation step in PQQ maturation.
    - order: 6
      role: Terminal PQQ synthase reaction
      node:
        id: pqqc_terminal_synthase
        label: PqqC terminal PQQ synthase
        module_type: REACTION
        description: >-
          PqqC catalyzes terminal oxidative ring closure and multi-electron
          oxidation of the late AHQQ-like precursor to mature PQQ.
        annotons:
          - id: pqqC_pqq_synthase
            label: "pqqC: pyrroloquinoline-quinone synthase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pqqC
                term:
                  id: UniProtKB:Q88QV6
                  label: Pyrroloquinoline-quinone synthase
            function:
              preferred_term: pyrroloquinoline-quinone synthase activity
              term:
                id: GO:0033732
                label: pyrroloquinoline-quinone synthase activity
              substrates:
                - preferred_term: AHQQ-like late PQQ precursor
                - preferred_term: molecular oxygen
              products:
                - preferred_term: pyrroloquinoline quinone
                - preferred_term: hydrogen peroxide
                - preferred_term: water
            processes:
              - preferred_term: pyrroloquinoline quinone biosynthetic process
                term:
                  id: GO:0018189
                  label: pyrroloquinoline quinone biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Terminal formation of mature PQQ cofactor.
  connections:
    - source: pqqa_precursor_peptide
      target: pqqd_peptide_chaperones
      connection_type: PROVIDES_INPUT_FOR
      description: PqqA is the peptide substrate bound and presented by PqqD-family proteins.
    - source: pqqd_peptide_chaperones
      target: pqqe_glu_tyr_crosslinking
      connection_type: PROVIDES_INPUT_FOR
      description: PqqD-bound PqqA is presented to PqqE for radical-SAM cross-linking.
    - source: pqqe_glu_tyr_crosslinking
      target: pqqf_peptide_processing
      connection_type: PROVIDES_INPUT_FOR
      description: PqqE creates the cross-linked PqqA precursor that requires proteolytic processing.
    - source: pqqf_peptide_processing
      target: pqqb_oxygenase_maturation
      connection_type: PROVIDES_INPUT_FOR
      description: PqqF processing supplies the PqqA-derived precursor for PqqB maturation chemistry.
    - source: pqqb_oxygenase_maturation
      target: pqqc_terminal_synthase
      connection_type: PROVIDES_INPUT_FOR
      description: PqqB maturation feeds the late precursor converted to mature PQQ by PqqC.
  knowledge_gaps:
    - gap_statement: >-
        The functional division between KT2440 pqqD1 and pqqD2 is unresolved in
        the first-pass evidence.
      boundary: >-
        Both paralogs are retained as PqqD-family PQQ-biosynthesis components,
        but the module should not imply that both are experimentally proven to
        be equally required under all growth conditions.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        The exact KT2440 PqqB substrate and product are not directly established.
      boundary: >-
        The gene-level review uses a broad oxygen-incorporating
        oxidoreductase term by orthology and literature synthesis; a
        PqqB-specific hydroxylase term would require stronger reaction
        definition.
      gap_kind:
        - BIOLOGY
        - ONTOLOGY
    - gap_statement: >-
        PqqF proteolytic processing may require a PqqG-like partner in some
        bacteria, but no unambiguous KT2440 pqqG is present in the current
        UPA00539 member set.
      boundary: >-
        Do not curate PP_0382/davA as pqqG without independent identifier
        reconciliation. The current module includes only the seven UniPathway
        UPA00539 members.
      gap_kind:
        - BIOLOGY
        - CURATION
