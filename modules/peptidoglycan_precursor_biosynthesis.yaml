            role_description: Supplies the terminal dipeptide used by MurF.
    - order: 7
      role: UDP-MurNAc-pentapeptide formation
      node:
        id: murF_pentapeptide_ligation
        label: MurF pentapeptide ligation
        module_type: REACTION
        annotons:
          - id: murF_activity
            label: UDP-MurNAc-tripeptide-D-Ala-D-Ala ligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurF UDP-MurNAc-tripeptide-D-Ala-D-Ala ligases
                representative_members:
                  - preferred_term: PSEPK MurF
