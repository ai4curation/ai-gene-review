                      label: UDP-N-acetylmuramate dehydrogenase
            function:
              preferred_term: UDP-N-acetylmuramate dehydrogenase activity
              term:
                id: GO:0008762
                label: UDP-N-acetylmuramate dehydrogenase activity
              substrates:
                - preferred_term: UDP-N-acetylglucosamine enolpyruvate
                - preferred_term: NADPH
              products:
                - preferred_term: UDP-N-acetylmuramate
                - preferred_term: NADP+
              cofactors:
                - preferred_term: FAD
            role_description: Reduces the enolpyruvyl intermediate to UDP-MurNAc.
    - order: 3
      role: L-alanine addition
      node:
        id: murC_l_alanyl_ligation
        label: MurC L-alanine ligation
        module_type: REACTION
        annotons:
          - id: murC_activity
            label: UDP-N-acetylmuramate-L-alanine ligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurC UDP-N-acetylmuramate-L-alanine ligases
                representative_members:
                  - preferred_term: PSEPK MurC
                    term:
                      id: UniProtKB:Q88N75
                      label: UDP-N-acetylmuramate-L-alanine ligase
            function:
              preferred_term: UDP-N-acetylmuramate-L-alanine ligase activity
              term:
                id: GO:0008763
                label: UDP-N-acetylmuramate-L-alanine ligase activity
              substrates:
                - preferred_term: UDP-N-acetylmuramate
                - preferred_term: L-alanine
                - preferred_term: ATP
              products:
                - preferred_term: UDP-N-acetylmuramoyl-L-alanine
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: Adds the first stem-peptide amino acid.
    - order: 4
      role: D-glutamate addition
      node:
        id: murD_d_glutamyl_ligation
        label: MurD D-glutamate ligation
        module_type: REACTION
        annotons:
          - id: murD_activity
            label: UDP-N-acetylmuramoylalanine-D-glutamate ligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurD UDP-MurNAc-L-Ala-D-Glu ligases
                representative_members:
                  - preferred_term: PSEPK MurD
                    term:
                      id: UniProtKB:Q88N78
                      label: UDP-N-acetylmuramoylalanine-D-glutamate ligase
            function:
              preferred_term: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
              term:
                id: GO:0008764
                label: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
              substrates:
                - preferred_term: UDP-N-acetylmuramoyl-L-alanine
                - preferred_term: D-glutamate
                - preferred_term: ATP
              products:
                - preferred_term: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: Adds D-glutamate to the growing stem peptide.
    - order: 5
      role: third stem-residue addition
      node:
        id: murE_third_residue_ligation
        label: MurE third stem-residue ligation
        module_type: REACTION
        variant_sets:
          - id: murE_third_residue
            label: MurE third-residue specificity
            axis: third stem-peptide amino acid
            selection: EXACTLY_ONE
            variants:
              - id: murE_dap_variant
                label: meso-diaminopimelate-adding MurE
                module_type: REACTION
                annotons:
                  - id: murE_dap_activity
