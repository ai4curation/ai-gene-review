                    function:
                      preferred_term: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate-L-lysine ligase activity
                      term:
                        id: GO:0047482
                        label: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate-L-lysine ligase activity
                      substrates:
                        - preferred_term: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate
