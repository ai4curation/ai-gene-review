            label: UDP-N-acetylglucosamine 1-carboxyvinyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurA UDP-N-acetylglucosamine 1-carboxyvinyltransferases
                representative_members:
                  - preferred_term: PSEPK MurA
                    term:
                      id: UniProtKB:Q88P88
                      label: UDP-N-acetylglucosamine 1-carboxyvinyltransferase
            function:
              preferred_term: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
              term:
                id: GO:0008760
                label: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
              substrates:
                - preferred_term: UDP-N-acetylglucosamine
                - preferred_term: phosphoenolpyruvate
              products:
                - preferred_term: UDP-N-acetylglucosamine enolpyruvate
                - preferred_term: phosphate
            role_description: Commits UDP-GlcNAc to MurNAc precursor synthesis.
    - order: 2
      role: UDP-MurNAc formation
      node:
        id: murB_reduction
        label: MurB UDP-MurNAc formation
        module_type: REACTION
        annotons:
          - id: murB_activity
            label: UDP-N-acetylmuramate dehydrogenase
            participant:
              selector_type: FAMILY
