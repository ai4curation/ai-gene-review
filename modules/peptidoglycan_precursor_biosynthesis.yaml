              family:
                preferred_term: MraY phospho-MurNAc-pentapeptide transferases
                representative_members:
                  - preferred_term: PSEPK MraY
                    term:
                      id: UniProtKB:Q88N79
                      label: Phospho-N-acetylmuramoyl-pentapeptide-transferase
            function:
              preferred_term: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
              term:
                id: GO:0008963
                label: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
              substrates:
                - preferred_term: UDP-N-acetylmuramoyl-pentapeptide
                - preferred_term: undecaprenyl phosphate
              products:
