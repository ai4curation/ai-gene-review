id: MODULE:peptidoglycan_precursor_biosynthesis
title: Peptidoglycan precursor biosynthesis and lipid II export
description: >-
  A reusable bacterial pathway that converts UDP-N-acetylglucosamine to
  UDP-MurNAc-pentapeptide, transfers that nucleotide precursor to the
  undecaprenyl carrier to form lipid I, glycosylates lipid I to form lipid II,
  and translocates lipid II across the cytoplasmic membrane. D-Ala-D-Ala
  synthesis is modeled as a convergent input to MurF, and alternative MurE
  branches represent meso-diaminopimelate- and L-lysine-containing stem
  peptides. The module ends at lipid II export and does not include glycan
  polymerization, peptide cross-linking, carrier recycling, or cell-wall
  remodeling.
status: DRAFT
evidence:
  - source_id: GO:0009252
    title: peptidoglycan biosynthetic process
    statement: >-
      GO:0009252 supplies the biological-process scope for nucleotide,
      lipid-linked, and exported peptidoglycan precursor formation.
  - source_id: file:modules/peptidoglycan_precursor_biosynthesis-deep-research-openscientist.md
    title: OpenScientist research for the reusable peptidoglycan precursor module
    statement: >-
      The module-level review supports the ordered MurA-to-MurJ pathway,
      convergent D-Ala-D-Ala input, third-residue variation, and the boundary
      before glycan polymerization and peptide cross-linking.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__peptidoglycan_precursor_biosynthesis__ppu00550-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00550 pathway satisfiability review
    statement: >-
      The species-aware review finds all precursor and lipid II export steps
      covered, identifies MurJ as a transporter omitted by the KEGG candidate
      bucket, and distinguishes Ddl paralogs from upstream amino-acid supply.
  - source_id: file:PSEPK/murA/murA-ai-review.yaml
    title: PSEPK murA gene review
    statement: >-
      UniProt identifies Q88P88 as the UDP-N-acetylglucosamine
      1-carboxyvinyltransferase that starts MurNAc precursor synthesis.
  - source_id: file:PSEPK/mraY/mraY-ai-review.yaml
    title: PSEPK mraY gene review
    statement: >-
      The KT2440 review identifies Q88N79 as the membrane phosphotransferase
      that forms lipid I from UDP-MurNAc-pentapeptide.
  - source_id: file:PSEPK/murJ/murJ-ai-review.yaml
    title: PSEPK murJ gene review
    statement: >-
      UniProt identifies Q88Q94 as the lipid II flippase that connects
      cytoplasmic precursor synthesis to periplasmic assembly.
module:
  id: peptidoglycan_precursor_biosynthesis
  label: Peptidoglycan precursor biosynthesis and lipid II export
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: >-
        Assembly of the lipid II peptidoglycan precursor and its delivery to
        the outer leaflet of the bacterial cytoplasmic membrane.
  parts:
    - order: 1
      role: enolpyruvyl transfer to UDP-GlcNAc
      node:
        id: murA_enolpyruvyl_transfer
        label: MurA enolpyruvyl transfer
        module_type: REACTION
        annotons:
