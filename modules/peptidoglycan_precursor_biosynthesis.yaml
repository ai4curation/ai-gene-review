    - order: 6
      role: D-Ala-D-Ala synthesis
      node:
        id: ddl_dipeptide_synthesis
        label: D-Ala-D-Ala synthesis
        module_type: REACTION
        annotons:
          - id: ddl_activity
            label: D-alanine-D-alanine ligase
            participant:
