                label: UDP-N-acetylmuramoyl-tripeptide-D-alanyl-D-alanine ligase activity
              substrates:
                - preferred_term: UDP-N-acetylmuramoyl-tripeptide
                - preferred_term: D-alanyl-D-alanine
                - preferred_term: ATP
              products:
                - preferred_term: UDP-N-acetylmuramoyl-pentapeptide
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: Joins the tripeptide and D-Ala-D-Ala branches.
    - order: 8
      role: lipid I formation
      node:
        id: mraY_lipid_i_synthesis
        label: MraY lipid I synthesis
        module_type: REACTION
        annotons:
