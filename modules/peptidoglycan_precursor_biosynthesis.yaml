                        - preferred_term: phosphate
                    role_description: Forms a meso-diaminopimelate-containing tripeptide.
              - id: murE_lysine_variant
                label: L-lysine-adding MurE
                module_type: REACTION
                annotons:
                  - id: murE_lysine_activity
                    label: MurE L-lysine ligase
                    participant:
