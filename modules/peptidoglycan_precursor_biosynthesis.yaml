                              label: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate--2,6-diaminopimelate ligase
                    function:
                      preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
                      term:
                        id: GO:0008765
                        label: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
                      substrates:
                        - preferred_term: UDP-N-acetylmuramoyl-L-alanyl-D-glutamate
                        - preferred_term: meso-diaminopimelate
                        - preferred_term: ATP
                      products:
                        - preferred_term: UDP-N-acetylmuramoyl-L-alanyl-D-glutamyl-meso-diaminopimelate
