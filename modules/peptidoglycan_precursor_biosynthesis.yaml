      role: lipid II formation
      node:
        id: murG_lipid_ii_synthesis
        label: MurG lipid II synthesis
        module_type: REACTION
        annotons:
          - id: murG_activity
            label: Lipid I N-acetylglucosaminyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurG lipid I N-acetylglucosaminyltransferases
                representative_members:
                  - preferred_term: PSEPK MurG
                    term:
                      id: UniProtKB:Q88N76
                      label: UDP-N-acetylglucosamine--N-acetylmuramyl-pentapeptide transferase
            function:
              preferred_term: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
              term:
                id: GO:0050511
                label: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
              substrates:
                - preferred_term: lipid I
                - preferred_term: UDP-N-acetylglucosamine
              products:
                - preferred_term: lipid II
                - preferred_term: UDP
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Adds GlcNAc to lipid I to generate lipid II.
    - order: 10
      role: lipid II translocation
      node:
        id: murJ_lipid_ii_export
        label: MurJ lipid II export
        module_type: TRANSPORT_STEP
        annotons:
          - id: murJ_activity
            label: Lipid-linked peptidoglycan transporter
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MurJ/MviN lipid II flippases
                representative_members:
                  - preferred_term: PSEPK MurJ
                    term:
                      id: UniProtKB:Q88Q94
                      label: Lipid II flippase MurJ
            function:
              preferred_term: lipid-linked peptidoglycan transporter activity
              term:
                id: GO:0015648
                label: lipid-linked peptidoglycan transporter activity
              substrates:
                - preferred_term: lipid II on the cytoplasmic membrane leaflet
              products:
                - preferred_term: lipid II on the periplasmic membrane leaflet
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Exports lipid II for periplasmic polymerization.
  connections:
    - source: murA_enolpyruvyl_transfer
      target: murB_reduction
      connection_type: PROVIDES_INPUT_FOR
      description: MurA produces the enolpyruvyl substrate reduced by MurB.
    - source: murB_reduction
      target: murC_l_alanyl_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: MurB produces UDP-MurNAc for MurC.
    - source: murC_l_alanyl_ligation
      target: murD_d_glutamyl_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: MurC produces the mono-amino-acid precursor for MurD.
    - source: murD_d_glutamyl_ligation
      target: murE_third_residue_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: MurD produces the dipeptide precursor for MurE.
    - source: murE_third_residue_ligation
      target: murF_pentapeptide_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: MurE supplies UDP-MurNAc-tripeptide to MurF.
    - source: ddl_dipeptide_synthesis
      target: murF_pentapeptide_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: Ddl supplies the D-Ala-D-Ala substrate to MurF.
    - source: murF_pentapeptide_ligation
      target: mraY_lipid_i_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: MurF produces UDP-MurNAc-pentapeptide for MraY.
    - source: mraY_lipid_i_synthesis
      target: murG_lipid_ii_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: MraY produces lipid I for MurG.
    - source: murG_lipid_ii_synthesis
      target: murJ_lipid_ii_export
      connection_type: PROVIDES_INPUT_FOR
      description: MurG produces lipid II for MurJ-mediated export.
  notes: >-
    The module is taxon-neutral but uses exact KT2440 and reviewed
    Staphylococcus accessions as representative members. MurF, MraY, and MurG
    use pentapeptide-generic molecular functions here so the module remains
    valid downstream of either the DAP- or L-lysine-specific MurE branch;
    species-level gene reviews may use the corresponding stem-specific child
    terms. The module intentionally excludes amino-acid precursor supply, the
    undecaprenyl carrier cycle, SEDS/PBP polymerization, and peptidoglycan
    remodeling so those systems can be curated as separate reusable modules.
