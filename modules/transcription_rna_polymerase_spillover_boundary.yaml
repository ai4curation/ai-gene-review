id: MODULE:transcription_rna_polymerase_spillover_boundary
title: Transcription and RNA-polymerase spillover boundary
description: Boundary module for PSEPK genes that entered the translation/RNA-processing bucket through broad RNA,
  transcription, or RNA-polymerase keywords but function in transcription termination, antitermination, sigma-factor
  initiation, RNA polymerase regulation, or RNA polymerase-like catalysis.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_transcription_rna_polymerase_spillovers.tsv
  title: PSEPK translation/RNA transcription spillover split
  statement: The batch records nusB, rapA, PP_2266, PP_4553, dksA, and nusA as transcription/RNA-polymerase spillovers
    from the translation/RNA-processing umbrella.
- source_id: file:PSEPK/nusB/nusB-ai-review.yaml
  title: Curated nusB review
  statement: nusB encodes the NusB transcription antitermination factor in Pseudomonas putida KT2440. It is a soluble
    RNA-binding transcription factor for ribosomal RNA operon antitermination, not a translation factor.
- source_id: file:PSEPK/rapA/rapA-ai-review.yaml
  title: Curated rapA review
  statement: rapA encodes an RNA polymerase-associated Swi2/Snf2-family ATPase that stimulates RNA polymerase recycling
    and transcription regulation under stress conditions. Its translation/RNA-processing bucket placement reflects
    broad nucleic-acid/transcription keywords rather than a translation role.
- source_id: file:PSEPK/PP_2266/PP_2266-ai-review.yaml
  title: Curated PP_2266 review
  statement: PP_2266 encodes a predicted DNA-directed RNA polymerase-like protein with RNA polymerase domain evidence.
    This first pass routes it to RNA polymerase/transcription context while leaving its relationship to the compact
    canonical rpoA/rpoB/rpoC/rpoZ core unresolved.
- source_id: file:PSEPK/PP_4553/PP_4553-ai-review.yaml
  title: Curated PP_4553 review
  statement: PP_4553 encodes a predicted extracytoplasmic-function sigma-70 family factor. Its supported role is
    sigma factor activity in transcription initiation, not DNA-directed RNA polymerase catalysis or translation.
- source_id: file:PSEPK/dksA/dksA-ai-review.yaml
  title: Curated dksA review
  statement: dksA encodes an RNA polymerase-binding DksA transcription factor. The supported function is zinc-coordinated
    transcription regulation through direct RNAP binding, with cytoplasmic localization.
- source_id: file:PSEPK/nusA/nusA-ai-review.yaml
  title: Curated nusA review
  statement: nusA encodes the NusA transcription termination/antitermination factor in Pseudomonas putida KT2440.
    It binds RNA and RNA polymerase during elongating transcription complexes, supporting termination and antitermination
    rather than translation or ribosome assembly.
