notes: This boundary module was created from the ppu02010 ABC-transporter partition work. The module should remain distinct from glycerophospholipid biosynthesis modules, which describe phospholipid synthesis and turnover rather than Mla/Ttg2 envelope transport and lipid-asymmetry maintenance. The later cell-envelope/division partition added vacJ as a MlaA/VacJ-family lipoprotein singleton; keep its location conservative as generic membrane until direct localization evidence supports a more specific GO cellular component.
