id: MODULE:mla_phospholipid_transport_boundary
title: Mla/Ttg2 phospholipid transport and outer-membrane lipid asymmetry boundary
description: Boundary module for the Pseudomonas putida KT2440 PP_0958-PP_0962 Mla/Ttg2 locus from the broad KEGG ppu02010 ABC-transporter map. MlaF, MlaE, and MlaD form the supported MlaFEDB phospholipid transport system; Ttg2D is a periplasmic MlaC-family phospholipid binding protein with protein-level structural evidence; and Ttg2E is a neighboring STAS-domain accessory candidate whose direct role is unresolved.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes the PP_0958-PP_0962 mlaF/mlaE/mlaD/ttg2D/ttg2E locus as a coherent Mla/Ttg2 phospholipid-transport sub-batch within the broad ABC-transporter umbrella map.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records cluster C20 as mlaF, mlaE, mlaD, ttg2D, and ttg2E after first-pass curation.
- source_id: file:projects/P_PUTIDA/batches/module_cell_envelope_division_vacj_phospholipid_asymmetry_context.tsv
  title: PSEPK cell-envelope/division VacJ phospholipid-asymmetry singleton
  statement: The cell-envelope/division partition added vacJ as a MlaA/VacJ-family lipoprotein singleton for outer-membrane lipid-asymmetry context.
- source_id: UniProtKB:Q88P94
  title: MlaF intermembrane phospholipid transport ATP-binding protein
  statement: UniProt names MlaF as the ATP-binding protein of MlaFEDB and describes the complex as a phospholipid transport pathway for retrograde trafficking from the outer membrane to the inner membrane.
- source_id: UniProtKB:Q88P93
  title: MlaE intermembrane phospholipid transport permease
  statement: UniProt names MlaE as the permease protein of MlaFEDB, places it in the cell inner membrane, and describes it as probably responsible for substrate translocation across the membrane.
- source_id: UniProtKB:Q88P92
  title: MlaD phospholipid ABC transporter binding protein
  statement: UniProt and domain annotations name MlaD as a phospholipid ABC transporter binding protein with Mce/MlaD and MlaD phospholipid transporter domains.
- source_id: UniProtKB:Q88P91
  title: Ttg2D MlaC/Ttg2D-family protein
  statement: UniProt records Ttg2D as a protein-level, signal-peptide-containing MlaC/ttg2D-family protein with structural evidence from lipid transport system studies.
- source_id: UniProtKB:Q88P90
  title: Ttg2E STAS-domain protein
  statement: UniProt records Ttg2E as a small predicted STAS-domain protein; the current first-pass evidence does not establish its direct molecular role.
- source_id: file:PSEPK/vacJ/vacJ-ai-review.yaml
  title: PSEPK vacJ gene review
  statement: The curated vacJ review supports VacJ as a MlaA-family lipoprotein involved in intermembrane phospholipid transfer.
