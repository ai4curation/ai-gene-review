id: MODULE:taurine_hypotaurine_metabolism_boundary
title: Taurine and hypotaurine metabolism boundary
description: >-
  Boundary module for KEGG ppu00430 in Pseudomonas putida KT2440. The
  organism-specific map contains TauD/AtsK, a directly supported
  alpha-ketoglutarate-dependent taurine dioxygenase, plus acetate, glutamate,
  and glutathione metabolism side nodes. This module records the supported
  taurine/sulfonate catabolic step while keeping phosphate acetyltransferase,
  glutamate dehydrogenase, and glutathione hydrolases as boundary context.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00430
    title: Taurine and hypotaurine metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00430 provides the PSEPK curation batch. Its membership combines
      TauD taurine dioxygenase with acetate, glutamate, and glutathione
      metabolism enzymes.
  - source_id: PMID:22221834
    title: The Fe(II)/alpha-ketoglutarate-dependent taurine dioxygenases from Pseudomonas putida and Escherichia coli are tetramers
    statement: >-
      The KT2440 TauD paper supports the direct taurine dioxygenase assignment
      and tetrameric self-association of TauD(Pp).
  - source_id: GO:0044273
    title: sulfur compound catabolic process
    statement: >-
      TauD releases sulfite from taurine, supporting sulfur compound catabolism.
module:
  id: taurine_hypotaurine_metabolism_boundary
  label: Taurine and hypotaurine metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: taurine dioxygenase activity
      term:
        id: GO:0000908
        label: taurine dioxygenase activity
      description: Alpha-ketoglutarate-dependent dioxygenation of taurine.
    - preferred_term: sulfur compound catabolic process
      term:
        id: GO:0044273
        label: sulfur compound catabolic process
      description: Catabolism of organosulfonate sulfur to sulfite.
    - preferred_term: taurine and hypotaurine metabolism boundary
      description: >-
        A KEGG-map boundary interpretation that separates the supported TauD
        taurine catabolic step from acetate, glutamate, and glutathione side
        metabolism.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: TauD, Pta, and GdhB are soluble cytoplasmic enzymes; the glutathione hydrolases are retained as sulfur-metabolism boundary context.
  parts:
    - order: 1
      role: Taurine dioxygenation
      node:
        id: taurine_dioxygenation
        label: Taurine to aminoacetaldehyde and sulfite
        module_type: REACTION
        description: >-
          TauD/AtsK catalyzes alpha-ketoglutarate-dependent hydroxylation of
          taurine, yielding sulfite and aminoacetaldehyde.
        annotons:
          - id: tauD_taurine_dioxygenase
            label: "tauD: taurine dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tauD
            function:
              preferred_term: taurine dioxygenase activity
              term:
                id: GO:0000908
                label: taurine dioxygenase activity
              substrates:
                - preferred_term: taurine
                - preferred_term: 2-oxoglutarate
                - preferred_term: O2
              products:
                - preferred_term: aminoacetaldehyde
                - preferred_term: sulfite
                - preferred_term: succinate
                - preferred_term: CO2
            role_description: Directly supported core taurine/sulfonate catabolic enzyme for ppu00430.
    - order: 2
      role: Acetate and glutamate side context
      node:
        id: acetate_glutamate_side_context
        label: Pta/GdhB side context
        module_type: METABOLIC_PATHWAY
        description: >-
          Pta and GdhB are included by the broad KEGG map but their curated core
          roles are acetyl-CoA/acetyl-phosphate metabolism and glutamate
          dehydrogenase nitrogen-carbon metabolism.
        annotons:
          - id: pta_phosphate_acetyltransferase_context
            label: "pta: phosphate acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pta
            function:
              preferred_term: phosphate acetyltransferase activity
              term:
                id: GO:0008959
                label: phosphate acetyltransferase activity
            role_description: Acetate/acetyl-CoA side node, not a taurine-specific enzyme.
          - id: gdhB_glutamate_dehydrogenase_context
            label: "gdhB: NAD-specific glutamate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gdhB
            function:
              preferred_term: L-glutamate dehydrogenase (NAD+) activity
              term:
                id: GO:0004352
                label: L-glutamate dehydrogenase (NAD+) activity
            role_description: Glutamate/2-oxoglutarate nitrogen-carbon side node in the broad taurine map.
    - order: 3
      role: Glutathione sulfur-metabolism side context
      node:
        id: glutathione_hydrolase_side_context
        label: GGT-family glutathione hydrolase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_3535 and ggt are gamma-glutamyltransferase-family glutathione
          hydrolases. They are relevant to sulfur/glutathione metabolism but not
          direct taurine dioxygenation.
        annotons:
          - id: PP_3535_glutathione_hydrolase
            label: "PP_3535: glutathione hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3535
            function:
              preferred_term: glutathione hydrolase activity
              term:
                id: GO:0036374
                label: glutathione hydrolase activity
            role_description: Glutathione catabolism side context in the broad taurine/hypotaurine map.
          - id: ggt_glutathione_hydrolase
            label: "ggt: glutathione hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ggt
            function:
              preferred_term: glutathione hydrolase activity
              term:
                id: GO:0036374
                label: glutathione hydrolase activity
            role_description: Glutathione catabolism side context in the broad taurine/hypotaurine map.
  notes: >-
    TauD is the pathway-defining ppu00430 enzyme in KT2440. Pta, GdhB, PP_3535,
    and ggt are retained as broad-map boundary context and should not be used to
    infer a complete dedicated taurine/hypotaurine pathway beyond the TauD
    desulfonation step without additional substrate-specific evidence.
