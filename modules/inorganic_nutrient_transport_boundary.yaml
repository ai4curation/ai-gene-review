id: MODULE:inorganic_nutrient_transport_boundary
title: Inorganic nutrient transport boundary
description: Boundary module for PSEPK SulP/CysZ sulfate or organosulfate transporters, phosphate transport/accessory proteins,
  molybdate-responsive regulation, nitrate-binding side context, and low-confidence nitrite-name-only context.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_inorganic_nutrient_transporters.tsv
  title: PSEPK inorganic nutrient transporter batch
  statement: The batch table records 13 PSEPK transport-bucket genes assigned to phosphate, sulfate, molybdate, nitrate/nitrite,
    and related inorganic nutrient context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_partition.tsv
  title: PSEPK transport/membrane/efflux partition
  statement: The parent transport partition separates this inorganic-nutrient panel from ion/metal, ABC, MFS/DMT, amino-acid/amine,
    organic-acid, carbohydrate/nucleoside, redox, and low-information membrane buckets.
notes: 'First-pass interpretation: keep CysZ/Pit/YjbB transport calls where GOA and domains agree, add conservative cached
  sulfate or phosphate process terms for low-resolution SulP/Pi candidates, keep ModR/PhoU/NasS as regulatory or accessory
  side context, and leave PP_5475 unresolved.'
