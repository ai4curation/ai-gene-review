id: MODULE:bacterial_chaperone_protein_folding_boundary
title: Bacterial chaperone and protein-folding boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 chaperone, holdase, foldase,
  and co-chaperone split from the protein folding/targeting/turnover functional
  bucket. The module records validated bacterial proteostasis roles and keeps
  low-information or side-context candidates separate from the stronger
  protein-folding assignments.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was partitioned into nine curation-scale splits; this
      module covers the chaperone_folding_holdase_foldase split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_chaperone_folding_holdase_foldase.tsv
    title: PSEPK chaperone, holdase, and foldase split
    statement: >-
      The batch table assigns hslO, surA, clpB, slyD, hscB, hscA, groES,
      PP_1548, cspA-II, PP_3316, grpE, cbpM, and cbpA to this first-pass split.
  - source_id: file:PSEPK/hslO/hslO-ai-review.yaml
    title: Curated hslO review
    statement: >-
      The hslO review accepts cytoplasmic redox-regulated chaperone activity,
      protein refolding, and unfolded protein binding.
  - source_id: file:PSEPK/surA/surA-ai-review.yaml
    title: Curated surA review
    statement: >-
      The surA review records periplasmic outer-membrane-protein chaperone
      activity and peptidyl-prolyl cis-trans isomerase activity.
  - source_id: file:PSEPK/clpB/clpB-ai-review.yaml
    title: Curated clpB review
    statement: >-
      The clpB review records an ATP-dependent cytoplasmic disaggregase with
      protein-refolding and misfolded-protein-binding roles.
  - source_id: file:PSEPK/hscA/hscA-ai-review.yaml
    title: Curated hscA review
    statement: >-
      The hscA review records ATP hydrolysis and chaperone activity in
      iron-sulfur cluster assembly.
  - source_id: file:PSEPK/hscB/hscB-ai-review.yaml
    title: Curated hscB review
    statement: >-
      The hscB review records co-chaperone ATPase-activator and chaperone-binding
      roles in iron-sulfur cluster assembly.
notes: >-
  First-pass interpretation: this is a bacterial proteostasis/folding boundary,
  not a eukaryotic ER protein-processing or integrated-stress-response pathway.
  PP_1548 is retained as an unresolved DjlA_N/TerB-like candidate with no core
  function. cspA-II is retained as nucleic-acid cold-shock chaperone side
  context, not promoted to a protein-folding role.
module:
  id: bacterial_chaperone_protein_folding_boundary
  label: Bacterial chaperone and protein-folding boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: protein folding
      term:
        id: GO:0006457
        label: protein folding
      description: General bacterial client-protein folding and chaperone process context.
    - preferred_term: protein refolding
      term:
        id: GO:0042026
        label: protein refolding
      description: Recovery of non-native or aggregated proteins by chaperone systems.
    - preferred_term: unfolded protein binding
      term:
        id: GO:0051082
        label: unfolded protein binding
      description: Client-binding activity used by holdase and chaperone annotons in this split.
    - preferred_term: protein-folding chaperone binding
      term:
        id: GO:0051087
        label: protein-folding chaperone binding
      description: Co-chaperone interaction activity used for HscB, GrpE, and CbpM-type roles.
    - preferred_term: iron-sulfur cluster assembly
      term:
        id: GO:0016226
        label: iron-sulfur cluster assembly
      description: Fe-S cluster maturation context for the HscA/HscB chaperone pair.
    - preferred_term: peptidyl-prolyl cis-trans isomerase activity
      term:
        id: GO:0003755
        label: peptidyl-prolyl cis-trans isomerase activity
      description: Foldase/rotamase activity for SurA and SlyD-family proteins.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Primary location for soluble bacterial Hsp33, ClpB/Hsp100, HscAB, GroES, GrpE, CbpA, and CbpM functions.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: More specific soluble location used by several PSEPK GOA records in this split.
      - preferred_term: outer membrane-bounded periplasmic space
        term:
          id: GO:0030288
          label: outer membrane-bounded periplasmic space
        description: Gram-negative periplasmic location for SurA outer-membrane-protein folding.
  parts:
    - order: 1
      role: redox and aggregate-refolding chaperones
      node:
        id: redox_aggregate_refolding_chaperones
        label: Redox and aggregate-refolding chaperones
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Cytoplasmic holdase and Hsp100-like factors that bind non-native or
          aggregated client proteins and support refolding or heat-stress recovery.
        annotons:
          - id: hslo_redox_holdase
            label: "hslO: redox-regulated holdase chaperone"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hslO
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
            processes:
              - preferred_term: protein refolding
                term:
                  id: GO:0042026
                  label: protein refolding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Redox-regulated Hsp33-family holdase that protects unfolded or damaged proteins from aggregation.
          - id: clpb_disaggregase
            label: "clpB: ATP-dependent protein disaggregase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: clpB
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            processes:
              - preferred_term: protein refolding
                term:
                  id: GO:0042026
                  label: protein refolding
              - preferred_term: cellular response to heat
                term:
                  id: GO:0034605
                  label: cellular response to heat
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Hsp100/ClpB AAA+ ATPase that powers extraction and refolding of aggregated proteins with the DnaK system.
          - id: pp3316_clpab_like_atpase
            label: "PP_3316: ClpA/B-like chaperone-associated ATPase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3316
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            processes:
              - preferred_term: cellular response to heat
                term:
                  id: GO:0034605
                  label: cellular response to heat
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: ClpA/B-like AAA+ ATPase candidate retained as chaperone-associated heat-stress context.
    - order: 2
      role: periplasmic and cytoplasmic foldases
      node:
        id: periplasmic_cytoplasmic_foldases
        label: Periplasmic and cytoplasmic foldases
        module_type: MOLECULAR_FUNCTION
        description: >-
          PPIase/foldase activities that assist outer-membrane-protein folding
          or cytoplasmic protein refolding while retaining conservative process
          scope.
        annotons:
          - id: sura_omp_foldase
            label: "surA: periplasmic OMP chaperone/foldase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: surA
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
            processes:
              - preferred_term: Gram-negative-bacterium-type cell outer membrane assembly
                term:
                  id: GO:0043165
                  label: Gram-negative-bacterium-type cell outer membrane assembly
            locations:
              - preferred_term: outer membrane-bounded periplasmic space
                term:
                  id: GO:0030288
                  label: outer membrane-bounded periplasmic space
            role_description: Periplasmic SurA chaperone that escorts unfolded outer membrane proteins to the assembly pathway.
          - id: slyd_ppiase_refolding
            label: "slyD: cytoplasmic peptidyl-prolyl isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: slyD
