                id: GO:0003755
                label: peptidyl-prolyl cis-trans isomerase activity
            processes:
              - preferred_term: protein refolding
                term:
                  id: GO:0042026
                  label: protein refolding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: FKBP-type PPIase with chaperone/refolding context and separate hydrogenase-maturation context left unresolved.
    - order: 3
      role: iron-sulfur cluster maturation chaperones
      node:
        id: hscab_fe_s_maturation_chaperone_pair
        label: HscA/HscB Fe-S maturation chaperone pair
        module_type: BIOLOGICAL_PROCESS
        description: HscA and HscB form a dedicated chaperone/co-chaperone pair for iron-sulfur cluster protein maturation.
        annotons:
          - id: hsca_fe_s_chaperone_atpase
