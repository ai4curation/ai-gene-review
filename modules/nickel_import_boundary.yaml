notes: >-
  This boundary module was created from the ppu02010 ABC-transporter partition
  work. NikABCDE should remain separate from peptide/dipeptide transporter
  modules unless experiments show that the KT2440 system imports nickel-peptide
  complexes. Current curation treats heme and dipeptide annotations on the locus
  as family-transfer spillovers and keeps the unresolved substrate-range question
  explicit.
