id: MODULE:nickel_import_boundary
title: Nickel import boundary
description: >-
  Boundary module for the PP_3342-PP_3346 NikABCDE nickel ABC importer from
  the KEGG ppu02010 ABC transporter umbrella map in Pseudomonas putida KT2440.
  NikA is the predicted periplasmic nickel-binding component, NikB and NikC are
  the inner-membrane permeases, and NikD and NikE are the ATP-binding
  energy-coupling subunits. This module keeps the nickel-import locus separate
  from generic peptide/dipeptide ABC transport and from other metal-acquisition
  systems until substrate range is experimentally resolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_3342-PP_3346 NikABCDE nickel ABC
      transporter sub-batch. This is a coherent transport partition of the broad
      ABC transporter map, not evidence that ppu02010 is one satisfiable
      pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records the C46 PP_3342-PP_3346 nikA-nikE
      cluster after first-pass curation.
  - source_id: UniProtKB:Q88HL4
    title: NikA nickel ABC transporter periplasmic binding protein
    statement: >-
      UniProt names NikA as a nickel ABC transporter periplasmic binding
      protein and records it as an ABC-transporter complex component.
  - source_id: UniProtKB:Q88HL3
    title: NikB nickel ABC transporter permease subunit
    statement: >-
      UniProt names NikB as a nickel ABC transporter permease subunit in the
      local nikABCDE locus.
  - source_id: UniProtKB:Q88HL2
    title: NikC nickel ABC transporter permease subunit
    statement: >-
      UniProt names NikC as a nickel ABC transporter permease subunit in the
      local nikABCDE locus.
  - source_id: UniProtKB:Q88HL1
    title: NikD nickel import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes NikD as part of the NikABCDE
      ABC transporter complex involved in nickel import and assigns
      ABC-type nickel transporter activity.
  - source_id: UniProtKB:Q88HL0
    title: NikE nickel import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes NikE as part of the NikABCDE
      ABC transporter complex involved in nickel import and assigns
      ABC-type nickel transporter activity.
