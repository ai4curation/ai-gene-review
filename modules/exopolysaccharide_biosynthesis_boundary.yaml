id: MODULE:exopolysaccharide_biosynthesis_boundary
title: Exopolysaccharide biosynthesis boundary
description: >-
  Boundary module for KEGG ppu00543 in Pseudomonas putida KT2440. The
  organism-specific map is centered on alginate/exopolysaccharide biosynthesis
  and modification, but it also includes several serine O-acetyltransferase
  enzymes that belong primarily to L-cysteine biosynthesis. This module keeps
  alginate polymerization, alginate O-acetylation/regulation, unresolved
  glycosyltransferase side candidates, and cysteine-biosynthesis spillovers
  separate.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00543
    title: Exopolysaccharide biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00543 provides the PSEPK curation batch. Its membership contains
      alginate biosynthesis proteins AlgF, AlgI, AlgJ, AlgX, Alg44, and Alg8,
      the unresolved glycosyltransferase PP_2124, and multiple serine
      O-acetyltransferase proteins that overlap with cysteine and sulfur
      metabolism rather than forming an exopolysaccharide route.
module:
  id: exopolysaccharide_biosynthesis_boundary
  label: Exopolysaccharide biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: alginic acid biosynthetic process
      term:
        id: GO:0042121
        label: alginic acid biosynthetic process
      description: Alginate/exopolysaccharide biosynthesis context for the core ppu00543 alg genes.
    - preferred_term: alginate synthase activity
      term:
        id: GO:0047643
        label: alginate synthase activity
      description: Alg8 polymerization activity for alginate synthesis.
    - preferred_term: cyclic-di-GMP binding
      term:
        id: GO:0035438
        label: cyclic-di-GMP binding
      description: Alg44 regulatory binding activity coupled to alginate production.
    - preferred_term: acyltransferase activity
      term:
        id: GO:0016746
        label: acyltransferase activity
      description: Broad current molecular-function context for alginate O-acetylation proteins.
    - preferred_term: L-cysteine biosynthetic process
      term:
        id: GO:0019344
        label: L-cysteine biosynthetic process
      description: Primary process for the serine O-acetyltransferase spillover genes in this KEGG map.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Alginate polymerization and export proteins include membrane-associated components.
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
        description: Several alginate biosynthesis/modification proteins are periplasmic or periplasm-facing.
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Serine O-acetyltransferase side-context enzymes are cytoplasmic.
  parts:
    - order: 1
      role: Alginate polymerization and c-di-GMP-coupled production
      node:
        id: alginate_polymerization_regulation
        label: Alginate polymerization and regulation
        module_type: METABOLIC_PATHWAY
        description: >-
          Alg8 and Alg44 form the key polymerization/regulatory node for
          alginate production in the ppu00543 batch.
        annotons:
          - id: alg8_alginate_synthase
            label: "alg8: alginate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: alg8
            function:
              preferred_term: alginate synthase activity
              term:
                id: GO:0047643
                label: alginate synthase activity
            role_description: Membrane glycosyltransferase that polymerizes alginate.
          - id: alg44_cyclic_di_gmp_binding_alginate_factor
            label: "alg44: cyclic-di-GMP-binding alginate production factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: alg44
            function:
              preferred_term: cyclic-di-GMP binding
              term:
                id: GO:0035438
                label: cyclic-di-GMP binding
            role_description: c-di-GMP-responsive alginate production component.
    - order: 2
      role: Alginate O-acetylation and periplasmic modification
      node:
        id: alginate_o_acetylation_modification
        label: Alginate O-acetylation and periplasmic modification
        module_type: METABOLIC_PATHWAY
        description: >-
          AlgI, AlgJ, AlgF, and AlgX are alginate biosynthesis/modification
          proteins. The current GOA terms often use broad acyltransferase or
          process annotations rather than a specific alginate O-acetylase term.
        annotons:
          - id: algI_alginate_o_acetylase_candidate
            label: "algI: alginate O-acetylation candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algI
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
            role_description: Predicted membrane alginate O-acetylation component.
          - id: algJ_alginate_o_acetylase_candidate
            label: "algJ: alginate O-acetylation candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algJ
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
            role_description: Predicted periplasmic alginate O-acetylation component.
          - id: algX_alginate_o_acetyltransferase_candidate
            label: "algX: alginate modification factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algX
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
            role_description: Periplasmic alginate biosynthesis/modification factor.
          - id: algF_alginate_biosynthesis_factor
            label: "algF: alginate biosynthesis factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algF
            role_description: Periplasmic alginate biosynthesis factor without a specific first-pass molecular-function term.
    - order: 3
      role: Unresolved glycosyltransferase side candidate
      node:
        id: unresolved_exopolysaccharide_glycosyltransferase
        label: Unresolved exopolysaccharide glycosyltransferase candidate
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_2124 is a predicted glycosyltransferase in the KEGG
          exopolysaccharide map and biofilm context, but first-pass evidence is
          expected to be needed before assigning a specific glycan substrate.
        annotons:
          - id: PP_2124_glycosyltransferase_candidate
            label: "PP_2124: glycosyltransferase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2124
            function:
              preferred_term: glycosyltransferase activity
              term:
                id: GO:0016757
                label: glycosyltransferase activity
            role_description: Candidate EPS/biofilm glycosyltransferase; product and acceptor unresolved.
    - order: 4
      role: Cysteine-biosynthesis acyltransferase spillovers
      node:
        id: serine_o_acetyltransferase_spillovers
        label: Serine O-acetyltransferase spillovers
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_0228, cysE, PP_1110, and PP_3136 are EC 2.3.1.30 serine
          O-acetyltransferase enzymes. Their primary biological role is
          L-cysteine biosynthesis; their inclusion in ppu00543 should not be
          interpreted as evidence for exopolysaccharide biosynthesis.
        annotons:
          - id: PP_0228_serine_o_acetyltransferase
            label: "PP_0228: L-serine O-acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0228
            function:
              preferred_term: L-serine O-acetyltransferase activity
              term:
                id: GO:0009001
                label: L-serine O-acetyltransferase activity
            role_description: Cysteine-biosynthesis side-context enzyme.
          - id: cysE_serine_o_acetyltransferase
            label: "cysE: L-serine O-acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cysE
            function:
              preferred_term: L-serine O-acetyltransferase activity
              term:
                id: GO:0009001
                label: L-serine O-acetyltransferase activity
            role_description: Cysteine-biosynthesis side-context enzyme.
          - id: PP_1110_serine_o_acetyltransferase
            label: "PP_1110: L-serine O-acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1110
            function:
              preferred_term: L-serine O-acetyltransferase activity
              term:
                id: GO:0009001
                label: L-serine O-acetyltransferase activity
            role_description: Cysteine-biosynthesis side-context enzyme.
          - id: PP_3136_serine_o_acetyltransferase
            label: "PP_3136: L-serine O-acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3136
            function:
              preferred_term: L-serine O-acetyltransferase activity
              term:
                id: GO:0009001
                label: L-serine O-acetyltransferase activity
            role_description: Cysteine-biosynthesis side-context enzyme.
