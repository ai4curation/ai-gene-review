            label: "G6PD: glucose-6-phosphate dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glucose-6-phosphate dehydrogenase family (G6PD)
                term:
                  id: PANTHER:PTHR23429
                  label: GLUCOSE-6-PHOSPHATE DEHYDROGENASE
                representative_members:
                  - preferred_term: G6PD (human)
                    term:
                      id: UniProtKB:P11413
                      label: Glucose-6-phosphate 1-dehydrogenase
            function:
              preferred_term: glucose-6-phosphate dehydrogenase activity
              term:
                id: GO:0004345
                label: glucose-6-phosphate dehydrogenase activity
              substrates:
                - preferred_term: D-glucose 6-phosphate
                - preferred_term: NADP+
              products:
                - preferred_term: 6-phospho-D-glucono-1,5-lactone
                - preferred_term: NADPH
              evidence:
                - source_id: EC:1.1.1.49
                  statement: glucose-6-phosphate dehydrogenase (NADP+); committed rate-limiting oxidative-PPP step
                - source_id: Reactome:R-HSA-70377
                  statement: "G6PD multimers dehydrogenate G6P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-limiting, committed step; principal cytosolic NADPH source (reductive
              biosynthesis and erythrocyte glutathione antioxidant defense). Requires a
              structural NADP+; dimer/tetramer. X-linked G6PD deficiency = favism (most
              common human enzymopathy).
    - order: 2
      role: hydrolysis of the labile lactone
      node:
        id: pgls_step
        label: 6-phospho-D-glucono-1,5-lactone + H2O to 6-phospho-D-gluconate
        module_type: REACTION
        annotons:
          - id: pgls_activity
            label: "PGLS: 6-phosphogluconolactonase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 6-phosphogluconolactonase / glucosamine-6-P isomerase family (PGLS)
                term:
                  id: PANTHER:PTHR11054
                  label: 6-PHOSPHOGLUCONOLACTONASE
                representative_members:
                  - preferred_term: PGLS (human)
                    term:
                      id: UniProtKB:O95336
                      label: 6-phosphogluconolactonase
            function:
