      term:
        id: GO:0009051
        label: pentose-phosphate shunt, oxidative branch
      description: >-
        Irreversible oxidative conversion of glucose-6-phosphate to
        ribulose-5-phosphate, generating 2 NADPH + CO2.
  context:
    cellular_components:
      - preferred_term: cytosol
