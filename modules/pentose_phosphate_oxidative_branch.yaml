                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Oxidative decarboxylation of 6-phosphogluconate to ribulose-5-phosphate +
              CO2, producing the second NADPH. Its product ribulose-5-phosphate enters the
              non-oxidative branch (and ribose-5-phosphate for nucleotide synthesis).
  connections:
    - source: g6pd_step
      target: pgls_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 6-phosphogluconolactone from G6PD is hydrolysed by PGLS.
    - source: pgls_step
      target: pgd_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 6-phosphogluconate from PGLS is oxidatively decarboxylated by PGD.
  notes: >-
    Three-step oxidative branch of the pentose phosphate pathway grounded to the human
    enzymes G6PD (UniProtKB:P11413, GO:0004345, EC 1.1.1.49), PGLS (O95336, GO:0017057,
    EC 3.1.1.31) and PGD (P52209, GO:0004616, EC 1.1.1.44). GO molecular-function terms
    were taken from the human GOA records; Reactome reaction ids and titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector (generic
    over orthologs) with the human enzyme as representative. Net output per glucose-6-phosphate:
    2 NADPH + 1 CO2 + ribulose-5-phosphate. Downstream, ribulose-5-phosphate enters the
    non-oxidative branch (RPE, RPIA, TKT, TALDO1) and provides ribose-5-phosphate for PRPP
    / nucleotide synthesis (a separate module, to follow). Upstream, glucose-6-phosphate is
    the shared hub with glycolysis (via GPI), glycogen metabolism (PGM1) and the
    glucose-6-phosphatase system. G6PD-generated NADPH also supports the glutathione
    antioxidant system and NADPH oxidases. Of these three enzymes only G6PD has a common
    Mendelian disease (X-linked deficiency / favism, the most prevalent human enzymopathy);
    PGLS and PGD are included for pathway completeness. The distinct ER-lumenal G6PD paralog
    H6PD (hexose-6-phosphate dehydrogenase), which supplies NADPH for 11beta-HSD1
    glucocorticoid activation, is a separate system and not part of this cytosolic module.
