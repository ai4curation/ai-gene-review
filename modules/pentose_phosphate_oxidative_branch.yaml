  - source_id: GO:0009051
    title: pentose-phosphate shunt, oxidative branch
    statement: >-
      The module is grounded in the GO pentose-phosphate shunt, oxidative branch
      (GO:0009051): glucose-6-phosphate to ribulose-5-phosphate with 2 NADPH.
  - source_id: Reactome:R-HSA-71336
    title: Pentose phosphate pathway
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome "Pentose
      phosphate pathway" reactions R-HSA-70377 (G6PD), R-HSA-71296 (PGLS) and
      R-HSA-71299 (PGD).
  - source_id: file:human/G6PD/G6PD-ai-review.yaml
    title: G6PD gene review (human)
    statement: >-
      The rate-limiting dehydrogenase step (UniProtKB:P11413, GO:0004345) matches the
      completed human G6PD review.
  - source_id: file:human/PGLS/PGLS-ai-review.yaml
    title: PGLS gene review (human)
    statement: >-
      The lactonase step (UniProtKB:O95336, GO:0017057) matches the completed human
      PGLS review.
  - source_id: file:human/PGD/PGD-ai-review.yaml
    title: PGD gene review (human)
    statement: >-
      The oxidative-decarboxylation step (UniProtKB:P52209, GO:0004616) matches the
      completed human PGD review.
module:
  id: pentose_phosphate_oxidative_branch
  label: Pentose phosphate pathway (oxidative branch)
  module_type: METABOLIC_PATHWAY
  concepts:
