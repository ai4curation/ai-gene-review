  - source_id: file:human/MSMO1/MSMO1-ai-review.yaml
    title: MSMO1 gene review (human)
    statement: >-
      The C4-methyl-oxidation step (UniProtKB:Q15800, GO:0000254) matches the completed
      human MSMO1 review.
  - source_id: file:human/NSDHL/NSDHL-ai-review.yaml
    title: NSDHL gene review (human)
    statement: >-
      The C4-decarboxylation step (UniProtKB:Q15738, GO:0000252) matches the completed
      human NSDHL review.
  - source_id: file:human/EBP/EBP-ai-review.yaml
    title: EBP gene review (human)
    statement: >-
      The Delta8-Delta7 isomerisation step (UniProtKB:Q15125, GO:0000247) matches the
