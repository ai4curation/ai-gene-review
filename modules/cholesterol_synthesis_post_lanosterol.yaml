      The C5-desaturation step (UniProtKB:O75845, GO:0050046) matches the completed human
      SC5D review.
  - source_id: file:human/DHCR7/DHCR7-ai-review.yaml
    title: DHCR7 gene review (human)
    statement: >-
      The 7-dehydrocholesterol-reduction (final) step (UniProtKB:Q9UBM7, GO:0047598)
      matches the completed human DHCR7 review.
  - source_id: file:human/DHCR24/DHCR24-ai-review.yaml
    title: DHCR24 gene review (human)
    statement: >-
      The Delta24 side-chain reduction (UniProtKB:Q15392, GO:0000246) that distinguishes the
      Bloch and Kandutsch-Russell arms is the previously completed human DHCR24 review.
module:
  id: cholesterol_synthesis_post_lanosterol
  label: Cholesterol biosynthesis (lanosterol -> cholesterol)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: cholesterol biosynthetic process
      term:
        id: GO:0006695
        label: cholesterol biosynthetic process
      description: >-
        Post-lanosterol conversion of lanosterol to cholesterol by demethylation,
        isomerisation, desaturation and reduction.
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: The post-lanosterol sterol-modifying enzymes are ER-membrane proteins.
  parts:
    - order: 1
      role: 14-alpha-demethylation
      node:
        id: cyp51a1_step
        label: lanosterol to 14-demethyl-lanosterol (FF-MAS)
        module_type: REACTION
        annotons:
          - id: cyp51a1_activity
            label: "CYP51A1: sterol 14-alpha-demethylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Sterol 14-alpha-demethylase family (CYP51A1)
                term:
                  id: PANTHER:PTHR24304
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP51A1 (human)
                    term:
                      id: UniProtKB:Q16850
                      label: Lanosterol 14-alpha demethylase
            function:
              preferred_term: sterol 14-demethylase activity
              term:
                id: GO:0008398
                label: sterol 14-demethylase activity
              substrates:
                - preferred_term: lanosterol (or 24,25-dihydrolanosterol)
              products:
                - preferred_term: 14-demethyl sterol (FF-MAS) + formate
              evidence:
                - source_id: EC:1.14.14.154
                  statement: sterol 14-alpha-demethylase (CYP51); P450, heme/iron; first post-lanosterol step
                - source_id: Reactome:R-HSA-194678
                  statement: "CYP51A1 demethylates LAN (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              P450 that removes lanosterol's 14-alpha-methyl group (three oxidative steps),
              the first post-lanosterol demethylation.
    - order: 2
      role: C4-methyl oxidation
      node:
        id: msmo1_step
        label: 4,4-dimethyl/4-methyl sterol to 4-carboxy sterol (C4-methyl oxidation)
        module_type: REACTION
        annotons:
          - id: msmo1_activity
            label: "MSMO1: C4-methylsterol oxidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Fatty acid hydroxylase / methylsterol oxidase family (MSMO1/SC5D)
                term:
                  id: PANTHER:PTHR11863
                  label: STEROL DESATURASE / METHYLSTEROL MONOOXYGENASE
                representative_members:
                  - preferred_term: MSMO1 (human)
                    term:
                      id: UniProtKB:Q15800
                      label: Methylsterol monooxygenase 1
            function:
              preferred_term: C-4 methylsterol oxidase activity
              term:
                id: GO:0000254
                label: C-4 methylsterol oxidase activity
              substrates:
                - preferred_term: 4-alpha-methyl sterol
                - preferred_term: O2 / NAD(P)H
              products:
                - preferred_term: 4-alpha-carboxy sterol
              evidence:
                - source_id: EC:1.14.18.9
                  statement: C4-methylsterol oxidase; non-heme di-iron; oxidises C4 methyl to carboxylate (with NSDHL)
                - source_id: Reactome:R-HSA-194641
                  statement: "4,4-dimethylcholesta-8(9),24-dien-3beta-ol is oxidized to 4-methyl... (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Non-heme di-iron oxidase oxidising the sterol C4-methyl group to a carboxylate
              (repeated for both C4 methyls); the oxidative part of C4-demethylation. MSMO1
              deficiency = SC4MOL deficiency.
    - order: 3
      role: C4-decarboxylation / 3-oxidation
      node:
        id: nsdhl_step
        label: 4-carboxy sterol to 3-keto sterol + CO2 (then reduced to 3-beta-ol)
        module_type: REACTION
        annotons:
          - id: nsdhl_activity
            label: "NSDHL: sterol-4-carboxylate 3-dehydrogenase (decarboxylating)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NSDHL / 3-beta-HSD-like C4-decarboxylase family (NSDHL)
                term:
                  id: PANTHER:PTHR43245
                  label: STEROID DEHYDROGENASE
                representative_members:
                  - preferred_term: NSDHL (human)
                    term:
                      id: UniProtKB:Q15738
                      label: Sterol-4-alpha-carboxylate 3-dehydrogenase, decarboxylating
            function:
              preferred_term: 3-beta-hydroxysteroid dehydrogenase [NAD(P)+]/C4-decarboxylase activity
              term:
                id: GO:0000252
                label: 3-beta-hydroxysteroid dehydrogenase [NAD(P)+]/C4-decarboxylase activity
              substrates:
                - preferred_term: 3-beta-hydroxy-4-alpha-carboxy sterol
                - preferred_term: NAD(P)+
              products:
                - preferred_term: 3-keto sterol + CO2
              evidence:
                - source_id: EC:4.1.1.-
                  statement: sterol-4alpha-carboxylate 3-dehydrogenase (decarboxylating); completes C4-demethylation with MSMO1
                - source_id: Reactome:R-HSA-194642
                  statement: "4-methyl,4-carboxycholesta-8(9),24-dien-3beta-ol is decarboxylated (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              NAD(P)+-dependent 3-dehydrogenation/decarboxylation of the 4-carboxysterol; the
              decarboxylating half of C4-demethylation. NSDHL deficiency = CHILD / CK syndrome.
    - order: 4
      role: Delta8 -> Delta7 isomerisation
      node:
        id: ebp_step
        label: Delta(8)-sterol to Delta(7)-sterol
        module_type: REACTION
        annotons:
          - id: ebp_activity
            label: "EBP: sterol Delta(8),Delta(7)-isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Emopamil-binding protein / sterol isomerase family (EBP)
                term:
                  id: PANTHER:PTHR14207
                  label: EMOPAMIL-BINDING PROTEIN / STEROL ISOMERASE
                representative_members:
                  - preferred_term: EBP (human)
                    term:
                      id: UniProtKB:Q15125
                      label: 3-beta-hydroxysteroid-Delta(8),Delta(7)-isomerase
            function:
              preferred_term: C-8 sterol isomerase activity
              term:
                id: GO:0000247
                label: C-8 sterol isomerase activity
              substrates:
                - preferred_term: Delta(8)-sterol (e.g. zymostenol)
              products:
                - preferred_term: Delta(7)-sterol (e.g. lathosterol)
              evidence:
                - source_id: EC:5.3.3.5
                  statement: 3-beta-hydroxysteroid-Delta8,Delta7-isomerase (emopamil-binding protein)
                - source_id: Reactome:R-HSA-6807052
                  statement: "EBP isomerizes ZYMSTNL to LTHSOL (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Shifts the ring double bond from Delta8 to Delta7. Deficiency = X-linked
              chondrodysplasia punctata 2 (Conradi-Hunermann-Happle).
    - order: 5
      role: C5-desaturation
      node:
        id: sc5d_step
        label: Delta(7)-sterol (lathosterol) to Delta(5,7)-sterol (7-dehydrocholesterol)
        module_type: REACTION
        annotons:
          - id: sc5d_activity
            label: "SC5D: lathosterol oxidase (sterol-C5-desaturase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Fatty acid hydroxylase / sterol desaturase family (SC5D/MSMO1)
                term:
                  id: PANTHER:PTHR11863
                  label: STEROL DESATURASE / METHYLSTEROL MONOOXYGENASE
                representative_members:
                  - preferred_term: SC5D (human)
                    term:
                      id: UniProtKB:O75845
                      label: Lathosterol oxidase
            function:
              preferred_term: delta7-sterol 5(6)-desaturase activity
              term:
                id: GO:0050046
                label: delta7-sterol 5(6)-desaturase activity
              substrates:
                - preferred_term: lathosterol (Delta7-sterol)
                - preferred_term: O2 / NAD(P)H
              products:
                - preferred_term: 7-dehydrocholesterol (Delta5,7-sterol)
              evidence:
                - source_id: EC:1.14.19.20
                  statement: sterol-C5-desaturase (lathosterol oxidase); non-heme iron; introduces the C5-6 double bond
                - source_id: Reactome:R-HSA-195664
                  statement: "Cholesta-7,24-dien-3beta-ol is desaturated to form cholesta-5,7,24... (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Introduces the C5-6 double bond (lathosterol -> 7-dehydrocholesterol).
              Deficiency = lathosterolosis.
    - order: 6
      role: 7-dehydrocholesterol reduction (final)
      node:
        id: dhcr7_step
        label: 7-dehydrocholesterol to cholesterol
        module_type: REACTION
        annotons:
          - id: dhcr7_activity
            label: "DHCR7: 7-dehydrocholesterol reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 7-dehydrocholesterol reductase family (DHCR7)
                term:
                  id: PANTHER:PTHR21257
                  label: 7-DEHYDROCHOLESTEROL REDUCTASE
                representative_members:
                  - preferred_term: DHCR7 (human)
                    term:
                      id: UniProtKB:Q9UBM7
                      label: 7-dehydrocholesterol reductase
            function:
              preferred_term: 7-dehydrocholesterol reductase activity
              term:
                id: GO:0047598
                label: 7-dehydrocholesterol reductase activity
              substrates:
                - preferred_term: 7-dehydrocholesterol
                - preferred_term: NADPH
              products:
                - preferred_term: cholesterol
              evidence:
                - source_id: EC:1.3.1.21
                  statement: 7-dehydrocholesterol reductase; reduces the C7-8 double bond; final Kandutsch-Russell step
                - source_id: Reactome:R-HSA-196402
                  statement: "Cholesta-5,7,24-trien-3beta-ol is reduced to desmosterol (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Reduces the C7-8 double bond of 7-dehydrocholesterol to give cholesterol (and,
              in the Bloch arm, 7-dehydrodesmosterol -> desmosterol); 7-DHC is also the
              vitamin-D3 precursor. Deficiency = Smith-Lemli-Opitz syndrome.
  connections:
    - source: cyp51a1_step
      target: msmo1_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 14-demethylated sterol from CYP51A1 undergoes C4-demethylation (MSMO1/NSDHL).
    - source: msmo1_step
      target: nsdhl_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 4-carboxy sterol from MSMO1 is decarboxylated by NSDHL.
    - source: nsdhl_step
      target: ebp_step
      connection_type: PROVIDES_INPUT_FOR
      description: After C4-demethylation, the Delta8-sterol is isomerised by EBP.
    - source: ebp_step
      target: sc5d_step
      connection_type: PROVIDES_INPUT_FOR
      description: The Delta7-sterol (lathosterol) from EBP is desaturated by SC5D.
    - source: sc5d_step
      target: dhcr7_step
      connection_type: PROVIDES_INPUT_FOR
      description: 7-dehydrocholesterol from SC5D is reduced by DHCR7 to cholesterol.
  notes: >-
    The post-lanosterol segment of cholesterol biosynthesis grounded to the human enzymes
    CYP51A1 (UniProtKB:Q16850, GO:0008398, EC 1.14.14.154), MSMO1 (Q15800, GO:0000254, EC
    1.14.18.9), NSDHL (Q15738, GO:0000252), EBP (Q15125, GO:0000247, EC 5.3.3.5), SC5D
    (O75845, GO:0050046, EC 1.14.19.20) and DHCR7 (Q9UBM7, GO:0047598, EC 1.3.1.21). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids and
    titles were verified against the local reactome cache. Each step uses a PANTHER family
    selector with the human enzyme as representative (MSMO1 and SC5D share the fatty-acid-
    hydroxylase/sterol-desaturase family PTHR11863). This is a SIMPLIFIED ordered view of a
    ~19-reaction, branched segment: it runs as two interconvertible arms — the Bloch arm (the
    side-chain Delta24 bond is kept until the end) and the Kandutsch-Russell arm (DHCR24
    reduces Delta24 early) — differing only in when DHCR24 (UniProtKB:Q15392, GO:0000246
    Delta24-sterol reductase; reviewed previously, on main, deficiency = desmosterolosis) acts;
    intervening C14- and 3-keto-reductase steps (e.g. by LBR/TM7SF2 and HSD17B7) are
    abbreviated. Upstream, lanosterol comes from the sterol_commitment_squalene_to_lanosterol
    module (FDFT1/SQLE/LSS); the immediate substrate lanosterol is made by the mevalonate ->
    squalene route. Disorders map to individual steps: CYP51A1 (no common disease), MSMO1
    (SC4MOL deficiency), NSDHL (CHILD/CK syndrome), EBP (CDPX2 / Conradi-Hunermann-Happle),
    SC5D (lathosterolosis), DHCR7 (Smith-Lemli-Opitz syndrome), DHCR24 (desmosterolosis).
