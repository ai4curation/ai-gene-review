id: MODULE:cholesterol_synthesis_post_lanosterol
title: Cholesterol biosynthesis II — lanosterol to cholesterol (post-lanosterol); SLOS, CDPX2, CHILD, lathosterolosis
description: >-
  The post-lanosterol segment of cholesterol biosynthesis converts lanosterol into
  cholesterol through a ~19-reaction sequence of demethylations, isomerisation,
  desaturations and reductions carried out by endoplasmic-reticulum-membrane enzymes. The
  three lanosterol methyl groups are removed first: CYP51A1 (a cytochrome P450) removes the
  14-alpha-methyl group; then the two C4 methyls are removed in two rounds by the C4-
  demethylation machinery in which MSMO1 (a non-heme di-iron methylsterol oxidase)
  oxidises the C4 methyl to a carboxylate and NSDHL (a 3-beta-hydroxysteroid dehydrogenase/
  C4-decarboxylase) decarboxylates it (a 3-ketoreductase then restores the 3-beta-ol).
  EBP (sterol Delta(8)-Delta(7) isomerase) shifts the ring double bond from Delta8 to
  Delta7; SC5D (lathosterol oxidase / sterol-C5-desaturase) introduces the C5-6 double bond;
  and DHCR7 (7-dehydrocholesterol reductase) reduces the C7-8 double bond to give
  cholesterol. The pathway runs as two interconvertible arms — the Bloch arm (retaining the
  side-chain Delta24 double bond until the end) and the Kandutsch-Russell arm (in which
  DHCR24 reduces the Delta24 bond early) — that differ only in the timing of the DHCR24
  step. Inherited enzyme defects cause distinctive malformation/skeletal/skin disorders:
  DHCR7 -> Smith-Lemli-Opitz syndrome; SC5D -> lathosterolosis; EBP -> X-linked
  chondrodysplasia punctata 2 (Conradi-Hunermann-Happle); NSDHL -> CHILD syndrome; MSMO1 ->
  SC4MOL deficiency; and DHCR24 -> desmosterolosis.
status: DRAFT
evidence:
  - source_id: GO:0006695
    title: cholesterol biosynthetic process
    statement: >-
      The module is grounded in cholesterol biosynthetic process (GO:0006695); it covers
      the post-lanosterol lanosterol -> cholesterol segment.
  - source_id: Reactome:R-HSA-191273
    title: Cholesterol biosynthesis
    statement: >-
      Reactions follow the human Reactome cholesterol-biosynthesis pathway: R-HSA-194678
      (CYP51A1), R-HSA-194641 (MSMO1), R-HSA-194642 (NSDHL), R-HSA-6807052 (EBP),
      R-HSA-195664 (SC5D) and R-HSA-196402 (DHCR7).
  - source_id: file:human/CYP51A1/CYP51A1-ai-review.yaml
    title: CYP51A1 gene review (human)
