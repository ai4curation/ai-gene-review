  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit evidence,
  structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions: TRAF2
  and RIPK1: Linear Pathway or Redundant Arms?; The Dual Role of FADD and Caspase-8; In Vitro Versus In
  Vivo Discrepancies; Cell-Type Specificity of Pathway Architecture; Interferon-gamma Co-Sensing; A20
  Mechanism. Machine-generated Falcon citations remain curation support and are not manually adjudicated
  here.
