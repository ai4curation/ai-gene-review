knowledge_gaps:
  - gap_statement: 'TRAF2 and RIPK1: Linear Pathway or Redundant Arms? remains unresolved in the TNF-mediated
      signaling pathway module.'
    boundary: 'The conventional model positions RIPK1 downstream of TRAF2 as a substrate for cIAP-mediated
      K63 ubiquitination. However, Wagner et al. (2025) demonstrated that TRAF2 and RIPK1 act redundantly
      in classical NF-kappaB signaling: single knockouts of either protein leave TNF-induced IL-8 production
      and IkappaBalpha degradation largely intact across multiple cell lines, whereas combined TRAF2/RIPK1
      deficiency completely ab...'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/tnf_signaling-deep-research-falcon.md
  - gap_statement: The Dual Role of FADD and Caspase-8 remains unresolved in the TNF-mediated 
      signaling pathway module.
    boundary: 'The mechanism by which FADD simultaneously promotes and inhibits caspase-8 activation within
      Complex II remains unclear (loo2023deathbytnf pages 7-8). Similarly, there are competing views on
      caspase-8-mediated RIPK1 cleavage: some studies suggest it promotes apoptosis by inhibiting pro-survival
      gene expression, while others propose it limits cell death (preedy2024cellularheterogeneityin pages
      3-4).'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/tnf_signaling-deep-research-falcon.md
  - gap_statement: In Vitro Versus In Vivo Discrepancies remains unresolved in the TNF-mediated 
      signaling pathway module.
    boundary: Most mechanistic studies of TNF signaling use supraphysiological concentrations of 
      recombinant sTNF, which may not recapitulate the biology of tmTNF. The weaker TNFR2 activation
      by sTNF and the different receptor residency times may explain why certain cell death 
      phenotypes are more prominent in vitro than in vivo (rafeeq2025targetingtnfr1drivennecroptosis
      pages 4-6, loo2023deathbytnf pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/tnf_signaling-deep-research-falcon.md
  - gap_statement: Cell-Type Specificity of Pathway Architecture remains unresolved in the 
      TNF-mediated signaling pathway module.
    boundary: The degree to which each checkpoint component is expressed, and therefore the dominant
      mode of cell death upon checkpoint failure, varies dramatically between cell types 
      (wagner2025traf2andripk1 pages 4-5, loo2023deathbytnf pages 7-8). Whether this variation 
      reflects genuine alternative pathway wiring or quantitative differences in the same core 
      architecture remains debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/tnf_signaling-deep-research-falcon.md
  - gap_statement: Interferon-gamma Co-Sensing remains unresolved in the TNF-mediated signaling 
      pathway module.
    boundary: How co-sensing of TNF and interferon-gamma affects downstream TNFR1 cell death 
      checkpoints is still poorly understood, despite the well-known synergy between these cytokines
      in driving inflammatory cell death (loo2023deathbytnf pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/tnf_signaling-deep-research-falcon.md
  - gap_statement: A20 Mechanism remains unresolved in the TNF-mediated signaling pathway module.
    boundary: A20 was long considered primarily an NF-kappaB inhibitor via deubiquitinase activity, 
      but recent evidence indicates its primary anti-inflammatory mechanism is preventing cell death
      rather than suppressing NF-kappaB signaling per se (loo2023deathbytnf pages 9-11). The precise
      molecular mechanism by which A20 stabilizes M1-linked ubiquitin chains and prevents RIPK1 
      activation requires further elucidation.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
