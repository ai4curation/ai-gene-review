knowledge_gaps:
  - gap_statement: Ligand Bias and Allosteric Modulation remains unresolved in the Neurotrophin TRK 
      receptor signaling pathway module.
    boundary: Different neurotrophins binding the same Trk receptor can preferentially activate 
      distinct downstream pathways (ligand bias), but the structural basis of this phenomenon 
      remains incompletely understood. Evidence shows that NT-4 on TrkB preferentially activates 
      PI3K/AKT for anti-apoptotic signaling, while BDNF engages broader pathway activation 
      (enkavi2026moleculardeterminantsof pages 2-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/neurotrophin_trk_signaling-deep-research-falcon.md
  - gap_statement: Surface Versus Endosomal Signaling remains unresolved in the Neurotrophin TRK 
      receptor signaling pathway module.
    boundary: While the signaling endosome model is well-supported for long-distance axonal 
      retrograde signaling, the relative contributions of surface-initiated versus 
      endosome-sustained signaling for local effects (e.g., spine remodeling, local translation) 
      remain debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/neurotrophin_trk_signaling-deep-research-falcon.md
  - gap_statement: Species and Model System Comparisons remains unresolved in the Neurotrophin TRK 
      receptor signaling pathway module.
    boundary: Much of our mechanistic understanding derives from rodent models, particularly 
      sympathetic and dorsal root ganglion neurons for TrkA/NGF and hippocampal/cortical neurons for
      TrkB/BDNF.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/neurotrophin_trk_signaling-deep-research-falcon.md
  - gap_statement: Truncated Receptor Function remains unresolved in the Neurotrophin TRK receptor 
      signaling pathway module.
    boundary: Whether truncated TrkB-T1 functions purely as a dominant-negative regulator and BDNF 
      scavenger, or also transduces meaningful independent signals in glia and neurons, remains 
      under investigation.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/neurotrophin_trk_signaling-deep-research-falcon.md
  - gap_statement: Integration with Other Signaling Systems remains unresolved in the Neurotrophin 
      TRK receptor signaling pathway module.
    boundary: Beyond the three canonical branches, Trk receptors also couple to JAK/STAT3, Rho 
      family GTPases, and potentially other signaling systems (siddi2026epigeneticregulationof pages
      2-4). The extent to which these represent obligatory versus accessory pathways, and how they 
      intersect with canonical branches, are areas of active investigation.
    gap_kind:
      - BIOLOGY
