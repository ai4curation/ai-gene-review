              membrane-associated at synaptic vesicles. GAD1 deficiency -> spastic paraplegia /
              cerebral palsy / epileptic encephalopathy.
    - order: 2
      role: GABA transamination (first catabolic step)
      node:
        id: abat_step
        label: GABA + 2-oxoglutarate to succinate semialdehyde + L-glutamate
        module_type: REACTION
        annotons:
          - id: abat_activity
            label: "ABAT: 4-aminobutyrate aminotransferase (GABA-T)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 4-aminobutyrate aminotransferase family (ABAT)
                term:
                  id: PANTHER:PTHR43206
                  label: 4-AMINOBUTYRATE AMINOTRANSFERASE
                representative_members:
                  - preferred_term: ABAT (human)
                    term:
                      id: UniProtKB:P80404
                      label: 4-aminobutyrate aminotransferase, mitochondrial
            function:
              preferred_term: 4-aminobutyrate:2-oxoglutarate transaminase activity
              term:
                id: GO:0034386
                label: 4-aminobutyrate:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: gamma-aminobutyric acid (GABA)
                - preferred_term: 2-oxoglutarate
              products:
                - preferred_term: succinate semialdehyde
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:2.6.1.19
                  statement: 4-aminobutyrate aminotransferase (GABA transaminase); PLP-dependent; regenerates glutamate
                - source_id: Reactome:R-HSA-916855
                  statement: "PXLP-K357-ABAT dimer:2Fe-2S transforms GABA to SUCCSA (human Reactome reaction)"
            locations:
