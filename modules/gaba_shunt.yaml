                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              PLP-dependent mitochondrial GABA transaminase: transfers GABA's amino group to
              2-oxoglutarate, yielding succinate semialdehyde and regenerating glutamate.
              First step of GABA degradation; deficiency = GABA-transaminase deficiency.
    - order: 3
      role: oxidation to succinate (feeds TCA cycle)
      node:
        id: aldh5a1_step
        label: succinate semialdehyde + NAD+ to succinate + NADH
        module_type: REACTION
        annotons:
          - id: aldh5a1_activity
            label: "ALDH5A1: succinate-semialdehyde dehydrogenase (SSADH)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Succinate-semialdehyde dehydrogenase family (ALDH5A1)
                term:
                  id: PANTHER:PTHR43353
                  label: SUCCINATE-SEMIALDEHYDE DEHYDROGENASE
                representative_members:
                  - preferred_term: ALDH5A1 (human)
                    term:
                      id: UniProtKB:P51649
                      label: Succinate-semialdehyde dehydrogenase, mitochondrial
            function:
              preferred_term: succinate-semialdehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0004777
                label: succinate-semialdehyde dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: succinate semialdehyde
                - preferred_term: NAD+
              products:
                - preferred_term: succinate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.2.1.24
                  statement: succinate-semialdehyde dehydrogenase (NAD+); final GABA-shunt step feeding the TCA cycle
                - source_id: Reactome:R-HSA-888548
                  statement: "ALDH5A1 dehydrogenates SUCCSA to SUCCA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              NAD+-dependent oxidation of succinate semialdehyde to succinate, which enters
