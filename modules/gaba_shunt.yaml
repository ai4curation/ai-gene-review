id: MODULE:gaba_shunt
title: GABA shunt (glutamate -> GABA -> succinate); GAD1 / GABA-transaminase / SSADH deficiencies
description: >-
  The GABA shunt is the pathway that synthesises and degrades the major inhibitory
  neurotransmitter gamma-aminobutyric acid (GABA), routing glutamate carbon around the
  alpha-ketoglutarate-to-succinate segment of the TCA cycle. Glutamate decarboxylase
  (GAD1/GAD67, with the synaptic GAD2/GAD65 paralog) uses pyridoxal-5'-phosphate to
  decarboxylate L-glutamate to GABA + CO2 in the cytosol. GABA is then catabolised in the
  mitochondrial matrix: 4-aminobutyrate aminotransferase (ABAT, GABA transaminase) uses
  PLP to transfer GABA's amino group to 2-oxoglutarate, forming succinate semialdehyde +
  L-glutamate; and succinate-semialdehyde dehydrogenase (ALDH5A1, SSADH) oxidises
  succinate semialdehyde with NAD+ to succinate, which enters the TCA cycle. The shunt
  thus both produces the inhibitory transmitter and feeds its carbon skeleton into
  central energy metabolism (regenerating glutamate for another cycle). Inherited defects
  cause distinct neurological disorders: GAD1 mutations cause spastic paraplegia / cerebral
  palsy / developmental epileptic encephalopathy; ABAT deficiency causes GABA-transaminase
  deficiency (severe neonatal epileptic encephalopathy with elevated GABA); and ALDH5A1
  deficiency causes succinic semialdehyde dehydrogenase deficiency (4-hydroxybutyric /
  gamma-hydroxybutyric aciduria).
status: DRAFT
evidence:
  - source_id: GO:0006540
    title: GABA shunt
    statement: >-
      The module is grounded in the GO GABA shunt (GO:0006540): glutamate -> GABA ->
      succinate semialdehyde -> succinate.
  - source_id: Reactome:R-HSA-888572
    title: PXLP-K405-GAD1 decarboxylates L-Glu to form GABA
    statement: >-
      Reactions follow the human Reactome GABA-metabolism reactions R-HSA-888572 (GAD1),
      R-HSA-916855 (ABAT) and R-HSA-888548 (ALDH5A1).
  - source_id: file:human/GAD1/GAD1-ai-review.yaml
    title: GAD1 gene review (human)
    statement: >-
      The glutamate-decarboxylation (GABA synthesis) step (UniProtKB:Q99259, GO:0004351)
      matches the completed human GAD1 review.
  - source_id: file:human/ABAT/ABAT-ai-review.yaml
    title: ABAT gene review (human)
    statement: >-
      The GABA-transamination step (UniProtKB:P80404, GO:0034386) matches the completed
      human ABAT review.
  - source_id: file:human/ALDH5A1/ALDH5A1-ai-review.yaml
    title: ALDH5A1 gene review (human)
    statement: >-
      The succinate-semialdehyde-dehydrogenase step (UniProtKB:P51649, GO:0004777) matches
      the completed human ALDH5A1 review.
module:
  id: gaba_shunt
  label: GABA shunt (glutamate -> GABA -> succinate)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: GABA shunt
      term:
        id: GO:0006540
        label: GABA shunt
      description: >-
        Synthesis of GABA from glutamate and its catabolism to succinate, bypassing part
        of the TCA cycle.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: >-
          GABA catabolism (ABAT, ALDH5A1) is mitochondrial; GABA synthesis (GAD1) is cytosolic.
  parts:
    - order: 1
      role: GABA synthesis (glutamate decarboxylation)
      node:
        id: gad_step
        label: L-glutamate to GABA + CO2
        module_type: REACTION
        annotons:
          - id: gad_activity
            label: "GAD1/GAD2: glutamate decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glutamate decarboxylase family (GAD1/GAD2)
                term:
                  id: PANTHER:PTHR45677
                  label: GLUTAMATE DECARBOXYLASE
                representative_members:
                  - preferred_term: GAD1 (human, GAD67)
                    term:
                      id: UniProtKB:Q99259
                      label: Glutamate decarboxylase 1
                  - preferred_term: GAD2 (human, GAD65)
                    term:
                      id: UniProtKB:Q05329
                      label: Glutamate decarboxylase 2
            function:
              preferred_term: glutamate decarboxylase activity
              term:
                id: GO:0004351
                label: glutamate decarboxylase activity
              substrates:
                - preferred_term: L-glutamate
              products:
                - preferred_term: gamma-aminobutyric acid (GABA)
                - preferred_term: CO2
              evidence:
                - source_id: EC:4.1.1.15
                  statement: glutamate decarboxylase; PLP-dependent; GAD1/GAD67 constitutive, GAD2/GAD65 synaptic
                - source_id: Reactome:R-HSA-888572
                  statement: "PXLP-K405-GAD1 decarboxylates L-Glu to form GABA (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              PLP-dependent decarboxylation of glutamate to the inhibitory neurotransmitter
