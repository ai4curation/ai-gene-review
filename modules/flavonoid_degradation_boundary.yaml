id: MODULE:flavonoid_degradation_boundary
title: Flavonoid degradation boundary
description: >-
  Boundary/uncertain module for KEGG ppu00946 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains one already-curated periplasmic
  beta-glucosidase (`bglX`) plus a PP_3195-PP_3206 cluster of generic hydrolase,
  Rieske ferredoxin, glyoxalase/VOC, cupin, fumarylacetoacetase-like, and
  NAD-dependent epimerase/dehydratase-family proteins. This supports a possible
  aromatic-compound catabolism boundary but not a resolved flavonoid-degradation
  route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00946
    title: Degradation of flavonoids - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00946 provides the PSEPK curation batch. Its membership includes
      bglX plus PP_3195, PP_3197, PP_3198, PP_3204, PP_3205, and PP_3206; most
      of these proteins have sparse or generic GOA support and do not by
      themselves define a complete flavonoid-degradation pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu00946_flavonoid_degradation_boundary.tsv
    title: PSEPK ppu00946 flavonoid-degradation batch
    statement: >-
      The batch records the seven PSEPK members and their first-pass review/Asta
      status.
module:
  id: flavonoid_degradation_boundary
  label: Flavonoid degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: beta-glucosidase activity
      term:
        id: GO:0008422
        label: beta-glucosidase activity
      description: Glycoside hydrolysis represented by bglX, likely a broad carbohydrate/periplasmic side node.
    - preferred_term: serine-type peptidase activity
      term:
        id: GO:0008236
        label: serine-type peptidase activity
      description: Sparse GOA support for PP_3195; physiological substrate remains unresolved.
    - preferred_term: 2 iron, 2 sulfur cluster binding
      term:
        id: GO:0051537
        label: 2 iron, 2 sulfur cluster binding
      description: Rieske ferredoxin cofactor context for PP_3198.
  parts:
    - order: 1
      role: Flavonoid-route uncertainty
      node:
        id: flavonoid_route_uncertainty
        label: Flavonoid-degradation route uncertainty
        module_type: METABOLIC_PATHWAY
        description: >-
          The PSEPK ppu00946 membership lacks a resolved sequence of
          route-defining flavonoid ring-cleavage, de-glycosylation,
          dehydroxylation, or lower-pathway enzymes. The mapped genes are
          retained as candidate aromatic-compound boundary nodes pending
          substrate evidence.
        annotons: []
    - order: 2
      role: Glycoside hydrolase side node
      node:
        id: glycoside_hydrolase_side_node
        label: Glycoside hydrolase side node
        module_type: REACTION
        description: >-
          bglX is a periplasmic beta-glucosidase that can hydrolyze
          beta-D-glucosides; in this batch it is boundary context rather than
          evidence for a flavonoid-specific glycosidase route.
        annotons:
          - id: bglX_beta_glucosidase
            label: "bglX: periplasmic beta-glucosidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bglX
            function:
              preferred_term: beta-glucosidase activity
              term:
                id: GO:0008422
                label: beta-glucosidase activity
            role_description: Broad beta-glucosidase side node that may overlap glycoside-containing substrate maps.
    - order: 3
      role: PP_3195-PP_3206 candidate aromatic-compound cluster
      node:
        id: pp3195_pp3206_candidate_cluster
        label: PP_3195-PP_3206 candidate aromatic-compound cluster
        module_type: METABOLIC_PATHWAY
        description: >-
          The PP_3195-PP_3206 cluster contains proteins whose domains are
          compatible with hydrolase, redox, cupin, and dehydratase chemistry,
          but GOA/UniProt currently do not resolve a flavonoid substrate or a
          complete route.
        annotons:
          - id: PP_3195_s9_hydrolase_candidate
            label: "PP_3195: S9 peptidase/alpha-beta hydrolase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3195
            function:
              preferred_term: serine-type peptidase activity
              term:
                id: GO:0008236
                label: serine-type peptidase activity
            role_description: Predicted S9-family hydrolase/peptidase; substrate not resolved.
          - id: PP_3197_glyoxalase_voc_candidate
            label: "PP_3197: glyoxalase/VOC-family candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3197
            role_description: Glyoxalase/VOC-family protein with no fetched GOA rows.
          - id: PP_3198_rieske_ferredoxin
            label: "PP_3198: Rieske 2Fe-2S ferredoxin"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3198
            role_description: Rieske electron-transfer candidate; partner oxygenase or redox enzyme unresolved.
          - id: PP_3204_cupin_candidate
            label: "PP_3204: cupin-domain candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3204
            role_description: Cupin-domain protein with unresolved catalytic role.
          - id: PP_3205_faa_hydrolase_candidate
            label: "PP_3205: fumarylacetoacetase-like hydrolase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3205
            role_description: Fumarylacetoacetase-like hydrolase-family protein; substrate not resolved.
          - id: PP_3206_nad_epimerase_dehydratase_candidate
            label: "PP_3206: NAD-dependent epimerase/dehydratase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3206
            role_description: NAD-dependent epimerase/dehydratase-family protein with unresolved substrate.
  notes: >-
    The first-pass interpretation is candidate aromatic-compound boundary
    chemistry, not a satisfiable flavonoid-degradation pathway. Gene-level
    reviews should stay conservative until substrate-specific enzymology or
    pathway-genetics evidence links this cluster to flavonoid-derived compounds.
