      The 30 kDa Q-module core subunit (UniProtKB:O75489, GO:0005198) matches the completed human NDUFS3 review.
  - source_id: file:human/NDUFS6/NDUFS6-ai-review.yaml
    title: NDUFS6 gene review (human)
