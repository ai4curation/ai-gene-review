  notes: >-
    Catalytic core of mitochondrial respiratory Complex I (NADH:ubiquinone oxidoreductase),
    grounded to the human N-module subunits NDUFV1 (UniProtKB:P49821, GO:0003954), NDUFV2 (P19404,
    GO:0008137), NDUFS1 (P28331, GO:0009055) and accessory NDUFS6 (O75380, GO:0005198); the Q-module
    subunits NDUFS2 (O75306, GO:0048039), NDUFS3 (O75489, GO:0005198), NDUFS7 (O75251, GO:0008137 +
    N2 [4Fe-4S]), NDUFS8 (O00217, GO:0051539) and accessory NDUFA9 (Q16795, GO:0005198); and the
    peripheral-arm assembly subunit NDUFS4 (O43181). GO molecular-function/BP/location terms were
    taken from the completed human gene reviews and verified against the local go.db; the catalytic
    reaction (R-HSA-163217) was verified against the local reactome cache. The complex is modelled as
    N-module and Q-module PROTEIN_COMPLEX nodes plus an assembly-accessory node; only the
    cofactor-bearing subunits carry redox/catalytic MFs (NDUFV1 FMN/NADH, NDUFV2/NDUFS7 Fe-S/NADH
    dehydrogenase, NDUFS8 [4Fe-4S], NDUFS1 electron transfer, NDUFS2 quinone binding), while the
    cofactor-less core (NDUFS3) and accessory subunits (NDUFS6, NDUFA9, NDUFS4) are structural.
    The full holo-Complex I additionally has ~30 more accessory subunits and the mtDNA-encoded
    membrane-arm ND subunits (MT-ND1-6/4L), plus dedicated assembly factors (NDUFAF1-8, etc.) — a
    further module. The current Complex I membership term is GO:0045271 (GO:0005747 obsolete);
    Complex I feeds electrons to ubiquinone shared with Complex II, then to Complex III (bc1) →
    cytochrome c → Complex IV. Disorders: mitochondrial complex I deficiency (the commonest OXPHOS
    defect) — Leigh syndrome (NDUFS4/S7/S8, NDUFV1), leukoencephalopathy, fatal infantile lactic
    acidosis (NDUFS6), encephalocardiomyopathy (NDUFV2) and others.
