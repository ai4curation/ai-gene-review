id: MODULE:mitochondrial_complex_i_core
title: Mitochondrial respiratory Complex I core (NADH:ubiquinone oxidoreductase) — catalytic N and Q modules; NDUFV1/NDUFV2/NDUFS1-3/NDUFS6-8/NDUFA9
description: >-
  Respiratory Complex I (NADH:ubiquinone oxidoreductase) is the largest enzyme of the electron
  transport chain and its main entry point: it oxidises NADH, passes the electrons through a
  chain of flavin and iron-sulfur cofactors to reduce ubiquinone, and uses the energy released to
  pump four protons across the inner membrane. This module covers the catalytic core of the
  L-shaped peripheral (matrix) arm — the seven conserved "core" nuclear subunits plus the closely
  associated flavoprotein subunits — organised into two functional modules. The N-module
  (NADH-oxidising) holds the flavin site: NDUFV1 (51 kDa) binds FMN and the NADH substrate,
  NDUFV2 (24 kDa) carries the first [2Fe-2S] cluster (N1a), and NDUFS1 (75 kDa) provides further
  Fe-S clusters, forming the flavoprotein (FP) subcomplex with the accessory NDUFS6. The Q-module
  (ubiquinone-reducing) forms the wire to the quinone site: NDUFS2 (49 kDa) and NDUFS3 (30 kDa)
  are cofactor-less core subunits shaping the ubiquinone cavity, NDUFS7 (PSST) coordinates the
  terminal [4Fe-4S] cluster N2 that donates electrons to ubiquinone, NDUFS8 (TYKY) carries the
  N6a/N6b [4Fe-4S] clusters of the electron-transfer wire, and the accessory NDUFA9 (SDR-fold,
  structural NADPH) stabilises the Q-module/membrane-arm junction; NDUFS4 is an accessory subunit
  required for assembly and stability of the whole peripheral arm. Inherited defects in these
  core subunits are among the commonest causes of mitochondrial complex I deficiency — typically
  Leigh syndrome, leukoencephalopathy, fatal infantile lactic acidosis or encephalocardiomyopathy.
status: DRAFT
evidence:
  - source_id: GO:0006120
    title: mitochondrial electron transport, NADH to ubiquinone
    statement: >-
      The module is grounded in mitochondrial electron transport, NADH to ubiquinone (GO:0006120) —
      the reaction catalysed by Complex I.
  - source_id: GO:0032981
    title: mitochondrial respiratory chain complex I assembly
    statement: >-
      The core subunits define the catalytic peripheral arm whose assembly is
      mitochondrial respiratory chain complex I assembly (GO:0032981).
  - source_id: Reactome:R-HSA-163217
    title: Complex I oxidises NADH to NAD+, reduces CoQ to CoQH2
    statement: >-
      The catalytic reaction follows the human Reactome "Complex I oxidises NADH to NAD+, reduces
      CoQ to CoQH2" reaction (R-HSA-163217).
  - source_id: file:human/NDUFV1/NDUFV1-ai-review.yaml
    title: NDUFV1 gene review (human)
    statement: >-
      The FMN/NADH catalytic subunit (UniProtKB:P49821, GO:0003954) matches the previously completed
      human NDUFV1 review (on main).
  - source_id: file:human/NDUFS1/NDUFS1-ai-review.yaml
    title: NDUFS1 gene review (human)
    statement: >-
      The 75 kDa Fe-S electron-transfer subunit (UniProtKB:P28331, GO:0009055) matches the previously
      completed human NDUFS1 review (on main).
  - source_id: file:human/NDUFS2/NDUFS2-ai-review.yaml
