id: MODULE:retinoid_visual_cycle
title: Retinoid visual cycle (11-cis-retinal regeneration across RPE and photoreceptors)
description: >-
  Vision depends on continuous regeneration of the 11-cis-retinal chromophore that photobleaches to
  all-trans-retinal each time a photon isomerizes a visual pigment. The classical (RPE) visual cycle recycles
  it across the photoreceptor and retinal-pigment-epithelium (RPE) cells. In photoreceptors, light isomerizes
  11-cis-retinal bound to opsin to all-trans-retinal, which is released and reduced to all-trans-retinol by
  NADPH-dependent retinol dehydrogenases (RDH8 in the outer segment, RDH12 in the inner segment; this also
  detoxifies the reactive aldehyde). All-trans-retinol travels to the RPE, where lecithin:retinol
  acyltransferase (LRAT) esterifies it to all-trans-retinyl ester (the pathway's storage/committed form). The
  central RPE enzyme RPE65 then carries out the coupled ester-hydrolysis and trans-to-cis isomerization,
  producing 11-cis-retinol, which the NAD+-dependent 11-cis-retinol dehydrogenase RDH5 oxidizes to
  11-cis-retinal for return to photoreceptors and recombination with opsin. The cellular retinaldehyde-binding
  protein RLBP1 (CRALBP) chaperones the hydrophobic 11-cis-retinoids through these steps, and RGR, an
  opsin-family photoisomerase in RPE/Muller cells, provides a light-driven route regenerating 11-cis-retinal
  from all-trans-retinal. RDH11 contributes broad retinaldehyde-reductase activity, and DHRS3 buffers
  retinaldehyde/retinoic-acid levels. Defects across the cycle cause inherited retinal dystrophies: RPE65 and
  LRAT (Leber congenital amaurosis, the RPE65 form treated by voretigene neparvovec gene therapy), RDH12
  (LCA13), RDH5 (fundus albipunctatus), RLBP1 (retinitis punctata albescens / Bothnia dystrophy) and RGR
  (retinitis pigmentosa).
status: DRAFT
evidence:
  - source_id: GO:0007601
    title: visual perception
    statement: The visual cycle regenerates the 11-cis-retinal chromophore required for visual perception (GO:0007601).
  - source_id: GO:0042572
    title: retinol metabolic process
    statement: LRAT/RPE65/RDH5/RDH8/RDH11/RDH12/DHRS3 interconvert retinol/retinal/retinyl-ester (GO:0042572).
  - source_id: file:human/LRAT/LRAT-ai-review.yaml
    title: LRAT gene review (human)
    statement: The retinol->retinyl-ester step (UniProtKB:O95237, GO:0047173) matches the completed human LRAT review.
  - source_id: file:human/RPE65/RPE65-ai-review.yaml
    title: RPE65 gene review (human)
    statement: The retinyl-ester->11-cis-retinol isomerohydrolase step (UniProtKB:Q16518, GO:0052885) matches the completed human RPE65 review.
  - source_id: file:human/RDH5/RDH5-ai-review.yaml
    title: RDH5 gene review (human)
    statement: The 11-cis-retinol->11-cis-retinal step (UniProtKB:Q92781, GO:0106429) matches the completed human RDH5 review.
  - source_id: file:human/RDH8/RDH8-ai-review.yaml
    title: RDH8 gene review (human)
    statement: The photoreceptor all-trans-retinal->retinol reduction step (UniProtKB:Q9NYR8, GO:0052650) matches the completed human RDH8 review.
  - source_id: file:human/RDH11/RDH11-ai-review.yaml
    title: RDH11 gene review (human)
    statement: The broad retinaldehyde reductase step (UniProtKB:Q8TC12, GO:0052650) matches the completed human RDH11 review.
  - source_id: file:human/RDH12/RDH12-ai-review.yaml
    title: RDH12 gene review (human)
    statement: The photoreceptor all-trans-retinal reductase step (UniProtKB:Q96NR8, GO:0052650) matches the completed human RDH12 review.
  - source_id: file:human/RLBP1/RLBP1-ai-review.yaml
    title: RLBP1 gene review (human)
    statement: The 11-cis-retinoid carrier role (UniProtKB:P12271, GO:0005502) matches the completed human RLBP1 review.
  - source_id: file:human/RGR/RGR-ai-review.yaml
    title: RGR gene review (human)
    statement: The light-driven all-trans->11-cis-retinal photoisomerase role (UniProtKB:P47804, GO:0016859) matches the completed human RGR review.
  - source_id: file:human/DHRS3/DHRS3-ai-review.yaml
    title: DHRS3 gene review (human)
    statement: The all-trans-retinaldehyde reductase / retinoid-buffer step (UniProtKB:O75911, GO:0052650) matches the completed human DHRS3 review.
module:
  id: retinoid_visual_cycle
  label: Retinoid visual cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: visual perception
      term:
        id: GO:0007601
        label: visual perception
      description: Regeneration of 11-cis-retinal sustains rhodopsin/cone-opsin and thus vision.
    - preferred_term: retinol metabolic process
      term:
        id: GO:0042572
        label: retinol metabolic process
      description: Interconversion of retinol, retinal, retinyl ester and their cis/trans isomers.
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: LRAT, RPE65, RDH5 and RGR act at the RPE ER/microsomal membrane.
      - preferred_term: photoreceptor outer segment
        term:
          id: GO:0001750
          label: photoreceptor outer segment
        description: RDH8 reduces photobleached all-trans-retinal in the photoreceptor outer segment.
  parts:
    - order: 1
      role: photoreceptor all-trans-retinal reduction (post-bleach clearance)
      node:
        id: photoreceptor_atral_reduction
        label: Photoreceptor retinol dehydrogenases (RDH8/RDH12)
        module_type: REACTION
        annotons:
          - id: rdh8_12_activity
            label: "RDH8/RDH12: all-trans-retinal reductase (NADPH)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: photoreceptor retinol dehydrogenase (SDR) family
                term:
                  id: PANTHER:PTHR43157
                  label: RETINOL DEHYDROGENASE
                representative_members:
                  - preferred_term: RDH8 (human; outer segment)
                    term:
                      id: UniProtKB:Q9NYR8
                      label: Retinol dehydrogenase 8
                  - preferred_term: RDH12 (human; inner segment)
                    term:
                      id: UniProtKB:Q96NR8
                      label: Retinol dehydrogenase 12
            function:
              preferred_term: all-trans-retinol dehydrogenase (NADP+) activity
              term:
                id: GO:0052650
                label: all-trans-retinol dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: all-trans-retinal (from photobleached opsin)
                - preferred_term: NADPH
              products:
                - preferred_term: all-trans-retinol
                - preferred_term: NADP+
              evidence:
                - source_id: file:human/RDH8/RDH8-ai-review.yaml
                  statement: NADPH-dependent SDRs reducing all-trans-retinal to all-trans-retinol in photoreceptors (RDH8 outer segment, RDH12 inner segment); detoxify the reactive aldehyde; RDH12 loss = LCA13
            locations:
              - preferred_term: photoreceptor outer segment
                term:
                  id: GO:0001750
                  label: photoreceptor outer segment
            role_description: Reduce photobleached all-trans-retinal to all-trans-retinol (NADPH).
    - order: 2
      role: retinol esterification (storage/commitment)
      node:
        id: retinol_esterification
        label: Lecithin:retinol acyltransferase (LRAT)
        module_type: REACTION
        annotons:
          - id: lrat_activity
            label: "LRAT: lecithin:retinol acyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: LRAT / NlpC-P60 acyltransferase family
                term:
                  id: PANTHER:PTHR46678
                  label: LECITHIN RETINOL ACYLTRANSFERASE
                representative_members:
                  - preferred_term: LRAT (human)
                    term:
                      id: UniProtKB:O95237
                      label: Lecithin retinol acyltransferase
            function:
              preferred_term: phosphatidylcholine-retinol O-acyltransferase activity
              term:
                id: GO:0047173
                label: phosphatidylcholine-retinol O-acyltransferase activity
              substrates:
                - preferred_term: all-trans-retinol
                - preferred_term: phosphatidylcholine (lecithin)
              products:
                - preferred_term: all-trans-retinyl ester
                - preferred_term: 2-acyl-sn-glycero-3-phosphocholine
              evidence:
                - source_id: file:human/LRAT/LRAT-ai-review.yaml
                  statement: Transfers an acyl group from lecithin to all-trans-retinol, making the retinyl ester that is the storage form and the RPE65 substrate; LRAT loss = LCA14/early-onset retinal dystrophy
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Esterify all-trans-retinol to all-trans-retinyl ester (RPE).
    - order: 3
      role: isomerohydrolysis (the committed RPE isomerization)
      node:
        id: isomerohydrolysis
        label: Retinoid isomerohydrolase (RPE65)
        module_type: REACTION
        annotons:
          - id: rpe65_activity
            label: "RPE65: retinyl-ester 11-cis isomerohydrolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RPE65 / carotenoid-oxygenase family
                term:
                  id: PANTHER:PTHR10543
                  label: RETINOID ISOMEROHYDROLASE
                representative_members:
                  - preferred_term: RPE65 (human)
                    term:
                      id: UniProtKB:Q16518
                      label: Retinoid isomerohydrolase
            function:
              preferred_term: all-trans-retinyl-ester hydrolase, 11-cis retinol forming activity
              term:
                id: GO:0052885
                label: all-trans-retinyl-ester hydrolase, 11-cis retinol forming activity
              substrates:
                - preferred_term: all-trans-retinyl ester (Fe2+ cofactor)
              products:
                - preferred_term: 11-cis-retinol
                - preferred_term: fatty acid
              evidence:
                - source_id: file:human/RPE65/RPE65-ai-review.yaml
                  statement: Iron-dependent RPE enzyme coupling ester hydrolysis + all-trans->11-cis isomerization to make 11-cis-retinol; RPE65-LCA2 is the target of voretigene neparvovec (Luxturna)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Hydrolyse + isomerize all-trans-retinyl ester to 11-cis-retinol (committed step).
    - order: 4
      role: 11-cis-retinol oxidation to chromophore
      node:
        id: cis_retinol_oxidation
        label: 11-cis retinol dehydrogenase (RDH5)
        module_type: REACTION
        annotons:
          - id: rdh5_activity
            label: "RDH5: 11-cis retinol dehydrogenase (NAD+)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RDH5 / 11-cis retinol dehydrogenase (SDR) family
                term:
                  id: PANTHER:PTHR43313
                  label: 11-CIS RETINOL DEHYDROGENASE
                representative_members:
                  - preferred_term: RDH5 (human)
                    term:
                      id: UniProtKB:Q92781
                      label: 11-cis retinol dehydrogenase
            function:
              preferred_term: 11-cis-retinol dehydrogenase (NAD+) activity
              term:
                id: GO:0106429
                label: 11-cis-retinol dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: 11-cis-retinol
                - preferred_term: NAD+
              products:
                - preferred_term: 11-cis-retinal (chromophore)
                - preferred_term: NADH
              evidence:
                - source_id: file:human/RDH5/RDH5-ai-review.yaml
                  statement: NAD+-dependent SDR oxidizing 11-cis-retinol to the 11-cis-retinal chromophore in the RPE; deficiency = fundus albipunctatus (delayed dark adaptation)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Oxidize 11-cis-retinol to 11-cis-retinal (final chromophore).
    - order: 5
      role: 11-cis retinoid chaperone (carrier)
      node:
        id: cralbp_carrier
        label: Cellular retinaldehyde-binding protein (RLBP1)
        module_type: REACTION
        annotons:
          - id: rlbp1_activity
            label: "RLBP1 (CRALBP): 11-cis-retinoid carrier"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RLBP1 / CRAL-TRIO (Sec14-like) retinoid-carrier family
                term:
                  id: PANTHER:PTHR10174
                  label: RETINALDEHYDE-BINDING PROTEIN
                representative_members:
                  - preferred_term: RLBP1 (human)
                    term:
                      id: UniProtKB:P12271
                      label: Retinaldehyde-binding protein 1
            processes:
              - preferred_term: visual perception
                term:
                  id: GO:0007601
                  label: visual perception
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Non-catalytic 11-cis-retinal/retinol carrier (GO:0005502/GO:0019841 binding) that chaperones
              the hydrophobic 11-cis-retinoids between RPE65, RDH5 and the photoreceptors, enhancing
              visual-cycle flux; loss = retinitis punctata albescens / Bothnia dystrophy.
    - order: 6
      role: light-driven photoisomerase (alternative regeneration)
      node:
        id: photoisomerase
        label: RPE-retinal photoisomerase (RGR)
        module_type: REACTION
        annotons:
          - id: rgr_activity
            label: "RGR: retinal photoisomerase (opsin family)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RGR / opsin (retinal G protein-coupled receptor) family
                term:
                  id: PANTHER:PTHR24240
                  label: RETINAL G PROTEIN-COUPLED RECEPTOR
                representative_members:
                  - preferred_term: RGR (human)
                    term:
                      id: UniProtKB:P47804
                      label: RPE-retinal G protein-coupled receptor
            function:
              preferred_term: cis-trans isomerase (retinal photoisomerase) activity
              term:
                id: GO:0016859
                label: cis-trans isomerase activity
              substrates:
                - preferred_term: all-trans-retinal (bound chromophore; light)
              products:
                - preferred_term: 11-cis-retinal
              evidence:
                - source_id: file:human/RGR/RGR-ai-review.yaml
                  statement: Opsin-family 7TM photopigment binding all-trans-retinal (GO:0005503); on illumination photoisomerizes it to 11-cis-retinal (light-driven complement to RPE65); RGR loss = retinitis pigmentosa RP44 (no consistent G-protein signalling)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Light-driven photoisomerization of all-trans- to 11-cis-retinal (RPE/Muller).
    - order: 7
      role: broad retinaldehyde reductase (visual cycle support)
      node:
        id: retinaldehyde_reductase
        label: Retinol dehydrogenase 11 (RDH11)
        module_type: REACTION
        annotons:
          - id: rdh11_activity
            label: "RDH11: retinaldehyde reductase (NADPH)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RDH11 / retinaldehyde reductase (SDR) family
                term:
                  id: PANTHER:PTHR43157
                  label: RETINOL DEHYDROGENASE
                representative_members:
                  - preferred_term: RDH11 (human)
                    term:
                      id: UniProtKB:Q8TC12
                      label: Retinol dehydrogenase 11
            function:
              preferred_term: all-trans-retinol dehydrogenase (NADP+) activity
              term:
                id: GO:0052650
                label: all-trans-retinol dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: all-trans- and cis-retinaldehydes
                - preferred_term: NADPH
              products:
                - preferred_term: the corresponding retinols
                - preferred_term: NADP+
              evidence:
                - source_id: file:human/RDH11/RDH11-ai-review.yaml
                  statement: Broad-specificity NADPH-dependent retinaldehyde reductase (also 11-cis, GO:0102354) supporting the RPE visual cycle and retinoid homeostasis
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Reduce all-trans/cis retinaldehydes to retinols (NADPH; cycle support).
    - order: 8
      role: retinaldehyde/retinoic-acid buffering
      node:
        id: retinoid_buffering
        label: Retinaldehyde reductase (DHRS3)
        module_type: REACTION
        annotons:
          - id: dhrs3_activity
            label: "DHRS3: all-trans-retinaldehyde reductase (NADPH)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DHRS3 / retinaldehyde reductase (SDR) family
                term:
                  id: PANTHER:PTHR24322
                  label: DEHYDROGENASE/REDUCTASE SDR MEMBER 3
                representative_members:
                  - preferred_term: DHRS3 (human)
                    term:
                      id: UniProtKB:O75911
                      label: Dehydrogenase/reductase SDR family member 3
            function:
              preferred_term: all-trans-retinol dehydrogenase (NADP+) activity
              term:
                id: GO:0052650
                label: all-trans-retinol dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: all-trans-retinaldehyde
                - preferred_term: NADPH
              products:
                - preferred_term: all-trans-retinol
                - preferred_term: NADP+
              evidence:
                - source_id: file:human/DHRS3/DHRS3-ai-review.yaml
                  statement: NADPH-dependent all-trans-retinaldehyde reductase; RA-inducible negative-feedback buffer on retinaldehyde/retinoic-acid levels (mutually activating with RDH10); essential in development
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Reduce all-trans-retinaldehyde to retinol (buffers RA supply).
  connections:
    - source: photoreceptor_atral_reduction
      target: retinol_esterification
      connection_type: PROVIDES_INPUT_FOR
      description: The all-trans-retinol made in photoreceptors travels to the RPE and is esterified by LRAT.
    - source: retinol_esterification
      target: isomerohydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: The all-trans-retinyl ester is the substrate for the RPE65 isomerohydrolase.
    - source: isomerohydrolysis
      target: cis_retinol_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: The 11-cis-retinol made by RPE65 is oxidized by RDH5 to 11-cis-retinal.
    - source: cralbp_carrier
      target: cis_retinol_oxidation
      connection_type: POSITIVELY_REGULATES
      description: CRALBP (RLBP1) presents 11-cis-retinol to RDH5 and carries 11-cis-retinoids, enhancing cycle flux.
    - source: photoisomerase
      target: cis_retinol_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: RGR photoisomerizes all-trans- to 11-cis-retinal, an alternative light-driven source of the chromophore.
  notes: >-
    Retinoid visual cycle (GO:0007601 + GO:0042572), grounded to nine completed human gene reviews.
    PHOTORECEPTOR arm: RDH8 (Q9NYR8 outer segment) + RDH12 (Q96NR8 inner segment; LCA13) share PTHR43157,
    GO:0052650 NADPH all-trans-retinal reductase (post-bleach clearance/detox). RPE arm: all-trans-retinol ->
    LRAT (O95237 PTHR46678, GO:0047173 retinyl-ester synthesis; LCA14) -> RPE65 (Q16518 PTHR10543, GO:0052885
    Fe-dependent isomerohydrolase, the committed all-trans->11-cis step; LCA2 = Luxturna target) -> RDH5
    (Q92781 PTHR43313, GO:0106429 NAD+ 11-cis-retinol DH -> 11-cis-retinal; fundus albipunctatus). CARRIERS/
    ALT: RLBP1/CRALBP (P12271 PTHR10174, non-catalytic GO:0005502/GO:0019841 11-cis-retinoid carrier,
    `processes`; retinitis punctata albescens) and RGR (P47804 PTHR24240, opsin-family light-driven
    photoisomerase GO:0016859 + GO:0005503 all-trans-retinal binding; RP44 — GPCR-signalling annotations are
    family over-propagations, no consistent G-protein coupling). SUPPORT: RDH11 (Q8TC12, same PTHR43157,
    broad NADPH retinaldehyde reductase) and DHRS3 (O75911 PTHR24322, GO:0052650, RA-feedback buffer with
    RDH10). Recurrent curation catch: the SDR reviews corrected many all-trans-retinol-DH (NAD+, GO:0004745)
    IEAs to the cofactor-accurate NADP+ term GO:0052650 (or NAD+ GO:0106429 for RDH5); steroid-DH side
    activities kept non-core. GO term ids/labels verified against the local go.db. The retinyl esters link to
    retinoid storage; retinaldehyde also feeds retinoic-acid synthesis (ALDH1A, separate). Disorders: RPE65/
    LRAT/RDH12 LCA; RDH5 fundus albipunctatus; RLBP1 Bothnia dystrophy; RGR RP44.
