id: MODULE:osmoregulated_periplasmic_glucan_biosynthesis
title: Osmoregulated periplasmic glucan biosynthesis
description: >-
  A reusable Gram-negative bacterial module for biosynthesis of the
  osmoregulated periplasmic glucan backbone by an OpgH-family inner-membrane
  glucosyltransferase and an OpgG/MdoG-family periplasmic glucan maturation
  protein. Pseudomonas putida KT2440 opgH/PP_5025 and opgG/PP_5026 provide
  local exemplars for the two core steps.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00637
    title: UniPathway UPA00637
    statement: >-
      The local UPA00637 membership set contains opgH and opgG as the two
      KT2440 primary genes for osmoregulated periplasmic glucan biosynthesis.
  - source_id: GO:1900727
    title: osmoregulated periplasmic glucan biosynthetic process
    statement: >-
      GO:1900727 is the specific GO biological-process term for formation of
      osmoregulated periplasmic glucan and is more precise than generic glucan
      or carbohydrate biosynthetic-process terms.
  - source_id: PMID:37735577
    title: Identification of enzymatic functions of osmo-regulated periplasmic glucan biosynthesis proteins from Escherichia coli reveals a novel glycoside hydrolase family.
    statement: >-
      Primary biochemical and structural analysis of E. coli OpgG/OpgD showed
      OpgG beta-1,2-glucanase activity and established the GH186 family,
      grounding ISS transfer of GO:0033913 to P. putida OpgG.
  - source_id: PMID:17906125
    title: Linear osmoregulated periplasmic glucans are encoded by the opgGH locus of Pseudomonas aeruginosa.
    statement: >-
      Closely related P. aeruginosa opgGH produces linear beta-1,2-linked OPGs
      and provides the nearest Pseudomonas pathway context for KT2440 opgG/opgH.
  - source_id: PMID:15313617
    title: Structural analysis of Escherichia coli OpgG, a protein required for the biosynthesis of osmoregulated periplasmic glucans.
    statement: >-
      The E. coli OpgG structure identified a carbohydrate-related beta-sandwich
      domain with an aromatic/acidic cleft, supporting the catalytic-family
      context later resolved by GH186 biochemical work.
  - source_id: file:PSEPK/opgH/opgH-ai-review.yaml
    title: Curated opgH review
    statement: >-
      The opgH review accepts inner-membrane localization and modifies broad
      glucan biosynthesis and hexosyltransferase annotations to OPG
      biosynthesis and glucosyltransferase activity.
  - source_id: file:PSEPK/opgH/opgH-deep-research-openscientist.md
    title: OpenScientist gene research for opgH
    statement: >-
      OpenScientist supports OpgH as a UDP-glucose-dependent inner-membrane
      GT2/OpgH-family glucosyltransferase for OPG backbone synthesis and flags
      FtsZ moonlighting as untested in KT2440.
  - source_id: file:PSEPK/opgG/opgG-ai-review.yaml
    title: Curated opgG review
    statement: >-
      The opgG review keeps carbohydrate binding as non-core, identifies
      beta-1,2-glucanase activity as the core molecular function, and accepts
      Gram-negative periplasmic localization while modifying broad
      carbohydrate/glucan process terms to OPG biosynthesis.
  - source_id: file:PSEPK/opgG/opgG-deep-research-openscientist.md
    title: OpenScientist gene research for opgG
    statement: >-
      OpenScientist integrates the primary OpgG/OpgD literature with sequence
      conservation and opgGH operon context for P. putida OpgG.
  - source_id: file:modules/osmoregulated_periplasmic_glucan_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module research for osmoregulated periplasmic glucan biosynthesis
    statement: >-
      OpenScientist module-level research supports UPA00637 as the conserved
      OpgH/OpgG OPG-backbone module and separates it from OPG decoration,
      Ndv/Chv cyclic-glucan routes, and the distinct BcsA-like cyclic
      beta-1,3-glucan system.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__osmoregulated_periplasmic_glucan_biosynthesis__upa00637-deep-research-openscientist.md
    title: OpenScientist species-aware pathway research for PSEPK UPA00637
    statement: >-
      OpenScientist species-aware research supports UPA00637 as a covered KT2440
      backbone module with adjacent opgH and opgG, while keeping accessory OPG
      tailoring genes outside this module's scope.
notes: >-
  First-pass interpretation: UPA00637 is satisfiable as a compact two-gene OPG
  biosynthesis module in KT2440. OpgH is the multi-pass inner-membrane
  glucosyltransferase, while OpgG is a Sec-exported periplasmic OpgD/OpgG-family
  beta-1,2-glucanase inferred from characterized orthologs. Accessory OPG
  decoration or chain-length-control genes are outside this backbone module.
  Direct KT2440 biochemical evidence and the exact division of labor between
  OpgH and OpgG remain follow-up questions.
module:
  id: osmoregulated_periplasmic_glucan_biosynthesis
  label: Osmoregulated periplasmic glucan biosynthesis
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: osmoregulated periplasmic glucan biosynthetic process
      term:
        id: GO:1900727
        label: osmoregulated periplasmic glucan biosynthetic process
      description: Formation of osmoregulated periplasmic glucan.
  parts:
    - order: 1
      role: Inner-membrane OPG glucosyltransferase
      node:
        id: opgH_opg_glucosyltransferase_step
        label: OpgH glucosyltransferase step
        module_type: REACTION
        description: >-
          OpgH is the multi-pass inner-membrane glycosyltransferase 2-family
          protein that uses UDP-glucose to supply glucosyltransferase activity
          for OPG backbone biosynthesis.
        annotons:
          - id: opgH_glucosyltransferase
            label: "opgH: OPG glucosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: OpgH-family glucosyltransferase
                term:
                  id: InterPro:IPR023725
                  label: Glucans_biosynth_gluTrFase_H
                description: >-
                  OpgH/MdoH-family GT2 inner-membrane glucosyltransferases
                  that build the osmoregulated periplasmic glucan backbone from
                  UDP-glucose.
                representative_members:
                  - preferred_term: PSEPK opgH exemplar
                    term:
                      id: UniProtKB:Q88D04
                      label: Glucans biosynthesis glucosyltransferase H
                    description: Pseudomonas putida KT2440 opgH/PP_5025.
            function:
              preferred_term: glucosyltransferase activity
              term:
                id: GO:0046527
                label: glucosyltransferase activity
              substrates:
                - preferred_term: UDP-glucose
                - preferred_term: growing beta-glucan acceptor
              products:
                - preferred_term: nascent osmoregulated periplasmic glucan backbone
                - preferred_term: UDP
              evidence:
                - source_id: GO:0046527
                  statement: >-
                    GO:0046527 captures OpgH's glucosyltransferase molecular
                    function more specifically than the seeded parent term
                    GO:0016758.
                - source_id: file:PSEPK/opgH/opgH-deep-research-openscientist.md
                  statement: >-
                    OpenScientist summarizes ortholog evidence that OpgH uses
                    UDP-glucose at the inner membrane to build the OPG
                    beta-glucan backbone; the KT2440 assignment remains
                    orthology-based rather than directly biochemical.
            processes:
              - preferred_term: osmoregulated periplasmic glucan biosynthetic process
                term:
                  id: GO:1900727
                  label: osmoregulated periplasmic glucan biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Inner-membrane glucosyltransferase component that builds the OPG
              backbone from UDP-glucose.
    - order: 2
      role: Periplasmic OPG biosynthesis protein
      node:
        id: opgG_periplasmic_glucan_biosynthesis_step
        label: OpgG periplasmic glucan biosynthesis step
        module_type: REACTION
        description: >-
          OpgG is a signal-peptide-bearing periplasmic OpgD/OpgG-family protein
          associated with OPG biosynthesis and beta-1,2-glucan backbone
          processing or maturation.
        annotons:
          - id: opgG_glucan_biosynthesis_factor
            label: "opgG: periplasmic OPG biosynthesis factor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: OpgG/MdoG-family periplasmic glucan maturation protein
                term:
                  id: InterPro:IPR023704
                  label: MdoG_OpgG
                description: >-
                  Periplasmic OpgG/MdoG-family proteins required for OPG
                  backbone maturation; characterized orthologs support
                  beta-1,2-glucan processing activity.
                representative_members:
                  - preferred_term: PSEPK opgG exemplar
                    term:
                      id: UniProtKB:Q88D03
                      label: Glucans biosynthesis protein G
                    description: Pseudomonas putida KT2440 opgG/PP_5026.
            function:
              preferred_term: glucan endo-1,2-beta-glucosidase activity
              term:
                id: GO:0033913
                label: glucan endo-1,2-beta-glucosidase activity
              substrates:
                - preferred_term: nascent osmoregulated periplasmic glucan backbone
              products:
                - preferred_term: shorter beta-1,2-linked glucan chains
                - preferred_term: beta-1,2-linked glucooligosaccharides
              evidence:
                - source_id: GO:0033913
                  statement: >-
                    GO:0033913 captures the beta-1,2-glucanase activity inferred
                    for OpgG from characterized OpgD/OpgG-family orthologs.
                - source_id: PMID:37735577
                  statement: >-
                    Primary biochemical work on E. coli OpgG/OpgD defines this
                    family as GH186 beta-1,2-glucanases; transfer to KT2440 OpgG
                    is supported by orthology and opgGH operon context but is
                    not direct KT2440 enzyme evidence.
            processes:
              - preferred_term: osmoregulated periplasmic glucan biosynthetic process
                term:
                  id: GO:1900727
                  label: osmoregulated periplasmic glucan biosynthetic process
            locations:
              - preferred_term: outer membrane-bounded periplasmic space
                term:
                  id: GO:0030288
                  label: outer membrane-bounded periplasmic space
            role_description: >-
              Periplasmic beta-1,2-glucanase that likely processes the OPG
              backbone during glucan maturation.
  knowledge_gaps:
    - gap_statement: >-
        The exact KT2440 biochemical roles of OpgH and OpgG, including donor,
        acceptor, linkage, chain-length, and branching effects, have not been
        resolved in this first pass.
      boundary: >-
        Keep the module scoped to OPG biosynthesis and avoid claiming a
        complete mechanistic division of labor until direct biochemical or
        genetic data are located.
      gap_kind:
        - BIOLOGY
        - CURATION
      status: OPEN
      provenance:
        - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__osmoregulated_periplasmic_glucan_biosynthesis__upa00637-deep-research-openscientist.md
          reference_section_type: RESULTS
          supporting_text: >-
            All KT2440 assignments are homology-inferred (PE3); there is **no
            direct KT2440 experimental OPG characterization** in the retrieved
            literature.
  connections:
    - source: opgH_opg_glucosyltransferase_step
      target: opgG_periplasmic_glucan_biosynthesis_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        OpgH-dependent inner-membrane glucan synthesis/translocation supplies
        the nascent beta-glucan backbone that periplasmic OpgG-family proteins
        process during OPG maturation.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        Family and operon evidence support material continuity between OpgH and
        OpgG, but the precise KT2440 glucan structure, OpgG cleavage products,
        and in-vivo contribution to OPG maturation remain open biochemical
        questions.
