              gene:
                preferred_term: acnB
            function:
              preferred_term: 2-methylisocitrate dehydratase activity
              term:
                id: GO:0047456
                label: 2-methylisocitrate dehydratase activity
            role_description: Organism-specific genetics support AcnB as the key methylcitrate-cycle dehydratase/hydratase node.
          - id: prpB_methylisocitrate_lyase
            label: "prpB: methylisocitrate lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prpB
            function:
              preferred_term: methylisocitrate lyase activity
              term:
                id: GO:0046421
                label: methylisocitrate lyase activity
            role_description: Cleaves 2-methylisocitrate to pyruvate and succinate.
    - order: 2
      role: Methylmalonate-semialdehyde and valine/thymine side routes
      node:
        id: methylmalonate_semialdehyde_valine_thymine_side_routes
        label: Methylmalonate-semialdehyde and valine/thymine side routes
        module_type: METABOLIC_PATHWAY
        description: >-
          MmsA paralogs and PP_0596 are linked to valine, thymine, beta-alanine,
          and biotin-adjacent chemistry that can feed propionyl-CoA-related
          intermediates. yqhD is retained only as broad alcohol-dehydrogenase
          side context pending substrate-specific evidence.
        annotons:
          - id: PP_0596_beta_alanine_pyruvate_transaminase
            label: "PP_0596: beta-alanine:pyruvate transaminase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0596
            function:
              preferred_term: beta-alanine:pyruvate transaminase activity
              term:
                id: GO:0016223
                label: beta-alanine:pyruvate transaminase activity
            role_description: Aminotransferase side route connecting beta-alanine/valine-thymine context.
          - id: mmsA_I_methylmalonate_semialdehyde_dehydrogenase
