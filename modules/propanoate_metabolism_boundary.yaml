          - id: PP_2217_enoyl_CoA_hydratase_side_context
            label: "PP_2217: enoyl-CoA hydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2217
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Enoyl-CoA hydratase-family side node.
    - order: 5
      role: ACC, BCKDH, and lipoamide overlap nodes
      node:
        id: ACC_BCKDH_lipoamide_overlap_nodes
        label: ACC, BCKDH, and lipoamide overlap nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          Acetyl-CoA carboxylase, branched-chain alpha-ketoacid dehydrogenase,
          and shared lipoamide E3 enzymes enter ppu00640 through acetyl-CoA,
          fatty-acid, and branched-chain amino-acid degradation intersections
