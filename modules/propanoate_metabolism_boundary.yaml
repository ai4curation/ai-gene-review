            participant:
              selector_type: GENE
              gene:
                preferred_term: yqhD
            function:
              preferred_term: alcohol dehydrogenase [NAD(P)+] activity
              term:
                id: GO:0018455
                label: alcohol dehydrogenase [NAD(P)+] activity
            role_description: Broad soluble alcohol dehydrogenase; physiological substrate in KT2440 remains unresolved.
    - order: 3
      role: Acetate, acetyl-CoA, TCA, and glyoxylate side context
      node:
        id: acetate_acetyl_CoA_TCA_glyoxylate_side_context
        label: Acetate, acetyl-CoA, TCA, and glyoxylate side context
        module_type: METABOLIC_PATHWAY
        description: >-
          Acetyl-CoA/acetate activation, succinyl-CoA synthetase, lipoamide
