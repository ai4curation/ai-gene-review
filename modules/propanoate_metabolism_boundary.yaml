          - id: lpd_dihydrolipoyl_dehydrogenase_side_context
            label: "lpd: dihydrolipoyl dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpd
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
            role_description: Lipoamide E3 side context for central-carbon dehydrogenase complexes.
    - order: 4
      role: Fatty-acid beta-oxidation and acyl-CoA side nodes
      node:
        id: fatty_acid_beta_oxidation_acyl_CoA_side_nodes
        label: Fatty-acid beta-oxidation and acyl-CoA side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          FadB, PaaF, Acd, PP_2213, and PP_2217 bring acyl-CoA thioester,
          hydratase, ligase, and dehydrogenase chemistry into the propanoate
          map through fatty-acid and phenylacetate/beta-oxidation overlap.
        annotons:
          - id: fadB_beta_oxidation_multifunctional_enzyme
            label: "fadB: beta-oxidation multifunctional enzyme"
