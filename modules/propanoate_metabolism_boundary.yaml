                label: dihydrolipoyl dehydrogenase (NADH) activity
            role_description: Shared E3/lipoamide side context for BCKDH and related complexes.
  notes: >-
    This module intentionally records boundary status. The highest-confidence
    propionate-specific route is the methylcitrate-cycle spine, with AcnB
    carrying organism-specific evidence for odd-chain fatty-acid growth. The
    remaining ppu00640 genes should be reviewed in their native modules unless
    direct propionate-specific evidence is available.
