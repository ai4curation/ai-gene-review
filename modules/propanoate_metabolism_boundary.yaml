id: MODULE:propanoate_metabolism_boundary
title: Propanoate metabolism boundary
description: >-
  Boundary module for KEGG ppu00640 in Pseudomonas putida KT2440. The
  organism-specific map combines the Prp/methylcitrate route for propionyl-CoA
  assimilation and detoxification with methylmalonate-semialdehyde and
  valine/thymine side routes, acetate/acyl-CoA activation, fatty-acid
  beta-oxidation, acetyl-CoA carboxylase, TCA/glyoxylate, and
  branched-chain/lipoamide complex overlap nodes. It is curated here as a set of
  separable pathway contexts rather than one linear propanoate pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00640
    title: Propanoate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00640 provides the PSEPK curation batch. Its membership spans a
      compact prp methylcitrate-cycle spine plus several central-carbon,
      fatty-acid, amino-acid, and lipoamide side nodes, so this module records
      pathway boundaries and step-level satisfiability.
module:
  id: propanoate_metabolism_boundary
  label: Propanoate metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: propionate catabolic process
      term:
        id: GO:0019543
        label: propionate catabolic process
      description: Propionate/propionyl-CoA assimilation through the methylcitrate-cycle route.
    - preferred_term: propionate-CoA ligase activity
      term:
        id: GO:0050218
        label: propionate-CoA ligase activity
      description: Propionate activation to propionyl-CoA by PrpE.
    - preferred_term: 2-methylcitrate synthase activity
      term:
        id: GO:0050440
        label: 2-methylcitrate synthase activity
      description: PrpC condensation of propionyl-CoA and oxaloacetate to 2-methylcitrate.
    - preferred_term: 2-methylcitrate dehydratase activity
      term:
        id: GO:0047547
        label: 2-methylcitrate dehydratase activity
      description: PrpD-family dehydration step in the methylcitrate route.
    - preferred_term: 2-methylisocitrate dehydratase activity
      term:
        id: GO:0047456
        label: 2-methylisocitrate dehydratase activity
      description: AcnB/aconitase-family methylcitrate-cycle dehydratase activity.
    - preferred_term: methylisocitrate lyase activity
      term:
        id: GO:0046421
        label: methylisocitrate lyase activity
      description: PrpB cleavage of 2-methylisocitrate to succinate and pyruvate.
    - preferred_term: methylmalonate-semialdehyde dehydrogenase activity
      term:
        id: GO:0004491
        label: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
      description: Valine/thymine-derived methylmalonate-semialdehyde side-route context.
    - preferred_term: acetyl-CoA carboxylase activity
      term:
        id: GO:0003989
        label: acetyl-CoA carboxylase activity
      description: Fatty-acid biosynthesis/acetyl-CoA side context carried in the KEGG boundary.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most soluble Prp, TCA, methylmalonate-semialdehyde, BCKDH, and lipoamide enzymes are cytoplasmic.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Some PSEPK reviews use cytosol for soluble enzyme localization in this batch.
  parts:
    - order: 1
      role: Prp methylcitrate-cycle spine
      node:
        id: prp_methylcitrate_cycle_spine
        label: Prp methylcitrate-cycle spine
        module_type: METABOLIC_PATHWAY
        description: >-
          PrpE, PrpC, PrpD/PrpF, AcnA-II/AcnB, and PrpB provide the direct
          propionyl-CoA-to-pyruvate/succinate methylcitrate-cycle chemistry.
          The AcnB review contains organism-specific evidence that AcnB is a
          key methylcitrate-cycle dehydratase/hydratase for growth on odd-chain
          fatty acids, while PrpD/AcnA-II/PrpF remain sequence-supported route
          members whose exact in vivo partition needs more evidence.
        annotons:
          - id: prpE_propionyl_CoA_synthetase
            label: "prpE: propionate-CoA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prpE
            function:
              preferred_term: propionate-CoA ligase activity
              term:
                id: GO:0050218
                label: propionate-CoA ligase activity
            role_description: Activates propionate to propionyl-CoA.
          - id: prpC_2_methylcitrate_synthase
            label: "prpC: 2-methylcitrate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prpC
            function:
              preferred_term: 2-methylcitrate synthase activity
              term:
                id: GO:0050440
                label: 2-methylcitrate synthase activity
            role_description: Condenses propionyl-CoA with oxaloacetate to form 2-methylcitrate.
          - id: prpD_2_methylcitrate_dehydratase
            label: "prpD: 2-methylcitrate dehydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prpD
            function:
              preferred_term: 2-methylcitrate dehydratase activity
              term:
                id: GO:0047547
                label: 2-methylcitrate dehydratase activity
            role_description: PrpD-family methylcitrate-route dehydratase; sequence-supported in KT2440.
          - id: prpF_methylaconitate_isomerase
            label: "prpF: PrpF-family methylaconitate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: prpF
            function:
              preferred_term: isomerase activity
              term:
                id: GO:0016853
                label: isomerase activity
            role_description: PrpF-family isomerase in the methylcitrate route; current GOA term is broad.
          - id: acnA_II_aconitase_methylcitrate_candidate
            label: "acnA-II: aconitase-family methylcitrate candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: acnA-II
            function:
              preferred_term: aconitate hydratase activity
              term:
                id: GO:0003994
                label: aconitate hydratase activity
            role_description: Aconitase-family enzyme with InterPro methylcitrate-cycle context.
          - id: acnB_bifunctional_aconitase_methylcitrate_dehydratase
            label: "acnB: bifunctional aconitase/methylcitrate dehydratase"
            participant:
