id: MODULE:integrin_fak_src_signaling
title: Integrin-FAK-SRC signaling pathway module
description: >-
  A compact integrin signaling module. Extracellular-matrix engagement clusters
  integrins, talin/kindlin link cytoplasmic integrin tails to actin, FAK/PTK2
  and SRC-family kinases are recruited and activated at focal adhesions, and
  adaptor scaffolds such as paxillin route the signal to Rho GTPase, MAPK, PI3K,
  migration, survival, and mechanotransduction outputs. The module is grounded
  in GO:0007229 and includes PAINT PTN anchors for the FAK/SRC tyrosine kinase
  tier where local IBD rows support the role.
status: DRAFT
evidence:
  - source_id: GO:0007229
    title: integrin-mediated signaling pathway
    statement: The module is grounded in the GO biological process term for integrin-mediated signaling.
