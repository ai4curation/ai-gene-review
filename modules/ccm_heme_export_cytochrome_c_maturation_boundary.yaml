id: MODULE:ccm_heme_export_cytochrome_c_maturation_boundary
title: CcmABCD heme export and cytochrome c maturation boundary
description: Boundary module for the Pseudomonas putida KT2440 PP_4324-PP_4327 CcmD-C-B-A heme-handling system from the KEGG ppu02010 ABC-transporter umbrella map, plus the separately curated PP_2150 ApbE-family flavinylation context from the cell-envelope/division partition. CcmB and CcmC are multi-pass inner-membrane heme-handling components, CcmD is a small inner-membrane CcmD-family protein, and CcmA is the ATP-binding energy-coupling subunit of CcmAB. PP_2150 is represented as an envelope flavoprotein maturation side context, not as a CcmABCD heme-export component.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes the PP_4324-PP_4327 ccmD/ccmC/ccmB/ccmA locus as a coherent Ccm heme-handling ABC-transporter sub-batch within the broad ABC-transporter umbrella map.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records cluster C58 as ccmD, ccmC, ccmB, and ccmA after first-pass curation.
- source_id: file:projects/P_PUTIDA/batches/module_cell_envelope_division_apbe_fmn_transferase_spillover.tsv
  title: PSEPK cell-envelope/division ApbE FMN transferase spillover batch
  statement: The cell-envelope/division partition separates PP_2150 from peptidoglycan, LPS, Mla, and divisome buckets and routes it to the Ccm/cytochrome-redox boundary module as ApbE-family envelope flavoprotein maturation context.
- source_id: UniProtKB:Q88EX8
  title: CcmD heme exporter protein D
  statement: UniProt names CcmD as heme exporter protein D, places it in the cell inner membrane, and describes it as required for heme export to the periplasm for c-type cytochrome biogenesis.
- source_id: UniProtKB:Q88EX7
  title: CcmC heme exporter protein C
  statement: UniProt names CcmC as heme exporter protein C and a cytochrome c-type biogenesis protein, places it in the cell inner membrane as a multi-pass membrane protein, and carries CcmC/CcsA-family cytochrome c biogenesis domains.
- source_id: UniProtKB:Q88EX6
  title: CcmB heme exporter protein B
  statement: UniProt names CcmB as heme exporter protein B, places it in the cell inner membrane as a multi-pass membrane protein, and carries CcmB cytochrome c biogenesis domains.
- source_id: UniProtKB:Q88EX5
  title: CcmA cytochrome c biogenesis ATP-binding export protein
  statement: Reviewed UniProt/HAMAP annotation names CcmA as the cytochrome c biogenesis ATP-binding export protein, states that it is part of the CcmAB ABC transporter complex, and notes that CcmA is responsible for energy coupling while its exact direct role is uncertain.
- source_id: UniProtKB:Q88KY9
  title: PP_2150 FAD:protein FMN transferase
  statement: UniProt names PP_2150 as a FAD:protein FMN transferase in the ApbE family, assigns EC 2.7.1.180, places it at the cell inner membrane on the periplasmic side, and records Mg/Mn cofactor context.
- source_id: file:PSEPK/PP_2150/PP_2150-ai-review.yaml
  title: PP_2150 first-pass GO review
  statement: The first-pass review accepts flavin transferase activity as the core molecular function, modifies the broad transferase annotation to that specific activity, keeps metal-ion binding as non-core cofactor context, and treats PP_2150 as related envelope flavoprotein maturation context.
