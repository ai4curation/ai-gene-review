notes: This boundary module was created from the ppu02010 ABC-transporter partition work and extended with the PP_2150 ApbE/FMNylylation singleton from the cell-envelope/division partition. It should remain distinct from porphyrin/heme biosynthesis modules and from terminal oxidase assembly modules; PP_4324-PP_4327 represent the Ccm heme-handling/export step needed for c-type cytochrome maturation, while PP_2150 is retained only as related envelope flavoprotein maturation context.
