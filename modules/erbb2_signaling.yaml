knowledge_gaps:
  - gap_statement: ERBB3 residual kinase activity remains unresolved in the ERBB2 signaling pathway 
      module.
    boundary: Although ERBB3 is classified as a pseudokinase, early studies demonstrated impaired 
      but not completely absent tyrosine kinase activity in purified preparations 
      (zhao2021trastuzumabblocksthe pages 14-14). Whether this residual activity is physiologically 
      meaningful or an artifact of expression systems remains debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/erbb2_signaling-deep-research-falcon.md
  - gap_statement: Ligand-dependent versus ligand-independent activation remains unresolved in the 
      ERBB2 signaling pathway module.
    boundary: Under physiological conditions, ERBB2 requires a ligand-bound partner for productive 
      signaling (kemmer2022disentanglingerbbsignaling pages 17-18).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/erbb2_signaling-deep-research-falcon.md
  - gap_statement: Determinants of activator-receiver asymmetry remains unresolved in the ERBB2 
      signaling pathway module.
    boundary: The cryo-EM structure of the HER2-HER3-NRG1beta complex revealed a dynamic dimer 
      interface (diwanji2021structuresofthe pages 1-3), and subsequent studies demonstrated that 
      activator/receiver preference in the asymmetric kinase dimer is determined primarily by 
      intracellular regions rather than extracellular domain asymmetry 
      (koivu2024transactivatingmutationsof pages 12-12).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/erbb2_signaling-deep-research-falcon.md
  - gap_statement: Therapeutic targeting of the NRG1-ERBB3 axis remains unresolved in the ERBB2 
      signaling pathway module.
    boundary: Whether HER3-directed therapy (e.g., seribantumab) or HER2-directed therapy is 
      superior for NRG1-fusion-driven cancers is being resolved by clinical trials.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/erbb2_signaling-deep-research-falcon.md
  - gap_statement: Compensatory pathway rewiring remains unresolved in the ERBB2 signaling pathway 
      module.
    boundary: The reciprocal activation between PI3K-AKT and RAS-ERK outputs upon selective pathway 
      inhibition is a well-established phenomenon that complicates monotherapy approaches 
      (pan2024her2pi3kaktpathwayin pages 3-4).
    gap_kind:
