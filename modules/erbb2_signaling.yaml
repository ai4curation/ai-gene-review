id: MODULE:erbb2_signaling
title: ERBB2 signaling pathway module
description: ERBB2/HER2 acts as a ligandless preferred dimerization partner for ERBB receptors, 
  especially ERBB3 after neuregulin binding, producing potent PI3K-AKT and MAPK output.
