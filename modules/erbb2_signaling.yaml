notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther. Falcon integration (2026-06-28): module-level Falcon findings were integrated as
  explicit evidence, structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open
  questions: ERBB3 residual kinase activity; Ligand-dependent versus ligand-independent activation; Determinants
  of activator-receiver asymmetry; Therapeutic targeting of the NRG1-ERBB3 axis; Compensatory pathway
  rewiring. Machine-generated Falcon citations remain curation support and are not manually adjudicated
  here.
