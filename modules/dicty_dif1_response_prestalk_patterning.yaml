id: MODULE:dicty_dif1_response_prestalk_patterning
title: Dictyostelium DIF-1 response and prestalk gene activation
description: >-
  The transcriptional response to the morphogen DIF-1 that specifies prestalk/
  stalk cell fate in Dictyostelium discoideum. DIF-1 (the chlorinated
  acylphloroglucinol produced by the dicty_dif1_biosynthesis module) is perceived
  by the basic-region leucine-zipper (bZIP) transcription factors DimA and DimB,
  which translocate to the nucleus and reprogram cell-type gene expression:
  DimA/DimB activate prestalk/stalk genes (the extracellular-matrix markers ecmA
  and ecmB) and repress prespore genes, so a cell exposed to DIF-1 commits to the
  prestalk pathway. The two bZIPs are partly redundant and heterodimerise, with
  DimB the principal activator of ecmB. This module is the RESPONSE arm; its input
  is the DIF-1 made by the separate biosynthesis module. OUT OF SCOPE: DIF-1
  biosynthesis (dicty_dif1_biosynthesis module), the STATa/CudA culmination
  circuit (CudA is only indirectly DIF-1-linked), and DIF-1 catabolism. Phrased
  over transcription-factor functions and family selectors with D. discoideum
  representatives.
status: DRAFT
evidence:
  - source_id: GO:1903014
    title: cellular response to differentiation-inducing factor 1
    statement: >-
      The module is grounded in cellular response to DIF-1 (GO:1903014); DimA and
      DimB carry this annotation.
  - source_id: file:DICDI/dimA/dimA-ai-review.yaml
    title: dimA gene review (Dictyostelium discoideum)
    statement: >-
      DIF-1-responsive bZIP transcription factor grounding (UniProtKB:Q54XG7,
      GO:0003700 DNA-binding transcription factor activity).
  - source_id: file:DICDI/dimB/dimB-ai-review.yaml
    title: dimB gene review (Dictyostelium discoideum)
    statement: >-
      DIF-1-responsive bZIP transcription factor grounding (UniProtKB:Q54ER9,
      GO:0003700); principal activator of ecmB and repressor of prespore genes.
  - source_id: file:DICDI/ecmA/ecmA-ai-review.yaml
    title: ecmA gene review (Dictyostelium discoideum)
    statement: >-
      Prestalk extracellular-matrix marker grounding (UniProtKB:Q54YG2, GO:0005198
      structural molecule activity); a DIF-1/DimA-DimB-induced output gene.
  - source_id: file:DICDI/ecmB/ecmB-ai-review.yaml
    title: ecmB gene review (Dictyostelium discoideum)
    statement: >-
      Stalk extracellular-matrix marker grounding (UniProtKB:P11976, GO:0005198);
      a DIF-1/DimB-induced output gene.
notes: >-
  Dictyostelium-specific developmental patterning module (the DIF-1 RESPONSE arm)
  grounded to the two bZIP transcription factors DimA (Q54XG7) and DimB (Q54ER9)
  and their extracellular-matrix output markers EcmA (Q54YG2) and EcmB (P11976).
  Paired with dicty_dif1_biosynthesis (which produces the DIF-1 input). CudA is
  intentionally excluded (it acts mainly downstream of STATa in culmination, not
  as a direct DIF-1 effector). GO molecular-function terms were taken from the
  completed DICDI reviews; nodes use PANTHER family selectors plus D. discoideum
  representative members. Named to signal Dictyostelium scope.
module:
  id: dicty_dif1_response_prestalk_patterning
  label: DIF-1 response (DimA/DimB -> ecmA/ecmB prestalk genes)
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: cellular response to differentiation-inducing factor 1
      term:
        id: GO:1903014
        label: cellular response to differentiation-inducing factor 1
      description: >-
        DIF-1-driven transcriptional commitment of cells to the prestalk/stalk
        fate.
  parts:
    - order: 1
      role: DIF-1-responsive transcription factors
      node:
        id: dif1_responsive_tfs
        label: DimA and DimB bZIP transcription factors activated by DIF-1
        module_type: REGULATORY_STEP
        annotons:
          - id: dima_activity
            label: "DimA: DIF-1-responsive bZIP transcription factor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CREB/ATF bZIP transcription factor family (DimA/DimB)
                term:
                  id: PANTHER:PTHR14312
                  label: CREB/ATF BZIP TRANSCRIPTION FACTOR
                representative_members:
                  - preferred_term: DimA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54XG7
                      label: bZIP transcription factor DimA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
              evidence:
                - source_id: file:DICDI/dimA/dimA-ai-review.yaml
                  statement: DimA mediates the DIF-1 transcriptional response
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: >-
              bZIP transcription factor required for the DIF-1 response;
              heterodimerises with DimB and is needed for correct prestalk/prespore
              gene regulation.
          - id: dimb_activity
            label: "DimB: DIF-1-responsive bZIP transcription factor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CREB/ATF bZIP transcription factor family (DimA/DimB)
                term:
                  id: PANTHER:PTHR14312
                  label: CREB/ATF BZIP TRANSCRIPTION FACTOR
                representative_members:
                  - preferred_term: DimB (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54ER9
                      label: bZIP transcription factor DimB
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
              evidence:
                - source_id: file:DICDI/dimB/dimB-ai-review.yaml
                  statement: DimB is the principal DIF-1-responsive activator of ecmB
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: >-
              bZIP transcription factor that binds prestalk gene promoters
              (e.g. ecmB) as a dual-mode activator/repressor in the DIF-1 response.
    - order: 2
      role: prestalk/stalk structural output genes
      node:
        id: prestalk_ecm_genes
        label: ecmA and ecmB extracellular-matrix genes induced by DIF-1
        module_type: REGULATORY_STEP
        annotons:
          - id: ecma_product
            label: "EcmA: prestalk extracellular-matrix protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Extracellular matrix protein A family (EcmA/EcmB)
                term:
                  id: PANTHER:PTHR31797
                  label: EXTRACELLULAR MATRIX PROTEIN A-RELATED
                representative_members:
                  - preferred_term: EcmA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54YG2
                      label: Extracellular matrix protein A (ST430)
            function:
              preferred_term: structural molecule activity
              term:
                id: GO:0005198
                label: structural molecule activity
              evidence:
                - source_id: file:DICDI/ecmA/ecmA-ai-review.yaml
                  statement: EcmA is a prestalk ECM structural protein and classic marker
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Secreted prestalk extracellular-matrix protein deposited in the slime
              sheath/stalk tube; a DIF-1-induced marker of prestalk fate.
          - id: ecmb_product
            label: "EcmB: stalk extracellular-matrix protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Extracellular matrix protein A family (EcmA/EcmB)
                term:
                  id: PANTHER:PTHR31797
                  label: EXTRACELLULAR MATRIX PROTEIN A-RELATED
                representative_members:
                  - preferred_term: EcmB (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P11976
                      label: Extracellular matrix protein B (ST310)
            function:
              preferred_term: structural molecule activity
              term:
                id: GO:0005198
                label: structural molecule activity
              evidence:
                - source_id: file:DICDI/ecmB/ecmB-ai-review.yaml
                  statement: EcmB is a stalk-tube ECM marker of terminal stalk differentiation
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Secreted stalk-tube/lower-cup extracellular-matrix protein; a marker
              of terminal stalk differentiation induced via DimB.
  connections:
    - source: dif1_responsive_tfs
      target: prestalk_ecm_genes
      connection_type: POSITIVELY_REGULATES
      description: >-
        DIF-1-activated DimA/DimB bind prestalk gene promoters and induce the
        ecmA/ecmB extracellular-matrix genes (while repressing prespore genes).
