id: MODULE:monobactam_biosynthesis_boundary
title: Monobactam biosynthesis boundary module
description: >-
  A boundary module for curating monobactam and related beta-lactam antibiotic
  biosynthesis calls. In Pseudomonas putida KT2440, KEGG ppu00261 is not
  evidence by itself for a complete monobactam pathway: the bucket contains
  aspartate-family amino-acid precursor enzymes, sulfate-activation enzymes, and
  an MbtH-like protein that is more plausibly nonribosomal-peptide or siderophore
  context. These roles should be curated as precursor or side-node chemistry
  unless gene-level evidence supports a committed beta-lactam antibiotic
  biosynthetic step.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00261
    title: Monobactam biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway bucket supplies the first-pass candidate set, but its
      members are dominated by Dap/aspartate-family amino-acid biosynthesis,
      sulfate adenylyltransferase, and MbtH-like accessory-protein signals rather
      than a complete monobactam-specific assembly route.
  - source_id: GO:0030654
    title: beta-lactam antibiotic biosynthetic process
    statement: >-
      The boundary is grounded in the broad GO beta-lactam antibiotic
      biosynthetic-process term rather than a monobactam-specific GO term.
  - source_id: GO:0017000
    title: antibiotic biosynthetic process
    statement: >-
      This broader parent is useful for recognizing generic antibiotic
      biosynthesis mappings, but it should not be propagated to PSEPK ppu00261
      genes without a pathway-specific biosynthetic role.
module:
  id: monobactam_biosynthesis_boundary
  label: Monobactam biosynthesis boundary module
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: beta-lactam antibiotic biosynthetic process
      term:
        id: GO:0030654
        label: beta-lactam antibiotic biosynthetic process
      description: >-
        Formation of beta-lactam antibiotics, used here as the closest broad GO
        process term for monobactam biosynthesis.
    - preferred_term: antibiotic biosynthetic process
      term:
        id: GO:0017000
        label: antibiotic biosynthetic process
      description: >-
        Broad secondary-metabolite antibiotic biosynthesis context; not
        diagnostic for a specific monobactam pathway.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: >-
          The Dap/aspartate-family and sulfate-activation enzymes in the PSEPK
          bucket are soluble bacterial cytoplasmic enzymes.
  parts:
    - order: 1
      role: monobactam-specific beta-lactam assembly
      node:
        id: monobactam_specific_assembly
        label: Monobactam-specific beta-lactam assembly
        module_type: METABOLIC_PATHWAY
        description: >-
          The diagnostic part of a true monobactam pathway would include
          committed enzymes for forming the monocyclic beta-lactam scaffold and
          tailoring it into a monobactam antibiotic. The PSEPK ppu00261 member
          list does not currently provide such a complete, specific route.
        concepts:
          - preferred_term: beta-lactam antibiotic biosynthetic process
            term:
              id: GO:0030654
              label: beta-lactam antibiotic biosynthetic process
        notes: >-
          This node is deliberately abstract for PSEPK first-pass curation. It
          marks the diagnostic pathway requirement that remains unsatisfied by
          the generic precursor and accessory proteins in the KEGG bucket.
    - order: 2
      role: aspartate-family and diaminopimelate precursor context
      optional: true
      node:
        id: aspartate_family_precursor_context
        label: Aspartate-family amino-acid precursor context
        module_type: METABOLIC_PATHWAY
        description: >-
          Aspartate kinase, aspartate-semialdehyde dehydrogenase,
          4-hydroxy-tetrahydrodipicolinate synthase, and
          4-hydroxy-tetrahydrodipicolinate reductase support lysine and
          aspartate-family amino-acid biosynthesis. Their presence in KEGG
          ppu00261 is treated as precursor context, not proof of monobactam
          biosynthesis.
        concepts:
          - preferred_term: L-lysine biosynthetic process
            term:
              id: GO:0009085
              label: L-lysine biosynthetic process
        annotons:
          - id: pp4473_aspartate_kinase
            label: PP_4473 aspartate kinase
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4473
            function:
              preferred_term: aspartate kinase activity
              term:
                id: GO:0004072
                label: aspartate kinase activity
              evidence:
                - source_id: EC:2.7.2.4
                  statement: Aspartate kinase / aspartokinase.
            role_description: >-
              Shared entry enzyme for aspartate-family amino-acid biosynthesis.
          - id: asd_aspartate_semialdehyde_dehydrogenase
            label: asd aspartate-semialdehyde dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: asd__Q88LE4
            function:
              preferred_term: aspartate-semialdehyde dehydrogenase activity
              term:
                id: GO:0004073
                label: aspartate-semialdehyde dehydrogenase activity
              evidence:
                - source_id: EC:1.2.1.11
                  statement: Aspartate-semialdehyde dehydrogenase.
            role_description: >-
              Shared branch-point enzyme feeding lysine, threonine, methionine,
              and isoleucine biosynthesis.
          - id: dapA_Q88NH2_htpa_synthase
            label: dapA__Q88NH2 4-hydroxy-tetrahydrodipicolinate synthase
            participant:
              selector_type: GENE
              gene:
                preferred_term: dapA__Q88NH2
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate synthase activity
              term:
                id: GO:0008840
                label: 4-hydroxy-tetrahydrodipicolinate synthase activity
              evidence:
                - source_id: EC:4.3.3.7
                  statement: 4-hydroxy-tetrahydrodipicolinate synthase.
            role_description: DapA-family lysine-biosynthesis precursor enzyme.
          - id: dapA_Q88JL0_htpa_synthase
            label: dapA__Q88JL0 4-hydroxy-tetrahydrodipicolinate synthase
            participant:
              selector_type: GENE
              gene:
                preferred_term: dapA__Q88JL0
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate synthase activity
              term:
                id: GO:0008840
                label: 4-hydroxy-tetrahydrodipicolinate synthase activity
              evidence:
                - source_id: EC:4.3.3.7
                  statement: 4-hydroxy-tetrahydrodipicolinate synthase.
            role_description: >-
              Second DapA-family paralog assigned by KEGG to ppu00261 and
              ppu00300.
          - id: pp2036_htpa_synthase
            label: PP_2036 4-hydroxy-tetrahydrodipicolinate synthase
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2036
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate synthase activity
              term:
                id: GO:0008840
                label: 4-hydroxy-tetrahydrodipicolinate synthase activity
              evidence:
                - source_id: EC:4.3.3.7
                  statement: 4-hydroxy-tetrahydrodipicolinate synthase.
            role_description: >-
              Additional HTPA synthase candidate in the KEGG ppu00261 bucket.
          - id: dapB_htpa_reductase
            label: dapB 4-hydroxy-tetrahydrodipicolinate reductase
            participant:
              selector_type: GENE
              gene:
                preferred_term: dapB
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate reductase activity
              term:
                id: GO:0008839
                label: 4-hydroxy-tetrahydrodipicolinate reductase activity
              evidence:
                - source_id: EC:1.17.1.8
                  statement: 4-hydroxy-tetrahydrodipicolinate reductase.
            role_description: >-
              DapB-family reduction step in diaminopimelate/lysine biosynthesis.
    - order: 3
      role: sulfate activation side-node context
      optional: true
      node:
        id: sulfate_activation_context
        label: Sulfate activation context
        module_type: REACTION
        description: >-
          CysD and CysNC form ATP sulfurylase for sulfate assimilation. KEGG
          includes these enzymes in ppu00261, but their core biological role in
          PSEPK is sulfate activation rather than monobactam biosynthesis unless
          pathway-specific evidence is found.
        concepts:
          - preferred_term: sulfate assimilation
            term:
              id: GO:0000103
              label: sulfate assimilation
        annotons:
          - id: cysD_sulfate_adenylyltransferase_subunit
            label: CysD sulfate adenylyltransferase subunit
            participant:
              selector_type: GENE
              gene:
                preferred_term: cysD
            function:
              preferred_term: sulfate adenylyltransferase (ATP) activity
              term:
                id: GO:0004781
                label: sulfate adenylyltransferase (ATP) activity
              evidence:
                - source_id: EC:2.7.7.4
                  statement: Sulfate adenylyltransferase.
            role_description: ATP sulfurylase small subunit.
          - id: cysNC_sulfate_adenylyltransferase_subunit
            label: CysNC sulfate adenylyltransferase subunit
            participant:
              selector_type: GENE
              gene:
                preferred_term: cysNC
            function:
              preferred_term: sulfate adenylyltransferase (ATP) activity
              term:
                id: GO:0004781
                label: sulfate adenylyltransferase (ATP) activity
              evidence:
                - source_id: EC:2.7.7.4
                  statement: Sulfate adenylyltransferase.
            role_description: ATP sulfurylase large subunit.
    - order: 4
      role: MbtH-like nonribosomal-peptide accessory context
      optional: true
      node:
        id: mbth_like_accessory_context
        label: MbtH-like accessory-protein context
        module_type: REACTION
        description: >-
          PP_3808 is annotated as an MbtH-like antibiotic-synthesis protein.
          MbtH-like proteins often assist adenylation domains in nonribosomal
          peptide systems, including siderophore systems. In PSEPK ppu00261 this
          is treated as accessory secondary-metabolite context rather than a
          monobactam-specific step.
        concepts:
          - preferred_term: siderophore biosynthetic process
            term:
              id: GO:0019290
              label: siderophore biosynthetic process
          - preferred_term: antibiotic biosynthetic process
            term:
              id: GO:0017000
              label: antibiotic biosynthetic process
        annotons:
          - id: pp3808_mbth_like_accessory_protein
            label: PP_3808 MbtH-like accessory protein
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3808
            processes:
              - preferred_term: siderophore biosynthetic process
                term:
                  id: GO:0019290
                  label: siderophore biosynthetic process
              - preferred_term: antibiotic biosynthetic process
                term:
                  id: GO:0017000
                  label: antibiotic biosynthetic process
            role_description: >-
              Secondary-metabolite accessory-protein signal; the exact PSEPK
              partner system should be resolved during gene-level review.
notes: >-
  First-pass ppu00261 curation should avoid annotating the Dap, Cys, or MbtH-like
  proteins directly to monobactam or generic antibiotic biosynthesis unless
  pathway-specific evidence is found. The likely curation outcome is a KEGG
  spillover/absence module with valid precursor roles in lysine/aspartate-family
  amino-acid biosynthesis, sulfate assimilation, and possibly siderophore or
  nonribosomal-peptide accessory biology.
