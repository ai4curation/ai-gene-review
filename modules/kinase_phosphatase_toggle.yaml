id: MODULE:kinase_phosphatase_toggle
title: Generic kinase / phosphatase reversible-phosphorylation toggle motif
description: >-
  The minimal, reusable reversible-phosphorylation switch: a protein kinase
  phosphorylates a substrate to set one functional state, and an opposing protein
  phosphatase removes the phosphate to reset it. This antagonistic kinase/
  phosphatase pair acting on a shared substrate is the most pervasive regulatory
  toggle in biology (cell-cycle CDK/phosphatase pairs, the DUSP/MKP feedback in
  MAPK cascades, receptor kinase/phosphatase balance, etc.). The motif is
  gene-free and taxon-neutral: it fixes only the kinase and phosphatase roles by
  molecular-function term and their opposing action on one substrate state.
  Concrete switches embed it through `conforms_to`, substituting their own
  kinase, phosphatase, and substrate. Grounded in GO:0006468 (protein
  phosphorylation) and GO:0006470 (protein dephosphorylation).
status: DRAFT
evidence:
  - source_id: GO:0006468
    title: protein phosphorylation
    statement: The "on" arm of the toggle is protein phosphorylation by a kinase.
  - source_id: GO:0006470
    title: protein dephosphorylation
    statement: The "off" arm of the toggle is protein dephosphorylation by a phosphatase.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: kinase_phosphatase_toggle}]` when a kinase and an
  opposing phosphatase set and reset a shared substrate phospho-state. The
  direction of the regulation (whether phosphorylation activates or inhibits the
  substrate) is realization-specific and recorded on the concrete module.
module:
  id: kinase_phosphatase_toggle
  label: Kinase / phosphatase phosphorylation toggle
  module_type: REGULATORY_STEP
  concepts:
    - preferred_term: protein phosphorylation
      term:
        id: GO:0006468
        label: protein phosphorylation
      description: Kinase-catalyzed addition of phosphate to the substrate.
    - preferred_term: protein dephosphorylation
      term:
        id: GO:0006470
        label: protein dephosphorylation
      description: Phosphatase-catalyzed removal of phosphate from the substrate.
  parts:
    - order: 1
      role: substrate phospho-state
      node:
        id: substrate_state
        label: Toggled substrate phospho-state
        module_type: REGULATORY_STEP
        description: The shared substrate whose phosphorylation state is the switch output.
        annotons:
          - id: substrate_node
            label: regulated substrate
            participant:
              selector_type: ANY_PARTICIPANT
            role_description: The substrate whose phospho-state encodes the switch.
    - order: 2
      role: kinase phosphorylation (on)
      node:
        id: kinase_step
        label: Kinase phosphorylation of the substrate
        module_type: REACTION
        description: A protein kinase phosphorylates the substrate, setting the phospho-state.
        annotons:
          - id: kinase_activity
            label: protein kinase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: protein kinase activity
                term:
                  id: GO:0004672
                  label: protein kinase activity
            function:
              preferred_term: protein kinase activity
              term:
                id: GO:0004672
                label: protein kinase activity
            processes:
              - preferred_term: protein phosphorylation
                term:
                  id: GO:0006468
                  label: protein phosphorylation
            role_description: Sets the substrate phospho-state.
    - order: 3
      role: phosphatase dephosphorylation (off)
      node:
        id: phosphatase_step
        label: Phosphatase dephosphorylation of the substrate
        module_type: REACTION
        description: An opposing phosphatase removes the phosphate, resetting the phospho-state.
        annotons:
          - id: phosphatase_activity
            label: phosphoprotein phosphatase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphoprotein phosphatase activity
                term:
                  id: GO:0004721
                  label: phosphoprotein phosphatase activity
            function:
              preferred_term: phosphoprotein phosphatase activity
              term:
                id: GO:0004721
                label: phosphoprotein phosphatase activity
            processes:
              - preferred_term: protein dephosphorylation
                term:
                  id: GO:0006470
                  label: protein dephosphorylation
            role_description: Resets the substrate phospho-state.
  connections:
    - source: kinase_step
      target: substrate_state
      connection_type: POSITIVELY_REGULATES
      description: The kinase sets the substrate phospho-state.
    - source: phosphatase_step
      target: substrate_state
      connection_type: NEGATIVELY_REGULATES
      description: The phosphatase removes the substrate phospho-state.
