id: MODULE:t_cell_receptor_signaling
title: T cell receptor signaling pathway module
description: >-
  A compact T cell receptor (TCR) signaling module. Antigen-bound TCR/CD3
  complexes are phosphorylated by Src-family kinases such as LCK, recruit and
  activate ZAP70, phosphorylate LAT/SLP76 adaptor scaffolds, and split into PLC
  gamma/calcium/NFAT, Ras-MAPK/AP-1, and PKC/NF-kappaB outputs. The module is
  grounded in GO:0050852 and uses PAINT PTN anchors for the LCK/ZAP70
  non-receptor tyrosine kinase tier where the local cache supports them.
status: DRAFT
evidence:
  - source_id: GO:0050852
    title: T cell receptor signaling pathway
    statement: The module is grounded in the GO biological process term for T cell receptor signaling.
