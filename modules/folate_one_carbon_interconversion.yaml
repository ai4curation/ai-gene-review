id: MODULE:folate_one_carbon_interconversion
title: Folate one-carbon interconversion (MTHFD1 cytosolic, MTHFD2 + MTHFD1L mitochondrial)
description: >-
  One-carbon (folate) metabolism supplies activated one-carbon units for de novo purine and
  thymidylate synthesis and for the methionine/methylation cycle. The one-carbon units are carried
  on tetrahydrofolate (THF) at three oxidation states — 5,10-methylene-THF, 5,10-methenyl-THF and
  10-formyl-THF — and are interconverted by the MTHFD family of enzymes, which are compartmentalised
  between cytosol and mitochondria and run the cycle in opposite directions. In the cytosol the
  trifunctional MTHFD1 (C-1-THF synthase) reversibly interconverts all three states: an NADP-linked
  methylenetetrahydrofolate dehydrogenase, a methenyltetrahydrofolate cyclohydrolase and a
  formate-tetrahydrofolate ligase (10-formyl-THF synthetase), predominantly assembling one-carbon
  units for cytosolic nucleotide synthesis. In mitochondria, serine (via SHMT2) generates
  5,10-methylene-THF, which the bifunctional NAD-dependent MTHFD2 (dehydrogenase/cyclohydrolase,
  requiring Mg2+ and phosphate) oxidises to 10-formyl-THF; the monofunctional MTHFD1L
  (10-formyl-THF synthetase) then releases formate, exporting the one-carbon unit to the cytosol
  where MTHFD1 re-incorporates it onto THF. This mitochondrion-to-cytosol formate shuttle is the
  dominant source of one-carbon units in proliferating cells, making MTHFD2 in particular a
  prominent cancer-metabolism target. Inherited MTHFD1 deficiency causes a combined immunodeficiency
  with megaloblastic anemia; MTHFD1 and MTHFD1L variants are neural-tube-defect risk factors.
status: DRAFT
evidence:
  - source_id: GO:0035999
    title: tetrahydrofolate interconversion
    statement: The MTHFD enzymes carry out tetrahydrofolate interconversion (GO:0035999) among the one-carbon oxidation states.
  - source_id: GO:0006730
    title: one-carbon metabolic process
    statement: The pathway is central to one-carbon metabolic process (GO:0006730) for nucleotide/methyl synthesis.
  - source_id: file:human/MTHFD1/MTHFD1-ai-review.yaml
    title: MTHFD1 gene review (human)
    statement: The cytosolic trifunctional C1-THF synthase (UniProtKB:P11586, GO:0004488/GO:0004477/GO:0004329) matches the completed human MTHFD1 review.
  - source_id: file:human/MTHFD2/MTHFD2-ai-review.yaml
    title: MTHFD2 gene review (human)
    statement: The mitochondrial NAD-dependent dehydrogenase/cyclohydrolase (UniProtKB:P13995, GO:0004487/GO:0004477) matches the completed human MTHFD2 review.
  - source_id: file:human/MTHFD1L/MTHFD1L-ai-review.yaml
    title: MTHFD1L gene review (human)
    statement: The mitochondrial 10-formyl-THF synthetase (UniProtKB:Q6UB35, GO:0004329) matches the completed human MTHFD1L review.
