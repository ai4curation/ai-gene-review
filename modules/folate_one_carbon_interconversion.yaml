id: MODULE:folate_one_carbon_interconversion
title: Folate one-carbon carrier-state interconversion
description: >-
  A taxon-neutral module for interconversion of the substituted tetrahydrofolate
  carrier states 5,10-methylene-THF, 5,10-methenyl-THF, 10-formyl-THF,
  5-methyl-THF, and the salvaged 5-formyl-THF pool. The module separates four
  chemically distinct transformations: pyridine-nucleotide-linked oxidation of
  5,10-methylene-THF to 5,10-methenyl-THF, hydrolysis of 5,10-methenyl-THF to
  10-formyl-THF, reduction of 5,10-methylene-THF to 5-methyl-THF, and
  ATP-dependent salvage of 5-formyl-THF to 5,10-methenyl-THF. Fused FolD/MTHFD
  architectures and NAD(H)- versus NADP(H)-linked variants are represented as
  alternative implementations of the same carrier-state conversions. The
  dehydrogenase and cyclohydrolase operations form the required coupled core;
  MTHFR reduction and 5-formyl-THF salvage are independent optional branches.
  Upstream one-carbon loading by serine hydroxymethyltransferase, glycine
  cleavage, or formate-tetrahydrofolate ligase and downstream use by purine,
  thymidylate, or methionine synthesis are outside this module.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0035999
    title: tetrahydrofolate interconversion
    statement: >-
      GO:0035999 is the specific biological-process term for interconversion of
      one-carbon-substituted tetrahydrofolate carrier states.
  - source_id: UniPathway:UPA00193
    title: tetrahydrofolate interconversion
    statement: >-
      UniPathway UPA00193 provides the pathway route used by the selected
      Pseudomonas putida FolD and MetF proteins.
  - source_id: KEGG:ppu00670
    title: One carbon pool by folate - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00670 supplies the organism-specific pathway context; broad
      members that only produce or consume one-carbon folates are outside the
      curated module boundary.
  - source_id: RHEA:22812
    title: methylenetetrahydrofolate dehydrogenase (NADP+) reaction
    statement: >-
      RHEA:22812 specifies reversible oxidation of (6R)-5,10-methylene-THF by
      NADP+ to (6R)-5,10-methenyl-THF and NADPH.
  - source_id: file:genes/METEA/mtdA/mtdA-ai-review.yaml
    title: Curated review of Methylorubrum extorquens AM1 MtdA (P55818)
    statement: >-
      The existing mtdA review and reviewed P55818 record ground an
      experimentally characterized monofunctional NADP-dependent implementation
      of RHEA:22812. THF is a secondary substrate, with lower catalytic
      efficiency than MtdA's primary H4MPT substrate, and MtdA does not supply
      the cyclohydrolase operation.
  - source_id: UniProtKB:Q49135
    title: Methylorubrum extorquens AM1 FchA
    statement: >-
      Reviewed UniProt entry Q49135 identifies the separate monofunctional FchA
      that catalyzes RHEA:23700 in the same organism as the MtdA exemplar.
  - source_id: RHEA:22892
    title: methylenetetrahydrofolate dehydrogenase (NAD+) reaction
    statement: >-
      RHEA:22892 specifies the corresponding reversible NAD+-linked carrier-state
      oxidation.
  - source_id: RHEA:23700
    title: methenyltetrahydrofolate cyclohydrolase reaction
    statement: >-
      RHEA:23700 specifies reversible hydrolysis of (6R)-5,10-methenyl-THF to
      (6R)-10-formyl-THF.
  - source_id: RHEA:19821
    title: methylenetetrahydrofolate reductase (NADH) reaction
    statement: >-
      RHEA:19821 specifies reversible NADH-linked reduction of
      5,10-methylene-THF to 5-methyl-THF.
  - source_id: UniProtKB:O80585
    title: Arabidopsis methylenetetrahydrofolate reductase (NADH) 2
    statement: >-
      Reviewed O80585 experimentally supports RHEA:19821 in a plant MTHFR with
      the eukaryotic catalytic and C-terminal regulatory domains. It is an
      explicit NADH-linked regulatory-architecture counterexample to assigning
      MTHFR cofactor specificity from taxonomic kingdom.
  - source_id: RHEA:19817
    title: methylenetetrahydrofolate reductase (NADPH) reaction
    statement: >-
      RHEA:19817 specifies the corresponding reversible NADPH-linked
      carrier-state reduction represented here by human P42898.
  - source_id: RHEA:10488
    title: 5-formyltetrahydrofolate cyclo-ligase reaction
    statement: >-
      RHEA:10488 specifies ATP-dependent conversion of 5-formyl-THF to
      5,10-methenyl-THF, the salvage reaction catalyzed by Fau/MTHFS.
  - source_id: file:interpro/panther/PTHR48099/PTHR48099-paint.tsv
    title: PANTHER PAINT annotations for tetrahydrofolate dehydrogenase/cyclohydrolase
    statement: >-
      The local member table places both KT2440 FolD paralogs in
      PTHR48099:SF5 and human MTHFD1 in PTHR48099:SF1, despite PANTHER using
      the same generic cytoplasmic C1-THF synthase label for both subfamilies.
      Local PAINT data assign GO:0004488 and GO:0004477 at PTN000002250, and
      the NAD+-specific GO:0004487 at the narrower PTN002224686 node.
  - source_id: file:interpro/panther/PTHR45754/PTHR45754-paint.tsv
    title: PANTHER PAINT annotations for methylenetetrahydrofolate reductase
    statement: >-
      PANTHER PTHR45754 and PTN000472667 ground the conserved MTHFR family and
      its broad GO:0004489 activity without forcing a cofactor assignment;
      the local PAINT row does not support either cofactor-specific child term.
      PTHR45754:SF3 contains both the bacterial NADH enzyme P0AEZ1 and human
      MTHFR P42898, as well as plant NADH-labeled members O80585, Q75HE6, and
      Q9SE94, despite its NADPH label. It is therefore not used to distinguish
      cofactor variants or to infer cofactor use from taxon.
  - source_id: file:interpro/panther/PTHR23407/PTHR23407-paint.tsv
    title: PANTHER PAINT annotations for 5-formyltetrahydrofolate cyclo-ligase
    statement: >-
      PANTHER PTHR23407 and PTN000601268 ground the conserved 5-formyl-THF
      salvage activity.
