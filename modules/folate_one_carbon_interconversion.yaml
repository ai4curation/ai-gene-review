      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The mitochondrial arm (MTHFD2 then MTHFD1L) converts serine-derived 5,10-methylene-THF to
        10-formyl-THF and releases formate, which is exported to the cytosol where MTHFD1
        re-incorporates it onto THF — the mitochondrion-to-cytosol formate shuttle that supplies
        one-carbon units for nucleotide synthesis.
  notes: >-
    Folate one-carbon interconversion (GO:0035999 / GO:0006730) by the MTHFD family, grounded to the
    completed human gene reviews: cytosolic trifunctional MTHFD1 (P11586, GO:0004488 NADP+
    dehydrogenase + GO:0004477 cyclohydrolase + GO:0004329 formate-THF ligase) and the mitochondrial
    arm MTHFD2 (P13995, GO:0004487 NAD+ dehydrogenase + GO:0004477 cyclohydrolase, Mg2+/phosphate-
    dependent) and MTHFD1L (Q6UB35, GO:0004329 formate-THF ligase; its N-terminal dehydrogenase/
    cyclohydrolase domain is catalytically dead — the InterPro-predicted NADP+-dehydrogenase MF was
    REMOVEd in the gene review as a wrong IEA). All three are paralogues in PANTHER PTHR48099; the
    NAD+ (GO:0004487) vs NADP+ (GO:0004488) dehydrogenase distinction is the key MTHFD2-vs-MTHFD1
    difference. This module sits directly downstream of serine_biosynthesis_one_carbon (SHMT
    generates the methylene-THF) and feeds de novo purine/thymidylate synthesis and the methionine/
    methylation cycle; MTHFR (methylene-THF reductase, on main) diverts methylene-THF to
    5-methyl-THF for methionine synthesis. GO term ids/labels verified against the local go.db.
    Disorders: MTHFD1 deficiency — combined immunodeficiency with megaloblastic anemia; MTHFD1/
    MTHFD1L — neural-tube-defect susceptibility.
