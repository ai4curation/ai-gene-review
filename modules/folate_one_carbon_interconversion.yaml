      target: methenyl_formyl_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        5,10-methenyl-THF produced by the dehydrogenase reaction is the
        cyclohydrolase substrate; the two activities are often fused but are
        chemically distinct.
    - source: formyl_folate_salvage
      target: methenyl_formyl_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Salvaged 5,10-methenyl-THF rejoins the methenyl/formyl carrier-state
        interconversion.
  notes: >-
    The module is organized by carrier-state chemistry rather than by one
    particular multidomain protein or species. Molecular-function terms are on
    leaf annotons. PANTHER families and selective UniProt representatives orient
    enzyme architecture and cofactor variants; exact PTNs are used only where
    the local canonical PAINT file carries the corresponding IBD assertion.
    Cofactor variants are defined by verified reaction and architecture rather
    than by taxonomic kingdom. The core dehydrogenase and cyclohydrolase
    operations are required, while the MTHFR and Fau branches are independently
    optional in concrete realizations.
    Formate ligation/release is treated as one-carbon loading or unloading and
    is excluded with SHMT and glycine-cleavage input. Purine, thymidylate, and
    methionine synthesis are consumers and are also outside the module.
