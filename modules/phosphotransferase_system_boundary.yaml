id: MODULE:phosphotransferase_system_boundary
title: Phosphotransferase system boundary
description: >-
  Boundary module for KEGG ppu02060 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains the fructose PTS branch fruB-fruK-fruA
  plus PTS/Ntr phosphorelay components ptsH, ptsN, and ptsP. The satisfiable
  biology is a fructose-specific PEP-dependent PTS uptake/catabolic entry route
  and a distinct HPr/PtsP/PtsN regulatory phosphorelay context, not a generic
  all-sugar PTS transport system.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02060
    title: Phosphotransferase system (PTS) - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02060 provides the PSEPK curation batch with fruB, fruK, fruA,
      ptsH, ptsN, and ptsP as the organism-specific members.
  - source_id: file:projects/P_PUTIDA/batches/ppu02060_phosphotransferase_system_boundary.tsv
    title: ppu02060 first-pass batch table
    statement: >-
      The batch table records three already-curated fructose-PTS genes and
      three newly fetched PTS/Ntr phosphorelay genes.
  - source_id: UniProtKB:Q88PQ5
    title: FruB phosphoenolpyruvate--protein phosphotransferase
    statement: >-
      UniProt describes FruB as a cytoplasmic phosphoenolpyruvate--protein
      phosphotransferase with EC 2.7.3.9 in the fructose PTS branch.
  - source_id: UniProtKB:Q88PQ3
    title: FruA fructose PTS transporter
    statement: >-
      UniProt describes FruA as a membrane
      protein-N(pi)-phosphohistidine--D-fructose phosphotransferase.
  - source_id: UniProtKB:Q88PQ4
    title: FruK phosphofructokinase
    statement: >-
      UniProt describes FruK as a 1-phosphofructokinase converting fructose
      1-phosphate to fructose 1,6-bisphosphate.
  - source_id: UniProtKB:Q88PA2
    title: PtsH phosphocarrier protein HPr
    statement: >-
      UniProt describes PtsH as an HPr-family phosphocarrier protein with HPr
      domain and PTS HPr phosphorylation-site signatures.
  - source_id: UniProtKB:Q88PA0
    title: PtsN PTS enzyme IIA regulatory protein
    statement: >-
      UniProt describes PtsN as a PTS enzyme IIA protein associated with
      regulation of potassium transport and carrying PTS EIIA/Ntr domains.
  - source_id: UniProtKB:Q88CN5
    title: PtsP phosphoenolpyruvate--protein phosphotransferase
    statement: >-
      UniProt describes PtsP as a cytoplasmic phosphoenolpyruvate--protein
      phosphotransferase with EC 2.7.3.9 and PTS enzyme-I-like domains.
  - source_id: file:PSEPK/fruB/fruB-ai-review.yaml
    title: Curated fruB review
    statement: >-
      The fruB review accepts phosphoenolpyruvate-protein phosphotransferase
      activity and the PTS process.
  - source_id: file:PSEPK/fruA/fruA-ai-review.yaml
    title: Curated fruA review
    statement: >-
      The fruA review accepts fructose-specific PTS transporter activity,
      fructose transport, and plasma-membrane localization.
  - source_id: file:PSEPK/fruK/fruK-ai-review.yaml
    title: Curated fruK review
    statement: >-
      The fruK review accepts 1-phosphofructokinase activity in fructose entry
      metabolism.
  - source_id: file:PSEPK/ptsH/ptsH-ai-review.yaml
    title: Curated ptsH review
    statement: >-
      The ptsH review accepts cytoplasmic HPr-family phosphocarrier/transferase
      context and the PTS process.
  - source_id: file:PSEPK/ptsN/ptsN-ai-review.yaml
    title: Curated ptsN review
    statement: >-
      The ptsN review accepts EIIA/Ntr-like PTS phosphotransfer context but
      treats kinase-activator activity as over-annotated/non-core.
  - source_id: file:PSEPK/ptsP/ptsP-ai-review.yaml
    title: Curated ptsP review
    statement: >-
      The ptsP review accepts cytoplasmic phosphoenolpyruvate-protein
      phosphotransferase activity and PTS phosphorelay context.
module:
  id: phosphotransferase_system_boundary
  label: Phosphotransferase system boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
      term:
        id: GO:0009401
        label: phosphoenolpyruvate-dependent sugar phosphotransferase system
      description: Shared process context for the PTS phosphorelay and fructose-specific branch.
    - preferred_term: phosphoenolpyruvate-protein phosphotransferase activity
      term:
        id: GO:0008965
        label: phosphoenolpyruvate-protein phosphotransferase activity
      description: Enzyme I-like upstream phosphotransferase activity for FruB and PtsP.
    - preferred_term: protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity
      term:
        id: GO:0022877
        label: protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity
      description: Fructose-specific membrane PTS transporter activity for FruA.
    - preferred_term: 1-phosphofructokinase activity
      term:
        id: GO:0008662
        label: 1-phosphofructokinase activity
      description: FruK ATP-dependent conversion of fructose 1-phosphate to fructose 1,6-bisphosphate.
    - preferred_term: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
      term:
        id: GO:0008982
        label: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
      description: Closest GO molecular-function handle for PtsN EIIA/Ntr phosphotransfer context.
    - preferred_term: fructose transmembrane transport
      term:
        id: GO:0015755
        label: fructose transmembrane transport
      description: FruA-mediated fructose uptake process.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble PTS phosphorelay proteins and FruK act in the cytoplasm/cytosol.
      - preferred_term: bacterial plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: FruA is the membrane PTS transporter component.
  parts:
    - order: 1
      role: Fructose-specific PTS uptake and catabolic entry
      node:
        id: fructose_pts_branch
        label: FruBKA fructose PTS branch
        module_type: BIOLOGICAL_PROCESS
        description: >-
          FruB supplies the cytoplasmic PEP-dependent phosphorelay, FruA imports
          and phosphorylates fructose, and FruK converts fructose 1-phosphate to
          fructose 1,6-bisphosphate for central carbohydrate metabolism.
        annotons:
          - id: fruB_pep_protein_phosphotransferase
            label: "fruB: PEP-protein phosphotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fruB
            function:
              preferred_term: phosphoenolpyruvate-protein phosphotransferase activity
              term:
                id: GO:0008965
                label: phosphoenolpyruvate-protein phosphotransferase activity
              substrates:
                - preferred_term: phosphoenolpyruvate
                - preferred_term: L-histidyl protein acceptor
            processes:
              - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
                term:
                  id: GO:0009401
                  label: phosphoenolpyruvate-dependent sugar phosphotransferase system
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Cytoplasmic phosphorelay component of the fructose PTS branch.
          - id: fruA_fructose_pts_transporter
            label: "fruA: fructose PTS transporter"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fruA
            function:
              preferred_term: protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity
              term:
                id: GO:0022877
                label: protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity
              substrates:
                - preferred_term: D-fructose
                - preferred_term: phosphohistidyl protein
              products:
                - preferred_term: fructose 1-phosphate
            processes:
              - preferred_term: fructose transmembrane transport
                term:
                  id: GO:0015755
                  label: fructose transmembrane transport
              - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
                term:
                  id: GO:0009401
                  label: phosphoenolpyruvate-dependent sugar phosphotransferase system
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Membrane PTS component coupling fructose import to phosphorylation.
          - id: fruK_1_phosphofructokinase
            label: "fruK: 1-phosphofructokinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fruK
            function:
              preferred_term: 1-phosphofructokinase activity
              term:
                id: GO:0008662
                label: 1-phosphofructokinase activity
              substrates:
                - preferred_term: fructose 1-phosphate
                - preferred_term: ATP
              products:
                - preferred_term: fructose 1,6-bisphosphate
                - preferred_term: ADP
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Downstream cytosolic kinase converting PTS product into central-metabolism substrate.
    - order: 2
      role: HPr/PtsP/PtsN regulatory phosphorelay context
      node:
        id: pts_hpr_ntr_branch
        label: HPr and nitrogen-regulatory PTS phosphorelay context
        module_type: BIOLOGICAL_PROCESS
        description: >-
          PtsH, PtsP, and PtsN form the regulatory phosphorelay side of the PTS
          bucket. PtsP and PtsH support cytoplasmic phosphoryl transfer, while
          PtsN is an EIIA/Ntr-like regulatory protein associated with potassium
          transport regulation rather than a substrate-specific sugar permease.
        annotons:
          - id: ptsH_hpr_phosphocarrier
            label: "ptsH: HPr phosphocarrier"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ptsH
            function:
              preferred_term: transferase activity
              term:
                id: GO:0016740
                label: transferase activity
            processes:
              - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
                term:
                  id: GO:0009401
                  label: phosphoenolpyruvate-dependent sugar phosphotransferase system
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: HPr-family phosphocarrier; exact partner wiring in KT2440 remains to be tested.
          - id: ptsP_pep_protein_phosphotransferase
            label: "ptsP: enzyme I-like PEP-protein phosphotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ptsP
            function:
              preferred_term: phosphoenolpyruvate-protein phosphotransferase activity
              term:
                id: GO:0008965
                label: phosphoenolpyruvate-protein phosphotransferase activity
              substrates:
                - preferred_term: phosphoenolpyruvate
                - preferred_term: L-histidyl protein acceptor
            processes:
              - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
                term:
                  id: GO:0009401
                  label: phosphoenolpyruvate-dependent sugar phosphotransferase system
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Upstream enzyme I/Ntr-like phosphotransferase in regulatory PTS context.
          - id: ptsN_eiia_ntr_regulatory_phosphocarrier
            label: "ptsN: EIIA/Ntr regulatory PTS protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ptsN
            function:
              preferred_term: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
              term:
                id: GO:0008982
                label: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
            processes:
              - preferred_term: phosphoenolpyruvate-dependent sugar phosphotransferase system
                term:
                  id: GO:0009401
                  label: phosphoenolpyruvate-dependent sugar phosphotransferase system
            role_description: EIIA/Ntr regulatory protein; not evidence for a complete additional sugar PTS transporter.
  notes: >-
    This module records a boundary around the broad KEGG PTS map. FruBKA is the
    concrete fructose-specific PTS transport and catabolic-entry branch. PtsH,
    PtsP, and PtsN are retained as regulatory/general phosphorelay context; no
    additional substrate-specific PTS transport annotation is proposed from this
    bucket.
