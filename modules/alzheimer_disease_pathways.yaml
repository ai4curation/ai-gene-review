id: MODULE:alzheimer_disease_relevant_pathways
title: Alzheimer disease-relevant human pathway modules
description: >-
  A project-level decomposition of normal human pathway modules represented by
  the Alzheimer disease review gene set. The module groups gene products by
  evolved biological roles in APP processing and amyloid-beta handling,
  lipid/lipoprotein transport, microglial lipid-debris sensing, tau/cytoskeletal
  kinase biology, and endocytic/adhesion adaptor systems. It is not a causal
  disease-progression model.
status: DRAFT
evidence:
  - source_id: file:projects/ALZHEIMER_DISEASE.md
    title: Alzheimer disease project review log
    statement: >-
      Project-level curation record listing the 34 reviewed human genes and the
      second-pass review status for each gene.
  - source_id: file:genes/human/APP/APP-ai-review.yaml
    title: APP gene review
    statement: >-
      Supports APP as the central precursor/cargo for amyloidogenic and
      non-amyloidogenic processing branches, adhesion-related functions, and
      amyloid-beta biology.
  - source_id: file:genes/human/TREM2/TREM2-ai-review.yaml
    title: TREM2 gene review
    statement: >-
      Supports the microglial lipid/apolipoprotein/apoptotic-cell receptor
      branch and its coupling to TYROBP/SYK/PLC signaling.
  - source_id: file:genes/human/MAPT/MAPT-ai-review.yaml
    title: MAPT gene review
    statement: >-
      Supports tau microtubule binding, microtubule stabilization, axonal
      localization, and pathological tau self-assembly as a separate module from
      APP processing.
notes: >-
  This module is deliberately conservative. It groups reviewed genes into
  reusable pathway modules but does not assert that every connection is a direct
  disease-causal edge. Disease-progression hypotheses should be handled in a
  separate disease-mechanism artifact.
module:
  id: alzheimer_disease_relevant_pathways
  label: Alzheimer disease-relevant human pathway modules
  module_type: MODULE
  concepts:
    - preferred_term: Alzheimer disease-relevant pathway curation set
      description: >-
        Curated grouping of human gene products whose normal molecular roles are
        recurrently relevant to Alzheimer disease genetics, pathology, or model
        systems.
  context:
    taxa:
      - preferred_term: Homo sapiens
        term:
          id: NCBITaxon:9606
          label: Homo sapiens
    anatomical_locations:
      - preferred_term: central nervous system
      - preferred_term: brain vasculature and immune interfaces
    cell_types:
      - preferred_term: neuron
      - preferred_term: microglial cell
      - preferred_term: astrocyte
      - preferred_term: brain endothelial cell
      - preferred_term: macrophage or myeloid-lineage cell
  parts:
    - order: 1
      role: APP processing, trafficking, and amyloid-beta handling
      node:
        id: app_processing_and_amyloid_handling
        label: APP processing and amyloid-beta handling
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Regulated trafficking and proteolysis of APP, plus receptor- and
          transporter-linked handling of amyloid-beta peptides and APP-derived
          cargos. This module separates alpha-secretase, beta-secretase,
          gamma-secretase, sorting, and clearance roles.
        annotons:
          - id: app_precursor_cargo
            label: APP precursor and processed cargo
            participant:
              selector_type: GENE
              gene:
                preferred_term: APP
            processes:
              - preferred_term: APP processing and amyloid-beta peptide generation
            role_description: >-
              Substrate and signaling/adhesion precursor whose ectodomain and
              intramembrane cleavage products connect non-amyloidogenic and
              amyloidogenic processing branches.
          - id: adam10_alpha_secretase
            label: ADAM10 alpha-secretase branch
            participant:
              selector_type: GENE
              gene:
                preferred_term: ADAM10
            function:
              preferred_term: membrane metalloendopeptidase sheddase activity
            processes:
              - preferred_term: non-amyloidogenic APP ectodomain shedding
            role_description: >-
              Membrane sheddase that contributes to alpha-secretase cleavage of
              APP and other cell-surface substrates.
          - id: bace1_beta_secretase
            label: BACE1 beta-secretase branch
            participant:
              selector_type: GENE
              gene:
                preferred_term: BACE1
            function:
              preferred_term: membrane aspartyl endopeptidase activity
            processes:
              - preferred_term: amyloidogenic APP beta-site cleavage
            role_description: >-
              Endosomal/TGN-accessed beta-secretase that initiates amyloidogenic
              APP processing.
          - id: gamma_secretase_complex
            label: Presenilin gamma-secretase complex
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: presenilin-containing gamma-secretase complex
                active_units:
                  - id: psen1_unit
                    label: PSEN1 catalytic subunit option
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: PSEN1
                    role: catalytic presenilin subunit
                  - id: psen2_unit
                    label: PSEN2 catalytic subunit option
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: PSEN2
                    role: catalytic presenilin subunit in alternative complexes
                  - id: ncstn_unit
                    label: NCSTN substrate-recognition subunit
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: NCSTN
                    role: nicastrin substrate-recruitment subunit
                  - id: aph1a_unit
                    label: APH1A scaffold subunit
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: APH1A
                    role: APH-1 scaffold/adaptor subunit
                  - id: aph1b_unit
                    label: APH1B scaffold subunit option
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: APH1B
                    role: APH-1 paralog in alternative complexes
                  - id: psenen_unit
                    label: PSENEN/PEN-2 maturation subunit
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: PSENEN
                    role: presenilin maturation and complex-stability subunit
            function:
              preferred_term: intramembrane aspartyl endopeptidase complex activity
            processes:
              - preferred_term: APP and Notch intramembrane proteolysis
            role_description: >-
              Four-subunit membrane protease complex that performs
              presenilin-dependent intramembrane cleavage of APP and many other
              type I membrane substrates.
          - id: app_sorting_receptors_and_adaptors
            label: APP and amyloid-beta sorting/clearance receptors and adaptors
            participant:
              selector_type: ANY_PARTICIPANT
              description: SORL1, LRP1, PICALM, BIN1, ABCA7, and CD2AP roles in APP, BACE1, or amyloid-beta routing.
            processes:
              - preferred_term: endocytic sorting and amyloid-beta clearance
            role_description: >-
              Sorting receptors and membrane/adaptor proteins regulate APP/BACE1
              compartment access, amyloid-beta uptake or transcytosis, and
              clearance-related trafficking.
            evidence:
              - source_id: file:genes/human/SORL1/SORL1-ai-review.yaml
                statement: SORL1 supports APP sorting and amyloid-beta lysosomal routing.
              - source_id: file:genes/human/LRP1/LRP1-ai-review.yaml
                statement: LRP1 supports amyloid-beta clearance/transcytosis and cargo endocytosis.
              - source_id: file:genes/human/PICALM/PICALM-ai-review.yaml
                statement: PICALM supports clathrin-mediated endocytic routing of amyloid-beta/LRP1 and other cargo.
              - source_id: file:genes/human/BIN1/BIN1-ai-review.yaml
                statement: BIN1 supports BACE1 trafficking and membrane remodeling.
              - source_id: file:genes/human/ABCA7/ABCA7-ai-review.yaml
                statement: ABCA7 supports phospholipid transport, phagocytosis, and amyloid processing/clearance.
              - source_id: file:genes/human/CD2AP/CD2AP-ai-review.yaml
                statement: CD2AP supports actin/endocytic adaptor biology and tau-release context.
    - order: 2
      role: lipid, lipoprotein, and cholesterol transport
      node:
        id: lipoprotein_lipid_transport
        label: Lipid and lipoprotein transport
        module_type: TRANSPORT_STEP
        description: >-
          Exchangeable apolipoproteins, ABC lipid transporters, and endocytic
          receptors coordinate phospholipid/cholesterol efflux, HDL-like particle
          assembly, APOE/clusterin lipidation, and receptor-mediated particle
          uptake.
        annotons:
          - id: apoe_lipoprotein_carrier
            label: APOE lipoprotein carrier
            participant:
              selector_type: GENE
              gene:
                preferred_term: APOE
            function:
              preferred_term: exchangeable apolipoprotein lipid carrier activity
            processes:
              - preferred_term: lipoprotein particle remodeling and receptor-mediated clearance
            role_description: >-
              Secreted apolipoprotein that binds lipids and receptors to
              mediate peripheral and CNS lipoprotein transport.
          - id: clu_extracellular_chaperone
            label: CLU extracellular holdase and lipoprotein-associated chaperone
            participant:
              selector_type: GENE
              gene:
                preferred_term: CLU
            function:
              preferred_term: extracellular holdase chaperone activity
            processes:
              - preferred_term: extracellular protein/lipoprotein client handling
            role_description: >-
              Secreted glycoprotein chaperone associated with lipoproteins,
              amyloid-beta handling, and complement-related extracellular
              protection.
          - id: abca1_lipid_efflux
            label: ABCA1 lipid efflux transporter
            participant:
              selector_type: GENE
              gene:
                preferred_term: ABCA1
            function:
              preferred_term: ATP-coupled phospholipid and cholesterol transporter activity
            processes:
              - preferred_term: apolipoprotein-dependent cholesterol and phospholipid efflux
            role_description: >-
              ATP-binding cassette transporter required for apolipoprotein
              lipidation and HDL biogenesis.
          - id: abca7_phospholipid_transport
            label: ABCA7 phospholipid transporter
            participant:
              selector_type: GENE
              gene:
                preferred_term: ABCA7
            function:
              preferred_term: ATP-coupled phospholipid transporter activity
            processes:
              - preferred_term: phospholipid efflux and phagocytic membrane support
            role_description: >-
              ABCA-family transporter with strong support for phospholipid and
              lysophosphatidylcholine transport, phagocytosis, and amyloid
              processing/clearance effects.
          - id: lrp1_lipoprotein_endocytic_receptor
            label: LRP1 lipoprotein and cargo endocytic receptor
            participant:
              selector_type: GENE
              gene:
                preferred_term: LRP1
            function:
              preferred_term: multifunctional cargo receptor activity
            processes:
              - preferred_term: receptor-mediated endocytosis of lipoprotein and ligand complexes
            role_description: >-
              LDLR-family receptor mediating endocytosis and clearance of
              apolipoprotein, amyloid-beta, tau, and other ligand complexes.
    - order: 3
      role: microglial and complement lipid-debris sensing
      node:
        id: microglial_lipid_debris_sensing
        label: Microglial lipid-debris sensing and immune signaling
        module_type: SIGNALING_PATHWAY
        description: >-
          Myeloid and microglial receptors/adaptors convert lipid, apoptotic-cell,
          complement, and immune-complex information into phagocytic, metabolic,
          and inflammatory state changes.
        annotons:
          - id: trem2_receptor_axis
            label: TREM2 lipid/apolipoprotein receptor axis
            participant:
              selector_type: GENE
              gene:
                preferred_term: TREM2
            function:
              preferred_term: damage-associated lipid and apolipoprotein receptor activity
            processes:
              - preferred_term: microglial phagocytosis and lipid-responsive signaling
            role_description: >-
              Microglial/myeloid receptor for apolipoprotein, lipoprotein,
              amyloid-associated, apoptotic-cell, and myelin lipid ligands.
          - id: plc_inositol_signaling_balance
            label: PLCG2 and INPP5D phosphoinositide signaling balance
            participant:
              selector_type: ANY_PARTICIPANT
              description: PLCG2 generates downstream phospholipase-C signals, while INPP5D/SHIP1 dampens PI3K/phosphoinositide signaling.
            processes:
              - preferred_term: immunoreceptor phosphoinositide signaling control
            role_description: >-
              Coupled activation and inhibitory phosphoinositide enzymes tune
              myeloid receptor outputs downstream of TREM2 and related receptors.
            evidence:
              - source_id: file:genes/human/PLCG2/PLCG2-ai-review.yaml
                statement: PLCG2 review supports phospholipase C signaling downstream of immune receptors including TREM2.
              - source_id: file:genes/human/INPP5D/INPP5D-ai-review.yaml
                statement: INPP5D review supports SHIP1 inhibitory phosphoinositide phosphatase signaling in immune cells.
          - id: inhibitory_and_actin_adaptors
            label: CD33, ABI3, SPI1, and MS4A-family microglial state modulators
            participant:
              selector_type: ANY_PARTICIPANT
              description: CD33, ABI3, SPI1, MS4A4A, and MS4A6A roles in myeloid state, membrane, actin, and receptor modulation.
            processes:
              - preferred_term: myeloid receptor state and actin/membrane remodeling
            role_description: >-
              Immunoreceptor, actin-regulatory, transcriptional, and membrane
              proteins that modulate microglial/myeloid state rather than acting
              as amyloid-processing enzymes.
          - id: complement_clearance_axis
            label: CR1 and CLU complement/immune-complex handling
            participant:
              selector_type: ANY_PARTICIPANT
              description: CR1 complement receptor/cofactor and CLU complement-protective extracellular chaperone roles.
            processes:
              - preferred_term: complement-opsonized particle handling and complement regulation
            role_description: >-
              Complement receptor and extracellular chaperone functions that
              influence immune-complex, complement, and extracellular-client
              handling.
    - order: 4
      role: tau, cytoskeleton, and neuronal kinase regulation
      node:
        id: tau_cytoskeleton_kinase_module
        label: Tau cytoskeleton and kinase module
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Tau microtubule binding and stabilization, tau self-assembly, and
          neuronal kinases/adaptors that regulate cytoskeletal and synaptic
          substrate states.
        annotons:
          - id: mapt_tau_microtubule
            label: MAPT/tau microtubule-associated protein
            participant:
              selector_type: GENE
              gene:
                preferred_term: MAPT
            function:
              preferred_term: microtubule binding and stabilization
            processes:
              - preferred_term: axonal microtubule organization and tau assembly
            role_description: >-
              Neuronal microtubule-associated protein whose physiological role
              is microtubule binding/stabilization and whose pathological branch
              includes tau self-assembly.
          - id: gsk3b_tau_wnt_kinase
            label: GSK3B tau and beta-catenin kinase
            participant:
              selector_type: GENE
              gene:
                preferred_term: GSK3B
            function:
              preferred_term: protein serine/threonine kinase activity
            processes:
              - preferred_term: tau phosphorylation and Wnt/beta-catenin regulation
            role_description: >-
              Broad serine/threonine kinase with central substrate branches
              including tau and beta-catenin destruction-complex regulation.
          - id: cdk5_cdk5r1_kinase_complex
            label: CDK5-CDK5R1 neuronal kinase complex
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: CDK5-p35/p25 protein kinase complex
                active_units:
                  - id: cdk5_catalytic_unit
                    label: CDK5 catalytic kinase
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CDK5
                    role: catalytic serine/threonine kinase
                  - id: cdk5r1_regulatory_unit
                    label: CDK5R1 p35/p25 regulatory subunit
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CDK5R1
                    role: non-catalytic activator and localization/substrate-context regulator
            function:
              preferred_term: activated neuronal protein serine/threonine kinase complex activity
            processes:
              - preferred_term: neuronal substrate phosphorylation, autophagy induction, and synaptic receptor regulation
            role_description: >-
              CDK5 activity depends on p35/p25-family activators that determine
              localization, stability, and substrate context.
    - order: 5
      role: endocytic, adhesion, and cytoskeletal adaptor systems
      node:
        id: endocytic_adhesion_adaptor_systems
        label: Endocytic, adhesion, and cytoskeletal adaptor systems
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Membrane-remodeling, clathrin, focal-adhesion, and cytoskeletal
          scaffold proteins that tune cargo routing, adhesion, and cellular
          morphology.
        annotons:
          - id: picalm_clathrin_snr_adaptor
            label: PICALM clathrin/SNARE adaptor
            participant:
              selector_type: GENE
              gene:
                preferred_term: PICALM
            function:
              preferred_term: clathrin assembly and SNARE cargo adaptor activity
            processes:
              - preferred_term: clathrin-mediated endocytosis and cargo sorting
            role_description: >-
              ANTH-domain adaptor for clathrin-coated pit maturation and
              selected cargo/SNARE endocytosis.
          - id: bin1_bar_adaptor
            label: BIN1 BAR-domain membrane-remodeling adaptor
            participant:
              selector_type: GENE
              gene:
                preferred_term: BIN1
            function:
              preferred_term: membrane curvature sensing and remodeling
            processes:
              - preferred_term: endocytic membrane remodeling and BACE1 trafficking context
            role_description: >-
              BAR/SH3 adaptor that shapes membranes and contributes to muscle,
              neuronal, BACE1-trafficking, and tau-interaction contexts.
          - id: cd2ap_actin_endocytic_adaptor
            label: CD2AP actin/endocytic adaptor
            participant:
              selector_type: GENE
              gene:
                preferred_term: CD2AP
            function:
              preferred_term: actin-associated adaptor activity
            processes:
              - preferred_term: endocytosis, actin organization, and podocyte/immune adaptor biology
            role_description: >-
              SH3-domain adaptor linking membrane protein complexes to actin and
              endocytic trafficking.
          - id: eph_kindlin_cas_adhesion_axis
            label: EPHA1, FERMT2, and CASS4 adhesion-signaling axis
            participant:
              selector_type: ANY_PARTICIPANT
              description: EPHA1 receptor tyrosine kinase, FERMT2/kindlin-2 integrin adaptor, and CASS4 focal-adhesion scaffold.
            processes:
              - preferred_term: contact-dependent signaling, integrin activation, focal adhesion, and cytoskeletal remodeling
            role_description: >-
              Adhesion and cytoskeletal signaling proteins whose primary roles
              are receptor-kinase signaling, integrin activation, and
              focal-adhesion scaffolding rather than amyloid or tau catalysis.
  connections:
    - source: endocytic_adhesion_adaptor_systems
      target: app_processing_and_amyloid_handling
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Endocytic adaptors and membrane-remodeling proteins influence APP,
        BACE1, LRP1, and amyloid-beta compartment access and routing.
    - source: lipoprotein_lipid_transport
      target: microglial_lipid_debris_sensing
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        APOE/CLU/lipoprotein particles and lipidated debris provide ligands or
        cargo context for TREM2- and receptor-mediated microglial handling.
    - source: app_processing_and_amyloid_handling
      target: microglial_lipid_debris_sensing
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        APP-derived amyloid-beta peptides and amyloid-lipoprotein complexes can
        become cargo or ligands for microglial uptake and receptor signaling.
    - source: tau_cytoskeleton_kinase_module
      target: endocytic_adhesion_adaptor_systems
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Tau and tau-regulating kinases intersect with cytoskeletal, synaptic,
        and adaptor proteins such as BIN1 and PICALM, but these links should be
        curated as context-specific unless direct molecular evidence supports a
        gene-level GO annotation.
