                term:
                  id: PANTHER:PTHR10578
                  label: HYDROXYACID OXIDASE
                representative_members:
                  - preferred_term: HAO1 (human)
                    term:
                      id: UniProtKB:Q9UJM8
                      label: Hydroxyacid oxidase 1
