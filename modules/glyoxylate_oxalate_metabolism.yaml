  connections:
    - source: hao1_step
      target: agxt_step
      connection_type: PROVIDES_INPUT_FOR
      description: Glyoxylate from HAO1 is detoxified to glycine by peroxisomal AGXT.
    - source: hao1_step
      target: grhpr_step
      connection_type: PROVIDES_INPUT_FOR
      description: Glyoxylate from HAO1 is reduced to glycolate by cytosolic GRHPR.
    - source: hoga1_step
      target: agxt2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Mitochondrial glyoxylate from HOGA1 is transaminated by AGXT2.
  notes: >-
    Glyoxylate/oxalate metabolism, grounded to the human enzymes HAO1 (UniProtKB:Q9UJM8,
    GO:0003973, EC 1.1.3.15), HOGA1 (Q86XE5, GO:0008700, EC 4.1.3.16), AGXT (P21549, GO:0008453,
    EC 2.6.1.44), GRHPR (Q9UBQ7, GO:0030267, EC 1.1.1.79) and AGXT2 (Q9BYV1, GO:0008453,
    EC 2.6.1.44). GO molecular-function/BP/location terms were taken from the completed human gene
    reviews and verified against the local go.db; Reactome reaction ids/titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector (five distinct
    families — these enzymes are not paralogs). The pathway is a compartmentalised
    generation/detoxification balance: glyoxylate is generated in the peroxisome (HAO1 from
    glycolate) and mitochondrion (HOGA1 from hydroxyproline), and detoxified by transamination to
    glycine (peroxisomal AGXT, mitochondrial AGXT2) or reduction to glycolate (cytosolic GRHPR);
    the AGT/glyoxylate and glycolate/GRHPR pools are exchanged across compartments. When these
    routes are overwhelmed, glyoxylate is oxidised to oxalate (in part by HAO1's minor glyoxylate-
    oxidase activity and LDH), which precipitates as calcium oxalate. Disorders: primary
    hyperoxaluria type 1 (AGXT), type 2 (GRHPR) and type 3 (HOGA1); HAO1 is the lumasiran drug
    target and AGXT2 a modifier (also of plasma ADMA / cardiovascular-renal phenotypes). Glycine
    produced by AGXT/AGXT2 feeds one-carbon/glycine metabolism (the glycine-cleavage module).
