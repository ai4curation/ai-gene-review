    title: HAO1 gene review (human)
    statement: >-
      The glycolate-oxidase (glyoxylate-generating) step (UniProtKB:Q9UJM8, GO:0003973) matches
      the completed human HAO1 review.
  - source_id: file:human/HOGA1/HOGA1-ai-review.yaml
    title: HOGA1 gene review (human)
    statement: >-
      The 4-hydroxy-2-oxoglutarate aldolase (hydroxyproline-derived glyoxylate) step
      (UniProtKB:Q86XE5, GO:0008700) matches the completed human HOGA1 review.
  - source_id: file:human/AGXT/AGXT-ai-review.yaml
    title: AGXT gene review (human)
    statement: >-
      The peroxisomal glyoxylate-to-glycine transamination step (UniProtKB:P21549, GO:0008453)
