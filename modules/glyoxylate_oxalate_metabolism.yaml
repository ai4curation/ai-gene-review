id: MODULE:glyoxylate_oxalate_metabolism
title: Glyoxylate metabolism and oxalate detoxification (the primary hyperoxalurias); AGXT/GRHPR/HOGA1/HAO1/AGXT2
description: >-
  Glyoxylate is a reactive two-carbon metabolite that, if not detoxified, is oxidised to
  oxalate — an end product that cannot be further metabolised and precipitates as insoluble
  calcium oxalate, damaging the kidney. Hepatic glyoxylate handling therefore determines
  systemic oxalate load, and its enzymes define the primary hyperoxalurias. Glyoxylate arises
  from two main sources: peroxisomal glycolate oxidase (HAO1), an FMN enzyme that oxidises
  glycolate to glyoxylate (generating H2O2), and mitochondrial 4-hydroxy-2-oxoglutarate
  aldolase (HOGA1), the terminal enzyme of hydroxyproline catabolism, which cleaves
  4-hydroxy-2-oxoglutarate to glyoxylate and pyruvate. Glyoxylate is then detoxified by two
  routes: the peroxisomal, pyridoxal-phosphate-dependent alanine-glyoxylate aminotransferase
  (AGXT/AGT) transaminates it back to glycine (using L-alanine), and the cytosolic NADPH-
  dependent glyoxylate/hydroxypyruvate reductase (GRHPR) reduces it to glycolate; a mitochondrial
  aminotransferase (AGXT2) provides an additional transamination route (and also degrades the
  NO-synthase inhibitors ADMA/SDMA). When detoxification fails, glyoxylate is oxidised to oxalate.
  Inherited defects each cause a primary hyperoxaluria: PH1 (AGXT), PH2 (GRHPR) and PH3 (HOGA1);
  HAO1, which makes glyoxylate, is a validated drug target (the siRNA lumasiran silences HAO1 to
  lower oxalate).
status: DRAFT
evidence:
  - source_id: GO:0046487
    title: glyoxylate metabolic process
    statement: >-
      The module is grounded in glyoxylate metabolic process (GO:0046487); it covers hepatic
      glyoxylate generation and detoxification that controls oxalate synthesis.
  - source_id: Reactome:R-HSA-389661
    title: Glyoxylate metabolism and glycine degradation
    statement: >-
      Step order and reactions follow the human Reactome glyoxylate-metabolism reactions
      R-HSA-389842 (HAO1), R-HSA-6784423 (HOGA1), R-HSA-389684 (AGXT), R-HSA-389826 (GRHPR)
      and R-HSA-904864 (AGXT2).
