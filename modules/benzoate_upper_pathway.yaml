id: MODULE:benzoate_upper_pathway
title: Benzoate upper degradation pathway
description: >-
  A reusable bacterial aromatic-catabolism module for the upper benzoate
  degradation route that converts benzoate to catechol. The pathway begins with
  a multicomponent benzoate 1,2-dioxygenase system, represented here by BenA-like
  large oxygenase, BenB-like small oxygenase, and BenC-like reductase roles, and
  is followed by a BenD-like cis-diol dehydrogenase. Pseudomonas putida KT2440
  benA/benB/benC/benD provide the local PSEPK exemplars for this module, but the
  module boundary is the conserved benzoate-to-catechol pathway segment rather
  than a PSEPK-specific locus definition.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0043640
    title: benzoate catabolic process via hydroxylation
    statement: >-
      GO:0043640 grounds the module as benzoate catabolism by hydroxylation,
      covering dioxygenation of benzoate to a cis-dihydrodiol intermediate and
      dehydrogenation of that intermediate to catechol.
  - source_id: KEGG:ppu00622
    title: Pseudomonas putida KT2440 xylene degradation
    statement: >-
      The PSEPK partition table assigns benA, benB, benC, and benD as the
      primary KT2440 genes in KEGG ppu00622 for this upper benzoate route.
  - source_id: KEGG:M00551
    title: Benzoate degradation, benzoate to catechol
    statement: >-
      KEGG module M00551 captures the narrower benzoate-to-catechol pathway
      boundary implemented by benA, benB, benC, and benD; this is the preferred
      biochemical anchor for the module over the broader ppu00622 map label.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      The local membership table lists benA, benB, benC, and benD in ppu00622
      and overlapping aromatic-catabolism maps, while PP_1791 and PP_2504 are
      ppu00621 lower-pathway spillover genes and are outside this module.
  - source_id: PMID:12534466
    title: Genomic analysis of the aromatic catabolic pathways from Pseudomonas putida KT2440
    statement: >-
      The KT2440 aromatic-catabolism map places the ben genes in a benzoate
      peripheral pathway feeding catechol into the beta-ketoadipate route.
  - source_id: PMID:11053377
    title: BenR, a XylS homologue, regulates three different pathways of aromatic acid degradation in Pseudomonas putida.
    statement: >-
      The BenR study identifies benABC as likely encoding the benzoate
      dioxygenase system and supports co-regulated benzoate-responsive expression.
  - source_id: file:PSEPK/benA/benA-ai-review.yaml
    title: Curated benA review
    statement: >-
      The benA review accepts benzoate 1,2-dioxygenase activity and benzoate
      catabolism via hydroxylation as core functions of the large oxygenase
      subunit.
  - source_id: file:PSEPK/benB/benB-ai-review.yaml
    title: Curated benB review
    statement: >-
      The benB review treats BenB as a beta subunit contributing to the BenABC
      dioxygenase complex and removes a propagated 3-phenylpropionate process
      assignment.
  - source_id: file:PSEPK/benC/benC-ai-review.yaml
    title: Curated benC review
    statement: >-
      The benC review accepts ferredoxin-NAD+ reductase activity and
      contribution to benzoate 1,2-dioxygenase activity as the electron-transfer
      role for the pathway's first step.
  - source_id: file:PSEPK/benD/benD-ai-review.yaml
    title: Curated benD review
    statement: >-
      The benD review accepts the exact cis-diol dehydrogenase activity and
      removes a propagated fatty-acid elongation process assignment.
  - source_id: file:modules/benzoate_upper_pathway-deep-research-openscientist.md
    title: OpenScientist module research for benzoate upper degradation
    statement: >-
      OpenScientist module-level research supports the benzoate-to-catechol
      boundary, the obligatory ordering of BenABC dioxygenation before BenD
      dehydrogenation, and the exclusion of downstream catechol cleavage and
      CoA-dependent benzoate routes from this module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__benzoate_upper_pathway__ppu00622-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00622 benzoate upper-pathway review
    statement: >-
      OpenScientist concluded that the benzoate upper pathway is covered by
      benA/benB/benC/benD, that PP_1791 and PP_2504 are lower meta-cleavage
      spillover candidates, and that the ppu00622 xylene map label is broader
      than the endogenous KT2440 benzoate-to-catechol route.
notes: >-
  First-pass PSEPK interpretation: benA/benB/benC/benD satisfy the upper
  benzoate degradation segment from benzoate to catechol. The broader KEGG
  ppu00622 "xylene degradation" bucket intersects several aromatic maps, but
  this module deliberately stops at catechol; catechol ring cleavage,
  2-hydroxymuconate/4-oxalocrotonate steps, and the PP_1791/PP_2504 ppu00621
  spillover genes belong in downstream catechol/meta-cleavage modules. The
  module also keeps the electron-transfer and oxygenase roles separate so that
  BenC is not represented as independently enabling the terminal oxygenase
  chemistry.
module:
  id: benzoate_upper_pathway
  label: Benzoate to catechol upper pathway
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: benzoate catabolic process via hydroxylation
      term:
        id: GO:0043640
        label: benzoate catabolic process via hydroxylation
      description: >-
        Process-level grounding for benzoate breakdown by hydroxylation and
        dehydrogenation to catechol.
  context:
    taxa:
      - preferred_term: bacteria
        term:
          id: NCBITaxon:2
          label: Bacteria
        description: >-
          This module represents bacterial aerobic benzoate-to-catechol routes
          that use BenABC/BenD-like enzymes.
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          The PSEPK exemplars are soluble aromatic-catabolism enzymes with no
          evidence for membrane or periplasmic localization.
  parts:
    - order: 1
      role: benzoate dioxygenation to a cis-dihydrodiol
      node:
        id: benabc_dioxygenation
        label: BenABC benzoate dioxygenation
        module_type: REACTION
        description: >-
          A multicomponent benzoate 1,2-dioxygenase system introduces both atoms
          of dioxygen into benzoate, producing the cis-dihydrodiol intermediate
          used by the downstream dehydrogenase step.
        annotons:
          - id: bena_large_oxygenase
            label: Benzoate 1,2-dioxygenase large oxygenase subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: benzoate 1,2-dioxygenase large subunit family
                term:
                  id: InterPro:IPR017639
                  label: Benzo_1-2-diOase_lsu
                description: >-
                  BenA-like ring-hydroxylating dioxygenase alpha/large
                  subunits containing the Rieske and catalytic oxygenase domains.
                representative_members:
                  - preferred_term: PSEPK benA exemplar
                    term:
                      id: UniProtKB:Q88I40
                      label: Benzoate 1,2-dioxygenase subunit alpha
                    description: Pseudomonas putida KT2440 benA/PP_3161.
            function:
              preferred_term: benzoate 1,2-dioxygenase activity
              term:
                id: GO:0018623
                label: benzoate 1,2-dioxygenase activity
              substrates:
                - preferred_term: benzoate
                - preferred_term: dioxygen
                - preferred_term: NADH
              products:
                - preferred_term: cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate
                - preferred_term: NAD+
              cofactors:
                - preferred_term: "Rieske [2Fe-2S] cluster"
                  term:
                    id: GO:0051537
                    label: 2 iron, 2 sulfur cluster binding
                - preferred_term: non-heme iron
                  term:
                    id: GO:0005506
                    label: iron ion binding
              evidence:
                - source_id: file:PSEPK/benA/benA-goa.tsv
                  statement: >-
                    Q88I40 GOA includes EC-derived benzoate
                    1,2-dioxygenase activity and InterPro-supported [2Fe-2S]
                    cluster binding.
            processes:
              - preferred_term: benzoate catabolic process via hydroxylation
                term:
                  id: GO:0043640
                  label: benzoate catabolic process via hydroxylation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal oxygenase large subunit that carries the Rieske
              electron-transfer cluster and catalytic non-heme iron site for
              benzoate cis-dihydroxylation.
          - id: benb_small_oxygenase
            label: Benzoate 1,2-dioxygenase small oxygenase subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: benzoate 1,2-dioxygenase small subunit family
                term:
                  id: InterPro:IPR017641
                  label: Benzo_1-2-diOase_ssu
                description: >-
                  BenB-like ring-hydroxylating dioxygenase beta/small subunits
                  that support the terminal oxygenase component.
                representative_members:
                  - preferred_term: PSEPK benB exemplar
                    term:
                      id: UniProtKB:Q88I39
                      label: Benzoate 1,2-dioxygenase subunit beta
                    description: Pseudomonas putida KT2440 benB/PP_3162.
            function:
              preferred_term: contributes to benzoate 1,2-dioxygenase activity
              term:
                id: GO:0018623
                label: benzoate 1,2-dioxygenase activity
              substrates:
                - preferred_term: benzoate
                - preferred_term: dioxygen
              products:
                - preferred_term: cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate
              evidence:
                - source_id: file:PSEPK/benB/benB-ai-review.yaml
                  statement: >-
                    The curated benB review records the dioxygenase function as
                    a contributes_to annotation for the beta subunit.
            processes:
              - preferred_term: benzoate catabolic process via hydroxylation
                term:
                  id: GO:0043640
                  label: benzoate catabolic process via hydroxylation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Small oxygenase subunit that contributes to the BenAB terminal
              oxygenase component rather than independently catalyzing the full
              dioxygenase reaction.
          - id: benc_electron_transfer
            label: Benzoate dioxygenase reductase/electron-transfer component
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BenC-like FAD/NAD-binding reductase family
                term:
                  id: InterPro:IPR047683
                  label: BenC-like_FAD_NAD-bd
                description: >-
                  BenC-like reductase components that provide electrons to the
                  terminal benzoate dioxygenase oxygenase.
                representative_members:
                  - preferred_term: PSEPK benC exemplar
                    term:
                      id: UniProtKB:Q88I38
                      label: Benzoate 1,2-dioxygenase electron transfer component
                    description: Pseudomonas putida KT2440 benC/PP_3163.
            function:
              preferred_term: ferredoxin-NAD+ reductase activity
              term:
                id: GO:0008860
                label: ferredoxin-NAD+ reductase activity
              substrates:
                - preferred_term: NADH
                - preferred_term: oxidized BenC [2Fe-2S] center
              products:
                - preferred_term: NAD+
                - preferred_term: reduced BenC [2Fe-2S] center
              cofactors:
                - preferred_term: FAD
                  term:
                    id: GO:0050660
                    label: flavin adenine dinucleotide binding
                - preferred_term: "[2Fe-2S] cluster"
                  term:
                    id: GO:0051537
                    label: 2 iron, 2 sulfur cluster binding
              evidence:
                - source_id: file:PSEPK/benC/benC-goa.tsv
                  statement: >-
                    Q88I38 GOA includes EC-derived ferredoxin-NAD+ reductase
                    activity and contribution to benzoate 1,2-dioxygenase
                    activity.
            processes:
              - preferred_term: benzoate catabolic process via hydroxylation
                term:
                  id: GO:0043640
                  label: benzoate catabolic process via hydroxylation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Reductase/electron-transfer component that supplies reducing
              equivalents needed by the BenAB oxygenase through a fused
              FAD/[2Fe-2S] electron-transfer chain; this is modeled as its own
              redox function plus contribution to the dioxygenase step.
    - order: 2
      role: cis-dihydrodiol dehydrogenation to catechol
      node:
        id: bend_dehydrogenation
        label: BenD cis-diol dehydrogenation
        module_type: REACTION
        description: >-
          BenD-like dehydrogenases oxidize the benzoate cis-dihydrodiol
          intermediate generated by BenABC, yielding catechol for downstream
          beta-ketoadipate or catechol-cleavage modules.
        annotons:
          - id: bend_cis_diol_dehydrogenase
            label: Benzoate cis-dihydrodiol dehydrogenase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BenD dehydrogenase family
                term:
                  id: InterPro:IPR047686
                  label: BenD
                description: >-
                  BenD-like SDR-family enzymes catalyzing oxidation of the
                  benzoate cis-dihydrodiol intermediate.
                representative_members:
                  - preferred_term: PSEPK benD exemplar
                    term:
                      id: UniProtKB:Q88I37
                      label: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase
                    description: Pseudomonas putida KT2440 benD/PP_3164.
            function:
              preferred_term: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase activity
              term:
                id: GO:0047116
                label: 1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate dehydrogenase activity
              substrates:
                - preferred_term: cis-1,2-dihydroxycyclohexa-3,5-diene-1-carboxylate
                - preferred_term: NAD+
              products:
                - preferred_term: catechol
                - preferred_term: NADH
                - preferred_term: carbon dioxide
              evidence:
                - source_id: file:PSEPK/benD/benD-goa.tsv
                  statement: >-
                    Q88I37 GOA includes EC-derived
                    1,6-dihydroxycyclohexa-2,4-diene-1-carboxylate
                    dehydrogenase activity.
            processes:
              - preferred_term: benzoate catabolic process via hydroxylation
                term:
                  id: GO:0043640
                  label: benzoate catabolic process via hydroxylation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Dehydrogenation step converting the BenABC product to catechol.
  connections:
    - source: benabc_dioxygenation
      target: bend_dehydrogenation
      connection_type: PRECEDES
      description: >-
        The cis-dihydrodiol produced by BenABC is the substrate for BenD.
      chaining_status: VERIFIED
