id: MODULE:benzoate_upper_pathway
title: Benzoate upper pathway to catechol
description: >-
  A taxon-neutral bacterial upper-pathway module for the conversion of benzoate
  to catechol by benzoate 1,2-dioxygenase and the cognate cis-dihydrodiol
  dehydrogenase. This module captures the entry branch that supplies catechol to
  downstream ortho-cleavage or meta-cleavage routes. Broad xylene/toluene
  degradation maps can include methylated-aromatic upper pathways and
  meta-cleavage enzymes; those are adjacent context unless the taxon encodes the
  corresponding substrate-specific route.
status: DRAFT
evidence:
  - source_id: GO:0043639
    title: benzoate catabolic process
    statement: The module captures the benzoate-to-catechol entry branch of benzoate catabolism.
  - source_id: GO:0043640
    title: benzoate catabolic process via hydroxylation
    statement: Benzoate is hydroxylated by a dioxygenase route before dehydrogenation to catechol.
  - source_id: KEGG:ppu00622
    title: Xylene degradation - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00622 membership. The
      module separates the BenABCD benzoate upper branch from broader
      xylene/toluene and meta-cleavage side-route nodes in the organism-specific
      pathway map.
