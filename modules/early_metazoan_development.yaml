id: MODULE:early_metazoan_development
title: Early metazoan development module
description: >-
  A top-level developmental module that organises the conserved early events of
  animal (metazoan) embryogenesis into an ordered set of sub-programs, from the
  fertilised egg to a patterned, three-germ-layer embryo with a segregated
  germline. The trunk is a temporal sequence of four sub-programs, each detailed
  in its own dedicated module document: (1) the maternal-to-zygotic transition,
  which hands control from maternal factors to the embryo's own genome; (2)
  body axis specification, which converts graded morphogens into the AP, DV, and
  LR body axes; (3) germ layer specification during gastrulation, which
  partitions the embryo into endoderm, mesoderm, and ectoderm; and (4)
  primordial germ cell specification, which sets aside the gamete lineage. All
  four are wired by a small, deeply conserved "developmental toolkit" of
  signalling pathways - Wnt, TGF-beta/Nodal/BMP, Hedgehog, Notch, and RTK/FGF -
  captured here as a cross-cutting variant set that points to the existing
  signalling module documents. Grounded in GO:0009790 (embryo development).
status: DRAFT
evidence:
  - source_id: GO:0009790
    title: embryo development
    statement: The module is grounded in the GO term for embryo development.
  - source_id: file:maternal_to_zygotic_transition.yaml
    title: Maternal-to-zygotic transition module
    statement: Sub-program 1 is detailed in this module document.
  - source_id: file:body_axis_specification.yaml
    title: Embryonic body axis specification module
    statement: Sub-program 2 is detailed in this module document.
  - source_id: file:germ_layer_specification.yaml
    title: Germ layer specification module
    statement: Sub-program 3 is detailed in this module document.
  - source_id: file:primordial_germ_cell_specification.yaml
    title: Primordial germ cell specification module
    statement: Sub-program 4 is detailed in this module document.
notes: >-
  This umbrella intentionally keeps each sub-program as a thin node that names
  its concept, exemplar regulators, and the dedicated module file that expands
  it, rather than duplicating the full decomposition. The sub-programs overlap
  in time and share machinery (e.g. the same Nodal/Wnt/BMP gradients pattern the
  axes AND specify germ layers), which is why the toolkit is factored out as a
  cross-cutting variant set. Exemplar accessions are curated human UniProt ids
  used only to orient conserved, pan-metazoan roles.
module:
  id: early_metazoan_development
  label: Early metazoan development
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: embryo development
      term:
        id: GO:0009790
        label: embryo development
      description: The conserved early events of animal embryogenesis, from zygote to patterned germ-layer embryo.
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: The sub-programs and their signalling toolkit are conserved across animals.
  parts:
    - order: 1
      role: hand-off from maternal to zygotic control
      node:
        id: emd_mzt
        label: Maternal-to-zygotic transition
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Maternal mRNA/protein clearance coupled to zygotic genome activation.
          Detailed in modules/maternal_to_zygotic_transition.yaml.
        concepts:
          - preferred_term: zygotic genome activation
            term:
              id: GO:0141064
              label: zygotic genome activation
        annotons:
          - id: emd_mzt_zga_factor
            label: Pluripotency/ZGA factor (exemplar)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: POU5F1 (Oct4)
                term:
                  id: UniProtKB:Q01860
                  label: POU domain, class 5, transcription factor 1
                description: Core pluripotency factor active at zygotic genome activation.
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: zygotic genome activation
                term:
                  id: GO:0141064
                  label: zygotic genome activation
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Orients the ZGA sub-program; expanded in the dedicated MZT module.
    - order: 2
      role: establishment of the body axes
      node:
        id: emd_axes
        label: Body axis specification
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Conversion of graded morphogens into AP, DV, and LR body axes.
          Detailed in modules/body_axis_specification.yaml.
        concepts:
          - preferred_term: embryonic pattern specification
            term:
              id: GO:0009880
              label: embryonic pattern specification
        annotons:
          - id: emd_axes_readout
            label: Axial patterning readout (exemplar)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: TBXT (Brachyury)
                term:
                  id: UniProtKB:O15178
                  label: T-box transcription factor T (Brachyury)
                description: T-box factor reading posterior Wnt/FGF into axial/posterior identity.
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: anterior/posterior pattern specification
                term:
                  id: GO:0009952
                  label: anterior/posterior pattern specification
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Orients the axis sub-program; expanded in the dedicated body-axis module.
    - order: 3
      role: partition into germ layers
      node:
        id: emd_germ_layers
        label: Germ layer specification
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Specification of endoderm, mesoderm, and ectoderm during gastrulation.
          Detailed in modules/germ_layer_specification.yaml.
        concepts:
          - preferred_term: formation of primary germ layer
            term:
              id: GO:0001704
              label: formation of primary germ layer
          - preferred_term: gastrulation
            term:
              id: GO:0007369
              label: gastrulation
        annotons:
          - id: emd_germ_layer_master
            label: Germ-layer master regulator (exemplar)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SOX17
                term:
                  id: UniProtKB:Q9H6I2
                  label: Transcription factor SOX-17
                description: Endoderm master regulator; representative germ-layer determinant.
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: formation of primary germ layer
                term:
                  id: GO:0001704
                  label: formation of primary germ layer
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Orients the germ-layer sub-program; expanded in the dedicated module.
    - order: 4
      role: setting aside the germline
      node:
        id: emd_pgc
        label: Primordial germ cell specification
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Segregation of the gamete-forming lineage by preformation or induction.
          Detailed in modules/primordial_germ_cell_specification.yaml.
        concepts:
          - preferred_term: germ cell development
            term:
              id: GO:0007281
              label: germ cell development
        annotons:
          - id: emd_pgc_determinant
            label: Germline determinant (exemplar)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: DDX4 (Vasa)
                term:
                  id: UniProtKB:Q9NQI0
                  label: Probable ATP-dependent RNA helicase DDX4
                description: Conserved germ plasm/germ granule determinant.
            function:
              preferred_term: germ-granule RNA helicase / mRNA binding
              term:
                id: GO:0003729
                label: mRNA binding
              targets:
                - preferred_term: germline mRNAs
            processes:
              - preferred_term: germ cell development
                term:
                  id: GO:0007281
                  label: germ cell development
            locations:
              - preferred_term: germ plasm
                term:
                  id: GO:0060293
                  label: germ plasm
            role_description: Orients the germline sub-program; expanded in the dedicated PGC module.
  variant_sets:
    - id: developmental_toolkit
      label: Conserved developmental signalling toolkit
      axis: signalling pathway
      selection: ONE_OR_MORE
      notes: >-
        The small set of pathways deployed repeatedly across all four
        sub-programs. Each variant names a conserved pathway and its dedicated
        signalling module document; several also have gene reviews in-repo.
      variants:
        - id: toolkit_wnt
          label: Wnt/beta-catenin signalling
          module_type: SIGNALING_PATHWAY
          description: Posteriorising and endomesoderm-inducing; detailed in modules/wnt_signaling.yaml.
          concepts:
            - preferred_term: Wnt signaling pathway
              term:
                id: GO:0016055
                label: Wnt signaling pathway
        - id: toolkit_nodal
          label: Nodal/TGF-beta signalling
          module_type: SIGNALING_PATHWAY
          description: Mesendoderm induction and left/right asymmetry; detailed in modules/nodal_signaling.yaml.
          concepts:
            - preferred_term: nodal signaling pathway
              term:
                id: GO:0038092
                label: nodal signaling pathway
        - id: toolkit_bmp
          label: BMP signalling
          module_type: SIGNALING_PATHWAY
          description: Dorsal/ventral patterning and PGC induction; detailed in modules/bmp_signaling.yaml.
          concepts:
            - preferred_term: BMP signaling pathway
              term:
                id: GO:0030509
                label: BMP signaling pathway
        - id: toolkit_notch
          label: Notch signalling
          module_type: SIGNALING_PATHWAY
          description: Juxtacrine cell-fate/boundary decisions; detailed in modules/notch_signaling.yaml.
          concepts:
            - preferred_term: Notch signaling pathway
              term:
                id: GO:0007219
                label: Notch signaling pathway
        - id: toolkit_hedgehog
          label: Hedgehog signalling
          module_type: SIGNALING_PATHWAY
          description: Ventral/midline and tissue patterning; detailed in modules/hedgehog_signaling.yaml.
          concepts:
            - preferred_term: smoothened signaling pathway
              term:
                id: GO:0007224
                label: smoothened signaling pathway
        - id: toolkit_fgf
          label: FGF/RTK signalling
          module_type: SIGNALING_PATHWAY
          description: Mesoderm induction and posteriorisation; detailed in modules/fgfr_signaling.yaml.
          concepts:
            - preferred_term: fibroblast growth factor receptor signaling pathway
              term:
                id: GO:0008543
                label: fibroblast growth factor receptor signaling pathway
  connections:
    - source: emd_mzt
      target: emd_axes
      connection_type: PRECEDES
      description: Zygotic genome activation precedes and enables zygotic axial patterning.
    - source: emd_axes
      target: emd_germ_layers
      connection_type: PROVIDES_INPUT_FOR
      description: The morphogen gradients that define the axes also position and induce the germ layers.
    - source: emd_germ_layers
      target: emd_pgc
      connection_type: PRECEDES
      description: Germline segregation occurs alongside/after gastrulation, drawing on the same signalling toolkit.
