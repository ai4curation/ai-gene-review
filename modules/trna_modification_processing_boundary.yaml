id: MODULE:trna_modification_processing_boundary
title: tRNA modification, editing, and processing boundary
description: Boundary module for PSEPK tRNA modification and processing genes from the translation/RNA-processing umbrella.
  It covers wobble-uridine side-chain chemistry, t6A37 formation, tRNA methylation, pseudouridylation, deamination, lysidine
  formation, thiolation, dihydrouridine synthesis, aminocarboxypropylation, prenylation, and CCA-end processing.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_trna_modification_processing.tsv
  title: PSEPK translation/RNA tRNA modification split
  statement: The batch records tRNA modification, editing, and CCA-end processing enzymes curated in the final translation/RNA-processing
    split.
- source_id: file:PSEPK/mnmG/mnmG-ai-review.yaml
  title: Curated mnmG review
  statement: mnmG encodes the conserved MnmG/GidA flavoprotein component of the MnmEG tRNA wobble-uridine modification system,
    which helps install the carboxymethylaminomethyl group at U34 of selected tRNAs.
- source_id: file:PSEPK/mnmE/mnmE-ai-review.yaml
  title: Curated mnmE review
  statement: mnmE encodes the MnmE/TrmE tRNA-modification GTPase that works with MnmG during formation of carboxymethylaminomethyl-modified
    wobble uridines in selected tRNAs.
- source_id: file:PSEPK/tsaC/tsaC-ai-review.yaml
  title: Curated tsaC review
  statement: tsaC encodes threonylcarbamoyl-AMP synthase, the Sua5-family enzyme that makes the TC-AMP intermediate required
    for N6-threonylcarbamoyladenosine formation at position 37 of tRNAs.
- source_id: file:PSEPK/tsaD/tsaD-ai-review.yaml
  title: Curated tsaD review
  statement: tsaD encodes the TsaD tRNA N6-adenosine threonylcarbamoyltransferase, the catalytic subunit that transfers the
    threonylcarbamoyl group to A37 during bacterial t6A biosynthesis.
- source_id: file:PSEPK/cca/cca-ai-review.yaml
  title: Curated cca review
  statement: cca encodes the multifunctional bacterial CCA-adding enzyme that builds, repairs, and can tandemly extend the
    3-prime CCA end of tRNAs.
- source_id: file:PSEPK/cmoM/cmoM-ai-review.yaml
  title: Curated cmoM review
  statement: cmoM encodes a CmoM-family tRNA 5-carboxymethoxyuridine methyltransferase that methylates cmo5U34 to mcmo5U34
    in tRNAs.
- source_id: file:PSEPK/selU/selU-ai-review.yaml
  title: Curated selU review
  statement: selU encodes tRNA 2-selenouridine synthase, a SelU-family enzyme that converts 2-thiouridine-containing wobble
    uridines to 2-selenouridine derivatives in selected tRNAs.
- source_id: file:PSEPK/trmJ/trmJ-ai-review.yaml
  title: Curated trmJ review
  statement: trmJ encodes a SPOUT-family TrmJ methyltransferase that forms 2-prime-O-methylcytidine and 2-prime-O-methyluridine
    at position 32 in tRNAs.
- source_id: file:PSEPK/tadA/tadA-ai-review.yaml
  title: Curated tadA review
  statement: tadA encodes the tRNA-specific adenosine deaminase that edits adenosine-34 to inosine in bacterial tRNAs.
- source_id: file:PSEPK/cmoB/cmoB-ai-review.yaml
  title: Curated cmoB review
  statement: cmoB encodes tRNA U34 carboxymethyltransferase, which transfers a carboxymethyl group from carboxy-S-adenosyl-L-methionine
    to 5-hydroxyuridine at wobble position 34.
- source_id: file:PSEPK/trmD/trmD-ai-review.yaml
  title: Curated trmD review
  statement: trmD encodes the TrmD SPOUT methyltransferase that installs N1-methylguanosine at position 37 in tRNAs.
- source_id: file:PSEPK/tsaB/tsaB-ai-review.yaml
  title: Curated tsaB review
  statement: tsaB encodes the TsaB accessory subunit of the bacterial t6A biosynthesis system, which supports TsaD/TsaE-dependent
    transfer of the threonylcarbamoyl group to tRNA A37.
- source_id: file:PSEPK/tilS/tilS-ai-review.yaml
  title: Curated tilS review
  statement: tilS encodes tRNA(Ile)-lysidine synthase, which ligates lysine onto cytidine-34 in tRNA(Ile) to generate lysidine
    and ensure AUA codon decoding as isoleucine.
- source_id: file:PSEPK/truD/truD-ai-review.yaml
  title: Curated truD review
  statement: truD encodes tRNA pseudouridine synthase D, the enzyme responsible for converting uridine-13 to pseudouridine
    in tRNAs.
- source_id: file:PSEPK/yfiP/yfiP-ai-review.yaml
  title: Curated yfiP review
  statement: yfiP encodes a DTW-domain tRNA-uridine aminocarboxypropyltransferase predicted to install aminocarboxypropyl
    modifications on tRNA uridines.
- source_id: file:PSEPK/ttcA/ttcA-ai-review.yaml
  title: Curated ttcA review
  statement: ttcA encodes the iron-sulfur enzyme TtcA, an ATP-dependent tRNA cytidine-32 2-sulfurtransferase involved in tRNA
    thio-modification.
- source_id: file:PSEPK/rluA/rluA-ai-review.yaml
  title: Curated rluA review
  statement: rluA encodes an RluA-family dual-specificity pseudouridine synthase that modifies tRNA position 32 and 23S rRNA
    position 746.
- source_id: file:PSEPK/mnmC/mnmC-ai-review.yaml
  title: Curated mnmC review
  statement: mnmC encodes bifunctional MnmC, which oxidizes and methylates the wobble U34 side chain during conversion of
    cmnm5s2U to mnm5s2U in tRNAs.
- source_id: file:PSEPK/trhO/trhO-ai-review.yaml
  title: Curated trhO review
  statement: trhO encodes tRNA uridine-34 hydroxylase, an oxygen-dependent enzyme that forms 5-hydroxyuridine at the wobble
    position of selected tRNAs.
- source_id: file:PSEPK/dusC/dusC-ai-review.yaml
  title: Curated dusC review
  statement: dusC encodes the DusC tRNA-dihydrouridine synthase that reduces uridine-16 to dihydrouridine in tRNAs.
- source_id: file:PSEPK/truA/truA-ai-review.yaml
  title: Curated truA review
  statement: truA encodes tRNA pseudouridine synthase A, which forms pseudouridine at positions 38, 39 and 40 in the anticodon
    stem-loop region of tRNAs.
- source_id: file:PSEPK/dusA/dusA-ai-review.yaml
  title: Curated dusA review
  statement: dusA encodes the DusA tRNA-dihydrouridine synthase that reduces uridine-20 and uridine-20a in tRNA D-loops.
- source_id: file:PSEPK/trmK/trmK-ai-review.yaml
  title: Curated trmK review
  statement: trmK encodes a TrmK-family tRNA adenine-22 N1 methyltransferase candidate.
- source_id: file:PSEPK/PP_4520/PP_4520-ai-review.yaml
  title: Curated PP_4520 review
  statement: PP_4520 encodes a DTWD2/TAPT-family tRNA-uridine aminocarboxypropyltransferase candidate.
- source_id: file:PSEPK/trmA/trmA-ai-review.yaml
  title: Curated trmA review
  statement: trmA encodes the TrmA/RumT tRNA and tmRNA uracil-C5 methyltransferase that forms m5U54 in tRNAs and the corresponding
    methyluridine in tmRNA.
- source_id: file:PSEPK/truB/truB-ai-review.yaml
  title: Curated truB review
  statement: truB encodes tRNA pseudouridine synthase B, which forms pseudouridine-55 in the T-loop of tRNAs.
- source_id: file:PSEPK/dusB/dusB-ai-review.yaml
  title: Curated dusB review
  statement: dusB encodes the DusB tRNA-dihydrouridine synthase subfamily enzyme, an FMN-dependent oxidoreductase that reduces
    uridine residues to dihydrouridine in tRNAs.
- source_id: file:PSEPK/miaA/miaA-ai-review.yaml
  title: Curated miaA review
  statement: miaA encodes tRNA dimethylallyltransferase, which transfers a dimethylallyl group to adenosine-37 in tRNAs that
    read codons beginning with uridine.
- source_id: file:PSEPK/tsaE/tsaE-ai-review.yaml
  title: Curated tsaE review
  statement: tsaE encodes the TsaE ATPase-family factor of the bacterial t6A biosynthesis system, supporting TsaD/TsaB-dependent
    threonylcarbamoyl transfer to tRNA A37.
- source_id: file:PSEPK/trmL/trmL-ai-review.yaml
  title: Curated trmL review
  statement: trmL encodes a TrmL SPOUT methyltransferase that methylates the 2-prime-O-ribose of cytidine-34 and cmnm5U34
    wobble nucleotides in leucine tRNAs.
