id: MODULE:catechol_ortho_cleavage
title: Catechol ortho-cleavage branch of the beta-ketoadipate pathway
description: >-
  A reusable bacterial aromatic-catabolism module for the catechol
  ortho-cleavage branch that converts catechol to beta-ketoadipate enol-lactone.
  The branch begins with intradiol cleavage of catechol to cis,cis-muconate by a
  CatA-like catechol 1,2-dioxygenase, followed by CatB-like muconate
  cycloisomerase and CatC-like muconolactone delta-isomerase steps. In
  Pseudomonas putida KT2440, CatA-I/PP_3713 and CatA-II/PP_3166 provide
  paralogous catechol 1,2-dioxygenase exemplars, CatB/PP_3715 supplies the
  muconate cycloisomerase step, and CatC/PP_3714 supplies the isomerase step.
  The module starts at catechol, the output of upstream aromatic upper pathways
  such as BenABCD benzoate degradation, and stops before the shared lower
  beta-ketoadipate reactions that convert the enol-lactone toward central
  metabolism.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0019615
    title: catechol catabolic process, ortho-cleavage
    statement: >-
      GO:0019615 provides the process-level boundary for the catechol
      ortho-cleavage branch modeled here.
  - source_id: UniPathway:UPA00157
    title: beta-ketoadipate pathway
    statement: >-
      UniPathway places CatA and CatC in the catechol-derived beta-ketoadipate
      route, with the catechol branch represented as three steps from catechol
      to the beta-ketoadipate enol-lactone intermediate.
  - source_id: KEGG:ppu00361
    title: Pseudomonas putida KT2440 chlorocyclohexane and chlorobenzene degradation
    statement: >-
      The local PSEPK pathway partition assigns CatA-I, CatA-II, and CatB to
      KEGG ppu00361, but the biochemical interpretation is catechol
      ortho-cleavage rather than a complete chlorinated-aromatic degradation
      module.
  - source_id: KEGG:ppu00362
    title: Pseudomonas putida KT2440 benzoate degradation
    statement: >-
      CatC is pulled from neighboring benzoate/aromatic-catabolism memberships
      because it is required downstream of CatB in the catechol branch, even
      though it is not a primary ppu00361 bucket gene.
  - source_id: file:modules/catechol_ortho_cleavage-deep-research-openscientist.md
    title: OpenScientist module research for catechol ortho-cleavage
    statement: >-
      OpenScientist retrieval supports the three-enzyme CatA to CatB to CatC
      boundary, the start at catechol, the stop before shared lower
      beta-ketoadipate reactions, and the separation of chlorocatechol modified
      ortho-cleavage as a distinct neighboring module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__catechol_ortho_cleavage__ppu00361-deep-research-openscientist.md
    title: OpenScientist PSEPK pathway research for ppu00361 catechol ortho-cleavage
    statement: >-
      The PSEPK-specific retrieval concluded that the KT2440 catechol
      ortho-cleavage branch is fully satisfiable once CatC/PP_3714 is included;
      its omission from the ppu00361 candidate bucket is a KEGG map-partitioning
      artifact, not a biological pathway gap.
  - source_id: PMID:2449420
    title: Transcriptional regulation, nucleotide sequence, and localization of the promoter of the catBC operon in Pseudomonas putida.
    statement: >-
      Classical P. putida catBC work identifies catB and catC as encoding
      cis,cis-muconate lactonizing enzyme I and muconolactone isomerase,
      respectively, required for benzoate dissimilation to beta-ketoadipate.
  - source_id: file:PSEPK/catA/catA-ai-review.yaml
    title: Curated catA-I review
    statement: >-
      The catA review supports catechol 1,2-dioxygenase activity for
      CatA-I/PP_3713 and records CatA-II/PP_3166 as a KT2440 paralog.
  - source_id: file:PSEPK/catA-II/catA-II-ai-review.yaml
    title: Curated catA-II review
    statement: >-
      The catA-II review supports the same catechol 1,2-dioxygenase activity
      for the ben locus-associated PP_3166 paralog.
  - source_id: file:PSEPK/catA-II/catA-II-deep-research-openscientist.md
    title: OpenScientist gene research for catA-II
    statement: >-
      OpenScientist confirmed Q88I35/PP_3166 as a catechol 1,2-dioxygenase
      paralog embedded in the benzoate uptake/oxidation gene island and
      distinguished it from the CatA-I/PP_3713 cat-operon paralog.
  - source_id: file:PSEPK/catB/catB-ai-review.yaml
    title: Curated catB review
    statement: >-
      The catB review accepts muconate cycloisomerase activity and removes
      propagated peptide/amino-acid and chloromuconate annotations that are not
      supported for the KT2440 CatB enzyme.
  - source_id: file:PSEPK/catC/catC-ai-review.yaml
    title: Curated catC review
    statement: >-
      The catC review accepts muconolactone delta-isomerase activity and places
      CatC downstream of CatA and CatB in the catechol branch.
notes: >-
  First-pass PSEPK interpretation: ppu00361 contributes CatA-I, CatA-II, and
  CatB, but its KEGG map label is broader than the native KT2440 module. The
  reusable module is the catechol ortho-cleavage branch: CatA converts catechol
  to cis,cis-muconate, CatB converts cis,cis-muconate to muconolactone, and
  CatC converts muconolactone to beta-ketoadipate enol-lactone. CatC is included
  despite being assigned to neighboring ppu00362/ppu01220 buckets because it is
  required for a complete catechol branch. Downstream enol-lactone hydrolase,
  CoA-transferase, and thiolase steps are shared beta-ketoadipate lower-pathway
  chemistry and should be modeled separately. OpenScientist module-level and
  PSEPK-specific retrieval both support this boundary and flag the ppu00361
  chlorinated-aromatic label as an over-broad database-map framing for KT2440.
module:
  id: catechol_ortho_cleavage
  label: Catechol ortho-cleavage branch
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: catechol catabolic process, ortho-cleavage
      term:
        id: GO:0019615
        label: catechol catabolic process, ortho-cleavage
      description: >-
        Conversion of catechol through intradiol ring cleavage and subsequent
        lactone rearrangements toward the beta-ketoadipate pathway.
  context:
    taxa:
      - preferred_term: bacteria
        term:
          id: NCBITaxon:2
          label: Bacteria
        description: >-
          This module represents bacterial CatABC-like catechol
          ortho-cleavage routes.
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: CatABC-like bacterial aromatic-catabolism enzymes are soluble cytosolic enzymes.
  parts:
    - order: 1
      role: catechol intradiol ring cleavage
      node:
        id: cata_ring_cleavage
        label: CatA catechol 1,2-dioxygenation
        module_type: REACTION
        description: >-
          CatA-like intradiol dioxygenases cleave catechol between the two
          hydroxylated carbons, incorporating both atoms of dioxygen and forming
          cis,cis-muconate.
        annotons:
          - id: cata_activity
            label: Catechol 1,2-dioxygenase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: catechol 1,2-dioxygenase family
                term:
                  id: NCBIfam:TIGR02439
                  label: catechol 1,2-dioxygenase
                description: >-
                  CatA-like proteobacterial intradiol ring-cleavage
                  dioxygenases with a non-heme Fe(III) active site.
                representative_members:
                  - preferred_term: PSEPK catA-I exemplar
                    term:
                      id: UniProtKB:Q88GK8
                      label: catechol 1,2-dioxygenase
                    description: Pseudomonas putida KT2440 catA-I/PP_3713.
                  - preferred_term: PSEPK catA-II exemplar
                    term:
                      id: UniProtKB:Q88I35
                      label: catechol 1,2-dioxygenase
                    description: Pseudomonas putida KT2440 catA-II/PP_3166.
            function:
              preferred_term: catechol 1,2-dioxygenase activity
