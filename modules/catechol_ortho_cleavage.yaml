                  term:
                    id: GO:0008199
                    label: ferric iron binding
              evidence:
                - source_id: file:PSEPK/catA/catA-uniprot.txt
                  statement: >-
                    Q88GK8 UniProt records the catechol + O2 to
                    cis,cis-muconate reaction and Fe(III) cofactor.
                - source_id: file:PSEPK/catA-II/catA-II-uniprot.txt
                  statement: >-
                    Q88I35 UniProt records the same catechol 1,2-dioxygenase
                    reaction for the CatA-II paralog.
            processes:
              - preferred_term: catechol catabolic process, ortho-cleavage
                term:
                  id: GO:0019615
                  label: catechol catabolic process, ortho-cleavage
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              First committed catechol-branch step; KT2440 carries a cat
              regulon copy (CatA-I) and a ben locus-associated paralog
              (CatA-II).
    - order: 2
      role: cis,cis-muconate lactonization
      node:
        id: catb_lactonization
        label: CatB muconate cycloisomerization
        module_type: REACTION
        description: >-
          CatB-like enzymes cycloisomerize cis,cis-muconate to muconolactone,
          the second reaction of the catechol branch.
        annotons:
