                      id: UniProtKB:Q88GK7
                      label: Muconolactone Delta-isomerase
                    description: Pseudomonas putida KT2440 catC/PP_3714.
            function:
              preferred_term: muconolactone delta-isomerase activity
              term:
                id: GO:0016159
                label: muconolactone delta-isomerase activity
              substrates:
