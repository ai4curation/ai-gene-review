id: MODULE:purine_nucleotide_interconversion
title: Purine nucleotide interconversion (IMP -> AMP/GMP; purine nucleotide cycle) — ADSS1/IMPDH/AMPD disorders
description: >-
  Inosine monophosphate (IMP), the first complete purine nucleotide made by de novo
  synthesis (and by salvage), sits at the branch point from which the adenine and guanine
  ribonucleotides are made, and it is the hub of the purine nucleotide cycle. Toward AMP,
  adenylosuccinate synthetase (ADSS1 muscle / ADSS2 liver) condenses IMP with L-aspartate
  using GTP to form adenylosuccinate (S-AMP), which adenylosuccinate lyase (ADSL) then
  cleaves to AMP + fumarate. Toward GMP, IMP dehydrogenase (IMPDH1/IMPDH2) oxidises IMP to
  xanthosine monophosphate (XMP) with NAD+ — the committed, rate-limiting step of guanine-
  nucleotide synthesis — and GMP synthase (GMPS) then aminates XMP to GMP using the amide
  nitrogen of glutamine. Completing the cycle, AMP deaminase (AMPD1 muscle / AMPD2 broad-
  neuronal / AMPD3 erythrocyte) hydrolytically deaminates AMP back to IMP + ammonia; in
  exercising muscle the AMPD1 -> ADSS1 -> ADSL loop (the purine nucleotide cycle) buffers
  the adenylate energy charge and supplies fumarate (anaplerosis) and ammonia. Because GTP
  is required to make AMP and ATP to make GMP, these reactions also cross-regulate the two
  nucleotide pools. Inherited defects: ADSS1 deficiency causes a distal myopathy; IMPDH1
  mutations cause retinitis pigmentosa (RP10) and IMPDH2 a neurodevelopmental dystonia
  (IMPDH2 is the mycophenolate/ribavirin target); AMPD1 deficiency is myoadenylate deaminase
  deficiency (common, often benign) and AMPD2 deficiency causes pontocerebellar hypoplasia
  type 9 / spastic paraplegia (SPG63).
status: DRAFT
evidence:
  - source_id: GO:0006164
    title: purine nucleotide biosynthetic process
    statement: >-
      The module covers purine nucleotide biosynthesis/interconversion (GO:0006164):
      IMP -> AMP (ADSS/ADSL), IMP -> GMP (IMPDH/GMPS) and AMP -> IMP (AMPD, purine
      nucleotide cycle).
  - source_id: Reactome:R-HSA-73817
    title: Purine ribonucleoside monophosphate biosynthesis
    statement: >-
      Reactions follow the human Reactome purine-metabolism reactions R-HSA-111524
      (ADSS), R-HSA-73794 (IMPDH), R-HSA-73792 (GMPS) and R-HSA-76590 (AMPD).
  - source_id: file:human/ADSS1/ADSS1-ai-review.yaml
    title: ADSS1 gene review (human)
    statement: >-
      The IMP -> adenylosuccinate step (UniProtKB:Q8N142, GO:0004019) matches the
      completed human ADSS1 review.
  - source_id: file:human/ADSL/ADSL-ai-review.yaml
    title: ADSL gene review (human)
    statement: >-
      The adenylosuccinate -> AMP step (UniProtKB:P30566, GO:0004018) matches the
      completed human ADSL review (also in the de novo purine module).
  - source_id: file:human/IMPDH1/IMPDH1-ai-review.yaml
    title: IMPDH1 gene review (human)
    statement: >-
      The IMP -> XMP step (UniProtKB:P20839, GO:0003938) matches the completed human
      IMPDH1 review.
  - source_id: file:human/IMPDH2/IMPDH2-ai-review.yaml
    title: IMPDH2 gene review (human)
    statement: >-
      The ubiquitous IMP -> XMP isozyme (UniProtKB:P12268, GO:0003938) matches the
      completed human IMPDH2 review.
  - source_id: file:human/GMPS/GMPS-ai-review.yaml
    title: GMPS gene review (human)
    statement: >-
      The XMP -> GMP step (UniProtKB:P49915, GO:0003922) matches the completed human
      GMPS review.
  - source_id: file:human/AMPD1/AMPD1-ai-review.yaml
    title: AMPD1 gene review (human)
    statement: >-
      The AMP -> IMP step (UniProtKB:P23109, GO:0003876) matches the completed human
      AMPD1 review.
  - source_id: file:human/AMPD2/AMPD2-ai-review.yaml
    title: AMPD2 gene review (human)
    statement: >-
      The broad/neuronal AMP -> IMP isozyme (UniProtKB:Q01433, GO:0003876) matches the
      completed human AMPD2 review.
  - source_id: file:human/AMPD3/AMPD3-ai-review.yaml
    title: AMPD3 gene review (human)
    statement: >-
      The erythrocyte AMP -> IMP isozyme (UniProtKB:Q01432, GO:0003876) matches the
      completed human AMPD3 review.
module:
  id: purine_nucleotide_interconversion
  label: Purine nucleotide interconversion (IMP <-> AMP/GMP)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: purine nucleotide biosynthetic process
      term:
        id: GO:0006164
        label: purine nucleotide biosynthetic process
      description: >-
        Interconversion of IMP with AMP and GMP, and regeneration of IMP from AMP
        (purine nucleotide cycle).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: These purine-interconversion enzymes are cytosolic.
  parts:
    - order: 1
      role: IMP -> AMP (committed adenylosuccinate step)
      node:
        id: adss_step
        label: IMP + L-aspartate + GTP to adenylosuccinate + GDP + Pi
        module_type: REACTION
        annotons:
          - id: adss_activity
            label: "ADSS1/ADSS2: adenylosuccinate synthetase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenylosuccinate synthetase family (ADSS1/ADSS2)
                term:
                  id: PANTHER:PTHR11846
                  label: ADENYLOSUCCINATE SYNTHETASE
                representative_members:
                  - preferred_term: ADSS1 (human, muscle isozyme)
                    term:
                      id: UniProtKB:Q8N142
                      label: Adenylosuccinate synthetase isozyme 1
            function:
              preferred_term: adenylosuccinate synthase activity
              term:
                id: GO:0004019
                label: adenylosuccinate synthase activity
              substrates:
                - preferred_term: IMP
                - preferred_term: L-aspartate
                - preferred_term: GTP
              products:
                - preferred_term: adenylosuccinate (N6-(1,2-dicarboxyethyl)-AMP)
                - preferred_term: GDP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.3.4.4
                  statement: adenylosuccinate synthetase; GTP-dependent; committed IMP->AMP step (ADSL completes to AMP + fumarate)
                - source_id: Reactome:R-HSA-111524
                  statement: "IMP + L-Aspartate + GTP => Adenylosuccinate + GDP + Pi [ADSS] (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              GTP-dependent, committed first step toward AMP; adenylosuccinate lyase (ADSL)
              then cleaves adenylosuccinate to AMP + fumarate. ADSS1 = muscle isozyme (distal
              myopathy on deficiency); ADSS2 = liver/ubiquitous.
    - order: 2
      role: IMP -> XMP (committed, rate-limiting GMP step)
      node:
        id: impdh_step
        label: IMP + NAD+ + H2O to XMP + NADH
        module_type: REACTION
        annotons:
          - id: impdh_activity
            label: "IMPDH1/IMPDH2: IMP dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IMP dehydrogenase family (IMPDH1/IMPDH2)
                term:
                  id: PANTHER:PTHR11911
                  label: INOSINE MONOPHOSPHATE DEHYDROGENASE
                representative_members:
                  - preferred_term: IMPDH2 (human, ubiquitous/proliferation-associated)
                    term:
                      id: UniProtKB:P12268
                      label: Inosine-5'-monophosphate dehydrogenase 2
                  - preferred_term: IMPDH1 (human, retina-enriched)
                    term:
                      id: UniProtKB:P20839
                      label: Inosine-5'-monophosphate dehydrogenase 1
            function:
              preferred_term: IMP dehydrogenase activity
              term:
                id: GO:0003938
                label: IMP dehydrogenase activity
              substrates:
                - preferred_term: IMP
                - preferred_term: NAD+
              products:
                - preferred_term: xanthosine 5'-monophosphate (XMP)
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.205
                  statement: IMP dehydrogenase; committed rate-limiting GMP-synthesis step; CBS/Bateman domain, filament-forming; IMPDH2 = mycophenolate/ribavirin target
                - source_id: Reactome:R-HSA-73794
                  statement: "IMP + H2O + NAD+ => XMP + NADH + H+ [IMPDH1,2] (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Committed, rate-limiting step of de novo GMP synthesis. IMPDH1 (retina-enriched;
              RP10/LCA) and IMPDH2 (ubiquitous; neurodevelopmental dystonia; mycophenolate/
              ribavirin drug target) form regulated tetramers/filaments.
    - order: 3
      role: XMP -> GMP (glutamine amination)
      node:
        id: gmps_step
        label: XMP + L-glutamine + ATP to GMP + L-glutamate + AMP + PPi
        module_type: REACTION
        annotons:
          - id: gmps_activity
            label: "GMPS: GMP synthase (glutamine-hydrolysing)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GMP synthase family (GMPS)
                term:
                  id: PANTHER:PTHR11922
                  label: GMP SYNTHASE
                representative_members:
                  - preferred_term: GMPS (human)
                    term:
                      id: UniProtKB:P49915
                      label: GMP synthase [glutamine-hydrolyzing]
            function:
              preferred_term: GMP synthase (glutamine-hydrolyzing) activity
              term:
                id: GO:0003922
                label: GMP synthase (glutamine-hydrolyzing) activity
              substrates:
                - preferred_term: XMP
                - preferred_term: L-glutamine
                - preferred_term: ATP
              products:
                - preferred_term: GMP
                - preferred_term: L-glutamate
                - preferred_term: AMP + diphosphate
              evidence:
                - source_id: EC:6.3.5.2
                  statement: GMP synthase (glutamine-hydrolysing); final de novo GMP step, downstream of IMPDH
                - source_id: Reactome:R-HSA-73792
                  statement: "XMP + L-Glutamine + ATP + H2O => GMP + L-Glutamate + AMP + pyrophosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Aminates XMP to GMP using glutamine and ATP; the final step of de novo GMP
              synthesis. Also has a reported USP7/p53-regulatory nuclear moonlighting role
              (non-core).
    - order: 4
      role: AMP -> IMP (purine nucleotide cycle / regeneration)
      node:
        id: ampd_step
        label: AMP + H2O to IMP + ammonia
        module_type: REACTION
        annotons:
          - id: ampd_activity
            label: "AMPD1/AMPD2/AMPD3: AMP deaminase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: AMP deaminase family (AMPD1/AMPD2/AMPD3)
                term:
                  id: PANTHER:PTHR11359
                  label: AMP DEAMINASE
                representative_members:
                  - preferred_term: AMPD1 (human, muscle)
                    term:
                      id: UniProtKB:P23109
                      label: AMP deaminase 1
                  - preferred_term: AMPD2 (human, liver/neuronal)
                    term:
                      id: UniProtKB:Q01433
                      label: AMP deaminase 2
                  - preferred_term: AMPD3 (human, erythrocyte)
                    term:
                      id: UniProtKB:Q01432
                      label: AMP deaminase 3
            function:
              preferred_term: AMP deaminase activity
              term:
                id: GO:0003876
                label: AMP deaminase activity
              substrates:
                - preferred_term: AMP
                - preferred_term: water
              products:
                - preferred_term: IMP
                - preferred_term: ammonia
              evidence:
                - source_id: EC:3.5.4.6
                  statement: AMP deaminase (Zn2+ metalloenzyme); regenerates IMP; purine nucleotide cycle in muscle
                - source_id: Reactome:R-HSA-76590
                  statement: "AMP + H2O => IMP + NH4+ (AMPD) (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Deaminates AMP back to IMP, closing the purine nucleotide cycle (with ADSS/ADSL)
              and buffering the adenylate energy charge. Isozymes AMPD1 (muscle; myoadenylate
              deaminase deficiency), AMPD2 (broad/neuronal; PCH9/SPG63), AMPD3 (erythrocyte; benign).
  connections:
    - source: impdh_step
      target: gmps_step
      connection_type: PROVIDES_INPUT_FOR
      description: XMP from IMP dehydrogenase is aminated to GMP by GMP synthase.
    - source: ampd_step
      target: adss_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        AMP deaminase regenerates IMP, which adenylosuccinate synthetase re-uses toward AMP
        (the purine nucleotide cycle).
    - source: ampd_step
      target: impdh_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        IMP regenerated by AMP deaminase can also be routed to GMP synthesis via IMP
        dehydrogenase.
  notes: >-
    Purine nucleotide interconversion at the IMP branch point, grounded to the human enzymes
    adenylosuccinate synthetase ADSS1 (UniProtKB:Q8N142, GO:0004019, EC 6.3.4.4), IMP
    dehydrogenase IMPDH1 (P20839) / IMPDH2 (P12268) (GO:0003938, EC 1.1.1.205), GMP synthase
    GMPS (P49915, GO:0003922, EC 6.3.5.2) and AMP deaminase AMPD1 (P23109) / AMPD2 (Q01433) /
    AMPD3 (Q01432) (GO:0003876, EC 3.5.4.6). GO molecular-function terms were taken from the
    human GOA records; Reactome reaction ids and titles were verified against the local
    reactome cache. Each step uses a PANTHER family selector generic over the tissue isozymes
    and orthologs (IMPDH node carries IMPDH1+IMPDH2; AMPD node carries AMPD1/2/3). The IMP->AMP
    arm is completed by adenylosuccinate lyase ADSL (reviewed in the de_novo_purine_synthesis
    module; its GO:0004018 adenylosuccinate-lyase activity cleaves adenylosuccinate to AMP +
    fumarate). Upstream, IMP is produced by de novo synthesis (de_novo_purine_synthesis module,
    ending at ATIC) and by salvage (HPRT1, purine_salvage_and_catabolism module). The
    AMPD1->ADSS1->ADSL loop is the muscle purine nucleotide cycle (energy-charge buffering,
    fumarate anaplerosis, ammonia release). Disorders: ADSS1 -> distal myopathy; IMPDH1 ->
    retinitis pigmentosa 10 / LCA; IMPDH2 -> neurodevelopmental dystonia; AMPD1 -> myoadenylate
    deaminase deficiency; AMPD2 -> pontocerebellar hypoplasia type 9 / SPG63; AMPD3 -> benign
    erythrocyte AMP deaminase deficiency; GMPS has no common Mendelian disease.
