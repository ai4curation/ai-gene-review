id: MODULE:mnma_tus_trna_thiolation_boundary
title: MnmA/Tus tRNA thiolation boundary
description: >-
  Boundary module for the ppu04122 Tus/MnmA sulfur-relay subset in
  Pseudomonas putida KT2440. The satisfiable first-pass pathway is sulfur
  relay from TusA-family carriers through the TusBCD complex and TusE to MnmA,
  which catalyzes ATP-dependent 2-thiolation of wobble-position uridine in
  tRNA. tusA-I is retained as a TusA-family sulfur-carrier paralog whose exact
  client remains unresolved, while PP_3994 is promoted as the TusC-like member
  of the TusBCD complex despite lacking fetched GOA rows.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04122
    title: Sulfur relay system - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04122 provides the organism-specific sulfur-relay umbrella that
      includes the Tus/MnmA tRNA-thiolation subset alongside molybdopterin,
      thiamine, and rhodanese/mercaptopyruvate sulfur-transfer side nodes.
  - source_id: file:projects/P_PUTIDA/batches/ppu04122_sulfur_relay_system_partition.tsv
    title: ppu04122 sulfur-relay partition table
    statement: >-
      The partition separates tusA-I, tusA, tusD, PP_3994, PP_3995, tusE, and
      mnmA into the Tus/MnmA tRNA-thiolation bucket.
  - source_id: file:PSEPK/mnmA/mnmA-ai-review.yaml
    title: Curated mnmA review
    statement: >-
      The mnmA review accepts tRNA-uridine 2-sulfurtransferase activity and
      tRNA wobble-position uridine thiolation as the core catalytic endpoint.
  - source_id: file:PSEPK/tusD/tusD-ai-review.yaml
    title: Curated tusD review
    statement: >-
      The tusD review accepts sulfur-carrier activity, tRNA wobble-position
      uridine thiolation, and sulfurtransferase-complex membership.
  - source_id: file:PSEPK/PP_3995/PP_3995-ai-review.yaml
    title: Curated PP_3995 review
    statement: >-
      The PP_3995 review accepts the TusB sulfurtransferase-complex subunit
      role in tRNA wobble-position uridine thiolation.
notes: >-
  First-pass interpretation: tusA is the canonical TusA sulfur carrier; tusD,
  PP_3994, and PP_3995 form the TusD/TusC/TusB sulfurtransferase-complex core;
  tusE is the downstream sulfur carrier; and mnmA is the catalytic
  tRNA-uridine 2-sulfurtransferase. tusA-I is kept in the boundary as a
  paralogous TusA-like sulfur carrier candidate pending evidence for its
  sulfur-relay client.
