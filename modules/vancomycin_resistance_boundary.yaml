id: MODULE:vancomycin_resistance_boundary
title: Vancomycin resistance boundary
description: >-
  Boundary/absence module for KEGG ppu01502 in Pseudomonas putida KT2440. The
  organism-specific KEGG vancomycin-resistance map contains six core
  peptidoglycan precursor enzymes: DadX, DdlA, DdlB, MurF, MraY, and MurG.
  These genes define D-alanine supply, D-Ala-D-Ala ligation, UDP-MurNAc-
  pentapeptide completion, and lipid I/lipid II assembly. They do not constitute
  a VanHAX D-Ala-D-Lac vancomycin-resistance pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu01502
    title: Vancomycin resistance - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu01502 provides the PSEPK curation batch. Its six members are
      dadX, ddlA, ddlB, murF, mraY, and murG, all of which are peptidoglycan
      precursor enzymes also represented in D-amino-acid, lysine, or
      peptidoglycan biosynthesis maps.
  - source_id: file:projects/P_PUTIDA/batches/ppu01502_vancomycin_resistance_boundary.tsv
    title: PSEPK ppu01502 vancomycin-resistance boundary batch
    statement: >-
      The batch records all six PSEPK members with present gene reviews and
      Asta retrieval files after the first-pass curation sweep.
module:
  id: vancomycin_resistance_boundary
  label: Vancomycin resistance boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: vancomycin resistance boundary
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has mapped
        peptidoglycan precursor and lipid II assembly enzymes, not a satisfiable
        acquired VanHAX-type vancomycin-resistance route.
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: Direct process represented by MurF, MraY, MurG, and D-Ala-D-Ala ligases.
    - preferred_term: D-alanine biosynthetic process
      term:
        id: GO:0030632
        label: D-alanine biosynthetic process
      description: DadX alanine racemase context for D-alanine supply.
    - preferred_term: alanine racemase activity
      term:
        id: GO:0008784
        label: alanine racemase activity
      description: DadX PLP-dependent L-alanine/D-alanine interconversion.
    - preferred_term: D-alanine-D-alanine ligase activity
      term:
        id: GO:0008716
        label: D-alanine-D-alanine ligase activity
      description: DdlA and DdlB synthesis of the D-Ala-D-Ala dipeptide.
    - preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
      term:
        id: GO:0008766
        label: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
      description: MurF completion of the UDP-MurNAc-pentapeptide precursor.
    - preferred_term: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
      term:
        id: GO:0008963
        label: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
      description: MraY lipid I-forming transferase activity.
    - preferred_term: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
      term:
        id: GO:0050511
        label: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
      description: MurG lipid II-forming GlcNAc transferase activity.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble D-alanine and UDP-MurNAc-peptide enzymes act in the cytoplasm or cytosol.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: MraY and MurG act at the bacterial inner membrane during lipid-linked precursor assembly.
  parts:
    - order: 1
      role: VanHAX pathway absence guardrail
      node:
        id: vanhax_absence_guardrail
        label: VanHAX pathway absence guardrail
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu01502 batch is not interpreted as evidence that KT2440 carries
          a complete vancomycin-resistance pathway. It lacks the defining
          D-Ala-D-Lac remodeling route represented by VanHAX-type enzymes; the
          mapped genes are shared cell-wall precursor targets and supply nodes.
        annotons: []
    - order: 2
      role: D-alanine supply and D-Ala-D-Ala ligation
      node:
        id: d_alanine_supply_and_dipeptide_ligation
        label: D-alanine supply and D-Ala-D-Ala ligation
        module_type: METABOLIC_PATHWAY
        description: >-
          DadX supplies D-alanine by alanine racemization, while DdlA and DdlB
          form the D-Ala-D-Ala dipeptide used by MurF. This chemistry is a
          normal peptidoglycan precursor route and a vancomycin target context,
          not a resistance-conferring D-Ala-D-Lac bypass.
        annotons:
          - id: dadX_alanine_racemase
            label: "dadX: alanine racemase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dadX
            function:
              preferred_term: alanine racemase activity
              term:
                id: GO:0008784
                label: alanine racemase activity
            processes:
              - preferred_term: D-alanine biosynthetic process
                term:
                  id: GO:0030632
                  label: D-alanine biosynthetic process
            role_description: Supplies D-alanine by reversible L-alanine/D-alanine racemization.
          - id: ddlA_d_alanine_d_alanine_ligase
            label: "ddlA: D-alanine-D-alanine ligase A"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlA
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Forms the D-Ala-D-Ala dipeptide for peptidoglycan stem-peptide completion.
          - id: ddlB_d_alanine_d_alanine_ligase
            label: "ddlB: D-alanine-D-alanine ligase B"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlB
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Second D-Ala-D-Ala ligase paralog contributing the dipeptide for MurF.
    - order: 3
      role: UDP-MurNAc-pentapeptide and lipid-linked precursor assembly
      node:
        id: udp_murnac_pentapeptide_and_lipid_ii_assembly
        label: UDP-MurNAc-pentapeptide and lipid II assembly
        module_type: METABOLIC_PATHWAY
        description: >-
          MurF completes UDP-MurNAc-pentapeptide, MraY transfers that precursor
          to undecaprenyl phosphate to form lipid I, and MurG adds GlcNAc to
          form lipid II. These are conserved peptidoglycan precursor steps
          shared with the peptidoglycan biosynthesis module.
        annotons:
          - id: murF_udp_murnac_pentapeptide_ligase
            label: "murF: UDP-MurNAc-tripeptide D-Ala-D-Ala ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murF
            function:
              preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
              term:
                id: GO:0008766
                label: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Completes the UDP-MurNAc-pentapeptide stem precursor.
          - id: mraY_lipid_i_transferase
            label: "mraY: phospho-MurNAc-pentapeptide transferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mraY
            function:
              preferred_term: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
              term:
                id: GO:0008963
                label: phospho-N-acetylmuramoyl-pentapeptide-transferase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Forms lipid I by transferring phospho-MurNAc-pentapeptide to undecaprenyl phosphate.
          - id: murG_lipid_ii_glcnac_transferase
            label: "murG: lipid II GlcNAc transferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murG
            function:
              preferred_term: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
              term:
                id: GO:0050511
                label: undecaprenyldiphospho-muramoylpentapeptide beta-N-acetylglucosaminyltransferase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Adds GlcNAc to lipid I to form lipid II.
  notes: >-
    This module is intentionally scoped as a boundary/absence module. The PSEPK
    ppu01502 membership records enzymes whose products or downstream
    peptidoglycan precursors are relevant to vancomycin target biology, but the
    first-pass curation does not support annotating KT2440 as carrying a
    VanHAX-type vancomycin-resistance pathway.
