id: MODULE:mapk_relay
title: Generic three-tier MAP kinase relay (MAP3K -> MAP2K -> MAPK)
description: >-
  The minimal, reusable core motif shared by all mitogen-activated protein
  kinase cascades: a three-tier protein kinase relay in which a MAP kinase
  kinase kinase (MAP3K) phosphorylates and activates a MAP kinase kinase
  (MAP2K), which in turn dually phosphorylates the activation loop of a MAP
  kinase (MAPK). The motif is deliberately gene-free and taxon-neutral: it fixes
  only the three tier identities (by molecular-function term) and the activating
  phosphotransfer topology that connects them. Concrete cascades - ERK1/2, p38,
  JNK, ERK5, the fungal Fus3/Kss1/Hog1 pathways, and plant MPK cascades - embed
  this motif as an inner bundle through `conforms_to`, substituting their own
  kinase families and adding their own upstream activation and downstream
  effector steps before and after the relay. Grounded in GO:0000165 (MAPK
  cascade).
status: DRAFT
evidence:
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      An intracellular protein kinase cascade containing at least a MAPK, a
      MAP2K, and a MAP3K acting in series, in which the MAP3K activates the
      MAP2K and the MAP2K activates the MAPK. This term is the conformance
      anchor for the relay motif.
notes: >-
  Reusable conformance target. A node in a concrete cascade module declares
  `conforms_to: [{template: mapk_relay}]` when its three child steps are an
  instance of this relay. Conformance is a consistency check, not inheritance:
  the conforming bundle should contain the three tiers (by molecular-function
  term GO:0004709 -> GO:0004708 -> GO:0004707) joined by activating (CAUSES)
  phosphotransfer edges. Legitimate deviations (e.g. a single MAP2K paralog
  rather than a pair, or a scaffolded relay) may be recorded on the conformance
  object's `deviations`/`notes` with status WITH_DEVIATIONS rather than forcing a
  literal structural match. Participants are abstract ANY_WITH_FUNCTION selectors
  because the motif asserts tier chemistry only; concrete kinase families are
  supplied by the conforming cascade.
module:
  id: mapk_relay
  label: Three-tier MAP kinase relay
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: MAPK cascade
      term:
        id: GO:0000165
        label: MAPK cascade
      description: Three-tier MAP3K -> MAP2K -> MAPK protein kinase relay.
  parts:
    - order: 1
      role: MAP3K tier
      node:
        id: map3k
        label: MAP kinase kinase kinase (MAP3K) tier
        module_type: REACTION
        description: >-
          An activated MAP3K phosphorylates serine/threonine residues in the
          activation loop of a MAP2K. In a concrete cascade this tier is filled
          by a specific MAP3K family (e.g. RAF for ERK1/2; ASK1/MLK/MEKK for
          p38 and JNK).
        annotons:
          - id: map3k_activity
            label: MAP3K activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase kinase kinase activity
                term:
                  id: GO:0004709
                  label: MAP kinase kinase kinase activity
            function:
              preferred_term: MAP kinase kinase kinase activity
              term:
                id: GO:0004709
                label: MAP kinase kinase kinase activity
              targets:
                - preferred_term: MAP2K
            role_description: Top tier; phosphorylates and activates the MAP2K.
    - order: 2
      role: MAP2K tier
      node:
        id: map2k
        label: MAP kinase kinase (MAP2K) tier
        module_type: REACTION
        description: >-
          A dual-specificity MAP2K phosphorylates both the threonine and the
          tyrosine of the MAPK activation-loop motif. In a concrete cascade this
          tier is filled by a specific MAP2K family (e.g. MEK1/MEK2 for ERK1/2;
          MKK3/MKK6 for p38; MKK4/MKK7 for JNK).
        annotons:
          - id: map2k_activity
            label: MAP2K activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase kinase activity
                term:
                  id: GO:0004708
                  label: MAP kinase kinase activity
            function:
              preferred_term: MAP kinase kinase activity
              term:
                id: GO:0004708
                label: MAP kinase kinase activity
              targets:
                - preferred_term: MAPK activation loop
            role_description: Middle tier; dual-specificity activation of the MAPK.
    - order: 3
      role: MAPK tier
      node:
        id: mapk
        label: MAP kinase (MAPK) tier
        module_type: REACTION
        description: >-
          The dually phosphorylated MAPK becomes an active proline-directed
          serine/threonine kinase that acts on cytoplasmic and nuclear
          substrates. In a concrete cascade this tier is filled by a specific
          MAPK family (e.g. ERK1/ERK2; p38 alpha/beta/gamma/delta; JNK1/2/3).
        annotons:
          - id: mapk_activity
            label: MAPK activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            function:
              preferred_term: MAP kinase activity
              term:
                id: GO:0004707
                label: MAP kinase activity
            role_description: Effector tier; transduces the cascade output to substrates.
  connections:
    - source: map3k
      target: map2k
      connection_type: CAUSES
      description: The MAP3K phosphorylates and activates the MAP2K.
    - source: map2k
      target: mapk
      connection_type: CAUSES
      description: The MAP2K dually phosphorylates and activates the MAPK.
