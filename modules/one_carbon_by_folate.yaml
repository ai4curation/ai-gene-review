id: MODULE:one_carbon_by_folate
title: One-carbon pool by folate
description: >-
  A bacterial folate-mediated one-carbon metabolism module covering
  interconversion of tetrahydrofolate one-carbon carriers and their use in
  purine, thymidylate, and methyl-cycle reactions. In Pseudomonas putida
  KT2440, KEGG ppu00670 also pulls in glycine-cleavage enzymes, methionine-cycle
  enzymes, betaine/choline oxidation, and lipoamide dehydrogenases. Those are
  tracked as boundary or source/sink context unless they directly interconvert
  folate one-carbon carriers or consume a folate-bound one-carbon unit.
status: DRAFT
evidence:
  - source_id: GO:0006730
    title: one-carbon metabolic process
    statement: >-
      The module is grounded in one-carbon metabolic process and focuses on
      reactions that move or consume one-carbon units through folate carriers.
  - source_id: GO:0035999
    title: tetrahydrofolate interconversion
    statement: >-
      FolD/FolD-like and methylenetetrahydrofolate reductase steps interconvert
      tetrahydrofolate-bound one-carbon states.
  - source_id: KEGG:ppu00670
    title: One carbon pool by folate - Pseudomonas putida KT2440
    statement: >-
      The KEGG PSEPK bucket provides the first-pass candidate set, but combines
      strict folate one-carbon carrier chemistry with source/sink and adjacent
      pathway genes.
module:
  id: one_carbon_by_folate
  label: One-carbon pool by folate
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: one-carbon metabolic process
      term:
        id: GO:0006730
        label: one-carbon metabolic process
      description: Transfer and interconversion of single-carbon units.
    - preferred_term: tetrahydrofolate interconversion
      term:
        id: GO:0035999
        label: tetrahydrofolate interconversion
      description: Interconversion of tetrahydrofolate-bound one-carbon states.
  parts:
    - order: 1
      role: tetrahydrofolate one-carbon carrier interconversion
      node:
        id: folate_carrier_interconversion
        label: THF one-carbon carrier interconversion
        module_type: METABOLIC_PATHWAY
        description: >-
          Interconverts 5,10-methylene-THF, 5,10-methenyl-THF,
          10-formyl-THF, and 5-methyl-THF carrier states. PSEPK encodes two
          FolD paralogs and two methylenetetrahydrofolate reductase candidates.
        annotons:
          - id: folD1_methylene_thf_dehydrogenase_cyclohydrolase
            label: FolD1 bifunctional dehydrogenase/cyclohydrolase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folD1
                term:
                  id: UniProtKB:Q88LI7
                  label: Bifunctional protein FolD 1
            function:
              preferred_term: methylenetetrahydrofolate dehydrogenase (NADP+) activity
              term:
                id: GO:0004488
                label: methylenetetrahydrofolate dehydrogenase (NADP+) activity
              evidence:
                - source_id: EC:1.5.1.5
                  statement: methylenetetrahydrofolate dehydrogenase
            role_description: FolD paralog interconverting methylene/methenyl/formyl THF states.
          - id: folD2_methylene_thf_dehydrogenase_cyclohydrolase
            label: FolD2 bifunctional dehydrogenase/cyclohydrolase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folD2
                term:
                  id: UniProtKB:Q88KM5
                  label: Bifunctional protein FolD 2
            function:
              preferred_term: methenyl tetrahydrofolate cyclohydrolase activity
              term:
                id: GO:0004477
                label: methenyltetrahydrofolate cyclohydrolase activity
              evidence:
                - source_id: EC:3.5.4.9
                  statement: methenyltetrahydrofolate cyclohydrolase
            role_description: Second FolD paralog; gene-level review should resolve redundancy or condition-specific roles.
          - id: metF_methylene_thf_reductase
            label: MetF methylenetetrahydrofolate reductase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK metF
                term:
                  id: UniProtKB:Q88D51
                  label: Methylenetetrahydrofolate reductase
            function:
              preferred_term: methylenetetrahydrofolate reductase (NADH) activity
              term:
                id: GO:0106312
                label: methylenetetrahydrofolate reductase (NADH) activity
              evidence:
                - source_id: EC:1.5.1.54
                  statement: methylenetetrahydrofolate reductase
            role_description: Reduces 5,10-methylene-THF to 5-methyl-THF for methionine synthase.
          - id: pp4638_methylene_thf_reductase_candidate
            label: PP_4638 methylenetetrahydrofolate reductase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_4638
                term:
                  id: UniProtKB:Q88E30
                  label: Methylenetetrahydrofolate reductase
            function:
              preferred_term: methylenetetrahydrofolate reductase (NADH) activity
              term:
                id: GO:0106312
                label: methylenetetrahydrofolate reductase (NADH) activity
            role_description: MTHFR-like candidate; distinguish from metF in gene-level review.
          - id: fau_5_formyl_thf_cycloligase
            label: Fau 5-formyltetrahydrofolate cyclo-ligase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK fau
                term:
                  id: UniProtKB:Q88CH8
                  label: 5-formyltetrahydrofolate cyclo-ligase
            function:
              preferred_term: 5-formyltetrahydrofolate cyclo-ligase activity
              term:
                id: GO:0030272
                label: 5-formyltetrahydrofolate cyclo-ligase activity
              evidence:
                - source_id: EC:6.3.3.2
                  statement: 5-formyltetrahydrofolate cyclo-ligase
            role_description: Salvages or reactivates 5-formyl-THF into the folate one-carbon carrier pool.
    - order: 2
      role: folate one-carbon donation to nucleotide synthesis
      node:
        id: one_carbon_donation_to_nucleotides
        label: Folate one-carbon donation to purine and thymidylate synthesis
        module_type: METABOLIC_PATHWAY
        annotons:
          - id: purN_gar_transformylase
            label: PurN GAR transformylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purN
                term:
                  id: UniProtKB:Q88MB0
                  label: Phosphoribosylglycinamide formyltransferase
            function:
              preferred_term: phosphoribosylglycinamide formyltransferase activity
              term:
                id: GO:0004644
                label: phosphoribosylglycinamide formyltransferase activity
            role_description: Uses 10-formyl-THF to formylate GAR during de novo IMP biosynthesis.
          - id: purH_aicar_transformylase_imp_cyclohydrolase
            label: PurH AICAR transformylase / IMP cyclohydrolase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purH
                term:
                  id: UniProtKB:Q88DK3
                  label: Bifunctional purine biosynthesis protein PurH
            function:
              preferred_term: phosphoribosylaminoimidazolecarboxamide formyltransferase activity
              term:
                id: GO:0004643
                label: phosphoribosylaminoimidazolecarboxamide formyltransferase activity
            role_description: Uses 10-formyl-THF in the AICAR transformylase step of de novo IMP biosynthesis.
          - id: thyA_thymidylate_synthase
            label: ThyA thymidylate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thyA
                term:
                  id: UniProtKB:Q88CN9
                  label: Thymidylate synthase
            function:
              preferred_term: thymidylate synthase activity
              term:
                id: GO:0004799
                label: thymidylate synthase activity
            role_description: Uses 5,10-methylene-THF as one-carbon donor for dTMP synthesis.
    - order: 3
      role: folate one-carbon sources and drains
      optional: true
      node:
        id: one_carbon_sources_and_drains
        label: Folate-linked one-carbon sources and drains
        module_type: METABOLIC_PATHWAY
        description: >-
          Source and drain reactions generate, consume, or dissipate folate-bound
          one-carbon units but may belong primarily to glycine, purine, methionine,
          or stress/osmoprotection modules.
        annotons:
          - id: glyA_serine_hydroxymethyltransferase
            label: GlyA serine hydroxymethyltransferase candidates
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK glyA1/glyA2
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
            role_description: Supplies 5,10-methylene-THF from serine and THF.
          - id: gcv_system_glycine_cleavage
            label: Glycine cleavage system
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK gcvP/gcvH/gcvT paralog sets
            function:
              preferred_term: aminomethyltransferase activity
              term:
                id: GO:0004047
                label: aminomethyltransferase activity
            role_description: Glycine cleavage transfers one-carbon units to THF through the T protein and lipoate carrier context.
          - id: purU_formyl_thf_deformylase
            label: PurU formyltetrahydrofolate deformylase candidates
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purU-I/purU-II/purU-III
            function:
              preferred_term: formyltetrahydrofolate deformylase activity
              term:
                id: GO:0008864
                label: formyltetrahydrofolate deformylase activity
            role_description: Hydrolyzes 10-formyl-THF, potentially regulating one-carbon pool balance.
    - order: 4
      role: ppu00670 boundary context
      optional: true
      node:
        id: ppu00670_boundary_context
        label: Methionine-cycle, betaine, and lipoamide boundary nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00670 includes genes whose primary modules are methionine
          cycling, glycine cleavage/lipoate metabolism, and betaine/choline
          oxidation. These should not be used alone to satisfy strict folate
          one-carbon carrier interconversion.
        parts:
          - order: 1
            role: methionine cycle boundary
            node:
              id: methionine_cycle_boundary
              label: Methionine cycle boundary
              module_type: METABOLIC_PATHWAY
              description: metH, metK, ahcY, and cystathionine-pathway genes connect methyl-THF to methionine/SAM metabolism.
          - order: 2
            role: betaine and choline boundary
            node:
              id: betaine_boundary
              label: Betaine and choline oxidation boundary
              module_type: METABOLIC_PATHWAY
              description: betA, betB, and PP_0708 support glycine betaine/osmoprotection chemistry rather than folate carrier interconversion.
          - order: 3
            role: lipoamide dehydrogenase boundary
            node:
              id: lipoamide_boundary
              label: Lipoamide dehydrogenase boundary
              module_type: METABOLIC_PATHWAY
              description: lpd, lpdG, and lpdV are shared lipoamide dehydrogenases for glycine-cleavage and other multienzyme complexes.
  connections:
    - source: folate_carrier_interconversion
      target: one_carbon_donation_to_nucleotides
      connection_type: PROVIDES_INPUT_FOR
      description: THF-bound one-carbon states supply transformylase and thymidylate synthase reactions.
    - source: one_carbon_sources_and_drains
      target: folate_carrier_interconversion
      connection_type: PROVIDES_INPUT_FOR
      description: Serine/glycine and formyl-THF turnover reactions feed or drain the carrier pool.
