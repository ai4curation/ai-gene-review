id: MODULE:bacterial_cellulose_biosynthesis
title: Bacterial cellulose biosynthesis
description: >-
  A reusable Gram-negative bacterial module for c-di-GMP-regulated cellulose
  synthase and export. The core module couples BcsA-family UDP-forming cellulose
  polymerization, BcsB-family periplasmic synthase-complex support, and BcsC-like
  outer-membrane export, with BcsQ/YhjQ-family positioning ATPases as accessory
  cellulose-machinery factors. Pseudomonas putida KT2440 bcsA/PP_2635,
  bcsB/PP_2636, PP_2638, and PP_2634 provide local exemplars.
status: DRAFT
evidence:
  - source_id: GO:0030244
    title: cellulose biosynthetic process
    statement: >-
      GO:0030244 is the biological-process term for formation of cellulose, a
      beta-1,4 glucan, and anchors the module-level process.
  - source_id: UniPathway:UPA00694
    title: UniPathway UPA00694
    statement: >-
      The local UPA00694 membership set includes bcsB and PP_2638, while
      species-aware review showed that bcsA must be added as the catalytic
      cellulose synthase subunit for the KT2440 module instance.
  - source_id: file:modules/bacterial_cellulose_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module research for bacterial cellulose biosynthesis
    statement: >-
      OpenScientist summarized the conserved BcsA/BcsB/BcsC cellulose
      synthase/secretion architecture, c-di-GMP control, and lineage-specific
      accessory factors.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__cellulose_biosynthesis__upa00694-deep-research-openscientist.md
    title: OpenScientist species-aware cellulose pathway research
    statement: >-
      OpenScientist concluded that KT2440 UPA00694 is satisfiable once bcsA is
      included, and that PP_2634 is BcsQ/YhjQ rather than a second cellulose
      synthase.
  - source_id: file:PSEPK/bcsA/bcsA-ai-review.yaml
    title: Curated bcsA review
    statement: >-
      The bcsA review accepts UDP-forming cellulose synthase activity
      (GO:0016760), cellulose biosynthetic process, and inner-membrane
      localization for Q88JL4.
  - source_id: file:PSEPK/bcsB/bcsB-ai-review.yaml
    title: Curated bcsB review
    statement: >-
      The bcsB review treats Q88JL3 as a non-catalytic inner-membrane/periplasmic
      BcsB accessory subunit that supports the BcsA cellulose synthase complex.
  - source_id: file:PSEPK/PP_2638/PP_2638-ai-review.yaml
    title: Curated PP_2638 review
    statement: >-
      The PP_2638 review accepts a BcsC-like outer-membrane export/support role
      in cellulose biosynthesis.
  - source_id: file:PSEPK/PP_2634/PP_2634-ai-review.yaml
    title: Curated PP_2634 review
    statement: >-
      The PP_2634 review identifies Q88JL5 as a BcsQ/YhjQ-family P-loop NTPase
      accessory factor and explicitly separates it from catalytic cellulose
      synthase activity.
  - source_id: PMID:23222542
    title: Crystallographic snapshot of cellulose synthesis and membrane translocation.
    statement: >-
      Primary structural evidence establishes BcsA as the catalytic inner-membrane
      subunit and BcsB as an inner-membrane-anchored periplasmic partner.
  - source_id: PMID:24704788
    title: Mechanism of activation of bacterial cellulose synthase by cyclic di-GMP.
    statement: >-
      Primary structural evidence places the c-di-GMP PilZ-domain activation
      switch on BcsA.
  - source_id: PMID:31604608
    title: Architecture of the Cellulose Synthase Outer Membrane Channel and Its Association
      with the Periplasmic TPR Domain.
    statement: >-
      Primary structural evidence defines BcsC as the outer-membrane cellulose
      secretion porin with a periplasmic TPR domain.
  - source_id: PMID:39242554
    title: Insights into phosphoethanolamine cellulose synthesis and secretion across
      the Gram-negative cell envelope.
    statement: >-
      Cryo-EM evidence supports the BcsB-to-BcsC trans-envelope handoff for
      cellulose secretion.
  - source_id: PMID:19400787
    title: BcsQ is an essential component of the Escherichia coli cellulose biosynthesis
      apparatus that localizes at the bacterial cell pole.
    statement: >-
      Primary work on E. coli BcsQ supports the BcsQ/YhjQ accessory positioning
      role transferred to KT2440 PP_2634 by domain architecture and operon
      context.
notes: >-
  First-pass interpretation: the reusable module is the bacterial
  cellulose-synthase/export machine rather than a PSEPK-only UniPathway bucket.
  BcsA-family proteins provide the UDP-glucose-dependent beta-1,4-glucan
  polymerase, BcsB-family proteins organize the periplasmic synthase complex, and
  BcsC-like proteins export cellulose across the Gram-negative outer membrane.
  BcsQ/YhjQ-family P-loop NTPases are accessory positioning/assembly factors and
  must not be counted as additional cellulose synthase catalytic subunits. In
  KT2440, PP_2635/bcsA was missing from the original UPA00694 candidate list but
  is the required catalytic exemplar; PP_2634 is kept as BcsQ accessory context
  and name-correction evidence.
module:
  id: bacterial_cellulose_biosynthesis
  label: Bacterial cellulose biosynthesis
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: cellulose biosynthetic process
      term:
        id: GO:0030244
        label: cellulose biosynthetic process
      description: Formation of cellulose, a beta-1,4 glucan.
  parts:
    - order: 1
      role: Cellulose synthase catalytic subunit
      node:
        id: bcsA_cellulose_polymerization_step
        label: BcsA cellulose polymerization step
        module_type: REACTION
        description: >-
          BcsA-family multi-pass inner-membrane GT2 enzymes polymerize
          UDP-glucose into cellulose and couple chain elongation to membrane
          translocation.
        annotons:
          - id: bcsA_cellulose_synthase
            label: BcsA cellulose synthase catalytic subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsA cellulose synthase catalytic subunit family
                term:
                  id: PANTHER:PTHR43867
                  label: Cellulose synthase catalytic subunit A [UDP-forming]
                description: >-
                  BcsA/CesA-family GT2 cellulose synthase catalytic subunits
                  that polymerize UDP-glucose into beta-1,4-glucan and carry the
                  c-di-GMP-responsive PilZ regulatory domain in many bacterial
                  systems.
                representative_members:
                  - preferred_term: PSEPK bcsA exemplar
                    term:
                      id: UniProtKB:Q88JL4
                      label: Cellulose synthase catalytic subunit [UDP-forming]
                    description: Pseudomonas putida KT2440 bcsA/PP_2635.
            function:
              preferred_term: cellulose synthase (UDP-forming) activity
              term:
                id: GO:0016760
                label: cellulose synthase (UDP-forming) activity
              substrates:
                - preferred_term: UDP-alpha-D-glucose
                - preferred_term: growing beta-1,4-glucan cellulose chain
              products:
                - preferred_term: UDP
                - preferred_term: elongated beta-1,4-glucan cellulose chain
              evidence:
                - source_id: GO:0016760
                  statement: >-
                    GO:0016760 is the specific UDP-forming cellulose synthase
                    activity accepted in the curated KT2440 bcsA review.
                - source_id: file:PSEPK/bcsA/bcsA-goa.tsv
                  statement: >-
                    The KT2440 bcsA GOA row maps Q88JL4 to GO:0016760 with
                    RHEA:19929 and EC:2.4.1.12.
                - source_id: PMID:23222542
                  statement: >-
                    BcsA/BcsB structural work establishes BcsA as the catalytic
                    cellulose synthase subunit.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Catalytic inner-membrane subunit that extends the cellulose
              beta-1,4-glucan chain from UDP-glucose; PSEPK Q88JL4 is the local
              exemplar.
          - id: bcsA_cyclic_di_gmp_binding_switch
            label: BcsA cyclic-di-GMP binding regulatory switch
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsA PilZ-domain cellulose synthase family
                term:
                  id: InterPro:IPR009875
                  label: PilZ domain
                description: >-
                  PilZ-domain regulatory modules in bacterial cellulose synthase
                  catalytic subunits that bind c-di-GMP and relieve BcsA
                  autoinhibition.
                representative_members:
                  - preferred_term: PSEPK bcsA exemplar
                    term:
                      id: UniProtKB:Q88JL4
                      label: Cellulose synthase catalytic subunit [UDP-forming]
                    description: Pseudomonas putida KT2440 bcsA/PP_2635.
            function:
              preferred_term: cyclic-di-GMP binding
              term:
                id: GO:0035438
                label: cyclic-di-GMP binding
              evidence:
                - source_id: GO:0035438
                  statement: >-
                    GO:0035438 is present in the KT2440 bcsA GOA as a
                    non-core regulatory activity.
                - source_id: PMID:24704788
                  statement: >-
                    Primary structural work shows c-di-GMP binding to the BcsA
                    PilZ domain relieves autoinhibition of cellulose synthase.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Regulatory c-di-GMP binding switch on BcsA that activates the
              cellulose synthase catalytic module.
    - order: 2
      role: Cellulose synthase BcsB accessory/regulatory subunit
      node:
        id: bcsB_periplasmic_synthase_support_step
        label: BcsB periplasmic cellulose synthase support step
        module_type: REGULATORY_STEP
        description: >-
          BcsB-family inner-membrane-anchored periplasmic proteins associate
          with BcsA and organize the periplasmic path for nascent cellulose in
          the synthase/secretion complex.
        annotons:
          - id: bcsB_cellulose_synthase_accessory_subunit
            label: BcsB cellulose synthase accessory subunit
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsB cellulose synthase accessory family
                term:
                  id: PANTHER:PTHR39083
                  label: Cyclic di-GMP-binding protein
                description: >-
                  BcsB/AcsB-family membrane-anchored periplasmic partners of
                  BcsA cellulose synthases. The primary c-di-GMP switch is kept
                  with BcsA unless direct BcsB binding evidence is available.
                representative_members:
                  - preferred_term: PSEPK bcsB exemplar
                    term:
                      id: UniProtKB:Q88JL3
                      label: Cyclic di-GMP-binding protein
                    description: Pseudomonas putida KT2440 bcsB/PP_2636.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Non-catalytic inner-membrane/periplasmic BcsB subunit that
              supports BcsA-dependent cellulose polymerization and trans-envelope
              passage of the nascent glucan.
    - order: 3
      role: Cellulose synthase operon C export/support protein
      node:
        id: bcsC_cellulose_export_support_step
        label: BcsC cellulose export/support step
        module_type: TRANSPORT_STEP
        description: >-
          BcsC-like outer-membrane proteins with periplasmic TPR repeats provide
          the Gram-negative export/support component for cellulose secretion.
        annotons:
          - id: bcsC_cellulose_export_support
            label: BcsC cellulose export/support protein
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsC-like cellulose export family
                term:
                  id: InterPro:IPR008410
                  label: BCSC_C
                description: >-
                  BcsC-like cellulose synthase operon C proteins with
                  C-terminal outer-membrane channel domains and periplasmic TPR
                  repeats that support cellulose export.
                representative_members:
                  - preferred_term: PSEPK PP_2638 exemplar
                    term:
                      id: UniProtKB:Q88JL1
                      label: Cellulose synthase operon C protein
                    description: Pseudomonas putida KT2440 PP_2638.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: outer membrane
                term:
                  id: GO:0019867
                  label: outer membrane
            role_description: >-
              Outer-membrane cellulose export/support component; PSEPK Q88JL1 is
              the local BcsC-like exemplar, with exact KT2440 pore chemistry
              still inferred from orthologs.
    - order: 4
      role: Accessory BcsQ/YhjQ positioning NTPase
      node:
        id: bcsQ_accessory_positioning_step
        label: BcsQ/YhjQ accessory positioning step
        module_type: REGULATORY_STEP
        description: >-
          BcsQ/YhjQ-family P-loop NTPases are accessory assembly or positioning
          factors for bacterial cellulose synthase systems and are explicitly
          not catalytic cellulose synthase subunits.
        annotons:
          - id: bcsQ_accessory_factor
            label: BcsQ/YhjQ cellulose synthase accessory factor
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsQ/YhjQ-family P-loop NTPase
                term:
                  id: InterPro:IPR017746
                  label: Cellulose_synthase_operon_BcsQ
                description: >-
                  BcsQ/YhjQ-family ParA/MinD-like P-loop NTPases associated with
                  bacterial cellulose synthase operons. They support assembly or
                  spatial organization rather than beta-glucan polymerization.
                representative_members:
                  - preferred_term: PSEPK PP_2634 exemplar
                    term:
                      id: UniProtKB:Q88JL5
                      label: Cellulose synthase
                    description: >-
                      Pseudomonas putida KT2440 PP_2634; the submitted UniProt
                      protein name is misleading and the curated role is BcsQ.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            role_description: >-
              Accessory BcsQ/YhjQ-family positioning or assembly factor. PP_2634
              should not receive cellulose synthase molecular-function or
              EC 2.4.1.12 annotations.
  knowledge_gaps:
    - gap_statement: >-
        Direct KT2440 enzymology has not yet demonstrated cellulose synthase
        activity for PP_2635/bcsA in vitro.
      boundary: >-
        Treat BcsA catalytic activity as a strong orthology/domain/operon-based
        assignment and avoid implying direct KT2440 biochemical measurement
        until such evidence is available.
      gap_kind:
        - BIOLOGY
      status: OPEN
      provenance:
        - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__cellulose_biosynthesis__upa00694-deep-research-openscientist.md
          reference_section_type: RESULTS
          supporting_text: >-
            No direct KT2440 enzymology confirms BcsA (PP_2635) catalyzes
            cellulose synthesis in vitro; the EC 2.4.1.12 assignment rests on
            homology and domain architecture, though these are strong.
    - gap_statement: >-
        PP_2634 has a misleading submitted UniProt protein name, "Cellulose
        synthase", despite BcsQ/YhjQ-family P-loop NTPase domain architecture.
      boundary: >-
        Keep PP_2634 as accessory BcsQ context in this module and do not count
        it as a second BcsA catalytic cellulose synthase.
      gap_kind:
        - CURATION
      status: OPEN
      provenance:
        - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__cellulose_biosynthesis__upa00694-deep-research-openscientist.md
          reference_section_type: RESULTS
          supporting_text: >-
            PP_2634 (Q88JL5) carries a generic protein name "Cellulose
            synthase," but its domain architecture (InterPro IPR017746
            *Cellulose_synthase_operon_BcsQ*; Pfam PF06564 *CBP_BcsQ*;
            TIGR03371 *cellulose_yhjQ*; P-loop NTPase fold) identifies it
            unambiguously as **BcsQ (YhjQ), a ParA/MinD-like partitioning
            ATPase**, *not* a second glycosyltransferase.
    - gap_statement: >-
        The full KT2440 bcs locus contains additional accessory genes such as
        BcsF/BcsR and glucanase/editing proteins that are not yet modeled as
        reusable module parts.
      boundary: >-
        Keep this PR scoped to the core BcsA/BcsB/BcsC synthase-export machine
        plus BcsQ name-correction/accessory context; defer a broader bcs-locus
        accessory module until the hydrolase/editing roles are reviewed.
      gap_kind:
        - BIOLOGY
        - CURATION
      status: OPEN
      provenance:
        - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__cellulose_biosynthesis__upa00694-deep-research-openscientist.md
          reference_section_type: RESULTS
          supporting_text: >-
            Consider expanding the module model to include the accessory tier
            (BcsQ, BcsR, BcsF, glucanases) as optional/accessory steps so the
            operon's full membership is represented without inflating the core
            satisfiability requirement.
  connections:
    - source: bcsA_cellulose_polymerization_step
      target: bcsB_periplasmic_synthase_support_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        BcsA-dependent cellulose polymerization and inner-membrane translocation
        supply the nascent glucan chain to the BcsB-organized periplasmic
        synthase/export path.
      chaining_status: NOT_APPLICABLE
      chaining_note: >-
        This is a trans-envelope assembly and material-flow relationship rather
        than a CoA-linked reaction-chain continuity assertion.
    - source: bcsB_periplasmic_synthase_support_step
      target: bcsC_cellulose_export_support_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The BcsB-associated periplasmic cellulose path hands the nascent glucan
        to the BcsC-like outer-membrane export/support component.
      chaining_status: NOT_APPLICABLE
      chaining_note: >-
        This is a cellulose secretion-complex handoff, not a CoA-linked
        metabolic reaction chain.
    - source: bcsQ_accessory_positioning_step
      target: bcsA_cellulose_polymerization_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        BcsQ/YhjQ accessory factors support spatial organization or assembly of
        the cellulose synthase machinery and should be interpreted as accessory
        context for the BcsA/BcsB/BcsC core.
      chaining_status: NOT_APPLICABLE
      chaining_note: >-
        Accessory positioning is outside the advisory CoA continuity model.
