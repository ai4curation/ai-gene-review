id: MODULE:bacterial_cellulose_biosynthesis
title: Bacterial cellulose biosynthesis
description: >-
  A species-neutral Gram-negative bacterial cellulose biosynthesis and export
  module covering BcsA cellulose polymerization, BcsB periplasmic
  accessory/regulatory support, BcsC outer-membrane export, and BcsQ/YhjQ-family
  accessory positioning where that P-loop NTPase is part of the local bcs locus.
  Pseudomonas putida KT2440 provides the current UniProt exemplars, but does not
  define the module boundary.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00694
    title: UniPathway UPA00694
    statement: >-
      The local UPA00694 membership set contains bcsA, bcsB, and PP_2638 as the
      KT2440 candidate genes for bacterial cellulose biosynthesis.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__cellulose_biosynthesis__upa00694-deep-research-openscientist.md
    title: OpenScientist species-aware cellulose pathway research
    statement: >-
      OpenScientist concluded that UPA00694 is satisfiable in KT2440, that bcsA
      must be explicitly included despite the primary-bucket heuristic, and that
      PP_2634 is BcsQ/YhjQ rather than a second cellulose synthase.
  - source_id: file:modules/bacterial_cellulose_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module research for bacterial cellulose biosynthesis
    statement: >-
      OpenScientist summarized the conserved BcsA/BcsB/BcsC cellulose
      synthase/secretion architecture and the Pseudomonas-type bcs operon
      context.
  - source_id: GO:0030244
    title: cellulose biosynthetic process
    statement: >-
      GO:0030244 is the biological-process term for formation of cellulose, a
      beta-1,4 glucan.
  - source_id: PMID:23222542
    title: Crystallographic snapshot of cellulose synthesis and membrane translocation.
    statement: >-
      Primary structural evidence establishes BcsA as the catalytic inner-membrane
      subunit and BcsB as an inner-membrane-anchored periplasmic partner.
  - source_id: PMID:24704788
    title: Mechanism of activation of bacterial cellulose synthase by cyclic di-GMP.
    statement: >-
      Primary structural evidence places the c-di-GMP PilZ-domain activation
      switch on BcsA.
  - source_id: PMID:31604608
    title: Architecture of the Cellulose Synthase Outer Membrane Channel and Its Association
      with the Periplasmic TPR Domain.
    statement: >-
      Primary structural evidence defines BcsC as the beta-barrel outer-membrane
      cellulose secretion porin with a periplasmic TPR domain.
  - source_id: PMID:39242554
    title: Insights into phosphoethanolamine cellulose synthesis and secretion across
      the Gram-negative cell envelope.
    statement: >-
      Cryo-EM evidence supports the BcsB-to-BcsC trans-envelope handoff for
      cellulose secretion.
  - source_id: file:PSEPK/bcsA/bcsA-uniprot.txt
    title: UniProtKB entry for bcsA
    statement: >-
      UniProt describes BcsA as the cellulose synthase catalytic subunit that
      polymerizes UDP-glucose to cellulose and places it in bacterial cellulose
      biosynthesis.
  - source_id: file:PSEPK/bcsB/bcsB-uniprot.txt
    title: UniProtKB entry for bcsB
    statement: >-
      UniProt describes BcsB as an AcsB/BcsB-family cellulose synthase
      regulatory/accessory subunit in bacterial cellulose biosynthesis.
  - source_id: file:PSEPK/PP_2638/PP_2638-uniprot.txt
    title: UniProtKB entry for PP_2638
    statement: >-
      UniProt describes PP_2638 as a cellulose synthase operon C protein
      required for maximal bacterial cellulose synthesis.
  - source_id: file:PSEPK/PP_2634/PP_2634-uniprot.txt
    title: UniProtKB entry for PP_2634
    statement: >-
      UniProt names PP_2634 generically as cellulose synthase, but its
      InterPro/Pfam/NCBIfam cross-references identify a BcsQ/YhjQ-family P-loop
      NTPase accessory protein.
notes: >-
  Reusable boundary: this module represents the Bcs cellulose
  synthase/secretion core plus explicitly marked accessory BcsQ/YhjQ context,
  not every neighboring bcs-locus gene. The PSEPK instantiation is satisfiable:
  bcsA/Q88JL4 supplies UDP-forming cellulose synthase activity and the PilZ
  c-di-GMP switch, bcsB/Q88JL3 is the membrane-anchored periplasmic partner,
  PP_2638/Q88JL1 is the BcsC-like outer-membrane/export protein, and
  PP_2634/Q88JL5 should be treated as BcsQ/YhjQ accessory context rather than a
  second cellulose synthase. bcsZ, bcsR, and bcsF-like proteins remain broader
  module-boundary follow-up.
module:
  id: bacterial_cellulose_biosynthesis
  label: Bacterial cellulose biosynthesis
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: cellulose biosynthetic process
      term:
        id: GO:0030244
        label: cellulose biosynthetic process
      description: Formation of cellulose, a beta-1,4 glucan.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Bacterial inner membrane location for BcsA/BcsB.
      - preferred_term: outer membrane
        term:
          id: GO:0019867
          label: outer membrane
        description: Gram-negative outer membrane location assigned to PP_2638.
  parts:
    - order: 1
      role: Cellulose synthase catalytic subunit
      node:
        id: bcsA_cellulose_polymerization_step
        label: BcsA cellulose polymerization step
        module_type: REACTION
        description: >-
          BcsA is the multi-pass inner-membrane catalytic subunit that
          polymerizes UDP-glucose into cellulose.
        annotons:
          - id: bcsA_cellulose_synthase
            label: "bcsA: cellulose synthase catalytic subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsA cellulose synthase catalytic subunit family
                term:
                  id: InterPro:IPR003919
                  label: Cell_synth_A
                representative_members:
                  - preferred_term: PSEPK bcsA exemplar
                    term:
                      id: UniProtKB:Q88JL4
                      label: Cellulose synthase catalytic subunit [UDP-forming]
                    description: Pseudomonas putida KT2440 UPA00694 exemplar.
            function:
              preferred_term: cellulose synthase (UDP-forming) activity
              term:
                id: GO:0016760
                label: cellulose synthase (UDP-forming) activity
              evidence:
                - source_id: GO:0016760
                  statement: >-
                    GO:0016760 captures the BcsA catalytic reaction from
                    UDP-glucose to a growing beta-1,4-glucan cellulose chain.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Inner-membrane catalytic subunit that extends the cellulose
              beta-1,4-glucan chain from UDP-glucose.
          - id: bcsA_cyclic_di_gmp_binding
            label: "bcsA: cyclic-di-GMP binding regulatory switch"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsA PilZ-domain cellulose synthase family
                term:
                  id: InterPro:IPR003919
                  label: Cell_synth_A
                representative_members:
                  - preferred_term: PSEPK bcsA exemplar
                    term:
                      id: UniProtKB:Q88JL4
                      label: Cellulose synthase catalytic subunit [UDP-forming]
                    description: Pseudomonas putida KT2440 UPA00694 exemplar.
            function:
              preferred_term: cyclic-di-GMP binding
              term:
                id: GO:0035438
                label: cyclic-di-GMP binding
              evidence:
                - source_id: GO:0035438
                  statement: >-
                    GO:0035438 captures the BcsA PilZ-domain c-di-GMP binding
                    function that regulates the cellulose synthase complex.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              PilZ-domain regulatory binding of cyclic di-GMP that activates
              BcsA-dependent cellulose synthesis.
    - order: 2
      role: Cellulose synthase BcsB accessory/regulatory subunit
      node:
        id: bcsB_cellulose_synthase_regulatory_step
        label: BcsB cellulose synthase regulatory step
        module_type: REGULATORY_STEP
        description: >-
          BcsB is an inner-membrane-anchored periplasmic accessory/regulatory
          subunit associated with BcsA during c-di-GMP-controlled cellulose
          production.
        annotons:
          - id: bcsB_cellulose_synthase_accessory_subunit
            label: "bcsB: cellulose synthase accessory subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsB cellulose synthase accessory family
                term:
                  id: InterPro:IPR003920
                  label: Cell_synth_B
                representative_members:
                  - preferred_term: PSEPK bcsB exemplar
                    term:
                      id: UniProtKB:Q88JL3
                      label: Cyclic di-GMP-binding protein
                    description: Pseudomonas putida KT2440 UPA00694 exemplar.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Membrane-anchored periplasmic partner for BcsA that helps organize
              the Bcs cellulose synthase/secretion complex; direct c-di-GMP
              binding is kept with BcsA in this first-pass module.
    - order: 3
      role: Cellulose synthase operon C export/support protein
      node:
        id: bcsc_cellulose_export_support_step
        label: BcsC cellulose export/support step
        module_type: TRANSPORT_STEP
        description: >-
          BcsC-like cellulose synthase operon C proteins form the
          outer-membrane/export-support part of the Gram-negative cellulose
          synthase/secretion system.
        annotons:
          - id: bcsc_cellulose_export_support
            label: "BcsC family: cellulose synthase operon C protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsC cellulose export family
                term:
                  id: InterPro:IPR008410
                  label: BCSC_C
                representative_members:
                  - preferred_term: PSEPK PP_2638 exemplar
                    term:
                      id: UniProtKB:Q88JL1
                      label: Cellulose synthase operon C protein
                    description: Pseudomonas putida KT2440 UPA00694 exemplar.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            locations:
              - preferred_term: outer membrane
                term:
                  id: GO:0019867
                  label: outer membrane
            role_description: >-
              Outer-membrane/export-support component needed for maximal
              bacterial cellulose synthesis; exact molecular activity is not
              assigned in this first pass.
    - order: 4
      role: Accessory BcsQ/YhjQ positioning NTPase
      node:
        id: bcsq_accessory_positioning_step
        label: BcsQ/YhjQ accessory step
        module_type: REGULATORY_STEP
        description: >-
          BcsQ/YhjQ-family P-loop NTPases are accessory/positioning factors in
          some bcs loci and should not be counted as catalytic cellulose
          synthases.
        annotons:
          - id: bcsq_accessory_factor
            label: "BcsQ/YhjQ family: accessory factor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BcsQ/YhjQ accessory P-loop NTPase family
                term:
                  id: InterPro:IPR017746
                  label: Cellulose_synthase_operon_BcsQ
                representative_members:
                  - preferred_term: PSEPK PP_2634 exemplar
                    term:
                      id: UniProtKB:Q88JL5
                      label: Cellulose synthase
                    description: >-
                      Pseudomonas putida KT2440 local bcs-locus exemplar whose
                      generic protein name should not be read as BcsA-like
                      cellulose synthase activity.
            processes:
              - preferred_term: cellulose biosynthetic process
                term:
                  id: GO:0030244
                  label: cellulose biosynthetic process
            role_description: >-
              BcsQ/YhjQ-family P-loop NTPase accessory/positioning factor
              inferred from InterPro IPR017746, Pfam PF06564, NCBIfam TIGR03371,
              and operon context.
  knowledge_gaps:
    - gap_statement: >-
        UPA00694 captures bcsA, bcsB, and PP_2638, but the local KT2440 locus
        also contains nearby bcs-associated genes not in this bucket, including
        PP_2634/BcsQ.
      boundary: >-
        Include PP_2634 only as an accessory/name-correction item in this PR;
        decide later whether a broader KT2440 cellulose-locus module should
        include bcsZ, bcsR, bcsF-like, or other neighboring genes.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        PP_2634 has a generic UniProt protein name, "Cellulose synthase", but
        its domain architecture indicates BcsQ/YhjQ rather than BcsA-like
        glycosyltransferase activity.
      boundary: >-
        Do not assign cellulose synthase molecular function or EC 2.4.1.12 to
        PP_2634; track it as an accessory BcsQ/YhjQ-family P-loop NTPase and ask
        for protein-name correction.
      gap_kind:
        - CURATION
    - gap_statement: >-
        PP_2638 is linked to maximal cellulose synthesis and outer-membrane
        localization, but its exact molecular activity is not represented by a
        specific GO molecular-function term here.
      boundary: >-
        Do not invent an MF term for PP_2638; treat it as a pathway/export
        support component until OpenScientist and literature review clarify the
        role.
      gap_kind:
        - BIOLOGY
        - CURATION
