id: MODULE:plant_secondary_metabolite_biosynthesis_boundary
title: Plant secondary metabolite biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00999 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains three shikimate-dehydrogenase-like
  proteins, one periplasmic beta-glucosidase, and S-adenosylmethionine
  synthase. These are real central precursor, glycoside-hydrolysis, and methyl
  donor side nodes, but they do not constitute a complete plant secondary
  metabolite biosynthesis pathway in this bacterium.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00999
    title: Biosynthesis of various plant secondary metabolites - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00999 provides the PSEPK curation batch. Its mapped members are
      aroE__Q88RQ5, bglX, aroE__Q88IJ7, PP_3768, and metK.
  - source_id: file:projects/P_PUTIDA/batches/ppu00999_plant_secondary_metabolite_biosynthesis_boundary.tsv
    title: PSEPK ppu00999 plant-secondary-metabolite batch
    statement: >-
      The batch records five PSEPK members and shows that all have review
      files, Asta reports, and curated GOA decisions.
module:
  id: plant_secondary_metabolite_biosynthesis_boundary
  label: Plant secondary metabolite biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: shikimate 3-dehydrogenase (NADP+) activity
      term:
        id: GO:0004764
        label: shikimate 3-dehydrogenase (NADP+) activity
      description: Shikimate-pathway oxidoreductase activity represented by aroE paralogs and PP_3768.
    - preferred_term: chorismate biosynthetic process
      term:
        id: GO:0009423
        label: chorismate biosynthetic process
      description: Aromatic-precursor pathway context for the shikimate dehydrogenase candidates.
    - preferred_term: beta-glucosidase activity
      term:
        id: GO:0008422
        label: beta-glucosidase activity
      description: Periplasmic beta-glucoside hydrolysis represented by bglX.
    - preferred_term: methionine adenosyltransferase activity
      term:
        id: GO:0004478
        label: methionine adenosyltransferase activity
      description: SAM synthesis activity represented by metK.
    - preferred_term: S-adenosylmethionine biosynthetic process
      term:
        id: GO:0006556
        label: S-adenosylmethionine biosynthetic process
      description: Methyl-donor biosynthesis context for metK.
  parts:
    - order: 1
      role: Plant-secondary-metabolite route absence
      node:
        id: plant_secondary_metabolite_route_absence
        label: Plant secondary-metabolite route absence
        module_type: METABOLIC_PATHWAY
        description: >-
          The PSEPK ppu00999 membership lacks plant-specific secondary
          metabolite scaffold-forming and tailoring modules. The mapped genes
          are broad precursor or side-node enzymes and should not be interpreted
          as a satisfiable plant secondary metabolite biosynthesis pathway.
        annotons: []
    - order: 2
      role: Shikimate and chorismate precursor context
      node:
        id: shikimate_chorismate_precursor_context
        label: Shikimate and chorismate precursor context
        module_type: METABOLIC_PATHWAY
        description: >-
          aroE__Q88RQ5, aroE__Q88IJ7, and PP_3768 are shikimate
          dehydrogenase-like enzymes associated with chorismate biosynthesis.
          They provide aromatic precursor context shared by many downstream
          routes, not plant-secondary-metabolite specificity.
        annotons:
          - id: aroE_Q88RQ5_shikimate_dehydrogenase
            label: "aroE__Q88RQ5: shikimate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aroE__Q88RQ5
            function:
              preferred_term: shikimate 3-dehydrogenase (NADP+) activity
              term:
                id: GO:0004764
                label: shikimate 3-dehydrogenase (NADP+) activity
            processes:
              - preferred_term: chorismate biosynthetic process
                term:
                  id: GO:0009423
                  label: chorismate biosynthetic process
            role_description: Predicted AroE paralog contributing shikimate-to-chorismate precursor metabolism.
          - id: aroE_Q88IJ7_shikimate_dehydrogenase
            label: "aroE__Q88IJ7: shikimate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aroE__Q88IJ7
            function:
              preferred_term: shikimate 3-dehydrogenase (NADP+) activity
              term:
                id: GO:0004764
                label: shikimate 3-dehydrogenase (NADP+) activity
            processes:
              - preferred_term: chorismate biosynthetic process
                term:
                  id: GO:0009423
                  label: chorismate biosynthetic process
            role_description: Predicted AroE paralog contributing shikimate-to-chorismate precursor metabolism.
          - id: PP_3768_shikimate_dehydrogenase_like
            label: "PP_3768: shikimate dehydrogenase-like oxidoreductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3768
            function:
              preferred_term: shikimate 3-dehydrogenase (NADP+) activity
              term:
                id: GO:0004764
                label: shikimate 3-dehydrogenase (NADP+) activity
            processes:
              - preferred_term: chorismate biosynthetic process
                term:
                  id: GO:0009423
                  label: chorismate biosynthetic process
            role_description: Weaker shikimate-dehydrogenase-like paralog whose exact physiological contribution remains unresolved.
    - order: 3
      role: Glycoside hydrolysis side node
      node:
        id: glycoside_hydrolysis_side_node
        label: Glycoside hydrolysis side node
        module_type: REACTION
        description: >-
          bglX is a periplasmic beta-glucosidase that can hydrolyze
          beta-D-glucosides. In this batch it is broad glycoside/carbohydrate
          side context rather than evidence for a plant specialized-metabolite
          route.
        annotons:
          - id: bglX_beta_glucosidase_side_node
            label: "bglX: periplasmic beta-glucosidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bglX
            function:
              preferred_term: beta-glucosidase activity
              term:
                id: GO:0008422
                label: beta-glucosidase activity
            role_description: Broad beta-glucosidase side node shared with flavonoid and glycoside-containing substrate maps.
    - order: 4
      role: SAM methyl-donor side node
      node:
        id: sam_methyl_donor_side_node
        label: SAM methyl-donor side node
        module_type: METABOLIC_PATHWAY
        description: >-
          metK produces S-adenosylmethionine, a broadly used methyl donor. Its
          inclusion in ppu00999 reflects methyl-donor availability, not a
          specific plant secondary metabolite biosynthetic route.
        annotons:
          - id: metK_s_adenosylmethionine_synthase
            label: "metK: S-adenosylmethionine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metK
            function:
              preferred_term: methionine adenosyltransferase activity
              term:
                id: GO:0004478
                label: methionine adenosyltransferase activity
            processes:
              - preferred_term: S-adenosylmethionine biosynthetic process
                term:
                  id: GO:0006556
                  label: S-adenosylmethionine biosynthetic process
            role_description: General SAM biosynthesis and methyl-donor supply, not pathway-specific plant secondary metabolism.
  notes: >-
    This module is a KEGG boundary checkpoint. The five genes are valid enzymes
    in shikimate/chorismate metabolism, beta-glucoside hydrolysis, and SAM
    synthesis, but the first-pass interpretation should avoid plant
    secondary-metabolite process annotations for KT2440 based solely on
    ppu00999 membership.
