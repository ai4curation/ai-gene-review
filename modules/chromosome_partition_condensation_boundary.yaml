id: MODULE:chromosome_partition_condensation_boundary
title: Chromosome partition and condensation boundary
description: Boundary module for Pseudomonas putida KT2440 chromosome partition, chromosome organization, and condensation. The module captures ParB with promoted PP_0002 as the origin-proximal ParB/Soj-like candidate pair, PP_0693/PP_0694 as MksF/MksE-like condensin-associated candidates, several ParA-family P-loop ATPase candidates whose chromosomal versus mobile-element context remains unresolved, and the strongest Smc-ScpA-ScpB condensation/segregation machinery.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition.tsv
  title: PSEPK chromosome/cell-cycle functional-bucket partition
  statement: The chromosome/cell-cycle functional bucket was split into curation-scale sub-batches; the chromosome partition/condensation boundary covers ParB/ParA-family candidates, MksEF-like candidates, and Smc-ScpAB.
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition_condensation.tsv
  title: PSEPK chromosome partition/condensation sub-batch
  statement: The completed sub-batch includes 11 primary chromosome/cell-cycle bucket genes plus promoted PP_0002 as the origin-proximal Soj/ParA-like hole-fill candidate adjacent to parB.
- source_id: file:PSEPK/parB/parB-ai-review.yaml
  title: PSEPK parB gene review
  statement: The curated parB review supports ParB as an origin-region DNA-binding chromosome partition protein and removes the sporulation process annotation as inappropriate family-level spillover.
- source_id: file:PSEPK/PP_0002/PP_0002-ai-review.yaml
  title: PSEPK PP_0002 gene review
  statement: The curated PP_0002 review promotes the origin-adjacent Soj/ParA-like DNA-partitioning ATPase candidate from the unknown bucket while retaining its role as experimentally unresolved.
- source_id: file:PSEPK/smc/smc-ai-review.yaml
  title: PSEPK smc gene review
  statement: The curated smc review supports Smc as an ATP-hydrolyzing SMC condensin subunit for chromosome condensation, organization, and segregation, while modifying sister chromatid cohesion toward bacterial chromosome organization/condensation.
- source_id: file:PSEPK/scpA/scpA-ai-review.yaml
  title: PSEPK scpA gene review
  statement: The curated scpA review supports ScpA as a Smc-ScpAB accessory component participating in chromosomal partition during cell division.
- source_id: file:PSEPK/PP_4497/PP_4497-ai-review.yaml
  title: PSEPK PP_4497 gene review
  statement: The curated PP_4497 review supports ScpB-family chromosome separation/segregation context.
