notes: PP_0002 is promoted as a hole-filling candidate because it lies immediately next to parB and carries Soj/ParA-like DNA partitioning ATPase signatures. The module intentionally avoids treating every ParA-family protein as a core chromosome-partition member; PP_2412, PP_3700, PP_4334, and PP_5070 remain unresolved candidate partition ATPases, while PP_2161 is retained only as a weak DUF4404/coiled-coil candidate. This boundary completes the chromosome partition/condensation portion of the larger chromosome/cell-cycle functional bucket but leaves broad keyword spillovers PP_1105 and tig outside the module.
