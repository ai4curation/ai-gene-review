id: MODULE:cuproptosis
title: Cuproptosis (copper-induced cell death) module
description: >-
  A decomposition of cuproptosis: the regulated cell-death program in which
  excess intracellular copper, reduced to Cu(I) by the mitochondrial ferredoxin
  FDX1, binds the lipoyl moieties of lipoylated tricarboxylic-acid-cycle enzymes
  (chiefly the pyruvate dehydrogenase E2 subunit DLAT), driving their
  disulfide-dependent oligomerization/aggregation while destabilizing
  iron-sulfur cluster proteins. The resulting proteotoxic stress kills the cell.
  Cuproptosis is mechanistically distinct from apoptosis, necroptosis,
  ferroptosis, and pyroptosis, and was defined in human/mammalian cells, so this
  module is framed for the mammalian implementation with concrete human gene
  products grounded to UniProt.

  Design intent: the module is organized as an upstream copper-homeostasis layer
  that sets the death threshold (importer, chaperone, exporters), a copper-
  reduction trigger (FDX1), the protein-lipoylation machinery that builds the
  copper "bait", the lipoylated TCA-cycle targets/effectors (the pyruvate
  dehydrogenase complex, with DLAT as the aggregation-prone effector), and the
  execution node (cuproptosis proper). Protective and modulatory regulators
  (MTF1, GLS, CDKN2A) and the non-substituting paralog FDX2 are kept as an
  optional regulatory sub-module. Genes are grounded to UniProt only where
  verified; GO ids are grounded only to verified, non-obsolete terms in the
  matching aspect (MF in function, BP in processes/concepts, CC in locations).
status: DRAFT
evidence:
  - source_id: GO:0160119
    title: cuproptosis
    statement: The module is grounded in the GO biological-process term for cuproptosis.
  - source_id: PMID:35298263
    title: "Copper induces cell death by targeting lipoylated TCA cycle proteins"
    statement: >-
      Genome-wide CRISPR screens defined cuproptosis: FDX1 and the protein-
      lipoylation pathway are required, copper binds lipoylated DLAT causing its
      oligomerization, and iron-sulfur cluster proteins are destabilized,
      producing proteotoxic-stress cell death (erratum PMID:36356160).
  - source_id: PMID:31133756
    title: "Mitochondrial metabolism promotes adaptation to proteotoxic stress"
    statement: >-
      Identified FDX1 as the target of the copper ionophore elesclomol and
      established the FDX1-copper axis upstream of copper-dependent cell death.
  - source_id: PMID:35594843
    title: "Cuproptosis: Cellular and molecular mechanisms underlying copper-induced cell death"
    statement: >-
      Review placing cuproptosis among the regulated-cell-death pathways and
      summarizing the lipoylation/FDX1 mechanism and its therapeutic relevance.
  - source_id: file:projects/CUPROPTOSIS.md
    title: Cuproptosis project page
    statement: >-
      The sibling gene-by-gene cuproptosis curation project that this module
      generalizes into a recursively decomposable mechanistic plan.
notes: >-
  Copper handling sets the cuproptosis threshold but is upstream physiology: the
  importer raises sensitivity, the exporters and chaperone-buffering lower it.
  FDX1 has a dual role (reduces Cu2+ to Cu+ AND is required for protein
  lipoylation); both are represented. The death-executing event is the copper-
  induced oligomerization of lipoylated DLAT plus Fe-S protein loss, modelled as
  a process-level effect at the execution node rather than as a distinct MF
  (there is no exact GO MF for "copper-induced protein aggregation"). FDX2 is the
  FDX1 paralog that does NOT substitute in cuproptosis and is included only as a
  specificity control. Scope boundaries: copper acquisition/distribution
  pathways, cytosolic copper buffering by metallothioneins and GSH, and the
  general TCA cycle and pyruvate dehydrogenase catalytic biology are upstream or
  adjacent and are treated here only insofar as they gate or supply cuproptosis.
module:
  id: cuproptosis
  label: Cuproptosis
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: cuproptosis
      term:
        id: GO:0160119
        label: cuproptosis
      description: >-
        Copper-dependent regulated cell death triggered by direct binding of
        Cu(I) to lipoylated TCA-cycle proteins, causing proteotoxic stress.
  context:
    taxa:
      - preferred_term: mammals (defined in human cell lines)
        description: Cuproptosis was characterized in human cells; the machinery is conserved in mammals.
    cellular_components:
      - preferred_term: mitochondrion
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: The lipoylation machinery, FDX1, and the lipoylated TCA targets act in the mitochondrial matrix.
  parts:
    - order: 1
      role: copper acquisition and homeostasis (sets the death threshold)
      node:
        id: copper_homeostasis
        label: Copper acquisition and homeostasis
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Copper entry, chaperone-mediated buffering, and export together set the
          labile copper pool available to trigger cuproptosis. High import raises
          sensitivity; chaperoning and export lower it.
        annotons:
          - id: ctr1_copper_import
            label: SLC31A1 (CTR1) high-affinity copper import
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SLC31A1 (CTR1)
                term:
                  id: UniProtKB:O15431
                  label: High affinity copper uptake protein 1
            function:
              preferred_term: copper ion transmembrane transporter activity
              term:
                id: GO:0005375
                label: copper ion transmembrane transporter activity
              substrates:
                - preferred_term: Cu(I) (extracellular)
              products:
                - preferred_term: Cu(I) (cytosolic)
            processes:
              - preferred_term: copper ion import across plasma membrane
                term:
                  id: GO:0098705
                  label: copper ion import across plasma membrane
            locations:
              - preferred_term: plasma membrane
            role_description: >-
              Principal route of cellular copper uptake; higher CTR1 activity
              increases the labile copper pool and sensitizes cells to cuproptosis.
          - id: atox1_copper_chaperone
            label: ATOX1 cytosolic copper chaperone
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: ATOX1
                term:
                  id: UniProtKB:O00244
                  label: Copper transport protein ATOX1
            function:
              preferred_term: copper chaperone activity
              term:
                id: GO:0016531
                label: copper chaperone activity
              targets:
                - preferred_term: ATP7A
                - preferred_term: ATP7B
            locations:
              - preferred_term: cytosol
            role_description: >-
              Buffers and delivers cytosolic Cu(I) to the secretory-pathway
              export ATPases; part of the homeostatic system that limits free copper.
          - id: copper_exporting_atpase
            label: Copper-exporting P-type ATPases (ATP7A / ATP7B)
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cu(I)-transporting P-type ATPase (ATP7A/ATP7B)
                description: >-
                  The two human copper-exporting P1B-type ATPases; ATP7B (Wilson
                  disease) predominates in liver, ATP7A (Menkes disease) in most
                  other tissues. They pump Cu(I) into the secretory pathway / out
                  of the cytosol, lowering the copper available for cuproptosis.
                representative_members:
                  - preferred_term: ATP7A
                    term:
                      id: UniProtKB:Q04656
                      label: Copper-transporting ATPase 1
                  - preferred_term: ATP7B
                    term:
                      id: UniProtKB:P35670
                      label: Copper-transporting ATPase 2
            function:
              preferred_term: P-type monovalent copper transporter activity
              term:
                id: GO:0140581
                label: P-type monovalent copper transporter activity
              substrates:
                - preferred_term: Cu(I) (cytosolic)
                - preferred_term: ATP
              products:
                - preferred_term: Cu(I) (secretory pathway / extracellular)
                - preferred_term: ADP
                - preferred_term: phosphate
            locations:
              - preferred_term: trans-Golgi network / plasma membrane
            role_description: >-
              Export copper and lower the intracellular copper load; loss of
              export (e.g. ATP7B mutation in Wilson disease) raises copper and the
              cuproptosis risk, while their activity is protective.
    - order: 2
      role: copper reduction trigger
      node:
        id: fdx1_trigger
        label: FDX1-mediated Cu(II) reduction (master trigger)
        module_type: MOLECULAR_FUNCTION
        description: >-
          The mitochondrial ferredoxin FDX1 is the single strongest genetic
          dependency of cuproptosis. It reduces Cu(II) to the more reactive
          Cu(I) and is also required for protein lipoylation, coupling the
          trigger to the production of the copper "bait".
        annotons:
          - id: fdx1_reductase
            label: FDX1 ferredoxin / Cu(II)-reducing electron transfer
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FDX1
                term:
                  id: UniProtKB:P10109
                  label: Ferredoxin-1, mitochondrial (adrenodoxin)
            function:
              preferred_term: electron transfer activity (Cu(II) -> Cu(I) reduction)
              term:
                id: GO:0009055
                label: electron transfer activity
              substrates:
                - preferred_term: Cu(II)
              products:
                - preferred_term: Cu(I)
              cofactors:
                - preferred_term: "[2Fe-2S] cluster"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Reduces Cu(II) to Cu(I); the rate-limiting upstream regulator whose
              loss confers strong cuproptosis resistance. No exact GO MF term for
              cupric-reductase activity is asserted, so electron transfer activity
              is used as the grounded function.
          - id: fdx1_lipoylation_support
            label: FDX1 requirement for protein lipoylation
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FDX1
                term:
                  id: UniProtKB:P10109
                  label: Ferredoxin-1, mitochondrial (adrenodoxin)
            function:
              preferred_term: positive regulation of protein lipoylation
              description: >-
                FDX1 is required for lipoylation of the TCA-cycle E2 enzymes
                (loss of FDX1 abolishes DLAT/DLST lipoylation); modelled as a
                regulatory role rather than a direct catalytic MF.
            processes:
              - preferred_term: protein lipoylation
                term:
                  id: GO:0009249
                  label: protein lipoylation
            role_description: >-
              Couples the copper-reduction trigger to production of the lipoyl
              moieties that copper attacks.
    - order: 3
      role: protein lipoylation machinery (builds the copper bait)
      node:
        id: lipoylation_machinery
        label: Mitochondrial protein-lipoylation machinery
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The lipoic-acid post-translational modification on TCA-cycle E2/H
          proteins is the moiety that Cu(I) binds. Loss of any step confers
          cuproptosis resistance, defining this machinery as essential.
        concepts:
          - preferred_term: protein lipoylation
            term:
              id: GO:0009249
              label: protein lipoylation
        annotons:
          - id: lias_lipoyl_synthase
            label: LIAS lipoyl synthase (sulfur insertion)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LIAS
                term:
                  id: UniProtKB:O43766
                  label: Lipoyl synthase, mitochondrial
            function:
              preferred_term: lipoate synthase activity
              term:
                id: GO:0016992
                label: lipoate synthase activity
              cofactors:
                - preferred_term: "[4Fe-4S] clusters (radical SAM)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Inserts the two sulfur atoms to form the mature lipoyl group on the carrier.
          - id: lipt2_octanoyltransferase
            label: LIPT2 lipoyl/octanoyltransferase (octanoyl loading)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LIPT2
                term:
                  id: UniProtKB:A6NK58
                  label: Lipoyl(octanoyl) transferase LIPT2, mitochondrial
            function:
              preferred_term: lipoyl(octanoyl) transferase activity
              term:
                id: GO:0033819
                label: lipoyl(octanoyl) transferase activity
            role_description: Loads the octanoyl precursor onto the glycine-cleavage H protein in the de novo branch.
          - id: lipt1_lipoyltransferase
            label: LIPT1 lipoyl(amido)transferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LIPT1
                term:
                  id: UniProtKB:Q9Y234
                  label: Lipoyltransferase 1, mitochondrial
            function:
              preferred_term: lipoate-protein ligase activity
              term:
                id: GO:0016979
                label: lipoate-protein ligase activity
            role_description: Transfers the lipoyl group onto the lysine of the TCA-cycle E2 subunits (e.g. DLAT, DLST).
          - id: dld_e3
            label: DLD (E3) dihydrolipoyl dehydrogenase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: DLD
                term:
                  id: UniProtKB:P09622
                  label: Dihydrolipoyl dehydrogenase, mitochondrial
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
              cofactors:
                - preferred_term: FAD
            role_description: >-
              Shared E3 component that reoxidizes the dihydrolipoyl group; a
              cuproptosis dependency in the screens.
    - order: 4
      role: lipoylated TCA-cycle targets and aggregation effector
      node:
        id: lipoylated_targets
        label: Lipoylated pyruvate dehydrogenase complex (copper targets)
        module_type: PROTEIN_COMPLEX
        description: >-
          The pyruvate dehydrogenase complex carries the lipoylated E2 subunit
          DLAT, the principal copper target. Cu(I) binding to lipoylated DLAT
          drives its disulfide-dependent oligomerization, the hallmark
          biochemical event of cuproptosis.
        concepts:
          - preferred_term: pyruvate dehydrogenase complex
            term:
              id: GO:0045254
              label: pyruvate dehydrogenase complex
        annotons:
          - id: pdh_complex
            label: Pyruvate dehydrogenase complex (lipoylated)
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: pyruvate dehydrogenase complex
                term:
                  id: GO:0045254
                  label: pyruvate dehydrogenase complex
                active_units:
                  - id: dlat_e2
                    label: DLAT (E2; lipoylated copper target/effector)
                    role: >-
                      Lipoylated E2 acetyltransferase; Cu(I) binds its lipoyl
                      groups and drives oligomerization/aggregation that executes
                      cuproptosis.
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: DLAT
                        term:
                          id: UniProtKB:P10515
                          label: Dihydrolipoyllysine-residue acetyltransferase (PDH E2)
                    function:
                      preferred_term: dihydrolipoyllysine-residue acetyltransferase activity
                      term:
                        id: GO:0004742
                        label: dihydrolipoyllysine-residue acetyltransferase activity
                  - id: pdh_e1
                    label: PDH E1 component (PDHA1 + PDHB)
                    role: Decarboxylating E1 core of the complex.
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: pyruvate dehydrogenase E1 (PDHA1/PDHB)
                        representative_members:
                          - preferred_term: PDHA1
                            term:
                              id: UniProtKB:P08559
                              label: Pyruvate dehydrogenase E1 subunit alpha
                          - preferred_term: PDHB
                            term:
                              id: UniProtKB:P11177
                              label: Pyruvate dehydrogenase E1 subunit beta
                    function:
                      preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
                      term:
                        id: GO:0004739
                        label: pyruvate dehydrogenase (acetyl-transferring) activity
                  - id: pdh_e3
                    label: E3 component (DLD)
                    role: Shared dihydrolipoyl dehydrogenase E3 (see lipoylation machinery).
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: DLD
                        term:
                          id: UniProtKB:P09622
                          label: Dihydrolipoyl dehydrogenase, mitochondrial
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              The lipoylated complex is the molecular target of copper; DLAT is
              the effector whose copper-induced aggregation links the trigger to
              death.
            evidence:
              - source_id: PMID:35298263
                statement: >-
                  Copper binds lipoylated DLAT and induces its oligomerization;
                  lipoylation-pathway and FDX1 loss prevent cuproptosis.
    - order: 5
      role: execution of cuproptosis (proteotoxic-stress death)
      node:
        id: cuproptosis_execution
        label: Cuproptosis execution
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Copper-bound lipoylated DLAT oligomerizes/aggregates and iron-sulfur
          cluster proteins are destabilized and lost; the combined proteotoxic
          stress executes cell death.
        annotons:
          - id: cuproptosis_death
            label: Copper-induced proteotoxic-stress cell death
            participant:
              selector_type: ANY_PARTICIPANT
              description: >-
                Cell-level outcome integrating lipoylated-protein aggregation and
                Fe-S cluster protein loss; not a single gene product.
            function:
              preferred_term: cuproptosis (execution)
              description: >-
                Process-level death execution; no exact GO MF for "copper-induced
                protein aggregation" exists, so only the BP is grounded.
            processes:
              - preferred_term: cuproptosis
                term:
                  id: GO:0160119
                  label: cuproptosis
            role_description: >-
              Integrates DLAT aggregation and Fe-S protein destabilization into
              proteotoxic-stress-driven death.
            evidence:
              - source_id: PMID:35298263
                statement: >-
                  Aggregation of lipoylated proteins and loss of Fe-S cluster
                  proteins accompany copper-induced proteotoxic-stress death.
    - order: 6
      role: regulators and specificity controls
      optional: true
      node:
        id: cuproptosis_regulation
        label: Cuproptosis regulators and specificity controls
        module_type: REGULATORY_STEP
        description: >-
          Genetic modifiers that tune cuproptosis sensitivity, plus the FDX1
          paralog FDX2 that does not substitute in cuproptosis.
        annotons:
          - id: mtf1_protective
            label: MTF1 metal-responsive transcription factor (protective)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: MTF1
                term:
                  id: UniProtKB:Q14872
                  label: Metal regulatory transcription factor 1
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
              - preferred_term: cellular response to copper ion
                term:
                  id: GO:0071280
                  label: cellular response to copper ion
            locations:
              - preferred_term: nucleus
            role_description: >-
              Induces metallothioneins and copper-buffering genes; a protective
              (negative) regulator whose loss sensitizes cells to cuproptosis.
          - id: gls_modulator
            label: GLS glutaminase (sensitivity modulator)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GLS
                term:
                  id: UniProtKB:O94925
                  label: Glutaminase kidney isoform, mitochondrial
            function:
              preferred_term: glutaminase activity
              term:
                id: GO:0004359
                label: glutaminase activity
            role_description: A negative-regulator hit in the cuproptosis screens; modulates sensitivity.
          - id: cdkn2a_modulator
            label: CDKN2A (sensitivity modulator)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: CDKN2A
                term:
                  id: UniProtKB:P42771
                  label: Cyclin-dependent kinase inhibitor 2A (p16INK4a)
            role_description: A negative-regulator hit in the cuproptosis screens; mechanism not fully defined.
          - id: fdx2_specificity
            label: FDX2 (non-substituting paralog; specificity control)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FDX2
                term:
                  id: UniProtKB:Q6P4F2
                  label: Ferredoxin-2, mitochondrial
            function:
              preferred_term: 2 iron, 2 sulfur cluster binding
              term:
                id: GO:0051537
                label: 2 iron, 2 sulfur cluster binding
            role_description: >-
              FDX1 paralog that does NOT substitute for FDX1 in cuproptosis;
              included to mark the specificity of the FDX1 dependency.
        connections:
          - source: mtf1_protective
            target: cuproptosis_execution
            connection_type: NEGATIVELY_REGULATES
            description: MTF1-driven copper buffering protects against cuproptosis.
          - source: gls_modulator
            target: cuproptosis_execution
            connection_type: NEGATIVELY_REGULATES
            description: GLS loss sensitizes cells; GLS activity modulates cuproptosis.
  connections:
    - source: copper_homeostasis
      target: fdx1_trigger
      connection_type: PROVIDES_INPUT_FOR
      description: The labile copper pool set by import/export/chaperoning is the Cu(II) substrate reduced by FDX1.
    - source: copper_exporting_atpase
      target: cuproptosis_execution
      connection_type: NEGATIVELY_REGULATES
      description: Copper export lowers intracellular copper and protects against cuproptosis.
    - source: fdx1_trigger
      target: lipoylation_machinery
      connection_type: POSITIVELY_REGULATES
      description: FDX1 is required for the protein lipoylation that produces the copper bait.
    - source: fdx1_trigger
      target: lipoylated_targets
      connection_type: PROVIDES_INPUT_FOR
      description: FDX1-generated Cu(I) is the species that binds lipoylated DLAT.
    - source: lipoylation_machinery
      target: lipoylated_targets
      connection_type: PROVIDES_INPUT_FOR
      description: The lipoylation machinery installs the lipoyl groups on DLAT that copper attacks.
    - source: lipoylated_targets
      target: cuproptosis_execution
      connection_type: CAUSES
      description: Copper-bound lipoylated DLAT oligomerization, with Fe-S protein loss, executes cuproptosis.
