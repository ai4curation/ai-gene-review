id: MODULE:hippo_signaling
title: Hippo-YAP/TAZ signaling pathway module
description: >-
  A compact Hippo pathway module. Upstream polarity, junctional, mechanical, and
  stress inputs activate the MST1/2 kinase tier, which activates LATS1/2 kinases
  through scaffolded phosphorylation. Active LATS1/2 phosphorylate YAP/TAZ,
  causing cytoplasmic retention or degradation and suppressing TEAD-dependent
  growth programs. When the kinase cassette is inactive, YAP/TAZ enter the
  nucleus and coactivate TEAD transcription factors. The module is grounded in
  GO:0035329, with PAINT anchors for STK4/MST1 and LATS1 where local seed rows
  support the kinase-pathway roles.
status: DRAFT
evidence:
  - source_id: GO:0035329
    title: hippo signaling
    statement: The module is grounded in the GO biological process term for Hippo signaling.
