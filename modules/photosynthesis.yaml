id: MODULE:oxygenic_photosynthesis
title: Oxygenic photosynthesis module
description: >-
  A taxon-neutral decomposition of oxygenic photosynthesis as a recursively
  decomposable module. The module separates the thylakoid light reactions
  (light harvesting, water oxidation at photosystem II, the cytochrome b6f
  complex, photosystem I, mobile electron carriers, ferredoxin-NADP+ reductase,
  and the ATP synthase) from carbon fixation by the Calvin-Benson-Bassham
  reductive pentose-phosphate cycle, and adds optional photoprotection/electron
  balancing, the inorganic carbon-concentrating mechanism, and chlorophyll
  supply. It is phrased as functions, complexes, and pathway segments rather
  than a fixed gene list so it can represent cyanobacterial, algal, and plant
  implementations. Anoxygenic photosynthesis (single reaction center, non-water
  electron donors) is explicitly out of scope.
status: DRAFT
evidence:
  - source_id: file:modules/photosynthesis-deep-research-falcon.md
    title: Photosynthesis module deep research (falcon)
    statement: >-
      Module-targeted falcon deep research (generated from this module's
      outline) used to cross-check component coverage, variants, and
      failure modes. Machine-generated citations are not yet manually adjudicated.
  - source_id: file:terms/photosynthesis/photosynthesis-deep-research-falcon.md
    title: Photosynthesis concept deep research (falcon)
    statement: >-
      Falcon deep-research synthesis used to set module boundaries and the
      module-by-module component breakdown across Arabidopsis, Synechocystis,
      and Chlamydomonas (core vs accessory vs regulatory factors).
  - source_id: file:terms/photosynthesis/photosynthesis-notes.md
    title: Photosynthesis concept notes
    statement: Manually authored, GO- and PubMed-verified concept notes underpinning this module.
  - source_id: GO:0015979
    title: photosynthesis
    statement: The module is grounded in the GO biological-process term for photosynthesis.
  - source_id: PMID:21499260
    title: "Crystal structure of oxygen-evolving photosystem II at a resolution of 1.9 A"
    statement: >-
      Defines the PSII D1/D2 reaction center, CP43/CP47 inner antennae, and the
      Mn4CaO5 water-oxidation cluster stabilized by the extrinsic OEC proteins.
  - source_id: PMID:11418848
    title: "Three-dimensional structure of cyanobacterial photosystem I at 2.5 A resolution"
    statement: >-
      Defines the PsaA/PsaB reaction-center heterodimer and the terminal Fe-S
      clusters carried by PsaC.
  - source_id: PMID:18294858
    title: Structure and function of Rubisco
    statement: >-
      Supports Rubisco as the major carboxylating enzyme of the CBB cycle and
      its competing oxygenase side-reaction.
  - source_id: PMID:33761918
    title: A new type of flexible CP12 protein in the marine diatom Thalassiosira pseudonana
    statement: >-
      Supports CP12 as a redox-controlled scaffold that forms a PRK-GAPDH-CP12
      ternary complex regulating the CBB cycle.
  - source_id: PMID:37549282
    title: NTRC regulates CP12 to activate Calvin-Benson cycle during cold acclimation
    statement: >-
      Supports redox (NTRC/thioredoxin)-dependent assembly/disassembly of the
      PRK-CP12-GAPDH supracomplex gating CBB-cycle activity.
notes: >-
  Identifiers are grounded only where verified against the local GO term cache,
  GOlr, or UniProt; descriptors without a `term` are deliberate (no confident
  identifier yet) rather than oversights. Representative UniProt members are
  concrete orienting examples, not exhaustive or species-restricting claims.
