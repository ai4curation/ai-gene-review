                      - preferred_term: glyceraldehyde-3-phosphate dehydrogenase
                  role_description: Couples CBB-cycle activity to the light/redox state of the chloroplast.
                  evidence:
                    - source_id: PMID:33761918
                      statement: CP12 forms a PRK-GAPDH ternary complex regulating the CBB cycle.
                    - source_id: PMID:37549282
                      statement: NTRC-dependent redox control of the PRK-CP12-GAPDH supracomplex.
              connections:
                - source: cp12_scaffold
