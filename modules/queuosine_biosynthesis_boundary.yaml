id: MODULE:queuosine_biosynthesis_boundary
title: tRNA queuosine biosynthesis boundary
description: >-
  Boundary module for UniPathway UPA00392 tRNA queuosine biosynthesis in
  Pseudomonas putida KT2440. The satisfiable first-pass pathway contains QueF
  preQ1 synthesis, Tgt insertion of preQ1 at tRNA wobble position 34, QueA
  conversion of preQ1-tRNA to epoxyqueuosine-tRNA, and QueG reduction to
  queuosine-tRNA. QueF is cross-bucket side context from the ppu00790
  pterin/folate map but is retained here because it supplies the queuosine
  precursor used by the tRNA-modification route.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00392
    title: tRNA queuosine biosynthesis
    statement: >-
      UniPathway UPA00392 is the organism-relevant pathway spine linking QueF,
      Tgt, QueA, and QueG to tRNA-queuosine biosynthesis.
  - source_id: GO:0008616
    title: tRNA queuosine(34) biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      queuosine at position 34 of tRNA.
  - source_id: file:projects/P_PUTIDA/batches/UPA00392_queuosine_biosynthesis_boundary.tsv
    title: UPA00392 queuosine biosynthesis batch table
    statement: >-
      The batch table contains queA, tgt, and queG as primary UPA00392 genes,
      with queF included as UniPathway side context because its primary
      partition bucket is KEGG ppu00790.
  - source_id: file:PSEPK/queF/queF-ai-review.yaml
    title: Curated queF review
    statement: >-
      The queF review accepts preQ1 synthase activity and tRNA
      queuosine(34) biosynthetic process.
  - source_id: file:PSEPK/tgt/tgt-ai-review.yaml
    title: Curated tgt review
    statement: >-
      The tgt review accepts tRNA-guanosine(34) queuine transglycosylase
      activity and tRNA queuosine(34) biosynthetic process.
  - source_id: file:PSEPK/queA/queA-ai-review.yaml
    title: Curated queA review
    statement: >-
      The queA review accepts S-adenosylmethionine:tRNA
      ribosyltransferase-isomerase activity and tRNA queuosine(34)
      biosynthetic process.
  - source_id: file:PSEPK/queG/queG-ai-review.yaml
    title: Curated queG review
    statement: >-
      The queG review accepts epoxyqueuosine reductase activity and tRNA
      queuosine(34) biosynthetic process.
notes: >-
  First-pass interpretation: UPA00392 is a compact, satisfiable tRNA
  modification pathway in KT2440. The pathway is not a folate-biosynthesis
  branch even though queF also appears in ppu00790; queF is best treated as
  deazaguanine/preQ1 precursor supply feeding the downstream tRNA-modification
  enzymes.
module:
  id: queuosine_biosynthesis_boundary
  label: tRNA queuosine biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: tRNA queuosine(34) biosynthetic process
      term:
        id: GO:0008616
        label: tRNA queuosine(34) biosynthetic process
      description: Formation of queuosine at position 34 of bacterial tRNA.
    - preferred_term: preQ1 synthase activity
      term:
        id: GO:0033739
        label: preQ1 synthase activity
      description: QueF reduction of preQ0 to the queuosine precursor preQ1.
    - preferred_term: tRNA-guanosine(34) queuine transglycosylase activity
      term:
        id: GO:0008479
        label: tRNA-guanosine(34) queuine transglycosylase activity
      description: Tgt exchange of guanine at position 34 of target tRNAs for preQ1.
    - preferred_term: S-adenosylmethionine:tRNA ribosyltransferase-isomerase activity
      term:
        id: GO:0051075
        label: S-adenosylmethionine:tRNA ribosyltransferase-isomerase activity
      description: QueA conversion of preQ1-modified tRNA to epoxyqueuosine-modified tRNA.
    - preferred_term: epoxyqueuosine reductase activity
      term:
        id: GO:0052693
        label: epoxyqueuosine reductase activity
      description: QueG reduction of epoxyqueuosine-modified tRNA to queuosine-modified tRNA.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Cytoplasmic bacterial tRNA-modification context.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Soluble bacterial Tgt location from GOA.
  parts:
    - order: 1
      role: PreQ1 precursor synthesis
      node:
        id: quef_preq1_synthase
        label: QueF preQ1 synthase
        module_type: REACTION
        description: >-
          QueF reduces 7-cyano-7-deazaguanine (preQ0) to
          7-aminomethyl-7-deazaguanine (preQ1), supplying the queuosine
          precursor for Tgt.
        annotons:
          - id: quef_preq1_synthesis
            label: "queF: preQ1 synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: queF
            function:
              preferred_term: preQ1 synthase activity
              term:
                id: GO:0033739
                label: preQ1 synthase activity
            processes:
              - preferred_term: tRNA queuosine(34) biosynthetic process
                term:
                  id: GO:0008616
                  label: tRNA queuosine(34) biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Cytoplasmic preQ1 supply step upstream of tRNA base exchange.
    - order: 2
      role: PreQ1 insertion into tRNA
      node:
        id: tgt_trna_guanine_transglycosylase
        label: Tgt tRNA-guanine transglycosylase
        module_type: REACTION
        description: >-
          Tgt exchanges wobble-position guanine for preQ1 in target tRNAs,
          creating preQ1-tRNA for downstream QueA modification.
        annotons:
          - id: tgt_preq1_insertion
            label: "tgt: tRNA-guanosine(34) queuine transglycosylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tgt
            function:
              preferred_term: tRNA-guanosine(34) queuine transglycosylase activity
              term:
                id: GO:0008479
                label: tRNA-guanosine(34) queuine transglycosylase activity
            processes:
              - preferred_term: tRNA queuosine(34) biosynthetic process
                term:
                  id: GO:0008616
                  label: tRNA queuosine(34) biosynthetic process
              - preferred_term: tRNA wobble guanine modification
                term:
                  id: GO:0002099
                  label: tRNA wobble guanine modification
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Base-exchange step that inserts the queuosine precursor into target tRNAs.
    - order: 3
      role: Epoxyqueuosine formation
      node:
        id: quea_epoxyqueuosine_formation
        label: QueA epoxyqueuosine formation
        module_type: REACTION
        description: >-
          QueA transfers and isomerizes the ribose moiety from
          S-adenosylmethionine onto preQ1-tRNA to produce
          epoxyqueuosine-modified tRNA.
        annotons:
          - id: quea_epoxyqueuosine_synthesis
            label: "queA: S-adenosylmethionine:tRNA ribosyltransferase-isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: queA
            function:
              preferred_term: S-adenosylmethionine:tRNA ribosyltransferase-isomerase activity
              term:
                id: GO:0051075
                label: S-adenosylmethionine:tRNA ribosyltransferase-isomerase activity
            processes:
              - preferred_term: tRNA queuosine(34) biosynthetic process
                term:
                  id: GO:0008616
                  label: tRNA queuosine(34) biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: QueA step converting preQ1-tRNA to epoxyqueuosine-tRNA.
    - order: 4
      role: Queuosine formation
      node:
        id: queg_epoxyqueuosine_reductase
        label: QueG epoxyqueuosine reductase
        module_type: REACTION
        description: >-
          QueG reduces epoxyqueuosine-modified tRNA to queuosine-modified
          tRNA, the terminal step represented in the curated KT2440 pathway.
        annotons:
          - id: queg_queuosine_synthesis
            label: "queG: epoxyqueuosine reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: queG
            function:
              preferred_term: epoxyqueuosine reductase activity
              term:
                id: GO:0052693
                label: epoxyqueuosine reductase activity
            processes:
              - preferred_term: tRNA queuosine(34) biosynthetic process
                term:
                  id: GO:0008616
                  label: tRNA queuosine(34) biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Terminal epoxyqueuosine-to-queuosine reductase step.
  connections:
    - source: quef_preq1_synthase
      target: tgt_trna_guanine_transglycosylase
      connection_type: PROVIDES_INPUT_FOR
      description: QueF supplies preQ1, the base inserted into target tRNAs by Tgt.
    - source: tgt_trna_guanine_transglycosylase
      target: quea_epoxyqueuosine_formation
      connection_type: PROVIDES_INPUT_FOR
      description: Tgt creates preQ1-tRNA, the substrate for QueA epoxyqueuosine formation.
    - source: quea_epoxyqueuosine_formation
      target: queg_epoxyqueuosine_reductase
      connection_type: PROVIDES_INPUT_FOR
      description: QueA creates epoxyqueuosine-tRNA, the substrate reduced by QueG.
  knowledge_gaps:
    - gap_statement: >-
        KT2440-specific experimental confirmation of the complete queF-tgt-queA-queG
        sequence was not found in the light first-pass retrieval.
      boundary: >-
        The pathway is strongly supported by UniProt, GOA, HAMAP/UniRule/PANTHER,
        and UniPathway metadata, but current reviews should not imply direct
        KT2440 genetic or biochemical validation.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        QueG cofactor usage, including the cobalamin note in UniProt, remains
        pathway context rather than a separate module part.
      boundary: >-
        The gene-level review keeps iron-sulfur cluster binding as non-core
        cofactor context and treats epoxyqueuosine reductase activity as the
        core function.
      gap_kind:
        - BIOLOGY
