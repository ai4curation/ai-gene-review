id: MODULE:pyrimidine_nucleotide_catabolism
title: Pyrimidine nucleotide catabolism (5'-nucleotidase/deaminase/phosphorylase -> DPYD -> DPYS -> UPB1)
description: >-
  Pyrimidine nucleotides are degraded through a sequence of dephosphorylation, deamination and phosphorolysis
  that liberates the free bases uracil and thymine, followed by the three-step reductive ring-opening pathway
  that converts them to beta-alanine and beta-aminoisobutyrate. Pyrimidine mononucleotides (UMP, CMP) are
  dephosphorylated to uridine and cytidine by the erythrocyte-enriched cytosolic pyrimidine 5'-nucleotidase
  NT5C3A. Cytidine (and 2'-deoxycytidine) is deaminated to uridine (2'-deoxyuridine) by cytidine deaminase
  CDA. Uridine is phosphorolysed to uracil plus ribose-1-phosphate by uridine phosphorylase UPP1 (ubiquitous)
  or UPP2 (tissue-restricted paralog); thymidine is analogously phosphorolysed to thymine by thymidine
  phosphorylase TYMP. The liberated uracil and thymine then enter the conserved reductive catabolic pathway:
  dihydropyrimidine dehydrogenase DPYD reduces them (NADPH) to dihydrouracil/dihydrothymine, dihydropyrimidinase
  DPYS hydrolyses the ring to N-carbamyl-beta-alanine / N-carbamyl-beta-aminoisobutyrate, and
  beta-ureidopropionase UPB1 releases beta-alanine / beta-aminoisobutyrate (+ CO2 + NH3). This pathway also
  governs the activation and inactivation of pyrimidine-analog drugs: NT5C3A/CDA/UPP1/TYMP shape the
  fluoropyrimidine (5-FU, capecitabine) and cytidine-analog (gemcitabine, cytarabine) response, and DPYD
  loss-of-function causes severe 5-fluorouracil toxicity. Other deficiencies cause pyrimidine-5'-nucleotidase
  hemolytic anemia (NT5C3A), MNGIE (TYMP), and dihydropyrimidinuria (DPYD/DPYS/UPB1).
status: DRAFT
evidence:
  - source_id: GO:0006244
    title: pyrimidine nucleotide catabolic process
    statement: NT5C3A/CDA/UPP1/UPP2/TYMP degrade pyrimidine nucleotides/nucleosides to free bases (GO:0006244).
  - source_id: GO:0006212
    title: uracil catabolic process
    statement: DPYD/DPYS/UPB1 reductively degrade uracil to beta-alanine (GO:0006212).
  - source_id: GO:0019483
    title: beta-alanine biosynthetic process
    statement: The reductive branch produces beta-alanine as its end product (GO:0019483).
  - source_id: file:human/NT5C3A/NT5C3A-ai-review.yaml
    title: NT5C3A gene review (human)
    statement: Pyrimidine 5'-nucleotidase (UniProtKB:Q9H0P0, GO:0008253) matches the completed human NT5C3A review.
  - source_id: file:human/CDA/CDA-ai-review.yaml
    title: CDA gene review (human)
    statement: Cytidine deaminase (UniProtKB:P32320, GO:0004126) matches the completed human CDA review.
  - source_id: file:human/UPP1/UPP1-ai-review.yaml
    title: UPP1 gene review (human)
    statement: Uridine phosphorylase 1 (UniProtKB:Q16831, GO:0004850) matches the completed human UPP1 review.
  - source_id: file:human/UPP2/UPP2-ai-review.yaml
    title: UPP2 gene review (human)
    statement: Uridine phosphorylase 2 (UniProtKB:O95045, GO:0004850) matches the completed human UPP2 review.
  - source_id: file:human/TYMP/TYMP-ai-review.yaml
    title: TYMP gene review (human)
    statement: Thymidine phosphorylase (UniProtKB:P19971, GO:0009032) matches the completed human TYMP review.
  - source_id: file:human/DPYD/DPYD-ai-review.yaml
    title: DPYD gene review (human)
    statement: Dihydropyrimidine dehydrogenase (UniProtKB:Q12882, GO:0017113) matches the completed human DPYD review.
  - source_id: file:human/DPYS/DPYS-ai-review.yaml
    title: DPYS gene review (human)
    statement: Dihydropyrimidinase (UniProtKB:Q14117, GO:0004157) matches the completed human DPYS review.
  - source_id: file:human/UPB1/UPB1-ai-review.yaml
    title: UPB1 gene review (human)
    statement: beta-ureidopropionase (UniProtKB:Q9UBR1, GO:0003837) matches the completed human UPB1 review.
