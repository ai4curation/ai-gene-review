  notes: >-
    Pyrimidine nucleotide catabolism (GO:0006244 -> GO:0006212 -> GO:0019483), grounded to nine completed human
    gene reviews (four new: NT5C3A/CDA/UPP1/UPP2; five already-merged cited as nodes: TYMP PTHR10515, DPYD
    PTHR43073, DPYS PTHR11647, UPB1 PTHR43674). Route: UMP/CMP -> uridine/cytidine (NT5C3A Q9H0P0 PTHR13045,
    GO:0008253); cytidine -> uridine (CDA P32320 PTHR11644, GO:0004126, Zn2+); uridine -> uracil + R1P
    (UPP1 Q16831 / UPP2 O95045 PTHR43691, GO:0004850); thymidine -> thymine (TYMP P19971, GO:0009032); then the
    conserved reductive branch uracil/thymine -> dihydro (DPYD Q12882, GO:0017113, NADPH) -> N-carbamyl-beta-
    amino acids (DPYS Q14117, GO:0004157) -> beta-alanine/beta-aminoisobutyrate (UPB1 Q9UBR1, GO:0003837). All
    cytosolic. Curation notes from the new reviews: NT5C3A's two GO:0000215 tRNA-2'-phosphotransferase
    annotations are legacy mis-mappings (it is a pyrimidine 5'-nucleotidase, not the tRNA-splicing enzyme) ->
    flagged; CDA's direct substrates are the nucleosides not CMP/dCMP (monophosphate BP terms demoted);
    obsolete GO:0009972 "cytidine deamination" avoided; UPP2's vimentin/intermediate-filament IDA traces to a
    UPP1 paper predating UPP2 cloning (paralog mis-attribution, flagged MISCITED). This pathway also drives
    fluoropyrimidine (5-FU/capecitabine) and cytidine-analog (gemcitabine/cytarabine) drug metabolism; DPYD LOF
    -> 5-FU toxicity, NT5C3A -> hemolytic anemia, TYMP -> MNGIE, DPYD/DPYS/UPB1 -> dihydropyrimidinuria. GO
    term ids/labels verified against the local go.db; module passes structural + term-label validation.
