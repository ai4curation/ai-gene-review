    - source: pyrimidine_5nt
      target: cytidine_deamination
      connection_type: PROVIDES_INPUT_FOR
      description: NT5C3A-made cytidine is deaminated by CDA.
    - source: pyrimidine_5nt
      target: uridine_phosphorolysis
      connection_type: PROVIDES_INPUT_FOR
      description: NT5C3A-made uridine is phosphorolysed by UPP1/UPP2.
    - source: cytidine_deamination
      target: uridine_phosphorolysis
      connection_type: PROVIDES_INPUT_FOR
      description: CDA-made uridine is phosphorolysed by UPP1/UPP2.
