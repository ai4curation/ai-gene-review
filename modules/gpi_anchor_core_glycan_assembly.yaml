id: MODULE:gpi_anchor_core_glycan_assembly
title: GPI anchor biosynthesis II — de-N-acetylation, inositol acylation and mannosylation; PIGL/PIGW/PIGM/PIGX/PIGV/PIGB
description: >-
  After the GPI-GlcNAc transferase complex makes GlcNAc-PI, the glycosylphosphatidylinositol
  (GPI) precursor is elaborated by de-N-acetylation, inositol acylation and the sequential
  addition of three mannoses, on the endoplasmic-reticulum membrane. PIGL de-N-acetylates
  GlcNAc-PI to glucosaminyl-phosphatidylinositol (GlcN-PI); the intermediate is then flipped to
  the ER lumen and PIGW acylates the inositol ring (from acyl-CoA) to GlcN-(acyl)PI, a form
  required for later transamidase recognition. Three dolichyl-phosphate-mannose (Dol-P-Man)-
  dependent mannosyltransferases then build the trimannosyl core: GPI mannosyltransferase I
  (the catalytic PIGM with its stabilising subunit PIGX) adds the first mannose (alpha-1,4);
  PIGV (GPI-MT-II) adds the second (alpha-1,6); and PIGB (GPI-MT-III) adds the third
  (alpha-1,2), the mannose that later receives the bridging ethanolamine-phosphate for protein
  attachment. Defects across this segment cause GPI-deficiency disease: PIGL (CHIME syndrome),
  PIGW and PIGM/PIGV (hyperphosphatasia with mental retardation / Mabry syndrome and related
  inherited GPI-deficiency encephalopathies), and PIGB (a developmental and epileptic
  encephalopathy, GPIBD).
status: DRAFT
evidence:
  - source_id: GO:0006506
    title: GPI anchor biosynthetic process
    statement: >-
      The module is grounded in GPI anchor biosynthetic process (GO:0006506); it covers the
      de-N-acetylation, inositol-acylation and trimannosylation of the GPI precursor.
  - source_id: Reactome:R-HSA-162710
    title: Synthesis of glycosylphosphatidylinositol (GPI)
    statement: >-
      Step order and intermediates follow the human Reactome "Synthesis of
      glycosylphosphatidylinositol (GPI)" sub-pathway (reactions R-HSA-162857/162683/162830/162873/162821).
  - source_id: file:human/PIGL/PIGL-ai-review.yaml
    title: PIGL gene review (human)
    statement: >-
      The GlcNAc-PI de-N-acetylation step (UniProtKB:Q9Y2B2, GO:0000225) matches the completed
      human PIGL review.
  - source_id: file:human/PIGW/PIGW-ai-review.yaml
    title: PIGW gene review (human)
    statement: >-
      The inositol-acylation step (UniProtKB:Q7Z7B1, GO:0032216) matches the completed human PIGW review.
  - source_id: file:human/PIGM/PIGM-ai-review.yaml
    title: PIGM gene review (human)
    statement: >-
      The first-mannose (alpha-1,4) step (UniProtKB:Q9H3S5, GO:0180041) matches the completed
      human PIGM review.
  - source_id: file:human/PIGX/PIGX-ai-review.yaml
    title: PIGX gene review (human)
    statement: >-
      The GPI-MT-I stabilising-subunit role (UniProtKB:Q8TBF5, GPI-MT-I complex GO:1990529) matches
      the completed human PIGX review.
  - source_id: file:human/PIGV/PIGV-ai-review.yaml
    title: PIGV gene review (human)
    statement: >-
      The second-mannose (alpha-1,6) step (UniProtKB:Q9NUD9, GO:0120563) matches the completed
      human PIGV review.
  - source_id: file:human/PIGB/PIGB-ai-review.yaml
    title: PIGB gene review (human)
    statement: >-
      The third-mannose (alpha-1,2) step (UniProtKB:Q92521, GO:0120564) matches the completed
      human PIGB review.
module:
  id: gpi_anchor_core_glycan_assembly
  label: GPI anchor core glycan assembly (de-N-acetylation, inositol acylation, mannosylation)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: GPI anchor biosynthetic process
      term:
        id: GO:0006506
        label: GPI anchor biosynthetic process
      description: >-
        Elaboration of GlcNAc-PI to the trimannosyl GPI core via de-N-acetylation, inositol
        acylation and three Dol-P-Man-dependent mannose additions.
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: All steps occur on the endoplasmic-reticulum membrane (cytoplasmic then lumenal face).
  parts:
    - order: 1
      role: de-N-acetylation (GlcNAc-PI to GlcN-PI)
      node:
        id: pigl_step
        label: GlcNAc-PI to glucosaminyl-PI (GlcN-PI)
        module_type: REACTION
        annotons:
          - id: pigl_activity
            label: "PIGL: GlcNAc-PI de-N-acetylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PIGL de-N-acetylase family
                term:
                  id: PANTHER:PTHR12993
                  label: N-ACETYLGLUCOSAMINYL-PHOSPHATIDYLINOSITOL DE-N-ACETYLASE
                representative_members:
                  - preferred_term: PIGL (human)
                    term:
                      id: UniProtKB:Q9Y2B2
                      label: N-acetylglucosaminyl-phosphatidylinositol de-N-acetylase
            function:
              preferred_term: N-acetylglucosaminylphosphatidylinositol deacetylase activity
              term:
                id: GO:0000225
                label: N-acetylglucosaminylphosphatidylinositol deacetylase activity
              substrates:
                - preferred_term: GlcNAc-PI
                - preferred_term: H2O
              products:
                - preferred_term: GlcN-PI (glucosaminyl-PI)
                - preferred_term: acetate
              evidence:
                - source_id: EC:3.5.1.89
                  statement: GlcNAc-PI de-N-acetylase; second step of GPI-anchor biosynthesis
                - source_id: Reactome:R-HSA-162857
                  statement: "N-acetylglucosaminyl-PI + H2O -> glucosaminyl-PI + acetate (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: De-N-acetylates GlcNAc-PI; deficiency = CHIME syndrome.
    - order: 2
      role: inositol acylation
      node:
        id: pigw_step
        label: GlcN-PI to GlcN-(acyl)PI
        module_type: REACTION
        annotons:
          - id: pigw_activity
            label: "PIGW: GPI inositol acyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PIGW inositol-acyltransferase family
                term:
                  id: PANTHER:PTHR20661
                  label: PHOSPHATIDYLINOSITOL-GLYCAN BIOSYNTHESIS CLASS W PROTEIN
                representative_members:
                  - preferred_term: PIGW (human)
                    term:
                      id: UniProtKB:Q7Z7B1
                      label: Phosphatidylinositol-glycan biosynthesis class W protein
            function:
              preferred_term: glucosaminyl-phosphatidylinositol O-acyltransferase activity
              term:
                id: GO:0032216
                label: glucosaminyl-phosphatidylinositol O-acyltransferase activity
              substrates:
                - preferred_term: GlcN-PI
                - preferred_term: fatty acyl-CoA (usually palmitoyl-CoA)
              products:
                - preferred_term: GlcN-(acyl)PI
                - preferred_term: CoA
              evidence:
                - source_id: Reactome:R-HSA-162683
                  statement: "glucosaminyl-PI + fatty acyl-CoA -> glucosaminyl-acyl-PI + CoA (human Reactome reaction)"
                - source_id: file:human/PIGW/PIGW-ai-review.yaml
                  statement: acylates the inositol ring of GlcN-PI (needed for later transamidase recognition; removed post-attachment by PGAP1)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Inositol acylation; deficiency = GPIBD (hyperphosphatasia/epilepsy).
    - order: 3
      role: first mannose (alpha-1,4) — GPI-MT-I complex
      node:
        id: gpi_mt1_step
        label: GlcN-(acyl)PI to Man1-GlcN-(acyl)PI
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: pigm_activity
            label: "PIGM: GPI mannosyltransferase I (catalytic)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GPI mannosyltransferase I family (PIGM)
                term:
                  id: PANTHER:PTHR12886
                  label: GPI MANNOSYLTRANSFERASE 1
                representative_members:
                  - preferred_term: PIGM (human)
                    term:
                      id: UniProtKB:Q9H3S5
                      label: GPI mannosyltransferase 1
            function:
              preferred_term: dol-P-Man:GlcN-acyl-PI alpha-1,4-mannosyltransferase activity
              term:
                id: GO:0180041
                label: dol-P-Man:GlcN-acyl-PI alpha-1,4-mannosyltransferase activity
              substrates:
                - preferred_term: GlcN-(acyl)PI
                - preferred_term: dolichyl-phosphate-mannose (Dol-P-Man)
              products:
                - preferred_term: Man1-GlcN-(acyl)PI
                - preferred_term: dolichyl phosphate
              evidence:
                - source_id: Reactome:R-HSA-162830
                  statement: "glucosaminyl-acyl-PI + dolichol phosphate D-mannose -> mannosyl-glucosaminyl-acyl-PI (human Reactome reaction)"
                - source_id: file:human/PIGM/PIGM-ai-review.yaml
                  statement: catalytic subunit of GPI-MT-I; adds the first mannose (alpha-1,4); works with PIGX; deficiency = GPI-deficiency with venous thrombosis/seizures
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Catalytic subunit of GPI mannosyltransferase I.
          - id: pigx_activity
            label: "PIGX: GPI-MT-I stabilising subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PIGX family
                term:
                  id: PANTHER:PTHR28650
                  label: PHOSPHATIDYLINOSITOL-GLYCAN BIOSYNTHESIS CLASS X PROTEIN
                representative_members:
                  - preferred_term: PIGX (human)
                    term:
                      id: UniProtKB:Q8TBF5
                      label: Phosphatidylinositol-glycan biosynthesis class X protein
            processes:
              - preferred_term: GPI anchor biosynthetic process
                term:
                  id: GO:0006506
                  label: GPI anchor biosynthetic process
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            evidence:
              - source_id: file:human/PIGX/PIGX-ai-review.yaml
                statement: non-catalytic stabilising subunit of GPI-MT-I (GO:1990529) that binds and protects catalytic PIGM
            role_description: Stabilises catalytic PIGM in the GPI-MT-I complex.
    - order: 4
      role: second mannose (alpha-1,6)
      node:
        id: pigv_step
        label: Man1-GlcN-(acyl)PI to Man2-GlcN-(acyl)PI
        module_type: REACTION
        annotons:
          - id: pigv_activity
            label: "PIGV: GPI mannosyltransferase II"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GPI mannosyltransferase II family (PIGV)
                term:
                  id: PANTHER:PTHR12468
                  label: GPI MANNOSYLTRANSFERASE 2
                representative_members:
                  - preferred_term: PIGV (human)
                    term:
                      id: UniProtKB:Q9NUD9
                      label: GPI mannosyltransferase 2
            function:
              preferred_term: dol-P-Man:Man(1)GlcN-acyl-PI alpha-1,6-mannosyltransferase activity
              term:
                id: GO:0120563
                label: dol-P-Man:Man(1)GlcN-acyl-PI alpha-1,6-mannosyltransferase activity
              substrates:
                - preferred_term: Man1-GlcN-(acyl)PI (EtNP-modified on Man1 by PIGN)
                - preferred_term: dolichyl-phosphate-mannose (Dol-P-Man)
              products:
                - preferred_term: Man2-GlcN-(acyl)PI
                - preferred_term: dolichyl phosphate
              evidence:
                - source_id: Reactome:R-HSA-162873
                  statement: "(ethanolamineP) mannose (a1-4) glucosaminyl-acyl-PI + dolichol phosphate D-mannose -> ... (human Reactome reaction)"
                - source_id: file:human/PIGV/PIGV-ai-review.yaml
                  statement: GPI-MT-II; adds the second mannose (alpha-1,6); deficiency = Mabry syndrome (hyperphosphatasia with MR type 1)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Adds the second mannose. (The first mannose receives an EtNP from PIGN before this
              step — see the GPI ethanolamine-phosphate module.)
    - order: 5
      role: third mannose (alpha-1,2)
      node:
        id: pigb_step
        label: Man2-GlcN-(acyl)PI to Man3-GlcN-(acyl)PI
        module_type: REACTION
        annotons:
          - id: pigb_activity
            label: "PIGB: GPI mannosyltransferase III"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GPI mannosyltransferase III family (PIGB)
                term:
                  id: PANTHER:PTHR22760
                  label: GPI MANNOSYLTRANSFERASE 3 / ALG9-ALG12-like
                representative_members:
                  - preferred_term: PIGB (human)
                    term:
                      id: UniProtKB:Q92521
                      label: GPI mannosyltransferase 3
            function:
              preferred_term: dol-P-Man:Man(2)GlcN-acyl-PI alpha-1,2-mannosyltransferase activity
              term:
                id: GO:0120564
                label: dol-P-Man:Man(2)GlcN-acyl-PI alpha-1,2-mannosyltransferase activity
              substrates:
                - preferred_term: Man2-GlcN-(acyl)PI
                - preferred_term: dolichyl-phosphate-mannose (Dol-P-Man)
              products:
                - preferred_term: Man3-GlcN-(acyl)PI
                - preferred_term: dolichyl phosphate
              evidence:
                - source_id: Reactome:R-HSA-162821
                  statement: "mannose (a1-6) (ethanolamineP) mannose (a1-4) glucosaminyl-acyl-PI + dolichol phosphate D-mannose -> ... (human Reactome reaction)"
                - source_id: file:human/PIGB/PIGB-ai-review.yaml
                  statement: GPI-MT-III; adds the third mannose (alpha-1,2), which later bears the bridging EtNP for protein attachment; deficiency = GPIBD encephalopathy
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Adds the third mannose, which receives the protein-bridging EtNP (via PIGO) in the
              next module.
  connections:
    - source: pigl_step
      target: pigw_step
      connection_type: PROVIDES_INPUT_FOR
      description: GlcN-PI from PIGL is inositol-acylated by PIGW.
    - source: pigw_step
      target: gpi_mt1_step
      connection_type: PROVIDES_INPUT_FOR
      description: GlcN-(acyl)PI from PIGW receives the first mannose from GPI-MT-I (PIGM/PIGX).
    - source: gpi_mt1_step
      target: pigv_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Man1-GlcN-(acyl)PI (after EtNP addition to Man1 by PIGN) receives the second mannose from PIGV.
    - source: pigv_step
      target: pigb_step
      connection_type: PROVIDES_INPUT_FOR
      description: Man2-GlcN-(acyl)PI receives the third mannose from PIGB.
  notes: >-
    GPI core-glycan-assembly segment, grounded to the human enzymes PIGL (UniProtKB:Q9Y2B2,
    GO:0000225, EC 3.5.1.89), PIGW (Q7Z7B1, GO:0032216), the GPI-MT-I complex (catalytic PIGM
    Q9H3S5 GO:0180041 + stabilising PIGX Q8TBF5; complex GO:1990529), PIGV (Q9NUD9, GO:0120563) and
    PIGB (Q92521, GO:0120564). GO molecular-function/BP/location terms were taken from the completed
    human gene reviews and verified against the local go.db; Reactome reaction ids/titles were
    verified against the local reactome cache. Each step uses a PANTHER family selector with the
    human enzyme as representative; GPI-MT-I is a PROTEIN_COMPLEX node (PIGM catalytic + PIGX
    stabiliser, the latter modelled by its BP role as it has no catalytic MF). The three
    mannosyltransferases are Dol-P-Man-dependent (donor supplied by the DPM1/2/3 module). Note the
    pathway interleaves with the ethanolamine-phosphate additions: PIGN adds EtNP to the first
    mannose between the PIGM and PIGV steps (covered in the GPI EtNP module), and PIGO/PIGG add EtNP
    to the third/second mannoses after PIGB. Upstream is the GPI-GnT module (GlcNAc-PI); downstream
    the EtNP-modified Man3 GPI is transferred to protein by the GPI transamidase (PIGK/PIGS/PIGT/
    PIGU/GPAA1) and remodelled (PGAP1/2/3) — separate modules. Disorders: CHIME syndrome (PIGL),
    GPIBD/hyperphosphatasia (PIGW), GPI-deficiency with thrombosis/seizures (PIGM), Mabry syndrome
    (PIGV), GPIBD encephalopathy (PIGB).
