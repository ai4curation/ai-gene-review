id: MODULE:phosphocreatine_shuttle
title: Phosphocreatine shuttle / creatine kinase system (human)
description: >-
  The creatine kinase (CK) / phosphocreatine energy-buffer system, which uses
  the creatine produced by creatine biosynthesis (see
  MODULE:creatine_biosynthesis) as a spatial and temporal buffer of ATP. This
  module covers creatine *utilization*, not its synthesis. A single reversible
  reaction, creatine kinase activity (ATP + creatine <=> ADP + phosphocreatine,
  GO:0004111), is run in two cellular locations by compartment-specific isozymes
  to form a shuttle: mitochondrial CK isozymes (CKMT1A/B ubiquitous, CKMT2
  sarcomeric) sit in the mitochondrial intermembrane space and use ATP exported
  from oxidative phosphorylation to phosphorylate creatine, producing
  phosphocreatine; phosphocreatine, being small and diffusible, moves through the
  cytosol to sites of high ATP turnover, where cytosolic CK isozymes (CKB
  brain-type, CKM muscle-type; assembled as CK-BB, CK-MB, and CK-MM dimers)
  regenerate ATP from phosphocreatine and ADP exactly where it is consumed. The
  net effect is to shuttle high-energy phosphate from mitochondria to ATPases and
  to buffer the cytosolic ATP/ADP ratio in tissues with high, fluctuating energy
  demand (skeletal and cardiac muscle, brain, photoreceptors, spermatozoa). The
  same enzymes also support a thermogenic "futile creatine cycle" (GO:0140651) in
  some adipocytes, in which phosphocreatine is hydrolysed back to creatine
  (releasing heat) rather than donating phosphate to ADP. The catalytic species
  are oligomers, and the participants here are modelled as protein complexes
  mirroring Reactome: the mitochondrial limb as alternative homo-octamers and the
  cytosolic limb as the CK-MM, CK-BB, and CK-MB dimers (the heterodimer being a
  genuine two-gene-product catalytic unit). This module is distinct from, and
  downstream of, creatine biosynthesis: it consumes creatine, it does not make it.
status: DRAFT
evidence:
  - source_id: GO:0004111
    title: creatine kinase activity
    statement: >-
      Both shuttle limbs are the same molecular function, creatine kinase
      (EC 2.7.3.2): ATP + creatine = ADP + N-phosphocreatine.
  - source_id: GO:0046314
    title: phosphocreatine biosynthetic process
    statement: >-
      The phosphate-loading (mitochondrial) direction is grounded in the GO
      biological-process term for phosphocreatine biosynthesis.
  - source_id: GO:0140651
    title: futile creatine cycle
    statement: >-
      The thermogenic futile-cycle variant of the system is captured by the GO
      term for the futile creatine cycle (cf. GO-CAM gomodel:60ad85f700000898).
module:
  id: phosphocreatine_shuttle
  label: Phosphocreatine shuttle (creatine kinase system)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: phosphocreatine biosynthetic process
      term:
        id: GO:0046314
        label: phosphocreatine biosynthetic process
      description: >-
        Reversible creatine-kinase interconversion of ATP/creatine and
        ADP/phosphocreatine, operated as a compartmentalized energy shuttle.
  context:
    cellular_components:
      - preferred_term: mitochondrial intermembrane space
        term:
          id: GO:0005758
          label: mitochondrial intermembrane space
        description: Location of the mitochondrial CK isozymes (phosphate-loading limb).
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Location of the cytosolic CK isozymes (ATP-regenerating limb).
  parts:
    - order: 1
      role: mitochondrial limb (loads phosphate onto creatine)
      node:
        id: mito_ck_step
        label: ATP + creatine to ADP + phosphocreatine (mitochondrial)
        module_type: REACTION
        description: >-
          Mitochondrial creatine kinase, located in the intermembrane space and
          functionally coupled to the adenine-nucleotide translocator, uses ATP
          generated by oxidative phosphorylation to phosphorylate creatine,
          exporting energy as diffusible phosphocreatine. The active species is an
          octamer; Reactome represents the catalyst as a DefinedSet ("CK octamers",
          R-HSA-200373) of two alternative homo-octamers, captured here as the two
          variants.
        variant_sets:
          - id: mito_ck_octamer
            label: Mitochondrial creatine kinase octamer
            axis: tissue / isozyme
            selection: ONE_OR_MORE
            variants:
              - id: ckmt1_octamer_variant
                label: Ubiquitous mitochondrial CK octamer (CKMT1A)
                module_type: REACTION
                annotons:
                  - id: ckmt1_octamer_activity
                    label: "CK octamer (ubiquitous): CKMT1A homo-octamer"
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: creatine kinase, ubiquitous, octamer
                        description: >-
                          Homo-octamer of the U-type mitochondrial creatine kinase
                          CKMT1A, associated with the mitochondrial inner membrane.
                        active_units:
                          - id: ckmt1_unit
                            label: CKMT1A subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKMT1A (ubiquitous mitochondrial creatine kinase)
                                term:
                                  id: UniProtKB:P12532
                                  label: Creatine kinase U-type, mitochondrial
                            role: catalytic subunit
                            stoichiometry: "8 (homo-octamer)"
                      evidence:
                        - source_id: Reactome:R-HSA-200358
                          statement: "creatine kinase, ubiquitous, octamer [mitochondrial inner membrane] (Reactome complex)"
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: ATP
                        - preferred_term: creatine
                      products:
                        - preferred_term: ADP
                        - preferred_term: phosphocreatine
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200326
                          statement: "creatine + ATP => phosphocreatine + ADP [CK octamer] (human Reactome reaction; mitochondrial CK)"
                    locations:
                      - preferred_term: mitochondrial intermembrane space
                        term:
                          id: GO:0005758
                          label: mitochondrial intermembrane space
                    role_description: >-
                      Ubiquitously expressed mitochondrial CK octamer; couples
                      OXPHOS ATP to phosphocreatine production in most tissues.
              - id: ckmt2_octamer_variant
                label: Sarcomeric mitochondrial CK octamer (CKMT2)
                module_type: REACTION
                annotons:
                  - id: ckmt2_octamer_activity
                    label: "CK octamer (sarcomeric): CKMT2 homo-octamer"
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: creatine kinase, sarcomeric, octamer
                        description: >-
                          Homo-octamer of the S-type (sarcomeric) mitochondrial
                          creatine kinase CKMT2, associated with the mitochondrial
                          inner membrane in striated muscle and heart.
                        active_units:
                          - id: ckmt2_unit
                            label: CKMT2 subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKMT2 (sarcomeric mitochondrial creatine kinase)
                                term:
                                  id: UniProtKB:P17540
                                  label: Creatine kinase S-type, mitochondrial
                            role: catalytic subunit
                            stoichiometry: "8 (homo-octamer)"
                      evidence:
                        - source_id: Reactome:R-HSA-200339
                          statement: "creatine kinase, sarcomeric, octamer [mitochondrial inner membrane] (Reactome complex)"
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: ATP
                        - preferred_term: creatine
                      products:
                        - preferred_term: ADP
                        - preferred_term: phosphocreatine
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200326
                          statement: "creatine + ATP => phosphocreatine + ADP [CK octamer] (human Reactome reaction; mitochondrial CK)"
                    locations:
                      - preferred_term: mitochondrial intermembrane space
                        term:
                          id: GO:0005758
                          label: mitochondrial intermembrane space
                    role_description: >-
                      Sarcomeric mitochondrial CK octamer; the muscle/heart isozyme
                      of the phosphate-loading limb.
    - order: 2
      role: cytosolic limb (regenerates ATP at sites of demand)
      node:
        id: cyto_ck_step
        label: phosphocreatine + ADP to creatine + ATP (cytosolic)
        module_type: REACTION
        description: >-
          Cytosolic creatine kinase, localized at or near ATPases (myofibrils,
          ion pumps, etc.), regenerates ATP from phosphocreatine and ADP exactly
          where ATP is consumed, and returns creatine for re-phosphorylation. The
          catalyst is a dimer; Reactome represents it as a DefinedSet ("CKB, CKM",
          R-HSA-200343) of the CK-MM, CK-BB, and CK-MB dimers, captured here as the
          three variants. CK-MB is a genuine heterodimer of two distinct gene
          products and is the classic cardiac-injury biomarker.
        variant_sets:
          - id: cyto_ck_dimer
            label: Cytosolic creatine kinase dimer
            axis: subunit composition / tissue
            selection: ONE_OR_MORE
            variants:
              - id: ck_mm_variant
                label: CK-MM homodimer (CKM/CKM)
                module_type: REACTION
                annotons:
                  - id: ck_mm_activity
                    label: "CK-MM: creatine kinase M-type homodimer"
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: creatine kinase MM dimer
                        description: Homodimer of the muscle-type creatine kinase CKM; predominant in skeletal and cardiac muscle.
                        active_units:
                          - id: ck_mm_ckm_unit
                            label: CKM subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKM (muscle-type creatine kinase)
                                term:
                                  id: UniProtKB:P06732
                                  label: Creatine kinase M-type
                            role: catalytic subunit
                            stoichiometry: "2 (homodimer)"
                      evidence:
                        - source_id: Reactome:R-HSA-200359
                          statement: "creatine kinase MM dimer [cytosol] (Reactome complex)"
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: phosphocreatine
                        - preferred_term: ADP
                      products:
                        - preferred_term: creatine
                        - preferred_term: ATP
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200318
                          statement: "creatine + ATP => phosphocreatine + ADP [CKB,CKM] (human Reactome reaction; cytosolic CK)"
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: Muscle CK-MM; regenerates ATP at myofibrillar and membrane ATPases in striated muscle.
              - id: ck_bb_variant
                label: CK-BB homodimer (CKB/CKB)
                module_type: REACTION
                annotons:
                  - id: ck_bb_activity
                    label: "CK-BB: creatine kinase B-type homodimer"
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: creatine kinase BB dimer
                        description: Homodimer of the brain-type creatine kinase CKB; predominant in brain and many non-muscle tissues.
                        active_units:
                          - id: ck_bb_ckb_unit
                            label: CKB subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKB (brain-type creatine kinase)
                                term:
                                  id: UniProtKB:P12277
                                  label: Creatine kinase B-type
                            role: catalytic subunit
                            stoichiometry: "2 (homodimer)"
                      evidence:
                        - source_id: Reactome:R-HSA-200341
                          statement: "creatine kinase BB dimer [cytosol] (Reactome complex)"
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: phosphocreatine
                        - preferred_term: ADP
                      products:
                        - preferred_term: creatine
                        - preferred_term: ATP
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200318
                          statement: "creatine + ATP => phosphocreatine + ADP [CKB,CKM] (human Reactome reaction; cytosolic CK)"
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: Brain CK-BB; regenerates ATP at energy-demanding sites in brain and other non-muscle tissues.
              - id: ck_mb_variant
                label: CK-MB heterodimer (CKM/CKB)
                module_type: REACTION
                annotons:
                  - id: ck_mb_activity
                    label: "CK-MB: creatine kinase M-type/B-type heterodimer"
                    participant:
                      selector_type: PROTEIN_COMPLEX
                      protein_complex:
                        preferred_term: creatine kinase MB heterodimer
                        description: >-
                          Heterodimer of the muscle-type (CKM) and brain-type (CKB)
                          creatine kinases; enriched in cardiac muscle and the
                          classic serum biomarker of myocardial injury. This is a
                          genuine two-gene-product catalytic unit that a single-gene
                          variant cannot represent.
                        active_units:
                          - id: ck_mb_ckm_unit
                            label: CKM subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKM (muscle-type creatine kinase)
                                term:
                                  id: UniProtKB:P06732
                                  label: Creatine kinase M-type
                            role: catalytic subunit
                            stoichiometry: "1"
                          - id: ck_mb_ckb_unit
                            label: CKB subunit
                            participant:
                              selector_type: GENE_PRODUCT
                              gene_product:
                                preferred_term: CKB (brain-type creatine kinase)
                                term:
                                  id: UniProtKB:P12277
                                  label: Creatine kinase B-type
                            role: catalytic subunit
                            stoichiometry: "1"
                      evidence:
                        - source_id: Reactome:R-HSA-200374
                          statement: "creatine kinase BM dimer [cytosol] (Reactome complex; CK-MB heterodimer)"
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: phosphocreatine
                        - preferred_term: ADP
                      products:
                        - preferred_term: creatine
                        - preferred_term: ATP
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200318
                          statement: "creatine + ATP => phosphocreatine + ADP [CKB,CKM] (human Reactome reaction; cytosolic CK)"
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: >-
                      Cardiac-enriched CK-MB heterodimer; the only cytosolic CK
                      species composed of two different gene products.
  connections:
    - source: mito_ck_step
      target: cyto_ck_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Phosphocreatine made at the mitochondria diffuses to the cytosol and is
        the substrate from which cytosolic CK regenerates ATP at sites of demand.
    - source: cyto_ck_step
      target: mito_ck_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Creatine released by the cytosolic limb diffuses back to the mitochondria
        to be re-phosphorylated, closing the shuttle.
  notes: >-
    Creatine *utilization* module; downstream of and distinct from
    MODULE:creatine_biosynthesis (AGAT/GATM -> GAMT). The catalysts are modelled
    as protein complexes mirroring how Reactome types the reaction's catalyst: a
    DefinedSet of alternative complexes (our variant_set) of single-protein
    subunits (our PROTEIN_COMPLEX active_units). Mitochondrial limb (reaction
    R-HSA-200326): CKMT1A ubiquitous octamer (complex R-HSA-200358) and CKMT2
    sarcomeric octamer (complex R-HSA-200339). Cytosolic limb (reaction
    R-HSA-200318): CK-MM (complex R-HSA-200359), CK-BB (complex R-HSA-200341), and
    the CK-MB heterodimer (complex R-HSA-200374, CKM + CKB). Subunit UniProt ids:
    CKMT1A P12532, CKMT2 P17540, CKM P06732, CKB P12277. GO terms verified via
    QuickGO; Reactome complex/reaction ids verified via the Reactome ContentService
    API. Related production GO-CAMs: the mouse futile creatine cycle
    (gomodel:60ad85f700000898, Ckb + Alpl) and the human CRL5(ASB9)-mediated
    degradation of CKB (gomodel:66187e4700000246); these were not attached as
    gocam_associations because they model regulation/turnover and a thermogenic
    variant rather than the canonical phosphate-shuttle limbs. A reviewed rat
    ortholog exists at genes/rat/Ckmt2.
