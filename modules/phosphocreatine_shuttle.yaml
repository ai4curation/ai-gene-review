id: MODULE:phosphocreatine_shuttle
title: Phosphocreatine shuttle / creatine kinase system (human)
description: >-
  The creatine kinase (CK) / phosphocreatine energy-buffer system, which uses
  the creatine produced by creatine biosynthesis (see
  MODULE:creatine_biosynthesis) as a spatial and temporal buffer of ATP. This
  module covers creatine *utilization*, not its synthesis. A single reversible
  reaction, creatine kinase activity (ATP + creatine <=> ADP + phosphocreatine,
  GO:0004111), is run in two cellular locations by compartment-specific isozymes
  to form a shuttle: mitochondrial CK isozymes (CKMT1A/B ubiquitous, CKMT2
  sarcomeric) sit in the mitochondrial intermembrane space and use ATP exported
  from oxidative phosphorylation to phosphorylate creatine, producing
  phosphocreatine; phosphocreatine, being small and diffusible, moves through the
  cytosol to sites of high ATP turnover, where cytosolic CK isozymes (CKB
  brain-type, CKM muscle-type; assembled as CK-BB, CK-MB, and CK-MM dimers)
  regenerate ATP from phosphocreatine and ADP exactly where it is consumed. The
  net effect is to shuttle high-energy phosphate from mitochondria to ATPases and
  to buffer the cytosolic ATP/ADP ratio in tissues with high, fluctuating energy
  demand (skeletal and cardiac muscle, brain, photoreceptors, spermatozoa). The
  same enzymes also support a thermogenic "futile creatine cycle" (GO:0140651) in
  some adipocytes, in which phosphocreatine is hydrolysed back to creatine
  (releasing heat) rather than donating phosphate to ADP. This module is distinct
  from, and downstream of, creatine biosynthesis: it consumes creatine, it does
  not make it.
status: DRAFT
evidence:
  - source_id: GO:0004111
    title: creatine kinase activity
    statement: >-
      Both shuttle limbs are the same molecular function, creatine kinase
      (EC 2.7.3.2): ATP + creatine = ADP + N-phosphocreatine.
  - source_id: GO:0046314
    title: phosphocreatine biosynthetic process
    statement: >-
      The phosphate-loading (mitochondrial) direction is grounded in the GO
      biological-process term for phosphocreatine biosynthesis.
  - source_id: GO:0140651
    title: futile creatine cycle
    statement: >-
      The thermogenic futile-cycle variant of the system is captured by the GO
      term for the futile creatine cycle (cf. GO-CAM gomodel:60ad85f700000898).
module:
  id: phosphocreatine_shuttle
  label: Phosphocreatine shuttle (creatine kinase system)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: phosphocreatine biosynthetic process
      term:
        id: GO:0046314
        label: phosphocreatine biosynthetic process
      description: >-
        Reversible creatine-kinase interconversion of ATP/creatine and
        ADP/phosphocreatine, operated as a compartmentalized energy shuttle.
  context:
    cellular_components:
      - preferred_term: mitochondrial intermembrane space
        term:
          id: GO:0005758
          label: mitochondrial intermembrane space
        description: Location of the mitochondrial CK isozymes (phosphate-loading limb).
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Location of the cytosolic CK isozymes (ATP-regenerating limb).
  parts:
    - order: 1
      role: mitochondrial limb (loads phosphate onto creatine)
      node:
        id: mito_ck_step
        label: ATP + creatine to ADP + phosphocreatine (mitochondrial)
        module_type: REACTION
        description: >-
          Mitochondrial creatine kinase, located in the intermembrane space and
          functionally coupled to the adenine-nucleotide translocator, uses ATP
          generated by oxidative phosphorylation to phosphorylate creatine,
          exporting energy as diffusible phosphocreatine.
        variant_sets:
          - id: mito_ck_isozyme
            label: Mitochondrial creatine kinase isozyme
            axis: tissue / isozyme
            selection: ONE_OR_MORE
            variants:
              - id: ckmt1_variant
                label: Ubiquitous mitochondrial CK (CKMT1A/CKMT1B)
                module_type: REACTION
                annotons:
                  - id: ckmt1_activity
                    label: "CKMT1A: creatine kinase U-type, mitochondrial"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CKMT1A (ubiquitous mitochondrial creatine kinase)
                        term:
                          id: UniProtKB:P12532
                          label: Creatine kinase U-type, mitochondrial
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: ATP
                        - preferred_term: creatine
                      products:
                        - preferred_term: ADP
                        - preferred_term: phosphocreatine
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200326
                          statement: "creatine + ATP => phosphocreatine + ADP [CK octamer] (human Reactome reaction; mitochondrial CK)"
                    locations:
                      - preferred_term: mitochondrial intermembrane space
                        term:
                          id: GO:0005758
                          label: mitochondrial intermembrane space
                    role_description: >-
                      Ubiquitously expressed mitochondrial CK; couples OXPHOS ATP
                      to phosphocreatine production in most tissues.
              - id: ckmt2_variant
                label: Sarcomeric mitochondrial CK (CKMT2)
                module_type: REACTION
                annotons:
                  - id: ckmt2_activity
                    label: "CKMT2: creatine kinase S-type, mitochondrial"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CKMT2 (sarcomeric mitochondrial creatine kinase)
                        term:
                          id: UniProtKB:P17540
                          label: Creatine kinase S-type, mitochondrial
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: ATP
                        - preferred_term: creatine
                      products:
                        - preferred_term: ADP
                        - preferred_term: phosphocreatine
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200326
                          statement: "creatine + ATP => phosphocreatine + ADP [CK octamer] (human Reactome reaction; mitochondrial CK)"
                    locations:
                      - preferred_term: mitochondrial intermembrane space
                        term:
                          id: GO:0005758
                          label: mitochondrial intermembrane space
                    role_description: >-
                      Sarcomeric mitochondrial CK; the muscle/heart isozyme of the
                      phosphate-loading limb.
    - order: 2
      role: cytosolic limb (regenerates ATP at sites of demand)
      node:
        id: cyto_ck_step
        label: phosphocreatine + ADP to creatine + ATP (cytosolic)
        module_type: REACTION
        description: >-
          Cytosolic creatine kinase, localized at or near ATPases (myofibrils,
          ion pumps, etc.), regenerates ATP from phosphocreatine and ADP exactly
          where ATP is consumed, and returns creatine for re-phosphorylation. CKB
          and CKM assemble as CK-BB, CK-MB, and CK-MM dimers.
        variant_sets:
          - id: cyto_ck_isozyme
            label: Cytosolic creatine kinase isozyme
            axis: tissue / isozyme
            selection: ONE_OR_MORE
            variants:
              - id: ckb_variant
                label: Brain-type cytosolic CK (CKB)
                module_type: REACTION
                annotons:
                  - id: ckb_activity
                    label: "CKB: creatine kinase B-type"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CKB (brain-type creatine kinase)
                        term:
                          id: UniProtKB:P12277
                          label: Creatine kinase B-type
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: phosphocreatine
                        - preferred_term: ADP
                      products:
                        - preferred_term: creatine
                        - preferred_term: ATP
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200318
                          statement: "creatine + ATP => phosphocreatine + ADP [CKB,CKM] (human Reactome reaction; cytosolic CK)"
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: >-
                      Brain-type cytosolic CK; widely expressed (brain, smooth
                      muscle, many other tissues); forms CK-BB and, with CKM,
                      CK-MB dimers.
              - id: ckm_variant
                label: Muscle-type cytosolic CK (CKM)
                module_type: REACTION
                annotons:
                  - id: ckm_activity
                    label: "CKM: creatine kinase M-type"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: CKM (muscle-type creatine kinase)
                        term:
                          id: UniProtKB:P06732
                          label: Creatine kinase M-type
                    function:
                      preferred_term: creatine kinase activity
                      term:
                        id: GO:0004111
                        label: creatine kinase activity
                      substrates:
                        - preferred_term: phosphocreatine
                        - preferred_term: ADP
                      products:
                        - preferred_term: creatine
                        - preferred_term: ATP
                      evidence:
                        - source_id: EC:2.7.3.2
                          statement: creatine kinase
                          notes: "KEGG:R01881; MetaCyc:CREATININE-KINASE-RXN"
                        - source_id: Reactome:R-HSA-200318
                          statement: "creatine + ATP => phosphocreatine + ADP [CKB,CKM] (human Reactome reaction; cytosolic CK)"
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: >-
                      Muscle-type cytosolic CK; predominates in skeletal and
                      cardiac muscle; forms CK-MM and, with CKB, CK-MB dimers
                      (CK-MB is the classic cardiac-injury biomarker).
  connections:
    - source: mito_ck_step
      target: cyto_ck_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Phosphocreatine made at the mitochondria diffuses to the cytosol and is
        the substrate from which cytosolic CK regenerates ATP at sites of demand.
    - source: cyto_ck_step
      target: mito_ck_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Creatine released by the cytosolic limb diffuses back to the mitochondria
        to be re-phosphorylated, closing the shuttle.
  notes: >-
    Creatine *utilization* module; downstream of and distinct from
    MODULE:creatine_biosynthesis (AGAT/GATM -> GAMT). The same reversible
    creatine kinase activity (GO:0004111, EC 2.7.3.2) is grounded to the four
    human isozymes: mitochondrial CKMT1A (UniProtKB:P12532) and CKMT2
    (UniProtKB:P17540), and cytosolic CKB (UniProtKB:P12277) and CKM
    (UniProtKB:P06732). GO terms verified via QuickGO. Related production GO-CAMs:
    the mouse futile creatine cycle (gomodel:60ad85f700000898, Ckb + Alpl) and the
    human CRL5(ASB9)-mediated degradation of CKB (gomodel:66187e4700000246); these
    were not attached as gocam_associations because they model regulation/turnover
    and a thermogenic variant rather than the canonical phosphate-shuttle limbs.
    A reviewed rat ortholog exists at genes/rat/Ckmt2.
