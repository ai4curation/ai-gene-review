id: MODULE:qsebc_like_two_component_regulation_boundary
title: QseBC-like two-component regulation boundary
description: >-
  Boundary module for the ppu02024 QseBC-like two-component regulation bucket in
  Pseudomonas putida KT2440. The bucket contains two predicted membrane sensor
  kinase/DNA-binding response-regulator pairs (PP_2714-PP_2713 and
  PP_4224-qseB) plus the KdpE-like DNA-binding response activator kdpE. This is
  the most regulatory component of the ppu02024 quorum-sensing umbrella, but the
  first-pass evidence supports generic two-component phosphorelay transcription
  regulation rather than a resolved LuxI/LuxR quorum-sensing route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02024
    title: Quorum sensing - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02024 is an umbrella map in PSEPK that includes transporters,
      response regulators, efflux proteins, and surface-context genes rather
      than a single LuxI/LuxR quorum-sensing module.
  - source_id: file:projects/P_PUTIDA/batches/ppu02024_quorum_sensing_partition.tsv
    title: ppu02024 quorum sensing partition table
    statement: >-
      The partition separates PP_2713, PP_2714, kdpE, PP_4224, and qseB into
      the QseBC-like two-component regulation bucket.
  - source_id: file:PSEPK/PP_2713/PP_2713-ai-review.yaml
    title: Curated PP_2713 review
    statement: >-
      The PP_2713 review accepts phosphorelay response-regulator activity,
      phosphorelay signaling, cis-regulatory region binding, transcription
      regulation, and cytosol localization.
  - source_id: file:PSEPK/PP_2714/PP_2714-ai-review.yaml
    title: Curated PP_2714 review
    statement: >-
      The PP_2714 review accepts phosphorelay sensor kinase activity, protein
      histidine kinase activity, phosphorelay signaling, and plasma-membrane
      localization.
  - source_id: file:PSEPK/kdpE/kdpE-ai-review.yaml
    title: Curated kdpE review
    statement: >-
      The kdpE review accepts response-regulator activity,
      sequence-specific regulatory DNA binding, positive transcriptional
      regulation, phosphorelay signaling, and cytoplasm localization.
  - source_id: file:PSEPK/PP_4224/PP_4224-ai-review.yaml
    title: Curated PP_4224 review
    statement: >-
      The PP_4224 review accepts phosphorelay sensor kinase activity, protein
      histidine kinase activity, phosphorelay signaling, and plasma-membrane
      localization.
  - source_id: file:PSEPK/qseB/qseB-ai-review.yaml
    title: Curated qseB review
    statement: >-
      The qseB review accepts phosphorelay response-regulator activity,
      phosphorelay signaling, cis-regulatory region binding, transcription
      regulation, and cytoplasm localization.
notes: >-
  First-pass interpretation: the two adjacent pairs PP_2714-PP_2713 and
  PP_4224-qseB are plausible local two-component branches. kdpE is retained as
  a related DNA-binding response activator in this ppu02024 regulatory bucket,
  but this pass does not assert its sensor kinase partner or target regulon.
  Direct quorum-sensing signal reception is not established for any of the five
  genes.
