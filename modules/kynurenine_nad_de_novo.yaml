  connections:
    - source: trp_to_kynurenine
      target: kynurenine_to_3haa
      connection_type: PROVIDES_INPUT_FOR
      description: L-kynurenine from the dioxygenase/formamidase step is hydroxylated (KMO) and cleaved (KYNU) to 3-hydroxyanthranilate.
    - source: kynurenine_to_3haa
      target: three_haa_to_nad
      connection_type: PROVIDES_INPUT_FOR
      description: 3-hydroxyanthranilate is opened by HAAO to ACMS -> quinolinate, which QPRT converts to NaMN for NAD+ (ACMSD diverts a fraction away).
  notes: >-
    The kynurenine pathway / de novo NAD+ biosynthesis from L-tryptophan (GO:0034354; GO:0006569),
    grounded to the completed human gene reviews: TDO2 (P48775, GO:0004833 + heme, hepatic rate-
    limiting) and IDO1 (P14902, GO:0033754 + heme, immunoregulatory) catalyse the same first step;
    AFMID (Q63HM1, GO:0004061) makes kynurenine; KMO (O15229, GO:0004502 + FAD, outer mitochondrial
    membrane) and KYNU (Q16719, GO:0030429 + PLP) make 3-hydroxyanthranilate; HAAO (P46952, GO:0000334
    + Fe2+) makes ACMS -> quinolinate; ACMSD (Q8TDX5, GO:0001760 + Zn) diverts ACMS away from NAD+;
    and QPRT (Q15274, GO:0004514) converts quinolinate to NaMN. The kynurenic-acid branch is made by
    AADAT/GOT2 (aminotransferases; AADAT curated in the lysine module). GO term ids/labels verified
    against the local go.db (note GO:0004833 is the TDO term, GO:0033754 the IDO term — distinct;
    GO:0019441 tryptophan-to-kynurenine BP and GO:0047611 for ACMSD are obsolete, replaced by
    GO:0006569 and GO:0001760). NaMN enters the common NAD+ salvage/biosynthesis pathway (NMNAT/NADSYN).
    Disorders: HAAO/KYNU deficiency — congenital NAD-deficiency malformation syndrome (VCRL,
    niacin-preventable); IDO1/TDO2/KMO/ACMSD are drug targets in cancer immunotherapy, neurodegeneration
    and NAD+-related metabolic disease.
