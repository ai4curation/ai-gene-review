  - source_id: GO:0034354
    title: "'de novo' NAD+ biosynthetic process from L-tryptophan"
    statement: The pathway is the de novo NAD+ biosynthetic process from L-tryptophan (GO:0034354).
  - source_id: GO:0006569
    title: L-tryptophan catabolic process
    statement: It is the major L-tryptophan catabolic process (GO:0006569), the kynurenine pathway.
  - source_id: file:human/TDO2/TDO2-ai-review.yaml
    title: TDO2 gene review (human)
    statement: The hepatic tryptophan-dioxygenase step (UniProtKB:P48775, GO:0004833) matches the completed human TDO2 review.
  - source_id: file:human/IDO1/IDO1-ai-review.yaml
    title: IDO1 gene review (human)
    statement: The immunoregulatory indoleamine-dioxygenase step (UniProtKB:P14902, GO:0033754) matches the completed human IDO1 review.
  - source_id: file:human/AFMID/AFMID-ai-review.yaml
    title: AFMID gene review (human)
    statement: The formamidase step (UniProtKB:Q63HM1, GO:0004061) matches the completed human AFMID review.
  - source_id: file:human/KMO/KMO-ai-review.yaml
    title: KMO gene review (human)
    statement: The kynurenine 3-monooxygenase step (UniProtKB:O15229, GO:0004502) matches the completed human KMO review.
  - source_id: file:human/KYNU/KYNU-ai-review.yaml
    title: KYNU gene review (human)
    statement: The kynureninase step (UniProtKB:Q16719, GO:0030429) matches the completed human KYNU review.
  - source_id: file:human/HAAO/HAAO-ai-review.yaml
    title: HAAO gene review (human)
    statement: The 3-hydroxyanthranilate dioxygenase step (UniProtKB:P46952, GO:0000334) matches the completed human HAAO review.
  - source_id: file:human/ACMSD/ACMSD-ai-review.yaml
    title: ACMSD gene review (human)
    statement: The ACMS decarboxylase branch-point step (UniProtKB:Q8TDX5, GO:0001760) matches the completed human ACMSD review.
  - source_id: file:human/QPRT/QPRT-ai-review.yaml
    title: QPRT gene review (human)
    statement: The quinolinate phosphoribosyltransferase step (UniProtKB:Q15274, GO:0004514) matches the completed human QPRT review.
