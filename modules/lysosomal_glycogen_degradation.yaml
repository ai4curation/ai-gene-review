  notes: >-
    Single-enzyme lysosomal glycogen catabolism grounded to human GAA (UniProtKB:P10253,
    GO:0004558 alpha-1,4-glucosidase activity, EC 3.2.1.20). The GO molecular-function
    term was taken from the human GOA record; the Reactome reaction id and title were
    verified against the local reactome cache. The enzyme uses a PANTHER family selector
    (PTHR22762, glycoside hydrolase family 31 alpha-glucosidases) with human GAA as the
    representative member. This lysosomal/autophagic route is complementary to, and not
    redundant with, the cytosolic glycogenolysis module (phosphorylase PYGL/PYGM, AGL
    debranching, PGM1): GAA loss cannot be compensated by cytosolic glycogenolysis, hence
    Pompe disease. GAA also has a slower alpha-1,6 (glucan-1,6-alpha-glucosidase,
    GO:0043896) activity and is not a physiological intestinal sucrase/maltase (that is
    SI/MGAM). Disorder: GAA -> Pompe disease / glycogen storage disease type II
    (infantile cardiomyopathy; late-onset limb-girdle/respiratory myopathy).
