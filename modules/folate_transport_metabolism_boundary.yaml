id: MODULE:folate_transport_metabolism_boundary
title: Folate transport and metabolism boundary
description: >-
  Boundary module for KEGG ppu04981 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains folate-dependent or folate-maintenance
  enzymes: glyA1/glyA2 serine hydroxymethyltransferases, metH
  cobalamin-dependent methionine synthase, folA dihydrofolate reductase, thyA
  thymidylate synthase, and fau 5-formyltetrahydrofolate cyclo-ligase. No
  folate transporter is present in the extracted KT2440 membership, so the
  satisfiable biology is folate cofactor maintenance and folate-linked
  one-carbon metabolism overlapping existing folate biosynthesis,
  one-carbon-by-folate, cobalamin, methionine, and nucleotide contexts.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04981
    title: Folate transport and metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04981 provides the PSEPK curation batch, but the
      organism-specific membership contains enzymes using or regenerating
      folate cofactors rather than recognizable folate transporter components.
  - source_id: file:projects/P_PUTIDA/batches/ppu04981_folate_transport_metabolism_boundary.tsv
    title: ppu04981 first-pass batch table
    statement: >-
      The batch table records glyA1, glyA2, metH, folA, thyA, and fau as the
      six genes in this KEGG bucket, with metH primarily tracked under the
      neighboring cobalamin transport/metabolism boundary.
  - source_id: file:PSEPK/glyA1/glyA1-ai-review.yaml
    title: Curated glyA1 review
    statement: >-
      The glyA1 review accepts glycine hydroxymethyltransferase activity,
      glycine biosynthesis, and tetrahydrofolate interconversion.
  - source_id: file:PSEPK/glyA2/glyA2-ai-review.yaml
    title: Curated glyA2 review
    statement: >-
      The glyA2 review accepts glycine hydroxymethyltransferase activity,
      glycine biosynthesis, and tetrahydrofolate interconversion.
  - source_id: file:PSEPK/metH/metH-ai-review.yaml
    title: Curated metH review
    statement: >-
      The metH review accepts methionine synthase activity, cobalamin binding,
      zinc binding, homocysteine metabolism, and methionine-biosynthesis
      context.
  - source_id: file:PSEPK/folA/folA-ai-review.yaml
    title: Curated folA review
    statement: >-
      The folA review accepts dihydrofolate reductase activity and
      tetrahydrofolate biosynthesis.
  - source_id: file:PSEPK/thyA/thyA-ai-review.yaml
    title: Curated thyA review
    statement: >-
      The thyA review accepts thymidylate synthase activity and dTMP/dTTP
      biosynthetic process terms.
  - source_id: file:PSEPK/fau/fau-ai-review.yaml
    title: Curated fau review
    statement: >-
      The fau review accepts 5-formyltetrahydrofolate cyclo-ligase activity
      and tetrahydrofolate interconversion.
module:
  id: folate_transport_metabolism_boundary
  label: Folate transport and metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: folate transport pathway absence
      description: >-
        Boundary interpretation of the KEGG map: the KT2440 membership contains
        folate-linked enzymes but no dedicated folate transporter components in
        this extracted bucket.
    - preferred_term: glycine hydroxymethyltransferase activity
      term:
        id: GO:0004372
        label: glycine hydroxymethyltransferase activity
      description: Serine hydroxymethyltransferase activity for GlyA1 and GlyA2.
    - preferred_term: tetrahydrofolate interconversion
      term:
        id: GO:0035999
        label: tetrahydrofolate interconversion
      description: Interconversion and recycling of THF one-carbon carrier states.
    - preferred_term: dihydrofolate reductase activity
      term:
        id: GO:0004146
        label: dihydrofolate reductase activity
      description: FolA reduction of dihydrofolate to tetrahydrofolate.
    - preferred_term: 5-formyltetrahydrofolate cyclo-ligase activity
      term:
        id: GO:0030272
        label: 5-formyltetrahydrofolate cyclo-ligase activity
      description: Fau recycling of 5-formyltetrahydrofolate to active one-carbon folate.
    - preferred_term: thymidylate synthase activity
      term:
        id: GO:0004799
        label: thymidylate synthase activity
      description: ThyA folate-dependent dTMP synthesis.
    - preferred_term: methionine synthase activity
      term:
        id: GO:0008705
        label: methionine synthase activity
      description: MetH 5-methyl-THF-dependent methyl transfer to homocysteine.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Reviewed ppu04981 enzymes are soluble cytosolic metabolic proteins where localization is annotated.
  parts:
    - order: 1
      role: Folate transport boundary
      node:
        id: folate_transport_absence
        label: Folate transport boundary in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The ppu04981 bucket should not be interpreted as evidence for a
          complete folate uptake or export system in KT2440. The extracted
          members are folate-dependent enzymes or folate cofactor-maintenance
          enzymes, not transporter subunits.
        annotons: []
    - order: 2
      role: Serine/glycine one-carbon donation to tetrahydrofolate
      node:
        id: glyA_serine_hydroxymethyltransferase_branch
        label: GlyA serine hydroxymethyltransferase branch
        module_type: BIOLOGICAL_PROCESS
        description: >-
          GlyA1 and GlyA2 interconvert serine and glycine while producing
          5,10-methylenetetrahydrofolate, feeding the folate one-carbon pool.
        annotons:
          - id: glyA1_serine_hydroxymethyltransferase
            label: "glyA1: serine hydroxymethyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glyA1
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
              substrates:
                - preferred_term: L-serine
                - preferred_term: tetrahydrofolate
              products:
                - preferred_term: glycine
                - preferred_term: 5,10-methylenetetrahydrofolate
            processes:
              - preferred_term: tetrahydrofolate interconversion
                term:
                  id: GO:0035999
                  label: tetrahydrofolate interconversion
              - preferred_term: glycine biosynthetic process
                term:
                  id: GO:0006545
                  label: glycine biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: One of two SHMT paralogs supplying one-carbon units to THF.
          - id: glyA2_serine_hydroxymethyltransferase
            label: "glyA2: serine hydroxymethyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glyA2
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
              substrates:
                - preferred_term: L-serine
                - preferred_term: tetrahydrofolate
              products:
                - preferred_term: glycine
                - preferred_term: 5,10-methylenetetrahydrofolate
            processes:
              - preferred_term: tetrahydrofolate interconversion
                term:
                  id: GO:0035999
                  label: tetrahydrofolate interconversion
              - preferred_term: glycine biosynthetic process
                term:
                  id: GO:0006545
                  label: glycine biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Second SHMT paralog; paralog-specific physiology remains unresolved.
    - order: 3
      role: Folate cofactor maintenance and salvage
      node:
        id: folate_cofactor_maintenance
        label: FolA/Fau folate cofactor maintenance
        module_type: METABOLIC_PATHWAY
        description: >-
          FolA regenerates tetrahydrofolate from dihydrofolate, while Fau
          converts trapped 5-formyltetrahydrofolate back into the active
          one-carbon folate pool.
        annotons:
          - id: folA_dihydrofolate_reductase
            label: "folA: dihydrofolate reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: folA
            function:
              preferred_term: dihydrofolate reductase activity
              term:
                id: GO:0004146
                label: dihydrofolate reductase activity
              substrates:
                - preferred_term: 7,8-dihydrofolate
                - preferred_term: NADPH
              products:
                - preferred_term: tetrahydrofolate
                - preferred_term: NADP+
            processes:
              - preferred_term: tetrahydrofolate biosynthetic process
                term:
                  id: GO:0046654
                  label: tetrahydrofolate biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Regenerates tetrahydrofolate for folate-dependent one-carbon metabolism.
          - id: fau_5_formyl_thf_cycloligase
            label: "fau: 5-formyltetrahydrofolate cyclo-ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fau
            function:
              preferred_term: 5-formyltetrahydrofolate cyclo-ligase activity
              term:
                id: GO:0030272
                label: 5-formyltetrahydrofolate cyclo-ligase activity
              substrates:
                - preferred_term: 5-formyltetrahydrofolate
                - preferred_term: ATP
              products:
                - preferred_term: 5,10-methenyltetrahydrofolate
                - preferred_term: ADP
                - preferred_term: phosphate
            processes:
              - preferred_term: tetrahydrofolate interconversion
                term:
                  id: GO:0035999
                  label: tetrahydrofolate interconversion
            role_description: Recycles 5-formyl-THF into active one-carbon folate carrier chemistry.
    - order: 4
      role: Folate-dependent methyl and nucleotide synthesis reactions
      node:
        id: folate_dependent_terminal_reactions
        label: MetH/ThyA folate-dependent terminal reactions
        module_type: METABOLIC_PATHWAY
        description: >-
          MetH and ThyA consume folate-bound one-carbon units in distinct
          downstream pathways: methionine biosynthesis and thymidylate
          biosynthesis.
        annotons:
          - id: metH_methionine_synthase_folate_context
            label: "metH: 5-methyl-THF-dependent methionine synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: metH
            function:
              preferred_term: methionine synthase activity
              term:
                id: GO:0008705
                label: methionine synthase activity
              substrates:
                - preferred_term: 5-methyltetrahydrofolate
                - preferred_term: L-homocysteine
              products:
                - preferred_term: tetrahydrofolate
                - preferred_term: L-methionine
              cofactors:
                - preferred_term: methylcobalamin
                - preferred_term: zinc ion
            processes:
              - preferred_term: L-methionine biosynthetic process
                term:
                  id: GO:0071265
                  label: L-methionine biosynthetic process
              - preferred_term: homocysteine metabolic process
                term:
                  id: GO:0050667
                  label: homocysteine metabolic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Folate-user boundary node whose primary module also includes cobalamin/methionine context.
          - id: thyA_thymidylate_synthase_folate_context
            label: "thyA: thymidylate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: thyA
            function:
              preferred_term: thymidylate synthase activity
              term:
                id: GO:0004799
                label: thymidylate synthase activity
              substrates:
                - preferred_term: dUMP
                - preferred_term: 5,10-methylenetetrahydrofolate
              products:
                - preferred_term: dTMP
                - preferred_term: dihydrofolate
            processes:
              - preferred_term: dTMP biosynthetic process
                term:
                  id: GO:0006231
                  label: dTMP biosynthetic process
              - preferred_term: dTTP biosynthetic process
                term:
                  id: GO:0006235
                  label: dTTP biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Uses 5,10-methylene-THF as one-carbon donor to produce dTMP for DNA precursor synthesis.
  connections:
    - source: glyA_serine_hydroxymethyltransferase_branch
      target: folate_dependent_terminal_reactions
      connection_type: PROVIDES_INPUT_FOR
      description: GlyA1/GlyA2 produce 5,10-methylene-THF used directly by ThyA and upstream of 5-methyl-THF for MetH.
    - source: folate_cofactor_maintenance
      target: folate_dependent_terminal_reactions
      connection_type: PROVIDES_INPUT_FOR
      description: FolA and Fau maintain active folate cofactor pools that support one-carbon-dependent reactions.
  notes: >-
    This boundary module is intentionally narrower than the KEGG title. It does
    not propose folate transport annotations from ppu04981 alone. The same
    genes are cross-contextualized in folate_biosynthesis,
    one_carbon_by_folate, and cobalamin_transport_metabolism_boundary where
    those stricter modules are the better primary homes.
