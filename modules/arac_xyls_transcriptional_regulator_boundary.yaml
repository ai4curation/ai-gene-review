id: MODULE:arac_xyls_transcriptional_regulator_boundary
title: AraC/XylS-family transcriptional regulator boundary
description: Boundary module for PSEPK AraC/XylS-family transcription regulators from the broad regulation/signal-transduction
  functional bucket. It groups named catabolic or DNA-damage regulators, DJ-1/PfpI or INH-QAR-associated regulators, RmlC/cupin-associated
  regulators, arabinose-binding-domain regulators, and other AraC/XylS sensor-domain candidates while leaving most direct
  regulons and effector ligands unresolved.
