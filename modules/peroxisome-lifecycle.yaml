    conditions:
      - preferred_term: conserved eukaryotic organelle lifecycle
        description: >-
          Peroxisomes are eukaryotic organelles; individual lineages can retain,
          elaborate, or lose particular route variants.
      - preferred_term: conserved peroxin core with lineage-specific additions
        description: >-
          The conserved skeleton centers on PMP targeting, PTS cargo
          recognition, receptor docking/translocation, receptor ubiquitination
          and extraction, and membrane remodeling; individual lineages add,
          lose, or replace accessory peroxins and regulatory factors.
