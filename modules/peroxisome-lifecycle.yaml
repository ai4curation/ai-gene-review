id: MODULE:peroxisome_lifecycle
title: Peroxisome lifecycle and matrix protein import module
description: >-
  Peroxisomes are maintained by coordinated membrane-protein delivery, matrix
  cargo recognition, receptor docking and translocation at the importomer,
  ubiquitin-dependent receptor recycling, membrane growth and division, and
  import of resident metabolic enzymes. This module captures the conserved
  peroxin roles and the major route variants that support peroxisome assembly,
  inheritance, and function across eukaryotes.
status: DRAFT
evidence:
  - source_id: file:modules/peroxisome-lifecycle-deep-research-falcon.md
    title: Peroxisome lifecycle and matrix protein import module deep research
    statement: >-
      Falcon deep research synthesis used to refine the module boundaries,
      importomer/exportomer distinction, lineage variants, and 2023-2024
      mechanistic updates.
  - source_id: DOI:10.1016/j.tcb.2023.08.005
    title: Towards solving the mystery of peroxisomal matrix protein import
    statement: >-
      Supports the coupled import-receptor recycling cycle and the current
      PEX13/YG-repeat meshwork model for matrix protein import.
  - source_id: DOI:10.1007/s00418-023-02259-5
    title: "The peroxisome: an update on mysteries 3.0"
    statement: >-
      Supports the current conserved peroxin skeleton, lineage-specific peroxin
      variants, peroxisome proliferation/division machinery, and organelle
      contact-site context.
  - source_id: PMID:28765278
    statement: Supports treating the peroxisomal docking/translocation machinery as an importomer module.
  - source_id: PMID:35768507
    statement: Supports a distinct ATP-dependent matrix import receptor recycling/extraction module.
notes: >-
  This module treats matrix import as a coupled import-export cycle. The
  docking/translocation importomer is modeled separately from the receptor
  ubiquitination and ATP-dependent extraction machinery, even though some
  literature uses "importomer" more broadly. Pexophagy and organelle contact
  sites are represented as interfaces to the lifecycle, not as part of the core
  matrix import mechanism.
