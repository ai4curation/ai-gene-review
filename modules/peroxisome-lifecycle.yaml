    - order: 6
      role: metabolic operation
      node:
        id: peroxisome_matrix_metabolism
        label: Peroxisomal matrix metabolic operation
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Resident peroxisomal metabolism is treated as a module interface
          rather than a fixed universal pathway. Beta-oxidation, reactive oxygen
          metabolism, ether lipid metabolism, glyoxylate-cycle functions, or
          specialized biosynthetic pathways can be attached as lineage-,
          tissue-, or environment-specific submodules.
        concepts:
          - preferred_term: peroxisomal matrix
            term:
              id: GO:0005782
              label: peroxisomal matrix
        evidence:
          - source_id: DOI:10.1186/s13062-024-00458-1
            statement: Supports tissue-specific expression and functional specialization of peroxisomal metabolism.
        notes: >-
          Recent expression meta-analysis supports keeping metabolic operation
          modular rather than universal: heart, liver, and other tissues can
          retain similar biogenesis machinery while emphasizing different
          peroxisomal metabolic programs.
