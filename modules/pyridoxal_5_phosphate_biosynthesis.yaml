id: MODULE:pyridoxal_5_phosphate_biosynthesis
title: DXP-dependent de novo pyridoxal 5'-phosphate biosynthesis
description: >-
  De novo synthesis of pyridoxal 5'-phosphate (PLP, vitamin B6) through the
  DXP-dependent bacterial pathway. One branch converts D-erythrose 4-phosphate
  to 3-amino-2-oxopropyl phosphate through Epd, PdxB, SerC, and PdxA. PdxJ then
  condenses this product with the shared metabolite 1-deoxy-D-xylulose
  5-phosphate (DXP) to form pyridoxine 5'-phosphate, and PdxH performs the
  terminal oxidation to PLP. DXP production is shared with thiamine and
  isoprenoid metabolism and is outside this module boundary. The alternative
  DXP-independent PdxS/PdxT pathway and vitamin-B6 salvage are separate modules.
status: DRAFT
evidence:
  - source_id: GO:0036001
    title: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
    statement: >-
      The module is grounded in the GO biological process for de novo PLP
      biosynthesis.
  - source_id: UniPathway:UPA00244
    title: Pyridoxine 5'-phosphate biosynthesis
    statement: >-
      UniPathway orders the Epd/PdxB/SerC/PdxA/PdxJ branch that forms pyridoxine
      5'-phosphate from D-erythrose 4-phosphate and DXP.
  - source_id: KEGG:ppu00750
    title: Pseudomonas putida KT2440 vitamin B6 metabolism
    statement: >-
      The PSEPK pathway instance contains the six de novo-pathway proteins used
      as exemplars, as well as salvage enzymes and unrelated PLP-dependent
      pathway-map members that are outside this module boundary.
  - source_id: PMID:10885790
    title: "Biosynthesis of pyridoxine: origin of the nitrogen atom of pyridoxine in microorganisms."
    statement: >-
      Species-level isotope-labeling evidence places Pseudomonas putida in the
      glutamate-nitrogen, DXP-dependent pyridoxine-biosynthesis route.
    supporting_text: >-
      the nitrogen atom of glutamate was incorporated into pyridoxine in P.
      putida, E. aerogenes and E. coli
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__dxp-dependent-pyridoxal-5-phosphate-biosynthesis__ppu00750-deep-research-openscientist.md
    title: OpenScientist module/pathway/taxon report for PSEPK DXP-dependent PLP biosynthesis
    statement: >-
      Supports the six-step de novo pathway, its external DXP dependency,
      exclusion of salvage and PLP-consuming threonine synthases, and complete
      satisfiability in KT2440. Gene-level biochemical assignments remain
      homology-inferred.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      The local pathway partition supplies the PSEPK accessions and locus tags
      used for the module exemplars.
module:
