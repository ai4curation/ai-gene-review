      term:
        id: GO:0036001
        label: "'de novo' pyridoxal 5'-phosphate biosynthetic process"
      description: >-
        Six ordered reactions that produce PLP from erythrose 4-phosphate and
        the shared input DXP.
  parts:
    - order: 1
      role: erythrose 4-phosphate oxidation
      node:
        id: epd_step
        label: D-erythrose 4-phosphate to 4-phospho-D-erythronate
        module_type: REACTION
        annotons:
          - id: epd_activity
            label: Erythrose-4-phosphate dehydrogenase
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: erythrose-4-phosphate dehydrogenase activity
                term:
                  id: GO:0048001
                  label: erythrose-4-phosphate dehydrogenase activity
              family:
                preferred_term: bacterial Epd family
                term:
                  id: NCBIfam:TIGR01532
                  label: erythrose-4-phosphate dehydrogenase
                representative_members:
                  - preferred_term: PSEPK Epd
                    term:
                      id: UniProtKB:Q88D63
                      label: Erythrose-4-phosphate dehydrogenase
                    description: Pseudomonas putida KT2440 epd/PP_4964.
            function:
              preferred_term: erythrose-4-phosphate dehydrogenase activity
              term:
                id: GO:0048001
                label: erythrose-4-phosphate dehydrogenase activity
              substrates:
