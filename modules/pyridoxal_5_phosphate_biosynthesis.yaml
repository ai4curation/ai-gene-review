              the same enzyme also participates in vitamin-B6 salvage.
  connections:
    - source: epd_step
      target: pdxB_step
      connection_type: PRECEDES
    - source: pdxB_step
      target: serC_step
      connection_type: PRECEDES
    - source: serC_step
      target: pdxA_step
      connection_type: PRECEDES
    - source: pdxA_step
      target: pdxJ_step
      connection_type: PRECEDES
    - source: pdxJ_step
      target: pdxH_step
      connection_type: PRECEDES
  knowledge_gaps:
    - gap_statement: >-
        GO lacks a molecular-function term for the SerC/PdxF
        phosphohydroxythreonine aminotransferase reaction RHEA:16573.
      boundary: >-
        Keep the module reaction ungrounded at GO MF level and do not reuse
        GO:0004648, which defines the separate phosphoserine reaction.
      gap_kind:
        - CURATION
    - gap_statement: >-
        PSEPK ppu00750 also contains PP_0662, thrC, and pdxY, but these do not
        define additional reactions in the DXP-dependent de novo route.
      boundary: >-
        Treat PP_0662 and ThrC as threonine-synthase-family pathway-map
        spillover and PdxY as a vitamin-B6 salvage kinase. Curate salvage and
        PLP-dependent enzyme use separately from de novo PLP formation.
      gap_kind:
        - CURATION
  notes: >-
    The reusable module is defined by reaction chemistry rather than PSEPK gene
    names. All molecular functions are on leaf annotons, every leaf has a
    concrete PSEPK UniProt exemplar, and no redundant cytoplasm/cytosol context
    is asserted. Epd and SerC are shared-metabolism enzymes, PdxH also supports
    salvage, and DXP supply is an upstream input rather than an extra module
    part. Species-level isotope labeling in P. putida independently supports
    use of the glutamate-nitrogen DXP-dependent route, but it is not treated as
    a direct assay of the six KT2440 proteins.
