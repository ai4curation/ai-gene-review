        label: 4-phosphohydroxy-L-threonine to 3-amino-2-oxopropyl phosphate
        module_type: REACTION
        annotons:
          - id: pdxA_activity
            label: PdxA 4-hydroxythreonine-4-phosphate dehydrogenase
            participant:
