                    phosphohydroxythreonine aminotransferase reactions.
                - source_id: RHEA:16573
                  statement: phosphohydroxythreonine aminotransferase reaction
            role_description: >-
              Shared SerC chemistry supplies both serine biosynthesis and this
              PLP-biosynthesis branch; the enzyme is not PLP-pathway-specific.
