                - preferred_term: NADH
              evidence:
                - source_id: EC:1.2.1.72
                  statement: erythrose-4-phosphate dehydrogenase
                - source_id: NCBIfam:TIGR01532
                  statement: bacterial Epd family assignment
            role_description: >-
              Produces the four-carbon phosphoerythronate branch intermediate
              from pentose-phosphate-pathway-derived erythrose 4-phosphate.
    - order: 2
      role: phosphoerythronate oxidation
      node:
        id: pdxB_step
        label: 4-phospho-D-erythronate to 3-hydroxy-2-oxo-4-phosphooxybutanoate
        module_type: REACTION
        annotons:
          - id: pdxB_activity
            label: PdxB 4-phosphoerythronate dehydrogenase
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: 4-phosphoerythronate dehydrogenase activity
                term:
                  id: GO:0033711
                  label: 4-phosphoerythronate dehydrogenase activity
              family:
                preferred_term: PdxB erythronate-4-phosphate dehydrogenase family
                term:
                  id: InterPro:IPR020921
                  label: Erythronate-4-phosphate dehydrogenase PdxB
                representative_members:
                  - preferred_term: PSEPK PdxB
                    term:
                      id: UniProtKB:Q88L20
                      label: Erythronate-4-phosphate dehydrogenase
                    description: Pseudomonas putida KT2440 pdxB/PP_2117.
            function:
              preferred_term: 4-phosphoerythronate dehydrogenase activity
              term:
                id: GO:0033711
                label: 4-phosphoerythronate dehydrogenase activity
              substrates:
                - preferred_term: 4-phospho-D-erythronate
                - preferred_term: NAD+
              products:
