id: MODULE:gpi_anchor_transamidase
title: GPI anchor biosynthesis IV — transamidase complex (attachment to protein); PIGK/PIGS/PIGT/PIGU/GPAA1
description: >-
  The final step that commits a protein to a GPI anchor is transamidation: in the ER lumen the
  five-subunit GPI transamidase (GPI-T) complex recognises the C-terminal GPI-attachment signal
  peptide of a nascent protein, cleaves it, and forms an amide bond between the new C-terminus
  and the amino group of the bridging ethanolamine-phosphate on the third mannose of the
  completed GPI precursor. PIGK (GPI8) is the catalytic subunit, a cysteine-protease-like enzyme
  that forms the carbonyl(acyl-enzyme) intermediate; PIGT disulfide-links to and stabilises PIGK
  and holds the complex together; GPAA1 helps present the GPI substrate and stabilise the
  intermediate for amide-bond formation; PIGU assists GPI-substrate recognition; and PIGS is an
  indispensable but non-catalytic subunit. The product is a mature GPI-anchored protein that is
  then exported and remodelled. Defects across the complex cause GPI-deficiency disease with
  overlapping developmental/epileptic-encephalopathy, cerebellar-atrophy and hyperphosphatasia
  phenotypes: PIGK, PIGS, PIGT (MCAHS3 / a PNH-like phenotype), PIGU and GPAA1.
status: DRAFT
evidence:
  - source_id: GO:0016255
    title: attachment of GPI anchor to protein
    statement: >-
      The module is grounded in attachment of GPI anchor to protein (GO:0016255): the GPI-T
      complex transfers the completed GPI anchor onto the protein C-terminus.
  - source_id: GO:0006506
    title: GPI anchor biosynthetic process
    statement: The transamidation step is the terminal reaction of GPI anchor biosynthesis (GO:0006506).
  - source_id: Reactome:R-HSA-162791
    title: Attachment of GPI anchor to uPAR
    statement: >-
      The transamidation reaction follows the human Reactome "Attachment of GPI anchor to uPAR"
      reaction (a representative GPI-T substrate), part of "Synthesis of GPI" (R-HSA-162710).
  - source_id: file:human/PIGK/PIGK-ai-review.yaml
    title: PIGK gene review (human)
    statement: >-
      The catalytic transamidase subunit (UniProtKB:Q92643, GO:0003923) matches the completed
      human PIGK review.
  - source_id: file:human/PIGS/PIGS-ai-review.yaml
    title: PIGS gene review (human)
    statement: >-
      The indispensable non-catalytic subunit (UniProtKB:Q96S52, GPI-T complex GO:0042765) matches
      the completed human PIGS review.
  - source_id: file:human/PIGT/PIGT-ai-review.yaml
    title: PIGT gene review (human)
    statement: >-
      The PIGK-stabilising/GPI-anchor-binding subunit (UniProtKB:Q969N2, GO:0034235) matches the
      completed human PIGT review.
  - source_id: file:human/PIGU/PIGU-ai-review.yaml
    title: PIGU gene review (human)
    statement: >-
      The GPI-substrate-recognition subunit (UniProtKB:Q9H490, GO:0034235) matches the completed
      human PIGU review.
  - source_id: file:human/GPAA1/GPAA1-ai-review.yaml
    title: GPAA1 gene review (human)
    statement: >-
      The intermediate-stabilising/GPI-anchor-binding subunit (UniProtKB:O43292, GO:0034235) matches
      the completed human GPAA1 review.
