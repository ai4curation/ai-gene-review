  notes: >-
    GPI-transamidase (attachment-to-protein) segment, grounded to the human GPI-T complex
    (GO:0042765): catalytic PIGK (UniProtKB:Q92643, GO:0003923) plus PIGT (Q969N2), GPAA1 (O43292)
    and PIGU (Q9H490) — all carrying GPI anchor binding (GO:0034235) as their informative
    subunit-level MF — and the indispensable non-catalytic PIGS (Q96S52). GO
    molecular-function/BP/location terms were taken from the completed human gene reviews and
    verified against the local go.db; the reaction (R-HSA-162791) and parent pathway (R-HSA-162710)
    were verified against the local reactome cache. Modelled as a single PROTEIN_COMPLEX node:
    only PIGK carries a catalytic MF (GPI-anchor transamidase activity); PIGT/GPAA1/PIGU carry
    GPI-anchor-binding, and PIGS (no MF) is represented by its BP role. The complex cleaves the
    C-terminal GPI-attachment signal of nascent proteins and transfers the completed GPI precursor
    (from the mannosylation + EtNP modules) onto the new C-terminus. Downstream, the GPI-anchored
    protein is remodelled (PGAP1 inositol deacylation; PGAP2/PGAP3 fatty-acid remodelling — a
    separate module) and exported. Disorders across the complex: GPIBD/developmental-epileptic
    encephalopathy (PIGK, PIGS, PIGU), MCAHS3 / PNH-like (PIGT) and GPIBD with cerebellar atrophy
    (GPAA1).
