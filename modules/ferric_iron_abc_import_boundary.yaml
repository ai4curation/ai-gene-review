id: MODULE:ferric_iron_abc_import_boundary
title: Ferric/iron ABC import boundary
description: Boundary module for ferric/iron ABC import loci from the KEGG ppu02010 ABC-transporter
  umbrella map in Pseudomonas putida KT2440. It captures the complete PP_5135-PP_5137 FbpABC-like
  importer and two partial binding/permease candidate loci, PP_4881-PP_4882 and PP_5195-fbpA,
  whose ATPase partners remain unresolved.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes the PP_4881-PP_4882, PP_5135-PP_5137, and PP_5195-fbpA
    iron ABC transporter candidates. This is a substrate-specific partition of the broad ABC
    transporter map.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records C63, C67, and C71 as metal/cobalamin/siderophore
    or general ABC clusters with iron transporter product names.
- source_id: UniProtKB:Q88CP3
  title: fbpC ferric iron ABC transporter ATP-binding protein
  statement: UniProt names fbpC as a ferric iron ABC transporter ATP-binding protein and records
    ABC ATPase domains.
- source_id: UniProtKB:Q88CP5
  title: PP_5135 ferric-binding substrate-binding component
  statement: UniProt records a ferric-binding domain and iron keyword for the PP_5135 periplasmic
    binding component.
- source_id: UniProtKB:Q88DE5
  title: PP_4881 iron ABC periplasmic binding protein
  statement: UniProt names PP_4881 as an iron ABC transporter periplasmic iron-binding protein
    with a ferric-binding domain.
- source_id: UniProtKB:Q88CI5
  title: fbpA iron(III) ABC periplasmic binding protein
  statement: UniProt names fbpA as an iron(III) ABC transporter periplasmic iron-binding protein
    with a ferric-binding domain.
