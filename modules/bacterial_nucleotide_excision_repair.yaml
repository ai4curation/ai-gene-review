id: MODULE:bacterial_nucleotide_excision_repair
title: Bacterial nucleotide excision repair
description: >-
  Boundary module for KEGG ppu03420 nucleotide excision repair in Pseudomonas
  putida KT2440. The strict UvrABC core includes UvrA damage recognition, UvrB
  lesion verification/pre-incision complex formation, and UvrC dual incision.
  Mfd provides transcription-coupled repair input, while UvrD, PolA, and
  NAD-dependent ligases support post-incision oligonucleotide removal, repair
  synthesis, and nick sealing. PP_2839 and PP_3087 are retained as KEGG
  boundary members with conservative helicase/UvrA-family ATPase roles because
  their precise NER-specific physiological roles are not yet resolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03420
    title: Nucleotide excision repair - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03420 provides the organism-specific PSEPK curation batch with
      UvrA, UvrB, Mfd, PP_2839, PP_3087, UvrC, PolA, LigA, LigB, and UvrD.
  - source_id: PMID:33477956
    title: A Peek Inside the Machines of Bacterial Nucleotide Excision Repair
    statement: >-
      Bacterial NER is represented as damage detection and verification by
      UvrA/UvrB, dual incision by UvrC, and downstream removal, synthesis, and
      ligation steps.
  - source_id: PMID:36869664
    title: Structural and functional insights into the activation of the dual incision activity of UvrC, a key player in bacterial NER
    statement: >-
      UvrC provides the catalytic dual-incision activity of the bacterial
      UvrABC excinuclease.
  - source_id: file:projects/P_PUTIDA/batches/ppu03420_bacterial_nucleotide_excision_repair.tsv
    title: ppu03420 first-pass batch table
    statement: >-
      The batch table records 10 KEGG ppu03420 membership genes and their local
      first-pass review, curation, and Asta-retrieval status.
  - source_id: file:PSEPK/uvrA/uvrA-ai-review.yaml
    title: Curated uvrA review
    statement: >-
      The uvrA review accepts nucleotide-excision repair, excinuclease repair
      complex, excinuclease ABC activity, DNA binding, ATP binding, and ATP
      hydrolysis.
  - source_id: file:PSEPK/uvrB/uvrB-ai-review.yaml
    title: Curated uvrB review
    statement: >-
      The uvrB review accepts nucleotide-excision repair, excinuclease repair
      complex, excinuclease ABC activity, DNA binding, ATP binding, and ATP
      hydrolysis.
  - source_id: file:PSEPK/uvrC/uvrC-ai-review.yaml
    title: Curated uvrC review
    statement: >-
      The uvrC review accepts nucleotide-excision repair, excinuclease repair
      complex, and excinuclease ABC activity.
  - source_id: file:PSEPK/mfd/mfd-ai-review.yaml
    title: Curated mfd review
    statement: >-
      The mfd review accepts transcription-coupled nucleotide-excision repair,
      DNA repair, ATP binding, cytoplasm, and ATP hydrolysis.
  - source_id: file:PSEPK/polA/polA-ai-review.yaml
    title: Curated polA review
    statement: >-
      The polA review accepts DNA-directed DNA polymerase activity, DNA repair,
      DNA replication, 3'-5' exonuclease activity, and 5'-3' exonuclease
      activity.
  - source_id: file:PSEPK/uvrD/uvrD-ai-review.yaml
    title: Curated uvrD review
    statement: >-
      The uvrD review accepts 3'-5' DNA helicase activity, DNA helicase
      activity, ATP binding, and ATP hydrolysis.
  - source_id: file:PSEPK/ligA/ligA-ai-review.yaml
    title: Curated ligA review
    statement: >-
      The ligA review accepts NAD-dependent DNA ligase activity and DNA repair.
  - source_id: file:PSEPK/ligB/ligB-ai-review.yaml
    title: Curated ligB review
    statement: >-
      The ligB review accepts NAD-dependent DNA ligase activity and DNA repair.
module:
  id: bacterial_nucleotide_excision_repair
  label: Bacterial nucleotide excision repair
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: nucleotide-excision repair
      term:
        id: GO:0006289
        label: nucleotide-excision repair
      description: Repair of bulky or helix-distorting DNA lesions by excision of a damaged oligonucleotide.
    - preferred_term: transcription-coupled nucleotide-excision repair, DNA damage recognition
      term:
        id: GO:0000716
        label: transcription-coupled nucleotide-excision repair, DNA damage recognition
      description: Mfd-mediated recruitment of NER to stalled transcription complexes.
    - preferred_term: excinuclease repair complex
      term:
        id: GO:0009380
        label: excinuclease repair complex
      description: UvrABC repair complex that recognizes and incises damaged DNA.
    - preferred_term: excinuclease ABC activity
      term:
        id: GO:0009381
        label: excinuclease ABC activity
      description: UvrABC complex-level activity that performs dual incision in bacterial NER.
    - preferred_term: 3'-5' DNA helicase activity
      term:
        id: GO:0043138
        label: 3'-5' DNA helicase activity
      description: UvrD helicase activity used after incision to release lesion-containing oligonucleotide.
    - preferred_term: DNA-directed DNA polymerase activity
      term:
        id: GO:0003887
        label: DNA-directed DNA polymerase activity
      description: PolA gap-filling repair synthesis after damaged oligonucleotide removal.
    - preferred_term: 5'-3' exonuclease activity
      term:
        id: GO:0008409
        label: 5'-3' exonuclease activity
      description: PolA exonuclease activity used in nick translation and DNA end/flap processing.
    - preferred_term: DNA ligase (NAD+) activity
      term:
        id: GO:0003911
        label: DNA ligase (NAD+) activity
      description: NAD-dependent sealing of repair-associated DNA nicks by LigA and LigB.
    - preferred_term: DNA helicase activity
      term:
        id: GO:0003678
        label: DNA helicase activity
      description: PP_2839 predicted DinG/Rad3-like helicase side-node activity.
    - preferred_term: ATP hydrolysis activity
      term:
        id: GO:0016887
        label: ATP hydrolysis activity
      description: ATPase activity of UvrA/UvrB/Mfd and the PP_3087 UvrA-family ATPase-like boundary protein.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Bacterial NER factors act on chromosomal DNA in the cytoplasm/nucleoid region.
  parts:
    - order: 1
      role: Global-genome damage recognition and verification
      node:
        id: uvrab_damage_recognition
        label: UvrA/UvrB damage recognition and verification
        module_type: BIOLOGICAL_PROCESS
        description: >-
          UvrA and UvrB form the conserved bacterial damage-recognition and
          lesion-verification machinery that loads UvrB at damaged DNA before
          UvrC recruitment.
        annotons:
          - id: uvrA_damage_recognition_atpase
            label: "uvrA: damage-recognition ATPase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uvrA
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            processes:
              - preferred_term: nucleotide-excision repair
                term:
                  id: GO:0006289
                  label: nucleotide-excision repair
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Primary UvrA-family DNA-damage recognition ATPase in the UvrABC system.
          - id: uvrB_lesion_verification
            label: "uvrB: lesion-verification factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uvrB
            function:
              preferred_term: excinuclease ABC activity
              term:
                id: GO:0009381
                label: excinuclease ABC activity
            processes:
              - preferred_term: nucleotide-excision repair
                term:
                  id: GO:0006289
                  label: nucleotide-excision repair
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: UvrB verifies lesions and forms the pre-incision complex that recruits UvrC.
          - id: pp3087_uvra_like_boundary_atpase
            label: "PP_3087: UvrA-like ATPase boundary member"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3087
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: KEGG NER boundary member with UvrA-family ATPase signatures but unresolved NER-specific step.
    - order: 2
      role: Transcription-coupled repair input
      node:
        id: mfd_transcription_coupling
        label: Mfd transcription-repair coupling
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Mfd couples stalled transcription complexes to nucleotide-excision
          repair by ATP-dependent remodeling and UvrA recruitment.
        annotons:
          - id: mfd_trcf
            label: "mfd: transcription-repair coupling factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mfd
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            processes:
              - preferred_term: transcription-coupled nucleotide-excision repair, DNA damage recognition
                term:
                  id: GO:0000716
                  label: transcription-coupled nucleotide-excision repair, DNA damage recognition
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Transcription-repair coupling ATPase that directs UvrABC repair to stalled RNA polymerase complexes.
    - order: 3
      role: Dual incision
      node:
        id: uvrc_dual_incision
        label: UvrC dual incision
        module_type: REACTION
        description: >-
          UvrC is recruited to the UvrB-DNA pre-incision complex and provides
          the catalytic dual-incision activity that brackets the lesion.
        annotons:
          - id: uvrC_excinuclease
            label: "uvrC: dual-incision excinuclease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uvrC
            function:
              preferred_term: excinuclease ABC activity
              term:
                id: GO:0009381
                label: excinuclease ABC activity
              substrates:
                - preferred_term: damaged DNA strand
              products:
                - preferred_term: incised DNA repair intermediate
            processes:
              - preferred_term: nucleotide-excision repair
                term:
                  id: GO:0006289
                  label: nucleotide-excision repair
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Catalytic UvrABC endonuclease subunit for 3' and 5' incision around bulky DNA lesions.
    - order: 4
      role: Post-incision removal, repair synthesis, and ligation
      node:
        id: post_incision_repair_synthesis
        label: UvrD/PolA/ligase post-incision repair
        module_type: BIOLOGICAL_PROCESS
        description: >-
          After dual incision, UvrD removes the lesion-containing oligonucleotide,
          PolA fills the resulting gap, and NAD-dependent ligases seal the nick.
        annotons:
          - id: uvrD_post_incision_helicase
            label: "uvrD: post-incision helicase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uvrD
            function:
              preferred_term: 3'-5' DNA helicase activity
              term:
                id: GO:0043138
                label: 3'-5' DNA helicase activity
            processes:
              - preferred_term: nucleotide-excision repair
                term:
                  id: GO:0006289
                  label: nucleotide-excision repair
            role_description: UvrD-family helicase shared with NER, mismatch repair, and recombination-associated contexts.
          - id: polA_repair_synthesis
            label: "polA: repair DNA synthesis"
            participant:
              selector_type: GENE
              gene:
                preferred_term: polA
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
              substrates:
                - preferred_term: DNA template-primer
                - preferred_term: deoxyribonucleoside triphosphates
              products:
                - preferred_term: repaired DNA strand
                - preferred_term: diphosphate
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: DNA polymerase I gap-filling synthesis after damaged oligonucleotide removal.
          - id: polA_five_prime_exonuclease
            label: "polA: 5'-3' exonuclease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: polA
            function:
              preferred_term: 5'-3' exonuclease activity
              term:
                id: GO:0008409
                label: 5'-3' exonuclease activity
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: Exonuclease/nick-translation activity associated with PolA repair and Okazaki-fragment processing.
          - id: ligA_nad_dependent_nick_sealing
            label: "ligA: NAD-dependent nick sealing"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ligA
            function:
              preferred_term: DNA ligase (NAD+) activity
              term:
                id: GO:0003911
                label: DNA ligase (NAD+) activity
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: Essential bacterial NAD-dependent DNA ligase that seals repair-associated DNA nicks.
          - id: ligB_repair_ligase
            label: "ligB: NAD-dependent repair ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ligB
            function:
              preferred_term: DNA ligase (NAD+) activity
              term:
                id: GO:0003911
                label: DNA ligase (NAD+) activity
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: Repair-associated NAD-dependent DNA ligase paralog included in KEGG ppu03420.
    - order: 5
      role: Helicase boundary member
      node:
        id: pp2839_ding_rad3_like_helicase
        label: PP_2839 DinG/Rad3-like helicase boundary member
        module_type: MOLECULAR_FUNCTION
        description: >-
          PP_2839 is retained in the module as a predicted DNA helicase because
          KEGG places it in ppu03420, but its exact NER-specific substrate and
          position relative to canonical UvrABC steps remain unresolved.
        annotons:
          - id: pp2839_predicted_dna_helicase
            label: "PP_2839: predicted DNA helicase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2839
            function:
              preferred_term: DNA helicase activity
              term:
                id: GO:0003678
                label: DNA helicase activity
            role_description: Predicted DinG/Rad3-like helicase and conservative NER-boundary side node.
  connections:
    - source: uvrab_damage_recognition
      target: uvrc_dual_incision
      connection_type: PRECEDES
      description: UvrA/UvrB damage recognition and UvrB pre-incision complex formation precede UvrC dual incision.
      chaining_status: VERIFIED
      chaining_note: >-
        Conserved bacterial NER logic places UvrC recruitment after UvrA/UvrB
        lesion recognition and UvrB loading.
    - source: mfd_transcription_coupling
      target: uvrab_damage_recognition
      connection_type: PROVIDES_INPUT_FOR
      description: Mfd routes stalled transcription complexes into UvrABC nucleotide-excision repair.
      chaining_status: VERIFIED
      chaining_note: >-
        Mfd is a transcription-repair coupling factor and is represented as an
        input branch into the same UvrABC incision machinery.
    - source: uvrc_dual_incision
      target: post_incision_repair_synthesis
      connection_type: PRECEDES
      description: Dual incision creates the post-incision repair intermediate processed by UvrD, PolA, and ligases.
      chaining_status: VERIFIED
      chaining_note: >-
        Removal of the incised lesion-containing oligonucleotide, repair
        synthesis, and ligation logically follow UvrC-mediated incision.
    - source: pp2839_ding_rad3_like_helicase
      target: post_incision_repair_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: PP_2839 is retained as a KEGG ppu03420 helicase side node, not as an ordered canonical UvrABC step.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        The local review supports DNA helicase activity, but the exact
        physiological NER step remains unresolved in this first-pass curation.
  notes: >-
    This module should not be read as a claim that every ppu03420 member is a
    strict UvrABC core subunit. PolA, LigA, LigB, UvrD, PP_2839, and PP_3087
    are useful pathway-satisfiability boundary nodes, but the core recognition
    and incision machinery remains UvrA/UvrB/UvrC with Mfd as the
    transcription-coupled entry point.
