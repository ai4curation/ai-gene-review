id: MODULE:alkaloid_biosynthesis_boundary
title: Alkaloid biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00996 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only PP_3358, a hydroxycinnamoyl-CoA
  hydratase-lyase reviewed as feruloyl-CoA hydratase/lyase in
  hydroxycinnamate/vanillin side metabolism. This does not support a complete
  alkaloid biosynthesis pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00996
    title: Biosynthesis of various alkaloids - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00996 provides the PSEPK curation batch. Its mapped membership is
      limited to PP_3358, a hydroxycinnamoyl-CoA hydratase-lyase side-node
      enzyme.
  - source_id: file:projects/P_PUTIDA/batches/ppu00996_alkaloid_biosynthesis_boundary.tsv
    title: PSEPK ppu00996 alkaloid-biosynthesis batch
    statement: >-
      The batch records one PSEPK member and shows that the review file, Asta
      report, and curated GOA decisions are present.
  - source_id: file:PSEPK/PP_3358/PP_3358-ai-review.yaml
    title: PSEPK PP_3358 gene review
    statement: >-
      PP_3358 is reviewed as feruloyl-CoA hydratase/lyase activity in a
      hydroxycinnamate/vanillin side funnel, with the isoprenoid catabolic
      process annotation removed as unsupported.
module:
  id: alkaloid_biosynthesis_boundary
  label: Alkaloid biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: feruloyl-CoA hydratase/lyase activity
      term:
        id: GO:0050547
        label: feruloyl-CoA hydratase/lyase activity
      description: Specific reviewed molecular function for PP_3358.
    - preferred_term: lyase activity
      term:
        id: GO:0016829
        label: lyase activity
      description: Broad UniProt keyword-derived activity for PP_3358.
  parts:
    - order: 1
      role: Alkaloid-route absence
      node:
        id: alkaloid_route_absence
        label: Alkaloid-route absence
        module_type: METABOLIC_PATHWAY
        description: >-
          The PSEPK ppu00996 membership lacks a set of alkaloid precursor,
          tailoring, ring-forming, or transport enzymes. The single mapped
          enzyme is therefore treated as a pathway-boundary draw-in rather than
          evidence for a satisfiable alkaloid biosynthesis route.
        annotons: []
    - order: 2
      role: Hydroxycinnamate/vanillin side-node enzyme
      node:
        id: hydroxycinnamate_vanillin_side_node
        label: Hydroxycinnamate/vanillin side-node enzyme
        module_type: REACTION
        description: >-
          PP_3358/Ech-like activity converts feruloyl-CoA through
          hydratase/lyase chemistry toward vanillin in hydroxycinnamate
          catabolism. This is aromatic side-funnel chemistry also tracked in the
          aminobenzoate-degradation boundary batch.
        annotons:
          - id: PP_3358_feruloyl_coa_hydratase_lyase
            label: "PP_3358: feruloyl-CoA hydratase/lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3358
            function:
              preferred_term: feruloyl-CoA hydratase/lyase activity
              term:
                id: GO:0050547
                label: feruloyl-CoA hydratase/lyase activity
            role_description: Hydroxycinnamoyl-CoA hydratase-lyase side-node enzyme, not an alkaloid biosynthesis route satisfier.
  notes: >-
    This module records that ppu00996 is currently a one-gene KEGG boundary
    assignment in KT2440. The appropriate first-pass interpretation is
    hydroxycinnamate/ferulate-to-vanillin side metabolism; no alkaloid
    biosynthesis process annotation should be inferred from this bucket alone.
