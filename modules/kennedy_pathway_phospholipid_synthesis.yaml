id: MODULE:kennedy_pathway_phospholipid_synthesis
title: Kennedy pathway (CDP-choline / CDP-ethanolamine synthesis of PC and PE)
description: >-
  The Kennedy pathway is the principal de-novo route to the two most abundant membrane
  glycerophospholipids, phosphatidylcholine (PC) and phosphatidylethanolamine (PE). It runs as two
  parallel three-step branches that converge on a common diacylglycerol (DAG) acceptor. In the
  CDP-choline branch, choline kinase (CHKA/CHKB) phosphorylates choline to phosphocholine; the
  rate-limiting, membrane-regulated CTP:phosphocholine cytidylyltransferase (PCYT1A/PCYT1B) converts
  phosphocholine + CTP to CDP-choline; and a CDP-alcohol phosphotransferase (CHPT1, or the
  dual-specificity CEPT1) transfers phosphocholine from CDP-choline onto DAG to make PC + CMP. In the
  parallel CDP-ethanolamine branch, ethanolamine kinase (ETNK1/ETNK2) makes phosphoethanolamine, the
  rate-controlling CTP:phosphoethanolamine cytidylyltransferase (PCYT2) makes CDP-ethanolamine, and the
  ethanolaminephosphotransferases (the selenoprotein SELENOI/EPT1, or CEPT1) transfer phosphoethanolamine
  onto DAG to make PE + CMP. The two branches are linked by phosphatidylethanolamine N-methyltransferase
  (PEMT), an ER enzyme (liver-enriched) that performs three sequential SAM-dependent methylations of PE
  to PC — the only way to make PC without preformed choline, and a major consumer of methyl groups. The
  amphitropic cytidylyltransferase PCYT1A senses membrane PC content, making it the key regulatory node.
  Inherited defects span a striking phenotypic range: PCYT1A congenital lipodystrophy / spondylometaphyseal
  dysplasia with cone-rod dystrophy, CHKB megaconial congenital muscular dystrophy, and PCYT2 and SELENOI
  hereditary spastic paraplegia.
status: DRAFT
evidence:
  - source_id: GO:0006656
    title: phosphatidylcholine biosynthetic process
    statement: CHKA/CHKB, PCYT1A/PCYT1B, CHPT1/CEPT1 (and PEMT) carry out PC biosynthesis (GO:0006656).
  - source_id: GO:0006646
    title: phosphatidylethanolamine biosynthetic process
    statement: ETNK1/ETNK2, PCYT2, SELENOI/CEPT1 carry out PE biosynthesis (GO:0006646).
  - source_id: file:human/CHKA/CHKA-ai-review.yaml
    title: CHKA gene review (human)
    statement: The choline->phosphocholine step (UniProtKB:P35790, GO:0004103) matches the completed human CHKA review.
  - source_id: file:human/CHKB/CHKB-ai-review.yaml
    title: CHKB gene review (human)
    statement: The choline->phosphocholine step (UniProtKB:Q9Y259, GO:0004103) matches the completed human CHKB review.
  - source_id: file:human/PCYT1A/PCYT1A-ai-review.yaml
    title: PCYT1A gene review (human)
    statement: The rate-limiting phosphocholine->CDP-choline step (UniProtKB:P49585, GO:0004105) matches the completed human PCYT1A review.
  - source_id: file:human/PCYT1B/PCYT1B-ai-review.yaml
    title: PCYT1B gene review (human)
    statement: The phosphocholine->CDP-choline step (UniProtKB:Q9Y5K3, GO:0004105) matches the completed human PCYT1B review.
  - source_id: file:human/CHPT1/CHPT1-ai-review.yaml
    title: CHPT1 gene review (human)
    statement: The CDP-choline + DAG -> PC step (UniProtKB:Q8WUD6, GO:0004142) matches the completed human CHPT1 review.
  - source_id: file:human/CEPT1/CEPT1-ai-review.yaml
    title: CEPT1 gene review (human)
    statement: The dual CDP-choline/CDP-ethanolamine + DAG -> PC/PE step (UniProtKB:Q9Y6K0, GO:0004142/GO:0004307) matches the completed human CEPT1 review.
  - source_id: file:human/ETNK1/ETNK1-ai-review.yaml
    title: ETNK1 gene review (human)
    statement: The ethanolamine->phosphoethanolamine step (UniProtKB:Q9HBU6, GO:0004305) matches the completed human ETNK1 review.
  - source_id: file:human/ETNK2/ETNK2-ai-review.yaml
    title: ETNK2 gene review (human)
    statement: The ethanolamine->phosphoethanolamine step (UniProtKB:Q9NVF9, GO:0004305) matches the completed human ETNK2 review.
  - source_id: file:human/PCYT2/PCYT2-ai-review.yaml
    title: PCYT2 gene review (human)
    statement: The rate-controlling phosphoethanolamine->CDP-ethanolamine step (UniProtKB:Q99447, GO:0004306) matches the completed human PCYT2 review.
  - source_id: file:human/SELENOI/SELENOI-ai-review.yaml
    title: SELENOI gene review (human)
    statement: The CDP-ethanolamine + DAG -> PE step (UniProtKB:Q9C0D9, GO:0004307) matches the completed human SELENOI review.
  - source_id: file:human/PEMT/PEMT-ai-review.yaml
    title: PEMT gene review (human)
    statement: The PE -> PC methylation crosslink (UniProtKB:Q9UBM1, GO:0004608) matches the completed human PEMT review.
module:
  id: kennedy_pathway_phospholipid_synthesis
  label: Kennedy pathway (PC / PE synthesis)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: phosphatidylcholine biosynthetic process
      term:
        id: GO:0006656
        label: phosphatidylcholine biosynthetic process
      description: CDP-choline branch (choline -> phosphocholine -> CDP-choline -> PC), plus PEMT.
    - preferred_term: phosphatidylethanolamine biosynthetic process
      term:
        id: GO:0006646
        label: phosphatidylethanolamine biosynthetic process
      description: CDP-ethanolamine branch (ethanolamine -> phosphoethanolamine -> CDP-ethanolamine -> PE).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The kinases (CHKA/B, ETNK1/2) and PCYT2 are cytosolic.
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: The phosphotransferases (CHPT1/CEPT1/SELENOI) and PEMT are ER-membrane enzymes.
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
        description: PCYT1A shuttles to the nucleus / nuclear envelope (membrane-sensing regulation).
  parts:
    - order: 1
      role: choline phosphorylation
      node:
        id: choline_phosphorylation
        label: Choline kinase (CHKA/CHKB)
        module_type: REACTION
        annotons:
          - id: chk_activity
            label: "CHKA/CHKB: choline kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: choline/ethanolamine kinase family
                term:
                  id: PANTHER:PTHR22603
                  label: CHOLINE/ETHANOLAMINE KINASE
                representative_members:
                  - preferred_term: CHKA (human)
                    term:
                      id: UniProtKB:P35790
                      label: Choline kinase alpha
                  - preferred_term: CHKB (human)
                    term:
                      id: UniProtKB:Q9Y259
                      label: Choline kinase beta
            function:
              preferred_term: choline kinase activity
              term:
                id: GO:0004103
                label: choline kinase activity
              substrates:
                - preferred_term: choline
                - preferred_term: ATP (Mg2+)
              products:
                - preferred_term: phosphocholine
                - preferred_term: ADP
              evidence:
                - source_id: file:human/CHKA/CHKA-ai-review.yaml
                  statement: CHKA/CHKB phosphorylate choline (also ethanolamine, GO:0004305) to phosphocholine, first committed step of CDP-choline PC synthesis; CHKB loss = megaconial muscular dystrophy
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Phosphorylate choline to phosphocholine (also ethanolamine kinase activity).
    - order: 2
      role: CDP-choline formation (rate-limiting)
      node:
        id: phosphocholine_cytidylylation
        label: CTP:phosphocholine cytidylyltransferase (PCYT1A/PCYT1B)
        module_type: REACTION
        annotons:
          - id: pcyt1_activity
            label: "PCYT1A/PCYT1B: choline-phosphate cytidylyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PCYT1 / choline-phosphate cytidylyltransferase family
                term:
                  id: PANTHER:PTHR10739
                  label: CHOLINE-PHOSPHATE CYTIDYLYLTRANSFERASE
                representative_members:
                  - preferred_term: PCYT1A (human)
                    term:
                      id: UniProtKB:P49585
                      label: Choline-phosphate cytidylyltransferase A
                  - preferred_term: PCYT1B (human)
                    term:
                      id: UniProtKB:Q9Y5K3
                      label: Choline-phosphate cytidylyltransferase B
            function:
              preferred_term: choline-phosphate cytidylyltransferase activity
              term:
                id: GO:0004105
                label: choline-phosphate cytidylyltransferase activity
              substrates:
                - preferred_term: phosphocholine
                - preferred_term: CTP
              products:
                - preferred_term: CDP-choline
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/PCYT1A/PCYT1A-ai-review.yaml
                  statement: Rate-limiting, amphitropic (membrane-PC-sensing) step; PCYT1A shuttles nucleus<->ER; PCYT1A deficiency = lipodystrophy / spondylometaphyseal dysplasia with cone-rod dystrophy
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Convert phosphocholine + CTP to CDP-choline (rate-limiting, membrane-regulated).
    - order: 3
      role: phosphatidylcholine synthesis (DAG acceptor)
      node:
        id: pc_synthesis
        label: Cholinephosphotransferase (CHPT1/CEPT1)
        module_type: REACTION
        annotons:
          - id: chpt_activity
            label: "CHPT1/CEPT1: diacylglycerol cholinephosphotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CDP-alcohol phosphotransferase (CHPT1/CEPT1) family
                term:
                  id: PANTHER:PTHR10414
                  label: CHOLINE/ETHANOLAMINEPHOSPHOTRANSFERASE
                representative_members:
                  - preferred_term: CHPT1 (human)
                    term:
                      id: UniProtKB:Q8WUD6
                      label: Cholinephosphotransferase 1
                  - preferred_term: CEPT1 (human, dual)
                    term:
                      id: UniProtKB:Q9Y6K0
                      label: Choline/ethanolaminephosphotransferase 1
            function:
              preferred_term: diacylglycerol cholinephosphotransferase activity
              term:
                id: GO:0004142
                label: diacylglycerol cholinephosphotransferase activity
              substrates:
                - preferred_term: CDP-choline
                - preferred_term: 1,2-diacylglycerol (Mg2+/Mn2+)
              products:
                - preferred_term: phosphatidylcholine (PC)
                - preferred_term: CMP
              evidence:
                - source_id: file:human/CHPT1/CHPT1-ai-review.yaml
                  statement: CHPT1 (choline-specific, Golgi) and the dual-specificity CEPT1 (ER/nuclear envelope) transfer phosphocholine from CDP-choline onto DAG, making PC (final CDP-choline step)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Transfer phosphocholine from CDP-choline to DAG, forming PC.
    - order: 4
      role: ethanolamine phosphorylation
      node:
        id: ethanolamine_phosphorylation
        label: Ethanolamine kinase (ETNK1/ETNK2)
        module_type: REACTION
        annotons:
          - id: etnk_activity
            label: "ETNK1/ETNK2: ethanolamine kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: choline/ethanolamine kinase family (ETNK)
                term:
                  id: PANTHER:PTHR22603
                  label: CHOLINE/ETHANOLAMINE KINASE
                representative_members:
                  - preferred_term: ETNK1 (human)
                    term:
                      id: UniProtKB:Q9HBU6
                      label: Ethanolamine kinase 1
                  - preferred_term: ETNK2 (human)
                    term:
                      id: UniProtKB:Q9NVF9
                      label: Ethanolamine kinase 2
            function:
              preferred_term: ethanolamine kinase activity
              term:
                id: GO:0004305
                label: ethanolamine kinase activity
              substrates:
                - preferred_term: ethanolamine
                - preferred_term: ATP (Mg2+)
              products:
                - preferred_term: phosphoethanolamine
                - preferred_term: ADP
              evidence:
                - source_id: file:human/ETNK1/ETNK1-ai-review.yaml
                  statement: ETNK1/ETNK2 phosphorylate ethanolamine to phosphoethanolamine, first committed step of CDP-ethanolamine PE synthesis; ETNK1 somatic mutations in atypical CML
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Phosphorylate ethanolamine to phosphoethanolamine.
    - order: 5
      role: CDP-ethanolamine formation (rate-controlling)
      node:
        id: phosphoethanolamine_cytidylylation
        label: CTP:phosphoethanolamine cytidylyltransferase (PCYT2)
        module_type: REACTION
        annotons:
          - id: pcyt2_activity
            label: "PCYT2: ethanolamine-phosphate cytidylyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PCYT2 / ethanolamine-phosphate cytidylyltransferase family
                term:
                  id: PANTHER:PTHR45780
                  label: ETHANOLAMINE-PHOSPHATE CYTIDYLYLTRANSFERASE
                representative_members:
                  - preferred_term: PCYT2 (human)
                    term:
                      id: UniProtKB:Q99447
                      label: Ethanolamine-phosphate cytidylyltransferase
            function:
              preferred_term: ethanolamine-phosphate cytidylyltransferase activity
              term:
                id: GO:0004306
                label: ethanolamine-phosphate cytidylyltransferase activity
              substrates:
                - preferred_term: phosphoethanolamine
                - preferred_term: CTP
              products:
                - preferred_term: CDP-ethanolamine
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/PCYT2/PCYT2-ai-review.yaml
                  statement: Soluble cytosolic (two tandem cytidylyltransferase domains) rate-controlling step of CDP-ethanolamine PE synthesis; PCYT2 deficiency = hereditary spastic paraplegia
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Convert phosphoethanolamine + CTP to CDP-ethanolamine (rate-controlling).
    - order: 6
      role: phosphatidylethanolamine synthesis (DAG acceptor)
      node:
        id: pe_synthesis
        label: Ethanolaminephosphotransferase (SELENOI/CEPT1)
        module_type: REACTION
        annotons:
          - id: ept_activity
            label: "SELENOI/CEPT1: ethanolaminephosphotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CDP-alcohol phosphotransferase (SELENOI/CEPT1) family
                term:
                  id: PANTHER:PTHR10414
                  label: CHOLINE/ETHANOLAMINEPHOSPHOTRANSFERASE
                representative_members:
                  - preferred_term: SELENOI / EPT1 (human)
                    term:
                      id: UniProtKB:Q9C0D9
                      label: Ethanolaminephosphotransferase 1
                  - preferred_term: CEPT1 (human, dual)
                    term:
                      id: UniProtKB:Q9Y6K0
                      label: Choline/ethanolaminephosphotransferase 1
            function:
              preferred_term: ethanolaminephosphotransferase activity
              term:
                id: GO:0004307
                label: ethanolaminephosphotransferase activity
              substrates:
                - preferred_term: CDP-ethanolamine
                - preferred_term: 1,2-diacylglycerol (Mg2+/Mn2+)
              products:
                - preferred_term: phosphatidylethanolamine (PE)
                - preferred_term: CMP
              evidence:
                - source_id: file:human/SELENOI/SELENOI-ai-review.yaml
                  statement: SELENOI/EPT1 (a selenoprotein; also makes ether-PE) and dual-specificity CEPT1 transfer phosphoethanolamine from CDP-ethanolamine onto DAG, making PE (final CDP-ethanolamine step); SELENOI loss = spastic paraplegia SPG81
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Transfer phosphoethanolamine from CDP-ethanolamine to DAG, forming PE.
    - order: 7
