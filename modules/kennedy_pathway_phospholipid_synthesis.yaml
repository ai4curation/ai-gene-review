      node:
        id: pe_to_pc_methylation
        label: Phosphatidylethanolamine N-methyltransferase (PEMT)
        module_type: REACTION
        annotons:
          - id: pemt_activity
            label: "PEMT: phosphatidylethanolamine N-methyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PEMT / phospholipid N-methyltransferase family
                term:
                  id: PANTHER:PTHR15458
                  label: PHOSPHATIDYLETHANOLAMINE N-METHYLTRANSFERASE
                representative_members:
                  - preferred_term: PEMT (human)
                    term:
                      id: UniProtKB:Q9UBM1
                      label: Phosphatidylethanolamine N-methyltransferase
            function:
              preferred_term: phosphatidylethanolamine N-methyltransferase activity
              term:
                id: GO:0004608
                label: phosphatidylethanolamine N-methyltransferase activity
              substrates:
                - preferred_term: phosphatidylethanolamine (PE)
                - preferred_term: S-adenosyl-L-methionine (3x)
              products:
                - preferred_term: phosphatidylcholine (PC)
                - preferred_term: S-adenosyl-L-homocysteine (3x)
              evidence:
                - source_id: file:human/PEMT/PEMT-ai-review.yaml
                  statement: ER (liver-enriched) enzyme performing 3 sequential SAM-dependent methylations of PE to PC — the only choline-independent PC synthesis route; PEMT variants associate with NAFLD/choline deficiency
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Methylate PE (3x SAM) to PC (choline-independent route).
  connections:
    - source: choline_phosphorylation
      target: phosphocholine_cytidylylation
      connection_type: PROVIDES_INPUT_FOR
      description: The phosphocholine made by CHKA/CHKB is the substrate for PCYT1A/PCYT1B.
    - source: phosphocholine_cytidylylation
      target: pc_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The CDP-choline made by PCYT1 is the phosphocholine donor for CHPT1/CEPT1.
    - source: ethanolamine_phosphorylation
      target: phosphoethanolamine_cytidylylation
      connection_type: PROVIDES_INPUT_FOR
      description: The phosphoethanolamine made by ETNK1/ETNK2 is the substrate for PCYT2.
    - source: phosphoethanolamine_cytidylylation
      target: pe_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The CDP-ethanolamine made by PCYT2 is the phosphoethanolamine donor for SELENOI/CEPT1.
    - source: pe_synthesis
      target: pe_to_pc_methylation
      connection_type: PROVIDES_INPUT_FOR
      description: The PE made by the CDP-ethanolamine branch is the substrate PEMT methylates to PC.
  notes: >-
    Kennedy pathway de-novo glycerophospholipid synthesis (GO:0006656 PC + GO:0006646 PE), grounded to
    eleven completed human gene reviews. CDP-CHOLINE branch -> PC: CHKA (P35790) + CHKB (Q9Y259) share
    PTHR22603, GO:0004103 (also ethanolamine kinase GO:0004305) -> PCYT1A (P49585) + PCYT1B (Q9Y5K3) share
    PTHR10739, GO:0004105 (rate-limiting, amphitropic; PCYT1A membrane-PC-sensing, shuttles nucleus<->ER) ->
    CHPT1 (Q8WUD6) + CEPT1 (Q9Y6K0) share PTHR10414, GO:0004142. CDP-ETHANOLAMINE branch -> PE: ETNK1 (Q9HBU6)
    + ETNK2 (Q9NVF9) share PTHR22603, GO:0004305 -> PCYT2 (Q99447 PTHR45780, GO:0004306, rate-controlling) ->
    SELENOI/EPT1 (Q9C0D9, a selenoprotein, + ether-PE) + CEPT1 share PTHR10414, GO:0004307. CROSSLINK: PEMT
    (Q9UBM1 PTHR15458, GO:0004608) methylates PE->PC 3x with SAM (only choline-independent PC route; NAFLD).
    CEPT1 is dual-specificity (appears in both phosphotransferase nodes). All 11 kinases/transferases require
    Mg2+/Mn2+; the DAG acceptor and CMP byproduct link to glycerolipid metabolism. GO term ids/labels verified
    against the local go.db. Disorders: PCYT1A lipodystrophy / SMD-CRD; CHKB megaconial muscular dystrophy;
    PCYT2 and SELENOI hereditary spastic paraplegia.
