id: MODULE:sugar_glycerol_phosphate_import_boundary
title: Sugar/glycerol-phosphate import boundary
description: >-
  Boundary module for the PP_2260-PP_2264 unresolved sugar/glycerol-phosphate-like
  ABC importer locus in Pseudomonas putida KT2440. PP_2260 and PP_2261 are
  ATP-binding components, PP_2262 and PP_2263 are membrane permeases, and
  PP_2264 is a predicted periplasmic sugar-binding component. The first-pass
  evidence supports an ABC importer but does not resolve whether the transported
  ligand is glycerol-3-phosphate, a sugar, a sugar alcohol, or another related
  substrate.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_2260-PP_2264 sugar/polyol
      ABC-transporter sub-batch. This is a coherent locus partition of the
      broad ABC transporter map, not evidence that ppu02010 is one satisfiable
      pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records C32 as the PP_2260-PP_2264
      sugar/polyol block with glycerol-phosphate/sugar ATPase, permease, and
      periplasmic binding-protein products.
  - source_id: UniProtKB:Q88KN0
    title: PP_2260 glycerol-phosphate ABC transporter ATP-binding protein
    statement: >-
      UniProt names PP_2260 as a glycerol-phosphate ABC transporter
      ATP-binding protein and assigns MalK/UgpC-like ABC transporter ATPase
      domains.
  - source_id: UniProtKB:Q88KM9
    title: PP_2261 sugar ABC transporter ATP-binding protein
    statement: >-
      UniProt names PP_2261 as a sugar ABC transporter ATP-binding protein and
      assigns MalK/UgpC-like ABC transporter ATPase domains.
  - source_id: UniProtKB:Q88KM8
    title: PP_2262 sugar ABC transporter permease protein
    statement: >-
      UniProt names PP_2262 as a sugar ABC transporter permease protein, places
      it at the cell membrane, and assigns sugar/binding-protein-dependent ABC
      transporter permease domains.
  - source_id: UniProtKB:Q88KM7
    title: PP_2263 sugar ABC transporter permease protein
    statement: >-
      UniProt names PP_2263 as a sugar ABC transporter permease protein, places
      it at the cell membrane, and assigns binding-protein-dependent ABC
      transporter permease domains.
  - source_id: UniProtKB:Q88KM6
    title: PP_2264 periplasmic sugar-binding protein
    statement: >-
      UniProt names PP_2264 as a periplasmic sugar-binding protein and predicts
      an N-terminal signal peptide.
