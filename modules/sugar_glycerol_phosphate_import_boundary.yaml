notes: >-
  This boundary module was seeded from C32 of the ppu02010 partition. It should
  remain separate from glucose_import_boundary and ribose_import_boundary because
  no P. putida-specific evidence currently resolves the imported ligand. The
  strongest first-pass conclusion is negative curation: ferric-iron,
  iron-transmembrane, and monoatomic-cation transport terms on PP_2260 and
  PP_2261 are inconsistent with the local sugar/glycerol-phosphate-like ABC
  importer context and should not drive module assignment.
