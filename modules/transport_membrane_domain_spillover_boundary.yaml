id: MODULE:transport_membrane_domain_spillover_boundary
title: Transport-bucket domain-resolved membrane protein boundary
description: Boundary module for PSEPK domain-resolved membrane proteins and spillovers pulled into transport buckets by membrane,
  transport, or weak family/domain signal. It separates broad transporter-family candidates, isolated ABC/permease pieces,
  metal/TerC/GDT1/MgtC homeostasis proteins, envelope and curli/cell-shape side nodes, cytosolic nucleic-acid/tRNA/transcription
  spillovers, NRPS/RHS/toxin side nodes, and low-information DoxX/SURF1/DedA/PAP2/MAPEG membrane proteins.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_other_domain_resolved_membrane_proteins.tsv
  title: PSEPK transport-bucket other domain-resolved membrane protein batch
  statement: The batch table records 83 PSEPK transport/membrane/efflux-bucket genes with domain or family signal but no compact
    transport, secretion, redox, envelope, stress, or enzyme bucket.
notes: 'First-pass interpretation: keep this as a boundary/spillover module rather than a satisfiable transport pathway. Broad
  transporter activity is retained only where product/domain evidence supports a transporter-family call. Isolated ABC permeases
  and binding proteins are treated as component-level context with unresolved partners/substrates. Cytosolic tRNA, sigma-factor,
  cold-shock, NRPS, and recombination proteins are retained as spillovers, and low-information membrane-domain proteins are
  not promoted to unsupported pathway or substrate-specific functions.'
