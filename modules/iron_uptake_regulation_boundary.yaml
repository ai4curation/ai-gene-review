id: MODULE:iron_uptake_regulation_boundary
title: Iron uptake regulation boundary
description: Boundary module for the ppu02020 iron-uptake regulation partition in Pseudomonas putida KT2440.
  It captures PfeS/PfeR-like two-component regulators, TonB-dependent ferric siderophore receptor activity,
  and FecI/FecR-like ECF sigma/anti-sigma signaling. This is a partition of the broad KEGG two-component-system
  map, not a single linear pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella two-component-system membership; the iron uptake genes
    are curated here as a smaller boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups pfeS-I, PP_0534, PP_1651, pfeS-II, fepA, PP_3576, fecI, PP_4607,
    PP_4611, and PP_4612 into the iron uptake regulation bucket.
notes: The bucket mixes canonical two-component regulators with FecI/FecR ECF sigma signaling and TonB-dependent
  outer-membrane receptor context. The module therefore records a boundary around iron uptake regulation
  rather than treating all members as His-Asp phosphorelay proteins.
