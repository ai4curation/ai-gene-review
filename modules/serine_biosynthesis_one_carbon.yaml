  connections:
    - source: serine_biosynthesis
      target: serine_glycine_one_carbon
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The L-serine made by the phosphorylated pathway (PHGDH/PSAT1/PSPH) is the substrate for the
        SHMT enzymes, which convert it (with tetrahydrofolate) to glycine and 5,10-methylene-THF,
        linking serine synthesis to one-carbon/folate metabolism.
  notes: >-
    De novo L-serine biosynthesis (GO:0006564) and serine/glycine one-carbon unit generation
    (GO:0035999), grounded to the completed human gene reviews: the phosphorylated pathway PHGDH
    (O43175, GO:0004617 + NAD GO:0051287), PSAT1 (Q9Y617, GO:0004648 + PLP GO:0030170) and PSPH
    (P78330, GO:0036424 + Mg GO:0000287 — note GO:0004647 is obsolete, GO:0036424 is the current term);
    and the two SHMT isozymes SHMT1 (P34896, cytosolic) and SHMT2 (P34897, mitochondrial), both
    GO:0004372 glycine hydroxymethyltransferase + PLP (they share PANTHER PTHR11680). SHMT1's nuclear
    thymidylate-synthesis role and SHMT2's BRISC-deubiquitinase moonlighting role are kept non-core in
    the gene reviews. GO term ids/labels verified against the local go.db. The one-carbon units feed
    folate interconversion (MTHFD1/2/1L — a further module), thymidylate/purine synthesis and the
    methylation cycle; glycine feeds the glycine cleavage system and heme/glutathione synthesis.
    Disorders: PHGDH — Neu-Laxova syndrome 1 / serine deficiency; PSAT1 — Neu-Laxova syndrome 2;
    PSPH — phosphoserine phosphatase deficiency.
