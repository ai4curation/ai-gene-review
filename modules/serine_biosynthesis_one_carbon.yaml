id: MODULE:serine_biosynthesis_one_carbon
title: De novo serine biosynthesis and serine/glycine one-carbon unit generation (PHGDH/PSAT1/PSPH + SHMT1/SHMT2)
description: >-
  De novo L-serine biosynthesis and its immediate use as a one-carbon donor form a central node of
  intermediary metabolism, supplying the building blocks and methyl groups for nucleotide synthesis,
  methylation and redox balance — a pathway on which proliferating and neural cells especially
  depend. Serine is made from the glycolytic intermediate 3-phospho-D-glycerate by the
  "phosphorylated pathway": PHGDH (D-3-phosphoglycerate dehydrogenase) oxidises 3-phosphoglycerate to
  3-phosphonooxypyruvate using NAD+; PSAT1 (phosphoserine aminotransferase, PLP-dependent)
  transaminates it with glutamate to O-phospho-L-serine; and PSPH (phosphoserine phosphatase,
  Mg2+-dependent) hydrolyses the phosphate to release L-serine, the committed final step. The newly
  made serine then feeds one-carbon (folate) metabolism through serine hydroxymethyltransferase,
  which reversibly transfers a one-carbon unit from serine to tetrahydrofolate, producing glycine and
  5,10-methylenetetrahydrofolate. Humans have two SHMT isozymes running this reaction in parallel
  compartments: cytosolic SHMT1 (supplying one-carbon units for cytosolic thymidylate/purine
  synthesis and the methylation cycle, with a nuclear role in the thymidylate-synthesis complex) and
  mitochondrial SHMT2 (the principal entry to mitochondrial one-carbon metabolism, exporting
  formate/one-carbon units to the cytosol and supplying glycine). Inherited defects cause serine
  deficiency: PHGDH — Neu-Laxova syndrome 1 / serine-deficiency with microcephaly and seizures;
  PSAT1 — Neu-Laxova syndrome 2; PSPH — phosphoserine phosphatase deficiency.
status: DRAFT
evidence:
  - source_id: GO:0006564
    title: L-serine biosynthetic process
    statement: The phosphorylated pathway (PHGDH, PSAT1, PSPH) mediates L-serine biosynthesis (GO:0006564).
  - source_id: GO:0035999
    title: tetrahydrofolate interconversion
    statement: The SHMT enzymes generate 5,10-methylene-THF one-carbon units (tetrahydrofolate interconversion, GO:0035999).
  - source_id: file:human/PHGDH/PHGDH-ai-review.yaml
    title: PHGDH gene review (human)
    statement: The 3-phosphoglycerate dehydrogenase step (UniProtKB:O43175, GO:0004617) matches the completed human PHGDH review.
  - source_id: file:human/PSAT1/PSAT1-ai-review.yaml
    title: PSAT1 gene review (human)
    statement: The phosphoserine aminotransferase step (UniProtKB:Q9Y617, GO:0004648) matches the completed human PSAT1 review.
  - source_id: file:human/PSPH/PSPH-ai-review.yaml
    title: PSPH gene review (human)
    statement: The phosphoserine phosphatase step (UniProtKB:P78330, GO:0036424) matches the completed human PSPH review.
  - source_id: file:human/SHMT1/SHMT1-ai-review.yaml
    title: SHMT1 gene review (human)
    statement: The cytosolic serine hydroxymethyltransferase step (UniProtKB:P34896, GO:0004372) matches the completed human SHMT1 review.
  - source_id: file:human/SHMT2/SHMT2-ai-review.yaml
    title: SHMT2 gene review (human)
    statement: The mitochondrial serine hydroxymethyltransferase step (UniProtKB:P34897, GO:0004372) matches the completed human SHMT2 review.
