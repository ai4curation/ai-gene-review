id: MODULE:heme_biosynthesis
title: Heme B biosynthesis through coherent protoporphyrin IX routes
description: >-
  A reusable cross-taxon model of protoporphyrin-dependent heme B biosynthesis.
  Two complete, incompatible route realizations are separated at the top level.
  The C5 glutamyl-tRNA realization, found in bacteria, archaea, and
  plastid-bearing eukaryotes, uses HemA and HemL to form
  5-aminolevulinate (ALA), then a shared tetrapyrrole trunk and compatible
  HemF/HemN and HemJ/HemG/HemY late-enzyme alternatives. The alternative
  C4/Shemin realization instead uses 5-aminolevulinate synthase followed by
  an oxygen-dependent CPOX/PPOX late route. Both realizations converge at
  protoporphyrin IX, which a species-neutral ferrochelatase reaction converts
  to heme B.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0006785
    title: heme B biosynthetic process
    statement: >-
      GO:0006785 grounds the constructive process ending specifically in heme B.
  - source_id: GO:0033014
    title: tetrapyrrole biosynthetic process
    statement: >-
      GO:0033014 grounds the shared early chemistry without imposing an
      obsolete or bacteria-only glutamate-route process term.
  - source_id: KEGG:ppu00860
    title: Pseudomonas putida KT2440 porphyrin metabolism
    statement: >-
      The KT2440 pathway bucket supplies the PSEPK candidates, narrowed here to
      glutamyl-tRNA-to-heme-B synthesis rather than corrin, siroheme, heme-use,
      heme-degradation, and heme-modification genes.
  - source_id: Reactome:R-HSA-189451
    title: Heme biosynthesis
    statement: >-
      Reactome supports one concrete metazoan realization of the reusable
      C4/CPOX/PPOX chemistry; human proteins are exemplars rather than
      route-level taxon or localization constraints.
  - source_id: UniProtKB:P0ACB4
    title: Escherichia coli K-12 HemG
    statement: >-
      Reviewed HemG is an FMN-dependent quinone-acceptor protoporphyrinogen IX
      dehydrogenase with RHEA:65032.
  - source_id: UniProtKB:P56601
    title: Myxococcus xanthus PgoX/HemY
    statement: >-
      Reviewed PgoX/HemY experimentally catalyzes the FAD- and oxygen-dependent
      RHEA:25576 reaction, and maps to PANTHER:PTHR42923:SF3 and InterPro
      IPR002937/IPR004572.
  - source_id: file:modules/heme_biosynthesis-deep-research-openscientist.md
    title: OpenScientist generic heme-biosynthesis module research
    statement: >-
      The final generic report is generated from and assessed against this
      species-neutral module with coherent C5 and C4 realizations.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__heme_biosynthesis__ppu00860-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00860 heme-biosynthesis research
    statement: >-
      The final pathway-and-taxon report is assessed for the KT2440 boundary,
      C5-route membership, ALAD paralogs, and HemF/HemN alternatives.
notes: >-
  Boundary: this module begins with route-specific ALA formation and ends with
  heme B. HemA/HemL and the trunk through uroporphyrinogen III can supply
  sibling tetrapyrrole pathways; this does not bring siroheme-, corrin-, or
  cobalamin-specific enzymes into the module. GltX supplies a translation
  substrate used by HemA and remains upstream. Coproheme routes, heme
  uptake/storage/degradation, and conversion of heme B to heme O or heme A are
  outside the boundary. Exact KT2440 and E. coli accessions are exemplars of
  conserved C5-route roles, not route-level taxon constraints. The late variant
  catalog is evidence-based but non-exhaustive. KT2440 hemB and hemBB are both
  plausible ALAD-family enzymes, so neither paralog is declared uniquely
  dominant.
