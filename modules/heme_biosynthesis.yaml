      The final ferrochelatase step (UniProtKB:P22830, GO:0004325) matches the completed human FECH review.
module:
  id: heme_biosynthesis
  label: Heme biosynthesis (porphyrin pathway)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: heme biosynthetic process
      term:
        id: GO:0006783
        label: heme biosynthetic process
      description: >-
        Eight-step synthesis of heme b from glycine and succinyl-CoA, shuttling between the
        mitochondrion and cytosol.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: The committed ALAS2 step occurs in the mitochondrial matrix.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The four middle steps (ALAD, HMBS, UROS, UROD) occur in the cytosol.
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: The last three steps (CPOX in the IMS, PPOX and FECH on the inner membrane) return to the mitochondrion.
  parts:
    - order: 1
      role: committed step (ALA synthesis)
      node:
        id: alas2_step
        label: glycine + succinyl-CoA to 5-aminolevulinate (ALA)
        module_type: REACTION
        annotons:
          - id: alas2_activity
            label: "ALAS2: 5-aminolevulinate synthase (erythroid)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 5-aminolevulinate synthase family (ALAS)
                term:
                  id: PANTHER:PTHR13693
                  label: 5-AMINOLEVULINATE SYNTHASE
                representative_members:
                  - preferred_term: ALAS2 (human)
                    term:
                      id: UniProtKB:P22557
                      label: 5-aminolevulinate synthase, erythroid-specific, mitochondrial
            function:
              preferred_term: 5-aminolevulinate synthase activity
              term:
                id: GO:0003870
                label: 5-aminolevulinate synthase activity
              substrates:
                - preferred_term: glycine
                - preferred_term: succinyl-CoA
              products:
                - preferred_term: 5-aminolevulinate (ALA)
                - preferred_term: CoA
                - preferred_term: CO2
              evidence:
                - source_id: EC:2.3.1.37
                  statement: PLP-dependent 5-aminolevulinate synthase; committed, rate-limiting step of heme synthesis (erythroid isoform)
                - source_id: Reactome:R-HSA-189442
                  statement: "ALAS condenses SUCC-CoA and Gly to form dALA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Committed, rate-limiting step. LOF = X-linked sideroblastic anaemia; C-terminal GOF
              = X-linked protoporphyria.
    - order: 2
      role: monopyrrole synthesis
      node:
        id: alad_step
        label: 2 ALA to porphobilinogen (PBG)
        module_type: REACTION
        annotons:
          - id: alad_activity
            label: "ALAD: porphobilinogen synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Delta-aminolevulinic acid dehydratase family (ALAD)
                term:
                  id: PANTHER:PTHR11458
                  label: DELTA-AMINOLEVULINIC ACID DEHYDRATASE
                representative_members:
                  - preferred_term: ALAD (human)
                    term:
                      id: UniProtKB:P13716
                      label: Delta-aminolevulinic acid dehydratase
            function:
              preferred_term: porphobilinogen synthase activity
              term:
                id: GO:0004655
                label: porphobilinogen synthase activity
              substrates:
                - preferred_term: 5-aminolevulinate (x2)
              products:
                - preferred_term: porphobilinogen (PBG)
              evidence:
                - source_id: EC:4.2.1.24
                  statement: zinc-dependent porphobilinogen synthase; condenses 2 ALA to the monopyrrole PBG; inhibited by lead (lead-poisoning biomarker)
                - source_id: Reactome:R-HSA-189439
                  statement: "ALAD condenses 2 dALAs to form PBG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Second step; deficiency = ALAD-deficiency porphyria (Doss porphyria).
    - order: 3
      role: linear tetrapyrrole synthesis
      node:
        id: hmbs_step
        label: 4 PBG to hydroxymethylbilane
        module_type: REACTION
        annotons:
          - id: hmbs_activity
            label: "HMBS: hydroxymethylbilane synthase (PBG deaminase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Porphobilinogen deaminase family (HMBS)
                term:
                  id: PANTHER:PTHR11557
                  label: PORPHOBILINOGEN DEAMINASE
                representative_members:
                  - preferred_term: HMBS (human)
                    term:
                      id: UniProtKB:P08397
                      label: Porphobilinogen deaminase
            function:
              preferred_term: hydroxymethylbilane synthase activity
              term:
                id: GO:0004418
                label: hydroxymethylbilane synthase activity
              substrates:
                - preferred_term: porphobilinogen (x4)
              products:
                - preferred_term: hydroxymethylbilane (preuroporphyrinogen)
                - preferred_term: ammonia (x4)
              evidence:
                - source_id: EC:2.5.1.61
                  statement: hydroxymethylbilane synthase; dipyrromethane-cofactor-primed polymerisation of 4 PBG to the linear tetrapyrrole
                - source_id: Reactome:R-HSA-189406
                  statement: "4 PBGs bind to form HMB (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Third step; deficiency = acute intermittent porphyria (AIP).
    - order: 4
      role: cyclisation to uroporphyrinogen III
      node:
        id: uros_step
        label: hydroxymethylbilane to uroporphyrinogen III
        module_type: REACTION
        annotons:
          - id: uros_activity
            label: "UROS: uroporphyrinogen-III synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Uroporphyrinogen-III synthase family (UROS)
                term:
                  id: PANTHER:PTHR12390
                  label: UROPORPHYRINOGEN-III SYNTHASE
                representative_members:
                  - preferred_term: UROS (human)
                    term:
                      id: UniProtKB:P10746
                      label: Uroporphyrinogen-III synthase
            function:
              preferred_term: uroporphyrinogen-III synthase activity
              term:
                id: GO:0004852
                label: uroporphyrinogen-III synthase activity
              substrates:
                - preferred_term: hydroxymethylbilane
              products:
                - preferred_term: uroporphyrinogen III
              evidence:
                - source_id: EC:4.2.1.75
                  statement: uroporphyrinogen-III synthase; cyclises hydroxymethylbilane with ring-D inversion to the III isomer (not the useless I isomer)
                - source_id: Reactome:R-HSA-189488
                  statement: "UROS transforms HMB to URO3 (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Fourth step; ensures the III isomer. Deficiency = congenital erythropoietic
              porphyria (Gunther disease).
    - order: 5
      role: decarboxylation to coproporphyrinogen III
      node:
        id: urod_step
        label: uroporphyrinogen III to coproporphyrinogen III
        module_type: REACTION
        annotons:
          - id: urod_activity
            label: "UROD: uroporphyrinogen decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Uroporphyrinogen decarboxylase family (UROD)
                term:
                  id: PANTHER:PTHR21091
                  label: UROPORPHYRINOGEN DECARBOXYLASE
                representative_members:
                  - preferred_term: UROD (human)
                    term:
                      id: UniProtKB:P06132
                      label: Uroporphyrinogen decarboxylase
            function:
              preferred_term: uroporphyrinogen decarboxylase activity
              term:
                id: GO:0004853
                label: uroporphyrinogen decarboxylase activity
              substrates:
                - preferred_term: uroporphyrinogen III
              products:
                - preferred_term: coproporphyrinogen III
                - preferred_term: CO2 (x4)
              evidence:
                - source_id: EC:4.1.1.37
                  statement: cofactor-independent uroporphyrinogen decarboxylase; 4 sequential acetate decarboxylations to coproporphyrinogen III
                - source_id: Reactome:R-HSA-189425
                  statement: "UROD decarboxylates URO3 to COPRO3 (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Fifth step; deficiency = porphyria cutanea tarda (PCT) / hepatoerythropoietic
              porphyria (HEP).
    - order: 6
      role: oxidative decarboxylation to protoporphyrinogen IX
      node:
        id: cpox_step
        label: coproporphyrinogen III to protoporphyrinogen IX
        module_type: REACTION
        annotons:
          - id: cpox_activity
            label: "CPOX: coproporphyrinogen-III oxidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Coproporphyrinogen III oxidase family (CPOX)
                term:
                  id: PANTHER:PTHR10755
                  label: COPROPORPHYRINOGEN III OXIDASE
                representative_members:
                  - preferred_term: CPOX (human)
                    term:
                      id: UniProtKB:P36551
                      label: Oxygen-dependent coproporphyrinogen-III oxidase, mitochondrial
            function:
              preferred_term: coproporphyrinogen oxidase activity
              term:
                id: GO:0004109
                label: coproporphyrinogen oxidase activity
              substrates:
                - preferred_term: coproporphyrinogen III
                - preferred_term: O2
              products:
                - preferred_term: protoporphyrinogen IX
                - preferred_term: CO2 (x2)
              evidence:
                - source_id: EC:1.3.3.3
                  statement: oxygen-dependent coproporphyrinogen-III oxidase; oxidative decarboxylation of 2 propionates to vinyls
                - source_id: Reactome:R-HSA-189421
                  statement: "CPO transforms COPRO3 to PPGEN9 (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial intermembrane space
                term:
                  id: GO:0005758
                  label: mitochondrial intermembrane space
            role_description: Sixth step; deficiency = hereditary coproporphyria (HCP).
    - order: 7
      role: oxidation to protoporphyrin IX
      node:
        id: ppox_step
        label: protoporphyrinogen IX to protoporphyrin IX
        module_type: REACTION
        annotons:
          - id: ppox_activity
            label: "PPOX: protoporphyrinogen oxidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Protoporphyrinogen oxidase family (PPOX)
                term:
                  id: PANTHER:PTHR42923
                  label: PROTOPORPHYRINOGEN OXIDASE
                representative_members:
                  - preferred_term: PPOX (human)
                    term:
                      id: UniProtKB:P50336
                      label: Protoporphyrinogen oxidase
            function:
              preferred_term: oxygen-dependent protoporphyrinogen oxidase activity
              term:
                id: GO:0004729
                label: oxygen-dependent protoporphyrinogen oxidase activity
              substrates:
                - preferred_term: protoporphyrinogen IX
                - preferred_term: O2 (x3)
              products:
                - preferred_term: protoporphyrin IX
                - preferred_term: H2O2 (x3)
              evidence:
                - source_id: EC:1.3.3.4
                  statement: FAD-dependent, O2-dependent protoporphyrinogen oxidase; 6-electron oxidation to protoporphyrin IX; diphenyl-ether herbicide target
                - source_id: Reactome:R-HSA-189423
                  statement: "PPO oxidises PPGEN9 to PRIN9 (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: Seventh step; deficiency = variegate porphyria (VP).
    - order: 8
      role: iron insertion (final step)
      node:
        id: fech_step
        label: protoporphyrin IX + Fe2+ to heme b
        module_type: REACTION
        annotons:
          - id: fech_activity
            label: "FECH: ferrochelatase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ferrochelatase family (FECH)
                term:
                  id: PANTHER:PTHR11108
                  label: FERROCHELATASE
                representative_members:
                  - preferred_term: FECH (human)
                    term:
                      id: UniProtKB:P22830
                      label: Ferrochelatase, mitochondrial
            function:
              preferred_term: protoporphyrin ferrochelatase activity
              term:
                id: GO:0004325
                label: protoporphyrin ferrochelatase activity
              substrates:
                - preferred_term: protoporphyrin IX
                - preferred_term: Fe2+
              products:
                - preferred_term: heme b (protoheme)
                - preferred_term: 2 H+
              evidence:
                - source_id: EC:4.98.1.1
                  statement: ferrochelatase (protoheme ferro-lyase); [2Fe-2S] enzyme inserting Fe2+ into protoporphyrin IX; final, committed step
                - source_id: Reactome:R-HSA-189465
                  statement: "FECH binds Fe2+ to PRIN9 to form heme (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: Final step; deficiency = erythropoietic protoporphyria (EPP).
  connections:
    - source: alas2_step
      target: alad_step
      connection_type: PROVIDES_INPUT_FOR
      description: ALA from ALAS2 is exported to the cytosol and condensed by ALAD to porphobilinogen.
    - source: alad_step
      target: hmbs_step
      connection_type: PROVIDES_INPUT_FOR
      description: Porphobilinogen from ALAD is polymerised by HMBS to hydroxymethylbilane.
    - source: hmbs_step
      target: uros_step
      connection_type: PROVIDES_INPUT_FOR
      description: Hydroxymethylbilane from HMBS is cyclised by UROS to uroporphyrinogen III.
    - source: uros_step
      target: urod_step
      connection_type: PROVIDES_INPUT_FOR
      description: Uroporphyrinogen III from UROS is decarboxylated by UROD to coproporphyrinogen III.
    - source: urod_step
      target: cpox_step
      connection_type: PROVIDES_INPUT_FOR
      description: Coproporphyrinogen III is imported back to the mitochondrion and oxidised by CPOX.
    - source: cpox_step
      target: ppox_step
      connection_type: PROVIDES_INPUT_FOR
      description: Protoporphyrinogen IX from CPOX is oxidised by PPOX to protoporphyrin IX.
    - source: ppox_step
      target: fech_step
      connection_type: PROVIDES_INPUT_FOR
      description: Protoporphyrin IX from PPOX receives Fe2+ from FECH to form heme b.
  notes: >-
    Complete heme (porphyrin) biosynthesis pathway grounded to the human enzymes ALAS2
    (UniProtKB:P22557, GO:0003870, EC 2.3.1.37), ALAD (P13716, GO:0004655, EC 4.2.1.24), HMBS
    (P08397, GO:0004418, EC 2.5.1.61), UROS (P10746, GO:0004852, EC 4.2.1.75), UROD (P06132,
    GO:0004853, EC 4.1.1.37), CPOX (P36551, GO:0004109, EC 1.3.3.3), PPOX (P50336, GO:0004729,
    EC 1.3.3.4) and FECH (P22830, GO:0004325, EC 4.98.1.1). GO molecular-function/location terms
    were taken from the completed human gene reviews and verified against the local go.db;
    Reactome reaction ids/titles were verified against the local reactome cache. Each step uses a
    PANTHER family selector with the human enzyme as representative so the module generalises
    across orthologs/paralogs. The pathway is spatially split: ALAS2 is mitochondrial (matrix),
    the ALA product is exported and the four middle steps (ALAD, HMBS, UROS, UROD) are cytosolic,
    then coproporphyrinogen III re-enters the mitochondrion for the final three membrane-associated
    steps (CPOX in the intermembrane space; PPOX and FECH on the inner membrane). ALAS2 is the
    erythroid isoform used here (the ubiquitous ALAS1 is the housekeeping counterpart and is not a
    dismech mapping gene). Each enzyme corresponds to a specific porphyria: ALAS2 (X-linked
    sideroblastic anaemia / X-linked protoporphyria), ALAD (ALAD-deficiency porphyria), HMBS
    (acute intermittent porphyria), UROS (congenital erythropoietic porphyria), UROD (porphyria
    cutanea tarda / hepatoerythropoietic porphyria), CPOX (hereditary coproporphyria), PPOX
    (variegate porphyria) and FECH (erythropoietic protoporphyria).
