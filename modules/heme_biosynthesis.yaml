id: MODULE:heme_biosynthesis
title: Heme B biosynthesis through alternative entry and oxidation routes
description: >-
  A reusable cross-taxon model of protoporphyrin-dependent heme B
  biosynthesis. C5 glutamyl-tRNA and C4/Shemin reactions are alternative
  routes to 5-aminolevulinate (ALA). A shared tetrapyrrole trunk then feeds
  independently selected oxygen-dependent or oxygen-independent
  coproporphyrinogen oxidases and HemJ-, HemG-, or HemY/PPOX-family
  protoporphyrinogen oxidases. All realizations converge at protoporphyrin IX,
  which a species-neutral ferrochelatase reaction converts to heme B.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0006785
    title: heme B biosynthetic process
    statement: >-
      GO:0006785 grounds the constructive process ending specifically in heme B.
  - source_id: GO:0033014
    title: tetrapyrrole biosynthetic process
    statement: >-
      GO:0033014 grounds the shared early chemistry without imposing an obsolete or bacteria-only glutamate-route process term.
  - source_id: KEGG:ppu00860
    title: Pseudomonas putida KT2440 porphyrin metabolism
    statement: >-
      The KT2440 pathway bucket supplies the PSEPK candidates, narrowed here to glutamyl-tRNA-to-heme-B synthesis rather than corrin, siroheme, heme-use, heme-degradation, and heme-modification genes.
  - source_id: Reactome:R-HSA-189451
    title: Heme biosynthesis
    statement: >-
      Reactome supports one concrete metazoan realization using C4 entry,
      CPOX, and PPOX; human proteins are exemplars rather than route-level
      taxon or localization constraints.
  - source_id: UniProtKB:P0ACB4
    title: Escherichia coli K-12 HemG
    statement: >-
      Reviewed HemG is an FMN-dependent quinone-acceptor protoporphyrinogen IX dehydrogenase with RHEA:65032.
  - source_id: UniProtKB:P56601
    title: Myxococcus xanthus PgoX/HemY
    statement: >-
      Reviewed PgoX/HemY experimentally catalyzes the FAD- and oxygen-dependent RHEA:25576 reaction, and maps to PANTHER:PTHR42923:SF3 and InterPro IPR002937/IPR004572.
  - source_id: UniProtKB:Q04512
    title: Rhodobacter sphaeroides 5-aminolevulinate synthase
    statement: >-
      Reviewed Q04512 grounds bacterial C4/Shemin entry in the same strain that
      encodes the reviewed HemN and HemJ exemplars below.
  - source_id: UniProtKB:P33770
    title: Rhodobacter sphaeroides oxygen-independent coproporphyrinogen oxidase
    statement: >-
      Reviewed P33770 grounds oxygen-independent HemN chemistry downstream of
      C4/Shemin entry in Rhodobacter sphaeroides.
  - source_id: UniProtKB:Q53229
    title: Rhodobacter sphaeroides protoporphyrinogen IX oxidase
    statement: >-
      Reviewed Q53229 grounds a HemJ-family protoporphyrinogen oxidase
      downstream of C4/Shemin entry in Rhodobacter sphaeroides.
  - source_id: file:modules/heme_biosynthesis-deep-research-openscientist.md
    title: OpenScientist generic heme-biosynthesis module research
    statement: >-
      The final generic report supports the protoporphyrin-dependent boundary,
      shared trunk, and independent entry and late-oxidation axes. Its
      description of HemB-HemE as a six-enzyme trunk, universal entry-route
      exclusivity, oxygen-determined late choices, and generalized membrane
      association or channeling was not used to alter the curated graph.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__heme_biosynthesis__ppu00860-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00860 heme-biosynthesis research
    statement: >-
      The final pathway-and-taxon report is assessed for the KT2440 boundary, C5-route membership, ALAD paralogs, and HemF/HemN alternatives.
notes: >-
  Boundary: this module begins with route-specific ALA formation and ends with heme B. HemA/HemL and the trunk through uroporphyrinogen III can supply sibling tetrapyrrole pathways; this does not bring siroheme-, corrin-, or cobalamin-specific enzymes into the module. GltX supplies a translation substrate used by HemA and remains upstream. Coproheme routes, heme uptake/storage/degradation, and conversion of heme B to heme O or heme A are outside the boundary. Exact KT2440 and E. coli accessions are exemplars of conserved C5-route roles, not route-level taxon constraints. The late variant catalog is evidence-based but non-exhaustive. KT2440 hemB and hemBB are both plausible ALAD-family enzymes, so neither paralog is declared uniquely dominant.
