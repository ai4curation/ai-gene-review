id: MODULE:heme_biosynthesis
title: Heme biosynthesis (the porphyrin pathway); ALAS2/ALAD/HMBS/UROS/UROD/CPOX/PPOX/FECH
description: >-
  Heme is built from glycine and succinyl-CoA in an eight-step pathway that shuttles between
  the mitochondrion and the cytosol and underlies the porphyrias. The committed, rate-limiting
  first step is mitochondrial: 5-aminolevulinate synthase (ALAS2, the erythroid isoform;
  ALAS1 is the housekeeping isoform) condenses glycine with succinyl-CoA to 5-aminolevulinate
  (ALA) using pyridoxal-5'-phosphate. ALA is exported to the cytosol, where four enzymes act:
  porphobilinogen synthase (ALAD, zinc-dependent) condenses two ALA to the monopyrrole
  porphobilinogen (PBG); hydroxymethylbilane synthase (HMBS/PBG deaminase) polymerises four PBG
  into the linear tetrapyrrole hydroxymethylbilane; uroporphyrinogen-III synthase (UROS)
  cyclises it, with ring-D inversion, to uroporphyrinogen III; and uroporphyrinogen
  decarboxylase (UROD) decarboxylates its four acetate side chains to give coproporphyrinogen
  III. The last three steps return to the mitochondrion: coproporphyrinogen-III oxidase (CPOX,
  in the intermembrane space) oxidatively decarboxylates two propionates to vinyls, giving
  protoporphyrinogen IX; protoporphyrinogen oxidase (PPOX, FAD-dependent, on the inner membrane)
  oxidises it to protoporphyrin IX; and ferrochelatase (FECH, a [2Fe-2S] enzyme on the matrix
  face of the inner membrane) inserts ferrous iron to yield heme b. Each enzyme defines a
  porphyria: ALAS2 (X-linked sideroblastic anaemia / X-linked protoporphyria), ALAD
  (ALAD-deficiency porphyria), HMBS (acute intermittent porphyria), UROS (congenital
  erythropoietic porphyria), UROD (porphyria cutanea tarda / hepatoerythropoietic porphyria),
  CPOX (hereditary coproporphyria), PPOX (variegate porphyria) and FECH (erythropoietic
  protoporphyria).
status: DRAFT
evidence:
