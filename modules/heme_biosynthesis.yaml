    title: heme biosynthetic process
    statement: >-
      The module is grounded in heme biosynthetic process (GO:0006783); it covers the complete
      eight-step porphyrin pathway from glycine + succinyl-CoA to heme b.
  - source_id: Reactome:R-HSA-189451
    title: Heme biosynthesis
    statement: >-
      Step order, intermediates and reaction stoichiometries follow the human Reactome "Heme
      biosynthesis" pathway (reactions R-HSA-189442/189439/189406/189488/189425/189421/189423/189465).
  - source_id: file:human/ALAS2/ALAS2-ai-review.yaml
    title: ALAS2 gene review (human)
    statement: >-
      The committed 5-aminolevulinate synthase step (UniProtKB:P22557, GO:0003870) matches the
