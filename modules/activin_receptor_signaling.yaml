knowledge_gaps:
  - gap_statement: SMAD2 versus SMAD3 functional divergence remains unresolved in the Activin 
      receptor signaling pathway module.
    boundary: Although SMAD2 and SMAD3 are co-activated downstream of ACVR1B, emerging evidence 
      suggests they have non-redundant and sometimes opposing functions. In cardiac tissue, 
      selective promotion of SMAD3 versus SMAD2 by distinct receptor combinations produces 
      qualitatively different biological outcomes (tang2024activinsandinhibins pages 17-19).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/activin_receptor_signaling-deep-research-falcon.md
  - gap_statement: 'Non-signaling complexes: mechanism and physiological significance remains unresolved
      in the Activin receptor signaling pathway module.'
    boundary: The discovery that wild-type ACVR1 forms non-signaling complexes with activin A that 
      undergo lysosomal degradation represents a paradigm-shifting regulatory mechanism.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/activin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Receptor promiscuity and pathway crosstalk remains unresolved in the Activin 
      receptor signaling pathway module.
    boundary: The shared usage of ACVR2A/ACVR2B by activins, BMPs, myostatin, and GDFs creates 
      extensive pathway crosstalk that confounds the assignment of biological effects to specific 
      ligand-receptor pairings (ganjoo2022bonemorphogeneticproteins pages 3-5, 
      tindall2024thetgfbetasuperfamily pages 2-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/activin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Non-canonical pathway contributions remains unresolved in the Activin receptor 
      signaling pathway module.
    boundary: The relative contributions of canonical SMAD2/3 signaling versus non-canonical 
      pathways (p38 MAPK, MRTF-A, PI3K-AKT) to specific activin biological outputs remain 
      incompletely characterized.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/activin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Evolutionary plasticity remains unresolved in the Activin receptor signaling 
      pathway module.
    boundary: Recent identification of recurrent ligand-binding domain multiplications in TGF-beta 
      receptors across diverse vertebrate lineages reveals an unexpected dimension of structural 
      plasticity superimposed on the highly conserved receptor core architecture 
      (jatzlau2026recurrentevolutionof pages 10-10).
