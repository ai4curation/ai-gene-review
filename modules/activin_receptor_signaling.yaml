id: MODULE:activin_receptor_signaling
title: Activin receptor signaling pathway module
description: Activin ligands signal through ACVR type I and type II serine/threonine kinase 
  receptors to activate SMAD2/3-SMAD4 transcriptional programs controlling growth and 
  differentiation.
