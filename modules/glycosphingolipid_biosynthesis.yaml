id: MODULE:glycosphingolipid_biosynthesis
title: Glycosphingolipid biosynthesis (ceramide -> GlcCer/GalCer -> LacCer -> ganglio/globo/lacto series)
description: >-
  Glycosphingolipids are ceramide-anchored glycans that cover the outer leaflet of the plasma membrane,
  clustering in lipid rafts and serving as blood-group antigens, cell-adhesion and signalling receptors, and
  receptors hijacked by toxins and pathogens. Their synthesis is a Golgi-based branching tree built on
  ceramide. Two committed glycosylations start the two major limbs: glucosylceramide synthase UGCG adds
  glucose to ceramide (glucosylceramide, GlcCer, the trunk of the ganglio/globo/lacto glycosphingolipids),
  while UGT8 in the ER adds galactose to make galactosylceramide (GalCer, precursor of the myelin galactolipids
  and sulfatide). GlcCer is galactosylated by the beta-1,4-galactosyltransferases B4GALT5 (major) and B4GALT6
  to lactosylceramide (LacCer), the central branch point. From LacCer three series diverge: the GANGLIO series
  begins when the sialyltransferase ST3GAL5 (GM3 synthase) adds sialic acid to make GM3, which ST8SIA1 (GD3
  synthase) can further sialylate to GD3, and which B4GALNT1 (GM2/GD2 synthase) elongates with GalNAc toward
  the complex a-/b-series gangliosides; the GLOBO series begins when A4GALT (Gb3/CD77 synthase) adds an
  alpha-galactose to make globotriaosylceramide (Gb3, the Shiga-toxin receptor and Pk antigen), which
  B3GALNT1 (globoside synthase) extends to globoside (Gb4, the P antigen); and the (neo)LACTO series begins
  when B3GNT5 adds GlcNAc to make lactotriaosylceramide (Lc3), the scaffold for Lewis/blood-group glycans.
  Inherited defects at almost every node cause disease: UGCG is the drug target for glycosphingolipidoses,
  ST3GAL5 deficiency causes GM3-synthase-deficiency epileptic encephalopathy, B4GALNT1 deficiency causes
  hereditary spastic paraplegia (SPG26), and A4GALT/B3GALNT1 variants define the P blood-group system.
status: DRAFT
evidence:
  - source_id: GO:0006688
    title: glycosphingolipid biosynthetic process
    statement: UGCG/B4GALT5/6 and the series-specific glycosyltransferases build glycosphingolipids (GO:0006688).
  - source_id: GO:0001574
    title: ganglioside biosynthetic process
    statement: ST3GAL5, ST8SIA1 and B4GALNT1 build the sialylated ganglio-series (GO:0001574).
  - source_id: file:human/UGCG/UGCG-ai-review.yaml
    title: UGCG gene review (human)
    statement: The ceramide -> glucosylceramide step (UniProtKB:Q16739, GO:0008120) matches the completed human UGCG review.
  - source_id: file:human/UGT8/UGT8-ai-review.yaml
    title: UGT8 gene review (human)
    statement: The ceramide -> galactosylceramide step (UniProtKB:Q16880, GO:0003851) matches the completed human UGT8 review.
  - source_id: file:human/B4GALT5/B4GALT5-ai-review.yaml
    title: B4GALT5 gene review (human)
    statement: The GlcCer -> lactosylceramide step (UniProtKB:O43286, GO:0008489) matches the completed human B4GALT5 review.
  - source_id: file:human/B4GALT6/B4GALT6-ai-review.yaml
    title: B4GALT6 gene review (human)
    statement: The GlcCer -> lactosylceramide step (UniProtKB:Q9UBX8, GO:0008489) matches the completed human B4GALT6 review.
  - source_id: file:human/ST3GAL5/ST3GAL5-ai-review.yaml
    title: ST3GAL5 gene review (human)
    statement: The LacCer -> GM3 (ganglio-series start) step (UniProtKB:Q9UNP4, GO:0047291) matches the completed human ST3GAL5 review.
  - source_id: file:human/ST8SIA1/ST8SIA1-ai-review.yaml
    title: ST8SIA1 gene review (human)
    statement: The GM3 -> GD3 (b-series) step (UniProtKB:Q92185, GO:0003828) matches the completed human ST8SIA1 review.
  - source_id: file:human/B4GALNT1/B4GALNT1-ai-review.yaml
    title: B4GALNT1 gene review (human)
    statement: The GM3/GD3 -> GM2/GD2 step (UniProtKB:Q00973, GO:0003947) matches the completed human B4GALNT1 review.
  - source_id: file:human/A4GALT/A4GALT-ai-review.yaml
    title: A4GALT gene review (human)
    statement: The LacCer -> Gb3 (globo-series start) step (UniProtKB:Q9NPC4, GO:0050512) matches the completed human A4GALT review.
  - source_id: file:human/B3GALNT1/B3GALNT1-ai-review.yaml
    title: B3GALNT1 gene review (human)
    statement: The Gb3 -> globoside (Gb4) step (UniProtKB:O75752, GO:0047273) matches the completed human B3GALNT1 review.
  - source_id: file:human/B3GNT5/B3GNT5-ai-review.yaml
    title: B3GNT5 gene review (human)
    statement: The LacCer -> Lc3 ((neo)lacto-series start) step (UniProtKB:Q9BYG0, GO:0047256) matches the completed human B3GNT5 review.
module:
  id: glycosphingolipid_biosynthesis
  label: Glycosphingolipid biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycosphingolipid biosynthetic process
      term:
        id: GO:0006688
        label: glycosphingolipid biosynthetic process
      description: Golgi glycosylation of ceramide to GlcCer/LacCer and the ganglio/globo/lacto series.
    - preferred_term: ganglioside biosynthetic process
      term:
        id: GO:0001574
        label: ganglioside biosynthetic process
      description: Sialylated ganglio-series branch (GM3 -> GD3/GM2/GD2 ...).
  context:
    cellular_components:
      - preferred_term: Golgi membrane
        term:
          id: GO:0000139
          label: Golgi membrane
        description: UGCG, B4GALT5/6 and the series glycosyltransferases act at the Golgi membrane.
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: UGT8 (galactosylceramide synthase) acts in the ER.
  parts:
    - order: 1
      role: glucosylceramide synthesis (trunk)
      node:
        id: glucosylceramide_synthesis
        label: Glucosylceramide synthase (UGCG)
        module_type: REACTION
        annotons:
          - id: ugcg_activity
            label: "UGCG: ceramide glucosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UGCG / ceramide glucosyltransferase family
                term:
                  id: PANTHER:PTHR12726
                  label: CERAMIDE GLUCOSYLTRANSFERASE
                representative_members:
                  - preferred_term: UGCG (human)
                    term:
                      id: UniProtKB:Q16739
                      label: Ceramide glucosyltransferase
            function:
              preferred_term: ceramide glucosyltransferase activity
              term:
                id: GO:0008120
                label: ceramide glucosyltransferase activity
              substrates:
                - preferred_term: ceramide
                - preferred_term: UDP-glucose
              products:
                - preferred_term: glucosylceramide (GlcCer)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/UGCG/UGCG-ai-review.yaml
                  statement: First, committed step of glucosphingolipid synthesis; drug target (eliglustat/miglustat); GlcCer is the trunk of the ganglio/globo/lacto series
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Add glucose to ceramide (glucosylceramide).
    - order: 2
      role: galactosylceramide synthesis (parallel myelin branch)
      node:
        id: galactosylceramide_synthesis
        label: Galactosylceramide synthase (UGT8)
        module_type: REACTION
        annotons:
          - id: ugt8_activity
            label: "UGT8: ceramide galactosyltransferase (CGT)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UGT8 / ceramide galactosyltransferase family
                term:
                  id: PANTHER:PTHR48043
                  label: 2-HYDROXYACYLSPHINGOSINE 1-BETA-GALACTOSYLTRANSFERASE
                representative_members:
                  - preferred_term: UGT8 (human)
                    term:
                      id: UniProtKB:Q16880
                      label: 2-hydroxyacylsphingosine 1-beta-galactosyltransferase
            function:
              preferred_term: N-acylsphingosine galactosyltransferase activity
              term:
                id: GO:0003851
                label: N-acylsphingosine galactosyltransferase activity
              substrates:
                - preferred_term: ceramide
                - preferred_term: UDP-galactose
              products:
                - preferred_term: galactosylceramide (GalCer)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/UGT8/UGT8-ai-review.yaml
                  statement: ER enzyme making GalCer (precursor of sulfatide / myelin galactolipids), a distinct branch from the UGCG glucosylceramide route
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Add galactose to ceramide (galactosylceramide; myelin branch).
    - order: 3
      role: lactosylceramide synthesis (branch point)
      node:
        id: lactosylceramide_synthesis
        label: Lactosylceramide synthase (B4GALT5/B4GALT6)
        module_type: REACTION
        annotons:
          - id: b4galt56_activity
            label: "B4GALT5/B4GALT6: lactosylceramide synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: B4GALT5/6 / beta-1,4-galactosyltransferase family
                term:
                  id: PANTHER:PTHR19300
                  label: BETA-1,4-GALACTOSYLTRANSFERASE
                representative_members:
                  - preferred_term: B4GALT5 (human, major)
                    term:
                      id: UniProtKB:O43286
                      label: Beta-1,4-galactosyltransferase 5
                  - preferred_term: B4GALT6 (human)
                    term:
                      id: UniProtKB:Q9UBX8
                      label: Beta-1,4-galactosyltransferase 6
            function:
              preferred_term: UDP-galactose:glucosylceramide beta-1,4-galactosyltransferase activity
              term:
                id: GO:0008489
                label: UDP-galactose:glucosylceramide beta-1,4-galactosyltransferase activity
              substrates:
                - preferred_term: glucosylceramide (GlcCer)
                - preferred_term: UDP-galactose
              products:
                - preferred_term: lactosylceramide (LacCer)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/B4GALT5/B4GALT5-ai-review.yaml
                  statement: B4GALT5 (major) and B4GALT6 make LacCer from GlcCer + UDP-Gal, the central branch-point precursor of the ganglio/globo/lacto series
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Galactosylate GlcCer to lactosylceramide (branch point).
    - order: 4
      role: ganglio-series start (GM3)
      node:
        id: ganglio_gm3
        label: GM3 synthase (ST3GAL5)
        module_type: REACTION
        annotons:
          - id: st3gal5_activity
            label: "ST3GAL5: lactosylceramide alpha-2,3-sialyltransferase (GM3 synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ST3GAL5 / GM3 synthase family
                term:
                  id: PANTHER:PTHR13713
                  label: ALPHA-2,3-SIALYLTRANSFERASE
                representative_members:
                  - preferred_term: ST3GAL5 (human)
                    term:
                      id: UniProtKB:Q9UNP4
                      label: Lactosylceramide alpha-2,3-sialyltransferase
            function:
              preferred_term: lactosylceramide alpha-2,3-sialyltransferase activity
              term:
                id: GO:0047291
                label: lactosylceramide alpha-2,3-sialyltransferase activity
              substrates:
                - preferred_term: lactosylceramide (LacCer)
                - preferred_term: CMP-N-acetylneuraminate
              products:
                - preferred_term: GM3 (ganglioside)
                - preferred_term: CMP
              evidence:
                - source_id: file:human/ST3GAL5/ST3GAL5-ai-review.yaml
                  statement: First committed ganglioside step; GM3 is the precursor of a-/b-series gangliosides; deficiency = GM3-synthase-deficiency epileptic encephalopathy (salt-and-pepper syndrome)
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Sialylate LacCer to GM3 (ganglio-series start).
    - order: 5
      role: b-series start (GD3)
      node:
        id: ganglio_gd3
        label: GD3 synthase (ST8SIA1)
        module_type: REACTION
        annotons:
          - id: st8sia1_activity
            label: "ST8SIA1: alpha-2,8-sialyltransferase (GD3 synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ST8SIA1 / GD3 synthase (alpha-2,8-sialyltransferase) family
                term:
                  id: PANTHER:PTHR11987
                  label: ALPHA-2,8-SIALYLTRANSFERASE
                representative_members:
                  - preferred_term: ST8SIA1 (human)
                    term:
                      id: UniProtKB:Q92185
                      label: Alpha-2,8-sialyltransferase 8A
            function:
              preferred_term: alpha-N-acetylneuraminate alpha-2,8-sialyltransferase activity
              term:
                id: GO:0003828
                label: alpha-N-acetylneuraminate alpha-2,8-sialyltransferase activity
              substrates:
                - preferred_term: GM3
                - preferred_term: CMP-N-acetylneuraminate
              products:
                - preferred_term: GD3 (b-series precursor)
                - preferred_term: CMP
              evidence:
                - source_id: file:human/ST8SIA1/ST8SIA1-ai-review.yaml
                  statement: Adds a second sialic acid (alpha-2,8) to GM3 to make GD3, initiating the b-series gangliosides; melanoma tumour-associated antigen
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Sialylate GM3 to GD3 (b-series start).
    - order: 6
      role: complex ganglioside elongation (GM2/GD2)
      node:
        id: ganglio_gm2gd2
        label: GM2/GD2 synthase (B4GALNT1)
        module_type: REACTION
        annotons:
          - id: b4galnt1_activity
            label: "B4GALNT1: beta-1,4-N-acetylgalactosaminyltransferase (GM2/GD2 synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: B4GALNT1 / GM2/GD2 synthase family
                term:
                  id: PANTHER:PTHR15046
                  label: BETA-1,4 N-ACETYLGALACTOSAMINYLTRANSFERASE
                representative_members:
                  - preferred_term: B4GALNT1 (human)
                    term:
                      id: UniProtKB:Q00973
                      label: Beta-1,4 N-acetylgalactosaminyltransferase 1
            function:
              preferred_term: (N-acetylneuraminyl)-galactosylglucosylceramide N-acetylgalactosaminyltransferase activity
              term:
                id: GO:0003947
                label: (N-acetylneuraminyl)-galactosylglucosylceramide N-acetylgalactosaminyltransferase activity
              substrates:
                - preferred_term: GM3 / GD3 (and LacCer)
                - preferred_term: UDP-N-acetylgalactosamine
              products:
                - preferred_term: GM2 / GD2 (and GA2)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/B4GALNT1/B4GALNT1-ai-review.yaml
                  statement: Committed step to the complex a-/b-series gangliosides (GalNAc onto GM3/GD3); deficiency = hereditary spastic paraplegia SPG26
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Add GalNAc to GM3/GD3, making GM2/GD2 (complex gangliosides).
    - order: 7
      role: globo-series start (Gb3)
      node:
        id: globo_gb3
        label: Gb3/CD77 synthase (A4GALT)
        module_type: REACTION
        annotons:
          - id: a4galt_activity
            label: "A4GALT: lactosylceramide 4-alpha-galactosyltransferase (Gb3 synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: A4GALT / Gb3 synthase family
                term:
                  id: PANTHER:PTHR12042
                  label: LACTOSYLCERAMIDE 4-ALPHA-GALACTOSYLTRANSFERASE
                representative_members:
                  - preferred_term: A4GALT (human)
                    term:
                      id: UniProtKB:Q9NPC4
                      label: Lactosylceramide 4-alpha-galactosyltransferase
            function:
              preferred_term: lactosylceramide 4-alpha-galactosyltransferase activity
              term:
                id: GO:0050512
                label: lactosylceramide 4-alpha-galactosyltransferase activity
              substrates:
                - preferred_term: lactosylceramide (LacCer)
                - preferred_term: UDP-galactose
              products:
                - preferred_term: globotriaosylceramide (Gb3 / CD77)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/A4GALT/A4GALT-ai-review.yaml
                  statement: First globo-series step; Gb3/CD77 is the Pk antigen and the Shiga-toxin/verotoxin receptor (accumulates in Fabry disease)
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Alpha-galactosylate LacCer to Gb3 (globo-series start).
    - order: 8
      role: globoside synthesis (Gb4)
      node:
        id: globo_gb4
        label: Globoside synthase (B3GALNT1)
        module_type: REACTION
        annotons:
          - id: b3galnt1_activity
            label: "B3GALNT1: globoside (Gb4) synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: B3GALNT1 / globoside synthase (beta-1,3-GalNAc-T) family
                term:
                  id: PANTHER:PTHR11214
                  label: BETA-1,3-N-ACETYLGLUCOSAMINYLTRANSFERASE / GALACTOSYLTRANSFERASE
                representative_members:
                  - preferred_term: B3GALNT1 (human)
                    term:
                      id: UniProtKB:O75752
                      label: Globoside alpha-1,3-N-acetylgalactosaminyltransferase 1
            function:
              preferred_term: galactosylgalactosylglucosylceramide beta-D-acetylgalactosaminyltransferase activity
              term:
                id: GO:0047273
                label: galactosylgalactosylglucosylceramide beta-D-acetylgalactosaminyltransferase activity
              substrates:
                - preferred_term: globotriaosylceramide (Gb3)
                - preferred_term: UDP-N-acetylgalactosamine
              products:
                - preferred_term: globoside (Gb4 / globotetraosylceramide)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/B3GALNT1/B3GALNT1-ai-review.yaml
                  statement: Extends Gb3 to globoside (Gb4), the P blood-group antigen (most abundant neutral GSL of erythrocytes); loss = rare p (P-null) phenotype
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Add GalNAc to Gb3, making globoside (Gb4).
    - order: 9
      role: (neo)lacto-series start (Lc3)
      node:
        id: lacto_lc3
        label: Lc3 synthase (B3GNT5)
        module_type: REACTION
        annotons:
          - id: b3gnt5_activity
            label: "B3GNT5: lactosylceramide beta-1,3-N-acetylglucosaminyltransferase (Lc3 synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: B3GNT5 / Lc3 synthase (beta-1,3-GlcNAc-T) family
                term:
                  id: PANTHER:PTHR11214
                  label: BETA-1,3-N-ACETYLGLUCOSAMINYLTRANSFERASE / GALACTOSYLTRANSFERASE
                representative_members:
                  - preferred_term: B3GNT5 (human)
                    term:
                      id: UniProtKB:Q9BYG0
                      label: Lactosylceramide 1,3-N-acetyl-beta-D-glucosaminyltransferase
            function:
              preferred_term: lactosylceramide 1,3-N-acetyl-beta-D-glucosaminyltransferase activity
              term:
                id: GO:0047256
                label: lactosylceramide 1,3-N-acetyl-beta-D-glucosaminyltransferase activity
              substrates:
                - preferred_term: lactosylceramide (LacCer)
                - preferred_term: UDP-N-acetylglucosamine
              products:
                - preferred_term: lactotriaosylceramide (Lc3)
                - preferred_term: UDP
              evidence:
                - source_id: file:human/B3GNT5/B3GNT5-ai-review.yaml
                  statement: Adds GlcNAc to LacCer to make Lc3, initiating the (neo)lacto-series glycosphingolipids (scaffold for Lewis/blood-group antigens)
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Add GlcNAc to LacCer, making Lc3 ((neo)lacto-series start).
  connections:
    - source: glucosylceramide_synthesis
      target: lactosylceramide_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The GlcCer made by UGCG is galactosylated to LacCer by B4GALT5/6.
    - source: lactosylceramide_synthesis
      target: ganglio_gm3
      connection_type: PROVIDES_INPUT_FOR
      description: LacCer is sialylated by ST3GAL5 to enter the ganglio-series (GM3).
    - source: lactosylceramide_synthesis
      target: globo_gb3
      connection_type: PROVIDES_INPUT_FOR
      description: LacCer is alpha-galactosylated by A4GALT to enter the globo-series (Gb3).
    - source: lactosylceramide_synthesis
      target: lacto_lc3
      connection_type: PROVIDES_INPUT_FOR
      description: LacCer is GlcNAc-extended by B3GNT5 to enter the (neo)lacto-series (Lc3).
    - source: ganglio_gm3
      target: ganglio_gd3
      connection_type: PROVIDES_INPUT_FOR
      description: GM3 is sialylated by ST8SIA1 to GD3 (b-series).
    - source: ganglio_gm3
      target: ganglio_gm2gd2
      connection_type: PROVIDES_INPUT_FOR
      description: GM3 (a-series) is elongated with GalNAc by B4GALNT1 to GM2.
    - source: ganglio_gd3
      target: ganglio_gm2gd2
      connection_type: PROVIDES_INPUT_FOR
      description: GD3 (b-series) is likewise elongated by B4GALNT1 to GD2.
    - source: globo_gb3
      target: globo_gb4
      connection_type: PROVIDES_INPUT_FOR
      description: Gb3 is extended by B3GALNT1 to globoside (Gb4).
  notes: >-
    Glycosphingolipid biosynthesis (GO:0006688 + GO:0001574), grounded to ten completed human gene reviews,
    all Golgi-membrane glycosyltransferases except the ER galactosyltransferase UGT8. TRUNK: UGCG (Q16739
    PTHR12726, GO:0008120 ceramide->GlcCer; eliglustat drug target) -> B4GALT5 (O43286, major) + B4GALT6
    (Q9UBX8) share PTHR19300, GO:0008489 GlcCer->LacCer (branch point). PARALLEL: UGT8 (Q16880 PTHR48043,
    GO:0003851 ceramide->GalCer, ER; myelin/sulfatide branch — note GO:0008489 is the LacCer-synthase reaction,
    NOT UGT8's, corrected in that review). From LacCer, THREE series: GANGLIO — ST3GAL5 (Q9UNP4 PTHR13713,
    GO:0047291 GM3 synthase; GM3-synthase-deficiency epilepsy) -> ST8SIA1 (Q92185 PTHR11987, GO:0003828 GD3
    synthase, b-series) and B4GALNT1 (Q00973 PTHR15046, GO:0003947 GM2/GD2 synthase; SPG26); GLOBO — A4GALT
    (Q9NPC4 PTHR12042, GO:0050512 Gb3/CD77 synthase, Shiga-toxin receptor/Pk) -> B3GALNT1 (O75752 PTHR11214,
    GO:0047273 globoside/Gb4 synthase, P antigen); (neo)LACTO — B3GNT5 (Q9BYG0, same PTHR11214, GO:0047256 Lc3
    synthase). Recurrent curation catch: these are glycoLIPID transferases, so InterPro2GO glycoPROTEIN-
    biosynthesis IEAs were over-annotated/removed. Downstream sialic-acid donors come from the sialic-acid
    module; degradation is the (separate) lysosomal glycosphingolipid-degradation module. GO term ids/labels
    verified against the local go.db. Disorders: ST3GAL5 & B4GALNT1 (neuro), A4GALT/B3GALNT1 (P blood group).
