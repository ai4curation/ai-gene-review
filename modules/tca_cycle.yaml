id: MODULE:tca_cycle
title: Tricarboxylic acid cycle
description: >-
  A taxon-neutral module for the oxidative tricarboxylic acid (TCA) cycle,
  covering acetyl-CoA entry through citrate synthase, citrate/isocitrate
  interconversion, oxidative decarboxylation to succinyl-CoA, succinate-level
  phosphorylation, succinate oxidation through respiratory complex II, fumarate
  hydration, and malate oxidation to regenerate oxaloacetate. The module also
  records common bacterial alternatives at the malate/oxaloacetate node and
  pyruvate carboxylase as an anaplerotic input to oxaloacetate.
status: DRAFT
evidence:
  - source_id: GO:0006099
    title: tricarboxylic acid cycle
    statement: >-
      GO represents the TCA cycle as the pathway that oxidizes acetyl-CoA to
      CO2 while generating reducing equivalents and regenerating oxaloacetate.
  - source_id: file:genes/PSEPK/gltA/gltA-ai-review.yaml
    title: PSEPK gltA gene review
    statement: >-
      PSEPK GltA is a curated citrate synthase and marks acetyl-CoA entry into
      the KT2440 TCA cycle.
  - source_id: file:genes/PSEPK/sdhA/sdhA-ai-review.yaml
    title: PSEPK sdhA gene review
    statement: >-
      PSEPK SdhA is curated as the catalytic flavoprotein subunit of succinate
      dehydrogenase, connecting the TCA cycle to the respiratory quinone pool.
  - source_id: file:modules/tca_cycle-deep-research-openscientist.md
    title: OpenScientist module research for the TCA cycle
    statement: >-
      The generic module-level research supports the oxidative TCA-cycle
      boundary, including bacterial variants at fumarase and malate oxidation
      and treating pyruvate carboxylase as an anaplerotic input rather than a
      cyclic reaction.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__tca_cycle__ppu00020-deep-research-openscientist.md
    title: OpenScientist PSEPK/ppu00020 TCA-cycle research
    statement: >-
      The P. putida KT2440 pathway report concludes that the oxidative TCA
      cycle is satisfiable, with quinone-linked MQO as the primary malate
      oxidation branch and with scpC/prpC treated as methylcitrate or
      CoA-transferase boundary cases rather than core SCS/citrate synthase
      replacements.
notes: >-
  Reusable boundary: this module describes the oxidative TCA cycle and its
  immediate bacterial alternatives, not every KEGG ppu00020 neighbor. Pyruvate
  dehydrogenase supplies acetyl-CoA upstream, pyruvate carboxylase is modeled as
  an anaplerotic oxaloacetate input, and methylcitrate/propionyl-CoA
  CoA-transferase proteins should be treated as adjacent propionate-metabolism
  context unless direct evidence places them in the main cyclic flux. The PSEPK
  instantiation is satisfiable with gltA/Q88FA4, acnB/Q88KF1 plus acnA-I/Q88L24,
  icd/Q88FS2 plus idh/Q88FS1, sucA/Q88FA9-sucB/Q88FB0 with lpdG/Q88FB1 or
  related E3 components, sucD/Q88FB3-sucC/Q88FB2, sdhABCD/Q88FA7-Q88FA8-Q88FA5-Q88FA6,
  fumarase paralogs including fumC/Q88M20 and fumC-I/Q88PA6, and malate oxidation
  by mqo1/Q88PU7, mqo2/Q88NF9, mqo3/Q88IS4, and/or mdh/Q88Q44.
module:
  id: tca_cycle
  label: Tricarboxylic acid cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: tricarboxylic acid cycle
      term:
        id: GO:0006099
        label: tricarboxylic acid cycle
      description: >-
        Oxidative central-carbon cycle from acetyl-CoA entry to regeneration of
        oxaloacetate through citrate, isocitrate, 2-oxoglutarate, succinyl-CoA,
        succinate, fumarate, and malate.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Most bacterial TCA enzymes are soluble cytosolic enzymes.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: >-
          Bacterial succinate dehydrogenase is an inner-membrane respiratory
          complex that faces the cytoplasm and transfers electrons to quinone.
  parts:
    - order: 1
      role: acetyl-CoA entry
      node:
        id: citrate_synthase_step
        label: Citrate synthase
        module_type: REACTION
        annotons:
          - id: citrate_synthase_activity
            label: Citrate synthase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: citrate synthase activity
                term:
                  id: GO:0036440
                  label: citrate synthase activity
            function:
              preferred_term: citrate synthase activity
              term:
                id: GO:0036440
                label: citrate synthase activity
              substrates:
                - preferred_term: acetyl-CoA
                - preferred_term: oxaloacetate
                - preferred_term: H2O
              products:
                - preferred_term: citrate
                - preferred_term: CoA
            role_description: >-
              Condenses acetyl-CoA and oxaloacetate to form citrate, the
              committed entry step of the cycle.
    - order: 2
      role: citrate to isocitrate
      node:
        id: aconitate_hydratase_step
        label: Aconitate hydratase
        module_type: REACTION
        annotons:
          - id: aconitate_hydratase_activity
            label: Aconitase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: aconitate hydratase activity
                term:
                  id: GO:0003994
                  label: aconitate hydratase activity
            function:
              preferred_term: aconitate hydratase activity
              term:
                id: GO:0003994
                label: aconitate hydratase activity
              substrates:
                - preferred_term: citrate
              products:
                - preferred_term: isocitrate
            role_description: >-
              Reversibly isomerizes citrate to isocitrate through
              cis-aconitate.
    - order: 3
      role: isocitrate oxidation
      node:
        id: isocitrate_dehydrogenase_step
        label: Isocitrate dehydrogenase
        module_type: REACTION
        annotons:
          - id: isocitrate_dehydrogenase_nadp_activity
            label: NADP-dependent isocitrate dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: isocitrate dehydrogenase (NADP+) activity
                term:
                  id: GO:0004450
                  label: isocitrate dehydrogenase (NADP+) activity
            function:
              preferred_term: isocitrate dehydrogenase (NADP+) activity
              term:
                id: GO:0004450
                label: isocitrate dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: isocitrate
                - preferred_term: NADP+
              products:
                - preferred_term: 2-oxoglutarate
                - preferred_term: CO2
                - preferred_term: NADPH
            role_description: >-
              Oxidatively decarboxylates isocitrate to 2-oxoglutarate while
              reducing NADP+ in many bacteria.
    - order: 4
      role: 2-oxoglutarate oxidation
      node:
        id: oxoglutarate_dehydrogenase_complex_step
        label: 2-oxoglutarate dehydrogenase complex
        module_type: METABOLIC_PATHWAY
        description: >-
          Multienzyme oxidative decarboxylation of 2-oxoglutarate to
          succinyl-CoA by E1, E2, and E3 components.
        parts:
