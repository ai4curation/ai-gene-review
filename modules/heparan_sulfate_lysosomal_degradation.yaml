  notes: >-
    Heparan sulfate lysosomal degradation, grounded to the human enzymes IDS (UniProtKB:P22304,
    GO:0004423, EC 3.1.6.13), IDUA (P35475, GO:0003940, EC 3.2.1.76), SGSH (P51688, GO:0016250,
    EC 3.10.1.1), HGSNAT (Q68CP4, GO:0015019, EC 2.3.1.78), NAGLU (P54802, GO:0004561, EC 3.2.1.50),
    GNS (P15586, GO:0008449, EC 3.1.6.14) and GUSB (P08236, GO:0004566, EC 3.2.1.31). GO
    molecular-function/BP/location terms were taken from the completed human gene reviews and
    verified against the local go.db; Reactome reaction ids/titles were verified against the local
    reactome cache. Each step uses a PANTHER family selector with the human enzyme as representative.
    The pathway is a strictly ordered exolytic cascade acting from the non-reducing end: every step
    depends on the product of the previous one, which is why a single enzyme deficiency blocks the
    whole pathway (the biochemical basis of the mucopolysaccharidoses). Six enzymes are soluble
    lysosomal-lumen hydrolases/sulfatases; HGSNAT is uniquely a polytopic lysosomal-membrane
    transacetylase that uses cytosolic acetyl-CoA. The three sulfatases (IDS, SGSH, GNS) require the
    formylglycine catalytic residue generated by the activating enzyme SUMF1 (a separate gene).
    Upstream, heparan sulfate proteoglycans are delivered to the lysosome; several of these enzymes
    also degrade dermatan, chondroitin or keratan sulfate (GALNS, ARSB, GLB1 act in those parallel
    GAG pathways — separate/overlapping modules; ARSB already reviewed). Disorders: MPS II (IDS),
    MPS I (IDUA), MPS IIIA (SGSH), MPS IIIC (HGSNAT), MPS IIIB (NAGLU), MPS IIID (GNS) and MPS VII
    (GUSB).
