id: MODULE:heparan_sulfate_lysosomal_degradation
title: Heparan sulfate lysosomal degradation (the mucopolysaccharidoses); IDS/IDUA/SGSH/HGSNAT/NAGLU/GNS/GUSB
description: >-
  Heparan sulfate is degraded in the lysosome by an ordered, strictly sequential exolytic
  cascade that removes one monosaccharide or sulfate group at a time from the non-reducing end
  of the chain; each enzyme can act only after the preceding one has exposed its substrate, so a
  deficiency of any single step blocks the whole pathway and causes a mucopolysaccharidosis
  (MPS) with lysosomal heparan-sulfate storage. Iduronate-2-sulfatase (IDS) first removes the
  2-O-sulfate from a terminal iduronate-2-sulfate; alpha-L-iduronidase (IDUA) then hydrolyses the
  exposed iduronate; sulfamidase (SGSH) removes the N-sulfate from the terminal
  N-sulfoglucosamine; the lysosomal-membrane transacetylase HGSNAT then N-acetylates the freed
  glucosamine (using cytosolic acetyl-CoA) so that alpha-N-acetylglucosaminidase (NAGLU) can
  hydrolyse it; N-acetylglucosamine-6-sulfatase (GNS) removes a 6-O-sulfate; and
  beta-glucuronidase (GUSB) hydrolyses the terminal glucuronate — regenerating a substrate for
  IDS/IDUA as the cycle repeats. The three sulfatases (IDS, SGSH, GNS) additionally require the
  formylglycine catalytic residue generated by SUMF1. Each enzyme defines a distinct disease:
  MPS II (IDS, Hunter), MPS I (IDUA, Hurler-Scheie), MPS IIIA (SGSH, Sanfilippo A), MPS IIIC
  (HGSNAT, Sanfilippo C), MPS IIIB (NAGLU, Sanfilippo B), MPS IIID (GNS, Sanfilippo D) and MPS
  VII (GUSB, Sly).
status: DRAFT
evidence:
  - source_id: GO:0030200
    title: heparan sulfate proteoglycan catabolic process
    statement: >-
      The module is grounded in heparan sulfate proteoglycan catabolic process (GO:0030200); it
      covers the ordered lysosomal exolytic degradation of heparan sulfate.
  - source_id: GO:0006027
    title: glycosaminoglycan catabolic process
    statement: >-
      The pathway is part of lysosomal glycosaminoglycan catabolism (GO:0006027); several enzymes
      also act on dermatan/chondroitin/keratan sulfate.
  - source_id: Reactome:R-HSA-2024096
    title: HS-GAG degradation
    statement: >-
      Step order and intermediates follow the human Reactome "HS-GAG degradation" pathway
      (reactions R-HSA-1678650/1678716/1678708/1678660/1678742/1638032/1678854).
  - source_id: file:human/IDS/IDS-ai-review.yaml
    title: IDS gene review (human)
    statement: >-
      The iduronate-2-sulfatase step (UniProtKB:P22304, GO:0004423) matches the completed human IDS review.
  - source_id: file:human/IDUA/IDUA-ai-review.yaml
    title: IDUA gene review (human)
    statement: >-
      The alpha-L-iduronidase step (UniProtKB:P35475, GO:0003940) matches the completed human IDUA review.
  - source_id: file:human/SGSH/SGSH-ai-review.yaml
    title: SGSH gene review (human)
    statement: >-
      The sulfamidase (N-sulfoglucosamine sulfohydrolase) step (UniProtKB:P51688, GO:0016250) matches
      the completed human SGSH review.
  - source_id: file:human/HGSNAT/HGSNAT-ai-review.yaml
    title: HGSNAT gene review (human)
    statement: >-
      The heparan-alpha-glucosaminide N-acetyltransferase step (UniProtKB:Q68CP4, GO:0015019) matches
      the completed human HGSNAT review.
  - source_id: file:human/NAGLU/NAGLU-ai-review.yaml
    title: NAGLU gene review (human)
    statement: >-
      The alpha-N-acetylglucosaminidase step (UniProtKB:P54802, GO:0004561) matches the completed
      human NAGLU review.
  - source_id: file:human/GNS/GNS-ai-review.yaml
    title: GNS gene review (human)
    statement: >-
      The N-acetylglucosamine-6-sulfatase step (UniProtKB:P15586, GO:0008449) matches the completed
      human GNS review.
  - source_id: file:human/GUSB/GUSB-ai-review.yaml
    title: GUSB gene review (human)
    statement: >-
      The beta-glucuronidase step (UniProtKB:P08236, GO:0004566) matches the completed human GUSB review.
