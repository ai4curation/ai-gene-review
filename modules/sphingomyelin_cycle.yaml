id: MODULE:sphingomyelin_cycle
title: Sphingomyelin cycle (ceramide <-> sphingomyelin interconversion)
description: >-
  Sphingomyelin (SM) is the most abundant sphingolipid of the plasma membrane and a defining component of
  lipid rafts and the myelin sheath. The "sphingomyelin cycle" is the reversible interconversion of SM and
  ceramide, which couples membrane-lipid homeostasis to ceramide/diacylglycerol signalling. In the synthetic
  direction the sphingomyelin synthases SGMS1 (trans-Golgi) and SGMS2 (plasma membrane) transfer a
  phosphocholine head group from phosphatidylcholine (PC) to ceramide, producing SM + diacylglycerol (DAG) —
  simultaneously consuming the pro-apoptotic lipid ceramide and generating the pro-mitogenic lipid DAG. In
  the hydrolytic direction, sphingomyelinases (SM phosphodiesterases) cleave SM back to ceramide +
  phosphocholine, generating the ceramide second messenger. Human cells use several, distinguished by pH
  optimum and location: the lysosomal acid sphingomyelinase SMPD1 (turnover and the ASMase/ceramide stress
  pathway; Niemann-Pick A/B on deficiency), and the Mg2+-dependent neutral sphingomyelinases SMPD3 (nSMase2,
  the major stress-responsive plasma-membrane/Golgi enzyme controlling ceramide signalling, exosome secretion
  and bone mineralization), SMPD4 (nSMase3, ER/Golgi/nuclear-envelope) and SMPD2 (nSMase1, ER; note its
  preferred cellular substrate is lyso-platelet-activating factor, so its bulk-SMase role is limited). The
  ceramide produced feeds the ceramidase/sphingosine-1-phosphate rheostat and re-acylation pathways.
  Inherited defects illustrate the pathway: SMPD1 Niemann-Pick disease, SGMS2 and SMPD3 skeletal dysplasias,
  and SMPD4 a neurodevelopmental disorder with microcephaly.
status: DRAFT
evidence:
  - source_id: GO:0006686
    title: sphingomyelin biosynthetic process
    statement: SGMS1 and SGMS2 synthesise sphingomyelin from ceramide + PC (GO:0006686).
  - source_id: GO:0006685
    title: sphingomyelin catabolic process
    statement: SMPD1/SMPD2/SMPD3/SMPD4 hydrolyse sphingomyelin to ceramide + phosphocholine (GO:0006685).
  - source_id: file:human/SGMS1/SGMS1-ai-review.yaml
    title: SGMS1 gene review (human)
    statement: The Golgi ceramide + PC -> SM + DAG step (UniProtKB:Q86VZ5, GO:0033188) matches the completed human SGMS1 review.
  - source_id: file:human/SGMS2/SGMS2-ai-review.yaml
    title: SGMS2 gene review (human)
    statement: The plasma-membrane ceramide + PC -> SM + DAG step (UniProtKB:Q8NHU3, GO:0033188) matches the completed human SGMS2 review.
  - source_id: file:human/SMPD1/SMPD1-ai-review.yaml
    title: SMPD1 gene review (human)
    statement: The lysosomal acid SM hydrolysis step (UniProtKB:P17405, GO:0004767) matches the completed human SMPD1 review.
  - source_id: file:human/SMPD2/SMPD2-ai-review.yaml
    title: SMPD2 gene review (human)
    statement: The ER neutral SMase-1 (nSMase1) step (UniProtKB:O60906, GO:0004767) matches the completed human SMPD2 review.
  - source_id: file:human/SMPD3/SMPD3-ai-review.yaml
    title: SMPD3 gene review (human)
    statement: The plasma-membrane/Golgi neutral SMase-2 (nSMase2) step (UniProtKB:Q9NY59, GO:0004767) matches the completed human SMPD3 review.
  - source_id: file:human/SMPD4/SMPD4-ai-review.yaml
    title: SMPD4 gene review (human)
    statement: The ER/Golgi/nuclear-envelope neutral SMase-3 (nSMase3) step (UniProtKB:Q9NXE4, GO:0004767) matches the completed human SMPD4 review.
module:
