      target: neutral_sm_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: The sphingomyelin made by SGMS1/2 is a substrate for the neutral sphingomyelinases.
    - source: sphingomyelin_synthesis
      target: nsmase3_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: Sphingomyelin is also hydrolysed by nSMase3 (SMPD4).
    - source: sphingomyelin_synthesis
      target: acid_sm_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: Sphingomyelin delivered to lysosomes is hydrolysed by acid sphingomyelinase SMPD1.
    - source: neutral_sm_hydrolysis
      target: sphingomyelin_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The ceramide released by the sphingomyelinases can be re-used by the synthases, closing the SM<->
        ceramide cycle (ceramide also feeds the ceramidase/S1P rheostat and re-acylation pathways).
  notes: >-
    Sphingomyelin cycle (GO:0006686 biosynthesis + GO:0006685 catabolism), grounded to seven completed human
    gene reviews (SMPD1 reviewed/merged earlier, cited). SYNTHESIS: SGMS1 (Q86VZ5, Golgi) + SGMS2 (Q8NHU3, PM)
    share PTHR21290, GO:0033188 — they use PHOSPHATIDYLCHOLINE (not CDP-choline; the GO:0047493 CDP-choline
    term was a recurrent mis-map corrected in both reviews), producing SM + DAG. HYDROLYSIS (SM -> ceramide +
    phosphocholine, GO:0004767): acid SMPD1 (P17405 PTHR10340, lysosomal, Zn2+; Niemann-Pick A/B); Mg2+ neutral
    SMPD3/nSMase2 (Q9NY59) + SMPD2/nSMase1 (O60906) sharing PTHR16320 (SMPD3 is the major cellular nSMase;
    SMPD2's preferred substrate is lyso-PAF, so its SMase role is limited — its second MF GO:0004629 C-type
    glycerophospholipase is in the SMPD2 review); and nSMase3 SMPD4 (Q9NXE4 PTHR12988, ER/Golgi/nuclear
    envelope; several GOA entries were mis-mapped to sphingomyelin phosphodiesterase-D GO:0050290 and corrected
    to the type-C GO:0004767). The ceramide produced feeds the ceramidase/sphingosine-1-phosphate rheostat and
    de-novo ceramide modules; SGMS also links to glycerolipid signalling via DAG. GO term ids/labels verified
    against the local go.db. Disorders: SMPD1 Niemann-Pick A/B; SGMS2 and SMPD3 skeletal dysplasias; SMPD4
    neurodevelopmental disorder with microcephaly.
