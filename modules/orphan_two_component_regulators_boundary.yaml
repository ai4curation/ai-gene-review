id: MODULE:orphan_two_component_regulators_boundary
title: Orphan and generic two-component regulators boundary
description: Boundary module for the ppu02020 orphan/generic two-component-system partition in Pseudomonas
  putida KT2440. It captures three adjacent sensor/regulator branches (PP_0887/regA, PP_1182/PP_1181,
  and PP_3413/PP_3412), orphan response regulators PP_0574, bvgA, and PP_2403, orphan sensor kinase PP_2671,
  and the FecR-like PP_1007 anti-sigma sensor side context. PP_2403 is an extension from the motility/chemotaxis/biofilm
  functional bucket because OmpR/PhoB DNA-binding response-regulator evidence supersedes the CheY-like
  product-name spillover. The module also includes a regulation/signal-transduction functional-bucket
  extension for 48 KT2440 two-component proteins, grouped as the ColRS anchor branch, generic sensor kinases,
  DNA-binding response regulators, and receiver-only or noncanonical response regulators with unresolved
  cues and regulons.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this orphan/generic regulatory boundary
    module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups PP_0574, PP_0887, regA, PP_1007, bvgA, PP_1181, PP_1182, PP_2671,
    PP_3412, and PP_3413 into the orphan/generic TCS bucket.
- source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_partition.tsv
  title: PSEPK motility/chemotaxis/biofilm functional-bucket partition
  statement: The motility functional-bucket partition routes PP_2403 out of the CheY-like spillover set
    and into the orphan/generic two-component-regulator boundary.
- source_id: file:PSEPK/PP_2403/PP_2403-ai-review.yaml
  title: Curated PP_2403 review
  statement: The PP_2403 review accepts a generic DNA-binding two-component response-regulator role and
    avoids assigning canonical chemotaxis output from the CheY-like product name alone.
- source_id: file:projects/P_PUTIDA/batches/module_regulation_signal_transduction_two_component_sensors_response_regulators.tsv
  title: PSEPK regulation-bucket two-component split
  statement: The functional-bucket partition groups 48 histidine kinases, response regulators, and hybrid
    two-component proteins for conservative generic TCS curation.
notes: 'The module is intentionally conservative: it records generic two-component or anti-sigma regulatory
  functions, but does not assign target regulons, input signals, photosynthesis, virulence, or other pathway-specific
  phenotypes from names alone. PP_1007 is FecR-like anti-sigma context, not a canonical His-Asp sensor
  kinase. PP_2403 is retained here as a DNA-binding OmpR/PhoB-family orphan response regulator rather
  than as a core chemotaxis CheY output protein. The regulation-bucket extension keeps transporter-like,
  HD-GYP, ATP-binding, localization, and osmosensory side annotations out of the core pathway claim unless
  gene-specific evidence resolves the output.'
