  notes: >-
    The module models eight reaction steps and keeps molecular functions on
    leaf annotons. It intentionally has no module-level cellular location:
    bacterial enzymes are commonly cytosolic, whereas eukaryotic isoforms and
    fused CoA synthases can occupy different compartments. Family selectors
    identify established catalytic implementations, while the required
    molecular function remains the decisive criterion. Related reductase
    families should not satisfy the pantoate step without substrate-specific
    evidence. Taxon-specific precursor sources, paralogs, and pathway-map
    spillover belong in pathway-instance reviews rather than this module.
