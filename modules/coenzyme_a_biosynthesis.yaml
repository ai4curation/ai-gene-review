  notes: >-
    Coenzyme A biosynthesis from pantothenate (GO:0015937), grounded to the completed human gene
    reviews: the three catalytically active pantothenate kinases PANK1 (Q8TE04, cytosolic), PANK2
    (Q9BZ23, mitochondrial IMS, PKAN) and PANK3 (Q9H999, cytosolic) — all GO:0004594, sharing PANTHER
    PTHR12280; the CTP-dependent PPCS (Q9HAB8, GO:0004632); the FMN-dependent PPCDC (Q96CD2, GO:0004633
    + GO:0010181); and the bifunctional COASY (Q13057, GO:0004595 PPAT + GO:0004140 DPCK). The fourth
    PANK paralogue, PANK4 (Q9NVE7, on main), is a 4'-phosphopantetheine phosphatase (GO:0016791), not a
    kinase, so it is excluded from the linear pathway here. GO term ids/labels verified against the
    local go.db. CoA feeds fatty-acid oxidation/synthesis, the TCA cycle and acyl-carrier-protein
    phosphopantetheinylation. Disorders (all NBIA/metabolic): PANK2 — PKAN/NBIA1; COASY — COPAN/NBIA6
    and pontocerebellar hypoplasia; PPCS — autosomal-recessive dilated cardiomyopathy.
