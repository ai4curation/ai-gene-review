id: MODULE:coenzyme_a_biosynthesis
title: Coenzyme A biosynthesis from pantothenate (PANK1/2/3 + PPCS + PPCDC + COASY)
description: >-
  Coenzyme A (CoA) is the universal acyl-group carrier of intermediary metabolism (fatty-acid
  oxidation and synthesis, the TCA cycle, ketone bodies) and the source of the phosphopantetheine
  prosthetic group of acyl-carrier proteins. It is built from the vitamin pantothenate (vitamin B5)
  in five conserved steps. The first, rate-limiting and feedback-regulated step is phosphorylation of
  pantothenate to 4'-phosphopantothenate by pantothenate kinase; humans have three catalytically
  active isoforms — PANK1 (cytosolic/nuclear), PANK2 (mitochondrial, processed to the intermembrane
  space) and PANK3 (cytosolic) — all inhibited by acyl-CoA/CoA (a fourth paralogue, PANK4, is a
  4'-phosphopantetheine phosphatase rather than a kinase, curated separately). Phosphopantothenate is
  then conjugated with L-cysteine by the CTP-dependent phosphopantothenate--cysteine ligase PPCS, and
  the FMN-dependent phosphopantothenoylcysteine decarboxylase PPCDC removes the carboxyl group to give
  4'-phosphopantetheine. Finally the bifunctional CoA synthase COASY completes the pathway: its
  phosphopantetheine adenylyltransferase (PPAT) domain forms dephospho-CoA and its dephospho-CoA
  kinase (DPCK) domain phosphorylates it to CoA. Inherited defects cause distinct diseases: PANK2 —
  pantothenate-kinase-associated neurodegeneration (PKAN/NBIA1, brain iron accumulation); COASY —
  COASY-protein-associated neurodegeneration (COPAN/NBIA6) and pontocerebellar hypoplasia; PPCS —
  autosomal-recessive dilated cardiomyopathy.
status: DRAFT
