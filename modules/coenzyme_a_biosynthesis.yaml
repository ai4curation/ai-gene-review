id: MODULE:coenzyme_a_biosynthesis
title: Pantothenate and coenzyme A biosynthesis
description: >-
  Synthesis of pantothenate and its conversion to coenzyme A (CoA). The
  pantoate branch transfers a hydroxymethyl group to 3-methyl-2-oxobutanoate,
  reduces 2-dehydropantoate to (R)-pantoate, and condenses pantoate with
  beta-alanine to form pantothenate. Five subsequent reactions phosphorylate
  pantothenate, add and decarboxylate cysteine, adenylylate
  4'-phosphopantetheine, and phosphorylate dephospho-CoA. Enzyme architecture
  varies across taxa: pantothenate kinases occur in three unrelated families,
  CoaB and CoaC may be separate or fused, and the final CoaD and CoaE
  activities may be separate or fused in CoA synthase. Beta-alanine supply is
  an upstream dependency because organisms use different routes, including
  PanD-dependent aspartate decarboxylation, pyrimidine degradation, and uptake.
  CoA salvage, phosphopantetheine release from acyl carrier proteins, and
  downstream CoA-dependent metabolism are outside the module boundary.
status: DRAFT
evidence:
  - source_id: GO:0015940
    title: pantothenate biosynthetic process
    statement: Grounds formation of pantothenate from pantoate and beta-alanine.
  - source_id: GO:0015937
    title: coenzyme A biosynthetic process
    statement: Grounds the five conserved reactions that convert pantothenate to CoA.
  - source_id: KEGG:ppu00770
    title: Pseudomonas putida KT2440 pantothenate and CoA biosynthesis map
    statement: >-
      Grounds the PSEPK pathway instance and its exact PanB, PanC, PanE-like,
      CoaX, CoaBC, CoaD, and CoaE candidates. Broad map membership is not used
      by itself to promote salvage or pyrimidine-catabolism proteins into this
      reaction chain.
  - source_id: PMID:26913973
    title: The revisited genome of Pseudomonas putida KT2440 enlightens its value as a robust metabolic chassis.
    statement: >-
      The KT2440 genome reannotation supports reductive pyrimidine degradation
      as a source of beta-alanine. This resolves substrate supply without
      inventing a PanD ortholog or making pyrimidine catabolism a core part of
      the reusable module.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      Provides accession and locus mappings used for the PSEPK satisfiability
      check and exposes broad KEGG spillover that requires manual boundary
      review.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__coenzyme_a_biosynthesis__ppu00770-deep-research-openscientist.md
    title: OpenScientist PSEPK module, pathway, and taxon synthesis
    statement: >-
      Species-aware retrieval used to assess paralog candidates, beta-alanine
      supply, and the distinction between biosynthesis and salvage mappings.
  - source_id: file:human/PPCS/PPCS-ai-review.yaml
    title: Human PPCS gene review
    statement: Grounds the standalone ATP-preferring phosphopantothenate--cysteine ligase implementation.
  - source_id: file:human/PPCDC/PPCDC-ai-review.yaml
    title: Human PPCDC gene review
    statement: Grounds the standalone phosphopantothenoylcysteine decarboxylase implementation.
  - source_id: file:human/COASY/COASY-ai-review.yaml
    title: Human COASY gene review
    statement: Grounds the fused PPAT and dephospho-CoA kinase implementation.
  - source_id: file:PSEPK/panB/panB-ai-review.yaml
    title: PSEPK PanB gene review
    statement: Grounds the bacterial ketopantoate-hydroxymethyltransferase implementation.
  - source_id: file:PSEPK/panE/panE-ai-review.yaml
    title: PSEPK PanE gene review
    statement: Grounds the canonical bacterial ketopantoate-reductase implementation.
  - source_id: file:PSEPK/panC/panC-ai-review.yaml
    title: PSEPK PanC gene review
    statement: Grounds the bacterial pantothenate-synthetase implementation.
  - source_id: file:PSEPK/coaX/coaX-ai-review.yaml
    title: PSEPK CoaX gene review
    statement: Grounds the bacterial type III pantothenate kinase implementation.
  - source_id: file:PSEPK/dfp/dfp-ai-review.yaml
    title: PSEPK CoaBC gene review
    statement: Grounds the fused bacterial CoaB and CoaC implementation.
  - source_id: file:PSEPK/coaD/coaD-ai-review.yaml
    title: PSEPK CoaD gene review
    statement: Grounds the standalone bacterial phosphopantetheine adenylyltransferase implementation.
  - source_id: file:PSEPK/coaE/coaE-ai-review.yaml
    title: PSEPK CoaE gene review
    statement: Grounds the standalone bacterial dephospho-CoA kinase implementation.
