id: MODULE:gpcr_plc_calcium_pkc_signaling
title: GPCR-PLC-calcium-PKC signaling pathway module
description: >-
  A compact Gq/11-coupled GPCR signaling module. Agonist-bound GPCR activates
  G alpha q/11, which stimulates phospholipase C beta to cleave PIP2 into IP3
  and DAG. IP3 releases calcium from intracellular stores, calcium/calmodulin
  activates calcium-sensitive effectors, and DAG plus calcium activates
  conventional PKC isoforms such as PRKCA. The pathway is grounded in
  GO:0007200 and includes PAINT ancestry where local seed rows support PRKCA and
  calmodulin roles.
status: DRAFT
evidence:
  - source_id: GO:0007200
    title: phospholipase C-activating G protein-coupled receptor signaling pathway
    statement: The module is grounded in the GO biological process term for PLC-activating GPCR signaling.
