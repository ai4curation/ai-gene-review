knowledge_gaps:
  - gap_statement: The Dual Nature of c-FLIP_L remains unresolved in the Death receptor apoptotic 
      signaling pathway module.
    boundary: Whether c-FLIP_L functions as an apoptosis inhibitor or promoter remains 
      context-dependent and mechanistically debated. At physiological expression levels, c-FLIP_L 
      can promote limited procaspase-8 activation through heterodimerization, but this activity is 
      restricted to specific substrates (e.g., RIPK1) and does not lead to effector caspase 
      activation (frazzette2022superresolutionimagingof pages 4-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/death_receptor_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: 'Caspase-10: Redundant or Distinct? remains unresolved in the Death receptor apoptotic
      signaling pathway module.'
    boundary: Caspase-10, another DED-containing initiator caspase, can associate with FADD at the 
      DISC but its functional relationship with caspase-8 is unclear 
      (frazzette2022superresolutionimagingof pages 2-3, seyrek2024thecrosstalkof pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
