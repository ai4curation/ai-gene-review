  - gap_statement: Threshold Signaling and the Apoptosis/Survival Switch remains unresolved in the 
      Death receptor apoptotic signaling pathway module.
    boundary: Mathematical modeling and experimental data support a threshold model in which low 
      CD95 stimulation generates longer DED filaments with higher c-FLIP content, favoring survival 
      signaling and NF-kappaB activation, while high stimulation produces shorter filaments with 
      lower c-FLIP, enabling full caspase-8 processing and apoptosis (seyrek2024thecrosstalkof pages
      7-8, seyrek2024thecrosstalkof pages 22-24, seyrek2024thec...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/death_receptor_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Mechanisms Determining the Type I/Type II Distinction remains unresolved in the 
      Death receptor apoptotic signaling pathway module.
    boundary: The mechanistic basis for why some cell types produce high DISC caspase-8 output (type
      I) while others produce low output (type II) is not fully resolved. Proposed factors include 
      differential XIAP expression levels, Fas expression density, lipid raft composition, and the 
      efficiency of receptor clustering (seyrek2024thecrosstalkof pages 5-7, 
      frazzette2022superresolutionimagingof pages 4-5).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/death_receptor_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Non-Apoptotic Functions of Death Receptors remains unresolved in the Death 
      receptor apoptotic signaling pathway module.
    boundary: Accumulating evidence demonstrates that death receptors can activate NF-kappaB, MAPK, 
      and cell migration pathways independently of-or concurrent with-apoptosis 
      (seyrek2024thecrosstalkof pages 2-4, seyrek2024thecrosstalkof pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/death_receptor_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Caspase-8 Homo-oligomerization vs. Heterodimer Models remains unresolved in the 
      Death receptor apoptotic signaling pathway module.
    boundary: The prevailing model holds that caspase-8 homo-oligomerization drives full apoptotic 
      activation while heterodimerization with c-FLIP_L promotes limited activation and necroptosis 
      suppression.
