    - source: plp_synthesis_salvage
      target: plp_homeostasis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        PDXK/PNPO produce PLP; PDXP dephosphorylates PLP back to pyridoxal, closing the B6-vitamer
        homeostasis cycle that keeps intracellular PLP within the range required by PLP-dependent enzymes.
  notes: >-
    Vitamin B6 / pyridoxal 5'-phosphate salvage and homeostasis (GO:0009443 / GO:0042816), grounded to
    the completed human gene reviews: PDXK (O00764, GO:0008478 pyridoxal kinase + Mg/Zn), PNPO (Q9NVS9,
    GO:0004733 pyridoxamine-phosphate oxidase + FMN GO:0010181, terminal rate-limiting PLP-producing
    step) and PDXP/chronophin (Q96GD0, GO:0033883 pyridoxal phosphatase + Mg; with a genuine second
    role as a cofilin/ADF phospho-Ser3 phosphatase, GO:0004721, regulating actin depolymerisation).
    All three are cytosolic (distinct PANTHER families). PLP is the cofactor of the many PLP-dependent
    enzymes curated across these modules (transaminases GOT1/2/OAT/AADAT/PSAT1, kynureninase KYNU,
    serine hydroxymethyltransferases SHMT1/2, etc.). GO term ids/labels verified against the local
    go.db. Disorders: PNPO deficiency — pyridoxal-5'-phosphate-responsive neonatal epileptic
    encephalopathy; PDXK variants — polyneuropathy; dysregulated PLP homeostasis affects
    neurotransmitter (GABA/dopamine/serotonin) synthesis.
