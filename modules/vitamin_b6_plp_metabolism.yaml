id: MODULE:vitamin_b6_plp_metabolism
title: Vitamin B6 (pyridoxal 5'-phosphate) salvage and homeostasis (PDXK/PNPO/PDXP)
description: >-
  Pyridoxal 5'-phosphate (PLP) is the active form of vitamin B6 and the obligatory cofactor of ~140
  human enzymes — transaminases, decarboxylases, racemases and others across amino-acid, one-carbon,
  heme and neurotransmitter metabolism. Because humans cannot synthesise the vitamin de novo, PLP is
  produced and homeostatically balanced by a small salvage pathway that interconverts the dietary B6
  vitamers and their phosphorylated forms. Pyridoxal kinase (PDXK) phosphorylates the three
  unphosphorylated vitamers — pyridoxal, pyridoxine and pyridoxamine — with ATP (and a divalent
  metal) to pyridoxal 5'-phosphate (PLP), pyridoxine 5'-phosphate (PNP) and pyridoxamine 5'-phosphate
  (PMP). The FMN-dependent pyridoxine 5'-phosphate oxidase (PNPO) then carries out the terminal,
  rate-limiting step, oxidising PNP and PMP to the active PLP cofactor. Balancing this, the
  magnesium-dependent pyridoxal phosphatase PDXP (chronophin) dephosphorylates PLP back to pyridoxal,
  tuning intracellular PLP levels; PDXP also has a well-documented moonlighting role dephosphorylating
  the actin-regulatory protein cofilin (phospho-Ser3) to promote actin depolymerisation. Inherited
  PNPO deficiency causes a severe pyridoxal-5'-phosphate-responsive neonatal epileptic encephalopathy,
  underscoring how tightly neuronal PLP supply depends on this pathway.
status: DRAFT
evidence:
  - source_id: GO:0009443
    title: pyridoxal 5'-phosphate salvage
    statement: The pathway carries out pyridoxal 5'-phosphate salvage (GO:0009443) from dietary B6 vitamers.
  - source_id: GO:0042816
    title: vitamin B6 metabolic process
    statement: It constitutes the core of vitamin B6 metabolic process (GO:0042816) in humans.
  - source_id: file:human/PDXK/PDXK-ai-review.yaml
    title: PDXK gene review (human)
    statement: The vitamer-phosphorylation step (UniProtKB:O00764, GO:0008478) matches the completed human PDXK review.
  - source_id: file:human/PNPO/PNPO-ai-review.yaml
    title: PNPO gene review (human)
    statement: The PNP/PMP->PLP oxidation step (UniProtKB:Q9NVS9, GO:0004733) matches the completed human PNPO review.
  - source_id: file:human/PDXP/PDXP-ai-review.yaml
    title: PDXP gene review (human)
    statement: The PLP dephosphorylation (homeostasis) step (UniProtKB:Q96GD0, GO:0033883) matches the completed human PDXP review.
