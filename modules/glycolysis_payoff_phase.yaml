id: MODULE:glycolysis_payoff_phase
title: Glycolysis II — payoff phase (glyceraldehyde-3-phosphate → pyruvate); PGK/PGAM/enolase/PK deficiencies
description: >-
  The payoff (energy-yielding) phase of glycolysis is the second half of the cytosolic
  pathway, converting each glyceraldehyde-3-phosphate produced in the investment phase
  into pyruvate while generating ATP and NADH. Five steps: glyceraldehyde-3-phosphate
  dehydrogenase (GAPDH) oxidises and phosphorylates glyceraldehyde-3-phosphate to
  1,3-bisphosphoglycerate, reducing NAD+ to NADH; phosphoglycerate kinase (PGK1)
  transfers a phosphate from 1,3-bisphosphoglycerate to ADP, forming 3-phosphoglycerate
  and the first ATP (substrate-level phosphorylation); phosphoglycerate mutase (muscle
  PGAM2) isomerises 3-phosphoglycerate to 2-phosphoglycerate; enolase (muscle ENO3)
  dehydrates 2-phosphoglycerate to phosphoenolpyruvate; and pyruvate kinase (liver/RBC
  PKLR, or muscle/other PKM) transfers the phosphate of phosphoenolpyruvate to ADP,
  forming pyruvate and the second ATP. Per glucose (two trioses) the payoff phase yields
  4 ATP and 2 NADH, for a net glycolytic gain of 2 ATP + 2 NADH + 2 pyruvate. Because
  mature erythrocytes rely entirely on glycolytic ATP, defects here characteristically
  cause hereditary nonspherocytic hemolytic anemia, often combined with tissue-specific
  features: PGK1 deficiency (X-linked hemolytic anemia + myopathy + CNS disease); PGAM2
  deficiency = glycogen storage disease type X (muscle); ENO3 deficiency = GSD type XIII
  (muscle); and PKLR deficiency = pyruvate kinase deficiency, the commonest glycolytic
  cause of hemolytic anemia.
status: DRAFT
evidence:
  - source_id: GO:0006096
    title: glycolytic process
    statement: >-
      The module is grounded in the GO glycolytic process (GO:0006096); it covers the
      payoff-phase steps from glyceraldehyde-3-phosphate to pyruvate.
  - source_id: Reactome:R-HSA-70171
    title: Glycolysis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome "Glycolysis"
      reactions R-HSA-70449 (GAPDH), R-HSA-71850 (PGK1), R-HSA-71654 (PGAM),
      R-HSA-71660 (enolase) and R-HSA-71670 (pyruvate kinase).
  - source_id: file:human/GAPDH/GAPDH-ai-review.yaml
    title: GAPDH gene review (human)
    statement: >-
      The glyceraldehyde-3-phosphate dehydrogenase step (UniProtKB:P04406, GO:0004365)
      matches the previously completed human GAPDH review (already on main).
  - source_id: file:human/PGK1/PGK1-ai-review.yaml
    title: PGK1 gene review (human)
    statement: >-
      The phosphoglycerate kinase step (UniProtKB:P00558, GO:0004618) matches the
      completed human PGK1 review.
  - source_id: file:human/PGAM2/PGAM2-ai-review.yaml
    title: PGAM2 gene review (human)
    statement: >-
      The phosphoglycerate mutase step (UniProtKB:P15259, GO:0004619) matches the
      completed human PGAM2 review.
  - source_id: file:human/ENO3/ENO3-ai-review.yaml
    title: ENO3 gene review (human)
    statement: >-
      The enolase step (UniProtKB:P13929, GO:0004634) matches the completed human
      ENO3 review.
  - source_id: file:human/PKLR/PKLR-ai-review.yaml
    title: PKLR gene review (human)
    statement: >-
      The pyruvate kinase step (UniProtKB:P30613, GO:0004743) matches the completed
      human PKLR review.
  - source_id: file:human/PKM/PKM-ai-review.yaml
    title: PKM gene review (human)
    statement: >-
      The muscle/other pyruvate kinase isozyme of the final step (UniProtKB:P14618,
      GO:0004743) matches the previously completed human PKM review (already on main).
module:
  id: glycolysis_payoff_phase
  label: Glycolysis (payoff phase)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycolytic process
      term:
        id: GO:0006096
        label: glycolytic process
      description: >-
        Payoff-phase conversion of glyceraldehyde-3-phosphate to pyruvate, yielding
        ATP and NADH.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The glycolytic enzymes are cytosolic.
  parts:
    - order: 1
      role: oxidative phosphorylation of the triose (NAD+ reduction)
      node:
        id: gapdh_step
        label: D-glyceraldehyde-3-phosphate + NAD+ + Pi to 1,3-bisphosphoglycerate + NADH
        module_type: REACTION
        annotons:
          - id: gapdh_activity
            label: "GAPDH: glyceraldehyde-3-phosphate dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glyceraldehyde-3-phosphate dehydrogenase family (GAPDH/GAPDHS)
                term:
                  id: PANTHER:PTHR10836
                  label: GLYCERALDEHYDE-3-PHOSPHATE DEHYDROGENASE
                representative_members:
                  - preferred_term: GAPDH (human)
                    term:
                      id: UniProtKB:P04406
                      label: Glyceraldehyde-3-phosphate dehydrogenase
            function:
              preferred_term: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
              term:
                id: GO:0004365
                label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
              substrates:
                - preferred_term: D-glyceraldehyde 3-phosphate
                - preferred_term: NAD+
                - preferred_term: phosphate
              products:
                - preferred_term: 1,3-bisphospho-D-glycerate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.2.1.12
                  statement: glyceraldehyde-3-phosphate dehydrogenase (NAD+, phosphorylating)
                - source_id: Reactome:R-HSA-70449
                  statement: "GADPH tetramer dehydrogenates GA3P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Couples oxidation of glyceraldehyde-3-phosphate to formation of the
              high-energy acyl-phosphate 1,3-bisphosphoglycerate and reduction of NAD+
              to NADH (reviewed previously; also a well-known moonlighting protein).
    - order: 2
      role: first substrate-level ATP generation
      node:
        id: pgk_step
        label: 1,3-bisphosphoglycerate + ADP to 3-phosphoglycerate + ATP
        module_type: REACTION
        annotons:
          - id: pgk_activity
            label: "PGK1/PGK2: phosphoglycerate kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Phosphoglycerate kinase family (PGK1/PGK2)
                term:
                  id: PANTHER:PTHR11406
                  label: PHOSPHOGLYCERATE KINASE
                representative_members:
                  - preferred_term: PGK1 (human, somatic)
                    term:
                      id: UniProtKB:P00558
                      label: Phosphoglycerate kinase 1
            function:
              preferred_term: phosphoglycerate kinase activity
              term:
                id: GO:0004618
                label: phosphoglycerate kinase activity
              substrates:
                - preferred_term: 1,3-bisphospho-D-glycerate
                - preferred_term: ADP
              products:
                - preferred_term: 3-phospho-D-glycerate
                - preferred_term: ATP
              evidence:
                - source_id: EC:2.7.2.3
                  statement: phosphoglycerate kinase; first substrate-level phosphorylation (reversible in gluconeogenesis)
                - source_id: Reactome:R-HSA-71850
                  statement: "PGK complexes dephosphorylate 1,3BPG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Generates the first ATP of glycolysis by substrate-level phosphorylation
              (reverse direction in gluconeogenesis). X-linked PGK1 deficiency causes
              hemolytic anemia with myopathy and CNS disease; PGK2 is testis-specific.
    - order: 3
      role: phosphoglycerate isomerisation
      node:
        id: pgam_step
        label: 3-phosphoglycerate to 2-phosphoglycerate
        module_type: REACTION
        annotons:
          - id: pgam_activity
            label: "PGAM1/PGAM2: phosphoglycerate mutase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cofactor-dependent phosphoglycerate mutase family (PGAM1/PGAM2/BPGM)
                term:
                  id: PANTHER:PTHR11931
                  label: PHOSPHOGLYCERATE MUTASE
                representative_members:
                  - preferred_term: PGAM2 (human, muscle isozyme)
                    term:
                      id: UniProtKB:P15259
                      label: Phosphoglycerate mutase 2
            function:
              preferred_term: phosphoglycerate mutase activity
              term:
                id: GO:0004619
                label: phosphoglycerate mutase activity
              substrates:
                - preferred_term: 3-phospho-D-glycerate
              products:
                - preferred_term: 2-phospho-D-glycerate
              evidence:
                - source_id: EC:5.4.2.11
                  statement: cofactor (2,3-BPG)-dependent phosphoglycerate mutase; phospho-histidine mechanism
                - source_id: Reactome:R-HSA-71654
                  statement: "PGAM dimers isomerise 3PG to 2PG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Interconverts 3- and 2-phosphoglycerate (dimer of the muscle PGAM2/M and
              brain PGAM1/B subunits; muscle = PGAM2 homodimer). PGAM2 deficiency = GSD
              type X (exercise intolerance, myoglobinuria).
    - order: 4
      role: dehydration to the high-energy enol phosphate
      node:
        id: enolase_step
        label: 2-phosphoglycerate to phosphoenolpyruvate + H2O
        module_type: REACTION
        annotons:
          - id: enolase_activity
            label: "ENO1/ENO2/ENO3: enolase (phosphopyruvate hydratase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Enolase family (ENO1/ENO2/ENO3)
                term:
                  id: PANTHER:PTHR11902
                  label: ENOLASE
                representative_members:
                  - preferred_term: ENO3 (human, muscle beta-enolase)
                    term:
                      id: UniProtKB:P13929
                      label: Beta-enolase
            function:
              preferred_term: phosphopyruvate hydratase activity
              term:
                id: GO:0004634
                label: phosphopyruvate hydratase activity
              substrates:
                - preferred_term: 2-phospho-D-glycerate
              products:
                - preferred_term: phosphoenolpyruvate
                - preferred_term: water
              evidence:
                - source_id: EC:4.2.1.11
                  statement: enolase (phosphopyruvate hydratase); Mg2+-dependent; dimer of ENO1/ENO2/ENO3 isozymes
                - source_id: Reactome:R-HSA-71660
                  statement: "Enolase dimers dehydrates 2PG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Mg2+-dependent dehydration of 2-phosphoglycerate to phosphoenolpyruvate.
              Tissue isozymes ENO1 (alpha, ubiquitous), ENO2 (gamma, neuronal), ENO3
              (beta, muscle); ENO3 deficiency = GSD type XIII.
    - order: 5
      role: second substrate-level ATP generation (final, committed)
      node:
        id: pk_step
        label: phosphoenolpyruvate + ADP to pyruvate + ATP
        module_type: REACTION
        annotons:
          - id: pk_activity
            label: "PKM/PKLR: pyruvate kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pyruvate kinase family (PKM/PKLR)
                term:
                  id: PANTHER:PTHR11817
                  label: PYRUVATE KINASE
                representative_members:
                  - preferred_term: PKLR (human, liver/red-cell isozyme)
                    term:
                      id: UniProtKB:P30613
                      label: Pyruvate kinase PKLR
                  - preferred_term: PKM (human, muscle/M1-M2 isozyme)
                    term:
                      id: UniProtKB:P14618
                      label: Pyruvate kinase PKM
            function:
              preferred_term: pyruvate kinase activity
              term:
                id: GO:0004743
                label: pyruvate kinase activity
              substrates:
                - preferred_term: phosphoenolpyruvate
                - preferred_term: ADP
              products:
                - preferred_term: pyruvate
                - preferred_term: ATP
              evidence:
                - source_id: EC:2.7.1.40
                  statement: pyruvate kinase; final, essentially irreversible ATP-generating step; Mg2+/K+; F1,6BP-activated
                - source_id: Reactome:R-HSA-71670
                  statement: "Pyruvate kinase dephosphorylates PEP to PYR (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Final, essentially irreversible glycolytic step generating the second ATP;
              homotetramer, Mg2+/K+-dependent, allosterically activated by
              fructose-1,6-bisphosphate. PKLR (liver/RBC) deficiency = pyruvate kinase
              deficiency (commonest glycolytic hemolytic anemia); PKM = muscle/other.
  connections:
    - source: gapdh_step
      target: pgk_step
      connection_type: PROVIDES_INPUT_FOR
      description: 1,3-bisphosphoglycerate from GAPDH is the substrate for PGK1.
    - source: pgk_step
      target: pgam_step
      connection_type: PROVIDES_INPUT_FOR
      description: 3-phosphoglycerate from PGK1 is isomerised by PGAM.
    - source: pgam_step
      target: enolase_step
      connection_type: PROVIDES_INPUT_FOR
      description: 2-phosphoglycerate from PGAM is dehydrated by enolase.
    - source: enolase_step
      target: pk_step
      connection_type: PROVIDES_INPUT_FOR
      description: Phosphoenolpyruvate from enolase is converted to pyruvate by pyruvate kinase.
  notes: >-
    Five-step payoff phase of glycolysis grounded to the human enzymes GAPDH
    (UniProtKB:P04406, GO:0004365), phosphoglycerate kinase PGK1 (P00558, GO:0004618),
    phosphoglycerate mutase PGAM2 (P15259, GO:0004619), beta-enolase ENO3 (P13929,
    GO:0004634) and pyruvate kinase PKLR (P30613) / PKM (P14618) (GO:0004743). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction
    ids and titles were verified against the local reactome cache. Each step uses a
    PANTHER family selector generic over the tissue isozymes and orthologs (PGAM node
    covers PGAM1/PGAM2/BPGM; enolase node ENO1/ENO2/ENO3; pyruvate-kinase node PKLR +
    PKM). GAPDH and PKM were reviewed previously (already on main) and are cross-linked
    via file: evidence; PGK1/PGAM2/ENO3/PKLR are the reviews new in this batch. Upstream,
    the two glyceraldehyde-3-phosphate molecules come from the glycolysis investment
    phase (hexokinase -> GPI -> PFK -> aldolase -> TPI); downstream, pyruvate feeds the
    pyruvate-metabolism module (PDC/PC) and lactate fermentation (LDHA/LDHB, a separate
    module), while the reverse reactions (except the PFK/PK/hexokinase committed steps)
    serve gluconeogenesis. Moonlighting roles (GAPDH; PGK1 extracellular reductase; PKM2
    nuclear/protein-kinase) are captured non-core in the individual gene reviews.
    Disorders: PGK1 (X-linked hemolytic anemia + myopathy + CNS); PGAM2 (GSD X); ENO3
    (GSD XIII); PKLR (pyruvate kinase deficiency, hemolytic anemia).
