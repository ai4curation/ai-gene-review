id: MODULE:branched_chain_amino_acid_catabolism
title: Branched-chain amino acid (BCAA) catabolism — transamination and the BCKDH complex
description: >-
  The committed, shared initial steps of the catabolism of the three
  branched-chain amino acids (BCAAs: L-leucine, L-isoleucine, L-valine),
  operating in the mitochondrial matrix. Branched-chain aminotransferase (BCAT2,
  the mitochondrial isozyme; BCAT1 is cytosolic) first reversibly transaminates
  each BCAA with 2-oxoglutarate to the corresponding branched-chain 2-oxo
  (alpha-keto) acid (BCKA: alpha-ketoisocaproate from Leu, alpha-keto-beta-
  methylvalerate from Ile, alpha-ketoisovalerate from Val) plus L-glutamate. The
  branched-chain alpha-ketoacid dehydrogenase (BCKDH) complex — a large
  mitochondrial multienzyme complex homologous to the pyruvate and 2-oxoglutarate
  dehydrogenase complexes — then catalyses the irreversible, rate-limiting,
  committed oxidative decarboxylation of the BCKAs to the corresponding
  branched-chain acyl-CoA thioesters + CO2 + NADH. The complex has three
  catalytic components: E1 (a thiamine-pyrophosphate-dependent decarboxylase,
  an alpha2-beta2 heterotetramer of BCKDHA/E1-alpha and BCKDHB/E1-beta) which
  decarboxylates the BCKA and reductively acylates the lipoyl arm; E2 (DBT,
  dihydrolipoyllysine-residue (2-methylpropanoyl)transferase) which forms the
  structural core and transfers the acyl group to CoA; and E3 (DLD,
  dihydrolipoyl dehydrogenase, an FAD flavoenzyme) which reoxidises the
  dihydrolipoyl arm and passes electrons to NAD+. E3/DLD is not BCKDH-specific:
  it is the common E3 shared with the pyruvate dehydrogenase, 2-oxoglutarate
  dehydrogenase and 2-oxoadipate dehydrogenase complexes and the glycine cleavage
  system. BCKDH flux is regulated by reversible phosphorylation of E1-alpha
  (inhibitory kinase BCKDK; activating phosphatase PPM1K). Inherited deficiency of
  BCKDHA, BCKDHB or DBT causes maple syrup urine disease (MSUD, from accumulation
  of BCAAs and their neurotoxic BCKAs); DLD deficiency causes a combined
  E3-deficiency phenotype (MSUD-like plus lactic acidosis / 2-oxoglutaric
  aciduria because PDH and OGDH are simultaneously impaired). Downstream, the
  branched-chain acyl-CoAs are degraded by substrate-specific dehydrogenases and
  hydratases (out of scope here) to acetyl-CoA, acetoacetate and/or
  succinyl-CoA (via propionyl-CoA/methylmalonyl-CoA for Ile and Val).
status: DRAFT
evidence:
  - source_id: GO:0009083
    title: branched-chain amino acid catabolic process
    statement: >-
      The module is grounded in the GO branched-chain amino acid catabolic
      process (GO:0009083) and the specific BCKDH step
      (GO:0120552, branched-chain alpha-keto acid decarboxylation to
      branched-chain acyl-CoA).
  - source_id: Reactome:R-HSA-70895
    title: Branched-chain amino acid catabolism
    statement: >-
      Step order and reactions follow the human Reactome "Branched-chain amino
      acid catabolism" pathway (R-HSA-70895), including the BCAT2 transamination
      (R-HSA-70724).
  - source_id: file:human/BCAT2/BCAT2-ai-review.yaml
    title: BCAT2 gene review (human)
    statement: >-
      The transamination step grounding (UniProtKB:O15382, GO:0004084
      branched-chain-amino-acid:2-oxoglutarate transaminase activity) matches the
      completed human BCAT2 review.
  - source_id: file:human/BCKDHA/BCKDHA-ai-review.yaml
    title: BCKDHA gene review (human)
    statement: >-
      The E1-alpha grounding (UniProtKB:P12694, GO:0003863 branched-chain 2-oxo
      acid dehydrogenase activity, complex GO:0160157) matches the completed human
      BCKDHA review.
  - source_id: file:human/BCKDHB/BCKDHB-ai-review.yaml
    title: BCKDHB gene review (human)
    statement: >-
      The E1-beta grounding (UniProtKB:P21953, GO:0003863, complex GO:0160157)
      matches the completed human BCKDHB review.
  - source_id: file:human/DBT/DBT-ai-review.yaml
    title: DBT gene review (human)
    statement: >-
      The E2 grounding (UniProtKB:P11182, GO:0043754 dihydrolipoamide branched
      chain acyltransferase activity, complex GO:0160157) matches the completed
      human DBT review.
  - source_id: file:human/DLD/DLD-ai-review.yaml
    title: DLD gene review (human)
    statement: >-
      The E3 grounding (UniProtKB:P09622, GO:0004148 dihydrolipoyl dehydrogenase
      (NADH) activity) matches the completed human DLD review, which documents
      DLD as the shared E3 of PDH/OGDH/BCKDH and the glycine cleavage system.
module:
  id: branched_chain_amino_acid_catabolism
  label: BCAA catabolism (transamination + BCKDH complex)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: branched-chain amino acid catabolic process
      term:
        id: GO:0009083
        label: branched-chain amino acid catabolic process
      description: Degradation of L-leucine, L-isoleucine and L-valine.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of both the BCAT2 and BCKDH-complex steps.
  parts:
    - order: 1
      role: transamination (reversible entry step)
      node:
        id: bcat2_step
        label: BCAA + 2-oxoglutarate to branched-chain 2-oxo acid + L-glutamate
        module_type: REACTION
        annotons:
          - id: bcat2_activity
            label: "BCAT2: branched-chain aminotransferase (mitochondrial)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Branched-chain aminotransferase family (BCAT1/BCAT2)
                term:
                  id: PANTHER:PTHR11825
                  label: SUBGROUP III AMINOTRANSFERASE
                representative_members:
                  - preferred_term: BCAT2 (human, mitochondrial)
                    term:
                      id: UniProtKB:O15382
                      label: Branched-chain-amino-acid aminotransferase, mitochondrial
                  - preferred_term: BCAT1 (human, cytosolic paralog)
                    term:
                      id: UniProtKB:P54687
                      label: Branched-chain-amino-acid aminotransferase, cytosolic
            function:
              preferred_term: branched-chain-amino-acid:2-oxoglutarate transaminase activity
              term:
                id: GO:0004084
                label: branched-chain-amino-acid:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: L-leucine / L-isoleucine / L-valine
                - preferred_term: 2-oxoglutarate
              products:
                - preferred_term: branched-chain 2-oxo acid (alpha-ketoisocaproate / alpha-keto-beta-methylvalerate / alpha-ketoisovalerate)
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:2.6.1.42
                  statement: branched-chain-amino-acid transaminase
                - source_id: Reactome:R-HSA-70724
                  statement: "leu, ile, or val + alpha-ketoglutarate <=> branched-chain ketoacids + glutamate (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              PLP-dependent, reversible first step committing BCAAs to catabolism
              by generating the branched-chain 2-oxo acids consumed by BCKDH. The
              mitochondrial isozyme BCAT2 is the ubiquitous form; the paralog BCAT1
              is cytosolic and more tissue-restricted (e.g. brain, some tumours).
    - order: 2
      role: committed, rate-limiting oxidative decarboxylation (multienzyme complex)
      node:
        id: bckdh_complex_step
        label: branched-chain 2-oxo acid + CoA + NAD+ to branched-chain acyl-CoA + CO2 + NADH
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: bckdha_e1alpha
            label: "BCKDHA: BCKDH E1 alpha (decarboxylase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BCKDH E1 alpha subunit family (BCKDHA)
                term:
                  id: PANTHER:PTHR43380
                  label: 2-OXOISOVALERATE DEHYDROGENASE SUBUNIT ALPHA, MITOCHONDRIAL
                representative_members:
                  - preferred_term: BCKDHA (human)
                    term:
                      id: UniProtKB:P12694
                      label: 2-oxoisovalerate dehydrogenase subunit alpha, mitochondrial
            function:
              preferred_term: branched-chain 2-oxo acid dehydrogenase activity
              term:
                id: GO:0003863
                label: branched-chain 2-oxo acid dehydrogenase activity
              substrates:
                - preferred_term: branched-chain 2-oxo acid
                - preferred_term: thiamine diphosphate (cofactor)
              products:
                - preferred_term: (decarboxylated, lipoyl-bound branched-chain acyl intermediate)
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:1.2.4.4
                  statement: 3-methyl-2-oxobutanoate dehydrogenase (2-methylpropanoyl-transferring); E1 component
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              TPP-dependent decarboxylase; with BCKDHB forms the alpha2-beta2 E1
              heterotetramer that decarboxylates the BCKA and reductively transfers
              the acyl group to the E2 lipoyl arm. E1-alpha is the phosphoregulated
              subunit (BCKDK inhibits, PPM1K activates). MSUD type Ia.
          - id: bckdhb_e1beta
            label: "BCKDHB: BCKDH E1 beta"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: BCKDH E1 beta subunit family (BCKDHB)
                term:
                  id: PANTHER:PTHR42980
                  label: 2-OXOISOVALERATE DEHYDROGENASE SUBUNIT BETA-RELATED
                representative_members:
                  - preferred_term: BCKDHB (human)
                    term:
                      id: UniProtKB:P21953
                      label: 2-oxoisovalerate dehydrogenase subunit beta, mitochondrial
            function:
              preferred_term: branched-chain 2-oxo acid dehydrogenase activity
              term:
                id: GO:0003863
                label: branched-chain 2-oxo acid dehydrogenase activity
              evidence:
                - source_id: EC:1.2.4.4
                  statement: E1 beta component of the BCKDH complex
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              The beta subunit of the E1 heterotetramer; completes the TPP-binding
              active site with E1-alpha. MSUD type Ib.
          - id: dbt_e2
            label: "DBT: BCKDH E2 (dihydrolipoyl transacylase core)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 2-oxoacid dehydrogenase E2 (dihydrolipoyl acyltransferase) family (DBT)
                term:
                  id: PANTHER:PTHR43178
                  label: DIHYDROLIPOAMIDE ACETYLTRANSFERASE COMPONENT OF PYRUVATE DEHYDROGENASE COMPLEX
                representative_members:
                  - preferred_term: DBT (human)
                    term:
                      id: UniProtKB:P11182
                      label: Lipoamide acyltransferase component of branched-chain alpha-keto acid dehydrogenase complex
            function:
              preferred_term: dihydrolipoamide branched chain acyltransferase activity
              term:
                id: GO:0043754
                label: dihydrolipoamide branched chain acyltransferase activity
              substrates:
                - preferred_term: S-(2-methylpropanoyl)-dihydrolipoyl intermediate
                - preferred_term: coenzyme A
              products:
                - preferred_term: branched-chain acyl-CoA
              evidence:
                - source_id: EC:2.3.1.168
                  statement: dihydrolipoyllysine-residue (2-methylpropanoyl)transferase; E2 core component
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Lipoyl-bearing E2 subunit forming the structural (24-mer) core of the
              complex to which E1 and E3 dock; transfers the branched-chain acyl
              group from the lipoyl arm to CoA. MSUD type II (often thiamine-responsive).
          - id: dld_e3
            label: "DLD: shared E3 (dihydrolipoyl dehydrogenase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydrolipoyl dehydrogenase / pyridine-nucleotide-disulphide oxidoreductase family (DLD)
                term:
                  id: PANTHER:PTHR22912
                  label: DISULFIDE OXIDOREDUCTASE
                representative_members:
                  - preferred_term: DLD (human)
                    term:
                      id: UniProtKB:P09622
                      label: Dihydrolipoyl dehydrogenase, mitochondrial
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
              substrates:
                - preferred_term: dihydrolipoyl-E2 (reduced lipoyl arm)
                - preferred_term: NAD+
              products:
                - preferred_term: lipoyl-E2 (reoxidised)
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.8.1.4
                  statement: dihydrolipoyl dehydrogenase; E3 component (FAD flavoenzyme)
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              FAD-dependent E3 that reoxidises the dihydrolipoyl arm, transferring
              electrons to NAD+. NOT BCKDH-specific: the common E3 shared with the
              pyruvate, 2-oxoglutarate and 2-oxoadipate dehydrogenase complexes and
              the glycine cleavage system, which is why DLD deficiency produces a
              combined multi-complex phenotype.
  connections:
    - source: bcat2_step
      target: bckdh_complex_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The branched-chain 2-oxo acids produced by BCAT2 transamination are the
        substrates oxidatively decarboxylated by the BCKDH complex.
  notes: >-
    Initial committed steps of branched-chain amino acid catabolism grounded to
    the human enzymes BCAT2 (UniProtKB:O15382, GO:0004084, EC 2.6.1.42) and the
    four BCKDH-complex subunits: E1-alpha BCKDHA (P12694, GO:0003863), E1-beta
    BCKDHB (P21953, GO:0003863), E2 DBT (P11182, GO:0043754, EC 2.3.1.168) and the
    shared E3 DLD (P09622, GO:0004148, EC 1.8.1.4). The BCKDH complex is grounded
    to GO:0160157 and the reaction to GO:0120552. GO molecular-function terms were
    taken from the human GOA records; Reactome ids/titles verified against the
    local cache. Each subunit uses a PANTHER family selector (generic over paralogs
    and orthologs) plus a concrete human representative member; BCAT2's family also
    lists the cytosolic paralog BCAT1 (UniProtKB:P54687). DLD is deliberately noted
    as the shared E3 of multiple 2-oxoacid dehydrogenase complexes, so its gene
    review and this module both flag that its role is not confined to BCAA
    catabolism. Downstream substrate-specific degradation of the branched-chain
    acyl-CoAs (e.g. IVD, MCCC, HMGCL for leucine; the propionyl-CoA route for
    isoleucine/valine) is out of scope for this module.
