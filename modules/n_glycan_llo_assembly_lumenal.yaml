  notes: >-
    Lumenal-face + glucosylation segment of dolichol-linked oligosaccharide (LLO) assembly,
    grounded to the human enzymes ALG3 (UniProtKB:Q92685, GO:0052925, EC 2.4.1.258), ALG9
    (Q9H6U8, GO:0052926 + GO:0052918, EC 2.4.1.259/261), ALG12 (Q9BV10, GO:0052917, EC 2.4.1.260),
    ALG6 (Q9Y672, GO:0042281, EC 2.4.1.267), ALG8 (Q9BVK2, GO:0042283, EC 2.4.1.265) and ALG10
    (Q5BKT4, GO:0106073, EC 2.4.1.256). GO molecular-function/location terms were taken from the
    completed human gene reviews and verified against the local go.db; Reactome reaction ids/titles
    were verified against the local reactome cache (ALG10 has no cached WT Reactome reaction, so its
    node is grounded on EC 2.4.1.256 and the umbrella pathway R-HSA-446193). Each step uses a PANTHER
    family selector with the human enzyme as representative so the module generalises across
    orthologs/paralogs; ALG9/ALG12 share PTHR22760 and ALG6/ALG8 share PTHR12413. ALG9 appears twice
    (steps 2 and 4) because it is bifunctional (adds both the 7th and 9th mannoses). All lumenal steps
    use lipid-linked donors — Dol-P-Man for mannoses, Dol-P-Glc for glucoses — supplied by the
    dolichol/sugar-donor module (DOLK, SRD5A3, DPM1/2/3, MPDU1, ALG5; to follow). Upstream is the
    cytoplasmic-face module (DPAGT1/ALG13/ALG14/ALG1/ALG2/ALG11 -> Man5GlcNAc2-PP-Dol, flipped by
    RFT1); downstream the mature Glc3Man9GlcNAc2-PP-Dol is transferred to protein by the
    oligosaccharyltransferase. Disorders: each step's loss is a CDG type I (ALG3-, ALG9-, ALG12-,
    ALG6-, ALG8-CDG; ALG6-CDG/CDG-Ic is one of the commonest).
