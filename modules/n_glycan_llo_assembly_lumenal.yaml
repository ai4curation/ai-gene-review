id: MODULE:n_glycan_llo_assembly_lumenal
title: N-glycan LLO assembly II — ER-lumenal face + glucosylation (to Glc3Man9GlcNAc2-PP-dolichol); ALG3/ALG9/ALG12/ALG6/ALG8/ALG10
description: >-
  After the Man5GlcNAc2-PP-dolichol intermediate is flipped from the cytoplasmic to the
  lumenal face of the endoplasmic-reticulum membrane (by the RFT1 flippase), the
  dolichol-linked oligosaccharide (LLO) is completed inside the ER lumen to the mature
  Glc3Man9GlcNAc2-PP-dolichol donor for protein N-linked glycosylation. Unlike the
  cytoplasmic-face steps, the lumenal glycosyltransferases use lipid-linked donors:
  dolichyl-phosphate-mannose (Dol-P-Man) for the mannose additions and
  dolichyl-phosphate-glucose (Dol-P-Glc) for the glucose additions. Four mannoses are added:
  ALG3 (alpha-1,3) adds the sixth mannose, ALG9 (alpha-1,2) adds the seventh and, later, the
  ninth mannose, and ALG12 (alpha-1,6) adds the eighth, giving Man9GlcNAc2-PP-dolichol. Three
  glucoses then cap the glycan: ALG6 (alpha-1,3) adds the first glucose, ALG8 (alpha-1,3) the
  second, and ALG10 (alpha-1,2) the third and terminal glucose, producing the mature
  Glc3Man9GlcNAc2-PP-dolichol. The terminal glucose is the recognition signal for efficient
  transfer of the glycan to nascent proteins by the oligosaccharyltransferase (and, after
  transfer, for glucosidase trimming and calnexin/calreticulin quality control). Inherited
  defects in each step cause a congenital disorder of glycosylation (CDG type I): ALG3-CDG
  (CDG-Id), ALG9-CDG (CDG-Il / Gillessen-Kaesbach-Nishimura syndrome), ALG12-CDG (CDG-Ig),
  ALG6-CDG (CDG-Ic, one of the commonest CDG-I subtypes) and ALG8-CDG (CDG-Ih).
status: DRAFT
evidence:
  - source_id: GO:0006488
    title: dolichol-linked oligosaccharide biosynthetic process
    statement: >-
      The module is grounded in dolichol-linked oligosaccharide biosynthetic process
      (GO:0006488); it covers the lumenal-face completion of the LLO to Glc3Man9GlcNAc2-PP-dolichol.
  - source_id: GO:0006487
    title: protein N-linked glycosylation
    statement: >-
      The mature glucosylated LLO is the donor for protein N-linked glycosylation (GO:0006487);
      each enzyme's loss reduces N-glycan occupancy (CDG type I).
  - source_id: Reactome:R-HSA-446193
    title: "Biosynthesis of the N-glycan precursor (dolichol lipid-linked oligosaccharide, LLO) and transfer to a nascent protein"
    statement: >-
      Step order, intermediates and reaction stoichiometries follow the human Reactome LLO
      biosynthesis sub-pathway (R-HSA-446188/446215/446198/446216/446202/446189 for the lumenal steps).
  - source_id: file:human/ALG3/ALG3-ai-review.yaml
    title: ALG3 gene review (human)
    statement: >-
      The first lumenal mannose (6th, alpha-1,3) step (UniProtKB:Q92685, GO:0052925) matches
      the completed human ALG3 review.
  - source_id: file:human/ALG9/ALG9-ai-review.yaml
    title: ALG9 gene review (human)
    statement: >-
      The 7th- and 9th-mannose (alpha-1,2) steps (UniProtKB:Q9H6U8, GO:0052926/GO:0052918)
      match the completed human ALG9 review.
  - source_id: file:human/ALG12/ALG12-ai-review.yaml
    title: ALG12 gene review (human)
    statement: >-
      The 8th-mannose (alpha-1,6) step (UniProtKB:Q9BV10, GO:0052917) matches the completed
      human ALG12 review.
  - source_id: file:human/ALG6/ALG6-ai-review.yaml
    title: ALG6 gene review (human)
    statement: >-
      The first-glucose (alpha-1,3) step (UniProtKB:Q9Y672, GO:0042281) matches the completed
      human ALG6 review.
  - source_id: file:human/ALG8/ALG8-ai-review.yaml
    title: ALG8 gene review (human)
    statement: >-
      The second-glucose (alpha-1,3) step (UniProtKB:Q9BVK2, GO:0042283) matches the completed
      human ALG8 review.
  - source_id: file:human/ALG10/ALG10-ai-review.yaml
    title: ALG10 gene review (human)
    statement: >-
      The third/terminal-glucose (alpha-1,2) step (UniProtKB:Q5BKT4, GO:0106073) matches the
      completed human ALG10 review.
