    - source: fatty_alcohol_synthesis
      target: ether_bond_formation
      connection_type: PROVIDES_INPUT_FOR
      description: FAR-made fatty alcohol is the alkyl donor AGPS uses to form the ether bond.
    - source: dhap_acylation
      target: ether_bond_formation
      connection_type: PROVIDES_INPUT_FOR
      description: GNPAT-made acyl-DHAP is the AGPS substrate whose acyl group is exchanged for the fatty alcohol.
    - source: ether_bond_formation
      target: plasmalogen_desaturation
      connection_type: PRECEDES
      description: Alkyl-DHAP is processed (reduction, acylation, headgroup addition) to plasmanylethanolamine, which PEDS1 desaturates to the plasmalogen.
  notes: >-
    Ether lipid / plasmalogen biosynthesis (GO:0008611), grounded to five completed human gene reviews. The
    peroxisomal ether-bond-forming module plus the ER plasmalogen-defining desaturation: FAR1 (Q8WVX9, rate-
    limiting, plasmalogen-feedback-regulated) / FAR2 (Q96K12, paralog), both PTHR11011, GO:0102965, reduce
    acyl-CoA -> fatty alcohol at the peroxisomal membrane; GNPAT/DHAPAT (O15228 PTHR12563, GO:0016287)
    acylates DHAP -> acyl-DHAP (first committed step); AGPS (O00116 PTHR46568, GO:0008609, FAD) exchanges the
    acyl for the FAR fatty alcohol -> alkyl-DHAP (committed ether-bond step; GNPAT-AGPS complex, peroxisomal
    matrix); after ER steps (not modelled here) PEDS1/TMEM189 (A5PLL7 PTHR48177, GO:0050207) introduces the
    vinyl-ether double bond -> plasmenylethanolamine. Curation: FAR1/FAR2 very-long-chain (GO:0080019) MF is a
    chain-length over-annotation (they prefer C16/C18, hence GO:0102965); GNPAT cytosol TAS = transient PTS1
    pre-import cargo (non-core); AGPS mitochondrion HDA = peroxisome co-fractionation contaminant. Diseases:
    rhizomelic chondrodysplasia punctata - PEX7/RCDP1, GNPAT/RCDP2, AGPS/RCDP3, FAR1/RCDP4. GO term ids/labels
    verified against the local go.db; module passes structural + term-label validation.
