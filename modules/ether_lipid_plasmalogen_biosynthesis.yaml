id: MODULE:ether_lipid_plasmalogen_biosynthesis
title: Ether lipid / plasmalogen biosynthesis (FAR1/2 -> GNPAT -> AGPS -> ... -> PEDS1)
description: >-
  Ether phospholipids, and especially the plasmalogens (1-O-alk-1'-enyl-2-acyl glycerophospholipids), are
  major membrane lipids - abundant in brain, heart and immune cells - that serve in membrane structure,
  vesicular trafficking, signalling and as endogenous antioxidants. Unlike ester glycerolipids their synthesis
  begins in the peroxisome. Fatty acyl-CoA reductase (FAR1, the rate-limiting and plasmalogen-feedback-
  regulated isoform; FAR2 a paralog) reduces long-chain fatty acyl-CoA to the fatty alcohol that will form the
  ether-linked sn-1 chain. In parallel, glyceronephosphate O-acyltransferase (GNPAT/DHAPAT) acylates
  dihydroxyacetone phosphate (DHAP) to acyl-DHAP - the first committed step. Alkyldihydroxyacetone-phosphate
  synthase (AGPS), an FAD enzyme that forms a complex with GNPAT, then exchanges the acyl group of acyl-DHAP
  for the FAR-derived fatty alcohol, creating the defining O-alkyl ether bond and yielding alkyl-DHAP. After
  further steps (reduction to alkyl-glycerol-3-phosphate, acylation, and headgroup addition, largely at the
  ER) the resulting plasmanylethanolamine is converted to the vinyl-ether plasmalogen plasmenylethanolamine by
  the ER desaturase PEDS1 (plasmanylethanolamine desaturase, formerly TMEM189), which introduces the
  characteristic 1-O-alk-1'-enyl double bond. Loss-of-function across the peroxisomal steps causes rhizomelic
  chondrodysplasia punctata (PEX7/RCDP1, GNPAT/RCDP2, AGPS/RCDP3, FAR1/RCDP4) and related plasmalogen-
  deficiency disorders.
status: DRAFT
evidence:
  - source_id: GO:0008611
    title: ether lipid biosynthetic process
    statement: FAR1/2, GNPAT, AGPS and PEDS1 build ether phospholipids/plasmalogens (GO:0008611).
  - source_id: GO:1903175
    title: fatty alcohol biosynthetic process
    statement: FAR1/FAR2 make the fatty alcohol donor for the ether bond (GO:1903175).
  - source_id: file:human/FAR1/FAR1-ai-review.yaml
    title: FAR1 gene review (human)
    statement: Fatty acyl-CoA reductase 1 (UniProtKB:Q8WVX9, GO:0102965) matches the completed human FAR1 review.
  - source_id: file:human/FAR2/FAR2-ai-review.yaml
    title: FAR2 gene review (human)
    statement: Fatty acyl-CoA reductase 2 (UniProtKB:Q96K12, GO:0102965) matches the completed human FAR2 review.
  - source_id: file:human/GNPAT/GNPAT-ai-review.yaml
    title: GNPAT gene review (human)
    statement: Glyceronephosphate O-acyltransferase (UniProtKB:O15228, GO:0016287) matches the completed human GNPAT review.
  - source_id: file:human/AGPS/AGPS-ai-review.yaml
    title: AGPS gene review (human)
    statement: Alkylglycerone-phosphate synthase (UniProtKB:O00116, GO:0008609) matches the completed human AGPS review.
  - source_id: file:human/PEDS1/PEDS1-ai-review.yaml
    title: PEDS1 gene review (human)
    statement: Plasmanylethanolamine desaturase (UniProtKB:A5PLL7, GO:0050207) matches the completed human PEDS1 review.
