id: MODULE:ubiquitin_transfer_relay
title: Generic E1-E2-E3 ubiquitin transfer relay motif
description: >-
  The minimal, reusable ubiquitin-conjugation relay: an E1 ubiquitin-activating
  enzyme adenylates ubiquitin and forms a thioester with it in an ATP-dependent
  reaction; the activated ubiquitin is passed to the active-site cysteine of an
  E2 conjugating enzyme; and an E3 ligase brings the E2~ubiquitin together with a
  selected substrate to transfer ubiquitin onto a substrate lysine. Iteration
  builds polyubiquitin chains that mark substrates for proteasomal degradation or
  other fates. The same relay (with cognate activating/conjugating/ligase
  enzymes) is reused by the ubiquitin-like modifiers SUMO, NEDD8, and ISG15. The
  motif is gene-free and taxon-neutral, fixing only the E1/E2/E3 roles by
  molecular-function term and the activating transfer topology. Grounded in
  GO:0016567 (protein ubiquitination).
status: DRAFT
evidence:
  - source_id: GO:0016567
    title: protein ubiquitination
    statement: >-
      The motif is grounded in protein ubiquitination, the E1->E2->E3 transfer of
      ubiquitin onto a substrate.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: ubiquitin_transfer_relay}]` when its steps
  instantiate the E1-activation / E2-conjugation / E3-ligation transfer. The E3
  architecture (RING, HECT, RBR; monomeric or cullin-RING/SCF) and the modifier
  identity (ubiquitin vs SUMO/NEDD8) are realization-specific.
