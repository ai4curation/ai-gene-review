id: MODULE:transport_membrane_enzyme_spillover_boundary
title: Transport-bucket membrane enzyme and envelope side-node boundary
description: Boundary module for PSEPK membrane-associated enzyme and side-node proteins pulled into transport buckets by
  membrane or enzyme keywords. It combines earlier ion/metal membrane metalloenzyme and envelope side nodes with broader peptidase,
  acyltransferase, glycosyltransferase, oxidoreductase, kinase/phosphatase, detoxification, toxin-associated, HflK/HflC, and
  low-information membrane-enzyme candidates.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_membrane_metalloenzymes_and_envelope_side_nodes.tsv
  title: PSEPK membrane metalloenzyme/envelope side-node batch
  statement: The batch table records 14 PSEPK ion/metal-bucket genes that are membrane enzymes or envelope side nodes rather
    than ion transporters.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates these side nodes from true cation transporters and redox membrane proteins.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_membrane_associated_enzymes_and_side_nodes.tsv
  title: PSEPK transport-bucket membrane-associated enzyme side-node batch
  statement: The batch table records 42 PSEPK transport/membrane/efflux-bucket genes assigned to membrane-associated hydrolase,
    peptidase, transferase, oxidoreductase, kinase, and low-information enzyme side-node contexts rather than transport systems.
notes: 'First-pass interpretation: keep this as a spillover boundary, not a transporter module. Enzyme-family calls are retained
  when product/domain and GOA agree; transporter rows inherited by histidine-kinase sensor proteins are marked as over-annotated.
  HflK/HflC and several domain-only membrane proteins are kept as side-node or location context rather than catalytic hydrolases.
  Substrate-specific calls are avoided for domain-only sulfatase, acyltransferase, oxidoreductase, sulfurtransferase, phosphatase,
  and low-information membrane proteins.'
