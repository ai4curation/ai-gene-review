              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Aminopropylates putrescine to spermidine.
    - order: 4
      role: spermine synthesis
      node:
        id: spermidine_to_spermine
        label: Spermine synthase (SMS)
        module_type: REACTION
        annotons:
          - id: sms_activity
            label: "SMS: spermine synthase"
            participant:
