                - source_id: file:human/SMS/SMS-ai-review.yaml
                  statement: Aminopropyltransferase transferring an aminopropyl group from dcSAM to spermidine to form spermine (final biosynthetic step); deficiency = Snyder-Robinson syndrome
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Aminopropylates spermidine to spermine.
    - order: 5
      role: polyamine acetylation (catabolism, rate-limiting)
      node:
        id: polyamine_acetylation
        label: Spermidine/spermine N1-acetyltransferase (SAT1)
        module_type: REACTION
        annotons:
          - id: sat1_activity
            label: "SAT1: diamine/spermidine-spermine N1-acetyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SAT1 / GNAT polyamine N-acetyltransferase family
                term:
                  id: PANTHER:PTHR10545
                  label: DIAMINE ACETYLTRANSFERASE
                representative_members:
                  - preferred_term: SAT1 (human)
                    term:
                      id: UniProtKB:P21673
                      label: Diamine acetyltransferase 1
            function:
              preferred_term: diamine N-acetyltransferase activity
              term:
                id: GO:0004145
                label: diamine N-acetyltransferase activity
              substrates:
                - preferred_term: spermine / spermidine
                - preferred_term: acetyl-CoA
              products:
                - preferred_term: N1-acetylspermine / N1-acetylspermidine
                - preferred_term: coenzyme A
              evidence:
                - source_id: file:human/SAT1/SAT1-ai-review.yaml
                  statement: Highly inducible cytosolic GNAT acetyltransferase; rate-limiting step of polyamine back-conversion/export; acetylates spermine/spermidine
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: N1-acetylates spermine/spermidine (commits to back-conversion).
    - order: 6
      role: acetylpolyamine oxidation (back-conversion)
      node:
        id: acetylpolyamine_oxidation
        label: N1-acetylpolyamine oxidase (PAOX)
        module_type: REACTION
        annotons:
          - id: paox_activity
            label: "PAOX: N1-acetylpolyamine oxidase (FAD, peroxisomal)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PAOX / FAD polyamine oxidase family
                term:
                  id: PANTHER:PTHR10742
                  label: POLYAMINE OXIDASE
                representative_members:
                  - preferred_term: PAOX (human)
                    term:
                      id: UniProtKB:Q6QHF9
                      label: Peroxisomal N(1)-acetyl-spermine/spermidine oxidase
            function:
              preferred_term: N(1)-acetylpolyamine oxidase activity
              term:
                id: GO:0052903
                label: N(1)-acetylpolyamine oxidase activity
              substrates:
                - preferred_term: N1-acetylspermine / N1-acetylspermidine
                - preferred_term: O2 (FAD)
              products:
                - preferred_term: spermidine / putrescine
                - preferred_term: 3-acetamidopropanal + H2O2
              evidence:
                - source_id: file:human/PAOX/PAOX-ai-review.yaml
                  statement: FAD-dependent peroxisomal oxidase acting on N1-ACETYLATED polyamines (produced by SAT1); completes back-conversion spermine->spermidine->putrescine
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: Oxidises N1-acetyl polyamines to shorter polyamines (+ H2O2).
    - order: 7
      role: direct spermine oxidation (back-conversion)
      node:
        id: spermine_oxidation
        label: Spermine oxidase (SMOX)
        module_type: REACTION
        annotons:
          - id: smox_activity
            label: "SMOX: spermine oxidase (FAD)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SMOX / FAD polyamine oxidase family
                term:
                  id: PANTHER:PTHR10742
                  label: POLYAMINE OXIDASE
                representative_members:
                  - preferred_term: SMOX (human)
                    term:
                      id: UniProtKB:Q9NWM0
                      label: Spermine oxidase
            function:
              preferred_term: spermine oxidase activity
              term:
                id: GO:0052901
                label: spermine oxidase activity
              substrates:
                - preferred_term: spermine (FAD)
                - preferred_term: O2
              products:
                - preferred_term: spermidine
                - preferred_term: 3-aminopropanal + H2O2
              evidence:
                - source_id: file:human/SMOX/SMOX-ai-review.yaml
                  statement: FAD-dependent oxidase acting on FREE spermine (not acetylated), giving direct back-conversion to spermidine; H2O2 links to oxidative stress/inflammation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Oxidises free spermine directly to spermidine (+ H2O2).
    - order: 8
      role: antizyme feedback (ODC inhibition/degradation)
      node:
        id: antizyme
        label: Ornithine decarboxylase antizyme 1 (OAZ1)
        module_type: REACTION
        annotons:
          - id: oaz1_activity
            label: "OAZ1: ODC antizyme (inhibitor / degradation targeting)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: OAZ / ornithine decarboxylase antizyme family
                term:
                  id: PANTHER:PTHR10279
                  label: ORNITHINE DECARBOXYLASE ANTIZYME
                representative_members:
                  - preferred_term: OAZ1 (human)
                    term:
                      id: UniProtKB:P54368
                      label: Ornithine decarboxylase antizyme 1
            processes:
              - preferred_term: polyamine metabolic process
                term:
                  id: GO:0006595
                  label: polyamine metabolic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Non-catalytic feedback regulator (GO:0008073 ODC inhibitor activity). Synthesised via a
              polyamine-stimulated +1 frameshift; binds ODC1, inhibits it and targets it for ubiquitin-
              independent 26S proteasomal degradation; also inhibits polyamine uptake.
    - order: 9
      role: antizyme inhibition (ODC activation)
      node:
        id: antizyme_inhibitor
        label: Antizyme inhibitor 1 (AZIN1)
        module_type: REACTION
        annotons:
          - id: azin1_activity
            label: "AZIN1: antizyme inhibitor (catalytically dead ODC homolog)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: AZIN / antizyme inhibitor (inactive ODC homolog) family
                term:
                  id: PANTHER:PTHR11482
                  label: ORNITHINE DECARBOXYLASE
                representative_members:
                  - preferred_term: AZIN1 (human)
                    term:
                      id: UniProtKB:O14977
                      label: Antizyme inhibitor 1
            processes:
              - preferred_term: polyamine metabolic process
                term:
                  id: GO:0006595
                  label: polyamine metabolic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Catalytically DEAD ODC homolog (no ornithine decarboxylase activity); GO:0042978 ODC
              activator activity. Binds antizyme (OAZ1) with higher affinity than ODC, sequestering it
              and releasing/stabilising active ODC1 — a positive regulator of polyamine synthesis.
  connections:
    - source: ornithine_to_putrescine
      target: putrescine_to_spermidine
      connection_type: PROVIDES_INPUT_FOR
      description: The putrescine made by ODC1 is the acceptor substrate for spermidine synthase SRM.
    - source: sam_decarboxylation
      target: putrescine_to_spermidine
      connection_type: PROVIDES_INPUT_FOR
      description: AMD1 supplies the dcSAM aminopropyl donor consumed by SRM.
    - source: sam_decarboxylation
      target: spermidine_to_spermine
      connection_type: PROVIDES_INPUT_FOR
      description: AMD1 also supplies the dcSAM aminopropyl donor consumed by SMS.
    - source: putrescine_to_spermidine
      target: spermidine_to_spermine
      connection_type: PROVIDES_INPUT_FOR
      description: The spermidine made by SRM is the acceptor substrate for spermine synthase SMS.
    - source: spermidine_to_spermine
      target: polyamine_acetylation
      connection_type: PROVIDES_INPUT_FOR
      description: Spermine (and spermidine) are N1-acetylated by SAT1 to enter back-conversion.
    - source: spermidine_to_spermine
      target: spermine_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: Free spermine is also directly oxidised to spermidine by SMOX (acetylation-independent route).
    - source: polyamine_acetylation
      target: acetylpolyamine_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: The N1-acetyl polyamines from SAT1 are oxidised by peroxisomal PAOX, completing back-conversion.
    - source: antizyme
      target: ornithine_to_putrescine
      connection_type: NEGATIVELY_REGULATES
      description: OAZ1 binds ODC1, inhibits it and targets it for ubiquitin-independent proteasomal degradation.
    - source: antizyme_inhibitor
      target: antizyme
      connection_type: NEGATIVELY_REGULATES
      description: AZIN1 sequesters OAZ1 (antizyme), releasing active ODC1 and thereby promoting polyamine synthesis.
  notes: >-
    Polyamine metabolism (GO:0006596 biosynthesis + GO:0006598 catabolism), grounded to nine completed
    human gene reviews. BIOSYNTHESIS (cytosol): ODC1 (P11926 PTHR11482, GO:0004586 PLP, ornithine->
    putrescine, rate-limiting) + AMD1 (P17707 PTHR11570, GO:0004014 pyruvoyl, SAM->dcSAM donor) -> SRM
    (P19623 PTHR11558, GO:0004766, putrescine->spermidine) -> SMS (P52788 PTHR46315, GO:0016768,
    spermidine->spermine); each aminopropyl transfer releases MTA. CATABOLISM/back-conversion: SAT1
    (P21673 PTHR10545, GO:0004145 acetyl-CoA N1-acetyltransferase, rate-limiting) -> peroxisomal PAOX
    (Q6QHF9 PTHR10742, GO:0052903 FAD, oxidises N1-ACETYL polyamines); plus SMOX (Q9NWM0, same PTHR10742
    family, GO:0052901 FAD) which oxidises FREE spermine directly (SMOX and PAOX share the polyamine-oxidase
    family but differ in substrate acetylation state). REGULATION (the hallmark antizyme loop, modelled with
    `processes`): OAZ1 (P54368 PTHR10279, GO:0008073 ODC inhibitor activity; +1-frameshift polyamine sensor;
    binds ODC1, inhibits + targets it for ubiquitin-independent 26S degradation) NEGATIVELY_REGULATES ODC1;
    AZIN1 (O14977, catalytically-DEAD ODC homolog sharing PTHR11482 with ODC1, GO:0042978 ODC activator
    activity — NOT a decarboxylase) NEGATIVELY_REGULATES OAZ1 (antizyme sequestration), net-activating ODC1.
    Spermidine also feeds eIF5A hypusination (separate pathway). GO term ids/labels verified against the
    local go.db. Disorders: ODC1 gain-of-function Bachmann-Bupp syndrome; SMS-deficiency Snyder-Robinson
    syndrome; SAT1 overactivity; broad oncology relevance (ODC is a MYC target and DFMO drug target).
