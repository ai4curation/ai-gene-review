                - preferred_term: S-adenosyl 5'-methylthiopropylamine (decarboxylated SAM, dcSAM)
                - preferred_term: CO2
              evidence:
                - source_id: file:human/AMD1/AMD1-ai-review.yaml
                  statement: Self-processing pyruvoyl-dependent decarboxylase; provides the dcSAM aminopropyl donor for SRM/SMS; allosterically activated by putrescine
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Makes decarboxylated SAM (aminopropyl donor).
    - order: 3
