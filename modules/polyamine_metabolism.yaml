id: MODULE:polyamine_metabolism
title: Polyamine metabolism (biosynthesis, back-conversion catabolism, and antizyme regulation)
description: >-
  The polyamines putrescine, spermidine and spermine are small polycationic metabolites essential for
  cell growth, chromatin and nucleic-acid stabilisation, ion-channel regulation and translation (spermidine
  is also the precursor of the eIF5A hypusine modification). Their intracellular levels are held under
  exceptionally tight homeostatic control by a biosynthetic arm, a catabolic/back-conversion arm and a
  dedicated feedback regulatory system. Biosynthesis begins with ornithine decarboxylase (ODC1), the
  rate-limiting, PLP-dependent enzyme that decarboxylates L-ornithine to putrescine. In parallel, the
  pyruvoyl-dependent S-adenosylmethionine decarboxylase (AMD1) produces decarboxylated SAM (dcSAM), the
  aminopropyl-group donor. Spermidine synthase (SRM) then transfers an aminopropyl group from dcSAM to
  putrescine to make spermidine, and spermine synthase (SMS) adds a further aminopropyl group to make
  spermine (each step releasing 5'-methylthioadenosine). Catabolism proceeds mainly by back-conversion:
  spermidine/spermine N1-acetyltransferase (SAT1) N1-acetylates spermine and spermidine using acetyl-CoA,
  and the peroxisomal FAD oxidase PAOX oxidises these N1-acetyl polyamines back to spermidine and putrescine
  (releasing H2O2 and 3-acetamidopropanal); spermine oxidase (SMOX) provides a parallel, acetylation-
  independent route that oxidises free spermine directly to spermidine. Overlaying all of this is the
  antizyme feedback loop: ornithine decarboxylase antizyme (OAZ1) — itself translated via a polyamine-
  stimulated +1 ribosomal frameshift — binds ODC1, inhibits it and targets it for ubiquitin-independent
  26S proteasomal degradation while also suppressing polyamine uptake; antizyme inhibitor (AZIN1), a
  catalytically dead ODC homolog, binds and sequesters antizyme to release active ODC1. Dysregulated
  polyamine metabolism drives cancer and several inherited disorders (ODC1 gain-of-function Bachmann-Bupp
  syndrome; SMS-deficiency Snyder-Robinson syndrome; SAT1 overactivity).
status: DRAFT
evidence:
  - source_id: GO:0006596
    title: polyamine biosynthetic process
    statement: ODC1, AMD1, SRM and SMS carry out polyamine biosynthesis (GO:0006596).
  - source_id: GO:0006598
    title: polyamine catabolic process
    statement: SAT1, PAOX and SMOX carry out polyamine catabolism / back-conversion (GO:0006598).
  - source_id: file:human/ODC1/ODC1-ai-review.yaml
    title: ODC1 gene review (human)
    statement: The ornithine->putrescine step (UniProtKB:P11926, GO:0004586) matches the completed human ODC1 review.
  - source_id: file:human/AMD1/AMD1-ai-review.yaml
    title: AMD1 gene review (human)
    statement: The SAM->dcSAM aminopropyl-donor step (UniProtKB:P17707, GO:0004014) matches the completed human AMD1 review.
  - source_id: file:human/SRM/SRM-ai-review.yaml
    title: SRM gene review (human)
    statement: The putrescine->spermidine step (UniProtKB:P19623, GO:0004766) matches the completed human SRM review.
  - source_id: file:human/SMS/SMS-ai-review.yaml
    title: SMS gene review (human)
    statement: The spermidine->spermine step (UniProtKB:P52788, GO:0016768) matches the completed human SMS review.
  - source_id: file:human/SAT1/SAT1-ai-review.yaml
    title: SAT1 gene review (human)
    statement: The polyamine N1-acetylation step (UniProtKB:P21673, GO:0004145) matches the completed human SAT1 review.
  - source_id: file:human/PAOX/PAOX-ai-review.yaml
    title: PAOX gene review (human)
    statement: The N1-acetylpolyamine oxidation step (UniProtKB:Q6QHF9, GO:0052903) matches the completed human PAOX review.
  - source_id: file:human/SMOX/SMOX-ai-review.yaml
    title: SMOX gene review (human)
    statement: The direct spermine->spermidine oxidation step (UniProtKB:Q9NWM0, GO:0052901) matches the completed human SMOX review.
  - source_id: file:human/OAZ1/OAZ1-ai-review.yaml
    title: OAZ1 gene review (human)
    statement: The antizyme (ODC inhibitor/degradation) regulator (UniProtKB:P54368, GO:0008073) matches the completed human OAZ1 review.
  - source_id: file:human/AZIN1/AZIN1-ai-review.yaml
    title: AZIN1 gene review (human)
    statement: The antizyme inhibitor / ODC activator regulator (UniProtKB:O14977, GO:0042978) matches the completed human AZIN1 review.
module:
  id: polyamine_metabolism
  label: Polyamine metabolism (biosynthesis, catabolism, antizyme regulation)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: polyamine biosynthetic process
      term:
        id: GO:0006596
        label: polyamine biosynthetic process
      description: Ornithine -> putrescine -> spermidine -> spermine, using dcSAM aminopropyl groups.
    - preferred_term: polyamine catabolic process
      term:
        id: GO:0006598
        label: polyamine catabolic process
      description: Acetylation (SAT1) + oxidation (PAOX) back-conversion, and direct spermine oxidation (SMOX).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Most polyamine enzymes and the antizyme regulators are cytosolic.
      - preferred_term: peroxisomal matrix
        term:
          id: GO:0005782
          label: peroxisomal matrix
        description: PAOX (N1-acetylpolyamine oxidase) acts in the peroxisome.
  parts:
    - order: 1
      role: putrescine synthesis (rate-limiting)
      node:
        id: ornithine_to_putrescine
        label: Ornithine decarboxylase (ODC1)
        module_type: REACTION
        annotons:
          - id: odc1_activity
            label: "ODC1: ornithine decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ODC / group IV PLP decarboxylase family
                term:
                  id: PANTHER:PTHR11482
                  label: ORNITHINE DECARBOXYLASE
                representative_members:
                  - preferred_term: ODC1 (human)
                    term:
                      id: UniProtKB:P11926
                      label: Ornithine decarboxylase
            function:
              preferred_term: ornithine decarboxylase activity
              term:
                id: GO:0004586
                label: ornithine decarboxylase activity
              substrates:
                - preferred_term: L-ornithine (PLP cofactor)
              products:
                - preferred_term: putrescine
                - preferred_term: CO2
              evidence:
                - source_id: file:human/ODC1/ODC1-ai-review.yaml
                  statement: PLP-dependent homodimer; rate-limiting first step of polyamine synthesis; short-lived, antizyme-regulated; ODC1 gain-of-function = Bachmann-Bupp syndrome
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Decarboxylates ornithine to putrescine (rate-limiting).
    - order: 2
      role: aminopropyl donor synthesis
      node:
        id: sam_decarboxylation
        label: S-adenosylmethionine decarboxylase (AMD1)
        module_type: REACTION
        annotons:
          - id: amd1_activity
            label: "AMD1: adenosylmethionine decarboxylase (pyruvoyl)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: AMD1 / S-adenosylmethionine decarboxylase family
                term:
                  id: PANTHER:PTHR11570
                  label: S-ADENOSYLMETHIONINE DECARBOXYLASE
                representative_members:
                  - preferred_term: AMD1 (human)
                    term:
                      id: UniProtKB:P17707
                      label: S-adenosylmethionine decarboxylase proenzyme
            function:
              preferred_term: adenosylmethionine decarboxylase activity
              term:
                id: GO:0004014
                label: adenosylmethionine decarboxylase activity
              substrates:
                - preferred_term: S-adenosyl-L-methionine (pyruvoyl cofactor; putrescine-activated)
