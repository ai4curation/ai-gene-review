id: MODULE:dolichyl_phosphate_biosynthesis
title: Dolichol / dolichyl-phosphate biosynthesis (cis-PT -> DOLPP1 -> SRD5A3 -> DOLK)
description: >-
  Dolichyl phosphate (Dol-P) is the essential polyprenol lipid carrier on which the eukaryotic glycosylation
  machinery assembles and delivers glycans: it anchors the lipid-linked oligosaccharide for N-linked
  glycosylation, the mannose/glucose donors (Dol-P-Man, Dol-P-Glc) for N-glycan, O-mannose, GPI-anchor and
  C/O-mannosylation, and it is regenerated after each transfer cycle. Its biosynthesis begins where the
  isoprenoid-diphosphate trunk ends: the ER-membrane cis-prenyltransferase (cis-PT) complex — catalytic
  subunit DHDDS plus the non-catalytic partner NUS1 (NgBR) — elongates (2E,6E)-farnesyl diphosphate (FPP)
  by many cis (Z)-condensations of isopentenyl diphosphate (IPP) to the long-chain dehydrodolichyl
  diphosphate (dehydro-Dol-PP). This polyprenyl diphosphate is dephosphorylated by the dolichyl-diphosphate
  phosphatase DOLPP1 (which also recycles the Dol-PP released after oligosaccharyltransferase moves the
  glycan onto protein), and the alpha-terminal isoprene unit is saturated by the polyprenol reductase SRD5A3
  to give dolichol. Dolichol kinase DOLK then phosphorylates dolichol (CTP-dependent) to Dol-P, completing
  the carrier pool. All five enzymes reside in the endoplasmic reticulum membrane. Defects across this
  module cause congenital disorders of glycosylation (DHDDS-CDG/RP59, NUS1-CDG/epileptic encephalopathy,
  SRD5A3-CDG, DOLK-CDG) and inherited retinal dystrophy.
status: DRAFT
evidence:
  - source_id: GO:0043048
    title: dolichyl monophosphate biosynthetic process
    statement: The pathway culminates in dolichyl phosphate (Dol-P) synthesis (GO:0043048).
  - source_id: GO:0016094
    title: polyprenol biosynthetic process
    statement: cis-PT + reductase build the long-chain polyprenol/dolichol backbone (GO:0016094).
  - source_id: GO:0006488
    title: dolichol-linked oligosaccharide biosynthetic process
    statement: Dol-P is the carrier for the lipid-linked oligosaccharide used in N-glycosylation (GO:0006488).
  - source_id: file:human/DHDDS/DHDDS-ai-review.yaml
    title: DHDDS gene review (human)
    statement: cis-PT catalytic subunit (UniProtKB:Q86SQ9, GO:0045547) matches the completed human DHDDS review.
  - source_id: file:human/NUS1/NUS1-ai-review.yaml
    title: NUS1 gene review (human)
    statement: cis-PT non-catalytic subunit / NgBR (UniProtKB:Q96E22, contributes_to GO:0045547) matches the completed human NUS1 review.
  - source_id: file:human/DOLPP1/DOLPP1-ai-review.yaml
    title: DOLPP1 gene review (human)
    statement: Dolichyl-diphosphate phosphatase (UniProtKB:Q86YN1, GO:0047874) matches the completed human DOLPP1 review.
  - source_id: file:human/SRD5A3/SRD5A3-ai-review.yaml
    title: SRD5A3 gene review (human)
    statement: Polyprenol reductase (UniProtKB:Q9H8P0, GO:0160198) matches the completed human SRD5A3 review.
  - source_id: file:human/DOLK/DOLK-ai-review.yaml
    title: DOLK gene review (human)
    statement: Dolichol kinase (UniProtKB:Q9UPQ8, GO:0004168) matches the completed human DOLK review.
