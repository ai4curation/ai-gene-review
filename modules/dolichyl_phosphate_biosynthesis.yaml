  notes: >-
    Dolichol / dolichyl-phosphate biosynthesis (GO:0043048 + GO:0016094), grounded to five completed human
    gene reviews; it consumes FPP/IPP from the isoprenoid_diphosphate_biosynthesis module and supplies the
    Dol-P glycan carrier to N-glycosylation (dolichol-linked oligosaccharide, GO:0006488) and to the
    downstream DPM1/DPM2/DPM3 + MPDU1 utilization steps (separate, already reviewed). Steps: (1) ER cis-PT
    complex = DHDDS (Q86SQ9 PTHR10291, catalytic, GO:0045547) + NUS1/NgBR (Q96E22 PTHR21528, obligate
    non-catalytic partner, contributes_to GO:0045547 via its C-terminal -RXG motif; in_complex GO:1904423)
    elongates FPP with many cis-IPP units -> dehydrodolichyl-PP; (2) DOLPP1 (Q86YN1 PTHR11247, GO:0047874)
    dephosphorylates Dol-PP -> Dol-P + Pi (also the recycling step after OST glycan transfer); (3) SRD5A3
    (Q9H8P0 PTHR14624, GO:0160198 polyprenal/polyprenol reductase) saturates the alpha-isoprene unit ->
    dolichol; (4) DOLK (Q9UPQ8 PTHR13205, GO:0004168 dolichol kinase, CTP-dependent) -> Dol-P. All ER-membrane
    (GO:0005789). Note the linear de-novo order (cis-PT -> dephosphorylation -> reduction -> kinase) vs the
    Dol-PP recycling arm DOLPP1 also serves; modeled as a single Dol-P-producing pathway. Defects: DHDDS-CDG/
    RP59, NUS1-CDG/epileptic encephalopathy, SRD5A3-CDG, DOLK-CDG. GO term ids/labels verified against the
    local go.db; module passes structural + term-label validation.
