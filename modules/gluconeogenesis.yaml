id: MODULE:generic_gluconeogenesis
title: Generic gluconeogenesis module
description: >-
  A generic, taxon-neutral decomposition of gluconeogenesis as a module. The
  module is intentionally phrased as a set of functions and pathway segments
  rather than as a fixed list of genes, so it can represent bacterial, fungal,
  plant, and animal implementations.
status: DRAFT
evidence:
  - source_id: MetaCyc:GLUCONEO-PWY
    title: gluconeogenesis pathway
    statement: MetaCyc represents gluconeogenesis as a conserved pathway with organism-specific enzyme variants.
  - source_id: GO:0006094
    title: gluconeogenesis
    statement: The module is grounded in the GO biological process term for gluconeogenesis.
module:
  id: generic_gluconeogenesis
  label: Generic gluconeogenesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: gluconeogenesis
      term:
        id: GO:0006094
        label: gluconeogenesis
      description: Formation of glucose or glucose precursor from non-carbohydrate substrates.
  parts:
    - order: 1
      role: carboxylation entry step
      node:
        id: pyruvate_to_oxaloacetate
        label: Pyruvate to oxaloacetate
        module_type: REACTION
        concepts:
          - preferred_term: pyruvate carboxylase reaction
            description: Carboxylation of pyruvate to oxaloacetate as a common entry into gluconeogenesis.
        annotons:
          - id: pyruvate_carboxylase_activity
            label: Pyruvate carboxylase function
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: pyruvate carboxylase activity
                term:
                  id: GO:0004736
                  label: pyruvate carboxylase activity
                substrates:
                  - preferred_term: pyruvate
                  - preferred_term: bicarbonate
                products:
                  - preferred_term: oxaloacetate
            function:
              preferred_term: pyruvate carboxylase activity
              term:
                id: GO:0004736
                label: pyruvate carboxylase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: bicarbonate
              products:
                - preferred_term: oxaloacetate
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Generates oxaloacetate from pyruvate. In concrete organism modules,
              the compartment and transport coupling may need to be made explicit.
    - order: 2
      role: phosphoenolpyruvate-forming step
      node:
        id: oxaloacetate_to_phosphoenolpyruvate
        label: Oxaloacetate to phosphoenolpyruvate
        module_type: REACTION
        variant_sets:
          - id: pepck_energy_donor
            label: PEP carboxykinase energy donor variants
            axis: enzyme chemistry
            selection: EXACTLY_ONE
            variants:
              - id: gtp_pepck_variant
                label: GTP-dependent PEP carboxykinase route
                module_type: REACTION
                annotons:
                  - id: gtp_pepck_activity
                    label: GTP-dependent phosphoenolpyruvate carboxykinase
                    participant:
                      selector_type: ANY_WITH_FUNCTION
                      required_function:
                        preferred_term: phosphoenolpyruvate carboxykinase (GTP) activity
                        term:
                          id: GO:0004613
                          label: phosphoenolpyruvate carboxykinase (GTP) activity
                    function:
                      preferred_term: phosphoenolpyruvate carboxykinase (GTP) activity
                      term:
                        id: GO:0004613
                        label: phosphoenolpyruvate carboxykinase (GTP) activity
                      substrates:
                        - preferred_term: oxaloacetate
                        - preferred_term: GTP
                      products:
                        - preferred_term: phosphoenolpyruvate
                        - preferred_term: GDP
              - id: atp_pepck_variant
                label: ATP-dependent PEP carboxykinase route
                module_type: REACTION
                annotons:
                  - id: atp_pepck_activity
                    label: ATP-dependent phosphoenolpyruvate carboxykinase
                    participant:
                      selector_type: ANY_WITH_FUNCTION
                      required_function:
                        preferred_term: phosphoenolpyruvate carboxykinase (ATP) activity
                        term:
                          id: GO:0004612
                          label: phosphoenolpyruvate carboxykinase (ATP) activity
                    function:
                      preferred_term: phosphoenolpyruvate carboxykinase (ATP) activity
                      term:
                        id: GO:0004612
                        label: phosphoenolpyruvate carboxykinase (ATP) activity
                      substrates:
                        - preferred_term: oxaloacetate
                        - preferred_term: ATP
                      products:
                        - preferred_term: phosphoenolpyruvate
                        - preferred_term: ADP
              - id: diphosphate_pepck_variant
                label: Diphosphate-dependent PEP carboxykinase route
                module_type: REACTION
                annotons:
                  - id: diphosphate_pepck_activity
                    label: Diphosphate-dependent phosphoenolpyruvate carboxykinase
                    participant:
                      selector_type: ANY_WITH_FUNCTION
                      required_function:
                        preferred_term: phosphoenolpyruvate carboxykinase (diphosphate) activity
                        term:
                          id: GO:0030585
                          label: phosphoenolpyruvate carboxykinase (diphosphate) activity
                    function:
                      preferred_term: phosphoenolpyruvate carboxykinase (diphosphate) activity
                      term:
                        id: GO:0030585
                        label: phosphoenolpyruvate carboxykinase (diphosphate) activity
                      substrates:
                        - preferred_term: oxaloacetate
                        - preferred_term: diphosphate
                      products:
                        - preferred_term: phosphoenolpyruvate
                        - preferred_term: phosphate
        notes: >-
          This variant set illustrates abstract function selectors: a realized
          module can enumerate possible paths without grounding to extant genes.
    - order: 3
      role: reversible glycolytic trunk
      node:
        id: reversible_glycolytic_trunk
        label: Reversible glycolytic trunk
        module_type: METABOLIC_PATHWAY
        description: >-
          Reversible reactions connecting phosphoenolpyruvate-derived
          intermediates to fructose 1,6-bisphosphate. This is left coarse here
          because the module sketch focuses on bypass and terminal variants.
        concepts:
          - preferred_term: reversible glycolysis segment
            description: A bag of near-equilibrium glycolytic reactions run in the gluconeogenic direction.
    - order: 4
      role: fructose 1,6-bisphosphate bypass
      node:
        id: fructose_bisphosphatase_step
        label: Fructose 1,6-bisphosphate to fructose 6-phosphate
        module_type: REACTION
        annotons:
          - id: fructose_bisphosphatase_activity
            label: Fructose 1,6-bisphosphatase function
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: fructose 1,6-bisphosphate 1-phosphatase activity
                term:
                  id: GO:0042132
                  label: fructose 1,6-bisphosphate 1-phosphatase activity
            function:
              preferred_term: fructose 1,6-bisphosphate 1-phosphatase activity
              term:
                id: GO:0042132
                label: fructose 1,6-bisphosphate 1-phosphatase activity
              substrates:
                - preferred_term: fructose 1,6-bisphosphate
              products:
                - preferred_term: fructose 6-phosphate
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
    - order: 5
      role: terminal glucose or glucose-6-phosphate endpoint
      node:
        id: terminal_hexose_endpoint
        label: Terminal hexose endpoint
        module_type: REACTION
        variant_sets:
          - id: terminal_product_axis
            label: Terminal product variants
            axis: physiological endpoint
            selection: EXACTLY_ONE
            variants:
              - id: glucose_release_variant
                label: Glucose release endpoint
                module_type: REACTION
                annotons:
                  - id: glucose_6_phosphatase_activity
                    label: Glucose-6-phosphatase function
                    participant:
                      selector_type: ANY_WITH_FUNCTION
                      required_function:
                        preferred_term: glucose-6-phosphatase activity
                        term:
                          id: GO:0004346
                          label: glucose-6-phosphatase activity
                    function:
                      preferred_term: glucose-6-phosphatase activity
                      term:
                        id: GO:0004346
                        label: glucose-6-phosphatase activity
                      substrates:
                        - preferred_term: glucose 6-phosphate
                      products:
                        - preferred_term: glucose
              - id: glucose_6_phosphate_endpoint_variant
                label: Glucose 6-phosphate endpoint
                module_type: METABOLIC_PATHWAY
                description: >-
                  Some realizations may stop at glucose 6-phosphate as a local
                  biosynthetic or storage precursor rather than releasing free
                  glucose.
                concepts:
                  - preferred_term: glucose 6-phosphate as terminal gluconeogenic product
  connections:
    - source: pyruvate_to_oxaloacetate
      target: oxaloacetate_to_phosphoenolpyruvate
      connection_type: PROVIDES_INPUT_FOR
      description: Oxaloacetate produced by the entry step feeds the phosphoenolpyruvate-forming step.
    - source: oxaloacetate_to_phosphoenolpyruvate
      target: reversible_glycolytic_trunk
      connection_type: PRECEDES
    - source: reversible_glycolytic_trunk
      target: fructose_bisphosphatase_step
      connection_type: PRECEDES
    - source: fructose_bisphosphatase_step
      target: terminal_hexose_endpoint
      connection_type: PRECEDES
  notes: >-
    A species-specific module can specialize the abstract participants with
    genes, complexes, cell types, compartments, and transport edges. The schema
    permits those specializations without requiring the generic module to name
    every enzyme family.
