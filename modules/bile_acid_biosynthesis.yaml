  notes: >-
    Bile-acid biosynthesis (GO:0006699 + GO:0008203), grounded to fifteen completed human gene reviews (ten
    reviewed/merged earlier: CYP7A1/CYP27A1/CYP7B1/HSD3B7/AKR1D1/AMACR/ACOX2/SCP2/BAAT/SLC27A5; five new here:
    CYP8B1/AKR1C4/CH25H/CYP39A1/CYP46A1). CLASSIC pathway: CYP7A1 (P22680 PTHR24304 GO:0008123, rate-limiting)
    -> HSD3B7 (Q9H2F3 PTHR10366 GO:0003854) -> CYP8B1 (Q9UNU6 PTHR24306 GO:0008397, 12a-hydroxylase = cholic-acid
    branch; NB GO:0047749 obsolete) -> AKR1D1 (P51857 GO:0047787 5b-reductase) -> AKR1C4 (P17516 GO:0140169
    3a-HSD; both PTHR11732). ALTERNATIVE (acidic) pathway: oxysterols from CYP27A1 (Q02318 PTHR24279 GO:0047748,
    mito 27-hydroxylase; CTX), CH25H (O95992 PTHR11863 GO:0001567 DI-IRON 25-hydroxylase) and neuronal CYP46A1
    (Q9Y6A2 PTHR24293 GO:0033781 24-hydroxylase) -> 7a-hydroxylated by CYP7B1 (O75881 GO:0008396; SPG5) and
    CYP39A1 (Q9NYL5 GO:0033782; both P450-family-7 PTHR24304). SHARED side-chain shortening: CYP27A1 side-chain
    oxidation -> AMACR (Q9UHK6 PTHR48228 GO:0008111 racemase) -> peroxisomal beta-oxidation ACOX2 (Q99424
    GO:0003997) + SCPx/SCP2 (P22307 GO:0050632) [peroxisomal-beta-oxidation module] -> C24 bile-acyl-CoA.
    CONJUGATION: SLC27A5 (Q9Y2P5 PTHR43107 GO:0047747 BACS) -> BAAT (Q14032 PTHR10824 GO:0047963 gly/tau
    conjugation). GO term ids/labels verified against the local go.db. Cholesterol is the substrate; the bile
    acids feed the enterohepatic bile-salt transport system (SLC10A1/ABCB11, separate). Disorders: CYP27A1 CTX,
    CYP7B1 SPG5, HSD3B7/AKR1D1/ACOX2/BAAT/SLC27A5 bile-acid-synthesis defects/cholestasis.
