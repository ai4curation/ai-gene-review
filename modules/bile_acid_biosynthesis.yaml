id: MODULE:bile_acid_biosynthesis
title: Bile-acid biosynthesis (classic + alternative pathways from cholesterol to conjugated bile acids)
description: >-
  Bile acids are the amphipathic end-products of hepatic cholesterol catabolism; their synthesis is the
  major route of cholesterol elimination and produces the detergents that emulsify dietary lipids. Two
  pathways convert cholesterol to the primary bile acids cholic acid (CA) and chenodeoxycholic acid (CDCA).
  In the CLASSIC (neutral) pathway, the rate-limiting ER cytochrome P450 CYP7A1 7-alpha-hydroxylates
  cholesterol; HSD3B7 then oxidises/isomerises the 3-beta-hydroxy-Delta5 sterol to a 3-oxo-Delta4
  intermediate; the branch-point enzyme CYP8B1 (sterol 12-alpha-hydroxylase) 12-alpha-hydroxylates that
  intermediate to commit flux toward CA (its absence yields CDCA), setting the CA:CDCA ratio; AKR1D1
  (Delta4-3-oxosteroid 5-beta-reductase) and AKR1C4 (3-alpha-hydroxysteroid dehydrogenase) then reduce the
  A/B-ring to the 5-beta-3-alpha-hydroxy configuration. In the ALTERNATIVE (acidic) pathway, the sterol
  side chain is oxidised first: the mitochondrial CYP27A1 (sterol 27-hydroxylase), the ER di-iron enzyme
  CH25H (25-hydroxylase) and the neuron-specific CYP46A1 (24-hydroxylase, the main route of brain
  cholesterol elimination) generate oxysterols, which the oxysterol 7-alpha-hydroxylases CYP7B1 (25-/27-OHC)
  and CYP39A1 (24S-OHC) route into bile-acid synthesis. Both pathways converge on side-chain shortening:
  CYP27A1 oxidises the C27 side chain to a C27 acid, AMACR racemises the (25R)- to the (25S)-acyl-CoA, and
  peroxisomal beta-oxidation (ACOX2 -> the D-bifunctional protein -> the SCPx thiolase, curated in the
  peroxisomal module) removes a propionyl unit to give the C24 bile-acyl-CoA. Finally the bile acid is
  activated by the CoA ligase SLC27A5 (BACS) and conjugated to glycine or taurine by BAAT. Inherited defects
  across the pathway cause bile-acid synthesis disorders: CYP7B1 (oxysterol 7-alpha-hydroxylase deficiency /
  SPG5), HSD3B7, AKR1D1, ACOX2, BAAT and SLC27A5 deficiencies, and CYP27A1 causes cerebrotendinous
  xanthomatosis.
status: DRAFT
