id: MODULE:yhdwxyz_amino_acid_abc_import_boundary
title: YhdWXYZ amino-acid ABC import boundary
description: Boundary module for the Pseudomonas putida KT2440 PP_1297-PP_1300 YhdWXYZ amino-acid ABC importer pulled from
  the KEGG ppu02010 ABC-transporter umbrella map. YhdW is the predicted solute-binding component, YhdX and YhdY are inner-membrane
  permeases, and YhdZ is the ABC ATP-binding energy-coupling subunit. The module records a coherent predicted amino-acid uptake
  system while leaving the exact amino-acid substrate unresolved.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes PP_1297-PP_1300 as a coherent amino-acid ABC-transporter sub-batch within the broad
    ABC-transporter umbrella map.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records cluster C26 as yhdW, yhdX, yhdY, and yhdZ after first-pass curation.
- source_id: UniProtKB:Q88NB5
  title: yhdW amino-acid ABC importer solute-binding component
  statement: UniProt records yhdW (PP_1297) as Amino-acid ABC transporter-binding protein YhdW.
- source_id: UniProtKB:Q88NB4
  title: yhdX amino-acid ABC importer permease
  statement: UniProt records yhdX (PP_1298) as Amino acid ABC transporter-permease subunit.
- source_id: UniProtKB:Q88NB3
  title: yhdY amino-acid ABC importer permease
  statement: UniProt records yhdY (PP_1299) as Amino acid ABC transporter-membrane subunit.
- source_id: UniProtKB:Q88NB2
  title: yhdZ amino-acid ABC importer ATP-binding subunit
  statement: UniProt records yhdZ (PP_1300) as Amino acid ABC transporter-ATP-binding subunit.
