        label: LcdH L-carnitine dehydrogenation
        module_type: REACTION
        description: >-
          LcdH oxidizes L-carnitine at the 3-hydroxy group using NAD(+) as the
          electron acceptor, producing 3-dehydrocarnitine, NADH, and a proton.
        annotons:
