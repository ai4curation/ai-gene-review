id: MODULE:l_carnitine_dehydrogenation
title: L-carnitine dehydrogenation
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00117 module for the
  NAD(+)-dependent oxidation of L-carnitine to 3-dehydrocarnitine. The local
  UniPathway bucket contains lcdH/PP_0302/Q88R32, a reviewed UniProtKB
  L-carnitine dehydrogenase entry with EC 1.1.1.108 and Rhea:RHEA:19265. This
  seed treats UPA00117 as the dehydrogenase step in carnitine catabolism rather
  than the full downstream utilization route for the 3-dehydrocarnitine product.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00117
    title: UniPathway UPA00117
    statement: >-
      The local UPA00117 membership set contains lcdH as the KT2440 candidate
      for L-carnitine dehydrogenation.
  - source_id: RHEA:19265
    title: L-carnitine dehydrogenase reaction
    statement: >-
      Rhea:19265 captures the NAD(+)-dependent conversion of carnitine to
      3-dehydrocarnitine, NADH, and a proton.
  - source_id: GO:0047728
    title: carnitine 3-dehydrogenase activity
    statement: >-
      GO:0047728 is the molecular-function term for the LcdH EC 1.1.1.108
      reaction.
  - source_id: GO:0042413
    title: carnitine catabolic process
    statement: >-
      GO:0042413 is the current biological-process term for catabolism of
      carnitine-containing compounds.
  - source_id: file:PSEPK/lcdH/lcdH-uniprot.txt
    title: UniProtKB reviewed entry for lcdH
    statement: >-
      UniProt describes lcdH as an L-carnitine dehydrogenase that catalyzes the
      NAD(+)-dependent oxidation of L-carnitine to 3-dehydrocarnitine and
      records the carnitine metabolism pathway.
  - source_id: file:PSEPK/lcdH/lcdH-goa.tsv
    title: QuickGO GOA annotations for lcdH
    statement: >-
      The fetched GOA table contains the LcdH annotations for carnitine
      3-dehydrogenase activity, carnitine metabolism, carnitine catabolism,
      cytoplasm, NAD binding, and broader oxidoreductase/fatty-acid parents.
  - source_id: file:PSEPK/lcdH/lcdH-deep-research-openscientist.md
    title: OpenScientist gene research for lcdH
    statement: >-
      OpenScientist gene-level research found same-species biochemical evidence
      for P. putida L-carnitine dehydrogenase activity, a KT2440
      carnitine-catabolism gene-cluster context, and the caveat that PP_0302
      itself has not been directly assayed in KT2440.
  - source_id: file:modules/l_carnitine_dehydrogenation-deep-research-openscientist.md
    title: OpenScientist module research for L-carnitine dehydrogenation
    statement: >-
      OpenScientist module-level research supports UPA00117 as a chemically
      committed single-step NAD(+)-dependent L-carnitine oxidation module and
      distinguishes it from carnitine monooxygenase, anaerobic cai, and
      compatible-solute uptake routes.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__l_carnitine_dehydrogenation__upa00117-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00117 pathway satisfiability review
    statement: >-
      The PSEPK-specific report marks the UPA00117 step covered by
      lcdH/PP_0302/Q88R32, finds no competing KT2440 carnitine-dehydrogenase
      paralog, and keeps downstream PP_0301/PP_0303/PP_0304/PP_0305 as context
      for a broader carnitine-utilization module rather than members of this
      single-step bucket.
  - source_id: PMID:3058208
    title: Purification and properties of carnitine dehydrogenase from Pseudomonas putida.
    statement: >-
      Direct same-species biochemical work purified P. putida carnitine
      dehydrogenase and showed oxidation of L-carnitine to 3-dehydrocarnitine
      with L-carnitine and NAD(+) specificity.
  - source_id: PMID:9037756
    title: Bacterial carnitine metabolism.
    statement: >-
      A bacterial carnitine metabolism review describes Pseudomonas assimilation
      of L-carnitine and identifies L-carnitine dehydrogenase as the first
      catabolic step.
notes: >-
  First-pass interpretation: UPA00117 is satisfiable as a single-enzyme
  L-carnitine dehydrogenation step in KT2440. OpenScientist generic and
  taxon-aware reports support the narrow boundary: lcdH/PP_0302/Q88R32 covers
  the NAD(+)-dependent L-carnitine to 3-dehydrocarnitine reaction, while the
  neighboring transporter, regulator, and downstream 3-dehydrocarnitine
  utilization genes remain adjacent pathway context rather than members of this
  single-gene bucket. Quality-control note: the OpenScientist reports mention
  GO:0008859 as carnitine 3-dehydrogenase activity, but local OAK/GO lookup
  shows GO:0008859 is exoribonuclease II activity; the correct GOA molecular
  function term used here is GO:0047728.
