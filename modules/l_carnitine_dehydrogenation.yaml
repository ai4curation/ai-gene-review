              Executes the first-pass UPA00117 L-carnitine dehydrogenation step
              represented by lcdH/PP_0302/Q88R32 in the KT2440 membership table.
  knowledge_gaps:
    - gap_statement: >-
        Direct P. putida KT2440 biochemical or genetic evidence for PP_0302 has
        not been located; confidence rests on reviewed UniProt/HAMAP transfer,
        same-species P. putida biochemical evidence from another strain, and
        KT2440 carnitine-catabolism cluster context.
      boundary: >-
        Treat lcdH as the sole local UPA00117 member for the first pass, but
        keep KT2440-specific enzyme kinetics, knockout, and carnitine-growth
        claims as follow-up experiments rather than prerequisites for covering
        the module step.
      gap_kind:
        - BIOLOGY
    - gap_statement: >-
        The downstream fate of 3-dehydrocarnitine in KT2440 is outside this
        single-gene UniPathway bucket, even though PP_0301, PP_0303, PP_0304,
        and PP_0305 provide plausible adjacent transport, cleavage, thioester,
        and regulatory context.
      boundary: >-
        Do not add downstream carnitine-utilization enzymes to UPA00117.
        Promote them only when curating a broader carnitine-utilization or
        glycine-betaine-linked module.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        The GO:0006631 fatty acid metabolic process annotation appears to derive
        from broad InterPro 3-hydroxyacyl-CoA dehydrogenase domains and may not
        describe the specific L-carnitine dehydrogenase role.
      boundary: >-
        Review GO:0006631 conservatively at the gene level; avoid making fatty
        acid metabolism central to this module unless independent evidence links
        LcdH to fatty-acid metabolism in KT2440.
      gap_kind:
        - CURATION
