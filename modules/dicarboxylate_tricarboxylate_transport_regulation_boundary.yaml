id: MODULE:dicarboxylate_tricarboxylate_transport_regulation_boundary
title: Dicarboxylate/tricarboxylate transport regulation boundary
description: Boundary module for the ppu02020 Dct/Tct transport-regulation partition in Pseudomonas putida
  KT2440. It captures DctD/DctB-like regulatory pairs, a DctPQM TRAP C4-dicarboxylate importer, multiple
  DctA-family C4-dicarboxylate symporters, a TctABC/TctD-like tricarboxylate transport locus, and a PP_3124
  short-chain fatty-acid transporter side node. This is a transport-regulatory partition of the broad
  KEGG two-component-system map, not a single linear two-component pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this transport-regulation boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups dctD/dctB-like regulators, DctPQM, DctA paralogs, TctABC/TctD-like
    genes, and PP_3124 into the Dct/Tct transport-regulation bucket.
notes: TctABC had no GOA rows when fetched, so the module and reviews add conservative NEW entries from
  UniProt/Asta product and domain evidence. DctA L-aspartate transport remains undecided because the local
  evidence supports C4-dicarboxylate substrates more directly.
