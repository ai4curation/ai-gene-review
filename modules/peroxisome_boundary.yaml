          - id: pp3394_hmgcoa_lyase
            label: "PP_3394: HMG-CoA lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3394
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
            role_description: HMG-CoA cleavage side node shared with terpene/camphor/pinene boundary metabolism.
          - id: mvaB_hmgcoa_lyase
            label: "mvaB: HMG-CoA lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mvaB
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
            role_description: HMG-CoA cleavage side node shared with terpene/camphor/pinene boundary metabolism.
          - id: nudC_nad_cap_hydrolase
            label: "nudC: NADH/NAD-capped RNA hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nudC
            function:
              preferred_term: NADH pyrophosphatase activity
              term:
                id: GO:0035529
                label: NADH pyrophosphatase activity
            role_description: NAD/RNA-cap hydrolase side node, not a peroxisome-specific enzyme.
  connections:
    - source: no_bacterial_peroxisome_organelle
      target: cytoplasmic_ros_detoxification
      connection_type: PART_OF
      description: The ROS detoxification enzymes are retained as bacterial cytoplasmic functions within the boundary, not peroxisome organelle functions.
      chaining_status: VERIFIED
      chaining_note: >-
        Local gene reviews support catalase/SOD activity and bacterial
        cytoplasm/cytosol context, while no PSEPK review supports peroxisome
        localization or peroxisome organization.
    - source: no_bacterial_peroxisome_organelle
      target: bacterial_metabolic_side_nodes
      connection_type: PART_OF
      description: The fatty-acid, TCA/NADPH, HMG-CoA, and NudC genes are retained as non-peroxisomal side nodes in the boundary module.
      chaining_status: VERIFIED
      chaining_note: >-
        These enzymes satisfy bacterial metabolic functions already captured in
        neighboring pathway modules, not eukaryotic peroxisomal compartment
        biology.
  notes: >-
    Do not infer GO:0005777 peroxisome localization, peroxisome organization,
    peroxin function, peroxisome matrix import, or peroxisomal beta-oxidation
    for PSEPK genes solely from KEGG ppu04146 membership.
