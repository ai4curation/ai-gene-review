id: MODULE:peroxisome_boundary
title: Peroxisome boundary in bacteria
description: >-
  Boundary/absence module for KEGG ppu04146 Peroxisome in Pseudomonas putida
  KT2440. PSEPK is a bacterium and has no eukaryotic peroxisome organelle,
  peroxin import system, or peroxisomal matrix compartment. The organism-specific
  KEGG map instead pulls in soluble oxidative-stress enzymes, fatty-acid
  activation enzymes, NADP-dependent isocitrate dehydrogenases, HMG-CoA lyases,
  and NudC NAD-capped RNA/NADH hydrolase context that are satisfiable as
  cytoplasmic or membrane-associated bacterial functions but not as peroxisome
  localization or peroxisome-biogenesis annotations.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04146
    title: Peroxisome - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04146 provides the PSEPK curation batch with catalases,
      superoxide dismutases, HMG-CoA lyases, isocitrate dehydrogenases, NudC,
      and long-chain fatty-acid CoA ligases.
  - source_id: file:projects/P_PUTIDA/batches/ppu04146_peroxisome_boundary.tsv
    title: ppu04146 first-pass batch table
    statement: >-
      The batch table records 12 KEGG ppu04146 membership genes and their local
      first-pass review, curation, and Asta-retrieval status.
  - source_id: file:PSEPK/katA/katA-ai-review.yaml
    title: Curated katA review
    statement: >-
      The katA review accepts catalase activity, heme binding, hydrogen
      peroxide catabolism, and cytoplasm.
  - source_id: file:PSEPK/katE/katE-ai-review.yaml
    title: Curated katE review
    statement: >-
      The katE review accepts catalase activity, hydrogen peroxide catabolism,
      and cellular oxidant detoxification.
  - source_id: file:PSEPK/sodA/sodA-ai-review.yaml
    title: Curated sodA review
    statement: >-
      The sodA review accepts superoxide dismutase activity, removal of
      superoxide radicals, manganese binding, and cytoplasm.
  - source_id: file:PSEPK/sodB/sodB-ai-review.yaml
    title: Curated sodB review
    statement: >-
      The sodB review accepts superoxide dismutase activity, removal of
      superoxide radicals, iron binding, and cytoplasm.
  - source_id: file:PSEPK/fadD-I/fadD-I-ai-review.yaml
    title: Curated fadD-I review
    statement: >-
      The fadD-I review accepts long-chain fatty-acid CoA ligase activity and
      ATP binding as fatty-acid activation context.
  - source_id: file:PSEPK/fadD-II/fadD-II-ai-review.yaml
    title: Curated fadD-II review
    statement: >-
      The fadD-II review accepts long-chain fatty-acid CoA ligase activity and
      ATP binding as fatty-acid activation context.
module:
  id: peroxisome_boundary
  label: Peroxisome boundary in bacteria
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: peroxisome
      term:
        id: GO:0005777
        label: peroxisome
      description: Eukaryotic single-membrane organelle; absent from P. putida KT2440.
    - preferred_term: cellular oxidant detoxification
      term:
        id: GO:0098869
        label: cellular oxidant detoxification
      description: Bacterial cytoplasmic detoxification of reactive oxygen species.
    - preferred_term: catalase activity
      term:
        id: GO:0004096
        label: catalase activity
      description: Hydrogen peroxide dismutation by KatA/KatE-family catalases.
    - preferred_term: hydrogen peroxide catabolic process
      term:
        id: GO:0042744
        label: hydrogen peroxide catabolic process
      description: Conversion of hydrogen peroxide to water and oxygen.
    - preferred_term: superoxide dismutase activity
      term:
        id: GO:0004784
        label: superoxide dismutase activity
      description: Superoxide radical dismutation by SodA/SodB.
    - preferred_term: removal of superoxide radicals
      term:
        id: GO:0019430
        label: removal of superoxide radicals
      description: Detoxification of superoxide radicals.
    - preferred_term: long-chain fatty acid-CoA ligase activity
      term:
        id: GO:0004467
        label: long-chain fatty acid-CoA ligase activity
      description: Fatty-acid activation by FadD paralogs.
    - preferred_term: isocitrate dehydrogenase (NADP+) activity
      term:
        id: GO:0004450
        label: isocitrate dehydrogenase (NADP+) activity
      description: NADP-dependent isocitrate oxidation/decarboxylation by Icd/Idh paralogs.
    - preferred_term: hydroxymethylglutaryl-CoA lyase activity
      term:
        id: GO:0004419
        label: hydroxymethylglutaryl-CoA lyase activity
      description: HMG-CoA cleavage side context in KEGG ppu04146.
    - preferred_term: NADH pyrophosphatase activity
      term:
        id: GO:0035529
        label: NADH pyrophosphatase activity
      description: NudC NADH/NAD-capped RNA hydrolase side context.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most ppu04146 member enzymes act in bacterial cytoplasm or nucleoid/cytosolic context.
      - preferred_term: bacterial membrane
        term:
          id: GO:0016020
          label: membrane
        description: FadD-I and FadD-II are membrane-associated fatty-acid activation enzymes in the local GOA set.
  parts:
    - order: 1
      role: Boundary absence of peroxisome organelle
      node:
        id: no_bacterial_peroxisome_organelle
        label: No peroxisome organelle in PSEPK
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 should not receive peroxisome localization,
          peroxisome organization, peroxin, or peroxisomal matrix import
          annotations from KEGG ppu04146 membership. The pathway is treated as
          a KEGG cross-domain map boundary rather than a satisfiable bacterial
          organelle module.
        annotons: []
    - order: 2
      role: Reactive oxygen detoxification
      node:
        id: cytoplasmic_ros_detoxification
        label: Cytoplasmic ROS detoxification enzymes
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Catalases and superoxide dismutases are the most biologically coherent
          ppu04146 members in KT2440, but their accepted localization and
          process annotations are bacterial cytoplasmic oxidative-stress defense
          rather than peroxisomal detoxification.
        annotons:
          - id: katA_catalase
            label: "katA: catalase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: katA
            function:
              preferred_term: catalase activity
              term:
                id: GO:0004096
                label: catalase activity
            processes:
              - preferred_term: hydrogen peroxide catabolic process
                term:
                  id: GO:0042744
                  label: hydrogen peroxide catabolic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Major cytoplasmic catalase detoxifying hydrogen peroxide.
          - id: katE_hpii_catalase
            label: "katE: HPII-family catalase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: katE
            function:
              preferred_term: catalase activity
              term:
                id: GO:0004096
                label: catalase activity
            processes:
              - preferred_term: hydrogen peroxide catabolic process
                term:
                  id: GO:0042744
                  label: hydrogen peroxide catabolic process
            role_description: HPII-family catalase/hydrogen peroxide catabolism context.
          - id: pp2887_catalase_related_peroxidase
            label: "PP_2887: catalase-related peroxidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2887
            function:
              preferred_term: catalase activity
              term:
                id: GO:0004096
                label: catalase activity
            processes:
              - preferred_term: cellular oxidant detoxification
                term:
                  id: GO:0098869
                  label: cellular oxidant detoxification
            role_description: Catalase-family oxidative-detoxification boundary member with unresolved exact peroxide substrate.
          - id: sodA_manganese_sod
            label: "sodA: manganese superoxide dismutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sodA
            function:
              preferred_term: superoxide dismutase activity
              term:
                id: GO:0004784
                label: superoxide dismutase activity
            processes:
              - preferred_term: removal of superoxide radicals
                term:
                  id: GO:0019430
                  label: removal of superoxide radicals
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: MnSOD-family enzyme detoxifying cytoplasmic superoxide.
          - id: sodB_iron_sod
            label: "sodB: iron superoxide dismutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sodB
            function:
              preferred_term: superoxide dismutase activity
              term:
                id: GO:0004784
                label: superoxide dismutase activity
            processes:
              - preferred_term: removal of superoxide radicals
                term:
                  id: GO:0019430
                  label: removal of superoxide radicals
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: FeSOD-family enzyme detoxifying cytoplasmic superoxide.
    - order: 3
      role: Fatty-acid and carbon-metabolism side nodes
      node:
        id: bacterial_metabolic_side_nodes
        label: Bacterial metabolic side nodes
        module_type: BIOLOGICAL_PROCESS
        description: >-
          KEGG ppu04146 also includes enzymes that resemble peroxisomal
          metabolism in eukaryotic maps but are ordinary bacterial fatty-acid,
          TCA/NADPH, HMG-CoA, or nucleotide/RNA-cap enzymes in KT2440.
        annotons:
          - id: fadD_I_fatty_acid_activation
            label: "fadD-I: long-chain fatty-acid CoA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadD-I
            function:
              preferred_term: long-chain fatty acid-CoA ligase activity
              term:
                id: GO:0004467
                label: long-chain fatty acid-CoA ligase activity
            locations:
              - preferred_term: membrane
                term:
                  id: GO:0016020
                  label: membrane
            role_description: Fatty-acid activation side node, not peroxisomal beta-oxidation localization.
          - id: fadD_II_fatty_acid_activation
            label: "fadD-II: long-chain fatty-acid CoA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadD-II
            function:
              preferred_term: long-chain fatty acid-CoA ligase activity
              term:
                id: GO:0004467
                label: long-chain fatty acid-CoA ligase activity
            locations:
              - preferred_term: membrane
                term:
                  id: GO:0016020
                  label: membrane
            role_description: Fatty-acid activation side node, not peroxisomal beta-oxidation localization.
          - id: icd_nadp_isocitrate_dehydrogenase
            label: "icd: NADP-dependent isocitrate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: icd
            function:
              preferred_term: isocitrate dehydrogenase (NADP+) activity
              term:
                id: GO:0004450
                label: isocitrate dehydrogenase (NADP+) activity
            role_description: TCA/NADPH side node.
          - id: idh_nadp_isocitrate_dehydrogenase
            label: "idh: NADP-dependent isocitrate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: idh
            function:
              preferred_term: isocitrate dehydrogenase (NADP+) activity
              term:
                id: GO:0004450
                label: isocitrate dehydrogenase (NADP+) activity
