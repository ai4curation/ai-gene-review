id: MODULE:tyrosine_catabolism
title: L-tyrosine catabolism (hepatic tyrosine degradation to fumarate + acetoacetate)
description: >-
  The main pathway of L-tyrosine degradation, a five-step cytosolic route
  operating chiefly in the liver (and kidney) that converts tyrosine — including
  the tyrosine produced from phenylalanine by phenylalanine hydroxylase — to the
  central-metabolism end-products fumarate and acetoacetate, thereby feeding the
  carbon skeleton into the TCA cycle and ketone-body pool. Tyrosine
  aminotransferase (TAT) first transaminates tyrosine with 2-oxoglutarate to
  4-hydroxyphenylpyruvate; 4-hydroxyphenylpyruvate dioxygenase (HPD/HPPD) then
  carries out an unusual oxidative decarboxylation, ring-hydroxylation and
  side-chain migration to give homogentisate; homogentisate 1,2-dioxygenase (HGD)
  cleaves the aromatic ring to 4-maleylacetoacetate; maleylacetoacetate isomerase
  (GSTZ1/MAAI) isomerises this to 4-fumarylacetoacetate; and fumarylacetoacetate
  hydrolase (FAH) hydrolyses the C-C bond to release fumarate and acetoacetate.
  Every step has a corresponding inborn error of metabolism: TAT deficiency
  causes tyrosinemia type II (Richner-Hanhart, oculocutaneous); HPD deficiency
  causes tyrosinemia type III and hawkinsinuria; HGD deficiency causes
  alkaptonuria (homogentisate accumulates and its oxidised polymer deposits as
  ochronotic pigment); GSTZ1/MAAI deficiency is biochemically mild; and FAH
  deficiency causes the severe hepatorenal tyrosinemia type I, in which the
  blocked terminal step causes accumulation of the upstream reactive
  intermediates maleyl-/fumarylacetoacetate and the toxin succinylacetone.
  Pharmacologically, the herbicide-derived HPD inhibitor nitisinone (NTBC) is the
  mainstay treatment of tyrosinemia type I: by blocking HPD (the second step) it
  prevents formation of the toxic downstream metabolites that accumulate when FAH
  is deficient, and it is also used in alkaptonuria to lower homogentisate.
status: DRAFT
evidence:
  - source_id: GO:0006572
    title: L-tyrosine catabolic process
    statement: >-
      The module is grounded in the GO biological-process term for L-tyrosine
      catabolism; every step is annotated to GO:0006572 (and, since Phe is
      degraded via Tyr, to GO:0006559 L-phenylalanine catabolic process).
  - source_id: Reactome:R-HSA-8963684
    title: Tyrosine catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Tyrosine catabolism" pathway (R-HSA-8963684) and its member reactions
      (R-HSA-71155, R-HSA-71163, R-HSA-71164, R-HSA-71173, R-HSA-71181).
  - source_id: file:human/TAT/TAT-ai-review.yaml
    title: TAT gene review (human)
    statement: >-
      The TAT step grounding (UniProtKB:P17735, GO:0004838, EC 2.6.1.5) matches
      the completed human TAT review.
  - source_id: file:human/HPD/HPD-ai-review.yaml
    title: HPD gene review (human)
    statement: >-
      The HPD step grounding (UniProtKB:P32754, GO:0003868, EC 1.13.11.27)
      matches the completed human HPD review (the nitisinone target).
  - source_id: file:human/HGD/HGD-ai-review.yaml
    title: HGD gene review (human)
    statement: >-
      The HGD step grounding (UniProtKB:Q93099, GO:0004411, EC 1.13.11.5) matches
      the completed human HGD review.
  - source_id: file:human/GSTZ1/GSTZ1-ai-review.yaml
    title: GSTZ1 gene review (human)
    statement: >-
      The GSTZ1/MAAI step grounding (UniProtKB:O43708, GO:0016034, EC 5.2.1.2)
      matches the completed human GSTZ1 review, whose primary physiological core
      function is maleylacetoacetate isomerase.
  - source_id: file:human/FAH/FAH-ai-review.yaml
    title: FAH gene review (human)
    statement: >-
      The FAH step grounding (UniProtKB:P16930, GO:0004334 fumarylacetoacetase
      activity, EC 3.7.1.2) matches the completed human FAH review.
module:
  id: tyrosine_catabolism
  label: L-tyrosine catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-tyrosine catabolic process
      term:
        id: GO:0006572
        label: L-tyrosine catabolic process
      description: >-
        Five-step cytosolic degradation of L-tyrosine to fumarate and
        acetoacetate.
    - preferred_term: L-phenylalanine catabolic process
      term:
        id: GO:0006559
        label: L-phenylalanine catabolic process
      description: >-
        Phenylalanine is degraded by first being hydroxylated to tyrosine (by
        PAH), so its carbon skeleton is disposed of through this same pathway.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All five enzymes of tyrosine catabolism are cytosolic.
  parts:
    - order: 1
      role: transamination (entry step)
      node:
        id: tat_step
        label: L-tyrosine + 2-oxoglutarate to 4-hydroxyphenylpyruvate + L-glutamate
        module_type: REACTION
        annotons:
          - id: tat_activity
            label: "TAT: tyrosine aminotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Tyrosine aminotransferase family (TAT)
                term:
                  id: PANTHER:PTHR45744
                  label: TYROSINE AMINOTRANSFERASE
                representative_members:
                  - preferred_term: TAT (human)
                    term:
                      id: UniProtKB:P17735
                      label: Tyrosine aminotransferase
            function:
              preferred_term: L-tyrosine:2-oxoglutarate transaminase activity
              term:
                id: GO:0004838
                label: L-tyrosine:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: L-tyrosine
                - preferred_term: 2-oxoglutarate
              products:
                - preferred_term: 4-hydroxyphenylpyruvate
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:2.6.1.5
                  statement: tyrosine transaminase
                - source_id: Reactome:R-HSA-71155
                  statement: "TAT deaminates tyrosine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              PLP-dependent, glucocorticoid/glucagon-inducible cytosolic
              aminotransferase that commits tyrosine to catabolism. Deficiency
              causes tyrosinemia type II (Richner-Hanhart syndrome).
    - order: 2
      role: oxidative decarboxylation to homogentisate
      node:
        id: hpd_step
        label: 4-hydroxyphenylpyruvate + O2 to homogentisate + CO2
        module_type: REACTION
        annotons:
          - id: hpd_activity
            label: "HPD/HPPD: 4-hydroxyphenylpyruvate dioxygenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 4-hydroxyphenylpyruvate dioxygenase family (HPD)
                term:
                  id: PANTHER:PTHR11959
                  label: 4-HYDROXYPHENYLPYRUVATE DIOXYGENASE
                representative_members:
                  - preferred_term: HPD (human)
                    term:
                      id: UniProtKB:P32754
                      label: 4-hydroxyphenylpyruvate dioxygenase
            function:
              preferred_term: 4-hydroxyphenylpyruvate dioxygenase activity
              term:
                id: GO:0003868
                label: 4-hydroxyphenylpyruvate dioxygenase activity
              substrates:
                - preferred_term: 4-hydroxyphenylpyruvate
                - preferred_term: dioxygen
              products:
                - preferred_term: homogentisate
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:1.13.11.27
                  statement: 4-hydroxyphenylpyruvate dioxygenase
                - source_id: Reactome:R-HSA-71163
                  statement: "HPD dioxygenates HPP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Fe(II)-dependent dioxygenase performing a combined oxidative
              decarboxylation, ring hydroxylation and side-chain migration. The
              molecular target of the drug nitisinone (NTBC): inhibiting HPD blocks
              the pathway upstream of the toxic FAH-deficiency intermediates, which
              is why NTBC treats tyrosinemia type I. HPD deficiency itself causes
              tyrosinemia type III and hawkinsinuria.
    - order: 3
      role: aromatic ring cleavage
      node:
        id: hgd_step
        label: homogentisate + O2 to 4-maleylacetoacetate
        module_type: REACTION
        annotons:
          - id: hgd_activity
            label: "HGD: homogentisate 1,2-dioxygenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Homogentisate 1,2-dioxygenase family (HGD)
                term:
                  id: PANTHER:PTHR11056
                  label: HOMOGENTISATE 1,2-DIOXYGENASE
                representative_members:
                  - preferred_term: HGD (human)
                    term:
                      id: UniProtKB:Q93099
                      label: Homogentisate 1,2-dioxygenase
            function:
              preferred_term: homogentisate 1,2-dioxygenase activity
              term:
                id: GO:0004411
                label: homogentisate 1,2-dioxygenase activity
              substrates:
                - preferred_term: homogentisate
                - preferred_term: dioxygen
              products:
                - preferred_term: 4-maleylacetoacetate
              evidence:
                - source_id: EC:1.13.11.5
                  statement: homogentisate 1,2-dioxygenase
                - source_id: Reactome:R-HSA-71164
                  statement: "HGD dioxygenates homogentisate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Fe(II)-dependent ring-cleaving dioxygenase (assembles as a
              hexamer, a dimer of trimers). Deficiency causes alkaptonuria:
              homogentisate accumulates and its oxidised polymer deposits in
              connective tissue (ochronosis), giving dark urine, ochronotic
              arthropathy and cardiac-valve/renal disease.
    - order: 4
      role: cis-trans isomerization
      node:
        id: gstz1_step
        label: 4-maleylacetoacetate to 4-fumarylacetoacetate
        module_type: REACTION
        annotons:
          - id: gstz1_activity
            label: "GSTZ1/MAAI: maleylacetoacetate isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Maleylacetoacetate isomerase / GST-zeta family (GSTZ1)
                term:
                  id: PANTHER:PTHR42673
                  label: MALEYLACETOACETATE ISOMERASE
                representative_members:
                  - preferred_term: GSTZ1 (human)
                    term:
                      id: UniProtKB:O43708
                      label: Maleylacetoacetate isomerase
            function:
              preferred_term: maleylacetoacetate isomerase activity
              term:
                id: GO:0016034
                label: maleylacetoacetate isomerase activity
              substrates:
                - preferred_term: 4-maleylacetoacetate
                - preferred_term: glutathione (cofactor)
              products:
                - preferred_term: 4-fumarylacetoacetate
              evidence:
                - source_id: EC:5.2.1.2
                  statement: maleylacetoacetate isomerase
                - source_id: Reactome:R-HSA-71173
                  statement: "GSTZ1 isomerizes 4-MAA (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Glutathione-dependent cis-trans isomerase of the glutathione-
              transferase zeta superfamily; the tyrosine-pathway role is its main
              physiological function. Also biotransforms the drug dichloroacetate
              (which mechanism-based-inactivates the enzyme). MAAI deficiency is
              biochemically mild.
    - order: 5
      role: terminal hydrolysis to central metabolites
      node:
        id: fah_step
        label: 4-fumarylacetoacetate to fumarate + acetoacetate
        module_type: REACTION
        annotons:
          - id: fah_activity
            label: "FAH: fumarylacetoacetate hydrolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Fumarylacetoacetate hydrolase family (FAH)
                term:
                  id: PANTHER:PTHR43069
                  label: FUMARYLACETOACETASE
                representative_members:
                  - preferred_term: FAH (human)
                    term:
                      id: UniProtKB:P16930
                      label: Fumarylacetoacetate hydrolase
            function:
              preferred_term: fumarylacetoacetase activity
              term:
                id: GO:0004334
                label: fumarylacetoacetase activity
              substrates:
                - preferred_term: 4-fumarylacetoacetate
                - preferred_term: water
              products:
                - preferred_term: fumarate
                - preferred_term: acetoacetate
              evidence:
                - source_id: EC:3.7.1.2
                  statement: fumarylacetoacetase
                - source_id: Reactome:R-HSA-71181
                  statement: "FAH cleaves 4FAA (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal step: hydrolyses fumarylacetoacetate to fumarate (into the
              TCA cycle) and acetoacetate (a ketone body). Deficiency causes the
              severe hepatorenal tyrosinemia type I — the block causes toxic
              accumulation of maleyl-/fumarylacetoacetate and succinylacetone,
              treated by blocking the pathway upstream with nitisinone.
  connections:
    - source: tat_step
      target: hpd_step
      connection_type: PROVIDES_INPUT_FOR
      description: 4-hydroxyphenylpyruvate from TAT is the substrate of HPD.
    - source: hpd_step
      target: hgd_step
      connection_type: PROVIDES_INPUT_FOR
      description: Homogentisate from HPD is the substrate of HGD.
    - source: hgd_step
      target: gstz1_step
      connection_type: PROVIDES_INPUT_FOR
      description: 4-maleylacetoacetate from HGD is isomerised by GSTZ1/MAAI.
    - source: gstz1_step
      target: fah_step
      connection_type: PROVIDES_INPUT_FOR
      description: 4-fumarylacetoacetate from GSTZ1 is hydrolysed by FAH.
  notes: >-
    Five-step hepatic L-tyrosine catabolism grounded to the human enzymes TAT
    (UniProtKB:P17735, GO:0004838, EC 2.6.1.5), HPD (P32754, GO:0003868, EC
    1.13.11.27), HGD (Q93099, GO:0004411, EC 1.13.11.5), GSTZ1/MAAI (O43708,
    GO:0016034, EC 5.2.1.2) and FAH (P16930, GO:0004334, EC 3.7.1.2). GO
    molecular-function terms were taken from the human GOA records; Reactome
    reaction ids and titles were verified against the local reactome cache. Each
    step uses a PANTHER family selector (generic over paralogs and orthologs) plus
    a concrete human representative member; these enzymes are essentially
    single-copy in humans. Upstream, phenylalanine enters this pathway after PAH
    converts it to tyrosine (see the tetrahydrobiopterin module for the PAH
    cofactor); downstream, fumarate enters the TCA cycle and acetoacetate the
    ketone-body pool. The clinically important HPD inhibitor nitisinone (NTBC) and
    the toxic succinylacetone that accumulates in FAH deficiency are noted in the
    step role descriptions.
