id: MODULE:fatty_acid_beta_oxidation
title: Mitochondrial fatty acid beta-oxidation spiral (cross-species)
description: >-
  The core four-step spiral of mitochondrial fatty acid beta-oxidation, by which
  saturated fatty acyl-CoA esters are degraded two carbons at a time, releasing one
  acetyl-CoA and a chain-shortened acyl-CoA per turn that re-enters the cycle. The
  four obligate reactions are (1) FAD-dependent alpha,beta-dehydrogenation of acyl-CoA
  to (2E)-enoyl-CoA by an acyl-CoA dehydrogenase; (2) hydration of the trans double
  bond to (3S)-3-hydroxyacyl-CoA by an enoyl-CoA hydratase; (3) NAD+-dependent
  oxidation to 3-ketoacyl-CoA by a 3-hydroxyacyl-CoA dehydrogenase; and (4) thiolytic
  cleavage by a 3-ketoacyl-CoA thiolase to yield acetyl-CoA plus an acyl-CoA shortened
  by two carbons. Each step is carried out by a family of chain-length-specific
  isozymes: as the acyl chain shortens through successive turns of the spiral, the
  enzyme that acts changes. The long-chain steps 2-4 are performed by the membrane-bound
  mitochondrial trifunctional protein (MTP, an alpha2-beta2 heterotetramer whose alpha
  subunit carries the hydratase and dehydrogenase activities and whose beta subunit
  carries the thiolase), whereas the medium- and short-chain steps are carried out by
  separate soluble matrix enzymes. This module is built cross-species: each catalytic
  role is grounded with both the human enzyme(s) and the Drosophila melanogaster
  ortholog(s), so the conserved enzymatic logic and the species-specific gene
  complement can be compared directly. The chain-length axis is modelled as a variant
  set at each step; "use MF specific for chain length" where such a molecular-function
  term exists, with a fall-back to the general activity where it does not. This module
  covers the SATURATED spiral. Degradation of UNSATURATED fatty acids additionally
  requires an auxiliary-enzyme cassette - a delta(3),delta(2)-enoyl-CoA isomerase
  (fly mitochondrial CG4592/CG4594/CG4598 vs peroxisomal Dci), a
  delta(3,5),delta(2,4)-dienoyl-CoA isomerase (fly Ech1), and a 2,4-dienoyl-CoA
  reductase (DECR1, for which no clean Drosophila ortholog is currently assignable) -
  which are curated in the project but not modelled as variant sets here; see the
  Fatty Acid beta-Oxidation project page (unsaturated cassette section) for details.
status: DRAFT
evidence:
  - source_id: GO:0006635
    title: fatty acid beta-oxidation
    statement: >-
      Module grounded in the GO biological-process term for mitochondrial fatty acid
      beta-oxidation; all participant catalytic roles are children of this process.
  - source_id: file:human/HADHB/HADHB-ai-review.yaml
    title: HADHB gene review (human)
    statement: >-
      The human gene reviews in this repository (ACADVL, ACAD9, ACADM, ACADS, HADHA,
      HADHB, ECHS1, HADH, ACAT1, ACAA2) supply the verified UniProt accessions, GO
      molecular-function terms, and chain-length assignments used to ground each step.
module:
  id: fatty_acid_beta_oxidation
  label: Mitochondrial fatty acid beta-oxidation spiral
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
  parts:
    # ------------------------------------------------------------------
    # STEP 1: acyl-CoA dehydrogenase (FAD; acyl-CoA -> (2E)-enoyl-CoA)
    # ------------------------------------------------------------------
    - order: 1
      role: alpha,beta-dehydrogenation of acyl-CoA (FAD-dependent)
      node:
        id: acad_step
        label: "Step 1: acyl-CoA dehydrogenase"
        module_type: REACTION
        variant_sets:
          - id: acad_chain_length
            label: Chain-length-specific acyl-CoA dehydrogenases
            axis: acyl-CoA chain length
            selection: ONE_OR_MORE
            notes: >-
              The acyl-CoA dehydrogenase that acts depends on the current acyl-chain
              length; very-long/long-, medium-, and short-chain isozymes hand off as
              the spiral shortens the chain. Each has a chain-length-specific MF term.
            variants:
              - id: vlcad_variant
                label: Very-long / long-chain acyl-CoA dehydrogenase (VLCAD / ACAD9)
                module_type: REACTION
                annotons:
                  - id: vlcad_activity
                    label: "VLCAD/ACAD9: very-long-chain acyl-CoA dehydrogenase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Very-long/long-chain acyl-CoA dehydrogenase (VLCAD/ACAD9)
                        representative_members:
                          - preferred_term: ACADVL (human)
                            term:
                              id: UniProtKB:P49748
                              label: Very long-chain specific acyl-CoA dehydrogenase, mitochondrial
                          - preferred_term: ACAD9 (human)
                            term:
                              id: UniProtKB:Q9H845
                              label: Complex I assembly factor ACAD9, mitochondrial
                          - preferred_term: Acadvl / CG7461 (Drosophila)
                            term:
                              id: UniProtKB:A1ZBJ2
                              label: Acyl-CoA dehydrogenase very long chain
                          - preferred_term: Egm / dACAD9 / CG9006 (Drosophila)
                            term:
                              id: UniProtKB:Q5U117
                              label: Complex I assembly factor Egm, mitochondrial
                    function:
                      preferred_term: very-long-chain fatty acyl-CoA dehydrogenase activity
                      term:
                        id: GO:0017099
                        label: very-long-chain fatty acyl-CoA dehydrogenase activity
                      substrates:
                        - preferred_term: very-long/long-chain acyl-CoA
                        - preferred_term: FAD
                      products:
                        - preferred_term: (2E)-enoyl-CoA
                        - preferred_term: FADH2
                    locations:
                      - preferred_term: mitochondrial inner membrane
                        term:
                          id: GO:0005743
                          label: mitochondrial inner membrane
                    role_description: >-
                      ACADVL is the canonical long/very-long-chain dehydrogenase of
                      this step (its gene review keeps GO:0017099). ACAD9 is a paralog
                      whose grouping here reflects its ancestral/secondary acyl-CoA
                      dehydrogenase activity, but two caveats apply and are NOT to be
                      read off the variant's GO:0017099 selector: (1) the ACAD9 gene
                      review recommends MODIFY of GO:0017099 to GO:0004466 (long-chain
                      acyl-CoA dehydrogenase activity), because ACAD9's optimal
                      substrates are long-chain (C14-C18) rather than very-long-chain
                      (C20+); and (2) ACAD9's — and its Drosophila ortholog Egm's —
                      primary biological role is as a mitochondrial complex I assembly
                      factor (Egm core function GO:0030674, protein-macromolecule
                      adaptor activity), not fatty acid beta-oxidation. In Drosophila,
                      Acadvl (CG7461) is the dehydrogenase ortholog and Egm/dACAD9
                      (CG9006) the complex I assembly factor; see the ACAD9 and Egm
                      gene reviews for the per-gene calls.
              - id: mcad_variant
                label: Medium-chain acyl-CoA dehydrogenase (MCAD)
                module_type: REACTION
                annotons:
                  - id: mcad_activity
                    label: "MCAD: medium-chain acyl-CoA dehydrogenase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Medium-chain acyl-CoA dehydrogenase (MCAD)
                        representative_members:
                          - preferred_term: ACADM (human)
                            term:
                              id: UniProtKB:P11310
                              label: Medium-chain specific acyl-CoA dehydrogenase, mitochondrial
                          - preferred_term: Mcad / CG12262 (Drosophila)
                            term:
                              id: UniProtKB:Q9VSA3
                              label: Medium-chain specific acyl-CoA dehydrogenase, mitochondrial
                    function:
                      preferred_term: medium-chain fatty acyl-CoA dehydrogenase activity
                      term:
                        id: GO:0070991
                        label: medium-chain fatty acyl-CoA dehydrogenase activity
                      substrates:
                        - preferred_term: medium-chain acyl-CoA
                        - preferred_term: FAD
                      products:
                        - preferred_term: (2E)-enoyl-CoA
                        - preferred_term: FADH2
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
              - id: scad_variant
                label: Short-chain acyl-CoA dehydrogenase (SCAD)
                module_type: REACTION
                annotons:
                  - id: scad_activity
                    label: "SCAD: short-chain acyl-CoA dehydrogenase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Short-chain acyl-CoA dehydrogenase (SCAD)
                        representative_members:
                          - preferred_term: ACADS (human)
                            term:
                              id: UniProtKB:P16219
                              label: Short-chain specific acyl-CoA dehydrogenase, mitochondrial
                          - preferred_term: Arc42 / CG4703 (Drosophila)
                            term:
                              id: UniProtKB:Q9VDT1
                              label: Short-chain specific acyl-CoA dehydrogenase, mitochondrial
                          - preferred_term: CG4860 (Drosophila)
                            term:
                              id: UniProtKB:Q9VGC2
                              label: Short-chain specific acyl-CoA dehydrogenase, mitochondrial
                    function:
                      preferred_term: short-chain fatty acyl-CoA dehydrogenase activity
                      term:
                        id: GO:0016937
                        label: short-chain fatty acyl-CoA dehydrogenase activity
                      substrates:
                        - preferred_term: short-chain acyl-CoA (e.g. butyryl-CoA)
                        - preferred_term: FAD
                      products:
                        - preferred_term: (2E)-enoyl-CoA
                        - preferred_term: FADH2
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
    # ------------------------------------------------------------------
    # STEP 2: enoyl-CoA hydratase ((2E)-enoyl-CoA -> (3S)-3-hydroxyacyl-CoA)
    # ------------------------------------------------------------------
    - order: 2
      role: hydration of (2E)-enoyl-CoA to (3S)-3-hydroxyacyl-CoA
      node:
        id: ech_step
        label: "Step 2: enoyl-CoA hydratase"
        module_type: REACTION
        variant_sets:
          - id: ech_chain_length
            label: Chain-length-specific enoyl-CoA hydratases
            axis: acyl-CoA chain length
            selection: ONE_OR_MORE
            notes: >-
              No long-chain-specific or short-chain-specific enoyl-CoA hydratase MF
              term exists in current GO (the long-chain term GO:0016508 is obsolete),
              so both variants ground to the general enoyl-CoA hydratase activity
              GO:0004300; the chain-length distinction is carried by the enzyme
              identity (MTP alpha vs ECHS1).
            variants:
              - id: lc_hydratase_variant
                label: Long-chain enoyl-CoA hydratase (MTP alpha subunit, HADHA)
                module_type: REACTION
                annotons:
                  - id: lc_hydratase_activity
                    label: "HADHA/MTP-alpha: long-chain enoyl-CoA hydratase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Trifunctional enzyme alpha subunit (HADHA / MTP alpha)
                        representative_members:
                          - preferred_term: HADHA (human)
                            term:
                              id: UniProtKB:P40939
                              label: Trifunctional enzyme subunit alpha, mitochondrial
                          - preferred_term: Mtpalpha / CG4389 (Drosophila)
                            term:
                              id: UniProtKB:Q8IPE8
                              label: Trifunctional enzyme subunit alpha, mitochondrial
                    function:
                      preferred_term: enoyl-CoA hydratase activity
                      term:
                        id: GO:0004300
                        label: enoyl-CoA hydratase activity
                      substrates:
                        - preferred_term: long-chain (2E)-enoyl-CoA
                        - preferred_term: H2O
                      products:
                        - preferred_term: long-chain (3S)-3-hydroxyacyl-CoA
                    locations:
                      - preferred_term: mitochondrial inner membrane
                        term:
                          id: GO:0005743
                          label: mitochondrial inner membrane
                    role_description: >-
                      The hydratase activity of the alpha subunit of the membrane-bound
                      mitochondrial trifunctional protein (alpha2-beta2).
              - id: sc_hydratase_variant
                label: Short/medium-chain enoyl-CoA hydratase (ECHS1, crotonase)
                module_type: REACTION
                annotons:
                  - id: sc_hydratase_activity
                    label: "ECHS1: short-chain enoyl-CoA hydratase (crotonase)"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Short-chain enoyl-CoA hydratase (ECHS1 / crotonase)
                        representative_members:
                          - preferred_term: ECHS1 (human)
                            term:
                              id: UniProtKB:P30084
                              label: Enoyl-CoA hydratase, mitochondrial
                          - preferred_term: Echs1 / CG6543 (Drosophila)
                            term:
                              id: UniProtKB:Q7JR58
                              label: Enoyl-CoA hydratase, mitochondrial
                    function:
                      preferred_term: enoyl-CoA hydratase activity
                      term:
                        id: GO:0004300
                        label: enoyl-CoA hydratase activity
                      substrates:
                        - preferred_term: short/medium-chain (2E)-enoyl-CoA
                        - preferred_term: H2O
                      products:
                        - preferred_term: short/medium-chain (3S)-3-hydroxyacyl-CoA
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
                    role_description: >-
                      ECHS1 is a soluble matrix crotonase that also acts in valine and
                      other branched-chain amino-acid catabolism beyond the
                      beta-oxidation spiral.
    # ------------------------------------------------------------------
    # STEP 3: 3-hydroxyacyl-CoA dehydrogenase (NAD+; -> 3-ketoacyl-CoA)
    # ------------------------------------------------------------------
    - order: 3
      role: NAD+-dependent oxidation of (3S)-3-hydroxyacyl-CoA to 3-ketoacyl-CoA
      node:
        id: hadh_step
        label: "Step 3: 3-hydroxyacyl-CoA dehydrogenase"
        module_type: REACTION
        variant_sets:
          - id: hadh_chain_length
            label: Chain-length-specific 3-hydroxyacyl-CoA dehydrogenases
            axis: acyl-CoA chain length
            selection: ONE_OR_MORE
            variants:
              - id: lc_hadh_variant
                label: Long-chain 3-hydroxyacyl-CoA dehydrogenase (MTP alpha subunit, HADHA)
                module_type: REACTION
                annotons:
                  - id: lc_hadh_activity
                    label: "HADHA/MTP-alpha: long-chain 3-hydroxyacyl-CoA dehydrogenase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Trifunctional enzyme alpha subunit (HADHA / MTP alpha)
                        representative_members:
                          - preferred_term: HADHA (human)
                            term:
                              id: UniProtKB:P40939
                              label: Trifunctional enzyme subunit alpha, mitochondrial
                          - preferred_term: Mtpalpha / CG4389 (Drosophila)
                            term:
                              id: UniProtKB:Q8IPE8
                              label: Trifunctional enzyme subunit alpha, mitochondrial
                    function:
                      preferred_term: long-chain (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
                      term:
                        id: GO:0016509
                        label: long-chain (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
                      substrates:
                        - preferred_term: long-chain (3S)-3-hydroxyacyl-CoA
                        - preferred_term: NAD+
                      products:
                        - preferred_term: long-chain 3-oxoacyl-CoA
                        - preferred_term: NADH
                    locations:
                      - preferred_term: mitochondrial inner membrane
                        term:
                          id: GO:0005743
                          label: mitochondrial inner membrane
              - id: sc_hadh_variant
                label: Short/medium-chain 3-hydroxyacyl-CoA dehydrogenase (HADH / SCHAD)
                module_type: REACTION
                annotons:
                  - id: sc_hadh_activity
                    label: "HADH: short/medium-chain 3-hydroxyacyl-CoA dehydrogenase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Short-chain 3-hydroxyacyl-CoA dehydrogenase (HADH / SCHAD)
                        representative_members:
                          - preferred_term: HADH (human)
                            term:
                              id: UniProtKB:Q16836
                              label: Hydroxyacyl-coenzyme A dehydrogenase, mitochondrial
                          - preferred_term: scully / scu (Drosophila; HSD17B10-type)
                            term:
                              id: UniProtKB:O18404
                              label: Probable 3-hydroxyacyl-CoA dehydrogenase type-2 (scully)
                    function:
                      preferred_term: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
                      term:
                        id: GO:0003857
                        label: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
                      substrates:
                        - preferred_term: short/medium-chain (3S)-3-hydroxyacyl-CoA
                        - preferred_term: NAD+
                      products:
                        - preferred_term: short/medium-chain 3-oxoacyl-CoA
                        - preferred_term: NADH
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
                    role_description: >-
                      HADH (SCHAD) is the human soluble matrix short/medium-chain enzyme,
                      distinct from the long-chain HADHA; it also has a moonlighting
                      role regulating insulin secretion via GLUD1 inhibition. Drosophila
                      lacks a clean 1:1 ortholog of the classical HADH1/SCHAD (type-I,
                      3HCDH fold, Pfam PF00725) - the FlyBase Had1/Had2 genes are actually
                      CRYL1 (L-gulonate-3-dehydrogenase) orthologs. The fly enzyme that
                      covers this step is scully (scu, O18404), the ortholog of human
                      HSD17B10 (type-II 3-hydroxyacyl-CoA dehydrogenase, SDR fold, Pfam
                      PF00106): a blinded OpenScientist analysis plus a direct enzymatic
                      assay (PMID:12917011) confirm (3S)-3-hydroxyacyl-CoA dehydrogenase
                      activity, with catalytic residues 100% conserved vs human HSD17B10.
                      scully is multifunctional (also steroid dehydrogenase and the MRPP2
                      subunit of mitochondrial RNase P), and long-chain step 3 in the fly
                      is carried by MTP (Mtpalpha). Grounded here as the type-II fly
                      counterpart; see genes/DROME/scu.
    # ------------------------------------------------------------------
    # STEP 4: 3-ketoacyl-CoA thiolase (CoA; -> acetyl-CoA + acyl(n-2)-CoA)
    # ------------------------------------------------------------------
    - order: 4
      role: thiolytic cleavage of 3-ketoacyl-CoA to acetyl-CoA + chain-shortened acyl-CoA
      node:
        id: thiolase_step
        label: "Step 4: 3-ketoacyl-CoA thiolase"
        module_type: REACTION
        variant_sets:
          - id: thiolase_chain_length
            label: Chain-length-specific 3-ketoacyl-CoA thiolases
            axis: acyl-CoA chain length
            selection: ONE_OR_MORE
            notes: >-
              No chain-length-specific thiolase MF term exists, so the straight-chain
              thiolases ground to the general acetyl-CoA C-acyltransferase activity
              GO:0003988; the acetoacetyl-CoA-specific ACAT1 grounds to acetyl-CoA
              C-acetyltransferase activity GO:0003985.
            variants:
              - id: lc_thiolase_variant
                label: Long-chain 3-ketoacyl-CoA thiolase (MTP beta subunit, HADHB)
                module_type: REACTION
                annotons:
                  - id: lc_thiolase_activity
                    label: "HADHB/MTP-beta: long-chain 3-ketoacyl-CoA thiolase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Trifunctional enzyme beta subunit (HADHB / MTP beta)
                        representative_members:
                          - preferred_term: HADHB (human)
                            term:
                              id: UniProtKB:P55084
                              label: Trifunctional enzyme subunit beta, mitochondrial
                          - preferred_term: Mtpbeta / CG4581 (Drosophila)
                            term:
                              id: UniProtKB:Q9W1H8
                              label: acetyl-CoA C-acyltransferase (3-ketoacyl-CoA thiolase)
                    function:
                      preferred_term: acetyl-CoA C-acyltransferase activity
                      term:
                        id: GO:0003988
                        label: acetyl-CoA C-acyltransferase activity
                      substrates:
                        - preferred_term: long-chain 3-oxoacyl-CoA
                        - preferred_term: coenzyme A
                      products:
                        - preferred_term: acetyl-CoA
                        - preferred_term: long-chain acyl-CoA (shortened by two carbons)
                    locations:
                      - preferred_term: mitochondrial inner membrane
                        term:
                          id: GO:0005743
                          label: mitochondrial inner membrane
                    role_description: >-
                      The thiolase activity of the beta subunit of the membrane-bound
                      mitochondrial trifunctional protein (alpha2-beta2).
              - id: med_thiolase_variant
                label: Medium/long-chain 3-ketoacyl-CoA thiolase (ACAA2)
                module_type: REACTION
                annotons:
                  - id: med_thiolase_activity
                    label: "ACAA2: 3-ketoacyl-CoA thiolase"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: 3-ketoacyl-CoA thiolase (ACAA2)
                        representative_members:
                          - preferred_term: ACAA2 (human)
                            term:
                              id: UniProtKB:P42765
                              label: 3-ketoacyl-CoA thiolase, mitochondrial
                          - preferred_term: Acaa / Yip2 / CG4600 (Drosophila)
                            term:
                              id: UniProtKB:Q9VL70
                              label: 3-ketoacyl-CoA thiolase (Yippee interacting protein 2)
                    function:
                      preferred_term: acetyl-CoA C-acyltransferase activity
                      term:
                        id: GO:0003988
                        label: acetyl-CoA C-acyltransferase activity
                      substrates:
                        - preferred_term: medium/long-chain 3-oxoacyl-CoA
                        - preferred_term: coenzyme A
                      products:
                        - preferred_term: acetyl-CoA
                        - preferred_term: acyl-CoA (shortened by two carbons)
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
                    role_description: >-
                      ACAA2 is the soluble matrix straight-chain thiolase, distinct from
                      the MTP-embedded long-chain thiolase HADHB.
              - id: sc_thiolase_variant
                label: Short-chain / acetoacetyl-CoA thiolase (ACAT1, T2)
                module_type: REACTION
                annotons:
                  - id: sc_thiolase_activity
                    label: "ACAT1: acetoacetyl-CoA thiolase (T2)"
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Acetoacetyl-CoA thiolase (ACAT1 / T2)
                        representative_members:
                          - preferred_term: ACAT1 (human)
                            term:
                              id: UniProtKB:P24752
                              label: Acetyl-CoA acetyltransferase, mitochondrial
                          - preferred_term: Acat1 / CG10932 (Drosophila)
                            term:
                              id: UniProtKB:Q9W3N9
                              label: Acetyl-CoA acetyltransferase 1
                    function:
                      preferred_term: acetyl-CoA C-acetyltransferase activity
                      term:
                        id: GO:0003985
                        label: acetyl-CoA C-acetyltransferase activity
                      substrates:
                        - preferred_term: acetoacetyl-CoA
                        - preferred_term: coenzyme A
                      products:
                        - preferred_term: acetyl-CoA
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
                    role_description: >-
                      ACAT1 (mitochondrial "T2") cleaves the shortest (C4)
                      acetoacetyl-CoA and is principally an enzyme of ketone-body
                      metabolism and isoleucine catabolism rather than the long-chain
                      spiral; see MODULE:ketone_body_oxidation. It is NOT the
                      cholesterol-esterifying SOAT1/SOAT2 despite the shared "ACAT"
                      nickname.
  connections:
    - source: acad_step
      target: ech_step
      connection_type: PRECEDES
      chaining_status: MAPPING_GAP
      chaining_note: >-
        Step 1 produces (2E)-enoyl-CoA, which the crotonase reaction RHEA:16105
        ((3S)-3-hydroxyacyl-CoA = (2E)-enoyl-CoA + H2O) consumes. However the
        enoyl-CoA hydratase MF GO:0004300 maps only to RHEA:20724 (the (3E)-enoyl-CoA
        variant), so the automated GO->RHEA chaining check sees no shared
        intermediate. The chemistry is correct; the gap is in the GO:0004300->RHEA
        mapping (missing RHEA:16105).
    - source: ech_step
      target: hadh_step
      connection_type: PRECEDES
    - source: hadh_step
      target: thiolase_step
      connection_type: PRECEDES
    - source: thiolase_step
      target: acad_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The chain-shortened acyl-CoA produced by the thiolase re-enters step 1,
        making the pathway a spiral that iterates until the chain is fully degraded.
  notes: >-
    Cross-species module: each catalytic role is grounded with both human and
    Drosophila melanogaster orthologs (FAMILY selectors with representative_members).
    Chain-length specificity is modelled as a ONE_OR_MORE variant set per step, since
    multiple isozymes can act across the successive turns of the spiral as the chain
    shortens. Human accessions and GO MF/location terms are verified against the
    per-gene reviews in genes/human/. Drosophila accessions are from UniProtKB
    (taxon 7227); most are unreviewed (TrEMBL) and are given as orienting orthologous
    exemplars, not reviewed assertions. The medium/short-chain 3-hydroxyacyl-CoA
    dehydrogenase has no confidently assigned Drosophila ortholog (marked "?" in the
    source species comparison). ACAT1 is included for completeness of the thiolase
    step but its core role is ketone-body/isoleucine metabolism (cross-referenced to
    MODULE:ketone_body_oxidation), not long-chain beta-oxidation.
