knowledge_gaps:
  - gap_statement: The tumor suppressor-oncogene paradox remains unresolved in the Ephrin receptor 
      signaling pathway module.
    boundary: Perhaps the most persistent controversy concerns Eph receptors' dual roles in cancer. 
      Eph receptors are frequently overexpressed in tumors yet are often poorly 
      tyrosine-phosphorylated, suggesting that their canonical forward signaling may actually 
      restrain tumor progression (guo2024ephsincancer pages 5-7, guo2024ephsincancer pages 7-10).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/ephrin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Ligand-dependent versus ligand-independent signaling remains unresolved in the 
      Ephrin receptor signaling pathway module.
    boundary: While canonical signaling requires ephrin binding, Eph receptors clearly signal in the
      absence of ligand through receptor overexpression-driven clustering, phosphorylation by 
      heterologous kinases, unconventional ligands, and cis interactions (guo2024ephsincancer pages 
      5-7, pasquale2024ephreceptorsignaling pages 23-26).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/ephrin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Phase separation and condensate biology remains unresolved in the Ephrin receptor
      signaling pathway module.
    boundary: Emerging evidence suggests that ephrin-induced Eph receptor clustering may generate 
      biomolecular condensates through liquid-liquid phase separation, creating non-equilibrium 
      signaling platforms with threshold-dependent responses (pasquale2024ephreceptorsignaling pages
      4-6, pasquale2024ephreceptorsignaling pages 11-13).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/ephrin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Heterotypic receptor platforms remains unresolved in the Ephrin receptor 
      signaling pathway module.
    boundary: Whether different Eph receptor subtypes co-assemble into heterotypic signaling 
      platforms that generate novel functions distinct from homomeric assemblies remains an open 
      question. EPHA2 and EGFR form complexes driven by PIP2 interactions at the plasma membrane, 
      suggesting that heterotypic RTK assemblies may be an underappreciated aspect of Eph signaling 
      (pasquale2024ephreceptorsignaling pages 23-26).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/ephrin_receptor_signaling-deep-research-falcon.md
  - gap_statement: Incompletely characterized phosphorylation sites remains unresolved in the Ephrin
      receptor signaling pathway module.
    boundary: The functional significance of many Eph receptor phosphorylation sites-including 
      extracellular tyrosine phosphosites, non-conserved sites, and serine/threonine 
      phosphosites-remains poorly understood (pasquale2024ephreceptorsignaling pages 11-13).
    gap_kind:
