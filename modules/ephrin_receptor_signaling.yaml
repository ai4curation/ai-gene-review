id: MODULE:ephrin_receptor_signaling
title: Ephrin receptor signaling pathway module
description: Membrane-tethered ephrin ligands activate Eph receptor tyrosine kinases across 
  cell-cell contacts, producing bidirectional signals that pattern adhesion, repulsion, migration, 
  and vascular organization.
