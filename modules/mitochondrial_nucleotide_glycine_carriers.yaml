id: MODULE:mitochondrial_nucleotide_glycine_carriers
title: Mitochondrial nucleotide and glycine carriers (SLC25A24 ATP-Mg/Pi, SLC25A36 pyrimidine nucleotide, SLC25A38 glycine)
description: >-
  Mitochondria must import nucleotides and amino-acid precursors that are needed inside the matrix
  for mtDNA/RNA synthesis and for biosynthetic pathways confined to the organelle. This module
  groups three SLC25 inner-membrane carriers that supply such precursors. SLC25A24 (APC1/SCaMC-1) is
  a Ca2+-regulated ATP-Mg/phosphate carrier that exchanges cytosolic Mg-ATP (or ADP) for matrix
  inorganic phosphate, adjusting the total matrix adenine-nucleotide pool in response to cytosolic
  calcium via its N-terminal EF-hand domain. SLC25A36 (PNC1) is the pyrimidine nucleotide carrier
  that transports pyrimidine (and, less well, purine) nucleotides across the inner membrane,
  maintaining the mitochondrial nucleotide pool for replication and transcription. SLC25A38 is the
  glycine carrier that imports glycine into the matrix, providing the substrate for the first,
  committed step of heme biosynthesis (ALA synthase: glycine + succinyl-CoA -> 5-aminolevulinate) in
  erythroid cells, as well as for mitochondrial glycine/one-carbon metabolism. Loss-of-function
  causes precursor-specific disease: SLC25A24 — Fontaine progeroid syndrome (Gorlin-Chaudhry-Moss);
  SLC25A38 — autosomal-recessive congenital sideroblastic anemia.
status: DRAFT
evidence:
  - source_id: GO:1990544
    title: mitochondrial ATP transmembrane transport
    statement: SLC25A24 mediates mitochondrial ATP (ATP-Mg/phosphate) transmembrane transport (GO:1990544).
  - source_id: GO:1990519
    title: pyrimidine nucleotide import into mitochondrion
    statement: SLC25A36 mediates pyrimidine nucleotide import into the mitochondrion (GO:1990519).
  - source_id: GO:1904983
    title: glycine import into mitochondrion
    statement: SLC25A38 mediates glycine import into the mitochondrion (GO:1904983) for heme biosynthesis.
  - source_id: file:human/SLC25A24/SLC25A24-ai-review.yaml
    title: SLC25A24 gene review (human)
    statement: The Ca2+-regulated ATP-Mg/Pi carrier (UniProtKB:Q6NUK1, GO:0005347) matches the completed human SLC25A24 review.
  - source_id: file:human/SLC25A36/SLC25A36-ai-review.yaml
    title: SLC25A36 gene review (human)
    statement: The pyrimidine nucleotide carrier (UniProtKB:Q96CQ1, GO:0015218) matches the completed human SLC25A36 review.
  - source_id: file:human/SLC25A38/SLC25A38-ai-review.yaml
    title: SLC25A38 gene review (human)
    statement: The glycine carrier (UniProtKB:Q96DW6, GO:0015187) matches the completed human SLC25A38 review.
