  notes: >-
    Mitochondrial nucleotide and glycine (biosynthetic-precursor) import carriers of the SLC25 family,
    grounded to the completed human gene reviews: SLC25A24/APC1/SCaMC-1 (Q6NUK1, GO:0005347 ATP
    transporter + GO:0140987 ATP:phosphate antiporter + GO:0005509 Ca2+ binding), SLC25A36/PNC1
    (Q96CQ1, GO:0015218 pyrimidine nucleotide transporter) and SLC25A38 (Q96DW6, GO:0015187 glycine
    transporter, feeding heme biosynthesis GO:0006783). All three are inner-membrane transporters (no
    catalytic MF). NOTE: the fourth remaining SLC25 gene, SLC25A46 (Q96AG3), is reviewed in the same
    batch but is NOT a metabolite carrier — it is a transport-dead, outer-mitochondrial-membrane
    member that regulates mitochondrial fission/fusion and cristae architecture (curated as
    GO:0044877 protein-containing complex binding / GO:0000266 mitochondrial fission), so it is
    intentionally excluded from this carrier module. GO term ids/labels verified against the local
    go.db. These complete the SLC25 mitochondrial-carrier coverage alongside the ATP-synthasome
    carriers, cofactor carriers, di-/tricarboxylate carriers, and the malate-aspartate shuttle
    carriers. Disorders: SLC25A24 — Fontaine progeroid syndrome; SLC25A38 — congenital sideroblastic
    anemia.
