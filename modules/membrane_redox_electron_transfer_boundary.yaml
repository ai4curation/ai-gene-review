id: MODULE:membrane_redox_electron_transfer_boundary
title: Membrane redox and electron-transfer spillover boundary
description: Boundary module for PSEPK cytochromes, ferredoxins, blue-copper electron carriers, Dsb/thioredoxin/glutaredoxin
  redox proteins, Rnf/Nqr ion-translocating oxidoreductase components, ETF electron carriers, cytochrome c/oxidase maturation
  proteins, MsrQ/Hmp redox detoxification nodes, and related membrane redox/enzyme side nodes pulled into transport buckets
  by metal-binding, heme, iron-sulfur, membrane, or electron-transport evidence.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_membrane_redox_electron_transfer_spillovers.tsv
  title: PSEPK membrane redox/electron-transfer spillover batch
  statement: The batch table records 25 PSEPK ion/metal-bucket genes assigned to cytochrome, ferredoxin, Ccm, flavohemoglobin,
    MsrQ, multicopper, azurin, and OFeT/FTR1-like redox/transport contexts.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates redox spillovers from true cation transporters, ABC metal systems, P-type
    ATPases, and membrane-enzyme side nodes.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_membrane_redox_electron_transfer_proteins.tsv
  title: PSEPK transport-bucket membrane redox/electron-transfer batch
  statement: The batch table records 24 PSEPK transport/membrane/efflux-bucket genes assigned to Dsb, thioredoxin/glutaredoxin,
    Rnf/Nqr, ETF, cytochrome bd, Ccm/Cco, and low-information membrane redox/enzyme contexts.
notes: 'First-pass interpretation: treat this as a boundary/spillover module, not a single canonical pathway. Specific electron-transfer,
  disulfide-redox, glutaredoxin/thioredoxin, ion-translocating Rnf/Nqr, ETF carrier, cytochrome-maturation, heme-handling,
  iron-transport, nitric-oxide-detoxification, protein-repair, and multicopper-oxidase calls are retained where product/family
  and GOA agree; broad metal/heme/FAD/Fe-S binding and low-information membrane terms are kept as supporting context rather
  than standalone core functions.'
