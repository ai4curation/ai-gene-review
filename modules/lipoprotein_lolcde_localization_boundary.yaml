id: MODULE:lipoprotein_lolcde_localization_boundary
title: LolCDE lipoprotein localization boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 PP_2154-PP_2156 LolCDE
  lipoprotein-releasing ABC transporter from the KEGG ppu02010 ABC-transporter
  umbrella map. LolC and LolE are multi-pass plasma-membrane permease
  components, while the reviewed LolD ATP-binding subunit energizes transfer of
  mature outer membrane-directed lipoproteins from the inner membrane to the
  periplasmic chaperone LolA. The module records the LolCDE release/localization
  step and keeps it distinct from LPS, phospholipid, and generic ABC transport
  modules.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_2154-PP_2156 lolC/lolD/lolE locus as a
      coherent lipoprotein-releasing ABC transporter sub-batch within the broad
      ABC-transporter umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records cluster C29 as lolC, lolD, and lolE
      after first-pass curation.
  - source_id: UniProtKB:Q88KY5
    title: LolC lipoprotein-release permease component
    statement: >-
      UniProt names LolC as LolC, places it in the cell membrane as a multi-pass
      membrane protein, and carries the LolC/E transmembrane InterPro domain
      IPR011925.
  - source_id: UniProtKB:Q88KY4
    title: LolD lipoprotein-releasing system ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation names LolD as the
      lipoprotein-releasing system ATP-binding protein, describes it as part of
      the LolCDE ABC transporter complex, and states that LolCDE translocates
      mature outer membrane-directed lipoproteins to the periplasmic chaperone
      LolA in an ATP-dependent manner.
  - source_id: UniProtKB:Q88KY3
    title: LolE lipoprotein-release permease component
    statement: >-
      UniProt names LolE as a lipoprotein releasing-system permease protein,
      places it in the cell membrane as a multi-pass membrane protein, and
      carries the LolC/E transmembrane InterPro domain IPR011925.
