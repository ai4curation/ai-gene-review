notes: >-
  This boundary module was created from the ppu02010 ABC-transporter partition
  work. It should remain separate from LPS biosynthesis and phospholipid
  transport modules; LolCDE handles mature lipoprotein release/localization
  rather than lipid A, LPS, or bulk phospholipid transport.
