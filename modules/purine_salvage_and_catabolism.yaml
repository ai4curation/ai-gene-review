id: MODULE:purine_salvage_and_catabolism
title: Purine salvage and catabolism (to uric acid) — Lesch-Nyhan, ADA/PNP-SCID, xanthinuria
description: >-
  The cytosolic handling of purine bases and nucleosides after nucleic-acid/nucleotide
  turnover, comprising a salvage arm (which recycles free bases into nucleotides,
  sparing costly de novo synthesis) and a catabolic arm (which degrades purine
  nucleosides to the excretory end-product uric acid). Salvage: hypoxanthine-guanine
  phosphoribosyltransferase (HPRT1) transfers the phosphoribosyl group of PRPP onto
  hypoxanthine and guanine to regenerate IMP and GMP, and adenine phosphoribosyltransferase
  (APRT) does the same for adenine to regenerate AMP. Catabolism: adenosine deaminase
  (ADA) deaminates (deoxy)adenosine to (deoxy)inosine; purine nucleoside phosphorylase
  (PNP) phosphorolyses inosine, guanosine and their deoxy forms to the free bases
  hypoxanthine/guanine (which can then re-enter salvage via HPRT1 or continue to
  catabolism); and xanthine oxidoreductase (XDH) oxidises hypoxanthine to xanthine and
  xanthine to urate (uric acid), the final human purine catabolite (humans lack uricase).
  Inherited defects define classic disorders: HPRT1 deficiency causes Lesch-Nyhan
  syndrome (complete) or Kelley-Seegmiller gout/hyperuricemia (partial); APRT deficiency
  causes 2,8-dihydroxyadenine nephrolithiasis; ADA deficiency causes ADA-SCID and PNP
  deficiency a T-cell immunodeficiency (both from lymphotoxic deoxynucleotide
  accumulation); and XDH deficiency causes xanthinuria type I (XDH is the target of the
  gout drugs allopurinol/febuxostat).
status: DRAFT
evidence:
  - source_id: GO:0006144
    title: purine nucleobase metabolic process
    statement: >-
      The module is grounded in the GO purine nucleobase metabolic process
      (GO:0006144), spanning the salvage and catabolic arms.
  - source_id: Reactome:R-HSA-74259
    title: Purine catabolism
    statement: >-
      Reaction stoichiometries follow the human Reactome purine salvage/catabolism
      reactions R-HSA-74215 (HPRT1), R-HSA-74213 (APRT), R-HSA-74241 (ADA),
      R-HSA-112033 (PNP) and R-HSA-74247 (XDH).
  - source_id: file:human/HPRT1/HPRT1-ai-review.yaml
    title: HPRT1 gene review (human)
    statement: >-
      The hypoxanthine/guanine salvage step (UniProtKB:P00492, GO:0004422 + GO:0052657)
      matches the completed human HPRT1 review.
  - source_id: file:human/APRT/APRT-ai-review.yaml
    title: APRT gene review (human)
    statement: >-
      The adenine salvage step (UniProtKB:P07741, GO:0003999) matches the completed
      human APRT review.
  - source_id: file:human/ADA/ADA-ai-review.yaml
    title: ADA gene review (human)
    statement: >-
      The adenosine-deamination catabolic step (UniProtKB:P00813, GO:0004000) matches
      the completed human ADA review.
  - source_id: file:human/PNP/PNP-ai-review.yaml
    title: PNP gene review (human)
    statement: >-
      The nucleoside-phosphorolysis step (UniProtKB:P00491, GO:0004731) matches the
      completed human PNP review.
  - source_id: file:human/XDH/XDH-ai-review.yaml
    title: XDH gene review (human)
    statement: >-
      The terminal oxidation to urate (UniProtKB:P47989, GO:0004854 + GO:0004855)
      matches the completed human XDH review.
module:
  id: purine_salvage_and_catabolism
  label: Purine salvage and catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: purine nucleobase metabolic process
      term:
        id: GO:0006144
        label: purine nucleobase metabolic process
      description: >-
        Salvage of purine bases into nucleotides (HPRT1, APRT) and catabolism of
        purine nucleosides to uric acid (ADA, PNP, XDH).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The salvage and catabolic enzymes are cytosolic.
  parts:
    - order: 1
      role: salvage of hypoxanthine and guanine
      node:
        id: hprt1_step
        label: hypoxanthine/guanine + PRPP to IMP/GMP + PPi
        module_type: REACTION
        annotons:
          - id: hprt1_activity
            label: "HPRT1: hypoxanthine-guanine phosphoribosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Hypoxanthine-guanine phosphoribosyltransferase family (HPRT1)
                term:
                  id: PANTHER:PTHR43340
                  label: HYPOXANTHINE-GUANINE PHOSPHORIBOSYLTRANSFERASE
                representative_members:
                  - preferred_term: HPRT1 (human)
                    term:
                      id: UniProtKB:P00492
                      label: Hypoxanthine-guanine phosphoribosyltransferase
            function:
              preferred_term: hypoxanthine phosphoribosyltransferase activity
              term:
                id: GO:0004422
                label: hypoxanthine phosphoribosyltransferase activity
              substrates:
                - preferred_term: hypoxanthine / guanine
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
              products:
                - preferred_term: IMP / GMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.4.2.8
                  statement: hypoxanthine phosphoribosyltransferase (also guanine, GO:0052657)
                - source_id: Reactome:R-HSA-74215
                  statement: "HPRT1 catalyzes the conversion of guanine or hypoxanthine to GMP or IMP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Salvages hypoxanthine and guanine to IMP and GMP (also carries guanine
              PRT activity, GO:0052657). Complete deficiency causes Lesch-Nyhan syndrome;
              partial deficiency causes gout/hyperuricemia (Kelley-Seegmiller).
    - order: 2
      role: salvage of adenine
      node:
        id: aprt_step
        label: adenine + PRPP to AMP + PPi
        module_type: REACTION
        annotons:
          - id: aprt_activity
            label: "APRT: adenine phosphoribosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenine phosphoribosyltransferase family (APRT)
                term:
                  id: PANTHER:PTHR32315
                  label: ADENINE PHOSPHORIBOSYLTRANSFERASE
                representative_members:
                  - preferred_term: APRT (human)
                    term:
                      id: UniProtKB:P07741
                      label: Adenine phosphoribosyltransferase
            function:
              preferred_term: adenine phosphoribosyltransferase activity
              term:
                id: GO:0003999
                label: adenine phosphoribosyltransferase activity
              substrates:
                - preferred_term: adenine
                - preferred_term: PRPP
              products:
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.4.2.7
                  statement: adenine phosphoribosyltransferase
                - source_id: Reactome:R-HSA-74213
                  statement: "APRT catalyzes the conversion of adenine to AMP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Salvages adenine to AMP. Deficiency diverts adenine to XDH-mediated
              oxidation, forming insoluble 2,8-dihydroxyadenine (2,8-DHA nephrolithiasis).
    - order: 3
      role: catabolism — adenosine deamination
      node:
        id: ada_step
        label: (deoxy)adenosine to (deoxy)inosine + NH3
        module_type: REACTION
        annotons:
          - id: ada_activity
            label: "ADA: adenosine deaminase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenosine/AMP deaminase family (ADA)
                term:
                  id: PANTHER:PTHR11409
                  label: ADENOSINE DEAMINASE
                representative_members:
                  - preferred_term: ADA (human)
                    term:
                      id: UniProtKB:P00813
                      label: Adenosine deaminase
            function:
              preferred_term: adenosine deaminase activity
              term:
                id: GO:0004000
                label: adenosine deaminase activity
              substrates:
                - preferred_term: adenosine / 2'-deoxyadenosine
                - preferred_term: water
              products:
                - preferred_term: inosine / 2'-deoxyinosine
                - preferred_term: ammonia
              evidence:
                - source_id: EC:3.5.4.4
                  statement: adenosine deaminase (zinc-dependent)
                - source_id: Reactome:R-HSA-74241
                  statement: "ADA catalyzes the deamination of (deoxy)adenosine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Zinc metalloenzyme deaminating (deoxy)adenosine; essential in
              lymphocytes (deficiency -> toxic dATP -> ADA-SCID). Also acts as
              ecto-ADA at the cell surface with CD26/DPP4 (non-core role).
    - order: 4
      role: catabolism — nucleoside phosphorolysis (feeds salvage or catabolism)
      node:
        id: pnp_step
        label: inosine/guanosine + Pi to hypoxanthine/guanine + (deoxy)ribose-1-phosphate
        module_type: REACTION
        annotons:
          - id: pnp_activity
            label: "PNP: purine nucleoside phosphorylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Purine nucleoside phosphorylase / MTAP family (PNP)
                term:
                  id: PANTHER:PTHR11904
                  label: METHYLTHIOADENOSINE/PURINE NUCLEOSIDE PHOSPHORYLASE
                representative_members:
                  - preferred_term: PNP (human)
                    term:
                      id: UniProtKB:P00491
                      label: Purine nucleoside phosphorylase
            function:
              preferred_term: purine-nucleoside phosphorylase activity
              term:
                id: GO:0004731
                label: purine-nucleoside phosphorylase activity
              substrates:
                - preferred_term: inosine / guanosine / 2'-deoxy forms
                - preferred_term: phosphate
              products:
                - preferred_term: hypoxanthine / guanine
                - preferred_term: (deoxy)ribose-1-phosphate
              evidence:
                - source_id: EC:2.4.2.1
                  statement: purine-nucleoside phosphorylase (6-oxopurine nucleosides)
                - source_id: Reactome:R-HSA-112033
                  statement: "PNP catalyzes the conversion of hypoxanthine and (deoxy)ribose-1-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Homotrimeric phosphorylase releasing hypoxanthine/guanine (which can be
              salvaged by HPRT1 or catabolised by XDH). Specific for 6-oxopurine
              nucleosides (not adenosine). Deficiency causes a T-cell immunodeficiency
              (toxic dGTP).
    - order: 5
      role: terminal oxidation to uric acid
      node:
        id: xdh_step
        label: hypoxanthine to xanthine to urate
        module_type: REACTION
        annotons:
          - id: xdh_activity
            label: "XDH: xanthine oxidoreductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Xanthine dehydrogenase/oxidase (molybdo-flavoenzyme) family (XDH)
                term:
                  id: PANTHER:PTHR45444
                  label: XANTHINE DEHYDROGENASE
                representative_members:
                  - preferred_term: XDH (human)
                    term:
                      id: UniProtKB:P47989
                      label: Xanthine dehydrogenase/oxidase
            function:
              preferred_term: xanthine dehydrogenase activity
              term:
                id: GO:0004854
                label: xanthine dehydrogenase activity
              substrates:
                - preferred_term: hypoxanthine / xanthine
                - preferred_term: NAD+ (dehydrogenase form) or O2 (oxidase form)
              products:
                - preferred_term: xanthine / urate
                - preferred_term: NADH or H2O2/superoxide
              evidence:
                - source_id: EC:1.17.1.4
                  statement: xanthine dehydrogenase (Mo-co/FAD/2x[2Fe-2S]); also xanthine oxidase EC 1.17.3.2, GO:0004855
                - source_id: Reactome:R-HSA-74247
                  statement: "XDH oxidizes hypoxanthine to form xanthine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Molybdopterin/FAD/Fe-S oxidoreductase carrying out the last two purine-
              catabolic steps (hypoxanthine -> xanthine -> urate, the terminal human
              catabolite; humans lack uricase). Interconverts between an NAD+-linked
              dehydrogenase (XDH) and an O2-linked, ROS-generating oxidase (XO) form.
              Deficiency causes xanthinuria type I; the drug target of allopurinol.
  connections:
    - source: ada_step
      target: pnp_step
      connection_type: PROVIDES_INPUT_FOR
      description: (Deoxy)inosine from ADA is phosphorolysed by PNP.
    - source: pnp_step
      target: xdh_step
      connection_type: PROVIDES_INPUT_FOR
      description: Hypoxanthine released by PNP is oxidised to xanthine/urate by XDH.
    - source: pnp_step
      target: hprt1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Hypoxanthine/guanine released by PNP can instead be salvaged back to IMP/GMP
        by HPRT1 (the salvage-vs-catabolism branch point).
  notes: >-
    Purine base salvage (HPRT1, APRT) and nucleoside catabolism to uric acid (ADA ->
    PNP -> XDH) grounded to the human enzymes HPRT1 (UniProtKB:P00492, GO:0004422 /
    GO:0052657, EC 2.4.2.8), APRT (P07741, GO:0003999, EC 2.4.2.7), ADA (P00813,
    GO:0004000, EC 3.5.4.4), PNP (P00491, GO:0004731, EC 2.4.2.1) and XDH (P47989,
    GO:0004854 / GO:0004855, EC 1.17.1.4 / 1.17.3.2). GO molecular-function terms were
    taken from the human GOA records; Reactome reaction ids and titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector (generic
    over paralogs and orthologs) plus a concrete human representative member. PNP is the
    branch point: the hypoxanthine/guanine it releases is either salvaged (HPRT1) or
    oxidised to urate (XDH). De novo purine synthesis and the purine nucleotide cycle
    (e.g. ADSL, AMPD) are out of scope for this salvage/catabolism module; ecto-ADA/CD26
    signalling is captured non-core in the ADA gene review.
