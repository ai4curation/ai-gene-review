id: MODULE:valine_isoleucine_distal_catabolism
title: Valine and isoleucine distal catabolism (acyl-CoA dehydrogenase -> propionyl-CoA)
description: >-
  After the shared, mitochondrial branched-chain aminotransferase (BCAT2) and branched-chain
  alpha-ketoacid dehydrogenase (BCKDH) steps deaminate and oxidatively decarboxylate the three
  branched-chain amino acids to their acyl-CoA thioesters, valine and isoleucine follow their own
  distal degradation routes in the mitochondrial matrix that converge on propionyl-CoA. In the VALINE
  route, isobutyryl-CoA is dehydrogenated by isobutyryl-CoA dehydrogenase (ACAD8, an FAD enzyme feeding
  electrons to ETF) to methacrylyl-CoA; the crotonase ECHS1 (curated elsewhere) hydrates this to
  (S)-3-hydroxyisobutyryl-CoA, which the crotonase-superfamily hydrolase HIBCH deacylates to free
  3-hydroxyisobutyrate + CoA (a step thought to detoxify the reactive methacrylyl-CoA). 3-Hydroxy-
  isobutyrate dehydrogenase (HIBADH, NAD+) then oxidises it to (S)-methylmalonate semialdehyde, and the
  CoA-acylating aldehyde dehydrogenase ALDH6A1 (methylmalonate-semialdehyde dehydrogenase) oxidatively
  decarboxylates that to propionyl-CoA. In the ISOLEUCINE route, 2-methylbutyryl-CoA is dehydrogenated by
  the short/branched-chain acyl-CoA dehydrogenase ACADSB (FAD -> ETF) to tiglyl-CoA; ECHS1 hydrates it,
  and HSD17B10 (the moonlighting SDR protein MRPP2/HADH2, in its 2-methyl-3-hydroxybutyryl-CoA
  dehydrogenase role, NAD+) oxidises 2-methyl-3-hydroxybutyryl-CoA to 2-methylacetoacetyl-CoA, which the
  thiolase ACAT1 (curated elsewhere) cleaves to propionyl-CoA + acetyl-CoA. The propionyl-CoA produced by
  both routes enters the propionyl-CoA -> methylmalonyl-CoA -> succinyl-CoA anaplerotic pathway (PCC/MUT).
  Inherited defects at each step cause distinct organic acidurias (ACAD8: isobutyryl-CoA dehydrogenase
  deficiency; ACADSB: 2-methylbutyryl-CoA dehydrogenase deficiency; HIBCH and ALDH6A1: valine-pathway
  neurometabolic disease; HSD17B10: X-linked MHBD deficiency, which also impairs the protein's separate
  mitochondrial RNase P role).
status: DRAFT
evidence:
  - source_id: GO:0006574
    title: L-valine catabolic process
    statement: ACAD8/HIBCH/HIBADH/ALDH6A1 carry out the distal steps of L-valine catabolism (GO:0006574).
  - source_id: GO:0006550
    title: L-isoleucine catabolic process
    statement: ACADSB and HSD17B10 carry out distal steps of L-isoleucine catabolism (GO:0006550).
  - source_id: file:human/ACAD8/ACAD8-ai-review.yaml
    title: ACAD8 gene review (human)
    statement: The isobutyryl-CoA dehydrogenase step (UniProtKB:Q9UKU7, GO:0003853 + FAD) matches the completed human ACAD8 review.
  - source_id: file:human/HIBCH/HIBCH-ai-review.yaml
    title: HIBCH gene review (human)
    statement: The 3-hydroxyisobutyryl-CoA hydrolase step (UniProtKB:Q6NVY1, GO:0003860) matches the completed human HIBCH review.
  - source_id: file:human/HIBADH/HIBADH-ai-review.yaml
    title: HIBADH gene review (human)
    statement: The 3-hydroxyisobutyrate dehydrogenase step (UniProtKB:P31937, GO:0008442) matches the completed human HIBADH review.
  - source_id: file:human/ALDH6A1/ALDH6A1-ai-review.yaml
    title: ALDH6A1 gene review (human)
    statement: The methylmalonate-semialdehyde dehydrogenase step (UniProtKB:Q02252, GO:0004491) matches the completed human ALDH6A1 review.
  - source_id: file:human/ACADSB/ACADSB-ai-review.yaml
    title: ACADSB gene review (human)
    statement: The 2-methylbutyryl-CoA dehydrogenase step (UniProtKB:P45954, GO:0003853 + FAD) matches the completed human ACADSB review.
  - source_id: file:human/HSD17B10/HSD17B10-ai-review.yaml
    title: HSD17B10 gene review (human)
    statement: The 2-methyl-3-hydroxybutyryl-CoA dehydrogenase (MHBD) step (UniProtKB:Q99714, GO:0047015) matches the completed human HSD17B10 review.
