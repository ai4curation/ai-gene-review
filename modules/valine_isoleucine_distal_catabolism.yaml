  connections:
    - source: acad8_ibd
      target: hibch_hydrolase
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        ACAD8 makes methacrylyl-CoA; the crotonase ECHS1 (curated elsewhere) hydrates it to
        (S)-3-hydroxyisobutyryl-CoA, the substrate deacylated by HIBCH.
    - source: hibch_hydrolase
      target: hibadh_dh
      connection_type: PROVIDES_INPUT_FOR
      description: The 3-hydroxyisobutyrate released by HIBCH is oxidised by HIBADH.
    - source: hibadh_dh
      target: aldh6a1_mmsdh
      connection_type: PROVIDES_INPUT_FOR
      description: HIBADH produces methylmalonate semialdehyde, the substrate for ALDH6A1.
    - source: acadsb_sbcad
      target: hsd17b10_mhbd
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        ACADSB makes tiglyl-CoA; ECHS1 (curated elsewhere) hydrates it to 2-methyl-3-hydroxybutyryl-CoA,
        the substrate oxidised by HSD17B10 (MHBD).
  notes: >-
    Distal valine and isoleucine catabolism (GO:0006574 / GO:0006550), grounded to six completed human
    gene reviews, all mitochondrial-matrix enzymes from distinct PANTHER families. VALINE branch:
    ACAD8 (Q9UKU7 PTHR43831, GO:0003853 + FAD) -> [ECHS1] -> HIBCH (Q6NVY1 PTHR43176, GO:0003860) ->
    HIBADH (P31937 PTHR22981, GO:0008442 + NAD) -> ALDH6A1 (Q02252 PTHR43866, GO:0004491 acylating +
    GO:0018478) -> propionyl-CoA. ISOLEUCINE branch: ACADSB (P45954 PTHR43884, GO:0003853 + FAD) ->
    [ECHS1] -> HSD17B10 (Q99714 PTHR43658, GO:0047015 MHBD + NAD) -> [ACAT1 thiolase] -> propionyl-CoA +
    acetyl-CoA. Both branches feed propionyl-CoA into the PCC/MUT anaplerotic route (curated separately).
    ALDH6A1 is shared with pyrimidine/beta-alanine catabolism (malonate-semialdehyde -> acetyl-CoA,
    GO:0018478 / GO:0006210). HSD17B10 is a moonlighting protein: its second, non-catalytic role as the
    mt-RNase P subunit MRPP2 (mitochondrial tRNA 5'-processing and m1A9/m1G9 methylation) is documented in
    the HSD17B10 gene review and is deliberately NOT modelled as a metabolic node here. The FAD-linked
    ACAD8/ACADSB steps deposit electrons on ETF/ETFDH (curated in the flavin/ETF modules). GO term
    ids/labels verified against the local go.db. Disorders: ACAD8 IBDD; ACADSB 2-methylbutyryl-CoA
    dehydrogenase deficiency; HIBCH and ALDH6A1 valine-pathway neurometabolic disease; HSD17B10 X-linked
    MHBD deficiency.
