        The current module records assembly and secretin/alignment context only;
        pilT is visible as an orphan domain-only candidate in the genome-wide
        partition and should be reviewed before modeling type IV pilus-dependent
        motility dynamics.
      gap_kind:
        - CURATION
        - BIOLOGY
      dark_aspect: RESIDUAL_SUBGAP
      status: OPEN
      significance: >-
        Retraction ATPases determine twitching motility and surface dynamics,
        so pilT review is needed before this module can represent the full
        motility cycle.
      resolution: Fetch and curate pilT, then decide whether it belongs in this T4P biogenesis module or a separate motility-dynamics boundary.
