id: MODULE:type_iv_pilus_biogenesis_boundary
title: Type IV pilus biogenesis boundary
description: >-
  Boundary module for the type IV pilus biogenesis and assembly sub-batch
  selected from the Pseudomonas putida KT2440 motility/chemotaxis/biofilm
  functional bucket. The module captures predicted pilin-like substrates and
  assembly factors near PP_0608-PP_0611, the PilC/PilF accessory/platform
  context, and the PilQ/PP_5081/PilN/PP_5083 secretin-alignment cluster. It
  reuses the already curated major pilin pilA as structural context, but it
  does not claim that the complete T4P extension/retraction cycle is resolved.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_type_iv_pilus_biogenesis_boundary.tsv
    title: PSEPK motility/chemotaxis/biofilm type IV pilus biogenesis sub-batch
    statement: >-
      The partition routes PP_0608, PP_0609, PP_0610, pilE, pilC, pilF,
      PP_3480, PP_3481, pilQ, PP_5081, pilN, and PP_5083 to a dedicated type IV
      pilus biogenesis boundary.
  - source_id: file:PSEPK/pilA/pilA-ai-review.yaml
    title: Curated pilA review
    statement: >-
      The pilA review supports the major type IV pilin structural-subunit
      context and type IV pilus-dependent motility output.
  - source_id: file:PSEPK/pilC/pilC-ai-review.yaml
    title: Curated pilC review
    statement: >-
      The pilC review treats type II secretion process annotations as
      shared-domain over-propagation and replaces them with type IV pilus
      assembly context.
  - source_id: file:PSEPK/pilQ/pilQ-ai-review.yaml
    title: Curated pilQ review
    statement: >-
      The pilQ review supports an outer-membrane PilQ/GspD secretin-family role
      in type IV pilus assembly.
notes: >-
  First-pass interpretation: this is a type IV pilus biogenesis boundary, not a
  generic motility pathway. The curated 12-gene sub-batch supports a plausible
  T4P assembly apparatus around pilin-like components (PP_0608, PP_0609, PilE,
  PP_0610/PilX), a PilC platform/accessory layer, PilO/PilP/PilN/PilM-like
  alignment components, and the PilQ outer-membrane secretin. pilD and pilT are
  visible in the genome-wide partition but sit outside this sub-batch; they are
  recorded as hole-filling gaps for a later pass.
