        The genome-wide partition places pilD in module:transport_membrane_efflux
        because of broad membrane/transport keywords; it should be promoted into
        this module in a later hole-filling pass if its review supports the
        expected prepilin processing role.
      gap_kind:
        - CURATION
      dark_aspect: BP_DARK
      status: OPEN
      significance: >-
        Without reviewing pilD, the T4P biogenesis module lacks the likely
        prepilin leader peptidase and N-methyltransferase needed to mature PilA
        and pilin-like substrates.
      resolution: Fetch and curate pilD, then add it to this boundary if the evidence supports type IV pilin processing.
    - gap_statement: >-
