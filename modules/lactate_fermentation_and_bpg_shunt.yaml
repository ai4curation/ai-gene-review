id: MODULE:lactate_fermentation_and_bpg_shunt
title: Lactate fermentation and the Rapoport-Luebering (2,3-BPG) shunt — GSD XI, BPGM deficiency
description: >-
  Two branch reactions of glycolysis, prominent in anaerobic tissue and in erythrocytes
  (which depend entirely on glycolysis and lack mitochondria). (1) Lactate fermentation:
  lactate dehydrogenase (a tetramer of the LDHA/M and LDHB/H subunits) reduces the
  glycolytic end-product pyruvate to L-lactate using NADH, regenerating the NAD+ that
  glyceraldehyde-3-phosphate dehydrogenase needs to sustain glycolytic flux when
  oxidative phosphorylation is unavailable or saturated; the LDHA-rich isoenzymes favour
  pyruvate to lactate (anaerobic/glycolytic tissue) while LDHB-rich isoenzymes favour
  the reverse oxidation of lactate to pyruvate (oxidative tissue). (2) The
  Rapoport-Luebering shunt: bisphosphoglycerate mutase (BPGM) diverts
  1,3-bisphosphoglycerate to 2,3-bisphosphoglycerate (and hydrolyses it onward to
  3-phosphoglycerate), bypassing the ATP-generating phosphoglycerate-kinase step;
  2,3-bisphosphoglycerate is the principal allosteric effector that binds deoxyhemoglobin
  and lowers its oxygen affinity, tuning O2 delivery to tissues. Both branches feed off
  glycolytic intermediates (pyruvate and 1,3-bisphosphoglycerate respectively). Inherited
  defects: LDHA deficiency causes glycogen storage disease type XI (exertional myopathy,
  myoglobinuria, skin lesions); LDHB deficiency is usually clinically silent; and BPGM
  deficiency lowers 2,3-BPG, raising hemoglobin oxygen affinity and causing secondary
  erythrocytosis.
status: DRAFT
evidence:
  - source_id: GO:0006096
    title: glycolytic process
    statement: >-
      Both branches act on glycolytic intermediates (GO:0006096): LDH on pyruvate (NAD+
      regeneration / lactate fermentation) and BPGM on 1,3-bisphosphoglycerate (2,3-BPG shunt).
  - source_id: Reactome:R-HSA-71849
    title: LDH tetramer reduces PYR to LACT
    statement: >-
      Reactions follow the human Reactome reactions R-HSA-71849 (LDH pyruvate -> lactate)
      and R-HSA-6798335 (BPGM 1,3-BPG -> 2,3-BPG).
  - source_id: file:human/LDHA/LDHA-ai-review.yaml
    title: LDHA gene review (human)
    statement: >-
      The lactate-fermentation step (UniProtKB:P00338, GO:0004459) matches the completed
      human LDHA review.
  - source_id: file:human/LDHB/LDHB-ai-review.yaml
    title: LDHB gene review (human)
    statement: >-
      The lactate-oxidising isozyme of the same step (UniProtKB:P07195, GO:0004459)
      matches the completed human LDHB review.
  - source_id: file:human/BPGM/BPGM-ai-review.yaml
    title: BPGM gene review (human)
    statement: >-
      The 2,3-bisphosphoglycerate shunt step (UniProtKB:P07738, GO:0004082) matches the
      completed human BPGM review.
module:
  id: lactate_fermentation_and_bpg_shunt
  label: Lactate fermentation and 2,3-BPG shunt
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycolytic process
      term:
        id: GO:0006096
        label: glycolytic process
      description: >-
        Erythrocyte/anaerobic glycolysis branches: NAD+-regenerating lactate
        fermentation (LDH) and the 2,3-bisphosphoglycerate shunt (BPGM).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Both LDH and BPGM are cytosolic.
  parts:
    - order: 1
      role: lactate fermentation (NAD+ regeneration)
      node:
        id: ldh_step
        label: pyruvate + NADH to L-lactate + NAD+
        module_type: REACTION
        annotons:
          - id: ldh_activity
            label: "LDHA/LDHB: L-lactate dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: L-lactate dehydrogenase family (LDHA/LDHB/LDHC)
                term:
                  id: PANTHER:PTHR43128
                  label: L-LACTATE DEHYDROGENASE
                representative_members:
                  - preferred_term: LDHA (human, M/muscle subunit)
                    term:
                      id: UniProtKB:P00338
                      label: L-lactate dehydrogenase A chain
                  - preferred_term: LDHB (human, H/heart subunit)
                    term:
                      id: UniProtKB:P07195
                      label: L-lactate dehydrogenase B chain
            function:
              preferred_term: L-lactate dehydrogenase (NAD+) activity
              term:
                id: GO:0004459
                label: L-lactate dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: NADH
              products:
                - preferred_term: L-lactate
                - preferred_term: NAD+
              evidence:
                - source_id: EC:1.1.1.27
                  statement: L-lactate dehydrogenase; M/H tetramer isoenzymes; regenerates NAD+ for glycolysis
                - source_id: Reactome:R-HSA-71849
                  statement: "LDH tetramer reduces PYR to LACT (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Reduces pyruvate to lactate, regenerating NAD+ so glycolysis can continue
              anaerobically (LDHA/M4 favours this direction); the reverse oxidation of
              lactate to pyruvate (LDHB/H4, oxidative tissue) feeds gluconeogenesis/the
              Cori cycle. LDHA deficiency = GSD XI.
    - order: 2
      role: Rapoport-Luebering shunt (2,3-BPG synthesis, Hb O2-affinity control)
      node:
        id: bpgm_step
        label: 1,3-bisphosphoglycerate to 2,3-bisphosphoglycerate
        module_type: REACTION
        annotons:
          - id: bpgm_activity
            label: "BPGM: bisphosphoglycerate mutase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cofactor-dependent phosphoglycerate mutase family (BPGM/PGAM)
                term:
                  id: PANTHER:PTHR11931
                  label: PHOSPHOGLYCERATE MUTASE
                representative_members:
                  - preferred_term: BPGM (human)
                    term:
                      id: UniProtKB:P07738
                      label: Bisphosphoglycerate mutase
            function:
              preferred_term: bisphosphoglycerate mutase activity
              term:
                id: GO:0004082
                label: bisphosphoglycerate mutase activity
              substrates:
                - preferred_term: 1,3-bisphospho-D-glycerate
              products:
                - preferred_term: 2,3-bisphospho-D-glycerate
              evidence:
                - source_id: EC:5.4.2.4
                  statement: bisphosphoglycerate mutase (2,3-BPG synthase); also 2,3-BPG phosphatase (EC 3.1.3.13) and weak PGAM activity
                - source_id: Reactome:R-HSA-6798335
                  statement: "BPGM dimer isomerises 1,3BPG to 2,3BPG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Trifunctional erythrocyte enzyme of the Rapoport-Luebering shunt: makes
              2,3-bisphosphoglycerate from 1,3-bisphosphoglycerate (bypassing the
              ATP-generating PGK1 step) and degrades it to 3-phosphoglycerate. 2,3-BPG
              lowers hemoglobin O2 affinity; BPGM deficiency causes erythrocytosis.
  notes: >-
    Two erythrocyte/anaerobic glycolysis branch reactions grounded to the human enzymes
    lactate dehydrogenase LDHA (UniProtKB:P00338) / LDHB (P07195) (GO:0004459, EC 1.1.1.27)
    and bisphosphoglycerate mutase BPGM (P07738, GO:0004082, EC 5.4.2.4). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids
    and titles were verified against the local reactome cache. The LDH node uses PANTHER
    PTHR43128 (LDHA/LDHB/LDHC) with LDHA and LDHB as representatives; BPGM shares PANTHER
    PTHR11931 with the phosphoglycerate mutases (PGAM1/PGAM2; glycolysis payoff module).
    The two branches are independent (no direct connection): LDH draws pyruvate from the
    end of the glycolysis payoff phase (pyruvate kinase) and its lactate feeds the Cori
    cycle / gluconeogenesis, while BPGM diverts 1,3-bisphosphoglycerate produced by GAPDH,
    bypassing the PGK1 ATP-generating step (so the shunt trades ATP yield for 2,3-BPG-based
    control of hemoglobin oxygen affinity). LDH pyruvate<->lactate also connects to the
    pyruvate-metabolism module (PDC/PC oxidative fate). Disorders: LDHA -> GSD XI
    (exertional myopathy); LDHB -> usually asymptomatic; BPGM -> bisphosphoglycerate mutase
    deficiency (low 2,3-BPG, high Hb-O2 affinity, erythrocytosis).
