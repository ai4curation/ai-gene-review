knowledge_gaps:
  - gap_statement: 'SMAD4: Obligatory or Dispensable? remains unresolved in the BMP signaling pathway
      module.'
    boundary: The textbook model positions SMAD4 as an indispensable common mediator for all 
      canonical TGF-beta superfamily transcriptional responses. However, the demonstration of 
      functional SMAD4-independent BMP signaling in dental mesenchyme-where pSMAD1/5/8 translocates 
      to the nucleus and activates MSX1 and other target genes without forming detectable complexes 
      with SMAD4-directly challenges this view (hu2022operationofthe pa...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/bmp_signaling-deep-research-falcon.md
  - gap_statement: 'SMAD1 vs. SMAD5: True Redundancy? remains unresolved in the BMP signaling pathway
      module.'
    boundary: Although SMAD1, SMAD5, and SMAD8/9 are often analyzed as a single "pSMAD1/5/8" pool 
      using pan-phospho antibodies, mounting evidence suggests functional non-equivalence. SMAD5's 
      unique pH-sensitive nucleocytoplasmic shuttling and non-transcriptional role in glycolysis 
      regulation through HK1 binding distinguish it from SMAD1 (lin2024exploringsmad5a pages 2-4, 
      lin2024exploringsmad5a pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/bmp_signaling-deep-research-falcon.md
  - gap_statement: Preformed vs. Ligand-Induced Receptor Complexes remains unresolved in the BMP 
      signaling pathway module.
    boundary: The order of receptor assembly remains debated. In some models, BMP ligands bind 
      preformed type I/type II receptor complexes (PFCs), activating canonical SMAD signaling 
      directly.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/bmp_signaling-deep-research-falcon.md
  - gap_statement: Context-Dependent Pro-tumorigenic vs. Anti-tumorigenic Roles remains unresolved 
      in the BMP signaling pathway module.
    boundary: 'BMP signaling in cancer presents a striking paradox: the same pathway can suppress tumor
      growth (e.g., by inducing cancer stem cell differentiation) or promote tumor progression (e.g.,
      through invasion and metastasis), depending on cancer type, tumor stage, and microenvironment (ehata2022bonemorphogeneticprotein
      pages 1-2).'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/bmp_signaling-deep-research-falcon.md
  - gap_statement: SMAD-Independent Contributions to BMP Receptor Phenotypes remains unresolved in 
      the BMP signaling pathway module.
    boundary: The observation that mesenchymal deletion of BMPR1A in mouse lung causes congenital 
      pulmonary cysts, but co-deletion of SMAD1/5 does not reproduce this phenotype, provides in 
      vivo evidence that SMAD-independent mechanisms downstream of BMPR1A are biologically 
      significant and cannot be inferred from canonical SMAD pathway analysis alone (Luo et al., 
      eLife 2024).
