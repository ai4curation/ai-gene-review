notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit evidence,
  structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions: SMAD4:
  Obligatory or Dispensable?; SMAD1 vs. SMAD5: True Redundancy?; Preformed vs. Ligand-Induced Receptor
  Complexes; Context-Dependent Pro-tumorigenic vs. Anti-tumorigenic Roles; SMAD-Independent Contributions
  to BMP Receptor Phenotypes. Machine-generated Falcon citations remain curation support and are not manually
  adjudicated here.
