id: MODULE:dicty_allorecognition_adhesion
title: Dictyostelium developmental cell-cell adhesion and tgr allorecognition
description: >-
  The developmentally staged cell-cell adhesion systems of Dictyostelium
  discoideum, culminating in tgr-locus allorecognition. As starving cells enter
  development they deploy successive adhesion molecules: (1) the Ca2+-dependent
  adhesion molecule ddCAD-1 (cadA), which mediates EDTA-sensitive homophilic
  adhesion at the loose-aggregate stage; (2) the contact-sites-A glycoprotein
  csA/gp80 (csaA), which mediates EDTA-resistant (Ca2+-independent) homophilic
  adhesion during tight aggregation; and (3) the polymorphic Tiger proteins
  TgrC1 (the ligand) and TgrB1 (the receptor), a heterophilic self-recognition
  pair required for post-aggregation adhesion and kin discrimination — cells
  bearing matching tgrB1/tgrC1 alleles cooperate, enabling coordinated
  multicellular development and excluding non-kin. This is a set of parallel,
  developmentally ordered adhesion systems rather than a linear pathway, so it is
  modelled as staged PRECEDES steps. OUT OF SCOPE: the intracellular actin
  cytoskeleton coupling of adhesion, and the other ~12 tgr paralogs at the tgr
  locus (only the reviewed tgrB1/tgrC1 pair is grounded). Note tgrC1 = lagC/gp150.
status: DRAFT
evidence:
  - source_id: GO:0031152
    title: aggregation involved in sorocarp development
    statement: >-
      These adhesion systems operate during aggregation and post-aggregation
      (GO:0031152), holding cells together as the mound forms.
  - source_id: file:DICDI/cadA/cadA-ai-review.yaml
    title: cadA gene review (Dictyostelium discoideum)
    statement: >-
      Early Ca2+-dependent adhesion grounding (UniProtKB:P54657, GO:0042802
      identical protein binding; ddCAD-1 homophilic adhesion).
  - source_id: file:DICDI/csaA/csaA-ai-review.yaml
    title: csaA gene review (Dictyostelium discoideum)
    statement: >-
      Aggregation-stage Ca2+-independent adhesion grounding (UniProtKB:P08796,
      GO:0098632 cell-cell adhesion mediator activity; csA/gp80).
  - source_id: file:DICDI/tgrC1/tgrC1-ai-review.yaml
    title: tgrC1 gene review (Dictyostelium discoideum)
    statement: >-
      Allorecognition ligand + post-aggregation adhesion grounding
      (UniProtKB:P42523, GO:0048018 receptor ligand activity; = lagC/gp150).
  - source_id: file:DICDI/tgrB1/tgrB1-ai-review.yaml
    title: tgrB1 gene review (Dictyostelium discoideum)
    statement: >-
      Allorecognition receptor grounding (UniProtKB:Q54V07, GO:0004888
      transmembrane signaling receptor activity); binds TgrC1.
notes: >-
  Dictyostelium-specific staged-adhesion / allorecognition module grounded to
  ddCAD-1 (P54657), csA (P08796), TgrC1 (P42523) and TgrB1 (Q54V07). GO
  molecular-function terms were taken from the completed DICDI reviews; nodes use
  PANTHER family selectors plus D. discoideum representative members. Modelled as
  three PRECEDES-ordered developmental stages (early Ca2+-dependent -> aggregation
  Ca2+-independent -> post-aggregation allorecognition) rather than a linear
  biochemical pathway. Only the reviewed tgrB1/tgrC1 pair is grounded; the wider
  polymorphic tgr locus is out of scope. Named to signal Dictyostelium scope.
module:
  id: dicty_allorecognition_adhesion
  label: Developmental adhesion and allorecognition (ddCAD-1 -> csA -> TgrB1/TgrC1)
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: aggregation involved in sorocarp development
      term:
        id: GO:0031152
        label: aggregation involved in sorocarp development
      description: >-
        Cell-cell adhesion holding cells together during aggregation and
        post-aggregation, with tgr-based self-recognition.
  parts:
    - order: 1
      role: early Ca2+-dependent homophilic adhesion
      node:
        id: cada_adhesion
        label: ddCAD-1 (cadA) Ca2+-dependent homophilic adhesion
        module_type: REGULATORY_STEP
        annotons:
          - id: cada_activity
            label: "ddCAD-1 (cadA): Ca2+-dependent cell adhesion molecule"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Calcium-dependent cell adhesion molecule family (ddCAD-1)
                term:
                  id: PANTHER:PTHR38083
                  label: CALCIUM-DEPENDENT CELL ADHESION MOLECULE 1-RELATED
                representative_members:
                  - preferred_term: ddCAD-1 (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P54657
                      label: Calcium-dependent cell adhesion molecule 1 (ddCAD-1)
            function:
              preferred_term: identical protein binding
              term:
                id: GO:0042802
                label: identical protein binding
              evidence:
                - source_id: file:DICDI/cadA/cadA-ai-review.yaml
                  statement: ddCAD-1 mediates Ca2+-dependent homophilic cell-cell adhesion
            locations:
              - preferred_term: external side of plasma membrane
                term:
                  id: GO:0009897
                  label: external side of plasma membrane
            role_description: >-
              Calcium-dependent adhesion molecule mediating EDTA-sensitive
              homophilic adhesion at the early loose-aggregate stage;
              unconventionally exported via the contractile vacuole.
    - order: 2
      role: aggregation-stage Ca2+-independent homophilic adhesion
      node:
        id: csa_adhesion
        label: csA/gp80 (csaA) Ca2+-independent homophilic adhesion
        module_type: REGULATORY_STEP
        annotons:
          - id: csa_activity
            label: "csA/gp80 (csaA): contact sites A adhesion glycoprotein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IPT/TIG-domain adhesion glycoprotein family (csA/Tgr)
                term:
                  id: PANTHER:PTHR31341
                  label: IPT/TIG DOMAIN-CONTAINING PROTEIN
                representative_members:
                  - preferred_term: csA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P08796
                      label: Contact site A glycoprotein (csA/gp80)
            function:
              preferred_term: cell-cell adhesion mediator activity
              term:
                id: GO:0098632
                label: cell-cell adhesion mediator activity
              evidence:
                - source_id: file:DICDI/csaA/csaA-ai-review.yaml
                  statement: csA mediates EDTA-resistant homophilic cell-cell adhesion
            locations:
              - preferred_term: external side of plasma membrane
                term:
                  id: GO:0009897
                  label: external side of plasma membrane
            role_description: >-
              GPI-anchored contact-sites-A glycoprotein mediating EDTA-resistant
              (Ca2+-independent) homophilic adhesion during tight aggregation.
    - order: 3
      role: post-aggregation adhesion and tgr allorecognition
      node:
        id: tgr_allorecognition
        label: TgrB1-TgrC1 heterophilic self-recognition adhesion complex
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: tgrc1_activity
            label: "TgrC1 (=lagC/gp150): allorecognition ligand"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IPT/TIG-domain Tiger protein family (Tgr)
                term:
                  id: PANTHER:PTHR31341
                  label: IPT/TIG DOMAIN-CONTAINING PROTEIN
                representative_members:
                  - preferred_term: TgrC1 (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P42523
                      label: Tiger protein C1 (TgrC1 / lagC / gp150)
            function:
              preferred_term: receptor ligand activity
              term:
                id: GO:0048018
                label: receptor ligand activity
              evidence:
                - source_id: file:DICDI/tgrC1/tgrC1-ai-review.yaml
                  statement: TgrC1 is the heterophilic ligand for the TgrB1 receptor
            locations:
              - preferred_term: external side of plasma membrane
                term:
                  id: GO:0009897
                  label: external side of plasma membrane
            role_description: >-
              Polymorphic cell-surface ligand for TgrB1; also provides
              post-aggregation adhesion. Matching alleles enable kin cooperation.
          - id: tgrb1_activity
            label: "TgrB1: allorecognition receptor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IPT/TIG-domain Tiger protein family (Tgr)
                term:
                  id: PANTHER:PTHR31341
                  label: IPT/TIG DOMAIN-CONTAINING PROTEIN
                representative_members:
                  - preferred_term: TgrB1 (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54V07
                      label: Tiger protein B1 (TgrB1)
            function:
              preferred_term: transmembrane signaling receptor activity
              term:
                id: GO:0004888
                label: transmembrane signaling receptor activity
              evidence:
                - source_id: file:DICDI/tgrB1/tgrB1-ai-review.yaml
                  statement: TgrB1 is the polymorphic receptor that binds TgrC1 for self-recognition
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Polymorphic transmembrane receptor that binds partner TgrC1;
              allele-matched TgrB1-TgrC1 recognition licenses coordinated
              multicellular development (kin discrimination).
  connections:
    - source: cada_adhesion
      target: csa_adhesion
      connection_type: PRECEDES
      description: >-
        Ca2+-dependent ddCAD-1 adhesion at the early aggregate stage precedes the
        Ca2+-independent csA adhesion of tight aggregation.
    - source: csa_adhesion
      target: tgr_allorecognition
      connection_type: PRECEDES
      description: >-
        csA-mediated aggregation adhesion precedes the post-aggregation
        TgrB1-TgrC1 allorecognition adhesion.
