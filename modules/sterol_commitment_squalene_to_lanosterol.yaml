  connections:
    - source: fdft1_step
      target: sqle_step
      connection_type: PROVIDES_INPUT_FOR
      description: Squalene from FDFT1 is epoxidised by SQLE.
    - source: sqle_step
      target: lss_step
      connection_type: PROVIDES_INPUT_FOR
      description: 2,3-epoxysqualene from SQLE is cyclised by LSS to lanosterol.
  notes: >-
    The sterol-commitment (squalene -> lanosterol) segment of cholesterol biosynthesis
    grounded to the human enzymes FDFT1 (UniProtKB:P37268, GO:0051996, EC 2.5.1.21), SQLE
    (Q14534, GO:0004506, EC 1.14.14.17) and LSS (P48449, GO:0000250, EC 5.4.99.7). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids and
    titles were verified against the local reactome cache. Each step uses a PANTHER family
    selector with the human enzyme as representative; all three enzymes reside in the ER
    membrane. Upstream, farnesyl diphosphate comes from the mevalonate pathway (HMGCS1/HMGCR/
    MVK/PMVK/MVD -> IPP -> FDPS); downstream, lanosterol is converted to cholesterol by the
    post-lanosterol demethylation/reduction enzymes (CYP51A1, TM7SF2/LBR, MSMO1, NSDHL,
    HSD17B7, EBP, SC5D, DHCR7/DHCR24) via the Bloch and Kandutsch-Russell arms (a separate
    module, to follow). FDFT1 is the committed branch point diverting the shared isoprenoid
    pool to sterols; SQLE is the second cholesterol-feedback-regulated rate-limiting control
    point. Disorders: FDFT1 -> squalene synthase deficiency; LSS -> hypotrichosis with
    juvenile cataract / congenital cataract (and a palmoplantar keratoderma); SQLE is a drug
    target (terbinafine-class antifungals; anticancer) rather than a classic disease gene.
