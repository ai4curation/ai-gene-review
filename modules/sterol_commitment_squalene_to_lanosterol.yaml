id: MODULE:sterol_commitment_squalene_to_lanosterol
title: Cholesterol biosynthesis I — sterol commitment (squalene -> lanosterol); FDFT1/SQLE/LSS
description: >-
  The sterol-commitment segment of cholesterol biosynthesis converts the isoprenoid
  intermediate farnesyl diphosphate into the first cyclic sterol, lanosterol, committing
  carbon away from the branched isoprenoid pool (dolichol, ubiquinone, prenylation) and
  irreversibly toward sterols. Squalene synthase (FDFT1) performs the first committed
  step: a reductive head-to-head condensation of two farnesyl-diphosphate molecules (via
  presqualene diphosphate) to the C30 hydrocarbon squalene. Squalene monooxygenase /
  epoxidase (SQLE), an FAD flavoprotein and the second rate-limiting, cholesterol-feedback-
  regulated enzyme of the pathway, oxidises squalene to (S)-2,3-epoxysqualene using O2 and
  NADPH. Lanosterol synthase (LSS, oxidosqualene cyclase) then carries out the remarkable
  polycyclization of 2,3-epoxysqualene to lanosterol, the tetracyclic sterol scaffold from
  which cholesterol (and, in other tissues, downstream sterols) is made by the post-lanosterol
  demethylation/reduction steps. All three enzymes are endoplasmic-reticulum-membrane proteins.
  Inherited defects: FDFT1 deficiency (squalene synthase deficiency, a congenital
  cholesterol-biosynthesis disorder with dysmorphism/developmental delay) and LSS mutations
  (hypotrichosis with juvenile cataract / congenital cataract, and a palmoplantar keratoderma);
  SQLE is a validated antifungal/anticancer drug target rather than a Mendelian-disease gene.
status: DRAFT
evidence:
  - source_id: GO:0006695
    title: cholesterol biosynthetic process
    statement: >-
      The module is grounded in cholesterol biosynthetic process (GO:0006695); it covers
      the committed squalene -> lanosterol segment.
  - source_id: Reactome:R-HSA-9969896
    title: Lanosterol biosynthesis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome "Lanosterol
      biosynthesis" reactions R-HSA-191402 (FDFT1), R-HSA-191299 (SQLE) and R-HSA-191366 (LSS).
  - source_id: file:human/FDFT1/FDFT1-ai-review.yaml
    title: FDFT1 gene review (human)
    statement: >-
      The squalene-synthase step (UniProtKB:P37268, GO:0051996) matches the completed
      human FDFT1 review.
  - source_id: file:human/SQLE/SQLE-ai-review.yaml
    title: SQLE gene review (human)
    statement: >-
      The squalene-epoxidase step (UniProtKB:Q14534, GO:0004506) matches the completed
      human SQLE review.
  - source_id: file:human/LSS/LSS-ai-review.yaml
    title: LSS gene review (human)
    statement: >-
      The lanosterol-synthase step (UniProtKB:P48449, GO:0000250) matches the completed
      human LSS review.
