id: MODULE:terpenoid_backbone_biosynthesis
title: Terpenoid backbone biosynthesis
description: >-
  A bacterial terpenoid-backbone biosynthesis module centered on the
  methylerythritol phosphate (MEP/DOXP) pathway from pyruvate and
  glyceraldehyde 3-phosphate to isopentenyl diphosphate (IPP) and dimethylallyl
  diphosphate (DMAPP), followed by prenyl-diphosphate synthases that extend
  these C5 units into geranyl, farnesyl, octaprenyl, and undecaprenyl
  diphosphates. In Pseudomonas putida KT2440, KEGG ppu00900 also pulls in
  thiolase/mevalonate-route-like entries and UbiX flavin prenyltransferase
  chemistry; those are treated as boundary or downstream uses rather than
  evidence for a strict mevalonate pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00900
    title: Terpenoid backbone biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but is broader
      than the strict bacterial MEP and prenyl-diphosphate synthesis module.
  - source_id: UniPathway:UPA00056
    title: Methylerythritol phosphate pathway
    statement: >-
      UniPathway UPA00056 cross-references several PSEPK enzymes from Dxr
      through IspH, supporting a canonical bacterial MEP route to IPP and DMAPP.
  - source_id: GO:0019288
    title: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
    statement: >-
      The module is grounded in the GO biological-process term for the MEP route
      to isopentenyl diphosphate.
  - source_id: GO:0016114
    title: terpenoid biosynthetic process
    statement: >-
      The module includes downstream prenyl-diphosphate synthase reactions that
      supply terpenoid, quinone, and cell-envelope carrier-lipid backbones.
module:
  id: terpenoid_backbone_biosynthesis
  label: Terpenoid backbone biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
      term:
        id: GO:0019288
        label: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
      description: >-
        Bacterial MEP/DOXP route producing IPP and DMAPP from central-carbon
        precursors.
    - preferred_term: terpenoid biosynthetic process
      term:
        id: GO:0016114
        label: terpenoid biosynthetic process
      description: >-
        Biosynthesis of terpenoid and isoprenoid compounds from C5 prenyl
        diphosphate building blocks.
  parts:
    - order: 1
      role: DXP formation
      node:
        id: dxs_dxp_formation
        label: 1-deoxy-D-xylulose 5-phosphate formation
        module_type: REACTION
        description: >-
          Dxs condenses pyruvate and glyceraldehyde 3-phosphate to form
          1-deoxy-D-xylulose 5-phosphate, the first committed intermediate for
          the MEP pathway and a shared precursor for thiamine metabolism.
        annotons:
          - id: dxs_dxp_synthase
            label: Dxs 1-deoxy-D-xylulose-5-phosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK dxs
                term:
                  id: UniProtKB:Q88QG7
                  label: 1-deoxy-D-xylulose-5-phosphate synthase
            function:
              preferred_term: 1-deoxy-D-xylulose-5-phosphate synthase activity
              term:
                id: GO:0008661
                label: 1-deoxy-D-xylulose-5-phosphate synthase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: glyceraldehyde 3-phosphate
              products:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
              evidence:
                - source_id: EC:2.2.1.7
                  statement: 1-deoxy-D-xylulose-5-phosphate synthase
            role_description: Entry step into the bacterial MEP pathway.
    - order: 2
      role: MEP formation
      node:
        id: dxr_mep_formation
        label: DXP reductoisomerization
        module_type: REACTION
        description: >-
          Dxr rearranges and reduces DXP to 2-C-methyl-D-erythritol
          4-phosphate.
        annotons:
          - id: dxr_reductoisomerase
            label: Dxr 1-deoxy-D-xylulose-5-phosphate reductoisomerase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK dxr
                term:
                  id: UniProtKB:Q88MH4
                  label: 1-deoxy-D-xylulose 5-phosphate reductoisomerase
            function:
              preferred_term: 1-deoxy-D-xylulose-5-phosphate reductoisomerase activity
              term:
                id: GO:0030604
                label: 1-deoxy-D-xylulose-5-phosphate reductoisomerase activity
              substrates:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
                - preferred_term: NADPH
              products:
                - preferred_term: 2-C-methyl-D-erythritol 4-phosphate
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.1.1.267
                  statement: 1-deoxy-D-xylulose 5-phosphate reductoisomerase
            role_description: Produces MEP for the downstream cytidylyltransferase step.
    - order: 3
      role: CDP-ME formation
      node:
        id: ispD_cdp_me_formation
        label: MEP cytidylyltransferase step
        module_type: REACTION
        description: >-
          IspD activates MEP with CTP to produce
          4-diphosphocytidyl-2-C-methyl-D-erythritol.
        annotons:
          - id: ispD_mep_cytidylyltransferase
            label: IspD MEP cytidylyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispD
                term:
                  id: UniProtKB:Q88MF7
                  label: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase
            function:
              preferred_term: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase activity
              term:
                id: GO:0050518
                label: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase activity
              substrates:
                - preferred_term: 2-C-methyl-D-erythritol 4-phosphate
                - preferred_term: CTP
              products:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.7.7.60
                  statement: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase
            role_description: Nucleotidyltransferase step in the MEP pathway.
    - order: 4
      role: CDP-ME phosphorylation
      node:
        id: ispE_cdp_me_phosphorylation
        label: CDP-ME kinase step
        module_type: REACTION
        description: >-
          IspE phosphorylates CDP-ME to form
          4-diphosphocytidyl-2-C-methyl-D-erythritol 2-phosphate.
        annotons:
          - id: ispE_cdp_me_kinase
            label: IspE CDP-ME kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispE
                term:
                  id: UniProtKB:Q88PX5
                  label: 4-diphosphocytidyl-2-C-methyl-D-erythritol kinase
            function:
              preferred_term: 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity
              term:
                id: GO:0050515
                label: 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity
              substrates:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol
                - preferred_term: ATP
              products:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol 2-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.148
                  statement: 4-diphosphocytidyl-2-C-methyl-D-erythritol kinase
            role_description: Kinase step in the MEP pathway.
    - order: 5
      role: MEcPP formation
      node:
        id: ispF_mecpp_formation
        label: MEcPP synthase step
        module_type: REACTION
        description: >-
          IspF cyclizes CDP-ME2P to form
          2-C-methyl-D-erythritol 2,4-cyclodiphosphate.
        annotons:
          - id: ispF_mecpp_synthase
            label: IspF MEcPP synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispF
                term:
                  id: UniProtKB:Q88MF3
                  label: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase
            function:
              preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase activity
              term:
                id: GO:0008685
                label: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase activity
              substrates:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol 2-phosphate
              products:
                - preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate
                - preferred_term: CMP
              evidence:
                - source_id: EC:4.6.1.12
                  statement: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase
            role_description: Cyclodiphosphate-forming MEP pathway step.
    - order: 6
      role: HMBPP formation
      node:
        id: ispG_hmbpp_formation
        label: HMBPP synthase step
        module_type: REACTION
        description: >-
          IspG reduces MEcPP to
          1-hydroxy-2-methyl-2-(E)-butenyl 4-diphosphate using iron-sulfur
          chemistry and a flavodoxin or ferredoxin electron donor.
        annotons:
          - id: ispG_hmbpp_synthase
            label: IspG HMBPP synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispG
                term:
                  id: UniProtKB:Q88PJ7
                  label: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase
            function:
              preferred_term: 4-hydroxy-3-methylbut-2-enyl-diphosphate synthase activity (flavodoxin)
              term:
                id: GO:0141197
                label: 4-hydroxy-3-methylbut-2-enyl-diphosphate synthase activity (flavodoxin)
              substrates:
                - preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate
                - preferred_term: reduced flavodoxin
              products:
                - preferred_term: 1-hydroxy-2-methyl-2-(E)-butenyl 4-diphosphate
                - preferred_term: oxidized flavodoxin
              evidence:
                - source_id: EC:1.17.7.3
                  statement: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase
            role_description: Iron-sulfur reductive step before IPP/DMAPP formation.
    - order: 7
      role: IPP and DMAPP formation
      node:
        id: ispH_ipp_dmapp_formation
        label: HMBPP reductase step
        module_type: REACTION
        description: >-
          IspH converts HMBPP into a mixture of IPP and DMAPP, completing the
          MEP pathway.
        annotons:
          - id: ispH_hmbpp_reductase
            label: IspH HMBPP reductase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispH
                term:
                  id: UniProtKB:Q88Q89
                  label: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase
            function:
              preferred_term: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity
              term:
                id: GO:0051745
                label: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity
              substrates:
                - preferred_term: 1-hydroxy-2-methyl-2-(E)-butenyl 4-diphosphate
              products:
                - preferred_term: isopentenyl diphosphate
                - preferred_term: dimethylallyl diphosphate
              evidence:
                - source_id: EC:1.17.7.4
                  statement: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase
            role_description: Terminal reductase step producing the C5 prenyl-diphosphate pool.
    - order: 8
      role: short-chain prenyl diphosphate synthesis
      node:
        id: ispA_fpp_synthesis
        label: Farnesyl diphosphate synthesis
        module_type: REACTION
        description: >-
          IspA elongates DMAPP/IPP-derived prenyl chains to geranyl and
          farnesyl diphosphate. These products feed multiple downstream
          terpenoid and polyprenyl pathways.
        annotons:
          - id: ispA_farnesyl_diphosphate_synthase
            label: IspA farnesyl diphosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispA
                term:
                  id: UniProtKB:Q88QG6
                  label: Farnesyl diphosphate synthase
            function:
              preferred_term: (2E,6E)-farnesyl diphosphate synthase activity
              term:
                id: GO:0004337
                label: (2E,6E)-farnesyl diphosphate synthase activity
              substrates:
                - preferred_term: dimethylallyl diphosphate
                - preferred_term: isopentenyl diphosphate
              products:
                - preferred_term: (2E,6E)-farnesyl diphosphate
              evidence:
                - source_id: EC:2.5.1.10
                  statement: farnesyl diphosphate synthase
            role_description: Produces farnesyl diphosphate for downstream polyprenyl synthesis.
    - order: 9
      role: ubiquinone-side-chain precursor synthesis
      node:
        id: ispB_octaprenyl_diphosphate_synthesis
        label: Octaprenyl diphosphate synthesis
        module_type: REACTION
        description: >-
          IspB extends prenyl chains to all-trans-octaprenyl diphosphate, the
          polyprenyl donor annotated for quinone side-chain biosynthesis in the
          local UniProt metadata.
        annotons:
          - id: ispB_octaprenyl_diphosphate_synthase
            label: IspB octaprenyl diphosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ispB
                term:
                  id: UniProtKB:Q88Q11
                  label: Octaprenyl diphosphate synthase
            function:
              preferred_term: all-trans-octaprenyl-diphosphate synthase activity
              term:
                id: GO:0106350
                label: all-trans-octaprenyl-diphosphate synthase activity
              substrates:
                - preferred_term: farnesyl diphosphate
                - preferred_term: isopentenyl diphosphate
              products:
                - preferred_term: all-trans-octaprenyl diphosphate
              evidence:
                - source_id: EC:2.5.1.90
                  statement: all-trans-octaprenyl-diphosphate synthase
            role_description: Supplies polyprenyl side-chain donor for quinone biosynthesis context.
    - order: 10
      role: undecaprenyl carrier-lipid precursor synthesis
      node:
        id: uppS_undecaprenyl_diphosphate_synthesis
        label: Undecaprenyl diphosphate synthesis
        module_type: REACTION
        description: >-
          UppS synthesizes undecaprenyl diphosphate, the carrier-lipid
          precursor used in bacterial cell-wall and cell-envelope glycan
          biosynthesis.
        annotons:
          - id: uppS_undecaprenyl_diphosphate_synthase
            label: UppS undecaprenyl diphosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK uppS
                term:
                  id: UniProtKB:Q88MH6
                  label: Ditrans,polycis-undecaprenyl-diphosphate synthase
            function:
              preferred_term: ditrans,polycis-undecaprenyl-diphosphate synthase [(2E,6E)-farnesyl-diphosphate specific] activity
              term:
                id: GO:0008834
                label: ditrans,polycis-undecaprenyl-diphosphate synthase [(2E,6E)-farnesyl-diphosphate specific] activity
              substrates:
                - preferred_term: (2E,6E)-farnesyl diphosphate
                - preferred_term: isopentenyl diphosphate
              products:
                - preferred_term: undecaprenyl diphosphate
              evidence:
                - source_id: EC:2.5.1.31
                  statement: ditrans,polycis-undecaprenyl-diphosphate synthase
            role_description: Supplies bactoprenol carrier-lipid precursor for envelope biosynthesis.
notes: >-
  KEGG ppu00900 is a broad terpenoid-backbone map. For KT2440 first-pass
  curation, the strict module is the bacterial MEP/DOXP route plus downstream
  prenyl-diphosphate synthases. `ubiX` is a downstream flavin-prenyltransferase
  used by UbiD in ubiquinone biosynthesis, already covered by ppu00130.
  Acetyl-CoA acetyltransferase/thiolase candidates (`PP_0582`,
  `fadA`/Q88L84, `PP_2215`, `PP_3355`, `bktB`, and `yqeF`) represent
  mevalonate-route or central/lipid-metabolism spillovers in the KEGG map and
  should not by themselves establish a strict mevalonate pathway in PSEPK
  without stronger evidence.
