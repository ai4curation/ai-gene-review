id: MODULE:amino_acid_amine_nucleobase_transport_boundary
title: Amino-acid, amine, and nucleobase transport boundary
description: Boundary module for non-ABC PSEPK amino-acid, amine, compatible-solute, nucleobase, ammonium, and urea transporters
  plus enzyme/name-only side nodes pulled into the transport/membrane/efflux split.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_amino_acid_quaternary_amine_nucleobase_transporters.tsv
  title: PSEPK amino-acid/quaternary-amine/nucleobase transporter batch
  statement: The batch table records 55 PSEPK transport-bucket genes assigned to non-ABC amino-acid, amine, compatible-solute,
    nucleobase, ammonium, and urea transporter context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_partition.tsv
  title: PSEPK transport/membrane/efflux partition
  statement: The parent transport partition separates this non-ABC nitrogenous-solute transporter panel from ABC transporters,
    MFS/DMT, ion/metal, redox, and low-information membrane buckets.
notes: 'First-pass interpretation: keep substrate-specific calls where product/family/GOA agree, use broad amino-acid or nucleobase
  transporter terms for low-resolution paralogs, and keep PP_1060 and PP_4226 as side nodes rather than transporters.'
