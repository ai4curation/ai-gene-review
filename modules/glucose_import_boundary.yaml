id: MODULE:glucose_import_boundary
title: Glucose import boundary
description: >-
  Boundary module for the PP_1015-PP_1018 Gts ABC uptake system in Pseudomonas
  putida KT2440. P. putida-specific glucose-catabolism evidence identifies
  PP1015-PP1018 as an ABC uptake system transporting glucose to the cytoplasm.
  GtsA is the glucose-binding solute-binding component, GtsB and GtsC are the
  membrane permeases, and GtsD is the ATP-binding energy-coupling subunit.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_1015-PP_1018 Gts sugar ABC transporter
      sub-batch. This is a coherent sugar-import partition of the broad ABC
      transporter map, not evidence that ppu02010 is one satisfiable pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records C22 as the PP_1015-PP_1018
      gtsA/gtsB/gtsC/gtsD sugar/polyol transporter block.
  - source_id: PMID:17483213
    title: "Convergent peripheral pathways catalyze initial glucose catabolism in Pseudomonas putida: genomic and flux analysis"
    statement: >-
      The abstract reports that glucose is transported to the cytoplasm by an
      ABC uptake system encoded by PP1015 to PP1018 before glucokinase
      phosphorylation.
  - source_id: UniProtKB:Q88P38
    title: GtsA mannose/glucose ABC transporter glucose-binding periplasmic protein
    statement: >-
      UniProt names GtsA as a mannose/glucose ABC transporter glucose-binding
      periplasmic protein and assigns a bacterial solute-binding protein family.
  - source_id: UniProtKB:Q88P37
    title: GtsB mannose/glucose ABC transporter permease protein
    statement: >-
      UniProt names GtsB as a mannose/glucose ABC transporter permease,
      predicts a multi-pass cell-membrane protein, and places it in the
      binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88P36
    title: GtsC mannose/glucose ABC transporter permease protein
    statement: >-
      UniProt names GtsC as a mannose/glucose ABC transporter permease,
      predicts a multi-pass cell-membrane protein, and places it in the
      binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88P35
    title: GtsD MalK/YcjV-like ABC ATP-binding subunit
    statement: >-
      UniProt annotates GtsD as a MalK/YcjV-like ATP-binding ABC transporter
      subunit. In this KT2440 locus, organism-specific evidence supports a role
      in glucose uptake rather than maltose-specific transport.
