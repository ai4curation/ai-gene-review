notes: >-
  This boundary module was seeded from C22 of the ppu02010 partition. The
  product names include mannose/glucose for GtsA/GtsB/GtsC, whereas GtsD carries
  automated MalK/YcjV-like maltose annotations. The P. putida-specific
  glucose-catabolism paper supports PP1015-PP1018 as a glucose ABC uptake
  system, so glucose import is the current module assignment. The exact
  substrate range for D-glucose, D-mannose, maltose, and related sugars remains
  an experimental question.
