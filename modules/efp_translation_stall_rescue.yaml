id: MODULE:efp_translation_stall_rescue
title: EF-P translation stall rescue
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00345 module for elongation factor
  P-dependent stimulation of peptide-bond formation and rescue of stalled
  cytosolic ribosomes. The module is centered on efp (PP_1858, UniProtKB:Q88LS0).
  EarP-dependent Arg32 rhamnosylation and dTDP-L-rhamnose supply are activation
  context for pseudomonad EF-P, but they are not members of the single-gene
  UPA00345 pathway bucket.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00345
    title: UniPathway UPA00345
    statement: >-
      The local UPA00345 membership set contains efp as the elongation factor P
      member of protein biosynthesis/polypeptide-chain elongation.
  - source_id: GO:0003746
    title: translation elongation factor activity
    statement: >-
      GO:0003746 captures EF-P's molecular function as a translation elongation
      factor.
  - source_id: GO:0072344
    title: rescue of stalled cytosolic ribosome
    statement: >-
      GO:0072344 captures EF-P's more specific role in relieving stalled
      ribosomes during translation.
  - source_id: PMID:25686373
    title: Arginine-rhamnosylation as new strategy to activate translation elongation factor P.
    statement: >-
      This study supports EF-P as the bacterial factor that rescues stalled
      ribosomes, with activation by EarP-mediated rhamnosylation in the
      Arg-type EF-P subfamily.
  - source_id: file:PSEPK/efp/efp-ai-review.yaml
    title: Curated efp review
    statement: >-
      The efp review accepts translation elongation factor activity,
      translational elongation, cytoplasm/cytosol, and stalled-ribosome rescue,
      while keeping broad peptide biosynthesis and regulation of translation as
      non-core context.
  - source_id: file:PSEPK/efp/efp-uniprot.txt
    title: UniProtKB reviewed entry for efp
    statement: >-
      UniProt describes EF-P as cytoplasmic, involved in peptide-bond synthesis,
      and assigned to protein biosynthesis/polypeptide-chain elongation.
  - source_id: file:modules/efp_translation_stall_rescue-deep-research-openscientist.md
    title: OpenScientist module research for EF-P translation stall rescue
    statement: >-
      OpenScientist module-level research supports EF-P as a conserved
      translation factor that rescues polyproline and related elongation stalls,
      with pseudomonad EarP/rhamnose-dependent activation treated as context
      rather than as part of the single-gene UPA00345 module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__efp_translation_stall_rescue__upa00345-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00345 pathway satisfiability review
    statement: >-
      The PSEPK-specific OpenScientist report finds the UPA00345 core step
      satisfied by efp/PP_1858/Q88LS0, with no EfpL/YeiP paralog ambiguity,
      EpmA/EpmB/EpmC beta-lysylation genes not expected in KT2440, and EarP plus
      dTDP-L-rhamnose supply correctly treated as adjacent activation context.
notes: >-
  First-pass interpretation: UPA00345 is satisfiable as a compact single-gene
  translation-factor module in KT2440. The functional boundary should include
  EF-P's direct elongation and stall-rescue roles, while treating EarP, Rml
  dTDP-rhamnose biosynthesis, and other activation dependencies as linked
  context handled by their own modules. OpenScientist's PSEPK-specific review
  supports this single-gene boundary, notes that KT2440 lacks an EfpL/YeiP
  paralog and the E. coli-style EpmA/EpmB/EpmC beta-lysylation route, and flags
  the adjacent EarP/Q88LS1 UniProt "Lys-32" target text as a likely residue-label
  typo because pseudomonad EF-P is Arg32-rhamnosylated.
