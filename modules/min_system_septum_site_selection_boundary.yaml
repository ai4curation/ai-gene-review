id: MODULE:min_system_septum_site_selection_boundary
title: MinCDE septum-site selection boundary
description: Boundary module for the Pseudomonas putida KT2440 MinCDE cell-division site-selection system. The module captures MinD as the membrane-associated ATPase, MinC as the FtsZ/septum inhibitor, and MinE as the topological specificity factor that permits division at the correct internal site while retaining polar inhibition.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition.tsv
  title: PSEPK chromosome/cell-cycle functional-bucket partition
  statement: The chromosome/cell-cycle functional bucket was split into curation-scale sub-batches; minC, minD, and minE form the MinCDE septum-site-selection sub-batch.
- source_id: file:PSEPK/minC/minC-ai-review.yaml
  title: PSEPK minC gene review
  statement: The curated minC review supports MinC as a septum-site-selection regulator that inhibits inappropriate polar FtsZ ring and septum formation.
- source_id: file:PSEPK/minD/minD-ai-review.yaml
  title: PSEPK minD gene review
  statement: The curated minD review supports MinD as a ParA/MinD-family ATPase acting at the cytoplasmic side of the plasma membrane to negatively regulate inappropriate cell division.
- source_id: file:PSEPK/minE/minE-ai-review.yaml
  title: PSEPK minE gene review
  statement: The curated minE review supports MinE as a topological specificity factor regulating division septum assembly.
