                    label: T-box transcription factor T (Brachyury)
                  description: >-
                    The founding T-box factor; a direct Wnt/FGF/Nodal target
                    required for posterior/axial mesoderm and notochord.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: mesoderm formation
                  term:
                    id: GO:0001707
                    label: mesoderm formation
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Master transcriptional determinant of mesoderm.
              evidence:
                - source_id: PMID:32526279
                  title: "Brachyury in the gastrula of basal vertebrates"
                  statement: "In chordates Brachyury acquired a role in mesoderm formation (posterior notochord and somites)."
                  supporting_text: "In chordates, this brachyury ring is conserved, but the gene has taken on a new role in the formation of the mesoderm"
            - id: mesendoderm_eomes
              label: EOMES mesendoderm factor
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: EOMES
                  term:
                    id: UniProtKB:O95936
                    label: Eomesodermin homolog
                  description: >-
                    T-box factor acting with Nodal signalling to specify
                    definitive endoderm and cardiac/anterior mesoderm from the mesendoderm.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: formation of primary germ layer
                  term:
                    id: GO:0001704
                    label: formation of primary germ layer
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Bipotential mesendoderm factor biasing endoderm vs mesoderm by Nodal dose.
              evidence:
                - source_id: PMID:37871215
                  title: "A degron-based approach to manipulate Eomes functions in the context of the developing mouse embryo"
                  statement: "Eomes sequentially specifies definitive endoderm and cardiac mesoderm from the mesendoderm."
                  supporting_text: "Eomes acts in a temporally and spatially restricted manner to sequentially specify the yolk sac haemogenic endothelium, cardiac mesoderm, definitive endoderm"
            - id: mesendoderm_mixl1
              label: MIXL1 mesendoderm factor
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: MIXL1
                  term:
                    id: UniProtKB:Q9H2W2
                    label: Homeobox protein MIXL1
                  description: Paired-like homeobox Mix factor required for primitive-streak mesendoderm.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: formation of primary germ layer
                  term:
                    id: GO:0001704
                    label: formation of primary germ layer
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Homeobox mesendoderm regulator downstream of Nodal at the streak.
              evidence:
                - source_id: PMID:12117810
                  title: "Mixl1 is required for axial mesendoderm morphogenesis and patterning in the murine embryo"
                  statement: "Mixl1 is required for primitive-streak / axial mesendoderm morphogenesis in the mouse."
                  supporting_text: "Homozygous Mixl1 mutant embryos can be distinguished from their littermates by a marked thickening of the primitive streak"
          connections:
            - source: mesendoderm_eomes
              target: endoderm_sox17
              connection_type: POSITIVELY_REGULATES
              description: EOMES with high Nodal activates the endoderm program (shared mesendoderm origin).
        - id: ectoderm
          label: Ectoderm formation and neural/epidermal split
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            Cells receiving little Nodal/Wnt/FGF remain ectodermal. A BMP
            activity switch then divides ectoderm: BMP-high cells become
            epidermis, while organizer BMP antagonism (low BMP) permits the
            SOX2/OTX2 neural (default) program.
          concepts:
            - preferred_term: ectoderm development
              term:
                id: GO:0007398
                label: ectoderm development
          annotons:
            - id: ectoderm_sox2
              label: SOX2 neuroectoderm factor
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: SOX2
                  term:
                    id: UniProtKB:P48431
                    label: Transcription factor SOX-2
                  description: >-
                    SoxB1 factor maintaining pluripotency and marking neural
                    ectoderm/neural plate under low BMP (see file:human/SOX2/SOX2-ai-review.yaml).
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: ectoderm development
                  term:
                    id: GO:0007398
                    label: ectoderm development
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Transcriptional marker/driver of neural ectoderm (default fate under low BMP).
              evidence:
                - source_id: PMID:38940470
                  title: "SoxB1 transcription factors are essential for initiating and maintaining neural plate border gene expression"
                  statement: "SoxB1 factors (Sox2/3) drive early neural fate specification in the embryonic ectoderm."
                  supporting_text: "SoxB1 transcription factors (Sox2/3) are well known for their role in early neural fate specification in the embryo"
            - id: ectoderm_bmp_switch
              label: BMP epidermal/neural switch
              participant:
                selector_type: FAMILY
                family:
                  preferred_term: BMP2/4 subfamily (TGF-beta family)
                  term:
                    id: PANTHER:PTHR11848
                    label: TGF-beta family
                  description: >-
                    BMP2/4-class ligands within the TGF-beta family; BMP activity
                    drives ectoderm toward epidermis, while its dorsal antagonism
                    permits neural fate (neural default model).
                  representative_members:
                    - preferred_term: BMP4
                      term:
                        id: UniProtKB:P12644
                        label: Bone morphogenetic protein 4
                  ancestral_nodes:
                    - preferred_term: PAINT BMP-signaling node PTN008983382
                      term:
                        id: PANTHER:PTN008983382
                        label: PTN008983382
                      description: >-
                        PANTHER PAINT node in PTHR11848 with IBD support for BMP
                        signaling pathway participation (P:GO:0030509); BMP4
                        (UniProtKB:P12644) is among its seed proteins.
                      evidence:
                        - source_id: GO_REF:0000033
                          statement: IBD propagation from PAINT node PTN008983382 in PTHR11848.
              function:
                preferred_term: BMP morphogen activity
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: BMP receptor complex on ectodermal cells
              processes:
                - preferred_term: BMP signaling pathway
                  term:
                    id: GO:0030509
                    label: BMP signaling pathway
              role_description: BMP-high vs BMP-low switch partitioning ectoderm into epidermal vs neural.
              evidence:
                - source_id: PMID:15590738
                  title: "Neural induction in Xenopus requires early FGF signalling in addition to BMP inhibition"
                  statement: "BMP signalling induces epidermis while BMP inhibition permits the default neural fate."
                  supporting_text: "epidermis is induced by BMP signals, whereas neural fates arise by default following BMP inhibition"
          connections:
            - source: ectoderm_bmp_switch
              target: ectoderm_sox2
              connection_type: NEGATIVELY_REGULATES
              description: High BMP represses the neural (SOX2) program, favouring epidermis; low BMP releases neural fate.
