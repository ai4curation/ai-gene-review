id: MODULE:germ_layer_specification
title: Germ layer specification module
description: >-
  The early-metazoan program that, during gastrulation, partitions the
  pluripotent epiblast/blastula into the three primary germ layers - endoderm,
  mesoderm, and ectoderm - each of which is grounded in a distinct GO
  "formation of primary germ layer" child term and driven by a conserved
  signalling logic. High Nodal/TGF-beta (with Wnt and FGF) induces
  endoderm and mesoderm and their master transcription factors (SOX17, FOXA2,
  GATA4/6 for endoderm; Brachyury/TBXT, EOMES, MIXL1 for mesoderm), while the
  ectoderm arises where these signals are low, splitting into BMP-high
  epidermal and BMP-low (organizer-antagonised) neural ectoderm. The three
  layers are modelled as a variant set along the "germ layer" axis. Grounded in
  GO:0001704 (formation of primary germ layer) within GO:0007369 (gastrulation).
  The upstream morphogen gradients are supplied by
  modules/body_axis_specification.yaml; the signalling machinery is detailed in
  the nodal_signaling, wnt_signaling, bmp_signaling, and fgfr_signaling modules.
status: DRAFT
evidence:
  - source_id: GO:0001704
    title: formation of primary germ layer
    statement: The module is grounded in the GO term for formation of primary germ layer.
  - source_id: GO:0007369
    title: gastrulation
    statement: Germ-layer specification occurs during gastrulation, the parent process.
  - source_id: file:human/SOX2/SOX2-ai-review.yaml
    title: SOX2 gene review
    statement: SOX2 is used as the neuroectoderm exemplar; its pluripotency/neural role is reviewed in-repo.
notes: >-
  Exemplar gene products are curated human UniProt accessions orienting each
  conserved master-regulator role; the germ-layer logic is pan-bilaterian.
  Endoderm and mesoderm frequently share early bipotential (mesendoderm)
  regulators (e.g. EOMES, MIXL1, Brachyury) whose dosage and signalling context
  bias the outcome - this is captured in the connections rather than by
  duplicating annotons. Exemplar roles were cross-checked against curated GOA
  (QuickGO): SOX17, GATA4, TBXT, EOMES, and MIXL1 carry a human annotation for
  the asserted germ-layer process, whereas FOXA2, GATA6, and SOX2 are supported
  chiefly by model-organism orthologs and adjacent human terms (e.g. FOXA2 ->
  positive regulation of gastrulation / cell fate specification; SOX2 -> neural
  and endodermal cell-fate terms) rather than the exact term shown.
module:
  id: germ_layer_specification
  label: Germ layer specification during gastrulation
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: formation of primary germ layer
      term:
        id: GO:0001704
        label: formation of primary germ layer
      description: Specification of endoderm, mesoderm, and ectoderm from the pluripotent blastula/epiblast.
    - preferred_term: gastrulation
      term:
        id: GO:0007369
        label: gastrulation
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: Triploblastic germ-layer specification is conserved across bilaterians (diploblasts form two layers).
    cellular_components:
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  variant_sets:
    - id: germ_layer_variants
      label: Primary germ layers specified during gastrulation
      axis: germ layer
      selection: ONE_OR_MORE
      variants:
        - id: endoderm
          label: Endoderm formation
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            The highest Nodal/TGF-beta territory adopts definitive endoderm fate,
            activating the SOX17/FOXA2/GATA master network that gives rise to gut
            and its derivatives.
          concepts:
            - preferred_term: endoderm formation
              term:
                id: GO:0001706
                label: endoderm formation
            - preferred_term: endoderm development
              term:
                id: GO:0007492
                label: endoderm development
          annotons:
            - id: endoderm_sox17
              label: SOX17 endoderm master regulator
              participant:
                selector_type: FAMILY
                family:
                  preferred_term: SoxF subfamily (SRY-related HMG-box factors)
                  term:
                    id: PANTHER:PTHR10270
                    label: SRY-related HMG-box transcription factors
                  description: SoxF factor required for definitive endoderm specification.
                  representative_members:
                    - preferred_term: SOX17
                      term:
                        id: UniProtKB:Q9H6I2
                        label: Transcription factor SOX-17
                  ancestral_nodes:
                    - preferred_term: PAINT endoderm-formation node PTN002567805
                      term:
                        id: PANTHER:PTN002567805
                        label: PTN002567805
                      description: >-
                        PANTHER PAINT node in PTHR10270 with IBD support for
                        endoderm formation (P:GO:0001706); SOX17
                        (UniProtKB:Q9H6I2) is among its seed proteins.
                      evidence:
                        - source_id: GO_REF:0000033
                          statement: IBD propagation from PAINT node PTN002567805 in PTHR10270.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: endodermal cell fate specification
                  term:
                    id: GO:0001714
                    label: endodermal cell fate specification
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Core transcriptional determinant of definitive endoderm.
              evidence:
                - source_id: PMID:11973269
                  title: "Depletion of definitive gut endoderm in Sox17-null mutant mice"
                  statement: "Sox17 is required for definitive gut endoderm formation in the mouse."
                  supporting_text: "Sox17(-/-) mutant embryos are deficient of gut endoderm"
            - id: endoderm_foxa2
              label: FOXA2 pioneer/endoderm factor
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: FOXA2
                  term:
                    id: UniProtKB:Q9Y261
                    label: Hepatocyte nuclear factor 3-beta
                  description: Forkhead pioneer factor marking anterior endoderm and axial mesendoderm.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: endoderm formation
                  term:
                    id: GO:0001706
                    label: endoderm formation
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Pioneer factor establishing endodermal chromatin competence.
              evidence:
                - source_id: PMID:14697355
                  title: "Inhibition of mesodermal fate by Xenopus HNF3beta/FoxA2"
                  statement: "Foxa2/HNF3beta is required for node, notochord, and primitive-streak morphogenesis and marks axial mesendoderm."
                  supporting_text: "HNF3beta is required for the formation of the mammalian node and notochord, and can induce ectopic floor plate formation when misexpressed in the developing neural tube; HNF3beta expression in the extraembryonic endoderm is also necessary for the proper morphogenesis of the mammalian primitive streak"
            - id: endoderm_gata
              label: GATA4/6 endoderm factors
              participant:
                selector_type: FAMILY
                family:
                  preferred_term: GATA4/5/6 endoderm/cardiac GATA factors
                  description: Zinc-finger GATA factors specifying (extra)embryonic endoderm and cardiac mesoderm.
                  representative_members:
                    - preferred_term: GATA4
                      term:
                        id: UniProtKB:P43694
                        label: Transcription factor GATA-4
                    - preferred_term: GATA6
                      term:
                        id: UniProtKB:Q92908
                        label: Transcription factor GATA-6
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: endoderm development
                  term:
                    id: GO:0007492
                    label: endoderm development
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: GATA factors reinforcing endoderm (and primitive/extraembryonic endoderm) identity.
              evidence:
                - source_id: PMID:11171334
                  title: "The transcription factor GATA6 is essential for branching morphogenesis and epithelial cell differentiation during fetal pulmonary development"
                  statement: "GATA6 is important for visceral (extraembryonic) endoderm differentiation."
                  supporting_text: "the transcription factor GATA6 is important for visceral endoderm differentiation"
        - id: mesoderm
          label: Mesoderm formation
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            Intermediate Nodal with Wnt and FGF specifies mesoderm through the
            Brachyury/EOMES/MIXL1 network in cells ingressing through the
            primitive streak/blastopore.
          concepts:
            - preferred_term: mesoderm formation
              term:
                id: GO:0001707
                label: mesoderm formation
            - preferred_term: mesoderm development
              term:
                id: GO:0007498
                label: mesoderm development
          annotons:
            - id: mesoderm_tbxt
              label: Brachyury (TBXT) mesoderm master regulator
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
