id: MODULE:paps_sulfate_activation
title: PAPS biosynthesis and Golgi import (sulfate activation) (PAPSS1/2 -> SLC35B2/3)
description: >-
  Sulfation of biomolecules requires an activated sulfonate donor, 3'-phosphoadenosine 5'-phosphosulfate
  (PAPS), the universal substrate of every cytosolic and Golgi-lumenal sulfotransferase (sulfation of
  glycosaminoglycans/proteoglycans, glycolipids, steroids and DHEA, thyroid hormone, catecholamines, tyrosine
  residues and xenobiotics). PAPS is made in two steps by a single bifunctional enzyme, PAPS synthase (PAPSS1,
  ubiquitous; PAPSS2, predominant in cartilage): an ATP sulfurylase (sulfate adenylyltransferase) domain
  condenses inorganic sulfate with ATP to adenosine 5'-phosphosulfate (APS) + pyrophosphate, and an APS kinase
  (adenylyl-sulfate kinase) domain phosphorylates APS with a second ATP to PAPS + ADP. The cytosolic PAPS
  pool feeds cytosolic sulfotransferases directly, and is imported into the Golgi lumen by the antiporters
  SLC35B2 (PAPST1) and SLC35B3 (PAPST2), which exchange cytosolic PAPS for lumenal PAP (adenosine
  3',5'-bisphosphate, the spent product), supplying the Golgi sulfotransferases that sulfate secreted and
  membrane glycoconjugates. Defects illustrate the pathway's importance: biallelic PAPSS2 mutations cause
  spondyloepimetaphyseal dysplasia (Pakistani-type brachyolmia) and androgen excess through defective
  proteoglycan and DHEA sulfation.
status: DRAFT
