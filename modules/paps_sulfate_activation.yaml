  - source_id: file:human/SLC35B3/SLC35B3-ai-review.yaml
    title: SLC35B3 gene review (human)
    statement: Golgi PAPS transporter 2 / PAPST2 (UniProtKB:Q9H1N7, GO:0046964) matches the completed human SLC35B3 review.
