    title: PAPSS1 gene review (human)
    statement: Bifunctional PAPS synthase 1 (UniProtKB:O43252, GO:0004781/GO:0004020) matches the completed human PAPSS1 review.
  - source_id: file:human/PAPSS2/PAPSS2-ai-review.yaml
    title: PAPSS2 gene review (human)
    statement: Bifunctional PAPS synthase 2 (UniProtKB:O95340, GO:0004781/GO:0004020) matches the completed human PAPSS2 review.
  - source_id: file:human/SLC35B2/SLC35B2-ai-review.yaml
