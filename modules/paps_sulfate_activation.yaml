  notes: >-
    PAPS biosynthesis and Golgi import / sulfate activation (GO:0050428 + GO:1902559), grounded to four
    completed human gene reviews. PAPS is the universal sulfonate donor for all sulfotransferases. Synthesis:
    the bifunctional PAPS synthases PAPSS1 (O43252, ubiquitous) and PAPSS2 (O95340, cartilage-predominant),
    both PTHR11055, carry two domains modelled as two annotons on one node — ATP sulfurylase (GO:0004781;
    sulfate + ATP -> APS + PPi) and APS kinase (GO:0004020; APS + ATP -> PAPS + ADP), both cytosolic
    (GO:0050428 / GO:0000103). Golgi delivery: SLC35B2/PAPST1 (Q8TB61) and SLC35B3/PAPST2 (Q9H1N7), both
    PTHR10778, are Golgi-membrane PAPS:PAP antiporters (GO:0046964 / GO:1902559) supplying lumenal
    sulfotransferases. Curation notes from the reviews: SLC35B2's APS-transport (GO:1902558) TAS was corrected
    to the PAPS term GO:1902559 (APS is the precursor, not the transported substrate), and an ER-membrane IBA
    was corrected to Golgi (family over-propagation); SLC35B3 had the same APS-vs-PAPS metabolite mismatch
    flagged; PAPSS1's skeletal-dysplasia TAS actually concerns the paralog PAPSS2 (flagged MISCITED). PAPSS2
    LOF -> spondyloepimetaphyseal dysplasia (Pakistani-type brachyolmia) + androgen excess (DHEA under-
    sulfation). GO term ids/labels verified against the local go.db; module passes structural + term-label
    validation.
