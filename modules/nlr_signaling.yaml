id: MODULE:nlr_signaling
title: NLR signaling pathway module
description: Nucleotide-binding leucine-rich-repeat receptors detect intracellular perturbations and
  assemble RIPK-, ASC-, or caspase-containing signaling platforms for inflammatory and antimicrobial
  responses.
status: DRAFT
