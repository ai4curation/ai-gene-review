knowledge_gaps:
  - gap_statement: 'VEGFR1: Pure Decoy or Context-Dependent Signaler? remains unresolved in the VEGFR
      signaling pathway module.'
    boundary: Although VEGFR1 kinase-dead mice develop normally, suggesting a predominantly decoy 
      function, there is growing evidence for VEGFR1 signaling in specific contexts, particularly in
      macrophages, some tumor cells, and during tissue protection 
      (perezgutierrez2023biologyandtherapeutic pages 5-6, lee2025vascularendothelialgrowth pages 
      3-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/vegfr_signaling-deep-research-falcon.md
  - gap_statement: Intracellular Trafficking and Endosomal Signaling remains unresolved in the VEGFR
      signaling pathway module.
    boundary: VEGFR2 continues to signal from endosomal compartments after internalization, and most
      ligand-receptor complexes for both VEGFR1 and VEGFR2 are intracellular rather than 
      surface-located (sarabipour2025impactofligand pages 1-4, 
      perezgutierrez2023biologyandtherapeutic pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/vegfr_signaling-deep-research-falcon.md
  - gap_statement: Intracrine and Autocrine VEGF Signaling remains unresolved in the VEGFR signaling
      pathway module.
    boundary: Evidence supports cell-autonomous VEGF signaling modes in both endothelial and tumor 
      cells (patel2023molecularmechanismsand pages 4-6). The molecular mechanisms by which 
      intracellularly produced VEGF-A engages VEGFRs without secretion remain poorly defined, and 
      the physiological significance of intracrine signaling versus classical paracrine VEGF 
      signaling continues to be debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/vegfr_signaling-deep-research-falcon.md
  - gap_statement: Non-Endothelial VEGFR Functions remains unresolved in the VEGFR signaling pathway
      module.
    boundary: The discovery of spatially compartmentalized VEGFR expression in hypothalamic 
      tanycytes and other non-endothelial cells raises important questions about central nervous 
      system effects of systemic anti-VEGF therapies (desruelle2026compartmentalizedvegfreceptor 
      pages 2-5).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/vegfr_signaling-deep-research-falcon.md
  - gap_statement: Cross-Species Extrapolation remains unresolved in the VEGFR signaling pathway 
      module.
    boundary: Much mechanistic understanding derives from mouse genetics and human endothelial cell 
      culture, but the VEGF/VEGFR system varies considerably across vertebrate lineages-with 
      lineage-specific gene losses (VEGF-B absent in birds, PlGF absent in amphibia) and 
      duplications (extensive in fish) (rauniyar2023expansionandcollapse pages 1-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
