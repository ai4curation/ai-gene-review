id: MODULE:rna_decay_processing_boundary
title: RNase, RNA-decay, and RNA-processing boundary
description: Boundary module for PSEPK translation/RNA-processing genes covering RNase P/G/T/Z/D/PH activities, DEAD-box RNA
  helicase context, and RraA/RraB/YhbY-like side nodes. The module separates catalytic nuclease or helicase roles from generic
  RNA-binding, broad hydrolase, and low-information RNase-regulator family transfers.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_ribonuclease_rna_decay_processing_helicases.tsv
  title: PSEPK translation/RNA RNase and RNA-decay-processing split
  statement: The batch records RNase P/G/T/Z/D/PH proteins, DEAD-box RNA helicases, and RraA/RraB/YhbY-like side nodes.
- source_id: file:PSEPK/rnpA/rnpA-ai-review.yaml
  title: Curated rnpA review
  statement: rnpA encodes the protein component of bacterial RNase P in Pseudomonas putida KT2440. The RNase P ribonucleoprotein
    removes 5' leader sequences from precursor tRNAs; the protein subunit binds pre-tRNA leader/substrate context and broadens
    or stabilizes ribozyme activity in vivo.
- source_id: file:PSEPK/rng/rng-ai-review.yaml
  title: Curated rng review
  statement: rng encodes RNase G, an RNase E/G-family S1-domain endoribonuclease in Pseudomonas putida KT2440. Its supported
    first-pass role is cytoplasmic RNA nuclease activity tied to rRNA/RNA processing rather than a fully resolved organism-specific
    RNA-decay pathway.
- source_id: file:PSEPK/rnt/rnt-ai-review.yaml
  title: Curated rnt review
  statement: rnt encodes RNase T, a magnesium-dependent 3'-5' exoribonuclease that trims short 3' overhangs on RNA substrates
    and participates in tRNA end-turnover and tRNA biosynthesis. The DNA proofreading annotation appears to be a family-transfer
    artifact rather than this enzyme's biological role.
- source_id: file:PSEPK/PP_1840/PP_1840-ai-review.yaml
  title: Curated PP_1840 review
  statement: PP_1840 encodes a low-information RraB-domain regulator-of-ribonuclease-activity candidate. It has no GOA rows,
    so the first-pass review retains it as an unresolved RNase-regulator side node rather than asserting a specific nuclease,
    helicase, or RNA-processing function.
- source_id: file:PSEPK/PP_2084/PP_2084-ai-review.yaml
  title: Curated PP_2084 review
  statement: PP_2084 encodes a class II aldolase/RraA-like protein annotated as 4-hydroxy-4-methyl-2-oxoglutarate aldolase
    and oxaloacetate decarboxylase, with secondary RraA-like ribonuclease-regulator annotations. Its better-supported function
    is metabolic lyase chemistry, while RNA-metabolism regulation remains side context.
- source_id: file:PSEPK/rnz/rnz-ai-review.yaml
  title: Curated rnz review
  statement: rnz encodes RNase Z, a zinc-dependent metallo-beta-lactamase-family endoribonuclease that performs tRNA 3'-end
    maturation by removing 3' trailers from precursor tRNAs. Its generic RNA endonuclease and metal-binding annotations are
    secondary to the specific tRNA-processing endoribonuclease role.
- source_id: file:PSEPK/PP_4462/PP_4462-ai-review.yaml
  title: Curated PP_4462 review
  statement: PP_4462 encodes an RraA-like/class II aldolase-family candidate with product-name support for HMG-aldolase or
    regulator-of-ribonuclease-activity context but no GOA rows. The first-pass review leaves it unresolved pending stronger
    evidence for either metabolic lyase activity or RNase regulation.
- source_id: file:PSEPK/srmB/srmB-ai-review.yaml
  title: Curated srmB review
  statement: srmB encodes a DEAD-box ATP-dependent RNA helicase related to SrmB/RhlE-like bacterial RNA helicases. It is best
    retained as a cytosolic RNA helicase candidate associated with ribosomal RNA/ribosome-biogenesis context, while generic
    nucleotide-binding and hydrolase annotations are less informative.
- source_id: file:PSEPK/rnd/rnd-ai-review.yaml
  title: Curated rnd review
  statement: rnd encodes RNase D, a cytoplasmic 3'-5' exoribonuclease involved in 3' processing of precursor tRNAs. It initiates
    hydrolysis at RNA 3' termini and releases 5' mononucleotides, with the specific RNase D and tRNA 3'-end-processing terms
    capturing the core role.
- source_id: file:PSEPK/PP_4720/PP_4720-ai-review.yaml
  title: Curated PP_4720 review
  statement: PP_4720 encodes a YhbY/CRM-domain RNA-binding protein candidate in Pseudomonas putida KT2440. Current evidence
    supports RNA binding, but not a specific RNase, helicase, or RNA-processing reaction.
- source_id: file:PSEPK/dbpA/dbpA-ai-review.yaml
  title: Curated dbpA review
  statement: dbpA encodes a DEAD-box ATP-dependent RNA helicase with a DbpA/CsdA-like RNA-binding domain and predicted 23S-rRNA
    specificity. It is best retained as a cytosolic RNA helicase/ribosome-assembly boundary factor rather than a generic hydrolase.
- source_id: file:PSEPK/rph/rph-ai-review.yaml
  title: Curated rph review
  statement: rph encodes RNase PH, a phosphorolytic 3'-5' exoribonuclease that contributes to tRNA 3'-end maturation and can
    participate in starvation-associated rRNA degradation. The tRNA phosphorolysis/exonuclease role is the primary first-pass
    function; rRNA catabolism is kept as secondary context.
