id: MODULE:bacterial_rna_degradation
title: Bacterial RNA degradation
description: >-
  Boundary module for KEGG ppu03018 RNA degradation in Pseudomonas putida
  KT2440. The strict RNA-turnover core includes RppH-mediated 5'-end
  activation, RNase E endonucleolytic cleavage, PcnB polyadenylation, PNPase
  and RNase R exonucleolytic decay, and DEAD-box RNA helicases that remodel RNA
  or ribonucleoprotein substrates. The KEGG bucket also contains Hfq and Rho as
  RNA-stability/transcription-termination context, enolase and chaperones as
  degradosome/proteostasis side nodes, polyphosphate kinases as nucleotide/polyP
  side context, and RecQ as a likely DNA-repair spillover rather than an RNA
  degradation factor.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03018
    title: RNA degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03018 provides the organism-specific PSEPK curation batch with
      RNase E, PNPase, RNase R, RppH, PcnB, DEAD-box RNA helicases, Hfq, Rho,
      enolase, chaperones, polyphosphate kinases, and RecQ boundary context.
  - source_id: file:projects/P_PUTIDA/batches/ppu03018_bacterial_rna_degradation.tsv
    title: ppu03018 first-pass batch table
    statement: >-
      The batch table records 17 KEGG ppu03018 membership genes and their
      local first-pass review, curation, and Asta-retrieval status.
  - source_id: file:PSEPK/rppH/rppH-ai-review.yaml
    title: Curated rppH review
    statement: >-
      The rppH review accepts mRNA 5'-diphosphatase activity and mRNA
      catabolic process as the bacterial RNA-decay initiation role.
  - source_id: file:PSEPK/rne/rne-ai-review.yaml
    title: Curated rne review
    statement: >-
      The rne review accepts ribonuclease E activity, mRNA catabolism, rRNA
      processing, tRNA processing, and cytoplasmic-side membrane association.
  - source_id: file:PSEPK/pcnB/pcnB-ai-review.yaml
    title: Curated pcnB review
    statement: >-
      The pcnB review accepts poly(A) RNA polymerase activity and
      polyadenylation-dependent RNA catabolic process.
  - source_id: file:PSEPK/pnp/pnp-ai-review.yaml
    title: Curated pnp review
    statement: >-
      The pnp review accepts polyribonucleotide nucleotidyltransferase
      activity, 3'-5'-RNA exonuclease activity, RNA processing, RNA catabolism,
      and mRNA catabolism.
  - source_id: file:PSEPK/rnr/rnr-ai-review.yaml
    title: Curated rnr review
    statement: >-
      The rnr review accepts exoribonuclease II activity and mRNA catabolic
      process for RNase R.
  - source_id: file:PSEPK/rhlB/rhlB-ai-review.yaml
    title: Curated rhlB review
    statement: >-
      The rhlB review accepts RNA helicase activity, ATP binding/hydrolysis,
      cytosol, and RNA catabolic process.
  - source_id: file:PSEPK/deaD/deaD-ai-review.yaml
    title: Curated deaD review
    statement: >-
      The deaD review accepts RNA helicase activity, RNA catabolism, ribosome
      assembly context, and cold-response context.
  - source_id: file:PSEPK/rhlE/rhlE-ai-review.yaml
    title: Curated rhlE review
    statement: >-
      The rhlE review accepts RNA helicase activity with ribosome biogenesis
      and ribosome assembly context.
  - source_id: file:PSEPK/rhlE-I/rhlE-I-ai-review.yaml
    title: Curated rhlE-I review
    statement: >-
      The rhlE-I review accepts RNA helicase activity with ribosome assembly
      context.
  - source_id: file:PSEPK/hfq/hfq-ai-review.yaml
    title: Curated hfq review
    statement: >-
      The hfq review accepts RNA binding, ncRNA-mediated translational
      regulation, and regulation of RNA stability.
  - source_id: file:PSEPK/rho/rho-ai-review.yaml
    title: Curated rho review
    statement: >-
      The rho review accepts ATP-dependent activity acting on RNA and
      DNA-templated transcription termination.
  - source_id: file:PSEPK/eno/eno-ai-review.yaml
    title: Curated eno review
    statement: >-
      The eno review supports enolase as a central-carbon enzyme, with
      RNA-degradosome membership treated only as unproven boundary context in
      KT2440.
  - source_id: file:PSEPK/dnaK/dnaK-ai-review.yaml
    title: Curated dnaK review
    statement: >-
      The dnaK review supports ATP-dependent chaperone/protein-folding
      function, not direct RNA degradation.
  - source_id: file:PSEPK/groEL/groEL-ai-review.yaml
    title: Curated groEL review
    statement: >-
      The groEL review supports ATP-dependent chaperonin/protein-folding
      function, not direct RNA degradation.
  - source_id: file:PSEPK/ppk/ppk-ai-review.yaml
    title: Curated ppk review
    statement: >-
      The ppk review supports polyphosphate kinase activity and polyphosphate
      biosynthesis.
  - source_id: file:PSEPK/ppkB/ppkB-ai-review.yaml
    title: Curated ppkB review
    statement: >-
      The ppkB review supports polyphosphate kinase 2-family phosphotransferase
      activity in polyphosphate-dependent nucleotide phosphorylation.
  - source_id: file:PSEPK/recQ/recQ-ai-review.yaml
    title: Curated recQ review
    statement: >-
      The recQ review supports RecQ-family DNA helicase function in DNA
      replication, repair, recombination, and SOS response rather than RNA
      degradation.
notes: >-
  First-pass interpretation: the satisfiable bacterial RNA-degradation route is
  RppH, RNase E, PcnB, PNPase, RNase R, and RNA helicase remodeling. Hfq and
  Rho are RNA-stability or transcription-termination context. Enolase, DnaK,
  GroEL, Ppk/PpkB, and RecQ are retained as KEGG side nodes, with RecQ explicitly
  treated as DNA-maintenance spillover.
module:
