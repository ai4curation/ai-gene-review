id: MODULE:transcriptional_regulator_spillover_boundary
title: Transcriptional regulator spillover boundary
description: Boundary module for PSEPK low-information or named transcription-regulator-associated proteins from the broad
  regulation/signal-transduction functional bucket. It preserves curated HexR context, separates named regulator candidates
  and phage-like spillovers, and leaves direct regulons, effector ligands, and weak noncanonical entries unresolved.
status: DRAFT
