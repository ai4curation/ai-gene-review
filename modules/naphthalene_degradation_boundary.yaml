id: MODULE:naphthalene_degradation_boundary
title: Naphthalene degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00626 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only frmA and adhP, which are reviewed as
  glutathione-dependent formaldehyde detoxification and broad alcohol
  dehydrogenase side context. This does not establish a complete naphthalene
  catabolic route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00626
    title: Naphthalene degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00626 provides the PSEPK curation batch. Its KT2440 membership is
      limited to frmA and adhP, which are aldehyde/alcohol oxidation enzymes
      rather than naphthalene upper-pathway or ring-cleavage enzymes.
module:
  id: naphthalene_degradation_boundary
  label: Naphthalene degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: formaldehyde catabolic process
      term:
        id: GO:0046294
        label: formaldehyde catabolic process
      description: Formaldehyde detoxification represented by the frmA side node.
    - preferred_term: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
      term:
        id: GO:0106322
        label: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
      description: Glutathione-dependent formaldehyde oxidation assigned to frmA.
    - preferred_term: alcohol dehydrogenase (NAD+) activity
      term:
        id: GO:0004022
        label: alcohol dehydrogenase (NAD+) activity
      description: Broad alcohol dehydrogenase activity assigned to adhP.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: FrmA and AdhP are soluble cytosolic aldehyde/alcohol detoxification enzymes.
  parts:
    - order: 1
      role: Formaldehyde detoxification side context
      node:
        id: formaldehyde_detoxification_side_context
        label: Formaldehyde detoxification side context
        module_type: METABOLIC_PATHWAY
        description: >-
          frmA provides glutathione-dependent formaldehyde detoxification. Its
          KEGG inclusion in ppu00626 is best treated as lower-map aldehyde
          detoxification context, not as evidence for naphthalene oxidation.
        annotons:
          - id: frmA_glutathione_dependent_formaldehyde_dehydrogenase
            label: "frmA: S-(hydroxymethyl)glutathione dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: frmA
            function:
              preferred_term: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
              term:
                id: GO:0106322
                label: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
            role_description: Glutathione-dependent formaldehyde detoxification through S-(hydroxymethyl)glutathione.
    - order: 2
      role: Alcohol oxidation side context
      node:
        id: alcohol_dehydrogenase_side_context
        label: Alcohol dehydrogenase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          adhP is a generic zinc alcohol dehydrogenase with unresolved
          physiological substrate. Its presence in this KEGG map is side
          chemistry and does not supply naphthalene upper-pathway or
          ring-cleavage steps.
        annotons:
          - id: adhP_zinc_alcohol_dehydrogenase
            label: "adhP: zinc alcohol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: adhP
            function:
              preferred_term: alcohol dehydrogenase (NAD+) activity
              term:
                id: GO:0004022
                label: alcohol dehydrogenase (NAD+) activity
            role_description: Cytosolic zinc alcohol dehydrogenase with unresolved physiological substrate.
  notes: >-
    This module intentionally records boundary status. The PSEPK ppu00626
    membership lacks naphthalene dioxygenase, cis-dihydrodiol dehydrogenase,
    salicylate hydroxylase, and catechol/ring-cleavage route enzymes expected
    for complete naphthalene degradation, so the batch should be interpreted as
    formaldehyde/alcohol oxidation side context rather than a satisfiable
    naphthalene catabolic pathway.
