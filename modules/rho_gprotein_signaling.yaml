knowledge_gaps:
  - gap_statement: Isoform specificity versus redundancy remains unresolved in the Rho protein 
      signal transduction pathway module.
    boundary: A major unresolved question is the degree to which ROCK1 and ROCK2 are functionally 
      interchangeable. While they share 92% kinase domain identity, emerging data reveal 
      isoform-specific substrates (ROCK2 preferentially phosphorylates FAK and LIMK in endothelial 
      cells) and context-dependent compensatory mechanisms (ROCK2 deletion triggers ROCK1 
      upregulation in some tissues) (lange2025endothelialrhokinase pages 16-19, la...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rho_gprotein_signaling-deep-research-falcon.md
  - gap_statement: Feedback complexity remains unresolved in the Rho protein signal transduction 
      pathway module.
    boundary: Static signaling diagrams cannot predict the actual spatiotemporal patterns of Rho 
      GTPase activity. The same molecular network produces pulsed contractions in *C. elegans* 
      embryos but traveling waves during cytokinesis in other species. Manipulating the GAP-to-GEF 
      ratio produces opposite effects in frog oocytes versus starfish oocytes 
      (bement2024patterningofthe pages 17-19).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rho_gprotein_signaling-deep-research-falcon.md
  - gap_statement: GEF and GAP specificity remains unresolved in the Rho protein signal transduction
      pathway module.
    boundary: With more than 70 Dbl-family RhoGEFs and a comparably large number of RhoGAPs in the 
      human genome, the rules governing which GEF-GAP pair operates in a given cellular context 
      remain poorly defined (ohashi2024rolesofthe pages 1-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rho_gprotein_signaling-deep-research-falcon.md
  - gap_statement: ARHGEF1 as an immunomodulatory target remains unresolved in the Rho protein 
      signal transduction pathway module.
    boundary: The discovery that ARHGEF1 mediates TXA2-dependent T cell immunosuppression and is 
      required for aspirin's anti-metastatic effects raises the possibility that selective ARHGEF1 
      inhibition could enhance anti-tumor immunity (yang2025aspirinpreventsmetastasis pages 8-9, 
      yang2025aspirinpreventsmetastasis pages 2-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
