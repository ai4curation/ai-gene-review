id: MODULE:alginate_biofilm_regulation_boundary
title: Alginate and biofilm regulation boundary
description: Boundary module for the ppu02020 alginate/biofilm partition in Pseudomonas putida KT2440.
  It captures KinB/AlgB-like phosphorelay regulators, AlgR-family transcription control, WspC/CheR1 biofilm
  methyltransferase context, and FleS-family surface-behavior sensor kinase context. This is a curated
  partition of the broad KEGG two-component-system map rather than a single linear pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups kinB, algB, algR, wspC, fleS, and PP_4696 into the alginate/biofilm
    regulation bucket.
- source_id: PMID:23677992
  title: 'High specificity in CheR methyltransferase function: CheR2 of Pseudomonas putida is essential
    for chemotaxis, whereas CheR1 is involved in biofilm formation.'
  statement: CheR1/WspC is experimentally connected to biofilm formation in Pseudomonas putida.
notes: The bucket is intentionally a boundary module. KinB/AlgB and AlgR are alginate-linked regulatory
  proteins, WspC belongs to a Wsp chemosensory biofilm route, and FleS is kept as surface-behavior phosphorelay
  context pending a more precise module assignment.
