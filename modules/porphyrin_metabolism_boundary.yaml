id: MODULE:porphyrin_metabolism_boundary
title: Porphyrin metabolism boundary
description: >-
  Boundary module for KEGG ppu00860 in Pseudomonas putida KT2440. The bucket
  contains a coherent tetrapyrrole/heme biosynthesis spine from glutamyl-tRNA
  to protoheme, heme O/heme A maturation for terminal oxidases, a large
  aerobic cobalamin/corrinoid biosynthesis branch, a siroheme branch, and
  heme/iron utilization or storage side nodes. These branches share
  uroporphyrinogen/precorrin chemistry but should not be collapsed into one
  satisfiable linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00860
    title: Porphyrin metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set and combines
      heme, cobalamin, siroheme, heme-degradation, iron-storage, and precursor
      side-node genes.
  - source_id: file:projects/P_PUTIDA/batches/ppu00860_porphyrin_metabolism_boundary.tsv
    title: ppu00860 first-pass batch table
    statement: >-
      The batch table records the 46 candidate review rows, their accessions,
      and review/Asta status after first-pass curation.
  - source_id: file:PSEPK/hemA/hemA-ai-review.yaml
    title: hemA first-pass review
    statement: >-
      hemA is curated as the glutamyl-tRNA reductase step initiating the C5
      tetrapyrrole precursor route.
  - source_id: file:PSEPK/hemH/hemH-ai-review.yaml
    title: hemH first-pass review
    statement: >-
      hemH is curated as ferrochelatase, completing protoheme formation from
      protoporphyrin IX.
  - source_id: file:PSEPK/PP_0189/PP_0189-ai-review.yaml
    title: PP_0189 first-pass review
    statement: >-
      PP_0189 is curated as an inner-membrane HemY_N/TPR-associated support
      factor in late protoheme IX biosynthesis.
  - source_id: file:PSEPK/cobO/cobO-ai-review.yaml
    title: cobO first-pass review
    statement: >-
      cobO is curated as corrinoid adenosyltransferase in the cobalamin branch.
  - source_id: file:PSEPK/cysG/cysG-ai-review.yaml
    title: cysG first-pass review
    statement: >-
      cysG is curated as multifunctional siroheme synthase rather than a
      committed cobalamin enzyme.
