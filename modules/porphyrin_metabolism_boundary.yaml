      description: Shared C5-pathway and cyclic tetrapyrrole precursor formation.
    - preferred_term: heme biosynthetic process
      term:
        id: GO:0006783
        label: heme biosynthetic process
      description: Protoheme formation and heme O/heme A maturation.
    - preferred_term: cobalamin biosynthetic process
      term:
        id: GO:0009236
        label: cobalamin biosynthetic process
      description: Corrinoid/cobamide biosynthesis from shared tetrapyrrole precursors.
    - preferred_term: siroheme biosynthetic process
      term:
        id: GO:0019354
        label: siroheme biosynthetic process
      description: Siroheme formation from uroporphyrinogen III through precorrin-2 and sirohydrochlorin.
    - preferred_term: heme oxidation
