id: MODULE:translation_factor_ribosome_rescue_boundary
title: Translation factor and ribosome rescue boundary
description: Boundary module for PSEPK genes in the translation/RNA-processing bucket that encode bacterial translation initiation,
  elongation, recycling, throttling, and stalled-ribosome rescue factors rather than structural ribosomal proteins or RNA-modification
  enzymes.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_translation_factors_ribosome_rescue.tsv
  title: PSEPK translation/RNA translation-factor and ribosome-rescue split
  statement: The batch records hslR, selB, ettA, ychF, pth, lepA, frr, arfB, infA, and smpB as translation-factor, ribosome-rescue,
    or ribosome-associated regulatory genes.
- source_id: file:PSEPK/hslR/hslR-ai-review.yaml
  title: Curated hslR review
  statement: hslR encodes heat shock protein 15, a ribosome-associated S4-domain RNA-binding protein in Pseudomonas putida
    KT2440. The supported role is binding RNA and the large ribosomal subunit during heat-stress or ribosome-associated stress
    context, not DNA-specific regulation.
- source_id: file:PSEPK/selB/selB-ai-review.yaml
  title: Curated selB review
  statement: selB encodes the bacterial selenocysteyl-tRNA-specific translation elongation factor. It is a cytoplasmic GTP-dependent
    elongation factor that recognizes selenocysteyl-tRNA and supports co-translational selenocysteine incorporation.
- source_id: file:PSEPK/ettA/ettA-ai-review.yaml
  title: Curated ettA review
  statement: ettA encodes an ABCF-family energy-dependent translational throttle. It binds the 70S ribosome and uses ATP hydrolysis
    to gate progression from the initiation complex into elongation in response to cellular energy status.
- source_id: file:PSEPK/ychF/ychF-ai-review.yaml
  title: Curated ychF review
  statement: ychF encodes a conserved ribosome-binding ATPase of the OBG-HflX-like/YchF family. It binds the 70S ribosome
    and 50S subunit and is best treated here as a ribosome-associated ATPase rather than a generic GTP-binding protein.
- source_id: file:PSEPK/pth/pth-ai-review.yaml
  title: Curated pth review
  statement: pth encodes peptidyl-tRNA hydrolase Pth, a cytoplasmic enzyme that hydrolyzes ribosome-free or stalled peptidyl-tRNAs
    to recycle tRNA and maintain translation quality control.
- source_id: file:PSEPK/lepA/lepA-ai-review.yaml
  title: Curated lepA review
  statement: lepA encodes elongation factor 4, also known as EF-4 or ribosomal back-translocase LepA. It is a peripheral inner-membrane,
    ribosome-binding translational GTPase that supports accurate and efficient protein synthesis under stress.
- source_id: file:PSEPK/frr/frr-ai-review.yaml
  title: Curated frr review
  statement: frr encodes ribosome-recycling factor, a cytoplasmic protein that releases ribosomes from mRNA after translation
    termination and supports reuse of ribosomal subunits for subsequent protein synthesis.
- source_id: file:PSEPK/arfB/arfB-ai-review.yaml
  title: Curated arfB review
  statement: arfB encodes alternative ribosome-rescue factor B, a release-factor-family peptidyl-tRNA hydrolase that binds
    stalled ribosomes and releases nascent peptidyl-tRNA when canonical termination cannot proceed.
- source_id: file:PSEPK/infA/infA-ai-review.yaml
  title: Curated infA review
  statement: infA encodes translation initiation factor IF-1, a cytoplasmic ribosome-binding initiation factor that stabilizes
    the bacterial 30S pre-initiation complex and helps form the mature 70S initiation complex.
- source_id: file:PSEPK/smpB/smpB-ai-review.yaml
  title: Curated smpB review
  statement: smpB encodes SsrA-binding protein SmpB, the protein partner of tmRNA in trans-translation. The SmpB-tmRNA complex
    rescues stalled ribosomes and tags incomplete nascent proteins for degradation.
