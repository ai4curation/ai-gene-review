id: MODULE:prolipoprotein_diacylglyceryl_transfer
title: prolipoprotein diacylglyceryl transfer
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00664 module for the first bacterial
  lipoprotein-maturation step, in which Lgt transfers a diacylglyceryl group
  from phosphatidylglycerol to the conserved N-terminal cysteine of a
  prolipoprotein. The local UniPathway bucket contains lgt/PP_5142/Q88CN8, a
  reviewed UniProtKB phosphatidylglycerol--prolipoprotein diacylglyceryl
  transferase entry with EC 2.5.1.145 and Rhea:RHEA:56712. This module records
  the Lgt transfer reaction rather than the downstream signal-peptide cleavage
  and N-acylation steps catalyzed by LspA and Lnt.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00664
    title: UniPathway UPA00664
    statement: >-
      The local UPA00664 membership set contains lgt as the KT2440 candidate
      for the diacylglyceryl transfer step in bacterial lipoprotein maturation.
  - source_id: RHEA:56712
    title: phosphatidylglycerol--prolipoprotein diacylglyceryl transferase reaction
    statement: >-
      Rhea:56712 captures transfer of a diacylglyceryl group from
      phosphatidylglycerol to the sulfhydryl group of a prolipoprotein
      N-terminal cysteine.
  - source_id: GO:0042158
    title: lipoprotein biosynthetic process
    statement: >-
      GO:0042158 is the current biological-process term for bacterial
      lipoprotein maturation.
  - source_id: file:PSEPK/lgt/lgt-uniprot.txt
    title: UniProtKB reviewed entry for lgt
    statement: >-
      UniProt describes lgt as a phosphatidylglycerol--prolipoprotein
      diacylglyceryl transferase, records EC 2.5.1.145/Rhea:RHEA:56712, and
      places the enzyme in the lipoprotein biosynthesis pathway.
  - source_id: file:PSEPK/lgt/lgt-goa.tsv
    title: QuickGO GOA annotations for lgt
    statement: >-
      The fetched GOA table contains the Lgt annotations for plasma membrane,
      phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity,
      and lipoprotein biosynthetic process.
  - source_id: file:modules/prolipoprotein_diacylglyceryl_transfer-deep-research-openscientist.md
    title: OpenScientist module research for prolipoprotein diacylglyceryl transfer
    statement: >-
      OpenScientist module-level research supports a narrow UPA00664 boundary
      around the Lgt-catalyzed transfer of a diacylglyceryl group from
      phosphatidylglycerol to the invariant lipobox cysteine, explicitly
      separating this reaction from LspA cleavage, Lnt N-acylation, and Lol
      sorting.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__prolipoprotein_diacylglyceryl_transfer__upa00664-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00664 pathway satisfiability review
    statement: >-
      The PSEPK-specific OpenScientist review finds UPA00664 covered by the
      single bona fide lgt/PP_5142/Q88CN8 candidate and flags PP_4236/Q88F63 as
      an over-propagated Lgt-like annotation that should not be counted as a
      second pathway member.
notes: >-
  First-pass interpretation: UPA00664 is satisfiable as the single-enzyme Lgt
  diacylglyceryl transfer step in KT2440. LspA/signal peptidase II (UPA00665)
  and Lnt/apolipoprotein N-acyltransferase (UPA00666) are neighboring steps in
  the same lipoprotein maturation pathway but are not members of this
  single-gene UniPathway bucket. OpenScientist's PSEPK-specific review supports
  this boundary and adds one curation caveat: PP_4236/Q88F63 may carry an
  over-propagated Lgt-like GO/domain signal, but it is best treated as a
  DsbE/CcmG-type redox protein rather than a second Lgt member.
module:
  id: prolipoprotein_diacylglyceryl_transfer
  label: prolipoprotein diacylglyceryl transfer
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: lipoprotein biosynthetic process
      term:
        id: GO:0042158
        label: lipoprotein biosynthetic process
      description: Biosynthetic process that converts signal-peptide-bearing prolipoproteins into mature bacterial lipoproteins.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: >-
          GOA records plasma membrane for Lgt; UniProt describes the protein as
          a bacterial cell inner membrane multi-pass membrane protein.
  parts:
    - order: 1
      role: Lgt diacylglyceryl transfer to prolipoprotein cysteine
      node:
        id: lgt_prolipoprotein_diacylglyceryl_transfer
        label: Lgt prolipoprotein diacylglyceryl transfer
        module_type: REACTION
        description: >-
          Lgt transfers a diacylglyceryl group from phosphatidylglycerol to the
          sulfhydryl group of the conserved N-terminal cysteine in a
          prolipoprotein, forming an S-diacylglyceryl prolipoprotein and
          sn-glycerol 1-phosphate.
        annotons:
          - id: lgt_prolipoprotein_diacylglyceryl_transferase
            label: "lgt: prolipoprotein diacylglyceryl transferase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK lgt
                term:
                  id: UniProtKB:Q88CN8
                  label: Phosphatidylglycerol--prolipoprotein diacylglyceryl transferase
            function:
              preferred_term: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              term:
                id: GO:0008961
                label: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              evidence:
                - source_id: GO:0008961
                  statement: >-
                    GO:0008961 is the molecular-function term for the Lgt EC
                    2.5.1.145 reaction.
              substrates:
                - preferred_term: L-cysteinyl-prolipoprotein
                - preferred_term: phosphatidylglycerol
              products:
                - preferred_term: S-diacylglyceryl-L-cysteinyl-prolipoprotein
                - preferred_term: sn-glycerol 1-phosphate
                - preferred_term: H(+)
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Executes the first lipoprotein maturation reaction represented by
              lgt/PP_5142/Q88CN8 in the KT2440 UPA00664 membership table.
  knowledge_gaps:
    - gap_statement: >-
        Direct P. putida KT2440 biochemical or genetic evidence for PP_5142 has
        not yet been checked beyond reviewed UniProt/HAMAP transfer.
      boundary: >-
        Treat lgt as the sole local UPA00664 member for the first pass, but keep
        KT2440-specific kinetics, essentiality, and substrate-range claims as
        follow-up questions until direct assays are located.
      gap_kind:
        - BIOLOGY
    - gap_statement: >-
        LspA and Lnt are required for complete bacterial lipoprotein maturation,
        but they perform downstream reactions outside UPA00664.
      boundary: >-
        Do not add LspA or Lnt to this UPA00664 module. Track them under their
        own UniPathway buckets or a broader lipoprotein maturation super-module.
      gap_kind:
        - CURATION
    - gap_statement: >-
        PP_4236/Q88F63 was flagged by OpenScientist as a possible
        over-propagated Lgt-like annotation because it carries a partial Lgt
        signature, but the protein appears to be a DsbE/CcmG-type
        thiol:disulfide redox protein rather than a phosphatidylglycerol--
        prolipoprotein diacylglyceryl transferase.
      boundary: >-
        Exclude PP_4236 from UPA00664 satisfiability unless a separate gene
        review finds stronger evidence for bona fide Lgt activity.
      gap_kind:
        - CURATION
