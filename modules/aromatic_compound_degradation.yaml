id: MODULE:aromatic_compound_degradation
title: Aromatic compound degradation route umbrella
description: >-
  A taxon-neutral bacterial umbrella for aromatic-compound degradation maps that
  combine multiple route-specific catabolic funnels. This module is not a single
  linear pathway. It is used to separate strict aromatic-ring activation and
  beta-ketoadipate chemistry from neighboring cofactor, redox, UbiD/prenyl-FMN,
  and generic side-node enzymes that appear in broad KEGG degradation maps.
status: DRAFT
evidence:
  - source_id: KEGG:ppu01220
    title: Degradation of aromatic compounds - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu01220 membership. The
      module records this as an umbrella map whose candidate genes should be
      split into route-specific submodules during curation.
  - source_id: GO:0043639
    title: benzoate catabolic process
    statement: Benzoate catabolism is one concrete route within the broad aromatic-degradation map.
  - source_id: GO:0042952
    title: beta-ketoadipate pathway
    statement: >-
      The beta-ketoadipate pathway is a common convergence route for catechol
      and protocatechuate branches.
module:
  id: aromatic_compound_degradation
  label: Aromatic compound degradation route umbrella
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: benzoate catabolic process
      term:
        id: GO:0043639
        label: benzoate catabolic process
      description: Benzoate degradation through catechol-producing upper-pathway chemistry.
    - preferred_term: beta-ketoadipate pathway
      term:
        id: GO:0042952
        label: beta-ketoadipate pathway
      description: >-
        Convergent ortho-cleavage route that converts catechol and
        protocatechuate branch products toward central metabolism.
    - preferred_term: 3,4-dihydroxybenzoate catabolic process
      term:
        id: GO:0019619
        label: 3,4-dihydroxybenzoate catabolic process
      description: Protocatechuate branch represented in broad aromatic-degradation maps.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: In bacteria the soluble aromatic-ring cleavage and funnel enzymes operate in the cytoplasm/cytosol.
  parts:
    - order: 1
      role: upper aromatic-ring activation routes
      node:
        id: upper_aromatic_ring_activation
        label: Upper aromatic-ring activation and dihydroxylation routes
        module_type: METABOLIC_PATHWAY
        description: >-
          Route-specific enzymes convert substituted aromatic acids into catechol,
          protocatechuate, or related dihydroxylated ring-cleavage substrates.
          These reactions should be curated under their substrate-specific route
          when that route is known.
        annotons:
          - id: benzoate_1_2_dioxygenase_activity
            label: Benzoate 1,2-dioxygenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: benzoate 1,2-dioxygenase activity
                term:
                  id: GO:0018623
                  label: benzoate 1,2-dioxygenase activity
            function:
              preferred_term: benzoate 1,2-dioxygenase activity
              term:
                id: GO:0018623
                label: benzoate 1,2-dioxygenase activity
              evidence:
                - source_id: EC:1.14.12.10
                  statement: benzoate 1,2-dioxygenase
          - id: hydroxybenzoate_3_monooxygenase_activity
            label: 4-hydroxybenzoate 3-monooxygenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 4-hydroxybenzoate 3-monooxygenase activity
                term:
                  id: GO:0018659
