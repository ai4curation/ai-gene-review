              evidence:
                - source_id: EC:1.14.13.2
                  statement: 4-hydroxybenzoate 3-monooxygenase
    - order: 2
      role: ortho-cleavage and beta-ketoadipate funnel
      node:
        id: ortho_cleavage_beta_ketoadipate_funnel
        label: Catechol/protocatechuate ortho-cleavage and beta-ketoadipate funnel
        module_type: METABOLIC_PATHWAY
