id: MODULE:dioxin_degradation_boundary
title: Dioxin degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00621 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only two KT2440 candidates: PP_1791, an
  unresolved aldolase/synthase-family protein with family-level
  2-isopropylmalate-synthase annotations, and PP_2504, a small
  2-hydroxymuconate/4-oxalocrotonate tautomerase-family enzyme. This membership
  supports aromatic meta-cleavage side context and unresolved enzyme-family
  curation, not a complete dioxin degradation pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00621
    title: Dioxin degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00621 provides the PSEPK curation batch. Its KT2440 membership is
      limited to PP_1791 and PP_2504, with no complete dioxin upper-pathway
      dioxygenase, dechlorination, or downstream ring-cleavage route encoded by
      the batch itself.
module:
  id: dioxin_degradation_boundary
  label: Dioxin degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: dioxin degradation boundary context
      description: >-
        KEGG map context only; the PSEPK candidate set does not satisfy a
        complete dioxin degradation pathway.
    - preferred_term: isomerase activity
      term:
        id: GO:0016853
        label: isomerase activity
      description: Current GOA molecular-function term for PP_2504.
    - preferred_term: 2-isopropylmalate synthase activity
      term:
        id: GO:0003852
        label: 2-isopropylmalate synthase activity
      description: >-
        Family-level TreeGrafter candidate activity for PP_1791; not accepted
        as a confirmed KT2440 core function in the gene review.
  parts:
    - order: 1
      role: Aromatic meta-cleavage tautomerase side context
      node:
        id: hydroxymuconate_tautomerase_side_context
        label: 2-hydroxymuconate/4-oxalocrotonate tautomerase side context
        module_type: REACTION
        description: >-
          PP_2504 has UniProt EC 5.3.2.6 and a 2-hydroxymuconate/
          4-oxalocrotonate tautomerase identity, but the current GOA term is
          only the broad parent isomerase activity. In this KEGG bucket it is
          interpreted as aromatic meta-cleavage side context rather than proof
          of a dioxin route.
        annotons:
          - id: PP_2504_hydroxymuconate_tautomerase_context
            label: "PP_2504: 2-hydroxymuconate/4-oxalocrotonate tautomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2504
            function:
              preferred_term: isomerase activity
              term:
                id: GO:0016853
                label: isomerase activity
            role_description: Aromatic meta-cleavage tautomerase candidate captured only by a broad isomerase GOA term.
    - order: 2
      role: Unresolved aldolase/synthase side candidate
      node:
        id: PP_1791_unresolved_aldolase_synthase
        label: PP_1791 unresolved aldolase/synthase
        module_type: REACTION
        description: >-
          PP_1791 carries broad aldolase/synthase family metadata and
          TreeGrafter 2-isopropylmalate synthase/leucine-biosynthesis
          annotations. The gene review leaves these annotations undecided
          pending substrate evidence, so PP_1791 is retained here as boundary
          context rather than as a dioxin-pathway step.
        annotons:
          - id: PP_1791_aldolase_synthase_candidate
            label: "PP_1791: unresolved aldolase/synthase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1791
            function:
              preferred_term: 2-isopropylmalate synthase activity candidate
              term:
                id: GO:0003852
                label: 2-isopropylmalate synthase activity
            role_description: Family-level candidate activity; not confirmed as core in the gene-level review.
  notes: >-
    This module intentionally records absence/boundary status. KT2440 may use
    PP_2504 in aromatic meta-cleavage chemistry, but the two-member KEGG
    ppu00621 batch does not establish complete dioxin degradation.
