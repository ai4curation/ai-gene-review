notes: >-
  This boundary module was seeded from C37 and extended with C73 of the
  ppu02010 partition, then extended with the C51 PP_3818 phosphate-binding
  singleton. It should remain separate from
  phosphonate_phosphinate_metabolism because these Pst-like systems import
  inorganic phosphate, whereas the Phn/Ptx block imports organic phosphonates.
  Keep open whether KT2440 uses PP_2656-PP_2659 and PP_5326-PP_5329 as two
  separately regulated phosphate import modules or paralogous variants of one
  phosphate-limitation transport system.
