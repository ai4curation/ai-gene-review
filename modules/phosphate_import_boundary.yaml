id: MODULE:phosphate_import_boundary
title: Phosphate import boundary
description: >-
  Boundary module for Pseudomonas putida KT2440 high-affinity inorganic
  phosphate ABC importers encountered during ppu02010 ABC-transporter
  partitioning. The current curated parts are the PP_2656-PP_2659
  PstS/PstC/PstA/PstB1 PstSACB importer and the PP_5326-PP_5329 Pst-like
  importer. In each system, a PstS-family solute-binding component supplies
  phosphate binding, two membrane permeases form the transport channel, and a
  PstB ATP-binding subunit provides ATP-dependent energy coupling. The module
  also records PP_3818 as a PstS-family phosphate-binding singleton whose
  cognate permease and ATPase partners remain unresolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_2656-PP_2659 PstSACB phosphate ABC
      transporter sub-batch and the PP_5326-PP_5329 Pst-like phosphate ABC
      transporter sub-batch. These are coherent transport partitions of the
      broad ABC transporter map, and PP_3818 as a singleton
      phosphate-binding candidate, not evidence that ppu02010 is one
      satisfiable pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records the C37 PP_2656-PP_2659 PstSACB and
      C73 PP_5326-PP_5329 Pst-like phosphate-import sub-batches plus the C51
      PP_3818 PstS-family phosphate-binding singleton after first-pass
      curation.
  - source_id: UniProtKB:Q88JJ3
    title: PstS phosphate-binding protein
    statement: >-
      UniProt names PstS as a phosphate-binding protein and describes it as
      part of the PstSACB ABC transporter complex involved in phosphate import.
  - source_id: UniProtKB:Q88JJ2
    title: PstC phosphate transport system permease
    statement: >-
      UniProt names PstC as a phosphate transport system permease protein,
      places it in the cell inner membrane, and describes it as part of the
      binding-protein-dependent transport system for phosphate.
  - source_id: UniProtKB:Q88JJ1
    title: PstA phosphate transport system permease
    statement: >-
      UniProt names PstA as a phosphate transport system permease protein and
      predicts a multi-pass cell-inner-membrane protein in the
      binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88JJ0
    title: PstB1 phosphate import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes PstB1 as the ATP-binding
      energy-coupling subunit of the PstSACB complex and records ATP-driven
      phosphate import with EC 7.3.2.1.
  - source_id: UniProtKB:Q88C57
    title: PstB2 phosphate import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes PstB2 as part of the PstSACB
      ABC transporter complex involved in phosphate import and records the
      ATP-driven phosphate import reaction with EC 7.3.2.1.
  - source_id: UniProtKB:Q88C56
    title: PP_5327 phosphate transport system permease protein PstA
    statement: >-
      UniProt names PP_5327 as a phosphate transport system permease protein
      PstA, places it in the cell inner membrane, and assigns the PstA-specific
      phosphate permease domain.
  - source_id: UniProtKB:Q88C55
    title: PP_5328 phosphate transport system permease protein
    statement: >-
      UniProt names PP_5328 as a phosphate transport system permease protein,
      predicts a multi-pass cell-membrane protein, and places it in the
      binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88C54
    title: PP_5329 phosphate-binding protein
    statement: >-
      UniProt names PP_5329 as a phosphate-binding protein, places it in the
      periplasm, and describes it as involved in phosphate transport across the
      cytoplasmic membrane.
  - source_id: UniProtKB:Q88GA6
    title: PP_3818 periplasmic phosphate-binding protein
    statement: >-
      UniProt names PP_3818 as a periplasmic phosphate-binding protein and
      records PBP/phosphate-ABC-transporter family signatures, but the local
      ppu02010 partition does not identify cognate phosphate permease or ATPase
      partners.
