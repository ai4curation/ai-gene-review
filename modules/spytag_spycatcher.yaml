id: MODULE:spytag_spycatcher
title: Streptococcus pyogenes FbaB covalent surface-adhesin module (CnaB2 isopeptide domain; SpyTag/SpyCatcher origin)
description: >-
  This module describes the multidomain group A Streptococcus (Streptococcus pyogenes)
  surface adhesin FbaB (gene fba2; UniProtKB:Q8G9G1) and, in particular, its CnaB2 /
  SpaA-like prealbumin-fold domain, which autocatalytically forms an intramolecular
  Lys-Asp isopeptide bond. FbaB is a major virulence factor of invasive M3/M18 GAS
  strains: it is covalently anchored to the peptidoglycan cell wall via a C-terminal
  LPXTG sortase motif, binds host fibronectin through C-terminal fibronectin-binding
  repeats to mediate adhesion to and invasion of host cells, carries an N-terminal
  thioester (TED) domain of the kind that covalently captures host proteins in related
  streptococcal adhesins, and uses the CnaB2 isopeptide bond to gain the mechanical,
  thermal and chemical stability inferred to be needed for force-bearing engagement of
  host fibronectin during invasion. The CnaB2 domain (residues ~462-541; the region
  crystallized in PDB 9OJ3 and earlier FbaB-CnaB2 structures) is the natural scaffold
  that was split and engineered into the widely used SpyTag/SpyCatcher covalent
  protein-conjugation system (SpyTag = reactive Asp-bearing peptide; SpyCatcher =
  Lys-bearing protein partner; catalytic Glu), with SpyTag003/SpyCatcher003 being the
  third-generation variant in PDB 9OJ3. The module is grounded in a single natural gene
  product, FbaB; SpyTag and SpyCatcher are engineered fragments of this one protein, not
  separate genes.
status: DRAFT
references:
  - id: PMID:12359713
    title: "Molecular characterization of a novel fibronectin-binding protein of Streptococcus pyogenes strains isolated from toxic shock-like syndrome patients."
  - id: PMID:22366317
    title: "Peptide tag forming a rapid covalent bond to a protein, through engineering a bacterial adhesin."
  - id: PMID:24161952
    title: "Structural analysis and optimization of the covalent association between SpyCatcher and a peptide Tag."
  - id: PMID:31822621
    title: "Approaching infinite affinity through engineering of peptide-protein interaction."
  - id: PMID:40531663
    title: "ALS-ENABLE: creating synergy and opportunity at the Advanced Light Source synchrotron structural biology beamlines."
  - id: PMID:26032562
    title: "An internal thioester in a pathogen surface protein mediates covalent host binding."
evidence:
  - source_id: PMID:12359713
    title: "Molecular characterization of a novel fibronectin-binding protein of S. pyogenes (FbaB)"
    statement: >-
      FbaB is a surface-located fibronectin-binding protein with an LPXTG motif and
      C-terminal Fn-binding repeats; it binds fibronectin strongly, and an FbaB-deficient
      mutant has ~6-fold lower HEp-2 adhesion/invasion and reduced mouse mortality.
  - source_id: PMID:22366317
    title: "Peptide tag forming a rapid covalent bond to a protein, through engineering a bacterial adhesin"
    statement: >-
      The FbaB CnaB2 domain forms a spontaneous Lys-Asp isopeptide bond; splitting it
      yields SpyTag (reactive peptide) and SpyCatcher (protein partner) that reconstitute
      the covalent bond. The domain is inferred to bear high force in bridging S. pyogenes
      to fibronectin during cell invasion.
  - source_id: PMID:40531663
    title: "ALS-ENABLE synchrotron resource case study"
    statement: >-
      Reports a case study characterizing the SpyCatcher-SpyTag system; the associated
      structure is PDB 9OJ3 (SpyTag003-SpyCatcher003, 1.43 A).
  - source_id: PMID:26032562
    title: "An internal thioester in a pathogen surface protein mediates covalent host binding"
    statement: >-
      Streptococcal surface protein SfbI uses an internal thioester bond as a covalent
      "chemical harpoon" to bind host fibrinogen; FbaB carries the same class of thioester
      (TED) domain.
notes: >-
  Scope: one natural gene product (FbaB, UniProtKB:Q8G9G1). The PDB 9OJ3 "complex" is a
  homo-pairing of two engineered fragments (SpyTag003 + SpyCatcher003) of the FbaB CnaB2
  domain, so there is a single companion gene review (genes/STRPY/FbaB). The thioester
  (TED) covalent host-binding step is asserted on domain-architecture grounds and by
  analogy to SfbI (PMID:26032562); it is marked optional because direct FbaB TED-fibrinogen
  data were not located. GO term groundings use stable molecular-function/process/component
  terms; domain descriptors (LPXTG, TED, CnaB2/SpaA prealbumin fold) are given as
  preferred_terms with Pfam/InterPro ids in prose rather than as validated ontology terms.
module:
  id: spytag_spycatcher
  label: FbaB covalent surface-adhesin module
  module_type: MODULE
  description: >-
    The FbaB adhesin program: cell-wall display, fibronectin-mediated host adhesion and
    invasion, mechanical stabilization by the CnaB2 intramolecular isopeptide bond (the
    SpyTag/SpyCatcher scaffold), and an N-terminal thioester domain for covalent host
    capture.
  concepts:
    - preferred_term: fibronectin binding
      term:
        id: GO:0001968
        label: fibronectin binding
      description: The defining molecular function of FbaB, via its C-terminal Fn-binding repeats.
    - preferred_term: adhesion of symbiont to host cell
      term:
        id: GO:0044650
        label: adhesion of symbiont to host cell
      description: The host-adhesion/invasion process FbaB drives as a GAS virulence factor.
  context:
    taxa:
      - preferred_term: Streptococcus pyogenes (group A Streptococcus)
        term:
          id: NCBITaxon:1314
          label: Streptococcus pyogenes
        description: Invasive M3/M18 serotypes in which FbaB is expressed.
    cellular_components:
      - preferred_term: bacterial cell surface
        term:
          id: GO:0009986
          label: cell surface
      - preferred_term: peptidoglycan cell wall
        term:
          id: GO:0005618
          label: cell wall
  parts:
    - order: 1
      role: covalent display of FbaB on the cell wall
      node:
        id: fbab_cell_wall_anchoring
        label: LPXTG/sortase anchoring of FbaB to the cell wall
        module_type: REACTION
        description: >-
          FbaB carries a C-terminal LPXTG sortase-recognition motif (NCBIfam TIGR01167)
          and is therefore covalently anchored to the peptidoglycan cell wall by sortase,
          displaying its N-terminal adhesive domains at the bacterial surface.
        annotons:
          - id: fbab_lpxtg_substrate
            label: FbaB as LPXTG sortase substrate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: Fibronectin binding protein FbaB (fba2)
                term:
                  id: UniProtKB:Q8G9G1
                  label: Fibronectin binding protein
                description: Group A Streptococcus surface adhesin; 733 aa; LPXTG-anchored.
            role_description: >-
              Substrate of the housekeeping sortase; its LPXTG motif is cleaved and the
              protein is covalently linked to cell-wall peptidoglycan.
            locations:
              - preferred_term: peptidoglycan cell wall
                term:
                  id: GO:0005618
                  label: cell wall
              - preferred_term: bacterial cell surface
                term:
                  id: GO:0009986
                  label: cell surface
            evidence:
              - source_id: PMID:12359713
                statement: >-
                  FbaB possesses an LPXTG motif and Fn-binding repeat domains in the
                  C-terminal region and is expressed on the cell surface of TSLS strains.
    - order: 2
      role: fibronectin-mediated host adhesion and invasion
      node:
        id: fbab_fibronectin_adhesion
        label: FbaB fibronectin binding and host-cell adhesion/invasion
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The surface-displayed FbaB binds host fibronectin through its C-terminal
          fibronectin-binding repeats, bridging the bacterium to host extracellular
          matrix/cell-surface fibronectin and promoting adhesion to and invasion of host
          epithelial cells. An FbaB-deficient mutant shows ~6-fold reduced HEp-2
          adhesion/invasion and decreased virulence.
        concepts:
          - preferred_term: adhesion of symbiont to host cell
            term:
              id: GO:0044650
              label: adhesion of symbiont to host cell
        annotons:
          - id: fbab_fibronectin_binding
            label: FbaB fibronectin-binding adhesin activity
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: Fibronectin binding protein FbaB (fba2)
                term:
                  id: UniProtKB:Q8G9G1
                  label: Fibronectin binding protein
            function:
              preferred_term: fibronectin binding
              term:
                id: GO:0001968
                label: fibronectin binding
              targets:
                - preferred_term: host fibronectin
            processes:
              - preferred_term: adhesion of symbiont to host cell
                term:
                  id: GO:0044650
                  label: adhesion of symbiont to host cell
            locations:
              - preferred_term: bacterial cell surface
                term:
                  id: GO:0009986
                  label: cell surface
            evidence:
              - source_id: PMID:12359713
                statement: Recombinant FbaB exhibits strong fibronectin-binding ability.
              - source_id: PMID:12359713
                statement: An FbaB-deficient mutant has ~6-fold lower HEp-2 adhesion and invasion.
    - order: 3
      role: mechanical stabilization by the CnaB2 intramolecular isopeptide bond
      node:
        id: fbab_cnab2_isopeptide
        label: CnaB2 intramolecular Lys-Asp isopeptide bond (SpyTag/SpyCatcher scaffold)
        module_type: MOLECULAR_FUNCTION
        description: >-
          The CnaB2 / SpaA-like prealbumin-fold domain of FbaB (Pfam PF17802; InterPro
          IPR041033; SUPFAM SSF49478 Cna protein B-type; residues ~462-541) autocatalytically
          forms an intramolecular isopeptide (amide) bond between a Lys and an Asp, assisted
          by a catalytic Glu. This covalent cross-link gives the domain extreme mechanical,
          thermal and chemical stability and, biologically, is inferred to let FbaB bear high
          force while bridging the bacterium to fibronectin during invasion. Splitting this
          domain produced the SpyTag peptide (reactive Asp) and SpyCatcher protein (reactive
          Lys), whose reconstituted covalent bond underlies the SpyTag/SpyCatcher conjugation
          toolkit; SpyTag003/SpyCatcher003 (PDB 9OJ3) is the optimized third generation.
        annotons:
          - id: fbab_isopeptide_crosslink
            label: FbaB CnaB2 autocatalytic isopeptide cross-link
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FbaB CnaB2 / SpaA-like prealbumin-fold domain
                term:
                  id: UniProtKB:Q8G9G1
                  label: Fibronectin binding protein
                description: >-
                  CnaB2 domain of FbaB (residues ~462-541); the isopeptide-bond-forming domain
                  split into SpyTag/SpyCatcher.
            function:
              preferred_term: autocatalytic intramolecular Lys-Asp isopeptide (amide) bond formation
              term:
                id: GO:0018149
                label: peptide cross-linking
              description: >-
                Spontaneous, Glu-assisted intramolecular isopeptide bond between Lys and Asp
                side chains; irreversible and resistant to >1 nN force.
            role_description: >-
              Provides covalent mechanical reinforcement of the adhesin; engineered split
              yields the SpyTag/SpyCatcher covalent conjugation system.
            evidence:
              - source_id: PMID:22366317
                statement: >-
                  The FbaB CnaB2 domain contains a spontaneous Lys-Asp isopeptide bond; the
                  domain may bear high force in bridging S. pyogenes to fibronectin during
                  cell invasion.
              - source_id: PMID:24161952
                statement: Crystal structures (PDB 4MLI/4MLS) of the CnaB2-derived SpyCatcher:SpyTag covalent complex.
    - order: 4
      role: covalent host capture via the N-terminal thioester domain
      optional: true
      node:
        id: fbab_thioester_host_capture
        label: FbaB N-terminal thioester (TED) domain covalent host binding
        module_type: MOLECULAR_FUNCTION
        description: >-
          FbaB carries an N-terminal thioester domain (Pfam PF08341/TED; InterPro IPR013552;
          residues ~92-212) with an internal Cys-Gln thioester bond. In related streptococcal
          adhesins (e.g. SfbI, Cpa) such domains act as a covalent "chemical harpoon" that
          cross-links the bacterium to host proteins such as fibrinogen. This step is inferred
          for FbaB from its domain architecture and by analogy; direct FbaB TED-host data were
          not located.
        annotons:
          - id: fbab_ted_covalent_binding
            label: FbaB TED-domain covalent host-protein capture (inferred)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FbaB N-terminal thioester (TED) domain
                term:
                  id: UniProtKB:Q8G9G1
                  label: Fibronectin binding protein
            function:
              preferred_term: thioester-mediated covalent binding of a host protein (e.g. fibrinogen)
              term:
                id: GO:0070051
                label: fibrinogen binding
              targets:
                - preferred_term: host fibrinogen (candidate covalent target)
            role_description: Inferred covalent host-capture function of the TED domain.
            evidence:
              - source_id: PMID:26032562
                statement: >-
                  The streptococcal surface protein SfbI uses an internal thioester bond as a
                  covalent chemical harpoon to bind host fibrinogen; FbaB carries the same class
                  of TED domain.
  connections:
    - source: fbab_cell_wall_anchoring
      target: fbab_fibronectin_adhesion
      connection_type: PROVIDES_INPUT_FOR
      description: Cell-wall anchoring displays FbaB at the surface so it can engage host fibronectin.
    - source: fbab_cnab2_isopeptide
      target: fbab_fibronectin_adhesion
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The CnaB2 isopeptide bond mechanically stabilizes the adhesin for force-bearing
        fibronectin engagement during invasion.
    - source: fbab_thioester_host_capture
      target: fbab_fibronectin_adhesion
      connection_type: POSITIVELY_REGULATES
      description: >-
        Covalent TED-mediated host capture is inferred to reinforce non-covalent
        fibronectin-mediated adhesion.
