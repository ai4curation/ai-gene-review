id: MODULE:mep_isoprenoid_precursor_biosynthesis
title: MEP isoprenoid precursor biosynthesis
description: >-
  The bacterial methylerythritol phosphate (MEP/DOXP) route converts pyruvate
  and glyceraldehyde 3-phosphate through seven reactions into isopentenyl
  diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). DXS forms the shared
  branch-point metabolite DXP, Dxr commits DXP to the MEP route, IspD-IspG
  build HMBPP, and IspH produces the two universal five-carbon isoprenoid
  precursors. DXP use in thiamine or pyridoxal-phosphate biosynthesis and
  downstream prenyl-diphosphate elongation are outside this module.
status: DRAFT
evidence:
  - source_id: GO:0019288
    title: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
    statement: >-
      GO:0019288 captures IPP production through the MEP route represented by
      the seven ordered reactions in this module.
  - source_id: GO:0050992
    title: dimethylallyl diphosphate biosynthetic process
    statement: >-
      The terminal IspH reaction also produces DMAPP, the second universal
      five-carbon isoprenoid precursor.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__mep_isoprenoid_precursor_biosynthesis__ppu00900-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00900 MEP-pathway research
    statement: >-
      Species-aware research supports coverage of all seven PSEPK reactions
      and the exclusion of thiolases and downstream prenyl-transfer reactions.
      Manual assessment retains DXS as a shared branch-point entry rather than
      a committed step and does not require a separate IDI reaction because
      IspH itself produces both IPP and DMAPP.
  - source_id: file:modules/mep_isoprenoid_precursor_biosynthesis-deep-research-openscientist.md
    title: OpenScientist MEP isoprenoid precursor biosynthesis module research
    statement: >-
      Module-level research supports the ordered seven-reaction boundary, Dxr
      as the first committed step, direct formation of IPP and DMAPP by IspH,
      and flavodoxin- versus ferredoxin-coupled IspG implementations. Manual
      assessment excludes regulation, metabolite signaling, detailed Fe-S
      mechanism, and downstream prenyl metabolism from the reusable core.
notes: >-
  This reusable module models the bacterial route exemplified by Pseudomonas
  putida KT2440 and Escherichia coli K-12. The PSEPK proteins are representative
  members, not a taxonomic restriction. The IspG step explicitly represents
  flavodoxin- and ferredoxin-coupled implementations; the PSEPK and E. coli
  exemplars ground the flavodoxin route, while a reviewed cyanobacterial IspG
  grounds the ferredoxin route. IspA, IspB, UppS, UbiX, and thiolases in broad
  terpenoid-pathway buckets act outside the seven-reaction precursor route.
  This is not a literal transcription of KEGG M00096, which also includes an
  IDI isomerization step; here the dual-product IspH reaction supplies both
  required outputs, while any later IPP/DMAPP pool balancing is kept separate.
module:
  id: mep_isoprenoid_precursor_biosynthesis
  label: MEP isoprenoid precursor biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
      term:
        id: GO:0019288
        label: isopentenyl diphosphate biosynthetic process, methylerythritol 4-phosphate pathway
      description: Production of IPP through the MEP/DOXP route.
    - preferred_term: dimethylallyl diphosphate biosynthetic process
      term:
        id: GO:0050992
        label: dimethylallyl diphosphate biosynthetic process
      description: Production of DMAPP as a second product of the terminal IspH step.
  parts:
    - order: 1
      role: DXP formation from pyruvate and glyceraldehyde 3-phosphate
      node:
        id: dxs_dxp_formation
        label: DXS-dependent DXP formation
        module_type: REACTION
        description: >-
          DXS performs a thiamine-diphosphate-dependent condensation that
          supplies DXP to the MEP route and to vitamin-biosynthesis branches.
        annotons:
          - id: dxs_activity
            label: DXP synthase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DXP synthase family
                term:
                  id: PANTHER:PTHR43322
                  label: 1-D-DEOXYXYLULOSE 5-PHOSPHATE SYNTHASE-RELATED
                representative_members:
                  - preferred_term: Dxs (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QG7
                      label: 1-deoxy-D-xylulose-5-phosphate synthase
                  - preferred_term: Dxs (Escherichia coli K-12)
                    term:
                      id: UniProtKB:P77488
                      label: 1-deoxy-D-xylulose-5-phosphate synthase
                ancestral_nodes:
                  - preferred_term: PAINT DXS activity node PTN000179250
                    term:
                      id: PANTHER:PTN000179250
                      label: PTN000179250
                    description: >-
                      PAINT node in PTHR43322 with IBD support for GO:0008661
                      and GO:0019288 seeded by the E. coli Dxs exemplar.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: >-
                          IBD propagation from PAINT node PTN000179250 in
                          PTHR43322.
            function:
              preferred_term: 1-deoxy-D-xylulose-5-phosphate synthase activity
              term:
                id: GO:0008661
                label: 1-deoxy-D-xylulose-5-phosphate synthase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: D-glyceraldehyde 3-phosphate
              products:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
                - preferred_term: carbon dioxide
              evidence:
                - source_id: RHEA:12605
                  title: DXP synthase reaction
                  statement: >-
                    Rhea 12605 defines condensation of pyruvate and
                    D-glyceraldehyde 3-phosphate to DXP and carbon dioxide.
                - source_id: file:PSEPK/dxs/dxs-ai-review.yaml
                  statement: >-
                    The PSEPK dxs review accepts GO:0008661 as the core
                    molecular function of Q88QG7.
            role_description: >-
              Produces DXP at the entry to the route without implying that DXS
              is committed exclusively to isoprenoid precursor biosynthesis.
    - order: 2
      role: Commitment of DXP to MEP
      node:
        id: dxr_mep_formation
        label: Dxr-dependent MEP formation
        module_type: REACTION
        annotons:
          - id: dxr_activity
            label: DXP reductoisomerase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DXP reductoisomerase family
                term:
                  id: PANTHER:PTHR30525
                  label: 1-DEOXY-D-XYLULOSE 5-PHOSPHATE REDUCTOISOMERASE
                representative_members:
                  - preferred_term: Dxr (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88MH4
                      label: 1-deoxy-D-xylulose 5-phosphate reductoisomerase
                  - preferred_term: Dxr (Escherichia coli K-12)
                    term:
                      id: UniProtKB:P45568
                      label: 1-deoxy-D-xylulose 5-phosphate reductoisomerase
                ancestral_nodes:
                  - preferred_term: PAINT Dxr activity node PTN000776155
                    term:
                      id: PANTHER:PTN000776155
                      label: PTN000776155
                    description: >-
                      PAINT node in PTHR30525 with IBD support for GO:0030604
                      seeded by the E. coli Dxr exemplar.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: >-
                          IBD propagation from PAINT node PTN000776155 in
                          PTHR30525.
            function:
              preferred_term: 1-deoxy-D-xylulose-5-phosphate reductoisomerase activity
              term:
                id: GO:0030604
                label: 1-deoxy-D-xylulose-5-phosphate reductoisomerase activity
              substrates:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
                - preferred_term: NADPH
              products:
                - preferred_term: 2-C-methyl-D-erythritol 4-phosphate
                - preferred_term: NADP+
              evidence:
                - source_id: RHEA:13719
                  title: physiological DXP reductoisomerase reaction
                  statement: >-
                    Rhea 13719 is the physiological direction from DXP and
                    NADPH to MEP and NADP+.
                - source_id: file:PSEPK/dxr/dxr-ai-review.yaml
                  statement: >-
                    The PSEPK dxr review accepts GO:0030604 as the core
                    molecular function of Q88MH4.
            role_description: Commits DXP to the MEP isoprenoid precursor route.
    - order: 3
      role: CDP-ME formation
      node:
        id: ispd_cdp_me_formation
        label: IspD-dependent CDP-ME formation
        module_type: REACTION
        annotons:
          - id: ispd_activity
            label: MEP cytidylyltransferase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IspD MEP cytidylyltransferase family
                term:
                  id: PANTHER:PTHR32125:SF4
                  label: 2-C-METHYL-D-ERYTHRITOL 4-PHOSPHATE CYTIDYLYLTRANSFERASE, CHLOROPLASTIC
                representative_members:
                  - preferred_term: IspD (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88MF7
                      label: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase
                  - preferred_term: IspD (Escherichia coli K-12)
                    term:
                      id: UniProtKB:Q46893
                      label: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase
                ancestral_nodes:
                  - preferred_term: PAINT IspD activity node PTN000781812
                    term:
                      id: PANTHER:PTN000781812
                      label: PTN000781812
                    description: >-
                      PAINT node in PTHR32125 with IBD support for
                      GO:0050518 seeded by the E. coli IspD exemplar.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: >-
                          IBD propagation from PAINT node PTN000781812 in
                          PTHR32125.
            function:
              preferred_term: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase activity
              term:
                id: GO:0050518
                label: 2-C-methyl-D-erythritol 4-phosphate cytidylyltransferase activity
              substrates:
                - preferred_term: 2-C-methyl-D-erythritol 4-phosphate
                - preferred_term: CTP
              products:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol
                - preferred_term: diphosphate
              evidence:
                - source_id: RHEA:13429
                  title: MEP cytidylyltransferase reaction
                  statement: >-
                    Rhea 13429 defines CTP-dependent conversion of MEP to
                    CDP-ME and diphosphate.
                - source_id: file:PSEPK/ispD/ispD-ai-review.yaml
                  statement: >-
                    The PSEPK ispD review accepts GO:0050518 as the core
                    molecular function of Q88MF7.
            role_description: Converts MEP to the cytidylated intermediate CDP-ME.
    - order: 4
      role: CDP-ME 2-phosphate formation
      node:
        id: ispe_cdp_me2p_formation
        label: IspE-dependent CDP-ME 2-phosphate formation
        module_type: REACTION
        annotons:
          - id: ispe_activity
            label: CDP-ME kinase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IspE CDP-ME kinase family
                term:
                  id: PANTHER:PTHR43527:SF2
                  label: 4-DIPHOSPHOCYTIDYL-2-C-METHYL-D-ERYTHRITOL KINASE, CHLOROPLASTIC
                representative_members:
                  - preferred_term: IspE (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88PX5
                      label: 4-diphosphocytidyl-2-C-methyl-D-erythritol kinase
                  - preferred_term: IspE (Escherichia coli K-12)
                    term:
                      id: UniProtKB:P62615
                      label: 4-diphosphocytidyl-2-C-methyl-D-erythritol kinase
                ancestral_nodes:
                  - preferred_term: PAINT IspE activity node PTN000466527
                    term:
                      id: PANTHER:PTN000466527
                      label: PTN000466527
                    description: >-
                      PAINT node in PTHR43527 with IBD support for GO:0050515
                      seeded by the E. coli IspE exemplar.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: >-
                          IBD propagation from PAINT node PTN000466527 in
                          PTHR43527.
            function:
              preferred_term: 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity
              term:
                id: GO:0050515
                label: 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity
              substrates:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol
                - preferred_term: ATP
              products:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol 2-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: RHEA:18437
                  title: CDP-ME kinase reaction
                  statement: >-
                    Rhea 18437 defines ATP-dependent phosphorylation of CDP-ME
                    to CDP-ME 2-phosphate.
                - source_id: file:PSEPK/ispE/ispE-ai-review.yaml
                  statement: >-
                    The PSEPK ispE review accepts GO:0050515 as the core
                    molecular function of Q88PX5.
            role_description: Phosphorylates CDP-ME to form CDP-ME 2-phosphate.
    - order: 5
      role: ME-CPP formation
      node:
        id: ispf_me_cpp_formation
        label: IspF-dependent ME-CPP formation
        module_type: REACTION
        annotons:
          - id: ispf_activity
            label: ME-CPP synthase activity
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IspF ME-CPP synthase family
                term:
                  id: PANTHER:PTHR43181
                  label: 2-C-METHYL-D-ERYTHRITOL 2,4-CYCLODIPHOSPHATE SYNTHASE, CHLOROPLASTIC
                representative_members:
                  - preferred_term: IspF (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88MF3
                      label: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase
                  - preferred_term: IspF (Escherichia coli K-12)
                    term:
                      id: UniProtKB:P62617
                      label: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase
                ancestral_nodes:
                  - preferred_term: PAINT IspF activity node PTN000781796
                    term:
                      id: PANTHER:PTN000781796
                      label: PTN000781796
                    description: >-
                      PAINT node in PTHR43181 with IBD support for GO:0008685
                      seeded by the E. coli IspF exemplar.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: >-
                          IBD propagation from PAINT node PTN000781796 in
                          PTHR43181.
            function:
              preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase activity
              term:
                id: GO:0008685
                label: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase activity
              substrates:
                - preferred_term: 4-diphosphocytidyl-2-C-methyl-D-erythritol 2-phosphate
              products:
                - preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate
                - preferred_term: CMP
              evidence:
                - source_id: RHEA:23864
                  title: ME-CPP synthase reaction
                  statement: >-
                    Rhea 23864 defines cyclization of CDP-ME 2-phosphate to
                    ME-CPP with release of CMP.
                - source_id: file:PSEPK/ispF/ispF-ai-review.yaml
                  statement: >-
                    The PSEPK ispF review accepts GO:0008685 as the core
                    molecular function of Q88MF3.
            role_description: Cyclizes CDP-ME 2-phosphate to form ME-CPP.
    - order: 6
      role: HMBPP formation
      node:
        id: ispg_hmbpp_formation
        label: IspG-dependent HMBPP formation
        module_type: REACTION
        description: >-
          IspG reductively converts ME-CPP to HMBPP using a low-potential
          electron carrier. The carrier-specific activity differs among
          lineages without changing the pathway intermediate produced.
        variant_sets:
          - id: ispg_electron_carrier
            label: IspG electron-carrier variants
            axis: electron carrier
            selection: ONE_OR_MORE
            variants:
              - id: flavodoxin_ispg_variant
                label: Flavodoxin-coupled IspG
                module_type: REACTION
                annotons:
                  - id: flavodoxin_ispg_activity
                    label: Flavodoxin-coupled HMBPP synthase activity
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: IspG HMBPP synthase family
                        term:
                          id: PANTHER:PTHR30454
                          label: 4-HYDROXY-3-METHYLBUT-2-EN-1-YL DIPHOSPHATE SYNTHASE
                        representative_members:
                          - preferred_term: IspG (Pseudomonas putida KT2440)
                            term:
                              id: UniProtKB:Q88PJ7
                              label: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase (flavodoxin)
                          - preferred_term: IspG (Escherichia coli K-12)
                            term:
                              id: UniProtKB:P62620
                              label: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase (flavodoxin)
                    function:
                      preferred_term: 4-hydroxy-3-methylbut-2-enyl-diphosphate synthase activity (flavodoxin)
                      term:
                        id: GO:0141197
                        label: 4-hydroxy-3-methylbut-2-enyl-diphosphate synthase activity (flavodoxin)
                      substrates:
                        - preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate
                        - preferred_term: reduced flavodoxin
                      products:
                        - preferred_term: 4-hydroxy-3-methylbut-2-enyl diphosphate
                        - preferred_term: oxidized flavodoxin
                      evidence:
                        - source_id: RHEA:43604
                          title: flavodoxin-coupled HMBPP synthase reaction
                          statement: >-
                            Rhea 43604 defines the flavodoxin-coupled
                            interconversion of ME-CPP and HMBPP.
                        - source_id: file:PSEPK/ispG/ispG-ai-review.yaml
                          statement: >-
                            The PSEPK ispG review accepts GO:0141197 as the
                            exact core molecular function of Q88PJ7.
                    role_description: Reductively converts ME-CPP to HMBPP using flavodoxin.
              - id: ferredoxin_ispg_variant
                label: Ferredoxin-coupled IspG
                module_type: REACTION
                annotons:
                  - id: ferredoxin_ispg_activity
                    label: Ferredoxin-coupled HMBPP synthase activity
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: IspG HMBPP synthase family
                        term:
                          id: PANTHER:PTHR30454
                          label: 4-HYDROXY-3-METHYLBUT-2-EN-1-YL DIPHOSPHATE SYNTHASE
                        representative_members:
                          - preferred_term: IspG (Synechococcus sp. CC9605)
                            term:
                              id: UniProtKB:Q3AK30
                              label: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase (ferredoxin)
                    function:
                      preferred_term: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase activity (ferredoxin)
                      term:
                        id: GO:0046429
                        label: 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase activity (ferredoxin)
                      substrates:
                        - preferred_term: 2-C-methyl-D-erythritol 2,4-cyclodiphosphate
                        - preferred_term: reduced [2Fe-2S] ferredoxin
                      products:
                        - preferred_term: 4-hydroxy-3-methylbut-2-enyl diphosphate
                        - preferred_term: oxidized [2Fe-2S] ferredoxin
                      evidence:
                        - source_id: RHEA:26119
                          title: ferredoxin-coupled HMBPP synthase reaction
                          statement: >-
                            Rhea 26119 defines the ferredoxin-coupled
                            interconversion of ME-CPP and HMBPP.
                        - source_id: UniProtKB:Q3AK30
                          title: Reviewed ferredoxin-coupled cyanobacterial IspG exemplar
                          statement: >-
                            UniProtKB Q3AK30 assigns EC 1.17.7.1 and Rhea 26119
                            to IspG from Synechococcus sp. CC9605.
                    role_description: Reductively converts ME-CPP to HMBPP using ferredoxin.
    - order: 7
      role: IPP and DMAPP formation
      node:
        id: isph_ipp_dmapp_formation
        label: IspH-dependent IPP and DMAPP formation
        module_type: REACTION
        annotons:
