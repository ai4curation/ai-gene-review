              term:
                id: GO:0051745
                label: 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity
              substrates:
                - preferred_term: 4-hydroxy-3-methylbut-2-enyl diphosphate
                - preferred_term: reduced ferredoxin
              products:
                - preferred_term: isopentenyl diphosphate
                - preferred_term: dimethylallyl diphosphate
                - preferred_term: oxidized ferredoxin
              evidence:
                - source_id: RHEA:24488
                  title: HMBPP reductase reaction yielding IPP
                  statement: Rhea 24488 captures the IPP-forming branch of IspH catalysis.
                - source_id: RHEA:24825
                  title: HMBPP reductase reaction yielding DMAPP
                  statement: Rhea 24825 captures the DMAPP-forming branch of IspH catalysis.
                - source_id: file:PSEPK/ispH/ispH-ai-review.yaml
                  statement: >-
                    The PSEPK ispH review accepts GO:0051745 and records both
                    IPP and DMAPP production as core pathway outputs of Q88Q89.
            role_description: Produces the IPP and DMAPP outputs of the pathway.
  connections:
    - source: dxs_dxp_formation
      target: dxr_mep_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: DXP produced by DXS is the substrate consumed by Dxr.
      description: DXS supplies DXP to the committed MEP reaction.
    - source: dxr_mep_formation
      target: ispd_cdp_me_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: MEP produced by Dxr is the substrate consumed by IspD.
      description: Dxr supplies MEP to IspD.
    - source: ispd_cdp_me_formation
      target: ispe_cdp_me2p_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: CDP-ME produced by IspD is the substrate consumed by IspE.
      description: IspD supplies CDP-ME to IspE.
    - source: ispe_cdp_me2p_formation
      target: ispf_me_cpp_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: CDP-ME 2-phosphate produced by IspE is consumed by IspF.
      description: IspE supplies CDP-ME 2-phosphate to IspF.
    - source: ispf_me_cpp_formation
      target: ispg_hmbpp_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: ME-CPP produced by IspF is the substrate consumed by IspG.
      description: IspF supplies ME-CPP to IspG.
    - source: ispg_hmbpp_formation
      target: isph_ipp_dmapp_formation
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      chaining_note: HMBPP produced by IspG is the substrate consumed by IspH.
      description: IspG supplies HMBPP to the terminal IspH reaction.
  knowledge_gaps:
    - gap_statement: >-
        Direct biochemical characterization was not yet located for every
        Pseudomonas putida KT2440 enzyme in this seven-step route.
      boundary: >-
        Treat the exact activities as strong curated orthology assignments and
        keep strain-specific regulation, flux control, and electron-partner
        preferences out of the reusable core until directly supported.
      gap_kind:
        - BIOLOGY
        - CURATION
