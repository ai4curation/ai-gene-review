id: MODULE:protease_activation_cascade
title: Generic zymogen protease-activation cascade motif
description: >-
  The minimal, reusable proteolytic-activation motif: an active protease cleaves
  an inactive zymogen at a specific site, converting it into the next active
  protease, which in turn activates the following zymogen (and acts on effector
  substrates). Iterating this step builds the self-amplifying proteolytic
  cascades of the caspase apoptosis pathway, the complement system, and the
  coagulation cascade. The motif is gene-free and taxon-neutral: it fixes only
  the protease and zymogen-substrate roles and the cleavage-activates-the-next
  topology. Concrete cascades embed it through `conforms_to`, substituting their
  own protease family and zymogen substrates. Grounded in GO:0031638 (zymogen
  activation).
status: DRAFT
evidence:
  - source_id: GO:0031638
    title: zymogen activation
    statement: >-
      The motif is grounded in zymogen activation: the proteolytic conversion of
      an inactive protease precursor into its catalytically active form.
  - source_id: GO:0008233
    title: peptidase activity
    statement: The acting role in each step is a peptidase that cleaves the downstream zymogen.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: protease_activation_cascade}]` when an active
  protease proteolytically activates a downstream zymogen. The protease class
  (serine, cysteine/caspase, metallo-) is realization-specific.
module:
  id: protease_activation_cascade
  label: Zymogen protease-activation cascade
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: zymogen activation
      term:
        id: GO:0031638
        label: zymogen activation
      description: Proteolytic conversion of an inactive zymogen into an active protease.
  parts:
    - order: 1
      role: upstream active protease
      node:
        id: initiator_protease
        label: Upstream active protease
        module_type: REACTION
        description: An already-active protease cleaves the downstream zymogen at its activation site.
        annotons:
          - id: initiator_activity
            label: peptidase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: peptidase activity
                term:
                  id: GO:0008233
                  label: peptidase activity
            function:
              preferred_term: peptidase activity
              term:
                id: GO:0008233
                label: peptidase activity
              targets:
                - preferred_term: downstream zymogen
            role_description: Cleaves and activates the downstream zymogen.
    - order: 2
      role: zymogen activation
      node:
        id: zymogen_activation
        label: Zymogen proteolytic activation
        module_type: REACTION
        description: The inactive zymogen is cleaved into its catalytically active form.
        annotons:
          - id: zymogen_node
            label: activated zymogen
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: zymogen activation
                term:
                  id: GO:0031638
                  label: zymogen activation
            role_description: The protease precursor converted to active protease.
    - order: 3
      role: downstream effector protease
      node:
        id: effector_protease
        label: Newly active downstream protease
        module_type: REACTION
        description: >-
          The newly activated protease acts on its effector substrates and/or
          activates the next zymogen, propagating the cascade.
        annotons:
          - id: effector_activity
            label: peptidase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: peptidase activity
                term:
                  id: GO:0008233
                  label: peptidase activity
            function:
              preferred_term: peptidase activity
              term:
                id: GO:0008233
                label: peptidase activity
            role_description: Propagates the cascade and cleaves effector substrates.
  connections:
    - source: initiator_protease
      target: zymogen_activation
      connection_type: CAUSES
      description: The upstream protease cleaves and activates the zymogen.
    - source: zymogen_activation
      target: effector_protease
      connection_type: CAUSES
      description: Activation yields the next active protease.
