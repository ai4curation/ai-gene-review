  notes: >-
    This module should be treated as a transport boundary extracted from the
    ppu02024 umbrella, not as quorum-sensing evidence. PP_3220-PP_3223 are the
    cleaner dipeptide-like importer. The PP_4453-PP_4458 locus has mixed Gsi
    and opine product names and needs substrate-specific genetics or uptake
    assays before propagation of glutathione, peptide, or opine labels across
    every subunit.
