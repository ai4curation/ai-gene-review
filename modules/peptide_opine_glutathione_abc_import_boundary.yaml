                  label: plasma membrane
            role_description: Multi-pass membrane permease inferred to form the importer channel.
          - id: pp3222_dipeptide_import_permease
            label: "PP_3222: dipeptide ABC permease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3222
            function:
              preferred_term: contributes to dipeptide transmembrane transporter activity
              term:
                id: GO:0071916
