id: MODULE:peptide_opine_glutathione_abc_import_boundary
title: Peptide, opine, and glutathione ABC import boundary
description: >-
  Boundary module for the ppu02024-derived PP_3220-PP_3223 and
  PP_4453-PP_4458 ABC import loci in Pseudomonas putida KT2440. PP_3220-PP_3223
  form a predicted dipeptide-like ABC importer. The PP_4453-PP_4458 locus
  contains GsiA/GsiC glutathione-import subunits plus opine-named permease and
  periplasmic binding components, with adjacent opine oxidase genes outside this
  ppu02024 bucket. The module records transport context and substrate ambiguity;
  it is not evidence for direct quorum sensing.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02024
    title: Quorum sensing - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02024 includes these transporter genes as part of a broad umbrella
      map, but the PSEPK primary set does not define a LuxI/LuxR quorum-sensing
      module.
  - source_id: UniProtKB:Q88HY3
    title: PP_3220 ABC-type dipeptide transporter
    statement: >-
      UniProt names PP_3220 as an ABC-type dipeptide transporter and assigns
      EC 7.4.2.9, supporting a dipeptide-like import locus with PP_3221,
      PP_3222, and PP_3223.
  - source_id: UniProtKB:Q88HY0
    title: PP_3223 ABC transporter periplasmic binding protein
    statement: >-
      UniProt records PP_3223 as an ABC transporter periplasmic binding protein
      with peptide/Ni-binding and SBP_5 family domains.
  - source_id: UniProtKB:Q88EK9
    title: GsiA glutathione import ATP-binding protein
    statement: >-
      UniProt names gsiA as a glutathione import ATP-binding protein and assigns
      EC 7.4.2.10, while also carrying a dipeptide-transporter EC transfer.
  - source_id: UniProtKB:Q88EK8
    title: PP_4454 opine ABC transporter permease protein
    statement: >-
      UniProt names PP_4454 as an opine ABC transporter permease, supporting
      opine-like substrate context for part of the local Gsi/opine transporter
      locus.
  - source_id: UniProtKB:Q88EK7
    title: GsiC glutathione ABC transporter permease subunit
    statement: >-
      UniProt names gsiC as a glutathione ABC transporter permease subunit,
      supporting glutathione-import context for the local Gsi/opine transporter
      locus.
  - source_id: UniProtKB:Q88EK4
    title: PP_4458 opine ABC transporter periplasmic binding protein
    statement: >-
      UniProt names PP_4458 as an opine ABC transporter periplasmic binding
      protein and records peptide/Ni-binding and SBP_5 family domains.
