id: MODULE:universal_stress_protein_boundary
title: Universal stress protein boundary
description: Boundary module for the Pseudomonas putida KT2440 Universal Stress Protein A-family split from the stress/detoxification
  functional bucket. The module records USP-family candidates and their supported localization/domain context without forcing
  a shared molecular activity or a specific stress-response process.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_universal_stress_proteins.tsv
  title: PSEPK stress/detoxification universal-stress-protein split
  statement: 'The batch table records eleven PSEPK stress/detoxification genes assigned to the universal-stress-protein split:
    PP_1269, PP_2132, PP_2187, PP_2326, PP_2648, PP_2745, PP_3156, PP_3237, PP_3288, PP_3290, and PP_3294.'
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_partition.tsv
  title: PSEPK stress/detoxification functional-bucket partition
  statement: The stress/detoxification umbrella was partitioned into peroxide/peroxiredoxin, glutathione/thiol, arsenic/copper
    metal resistance, universal-stress-protein, cold/heat-shock, ThiJ/DJ-1/PfpI, and miscellaneous stress-regulatory splits.
