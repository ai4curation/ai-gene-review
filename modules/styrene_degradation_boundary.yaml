id: MODULE:styrene_degradation_boundary
title: Styrene degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00643 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains PP_2932, peaE, and the hmgCBA
  homogentisate-pathway enzymes, but lacks the route-defining styrene
  monooxygenase, styrene oxide isomerase, and full phenylacetate lower-pathway
  context needed to claim a complete styrene degradation pathway. The genes are
  curated here as phenylacetaldehyde, homogentisate/aromatic-amino-acid, and
  unresolved amidase side contexts.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00643
    title: Styrene degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00643 provides the PSEPK curation batch. Its KT2440 membership is
      limited to phenylacetaldehyde dehydrogenase, hmgABC homogentisate-route
      enzymes, and an unresolved amidase-family candidate, so the module records
      boundary status rather than a complete styrene route.
module:
  id: styrene_degradation_boundary
  label: Styrene degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: phenylacetaldehyde dehydrogenase (NAD+) activity
      term:
        id: GO:0008957
        label: phenylacetaldehyde dehydrogenase (NAD+) activity
      description: Aromatic aldehyde oxidation represented by peaE.
    - preferred_term: homogentisate catabolic process
      term:
        id: GO:1902000
        label: homogentisate catabolic process
      description: HmgABC downstream homogentisate route used in aromatic amino-acid catabolism.
    - preferred_term: homogentisate 1,2-dioxygenase activity
      term:
        id: GO:0004411
        label: homogentisate 1,2-dioxygenase activity
      description: HmgA ring-cleavage step of the homogentisate pathway.
    - preferred_term: maleylacetoacetate isomerase activity
      term:
        id: GO:0016034
        label: maleylacetoacetate isomerase activity
      description: HmgC isomerase step of the homogentisate pathway.
    - preferred_term: fumarylacetoacetase activity
      term:
        id: GO:0004334
        label: fumarylacetoacetase activity
      description: HmgB terminal hydrolase step of the homogentisate pathway.
    - preferred_term: amidase activity
      term:
        id: GO:0004040
        label: amidase activity
      description: Candidate generic amidase-family context for PP_2932 pending substrate evidence.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: PeaE and hmgABC are soluble aromatic-catabolic enzymes.
  parts:
    - order: 1
      role: Styrene upper-route absence
      node:
        id: styrene_upper_route_absence
        label: Styrene upper-route absence
        module_type: METABOLIC_PATHWAY
        description: >-
          A complete bacterial styrene route normally requires styrene
          monooxygenase and styrene oxide isomerase steps before
          phenylacetaldehyde oxidation, followed by phenylacetate catabolism.
          The ppu00643 membership does not contain a styrene monooxygenase or
          styrene oxide isomerase candidate, so the pathway should not be marked
          satisfiable in KT2440 from this batch alone.
        annotons: []
    - order: 2
      role: Phenylacetaldehyde oxidation side context
      node:
        id: phenylacetaldehyde_oxidation_side_context
        label: Phenylacetaldehyde oxidation side context
        module_type: REACTION
        description: >-
          peaE is the only ppu00643 member that directly matches a styrene-route
          intermediate, oxidizing phenylacetaldehyde to phenylacetate-like
          aromatic acid context. Its physiological route in KT2440 remains a
          broader aromatic-side-chain aldehyde question.
        annotons:
          - id: peaE_phenylacetaldehyde_dehydrogenase
            label: "peaE: phenylacetaldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: peaE
            function:
              preferred_term: phenylacetaldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0008957
                label: phenylacetaldehyde dehydrogenase (NAD+) activity
            role_description: NAD-dependent phenylacetaldehyde dehydrogenase side node.
    - order: 3
      role: Homogentisate and aromatic-amino-acid side route
      node:
        id: hmgABC_homogentisate_side_route
        label: HmgABC homogentisate side route
        module_type: METABOLIC_PATHWAY
        description: >-
          hmgA, hmgC, and hmgB form the known Pseudomonas homogentisate pathway
          for L-phenylalanine, L-tyrosine, and 3-hydroxyphenylacetate
          degradation. Their inclusion in ppu00643 is boundary overlap rather
          than evidence for styrene upper-route capacity.
        annotons:
          - id: hmgA_homogentisate_dioxygenase
            label: "hmgA: homogentisate 1,2-dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgA
            function:
              preferred_term: homogentisate 1,2-dioxygenase activity
              term:
                id: GO:0004411
                label: homogentisate 1,2-dioxygenase activity
            role_description: Ring-cleavage step in homogentisate catabolism.
          - id: hmgC_maleylacetoacetate_isomerase
            label: "hmgC: maleylacetoacetate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgC
            function:
              preferred_term: maleylacetoacetate isomerase activity
              term:
                id: GO:0016034
                label: maleylacetoacetate isomerase activity
            role_description: Isomerase step from maleylacetoacetate to fumarylacetoacetate.
          - id: hmgB_fumarylacetoacetase
            label: "hmgB: fumarylacetoacetase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgB
            function:
              preferred_term: fumarylacetoacetase activity
              term:
                id: GO:0004334
                label: fumarylacetoacetase activity
            role_description: Hydrolyzes fumarylacetoacetate to fumarate and acetoacetate.
    - order: 4
      role: Unresolved amidase-family side context
      node:
        id: PP_2932_unresolved_amidase_side_context
        label: PP_2932 unresolved amidase-family side context
        module_type: REACTION
        description: >-
          PP_2932 is an amidase signature-domain protein with no current GOA
          annotations and no resolved substrate in the first-pass review. It is
          retained as an unresolved KEGG side candidate, not as a styrene-route
          defining enzyme.
        annotons:
          - id: PP_2932_amidase_family_candidate
            label: "PP_2932: amidase-family candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2932
            function:
              preferred_term: amidase activity
              term:
                id: GO:0004040
                label: amidase activity
            role_description: Candidate amidase-family function; substrate and pathway placement unresolved.
  notes: >-
    This module intentionally records boundary/absence status. The batch lacks
    route-defining styrene oxidation/isomerization genes, while PeaE, hmgABC,
    and PP_2932 already have more natural homes in aromatic aldehyde,
    homogentisate/aromatic-amino-acid, or unresolved amidase curation contexts.
