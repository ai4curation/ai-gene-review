id: MODULE:efferocytosis_boundary
title: Efferocytosis boundary
description: >-
  Boundary/absence module for KEGG ppu04148 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only speC/PP_0864, an ornithine
  decarboxylase in putrescine/polyamine biosynthesis, and petA/PP_1317, the
  Rieske iron-sulfur subunit of respiratory complex III. This should not be
  interpreted as evidence for eukaryotic apoptotic-cell clearance or
  efferocytosis in a bacterium.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04148
    title: Efferocytosis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04148 provides the PSEPK curation batch, but the organism-specific
      membership is limited to speC/PP_0864 and petA/PP_1317.
  - source_id: UniProtKB:Q88PI6
    title: Ornithine decarboxylase
    statement: >-
      UniProt describes speC as ornithine decarboxylase, converting L-ornithine
      to putrescine and CO2 in the putrescine biosynthesis branch.
  - source_id: UniProtKB:Q88N95
    title: Ubiquinol-cytochrome c reductase iron-sulfur subunit
    statement: >-
      UniProt describes petA as the Rieske iron-sulfur subunit of the
      ubiquinol-cytochrome c reductase/cytochrome bc1 respiratory complex.
  - source_id: file:PSEPK/speC/speC-ai-review.yaml
    title: Curated speC review
    statement: >-
      The first-pass speC review accepts ornithine decarboxylase activity and
      retains polyamine biosynthesis as related context.
  - source_id: file:PSEPK/petA/petA-ai-review.yaml
    title: Curated petA review
    statement: >-
      The first-pass petA review accepts quinol-cytochrome-c reductase activity
      and respiratory electron transport/proton-translocation context.
module:
  id: efferocytosis_boundary
  label: Efferocytosis boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: efferocytosis pathway absence
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 is a
        bacterium and ppu04148 contains only polyamine and respiratory-chain side
        nodes, so eukaryotic apoptotic-cell clearance is not satisfiable.
    - preferred_term: ornithine decarboxylase activity
      term:
        id: GO:0004586
        label: ornithine decarboxylase activity
      description: Native molecular function of speC.
    - preferred_term: putrescine biosynthetic process from arginine, via ornithine
      term:
        id: GO:0033387
        label: putrescine biosynthetic process from arginine, via ornithine
      description: Native polyamine-biosynthesis context for speC.
    - preferred_term: quinol-cytochrome-c reductase activity
      term:
        id: GO:0008121
        label: quinol-cytochrome-c reductase activity
      description: Native respiratory-chain activity to which petA contributes.
    - preferred_term: respiratory chain complex III
      term:
        id: GO:0045275
        label: respiratory chain complex III
      description: Complex context for petA.
  parts:
    - order: 1
      role: Efferocytosis pathway absence
      node:
        id: efferocytosis_absence
        label: Efferocytosis absence in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 does not encode a eukaryotic efferocytosis pathway.
          The KEGG bucket is treated as a cross-map artifact with two unrelated
          bacterial side nodes.
        annotons: []
    - order: 2
      role: Polyamine biosynthesis side node
      node:
        id: speC_putrescine_biosynthesis
        label: speC ornithine decarboxylase side node
        module_type: REACTION
        description: >-
          speC produces putrescine from L-ornithine and belongs with
          arginine/proline and polyamine metabolism, not with efferocytosis.
        annotons:
          - id: speC_ornithine_decarboxylase
            label: "speC: ornithine decarboxylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: speC
            function:
              preferred_term: ornithine decarboxylase activity
              term:
                id: GO:0004586
                label: ornithine decarboxylase activity
              substrates:
                - preferred_term: L-ornithine
                - preferred_term: proton
              products:
                - preferred_term: putrescine
                - preferred_term: carbon dioxide
              cofactors:
                - preferred_term: pyridoxal 5'-phosphate
            processes:
              - preferred_term: putrescine biosynthetic process from arginine, via ornithine
                term:
                  id: GO:0033387
                  label: putrescine biosynthetic process from arginine, via ornithine
            role_description: Putrescine/polyamine biosynthesis side node; boundary-only for the efferocytosis KEGG map.
    - order: 3
      role: Respiratory complex III side node
      node:
        id: petA_complex_iii_respiration
        label: petA cytochrome bc1 side node
        module_type: PROTEIN_COMPLEX
        description: >-
          petA is the Rieske iron-sulfur subunit of the cytochrome bc1
          respiratory complex and belongs with oxidative phosphorylation, not
          with efferocytosis.
        annotons:
          - id: petA_quinol_cytochrome_c_reductase
            label: "petA: respiratory complex III Rieske subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: petA
            function:
              preferred_term: quinol-cytochrome-c reductase activity
              term:
                id: GO:0008121
                label: quinol-cytochrome-c reductase activity
              cofactors:
                - preferred_term: 2Fe-2S cluster
            processes:
              - preferred_term: respiratory electron transport chain
                term:
                  id: GO:0022904
                  label: respiratory electron transport chain
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Respiratory complex III side node; boundary-only for the efferocytosis KEGG map.
  notes: >-
    This module records an explicit boundary/absence call. The ppu04148 member
    functions are already covered by arginine/proline/polyamine metabolism
    (speC) and oxidative phosphorylation/respiratory complex III (petA), so no
    efferocytosis GO annotation is proposed for either bacterial gene.
