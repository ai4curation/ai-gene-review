    - preferred_term: ABC-type D-methionine transporter activity
      term:
        id: GO:0033232
        label: ABC-type D-methionine transporter activity
      description: ATP-driven D-methionine transporter activity assigned to MetN1 and contributed to by MetQ/MetI.
    - preferred_term: ATP-binding cassette (ABC) transporter complex
      term:
        id: GO:0043190
        label: ATP-binding cassette (ABC) transporter complex
      description: Multi-component ABC importer represented by the PP_0112-PP_0114 and PP_0219-PP_0221 MetNIQ-like loci.
