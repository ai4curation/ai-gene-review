id: MODULE:methionine_import_boundary
title: Methionine import boundary
description: >-
  Boundary module for two MetNIQ-like methionine ABC importer candidates from
  the KEGG ppu02010 ABC transporter umbrella map in Pseudomonas putida KT2440:
  PP_0112-PP_0114 (MetQ/MetI/MetN1) and PP_0219-PP_0221
  (MetP/MetN2/PP_0221). In each partition, a predicted lipoprotein
  substrate-binding component is paired with an inner-membrane permease and a
  reviewed ATP-binding energy-coupling subunit. The available GOA/UniProt
  evidence supports D-methionine/L-methionine-capable MetNIQ importers, while
  the physiological substrate range and enantiomer preference in KT2440 remain
  unresolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_0112-PP_0114 MetQ/MetI/MetN1 and
      PP_0219-PP_0221 MetP/MetN2/PP_0221 methionine ABC transporter
      sub-batches. These are coherent transport partitions of the broad ABC
      transporter map, not evidence that ppu02010 is one satisfiable pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records the C02 PP_0112-PP_0114
      methionine-import half of the mixed methionine/zinc neighborhood and the
      C06 PP_0219-PP_0221 MetNIQ-like methionine-import sub-batch after
      first-pass curation.
  - source_id: UniProtKB:Q88RL7
    title: MetQ methionine ABC transporter periplasmic binding protein
    statement: >-
      UniProt names MetQ as a methionine ABC transporter periplasmic binding
      protein and records MetQ/NlpA-family lipoprotein features.
  - source_id: UniProtKB:Q88RL6
    title: MetI methionine ABC transporter permease protein
    statement: >-
      UniProt names MetI as a methionine ABC transporter permease protein and
      predicts a multi-pass cell-membrane protein with MetI-like domains.
  - source_id: UniProtKB:Q88RL5
    title: MetN1 methionine import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes MetN1 as part of the MetNIQ
      ABC transporter complex involved in methionine import and records
      ATP-driven L-methionine and D-methionine import reactions.
  - source_id: UniProtKB:Q88RB4
    title: MetP L,D-methionine ABC transporter permease subunit
    statement: >-
      UniProt names MetP as an L,D-methionine/D-methionine ABC transporter
      permease subunit and predicts a multi-pass cell-membrane protein with a
      MetI-related PANTHER assignment.
  - source_id: UniProtKB:Q88RB3
    title: MetN2 methionine import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes MetN2 as part of the MetNIQ
      ABC transporter complex involved in methionine import and records
      ATP-driven L-methionine and D-methionine import reactions.
  - source_id: UniProtKB:Q88RB2
    title: PP_0221 MetQ-like methionine ABC transporter lipoprotein
    statement: >-
      UniProt names PP_0221 as a methionine ABC transporter
      periplasmic-binding lipoprotein and assigns it to the NlpA lipoprotein
      family.
