notes: >-
  This boundary module was created from ppu02010 transporter sub-batches, first
  from the mixed C02 PP_0112-PP_0120 neighborhood and then from the C06
  PP_0219-PP_0221 MetNIQ-like neighborhood. It should remain separate from
  methionine_biosynthesis because it represents import rather than de novo
  synthesis. UniProt/HAMAP records both L-methionine and D-methionine transport
  reactions for MetN1 and MetN2, but current GOA supplies
  D-methionine-specific terms; the in vivo substrate preference in KT2440
  remains a knowledge gap.
