id: MODULE:phosphorylase_kinase_complex
title: Phosphorylase kinase complex (activates glycogenolysis) — GSD IX
description: >-
  Phosphorylase kinase (PhK) is the large (~1.3 MDa) hexadecameric (alpha-beta-gamma-delta)4
  holoenzyme that switches on glycogen breakdown by phosphorylating glycogen
  phosphorylase on Ser14, converting the low-activity phosphorylase b to the active
  phosphorylase a. It is the key node coupling hormonal and neural/contractile signals
  to glycogenolysis: the catalytic gamma subunit (muscle PHKG1 / liver-testis PHKG2)
  is a Ca2+/calmodulin-regulated Ser/Thr protein kinase held in an autoinhibited state
  by the large regulatory alpha (muscle PHKA1 / liver PHKA2) and beta (PHKB) subunits;
  phosphorylation of the alpha and beta subunits by cAMP-dependent protein kinase (PKA,
  downstream of adrenaline/glucagon) and Ca2+ binding to the delta subunit (calmodulin,
  which reports muscle contraction) relieve this inhibition and activate the complex.
  The activated PhK then phosphorylates glycogen phosphorylase, triggering the
  phosphorolysis step of glycogenolysis. Inherited defects cause glycogen storage
  disease type IX (one of the most common glycogenoses), with tissue-specific subtypes
  reflecting the subunit isoforms: PHKA2 -> GSD IXa (X-linked liver, most common);
  PHKB -> GSD IXb (liver + muscle); PHKG2 -> GSD IXc (liver, more severe, cirrhosis
  risk); PHKA1 -> GSD IXd (X-linked muscle, exercise intolerance).
status: DRAFT
evidence:
  - source_id: GO:0004689
    title: phosphorylase kinase activity
    statement: >-
      The complex carries out phosphorylase kinase activity (GO:0004689), assembled as
      the phosphorylase kinase complex (GO:0005964).
  - source_id: Reactome:R-HSA-71588
    title: glycogen phosphorylase (PYGL) dimer b + 2 ATP => glycogen phosphorylase
    statement: >-
      The activated holoenzyme phosphorylates glycogen phosphorylase b to a in the
      human Reactome reactions R-HSA-71588 (liver PYGL) and R-HSA-71541 (muscle PYGM),
      the activation step upstream of the glycogenolysis module.
  - source_id: file:human/PHKG2/PHKG2-ai-review.yaml
    title: PHKG2 gene review (human)
    statement: >-
      The catalytic gamma subunit (UniProtKB:P15735, GO:0004689) matches the completed
      human PHKG2 review.
  - source_id: file:human/PHKA1/PHKA1-ai-review.yaml
    title: PHKA1 gene review (human)
    statement: >-
      The muscle alpha regulatory subunit (UniProtKB:P46020) matches the completed
      human PHKA1 review.
  - source_id: file:human/PHKA2/PHKA2-ai-review.yaml
    title: PHKA2 gene review (human)
    statement: >-
      The liver alpha regulatory subunit (UniProtKB:P46019) matches the completed
      human PHKA2 review.
  - source_id: file:human/PHKB/PHKB-ai-review.yaml
    title: PHKB gene review (human)
    statement: >-
      The beta regulatory subunit (UniProtKB:Q93100) matches the completed human
      PHKB review.
