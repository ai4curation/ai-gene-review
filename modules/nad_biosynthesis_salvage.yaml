id: MODULE:nad_biosynthesis_salvage
title: NAD+ biosynthesis hub (salvage + Preiss-Handler + de novo convergence); NAMPT/NAPRT + NMNAT1/2/3 + NADSYN1
description: >-
  NAD+ is continuously consumed by sirtuins, PARPs and CD38/NADases, so cells must constantly
  regenerate it through three converging routes that all funnel through the nicotinamide/nicotinate
  mononucleotide adenylyltransferases (NMNATs). In the dominant salvage route, NAMPT (nicotinamide
  phosphoribosyltransferase, the rate-limiting salvage enzyme) recycles the nicotinamide released by
  NAD-consuming enzymes with PRPP into nicotinamide mononucleotide (NMN). In the Preiss-Handler route,
  NAPRT (nicotinate phosphoribosyltransferase) condenses dietary nicotinic acid with PRPP to
  nicotinate mononucleotide (NaMN) — the same intermediate produced de novo from tryptophan by QPRT.
  The three NMNAT isoforms then perform the central adenylyl-transfer step in distinct compartments —
  nuclear NMNAT1, Golgi/cytosolic NMNAT2 (a labile axon-survival factor that keeps SARM1 inactive)
  and mitochondrial NMNAT3 — converting NMN to NAD+ directly and NaMN to nicotinate adenine
  dinucleotide (NaAD, deamido-NAD+). Finally, the glutamine-dependent NAD synthetase NADSYN1 amidates
  NaAD to NAD+, completing both the de novo and Preiss-Handler routes. Defects illustrate the
  pathway's importance: NMNAT1 causes Leber congenital amaurosis, NMNAT2 loss drives axon
  degeneration, and NADSYN1 (with the de novo enzymes HAAO/KYNU) causes a congenital
  NAD-deficiency malformation syndrome; NAMPT and NAPRT are actively pursued cancer-metabolism targets.
status: DRAFT
evidence:
  - source_id: GO:0009435
    title: NAD+ biosynthetic process
    statement: The module carries out NAD+ biosynthesis (GO:0009435) via the converging salvage/Preiss-Handler/de novo routes.
  - source_id: GO:0034355
    title: NAD+ biosynthetic process via the salvage pathway
    statement: NAMPT and the NMNATs mediate NAD+ biosynthesis via the salvage pathway (GO:0034355).
  - source_id: file:human/NAMPT/NAMPT-ai-review.yaml
    title: NAMPT gene review (human)
    statement: The rate-limiting salvage step (UniProtKB:P43490, GO:0047280) matches the completed human NAMPT review.
  - source_id: file:human/NAPRT/NAPRT-ai-review.yaml
    title: NAPRT gene review (human)
    statement: The Preiss-Handler entry step (UniProtKB:Q6XQN6, GO:0004516) matches the completed human NAPRT review.
  - source_id: file:human/NMNAT1/NMNAT1-ai-review.yaml
    title: NMNAT1 gene review (human)
    statement: The nuclear adenylyltransferase step (UniProtKB:Q9HAN9, GO:0000309/GO:0004515) matches the completed human NMNAT1 review.
  - source_id: file:human/NMNAT2/NMNAT2-ai-review.yaml
    title: NMNAT2 gene review (human)
    statement: The Golgi/cytosolic adenylyltransferase step (UniProtKB:Q9BZQ4, GO:0000309) matches the completed human NMNAT2 review.
  - source_id: file:human/NMNAT3/NMNAT3-ai-review.yaml
    title: NMNAT3 gene review (human)
    statement: The mitochondrial adenylyltransferase step (UniProtKB:Q96T66, GO:0000309) matches the completed human NMNAT3 review.
  - source_id: file:human/NADSYN1/NADSYN1-ai-review.yaml
    title: NADSYN1 gene review (human)
    statement: The NaAD->NAD+ amidation completion step (UniProtKB:Q6IA69, GO:0003952) matches the completed human NADSYN1 review.
module:
  id: nad_biosynthesis_salvage
  label: NAD+ biosynthesis hub (salvage/Preiss-Handler/de novo convergence)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: NAD+ biosynthetic process
      term:
        id: GO:0009435
        label: NAD+ biosynthetic process
      description: Regeneration/synthesis of NAD+ from nicotinamide, nicotinate and de novo NaMN.
    - preferred_term: NAD+ biosynthetic process via the salvage pathway
      term:
        id: GO:0034355
        label: NAD+ biosynthetic process via the salvage pathway
      description: Recycling of nicotinamide to NMN and NAD+.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: NAMPT, NAPRT and NADSYN1 (and NMNAT2) act in the cytosol.
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
        description: NMNAT1 supplies the nuclear NAD+ pool.
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: NMNAT3 supplies the mitochondrial NAD+ pool.
  parts:
    - order: 1
      role: precursor activation to NMN / NaMN
