                  statement: mitochondrial-matrix isoform; adenylylates NMN->NAD+ / NaMN->NaAD (GO:0004515), supplying the mitochondrial NAD+ pool
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Mitochondrial NMN/NaMN adenylyltransferase.
    - order: 3
      role: amidation completion (NaAD -> NAD+)
      node:
        id: nad_amidation
        label: NAD+ synthetase completion (NADSYN1)
