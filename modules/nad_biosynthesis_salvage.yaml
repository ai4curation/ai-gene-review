                  statement: rate-limiting salvage enzyme; recycles nicotinamide (from NAD-consuming enzymes) to NMN; also a secreted adipocytokine (eNAMPT/visfatin, non-core)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
