  module_type: METABOLIC_PATHWAY
  concepts:
  - preferred_term: NAD+ biosynthetic process
    term:
      id: GO:0009435
      label: NAD+ biosynthetic process
    description: Production of NAD+ through the scoped L-aspartate and salvage routes represented here.
  knowledge_gaps:
  - gap_statement: >-
      In Pseudomonas putida KT2440, the molecular activity, substrate
      specificity, and physiological role of the second compact
      CinA-C/PncC-family protein PP_3298/Q88HQ5 remain unknown.
    boundary: >-
      Q88HQ5 carries IPR008136, PF02464, and TIGR00199, but lacks a catalytic
      protein name, EC assignment, GO molecular function, or target-specific
      assay. It is therefore tracked as a domain-based hole-fill adjacent to
      NMN salvage, not added to the PncC catalytic annoton, its representative
      members, or the constructive pathway core.
    gap_kind:
    - BIOLOGY
    - CURATION
    dark_aspect: MF_DARK
    status: OPEN
    significance: >-
      Resolving this paralog would distinguish redundant NMN salvage from a
      different CinA-family specificity or an inactive family member without
      weakening the reusable pathway boundary.
    resolution: >-
      Compare purified Q88HQ5 and Q88ME5 across NMN and alternative substrates,
      verify products, and phenotype single and double mutants with targeted
      NMN, NaMN, and NAD+ metabolomics.
    provenance:
    - reference_id: file:PSEPK/PP_3298/PP_3298-uniprot.txt
      supporting_text: "SubName: Full=CinA domain protein"
      reference_section_type: RESULTS
    - reference_id: PMID:21953451
      supporting_text: >-
        The PncC family also comprises a few members with a nonfunctional PncC
        domain, bearing multiple mutations and deletions.
      reference_section_type: DISCUSSION
