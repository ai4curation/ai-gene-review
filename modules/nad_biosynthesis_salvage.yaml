            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Amidates NaAD to NAD+ (final completion step).
  connections:
    - source: nad_precursor_entry
      target: nmnat_hub
      connection_type: PROVIDES_INPUT_FOR
      description: NAMPT-derived NMN and NAPRT-derived NaMN (and de novo NaMN from QPRT) are adenylylated by the NMNAT isoforms to NAD+ or NaAD.
    - source: nmnat_hub
      target: nad_amidation
      connection_type: PROVIDES_INPUT_FOR
      description: The NaAD produced from NaMN by the NMNATs is amidated to NAD+ by NADSYN1, completing the de novo/Preiss-Handler routes.
  notes: >-
    The NAD+ biosynthesis hub (GO:0009435; salvage GO:0034355) where the salvage, Preiss-Handler and
    de novo (kynurenine) routes converge, grounded to the completed human gene reviews: NAMPT (P43490,
    GO:0047280, rate-limiting salvage; eNAMPT/visfatin cytokine role non-core), NAPRT (Q6XQN6,
    GO:0004516, Preiss-Handler), the three NMNAT isoforms NMNAT1 (Q9HAN9, nuclear), NMNAT2 (Q9BZQ4,
    Golgi/cytosolic, axon-survival), NMNAT3 (Q96T66, mitochondrial) — all GO:0000309 + GO:0004515
    (they share PANTHER PTHR12039) — and NADSYN1 (Q6IA69, GO:0003952 + glutaminase GO:0004359,
    completion). NaMN from the de novo kynurenine pathway (QPRT, in kynurenine_nad_de_novo) enters at
    the NMNAT hub, tying the two modules together. GO term ids/labels verified against the local go.db.
    NAD+ is consumed by sirtuins/PARPs/CD38 and regenerated here. Disorders: NMNAT1 — Leber congenital
    amaurosis 9; NMNAT2 — polyneuropathy / axon degeneration; NADSYN1 — congenital NAD deficiency
    (VCRL3, with HAAO/KYNU); NAMPT/NAPRT — cancer-metabolism drug targets.
