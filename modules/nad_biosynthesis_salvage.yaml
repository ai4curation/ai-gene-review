id: MODULE:nad_biosynthesis_salvage
title: L-aspartate de novo and selected salvage routes to NAD+
description: >-
  A reusable, scope-limited route set for organisms that use the L-aspartate
  de novo pathway and/or selected nicotinate, nicotinamide, and NMN salvage
  alternatives. Every realization is end-to-end: NaMN made by L-aspartate de
  novo synthesis, PncB, or PncC must pass through deamido-NAD to NAD+, whereas
  NMN made by NAMPT must be adenylylated directly to NAD+. Alternative
  adenylyltransferase families and NAD synthetase nitrogen donors are modeled
  as variants. This is not a universal NAD+ biosynthesis hub: de novo synthesis
  through L-tryptophan and the kynurenine pathway is owned by the existing
  MODULE:kynurenine_nad_de_novo module and is not duplicated here. Nicotinate
  degradation, pyridine-nucleotide transhydrogenases, NAD kinase and NADP
  formation, NAD-consuming reactions, and unrelated aldehyde metabolism are
  outside the boundary.
status: DRAFT
references:
- id: PMID:21953451
  title: Identification of nicotinamide mononucleotide deamidase of the bacterial pyridine
    nucleotide cycle reveals a novel broadly conserved amidohydrolase family.
- id: file:PSEPK/PP_3298/PP_3298-uniprot.txt
  title: UniProtKB entry Q88HQ5 for Pseudomonas putida KT2440 PP_3298
evidence:
- source_id: file:modules/nad_biosynthesis_salvage-deep-research-openscientist.md
  title: OpenScientist module research for L-aspartate de novo and selected NAD+ salvage
  statement: >-
    Provider research supplies literature-triage context for the reaction
    chemistry, NaMN/NMN distinction, enzyme-family alternatives, and nitrogen
    donors. Route validity and requiredness are defined by the curated complete
    realizations in this YAML rather than by provider narrative.
- source_id:
    file:projects/P_PUTIDA/deep-research/PSEPK__nad_biosynthesis_salvage__ppu00760-deep-research-openscientist.md
  title: OpenScientist PSEPK ppu00760 NAD+ biosynthesis and salvage research
  statement: >-
    Provider research supplies taxon-specific literature-triage context for
    the seven supported KT2440 catalytic genes, the canonical PncA/NadV gap,
    and the unresolved PP_3298 CinA-C/PncC-family paralog. Curated assignments
    remain grounded in the fetched target records and verified identifiers.
- source_id: file:modules/kynurenine_nad_de_novo.yaml
  title: Existing kynurenine de novo NAD+ biosynthesis module
  statement: >-
    De novo NAD+ synthesis from L-tryptophan through the kynurenine pathway is
    modeled separately in MODULE:kynurenine_nad_de_novo. This route set does
    not duplicate that module or imply that L-aspartate is universal.
- source_id: GO:0009435
  title: NAD+ biosynthetic process
  statement: >-
    The route set comprises scoped alternatives that produce NAD+ de novo or from salvageable
    pyridine precursors.
- source_id: GO:0034628
  title: "'de novo' NAD+ biosynthetic process from L-aspartate"
  statement: >-
    The bacterial de novo segment converts L-aspartate to quinolinate and then
    to NaMN.
- source_id: GO:0034355
  title: NAD+ biosynthetic process via the salvage pathway
  statement: >-
    The salvage segment recycles nicotinate, nicotinamide, or NMN into an NAD+
    precursor.
- source_id: PMID:21953451
  title: Identification of nicotinamide mononucleotide deamidase of the bacterial pyridine
    nucleotide cycle reveals a novel broadly conserved amidohydrolase family.
  statement: >-
    PncC converts NMN to NaMN, allowing the product to enter the
    Preiss-Handler completion route.
notes: >-
  The root requires one or more complete route classes; no empty realization is
  valid. All NaMN-producing alternatives are connected only to required NaMN
  adenylylation and deamido-NAD amidation, and NAMPT-produced NMN is connected
  only to required direct NMN adenylylation. PncA and PncC remain distinct:
  PncA deamidates nicotinamide to nicotinate, whereas PncC deamidates NMN to
  NaMN. The module deliberately ends at NAD+ and excludes kynurenine-route
  duplication, NADP formation, and NAD+ consumption. The KT2440-specific
  PP_3298 gap below is realization-level curation metadata; it neither changes
  the reusable route logic nor adds an obligatory family.
module:
