id: MODULE:global_biofilm_regulation_boundary
title: Global Gac/Csr/Crp biofilm-regulation boundary
description: Boundary module for the global Gac/Csr/Crp regulatory sub-bucket selected from KEGG ppu02025
  biofilm formation in Pseudomonas putida KT2440. It combines the GacS/GacA phosphorelay, CsrA/RsmA-family
  post-transcriptional regulators, and the CRP-family cAMP-responsive transcription regulator Crp as global
  regulatory context rather than a single linear pathway.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
  title: PSEPK ppu02025 biofilm partition table
  statement: The partition table selects crp, gacS, uvrY/gacA, and three CsrA paralogs as the global Gac/Csr/Crp
    biofilm-regulation bucket.
- source_id: file:PSEPK/crp/crp-ai-review.yaml
  title: Curated crp review
  statement: The crp review supports its global regulatory boundary role.
- source_id: file:PSEPK/gacS/gacS-ai-review.yaml
  title: Curated gacS review
  statement: The gacS review supports its global regulatory boundary role.
- source_id: file:PSEPK/gacA/gacA-ai-review.yaml
  title: Curated gacA review
  statement: The gacA review supports its global regulatory boundary role.
- source_id: file:PSEPK/csrA__Q88M29/csrA__Q88M29-ai-review.yaml
  title: Curated csrA__Q88M29 review
  statement: The csrA__Q88M29 review supports its global regulatory boundary role.
- source_id: file:PSEPK/csrA__Q88G93/csrA__Q88G93-ai-review.yaml
  title: Curated csrA__Q88G93 review
  statement: The csrA__Q88G93 review supports its global regulatory boundary role.
- source_id: file:PSEPK/csrA__Q88EJ0/csrA__Q88EJ0-ai-review.yaml
  title: Curated csrA__Q88EJ0 review
  statement: The csrA__Q88EJ0 review supports its global regulatory boundary role.
notes: The ppu02025 row names the response regulator as uvrY, while the local review folder is gacA with
  uvrY as an alias. The three CsrA/RsmA-family paralogs are retained as distinct accession-scoped review
  folders because all three use csrA as the UniProt gene name.
