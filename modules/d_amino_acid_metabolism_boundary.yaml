id: MODULE:d_amino_acid_metabolism_boundary
title: D-amino acid metabolism boundary
description: >-
  Broad boundary module for KEGG ppu00470 in Pseudomonas putida KT2440. The
  membership combines peptidoglycan D-glutamate and D-alanine chemistry,
  D-amino-acid dehydrogenases/racemases, hydroxyproline catabolism, diaminopimelate/lysine
  biosynthesis side nodes, and asparaginase context. This module keeps those
  supported activities separated rather than treating every member as one
  committed D-amino-acid catabolic route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00470
    title: D-amino acid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00470 provides the PSEPK curation batch. Its membership spans
      peptidoglycan precursor enzymes, D-amino-acid racemases/dehydrogenases,
      hydroxyproline catabolism, lysine biosynthesis, and asparaginase nodes.
module:
  id: d_amino_acid_metabolism_boundary
  label: D-amino acid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: D-amino acid metabolism boundary
      description: >-
        Boundary interpretation for a KEGG map that combines several distinct
        D-amino-acid-associated metabolic contexts.
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: Bacterial cell-wall precursor assembly using D-glutamate and D-alanine.
    - preferred_term: D-amino-acid dehydrogenase activity
      term:
        id: GO:0008718
        label: D-amino-acid dehydrogenase activity
      description: Oxidative deamination of D-amino acids.
    - preferred_term: 4-hydroxyproline epimerase activity
      term:
        id: GO:0047580
        label: 4-hydroxyproline epimerase activity
      description: Interconversion of trans-4-hydroxy-L-proline and cis-4-hydroxy-D-proline.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most ppu00470 enzymes are soluble cytoplasmic enzymes; some D-amino-acid dehydrogenases have membrane-context annotations.
  parts:
    - order: 1
      role: Peptidoglycan D-amino-acid precursor assembly
      node:
        id: peptidoglycan_d_amino_acid_assembly
        label: D-Glu and D-Ala precursor chemistry for peptidoglycan
        module_type: METABOLIC_PATHWAY
        description: >-
          MurI supplies D-glutamate, MurD ligates D-glutamate to the UDP-MurNAc
          peptide precursor, and DdlA/DdlB synthesize D-Ala-D-Ala. Alr and DadX
          provide alanine racemase activities feeding D-alanine supply.
        annotons:
          - id: murI_glutamate_racemase
            label: "murI: glutamate racemase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murI
            function:
              preferred_term: glutamate racemase activity
              term:
                id: GO:0008881
                label: glutamate racemase activity
            role_description: Supplies D-glutamate for peptidoglycan biosynthesis.
          - id: murD_d_glutamate_ligase
            label: "murD: UDP-N-acetylmuramoylalanine-D-glutamate ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murD
            function:
              preferred_term: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
              term:
                id: GO:0008764
                label: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
            role_description: Incorporates D-glutamate into the peptidoglycan stem precursor.
          - id: ddlA_d_ala_d_ala_ligase
            label: "ddlA: D-alanine-D-alanine ligase A"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlA
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            role_description: Produces D-Ala-D-Ala for peptidoglycan biosynthesis.
          - id: ddlB_d_ala_d_ala_ligase
            label: "ddlB: D-alanine-D-alanine ligase B"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlB
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            role_description: Produces D-Ala-D-Ala for peptidoglycan biosynthesis.
          - id: dadX_alanine_racemase
            label: "dadX: catabolic alanine racemase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dadX
            function:
              preferred_term: alanine racemase activity
              term:
                id: GO:0008784
                label: alanine racemase activity
            role_description: D-alanine supply/catabolic racemase context.
          - id: alr_broad_amino_acid_racemase
            label: "alr: broad specificity amino-acid racemase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: alr
            function:
              preferred_term: alanine racemase activity
              term:
                id: GO:0008784
                label: alanine racemase activity
            role_description: Broad amino-acid racemase with D-amino-acid supply context.
    - order: 2
      role: D-amino-acid dehydrogenase and catabolism context
      node:
        id: d_amino_acid_dehydrogenase_context
        label: D-amino-acid oxidative deamination
        module_type: METABOLIC_PATHWAY
        description: >-
          DadA1, DadA2, PP_4311, and DauA are FAD-dependent D-amino-acid or
          D-arginine dehydrogenase-family proteins.
        annotons:
          - id: dadA1_d_amino_acid_dehydrogenase
            label: "dadA1: D-amino acid dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dadA1
            function:
              preferred_term: D-amino-acid dehydrogenase activity
              term:
                id: GO:0008718
                label: D-amino-acid dehydrogenase activity
            role_description: D-amino-acid oxidative deamination context.
          - id: dadA2_d_amino_acid_dehydrogenase
            label: "dadA2: D-amino acid dehydrogenase"
            participant:
              selector_type: GENE
              gene:
