    - order: 4
      role: Diaminopimelate/lysine biosynthesis and asparaginase side context
      node:
        id: lysine_asparaginase_side_context
        label: Diaminopimelate, lysine, and asparaginase side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          DapF paralogs and LysA paralogs belong primarily to diaminopimelate
