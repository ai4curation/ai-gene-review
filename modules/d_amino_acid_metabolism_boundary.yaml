            role_description: Predicted FAD-dependent D-arginine dehydrogenase side node.
    - order: 3
      role: Hydroxyproline and 2,5-dioxovalerate side route
      node:
        id: hydroxyproline_side_route
        label: Hydroxyproline/D-proline-associated side route
        module_type: METABOLIC_PATHWAY
        description: >-
