  notes: >-
    PSEPK ppu00470 should be treated as a boundary module with several distinct
    D-amino-acid-related contexts. Peptidoglycan D-Glu/D-Ala enzymes, D-amino
    acid dehydrogenases/racemases, hydroxyproline/dioxovalerate nodes, and
    lysine/asparaginase side nodes should not be collapsed into one strict route.
