            role_description: D-amino-acid oxidative deamination context.
          - id: PP_4311_d_amino_acid_dehydrogenase
            label: "PP_4311: D-amino acid dehydrogenase family protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4311
            function:
              preferred_term: D-amino-acid dehydrogenase activity
              term:
                id: GO:0008718
                label: D-amino-acid dehydrogenase activity
            role_description: D-amino-acid dehydrogenase family side node.
          - id: dauA_d_arginine_dehydrogenase
