id: MODULE:glycosphingolipid_lysosomal_degradation
title: Glycosphingolipid / sphingolipid lysosomal degradation to ceramide and sphingosine (the sphingolipidoses); ARSA/GALC/GBA/SMPD1/ASAH1 + GM2A/PSAP
description: >-
  Complex sphingolipids are catabolised in the lysosome by a branched cascade of soluble acid
  hydrolases that strip the head group one residue at a time and converge on ceramide, which is
  finally hydrolysed to sphingosine. Sphingomyelin is cleaved by acid sphingomyelinase (SMPD1)
  directly to ceramide; glucosylceramide is cleaved by acid beta-glucocerebrosidase (GBA);
  galactosylceramide by galactocerebrosidase (GALC); and sulfatide is first desulfated by
  arylsulfatase A (ARSA) to galactosylceramide, which GALC then degrades. Gangliosides feed in
  from above (GM1 via GLB1, GM2 via beta-hexosaminidase A + the GM2-activator, globosides via
  GLA/HEXA-HEXB — reviewed in the ganglioside/GAG modules), ultimately yielding
  glucosylceramide. The convergent final step is acid ceramidase (ASAH1), which hydrolyses
  ceramide to sphingosine and a free fatty acid. Because the substrates are membrane-embedded
  lipids, most of these hydrolases require small non-enzymatic lipid-presenting cofactors: the
  four saposins (A, B, C, D) generated from prosaposin (PSAP) activate GALC, ARSA/GLB1, GBA and
  ASAH1 respectively, and the GM2-activator (GM2A) presents GM2 ganglioside to
  beta-hexosaminidase A. Each hydrolase and cofactor defines a sphingolipidosis: metachromatic
  leukodystrophy (ARSA), Krabbe disease (GALC), Gaucher disease (GBA), Niemann-Pick A/B (SMPD1),
  Farber disease / SMA-PME (ASAH1), the AB-variant GM2 gangliosidosis (GM2A) and combined
  saposin deficiency (PSAP).
status: DRAFT
evidence:
  - source_id: GO:0046479
    title: glycosphingolipid catabolic process
    statement: >-
      The module is grounded in glycosphingolipid catabolic process (GO:0046479); it covers the
      lysosomal degradation of complex sphingolipids to ceramide and sphingosine.
  - source_id: GO:0030149
    title: sphingolipid catabolic process
    statement: The pathway is lysosomal sphingolipid catabolism (GO:0030149) converging on ceramide/sphingosine.
  - source_id: Reactome:R-HSA-1660661
    title: Sphingolipid metabolism
    statement: >-
      Step order and intermediates follow the human Reactome sphingolipid/glycosphingolipid
      degradation reactions R-HSA-1606807 (ARSA), R-HSA-1606564 (GALC), R-HSA-1605591 (GBA),
      R-HSA-9769742 (SMPD1) and R-HSA-1606602 (ASAH1).
  - source_id: file:human/ARSA/ARSA-ai-review.yaml
    title: ARSA gene review (human)
    statement: >-
      The sulfatide desulfation step (UniProtKB:P15289, GO:0004098) matches the completed human ARSA review.
  - source_id: file:human/GALC/GALC-ai-review.yaml
    title: GALC gene review (human)
    statement: >-
      The galactosylceramidase step (UniProtKB:P54803, GO:0004336) matches the completed human GALC review.
  - source_id: file:human/GBA/GBA-ai-review.yaml
    title: GBA gene review (human)
    statement: >-
      The glucosylceramidase step (UniProtKB:P04062, GO:0004348) matches the completed human GBA review.
  - source_id: file:human/SMPD1/SMPD1-ai-review.yaml
    title: SMPD1 gene review (human)
    statement: >-
      The sphingomyelin phosphodiesterase step (UniProtKB:P17405, GO:0004767) matches the completed
      human SMPD1 review.
  - source_id: file:human/ASAH1/ASAH1-ai-review.yaml
    title: ASAH1 gene review (human)
    statement: >-
      The acid ceramidase (ceramide -> sphingosine) step (UniProtKB:Q13510, GO:0017040) matches the
      completed human ASAH1 review.
  - source_id: file:human/GM2A/GM2A-ai-review.yaml
    title: GM2A gene review (human)
    statement: >-
      The GM2-activator lipid-presenting cofactor (UniProtKB:P17900, GO:7770043) matches the completed
      human GM2A review.
  - source_id: file:human/PSAP/PSAP-ai-review.yaml
    title: PSAP gene review (human)
    statement: >-
      The saposin (A-D) activator precursor (UniProtKB:P07602, GO:0030290) matches the completed human PSAP review.
module:
  id: glycosphingolipid_lysosomal_degradation
  label: Glycosphingolipid / sphingolipid lysosomal degradation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycosphingolipid catabolic process
      term:
        id: GO:0046479
        label: glycosphingolipid catabolic process
      description: Lysosomal degradation of complex glycosphingolipids toward ceramide.
    - preferred_term: sphingolipid catabolic process
      term:
        id: GO:0030149
        label: sphingolipid catabolic process
      description: Lysosomal sphingolipid catabolism converging on ceramide and sphingosine.
  context:
    cellular_components:
      - preferred_term: lysosomal lumen
        term:
          id: GO:0043202
          label: lysosomal lumen
        description: All the hydrolases and lipid-activator cofactors act in the lysosomal lumen.
  parts:
    - order: 1
      role: sulfatide desulfation
      node:
        id: arsa_step
        label: sulfatide to galactosylceramide (3-O-desulfation)
        module_type: REACTION
        annotons:
          - id: arsa_activity
            label: "ARSA: arylsulfatase A / cerebroside-3-sulfatase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Sulfatase family (ARSA)
                term:
                  id: PANTHER:PTHR42693
                  label: ARYLSULFATASE A
                representative_members:
                  - preferred_term: ARSA (human)
                    term:
                      id: UniProtKB:P15289
                      label: Arylsulfatase A
            function:
              preferred_term: cerebroside-sulfatase activity
              term:
                id: GO:0004098
                label: cerebroside-sulfatase activity
              substrates:
                - preferred_term: sulfatide (3-O-sulfogalactosylceramide)
              products:
                - preferred_term: galactosylceramide
                - preferred_term: sulfate
              evidence:
                - source_id: EC:3.1.6.8
                  statement: formylglycine-dependent lysosomal sulfatase; removes the 3-O-sulfate from sulfatide (saposin-B-dependent)
                - source_id: Reactome:R-HSA-1606807
                  statement: "ARSA removes sulfate from PSAP(195-273):Sulfatide (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = metachromatic leukodystrophy (MLD).
    - order: 2
      role: galactosylceramide hydrolysis
      node:
        id: galc_step
        label: galactosylceramide to ceramide
        module_type: REACTION
        annotons:
          - id: galc_activity
            label: "GALC: galactosylceramidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycosyl hydrolase 59 family (GALC)
                term:
                  id: PANTHER:PTHR15172
                  label: GALACTOCEREBROSIDASE
                representative_members:
                  - preferred_term: GALC (human)
                    term:
                      id: UniProtKB:P54803
                      label: Galactocerebrosidase
            function:
              preferred_term: galactosylceramidase activity
              term:
                id: GO:0004336
                label: galactosylceramidase activity
              substrates:
                - preferred_term: galactosylceramide (galactocerebroside)
              products:
                - preferred_term: ceramide
                - preferred_term: galactose
              evidence:
                - source_id: EC:3.2.1.46
                  statement: lysosomal galactosylceramidase; hydrolyses galactosylceramide (also psychosine); saposin-A-dependent
                - source_id: Reactome:R-HSA-1606564
                  statement: "GALC hydrolyzes GalCer (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = Krabbe disease (globoid cell leukodystrophy).
    - order: 3
      role: glucosylceramide hydrolysis
      node:
        id: gba_step
        label: glucosylceramide to ceramide
        module_type: REACTION
        annotons:
          - id: gba_activity
            label: "GBA: acid beta-glucocerebrosidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycosyl hydrolase 30 family (GBA)
                term:
                  id: PANTHER:PTHR11069
                  label: GLUCOSYLCERAMIDASE
                representative_members:
                  - preferred_term: GBA (human)
                    term:
                      id: UniProtKB:P04062
                      label: Lysosomal acid glucosylceramidase
