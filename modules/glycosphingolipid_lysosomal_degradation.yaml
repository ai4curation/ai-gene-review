              products:
                - preferred_term: ceramide
                - preferred_term: phosphocholine
              evidence:
                - source_id: EC:3.1.4.12
                  statement: Zn2+-dependent lysosomal acid sphingomyelinase; hydrolyses sphingomyelin to ceramide + phosphocholine
                - source_id: Reactome:R-HSA-9769742
                  statement: "SMPD1 converts sphingomyelin to ceramide (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = Niemann-Pick disease types A and B.
    - order: 5
      role: convergent final step (ceramide to sphingosine)
      node:
        id: asah1_step
        label: ceramide to sphingosine + fatty acid
        module_type: REACTION
        annotons:
          - id: asah1_activity
            label: "ASAH1: acid ceramidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acid ceramidase / N-acylethanolamine-hydrolase family (ASAH1)
                term:
                  id: PANTHER:PTHR28583
                  label: ACID CERAMIDASE
                representative_members:
                  - preferred_term: ASAH1 (human)
                    term:
                      id: UniProtKB:Q13510
                      label: Acid ceramidase
            function:
              preferred_term: N-acylsphingosine amidohydrolase activity
              term:
                id: GO:0017040
                label: N-acylsphingosine amidohydrolase activity
              substrates:
                - preferred_term: ceramide
              products:
                - preferred_term: sphingosine
                - preferred_term: free fatty acid
              evidence:
                - source_id: EC:3.5.1.23
                  statement: lysosomal acid ceramidase; convergent final step hydrolysing ceramide to sphingosine + fatty acid (autoproteolytic alpha/beta subunits; saposin-D-dependent)
                - source_id: Reactome:R-HSA-1606602
                  statement: "ASAH1 hydrolyzes ceramide (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: >-
              Convergent final step of glycosphingolipid degradation. Deficiency = Farber disease /
              SMA-PME.
    - order: 6
      role: lipid-presenting activator cofactors
      node:
        id: activator_step
        label: saposin (A-D) and GM2-activator lipid presentation
        module_type: REACTION
        annotons:
          - id: psap_activity
            label: "PSAP: prosaposin (saposins A-D)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Saposin / prosaposin family (PSAP)
                term:
                  id: PANTHER:PTHR11480
                  label: PROACTIVATOR POLYPEPTIDE / PROSAPOSIN
                representative_members:
                  - preferred_term: PSAP (human)
                    term:
                      id: UniProtKB:P07602
                      label: Prosaposin
            function:
              preferred_term: sphingolipid activator protein activity
              term:
                id: GO:0030290
                label: sphingolipid activator protein activity
              substrates:
                - preferred_term: membrane glycosphingolipids (sulfatide, GalCer, GlcCer, ceramide)
              products:
                - preferred_term: enzyme-accessible lipid substrate (presented to ARSA/GALC/GBA/ASAH1)
              evidence:
                - source_id: Reactome:R-HSA-1606807
                  statement: "ARSA removes sulfate from PSAP(195-273):Sulfatide (human Reactome reaction; saposin B presents sulfatide)"
                - source_id: file:human/PSAP/PSAP-ai-review.yaml
                  statement: precursor of saposins A-D; non-catalytic lipid-transfer cofactors presenting glycosphingolipids to GALC(SapA)/ARSA(SapB)/GBA(SapC)/ASAH1(SapD); combined saposin deficiency
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Non-catalytic saposin cofactors; deficiency phenocopies the cognate enzyme diseases.
          - id: gm2a_activity
            label: "GM2A: GM2 activator protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GM2 activator protein family (GM2A)
                term:
                  id: PANTHER:PTHR17357
                  label: GANGLIOSIDE GM2 ACTIVATOR
                representative_members:
                  - preferred_term: GM2A (human)
                    term:
                      id: UniProtKB:P17900
                      label: Ganglioside GM2 activator
            function:
              preferred_term: lipid chaperone activity
              term:
                id: GO:7770043
                label: lipid chaperone activity
              substrates:
                - preferred_term: GM2 ganglioside
              products:
                - preferred_term: GM2 presented to beta-hexosaminidase A
              evidence:
                - source_id: file:human/GM2A/GM2A-ai-review.yaml
                  statement: non-catalytic lysosomal lipid-transfer cofactor that extracts and presents GM2 ganglioside to beta-hexosaminidase A; deficiency = AB-variant GM2 gangliosidosis
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Non-catalytic GM2-presenting cofactor for beta-hexosaminidase A.
  connections:
    - source: arsa_step
      target: galc_step
      connection_type: PROVIDES_INPUT_FOR
      description: ARSA desulfation of sulfatide yields galactosylceramide, the GALC substrate.
    - source: galc_step
      target: asah1_step
      connection_type: PROVIDES_INPUT_FOR
      description: GALC produces ceramide, hydrolysed by ASAH1 to sphingosine.
    - source: gba_step
      target: asah1_step
      connection_type: PROVIDES_INPUT_FOR
      description: GBA produces ceramide, hydrolysed by ASAH1 to sphingosine.
    - source: smpd1_step
      target: asah1_step
      connection_type: PROVIDES_INPUT_FOR
      description: SMPD1 produces ceramide, hydrolysed by ASAH1 to sphingosine.
    - source: activator_step
      target: gba_step
      connection_type: POSITIVELY_REGULATES
      description: Saposins/GM2-activator present membrane glycosphingolipids to their degrading hydrolases.
  notes: >-
    Lysosomal glycosphingolipid/sphingolipid degradation, grounded to the human enzymes ARSA
    (UniProtKB:P15289, GO:0004098, EC 3.1.6.8), GALC (P54803, GO:0004336, EC 3.2.1.46), GBA
    (P04062, GO:0004348, EC 3.2.1.45), SMPD1 (P17405, GO:0004767, EC 3.1.4.12) and ASAH1 (Q13510,
    GO:0017040, EC 3.5.1.23), plus the non-catalytic lipid-presenting cofactors PSAP (P07602,
    GO:0030290 sphingolipid activator protein activity; precursor of saposins A-D) and GM2A
    (P17900, GO:7770043 lipid chaperone activity; GM2 activator). GO molecular-function/BP/location
    terms were taken from the completed human gene reviews and verified against the local go.db;
    Reactome reaction ids/titles were verified against the local reactome cache. Each step uses a
    PANTHER family selector; the cofactor node groups PSAP and GM2A. The pathway is a convergent
    tree: sphingomyelin (SMPD1), glucosylceramide (GBA) and galactosylceramide (GALC; fed by ARSA
    desulfation of sulfatide) all yield ceramide, which ASAH1 hydrolyses to sphingosine — the exit
    point recycled by the salvage pathway. Gangliosides enter from above via GLB1 (GM1), HEXA/HEXB
    + GM2A (GM2) and GLA (globosides) — reviewed in the ganglioside/GAG modules (GLA/HEXA/HEXB/GLB1
    already on main). Because the substrates are membrane lipids, the hydrolases depend on the
    saposins (SapA->GALC, SapB->ARSA/GLB1, SapC->GBA, SapD->ASAH1) and GM2A (->HexA), modelled here
    as an activator node that positively regulates the hydrolases. Disorders (the sphingolipidoses):
    metachromatic leukodystrophy (ARSA), Krabbe (GALC), Gaucher (GBA), Niemann-Pick A/B (SMPD1),
    Farber / SMA-PME (ASAH1), AB-variant GM2 gangliosidosis (GM2A) and combined saposin deficiency
    (PSAP).
