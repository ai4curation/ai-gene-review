                - source_id: EC:3.2.1.45
                  statement: lysosomal acid glucosylceramidase; hydrolyses glucosylceramide (saposin-C-dependent); GBA variants also confer Parkinson-disease risk
                - source_id: Reactome:R-HSA-1605591
                  statement: "GBA1:SAPC hydrolyzes GlcCer (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = Gaucher disease.
    - order: 4
      role: sphingomyelin hydrolysis
      node:
        id: smpd1_step
        label: sphingomyelin to ceramide
        module_type: REACTION
        annotons:
          - id: smpd1_activity
            label: "SMPD1: acid sphingomyelinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acid sphingomyelinase family (SMPD1)
                term:
                  id: PANTHER:PTHR10340
                  label: SPHINGOMYELIN PHOSPHODIESTERASE
                representative_members:
                  - preferred_term: SMPD1 (human)
                    term:
                      id: UniProtKB:P17405
