id: MODULE:propionyl_coa_catabolism
title: Propionyl-CoA catabolism (propionate to succinyl-CoA via the methylmalonyl-CoA pathway)
description: >-
  The mitochondrial pathway that converts propionyl-CoA to succinyl-CoA, the
  anaplerotic route by which propionate carbon enters the TCA cycle. Propionyl-CoA
  arises from the catabolism of the branched-chain amino acids isoleucine and
  valine, of methionine and threonine, of odd-chain fatty acids, and of the
  cholesterol side chain (and from gut-microbial propionate). Three enzymatic
  steps: (1) the biotin-dependent propionyl-CoA carboxylase (PCC), an alpha6-beta6
  dodecamer of PCCA (biotin-carboxylase / biotin-carboxyl-carrier alpha subunit)
  and PCCB (carboxyltransferase beta subunit), carboxylates propionyl-CoA to
  (2S)-methylmalonyl-CoA (D-methylmalonyl-CoA) using bicarbonate and ATP; (2)
  methylmalonyl-CoA epimerase (MCEE) racemises this to (2R)-methylmalonyl-CoA
  (L-methylmalonyl-CoA); and (3) the adenosylcobalamin (AdoCbl / vitamin B12)-
  dependent methylmalonyl-CoA mutase (MMUT) performs the carbon-skeleton
  rearrangement of L-methylmalonyl-CoA to succinyl-CoA. The mutase step depends on
  a dedicated cobalamin cofactor-supply system: MMAB (cblB) is the ATP:cob(I)alamin
  adenosyltransferase that synthesises AdoCbl, and MMAA (cblA) is a mitochondrial
  G3E-family GTPase that gates AdoCbl loading onto MMUT and protects/reactivates
  the holo-mutase. Inherited defects map cleanly onto the steps: PCCA/PCCB →
  propionic acidemia; MCEE → (usually mild) methylmalonic aciduria; MMUT →
  methylmalonic aciduria (mut type); MMAB → cblB and MMAA → cblA methylmalonic
  aciduria (both often vitamin-B12-responsive because they act on cofactor supply).
status: DRAFT
evidence:
  - source_id: GO:1902859
    title: propionyl-CoA catabolic process
    statement: >-
      The module is grounded in the GO propionyl-CoA catabolic process
      (GO:1902859) leading to succinyl-CoA.
  - source_id: Reactome:R-HSA-71032
    title: Propionyl-CoA catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Propionyl-CoA catabolism" pathway (R-HSA-71032): R-HSA-71031 (PCC),
      R-HSA-71020 (MCEE), R-HSA-71010 (MMUT), with AdoCbl supply by MMAB
      (R-HSA-3159253) and MMAA-gated loading (R-HSA-3159259).
  - source_id: file:human/PCCA/PCCA-ai-review.yaml
    title: PCCA gene review (human)
    statement: >-
      The PCC alpha-subunit grounding (UniProtKB:P05165, GO:0004658 propionyl-CoA
      carboxylase activity) matches the completed human PCCA review.
  - source_id: file:human/PCCB/PCCB-ai-review.yaml
    title: PCCB gene review (human)
    statement: >-
      The PCC beta-subunit grounding (UniProtKB:P05166, GO:0004658) matches the
      completed human PCCB review.
  - source_id: file:human/MCEE/MCEE-ai-review.yaml
    title: MCEE gene review (human)
    statement: >-
      The epimerase step grounding (UniProtKB:Q96PE7, GO:0004493 methylmalonyl-CoA
      epimerase activity) matches the completed human MCEE review.
  - source_id: file:human/MMUT/MMUT-ai-review.yaml
    title: MMUT gene review (human)
    statement: >-
      The mutase step grounding (UniProtKB:P22033, GO:0004494 methylmalonyl-CoA
      mutase activity, GO:0031419 cobalamin binding) matches the completed human
      MMUT review.
  - source_id: file:human/MMAB/MMAB-ai-review.yaml
    title: MMAB gene review (human)
    statement: >-
      The AdoCbl-synthesis step (UniProtKB:Q96EY8, GO:0008817 cob(I)alamin
      adenosyltransferase activity) matches the completed human MMAB review.
  - source_id: file:human/MMAA/MMAA-ai-review.yaml
    title: MMAA gene review (human)
    statement: >-
      The cofactor-loading GTPase chaperone (UniProtKB:Q8IVH4, GO:0003924 GTPase
      activity) matches the completed human MMAA review.
module:
  id: propionyl_coa_catabolism
  label: Propionyl-CoA catabolism (methylmalonyl-CoA pathway)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: propionyl-CoA catabolic process
      term:
        id: GO:1902859
        label: propionyl-CoA catabolic process
      description: Conversion of propionyl-CoA to succinyl-CoA for entry into the TCA cycle.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of all enzymes and cofactor-supply proteins of the pathway.
  parts:
    - order: 1
      role: biotin-dependent carboxylation (committed step)
      node:
        id: pcc_step
        label: propionyl-CoA + HCO3- + ATP to (S)-methylmalonyl-CoA + ADP + Pi
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: pcca_activity
            label: "PCCA: propionyl-CoA carboxylase alpha (biotin carboxylase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biotin-dependent carboxylase alpha/biotin-carboxylase family (PCCA)
                term:
                  id: PANTHER:PTHR18866
                  label: "CARBOXYLASE:PYRUVATE/ACETYL-COA/PROPIONYL-COA CARBOXYLASE"
                representative_members:
                  - preferred_term: PCCA (human)
                    term:
                      id: UniProtKB:P05165
                      label: Propionyl-CoA carboxylase alpha chain, mitochondrial
            function:
              preferred_term: propionyl-CoA carboxylase activity
              term:
                id: GO:0004658
                label: propionyl-CoA carboxylase activity
              substrates:
                - preferred_term: propionyl-CoA
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
                - preferred_term: biotin (covalent cofactor)
              products:
                - preferred_term: (S)-methylmalonyl-CoA
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.4.1.3
                  statement: propionyl-CoA carboxylase; biotin carboxylase + BCCP alpha subunit
                - source_id: Reactome:R-HSA-71031
                  statement: "propionyl-CoA + CO2 + ATP <=> D-methylmalonyl-CoA + ADP + orthophosphate (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Biotin-carrying alpha subunit: ATP-dependently carboxylates its
              covalently-bound biotin using bicarbonate, then the carboxyl group is
              transferred (by PCCB) to propionyl-CoA. PCCA + PCCB assemble as an
              alpha6-beta6 dodecamer. Loss of function causes propionic acidemia.
          - id: pccb_activity
            label: "PCCB: propionyl-CoA carboxylase beta (carboxyltransferase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Propionyl-CoA carboxylase beta / carboxyltransferase family (PCCB)
                term:
                  id: PANTHER:PTHR43842
                  label: PROPIONYL-COA CARBOXYLASE BETA CHAIN
                representative_members:
                  - preferred_term: PCCB (human)
                    term:
                      id: UniProtKB:P05166
                      label: Propionyl-CoA carboxylase beta chain, mitochondrial
            function:
              preferred_term: propionyl-CoA carboxylase activity
              term:
                id: GO:0004658
                label: propionyl-CoA carboxylase activity
              substrates:
                - preferred_term: propionyl-CoA
                - preferred_term: carboxybiotin (from PCCA)
              products:
                - preferred_term: (S)-methylmalonyl-CoA
              evidence:
                - source_id: EC:6.4.1.3
                  statement: propionyl-CoA carboxylase; carboxyltransferase beta subunit
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Carboxyltransferase beta subunit: binds propionyl-CoA and transfers
              the carboxyl group from carboxybiotin to it, producing
              (S)-methylmalonyl-CoA. Loss of function causes propionic acidemia.
    - order: 2
      role: epimerization to the mutase substrate
      node:
        id: mcee_step
        label: (S)-methylmalonyl-CoA to (R)-methylmalonyl-CoA
        module_type: REACTION
        annotons:
          - id: mcee_activity
            label: "MCEE: methylmalonyl-CoA epimerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Methylmalonyl-CoA epimerase / VOC (glyoxalase) superfamily (MCEE)
                term:
                  id: PANTHER:PTHR43048
                  label: METHYLMALONYL-COA EPIMERASE
                representative_members:
                  - preferred_term: MCEE (human)
                    term:
                      id: UniProtKB:Q96PE7
                      label: Methylmalonyl-CoA epimerase, mitochondrial
            function:
              preferred_term: methylmalonyl-CoA epimerase activity
              term:
                id: GO:0004493
                label: methylmalonyl-CoA epimerase activity
              substrates:
                - preferred_term: (S)-methylmalonyl-CoA
              products:
                - preferred_term: (R)-methylmalonyl-CoA
              evidence:
                - source_id: EC:5.1.99.1
                  statement: methylmalonyl-CoA epimerase (racemase)
                - source_id: Reactome:R-HSA-71020
                  statement: "D-methylmalonyl-CoA <=> L-methylmalonyl-CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Racemises the PCC product to the (2R)/L-isomer that methylmalonyl-CoA
              mutase requires. Member of the vicinal-oxygen-chelate (glyoxalase)
              superfamily; deficiency causes a usually mild methylmalonic aciduria.
    - order: 3
      role: AdoCbl-dependent isomerization to succinyl-CoA (terminal step)
      node:
        id: mmut_step
        label: (R)-methylmalonyl-CoA to succinyl-CoA
        module_type: REACTION
        annotons:
          - id: mmut_activity
            label: "MMUT: methylmalonyl-CoA mutase (AdoCbl-dependent)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Methylmalonyl-CoA mutase family (MMUT)
                term:
                  id: PANTHER:PTHR48101
                  label: METHYLMALONYL-COA MUTASE, MITOCHONDRIAL-RELATED
                representative_members:
                  - preferred_term: MMUT (human)
                    term:
                      id: UniProtKB:P22033
                      label: Methylmalonyl-CoA mutase, mitochondrial
            function:
              preferred_term: methylmalonyl-CoA mutase activity
              term:
                id: GO:0004494
                label: methylmalonyl-CoA mutase activity
              substrates:
                - preferred_term: (R)-methylmalonyl-CoA
                - preferred_term: adenosylcobalamin (AdoCbl cofactor)
              products:
                - preferred_term: succinyl-CoA
              evidence:
                - source_id: EC:5.4.99.2
                  statement: methylmalonyl-CoA mutase; adenosylcobalamin-dependent
                - source_id: Reactome:R-HSA-71010
                  statement: "MUT isomerises L-MM-CoA to SUCC-CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Radical (adenosylcobalamin-dependent) carbon-skeleton mutase that
              rearranges L-methylmalonyl-CoA to succinyl-CoA, feeding propionate
              carbon into the TCA cycle. Homodimer; requires AdoCbl supplied and
              maintained by MMAB and MMAA. Deficiency causes mut-type methylmalonic
              aciduria.
    - order: 4
      role: adenosylcobalamin cofactor supply and loading (supports the mutase step)
      node:
        id: adocbl_supply
        label: AdoCbl synthesis (MMAB) and MMAA-gated loading onto the mutase
        module_type: REGULATORY_STEP
        annotons:
          - id: mmab_activity
            label: "MMAB/cblB: ATP:cob(I)alamin adenosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Corrinoid adenosyltransferase family (MMAB)
                term:
                  id: PANTHER:PTHR12213
                  label: CORRINOID ADENOSYLTRANSFERASE
                representative_members:
                  - preferred_term: MMAB (human)
                    term:
                      id: UniProtKB:Q96EY8
                      label: Cob(I)yrinic acid a,c-diamide adenosyltransferase, mitochondrial
            function:
              preferred_term: cob(I)alamin adenosyltransferase activity
              term:
                id: GO:0008817
                label: cob(I)alamin adenosyltransferase activity
              substrates:
                - preferred_term: cob(I)alamin
                - preferred_term: ATP
              products:
                - preferred_term: adenosylcobalamin (AdoCbl)
              evidence:
                - source_id: EC:2.5.1.17
                  statement: cob(I)alamin adenosyltransferase (ATR); synthesizes AdoCbl
                - source_id: Reactome:R-HSA-3159253
                  statement: "MMAB adenosylates cob(I)alamin (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Homotrimeric adenosyltransferase that makes the AdoCbl cofactor
              required by MMUT; deficiency causes cblB methylmalonic aciduria.
          - id: mmaa_activity
            label: "MMAA/cblA: G3E GTPase chaperone for the mutase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: G3E-family (MeaB/ArgK) GTPase metallochaperone (MMAA)
                term:
                  id: PANTHER:PTHR23408
                  label: METHYLMALONYL-COA MUTASE
                representative_members:
                  - preferred_term: MMAA (human)
                    term:
                      id: UniProtKB:Q8IVH4
                      label: Methylmalonic aciduria type A protein, mitochondrial
            function:
              preferred_term: GTPase activity
              term:
                id: GO:0003924
                label: GTPase activity
              evidence:
                - source_id: Reactome:R-HSA-3159259
                  statement: "MMAA:MUT binds AdoCbl (human Reactome reaction) — GTP-dependent cofactor loading"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Not a methylmalonyl-CoA-metabolizing enzyme: a GTP-dependent
              metallochaperone that gates transfer of AdoCbl onto MMUT and
              protects/reactivates the holo-mutase. Deficiency causes cblA
              methylmalonic aciduria (often B12-responsive).
  connections:
    - source: pcc_step
      target: mcee_step
      connection_type: PROVIDES_INPUT_FOR
      description: (S)-methylmalonyl-CoA from PCC is epimerised by MCEE.
    - source: mcee_step
      target: mmut_step
      connection_type: PROVIDES_INPUT_FOR
      description: (R)-methylmalonyl-CoA from MCEE is the substrate of MMUT.
    - source: adocbl_supply
      target: mmut_step
      connection_type: POSITIVELY_REGULATES
      description: >-
        MMAB synthesises AdoCbl and MMAA gates its loading/maintenance on MMUT;
        without this cofactor supply the mutase step cannot proceed (cblA/cblB
        methylmalonic aciduria phenocopy mut-type deficiency).
  notes: >-
    Three-enzyme mitochondrial propionyl-CoA catabolism plus its adenosylcobalamin
    cofactor-supply system, grounded to the human enzymes PCCA (UniProtKB:P05165)
    and PCCB (P05166) of propionyl-CoA carboxylase (GO:0004658, EC 6.4.1.3), MCEE
    (Q96PE7, GO:0004493, EC 5.1.99.1) and MMUT (P22033, GO:0004494, EC 5.4.99.2),
    with cofactor supply by MMAB (Q96EY8, GO:0008817, EC 2.5.1.17) and the GTPase
    chaperone MMAA (Q8IVH4, GO:0003924). GO molecular-function terms were taken
    from the human GOA records; Reactome reaction ids and titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector
    (generic over paralogs and orthologs) plus a concrete human representative
    member. Upstream, propionyl-CoA derives from Ile/Val/Met/Thr, odd-chain fatty
    acids and the cholesterol side chain (see the BCAA catabolism module for the
    Ile/Val source); downstream, succinyl-CoA is anaplerotic for the TCA cycle.
    MMAA is deliberately represented as a cofactor chaperone (GTPase), not as a
    methylmalonyl-CoA-metabolizing enzyme.
