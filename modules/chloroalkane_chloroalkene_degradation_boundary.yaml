id: MODULE:chloroalkane_chloroalkene_degradation_boundary
title: Chloroalkane/chloroalkene degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00625 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains formaldehyde dehydrogenase, class III
  glutathione-dependent formaldehyde dehydrogenase, PQQ-dependent alcohol
  dehydrogenases, and a generic zinc alcohol dehydrogenase. This supports
  alcohol/formaldehyde oxidation and detoxification side context, not a
  complete chloroalkane or chloroalkene degradation route with dehalogenation
  and halogenated-intermediate-specific steps.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00625
    title: Chloroalkane and chloroalkene degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00625 provides the PSEPK curation batch. Its KT2440 membership is
      limited to fdhA, frmA, pedE, pedH, and adhP, which are reviewed as
      formaldehyde or alcohol oxidation enzymes rather than a complete
      chloroalkane/chloroalkene catabolic pathway.
module:
  id: chloroalkane_chloroalkene_degradation_boundary
  label: Chloroalkane/chloroalkene degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: formaldehyde catabolic process
      term:
        id: GO:0046294
        label: formaldehyde catabolic process
      description: Detoxification/oxidation of formaldehyde, represented by fdhA and frmA side nodes.
    - preferred_term: formaldehyde dehydrogenase (NAD+) activity
      term:
        id: GO:0018467
        label: formaldehyde dehydrogenase (NAD+) activity
      description: Non-glutathione NAD-dependent formaldehyde oxidation assigned to fdhA.
    - preferred_term: alcohol dehydrogenase (cytochrome c) activity
      term:
        id: GO:0052934
        label: alcohol dehydrogenase (cytochrome c) activity
      description: PQQ-dependent periplasmic alcohol oxidation represented by PedE/PedH.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Formaldehyde dehydrogenases such as fdhA/frmA are soluble cytosolic detoxification enzymes.
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
        description: PedE/PedH are periplasmic PQQ-dependent alcohol dehydrogenases.
  parts:
    - order: 1
      role: Formaldehyde oxidation and detoxification
      node:
        id: formaldehyde_oxidation_side_context
        label: Formaldehyde oxidation side context
        module_type: METABOLIC_PATHWAY
        description: >-
          fdhA and frmA represent two formaldehyde oxidation/detoxification
          routes: a non-glutathione formaldehyde dehydrogenase and a
          glutathione-dependent S-(hydroxymethyl)glutathione dehydrogenase.
          Their presence in ppu00625 supports detoxification of small aldehydes
          that may arise in xenobiotic maps, but does not by itself establish a
          chloroalkane route.
        annotons:
          - id: fdhA_formaldehyde_dehydrogenase
            label: "fdhA: formaldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fdhA
            function:
              preferred_term: formaldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0018467
                label: formaldehyde dehydrogenase (NAD+) activity
            role_description: Non-glutathione NAD-dependent formaldehyde oxidation.
          - id: frmA_glutathione_dependent_formaldehyde_dehydrogenase
            label: "frmA: S-(hydroxymethyl)glutathione dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: frmA
            function:
              preferred_term: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
              term:
                id: GO:0106322
                label: S-(hydroxymethyl)glutathione dehydrogenase (NAD+) activity
            role_description: Glutathione-dependent formaldehyde detoxification through S-(hydroxymethyl)glutathione.
    - order: 2
      role: Alcohol oxidation side context
      node:
        id: alcohol_dehydrogenase_side_context
        label: Alcohol dehydrogenase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          pedE, pedH, and adhP are alcohol dehydrogenase side nodes shared with
          volatile alcohol, phenylethanol, and broader aldehyde/alcohol
          metabolism. They are not evidence for halogenated-substrate
          specificity without dehalogenase and route-specific upstream steps.
        annotons:
          - id: pedE_pqq_alcohol_dehydrogenase
            label: "pedE: PQQ alcohol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pedE
            function:
              preferred_term: alcohol dehydrogenase (cytochrome c) activity
              term:
                id: GO:0052934
                label: alcohol dehydrogenase (cytochrome c) activity
            role_description: Calcium-dependent PQQ alcohol dehydrogenase side context.
          - id: pedH_pqq_alcohol_dehydrogenase
            label: "pedH: lanthanide-dependent PQQ alcohol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pedH
            function:
              preferred_term: alcohol dehydrogenase (cytochrome c) activity
              term:
                id: GO:0052934
                label: alcohol dehydrogenase (cytochrome c) activity
            role_description: Lanthanide-dependent PQQ alcohol dehydrogenase side context.
          - id: adhP_zinc_alcohol_dehydrogenase
            label: "adhP: zinc alcohol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: adhP
            function:
              preferred_term: alcohol dehydrogenase (NAD+) activity
              term:
                id: GO:0004022
                label: alcohol dehydrogenase (NAD+) activity
            role_description: Cytosolic zinc alcohol dehydrogenase with unresolved physiological substrate.
  notes: >-
    This module intentionally records boundary status. The PSEPK ppu00625
    membership lacks a haloalkane dehalogenase, haloacid dehalogenase, or
    chloroalkene-specific upper route, so the batch should be interpreted as
    formaldehyde/alcohol oxidation context rather than complete
    chloroalkane/chloroalkene degradation.
