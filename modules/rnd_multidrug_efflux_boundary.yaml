id: MODULE:rnd_multidrug_efflux_boundary
title: RND multidrug efflux boundary
description: Boundary module for RND, MFP, OMF, and related efflux/export components in Pseudomonas putida KT2440. It preserves
  the existing PP_2064-PP_2065 RND efflux pair and adds the transport/membrane/efflux split covering Czc metal-efflux loci,
  Mex/Opr and generic RND systems, MFS/Emr/EamA efflux side systems, type-I secretion/TolC-like components, PvdR pyoverdine
  export context, and FieF CDF metal efflux.
status: DRAFT
evidence:
- source_id: KEGG:ppu02024
  title: Quorum sensing - Pseudomonas putida KT2440
  statement: KEGG ppu02024 is an umbrella map in PSEPK that includes transporters, response regulators, efflux proteins, and
    surface-context genes rather than a single LuxI/LuxR quorum-sensing module.
- source_id: file:projects/P_PUTIDA/batches/ppu02024_quorum_sensing_partition.tsv
  title: ppu02024 quorum sensing partition table
  statement: The partition separates PP_2064 and PP_2065 into the RND multidrug efflux bucket with resistance/export context
    rather than quorum sensing.
- source_id: file:PSEPK/PP_2064/PP_2064-ai-review.yaml
  title: Curated PP_2064 review
  statement: The PP_2064 review treats the protein as a membrane-fusion/adaptor component of an efflux pump complex, retaining
    transporter activity only as a contributes-to/complex-level interpretation.
- source_id: file:PSEPK/PP_2065/PP_2065-ai-review.yaml
  title: Curated PP_2065 review
  statement: The PP_2065 review accepts xenobiotic transmembrane transporter activity, xenobiotic transport, and plasma-membrane
    localization for the inner-membrane RND transporter.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_rnd_tripartite_efflux_and_mfp_omf_systems.tsv
  title: PSEPK transport/membrane/efflux RND/MFP/OMF batch
  statement: The partition groups 42 RND, MFP, OMF, MFS/Emr/EamA, Czc, PvdR, FieF, and TolC-like components for component-aware
    efflux/export curation.
notes: 'First-pass interpretation: component terms are intentionally conservative. MFP and OMF proteins are not modeled as
  standalone substrate-translocating transporters; they contribute to pump-level efflux, channel, type-I secretion, or pyoverdine
  export context depending on product/domain evidence.'
