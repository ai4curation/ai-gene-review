id: MODULE:bacterial_50s_ribosomal_subunit_boundary
title: Bacterial 50S ribosomal subunit boundary
description: Boundary module for the KEGG ppu03010 50S ribosomal-protein subset in Pseudomonas putida
  KT2440. This module covers the 33 protein-coding large-subunit participants selected from the organism-specific
  ribosome map; the 30S small-subunit protein module is tracked separately.
status: DRAFT
evidence:
- source_id: KEGG:ppu03010
  title: Ribosome - Pseudomonas putida KT2440
  statement: KEGG ppu03010 provides the organism-specific ribosome protein set that was partitioned into
    30S and 50S curation batches.
- source_id: file:projects/P_PUTIDA/batches/ppu03010_bacterial_ribosome_partition.tsv
  title: ppu03010 bacterial ribosome partition table
  statement: The partition table assigns rpmH, rplK, rplA, rplJ, rplL, rplC, rplD, rplW, rplB, rplV, rplP,
    rpmC, rplN, rplX, rplE, rplF, rplR, rpmD, rplO, rpmJ, rplQ, rplU, rpmA, rplY, rplM, rplS, rpmF, rpmI,
    rplT, rplI, rpmE, rpmG, and rpmB to the bacterial 50S ribosomal subunit bucket.
- source_id: file:projects/P_PUTIDA/curate_ppu03010_50s_ribosomal_subunit_first_pass.py
  title: ppu03010 50S first-pass curation script
  statement: The script applies the light first-pass annotation decisions to all 33 50S ribosomal-protein
    reviews and preserves term-specific GOA evidence.
notes: This is a protein-participant boundary module, not a full biochemical model of bacterial translation.
  The 23S and 5S rRNA molecules, translation factors, and ribosome assembly factors are outside this ppu03010
  protein sub-batch unless they appear in a later curation bucket.
module:
  id: bacterial_50s_ribosomal_subunit_boundary
  label: Bacterial 50S ribosomal subunit boundary
  module_type: CELLULAR_COMPONENT
  description: Curated 50S large ribosomal subunit protein boundary for the PSEPK ppu03010 ribosome pathway
    batch.
  concepts:
  - preferred_term: large ribosomal subunit
    description: The 50S large subunit component represented by this module.
    term:
      id: GO:0015934
      label: large ribosomal subunit
  - preferred_term: ribosome
    description: Whole ribosome context for translation.
    term:
      id: GO:0005840
      label: ribosome
  - preferred_term: structural constituent of ribosome
    description: Shared molecular role of the 50S ribosomal proteins.
    term:
      id: GO:0003735
      label: structural constituent of ribosome
  - preferred_term: translation
    description: Protein synthesis process supported by the assembled 50S subunit.
    term:
      id: GO:0006412
      label: translation
  - preferred_term: ribosomal RNA binding
    description: Specific rRNA-contact activity retained for many individual 50S proteins.
    term:
      id: GO:0019843
      label: rRNA binding
  - preferred_term: 5S rRNA binding
    description: Specific 5S-rRNA-contact activity retained for L18/L25-family proteins.
    term:
      id: GO:0008097
      label: 5S rRNA binding
  context:
    taxa:
    - preferred_term: Pseudomonas putida KT2440
      term:
        id: NCBITaxon:160488
        label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
  parts:
  - order: 1
    role: S10-spc-alpha-region 50S core proteins
    node:
      id: s10_spc_alpha_region_50s_proteins
      label: S10-spc-alpha-region 50S proteins
      module_type: CELLULAR_COMPONENT
      description: Conserved 50S ribosomal proteins from the major ribosomal-protein cluster in the ppu03010
        partition.
      annotons:
      - id: rplK_50s_structural_component
