id: MODULE:transport_envelope_spillover_boundary
title: Transport and envelope spillovers from ppu02040
description: Boundary module for the nonflagellar transport/envelope entries pulled into KEGG ppu02040 in Pseudomonas putida
  KT2440. The first-pass module covers fliY/PP_0227 as a periplasmic cystine-binding transport component, PP_1087 as an OmpA-family
  outer-membrane/envelope protein, and PP_5157 as an unresolved signal-peptide-bearing solute-binding family protein. The
  motility/chemotaxis/ biofilm functional-bucket extension adds ycfJ as an outer-membrane lipoprotein/surface-antigen-family
  spillover with unresolved relationship to flagellation. The cell-envelope/division extension adds OmpA-family proteins,
  autotransporters, a bacteriophage N4 receptor-like subunit, and Tsx-like channels as outer-membrane boundary context, plus
  named lipoprotein families such as UxpA, SlyB, OprI, YaiW, Blc, OsmE/BamE-domain, and Lppl/LptM-family proteins. A further
  domain-resolved lipoprotein split adds 30 mostly membrane-localized lipoproteins with sparse pathway signal, while preserving
  a few sharper desiccation-response, peptidase, peptidase-inhibitor, and heme-binding candidates. The final generic lipoprotein/signal-peptide
  split adds 30 low-information lipoprotein candidates as broad membrane/envelope context only. These entries are documented
  here to keep them out of the flagellar apparatus or peptidoglycan/LPS core unless direct evidence emerges.
status: DRAFT
