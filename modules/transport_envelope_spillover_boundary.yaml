  knowledge_gaps:
  - gap_statement: No direct evidence found in this first pass links fliY, PP_1087, or PP_5157 to construction or operation
      of the KT2440 flagellar apparatus.
    boundary: The module records these genes as transport/envelope spillovers, not as flagellar structural, export, motor,
      or regulatory components.
  - gap_statement: PP_1087 and PP_5157 have sparse GOA coverage and Asta did not retrieve useful organism-specific literature.
    boundary: Their reviews remain conservative, using UniProt/GOA/domain evidence for envelope placement while leaving substrate,
      partner, and motility linkage unresolved.
  - gap_statement: ycfJ is named regulator of flagellation, but the first-pass evidence supports only outer-membrane lipoprotein/surface-antigen
      context.
    boundary: The module keeps ycfJ outside the flagellar apparatus core and does not assert a process-level flagellar regulatory
      role.
  - gap_statement: The OmpA-family proteins yiaD, PP_1121, and PP_1122 have localization and domain support but no direct
      evidence for a specific envelope pathway, partner, or structural role.
    boundary: The module records them as outer-membrane boundary context and does not merge them into peptidoglycan, LPS,
      motility, or transport core modules.
  - gap_statement: PP_1880 and PP_3069 are predicted autotransporters, but their passenger functions and surface phenotypes
      are not established by first-pass evidence.
    boundary: The module records outer-membrane autotransporter context without asserting adhesion, virulence, secretion-process,
      or enzymatic GO terms.
  - gap_statement: PP_4291 and PP_4293 are Tsx-like channel proteins, but this pass does not establish the in vivo nucleoside
      substrate scope or whether both paralogs contribute to the same uptake route.
    boundary: The module uses conservative porin activity and outer-membrane localization while leaving nucleoside transport
      as a testable question.
  - gap_statement: Most named lipoprotein-family entries have localization or family evidence but lack a specific molecular
      mechanism or pathway assignment.
    boundary: The module records these as transport/envelope boundary context and only assigns enzymatic or binding functions
      where the domain evidence is specific enough, as for UxpA and the Blc paralogs.
  - gap_statement: PP_3236 and yaiW are lipoprotein candidates without direct subcellular-location lines in the local UniProt
      records.
    boundary: Their first-pass reviews use broad membrane localization and leave outer-membrane placement, swarming mechanism,
      and paralog relationships as testable questions.
  - gap_statement: Most domain-resolved lipoprotein spillovers have enough domain or GOA signal to separate them from the
      generic lipoprotein queue but lack a specific molecular mechanism, substrate, partner complex, or pathway.
    boundary: The module records them as broad membrane/envelope boundary context and does not merge them into peptidoglycan,
      LPS, secretion, motility, or transporter modules without direct evidence.
  - gap_statement: PP_1115 and PP_2191 retain response-to-desiccation annotations through LEA_2/WHy-domain family evidence,
      but the envelope mechanism is not established.
    boundary: The module treats them as desiccation-response lipoprotein candidates, not as a complete stress-response pathway
      or as specific envelope structural proteins.
  - gap_statement: PP_1500 and PP_2462 provide peptidase and peptidase-inhibitor signals, but the substrates, target peptidases,
      and physiological envelope processes remain unknown.
    boundary: The module records only the conservative molecular-function calls and avoids assigning cell-wall remodeling,
      virulence, or protease-regulation process terms.
  - gap_statement: PP_4686 has heme-binding-domain evidence but no first-pass evidence for a specific heme uptake, ferric
      uptake, or cofactor-transfer pathway.
    boundary: The module records heme binding as a candidate molecular function while keeping transport and iron-acquisition
      process claims unresolved.
  - gap_statement: PP_5319 has an existing alkane catabolic process annotation, but the first-pass review found only lipoprotein-repeat
      family context and marked the alkane process as over-annotated.
    boundary: PP_5319 stays in transport/envelope spillover context and is not used as evidence for alkane catabolism or fatty-acid
      beta-oxidation modules.
  - gap_statement: The generic lipoprotein/signal-peptide spillover set has no GOA rows beyond the review-authored broad membrane
      candidates, and Asta did not retrieve specific organism-relevant family, domain, or pathway evidence.
    boundary: These 30 proteins are retained only as low-information membrane/envelope context and should not seed new process
      or molecular-function annotations without stronger neighborhood, structural, biochemical, or phenotypic evidence.
