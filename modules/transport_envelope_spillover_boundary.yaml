notes: 'First-pass interpretation: the ppu02040 membership of these genes should not be interpreted as evidence that they
  are core flagellar structural, export, motor, or regulatory components. fliY has a transporter substrate-binding interpretation
  despite its flagellar-looking symbol; PP_1087 is an OmpA-family outer-membrane/envelope protein; and PP_5157 is an unresolved
  cell-envelope solute-binding family protein. They remain useful boundary cases for separating transport/envelope biology
  from flagellar apparatus curation. ycfJ is added from the motility functional bucket as an outer-membrane lipoprotein/surface-antigen-family
  spillover, with no first-pass process-level flagellar annotation. The cell-envelope outer-membrane split is likewise kept
  as boundary context: Tsx-like proteins receive conservative porin activity, while OmpA-family proteins, autotransporters,
  and PP_3449 remain unresolved at the process level. Named lipoprotein-family entries are kept in the same boundary module:
  UxpA has a nucleotidase-family enzymatic signal, Blc paralogs have lipid-binding support, and the remaining lipoproteins
  are mostly localization or family-context candidates. The domain-resolved lipoprotein extension is even more conservative:
  most entries receive only broad membrane placement from lipoprotein/domain evidence, PP_1115 and PP_2191 retain desiccation-response
  process context, PP_1500 carries accepted peptidase activity/proteolysis, PP_2462 and PP_4686 receive candidate peptidase
  inhibitor and heme-binding functions, and PP_5319''s alkane-catabolism process annotation is treated as over-propagated
  pathway context. The generic lipoprotein/signal-peptide split is kept at an even lower specificity: full-fetch GOA files
  are header-only, Asta retrieves no specific family or domain signal, and the module records only broad membrane placement
  while leaving outer-membrane specificity, molecular function, and pathway role open. The transport-bucket outer-membrane
  porin/channel extension adds 38 genes: OprD/Opd substrate-selective porins, OprB carbohydrate porins, GlpF/AqpZ channels,
  FadL-family fatty-acid porin context, EstP autotransporter esterase, TamA assembly context, and low-resolution porin or
  outer-membrane proteins. Substrate claims are kept broad unless product/family evidence is specific; pcaP sphingoid catabolism
  and oprG host-outer-membrane context are treated as over-propagated electronic annotations. The transport-bucket lipoprotein/envelope
  accessory extension adds PP_1501 as unresolved product-name-only lipoprotein context, PP_2304 as PpiD periplasmic PPIase/folding-chaperone
  context, and csgG as curli assembly/transport component context.'
