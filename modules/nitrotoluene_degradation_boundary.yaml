id: MODULE:nitrotoluene_degradation_boundary
title: Nitrotoluene degradation boundary
description: >-
  Boundary/absence module for KEGG ppu00633 in Pseudomonas putida KT2440. The
  organism-specific map contains three redox-family candidates, nfnB, PP_2486,
  and nemA. These support nitroreductase/OYE oxidoreductase side context but do
  not establish a complete nitrotoluene catabolic route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00633
    title: Nitrotoluene degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00633 provides the PSEPK curation batch. Its KT2440 membership is
      limited to broad nitroreductase or OYE-family oxidoreductase candidates,
      with no complete nitrotoluene upper-route or downstream ring-cleavage
      pathway resolved by the batch itself.
module:
  id: nitrotoluene_degradation_boundary
  label: Nitrotoluene degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: oxidoreductase activity
      term:
        id: GO:0016491
        label: oxidoreductase activity
      description: Broad nitroreductase-family function retained for nfnB pending substrate evidence.
    - preferred_term: 6,7-dihydropteridine reductase activity
      term:
        id: GO:0004155
        label: 6,7-dihydropteridine reductase activity
      description: EC-derived nfnB activity retained as undecided in the gene review.
    - preferred_term: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
      term:
        id: GO:0016628
        label: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
      description: More specific oxidoreductase class for PP_2486 and nemA OYE-family enzymes.
    - preferred_term: FMN binding
      term:
        id: GO:0010181
        label: FMN binding
      description: Cofactor context for the OYE/NADH-flavin oxidoreductases.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: PP_2486 and nemA are annotated as cytosolic soluble oxidoreductases.
  parts:
    - order: 1
      role: Nitroreductase-family side context
      node:
        id: nfnB_nitroreductase_family_context
        label: nfnB nitroreductase-family context
        module_type: REACTION
        description: >-
          nfnB is a nitroreductase-family protein with an EC-derived
          6,7-dihydropteridine reductase call. The gene review retains broad
          oxidoreductase activity as core and leaves the specific
          dihydropteridine reductase assignment undecided pending substrate
          evidence.
        annotons:
          - id: nfnB_nitroreductase_family_oxidoreductase
            label: "nfnB: nitroreductase-family oxidoreductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nfnB
            function:
              preferred_term: oxidoreductase activity
              term:
                id: GO:0016491
                label: oxidoreductase activity
            role_description: Broad nitroreductase-family oxidoreductase with unresolved physiological substrate.
    - order: 2
      role: OYE/NADH-flavin oxidoreductase side context
      node:
        id: OYE_flavin_oxidoreductase_side_context
        label: OYE/NADH-flavin oxidoreductase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_2486 and nemA are FMN-dependent OYE/NADH-flavin oxidoreductase
          family proteins. Their presence in ppu00633 is interpreted as redox
          side context rather than evidence for a complete nitrotoluene
          degradation pathway.
        annotons:
          - id: PP_2486_OYE_oxidoreductase
            label: "PP_2486: OYE-family oxidoreductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2486
            function:
              preferred_term: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
              term:
                id: GO:0016628
                label: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
            role_description: Predicted FMN-dependent OYE-family oxidoreductase with unresolved substrate.
          - id: nemA_OYE_reductase
            label: "nemA: FMN-linked OYE-family reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nemA
            function:
              preferred_term: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
              term:
                id: GO:0016628
                label: oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor
            role_description: Predicted FMN-linked N-ethylmaleimide/OYE-family reductase with unresolved substrate.
  notes: >-
    This module intentionally records boundary status. The ppu00633 membership
    lacks the route-defining enzymes needed to claim complete nitrotoluene
    degradation in KT2440. The three genes should be reviewed as nitroaromatic
    or electrophile/redox side candidates until substrate assays establish a
    specific pathway role.
