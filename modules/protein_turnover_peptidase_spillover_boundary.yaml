id: MODULE:protein_turnover_peptidase_spillover_boundary
title: Protein turnover peptidase spillover boundary
description: Boundary module for low-information Pseudomonas putida KT2440 peptidase-family genes from the protein folding/targeting/turnover
  umbrella bucket. The module records only domain/GOA-supported generic or class-specific peptidase activities and keeps product-name-only
  or weak domain records unresolved.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_low_information_peptidase_spillovers.tsv
  title: PSEPK low-information peptidase-family spillover split
  statement: The batch table assigns PP_0831, PP_2447, PP_2685, pfpI, PP_2855, PP_4583, and PP_4913 to the low-information
    peptidase-family spillover split.
- source_id: file:PSEPK/PP_0831/PP_0831-ai-review.yaml
  title: Curated PP_0831 review
  statement: The PP_0831 review adds only conservative S1/PA serine endopeptidase and proteolysis rows.
- source_id: file:PSEPK/pfpI/pfpI-ai-review.yaml
  title: Curated pfpI review
  statement: The pfpI review retains generic PfpI/C56-family peptidase activity and marks broad hydrolase as over-annotated.
- source_id: file:PSEPK/PP_4583/PP_4583-ai-review.yaml
  title: Curated PP_4583 review
  statement: The PP_4583 review accepts S9A-family serine-type endopeptidase activity and treats generic peptidase rows as
    over-annotated.
notes: 'First-pass interpretation: this is not a single pathway. PP_0831, PP_4583, and PP_4913 have enough domain/GOA support
  for class-specific endopeptidase calls; pfpI and PP_2855 are retained at generic peptidase level; PP_2447 and PP_2685 remain
  no-core unresolved because the current records lack GOA rows and substrate/pathway evidence.'
