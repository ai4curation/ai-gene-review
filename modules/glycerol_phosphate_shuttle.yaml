  notes: >-
    The glycerol-3-phosphate shuttle (GO:0006127), grounded to the completed human gene reviews:
    cytosolic NAD-linked GPD1 (P21695, GO:0141152 — note GO:0004367 is obsolete for the NAD+ term)
    reduces DHAP to glycerol-3-phosphate consuming a cytosolic NADH; mitochondrial FAD-linked GPD2/
    mGPDH (P43304, GO:0004368 quinone activity + GO:0050660 FAD binding) re-oxidises it and passes
    electrons via FAD to ubiquinone. Net: cytosolic reducing equivalents enter the respiratory chain
    at the ubiquinone pool (bypassing Complex I), complementary to the malate-aspartate shuttle
    (curated in malate_aspartate_shuttle). The shuttle feeds the same ubiquinone pool used by
    Complexes I and II → Complex III. GO term ids/labels verified against the local go.db. GPD2 faces
    the intermembrane space so no metabolite crosses the inner membrane. Disorders/physiology: GPD1
    loss causes transient infantile hypertriglyceridemia; the shuttle drives beta-cell
    glucose-stimulated insulin secretion and thermogenesis.
