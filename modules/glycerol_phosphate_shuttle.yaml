    statement: >-
      The cytosolic NAD-linked glycerol-3-phosphate dehydrogenase step (UniProtKB:P21695, GO:0141152)
      matches the completed human GPD1 review.
  - source_id: file:human/GPD2/GPD2-ai-review.yaml
