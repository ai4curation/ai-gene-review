id: MODULE:p_type_metal_atpase_transport_boundary
title: P-type metal ATPase transport boundary
description: Boundary module for PSEPK type-IB and type-IIIB P-type metal ATPases in the transport ion/metal split.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_p_type_metal_atpases.tsv
  title: P-type metal ATPase transport boundary batch
  statement: The batch table records 5 PSEPK ion/metal-bucket genes assigned to this first-pass boundary module.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates monovalent-cation systems, P-type metal ATPases, inorganic channels,
    transition-metal transporters, redox spillovers, and membrane metalloenzyme side nodes.
notes: 'First-pass interpretation: keep ATPase chemistry and membrane localization, but treat metal specificity conservatively
  when UniProt/product evidence does not resolve exact substrate or valence.'
