id: MODULE:isoprenoid_diphosphate_biosynthesis
title: Isoprenoid (prenyl) diphosphate biosynthesis (IPP/DMAPP -> GPP -> FPP -> GGPP)
description: >-
  The isoprenoid-diphosphate trunk converts the universal five-carbon isoprene units produced by the
  mevalonate pathway into the linear prenyl diphosphates that seed every downstream isoprenoid class. The
  mevalonate pathway (HMGCS1/HMGCR/MVK/PMVK/MVD, curated separately) delivers isopentenyl diphosphate (IPP).
  Isopentenyl-diphosphate delta-isomerase (IDI1, ubiquitous; IDI2, muscle-enriched paralog) reversibly
  interconverts IPP and its allylic isomer dimethylallyl diphosphate (DMAPP), balancing the two pools.
  Farnesyl diphosphate synthase (FDPS) then carries out two sequential head-to-tail (trans, 1'-4)
  condensations: DMAPP + IPP -> geranyl diphosphate (GPP, C10), and GPP + IPP -> farnesyl diphosphate
  (FPP, C15). FPP is the central branch point: it feeds sterol/cholesterol synthesis (via squalene, SQLE/
  FDFT1), heme A, ubiquinone/CoQ side chains, dolichol (cis-prenyltransferase DHDDS/NUS1), and protein
  farnesylation (FTase). Geranylgeranyl diphosphate synthase (GGPS1) adds one more IPP to FPP giving
  geranylgeranyl diphosphate (GGPP, C20), the C20 donor for protein geranylgeranylation (GGTase-I and
  RabGGTase). All three enzymes are cytosolic Mg2+-dependent prenyltransferases/isomerases (IDI1/IDI2 also
  peroxisomal). The pathway is the pharmacological target of nitrogen bisphosphonates (FDPS); GGPS1
  loss-of-function causes a muscular dystrophy / sensorineural hearing loss / ovarian insufficiency
  syndrome.
status: DRAFT
evidence:
  - source_id: GO:0008299
    title: isoprenoid biosynthetic process
    statement: IDI1/IDI2, FDPS and GGPS1 build the linear prenyl diphosphates of isoprenoid metabolism (GO:0008299).
  - source_id: GO:0045337
    title: farnesyl diphosphate biosynthetic process
    statement: FDPS produces farnesyl diphosphate (GO:0045337) via GPP (GO:0033384).
  - source_id: GO:0033386
    title: geranylgeranyl diphosphate biosynthetic process
    statement: GGPS1 produces geranylgeranyl diphosphate (GO:0033386).
  - source_id: file:human/IDI1/IDI1-ai-review.yaml
    title: IDI1 gene review (human)
    statement: IPP<->DMAPP isomerase, ubiquitous (UniProtKB:Q13907, GO:0004452) matches the completed human IDI1 review.
  - source_id: file:human/IDI2/IDI2-ai-review.yaml
    title: IDI2 gene review (human)
    statement: IPP<->DMAPP isomerase, muscle-enriched paralog (UniProtKB:Q9BXS1, GO:0004452) matches the completed human IDI2 review.
  - source_id: file:human/FDPS/FDPS-ai-review.yaml
    title: FDPS gene review (human)
    statement: Farnesyl diphosphate synthase, DMAPP+IPP->GPP->FPP (UniProtKB:P14324, GO:0004337/GO:0004161) matches the completed human FDPS review.
  - source_id: file:human/GGPS1/GGPS1-ai-review.yaml
    title: GGPS1 gene review (human)
    statement: Geranylgeranyl diphosphate synthase, FPP+IPP->GGPP (UniProtKB:O95749, GO:0004311) matches the completed human GGPS1 review.
module:
  id: isoprenoid_diphosphate_biosynthesis
  label: Isoprenoid (prenyl) diphosphate biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: isoprenoid biosynthetic process
      term:
        id: GO:0008299
        label: isoprenoid biosynthetic process
      description: Synthesis of the linear prenyl diphosphates (GPP/FPP/GGPP) from IPP/DMAPP.
    - preferred_term: farnesyl diphosphate biosynthetic process
      term:
        id: GO:0045337
        label: farnesyl diphosphate biosynthetic process
      description: FDPS makes the central C15 branch-point precursor FPP (via GPP).
    - preferred_term: geranylgeranyl diphosphate biosynthetic process
      term:
        id: GO:0033386
        label: geranylgeranyl diphosphate biosynthetic process
      description: GGPS1 elongates FPP to the C20 donor GGPP.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All three enzymes act in the cytosol.
      - preferred_term: peroxisome
        term:
          id: GO:0005777
          label: peroxisome
        description: IDI1/IDI2 carry a PTS1 and are also peroxisomal.
  parts:
    - order: 1
      role: IPP/DMAPP isomerization
      node:
        id: ipp_isomerization
        label: Isopentenyl-diphosphate delta-isomerase (IDI1 / IDI2)
        module_type: REACTION
        annotons:
          - id: idi_activity
            label: "IDI1/IDI2: isopentenyl-diphosphate delta-isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: IDI / isopentenyl-diphosphate delta-isomerase (type 1) family
                term:
                  id: PANTHER:PTHR10885
                  label: ISOPENTENYL-DIPHOSPHATE DELTA-ISOMERASE
                representative_members:
                  - preferred_term: IDI1 (human; ubiquitous)
                    term:
                      id: UniProtKB:Q13907
                      label: Isopentenyl-diphosphate Delta-isomerase 1
                  - preferred_term: IDI2 (human; muscle-enriched)
                    term:
                      id: UniProtKB:Q9BXS1
                      label: Isopentenyl-diphosphate Delta-isomerase 2
            function:
              preferred_term: isopentenyl-diphosphate delta-isomerase activity
              term:
                id: GO:0004452
                label: isopentenyl-diphosphate delta-isomerase activity
              substrates:
                - preferred_term: isopentenyl diphosphate (IPP)
              products:
                - preferred_term: dimethylallyl diphosphate (DMAPP)
              evidence:
                - source_id: file:human/IDI1/IDI1-ai-review.yaml
                  statement: Reversible IPP<->DMAPP isomerization (Mg2+/Mn2+); provides the DMAPP primer for FDPS; IDI2 is a muscle-enriched paralog
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
              - preferred_term: peroxisome
                term:
                  id: GO:0005777
                  label: peroxisome
            role_description: Interconvert IPP and DMAPP to balance the isoprene-unit pools.
    - order: 2
      role: GPP + FPP synthesis (trans-prenyltransferase)
      node:
        id: fpp_synthesis
        label: Farnesyl diphosphate synthase (FDPS)
        module_type: REACTION
        annotons:
          - id: fdps_activity
            label: "FDPS: farnesyl diphosphate synthase (DMAPP+IPP->GPP->FPP)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: FDPS / farnesyl pyrophosphate synthase family
                term:
                  id: PANTHER:PTHR11525
                  label: FARNESYL PYROPHOSPHATE SYNTHETASE
                representative_members:
                  - preferred_term: FDPS (human)
                    term:
                      id: UniProtKB:P14324
                      label: Farnesyl pyrophosphate synthase
            function:
              preferred_term: (2E,6E)-farnesyl diphosphate synthase activity
              term:
                id: GO:0004337
                label: (2E,6E)-farnesyl diphosphate synthase activity
              substrates:
                - preferred_term: dimethylallyl diphosphate (DMAPP)
                - preferred_term: isopentenyl diphosphate (IPP; Mg2+)
              products:
                - preferred_term: (2E,6E)-farnesyl diphosphate (FPP)
                - preferred_term: geranyl diphosphate (GPP; intermediate)
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/FDPS/FDPS-ai-review.yaml
                  statement: Two sequential trans (1'-4) condensations DMAPP+IPP->GPP (GO:0004161) and GPP+IPP->FPP (GO:0004337); nitrogen-bisphosphonate target
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Elongate DMAPP with two IPP units to the C15 branch-point precursor FPP.
    - order: 3
      role: GGPP synthesis (trans-prenyltransferase)
      node:
        id: ggpp_synthesis
        label: Geranylgeranyl diphosphate synthase (GGPS1)
        module_type: REACTION
        annotons:
          - id: ggps1_activity
            label: "GGPS1: geranylgeranyl diphosphate synthase (FPP+IPP->GGPP)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GGPS1 / geranylgeranyl pyrophosphate synthase family
                term:
                  id: PANTHER:PTHR12001
                  label: GERANYLGERANYL PYROPHOSPHATE SYNTHASE
                representative_members:
                  - preferred_term: GGPS1 (human)
                    term:
                      id: UniProtKB:O95749
                      label: Geranylgeranyl pyrophosphate synthase
            function:
              preferred_term: geranylgeranyl diphosphate synthase activity
              term:
                id: GO:0004311
                label: geranylgeranyl diphosphate synthase activity
              substrates:
                - preferred_term: (2E,6E)-farnesyl diphosphate (FPP)
                - preferred_term: isopentenyl diphosphate (IPP; Mg2+)
              products:
                - preferred_term: (2E,6E,10E)-geranylgeranyl diphosphate (GGPP)
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/GGPS1/GGPS1-ai-review.yaml
                  statement: FPP+IPP->GGPP (C20 donor for protein geranylgeranylation); homohexamer; loss causes muscular dystrophy/hearing-loss/POI
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Elongate FPP with one IPP unit to the C20 donor GGPP.
  connections:
    - source: ipp_isomerization
      target: fpp_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: IDI supplies the DMAPP primer (and balances IPP) that FDPS condenses to GPP/FPP.
    - source: fpp_synthesis
      target: ggpp_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: FDPS-made FPP is the substrate GGPS1 elongates to GGPP.
  notes: >-
    Isoprenoid (prenyl) diphosphate biosynthesis trunk (GO:0008299), grounded to four completed human gene
    reviews; the bridge between the mevalonate pathway (HMGCS1/HMGCR/MVK/PMVK/MVD, separate) and the sterol,
    dolichol, ubiquinone and protein-prenylation branches. IDI1 (Q13907 PTHR10885, ubiquitous) + IDI2 (Q9BXS1
    PTHR10885, muscle-enriched paralog) reversibly isomerize IPP<->DMAPP (GO:0004452; cytosol + peroxisome via
    PTS1). FDPS (P14324 PTHR11525) does two sequential trans condensations DMAPP+IPP->GPP (GO:0004161) then
    GPP+IPP->FPP (GO:0004337) — the central C15 branch point; it is the nitrogen-bisphosphonate drug target.
    GGPS1 (O95749 PTHR12001, homohexamer) adds one IPP to FPP -> GGPP (GO:0004311), the C20 donor for
    GGTase-I/RabGGTase (see protein_prenylation_caax_processing module). All cytosolic, Mg2+-dependent. GGPS1
    loss-of-function -> muscular dystrophy/sensorineural hearing loss/ovarian insufficiency. FDPS/GGPS1
    partial-reaction EC activities (GO:0004161/GO:0004337 shared active site) kept non-core where redundant.
    GO term ids/labels verified against the local go.db; module passes structural + term-label validation.
