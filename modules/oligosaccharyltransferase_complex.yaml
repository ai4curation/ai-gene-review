  notes: >-
    Oligosaccharyltransferase (OST) complex - the ER-membrane machine that transfers the Dol-PP-linked
    Glc3Man9GlcNAc2 glycan onto Asn sequons (GO:0004579 / GO:0006487) - grounded to nine completed human gene
    reviews. Two isoforms share four scaffold subunits: catalytic STT3A (P46977, PTHR13872) with the
    translocon adaptor OSTC/DC2 (Q9NRP0, PTHR13160, GO:0030674) form OST-A (GO:0160226) for co-translational
    glycosylation (GO:0180058); catalytic STT3B (Q8TCJ2, PTHR13872) with the thioredoxin-like oxidoreductases
    MAGT1 (Q9H0U3) and TUSC3 (Q13454) (both PTHR12692, GO:0015036/GO:0015035) form OST-B (GO:0160227) for
    post-translational proofreading (GO:0180057). Shared scaffold: RPN1 (P04843 PTHR21049), RPN2 (P04844
    PTHR12640), DDOST/OST48 (P39656 PTHR10830), DAD1 (P61803 PTHR10705) - modelled as non-catalytic subunits
    (in_complex GO:0008250, contributes_to GO:0004579 in their gene reviews). Module node locations are the
    anatomical ER membrane (GO:0005789); the OST-complex CC terms live in the gene reviews' in_complex.
    Curation notes: MAGT1/TUSC3 historical magnesium-transporter annotations are contested/secondary to the
    OST oxidoreductase role (kept non-core/over-annotated in the reviews); DAD1's anti-apoptotic role is
    downstream of OST integrity (non-core). Diseases: STT3A/STT3B/DDOST-CDG, MAGT1/XMEN, TUSC3 AR intellectual
    disability. Consumes the Dol-PP-glycan from the LLO/ALG assembly (reviewed) built on dolichol from the
    dolichyl_phosphate_biosynthesis module. GO term ids/labels verified against the local go.db; module passes
    structural + term-label validation.
