id: MODULE:oligosaccharyltransferase_complex
title: Oligosaccharyltransferase (OST) complex - N-glycan transfer (STT3A/STT3B + accessory subunits)
description: >-
  The oligosaccharyltransferase (OST) complex is the endoplasmic-reticulum-membrane enzyme that performs the
  central, committed step of N-linked glycosylation: en-bloc transfer of the preassembled Glc3Man9GlcNAc2
  glycan from dolichyl diphosphate (Dol-PP) onto the side-chain amide of asparagine residues within N-X-S/T
  sequons of nascent secretory and membrane proteins. Humans have two OST isoforms distinguished by their
  catalytic subunit. The STT3A complex (OST-A) is docked at the SEC61 translocon and glycosylates sequons
  co-translationally as the polypeptide enters the ER; its subunit OSTC (DC2) tethers it to the translocon.
  The STT3B complex (OST-B) acts post-translationally and translocon-independently, providing a proofreading
  second pass that glycosylates skipped, C-terminal and closely-spaced sequons; its thioredoxin-like
  oxidoreductase subunits MAGT1 and TUSC3 use a CXXC motif to transiently engage substrate cysteines,
  enabling glycosylation of cysteine-proximal sequons. Both isoforms share a set of non-catalytic scaffold
  subunits - ribophorin I (RPN1), ribophorin II (RPN2), OST48 (DDOST) and DAD1 - required for complex
  integrity and substrate presentation. Defects in individual subunits cause congenital disorders of
  glycosylation (STT3A-, STT3B-, DDOST-CDG), X-linked immunodeficiency with magnesium defect (MAGT1/XMEN)
  and autosomal-recessive intellectual disability (TUSC3).
status: DRAFT
evidence:
  - source_id: GO:0006487
    title: protein N-linked glycosylation
    statement: The OST complex catalyses the en-bloc transfer of the N-glycan to asparagine (GO:0006487).
  - source_id: GO:0004579
    title: dolichyl-diphosphooligosaccharide-protein glycotransferase activity
    statement: STT3A/STT3B are the catalytic subunits carrying this activity (GO:0004579).
  - source_id: GO:0008250
    title: oligosaccharyltransferase complex
    statement: All nine subunits assemble into the OST complex (GO:0008250; isoforms GO:0160226/GO:0160227).
  - source_id: file:human/STT3A/STT3A-ai-review.yaml
    title: STT3A gene review (human)
    statement: Co-translational OST catalytic subunit (UniProtKB:P46977, GO:0004579) matches the completed human STT3A review.
  - source_id: file:human/STT3B/STT3B-ai-review.yaml
    title: STT3B gene review (human)
    statement: Post-translational OST catalytic subunit (UniProtKB:Q8TCJ2, GO:0004579) matches the completed human STT3B review.
  - source_id: file:human/OSTC/OSTC-ai-review.yaml
    title: OSTC gene review (human)
    statement: STT3A-specific translocon adaptor subunit (UniProtKB:Q9NRP0, GO:0030674) matches the completed human OSTC review.
  - source_id: file:human/MAGT1/MAGT1-ai-review.yaml
    title: MAGT1 gene review (human)
    statement: STT3B-specific oxidoreductase subunit (UniProtKB:Q9H0U3, GO:0015036) matches the completed human MAGT1 review.
  - source_id: file:human/TUSC3/TUSC3-ai-review.yaml
    title: TUSC3 gene review (human)
    statement: STT3B-specific oxidoreductase subunit (UniProtKB:Q13454, GO:0015035) matches the completed human TUSC3 review.
  - source_id: file:human/RPN1/RPN1-ai-review.yaml
    title: RPN1 gene review (human)
    statement: Shared scaffold subunit ribophorin I (UniProtKB:P04843) matches the completed human RPN1 review.
  - source_id: file:human/RPN2/RPN2-ai-review.yaml
    title: RPN2 gene review (human)
    statement: Shared scaffold subunit ribophorin II (UniProtKB:P04844) matches the completed human RPN2 review.
  - source_id: file:human/DDOST/DDOST-ai-review.yaml
    title: DDOST gene review (human)
    statement: Shared scaffold subunit OST48 (UniProtKB:P39656) matches the completed human DDOST review.
  - source_id: file:human/DAD1/DAD1-ai-review.yaml
    title: DAD1 gene review (human)
    statement: Shared scaffold subunit DAD1 (UniProtKB:P61803) matches the completed human DAD1 review.
