id: MODULE:pantothenate_and_coa_biosynthesis
title: Pantothenate and CoA biosynthesis
description: >-
  A bacterial pantothenate and coenzyme A biosynthesis module covering formation
  of pantoate from 3-methyl-2-oxobutanoate, ligation with beta-alanine to form
  pantothenate, and conversion of pantothenate through phosphopantothenate,
  phosphopantothenoylcysteine, phosphopantetheine, and dephospho-CoA to CoA.
  In Pseudomonas putida KT2440, KEGG ppu00770 also includes branched-chain
  amino-acid precursor enzymes, pyrimidine/beta-alanine metabolism, ACP
  phosphopantetheine handling, and nucleotide hydrolase side nodes; these are
  tracked as precursor or boundary context unless they directly form
  pantothenate or CoA.
status: DRAFT
evidence:
  - source_id: GO:0015940
    title: pantothenate biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      pantothenate, vitamin B5.
  - source_id: GO:0015937
    title: coenzyme A biosynthetic process
    statement: >-
      CoA biosynthesis begins with pantothenate kinase and proceeds through the
      conserved CoaBC, CoaD, and CoaE reactions.
  - source_id: KEGG:ppu00770
    title: Pantothenate and CoA biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      strict pantothenate/CoA biosynthesis with beta-alanine metabolism,
      branched-chain amino-acid precursor supply, ACP turnover, and nucleotide
      side nodes.
  - source_id: UniPathway:UPA00028
    title: Pantothenate biosynthesis
    statement: >-
      UniPathway UPA00028 cross-references PanB, PanC, and four
      2-dehydropantoate reductase candidates in KT2440, including PP_4452
      outside the KEGG ppu00770 bucket.
  - source_id: UniPathway:UPA00241
    title: CoA biosynthesis
    statement: >-
      UniPathway UPA00241 cross-references the CoaX, CoaBC/Dfp, CoaD, and CoaE
      steps that convert pantothenate to CoA.
  - source_id: file:modules/pantothenate_and_coa_biosynthesis-deep-research-falcon.md
    title: Falcon module-level review for pantothenate and CoA biosynthesis
    statement: >-
      Falcon module-level review supports the PanB/PanC/CoaX/CoaBC/CoaD/CoaE
      pathway structure while flagging ketopantoate reductase redundancy and
      beta-alanine-source variation as important module-boundary issues.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__pantothenate_and_coa_biosynthesis__ppu00770-deep-research-falcon.md
    title: Falcon PSEPK ppu00770 review for pantothenate and CoA biosynthesis
    statement: >-
      The PSEPK-specific Falcon review identifies coaX as the strongest
      species-linked core step, treats PP_2325 and PP_2998 as uncertain
      ketopantoate reductase candidates, and recommends representing
      pyrimidine reductive catabolism as beta-alanine supply context because
      KT2440 lacks a canonical PanD route.
