notes: >-
  For PSEPK ppu00770, the likely strict pathway is PanB plus one or more
  ketopantoate reductase candidates, PanC, CoaX, Dfp/CoaBC, CoaD, and CoaE.
  The ketopantoate reductase step remains candidate-uncertain in KT2440:
  panE is the expected primary assignment, while PP_2325, PP_2998, PP_4452,
  and possible IlvC compensation require targeted evidence before they should
  be treated as interchangeable core enzymes. PP_4452 is a UniPathway-only
  candidate and is curated with this module even though it is absent from KEGG
  ppu00770. KT2440 lacks the canonical PanD aspartate decarboxylase route in
  this pathway set, so pydA/pydX, pydB, hyuC, and related beta-alanine
  metabolism genes are tracked as species-specific precursor context. PP_0922,
  PP_1183, and mazG are ACP/cofactor or nucleotide boundary nodes and should
  not count toward strict pantothenate-to-CoA pathway satisfiability.
