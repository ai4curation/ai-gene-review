id: MODULE:triacylglycerol_biosynthesis
title: Glycerolipid / triacylglycerol biosynthesis (glycerol-phosphate pathway) (GPAM -> AGPAT2 -> LPIN1 -> DGAT1/2)
description: >-
  Triacylglycerol (TAG) is the principal energy-storage lipid, assembled from glycerol-3-phosphate and fatty
  acyl-CoAs by the glycerol-phosphate pathway, whose intermediate diacylglycerol is also the branch point to
  the major glycerophospholipids. Glycerol-3-phosphate acyltransferase (GPAM/GPAT1, at the mitochondrial
  outer membrane) performs the first, committed and rate-limiting acylation of sn-glycerol-3-phosphate at sn-1
  to lysophosphatidic acid (LPA). 1-Acylglycerol-3-phosphate O-acyltransferase (AGPAT2/LPAAT-beta, at the ER)
  acylates LPA at sn-2 to phosphatidic acid (PA). The Mg2+-dependent phosphatidate phosphatase lipin-1 (LPIN1)
  dephosphorylates PA to diacylglycerol (DAG); LPIN1 additionally moonlights in the nucleus as a
  transcriptional coregulator of lipid-metabolism genes. Finally the diacylglycerol O-acyltransferases DGAT1
  (an ER MBOAT-family enzyme with broad acyl-acceptor specificity) and DGAT2 (the ER/lipid-droplet DGAT2-
  family enzyme that is the quantitatively major TAG synthase) esterify DAG at sn-3 with a fatty acyl-CoA to
  form TAG - the final, dedicated step, which packages TAG into cytoplasmic lipid droplets. Defects cause
  metabolic disease: AGPAT2 and (via the pathway) other steps cause congenital generalized lipodystrophy,
  LPIN1 causes recurrent childhood rhabdomyolysis, and DGAT1 causes a congenital diarrhoea / protein-losing
  enteropathy.
status: DRAFT
evidence:
  - source_id: GO:0019432
    title: triglyceride biosynthetic process
    statement: GPAM, AGPAT2, LPIN1 and DGAT1/2 synthesise triacylglycerol (GO:0019432).
  - source_id: GO:0006654
    title: phosphatidic acid biosynthetic process
    statement: GPAM + AGPAT2 build phosphatidic acid, the pathway's central intermediate (GO:0006654).
  - source_id: GO:0006651
    title: diacylglycerol biosynthetic process
    statement: LPIN1 produces diacylglycerol, the branch point to TAG and phospholipids (GO:0006651).
  - source_id: file:human/GPAM/GPAM-ai-review.yaml
    title: GPAM gene review (human)
    statement: Glycerol-3-phosphate acyltransferase 1 (UniProtKB:Q9HCL2, GO:0004366) matches the completed human GPAM review.
  - source_id: file:human/AGPAT2/AGPAT2-ai-review.yaml
    title: AGPAT2 gene review (human)
    statement: 1-acylglycerol-3-phosphate O-acyltransferase 2 (UniProtKB:O15120, GO:0003841) matches the completed human AGPAT2 review.
  - source_id: file:human/LPIN1/LPIN1-ai-review.yaml
    title: LPIN1 gene review (human)
    statement: Lipin-1 phosphatidate phosphatase (UniProtKB:Q14693, GO:0008195) matches the completed human LPIN1 review.
  - source_id: file:human/DGAT1/DGAT1-ai-review.yaml
    title: DGAT1 gene review (human)
    statement: Diacylglycerol O-acyltransferase 1 (UniProtKB:O75907, GO:0004144) matches the completed human DGAT1 review.
  - source_id: file:human/DGAT2/DGAT2-ai-review.yaml
    title: DGAT2 gene review (human)
    statement: Diacylglycerol O-acyltransferase 2 (UniProtKB:Q96PD7, GO:0004144) matches the completed human DGAT2 review.
