      connection_type: PROVIDES_INPUT_FOR
      description: GPAM-made LPA is acylated by AGPAT2 to phosphatidic acid.
    - source: lpa_acylation
      target: pa_dephosphorylation
      connection_type: PROVIDES_INPUT_FOR
      description: AGPAT2-made phosphatidic acid is dephosphorylated by LPIN1 to DAG.
    - source: pa_dephosphorylation
      target: dag_acylation
      connection_type: PROVIDES_INPUT_FOR
      description: LPIN1-made DAG is esterified by DGAT1/DGAT2 to triacylglycerol.
  notes: >-
    Glycerolipid / triacylglycerol biosynthesis, glycerol-phosphate pathway (GO:0019432), grounded to five
    completed human gene reviews. G3P -> LPA: GPAM/GPAT1 (Q9HCL2 PTHR12563, GO:0004366, mitochondrial outer
    membrane, first committed rate-limiting step); LPA -> PA: AGPAT2/LPAAT-beta (O15120 PTHR10434, GO:0003841,
    ER); PA -> DAG: LPIN1 (Q14693 PTHR12181, GO:0008195, Mg2+ PAP1, ER/cytosol; also nuclear coregulator - kept
    non-core in its review); DAG -> TAG: DGAT1 (O75907 PTHR10408, MBOAT family, broad acceptor) and DGAT2
    (Q96PD7 PTHR12317, DGAT2 family, major TAG synthase, ER/lipid-droplet), both GO:0004144, modelled as two
    annotons on the final node. DAG is the branch point shared with glycerophospholipid synthesis (Kennedy
    pathway, separately reviewed). Curation: GPAM plasma-membrane IEA removed (bacterial PlsB ancestry vs mito-
    OM); DGAT1 triacylglycerol-lipase term is a Rhea-direction artifact (over-annotated); DGAT1/DGAT2 minor
    MGAT/retinol/wax activities and DGAT2 rodent-ortholog physiology terms kept non-core; several
    neutrophil-degranulation Reactome plasma-membrane/granule TAS are wrong-compartment for these ER enzymes.
    Diseases: AGPAT2 = CGL1, LPIN1 = rhabdomyolysis, DGAT1 = congenital diarrhoea. GO term ids/labels verified
    against the local go.db; module passes structural + term-label validation.
