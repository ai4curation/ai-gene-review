  notes: >-
    The module intentionally keeps LPS biosynthesis and lipid A remodeling
    together because KEGG ppu00540 includes both de novo assembly enzymes and
    modification candidates. Substrate-specific claims for PP_0024, PP_4592,
    yijP, lpxOA, PP_4570, PP_0063, PP_3016, and PP_3134 should remain conservative
    until stronger experimental or curated evidence is available. The
    cell-envelope/division bucket also surfaced maa, but its first-pass review
    supports maltose O-acetyltransferase activity rather than lipid A biosynthesis,
    so it is intentionally not included as a module part.
