id: MODULE:lipopolysaccharide_biosynthesis
title: Lipopolysaccharide biosynthesis
description: >-
  Species-neutral first-pass module for the Pseudomonas putida KT2440 KEGG
  ppu00540 lipopolysaccharide biosynthesis batch. The module separates lipid
  IVA/lipid A biosynthesis, Kdo2-lipid A formation, LPS core oligosaccharide
  assembly, and lipid A/LPS remodeling side nodes. Broad membrane, cofactor, and
  generic transferase/hydrolase annotations should not be treated as separate
  core functions when more specific enzyme terms are present.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00540
    title: Lipopolysaccharide biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00540 provides the PSEPK curation batch. Its membership contains
      lipid A biosynthesis enzymes, Kdo/core transferases and kinases, predicted
      phosphoethanolamine-transferase-like proteins, PagL deacylases, and
      LpxO-like dioxygenase side candidates.
module:
  id: lipopolysaccharide_biosynthesis
  label: Lipopolysaccharide biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: lipopolysaccharide biosynthetic process
      term:
        id: GO:0009103
        label: lipopolysaccharide biosynthetic process
      description: Overall LPS assembly and modification context.
    - preferred_term: lipid A biosynthetic process
      term:
        id: GO:0009245
        label: lipid A biosynthetic process
      description: Lipid IVA/lipid A precursor biosynthesis.
    - preferred_term: lipopolysaccharide core region biosynthetic process
      term:
        id: GO:0009244
        label: lipopolysaccharide core region biosynthetic process
      description: Kdo and core oligosaccharide assembly.
    - preferred_term: Kdo2-lipid A biosynthetic process
      term:
        id: GO:0036104
        label: Kdo2-lipid A biosynthetic process
      description: Kdo2-lipid A maturation and late acylation.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Several lipid A/LPS enzymes are membrane-associated.
      - preferred_term: cell outer membrane
        term:
          id: GO:0009279
          label: cell outer membrane
        description: PagL-family deacylases act in the bacterial outer membrane.
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Early soluble lipid A precursor enzymes act on cytoplasmic metabolites.
  parts:
    - order: 1
      role: Lipid IVA / lipid A precursor biosynthesis
      node:
        id: lipid_a_precursor_biosynthesis
        label: Lipid IVA / lipid A precursor biosynthesis
        module_type: METABOLIC_PATHWAY
        annotons:
          - id: lpxA_acyl_acp_udp_glcnac_o_acyltransferase
            label: "lpxA: acyl-[ACP]-UDP-N-acetylglucosamine O-acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpxA
            function:
              preferred_term: acyl-[acyl-carrier-protein]-UDP-N-acetylglucosamine O-acyltransferase activity
              term:
                id: GO:0008780
                label: acyl-[acyl-carrier-protein]-UDP-N-acetylglucosamine O-acyltransferase activity
            role_description: First acyltransferase step of lipid A biosynthesis.
          - id: lpxC_udp_3_o_acyl_glcnac_deacetylase
            label: "lpxC: UDP-3-O-acyl-N-acetylglucosamine deacetylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpxC
            function:
              preferred_term: UDP-3-O-acyl-N-acetylglucosamine deacetylase activity
              term:
                id: GO:0103117
                label: UDP-3-O-acyl-N-acetylglucosamine deacetylase activity
            role_description: Committed deacetylase step in lipid A biosynthesis.
          - id: lpxD_udp_3_o_acylglucosamine_n_acyltransferase
            label: "lpxD: UDP-3-O-acylglucosamine N-acyltransferase"
            participant:
              selector_type: GENE
