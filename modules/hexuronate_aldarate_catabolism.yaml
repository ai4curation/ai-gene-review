id: MODULE:hexuronate_aldarate_catabolism
title: Hexuronate and aldarate catabolism
description: >-
  A bacterial free-hexuronate and aldarate catabolism module centered on
  oxidative conversion of D-glucuronate or D-galacturonate to glucarate or
  galactarate, dehydration of aldarates to keto-deoxy intermediates, and
  terminal oxidation of 2,5-dioxopentanoate or KGSA to 2-oxoglutarate. This is
  the catabolic arm that KEGG places under ascorbate and aldarate metabolism in
  Pseudomonas putida KT2440; it should be kept separate from UDP-glucuronate
  nucleotide-sugar biosynthesis and from eukaryotic ascorbate metabolism.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00053
    title: Ascorbate and aldarate metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00053 membership, which in
      this organism primarily captures aldarate catabolism rather than a
      complete ascorbate pathway.
  - source_id: UniPathway:UPA00564
    title: D-glucarate degradation
    statement: >-
      UniPathway anchors the D-glucarate route through glucarate dehydratase and
      5-dehydro-4-deoxyglucarate dehydratase to 2,5-dioxopentanoate.
  - source_id: PMID:19060141
    title: Cloning and characterization of uronate dehydrogenases from two pseudomonads and Agrobacterium tumefaciens strain C58.
    statement: >-
      Primary biochemical evidence for P. putida KT2440 Udh activity on
      glucuronate and galacturonate.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__pentose_glucuronate_interconversions__ppu00040-deep-research-falcon.md
    title: Falcon PSEPK ppu00040 pathway satisfiability synthesis
    statement: >-
      Species-aware synthesis identifying Udh, a lactonase, GudD/GarD-family
      dehydratases, and a KGSADH isozyme as the expected oxidative
      hexuronate/aldarate arm.
  - source_id: file:modules/hexuronate_aldarate_catabolism-deep-research-falcon.md
    title: Falcon module synthesis for hexuronate and aldarate catabolism
    statement: >-
      Generic module synthesis supports the six-step oxidative Udh, UxuL/UxuF,
      GudD/GarD, KdgD, and KgsD route and separates it from the enterobacterial
      GarL aldol-cleavage route and from UDP-glucuronate biosynthesis.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__hexuronate_aldarate_catabolism__ppu00053-deep-research-falcon.md
    title: Falcon PSEPK ppu00053 pathway satisfiability synthesis
    statement: >-
      Species-aware synthesis promotes gnl/PP_1170 as the UxuL-family
      lactonase, supports PP_3602 as the best local aldarate-pathway KGSADH
      candidate, and treats udg plus PP_1256/PP_2585 as side or uncertain
      candidates for this module.
module:
  id: hexuronate_aldarate_catabolism
  label: Hexuronate and aldarate catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: D-glucarate catabolic process
      term:
        id: GO:0042838
        label: D-glucarate catabolic process
      description: Catabolism of D-glucarate to central-carbon intermediates.
    - preferred_term: D-galactarate catabolic process
      term:
        id: GO:0046392
        label: D-galactarate catabolic process
      description: Catabolism of D-galactarate to central-carbon intermediates.
    - preferred_term: D-galacturonate catabolic process
      term:
        id: GO:0019698
        label: D-galacturonate catabolic process
      description: >-
        Degradation of D-galacturonate through oxidation and downstream
        galactarate-processing reactions.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          The mapped bacterial aldarate catabolic enzymes are soluble enzymes
          expected to operate in the cytosol.
  parts:
    - order: 1
      role: hexuronate oxidation
      node:
        id: uronate_dehydrogenase_step
        label: Glucuronate or galacturonate to urono-1,5-lactone
        module_type: REACTION
        annotons:
          - id: uronate_dehydrogenase_activity
            label: Uronate dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: uronate dehydrogenase activity
                term:
                  id: GO:0050388
                  label: uronate dehydrogenase activity
            function:
              preferred_term: uronate dehydrogenase activity
              term:
                id: GO:0050388
                label: uronate dehydrogenase activity
              substrates:
                - preferred_term: beta-D-glucuronate
                - preferred_term: beta-D-galacturonate
                - preferred_term: NAD+
              products:
                - preferred_term: D-glucaro-1,5-lactone
                - preferred_term: D-galactaro-1,5-lactone
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.203
                  statement: uronate dehydrogenase
                - source_id: PMID:19060141
                  statement: P. putida KT2440 Udh was biochemically characterized.
            role_description: >-
              Entry oxidation step for free glucuronate and galacturonate. In
              PSEPK this role is represented by udh/PP_1171.
    - order: 2
      role: urono-lactone hydrolysis
      node:
        id: hexuronate_lactonase_candidate_step
        label: Urono-1,5-lactone hydrolysis to aldarate
        module_type: REACTION
        annotons:
          - id: gluconolactonase_family_lactonase_activity
            label: Gluconolactonase-family lactonase candidate
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: gluconolactonase activity
                term:
                  id: GO:0004341
                  label: gluconolactonase activity
            function:
              preferred_term: gluconolactonase activity
              term:
                id: GO:0004341
                label: gluconolactonase activity
              substrates:
                - preferred_term: D-glucaro-1,5-lactone
                - preferred_term: D-galactaro-1,5-lactone
              products:
                - preferred_term: D-glucarate
                - preferred_term: D-galactarate
              evidence:
                - source_id: EC:3.1.1.17
                  statement: gluconolactonase-family lactonase
                - source_id: file:modules/hexuronate_aldarate_catabolism-deep-research-falcon.md
                  statement: >-
                    UxuL/UxuF lactonases hydrolyze glucaro- and
                    galactaro-1,5-lactones in the oxidative pathway.
            role_description: >-
              Lactone-opening step. In PSEPK this role is represented by
              gnl/PP_1170, the UxuL-family lactonase candidate adjacent to
              udh. The current GO term is not substrate-resolved for glucaro-
              or galactaro-1,5-lactones, so the module records the best
              available family-level function.
    - order: 3
      role: D-glucarate dehydration
      node:
        id: glucarate_dehydratase_step
        label: D-glucarate to 5-dehydro-4-deoxy-D-glucarate
        module_type: REACTION
        annotons:
          - id: glucarate_dehydratase_activity
            label: Glucarate dehydratase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glucarate dehydratase activity
                term:
                  id: GO:0008872
                  label: glucarate dehydratase activity
            function:
              preferred_term: glucarate dehydratase activity
              term:
                id: GO:0008872
                label: glucarate dehydratase activity
              substrates:
                - preferred_term: D-glucarate
              products:
                - preferred_term: 5-dehydro-4-deoxy-D-glucarate
                - preferred_term: water
              cofactors:
                - preferred_term: magnesium ion
              evidence:
                - source_id: EC:4.2.1.40
                  statement: glucarate dehydratase
                - source_id: UniPathway:UPA00564
                  statement: D-glucarate degradation step 1.
            role_description: >-
              First committed D-glucarate dehydration step. In PSEPK this role
              is represented by gudD/PP_4757.
    - order: 4
      role: D-galactarate dehydration
      node:
        id: galactarate_dehydratase_step
        label: D-galactarate dehydration
        module_type: REACTION
        annotons:
          - id: galactarate_dehydratase_activity
            label: Galactarate dehydratase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: galactarate dehydratase activity
                term:
                  id: GO:0008867
                  label: galactarate dehydratase activity
            function:
              preferred_term: galactarate dehydratase activity
              term:
                id: GO:0008867
                label: galactarate dehydratase activity
              substrates:
                - preferred_term: D-galactarate
              products:
                - preferred_term: 5-dehydro-4-deoxy-D-glucarate
              evidence:
                - source_id: EC:4.2.1.42
                  statement: galactarate dehydratase
                - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__hexuronate_aldarate_catabolism__ppu00053-deep-research-falcon.md
                  statement: >-
                    The PSEPK synthesis treats GarD as the galactarate
                    dehydratase feeding the KdgD/KgsD segment.
            role_description: >-
              D-galactarate branch dehydratase. In PSEPK this role is
              represented by garD/PP_3601; Falcon supports convergence on the
              downstream KdgD/KgsD segment while retaining a caveat about
              exact stereochemical intermediate mapping.
    - order: 5
      role: 5-dehydro-4-deoxyglucarate dehydration
      node:
        id: kdgd_dehydratase_step
        label: 5-dehydro-4-deoxy-D-glucarate to 2,5-dioxopentanoate
        module_type: REACTION
        annotons:
          - id: kdgd_dehydratase_activity
            label: 5-dehydro-4-deoxyglucarate dehydratase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 5-dehydro-4-deoxyglucarate dehydratase activity
                term:
                  id: GO:0047448
                  label: 5-dehydro-4-deoxyglucarate dehydratase activity
            function:
              preferred_term: 5-dehydro-4-deoxyglucarate dehydratase activity
              term:
                id: GO:0047448
                label: 5-dehydro-4-deoxyglucarate dehydratase activity
              substrates:
                - preferred_term: 5-dehydro-4-deoxy-D-glucarate
              products:
                - preferred_term: 2,5-dioxopentanoate
                - preferred_term: carbon dioxide
                - preferred_term: water
              evidence:
                - source_id: EC:4.2.1.41
                  statement: 5-dehydro-4-deoxyglucarate dehydratase
                - source_id: UniPathway:UPA00564
                  statement: D-glucarate degradation step 2.
            role_description: >-
              Second D-glucarate degradation step producing
              2,5-dioxopentanoate. In PSEPK this role is represented by
              PP_3599.
    - order: 6
      role: 2,5-dioxopentanoate or KGSA oxidation
      node:
        id: dioxovalerate_dehydrogenase_step
        label: 2,5-dioxopentanoate or KGSA to 2-oxoglutarate
        module_type: REACTION
        annotons:
          - id: dioxovalerate_dehydrogenase_activity
            label: 2,5-dioxovalerate dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 2,5-dioxovalerate dehydrogenase (NAD+) activity
                term:
                  id: GO:0044104
                  label: 2,5-dioxovalerate dehydrogenase (NAD+) activity
            function:
              preferred_term: 2,5-dioxovalerate dehydrogenase (NAD+) activity
              term:
                id: GO:0044104
                label: 2,5-dioxovalerate dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: 2,5-dioxopentanoate
                - preferred_term: NAD+
              products:
                - preferred_term: 2-oxoglutarate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.2.1.26
                  statement: 2,5-dioxovalerate dehydrogenase
                - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__hexuronate_aldarate_catabolism__ppu00053-deep-research-falcon.md
                  statement: >-
                    PP_3602 is the strongest local aldarate-pathway KGSADH
                    candidate in PSEPK; PP_1256 and PP_2585 are paralogous
                    but pathway-uncertain.
            role_description: >-
              Terminal oxidation to 2-oxoglutarate. PSEPK has multiple KGSADH
              paralogs; PP_3602 is the strongest local aldarate-pathway
              candidate because it is linked to the garD/kdgD neighborhood,
              while PP_1256 and PP_2585 remain candidate-uncertain paralogs
              for this module.
  connections:
    - source: uronate_dehydrogenase_step
      target: hexuronate_lactonase_candidate_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Udh produces glucaro- or galactaro-1,5-lactones that require lactone
        hydrolysis before aldarate dehydration.
      chaining_status: VERIFIED
      chaining_note: >-
        The product class from Udh is the expected lactonase substrate; the
        exact PSEPK lactonase substrate specificity remains to be tested.
    - source: hexuronate_lactonase_candidate_step
      target: glucarate_dehydratase_step
      connection_type: PROVIDES_INPUT_FOR
      description: Lactonase activity would yield D-glucarate for GudD.
      chaining_status: VERIFIED
      chaining_note: D-glucarate is the glucarate dehydratase substrate.
    - source: hexuronate_lactonase_candidate_step
      target: galactarate_dehydratase_step
      connection_type: PROVIDES_INPUT_FOR
      description: Lactonase activity would yield D-galactarate for GarD.
      chaining_status: VERIFIED
      chaining_note: D-galactarate is the galactarate dehydratase substrate.
    - source: glucarate_dehydratase_step
      target: kdgd_dehydratase_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        GudD produces 5-dehydro-4-deoxy-D-glucarate, the KDGDH substrate.
      chaining_status: VERIFIED
      chaining_note: >-
        UniProt/Rhea record D-glucarate dehydration to
        5-dehydro-4-deoxy-D-glucarate and KDGDH consumption of that product.
    - source: galactarate_dehydratase_step
      target: kdgd_dehydratase_step
      connection_type: PRECEDES
      description: >-
        The D-galactarate branch feeds the downstream keto-deoxy
        aldarate/KGSADH segment through a 5-dehydro-4-deoxy-D-glucarate-like
        intermediate.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        Falcon supports GarD convergence on the KdgD/KgsD segment in PSEPK, but
        the generic report retains an open stereochemical caveat for the exact
        galactarate-derived intermediate.
    - source: kdgd_dehydratase_step
      target: dioxovalerate_dehydrogenase_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        KDGDH produces 2,5-dioxopentanoate, the KGSADH substrate.
      chaining_status: VERIFIED
      chaining_note: >-
        2,5-dioxopentanoate is the product of the PP_3599 reaction and the
        substrate of EC 1.2.1.26 dehydrogenases.
  notes: >-
    For PSEPK ppu00053, treat udh, gnl/PP_1170, gudD, garD, PP_3599, and
    PP_3602 as the biologically relevant free-hexuronate/aldarate catabolism
    context. The KEGG membership also includes udg, but UDP-glucose
    6-dehydrogenase belongs to nucleotide-sugar biosynthesis and should not be
    counted as a free-aldarate catabolic step. PP_1256 and PP_2585 remain
    KGSADH-like paralogs that are not the preferred aldarate-pathway candidates
    in this module.
