id: MODULE:chemotaxis_receptor_panel_boundary
title: Chemotaxis receptor panel boundary
description: >-
  Boundary module for the ppu02030 known/named methyl-accepting chemotaxis
  receptor panel in Pseudomonas putida KT2440. The module groups characterized
  and named MCP receptors that feed chemoeffector information into bacterial
  chemotaxis signaling, while keeping orphan MCP/aerotaxis receptors and
  transport-binding spillovers outside this first-pass panel.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02030 provides the organism-specific bacterial chemotaxis umbrella
      that includes receptors, core Che signaling components,
      adaptation/accessory proteins, and transport spillovers.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.tsv
    title: ppu02030 bacterial chemotaxis partition table
    statement: >-
      The partition separates mcpH, ctpL, mcpU, mcpG, mcpA, pcaY, mcpP, mcpS,
      and mcpQ into the known/named MCP receptor panel.
  - source_id: PMID:26355499
    title: >-
      Identification of a chemoreceptor that specifically mediates chemotaxis
      toward metabolizable purine derivatives.
    statement: >-
      McpH recognizes purine derivatives and mcpH mutation abolishes chemotaxis
      toward the identified McpH ligands.
  - source_id: PMID:26662997
    title: >-
      Assessment of the contribution of chemoreceptor-based signalling to biofilm
      formation.
    statement: >-
      McpU mediates polyamine chemotaxis and McpA binds proteinogenic amino
      acids and mediates chemotaxis toward them.
  - source_id: PMID:25921834
    title: Specific gamma-aminobutyrate chemotaxis in pseudomonads with different lifestyle.
    statement: >-
      McpG is a specific GABA chemoreceptor in P. putida KT2440, and mcpG
      deletion reduces root colonization requiring chemotaxis through agar.
  - source_id: PMID:26048936
    title: Identification of a Chemoreceptor for C2 and C3 Carboxylic Acids.
    statement: >-
      McpP recognizes acetate, pyruvate, propionate, and L-lactate, and mcpP
      deletion reduces chemotaxis toward those ligands.
  - source_id: PMID:26463109
    title: >-
      McpQ is a specific citrate chemoreceptor that responds preferentially to
      citrate/metal ion complexes.
    statement: >-
      McpQ recognizes citrate and citrate/metal complexes and is required for a
      full chemotactic response to citrate/Mg(2+).
  - source_id: PMID:28620365
    title: >-
      Metabolic Value Chemoattractants Are Preferentially Recognized at Broad
      Ligand Range Chemoreceptor of Pseudomonas putida KT2440.
    statement: >-
      PcaY_PP recognizes multiple C6-ring carboxylic acids and pcaY_PP mutation
      abolishes chemotaxis toward those compounds.
  - source_id: file:PSEPK/mcpS/mcpS-ai-review.yaml
    title: Curated mcpS review
    statement: >-
      The mcpS review records McpS as the receptor for TCA-cycle intermediates
      and related organic acids, including malate, succinate, fumarate,
      oxaloacetate, citrate, isocitrate, and butyrate.
notes: >-
  First-pass interpretation: the receptor panel is biologically coherent but not
  a single linear reaction pathway. Each receptor contributes ligand-specific
  input to chemotaxis signaling. ctpL is retained as a named MCP-family receptor
  candidate with unresolved KT2440 ligand specificity; orphan MCP and aerotaxis
  receptors remain deferred until ligand or local pathway context is selected.
