        KT2440 CtpL ligand specificity and pathway coupling are unresolved in the
        current first-pass evidence.
      boundary: >-
        CtpL carries MCP-family and chemotaxis-domain evidence, but this pass did
        not identify a direct KT2440 ligand-binding or mutant chemotaxis paper for
        the receptor.
      resolution: >-
        Screen purified CtpL ligand-binding region against candidate nutrients and
        root-exudate compounds, then test ctpL mutant chemotaxis phenotypes.
    - gap_statement: >-
        Several characterized receptors lack substrate-specific GO molecular
        function terms.
      boundary: >-
        GO:0004888 is currently the practical molecular-function term for MCP
        receptor activity, but it does not capture purine, GABA, polyamine,
        amino-acid, short-chain carboxylate, citrate, TCA-intermediate, or
        C6-ring carboxylic-acid specificity.
      resolution: >-
        Consider GO-CAM/module-level modeling or future ontology patterns for
        receptor activity by ligand class rather than inventing local terms in
        this first-pass gene review.
