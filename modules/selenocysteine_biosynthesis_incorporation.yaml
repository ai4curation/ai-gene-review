id: MODULE:selenocysteine_biosynthesis_incorporation
title: Selenocysteine biosynthesis and co-translational incorporation (SEPHS2, PSTK, SEPSECS, SECISBP2, EEFSEC)
description: >-
  Selenocysteine (Sec), the 21st amino acid, is not charged onto its tRNA directly; instead it is synthesised
  on its own tRNA and then inserted co-translationally at recoded UGA codons, so a dedicated pathway both
  makes selenocysteyl-tRNA(Sec) and decodes UGA as Sec rather than stop. Two arms feed the process. Selenium
  activation: selenophosphate synthetase SEPHS2 (itself a selenoprotein, autoregulatory) uses ATP to convert
  hydrogen selenide to monoselenophosphate, the activated Se donor. tRNA-Sec charging: the tRNA(Sec) is first
  aminoacylated with serine by seryl-tRNA synthetase (SARS1, not in this module) to Ser-tRNA(Sec); the kinase
  PSTK phosphorylates that seryl residue to O-phosphoseryl-tRNA(Sec); and the PLP-dependent Sec synthase
  SEPSECS then transfers selenium from selenophosphate onto O-phosphoseryl-tRNA(Sec) to yield
  selenocysteyl-tRNA(Sec). Incorporation: at selenoprotein mRNAs, the SECIS-binding protein SECISBP2 binds the
  3'-UTR SECIS stem-loop and, with the selenocysteine-specific GTPase elongation factor EEFSEC delivering
  Sec-tRNA(Sec) to the ribosomal A-site, recodes the in-frame UGA as selenocysteine, allowing translation of
  the ~25 human selenoproteins (GPX, TXNRD, DIO, SELENOP, MSRB1, SELENOI, etc.). The paralog SEPHS1 lacks the
  selenophosphate-synthetase activity and instead acts in redox/glucose homeostasis (curated separately, not a
  catalytic node here). Inherited defects cause selenoprotein-deficiency disorders: SEPSECS (pontocerebellar
  hypoplasia type 2D), SECISBP2 (multisystem selenoprotein deficiency with abnormal thyroid-hormone metabolism)
  and EEFSEC (neurodevelopmental selenopathy).
status: DRAFT
evidence:
  - source_id: GO:0016260
    title: L-selenocysteine biosynthetic process
    statement: SEPHS2, PSTK and SEPSECS synthesise selenocysteyl-tRNA(Sec) (GO:0016260).
  - source_id: GO:0001514
    title: selenocysteine incorporation
    statement: SECISBP2 and EEFSEC recode UGA to insert selenocysteine into selenoproteins (GO:0001514).
  - source_id: file:human/SEPHS2/SEPHS2-ai-review.yaml
    title: SEPHS2 gene review (human)
    statement: The selenophosphate (Se donor) synthesis step (UniProtKB:Q99611, GO:0004756) matches the completed human SEPHS2 review.
  - source_id: file:human/PSTK/PSTK-ai-review.yaml
    title: PSTK gene review (human)
    statement: The Ser-tRNA(Sec) -> O-phosphoseryl-tRNA(Sec) step (UniProtKB:Q8IV42, GO:0043915) matches the completed human PSTK review.
  - source_id: file:human/SEPSECS/SEPSECS-ai-review.yaml
    title: SEPSECS gene review (human)
    statement: The O-phosphoseryl-tRNA(Sec) -> selenocysteyl-tRNA(Sec) step (UniProtKB:Q9HD40, GO:0098621) matches the completed human SEPSECS review.
  - source_id: file:human/SECISBP2/SECISBP2-ai-review.yaml
    title: SECISBP2 gene review (human)
    statement: The SECIS-element recognition step (UniProtKB:Q96T21, GO:0035368) matches the completed human SECISBP2 review.
  - source_id: file:human/EEFSEC/EEFSEC-ai-review.yaml
    title: EEFSEC gene review (human)
    statement: The Sec-tRNA(Sec) delivery / UGA-recoding step (UniProtKB:P57772, GO:0003746) matches the completed human EEFSEC review.
  - source_id: file:human/SEPHS1/SEPHS1-ai-review.yaml
    title: SEPHS1 gene review (human)
    statement: SEPHS1 (UniProtKB:P49903) is the non-catalytic paralog (redox/homeostasis), included as context, not a catalytic node.
module:
  id: selenocysteine_biosynthesis_incorporation
  label: Selenocysteine biosynthesis and incorporation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-selenocysteine biosynthetic process
      term:
        id: GO:0016260
        label: L-selenocysteine biosynthetic process
      description: Synthesis of selenocysteyl-tRNA(Sec) via Se activation and on-tRNA conversion.
    - preferred_term: selenocysteine incorporation
      term:
        id: GO:0001514
        label: selenocysteine incorporation
      description: Co-translational recoding of UGA as selenocysteine in selenoprotein mRNAs.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All steps occur in the cytosol (SEPHS2, PSTK, SEPSECS, SECISBP2, EEFSEC).
  parts:
    - order: 1
      role: selenium activation (selenophosphate donor)
      node:
        id: selenophosphate_synthesis
        label: Selenophosphate synthetase 2 (SEPHS2)
        module_type: REACTION
        annotons:
          - id: sephs2_activity
            label: "SEPHS2: selenide, water dikinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SEPHS / selenophosphate synthetase (AIRS) family
                term:
                  id: PANTHER:PTHR10256
                  label: SELENIDE, WATER DIKINASE
                representative_members:
                  - preferred_term: SEPHS2 (human; catalytically active selenoprotein)
                    term:
                      id: UniProtKB:Q99611
                      label: Selenide, water dikinase 2
            function:
              preferred_term: selenide, water dikinase activity
              term:
                id: GO:0004756
                label: selenide, water dikinase activity
              substrates:
                - preferred_term: hydrogenselenide
                - preferred_term: ATP + H2O
              products:
                - preferred_term: selenophosphate (activated Se donor)
                - preferred_term: AMP + phosphate
              evidence:
                - source_id: file:human/SEPHS2/SEPHS2-ai-review.yaml
                  statement: Sec-containing (autoregulatory) selenophosphate synthetase making the activated selenium donor selenophosphate for Sec biosynthesis; the SEPHS1 paralog lacks this activity
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Make selenophosphate (activated Se donor) from selenide + ATP.
    - order: 2
      role: tRNA(Sec) seryl-phosphorylation
      node:
        id: seryl_trna_phosphorylation
        label: O-phosphoseryl-tRNA(Sec) kinase (PSTK)
        module_type: REACTION
        annotons:
          - id: pstk_activity
            label: "PSTK: L-seryl-tRNA(Sec) kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PSTK / O-phosphoseryl-tRNA(Sec) kinase family
                term:
                  id: PANTHER:PTHR20873
                  label: L-SERYL-TRNA(SEC) KINASE
                representative_members:
                  - preferred_term: PSTK (human)
                    term:
                      id: UniProtKB:Q8IV42
                      label: L-seryl-tRNA(Sec) kinase
            function:
              preferred_term: L-seryl-tRNA(Sec) kinase activity
              term:
                id: GO:0043915
                label: L-seryl-tRNA(Sec) kinase activity
              substrates:
                - preferred_term: L-seryl-tRNA(Sec) (from SARS1)
                - preferred_term: ATP
              products:
                - preferred_term: O-phospho-L-seryl-tRNA(Sec)
                - preferred_term: ADP
              evidence:
                - source_id: file:human/PSTK/PSTK-ai-review.yaml
                  statement: ATP-dependent kinase phosphorylating the seryl moiety of Ser-tRNA(Sec) to O-phosphoseryl-tRNA(Sec), the activated intermediate for SEPSECS
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Phosphorylate Ser-tRNA(Sec) to O-phosphoseryl-tRNA(Sec).
    - order: 3
      role: selenocysteyl-tRNA(Sec) synthesis
      node:
        id: sec_trna_synthesis
        label: Selenocysteine synthase (SEPSECS)
        module_type: REACTION
        annotons:
          - id: sepsecs_activity
            label: "SEPSECS: O-phosphoseryl-tRNA(Sec) selenium transferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SEPSECS / Sec synthase family
                term:
                  id: PANTHER:PTHR12944
                  label: O-PHOSPHOSERYL-TRNA(SEC) SELENIUM TRANSFERASE
                representative_members:
                  - preferred_term: SEPSECS (human)
                    term:
                      id: UniProtKB:Q9HD40
                      label: O-phosphoseryl-tRNA(Sec) selenium transferase
            function:
              preferred_term: O-phosphoseryl-tRNA(Sec) selenium transferase activity
              term:
                id: GO:0098621
                label: O-phosphoseryl-tRNA(Sec) selenium transferase activity
              substrates:
                - preferred_term: O-phospho-L-seryl-tRNA(Sec) (PLP cofactor)
                - preferred_term: selenophosphate (from SEPHS2)
              products:
                - preferred_term: L-selenocysteyl-tRNA(Sec)
                - preferred_term: phosphate
              evidence:
                - source_id: file:human/SEPSECS/SEPSECS-ai-review.yaml
                  statement: PLP-dependent Sec synthase transferring selenium from selenophosphate onto O-phosphoseryl-tRNA(Sec) to make selenocysteyl-tRNA(Sec); deficiency = pontocerebellar hypoplasia 2D
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Convert O-phosphoseryl-tRNA(Sec) + selenophosphate to Sec-tRNA(Sec).
    - order: 4
      role: SECIS-element recognition
      node:
        id: secis_recognition
        label: SECIS-binding protein 2 (SECISBP2)
        module_type: REACTION
        annotons:
          - id: secisbp2_activity
            label: "SECISBP2: SECIS-element binding protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SECISBP2 / L7Ae (SECIS-binding) family
                term:
                  id: PANTHER:PTHR13284
                  label: SELENOCYSTEINE INSERTION SEQUENCE-BINDING PROTEIN 2
                representative_members:
                  - preferred_term: SECISBP2 (human)
                    term:
                      id: UniProtKB:Q96T21
                      label: Selenocysteine insertion sequence-binding protein 2
            function:
              preferred_term: selenocysteine insertion sequence binding
              term:
                id: GO:0035368
                label: selenocysteine insertion sequence binding
              substrates:
                - preferred_term: SECIS element (selenoprotein mRNA 3'-UTR stem-loop)
              products:
                - preferred_term: SECIS-SECISBP2 recoding complex (recruits EEFSEC)
              evidence:
                - source_id: file:human/SECISBP2/SECISBP2-ai-review.yaml
                  statement: L7Ae-family RNA-binding protein binding the SECIS stem-loop and recruiting the Sec-incorporation machinery to recode UGA; deficiency = multisystem selenoprotein deficiency / abnormal thyroid hormone metabolism
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Bind the SECIS element and nucleate the UGA-recoding complex.
    - order: 5
      role: Sec-tRNA(Sec) delivery / UGA recoding
      node:
        id: sec_incorporation
        label: Selenocysteine-specific elongation factor (EEFSEC)
        module_type: REACTION
        annotons:
          - id: eefsec_activity
            label: "EEFSEC: selenocysteine-specific elongation factor (GTPase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: EEFSEC / SelB (EF-Tu/EF-1A) family
                term:
                  id: PANTHER:PTHR43721
                  label: SELENOCYSTEINE-SPECIFIC ELONGATION FACTOR
                representative_members:
                  - preferred_term: EEFSEC (human)
                    term:
                      id: UniProtKB:P57772
                      label: Selenocysteine-specific elongation factor
            function:
              preferred_term: translation elongation factor activity
              term:
                id: GO:0003746
                label: translation elongation factor activity
              substrates:
                - preferred_term: selenocysteyl-tRNA(Sec) + GTP
                - preferred_term: ribosomal A-site at UGA (with SECIS-SECISBP2)
              products:
                - preferred_term: selenocysteine incorporated at UGA (+ GDP + phosphate)
              evidence:
                - source_id: file:human/EEFSEC/EEFSEC-ai-review.yaml
                  statement: EF-Tu-family GTPase (GO:0003924) that specifically binds selenocysteyl-tRNA(Sec) and delivers it to the ribosomal A-site to decode in-frame UGA as selenocysteine, with SECISBP2/SECIS
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Deliver Sec-tRNA(Sec) (GTP-dependent) to recode UGA as selenocysteine.
  connections:
    - source: selenophosphate_synthesis
      target: sec_trna_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The selenophosphate made by SEPHS2 is the Se donor consumed by SEPSECS.
    - source: seryl_trna_phosphorylation
      target: sec_trna_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The O-phosphoseryl-tRNA(Sec) made by PSTK is the substrate SEPSECS selenates.
    - source: sec_trna_synthesis
      target: sec_incorporation
      connection_type: PROVIDES_INPUT_FOR
      description: The selenocysteyl-tRNA(Sec) made by SEPSECS is delivered by EEFSEC to the ribosome.
    - source: secis_recognition
      target: sec_incorporation
      connection_type: POSITIVELY_REGULATES
      description: SECISBP2 bound to the SECIS element recruits/activates EEFSEC-Sec-tRNA(Sec) to recode the UGA codon.
  notes: >-
    Selenocysteine biosynthesis (GO:0016260) and co-translational incorporation (GO:0001514), grounded to six
    completed human gene reviews (SEPHS1 the non-catalytic paralog cited as context). Se ACTIVATION: SEPHS2
    (Q99611 PTHR10256, GO:0004756 selenide,water dikinase; a Sec-containing autoregulatory selenoprotein).
    tRNA-Sec CHARGING (on tRNA[Ser]Sec, initially seryl-charged by SARS1, separate): PSTK (Q8IV42 PTHR20873,
    GO:0043915 kinase) -> SEPSECS (Q9HD40 PTHR12944, GO:0098621 PLP Sec synthase; pontocerebellar hypoplasia
    2D). INCORPORATION: SECISBP2 (Q96T21 PTHR13284, GO:0035368 SECIS binding; multisystem selenoprotein
    deficiency) + EEFSEC (P57772 PTHR43721, GO:0003746 EF + GO:0003924 GTPase) recode UGA. SEPHS1 (P49903,
    same PTHR10256 as SEPHS2) is EXCLUDED as a catalytic node — it lacks selenophosphate-synthetase activity
    (Arg not Sec/Cys) and acts in redox/transcription (its review MARK_AS_OVER_ANNOTATED the dikinase IEAs).
    Recurrent curation: several selenocysteine BP terms are OBSOLETE (GO:0097056 selenocysteinyl-tRNA(Sec)
    biosynthesis, GO:0016259 selenocysteine metabolic) -> current GO:0001717 / GO:0016260 / GO:0001514.
    The pathway supplies every human selenoprotein (GPX1/4, TXNRD1/2, DIO1-3, SELENOP, MSRB1, SELENOI [Kennedy
    module], SEPHS2 itself). GO term ids/labels verified against the local go.db. Disorders: SEPSECS PCH2D,
    SECISBP2 selenoprotein deficiency, EEFSEC selenopathy.
