id: MODULE:bacterial_fatty_acid_beta_oxidation
title: Bacterial fatty acid beta-oxidation and acyl-CoA activation
description: >-
  A bacterial fatty-acid degradation boundary module covering activation of
  free fatty acids to acyl-CoA thioesters, the FAD-dependent acyl-CoA
  dehydrogenase step, hydration and oxidation of enoyl/hydroxyacyl-CoA
  intermediates, and thiolytic cleavage to acetyl-CoA plus a shortened acyl-CoA.
  For Pseudomonas putida KT2440, KEGG ppu00071 is pathway-satisfiable but the
  local membership list is incomplete and noisy: PP_0368, PP_0370, PP_0763, and
  hbd/PP_3755 are promoted gap-fill candidates, while alkane/rubredoxin
  electron-transfer nodes are upstream boundary context rather than
  beta-oxidation spiral enzymes. UniPathway UPA00659 adds PP_4030 as an
  auxiliary enoyl-CoA hydratase/isomerase-family candidate for unsaturated
  fatty-acid beta-oxidation context. The Falcon PP_4559 CoA-ligase suggestion
  conflicts with current UniProt/GOA/PANTHER evidence for def2/PP_4559 as
  peptide deformylase and should be treated as an identifier-conflict follow-up.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00071
    title: Fatty acid degradation - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00071 membership. The
      candidate list includes beta-oxidation enzymes, acyl-CoA activation
      enzymes, acyl-CoA dehydrogenase paralogs, thiolases, and alkane/rubredoxin
      side nodes.
  - source_id: UniPathway:UPA00191
    title: UniPathway UPA00191
    statement: >-
      The local UPA00191 membership set contains rubA as a rubredoxin
      electron-transfer component of hydrocarbon/alkane oxidation context.
  - source_id: UniPathway:UPA00659
    title: UniPathway UPA00659
    statement: >-
      The local UPA00659 membership set contains fadE, fadB, fadA, and PP_4030,
      tying the already-curated core beta-oxidation enzymes to an additional
      enoyl-CoA hydratase/isomerase-family auxiliary candidate.
  - source_id: file:modules/bacterial_fatty_acid_beta_oxidation-deep-research-falcon.md
    title: Falcon generic bacterial beta-oxidation module report
    statement: >-
      The generic Falcon report supports the core activation, dehydrogenation,
      hydration, oxidation, and thiolysis step model, emphasizes paralog and
      chain-length variation across bacteria, and treats alkane oxidation as
      connected but mechanistically distinct boundary context.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__bacterial_fatty_acid_beta_oxidation__ppu00071-deep-research-falcon.md
    title: Falcon PSEPK ppu00071 pathway satisfiability report
    statement: >-
      The PSEPK Falcon report concludes that KT2440 satisfies the beta-oxidation
      module but that the KEGG-derived candidate list misses PP_0368, PP_0370,
      PP_0763, and PP_3755 and includes several unrelated or boundary nodes.
  - source_id: file:PSEPK/fadD-I/fadD-I-ai-review.yaml
    title: PSEPK fadD-I gene review
    statement: >-
      The curated fadD-I review supports long-chain fatty acid-CoA ligase
      activity for fatty-acid activation upstream of beta-oxidation.
  - source_id: file:PSEPK/rubA/rubA-ai-review.yaml
    title: PSEPK rubA gene review
    statement: >-
      The curated rubA review supports rubredoxin electron-transfer activity and
      alkane catabolic process context, while keeping iron/metal binding and
      cytoplasm as non-core supporting features.
  - source_id: file:PSEPK/PP_0763/PP_0763-ai-review.yaml
    title: PSEPK PP_0763 gene review
    statement: >-
      The curated PP_0763 review supports medium-chain fatty acid-CoA ligase
      activity as a promoted short-chain activation candidate for ppu00071.
  - source_id: file:PSEPK/PP_0368/PP_0368-ai-review.yaml
    title: PSEPK PP_0368 gene review
    statement: >-
      The curated PP_0368 review supports broad acyl-CoA dehydrogenase-family
      activity and records the PSEPK Falcon-promoted long-chain beta-oxidation
      candidate role.
  - source_id: file:PSEPK/PP_0370/PP_0370-ai-review.yaml
    title: PSEPK PP_0370 gene review
    statement: >-
      The curated PP_0370 review supports broad acyl-CoA dehydrogenase-family
      activity and records the PSEPK Falcon-promoted medium-chain
      beta-oxidation candidate role.
  - source_id: file:PSEPK/fadE/fadE-ai-review.yaml
    title: PSEPK fadE gene review
    statement: >-
      The curated fadE review supports long- and medium-chain acyl-CoA
      dehydrogenase activity in fatty acid beta-oxidation.
  - source_id: file:PSEPK/fadB/fadB-ai-review.yaml
    title: PSEPK fadB gene review
    statement: >-
      The curated fadB review supports enoyl-CoA hydratase and
      hydroxyacyl-CoA dehydrogenase activities in the beta-oxidation spiral.
  - source_id: file:PSEPK/PP_4030/PP_4030-ai-review.yaml
    title: PSEPK PP_4030 gene review
    statement: >-
      The curated PP_4030 review supports fatty acid beta-oxidation context and
      a candidate delta(3,5)-delta(2,4)-dienoyl-CoA isomerase-family role while
      leaving substrate specificity unresolved.
  - source_id: file:PSEPK/hbd/hbd-ai-review.yaml
    title: PSEPK hbd gene review
    statement: >-
      The curated hbd/PP_3755 review supports 3-hydroxybutyryl-CoA
      dehydrogenase activity as a promoted short-chain hydroxyacyl-CoA oxidation
      candidate for ppu00071.
  - source_id: file:PSEPK/fadA__Q88L01/fadA__Q88L01-ai-review.yaml
    title: PSEPK fadA gene review
    statement: >-
      The curated fadA review supports acetyl-CoA C-acyltransferase/thiolase
      activity for the terminal cleavage step of beta-oxidation.
module:
  id: bacterial_fatty_acid_beta_oxidation
  label: Bacterial fatty acid beta-oxidation and acyl-CoA activation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
      description: >-
        Repeated shortening of fatty acyl-CoA thioesters by the beta-oxidation
        spiral to generate acetyl-CoA.
    - preferred_term: fatty acid beta-oxidation using acyl-CoA dehydrogenase
      term:
        id: GO:0033539
        label: fatty acid beta-oxidation using acyl-CoA dehydrogenase
      description: >-
        The FAD-dependent acyl-CoA dehydrogenase route used by bacterial
        beta-oxidation enzymes.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Bacterial beta-oxidation enzymes operate in the cytoplasm or at the membrane/cytoplasm interface.
      - preferred_term: membrane
        term:
          id: GO:0016020
          label: membrane
        description: Fatty-acid uptake and activation enzymes can be membrane-associated.
  parts:
    - order: 1
      role: fatty-acid activation to acyl-CoA
      node:
        id: fatty_acid_activation
        label: Fatty acid to fatty acyl-CoA
        module_type: REACTION
        description: >-
          Fatty acid-CoA ligases activate free fatty acids to acyl-CoA thioesters
          that can enter beta-oxidation. KT2440 has FadD-I/FadD-II as the main
          long-chain and medium-chain activation pair and PP_0763 as a promoted
          short-chain/medium-chain activation candidate. The PP_4559 CoA-ligase
          claim from Falcon conflicts with current def2/PP_4559 peptide
          deformylase evidence and is not counted as module satisfaction.
        annotons:
          - id: long_chain_fatty_acid_coa_ligase_activity
            label: Long-chain fatty acid-CoA ligase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: long-chain fatty acid-CoA ligase activity
                term:
                  id: GO:0004467
                  label: long-chain fatty acid-CoA ligase activity
            function:
              preferred_term: long-chain fatty acid-CoA ligase activity
              term:
                id: GO:0004467
                label: long-chain fatty acid-CoA ligase activity
              substrates:
                - preferred_term: long-chain fatty acid
                - preferred_term: CoA
                - preferred_term: ATP
              products:
                - preferred_term: long-chain fatty acyl-CoA
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:6.2.1.3
                  statement: long-chain fatty-acid-CoA ligase
          - id: medium_chain_fatty_acid_coa_ligase_activity
            label: Medium-chain fatty acid-CoA ligase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: medium-chain fatty acid-CoA ligase activity
                term:
                  id: GO:0031956
                  label: medium-chain fatty acid-CoA ligase activity
            function:
              preferred_term: medium-chain fatty acid-CoA ligase activity
              term:
                id: GO:0031956
                label: medium-chain fatty acid-CoA ligase activity
              substrates:
                - preferred_term: medium-chain fatty acid
                - preferred_term: CoA
                - preferred_term: ATP
              products:
                - preferred_term: medium-chain fatty acyl-CoA
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: file:PSEPK/PP_0763/PP_0763-ai-review.yaml
                  statement: PP_0763 is a promoted medium-chain fatty acid-CoA ligase candidate for ppu00071 short-chain activation.
    - order: 2
      role: FAD-dependent acyl-CoA dehydrogenation
      node:
        id: acyl_coa_dehydrogenation
        label: Fatty acyl-CoA to trans-2-enoyl-CoA
        module_type: REACTION
        description: >-
          Acyl-CoA dehydrogenases catalyze the first beta-oxidation spiral step.
          PSEPK has several paralogs, including chain-length-annotated candidates
          and unresolved acyl-CoA dehydrogenase-family proteins. The PSEPK
          pathway report promotes PP_0368 and PP_0370 as primary long-chain and
          medium-chain ACAD candidates, while PP_2437 is a characterized
          medium-to-long-chain candidate and fadE/PP_1893 is retained as a
          secondary candidate.
        annotons:
          - id: long_chain_acyl_coa_dehydrogenase_activity
            label: Long-chain fatty acyl-CoA dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: long-chain fatty acyl-CoA dehydrogenase activity
                term:
                  id: GO:0004466
                  label: long-chain fatty acyl-CoA dehydrogenase activity
            function:
              preferred_term: long-chain fatty acyl-CoA dehydrogenase activity
              term:
                id: GO:0004466
                label: long-chain fatty acyl-CoA dehydrogenase activity
              substrates:
