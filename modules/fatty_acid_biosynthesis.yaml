id: MODULE:fatty_acid_biosynthesis
title: Type-II fatty acid biosynthesis module
description: >-
  A bacterial type-II fatty acid synthesis boundary module covering formation of
  malonyl-CoA and malonyl-ACP, iterative acyl-ACP chain elongation, reduction
  and dehydration steps, enoyl-ACP reduction, and the unsaturated fatty-acid
  branch. In pseudomonads, the initiation condensation step should allow FabB as
  an alternative or primary initiator rather than assuming a FabH-only model. For
  Pseudomonas putida KT2440, KEGG ppu00061 also pulls in acyl-CoA ligases and
  weak SDR/aromatic-catabolism side candidates that should be reviewed as
  boundary context rather than assumed core FAS-II enzymes.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00061
    title: Fatty acid biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00061 membership; the
      membership includes acetyl-CoA carboxylase subunits, acyl carrier
      protein-linked fatty-acid synthesis enzymes, acyl-CoA ligases, and several
      low-specificity reductase/dehydrogenase candidates.
  - source_id: UniPathway:UPA00094
    title: Fatty acid biosynthesis support view
    statement: >-
      UniPathway UPA00094 supplies an ACP-linked support view of the same FAS-II
      module: acpP is the phosphopantetheinylated acyl carrier protein, while
      accB and the Fab enzymes in this bucket are already covered by the
      completed fatty-acid-biosynthesis module boundary.
  - source_id: file:PSEPK/accC/accC-ai-review.yaml
    title: PSEPK accC gene review
    statement: >-
      The curated AccC review supports biotin carboxylase activity in
      malonyl-CoA generation for fatty acid biosynthesis.
  - source_id: file:PSEPK/acpP/acpP-ai-review.yaml
    title: PSEPK acpP gene review
    statement: >-
      The curated AcpP review supports cytoplasmic acyl carrier activity as the
      core gene-level function of the canonical FAS-II acyl carrier protein.
  - source_id: file:modules/fatty_acid_biosynthesis-deep-research-falcon.md
    title: Falcon generic fatty acid biosynthesis module report
    statement: >-
      Generic module-level Falcon research supports broadening the initiation
      model beyond FabH in pseudomonads and distinguishing core FAS-II from
      beta-oxidation and other lipid-metabolism boundary enzymes.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__fatty_acid_biosynthesis__ppu00061-deep-research-falcon.md
    title: Falcon PSEPK ppu00061 fatty acid biosynthesis report
    statement: >-
      Species-aware Falcon research for KT2440 supports a complete FAS-II module
      centered on accABCD, fabD, fabG, fabZ, fabA, fabB, fabF, PP_4379, and fabV,
      while treating PP_1852, PP_0581, and PP_2540 as uncertain boundary
      candidates and excluding fadD-I, fadD-II, and PP_2783 from core FAS-II.
module:
  id: fatty_acid_biosynthesis
  label: Type-II fatty acid biosynthesis module
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid biosynthetic process
      term:
        id: GO:0006633
        label: fatty acid biosynthetic process
      description: >-
        The overall process of de novo fatty acid chain synthesis in bacteria.
    - preferred_term: malonyl-CoA biosynthetic process
      term:
        id: GO:2001295
        label: malonyl-CoA biosynthetic process
      description: >-
        Acetyl-CoA carboxylase generates malonyl-CoA, the committed activated
        two-carbon donor for FAS-II elongation.
    - preferred_term: acyl carrier activity
      term:
        id: GO:0000036
        label: acyl carrier activity
      description: >-
        Phosphopantetheinylated acyl carrier protein carries malonyl and acyl
        chain intermediates through the type-II fatty-acid-synthesis cycle.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          Most bacterial FAS-II enzymes are soluble cytosolic enzymes acting on
          acyl carrier protein-linked intermediates.
  parts:
    - order: 1
      role: acetyl-CoA carboxylase / malonyl-CoA formation
      node:
        id: acetyl_coa_to_malonyl_coa
        label: Acetyl-CoA to malonyl-CoA
        module_type: REACTION
        description: >-
          Multisubunit bacterial acetyl-CoA carboxylase carboxylates acetyl-CoA
          to malonyl-CoA through biotin carboxylase, biotin carboxyl carrier
          protein, and carboxyltransferase components.
        annotons:
          - id: acetyl_coa_carboxylase_activity
            label: Acetyl-CoA carboxylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: acetyl-CoA carboxylase activity
                term:
                  id: GO:0003989
                  label: acetyl-CoA carboxylase activity
            function:
              preferred_term: acetyl-CoA carboxylase activity
              term:
                id: GO:0003989
                label: acetyl-CoA carboxylase activity
              substrates:
                - preferred_term: acetyl-CoA
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
              products:
                - preferred_term: malonyl-CoA
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.4.1.2
                  statement: acetyl-CoA carboxylase overall reaction
          - id: biotin_carboxylase_activity
            label: Biotin carboxylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: biotin carboxylase activity
                term:
                  id: GO:0004075
                  label: biotin carboxylase activity
            function:
              preferred_term: biotin carboxylase activity
              term:
                id: GO:0004075
                label: biotin carboxylase activity
              evidence:
                - source_id: EC:6.3.4.14
                  statement: biotin carboxylase subreaction
    - order: 2
      role: acyl carrier protein carrier pool
      node:
        id: acyl_carrier_protein_pool
        label: Acyl carrier protein carrier pool
        module_type: MOLECULAR_FUNCTION
        description: >-
          AcpP provides the phosphopantetheinylated carrier scaffold for
          malonyl-ACP and growing acyl-ACP intermediates used throughout FAS-II.
        annotons:
          - id: acpP_acyl_carrier_activity
            label: AcpP acyl carrier protein
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK acpP
                term:
                  id: UniProtKB:Q88LL5
                  label: Acyl carrier protein
            function:
              preferred_term: acyl carrier activity
              term:
                id: GO:0000036
                label: acyl carrier activity
              evidence:
                - source_id: file:PSEPK/acpP/acpP-ai-review.yaml
                  statement: >-
                    AcpP is reviewed as the cytoplasmic acyl carrier protein
                    carrying growing acyl chains during type-II fatty acid
                    biosynthesis.
                - source_id: UniPathway:UPA00094
                  statement: >-
                    UPA00094 includes acpP as the ACP-linked fatty-acid
                    biosynthesis support member.
            processes:
              - preferred_term: fatty acid biosynthetic process
                term:
                  id: GO:0006633
                  label: fatty acid biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              Carries malonyl and acyl intermediates as phosphopantetheine
              thioesters for the FAS-II reaction cycle.
    - order: 3
      role: malonyl-ACP formation
      node:
        id: malonyl_coa_to_malonyl_acp
        label: Malonyl-CoA to malonyl-ACP
        module_type: REACTION
        annotons:
          - id: malonyl_acp_transferase_activity
            label: Malonyl CoA-acyl carrier protein transacylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: "[acyl-carrier-protein] S-malonyltransferase activity"
                term:
                  id: GO:0004314
                  label: "[acyl-carrier-protein] S-malonyltransferase activity"
            function:
              preferred_term: "[acyl-carrier-protein] S-malonyltransferase activity"
              term:
                id: GO:0004314
                label: "[acyl-carrier-protein] S-malonyltransferase activity"
              substrates:
                - preferred_term: malonyl-CoA
                - preferred_term: acyl carrier protein
              products:
                - preferred_term: malonyl-[acyl-carrier protein]
                - preferred_term: CoA
              evidence:
                - source_id: EC:2.3.1.39
                  statement: malonyl-CoA-acyl carrier protein transacylase
    - order: 4
      role: acyl-ACP condensation and initiation
      node:
        id: beta_ketoacyl_acp_synthesis
        label: 3-oxoacyl-ACP synthesis
        module_type: REACTION
        description: >-
          Condensing enzymes initiate and elongate acyl-ACP chains. Canonical
          KAS III/FabH chemistry can initiate with an acyl-CoA primer, but
          Falcon pathway synthesis and P. putida F1 literature indicate that
          FabB can also support initiation in pseudomonads; KT2440 module
          satisfiability should therefore allow both PP_4379/FabH-like and
          FabB-like initiation hypotheses.
        annotons:
          - id: beta_ketoacyl_acp_synthase_activity
            label: 3-oxoacyl-[acyl-carrier-protein] synthase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 3-oxoacyl-[acyl-carrier-protein] synthase activity
                term:
                  id: GO:0004315
                  label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
            function:
              preferred_term: 3-oxoacyl-[acyl-carrier-protein] synthase activity
              term:
                id: GO:0004315
                label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
              substrates:
                - preferred_term: malonyl-[acyl-carrier protein]
                - preferred_term: acyl-[acyl-carrier protein]
              products:
                - preferred_term: 3-oxoacyl-[acyl-carrier protein]
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:2.3.1.41
                  statement: beta-ketoacyl-ACP synthase I
                - source_id: EC:2.3.1.179
                  statement: beta-ketoacyl-ACP synthase II
                - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__fatty_acid_biosynthesis__ppu00061-deep-research-falcon.md
                  statement: >-
                    KT2440 satisfiability should not assume FabH-only initiation;
                    FabB may provide an alternative or primary initiation route in
                    pseudomonads.
          - id: beta_ketoacyl_acp_synthase_iii_activity
            label: Beta-ketoacyl-acyl-carrier-protein synthase III
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: beta-ketoacyl-acyl-carrier-protein synthase III activity
                term:
                  id: GO:0033818
                  label: beta-ketoacyl-acyl-carrier-protein synthase III activity
            function:
              preferred_term: beta-ketoacyl-acyl-carrier-protein synthase III activity
              term:
                id: GO:0033818
                label: beta-ketoacyl-acyl-carrier-protein synthase III activity
              substrates:
                - preferred_term: acetyl-CoA
                - preferred_term: malonyl-[acyl-carrier protein]
              products:
                - preferred_term: acetoacetyl-[acyl-carrier protein]
                - preferred_term: CoA
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:2.3.1.180
                  statement: beta-ketoacyl-acyl-carrier-protein synthase III
                - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__fatty_acid_biosynthesis__ppu00061-deep-research-falcon.md
                  statement: >-
                    PP_4379 should remain a candidate initiator, but FabH-like
                    essentiality should not be assumed for KT2440.
