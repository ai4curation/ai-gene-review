                                - preferred_term: malonyl-ACP
                              products:
                                - preferred_term: 3-oxodecanoyl-ACP
                                - preferred_term: CoA
                                - preferred_term: carbon dioxide
                            role_description: >-
                              Uses a medium-chain acyl-CoA primer to enter
                              FAS-II at a correspondingly longer chain length.
              - id: mad_decarboxylase_route
                label: Mad/YiiD malonyl-ACP decarboxylase route
                module_type: METABOLIC_PATHWAY
                description: >-
                  Mad-family decarboxylation creates acetyl-ACP, which a
