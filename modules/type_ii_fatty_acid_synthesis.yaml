id: MODULE:type_ii_fatty_acid_synthesis
title: Type-II fatty-acid synthesis
description: >-
  A reusable dissociated bacterial fatty-acid synthase pathway that forms
  malonyl-CoA with acetyl-CoA carboxylase, loads malonate onto acyl carrier
  protein, initiates an acyl-ACP chain, and iteratively elongates that chain
  through condensation, beta-keto reduction, dehydration, and enoyl reduction.
  An optional FabA/FabB branch introduces and extends cis unsaturation.
  Enzyme-family and cofactor variants are represented explicitly rather than
  collapsed into a type-I fatty-acid synthase.
status: DRAFT
evidence:
  - source_id: GO:0006633
    title: fatty acid biosynthetic process
    statement: >-
      GO:0006633 provides the biological-process scope for de novo fatty-acid
      chain initiation and elongation.
  - source_id: file:modules/type_ii_fatty_acid_synthesis-deep-research-openscientist.md
    title: OpenScientist research for the reusable type-II fatty-acid synthesis module
    statement: >-
      The module-level review supports the obligatory initiation and
      four-reaction elongation sequence, while documenting enzyme-family
      variation and the conditional FabA/FabB unsaturation branch.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__type_ii_fatty_acid_synthesis__ppu00061-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00061 pathway satisfiability review
    statement: >-
      The species-aware review finds the KT2440 pathway satisfiable, identifies
      AcpP and FabV as core members, and flags several same-family paralogs as
      candidates that must not be assumed to perform the core pathway role.
  - source_id: file:PSEPK/accC/accC-ai-review.yaml
    title: PSEPK accC gene review
    statement: >-
      The KT2440 review identifies Q88QD6 as the biotin-carboxylase subunit of
      acetyl-CoA carboxylase.
  - source_id: file:PSEPK/fabD/fabD-uniprot.txt
    title: UniProtKB entry Q88LL7 for PSEPK FabD
    statement: >-
      UniProt identifies Q88LL7 as malonyl-CoA:ACP transacylase.
  - source_id: file:PSEPK/PP_4379/PP_4379-uniprot.txt
    title: UniProtKB entry Q88ES4 for PSEPK PP_4379
    statement: >-
      UniProt assigns Q88ES4 beta-ketoacyl-ACP synthase III activity.
  - source_id: file:PSEPK/PP_4545/PP_4545-uniprot.txt
    title: UniProtKB entry Q88EC1 for PSEPK PP_4545
    statement: >-
      UniProt assigns Q88EC1 beta-ketodecanoyl-ACP synthase activity.
  - source_id: file:PSEPK/PP_0262/PP_0262-uniprot.txt
    title: UniProtKB entry Q88R72 for PSEPK PP_0262
    statement: >-
      UniProt links Q88R72 to the primary structural and biochemical study of
      the standalone MadB malonyl-ACP decarboxylase.
  - source_id: PMID:36796578
    title: Initiation of fatty acid biosynthesis in Pseudomonas putida KT2440
    statement: >-
      Direct genetics and biochemistry establish three initiation routes:
      short-chain-acyl-CoA-selective FabH1, medium-chain-acyl-CoA-selective
      FabH2, and MadB-dependent production of acetyl-ACP from malonyl-ACP.
  - source_id: file:PSEPK/fabV/fabV-uniprot.txt
    title: UniProtKB entry Q88E33 for PSEPK FabV
    statement: >-
      UniProt identifies Q88E33 as the NADH-dependent enoyl-ACP reductase of
      FAS-II.
module:
  id: type_ii_fatty_acid_synthesis
  label: Type-II fatty-acid synthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid biosynthetic process
      term:
        id: GO:0006633
        label: fatty acid biosynthetic process
      description: >-
        Dissociated ACP-based initiation and iterative elongation of saturated
        and unsaturated fatty-acid chains.
  parts:
    - order: 1
      role: malonyl-CoA formation
      node:
        id: acetyl_coa_carboxylation
