  notes: >-
    Exact KT2440 accessions are representative members and do not restrict the
    module to Pseudomonas. Same-family paralogs without a distinct, supported
    pathway role remain gene-level curation questions rather than separate
    module variants. ACP phosphopantetheinylation is required before use but is
    activation context outside this pathway boundary. PANTHER
    PTHR43639:SF1 is a broad SDR grouping and is deliberately not used to
    delimit the FabL variant; the experimentally characterized Bacillus FabL
    accession is retained as the exemplar. The existing
    fatty_acid_de_novo_synthesis module describes type-I mammalian lipogenesis
    and is intentionally separate.
