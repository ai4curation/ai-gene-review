          - id: initiation_route
            label: Fatty-acid chain-initiation route
            axis: primer source and initiating enzyme chemistry
            selection: ONE_OR_MORE
            variants:
              - id: kasIII_route
                label: KAS-III acyl-CoA-dependent initiation
