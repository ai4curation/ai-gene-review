    - order: 4
      role: fatty-acid chain initiation
      node:
        id: chain_initiation
        label: Alternative FAS-II chain-initiation routes
        module_type: METABOLIC_PATHWAY
        description: >-
          Bacterial FAS-II systems can form the first beta-ketoacyl-ACP through
          a FabH-like KAS-III reaction or can first generate an acetyl-ACP
          primer with a Mad/YiiD-family malonyl-ACP decarboxylase.
