            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: bacterial AccABCD acetyl-CoA carboxylase
                term:
                  id: GO:0009317
                  label: acetyl-CoA carboxylase complex
                description: >-
                  Heteromeric bacterial complex containing biotin carboxylase
                  AccC, biotin-carrier AccB, and AccA/AccD
                  carboxyltransferase subunits.
                active_units:
                  - id: accC_biotin_carboxylase
                    label: AccC biotin carboxylase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: bacterial AccC biotin carboxylases
                        representative_members:
                          - preferred_term: PSEPK AccC
                            term:
                              id: UniProtKB:Q88QD6
                              label: Biotin carboxylase
                    role: ATP-dependent carboxylation of the AccB-bound biotin cofactor.
                    function:
                      preferred_term: biotin carboxylase activity
                      term:
                        id: GO:0004075
                        label: biotin carboxylase activity
                  - id: accB_biotin_carrier
                    label: AccB biotin-carrier subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: bacterial AccB biotin-carrier proteins
                        representative_members:
                          - preferred_term: PSEPK AccB
                            term:
                              id: UniProtKB:Q88QD5
                              label: Biotin carboxyl carrier protein
                    role: Covalently carries biotin between the two half-reactions.
                  - id: accA_carboxyltransferase_alpha
                    label: AccA carboxyltransferase alpha subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: bacterial AccA carboxyltransferase alpha subunits
                        representative_members:
                          - preferred_term: PSEPK AccA
                            term:
                              id: UniProtKB:Q88MG4
                              label: Acetyl-CoA carboxylase carboxyltransferase subunit alpha
                    role: Alpha component of the acetyl-CoA carboxyltransferase.
                  - id: accD_carboxyltransferase_beta
                    label: AccD carboxyltransferase beta subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: bacterial AccD carboxyltransferase beta subunits
                        representative_members:
                          - preferred_term: PSEPK AccD
                            term:
                              id: UniProtKB:Q88LD9
                              label: Acetyl-CoA carboxylase carboxyltransferase subunit beta
                    role: Beta component of the acetyl-CoA carboxyltransferase.
            function:
              preferred_term: acetyl-CoA carboxylase activity
              term:
                id: GO:0003989
                label: acetyl-CoA carboxylase activity
              substrates:
                - preferred_term: acetyl-CoA
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
              products:
                - preferred_term: malonyl-CoA
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: Produces the malonyl-CoA two-carbon donor for FAS-II.
    - order: 2
      role: acyl-group carriage
      node:
        id: acp_carrier_role
        label: Acyl carrier protein
        module_type: MOLECULAR_FUNCTION
        annotons:
          - id: acpP_carrier
            label: Holo-acyl carrier protein
            participant:
              selector_type: FAMILY
              family:
                preferred_term: canonical bacterial FAS-II acyl carrier proteins
                term:
                  id: PANTHER:PTHR20863
                  label: acyl carrier protein
                representative_members:
                  - preferred_term: PSEPK AcpP
                    term:
                      id: UniProtKB:Q88LL5
