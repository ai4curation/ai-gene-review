                                term:
                                  id: PANTHER:PTHR34069
                                  label: 3-oxoacyl-[acyl-carrier-protein] synthase 3
                                representative_members:
                                  - preferred_term: PSEPK FabH1
                                    term:
                                      id: UniProtKB:Q88ES4
                                      label: Beta-ketoacyl-acyl-carrier-protein synthase III
                            function:
                              preferred_term: beta-ketoacyl-acyl-carrier-protein synthase III activity
                              term:
                                id: GO:0033818
                                label: beta-ketoacyl-acyl-carrier-protein synthase III activity
                              substrates:
                                - preferred_term: acetyl-CoA
                                - preferred_term: malonyl-ACP
                              products:
                                - preferred_term: acetoacetyl-ACP
                                - preferred_term: CoA
                                - preferred_term: carbon dioxide
                            role_description: >-
                              Uses a short-chain acyl-CoA primer to form the
                              first beta-ketoacyl-ACP.
                      - id: fabH2_medium_chain_variant
                        label: FabH2 medium-chain-acyl-CoA initiation
