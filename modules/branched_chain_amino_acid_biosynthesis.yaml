id: MODULE:branched_chain_amino_acid_biosynthesis
title: L-valine, L-leucine, and L-isoleucine biosynthesis
description: >-
  Microbial biosynthesis of the three branched-chain amino acids. L-isoleucine
  synthesis begins with threonine deamination to 2-oxobutanoate. The IlvI-IlvH
  acetohydroxy-acid synthase, IlvC ketol-acid reductoisomerase, and IlvD
  dihydroxy-acid dehydratase then form a shared catalytic trunk that processes
  either the valine precursor derived from two pyruvate molecules or the
  isoleucine precursor derived from pyruvate plus 2-oxobutanoate. The valine
  intermediate 2-oxoisovalerate also enters a three-reaction LeuA/LeuC-LeuD/LeuB
  extension branch. IlvE performs the terminal transamination for all three
  products. The module requires each biochemical step but allows any validated
  member of the biosynthetic threonine-deaminase family to satisfy the entry
  reaction.
status: DRAFT
evidence:
  - source_id: GO:0009082
    title: Branched-chain amino acid biosynthetic process
    statement: >-
      The module is grounded in the GO biological process for valine, leucine,
      and isoleucine biosynthesis.
  - source_id: KEGG:ppu00290
    title: Pseudomonas putida KT2440 valine, leucine, and isoleucine biosynthesis
    statement: >-
      The PSEPK pathway instance supplies the candidate set for the species-level
      satisfiability pass; map spillover and paralogous enzyme families require
      manual boundary curation.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata table
    statement: >-
      Supplies the exact PSEPK accessions, locus tags, protein families, and
      pathway keywords used for the representative members below.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__branched_chain_amino_acid_biosynthesis__ppu00290-deep-research-openscientist.md
    title: OpenScientist module/pathway/taxon report for PSEPK branched-chain amino-acid biosynthesis
    statement: >-
      Supports the six-part pathway boundary, coverage by the selected KT2440
      proteins, and exclusion of broad-map and catabolic-family candidates.
      Individual assignments remain based on exact database records and
      orthology because the report found no target-strain enzymology for the
      proteins themselves; IlvA and additional AHAS-family paralog roles remain
      unresolved.
module:
  id: branched_chain_amino_acid_biosynthesis
  label: branched-chain amino acid biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
