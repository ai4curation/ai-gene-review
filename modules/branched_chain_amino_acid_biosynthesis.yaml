                - preferred_term: ammonium
              cofactors:
                - preferred_term: pyridoxal 5'-phosphate
              evidence:
                - source_id: EC:4.3.1.19
                  statement: L-threonine dehydratase reaction
            role_description: >-
              Supplies 2-oxobutanoate for the isoleucine branch. KT2440 has two
              full-length IlvA-family proteins with the same reviewed pathway
              assignment; their relative physiological contributions remain
              unresolved.
    - order: 2
