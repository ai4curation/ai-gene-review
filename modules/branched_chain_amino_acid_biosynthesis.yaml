                        statement: 3-isopropylmalate dehydrogenase reaction
        connections:
          - source: leuA_step
            target: leuCD_step
            connection_type: PRECEDES
          - source: leuCD_step
            target: leuB_step
            connection_type: PRECEDES
    - order: 6
      role: terminal transamination of all three branches
      node:
        id: ilvE_step
        label: Branched-chain 2-oxoacids to L-valine, L-leucine, and L-isoleucine
        module_type: REACTION
        annotons:
          - id: ilvE_activity
            label: IlvE branched-chain amino-acid aminotransferase
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: branched-chain-amino-acid:2-oxoglutarate transaminase activity
