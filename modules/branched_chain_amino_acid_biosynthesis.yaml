                    term:
                      id: UniProtKB:Q88H54
                      label: Branched-chain-amino-acid aminotransferase
                    description: Pseudomonas putida KT2440 ilvE/PP_3511.
            function:
              preferred_term: branched-chain-amino-acid:2-oxoglutarate transaminase activity
              term:
                id: GO:0004084
                label: branched-chain-amino-acid:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: 2-oxoisovalerate, 2-oxoisocaproate, or 3-methyl-2-oxopentanoate
                - preferred_term: L-glutamate
              products:
                - preferred_term: L-valine, L-leucine, or L-isoleucine
                - preferred_term: 2-oxoglutarate
              cofactors:
                - preferred_term: pyridoxal 5'-phosphate
              evidence:
                - source_id: EC:2.6.1.42
                  statement: branched-chain amino-acid aminotransferase reaction
            role_description: >-
              A shared reversible enzyme supplies the terminal transamination
              for the valine, leucine, and isoleucine products.
  connections:
    - source: ilvA_step
      target: ilvIH_step
      connection_type: PRECEDES
    - source: ilvIH_step
      target: ilvC_step
      connection_type: PRECEDES
    - source: ilvC_step
      target: ilvD_step
      connection_type: PRECEDES
    - source: ilvD_step
      target: leucine_extension
      connection_type: PRECEDES
    - source: ilvD_step
      target: ilvE_step
      connection_type: PRECEDES
    - source: leucine_extension
      target: ilvE_step
      connection_type: PRECEDES
  knowledge_gaps:
    - gap_statement: >-
        KT2440 encodes two full-length IlvA-family threonine deaminases,
        Q88HB4/PP_3446 and Q88CN1/PP_5149, with the same predicted reaction and
        isoleucine-pathway assignment.
      boundary: >-
        Either family member can satisfy the biochemical entry step in this
        first-pass module. Direct genetics, expression, or enzyme regulation
        data are needed to determine whether both carry biosynthetic flux and
        whether they specialize by growth condition.
      gap_kind:
        - BIOLOGY
      status: OPEN
  notes: >-
    The PSEPK ppu00290 bucket also contains shorter serine/threonine dehydratases,
    two additional AHAS-like large subunits, AlaA, and leucine dehydrogenase.
    They are not counted as module members because pathway-map membership alone
    does not establish that they supply the physiological biosynthetic route.
