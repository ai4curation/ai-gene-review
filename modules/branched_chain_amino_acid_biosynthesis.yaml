                term:
                  id: NCBIfam:TIGR00118
                  label: acetolactate synthase, large subunit, biosynthetic type
                representative_members:
                  - preferred_term: PSEPK IlvI
                    term:
                      id: UniProtKB:Q88DY8
                      label: Acetolactate synthase
                    description: Pseudomonas putida KT2440 ilvI/PP_4680.
            function:
              preferred_term: acetolactate synthase activity
              term:
                id: GO:0003984
                label: acetolactate synthase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: pyruvate or 2-oxobutanoate
              products:
                - preferred_term: 2-acetolactate or 2-aceto-2-hydroxybutanoate
                - preferred_term: carbon dioxide
              cofactors:
                - preferred_term: thiamine diphosphate
                - preferred_term: FAD
                - preferred_term: magnesium ion
              evidence:
