      node:
        id: leucine_extension
        label: 2-Oxoisovalerate to 2-oxoisocaproate
        module_type: METABOLIC_PATHWAY
        parts:
          - order: 1
            role: committed leucine-branch condensation
            node:
              id: leuA_step
              label: 2-Oxoisovalerate to 2-isopropylmalate
              module_type: REACTION
              annotons:
                - id: leuA_activity
                  label: LeuA 2-isopropylmalate synthase
                  participant:
                    selector_type: FAMILY
                    required_function:
                      preferred_term: 2-isopropylmalate synthase activity
                      term:
                        id: GO:0003852
                        label: 2-isopropylmalate synthase activity
                    family:
