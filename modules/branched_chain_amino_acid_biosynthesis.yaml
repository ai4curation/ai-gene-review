                  statement: acetolactate synthase reaction
          - id: ilvH_regulator_activity
            label: IlvH acetohydroxy-acid synthase regulatory subunit
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: acetolactate synthase regulator activity
                term:
                  id: GO:1990610
                  label: acetolactate synthase regulator activity
              family:
                preferred_term: biosynthetic acetohydroxy-acid synthase small subunit
                term:
                  id: NCBIfam:TIGR00119
                  label: acetolactate synthase, small subunit
                representative_members:
                  - preferred_term: PSEPK IlvH
                    term:
                      id: UniProtKB:Q88DY9
                      label: Acetolactate synthase small subunit
                    description: Pseudomonas putida KT2440 ilvH/PP_4679.
            function:
              preferred_term: acetolactate synthase regulator activity
              term:
                id: GO:1990610
                label: acetolactate synthase regulator activity
            role_description: >-
              Regulatory ACT-domain subunit; it contributes regulation rather
              than the acetolactate-forming chemistry.
    - order: 3
      role: acetohydroxy-acid reduction and rearrangement
      node:
        id: ilvC_step
        label: Acetohydroxy acids to dihydroxy acids
        module_type: REACTION
        annotons:
          - id: ilvC_activity
            label: IlvC ketol-acid reductoisomerase
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: ketol-acid reductoisomerase activity
                term:
                  id: GO:0004455
                  label: ketol-acid reductoisomerase activity
              family:
