                The LeuC-LeuD heteromer performs dehydration and rehydration to
                move the hydroxyl group from 2-isopropylmalate to
                3-isopropylmalate.
          - order: 3
            role: leucine-branch 2-oxoacid formation
            node:
              id: leuB_step
              label: 3-Isopropylmalate to 2-oxoisocaproate
              module_type: REACTION
              annotons:
                - id: leuB_activity
                  label: LeuB 3-isopropylmalate dehydrogenase
                  participant:
                    selector_type: FAMILY
                    required_function:
                      preferred_term: 3-isopropylmalate dehydrogenase activity
                      term:
                        id: GO:0003862
                        label: 3-isopropylmalate dehydrogenase activity
                    family:
                      preferred_term: 3-isopropylmalate dehydrogenase family
                      term:
                        id: NCBIfam:TIGR00169
                        label: 3-isopropylmalate dehydrogenase
                      representative_members:
                        - preferred_term: PSEPK LeuB
                          term:
                            id: UniProtKB:Q88LE5
                            label: 3-Isopropylmalate dehydrogenase
                          description: Pseudomonas putida KT2440 leuB/PP_1988.
