                      term:
                        id: NCBIfam:TIGR00171
                        label: 3-isopropylmalate dehydratase, small subunit
                      representative_members:
                        - preferred_term: PSEPK LeuD
                          term:
                            id: UniProtKB:Q88LE7
                            label: 3-Isopropylmalate dehydratase small subunit
                          description: Pseudomonas putida KT2440 leuD/PP_1986.
                  function:
