id: MODULE:branched_chain_amino_acid_biosynthesis
title: Branched-chain amino acid biosynthesis
description: >-
  A bacterial boundary module for biosynthesis of L-valine, L-leucine, and
  L-isoleucine. The strict shared pathway uses acetohydroxy-acid synthase,
  ketol-acid reductoisomerase, dihydroxy-acid dehydratase, and branched-chain
  amino-acid aminotransferase chemistry. The leucine branch extends from
  2-oxoisovalerate through 2-isopropylmalate synthase, 3-isopropylmalate
  dehydratase, and 3-isopropylmalate dehydrogenase before terminal
  transamination. In Pseudomonas putida KT2440, KEGG ppu00290 also includes
  threonine-deaminase paralogs, alanine aminotransferase, and leucine
  dehydrogenase side nodes; these are treated as boundary context unless
  gene-level evidence supports a committed BCAA-biosynthetic role.
status: DRAFT
evidence:
  - source_id: GO:0009082
    title: branched-chain amino acid biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for biosynthesis
      of branched-chain amino acids.
  - source_id: GO:0009098
    title: L-leucine biosynthetic process
    statement: >-
      The KEGG ppu00290 map contains the 2-isopropylmalate branch that produces
      L-leucine.
  - source_id: GO:0009099
    title: L-valine biosynthetic process
    statement: >-
      The KEGG ppu00290 map contains the acetolactate-derived branch that
      produces L-valine.
  - source_id: GO:1901705
    title: L-isoleucine biosynthetic process
    statement: >-
      The module uses the current GO term for L-isoleucine biosynthesis; older
      GOA records may still contain obsolete GO:0009097.
  - source_id: KEGG:ppu00290
    title: Valine, leucine and isoleucine biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      strict BCAA-biosynthetic enzymes with threonine/serine dehydratase
      paralogs, alanine aminotransferase, and leucine dehydrogenase boundary
      nodes.
module:
  id: branched_chain_amino_acid_biosynthesis
  label: Branched-chain amino acid biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: branched-chain amino acid biosynthetic process
      term:
        id: GO:0009082
        label: branched-chain amino acid biosynthetic process
      description: Biosynthesis of L-valine, L-leucine, and L-isoleucine.
    - preferred_term: L-leucine biosynthetic process
      term:
        id: GO:0009098
        label: L-leucine biosynthetic process
      description: Branch-specific biosynthesis of L-leucine.
    - preferred_term: L-valine biosynthetic process
      term:
        id: GO:0009099
        label: L-valine biosynthetic process
      description: Branch-specific biosynthesis of L-valine.
    - preferred_term: L-isoleucine biosynthetic process
      term:
        id: GO:1901705
        label: L-isoleucine biosynthetic process
      description: Branch-specific biosynthesis of L-isoleucine.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most bacterial BCAA-biosynthetic enzymes operate in the cytoplasm.
  parts:
    - order: 1
      role: isoleucine precursor formation
      node:
        id: threonine_deamination_boundary
        label: 2-oxobutanoate supply from L-threonine
        module_type: REACTION
        description: >-
          Threonine deaminase produces 2-oxobutanoate for the isoleucine branch.
          KEGG ppu00290 contains several threonine/serine dehydratase paralogs;
          gene-level review should distinguish committed biosynthetic threonine
          deaminases from broader dehydratase boundary enzymes.
        annotons:
          - id: threonine_deaminase_context
            label: threonine deaminase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: threonine deaminase activity
                term:
                  id: GO:0004794
                  label: threonine deaminase activity
            function:
              preferred_term: threonine deaminase activity
              term:
                id: GO:0004794
                label: threonine deaminase activity
            role_description: Supplies the 2-oxobutanoate precursor for L-isoleucine biosynthesis.
    - order: 2
      role: acetohydroxy-acid synthesis
      node:
        id: acetohydroxy_acid_synthase
        label: Acetohydroxy-acid synthase / acetolactate synthase
        module_type: PROTEIN_COMPLEX
        description: >-
          Acetohydroxy-acid synthase produces acetolactate for valine/leucine
          biosynthesis and acetohydroxybutanoate for isoleucine biosynthesis.
          In PSEPK this includes IlvI/IlvH and additional AHAS-like paralogs
          that may sit in C5-branched dibasic acid or related side contexts.
        concepts:
          - preferred_term: acetolactate synthase activity
            term:
              id: GO:0003984
              label: acetolactate synthase activity
          - preferred_term: acetolactate synthase complex
            term:
              id: GO:0005948
              label: acetolactate synthase complex
        annotons:
          - id: ahas_catalytic_context
            label: AHAS catalytic subunit context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: acetolactate synthase activity
                term:
                  id: GO:0003984
                  label: acetolactate synthase activity
            function:
              preferred_term: acetolactate synthase activity
              term:
                id: GO:0003984
                label: acetolactate synthase activity
            role_description: Catalytic acetohydroxy-acid synthesis step.
          - id: ahas_regulatory_context
            label: AHAS regulatory subunit context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: acetolactate synthase regulator activity
                term:
                  id: GO:1990610
                  label: acetolactate synthase regulator activity
            function:
              preferred_term: acetolactate synthase regulator activity
              term:
                id: GO:1990610
                label: acetolactate synthase regulator activity
            role_description: Regulatory subunit context for AHAS complexes.
    - order: 3
      role: shared reductoisomerase and dehydratase steps
      node:
        id: shared_valine_isoleucine_steps
        label: Shared ketol-acid reductoisomerase and dihydroxy-acid dehydratase steps
        module_type: METABOLIC_PATHWAY
        description: >-
          IlvC and IlvD process acetohydroxy-acid intermediates in both the
          valine and isoleucine branches.
        annotons:
          - id: ilvC_kari
            label: IlvC ketol-acid reductoisomerase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ilvC
            function:
              preferred_term: ketol-acid reductoisomerase activity
              term:
                id: GO:0004455
                label: ketol-acid reductoisomerase activity
            role_description: Shared reductoisomerase step for valine and isoleucine biosynthesis.
          - id: ilvD_dhad
            label: IlvD dihydroxy-acid dehydratase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ilvD
            function:
              preferred_term: dihydroxy-acid dehydratase activity
              term:
                id: GO:0004160
                label: dihydroxy-acid dehydratase activity
            role_description: Shared dehydratase step for valine and isoleucine biosynthesis.
    - order: 4
      role: L-leucine branch
      node:
        id: leucine_biosynthesis_branch
        label: L-leucine biosynthesis from 2-oxoisovalerate
        module_type: METABOLIC_PATHWAY
        description: >-
          The leucine-specific branch proceeds through 2-isopropylmalate,
          3-isopropylmalate, and 2-oxoisocaproate before terminal
          transamination.
        concepts:
          - preferred_term: L-leucine biosynthetic process
            term:
              id: GO:0009098
              label: L-leucine biosynthetic process
        annotons:
          - id: leuA_ipm_synthase
            label: LeuA 2-isopropylmalate synthase
            participant:
              selector_type: GENE
              gene:
                preferred_term: leuA
            function:
              preferred_term: 2-isopropylmalate synthase activity
              term:
                id: GO:0003852
                label: 2-isopropylmalate synthase activity
            role_description: First committed leucine-branch step.
          - id: leuCD_ipm_dehydratase
            label: LeuCD 3-isopropylmalate dehydratase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 3-isopropylmalate dehydratase activity
                term:
                  id: GO:0003861
                  label: 3-isopropylmalate dehydratase activity
            function:
              preferred_term: 3-isopropylmalate dehydratase activity
              term:
                id: GO:0003861
                label: 3-isopropylmalate dehydratase activity
            role_description: LeuC/LeuD isomerase/dehydratase complex step.
          - id: leuB_ipm_dehydrogenase
            label: LeuB 3-isopropylmalate dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: leuB
            function:
              preferred_term: 3-isopropylmalate dehydrogenase activity
              term:
                id: GO:0003862
                label: 3-isopropylmalate dehydrogenase activity
            role_description: Oxidative decarboxylation to 2-oxoisocaproate.
    - order: 5
      role: terminal branched-chain amino acid transamination
      node:
        id: terminal_bcaa_transamination
        label: Terminal branched-chain amino acid transamination
        module_type: REACTION
        description: >-
          Branched-chain amino-acid aminotransferase produces L-valine,
          L-leucine, and L-isoleucine from their corresponding 2-oxo acids.
        annotons:
          - id: ilvE_bcaa_transaminase
            label: IlvE branched-chain amino-acid aminotransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ilvE
            function:
              preferred_term: branched-chain-amino-acid:2-oxoglutarate transaminase activity
              term:
                id: GO:0004084
                label: branched-chain-amino-acid:2-oxoglutarate transaminase activity
            role_description: Terminal transamination for valine, leucine, and isoleucine.
    - order: 6
      role: upstream and side-pathway boundary context
      optional: true
      node:
        id: upstream_side_boundary
        label: Upstream threonine/homoserine and side-pathway boundary context
        module_type: METABOLIC_PATHWAY
        description: >-
          Threonine biosynthesis supplies substrate for isoleucine biosynthesis,
          but most aspartate-family upstream enzymes are curated in other
          batches. Alanine aminotransferase and leucine dehydrogenase entries
          in ppu00290 should remain boundary context unless supported as
          committed BCAA-biosynthetic steps.
        concepts:
          - preferred_term: threonine synthase activity
            term:
              id: GO:0004795
              label: threonine synthase activity
          - preferred_term: L-alanine:2-oxoglutarate transaminase activity
            term:
              id: GO:0004021
              label: L-alanine:2-oxoglutarate transaminase activity
        annotons:
          - id: alanine_aminotransferase_boundary
            label: alanine aminotransferase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: L-alanine:2-oxoglutarate transaminase activity
                term:
                  id: GO:0004021
                  label: L-alanine:2-oxoglutarate transaminase activity
            role_description: >-
              Included by KEGG ppu00290 as amino-acid transamination context,
              but not a strict BCAA-biosynthetic step.
