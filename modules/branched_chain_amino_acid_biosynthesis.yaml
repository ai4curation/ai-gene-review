                  label: threonine deaminase activity
              family:
                preferred_term: full-length biosynthetic threonine deaminase family
                term:
                  id: InterPro:IPR005787
                  label: Biosynthetic threonine dehydratase
                representative_members:
                  - preferred_term: PSEPK IlvA-I
                    term:
                      id: UniProtKB:Q88HB4
                      label: L-threonine dehydratase
                    description: Pseudomonas putida KT2440 ilvA-I/PP_3446.
                  - preferred_term: PSEPK IlvA-II
                    term:
                      id: UniProtKB:Q88CN1
                      label: L-threonine dehydratase
                    description: Pseudomonas putida KT2440 ilvA-II/PP_5149.
            function:
              preferred_term: threonine deaminase activity
              term:
                id: GO:0004794
                label: threonine deaminase activity
              substrates:
                - preferred_term: L-threonine
              products:
