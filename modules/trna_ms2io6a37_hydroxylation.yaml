id: MODULE:trna_ms2io6a37_hydroxylation
title: tRNA ms2io6A37 hydroxylation
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00729 module for the terminal
  oxygen-dependent hydroxylation step that converts ms2i6A37-modified tRNA to
  ms2io6A37-modified tRNA. The module is centered on miaE (PP_2188,
  UniProtKB:Q88KV1). The upstream MiaA and MiaB reactions that generate the
  canonical ms2i6A37 substrate are pathway context, not members of this
  single-gene UniPathway bucket; PSEPK-specific evidence suggests the native
  product may instead be io6A37 because KT2440 appears to lack canonical MiaB.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00729
    title: UniPathway UPA00729
    statement: >-
      The local UPA00729 membership set contains miaE as the KT2440 candidate
      for 2-methylthio-N6-isopentenyladenosine(37)-tRNA hydroxylation.
  - source_id: GO:0006400
    title: tRNA modification
    statement: >-
      GO:0006400 captures the broader biological process containing the MiaE
      tRNA anticodon-loop modification step.
  - source_id: PMID:32785618
    title: Structural, biochemical and functional analyses of tRNA-monooxygenase enzyme MiaE from Pseudomonas putida provide insights into tRNA/MiaE interaction.
    statement: >-
      This study establishes PP_2188 as P. putida MiaE and characterizes it as
      a non-heme diiron tRNA monooxygenase acting on ms2i6A37-modified tRNA.
  - source_id: file:PSEPK/miaE/miaE-ai-review.yaml
    title: Curated miaE review
    statement: >-
      The miaE review accepts the specific GO:0045301 molecular function and
      GO:0006400 tRNA modification process as core annotations.
  - source_id: file:PSEPK/miaE/miaE-uniprot.txt
    title: UniProtKB reviewed entry for miaE
    statement: >-
      UniProt describes miaE as a reviewed tRNA
      2-(methylsulfanyl)-N(6)-isopentenyladenosine(37) hydroxylase with
      EC:1.14.99.69 and Rhea:RHEA:65812.
  - source_id: file:interpro/panther/PTHR42637/PTHR42637-metadata.yaml
    title: PANTHER family metadata for MiaE
    statement: >-
      PANTHER places Q88KV1 in family PTHR42637, named
      tRNA-(ms[2]io[6]A)-hydroxylase.
  - source_id: file:modules/trna_ms2io6a37_hydroxylation-deep-research-openscientist.md
    title: OpenScientist module research for tRNA ms2io6A37 hydroxylation
    statement: >-
      OpenScientist module-level research supports a narrow UPA00729 boundary
      around the MiaE-catalyzed O2-dependent hydroxylation of ms2i6A37-tRNA,
      with MiaA/MiaB treated as upstream substrate-supply context and not as
      members of this single-gene module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__trna_ms2io6a37_hydroxylation__upa00729-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00729 pathway satisfiability review
    statement: >-
      The PSEPK-specific OpenScientist review finds the MiaE enzyme step covered
      by PP_2188/Q88KV1, but flags native product identity as uncertain because
      KT2440 appears to lack the upstream MiaB methylthiotransferase that makes
      canonical ms2i6A37.
notes: >-
  First-pass interpretation: UPA00729 is satisfiable as a compact single-gene
  tRNA-modification module in KT2440. MiaE is the terminal hydroxylase for
  ms2io6A37 formation. Upstream MiaA and MiaB are required to make the modified
  tRNA substrate, but they belong to the broader tRNA A37 hypermodification
  pathway rather than this UPA00729 single-gene bucket. The generic
  OpenScientist report reinforces this boundary and highlights that MiaE is an
  oxygen-dependent non-heme diiron monooxygenase whose native physiological
  electron donor(s) and full KT2440 tRNA substrate set remain open questions.
  The PSEPK-specific report adds an important caveat: the MiaE enzyme step is
  covered, but KT2440 appears to lack canonical MiaB, so the native product may
  be io6A37 rather than ms2io6A37 unless a cryptic methylthiotransferase or
  direct native tRNA nucleoside data support ms2i6A37 substrate formation.
