          label: cytoplasm
        description: Soluble bacterial cytoplasmic context for tRNA modification.
  parts:
    - order: 1
      role: MiaE-dependent hydroxylation of ms2i6A37-tRNA
      node:
        id: miae_trna_ms2io6a37_hydroxylation_step
        label: MiaE tRNA ms2io6A37 hydroxylation
        module_type: REACTION
        description: >-
          MiaE uses oxygen and a diiron active site to hydroxylate
