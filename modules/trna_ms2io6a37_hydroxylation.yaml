              substrates:
                - preferred_term: tRNA containing ms2i6A37
                - preferred_term: oxygen
                - preferred_term: electron donor
              products:
                - preferred_term: tRNA containing ms2io6A37
                - preferred_term: oxidized electron donor
                - preferred_term: water
            processes:
              - preferred_term: tRNA modification
                term:
                  id: GO:0006400
                  label: tRNA modification
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
