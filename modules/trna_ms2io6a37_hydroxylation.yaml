  knowledge_gaps:
    - gap_statement: >-
        A GO biological-process term specific to 2-methylthio-N6-(cis-hydroxy)
        isopentenyladenosine-37 tRNA biosynthesis was not identified in the
        current GO annotations, so the module uses the broader GO:0006400 tRNA
        modification process.
      boundary: >-
        Keep the module grounded in GO:0045301 for exact molecular function and
        use UniPathway/Rhea-style evidence for the exact reaction unless a
        specific GO process term becomes available.
      gap_kind:
        - ONTOLOGY
        - CURATION
    - gap_statement: >-
        The exact KT2440 tRNA isoacceptor set carrying ms2io6A37 under
        different oxygen or growth conditions is not captured in the current
        GOA/module evidence.
      boundary: >-
        The module should not imply a universal modification on all tRNAs; MiaE
        acts on selected tRNAs containing the ms2i6A37 precursor.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        MiaA and MiaB provide the upstream i6A37 and ms2i6A37 substrate-forming
        reactions, but this batch has not yet curated those enzymes in KT2440.
      boundary: >-
        Do not add MiaA or MiaB as UPA00729 module members; track them as linked
        tRNA A37 hypermodification pathway context.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        KT2440 appears to lack canonical MiaB, the upstream methylthiotransferase
        that makes ms2i6A37 from i6A37. The MiaE enzyme step is covered, but the
        native product may be io6A37 rather than ms2io6A37.
      boundary: >-
        Keep PP_2188/miaE as the covered UPA00729 hydroxylase. Do not force a
        MiaB candidate from the RimO paralog; resolve native product identity
        with KT2440 tRNA nucleoside profiling or stronger MiaB evidence.
      gap_kind:
        - BIOLOGY
        - CURATION
