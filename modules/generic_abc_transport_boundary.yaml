id: MODULE:generic_abc_transport_boundary
title: Generic and residual ABC/transporter component boundary
description: 'Boundary module for the PSEPK transport/membrane/efflux generic ABC residual split. The batch is not a single
  substrate pathway: it contains MacB/ABC-3-like efflux components, fused ABCB/type-I-exporter-like proteins, binding-protein-dependent
  importer pieces, named sulfonate, amino-acid, cobalamin, and heme/hemin spillover components, plus non-ABC outliers.'
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_generic_abc_transporters.tsv
  title: PSEPK transport/membrane/efflux generic ABC transporter batch
  statement: The partition groups 33 residual ABC-family or ABC-like transport-bucket genes for first-pass curation.
notes: 'First-pass interpretation: keep functions component-level. Several genes are spillovers from better biological modules
  (c-di-GMP signaling, MlaA phospholipid transfer, thiamine biosynthesis, amino-acid/sulfonate/cobalamin/hemin import) but
  are represented here to close the residual transport split without asserting one generic ABC pathway.'
