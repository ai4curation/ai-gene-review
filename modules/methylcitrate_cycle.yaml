id: MODULE:methylcitrate_cycle
title: 2-methylcitrate cycle
description: >-
  A reusable propionate-assimilation module that activates propionate to
  propionyl-CoA, condenses propionyl-CoA with oxaloacetate to form
  2-methylcitrate, converts 2-methylcitrate to 2-methylisocitrate through
  alternative dehydration/isomerization implementations, and cleaves
  2-methylisocitrate to succinate and pyruvate. The module distinguishes the
  direct PrpD route from the two-component AcnD/PrpF route and represents the
  common aconitase-family hydration step separately.
status: DRAFT
evidence:
  - source_id: GO:0019543
    title: propionate catabolic process
    statement: >-
      GO:0019543 provides the biological-process scope for catabolism of
      propionate through propionyl-CoA and the 2-methylcitrate pathway.
  - source_id: file:PSEPK/prpC/prpC-ai-review.yaml
    title: PSEPK prpC gene review
    statement: >-
      The curated KT2440 review identifies Q88KF5 as the 2-methylcitrate
      synthase rather than the housekeeping TCA citrate synthase.
  - source_id: file:PSEPK/acnB/acnB-ai-review.yaml
    title: PSEPK acnB gene review
    statement: >-
      The curated KT2440 review identifies Q88KF1 as a bifunctional aconitase
      with a core 2-methylisocitrate dehydratase/hydratase role in propionate
      assimilation.
  - source_id: file:PSEPK/prpD/prpD-uniprot.txt
    title: UniProtKB entry Q88KF2 for PSEPK PrpD
    statement: >-
      UniProt records the direct 2-methylcitrate to 2-methyl-cis-aconitate
      dehydration reaction for Q88KF2.
  - source_id: file:PSEPK/prpF/prpF-uniprot.txt
    title: UniProtKB entry Q88KF3 for PSEPK PrpF
    statement: >-
      UniProt places the PrpF-family aconitate isomerase Q88KF3 in propionate
      degradation.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__methylcitrate_cycle__ppu00640-deep-research-openscientist.md
    title: OpenScientist PSEPK 2-methylcitrate-cycle pathway report
    statement: >-
      The pathway-level family and locus analysis resolves PP_2336 as AcnD,
      confirms that both dehydration implementations coexist in KT2440, and
      identifies both AcnA-I and AcnB as candidate enzymes for the common
      hydration step.
module:
  id: methylcitrate_cycle
  label: 2-methylcitrate cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: propionate catabolic process
      term:
        id: GO:0019543
        label: propionate catabolic process
      description: >-
        Conversion of propionate-derived propionyl-CoA to pyruvate and
        succinate through 2-methylcitrate intermediates.
  parts:
    - order: 1
      role: propionate activation
      node:
        id: propionate_activation
        label: Propionate activation to propionyl-CoA
        module_type: REACTION
        annotons:
          - id: propionate_coa_ligase
            label: Propionate-CoA ligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PrpE-family propionate-CoA ligases
                representative_members:
                  - preferred_term: PSEPK PrpE
                    term:
                      id: UniProtKB:Q88KD9
                      label: Propionyl-CoA synthetase
            function:
              preferred_term: propionate-CoA ligase activity
              term:
                id: GO:0050218
                label: propionate-CoA ligase activity
              substrates:
                - preferred_term: propionate
                - preferred_term: CoA
                - preferred_term: ATP
              products:
                - preferred_term: propionyl-CoA
                - preferred_term: AMP
                - preferred_term: diphosphate
            role_description: >-
              Supplies the propionyl-CoA substrate used by 2-methylcitrate
              synthase; nonorthologous activation routes require separate
              pathway-instance adjudication.
    - order: 2
      role: 2-methylcitrate formation
      node:
        id: methylcitrate_synthesis
        label: 2-methylcitrate synthesis
        module_type: REACTION
        annotons:
          - id: methylcitrate_synthase
            label: 2-methylcitrate synthase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PrpC 2-methylcitrate synthases
                representative_members:
                  - preferred_term: PSEPK PrpC
                    term:
                      id: UniProtKB:Q88KF5
                      label: 2-methylcitrate synthase
            function:
              preferred_term: 2-methylcitrate synthase activity
              term:
                id: GO:0050440
                label: 2-methylcitrate synthase activity
              substrates:
                - preferred_term: propionyl-CoA
                - preferred_term: oxaloacetate
                - preferred_term: H2O
              products:
                - preferred_term: 2-methylcitrate
                - preferred_term: CoA
            role_description: >-
              Condenses propionyl-CoA and oxaloacetate to commit carbon to the
              cycle.
    - order: 3
      role: 2-methyl-cis-aconitate generation
      node:
        id: methylaconitate_generation
        label: Conversion of 2-methylcitrate to 2-methyl-cis-aconitate
        module_type: METABOLIC_PATHWAY
        description: >-
          Alternative direct and two-component implementations produce the
          2-methyl-cis-aconitate substrate used by the common hydration step.
        variant_sets:
          - id: methylaconitate_generation_routes
            label: 2-methylcitrate dehydration implementations
            axis: reaction mechanism
            selection: ONE_OR_MORE
            variants:
              - id: prpD_direct_route
                label: Direct PrpD route
                module_type: REACTION
                annotons:
                  - id: prpD_methylcitrate_dehydratase
                    label: PrpD 2-methylcitrate dehydratase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PrpD 2-methylcitrate dehydratases
                        representative_members:
                          - preferred_term: PSEPK PrpD
                            term:
                              id: UniProtKB:Q88KF2
                              label: 2-methylcitrate dehydratase
                    function:
                      preferred_term: 2-methylcitrate dehydratase activity
                      term:
                        id: GO:0047547
                        label: 2-methylcitrate dehydratase activity
                      substrates:
                        - preferred_term: 2-methylcitrate
                      products:
                        - preferred_term: 2-methyl-cis-aconitate
                        - preferred_term: H2O
                    role_description: >-
                      Directly dehydrates 2-methylcitrate to
                      2-methyl-cis-aconitate.
              - id: acnD_prpF_route
                label: Two-component AcnD/PrpF route
                module_type: METABOLIC_PATHWAY
                description: >-
                  An aconitase-family dehydratase first forms a positional
                  methylaconitate isomer, which PrpF rearranges to
                  2-methyl-cis-aconitate.
                parts:
                  - order: 1
                    role: AcnD-dependent dehydration
                    node:
                      id: acnD_dehydration
                      label: AcnD-family 2-methylcitrate dehydration
                      module_type: REACTION
                      annotons:
                        - id: acnD_pathway_dehydratase
                          label: AcnD 2-methylcitrate dehydratase
                          participant:
                            selector_type: FAMILY
                            family:
                              preferred_term: AcnD-family 2-methylcitrate dehydratases
                              representative_members:
                                - preferred_term: PSEPK AcnD
                                  term:
                                    id: UniProtKB:Q88KF4
                                    label: AcnD-family 2-methylcitrate dehydratase
                          function:
                            preferred_term: hydro-lyase activity
                            term:
                              id: GO:0016836
                              label: hydro-lyase activity
                            substrates:
                              - preferred_term: 2-methylcitrate
                            products:
                              - preferred_term: 2-methyl-trans-aconitate
                              - preferred_term: H2O
                            cofactors:
                              - preferred_term: 4 iron, 4 sulfur cluster
                          role_description: >-
                            Dehydrates 2-methylcitrate to the methylaconitate
                            isomer used by PrpF. GO lacks an
                            AcnD-specific trans-product molecular-function
                            term, so the available hydro-lyase parent is used.
                  - order: 2
                    role: methylaconitate isomerization
                    node:
                      id: prpF_isomerization
                      label: PrpF methylaconitate isomerization
                      module_type: REACTION
                      annotons:
                        - id: prpF_aconitate_isomerase
                          label: PrpF aconitate isomerase
                          participant:
                            selector_type: FAMILY
                            family:
                              preferred_term: PrpF methylaconitate isomerases
                              representative_members:
                                - preferred_term: PSEPK PrpF
                                  term:
                                    id: UniProtKB:Q88KF3
                                    label: Aconitate isomerase
                          function:
                            preferred_term: isomerase activity
                            term:
                              id: GO:0016853
                              label: isomerase activity
                            substrates:
                              - preferred_term: 2-methyl-trans-aconitate
                            products:
                              - preferred_term: 2-methyl-cis-aconitate
                          role_description: >-
                            Converts the AcnD product to
                            2-methyl-cis-aconitate. GO lacks a
                            methylaconitate-specific isomerase term, so the
                            available isomerase parent is used.
                connections:
                  - source: acnD_dehydration
                    target: prpF_isomerization
                    connection_type: PROVIDES_INPUT_FOR
                    description: The AcnD product is the substrate rearranged by PrpF.
    - order: 4
      role: 2-methylisocitrate formation
      node:
        id: methylisocitrate_formation
        label: 2-methyl-cis-aconitate hydration
        module_type: REACTION
        variant_sets:
          - id: methylisocitrate_hydratase_families
            label: Aconitase-family hydration implementations
            axis: aconitase paralog family
            selection: ONE_OR_MORE
            variants:
              - id: acnB_hydration_route
                label: AcnB-family hydration
                module_type: REACTION
                annotons:
                  - id: acnB_methylisocitrate_hydratase
                    label: AcnB-family 2-methylisocitrate hydratase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: AcnB-family aconitate hydratases with methylisocitrate activity
                        representative_members:
                          - preferred_term: PSEPK AcnB
                            term:
                              id: UniProtKB:Q88KF1
                              label: Aconitate hydratase B
                    function:
                      preferred_term: 2-methylisocitrate dehydratase activity
                      term:
                        id: GO:0047456
                        label: 2-methylisocitrate dehydratase activity
                      substrates:
                        - preferred_term: 2-methyl-cis-aconitate
                        - preferred_term: H2O
                      products:
                        - preferred_term: 2-methylisocitrate
                      cofactors:
                        - preferred_term: 4 iron, 4 sulfur cluster
                    role_description: >-
                      Uses the reversible aconitase-family reaction in the
                      hydration direction to form the PrpB substrate.
              - id: acnA_hydration_route
                label: AcnA-family hydration
                module_type: REACTION
                annotons:
                  - id: acnA_methylisocitrate_hydratase
                    label: AcnA-family 2-methylisocitrate hydratase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: AcnA-family aconitate hydratases with methylisocitrate activity
                        representative_members:
                          - preferred_term: PSEPK AcnA-I
                            term:
                              id: UniProtKB:Q88L24
                              label: Aconitate hydratase AcnA-I
                    function:
                      preferred_term: 2-methylisocitrate dehydratase activity
                      term:
                        id: GO:0047456
                        label: 2-methylisocitrate dehydratase activity
                      substrates:
                        - preferred_term: 2-methyl-cis-aconitate
                        - preferred_term: H2O
                      products:
                        - preferred_term: 2-methylisocitrate
                      cofactors:
                        - preferred_term: 4 iron, 4 sulfur cluster
                    role_description: >-
                      Provides a second aconitase-family implementation of the
                      reversible hydration step where AcnA retains this
                      substrate range.
    - order: 5
      role: carbon-carbon cleavage
      node:
        id: methylisocitrate_cleavage
        label: 2-methylisocitrate cleavage
        module_type: REACTION
        annotons:
          - id: methylisocitrate_lyase
            label: 2-methylisocitrate lyase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PrpB 2-methylisocitrate lyases
                representative_members:
                  - preferred_term: PSEPK PrpB
                    term:
                      id: UniProtKB:Q88KF6
                      label: 2-methylisocitrate lyase
            function:
              preferred_term: methylisocitrate lyase activity
              term:
                id: GO:0046421
                label: methylisocitrate lyase activity
              substrates:
                - preferred_term: 2-methylisocitrate
              products:
                - preferred_term: succinate
                - preferred_term: pyruvate
              cofactors:
                - preferred_term: magnesium ion
            role_description: >-
              Cleaves 2-methylisocitrate to succinate and pyruvate, returning
              the oxaloacetate-derived carbon skeleton to central metabolism.
  connections:
    - source: propionate_activation
      target: methylcitrate_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: Propionyl-CoA is the acyl donor for 2-methylcitrate synthesis.
    - source: methylcitrate_synthesis
      target: methylaconitate_generation
      connection_type: PROVIDES_INPUT_FOR
      description: 2-methylcitrate enters either dehydration implementation.
    - source: methylaconitate_generation
      target: methylisocitrate_formation
      connection_type: PROVIDES_INPUT_FOR
      description: Both alternatives converge on 2-methyl-cis-aconitate.
    - source: methylisocitrate_formation
      target: methylisocitrate_cleavage
      connection_type: PROVIDES_INPUT_FOR
      description: 2-methylisocitrate is the substrate cleaved by PrpB.
  notes: >-
    The root is deliberately multi-part and taxon-neutral. Exact KT2440
    accessions are used as representative members, not as a claim that the pathway
    is restricted to Pseudomonas. PrpD and AcnD/PrpF are modeled with
    ONE_OR_MORE semantics because organisms may encode either or both routes.
    The common hydration step likewise allows AcnA- and AcnB-family
    implementations, which may coexist in one genome.
