  statement: The batch table records 16 sigma, anti-sigma, and anti-anti-sigma regulators handled in this first pass.
- source_id: file:projects/P_PUTIDA/batches/module_regulation_signal_transduction_partition.tsv
  title: PSEPK regulation/signal-transduction partition table
  statement: The regulation umbrella was partitioned into family-scale regulator splits; this module covers the sigma/anti-sigma
    split.
