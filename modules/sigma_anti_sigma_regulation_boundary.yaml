id: MODULE:sigma_anti_sigma_regulation_boundary
title: Sigma and anti-sigma regulation boundary
description: Boundary module for the PSEPK regulation/signal-transduction sigma split. It groups ECF sigma factors, global
  stress sigma factors, and anti-sigma or anti-anti-sigma regulators while leaving direct regulons and inducing cues unresolved
  unless supported by an existing curated review.
status: DRAFT
