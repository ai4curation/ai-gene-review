id: MODULE:mitochondrial_complex_iv
title: Mitochondrial respiratory Complex IV (cytochrome c oxidase) — nuclear subunits and MT-CO1/CO2 assembly; COX5A/COX6A2/COX7B/COX8A + COX14/COX20
description: >-
  Respiratory Complex IV (cytochrome c oxidase, COX) is the terminal enzyme of the mitochondrial
  electron transport chain: it accepts electrons from reduced cytochrome c and uses them to reduce
  molecular oxygen to water, coupling this to proton pumping across the inner membrane. The three
  catalytic core subunits — MT-CO1 (the heme a/a3-CuB binuclear centre), MT-CO2 (the CuA centre)
  and MT-CO3 — are encoded by mitochondrial DNA; around ten nuclear-encoded structural subunits
  (COX4, COX5A, COX5B, COX6A/B/C, COX7A/B/C, COX8) surround and stabilise this core and modulate
  activity. Because the catalytic subunits are mtDNA-encoded and membrane-embedded, COX assembly is
  a highly ordered process guided by dedicated inner-membrane factors: COX14 (with COA3/MITRAC)
  couples MT-CO1 translation to its stepwise assembly, and COX20 chaperones the newly-made MT-CO2
  through membrane insertion (with COX18) and copper (CuA) metallation by SCO1/SCO2, before the
  nuclear subunits are added. Inherited defects in the nuclear subunits or the assembly factors
  cause mitochondrial complex IV (cytochrome c oxidase) deficiency — a clinically heterogeneous
  group including Leigh syndrome, cardiomyopathy (COX6A2), X-linked linear skin defects with
  multiple congenital anomalies (COX7B) and encephalopathy/ataxia.
status: DRAFT
