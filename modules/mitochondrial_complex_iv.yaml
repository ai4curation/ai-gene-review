  notes: >-
    Mitochondrial respiratory Complex IV (cytochrome c oxidase), grounded to the human
    nuclear-encoded structural subunits COX5A (UniProtKB:P20674), COX6A2 (Q02221), COX7B (P24311)
    and COX8A (P10176) — all GO:0005198 structural molecule activity — and the assembly factors
    COX14 (Q96I36) and COX20 (Q5RI15) — both GO:0033617. GO molecular-function/BP/location terms
    were taken from the completed human gene reviews and verified against the local go.db; Reactome
    reaction ids/titles were verified against the local reactome cache. The holoenzyme is a
    PROTEIN_COMPLEX node; the catalytic core (MT-CO1 heme a/a3-CuB, MT-CO2 CuA, MT-CO3) is
    mtDNA-encoded and therefore not represented as nuclear dismech genes. Other nuclear subunits and
    factors are already reviewed on main and cited via file: — structural subunits COX4I1/COX6A1/
    COX6B1, and the maturation factors SCO1/SCO2 (copper metallochaperones, GO:0016531), COX15 (heme
    a synthesis), COX10 (heme O farnesyltransferase) and SURF1 (assembly). The current Complex IV
    membership term is GO:0045277 "respiratory chain complex IV" (GO:0005751 is obsolete); the
    assembly BP is GO:0033617. Complex IV accepts electrons from Complex III via cytochrome c and is
    the terminal oxidase of the chain, feeding the proton gradient used by Complex V (ATP synthase).
    Disorders: mitochondrial complex IV (cytochrome c oxidase) deficiency — Leigh syndrome, cardio-
    myopathy (COX6A2), X-linked linear skin defects with multiple congenital anomalies (COX7B) and
    encephalopathy/ataxia; the remaining Complex IV assembly factors (COX11/16/18, COA3/5/6/7/8,
    PET100/117, TACO1) are a further module.
