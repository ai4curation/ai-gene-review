id: MODULE:dolichol_phosphate_sugar_donor_supply
title: Dolichol phosphate and lipid-linked sugar-donor supply for glycosylation; SRD5A3/DOLK/DPM1/DPM2/DPM3/ALG5/MPDU1
description: >-
  Assembly of the dolichol-linked oligosaccharide (and of GPI anchors, O- and C-mannosylation)
  depends on a dolichyl-phosphate lipid carrier and on two lipid-linked monosaccharide donors,
  dolichyl-phosphate-mannose (Dol-P-Man) and dolichyl-phosphate-glucose (Dol-P-Glc). This
  module curates their supply at the endoplasmic-reticulum membrane. The polyprenol reductase
  SRD5A3 catalyses the last step of de novo dolichol synthesis, reducing the alpha-isoprene
  unit of polyprenol to dolichol; dolichol kinase DOLK then phosphorylates dolichol (using CTP)
  to dolichyl phosphate (Dol-P), the essential carrier. Dol-P is charged with sugars by two
  systems: the dolichol-phosphate-mannose (DPM) synthase, a three-subunit complex in which DPM1
  is the GDP-mannose-utilising catalytic subunit and DPM2 (regulatory/stabilising) and DPM3
  (membrane anchor for the TM-less DPM1) are non-catalytic, produces Dol-P-Man from GDP-mannose
  and Dol-P; and ALG5 (dolichyl-phosphate beta-glucosyltransferase) produces Dol-P-Glc from
  UDP-glucose and Dol-P. The utilisation factor MPDU1 (Lec35) is then required for these
  lipid-linked donors to be used by the lumenal glycosyltransferases. Because they feed the
  whole glycosylation system, defects in every gene here cause a congenital disorder of
  glycosylation: SRD5A3-CDG (CDG-Iq), DOLK-CDG (CDG-Im, dilated cardiomyopathy), DPM1-CDG
  (CDG-Ie), DPM2-CDG (CDG-Iu) and DPM3-CDG (CDG-Io) — the latter two dystroglycanopathies —
  MPDU1-CDG (CDG-If) and ALG5-CDG.
status: DRAFT
evidence:
  - source_id: GO:0006488
    title: dolichol-linked oligosaccharide biosynthetic process
    statement: >-
      The module supplies the dolichyl-phosphate carrier and the Dol-P-Man/Dol-P-Glc donors
      consumed by dolichol-linked oligosaccharide biosynthesis (GO:0006488).
  - source_id: GO:0043048
    title: dolichyl monophosphate biosynthetic process
    statement: >-
      SRD5A3 and DOLK produce the dolichyl phosphate (Dol-P) carrier
      (dolichyl monophosphate biosynthetic process, GO:0043048).
  - source_id: Reactome:R-HSA-446199
    title: Synthesis of dolichyl-phosphate
    statement: >-
      The dolichol -> Dol-P segment (SRD5A3 polyprenol reduction, DOLK phosphorylation) follows
      the human Reactome "Synthesis of dolichyl-phosphate" sub-pathway.
  - source_id: Reactome:R-HSA-162699
    title: Synthesis of dolichyl-phosphate mannose
    statement: >-
      The Dol-P-Man branch (DPM1/DPM2/DPM3 complex) follows the human Reactome "Synthesis of
      dolichyl-phosphate mannose" sub-pathway (reaction R-HSA-162721).
  - source_id: file:human/SRD5A3/SRD5A3-ai-review.yaml
    title: SRD5A3 gene review (human)
    statement: >-
      The polyprenol -> dolichol step (UniProtKB:Q9H8P0, GO:0160198) matches the completed human
      SRD5A3 review.
  - source_id: file:human/DOLK/DOLK-ai-review.yaml
    title: DOLK gene review (human)
    statement: >-
      The dolichol -> Dol-P step (UniProtKB:Q9UPQ8, GO:0004168) matches the completed human DOLK review.
  - source_id: file:human/DPM1/DPM1-ai-review.yaml
    title: DPM1 gene review (human)
    statement: >-
      The catalytic Dol-P-Man synthase step (UniProtKB:O60762, GO:0004582) matches the completed
      human DPM1 review.
  - source_id: file:human/DPM2/DPM2-ai-review.yaml
    title: DPM2 gene review (human)
    statement: >-
      The regulatory DPM-synthase subunit (UniProtKB:O94777, GO:0008047) matches the completed
      human DPM2 review.
  - source_id: file:human/DPM3/DPM3-ai-review.yaml
    title: DPM3 gene review (human)
    statement: >-
      The membrane-anchoring DPM-synthase subunit (UniProtKB:Q9P2X0, GO:0043495) matches the
      completed human DPM3 review.
  - source_id: file:human/ALG5/ALG5-ai-review.yaml
    title: ALG5 gene review (human)
    statement: >-
      The Dol-P-Glc synthase step (UniProtKB:Q9Y673, GO:0004581) matches the completed human ALG5 review.
  - source_id: file:human/MPDU1/MPDU1-ai-review.yaml
    title: MPDU1 gene review (human)
    statement: >-
      The Dol-P-Man/Dol-P-Glc utilisation factor (UniProtKB:O75352, GO:0006488) matches the
      completed human MPDU1 review.
module:
  id: dolichol_phosphate_sugar_donor_supply
  label: Dolichol-P and lipid-linked sugar-donor supply
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: dolichol-linked oligosaccharide biosynthetic process
      term:
        id: GO:0006488
        label: dolichol-linked oligosaccharide biosynthetic process
      description: >-
        Supply of the dolichyl-phosphate carrier and the Dol-P-Man/Dol-P-Glc donors used by
        LLO assembly (and GPI/O-/C-mannosylation).
    - preferred_term: dolichyl monophosphate biosynthetic process
      term:
        id: GO:0043048
        label: dolichyl monophosphate biosynthetic process
      description: Production of the dolichyl phosphate lipid carrier from polyprenol/dolichol.
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: All seven proteins are endoplasmic-reticulum-membrane proteins.
  parts:
    - order: 1
      role: dolichol synthesis (polyprenol reduction)
      node:
        id: srd5a3_step
        label: polyprenol to dolichol
        module_type: REACTION
        annotons:
          - id: srd5a3_activity
            label: "SRD5A3: polyprenol reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Steroid 5-alpha reductase family (SRD5A3 polyprenol reductase)
                term:
                  id: PANTHER:PTHR14624
                  label: POLYPRENOL REDUCTASE
                representative_members:
                  - preferred_term: SRD5A3 (human)
                    term:
                      id: UniProtKB:Q9H8P0
                      label: Polyprenol reductase
            function:
              preferred_term: polyprenal reductase activity
              term:
                id: GO:0160198
                label: polyprenal reductase activity
              substrates:
                - preferred_term: polyprenol
                - preferred_term: NADPH
              products:
                - preferred_term: dolichol
              evidence:
                - source_id: EC:1.3.1.94
                  statement: polyprenol reductase; final step of de novo dolichol synthesis (reduces the alpha-isoprene unit of polyprenol); not a physiological steroid 5alpha-reductase
                - source_id: Reactome:R-HSA-446199
                  statement: "Synthesis of dolichyl-phosphate (human Reactome sub-pathway; includes polyprenol reduction to dolichol)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Final step of de novo dolichol synthesis. Deficiency = SRD5A3-CDG (CDG-Iq;
              ocular coloboma, cerebellar involvement).
    - order: 2
      role: dolichyl phosphate synthesis (phosphorylation)
      node:
        id: dolk_step
        label: dolichol to dolichyl phosphate (Dol-P)
        module_type: REACTION
        annotons:
          - id: dolk_activity
            label: "DOLK: dolichol kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dolichol kinase family (DOLK)
                term:
                  id: PANTHER:PTHR13205
                  label: DOLICHOL KINASE
                representative_members:
                  - preferred_term: DOLK (human)
                    term:
                      id: UniProtKB:Q9UPQ8
                      label: Dolichol kinase
            function:
              preferred_term: dolichol kinase activity
              term:
                id: GO:0004168
                label: dolichol kinase activity
              substrates:
                - preferred_term: dolichol
                - preferred_term: CTP
              products:
                - preferred_term: dolichyl phosphate (Dol-P)
                - preferred_term: CDP
              evidence:
                - source_id: EC:2.7.1.108
                  statement: dolichol kinase; CTP-dependent phosphorylation of dolichol to Dol-P, the lipid carrier for all glycosylation
                - source_id: Reactome:R-HSA-446195
                  statement: "DOLK phosphorylates DCHOL to DOLP (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Produces the Dol-P carrier used by DPM synthase, ALG5, DPAGT1 and GPI/O-mannosylation.
              Deficiency = DOLK-CDG (CDG-Im; dilated cardiomyopathy).
    - order: 3
      role: Dol-P-Man synthesis (three-subunit synthase complex)
      node:
        id: dpm_complex_step
        label: GDP-mannose + Dol-P to dolichyl-phosphate-mannose (Dol-P-Man)
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: dpm1_activity
            label: "DPM1: Dol-P-Man synthase catalytic subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dolichyl-phosphate mannosyltransferase family (DPM1)
                term:
                  id: PANTHER:PTHR43398
                  label: DOLICHOL-PHOSPHATE MANNOSYLTRANSFERASE
                representative_members:
                  - preferred_term: DPM1 (human)
                    term:
                      id: UniProtKB:O60762
                      label: Dolichol-phosphate mannosyltransferase subunit 1
            function:
              preferred_term: dolichyl-phosphate beta-D-mannosyltransferase activity
              term:
                id: GO:0004582
                label: dolichyl-phosphate beta-D-mannosyltransferase activity
              substrates:
                - preferred_term: GDP-mannose
                - preferred_term: dolichyl phosphate
              products:
                - preferred_term: dolichyl-phosphate-mannose (Dol-P-Man)
                - preferred_term: GDP
              evidence:
                - source_id: EC:2.4.1.83
                  statement: catalytic subunit of DPM synthase; transfers Man from GDP-Man to Dol-P; lacks a TM anchor (tethered by DPM3)
                - source_id: Reactome:R-HSA-162721
                  statement: "dolichyl phosphate + GDP-alpha-D-mannose -> dolichyl phosphate-mannose (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Catalytic subunit; deficiency = DPM1-CDG (CDG-Ie).
          - id: dpm2_activity
            label: "DPM2: DPM synthase regulatory subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DPM2 family (regulatory subunit)
                term:
                  id: PANTHER:PTHR15039
                  label: DOLICHOL-PHOSPHATE MANNOSYLTRANSFERASE SUBUNIT 2
                representative_members:
                  - preferred_term: DPM2 (human)
                    term:
                      id: UniProtKB:O94777
                      label: Dolichol-phosphate mannosyltransferase subunit 2
            function:
              preferred_term: enzyme activator activity
              term:
                id: GO:0008047
                label: enzyme activator activity
              substrates:
                - preferred_term: DPM synthase complex (DPM1/DPM3)
              products:
                - preferred_term: activated/stabilised Dol-P-Man synthase
              evidence:
                - source_id: Reactome:R-HSA-162699
                  statement: "Synthesis of dolichyl-phosphate mannose (human Reactome sub-pathway)"
                - source_id: file:human/DPM2/DPM2-ai-review.yaml
                  statement: regulatory subunit; stabilises/localises DPM1 and DPM3 and enhances Dol-P-Man synthase activity; deficiency = DPM2-CDG (CDG-Iu, dystroglycanopathy)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Regulatory/stabilising subunit; deficiency = DPM2-CDG (dystroglycanopathy).
          - id: dpm3_activity
            label: "DPM3: DPM synthase membrane anchor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DPM3 family (anchoring subunit)
                term:
                  id: PANTHER:PTHR16433
                  label: DOLICHOL-PHOSPHATE MANNOSYLTRANSFERASE SUBUNIT 3
                representative_members:
                  - preferred_term: DPM3 (human)
                    term:
                      id: UniProtKB:Q9P2X0
                      label: Dolichol-phosphate mannosyltransferase subunit 3
            function:
              preferred_term: protein-membrane adaptor activity
              term:
                id: GO:0043495
                label: protein-membrane adaptor activity
              substrates:
                - preferred_term: DPM1 (catalytic subunit)
              products:
                - preferred_term: ER-membrane-anchored DPM synthase
              evidence:
                - source_id: Reactome:R-HSA-162699
                  statement: "Synthesis of dolichyl-phosphate mannose (human Reactome sub-pathway)"
                - source_id: file:human/DPM3/DPM3-ai-review.yaml
                  statement: membrane anchor tethering TM-less DPM1 to the ER and bridging DPM1-DPM2; deficiency = DPM3-CDG (CDG-Io, dystroglycanopathy)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Membrane-anchoring subunit; deficiency = DPM3-CDG (dystroglycanopathy).
    - order: 4
      role: Dol-P-Glc synthesis
      node:
        id: alg5_step
        label: UDP-glucose + Dol-P to dolichyl-phosphate-glucose (Dol-P-Glc)
        module_type: REACTION
        annotons:
          - id: alg5_activity
            label: "ALG5: dolichyl-phosphate beta-glucosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dolichyl-phosphate glucosyltransferase family (ALG5)
                term:
                  id: PANTHER:PTHR10859
                  label: DOLICHYL-PHOSPHATE BETA-GLUCOSYLTRANSFERASE
                representative_members:
                  - preferred_term: ALG5 (human)
                    term:
                      id: UniProtKB:Q9Y673
                      label: Dolichyl-phosphate beta-glucosyltransferase
            function:
              preferred_term: dolichyl-phosphate beta-glucosyltransferase activity
              term:
                id: GO:0004581
                label: dolichyl-phosphate beta-glucosyltransferase activity
              substrates:
                - preferred_term: UDP-glucose
                - preferred_term: dolichyl phosphate
              products:
                - preferred_term: dolichyl-phosphate-glucose (Dol-P-Glc)
                - preferred_term: UDP
              evidence:
                - source_id: EC:2.4.1.117
                  statement: Dol-P-Glc synthase; transfers Glc from UDP-Glc to Dol-P, making the glucose donor for ALG6/ALG8/ALG10
                - source_id: Reactome:R-HSA-480985
                  statement: "Synthesis of dolichyl-phosphate-glucose (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Makes the Dol-P-Glc glucose donor for the lumenal LLO glucosylation steps.
              Deficiency = ALG5-CDG.
    - order: 5
      role: utilisation of the lipid-linked donors
      node:
        id: mpdu1_step
        label: presentation/utilisation of Dol-P-Man and Dol-P-Glc
        module_type: REACTION
        annotons:
          - id: mpdu1_activity
            label: "MPDU1 (Lec35): Dol-P-Man/Dol-P-Glc utilisation factor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MPDU1/Lec35 family
                term:
                  id: PANTHER:PTHR12226
                  label: MANNOSE-P-DOLICHOL UTILIZATION DEFECT 1 PROTEIN
                representative_members:
                  - preferred_term: MPDU1 (human)
                    term:
                      id: UniProtKB:O75352
                      label: Mannose-P-dolichol utilization defect 1 protein
            processes:
              - preferred_term: dolichol-linked oligosaccharide biosynthetic process
                term:
                  id: GO:0006488
                  label: dolichol-linked oligosaccharide biosynthetic process
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            evidence:
              - source_id: file:human/MPDU1/MPDU1-ai-review.yaml
                statement: non-catalytic ER-membrane factor required for utilisation/presentation of Dol-P-Man and Dol-P-Glc (the lipid-linked donors) to lumenal glycosyltransferases; deficiency = MPDU1-CDG (CDG-If)
            role_description: >-
              Non-catalytic utilisation/presentation factor enabling lumenal use of Dol-P-Man
              and Dol-P-Glc. MPDU1 has no informative molecular-function term (no F-aspect GOA
              annotation); represented here by its biological-process role.
  connections:
    - source: srd5a3_step
      target: dolk_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dolichol from SRD5A3 is phosphorylated by DOLK to dolichyl phosphate.
    - source: dolk_step
      target: dpm_complex_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dol-P from DOLK is mannosylated by the DPM synthase complex to Dol-P-Man.
    - source: dolk_step
      target: alg5_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dol-P from DOLK is glucosylated by ALG5 to Dol-P-Glc.
    - source: dpm_complex_step
      target: mpdu1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dol-P-Man made by the DPM synthase is presented by MPDU1 for lumenal glycosyltransferases.
    - source: alg5_step
      target: mpdu1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dol-P-Glc made by ALG5 is presented by MPDU1 for lumenal glycosyltransferases.
  notes: >-
    Dolichyl-phosphate and lipid-linked sugar-donor supply, grounded to the human enzymes SRD5A3
    (UniProtKB:Q9H8P0, GO:0160198, EC 1.3.1.94), DOLK (Q9UPQ8, GO:0004168, EC 2.7.1.108), the DPM
    synthase complex (DPM1 O60762 GO:0004582 catalytic EC 2.4.1.83, DPM2 O94777 GO:0008047
    regulatory, DPM3 Q9P2X0 GO:0043495 anchor; complex GO:0033185), ALG5 (Q9Y673, GO:0004581,
    EC 2.4.1.117) and MPDU1 (O75352, non-catalytic utilisation factor). GO
    molecular-function/BP/location terms were taken from the completed human gene reviews and
    verified against the local go.db; Reactome reaction ids/titles were verified against the local
    reactome cache. Each step uses a PANTHER family selector with the human protein as
    representative so the module generalises across orthologs/paralogs; the DPM synthase is modelled
    as a PROTEIN_COMPLEX node (one catalytic + two non-catalytic subunits). Note SRD5A3 is a
    polyprenol reductase, not a physiological steroid 5alpha-reductase despite its name; MPDU1
    (Lec35) has no informative molecular-function term and is represented by its BP role. This
    module supplies the Dol-P carrier (used by DPAGT1 and the cytoplasmic LLO module) and the
    Dol-P-Man / Dol-P-Glc donors (used by the lumenal LLO module ALG3/ALG9/ALG12 and ALG6/ALG8/
    ALG10), and also feeds GPI-anchor and O-/C-mannosylation. Disorders: every gene is a CDG type I
    (SRD5A3-, DOLK-, DPM1-, DPM2-, DPM3-, MPDU1-, ALG5-CDG), with DPM2-/DPM3-CDG presenting as
    muscular dystrophy-dystroglycanopathies and DOLK-CDG as dilated cardiomyopathy.
