id: MODULE:envelope_cell_wall_peptidase_inhibitor_boundary
title: Envelope cell-wall peptidase and inhibitor boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 cell-wall, envelope,
  exported peptidase, and protease-inhibitor split from the protein
  folding/targeting/turnover functional bucket. The module separates catalytic
  envelope peptidase activities from protease-inhibitor proteins and low-
  information domain-only candidates.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was partitioned into nine curation-scale splits; this
      module covers the cell_wall_envelope_peptidase_inhibitor split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_cell_wall_envelope_peptidase_inhibitor.tsv
    title: PSEPK cell-wall/envelope peptidase and inhibitor split
    statement: >-
      The batch table assigns PP_0435, yfhM, PP_1026, PP_1442, PP_1669,
      PP_1670, prc, PP_2108, PP_2364, eco, PP_4799, PP_5057, ctpA, PP_5092,
      PP_5323, and PP_5729 to this first-pass split.
  - source_id: file:PSEPK/PP_0435/PP_0435-ai-review.yaml
    title: Curated PP_0435 review
    statement: >-
      The PP_0435 review accepts M23/M37-family metalloendopeptidase activity,
      peptidoglycan turnover, cell-envelope localization, and peptidoglycan
      binding.
  - source_id: file:PSEPK/prc/prc-ai-review.yaml
    title: Curated prc review
    statement: >-
      The prc review records a periplasmic S41A-family serine peptidase while
      treating broad signal-transduction transfer as over-annotated.
  - source_id: file:PSEPK/eco/eco-ai-review.yaml
    title: Curated eco review
    statement: >-
      The eco review records periplasmic ecotin serine-type endopeptidase
      inhibitor activity and now includes Asta provenance for this batch.
  - source_id: file:PSEPK/PP_2108/PP_2108-ai-review.yaml
    title: Curated PP_2108 review
    statement: >-
      The PP_2108 review leaves the M15A C-terminal-domain candidate with no
      core function pending evidence for autonomous peptidase activity.
  - source_id: file:PSEPK/PP_5729/PP_5729-ai-review.yaml
    title: Curated PP_5729 review
    statement: >-
      The PP_5729 review leaves the I78-family peptidase-inhibitor candidate
      with no core function because current evidence is only low-information
      name/protein-language-model assignment.
notes: >-
  First-pass interpretation: this module is an envelope boundary rather than a
  single pathway. M23/M37, NlpC/P60, S41A, M14, and S66 peptidases are separated
  from alpha-2-macroglobulin, chagasin/I42, and ecotin inhibitor proteins.
  PP_2108 and PP_5729 are retained as unresolved no-core candidates. Broad
  signal-transduction and generic endopeptidase parent terms were not promoted
  to core functions when more specific activities were available.
