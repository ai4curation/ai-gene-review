id: MODULE:jnk_cascade
title: JNK (c-Jun N-terminal kinase) stress-activated MAPK cascade module
description: >-
  A taxon-neutral decomposition of the JNK (c-Jun N-terminal kinase) cascade,
  the stress- and cytokine-activated concrete realization of the generic
  three-tier MAP kinase relay (MODULE:mapk_relay). Environmental stress and
  inflammatory cytokines signal through upstream MAP3Ks (MEKK1/MAP3K1, ASK1,
  MLK family) to the dual-specificity MAP2Ks MKK4 (MAP2K4) and MKK7 (MAP2K7),
  which dually phosphorylate the JNK MAPKs (JNK1/2/3) on their TPY activation-loop
  motif. Active JNK phosphorylates the transcription factor c-Jun (and JunD,
  ATF2), assembling the AP-1 transcriptional program that controls stress
  responses, apoptosis, and proliferation. The kinase relay - MAP3K -> MKK4/7 ->
  JNK - is declared as an inner bundle that `conforms_to` mapk_relay, while the
  stress/cytokine input and the JNK/AP-1 output and DUSP-mediated feedback are
  this cascade's free extensions around the conforming core. Grounded in
  GO:0007254 (JNK cascade) / GO:0051403 (stress-activated MAPK cascade).
status: DRAFT
evidence:
  - source_id: GO:0007254
    title: JNK cascade
    statement: >-
      The module is grounded in the GO biological process term for the JNK
      cascade, the c-Jun N-terminal kinase branch of the MAPK cascade family.
  - source_id: GO:0051403
    title: stress-activated MAPK cascade
    statement: >-
      The JNK cascade is a stress-activated MAPK cascade, activated by
      environmental stress and inflammatory cytokines rather than mitogens.
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The relay tier conforms to the generic three-tier MAPK cascade motif
      (MODULE:mapk_relay).
  - source_id: PANTHER:PTN001171982
    title: PAINT JNK-family ancestral node
    statement: >-
      Local PAINT IBD seed rows place the curated JNK1 exemplar in PTHR24055
      node PTN001171982 with JNK cascade and JNK activity terms.
  - source_id: PANTHER:PTN000684494
    title: PAINT MAP2K stress-cascade ancestral node
    statement: >-
      Local PAINT IBD seed rows place curated MKK7-family exemplars in
      PTHR48013 node PTN000684494 with MAPK cascade and MAP kinase kinase
      activity terms.
notes: >-
  This module is the concrete JNK (stress-activated) branch of the generic
  three-tier MAP kinase relay (MODULE:mapk_relay): the inner `jnk_relay` node
  bundles the MAP3K -> MKK4/7 -> JNK tiers and declares conformance to that
  motif, while the stress/cytokine input step and the downstream JNK/AP-1 output
  and DUSP-feedback steps are this cascade's free extensions around the
  conforming core. Representative UniProt members (MEKK1 Q13233, MKK4 P45985,
  MKK7 O14733, JNK1 P45983) were verified against UniProt.
module:
  id: jnk_cascade
  label: JNK (c-Jun N-terminal kinase) cascade
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: JNK cascade
      term:
        id: GO:0007254
        label: JNK cascade
      description: Stress/cytokine-activated MAP3K -> MKK4/7 -> JNK protein kinase relay.
    - preferred_term: stress-activated MAPK cascade
      term:
        id: GO:0051403
        label: stress-activated MAPK cascade
      description: The stress-responsive MAPK module family that JNK belongs to.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: stress and cytokine input
      node:
        id: stress_input
        label: Stress/cytokine activation of the JNK MAP3K tier
        module_type: REGULATORY_STEP
        description: >-
          Environmental stress (UV, oxidative, heat) and inflammatory cytokines
          (TNF, IL-1), relayed through MAP4Ks, Rho-family GTPases, and adaptor
          MAP3Ks, converge to activate the MAP3K tier of the cascade.
        annotons:
          - id: stress_activation
            label: stress-activated MAP3K input
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: stress-activated MAPK cascade
                term:
                  id: GO:0051403
                  label: stress-activated MAPK cascade
            role_description: Couples stress and cytokine stimuli to the JNK relay.
    - order: 2
      role: JNK kinase relay (conforms to mapk_relay)
      node:
        id: jnk_relay
        label: JNK kinase relay (MAP3K -> MKK4/7 -> JNK)
        module_type: REACTION
        description: >-
          The three-tier kinase relay of the JNK cascade: a stress-activated
          MAP3K (MEKK1/ASK1/MLK) phosphorylates MKK4/MKK7 (MAP2K), which dually
          phosphorylates JNK (MAPK) on its TPY activation-loop motif.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              MAP3K -> MKK4/7 -> JNK fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
          - order: 1
            role: MAP3K tier (MEKK1/ASK1/MLK)
            node:
              id: jnk_map3k
              label: Stress-activated MAP3K activation
              module_type: REACTION
              description: >-
                Stress-activated MAP3Ks (MEKK1/MAP3K1, ASK1/MAP3K5, MLK family)
                phosphorylate and activate MKK4/MKK7.
              annotons:
                - id: jnk_map3k_activity
                  label: JNK-pathway MAP3K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: Stress-activated MAP3Ks (MEKK1/ASK1/MLK)
                      description: MEKK1 (MAP3K1), ASK1 (MAP3K5), and MLK-family MAP3Ks feeding the JNK tier.
                      representative_members:
                        - preferred_term: MEKK1 (MAP3K1)
                          term:
                            id: UniProtKB:Q13233
                            label: Mitogen-activated protein kinase kinase kinase 1
                  function:
                    preferred_term: MAP kinase kinase kinase activity
                    term:
                      id: GO:0004709
                      label: MAP kinase kinase kinase activity
                    targets:
                      - preferred_term: MKK4/MKK7
                  role_description: Top kinase tier; activates MKK4/7.
          - order: 2
            role: MAP2K tier (MKK4/MKK7)
            node:
              id: jnk_map2k
              label: MKK4/MKK7 MAP kinase kinase activation
              module_type: REACTION
              description: >-
                The dual-specificity MAP2Ks MKK4 (MAP2K4) and MKK7 (MAP2K7)
                phosphorylate JNK on both threonine and tyrosine of its TPY motif;
                MKK4 preferentially targets the tyrosine and MKK7 the threonine.
              annotons:
                - id: jnk_map2k_activity
                  label: MKK4/MKK7 MAP2K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: MKK4/MKK7 (MAP2K4/MAP2K7)
                      description: Dual-specificity MAP kinase kinases dedicated to the JNK tier.
                      representative_members:
                        - preferred_term: MKK4 (MAP2K4)
                          term:
                            id: UniProtKB:P45985
                            label: Dual specificity mitogen-activated protein kinase kinase 4
                        - preferred_term: MKK7 (MAP2K7)
                          term:
                            id: UniProtKB:O14733
                            label: Dual specificity mitogen-activated protein kinase kinase 7
                  function:
                    preferred_term: MAP kinase kinase activity
                    term:
                      id: GO:0004708
                      label: MAP kinase kinase activity
                    targets:
                      - preferred_term: JNK TPY motif
                  role_description: Middle kinase tier; dual-specificity activation of JNK.
          - order: 3
            role: MAPK tier (JNK)
            node:
              id: jnk_mapk
              label: JNK MAP kinase activation
              module_type: REACTION
              description: >-
                Dually phosphorylated JNK1/2/3 (MAPK8/9/10) becomes an active
                proline-directed serine/threonine kinase acting on cytoplasmic and
                nuclear substrates.
              annotons:
                - id: jnk_mapk_activity
                  label: JNK MAP kinase activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: JNK MAPKs (MAPK8/9/10)
                      description: The terminal stress-activated effector kinases of the JNK cascade.
                      representative_members:
                        - preferred_term: JNK1 (MAPK8)
                          term:
                            id: UniProtKB:P45983
                            label: Mitogen-activated protein kinase 8
                  function:
                    preferred_term: MAP kinase activity
                    term:
                      id: GO:0004707
                      label: MAP kinase activity
                  locations:
                    - preferred_term: nucleus
                      term:
                        id: GO:0005634
                        label: nucleus
                  role_description: Effector kinase transducing the stress signal to substrates.
        connections:
          - source: jnk_map3k
            target: jnk_map2k
            connection_type: CAUSES
            description: The MAP3K phosphorylates and activates MKK4/7.
          - source: jnk_map2k
            target: jnk_mapk
            connection_type: CAUSES
            description: MKK4/7 dually phosphorylates JNK.
    - order: 3
      role: JNK / AP-1 transcriptional output
      node:
        id: jnk_output
        label: JNK effector and AP-1 transcriptional output
        module_type: REGULATORY_STEP
        description: >-
          Active JNK phosphorylates the transcription factor c-Jun (and JunD,
          ATF2), promoting assembly of the AP-1 transcription factor complex and
          a stress/apoptosis/proliferation gene program.
        annotons:
          - id: jnk_substrate_output
            label: JNK substrate phosphorylation and AP-1 activation
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            processes:
              - preferred_term: positive regulation of transcription by RNA polymerase II
                term:
                  id: GO:0045944
                  label: positive regulation of transcription by RNA polymerase II
            role_description: Converts JNK activity into an AP-1-driven gene program.
    - order: 4
      role: negative regulation and feedback
      node:
        id: jnk_negative_regulation
        label: DUSP/MKP dephosphorylation of JNK
        module_type: REACTION
        description: >-
          DUSP/MKP dual-specificity phosphatases (e.g. DUSP10/MKP-5, DUSP16/MKP-7)
          dephosphorylate the JNK activation loop to terminate signaling.
        annotons:
          - id: jnk_dusp_role
            label: DUSP/MKP phosphatase function
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DUSP/MKP dual-specificity phosphatases (JNK-directed)
                description: JNK-inactivating dual-specificity (Thr/Tyr) MAP kinase phosphatases.
            role_description: Dephosphorylates the JNK activation loop to terminate signaling.
  connections:
    - source: stress_input
      target: jnk_relay
      connection_type: CAUSES
      description: Stress/cytokine stimuli activate the MAP3K tier of the JNK relay.
    - source: jnk_relay
      target: jnk_output
      connection_type: PROVIDES_INPUT_FOR
      description: Active JNK phosphorylates c-Jun and assembles AP-1.
    - source: jnk_negative_regulation
      target: jnk_mapk
      connection_type: NEGATIVELY_REGULATES
      description: DUSP/MKP phosphatases dephosphorylate JNK.
