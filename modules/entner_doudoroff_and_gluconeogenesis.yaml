id: MODULE:entner_doudoroff_and_gluconeogenesis
title: Entner-Doudoroff glycolysis and gluconeogenesis module
description: >-
  A taxon-neutral module for bacterial hexose-phosphate central carbon metabolism
  in organisms that route glucose through the Entner-Doudoroff pathway rather
  than relying on a complete forward Embden-Meyerhof-Parnas glycolytic route.
  The module separates the upper Entner-Doudoroff branch from shared lower
  glycolytic reactions and from gluconeogenic bypass reactions that regenerate
  hexose phosphate from pyruvate, phosphoenolpyruvate, or triose phosphate
  precursors.
status: DRAFT
evidence:
  - source_id: GO:0061688
    title: glycolytic process via Entner-Doudoroff Pathway
    statement: >-
      GO represents glycolytic flux through the Entner-Doudoroff pathway as a
      biological process distinct from canonical glycolysis.
  - source_id: GO:0009255
    title: Entner-Doudoroff pathway through 6-phosphogluconate
    statement: >-
      GO represents the 6-phosphogluconate Entner-Doudoroff route as a more
      specific pathway term.
  - source_id: GO:0006094
    title: gluconeogenesis
    statement: >-
      The reverse/anabolic route from lower central-carbon intermediates to
      hexose phosphates is grounded in the gluconeogenesis process term.
  - source_id: file:modules/entner_doudoroff_and_gluconeogenesis-deep-research-falcon.md
    title: Falcon module research for Entner-Doudoroff glycolysis and gluconeogenesis
    statement: >-
      Module-level research supports splitting ED-centered bacterial glucose
      catabolism from canonical EMP glycolysis and treating gluconeogenic
      bypasses as part of the same central-carbon module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__entner_doudoroff_and_gluconeogenesis__ppu00010-deep-research-falcon.md
    title: Falcon PSEPK ppu00010 pathway satisfiability review
    statement: >-
      PSEPK-specific pathway research found that KEGG ppu00010 includes only a
      subset of the KT2440 ED/gluconeogenesis candidates and that core ED genes
      must be pulled from the neighboring pentose-phosphate boundary.
