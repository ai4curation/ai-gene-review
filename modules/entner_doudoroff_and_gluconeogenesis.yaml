  connections:
    - source: glucokinase_step
      target: glucose_6_phosphate_to_6_phosphogluconate
      connection_type: PRECEDES
    - source: glucose_6_phosphate_to_6_phosphogluconate
      target: entner_doudoroff_branch
      connection_type: PRECEDES
    - source: entner_doudoroff_branch
      target: lower_emp_trunk
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The ED branch generates glyceraldehyde 3-phosphate that can enter the
        lower EMP trunk; it also directly produces pyruvate.
    - source: lower_emp_trunk
      target: gluconeogenic_bypasses
      connection_type: PRECEDES
      description: >-
        Lower EMP reactions are reversible or near-reversible except for the
        terminal pyruvate kinase step; gluconeogenic bypasses regenerate PEP and
        fructose 6-phosphate when carbon flows toward hexose phosphate.
  notes: >-
    This module deliberately does not model periplasmic glucose oxidation,
    gluconate/2-ketogluconate loops, or pentose-phosphate recycling as required
    core parts. Those routes are organism-specific entry or recycling branches
    that feed 6-phosphogluconate and should be added in a species-specific
    realization when supported. For P. putida KT2440, KEGG ppu00010 alone is an
    incomplete satisfiability boundary: the ED branch is satisfied by
    edd/Q88P43, zwfA/Q88P31, pgl/Q88P30, and eda/Q88P29 even though those genes
    are assigned through neighboring pentose-phosphate or glutathione-metabolism
    buckets. Other PSEPK exemplars include glk/Q88P42, gapA/Q88P44 and/or
    gapB/Q88KZ0, pgk/Q88D64, gpmI/Q88CX4, eno/Q88MF9, pykA/Q88N54 and/or
    pyk/Q88EZ9, ppsA/Q88L53, fba/Q88D67, fbp/Q88CY9, and pgi1/Q88LW9 plus
    pgi2/Q88DW7. The PEP synthase route can satisfy pyruvate-to-PEP in KT2440
    without requiring a PEP carboxykinase variant.
