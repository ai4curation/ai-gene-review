id: MODULE:estrogen_receptor_signaling
title: Estrogen receptor signaling pathway module
description: Estrogen receptors act as ligand-regulated nuclear receptors and signaling scaffolds, 
  recruiting co-regulators to control chromatin, transcription, and cell-type-specific hormone 
  responses.
