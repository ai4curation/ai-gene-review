knowledge_gaps:
  - gap_statement: Genomic versus non-genomic integration remains unresolved in the Estrogen 
      receptor signaling pathway module.
    boundary: 'Although the genomic and non-genomic arms of estrogen signaling are frequently discussed
      as separate pathways, accumulating evidence suggests they are deeply interconnected through phosphorylation-dependent
      cross-talk: non-genomic kinase cascades phosphorylate ERalpha and its cofactors, modulating genomic
      transcriptional output (toumba2024estrogenreceptorsignaling pages 2-5, clusan2023abasicreview pages
      7-9).'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/estrogen_receptor_signaling-deep-research-falcon.md
  - gap_statement: GPER1 physiological significance remains unresolved in the Estrogen receptor 
      signaling pathway module.
    boundary: Despite over a decade of research since GPER1 was recognized as an estrogen receptor 
      (2008), its precise physiological role remains debated. Questions persist about whether GPER1 
      truly functions as a bona fide G protein-coupled estrogen receptor in vivo, and its exact 
      interactions with estrogens "remain to be determined" (toumba2024estrogenreceptorsignaling 
      pages 2-5, xu2023theroleof pages 15-17).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/estrogen_receptor_signaling-deep-research-falcon.md
  - gap_statement: Coregulator redundancy and specificity remains unresolved in the Estrogen 
      receptor signaling pathway module.
    boundary: The three SRC family members (NCOA1, NCOA2, NCOA3) show overlapping but non-identical 
      functions. Recent evidence from macrophages demonstrates that even the closely related 
      corepressors NCOR1 and NCOR2/SMRT have non-redundant roles-SMRT depletion primarily affects 
      inflammatory pathways while NCOR depletion primarily affects metabolic pathways-suggesting a 
      functional hierarchy rather than simple redundancy (efthymiado...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/estrogen_receptor_signaling-deep-research-falcon.md
  - gap_statement: The binary switch versus coregulator shift model remains unresolved in the 
      Estrogen receptor signaling pathway module.
    boundary: The classical model of a binary coactivator/corepressor switch has been challenged by 
      evidence supporting graded transitions and simultaneous co-occupancy patterns at regulatory 
      elements (bawa2026nuclearreceptorcoregulator pages 1-2). The emerging "coregulator shift" 
      model posits that the balance between activating and repressing complexes is dynamically 
      modulated rather than representing discrete on/off states.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/estrogen_receptor_signaling-deep-research-falcon.md
  - gap_statement: ERalpha/ERbeta heterodimerization remains unresolved in the Estrogen receptor 
      signaling pathway module.
    boundary: While both homodimers and heterodimers form in vitro and in overexpression systems, 
      the functional significance and prevalence of ERalpha/ERbeta heterodimers under physiological 
      conditions-particularly at endogenous expression levels-remains uncertain 
      (wnuk2023emergingevidenceon pages 2-4, miziak2023estrogenreceptorsignaling pages 2-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/estrogen_receptor_signaling-deep-research-falcon.md
  - gap_statement: Invertebrate ER function remains unresolved in the Estrogen receptor signaling 
      pathway module.
    boundary: Although ER homologs are found across diverse protostome and deuterostome lineages, 
      functional data from invertebrates remain limited. Mollusk ERs, for example, appear 
      constitutively active rather than ligand-regulated, raising questions about whether 
      estrogen-dependent regulation is a vertebrate innovation or was secondarily lost in certain 
      lineages (taubenheim2021functionandevolution pages 4-5).
    gap_kind:
