notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  No local PAINT IBD seed rows were found for the verified exemplar accessions in this module, so no ancestral_nodes
  are asserted. Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit
  evidence, structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions:
  Genomic versus non-genomic integration; GPER1 physiological significance; Coregulator redundancy and
  specificity; The binary switch versus coregulator shift model; ERalpha/ERbeta heterodimerization; Invertebrate
  ER function. Machine-generated Falcon citations remain curation support and are not manually adjudicated
  here.
