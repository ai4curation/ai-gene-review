id: MODULE:novobiocin_biosynthesis_boundary
title: Novobiocin biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00401 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only shared amino-acid and aromatic
  precursor enzymes: HisC, AroA, TyrB, and AmaC. These support histidine
  biosynthesis, chorismate/aromatic-amino-acid biosynthesis, and aromatic amino
  acid transamination, but not a complete novobiocin aminocoumarin antibiotic
  biosynthesis pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00401
    title: Novobiocin biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00401 provides the PSEPK curation batch; its KT2440 membership is
      limited to HisC, AroA, TyrB, and AmaC, all of which are shared amino-acid
      or aromatic-precursor enzymes rather than novobiocin-specific biosynthetic
      enzymes.
  - source_id: GO:0009073
    title: aromatic amino acid family biosynthetic process
    statement: >-
      The supported aromatic portion of the batch is shared chorismate/aromatic
      amino acid metabolism, not aminocoumarin antibiotic assembly.
  - source_id: GO:0000105
    title: L-histidine biosynthetic process
    statement: >-
      HisC is a histidine-biosynthesis enzyme and is treated as boundary context
      for the novobiocin KEGG map.
module:
  id: novobiocin_biosynthesis_boundary
  label: Novobiocin biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: novobiocin biosynthesis boundary
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has only
        shared amino-acid and aromatic-precursor enzymes from ppu00401, not a
        satisfiable novobiocin biosynthetic module.
    - preferred_term: aromatic amino acid family biosynthetic process
      term:
        id: GO:0009073
        label: aromatic amino acid family biosynthetic process
      description: Shared chorismate-derived aromatic amino acid biosynthesis.
    - preferred_term: L-histidine biosynthetic process
      term:
        id: GO:0000105
        label: L-histidine biosynthetic process
      description: Histidine biosynthesis side context represented by HisC.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: The ppu00401 member enzymes are soluble bacterial metabolic enzymes.
  parts:
    - order: 1
      role: Histidine-biosynthesis transamination side context
      node:
        id: histidinol_phosphate_transamination_boundary
        label: HisC histidinol-phosphate transamination
        module_type: REACTION
        description: >-
          HisC catalyzes a core histidine-biosynthesis transamination step. Its
          presence in ppu00401 is treated as shared amino-acid metabolism rather
          than novobiocin-pathway satisfiability.
        annotons:
          - id: hisC_histidinol_phosphate_transaminase
            label: "hisC: histidinol-phosphate aminotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hisC
            function:
              preferred_term: L-histidinol-phosphate:2-oxoglutarate transaminase activity
              term:
                id: GO:0004400
                label: L-histidinol-phosphate:2-oxoglutarate transaminase activity
            role_description: Histidine-biosynthesis enzyme; boundary-only for novobiocin biosynthesis.
    - order: 2
      role: Shared shikimate/chorismate precursor chemistry
      node:
        id: chorismate_precursor_boundary
        label: AroA EPSP synthase / chorismate precursor chemistry
        module_type: REACTION
        description: >-
          AroA performs the EPSP synthase step of the shikimate pathway and also
          carries a TyrA-like prephenate dehydrogenase module. This supports
          chorismate and aromatic amino acid biosynthesis, not a novobiocin
          biosynthetic cluster.
        annotons:
          - id: aroA_epsp_synthase
            label: "aroA: EPSP synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aroA
            function:
              preferred_term: 3-phosphoshikimate 1-carboxyvinyltransferase activity
              term:
                id: GO:0003866
                label: 3-phosphoshikimate 1-carboxyvinyltransferase activity
            role_description: Shared shikimate-pathway enzyme; boundary-only for novobiocin biosynthesis.
    - order: 3
      role: Aromatic amino acid aminotransferase side context
      node:
        id: aromatic_aminotransferase_boundary
        label: TyrB/AmaC aromatic amino acid transamination
        module_type: REACTION
        description: >-
          TyrB and AmaC are PLP-dependent aromatic amino acid aminotransferases
          involved in phenylalanine and tyrosine metabolism. They are useful
          aromatic-amino-acid context but do not satisfy novobiocin antibiotic
          biosynthesis in KT2440.
        annotons:
          - id: tyrB_tyrosine_aminotransferase
            label: "tyrB: L-tyrosine aminotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tyrB
            function:
              preferred_term: L-tyrosine:2-oxoglutarate transaminase activity
              term:
                id: GO:0004838
                label: L-tyrosine:2-oxoglutarate transaminase activity
            role_description: Aromatic amino acid aminotransferase; boundary-only for novobiocin biosynthesis.
          - id: amaC_tyrosine_aminotransferase
            label: "amaC: L-tyrosine aminotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: amaC
            function:
              preferred_term: L-tyrosine:2-oxoglutarate transaminase activity
              term:
                id: GO:0004838
                label: L-tyrosine:2-oxoglutarate transaminase activity
            role_description: Aromatic amino acid aminotransferase; boundary-only for novobiocin biosynthesis.
  notes: >-
    This module is intentionally named as a boundary/absence module. PSEPK has
    four shared amino-acid or aromatic-precursor enzymes on KEGG ppu00401, but
    the first-pass curation does not support annotating KT2440 as carrying a
    complete novobiocin biosynthesis pathway.
