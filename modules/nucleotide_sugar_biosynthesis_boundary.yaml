                label: heptose-1-phosphate adenylyltransferase activity
            role_description: Second HldE activity producing ADP-heptose.
          - id: gmhB_heptose_bisphosphate_phosphatase
            label: "gmhB: D-glycero-beta-D-manno-heptose 1,7-bisphosphate 7-phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gmhB
            function:
              preferred_term: D-glycero-beta-D-manno-heptose 1,7-bisphosphate 7-phosphatase activity
              term:
                id: GO:0034200
