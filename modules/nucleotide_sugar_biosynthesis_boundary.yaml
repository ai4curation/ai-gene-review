id: MODULE:nucleotide_sugar_biosynthesis_boundary
title: Nucleotide sugar biosynthesis boundary
description: >-
  Boundary module for KEGG ppu00541 in Pseudomonas putida KT2440. The
  organism-specific map combines several envelope-precursor nucleotide-sugar
  branches: ADP-heptose for LPS core assembly, Kdo/CMP-Kdo for LPS core linkage,
  dTDP-rhamnose, GDP-mannose/GDP-D-rhamnose/alginate context, UDP-glucose,
  UDP-glucuronate, UDP-GlcNAc, and a few unresolved polysaccharide or redox side
  candidates. It should not be curated as a single linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00541
    title: Biosynthesis of various nucleotide sugars - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00541 provides the PSEPK curation batch. Its membership contains
      enzymes from multiple nucleotide-sugar precursor branches rather than one
      route with a single product.
module:
  id: nucleotide_sugar_biosynthesis_boundary
  label: Nucleotide sugar biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: nucleotide-sugar metabolic process
      term:
        id: GO:0009225
        label: nucleotide-sugar metabolic process
      description: Umbrella context for the composite KEGG map.
    - preferred_term: ADP-L-glycero-beta-D-manno-heptose biosynthetic process
      term:
        id: GO:0097171
        label: ADP-L-glycero-beta-D-manno-heptose biosynthetic process
      description: ADP-heptose branch feeding LPS core biosynthesis.
    - preferred_term: keto-3-deoxy-D-manno-octulosonic acid biosynthetic process
      term:
        id: GO:0019294
        label: keto-3-deoxy-D-manno-octulosonic acid biosynthetic process
      description: Kdo precursor branch feeding CMP-Kdo and LPS core linkage.
    - preferred_term: CMP-keto-3-deoxy-D-manno-octulosonic acid biosynthetic process
      term:
        id: GO:0033468
        label: CMP-keto-3-deoxy-D-manno-octulosonic acid biosynthetic process
      description: KdsB activation of Kdo to CMP-Kdo.
    - preferred_term: dTDP-rhamnose biosynthetic process
      term:
        id: GO:0019305
        label: dTDP-rhamnose biosynthetic process
      description: dTDP-rhamnose branch shared with ppu00523.
    - preferred_term: GDP-mannose biosynthetic process
      term:
        id: GO:0009298
        label: GDP-mannose biosynthetic process
      description: GDP-mannose precursor branch represented by AlgA-like enzymes.
    - preferred_term: GDP-D-rhamnose biosynthetic process
      term:
        id: GO:0019306
        label: GDP-D-rhamnose biosynthetic process
      description: Gmd/Rmd branch downstream of GDP-mannose.
    - preferred_term: UDP-N-acetylglucosamine biosynthetic process
      term:
        id: GO:0006048
        label: UDP-N-acetylglucosamine biosynthetic process
      description: GlmU branch feeding peptidoglycan and lipid A precursor chemistry.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most mapped enzymes are soluble bacterial cytoplasmic enzymes.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: GOA uses cytosol for several soluble nucleotide-sugar enzymes.
  parts:
    - order: 1
      role: ADP-heptose branch for LPS core biosynthesis
      node:
        id: adp_heptose_biosynthesis
        label: ADP-heptose biosynthesis
        module_type: METABOLIC_PATHWAY
        annotons:
          - id: gmhA_phosphoheptose_isomerase
            label: "gmhA: phosphoheptose isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gmhA
            function:
              preferred_term: D-sedoheptulose 7-phosphate isomerase activity
              term:
                id: GO:0008968
                label: D-sedoheptulose 7-phosphate isomerase activity
            role_description: Forms D-glycero-D-manno-heptose 7-phosphate.
          - id: hldE_heptose_7_phosphate_kinase
            label: "hldE: heptose 7-phosphate kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hldE
            function:
              preferred_term: heptose 7-phosphate kinase activity
              term:
                id: GO:0033785
                label: heptose 7-phosphate kinase activity
            role_description: First HldE activity in ADP-heptose biosynthesis.
          - id: hldE_heptose_1_phosphate_adenylyltransferase
            label: "hldE: heptose-1-phosphate adenylyltransferase"
            participant:
