id: MODULE:bacterial_lipoprotein_maturation
title: Bacterial lipoprotein maturation
description: >-
  A species-neutral bacterial envelope-biogenesis module for the ordered
  maturation of lipobox-containing prolipoproteins by Lgt diacylglyceryl
  transfer, LspA signal peptide cleavage, and Lnt or lineage-equivalent
  N-acylation where triacylated lipoproteins are produced. Pseudomonas putida
  KT2440 provides the current UniProt exemplars for the canonical diderm
  Lgt-LspA-Lnt route; Lol sorting and substrate-specific lipoprotein functions
  are downstream context outside this module.
status: DRAFT
evidence:
  - source_id: GO:0042158
    title: lipoprotein biosynthetic process
    statement: >-
      GO:0042158 is the biological-process term for formation of mature
      lipoproteins and covers the shared process context for Lgt, LspA, and Lnt.
  - source_id: UniPathway:UPA00664
    title: UniPathway UPA00664
    statement: >-
      UPA00664 represents the Lgt diacylglyceryl-transfer substep of bacterial
      lipoprotein biosynthesis.
  - source_id: UniPathway:UPA00665
    title: UniPathway UPA00665
    statement: >-
      UPA00665 represents the LspA signal-peptide-cleavage substep of bacterial
      lipoprotein biosynthesis.
  - source_id: UniPathway:UPA00666
    title: UniPathway UPA00666
    statement: >-
      UPA00666 represents the Lnt N-acyl-transfer substep of bacterial
      lipoprotein biosynthesis.
  - source_id: file:modules/prolipoprotein_diacylglyceryl_transfer-deep-research-openscientist.md
    title: OpenScientist module research for the Lgt step
    statement: >-
      OpenScientist supports UPA00664 as the first committed Lgt step and
      explicitly separates it from downstream LspA cleavage, Lnt N-acylation,
      and Lol sorting.
  - source_id: file:modules/apolipoprotein_n_acyltransferase-deep-research-openscientist.md
    title: OpenScientist module research for the Lnt step
    statement: >-
      OpenScientist supports UPA00666 as the terminal Lnt N-acylation step of
      diderm bacterial lipoprotein maturation and separates it from upstream
      Lgt and LspA reactions.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__prolipoprotein_diacylglyceryl_transfer__upa00664-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00664 satisfiability review
    statement: >-
      The species-aware UPA00664 review supports lgt/PP_5142/Q88CN8 as the
      single high-confidence KT2440 Lgt candidate and warns not to count the
      PP_4236 DsbE/CcmG-like protein as a second Lgt.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__apolipoprotein_n_acyltransferase__upa00666-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00666 satisfiability review
    statement: >-
      The species-aware UPA00666 review supports lnt/PP_4790/Q88DN4 as the
      single high-confidence KT2440 Lnt candidate and notes intact neighboring
      Lgt, LspA, and Lol machinery.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__bacterial_lipoprotein_maturation__upa00665-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00665 satisfiability review
    statement: >-
      The species-aware UPA00665 review supports lspA/PP_0604/Q88Q91 as the
      KT2440 signal-peptidase-II step and treats the lspA-only candidate list as
      a KEGG-boundary artifact, because the adjacent Lgt and Lnt steps are
      encoded by PP_5142 and PP_4790.
  - source_id: file:modules/bacterial_lipoprotein_maturation-deep-research-openscientist.md
    title: OpenScientist module research for bacterial lipoprotein maturation
    statement: >-
      OpenScientist supports the reusable boundary as a strictly ordered
      Lgt-to-LspA-to-terminal-acylation maturation module, separates downstream
      Lol sorting and substrate-specific lipoprotein functions, and emphasizes
      that the terminal N-acylation chemistry is lineage-variable.
  - source_id: file:PSEPK/lgt/lgt-ai-review.yaml
    title: Curated lgt review
    statement: >-
      The lgt review accepts phosphatidylglycerol-prolipoprotein
      diacylglyceryl transferase activity, plasma membrane localization, and
      lipoprotein biosynthetic process.
  - source_id: file:PSEPK/lspA/lspA-ai-review.yaml
    title: Curated lspA review
    statement: >-
      The lspA review accepts LspA's aspartic-type endopeptidase activity and
      plasma membrane localization, modifies broad proteolysis to lipoprotein
      biosynthetic process, and proposes a more specific lipoprotein signal
      peptidase activity term.
  - source_id: file:PSEPK/lnt/lnt-ai-review.yaml
    title: Curated lnt review
    statement: >-
      The lnt review accepts or refines annotations to N-acyltransferase
      activity, plasma membrane localization, and lipoprotein biosynthetic
      process.
notes: >-
  Reusable boundary: this module models maturation chemistry, not all proteins
  that later behave as mature lipoproteins. The canonical diderm route is
  Lgt-dependent diacylglyceryl transfer, LspA signal peptide cleavage, and Lnt
  N-acylation. Monoderm lineages can retain Lgt/LspA but use non-orthologous or
  variable terminal modification; those variants should be modeled explicitly
  rather than forcing Lnt where it is absent. The PSEPK instantiation is
  satisfiable with lgt/Q88CN8, lspA/Q88Q91, and lnt/Q88DN4 as local UniProt
  exemplars.
module:
  id: bacterial_lipoprotein_maturation
  label: Bacterial lipoprotein maturation
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: lipoprotein biosynthetic process
      term:
        id: GO:0042158
        label: lipoprotein biosynthetic process
      description: Formation of mature bacterial lipoproteins from prolipoprotein precursors.
  context:
    taxa:
      - preferred_term: bacteria
        term:
          id: NCBITaxon:2
          label: Bacteria
        description: >-
          Lgt/LspA-dependent lipoprotein maturation is bacterial envelope
          biology; terminal acylation chemistry varies across bacterial
          lineages.
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: >-
          Bacterial inner/cytoplasmic membrane context where Lgt, LspA, and Lnt
          act on membrane-anchored lipoprotein intermediates.
  parts:
    - order: 1
      role: Diacylglyceryl transfer to prolipoprotein cysteine
      node:
        id: lgt_diacylglyceryl_transfer_step
        label: Lgt diacylglyceryl transfer
        module_type: REACTION
        description: >-
          Lgt transfers a diacylglyceryl group from phosphatidylglycerol to the
          conserved cysteine of a lipobox-containing prolipoprotein.
        annotons:
          - id: lgt_diacylglyceryl_transferase
            label: "Lgt family: prolipoprotein diacylglyceryl transferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: prolipoprotein diacylglyceryl transferase family
                term:
                  id: InterPro:IPR001640
                  label: Lgt
                representative_members:
                  - preferred_term: PSEPK lgt exemplar
                    term:
                      id: UniProtKB:Q88CN8
                      label: Phosphatidylglycerol--prolipoprotein diacylglyceryl transferase
                    description: Pseudomonas putida KT2440 UPA00664 exemplar.
            function:
              preferred_term: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              term:
                id: GO:0008961
                label: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              evidence:
                - source_id: file:PSEPK/lgt/lgt-uniprot.txt
                  statement: >-
                    UniProt assigns Q88CN8 to EC 2.5.1.145 and Rhea:RHEA:56712
                    for diacylglyceryl transfer from phosphatidylglycerol to
                    prolipoprotein cysteine.
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              First committed lipidation step; creates the diacylglyceryl
              prolipoprotein substrate required by LspA.
    - order: 2
      role: Signal peptide cleavage from diacylglyceryl-prolipoprotein
      node:
        id: lspa_signal_peptide_cleavage_step
        label: LspA signal peptide cleavage
        module_type: REACTION
        description: >-
          LspA/signal peptidase II removes the signal peptide immediately
          N-terminal to the diacylglyceryl-modified lipobox cysteine.
        annotons:
          - id: lspa_signal_peptidase_ii
            label: "LspA family: signal peptidase II"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: lipoprotein signal peptidase family
                term:
                  id: PANTHER:PTHR33695
                  label: LIPOPROTEIN SIGNAL PEPTIDASE
                representative_members:
                  - preferred_term: PSEPK lspA exemplar
                    term:
                      id: UniProtKB:Q88Q91
                      label: Lipoprotein signal peptidase
                    description: Pseudomonas putida KT2440 UPA00665 exemplar.
            function:
              preferred_term: aspartic-type endopeptidase activity
              term:
                id: GO:0004190
                label: aspartic-type endopeptidase activity
              evidence:
                - source_id: file:PSEPK/lspA/lspA-ai-review.yaml
                  statement: >-
                    The lspA review accepts GO:0004190 as the currently
                    available broad molecular function and proposes a more
                    specific lipoprotein signal peptidase activity term.
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Ordered middle step; acts after Lgt lipidation and before terminal
              N-acylation by Lnt or a lineage-specific equivalent.
    - order: 3
      role: Terminal N-acylation of apolipoprotein
      node:
        id: lnt_n_acylation_step
        label: Lnt N-acylation
        module_type: REACTION
        description: >-
          Lnt transfers an acyl chain from a glycerophospholipid donor to the
          N-terminal cysteine amino group of a diacylglyceryl apolipoprotein.
        annotons:
          - id: lnt_n_acyltransferase
            label: "Lnt family: apolipoprotein N-acyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: apolipoprotein N-acyltransferase family
                term:
                  id: InterPro:IPR004563
                  label: Apolipo_AcylTrfase
                representative_members:
                  - preferred_term: PSEPK lnt exemplar
                    term:
                      id: UniProtKB:Q88DN4
                      label: Apolipoprotein N-acyltransferase
                    description: Pseudomonas putida KT2440 UPA00666 exemplar.
            function:
              preferred_term: apolipoprotein N-acyltransferase activity
              term:
                id: GO:0016747
                label: acyltransferase activity, transferring groups other than amino-acyl groups
              evidence:
                - source_id: file:PSEPK/lnt/lnt-uniprot.txt
                  statement: >-
                    UniProt assigns Q88DN4 to EC 2.3.1.269 and Rhea:RHEA:48228
                    for terminal N-acylation of diacylglyceryl lipoprotein.
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Terminal diderm lipoprotein-maturation step; creates the mature
              triacylated lipoprotein used by downstream envelope sorting
              systems.
  connections:
    - source: lgt_diacylglyceryl_transfer_step
      target: lspa_signal_peptide_cleavage_step
      connection_type: PRECEDES
    - source: lspa_signal_peptide_cleavage_step
      target: lnt_n_acylation_step
      connection_type: PRECEDES
  knowledge_gaps:
    - gap_statement: >-
        GO currently lacks a specific lipoprotein signal peptidase activity term
        for LspA, so the module uses the broad aspartic-type endopeptidase
        activity term at the LspA step.
      boundary: >-
        Keep the precise signal-peptidase-II chemistry in role descriptions and
        proposed GO term notes until a specific GO molecular-function term is
        available.
      gap_kind:
        - CURATION
    - gap_statement: >-
        GO currently lacks a specific apolipoprotein N-acyltransferase activity
        term for Lnt; the formerly used GO:0016410 is obsolete, so the module
        uses the valid but broad GO:0016747 term.
      boundary: >-
        Lnt's EC 2.3.1.269 reaction and phospholipid-dependent N-acylation of the
        N-terminal lipoprotein cysteine are established; only the ontology
        representation lacks substrate-level specificity.
      gap_kind:
        - ONTOLOGY
    - gap_statement: >-
        Direct KT2440 biochemical evidence for Lgt, LspA, and Lnt remains
        limited; assignments are high-confidence transfers from reviewed
        UniProt/HAMAP rules, conserved domains, catalytic residues, and close
        bacterial orthologs.
      boundary: >-
        Treat the module as satisfiable in PSEPK, but do not claim KT2440-specific
        kinetics, essentiality, or substrate repertoire without new experiments.
      gap_kind:
        - BIOLOGY
    - gap_statement: >-
        PP_4236/Q88F63 carries an Lgt-like propagated annotation in the
        UPA00664 species-aware report, but its domain architecture is more
        consistent with a DsbE/CcmG-like thiol-disulfide oxidoreductase.
      boundary: >-
        Do not count PP_4236 as an Lgt module member unless a separate gene
        review overturns the OpenScientist/species-aware assessment.
      gap_kind:
        - CURATION
    - gap_statement: >-
        The local pathway partition places lspA primarily in KEGG ppu03060
        Protein export and does not resolve UPA00665 as a complete local bucket,
        so an automated pathway candidate list can incorrectly show only the
        signal-peptidase-II step.
      boundary: >-
        Treat this as a partitioning artifact, not a biological gap: the PSEPK
        module instantiation is covered by lgt/PP_5142, lspA/PP_0604, and
        lnt/PP_4790.
      gap_kind:
        - CURATION
