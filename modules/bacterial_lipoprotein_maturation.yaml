id: MODULE:bacterial_lipoprotein_maturation
title: Bacterial lipoprotein maturation
description: >-
  Compact Pseudomonas putida KT2440 module for bacterial lipoprotein maturation
  at the inner membrane. The pathway starts with Lgt-dependent
  diacylglyceryl transfer to prolipoprotein cysteine, continues with LspA
  signal peptide cleavage, and ends with Lnt-dependent N-acyl transfer to form
  mature triacylated lipoproteins. This module captures lipoprotein maturation
  chemistry and remains separate from Sec/Tat protein export, Lol outer-membrane
  localization, and downstream lipoprotein functions.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00664
    title: UniPathway UPA00664
    statement: >-
      The local UPA00664 membership set contains lgt as the P. putida KT2440
      candidate for the diacylglyceryl-transfer step of lipoprotein
      biosynthesis.
  - source_id: UniPathway:UPA00665
    title: UniPathway UPA00665
    statement: >-
      lspA is present in PSEPK and is already curated in the bacterial protein
      export module as signal peptidase II/prolipoprotein signal peptidase.
  - source_id: UniPathway:UPA00666
    title: UniPathway UPA00666
    statement: >-
      The local UPA00666 membership set contains lnt as the P. putida KT2440
      candidate for the N-acyl-transfer step of lipoprotein biosynthesis.
  - source_id: file:PSEPK/lgt/lgt-ai-review.yaml
    title: Curated lgt review
    statement: >-
      The lgt review accepts plasma membrane localization, the specific
      phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity,
      and lipoprotein biosynthetic process.
  - source_id: file:PSEPK/lspA/lspA-ai-review.yaml
    title: Curated lspA review
    statement: >-
      The lspA review curates signal peptidase II as a membrane aspartic-type
      endopeptidase that processes bacterial prolipoproteins.
  - source_id: file:PSEPK/lnt/lnt-ai-review.yaml
    title: Curated lnt review
    statement: >-
      The lnt review accepts plasma membrane localization and lipoprotein
      biosynthetic process, and modifies the broad acyltransferase parent to
      the more specific N-acyltransferase activity.
  - source_id: file:PSEPK/lgt/lgt-uniprot.txt
    title: UniProtKB reviewed entry for lgt
    statement: >-
      UniProt identifies Lgt as phosphatidylglycerol--prolipoprotein
      diacylglyceryl transferase and places it in the lipoprotein biosynthesis
      diacylglyceryl-transfer step.
  - source_id: file:PSEPK/lnt/lnt-uniprot.txt
    title: UniProtKB reviewed entry for lnt
    statement: >-
      UniProt identifies Lnt as apolipoprotein N-acyltransferase and places it
      in the lipoprotein biosynthesis N-acyl-transfer step.
notes: >-
  First-pass interpretation: PSEPK has the canonical bacterial Lgt-LspA-Lnt
  lipoprotein maturation sequence. This module is intentionally narrower than
  the broad protein-export module and narrower than lipoprotein trafficking or
  Lol-mediated outer-membrane sorting. lspA remains owned by the protein-export
  batch for its primary partition, but is included here as the necessary middle
  maturation step.
module:
  id: bacterial_lipoprotein_maturation
  label: Bacterial lipoprotein maturation
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: lipoprotein biosynthetic process
      term:
        id: GO:0042158
        label: lipoprotein biosynthetic process
      description: Overall process covering bacterial lipoprotein maturation.
    - preferred_term: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
      term:
        id: GO:0008961
        label: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
      description: Lgt activity that transfers diacylglyceryl to prolipoprotein cysteine.
    - preferred_term: aspartic-type endopeptidase activity
      term:
        id: GO:0004190
        label: aspartic-type endopeptidase activity
      description: Current GO molecular-function annotation for LspA signal peptidase II.
    - preferred_term: N-acyltransferase activity
      term:
        id: GO:0016410
        label: N-acyltransferase activity
      description: More specific molecular-function term for Lnt than the broad InterPro2GO acyltransferase parent.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Bacterial inner membrane location for Lgt, LspA, and Lnt lipoprotein maturation chemistry.
  parts:
    - order: 1
      role: Diacylglyceryl transfer to prolipoprotein cysteine
      node:
        id: lgt_diacylglyceryl_transfer
        label: Lgt prolipoprotein diacylglyceryl transfer
        module_type: REACTION
        description: >-
          Lgt catalyzes the first lipid-modification step, transferring a
          diacylglyceryl group from phosphatidylglycerol to the N-terminal
          cysteine of a prolipoprotein.
        annotons:
          - id: lgt_diacylglyceryl_transferase
            label: "lgt: phosphatidylglycerol--prolipoprotein diacylglyceryl transferase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK lgt
                term:
                  id: UniProtKB:Q88CN8
                  label: Phosphatidylglycerol--prolipoprotein diacylglyceryl transferase
            function:
              preferred_term: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              term:
                id: GO:0008961
                label: phosphatidylglycerol-prolipoprotein diacylglyceryl transferase activity
              substrates:
                - preferred_term: phosphatidylglycerol
                - preferred_term: prolipoprotein
              products:
                - preferred_term: S-diacylglyceryl prolipoprotein
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Initiates bacterial lipoprotein maturation by lipidating the
              conserved prolipoprotein cysteine.
    - order: 2
      role: Signal peptide II cleavage
      node:
        id: lspA_signal_peptide_ii_cleavage
        label: LspA signal peptidase II cleavage
        module_type: REACTION
        description: >-
          LspA cleaves the signal peptide from lipid-modified prolipoprotein,
          producing the apolipoprotein substrate for Lnt.
        annotons:
          - id: lspA_lipoprotein_signal_peptidase
            label: "lspA: lipoprotein signal peptidase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK lspA
                term:
                  id: UniProtKB:Q88Q91
                  label: Lipoprotein signal peptidase
            function:
              preferred_term: aspartic-type endopeptidase activity
              term:
                id: GO:0004190
                label: aspartic-type endopeptidase activity
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Middle maturation step that removes the signal peptide after Lgt
              lipidation and before Lnt N-acylation.
    - order: 3
      role: N-acyl transfer to mature lipoprotein
      node:
        id: lnt_n_acyl_transfer
        label: Lnt apolipoprotein N-acyl transfer
        module_type: REACTION
        description: >-
          Lnt catalyzes phospholipid-dependent N-acylation of the
          diacylglyceryl apolipoprotein N-terminal cysteine, completing mature
          lipoprotein formation.
        annotons:
          - id: lnt_n_acyltransferase
            label: "lnt: apolipoprotein N-acyltransferase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK lnt
                term:
                  id: UniProtKB:Q88DN4
                  label: Apolipoprotein N-acyltransferase
            function:
              preferred_term: N-acyltransferase activity
              term:
                id: GO:0016410
                label: N-acyltransferase activity
              substrates:
                - preferred_term: S-diacylglyceryl apolipoprotein
                - preferred_term: glycerophospholipid
              products:
                - preferred_term: N-acyl-S-diacylglyceryl lipoprotein
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Final N-acylation step that converts the diacylglyceryl
              apolipoprotein into a mature triacylated lipoprotein.
  knowledge_gaps:
    - gap_statement: >-
        lgt and lnt have specific activity terms, but lspA currently uses the
        broad aspartic-type endopeptidase activity term in the local review.
      boundary: >-
        Do not invent a signal-peptidase-II-specific GO id. Retain the existing
        lspA review unless a valid more specific GO term is identified.
      gap_kind:
        - CURATION
    - gap_statement: >-
        The module captures lipoprotein maturation chemistry, not substrate
        selection, Lol-dependent trafficking, or mature lipoprotein localization
        after processing.
      boundary: >-
        Keep LolCDE/LolA/LolB-like transport and individual lipoprotein
        functions in separate transport or envelope modules.
      gap_kind:
        - BIOLOGY
