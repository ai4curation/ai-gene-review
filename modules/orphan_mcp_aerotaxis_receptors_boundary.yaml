notes: >-
  First-pass interpretation: this module is a receptor-boundary bucket, not a
  satisfiable ligand-specific chemotaxis pathway. The conserved domains support
  chemotaxis receptor/transducer roles, but ligand specificity remains unknown
  for the generic orphan MCPs. The three aerotaxis receptor candidates are kept
  together because GOA and UniProt naming support aerotaxis, but the direct
  oxygen/redox/energy-state sensing mechanism remains unresolved. PP_2111 has
  a clear electronic-annotation artifact from a syntaxin/SNARE-like InterPro
  hit; the gene review removes SNAP receptor activity, intracellular protein
  transport, and membrane fusion from the chemotaxis interpretation. PP_2599 was
  considered during the motility-bucket MCP pass, but its GAF/HAMP/HD-GYP/HD-PDEase
  architecture supports routing to the c-di-GMP turnover boundary instead.
