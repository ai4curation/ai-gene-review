id: MODULE:orphan_mcp_aerotaxis_receptors_boundary
title: Orphan MCP/aerotaxis receptor boundary
description: >-
  Boundary module for the ppu02030 orphan methyl-accepting chemotaxis protein
  and aerotaxis receptor panel in Pseudomonas putida KT2440. The module groups
  receptor/transducer candidates that have MCP, HAMP, PAS, dCache, or related
  sensory-domain evidence but do not yet have a resolved first-pass ligand,
  receptor-array partner, or chemotaxis sub-branch. It complements the
  characterized/named receptor panel and the core Che signaling and adaptation
  modules, and now also records unresolved MCP candidates promoted from the
  broader motility/chemotaxis/biofilm functional bucket.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02030 provides the organism-specific bacterial chemotaxis umbrella
      that includes receptor, core Che, adaptation/accessory, and transport
      spillover genes.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.tsv
    title: ppu02030 bacterial chemotaxis partition table
    statement: >-
      The partition separates PP_0317, PP_0584, PP_0779, PP_1819, PP_1940,
      PP_2111, ctpH, PP_2257, PP_2823, PP_3414, PP_3557, PP_4521, and PP_5021
      into the orphan MCP/aerotaxis receptor bucket.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_partition.tsv
    title: Motility/chemotaxis/biofilm functional-bucket partition table
    statement: >-
      The functional motility umbrella adds PP_2310, PP_3950, and PP_4888 to
      this orphan MCP receptor/transducer boundary; PP_2599 is routed instead
      to the c-di-GMP turnover boundary based on HD-GYP/HD-PDEase evidence.
  - source_id: file:PSEPK/PP_0317/PP_0317-ai-review.yaml
    title: Curated PP_0317 review
    statement: >-
      The PP_0317 review accepts transmembrane signaling receptor activity,
      chemotaxis, and plasma-membrane localization for a ligand-unresolved MCP
      receptor candidate.
  - source_id: file:PSEPK/PP_0584/PP_0584-ai-review.yaml
    title: Curated PP_0584 review
