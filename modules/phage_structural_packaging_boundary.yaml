id: MODULE:phage_structural_packaging_boundary
title: Prophage structural and genome-packaging boundary
description: Boundary module for PSEPK prophage terminase, portal, head, capsid, tail, sheath, tube, fiber, and assembly proteins
  that resolve to virion structural or packaging context rather than metabolic pathways.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_mobile_genetic_elements_prophage_structural_packaging.tsv
  title: PSEPK mobile-genetic-elements prophage structural/packaging split table
  statement: The split table routes 21 broad mobile-genetic-elements genes to terminase, portal, head-tail connector, tail,
    fiber, tube, sheath, capsid/head, or unresolved assembly contexts.
- source_id: file:projects/P_PUTIDA/batches/module_mobile_genetic_elements_low_information_prophage_proteins.tsv
  title: PSEPK mobile-genetic-elements low-information prophage split table
  statement: The split table routes 14 low-information prophage genes; three have enough phage structural domain evidence
    for structural molecule activity, one has process-only genome-ejection context, and the rest remain unresolved.
- source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_phage_mobile_protease_spillovers.tsv
  title: PSEPK protein-turnover phage/mobile protease spillover split table
  statement: The split table routes two phage-associated protease candidates out of host protein-turnover context and into
    prophage structural maturation context.
notes: 'First-pass boundary. Large terminases are represented by endonuclease activity in virion assembly. Domain-supported
  portal, tail, baseplate, sheath, capsid, and head proteins are represented as structural molecule activity in virion assembly.
  Product-only small terminases, assembly/accessory proteins, and the ambiguous internal-core/Slt-domain member are retained
  as no-core unresolved context in their gene reviews: PP_1562, PP_2287, PP_3058, PP_3061, PP_3862, PP_3882. The low_information_prophage_proteins
  sub-batch contributes three additional domain-supported structural annotons (PP_1571, PP_3860, PP_3871). PP_2285 keeps process-only
  genome-ejection context, and the remaining name-only or ambiguous records remain no-core unresolved in gene reviews. The
  protein_folding_targeting_turnover phage/mobile protease split contributes PP_1566 and PP_3878 as phage-associated prohead/minor-capsid
  protease candidates, represented as proteolytic maturation context rather than host protein turnover.'
