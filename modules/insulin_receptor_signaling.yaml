id: MODULE:insulin_receptor_signaling
title: Insulin receptor signaling pathway module
description: >-
  A compact insulin receptor signaling module. Insulin binding activates the
  receptor tyrosine kinase INSR, which autophosphorylates and phosphorylates IRS
  adaptors. IRS phosphotyrosines recruit PI3K and route the signal into
  PIP3-AKT signaling, controlling FOXO-dependent transcription, glucose uptake,
  glycogen metabolism, growth, and survival. The module is grounded in
  GO:0008286 and uses PAINT PTN anchors for the insulin receptor and AKT-family
  signaling roles where local IBD seed rows support them.
status: DRAFT
evidence:
  - source_id: GO:0008286
    title: insulin receptor signaling pathway
    statement: The module is grounded in the GO biological process term for insulin receptor signaling.
