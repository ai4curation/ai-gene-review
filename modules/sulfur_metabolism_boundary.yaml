id: MODULE:sulfur_metabolism_boundary
title: Sulfur metabolism boundary
description: >-
  Boundary module for KEGG ppu00920 and ppu01320 in Pseudomonas putida KT2440.
  The organism-specific KEGG maps combine sulfate/thiosulfate import and
  assimilatory sulfate reduction, cystine/sulfur-compound ABC import, taurine
  and alkanesulfonate import/desulfonation, sulfide and cytochrome-linked
  sulfur redox side nodes, sulfurtransferases, methionine and cysteine side
  chemistry, organosulfur CoA/AMP candidates, and the sulfur-cycle subset of
  sulfate activation, sulfite-reductase, SoxYZ-like, cytochrome, and
  cysteine-synthesis nodes. This module keeps those subroutes distinct instead
  of treating either map as one monolithic sulfur pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00920
    title: Sulfur metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00920 provides the PSEPK curation batch. Its 54 specific members
      span inorganic sulfate uptake/assimilation, alkanesulfonate and taurine
      acquisition, sulfur redox/electron-transfer side nodes, sulfurtransferase
      enzymes, methionine/cysteine side reactions, and organosulfur
      CoA-thioester candidates.
  - source_id: file:projects/P_PUTIDA/batches/ppu00920_sulfur_metabolism_boundary.tsv
    title: PSEPK ppu00920 sulfur-metabolism batch
    statement: >-
      The batch records all 54 PSEPK members and their review/Asta status after
      the first-pass curation sweep.
  - source_id: KEGG:ppu01320
    title: Sulfur cycle - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu01320 provides a focused sulfur-cycle subset. Its PSEPK members
      are already represented in this boundary module as sulfate
      activation/reduction, sulfite-reductase, SoxYZ-like carrier, cytochrome
      c-family redox, and cysteine-synthesis nodes.
  - source_id: file:projects/P_PUTIDA/batches/ppu01320_sulfur_metabolism_boundary.tsv
    title: PSEPK ppu01320 sulfur-cycle batch
    statement: >-
      The batch records the nine ppu01320 members and shows that all have review
      files, Asta reports, and curated GOA decisions.
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_0225-PP_0227 sctC-sctS-fliY
      sulfur/cystine ABC transporter sub-batch. This is a coherent transport
      extension to sulfur metabolism, not evidence that the full ABC-transporter
      map is one pathway.
