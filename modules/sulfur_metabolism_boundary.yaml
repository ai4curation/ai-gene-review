    satisfiable route. The strongest submodules are sulfate/thiosulfate import
    and assimilatory sulfate reduction plus alkanesulfonate/taurine import and
    SsuD/MsuD-type desulfonation. The SoxYZ-like carrier, cytochrome c protein,
    AMP-binding proteins, and several CoA-thioester enzymes remain useful
    candidates for follow-up but should not drive over-specific pathway claims.
