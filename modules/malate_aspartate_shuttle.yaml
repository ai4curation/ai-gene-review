  - source_id: GO:0043490
    title: malate-aspartate shuttle
    statement: >-
      The module is grounded in the malate-aspartate shuttle (GO:0043490) — transfer of cytosolic
      reducing equivalents (NADH) into the mitochondrial matrix via malate.
  - source_id: file:human/MDH1/MDH1-ai-review.yaml
    title: MDH1 gene review (human)
    statement: The cytosolic malate-dehydrogenase step (UniProtKB:P40925, GO:0030060) matches the completed human MDH1 review.
  - source_id: file:human/GOT1/GOT1-ai-review.yaml
    title: GOT1 gene review (human)
