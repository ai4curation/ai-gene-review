  notes: >-
    The malate-aspartate shuttle (GO:0043490), grounded to the completed human gene reviews: cytosolic
    arm MDH1 (P40925, GO:0030060) + GOT1 (P17174, GO:0004069, PLP GO:0030170); inner-membrane carriers
    SLC25A11/OGC (Q02978, GO:0015367 oxoglutarate:malate antiporter) + SLC25A12/AGC1/aralar (O75746,
    GO:0000515 aspartate:glutamate,proton antiporter + Ca2+ binding GO:0005509); matrix arm MDH2
    (P40926, GO:0030060, also TCA cycle) + GOT2 (P00505, GO:0004069, PLP; with a genuine FABPpm/
    fatty-acid-uptake moonlighting role kept non-core). Net effect: a cytosolic NADH is oxidised (MDH1)
    and a matrix NADH regenerated (MDH2), transferring reducing equivalents inward without moving NADH
    across the membrane; the electrogenic, Ca2+-activated AGC1 antiport sets the direction. GO term ids/
    labels verified against the local go.db. This shuttle feeds electrons to respiratory Complex I
    (curated in the mitochondrial_complex_i_core / assembly / accessory modules). Disorders: AGC1
    (SLC25A12) deficiency — global cerebral hypomyelination/epilepsy; MDH2 and GOT2 deficiency — early
    infantile epileptic encephalopathy.
