              hydro-lyase)'
        notes: IlvD is involved in the biosynthesis of isoleucine, with (R)-2,3-dihydroxy-3-methylpentanoate
          as the substrate, and in the biosynthesis of valine and leucine, with (R)-2,3-dihydroxy-3-methylbutanoate
          as the substrate. The ignored enzyme is involved in salinosporamide A biosynthesis but does
          a very similar reaction and is >50% identical to N515DRAFT_0569, which is confirmed by fitness
          data to be biosynthetic [imported from val.steps]
