                  - source_id: NCBIfam:TIGR02084
                    statement: HMM for 3-isopropylmalate dehydaratase / citramalate isomerase, small subunit
                  - source_id: NCBIfam:TIGR02087
                    statement: HMM for 3-isopropylmalate dehydaratase / citramalate isomerase, small subunit
                notes: A mutant of BAC65258.1 (uniprot:Q845W4) was shown to be a leucine auxotroph in
                  PMC155387. CA265_RS15840 (uniprot:A0A1X9Z766) from Pedobacter sp. GW460-11-11-14-LB5
                  is important for fitness unless amino acids are added.
          - order: 4
