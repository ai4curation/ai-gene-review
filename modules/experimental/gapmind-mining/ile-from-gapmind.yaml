                function:
                  preferred_term: 3-isopropylmalate dehydratase / citramalate isomerase, large subunit
                  evidence:
                  - source_id: NCBIfam:TIGR00170
                    statement: HMM for 3-isopropylmalate dehydratase / citramalate isomerase, large subunit
                  - source_id: NCBIfam:TIGR02083
                    statement: HMM for 3-isopropylmalate dehydratase / citramalate isomerase, large subunit
                  - source_id: NCBIfam:TIGR02086
                    statement: HMM for 3-isopropylmalate dehydratase / citramalate isomerase, large subunit
                notes: In leucine synthesis, LeuCD allows the dehydration of 2-isopropylmalate and hydration
                  to 3-isopropylmalate. Similarly, many of these enzymes allow the isomerization of citramalate
                  to 3-methylmalate via citraconate. Citramalate isomerase is usually given as  EC 4.2.1.35,
                  as opposed to 4.2.1.33 for traditional leuCD. However, many the bacteria with the citramalate
                  pathway appeared to have "typical" leuBCD (i.e., Desulfovibrio vulgaris Hildenborough,
                  Desulfovibrio vulgaris Miyazaki F, Bacteroides thetaiotaomicron, Magnetospirillum magneticum
                  AMB-1, and Synechococcus elongatus PCC 7942). So we do not try to distinguish between
                  3-isoprpylmalate dehydratase and citramalate isomerase. Ignore a 2,3-methylmalate dehydratase
                  (Q0QLE2,Q0QLE1) which is >50% identical to leuCD from DvH (DVU2982,DVU2983). Ignore
                  some BRENDA annotations without subunit information, and ignore CharProtDB::CH_122621
                  (leuCD fusion) which is not actually characterized. DvH leuC (DVU2982) has similarity
                  to both LeuC and to homoaconitase, and fitness data confirms its role in amino acid
                  biosynthesis, so explicitly include it. CA265_RS15830 (uniprot:A0A1X9Z7T5) from Pedobacter
                  sp. GW460-11-11-14-LB5 is important for fitness unless amino acids are added. uniprot:S3E7P8
                  is annotated as this in SwissProt but we did not find experimental evidence, so it is
                  ignored.
          - order: 3
