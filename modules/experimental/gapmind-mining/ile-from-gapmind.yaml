            statement: isoleucine transaminase
            notes: 'ModelSEED grounding: ModelSEED:rxn00806, KEGG:R01090, MetaCyc:BRANCHED-CHAINAMINOTRANSFERLEU-RXN
              (L-Leucine:2-oxoglutarate aminotransferase)'
        notes: Q8NS92 is ignored because it is primarily a transcriptional regulator. Similarity to aromatic
          amino acid transaminases or tyrosine transaminases is ignored as they often are often non-specific.
