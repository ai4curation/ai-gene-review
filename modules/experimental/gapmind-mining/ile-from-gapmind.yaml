    role: ilvH
    node:
      id: ilvH_step
      label: acetolactate/acetohydroxybutanoate synthase regulatory subunit
      module_type: REACTION
      annotons:
      - id: ilvH_activity
        label: 'ilvH: acetolactate/acetohydroxybutanoate synthase regulatory subunit'
        participant:
          selector_type: FAMILY
          family:
            preferred_term: acetolactate/acetohydroxybutanoate synthase regulatory subunit
            term:
              id: NCBIfam:TIGR00119
              label: acetolactate/acetohydroxybutanoate synthase regulatory subunit
            representative_members:
            - preferred_term: BRENDA::P0ADG1
            - preferred_term: A0A154R0Y7
            - preferred_term: SwissProt::Q93YZ7
            - preferred_term: A0A0H2X4P1
        function:
          preferred_term: acetolactate/acetohydroxybutanoate synthase regulatory subunit
          evidence:
          - source_id: NCBIfam:TIGR00119
            statement: HMM for acetolactate/acetohydroxybutanoate synthase regulatory subunit
        notes: The isolated catalytic subunit can have some activity on its own, so it's not clear if
          the regulatory subunit (ilvH) is always required, but ilvH does always seem to be present. uniprot:P0ADG1
          is annotated with this EC number but not explicitly as the small regulatory subunit, so it was
          added manually. uniprot:Q93YZ7 is annotated as this but without the EC number, so is added manually.
          Most regulatory subunits have an N-terminal ACT domain and a C-terminal ACT-like domain, but
          E. coli IlvM, which is required for the activity of E. coli acetohydroxyacid synthase isoenzyme
          II, has the N-terminal ACT domain only. We identified several other short (one-domain) regulatory
          subunits. In Rhodanobacter and related genera, the putative regulatory subunit has just one
          ACT domain (i.e., LRK54_RS10305, which is nearly identical to A0A154R0Y7). Based on sequence
          analysis, short ilvH probably maintains the ability to bind valine and to bind the catalytic
          subunit, but not the ability to bind ATP or other regulatory subunits. Mutant fitness data confirms
          that LRK54_RS10305 is involved in amino acid biosynthesis. In Xanthomonas campestris, the one
          ACT-domain protein Xcc-8004.1058.1 (uniprot:A0A0H2X4P1), which is conserved next to ilvI, has
          a similar fitness pattern as ilvI (Alice Castaing, unpublished data). Furthermore, its AlphaFold
          structure is very similar to that of E. coli IlvM (TM-score 0.89, RMSD 1.49 A, foldseek). So
          Xcc-8004.1058.1 is another short regulatory subunit. Similarly, in Brevundimonas sp. GW460-12-10-14-LB2,
          the putative ilvH has the ACT domain only (Brev2_1981 = A0A161J739). Many Thermoproteota seem
          to have a diverged short regulatory subunit, such as the ACT domain protein KCR_RS03285 (uniprot:A0A7J3AYJ4),
          which is conserved next to ilvI. Foldseek shows that this protein is similar to the ACT domain
          of (p)ppGpp synthase but also to IlvH of Staphylococcus aureus, so we predict that it is the
          regulatory subunit. Many Chryseobacterium have a truncated 1-domain regulatory subunit (i.e.,
          uniprot:A0A316WEF5) that is similar to the N-terminal part of a regulatory subunit from Pedobacter
          (CA265_RS15810, which was confirmed by fitness data); because some of these strains of Chryseobacterium
          grow in the absence of any one of the branched-chain amino acids (i.e., GW821-FHT04C04 and GW821-FHT04A06),
          the 1-domain protein is presumably functional. [imported from val.steps]
