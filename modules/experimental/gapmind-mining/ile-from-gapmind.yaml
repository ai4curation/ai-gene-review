id: MODULE:gapmind_ile_biosynthesis
title: L-isoleucine biosynthesis
description: Imported module for L-isoleucine biosynthesis, mined from the GapMind amino-acid
  pathway definition 'ile.steps' and grounded against ModelSEED. Generated by a feasibility-spike importer;
  GO molecular-function term assignments and biological prose are intentionally left for human/deep-research
  review and must not be treated as curated.
status: DRAFT
evidence:
- source_id: GapMind:aa
  title: GapMind for amino acid biosynthesis
  statement: Isoleucine biosynthesis in GapMind is based on MetaCyc pathways L-isoleucine biosynthesis
    I (from threonine) (metacyc:ILEUSYN-PWY), II via citramalate (metacyc:PWY-5101), or IV from propanoate
    (metacyc:PWY-5104). These pathways share a common intermediate, 2-oxobutanoate, but vary in how the
    2-oxobutanoate is formed. Pathway IV is included because propanoate is a common fermentative end product
    and need not be a nutrient requirement, but it is not always clear if it could be the main pathway
    to isoleucine. Pathway III (metacyc:PWY-5103), via glutamate mutase, is not included because the first
    step (glutamate mutase, EC:5.4.99.1) has not been linked to sequence and because no organism has been
    demonstrated to rely on this pathway to form oxobutanoate. MetaCyc L-isoleucine biosynthesis V describes
    biosynthesis from 2-methylbutanoate, which is a fermentation end product in the rumen; this is an
    an unusual precursor so we did not include it. (Ignore some CharProtDB annotations with threonine
    deaminase but no EC). uniprot:B1N2N4 is included because it is active on both serine and threonine
    (PMID:19931317). uniprot:P09367 is ignored because it may be active on threonine as well as serine.
  url: https://papers.genomics.lbl.gov/cgi-bin/gapView.cgi?gdb=NCBI&set=aa&path=ile
- source_id: MetaCyc:ILEUSYN-PWY
  statement: Underlying MetaCyc pathway cited by GapMind.
- source_id: MetaCyc:PWY-5101
  statement: Underlying MetaCyc pathway cited by GapMind.
- source_id: MetaCyc:PWY-5104
  statement: Underlying MetaCyc pathway cited by GapMind.
- source_id: MetaCyc:PWY-5103
  statement: Underlying MetaCyc pathway cited by GapMind.
