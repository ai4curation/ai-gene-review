            statement: histidinol-phosphate aminotransferase
            notes: 'ModelSEED grounding: ModelSEED:rxn00493, KEGG:R00694, MetaCyc:PHEAMINOTRANS-RXN (L-Phenylalanine:2-oxoglutarate
              aminotransferase)'
        notes: In Bacillus subtilis, the histidinol-phosphate aminotransferase activity is provided by
          a gene that is in a cluster of genes for tyrosine and phenylalanine biosynthesis (PMID:4431).
          Homology suggests that this activity is provided by "HisH" (BSU22620), which indeed is just
          upstream of tyrA (PMID:6092865). This protein is now usually referred to as "HisC" (uniprot:HIS8_BACSU).
          AAFF19_12795 from Acidovorax sp. FHTAMBA (nearly identical to uniprot:A0A2R7PAQ8) can complement
          a hisC- strain of E. coli (Bradley Biggs) and is in a histidine synthesis gene cluster. AAGF34_01100
          from Rhodoferax sp. GW822-FHT02A01 (similar to uniprot:A0A975E8Y9) can complement a hisC- strain
          of E. coli (Bradley Biggs) and is in a histidine synthesis gene cluster. Fitness data for BPHYT_RS14905
          from Burkholderia phytofirmans suggests that it is an aromatic amino acid transaminase, but
          it is 55% identical to TK06_RS12685, which can complement a hisC- mutant of E.coli (Bradley
          Biggs), so any similarity to it is ignored. Fitness data confirms that BBR_RS17050 (uniprot:A0AAW7LC73)
          from Bifidobacterium breve is hisC.
