        notes: In Bacillus subtilis and some related bacteria, histidinol-phosphate phosphatase is known
          as HisJ and has been confirmed by biochemical assays of purified proteins (PMC3570733). The
          identifiers given (see their Table 3) are MCCL_0344 BBR47_00270 BCE_1533 BcerKBAB4_1335 BcerKBAB4_1335
          BSU29620 BH3206 GK2799 SMU_1486c (uniprot:B9E9Z0_MACCJ uniprot:C0ZH63_BREBN uniprot:Q73B87_BACC1
          uniprot:A9VLI0_BACMK uniprot:HIS9_BACHD uniprot:Q5KW52_GEOKA uniprot:Q8DT80_STRMU uniprot:HIS9_BACSU).
          In Bifidobacterium breve, the phosphatase activity is provided by Bbr_0982 (uniprot:A0A0L7BRC5,
          URL:https://doi.org/10.1101/2023.08.29.555234). uniprot:S5FT07 and uniprot:S5FU55 are misannotated
          as this in BRENDA. E. coli phoA (ecocyc:ALKAPHOSPHA-MONOMER) has this activity but is ignored
          because it is periplasmic. HVO_0431 (uniprot:D4GRX2) from Haloferax has auxotrophic phenotypes
          and must be the missing hisN (PMC4300041; PMC8305020). uniprot:A0A1I1YPH6 ("Beta1") and Nmar_1556
          (uniprot:A9A5X4) were shown biochemically to be hisN (PMC10804674); Beta1 is similar to BPHYT_RS03625,
          which has auxotrophic phenotypes; Nmar_1556 lies in a histidine synthesis operon and must be
          the missing hisN.
