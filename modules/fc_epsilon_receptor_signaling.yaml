knowledge_gaps:
  - gap_statement: The Dimer-to-Monomer Model remains unresolved in the Fc-epsilon receptor 
      signaling pathway module.
    boundary: 'The 2024-2025 cryo-EM structural studies revealing that FcepsilonRI exists as a homodimer
      that dissociates upon IgE binding represent a significant paradigm shift (chen2025molecularmechanismof
      pages 1-2, chen2025molecularmechanismof pages 6-7). However, several questions remain: How does
      the dimer-to-monomer transition interface with lipid raft organization in intact cell membranes?'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_epsilon_receptor_signaling-deep-research-falcon.md
  - gap_statement: Relative Contributions of the Two Proximal Branches remains unresolved in the 
      Fc-epsilon receptor signaling pathway module.
    boundary: The LYN/SYK/LAT and FYN/GAB2/PI3K axes are often presented as parallel pathways, yet 
      their relative contributions to specific outcomes (degranulation versus cytokine production 
      versus lipid mediator synthesis) remain incompletely resolved (pavlyuchenkova2024theroleplayed
      pages 1-3, burchett2022targetingmastcells pages 6-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_epsilon_receptor_signaling-deep-research-falcon.md
  - gap_statement: PLCgamma1 versus PLCgamma2 remains unresolved in the Fc-epsilon receptor 
      signaling pathway module.
    boundary: While the pathway outline specifies PLCG2 as the effector, mast cell studies 
      frequently emphasize PLCgamma1. The relative contributions and potential redundancy of 
      PLCgamma1 and PLCgamma2 in human mast cells versus basophils versus other 
      FcepsilonRI-expressing cells are not fully delineated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_epsilon_receptor_signaling-deep-research-falcon.md
  - gap_statement: Trimeric FcepsilonRI Signaling remains unresolved in the Fc-epsilon receptor 
      signaling pathway module.
    boundary: The signaling output of trimeric alphagamma2 FcepsilonRI on human antigen-presenting 
      cells remains poorly characterized relative to the tetrameric form.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_epsilon_receptor_signaling-deep-research-falcon.md
  - gap_statement: Translation Between Model Systems remains unresolved in the Fc-epsilon receptor 
      signaling pathway module.
    boundary: A persistent concern is the reliance on murine BMMCs and rat RBL-2H3 cells for 
      mechanistic studies. These model systems differ from primary human tissue mast cells in 
      transcriptomic profiles, protease content, and receptor expression levels.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
