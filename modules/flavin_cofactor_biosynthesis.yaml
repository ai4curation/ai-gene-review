  notes: >-
    Flavin cofactor biosynthesis (GO:0006747 FAD; GO:0009398 FMN) from dietary riboflavin, grounded to
    the completed human gene reviews: RFK (Q969G6, GO:0008531 riboflavin kinase + ATP/metal — humans
    do not synthesise the riboflavin ring, so its riboflavin-biosynthesis IEAs were corrected to
    riboflavin metabolic process) and the bifunctional FLAD1 (Q8NFF5, GO:0003919 FMN adenylyltransferase
    + a second FAD-diphosphatase/chaperone activity). Both are (largely) cytosolic; some FLAD1 isoforms
    are mitochondrial. FMN and FAD are the cofactors of the flavoenzymes curated across these modules —
    respiratory Complex I (NDUFV1) and II (SDHA), the acyl-CoA dehydrogenases (GCDH), PRODH, KMO, PNPO,
    FOXRED1, MTHFR and others. GO term ids/labels verified against the local go.db. Disorders: FLAD1
    deficiency — lipid-storage myopathy with combined respiratory-chain/multiple-acyl-CoA-dehydrogenase
    deficiency (partly riboflavin-responsive); dietary riboflavin deficiency broadly impairs
    flavoenzyme function.
