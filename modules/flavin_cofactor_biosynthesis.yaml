id: MODULE:flavin_cofactor_biosynthesis
title: Flavin cofactor biosynthesis (riboflavin -> FMN -> FAD; RFK + FLAD1)
description: >-
  Flavin mononucleotide (FMN) and flavin adenine dinucleotide (FAD) are the redox cofactors of the
  flavoproteins — respiratory Complex I and II, the acyl-CoA dehydrogenases of fatty-acid oxidation,
  MTHFR, PNPO, kynurenine 3-monooxygenase and hundreds of others. Because humans cannot make the
  riboflavin (vitamin B2) ring de novo, dietary riboflavin is converted intracellularly to its
  active cofactor forms in two committed steps. Riboflavin kinase (RFK) first phosphorylates
  riboflavin with ATP (and a divalent metal) to FMN. FAD synthase (FLAD1, an FMN adenylyltransferase)
  then adenylylates FMN with ATP to FAD; human FLAD1 has isoforms differing in an N-terminal
  molybdopterin-binding/KH region and additionally shows FAD-diphosphatase (FAD-hydrolysing) activity
  that reverses the last step and can act as a flavin chaperone for apo-flavoproteins. The pathway is
  the sole supply of flavin cofactors: inherited FLAD1 deficiency causes a lipid-storage myopathy
  with combined respiratory-chain / multiple-acyl-CoA-dehydrogenase deficiency, part of which is
  riboflavin-responsive.
status: DRAFT
evidence:
  - source_id: GO:0006747
    title: FAD biosynthetic process
    statement: The pathway carries out FAD biosynthesis (GO:0006747) from riboflavin.
  - source_id: GO:0009398
    title: FMN biosynthetic process
    statement: RFK carries out FMN biosynthesis (GO:0009398), the first committed step.
  - source_id: file:human/RFK/RFK-ai-review.yaml
    title: RFK gene review (human)
    statement: The riboflavin->FMN step (UniProtKB:Q969G6, GO:0008531) matches the completed human RFK review.
  - source_id: file:human/FLAD1/FLAD1-ai-review.yaml
    title: FLAD1 gene review (human)
    statement: The FMN->FAD step (UniProtKB:Q8NFF5, GO:0003919) matches the completed human FLAD1 review.
