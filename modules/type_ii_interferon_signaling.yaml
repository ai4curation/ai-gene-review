knowledge_gaps:
  - gap_statement: 'STAT3 co-activation: canonical or not? remains unresolved in the Type II interferon
      signaling pathway module.'
    boundary: The discovery that IFN-gamma directly activates STAT3 through JAK1/JAK2 in 
      macrophages, forming STAT1-STAT3 heterodimers at a subset of genomic loci, challenges the 
      textbook model of exclusively STAT1-homodimer-driven signaling 
      (botman2025uncoveringanunconventional pages 1-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_ii_interferon_signaling-deep-research-falcon.md
  - gap_statement: Context-dependent STAT1 phosphorylation remains unresolved in the Type II 
      interferon signaling pathway module.
    boundary: Beyond the canonical Tyr701 and Ser727 marks, STAT1 undergoes Thr748 phosphorylation 
      through JAK-independent mechanisms (e.g., TLR4-MYD88-independent pathways), which promotes 
      inflammatory gene expression while restricting canonical IFN signaling 
      (elbrashy2024threoninephosphorylationand pages 10-12, elbrashy2024threoninephosphorylationand 
      pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_ii_interferon_signaling-deep-research-falcon.md
  - gap_statement: The dual role of IFN-gamma in cancer remains unresolved in the Type II interferon
      signaling pathway module.
    boundary: IFN-gamma acts as both an antitumorigenic and protumorigenic cytokine. While it 
      promotes anti-tumor immunity through MHC upregulation, growth arrest, and immune cell 
      activation, tumor cells can hijack IFN-gamma signaling to express immunosuppressive molecules 
      including PD-L1 and IDO1 (oropezamartinez2025interferongammasignalingpathway pages 4-6, 
      oropezamartinez2025interferongammasignalingpathway pages 6-9, han2023dys...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_ii_interferon_signaling-deep-research-falcon.md
  - gap_statement: Alveolar macrophage hypo-responsiveness remains unresolved in the Type II 
      interferon signaling pathway module.
    boundary: Human alveolar macrophages display dramatically attenuated proteomic responses to 
      IFN-gamma despite intact proximal JAK-STAT1 signaling, and the molecular mechanism underlying 
      this tissue-specific regulatory state remains unknown (thiel2024humanalveolarmacrophages pages
      1-2, thiel2024humanalveolarmacrophages pages 10-11). Understanding this mechanism is critical 
      for addressing the lung's vulnerability to *M.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_ii_interferon_signaling-deep-research-falcon.md
  - gap_statement: Epigenetic programming and signaling memory remains unresolved in the Type II 
      interferon signaling pathway module.
    boundary: IFN-gamma exposure induces epigenetic reprogramming in macrophages that shapes 
      responses to subsequent stimuli (casanova2024interferongammaandinfectious pages 5-6).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
