notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit evidence,
  structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions: STAT3
  co-activation: canonical or not?; Context-dependent STAT1 phosphorylation; The dual role of IFN-gamma
  in cancer; Alveolar macrophage hypo-responsiveness; Epigenetic programming and signaling memory; Outstanding
  questions (as noted by Casanova et al., 2024). Machine-generated Falcon citations remain curation support
  and are not manually adjudicated here.
