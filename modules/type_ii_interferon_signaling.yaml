    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_ii_interferon_signaling-deep-research-falcon.md
  - gap_statement: Outstanding questions (as noted by Casanova et al., 2024) remains unresolved in 
      the Type II interferon signaling pathway module.
    boundary: How are new IFN-gamma-dependent genes born and regulated? How widely do transposable 
      elements and endogenous retroviruses serve as functional promoter components for ISGs? What 
      are the structures and functions of the many ISGs whose biology remains mysterious? How do 
      regulatory loops among different IFN types affect infection outcomes? 
      (casanova2024interferongammaandinfectious pages 1-3).
