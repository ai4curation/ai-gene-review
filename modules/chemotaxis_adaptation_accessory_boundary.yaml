    - order: 4
      role: motility-bucket accessory spillovers
      node:
        id: motility_bucket_chemotaxis_accessory_spillovers
        label: Motility-bucket chemotaxis accessory spillovers
        module_type: SIGNALING_PATHWAY
        description: >-
          Conservative holding branch for motility/chemotaxis functional-bucket
          genes with CheY-like or membrane-accessory signals that are outside
          the completed core Che cluster and lack direct process-level evidence.
        annotons:
          - id: pp3757_chey_like_response_regulator_candidate
            label: "PP_3757: CheY-like response-regulator candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3757
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
            role_description: Compact CheY-like receiver-domain response-regulator candidate with unresolved chemotaxis branch assignment.
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
          - id: pp3771_low_confidence_membrane_accessory
            label: "PP_3771: low-confidence membrane accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3771
            locations:
              - preferred_term: membrane
                term:
                  id: GO:0016020
                  label: membrane
            role_description: Small single-pass membrane protein with chemotaxis product-name signal but no specific domain or GOA process support.
          - id: pp4331_duf2802_membrane_accessory
            label: "PP_4331: DUF2802 membrane accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4331
            locations:
              - preferred_term: membrane
                term:
                  id: GO:0016020
                  label: membrane
            role_description: DUF2802 single-pass membrane protein near the core Che cluster, retained without a chemotaxis process assertion.
  connections:
    - source: cher_receptor_methylation
      target: cheb_like_receptor_demethylation
      connection_type: PART_OF
      description: Receptor methylation and demethylation form opposing adaptation chemistry.
    - source: chev_like_accessory_signaling
      target: cher_receptor_methylation
      connection_type: PROVIDES_INPUT_FOR
      description: CheV-like accessory proteins are retained as candidate modulators of receptor-coupled chemotaxis adaptation.
    - source: motility_bucket_chemotaxis_accessory_spillovers
      target: chev_like_accessory_signaling
      connection_type: PART_OF
      description: The spillover branch is retained as conservative accessory context adjacent to the better-supported CheV-like adaptation branch.
  knowledge_gaps:
    - gap_statement: >-
        The receptor specificity and branch assignment of PP_0802, PP_2128, and
        PP_4393 are unresolved.
      boundary: >-
        All three proteins have CheV-like CheW/receiver-domain signatures, but
        no first-pass evidence establishes which MCPs or CheA clusters they
        support.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        PP_3759 substrate specificity and regulation are unresolved.
      boundary: >-
        PP_3759 has CheB methylesterase evidence, but its compact domain
        architecture does not support the response-regulator annotation that was
        electronically propagated to GOA.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        CheR3 target and biological process are unresolved.
      boundary: >-
        CheR3 is retained as a broad SAM-dependent methyltransferase candidate;
        the cached CheR paralog evidence supports CheR2, not CheR3, as the
        McpS/McpT chemotaxis methyltransferase.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        PP_3771 and PP_4331 chemotaxis roles are unresolved.
      boundary: >-
        Both proteins are retained only as membrane accessory candidates because
        the first-pass evidence is limited to product-name context, a
        single-pass transmembrane feature, and DUF2802 for PP_4331.
      gap_kind:
        - BIOLOGY
        - CURATION
