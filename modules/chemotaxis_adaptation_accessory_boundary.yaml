id: MODULE:chemotaxis_adaptation_accessory_boundary
title: Chemotaxis adaptation/accessory boundary
description: >-
  Boundary module for the ppu02030 chemotaxis adaptation/accessory subset in
  Pseudomonas putida KT2440. This module covers CheV-like CheW/receiver-domain
  accessory proteins (PP_0802, PP_2128, and PP_4393), CheB-like receptor
  demethylation by PP_3759, CheR2 receptor methylation, and the unresolved
  CheR3 methyltransferase candidate. It also captures PP_3757 as a compact
  CheY-like receiver-domain response-regulator candidate and PP_3771/PP_4331 as
  low-confidence membrane accessory candidates from the motility/chemotaxis
  functional bucket. It is separated from the PP_4332-PP_4340 core
  CheA/CheY/CheZ/CheB1 cluster, the named MCP receptor panel, orphan
  MCP/aerotaxis receptors, and DNA-binding orphan response regulators.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02030 provides the organism-specific bacterial chemotaxis umbrella
      that includes receptor, core Che, adaptation/accessory, and transport
      spillover genes.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.tsv
    title: ppu02030 bacterial chemotaxis partition table
    statement: >-
      The partition separates PP_0802, PP_2128, PP_3759, cheR3, cheR2, and
      PP_4393 into the chemotaxis adaptation/accessory bucket.
  - source_id: file:PSEPK/PP_0802/PP_0802-ai-review.yaml
    title: Curated PP_0802 review
    statement: >-
      The PP_0802 review accepts chemotaxis and phosphorelay signal
      transduction for a CheV-like accessory candidate and marks generic signal
      transduction as over-annotated.
  - source_id: file:PSEPK/PP_2128/PP_2128-ai-review.yaml
    title: Curated PP_2128 review
    statement: >-
      The PP_2128 review accepts chemotaxis and phosphorelay signal
      transduction for a CheV-like accessory candidate and marks generic signal
      transduction as over-annotated.
  - source_id: file:PSEPK/PP_4393/PP_4393-ai-review.yaml
    title: Curated PP_4393 review
    statement: >-
      The PP_4393 review accepts chemotaxis and phosphorelay signal
      transduction for a CheV-like accessory candidate and marks generic signal
      transduction as over-annotated.
  - source_id: file:PSEPK/PP_3759/PP_3759-ai-review.yaml
    title: Curated PP_3759 review
    statement: >-
      The PP_3759 review accepts protein-glutamate methylesterase activity and
      chemotaxis, while removing the response-regulator activity call as likely
      over-propagated for a compact CheB methylesterase-domain protein.
  - source_id: file:PSEPK/cheR2/cheR2-ai-review.yaml
    title: Curated cheR2 review
    statement: >-
      The cheR2 review accepts protein-glutamate O-methyltransferase activity
      and records CheR2 as the experimentally supported chemotaxis receptor
      methyltransferase for McpS and related receptors.
  - source_id: file:PSEPK/cheR3/cheR3-ai-review.yaml
    title: Curated cheR3 review
    statement: >-
      The cheR3 review accepts only broad SAM-dependent methyltransferase
      activity and avoids assigning the CheR2-specific McpS/McpT chemotaxis
      methyltransferase role to CheR3.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_partition.tsv
    title: PSEPK motility/chemotaxis/biofilm functional-bucket partition
    statement: >-
      The motility functional-bucket partition routes PP_3757, PP_3771, and
      PP_4331 to the chemotaxis adaptation/accessory boundary while routing the
      DNA-binding PP_2403 response-regulator spillover to the orphan/generic
      two-component-regulator boundary.
  - source_id: file:PSEPK/PP_3757/PP_3757-ai-review.yaml
    title: Curated PP_3757 review
    statement: >-
      The PP_3757 review accepts phosphorelay signal transduction and adds
      phosphorelay response regulator activity for a compact CheY-like
      receiver-domain protein, while avoiding stronger chemotaxis-output claims.
  - source_id: file:PSEPK/PP_3771/PP_3771-ai-review.yaml
    title: Curated PP_3771 review
    statement: >-
      The PP_3771 review records only a conservative membrane annotation for a
      small single-pass protein with a chemotaxis product name but no specific
      domain or GOA support.
  - source_id: file:PSEPK/PP_4331/PP_4331-ai-review.yaml
    title: Curated PP_4331 review
    statement: >-
      The PP_4331 review records only a conservative membrane annotation for a
      DUF2802 single-pass protein near the core Che cluster, with no specific
      chemotaxis process assertion.
  - source_id: PMID:23677992
    title: >-
      High specificity in CheR methyltransferase function: CheR2 of
      Pseudomonas putida is essential for chemotaxis, whereas CheR1 is involved
      in biofilm formation.
    statement: >-
      The cached abstract reports that CheR2, but not the other CheR
      paralogues, methylates McpS and McpT, and that cheR2 mutants are
      deficient in chemotaxis.
notes: >-
  First-pass interpretation: PP_0802, PP_2128, and PP_4393 are CheV-like
  accessory candidates with CheW-like and response-regulator receiver-domain
  signatures. PP_3759 is treated as a compact CheB-like methylesterase candidate
  rather than a full response regulator. CheR2 is the supported chemotaxis
  receptor methyltransferase. CheR3 remains a CheR-family methyltransferase
  candidate because the CheR paralog study supports CheR2, not CheR3, as the
  McpS/McpT chemotaxis methyltransferase. PP_3757 is retained as a compact
  CheY-like response-regulator candidate. PP_3771 and PP_4331 are kept as
  low-confidence membrane accessory candidates only, pending direct evidence for
  chemotaxis pathway participation.
module:
  id: chemotaxis_adaptation_accessory_boundary
  label: Chemotaxis adaptation/accessory boundary
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: chemotaxis
      term:
        id: GO:0006935
        label: chemotaxis
      description: Directed movement in response to chemical stimuli.
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: Phosphorelay process context for CheV-like receiver-domain accessory proteins.
    - preferred_term: phosphorelay response regulator activity
      term:
        id: GO:0000156
        label: phosphorelay response regulator activity
      description: Receiver-domain activity relevant to CheV-like proteins, although not asserted as an existing MF for all candidates in GOA.
    - preferred_term: protein-glutamate O-methyltransferase activity
      term:
        id: GO:0008983
        label: protein-glutamate O-methyltransferase activity
      description: CheR methylation of receptor glutamate residues using SAM.
    - preferred_term: protein-glutamate methylesterase activity
      term:
        id: GO:0008984
        label: protein-glutamate methylesterase activity
      description: CheB-family demethylation of methylated receptor glutamate residues.
    - preferred_term: S-adenosylmethionine-dependent methyltransferase activity
      term:
        id: GO:0008757
        label: S-adenosylmethionine-dependent methyltransferase activity
      description: Conservative CheR3 methyltransferase-family activity when receptor substrate is unresolved.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble chemotaxis adaptation proteins act from the cytoplasmic side of receptor arrays.
      - preferred_term: membrane
        term:
          id: GO:0016020
          label: membrane
        description: Conservative context for low-confidence single-pass accessory candidates from the motility functional bucket.
  parts:
    - order: 1
      role: CheV-like accessory signaling
      node:
        id: chev_like_accessory_signaling
        label: CheV-like accessory chemotaxis proteins
        module_type: SIGNALING_PATHWAY
        description: >-
          CheV-like proteins with CheW-like adaptor domains and receiver-domain
          response-regulator regions. Their receptor specificity and relationship
          to the core CheA/CheY cluster remain unresolved.
        annotons:
          - id: pp0802_chev_like
            label: "PP_0802: CheV-like accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0802
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: CheV-like accessory candidate with CheW and response-regulator domains.
          - id: pp2128_chev_like
            label: "PP_2128: CheV-like accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2128
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: CheV-like accessory candidate with CheW and response-regulator domains.
          - id: pp4393_chev_like
            label: "PP_4393: CheV-like accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4393
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: CheV-like accessory candidate with CheW and response-regulator domains.
    - order: 2
      role: receptor methylation
      node:
        id: cher_receptor_methylation
        label: CheR-family receptor methylation
        module_type: REACTION
        description: >-
          CheR-family methyltransferase chemistry that methylates glutamate
          residues in methyl-accepting chemotaxis proteins.
        annotons:
          - id: cher2_mcp_methyltransferase
            label: "cheR2: MCP protein-glutamate O-methyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheR2
            function:
              preferred_term: protein-glutamate O-methyltransferase activity
              term:
                id: GO:0008983
                label: protein-glutamate O-methyltransferase activity
            processes:
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: Experimentally supported CheR paralog for McpS/McpT receptor methylation and chemotaxis.
          - id: cher3_putative_methyltransferase
            label: "cheR3: putative CheR-family methyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheR3
            function:
              preferred_term: S-adenosylmethionine-dependent methyltransferase activity
              term:
                id: GO:0008757
                label: S-adenosylmethionine-dependent methyltransferase activity
            role_description: CheR-family methyltransferase candidate with unresolved biological target.
    - order: 3
      role: receptor demethylation
      node:
        id: cheb_like_receptor_demethylation
        label: CheB-like receptor demethylation
        module_type: REACTION
        description: >-
          CheB-like methylesterase chemistry removes methyl groups from
          methylglutamate residues on methyl-accepting chemotaxis proteins.
        annotons:
          - id: pp3759_methylesterase
            label: "PP_3759: CheB-like methylesterase candidate"
