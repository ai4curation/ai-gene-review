id: MODULE:dicty_sdf2_encapsulation_relay
title: Dictyostelium SDF-2 spore-encapsulation relay (AcbA-TagC-DhkA-RegA-PKA)
description: >-
  The non-cell-autonomous signalling relay that triggers rapid, synchronous
  encapsulation of prespore cells into spores during culmination in Dictyostelium
  discoideum. The acyl-CoA-binding protein AcbA is unconventionally secreted by
  prespore cells and cleaved at the prestalk cell surface by the ABC-transporter/
  serine-protease TagC to release the peptide signal SDF-2. SDF-2 binds the
  membrane sensor histidine kinase DhkA and INHIBITS its phosphorelay; because
  DhkA (through the histidine-phosphotransfer protein RdeA) normally keeps the
  response-regulator cAMP phosphodiesterase RegA active, inhibiting DhkA lowers
  RegA activity, so intracellular cAMP rises and activates cAMP-dependent protein
  kinase (PKA-C released from PKA-R), which drives spore encapsulation. The net
  logic is a double negative — SDF-2 inhibits DhkA, DhkA activates RegA, RegA
  suppresses cAMP/PKA — so SDF-2 ultimately ACTIVATES encapsulation. The relay is
  self-amplifying (encapsulating cells release more AcbA). Phrased over functions
  and family selectors with D. discoideum representatives rather than a fixed gene
  list. OUT OF SCOPE: the parallel GABA/GrlE input that also triggers AcbA release
  (a separate module), the ACR/PKA culmination cAMP source, and spore-coat
  assembly. The histidine-phosphotransfer intermediate RdeA is described in the
  DhkA->RegA connection but is NOT separately grounded here because it has not yet
  been reviewed.
status: DRAFT
evidence:
  - source_id: GO:0030435
    title: sporulation resulting in formation of a cellular spore
    statement: >-
      The relay's terminal output is spore encapsulation (GO:0030435); PKA
      activation downstream of the relay drives it.
  - source_id: file:DICDI/acbA/acbA-ai-review.yaml
    title: acbA gene review (Dictyostelium discoideum)
    statement: >-
      SDF-2 precursor grounding (UniProtKB:Q5FXM5); AcbA is unconventionally
      secreted and processed to the SDF-2 sporulation signal.
  - source_id: file:DICDI/tagC/tagC-ai-review.yaml
    title: tagC gene review (Dictyostelium discoideum)
    statement: >-
      SDF-2-releasing protease grounding (UniProtKB:Q23868, GO:0004252 serine-type
      endopeptidase activity); TagC cleaves secreted AcbA to release SDF-2.
  - source_id: file:DICDI/dhkA/dhkA-ai-review.yaml
    title: dhkA gene review (Dictyostelium discoideum)
    statement: >-
      SDF-2 receptor grounding (UniProtKB:Q54U87, GO:0000155 phosphorelay sensor
      kinase activity); SDF-2 binding inhibits the DhkA phosphorelay (see the
      dhkA review's adjudication of the DhkA-RegA direction).
  - source_id: file:DICDI/regA/regA-ai-review.yaml
    title: regA gene review (Dictyostelium discoideum)
    statement: >-
      cAMP-controlling node grounding (UniProtKB:Q23917, GO:0004115 cAMP
      phosphodiesterase activity); RegA degrades intracellular cAMP to keep PKA
      off until the relay lowers RegA activity.
  - source_id: file:DICDI/pkaR/pkaR-ai-review.yaml
    title: pkaR gene review (Dictyostelium discoideum)
    statement: >-
      PKA regulatory subunit grounding (UniProtKB:P05987, GO:0004862 cAMP-dependent
      protein kinase inhibitor activity); PKA-R holds PKA-C inactive until cAMP rises.
  - source_id: file:DICDI/pkaC/pkaC-ai-review.yaml
    title: pkaC gene review (Dictyostelium discoideum)
    statement: >-
      PKA catalytic subunit grounding (UniProtKB:P34099, GO:0004691 cAMP-dependent
      protein kinase activity); active PKA-C triggers spore encapsulation.
notes: >-
  Dictyostelium-specific culmination signalling relay grounded to six reviewed
  proteins: AcbA (Q5FXM5), TagC (Q23868, GO:0004252), DhkA (Q54U87, GO:0000155),
  RegA (Q23917, GO:0004115), PKA-R (P05987, GO:0004862) and PKA-C (P34099,
  GO:0004691). GO molecular-function terms were taken from the completed DICDI
  reviews; each node uses a PANTHER family selector plus the D. discoideum
  representative member. The DhkA->RegA direction follows the Wang/Anjard-Loomis
  inhibition model adopted in the dhkA review (SDF-2 inhibits DhkA, lowering RegA
  and raising cAMP/PKA); the alternative Tekinay model is recorded as contested
  there. RdeA (the RegA-activating histidine-phosphotransfer intermediate) is
  named in the DhkA->RegA connection but not grounded as its own node because it
  is not yet reviewed. Named to signal Dictyostelium scope so it does not collide
  with a generic two-component / cAMP-PKA signalling module.
module:
  id: dicty_sdf2_encapsulation_relay
  label: SDF-2 encapsulation relay (AcbA -> TagC -> DhkA -| RegA -| cAMP/PKA)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: sporulation (spore encapsulation) triggered by SDF-2
      term:
        id: GO:0030435
        label: sporulation resulting in formation of a cellular spore
      description: >-
        The relay's biological output — synchronous encapsulation of prespore
        cells into mature spores during culmination.
  parts:
    - order: 1
      role: SDF-2 signal generation (secretion and proteolytic release)
      node:
        id: sdf2_production
        label: secreted AcbA cleaved by TagC to release the SDF-2 peptide
        module_type: REACTION
        annotons:
          - id: acba_precursor
            label: "AcbA: acyl-CoA-binding protein / SDF-2 precursor"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acyl-CoA-binding protein family (AcbA)
                term:
                  id: PANTHER:PTHR23310
                  label: ACYL-COA-BINDING PROTEIN
                representative_members:
                  - preferred_term: AcbA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q5FXM5
                      label: Acyl-CoA-binding protein AcbA
            function:
              preferred_term: fatty-acyl-CoA binding
              term:
                id: GO:0000062
                label: fatty-acyl-CoA binding
              evidence:
                - source_id: file:DICDI/acbA/acbA-ai-review.yaml
                  statement: AcbA is the unconventionally secreted precursor of SDF-2
            locations:
              - preferred_term: extracellular region
                term:
                  id: GO:0005576
                  label: extracellular region
            role_description: >-
              Acyl-CoA-binding protein that is unconventionally secreted by
              prespore cells; its processed peptide is the SDF-2 sporulation
              signal. Its intrinsic molecular function is acyl-CoA binding.
          - id: tagc_protease
            label: "TagC: cell-surface serine protease that releases SDF-2"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ABC-transporter / serine-protease family (TagC)
                term:
                  id: PANTHER:PTHR43394
                  label: ABC TRANSPORTER-RELATED
                representative_members:
                  - preferred_term: TagC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q23868
                      label: ABC transporter / serine protease TagC
            function:
              preferred_term: serine-type endopeptidase activity
              term:
                id: GO:0004252
                label: serine-type endopeptidase activity
              substrates:
                - preferred_term: secreted AcbA (acyl-CoA-binding protein)
              products:
                - preferred_term: SDF-2 peptide
              evidence:
                - source_id: file:DICDI/tagC/tagC-ai-review.yaml
                  statement: TagC processes secreted AcbA to release SDF-2
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Prestalk cell-surface protein whose serine-protease domain cleaves
              secreted AcbA to liberate the diffusible SDF-2 peptide.
    - order: 2
      role: SDF-2 sensing by the DhkA receptor histidine kinase
      node:
        id: dhka_sensing
        label: SDF-2 binding inhibits DhkA autophosphorylation / phosphorelay
        module_type: REGULATORY_STEP
        annotons:
          - id: dhka_activity
            label: "DhkA: SDF-2 receptor sensor histidine kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Two-component sensor histidine kinase family (DhkA)
                term:
                  id: PANTHER:PTHR43719
                  label: HISTIDINE KINASE
                representative_members:
                  - preferred_term: DhkA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q54U87
                      label: Hybrid signal transduction histidine kinase A
            function:
              preferred_term: phosphorelay sensor kinase activity
              term:
                id: GO:0000155
                label: phosphorelay sensor kinase activity
              evidence:
                - source_id: file:DICDI/dhkA/dhkA-ai-review.yaml
                  statement: DhkA is the membrane SDF-2 receptor; SDF-2 binding inhibits its phosphorelay
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Membrane-spanning sensor histidine kinase that binds SDF-2 through
              its extracellular loop; ligand binding inhibits its
              autophosphorylation and downstream phosphorelay.
    - order: 3
      role: RegA control of intracellular cAMP (via the RdeA phosphorelay)
      node:
        id: rega_step
        label: RegA phosphodiesterase degrades cAMP while DhkA/RdeA keep it active
        module_type: REGULATORY_STEP
        annotons:
          - id: rega_activity
            label: "RegA: response-regulator cAMP phosphodiesterase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cyclic-nucleotide phosphodiesterase family (RegA)
                term:
                  id: PANTHER:PTHR11347
                  label: CYCLIC NUCLEOTIDE PHOSPHODIESTERASE
                representative_members:
                  - preferred_term: RegA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q23917
                      label: Response regulator / cAMP phosphodiesterase RegA
            function:
              preferred_term: cAMP phosphodiesterase activity
              term:
                id: GO:0004115
                label: 3',5'-cyclic-AMP phosphodiesterase activity
              substrates:
                - preferred_term: 3',5'-cyclic AMP
              products:
                - preferred_term: AMP
              evidence:
                - source_id: file:DICDI/regA/regA-ai-review.yaml
                  statement: RegA is the intracellular cAMP phosphodiesterase gating PKA
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Response-regulator cAMP phosphodiesterase; its receiver domain is
              kept phosphorylated (active) by the DhkA phosphorelay through the
              RdeA histidine-phosphotransfer protein, so degrading cAMP and
              holding PKA off until SDF-2 inhibits DhkA.
    - order: 4
      role: PKA activation and spore encapsulation
      node:
        id: pka_activation
        label: rising cAMP releases PKA-C from PKA-R to trigger encapsulation
        module_type: REGULATORY_STEP
        annotons:
          - id: pkar_activity
            label: "PKA-R: cAMP-dependent protein kinase regulatory subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: cAMP-dependent protein kinase regulatory subunit family (PKA-R)
                term:
                  id: PANTHER:PTHR11635
                  label: CAMP-DEPENDENT PROTEIN KINASE REGULATORY CHAIN
                representative_members:
                  - preferred_term: PkaR (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P05987
                      label: cAMP-dependent protein kinase regulatory subunit
            function:
              preferred_term: cAMP-dependent protein kinase inhibitor activity
              term:
                id: GO:0004862
                label: cAMP-dependent protein kinase inhibitor activity
              evidence:
                - source_id: file:DICDI/pkaR/pkaR-ai-review.yaml
                  statement: PKA-R holds PKA-C inactive until cAMP binds
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Regulatory subunit that binds and inhibits the PKA catalytic subunit;
              cAMP binding to PKA-R releases active PKA-C.
          - id: pkac_activity
            label: "PKA-C: cAMP-dependent protein kinase catalytic subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: cAMP-dependent protein kinase catalytic subunit family (PKA-C)
                term:
                  id: PANTHER:PTHR24353
                  label: CYCLIC NUCLEOTIDE-DEPENDENT PROTEIN KINASE
                representative_members:
                  - preferred_term: PkaC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:P34099
                      label: cAMP-dependent protein kinase catalytic subunit
            function:
              preferred_term: cAMP-dependent protein kinase activity
              term:
                id: GO:0004691
                label: cAMP-dependent protein kinase activity
              evidence:
                - source_id: file:DICDI/pkaC/pkaC-ai-review.yaml
                  statement: active PKA-C is the master trigger of encapsulation
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Catalytic subunit whose activation by cAMP is the master switch for
              terminal spore encapsulation during culmination.
  connections:
    - source: sdf2_production
      target: dhka_sensing
      connection_type: NEGATIVELY_REGULATES
      description: >-
        The SDF-2 peptide released by TagC from secreted AcbA binds DhkA and
        inhibits its autophosphorylation/phosphorelay.
    - source: dhka_sensing
      target: rega_step
      connection_type: POSITIVELY_REGULATES
      description: >-
        Active DhkA phosphorelay, transmitted through the histidine-phosphotransfer
        protein RdeA (not separately grounded here), keeps the RegA receiver
        domain phosphorylated and hence RegA phosphodiesterase active. Inhibiting
        DhkA therefore lowers RegA activity.
    - source: rega_step
      target: pka_activation
      connection_type: NEGATIVELY_REGULATES
      description: >-
        RegA degrades intracellular cAMP, holding PKA inactive. When SDF-2
        inhibition of DhkA lowers RegA activity, cAMP rises and PKA-C is released
        from PKA-R, triggering encapsulation. Net double-negative — SDF-2 activates
        encapsulation.
