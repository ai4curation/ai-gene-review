notes: >-
  This boundary module was created from the ppu02010 ABC-transporter partition
  work. It should remain separate from nickel, general peptide, and unrelated
  oligopeptide ABC systems even though some automated annotations propagate
  between peptide and nickel transporter families. Determine whether the three
  DppA-family binding proteins are redundant, differentially regulated, or
  specialized for distinct dipeptide/oligopeptide substrates.
