id: MODULE:dipeptide_abc_import_boundary
title: Dipeptide ABC import boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 PP_0878-PP_0885 DppABCDF
  dipeptide ABC import locus pulled from the KEGG ppu02010 ABC-transporter
  umbrella map. DppF and DppD are ATP-binding energy-coupling subunits, DppC
  and DppB are multi-pass membrane permeases, and DppA-I, DppA-II, and DppA-III
  are signal-peptide-bearing SBP_5-family periplasmic binding components. The
  module records a coherent predicted dipeptide uptake system while leaving the
  exact ligand range and partitioning among the three DppA-family binding
  proteins unresolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_0878-PP_0885 Dpp locus as a coherent
      dipeptide/peptide ABC transporter sub-batch within the broad ABC
      transporter umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records the C18 Dpp cluster as dppF, dppD,
      dppC, dppB, dppA-I, dppA-II, and dppA-III after first-pass curation.
  - source_id: UniProtKB:Q88PH2
    title: DppF ABC-type dipeptide transporter ATP-binding subunit
    statement: >-
      UniProt names DppF as an ABC-type dipeptide transporter, records ABC
      transporter ATP-binding domains, and describes it as part of DppABCDF
      involved in peptide uptake.
  - source_id: UniProtKB:Q88PH1
    title: DppD ABC-type dipeptide transporter ATP-binding subunit
    statement: >-
      UniProt names DppD as an ABC-type dipeptide transporter, places it in the
      ABC transporter superfamily, and records ABC ATP-binding domains.
  - source_id: UniProtKB:Q88PH0
    title: DppC dipeptide ABC transporter membrane subunit
    statement: >-
      UniProt names DppC as a dipeptide ABC transporter putative membrane
      subunit, predicts a cell-membrane multi-pass protein, and records
      MetI-like binding-protein-dependent transporter domains.
  - source_id: UniProtKB:Q88PG9
    title: DppB dipeptide ABC transporter membrane subunit
    statement: >-
      UniProt names DppB as a dipeptide ABC transporter putative membrane
      subunit, predicts a cell-membrane multi-pass protein, and records
      MetI-like binding-protein-dependent transporter domains.
  - source_id: UniProtKB:Q88PG8
    title: DppA-I dipeptide ABC transporter periplasmic binding protein
    statement: >-
      UniProt names DppA-I as a dipeptide ABC transporter periplasmic binding
      protein and records a signal peptide plus SBP_5/peptide-binding domains.
  - source_id: UniProtKB:Q88PG6
    title: DppA-II dipeptide ABC transporter periplasmic binding protein
    statement: >-
      UniProt names DppA-II as a dipeptide ABC transporter periplasmic binding
      protein and records a signal peptide plus SBP_5/peptide-binding domains.
  - source_id: UniProtKB:Q88PG5
    title: DppA-III dipeptide ABC transporter periplasmic binding protein
    statement: >-
      UniProt names DppA-III as a dipeptide ABC transporter periplasmic binding
      protein and records a signal peptide plus SBP_5/peptide-binding domains.
