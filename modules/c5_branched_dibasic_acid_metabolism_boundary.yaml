id: MODULE:c5_branched_dibasic_acid_metabolism_boundary
title: C5-branched dibasic acid metabolism boundary
description: >-
  Boundary module for KEGG ppu00660 in Pseudomonas putida KT2440. The
  organism-specific map is not one dedicated C5-branched dibasic acid pathway:
  it combines acetolactate/acetohydroxy-acid synthase enzymes and leucine
  biosynthesis branch enzymes with a GalC gallate-catabolism aldolase and the
  central-carbon SucCD succinate-CoA ligase complex. It is curated here as an
  overlap between branched-chain amino acid biosynthesis, gallate degradation,
  and TCA-cycle succinyl-CoA turnover.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00660
    title: C5-Branched dibasic acid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00660 provides the PSEPK curation batch. Its membership contains
      acetolactate synthase catalytic/regulatory proteins, LeuCD/LeuB leucine
      biosynthesis enzymes, GalC gallate degradation aldolase, and SucCD
      succinate-CoA ligase subunits.
  - source_id: file:modules/branched_chain_amino_acid_biosynthesis.yaml
    title: Branched-chain amino acid biosynthesis module
    statement: >-
      The acetolactate synthase and LeuCD/LeuB portions of ppu00660 overlap the
      curated valine, leucine, and isoleucine biosynthesis boundary.
  - source_id: file:modules/tca_cycle.yaml
    title: Tricarboxylic acid cycle module
    statement: >-
      SucCD is a TCA-cycle succinate-CoA ligase node rather than evidence for a
      separate C5-branched dibasic acid route.
module:
  id: c5_branched_dibasic_acid_metabolism_boundary
  label: C5-branched dibasic acid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: acetolactate synthase activity
      term:
        id: GO:0003984
        label: acetolactate synthase activity
      description: Catalytic acetohydroxy-acid synthase activity in valine and isoleucine precursor synthesis.
    - preferred_term: acetolactate synthase regulator activity
      term:
        id: GO:1990610
        label: acetolactate synthase regulator activity
      description: Regulatory activity of the small AHAS subunit.
    - preferred_term: L-valine biosynthetic process
      term:
        id: GO:0009099
        label: L-valine biosynthetic process
      description: Acetolactate-derived valine biosynthesis branch.
    - preferred_term: L-isoleucine biosynthetic process
      term:
        id: GO:1901705
        label: L-isoleucine biosynthetic process
      description: Acetohydroxybutanoate-derived isoleucine biosynthesis branch.
    - preferred_term: 3-isopropylmalate dehydratase activity
      term:
        id: GO:0003861
        label: 3-isopropylmalate dehydratase activity
      description: LeuC/LeuD leucine-branch isomerization/dehydration activity.
    - preferred_term: 3-isopropylmalate dehydrogenase activity
      term:
        id: GO:0003862
        label: 3-isopropylmalate dehydrogenase activity
      description: LeuB oxidative decarboxylation step in leucine biosynthesis.
    - preferred_term: L-leucine biosynthetic process
      term:
        id: GO:0009098
        label: L-leucine biosynthetic process
      description: Leucine branch from 2-oxoisovalerate through isopropylmalate intermediates.
    - preferred_term: 4-hydroxy-4-methyl-2-oxoglutarate aldolase activity
      term:
        id: GO:0047443
        label: 4-hydroxy-4-methyl-2-oxoglutarate aldolase activity
      description: GalC aldolase activity currently used for the gallate-degradation CHA aldolase.
    - preferred_term: gallate catabolic process
      term:
        id: GO:0019396
        label: gallate catabolic process
      description: Gallate lower-pathway context for GalC.
    - preferred_term: succinate-CoA ligase (ADP-forming) activity
      term:
        id: GO:0004775
        label: succinate-CoA ligase (ADP-forming) activity
      description: SucCD central-carbon succinyl-CoA synthetase activity.
    - preferred_term: tricarboxylic acid cycle
      term:
        id: GO:0006099
        label: tricarboxylic acid cycle
      description: TCA-cycle context for SucCD.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: In bacteria these soluble metabolic enzymes operate in the cytoplasm/cytosol.
  parts:
    - order: 1
      role: Acetohydroxy-acid synthase overlap with BCAA biosynthesis
      node:
        id: acetohydroxy_acid_synthase_overlap
        label: Acetohydroxy-acid synthase overlap
        module_type: PROTEIN_COMPLEX
        description: >-
          PP_1157, PP_1394, and IlvI are AHAS-like catalytic proteins annotated
          with acetolactate synthase activity, while IlvH is the small
          regulatory subunit. In ppu00660 these are best treated as overlap
          with valine and isoleucine precursor biosynthesis, not as a standalone
          C5-dibasic-acid pathway.
        concepts:
          - preferred_term: acetolactate synthase complex
            term:
              id: GO:0005948
              label: acetolactate synthase complex
        annotons:
          - id: PP_1157_acetolactate_synthase
            label: "PP_1157: acetolactate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1157
            function:
              preferred_term: acetolactate synthase activity
              term:
                id: GO:0003984
                label: acetolactate synthase activity
            role_description: AHAS-like catalytic enzyme producing acetolactate/acetohydroxybutanoate precursors.
          - id: PP_1394_acetolactate_synthase
            label: "PP_1394: acetolactate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1394
            function:
              preferred_term: acetolactate synthase activity
              term:
                id: GO:0003984
                label: acetolactate synthase activity
            role_description: AHAS-like catalytic enzyme in the ppu00660/BCAA-biosynthesis overlap.
          - id: ilvI_acetolactate_synthase
            label: "ilvI: acetolactate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ilvI
            function:
              preferred_term: acetolactate synthase activity
              term:
                id: GO:0003984
                label: acetolactate synthase activity
            role_description: Catalytic AHAS subunit for valine and isoleucine biosynthesis.
          - id: ilvH_acetolactate_synthase_regulator
            label: "ilvH: acetolactate synthase regulatory subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ilvH
            function:
              preferred_term: acetolactate synthase regulator activity
              term:
                id: GO:1990610
                label: acetolactate synthase regulator activity
            role_description: Small regulatory subunit of AHAS complexes.
    - order: 2
      role: Leucine-specific isopropylmalate branch
      node:
        id: leucine_isopropylmalate_branch
        label: Leucine isopropylmalate branch
        module_type: METABOLIC_PATHWAY
        description: >-
          LeuC, LeuD, and LeuB form the isopropylmalate branch of L-leucine
          biosynthesis. Their ppu00660 membership reflects C5-branched
          isopropylmalate intermediates but should satisfy the leucine
          biosynthesis branch of the BCAA module.
        concepts:
          - preferred_term: L-leucine biosynthetic process
            term:
              id: GO:0009098
              label: L-leucine biosynthetic process
        annotons:
          - id: leuCD_3_isopropylmalate_dehydratase
            label: "leuC/leuD: 3-isopropylmalate dehydratase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 3-isopropylmalate dehydratase activity
                term:
                  id: GO:0003861
                  label: 3-isopropylmalate dehydratase activity
            function:
              preferred_term: 3-isopropylmalate dehydratase activity
              term:
                id: GO:0003861
                label: 3-isopropylmalate dehydratase activity
            role_description: LeuC/LeuD heteromeric dehydratase/isomerase step in leucine biosynthesis.
          - id: leuB_3_isopropylmalate_dehydrogenase
            label: "leuB: 3-isopropylmalate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: leuB
            function:
              preferred_term: 3-isopropylmalate dehydrogenase activity
              term:
                id: GO:0003862
                label: 3-isopropylmalate dehydrogenase activity
            role_description: Oxidative decarboxylation of 3-isopropylmalate to the leucine precursor 2-oxoisocaproate.
    - order: 3
      role: Gallate-degradation aldolase side context
      node:
        id: gallate_aldolase_side_context
        label: Gallate aldolase side context
        module_type: REACTION
        description: >-
          GalC is the CHA aldolase in gallate degradation. It is a genuine
          ppu00660 member but belongs biologically to aromatic/gallate
          catabolism rather than BCAA biosynthesis or TCA metabolism.
        annotons:
          - id: galC_gallate_aldolase
            label: "galC: gallate degradation aldolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: galC
            function:
              preferred_term: 4-hydroxy-4-methyl-2-oxoglutarate aldolase activity
              term:
                id: GO:0047443
                label: 4-hydroxy-4-methyl-2-oxoglutarate aldolase activity
            role_description: Terminal aldolase step in the gallate catabolic process.
    - order: 4
      role: TCA-cycle succinyl-CoA turnover
      node:
        id: succinate_CoA_ligase_tca_context
        label: Succinate-CoA ligase TCA context
        module_type: PROTEIN_COMPLEX
        description: >-
          SucD and SucC are alpha and beta subunits of succinate-CoA ligase.
          Their ppu00660 membership reflects succinyl-CoA/2-oxoglutarate
          connectivity, but their curated core process is the TCA cycle.
        concepts:
          - preferred_term: succinate-CoA ligase complex
            term:
              id: GO:0042709
              label: succinate-CoA ligase complex
        annotons:
          - id: sucD_succinate_CoA_ligase_alpha
            label: "sucD: succinate-CoA ligase alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sucD
            function:
              preferred_term: succinate-CoA ligase (ADP-forming) activity
              term:
                id: GO:0004775
                label: succinate-CoA ligase (ADP-forming) activity
            role_description: Alpha subunit of the central TCA-cycle succinyl-CoA synthetase complex.
          - id: sucC_succinate_CoA_ligase_beta
            label: "sucC: succinate-CoA ligase beta subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sucC
            function:
              preferred_term: succinate-CoA ligase (ADP-forming) activity
              term:
                id: GO:0004775
                label: succinate-CoA ligase (ADP-forming) activity
            role_description: Beta subunit of the central TCA-cycle succinyl-CoA synthetase complex.
