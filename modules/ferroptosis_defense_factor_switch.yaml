id: MODULE:ferroptosis_defense_factor_switch
title: Generic ferroptosis-defense-factor abundance/activity switch motif
description: >-
  The minimal, reusable motif for set-point control of a ferroptosis-defense
  factor: a defense node - a suppressor whose activity is part_of negative
  regulation of ferroptosis (GO:0110076) - is held between two opposed arms. A
  destabilizer arm lowers the suppressor's abundance or activity (it directly
  negatively regulates the defense node and is itself part_of positive regulation
  of ferroptosis, GO:0160020), and a stabilizer arm preserves or restores it (it
  directly positively regulates the defense node and is part_of negative
  regulation of ferroptosis). The net ferroptosis set-point is the balance of the
  two arms acting on the shared defense node.

  Unlike molecular-function-tiered motifs (e.g. the MAPK relay, where every
  realization shares the MAP3K/MAP2K/MAPK function terms), the tiers of THIS motif
  are unified by causal role and topology, NOT by a shared molecular function. Two
  curated GO-CAM realizations make this explicit with completely different
  machinery: SLC7A11 is destabilized by a CRL3 ubiquitin ligase (CUL3-KCTD10-RBX1)
  and rescued by a deubiquitinase (USP18); GPX4 is destabilized by
  chaperone-mediated autophagy (HSPA8-LAMP2) and stabilized by EGLN3/PHD3 prolyl
  hydroxylation. Concrete realizations therefore embed this motif through
  `conforms_to` with status WITH_DEVIATIONS - matching the destabilizer/stabilizer
  topology while substituting instance-specific tier functions - rather than the
  EXACT status used by shared-function cascades.
status: DRAFT
evidence:
  - source_id: GO:0110076
    title: negative regulation of ferroptosis
    statement: >-
      The defense node and the stabilizer arm are part_of negative regulation of
      ferroptosis (they suppress, or protect the suppressor of, ferroptosis).
  - source_id: GO:0160020
    title: positive regulation of ferroptosis
    statement: >-
      The destabilizer arm, by lowering the defense factor, is part_of positive
      regulation of ferroptosis.
  - source_id: file:gocams/69729a3800005900/69729a3800005900-review.yaml
    title: KCTD10/CRL3-vs-USP18 control of SLC7A11
    statement: >-
      Realization with a CRL3 destabilizer and a deubiquitinase stabilizer of the
      SLC7A11 defense node.
  - source_id: file:gocams/680ad14200007201/680ad14200007201-review.yaml
    title: CMA-vs-EGLN3 control of GPX4
    statement: >-
      Realization with a chaperone-mediated-autophagy destabilizer and a
      prolyl-hydroxylation stabilizer of the GPX4 defense node.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: ferroptosis_defense_factor_switch, status:
  WITH_DEVIATIONS, deviations: [...]}]` when an opposed destabilizer/stabilizer
  pair sets the abundance or activity of a ferroptosis-defense factor. The
  WITH_DEVIATIONS status is expected, not exceptional: the motif deliberately does
  not fix the tier molecular functions (a CRL ligase, a CMA adaptor, a DUB, or a
  dioxygenase may fill an arm), so realizations match the topology and list their
  instance-specific tier functions as deviations.
module:
  id: ferroptosis_defense_factor_switch
  label: Ferroptosis-defense-factor switch
  module_type: REGULATORY_STEP
  concepts:
    - preferred_term: negative regulation of ferroptosis
      term:
        id: GO:0110076
        label: negative regulation of ferroptosis
      description: The defense node and stabilizer arm suppress ferroptosis.
    - preferred_term: positive regulation of ferroptosis
      term:
        id: GO:0160020
        label: positive regulation of ferroptosis
      description: The destabilizer arm, by removing the defense factor, promotes ferroptosis.
  parts:
    - order: 1
      role: defense node (the regulated ferroptosis suppressor)
      node:
        id: defense_node
        label: Ferroptosis-defense node
        module_type: REGULATORY_STEP
        description: >-
          The suppressor whose activity is part_of negative regulation of
          ferroptosis and whose abundance/activity the two arms control.
        annotons:
          - id: defense_factor
            label: regulated ferroptosis-defense factor
            participant:
              selector_type: ANY_PARTICIPANT
              description: >-
                Any suppressor whose activity is part_of negative regulation of
                ferroptosis (e.g. GPX4, SLC7A11); the tier is role-defined, not
                fixed to a single molecular function.
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
            role_description: The shared defense factor both arms act on.
    - order: 2
      role: destabilizer arm (lowers the defense factor; pro-ferroptotic)
      node:
        id: destabilizer_arm
        label: Destabilizer / inhibitor arm
        module_type: REGULATORY_STEP
        description: >-
          An activity that lowers the defense factor's abundance or activity
          (degradation, inhibitory modification); part_of positive regulation of
          ferroptosis.
        annotons:
          - id: destabilizer
            label: defense-factor destabilizer
            participant:
              selector_type: ANY_PARTICIPANT
              description: >-
                Any activity that removes or inhibits the defense factor (e.g. a
                CRL ubiquitin ligase, a chaperone-mediated-autophagy adaptor).
            processes:
              - preferred_term: positive regulation of ferroptosis
                term:
                  id: GO:0160020
                  label: positive regulation of ferroptosis
            role_description: Lowers the defense factor, raising ferroptosis sensitivity.
    - order: 3
      role: stabilizer arm (preserves the defense factor; anti-ferroptotic)
      node:
        id: stabilizer_arm
        label: Stabilizer / activator arm
        module_type: REGULATORY_STEP
        description: >-
          An activity that preserves or restores the defense factor (a
          deubiquitinase, or a protective modification that blocks degradation);
          part_of negative regulation of ferroptosis.
        annotons:
          - id: stabilizer
            label: defense-factor stabilizer
            participant:
              selector_type: ANY_PARTICIPANT
              description: >-
                Any activity that preserves the defense factor (e.g. a
                deubiquitinase, a prolyl hydroxylase masking it from degradation).
            processes:
              - preferred_term: negative regulation of ferroptosis
                term:
                  id: GO:0110076
                  label: negative regulation of ferroptosis
            role_description: Preserves the defense factor, lowering ferroptosis sensitivity.
  connections:
    - source: destabilizer_arm
      target: defense_node
      connection_type: NEGATIVELY_REGULATES
      description: The destabilizer arm lowers the defense factor's abundance/activity.
    - source: stabilizer_arm
      target: defense_node
      connection_type: POSITIVELY_REGULATES
      description: The stabilizer arm preserves or restores the defense factor.
