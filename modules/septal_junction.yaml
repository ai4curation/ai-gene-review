id: MODULE:septal_junction
title: Cyanobacterial septal junction module
description: >-
  The septal junction (SJ) is a proteinaceous, gap-junction-like cell-cell junction of
  filamentous, heterocyst-forming cyanobacteria (e.g. Nostoc/Anabaena sp. PCC 7120). SJs
  traverse the shared septal peptidoglycan (PG) through nanopores and directly connect the
  cytoplasms of adjacent cells in a filament, mediating and gating the intercellular
  diffusion of small molecules (metabolites and signaling compounds) — a prerequisite for
  multicellular behavior and for diazotrophic growth, in which heterocysts exchange fixed
  nitrogen for photosynthate with neighboring vegetative cells. In situ cryo-electron
  tomography with subtomogram averaging resolves the SJ as a five-fold-symmetric assembly
  with four structural modules: a cytoplasmic cap (five arches), a membrane-embedded plug,
  a septum-spanning tube, and a transmembrane/periplasmic anchor. This module represents
  the SJ as a structural cell-cell junction: its two molecularly identified core
  components — SepN (the plug) and FraD (the membrane/periplasmic anchor) — the still
  molecularly-unidentified cap and (partly lipidic) tube modules, the cell-wall amidases
  that drill the septal PG nanopore array the SJ passes through, and the additional septal
  proteins (SepJ/FraG, FraC, FraE) that influence SJ architecture and filament integrity.
status: DRAFT
evidence:
  - source_id: PMID:42424141
    title: "The SepN-FraD structural module serves as an anchor and assembly platform for septal junctions in cyanobacteria."
    statement: >-
      Cryo-electron tomography, AlphaFold 3 modeling and MD position SepN as the plug and
      FraD as the transmembrane/periplasmic anchor of the SJ; the FraD periplasmic domain
      is required for nanopore formation, SJ assembly, reopening and diazotrophic growth.
  - source_id: PMID:36470860
    title: "SepN is a septal junction component required for gated cell-cell communication in the filamentous cyanobacterium Nostoc."
    statement: >-
      Identifies SepN (all4109) as the FraD-interacting component required for plug
      formation and for gated cell-cell communication; the SJ has a cap, a
      membrane-embedded plug and a septum-spanning tube.
  - source_id: PMID:20487302
    title: "Fra proteins influencing filament integrity, diazotrophy and localization of septal protein SepJ in the heterocyst-forming cyanobacterium Anabaena sp."
    statement: >-
      FraC (alr2392), FraD (alr2393) and FraE (alr2394) form an operon; FraC and FraD
      localize to intercellular septa and are required for SepJ localization, calcein
      transfer, filament integrity and diazotrophy.
  - source_id: PMID:28929086
    title: "Role of Two Cell Wall Amidases in Septal Junction and Nanopore Formation in the Multicellular Cyanobacterium Anabaena sp. PCC 7120."
    statement: >-
      The cell-wall N-acetylmuramoyl-L-alanine amidases AmiC1 (alr0092) and AmiC2 (alr0093)
      drill the nanopore array in the septal peptidoglycan through which septal junctions
      connect adjacent cells.
  - source_id: PMID:28979840
    title: "Septal protein SepJ from the heterocyst-forming cyanobacterium Anabaena forms multimers and interacts with peptidoglycan."
    statement: >-
      SepJ (FraG, alr2338) is a septal, multimer-forming protein that interacts with
      peptidoglycan and is required for septal junction formation and filament integrity.
notes: >-
  Scope and caveats. This module is centered on the cryoET-resolved SJ structural complex
  and its FraD-SepN core (the two components with a defined molecular role and per-gene
  reviews). The cap module's molecular identity is unknown (an open question in the field),
  and the tube appears to be a membrane-continuous, at-least-partly lipidic extension of
  the cytoplasmic membrane rather than a purely proteinaceous ring, so both are represented
  as abstract structural sub-modules without a grounded protein member. The septal PG
  amidases (AmiC1/AmiC2) act upstream to create the nanopores the SJ traverses and are
  modeled as an assembly prerequisite, not as SJ subunits. SepJ (FraG), FraC and FraE are
  septal-junction-associated proteins that influence SJ architecture, nanopore number and
  filament integrity; whether SepJ forms the same channel as the FraCD/SepN complex or a
  distinct but related junction is not fully resolved, so they are grouped as
  associated/architectural factors rather than asserted subunits of the FraD-SepN core.
  Stoichiometry of the core is 5 SepN + 5 FraD per SJ head (C5 symmetry).
  Grounding convention: each concrete leaf annoton is a FAMILY descriptor (grounded to its
  InterPro family term where one exists, or preferred_term + description for SepN and SepJ,
  which lack a dedicated family model), with the Nostoc/Anabaena sp. PCC 7120
  (NCBITaxon:103690) protein(s) listed as representative_members exemplars rather than as the
  sole species-specific participant. The two paralogous septal amidases AmiC1 (alr0092) and
  AmiC2 (alr0093) are represented as a single AmiC-family annoton with both as exemplars.
  A reproducible genome scan validating these groundings against other cyanobacterial
  genomes (positive: Nostoc punctiforme, Anabaena variabilis; negative: unicellular
  Synechocystis/Synechococcus) is in analysis/septal_junction_genome_scan/ (see RESULTS.md):
  FraD/FraC (specific families) and SepN (by exemplar homology, no family model) are cleanly
  present in heterocyst-formers and absent from unicellular controls, while SepJ/FraE/AmiC
  map to broad domains that also hit non-SJ paralogs.
module:
  id: septal_junction
  label: Cyanobacterial septal junction
  module_type: PROTEIN_COMPLEX
  description: >-
    Structural cell-cell junction traversing the septal peptidoglycan, built from a
    cytoplasmic cap, a SepN plug, a septum-spanning tube, and a FraD transmembrane/
    periplasmic anchor, with C5 symmetry.
  concepts:
    - preferred_term: septal junction
      description: >-
        Proteinaceous cyanobacterial cell-cell junction connecting the cytoplasms of
        adjacent cells across the septal peptidoglycan; functionally analogous to metazoan
        gap junctions. No dedicated GO cellular-component term currently exists (GO:0005918
        "septate junction" is the arthropod epithelial junction and is not appropriate).
    - preferred_term: cell junction (nearest existing GO parent)
      term:
        id: GO:0030054
        label: cell junction
    - preferred_term: gated cell-cell signaling / intercellular communication
      term:
        id: GO:0007267
        label: cell-cell signaling
  context:
    taxa:
      - preferred_term: filamentous heterocyst-forming cyanobacteria (Nostocales)
        description: >-
          SJs and their FraD/SepN components are restricted to multicellular, filamentous
          cyanobacteria; the components are absent from unicellular cyanobacteria and other
          bacteria.
    cellular_components:
      - preferred_term: cytoplasmic (inner) membrane
        term:
          id: GO:0005886
          label: plasma membrane
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
      - preferred_term: cell septum
        term:
          id: GO:0030428
          label: cell septum
      - preferred_term: septal peptidoglycan / cell wall
        term:
          id: GO:0030312
          label: external encapsulating structure
  parts:
    - order: 1
      role: creation of the septal peptidoglycan nanopore array the SJ passes through (assembly prerequisite)
      node:
        id: sj_nanopore_formation
        label: Septal PG nanopore formation (cell-wall amidases)
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The septal cross-wall PG is perforated by an array of nanopores drilled by
          cell-wall amidases; septal junctions thread through these nanopores to connect
          adjacent cells. AmiC2 (and AmiC1) generate and pattern the nanopore array.
        concepts:
          - preferred_term: cell wall organization
            term:
              id: GO:0071555
              label: cell wall organization
        annotons:
          - id: amiC_amidase_annoton
            label: Septal cell-wall amidases (AmiC family)
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Septal N-acetylmuramoyl-L-alanine amidases (AmiC1/AmiC2 subfamily)
                term:
                  id: InterPro:IPR050695
                  label: N-acetylmuramoyl-L-alanine amidase 3
                description: >-
                  AMIN-domain + Amidase_3 (MurNAc-LAA, Zn-dependent) cell-wall amidases that
                  drill and pattern the septal PG nanopore array (Pfam PF01520 + PF11741;
                  PANTHER PTHR30404). In Nostoc/Anabaena sp. PCC 7120 the paralogs AmiC1
                  (alr0092) and AmiC2 (alr0093) fulfil this role, with AmiC2 the principal
                  nanopore driller. Representative members are exemplars, not an exhaustive list.
                representative_members:
                  - preferred_term: AmiC2 (alr0093), Nostoc sp. PCC 7120 - principal nanopore driller
                    term:
                      id: UniProtKB:A0ACD7S2F2
                      label: N-acetylmuramoyl-L-alanine amidase (alr0093)
                  - preferred_term: AmiC1 (alr0092), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:A0ACD7S1M0
                      label: N-acetylmuramoyl-L-alanine amidase (alr0092)
            role_description: >-
              Septum-localized cell-wall amidases that drill and pattern the septal PG nanopore
              array through which septal junctions connect adjacent cells.
            function:
              preferred_term: N-acetylmuramoyl-L-alanine amidase activity
              term:
                id: GO:0008745
                label: N-acetylmuramoyl-L-alanine amidase activity
            processes:
              - preferred_term: peptidoglycan catabolic process (nanopore drilling)
                term:
                  id: GO:0009253
                  label: peptidoglycan catabolic process
            evidence:
              - source_id: PMID:28929086
                statement: AmiC amidases are required for septal nanopore and septal-junction formation.
    - order: 2
      role: FraD-SepN structural core (plug + membrane/periplasmic anchor)
      node:
        id: sj_frad_sepn_core
        label: FraD-SepN structural core module
        module_type: PROTEIN_COMPLEX
        description: >-
          The molecularly-defined core of the SJ: a central pentameric SepN plug embedded in
          the cytoplasmic membrane, surrounded by five FraD anchors whose transmembrane
          domains span the membrane and whose periplasmic domains form the periplasmic
          anchor. C5 symmetry (5 SepN + 5 FraD per SJ head).
        concepts:
          - preferred_term: septal junction structural core
            description: SepN plug + FraD anchor; the assembly platform for the plug and cap.
        annotons:
          - id: sepN_plug_annoton
            label: SepN plug
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SepN septal-junction plug family
                description: >-
                  Family of the SJ plug protein SepN. No dedicated Pfam/InterPro/PANTHER model
                  exists; the family is operationally defined by co-occurrence with FraD and is a
                  signature of the order Nostocales (conserved across Oscillatoriophycideae,
                  Nostocaceae, Stigonematales). Representative member is an exemplar.
                representative_members:
                  - preferred_term: SepN (all4109), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:A0ACD7RWW5
                      label: SepN / All4109 protein
            role_description: >-
              Forms the membrane-embedded plug; five SepN copies assemble a central
              pentameric plug that gates (opens/closes) the SJ. C-terminus faces cytoplasm.
            function:
              preferred_term: structural molecule activity (plug)
              term:
                id: GO:0005198
                label: structural molecule activity
            processes:
              - preferred_term: gated cell-cell signaling
                term:
                  id: GO:0007267
                  label: cell-cell signaling
            locations:
              - preferred_term: cytoplasmic membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            evidence:
              - source_id: PMID:36470860
                statement: SepN forms the plug and is required for gated cell-cell communication.
          - id: fraD_anchor_annoton
            label: FraD membrane/periplasmic anchor
            participant:
              selector_type: FAMILY
              family:
                preferred_term: FraD septal-junction anchor family
                term:
                  id: InterPro:IPR020360
                  label: Uncharacterised protein family alr2393
                description: >-
                  FraD family (Pfam PF17310/DUF5357; NCBIfam NF037953; TCDB 1.V.1.1.1),
                  restricted to filamentous heterocyst-forming cyanobacteria; ~161 members.
                  Representative member is an exemplar.
                representative_members:
                  - preferred_term: FraD (alr2393), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:P46079
                      label: FraD / Uncharacterized protein alr2393
            role_description: >-
              Membrane-spanning and periplasmic anchor; five FraD copies surround the SepN
              plug. Five TM helices (aa ~30-172) plus a periplasmic domain (aa 173-343) that
              forms the periplasmic anchor and the assembly platform for the plug and cap.
            function:
              preferred_term: structural molecule activity (anchor)
              term:
                id: GO:0005198
                label: structural molecule activity
            processes:
              - preferred_term: gated cell-cell signaling
                term:
                  id: GO:0007267
                  label: cell-cell signaling
            locations:
              - preferred_term: cytoplasmic membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
              - preferred_term: periplasmic space
                term:
                  id: GO:0042597
                  label: periplasmic space
            evidence:
              - source_id: PMID:42424141
                statement: FraD is the transmembrane/periplasmic anchor and assembly platform of the SJ.
    - order: 3
      role: cytoplasmic cap module (molecular identity unknown)
      node:
        id: sj_cap
        label: SJ cytoplasmic cap module
        module_type: PROTEIN_COMPLEX
        description: >-
          Five-arch cytoplasmic cap that gates the SJ on the cytoplasmic side. Its molecular
          identity is currently unknown; cap-like structures have been noted in analogous
          systems but no Nostoc cap protein has been assigned. Represented as an abstract
          structural sub-module with no grounded member.
        concepts:
          - preferred_term: septal junction cap (unassigned)
            description: Cytoplasmic five-arch gating cap of unknown molecular composition.
    - order: 4
      role: septum-spanning tube module (membrane-continuous, partly lipidic)
      node:
        id: sj_tube
        label: SJ tube module
        module_type: CELLULAR_COMPONENT
        description: >-
          A tube that spans the septal PG and connects the SJ heads of neighboring cells.
          CryoET indicates the tube is a continuous, at-least-partly lipidic bilayer that is
          an extension of the cytoplasmic membrane, possibly stabilized by an unidentified
          membrane-embedded protein. Represented as an abstract sub-module.
        concepts:
          - preferred_term: septal junction tube (membrane-continuous)
            description: Membrane-like tube spanning the septum; likely partly lipidic.
    - order: 5
      role: septal-junction-associated proteins influencing SJ architecture and filament integrity
      node:
        id: sj_associated_septal_proteins
        label: Associated septal proteins (SepJ/FraG, FraC, FraE)
        module_type: MODULE
        description: >-
          Additional septal proteins required for normal SJ architecture, nanopore number
          and filament integrity. SepJ (FraG) forms multimers and interacts with PG; FraC and
          FraE are encoded in the fraC-fraD-fraE operon with FraD. Whether SepJ forms the same
          channel as the FraCD/SepN complex or a distinct but related junction is unresolved;
          these are grouped as associated/architectural factors, not asserted core subunits.
        annotons:
          - id: sepJ_annoton
            label: SepJ (FraG) septal protein
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SepJ / FraG septal protein family
                description: >-
                  Multidomain septal protein (N-terminal coiled-coil + C-terminal EamA/DMT
                  permease domain; InterPro IPR000620 EamA, Pfam PF00892, PANTHER PTHR22911
                  drug/metabolite transporter superfamily). No SepJ-specific InterPro family
                  entry; grounded by exemplar. Representative member is an exemplar.
                representative_members:
                  - preferred_term: SepJ / FraG (alr2338), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:A0ACD7RSI0
                      label: SepJ / Alr2338 protein
            role_description: >-
              Septal, multimer-forming protein that interacts with peptidoglycan and is
              required for SJ formation and filament integrity.
            locations:
              - preferred_term: cell septum
                term:
                  id: GO:0030428
                  label: cell septum
            evidence:
              - source_id: PMID:28979840
                statement: SepJ forms multimers, interacts with PG, and is required for SJ formation.
          - id: fraC_annoton
            label: FraC septal integral-membrane protein
            participant:
              selector_type: FAMILY
              family:
                preferred_term: FraC septal integral-membrane protein family
                term:
                  id: InterPro:IPR054663
                  label: Filament integrity protein FraC
                description: >-
                  FraC family (Pfam PF24301; NCBIfam NF045624; TCDB 1.V.1.1.1, same septal-pore
                  family as FraD). Representative member is an exemplar.
                representative_members:
                  - preferred_term: FraC (alr2392), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:P46078
                      label: Filament integrity protein FraC
            role_description: >-
              Integral-membrane septal protein (fraC-fraD-fraE operon); required for filament
              integrity, SepJ localization and intercellular calcein transfer.
            locations:
              - preferred_term: cytoplasmic membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            evidence:
              - source_id: PMID:20487302
                statement: FraC localizes to septa and is required for filament integrity and calcein transfer.
          - id: fraE_annoton
            label: FraE (fraCDE operon)
            participant:
              selector_type: FAMILY
              family:
                preferred_term: FraE ABC-2-type permease family (NosY-like)
                term:
                  id: InterPro:IPR032688
                  label: ABC-2 type transporter permease protein NosY-like
                description: >-
                  ABC-2-type transporter permease-family protein (Pfam PF12679; PANTHER
                  PTHR43471). Third gene of the fraC-fraD-fraE operon. Representative member is
                  an exemplar.
                representative_members:
                  - preferred_term: FraE (alr2394), Nostoc sp. PCC 7120
                    term:
                      id: UniProtKB:A0ACD7RSN5
                      label: FraE / Alr2394 protein
            role_description: >-
              Third gene of the fraC-fraD-fraE operon; single mutants fragment under nitrogen
              deprivation and fail to grow diazotrophically.
            evidence:
              - source_id: PMID:20487302
                statement: fraE is co-transcribed with fraC/fraD; fra mutants fragment and fail diazotrophy.
  connections:
    - source: sj_nanopore_formation
      target: sj_frad_sepn_core
      connection_type: PRECEDES
      description: >-
        Septal PG nanopores must be drilled by the amidases before/so that the FraD-SepN SJ
        core can thread through the septum and connect adjacent cells.
