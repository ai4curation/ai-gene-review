id: MODULE:dmt_transporter_boundary
title: DMT transporter boundary
description: Boundary module for the ppu02024 PP_3609 DMT/YdcZ-family transporter singleton. This module records ppu02024 side context and is not evidence for direct quorum sensing.
status: DRAFT
evidence:
- source_id: KEGG:ppu02024
  title: Quorum sensing - Pseudomonas putida KT2440
  statement: KEGG ppu02024 includes this singleton, but the primary evidence supports side-context biology rather than LuxI/LuxR-type quorum sensing.
- source_id: UniProtKB:Q88GV8
  title: PP_3609 DMT family transporter
  statement: UniProt records PP_3609 (PP_3609) as DMT family transporter.
