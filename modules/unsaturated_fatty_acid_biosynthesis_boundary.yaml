id: MODULE:unsaturated_fatty_acid_biosynthesis_boundary
title: Unsaturated fatty acid biosynthesis boundary
description: >-
  Boundary/side-node module for KEGG ppu01040 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains tesA, tesB, and PP_5331, all reviewed as
  lipid ester or acyl-thioester hydrolases. The canonical bacterial
  unsaturated-acyl-ACP branch is covered in the broader fatty_acid_biosynthesis
  module by FabA/FabB context, not by this ppu01040 thioesterase-only bucket.
status: DRAFT
evidence:
  - source_id: KEGG:ppu01040
    title: Biosynthesis of unsaturated fatty acids - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu01040 provides the PSEPK curation batch. Its mapped members are
      tesA, tesB, and PP_5331, all hydrolase/thioesterase side nodes rather
      than FabA/FabB unsaturated-acyl-ACP branch enzymes.
  - source_id: file:projects/P_PUTIDA/batches/ppu01040_unsaturated_fatty_acid_biosynthesis_boundary.tsv
    title: PSEPK ppu01040 unsaturated-fatty-acid batch
    statement: >-
      The batch records three PSEPK members and shows that all have review
      files, Asta reports, and curated GOA decisions.
module:
  id: unsaturated_fatty_acid_biosynthesis_boundary
  label: Unsaturated fatty acid biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: unsaturated fatty acid biosynthetic process
      term:
        id: GO:0006636
        label: unsaturated fatty acid biosynthetic process
      description: The expected process for a true UFA biosynthesis route; not directly satisfied by the ppu01040 members.
    - preferred_term: fatty acyl-[ACP] hydrolase activity
      term:
        id: GO:0016297
        label: fatty acyl-[ACP] hydrolase activity
      description: TesA thioester/ester hydrolase activity.
    - preferred_term: fatty acyl-CoA hydrolase activity
      term:
        id: GO:0047617
        label: fatty acyl-CoA hydrolase activity
      description: TesB acyl-CoA thioesterase activity.
    - preferred_term: long-chain fatty acyl-CoA hydrolase activity
      term:
        id: GO:0052816
        label: long-chain fatty acyl-CoA hydrolase activity
      description: PP_5331 HotDog ACOT-family activity.
    - preferred_term: acyl-CoA metabolic process
      term:
        id: GO:0006637
        label: acyl-CoA metabolic process
      description: Broad process context for acyl-CoA thioesterases.
  parts:
    - order: 1
      role: UFA-route boundary
      node:
        id: unsaturated_fatty_acid_route_boundary
        label: Unsaturated fatty acid route boundary
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu01040 membership does not include the FabA/FabB
          unsaturated-acyl-ACP branch captured in the fatty_acid_biosynthesis
          module, nor does it contain a desaturase-centered route. This bucket
          is therefore treated as thioesterase/acyl-pool side context rather
          than a satisfiable UFA biosynthetic module.
        annotons: []
    - order: 2
      role: Lipid ester and acyl-ACP hydrolase side node
      node:
        id: tesA_lipid_ester_acyl_acp_hydrolase
        label: TesA lipid ester and acyl-ACP hydrolase side node
        module_type: REACTION
        description: >-
          TesA is a predicted SGNH/GDSL hydrolase with fatty acyl-ACP
          hydrolase and lysophospholipase/lipase context. It may affect acyl
          pools but does not synthesize unsaturated acyl-ACP.
        annotons:
          - id: tesA_fatty_acyl_acp_hydrolase
            label: "tesA: fatty acyl-[ACP] hydrolase/lipase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tesA
            function:
              preferred_term: fatty acyl-[ACP] hydrolase activity
              term:
                id: GO:0016297
                label: fatty acyl-[ACP] hydrolase activity
            role_description: SGNH/GDSL lipid ester/thioester hydrolase side node.
    - order: 3
      role: Acyl-CoA thioesterase side nodes
      node:
        id: acyl_coa_thioesterase_side_nodes
        label: Acyl-CoA thioesterase side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          TesB and PP_5331 hydrolyze fatty acyl-CoA thioesters and belong to
          HotDog/C-M-P thioesterase families. These reactions regulate or
          recycle acyl-CoA pools rather than forming unsaturated fatty acids.
        annotons:
          - id: tesB_fatty_acyl_coa_hydrolase
            label: "tesB: fatty acyl-CoA hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tesB
            function:
              preferred_term: fatty acyl-CoA hydrolase activity
              term:
                id: GO:0047617
                label: fatty acyl-CoA hydrolase activity
            processes:
              - preferred_term: acyl-CoA metabolic process
                term:
                  id: GO:0006637
                  label: acyl-CoA metabolic process
            role_description: Cytosolic acyl-CoA thioesterase side node.
          - id: PP_5331_long_chain_fatty_acyl_coa_hydrolase
            label: "PP_5331: long-chain fatty acyl-CoA hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_5331
            function:
              preferred_term: long-chain fatty acyl-CoA hydrolase activity
              term:
                id: GO:0052816
                label: long-chain fatty acyl-CoA hydrolase activity
            processes:
              - preferred_term: acyl-CoA metabolic process
                term:
                  id: GO:0006637
                  label: acyl-CoA metabolic process
            role_description: Predicted HotDog long-chain acyl-CoA thioester hydrolase side node.
  notes: >-
    This module should be read alongside fatty_acid_biosynthesis, where the
    FabA/FabB unsaturated-fatty-acid branch is already modeled. ppu01040 is a
    KEGG side-node bucket for thioesterases and should not drive new
    unsaturated fatty acid biosynthetic process annotations for tesA, tesB, or
    PP_5331.
