id: MODULE:protein_phosphorylation_boundary
title: Protein phosphorylation and dephosphorylation boundary
description: Boundary module for protein phosphorylation-state side context encountered during PSEPK pathway
  partitioning. It currently records Etp, a low-molecular-weight protein tyrosine phosphatase pulled out
  of the KEGG ppu02020 two-component-system umbrella as a non-His-Asp protein-dephosphorylation side node.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table classifies etp as a protein-phosphatase spillover rather than a two-component
    relay member.
- source_id: file:PSEPK/etp/etp-ai-review.yaml
  title: Curated etp review
  statement: The etp review accepts protein tyrosine phosphatase activity and adds protein dephosphorylation
    as the matching process.
notes: This is a boundary/side-context module, not a complete bacterial phosphorylation network.
