id: MODULE:purine_metabolism
title: Purine metabolism
description: >-
  A bacterial purine-metabolism module covering de novo IMP formation, branch
  synthesis of AMP and GMP, purine-base and nucleoside salvage, purine
  catabolism, and nucleotide-housekeeping reactions that maintain purine
  nucleotide pools. In Pseudomonas putida KT2440, KEGG ppu00230 is broader than
  a single linear pathway: it also includes ribonucleotide reduction,
  alarmone metabolism, cyclic-nucleotide turnover, sulfate-adenylylation side
  chemistry, urease and carbamate side nodes, sugar-nucleotide mutases, and
  other enzymes whose primary modules may be elsewhere. Those are tracked as
  boundary context unless gene-level evidence supports a direct purine role.
status: DRAFT
evidence:
  - source_id: GO:0006164
    title: purine nucleotide biosynthetic process
    statement: >-
      The module is grounded in formation of purine nucleotides, with de novo
      IMP biosynthesis and AMP/GMP branches treated as the strict biosynthetic
      core.
  - source_id: GO:0032261
    title: purine nucleotide salvage
    statement: >-
      Salvage reactions recycle purine bases and nucleosides into nucleotide
      pools and are represented separately from de novo biosynthesis.
  - source_id: GO:0006145
    title: purine nucleobase catabolic process
    statement: >-
      PSEPK ppu00230 includes a xanthine/allantoin-side purine catabolism
      cluster that should be reviewed as a connected but distinct route.
  - source_id: KEGG:ppu00230
    title: Purine metabolism - Pseudomonas putida KT2440
    statement: >-
      The KEGG PSEPK bucket provides the first-pass candidate set, but combines
      strict purine biosynthesis, salvage, catabolism, alarmone metabolism, and
      broad nucleotide side chemistry.
module:
  id: purine_metabolism
  label: Purine metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: purine nucleotide biosynthetic process
      term:
        id: GO:0006164
        label: purine nucleotide biosynthetic process
      description: Biosynthesis of purine nucleotides.
    - preferred_term: de novo IMP biosynthetic process
      term:
        id: GO:0006189
        label: '''de novo'' IMP biosynthetic process'
      description: Formation of IMP from PRPP without purine-base salvage.
    - preferred_term: purine nucleotide salvage
      term:
        id: GO:0032261
        label: purine nucleotide salvage
      description: Recycling of purine bases and nucleosides to nucleotides.
    - preferred_term: purine nucleobase catabolic process
      term:
        id: GO:0006145
        label: purine nucleobase catabolic process
      description: Breakdown of purine nucleobases and related intermediates.
  parts:
    - order: 1
      role: de novo IMP biosynthesis
      node:
        id: de_novo_imp_biosynthesis
        label: De novo IMP biosynthesis
        module_type: METABOLIC_PATHWAY
        description: >-
          PRPP is converted through phosphoribosylamine, GAR, FGAM, AIR, CAIR,
          SAICAR, AICAR, and FAICAR to IMP. Several folate-dependent steps are
          shared with the one-carbon module, while PurF is assigned to the
          alanine/aspartate/glutamate bucket by the current partition and must
          be reviewed as a gap-fill candidate for this route.
        concepts:
          - preferred_term: de novo IMP biosynthetic process
            term:
              id: GO:0006189
              label: '''de novo'' IMP biosynthetic process'
        annotons:
          - id: purF_amidophosphoribosyltransferase_candidate
            label: PurF amidophosphoribosyltransferase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purF
                term:
                  id: UniProtKB:Q88LD5
                  label: Amidophosphoribosyltransferase
            function:
              preferred_term: amidophosphoribosyltransferase activity
              term:
                id: GO:0004044
                label: amidophosphoribosyltransferase activity
              evidence:
                - source_id: EC:2.4.2.14
                  statement: glutamine phosphoribosylpyrophosphate amidotransferase
            role_description: First committed de novo purine biosynthesis step; primary bucket is ppu00250.
          - id: purD_gar_synthetase
            label: PurD GAR synthetase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purD
                term:
                  id: UniProtKB:Q88DK2
                  label: Phosphoribosylamine--glycine ligase
            function:
              preferred_term: phosphoribosylamine-glycine ligase activity
              term:
                id: GO:0004637
                label: phosphoribosylamine-glycine ligase activity
              evidence:
                - source_id: EC:6.3.4.13
                  statement: glycinamide ribonucleotide synthetase
            role_description: Adds glycine to phosphoribosylamine to form GAR.
          - id: purT_formate_gar_transformylase
            label: PurT formate-dependent GAR transformylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purT
                term:
                  id: UniProtKB:Q88MW1
                  label: Formate-dependent phosphoribosylglycinamide formyltransferase
            function:
              preferred_term: phosphoribosylglycinamide formyltransferase activity
              term:
                id: GO:0004644
                label: phosphoribosylglycinamide formyltransferase activity
              evidence:
                - source_id: EC:6.3.1.21
                  statement: formate-dependent GAR transformylase
            role_description: Alternative or additional GAR transformylation route to PurN.
          - id: purN_folate_gar_transformylase
            label: PurN folate-dependent GAR transformylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purN
                term:
                  id: UniProtKB:Q88MB0
                  label: Phosphoribosylglycinamide formyltransferase
            function:
              preferred_term: phosphoribosylglycinamide formyltransferase activity
              term:
                id: GO:0004644
                label: phosphoribosylglycinamide formyltransferase activity
            role_description: Folate-dependent GAR transformylation; also represented in the one-carbon-by-folate module.
          - id: purM_air_synthetase
            label: PurM AIR synthetase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK purM
                term:
