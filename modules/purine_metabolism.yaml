      node:
        id: purine_nucleobase_catabolism
        label: Purine nucleobase catabolism
        module_type: METABOLIC_PATHWAY
        description: >-
          Adenine and guanine deamination, xanthine oxidation, and downstream
          allantoin/ureidoglycolate reactions form the purine-catabolism side
          of the KEGG bucket. PaoABC is included by KEGG and should be checked
          carefully because its UniProt naming emphasizes aromatic aldehyde
          dehydrogenase rather than a dedicated xanthine dehydrogenase role.
        concepts:
          - preferred_term: purine nucleobase catabolic process
            term:
              id: GO:0006145
              label: purine nucleobase catabolic process
        annotons:
          - id: pp0591_adenine_deaminase
            label: PP_0591 adenine deaminase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_0591
                term:
                  id: UniProtKB:Q88QA3
                  label: Adenine deaminase
            function:
              preferred_term: adenine deaminase activity
              term:
                id: GO:0000034
                label: adenine deaminase activity
            role_description: Deaminates adenine during purine-base catabolism.
          - id: guaD_guanine_deaminase
            label: GuaD guanine deaminase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK guaD
                term:
                  id: UniProtKB:Q88F18
                  label: Guanine deaminase
            function:
              preferred_term: guanine deaminase activity
              term:
                id: GO:0008892
                label: guanine deaminase activity
            role_description: Converts guanine to xanthine.
          - id: xdhA_xanthine_dehydrogenase_subunit
            label: XdhA xanthine dehydrogenase subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK xdhA
                term:
                  id: UniProtKB:Q88F21
                  label: Xanthine dehydrogenase subunit XdhA
            function:
              preferred_term: xanthine dehydrogenase activity
              term:
                id: GO:0004854
                label: xanthine dehydrogenase activity
            role_description: Subunit of the xanthine dehydrogenase system in purine catabolism.
          - id: xdhB_xanthine_dehydrogenase_subunit
            label: XdhB xanthine dehydrogenase subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK xdhB
                term:
                  id: UniProtKB:Q88F20
                  label: Xanthine dehydrogenase subunit XdhB
            function:
              preferred_term: xanthine dehydrogenase activity
              term:
