    - order: 3
      role: purine salvage and nucleoside/base recycling
      node:
        id: purine_salvage
        label: Purine salvage
        module_type: METABOLIC_PATHWAY
        description: >-
          Phosphoribosyltransferases, nucleoside phosphorylases, and AMP
          nucleosidases recycle purine bases and nucleosides. Gene-level review
          should keep adenine, hypoxanthine/guanine, and xanthine specificity
          distinct instead of collapsing the route to generic nucleotide
          salvage.
        concepts:
          - preferred_term: purine nucleotide salvage
            term:
              id: GO:0032261
              label: purine nucleotide salvage
          - preferred_term: purine ribonucleoside salvage
            term:
              id: GO:0006166
              label: purine ribonucleoside salvage
        annotons:
          - id: apt_adenine_phosphoribosyltransferase
            label: Apt adenine phosphoribosyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK apt
                term:
                  id: UniProtKB:Q88F33
                  label: Adenine phosphoribosyltransferase
            function:
              preferred_term: adenine phosphoribosyltransferase activity
              term:
                id: GO:0003999
                label: adenine phosphoribosyltransferase activity
            role_description: Salvages adenine to AMP.
          - id: pp0747_hgprt_candidate
            label: PP_0747 hypoxanthine-guanine phosphoribosyltransferase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_0747
                term:
