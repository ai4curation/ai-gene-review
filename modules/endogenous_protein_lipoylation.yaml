  notes: >-
    The module is deliberately limited to the conserved two-step LipB/LipA
    endogenous route. Lipoate-dependent enzyme complexes are clients of the
    installed cofactor rather than pathway enzymes. Exogenous lipoate salvage
    and taxon-specific GcvH relay pathways should be modeled as separate
    variants when curated with their own family-level evidence.
