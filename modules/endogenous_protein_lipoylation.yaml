id: MODULE:endogenous_protein_lipoylation
title: Endogenous protein lipoylation
description: >-
  Endogenous protein lipoylation builds a lipoyl cofactor directly on conserved
  lysine residues in lipoyl domains. All characterized routes transfer an
  octanoyl group from octanoyl-acyl carrier protein to a protein carrier and
  use a radical-SAM lipoate synthase to insert sulfur atoms at C6 and C8. The
  topology varies by lineage: some organisms modify client lipoyl domains
  directly, whereas others use GcvH as an obligatory relay carrier and an
  amidotransferase to deliver the modified acyl group to client proteins. This
  module models the direct bacterial route, the characterized Bacillus relay,
  and the characterized human mitochondrial relay as alternatives. Exogenous
  lipoate salvage by ATP-dependent lipoate-protein ligases and the downstream
  lipoate-dependent enzyme complexes are outside the boundary.
status: DRAFT
evidence:
  - source_id: GO:0009249
    title: protein lipoylation
    statement: >-
      The module represents the endogenous reactions that covalently install a
      lipoyl cofactor on protein lipoyl domains.
  - source_id: file:modules/endogenous_protein_lipoylation-deep-research-openscientist.md
    title: OpenScientist review of endogenous protein lipoylation
    statement: >-
      The review supports a conserved octanoyl-transfer and sulfur-insertion
      chemistry with direct and GcvH-relay topological variants.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__endogenous_protein_lipoylation__ppu00785-deep-research-openscientist.md
    title: OpenScientist review of endogenous protein lipoylation in Pseudomonas putida KT2440
    statement: >-
      The taxon review supports LipB Q88DM4 and LipA Q88DM5 as the complete
      direct route in KT2440 and flags PP_0423 as an uncertain LipM/LipL-family
      candidate outside the KEGG pathway bucket.
module:
  id: endogenous_protein_lipoylation
  label: Endogenous protein lipoylation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: protein lipoylation
      term:
        id: GO:0009249
        label: protein lipoylation
      description: >-
        Covalent installation of a lipoyl cofactor on a lipoyl-domain lysine by
        an endogenous octanoyl-ACP-dependent route.
  variant_sets:
    - id: lipoylation_topologies
      label: Endogenous protein-lipoylation topologies
      axis: route topology and lineage
      selection: ONE_OR_MORE
      notes: >-
        The variants preserve the same chemistry but differ in whether the
        octanoyl or lipoyl group is relayed through GcvH before reaching client
        E2 lipoyl domains. More than one route may coexist in a genome.
      variants:
        - id: direct_lipb_lipa_route
          label: Direct LipB-LipA route
          module_type: METABOLIC_PATHWAY
          description: >-
            LipB transfers octanoyl from octanoyl-ACP directly to a client
            lipoyl domain, and LipA inserts both sulfur atoms on that
            protein-bound intermediate. This is the characterized route in
            Escherichia coli and the route satisfied by Pseudomonas putida
            KT2440 LipB and LipA.
          parts:
            - order: 1
              role: direct octanoyl transfer from acyl carrier protein to a client lipoyl domain
              node:
                id: direct_lipb_octanoyl_transfer
                label: Direct octanoylation of a client lipoyl domain
                module_type: REACTION
                annotons:
                  - id: direct_lipb_activity
                    label: LipB-family octanoyltransferase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: LipB family octanoyltransferases
                        term:
                          id: PANTHER:PTHR10993
                          label: LipB family octanoyltransferases
                        representative_members:
                          - preferred_term: LipB (Pseudomonas putida KT2440)
                            term:
                              id: UniProtKB:Q88DM4
                              label: Octanoyltransferase
                          - preferred_term: LipB (Escherichia coli K-12)
                            term:
                              id: UniProtKB:P60720
                              label: Octanoyltransferase
                    function:
                      preferred_term: lipoyl(octanoyl) transferase activity
                      term:
                        id: GO:0033819
                        label: lipoyl(octanoyl) transferase activity
                      substrates:
                        - preferred_term: octanoyl-[acyl-carrier protein]
                        - preferred_term: apo client lipoyl-domain protein
                      products:
                        - preferred_term: acyl-carrier protein
                        - preferred_term: octanoylated client lipoyl-domain protein
                      evidence:
                        - source_id: RHEA:17665
                          title: octanoyl-ACP to protein octanoyl transfer
                          statement: >-
                            Rhea 17665 defines transfer of octanoyl from
                            octanoyl-ACP to a protein lysine.
                        - source_id: file:PSEPK/lipB/lipB-ai-review.yaml
                          statement: >-
                            The PSEPK lipB review identifies GO:0033819 as the
                            core molecular function of Q88DM4.
                    role_description: >-
                      Produces the protein-bound octanoyl intermediate used by
                      LipA.
            - order: 2
              role: sulfur insertion into the directly octanoylated client lipoyl domain
              node:
                id: direct_lipa_sulfur_insertion
                label: Sulfur insertion on the client lipoyl domain
                module_type: REACTION
                annotons:
                  - id: direct_lipa_activity
                    label: LipA-family lipoate synthase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: LipA family lipoate synthases
                        term:
                          id: PANTHER:PTHR10949
                          label: LIPOYL SYNTHASE
                        representative_members:
                          - preferred_term: LipA (Pseudomonas putida KT2440)
                            term:
                              id: UniProtKB:Q88DM5
                              label: Lipoyl synthase
                          - preferred_term: LipA (Escherichia coli K-12)
                            term:
                              id: UniProtKB:P60716
                              label: Lipoyl synthase
                    function:
                      preferred_term: lipoate synthase activity
                      term:
                        id: GO:0016992
                        label: lipoate synthase activity
                      substrates:
                        - preferred_term: octanoylated client lipoyl-domain protein
                        - preferred_term: S-adenosyl-L-methionine
                      products:
                        - preferred_term: lipoylated client protein
                        - preferred_term: 5'-deoxyadenosine
                        - preferred_term: L-methionine
                      evidence:
                        - source_id: RHEA:16585
                          title: lipoate synthase reaction
                          statement: >-
                            Rhea 16585 defines radical-SAM sulfur insertion into
                            a protein-bound octanoyl group.
                        - source_id: file:PSEPK/lipA/lipA-ai-review.yaml
                          statement: >-
                            The PSEPK lipA review identifies GO:0016992 as the
                            core molecular function of Q88DM5.
                    role_description: >-
                      Completes lipoyl-cofactor formation on the client protein.
          connections:
            - source: direct_lipb_octanoyl_transfer
              target: direct_lipa_sulfur_insertion
              connection_type: PROVIDES_INPUT_FOR
              chaining_status: VERIFIED
              chaining_note: >-
                The octanoylated client protein produced by LipB is the
                macromolecular substrate of LipA.
              description: >-
                Direct LipB octanoylation precedes LipA sulfur insertion.

        - id: bacillus_gcvh_octanoyl_relay_route
          label: Bacillus GcvH octanoyl-relay route
          module_type: METABOLIC_PATHWAY
          description: >-
            In the characterized Bacillus subtilis route, LipM octanoylates
            GcvH, LipL transfers octanoyl from GcvH to client E2 lipoyl
            domains, and LipA inserts sulfur on the client-bound intermediate.
            This variant is not a generic claim about the order in every
            GcvH-relay lineage.
          parts:
            - order: 1
              role: octanoyl transfer from acyl carrier protein to GcvH
              node:
                id: bacillus_lipm_gcvh_octanoylation
                label: LipM-dependent GcvH octanoylation
                module_type: REACTION
                annotons:
                  - id: bacillus_lipm_activity
                    label: LipM octanoyltransferase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Octanoyltransferase LipM family
                        term:
                          id: InterPro:IPR024898
                          label: Octanoyltransferase LipM
                        representative_members:
                          - preferred_term: LipM (Bacillus subtilis 168)
                            term:
                              id: UniProtKB:P54511
                              label: Octanoyltransferase LipM
                    function:
                      preferred_term: GcvH-directed lipoyl(octanoyl) transferase activity
                      term:
                        id: GO:0033819
                        label: lipoyl(octanoyl) transferase activity
                      substrates:
                        - preferred_term: octanoyl-[acyl-carrier protein]
                        - preferred_term: apo-GcvH
                      products:
                        - preferred_term: acyl-carrier protein
                        - preferred_term: octanoyl-GcvH
                      evidence:
                        - source_id: RHEA:17665
                          title: octanoyl-ACP to protein octanoyl transfer
                          statement: >-
                            Rhea 17665 captures the LipM octanoyl-ACP donor and
                            protein-lysine acceptor chemistry.
                    role_description: >-
                      Loads the octanoyl group onto the obligatory GcvH relay
                      carrier.
            - order: 2
              role: transfer of octanoyl from GcvH to client E2 lipoyl domains
              node:
                id: bacillus_lipl_octanoyl_relay
                label: LipL-dependent octanoyl relay to E2
                module_type: REACTION
                annotons:
                  - id: bacillus_lipl_activity
                    label: LipL octanoyl-GcvH amidotransferase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Octanoyltransferase LipL family
                        term:
                          id: InterPro:IPR024897
                          label: Octanoyltransferase LipL
                        representative_members:
                          - preferred_term: LipL (Bacillus subtilis 168)
                            term:
                              id: UniProtKB:P39648
                              label: Octanoyltransferase LipL
                    function:
                      preferred_term: octanoyl-GcvH:protein amidotransferase activity
                      description: >-
                        Transfers octanoyl from the lipoyl lysine of GcvH to a
                        client E2 lipoyl-domain lysine. GO lacks a precise term,
                        so the broad acyltransferase parent is paired with the
                        exact Rhea reaction.
                      term:
                        id: GO:0016746
                        label: acyltransferase activity
                      substrates:
                        - preferred_term: octanoyl-GcvH
                        - preferred_term: apo E2 lipoyl-domain protein
                      products:
                        - preferred_term: apo-GcvH
                        - preferred_term: octanoylated E2 lipoyl-domain protein
                      evidence:
                        - source_id: RHEA:20213
                          title: octanoyl-GcvH to protein amidotransfer
                          statement: >-
                            Rhea 20213 captures transfer of octanoyl from GcvH
                            to a client protein lysine.
                    role_description: >-
                      Relays the octanoyl group from GcvH to the client E2
                      lipoyl domain.
            - order: 3
              role: sulfur insertion into octanoylated client E2 lipoyl domains
              node:
                id: bacillus_lipa_sulfur_insertion
                label: LipA sulfur insertion on client E2
                module_type: REACTION
                annotons:
                  - id: bacillus_lipa_activity
                    label: Bacillus LipA lipoate synthase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: LipA family lipoate synthases
                        term:
                          id: PANTHER:PTHR10949
                          label: LIPOYL SYNTHASE
                        representative_members:
                          - preferred_term: LipA (Bacillus subtilis 168)
                            term:
                              id: UniProtKB:O32129
                              label: Lipoyl synthase
                    function:
                      preferred_term: lipoate synthase activity
                      term:
                        id: GO:0016992
                        label: lipoate synthase activity
                      substrates:
                        - preferred_term: octanoylated E2 lipoyl-domain protein
                        - preferred_term: S-adenosyl-L-methionine
                      products:
                        - preferred_term: lipoylated E2 protein
                        - preferred_term: 5'-deoxyadenosine
                        - preferred_term: L-methionine
                      evidence:
                        - source_id: RHEA:16585
                          title: lipoate synthase reaction
                          statement: >-
                            Rhea 16585 captures LipA sulfur insertion into a
                            protein-bound octanoyl group.
                    role_description: >-
                      Converts the relayed octanoyl group on the client E2
                      protein to mature lipoyllysine.
          connections:
            - source: bacillus_lipm_gcvh_octanoylation
              target: bacillus_lipl_octanoyl_relay
              connection_type: PROVIDES_INPUT_FOR
              chaining_status: VERIFIED
              chaining_note: >-
                LipM-produced octanoyl-GcvH is the donor substrate for LipL.
              description: >-
                GcvH carries octanoyl from LipM to LipL.
            - source: bacillus_lipl_octanoyl_relay
              target: bacillus_lipa_sulfur_insertion
              connection_type: PROVIDES_INPUT_FOR
              chaining_status: VERIFIED
              chaining_note: >-
                In the characterized Bacillus subtilis route, LipL produces
                octanoylated E2 substrate for LipA.
              description: >-
                LipL transfer to E2 precedes LipA sulfur insertion.

        - id: human_gcvh_lipoyl_relay_route
          label: Human mitochondrial GCSH lipoyl-relay route
          module_type: METABOLIC_PATHWAY
          description: >-
            In human mitochondria, LIPT2 transfers octanoyl from mitochondrial
            acyl carrier protein to GCSH, LIAS inserts sulfur on GCSH-bound
            octanoyl, and LIPT1 transfers the mature lipoyl group from GCSH to
            client E2 lipoyl domains.
          parts:
            - order: 1
              role: octanoyl transfer from mitochondrial acyl carrier protein to GCSH
              node:
                id: human_lipt2_gcsh_octanoylation
                label: LIPT2-dependent GCSH octanoylation
                module_type: REACTION
                annotons:
                  - id: human_lipt2_activity
                    label: LIPT2 octanoyltransferase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: LipB family octanoyltransferases
                        term:
                          id: PANTHER:PTHR10993
                          label: LipB family octanoyltransferases
                        representative_members:
                          - preferred_term: LIPT2 (human)
                            term:
                              id: UniProtKB:A6NK58
                              label: Octanoyltransferase, mitochondrial
                    function:
                      preferred_term: GCSH-directed lipoyl(octanoyl) transferase activity
                      term:
                        id: GO:0033819
                        label: lipoyl(octanoyl) transferase activity
                      substrates:
                        - preferred_term: octanoyl-[mitochondrial acyl-carrier protein]
                        - preferred_term: apo-GCSH
                      products:
                        - preferred_term: mitochondrial acyl-carrier protein
                        - preferred_term: octanoyl-GCSH
                      evidence:
                        - source_id: RHEA:17665
                          title: octanoyl-ACP to protein octanoyl transfer
                          statement: >-
                            Rhea 17665 captures the LIPT2 octanoyl-ACP donor and
                            GCSH lysine acceptor chemistry.
                    role_description: >-
                      Loads octanoyl onto the mitochondrial GCSH relay carrier.
            - order: 2
              role: sulfur insertion into GCSH-bound octanoyl
              node:
                id: human_lias_gcsh_sulfur_insertion
                label: LIAS sulfur insertion on GCSH
                module_type: REACTION
                annotons:
                  - id: human_lias_activity
                    label: LIAS lipoate synthase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: LipA family lipoate synthases
                        term:
                          id: PANTHER:PTHR10949
                          label: LIPOYL SYNTHASE
                        representative_members:
                          - preferred_term: LIAS (human)
                            term:
                              id: UniProtKB:O43766
                              label: Protein lipoyl synthase, mitochondrial
                    function:
                      preferred_term: lipoate synthase activity
                      term:
                        id: GO:0016992
                        label: lipoate synthase activity
                      substrates:
                        - preferred_term: octanoyl-GCSH
                        - preferred_term: S-adenosyl-L-methionine
                      products:
                        - preferred_term: lipoyl-GCSH
                        - preferred_term: 5'-deoxyadenosine
                        - preferred_term: L-methionine
                      evidence:
                        - source_id: RHEA:16585
                          title: lipoate synthase reaction
                          statement: >-
                            Rhea 16585 captures LIAS sulfur insertion into the
                            GCSH-bound octanoyl group.
                    role_description: >-
                      Builds mature lipoyllysine on the GCSH relay carrier.
            - order: 3
              role: transfer of mature lipoyl from GCSH to client E2 lipoyl domains
              node:
                id: human_lipt1_lipoyl_relay
                label: LIPT1-dependent lipoyl relay to E2
                module_type: REACTION
                annotons:
                  - id: human_lipt1_activity
                    label: LIPT1 lipoyl-GCSH amidotransferase
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: Lipoate-protein ligase family
                        term:
                          id: PANTHER:PTHR12561
                          label: LIPOATE-PROTEIN LIGASE
                        representative_members:
                          - preferred_term: LIPT1 (human)
                            term:
                              id: UniProtKB:Q9Y234
                              label: Lipoyltransferase 1, mitochondrial
                    function:
                      preferred_term: lipoyl-GCSH:protein amidotransferase activity
                      description: >-
                        Transfers mature lipoyl from GCSH to a client E2
                        lipoyl-domain lysine. GO lacks a precise term for this
                        physiological relay reaction, so the broad
                        acyltransferase parent is paired with the exact Rhea
                        reaction.
                      term:
                        id: GO:0016746
                        label: acyltransferase activity
                      substrates:
                        - preferred_term: lipoyl-GCSH
                        - preferred_term: apo E2 lipoyl-domain protein
                      products:
                        - preferred_term: apo-GCSH
                        - preferred_term: lipoylated E2 protein
                      evidence:
                        - source_id: RHEA:16413
                          title: lipoyl-GCSH to protein amidotransfer
                          statement: >-
                            Rhea 16413 captures transfer of lipoyl from GCSH to
                            a client protein lysine.
                    role_description: >-
                      Delivers mature lipoyl from GCSH to the mitochondrial
                      2-oxoacid dehydrogenase E2 subunits.
          connections:
            - source: human_lipt2_gcsh_octanoylation
              target: human_lias_gcsh_sulfur_insertion
              connection_type: PROVIDES_INPUT_FOR
              chaining_status: VERIFIED
              chaining_note: >-
                LIPT2-produced octanoyl-GCSH is the macromolecular substrate of
                LIAS.
              description: >-
                GCSH-bound octanoyl is sulfurated before transfer to E2.
            - source: human_lias_gcsh_sulfur_insertion
              target: human_lipt1_lipoyl_relay
              connection_type: PROVIDES_INPUT_FOR
              chaining_status: VERIFIED
              chaining_note: >-
                LIAS-produced lipoyl-GCSH is the physiological donor substrate
                for LIPT1.
              description: >-
                Mature lipoyl is relayed from GCSH to client E2 proteins.
  knowledge_gaps:
    - gap_statement: >-
        Some archaea split sulfur insertion between LipS1 and LipS2 paralogs,
        but this first-pass module does not yet model that route.
      boundary: >-
        Add an archaeal variant only after the two enzyme families, their exact
        reaction order, and representative proteins are grounded independently.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        The timing of sulfur insertion relative to amidotransfer is not uniform
        across all reported GcvH-relay lineages.
      boundary: >-
        Treat the Bacillus and human variants as separately characterized
        implementations rather than generalizing either order to every relay
        lineage.
      gap_kind:
        - BIOLOGY
  notes: >-
    Pseudomonas putida KT2440 satisfies the direct LipB-LipA variant with Q88DM4
    and Q88DM5. Its predicted PP_0423 LipM/LipL-family protein is being reviewed
    as an uncertain possible relay component; a family assignment alone does
    not establish that KT2440 realizes either characterized relay variant.
