id: MODULE:endogenous_protein_lipoylation
title: Endogenous protein lipoylation
description: >-
  Endogenous protein lipoylation is a two-reaction pathway that installs a
  lipoyl cofactor on conserved lysine residues in lipoyl domains. A LipB-family
  octanoyltransferase first transfers an octanoyl group from octanoyl-acyl
  carrier protein to the target protein. LipA-family lipoate synthase then uses
  radical-SAM chemistry and iron-sulfur clusters to insert sulfur atoms at C6
  and C8 of the protein-bound octanoyl group. The resulting lipoyl domains act
  as swinging arms in alpha-ketoacid dehydrogenase complexes and the glycine
  cleavage system. Exogenous-lipoate salvage by lipoate--protein ligases and
  alternative GcvH-relay architectures are outside this module boundary.
status: DRAFT
evidence:
  - source_id: GO:0009249
    title: protein lipoylation
    statement: >-
      The module represents the endogenous two-step route that covalently
      installs lipoate on protein lipoyl domains.
  - source_id: file:PSEPK/lipB/lipB-uniprot.txt
    title: UniProtKB entry for PSEPK LipB
    statement: >-
      Q88DM4 transfers octanoyl groups from octanoyl-ACP to lipoyl-domain
      lysine residues.
  - source_id: file:PSEPK/lipA/lipA-uniprot.txt
    title: UniProtKB entry for PSEPK LipA
    statement: >-
      Q88DM5 inserts two sulfur atoms into the protein-bound octanoyl group.
