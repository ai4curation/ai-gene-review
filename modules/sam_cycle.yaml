id: MODULE:sam_cycle
title: S-adenosylmethionine (SAM) cycle — SAM synthesis / transmethylation / SAH hydrolysis (MAT1A/GNMT/AHCY); hypermethioninemias
description: >-
  The S-adenosylmethionine (SAM) arm of the methionine cycle generates and recycles the
  universal biological methyl donor. Methionine adenosyltransferase (liver MAT1A;
  extrahepatic MAT2A) condenses L-methionine with ATP to form S-adenosyl-L-methionine
  (SAM). SAM then donates its methyl group in the many transmethylation reactions of
  SAM-dependent methyltransferases — of which glycine N-methyltransferase (GNMT), the
  abundant hepatic enzyme methylating glycine to sarcosine, is the major regulator of the
  SAM:SAH ratio (cellular methylation capacity) — each producing S-adenosyl-L-homocysteine
  (SAH). Adenosylhomocysteinase (AHCY, SAH hydrolase) then hydrolyses SAH to L-homocysteine
  + adenosine, relieving the potent SAH product-inhibition of methyltransferases.
  Homocysteine is then either remethylated back to methionine (methionine synthase MTR /
  betaine-homocysteine methyltransferase), closing the cycle, or committed to
  transsulfuration (CBS) toward cysteine — reactions curated in the homocysteine-metabolism
  module. Inherited defects of the three SAM-arm enzymes all cause hypermethioninemia:
  MAT1A (MAT I/III deficiency, usually benign, severe forms with CNS demyelination), GNMT
  (GNMT deficiency, mild hepatopathy), and AHCY (S-adenosylhomocysteine hydrolase / SAHH
  deficiency, with elevated SAH/SAM, myopathy, developmental delay and liver disease).
status: DRAFT
evidence:
  - source_id: GO:0033353
    title: L-methionine cycle
    statement: >-
      The module is grounded in the GO L-methionine cycle (GO:0033353): SAM synthesis,
      transmethylation to SAH, and SAH hydrolysis to homocysteine.
  - source_id: file:modules/methionine_cycle.yaml
    title: Methionine (SAM) cycle module (abstract, taxon-neutral)
    statement: >-
      This is the concrete, human-gene-grounded SAM-arm complement to the taxon-neutral
      abstract methionine_cycle module (which additionally encodes the SBO/ChEBI regulatory
      layer, e.g. SAM's opposite regulation of MAT-I vs MAT-III); homocysteine fate
      (remethylation/transsulfuration) is in the homocysteine_metabolism module.
  - source_id: file:human/MAT1A/MAT1A-ai-review.yaml
    title: MAT1A gene review (human)
    statement: >-
      The SAM-synthesis step (UniProtKB:Q00266, GO:0004478) matches the completed human
      MAT1A review.
  - source_id: file:human/GNMT/GNMT-ai-review.yaml
    title: GNMT gene review (human)
    statement: >-
      The SAM-consuming transmethylation / SAM:SAH-regulating step (UniProtKB:Q14749,
      GO:0017174) matches the completed human GNMT review.
  - source_id: file:human/AHCY/AHCY-ai-review.yaml
    title: AHCY gene review (human)
    statement: >-
      The SAH-hydrolysis step (UniProtKB:P23526, GO:0004013) matches the completed human
      AHCY review.
module:
  id: sam_cycle
  label: S-adenosylmethionine (SAM) cycle (SAM arm)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-methionine cycle
      term:
        id: GO:0033353
        label: L-methionine cycle
      description: >-
        SAM synthesis from methionine, its use in transmethylation (-> SAH), and SAH
        hydrolysis to homocysteine.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The SAM-cycle enzymes are cytosolic.
  parts:
    - order: 1
      role: SAM synthesis
      node:
        id: mat_step
        label: L-methionine + ATP to S-adenosyl-L-methionine + Pi + PPi
        module_type: REACTION
        annotons:
          - id: mat_activity
            label: "MAT1A/MAT2A: methionine adenosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Methionine adenosyltransferase family (MAT1A/MAT2A)
                term:
                  id: PANTHER:PTHR11964
                  label: S-ADENOSYLMETHIONINE SYNTHETASE
                representative_members:
                  - preferred_term: MAT1A (human, liver isoform)
                    term:
                      id: UniProtKB:Q00266
                      label: S-adenosylmethionine synthase isoform type-1
            function:
              preferred_term: methionine adenosyltransferase activity
              term:
                id: GO:0004478
                label: methionine adenosyltransferase activity
              substrates:
                - preferred_term: L-methionine
                - preferred_term: ATP
              products:
                - preferred_term: S-adenosyl-L-methionine (SAM)
                - preferred_term: phosphate + diphosphate
              evidence:
                - source_id: EC:2.5.1.6
                  statement: methionine adenosyltransferase; makes the universal methyl donor SAM; MAT1A liver (MAT-I/MAT-III), MAT2A extrahepatic
                - source_id: Reactome:R-HSA-174391
                  statement: "MAT1A multimers transfer Ado from ATP to L-Met (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Synthesises SAM, the universal methyl donor and committed entry to the cycle.
              MAT1A (liver MAT-I/MAT-III) deficiency -> hypermethioninemia; MAT2A is the
              extrahepatic isoform. (SAM oppositely regulates MAT-I vs MAT-III — see the
              abstract methionine_cycle module's regulatory layer.)
    - order: 2
      role: transmethylation (SAM -> SAH; SAM:SAH-ratio regulation)
      node:
        id: gnmt_step
        label: S-adenosyl-L-methionine + glycine to S-adenosyl-L-homocysteine + sarcosine
        module_type: REACTION
        annotons:
          - id: gnmt_activity
            label: "GNMT: glycine N-methyltransferase (regulatory SAM-consumer)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycine N-methyltransferase family (GNMT)
                term:
                  id: PANTHER:PTHR16458
                  label: GLYCINE N-METHYLTRANSFERASE
                representative_members:
                  - preferred_term: GNMT (human)
                    term:
                      id: UniProtKB:Q14749
                      label: Glycine N-methyltransferase
            function:
              preferred_term: glycine N-methyltransferase activity
              term:
                id: GO:0017174
                label: glycine N-methyltransferase activity
              substrates:
                - preferred_term: S-adenosyl-L-methionine (SAM)
                - preferred_term: glycine
              products:
                - preferred_term: S-adenosyl-L-homocysteine (SAH)
                - preferred_term: sarcosine (N-methylglycine)
              evidence:
                - source_id: EC:2.1.1.20
                  statement: glycine N-methyltransferase; abundant hepatic SAM-consumer regulating the SAM:SAH ratio; 5-methyl-THF-inhibited
                - source_id: Reactome:R-HSA-6798317
                  statement: "GNMT tetramer transfers methyl group from AdoMet to Gly to form AdoHyc (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Representative and regulatory SAM-dependent methyltransferase: methylates
              glycine to sarcosine, disposing of excess SAM to buffer the SAM:SAH ratio
              (cellular methylation capacity). All SAM-dependent methyltransferases feed SAH
              to the next step. GNMT deficiency -> hypermethioninemia.
    - order: 3
      role: SAH hydrolysis (relieves methyltransferase inhibition)
      node:
        id: ahcy_step
        label: S-adenosyl-L-homocysteine + H2O to L-homocysteine + adenosine
        module_type: REACTION
        annotons:
          - id: ahcy_activity
            label: "AHCY: adenosylhomocysteinase (SAH hydrolase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenosylhomocysteinase family (AHCY)
                term:
                  id: PANTHER:PTHR23420
                  label: ADENOSYLHOMOCYSTEINASE
                representative_members:
                  - preferred_term: AHCY (human)
                    term:
                      id: UniProtKB:P23526
                      label: Adenosylhomocysteinase
            function:
              preferred_term: adenosylhomocysteinase activity
              term:
                id: GO:0004013
                label: adenosylhomocysteinase activity
              substrates:
                - preferred_term: S-adenosyl-L-homocysteine (SAH)
                - preferred_term: water
              products:
                - preferred_term: L-homocysteine
                - preferred_term: adenosine
              evidence:
                - source_id: EC:3.13.2.1
                  statement: adenosylhomocysteinase (SAH hydrolase); NAD+-dependent homotetramer; relieves SAH inhibition of methyltransferases
                - source_id: Reactome:R-HSA-174401
                  statement: "AHCY:NAD+ tetramer hydrolyses AdoHcy (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Hydrolyses SAH to homocysteine + adenosine, clearing the SAH generated by every
              methyltransferase (SAH is a potent product-inhibitor). Its product homocysteine
              re-enters remethylation (MTR) or transsulfuration (CBS). SAHH deficiency ->
              hypermethioninemia with elevated SAH/SAM.
  connections:
    - source: mat_step
      target: gnmt_step
      connection_type: PROVIDES_INPUT_FOR
      description: SAM from MAT is the methyl donor consumed by GNMT (and other methyltransferases).
    - source: gnmt_step
      target: ahcy_step
      connection_type: PROVIDES_INPUT_FOR
      description: The SAH produced by transmethylation is hydrolysed by AHCY.
  notes: >-
    The SAM arm of the methionine cycle grounded to the human enzymes MAT1A (UniProtKB:Q00266,
    GO:0004478, EC 2.5.1.6), GNMT (Q14749, GO:0017174, EC 2.1.1.20) and AHCY (P23526,
    GO:0004013, EC 3.13.2.1). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome cache. The MAT node
    uses a PANTHER family selector (PTHR11964) generic over MAT1A (liver) and MAT2A (extrahepatic);
    GNMT and AHCY use their own family selectors. GNMT is the representative transmethylation step,
    but SAM is used by hundreds of SAM-dependent methyltransferases (DNA/protein/small-molecule),
    all producing SAH that AHCY must clear; GNMT's special role is regulatory (buffering the
    SAM:SAH ratio, inhibited by 5-methyl-THF). This module is the concrete, human-gene-grounded
    SAM-arm complement to the pre-existing taxon-neutral abstract methionine_cycle module (which
    encodes the SBO/ChEBI regulatory wiring, e.g. SAM competitively inhibiting MAT-I but
    allosterically activating MAT-III); the fate of the homocysteine produced here — remethylation
    to methionine (MTR/BHMT, closing the cycle) or transsulfuration to cysteine (CBS) — is curated
    in the homocysteine_metabolism module (CTH/MTHFR/MTR/MTRR/MMACHC + CBS). Disorders: all three
    enzymes cause hypermethioninemia — MAT1A (MAT I/III deficiency), GNMT (GNMT deficiency), AHCY
    (SAHH deficiency).
