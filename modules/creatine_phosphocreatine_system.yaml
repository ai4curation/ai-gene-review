id: MODULE:creatine_phosphocreatine_system
title: Creatine-phosphocreatine system (human)
description: >-
  A navigational grouping for the biology that Reactome bundles as "Creatine
  metabolism" (R-HSA-71288), assembled here as an explicit biological *system*
  rather than as a single GO metabolic process. The grouping is deliberately not
  called "creatine metabolism": GO keys metabolism on the chemical entity, and
  this system spans more than one entity. It comprises (1) de novo synthesis of
  the creatine molecule (creatine biosynthetic process, GO:0006601; the AGAT/GATM
  -> GAMT pathway), (2) the creatine kinase energy-buffer that interconverts
  creatine and phosphocreatine (phosphocreatine metabolic process, GO:0006603;
  including phosphocreatine biosynthesis GO:0046314 and the thermogenic futile
  creatine cycle GO:0140651), (3) inter-organ and cellular distribution of
  creatine by the SLC6A8 transporter, and (4) non-enzymatic disposal of creatine
  and phosphocreatine to creatinine for excretion (creatinine metabolic process,
  GO:0046449). In strict GO terms (2) is phosphocreatine metabolism, not creatine
  metabolism, so the canonical GO umbrella creatine metabolic process (GO:0006600)
  covers only (1) and the creatinine-forming arm of (4). This node carries both
  GO:0006600 and GO:0006603 to make that cross-branch span explicit. The detailed,
  protein-grounded logic lives in the dedicated modules referenced by each part;
  this document holds no annotons of its own and exists only to relate them.
status: DRAFT
evidence:
  - source_id: Reactome:R-HSA-71288
    title: Creatine metabolism
    statement: >-
      Reactome groups creatine biosynthesis and the creatine kinase reactions
      under a single "Creatine metabolism" event; this system node mirrors that
      scope while keeping the GO branches distinct.
    url: https://reactome.org/content/detail/R-HSA-71288
  - source_id: GO:0006600
    title: creatine metabolic process
    statement: >-
      GO umbrella for metabolism of the creatine molecule (biosynthesis plus the
      creatinine-forming catabolic arm); its only biosynthetic child is GO:0006601.
  - source_id: GO:0006603
    title: phosphocreatine metabolic process
    statement: >-
      The creatine kinase energy-buffer limb is, in GO, phosphocreatine
      metabolism rather than creatine metabolism; included here to make the
      cross-branch span of the system explicit.
  - source_id: Reactome:R-HSA-200396
    title: Creatine transport across the plasma membrane
    statement: >-
      Reactome reaction grounding the (not-yet-modelled) SLC6A8 transport part of
      the system.
    url: https://reactome.org/content/detail/R-HSA-200396
  - source_id: Reactome:R-HSA-71287
    title: "phosphocreatine => creatinine + orthophosphate"
    statement: >-
      Reactome reaction grounding the (not-yet-modelled) creatinine-disposal part
      of the system (catabolic arm).
    url: https://reactome.org/content/detail/R-HSA-71287
module:
  id: creatine_phosphocreatine_system
  label: Creatine-phosphocreatine system
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: creatine metabolic process
      term:
        id: GO:0006600
        label: creatine metabolic process
      description: Metabolism of the creatine molecule (synthesis + creatinine-forming catabolism).
    - preferred_term: phosphocreatine metabolic process
      term:
        id: GO:0006603
        label: phosphocreatine metabolic process
      description: Metabolism of the phosphocreatine energy buffer (the creatine kinase limb).
  parts:
    - order: 1
      role: synthesis of creatine
      node:
        id: biosynthesis_part
        label: Creatine biosynthesis (see MODULE:creatine_biosynthesis)
        module_type: METABOLIC_PATHWAY
        description: >-
          Two-step AGAT/GATM -> GAMT synthesis of creatine from L-arginine and
          glycine. Detailed, protein-grounded logic is in
          MODULE:creatine_biosynthesis; this part is a pointer only.
        concepts:
          - preferred_term: creatine biosynthetic process
            term:
              id: GO:0006601
              label: creatine biosynthetic process
    - order: 2
      role: distribution of creatine
      node:
        id: transport_part
        label: Creatine transport (SLC6A8; not yet modelled)
        module_type: TRANSPORT_STEP
        description: >-
          Na+/Cl--dependent import of blood-borne creatine into target tissues by
          the SLC6A8 creatine transporter, distributing creatine from synthesizing
          organs (liver) to consuming tissues (muscle, brain). No dedicated module
          exists yet; included for completeness of the system.
        concepts:
          - preferred_term: creatine transmembrane transport
            term:
              id: GO:0015881
              label: creatine transmembrane transport
    - order: 3
      role: energy buffering via phosphocreatine
      node:
        id: shuttle_part
        label: Phosphocreatine shuttle / creatine kinase system (see MODULE:phosphocreatine_shuttle)
        module_type: METABOLIC_PATHWAY
        description: >-
          Reversible creatine kinase interconversion of creatine and
          phosphocreatine across mitochondrial and cytosolic compartments, used to
          buffer and shuttle ATP. Detailed, protein-grounded logic is in
          MODULE:phosphocreatine_shuttle; this part is a pointer only.
        concepts:
          - preferred_term: phosphocreatine biosynthetic process
            term:
              id: GO:0046314
              label: phosphocreatine biosynthetic process
          - preferred_term: futile creatine cycle
            term:
              id: GO:0140651
              label: futile creatine cycle
    - order: 4
      role: disposal to creatinine
      node:
        id: creatinine_part
        label: Creatinine formation and disposal (not yet modelled)
        module_type: METABOLIC_PATHWAY
        description: >-
          Non-enzymatic cyclization of creatine and phosphocreatine to creatinine,
          which is excreted renally. This is the catabolic arm of creatine
          metabolism (GO:0046449). No dedicated module exists yet; included for
          completeness of the system.
        concepts:
          - preferred_term: creatinine metabolic process
            term:
              id: GO:0046449
              label: creatinine metabolic process
  connections:
    - source: biosynthesis_part
      target: transport_part
      connection_type: PROVIDES_INPUT_FOR
      description: Synthesized creatine is distributed to consuming tissues by SLC6A8.
    - source: transport_part
      target: shuttle_part
      connection_type: PROVIDES_INPUT_FOR
      description: Imported creatine is the substrate of the creatine kinase energy buffer.
    - source: biosynthesis_part
      target: shuttle_part
      connection_type: PROVIDES_INPUT_FOR
      description: Locally synthesized creatine also feeds the kinase system directly.
    - source: shuttle_part
      target: creatinine_part
      connection_type: PROVIDES_INPUT_FOR
      description: Creatine and phosphocreatine spontaneously cyclize to creatinine for excretion.
  notes: >-
    Thin grouping/navigation node; holds no annotons. The protein-grounded content
    lives in MODULE:creatine_biosynthesis (GATM/GAMT) and
    MODULE:phosphocreatine_shuttle (CKMT1A/CKMT2/CKB/CKM). Named
    "creatine-phosphocreatine system" rather than "creatine metabolism" because the
    creatine kinase limb is phosphocreatine metabolism (GO:0006603) in GO, so the
    system spans two GO metabolism branches plus transport and creatinine disposal.
    The transport (SLC6A8) and creatinine-disposal parts are placeholders with GO
    concept groundings but no dedicated modules yet.
