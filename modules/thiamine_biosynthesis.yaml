id: MODULE:thiamine_biosynthesis
title: Thiamine biosynthesis
description: >-
  A bacterial thiamine diphosphate biosynthesis module covering formation of
  the hydroxymethylpyrimidine and thiazole moieties, condensation to thiamine
  monophosphate, and phosphorylation to the active thiamine diphosphate
  cofactor. In Pseudomonas putida KT2440, KEGG ppu00730 also includes shared
  precursor, sulfur-transfer, thiamine-salvage, nucleotide, and ribosome-side
  entries; those are treated as support or boundary context rather than all
  being strict thiamine-biosynthetic enzymes.
status: DRAFT
evidence:
  - source_id: GO:0009229
    title: thiamine diphosphate biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation
      of thiamine diphosphate, the active vitamin B1 cofactor.
  - source_id: GO:0009228
    title: thiamine biosynthetic process
    statement: >-
      The broader thiamine biosynthesis term captures precursor and salvage
      steps that feed thiamine diphosphate formation.
  - source_id: KEGG:ppu00730
    title: Thiamine metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but is broader
      than strict thiamine diphosphate biosynthesis.
  - source_id: UniPathway:UPA00060
    title: Thiamine diphosphate biosynthesis
    statement: >-
      UniPathway UPA00060 cross-references the local thiamine-biosynthesis
      candidates and helps separate core thiamine diphosphate formation from
      KEGG side entries.
module:
  id: thiamine_biosynthesis
  label: Thiamine biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: thiamine diphosphate biosynthetic process
      term:
        id: GO:0009229
        label: thiamine diphosphate biosynthetic process
      description: Biosynthesis of thiamine diphosphate, the active thiamine cofactor.
    - preferred_term: thiamine biosynthetic process
      term:
        id: GO:0009228
        label: thiamine biosynthetic process
      description: Biosynthesis of thiamine and phosphorylated thiamine derivatives.
  parts:
    - order: 1
      role: DXP precursor supply
      node:
        id: dxs_dxp_supply
        label: 1-deoxy-D-xylulose 5-phosphate supply
        module_type: REACTION
        description: >-
          Dxs forms 1-deoxy-D-xylulose 5-phosphate (DXP), a shared precursor
          for the thiazole branch of thiamine biosynthesis and for the
          MEP/DOXP terpenoid-backbone pathway.
        annotons:
          - id: dxs_dxp_synthase
            label: Dxs 1-deoxy-D-xylulose-5-phosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK dxs
                term:
                  id: UniProtKB:Q88QG7
                  label: 1-deoxy-D-xylulose-5-phosphate synthase
            function:
              preferred_term: 1-deoxy-D-xylulose-5-phosphate synthase activity
              term:
                id: GO:0008661
                label: 1-deoxy-D-xylulose-5-phosphate synthase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: glyceraldehyde 3-phosphate
              products:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
              evidence:
                - source_id: EC:2.2.1.7
                  statement: 1-deoxy-D-xylulose-5-phosphate synthase
            role_description: Shared DXP supply for thiamine and MEP metabolism.
    - order: 2
      role: HMP-P formation
      node:
        id: thiC_hmp_p_formation
        label: Hydroxymethylpyrimidine phosphate formation
        module_type: REACTION
        description: >-
          ThiC is the radical SAM enzyme that rearranges AIR to form the
          hydroxymethylpyrimidine phosphate moiety of thiamine.
        annotons:
          - id: thiC_phosphomethylpyrimidine_synthase
            label: ThiC phosphomethylpyrimidine synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiC
                term:
                  id: UniProtKB:Q88DA5
                  label: Phosphomethylpyrimidine synthase
            function:
              preferred_term: phosphomethylpyrimidine synthase activity
              term:
                id: GO:0070284
                label: phosphomethylpyrimidine synthase activity
              substrates:
                - preferred_term: aminoimidazole ribotide
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine phosphate
              evidence:
                - source_id: EC:4.1.99.17
                  statement: phosphomethylpyrimidine synthase
            role_description: De novo HMP-P branch enzyme.
    - order: 3
      role: HMP phosphorylation
      node:
        id: thiD_hmp_phosphorylation
        label: Hydroxymethylpyrimidine phosphorylation
        module_type: REACTION
        description: >-
          ThiD phosphorylates hydroxymethylpyrimidine and
          hydroxymethylpyrimidine phosphate intermediates to generate the
          diphosphorylated pyrimidine substrate used by ThiE.
        annotons:
          - id: thiD_hydroxymethylpyrimidine_kinase
            label: ThiD hydroxymethylpyrimidine kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiD
                term:
                  id: UniProtKB:Q88DP2
                  label: hydroxymethylpyrimidine kinase
            function:
              preferred_term: hydroxymethylpyrimidine kinase activity
              term:
                id: GO:0008902
                label: hydroxymethylpyrimidine kinase activity
              substrates:
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine
                - preferred_term: ATP
              products:
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.49
                  statement: hydroxymethylpyrimidine kinase
            role_description: HMP salvage and pyrimidine-branch phosphorylation.
          - id: thiD_phosphomethylpyrimidine_kinase
            label: ThiD phosphomethylpyrimidine kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiD
                term:
                  id: UniProtKB:Q88DP2
                  label: hydroxymethylpyrimidine kinase
            function:
              preferred_term: phosphomethylpyrimidine kinase activity
              term:
                id: GO:0008972
                label: phosphomethylpyrimidine kinase activity
              substrates:
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine phosphate
                - preferred_term: ATP
              products:
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine diphosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.4.7
                  statement: phosphomethylpyrimidine kinase
            role_description: Generates the HMP-PP substrate for ThiE.
    - order: 4
      role: glyoxyl imine supply
      node:
        id: thiO_glyoxyl_imine_supply
        label: Glycine oxidation for thiazole synthesis
        module_type: REACTION
        description: >-
          ThiO oxidizes glycine to glyoxyl imine, supplying the nitrogen-carbon
          fragment used by the ThiG thiazole-synthase branch in this organism.
        annotons:
          - id: thiO_glycine_oxidase
            label: ThiO glycine oxidase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiO
                term:
                  id: UniProtKB:Q88Q83
                  label: Glycine oxidase
            function:
              preferred_term: glycine oxidase activity
              term:
                id: GO:0043799
                label: glycine oxidase activity
              substrates:
                - preferred_term: glycine
                - preferred_term: oxygen
                - preferred_term: water
              products:
                - preferred_term: glyoxyl imine
                - preferred_term: hydrogen peroxide
                - preferred_term: ammonium
              evidence:
                - source_id: EC:1.4.3.19
                  statement: glycine oxidase
            role_description: Supplies glyoxyl imine for thiazole formation.
    - order: 5
      role: sulfur transfer to the thiazole branch
      node:
        id: thiI_iscS_thiS_sulfur_transfer
        label: ThiS sulfur-carrier charging
        module_type: REACTION
        description: >-
          The canonical bacterial relay uses IscS-derived persulfide, ThiI,
          ThiF-mediated ThiS adenylation, and ThiS thiocarboxylation to produce
          the sulfur donor for ThiG-dependent thiazole formation. KT2440 has a
          local ThiS candidate (PP_5105) even though it is not included in KEGG
          ppu00730; a specific ThiF candidate remains unresolved in the local
          metadata.
        annotons:
          - id: thiI_thiS_sulfurtransferase
            label: ThiI sulfurtransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiI
                term:
                  id: UniProtKB:Q88CY4
                  label: tRNA sulfurtransferase
            function:
              preferred_term: tRNA-uracil-4 sulfurtransferase activity
              term:
                id: GO:0140741
                label: tRNA-uracil-4 sulfurtransferase activity
              substrates:
                - preferred_term: sulfur carrier protein ThiS
                - preferred_term: IscS persulfide
                - preferred_term: ATP
              products:
                - preferred_term: ThiS thiocarboxylate
                - preferred_term: AMP
              evidence:
                - source_id: EC:2.8.1.4
                  statement: tRNA sulfurtransferase / sulfur carrier protein ThiS sulfurtransferase
            role_description: Supplies activated sulfur carrier for thiazole synthesis.
          - id: thiS_sulfur_carrier
            label: ThiS sulfur carrier
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_5105
                term:
                  id: UniProtKB:Q88CS5
                  label: Sulfur carrier protein ThiS
            function:
              preferred_term: sulfur carrier activity
              term:
                id: GO:0097163
                label: sulfur carrier activity
              substrates:
                - preferred_term: IscS/ThiI-derived sulfur
                - preferred_term: ATP-activated ThiS
              products:
                - preferred_term: ThiS thiocarboxylate
              evidence:
                - source_id: UniProtKB:Q88CS5
                  statement: Sulfur carrier protein ThiS
            role_description: Candidate ThiS sulfur carrier for ThiG-dependent thiazole formation.
    - order: 6
      role: thiazole phosphate formation
      node:
        id: thiG_thiazole_formation
        label: Thiazole phosphate formation
        module_type: REACTION
        description: >-
          ThiG combines DXP-derived carbon, glyoxyl imine, and sulfur from
          ThiS-thiocarboxylate to form the thiazole phosphate moiety of
          thiamine.
        annotons:
          - id: thiG_thiazole_synthase
            label: ThiG thiazole synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiG
                term:
                  id: UniProtKB:Q88CS6
                  label: Thiazole synthase
            function:
              preferred_term: thiazole synthase activity
              term:
                id: GO:1990107
                label: thiazole synthase activity
              substrates:
                - preferred_term: 1-deoxy-D-xylulose 5-phosphate
                - preferred_term: glyoxyl imine
                - preferred_term: ThiS thiocarboxylate
              products:
                - preferred_term: 4-methyl-5-(2-phosphooxyethyl)-thiazole
              evidence:
                - source_id: EC:2.8.1.10
                  statement: thiazole synthase
            role_description: Forms the thiazole phosphate half of thiamine.
    - order: 7
      role: thiamine monophosphate formation
      node:
        id: thiE_tmp_formation
        label: Thiamine monophosphate formation
        module_type: REACTION
        description: >-
          ThiE condenses the diphosphorylated pyrimidine branch intermediate
          with thiazole phosphate to form thiamine monophosphate.
        annotons:
          - id: thiE_thiamine_phosphate_synthase
            label: ThiE thiamine-phosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiE
                term:
                  id: UniProtKB:Q88DP1
                  label: Thiamine-phosphate synthase
            function:
              preferred_term: thiamine-phosphate diphosphorylase activity
              term:
                id: GO:0004789
                label: thiamine-phosphate diphosphorylase activity
              substrates:
                - preferred_term: 4-methyl-5-(2-phosphooxyethyl)-thiazole
                - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine diphosphate
              products:
                - preferred_term: thiamine phosphate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.5.1.3
                  statement: thiamine-phosphate synthase
            role_description: Condensation step forming thiamine monophosphate.
    - order: 8
      role: thiamine diphosphate formation
      node:
        id: thiL_thiamine_diphosphate_formation
        label: Thiamine diphosphate formation
        module_type: REACTION
        description: >-
          ThiL phosphorylates thiamine monophosphate to form thiamine
          diphosphate, the active cofactor form.
        annotons:
          - id: thiL_thiamine_phosphate_kinase
            label: ThiL thiamine-phosphate kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thiL
                term:
                  id: UniProtKB:Q88QH4
                  label: Thiamine-monophosphate kinase
            function:
              preferred_term: thiamine-phosphate kinase activity
              term:
                id: GO:0009030
                label: thiamine-phosphate kinase activity
              substrates:
                - preferred_term: thiamine phosphate
                - preferred_term: ATP
              products:
                - preferred_term: thiamine diphosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.4.16
                  statement: thiamine-phosphate kinase
            role_description: Terminal phosphorylation to active thiamine diphosphate.
notes: >-
  The strict KT2440 thiamine module is centered on thiamine diphosphate
  biosynthesis. KEGG ppu00730 pulls in useful support enzymes and side nodes:
  `dxs` supplies DXP shared with MEP metabolism; `iscS`/`iscS-II` supply sulfur
  generally and should be curated carefully before assigning a specific
  thiamine role; `thiI` links tRNA 4-thiouridine and ThiS sulfur-carrier
  chemistry; `PP_3186` and neighboring `pet`/PP_3185 are likely thiamine-salvage
  aminopyrimidine aminohydrolases; `adk` and `rsgA` are nucleotide/ribosome
  side entries in this KEGG map, not strict thiamine-biosynthesis enzymes.
  `PP_5105` encodes sulfur carrier protein ThiS and is promoted as a missing
  accessory/gap-fill candidate even though it is absent from the KEGG ppu00730
  membership table. Falcon also flagged ThiF as an expected sulfur-relay
  component, but no unambiguous `thiF` product or symbol was found in the local
  PSEPK metadata; PP_0735/moeB is a related MoaD adenylyltransferase and should
  not be promoted to ThiF without additional evidence.
