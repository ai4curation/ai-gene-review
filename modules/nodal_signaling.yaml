knowledge_gaps:
  - gap_statement: Unresolved structural biology remains unresolved in the Nodal signaling pathway 
      module.
    boundary: Despite the recent AlphaFold3 models of the Nodal-Cripto-1-ALK4 ternary complex 
      (chu2025cripto-1actsas pages 1-2), the precise structure of the endogenous Nodal-GDF3 
      heterodimer in complex with its full receptor assembly remains experimentally unresolved. 
      Whether and how the EGF-CFC co-receptor guides Nodal processing at the cell surface has not 
      been confirmed in vivo (kholtei2025nodalsignalinga pages 4-6).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nodal_signaling-deep-research-falcon.md
  - gap_statement: SMAD2 versus SMAD3 division of labor remains unresolved in the Nodal signaling 
      pathway module.
    boundary: The developmental Nodal literature predominantly treats SMAD2 and SMAD3 as a combined 
      entity. While genetic evidence in mouse clearly demonstrates essential roles for SMAD2 (e.g., 
      in definitive endoderm formation and diapause maintenance), the specific and potentially 
      distinct contributions of SMAD3 to Nodal-driven developmental programs remain incompletely 
      resolved (kholtei2025nodalsignalinga pages 6-8, kholtei2025n...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nodal_signaling-deep-research-falcon.md
  - gap_statement: Mechanism of pluripotency-to-lineage transition remains unresolved in the Nodal 
      signaling pathway module.
    boundary: How SMAD2/3 partner-switching occurs-shifting from NANOG/OCT4 to FOXH1/EOMES-is poorly
      understood at the epigenetic and chromatin level. The molecular mechanisms underlying the 
      synergistic cooperation between Nodal/Activin signaling and other pathways (FGF, BMP) before 
      gastrulation remain poorly defined (kholtei2025nodalsignalinga pages 12-14, 
      kholtei2025nodalsignalinga pages 11-12).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nodal_signaling-deep-research-falcon.md
  - gap_statement: Cross-species comparability remains unresolved in the Nodal signaling pathway 
      module.
    boundary: There is disagreement in the literature regarding LEFTY1 expression in the human 
      anterior visceral endoderm equivalent, with some studies detecting it and others not 
      (kholtei2025nodalsignalinga pages 17-18).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nodal_signaling-deep-research-falcon.md
  - gap_statement: Nodal in cancer remains unresolved in the Nodal signaling pathway module.
    boundary: Nodal and Cripto-1 are re-expressed in many human tumors and cancer stem cells, 
      correlating with worse prognosis (arboretto2021newinsightsinto pages 2-4, 
      arboretto2021newinsightsinto pages 11-13, arboretto2021newinsightsinto pages 4-5).
    gap_kind:
