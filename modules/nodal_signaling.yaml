notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): Falcon findings are linked as evidence and family-level support. Automatically
  extracted open-question headings were intentionally not retained as knowledge_gap entries because they
  were not manually curated. Machine-generated Falcon citations remain curation support and are not manually
  adjudicated here.
