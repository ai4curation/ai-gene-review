id: MODULE:nodal_signaling
title: Nodal signaling pathway module
description: Nodal/TGF-beta family ligands use EGF-CFC co-receptors and activin-class receptors to 
  activate SMAD2/3 transcriptional programs for embryonic axis formation and cell-fate decisions.
status: DRAFT
