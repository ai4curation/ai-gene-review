id: MODULE:pyrimidine_degradation
title: Pyrimidine degradation (reductive catabolism of uracil/thymine); DPD deficiency / 5-FU toxicity
description: >-
  Pyrimidine (uracil and thymine) catabolism is the three-step reductive pathway that
  degrades the pyrimidine bases to beta-amino acids, disposing of nucleic-acid/nucleotide
  turnover products and generating beta-alanine (from uracil) and beta-aminoisobutyrate
  (from thymine). Dihydropyrimidine dehydrogenase (DPYD) catalyses the first, rate-limiting
  step, using NADPH to reduce uracil to 5,6-dihydrouracil and thymine to 5,6-dihydrothymine;
  it is a large flavoprotein (FAD, FMN, four [4Fe-4S] clusters). Dihydropyrimidinase (DPYS)
  then hydrolytically opens the ring (Zn2+-dependent), converting dihydrouracil to
  N-carbamoyl-beta-alanine (and dihydrothymine to N-carbamoyl-beta-aminoisobutyrate).
  Finally beta-ureidopropionase (UPB1) hydrolyses N-carbamoyl-beta-alanine to beta-alanine
  + CO2 + ammonia (and the isobutyrate analogue to beta-aminoisobutyrate). Because DPYD is
  also the main catabolic enzyme for the fluoropyrimidine chemotherapeutics, this pathway is
  clinically pivotal: DPD deficiency (DPYD) causes severe/fatal 5-fluorouracil toxicity and
  DPYD genotyping guides fluoropyrimidine dosing; DPYS and UPB1 deficiencies (dihydropyrimidinuria
  and N-carbamyl-beta-amino aciduria) carry a similar theoretical fluoropyrimidine-toxicity risk
  and variable neurodevelopmental phenotypes.
status: DRAFT
evidence:
  - source_id: GO:0006208
    title: pyrimidine nucleobase catabolic process
    statement: >-
      The module is grounded in the GO pyrimidine nucleobase catabolic process
      (GO:0006208): reductive degradation of uracil/thymine to beta-amino acids.
  - source_id: Reactome:R-HSA-73621
    title: Pyrimidine catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome pyrimidine
      catabolism reactions R-HSA-73585 (DPYD, uracil), R-HSA-73589 (DPYS) and
      R-HSA-73591 (UPB1), with the thymine-branch analogues R-HSA-73616/73618.
  - source_id: file:human/DPYD/DPYD-ai-review.yaml
    title: DPYD gene review (human)
    statement: >-
      The rate-limiting reductive step (UniProtKB:Q12882, GO:0017113) matches the
      completed human DPYD review.
  - source_id: file:human/DPYS/DPYS-ai-review.yaml
    title: DPYS gene review (human)
    statement: >-
      The ring-opening step (UniProtKB:Q14117, GO:0004157) matches the completed
      human DPYS review.
  - source_id: file:human/UPB1/UPB1-ai-review.yaml
    title: UPB1 gene review (human)
    statement: >-
      The final beta-ureidopropionase step (UniProtKB:Q9UBR1, GO:0003837) matches the
      completed human UPB1 review.
module:
  id: pyrimidine_degradation
  label: Pyrimidine degradation (uracil/thymine catabolism)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyrimidine nucleobase catabolic process
      term:
        id: GO:0006208
        label: pyrimidine nucleobase catabolic process
      description: >-
        Reductive three-step catabolism of uracil and thymine to beta-alanine and
        beta-aminoisobutyrate.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The pyrimidine-catabolic enzymes are cytosolic.
  parts:
    - order: 1
      role: rate-limiting reduction of the pyrimidine base
      node:
        id: dpyd_step
        label: uracil (or thymine) + NADPH to 5,6-dihydrouracil (or 5,6-dihydrothymine)
        module_type: REACTION
        annotons:
          - id: dpyd_activity
            label: "DPYD: dihydropyrimidine dehydrogenase (NADP+)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydropyrimidine dehydrogenase family (DPYD)
                term:
                  id: PANTHER:PTHR43073
                  label: DIHYDROPYRIMIDINE DEHYDROGENASE
                representative_members:
                  - preferred_term: DPYD (human)
                    term:
                      id: UniProtKB:Q12882
                      label: Dihydropyrimidine dehydrogenase [NADP(+)]
            function:
              preferred_term: dihydropyrimidine dehydrogenase (NADP+) activity
              term:
                id: GO:0017113
                label: dihydropyrimidine dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: uracil / thymine
                - preferred_term: NADPH
              products:
                - preferred_term: 5,6-dihydrouracil / 5,6-dihydrothymine
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.3.1.2
                  statement: dihydropyrimidine dehydrogenase (NADP+); FAD/FMN/4x[4Fe-4S]; rate-limiting; also catabolises 5-fluorouracil
                - source_id: Reactome:R-HSA-73585
                  statement: "reduction of uracil to form dihydrouracil (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-limiting first step of pyrimidine catabolism; large FAD/FMN/Fe-S
              flavoprotein. Also the main catabolic enzyme for fluoropyrimidines, so DPD
              deficiency causes severe 5-FU/capecitabine toxicity (pharmacogenetic).
    - order: 2
      role: hydrolytic ring opening
      node:
        id: dpys_step
        label: 5,6-dihydrouracil + H2O to N-carbamoyl-beta-alanine
        module_type: REACTION
        annotons:
          - id: dpys_activity
            label: "DPYS: dihydropyrimidinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydropyrimidinase / cyclic amidohydrolase family (DPYS)
                term:
                  id: PANTHER:PTHR11647
                  label: HYDANTOINASE/DIHYDROPYRIMIDINASE
                representative_members:
                  - preferred_term: DPYS (human)
                    term:
                      id: UniProtKB:Q14117
                      label: Dihydropyrimidinase
            function:
              preferred_term: dihydropyrimidinase activity
              term:
                id: GO:0004157
                label: dihydropyrimidinase activity
              substrates:
                - preferred_term: 5,6-dihydrouracil (or 5,6-dihydrothymine)
                - preferred_term: water
              products:
                - preferred_term: N-carbamoyl-beta-alanine (or N-carbamoyl-beta-aminoisobutyrate)
              evidence:
                - source_id: EC:3.5.2.2
                  statement: dihydropyrimidinase; Zn2+-dependent cyclic amidohydrolase (ring opening)
                - source_id: Reactome:R-HSA-73589
                  statement: "conversion of 5,6-dihydrouracil to 3-ureidopropionate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Zn2+-dependent hydrolytic ring-opening of the dihydropyrimidine to the
              N-carbamoyl-beta-amino acid; highly expressed in liver/kidney. Deficiency =
              dihydropyrimidinase deficiency (dihydropyrimidinuria).
    - order: 3
      role: final hydrolysis to the beta-amino acid
      node:
        id: upb1_step
        label: N-carbamoyl-beta-alanine + H2O to beta-alanine + CO2 + NH3
        module_type: REACTION
        annotons:
          - id: upb1_activity
            label: "UPB1: beta-ureidopropionase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Beta-ureidopropionase / nitrilase family (UPB1)
                term:
                  id: PANTHER:PTHR43674
                  label: BETA-UREIDOPROPIONASE
                representative_members:
                  - preferred_term: UPB1 (human)
                    term:
                      id: UniProtKB:Q9UBR1
                      label: Beta-ureidopropionase
            function:
              preferred_term: beta-ureidopropionase activity
              term:
                id: GO:0003837
                label: beta-ureidopropionase activity
              substrates:
                - preferred_term: N-carbamoyl-beta-alanine (3-ureidopropionate)
                - preferred_term: water
              products:
                - preferred_term: beta-alanine
                - preferred_term: CO2 + ammonia
              evidence:
                - source_id: EC:3.5.1.6
                  statement: beta-ureidopropionase (N-carbamoyl-beta-alanine amidohydrolase); nitrilase superfamily
                - source_id: Reactome:R-HSA-73591
                  statement: "conversion of 3-ureidopropionate to beta-alanine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Final step: hydrolyses the N-carbamoyl-beta-amino acid to beta-alanine (from
              uracil) or beta-aminoisobutyrate (from thymine) + CO2 + ammonia. Deficiency =
              beta-ureidopropionase deficiency (N-carbamyl-beta-amino aciduria).
  connections:
    - source: dpyd_step
      target: dpys_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 5,6-dihydropyrimidine from DPYD is ring-opened by DPYS.
    - source: dpys_step
      target: upb1_step
      connection_type: PROVIDES_INPUT_FOR
      description: The N-carbamoyl-beta-amino acid from DPYS is hydrolysed by UPB1.
  notes: >-
    Three-step reductive pyrimidine (uracil/thymine) catabolism grounded to the human
    enzymes DPYD (UniProtKB:Q12882, GO:0017113, EC 1.3.1.2), DPYS (Q14117, GO:0004157,
    EC 3.5.2.2) and UPB1 (Q9UBR1, GO:0003837, EC 3.5.1.6). GO molecular-function terms were
    taken from the human GOA records; Reactome reaction ids and titles were verified against
    the local reactome cache. Each step uses a PANTHER family selector (generic over orthologs)
    with the human enzyme as representative. The module is drawn for the uracil branch
    (-> beta-alanine); the parallel thymine branch (-> beta-aminoisobutyrate) uses the same three
    enzymes (Reactome R-HSA-73616 / R-HSA-73618 for the DPYD/DPYS thymine reactions). Upstream,
    the free bases come from nucleotide/nucleic-acid turnover (and dietary pyrimidines);
    downstream, beta-alanine feeds carnosine and pantothenate/CoA metabolism. Clinical
    significance: DPYD is the principal fluoropyrimidine (5-FU/capecitabine) catabolic enzyme, so
    DPD deficiency causes severe/fatal chemotherapy toxicity and DPYD is a major pharmacogenetic
    gene; DPYS and UPB1 deficiencies (dihydropyrimidinase deficiency, beta-ureidopropionase
    deficiency) present with the corresponding metabolite aciduria, variable neurodevelopmental
    features and a theoretical fluoropyrimidine-toxicity risk.
