    - source: ci_subunit_maturation
      target: ci_qmodule_intermediate
      connection_type: POSITIVELY_REGULATES
      description: >-
        NDUFAF5/NDUFAF7 arginine modifications, NUBPL Fe-S delivery and FOXRED1 redox maturation of
        the core subunits are prerequisites for productive Q-module intermediate assembly.
    - source: ci_qmodule_intermediate
      target: ci_nmodule_stabilisation
      connection_type: PROVIDES_INPUT_FOR
      description: The joined membrane+Q intermediate is capped by the N-module, whose late intermediate is stabilised by NDUFAF2/NDUFAF8.
  notes: >-
    Dedicated assembly factors of mitochondrial respiratory Complex I (NADH:ubiquinone
    oxidoreductase), grouped by assembly step and grounded to the completed human gene reviews:
    NDUFAF1 (Q9Y375, GO:0051082) and TIMMDC1 (Q9NPL8) build the membrane arm; NDUFAF3 (Q9BU61),
    NDUFAF4 (Q9P032) and NDUFAF6 (Q330K2) chaperone the Q-module intermediate; NDUFAF5 (Q5TEU4,
    GO:0016491 arginine hydroxylase of NDUFS7), NDUFAF7 (Q7L592, GO:0035243 symmetric-arginine
    methyltransferase of NDUFS2), NUBPL (Q8TB37, GO:0140663 + GO:0051539 [4Fe-4S] delivery) and
    FOXRED1 (Q96CU9, GO:0016491 + FAD) modify/metallate core subunits; NDUFAF2 (Q8N183, GO:0044877)
    and NDUFAF8 (A1L188) stabilise the late N-module. Only factors with genuine catalytic/binding
    activity carry a function (NDUFAF5/NDUFAF7 arginine-modifying enzymes; NUBPL Fe-S carrier;
    FOXRED1 FAD oxidoreductase; NDUFAF1 unfolded-protein and NDUFAF2 complex binding); the purely
    non-catalytic scaffolds (TIMMDC1, NDUFAF3, NDUFAF4, NDUFAF6, NDUFAF8) carry the assembly BP
    (GO:0032981) as a process rather than an invented MF. The related MCIA members ACAD9/ECSIT/
    TMEM126B and the core catalytic subunits are curated separately (mitochondrial_complex_i_core).
    GO term ids and labels were verified against the local go.db; the Reactome "Complex I biogenesis"
    umbrella (R-HSA-6799198) was fetched and cached. Disorders: mitochondrial complex I deficiency
    (nuclear types), the commonest inborn OXPHOS defect — Leigh syndrome, leukoencephalopathy, fatal
    infantile lactic acidosis, cardiomyopathy and encephalopathy.
