id: MODULE:hedgehog_signaling
title: Canonical Hedgehog/Smoothened signaling pathway module
description: >-
  A compact vertebrate Hedgehog signaling module. Secreted Hedgehog ligand binds
  Patched, relieving Patched-mediated inhibition of Smoothened. Activated
  Smoothened accumulates in the primary cilium and shifts GLI transcription
  factors from repressor processing toward activator output. The module is
  grounded in GO:0007224, with curated UniProt exemplars for ligand, receptor,
  transducer, inhibitor, and GLI output; PTN ancestry is recorded only for
  Smoothened and SUFU, where the local PAINT cache has matching IBD seed rows.
status: DRAFT
evidence:
  - source_id: GO:0007224
    title: smoothened signaling pathway
    statement: The module is grounded in the GO biological process term for Hedgehog/Smoothened signaling.
notes: >-
  SHH, PTCH1, and GLI1 are included as curated human exemplars, but no
  ancestral_nodes are asserted for them because their accessions did not resolve
  to matching IBD seed rows in the local interpro/panther cache.
module:
  id: hedgehog_signaling
  label: Canonical Hedgehog/Smoothened signaling pathway
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: smoothened signaling pathway
      term:
        id: GO:0007224
        label: smoothened signaling pathway
      description: Hedgehog pathway signals generated through activation of Smoothened.
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
      - preferred_term: primary cilium
        term:
          id: GO:0005929
          label: cilium
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: Hedgehog ligand reception
      node:
        id: hedgehog_ligand_reception
        label: Hedgehog binding relieves Patched inhibition
        module_type: REGULATORY_STEP
        description: >-
          Processed Hedgehog ligand binds the Patched receptor, relieving
          Patched-mediated suppression of Smoothened and licensing ciliary
          Smoothened activation.
        annotons:
          - id: hedgehog_ligand
            label: Hedgehog ligand
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Hedgehog ligand family
                representative_members:
                  - preferred_term: SHH
                    term:
                      id: UniProtKB:Q15465
                      label: Sonic hedgehog protein
            function:
              preferred_term: patched binding
              term:
                id: GO:0005113
                label: patched binding
              targets:
                - preferred_term: Patched receptor
            role_description: Secreted morphogen that initiates the pathway by binding Patched.
          - id: patched_receptor
            label: Patched receptor
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Patched receptors
                representative_members:
                  - preferred_term: PTCH1
                    term:
                      id: UniProtKB:Q13635
                      label: Protein patched homolog 1
            role_description: Twelve-pass membrane receptor that inhibits Smoothened when ligand is absent.
    - order: 2
      role: Smoothened activation
      node:
        id: smoothened_activation
        label: Smoothened ciliary signal transduction
        module_type: REGULATORY_STEP
        description: >-
          Once Patched repression is relieved, Smoothened becomes active and
          accumulates in the ciliary signaling compartment, promoting GLI
          activator formation.
        annotons:
          - id: smoothened_transducer
            label: Smoothened transducer
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Smoothened/Frizzled-family receptors
                term:
                  id: PANTHER:PTHR11309
                  label: FRIZZLED
                representative_members:
                  - preferred_term: SMO
                    term:
                      id: UniProtKB:Q99835
                      label: Protein smoothened
                ancestral_nodes:
                  - preferred_term: PAINT Smoothened signaling node PTN000885245
                    term:
                      id: PANTHER:PTN000885245
                      label: PTN000885245
                    description: >-
                      PANTHER PAINT node in PTHR11309 with IBD support for
                      smoothened signaling pathway participation (P:GO:0007224)
                      and ciliary/plasma-membrane localization terms.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN000885245 in PTHR11309.
            processes:
              - preferred_term: smoothened signaling pathway
                term:
                  id: GO:0007224
                  label: smoothened signaling pathway
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: GPCR-like transducer that carries the ligand-receptor state to the GLI regulatory module.
    - order: 3
      role: GLI transcriptional control
      node:
        id: gli_transcriptional_control
        label: SUFU/GLI transcription factor regulation
        module_type: REGULATORY_STEP
        description: >-
          In the off state, SUFU restrains GLI transcription factors and favors
          repressor processing. Smoothened activation relieves this constraint,
          allowing GLI activators to drive Hedgehog target genes.
        annotons:
          - id: sufu_inhibitor
            label: SUFU negative regulator
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Suppressor of fused family
                term:
                  id: PANTHER:PTHR10928
                  label: SUPPRESSOR OF FUSED
                representative_members:
                  - preferred_term: SUFU
                    term:
                      id: UniProtKB:Q9UMX1
                      label: Suppressor of fused homolog
                ancestral_nodes:
                  - preferred_term: PAINT SUFU negative-regulation node PTN000859153
                    term:
                      id: PANTHER:PTN000859153
                      label: PTN000859153
                    description: >-
                      PANTHER PAINT node in PTHR10928 with IBD support for
                      negative regulation of smoothened signaling pathway
                      (P:GO:0045879) and cytoplasmic/nuclear localization.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN000859153 in PTHR10928.
            role_description: Negative regulator that restrains GLI factors in the pathway-off state.
          - id: gli_output
            label: GLI transcription factor output
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GLI zinc-finger transcription factors
                representative_members:
                  - preferred_term: GLI1
                    term:
                      id: UniProtKB:P08151
                      label: Transcription activator GLI1
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Transcriptional effector converting Smoothened activity into Hedgehog target-gene expression.
  connections:
    - source: hedgehog_ligand_reception
      target: smoothened_activation
      connection_type: CAUSES
      description: Hedgehog-bound Patched no longer suppresses Smoothened.
    - source: smoothened_activation
      target: gli_transcriptional_control
      connection_type: CAUSES
      description: Activated Smoothened shifts the SUFU/GLI module toward activator output.
