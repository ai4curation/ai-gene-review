id: MODULE:stress_detoxification_spillover_boundary
title: Stress detoxification spillover boundary
description: Boundary module for Pseudomonas putida KT2440 stress/detoxification spillover genes that are real stress or damage-response
  candidates but do not form one coherent peroxide, glutathione, metal-resistance, universal-stress, or heat-shock pathway.
  This version records the ThiJ/DJ-1/PfpI split as HSP31-like glutathione-independent glyoxalase III/methylglyoxal detoxification
  context, plus the final miscellaneous stress-regulatory spillovers curated with gene-specific restraint.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_thij_dj1_pfpi_detoxification_candidates.tsv
  title: PSEPK stress/detoxification ThiJ/DJ-1/PfpI split
  statement: The batch table records PP_2491, PP_2992, and PP_3431 as ThiJ/DJ-1/PfpI stress/detoxification candidates.
- source_id: file:interpro/panther/PTHR48094/PTHR48094-metadata.yaml
  title: PANTHER PTHR48094 protein/nucleic acid deglycase family metadata
  statement: PTHR48094 is the protein/nucleic acid deglycase family; the PSEPK candidates are assigned to the HSP31-related
    glutathione-independent glyoxalase subfamily in UniProt/PANTHER metadata.
- source_id: file:PSEPK/PP_2491/PP_2491-ai-review.yaml
  title: Curated PP_2491 review
  statement: The PP_2491 review accepts cytoplasm, glyoxalase III activity, and methylglyoxal catabolic process from TreeGrafter/PANTHER
    and DJ-1/PfpI domain evidence.
- source_id: file:PSEPK/PP_2992/PP_2992-ai-review.yaml
  title: Curated PP_2992 review
  statement: The PP_2992 review accepts cytoplasm, glyoxalase III activity, and methylglyoxal catabolic process from TreeGrafter/PANTHER
    and DJ-1/PfpI domain evidence.
- source_id: file:PSEPK/PP_3431/PP_3431-ai-review.yaml
  title: Curated PP_3431 review
  statement: The PP_3431 review accepts cytoplasm, glyoxalase III activity, and methylglyoxal catabolic process from TreeGrafter/PANTHER
    and DJ-1/PfpI domain evidence.
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_stress_regulatory_or_misc_spillovers.tsv
  title: PSEPK stress/detoxification regulatory and miscellaneous spillover split
  statement: The batch table records srkA, dps, PP_3269, paaY, PP_3509, PP_3963, oxyR, and PP_5593 as the final miscellaneous
    stress/detoxification spillover split.
- source_id: file:PSEPK/srkA/srkA-ai-review.yaml
  title: Curated srkA review
  statement: The srkA review accepts ATP- and magnesium-dependent protein serine/threonine kinase activity and cytoplasmic
    localization without assigning specific physiological substrates.
- source_id: file:PSEPK/dps/dps-ai-review.yaml
  title: Curated dps review
  statement: The dps review accepts Dps-family ferroxidase and ferric-iron-binding evidence, adds DNA binding, and marks the
    broader oxidoreductase parent as over-annotated.
- source_id: file:PSEPK/paaY/paaY-ai-review.yaml
  title: Curated paaY review
  statement: The paaY review proposes acyl-CoA hydrolase activity and phenylacetate catabolic process as conservative PaaY-family
    thioesterase annotations.
- source_id: file:PSEPK/PP_3509/PP_3509-ai-review.yaml
  title: Curated PP_3509 review
  statement: The PP_3509 review accepts response to antibiotic and proposes response to bleomycin for the bleomycin-resistance-family
    protein while leaving molecular function unresolved.
- source_id: file:PSEPK/oxyR/oxyR-ai-review.yaml
  title: Curated oxyR review
  statement: The oxyR review accepts LysR-family DNA-binding transcription factor activity, regulation of transcription, and
    a NEW cellular response to oxidative stress row supported by the OxyR peroxide-defense regulon evidence.
- source_id: file:PSEPK/PP_3269/PP_3269-ai-review.yaml
  title: Curated PP_3269 review
  statement: The PP_3269 review records a low-information KGG-repeat stress-induced protein with no proposed GO function.
- source_id: file:PSEPK/PP_3963/PP_3963-ai-review.yaml
  title: Curated PP_3963 review
  statement: The PP_3963 review records a low-information KGG-repeat stress-induced protein with no proposed GO function.
- source_id: file:PSEPK/PP_5593/PP_5593-ai-review.yaml
  title: Curated PP_5593 review
  statement: The PP_5593 review records a low-information KGG-repeat stress-induced protein with no proposed GO function.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_stress_resistance_membrane_spillovers.tsv
  title: PSEPK transport stress-resistance membrane spillover batch
  statement: The transport partition routes 20 paraquat-inducible, fusaric-acid-resistance, TerB, holin/immunity, phage, Cid,
    and toxin-domain membrane proteins to the existing stress/detoxification spillover boundary.
