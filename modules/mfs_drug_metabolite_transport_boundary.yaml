id: MODULE:mfs_drug_metabolite_transport_boundary
title: MFS drug and metabolite transport boundary
description: Boundary module for the PSEPK transport/membrane/efflux split containing MFS drug, aromatic-acid, organic-acid,
  sugar, cyanate, compatible-solute, and low-resolution metabolite transporter candidates. The module keeps substrate claims
  conservative unless product, family, or prior curated evidence is specific.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_mfs_drug_metabolite_transporters.tsv
  title: PSEPK transport/membrane/efflux MFS drug/metabolite transporter batch
  statement: The partition groups 80 MFS-family drug, metabolite, aromatic-acid, sugar, cyanate, compatible-solute, and generic
    transporter candidates for first-pass curation.
notes: 'First-pass interpretation: named substrate labels are retained at substrate-class level where supported. Generic MFS
  paralogs are not assigned a specific substrate, direction, or coupling ion without product/family support.'
