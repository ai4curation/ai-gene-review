id: MODULE:aminoacyl_trna_quality_control_boundary
title: Aminoacyl-tRNA quality-control boundary
description: Boundary module for PSEPK translation/RNA-processing genes that are not canonical aminoacyl-tRNA synthetases
  but touch aminoacyl-tRNA editing, tRNA modification, or aminoacyl-tRNA-derived protein quality-control chemistry. Low-information
  GAD/T6SS Tdi1_C and short-fragment entries are retained as unresolved side nodes instead of forced GatCAB or synthetase
  calls.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_aminoacyl_trna_charging_editing_quality_control.tsv
  title: PSEPK translation/RNA aminoacyl-tRNA charging/editing split
  statement: The batch records YbaK/Dtd/YcfH deacylases, Aat L/F-transferase, Glu-Q-RS, and several low-information GAD/T6SS
    or short-fragment side nodes.
- source_id: file:PSEPK/PP_0201/PP_0201-ai-review.yaml
  title: Curated PP_0201 review
  statement: PP_0201 encodes a predicted YbaK/aminoacyl-tRNA synthetase-associated domain protein in Pseudomonas putida KT2440.
    The current first-pass support is domain and IEA evidence for aminoacyl-tRNA deacylase activity, so it is best treated
    as a candidate aminoacyl-tRNA editing factor rather than a fully characterized enzyme.
- source_id: file:PSEPK/PP_0782/PP_0782-ai-review.yaml
  title: Curated PP_0782 review
  statement: PP_0782 encodes a predicted GAD-related/T6SS Tdi1 C-terminal domain protein in Pseudomonas putida KT2440. Although
    the current UniProt protein-language-model name says glutamyl-tRNA amidotransferase, the record lacks GOA, Rhea, HAMAP,
    or subunit-context support for a GatCAB-like aminoacyl-tRNA role.
- source_id: file:PSEPK/PP_0784/PP_0784-ai-review.yaml
  title: Curated PP_0784 review
  statement: PP_0784 encodes a predicted GAD-related/T6SS Tdi1 C-terminal domain protein in Pseudomonas putida KT2440. It
    currently lacks GOA support and should be kept as an unresolved side node rather than a curated glutamyl-tRNA amidotransferase
    claim.
- source_id: file:PSEPK/ybaK/ybaK-ai-review.yaml
  title: Curated ybaK review
  statement: ybaK encodes a prolyl-tRNA editing-family YbaK/EbsC protein predicted as a Cys-tRNA(Pro)/Cys-tRNA(Cys) deacylase.
    Its supported role is aminoacyl-tRNA editing/deacylation that helps maintain translational fidelity.
- source_id: file:PSEPK/PP_1091/PP_1091-ai-review.yaml
  title: Curated PP_1091 review
  statement: PP_1091 encodes a 58 amino acid DUF8197/PA3496-like protein in Pseudomonas putida KT2440. The current protein-language-model
    name says leucyl-tRNA synthetase, but the record is far too short and lacks GOA/domain evidence for a canonical LeuRS
    function.
- source_id: file:PSEPK/ycfH/ycfH-ai-review.yaml
  title: Curated ycfH review
  statement: ycfH encodes a TatD/YcfH-like metal-dependent hydrolase annotated as tRNA D-aminoacylase in Pseudomonas putida
    KT2440. The first-pass evidence supports a candidate tRNA/aminoacyl-tRNA deacylase role more strongly than a generic TatD-family
    DNA nuclease assertion.
- source_id: file:PSEPK/aat/aat-ai-review.yaml
  title: Curated aat review
  statement: aat encodes leucyl/phenylalanyl-tRNA--protein transferase, the cytoplasmic L/F-transferase of the bacterial N-end
    rule protein-degradation pathway. It transfers Leu or Phe from aminoacyl-tRNAs to destabilizing N-terminal residues on
    proteins.
- source_id: file:PSEPK/PP_4228/PP_4228-ai-review.yaml
  title: Curated PP_4228 review
  statement: PP_4228 encodes a predicted GAD-related/T6SS Tdi1 C-terminal domain protein in Pseudomonas putida KT2440. Its
    current glutamyl-tRNA amidotransferase name is not supported by GOA rows or a recognizable GatCAB subunit assignment.
- source_id: file:PSEPK/gluQ/gluQ-ai-review.yaml
  title: Curated gluQ review
  statement: gluQ encodes glutamyl-Q tRNA(Asp) synthetase, a cytosolic class-I aminoacyl-tRNA-synthetase-like enzyme that
    activates glutamate and transfers it to the queuosine wobble-base moiety of tRNA(Asp). This is best curated as tRNA modification
    context rather than ordinary tRNA(Glu) charging for translation.
- source_id: file:PSEPK/dtd/dtd-ai-review.yaml
  title: Curated dtd review
  statement: dtd encodes the cytoplasmic D-aminoacyl-tRNA deacylase DTD. It hydrolyzes mischarged D-aminoacyl-tRNAs and glycyl-tRNA(Ala),
    recycling tRNA and supporting translational fidelity and protein L-homochirality.
- source_id: file:PSEPK/PP_5664/PP_5664-ai-review.yaml
  title: Curated PP_5664 review
  statement: PP_5664 encodes a predicted GAD-related/T6SS Tdi1 C-terminal domain protein in Pseudomonas putida KT2440. It
    has no GOA rows and should remain an unresolved side node pending direct evidence for any aminoacyl-tRNA amidotransferase
    activity.
