id: MODULE:protein_turnover_peptide_processing_boundary
title: Protein turnover peptide-processing boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 peptide-processing,
  aminopeptidase, oligopeptidase, and related soluble peptidase split from the
  protein folding/targeting/turnover functional bucket. The module records
  enzyme-level peptide-turnover activities and keeps broad proteolysis,
  hydrolase, and metal-binding annotations as context where more specific
  functions are available.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was partitioned into nine curation-scale splits; this
      module covers the peptide_processing_aminopeptidases split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_peptide_processing_aminopeptidases.tsv
    title: PSEPK peptide-processing and aminopeptidase split
    statement: >-
      The batch table assigns prlC, PP_0203, mtfA, map, apeB, PP_1748, yegQ,
      PP_2704, ydcP, PP_4752, PP_4949, pepP, and PP_5629 to this first-pass
      split.
  - source_id: file:PSEPK/map/map-ai-review.yaml
    title: Curated map review
    statement: >-
      The map review accepts initiator methionyl aminopeptidase activity as the
      core function for nascent-protein N-terminal processing and treats broad
      metalloaminopeptidase and metal-binding rows as context.
  - source_id: file:PSEPK/pepP/pepP-ai-review.yaml
    title: Curated pepP review
    statement: >-
      The pepP review records cytosolic M24B-family Xaa-Pro aminopeptidase /
      metalloaminopeptidase activity and keeps generic peptidase and manganese
      binding as non-core context.
  - source_id: file:PSEPK/PP_2704/PP_2704-ai-review.yaml
    title: Curated PP_2704 review
    statement: >-
      The PP_2704 review accepts N-acetyldiaminopimelate deacetylase activity
      while deliberately avoiding the obsolete diaminopimelate biosynthetic
      process term from UniProt as an authored core-process claim.
  - source_id: file:PSEPK/ydcP/ydcP-ai-review.yaml
    title: Curated ydcP review
    statement: >-
      The ydcP review adds only generic peptidase activity for the U32-domain
      protein because no substrate-specific activity is available.
notes: >-
  First-pass interpretation: this split is a peptide-turnover and soluble
  peptidase boundary, not a single degradation pathway. Specific aminopeptidase,
  oligopeptidase, deacetylase, dipeptidase, and metallopeptidase terms were
  retained where supported. Broad hydrolase, peptidase, metallopeptidase,
  proteolysis, and metal-binding rows are treated as context when a more
  informative molecular function exists. PP_2704 illustrates a validation
  lesson: the UniProt process row GO:0019877 is obsolete in the local ontology,
  so it was not used as an authored core process.
module:
  id: protein_turnover_peptide_processing_boundary
  label: Protein turnover peptide-processing boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: aminopeptidase activity
      term:
        id: GO:0004177
        label: aminopeptidase activity
      description: N-terminal peptide-processing activity used by M18, M42, M90, and M24-family candidates.
    - preferred_term: initiator methionyl aminopeptidase activity
      term:
        id: GO:0004239
        label: initiator methionyl aminopeptidase activity
      description: Specific nascent-protein N-terminal methionine removal by Map.
    - preferred_term: metalloaminopeptidase activity
      term:
        id: GO:0070006
        label: metalloaminopeptidase activity
      description: Metal-dependent aminopeptidase class used for PepP/Xaa-Pro aminopeptidase context.
    - preferred_term: metalloendopeptidase activity
      term:
        id: GO:0004222
        label: metalloendopeptidase activity
      description: Oligopeptidase A / M3-family peptide-turnover activity.
    - preferred_term: dipeptidase activity
