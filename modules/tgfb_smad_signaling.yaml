id: MODULE:tgfb_smad_signaling
title: TGF-beta receptor-SMAD signaling pathway module
description: >-
  A compact TGF-beta/SMAD signaling module. A dimeric TGF-beta family ligand
  binds type II and type I serine/threonine kinase receptors, the type II
  receptor activates the type I receptor, the type I receptor phosphorylates
  receptor-regulated SMADs, and SMAD complexes accumulate in the nucleus to
  regulate transcription. The module is grounded in GO:0007179. TGFB1 is
  anchored to PAINT TGF-beta-family nodes; receptors and SMADs are included as
  curated UniProt exemplars without PTN ancestry where local seed rows were not
  available.
status: DRAFT
evidence:
  - source_id: GO:0007179
    title: transforming growth factor beta receptor signaling pathway
    statement: The module is grounded in the GO biological process term for TGF-beta receptor signaling.
