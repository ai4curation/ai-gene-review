id: MODULE:riboflavin_biosynthesis
title: Riboflavin biosynthesis
description: >-
  A bacterial riboflavin, FMN, and FAD biosynthesis module covering conversion
  of GTP and ribulose 5-phosphate into riboflavin, followed by phosphorylation
  and adenylylation to the major flavin cofactors. In Pseudomonas putida KT2440,
  KEGG ppu00740 also includes FMN-dependent side chemistry and broad flavin
  metabolism entries; those are treated as boundary context unless they directly
  catalyze riboflavin, FMN, or FAD formation.
status: DRAFT
evidence:
  - source_id: GO:0009231
    title: riboflavin biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation
      of riboflavin, the precursor of FMN and FAD.
  - source_id: GO:0009398
    title: FMN biosynthetic process
    statement: >-
      Riboflavin kinase activity converts riboflavin to FMN as the first
      cofactor-conversion step after riboflavin synthesis.
  - source_id: GO:0006747
    title: FAD biosynthetic process
    statement: >-
      FMN adenylyltransferase activity converts FMN to FAD, completing the
      riboflavin-to-flavin-cofactor branch.
  - source_id: KEGG:ppu00740
    title: Riboflavin metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but is
      broader than strict riboflavin/FMN/FAD biosynthesis.
  - source_id: UniPathway:UPA00275
    title: Riboflavin biosynthesis
    statement: >-
      UniPathway UPA00275 cross-references several local riboflavin
      biosynthesis candidates and helps separate de novo riboflavin formation
      from downstream and side-map flavin reactions.
  - source_id: UniPathway:UPA00276
    title: FMN biosynthesis
    statement: >-
      UniPathway UPA00276 supports the RibF riboflavin kinase step.
  - source_id: UniPathway:UPA00277
    title: FAD biosynthesis
    statement: >-
      UniPathway UPA00277 supports the RibF FMN adenylyltransferase step.
  - source_id: file:modules/riboflavin_biosynthesis-deep-research-falcon.md
    title: Falcon generic riboflavin biosynthesis review
    statement: >-
      Generic Falcon research is used to check the expected bacterial pathway
      shape and distinguish riboflavin/FMN/FAD formation from flavin-using side
      reactions.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__riboflavin_biosynthesis__ppu00740-deep-research-falcon.md
    title: Falcon PSEPK ppu00740 riboflavin metabolism review
    statement: >-
      Species-aware Falcon research is used to evaluate the KT2440 candidate
      set and flag boundary entries in the broad KEGG riboflavin metabolism
      map.
module:
  id: riboflavin_biosynthesis
  label: Riboflavin biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: riboflavin biosynthetic process
      term:
        id: GO:0009231
        label: riboflavin biosynthetic process
      description: Biosynthesis of riboflavin, vitamin B2.
    - preferred_term: FMN biosynthetic process
      term:
        id: GO:0009398
        label: FMN biosynthetic process
      description: Biosynthesis of flavin mononucleotide from riboflavin.
    - preferred_term: FAD biosynthetic process
      term:
        id: GO:0006747
        label: FAD biosynthetic process
      description: Biosynthesis of flavin adenine dinucleotide from FMN.
  parts:
    - order: 1
      role: GTP-derived pyrimidine precursor formation
      node:
        id: gtp_to_darp
        label: GTP cyclohydrolase II step
        module_type: REACTION
        description: >-
          Monofunctional RibA GTP cyclohydrolase II converts GTP into the
          riboflavin-pathway pyrimidine precursor DARP.
        annotons:
          - id: ribA_gtp_cyclohydrolase_ii
            label: RibA GTP cyclohydrolase II
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribA
                term:
                  id: UniProtKB:Q88QH1
                  label: GTP cyclohydrolase-2
            function:
              preferred_term: GTP cyclohydrolase II activity
              term:
                id: GO:0003935
                label: GTP cyclohydrolase II activity
              substrates:
                - preferred_term: GTP
              products:
                - preferred_term: 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate
                - preferred_term: formate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:3.5.4.25
                  statement: GTP cyclohydrolase II
            role_description: Supplies the GTP-derived pyrimidine branch of riboflavin biosynthesis.
    - order: 2
      role: pyrimidine deamination and reduction
      node:
        id: ribD_pyrimidine_processing
        label: RibD deaminase and reductase steps
        module_type: REACTION
        description: >-
          RibD carries the deaminase and reductase activities that process the
          GTP-derived pyrimidine intermediate toward ribitylaminouracil.
        annotons:
          - id: ribD_deaminase
            label: RibD riboflavin-specific deaminase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribD
                term:
                  id: UniProtKB:Q88QH9
                  label: Riboflavin biosynthesis protein RibD
            function:
              preferred_term: diaminohydroxyphosphoribosylaminopyrimidine deaminase activity
              term:
                id: GO:0008835
                label: diaminohydroxyphosphoribosylaminopyrimidine deaminase activity
              evidence:
                - source_id: EC:3.5.4.26
                  statement: diaminohydroxyphosphoribosylaminopyrimidine deaminase
            role_description: Deaminates the GTP-derived riboflavin precursor.
          - id: ribD_reductase
            label: RibD riboflavin-pathway reductase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribD
                term:
                  id: UniProtKB:Q88QH9
                  label: Riboflavin biosynthesis protein RibD
            function:
              preferred_term: 5-amino-6-(5-phosphoribosylamino)uracil reductase activity
              term:
                id: GO:0008703
                label: 5-amino-6-(5-phosphoribosylamino)uracil reductase activity
              substrates:
                - preferred_term: 5-amino-6-(5-phosphoribosylamino)uracil
                - preferred_term: NADPH
              products:
                - preferred_term: 5-amino-6-(D-ribitylamino)uracil 5'-phosphate
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.1.1.193
                  statement: 5-amino-6-(5-phosphoribosylamino)uracil reductase
            role_description: Reduces the pyrimidine precursor to the ribityl form.
    - order: 3
      role: ribulose-phosphate branch
      node:
        id: ribulose_phosphate_to_dhbp
        label: DHBP synthase step
        module_type: REACTION
        description: >-
          RibB-family DHBP synthase converts D-ribulose 5-phosphate into the
          four-carbon precursor used by lumazine synthase.
        annotons:
          - id: ribB_dhbp_synthase
            label: RibB DHBP synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribB
                term:
                  id: UniProtKB:Q88QG4
                  label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            function:
              preferred_term: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              term:
                id: GO:0008686
                label: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              substrates:
                - preferred_term: D-ribulose 5-phosphate
              products:
                - preferred_term: 3,4-dihydroxy-2-butanone 4-phosphate
                - preferred_term: formate
              evidence:
                - source_id: EC:4.1.99.12
                  statement: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            role_description: Supplies the four-carbon lumazine-synthase substrate.
          - id: ribAB_i_dhbp_synthase
            label: RibAB-I DHBP synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribAB-I
                term:
                  id: UniProtKB:Q88QH7
                  label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            function:
              preferred_term: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              term:
                id: GO:0008686
                label: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              evidence:
                - source_id: EC:4.1.99.12
                  statement: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            role_description: RibBX paralog with DHBP synthase activity; its C-terminal
              RibA-like domain should not be used as GTP cyclohydrolase II evidence.
          - id: ribAB_ii_dhbp_synthase
            label: RibAB-II DHBP synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribAB-II
                term:
                  id: UniProtKB:Q88GB1
                  label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            function:
              preferred_term: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              term:
                id: GO:0008686
                label: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              evidence:
                - source_id: EC:4.1.99.12
                  statement: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            role_description: RibBX paralog with DHBP synthase activity; its C-terminal
              RibA-like domain should not be used as GTP cyclohydrolase II evidence.
    - order: 4
      role: lumazine formation
      node:
        id: lumazine_synthase_step
        label: Lumazine synthase step
        module_type: REACTION
        description: >-
          RibH condenses the ribitylaminouracil and DHBP-derived precursors to
          produce 6,7-dimethyl-8-ribityllumazine.
        annotons:
          - id: ribH_lumazine_synthase
            label: RibH lumazine synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribH
                term:
                  id: UniProtKB:Q88QH6
                  label: 6,7-dimethyl-8-ribityllumazine synthase
            function:
              preferred_term: 6,7-dimethyl-8-ribityllumazine synthase activity
              term:
                id: GO:0000906
                label: 6,7-dimethyl-8-ribityllumazine synthase activity
              substrates:
                - preferred_term: 5-amino-6-(D-ribitylamino)uracil
                - preferred_term: 3,4-dihydroxy-2-butanone 4-phosphate
              products:
                - preferred_term: 6,7-dimethyl-8-ribityllumazine
              evidence:
                - source_id: EC:2.5.1.78
                  statement: 6,7-dimethyl-8-ribityllumazine synthase
            role_description: Penultimate de novo riboflavin biosynthesis step.
    - order: 5
      role: riboflavin formation
      node:
        id: riboflavin_synthase_step
        label: Riboflavin synthase step
        module_type: REACTION
        description: >-
          Riboflavin synthase converts two lumazine molecules into riboflavin
          and regenerates the ribitylaminouracil intermediate.
        annotons:
          - id: ribE_riboflavin_synthase
            label: RibE riboflavin synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribE
                term:
                  id: UniProtKB:Q88QH8
                  label: Riboflavin synthase
            function:
              preferred_term: riboflavin synthase activity
              term:
                id: GO:0004746
                label: riboflavin synthase activity
              substrates:
                - preferred_term: 6,7-dimethyl-8-ribityllumazine
              products:
                - preferred_term: riboflavin
                - preferred_term: 5-amino-6-(D-ribitylamino)uracil
              evidence:
                - source_id: EC:2.5.1.9
                  statement: riboflavin synthase
            role_description: Final de novo riboflavin biosynthesis step.
          - id: ribC_riboflavin_synthase_candidate
            label: RibC riboflavin synthase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribC
                term:
                  id: UniProtKB:Q88IT3
                  label: Riboflavin synthase
            function:
              preferred_term: riboflavin synthase activity
              term:
                id: GO:0004746
                label: riboflavin synthase activity
              evidence:
                - source_id: EC:2.5.1.9
                  statement: riboflavin synthase
            role_description: Duplicate riboflavin synthase candidate; in vivo contribution is unresolved.
    - order: 6
      role: FMN and FAD formation
      node:
        id: riboflavin_to_fad
        label: Riboflavin phosphorylation and FMN adenylylation
        module_type: REACTION
        description: >-
          RibF converts riboflavin to FMN and then converts FMN to FAD,
          producing the major flavin cofactors from riboflavin.
        annotons:
          - id: ribF_riboflavin_kinase
            label: RibF riboflavin kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribF
                term:
                  id: UniProtKB:Q88Q93
                  label: Riboflavin biosynthesis protein
            function:
              preferred_term: riboflavin kinase activity
              term:
                id: GO:0008531
                label: riboflavin kinase activity
              substrates:
                - preferred_term: riboflavin
                - preferred_term: ATP
              products:
                - preferred_term: FMN
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.26
                  statement: riboflavin kinase
            role_description: Converts riboflavin to FMN.
          - id: ribF_fmn_adenylyltransferase
            label: RibF FMN adenylyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ribF
                term:
                  id: UniProtKB:Q88Q93
                  label: Riboflavin biosynthesis protein
            function:
              preferred_term: FMN adenylyltransferase activity
              term:
                id: GO:0003919
                label: FMN adenylyltransferase activity
              substrates:
                - preferred_term: FMN
                - preferred_term: ATP
              products:
                - preferred_term: FAD
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.7.7.2
                  statement: FMN adenylyltransferase
            role_description: Converts FMN to FAD.
  notes: >-
    The strict biosynthetic module is satisfiable through ribA/ribB/ribD/ribH/ribE
    plus ribF. Species-aware Falcon research flags ribAB-I and ribAB-II as RibBX
    paralogs: they retain DHBP synthase activity but should not be used to satisfy
    the GTP cyclohydrolase II step, which is covered by ribA only. ribC is retained
    as a duplicate riboflavin synthase candidate pending gene-level resolution.
    ssuE and msuE are FMN reductases linked to
    alkanesulfonate/sulfur metabolism and flavin redox chemistry, not de novo
    riboflavin formation. bluB uses FMN to form the cobalamin lower ligand
    5,6-dimethylbenzimidazole and should be treated as vitamin B12/cobalamin
    context rather than a riboflavin-biosynthetic step. ubiX forms prenyl-FMN
    for UbiD-family decarboxylases and is already represented as a
    ubiquinone/accessory side node, not as a riboflavin biosynthesis enzyme.
    nudF and had appear in the broad KEGG riboflavin map but are not accepted as
    strict riboflavin/FMN/FAD biosynthesis members without stronger
    pathway-specific evidence.
