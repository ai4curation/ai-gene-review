id: MODULE:riboflavin_biosynthesis
title: De novo riboflavin biosynthesis and bacterial flavin cofactor activation
description: >-
  Species-neutral bacterial pathway for making the riboflavin ring de novo from
  GTP and ribulose 5-phosphate and then converting riboflavin to the active
  flavin cofactors FMN and FAD. The ring pathway has two converging branches:
  a GTP-derived pyrimidine branch made by GTP cyclohydrolase II, the RibD
  deaminase/reductase activities, and pyrimidine-intermediate dephosphorylation,
  and a ribulose-5-phosphate branch made by 3,4-dihydroxy-2-butanone 4-phosphate
  synthase. These branches converge at lumazine synthase, followed by
  riboflavin synthase. In bacteria, riboflavin
  kinase and FMN adenylyltransferase are frequently combined in a bifunctional
  RibF/RibC-family enzyme, connecting vitamin B2 synthesis to FMN and FAD supply.
status: DRAFT
evidence:
  - source_id: GO:0009231
    title: riboflavin biosynthetic process
    statement: >-
      GO biological-process term for de novo riboflavin biosynthesis; used as
      the primary process grounding for the ring-synthesis part of the module.
  - source_id: GO:0009398
    title: FMN biosynthetic process
    statement: >-
      GO biological-process term for phosphorylation of riboflavin to FMN,
      represented here as the first flavin-cofactor activation step.
  - source_id: GO:0006747
    title: FAD biosynthetic process
    statement: >-
      GO biological-process term for adenylylation of FMN to FAD, represented
      here as the terminal flavin-cofactor activation step.
  - source_id: GO:0043726
    title: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase activity
    statement: >-
      GO molecular-function term for the required dephosphorylation between the
      RibD reductase product and the dephosphorylated RibH substrate.
  - source_id: KEGG:map00740
    title: Riboflavin metabolism
    statement: >-
      KEGG pathway context for riboflavin-ring synthesis and downstream FMN/FAD
      metabolism; species-specific map members need curator filtering because
      flavin reductases, flavin-derived cofactor enzymes, and unrelated hydrolases
      can appear in the same map.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata inventory
    statement: >-
      Local UniProt-derived inventory provides the Pseudomonas putida KT2440
      exemplar accessions and GO/EC metadata used to ground representative
      members in this module.
  - source_id: file:modules/riboflavin_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module research for riboflavin biosynthesis
    statement: >-
      Provider-generated module research supports the reusable bacterial pathway
      boundary from de novo riboflavin-ring synthesis through FMN/FAD activation
      and highlights cross-organism gene-name differences.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__riboflavin_biosynthesis__ppu00740-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00740 riboflavin satisfiability research
    statement: >-
      Provider-generated species/pathway research supports KT2440 pathway
      satisfiability, separates core rib genes from KEGG-map spillover, and
      flags ribAB-I/ribAB-II as DHBP/RibBX candidates rather than GTP
      cyclohydrolase II exemplars pending targeted gene review.
notes: >-
  The module deliberately separates riboflavin-ring synthesis from general
  flavoprotein use, FMN-dependent reductases, prenylated-FMN cofactor formation,
  and cobalamin lower-ligand biosynthesis. Those processes consume or transform
  flavins but are not required steps in de novo riboflavin formation. The
  downstream FMN/FAD activation step is included because bacterial RibF-family
  enzymes often connect riboflavin synthesis directly to active flavin-cofactor
  supply; animal-only uptake of dietary riboflavin is covered separately by
  modules/flavin_cofactor_biosynthesis.yaml. Human RFK and FLAD1 are included
  below only as cross-organism representatives of the shared activation
  activities, not as members of the bacterial de novo route. In the Pseudomonas putida KT2440
  instantiation, OpenScientist flagged ribAB-I and ribAB-II as RibBX-like DHBP
  synthase candidates with apparently degenerate C-terminal GTP-CHII-fold
  domains, so this module does not use them as GTP cyclohydrolase II
  exemplars.
module:
  id: riboflavin_biosynthesis
  label: De novo riboflavin biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: riboflavin biosynthetic process
      term:
        id: GO:0009231
        label: riboflavin biosynthetic process
      description: De novo formation of riboflavin from GTP and ribulose 5-phosphate.
    - preferred_term: FMN biosynthetic process
      term:
        id: GO:0009398
        label: FMN biosynthetic process
      description: Phosphorylation of riboflavin to flavin mononucleotide.
    - preferred_term: FAD biosynthetic process
      term:
        id: GO:0006747
        label: FAD biosynthetic process
      description: Adenylylation of FMN to flavin adenine dinucleotide.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Soluble bacterial riboflavin-biosynthesis enzymes act in the cytosol.
  parts:
    - order: 1
      role: GTP-derived pyrimidine branch
      node:
        id: gtp_pyrimidine_branch
        label: GTP-derived pyrimidine branch
        module_type: METABOLIC_PATHWAY
        description: >-
          Converts GTP through the early pyrimidine intermediates that provide
          the nitrogen-containing portion of the riboflavin ring.
        parts:
          - order: 1
            role: GTP cyclohydrolase II
            node:
              id: gtp_cyclohydrolase_ii_step
              label: GTP to 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate
              module_type: REACTION
              annotons:
                - id: gtp_cyclohydrolase_ii_activity
                  label: "RibA: GTP cyclohydrolase II"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RibA GTP cyclohydrolase II family
                      term:
                        id: PANTHER:PTHR21327
                        label: RibA/RibBA GTP cyclohydrolase II / DHBP synthase family
                      representative_members:
                        - preferred_term: ribA (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88QH1
                            label: GTP cyclohydrolase-2
                  function:
                    preferred_term: GTP cyclohydrolase II activity
                    term:
                      id: GO:0003935
                      label: GTP cyclohydrolase II activity
                    substrates:
                      - preferred_term: GTP
                    products:
                      - preferred_term: 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate
                    evidence:
                      - source_id: EC:3.5.4.25
                        statement: GTP cyclohydrolase II.
                  role_description: >-
                    Initiates the riboflavin pyrimidine branch by opening the
                    imidazole ring of GTP.
                  notes: >-
                    Some bacterial lineages use bifunctional RibA/RibBA proteins
                    for this activity and DHBP synthase. The P. putida KT2440
                    ribAB-I/ribAB-II candidates are not listed here because
                    module+pathway research flagged them as likely RibBX-like
                    DHBP synthases with degenerate GTP-CHII-fold domains; their
                    final symbols and EC scope should be checked in targeted
                    gene reviews.
          - order: 2
            role: RibD deamination
            node:
              id: ribd_deaminase_step
              label: Pyrimidine deamination
              module_type: REACTION
              annotons:
                - id: ribd_deaminase_activity
                  label: "RibD: diaminohydroxyphosphoribosylaminopyrimidine deaminase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RibD riboflavin biosynthesis protein family
                      term:
                        id: PANTHER:PTHR38011
                        label: RibD riboflavin biosynthesis protein family
                      representative_members:
                        - preferred_term: ribD (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88QH9
                            label: Riboflavin biosynthesis protein RibD
                  function:
                    preferred_term: diaminohydroxyphosphoribosylaminopyrimidine deaminase activity
                    term:
                      id: GO:0008835
                      label: diaminohydroxyphosphoribosylaminopyrimidine deaminase activity
                    evidence:
                      - source_id: EC:3.5.4.26
                        statement: Riboflavin-specific deaminase.
                  role_description: Removes the exocyclic amino group from the GTP-derived pyrimidine intermediate.
          - order: 3
            role: RibD reduction
            node:
              id: ribd_reductase_step
              label: Pyrimidine side-chain reduction
              module_type: REACTION
              annotons:
                - id: ribd_reductase_activity
                  label: "RibD: 5-amino-6-(5-phosphoribosylamino)uracil reductase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RibD riboflavin biosynthesis protein family
                      term:
                        id: PANTHER:PTHR38011
                        label: RibD riboflavin biosynthesis protein family
                      representative_members:
                        - preferred_term: ribD (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88QH9
                            label: Riboflavin biosynthesis protein RibD
                  function:
                    preferred_term: 5-amino-6-(5-phosphoribosylamino)uracil reductase activity
                    term:
                      id: GO:0008703
                      label: 5-amino-6-(5-phosphoribosylamino)uracil reductase activity
                    substrates:
                      - preferred_term: 5-amino-6-(5-phospho-D-ribosylamino)uracil
                      - preferred_term: NADPH
                    products:
                      - preferred_term: 5-amino-6-(5-phospho-D-ribitylamino)uracil
                      - preferred_term: NADP(+)
                    evidence:
                      - source_id: EC:1.1.1.193
                        statement: HTP reductase.
                  role_description: Reduces the ribosylamino side chain before lumazine assembly.
          - order: 4
            role: pyrimidine-intermediate dephosphorylation
            node:
              id: phosphoribitylaminouracil_phosphatase_step
              label: Pyrimidine-intermediate dephosphorylation
              module_type: REACTION
              description: >-
                Removes the phosphate from the RibD reductase product before
                condensation by lumazine synthase.
              annotons:
                - id: phosphoribitylaminouracil_phosphatase_activity
                  label: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase
                  participant:
                    selector_type: ANY_WITH_FUNCTION
                    required_function:
                      preferred_term: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase activity
                      term:
                        id: GO:0043726
                        label: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase activity
                    description: >-
                      The required activity is defined, but the enzyme that
                      supplies it in Pseudomonas putida KT2440 is unassigned.
                  function:
                    preferred_term: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase activity
                    term:
                      id: GO:0043726
                      label: 5-amino-6-(5-phosphoribitylamino)uracil phosphatase activity
                    substrates:
                      - preferred_term: 5-amino-6-(5-phospho-D-ribitylamino)uracil
                      - preferred_term: water
                    products:
                      - preferred_term: 5-amino-6-(D-ribitylamino)uracil
                      - preferred_term: phosphate
                    evidence:
                      - source_id: GO:0043726
                        statement: >-
                          GO defines the phosphatase reaction connecting the
                          phosphorylated RibD product to the RibH substrate.
                  role_description: Supplies the dephosphorylated pyrimidine substrate used by RibH.
              knowledge_gaps:
                - gap_statement: >-
                    The protein responsible for GO:0043726 activity in
                    Pseudomonas putida KT2440 has not been assigned.
                  boundary: >-
                    The reaction is chemically required and has a specific GO
                    molecular-function term; the unresolved point is the KT2440
                    gene product that performs it.
                  gap_kind:
                    - BIOLOGY
                    - CURATION
                  resolution: >-
                    Screen candidate soluble phosphatases genetically and
                    biochemically for conversion of the RibD product to the RibH
                    substrate.
    - order: 2
      role: Ribulose-5-phosphate donor branch
      node:
        id: dhbp_branch
        label: 3,4-dihydroxy-2-butanone 4-phosphate formation
        module_type: REACTION
        description: >-
          Generates the four-carbon donor, 3,4-dihydroxy-2-butanone 4-phosphate,
          from ribulose 5-phosphate for condensation with the RibD product.
        annotons:
          - id: dhbp_synthase_activity
            label: "RibB/RibBA: 3,4-dihydroxy-2-butanone 4-phosphate synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RibB/RibBA DHBP synthase family
                term:
                  id: PANTHER:PTHR21327
                  label: RibA/RibBA GTP cyclohydrolase II / DHBP synthase family
                representative_members:
                  - preferred_term: ribB (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QG4
                      label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
                  - preferred_term: ribAB-I (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QH7
                      label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
                  - preferred_term: ribAB-II (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88GB1
                      label: 3,4-dihydroxy-2-butanone 4-phosphate synthase
            function:
              preferred_term: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              term:
                id: GO:0008686
                label: 3,4-dihydroxy-2-butanone-4-phosphate synthase activity
              substrates:
                - preferred_term: D-ribulose 5-phosphate
              products:
                - preferred_term: 3,4-dihydroxy-2-butanone 4-phosphate
                - preferred_term: formate
              cofactors:
                - preferred_term: divalent metal ion
              evidence:
                - source_id: EC:4.1.99.12
                  statement: 3,4-dihydroxy-2-butanone 4-phosphate synthase.
            role_description: Supplies the four-carbon donor for lumazine synthase.
            notes: >-
              P. putida KT2440 representatives include ribB plus ribAB-I and
              ribAB-II. The latter two are included here as DHBP/RibBX
              exemplars only; they should not be used to satisfy the GTP
              cyclohydrolase II step without active-site or experimental
              confirmation.
    - order: 3
      role: Lumazine assembly
      node:
        id: lumazine_synthase_step
        label: 6,7-dimethyl-8-ribityllumazine formation
        module_type: REACTION
        annotons:
          - id: lumazine_synthase_activity
            label: "RibH: 6,7-dimethyl-8-ribityllumazine synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RibH lumazine synthase family
                term:
                  id: PANTHER:PTHR21058
                  label: 6,7-dimethyl-8-ribityllumazine synthase family
                representative_members:
                  - preferred_term: ribH (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QH6
                      label: 6,7-dimethyl-8-ribityllumazine synthase
            function:
              preferred_term: 6,7-dimethyl-8-ribityllumazine synthase activity
              term:
                id: GO:0000906
                label: 6,7-dimethyl-8-ribityllumazine synthase activity
              substrates:
                - preferred_term: 5-amino-6-(D-ribitylamino)uracil
                - preferred_term: 3,4-dihydroxy-2-butanone 4-phosphate
              products:
                - preferred_term: 6,7-dimethyl-8-ribityllumazine
              evidence:
                - source_id: EC:2.5.1.78
                  statement: 6,7-dimethyl-8-ribityllumazine synthase.
            role_description: Condenses the two branches to form the lumazine precursor of riboflavin.
    - order: 4
      role: Riboflavin formation
      node:
        id: riboflavin_synthase_step
        label: Riboflavin synthase
        module_type: REACTION
        annotons:
          - id: riboflavin_synthase_activity
            label: "RibE/RibC: riboflavin synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: RibE/RibC riboflavin synthase family
                term:
                  id: PANTHER:PTHR21098
                  label: Riboflavin synthase family
                representative_members:
                  - preferred_term: ribE (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QH8
                      label: Riboflavin synthase
                  - preferred_term: ribC (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88IT3
                      label: Riboflavin synthase
            function:
              preferred_term: riboflavin synthase activity
              term:
                id: GO:0004746
                label: riboflavin synthase activity
              substrates:
                - preferred_term: 6,7-dimethyl-8-ribityllumazine
              products:
                - preferred_term: riboflavin
              evidence:
                - source_id: EC:2.5.1.9
                  statement: Riboflavin synthase.
            role_description: Disproportionates two lumazine molecules to riboflavin and a recycled pyrimidine intermediate.
    - order: 5
      role: Flavin cofactor activation
      node:
        id: flavin_cofactor_activation
        label: Riboflavin to FMN and FAD
        module_type: METABOLIC_PATHWAY
        description: >-
          Converts riboflavin to FMN and FAD. This is modeled as a connected
          downstream part because many bacteria encode both activities in a
          bifunctional RibF/RibC-family enzyme.
        parts:
          - order: 1
            role: riboflavin phosphorylation to FMN
            node:
              id: riboflavin_kinase_step
              label: Riboflavin kinase
              module_type: REACTION
              annotons:
                - id: riboflavin_kinase_activity
                  label: "RibF/RFK: riboflavin kinase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RibF/RFK riboflavin kinase family
                      term:
                        id: PANTHER:PTHR22749
                        label: RIBOFLAVIN KINASE/FMN ADENYLYLTRANSFERASE
                      representative_members:
                        - preferred_term: ribF (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88Q93
                            label: Riboflavin biosynthesis protein
                        - preferred_term: ribF (Escherichia coli K-12)
                          term:
                            id: UniProtKB:P0AG40
                            label: Bifunctional riboflavin kinase/FMN adenylyltransferase
                        - preferred_term: RFK (human)
                          term:
                            id: UniProtKB:Q969G6
                            label: Riboflavin kinase
                  function:
                    preferred_term: riboflavin kinase activity
                    term:
                      id: GO:0008531
                      label: riboflavin kinase activity
                    substrates:
                      - preferred_term: riboflavin
                      - preferred_term: ATP
                    products:
                      - preferred_term: FMN
                      - preferred_term: ADP
                    cofactors:
                      - preferred_term: divalent metal ion
                    evidence:
                      - source_id: EC:2.7.1.26
                        statement: Riboflavin kinase.
                  role_description: Phosphorylates riboflavin to FMN.
          - order: 2
            role: FMN adenylylation to FAD
            node:
              id: fmn_adenylyltransferase_step
              label: FMN adenylyltransferase
              module_type: REACTION
              annotons:
                - id: fmn_adenylyltransferase_activity
                  label: "RibF/FADS: FMN adenylyltransferase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RibF/FADS FMN adenylyltransferase family
                      term:
                        id: PANTHER:PTHR22749
                        label: RIBOFLAVIN KINASE/FMN ADENYLYLTRANSFERASE
                      representative_members:
                        - preferred_term: ribF (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88Q93
                            label: Riboflavin biosynthesis protein
                        - preferred_term: ribF (Escherichia coli K-12)
                          term:
                            id: UniProtKB:P0AG40
                            label: Bifunctional riboflavin kinase/FMN adenylyltransferase
                        - preferred_term: FLAD1 (human)
                          term:
                            id: UniProtKB:Q8NFF5
                            label: FAD synthase
                  function:
                    preferred_term: FMN adenylyltransferase activity
                    term:
                      id: GO:0003919
                      label: FMN adenylyltransferase activity
                    substrates:
                      - preferred_term: FMN
                      - preferred_term: ATP
                    products:
                      - preferred_term: FAD
                      - preferred_term: diphosphate
                    evidence:
                      - source_id: EC:2.7.7.2
                        statement: FMN adenylyltransferase.
                  role_description: Adenylylates FMN to FAD.
  connections:
    - source: gtp_cyclohydrolase_ii_step
      target: ribd_deaminase_step
      connection_type: PRECEDES
    - source: ribd_deaminase_step
      target: ribd_reductase_step
      connection_type: PRECEDES
    - source: ribd_reductase_step
      target: phosphoribitylaminouracil_phosphatase_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        RibD produces the phosphorylated pyrimidine substrate for the required
        dephosphorylation step.
    - source: phosphoribitylaminouracil_phosphatase_step
      target: lumazine_synthase_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Dephosphorylation supplies 5-amino-6-(D-ribitylamino)uracil to RibH.
    - source: dhbp_branch
      target: lumazine_synthase_step
      connection_type: PROVIDES_INPUT_FOR
    - source: lumazine_synthase_step
      target: riboflavin_synthase_step
      connection_type: PRECEDES
    - source: riboflavin_synthase_step
      target: riboflavin_kinase_step
      connection_type: PROVIDES_INPUT_FOR
    - source: riboflavin_kinase_step
      target: fmn_adenylyltransferase_step
      connection_type: PRECEDES
