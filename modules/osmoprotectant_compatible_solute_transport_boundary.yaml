notes: >-
  This boundary module was created from the ppu02010 ABC-transporter partition
  work. It should remain separate from glycine/betaine catabolism unless
  transporter substrate uptake is experimentally connected to methylated-glycine
  degradation in KT2440. Determine whether CaiX pairs with CbcV/CbcW or with
  another compatible-solute transporter and whether its preferred substrate is
  carnitine, choline, glycine betaine, or another quaternary amine. Determine
  the cognate partners and ligand preference for PP_0076 and BetX. Determine
  the ATPase partner and exact ligand range for the PP_3558-PP_3559 pair.
  Determine the substrate range of the PP_0868-PP_0871 Yeh-like importer and
  the opuA-PP_2775 importer separately; the adjacent PotF-I
  putrescine-binding protein is tracked under polyamine transport rather than
  this compatible-solute boundary.
