id: MODULE:osmoprotectant_compatible_solute_transport_boundary
title: Osmoprotectant compatible-solute transport boundary
description: >-
  Boundary module for Pseudomonas putida KT2440 choline, glycine betaine, and
  carnitine compatible-solute uptake systems pulled from the KEGG ppu02010 ABC
  transporter umbrella map. The PP_0294-PP_0296 CbcV/CbcW/CbcX locus forms a
  coherent predicted ABC importer for choline/betaine/carnitine-family
  compatible solutes. The PP_0868-PP_0871 Yeh-like locus forms a second
  predicted quaternary-amine/glycine-betaine ABC importer. The opuA-PP_2775
  block forms a predicted glycine-betaine/L-proline compatible-solute importer
  with an ATPase/permease fusion plus periplasmic binding component. The
  PP_3558-PP_3559 pair is a partial predicted glycine-betaine compatible-solute
  ABC importer with binding and permease components, but the ATPase partner is
  unresolved. PP_0304 CaiX, PP_0076, and BetX are related periplasmic
  substrate-binding components with compatible-solute binding-family domains;
  they are represented as related binding components until cognate
  permease/ATPase pairings or substrate preferences are verified. The adjacent
  PP_0873 PotF-I putrescine-binding component is split into the polyamine
  transport boundary rather than folded into this compatible-solute module.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_0294-PP_0296 CbcV/CbcW/CbcX
      compatible-solute ABC transporter sub-batch, the PP_0304 CaiX, PP_0076,
      and BetX related binding components, the PP_0868-PP_0871 Yeh-like
      quaternary-amine compatible-solute ABC transporter sub-batch, the
      opuA-PP_2775 glycine-betaine/L-proline compatible-solute transporter
      block, and the PP_3558-PP_3559 partial glycine-betaine transporter pair.
      These are coherent transport partitions of the broad ABC transporter map,
      not evidence that ppu02010 is one satisfiable pathway.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records the C11 CbcV/CbcW/CbcX cluster,
      singleton C12 CaiX, C01 PP_0076, and C27 BetX compatible-solute binding
      components, the C17 PP_0868-PP_0871 Yeh-like compatible-solute importer,
      the C41 opuA-PP_2775 compatible-solute importer, and the C48
      PP_3558-PP_3559 partial glycine-betaine transporter pair after
      first-pass curation.
  - source_id: UniProtKB:Q88R40
    title: CbcV choline/betaine/carnitine ABC transporter ATP-binding subunit
    statement: >-
      UniProt names CbcV as the choline / betaine / carnitine ABC
      transporter-ATP binding subunit and records ABC transporter ATP-binding
      domains.
  - source_id: UniProtKB:Q88R39
    title: CbcW choline/betaine/carnitine ABC transporter membrane subunit
    statement: >-
      UniProt names CbcW as the choline / betaine / carnitine ABC
      transporter-membrane subunit and predicts a multi-pass cell-membrane
      protein.
  - source_id: UniProtKB:Q88R38
    title: CbcX choline/betaine/carnitine ABC transporter substrate-binding protein
    statement: >-
      UniProt names CbcX as the choline / betaine / carnitine ABC
      transporter-substrate binding protein and records a signal peptide plus an
      ABC-type glycine-betaine transport-system substrate-binding domain.
  - source_id: UniProtKB:Q88R30
    title: CaiX carnitine uptake ABC transporter periplasmic component
    statement: >-
      UniProt names CaiX as a carnitine uptake ABC transporter periplasmic
      component and records a signal peptide plus the same
      choline/glycine-betaine substrate-binding domain family.
  - source_id: UniProtKB:Q88PI2
    title: YehX quaternary amine transport ATP-binding protein
    statement: >-
      UniProt names YehX as a quaternary amine transport ATP-binding protein,
      records quaternary ammonium import chemistry, and describes a probable
      ABC transporter complex architecture.
  - source_id: UniProtKB:Q88PI1
    title: YehW osmoprotectant ABC transporter permease subunit
    statement: >-
      UniProt names YehW as an osmoprotectant ABC transporter permease subunit
      and predicts a multi-pass cell-membrane protein in the
      binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88PI0
    title: PP_0870 glycine betaine/carnitine/choline ABC transporter binding protein
    statement: >-
      UniProt names PP_0870 as a glycine betaine/carnitine/choline ABC
      transporter periplasmic binding protein and records an OpuAC/ABC
      glycine-betaine transport-system substrate-binding domain.
  - source_id: UniProtKB:Q88PH9
    title: PP_0871 glycine betaine/carnitine/choline ABC transporter permease
    statement: >-
      UniProt names PP_0871 as a glycine betaine/carnitine/choline ABC
      transporter permease protein and predicts a multi-pass cell-membrane
      protein in the binding-protein-dependent transport-system permease family.
  - source_id: UniProtKB:Q88RQ3
    title: PP_0076 choline betaine-binding protein
    statement: >-
      UniProt names PP_0076 as a choline betaine-binding protein and records a
      signal peptide plus OpuAC/ABC choline and glycine-betaine
      substrate-binding domains.
  - source_id: UniProtKB:Q88J75
    title: OpuA glycine betaine ABC transporter ATPase/permease fusion protein
    statement: >-
      UniProt names OpuA as a glycine betaine ABC transporter ATPase/permease
      fusion protein, records ABC osmolyte-uptake ATP-binding and MetI-like
      permease domains, and predicts a multi-pass cell-membrane protein.
  - source_id: UniProtKB:Q88J74
    title: PP_2775 glycine betaine/L-proline ABC transporter periplasmic component
    statement: >-
      UniProt names PP_2775 as a glycine betaine/L-proline ABC transporter
      periplasmic component and records a signal peptide plus an OpuAC/ABC
      glycine-betaine substrate-binding domain.
  - source_id: UniProtKB:Q88M34
    title: BetX choline/betaine/carnitine ABC transporter substrate-binding protein
    statement: >-
      UniProt names BetX as a choline / betaine / carnitine ABC
      transporter-substrate binding protein and records a signal peptide plus an
      OpuAC/ABC glycine-betaine substrate-binding domain.
  - source_id: PMID:19919675
    title: The ATP-binding cassette transporter Cbc (choline/betaine/carnitine) recruits multiple substrate-binding proteins with strong specificity for distinct quaternary ammonium compounds.
    statement: >-
      Asta retrieval found the Cbc-family study in Pseudomonas syringae and
      Pseudomonas aeruginosa identifying BetX as a betaine-specific
      substrate-binding protein that can interact with the CbcWV transporter
      core; this supports the module-level BetX modeling while leaving direct
      KT2440 pairing experimental validation open.
  - source_id: UniProtKB:Q88H07
    title: PP_3558 amino acid/glycine-betaine-family substrate-binding component
    statement: >-
      UniProt names PP_3558 as an amino acid transporter periplasmic
      amino-acid-binding protein and records a signal peptide plus an
      OpuAC/ABC glycine-betaine transport-system substrate-binding domain.
  - source_id: UniProtKB:Q88H06
    title: PP_3559 glycine betaine ABC transporter permease
    statement: >-
      UniProt names PP_3559 as a glycine betaine ABC transporter permease,
      predicts a multi-pass cell-membrane protein, and records a MetI-like
      binding-protein-dependent transport-system permease domain.
