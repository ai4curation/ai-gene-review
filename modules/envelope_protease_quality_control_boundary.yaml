id: MODULE:envelope_protease_quality_control_boundary
title: Envelope protease quality-control boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 periplasmic, membrane,
  secreted, and soluble protease quality-control split from the protein
  folding/targeting/turnover functional bucket. The module separates supported
  envelope metalloprotease and serine-protease activities from weak membrane or
  domain-only candidates where substrate or catalytic evidence remains
  insufficient.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was partitioned into nine curation-scale splits; this
      module covers the periplasmic_membrane_secreted_protease_qc split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_periplasmic_membrane_secreted_protease_qc.tsv
    title: PSEPK periplasmic, membrane, and secreted protease QC split
    statement: >-
      The batch table assigns qmcA, PP_0759, pmbA, PP_1232, PP_1499, PP_4113,
      PP_4924, PP_5112, PP_5115, PP_5116, PP_5455, and PP_5604 to this
      first-pass split.
  - source_id: file:PSEPK/PP_1232/PP_1232-ai-review.yaml
    title: Curated PP_1232 review
    statement: >-
      The PP_1232 review records a periplasmic BepA-family M48
      metalloendopeptidase/chaperone candidate and avoids using obsolete
      protein-catabolism terms as authored core process.
  - source_id: file:PSEPK/PP_4924/PP_4924-ai-review.yaml
    title: Curated PP_4924 review
    statement: >-
      The PP_4924 review records a large membrane-associated S8/furin-like
      serine endopeptidase and treats calcium binding as non-core domain
      context.
  - source_id: file:PSEPK/PP_5116/PP_5116-ai-review.yaml
    title: Curated PP_5116 review
    statement: >-
      The PP_5116 review adds missing M16-family metallopeptidase and
      proteolysis rows because the fetched GOA table carried only metal-binding
      context.
  - source_id: file:PSEPK/qmcA/qmcA-ai-review.yaml
    title: Curated qmcA review
    statement: >-
      The qmcA review leaves the SPFH/band-7 stomatin-like membrane protein
      with no core function because current evidence does not support a
      confident catalytic protease role.
  - source_id: file:PSEPK/PP_5455/PP_5455-ai-review.yaml
    title: Curated PP_5455 review
    statement: >-
      The PP_5455 review leaves the M15A C-terminal-domain candidate with no
      core function pending evidence for autonomous peptidase activity.
notes: >-
  First-pass interpretation: this split is a protein-quality-control and
  envelope/secreted protease boundary, not one pathway. Specific M48,
  S8/subtilase, U62/PmbA, and M16 metallopeptidase activities are retained
  where domain and GOA evidence support them. Broad metal-binding and generic
  peptidase terms are non-core context when specific protease terms exist.
  GO:0051603 is obsolete in the local ontology, so imported GOA context is not
  used as an authored core process. qmcA and PP_5455 remain no-core unresolved
  entries.
