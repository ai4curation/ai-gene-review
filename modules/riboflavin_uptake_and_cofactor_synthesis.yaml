  - source_id: file:human/SLC52A1/SLC52A1-ai-review.yaml
    title: SLC52A1 gene review (human)
    statement: Placental riboflavin transporter RFVT1 (UniProtKB:Q9NWF4, GO:0032217) matches the completed human SLC52A1 review.
