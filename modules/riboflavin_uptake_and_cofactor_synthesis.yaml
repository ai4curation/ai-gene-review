  notes: >-
    Riboflavin (vitamin B2) uptake and FMN/FAD cofactor synthesis (GO:0032218 -> GO:0009398 -> GO:0006747),
    grounded to five completed human gene reviews (three new transporters + two already-merged kinases).
    Humans are riboflavin auxotrophs: uptake via plasma-membrane SLC52 transporters SLC52A3/RFVT3 (Q9NQ40,
    intestinal apical), SLC52A2/RFVT2 (Q9HAB3, neural/systemic), SLC52A1/RFVT1 (Q9NWF4, placental), all
    PTHR12929, GO:0032217; then cytosolic activation RFK (Q969G6 PTHR22749, GO:0008531; riboflavin+ATP->FMN)
    and FLAD1 (Q8NFF5 PTHR23293, GO:0003919; FMN+ATP->FAD). FMN and FAD are the redox cofactors of the
    mitochondrial acyl-CoA/amino-acid dehydrogenases, ETF/ETFDH, complex I/II and many oxidoreductases.
    Curation notes: the hRFT legacy numbering is cross-wired vs RFVT/SLC52 (hRFT3=RFVT2=SLC52A2,
    hRFT2=RFVT3=SLC52A3) but GOA maps all aliases to the right accession; SLC52A1 has a primate-specific
    urate-transport neofunction captured as a separate core function in its review; transporter "riboflavin
    metabolic process" TAS demoted (transport is not chemical metabolism). Diseases: SLC52A2/A3 = Brown-
    Vialetto-Van Laere / Fazio-Londe, SLC52A1 (maternal) = transient neonatal MADD, FLAD1 = riboflavin-
    responsive lipid-storage myopathy. GO term ids/labels verified against the local go.db; module passes
    structural + term-label validation.
