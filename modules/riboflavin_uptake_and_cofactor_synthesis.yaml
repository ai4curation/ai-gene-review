    title: SLC52A3 gene review (human)
    statement: Intestinal riboflavin transporter RFVT3 (UniProtKB:Q9NQ40, GO:0032217) matches the completed human SLC52A3 review.
  - source_id: file:human/SLC52A2/SLC52A2-ai-review.yaml
    title: SLC52A2 gene review (human)
