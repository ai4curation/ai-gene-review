id: MODULE:p38_cascade
title: p38 stress-activated MAPK cascade module
description: >-
  A taxon-neutral decomposition of the p38 mitogen-activated protein kinase
  cascade, the stress- and cytokine-activated concrete realization of the
  generic three-tier MAP kinase relay (MODULE:mapk_relay). Environmental stresses
  (UV, osmotic and oxidative stress) and inflammatory cytokines (TNF, IL-1)
  signal through upstream MAP3Ks (ASK1/MAP3K5, TAK1/MAP3K7, MLK family) to the
  dual-specificity MAP2Ks MKK3 (MAP2K3) and MKK6 (MAP2K6), which dually
  phosphorylate the p38 MAPKs (p38 alpha/beta/gamma/delta) on their TGY
  activation-loop motif. Active p38 phosphorylates substrate kinases (MK2/MAPKAPK2)
  and transcription factors (ATF2, MEF2), driving stress-response and
  inflammatory gene programs. The RAF-analogous kinase relay - MAP3K -> MKK3/6 ->
  p38 - is declared as an inner bundle that `conforms_to` mapk_relay, while the
  stress/cytokine input and the p38 effector output and DUSP-mediated feedback
  are this cascade's free extensions around the conforming core. Grounded in
  GO:0038066 (p38MAPK cascade) / GO:0051403 (stress-activated MAPK cascade).
status: DRAFT
evidence:
  - source_id: GO:0038066
    title: p38MAPK cascade
    statement: >-
      The module is grounded in the GO biological process term for the p38MAPK
      cascade, the stress-activated branch of the MAPK cascade family.
  - source_id: GO:0051403
    title: stress-activated MAPK cascade
    statement: >-
      The p38 cascade is a stress-activated MAPK cascade, activated by
      environmental stress and inflammatory cytokines rather than mitogens.
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The relay tier conforms to the generic three-tier MAPK cascade motif
      (MODULE:mapk_relay).
notes: >-
  This module is the concrete p38 (stress-activated) branch of the generic
  three-tier MAP kinase relay (MODULE:mapk_relay): the inner `p38_relay` node
  bundles the MAP3K -> MKK3/6 -> p38 tiers and declares conformance to that
  motif, while the stress/cytokine input step and the downstream p38-output and
  DUSP-feedback steps are this cascade's free extensions around the conforming
  core. Representative UniProt members (ASK1 Q99683, MKK6 P52564, MKK3 P46734,
  p38 alpha Q16539) were verified against UniProt.
module:
  id: p38_cascade
  label: p38 (stress-activated) MAPK cascade
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: p38MAPK cascade
      term:
        id: GO:0038066
        label: p38MAPK cascade
      description: Stress/cytokine-activated MAP3K -> MKK3/6 -> p38 protein kinase relay.
    - preferred_term: stress-activated MAPK cascade
      term:
        id: GO:0051403
        label: stress-activated MAPK cascade
      description: The stress-responsive MAPK module family that p38 belongs to.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: stress and cytokine input
      node:
        id: stress_input
        label: Stress/cytokine activation of the p38 MAP3K tier
        module_type: REGULATORY_STEP
        description: >-
          Environmental stress (UV, osmotic, oxidative) and inflammatory
          cytokines (TNF, IL-1), relayed through MAP4Ks, Rho-family GTPases, and
          adaptor MAP3Ks, converge to activate the MAP3K tier of the cascade.
        annotons:
          - id: stress_activation
            label: stress-activated MAP3K input
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: stress-activated MAPK cascade
                term:
                  id: GO:0051403
                  label: stress-activated MAPK cascade
            role_description: Couples stress and cytokine stimuli to the p38 relay.
    - order: 2
      role: p38 kinase relay (conforms to mapk_relay)
      node:
        id: p38_relay
        label: p38 kinase relay (MAP3K -> MKK3/6 -> p38)
        module_type: REACTION
        description: >-
          The three-tier kinase relay of the p38 cascade: a stress-activated
          MAP3K (ASK1/TAK1/MLK) phosphorylates MKK3/MKK6 (MAP2K), which dually
          phosphorylates p38 (MAPK) on its TGY activation-loop motif.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              MAP3K -> MKK3/6 -> p38 fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
          - order: 1
            role: MAP3K tier (ASK1/TAK1/MLK)
            node:
              id: p38_map3k
              label: Stress-activated MAP3K activation
              module_type: REACTION
              description: >-
                Stress-activated MAP3Ks (ASK1/MAP3K5, TAK1/MAP3K7, MLK family)
                phosphorylate and activate MKK3/MKK6.
              annotons:
                - id: p38_map3k_activity
                  label: p38-pathway MAP3K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: Stress-activated MAP3Ks (ASK1/TAK1/MLK)
                      description: ASK1 (MAP3K5), TAK1 (MAP3K7), and MLK-family MAP3Ks feeding the p38 tier.
                      representative_members:
                        - preferred_term: ASK1 (MAP3K5)
                          term:
                            id: UniProtKB:Q99683
                            label: Mitogen-activated protein kinase kinase kinase 5
                  function:
                    preferred_term: MAP kinase kinase kinase activity
                    term:
                      id: GO:0004709
                      label: MAP kinase kinase kinase activity
                    targets:
                      - preferred_term: MKK3/MKK6
                  role_description: Top kinase tier; activates MKK3/6.
          - order: 2
            role: MAP2K tier (MKK3/MKK6)
            node:
              id: p38_map2k
              label: MKK3/MKK6 MAP kinase kinase activation
              module_type: REACTION
              description: >-
                The dual-specificity MAP2Ks MKK3 (MAP2K3) and MKK6 (MAP2K6)
                phosphorylate p38 on both threonine and tyrosine of its TGY motif.
              annotons:
                - id: p38_map2k_activity
                  label: MKK3/MKK6 MAP2K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: MKK3/MKK6 (MAP2K3/MAP2K6)
                      description: Dual-specificity MAP kinase kinases dedicated to the p38 tier.
                      representative_members:
                        - preferred_term: MKK6 (MAP2K6)
                          term:
                            id: UniProtKB:P52564
                            label: Dual specificity mitogen-activated protein kinase kinase 6
                        - preferred_term: MKK3 (MAP2K3)
                          term:
                            id: UniProtKB:P46734
                            label: Dual specificity mitogen-activated protein kinase kinase 3
                  function:
                    preferred_term: MAP kinase kinase activity
                    term:
                      id: GO:0004708
                      label: MAP kinase kinase activity
                    targets:
                      - preferred_term: p38 TGY motif
                  role_description: Middle kinase tier; dual-specificity activation of p38.
          - order: 3
            role: MAPK tier (p38)
            node:
              id: p38_mapk
              label: p38 MAP kinase activation
              module_type: REACTION
              description: >-
                Dually phosphorylated p38 (alpha/beta/gamma/delta) becomes an
                active proline-directed serine/threonine kinase acting on
                cytoplasmic and nuclear substrates.
              annotons:
                - id: p38_mapk_activity
                  label: p38 MAP kinase activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: p38 MAPKs (MAPK14/11/12/13)
                      description: The terminal stress-activated effector kinases of the p38 cascade.
                      representative_members:
                        - preferred_term: p38 alpha (MAPK14)
                          term:
                            id: UniProtKB:Q16539
                            label: Mitogen-activated protein kinase 14
                  function:
                    preferred_term: MAP kinase activity
                    term:
                      id: GO:0004707
                      label: MAP kinase activity
                  locations:
                    - preferred_term: nucleus
                      term:
                        id: GO:0005634
                        label: nucleus
                  role_description: Effector kinase transducing the stress signal to substrates.
        connections:
          - source: p38_map3k
            target: p38_map2k
            connection_type: CAUSES
            description: The MAP3K phosphorylates and activates MKK3/6.
          - source: p38_map2k
            target: p38_mapk
            connection_type: CAUSES
            description: MKK3/6 dually phosphorylates p38.
    - order: 3
      role: p38 effector and transcriptional output
      node:
        id: p38_output
        label: p38 effector and transcriptional output
        module_type: REGULATORY_STEP
        description: >-
          Active p38 phosphorylates the substrate kinase MK2 (MAPKAPK2) and the
          transcription factors ATF2 and MEF2, driving stress-response and
          inflammatory gene programs and post-transcriptional control of cytokine
          mRNAs.
        annotons:
          - id: p38_substrate_output
            label: p38 substrate phosphorylation and transcriptional activation
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            processes:
              - preferred_term: positive regulation of transcription by RNA polymerase II
                term:
                  id: GO:0045944
                  label: positive regulation of transcription by RNA polymerase II
            role_description: Converts p38 activity into a stress/inflammatory gene program.
    - order: 4
      role: negative regulation and feedback
      node:
        id: p38_negative_regulation
        label: DUSP/MKP dephosphorylation of p38
        module_type: REACTION
        description: >-
          DUSP/MKP dual-specificity phosphatases (e.g. DUSP1/MKP-1, DUSP10/MKP-5)
          dephosphorylate the p38 activation loop to terminate signaling, many of
          them induced by p38 itself as negative feedback.
        annotons:
          - id: p38_dusp_role
            label: DUSP/MKP phosphatase function
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DUSP/MKP dual-specificity phosphatases (p38-directed)
                description: p38-inactivating dual-specificity (Thr/Tyr) MAP kinase phosphatases.
            role_description: Dephosphorylates the p38 activation loop to terminate signaling.
  connections:
    - source: stress_input
      target: p38_relay
      connection_type: CAUSES
      description: Stress/cytokine stimuli activate the MAP3K tier of the p38 relay.
    - source: p38_relay
      target: p38_output
      connection_type: PROVIDES_INPUT_FOR
      description: Active p38 phosphorylates nuclear and cytoplasmic substrates.
    - source: p38_negative_regulation
      target: p38_mapk
      connection_type: NEGATIVELY_REGULATES
      description: DUSP/MKP phosphatases dephosphorylate p38.
