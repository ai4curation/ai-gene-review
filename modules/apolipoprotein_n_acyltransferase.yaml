id: MODULE:apolipoprotein_n_acyltransferase
title: Apolipoprotein N-acyltransferase
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00666 module for the final
  phospholipid-dependent N-acylation step of bacterial lipoprotein maturation.
  The module is centered on Lnt (PP_4790, UniProtKB:Q88DN4), which transfers an
  acyl chain from a glycerophospholipid to the amino group of the N-terminal
  cysteine of a diacylglyceryl lipoprotein.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00666
    title: UniPathway UPA00666
    statement: >-
      The local UPA00666 membership set contains lnt as the KT2440 candidate for
      the apolipoprotein N-acyltransferase step of lipoprotein maturation.
  - source_id: GO:0042158
    title: lipoprotein biosynthetic process
    statement: >-
      GO:0042158 captures the biological process containing Lnt's final
      lipoprotein maturation reaction.
  - source_id: file:PSEPK/lnt/lnt-ai-review.yaml
    title: Curated lnt review
    statement: >-
      The lnt review accepts the lipoprotein biosynthesis and plasma-membrane
      annotations, while modifying broad InterPro-derived membrane and
      acyltransferase annotations to the more informative plasma membrane and
      N-acyltransferase terms.
  - source_id: file:PSEPK/lnt/lnt-uniprot.txt
    title: UniProtKB reviewed entry for lnt
    statement: >-
      UniProt describes Lnt as apolipoprotein N-acyltransferase with
      EC:2.3.1.269, Rhea:RHEA:48228, the lipoprotein biosynthesis N-acyl
      transfer pathway, and a multi-pass inner-membrane location.
  - source_id: file:interpro/panther/PTHR38686/PTHR38686-metadata.yaml
    title: PANTHER family metadata for Lnt
    statement: >-
      PANTHER places Q88DN4 in family PTHR38686, named APOLIPOPROTEIN
      N-ACYLTRANSFERASE, with representative Lnt structures.
  - source_id: file:modules/apolipoprotein_n_acyltransferase-deep-research-openscientist.md
    title: OpenScientist module research for apolipoprotein N-acyltransferase
    statement: >-
      OpenScientist module-level research supports UPA00666 as the
      proteobacterial Lnt-dependent final N-acylation step of lipoprotein
      maturation, distinct from upstream Lgt/LspA chemistry and downstream Lol
      trafficking.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__apolipoprotein_n_acyltransferase__upa00666-deep-research-openscientist.md
    title: OpenScientist species-aware pathway research for PSEPK UPA00666
    statement: >-
      OpenScientist species-aware research supports lnt/PP_4790 as the single
      high-confidence PSEPK gene covering UPA00666, finds no Lnt paralog
      ambiguity, and recommends keeping Lgt/LspA and Lol sorting outside this
      one-step module.
notes: >-
  First-pass interpretation: UPA00666 is satisfiable as a compact single-enzyme
  lipoprotein maturation module in KT2440. Lnt catalyzes the last modification
  in the canonical bacterial lipoprotein maturation sequence, after Lgt adds the
  diacylglyceryl group and LspA removes the signal peptide. Those upstream steps
  are pathway context rather than members of this UPA00666 bucket. The exact
  Lnt reaction is captured by UniProt/Rhea/EC evidence; GO currently provides
  the broader N-acyltransferase activity term rather than an apolipoprotein
  N-acyltransferase-specific molecular-function term. OpenScientist reinforces
  the narrow boundary and emphasizes that KT2440-specific mechanism,
  essentiality, and donor-preference claims are inferred from close
  proteobacterial relatives rather than direct PP_4790 experiments. The
  species-aware report also supports this module as complete for KT2440, with
  no additional PSEPK gene promotions required for satisfiability.
module:
  id: apolipoprotein_n_acyltransferase
  label: Apolipoprotein N-acyltransferase
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: lipoprotein biosynthetic process
      term:
        id: GO:0042158
        label: lipoprotein biosynthetic process
      description: Biological process containing bacterial lipoprotein maturation.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Bacterial inner membrane where Lnt acts.
  parts:
    - order: 1
      role: Final N-acylation of mature bacterial lipoprotein
      node:
        id: lnt_apolipoprotein_n_acyltransferase_step
        label: Lnt apolipoprotein N-acyltransferase step
        module_type: REACTION
        description: >-
          Lnt transfers an acyl group from a glycerophospholipid donor to the
          amino group of the N-terminal cysteine of a diacylglyceryl-modified
          lipoprotein, producing the triacylated mature lipoprotein.
        annotons:
          - id: lnt_apolipoprotein_n_acyltransferase
            label: "lnt: apolipoprotein N-acyltransferase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK lnt
                term:
                  id: UniProtKB:Q88DN4
                  label: Apolipoprotein N-acyltransferase
            function:
              preferred_term: N-acyltransferase activity
              term:
                id: GO:0016410
                label: N-acyltransferase activity
              evidence:
                - source_id: GO:0016410
                  statement: >-
                    GO:0016410 is the most specific available GO
                    molecular-function term found for Lnt's N-acyltransferase
                    activity; no apolipoprotein-specific GO MF term was
                    identified in the first-pass ontology lookup.
              substrates:
                - preferred_term: diacylglyceryl lipoprotein
                - preferred_term: glycerophospholipid acyl donor
              products:
                - preferred_term: N-acyl diacylglyceryl lipoprotein
                - preferred_term: 2-acyl-sn-glycero-3-phospholipid
                - preferred_term: proton
            processes:
              - preferred_term: lipoprotein biosynthetic process
                term:
                  id: GO:0042158
                  label: lipoprotein biosynthetic process
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Inner-membrane apolipoprotein N-acyltransferase that completes
              bacterial lipoprotein maturation by forming the N-acylated
              mature lipoprotein.
  knowledge_gaps:
    - gap_statement: >-
        GO does not appear to contain a molecular-function term specific to
        apolipoprotein N-acyltransferase activity, so the module currently uses
        the broader GO:0016410 term plus UniProt/Rhea/EC evidence for the exact
        reaction.
      boundary: >-
        Do not broaden the module to generic N-acyltransferases; keep the module
        anchored to Lnt/EC 2.3.1.269 and the lipoprotein maturation reaction.
      gap_kind:
        - ONTOLOGY
        - CURATION
    - gap_statement: >-
        Direct KT2440 biochemical or depletion evidence for PP_4790 has not
        been located in this first pass; current confidence rests on reviewed
        UniProt/HAMAP, UniRule, UniPathway, and conserved Lnt-family evidence.
      boundary: >-
        Treat lnt as the covered UPA00666 enzyme while keeping KT2440
        substrate set, essentiality, and envelope phenotypes as follow-up
        questions.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        Lgt and LspA perform upstream steps in lipoprotein maturation, but they
        are represented by adjacent UniPathway buckets and should not be added
        as members of this UPA00666 module.
      boundary: >-
        Use Lgt and LspA only as pathway context for substrate generation unless
        a broader lipoprotein maturation supermodule is intentionally created.
      gap_kind:
        - CURATION
