id: MODULE:phosphotyrosine_adaptor_recruitment
title: Generic phosphotyrosine-adaptor recruitment motif
description: >-
  The minimal, reusable receptor-proximal recruitment motif: an activated
  receptor (or receptor-associated kinase) presents a phosphotyrosine docking
  site; an SH2- or PTB-domain adaptor recognizes that phosphotyrosine; and the
  adaptor, through a second interaction surface (e.g. an SH3 domain), recruits a
  downstream effector to the membrane. This pTyr -> adaptor -> effector wiring is
  the generic interface by which receptor tyrosine kinases, cytokine-receptor-
  associated JAKs, and other tyrosine-phosphorylation events launch downstream
  pathways - it is the recruitment step that precedes the Ras switch in
  MODULE:erk_cascade. The motif is gene-free and taxon-neutral, fixing only the
  phosphotyrosine-binding and adaptor roles and the recruitment topology.
  Grounded in GO:0007169 (cell surface receptor protein tyrosine kinase signaling
  pathway).
status: DRAFT
evidence:
  - source_id: GO:0007169
    title: cell surface receptor protein tyrosine kinase signaling pathway
    statement: >-
      The motif is the receptor-proximal adaptor-recruitment step of tyrosine
      kinase receptor signaling.
  - source_id: GO:0001784
    title: phosphotyrosine residue binding
    statement: The defining function of the adaptor step is recognition of the receptor phosphotyrosine.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: phosphotyrosine_adaptor_recruitment}]` when a
  phosphotyrosine docking site recruits an SH2/PTB adaptor that in turn recruits a
  downstream effector. The specific adaptor (GRB2, SHC, ...) and effector are
  realization-specific.
module:
  id: phosphotyrosine_adaptor_recruitment
  label: Phosphotyrosine -> SH2/PTB adaptor -> effector recruitment
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: cell surface receptor protein tyrosine kinase signaling pathway
      term:
        id: GO:0007169
        label: cell surface receptor protein tyrosine kinase signaling pathway
      description: Receptor-proximal phosphotyrosine docking and adaptor recruitment.
  parts:
    - order: 1
      role: receptor phosphotyrosine docking site
      node:
        id: receptor_py
        label: Activated-receptor phosphotyrosine docking site
        module_type: REGULATORY_STEP
        description: An activated receptor or receptor-associated kinase is phosphorylated on tyrosine, creating an SH2/PTB docking site.
        annotons:
          - id: receptor_py_node
            label: receptor phosphotyrosine
            participant:
              selector_type: ANY_PARTICIPANT
            role_description: Presents the phosphotyrosine docking site.
    - order: 2
      role: SH2/PTB adaptor binding
      node:
        id: adaptor_binding
        label: SH2/PTB adaptor binding to phosphotyrosine
        module_type: REACTION
        description: An SH2- or PTB-domain adaptor recognizes the receptor phosphotyrosine.
        annotons:
          - id: adaptor_binding_activity
            label: phosphotyrosine residue binding
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphotyrosine residue binding
                term:
                  id: GO:0001784
                  label: phosphotyrosine residue binding
            function:
              preferred_term: phosphotyrosine residue binding
              term:
                id: GO:0001784
                label: phosphotyrosine residue binding
            role_description: Docks the adaptor onto the activated receptor.
    - order: 3
      role: effector recruitment
      node:
        id: effector_recruitment
        label: Adaptor-mediated effector recruitment
        module_type: REGULATORY_STEP
        description: The bound adaptor recruits a downstream effector via a second interaction surface (e.g. SH3 domain).
        annotons:
          - id: adaptor_function
            label: protein-macromolecule adaptor activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: protein-macromolecule adaptor activity
                term:
                  id: GO:0030674
                  label: protein-macromolecule adaptor activity
            function:
              preferred_term: protein-macromolecule adaptor activity
              term:
                id: GO:0030674
                label: protein-macromolecule adaptor activity
              targets:
                - preferred_term: downstream effector
            role_description: Bridges the receptor to a downstream effector.
  connections:
    - source: receptor_py
      target: adaptor_binding
      connection_type: PROVIDES_INPUT_FOR
      description: The phosphotyrosine docking site is recognized by the adaptor.
    - source: adaptor_binding
      target: effector_recruitment
      connection_type: CAUSES
      description: The docked adaptor recruits the downstream effector.
