id: MODULE:glutathione_metabolism_boundary
title: Glutathione metabolism boundary
description: >-
  Broad boundary module for KEGG ppu00480 in Pseudomonas putida KT2440. The
  membership combines glutathione biosynthesis, glutathione redox recycling,
  glutathione-dependent detoxification, glutathione turnover and 5-oxoproline
  salvage, aminopeptidase side nodes, NADPH-generating enzymes, and unrelated
  KEGG spillover nodes. This module separates those supported contexts rather
  than treating every member as one strict glutathione metabolic route.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00480
    title: Glutathione metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00480 provides the PSEPK curation batch. Its membership spans
      glutathione synthesis and recycling, GST/peroxidase detoxification,
      glutathione degradation and 5-oxoproline salvage, NADPH supply, and
      several aminopeptidase or unrelated side nodes.
  - source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_glutathione_thiol_detoxification.tsv
    title: PSEPK stress/detoxification glutathione-thiol split
    statement: >-
      The stress/detoxification functional bucket contributes additional
      GST-family transferase candidates, glutathione/thiol redox candidates, a
      formaldehyde dehydrogenase candidate, and the MnaT methionine-derivative
      detoxifier; these are recorded as boundary side context rather than as a
      single strict glutathione metabolic route.
module:
  id: glutathione_metabolism_boundary
  label: Glutathione metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glutathione biosynthetic process
      term:
        id: GO:0006750
        label: glutathione biosynthetic process
      description: ATP-dependent formation of gamma-glutamylcysteine and glutathione.
    - preferred_term: glutathione metabolic process
      term:
        id: GO:0006749
        label: glutathione metabolic process
      description: Reactions involving reduced or oxidized glutathione.
    - preferred_term: glutathione catabolic process
      term:
        id: GO:0006751
        label: glutathione catabolic process
      description: Glutathione degradation and gamma-glutamyl turnover routes.
    - preferred_term: cellular oxidant detoxification
      term:
        id: GO:0098869
        label: cellular oxidant detoxification
      description: Enzymatic reduction or detoxification of cellular oxidants.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most ppu00480 enzymes are soluble cytoplasmic enzymes.
  parts:
    - order: 1
      role: Glutathione biosynthesis
      node:
        id: glutathione_biosynthesis
        label: Gamma-glutamylcysteine and glutathione synthesis
        module_type: METABOLIC_PATHWAY
        description: >-
          GshA catalyzes gamma-glutamylcysteine formation, GshB catalyzes the
          ATP-dependent addition of glycine to form glutathione, and PP_3253 is
          a candidate second glutamate-cysteine ligase/YbdK-family enzyme.
        annotons:
          - id: gshA_glutamate_cysteine_ligase
            label: "gshA: glutamate-cysteine ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gshA
            function:
              preferred_term: glutamate-cysteine ligase activity
              term:
                id: GO:0004357
                label: glutamate-cysteine ligase activity
            role_description: First committed glutathione biosynthesis step.
          - id: gshB_glutathione_synthase
            label: "gshB: glutathione synthetase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gshB
            function:
              preferred_term: glutathione synthase activity
              term:
                id: GO:0004363
                label: glutathione synthase activity
            role_description: ATP-dependent glutathione formation from gamma-glutamylcysteine and glycine.
          - id: PP_3253_glutamate_cysteine_ligase_candidate
            label: "PP_3253: putative glutamate-cysteine ligase 2"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3253
            function:
              preferred_term: glutamate-cysteine ligase activity
              term:
                id: GO:0004357
