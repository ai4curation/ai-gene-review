        id: glutathione_redox_detox
        label: Glutathione reductase and peroxide-detoxification enzymes
        module_type: METABOLIC_PATHWAY
        description: >-
          Gor recycles glutathione disulfide using NADPH. Glutathione
          peroxidase-family proteins and the glutathione-dependent peroxiredoxin
          are oxidative-stress detoxification nodes rather than biosynthetic
          enzymes.
        annotons:
          - id: gor_glutathione_reductase
            label: "gor: glutathione reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gor
            function:
              preferred_term: glutathione-disulfide reductase (NADPH) activity
              term:
                id: GO:0004362
                label: glutathione-disulfide reductase (NADPH) activity
            role_description: NADPH-dependent glutathione disulfide reduction.
          - id: PP_0777_glutathione_peroxidase
