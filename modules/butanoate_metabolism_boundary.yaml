id: MODULE:butanoate_metabolism_boundary
title: Butanoate metabolism boundary
description: >-
  Boundary module for KEGG ppu00650 in Pseudomonas putida KT2440. The
  organism-specific map combines five primary butanoate/PHA-adjacent genes
  (bdhA, gbd, hbdH, phaA/PhaC1, and phaC/PhaC2) with broad spillovers from
  succinate-semialdehyde/GABA metabolism, acetoacetate and acyl-CoA activation,
  fatty-acid beta-oxidation, phenylacetate catabolism, BCAA/acetolactate
  metabolism, terpenoid/thiolase chemistry, and TCA respiration. It is curated
  here as separable short-chain acid, carbon-storage, and CoA-thioester contexts
  rather than one linear butanoate pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00650
    title: Butanoate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00650 provides the PSEPK curation batch. Its membership spans
      butanediol/4-hydroxybutyrate/3-hydroxybutyrate dehydrogenases, PHA
      synthases, succinate-semialdehyde dehydrogenases, acetoacetate/acyl-CoA
      enzymes, beta-oxidation and aromatic-catabolism enzymes, acetolactate
      synthases, and TCA succinate dehydrogenase subunits.
module:
  id: butanoate_metabolism_boundary
  label: Butanoate metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: (R,R)-butanediol dehydrogenase activity
      term:
        id: GO:0000721
        label: (R,R)-butanediol dehydrogenase activity
      description: BdhA predicted butanediol/polyol redox activity.
    - preferred_term: 4-hydroxybutyrate dehydrogenase activity
      term:
        id: GO:0047577
        label: 4-hydroxybutyrate dehydrogenase activity
      description: Gbd short-chain alcohol/acid redox activity.
    - preferred_term: 3-hydroxybutyrate dehydrogenase activity
      term:
        id: GO:0003858
        label: 3-hydroxybutyrate dehydrogenase activity
      description: HbdH 3-hydroxybutyrate/acetoacetate redox activity.
    - preferred_term: poly(3-hydroxyalkanoate) biosynthetic process
      term:
        id: GO:0042621
        label: poly(3-hydroxyalkanoate) biosynthetic process
      description: PhaC1/PhaC2 polymerization of medium-chain-length PHA storage polymer.
    - preferred_term: acyltransferase activity
      term:
        id: GO:0016746
        label: acyltransferase activity
      description: Current broad molecular-function term used for PHA synthases pending a dedicated GO MF term.
    - preferred_term: acetoacetate-CoA ligase activity
      term:
        id: GO:0030729
        label: acetoacetate-CoA ligase activity
      description: Aacs activation of acetoacetate to acetoacetyl-CoA side context.
    - preferred_term: acetyl-CoA C-acetyltransferase activity
      term:
        id: GO:0003985
        label: acetyl-CoA C-acetyltransferase activity
      description: Thiolase-family acetyl-CoA/acetoacetyl-CoA side-node chemistry.
    - preferred_term: 3-hydroxybutyryl-CoA dehydrogenase activity
      term:
        id: GO:0008691
        label: 3-hydroxybutyryl-CoA dehydrogenase activity
      description: Short-chain hydroxyacyl-CoA dehydrogenase side-node chemistry.
    - preferred_term: succinate-semialdehyde dehydrogenase (NAD+) activity
      term:
        id: GO:0004777
        label: succinate-semialdehyde dehydrogenase (NAD+) activity
      description: Sad/Dav succinate- or glutarate-semialdehyde aldehyde oxidation context.
    - preferred_term: succinate-semialdehyde dehydrogenase (NADP+) activity
      term:
        id: GO:0036243
        label: succinate-semialdehyde dehydrogenase (NADP+) activity
      description: GabD-II NADP-dependent succinate-semialdehyde oxidation context.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most soluble short-chain acid, aldehyde, thiolase, and beta-oxidation enzymes in the batch are cytoplasmic.
      - preferred_term: polyhydroxyalkanoate granule
        term:
          id: GO:0070088
          label: polyhydroxyalkanoate granule
        description: PhaC-family synthases act at intracellular PHA storage granules.
  parts:
    - order: 1
      role: Primary short-chain alcohol and hydroxybutyrate redox nodes
      node:
        id: short_chain_hydroxybutyrate_redox_nodes
        label: Short-chain hydroxybutyrate redox nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          bdhA, gbd, and hbdH are the three primary ppu00650 genes whose
          current annotations directly name butanediol, 4-hydroxybutyrate, and
          3-hydroxybutyrate dehydrogenase chemistry. Their exact physiological
          substrate ranges remain first-pass questions, but they are the
          strongest batch-specific short-chain acid/alcohol redox nodes.
        annotons:
          - id: bdhA_butanediol_dehydrogenase
            label: "bdhA: (R,R)-butanediol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bdhA
            function:
              preferred_term: (R,R)-butanediol dehydrogenase activity
              term:
                id: GO:0000721
                label: (R,R)-butanediol dehydrogenase activity
            role_description: Predicted zinc-dependent butanediol/polyol dehydrogenase.
          - id: gbd_4_hydroxybutyrate_dehydrogenase
            label: "gbd: 4-hydroxybutyrate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gbd
            function:
              preferred_term: 4-hydroxybutyrate dehydrogenase activity
              term:
                id: GO:0047577
                label: 4-hydroxybutyrate dehydrogenase activity
            role_description: Predicted iron-dependent 4-hydroxybutyrate dehydrogenase.
          - id: hbdH_3_hydroxybutyrate_dehydrogenase
            label: "hbdH: 3-hydroxybutyrate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hbdH
            function:
              preferred_term: 3-hydroxybutyrate dehydrogenase activity
              term:
                id: GO:0003858
                label: 3-hydroxybutyrate dehydrogenase activity
            role_description: Predicted SDR 3-hydroxybutyrate/acetoacetate redox enzyme.
    - order: 2
      role: Medium-chain-length polyhydroxyalkanoate storage polymerization
      node:
        id: mcl_pha_storage_polymerization
        label: Medium-chain-length PHA storage polymerization
        module_type: METABOLIC_PATHWAY
        description: >-
          phaA/PP_5003 is the KT2440 PhaC1 polymerase despite the confusing gene
          symbol, and phaC/PP_5005 is PhaC2. Both are class II PHA synthases
          connected to medium-chain-length poly(3-hydroxyalkanoate) storage
          polymer biosynthesis. Existing reviews flag PHB-specific process
          mappings as too narrow for pseudomonad mcl-PHA.
        annotons:
          - id: phaA_PhaC1_mcl_PHA_synthase
            label: "phaA/PhaC1: mcl-PHA synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: phaA
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
            role_description: Primary PhaC1 class II PHA polymerase; GO lacks a dedicated PHA synthase MF term.
          - id: phaC_PhaC2_mcl_PHA_synthase
            label: "phaC/PhaC2: mcl-PHA synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: phaC
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
            role_description: Class II PhaC2 PHA polymerase in the phaC1-phaZ-phaC2-phaD locus.
    - order: 3
      role: Acetoacetate, thiolase, and short-chain acyl-CoA side chemistry
      node:
        id: acetoacetate_thiolase_acyl_CoA_side_chemistry
        label: Acetoacetate and acyl-CoA side chemistry
        module_type: METABOLIC_PATHWAY
        description: >-
          Several ppu00650 members are better interpreted as acetoacetate or
          acyl-CoA side nodes also used by BCAA degradation, fatty-acid
          beta-oxidation, terpenoid, phenylacetate, and aromatic lower pathways.
          These include Aacs acetoacetate-CoA ligase, hbd
          3-hydroxybutyryl-CoA dehydrogenase, and multiple thiolase-family
          acetyl-CoA acetyltransferases.
        annotons:
          - id: aacs_acetoacetate_CoA_ligase
            label: "aacs: acetoacetate-CoA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aacs
            function:
              preferred_term: acetoacetate-CoA ligase activity
              term:
                id: GO:0030729
                label: acetoacetate-CoA ligase activity
            role_description: Activates acetoacetate to acetoacetyl-CoA.
          - id: hbd_3_hydroxybutyryl_CoA_dehydrogenase
            label: "hbd: 3-hydroxybutyryl-CoA dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hbd
            function:
              preferred_term: 3-hydroxybutyryl-CoA dehydrogenase activity
              term:
                id: GO:0008691
                label: 3-hydroxybutyryl-CoA dehydrogenase activity
            role_description: Short-chain hydroxyacyl-CoA oxidation/reduction side node.
          - id: bktB_acetyl_CoA_acetyltransferase
            label: "bktB: beta-ketothiolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bktB
            function:
              preferred_term: acetyl-CoA C-acetyltransferase activity
              term:
                id: GO:0003985
                label: acetyl-CoA C-acetyltransferase activity
            role_description: Thiolase-family acetyl-CoA/acetoacetyl-CoA side-node enzyme.
    - order: 4
      role: Succinate-semialdehyde and GABA-related aldehyde oxidation
      node:
        id: succinate_semialdehyde_GABA_side_route
        label: Succinate-semialdehyde and GABA side route
        module_type: METABOLIC_PATHWAY
        description: >-
          sad-I, sad-II, gabD-II, davD, davT, and related aldehyde/aminotransferase
          nodes connect ppu00650 to GABA, lysine/Dav, tyrosine, nicotinate, and
          broader amino-acid catabolic maps. These genes are retained as
          semialdehyde oxidation or aminotransferase side contexts rather than
          evidence for one dedicated butanoate route.
        annotons:
          - id: sad_I_succinate_semialdehyde_dehydrogenase
            label: "sad-I: succinate-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sad-I
            function:
              preferred_term: succinate-semialdehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0004777
                label: succinate-semialdehyde dehydrogenase (NAD+) activity
            role_description: NAD-dependent succinate-semialdehyde dehydrogenase side node.
          - id: gabD_II_succinate_semialdehyde_dehydrogenase_NADP
            label: "gabD-II: succinate-semialdehyde dehydrogenase (NADP+)"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gabD-II
            function:
              preferred_term: succinate-semialdehyde dehydrogenase (NADP+) activity
              term:
                id: GO:0036243
                label: succinate-semialdehyde dehydrogenase (NADP+) activity
            role_description: NADP-dependent GabD-family GABA-catabolic aldehyde oxidation node.
    - order: 5
      role: Broad KEGG spillovers outside the butanoate core
      node:
        id: broad_kegg_spillovers
        label: Broad KEGG spillovers outside the butanoate core
        module_type: METABOLIC_PATHWAY
        description: >-
          The full 38-gene ppu00650 batch also includes TCA succinate
          dehydrogenase subunits, acetolactate synthase/BCAA precursor genes,
          enoyl-CoA hydratases/dehydrogenases, phenylacetate and caprolactam
          pathway enzymes, FabV fatty-acid biosynthesis, and HMG-CoA
          lyase-family nodes. These should remain assigned to their narrower
          primary modules unless new organism-specific evidence connects them to
          a butanoate/PHA hypothesis.
        annotons: []
  notes: >-
    This module is intentionally boundary-oriented. It separates primary
    hydroxybutyrate/butanediol and PHA-storage nodes from reusable central-carbon
    and acyl-CoA enzymes, avoiding the misleading interpretation that KEGG
    ppu00650 is a complete, linear butanoate pathway in KT2440.
