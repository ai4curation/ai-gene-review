knowledge_gaps:
  - gap_statement: Nanodomain specificity remains unresolved in the Nitric oxide-cGMP signaling 
      pathway module.
    boundary: While compartmentalized cGMP signaling is well accepted, no analog of the A-kinase 
      anchoring proteins (AKAPs) that organize cAMP signaling has been identified for the cGMP/PKG 
      system. Whether localized cGMP signaling relies on similar scaffold proteins or on distinct 
      physical mechanisms remains an open question (mishra2025cardiaccgmpregulation pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: Redox regulation of PKG1alpha remains unresolved in the Nitric oxide-cGMP 
      signaling pathway module.
    boundary: The functional consequences of PKG1alpha oxidation at cysteine 42 are increasingly 
      recognized as important in cardiac pathology, but the precise conditions under which oxidized 
      versus reduced PKG1alpha drives distinct signaling outcomes-and whether this is 
      therapeutically exploitable-remain under active investigation (mishra2025cardiaccgmpregulation
      pages 7-8).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: Mechanistic distinction between sGC stimulators and PDE5 inhibitors remains 
      unresolved in the Nitric oxide-cGMP signaling pathway module.
    boundary: Although the dual mechanism of sGC stimulators (NO-independent stimulation plus NO 
      sensitization) theoretically provides advantages over PDE5 inhibitors under conditions of NO 
      depletion, extensive research is still needed to clarify the clinical significance of these 
      mechanistic differences across disease states (benza2024thenitricoxide-soluble pages 10-11, 
      benza2024thenitricoxide-soluble pages 4-6).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: sGC activator development remains unresolved in the Nitric oxide-cGMP signaling 
      pathway module.
    boundary: Clinical development of sGC activators has been hampered by systemic hypotension (as 
      seen with cinaciguat). Inhaled delivery strategies (e.g., mosliciguat) represent attempts to 
      achieve local activation while minimizing systemic effects, but optimal clinical applications 
      remain undefined (benza2024thenitricoxide-soluble pages 4-6, benza2024thenitricoxide-soluble 
      pages 10-11).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: Cross-species extrapolation remains unresolved in the Nitric oxide-cGMP signaling
      pathway module.
    boundary: While the canonical NO-sGC pathway is conserved, some intracellular mediators of NO 
      signaling appear to be vertebrate-specific or invertebrate-specific. Care is needed when 
      extrapolating findings from model organisms like *Drosophila* (which has a single NOS gene and
      no strict eNOS ortholog) to mammalian vascular biology (jeong2024functionandregulation pages 
      1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: IRAG1 mechanism remains unresolved in the Nitric oxide-cGMP signaling pathway 
      module.
    boundary: Although IRAG1 is established as a critical PKGIbeta substrate linking cGMP to 
      IP3R-mediated Ca2+ release inhibition, the precise molecular mechanism by which PKG-mediated 
      IRAG1 phosphorylation alters IP3R function remains incompletely resolved 
      (pruschenk2023novelfunctionalfeatures pages 16-17).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/nitric_oxide_cgmp_signaling-deep-research-falcon.md
  - gap_statement: Compensatory signaling in NOS deficiency remains unresolved in the Nitric 
      oxide-cGMP signaling pathway module.
    boundary: Proteomic studies in triple-NOS knockout mice reveal that complete loss of NO 
      signaling triggers adaptive rewiring including enhanced MAPK3/MAPK1 (ERK1/2) signaling, which 
      may represent a maladaptive compensatory mechanism promoting pathological cardiomyopathy. The 
      therapeutic implications of this rewiring remain to be explored.
