id: MODULE:nitric_oxide_cgmp_signaling
title: Nitric oxide-cGMP signaling pathway module
description: Nitric oxide activates soluble guanylate cyclase to raise cGMP, engaging PRKG and 
  cyclic nucleotide phosphodiesterases that control vascular smooth muscle tone and other 
  cGMP-dependent outputs.
