id: MODULE:notch_signaling
title: Canonical Notch signaling pathway module
description: >-
  A compact metazoan Notch signaling module. Notch is a contact-dependent
  juxtacrine pathway in which a Delta/Serrate/LAG-2 family ligand on one cell
  binds a Notch receptor on a neighboring cell, triggers ADAM/gamma-secretase
  proteolysis, releases the Notch intracellular domain, and converts CSL/RBPJ
  transcription complexes from repressors to activators of targets such as HES
  and HEY family genes. The trunk is grounded in GO:0007219 and annotated with
  curated UniProt exemplars plus PAINT ancestral nodes where the local PANTHER
  cache supports a function-by-descent claim.
status: DRAFT
evidence:
  - source_id: GO:0007219
    title: Notch signaling pathway
    statement: The module is grounded in the GO biological process term for Notch signaling.
notes: >-
  The PANTHER anchors are intentionally limited to roles with matching IBD seed
  rows in the local interpro/panther cache: NOTCH1 and DSL-family ligands in
  PTHR45836, and the HES/HEY transcriptional output family in PTHR10985.
module:
  id: notch_signaling
  label: Canonical Notch signaling pathway
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: Notch signaling pathway
      term:
        id: GO:0007219
        label: Notch signaling pathway
      description: Ligand-activated Notch receptor signaling ending in transcriptional regulation.
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: Notch/DSL contact-dependent signaling is a metazoan cell-fate pathway.
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: ligand-receptor contact
      node:
        id: notch_ligand_receptor_contact
        label: DSL ligand binding to Notch receptor
        module_type: REGULATORY_STEP
        description: >-
          A membrane-tethered Delta/Jagged/Serrate ligand on the sending cell
          binds the extracellular EGF-repeat region of a Notch receptor on the
          receiving cell. Ligand endocytosis applies force that exposes the
          receptor cleavage site.
        annotons:
          - id: dsl_ligand
            label: Delta/Jagged Notch ligand
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Delta/Serrate/LAG-2 Notch ligands
                term:
                  id: PANTHER:PTHR45836
                  label: Notch and Slit guidance protein
                representative_members:
                  - preferred_term: DLL1
                    term:
                      id: UniProtKB:O00548
                      label: Delta-like protein 1
                ancestral_nodes:
                  - preferred_term: PAINT Notch-ligand binding node PTN002371879
                    term:
                      id: PANTHER:PTN002371879
                      label: PTN002371879
                    description: >-
                      PANTHER PAINT node in PTHR45836 with IBD support for
                      Notch binding (F:GO:0005112) from Delta/Jagged seed
                      proteins; use as a ligand-role ancestry anchor.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN002371879 in PTHR45836.
            function:
              preferred_term: Notch receptor binding
              term:
                id: GO:0005112
                label: Notch binding
              targets:
                - preferred_term: Notch receptor extracellular domain
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Membrane-bound activating ligand presented by the sending cell.
          - id: notch_receptor
            label: Notch receptor
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Notch receptor family
                term:
                  id: PANTHER:PTHR45836
                  label: Notch and Slit guidance protein
                representative_members:
                  - preferred_term: NOTCH1
                    term:
                      id: UniProtKB:P46531
                      label: Neurogenic locus notch homolog protein 1
                ancestral_nodes:
                  - preferred_term: PAINT Notch-signaling receptor node PTN001933897
                    term:
                      id: PANTHER:PTN001933897
                      label: PTN001933897
                    description: >-
                      PANTHER PAINT node in PTHR45836 with IBD support for
                      Notch signaling pathway participation (P:GO:0007219) and
                      intracellular anatomical structure (C:GO:0043235).
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN001933897 in PTHR45836.
            processes:
              - preferred_term: Notch signaling pathway
                term:
                  id: GO:0007219
                  label: Notch signaling pathway
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Receptor whose ligand-induced cleavage releases the intracellular transcriptional effector.
    - order: 2
      role: receptor cleavage and NICD release
      node:
        id: notch_receptor_cleavage
        label: Proteolytic release of Notch intracellular domain
        module_type: REACTION
        description: >-
          Ligand-bound Notch is cleaved first by an ADAM metalloprotease and
          then by gamma-secretase, releasing the Notch intracellular domain
          (NICD) to enter the nucleus.
        annotons:
          - id: notch_proteolysis
            label: ADAM/gamma-secretase cleavage of Notch
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: Notch-cleaving protease module
                description: ADAM10/17 and gamma-secretase activities that release NICD.
            role_description: Irreversible proteolytic switch that converts receptor engagement into a nuclear signal.
    - order: 3
      role: CSL/RBPJ transcriptional switch
      node:
        id: notch_transcriptional_switch
        label: NICD-CSL-MAML transcriptional activation
        module_type: REGULATORY_STEP
        description: >-
          NICD binds CSL/RBPJ and Mastermind-like coactivators, displacing
          corepressors and activating Notch-response genes.
        annotons:
          - id: hes_hey_output
            label: HES/HEY transcriptional output
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HES/HEY bHLH transcriptional repressors
                term:
                  id: PANTHER:PTHR10985
                  label: Hairy and Enhancer of Split/HEY-related
                representative_members:
                  - preferred_term: HES1
                    term:
                      id: UniProtKB:Q14469
                      label: Transcription factor HES-1
                ancestral_nodes:
                  - preferred_term: PAINT HES/HEY Notch-output node PTN002590956
                    term:
                      id: PANTHER:PTN002590956
                      label: PTN002590956
                    description: >-
                      PANTHER PAINT node in PTHR10985 with IBD support for
                      Notch signaling pathway participation (P:GO:0007219).
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN002590956 in PTHR10985.
            processes:
              - preferred_term: Notch signaling pathway
                term:
                  id: GO:0007219
                  label: Notch signaling pathway
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Primary transcriptional output family that feeds back on differentiation and cell-fate programs.
  connections:
    - source: notch_ligand_receptor_contact
      target: notch_receptor_cleavage
      connection_type: CAUSES
      description: Ligand-induced mechanical activation exposes the Notch cleavage site.
    - source: notch_receptor_cleavage
      target: notch_transcriptional_switch
      connection_type: CAUSES
      description: Released NICD enters the nucleus and activates CSL/RBPJ-bound targets.
