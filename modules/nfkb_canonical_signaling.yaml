id: MODULE:nfkb_canonical_signaling
title: Canonical NF-kappaB signaling pathway module
description: >-
  A compact canonical NF-kappaB module. Pro-inflammatory receptors such as TNFR1
  assemble adaptor/ubiquitin ligase complexes, activate the IKK complex, induce
  phosphorylation and proteasomal destruction of IkappaB inhibitors, and release
  NF-kappaB dimers to enter the nucleus and drive inflammatory, survival, and
  immune-response genes. The module is grounded in GO:0007249 and includes
  curated TNFR1, TRAF2, IKK, IkappaB, and NF-kappaB exemplars, with PTN anchors
  where PAINT seed rows support the role.
status: DRAFT
evidence:
  - source_id: GO:0007249
    title: canonical NF-kappaB signal transduction
    statement: The module is grounded in the GO biological process term for canonical NF-kappaB signaling.
