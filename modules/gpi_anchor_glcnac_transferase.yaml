id: MODULE:gpi_anchor_glcnac_transferase
title: GPI anchor biosynthesis I — GlcNAc transferase (GPI-GnT) complex; PIGA/PIGC/PIGH/PIGP/PIGQ/PIGY
description: >-
  Glycosylphosphatidylinositol (GPI) anchor biosynthesis begins on the cytoplasmic face of the
  endoplasmic-reticulum membrane with the transfer of N-acetylglucosamine from UDP-GlcNAc onto
  phosphatidylinositol (PI) to form GlcNAc-PI, the first and committed step. This reaction is
  carried out by the multi-subunit GPI-N-acetylglucosaminyltransferase (GPI-GnT) complex, in which
  PIGA is the catalytic phosphatidylinositol N-acetylglucosaminyltransferase and PIGC, PIGH, PIGP,
  PIGQ (GPI1) and PIGY are required non-catalytic subunits (the Dol-P-Man synthase subunit DPM2 also
  associates with and regulates the complex). GPI anchors ultimately tether ~150 human proteins to
  the cell surface; the GlcNAc-PI product is subsequently de-N-acetylated and elaborated by the
  downstream Pig/Pgap enzymes. Defects in this first step cause GPI-deficiency disease: acquired
  somatic PIGA mutations in haematopoietic stem cells cause paroxysmal nocturnal haemoglobinuria
  (PNH), germline PIGA hypomorphs cause multiple congenital anomalies-hypotonia-seizures syndrome 2
  (MCAHS2), and biallelic PIGC/PIGH/PIGP/PIGQ/PIGY defects cause inherited GPI-deficiency
  developmental and epileptic encephalopathies (GPIBD).
status: DRAFT
