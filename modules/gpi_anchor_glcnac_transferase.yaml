  notes: >-
    First step of GPI-anchor biosynthesis (GlcNAc-PI synthesis), grounded to the human GPI-GnT
    complex: catalytic PIGA (UniProtKB:P37287, GO:0017176, EC 2.4.1.198) plus the required
    non-catalytic subunits PIGC (Q92535), PIGH (Q14442), PIGP (P57054), PIGQ/GPI1 (Q9BRB3) and
    PIGY (Q3MUY2), all part of the GPI-GnT complex (GO:0000506). The regulatory DPM2 subunit (also
    a Dol-P-Man synthase subunit) associates with the complex and is reviewed elsewhere. GO
    molecular-function/BP/location terms were taken from the completed human gene reviews and
    verified against the local go.db; the reaction (R-HSA-162730) and its parent pathway
    (R-HSA-162710) were verified against the local reactome cache. The step is modelled as a single
    PROTEIN_COMPLEX node: only PIGA carries a molecular-function term (the catalytic GlcNAc
    transferase); the accessory subunits are represented by their GPI-anchor-biosynthesis
    biological-process role (they have no independent catalytic MF — PIGP and PIGY carry the
    complex activity only with a `contributes_to` qualifier in GOA). Downstream, GlcNAc-PI is
    de-N-acetylated (PIGL), inositol-acylated (PIGW), mannosylated and EtNP-modified (PIGM/PIGX,
    PIGV, PIGB, PIGN, PIGO, PIGF, PIGG), then the completed GPI is transferred to protein by the
    GPI transamidase (PIGK/PIGS/PIGT/PIGU/GPAA1) and remodelled (PGAP1/2/3/…) — separate modules to
    follow. Disorders: PNH (somatic PIGA), MCAHS2 (germline PIGA), and inherited GPI-deficiency
    epileptic encephalopathies (PIGC/PIGH/PIGP/PIGQ/PIGY).
