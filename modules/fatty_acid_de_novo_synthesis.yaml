id: MODULE:fatty_acid_de_novo_synthesis
title: De novo fatty acid synthesis / lipogenesis (ACLY -> ACACA/ACACB -> FASN -> OLAH)
description: >-
  De novo lipogenesis builds long-chain saturated fatty acids (chiefly palmitate, C16:0) from carbohydrate-
  derived carbon in the cytosol, supplying membrane lipids, storage triacylglycerol and signalling
  precursors. Citrate exported from mitochondria is cleaved by ATP-citrate lyase (ACLY) to regenerate
  cytosolic acetyl-CoA (plus oxaloacetate); this acetyl-CoA also feeds cholesterol synthesis and protein
  acetylation. Acetyl-CoA carboxylase then carboxylates acetyl-CoA to malonyl-CoA in the committed, rate-
  limiting step - a biotin-dependent reaction carried out by two isozymes with distinct roles: the cytosolic
  ACACA (ACC1) supplies malonyl-CoA for fatty acid synthesis, whereas ACACB (ACC2), anchored at the
  mitochondrial outer membrane, makes a malonyl-CoA pool that inhibits carnitine palmitoyltransferase 1 and
  thereby restrains fatty acid beta-oxidation. Fatty acid synthase (FASN), a homodimeric multifunctional
  megaenzyme, then condenses one acetyl-CoA primer with seven malonyl-CoA units in iterative NADPH-dependent
  cycles - using its ketoacyl-synthase, malonyl/acetyl-transacylase, ketoacyl-reductase, dehydratase, enoyl-
  reductase, acyl-carrier and thioesterase activities - to produce palmitate. The auxiliary thioesterase
  OLAH (thioesterase II) can release medium-chain fatty acids early from the FASN acyl-carrier, shifting the
  product spectrum (e.g. in lactating mammary gland). ACLY, ACACA and FASN are central to lipogenic tissues
  and are cancer and metabolic-disease drug targets.
status: DRAFT
evidence:
  - source_id: GO:0006633
    title: fatty acid biosynthetic process
    statement: ACLY, ACACA/ACACB, FASN and OLAH carry out de novo fatty acid synthesis (GO:0006633).
  - source_id: GO:2001295
    title: malonyl-CoA biosynthetic process
    statement: ACACA/ACACB produce malonyl-CoA, the C2-donor and FASN substrate (GO:2001295).
  - source_id: file:human/ACLY/ACLY-ai-review.yaml
    title: ACLY gene review (human)
    statement: ATP-citrate lyase (UniProtKB:P53396, GO:0003878) matches the completed human ACLY review.
  - source_id: file:human/ACACA/ACACA-ai-review.yaml
    title: ACACA gene review (human)
    statement: Acetyl-CoA carboxylase 1 (cytosolic) (UniProtKB:Q13085, GO:0003989) matches the completed human ACACA review.
  - source_id: file:human/ACACB/ACACB-ai-review.yaml
    title: ACACB gene review (human)
    statement: Acetyl-CoA carboxylase 2 (mito-OM, FAO-regulating) (UniProtKB:O00763, GO:0003989) matches the completed human ACACB review.
  - source_id: file:human/FASN/FASN-ai-review.yaml
    title: FASN gene review (human)
    statement: Fatty acid synthase (UniProtKB:P49327, GO:0004312) matches the completed human FASN review.
  - source_id: file:human/OLAH/OLAH-ai-review.yaml
    title: OLAH gene review (human)
    statement: Oleoyl-ACP hydrolase / thioesterase II (UniProtKB:Q9NV23, GO:0016297) matches the completed human OLAH review.
