  connections:
    - source: acetyl_coa_generation
      target: malonyl_coa_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: ACLY-made acetyl-CoA is the substrate ACC carboxylates to malonyl-CoA (and the FASN primer).
    - source: malonyl_coa_synthesis
      target: palmitate_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: ACACA-made malonyl-CoA is the C2-donor FASN uses to elongate the chain.
    - source: palmitate_synthesis
      target: medium_chain_release
      connection_type: PROVIDES_INPUT_FOR
      description: OLAH hydrolyses the FASN-bound acyl-ACP to release medium-chain fatty acids early.
  notes: >-
    De novo fatty acid synthesis / lipogenesis (GO:0006633), grounded to five completed human gene reviews.
    Cytosolic pathway: ACLY (P53396 PTHR23118, GO:0003878) citrate -> acetyl-CoA + OAA; ACC (biotin-dependent,
    GO:0003989) acetyl-CoA -> malonyl-CoA - two isozymes, both PTHR45728, modelled on one node: ACACA/ACC1
    (Q13085, cytosolic, lipogenic, rate-limiting) and ACACB/ACC2 (O00763, mitochondrial-outer-membrane
    GO:0005741, its malonyl-CoA inhibits CPT1 to restrain beta-oxidation - a regulatory role, captured in the
    ACACB review as negative regulation of fatty acid beta-oxidation); FASN (P49327 PTHR43775, GO:0004312, +
    seven partial-domain activities in its review) condenses acetyl-CoA + 7 malonyl-CoA (NADPH) -> palmitate;
    OLAH/thioesterase II (Q9NV23 PTHR11487, GO:0016297) releases medium-chain fatty acids early (mammary
    gland). Node locations are cytosol (the lipogenic compartment); ACACB's mito-OM location and FAO-
    regulatory role are noted in its gene review. Curation: ACACA mitochondrion IBA is a paralog/compartment
    mis-propagation (that is ACACB); OLAH acyl-CoA-hydrolase IEAs are homology-inferred vs its physiological
    acyl-ACP preference. Drug/cancer targets (ACLY/ACACA/FASN). GO term ids/labels verified against the local
    go.db; module passes structural + term-label validation.
