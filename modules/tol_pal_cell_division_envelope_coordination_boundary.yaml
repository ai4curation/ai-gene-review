notes: The original chromosome/cell-cycle partition surfaced tolQ, tolR, tolB, pal, and cpoB. TolA was promoted from the broad transport/membrane bucket because it is a core Tol-Pal component required for a satisfiable envelope-spanning Tol-Pal module. TolA's nucleosome/chromatin GO annotations were removed in the gene review as H1/H5-like InterPro over-propagations.
