id: MODULE:tol_pal_cell_division_envelope_coordination_boundary
title: Tol-Pal envelope and cell-division coordination boundary
description: Boundary module for Pseudomonas putida KT2440 Tol-Pal-mediated envelope coordination during cell division. The module captures TolQ, TolR, TolA, TolB, and Pal as the envelope-spanning Tol-Pal machinery supporting outer-membrane invagination and envelope integrity, with CpoB as an adjacent periplasmic coordinator of peptidoglycan synthesis and outer-membrane constriction.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_partition.tsv
  title: PSEPK chromosome/cell-cycle functional-bucket partition
  statement: The chromosome/cell-cycle functional bucket includes tolQ, tolR, tolB, pal, and cpoB as a Tol-Pal envelope/division coordination sub-batch.
- source_id: file:projects/P_PUTIDA/batches/module_chromosome_partition_cell_cycle_tol_pal.tsv
  title: PSEPK Tol-Pal envelope/division coordination sub-batch
  statement: The completed sub-batch adds promoted hole-filling member tolA to the five chromosome/cell-cycle primary bucket genes.
- source_id: file:PSEPK/tolQ/tolQ-ai-review.yaml
  title: PSEPK tolQ gene review
  statement: The curated tolQ review supports TolQ as an inner-membrane Tol-Pal component involved in cell division, with protein-import and bacteriocin-transport terms treated as non-core or over-propagated side context.
- source_id: file:PSEPK/tolR/tolR-ai-review.yaml
  title: PSEPK tolR gene review
  statement: The curated tolR review supports TolR as an inner-membrane Tol-Pal energy-coupling component involved in cell division and removes generic transporter over-propagation from the core role.
- source_id: file:PSEPK/tolA/tolA-ai-review.yaml
  title: PSEPK tolA gene review
  statement: The curated tolA review promotes TolA from the broad transport/membrane bucket as the missing core Tol-Pal connector component and removes chromatin/nucleosome electronic over-propagations.
- source_id: file:PSEPK/tolB/tolB-ai-review.yaml
  title: PSEPK tolB gene review
  statement: The curated tolB review supports TolB as the periplasmic Tol-Pal component involved in cell division, with protein transport/import terms kept outside the core pathway role.
- source_id: file:PSEPK/pal/pal-ai-review.yaml
  title: PSEPK pal gene review
  statement: The curated pal review supports Pal/OprL as the outer-membrane peptidoglycan-binding Tol-Pal lipoprotein involved in cell division.
- source_id: file:PSEPK/cpoB/cpoB-ai-review.yaml
  title: PSEPK cpoB gene review
  statement: The curated cpoB review supports CpoB as a periplasmic coordinator of peptidoglycan synthesis and outer-membrane constriction during FtsZ-dependent cytokinesis.
