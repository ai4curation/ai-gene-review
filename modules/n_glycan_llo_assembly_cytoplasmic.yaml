id: MODULE:n_glycan_llo_assembly_cytoplasmic
title: N-glycan LLO assembly I — cytoplasmic face (to Man5GlcNAc2-PP-dolichol); DPAGT1/ALG13/ALG14/ALG1/ALG2/ALG11
description: >-
  N-linked glycosylation begins with the stepwise assembly of the dolichol-linked
  oligosaccharide (LLO, or dolichol-PP-oligosaccharide) on the cytoplasmic face of the
  endoplasmic-reticulum membrane. Using nucleotide-sugar donors from the cytosol, the pathway
  builds a Man5GlcNAc2 glycan on the polyprenol carrier dolichyl phosphate before the
  intermediate is flipped into the ER lumen. DPAGT1 (GlcNAc-1-phosphotransferase, the first
  and committed step, and the tunicamycin target) transfers GlcNAc-1-P from UDP-GlcNAc onto
  dolichyl phosphate to give GlcNAc-PP-dolichol; the bipartite UDP-GlcNAc transferase
  ALG13/ALG14 (ALG13 catalytic, ALG14 membrane-anchoring) adds the second GlcNAc to form the
  chitobiose core GlcNAc2-PP-dolichol; ALG1 (beta-1,4-mannosyltransferase) adds the first
  mannose; the bifunctional ALG2 (alpha-1,3 and alpha-1,6 mannosyltransferase) adds the second
  and third mannoses to give Man3GlcNAc2-PP-dolichol; and ALG11 (alpha-1,2-mannosyltransferase)
  adds the fourth and fifth mannoses to complete Man5GlcNAc2-PP-dolichol, the final
  cytoplasmic-face intermediate (subsequently flipped to the lumen by the RFT1 flippase, and
  extended by the lumenal ALG enzymes). All the mannose-addition steps in this segment use
  GDP-mannose. Inherited defects in each step cause a congenital disorder of glycosylation
  (CDG type I): DPAGT1-CDG (and a congenital myasthenic syndrome), ALG13-CDG (an X-linked
  developmental/epileptic encephalopathy), ALG14-CDG (congenital myasthenic syndrome), ALG1-CDG,
  ALG2-CDG (and CMS14) and ALG11-CDG.
status: DRAFT
evidence:
  - source_id: GO:0006488
    title: dolichol-linked oligosaccharide biosynthetic process
    statement: >-
      The module is grounded in dolichol-linked oligosaccharide biosynthetic process
      (GO:0006488); it covers the cytoplasmic-face assembly of Man5GlcNAc2-PP-dolichol.
  - source_id: GO:0006487
    title: protein N-linked glycosylation
    statement: >-
      The completed LLO is the donor for protein N-linked glycosylation (GO:0006487); each
      enzyme's loss reduces N-glycan occupancy (CDG type I).
  - source_id: Reactome:R-HSA-446193
    title: "Biosynthesis of the N-glycan precursor (dolichol lipid-linked oligosaccharide, LLO) and transfer to a nascent protein"
    statement: >-
      Step order, intermediates and reaction stoichiometries follow the human Reactome LLO
      biosynthesis sub-pathway (R-HSA-446191/446207/446218/446208 for the cytoplasmic-face steps).
  - source_id: file:human/DPAGT1/DPAGT1-ai-review.yaml
    title: DPAGT1 gene review (human)
    statement: >-
      The committed GlcNAc-1-P transfer to Dol-P (UniProtKB:Q9H3H5, GO:0003975) matches the
      completed human DPAGT1 review.
  - source_id: file:human/ALG13/ALG13-ai-review.yaml
    title: ALG13 gene review (human)
    statement: >-
      The catalytic subunit of the second-GlcNAc transfer (UniProtKB:Q9NP73, GO:0004577)
      matches the completed human ALG13 review.
  - source_id: file:human/ALG14/ALG14-ai-review.yaml
    title: ALG14 gene review (human)
    statement: >-
      The ER-membrane anchor of the ALG13/ALG14 transferase (UniProtKB:Q96F25, GO:0043495)
      matches the completed human ALG14 review.
  - source_id: file:human/ALG1/ALG1-ai-review.yaml
    title: ALG1 gene review (human)
    statement: >-
      The first-mannose beta-1,4-mannosyltransferase step (UniProtKB:Q9BT22, GO:0004578)
      matches the completed human ALG1 review.
  - source_id: file:human/ALG2/ALG2-ai-review.yaml
    title: ALG2 gene review (human)
    statement: >-
      The second/third-mannose alpha-1,3/1,6-mannosyltransferase step (UniProtKB:Q9H553,
      GO:0004378/GO:0102704) matches the completed human ALG2 review.
  - source_id: file:human/ALG11/ALG11-ai-review.yaml
    title: ALG11 gene review (human)
    statement: >-
      The fourth/fifth-mannose alpha-1,2-mannosyltransferase step (UniProtKB:Q2TAA5,
      GO:0004377) matches the completed human ALG11 review.
module:
  id: n_glycan_llo_assembly_cytoplasmic
  label: N-glycan LLO assembly, cytoplasmic face (to Man5GlcNAc2-PP-dolichol)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: dolichol-linked oligosaccharide biosynthetic process
      term:
        id: GO:0006488
        label: dolichol-linked oligosaccharide biosynthetic process
      description: >-
        Cytoplasmic-face assembly of the dolichol-PP-oligosaccharide precursor up to
        Man5GlcNAc2-PP-dolichol.
    - preferred_term: protein N-linked glycosylation
      term:
        id: GO:0006487
        label: protein N-linked glycosylation
      description: The assembled LLO is the glycan donor for co-translational N-glycosylation.
  context:
    cellular_components:
      - preferred_term: cytoplasmic side of endoplasmic reticulum membrane
        term:
          id: GO:0098554
          label: cytoplasmic side of endoplasmic reticulum membrane
        description: All steps in this segment occur on the cytoplasmic face of the ER membrane.
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: The enzymes are integral or peripheral ER-membrane proteins.
  parts:
    - order: 1
      role: committed step (GlcNAc-1-P onto dolichyl phosphate)
      node:
        id: dpagt1_step
        label: UDP-GlcNAc + dolichyl phosphate to GlcNAc-PP-dolichol
        module_type: REACTION
        annotons:
          - id: dpagt1_activity
            label: "DPAGT1: GlcNAc-1-phosphotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GlcNAc-1-phosphotransferase family (DPAGT1)
                term:
                  id: PANTHER:PTHR10571
                  label: UDP-GLCNAC--DOLICHYL-PHOSPHATE GLCNAC-1-PHOSPHOTRANSFERASE
                representative_members:
                  - preferred_term: DPAGT1 (human)
                    term:
                      id: UniProtKB:Q9H3H5
                      label: UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminephosphotransferase
            function:
              preferred_term: UDP-N-acetylglucosamine-dolichyl-phosphate N-acetylglucosaminephosphotransferase activity
              term:
                id: GO:0003975
                label: UDP-N-acetylglucosamine-dolichyl-phosphate N-acetylglucosaminephosphotransferase activity
              substrates:
                - preferred_term: UDP-GlcNAc
                - preferred_term: dolichyl phosphate
              products:
                - preferred_term: GlcNAc-PP-dolichol
                - preferred_term: UMP
              evidence:
                - source_id: EC:2.7.8.15
                  statement: GlcNAc-1-phosphotransferase; first, committed step of LLO assembly; tunicamycin target
                - source_id: Reactome:R-HSA-446191
                  statement: "Addition of N-acetyl-D-glucosamine to Dolichyl phosphate (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              First and committed step; deficiency = DPAGT1-CDG (CDG-Ij) and a congenital
              myasthenic syndrome.
    - order: 2
      role: second GlcNAc (chitobiose core)
      node:
        id: alg13_14_step
        label: GlcNAc-PP-dolichol to GlcNAc2-PP-dolichol
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: alg13_activity
            label: "ALG13: catalytic subunit of the UDP-GlcNAc transferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ALG13 glycosyltransferase-28 family (catalytic subunit)
                term:
                  id: PANTHER:PTHR12867
                  label: UDP-N-ACETYLGLUCOSAMINE TRANSFERASE SUBUNIT ALG13
                representative_members:
                  - preferred_term: ALG13 (human)
                    term:
                      id: UniProtKB:Q9NP73
                      label: UDP-N-acetylglucosamine transferase subunit ALG13 homolog
            function:
              preferred_term: N-acetylglucosaminyldiphosphodolichol N-acetylglucosaminyltransferase activity
              term:
                id: GO:0004577
                label: N-acetylglucosaminyldiphosphodolichol N-acetylglucosaminyltransferase activity
              substrates:
                - preferred_term: UDP-GlcNAc
                - preferred_term: GlcNAc-PP-dolichol
              products:
                - preferred_term: GlcNAc2-PP-dolichol (chitobiose core)
                - preferred_term: UDP
              evidence:
                - source_id: EC:2.4.1.141
                  statement: catalytic (glycosyltransferase) subunit; adds the second GlcNAc to form the chitobiose core; requires ALG14 for ER anchoring/activity
                - source_id: Reactome:R-HSA-446207
                  statement: "ALG13:ALG14 transfers GlcNAc from UDP-GlcNAc to GlcNAcDOLP (human Reactome reaction)"
            locations:
              - preferred_term: cytoplasmic side of endoplasmic reticulum membrane
                term:
                  id: GO:0098554
                  label: cytoplasmic side of endoplasmic reticulum membrane
            role_description: >-
              Catalytic subunit; deficiency = ALG13-CDG (X-linked developmental/epileptic
              encephalopathy).
          - id: alg14_activity
            label: "ALG14: membrane-anchoring subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ALG14 family (membrane-anchoring subunit)
                term:
                  id: PANTHER:PTHR12154
                  label: UDP-N-ACETYLGLUCOSAMINE TRANSFERASE SUBUNIT ALG14
                representative_members:
                  - preferred_term: ALG14 (human)
                    term:
                      id: UniProtKB:Q96F25
                      label: UDP-N-acetylglucosamine transferase subunit ALG14 homolog
            function:
              preferred_term: protein-membrane adaptor activity
              term:
                id: GO:0043495
                label: protein-membrane adaptor activity
              substrates:
                - preferred_term: ALG13 (catalytic subunit)
              products:
                - preferred_term: ER-membrane-anchored ALG13/ALG14 transferase
              evidence:
                - source_id: Reactome:R-HSA-446207
                  statement: "ALG13:ALG14 transfers GlcNAc from UDP-GlcNAc to GlcNAcDOLP (human Reactome reaction)"
                - source_id: file:human/ALG14/ALG14-ai-review.yaml
                  statement: non-catalytic ER-membrane anchor that recruits soluble ALG13; deficiency = ALG14-CDG congenital myasthenic syndrome
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Recruits/anchors catalytic ALG13 to the ER; the ALG13/ALG14 heterodimer forms the
              functional UDP-GlcNAc transferase.
    - order: 3
      role: first mannose (beta-1,4)
      node:
        id: alg1_step
        label: GlcNAc2-PP-dolichol to Man1GlcNAc2-PP-dolichol
        module_type: REACTION
        annotons:
          - id: alg1_activity
            label: "ALG1: beta-1,4-mannosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ALG1 beta-mannosyltransferase family
                term:
                  id: PANTHER:PTHR13036
                  label: CHITOBIOSYLDIPHOSPHODOLICHOL BETA-MANNOSYLTRANSFERASE
                representative_members:
                  - preferred_term: ALG1 (human)
                    term:
                      id: UniProtKB:Q9BT22
                      label: Chitobiosyldiphosphodolichol beta-mannosyltransferase
            function:
              preferred_term: chitobiosyldiphosphodolichol beta-mannosyltransferase activity
              term:
                id: GO:0004578
                label: chitobiosyldiphosphodolichol beta-mannosyltransferase activity
              substrates:
                - preferred_term: GDP-mannose
                - preferred_term: GlcNAc2-PP-dolichol
              products:
                - preferred_term: Man1GlcNAc2-PP-dolichol
                - preferred_term: GDP
              evidence:
                - source_id: EC:2.4.1.142
                  statement: beta-1,4-mannosyltransferase; adds the first mannose from GDP-Man to the chitobiose core
                - source_id: Reactome:R-HSA-446218
                  statement: "Addition of the first mannose to the N-glycan precursor by ALG1 (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: First mannose of the LLO; deficiency = ALG1-CDG (CDG-Ik).
    - order: 4
      role: second and third mannoses (alpha-1,3 and alpha-1,6)
      node:
        id: alg2_step
        label: Man1GlcNAc2-PP-dolichol to Man3GlcNAc2-PP-dolichol
        module_type: REACTION
        annotons:
          - id: alg2_activity
            label: "ALG2: alpha-1,3/1,6-mannosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ALG2 mannosyltransferase family
                term:
                  id: PANTHER:PTHR45918
                  label: ALPHA-1,3/1,6-MANNOSYLTRANSFERASE ALG2
                representative_members:
                  - preferred_term: ALG2 (human)
                    term:
                      id: UniProtKB:Q9H553
                      label: Alpha-1,3/1,6-mannosyltransferase ALG2
            function:
              preferred_term: GDP-Man:Man(1)GlcNAc(2)-PP-Dol alpha-1,3-mannosyltransferase activity
              term:
                id: GO:0004378
                label: GDP-Man:Man(1)GlcNAc(2)-PP-Dol alpha-1,3-mannosyltransferase activity
              substrates:
                - preferred_term: GDP-mannose (x2)
                - preferred_term: Man1GlcNAc2-PP-dolichol
              products:
                - preferred_term: Man3GlcNAc2-PP-dolichol
                - preferred_term: GDP
              evidence:
                - source_id: EC:2.4.1.132
                  statement: bifunctional alpha-1,3- (EC 2.4.1.132) and alpha-1,6- (EC 2.4.1.257, GO:0102704) mannosyltransferase; adds the 2nd and 3rd mannoses to give Man3GlcNAc2-PP-Dol
                - source_id: Reactome:R-HSA-446208
                  statement: "Addition of a second mannose to the N-glycan precursor by ALG2 (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Bifunctional; adds 2nd (alpha-1,3) and 3rd (alpha-1,6) mannoses. Deficiency =
              ALG2-CDG (CDG-Ii) and congenital myasthenic syndrome (CMS14).
    - order: 5
      role: fourth and fifth mannoses (alpha-1,2) — completes Man5
      node:
        id: alg11_step
        label: Man3GlcNAc2-PP-dolichol to Man5GlcNAc2-PP-dolichol
        module_type: REACTION
        annotons:
          - id: alg11_activity
            label: "ALG11: alpha-1,2-mannosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ALG11 mannosyltransferase family
                term:
                  id: PANTHER:PTHR45919
                  label: GDP-MAN MAN(3)GLCNAC(2)-PP-DOL ALPHA-1,2-MANNOSYLTRANSFERASE
                representative_members:
                  - preferred_term: ALG11 (human)
                    term:
                      id: UniProtKB:Q2TAA5
                      label: GDP-Man:Man(3)GlcNAc(2)-PP-Dol alpha-1,2-mannosyltransferase
            function:
              preferred_term: GDP-Man:Man(3)GlcNAc(2)-PP-Dol alpha-1,2-mannosyltransferase activity
              term:
                id: GO:0004377
                label: GDP-Man:Man(3)GlcNAc(2)-PP-Dol alpha-1,2-mannosyltransferase activity
              substrates:
                - preferred_term: GDP-mannose (x2)
                - preferred_term: Man3GlcNAc2-PP-dolichol
              products:
                - preferred_term: Man5GlcNAc2-PP-dolichol
                - preferred_term: GDP
              evidence:
                - source_id: EC:2.4.1.131
                  statement: alpha-1,2-mannosyltransferase; adds the 4th and 5th mannoses to complete the cytoplasmic-face intermediate Man5GlcNAc2-PP-Dol
                - source_id: Reactome:R-HSA-446193
                  statement: "Biosynthesis of the N-glycan precursor (dolichol lipid-linked oligosaccharide, LLO) and transfer to a nascent protein (human Reactome pathway)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Completes Man5GlcNAc2-PP-Dol, the final cytoplasmic-face LLO intermediate (then
              flipped to the lumen by RFT1). Deficiency = ALG11-CDG (CDG-Ip).
  connections:
    - source: dpagt1_step
      target: alg13_14_step
      connection_type: PROVIDES_INPUT_FOR
      description: GlcNAc-PP-dolichol from DPAGT1 receives the second GlcNAc from the ALG13/ALG14 transferase.
    - source: alg13_14_step
      target: alg1_step
      connection_type: PROVIDES_INPUT_FOR
      description: The chitobiose core GlcNAc2-PP-dolichol is the acceptor for the first mannose (ALG1).
    - source: alg1_step
      target: alg2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Man1GlcNAc2-PP-dolichol from ALG1 is extended by ALG2 with two more mannoses.
    - source: alg2_step
      target: alg11_step
      connection_type: PROVIDES_INPUT_FOR
      description: Man3GlcNAc2-PP-dolichol from ALG2 is extended by ALG11 to Man5GlcNAc2-PP-dolichol.
  notes: >-
    Cytoplasmic-face segment of dolichol-linked oligosaccharide (LLO) assembly, grounded to the
    human enzymes DPAGT1 (UniProtKB:Q9H3H5, GO:0003975, EC 2.7.8.15), the ALG13/ALG14 UDP-GlcNAc
    transferase (Q9NP73 GO:0004577 catalytic + Q96F25 GO:0043495 anchor, EC 2.4.1.141), ALG1
    (Q9BT22, GO:0004578, EC 2.4.1.142), ALG2 (Q9H553, GO:0004378/GO:0102704, EC 2.4.1.132/257)
    and ALG11 (Q2TAA5, GO:0004377, EC 2.4.1.131). GO molecular-function/location terms were taken
    from the completed human gene reviews and verified against the local go.db; Reactome reaction
    ids/titles were verified against the local reactome cache. Each step uses a PANTHER family
    selector with the human enzyme as representative so the module generalises across
    orthologs/paralogs. The ALG13/ALG14 step is modelled as a PROTEIN_COMPLEX node (catalytic +
    membrane-anchoring subunits; ALG14's core function is the non-catalytic adaptor activity
    GO:0043495, not a transferase term). Sugar donors are cytosolic UDP-GlcNAc (DPAGT1, ALG13/14)
    and GDP-mannose (ALG1, ALG2, ALG11). Downstream, Man5GlcNAc2-PP-Dol is flipped into the ER
    lumen by the RFT1 flippase (already reviewed) and extended by the lumenal ALG enzymes (ALG3,
    ALG9, ALG12, ALG6, ALG8, ALG10 — a separate module), then transferred to protein by the
    oligosaccharyltransferase. Dolichol-phosphate and the Dol-P-Man/Dol-P-Glc donors are supplied
    by a further module (DOLK, SRD5A3, DPM1/2/3, MPDU1, ALG5). Disorders: each step's loss is a
    CDG type I (DPAGT1-, ALG13-, ALG14-, ALG1-, ALG2-, ALG11-CDG), several also presenting as
    congenital myasthenic syndromes.
