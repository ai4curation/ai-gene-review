                  statement: imidazoleglycerol-phosphate synthase, cyclase (HisF) component
                  notes: "KEGG:R04558; HMM NCBIfam:TIGR00735"
            role_description: Cyclase subunit; cleaves PRFAR to IGP and AICAR using channelled ammonia.
          - id: hisH_activity
            label: "hisH: IGP synthase, glutamine amidotransferase subunit"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: imidazoleglycerol-phosphate synthase activity
