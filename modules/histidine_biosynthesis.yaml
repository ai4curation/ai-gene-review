id: MODULE:histidine_biosynthesis
title: L-histidine biosynthesis (microbial)
description: >-
  De novo biosynthesis of L-histidine from 5-phospho-alpha-D-ribose
  1-diphosphate (PRPP) and ATP. This is an ancient, largely linear pathway of ten
  enzymatic activities that is broadly conserved across bacteria, archaea, fungi,
  and plants, and is the canonical microbial route. The pathway is metabolically
  unusual in that its purine-like intermediates connect it to nucleotide
  metabolism: the imidazole-glycerol-phosphate synthase step releases AICAR
  (5-aminoimidazole-4-carboxamide ribonucleotide), a purine-biosynthesis
  intermediate, recycling the adenine ring of ATP back into the nucleotide pool.
  Several activities are commonly fused or bifunctional in microbes (e.g. the
  HisIE pyrophosphohydrolase/cyclohydrolase, and the HisB dehydratase fused to a
  histidinol-phosphate phosphatase domain in enteric bacteria), and the terminal
  HisD histidinol dehydrogenase performs two successive NAD+-dependent oxidations
  through a histidinal intermediate. The pathway is energetically expensive and is
  tightly regulated, classically by feedback inhibition of the first committed
  enzyme (ATP phosphoribosyltransferase, HisG) by L-histidine.
status: DRAFT
evidence:
  - source_id: GapMind:aa
    title: GapMind for amino acid biosynthesis
    statement: >-
      Step set and characterized-protein groundings derive from the GapMind
      amino-acid biosynthesis pathway definition his.steps (PaperBLAST, Price &
      Arkin, LBL).
    url: https://papers.genomics.lbl.gov/cgi-bin/gapView.cgi?gdb=NCBI&set=aa&path=his
  - source_id: MetaCyc:HISTSYN-PWY
    title: L-histidine biosynthesis
    statement: GapMind bases the histidine pathway on the MetaCyc pathway HISTSYN-PWY.
  - source_id: GO:0000105
    title: L-histidine biosynthetic process
    statement: The module is grounded in the GO biological-process term for histidine biosynthesis.
module:
  id: histidine_biosynthesis
  label: L-histidine biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-histidine biosynthetic process
      term:
        id: GO:0000105
        label: L-histidine biosynthetic process
      description: Formation of L-histidine from PRPP and ATP via ten enzymatic activities.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: In bacteria the pathway operates in the cytoplasm.
  parts:
    - order: 1
      role: PRPP supply (shared, not histidine-specific)
      optional: false
      node:
        id: prs_step
        label: Ribose-5-phosphate to PRPP
        module_type: REACTION
        annotons:
          - id: prs_activity
            label: "prs: ribose-phosphate diphosphokinase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: ribose phosphate diphosphokinase activity
                term:
                  id: GO:0004749
                  label: ribose phosphate diphosphokinase activity
            function:
              preferred_term: ribose phosphate diphosphokinase activity
              term:
                id: GO:0004749
                label: ribose phosphate diphosphokinase activity
              substrates:
                - preferred_term: D-ribose 5-phosphate
                - preferred_term: ATP
              products:
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
                - preferred_term: AMP
              evidence:
                - source_id: EC:2.7.6.1
                  statement: ribose-phosphate diphosphokinase
                  notes: "ModelSEED:rxn00770; KEGG:R01049; MetaCyc:PRPPSYN-RXN"
            role_description: >-
              Provides PRPP, the entry metabolite. This activity is shared with
              nucleotide and tryptophan biosynthesis and is not specific to the
              histidine pathway, so it is included as context rather than as a
              committed histidine step.
    - order: 2
      role: first committed step
      node:
        id: hisG_step
        label: PRPP to phosphoribosyl-ATP
        module_type: REACTION
        annotons:
          - id: hisG_activity
            label: "hisG: ATP phosphoribosyltransferase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: ATP phosphoribosyltransferase activity
                term:
                  id: GO:0003879
                  label: ATP phosphoribosyltransferase activity
            function:
              preferred_term: ATP phosphoribosyltransferase activity
              term:
                id: GO:0003879
                label: ATP phosphoribosyltransferase activity
              substrates:
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
                - preferred_term: ATP
              products:
                - preferred_term: N1-(5-phospho-beta-D-ribosyl)-ATP (phosphoribosyl-ATP)
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.4.2.17
                  statement: ATP phosphoribosyltransferase
                  notes: "ModelSEED:rxn00789; KEGG:R01071; MetaCyc:ATPPHOSPHORIBOSYLTRANS-RXN"
            role_description: >-
              First and committed step of histidine biosynthesis; the classic site
              of feedback inhibition by L-histidine.
    - order: 3
      role: pyrophosphohydrolase (often HisIE bifunctional)
      node:
        id: hisI_step
        label: Phosphoribosyl-ATP to phosphoribosyl-AMP
        module_type: REACTION
        annotons:
          - id: hisI_activity
            label: "hisI: phosphoribosyl-ATP diphosphatase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphoribosyl-ATP diphosphatase activity
                term:
                  id: GO:0004636
                  label: phosphoribosyl-ATP diphosphatase activity
            function:
              preferred_term: phosphoribosyl-ATP diphosphatase activity
              term:
                id: GO:0004636
                label: phosphoribosyl-ATP diphosphatase activity
              substrates:
                - preferred_term: N1-(5-phospho-beta-D-ribosyl)-ATP (phosphoribosyl-ATP)
                - preferred_term: water
              products:
                - preferred_term: 1-(5-phospho-beta-D-ribosyl)-AMP (phosphoribosyl-AMP)
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:3.6.1.31
                  statement: phosphoribosyl-ATP pyrophosphohydrolase
                  notes: "ModelSEED:rxn02834; KEGG:R04035; MetaCyc:HISTPRATPHYD-RXN"
            role_description: >-
              In many bacteria the HisI pyrophosphohydrolase and HisE
              cyclohydrolase activities reside on a single bifunctional HisIE
              protein.
    - order: 4
      role: cyclohydrolase (often HisIE bifunctional)
      node:
        id: hisE_step
        label: Phosphoribosyl-AMP to ProFAR
        module_type: REACTION
        annotons:
          - id: hisE_activity
            label: "hisE: phosphoribosyl-AMP cyclohydrolase"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: phosphoribosyl-AMP cyclohydrolase activity
                term:
                  id: GO:0004635
                  label: phosphoribosyl-AMP cyclohydrolase activity
              family:
                preferred_term: phosphoribosyl-AMP cyclohydrolase (HisE / HisIE)
                term:
                  id: Pfam:PF01502
                  label: phosphoribosyl-AMP cyclohydrolase
            function:
              preferred_term: phosphoribosyl-AMP cyclohydrolase activity
              term:
                id: GO:0004635
                label: phosphoribosyl-AMP cyclohydrolase activity
              substrates:
                - preferred_term: 1-(5-phospho-beta-D-ribosyl)-AMP (phosphoribosyl-AMP)
                - preferred_term: water
              products:
                - preferred_term: >-
                    5-[(5-phospho-1-deoxy-D-ribulos-1-ylamino)methylideneamino]-1-(5-phospho-beta-D-ribosyl)imidazole-4-carboxamide
                    (ProFAR)
              evidence:
                - source_id: EC:3.5.4.19
                  statement: phosphoribosyl-AMP cyclohydrolase
                  notes: "ModelSEED:rxn02835; KEGG:R04037; MetaCyc:HISTCYCLOHYD-RXN; HMM Pfam:PF01502"
    - order: 5
      role: amino-isomerase
      node:
        id: hisA_step
        label: ProFAR to PRFAR
        module_type: REACTION
        annotons:
          - id: hisA_activity
            label: "hisA: ProFAR isomerase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 1-(5-phosphoribosyl)-5-[(5-phosphoribosylamino)methylideneamino]imidazole-4-carboxamide isomerase activity
                term:
                  id: GO:0003949
                  label: 1-(5-phosphoribosyl)-5-[(5-phosphoribosylamino)methylideneamino]imidazole-4-carboxamide isomerase activity
            function:
              preferred_term: ProFAR isomerase activity
              term:
                id: GO:0003949
                label: 1-(5-phosphoribosyl)-5-[(5-phosphoribosylamino)methylideneamino]imidazole-4-carboxamide isomerase activity
              substrates:
                - preferred_term: ProFAR
              products:
                - preferred_term: >-
                    N-[(5-phospho-1-deoxy-D-ribulos-1-yl)amino]methylidene-amino-1-(5-phospho-beta-D-ribosyl)imidazole-4-carboxamide
                    (PRFAR)
              evidence:
                - source_id: EC:5.3.1.16
                  statement: ProFAR isomerase (HisA)
                  notes: "ModelSEED:rxn03175; KEGG:R04640; MetaCyc:PRIBFAICARPISOM-RXN"
            role_description: >-
              HisA belongs to the (beta/alpha)8 TIM-barrel HisA/TrpF superfamily;
              in actinobacteria the bifunctional PriA enzyme performs both HisA and
              TrpF (PRA isomerase) reactions.
    - order: 6
      role: imidazole-glycerol-phosphate synthase (glutamine amidotransferase)
      node:
        id: igp_synthase_step
        label: PRFAR to imidazole-glycerol-phosphate + AICAR
        module_type: REACTION
        description: >-
          Imidazole-glycerol-phosphate (IGP) synthase is a glutamine
          amidotransferase formed by a cyclase subunit (HisF) and a glutaminase /
          amidotransferase subunit (HisH). Glutamine hydrolysed by HisH supplies
          ammonia through an internal channel to the HisF active site, which
          cleaves PRFAR into IGP and AICAR. AICAR re-enters purine biosynthesis,
          linking histidine and nucleotide metabolism.
        annotons:
          - id: hisF_activity
            label: "hisF: IGP synthase, cyclase subunit"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: imidazoleglycerol-phosphate synthase activity
                term:
                  id: GO:0000107
                  label: imidazoleglycerol-phosphate synthase activity
              family:
                preferred_term: imidazole-glycerol-phosphate synthase cyclase subunit HisF
                term:
                  id: NCBIfam:TIGR00735
                  label: imidazole glycerol phosphate synthase, cyclase subunit
            function:
              preferred_term: imidazoleglycerol-phosphate synthase activity
              term:
                id: GO:0000107
                label: imidazoleglycerol-phosphate synthase activity
              substrates:
                - preferred_term: PRFAR
                - preferred_term: L-glutamine
              products:
                - preferred_term: D-erythro-imidazole-glycerol 3-phosphate (IGP)
                - preferred_term: 5-aminoimidazole-4-carboxamide ribonucleotide (AICAR)
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:4.3.2.10
                  statement: imidazoleglycerol-phosphate synthase, cyclase (HisF) component
                  notes: "KEGG:R04558; HMM NCBIfam:TIGR00735"
            role_description: Cyclase subunit; cleaves PRFAR to IGP and AICAR using channelled ammonia.
          - id: hisH_activity
            label: "hisH: IGP synthase, glutamine amidotransferase subunit"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: imidazoleglycerol-phosphate synthase activity
                term:
                  id: GO:0000107
                  label: imidazoleglycerol-phosphate synthase activity
              family:
                preferred_term: imidazole-glycerol-phosphate synthase amidotransferase subunit HisH
                term:
                  id: NCBIfam:TIGR01855
                  label: imidazole glycerol phosphate synthase, glutamine amidotransferase subunit
            function:
              preferred_term: imidazoleglycerol-phosphate synthase activity
              term:
                id: GO:0000107
                label: imidazoleglycerol-phosphate synthase activity
              cofactors:
                - preferred_term: L-glutamine (ammonia donor)
              evidence:
                - source_id: EC:3.5.1.2
                  statement: glutaminase component of imidazoleglycerol-phosphate synthase
                  notes: "HMM NCBIfam:TIGR01855"
            role_description: >-
              Glutaminase subunit; hydrolyses L-glutamine to supply ammonia to the
              HisF active site. Has no productive activity in isolation.
    - order: 7
      role: dehydratase
      node:
        id: hisB_step
        label: IGP to imidazole-acetol phosphate
        module_type: REACTION
        annotons:
          - id: hisB_activity
            label: "hisB: imidazoleglycerol-phosphate dehydratase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: imidazoleglycerol-phosphate dehydratase activity
                term:
                  id: GO:0004424
                  label: imidazoleglycerol-phosphate dehydratase activity
            function:
              preferred_term: imidazoleglycerol-phosphate dehydratase activity
              term:
                id: GO:0004424
                label: imidazoleglycerol-phosphate dehydratase activity
              substrates:
                - preferred_term: D-erythro-imidazole-glycerol 3-phosphate (IGP)
              products:
                - preferred_term: 3-(imidazol-4-yl)-2-oxopropyl phosphate (imidazole-acetol phosphate)
                - preferred_term: water
              evidence:
                - source_id: EC:4.2.1.19
                  statement: imidazoleglycerol-phosphate dehydratase
                  notes: "ModelSEED:rxn02473; KEGG:R03457; MetaCyc:IMIDPHOSDEHYD-RXN"
            role_description: >-
              In enteric bacteria such as E. coli this activity is the N-terminal
              domain of a bifunctional HisB protein whose C-terminal domain
              provides the HisN-type histidinol-phosphate phosphatase activity.
    - order: 8
      role: transaminase
      node:
        id: hisC_step
        label: Imidazole-acetol phosphate to L-histidinol phosphate
        module_type: REACTION
        annotons:
          - id: hisC_activity
            label: "hisC: histidinol-phosphate aminotransferase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: histidinol-phosphate aminotransferase activity
                term:
                  id: GO:0004400
                  label: L-histidinol-phosphate:2-oxoglutarate transaminase activity
            function:
              preferred_term: histidinol-phosphate aminotransferase activity
              term:
                id: GO:0004400
                label: L-histidinol-phosphate:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: 3-(imidazol-4-yl)-2-oxopropyl phosphate (imidazole-acetol phosphate)
                - preferred_term: L-glutamate
              products:
                - preferred_term: L-histidinol phosphate
                - preferred_term: 2-oxoglutarate
              cofactors:
                - preferred_term: pyridoxal 5'-phosphate
              evidence:
                - source_id: EC:2.6.1.9
                  statement: histidinol-phosphate aminotransferase
                  notes: >-
                    MetaCyc:HISTAMINOTRANS-RXN; KEGG:R03012. Note: the automatic
                    ModelSEED EC->reaction lookup mis-resolved EC 2.6.1.9 to a
                    promiscuous phenylalanine aminotransferase row
                    (PHEAMINOTRANS-RXN); corrected here during curation.
            role_description: >-
              PLP-dependent aminotransferase. In Bacillus subtilis and some related
              bacteria this activity is provided by a gene historically mislabelled
              hisH and now referred to as HisC.
    - order: 9
      role: phosphatase
      node:
        id: hisN_step
        label: L-histidinol phosphate to L-histidinol
        module_type: REACTION
        annotons:
          - id: hisN_activity
            label: "hisN: histidinol-phosphate phosphatase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: histidinol-phosphatase activity
                term:
                  id: GO:0004401
                  label: histidinol-phosphatase activity
            function:
              preferred_term: histidinol-phosphatase activity
              term:
                id: GO:0004401
                label: histidinol-phosphatase activity
              substrates:
                - preferred_term: L-histidinol phosphate
                - preferred_term: water
              products:
                - preferred_term: L-histidinol
                - preferred_term: phosphate
              evidence:
                - source_id: EC:3.1.3.15
                  statement: histidinol-phosphate phosphatase
                  notes: "ModelSEED:rxn02160; KEGG:R03013; MetaCyc:HISTIDPHOS-RXN"
            role_description: >-
              Histidinol-phosphate phosphatase activity has evolved repeatedly in
              several unrelated phosphatase families (PHP, inositol-monophosphatase-like,
              and HAD-like). In Bacillus subtilis it is HisJ; in enteric bacteria it
              is the C-terminal domain of bifunctional HisB.
    - order: 10
      role: terminal bifunctional dehydrogenase
      node:
        id: hisD_step
        label: L-histidinol to L-histidine
        module_type: REACTION
        description: >-
          HisD is a bifunctional NAD+-dependent dehydrogenase that oxidises
          L-histidinol to L-histidine in two steps via an L-histidinal
          intermediate, consuming two equivalents of NAD+.
        annotons:
          - id: hisD_activity
            label: "hisD: histidinol dehydrogenase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: histidinol dehydrogenase activity
                term:
                  id: GO:0004399
                  label: histidinol dehydrogenase activity
            function:
              preferred_term: histidinol dehydrogenase activity
              term:
                id: GO:0004399
                label: histidinol dehydrogenase activity
              substrates:
                - preferred_term: L-histidinol
                - preferred_term: "NAD+ (2 equivalents)"
                - preferred_term: water
              products:
                - preferred_term: L-histidine
                - preferred_term: "NADH (2 equivalents)"
              evidence:
                - source_id: EC:1.1.1.23
                  statement: histidinol dehydrogenase
                  notes: "ModelSEED:rxn00859; KEGG:R01158; MetaCyc:RXN-8001"
            role_description: Four-electron oxidation of the histidinol alcohol to the histidine carboxylate, via histidinal.
  connections:
    - source: prs_step
      target: hisG_step
      connection_type: PROVIDES_INPUT_FOR
      description: PRPP from the diphosphokinase feeds the first committed step.
    - source: hisG_step
      target: hisI_step
      connection_type: PRECEDES
    - source: hisI_step
      target: hisE_step
      connection_type: PRECEDES
    - source: hisE_step
      target: hisA_step
      connection_type: PRECEDES
    - source: hisA_step
      target: igp_synthase_step
      connection_type: PRECEDES
    - source: igp_synthase_step
      target: hisB_step
      connection_type: PRECEDES
    - source: hisB_step
      target: hisC_step
      connection_type: PRECEDES
    - source: hisC_step
      target: hisN_step
      connection_type: PRECEDES
    - source: hisN_step
      target: hisD_step
      connection_type: PRECEDES
  notes: >-
    Backbone and characterized-protein groundings were mined from GapMind
    his.steps and ModelSEED (see modules/experimental/gapmind-mining/), then
    curated: GO molecular-function terms were verified via QuickGO, reaction
    chemistry and bifunctional-enzyme notes were added, and one incorrect
    ModelSEED EC auto-mapping (hisC) was corrected. The HisIE, HisB, and PriA
    fusion notes flag where a single microbial protein covers more than one step.
