id: MODULE:histidine_biosynthesis
title: L-histidine biosynthesis (microbial)
description: >-
  De novo biosynthesis of L-histidine from PRPP and ATP through the conserved
  microbial His pathway. The module begins at the first committed ATP
  phosphoribosyltransferase reaction; PRPP production is shared upstream
  metabolism and is intentionally outside the module boundary. The pathway
  returns the ATP-derived purine ring to nucleotide metabolism as AICAR during
  the HisF-HisH imidazole-glycerol-phosphate synthase reaction. Its enzyme
  architecture varies across lineages: short-form HisG uses a separate HisZ
  regulatory subunit, the phosphoribosyl-ATP diphosphatase and
  phosphoribosyl-AMP cyclohydrolase can be separate or fused, and
  histidinol-phosphate phosphatase activity has arisen in several unrelated
  families. The terminal HisD enzyme performs two successive NAD+-dependent
  oxidations through histidinal to produce L-histidine.
status: DRAFT
evidence:
  - source_id: GapMind:aa
    title: GapMind for amino acid biosynthesis
    statement: >-
      Step set and characterized-protein groundings derive from the GapMind
      amino-acid biosynthesis pathway definition his.steps (PaperBLAST, Price &
      Arkin, LBL).
    url: https://papers.genomics.lbl.gov/cgi-bin/gapView.cgi?gdb=NCBI&set=aa&path=his
  - source_id: MetaCyc:HISTSYN-PWY
    title: L-histidine biosynthesis
    statement: GapMind bases the histidine pathway on the MetaCyc pathway HISTSYN-PWY.
  - source_id: GO:0000105
    title: L-histidine biosynthetic process
    statement: The module is grounded in the GO biological-process term for histidine biosynthesis.
  - source_id: KEGG:ppu00340
    title: Pseudomonas putida KT2440 histidine metabolism
    statement: >-
      The PSEPK ppu00340 instance grounds the pathway with hisG/hisZ, hisE,
      hisI, hisA, hisF/hisH, hisB, hisC, PP_3157/PP_5147, and hisD while also
      containing histidine-catabolism and other pathway-map spillover genes.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__histidine_biosynthesis__ppu00340-deep-research-openscientist.md
    title: OpenScientist module/pathway/taxon report for PSEPK histidine biosynthesis
    statement: >-
      Supports the biosynthesis boundary, ordered catalytic activities,
      HisG-HisZ and HisF-HisH architectures, and exclusion of Hut catabolism
      from this module. Its recommendation to exclude PP_5147 is not adopted:
      the report did not account for the direct Pseudomonas HAD-family
      histidinol-phosphatase evidence and close PA0335 orthology documented
      below.
  - source_id: PMID:28720084
    title: >-
      Sequence-based identification of inositol monophosphatase-like
      histidinol-phosphate phosphatases (HisN) in Corynebacterium glutamicum,
      Actinobacteria, and beyond
    statement: >-
      Defines sequence motifs and HMMs that distinguish IMPase-like HisN
      phosphatases from related inactive substrate classes and finds this
      family beyond Actinobacteria, including Proteobacteria.
  - source_id: PMID:31862725
    title: >-
      PA0335, a Gene Encoding Histidinol Phosphate Phosphatase, Mediates
      Histidine Auxotrophy in Pseudomonas aeruginosa
    statement: >-
      Provides genetic and biochemical evidence for the monofunctional
      Pseudomonas HAD-family histidinol-phosphate phosphatase represented by
      PA0335.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      The local partition provides the accession and locus-tag mapping used to
      distinguish the biosynthetic core from Hut catabolism and unrelated
      ppu00340 members.
