    removes shared PRPP production from the module core, places all molecular
    functions on leaf annotons, grounds every leaf with a PSEPK UniProt
    exemplar, and uses activity-based names where HisE/HisI gene nomenclature
    varies. In KT2440, Q88D14 is the standalone phosphoribosyl-ATP
    diphosphatase and Q88D15 is the standalone phosphoribosyl-AMP
    cyclohydrolase. Fusion notes retain the reusable HisIE, HisB, and PriA
    alternatives without treating those architectures as PSEPK-specific facts.
    The commissioned OpenScientist taxon report independently supports the
    pathway boundary and satisfiability but its PP_5147 candidate ranking is
    superseded here by the gene-level primary-evidence review.
