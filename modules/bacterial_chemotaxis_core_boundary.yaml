id: MODULE:bacterial_chemotaxis_core_boundary
title: Bacterial chemotaxis core Che signaling boundary
description: >-
  Boundary module for the ppu02030 core Che signal-transduction cluster in
  Pseudomonas putida KT2440. The satisfiable first-pass core covers CheW-like
  adaptor/scaffold proteins PP_4332 and PP_4333, the CheA histidine kinase,
  the CheY response-regulator output, CheZ-mediated CheY-P dephosphorylation,
  and CheB1-mediated methyl-accepting-chemotaxis-protein adaptation. The module
  deliberately excludes the larger KT2440 receptor panel, orphan MCP/aerotaxis
  receptors, CheR/CheV accessory adaptation proteins, and periplasmic
  binding-protein transport spillovers from the broader KEGG ppu02030 map.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02030 provides the organism-specific bacterial chemotaxis umbrella
      that includes receptors, Che signal-transduction proteins, adaptation
      proteins, and transport spillovers.
  - source_id: file:projects/P_PUTIDA/batches/ppu02030_bacterial_chemotaxis_partition.tsv
    title: ppu02030 bacterial chemotaxis partition table
    statement: >-
      The partition separates PP_4332, PP_4333, cheB1, cheA, cheZ, and cheY into
      the core Che signal-transduction cluster.
  - source_id: file:PSEPK/PP_4332/PP_4332-ai-review.yaml
    title: Curated PP_4332 review
    statement: >-
      The PP_4332 review accepts chemotaxis for a small CheW-family adaptor
      candidate and keeps cytosol as non-core localization.
  - source_id: file:PSEPK/PP_4333/PP_4333-ai-review.yaml
    title: Curated PP_4333 review
    statement: >-
      The PP_4333 review accepts chemotaxis for the adjacent CheW-domain protein
      and leaves its exact relationship to PP_4332 as unresolved.
  - source_id: file:PSEPK/cheA/cheA-ai-review.yaml
    title: Curated cheA review
    statement: >-
      The cheA review accepts protein histidine kinase activity, phosphorelay
      signal transduction, and chemotaxis for PP_4338/CheA.
  - source_id: file:PSEPK/cheY/cheY-ai-review.yaml
    title: Curated cheY review
    statement: >-
      The cheY review treats CheY as the response-regulator output of the
      chemotaxis phosphorelay.
  - source_id: file:PSEPK/cheZ/cheZ-ai-review.yaml
    title: Curated cheZ review
    statement: >-
      The cheZ review accepts CheY-P phosphoprotein phosphatase activity and
      regulation of chemotaxis, while treating flagellum localization as
      over-annotation.
  - source_id: file:PSEPK/cheB1/cheB1-ai-review.yaml
    title: Curated cheB1 review
    statement: >-
      The cheB1 review accepts protein-glutamate methylesterase activity,
      protein-glutamine glutaminase activity, response-regulator activity,
      phosphorelay signaling, and chemotaxis.
notes: >-
  First-pass interpretation: this module captures the core PP_4332-PP_4340 Che
  cluster, not the full bacterial chemotaxis pathway. PP_4332 is the shorter
  canonical CheW-like protein, PP_4333 is a larger CheW-domain paralog/accessory
  whose precise partner set is unresolved, CheA/CheY form the main
  phosphorelay, CheZ resets the output by dephosphorylating CheY-P, and CheB1
  tunes receptor sensitivity through methylesterase and glutaminase chemistry.
module:
  id: bacterial_chemotaxis_core_boundary
  label: Bacterial chemotaxis core Che signaling boundary
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: chemotaxis
      term:
        id: GO:0006935
        label: chemotaxis
      description: Directed movement in response to chemical stimuli.
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: His-to-Asp phosphotransfer from CheA to CheY and CheB-family response regulators.
    - preferred_term: protein histidine kinase activity
      term:
        id: GO:0004673
        label: protein histidine kinase activity
      description: CheA ATP-dependent autophosphorylation on histidine.
    - preferred_term: phosphorelay response regulator activity
      term:
        id: GO:0000156
        label: phosphorelay response regulator activity
      description: Receiver-domain response-regulator activity for CheY and CheB1.
    - preferred_term: phosphoprotein phosphatase activity
      term:
        id: GO:0004721
        label: phosphoprotein phosphatase activity
      description: CheZ dephosphorylation of phosphorylated CheY.
    - preferred_term: regulation of chemotaxis
      term:
        id: GO:0050920
        label: regulation of chemotaxis
      description: Modulation of chemotactic signaling output.
    - preferred_term: protein-glutamate methylesterase activity
      term:
        id: GO:0008984
        label: protein-glutamate methylesterase activity
      description: CheB1 removal of methyl groups from methylglutamate residues in MCPs.
    - preferred_term: protein-glutamine glutaminase activity
      term:
        id: GO:0050568
        label: protein-glutamine glutaminase activity
      description: CheB1 deamidation of MCP glutamine residues to glutamate.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble Che signaling and adaptation proteins act from the cytoplasmic side.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: TreeGrafter localization for PP_4332/CheW-like protein.
  parts:
    - order: 1
      role: CheW adaptor/scaffold layer
      node:
        id: chew_adaptor_layer
        label: CheW-like adaptor proteins
        module_type: SIGNALING_PATHWAY
        description: >-
          CheW-family adaptor/scaffold candidates that connect receptor-array
          input to the CheA kinase layer. PP_4333 is retained as a
          paralog/accessory candidate pending direct partner evidence.
        annotons:
          - id: pp4332_chew_adaptor
            label: "PP_4332: CheW-family chemotaxis adaptor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4332
            processes:
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: CheW-like adaptor/scaffold candidate in the core Che cluster.
          - id: pp4333_chew_domain_candidate
            label: "PP_4333: CheW-domain accessory candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4333
            processes:
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: Larger CheW-domain protein retained as an unresolved core-cluster accessory candidate.
    - order: 2
      role: CheA to CheY phosphorelay output
      node:
        id: chea_chey_phosphorelay
        label: CheA-CheY chemotaxis phosphorelay
        module_type: SIGNALING_PATHWAY
        description: >-
          CheA autophosphorylates on histidine and transfers phosphoryl groups
          to CheY, the diffusible response-regulator output that controls
          flagellar motor behavior.
        annotons:
          - id: chea_histidine_kinase
            label: "cheA: chemotaxis histidine kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheA
            function:
              preferred_term: protein histidine kinase activity
              term:
                id: GO:0004673
                label: protein histidine kinase activity
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: Central CheA histidine kinase for the canonical chemotaxis phosphorelay.
          - id: chey_response_regulator
            label: "cheY: chemotaxis response-regulator output"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheY
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
            processes:
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: Receiver-domain output of CheA signaling that modulates flagellar motor behavior.
    - order: 3
      role: CheZ signal reset
      node:
        id: chez_chey_reset
        label: CheZ-mediated CheY-P dephosphorylation
        module_type: REACTION
        description: >-
          CheZ accelerates CheY-P dephosphorylation, resetting the chemotaxis
          output signal.
        annotons:
          - id: chez_phosphatase
            label: "cheZ: CheY-P phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheZ
            function:
              preferred_term: phosphoprotein phosphatase activity
              term:
                id: GO:0004721
                label: phosphoprotein phosphatase activity
            processes:
              - preferred_term: regulation of chemotaxis
                term:
                  id: GO:0050920
                  label: regulation of chemotaxis
            role_description: Signal-reset phosphatase that lowers CheY-P levels.
    - order: 4
      role: CheB receptor adaptation
      node:
        id: cheb_receptor_adaptation
        label: CheB1-mediated receptor adaptation
        module_type: BIOLOGICAL_PROCESS
        description: >-
          CheB1, activated through CheA-dependent phosphorylation, tunes MCP
          adaptation by demethylating methylglutamate residues and deamidating
          selected glutamine residues to glutamate.
        annotons:
          - id: cheb1_methylesterase
            label: "cheB1: MCP methylesterase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheB1
            function:
              preferred_term: protein-glutamate methylesterase activity
              term:
                id: GO:0008984
                label: protein-glutamate methylesterase activity
            processes:
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
              - preferred_term: phosphorelay signal transduction system
                term:
                  id: GO:0000160
                  label: phosphorelay signal transduction system
            role_description: CheA-regulated receptor methylesterase for chemotaxis adaptation.
          - id: cheb1_glutaminase
            label: "cheB1: MCP glutaminase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cheB1
            function:
              preferred_term: protein-glutamine glutaminase activity
              term:
                id: GO:0050568
                label: protein-glutamine glutaminase activity
            processes:
              - preferred_term: chemotaxis
                term:
                  id: GO:0006935
                  label: chemotaxis
            role_description: Deamidates selected receptor glutamine residues to glutamate.
  connections:
    - source: chew_adaptor_layer
      target: chea_chey_phosphorelay
      connection_type: CAUSES
      description: CheW-like adaptor proteins couple chemoreceptor-array input to CheA signaling.
    - source: chea_chey_phosphorelay
      target: chez_chey_reset
      connection_type: CAUSES
      description: CheA-driven CheY phosphorylation creates the CheY-P substrate reset by CheZ.
    - source: chea_chey_phosphorelay
      target: cheb_receptor_adaptation
      connection_type: CAUSES
      description: CheA phosphorylation activates CheB-family receptor-adaptation chemistry.
  knowledge_gaps:
    - gap_statement: >-
        The specific receptor and CheA partner preferences of PP_4332 and
        PP_4333 are unresolved.
      boundary: >-
        Both proteins are treated as CheW-like chemotaxis adaptor candidates
        from domain, GOA, and local cluster context, but no first-pass evidence
        establishes whether they are redundant or specialize on different MCPs.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        GO lacks a useful specific molecular-function term for bacterial CheW
        adaptor/scaffold activity.
      boundary: >-
        PP_4332 and PP_4333 should not be given generic protein binding as a
        substitute for CheW adaptor function without a more informative term or
        direct interaction evidence.
      gap_kind:
        - ONTOLOGY
        - CURATION
