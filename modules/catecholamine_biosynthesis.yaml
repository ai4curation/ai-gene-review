  notes: >-
    Catecholamine biosynthesis (GO:0042423), grounded to four completed human gene reviews. Linear pathway:
    TH (P07101 PTHR11473, GO:0004511, BH4/Fe(II)) tyrosine -> L-DOPA (rate-limiting, feedback/phospho-
    regulated); DDC/AADC (P20711 PTHR11999, GO:0004058/GO:0036468, PLP) L-DOPA -> dopamine (also 5-HTP ->
    serotonin, shared with the serotonin/melatonin branch); DBH (P09172 PTHR10157, GO:0004500, 2 Cu +
    ascorbate) dopamine -> noradrenaline inside chromaffin secretory granules (GO:0042584); PNMT (P11086
    PTHR10867, GO:0004603, SAM) noradrenaline -> adrenaline in adrenal medulla. Cell-type enzyme complement
    sets the product (dopaminergic: TH+DDC; noradrenergic: +DBH; adrenergic: +PNMT). TH/DDC/PNMT cytosolic,
    DBH granule-associated. Precursor tyrosine and the BH4 cofactor come from separate (reviewed) pathways.
    Diseases: TH = DOPA-responsive dystonia/infantile parkinsonism, DDC = AADC deficiency, DBH = orthostatic
    hypotension. Curation: TH/DDC/DBH carry many behavioural/response ISS/IBA terms (mostly mouse-ortholog,
    kept non-core); bare protein-binding IPIs (DJ-1, alpha-synuclein, ATP7A) over-annotated. GO term ids/labels
    verified against the local go.db; module passes structural + term-label validation.
