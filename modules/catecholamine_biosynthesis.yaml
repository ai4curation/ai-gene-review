id: MODULE:catecholamine_biosynthesis
title: Catecholamine biosynthesis (Tyr -> L-DOPA -> dopamine -> noradrenaline -> adrenaline)
description: >-
  The catecholamine neurotransmitters and hormones - dopamine, noradrenaline (norepinephrine) and adrenaline
  (epinephrine) - are synthesised from the amino acid L-tyrosine by a linear four-enzyme pathway operating in
  catecholaminergic neurons and adrenal chromaffin cells. Tyrosine hydroxylase (TH), the rate-limiting enzyme,
  hydroxylates L-tyrosine to L-DOPA using tetrahydrobiopterin (BH4), O2 and a non-heme Fe(II) centre. Aromatic
  L-amino-acid decarboxylase (DDC/AADC), a pyridoxal-phosphate enzyme, decarboxylates L-DOPA to dopamine
  (and, on the parallel indoleamine branch, 5-HTP to serotonin). In noradrenergic and adrenergic cells,
  dopamine is imported into secretory (chromaffin) granules, where the copper- and ascorbate-dependent
  dopamine beta-hydroxylase (DBH) hydroxylates it to noradrenaline; finally, in adrenal medullary and some
  central adrenergic cells, the SAM-dependent phenylethanolamine N-methyltransferase (PNMT) N-methylates
  noradrenaline to adrenaline. Which product predominates depends on the cell type's enzyme complement
  (dopaminergic cells stop at dopamine; noradrenergic add DBH; adrenergic add PNMT). Inherited defects are
  severe neurological/autonomic disorders: TH deficiency causes DOPA-responsive dystonia / infantile
  parkinsonism, AADC (DDC) deficiency a global monoamine-neurotransmitter disease, and DBH deficiency
  autosomal-recessive orthostatic hypotension.
status: DRAFT
evidence:
  - source_id: GO:0042423
    title: catecholamine biosynthetic process
    statement: TH, DDC, DBH and PNMT synthesise the catecholamines from tyrosine (GO:0042423).
  - source_id: GO:0042416
    title: dopamine biosynthetic process
    statement: TH + DDC produce dopamine (GO:0042416).
  - source_id: GO:0042421
    title: norepinephrine biosynthetic process
    statement: DBH produces noradrenaline (GO:0042421).
  - source_id: GO:0042418
    title: epinephrine biosynthetic process
    statement: PNMT produces adrenaline (GO:0042418).
  - source_id: file:human/TH/TH-ai-review.yaml
    title: TH gene review (human)
    statement: Tyrosine hydroxylase (UniProtKB:P07101, GO:0004511) matches the completed human TH review.
  - source_id: file:human/DDC/DDC-ai-review.yaml
    title: DDC gene review (human)
    statement: Aromatic-L-amino-acid decarboxylase (UniProtKB:P20711, GO:0004058) matches the completed human DDC review.
  - source_id: file:human/DBH/DBH-ai-review.yaml
    title: DBH gene review (human)
    statement: Dopamine beta-hydroxylase (UniProtKB:P09172, GO:0004500) matches the completed human DBH review.
  - source_id: file:human/PNMT/PNMT-ai-review.yaml
    title: PNMT gene review (human)
    statement: Phenylethanolamine N-methyltransferase (UniProtKB:P11086, GO:0004603) matches the completed human PNMT review.
