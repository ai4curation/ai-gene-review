id: MODULE:translation_rna_processing_spillover_boundary
title: Translation/RNA processing spillover boundary
description: Boundary module for low-information genes that entered the PSEPK translation/RNA-processing bucket
  through broad RNA-binding or keyword evidence but should not be forced into ribosome, rRNA, tRNA, translation-factor,
  or RNA-decay pathways without stronger evidence. This first version records PP_2182 as a ProQ/FinO RNA-chaperone
  candidate and PP_2953 as an oxidoreductase spillover routed out of RNA processing.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_low_information_rna_binding_or_enzyme_spillovers.tsv
  title: PSEPK translation/RNA-processing low-information spillover split
  statement: The batch table records PP_2182 and PP_2953 as low-information RNA-binding or enzyme spillovers with
    weak pathway specificity.
- source_id: file:PSEPK/PP_2182/PP_2182-ai-review.yaml
  title: Curated PP_2182 review
  statement: The PP_2182 review accepts ProQ/FinO-domain RNA strand annealing/exchange and post-transcriptional
    regulation without assigning rRNA, tRNA, or ribosome-specific roles.
- source_id: file:PSEPK/PP_2953/PP_2953-ai-review.yaml
  title: Curated PP_2953 review
  statement: The PP_2953 review accepts NADPH-dependent quinone reductase activity and routes the gene out of translation/RNA
    processing.
module:
  id: translation_rna_processing_spillover_boundary
  label: Translation/RNA processing spillover boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
  - preferred_term: RNA strand annealing activity
    term:
      id: GO:0033592
      label: RNA strand annealing activity
    description: Specific RNA-chaperone activity retained for PP_2182.
  - preferred_term: RNA strand-exchange activity
    term:
      id: GO:0034057
      label: RNA strand-exchange activity
    description: Second ProQ/FinO-family RNA-chaperone activity retained for PP_2182.
  - preferred_term: post-transcriptional regulation of gene expression
    term:
      id: GO:0010608
      label: post-transcriptional regulation of gene expression
    description: Broad process context for the PP_2182 RNA-chaperone call.
  - preferred_term: quinone reductase (NADPH) activity
    term:
      id: GO:0003960
      label: quinone reductase (NADPH) activity
    description: Specific oxidoreductase activity retained for PP_2953.
  - preferred_term: cytosol
    term:
      id: GO:0005829
      label: cytosol
    description: Location context for the two soluble proteins where supported by GOA.
  parts:
  - order: 1
    role: ProQ/FinO RNA-chaperone spillover
    node:
      id: proq_fino_rna_chaperone_spillover
      label: ProQ/FinO RNA-chaperone spillover
      module_type: BIOLOGICAL_PROCESS
      description: PP_2182 has ProQ/FinO-domain support for RNA strand annealing/exchange and broad post-transcriptional
        regulation, but no evidence in this batch for rRNA modification, tRNA processing, ribosome biogenesis, or
        translation-factor activity.
      annotons:
      - id: PP_2182_proq_fino_rna_chaperone
        label: 'PP_2182: ProQ/FinO RNA chaperone candidate'
        participant:
          selector_type: GENE
          gene:
            preferred_term: PP_2182
        function:
          preferred_term: RNA strand annealing activity
          term:
            id: GO:0033592
            label: RNA strand annealing activity
        processes:
        - preferred_term: post-transcriptional regulation of gene expression
          term:
            id: GO:0010608
            label: post-transcriptional regulation of gene expression
        locations:
        - preferred_term: cytosol
          term:
            id: GO:0005829
            label: cytosol
        role_description: Low-information ProQ/FinO-family RNA chaperone candidate.
  - order: 2
    role: Oxidoreductase spillover routed out of RNA processing
    node:
      id: oxidoreductase_spillover_routed_out
      label: Oxidoreductase spillover routed out of RNA processing
      module_type: MOLECULAR_FUNCTION
      description: PP_2953 is retained as a soluble zinc-type alcohol dehydrogenase-like oxidoreductase with NADPH-dependent
        quinone reductase support. It is not represented as an RNA-processing gene.
      annotons:
      - id: PP_2953_quinone_reductase_spillover
        label: 'PP_2953: predicted NADPH quinone reductase'
        participant:
          selector_type: GENE
          gene:
            preferred_term: PP_2953
        function:
          preferred_term: quinone reductase (NADPH) activity
          term:
            id: GO:0003960
            label: quinone reductase (NADPH) activity
        locations:
        - preferred_term: cytosol
          term:
            id: GO:0005829
            label: cytosol
        role_description: Oxidoreductase-family spillover from a broad RNA/translation partition.
notes: This module is intentionally a boundary/spillover record, not a satisfiable translation or RNA-processing
  pathway. Use it to keep low-information genes visible while preventing pathway over-interpretation.
