      term:
        id: GO:0030148
        label: sphingolipid biosynthetic process
      description: De novo synthesis of ceramide from serine and fatty acyl-CoA on the ER membrane.
    - preferred_term: ceramide biosynthetic process
      term:
        id: GO:0046513
        label: ceramide biosynthetic process
      description: Formation of ceramide, the backbone of complex sphingolipids.
  context:
    cellular_components:
