              family:
                preferred_term: Ceramide synthase / TRAM-LAG-CLN8 (TLC) family (CERS)
                term:
                  id: PANTHER:PTHR12560
                  label: CERAMIDE SYNTHASE
                representative_members:
                  - preferred_term: CERS1 (human, C18-specific)
                    term:
                      id: UniProtKB:P27544
