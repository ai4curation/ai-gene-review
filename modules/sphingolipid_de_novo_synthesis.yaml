id: MODULE:sphingolipid_de_novo_synthesis
title: De novo sphingolipid (ceramide) biosynthesis; SPTLC1/SPTLC2/SPTSSA/KDSR/CERS1-3/DEGS1
description: >-
  De novo sphingolipid synthesis builds ceramide, the hydrophobic backbone of all complex
  sphingolipids, from serine and fatty acyl-CoA on the endoplasmic-reticulum membrane. The
  committed, rate-limiting first step is catalysed by serine palmitoyltransferase (SPT), a
  pyridoxal-5'-phosphate-dependent membrane complex whose catalytic core is the SPTLC1-SPTLC2
  heterodimer with the small regulatory subunit SPTSSA (which sets C16 acyl-CoA specificity):
  it condenses L-serine with palmitoyl-CoA to 3-ketodihydrosphingosine. 3-ketodihydrosphingosine
  reductase (KDSR) then reduces this, using NADPH, to dihydrosphingosine (sphinganine). A family
  of ceramide synthases (CERS1-6) N-acylates sphinganine with a fatty acyl-CoA to give
  dihydroceramide, each isoform preferring a different acyl chain length: CERS1 makes C18
  ceramide (brain/muscle), CERS2 very-long-chain C22-C24 ceramide (broadly expressed), and CERS3
  ultra-long-chain C26+ (acyl)ceramides for the skin barrier. Finally the dihydroceramide
  desaturase DEGS1 introduces the 4,5-trans double bond, an O2- and iron-dependent oxidation that
  converts dihydroceramide to ceramide. Inherited defects span the pathway: HSAN1 (SPTLC1/SPTLC2),
  spastic paraplegia (SPTSSA), erythrokeratodermia/thrombocytopenia (KDSR), progressive myoclonic
  epilepsy 8 (CERS1), congenital ichthyosis ARCI9 (CERS3) and hypomyelinating leukodystrophy 18
  (DEGS1).
status: DRAFT
