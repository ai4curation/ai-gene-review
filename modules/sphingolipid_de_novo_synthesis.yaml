    - order: 4
      role: desaturation to ceramide (final step)
      node:
        id: degs1_step
        label: dihydroceramide to ceramide (4,5-trans double bond)
        module_type: REACTION
        annotons:
          - id: degs1_activity
            label: "DEGS1: dihydroceramide desaturase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Sphingolipid delta-4 desaturase / fatty-acid-hydroxylase family (DEGS)
                term:
                  id: PANTHER:PTHR12879
                  label: SPHINGOLIPID DELTA(4)-DESATURASE
                representative_members:
                  - preferred_term: DEGS1 (human)
                    term:
                      id: UniProtKB:O15121
                      label: Sphingolipid delta(4)-desaturase DES1
            function:
              preferred_term: sphingolipid delta-4 desaturase activity
              term:
                id: GO:0042284
                label: sphingolipid delta-4 desaturase activity
              substrates:
                - preferred_term: dihydroceramide
                - preferred_term: O2
                - preferred_term: NAD(P)H / reduced electron donor
              products:
                - preferred_term: ceramide
                - preferred_term: H2O
              evidence:
                - source_id: EC:1.14.19.17
                  statement: dihydroceramide delta-4 desaturase; O2- and iron-dependent introduction of the 4,5-trans double bond, giving ceramide
                - source_id: Reactome:R-HSA-428259
                  statement: "DEGS1 dehydrogenates dihydroceramide (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Final step; converts dihydroceramide to ceramide. Deficiency = hypomyelinating
              leukodystrophy 18 (HLD18).
  connections:
    - source: spt_step
      target: kdsr_step
      connection_type: PROVIDES_INPUT_FOR
      description: 3-ketodihydrosphingosine from SPT is reduced by KDSR to sphinganine.
    - source: kdsr_step
      target: cers_step
      connection_type: PROVIDES_INPUT_FOR
      description: Sphinganine from KDSR is N-acylated by the ceramide synthases to dihydroceramide.
    - source: cers_step
      target: degs1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Dihydroceramide from the ceramide synthases is desaturated by DEGS1 to ceramide.
  notes: >-
    De novo sphingolipid (ceramide) biosynthesis, grounded to the human enzymes of the SPT complex
    (SPTLC1 O15269 + SPTLC2 O15270, GO:0004758, EC 2.3.1.50; small subunit SPTSSA Q969W0; complex
    GO:0017059), KDSR (Q06136, GO:0047560, EC 1.1.1.102), the ceramide synthases CERS1 (P27544),
    CERS2 (Q96G23) and CERS3 (Q8IU89) (all GO:0050291, EC 2.3.1.24) and DEGS1 (O15121, GO:0042284,
    EC 1.14.19.17). GO molecular-function/BP/location terms were taken from the completed human
    gene reviews and verified against the local go.db; Reactome reaction ids/titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector with the human
    enzyme(s) as representative; SPT is a PROTEIN_COMPLEX node (SPTLC1 + SPTLC2 catalytic +
    SPTSSA activator), and the ceramide-synthase node lists CERS1/2/3 as representative members of
    the CerS family (PTHR12560), which share the sphingosine-N-acyltransferase reaction and differ
    only in acyl-CoA chain-length preference (CERS1 C18, CERS2 C22-24, CERS3 C26+; CERS4/5/6 are
    additional family members not in this dismech mapping subset). Substrate palmitoyl-CoA comes
    from fatty-acid synthesis; the product ceramide is the hub for complex sphingolipids —
    sphingomyelin (SGMS1/2), glucosylceramide (UGCG) and gangliosides — and for sphingosine-1-
    phosphate signalling (separate modules). Disorders span the pathway: HSAN1/1C (SPTLC1/SPTLC2),
    spastic paraplegia (SPTSSA), erythrokeratodermia/thrombocytopenia (KDSR), progressive myoclonic
    epilepsy 8 (CERS1), congenital ichthyosis ARCI9 (CERS3) and hypomyelinating leukodystrophy 18
    (DEGS1).
