        without a verified terminal alkane monooxygenase and phenotype.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        The adjacent rubredoxin reductase AlkT (PP_5314) provides strong local
        pathway context but is not a member of this UPA00191 single-gene bucket.
      boundary: >-
        Treat AlkT and any alkane monooxygenase partner as linked pathway
        context unless a broader hydrocarbon hydroxylation module is created.
      gap_kind:
        - CURATION
