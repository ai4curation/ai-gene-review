id: MODULE:rubredoxin_electron_transfer
title: Rubredoxin electron transfer
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00191 module for the small
  iron-binding rubredoxin electron carrier RubA (PP_5315, UniProtKB:Q88C68).
  RubA likely functions with the adjacent rubredoxin reductase AlkT as a
  one-electron carrier, but the terminal acceptor in KT2440 is unresolved and
  alkane catabolism should not be asserted without an alkane monooxygenase.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00191
    title: UniPathway UPA00191
    statement: >-
      The local UPA00191 membership set contains rubA as the KT2440 rubredoxin
      candidate associated with alkane catabolism.
  - source_id: GO:0009055
    title: electron transfer activity
    statement: >-
      GO:0009055 captures RubA's molecular function as a small redox electron
      carrier.
  - source_id: GO:0005506
    title: iron ion binding
    statement: >-
      GO:0005506 captures the single iron center bound by conserved cysteine
      residues in rubredoxin.
  - source_id: GO:0043448
    title: alkane catabolic process
    statement: >-
      GO:0043448 is the UniPathway/UniProt process context on the fetched
      annotation, but the rubA review marks it over-annotated for KT2440 because
      the terminal alkane monooxygenase is not evident.
  - source_id: file:PSEPK/rubA/rubA-ai-review.yaml
    title: Curated rubA review
    statement: >-
      The rubA review accepts electron transfer activity, iron binding,
      cytoplasmic localization, and alkane catabolism, while modifying the broad
      metal-ion-binding annotation to the more informative iron ion binding term.
  - source_id: file:PSEPK/rubA/rubA-uniprot.txt
    title: UniProtKB entry for rubA
    statement: >-
      UniProt describes Q88C68 as Rubredoxin, places it in UniPathway UPA00191,
      and states that it transfers electrons from rubredoxin reductase to alkane
      1-monooxygenase in a hydrocarbon hydroxylating system.
  - source_id: file:interpro/panther/PTHR47627/PTHR47627-metadata.yaml
    title: PANTHER family metadata for RubA
    statement: >-
      PANTHER family PTHR47627 is named Rubredoxin electron transfer and
      describes small nonheme iron proteins that serve as electron carriers in
      redox processes, including hydrocarbon hydroxylating systems.
  - source_id: file:PSEPK/rubA/rubA-deep-research-openscientist.md
    title: OpenScientist gene research for rubA
    statement: >-
      OpenScientist gene-level research supports RubA as a short cytosolic
      one-electron rubredoxin carrier, identifies AlkT/PP_5314 as the likely
      reductase partner, and flags KT2440 alkane catabolism as over-propagated
      because the strain lacks an alkane 1-monooxygenase.
  - source_id: file:modules/rubredoxin_electron_transfer-deep-research-openscientist.md
    title: OpenScientist module research for rubredoxin electron transfer
    statement: >-
      OpenScientist module-level research supports the general AlkT-rubredoxin
      electron-transfer mechanism, but its generic alkane-hydroxylase framing is
      constrained here by the KT2440-specific gene-level finding that the
      terminal alkane monooxygenase is absent.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__rubredoxin_electron_transfer__upa00191-deep-research-openscientist.md
    title: OpenScientist species-aware pathway research for PSEPK UPA00191
    statement: >-
      OpenScientist species-aware research concludes that the RubA electron
      carrier step is covered, but UPA00191 as an alkane-degradation pathway is
      not satisfiable in KT2440 because a true alkane 1-monooxygenase is absent
      and PP_3400 is a DNA-repair AlkB homonym.
notes: >-
  First-pass interpretation: the RubA electron-carrier component is covered in
  KT2440, but UPA00191 should not be treated as a satisfiable alkane degradation
  pathway for this organism. RubA is the electron-carrier component and the
  adjacent rubredoxin reductase AlkT is strong pathway context; the terminal
  acceptor remains unresolved because KT2440 appears to lack the AlkB
  monooxygenase assumed by inherited alkane annotations. The evidence is mostly
  electronic/family based and the UniProt entry is unreviewed, so direct KT2440
  biochemical or genetic evidence remains a follow-up need.
