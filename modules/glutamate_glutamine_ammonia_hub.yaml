id: MODULE:glutamate_glutamine_ammonia_hub
title: Glutamate / glutamine / ammonia metabolic hub (GLUL, GLS/GLS2, GLUD1/GLUD2)
description: >-
  Glutamate, glutamine and ammonia sit at the crossroads of amino-acid, nitrogen and carbon metabolism, and
  three enzyme activities interconvert them. Glutamine synthetase (GLUL) is the sole route of net ammonia
  fixation into organic form: it condenses L-glutamate + ammonia + ATP to L-glutamine, the body's principal
  non-toxic nitrogen carrier and a nitrogen donor for nucleotide, amino-sugar and amino-acid synthesis; it
  detoxifies ammonia in perivenous hepatocytes, astrocytes and muscle. Running the opposite direction, the
  phosphate-activated mitochondrial glutaminases GLS (kidney-type, KGA/GAC) and GLS2 (liver-type, LGA/GAB)
  hydrolyse L-glutamine back to L-glutamate + ammonia, initiating glutaminolysis and supplying glutamate for
  the astrocytic glutamate-glutamine cycle, renal ammoniagenesis and cancer glutamine addiction. Glutamate
  is then reversibly deaminated by mitochondrial glutamate dehydrogenase — the ubiquitous GLUD1 and the
  hominoid-specific, brain/testis GLUD2 — to 2-oxoglutarate (alpha-ketoglutarate) + ammonia with NAD(P)+,
  linking amino-acid nitrogen to the TCA cycle for energy and anaplerosis and, in pancreatic beta-cells,
  coupling amino-acid sensing to insulin secretion. Together GLUL and GLS establish the glutamate<->glutamine
  interconversion cycle, while GLUD channels glutamate carbon into the TCA cycle and releases its nitrogen as
  ammonia (destined for the urea cycle). Inherited defects highlight the hub's importance: GLUL deficiency
  (congenital glutamine deficiency / neonatal encephalopathy), GLS deficiency (epileptic encephalopathy) and
  gain-of-function (developmental delay), and GLUD1 activating mutations (the hyperinsulinism-hyperammonemia
  syndrome).
status: DRAFT
evidence:
  - source_id: GO:1901704
    title: L-glutamine biosynthetic process
    statement: GLUL fixes ammonia into L-glutamine (GO:1901704).
  - source_id: GO:0006543
    title: L-glutamine catabolic process
    statement: GLS/GLS2 hydrolyse L-glutamine to glutamate + ammonia (GO:0006543).
  - source_id: GO:0006538
    title: L-glutamate catabolic process
    statement: GLUD1/GLUD2 deaminate L-glutamate to 2-oxoglutarate + ammonia (GO:0006538).
  - source_id: file:human/GLUL/GLUL-ai-review.yaml
    title: GLUL gene review (human)
    statement: The glutamate + NH3 + ATP -> glutamine step (UniProtKB:P15104, GO:0004356) matches the completed human GLUL review.
  - source_id: file:human/GLS/GLS-ai-review.yaml
    title: GLS gene review (human)
    statement: The glutamine -> glutamate + NH3 step (UniProtKB:O94925, GO:0004359) matches the completed human GLS review.
  - source_id: file:human/GLS2/GLS2-ai-review.yaml
    title: GLS2 gene review (human)
    statement: The liver-type glutamine -> glutamate + NH3 step (UniProtKB:Q9UI32, GO:0004359) matches the completed human GLS2 review.
  - source_id: file:human/GLUD1/GLUD1-ai-review.yaml
    title: GLUD1 gene review (human)
    statement: The glutamate <-> 2-oxoglutarate + NH3 deamination step (UniProtKB:P00367, GO:0004353) matches the completed human GLUD1 review.
  - source_id: file:human/GLUD2/GLUD2-ai-review.yaml
    title: GLUD2 gene review (human)
    statement: The brain/testis glutamate dehydrogenase step (UniProtKB:P49448, GO:0004353) matches the completed human GLUD2 review.
