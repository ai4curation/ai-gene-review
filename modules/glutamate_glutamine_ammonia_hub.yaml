    - source: glutamine_synthesis
      target: glutamine_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The L-glutamine made by GLUL is the substrate hydrolysed by the glutaminases GLS/GLS2 — the two form
        the glutamate<->glutamine interconversion cycle (e.g. the astrocytic glutamate-glutamine cycle).
    - source: glutamine_hydrolysis
      target: glutamate_deamination
      connection_type: PROVIDES_INPUT_FOR
      description: The L-glutamate released by the glutaminases is deaminated by GLUD1/GLUD2 to 2-oxoglutarate.
    - source: glutamate_deamination
      target: glutamine_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        GLUD runs reversibly: reductive amination of 2-oxoglutarate regenerates glutamate (the GLUL
        substrate), and the ammonia released by glutaminase/GLUD can be re-fixed by GLUL, closing the hub.
  notes: >-
    Glutamate/glutamine/ammonia metabolic hub (GO:1901704 + GO:0006541), grounded to five completed human gene
    reviews. AMMONIA FIXATION: GLUL (P15104 PTHR20852, GO:0004356 glutamine synthetase, cytosolic, ATP-dependent;
    congenital glutamine deficiency; NB GO:0006542 glutamine-biosynthetic is OBSOLETE -> GO:1901704). GLUTAMINOLYSIS:
    GLS (O94925, kidney-type/GAC, cancer target) + GLS2 (Q9UI32, liver-type, p53-induced antioxidant) share
    PTHR12544, GO:0004359 glutaminase, mitochondrial (GO:0006537 glutamate-biosynthetic is OBSOLETE -> GO:0097054).
    GLUTAMATE DEAMINATION: GLUD1 (P00367, ubiquitous) + GLUD2 (P49448, hominoid retrogene, brain/testis, GTP-
    insensitive/ADP-activated) share PTHR11606, GO:0004353 L-glutamate dehydrogenase [NAD(P)+] (children GO:0004352
    NAD+/GO:0004354 NADP+) + ADP binding GO:0043531; GLUD1 activating mutations = hyperinsulinism-hyperammonemia.
    The three reactions form a cycle: GLUL fixes NH3 into glutamine, GLS releases it back to glutamate+NH3, GLUD
    channels glutamate to 2-oxoglutarate (TCA/anaplerosis) releasing NH3 to the urea cycle; GLUD reverse-direction
    regenerates glutamate. Moonlighting kept non-core in gene reviews (GLUL protein-palmitoyltransferase; GLS2 p53/
    apoptosis/ROS). Links to urea cycle (ammonia), TCA cycle (2-oxoglutarate) and transaminases (curated separately).
    GO term ids/labels verified against the local go.db. Disorders: GLUL congenital glutamine deficiency; GLS
    deficiency/gain-of-function; GLUD1 hyperinsulinism-hyperammonemia.
