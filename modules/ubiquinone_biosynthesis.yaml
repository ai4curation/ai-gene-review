                    term:
                      id: UniProtKB:Q88D17
                      label: Ubiquinone/menaquinone biosynthesis C-methyltransferase UbiE
                  - preferred_term: ubiE (Escherichia coli K-12)
                    term:
                      id: UniProtKB:P0A887
                      label: Ubiquinone/menaquinone biosynthesis C-methyltransferase UbiE
                ancestral_nodes:
                  - preferred_term: PAINT IBD node PTN001297884 in PTHR43591
                    term:
                      id: PANTHER:PTN001297884
                      label: PTN001297884
                    description: >-
                      Local PAINT IBD node in PTHR43591 propagating
                      F:GO:0008425 and P:GO:0006744; seeds include UniProtKB:P0A887,
                      UniProtKB:Q5HYK3, and SGD:S000004578; PAINT date 20240212
                      for the molecular-function assertion.
                    evidence:
                      - source_id: GO_REF:0000033
                        statement: IBD propagation from PAINT node PTN001297884 in PTHR43591.
            function:
              preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              term:
                id: GO:0008425
                label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              substrates:
                - preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 2-methoxy-6-polyprenyl-3-methyl-1,4-benzoquinol
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.201
                  statement: 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase.
            role_description: Adds the ring C-methyl group during ubiquinone biosynthesis.
            notes: >-
              UbiE-family enzymes can also support menaquinone methylation; this
              annoton represents the ubiquinone-biosynthesis activity.
          - id: late_o_methyltransferase_activity
            label: "UbiG: 3-demethylubiquinol 3-O-methyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiG ubiquinone O-methyltransferase family
                term:
                  id: PANTHER:PTHR43464
                  label: UbiG ubiquinone O-methyltransferase family
                representative_members:
                  - preferred_term: ubiG (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88M10
                      label: Ubiquinone biosynthesis O-methyltransferase
            function:
              preferred_term: 3-demethylubiquinol 3-O-methyltransferase activity
              term:
                id: GO:0061542
                label: 3-demethylubiquinol 3-O-methyltransferase activity
              substrates:
                - preferred_term: 3-demethylubiquinol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: ubiquinol
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.64
                  statement: 3-demethylubiquinone 3-O-methyltransferase / 3-demethylubiquinol methyltransferase.
            role_description: Performs the final O-methylation yielding ubiquinol/ubiquinone.
