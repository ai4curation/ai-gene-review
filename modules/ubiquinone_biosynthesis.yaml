id: MODULE:ubiquinone_biosynthesis
title: Ubiquinone biosynthesis from chorismate-derived 4-hydroxybenzoate
description: >-
  Species-neutral pathway for de novo biosynthesis of ubiquinone (coenzyme Q)
  from the chorismate-derived aromatic head group 4-hydroxybenzoate and a
  polyprenyl diphosphate side chain. The bacterial pathway begins with UbiC
  chorismate lyase, UbiA polyprenyltransferase, and UbiD-dependent
  decarboxylation, with UbiX providing the prenylated-FMN cofactor required by
  UbiD-family decarboxylases. Subsequent hydroxylation and methylation steps,
  carried out by UbiH/VisC/Coq7-like monooxygenases and UbiG/UbiE
  methyltransferases, tailor the prenylated aromatic ring to mature ubiquinone.
status: DRAFT
evidence:
  - source_id: GO:0006744
    title: ubiquinone biosynthetic process
    statement: >-
      GO biological-process term for de novo ubiquinone biosynthesis; used as
      the primary process grounding for the module.
  - source_id: KEGG:map00130
    title: Ubiquinone and other terpenoid-quinone biosynthesis
    statement: >-
      KEGG pathway context for ubiquinone biosynthesis and neighboring
      terpenoid-quinone reactions; species-specific map members need filtering
      because quinone reductases, homogentisate metabolism, menaquinone
      methylation, and cofactor-supply enzymes can appear in the same map.
  - source_id: PMID:28927698
    title: Biochemistry of Mitochondrial Coenzyme Q Biosynthesis
    statement: >-
      Review article summarizing CoQ/ubiquinone biosynthesis across eukaryotic
      and prokaryotic systems, including the UbiD/UbiX decarboxylation context,
      prokaryotic UbiG O-methylation, UbiE/COQ5 C-methylation, UbiH-like
      hydroxylation, and COQ7/Coq7 late hydroxylation.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata inventory
    statement: >-
      Local UniProt-derived inventory provides the Pseudomonas putida KT2440
      exemplar accessions, GO terms, EC numbers, and PANTHER families used to
      ground representative members in this module.
notes: >-
  This module is intentionally narrower than KEGG map00130: it represents
  ubiquinone biosynthesis, not all terpenoid quinones. Homogentisate production,
  generic NAD(P)H:quinone oxidoreductases, acyl-CoA thioesterases, and
  downstream quinone use are kept outside the core boundary unless a
  species-specific instantiation shows that they are required for ubiquinone
  formation.
module:
  id: ubiquinone_biosynthesis
  label: Ubiquinone biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: ubiquinone biosynthetic process
      term:
        id: GO:0006744
        label: ubiquinone biosynthetic process
      description: De novo formation of ubiquinone/coenzyme Q.
  parts:
    - order: 1
      role: aromatic head-group synthesis
      node:
        id: hydroxybenzoate_head_group_synthesis
        label: 4-hydroxybenzoate formation from chorismate
        module_type: REACTION
        annotons:
          - id: chorismate_lyase_activity
            label: "UbiC: chorismate lyase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiC chorismate lyase family
                term:
                  id: PANTHER:PTHR38683
                  label: Chorismate pyruvate-lyase family
                representative_members:
                  - preferred_term: ubiC (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88C66
                      label: Probable chorismate pyruvate-lyase
            function:
              preferred_term: chorismate lyase activity
              term:
                id: GO:0008813
                label: chorismate lyase activity
              substrates:
                - preferred_term: chorismate
              products:
                - preferred_term: 4-hydroxybenzoate
                - preferred_term: pyruvate
              evidence:
                - source_id: EC:4.1.3.40
                  statement: Chorismate lyase / chorismate pyruvate-lyase.
            role_description: Supplies the aromatic head group precursor for ubiquinone.
    - order: 2
      role: polyprenyl side-chain attachment
      node:
        id: hydroxybenzoate_prenylation
        label: Polyprenylation of 4-hydroxybenzoate
        module_type: REACTION
        annotons:
          - id: hydroxybenzoate_polyprenyltransferase_activity
            label: "UbiA: 4-hydroxybenzoate polyprenyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiA 4-hydroxybenzoate polyprenyltransferase family
                term:
                  id: PANTHER:PTHR11048
                  label: UbiA prenyltransferase family
                representative_members:
                  - preferred_term: ubiA (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88C65
                      label: 4-hydroxybenzoate octaprenyltransferase
            function:
              preferred_term: 4-hydroxybenzoate polyprenyltransferase activity
              term:
                id: GO:0008412
                label: 4-hydroxybenzoate polyprenyltransferase activity
              substrates:
                - preferred_term: 4-hydroxybenzoate
                - preferred_term: polyprenyl diphosphate
              products:
                - preferred_term: 3-polyprenyl-4-hydroxybenzoate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.5.1.39
                  statement: 4-hydroxybenzoate polyprenyltransferase.
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Attaches the hydrophobic polyprenyl side chain to the aromatic head group.
    - order: 3
      role: UbiD decarboxylation and prFMN cofactor supply
      node:
        id: ubid_decarboxylation_module
        label: prFMN-dependent decarboxylation
        module_type: METABOLIC_PATHWAY
        description: >-
          UbiD-family decarboxylases require a prenylated-FMN cofactor made by
          UbiX. UbiX is modeled here as cofactor-supply context for the UbiD
          step rather than as a direct ring-substrate conversion.
        annotons:
          - id: flavin_prenyltransferase_activity
            label: "UbiX: flavin prenyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiX flavin prenyltransferase family
                term:
                  id: PANTHER:PTHR43374
                  label: UbiX flavin prenyltransferase family
                representative_members:
                  - preferred_term: ubiX (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QE6
                      label: Flavin prenyltransferase UbiX
            function:
              preferred_term: flavin prenyltransferase activity
              term:
                id: GO:0106141
                label: flavin prenyltransferase activity
              substrates:
                - preferred_term: FMN
                - preferred_term: dimethylallyl phosphate
              products:
                - preferred_term: prenylated FMN
              evidence:
                - source_id: EC:2.5.1.129
                  statement: Flavin prenyltransferase generating prFMN for UbiD-family decarboxylases.
            role_description: Supplies the prenylated-FMN cofactor needed by UbiD-family decarboxylases.
          - id: polyprenyl_hydroxybenzoate_decarboxylase_activity
            label: "UbiD: 4-hydroxy-3-polyprenylbenzoate decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiD prFMN-dependent decarboxylase family
                term:
                  id: PANTHER:PTHR30108
                  label: UbiD prFMN-dependent decarboxylase family
                representative_members:
                  - preferred_term: ubiD (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88CG8
                      label: 3-octaprenyl-4-hydroxybenzoate carboxy-lyase
            function:
              preferred_term: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
              term:
                id: GO:0008694
                label: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
              substrates:
                - preferred_term: 3-polyprenyl-4-hydroxybenzoate
                - preferred_term: prenylated FMN cofactor
              products:
                - preferred_term: 2-polyprenylphenol
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:4.1.1.98
                  statement: Polyprenyl p-hydroxybenzoate decarboxylase.
            role_description: Decarboxylates the prenylated 4-hydroxybenzoate intermediate.
    - order: 4
      role: aromatic ring hydroxylation
      node:
        id: ubiquinone_ring_hydroxylation
        label: Hydroxylation of prenylated ubiquinone intermediates
        module_type: METABOLIC_PATHWAY
        description: >-
          Hydroxylation steps tailor the prenylated aromatic ring. Bacterial
          implementations vary, and candidate names can differ across organisms,
          so this node records the activity-level roles rather than a single
          universal gene order.
        annotons:
          - id: polyprenylphenol_hydroxylase_activity
            label: "UbiH/VisC-family: 2-polyprenylphenol 6-hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiH/VisC ubiquinone hydroxylase family
                term:
                  id: PANTHER:PTHR43876
                  label: Ubiquinone biosynthesis hydroxylase family
                representative_members:
                  - preferred_term: visC (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88CI4
                      label: Oxidoreductase involved in anaerobic synthesis of ubiquinone
            function:
              preferred_term: 2-polyprenylphenol 6-hydroxylase activity
              term:
                id: GO:0019168
                label: 2-polyprenylphenol 6-hydroxylase activity
              substrates:
                - preferred_term: 2-polyprenylphenol
                - preferred_term: reduced flavin cofactor
              products:
                - preferred_term: 2-polyprenyl-6-hydroxyphenol
            role_description: Adds a ring hydroxyl group to an early prenylated aromatic intermediate.
          - id: octaprenyl_methoxyphenol_hydroxylase_activity
            label: "UbiH: 2-octaprenyl-6-methoxyphenol hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiH/VisC ubiquinone hydroxylase family
                term:
                  id: PANTHER:PTHR43876
                  label: Ubiquinone biosynthesis hydroxylase family
                representative_members:
                  - preferred_term: ubiH (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88CI2
                      label: 2-octaprenyl-6-methoxyphenyl hydroxylase
            function:
              preferred_term: 2-octaprenyl-6-methoxyphenol hydroxylase activity
              term:
                id: GO:0008681
                label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
              substrates:
                - preferred_term: 2-octaprenyl-6-methoxyphenol
                - preferred_term: reduced flavin cofactor
              products:
                - preferred_term: 2-octaprenyl-6-methoxy-1,4-benzoquinol
            role_description: Hydroxylates a methoxy-substituted ubiquinone intermediate.
          - id: demethoxyubiquinol_hydroxylase_activity
            label: "Coq7: 3-demethoxyubiquinol 3-hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Coq7 demethoxyubiquinol hydroxylase family
                term:
                  id: PANTHER:PTHR11237
                  label: Coq7 demethoxyubiquinol hydroxylase family
                representative_members:
                  - preferred_term: coq7 (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QR1
                      label: 3-demethoxyubiquinol 3-hydroxylase
            function:
              preferred_term: 3-demethoxyubiquinol 3-hydroxylase activity
              term:
                id: GO:0008682
                label: 3-demethoxyubiquinol 3-hydroxylase activity
              substrates:
                - preferred_term: 3-demethoxyubiquinol
              products:
                - preferred_term: 3-hydroxy-ubiquinol intermediate
              cofactors:
                - preferred_term: diiron center
              evidence:
                - source_id: EC:1.14.99.60
                  statement: 3-demethoxyubiquinol 3-hydroxylase.
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Performs the late C-3 hydroxylation needed before final methylation.
    - order: 5
      role: aromatic ring methylation
      node:
        id: ubiquinone_ring_methylation
        label: O- and C-methylation of ubiquinone intermediates
        module_type: METABOLIC_PATHWAY
        annotons:
          - id: early_o_methyltransferase_activity
            label: "UbiG: 2-polyprenyl-6-hydroxyphenol methylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiG ubiquinone O-methyltransferase family
                term:
                  id: PANTHER:PTHR43464
                  label: UbiG ubiquinone O-methyltransferase family
                representative_members:
                  - preferred_term: ubiG (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88M10
                      label: Ubiquinone biosynthesis O-methyltransferase
            function:
              preferred_term: 2-polyprenyl-6-hydroxyphenol methylase activity
              term:
                id: GO:0102208
                label: 2-polyprenyl-6-hydroxyphenol methylase activity
              substrates:
