            role_description: Performs an O-methylation on an early hydroxylated ubiquinone intermediate.
          - id: c_methyltransferase_activity
            label: "UbiE: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UbiE/Coq5 ubiquinone C-methyltransferase family
                term:
                  id: PANTHER:PTHR43591
                  label: UbiE/Coq5 methyltransferase family
                representative_members:
