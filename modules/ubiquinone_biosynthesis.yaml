id: MODULE:ubiquinone_biosynthesis
title: Ubiquinone biosynthesis
description: >-
  A taxon-neutral bacterial ubiquinone biosynthesis module covering formation
  of the benzoquinone head group and its polyprenylated membrane-associated
  intermediates from chorismate-derived 4-hydroxybenzoate. The strict pathway
  begins with UbiC production of 4-hydroxybenzoate, UbiA prenylation, UbiD
  decarboxylation supported by the UbiX-derived prenyl-FMN cofactor, and a
  series of hydroxylation and methylation steps carried out by UbiH-family
  monooxygenases, Coq7, UbiE, and UbiG. KEGG ppu00130 is broader than this
  strict module: it also includes other terpenoid-quinone or side-map entries
  such as generic NAD(P)H quinone oxidoreductases, homogentisate formation, and
  acyl-CoA thioesterase-like proteins that should not by themselves satisfy
  ubiquinone biosynthesis.
status: DRAFT
evidence:
  - source_id: GO:0006744
    title: ubiquinone biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for the chemical
      reactions and pathways resulting in formation of ubiquinone.
  - source_id: KEGG:ppu00130
    title: Ubiquinone and other terpenoid-quinone biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but is treated
      as a broad map whose entries must be split into strict ubiquinone
      biosynthesis, accessory/cofactor roles, and side-node redox or aromatic
      metabolism.
  - source_id: UniPathway:UPA00232
    title: Ubiquinone biosynthesis
    statement: >-
      UniPathway UPA00232 supplies an organism-neutral ubiquinone biosynthesis
      cross-reference for several PSEPK Ubi proteins, including candidate
      accessory factors that are not included in KEGG ppu00130.
  - source_id: file:modules/ubiquinone_biosynthesis-deep-research-falcon.md
    title: Falcon generic ubiquinone biosynthesis review
    statement: >-
      Generic Falcon research supports including UbiB, UbiJ, and UbiK as
      accessory factors in the bacterial Ubi metabolon, while keeping
      quinone-utilizing redox enzymes and neighboring precursor pathways outside
      the strict biosynthetic module.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-falcon.md
    title: Falcon PSEPK ppu00130 ubiquinone biosynthesis review
    statement: >-
      Species-aware Falcon research flags ppu00130 as broader than strict
      ubiquinone biosynthesis and identifies UbiB/UbiJ as expected accessory
      factors missing from the initial KEGG candidate list; local metadata also
      identifies UbiK through UniPathway UPA00232.
module:
  id: ubiquinone_biosynthesis
  label: Ubiquinone biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: ubiquinone biosynthetic process
      term:
        id: GO:0006744
        label: ubiquinone biosynthetic process
      description: Biosynthesis of ubiquinone, also known as coenzyme Q.
    - preferred_term: ubiquinone biosynthesis complex
      term:
        id: GO:0110142
        label: ubiquinone biosynthesis complex
      description: >-
        Bacterial Ubi proteins can act in a membrane-associated biosynthetic
        complex with accessory factors; organism-specific evidence is needed
        before assigning individual proteins to this complex.
  context:
    cellular_components:
      - preferred_term: bacterial plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: >-
          Most polyprenylated ubiquinone intermediates and several Ubi enzymes
          are membrane-associated in bacteria.
  parts:
    - order: 1
      role: 4-hydroxybenzoate precursor formation
      node:
        id: chorismate_to_4_hydroxybenzoate
        label: Chorismate to 4-hydroxybenzoate
        module_type: REACTION
        description: >-
          UbiC removes the pyruvyl group from chorismate to form
          4-hydroxybenzoate, the aromatic head-group precursor for bacterial
          ubiquinone.
        annotons:
          - id: ubiC_chorismate_lyase
            label: UbiC chorismate lyase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiC
                term:
                  id: UniProtKB:Q88C66
                  label: Probable chorismate pyruvate-lyase
            function:
              preferred_term: chorismate lyase activity
              term:
                id: GO:0008813
                label: chorismate lyase activity
              substrates:
                - preferred_term: chorismate
              products:
                - preferred_term: 4-hydroxybenzoate
                - preferred_term: pyruvate
              evidence:
                - source_id: EC:4.1.3.40
                  statement: chorismate pyruvate-lyase
            role_description: Supplies the 4-hydroxybenzoate ring precursor.
    - order: 2
      role: polyprenyl side-chain attachment
      node:
        id: hydroxybenzoate_prenylation
        label: 4-hydroxybenzoate polyprenylation
        module_type: REACTION
        description: >-
          UbiA attaches an all-trans polyprenyl side chain to
          4-hydroxybenzoate, committing the soluble head group to the membrane
          ubiquinone pathway.
        annotons:
          - id: ubiA_hydroxybenzoate_polyprenyltransferase
            label: UbiA 4-hydroxybenzoate polyprenyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiA
                term:
                  id: UniProtKB:Q88C65
                  label: 4-hydroxybenzoate octaprenyltransferase
            function:
              preferred_term: 4-hydroxybenzoate polyprenyltransferase activity
              term:
                id: GO:0008412
                label: 4-hydroxybenzoate polyprenyltransferase activity
              substrates:
                - preferred_term: 4-hydroxybenzoate
                - preferred_term: polyprenyl diphosphate
              products:
                - preferred_term: 4-hydroxy-3-polyprenylbenzoate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.5.1.39
                  statement: 4-hydroxybenzoate polyprenyltransferase
            role_description: Commits the 4-hydroxybenzoate ring to ubiquinone biosynthesis.
    - order: 3
      role: prenyl-FMN cofactor supply for UbiD
      node:
        id: ubiX_prenyl_fmn_supply
        label: Prenyl-FMN cofactor synthesis
        module_type: REACTION
        description: >-
          UbiX synthesizes the prenylated FMN cofactor required by UbiD-family
          decarboxylases. This is a cofactor-support role rather than a direct
          transformation of a ubiquinone-pathway intermediate.
        annotons:
          - id: ubiX_flavin_prenyltransferase
            label: UbiX flavin prenyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiX
                term:
                  id: UniProtKB:Q88QE6
                  label: Flavin prenyltransferase UbiX
            function:
              preferred_term: flavin prenyltransferase activity
              term:
                id: GO:0106141
                label: flavin prenyltransferase activity
              substrates:
                - preferred_term: reduced FMN
                - preferred_term: dimethylallyl phosphate
              products:
                - preferred_term: prenylated FMN
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.5.1.129
                  statement: flavin prenyltransferase
            role_description: Cofactor support for UbiD-family decarboxylation.
    - order: 4
      role: polyprenyl-hydroxybenzoate decarboxylation
      node:
        id: ubiD_decarboxylation
        label: 4-hydroxy-3-polyprenylbenzoate decarboxylation
        module_type: REACTION
        description: >-
          UbiD decarboxylates the polyprenylated hydroxybenzoate intermediate
          to generate a polyprenylphenol intermediate.
        annotons:
          - id: ubiD_polyprenylbenzoate_decarboxylase
            label: UbiD 4-hydroxy-3-polyprenylbenzoate decarboxylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiD
                term:
                  id: UniProtKB:Q88CG8
                  label: 3-octaprenyl-4-hydroxybenzoate carboxy-lyase
            function:
              preferred_term: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
              term:
                id: GO:0008694
                label: 4-hydroxy-3-polyprenylbenzoate decarboxylase activity
              substrates:
                - preferred_term: 4-hydroxy-3-polyprenylbenzoate
              products:
                - preferred_term: 2-polyprenylphenol
                - preferred_term: carbon dioxide
              evidence:
                - source_id: EC:4.1.1.98
                  statement: 3-octaprenyl-4-hydroxybenzoate carboxy-lyase
            role_description: Requires the prenyl-FMN cofactor supplied by UbiX.
    - order: 5
      role: first aromatic hydroxylation
      node:
        id: polyprenylphenol_hydroxylation
        label: 2-polyprenylphenol hydroxylation
        module_type: REACTION
        description: >-
          A UbiH/Coq6-family monooxygenase introduces a hydroxyl group into the
          polyprenylphenol intermediate. In the PSEPK KEGG set this UbiI-like
          role is represented by visC/PP_5197; the gene name is potentially
          misleading because UniProt describes the protein as VisC but assigns
          the specific 2-polyprenylphenol 6-hydroxylase activity.
        annotons:
          - id: visC_polyprenylphenol_hydroxylase
            label: VisC/UbiI-like 2-polyprenylphenol 6-hydroxylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK visC
                term:
                  id: UniProtKB:Q88CI4
                  label: Oxidoreductase involved in anaerobic synthesis of ubiquinone
            function:
              preferred_term: 2-polyprenylphenol 6-hydroxylase activity
              term:
                id: GO:0019168
                label: 2-polyprenylphenol 6-hydroxylase activity
              substrates:
                - preferred_term: 2-polyprenylphenol
                - preferred_term: reduced flavin
                - preferred_term: oxygen
              products:
                - preferred_term: polyprenyldihydroxybenzene
              evidence:
                - source_id: GO:0019168
                  statement: 2-polyprenylphenol 6-hydroxylase activity
            role_description: >-
              UbiI-like C5 hydroxylation step in the PSEPK pathway; distinguish
              this from separate anaerobic UbiT/UbiU/UbiV systems.
    - order: 6
      role: first O-methylation
      node:
        id: ubiG_first_o_methylation
        label: Polyprenyldihydroxybenzene O-methylation
        module_type: REACTION
        description: >-
          UbiG catalyzes the first O-methylation of a polyprenyldihydroxybenzene
          intermediate in the ubiquinone pathway.
        annotons:
          - id: ubiG_polyprenylphenol_methylase
            label: UbiG 2-polyprenyl-6-hydroxyphenol methylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiG
                term:
                  id: UniProtKB:Q88M10
                  label: Ubiquinone biosynthesis O-methyltransferase
            function:
              preferred_term: 2-polyprenyl-6-hydroxyphenol methylase activity
              term:
                id: GO:0102208
                label: 2-polyprenyl-6-hydroxyphenol methylase activity
              substrates:
                - preferred_term: 2-polyprenyl-6-hydroxyphenol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 2-methoxy-6-polyprenylphenol
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.222
                  statement: 2-polyprenyl-6-hydroxyphenol methylase
            role_description: One of the two UbiG O-methyltransferase steps.
    - order: 7
      role: second aromatic hydroxylation
      node:
        id: ubiH_methoxyphenol_hydroxylation
        label: 2-octaprenyl-6-methoxyphenol hydroxylation
        module_type: REACTION
        description: >-
          UbiH-family monooxygenases hydroxylate the methoxyphenol intermediate
          during ubiquinone biosynthesis.
        annotons:
          - id: ubiH_methoxyphenol_hydroxylase
            label: UbiH 2-octaprenyl-6-methoxyphenol hydroxylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiH
                term:
                  id: UniProtKB:Q88CI2
                  label: 2-octaprenyl-6-methoxyphenyl hydroxylase
            function:
              preferred_term: 2-octaprenyl-6-methoxyphenol hydroxylase activity
              term:
                id: GO:0008681
                label: 2-octaprenyl-6-methoxyphenol hydroxylase activity
              substrates:
                - preferred_term: 2-octaprenyl-6-methoxyphenol
                - preferred_term: reduced flavin
                - preferred_term: oxygen
              products:
                - preferred_term: 2-octaprenyl-6-methoxy-1,4-benzoquinol
              evidence:
                - source_id: GO:0008681
                  statement: 2-octaprenyl-6-methoxyphenol hydroxylase activity
            role_description: Hydroxylation step before UbiE C-methylation.
    - order: 8
      role: C-methylation of the quinol ring
      node:
        id: ubiE_c_methylation
        label: UbiE C-methylation
        module_type: REACTION
        description: >-
          UbiE methylates 2-methoxy-6-polyprenyl-1,4-benzoquinol during
          ubiquinone biosynthesis. The same enzyme family can also methylate
          demethylmenaquinone in organisms that synthesize menaquinone.
        annotons:
          - id: ubiE_benzoquinol_methyltransferase
            label: UbiE 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiE
                term:
                  id: UniProtKB:Q88D17
                  label: Ubiquinone/menaquinone biosynthesis C-methyltransferase UbiE
            function:
              preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              term:
                id: GO:0008425
                label: 2-methoxy-6-polyprenyl-1,4-benzoquinol methyltransferase activity
              substrates:
                - preferred_term: 2-methoxy-6-polyprenyl-1,4-benzoquinol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 5-methoxy-2-methyl-3-polyprenyl-1,4-benzoquinol
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.201
                  statement: 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase
            role_description: Ubiquinone C-methyltransferase step.
    - order: 9
      role: demethoxyubiquinol hydroxylation
      node:
        id: coq7_dmq_hydroxylation
        label: 3-demethoxyubiquinol hydroxylation
        module_type: REACTION
        description: >-
          Coq7 hydroxylates demethoxyubiquinol to form demethylubiquinol,
          setting up the terminal UbiG O-methylation.
        annotons:
          - id: coq7_dmq_hydroxylase
            label: Coq7 3-demethoxyubiquinol hydroxylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK coq7
                term:
                  id: UniProtKB:Q88QR1
                  label: 3-demethoxyubiquinol 3-hydroxylase
            function:
              preferred_term: 3-demethoxyubiquinol 3-hydroxylase activity
              term:
                id: GO:0008682
                label: 3-demethoxyubiquinol 3-hydroxylase activity
              substrates:
                - preferred_term: 3-demethoxyubiquinol
                - preferred_term: reduced acceptor
                - preferred_term: oxygen
              products:
                - preferred_term: 3-demethylubiquinol
                - preferred_term: water
              evidence:
                - source_id: EC:1.14.99.60
                  statement: 3-demethoxyubiquinol 3-hydroxylase
            role_description: Late hydroxylation step in ubiquinone biosynthesis.
    - order: 10
      role: terminal O-methylation
      node:
        id: ubiG_terminal_o_methylation
        label: Demethylubiquinol O-methylation
        module_type: REACTION
        description: >-
          UbiG catalyzes terminal O-methylation of demethylubiquinol to produce
          ubiquinol, which can interconvert with ubiquinone in respiratory
          electron-transfer reactions.
        annotons:
          - id: ubiG_demethylubiquinol_methyltransferase
            label: UbiG 3-demethylubiquinol 3-O-methyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiG
                term:
                  id: UniProtKB:Q88M10
                  label: Ubiquinone biosynthesis O-methyltransferase
            function:
              preferred_term: 3-demethylubiquinol 3-O-methyltransferase activity
              term:
                id: GO:0061542
                label: 3-demethylubiquinol 3-O-methyltransferase activity
              substrates:
                - preferred_term: 3-demethylubiquinol
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: ubiquinol
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.64
                  statement: 3-demethylubiquinol 3-O-methyltransferase
            role_description: Terminal methylation step producing ubiquinol.
    - order: 11
      role: Ubi complex intermediate handling and UbiI regulation
      node:
        id: ubiB_accessory_regulation
        label: UbiB kinase-like accessory factor
        module_type: BIOLOGICAL_PROCESS
        description: >-
          UbiB-family kinase-like proteins support efficient aerobic ubiquinone
          biosynthesis, probably by regulating UbiI activity and/or assisting
          ATP-dependent handling of membrane-associated ubiquinone
          intermediates. This node is an accessory support role, not a discrete
          substrate-to-product chemical step.
        annotons:
          - id: ubiB_accessory_factor
            label: UbiB accessory/regulatory factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiB
                term:
                  id: UniProtKB:A0A140FWS4
                  label: Probable protein kinase UbiB
            processes:
              - preferred_term: regulation of ubiquinone biosynthetic process
                term:
                  id: GO:0010795
                  label: regulation of ubiquinone biosynthetic process
                evidence:
                  - source_id: UniPathway:UPA00232
                    statement: UbiB is a UniPathway-linked ubiquinone biosynthesis accessory/regulatory factor in PSEPK.
            role_description: >-
              Kinase-like accessory factor for efficient aerobic ubiquinone
              biosynthesis; do not model the broad protein kinase annotation as
              the pathway-defining core activity without stronger substrate
              evidence.
    - order: 12
      role: lipid-intermediate binding and Ubi complex scaffold
      node:
        id: ubiJ_lipid_binding_accessory
        label: UbiJ lipid-binding accessory factor
        module_type: BIOLOGICAL_PROCESS
        description: >-
          UbiJ binds hydrophobic ubiquinone biosynthetic intermediates through
          its SCP2 domain and helps stabilize or organize the Ubi enzyme
          assembly that processes polyprenylated membrane-associated
          intermediates.
        annotons:
          - id: ubiJ_accessory_factor
            label: UbiJ SCP2-domain accessory factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiJ
                term:
                  id: UniProtKB:Q88D16
                  label: Ubiquinone biosynthesis accessory factor UbiJ
            processes:
              - preferred_term: ubiquinone biosynthetic process
                term:
                  id: GO:0006744
                  label: ubiquinone biosynthetic process
                evidence:
                  - source_id: UniPathway:UPA00232
                    statement: UbiJ is a UniPathway-linked ubiquinone biosynthesis accessory factor in PSEPK.
            role_description: >-
              Accessory lipid-binding/scaffold factor; no discrete catalytic
              molecular-function term is asserted here.
    - order: 13
      role: Ubi complex assembly support
      node:
        id: ubiK_assembly_accessory
        label: UbiK assembly accessory factor
        module_type: BIOLOGICAL_PROCESS
        description: >-
          UbiK is a small Ubi accessory factor that supports efficient
          ubiquinone biosynthesis, probably by assisting enzyme assembly,
          targeting, or stability together with UbiJ.
        annotons:
          - id: ubiK_accessory_factor
            label: UbiK accessory factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK ubiK
                term:
                  id: UniProtKB:Q88CE6
                  label: Ubiquinone biosynthesis accessory factor UbiK
            processes:
              - preferred_term: ubiquinone biosynthetic process
                term:
                  id: GO:0006744
                  label: ubiquinone biosynthetic process
                evidence:
                  - source_id: UniPathway:UPA00232
                    statement: UbiK is a UniPathway-linked ubiquinone biosynthesis accessory factor in PSEPK.
            role_description: >-
              Assembly/targeting support for efficient ubiquinone biosynthesis;
              no catalytic molecular-function term is asserted.
notes: >-
  PSEPK ppu00130 should be curated as a strict ubiquinone biosynthesis module
  plus side-node review. UbiB, UbiJ, and UbiK were promoted from UniPathway/local
  metadata rather than the initial KEGG ppu00130 set because they are expected
  accessory factors for efficient bacterial ubiquinone biosynthesis. The apparent
  UbiI gap is resolved as a nomenclature issue: PSEPK visC/PP_5197 is the
  UbiH/Coq6-family, PTHR43876:SF7, GO:0019168 2-polyprenylphenol hydroxylase
  candidate and should be treated as the UbiI-like C5 hydroxylation step pending
  deeper experimental confirmation. Generic NAD(P)H quinone oxidoreductases,
  hpd/homogentisate chemistry, and PP_1218 acyl-CoA thioesterase activity should
  not be counted as strict ubiquinone biosynthetic steps without stronger pathway
  evidence.
