id: MODULE:ubiquinone_biosynthesis
title: Ubiquinone biosynthesis from chorismate-derived 4-hydroxybenzoate
description: >-
  Reusable bacterial pathway for de novo aerobic biosynthesis of ubiquinone
  (coenzyme Q) from chorismate-derived 4-hydroxybenzoate and a supplied
  polyprenyl diphosphate side chain. UbiC forms the aromatic head group, UbiA
  attaches the side chain, and UbiD decarboxylates the prenylated intermediate
  using prenylated FMN supplied by UbiX. Three complementary ring
  hydroxylations and three methylations then generate mature ubiquinone. The
  identities of the aerobic hydroxylases vary by lineage; Coq7-family enzymes
  can replace the UbiF-type late hydroxylase. UbiJ, UbiK, and UbiB are modeled
  as optional bacterial assembly/regulatory context rather than reaction
  chemistry. Oxygen-independent UbiT/UbiU/UbiV implementations are a distinct
  conditional variant and are outside this aerobic module.
status: DRAFT
evidence:
  - source_id: GO:0006744
    title: ubiquinone biosynthetic process
    statement: >-
      GO biological-process term for de novo ubiquinone biosynthesis; used as
      the primary process grounding for the module.
  - source_id: KEGG:map00130
    title: Ubiquinone and other terpenoid-quinone biosynthesis
    statement: >-
      KEGG pathway context for ubiquinone biosynthesis and neighboring
      terpenoid-quinone reactions; species-specific map members need filtering
      because quinone reductases, homogentisate metabolism, menaquinone
      methylation, and cofactor-supply enzymes can appear in the same map.
  - source_id: PMID:28927698
    title: Biochemistry of Mitochondrial Coenzyme Q Biosynthesis
    statement: >-
      Review article summarizing CoQ/ubiquinone biosynthesis across eukaryotic
      and prokaryotic systems, including the UbiD/UbiX decarboxylation context,
      prokaryotic UbiG O-methylation, UbiE/COQ5 C-methylation, UbiH-like
      hydroxylation, and COQ7/Coq7 late hydroxylation.
  - source_id: PMID:24480387
    title: Biosynthesis and physiology of coenzyme Q in bacteria
    statement: >-
      Review of bacterial ubiquinone reaction order, enzyme assignments, and
      pathway variation used to delimit the reaction chain.
  - source_id: PMID:23709220
    title: "ubiI, a new gene in Escherichia coli coenzyme Q biosynthesis, is involved in aerobic C5-hydroxylation"
    statement: >-
      Establishes UbiI as the oxygen-dependent early polyprenylphenol
      hydroxylase and grounds the experimentally characterized E. coli
      exemplar UniProtKB:P25535.
  - source_id: PMID:30686758
    title: A soluble metabolon synthesizes the isoprenoid lipid ubiquinone
    statement: >-
      Establishes the bacterial Ubi metabolon and the lipid-intermediate
      handling role of the UbiJ scaffold.
  - source_id: PMID:36142227
    title: "Towards Molecular Understanding of the Functional Role of UbiJ-UbiK(2) Complex in Ubiquinone Biosynthesis by Multiscale Molecular Modelling Studies"
    statement: >-
      Supports the bacterial UbiJ/UbiK accessory assembly context while
      distinguishing it from the core reaction sequence.
  - source_id: file:modules/ubiquinone_biosynthesis-deep-research-openscientist.md
    title: OpenScientist generic ubiquinone module review
    statement: >-
      Research synthesis covering module boundaries, reaction order,
      oxygen-dependent alternatives, and bacterial assembly factors.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__ubiquinone_biosynthesis__ppu00130-deep-research-openscientist.md
    title: OpenScientist PSEPK ubiquinone pathway assessment
    statement: >-
      Species-level satisfiability audit identifying the complete KT2440
      aerobic route, the Coq7-for-UbiF substitution, and UbiJ/UbiK/UbiB
      accessory factors omitted by KEGG map membership.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata inventory
    statement: >-
      Local UniProt-derived inventory provides the Pseudomonas putida KT2440
      exemplar accessions, GO terms, EC numbers, and PANTHER families used to
      ground representative members in this module.
notes: >-
  This module is intentionally narrower than KEGG map00130: it represents
  aerobic ubiquinone biosynthesis, not all terpenoid quinones. Homogentisate
  production, generic NAD(P)H:quinone oxidoreductases, acyl-CoA thioesterases,
  menaquinone synthesis, and downstream quinone use are outside the boundary.
  Polyprenyl diphosphate synthesis is an upstream isoprenoid-module input, so
  IspB/PDSS enzymes are not duplicated here. Exact ring-tailoring order and
  substrate names differ among lineages; connections across the grouped
  hydroxylation and methylation submodules therefore record pathway continuity
  without claiming one universal order for every intermediate.
