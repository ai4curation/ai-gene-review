  knowledge_gaps:
    - gap_statement: >-
        Oxygen-independent UbiT/UbiU/UbiV hydroxylation reaches the same
        ubiquinone product but uses distinct machinery and incompletely resolved
        chemistry.
      boundary: >-
        Keep that route outside this aerobic module until its reaction-level
        implementation can be grounded without conflating it with UbiI/UbiH/
        UbiF- or Coq7-family activities.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        Exact reaction order and intermediate nomenclature for the three ring
        hydroxylations varies across bacterial lineages.
      boundary: >-
        Treat the grouped hydroxylation and methylation nodes as a reusable
        activity inventory; instantiate lineage-specific order only when direct
        biochemical or well-supported pathway evidence is available.
      gap_kind:
        - BIOLOGY
    - gap_statement: >-
        UbiB is a conserved kinase-like regulator, but the direct molecular
        output of bacterial UbiB proteins remains less certain than their
        pathway requirement.
      boundary: >-
        Model UbiB as optional regulatory context and do not assign a module
        leaf molecular function until the gene-level evidence is adjudicated.
      gap_kind:
        - BIOLOGY
        - CURATION
