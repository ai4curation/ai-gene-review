id: MODULE:biotin_biosynthesis
title: De novo biotin biosynthesis via the BioC-BioH route
description: >-
  Bacterial de novo biotin synthesis in which BioC methylates malonyl-ACP,
  shared fatty-acid-synthase reactions extend the masked intermediate to
  pimeloyl-ACP methyl ester, and BioH removes the methyl group. BioF, BioA,
  BioD, and BioB then assemble the two-ring biotin cofactor. The module models
  the six pathway-specific enzymes; generic fatty-acid elongation machinery is
  an explicit dependency rather than a biotin-specific member, and biotin
  attachment and BirA-mediated regulation are outside the biosynthesis boundary.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00780
    title: Pseudomonas putida KT2440 biotin metabolism
    statement: >-
      The PSEPK pathway bucket contains the bioBFHCD cluster and the separate
      bioA gene, together with generic fatty-acid and biotin-utilization genes
      that require boundary curation.
  - source_id: GO:0009102
    title: biotin biosynthetic process
    statement: The module is grounded in the GO biological-process term for biotin synthesis.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__biotin_biosynthesis__ppu00780-deep-research-openscientist.md
    title: OpenScientist module/pathway/taxon report for PSEPK biotin biosynthesis
    statement: >-
      Supports coverage of all six pathway-specific reactions, exclusion of
      BirA and generic fatty-acid-synthesis proteins from dedicated membership,
      and complete pathway satisfiability in KT2440. Individual enzyme
      assignments remain homology- and genomic-context-based rather than direct
      KT2440 biochemical evidence.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      Supplies exact locus, gene-symbol, accession, and pathway-bucket mappings
      used for the PSEPK satisfiability pass.
