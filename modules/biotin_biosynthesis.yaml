      target: bioH_step
      connection_type: PRECEDES
      chaining_status: NOT_APPLICABLE
      chaining_note: >-
        Shared fatty-acid-synthase reactions perform two elongation cycles
        between the BioC and BioH pathway-specific control points.
    - source: bioH_step
      target: bioF_step
      connection_type: PRECEDES
    - source: bioF_step
      target: bioA_step
      connection_type: PRECEDES
    - source: bioA_step
      target: bioD_step
      connection_type: PRECEDES
    - source: bioD_step
      target: bioB_step
      connection_type: PRECEDES
  knowledge_gaps:
    - gap_statement: >-
        The ppu00780 bucket lists several generic fatty-acid-synthesis enzymes,
        but it does not establish which paralogs carry the masked pimelate
        intermediate in KT2440.
      boundary: >-
        Keep shared elongation as an explicit dependency and do not assign
        biotin-specific membership to Fab proteins without pathway-specific
        genetic, biochemical, or strong comparative-genomic evidence.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        No direct biochemical or genetic characterization of the six KT2440
        pathway-specific proteins was identified in the module-level research.
      boundary: >-
        Treat pathway coverage as strongly supported by exact family assignments,
        conserved reactions, and genomic context, but do not represent transferred
        mechanism as strain-specific experimental evidence.
      gap_kind:
        - CURATION
  notes: >-
    This reusable module contains six substantive pathway-specific enzyme
    parts. BirA-mediated biotin attachment and transcriptional regulation are
    part of the broader biotin cycle, not de novo cofactor synthesis. Molecular
    functions are attached only to leaf annotons, every leaf has an exact
    PSEPK UniProt exemplar, and no cytoplasmic location is repeated at module
    level.
