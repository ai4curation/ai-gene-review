id: MODULE:biotin_biosynthesis
title: Bacterial de novo biotin biosynthesis — the conserved KAPA→DAPA→dethiobiotin→biotin core (BioF/BioA/BioD/BioB)
description: >-
  De novo biosynthesis of the cofactor biotin (vitamin B7) in bacteria proceeds
  through a conserved four-step terminal pathway that converts a pimeloyl
  thioester and simple amino donors into the fused bicyclic biotin ring. In the
  canonical route: (1) the pyridoxal-5'-phosphate (PLP) enzyme 8-amino-7-
  oxononanoate synthase (BioF) condenses a pimeloyl thioester (pimeloyl-[acyl-
  carrier protein] in Escherichia coli) with L-alanine to give 8-amino-7-
  oxononanoate (KAPA, also called 7-keto-8-aminopelargonic acid); (2) the PLP
  aminotransferase adenosylmethionine-8-amino-7-oxononanoate transaminase (BioA)
  transaminates KAPA to 7,8-diaminononanoate (DAPA), using S-adenosyl-L-
  methionine — rather than glutamate — as the unusual amino donor; (3) the ATP-
  and Mg2+-dependent dethiobiotin synthetase (BioD) closes the ureido ring by
  carboxylating DAPA to dethiobiotin; and (4) the radical-S-adenosylmethionine
  iron–sulfur enzyme biotin synthase (BioB) inserts sulfur across the C6–C9
  positions of dethiobiotin to complete the thiophane ring, yielding biotin.
  This KAPA→DAPA→dethiobiotin→biotin core (the BioF/BioA/BioD/BioB steps) is
  strongly conserved across Gram-negative bacteria and mycobacteria and is
  absent from humans, who obtain biotin from diet and gut microbiota, which is
  why it is an attractive antibacterial target. The upstream stage that builds
  the pimeloyl thioester (BioC/BioH in E. coli; BioW/BioI or other routes in
  other taxa) is taxonomically variable and is treated here as context rather
  than as a modeled part.
status: DRAFT
evidence:
  - source_id: GO:0009102
    title: biotin biosynthetic process
    statement: >-
      All four enzymes of the module are annotated to the GO biotin biosynthetic
      process (GO:0009102), the process this metabolic module realizes.
  - source_id: UniProtKB:P12998
    title: 8-amino-7-oxononanoate synthase (BioF), E. coli K-12
    statement: >-
      Step-1 grounding: bioF (P12998), EC 2.3.1.47, GO:0008710 8-amino-7-
      oxononanoate synthase activity, Rhea:42288, PANTHER PTHR13693.
  - source_id: UniProtKB:P12995
    title: Adenosylmethionine-8-amino-7-oxononanoate aminotransferase (BioA), E. coli K-12
    statement: >-
      Step-2 grounding: bioA (P12995), EC 2.6.1.62, GO:0004015 adenosylmethionine-
      8-amino-7-oxononanoate transaminase activity, Rhea:16861, PANTHER PTHR42684.
  - source_id: UniProtKB:P13000
    title: ATP-dependent dethiobiotin synthetase (BioD), E. coli K-12
    statement: >-
      Step-3 grounding: bioD (P13000), EC 6.3.3.3, GO:0004141 dethiobiotin
      synthase activity, Rhea:15805, PANTHER PTHR43210.
  - source_id: UniProtKB:P12996
    title: Biotin synthase (BioB), E. coli K-12
    statement: >-
      Step-4 grounding: bioB (P12996), EC 2.8.1.6, GO:0004076 biotin synthase
      activity, Rhea:22060, PANTHER PTHR22976.
  - source_id: PMID:42343126
    title: A Streptomyces megacluster encodes synergistic biotin-targeting antibiotics
    statement: >-
      A conserved Streptomyces biosynthetic megacluster produces four natural-
      product families (stravidins, acidomycin, dapamycins, α-Me-KAPA) plus the
      biotin-binding protein streptavidin, which converge on this bacterial
      biotin-metabolism pathway (enzyme inhibition, prodrug activation, cofactor
      mimicry, biotin sequestration). Acidomycin (amiclenomycin) inhibits the BioA
      transaminase step, and α-Me-KAPA is a structural mimic of the KAPA
      intermediate that is the BioA substrate — motivating this module as the
      druggable target pathway rather than asserting specific inhibition kinetics
      (full text unavailable; abstract-only cache).
module:
  id: biotin_biosynthesis
  label: Bacterial de novo biotin biosynthesis (BioF → BioA → BioD → BioB)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: biotin biosynthetic process
      term:
        id: GO:0009102
        label: biotin biosynthetic process
      description: >-
        De novo assembly of the biotin bicyclic ring from a pimeloyl thioester
        and amino/sulfur donors through the conserved KAPA → DAPA → dethiobiotin
        → biotin sequence.
  parts:
    - order: 1
      role: KAPA (8-amino-7-oxononanoate) formation — entry into the biotin amino stage
      node:
        id: biof_step
        label: pimeloyl-[ACP] + L-alanine -> 8-amino-7-oxononanoate (KAPA) + CO2 + holo-[ACP]
        module_type: REACTION
        annotons:
          - id: biof_activity
            label: "BioF: 8-amino-7-oxononanoate synthase (KAPA synthase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 8-amino-7-oxononanoate synthase family (BioF)
                term:
                  id: PANTHER:PTHR13693
                  label: CLASS II AMINOTRANSFERASE/8-AMINO-7-OXONONANOATE SYNTHASE
                representative_members:
                  - preferred_term: BioF (E. coli K-12)
                    term:
                      id: UniProtKB:P12998
                      label: 8-amino-7-oxononanoate synthase
            function:
              preferred_term: 8-amino-7-oxononanoate synthase activity
              term:
                id: GO:0008710
                label: 8-amino-7-oxononanoate synthase activity
              substrates:
                - preferred_term: pimeloyl-[acyl-carrier protein]
                - preferred_term: L-alanine
              products:
                - preferred_term: 8-amino-7-oxononanoate (KAPA)
                - preferred_term: carbon dioxide
                - preferred_term: holo-[acyl-carrier protein]
              evidence:
                - source_id: EC:2.3.1.47
                  statement: 8-amino-7-oxononanoate synthase (AONS / KAPA synthase)
                - source_id: RHEA:42288
                  statement: pimeloyl-[ACP] + L-alanine = 8-amino-7-oxononanoate + CO2 + holo-[ACP] (+ H+)
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              PLP-dependent condensation of a pimeloyl thioester with L-alanine,
              with concomitant decarboxylation, to form the first biotin-pathway
              intermediate KAPA (8-amino-7-oxononanoate). This is the committed
              entry into the conserved amino/diamino stage of biotin synthesis.
    - order: 2
      role: transamination of KAPA to the diamine DAPA (SAM as amino donor)
      node:
        id: bioa_step
        label: 8-amino-7-oxononanoate (KAPA) + S-adenosyl-L-methionine -> 7,8-diaminononanoate (DAPA) + S-adenosyl-4-methylsulfanyl-2-oxobutanoate
        module_type: REACTION
        annotons:
          - id: bioa_activity
            label: "BioA: adenosylmethionine-8-amino-7-oxononanoate transaminase (DAPA aminotransferase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenosylmethionine-8-amino-7-oxononanoate transaminase family (BioA)
                term:
                  id: PANTHER:PTHR42684
                  label: ADENOSYLMETHIONINE-8-AMINO-7-OXONONANOATE TRANSAMINASE
                representative_members:
                  - preferred_term: BioA (E. coli K-12)
                    term:
                      id: UniProtKB:P12995
                      label: Adenosylmethionine-8-amino-7-oxononanoate aminotransferase
            function:
              preferred_term: adenosylmethionine-8-amino-7-oxononanoate transaminase activity
              term:
                id: GO:0004015
                label: adenosylmethionine-8-amino-7-oxononanoate transaminase activity
              substrates:
                - preferred_term: 8-amino-7-oxononanoate (KAPA)
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 7,8-diaminononanoate (DAPA)
                - preferred_term: S-adenosyl-4-methylsulfanyl-2-oxobutanoate
              evidence:
                - source_id: EC:2.6.1.62
                  statement: adenosylmethionine-8-amino-7-oxononanoate transaminase (DAPA aminotransferase)
                - source_id: RHEA:16861
                  statement: S-adenosyl-L-methionine + 8-amino-7-oxononanoate = S-adenosyl-4-methylsulfanyl-2-oxobutanoate + 7,8-diaminononanoate
                - source_id: PMID:42343126
                  statement: >-
                    Target of the antibiotic acidomycin (amiclenomycin); α-Me-KAPA is a
                    structural mimic of the KAPA substrate of this step.
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              PLP-dependent aminotransferase that installs the second (C7) amino
              group, converting KAPA to the diamine DAPA. Unusually it uses
              S-adenosyl-L-methionine, not glutamate, as the amino donor. This is
              the step inhibited by the mechanism-based inactivator amiclenomycin
              (acidomycin) and mimicked by the α-Me-KAPA antimetabolite.
    - order: 3
      role: ureido-ring closure — carboxylation of DAPA to dethiobiotin
      node:
        id: biod_step
        label: 7,8-diaminononanoate (DAPA) + CO2 + ATP -> dethiobiotin + ADP + phosphate
        module_type: REACTION
        annotons:
          - id: biod_activity
            label: "BioD: ATP-dependent dethiobiotin synthetase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dethiobiotin synthetase family (BioD)
                term:
                  id: PANTHER:PTHR43210
                  label: DETHIOBIOTIN SYNTHETASE
                representative_members:
                  - preferred_term: BioD (E. coli K-12)
                    term:
                      id: UniProtKB:P13000
                      label: ATP-dependent dethiobiotin synthetase BioD
            function:
              preferred_term: dethiobiotin synthase activity
              term:
                id: GO:0004141
                label: dethiobiotin synthase activity
              substrates:
                - preferred_term: 7,8-diaminononanoate (DAPA)
                - preferred_term: carbon dioxide
                - preferred_term: ATP
              products:
                - preferred_term: dethiobiotin
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.3.3.3
                  statement: dethiobiotin synthase (DTBS)
                - source_id: RHEA:15805
                  statement: 7,8-diaminononanoate + CO2 + ATP = dethiobiotin + ADP + phosphate (+ H+)
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              ATP- and Mg2+-dependent ligase that fixes CO2 onto the two amino
              groups of DAPA to form the cyclic ureido (imidazolidone) ring of
              dethiobiotin — the penultimate biotin-pathway intermediate.
    - order: 4
      role: sulfur insertion — thiophane-ring closure to biotin
      node:
        id: biob_step
        label: dethiobiotin + sulfur donor + 2 S-adenosyl-L-methionine -> biotin + 2 L-methionine + 2 5'-deoxyadenosine
        module_type: REACTION
        annotons:
          - id: biob_activity
            label: "BioB: biotin synthase (radical-SAM Fe-S enzyme)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biotin synthase family (BioB)
                term:
                  id: PANTHER:PTHR22976
                  label: BIOTIN SYNTHASE
                representative_members:
                  - preferred_term: BioB (E. coli K-12)
                    term:
                      id: UniProtKB:P12996
                      label: Biotin synthase
            function:
              preferred_term: biotin synthase activity
              term:
                id: GO:0004076
                label: biotin synthase activity
              substrates:
                - preferred_term: dethiobiotin
                - preferred_term: sulfur (from a [2Fe-2S] cluster)
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: biotin
                - preferred_term: L-methionine
                - preferred_term: 5'-deoxyadenosine
              evidence:
                - source_id: EC:2.8.1.6
                  statement: biotin synthase (radical-SAM sulfur insertion)
                - source_id: RHEA:22060
                  statement: dethiobiotin + 2 reduced [2Fe-2S] + 2 SAM = biotin + 2 oxidized [2Fe-2S] + 2 L-methionine + 2 5'-deoxyadenosine (+ 2 Fe(2+) etc.)
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              Radical-S-adenosylmethionine [4Fe-4S] enzyme that uses a sacrificial
              [2Fe-2S] cluster as the sulfur source to abstract hydrogens from C6
              and C9 of dethiobiotin and insert sulfur, closing the thiophane ring
              to yield mature biotin. The final and rate-limiting step of the
              pathway.
  connections:
    - source: biof_step
      target: bioa_step
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      description: >-
        KAPA (8-amino-7-oxononanoate) produced by BioF is the substrate
        transaminated by BioA.
    - source: bioa_step
      target: biod_step
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      description: >-
        DAPA (7,8-diaminononanoate) produced by BioA is the substrate
        carboxylated by BioD.
    - source: biod_step
      target: biob_step
      connection_type: PROVIDES_INPUT_FOR
      chaining_status: VERIFIED
      description: >-
        Dethiobiotin produced by BioD is the substrate on which BioB performs
        sulfur insertion to give biotin.
  notes: >-
    Conserved bacterial de novo biotin biosynthesis grounded to the four
    canonical E. coli K-12 enzymes as representative members: BioF
    (UniProtKB:P12998, GO:0008710, EC 2.3.1.47, Rhea:42288), BioA (P12995,
    GO:0004015, EC 2.6.1.62, Rhea:16861), BioD (P13000, GO:0004141, EC 6.3.3.3,
    Rhea:15805) and BioB (P12996, GO:0004076, EC 2.8.1.6, Rhea:22060). GO
    molecular-function terms, EC numbers, Rhea reactions and PANTHER family ids
    were read from the current UniProt records; each step uses a PANTHER family
    selector (generic over orthologs/paralogs) plus a concrete E. coli
    representative member. The module boundary is the conserved KAPA → DAPA →
    dethiobiotin → biotin core (the BioFADB operon steps). The upstream
    pimeloyl-thioester–generating stage is taxonomically variable — BioC
    (malonyl-ACP O-methyltransferase) + BioH (pimeloyl-ACP methyl ester esterase)
    in E. coli, versus BioW/BioI or other routes elsewhere — so it is described
    as context rather than modeled as a fixed part; it could be added later as a
    variant_set if a pimeloyl-supply module is curated. This pathway is the
    "conserved metabolic pathway" targeted by the Streptomyces biotin-targeting
    antibiotic megacluster (PMID:42343126): acidomycin/amiclenomycin inactivates
    the BioA step, α-Me-KAPA mimics the KAPA intermediate, and streptavidin
    sequesters the biotin product downstream. Distinct from the human
    biotin_cycle module (HLCS + biotinidase), which activates and recycles biotin
    onto carboxylases and does NOT synthesize the biotin ring de novo (humans
    lack this pathway).
