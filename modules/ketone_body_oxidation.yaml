id: MODULE:ketone_body_oxidation
title: Ketone body oxidation (ketolysis)
description: >-
  Mitochondrial oxidation of the ketone bodies D-3-hydroxybutyrate and acetoacetate
  to acetyl-CoA for entry into the TCA cycle, the route by which extrahepatic tissues
  (heart, brain, skeletal muscle, renal cortex) use ketone bodies as fuel during
  fasting. The pathway is three obligate steps: D-3-hydroxybutyrate dehydrogenase
  (BDH1) oxidises 3-hydroxybutyrate to acetoacetate; succinyl-CoA:3-oxoacid
  CoA-transferase (OXCT1/SCOT) activates acetoacetate to acetoacetyl-CoA; and
  acetyl-CoA acetyltransferase (ACAT1, mitochondrial thiolase) thiolytically cleaves
  acetoacetyl-CoA to two acetyl-CoA. The SCOT step is the committed, irreversible
  activation step and the metabolic switch that distinguishes ketone-consuming tissues
  from the liver: the liver produces ketone bodies but does not express OXCT1, so it
  cannot re-oxidise them and instead exports them. This module is built to be evaluated
  against tissue expression so that the tissues capable of ketone-body oxidation, and
  the basis of the liver's inability, can be resolved directly.
status: DRAFT
evidence:
  - source_id: GO:0046952
    title: ketone body catabolic process
    statement: Module grounded in the GO biological-process term for ketone body catabolism.
  - source_id: GTEx:gtex_v8
    title: GTEx v8 median gene expression
    statement: >-
      OXCT1 (SCOT) is expressed in heart, brain, muscle, and kidney but is essentially
      absent from liver, the molecular basis of the liver's inability to oxidise ketones.
    url: https://gtexportal.org/
