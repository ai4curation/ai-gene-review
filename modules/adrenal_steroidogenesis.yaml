id: MODULE:adrenal_steroidogenesis
title: Adrenal steroidogenesis — cholesterol to corticosteroids and adrenal androgens; STAR/CYP11A1/HSD3B2/CYP17A1/CYP21A2/CYP11B1/CYP11B2
description: >-
  Adrenal steroidogenesis converts cholesterol into the three classes of steroid hormone —
  glucocorticoids (cortisol), mineralocorticoids (aldosterone) and adrenal androgens (DHEA,
  androstenedione) — through a branched network of mitochondrial and endoplasmic-reticulum
  enzymes. The acute, rate-limiting step is the delivery of cholesterol from the outer to the
  inner mitochondrial membrane by the steroidogenic acute regulatory protein STAR; there the
  side-chain-cleavage cytochrome P450 CYP11A1 (P450scc) makes pregnenolone, the common
  precursor of all steroid hormones. Pregnenolone is then routed by two ER enzymes whose
  order and combination select the branch: the 3beta-hydroxysteroid dehydrogenase/isomerase
  HSD3B2 (Delta5 -> Delta4, giving progesterone, 17-hydroxyprogesterone or androstenedione)
  and the bifunctional 17alpha-hydroxylase/17,20-lyase CYP17A1 (17-hydroxylation commits to
  cortisol; the 17,20-lyase reaction commits to androgens). 21-hydroxylase CYP21A2 then
  hydroxylates progesterone -> 11-deoxycorticosterone (mineralocorticoid branch) and
  17-hydroxyprogesterone -> 11-deoxycortisol (glucocorticoid branch). The final oxidations
  return to the mitochondrion: CYP11B1 (11beta-hydroxylase) makes cortisol, while its close
  paralog CYP11B2 (aldosterone synthase), uniquely possessing 18-hydroxylase/18-oxidase
  activity, converts deoxycorticosterone through corticosterone and 18-hydroxycorticosterone
  to aldosterone in the zona glomerulosa. Inherited defects define the congenital adrenal
  hyperplasias and related disorders: STAR (congenital lipoid adrenal hyperplasia), CYP11A1
  (adrenal insufficiency), HSD3B2 (3beta-HSD-deficiency CAH), CYP17A1 (combined 17alpha-
  hydroxylase/17,20-lyase deficiency), CYP21A2 (21-hydroxylase deficiency, >90% of CAH),
  CYP11B1 (11beta-hydroxylase-deficiency CAH) and CYP11B2 (aldosterone synthase / CMO
  deficiency; a CYP11B1/B2 chimera causes glucocorticoid-remediable aldosteronism).
status: DRAFT
evidence:
  - source_id: GO:0120178
    title: steroid hormone biosynthetic process
    statement: >-
      The module is grounded in steroid hormone biosynthetic process (GO:0120178); it covers
      adrenal conversion of cholesterol to glucocorticoids, mineralocorticoids and androgens.
  - source_id: GO:0006700
    title: C21-steroid hormone biosynthetic process
    statement: >-
      The corticosteroid backbone (pregnenolone -> progesterone/17OHP -> DOC/11-deoxycortisol
      -> aldosterone/cortisol) is C21-steroid hormone biosynthesis (GO:0006700).
  - source_id: Reactome:R-HSA-196108
    title: Pregnenolone biosynthesis
    statement: >-
      The cholesterol-to-pregnenolone entry (STAR translocation + CYP11A1 side-chain cleavage)
      follows the human Reactome "Pregnenolone biosynthesis" reactions R-HSA-196126/193101.
  - source_id: Reactome:R-HSA-194002
    title: Glucocorticoid biosynthesis
    statement: >-
      The glucocorticoid branch (CYP17A1 17-hydroxylation -> CYP21A2 21-hydroxylation ->
      CYP11B1 11beta-hydroxylation to cortisol) follows human Reactome "Glucocorticoid biosynthesis".
  - source_id: Reactome:R-HSA-193993
    title: Mineralocorticoid biosynthesis
    statement: >-
      The mineralocorticoid branch (CYP21A2 -> DOC; CYP11B2 through corticosterone and
      18-hydroxycorticosterone to aldosterone) follows human Reactome "Mineralocorticoid biosynthesis".
  - source_id: Reactome:R-HSA-193048
    title: Androgen biosynthesis
    statement: >-
      The androgen branch (CYP17A1 17,20-lyase -> DHEA; HSD3B2 -> androstenedione) follows
      human Reactome "Androgen biosynthesis".
  - source_id: file:human/STAR/STAR-ai-review.yaml
    title: STAR gene review (human)
    statement: >-
      The rate-limiting cholesterol-transfer step (UniProtKB:P49675, GO:0120020/GO:0015485,
      mitochondrial outer membrane) matches the completed human STAR review.
  - source_id: file:human/CYP11A1/CYP11A1-ai-review.yaml
    title: CYP11A1 gene review (human)
    statement: >-
      The cholesterol side-chain-cleavage step to pregnenolone (UniProtKB:P05108, GO:0008386)
      matches the completed human CYP11A1 review.
  - source_id: file:human/HSD3B2/HSD3B2-ai-review.yaml
    title: HSD3B2 gene review (human)
    statement: >-
      The 3beta-HSD/Delta5-Delta4-isomerase step (UniProtKB:P26439, GO:0003854/GO:0004769)
      matches the completed human HSD3B2 review.
  - source_id: file:human/CYP17A1/CYP17A1-ai-review.yaml
    title: CYP17A1 gene review (human)
    statement: >-
      The 17alpha-hydroxylase/17,20-lyase branch-point step (UniProtKB:P05093, GO:0004508)
      matches the completed human CYP17A1 review.
  - source_id: file:human/CYP21A2/CYP21A2-ai-review.yaml
    title: CYP21A2 gene review (human)
    statement: >-
      The 21-hydroxylase step feeding both corticosteroid branches (UniProtKB:P08686,
      GO:0004509) matches the completed human CYP21A2 review.
  - source_id: file:human/CYP11B1/CYP11B1-ai-review.yaml
    title: CYP11B1 gene review (human)
    statement: >-
      The mitochondrial 11beta-hydroxylase step to cortisol (UniProtKB:P15538, GO:0004507)
      matches the completed human CYP11B1 review.
  - source_id: file:human/CYP11B2/CYP11B2-ai-review.yaml
    title: CYP11B2 gene review (human)
    statement: >-
      The aldosterone-synthase step (11beta-/18-hydroxylase/18-oxidase; UniProtKB:P19099,
      GO:0047783/GO:0004507) matches the completed human CYP11B2 review.
module:
  id: adrenal_steroidogenesis
  label: Adrenal steroidogenesis (cholesterol to corticosteroids/androgens)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: steroid hormone biosynthetic process
      term:
        id: GO:0120178
        label: steroid hormone biosynthetic process
      description: >-
        Conversion of cholesterol into glucocorticoid, mineralocorticoid and androgen
        steroid hormones by the adrenal (and gonadal) steroidogenic enzymes.
    - preferred_term: C21-steroid hormone biosynthetic process
      term:
        id: GO:0006700
        label: C21-steroid hormone biosynthetic process
      description: The C21 corticosteroid backbone leading to cortisol and aldosterone.
  context:
    cellular_components:
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: >-
          The entry (CYP11A1) and terminal (CYP11B1/CYP11B2) P450 oxidations occur on the
          mitochondrial inner membrane; STAR delivers cholesterol from the outer membrane.
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: The intermediate steps (HSD3B2, CYP17A1, CYP21A2) are ER-membrane enzymes.
  parts:
    - order: 1
      role: cholesterol delivery (acute rate-limiting step)
      node:
        id: star_step
        label: cholesterol translocation to the inner mitochondrial membrane
        module_type: REACTION
        annotons:
          - id: star_activity
            label: "STAR: steroidogenic acute regulatory protein"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: StAR/START-domain family (STARD1)
                term:
                  id: PANTHER:PTHR46489
                  label: STEROIDOGENIC ACUTE REGULATORY PROTEIN
                representative_members:
                  - preferred_term: STAR (human)
                    term:
                      id: UniProtKB:P49675
                      label: Steroidogenic acute regulatory protein, mitochondrial
            function:
              preferred_term: cholesterol transfer activity
              term:
                id: GO:0120020
                label: cholesterol transfer activity
              substrates:
                - preferred_term: cholesterol (outer mitochondrial membrane)
              products:
                - preferred_term: cholesterol (inner mitochondrial membrane)
              evidence:
                - source_id: Reactome:R-HSA-196126
                  statement: "STAR mediates CHOL translocation from cytosol to mitochondrial intermembrane space (human Reactome reaction)"
                - source_id: file:human/STAR/STAR-ai-review.yaml
                  statement: START-domain cholesterol-transfer protein; acute rate-limiting step of steroidogenesis (lipoid CAH when lost)
            locations:
              - preferred_term: mitochondrial outer membrane
                term:
                  id: GO:0005741
                  label: mitochondrial outer membrane
            role_description: >-
              Delivers cholesterol to the inner membrane for CYP11A1; the acute (minutes-scale)
              rate-limiting control point of steroid output. Deficiency = congenital lipoid CAH.
    - order: 2
      role: side-chain cleavage (first, committed enzymatic step)
      node:
        id: cyp11a1_step
        label: cholesterol to pregnenolone
        module_type: REACTION
        annotons:
          - id: cyp11a1_activity
            label: "CYP11A1: cholesterol side-chain cleavage (P450scc)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial steroidogenic cytochrome P450 (CYP11 family)
                term:
                  id: PANTHER:PTHR24279
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP11A1 (human)
                    term:
                      id: UniProtKB:P05108
                      label: Cholesterol side-chain cleavage enzyme, mitochondrial
            function:
              preferred_term: cholesterol monooxygenase (side-chain-cleaving) activity
              term:
                id: GO:0008386
                label: cholesterol monooxygenase (side-chain-cleaving) activity
              substrates:
                - preferred_term: cholesterol
                - preferred_term: O2
                - preferred_term: reduced adrenodoxin
              products:
                - preferred_term: pregnenolone
                - preferred_term: 4-methylpentanal
              evidence:
                - source_id: EC:1.14.15.6
                  statement: cholesterol monooxygenase (side-chain-cleaving); three sequential mono-oxygenations (20alpha-, 22-hydroxylation, C20-C22 scission) to pregnenolone
                - source_id: Reactome:R-HSA-193101
                  statement: "CYP11A1 cleaves 20a,22b-DHCHOL (human Reactome reaction) yielding pregnenolone"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              First and rate-limiting enzymatic step; produces the pregnenolone common
              precursor of all steroid hormones. Deficiency = adrenal insufficiency.
    - order: 3
      role: 3beta-dehydrogenation/isomerization (Delta5 -> Delta4)
      node:
        id: hsd3b2_step
        label: pregnenolone to progesterone (and 17OH-pregnenolone to 17OH-progesterone; DHEA to androstenedione)
        module_type: REACTION
        annotons:
          - id: hsd3b2_activity
            label: "HSD3B2: 3beta-HSD / Delta5-Delta4 isomerase (type 2)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 3-beta-hydroxysteroid dehydrogenase/isomerase family (HSD3B)
                term:
                  id: PANTHER:PTHR43245
                  label: 3 BETA-HYDROXYSTEROID DEHYDROGENASE/DELTA 5-->4-ISOMERASE
                representative_members:
                  - preferred_term: HSD3B2 (human)
                    term:
                      id: UniProtKB:P26439
                      label: 3 beta-hydroxysteroid dehydrogenase/Delta 5-->4-isomerase type 2
            function:
              preferred_term: 3-beta-hydroxy-Delta5-steroid dehydrogenase (NAD+) activity
              term:
                id: GO:0003854
                label: 3-beta-hydroxy-Delta5-steroid dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: pregnenolone
                - preferred_term: NAD+
              products:
                - preferred_term: progesterone
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.145
                  statement: 3beta-HSD; NAD+-dependent 3beta-oxidation coupled to Delta5->Delta4 isomerization (bifunctional, see also GO:0004769)
                - source_id: Reactome:R-HSA-193052
                  statement: "Pregn-5-ene-3,20-dione isomerizes to progesterone (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Obligatory Delta5->Delta4 conversion common to all three hormone branches; also acts
              on 17OH-pregnenolone and DHEA. Deficiency = 3beta-HSD-deficiency CAH.
    - order: 4
      role: 17alpha-hydroxylation / 17,20-lyase (cortisol vs androgen branch point)
      node:
        id: cyp17a1_step
        label: 17alpha-hydroxylation and 17,20-lyase (to 17OH-steroids and DHEA/androstenedione)
        module_type: REACTION
        annotons:
          - id: cyp17a1_activity
            label: "CYP17A1: 17alpha-hydroxylase/17,20-lyase (P450c17)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Microsomal steroidogenic cytochrome P450 (CYP17/CYP21 clade)
                term:
                  id: PANTHER:PTHR24289
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP17A1 (human)
                    term:
                      id: UniProtKB:P05093
                      label: Steroid 17-alpha-hydroxylase/17,20 lyase
            function:
              preferred_term: steroid 17-alpha-monooxygenase activity
              term:
                id: GO:0004508
                label: steroid 17-alpha-monooxygenase activity
              substrates:
                - preferred_term: progesterone (or pregnenolone)
                - preferred_term: O2
                - preferred_term: NADPH (via POR; 17,20-lyase also needs cytochrome b5)
              products:
                - preferred_term: 17-hydroxyprogesterone (or 17-hydroxypregnenolone)
                - preferred_term: (17,20-lyase) DHEA / androstenedione
              evidence:
                - source_id: EC:1.14.14.19
                  statement: steroid 17alpha-monooxygenase; bifunctional 17alpha-hydroxylase + 17,20-lyase; 17-hydroxylation commits to cortisol, lyase commits to androgens
                - source_id: Reactome:R-HSA-193072
                  statement: "CYP17A1 17-hydroxylates P4 to 17aHPROG (human Reactome reaction)"
                - source_id: Reactome:R-HSA-193099
                  statement: "CYP17A1 cleaves 17aHPROG to ANDST (17,20-lyase; human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Branch point: 17-hydroxylation routes toward cortisol; 17,20-lyase routes toward
              androgens/estrogens. Deficiency = combined 17alpha-hydroxylase/17,20-lyase deficiency.
    - order: 5
      role: 21-hydroxylation (both corticosteroid branches)
      node:
        id: cyp21a2_step
        label: 21-hydroxylation (progesterone to DOC; 17OH-progesterone to 11-deoxycortisol)
        module_type: REACTION
        annotons:
          - id: cyp21a2_activity
            label: "CYP21A2: steroid 21-hydroxylase (P450c21)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Microsomal steroidogenic cytochrome P450 (CYP17/CYP21 clade)
                term:
                  id: PANTHER:PTHR24289
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP21A2 (human)
                    term:
                      id: UniProtKB:P08686
                      label: Steroid 21-hydroxylase
            function:
              preferred_term: steroid 21-monooxygenase activity
              term:
                id: GO:0004509
                label: steroid 21-monooxygenase activity
              substrates:
                - preferred_term: progesterone / 17-hydroxyprogesterone
                - preferred_term: O2
                - preferred_term: NADPH (via POR)
              products:
                - preferred_term: 11-deoxycorticosterone (DOC) / 11-deoxycortisol
              evidence:
                - source_id: EC:1.14.14.16
                  statement: steroid 21-monooxygenase; 21-hydroxylates progesterone (mineralocorticoid branch) and 17OHP (glucocorticoid branch)
                - source_id: Reactome:R-HSA-193964
                  statement: "CYP21A2 21-hydroxylates PROG (human Reactome reaction) to 11-deoxycorticosterone"
                - source_id: Reactome:R-HSA-193981
                  statement: "CYP21A2 oxidises 17HPROG (human Reactome reaction) to 11-deoxycortisol"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Supplies both the mineralocorticoid (DOC) and glucocorticoid (11-deoxycortisol)
              branches. Deficiency is the commonest cause of CAH (>90%).
    - order: 6
      role: 11beta-hydroxylation to cortisol (glucocorticoid endpoint)
      node:
        id: cyp11b1_step
        label: 11-deoxycortisol to cortisol
        module_type: REACTION
        annotons:
          - id: cyp11b1_activity
            label: "CYP11B1: 11beta-hydroxylase (P450c11beta)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial steroidogenic cytochrome P450 (CYP11 family)
                term:
                  id: PANTHER:PTHR24279
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP11B1 (human)
                    term:
                      id: UniProtKB:P15538
                      label: Cytochrome P450 11B1, mitochondrial
            function:
              preferred_term: steroid 11-beta-monooxygenase activity
              term:
                id: GO:0004507
                label: steroid 11-beta-monooxygenase activity
              substrates:
                - preferred_term: 11-deoxycortisol
                - preferred_term: O2
                - preferred_term: reduced adrenodoxin
              products:
                - preferred_term: cortisol
              evidence:
                - source_id: EC:1.14.15.4
                  statement: steroid 11beta-monooxygenase; final step of cortisol synthesis (also DOC->corticosterone); lacks 18-oxidase activity
                - source_id: Reactome:R-HSA-193997
                  statement: "CYP11B1 oxidises 11DCORT (human Reactome reaction) to cortisol"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Glucocorticoid endpoint; 11beta-hydroxylates 11-deoxycortisol to cortisol.
              Deficiency = 11beta-hydroxylase-deficiency CAH (second commonest CAH).
    - order: 7
      role: aldosterone synthesis (mineralocorticoid endpoint)
      node:
        id: cyp11b2_step
        label: 11-deoxycorticosterone to aldosterone (11beta-/18-hydroxylase/18-oxidase)
        module_type: REACTION
        annotons:
          - id: cyp11b2_activity
            label: "CYP11B2: aldosterone synthase (P450c11AS)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial steroidogenic cytochrome P450 (CYP11 family)
                term:
                  id: PANTHER:PTHR24279
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP11B2 (human)
                    term:
                      id: UniProtKB:P19099
                      label: Cytochrome P450 11B2, mitochondrial
            function:
              preferred_term: corticosterone 18-monooxygenase activity
              term:
                id: GO:0047783
                label: corticosterone 18-monooxygenase activity
              substrates:
                - preferred_term: 11-deoxycorticosterone (DOC)
                - preferred_term: O2
                - preferred_term: reduced adrenodoxin
              products:
                - preferred_term: corticosterone -> 18-hydroxycorticosterone -> aldosterone
              evidence:
                - source_id: EC:1.14.15.4
                  statement: aldosterone synthase; sequential 11beta-hydroxylation, 18-hydroxylation and 18-oxidation of DOC to aldosterone (18-oxidase distinguishes it from CYP11B1)
                - source_id: Reactome:R-HSA-193995
                  statement: "CYP11B2 18-hydroxylates CORST to 18HCORST (human Reactome reaction)"
                - source_id: Reactome:R-HSA-193965
                  statement: "CYP11B2 oxidises 18HCORST to ALDO (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Mineralocorticoid endpoint in the zona glomerulosa; uniquely completes the
              18-oxidation to aldosterone. Deficiency = aldosterone synthase (CMO) deficiency.
  connections:
    - source: star_step
      target: cyp11a1_step
      connection_type: PROVIDES_INPUT_FOR
      description: STAR delivers cholesterol to the inner membrane for CYP11A1 side-chain cleavage.
    - source: cyp11a1_step
      target: hsd3b2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Pregnenolone from CYP11A1 is dehydrogenated/isomerized by HSD3B2 to progesterone (Delta4 pathway).
    - source: cyp11a1_step
      target: cyp17a1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Pregnenolone can also be 17-hydroxylated first by CYP17A1 (Delta5 pathway).
    - source: hsd3b2_step
      target: cyp17a1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Progesterone from HSD3B2 is 17-hydroxylated by CYP17A1 toward the cortisol branch.
    - source: hsd3b2_step
      target: cyp21a2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Progesterone from HSD3B2 is 21-hydroxylated by CYP21A2 to DOC (mineralocorticoid branch).
    - source: cyp17a1_step
      target: cyp21a2_step
      connection_type: PROVIDES_INPUT_FOR
      description: 17-hydroxyprogesterone from CYP17A1 is 21-hydroxylated by CYP21A2 to 11-deoxycortisol.
    - source: cyp21a2_step
      target: cyp11b1_step
      connection_type: PROVIDES_INPUT_FOR
      description: 11-deoxycortisol from CYP21A2 is 11beta-hydroxylated by CYP11B1 to cortisol.
    - source: cyp21a2_step
      target: cyp11b2_step
      connection_type: PROVIDES_INPUT_FOR
      description: DOC from CYP21A2 is converted by CYP11B2 through corticosterone/18OH-corticosterone to aldosterone.
  notes: >-
    Adrenal steroidogenesis grounded to the human enzymes STAR (UniProtKB:P49675, GO:0120020,
    cholesterol transfer), CYP11A1 (P05108, GO:0008386, EC 1.14.15.6), HSD3B2 (P26439,
    GO:0003854/GO:0004769, EC 1.1.1.145), CYP17A1 (P05093, GO:0004508, EC 1.14.14.19), CYP21A2
    (P08686, GO:0004509, EC 1.14.14.16), CYP11B1 (P15538, GO:0004507, EC 1.14.15.4) and CYP11B2
    (P19099, GO:0047783/GO:0004507, EC 1.14.15.4). GO molecular-function and location terms were
    taken from the completed human gene reviews and verified against the local go.db; Reactome
    reaction ids/titles were verified against the local reactome cache. Each step uses a PANTHER
    family selector with the human enzyme as representative so the module generalises across
    orthologs/paralogs: CYP11A1/CYP11B1/CYP11B2 share the mitochondrial P450 family PTHR24279, and
    CYP17A1/CYP21A2 share the microsomal P450 clade PTHR24289. The pathway is branched, not linear:
    the Delta4 (via HSD3B2 first) and Delta5 (via CYP17A1 first) routes interconvert, CYP17A1 selects
    cortisol (17-hydroxylase) vs androgen (17,20-lyase) fate, and CYP21A2 feeds both the
    mineralocorticoid (DOC->CYP11B2->aldosterone) and glucocorticoid (11-deoxycortisol->CYP11B1->
    cortisol) endpoints. Gonadal/peripheral sex-steroid steps (CYP19A1 aromatase, SRD5A2
    5alpha-reductase) and the cortisol/cortisone shuttle (HSD11B1/HSD11B2) are a separate module.
    Disorders span the pathway: lipoid CAH (STAR), adrenal insufficiency (CYP11A1), 3beta-HSD CAH
    (HSD3B2), 17OHD (CYP17A1), 21-hydroxylase-deficiency CAH (CYP21A2, >90%), 11beta-OHD CAH
    (CYP11B1), and aldosterone-synthase/CMO deficiency and glucocorticoid-remediable aldosteronism
    (CYP11B2).
