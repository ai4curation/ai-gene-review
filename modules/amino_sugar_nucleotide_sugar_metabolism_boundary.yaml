id: MODULE:amino_sugar_nucleotide_sugar_metabolism_boundary
title: Amino sugar and nucleotide sugar metabolism boundary
description: >-
  Broad boundary module for KEGG ppu00520 in Pseudomonas putida KT2440. The
  PSEPK membership combines UDP-N-acetylglucosamine biosynthesis, de novo
  UDP-N-acetylmuramate formation for peptidoglycan, MurNAc recycling/salvage,
  nucleotide-sugar interconversion for envelope glycans, and shared
  sugar-phosphate precursor reactions. The module is scoped to keep those
  contexts separate rather than treating the KEGG map as one linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00520
    title: Amino sugar and nucleotide sugar metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00520 provides the PSEPK curation batch. Its membership includes
      GlmS/GlmM/GlmU UDP-GlcNAc biosynthesis enzymes, MurA/MurB de novo
      UDP-MurNAc precursor enzymes, MurNAc recycling enzymes AmgK/MurU/MupP/AnmK,
      UDP-sugar and dTDP-sugar enzymes, alginate/GDP-mannose context, and
      shared central sugar-phosphate enzymes.
module:
  id: amino_sugar_nucleotide_sugar_metabolism_boundary
  label: Amino sugar and nucleotide sugar metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: amino sugar biosynthetic process
      term:
        id: GO:0046349
        label: amino sugar biosynthetic process
      description: Formation of glucosamine and N-acetylglucosamine-derived sugar precursors.
    - preferred_term: UDP-N-acetylglucosamine biosynthetic process
      term:
        id: GO:0006048
        label: UDP-N-acetylglucosamine biosynthetic process
      description: GlmS/GlmM/GlmU route from fructose 6-phosphate to UDP-GlcNAc.
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: UDP-GlcNAc and UDP-MurNAc precursor supply for bacterial cell-wall synthesis.
    - preferred_term: peptidoglycan turnover
      term:
        id: GO:0009254
        label: peptidoglycan turnover
      description: MurNAc recycling and salvage of peptidoglycan-derived sugar fragments.
    - preferred_term: N-acetylmuramic acid metabolic process
      term:
        id: GO:0097172
        label: N-acetylmuramic acid metabolic process
      description: MurNAc, anhMurNAc, MurNAc-phosphate, and UDP-MurNAc interconversion.
    - preferred_term: GDP-mannose biosynthetic process
      term:
        id: GO:0009298
        label: GDP-mannose biosynthetic process
      description: GDP-mannose branch feeding alginate and envelope nucleotide-sugar metabolism.
    - preferred_term: lipid A biosynthetic process
      term:
        id: GO:0009245
        label: lipid A biosynthetic process
      description: Downstream Gram-negative envelope context that consumes UDP-GlcNAc.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most amino-sugar and nucleotide-sugar reactions occur in the bacterial cytoplasm.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Soluble precursor and recycling enzymes are annotated to cytosol/cytoplasm.
  parts:
    - order: 1
      role: UDP-N-acetylglucosamine biosynthesis
      node:
        id: udp_glcnac_biosynthesis
        label: UDP-N-acetylglucosamine biosynthesis
        module_type: METABOLIC_PATHWAY
        description: >-
          GlmS, GlmM, and GlmU form the core amino-sugar route from
          fructose-6-phosphate to UDP-N-acetylglucosamine, a shared precursor
          for peptidoglycan, lipid A, and other envelope glycans.
        annotons:
          - id: glmS_fructose_6_phosphate_aminotransferase
            label: "glmS: glucosamine-6-phosphate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glmS
            function:
              preferred_term: L-glutamine:D-fructose-6-phosphate transaminase (isomerizing) activity
              term:
                id: GO:0004360
                label: L-glutamine:D-fructose-6-phosphate transaminase (isomerizing) activity
            role_description: First committed amino-sugar biosynthetic step.
          - id: glmM_phosphoglucosamine_mutase
            label: "glmM: phosphoglucosamine mutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glmM
            function:
              preferred_term: phosphoglucosamine mutase activity
              term:
                id: GO:0008966
                label: phosphoglucosamine mutase activity
            role_description: Conversion of glucosamine-6-phosphate to glucosamine-1-phosphate.
          - id: glmU_glucosamine_1_phosphate_n_acetyltransferase
            label: "glmU: glucosamine-1-phosphate N-acetyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glmU
            function:
              preferred_term: glucosamine-1-phosphate N-acetyltransferase activity
              term:
                id: GO:0019134
                label: glucosamine-1-phosphate N-acetyltransferase activity
            role_description: Acetyltransferase half of bifunctional GlmU.
          - id: glmU_udp_glcnac_diphosphorylase
            label: "glmU: UDP-N-acetylglucosamine diphosphorylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glmU
            function:
              preferred_term: UDP-N-acetylglucosamine diphosphorylase activity
              term:
                id: GO:0003977
                label: UDP-N-acetylglucosamine diphosphorylase activity
            role_description: Uridylyltransferase half of bifunctional GlmU producing UDP-GlcNAc.
    - order: 2
      role: De novo UDP-MurNAc and peptidoglycan precursor branch
      node:
        id: de_novo_udp_murnac_branch
        label: De novo UDP-MurNAc precursor branch
        module_type: METABOLIC_PATHWAY
        description: >-
          MurA and MurB convert UDP-GlcNAc toward UDP-MurNAc, the dedicated
          peptidoglycan precursor branch. These are also members of the stricter
          peptidoglycan biosynthesis module.
        annotons:
          - id: murA_udp_glcnac_enolpyruvyl_transferase
            label: "murA: UDP-N-acetylglucosamine 1-carboxyvinyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murA
            function:
              preferred_term: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
              term:
                id: GO:0008760
                label: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
            role_description: First committed de novo UDP-MurNAc/peptidoglycan precursor step.
          - id: murB_udp_n_acetylenolpyruvoylglucosamine_reductase
            label: "murB: UDP-N-acetylenolpyruvoylglucosamine reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murB
            function:
              preferred_term: UDP-N-acetylenolpyruvoylglucosamine reductase activity
              term:
                id: GO:0008762
                label: UDP-N-acetylenolpyruvoylglucosamine reductase activity
            role_description: Reduction to UDP-MurNAc in the de novo peptidoglycan precursor branch.
    - order: 3
      role: MurNAc recycling and salvage
      node:
        id: murnac_recycling_salvage
        label: MurNAc recycling/salvage shortcut
        module_type: METABOLIC_PATHWAY
        description: >-
          Pseudomonas MurNAc recycling includes MupP, AmgK, MurU, and AnmK,
          allowing peptidoglycan-derived MurNAc or anhMurNAc to re-enter
          UDP-MurNAc precursor metabolism.
        annotons:
          - id: nagZ_beta_hexosaminidase
            label: "nagZ: beta-N-acetylhexosaminidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nagZ
            function:
              preferred_term: beta-N-acetylhexosaminidase activity
              term:
                id: GO:0004563
                label: beta-N-acetylhexosaminidase activity
            role_description: Glycosidase context for peptidoglycan fragment turnover.
          - id: mupP_murnac_6_phosphate_phosphatase
            label: "mupP: MurNAc-6-phosphate phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mupP
            function:
              preferred_term: phosphatase activity
              term:
                id: GO:0016791
                label: phosphatase activity
            role_description: Broad GO term currently used for the characterized MurNAc-6P phosphatase reaction.
          - id: amgK_anomeric_sugar_kinase
            label: "amgK: MurNAc/GlcNAc anomeric sugar kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: amgK
            function:
              preferred_term: carbohydrate kinase activity
              term:
                id: GO:0019200
                label: carbohydrate kinase activity
            role_description: Broad GO term currently used for MurNAc/GlcNAc C1 kinase activity.
          - id: anmK_anhydromurnac_kinase
            label: "anmK: anhydro-N-acetylmuramic acid kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: anmK
            function:
              preferred_term: kinase activity
              term:
                id: GO:0016301
                label: kinase activity
            role_description: AnhMurNAc kinase in peptidoglycan recycling, pending review of exact available GO terms.
          - id: murU_murnac_1p_uridylyltransferase
            label: "murU: MurNAc-alpha-1-phosphate uridylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murU
            function:
              preferred_term: uridylyltransferase activity
              term:
                id: GO:0070569
                label: uridylyltransferase activity
            role_description: UDP-MurNAc formation from recycled MurNAc-alpha-1-phosphate.
    - order: 4
      role: Nucleotide-sugar and envelope-glycan side branches
      node:
        id: nucleotide_sugar_envelope_branches
        label: Nucleotide-sugar and envelope-glycan branches
        module_type: METABOLIC_PATHWAY
        description: >-
          The KEGG ppu00520 map includes several nucleotide-sugar and envelope
          precursor branches that overlap with galactose, fructose/mannose,
          alginate, LPS, and EPS modules.
        annotons:
          - id: rffE_udp_glcnac_2_epimerase
            label: "rffE: UDP-N-acetylglucosamine 2-epimerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rffE
            function:
              preferred_term: UDP-N-acetylglucosamine 2-epimerase activity
              term:
                id: GO:0008761
                label: UDP-N-acetylglucosamine 2-epimerase activity
            role_description: UDP-ManNAc/UDP-GlcNAc epimerase branch for envelope nucleotide sugars.
          - id: rfbA_glucose_1_phosphate_thymidylyltransferase
            label: "rfbA: glucose-1-phosphate thymidylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rfbA
            function:
              preferred_term: glucose-1-phosphate thymidylyltransferase activity
              term:
                id: GO:0008879
                label: glucose-1-phosphate thymidylyltransferase activity
            role_description: dTDP-glucose precursor formation for deoxy-sugar side branches.
          - id: galE_udp_glucose_4_epimerase
            label: "galE: UDP-glucose 4-epimerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: galE
            function:
              preferred_term: UDP-glucose 4-epimerase activity
              term:
                id: GO:0003978
                label: UDP-glucose 4-epimerase activity
            role_description: UDP-glucose/UDP-galactose interconversion.
          - id: galU_udp_glucose_pyrophosphorylase
            label: "galU: UDP-glucose pyrophosphorylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: galU
            function:
              preferred_term: UTP:glucose-1-phosphate uridylyltransferase activity
              term:
                id: GO:0003983
                label: UTP:glucose-1-phosphate uridylyltransferase activity
            role_description: UDP-glucose precursor supply shared by multiple carbohydrate modules.
          - id: udg_udp_glucose_6_dehydrogenase
            label: "udg: UDP-glucose 6-dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: udg
            function:
              preferred_term: UDP-glucose 6-dehydrogenase activity
              term:
                id: GO:0003979
                label: UDP-glucose 6-dehydrogenase activity
            role_description: UDP-glucuronate formation for nucleotide-sugar and envelope precursor metabolism.
    - order: 5
      role: Shared sugar-phosphate and GDP-mannose context
      node:
        id: shared_sugar_phosphate_gdp_mannose_context
        label: Shared sugar-phosphate and GDP-mannose context
        module_type: METABOLIC_PATHWAY
        description: >-
          Several ppu00520 members are shared central carbohydrate or
          GDP-mannose/alginate precursor enzymes. These should be retained as
          boundary context, not as evidence for a distinct amino-sugar-specific
          reaction.
        annotons:
          - id: pgi1_glucose_6_phosphate_isomerase_context
            label: "pgi1: glucose-6-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgi1
            function:
              preferred_term: glucose-6-phosphate isomerase activity
              term:
                id: GO:0004347
                label: glucose-6-phosphate isomerase activity
            role_description: Shared fructose-6-phosphate precursor context for GlmS.
          - id: pgi2_glucose_6_phosphate_isomerase_context
            label: "pgi2: glucose-6-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgi2
            function:
              preferred_term: glucose-6-phosphate isomerase activity
              term:
                id: GO:0004347
                label: glucose-6-phosphate isomerase activity
            role_description: Second glucose-6-phosphate isomerase paralog in shared precursor context.
          - id: pgm_phosphoglucomutase_context
            label: "pgm: phosphoglucomutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgm
            function:
              preferred_term: phosphoglucomutase activity
              term:
                id: GO:0004614
                label: phosphoglucomutase activity
            role_description: Glucose-1-phosphate precursor supply.
          - id: algC_phosphomannomutase_context
            label: "algC: phosphomannomutase/phosphoglucomutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algC
            function:
              preferred_term: phosphomannomutase activity
              term:
                id: GO:0004615
                label: phosphomannomutase activity
            role_description: GDP-mannose and alginate precursor context.
          - id: algA_mannose_1_phosphate_guanylyltransferase_context
            label: "algA: mannose-1-phosphate guanylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algA
            function:
              preferred_term: mannose-1-phosphate guanylyltransferase activity
              term:
                id: GO:0004475
                label: mannose-1-phosphate guanylyltransferase activity
            role_description: GDP-mannose precursor branch shared with alginate/envelope modules.
          - id: algD_gdp_mannose_6_dehydrogenase_context
            label: "algD: GDP-mannose 6-dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: algD
            function:
              preferred_term: GDP-mannose 6-dehydrogenase activity
              term:
                id: GO:0047919
                label: GDP-mannose 6-dehydrogenase activity
            role_description: GDP-mannuronate/alginate precursor branch.
