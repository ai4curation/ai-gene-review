id: MODULE:molybdate_abc_import_boundary
title: Molybdate ABC import boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 PP_3828-PP_3830 ModABC
  molybdate ABC importer pulled from the KEGG ppu02010 ABC-transporter umbrella
  map. ModA is the signal-peptide-bearing periplasmic molybdate-binding
  component, ModB is the multi-pass inner-membrane permease, and ModC is the
  ATP-binding energy-coupling subunit with reviewed EC 7.3.2.5 support for
  ATP-dependent molybdate import. The module records molybdate import as the
  core function while leaving ModA's tungstate-binding family signal as a
  secondary substrate lead.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_3828-PP_3830 modA/modB/modC locus as a
      coherent molybdate ABC transporter sub-batch within the broad
      ABC-transporter umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records cluster C52 as modA, modB, and modC
      after first-pass curation.
  - source_id: UniProtKB:Q88G97
    title: ModA molybdate-binding periplasmic protein
    statement: >-
      UniProt names ModA as a molybdate-binding periplasmic protein, records an
      N-terminal signal peptide, assigns the ModA solute-binding protein family,
      and describes the ModABC complex as containing ModC ATP-binding proteins,
      ModB transmembrane proteins, and ModA solute-binding protein.
  - source_id: UniProtKB:Q88G96
    title: ModB molybdenum transport system permease
    statement: >-
      UniProt names ModB as a molybdenum transport system permease, places it in
      the cell inner membrane as a multi-pass membrane protein, and describes it
      as part of a binding-protein-dependent transport system for molybdenum
      responsible for substrate translocation across the membrane.
  - source_id: UniProtKB:Q88G95
    title: ModC molybdenum import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation names ModC as the molybdenum import
      ATP-binding protein, describes it as part of the ModABC complex involved
      in molybdenum import, and records the ATP-dependent molybdate import
      reaction with EC 7.3.2.5.
