id: MODULE:arginine_ornithine_abc_import_boundary
title: Basic-amino-acid ABC import boundary
description: >-
  Boundary module for Pseudomonas putida KT2440 basic-amino-acid
  ABC-transporter loci pulled from the KEGG ppu02010 ABC-transporter umbrella
  map. PP_0280-PP_0283 encodes an Art/Aot system: PP_0280 is an ArtM-family
  permease, PP_0281 is an ArtQ-like permease, artJ is a signal-peptide-bearing
  L-arginine periplasmic binding component, and aotP is the ATP-binding
  energy-coupling subunit named for arginine/ornithine transport.
  PP_4483-PP_4486 encodes a related His/ArgT-family system: HisP is the
  ATP-binding subunit, HisM and HisQ are permeases, and ArgT is a
  lysine/arginine/ornithine periplasmic substrate-binding protein. The module
  records coherent predicted basic-amino-acid uptake systems while leaving exact
  substrate preference among histidine, lysine, arginine, and ornithine
  unresolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_0280-PP_0283 and PP_4483-PP_4486 loci
      as coherent amino-acid ABC transporter sub-batches within the broad
      ABC-transporter umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records cluster C10 as PP_0280, PP_0281,
      artJ, and aotP, and cluster C59 as hisP, hisM, hisQ, and argT after
      first-pass curation.
  - source_id: UniProtKB:Q88R54
    title: PP_0280 ArtM arginine ABC transporter permease
    statement: >-
      UniProt names PP_0280 as arginine ABC transporter permease protein ArtM,
      predicts a multi-pass cell inner-membrane protein, and records
      ArtM/GltK/GlnP/TcyL/YhdX-like and MetI-like binding-protein-dependent
      transporter domains.
  - source_id: UniProtKB:Q88R53
    title: PP_0281 ArtQ-like amino-acid ABC transporter permease
    statement: >-
      UniProt names PP_0281 as an amino acid ABC transporter permease protein,
      predicts a multi-pass cell inner-membrane protein, and assigns the
      PANTHER ArtQ arginine ABC transporter permease subfamily.
  - source_id: UniProtKB:Q88R52
    title: ArtJ L-arginine ABC transporter periplasmic binding subunit
    statement: >-
      UniProt names ArtJ as an L-arginine ABC transporter periplasmic binding
      subunit and records a signal peptide plus bacterial solute-binding protein
      family 3 domain.
  - source_id: UniProtKB:Q88R51
    title: AotP arginine/ornithine transport ATP-binding protein
    statement: >-
      UniProt names AotP as the arginine/ornithine transport ATP-binding
      protein and records ABC transporter ATP-binding domains.
  - source_id: UniProtKB:Q88EI0
    title: HisP histidine/lysine/arginine/ornithine ABC transporter ATP-binding subunit
    statement: >-
      UniProt names HisP as a histidine/lysine/arginine/ornithine ABC
      transporter ATP-binding subunit, places it at the cell inner membrane, and
      records ABC transporter ATP-binding domains.
  - source_id: UniProtKB:Q88EH9
    title: HisM histidine/lysine/arginine/ornithine transport system permease
    statement: >-
      UniProt names HisM as a histidine/lysine/arginine/ornithine transport
      system permease protein, predicts a multi-pass cell inner-membrane
      protein, and records binding-protein-dependent transporter domains.
  - source_id: UniProtKB:Q88EH8
    title: HisQ histidine/lysine/arginine/ornithine ABC transporter permease
    statement: >-
      UniProt names HisQ as a histidine/lysine/arginine/ornithine ABC
      transporter permease subunit, predicts a multi-pass cell inner-membrane
      protein, and assigns HisMQ/MetI-like permease domains.
  - source_id: UniProtKB:Q88EH7
    title: ArgT lysine/arginine/ornithine ABC transporter periplasmic binding protein
    statement: >-
      UniProt names ArgT as a lysine/arginine/ornithine ABC transporter
      periplasmic binding protein, records an N-terminal signal peptide, places
      it in the periplasm, and assigns a Lys/Arg/Orn-binding domain.
