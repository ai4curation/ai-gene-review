id: MODULE:bacterial_glutamate_to_p5c_biosynthesis
title: Bacterial glutamate-to-P5C branch of proline biosynthesis
description: >-
  Species-neutral bacterial module for the two-enzyme conversion of
  L-glutamate to L-glutamate 5-semialdehyde, which cyclizes to
  1-pyrroline-5-carboxylate (P5C), during proline biosynthesis. ProB
  phosphorylates L-glutamate to L-glutamyl 5-phosphate, and ProA reduces that
  acyl phosphate intermediate to L-glutamate 5-semialdehyde using NADPH. This
  module deliberately stops before the terminal P5C reductase step that makes
  L-proline.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: KEGG:ppu00332
    title: Pseudomonas putida KT2440 ProB/ProA bucket
    statement: >-
      The local PSEPK pathway partition assigns proB/PP_0691 and proA/PP_4811
      as the two primary genes in this compact bucket. Although the KEGG label
      is carbapenem biosynthesis, the PSEPK UniProt records support canonical
      proline-biosynthesis ProB and ProA functions.
  - source_id: GO:0055129
    title: L-proline biosynthetic process
    statement: >-
      GO:0055129 captures the proline-biosynthetic context for ProB and ProA.
  - source_id: file:PSEPK/proB/proB-uniprot.txt
    title: UniProtKB entry for PSEPK proB
    statement: >-
      Q88Q07 is a reviewed glutamate 5-kinase and step 1/2 of
      L-glutamate-5-semialdehyde formation from L-glutamate.
  - source_id: file:PSEPK/proA/proA-uniprot.txt
    title: UniProtKB entry for PSEPK proA
    statement: >-
      Q88DL4 is a reviewed gamma-glutamyl phosphate reductase and step 2/2 of
      L-glutamate-5-semialdehyde formation from L-glutamate.
notes: >-
  First-pass PSEPK interpretation: proB and proA satisfy the glutamate-to-P5C
  branch but not the complete L-proline biosynthesis pathway, which also needs
  a P5C reductase/ProC-type terminal step. Keep the misleading KEGG
  carbapenem-biosynthesis label out of the module biology.
