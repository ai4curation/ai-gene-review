          gene:
            preferred_term: rpsL
        function:
          preferred_term: structural constituent of ribosome
          description: Structural role in the bacterial 30S small ribosomal subunit.
          term:
            id: GO:0003735
            label: structural constituent of ribosome
        processes:
        - preferred_term: translation
          description: Protein synthesis carried out by the assembled ribosome.
          term:
            id: GO:0006412
            label: translation
        role_description: rpsL encodes Small ribosomal subunit protein uS12 (30S ribosomal protein S12),
          curated as a 30S small-subunit structural protein.
