      label: S10-spc-alpha-region 30S proteins
      module_type: CELLULAR_COMPONENT
      description: Conserved 30S ribosomal proteins from the major ribosomal-protein cluster in the ppu03010
        partition.
      annotons:
      - id: rpsL_30s_structural_component
