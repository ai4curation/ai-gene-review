id: MODULE:bacterial_30s_ribosomal_subunit_boundary
title: Bacterial 30S ribosomal subunit boundary
description: Boundary module for the KEGG ppu03010 30S ribosomal-protein subset in Pseudomonas putida
  KT2440. This module covers the 21 protein-coding small-subunit participants selected from the organism-specific
  ribosome map; large-subunit proteins are tracked separately in the planned 50S module.
status: DRAFT
evidence:
- source_id: KEGG:ppu03010
  title: Ribosome - Pseudomonas putida KT2440
  statement: KEGG ppu03010 provides the organism-specific ribosome protein set that was partitioned into
    30S and 50S curation batches.
- source_id: file:projects/P_PUTIDA/batches/ppu03010_bacterial_ribosome_partition.tsv
  title: ppu03010 bacterial ribosome partition table
  statement: The partition table assigns rpsU, rpsL, rpsG, rpsJ, rpsS, rpsC, rpsQ, rpsN, rpsH, rpsE, rpsM,
    rpsK, rpsD, rpsT, rpsI, rpsP, rpsB, rpsA, rpsO, rpsR, and rpsF to the bacterial 30S ribosomal subunit
    bucket.
- source_id: file:projects/P_PUTIDA/curate_ppu03010_30s_ribosomal_subunit_first_pass.py
  title: ppu03010 30S first-pass curation script
  statement: The script applies the light first-pass annotation decisions to all 21 30S ribosomal-protein
    reviews and preserves term-specific GOA evidence.
notes: This is a protein-participant boundary module, not a full biochemical model of bacterial translation.
  The 16S rRNA molecule and initiation/elongation/release factors are outside this ppu03010 protein sub-batch
  unless they appear in a later curation bucket.
module:
  id: bacterial_30s_ribosomal_subunit_boundary
  label: Bacterial 30S ribosomal subunit boundary
  module_type: CELLULAR_COMPONENT
  description: Curated 30S small ribosomal subunit protein boundary for the PSEPK ppu03010 ribosome pathway
    batch.
  concepts:
  - preferred_term: small ribosomal subunit
    description: The 30S small subunit component represented by this module.
    term:
      id: GO:0015935
      label: small ribosomal subunit
  - preferred_term: ribosome
    description: Whole ribosome context for translation.
    term:
      id: GO:0005840
      label: ribosome
  - preferred_term: structural constituent of ribosome
    description: Shared molecular role of the 30S ribosomal proteins.
    term:
      id: GO:0003735
      label: structural constituent of ribosome
  - preferred_term: translation
    description: Protein synthesis process supported by the assembled 30S subunit.
    term:
      id: GO:0006412
      label: translation
  - preferred_term: ribosomal RNA binding
    description: Specific rRNA-contact activity retained for many individual 30S proteins.
    term:
      id: GO:0019843
      label: rRNA binding
  context:
    taxa:
    - preferred_term: Pseudomonas putida KT2440
      term:
        id: NCBITaxon:160488
        label: Pseudomonas putida (strain ATCC 47054 / DSM 6125 / CFBP 8728 / NCIMB 11950 / KT2440)
  parts:
