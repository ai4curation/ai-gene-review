id: MODULE:aminobenzoate_degradation_boundary
title: Aminobenzoate degradation boundary
description: >-
  Boundary module for KEGG ppu00627 in Pseudomonas putida KT2440. The
  organism-specific aminobenzoate-degradation map mixes gallate, ferulate,
  vanillin/vanillate, nitroaromatic reductase, Baeyer-Villiger monooxygenase,
  UbiX/prenyl-FMN, enoyl-CoA hydratase, and unresolved amidase side nodes. It
  does not represent one complete aminobenzoate catabolic pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00627
    title: Aminobenzoate degradation - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00627 provides the PSEPK curation batch. Its membership is
      distributed across lignin-derived aromatic funnels and redox/cofactor side
      nodes rather than a dedicated aminobenzoate route.
module:
  id: aminobenzoate_degradation_boundary
  label: Aminobenzoate degradation boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: gallate dioxygenase activity
      term:
        id: GO:0036238
        label: gallate dioxygenase activity
      description: Gallate ring-cleavage chemistry represented by galA.
    - preferred_term: trans-feruloyl-CoA synthase activity
      term:
        id: GO:0050563
        label: trans-feruloyl-CoA synthase activity
      description: Ferulate activation represented by fcs.
    - preferred_term: feruloyl-CoA hydratase/lyase activity
      term:
        id: GO:0050547
        label: feruloyl-CoA hydratase/lyase activity
      description: Feruloyl-CoA conversion to vanillin represented by PP_3358/Ech.
    - preferred_term: vanillin dehydrogenase activity
      term:
        id: GO:0050608
        label: vanillin dehydrogenase activity
      description: Vanillin oxidation to vanillate represented by vdh.
    - preferred_term: vanillate monooxygenase activity
      term:
        id: GO:0018489
        label: vanillate monooxygenase activity
      description: VanAB vanillate O-demethylase chemistry represented by vanA/vanB.
    - preferred_term: flavin prenyltransferase activity
      term:
        id: GO:0106141
        label: flavin prenyltransferase activity
      description: Prenyl-FMN cofactor biosynthesis represented by ubiX, a side node for UbiD-family enzymes.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The soluble aromatic catabolic and redox enzymes in this batch are treated as cytosolic context.
  parts:
    - order: 1
      role: Gallate and lignin-derived aromatic funnel context
      node:
        id: gallate_ferulate_vanillate_side_funnels
        label: Gallate, ferulate, vanillin, and vanillate side funnels
        module_type: METABOLIC_PATHWAY
        description: >-
          These enzymes are genuine aromatic-catabolism activities in KT2440,
          but they belong to gallate and lignin-derived ferulate/vanillate
          funnels rather than a strict aminobenzoate pathway.
        annotons:
          - id: galA_gallate_dioxygenase
            label: "galA: gallate dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: galA
            function:
              preferred_term: gallate dioxygenase activity
              term:
                id: GO:0036238
                label: gallate dioxygenase activity
            role_description: Gallate ring-cleavage enzyme in gallate catabolism.
          - id: fcs_feruloyl_CoA_synthetase
            label: "fcs: feruloyl-CoA synthetase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fcs
            function:
              preferred_term: trans-feruloyl-CoA synthase activity
              term:
                id: GO:0050563
                label: trans-feruloyl-CoA synthase activity
            role_description: Activates ferulate/hydroxycinnamates to CoA thioesters.
          - id: PP_3358_feruloyl_CoA_hydratase_lyase
            label: "PP_3358: feruloyl-CoA hydratase/lyase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3358
            function:
              preferred_term: feruloyl-CoA hydratase/lyase activity
              term:
                id: GO:0050547
                label: feruloyl-CoA hydratase/lyase activity
            role_description: Hydroxycinnamoyl-CoA hydratase/lyase side-node enzyme producing vanillin from feruloyl-CoA.
          - id: vdh_vanillin_dehydrogenase
            label: "vdh: vanillin dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: vdh
            function:
              preferred_term: vanillin dehydrogenase activity
              term:
                id: GO:0050608
                label: vanillin dehydrogenase activity
            role_description: Oxidizes vanillin to vanillate in the ferulate/vanillin funnel.
          - id: vanA_vanillate_monooxygenase
            label: "vanA: vanillate O-demethylase oxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: vanA
            function:
              preferred_term: vanillate monooxygenase activity
              term:
                id: GO:0018489
                label: vanillate monooxygenase activity
            role_description: Oxygenase subunit of VanAB, converting vanillate to protocatechuate.
          - id: vanB_vanillate_monooxygenase_reductase
            label: "vanB: VanAB reductase subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: vanB
            function:
              preferred_term: electron transfer activity
              term:
                id: GO:0009055
                label: electron transfer activity
            role_description: Electron-transfer reductase subunit contributing to VanAB vanillate monooxygenase activity.
    - order: 2
      role: Redox and cofactor side context
      node:
        id: redox_cofactor_side_context
        label: Redox and cofactor side context
        module_type: METABOLIC_PATHWAY
        description: >-
          UbiX, PP_2805, and PP_3657 are redox or cofactor-related side nodes.
          They may appear in broad aromatic/xenobiotic maps, but they do not
          provide the core aminobenzoate-catabolic route.
        annotons:
          - id: ubiX_flavin_prenyltransferase
            label: "ubiX: flavin prenyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ubiX
            function:
              preferred_term: flavin prenyltransferase activity
              term:
                id: GO:0106141
                label: flavin prenyltransferase activity
            role_description: Makes prenyl-FMN cofactor for UbiD-family enzymes; cofactor side node here.
          - id: PP_2805_Baeyer_Villiger_monooxygenase
            label: "PP_2805: Baeyer-Villiger monooxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2805
            function:
              preferred_term: NAD(P)H-dependent monooxygenase activity
              term:
                id: GO:0016709
                label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen
            role_description: Experimentally characterized Baeyer-Villiger monooxygenase; not a route-specific aminobenzoate enzyme.
          - id: PP_3657_nitroreductase_candidate
            label: "PP_3657: nitroreductase-family oxidoreductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3657
            function:
              preferred_term: oxidoreductase activity
              term:
                id: GO:0016491
                label: oxidoreductase activity
            role_description: p-nitrobenzoate reductase/nitroreductase-family candidate retained as broad redox side context.
    - order: 3
      role: CoA-thioester and unresolved amidase side context
      node:
        id: CoA_hydratase_amidase_side_context
        label: CoA-thioester and unresolved amidase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_2217 and paaF are enoyl-CoA hydratase-family side nodes already
          assigned to acyl-CoA or phenylacetate contexts; PP_2932 is an
          unresolved amidase-family candidate with no current GOA terms.
        annotons:
          - id: PP_2217_enoyl_CoA_hydratase
            label: "PP_2217: enoyl-CoA hydratase-family enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2217
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Acyl-CoA hydratase side node, not a strict aminobenzoate step.
          - id: paaF_enoyl_CoA_hydratase
            label: "paaF: phenylacetate-pathway enoyl-CoA hydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaF
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Phenylacetate CoA-catabolism side node.
          - id: PP_2932_unresolved_amidase
            label: "PP_2932: unresolved amidase-family candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2932
            role_description: Unresolved amidase-family protein retained as boundary context pending substrate evidence.
  notes: >-
    This module intentionally records boundary status. The PSEPK ppu00627
    membership lacks a coherent aminobenzoate upper pathway and instead
    collects enzymes from gallate catabolism, ferulate/vanillate catabolism,
    nitroaromatic/redox side chemistry, UbiX cofactor formation, and acyl-CoA
    side routes.
