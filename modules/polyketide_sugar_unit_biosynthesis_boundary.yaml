id: MODULE:polyketide_sugar_unit_biosynthesis_boundary
title: Polyketide sugar unit biosynthesis boundary
description: >-
  Boundary module for KEGG ppu00523 in Pseudomonas putida KT2440. The PSEPK
  membership is a compact dTDP-deoxy-sugar/dTDP-L-rhamnose enzyme set rather
  than evidence for a complete polyketide sugar-unit biosynthesis or
  natural-product glycosylation pathway. The module records the shared
  nucleotide-sugar chemistry and keeps the polyketide pathway label as KEGG
  context.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00523
    title: Polyketide sugar unit biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00523 provides the PSEPK curation batch. Its membership contains
      glucose-1-phosphate thymidylyltransferase, dTDP-glucose 4,6-dehydratase,
      dTDP-4-dehydrorhamnose 3,5-epimerase paralogs, and
      dTDP-4-dehydrorhamnose reductase paralogs.
module:
  id: polyketide_sugar_unit_biosynthesis_boundary
  label: Polyketide sugar unit biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: dTDP-rhamnose biosynthetic process
      term:
        id: GO:0019305
        label: dTDP-rhamnose biosynthetic process
      description: dTDP-glucose to dTDP-L-rhamnose deoxy-sugar nucleotide branch.
    - preferred_term: O antigen biosynthetic process
      term:
        id: GO:0009243
        label: O antigen biosynthetic process
      description: One bacterial envelope sink for dTDP-L-rhamnose and related nucleotide sugars.
    - preferred_term: polysaccharide biosynthetic process
      term:
        id: GO:0000271
        label: polysaccharide biosynthetic process
      description: Broad envelope-glycan context for deoxy-sugar nucleotide precursors.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The mapped dTDP-sugar enzymes are soluble cytosolic enzymes.
