id: MODULE:protein_export_secretion_outer_membrane_assembly_boundary
title: Protein export, secretion, and outer-membrane assembly boundary
description: Boundary module for the transport/membrane/efflux split covering BAM outer-membrane protein assembly, LolA/LolB
  lipoprotein localization, type-II/type-V secretion side components, an ancillary SecYEG translocon subunit, prepilin peptidase
  context, and unresolved HlyD-family membrane-fusion proteins.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_protein_export_secretion_outer_membrane_assembly.tsv
  title: PSEPK transport/membrane/efflux protein export/secretion/outer-membrane assembly batch
  statement: The partition groups 15 envelope export, secretion, BAM, Lol, SecYEG-accessory, and HlyD-family candidates that
    should not be forced into generic membrane-protein spillovers.
