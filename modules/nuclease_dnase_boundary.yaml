id: MODULE:nuclease_dnase_boundary
title: Nuclease, DNase, RNA-toxin, and phosphodiesterase side-node boundary
description: Boundary module for PSEPK DNA-bucket nuclease side nodes. The set mixes DNA nucleases, RNA/toxin nucleases, pyocin/mobile-element
  nucleases, and broad phosphodiesterase candidates; it should not be treated as one coherent DNA repair pathway.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_dna_replication_repair_recombination_nuclease_dnase_toxin_side_nodes.tsv
  title: PSEPK nuclease/DNase/toxin side-node split table
  statement: The split table records the 14 nuclease-side candidates pulled from the broad DNA replication/repair/recombination
    functional bucket.
notes: First-pass boundary. DNA nuclease, RNA nuclease/toxin, pyocin/mobile-element nuclease, and broad phosphodiesterase
  roles remain separated.
