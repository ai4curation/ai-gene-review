id: MODULE:arginine_proline_metabolism
title: Arginine and proline metabolism
description: >-
  Boundary module for Pseudomonas putida KT2440 arginine/proline metabolism as
  represented by KEGG ppu00330. The pathway combines several biologically
  distinct routes: proline biosynthesis and interconversion, succinylated
  arginine catabolism, agmatine/putrescine/polyamine metabolism, 5-oxoproline
  turnover, and neighboring oxidoreductase or aminotransferase reactions. This
  module is intentionally broader than the strict arginine biosynthesis module.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00330
    title: Arginine and proline metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00330 provides the first-pass PSEPK candidate set, but it merges
      proline biosynthesis/catabolism, arginine catabolism, polyamine
      metabolism, 5-oxoproline turnover, creatinine side chemistry, and broad
      oxidoreductase/aminotransferase spillovers.
  - source_id: UniPathway:UPA00098
    title: UniPathway UPA00098
    statement: >-
      The local UniPathway UPA00098 membership set supports the proline
      biosynthesis/interconversion subroute with proB, proA, proC, proI, and
      ocd as the current PSEPK candidates.
module:
  id: arginine_proline_metabolism
  label: Arginine and proline metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: arginine metabolic process
      term:
        id: GO:0006525
        label: arginine metabolic process
      description: Metabolism of arginine and related catabolic branches.
    - preferred_term: L-proline metabolic process
      term:
        id: GO:0006560
        label: L-proline metabolic process
      description: Metabolism of L-proline and related pyrroline-5-carboxylate intermediates.
    - preferred_term: spermidine biosynthetic process
      term:
        id: GO:0008295
        label: spermidine biosynthetic process
      description: Polyamine branch that draws on arginine-derived putrescine.
    - preferred_term: glutamate 5-kinase activity
      term:
        id: GO:0004349
        label: glutamate 5-kinase activity
      description: ProB activity in the glutamate-to-proline biosynthesis branch.
    - preferred_term: glutamate-5-semialdehyde dehydrogenase activity
      term:
        id: GO:0004350
        label: glutamate-5-semialdehyde dehydrogenase activity
      description: ProA activity producing glutamate-5-semialdehyde/P5C precursor.
    - preferred_term: pyrroline-5-carboxylate reductase activity
      term:
        id: GO:0004735
        label: pyrroline-5-carboxylate reductase activity
      description: ProC/ProI reduction of pyrroline-5-carboxylate to L-proline.
    - preferred_term: ornithine cyclodeaminase activity
      term:
        id: GO:0008473
        label: ornithine cyclodeaminase activity
      description: Ocd route converting ornithine to proline.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most bacterial amino-acid and polyamine metabolic enzymes in this module are soluble cytoplasmic enzymes.
  parts:
    - order: 1
      role: Proline biosynthesis and interconversion
      node:
        id: proline_biosynthesis_interconversion
        label: Proline biosynthesis and interconversion
        module_type: METABOLIC_PATHWAY
        description: >-
          Captures the glutamate-to-pyrroline-5-carboxylate-to-proline branch
          and the ornithine cyclodeaminase route that connects ornithine to
          proline inside the broad KEGG boundary.
        annotons:
          - id: proB_glutamate_5_kinase
            label: "proB: glutamate 5-kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proB
            function:
              preferred_term: glutamate 5-kinase activity
              term:
                id: GO:0004349
                label: glutamate 5-kinase activity
            role_description: Phosphorylates L-glutamate in the canonical bacterial proline biosynthesis branch.
          - id: proA_glutamate_5_semialdehyde_dehydrogenase
            label: "proA: glutamate-5-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proA
            function:
              preferred_term: glutamate-5-semialdehyde dehydrogenase activity
              term:
                id: GO:0004350
                label: glutamate-5-semialdehyde dehydrogenase activity
            role_description: Produces glutamate-5-semialdehyde/pyrroline-5-carboxylate precursor in the glutamate-to-proline branch.
          - id: proC_p5c_reductase
            label: "proC: pyrroline-5-carboxylate reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proC
            function:
              preferred_term: pyrroline-5-carboxylate reductase activity
              term:
                id: GO:0004735
                label: pyrroline-5-carboxylate reductase activity
            role_description: Canonical P5C reductase completing L-proline biosynthesis.
          - id: proI_p5c_reductase
            label: "proI: pyrroline-5-carboxylate reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proI
            function:
              preferred_term: pyrroline-5-carboxylate reductase activity
              term:
                id: GO:0004735
                label: pyrroline-5-carboxylate reductase activity
            role_description: Reduces pyrroline-5-carboxylate to proline.
          - id: ocd_ornithine_cyclodeaminase
            label: "ocd: ornithine cyclodeaminase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ocd
            function:
              preferred_term: ornithine cyclodeaminase activity
              term:
                id: GO:0008473
                label: ornithine cyclodeaminase activity
            role_description: Converts ornithine to proline and connects arginine/ornithine metabolism to proline.
    - order: 2
      role: Succinylated arginine catabolism
      node:
        id: succinylated_arginine_catabolism
        label: Succinylated arginine catabolism
        module_type: METABOLIC_PATHWAY
        description: >-
          Arginine succinyltransferase pathway branch converting arginine
          through succinylated intermediates toward glutamate-compatible
          metabolism. ArgD is a boundary enzyme because its acetyl/succinyl
          ornithine aminotransferase chemistry also connects to strict arginine
          biosynthesis.
        annotons:
          - id: astA_arginine_succinyltransferase
            label: AstA arginine N-succinyltransferase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: arginine N-succinyltransferase activity
                term:
                  id: GO:0008791
                  label: arginine N-succinyltransferase activity
            function:
              preferred_term: arginine N-succinyltransferase activity
              term:
                id: GO:0008791
                label: arginine N-succinyltransferase activity
            role_description: Candidate AstA entry reactions in the arginine succinyltransferase pathway.
          - id: astB_succinylarginine_dihydrolase
            label: "astB: N-succinylarginine dihydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: astB
            function:
              preferred_term: N-succinylarginine dihydrolase activity
              term:
                id: GO:0009015
                label: N-succinylarginine dihydrolase activity
            role_description: Hydrolyzes N-succinylarginine in the arginine succinyltransferase pathway.
          - id: argD_succinylornithine_aminotransferase_boundary
            label: "argD: acetyl/succinyl ornithine aminotransferase boundary"
            participant:
              selector_type: GENE
              gene:
                preferred_term: argD
            function:
              preferred_term: acetylornithine aminotransferase activity
              term:
                id: GO:0003992
                label: acetylornithine aminotransferase activity
            role_description: Boundary aminotransferase shared with strict arginine biosynthesis.
          - id: astD_succinylglutamate_semialdehyde_dehydrogenase
            label: "astD: succinylglutamate semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: astD
            function:
              preferred_term: succinylglutamate-5-semialdehyde dehydrogenase activity
              term:
                id: GO:0043824
                label: succinylglutamate-semialdehyde dehydrogenase activity
            role_description: Oxidizes succinylglutamate semialdehyde in the succinylated arginine catabolic route.
          - id: astE_succinylglutamate_desuccinylase
            label: "astE: succinylglutamate desuccinylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: astE
            function:
              preferred_term: succinylglutamate desuccinylase activity
              term:
                id: GO:0009017
                label: succinylglutamate desuccinylase activity
            role_description: Releases glutamate from N-succinylglutamate.
    - order: 3
      role: Agmatine, putrescine, and polyamine branch
      node:
        id: agmatine_putrescine_polyamine_branch
        label: Agmatine, putrescine, and polyamine branch
        module_type: METABOLIC_PATHWAY
        description: >-
          Arginine decarboxylase, agmatinase, and agmatine deiminase reactions
          connect arginine to putrescine and downstream polyamine metabolism.
        annotons:
          - id: speA_arginine_decarboxylase
            label: "speA: arginine decarboxylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: speA
            function:
              preferred_term: arginine decarboxylase activity
              term:
                id: GO:0008792
                label: arginine decarboxylase activity
            role_description: Produces agmatine from arginine in the polyamine branch.
          - id: speB_agmatinase
            label: "speB: agmatinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: speB
            function:
              preferred_term: agmatinase activity
              term:
                id: GO:0008783
                label: agmatinase activity
            role_description: Hydrolyzes agmatine to putrescine.
          - id: pp4523_agmatinase_boundary
            label: "PP_4523: agmatinase-like boundary"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4523
            function:
              preferred_term: agmatinase activity
              term:
                id: GO:0008783
                label: agmatinase activity
            role_description: Candidate agmatinase-like node requiring gene-level review.
          - id: aguA_agmatine_deiminase
            label: "aguA: agmatine deiminase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aguA
            function:
              preferred_term: agmatine deiminase activity
              term:
                id: GO:0047632
                label: agmatine deiminase activity
            role_description: Represents the agmatine deiminase side of arginine and polyamine metabolism.
    - order: 4
      role: Side-node and boundary chemistry
      node:
        id: side_node_boundary_chemistry
        label: 5-oxoproline, creatinine, and aldehyde side chemistry
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00330 includes side-node enzymes that are not necessarily
          committed arginine or proline pathway functions. These should be
          curated as pathway context unless gene-level evidence supports a more
          specific role.
        annotons:
          - id: kauB_guanidinobutyraldehyde_dehydrogenase
            label: "kauB: gamma-guanidinobutyraldehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: kauB
            function:
              preferred_term: gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0047107
                label: gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity
            role_description: Aldehyde dehydrogenase side node connecting arginine, polyamine, and hydroxyproline branches.
          - id: patD_guanidinobutyraldehyde_dehydrogenase_boundary
            label: "patD: aldehyde dehydrogenase boundary"
            participant:
              selector_type: GENE
              gene:
                preferred_term: patD
            function:
              preferred_term: gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0047107
                label: gamma-guanidinobutyraldehyde dehydrogenase (NAD+) activity
            role_description: Boundary aldehyde dehydrogenase already shared with hydroxyproline and lysine-related maps.
          - id: opl_5_oxoprolinase
            label: OplA/OplB 5-oxoprolinase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 5-oxoprolinase (ATP-hydrolyzing) activity
                term:
                  id: GO:0017168
                  label: 5-oxoprolinase (ATP-hydrolyzing) activity
            function:
              preferred_term: 5-oxoprolinase (ATP-hydrolyzing) activity
              term:
                id: GO:0017168
                label: 5-oxoprolinase (ATP-hydrolyzing) activity
            role_description: ATP-dependent 5-oxoproline turnover side node.
          - id: creA_creatininase
            label: "creA: creatininase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: creA
            function:
              preferred_term: creatinase activity
              term:
                id: GO:0016980
                label: creatinase activity
            role_description: Creatinine side-node chemistry retained as context rather than core proline or arginine function.
