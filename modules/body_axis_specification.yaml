id: MODULE:body_axis_specification
title: Embryonic body axis specification module
description: >-
  An early-metazoan patterning module in which the embryo converts spatially
  graded maternal and zygotic signals into the three body axes:
  anterior/posterior (AP), dorsal/ventral (DV), and left/right (LR). The three
  axes are modelled as a variant set along the "axis" dimension because they are
  laid down by distinct but conserved morphogen systems: a posteriorising
  Wnt/beta-catenin gradient (with FGF and retinoic acid) reading out AP; a BMP
  activity gradient antagonised by organizer-secreted BMP inhibitors (Chordin,
  Noggin) reading out DV; and Nodal/Lefty reaction-diffusion breaking LR
  symmetry. The transcriptional readouts (Brachyury/TBXT, OTX2, CDX2,
  Goosecoid) partition the embryo into territories that the germ-layer and
  organ-forming programs subsequently elaborate. Grounded in GO:0009880
  (embryonic pattern specification). See modules/germ_layer_specification.yaml
  for the fate decisions these axes feed, and the wnt_signaling, bmp_signaling,
  and nodal_signaling modules for the signalling machinery.
status: DRAFT
evidence:
  - source_id: GO:0009880
    title: embryonic pattern specification
    statement: The module is grounded in the GO term for embryonic pattern specification.
  - source_id: GO:0009952
    title: anterior/posterior pattern specification
    statement: The AP variant is grounded in the GO term for anterior/posterior pattern specification.
  - source_id: GO:0009953
    title: dorsal/ventral pattern formation
    statement: The DV variant is grounded in the GO term for dorsal/ventral pattern formation.
notes: >-
  Exemplar gene products are curated human UniProt accessions used to orient
  each conserved role; the roles themselves are pan-metazoan. Axis morphogens
  act as concentration gradients (positional information), so the participants
  are typed with morphogen or growth-factor activity where they secrete the
  gradient and DNA-binding transcription-factor activity where they read it out.
module:
  id: body_axis_specification
  label: Embryonic body axis specification
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: embryonic pattern specification
      term:
        id: GO:0009880
        label: embryonic pattern specification
      description: Conversion of graded positional signals into spatial cell-fate domains along the body axes.
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: Graded morphogen axis specification is a conserved feature of bilaterian and basal metazoan development.
    cellular_components:
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
  variant_sets:
    - id: axis_variants
      label: Body axes laid down by distinct morphogen systems
      axis: body axis
      selection: ONE_OR_MORE
      variants:
        - id: ap_axis
          label: Anterior/posterior axis specification
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            A posterior-high Wnt/beta-catenin gradient (reinforced by FGF and
            retinoic acid) posteriorises the embryo, while anterior secreted Wnt
            antagonists (Dickkopf) protect head/forebrain identity. The gradient
            is read out by graded homeodomain and T-box transcription factors.
          concepts:
            - preferred_term: anterior/posterior pattern specification
              term:
                id: GO:0009952
                label: anterior/posterior pattern specification
          annotons:
            - id: ap_wnt_gradient
              label: Posteriorising Wnt ligand
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: WNT8A
                  term:
                    id: UniProtKB:Q9H1J5
                    label: Protein Wnt-8a
                  description: >-
                    Wnt8 is a conserved posteriorising Wnt ligand that establishes
                    the posterior-high canonical Wnt gradient in the early embryo.
              function:
                preferred_term: Wnt morphogen activity
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: Frizzled/LRP receptor complex on receiving cells
              processes:
                - preferred_term: canonical Wnt signaling pathway
                  term:
                    id: GO:0060070
                    label: canonical Wnt signaling pathway
              locations:
                - preferred_term: plasma membrane
                  term:
                    id: GO:0005886
                    label: plasma membrane
              role_description: Source of the posterior-high Wnt gradient providing AP positional information.
            - id: ap_wnt_antagonist
              label: Anterior Wnt antagonist
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: DKK1
                  term:
                    id: UniProtKB:O94907
                    label: Dickkopf-related protein 1
                  description: >-
                    Dickkopf-1 is an organizer-derived secreted Wnt/LRP antagonist
                    that shields the anterior neural plate from posteriorising Wnt.
              function:
                preferred_term: Wnt co-receptor (LRP) antagonist
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: LRP5/6 Wnt co-receptor
              processes:
                - preferred_term: negative regulation of canonical Wnt signaling pathway
                  term:
                    id: GO:0090090
                    label: negative regulation of canonical Wnt signaling pathway
              role_description: Sets the anterior boundary of the Wnt gradient to preserve head identity.
            - id: ap_posterior_readout
              label: Posterior CDX transcriptional readout
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: CDX2
                  term:
                    id: UniProtKB:Q99626
                    label: Homeobox protein CDX-2
                  description: >-
                    Caudal-type homeobox factor; a direct Wnt/FGF target that
                    specifies posterior trunk identity, orthologous to Drosophila caudal.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: anterior/posterior pattern specification
                  term:
                    id: GO:0009952
                    label: anterior/posterior pattern specification
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Reads high posterior Wnt/FGF into posterior positional identity.
            - id: ap_anterior_readout
              label: Anterior OTX transcriptional readout
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: OTX2
                  term:
                    id: UniProtKB:P32243
                    label: Homeobox protein OTX2
                  description: >-
                    Orthodenticle-family homeodomain factor specifying anterior
                    (forebrain/midbrain and rostral head) identity in low-Wnt territory.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: anterior/posterior pattern specification
                  term:
                    id: GO:0009952
                    label: anterior/posterior pattern specification
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Reads low anterior Wnt into anterior head positional identity.
          connections:
            - source: ap_wnt_gradient
              target: ap_posterior_readout
              connection_type: POSITIVELY_REGULATES
              description: High posterior Wnt activates posterior CDX identity.
            - source: ap_wnt_antagonist
              target: ap_wnt_gradient
              connection_type: NEGATIVELY_REGULATES
              description: Anterior Dickkopf blocks Wnt reception, carving out the anterior low-Wnt domain.
            - source: ap_wnt_antagonist
              target: ap_anterior_readout
              connection_type: POSITIVELY_REGULATES
              description: Protection from Wnt permits anterior OTX2 head identity.
        - id: dv_axis
          label: Dorsal/ventral axis specification
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            A ventral-high BMP activity gradient specifies ventral/epidermal fate,
            while the dorsal organizer secretes BMP antagonists (Chordin, Noggin)
            that carve out a low-BMP dorsal domain permissive for neural and axial
            (notochord) fate. The Spemann/Mangold organizer transcription factor
            Goosecoid marks and helps maintain this dorsal signalling centre.
          concepts:
            - preferred_term: dorsal/ventral pattern formation
              term:
                id: GO:0009953
                label: dorsal/ventral pattern formation
          annotons:
            - id: dv_bmp_gradient
              label: Ventralising BMP ligand
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: BMP4
                  term:
                    id: UniProtKB:P12644
                    label: Bone morphogenetic protein 4
                  description: >-
                    BMP4 (Drosophila Dpp ortholog) forms the ventral-high BMP
                    activity gradient specifying ventral and epidermal fates.
              function:
                preferred_term: BMP morphogen activity
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: BMP type I/II receptor complex
              processes:
                - preferred_term: BMP signaling pathway
                  term:
                    id: GO:0030509
                    label: BMP signaling pathway
              locations:
                - preferred_term: plasma membrane
                  term:
                    id: GO:0005886
                    label: plasma membrane
              role_description: Source of the ventral-high BMP gradient; its inhibition dorsally is the primary DV switch.
            - id: dv_bmp_antagonist
              label: Dorsal organizer BMP antagonists
              participant:
                selector_type: ANY_WITH_FUNCTION
                required_function:
                  preferred_term: BMP-sequestering antagonist activity
                  term:
                    id: GO:0016015
                    label: morphogen activity
                  targets:
                    - preferred_term: BMP2/4 ligand
                description: >-
                  Organizer-secreted extracellular BMP antagonists that bind and
                  sequester BMP ligands, exemplified by Chordin and Noggin.
                notes: >-
                  Representative human members: Chordin (UniProtKB:Q9H2X0) and
                  Noggin (UniProtKB:Q13253).
              function:
                preferred_term: BMP ligand sequestration
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: BMP4 ligand
                    term:
                      id: UniProtKB:P12644
                      label: Bone morphogenetic protein 4
              processes:
                - preferred_term: dorsal/ventral pattern formation
                  term:
                    id: GO:0009953
                    label: dorsal/ventral pattern formation
              role_description: Establishes the low-BMP dorsal domain by extracellular ligand sequestration.
            - id: dv_organizer_tf
              label: Organizer transcription factor Goosecoid
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: GSC
                  term:
                    id: UniProtKB:P56915
                    label: Homeobox protein goosecoid
                  description: >-
                    Goosecoid is a conserved Spemann organizer homeodomain factor,
                    a Nodal/beta-catenin target that helps define and maintain the
                    dorsal organizer and its BMP-antagonist expression.
              function:
                preferred_term: DNA-binding transcription factor activity
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              processes:
                - preferred_term: dorsal/ventral pattern formation
                  term:
                    id: GO:0009953
                    label: dorsal/ventral pattern formation
              locations:
                - preferred_term: nucleus
                  term:
                    id: GO:0005634
                    label: nucleus
              role_description: Transcriptional identity of the dorsal organizer signalling centre.
          connections:
            - source: dv_organizer_tf
              target: dv_bmp_antagonist
              connection_type: POSITIVELY_REGULATES
              description: The organizer TF program drives secretion of dorsal BMP antagonists.
            - source: dv_bmp_antagonist
              target: dv_bmp_gradient
              connection_type: NEGATIVELY_REGULATES
              description: Extracellular sequestration lowers BMP activity dorsally, shaping the DV gradient.
        - id: lr_axis
          label: Left/right axis specification
          module_type: DEVELOPMENTAL_PROCESS
          description: >-
            After AP and DV are set, a Nodal/Lefty reaction-diffusion system
            breaks left/right symmetry: Nodal autoactivates and diffuses on the
            left lateral plate while its feedback antagonist Lefty diffuses
            faster and restricts Nodal to the left, imposing asymmetric organ
            situs via the transcription factor Pitx2.
          concepts:
            - preferred_term: determination of left/right symmetry
              term:
                id: GO:0007368
                label: determination of left/right symmetry
          annotons:
            - id: lr_nodal
              label: Left-sided Nodal activator
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: NODAL
                  term:
                    id: UniProtKB:Q96S42
                    label: Nodal homolog
                  description: >-
                    Nodal is a TGF-beta-family morphogen whose self-amplifying
                    expression in the left lateral plate mesoderm establishes left identity.
              function:
                preferred_term: Nodal morphogen activity
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: Activin/Nodal type I/II receptor complex
              processes:
                - preferred_term: nodal signaling pathway
                  term:
                    id: GO:0038092
                    label: nodal signaling pathway
                - preferred_term: determination of left/right symmetry
                  term:
                    id: GO:0007368
                    label: determination of left/right symmetry
              locations:
                - preferred_term: plasma membrane
                  term:
                    id: GO:0005886
                    label: plasma membrane
              role_description: Self-amplifying left-sided signal (activator of the reaction-diffusion pair).
            - id: lr_lefty
              label: Long-range Lefty inhibitor
              participant:
                selector_type: GENE_PRODUCT
                gene_product:
                  preferred_term: LEFTY1
                  term:
                    id: UniProtKB:O75610
                    label: Left-right determination factor 1
                  description: >-
                    Lefty is a Nodal feedback antagonist that diffuses faster than
                    Nodal, forming the fast-diffusing inhibitor of the LR symmetry-breaking pair.
              function:
                preferred_term: Nodal antagonist activity
                term:
                  id: GO:0016015
                  label: morphogen activity
                targets:
                  - preferred_term: Nodal ligand / co-receptor
                    term:
                      id: UniProtKB:Q96S42
                      label: Nodal homolog
              processes:
                - preferred_term: determination of left/right symmetry
                  term:
                    id: GO:0007368
                    label: determination of left/right symmetry
              role_description: Fast-diffusing inhibitor restricting Nodal to the left side.
          connections:
            - source: lr_nodal
              target: lr_lefty
              connection_type: POSITIVELY_REGULATES
              description: Nodal induces its own antagonist Lefty (activator-inhibitor feedback).
            - source: lr_lefty
              target: lr_nodal
              connection_type: NEGATIVELY_REGULATES
              description: Fast-diffusing Lefty confines Nodal activity to the left, breaking LR symmetry.
