id: MODULE:glycogen_biosynthesis
title: Glycogen biosynthesis (UDP-glucose → glycogen) — GSD 0/IV/XV, UGP2-DEE
description: >-
  Glycogen biosynthesis is the cytosolic pathway that builds the branched glucose
  polymer glycogen from the activated sugar donor UDP-glucose, storing glucose for
  later mobilisation. Four steps: UDP-glucose pyrophosphorylase (UGP2) activates
  glucose-1-phosphate with UTP to form UDP-glucose + pyrophosphate; glycogenin
  (GYG1) primes synthesis by autoglucosylating a specific tyrosine, using UDP-glucose
  to build a short covalently-attached alpha-1,4-glucan (~8-12 residues) that nucleates
  the granule; glycogen synthase (muscle GYS1, liver GYS2) then elongates the chain by
  processively adding UDP-glucose-derived glucose units in alpha-1,4 linkage; and the
  glycogen branching enzyme (GBE1) transfers ~6-7-residue segments to internal
  positions via alpha-1,6 linkages, creating the branches that make glycogen soluble
  and multiply the non-reducing ends for both synthesis and later degradation.
  Glycogen synthase is the rate-controlling, tightly regulated step (inhibited by
  phosphorylation, allosterically activated by glucose-6-phosphate). Inherited defects
  define disorders across the pathway: UGP2 deficiency causes a developmental and
  epileptic encephalopathy; GYG1 deficiency causes glycogen storage disease type XV
  (polyglucosan-body myopathy/cardiomyopathy); GYS2 deficiency causes hepatic glycogen
  storage disease type 0a (fasting ketotic hypoglycemia) and GYS1 deficiency muscle
  GSD 0b (cardiomyopathy, sudden death); and GBE1 deficiency causes GSD type IV
  (Andersen disease) and adult polyglucosan body disease — accumulation of poorly
  branched, amylopectin-like polyglucosan.
status: DRAFT
evidence:
  - source_id: GO:0005978
    title: glycogen biosynthetic process
    statement: >-
      The module is grounded in the GO glycogen biosynthetic process (GO:0005978):
      UDP-glucose supply (UGP2), priming (GYG1), elongation (GYS1/GYS2) and branching (GBE1).
  - source_id: Reactome:R-HSA-3322077
    title: Glycogen synthesis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Glycogen synthesis" reactions R-HSA-70286 (UGP2), R-HSA-3322025 (GYG1
      autoglucosylation), R-HSA-3322001 (GYS1) / R-HSA-3322009 (GYS2) and
      R-HSA-3322005 (GBE1 branch formation).
  - source_id: file:human/UGP2/UGP2-ai-review.yaml
    title: UGP2 gene review (human)
    statement: >-
      The UDP-glucose supply step (UniProtKB:Q16851, GO:0003983) matches the
      completed human UGP2 review.
  - source_id: file:human/GYG1/GYG1-ai-review.yaml
    title: GYG1 gene review (human)
    statement: >-
      The glycogenin priming step (UniProtKB:P46976, GO:0008466) matches the
      completed human GYG1 review.
  - source_id: file:human/GYS1/GYS1-ai-review.yaml
    title: GYS1 gene review (human)
    statement: >-
      The muscle glycogen-synthase elongation step (UniProtKB:P13807, GO:0004373)
      matches the completed human GYS1 review.
  - source_id: file:human/GYS2/GYS2-ai-review.yaml
    title: GYS2 gene review (human)
    statement: >-
      The liver glycogen-synthase elongation step (UniProtKB:P54840, GO:0004373)
      matches the completed human GYS2 review.
  - source_id: file:human/GBE1/GBE1-ai-review.yaml
    title: GBE1 gene review (human)
    statement: >-
      The alpha-1,6 branch-formation step (UniProtKB:Q04446, GO:0003844) matches
      the completed human GBE1 review.
module:
  id: glycogen_biosynthesis
  label: Glycogen biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycogen biosynthetic process
      term:
        id: GO:0005978
        label: glycogen biosynthetic process
      description: >-
        Cytosolic synthesis of branched glycogen from UDP-glucose (supply, priming,
        elongation, branching).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The glycogen-biosynthetic enzymes are cytosolic.
  parts:
    - order: 1
      role: activation of glucose-1-phosphate to the UDP-glucose donor
      node:
        id: ugp2_step
        label: glucose-1-phosphate + UTP to UDP-glucose + diphosphate
        module_type: REACTION
        annotons:
          - id: ugp2_activity
            label: "UGP2: UDP-glucose pyrophosphorylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UTP:glucose-1-phosphate uridylyltransferase family (UGP2)
                term:
                  id: PANTHER:PTHR43511
                  label: UTP-GLUCOSE-1-PHOSPHATE URIDYLYLTRANSFERASE
                representative_members:
                  - preferred_term: UGP2 (human)
                    term:
                      id: UniProtKB:Q16851
                      label: UTP--glucose-1-phosphate uridylyltransferase
            function:
              preferred_term: UTP:glucose-1-phosphate uridylyltransferase activity
              term:
                id: GO:0003983
                label: UTP:glucose-1-phosphate uridylyltransferase activity
              substrates:
                - preferred_term: alpha-D-glucose 1-phosphate
                - preferred_term: UTP
              products:
                - preferred_term: UDP-alpha-D-glucose
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.7.7.9
                  statement: UTP:glucose-1-phosphate uridylyltransferase (UDP-glucose pyrophosphorylase)
                - source_id: Reactome:R-HSA-70286
                  statement: "UTP + D-glucose 1-phosphate => pyrophosphate + UDP-glucose (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Provides UDP-glucose, the activated glucosyl donor for glycogen synthesis
              (and for galactose/Leloir metabolism, glycosylation and glucuronidation).
              Deficiency causes developmental and epileptic encephalopathy 83.
    - order: 2
      role: priming / initiation (self-glucosylating primer)
      node:
        id: gyg1_step
        label: glycogenin + n UDP-glucose to oligoglucosyl-glycogenin primer + n UDP
        module_type: REACTION
        annotons:
          - id: gyg1_activity
            label: "GYG1: glycogenin (self-glucosylating initiator)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycogenin family (GYG1/GYG2)
                term:
                  id: PANTHER:PTHR11183
                  label: GLYCOGENIN
                representative_members:
                  - preferred_term: GYG1 (human)
                    term:
                      id: UniProtKB:P46976
                      label: Glycogenin-1
            function:
              preferred_term: glycogenin glucosyltransferase activity
              term:
                id: GO:0008466
                label: glycogenin glucosyltransferase activity
              substrates:
                - preferred_term: glycogenin (Tyr acceptor)
                - preferred_term: UDP-alpha-D-glucose
              products:
                - preferred_term: oligo(1,4-alpha-glucosyl)-glycogenin primer
                - preferred_term: UDP
              evidence:
                - source_id: EC:2.4.1.186
                  statement: glycogenin glucosyltransferase (Mn2+-dependent autoglucosylation on Tyr)
                - source_id: Reactome:R-HSA-3322025
                  statement: "Autoglucosylation of GYG1 complexed with GYS1-a (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Mn2+-dependent, self-glucosylating initiator: builds a short covalently
              attached alpha-1,4-glucan primer (~8-12 residues on a Tyr) that nucleates
              the glycogen granule and is elongated by glycogen synthase (with which it
              forms a complex). Deficiency causes GSD XV (polyglucosan-body myopathy).
    - order: 3
      role: processive alpha-1,4 elongation (rate-controlling)
      node:
        id: gys_step
        label: glycogen(n) + UDP-glucose to glycogen(n+1) + UDP
        module_type: REACTION
        annotons:
          - id: gys_activity
            label: "GYS1/GYS2: glycogen synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycogen synthase family (GYS1/GYS2)
                term:
                  id: PANTHER:PTHR10176
                  label: GLYCOGEN SYNTHASE
                representative_members:
                  - preferred_term: GYS1 (human, muscle isoform)
                    term:
                      id: UniProtKB:P13807
                      label: Glycogen [starch] synthase, muscle
                  - preferred_term: GYS2 (human, liver isoform)
                    term:
                      id: UniProtKB:P54840
                      label: Glycogen [starch] synthase, liver
            function:
              preferred_term: alpha-1,4-glucan glucosyltransferase (UDP-glucose donor) activity
              term:
                id: GO:0004373
                label: alpha-1,4-glucan glucosyltransferase (UDP-glucose donor) activity
              substrates:
                - preferred_term: glycogen (alpha-1,4 non-reducing ends)
                - preferred_term: UDP-alpha-D-glucose
              products:
                - preferred_term: elongated glycogen(n+1)
                - preferred_term: UDP
              evidence:
                - source_id: EC:2.4.1.11
                  statement: glycogen (starch) synthase; UDP-glucose donor; inhibited by phosphorylation, activated by G6P
                - source_id: Reactome:R-HSA-3322001
                  statement: "GYS1 catalyzes the polyglucosylation of oligoGlc-GYG1 (human Reactome reaction)"
                - source_id: Reactome:R-HSA-3322009
                  statement: "GYS2 catalyzes the polyglucosylation of oligoGlc-GYG2 (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-controlling, allosterically- and phosphorylation-regulated enzyme
              that processively elongates the alpha-1,4 chains from the glycogenin
              primer using UDP-glucose. Tissue isoforms: GYS1 (muscle, GSD 0b) and
              GYS2 (liver, GSD 0a).
    - order: 4
      role: introduction of alpha-1,6 branches
      node:
        id: gbe1_step
        label: linear alpha-1,4-glucan to alpha-1,6-branched glycogen
        module_type: REACTION
        annotons:
          - id: gbe1_activity
            label: "GBE1: 1,4-alpha-glucan branching enzyme"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 1,4-alpha-glucan branching enzyme family (GBE1)
                term:
                  id: PANTHER:PTHR43651
                  label: 1,4-ALPHA-GLUCAN-BRANCHING ENZYME
                representative_members:
                  - preferred_term: GBE1 (human)
                    term:
                      id: UniProtKB:Q04446
                      label: 1,4-alpha-glucan-branching enzyme
            function:
              preferred_term: 1,4-alpha-glucan branching enzyme activity
              term:
                id: GO:0003844
                label: 1,4-alpha-glucan branching enzyme activity
              substrates:
                - preferred_term: linear alpha-1,4-glucan chain
              products:
                - preferred_term: alpha-1,6-branched glycogen
              evidence:
                - source_id: EC:2.4.1.18
                  statement: 1,4-alpha-glucan branching enzyme (transfers ~6-7-residue segments to alpha-1,6 positions)
                - source_id: Reactome:R-HSA-3322005
                  statement: "GBE1 catalyzes branch formation in polyGlc-GYG1 complexed with GYS1-a (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Introduces the alpha-1,6 branch points by transferring ~6-7-residue
              segments from a growing alpha-1,4 chain to internal positions, increasing
              solubility and the number of non-reducing ends. Deficiency causes GSD IV
              (Andersen disease) and adult polyglucosan body disease.
  connections:
    - source: ugp2_step
      target: gyg1_step
      connection_type: PROVIDES_INPUT_FOR
      description: UDP-glucose from UGP2 is the donor for glycogenin autoglucosylation.
    - source: ugp2_step
      target: gys_step
      connection_type: PROVIDES_INPUT_FOR
      description: UDP-glucose from UGP2 is the donor for glycogen-synthase elongation.
    - source: gyg1_step
      target: gys_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The oligoglucosyl-glycogenin primer is the substrate that glycogen synthase
        elongates.
    - source: gys_step
      target: gbe1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The linear alpha-1,4 chains made by glycogen synthase are branched by GBE1.
    - source: gbe1_step
      target: gys_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Branching multiplies the non-reducing ends, which glycogen synthase continues
        to elongate (the synthase/branching cycle).
  notes: >-
    Four-step cytosolic glycogen biosynthesis grounded to the human enzymes UGP2
    (UniProtKB:Q16851; GO:0003983, EC 2.7.7.9), glycogenin GYG1 (P46976; GO:0008466,
    EC 2.4.1.186), glycogen synthase GYS1 (P13807) / GYS2 (P54840) (GO:0004373, EC
    2.4.1.11) and branching enzyme GBE1 (Q04446; GO:0003844, EC 2.4.1.18). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction
    ids and titles were verified against the local reactome cache. The glycogen-synthase
    step uses a PANTHER family selector (PTHR10176) generic over GYS1/GYS2 and orthologs,
    with both human isoforms as representative members; GYG1 (PTHR11183, family also
    includes GYG2), UGP2 (PTHR43511) and GBE1 (PTHR43651) likewise use family selectors
    plus a human representative. This is the biosynthetic counterpart of the glycogenolysis
    module (PYGL/PYGM, AGL, PGM1): glucose-1-phosphate is the shared branch metabolite
    (PGM1 links the two directions), and glycogenin/synthase form the granule that
    phosphorylase later degrades. UGP2's UDP-glucose also feeds galactose (Leloir)
    metabolism and glycosylation (noted, out of scope here). Disorders: UGP2 -> DEE83;
    GYG1 -> GSD XV; GYS1 -> muscle GSD 0b; GYS2 -> liver GSD 0a; GBE1 -> GSD IV
    (Andersen) / adult polyglucosan body disease.
