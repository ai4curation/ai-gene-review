id: MODULE:orphan_biofilm_regulatory_sensors_boundary
title: Orphan biofilm regulatory sensors boundary
description: Boundary module for the ppu02025 orphan regulatory-sensor partition in Pseudomonas putida KT2440. It
  records RetS/7TMR-DISM and other unresolved sensor histidine kinases plus a PP_4362-PP_4364 HPt/SpoIIE/STAS regulatory
  neighborhood.
status: DRAFT
evidence:
- source_id: KEGG:ppu02025
  title: Biofilm formation - Pseudomonas aeruginosa
  statement: KEGG ppu02025 supplies umbrella membership, but this bucket is treated as regulatory context rather
    than direct evidence that every gene has a validated biofilm role in KT2440.
- source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
  title: PSEPK ppu02025 partition table
  statement: The partition table groups PP_1875, PP_2664, PP_4173, PP_4362, PP_4363, PP_4364, PP_4781, and PP_4824/retS
    into the orphan regulatory-sensor bucket.
notes: The module is intentionally conservative. Except for retS, the first-pass reviews do not assign specific
  biofilm output, ligand identity, response-regulator partner, or regulon. PP_4824 is represented by the existing
  retS review folder.
