id: MODULE:low_information_membrane_protein_boundary
title: Low-information membrane protein boundary
description: Boundary module for low-information PSEPK membrane proteins pulled into transport buckets by weak membrane, transport,
  or family-name signal. It separates clear low-information transporter candidates, ArsB and YfdC specific transporter cases,
  a TonB-domain singleton, envelope/outer-membrane/biofilm/toxin side nodes, and domain-only membrane proteins left unresolved.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_low_information_membrane_proteins.tsv
  title: PSEPK transport-bucket low-information membrane protein batch
  statement: The batch table records 67 PSEPK transport/membrane/efflux-bucket proteins with product-name-only or weak domain
    signal.
notes: 'First-pass interpretation: this is a conservative holding boundary, not a satisfiable transport pathway. Only ArsB,
  YfdC, TonB-domain, and clearer PACE/FUSC/PIN/MFS/TerC/AI-2E-like transporter-family cases receive transporter functions.
  Most proteins are retained as membrane or side-node context until gene-specific evidence supports substrate, partner, or
  pathway claims.'
