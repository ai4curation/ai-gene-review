id: MODULE:maternal_to_zygotic_transition
title: Maternal-to-zygotic transition module
description: >-
  The earliest developmental hand-off in metazoan embryos, in which control of
  development passes from maternally deposited factors to the embryo's own
  genome. The module has two coupled, ordered arms: (1) clearance of maternal
  mRNAs and proteins, executed by sequence-specific RNA-binding factors and
  maternal/zygotic small RNAs that target maternal transcripts for
  deadenylation and decay; and (2) zygotic genome activation (ZGA), in which
  pioneer and pluripotency transcription factors (e.g. POU5F1/Oct4,
  Nanog/NANOG, SOX2, and lineage-specific activators such as DUX/DUX4 and
  Nr5a2) open embryonic chromatin and switch on the first zygotic transcripts.
  In insects the transition coincides with cellularization of the syncytial
  blastoderm, modelled here as a taxon-restricted variant part. Grounded in
  GO:0141064 (zygotic genome activation) within GO:0009790 (embryo
  development). Maternal patterning determinants deposited during this window
  feed forward into modules/body_axis_specification.yaml.
status: DRAFT
evidence:
  - source_id: GO:0141064
    title: zygotic genome activation
    statement: The ZGA arm of the module is grounded in the GO term for zygotic genome activation.
  - source_id: GO:0009790
    title: embryo development
    statement: The maternal-to-zygotic transition is the earliest phase of embryo development.
notes: >-
  Maternal-mRNA clearance is executed by many partly redundant RNA-binding
  proteins and small-RNA pathways that differ between clades, so the clearance
  arm uses abstract ANY_WITH_FUNCTION selectors (mRNA binding / ncRNA-mediated
  silencing) rather than over-committing to one exemplar. ZGA activators are
  oriented with curated human pluripotency-factor accessions; the specific
  activator identity (DUX/DUX4, Nr5a2, Zelda in flies, Pou5f3/Nanog/Sox19b in
  fish) is clade-dependent. Exemplar roles were cross-checked against curated GOA
  (QuickGO): human POU5F1/NANOG/SOX2 are curated to stem cell population
  maintenance (used here for the pluripotency annoton), while a direct human
  zygotic genome activation (GO:0141064) annotation exists only for NR5A2 (ISS) -
  so ZGA is asserted on the dedicated clade-specific activator, not the
  pluripotency factors.
module:
  id: maternal_to_zygotic_transition
  label: Maternal-to-zygotic transition
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: zygotic genome activation
      term:
        id: GO:0141064
        label: zygotic genome activation
      description: Activation of transcription from the embryo's own genome after fertilization.
    - preferred_term: embryo development
      term:
        id: GO:0009790
        label: embryo development
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: A maternal-to-zygotic hand-off is universal in animal embryos, though its timing and factors differ by clade.
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: maternal mRNA clearance
      node:
        id: maternal_mrna_clearance
        label: Clearance of maternal transcripts
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Sequence-specific RNA-binding proteins and maternal/zygotic small RNAs
          recognise maternal mRNAs and trigger their deadenylation and decay,
          removing the maternal program so the zygotic program can take over.
        annotons:
          - id: mrna_destabilizer
            label: Maternal-mRNA-destabilising RNA-binding factor
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: sequence-specific mRNA binding driving maternal transcript decay
                term:
                  id: GO:0003729
                  label: mRNA binding
              description: >-
                RNA-binding proteins (e.g. Smaug/SAMD4, ZFP36-family, Brat) that
                bind elements in maternal mRNAs and recruit deadenylation/decay
                machinery during the transition.
            function:
              preferred_term: mRNA binding
              term:
                id: GO:0003729
                label: mRNA binding
              targets:
                - preferred_term: maternal mRNA 3' UTR elements
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Targets maternal transcripts for deadenylation and decay.
            evidence:
              - source_id: PMID:34757425
                title: "The F-box protein Bard (CG14317) targets the Smaug RNA-binding protein for destruction during the Drosophila maternal-to-zygotic transition"
                statement: "The RNA-binding protein Smaug translationally represses and destabilises maternal mRNAs during the MZT."
                supporting_text: "the RNA-binding protein Smaug (SMG) plays an essential role in progression through the MZT by translationally repressing and destabilizing a large number of maternal mRNAs"
          - id: small_rna_clearance
            label: Small-RNA-mediated maternal transcript silencing
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: miRNA binding (small-RNA effector of maternal-mRNA silencing)
                term:
                  id: GO:0035198
                  label: miRNA binding
              description: >-
                Zygotically expressed microRNAs (e.g. the miR-430/miR-427/miR-309
                families) that clear hundreds of maternal mRNAs shortly after ZGA.
            processes:
              - preferred_term: regulatory ncRNA-mediated post-transcriptional gene silencing
                term:
                  id: GO:0035194
                  label: regulatory ncRNA-mediated post-transcriptional gene silencing
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Zygotic small RNAs that accelerate bulk maternal mRNA clearance.
            evidence:
              - source_id: PMID:28456956
                title: "Role of MicroRNAs in Zygotic Genome Activation: Modulation of mRNA During Embryogenesis"
                statement: "Zygotically expressed microRNAs facilitate decay of maternal transcripts during the MZT."
                supporting_text: "decay of maternal transcripts may be facilitated by the activity of microRNAs. These small RNAs can act pleiotropically, blocking translation and inducing destabilization"
    - order: 2
      role: zygotic genome activation
      node:
        id: zygotic_genome_activation
        label: Zygotic genome activation
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          Pioneer and pluripotency transcription factors, accumulating to a
          threshold as the nucleo-cytoplasmic ratio rises, open embryonic
          chromatin and initiate the first wave of zygotic transcription.
        concepts:
          - preferred_term: zygotic genome activation
            term:
              id: GO:0141064
              label: zygotic genome activation
        annotons:
          - id: zga_pluripotency_tf
            label: Pluripotency pioneer transcription factors
            participant:
              selector_type: FAMILY
              family:
                preferred_term: core pluripotency transcription factors
                description: >-
                  Oct/Sox/Nanog core pluripotency factors that maintain the
                  naive embryonic state and contribute to the first zygotic transcription.
                representative_members:
                  - preferred_term: POU5F1 (Oct4)
                    term:
                      id: UniProtKB:Q01860
                      label: POU domain, class 5, transcription factor 1
                  - preferred_term: NANOG
                    term:
                      id: UniProtKB:Q9H9S0
                      label: Homeobox protein NANOG
                  - preferred_term: SOX2
                    term:
                      id: UniProtKB:P48431
                      label: Transcription factor SOX-2
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: stem cell population maintenance
                term:
                  id: GO:0019827
                  label: stem cell population maintenance
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: >-
              Maintain the pluripotent ground state (curated: POU5F1/NANOG/SOX2
              are annotated to stem cell population maintenance); they also help
              open embryonic chromatin at ZGA, but the dedicated ZGA trigger is
              the clade-specific activator below.
          - id: zga_activator
            label: Clade-specific ZGA activator
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: transcriptional activator driving the first zygotic wave
                term:
                  id: GO:0000981
                  label: DNA-binding transcription factor activity, RNA polymerase II-specific
              description: >-
                The dedicated ZGA activator differs by clade: DUX/DUX4 in
                mammals, Nr5a2 in mouse, Zelda in Drosophila, Pou5f3/Nanog/Sox19b
                in zebrafish.
              notes: >-
                Representative human/mammalian activators: DUX4 (UniProtKB:Q9UBX2)
                and NR5A2 (UniProtKB:O00482).
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0000981
                label: DNA-binding transcription factor activity, RNA polymerase II-specific
            processes:
              - preferred_term: zygotic genome activation
                term:
                  id: GO:0141064
                  label: zygotic genome activation
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Dedicated activator that opens minor/major ZGA loci in a clade-specific manner.
            evidence:
              - source_id: PMID:39358607
                title: "Rise and SINE: roles of transcription factors and retrotransposons in zygotic genome activation"
                statement: "Dedicated ZGA activators include the pioneer nuclear receptor NR5A2 and the DUX/TPRX/OBOX families."
                supporting_text: "ZGA regulation by several transcription factors, including by orphan nuclear receptors (OrphNRs) such as the pioneer transcription factor NR5A2, and by factors of the DUX, TPRX and OBOX families"
    - order: 3
      role: insect cellularization (taxon-restricted)
      optional: true
      node:
        id: mzt_variants
        label: Morphological correlate of the transition
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          In insects the maternal-to-zygotic transition coincides with
          cellularization of the syncytial blastoderm; most other metazoans are
          already cellular, so this step is a taxon-restricted variant.
        variant_sets:
          - id: morphology_variants
            label: Cellular context of the transition
            axis: taxon
            selection: EXACTLY_ONE
            variants:
              - id: insect_cellularization
                label: Syncytial blastoderm cellularization (insects)
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  Plasma membranes invaginate around syncytial nuclei to form the
                  cellular blastoderm concurrent with major ZGA in Drosophila and
                  other insects.
                concepts:
                  - preferred_term: cellularization
                    term:
                      id: GO:0007349
                      label: cellularization
                context:
                  taxa:
                    - preferred_term: insects
                      term:
                        id: NCBITaxon:50557
                        label: Insecta
              - id: already_cellular
                label: Already-cellular embryo (most metazoans)
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  Holoblastic embryos (e.g. mammals, amphibians, echinoderms,
                  nematodes) are cellular from the first cleavage, so the
                  transition has no cellularization step.
                context:
                  taxa:
                    - preferred_term: metazoa
                      term:
                        id: NCBITaxon:33208
                        label: Metazoa
  connections:
    - source: zygotic_genome_activation
      target: maternal_mrna_clearance
      connection_type: POSITIVELY_REGULATES
      description: Zygotic transcription produces the small RNAs and factors that complete maternal-transcript clearance.
    - source: maternal_mrna_clearance
      target: zygotic_genome_activation
      connection_type: PROVIDES_INPUT_FOR
      description: Removal of maternal repressors and the rising nucleo-cytoplasmic ratio license robust zygotic transcription.
