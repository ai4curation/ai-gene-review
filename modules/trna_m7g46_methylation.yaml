              term:
                id: GO:0008176
                label: tRNA (guanine(46)-N7)-methyltransferase activity
              evidence:
                - source_id: GO:0008176
                  statement: >-
                    GO:0008176 is the molecular-function term for the TrmB
                    reaction.
              substrates:
