            role_description: Single enzymatic step forming the m7G46 tRNA modification.
  knowledge_gaps:
    - gap_statement: >-
        The first-pass evidence does not establish whether PSEPK TrmB acts as a
        monomer, homomultimer, or stable complex under physiological conditions.
      boundary: >-
        Keep the tRNA methyltransferase complex annotation out of the module
        core. The PSEPK-specific OpenScientist report argues the GO:0043527
        complex annotation is likely over-propagated from eukaryotic Trm8/Trm82
        biology and that no bacterial second subunit should be opened as a
        missing-step gap.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        Direct KT2440 biochemical or knockout evidence for TrmB-dependent m7G46
        formation has not been located; current confidence rests on reviewed
        UniProt/UniRule evidence and strong same-genus transfer from
        experimentally validated Pseudomonas TrmB.
      boundary: >-
        Treat trmB as covered for UPA00989, but keep KT2440 substrate scope and
        phenotype claims as follow-up experimental questions rather than module
        requirements.
      gap_kind:
        - BIOLOGY
