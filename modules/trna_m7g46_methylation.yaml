id: MODULE:trna_m7g46_methylation
title: tRNA m7G46 methylation
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00989 module for SAM-dependent
  formation of N7-methylguanosine at position 46 of tRNA. The module is
  centered on TrmB, the tRNA (guanine(46)-N7)-methyltransferase encoded by
  PP_5103. Broader RNA methylation and methyltransferase-complex annotations
  are retained only as context unless supported by more specific evidence.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00989
    title: UniPathway UPA00989
    statement: >-
      The local UPA00989 membership set contains trmB as the enzyme for
      N7-methylguanine-tRNA biosynthesis.
  - source_id: GO:0106004
    title: tRNA (guanine-N7)-methylation
    statement: >-
      GO:0106004 is the process term for methylating guanine in tRNA at N7.
  - source_id: file:PSEPK/trmB/trmB-ai-review.yaml
    title: Curated trmB review
    statement: >-
      The trmB review accepts the tRNA guanine-N7 methyltransferase molecular
      function and tRNA methylation process annotations, while marking the
      generic tRNA methyltransferase complex annotation as over-annotated.
  - source_id: file:PSEPK/trmB/trmB-uniprot.txt
    title: UniProtKB reviewed entry for trmB
    statement: >-
      UniProt describes TrmB as catalyzing formation of N7-methylguanine at
      position 46 in tRNA and records the N7-methylguanine-tRNA biosynthesis
      pathway.
  - source_id: file:modules/trna_m7g46_methylation-deep-research-openscientist.md
    title: OpenScientist module research for tRNA m7G46 methylation
    statement: >-
      OpenScientist module-level research supports UPA00989 as a single-step
      SAM-dependent tRNA guanine-46 N7 methylation module centered on bacterial
      TrmB, with broader RNA methylation and methyltransferase-complex biology
      kept outside the module core.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__trna_m7g46_methylation__upa00989-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00989 pathway satisfiability review
    statement: >-
      The PSEPK-specific OpenScientist report finds UPA00989 covered by the
      sole trmB/PP_5103/Q88CS7 candidate, with no paralog ambiguity and no
      expected bacterial Trm82/WDR4-like second subunit; it reinforces the
      GO:0043527 tRNA methyltransferase complex annotation as likely
      over-propagated.
notes: >-
  First-pass interpretation: UPA00989 is satisfiable as a single-enzyme tRNA
  modification module in KT2440. The pathway boundary should not imply a
  broader RNA methylation module or a defined tRNA methyltransferase complex
  without additional biochemical or interaction evidence. OpenScientist's
  PSEPK-specific review supports this boundary: Q88CS7 is the unique KT2440
  TrmB/EC 2.1.1.33/PF02390 candidate, bacterial TrmB is treated as a
  stand-alone enzyme, and a eukaryotic Trm82/WDR4-like accessory subunit is not
  expected in this taxon.
module:
  id: trna_m7g46_methylation
  label: tRNA m7G46 methylation
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: tRNA modification
      term:
        id: GO:0006400
        label: tRNA modification
      description: Post-transcriptional modification of tRNA nucleosides.
    - preferred_term: tRNA methylation
      term:
        id: GO:0030488
        label: tRNA methylation
      description: Broad parent process for TrmB-mediated guanine-N7 methylation in tRNA.
    - preferred_term: tRNA (guanine-N7)-methylation
      term:
        id: GO:0106004
        label: tRNA (guanine-N7)-methylation
      description: Specific biological process for TrmB's m7G46 tRNA product.
  parts:
