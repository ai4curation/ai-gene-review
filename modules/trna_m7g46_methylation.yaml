      role: Formation of m7G46 in tRNA
      node:
        id: trmb_m7g46_methylation
        label: TrmB tRNA guanine-46 N7 methylation
        module_type: REACTION
        description: >-
          TrmB transfers a methyl group from S-adenosyl-L-methionine to
          guanosine at position 46 in tRNA, producing N7-methylguanosine(46)
          and S-adenosyl-L-homocysteine.
        annotons:
          - id: trmB_trna_m7g46_methyltransferase
