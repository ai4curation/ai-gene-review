      The PRPP-synthesis exit step (UniProtKB:P60891, GO:0004749) matches the completed
      human PRPS1 review.
module:
  id: pentose_phosphate_nonoxidative_branch
  label: Pentose phosphate pathway (non-oxidative branch + PRPP)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pentose-phosphate shunt, non-oxidative branch
      term:
        id: GO:0009052
        label: pentose-phosphate shunt, non-oxidative branch
      description: >-
        Reversible interconversion of pentose phosphates with glycolytic intermediates,
        plus PRPP synthesis committing ribose-5-phosphate to nucleotide metabolism.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The non-oxidative-branch enzymes and PRPS1 are cytosolic.
  parts:
    - order: 1
      role: ribulose-5-P / ribose-5-P isomerisation
      node:
        id: rpia_step
        label: D-ribulose-5-phosphate to D-ribose-5-phosphate
        module_type: REACTION
        annotons:
          - id: rpia_activity
            label: "RPIA: ribose-5-phosphate isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ribose-5-phosphate isomerase family (RPIA)
                term:
                  id: PANTHER:PTHR11934
                  label: RIBOSE-5-PHOSPHATE ISOMERASE
                representative_members:
                  - preferred_term: RPIA (human)
                    term:
                      id: UniProtKB:P49247
                      label: Ribose-5-phosphate isomerase
            function:
              preferred_term: ribose-5-phosphate isomerase activity
              term:
                id: GO:0004751
                label: ribose-5-phosphate isomerase activity
              substrates:
                - preferred_term: D-ribulose 5-phosphate
              products:
                - preferred_term: D-ribose 5-phosphate
              evidence:
                - source_id: EC:5.3.1.6
                  statement: ribose-5-phosphate isomerase; reversible aldose-ketose interconversion
                - source_id: Reactome:R-HSA-177784
                  statement: "RPIA isomerizes ribose 5-phosphate to D-ribulose 5-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Interconverts ribulose-5-phosphate and ribose-5-phosphate, supplying
              ribose-5-phosphate for nucleotide synthesis (via PRPS1). Deficiency causes a
              very rare progressive leukoencephalopathy.
    - order: 2
      role: ribulose-5-P / xylulose-5-P epimerisation
      node:
        id: rpe_step
        label: D-ribulose-5-phosphate to D-xylulose-5-phosphate
        module_type: REACTION
        annotons:
          - id: rpe_activity
            label: "RPE: ribulose-5-phosphate 3-epimerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ribulose-phosphate 3-epimerase family (RPE)
                term:
                  id: PANTHER:PTHR11749
                  label: RIBULOSE-PHOSPHATE 3-EPIMERASE
                representative_members:
                  - preferred_term: RPE (human)
                    term:
                      id: UniProtKB:Q96AT9
                      label: Ribulose-phosphate 3-epimerase
            function:
              preferred_term: D-ribulose-phosphate 3-epimerase activity
              term:
                id: GO:0004750
                label: D-ribulose-phosphate 3-epimerase activity
              substrates:
                - preferred_term: D-ribulose 5-phosphate
              products:
                - preferred_term: D-xylulose 5-phosphate
              evidence:
                - source_id: EC:5.1.3.1
                  statement: ribulose-5-phosphate 3-epimerase; metal-dependent TIM-barrel epimerase
                - source_id: Reactome:R-HSA-71303
                  statement: "RPE dimers isomerise RU5P to XY5P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Interconverts ribulose-5-phosphate and xylulose-5-phosphate, supplying the
              xylulose-5-phosphate substrate for transketolase. No common Mendelian disease.
    - order: 3
      role: two-carbon transfer (transketolase)
      node:
        id: tkt_step
        label: D-xylulose-5-P + D-ribose-5-P to sedoheptulose-7-P + D-glyceraldehyde-3-P
        module_type: REACTION
        annotons:
          - id: tkt_activity
            label: "TKT: transketolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Transketolase family (TKT/TKTL1/TKTL2)
                term:
                  id: PANTHER:PTHR43195
                  label: TRANSKETOLASE
                representative_members:
                  - preferred_term: TKT (human)
                    term:
                      id: UniProtKB:P29401
                      label: Transketolase
            function:
              preferred_term: transketolase activity
              term:
                id: GO:0004802
                label: transketolase activity
              substrates:
                - preferred_term: D-xylulose 5-phosphate
                - preferred_term: D-ribose 5-phosphate
              products:
                - preferred_term: sedoheptulose 7-phosphate
                - preferred_term: D-glyceraldehyde 3-phosphate
              evidence:
                - source_id: EC:2.2.1.1
                  statement: transketolase; thiamine-diphosphate/Mg2+-dependent 2-carbon transfer (also X5P + E4P -> F6P + GA3P)
                - source_id: Reactome:R-HSA-71324
                  statement: "ribose 5-phosphate + xylulose 5-phosphate <=> sedoheptulose 7-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Thiamine-diphosphate-dependent enzyme transferring 2-carbon units; links the
              pentose phosphate pathway to glycolysis (fructose-6-P, glyceraldehyde-3-P).
              Erythrocyte TKT activity indexes thiamine (B1) status.
    - order: 4
      role: three-carbon transfer (transaldolase)
      node:
        id: taldo1_step
        label: sedoheptulose-7-P + D-glyceraldehyde-3-P to D-erythrose-4-P + D-fructose-6-P
        module_type: REACTION
        annotons:
          - id: taldo1_activity
            label: "TALDO1: transaldolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Transaldolase family (TALDO1)
                term:
                  id: PANTHER:PTHR10683
                  label: TRANSALDOLASE
                representative_members:
                  - preferred_term: TALDO1 (human)
                    term:
                      id: UniProtKB:P37837
                      label: Transaldolase
            function:
              preferred_term: transaldolase activity
              term:
                id: GO:0004801
                label: transaldolase activity
              substrates:
                - preferred_term: sedoheptulose 7-phosphate
                - preferred_term: D-glyceraldehyde 3-phosphate
              products:
                - preferred_term: D-erythrose 4-phosphate
                - preferred_term: D-fructose 6-phosphate
              evidence:
                - source_id: EC:2.2.1.2
                  statement: transaldolase; Schiff-base (Lys) 3-carbon (dihydroxyacetone) transfer
                - source_id: Reactome:R-HSA-71334
                  statement: "sedoheptulose 7-phosphate + D-glyceraldehyde 3-phosphate <=> D-erythrose 4-phosphate + D-fructose 6-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Transfers a 3-carbon unit, completing the reversible connection of pentose
              phosphates to glycolytic fructose-6-phosphate and generating erythrose-4-phosphate.
              Deficiency causes transaldolase deficiency (liver cirrhosis, hemolytic anemia).
    - order: 5
      role: exit to nucleotide synthesis (PRPP)
      node:
        id: prps1_step
        label: D-ribose-5-phosphate + ATP to PRPP + AMP
        module_type: REACTION
        annotons:
          - id: prps1_activity
            label: "PRPS1: phosphoribosyl pyrophosphate synthetase 1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ribose-phosphate diphosphokinase family (PRPS1/PRPS2)
                term:
                  id: PANTHER:PTHR10210
                  label: RIBOSE-PHOSPHATE PYROPHOSPHOKINASE
                representative_members:
                  - preferred_term: PRPS1 (human)
                    term:
                      id: UniProtKB:P60891
                      label: Ribose-phosphate pyrophosphokinase 1
            function:
              preferred_term: ribose phosphate diphosphokinase activity
              term:
                id: GO:0004749
                label: ribose phosphate diphosphokinase activity
              substrates:
                - preferred_term: D-ribose 5-phosphate
                - preferred_term: ATP
              products:
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
                - preferred_term: AMP
              evidence:
                - source_id: EC:2.7.6.1
                  statement: ribose-phosphate diphosphokinase (PRPP synthetase); Mg2+-dependent; large regulated homo-oligomer
                - source_id: Reactome:R-HSA-73580
                  statement: "PRPS dimers pyrophosphorylate R5P using ATP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Makes PRPP from ribose-5-phosphate + ATP — the activated precursor committing
              pentose carbon to de novo/salvage purine, pyrimidine and NAD nucleotide synthesis
              (the substrate of HGPRT/APRT). Loss = Arts/CMTX5/DFN2; gain = superactivity/gout.
  connections:
    - source: rpia_step
      target: tkt_step
      connection_type: PROVIDES_INPUT_FOR
      description: Ribose-5-phosphate from RPIA is a transketolase substrate.
    - source: rpe_step
      target: tkt_step
      connection_type: PROVIDES_INPUT_FOR
      description: Xylulose-5-phosphate from RPE is the other transketolase substrate.
    - source: tkt_step
      target: taldo1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Sedoheptulose-7-phosphate + glyceraldehyde-3-phosphate from transketolase are the
        transaldolase substrates.
    - source: rpia_step
      target: prps1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Ribose-5-phosphate from RPIA is committed to nucleotide synthesis by PRPS1 (PRPP).
  notes: >-
    Non-oxidative branch of the pentose phosphate pathway plus the PRPP-synthesis exit,
    grounded to the human enzymes RPIA (UniProtKB:P49247, GO:0004751, EC 5.3.1.6), RPE
    (Q96AT9, GO:0004750, EC 5.1.3.1), transketolase TKT (P29401, GO:0004802, EC 2.2.1.1),
    transaldolase TALDO1 (P37837, GO:0004801, EC 2.2.1.2) and PRPP synthetase PRPS1 (P60891,
    GO:0004749, EC 2.7.6.1). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome cache. Each step
    uses a PANTHER family selector (generic over paralogs/orthologs; e.g. TKT family includes
    TKTL1/TKTL2, PRPS family includes PRPS2). These reactions are reversible and non-linear:
    ribulose-5-phosphate from the oxidative branch (G6PD/PGLS/PGD module) is split by RPIA
    (-> ribose-5-P) and RPE (-> xylulose-5-P) into the transketolase/transaldolase carbon
    shuffle that regenerates glycolytic fructose-6-phosphate and glyceraldehyde-3-phosphate;
    transketolase also runs a second reaction (xylulose-5-P + erythrose-4-P <-> fructose-6-P +
    glyceraldehyde-3-P), not modelled as a separate node. PRPS1 is the committed exit that
    channels ribose-5-phosphate to PRPP for purine/pyrimidine/NAD synthesis and salvage (the
    PRPP used by HPRT1/APRT of the purine_salvage_and_catabolism module). Disorders: TALDO1 ->
    transaldolase deficiency (hepatopathy + hemolysis); RPIA -> leukoencephalopathy (very rare);
    PRPS1 -> Arts syndrome / CMTX5 / DFN2 (loss) and PRPP synthetase superactivity / gout (gain);
    TKT indexes thiamine status; RPE has no common Mendelian disease.
