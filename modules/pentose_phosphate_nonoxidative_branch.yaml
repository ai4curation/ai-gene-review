id: MODULE:pentose_phosphate_nonoxidative_branch
title: Pentose phosphate pathway — non-oxidative branch + PRPP synthesis; transaldolase/RPIA deficiency, PRPS1 disorders
description: >-
  The non-oxidative branch of the pentose phosphate pathway is a set of reversible
  sugar-phosphate rearrangements that interconvert the five-carbon sugar ribulose-5-phosphate
  (from the oxidative branch) with ribose-5-phosphate for nucleotide synthesis and with the
  glycolytic intermediates fructose-6-phosphate and glyceraldehyde-3-phosphate — allowing
  cells to balance their demand for NADPH versus ribose-5-phosphate. Ribose-5-phosphate
  isomerase (RPIA) interconverts ribulose-5-phosphate and ribose-5-phosphate; ribulose-5-phosphate
  3-epimerase (RPE) interconverts ribulose-5-phosphate and xylulose-5-phosphate; transketolase
  (TKT, thiamine-diphosphate-dependent) transfers two-carbon units, converting
  xylulose-5-phosphate + ribose-5-phosphate to sedoheptulose-7-phosphate + glyceraldehyde-3-phosphate
  (and, in a second reaction, xylulose-5-phosphate + erythrose-4-phosphate to
  fructose-6-phosphate + glyceraldehyde-3-phosphate); and transaldolase (TALDO1) transfers a
  three-carbon unit, converting sedoheptulose-7-phosphate + glyceraldehyde-3-phosphate to
  erythrose-4-phosphate + fructose-6-phosphate. Finally, phosphoribosyl pyrophosphate
  synthetase (PRPS1) uses ribose-5-phosphate + ATP to make 5-phospho-alpha-D-ribose
  1-diphosphate (PRPP) + AMP — the activated precursor that commits pentose carbon to de novo
  and salvage synthesis of purine, pyrimidine and pyridine (NAD) nucleotides. Inherited
  defects: transaldolase (TALDO1) deficiency causes liver disease and hemolytic anemia;
  ribose-5-phosphate isomerase (RPIA) deficiency is an extremely rare progressive
  leukoencephalopathy; and PRPS1 loss-of-function causes Arts syndrome / CMTX5 / DFN2 while
  gain-of-function (superactivity) causes purine overproduction with gout.
status: DRAFT
evidence:
  - source_id: GO:0009052
    title: pentose-phosphate shunt, non-oxidative branch
    statement: >-
      The module is grounded in the GO pentose-phosphate shunt, non-oxidative branch
      (GO:0009052), plus the PRPP-synthesis exit to nucleotide metabolism.
  - source_id: Reactome:R-HSA-71336
    title: Pentose phosphate pathway
    statement: >-
      Reactions follow the human Reactome "Pentose phosphate pathway" (R-HSA-71336):
      R-HSA-177784 (RPIA), R-HSA-71303 (RPE), R-HSA-71324 (TKT), R-HSA-71334 (TALDO1)
      and R-HSA-73580 (PRPS1).
  - source_id: file:human/RPIA/RPIA-ai-review.yaml
    title: RPIA gene review (human)
    statement: >-
      The ribose-5-phosphate isomerase step (UniProtKB:P49247, GO:0004751) matches the
      completed human RPIA review.
  - source_id: file:human/RPE/RPE-ai-review.yaml
    title: RPE gene review (human)
    statement: >-
      The ribulose-5-phosphate 3-epimerase step (UniProtKB:Q96AT9, GO:0004750) matches
      the completed human RPE review.
  - source_id: file:human/TKT/TKT-ai-review.yaml
    title: TKT gene review (human)
    statement: >-
      The transketolase step (UniProtKB:P29401, GO:0004802) matches the completed human
      TKT review.
  - source_id: file:human/TALDO1/TALDO1-ai-review.yaml
    title: TALDO1 gene review (human)
    statement: >-
      The transaldolase step (UniProtKB:P37837, GO:0004801) matches the completed human
      TALDO1 review.
  - source_id: file:human/PRPS1/PRPS1-ai-review.yaml
    title: PRPS1 gene review (human)
