id: MODULE:homocysteine_metabolism
title: Homocysteine metabolism (remethylation and transsulfuration)
description: >-
  The two competing cytosolic fates of L-homocysteine, the branch-point
  metabolite of the methionine cycle. Homocysteine is generated from
  S-adenosylhomocysteine after SAM-dependent methylation reactions, and its two
  disposal routes determine methionine/one-carbon homeostasis and sulfur-amino-acid
  supply. (1) Remethylation regenerates L-methionine: methylenetetrahydrofolate
  reductase (MTHFR) reduces 5,10-methylenetetrahydrofolate to 5-methyl-THF, the
  methyl donor that cobalamin-dependent methionine synthase (MTR) uses to transfer
  a methyl group to homocysteine (via an enzyme-bound methylcobalamin cofactor),
  producing methionine and regenerating tetrahydrofolate. Because MTR's cobalamin
  is periodically oxidised to inactive cob(II)alamin, methionine synthase reductase
  (MTRR), an NADPH-dependent diflavin oxidoreductase, reductively reactivates it;
  and the upstream cobalamin-processing enzyme MMACHC (cblC) decyanates/dealkylates
  incoming cobalamin to the cob(II)alamin precursor that supplies both
  methylcobalamin (to MTR) and adenosylcobalamin (to methylmalonyl-CoA mutase). (2)
  Transsulfuration commits homocysteine's sulfur to cysteine: the PLP-dependent
  cystathionine beta-synthase (CBS) condenses homocysteine with L-serine to
  cystathionine, which cystathionine gamma-lyase (CTH/CSE) then cleaves to
  L-cysteine (plus 2-oxobutanoate and ammonia); CBS and CTH are also the principal
  enzymatic sources of the gasotransmitter hydrogen sulfide. Inherited defects all
  cause homocystinuria / hyperhomocysteinemia with distinct biochemistry: CBS →
  classic homocystinuria (with hypermethioninemia); MTHFR → homocystinuria with low
  methionine; MTR → cblG and MTRR → cblE homocystinuria; MMACHC → cblC (combined
  methylmalonic aciduria and homocystinuria); CTH → (largely benign) cystathioninuria.
status: DRAFT
evidence:
  - source_id: GO:0050667
    title: homocysteine metabolic process
    statement: >-
      The module is grounded in the GO homocysteine metabolic process
      (GO:0050667), covering both the remethylation and transsulfuration fates.
  - source_id: Reactome:R-HSA-1614635
    title: Sulfur amino acid metabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome sulfur
      amino acid / methionine-cycle reactions: R-HSA-200676 (MTHFR), R-HSA-3149539
      (MTR), R-HSA-1614524 (CBS) and R-HSA-1614583 (CTH).
  - source_id: file:human/MTHFR/MTHFR-ai-review.yaml
    title: MTHFR gene review (human)
    statement: >-
      The MTHFR step grounding (UniProtKB:P42898, GO:0004489 methylenetetrahydrofolate
      reductase [NAD(P)H] activity) matches the completed human MTHFR review.
  - source_id: file:human/MTR/MTR-ai-review.yaml
    title: MTR gene review (human)
    statement: >-
      The methionine synthase step (UniProtKB:Q99707, GO:0008705 methionine
      synthase activity, cobalamin binding) matches the completed human MTR review.
  - source_id: file:human/MTRR/MTRR-ai-review.yaml
    title: MTRR gene review (human)
    statement: >-
      The methionine-synthase-reductase reactivation step (UniProtKB:Q9UBK8,
      GO:0030586) matches the completed human MTRR review.
  - source_id: file:human/MMACHC/MMACHC-ai-review.yaml
    title: MMACHC gene review (human)
    statement: >-
      The upstream cobalamin-processing step (UniProtKB:Q9Y4U1, GO:0033787) matches
      the completed human MMACHC review (cblC; supplies both MeCbl and AdoCbl arms).
  - source_id: file:human/CBS/CBS-ai-review.yaml
    title: CBS gene review (human)
    statement: >-
      The transsulfuration entry step (UniProtKB:P35520, GO:0004122 cystathionine
      beta-synthase activity) matches the completed human CBS review.
  - source_id: file:human/CTH/CTH-ai-review.yaml
    title: CTH gene review (human)
    statement: >-
      The transsulfuration cysteine-forming step (UniProtKB:P32929, GO:0004123
      cystathionine gamma-lyase activity) matches the completed human CTH review.
module:
  id: homocysteine_metabolism
  label: Homocysteine metabolism (remethylation + transsulfuration)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: homocysteine metabolic process
      term:
        id: GO:0050667
        label: homocysteine metabolic process
      description: >-
        Disposal of L-homocysteine by remethylation to methionine or by
        transsulfuration to cysteine.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Both the remethylation and transsulfuration enzymes are cytosolic.
  parts:
    - order: 1
      role: remethylation — supply of the folate methyl donor
      node:
        id: mthfr_step
        label: 5,10-methylenetetrahydrofolate to 5-methyltetrahydrofolate
        module_type: REACTION
        annotons:
          - id: mthfr_activity
            label: "MTHFR: methylenetetrahydrofolate reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Methylenetetrahydrofolate reductase family (MTHFR)
                term:
                  id: PANTHER:PTHR45754
                  label: METHYLENETETRAHYDROFOLATE REDUCTASE
                representative_members:
                  - preferred_term: MTHFR (human)
                    term:
                      id: UniProtKB:P42898
                      label: Methylenetetrahydrofolate reductase
            function:
              preferred_term: methylenetetrahydrofolate reductase [NAD(P)H] activity
              term:
                id: GO:0004489
                label: methylenetetrahydrofolate reductase [NAD(P)H] activity
              substrates:
                - preferred_term: 5,10-methylenetetrahydrofolate
                - preferred_term: NAD(P)H
              products:
                - preferred_term: 5-methyltetrahydrofolate
              evidence:
                - source_id: EC:1.5.1.20
                  statement: methylenetetrahydrofolate reductase [NAD(P)H]
                - source_id: Reactome:R-HSA-200676
                  statement: "MTHFR dimer reduces 5,10-methylene-THFPG to 5-methyl-THFPG (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              FAD-dependent, SAM-inhibited committed step that commits folate
              one-carbon units to methionine remethylation by making 5-methyl-THF.
              Deficiency (incl. the common c.677C>T thermolabile variant) causes
              homocystinuria with low methionine.
    - order: 2
      role: remethylation — cobalamin-dependent methyl transfer to homocysteine
      node:
        id: mtr_step
        label: L-homocysteine + 5-methyl-THF to L-methionine + THF
        module_type: REACTION
        annotons:
          - id: mtr_activity
            label: "MTR: methionine synthase (methylcobalamin-dependent)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cobalamin-dependent methionine synthase family (MTR)
                term:
                  id: PANTHER:PTHR45833
                  label: METHIONINE SYNTHASE
                representative_members:
                  - preferred_term: MTR (human)
                    term:
                      id: UniProtKB:Q99707
                      label: Methionine synthase
            function:
              preferred_term: methionine synthase activity
              term:
                id: GO:0008705
                label: methionine synthase activity
              substrates:
                - preferred_term: L-homocysteine
                - preferred_term: 5-methyltetrahydrofolate
                - preferred_term: methylcobalamin (enzyme cofactor)
              products:
                - preferred_term: L-methionine
                - preferred_term: tetrahydrofolate
              evidence:
                - source_id: EC:2.1.1.13
                  statement: methionine synthase (5-methyltetrahydrofolate-homocysteine methyltransferase)
                - source_id: Reactome:R-HSA-3149539
                  statement: "MTR transfers CH3 group from 5-methyl-THF to cob(I)alamin (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Methylcobalamin-dependent transfer of the 5-methyl-THF methyl group
              to homocysteine, regenerating methionine and THF and linking the
              folate and methionine cycles. Deficiency causes cblG homocystinuria.
    - order: 3
      role: remethylation — cobalamin cofactor maintenance / supply (supports MTR)
      node:
        id: cobalamin_support
        label: reactivation (MTRR) and processing (MMACHC) of MTR's cobalamin cofactor
        module_type: REGULATORY_STEP
        annotons:
          - id: mtrr_activity
            label: "MTRR: methionine synthase reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Diflavin oxidoreductase (NOS/CPR-related) family (MTRR)
                term:
                  id: PANTHER:PTHR19384
                  label: NITRIC OXIDE SYNTHASE-RELATED
                representative_members:
                  - preferred_term: MTRR (human)
                    term:
                      id: UniProtKB:Q9UBK8
                      label: Methionine synthase reductase
            function:
              preferred_term: "[methionine synthase] reductase (NADPH) activity"
              term:
                id: GO:0030586
                label: "[methionine synthase] reductase (NADPH) activity"
              substrates:
                - preferred_term: cob(II)alamin-methionine synthase (oxidised)
                - preferred_term: NADPH
              products:
                - preferred_term: methylcobalamin-methionine synthase (reactivated)
              evidence:
                - source_id: EC:1.16.1.8
                  statement: "[methionine synthase] reductase (NADPH); FAD/FMN diflavin enzyme"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              NADPH-dependent diflavin (FAD+FMN) reductase that reductively
              reactivates the periodically-oxidised methylcobalamin of MTR.
              Deficiency causes cblE homocystinuria.
          - id: mmachc_activity
            label: "MMACHC/cblC: cobalamin-processing enzyme"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: cblC cobalamin-processing family (MMACHC)
                term:
                  id: PANTHER:PTHR31457
                  label: METHYLMALONIC ACIDURIA AND HOMOCYSTINURIA TYPE C PROTEIN
                representative_members:
                  - preferred_term: MMACHC (human)
                    term:
                      id: UniProtKB:Q9Y4U1
                      label: Cyanocobalamin reductase / alkylcobalamin dealkylase
            function:
              preferred_term: cyanocobalamin reductase (cyanide-eliminating) (NADP+) activity
              term:
                id: GO:0033787
                label: cyanocobalamin reductase (cyanide-eliminating) (NADP+) activity
              substrates:
                - preferred_term: cyanocobalamin / alkylcobalamins
                - preferred_term: glutathione (for dealkylation)
              products:
                - preferred_term: cob(II)alamin (common precursor)
              evidence:
                - source_id: EC:1.16.1.6
                  statement: cyanocobalamin reductase / alkylcobalamin dealkylase (base-off, GSH-dependent)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Upstream cobalamin-processing enzyme that decyanates/dealkylates
              incoming cobalamin to the cob(II)alamin precursor feeding BOTH the
              MeCbl (MTR) and AdoCbl (MMUT) arms. Deficiency causes cblC disease
              (combined methylmalonic aciduria and homocystinuria).
    - order: 4
      role: transsulfuration — condensation with serine (branch to cysteine)
      node:
        id: cbs_step
        label: L-homocysteine + L-serine to L-cystathionine
        module_type: REACTION
        annotons:
          - id: cbs_activity
            label: "CBS: cystathionine beta-synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cystathionine beta-synthase family (CBS)
                term:
                  id: PANTHER:PTHR10314
                  label: CYSTATHIONINE BETA-SYNTHASE
                representative_members:
                  - preferred_term: CBS (human)
                    term:
                      id: UniProtKB:P35520
                      label: Cystathionine beta-synthase
            function:
              preferred_term: cystathionine beta-synthase activity
              term:
                id: GO:0004122
                label: cystathionine beta-synthase activity
              substrates:
                - preferred_term: L-homocysteine
                - preferred_term: L-serine
              products:
                - preferred_term: L-cystathionine
                - preferred_term: water
              evidence:
                - source_id: EC:4.2.1.22
                  statement: cystathionine beta-synthase (PLP- and heme-dependent, SAM-activated)
                - source_id: Reactome:R-HSA-1614524
                  statement: "PXLP-CBS tetramers condenses HCYS and L-Ser to form L-Cystathionine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Committed, SAM-activated (allosterically) first step of
              transsulfuration; PLP- and heme-dependent. Deficiency causes classic
              homocystinuria (with hypermethioninemia). Also a source of H2S.
    - order: 5
      role: transsulfuration — cleavage to cysteine
      node:
        id: cth_step
        label: L-cystathionine to L-cysteine + 2-oxobutanoate + NH3
        module_type: REACTION
        annotons:
          - id: cth_activity
            label: "CTH/CSE: cystathionine gamma-lyase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Transsulfuration enzyme (cystathionine gamma-lyase) family (CTH)
                term:
                  id: PANTHER:PTHR11808
                  label: TRANS-SULFURATION ENZYME FAMILY MEMBER
                representative_members:
                  - preferred_term: CTH (human)
                    term:
                      id: UniProtKB:P32929
                      label: Cystathionine gamma-lyase
            function:
              preferred_term: cystathionine gamma-lyase activity
              term:
                id: GO:0004123
                label: cystathionine gamma-lyase activity
              substrates:
                - preferred_term: L-cystathionine
                - preferred_term: water
              products:
                - preferred_term: L-cysteine
                - preferred_term: 2-oxobutanoate
                - preferred_term: ammonia
              evidence:
                - source_id: EC:4.4.1.1
                  statement: cystathionine gamma-lyase (PLP-dependent)
                - source_id: Reactome:R-HSA-1614583
                  statement: "PXLP-K212-CTH cleaves L-Cystathionine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              PLP-dependent cleavage of cystathionine to cysteine, completing
              transsulfuration; also a major enzymatic source of the gasotransmitter
              hydrogen sulfide. Deficiency causes (largely benign) cystathioninuria.
  connections:
    - source: mthfr_step
      target: mtr_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        5-methyltetrahydrofolate made by MTHFR is the methyl donor consumed by
        methionine synthase (MTR) in remethylation.
    - source: cobalamin_support
      target: mtr_step
      connection_type: POSITIVELY_REGULATES
      description: >-
        MTRR reactivates and MMACHC supplies MTR's methylcobalamin cofactor;
        without this support the remethylation step fails (cblE/cblC/cblG).
    - source: cbs_step
      target: cth_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Cystathionine made by CBS is cleaved to cysteine by CTH, completing the
        transsulfuration branch.
  notes: >-
    The two fates of homocysteine grounded to the human enzymes MTHFR
    (UniProtKB:P42898, GO:0004489, EC 1.5.1.20), MTR (Q99707, GO:0008705, EC
    2.1.1.13), MTRR (Q9UBK8, GO:0030586, EC 1.16.1.8), MMACHC (Q9Y4U1, GO:0033787,
    EC 1.16.1.6) on the remethylation side, and CBS (P35520, GO:0004122, EC
    4.2.1.22) and CTH (P32929, GO:0004123, EC 4.4.1.1) on the transsulfuration
    side. GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector (generic over paralogs and
    orthologs) plus a concrete human representative member. This concrete
    homocysteine-disposal module complements the more abstract methionine
    (S-adenosylmethionine) cycle module (MODULE:methionine_cycle); the MMACHC
    cobalamin-processing step also feeds the adenosylcobalamin arm used by
    methylmalonyl-CoA mutase (see the propionyl-CoA catabolism module).
