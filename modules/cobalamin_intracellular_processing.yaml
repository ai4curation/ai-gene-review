id: MODULE:cobalamin_intracellular_processing
title: Cobalamin (B12) intracellular processing and trafficking; ABCD4/LMBRD1/MMACHC/MMADHC
description: >-
  Once the transcobalamin-cobalamin complex has been endocytosed via CD320 and degraded in the
  lysosome, the freed cobalamin (vitamin B12) must be exported to the cytosol, stripped of its
  upper axial ligand, and routed to one of its two coenzyme forms. The lysosomal export step is
  carried out by a two-protein system: the ABC transporter ABCD4 (cblJ), which provides the
  ATP-dependent transmembrane cobalamin-transport activity, together with the lysosomal membrane
  protein LMBRD1 (cblF), which is required to target ABCD4 to the lysosome and acts as its escort
  subunit. In the cytosol the cblC protein MMACHC processes the cobalamin — reductive decyanation
  of cyanocobalamin and dealkylation of alkylcobalamins remove the beta-axial ligand to give
  cob(II)alamin. The cblD protein MMADHC then binds MMACHC-cob(II)alamin and acts as the
  branch-point/trafficking adaptor that directs cobalamin either to the mitochondrion for
  adenosylcobalamin synthesis (feeding methylmalonyl-CoA mutase, MMUT) or to the cytosolic
  methylcobalamin route (feeding methionine synthase, MTR). Defects in each step cause combined
  or isolated methylmalonic aciduria and homocystinuria: cblJ (ABCD4), cblF (LMBRD1), cblC
  (MMACHC) and cblD (MMADHC).
status: DRAFT
evidence:
  - source_id: GO:0009235
    title: cobalamin metabolic process
    statement: >-
      The module is grounded in cobalamin metabolic process (GO:0009235); it covers lysosomal
      cobalamin export and the cytosolic decyanation/dealkylation and branch-point trafficking that
      prepare B12 for its two coenzyme forms.
  - source_id: Reactome:R-HSA-9759218
    title: Cobalamin (Cbl) metabolism
    statement: >-
      Step order and intermediates follow the human Reactome "Cobalamin (Cbl) metabolism" pathway
      (reactions R-HSA-5223313 lysosomal export, R-HSA-3149494/3149563 MMACHC/MMADHC processing).
  - source_id: file:human/ABCD4/ABCD4-ai-review.yaml
    title: ABCD4 gene review (human)
    statement: >-
      The lysosomal ABC cobalamin-transporter step (UniProtKB:O14678, GO:0015420) matches the
      completed human ABCD4 review.
  - source_id: file:human/LMBRD1/LMBRD1-ai-review.yaml
    title: LMBRD1 gene review (human)
    statement: >-
      The lysosomal cobalamin-export escort step (UniProtKB:Q9NUN5, GO:0015889 / lysosomal membrane)
      matches the completed human LMBRD1 review.
  - source_id: file:human/MMACHC/MMACHC-ai-review.yaml
    title: MMACHC gene review (human)
    statement: >-
      The cytosolic decyanation/dealkylation step (UniProtKB:Q9Y4U1, GO:0033787) matches the
      previously completed human MMACHC review (already on main).
  - source_id: file:human/MMADHC/MMADHC-ai-review.yaml
    title: MMADHC gene review (human)
    statement: >-
      The cblD branch-point trafficking step (UniProtKB:Q9H3L0, GO:0140104) matches the completed
      human MMADHC review.
module:
  id: cobalamin_intracellular_processing
  label: Cobalamin (B12) intracellular processing and trafficking
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: cobalamin metabolic process
      term:
        id: GO:0009235
        label: cobalamin metabolic process
      description: >-
        Lysosomal export, cytosolic decyanation/dealkylation, and branch-point routing of
        cobalamin toward its adenosyl- and methyl-cobalamin coenzyme forms.
  context:
    cellular_components:
      - preferred_term: lysosomal membrane
        term:
          id: GO:0005765
          label: lysosomal membrane
        description: The ABCD4/LMBRD1 export system acts at the lysosomal membrane.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: MMACHC processing and MMADHC branch-point trafficking are cytosolic.
  parts:
    - order: 1
      role: lysosomal cobalamin export (ABC transporter + escort)
      node:
        id: lysosomal_export_step
        label: cobalamin export from lysosomal lumen to cytosol (ABCD4:LMBRD1)
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: abcd4_activity
            label: "ABCD4: lysosomal ABC cobalamin transporter (cblJ)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ABC transporter subfamily D (ABCD4)
                term:
                  id: PANTHER:PTHR11384
                  label: ATP-BINDING CASSETTE SUB-FAMILY D
                representative_members:
                  - preferred_term: ABCD4 (human)
                    term:
                      id: UniProtKB:O14678
                      label: ATP-binding cassette sub-family D member 4
            function:
              preferred_term: ABC-type vitamin B12 transporter activity
              term:
                id: GO:0015420
                label: ABC-type vitamin B12 transporter activity
              substrates:
                - preferred_term: cobalamin (lysosomal lumen)
                - preferred_term: ATP
              products:
                - preferred_term: cobalamin (cytosol)
                - preferred_term: ADP + phosphate
              evidence:
                - source_id: Reactome:R-HSA-5223313
                  statement: "ABCD4:LMBRD1 transports RCbl from lysosomal lumen to cytosol (human Reactome reaction)"
                - source_id: file:human/ABCD4/ABCD4-ai-review.yaml
                  statement: ATP-dependent lysosomal cobalamin transporter (in-vitro liposome transport, Km ~426 uM, Walker-A K427A abolishes activity); requires LMBRD1 for lysosomal targeting; deficiency = cblJ MMA + homocystinuria
            locations:
              - preferred_term: lysosomal membrane
                term:
                  id: GO:0005765
                  label: lysosomal membrane
            role_description: >-
              ATP-driven transmembrane cobalamin transporter releasing B12 from the lysosome to
              the cytosol. Deficiency = cblJ-type MMA + homocystinuria.
          - id: lmbrd1_activity
            label: "LMBRD1: lysosomal cobalamin-export escort (cblF)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: LMBR1-domain family (LMBRD1)
                term:
                  id: PANTHER:PTHR16130
                  label: LMBR1 DOMAIN-CONTAINING PROTEIN
                representative_members:
                  - preferred_term: LMBRD1 (human)
                    term:
                      id: UniProtKB:Q9NUN5
                      label: Lysosomal cobalamin transport escort protein LMBRD1
            processes:
              - preferred_term: cobalamin transport
                term:
                  id: GO:0015889
                  label: cobalamin transport
              - preferred_term: protein localization to lysosome
                term:
                  id: GO:0061462
                  label: protein localization to lysosome
            locations:
              - preferred_term: lysosomal membrane
                term:
                  id: GO:0005765
                  label: lysosomal membrane
            evidence:
              - source_id: Reactome:R-HSA-5223313
                statement: "ABCD4:LMBRD1 transports RCbl from lysosomal lumen to cytosol (human Reactome reaction)"
              - source_id: file:human/LMBRD1/LMBRD1-ai-review.yaml
                statement: lysosomal membrane escort that targets ABCD4 to the lysosome; has no intrinsic transport/ATPase activity itself (that is ABCD4); deficiency = cblF MMA + homocystinuria
            role_description: >-
              Non-catalytic escort/targeting subunit that recruits ABCD4 to the lysosomal membrane;
              the LMBRD1:ABCD4 complex effects cobalamin export. (Its own transporter MF annotations
              are over-annotations — captured here as a BP/escort role.)
    - order: 2
      role: cytosolic decyanation/dealkylation (removes the beta-axial ligand)
      node:
        id: mmachc_step
        label: cobalamin decyanation/dealkylation to cob(II)alamin (MMACHC)
        module_type: REACTION
        annotons:
          - id: mmachc_activity
            label: "MMACHC: cyanocobalamin reductase / cobalamin dealkylase (cblC)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MMACHC / CblC family
                term:
                  id: PANTHER:PTHR31457
                  label: CYANOCOBALAMIN REDUCTASE / ALKYLCOBALAMIN DEALKYLASE (MMACHC)
                representative_members:
                  - preferred_term: MMACHC (human)
                    term:
                      id: UniProtKB:Q9Y4U1
                      label: Cyanocobalamin reductase / alkylcobalamin dealkylase
            function:
              preferred_term: cyanocobalamin reductase (cyanide-eliminating) (NADP+) activity
              term:
                id: GO:0033787
                label: cyanocobalamin reductase (cyanide-eliminating) (NADP+) activity
              substrates:
                - preferred_term: cyanocobalamin / alkylcobalamin
                - preferred_term: NADPH
                - preferred_term: glutathione (for dealkylation)
              products:
                - preferred_term: cob(II)alamin
                - preferred_term: cyanide / alkyl-glutathione
              evidence:
                - source_id: Reactome:R-HSA-3149494
                  statement: "MMACHC:cob(II)alamin binds MMADHC (human Reactome reaction)"
                - source_id: file:human/MMACHC/MMACHC-ai-review.yaml
                  statement: cytosolic cblC processing enzyme; reductive decyanation of cyanocobalamin and glutathione-dependent dealkylation of alkylcobalamins remove the beta-axial ligand to give cob(II)alamin; deficiency = cblC (commonest inherited B12 disorder)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Processes incoming cobalamin by removing its upper axial ligand, yielding cob(II)alamin
              for downstream coenzyme synthesis. (Reviewed previously; already on main.)
    - order: 3
      role: branch-point trafficking (AdoCbl vs MeCbl)
      node:
        id: mmadhc_step
        label: cob(II)alamin routed to the AdoCbl or MeCbl branch (MMADHC)
        module_type: REACTION
        annotons:
          - id: mmadhc_activity
            label: "MMADHC: cobalamin branch-point trafficking protein (cblD)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: MMADHC / CblD family
                term:
                  id: PANTHER:PTHR13192
                  label: METHYLMALONIC ACIDURIA AND HOMOCYSTINURIA TYPE D PROTEIN
                representative_members:
                  - preferred_term: MMADHC (human)
                    term:
                      id: UniProtKB:Q9H3L0
                      label: Methylmalonic aciduria and homocystinuria type D protein
            function:
              preferred_term: molecular carrier activity
              term:
                id: GO:0140104
                label: molecular carrier activity
              substrates:
                - preferred_term: MMACHC-cob(II)alamin
              products:
                - preferred_term: cob(II)alamin routed to the mitochondrial (AdoCbl) or cytosolic (MeCbl) branch
              evidence:
                - source_id: Reactome:R-HSA-3149563
                  statement: "MMADHC targets transport of cytosolic cob(II)alamin to mitochondrion (human Reactome reaction)"
                - source_id: file:human/MMADHC/MMADHC-ai-review.yaml
                  statement: cblD branch-point adaptor that binds MMACHC-cob(II)alamin and directs cobalamin to the AdoCbl (mitochondrial MMUT) or MeCbl (cytosolic MTR) branch; not an enzyme; cblD combined or isolated MMA/homocystinuria
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Branch-point/trafficking adaptor downstream of MMACHC; its mutation position determines
              isolated MMA, isolated homocystinuria, or combined disease.
  connections:
    - source: lysosomal_export_step
      target: mmachc_step
      connection_type: PROVIDES_INPUT_FOR
      description: Cobalamin exported to the cytosol by ABCD4:LMBRD1 is processed by MMACHC.
    - source: mmachc_step
      target: mmadhc_step
      connection_type: PROVIDES_INPUT_FOR
      description: MMACHC-bound cob(II)alamin is handed to MMADHC for routing to the two coenzyme branches.
  notes: >-
    Cobalamin intracellular processing/trafficking, grounded to the human proteins ABCD4
    (UniProtKB:O14678, GO:0015420) and LMBRD1 (Q9NUN5, lysosomal export escort; its standalone
    transporter MF is an over-annotation, so it is modelled by its BP/escort role via `processes`),
    MMACHC (Q9Y4U1, GO:0033787; reviewed previously, already on main) and MMADHC (Q9H3L0,
    GO:0140104). GO molecular-function/BP/location terms were taken from the completed human gene
    reviews and verified against the local go.db; Reactome reaction ids/titles were verified against
    the local reactome cache. Each step uses a PANTHER family selector with the human protein as
    representative; the lysosomal export step is a PROTEIN_COMPLEX node (ABCD4 catalytic transporter
    + LMBRD1 escort). Upstream, cobalamin is delivered and endocytosed by the absorption/transport
    module (TCN1/CBLIF/CUBN/AMN/TCN2/CD320). Downstream, MMADHC routes cob(II)alamin to (i) the
    mitochondrial adenosylcobalamin branch — MMAB (cblB) adenosyltransferase with the MMAA (cblA)
    chaperone, supplying methylmalonyl-CoA mutase MMUT (all reviewed in the propionyl-CoA module) —
    or (ii) the cytosolic methylcobalamin branch — methionine synthase MTR (cblG) with its reductase
    MTRR (cblE) (both reviewed). Disorders: cblJ (ABCD4), cblF (LMBRD1), cblC (MMACHC) and cblD
    (MMADHC) cause combined or isolated methylmalonic aciduria and homocystinuria.
