id: MODULE:oxphos_adenine_nucleotide_phosphate_carriers
title: Mitochondrial ADP/ATP and phosphate carriers (ATP synthasome substrate carriers); SLC25A4/A5/A6 + SLC25A3
description: >-
  Oxidative phosphorylation is completed not only by the five respiratory complexes but by the
  inner-membrane carriers that supply ATP synthase (Complex V) with its substrates and export its
  product. Because the inner membrane is impermeable to adenine nucleotides and phosphate, two SLC25
  mitochondrial-carrier activities are essential: the ADP/ATP translocase (adenine nucleotide
  translocator, ANT) and the phosphate carrier (PiC). The ADP/ATP translocase is an
  electrogenic antiporter that imports cytosolic ADP into the matrix in exchange for newly
  synthesised ATP, exporting the ATP made by Complex V; humans express three near-identical isoforms
  with tissue-specific distribution — ANT1/SLC25A4 (heart and skeletal muscle), ANT2/SLC25A5
  (proliferative and glycolytic tissues) and ANT3/SLC25A6 (ubiquitous). The phosphate carrier
  SLC25A3 (PiC) imports inorganic phosphate into the matrix in symport with a proton, providing the
  Pi consumed by ATP synthase. ANT, PiC and ATP synthase physically associate as the "ATP
  synthasome", coupling substrate delivery to ATP synthesis. The ADP/ATP translocase also forms
  part of the mitochondrial permeability transition pore and participates in apoptosis (curated as
  non-core roles). Disorders: ANT1 (SLC25A4) mutations cause autosomal-dominant progressive external
  ophthalmoplegia and mitochondrial myopathy/cardiomyopathy; SLC25A3 defects cause a mitochondrial
  phosphate-carrier deficiency with lactic acidosis and hypertrophic cardiomyopathy.
status: DRAFT
evidence:
  - source_id: GO:0006119
    title: oxidative phosphorylation
    statement: >-
      The module is grounded in oxidative phosphorylation (GO:0006119); these carriers supply the
      ADP and phosphate for, and export the ATP from, ATP synthase.
  - source_id: file:human/ATP5F1A/ATP5F1A-ai-review.yaml
    title: ATP5F1A gene review (human)
    statement: >-
      The carriers feed the F1Fo ATP synthase (Complex V), whose catalytic subunit is reviewed in
      the mitochondrial_complex_v module (UniProtKB:P25705).
  - source_id: file:human/SLC25A4/SLC25A4-ai-review.yaml
    title: SLC25A4 gene review (human)
    statement: The ANT1 ADP/ATP translocase (UniProtKB:P12235, GO:0005471) matches the completed human SLC25A4 review.
  - source_id: file:human/SLC25A5/SLC25A5-ai-review.yaml
    title: SLC25A5 gene review (human)
    statement: The ANT2 ADP/ATP translocase (UniProtKB:P05141, GO:0005471) matches the completed human SLC25A5 review.
  - source_id: file:human/SLC25A6/SLC25A6-ai-review.yaml
    title: SLC25A6 gene review (human)
    statement: The ANT3 ADP/ATP translocase (UniProtKB:P12236, GO:0005471) matches the completed human SLC25A6 review.
  - source_id: file:human/SLC25A3/SLC25A3-ai-review.yaml
    title: SLC25A3 gene review (human)
    statement: The phosphate carrier PiC (UniProtKB:Q00325, GO:0015317) matches the completed human SLC25A3 review.
