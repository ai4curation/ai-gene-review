      description: >-
        The phosphate carrier and the ADP/ATP translocase physically associate with ATP synthase
        (Complex V) as the ATP synthasome: PiC supplies matrix phosphate and ANT supplies matrix ADP,
        jointly providing the two substrates for ATP synthesis (and ANT exports the ATP product).
  notes: >-
    The inner-membrane carriers that complete oxidative phosphorylation (GO:0006119) by supplying ATP
    synthase (Complex V), grounded to the completed human gene reviews: the ADP/ATP translocase
    isoforms SLC25A4/ANT1 (P12235), SLC25A5/ANT2 (P05141) and SLC25A6/ANT3 (P12236) — all GO:0005471
    ATP:ADP antiporter activity — and the phosphate carrier SLC25A3/PiC (Q00325, GO:0015317
    phosphate:proton symporter activity). ANT + PiC + ATP synthase form the "ATP synthasome". All are
    transporters (no catalytic MF). The three ANT isoforms are near-identical paralogues sharing the
    same MF (PANTHER PTHR45635) and differ mainly in tissue expression; SLC25A3 is a distinct carrier
    family (PTHR45671). Non-core roles curated in the gene reviews: ANTs contribute to the
    mitochondrial permeability transition pore and apoptosis (KEEP_AS_NON_CORE). This module
    complements the mitochondrial_complex_v (F1Fo ATP synthase) module — the ATP synthase itself is
    curated there. Note GO:0015114 "phosphate ion transmembrane transporter activity" is obsolete;
    the current specific PiC MF is GO:0015317. Disorders: SLC25A4/ANT1 — adPEO / mitochondrial
    myopathy-cardiomyopathy; SLC25A3 — mitochondrial phosphate-carrier deficiency (lactic acidosis,
    hypertrophic cardiomyopathy).
