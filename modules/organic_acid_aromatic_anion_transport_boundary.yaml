id: MODULE:organic_acid_aromatic_anion_transport_boundary
title: Organic-acid and aromatic-anion transport boundary
description: Boundary module for PSEPK citrate, benzoate, hydroxybutyrate/monocarboxylate, lactate, and unresolved bile-acid/Na+-symporter-family
  transport-bucket genes.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_organic_acid_aromatic_anion_transporters.tsv
  title: PSEPK organic-acid/aromatic-anion transporter batch
  statement: The batch table records seven PSEPK transport-bucket genes assigned to citrate, benzoate, hydroxybutyrate, bile-acid-family,
    and lactate transporter context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_partition.tsv
  title: PSEPK transport/membrane/efflux partition
  statement: The parent transport partition separates this organic-acid/aromatic-anion panel from ABC, MFS/DMT, ion/metal,
    amino-acid/amine, carbohydrate/nucleoside, redox, and low-information membrane buckets.
notes: 'First-pass interpretation: keep CitN citrate, BenE benzoate, and LldP lactate calls; broaden BhbP away from unsupported
  gluconate specificity to monocarboxylate transport; keep PP_3247 substrate-unresolved.'
