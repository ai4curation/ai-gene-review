id: MODULE:galactose_leloir_pathway
title: Galactose catabolism (Leloir pathway)
description: >-
  The Leloir pathway, the main route by which dietary D-galactose (chiefly from
  the milk sugar lactose) is converted to glucose-1-phosphate and thereby fed
  into glycolysis and general carbohydrate metabolism. It is a short cytosolic
  pathway of four enzymes. Galactose mutarotase (GALM/aldose 1-epimerase) first
  equilibrates the β- and α-anomers of D-galactose, supplying the α-anomer;
  galactokinase (GALK1) then phosphorylates α-D-galactose with ATP to
  α-D-galactose 1-phosphate; galactose-1-phosphate uridylyltransferase (GALT)
  transfers a UMP group from UDP-glucose to galactose-1-phosphate, producing
  glucose-1-phosphate (which enters glycolysis/glycogen metabolism via
  phosphoglucomutase) and UDP-galactose; and UDP-galactose-4-epimerase (GALE)
  interconverts UDP-galactose and UDP-glucose, regenerating the UDP-glucose that
  GALT consumes and balancing the UDP-galactose pool used for glycoconjugate
  synthesis. Because GALT both consumes UDP-glucose and (via GALE) regenerates
  it, the pathway is catalytic in UDP-sugars: only a trace pool is needed to turn
  over large amounts of galactose. Each enzyme has a corresponding inherited
  galactosemia: GALT deficiency causes classic galactosemia (type I, severe
  neonatal toxicity); GALK1 deficiency causes type II (predominantly cataracts,
  from galactitol); GALE deficiency causes type III (epimerase deficiency,
  peripheral to generalized); and GALM deficiency causes type IV. The shared
  toxic intermediates are galactose-1-phosphate and, via aldose reductase,
  galactitol.
status: DRAFT
evidence:
  - source_id: GO:0006012
    title: galactose metabolic process
    statement: >-
      The module is grounded in the GO galactose metabolic/catabolic process
      terms (GO:0006012, GO:0019388, and the Leloir-specific GO:0033499); every
      step is annotated within them.
  - source_id: Reactome:R-HSA-70370
    title: Galactose catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Galactose catabolism" pathway (R-HSA-70370) and its member reactions
      (R-HSA-9931853, R-HSA-70355, R-HSA-70361, R-HSA-70369).
  - source_id: file:human/GALM/GALM-ai-review.yaml
    title: GALM gene review (human)
    statement: >-
      The GALM step grounding (UniProtKB:Q96C23, GO:0004034 aldose 1-epimerase
      activity) matches the completed human GALM review.
  - source_id: file:human/GALK1/GALK1-ai-review.yaml
    title: GALK1 gene review (human)
    statement: >-
      The GALK1 step grounding (UniProtKB:P51570, GO:0004335 galactokinase
      activity, EC 2.7.1.6) matches the completed human GALK1 review.
  - source_id: file:human/GALT/GALT-ai-review.yaml
    title: GALT gene review (human)
    statement: >-
      The GALT step grounding (UniProtKB:P07902, GO:0008108
      UDP-glucose:hexose-1-phosphate uridylyltransferase activity, EC 2.7.7.12)
      matches the completed human GALT review.
  - source_id: file:human/GALE/GALE-ai-review.yaml
    title: GALE gene review (human)
    statement: >-
      The GALE step grounding (UniProtKB:Q14376, GO:0003978 UDP-glucose
      4-epimerase activity, EC 5.1.3.2) matches the completed human GALE review.
module:
  id: galactose_leloir_pathway
  label: Galactose catabolism (Leloir pathway)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: galactose catabolic process via UDP-galactose, Leloir pathway
      term:
        id: GO:0033499
        label: galactose catabolic process via UDP-galactose, Leloir pathway
      description: >-
        Four-enzyme cytosolic conversion of D-galactose to glucose-1-phosphate
        via the UDP-sugar (Leloir) route.
    - preferred_term: galactose metabolic process
      term:
        id: GO:0006012
        label: galactose metabolic process
      description: The broader galactose-handling process the module falls under.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All four Leloir enzymes are cytosolic.
  parts:
    - order: 1
      role: anomer preparation (mutarotation)
      node:
        id: galm_step
        label: beta-D-galactose to alpha-D-galactose
        module_type: REACTION
        annotons:
          - id: galm_activity
            label: "GALM: galactose mutarotase / aldose 1-epimerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Aldose 1-epimerase (mutarotase) family (GALM)
                term:
                  id: PANTHER:PTHR10091
                  label: ALDOSE-1-EPIMERASE
                representative_members:
                  - preferred_term: GALM (human)
                    term:
                      id: UniProtKB:Q96C23
                      label: Galactose mutarotase
            function:
              preferred_term: aldose 1-epimerase activity
              term:
                id: GO:0004034
                label: aldose 1-epimerase activity
              substrates:
                - preferred_term: beta-D-galactose
              products:
                - preferred_term: alpha-D-galactose
              evidence:
                - source_id: EC:5.1.3.3
                  statement: aldose 1-epimerase (mutarotase)
                - source_id: Reactome:R-HSA-9931853
                  statement: "GALM converts beta-D-GAL to alpha-D-GAL (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Accelerates the anomeric equilibration of D-galactose to supply the
              alpha-anomer required by galactokinase (and likewise mutarotates
              glucose). Deficiency causes galactosemia type IV.
    - order: 2
      role: phosphorylation (committed step)
      node:
        id: galk1_step
        label: alpha-D-galactose + ATP to alpha-D-galactose 1-phosphate + ADP
        module_type: REACTION
        annotons:
          - id: galk1_activity
            label: "GALK1: galactokinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Galactokinase (GHMP kinase) family (GALK1)
                term:
                  id: PANTHER:PTHR10457
                  label: MEVALONATE KINASE/GALACTOKINASE
                representative_members:
                  - preferred_term: GALK1 (human)
                    term:
                      id: UniProtKB:P51570
                      label: Galactokinase
            function:
              preferred_term: galactokinase activity
              term:
                id: GO:0004335
                label: galactokinase activity
              substrates:
                - preferred_term: alpha-D-galactose
                - preferred_term: ATP
              products:
                - preferred_term: alpha-D-galactose 1-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.6
                  statement: galactokinase
                - source_id: Reactome:R-HSA-70355
                  statement: "GALK1 phosphorylates Gal to Gal1P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              First committed step: ATP-dependent phosphorylation of galactose to
              galactose-1-phosphate (GHMP-kinase superfamily). Deficiency causes
              galactosemia type II, dominated by early cataracts from galactitol
              accumulation.
    - order: 3
      role: uridylyl transfer (central step)
      node:
        id: galt_step
        label: alpha-D-galactose 1-phosphate + UDP-glucose to glucose-1-phosphate + UDP-galactose
        module_type: REACTION
        annotons:
          - id: galt_activity
            label: "GALT: galactose-1-phosphate uridylyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Galactose-1-phosphate uridylyltransferase family (GALT)
                term:
                  id: PANTHER:PTHR11943
                  label: GALACTOSE-1-PHOSPHATE URIDYLYLTRANSFERASE
                representative_members:
                  - preferred_term: GALT (human)
                    term:
                      id: UniProtKB:P07902
                      label: Galactose-1-phosphate uridylyltransferase
            function:
              preferred_term: UDP-glucose:hexose-1-phosphate uridylyltransferase activity
              term:
                id: GO:0008108
                label: UDP-glucose:hexose-1-phosphate uridylyltransferase activity
              substrates:
                - preferred_term: alpha-D-galactose 1-phosphate
                - preferred_term: UDP-glucose
              products:
                - preferred_term: glucose-1-phosphate
                - preferred_term: UDP-galactose
              evidence:
                - source_id: EC:2.7.7.12
                  statement: UDP-glucose--hexose-1-phosphate uridylyltransferase
                - source_id: Reactome:R-HSA-70361
                  statement: "GALT transfers UMP from UDP-Glc to Gal1P to form UDP-Gal (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Central double-displacement step (covalent UMP-His enzyme
              intermediate; HIT superfamily): converts galactose-1-phosphate to
              glucose-1-phosphate (which enters glycolysis/glycogen metabolism via
              phosphoglucomutase) while regenerating UDP-galactose. Deficiency
              causes classic galactosemia (type I), the most severe form.
    - order: 4
      role: UDP-sugar recycling (regenerates UDP-glucose for GALT)
      node:
        id: gale_step
        label: UDP-galactose to UDP-glucose (reversible)
        module_type: REACTION
        annotons:
          - id: gale_activity
            label: "GALE: UDP-galactose-4-epimerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UDP-glucose 4-epimerase family (GALE)
                term:
                  id: PANTHER:PTHR43725
                  label: UDP-GLUCOSE 4-EPIMERASE
                representative_members:
                  - preferred_term: GALE (human)
                    term:
                      id: UniProtKB:Q14376
                      label: UDP-glucose 4-epimerase
            function:
              preferred_term: UDP-glucose 4-epimerase activity
              term:
                id: GO:0003978
                label: UDP-glucose 4-epimerase activity
              substrates:
                - preferred_term: UDP-galactose
                - preferred_term: NAD+ (tightly bound cofactor)
              products:
                - preferred_term: UDP-glucose
              evidence:
                - source_id: EC:5.1.3.2
                  statement: UDP-glucose 4-epimerase
                - source_id: Reactome:R-HSA-70369
                  statement: "GALE:NAD+ dimer reversibly epimerises UDP-Gal to UDP-Glc (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              NAD+-dependent epimerization that regenerates the UDP-glucose
              consumed by GALT (making the pathway catalytic in UDP-sugars) and
              balances the UDP-galactose pool used for glycoconjugate synthesis.
              The human enzyme is bifunctional, also epimerizing UDP-GlcNAc /
              UDP-GalNAc. Deficiency causes galactosemia type III.
  connections:
    - source: galm_step
      target: galk1_step
      connection_type: PROVIDES_INPUT_FOR
      description: alpha-D-galactose from GALM is the substrate phosphorylated by GALK1.
    - source: galk1_step
      target: galt_step
      connection_type: PROVIDES_INPUT_FOR
      description: alpha-D-galactose 1-phosphate from GALK1 is the substrate of GALT.
    - source: galt_step
      target: gale_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        UDP-galactose produced by GALT is epimerised by GALE to UDP-glucose.
    - source: gale_step
      target: galt_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        UDP-glucose regenerated by GALE is the co-substrate GALT requires, closing
        the UDP-sugar recycling loop that makes the pathway catalytic in UDP-glucose.
  notes: >-
    Four-enzyme cytosolic Leloir pathway grounded to the human enzymes GALM
    (UniProtKB:Q96C23, GO:0004034, EC 5.1.3.3), GALK1 (P51570, GO:0004335, EC
    2.7.1.6), GALT (P07902, GO:0008108, EC 2.7.7.12) and GALE (Q14376, GO:0003978,
    EC 5.1.3.2). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector (generic over paralogs and
    orthologs) plus a concrete human representative member; these enzymes are
    essentially single-copy in humans. Downstream, glucose-1-phosphate enters
    glycolysis/glycogen metabolism (via phosphoglucomutase, PGM1) and
    UDP-galactose feeds glycoconjugate (glycoprotein/glycolipid) synthesis; these
    fates and the toxic galactose-1-phosphate / galactitol intermediates of
    galactosemia are noted in the step role descriptions but are out of scope for
    this catabolic module.
