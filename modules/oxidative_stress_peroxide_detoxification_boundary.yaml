              term:
                id: GO:0004601
                label: peroxidase activity
            processes:
              - preferred_term: cellular oxidant detoxification
                term:
                  id: GO:0098869
                  label: cellular oxidant detoxification
            role_description: Conservative first-pass OsmC/Ohr-family peroxide-detoxification candidate.
          - id: ohr_organic_hydroperoxide_resistance
            label: "ohr: organic hydroperoxide resistance protein"
