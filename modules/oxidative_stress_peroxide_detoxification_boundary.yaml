        id: osmc_ohr_family_peroxidases
        label: OsmC/Ohr-family peroxidase context
        module_type: MOLECULAR_FUNCTION
        description: >-
          osmC and ohr encode OsmC/Ohr-family stress or organic hydroperoxide
          resistance proteins. The first-pass reviews keep these as conservative
          peroxide/hydroperoxide detoxification enzymes without resolving donor
          partner, substrate preference, or localization.
        annotons:
          - id: osmC_osmc_ohr_peroxidase
            label: "osmC: OsmC/Ohr-family stress-induced peroxidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: osmC
            function:
