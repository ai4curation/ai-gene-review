id: MODULE:oxidative_stress_peroxide_detoxification_boundary
title: Oxidative stress peroxide detoxification boundary
description: >-
  Boundary module for Pseudomonas putida KT2440 peroxide and organic-hydroperoxide
  detoxification enzymes from the stress/detoxification functional bucket. The
  membership combines OsmC/Ohr-family proteins, peroxiredoxin and thioredoxin
  peroxidase proteins, cytochrome/DyP peroxidases, and a non-heme chloroperoxidase.
  It is curated as bacterial cellular oxidant detoxification, not as peroxisome
  organelle biology or a single linear metabolic pathway.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_peroxide_peroxiredoxin_detoxification.tsv
    title: PSEPK peroxide/peroxiredoxin stress-detoxification batch table
    statement: >-
      The batch table records ten PSEPK stress/detoxification genes assigned to the
      peroxide/peroxiredoxin split: osmC, PP_0235, tsaA, PP_1235, ohr, ahpC,
      PP_2943, PP_3248, tpx, and cpo.
  - source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_partition.tsv
    title: PSEPK stress/detoxification functional-bucket partition
    statement: >-
      The stress/detoxification umbrella was partitioned into peroxide/peroxiredoxin,
      glutathione/thiol detoxification, metal resistance, universal-stress-protein,
      cold/heat-shock, ThiJ/DJ-1/PfpI, and miscellaneous stress-regulatory splits.
  - source_id: file:PSEPK/ahpC/ahpC-ai-review.yaml
    title: Curated ahpC review
    statement: >-
      The ahpC review accepts peroxiredoxin activity and cellular oxidant
      detoxification while treating donor-specific NADH dependence as AhpCF-system
      context rather than a single-subunit molecular function.
module:
  id: oxidative_stress_peroxide_detoxification_boundary
  label: Oxidative stress peroxide detoxification boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: cellular oxidant detoxification
      term:
        id: GO:0098869
        label: cellular oxidant detoxification
      description: Direct detoxification process for peroxide and hydroperoxide-reducing enzymes.
    - preferred_term: peroxidase activity
      term:
        id: GO:0004601
        label: peroxidase activity
      description: Broad catalytic class for peroxide-reducing proteins.
    - preferred_term: peroxiredoxin activity
      term:
        id: GO:0051920
        label: peroxiredoxin activity
      description: Family-resolved peroxidase activity for Prx-family proteins.
    - preferred_term: thioredoxin-dependent peroxiredoxin activity
      term:
        id: GO:0140824
        label: thioredoxin-dependent peroxiredoxin activity
      description: Specific peroxiredoxin activity for Bcp/PrxQ and Tpx-family enzymes.
    - preferred_term: cytochrome-c peroxidase activity
      term:
        id: GO:0004130
        label: cytochrome-c peroxidase activity
      description: Heme cytochrome-c-linked peroxide reduction.
    - preferred_term: chloride peroxidase activity
      term:
        id: GO:0016691
        label: chloride peroxidase activity
      description: Non-heme chloroperoxidase catalytic function for cpo.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble peroxiredoxin-family enzymes are treated as bacterial cytoplasmic proteins where GOA supports localization.
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
        description: PP_2943 is curated as periplasmic cytochrome c551 peroxidase context.
  parts:
    - order: 1
      role: OsmC/Ohr-family hydroperoxide-detoxification proteins
