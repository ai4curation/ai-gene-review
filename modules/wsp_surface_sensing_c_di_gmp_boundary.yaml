id: MODULE:wsp_surface_sensing_c_di_gmp_boundary
title: Wsp-like surface sensing and c-di-GMP boundary
description: Boundary module for the PP_1488-PP_1494 Wsp-like surface-sensing cluster selected from KEGG
  ppu02025 biofilm formation in Pseudomonas putida KT2440. The module links an MCP-like transducer, CheW-like
  adaptors, WspC/CheR1 methyltransferase context, a CheA-family kinase, CheB3 adaptation chemistry, and
  a GGDEF diguanylate cyclase output. The first pass treats this as a biofilm/surface-sensing boundary
  rather than the canonical flagellar chemotaxis core.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
  title: PSEPK ppu02025 biofilm partition table
  statement: The partition table selects PP_1488, PP_1489, PP_1491, PP_1492, cheB3, and PP_1494 as the
    Wsp-like chemotaxis/c-di-GMP cluster.
- source_id: file:PSEPK/wspC/wspC-ai-review.yaml
  title: Curated wspC review
  statement: The wspC review places CheR1/WspC in a biofilm-control chemosensory route.
- source_id: file:PSEPK/PP_1488/PP_1488-ai-review.yaml
  title: Curated PP_1488 review
  statement: The PP_1488 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
- source_id: file:PSEPK/PP_1489/PP_1489-ai-review.yaml
  title: Curated PP_1489 review
  statement: The PP_1489 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
- source_id: file:PSEPK/PP_1491/PP_1491-ai-review.yaml
  title: Curated PP_1491 review
  statement: The PP_1491 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
- source_id: file:PSEPK/PP_1492/PP_1492-ai-review.yaml
  title: Curated PP_1492 review
  statement: The PP_1492 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
- source_id: file:PSEPK/cheB3/cheB3-ai-review.yaml
  title: Curated cheB3 review
  statement: The cheB3 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
- source_id: file:PSEPK/PP_1494/PP_1494-ai-review.yaml
  title: Curated PP_1494 review
  statement: The PP_1494 review supports its Wsp-like surface-sensing/c-di-GMP cluster role.
notes: WspC/PP_1490 was already curated during the ppu02020 alginate/biofilm boundary pass and is included
  here as local cluster context. PP_1494 is the current c-di-GMP output candidate for this selected ppu02025
  bucket; the separately named KT2440 WspR/PP_4959 remains outside this sub-batch.
