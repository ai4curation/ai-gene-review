id: MODULE:urea_cycle
title: Urea cycle (vertebrate hepatic ureagenesis, Krebs-Henseleit cycle)
description: >-
  The urea cycle (ornithine cycle / Krebs-Henseleit cycle) is the principal
  pathway for the detoxification of waste nitrogen in ureotelic vertebrates,
  converting ammonia (arising largely from amino-acid catabolism) plus
  bicarbonate and aspartate-derived nitrogen into urea for renal excretion. In
  mammals it operates predominantly in periportal hepatocytes and spans two
  compartments: the first two committed steps are mitochondrial and the last
  three are cytosolic, so the pathway is physically split across the inner
  mitochondrial membrane and requires two dedicated mitochondrial carriers.
  The cycle proper comprises six enzymes. N-acetylglutamate synthase (NAGS)
  produces N-acetyl-L-glutamate (NAG), the obligate allosteric activator of
  carbamoyl phosphate synthetase 1 and therefore the regulatory gate of the
  whole pathway. Carbamoyl phosphate synthetase 1 (CPS1) condenses ammonia,
  bicarbonate and two ATP into carbamoyl phosphate in the matrix. Ornithine
  transcarbamylase (OTC) transfers the carbamoyl group to L-ornithine to give
  L-citrulline. Citrulline is exported to the cytosol in exchange for ornithine
  by the mitochondrial ornithine/citrulline carrier SLC25A15 (ORNT1). In the
  cytosol argininosuccinate synthase (ASS1) condenses citrulline with
  L-aspartate (the second nitrogen donor, supplied to the cytosol by the citrin
  aspartate/glutamate carrier SLC25A13) at the expense of ATP to form
  argininosuccinate; argininosuccinate lyase (ASL) cleaves this to L-arginine
  and fumarate; and arginase 1 (ARG1) hydrolyses arginine to urea and
  L-ornithine, regenerating the ornithine that re-enters mitochondria to close
  the cycle. The fumarate released by ASL links the urea cycle to the TCA
  cycle and, via aspartate regeneration, to the "aspartate-argininosuccinate
  shunt". Inherited deficiency of any of the six enzymes, of the two transporters
  (SLC25A15, SLC25A13), or of NAGS causes a urea cycle disorder presenting with
  hyperammonemia. The same enzyme chemistry, used biosynthetically rather than
  for nitrogen disposal, also produces arginine de novo (the arginine
  biosynthetic pathway) in tissues and organisms lacking a complete ureotelic
  cycle.
status: DRAFT
evidence:
  - source_id: GO:0000050
    title: urea cycle
    statement: >-
      The module is grounded in the GO biological-process term for the urea
      cycle; every enzyme and transporter step is annotated to (or acts within)
      GO:0000050.
  - source_id: Reactome:R-HSA-70635
    title: Urea cycle
    statement: >-
      The step order, compartmentalization and reaction stoichiometries follow
      the human Reactome "Urea cycle" pathway (R-HSA-70635) and its member
      reactions (R-HSA-70542, R-HSA-70555, R-HSA-70560, R-HSA-70634,
      R-HSA-70577, R-HSA-70573, R-HSA-70569, R-HSA-372448).
  - source_id: file:human/NAGS/NAGS-ai-review.yaml
    title: NAGS gene review (human)
    statement: >-
      The NAGS regulatory-step grounding (UniProtKB:Q8N159, GO:0004042, EC
      2.3.1.1, mitochondrial matrix) matches the completed human NAGS review.
  - source_id: file:human/CPS1/CPS1-ai-review.yaml
    title: CPS1 gene review (human)
    statement: >-
      The CPS1 step grounding (UniProtKB:P31327, GO:0004087 carbamoyl-phosphate
      synthase (ammonia) activity, GO:0000050 urea cycle, mitochondrial matrix)
      matches the completed human CPS1 review, which established the
      ammonia-dependent (not glutamine-hydrolyzing) chemistry.
  - source_id: file:human/OTC/OTC-ai-review.yaml
    title: OTC gene review (human)
    statement: >-
      The OTC step grounding (UniProtKB:P00480, GO:0004585 ornithine
      carbamoyltransferase activity, GO:0000050 urea cycle, mitochondrial
      matrix) matches the completed human OTC review.
  - source_id: file:human/SLC25A15/SLC25A15-ai-review.yaml
    title: SLC25A15 gene review (human)
    statement: >-
      The ornithine/citrulline transport step (UniProtKB:Q9Y619, GO:0000064
      L-ornithine transmembrane transporter activity, mitochondrial inner
      membrane) matches the completed human SLC25A15/ORNT1 review.
  - source_id: file:human/ASS1/ASS1-ai-review.yaml
    title: ASS1 gene review (human)
    statement: >-
      The ASS1 step grounding (UniProtKB:P00966, GO:0004055 argininosuccinate
      synthase activity, GO:0000050 urea cycle, cytosol) matches the completed
      human ASS1 review.
  - source_id: file:human/ASL/ASL-ai-review.yaml
    title: ASL gene review (human)
    statement: >-
      The ASL step grounding (UniProtKB:P04424, GO:0004056 argininosuccinate
      lyase activity, GO:0000050 urea cycle, cytosol) matches the completed
      human ASL review, which also captures ASL's catalysis-independent NOS
      scaffold role.
  - source_id: file:human/ARG1/ARG1-ai-review.yaml
    title: ARG1 gene review (human)
    statement: >-
      The ARG1 terminal-step grounding (UniProtKB:P05089, GO:0004053 arginase
      activity, GO:0000050 urea cycle, cytosol) matches the completed human ARG1
      review.
  - source_id: file:human/SLC25A13/SLC25A13-ai-review.yaml
    title: SLC25A13 gene review (human)
    statement: >-
      The citrin aspartate-supply step (UniProtKB:Q9UJS0, GO:0000515
      aspartate:glutamate proton antiporter activity, mitochondrial inner
      membrane) matches the completed human SLC25A13 review, which added the
      urea-cycle (GO:0000050) involvement.
module:
  id: urea_cycle
  label: Urea cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: urea cycle
      term:
        id: GO:0000050
        label: urea cycle
      description: >-
        The cyclic conversion of ammonia, bicarbonate and aspartate nitrogen to
        urea, regenerating ornithine each turn. Used for nitrogen disposal in
        ureotelic vertebrates; the same reactions run biosynthetically to make
        arginine in other contexts.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of the NAGS, CPS1 and OTC steps.
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: >-
          Location of the two carriers that couple the matrix and cytosolic
          halves of the cycle (SLC25A15 ornithine/citrulline; SLC25A13 citrin).
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Compartment of the ASS1, ASL and ARG1 steps.
  parts:
    - order: 1
      role: regulatory step (produces the CPS1 allosteric activator)
      node:
        id: nags_step
        label: L-glutamate + acetyl-CoA to N-acetyl-L-glutamate + CoA
        module_type: REGULATORY_STEP
        annotons:
          - id: nags_activity
            label: "NAGS: N-acetylglutamate synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: N-acetylglutamate synthase family (NAGS)
                term:
                  id: PANTHER:PTHR23342
                  label: N-acetylglutamate synthase
                representative_members:
                  - preferred_term: NAGS (human, mitochondrial)
                    term:
                      id: UniProtKB:Q8N159
                      label: N-acetylglutamate synthase, mitochondrial
            function:
              preferred_term: L-glutamate N-acetyltransferase activity, acting on acetyl-CoA as donor
              term:
                id: GO:0004042
                label: L-glutamate N-acetyltransferase activity, acting on acetyl-CoA as donor
              substrates:
                - preferred_term: L-glutamate
                - preferred_term: acetyl-CoA
              products:
                - preferred_term: N-acetyl-L-glutamate
                - preferred_term: coenzyme A
              evidence:
                - source_id: EC:2.3.1.1
                  statement: amino-acid N-acetyltransferase (N-acetylglutamate synthase)
                - source_id: Reactome:R-HSA-70542
                  statement: "glutamate + acetyl CoA => N-acetyl glutamate + CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Regulatory (not stoichiometric) step of ureagenesis: synthesizes
              N-acetyl-L-glutamate, the obligate allosteric activator of CPS1.
              NAG availability gates flux through the whole cycle and rises with
              protein load / arginine; NAGS deficiency is pharmacologically
              rescuable with the NAG analogue carglumic acid. The PANTHER family
              spans bacterial ArgA-type and vertebrate mitochondrial NAGS
              orthologs; the human enzyme is subfamily PTHR23342:SF0.
    - order: 2
      role: first committed step (mitochondrial carbamoyl phosphate synthesis)
      node:
        id: cps1_step
        label: NH3 + HCO3- + 2 ATP to carbamoyl phosphate + 2 ADP + Pi
        module_type: REACTION
        annotons:
          - id: cps1_activity
            label: "CPS1: carbamoyl-phosphate synthetase 1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Carbamoyl-phosphate synthase (ammonia) family (CPS1)
                term:
                  id: PANTHER:PTHR11405
                  label: CARBAMOYLTRANSFERASE FAMILY MEMBER
                representative_members:
                  - preferred_term: CPS1 (human, mitochondrial)
                    term:
                      id: UniProtKB:P31327
                      label: Carbamoyl-phosphate synthase [ammonia], mitochondrial
            function:
              preferred_term: carbamoyl-phosphate synthase (ammonia) activity
              term:
                id: GO:0004087
                label: carbamoyl-phosphate synthase (ammonia) activity
              substrates:
                - preferred_term: ammonia
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
              products:
                - preferred_term: carbamoyl phosphate
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.3.4.16
                  statement: carbamoyl-phosphate synthase (ammonia)
                - source_id: Reactome:R-HSA-70555
                  statement: "2 ATP + NH4+ + HCO3- => 2 ADP + orthophosphate + carbamoyl phosphate (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              First committed and rate-setting step: incorporates free ammonia
              (the primary nitrogen entering the cycle) with bicarbonate and two
              ATP into carbamoyl phosphate. Absolutely dependent on the NAGS
              product N-acetylglutamate for activity. Distinct from the cytosolic
              glutamine-dependent CPS II (CAD) of pyrimidine synthesis.
    - order: 3
      role: carbamoyl transfer to ornithine (citrulline synthesis)
      node:
        id: otc_step
        label: carbamoyl phosphate + L-ornithine to L-citrulline + Pi
        module_type: REACTION
        annotons:
          - id: otc_activity
            label: "OTC: ornithine transcarbamylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ornithine/aspartate carbamoyltransferase family (OTC)
                term:
                  id: PANTHER:PTHR45753
                  label: ORNITHINE CARBAMOYLTRANSFERASE, MITOCHONDRIAL
                representative_members:
                  - preferred_term: OTC (human, mitochondrial)
                    term:
                      id: UniProtKB:P00480
                      label: Ornithine transcarbamylase, mitochondrial
            function:
              preferred_term: ornithine carbamoyltransferase activity
              term:
                id: GO:0004585
                label: ornithine carbamoyltransferase activity
              substrates:
                - preferred_term: carbamoyl phosphate
                - preferred_term: L-ornithine
              products:
                - preferred_term: L-citrulline
                - preferred_term: phosphate
              evidence:
                - source_id: EC:2.1.3.3
                  statement: ornithine carbamoyltransferase
                - source_id: Reactome:R-HSA-70560
                  statement: "carbamoyl phosphate + ornithine => citrulline + orthophosphate (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Transfers the carbamoyl group of carbamoyl phosphate to the
              delta-amino group of L-ornithine, producing L-citrulline. The
              X-linked human enzyme (OTC/OTCD) is the most common urea cycle
              disorder. The PANTHER family is homologous to the aspartate
              carbamoyltransferases (bacterial argF/argI ornithine
              carbamoyltransferases are orthologs), reflecting a shared
              carbamoyltransferase fold.
    - order: 4
      role: mitochondrial ornithine/citrulline exchange
      node:
        id: ornithine_citrulline_transport
        label: citrulline export / ornithine import across the inner membrane (SLC25A15)
        module_type: TRANSPORT_STEP
        annotons:
          - id: slc25a15_activity
            label: "SLC25A15/ORNT1: ornithine/citrulline antiporter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial basic-amino-acid (ornithine) carrier family (SLC25A15/SLC25A2)
                term:
                  id: PANTHER:PTHR45624
                  label: MITOCHONDRIAL BASIC AMINO ACIDS TRANSPORTER-RELATED
                representative_members:
                  - preferred_term: SLC25A15 / ORNT1 (human)
                    term:
                      id: UniProtKB:Q9Y619
                      label: Mitochondrial ornithine transporter 1
                  - preferred_term: SLC25A2 / ORNT2 (human paralog)
                    term:
                      id: UniProtKB:Q9BXI2
                      label: Mitochondrial ornithine transporter 2
            function:
              preferred_term: L-ornithine transmembrane transporter activity
              term:
                id: GO:0000064
                label: L-ornithine transmembrane transporter activity
              substrates:
                - preferred_term: L-citrulline (matrix)
                - preferred_term: L-ornithine (cytosol)
              products:
                - preferred_term: L-citrulline (cytosol)
                - preferred_term: L-ornithine (matrix)
              evidence:
                - source_id: Reactome:R-HSA-70634
                  statement: "ornithine (cytosolic) + citrulline (mitochondrial) => ornithine (mitochondrial) (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Couples the mitochondrial and cytosolic halves of the cycle:
              exports OTC-made citrulline to the cytosol in exchange for the
              ornithine regenerated by ARG1, so ornithine is recycled. Loss of
              SLC25A15 causes HHH syndrome (hyperornithinemia-hyperammonemia-
              homocitrullinuria). The paralog SLC25A2/ORNT2 partially overlaps in
              specificity.
    - order: 5
      role: cytosolic condensation of citrulline with aspartate
      node:
        id: ass1_step
        label: L-citrulline + L-aspartate + ATP to argininosuccinate + AMP + PPi
        module_type: REACTION
        annotons:
          - id: ass1_activity
            label: "ASS1: argininosuccinate synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Argininosuccinate synthase family (ASS1)
                term:
                  id: PANTHER:PTHR11587
                  label: ARGININOSUCCINATE SYNTHASE
                representative_members:
                  - preferred_term: ASS1 (human)
                    term:
                      id: UniProtKB:P00966
                      label: Argininosuccinate synthase
            function:
              preferred_term: argininosuccinate synthase activity
              term:
                id: GO:0004055
                label: argininosuccinate synthase activity
              substrates:
                - preferred_term: L-citrulline
                - preferred_term: L-aspartate
                - preferred_term: ATP
              products:
                - preferred_term: N(omega)-(L-arginino)succinate
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:6.3.4.5
                  statement: argininosuccinate synthase
                - source_id: Reactome:R-HSA-70577
                  statement: "ASS1 tetramer transforms L-Asp and L-Cit to argininosuccinate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-limiting cytosolic step: condenses citrulline with aspartate
              (the second nitrogen donor) using ATP (cleaved to AMP + PPi) to form
              argininosuccinate. Deficiency causes citrullinemia type I.
    - order: 6
      role: cleavage to arginine and fumarate
      node:
        id: asl_step
        label: argininosuccinate to L-arginine + fumarate
        module_type: REACTION
        annotons:
          - id: asl_activity
            label: "ASL: argininosuccinate lyase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Argininosuccinate lyase / fumarase superfamily (ASL)
                term:
                  id: PANTHER:PTHR43814
                  label: ARGININOSUCCINATE LYASE
                representative_members:
                  - preferred_term: ASL (human)
                    term:
                      id: UniProtKB:P04424
                      label: Argininosuccinate lyase
            function:
              preferred_term: argininosuccinate lyase activity
              term:
                id: GO:0004056
                label: argininosuccinate lyase activity
              substrates:
                - preferred_term: N(omega)-(L-arginino)succinate
              products:
                - preferred_term: L-arginine
                - preferred_term: fumarate
              evidence:
                - source_id: EC:4.3.2.1
                  statement: argininosuccinate lyase
                - source_id: Reactome:R-HSA-70573
                  statement: "argininosuccinate <=> fumarate + arginine (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Cleaves argininosuccinate into L-arginine and fumarate; the
              fumarate feeds the TCA cycle and regenerates aspartate (the
              aspartate-argininosuccinate shunt). ASL is also required for
              channeling arginine to nitric-oxide synthase, so ASL deficiency
              (argininosuccinic aciduria) has systemic features beyond
              hyperammonemia. Member of the lyase/fumarase (aspartase) superfamily.
    - order: 7
      role: terminal hydrolysis to urea, regenerating ornithine
      node:
        id: arg1_step
        label: L-arginine + H2O to L-ornithine + urea
        module_type: REACTION
        annotons:
          - id: arg1_activity
            label: "ARG1: arginase 1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Arginase / ureohydrolase family (ARG1/ARG2)
                term:
                  id: PANTHER:PTHR43782
                  label: ARGINASE
                representative_members:
                  - preferred_term: ARG1 (human, cytosolic, hepatic)
                    term:
                      id: UniProtKB:P05089
                      label: Arginase-1
                  - preferred_term: ARG2 (human, mitochondrial paralog)
                    term:
                      id: UniProtKB:P78540
                      label: Arginase-2, mitochondrial
            function:
              preferred_term: arginase activity
              term:
                id: GO:0004053
                label: arginase activity
              substrates:
                - preferred_term: L-arginine
                - preferred_term: water
              products:
                - preferred_term: L-ornithine
                - preferred_term: urea
              evidence:
                - source_id: EC:3.5.3.1
                  statement: arginase
                - source_id: Reactome:R-HSA-70569
                  statement: "arginine + H2O => ornithine + urea [ARG1] (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal step: hydrolyses arginine to urea (the excreted product)
              and ornithine, which is re-imported to mitochondria to close the
              cycle. ARG1 is the cytosolic hepatic isoform whose deficiency causes
              arginase deficiency (argininemia, spastic diplegia); the manganese
              metalloenzyme paralog ARG2 is mitochondrial and extrahepatic and
              does not substitute for hepatic ureagenesis.
    - order: 8
      role: cytosolic aspartate supply (aspartate/glutamate carrier)
      node:
        id: citrin_aspartate_supply
        label: mitochondrial aspartate export for the ASS1 step (SLC25A13, citrin)
        module_type: TRANSPORT_STEP
        annotons:
          - id: slc25a13_activity
            label: "SLC25A13/citrin: aspartate/glutamate antiporter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mitochondrial aspartate/glutamate carrier family (SLC25A13/SLC25A12)
                term:
                  id: PANTHER:PTHR45678
                  label: MITOCHONDRIAL 2-OXODICARBOXYLATE CARRIER 1-RELATED
                representative_members:
                  - preferred_term: SLC25A13 / citrin (human, liver)
                    term:
                      id: UniProtKB:Q9UJS0
                      label: Electrogenic aspartate/glutamate antiporter SLC25A13, mitochondrial
                  - preferred_term: SLC25A12 / aralar (human paralog)
                    term:
                      id: UniProtKB:O75746
                      label: Electrogenic aspartate/glutamate antiporter SLC25A12, mitochondrial
            function:
              preferred_term: L-aspartate transmembrane transporter activity
              term:
                id: GO:0015183
                label: L-aspartate transmembrane transporter activity
              substrates:
                - preferred_term: L-aspartate (matrix)
                - preferred_term: L-glutamate (cytosol)
              products:
                - preferred_term: L-aspartate (cytosol)
                - preferred_term: L-glutamate (matrix)
              evidence:
                - source_id: Reactome:R-HSA-372448
                  statement: "SLC25A12,13 exchange L-Glu and L-Asp (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Ancillary but essential: the liver-type aspartate/glutamate carrier
              citrin exports mitochondrial aspartate to the cytosol, supplying the
              second nitrogen donor consumed by ASS1 and completing the
              malate-aspartate / aspartate-argininosuccinate shunt. Citrin
              deficiency causes citrullinemia type II (CTLN2) and NICCD. The
              paralog SLC25A12/aralar performs the same exchange in brain/muscle.
  connections:
    - source: nags_step
      target: cps1_step
      connection_type: POSITIVELY_REGULATES
      description: >-
        N-acetyl-L-glutamate made by NAGS is the obligate allosteric activator
        of CPS1; without it CPS1 is inactive, so NAGS gates entry to the cycle.
    - source: cps1_step
      target: otc_step
      connection_type: PROVIDES_INPUT_FOR
      description: Carbamoyl phosphate from CPS1 is the carbamoyl donor for OTC.
    - source: otc_step
      target: ornithine_citrulline_transport
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Citrulline made by OTC in the matrix is exported to the cytosol by
        SLC25A15.
    - source: ornithine_citrulline_transport
      target: ass1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Cytosolic citrulline delivered by SLC25A15 is a substrate of ASS1.
    - source: citrin_aspartate_supply
      target: ass1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Citrin (SLC25A13) supplies the cytosolic aspartate that ASS1 condenses
        with citrulline (the second nitrogen donor).
    - source: ass1_step
      target: asl_step
      connection_type: PROVIDES_INPUT_FOR
      description: Argininosuccinate from ASS1 is cleaved by ASL.
    - source: asl_step
      target: arg1_step
      connection_type: PROVIDES_INPUT_FOR
      description: L-arginine from ASL is hydrolysed by ARG1.
    - source: arg1_step
      target: ornithine_citrulline_transport
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        L-ornithine regenerated by ARG1 is re-imported to the matrix by SLC25A15
        (in exchange for citrulline), closing the cycle.
  notes: >-
    Six-enzyme vertebrate urea cycle plus its two obligatory mitochondrial
    carriers, grounded to the human enzymes NAGS (UniProtKB:Q8N159, GO:0004042,
    EC 2.3.1.1), CPS1 (P31327, GO:0004087, EC 6.3.4.16), OTC (P00480, GO:0004585,
    EC 2.1.3.3), ASS1 (P00966, GO:0004055, EC 6.3.4.5), ASL (P04424, GO:0004056,
    EC 4.3.2.1) and ARG1 (P05089, GO:0004053, EC 3.5.3.1), with the carriers
    SLC25A15/ORNT1 (Q9Y619, GO:0000064) and SLC25A13/citrin (Q9UJS0, GO:0015183).
    Molecular-function and cellular-component GO terms were taken from the human
    GOA records; Reactome reaction ids and titles were verified against the local
    reactome cache. Each step is grounded generically with a PANTHER family
    selector (covering paralogs and orthologs) plus concrete human
    representative members, and the notable human paralogs are listed where they
    exist (ARG2, SLC25A2/ORNT2, SLC25A12/aralar). The reaction-chaining check is
    not applicable here because the intermediates are amino acids / small
    metabolites rather than CoA thioesters. Downstream fates (fumarate to the TCA
    cycle; arginine to nitric-oxide synthase, creatine or polyamine synthesis)
    and the de novo arginine-biosynthetic use of the same enzymes are noted but
    out of scope for this nitrogen-disposal module.
