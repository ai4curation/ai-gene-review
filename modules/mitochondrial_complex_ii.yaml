id: MODULE:mitochondrial_complex_ii
title: Mitochondrial respiratory Complex II (succinate dehydrogenase) + assembly factors; SDHA/SDHB/SDHC/SDHD + SDHAF1/SDHAF2
description: >-
  Respiratory Complex II (succinate dehydrogenase, SDH) is the only enzyme shared between the
  tricarboxylic acid (TCA) cycle and the mitochondrial electron transport chain. It oxidises
  succinate to fumarate in the matrix and feeds the released electrons into the ubiquinone pool,
  without pumping protons. The holoenzyme is a heterotetramer anchored in the inner membrane: the
  flavoprotein subunit SDHA carries a covalently bound FAD and the succinate-oxidising active site;
  the iron-sulfur subunit SDHB relays the electrons through three Fe-S clusters ([2Fe-2S], [4Fe-4S],
  [3Fe-4S]); and the two integral-membrane subunits SDHC and SDHD form the membrane anchor, bind a
  single heme b and provide the ubiquinone-reduction site. Two dedicated matrix assembly factors
  build the soluble catalytic head before it docks onto the membrane anchor: SDHAF2 (SDH5) promotes
  the covalent attachment of FAD to SDHA (flavinylation), and SDHAF1 — a LYR-motif protein acting
  with the HSC20/HSPA9 Fe-S co-chaperone system — delivers and inserts the iron-sulfur clusters into
  SDHB. Germline defects in the SDH subunits and assembly factors cause hereditary
  paraganglioma-pheochromocytoma syndromes and, when biallelic, mitochondrial complex II deficiency
  (Leigh syndrome, leukoencephalopathy, cardiomyopathy).
status: DRAFT
evidence:
  - source_id: GO:0006121
    title: mitochondrial electron transport, succinate to ubiquinone
    statement: >-
      The module is grounded in mitochondrial electron transport, succinate to ubiquinone
      (GO:0006121) — the reaction catalysed by Complex II.
  - source_id: GO:0034553
    title: mitochondrial respiratory chain complex II assembly
    statement: >-
      The dedicated factors mediate mitochondrial respiratory chain complex II assembly (GO:0034553).
  - source_id: Reactome:R-HSA-70994
    title: SDH complex dehydrogenates succinate
    statement: >-
      The catalytic reaction follows the human Reactome "SDH complex dehydrogenates succinate"
      reaction (R-HSA-70994).
  - source_id: file:human/SDHA/SDHA-ai-review.yaml
    title: SDHA gene review (human)
    statement: >-
      The FAD flavoprotein / succinate-oxidising subunit (UniProtKB:P31040, GO:0000104) matches the
      completed human SDHA review (on main).
  - source_id: file:human/SDHB/SDHB-ai-review.yaml
    title: SDHB gene review (human)
    statement: >-
      The iron-sulfur electron-transfer subunit (UniProtKB:P21912, GO:0009055) matches the completed
      human SDHB review (on main).
  - source_id: file:human/SDHC/SDHC-ai-review.yaml
    title: SDHC gene review (human)
    statement: >-
      The heme-binding membrane-anchor subunit (UniProtKB:Q99643, GO:0020037) matches the completed
      human SDHC review (on main).
  - source_id: file:human/SDHD/SDHD-ai-review.yaml
    title: SDHD gene review (human)
    statement: >-
      The heme-binding membrane-anchor subunit (UniProtKB:O14521, GO:0020037) matches the completed
      human SDHD review (on main).
  - source_id: file:human/SDHAF2/SDHAF2-ai-review.yaml
    title: SDHAF2 gene review (human)
    statement: >-
      The SDHA flavinylation factor (UniProtKB:Q9NX18, GO:0044183/GO:0018293) matches the completed
      human SDHAF2 review.
  - source_id: file:human/SDHAF1/SDHAF1-ai-review.yaml
    title: SDHAF1 gene review (human)
    statement: >-
      The SDHB Fe-S insertion factor (UniProtKB:A6NFY7, GO:0051087) matches the completed human
      SDHAF1 review.
