        SDHAF2-mediated FAD flavinylation of SDHA and SDHAF1-mediated Fe-S insertion into SDHB build
        the catalytic head that then assembles with the SDHC/SDHD membrane anchor into active Complex II.
  notes: >-
    Mitochondrial respiratory Complex II (succinate dehydrogenase), grounded to the human subunit and
    assembly-factor reviews: SDHA (P31040, GO:0000104 succinate dehydrogenase activity + contributes_to
    GO:0008177), SDHB (P21912, GO:0009055 electron transfer + contributes_to GO:0008177), SDHC (Q99643,
    GO:0020037 heme binding) and SDHD (O14521, GO:0020037 heme binding) are already reviewed on main and
    cited via file:; SDHAF2 (Q9NX18, GO:0044183 + protein-FAD linkage GO:0018293) and SDHAF1 (A6NFY7,
    GO:0051087) are curated here. The holoenzyme is modelled as a PROTEIN_COMPLEX node (only cofactor/
    catalytic subunits carry the redox/heme MFs; the complex-level succinate dehydrogenase (quinone)
    activity GO:0008177 is a contributes_to relation on each subunit) plus an assembly-factor node that
    POSITIVELY_REGULATES it. Concepts GO:0006121 (succinate→ubiquinone electron transport) + GO:0034553
    (Complex II assembly); catalytic reaction Reactome R-HSA-70994. The current Complex II membership term
    is GO:0045273 (GO:0045257 obsolete). Complex II feeds electrons into the ubiquinone pool shared with
    Complex I, then to Complex III → cytochrome c → Complex IV. Disorders: hereditary paraganglioma-
    pheochromocytoma (SDHA/B/C/D, SDHAF2) and, biallelic, mitochondrial complex II deficiency (Leigh
    syndrome, leukoencephalopathy, cardiomyopathy; SDHAF1).
