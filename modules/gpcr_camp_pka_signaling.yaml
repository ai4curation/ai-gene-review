id: MODULE:gpcr_camp_pka_signaling
title: GPCR-cAMP-PKA signaling pathway module
description: >-
  A compact Gs-coupled GPCR signaling module. An agonist-occupied GPCR activates
  heterotrimeric Gs, G alpha s stimulates adenylyl cyclase, cAMP accumulates and
  activates PKA, and PKA phosphorylates cytosolic and nuclear substrates
  including CREB. The module is grounded in GO:0007188. ADRB2 is anchored to
  PAINT GPCR nodes; downstream GNAS, ADCY5, PRKACA, and CREB1 are curated
  UniProt exemplars without PTN ancestry claims in this first pass.
status: DRAFT
evidence:
  - source_id: GO:0007188
    title: adenylate cyclase-modulating G protein-coupled receptor signaling pathway
    statement: The module is grounded in the GO biological process term for GPCR signaling through cAMP.
