id: MODULE:thymidylate_synthesis
title: Thymidylate (dTMP -> dTTP) synthesis; thymidylate synthase / dUTPase / dTMP kinase
description: >-
  Thymidylate synthesis is the route that makes the DNA-specific precursor dTTP,
  distinguishing DNA (thymine) from RNA (uracil) precursors. dUTP diphosphatase (DUT)
  hydrolyses dUTP to dUMP + diphosphate, which both keeps the cellular dUTP:dTTP ratio
  low (preventing mutagenic uracil misincorporation into DNA) and supplies dUMP as
  substrate. Thymidylate synthase (TYMS) then reductively methylates dUMP to dTMP,
  using 5,10-methylenetetrahydrofolate as the one-carbon donor (oxidised to
  dihydrofolate, regenerated by DHFR) — the sole de novo source of dTMP. Thymidylate
  kinase (DTYMK) phosphorylates dTMP to dTDP, the essential step common to both the de
  novo and salvage routes; nucleoside diphosphate kinase then makes dTTP. This pathway
  is a central target of chemotherapy — TYMS is inhibited by the 5-fluorouracil
  metabolite FdUMP and by antifolates (raltitrexed, pemetrexed), and the folate cofactor
  supply is targeted by methotrexate — because rapidly dividing cells depend on de novo
  dTTP for DNA replication. Perturbing the balance (e.g. DUT loss, TYMS inhibition)
  causes dUTP accumulation, uracil misincorporation and DNA damage.
status: DRAFT
evidence:
  - source_id: GO:0006231
    title: dTMP biosynthetic process
    statement: >-
      The module is grounded in the GO dTMP biosynthetic process (GO:0006231) and its
      continuation to dTTP: dUTP -> dUMP -> dTMP -> dTDP.
  - source_id: Reactome:R-HSA-73605
    title: conversion of dUMP to dTMP
    statement: >-
      Reactions follow the human Reactome pyrimidine reactions R-HSA-73666 (DUT),
      R-HSA-73605 (TYMS) and R-HSA-73635 (DTYMK).
  - source_id: file:human/DUT/DUT-ai-review.yaml
    title: DUT gene review (human)
    statement: >-
      The dUTP -> dUMP step (UniProtKB:P33316, GO:0004170) matches the completed human
      DUT review.
  - source_id: file:human/TYMS/TYMS-ai-review.yaml
    title: TYMS gene review (human)
    statement: >-
      The dUMP -> dTMP step (UniProtKB:P04818, GO:0004799) matches the completed human
      TYMS review.
  - source_id: file:human/DTYMK/DTYMK-ai-review.yaml
    title: DTYMK gene review (human)
    statement: >-
      The dTMP -> dTDP step (UniProtKB:P23919, GO:0004798) matches the completed human
      DTYMK review.
module:
  id: thymidylate_synthesis
  label: Thymidylate (dTMP -> dTTP) synthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: dTMP biosynthetic process
      term:
        id: GO:0006231
        label: dTMP biosynthetic process
      description: >-
        Synthesis of the DNA-specific thymine nucleotide: dUTP -> dUMP -> dTMP -> dTDP
        (-> dTTP).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The thymidylate-synthesis enzymes are cytosolic (with nuclear pools).
  parts:
    - order: 1
      role: dUTP hydrolysis (supplies dUMP; blocks uracil misincorporation)
      node:
        id: dut_step
        label: dUTP + H2O to dUMP + diphosphate
        module_type: REACTION
        annotons:
          - id: dut_activity
            label: "DUT: dUTP diphosphatase (dUTPase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: dUTP diphosphatase family (DUT)
                term:
                  id: PANTHER:PTHR11241
                  label: DEOXYURIDINE 5-TRIPHOSPHATE NUCLEOTIDOHYDROLASE
                representative_members:
                  - preferred_term: DUT (human)
                    term:
                      id: UniProtKB:P33316
                      label: Deoxyuridine 5'-triphosphate nucleotidohydrolase
            function:
              preferred_term: dUTP diphosphatase activity
              term:
                id: GO:0004170
                label: dUTP diphosphatase activity
              substrates:
                - preferred_term: dUTP
                - preferred_term: water
              products:
                - preferred_term: dUMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:3.6.1.23
                  statement: dUTP diphosphatase (Mg2+); lowers dUTP:dTTP ratio and supplies dUMP for TYMS
                - source_id: Reactome:R-HSA-73666
                  statement: "hydrolysis of  2'-deoxyuridine 5'-triphosphate to form  2'-deoxyuridine 5'-monophosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Hydrolyses dUTP to dUMP + PPi (nuclear and mitochondrial isoforms),
              preventing mutagenic uracil misincorporation into DNA and feeding dUMP to
              thymidylate synthase.
    - order: 2
      role: reductive methylation of dUMP to dTMP (de novo)
      node:
        id: tyms_step
        label: dUMP + 5,10-methylene-THF to dTMP + dihydrofolate
        module_type: REACTION
        annotons:
          - id: tyms_activity
            label: "TYMS: thymidylate synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Thymidylate synthase family (TYMS)
                term:
                  id: PANTHER:PTHR11548
                  label: THYMIDYLATE SYNTHASE
                representative_members:
                  - preferred_term: TYMS (human)
                    term:
                      id: UniProtKB:P04818
                      label: Thymidylate synthase
            function:
              preferred_term: thymidylate synthase activity
              term:
                id: GO:0004799
                label: thymidylate synthase activity
              substrates:
                - preferred_term: dUMP
                - preferred_term: 5,10-methylenetetrahydrofolate
              products:
                - preferred_term: dTMP
                - preferred_term: dihydrofolate (DHF)
              evidence:
                - source_id: EC:2.1.1.45
                  statement: thymidylate synthase; sole de novo dTMP source; 5-FU (FdUMP) / antifolate chemotherapy target
                - source_id: Reactome:R-HSA-73605
                  statement: "conversion of dUMP to dTMP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Homodimer catalysing the sole de novo source of dTMP; couples to folate
              one-carbon metabolism (produces DHF, regenerated by DHFR). Central 5-FU/
              antifolate chemotherapy target; autoregulates its own translation.
    - order: 3
      role: phosphorylation of dTMP to dTDP
      node:
        id: dtymk_step
        label: dTMP + ATP to dTDP + ADP
        module_type: REACTION
        annotons:
          - id: dtymk_activity
            label: "DTYMK: thymidylate kinase (dTMP kinase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Thymidylate kinase family (DTYMK)
                term:
                  id: PANTHER:PTHR10344
                  label: THYMIDYLATE KINASE
                representative_members:
                  - preferred_term: DTYMK (human)
                    term:
                      id: UniProtKB:P23919
                      label: Thymidylate kinase
            function:
              preferred_term: dTMP kinase activity
              term:
                id: GO:0004798
                label: dTMP kinase activity
              substrates:
                - preferred_term: dTMP
                - preferred_term: ATP
              products:
                - preferred_term: dTDP
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.4.9
                  statement: thymidylate (dTMP) kinase; common essential step for de novo and salvage dTTP synthesis
                - source_id: Reactome:R-HSA-73635
                  statement: "dUMP or TMP + ATP <=> dUDP or TDP + ADP [DTYMK] (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Phosphorylates dTMP to dTDP — the rate-limiting step common to both the de
              novo (TYMS) and salvage (thymidine kinase) routes to dTTP; essential for
              DNA replication. dTDP is then converted to dTTP by nucleoside diphosphate kinase.
  connections:
    - source: dut_step
      target: tyms_step
      connection_type: PROVIDES_INPUT_FOR
      description: The dUMP from DUT is the thymidylate-synthase substrate.
    - source: tyms_step
      target: dtymk_step
      connection_type: PROVIDES_INPUT_FOR
      description: The dTMP from TYMS is phosphorylated by DTYMK.
  notes: >-
    Thymidylate (dTMP -> dTTP) synthesis grounded to the human enzymes DUT
    (UniProtKB:P33316, GO:0004170, EC 3.6.1.23), thymidylate synthase TYMS (P04818,
    GO:0004799, EC 2.1.1.45) and thymidylate kinase DTYMK (P23919, GO:0004798, EC 2.7.4.9).
    GO molecular-function terms were taken from the human GOA records; Reactome reaction ids
    and titles were verified against the local reactome cache. Each step uses a PANTHER family
    selector (generic over orthologs) with the human enzyme as representative. The pathway
    converts dUTP -> dUMP -> dTMP -> dTDP, with dTDP then phosphorylated to dTTP by nucleoside
    diphosphate kinase (NME family, not modelled here). It is tightly coupled to folate
    one-carbon metabolism (TYMS consumes 5,10-methylene-THF and releases DHF, regenerated by
    DHFR) and is the pre-eminent antiproliferative drug target: 5-fluorouracil (via FdUMP) and
    antifolates (raltitrexed, pemetrexed) inhibit TYMS, and methotrexate depletes the folate
    cofactor. dUMP also arises by salvage/deamination routes, and dTMP by thymidine salvage
    (TK1/TK2), which feed the same DTYMK step. Loss of the dUTPase gate (DUT) or TYMS inhibition
    raises dUTP and causes uracil misincorporation / DNA damage. Disease relevance is largely
    pharmacologic/pharmacogenetic; DTYMK has been linked to a severe neurodevelopmental disorder.
