    title: HGF-MET signaling pathway Falcon module review
    statement: Falcon/Edison module review generated 2026-06-28 was integrated to cross-check 
      boundaries, core mechanism, variation, constraints, failure modes, and 8 extracted 
      open-question gaps.
  - source_id: GO:0048012
