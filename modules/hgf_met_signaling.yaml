    title: HGF-MET signaling pathway Falcon module review
    statement: >-
      Falcon/Edison module review generated 2026-06-28 is linked as supporting evidence for module boundaries,
      core mechanism, variation, constraints, and failure modes; open questions in that report require
      manual review before promotion to curated knowledge gaps.
  - source_id: GO:0048012
    title: hepatocyte growth factor receptor signaling pathway
    statement: The module is grounded in the GO biological process term for hepatocyte growth factor
      receptor signaling pathway.
  - source_id: PANTHER:PTN001230349
    title: PAINT node PTN001230349 for MET
    statement: Local PAINT IBD node in PTHR24416 with propagated terms C:GO:0005886, P:GO:0007169; 
      PAINT date 20260529.
