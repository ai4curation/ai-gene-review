knowledge_gaps:
  - gap_statement: Full-length HGF-MET complex structure remains unresolved in the HGF-MET signaling
      pathway module.
    boundary: The structure of full-length HGF remains unknown, and high-resolution structures of 
      the complete MET extracellular domain in apo or HGF-bound states are lacking. Current models 
      derive from studies of fragments rather than intact molecules (linossi2021stateofthe pages 
      9-11, linossi2021stateofthe pages 4-6, linossi2021stateofthe pages 1-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: HGF alpha-chain binding site controversy remains unresolved in the HGF-MET 
      signaling pathway module.
    boundary: While the SEMA domain (blades 5-7) is the accepted primary binding site for HGF's 
      alpha-chain, an alternative primary binding site in the IPT3-4 domains of the MET stalk has 
      been proposed but remains unresolved (linossi2021stateofthe pages 4-6).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: Role of heparan sulfate remains unresolved in the HGF-MET signaling pathway 
      module.
    boundary: How heparan sulfate proteoglycans mechanistically facilitate HGF dimerization and 
      enhance ligand affinity remains unknown despite its demonstrated biological importance 
      (linossi2021stateofthe pages 8-9).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: Transmembrane signal transduction remains unresolved in the HGF-MET signaling 
      pathway module.
    boundary: How conformational changes in the MET extracellular domain are translated through the 
      transmembrane helix to activate the intracellular kinase domain is largely uncharacterized. 
      The assembly of intracellular domains upon ligand binding remains poorly understood 
      (linossi2021stateofthe pages 9-11, linossi2021stateofthe pages 3-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: Furin cleavage significance remains unresolved in the HGF-MET signaling pathway 
      module.
    boundary: MET is cleaved by furin at Arg307-Ser308, positioned near the putative HGF alpha-chain
      binding site. The functional significance of this processing for ligand binding and receptor 
      activation is unknown (linossi2021stateofthe pages 3-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: GRB2 phase separation in vivo remains unresolved in the HGF-MET signaling pathway
      module.
    boundary: While GRB2 can form meshwork-like condensates that concentrate signaling components in
      vitro, the physiological relevance of these structures at activated MET receptors in living 
      cells remains to be established (breithaupt2023selfassemblyofgrb2 pages 3-5, 
      breithaupt2023selfassemblyofgrb2 pages 22-24).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: Endosomal vs. surface signaling remains unresolved in the HGF-MET signaling 
      pathway module.
    boundary: Whether MET signals primarily from the plasma membrane or continues to signal-or 
      signals differently-from endosomal compartments after internalization remains an area of 
      active investigation, with implications for understanding how negative regulators like SNX1/2 
      shape signaling output (gallo2024themetoncogenea pages 13-15).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/hgf_met_signaling-deep-research-falcon.md
  - gap_statement: Co-receptor mechanisms remains unresolved in the HGF-MET signaling pathway 
      module.
    boundary: MET forms co-complexes with numerous cell-surface proteins including RTKs, integrins, 
      CD44, plexins, and GPCRs (gallo2024themetoncogene pages 1-3). Whether these represent direct 
      interactions and how they converge on or diverge from canonical MET homodimer activation is 
      structurally undefined (linossi2021stateofthe pages 1-3). ---
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
