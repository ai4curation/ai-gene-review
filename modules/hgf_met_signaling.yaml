id: MODULE:hgf_met_signaling
title: HGF-MET signaling pathway module
description: Hepatocyte growth factor activates the MET receptor tyrosine kinase, recruiting 
  multisite docking adaptors that coordinate motility, invasive growth, survival, and epithelial 
  morphogenesis.
status: DRAFT
