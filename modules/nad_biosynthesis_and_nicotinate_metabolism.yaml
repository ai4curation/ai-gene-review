    This first-pass module deliberately separates strict NAD+ formation
    (nadB, nadA, nadC, nadD, nadE), nicotinate salvage (pncB and pncC), NADP+
    and redox-balancing chemistry (nadK, sthA, and Pnt subunits), and aerobic
    nicotinate catabolism (nicA, nicB, nicC, nicX, nicD, nicF, and maiA). Falcon
    pathway/taxon synthesis flags davD, sad-I, sad-II, gabD-II, ushA, surE,
    PP_2531, mazG, nudC, and cobB as boundary-only and PP_3103 as
    candidate-uncertain; those should not be counted as satisfying the core
    module. A canonical PncA nicotinamidase was not identified in the candidate
    set and remains an explicit salvage-gap question.
