                  label: NMN amidohydrolase
            function:
              preferred_term: nicotinamide-nucleotide amidase activity
              term:
                id: GO:0019159
                label: nicotinamide-nucleotide amidase activity
              substrates:
                - preferred_term: nicotinamide D-ribonucleotide
              products:
                - preferred_term: nicotinate D-ribonucleotide
              evidence:
                - source_id: EC:3.5.1.42
                  statement: NMN amidohydrolase
            role_description: Salvage conversion of NMN to NaMN.
    - order: 3
