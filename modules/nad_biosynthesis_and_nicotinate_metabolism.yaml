id: MODULE:nad_biosynthesis_and_nicotinate_metabolism
title: NAD biosynthesis and nicotinate metabolism
description: >-
  A bacterial NAD metabolism module covering de novo NAD+ biosynthesis from
  L-aspartate through quinolinate, nicotinate salvage to NAD+, NADP+
  formation, NAD(H)/NADP(H) redox interconversion, and aerobic nicotinate
  catabolism. In Pseudomonas putida KT2440, KEGG ppu00760 also includes
  nucleotide hydrolases, NAD-consuming enzymes, and central-metabolism
  spillover nodes; those are tracked as boundary context unless they directly
  form, interconvert, salvage, or catabolize pyridine nucleotides/nicotinate.
status: DRAFT
evidence:
  - source_id: GO:0009435
    title: NAD+ biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      NAD+.
  - source_id: GO:0034355
    title: NAD+ biosynthetic process via the salvage pathway
    statement: >-
      Nicotinate salvage is a distinct branch that converts recycled or
      imported nicotinate/nicotinamide-derived intermediates back to NAD+.
  - source_id: GO:0006741
    title: NADP+ biosynthetic process
    statement: >-
      NAD kinase converts NAD+ to NADP+, linking NAD biosynthesis to NADP(H)
      cofactor supply.
  - source_id: GO:1901848
    title: nicotinate catabolic process
    statement: >-
      The Pseudomonas nic cluster degrades nicotinate as a carbon/nitrogen
      source and is included in the broad KEGG ppu00760 map.
  - source_id: KEGG:ppu00760
    title: Nicotinate and nicotinamide metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but combines
      NAD biosynthesis/salvage with nicotinate catabolism and multiple
      side-node enzymes.
  - source_id: file:modules/nad_biosynthesis_and_nicotinate_metabolism-deep-research-falcon.md
    title: Falcon module review for NAD biosynthesis and nicotinate metabolism
    statement: >-
      Module-level synthesis supports splitting ppu00760 into core
      biosynthesis/salvage/redox and nicotinate-catabolic steps plus
      boundary-context enzymes.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__nad_biosynthesis_and_nicotinate_metabolism__ppu00760-deep-research-falcon.md
    title: Falcon pathway/taxon review for PSEPK ppu00760
    statement: >-
      Species-aware synthesis assessed 19 candidate genes as genuine pathway
      components, 10 as boundary-only, PP_3103 as candidate-uncertain, and
      PncA nicotinamidase as an unresolved salvage gap.
  - source_id: UniPathway:UPA00253
    title: NAD biosynthesis
    statement: >-
      UniPathway UPA00253 cross-references the de novo and nicotinate-salvage
      NAD biosynthesis candidates in this organism.
  - source_id: UniPathway:UPA01010
    title: Nicotinate degradation
    statement: >-
      UniPathway UPA01010 cross-references the local nicotinate-catabolic nic
      cluster candidates.
module:
  id: nad_biosynthesis_and_nicotinate_metabolism
  label: NAD biosynthesis and nicotinate metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: NAD+ biosynthetic process
      term:
        id: GO:0009435
        label: NAD+ biosynthetic process
      description: Biosynthesis of NAD+ from de novo and salvage precursors.
    - preferred_term: NAD+ biosynthetic process via the salvage pathway
      term:
        id: GO:0034355
        label: NAD+ biosynthetic process via the salvage pathway
      description: Salvage-route formation of NAD+ from nicotinate or nicotinamide-derived intermediates.
    - preferred_term: NADP+ biosynthetic process
      term:
        id: GO:0006741
        label: NADP+ biosynthetic process
      description: Biosynthesis of NADP+ from NAD+.
    - preferred_term: nicotinate catabolic process
      term:
        id: GO:1901848
        label: nicotinate catabolic process
      description: Catabolic conversion of nicotinate through the aerobic nic cluster route.
  parts:
    - order: 1
      role: de novo NAD+ biosynthesis from L-aspartate
      node:
        id: de_novo_nad_biosynthesis
        label: De novo NAD+ biosynthesis
        module_type: METABOLIC_PATHWAY
        description: >-
          NadB and NadA form quinolinate from L-aspartate and dihydroxyacetone
          phosphate; NadC converts quinolinate to NaMN, NadD converts NaMN to
          deamido-NAD+, and NadE amidates deamido-NAD+ to NAD+.
        annotons:
          - id: nadB_l_aspartate_oxidase
            label: NadB L-aspartate oxidase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK nadB
                term:
                  id: UniProtKB:Q88MZ2
                  label: L-aspartate oxidase
            function:
              preferred_term: L-aspartate oxidase activity
              term:
                id: GO:0008734
                label: L-aspartate oxidase activity
              substrates:
                - preferred_term: L-aspartate
              products:
                - preferred_term: iminoaspartate
              evidence:
                - source_id: EC:1.4.3.16
                  statement: L-aspartate oxidase
            role_description: First committed de novo NAD biosynthesis step from L-aspartate.
          - id: nadA_quinolinate_synthase
            label: NadA quinolinate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK nadA
                term:
                  id: UniProtKB:Q88NH8
                  label: Quinolinate synthase
            function:
              preferred_term: quinolinate synthetase A activity
              term:
                id: GO:0008987
                label: quinolinate synthetase A activity
              substrates:
                - preferred_term: iminoaspartate
                - preferred_term: dihydroxyacetone phosphate
              products:
                - preferred_term: quinolinate
              evidence:
                - source_id: EC:2.5.1.72
                  statement: quinolinate synthase
            role_description: Forms quinolinate for pyridine nucleotide biosynthesis.
          - id: nadC_quinolinate_phosphoribosyltransferase
            label: NadC nicotinate-nucleotide diphosphorylase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK nadC
                term:
                  id: UniProtKB:Q88PR1
                  label: Nicotinate-nucleotide diphosphorylase
            function:
              preferred_term: nicotinate-nucleotide diphosphorylase (carboxylating) activity
              term:
                id: GO:0004514
                label: nicotinate-nucleotide diphosphorylase (carboxylating) activity
              substrates:
                - preferred_term: quinolinate
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate
              products:
                - preferred_term: nicotinate D-ribonucleotide
              evidence:
                - source_id: EC:2.4.2.19
                  statement: nicotinate-nucleotide diphosphorylase
            role_description: Converts quinolinate to NaMN.
          - id: nadD_nicotinate_nucleotide_adenylyltransferase
            label: NadD nicotinate-nucleotide adenylyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK nadD
                term:
                  id: UniProtKB:Q88DL5
                  label: Nicotinate-nucleotide adenylyltransferase
            function:
              preferred_term: nicotinate-nucleotide adenylyltransferase activity
              term:
                id: GO:0004515
                label: nicotinate-nucleotide adenylyltransferase activity
              substrates:
                - preferred_term: nicotinate D-ribonucleotide
                - preferred_term: ATP
              products:
                - preferred_term: deamido-NAD+
              evidence:
                - source_id: EC:2.7.7.18
                  statement: nicotinate-nucleotide adenylyltransferase
            role_description: Converts NaMN to deamido-NAD+.
          - id: nadE_nad_synthetase
            label: NadE NAD+ synthetase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK nadE
                term:
                  id: UniProtKB:Q88DF6
                  label: NAD+ synthetase
            function:
              preferred_term: NAD+ synthase activity
              term:
                id: GO:0008795
                label: NAD+ synthase activity
              substrates:
                - preferred_term: deamido-NAD+
                - preferred_term: ammonium
                - preferred_term: ATP
              products:
                - preferred_term: NAD+
              evidence:
                - source_id: EC:6.3.1.5
                  statement: ammonia-dependent NAD+ synthetase
            role_description: Final amidation step to NAD+.
    - order: 2
      role: nicotinate salvage to NAD+
      node:
        id: nicotinate_salvage
        label: Nicotinate salvage to NAD+
        module_type: METABOLIC_PATHWAY
        description: >-
          PncB converts nicotinate to NaMN, feeding the NadD/NadE route to
          NAD+. PncC can convert nicotinamide mononucleotide to NaMN and is
          treated as salvage context. A canonical PncA nicotinamidase candidate
          was not identified in this ppu00760 candidate set and remains a
          salvage-gap question.
        annotons:
          - id: pncB_nicotinate_phosphoribosyltransferase
            label: PncB nicotinate phosphoribosyltransferase
            participant:
