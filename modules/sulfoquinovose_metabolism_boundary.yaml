id: MODULE:sulfoquinovose_metabolism_boundary
title: Sulfoquinovose metabolism boundary
description: >-
  Boundary/absence module for KEGG ppu00566 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only yihS, assigned by KEGG to K18479
  sulfoquinovose isomerase, and mdh, the central-carbon NAD-dependent malate
  dehydrogenase. This candidate set does not satisfy a complete sulfoquinovose
  degradation pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00566
    title: Sulfoquinovose metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00566 provides the PSEPK curation batch. Its membership contains
      PP_1014/yihS as K18479 sulfoquinovose isomerase and PP_0654/mdh as K00024
      malate dehydrogenase, so the batch is treated as a boundary/absence map
      rather than a complete sulfoglycolysis route.
module:
  id: sulfoquinovose_metabolism_boundary
  label: Sulfoquinovose metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: sulfoquinovose isomerase activity
      term:
        id: GO:0061593
        label: sulfoquinovose isomerase activity
      description: KEGG-specific candidate activity for YihS/PP_1014.
    - preferred_term: 6-sulfoquinovose(1-) catabolic process
      term:
        id: GO:1902777
        label: 6-sulfoquinovose(1-) catabolic process
      description: Broad sulfoquinovose degradation context; not satisfied as a full pathway by the PSEPK ppu00566 membership.
    - preferred_term: L-malate dehydrogenase (NAD+) activity
      term:
        id: GO:0030060
        label: L-malate dehydrogenase (NAD+) activity
      description: Central-carbon Mdh activity included by KEGG as a side/boundary node.
  parts:
    - order: 1
      role: Candidate sulfoquinovose isomerase entry point
      node:
        id: yihS_sulfoquinovose_isomerase_candidate
        label: YihS sulfoquinovose-isomerase candidate
        module_type: REACTION
        description: >-
          KEGG assigns yihS/PP_1014 to K18479 sulfoquinovose isomerase
          (EC 5.3.1.31), while UniProt/GOA currently annotate the same protein
          as an aldose-ketose/mannose isomerase. The gene-level review should
          record this discrepancy rather than treating the pathway as complete.
        annotons:
          - id: yihS_sulfoquinovose_isomerase_candidate
            label: "yihS: candidate sulfoquinovose isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: yihS
            function:
              preferred_term: sulfoquinovose isomerase activity
              term:
                id: GO:0061593
                label: sulfoquinovose isomerase activity
            role_description: KEGG-specific K18479 candidate entry point into sulfoquinovose metabolism.
    - order: 2
      role: Central-carbon dehydrogenase side node
      node:
        id: mdh_malate_dehydrogenase_boundary
        label: Mdh malate-dehydrogenase boundary node
        module_type: REACTION
        description: >-
          mdh/PP_0654 is a reviewed NAD-dependent malate dehydrogenase with core
          TCA-cycle function. Its presence in KEGG ppu00566 should be read as a
          central-carbon dehydrogenase side node rather than evidence for a
          complete sulfoquinovose catabolic pathway.
        annotons:
          - id: mdh_malate_dehydrogenase_side_context
            label: "mdh: malate dehydrogenase side context"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mdh
            function:
              preferred_term: L-malate dehydrogenase (NAD+) activity
              term:
                id: GO:0030060
                label: L-malate dehydrogenase (NAD+) activity
            role_description: TCA-cycle malate dehydrogenase side context in ppu00566.
  notes: >-
    The module is intentionally a boundary/absence document. It preserves the
    KEGG YihS sulfoquinovose-isomerase hypothesis as a curation question while
    avoiding a false claim that KT2440 encodes a complete sulfoquinovose
    degradation route from the two-member KEGG batch.
