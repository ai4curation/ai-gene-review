id: MODULE:ketogenesis
title: Ketogenesis (hepatic ketone body synthesis)
description: >-
  Ketogenesis is the mitochondrial pathway, operating chiefly in liver during
  fasting, starvation, prolonged exercise and low-carbohydrate states, that
  converts acetyl-CoA (mostly from fatty-acid beta-oxidation) into the circulating
  ketone bodies acetoacetate and (R)-3-hydroxybutyrate, which supply oxidizable
  fuel to brain, heart and muscle when glucose is scarce. Four mitochondrial-matrix
  steps: mitochondrial acetyl-CoA acetyltransferase (thiolase, ACAT1) condenses two
  acetyl-CoA to acetoacetyl-CoA; the rate-limiting, fasting-induced mitochondrial
  HMG-CoA synthase (HMGCS2) adds a third acetyl-CoA to give
  3-hydroxy-3-methylglutaryl-CoA (HMG-CoA); HMG-CoA lyase (HMGCL) cleaves HMG-CoA to
  acetoacetate + acetyl-CoA; and the inner-membrane NAD+-dependent
  D-3-hydroxybutyrate dehydrogenase (BDH1) reversibly reduces acetoacetate to
  (R)-3-hydroxybutyrate, the predominant blood ketone. The pathway shares the HMGCL
  step with leucine catabolism and shares BDH1 (run in reverse) with ketolysis;
  liver exports the ketone bodies because it lacks the ketolytic enzyme OXCT1/SCOT.
  Inherited defects: HMGCS2 deficiency and HMGCL deficiency cause fasting
  hypoketotic hypoglycemia; ACAT1 (beta-ketothiolase) deficiency affects both
  ketone-body and isoleucine metabolism. (Ketone-body UTILIZATION/ketolysis in
  peripheral tissues — BDH1 -> OXCT1 -> ACAT1 -> 2 acetyl-CoA — is modelled
  separately in MODULE:ketone_body_oxidation.)
status: DRAFT
evidence:
  - source_id: GO:0046951
    title: ketone body biosynthetic process
    statement: >-
      The module is grounded in the GO ketone body biosynthetic process
      (GO:0046951); each step is annotated within it.
  - source_id: Reactome:R-HSA-77111
    title: Synthesis of Ketone Bodies
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome "Synthesis
      of Ketone Bodies" pathway (R-HSA-77111): R-HSA-73916 (ACAT1), R-HSA-73918
      (HMGCS2), R-HSA-74180 (HMGCL) and R-HSA-73912 (BDH1).
  - source_id: file:human/ACAT1/ACAT1-ai-review.yaml
    title: ACAT1 gene review (human)
    statement: >-
      The thiolase step grounding (UniProtKB:P24752, GO:0003985 acetyl-CoA
      C-acetyltransferase activity) matches the completed human ACAT1 review.
  - source_id: file:human/HMGCS2/HMGCS2-ai-review.yaml
    title: HMGCS2 gene review (human)
    statement: >-
      The rate-limiting HMG-CoA synthase step (UniProtKB:P54868, GO:0004421
      hydroxymethylglutaryl-CoA synthase activity) matches the completed human
      HMGCS2 review.
  - source_id: file:human/HMGCL/HMGCL-ai-review.yaml
    title: HMGCL gene review (human)
    statement: >-
      The HMG-CoA lyase step (UniProtKB:P35914, GO:0004419) matches the completed
      human HMGCL review (shared with leucine catabolism).
  - source_id: file:human/BDH1/BDH1-ai-review.yaml
    title: BDH1 gene review (human)
    statement: >-
      The 3-hydroxybutyrate dehydrogenase step (UniProtKB:Q02338, GO:0003858)
      matches the completed human BDH1 review.
module:
  id: ketogenesis
  label: Ketogenesis (ketone body synthesis)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: ketone body biosynthetic process
      term:
        id: GO:0046951
        label: ketone body biosynthetic process
      description: >-
        Hepatic mitochondrial synthesis of acetoacetate and 3-hydroxybutyrate
        from acetyl-CoA.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of the ACAT1, HMGCS2 and HMGCL steps.
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: Location of the BDH1 step.
  parts:
    - order: 1
      role: thiolytic condensation of two acetyl-CoA
      node:
        id: acat1_step
        label: 2 acetyl-CoA to acetoacetyl-CoA + CoA
        module_type: REACTION
        annotons:
          - id: acat1_activity
            label: "ACAT1: acetyl-CoA acetyltransferase (thiolase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Thiolase (acetyl-CoA C-acyltransferase) family (ACAT1)
                term:
                  id: PANTHER:PTHR18919
                  label: ACETYL-COA C-ACYLTRANSFERASE
                representative_members:
                  - preferred_term: ACAT1 (human, mitochondrial)
                    term:
                      id: UniProtKB:P24752
                      label: Acetyl-CoA acetyltransferase, mitochondrial
            function:
              preferred_term: acetyl-CoA C-acetyltransferase activity
              term:
                id: GO:0003985
                label: acetyl-CoA C-acetyltransferase activity
              substrates:
                - preferred_term: acetyl-CoA (x2)
              products:
                - preferred_term: acetoacetyl-CoA
                - preferred_term: coenzyme A
              evidence:
                - source_id: EC:2.3.1.9
                  statement: acetyl-CoA C-acetyltransferase (thiolase)
                - source_id: Reactome:R-HSA-73916
                  statement: "2 acetyl-CoA <=> acetoacetyl-CoA + CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Condenses two acetyl-CoA to acetoacetyl-CoA (the reverse of its
              thiolytic role in isoleucine catabolism and ketolysis). ACAT1
              deficiency (beta-ketothiolase deficiency) affects both ketone-body and
              isoleucine metabolism.
    - order: 2
      role: rate-limiting HMG-CoA synthesis
      node:
        id: hmgcs2_step
        label: acetoacetyl-CoA + acetyl-CoA to HMG-CoA + CoA
        module_type: REACTION
        annotons:
          - id: hmgcs2_activity
            label: "HMGCS2: mitochondrial HMG-CoA synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HMG-CoA synthase family (HMGCS2/HMGCS1)
                term:
                  id: PANTHER:PTHR43323
                  label: 3-HYDROXY-3-METHYLGLUTARYL COENZYME A SYNTHASE
                representative_members:
                  - preferred_term: HMGCS2 (human, mitochondrial/ketogenic)
                    term:
                      id: UniProtKB:P54868
                      label: Hydroxymethylglutaryl-CoA synthase, mitochondrial
            function:
              preferred_term: hydroxymethylglutaryl-CoA synthase activity
              term:
                id: GO:0004421
                label: hydroxymethylglutaryl-CoA synthase activity
              substrates:
                - preferred_term: acetoacetyl-CoA
                - preferred_term: acetyl-CoA
                - preferred_term: water
              products:
                - preferred_term: (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA)
                - preferred_term: coenzyme A
              evidence:
                - source_id: EC:2.3.3.10
                  statement: hydroxymethylglutaryl-CoA synthase
                - source_id: Reactome:R-HSA-73918
                  statement: "acetoacetyl-CoA+acetyl-CoA => HMG-CoA + CoASH (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Committed, rate-limiting, fasting-induced (PPARalpha/FGF21) ketogenic
              enzyme; the mitochondrial isoform, distinct from cytosolic HMGCS1 of
              mevalonate/cholesterol synthesis. Deficiency causes fasting hypoketotic
              hypoglycemia.
    - order: 3
      role: cleavage to acetoacetate (shared with leucine catabolism)
      node:
        id: hmgcl_step
        label: HMG-CoA to acetoacetate + acetyl-CoA
        module_type: REACTION
        annotons:
          - id: hmgcl_activity
            label: "HMGCL: HMG-CoA lyase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Hydroxymethylglutaryl-CoA lyase family (HMGCL)
                term:
                  id: PANTHER:PTHR42738
                  label: HYDROXYMETHYLGLUTARYL-COA LYASE
                representative_members:
                  - preferred_term: HMGCL (human)
                    term:
                      id: UniProtKB:P35914
                      label: Hydroxymethylglutaryl-CoA lyase, mitochondrial
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
              substrates:
                - preferred_term: (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA)
              products:
                - preferred_term: acetoacetate
                - preferred_term: acetyl-CoA
              evidence:
                - source_id: EC:4.1.3.4
                  statement: hydroxymethylglutaryl-CoA lyase
                - source_id: Reactome:R-HSA-74180
                  statement: "HMG CoA => acetoacetic acid + acetyl CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Produces free acetoacetate. The same enzyme performs the terminal
              step of leucine catabolism (see the leucine_catabolism module);
              deficiency blocks both ketogenesis and leucine degradation.
    - order: 4
      role: reduction to the predominant blood ketone
      node:
        id: bdh1_step
        label: acetoacetate + NADH to (R)-3-hydroxybutyrate + NAD+
        module_type: REACTION
        annotons:
          - id: bdh1_activity
            label: "BDH1: D-3-hydroxybutyrate dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 3-hydroxybutyrate dehydrogenase (SDR) family (BDH1)
                term:
                  id: PANTHER:PTHR43313
                  label: SHORT-CHAIN DEHYDROGENASE/REDUCTASE FAMILY 9C
                representative_members:
                  - preferred_term: BDH1 (human)
                    term:
                      id: UniProtKB:Q02338
                      label: D-beta-hydroxybutyrate dehydrogenase, mitochondrial
            function:
              preferred_term: 3-hydroxybutyrate dehydrogenase activity
              term:
                id: GO:0003858
                label: 3-hydroxybutyrate dehydrogenase activity
              substrates:
                - preferred_term: acetoacetate
                - preferred_term: NADH
              products:
                - preferred_term: (R)-3-hydroxybutyrate
                - preferred_term: NAD+
              evidence:
                - source_id: EC:1.1.1.30
                  statement: 3-hydroxybutyrate dehydrogenase (NAD+)
                - source_id: Reactome:R-HSA-73912
                  statement: "acetoacetic acid + NADH + H+ <=> beta-hydroxybutyrate + NAD+ (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Reversible, NAD+-dependent, phosphatidylcholine-requiring
              interconversion of acetoacetate and (R)-3-hydroxybutyrate; sets the
              ratio of the two circulating ketone bodies. The same enzyme run in
              reverse initiates ketolysis in peripheral tissues.
  connections:
    - source: acat1_step
      target: hmgcs2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Acetoacetyl-CoA from ACAT1 is condensed with acetyl-CoA by HMGCS2.
    - source: hmgcs2_step
      target: hmgcl_step
      connection_type: PROVIDES_INPUT_FOR
      description: HMG-CoA from HMGCS2 is cleaved by HMGCL.
    - source: hmgcl_step
      target: bdh1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Acetoacetate from HMGCL is reduced by BDH1 to (R)-3-hydroxybutyrate (the
        two are exported as the circulating ketone bodies).
  notes: >-
    Four-step hepatic mitochondrial ketogenesis grounded to the human enzymes
    ACAT1 (UniProtKB:P24752, GO:0003985, EC 2.3.1.9), HMGCS2 (P54868, GO:0004421,
    EC 2.3.3.10), HMGCL (P35914, GO:0004419, EC 4.1.3.4) and BDH1 (Q02338,
    GO:0003858, EC 1.1.1.30). GO molecular-function/cellular-component terms were
    taken from the human GOA records; Reactome reaction ids and titles were verified
    against the local reactome cache. Each step uses a PANTHER family selector
    (generic over paralogs and orthologs) plus a concrete human representative
    member. Upstream, the acetyl-CoA substrate derives mainly from fatty-acid
    beta-oxidation; the HMGCL step is shared with leucine catabolism; and BDH1 plus
    the ketolytic enzyme OXCT1/SCOT run the reverse (utilization) pathway modelled in
    MODULE:ketone_body_oxidation. HMGCS2 is the mitochondrial/ketogenic isoform,
    distinct from the cytosolic mevalonate-pathway HMGCS1.
