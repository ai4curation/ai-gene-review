    - source: amp_deamination
      target: imp_gmp_5nt
      connection_type: PROVIDES_INPUT_FOR
      description: AMPD-made IMP is dephosphorylated by NT5C2.
    - source: cyto_amp_5nt
      target: adenosine_deamination
      connection_type: PROVIDES_INPUT_FOR
      description: NT5C1A-made adenosine is deaminated by ADA.
    - source: ecto_amp_5nt
      target: adenosine_deamination
      connection_type: PROVIDES_INPUT_FOR
      description: Extracellular adenosine from CD73 (after re-uptake) feeds the adenosine pool deaminated by ADA.
    - source: adenosine_deamination
      target: nucleoside_phosphorolysis
      connection_type: PROVIDES_INPUT_FOR
      description: ADA-made inosine is phosphorolysed by PNP.
    - source: imp_gmp_5nt
      target: nucleoside_phosphorolysis
