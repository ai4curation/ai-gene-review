  notes: >-
    Purine nucleotide catabolism to urate (GO:0006195 -> GO:0034418), grounded to nine completed human gene
    reviews (four new: NT5C1A/NT5C2/NT5E/GDA; four already-merged cited as nodes: AMPD2/AMPD3 PTHR11359,
    ADA PTHR11409, PNP PTHR11904, XDH PTHR45444). Converging routes: AMP -> IMP (AMPD, GO:0003876) or AMP ->
    adenosine (cytosolic NT5C1A Q9BXI3 PTHR31367 / ecto NT5E-CD73 P21589 PTHR11575, both GO:0008253);
    adenosine -> inosine (ADA P00813, GO:0004000); IMP/GMP -> inosine/guanosine (NT5C2 P49902 PTHR12103,
    GO:0008253); inosine/guanosine -> hypoxanthine/guanine (PNP P00491, GO:0004731); guanine -> xanthine
    (GDA Q9Y2T3 PTHR11271, GO:0008892, Zn2+); hypoxanthine/xanthine -> urate (XDH P47989, GO:0004854). Most
    steps cytosolic; NT5E acts extracellularly (GPI-anchored, GO:0009897). Curation notes from the new
    reviews: NT5C1A GOA cites a transposed PMID:599155 (should be 7599155) -> UNDECIDED/WRONG_IDENTIFIER;
    NT5C2's single-paper E3-ligase/antiviral moonlighting flagged DISPUTED; GDA cypin/dendrite role kept
    non-core; the humans-lack-urate-oxidase allantoin annotations kept non-core (urate is the human end
    product). Diseases: ADA/PNP deficiency (immunodeficiency), XDH (xanthinuria), NT5E (ACDC arterial
    calcification), NT5C2 (ALL relapse; SPG45/65). GO term ids/labels verified against the local go.db;
    module passes structural + term-label validation.
