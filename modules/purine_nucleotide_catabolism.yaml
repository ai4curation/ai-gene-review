      target: guanine_deamination
      connection_type: PROVIDES_INPUT_FOR
      description: PNP-liberated guanine is deaminated by GDA.
    - source: nucleoside_phosphorolysis
      target: purine_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: PNP-liberated hypoxanthine is oxidised by XDH.
    - source: guanine_deamination
      target: purine_oxidation
      connection_type: PROVIDES_INPUT_FOR
