id: MODULE:purine_nucleotide_catabolism
title: Purine nucleotide catabolism to urate (5'-nucleotidases / deaminases -> PNP -> XDH)
description: >-
  Purine ribonucleotides are catabolised to the excretory end-product uric acid through a converging network
  of dephosphorylation, deamination and phosphorolysis reactions. AMP is either deaminated to IMP by AMP
  deaminase (AMPD1/2/3) or dephosphorylated to adenosine by a 5'-nucleotidase — the cytosolic AMP-preferring
  NT5C1A or the GPI-anchored cell-surface ecto-5'-nucleotidase NT5E (CD73), whose extracellular adenosine is
  also a major purinergic signal. Adenosine is deaminated to inosine by adenosine deaminase (ADA). IMP and GMP
  are dephosphorylated to inosine and guanosine by the cytosolic 5'-nucleotidase NT5C2. Purine-nucleoside
  phosphorylase (PNP) then removes the ribose from inosine, guanosine and their deoxy forms, giving
  hypoxanthine and guanine. Guanine is deaminated to xanthine by guanine deaminase (GDA), while hypoxanthine
  is oxidised to xanthine and xanthine to urate by xanthine dehydrogenase/oxidase (XDH). Defects across the
  pathway cause disease: ADA and PNP deficiencies cause severe combined / T-cell immunodeficiency, XDH
  deficiency causes xanthinuria, NT5E loss-of-function causes arterial calcification (ACDC), and activating
  NT5C2 mutations drive relapse in acute lymphoblastic leukaemia.
status: DRAFT
evidence:
  - source_id: GO:0006195
    title: purine nucleotide catabolic process
    statement: The module degrades purine nucleotides via dephosphorylation, deamination and phosphorolysis (GO:0006195).
  - source_id: GO:0034418
    title: urate biosynthetic process
    statement: XDH oxidises hypoxanthine/xanthine to the end-product urate (GO:0034418).
  - source_id: file:human/NT5C1A/NT5C1A-ai-review.yaml
    title: NT5C1A gene review (human)
    statement: Cytosolic AMP-preferring 5'-nucleotidase (UniProtKB:Q9BXI3, GO:0008253) matches the completed human NT5C1A review.
  - source_id: file:human/NT5C2/NT5C2-ai-review.yaml
    title: NT5C2 gene review (human)
    statement: Cytosolic IMP/GMP-preferring 5'-nucleotidase (UniProtKB:P49902, GO:0008253) matches the completed human NT5C2 review.
  - source_id: file:human/NT5E/NT5E-ai-review.yaml
    title: NT5E gene review (human)
    statement: Ecto-5'-nucleotidase / CD73 (UniProtKB:P21589, GO:0008253) matches the completed human NT5E review.
  - source_id: file:human/GDA/GDA-ai-review.yaml
    title: GDA gene review (human)
    statement: Guanine deaminase (UniProtKB:Q9Y2T3, GO:0008892) matches the completed human GDA review.
  - source_id: file:human/AMPD2/AMPD2-ai-review.yaml
    title: AMPD2 gene review (human)
    statement: AMP deaminase (UniProtKB:Q01433, GO:0003876) matches the completed human AMPD2 review.
  - source_id: file:human/ADA/ADA-ai-review.yaml
    title: ADA gene review (human)
    statement: Adenosine deaminase (UniProtKB:P00813, GO:0004000) matches the completed human ADA review.
