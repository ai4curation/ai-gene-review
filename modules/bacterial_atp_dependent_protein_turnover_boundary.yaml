id: MODULE:bacterial_atp_dependent_protein_turnover_boundary
title: Bacterial ATP-dependent protein turnover boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 ATP-dependent protease and
  protein-turnover split from the protein folding/targeting/turnover functional
  bucket. The module separates catalytic Lon, ClpP, and HslV protease subunits
  from AAA+ ATPase/unfoldase subunits, substrate adaptors, and low-confidence
  domain fragments.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_atp_dependent_protease_turnover.tsv
    title: PSEPK ATP-dependent protease and protein-turnover split
    statement: >-
      The batch table assigns PP_0680, sspB, lon-I, clpP, clpX, lon-II,
      PP_3045, PP_3267, clpA, clpS, PP_4814, hslV, and hslU to this split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was split into chaperone/foldase, ATP-dependent
      protease, cofactor maturation, peptidase, quality-control, phage/mobile,
      and low-information sub-buckets.
  - source_id: file:PSEPK/lon-I/lon-I-ai-review.yaml
    title: Curated lon-I review
    statement: >-
      The lon-I review accepts ATP-dependent peptidase activity, ATP hydrolysis,
      cytoplasm, protein quality control, protein catabolism, heat-response
      context, and secondary sequence-specific DNA binding.
  - source_id: file:PSEPK/clpA/clpA-ai-review.yaml
    title: Curated clpA review
    statement: >-
      The clpA review removes the serine endopeptidase annotation because ClpA
      is the AAA+ ATPase/unfoldase partner rather than the ClpP catalytic
      subunit.
  - source_id: file:PSEPK/hslU/hslU-ai-review.yaml
    title: Curated hslU review
    statement: >-
      The hslU review removes peptidase activity and retains ATP hydrolysis,
      proteasome-activating activity, protein unfolding, and HslUV complex
      membership.
notes: >-
  First-pass interpretation: ATP-dependent degradation in this split is handled
  as a set of related protease systems rather than one linear pathway. Catalytic
  terms are restricted to protease subunits or full-length Lon-family enzymes.
  ATPase-only subunits and adaptors are represented by unfoldase, ATPase,
  endopeptidase-regulator, or adaptor functions. PP_4814 is left no-core because
  it appears to contain a Lon N-terminal/substrate-binding domain without clear
  ATPase or protease catalytic domains.
