id: MODULE:polyamine_transport_boundary
title: Polyamine transport boundary
description: Boundary module for Pseudomonas putida KT2440 polyamine transport components encountered during ppu02010 and ppu02024 ABC-transporter/quorum-sensing-map partitioning. The module separates complete or near-complete Pot/Spu/Ydc-like polyamine ABC import loci from singleton PotF-like or binding-protein boundary components whose cognate partners remain unresolved.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes PP_5177-PP_5181 as a coherent Spu/Pot spermidine/putrescine ABC-import locus, and also contributes potF-I, PP_2195, potF-II, PP_3719, potF-III, and potF-IV as PotF-like polyamine-binding singleton or boundary components.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records cluster C70 as PP_5177/spuH, PP_5178/spuG, PP_5179/spuF, PP_5180/spuE, and PP_5181/spuD, and records the PotF-like paralogs as additional polyamine-binding boundary components.
- source_id: UniProtKB:Q88CK3
  title: spuH putrescine/polyamine ABC importer permease
  statement: UniProt records spuH (PP_5177) as Putrescine transport system permease protein PotI.
