    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/retinoic_acid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Allosteric integration in multi-domain receptor complexes remains unresolved in 
      the Retinoic acid receptor signaling pathway module.
    boundary: The full-length RXRalpha-RARbeta crystal structure revealed direct physical contacts 
      between the DBD and LBD of RARbeta that propagate signals bidirectionally, such that DNA 
      sequence identity at the RARE can influence ligand-dependent coregulator recruitment at the 
      LBD, and vice versa (rastinejad2022retinoicacidreceptor pages 6-7, 
      rastinejad2022retinoicacidreceptor pages 7-9).
    gap_kind:
