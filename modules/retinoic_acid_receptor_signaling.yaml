knowledge_gaps:
  - gap_statement: Permissiveness of RAR-RXR heterodimers remains unresolved in the Retinoic acid 
      receptor signaling pathway module.
    boundary: Whether RXR is truly "silent" or conditionally active within RAR-RXR heterodimers 
      remains debated. Classical models classified RAR-RXR as non-permissive, meaning RXR ligands 
      alone could not activate the complex.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/retinoic_acid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Identity of the endogenous RXR ligand remains unresolved in the Retinoic acid 
      receptor signaling pathway module.
    boundary: While 9-*cis*-RA was the initially identified RXR ligand, its physiological presence 
      at relevant concentrations has been questioned. The discovery of 9-*cis*-13,14-dihydroretinoic
      acid (9-*cis*-DHRA) as an endogenous RXR ligand derived from a distinct "vitamin A5/X" 
      precursor pathway has introduced new complexity, but the metabolic origins and tissue 
      distribution of this ligand are not fully mapped (sharma2022retinoi...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/retinoic_acid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Non-redundant functions of NCOR1 versus SMRT remains unresolved in the Retinoic 
      acid receptor signaling pathway module.
    boundary: Although NCOR1 and SMRT share ~270 kDa scaffold architecture and extensive sequence 
      homology, they are non-interchangeable in vivo (bawa2026nuclearreceptorcoregulator pages 3-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/retinoic_acid_receptor_signaling-deep-research-falcon.md
  - gap_statement: CRABP1 non-canonical signaling scope remains unresolved in the Retinoic acid 
      receptor signaling pathway module.
    boundary: The non-canonical "signalosome" functions of CRABP1 - modulating MAPK, CaMKII, and 
      eIF2alpha pathways in a rapid, RAR-independent manner - represent a conceptually distinct arm 
      of RA biology that is still being mapped (nhieu2025targetingcrabp1signalosomes pages 11-13, 
      nhieu2022crabp1innoncanonical pages 1-2, nhieu2025targetingcrabp1signalosomes pages 9-11, 
      nhieu2022crabp1innoncanonical pages 2-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/retinoic_acid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Gain-of-function versus loss-of-function discrepancies remains unresolved in the 
      Retinoic acid receptor signaling pathway module.
    boundary: A persistent challenge in the field is that RA gain-of-function studies (exogenous RA 
      treatment) often produce conclusions about normal development that conflict with RAR or RA 
      loss-of-function genetic studies (berenguer2022retinoicacidrars pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
