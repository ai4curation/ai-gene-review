notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit evidence,
  structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions: Permissiveness
  of RAR-RXR heterodimers; Identity of the endogenous RXR ligand; Non-redundant functions of NCOR1 versus
  SMRT; CRABP1 non-canonical signaling scope; Gain-of-function versus loss-of-function discrepancies;
  Allosteric integration in multi-domain receptor complexes. Machine-generated Falcon citations remain
  curation support and are not manually adjudicated here.
