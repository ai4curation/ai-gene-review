id: MODULE:beta_lactam_resistance_boundary
title: beta-Lactam resistance boundary
description: >-
  Boundary module for KEGG ppu01501 in Pseudomonas putida KT2440. The KEGG
  beta-lactam-resistance map combines direct antibiotic hydrolysis by AmpC,
  peptidoglycan recycling and AmpG/NagZ signaling context, penicillin-binding
  peptidoglycan transpeptidase targets, RND/TolC-like efflux systems, and
  outer-membrane permeability nodes such as OprD. These genes do not form one
  linear metabolic pathway; the module separates resistance mechanisms and
  envelope side context.
status: DRAFT
evidence:
  - source_id: KEGG:ppu01501
    title: beta-Lactam resistance - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu01501 provides the PSEPK curation batch. Its 20 mapped members
      span AmpC beta-lactamase, AmpG/NagZ cell-wall recycling, PBP targets,
      RND/MFP/OMF efflux components, and OprD/opmQ permeability or export
      nodes.
  - source_id: file:projects/P_PUTIDA/batches/ppu01501_beta_lactam_resistance_boundary.tsv
    title: PSEPK ppu01501 beta-lactam-resistance batch
    statement: >-
      The batch records all 20 PSEPK members and their review/Asta status after
      the first-pass curation sweep.
module:
  id: beta_lactam_resistance_boundary
  label: beta-Lactam resistance boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: beta-lactamase activity
      term:
        id: GO:0008800
        label: beta-lactamase activity
      description: Direct beta-lactam hydrolysis by AmpC.
    - preferred_term: beta-lactam antibiotic catabolic process
      term:
        id: GO:0030655
        label: beta-lactam antibiotic catabolic process
      description: Breakdown of beta-lactam antibiotics by beta-lactamase activity.
    - preferred_term: response to antibiotic
      term:
        id: GO:0046677
        label: response to antibiotic
      description: Broad antibiotic-response context used sparingly for resistance phenotypes.
    - preferred_term: efflux transmembrane transporter activity
      term:
        id: GO:0015562
        label: efflux transmembrane transporter activity
      description: Complex-level efflux transporter activity represented by RND transporters and OMF components.
    - preferred_term: xenobiotic transmembrane transporter activity
      term:
        id: GO:0042910
        label: xenobiotic transmembrane transporter activity
      description: Substrate-specific RND inner-membrane transporter activity.
    - preferred_term: efflux pump complex
      term:
        id: GO:1990281
        label: efflux pump complex
      description: Tripartite efflux assembly context for RND/MFP/OMF components.
    - preferred_term: porin activity
      term:
        id: GO:0015288
        label: porin activity
      description: Outer-membrane porin permeability context represented by OprD.
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: PBP/transpeptidase target context for beta-lactams.
    - preferred_term: penicillin binding
      term:
        id: GO:0008658
        label: penicillin binding
      description: Non-core but biologically relevant PBP beta-lactam-binding property.
    - preferred_term: peptidoglycan turnover
      term:
        id: GO:0009254
        label: peptidoglycan turnover
      description: NagZ cell-wall recycling context tied to AmpC regulation.
    - preferred_term: transmembrane transporter activity
      term:
        id: GO:0022857
        label: transmembrane transporter activity
      description: Broad transporter activity used for AmpG where no specific muropeptide transporter GO term is present in GOA.
  parts:
    - order: 1
      role: Resistance-mechanism boundary
      node:
        id: beta_lactam_resistance_mechanism_boundary
        label: beta-Lactam resistance mechanism boundary
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu01501 batch is a resistance-mechanism collection, not a single
          reaction sequence. Treat direct beta-lactam hydrolysis, cell-wall
          recycling, PBP target biology, efflux, and permeability as separate
          subroutes.
        annotons: []
    - order: 2
      role: AmpC hydrolysis and peptidoglycan recycling signal context
      node:
        id: ampc_ampg_nagz_recycling
        label: AmpC hydrolysis and AmpG/NagZ recycling context
        module_type: METABOLIC_PATHWAY
        description: >-
          AmpC is the direct beta-lactamase. AmpG and NagZ connect
          peptidoglycan recycling products to AmpC-type beta-lactamase
          regulatory context in organisms with this resistance logic.
        annotons:
          - id: ampC_beta_lactamase
            label: "ampC: class C beta-lactamase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ampC
            function:
              preferred_term: beta-lactamase activity
              term:
                id: GO:0008800
                label: beta-lactamase activity
            processes:
              - preferred_term: beta-lactam antibiotic catabolic process
                term:
                  id: GO:0030655
                  label: beta-lactam antibiotic catabolic process
            role_description: Direct periplasmic beta-lactam antibiotic hydrolysis.
          - id: ampG_muropeptide_permease
            label: "ampG: muropeptide permease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ampG
            function:
              preferred_term: transmembrane transporter activity
              term:
                id: GO:0022857
                label: transmembrane transporter activity
            role_description: AmpG-family muropeptide permease in cell-wall recycling and beta-lactam-resistance boundary context.
          - id: nagZ_beta_hexosaminidase
            label: "nagZ: beta-N-acetylhexosaminidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nagZ
            function:
              preferred_term: beta-N-acetylhexosaminidase activity
              term:
                id: GO:0004563
                label: beta-N-acetylhexosaminidase activity
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Peptidoglycan recycling enzyme that supplies muropeptide context for AmpC-family resistance logic.
    - order: 3
      role: Penicillin-binding peptidoglycan targets
      node:
        id: penicillin_binding_peptidoglycan_targets
        label: Penicillin-binding peptidoglycan targets
        module_type: METABOLIC_PATHWAY
        description: >-
          PBPs are the beta-lactam targets represented in this map. Their core
