            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Septal PBP3/transpeptidase target of beta-lactams.
          - id: mrdA_I_pbp2
            label: "mrdA-I: PBP2 transpeptidase"
            participant:
