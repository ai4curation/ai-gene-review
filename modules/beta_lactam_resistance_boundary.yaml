                label: serine-type D-Ala-D-Ala carboxypeptidase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: PBP2/MrdA paralog and beta-lactam target context.
          - id: mrdA_II_pbp2
            label: "mrdA-II: PBP2 transpeptidase"
            participant:
              selector_type: GENE
