                preferred_term: opmQ
            function:
              preferred_term: efflux transmembrane transporter activity
              term:
                id: GO:0015562
                label: efflux transmembrane transporter activity
            role_description: Pyoverdine export OMF retained as outer-membrane export boundary context, not beta-lactam-specific resistance.
  notes: >-
    This module is deliberately scoped as a resistance-boundary checkpoint. AmpC
    is the direct beta-lactamase; AmpG and NagZ provide peptidoglycan recycling
    context; PBPs are antibiotic targets with primary cell-wall biosynthesis
    roles; and the multiple RND/MFP/OMF/porin proteins represent efflux or
    permeability context. Falcon module-level research remains queued for a
    later pass.
