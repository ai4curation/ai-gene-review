            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Second PBP2/MrdA paralog and beta-lactam target context.
          - id: mrcA_pbp1A
            label: "mrcA: bifunctional PBP1A"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mrcA
            function:
              preferred_term: peptidoglycan glycosyltransferase activity
              term:
                id: GO:0008955
                label: peptidoglycan glycosyltransferase activity
            processes:
              - preferred_term: peptidoglycan biosynthetic process
                term:
                  id: GO:0009252
                  label: peptidoglycan biosynthetic process
            role_description: Class A PBP1A target context with glycosyltransferase and transpeptidase functions.
    - order: 4
      role: RND efflux systems
      node:
        id: rnd_efflux_systems
        label: RND efflux systems
        module_type: TRANSPORT_STEP
        description: >-
          RND transporter, membrane-fusion/adaptor, and outer-membrane-factor
          components provide multidrug or xenobiotic efflux boundary context.
          They may contribute to beta-lactam resistance through reduced
          intracellular or periplasmic antibiotic accumulation, but are not
          beta-lactam-specific enzymes.
        annotons:
          - id: ttgA_efflux_adaptor
