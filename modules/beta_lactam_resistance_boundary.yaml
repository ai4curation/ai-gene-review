                label: efflux transmembrane transporter activity
            role_description: Outer-membrane-factor/TolC-like efflux channel component.
          - id: PP_3582_outer_membrane_efflux_factor
            label: "PP_3582: outer-membrane efflux factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3582
            function:
              preferred_term: efflux transmembrane transporter activity
              term:
                id: GO:0015562
                label: efflux transmembrane transporter activity
            role_description: Outer-membrane-factor/TolC-like efflux channel component.
          - id: PP_4923_outer_membrane_efflux_factor
            label: "PP_4923: outer-membrane efflux factor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_4923
            function:
              preferred_term: efflux transmembrane transporter activity
              term:
                id: GO:0015562
