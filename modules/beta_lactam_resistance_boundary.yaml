            role_description: Outer-membrane-factor/TolC-like efflux channel component.
    - order: 5
      role: Outer-membrane permeability and export boundary
      node:
        id: outer_membrane_permeability_export_boundary
        label: Outer-membrane permeability and export boundary
        module_type: TRANSPORT_STEP
        description: >-
          OprD and OpmQ are outer-membrane transport/export proteins that appear
          in the beta-lactam resistance map through permeability and
          cell-envelope export context, not because they catalyze beta-lactam
          hydrolysis.
        annotons:
          - id: oprD_outer_membrane_porin
            label: "oprD: substrate-selective outer membrane porin"
            participant:
