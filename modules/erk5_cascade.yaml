id: MODULE:erk5_cascade
title: ERK5 (MEKK2/3-MEK5-ERK5) MAPK cascade module
description: >-
  A taxon-neutral decomposition of the ERK5 (big MAP kinase 1, BMK1) cascade,
  the MEF2-driven concrete realization of the generic three-tier MAP kinase
  relay (MODULE:mapk_relay). Growth factors, and oxidative and osmotic stress,
  signal through the MAP3Ks MEKK2 (MAP3K2) and MEKK3 (MAP3K3) to the dedicated
  dual-specificity MAP2K MEK5 (MAP2K5), which dually phosphorylates the MAPK
  ERK5 (MAPK7) on its TEY activation-loop motif. ERK5 is distinctive in carrying
  a large C-terminal transcriptional-activation domain in addition to its kinase
  domain, and its principal output is activation of MEF2-family transcription
  factors controlling proliferation, survival, and endothelial/cardiovascular
  development. The kinase relay - MEKK2/3 -> MEK5 -> ERK5 - is declared as an
  inner bundle that `conforms_to` mapk_relay, while the upstream input and the
  ERK5/MEF2 output are this cascade's free extensions around the conforming core.
  Grounded in GO:0070375 (ERK5 cascade).
status: DRAFT
evidence:
  - source_id: GO:0070375
    title: ERK5 cascade
    statement: >-
      The module is grounded in the GO biological process term for the ERK5
      cascade, the MEKK2/3 -> MEK5 -> ERK5 branch of the MAPK cascade family.
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The relay tier conforms to the generic three-tier MAPK cascade motif
      (MODULE:mapk_relay).
  - source_id: PANTHER:PTN004700021
    title: PAINT ERK5-pathway upstream kinase signal-transduction node
    statement: >-
      Local PAINT IBD seed rows place curated MEKK2/MEKK3 exemplars in
      PTN004700021 with signal transduction terms, anchoring the MAP3K input
      tier where the cache supports it.
  - source_id: PANTHER:PTN000622075
    title: PAINT MAPK kinase-activity node
    statement: >-
      Local PAINT IBD seed rows place the curated ERK5/MAPK7 exemplar in a MAPK
      family node with protein kinase activity and intracellular signal
      transduction terms.
notes: >-
  This module is the concrete ERK5 branch of the generic three-tier MAP kinase
  relay (MODULE:mapk_relay): the inner `erk5_relay` node bundles the MEKK2/3 ->
  MEK5 -> ERK5 tiers and declares conformance to that motif, while the upstream
  input and the downstream ERK5/MEF2 output are this cascade's free extensions
  around the conforming core. Representative UniProt members (MEKK3 Q99759,
  MEKK2 Q9Y2U5, MEK5 Q13163, ERK5 Q13164) were verified against UniProt.
module:
  id: erk5_cascade
  label: ERK5 (MEKK2/3-MEK5-ERK5) cascade
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: ERK5 cascade
      term:
        id: GO:0070375
        label: ERK5 cascade
      description: MEKK2/3 -> MEK5 -> ERK5 protein kinase relay culminating in MEF2 activation.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: growth-factor and stress input
      node:
        id: erk5_input
        label: Growth-factor/stress activation of the ERK5 MAP3K tier
        module_type: REGULATORY_STEP
        description: >-
          Growth factors (EGF, neurotrophins) and oxidative/osmotic stress,
          relayed through receptor tyrosine kinases and upstream regulators,
          converge to activate the MEKK2/MEKK3 MAP3K tier of the cascade.
        annotons:
          - id: erk5_activation
            label: ERK5-pathway MAP3K input
            participant:
              selector_type: ANY_PARTICIPANT
            processes:
              - preferred_term: ERK5 cascade
                term:
                  id: GO:0070375
                  label: ERK5 cascade
            role_description: Couples growth-factor and stress stimuli to the ERK5 relay.
    - order: 2
      role: ERK5 kinase relay (conforms to mapk_relay)
      node:
        id: erk5_relay
        label: ERK5 kinase relay (MEKK2/3 -> MEK5 -> ERK5)
        module_type: REACTION
        description: >-
          The three-tier kinase relay of the ERK5 cascade: MEKK2/MEKK3 (MAP3K)
          phosphorylate MEK5 (MAP2K), which dually phosphorylates ERK5 (MAPK) on
          its TEY activation-loop motif.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              MEKK2/3 -> MEK5 -> ERK5 fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
          - order: 1
            role: MAP3K tier (MEKK2/MEKK3)
            node:
              id: erk5_map3k
              label: MEKK2/MEKK3 MAP kinase kinase kinase activation
              module_type: REACTION
              description: >-
                The MAP3Ks MEKK2 (MAP3K2) and MEKK3 (MAP3K3) phosphorylate and
                activate MEK5.
              annotons:
                - id: erk5_map3k_activity
                  label: MEKK2/MEKK3 MAP3K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: MEKK2/MEKK3 (MAP3K2/MAP3K3)
                      description: MAP3Ks dedicated to the ERK5 tier.
                      representative_members:
                        - preferred_term: MEKK3 (MAP3K3)
                          term:
                            id: UniProtKB:Q99759
                            label: Mitogen-activated protein kinase kinase kinase 3
                        - preferred_term: MEKK2 (MAP3K2)
                          term:
                            id: UniProtKB:Q9Y2U5
                            label: Mitogen-activated protein kinase kinase kinase 2
                  function:
                    preferred_term: MAP kinase kinase kinase activity
                    term:
                      id: GO:0004709
                      label: MAP kinase kinase kinase activity
                    targets:
                      - preferred_term: MEK5
                  role_description: Top kinase tier; activates MEK5.
          - order: 2
            role: MAP2K tier (MEK5)
            node:
              id: erk5_map2k
              label: MEK5 MAP kinase kinase activation
              module_type: REACTION
              description: >-
                The dual-specificity MAP2K MEK5 (MAP2K5) phosphorylates ERK5 on
                both threonine and tyrosine of its TEY motif.
              annotons:
                - id: erk5_map2k_activity
                  label: MEK5 MAP2K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: MEK5 (MAP2K5)
                      description: Dual-specificity MAP kinase kinase dedicated to the ERK5 tier.
                      representative_members:
                        - preferred_term: MEK5 (MAP2K5)
                          term:
                            id: UniProtKB:Q13163
                            label: Dual specificity mitogen-activated protein kinase kinase 5
                  function:
                    preferred_term: MAP kinase kinase activity
                    term:
                      id: GO:0004708
                      label: MAP kinase kinase activity
                    targets:
                      - preferred_term: ERK5 TEY motif
                  role_description: Middle kinase tier; dual-specificity activation of ERK5.
          - order: 3
            role: MAPK tier (ERK5)
            node:
              id: erk5_mapk
              label: ERK5 MAP kinase activation
              module_type: REACTION
              description: >-
                Dually phosphorylated ERK5 (MAPK7) becomes an active
                proline-directed serine/threonine kinase; its large C-terminal
                domain also provides intrinsic transcriptional-activation function.
              annotons:
                - id: erk5_mapk_activity
                  label: ERK5 MAP kinase activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: ERK5 (MAPK7)
                      description: The terminal effector kinase of the ERK5 cascade.
                      representative_members:
                        - preferred_term: ERK5 (MAPK7)
                          term:
                            id: UniProtKB:Q13164
                            label: Mitogen-activated protein kinase 7
                  function:
                    preferred_term: MAP kinase activity
                    term:
                      id: GO:0004707
                      label: MAP kinase activity
                  locations:
                    - preferred_term: nucleus
                      term:
                        id: GO:0005634
                        label: nucleus
                  role_description: Effector kinase transducing the cascade output to MEF2.
        connections:
          - source: erk5_map3k
            target: erk5_map2k
            connection_type: CAUSES
            description: MEKK2/3 phosphorylates and activates MEK5.
          - source: erk5_map2k
            target: erk5_mapk
            connection_type: CAUSES
            description: MEK5 dually phosphorylates ERK5.
    - order: 3
      role: ERK5 / MEF2 transcriptional output
      node:
        id: erk5_output
        label: ERK5 effector and MEF2 transcriptional output
        module_type: REGULATORY_STEP
        description: >-
          Active ERK5 phosphorylates and co-activates MEF2-family transcription
          factors (MEF2A/C/D), driving proliferation, survival, and
          endothelial/cardiovascular gene programs.
        annotons:
          - id: erk5_substrate_output
            label: ERK5 substrate phosphorylation and MEF2 activation
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            processes:
              - preferred_term: positive regulation of transcription by RNA polymerase II
                term:
                  id: GO:0045944
                  label: positive regulation of transcription by RNA polymerase II
            role_description: Converts ERK5 activity into a MEF2-driven gene program.
  connections:
    - source: erk5_input
      target: erk5_relay
      connection_type: CAUSES
      description: Growth-factor/stress stimuli activate the MAP3K tier of the ERK5 relay.
    - source: erk5_relay
      target: erk5_output
      connection_type: PROVIDES_INPUT_FOR
      description: Active ERK5 phosphorylates and co-activates MEF2.
