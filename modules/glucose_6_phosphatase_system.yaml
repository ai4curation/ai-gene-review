id: MODULE:glucose_6_phosphatase_system
title: Glucose-6-phosphatase system (endogenous glucose production) — GSD Ia/Ib, G6PC3-SCN4
description: >-
  The glucose-6-phosphatase system is the endoplasmic-reticulum machinery that carries
  out the terminal, committed step of endogenous glucose production, shared by
  gluconeogenesis and glycogenolysis: the hydrolysis of glucose-6-phosphate to free
  glucose for release into the blood. Because the catalytic site of the phosphatase
  faces the ER lumen while its substrate is generated in the cytosol, the system
  couples two integral ER-membrane proteins. The glucose-6-phosphate transporter
  SLC37A4 (G6PT) is a glucose-6-phosphate:phosphate antiporter that imports cytosolic
  glucose-6-phosphate into the ER lumen (exchanging for inorganic phosphate). There a
  glucose-6-phosphatase catalytic subunit hydrolyses it to glucose + Pi: the
  liver/kidney/intestine isoform G6PC1 supplies blood glucose during fasting, while
  the ubiquitously expressed paralog G6PC3 serves other tissues (and also handles the
  incidental substrate 1,5-anhydroglucitol-6-phosphate). The liberated glucose then
  exits the ER and the cell (via GLUT transporters). Inherited defects define a
  clinically instructive set: G6PC1 deficiency causes glycogen storage disease type Ia
  (von Gierke, fasting hypoglycemia/hepatomegaly/lactic acidosis); SLC37A4 deficiency
  causes GSD type Ib (the same metabolic phenotype PLUS neutropenia/neutrophil
  dysfunction, because the shared transporter also serves the neutrophil G6PC3
  system); and G6PC3 deficiency causes severe congenital neutropenia type 4 (with
  cardiac/urogenital malformations), not a classic hepatic glycogenosis.
status: DRAFT
evidence:
  - source_id: GO:0006094
    title: gluconeogenesis
    statement: >-
      The system performs the terminal glucose-6-phosphate -> glucose step of
      gluconeogenesis (and of glycogenolysis) for endogenous glucose production.
  - source_id: Reactome:R-HSA-198513
    title: "'SLC7A4 exchanges G6P for Pi across the ER membrane '"
    statement: >-
      Reaction stoichiometries follow the human Reactome reactions R-HSA-198513
      (SLC37A4 G6P:Pi exchange), R-HSA-71825 (G6PC1 liver hydrolysis) and
      R-HSA-3262512 (G6PC3 ubiquitous hydrolysis).
  - source_id: file:human/SLC37A4/SLC37A4-ai-review.yaml
    title: SLC37A4 gene review (human)
    statement: >-
      The ER glucose-6-phosphate:phosphate antiport step (UniProtKB:O43826,
      GO:0061513 + GO:0015152) matches the completed human SLC37A4 review.
  - source_id: file:human/G6PC1/G6PC1-ai-review.yaml
    title: G6PC1 gene review (human)
    statement: >-
      The liver/kidney/intestine hydrolytic step (UniProtKB:P35575, GO:0004346)
      matches the completed human G6PC1 review.
  - source_id: file:human/G6PC3/G6PC3-ai-review.yaml
    title: G6PC3 gene review (human)
    statement: >-
      The ubiquitous hydrolytic step (UniProtKB:Q9BUM1, GO:0004346) matches the
      completed human G6PC3 review.
module:
  id: glucose_6_phosphatase_system
  label: Glucose-6-phosphatase system
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: gluconeogenesis
      term:
        id: GO:0006094
        label: gluconeogenesis
      description: >-
        The terminal glucose-6-phosphate -> glucose hydrolysis step for endogenous
        glucose production (shared by gluconeogenesis and glycogenolysis).
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: >-
          Both the transporter and the phosphatase catalytic subunits are integral
          ER-membrane proteins; hydrolysis occurs at the luminal face.
  parts:
    - order: 1
      role: import of glucose-6-phosphate into the ER lumen
      node:
        id: slc37a4_step
        label: cytosolic glucose-6-phosphate + luminal Pi <-> luminal glucose-6-phosphate + cytosolic Pi
        module_type: REACTION
        annotons:
          - id: slc37a4_activity
            label: "SLC37A4 (G6PT): glucose-6-phosphate:phosphate antiporter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SLC37 sugar-phosphate exchanger family (SLC37A4/G6PT)
                term:
                  id: PANTHER:PTHR43826
                  label: GLUCOSE-6-PHOSPHATE EXCHANGER SLC37A4
                representative_members:
                  - preferred_term: SLC37A4 (human)
                    term:
                      id: UniProtKB:O43826
                      label: Glucose-6-phosphate exchanger SLC37A4
            function:
              preferred_term: glucose 6-phosphate:phosphate antiporter activity
              term:
                id: GO:0061513
                label: glucose 6-phosphate:phosphate antiporter activity
              substrates:
                - preferred_term: cytosolic alpha-D-glucose 6-phosphate
                - preferred_term: luminal phosphate
              products:
                - preferred_term: luminal alpha-D-glucose 6-phosphate
                - preferred_term: cytosolic phosphate
              evidence:
                - source_id: GO:0015152
                  statement: also glucose-6-phosphate transmembrane transporter activity
                - source_id: Reactome:R-HSA-198513
                  statement: "'SLC7A4 exchanges G6P for Pi across the ER membrane ' (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              ER-membrane antiporter that delivers cytosolic glucose-6-phosphate to
              the luminal face of the phosphatase (exchanging for Pi). Serves both the
              hepatic G6PC1 and the neutrophil/ubiquitous G6PC3 systems; deficiency
              causes GSD Ib (glycogenosis + neutropenia).
    - order: 2
      role: hydrolysis of luminal glucose-6-phosphate to glucose
      node:
        id: g6pc_step
        label: luminal glucose-6-phosphate + H2O to glucose + phosphate
        module_type: REACTION
        annotons:
          - id: g6pc_activity
            label: "G6PC1/G6PC2/G6PC3: glucose-6-phosphatase catalytic subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glucose-6-phosphatase catalytic subunit family (G6PC1/G6PC2/G6PC3)
                term:
                  id: PANTHER:PTHR12591
                  label: GLUCOSE-6-PHOSPHATASE
                representative_members:
                  - preferred_term: G6PC1 (human, liver/kidney/intestine)
                    term:
                      id: UniProtKB:P35575
                      label: Glucose-6-phosphatase catalytic subunit 1
                  - preferred_term: G6PC3 (human, ubiquitous)
                    term:
                      id: UniProtKB:Q9BUM1
                      label: Glucose-6-phosphatase catalytic subunit 3
            function:
              preferred_term: glucose-6-phosphatase activity
              term:
                id: GO:0004346
                label: glucose-6-phosphatase activity
              substrates:
                - preferred_term: alpha-D-glucose 6-phosphate (ER luminal)
                - preferred_term: water
              products:
                - preferred_term: D-glucose
                - preferred_term: phosphate
              evidence:
                - source_id: EC:3.1.3.9
                  statement: glucose-6-phosphatase (integral ER-membrane phosphohydrolase; luminal active site)
                - source_id: Reactome:R-HSA-71825
                  statement: "G6PC hydrolyzes G6P to Glc and Pi (liver) (human Reactome reaction)"
                - source_id: Reactome:R-HSA-3262512
                  statement: "G6PC3 hydrolyzes G6P to form Glc and Pi (ubiquitous) (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              ER-membrane phosphohydrolase whose luminal active site hydrolyses
              glucose-6-phosphate to free glucose + Pi — the terminal, committed step
              of endogenous glucose production. Tissue isoforms: G6PC1 (liver/kidney/
              intestine, GSD Ia), G6PC3 (ubiquitous, severe congenital neutropenia
              type 4), G6PC2 (pancreatic-islet, an autoantigen / glycemic-trait locus).
  connections:
    - source: slc37a4_step
      target: g6pc_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        SLC37A4 delivers glucose-6-phosphate into the ER lumen, where the
        glucose-6-phosphatase catalytic subunit hydrolyses it — the two proteins
        function as one obligate ER transport-plus-hydrolysis system.
  notes: >-
    The two-component ER glucose-6-phosphatase system grounded to the human proteins
    SLC37A4/G6PT (UniProtKB:O43826; GO:0061513 + GO:0015152) and the glucose-6-phosphatase
    catalytic subunits G6PC1 (P35575) and G6PC3 (Q9BUM1) (GO:0004346, EC 3.1.3.9). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids
    and titles were verified against the local reactome cache (R-HSA-198513, R-HSA-71825,
    R-HSA-3262512; titles left exactly as fetched, including the Reactome typo "SLC7A4").
    The hydrolysis node uses a PANTHER family selector (PTHR12591) generic over the three
    human catalytic paralogs G6PC1/G6PC2/G6PC3 and their orthologs, with G6PC1 and G6PC3
    as representative members; SLC37A4 uses its own family selector (PTHR43826). Upstream,
    the glucose-6-phosphate substrate is generated by gluconeogenesis (FBP1/PCK1 etc.) and
    by glycogenolysis (PGM1; see the glycogenolysis module); downstream, free glucose exits
    via GLUT/SLC2A transporters (not modelled here). Disorders: G6PC1 -> GSD Ia (von Gierke);
    SLC37A4 -> GSD Ib (glycogenosis + neutropenia); G6PC3 -> severe congenital neutropenia
    type 4. G6PC2 (islet autoantigen) is covered generically by the family selector but is
    not a gluconeogenic enzyme.
