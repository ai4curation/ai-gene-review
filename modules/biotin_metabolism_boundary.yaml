id: MODULE:biotin_metabolism_boundary
title: Biotin metabolism boundary
description: >-
  Boundary module for KEGG ppu00780 in Pseudomonas putida KT2440. The strict
  biotin-biosynthesis route is represented by the BioC-BioH pimelate precursor
  branch, BioF/BioA/BioD/BioB conversion to biotin, and BirA-dependent
  biotinylation/regulation. KEGG ppu00780 also pulls in fatty-acid-synthesis and
  short-chain dehydrogenase/reductase nodes because the BioC-BioH route uses
  acyl-carrier-protein chemistry to generate pimeloyl-ACP; those genes are
  tracked as boundary context rather than committed biotin-biosynthetic steps.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00780
    title: Biotin metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set and combines
      strict biotin biosynthesis with fatty-acid/SDR side nodes.
  - source_id: GO:0009102
    title: biotin biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      biotin.
  - source_id: file:PSEPK/bioC/bioC-ai-review.yaml
    title: bioC first-pass review
    statement: >-
      bioC is curated as the SAM-dependent malonyl-ACP O-methyltransferase that
      initiates the BioC-BioH pimelate precursor branch.
  - source_id: file:PSEPK/bioH/bioH-ai-review.yaml
    title: bioH first-pass review
    statement: >-
      bioH is curated as the pimeloyl-ACP methyl ester esterase step in the
      pimelate precursor branch.
  - source_id: file:modules/fatty_acid_biosynthesis.yaml
    title: Fatty acid biosynthesis module
    statement: >-
      Existing fatty-acid-biosynthesis curation captures the FAS-II genes that
      appear in ppu00780 as acyl-ACP precursor-side context.
module:
  id: biotin_metabolism_boundary
  label: Biotin metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: biotin biosynthetic process
      term:
        id: GO:0009102
        label: biotin biosynthetic process
      description: Biosynthesis of biotin from pimelate-derived intermediates.
    - preferred_term: biotin synthase activity
      term:
        id: GO:0004076
        label: biotin synthase activity
      description: Terminal sulfur insertion converting dethiobiotin to biotin.
    - preferred_term: biotin--biotin carboxyl-carrier protein ligase activity
      term:
        id: GO:0004077
        label: biotin--[biotin carboxyl-carrier protein] ligase activity
      description: BirA-dependent protein biotinylation and biotin operon regulatory context.
  parts:
    - order: 1
      role: BioC-BioH pimelate precursor branch
      node:
        id: bioc_bioh_pimelate_precursor_branch
        label: BioC-BioH pimelate precursor branch
        module_type: METABOLIC_PATHWAY
        description: >-
          BioC methylates malonyl-ACP to route the acyl carrier protein thioester
          through fatty-acid-like elongation chemistry, and BioH hydrolyzes the
          methyl ester to expose pimeloyl-ACP for BioF. This explains why KEGG
          ppu00780 includes FAS-II enzymes without making those enzymes committed
          biotin-biosynthesis genes.
        annotons:
          - id: bioC_malonyl_acp_o_methyltransferase
            label: "bioC: malonyl-ACP O-methyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioC
            function:
              preferred_term: malonyl-CoA methyltransferase activity
              term:
                id: GO:0102130
                label: malonyl-CoA methyltransferase activity
              substrates:
                - preferred_term: malonyl-[acyl-carrier protein]
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: malonyl-[acyl-carrier protein] methyl ester
                - preferred_term: S-adenosyl-L-homocysteine
              evidence:
                - source_id: EC:2.1.1.197
                  statement: malonyl-acyl carrier protein O-methyltransferase
            processes:
              - preferred_term: biotin biosynthetic process
                term:
                  id: GO:0009102
                  label: biotin biosynthetic process
            role_description: Initiates the BioC-BioH pimelate precursor route.
          - id: bioH_pimeloyl_acp_methyl_ester_esterase
            label: "bioH: pimeloyl-ACP methyl ester esterase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioH
            function:
              preferred_term: pimelyl-[acyl-carrier protein] methyl ester esterase activity
              term:
                id: GO:0090499
                label: pimelyl-[acyl-carrier protein] methyl ester esterase activity
              substrates:
                - preferred_term: pimeloyl-[acyl-carrier protein] methyl ester
              products:
                - preferred_term: pimeloyl-[acyl-carrier protein]
                - preferred_term: methanol
              evidence:
                - source_id: EC:3.1.1.85
                  statement: pimeloyl-ACP methyl ester esterase
            role_description: Unmasks pimeloyl-ACP before BioF condensation.
    - order: 2
      role: AON to biotin biosynthesis branch
      node:
        id: aon_to_biotin_branch
        label: AON to biotin
        module_type: METABOLIC_PATHWAY
        description: >-
          BioF condenses pimeloyl-ACP with L-alanine to form AON, BioA converts
          AON/KAPA to DAPA using SAM as amino donor, BioD forms dethiobiotin,
          and BioB completes biotin formation by sulfur insertion.
        annotons:
          - id: bioF_aon_synthase
            label: "bioF: 8-amino-7-oxononanoate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioF
            function:
              preferred_term: 8-amino-7-oxononanoate synthase activity
              term:
                id: GO:0008710
                label: 8-amino-7-oxononanoate synthase activity
              substrates:
                - preferred_term: pimeloyl-[acyl-carrier protein]
                - preferred_term: L-alanine
              products:
                - preferred_term: 8-amino-7-oxononanoate
                - preferred_term: holo-[acyl-carrier protein]
              evidence:
                - source_id: EC:2.3.1.47
                  statement: 8-amino-7-oxononanoate synthase
            processes:
              - preferred_term: biotin biosynthetic process
                term:
                  id: GO:0009102
                  label: biotin biosynthetic process
            role_description: First committed AON-forming step after pimeloyl-ACP supply.
          - id: bioA_sam_aon_transaminase
            label: "bioA: SAM-dependent AON aminotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioA
            function:
              preferred_term: S-adenosyl-L-methionine:8-amino-7-oxononanoate transaminase activity
              term:
                id: GO:0004015
                label: S-adenosyl-L-methionine:8-amino-7-oxononanoate transaminase activity
              substrates:
                - preferred_term: 8-amino-7-oxononanoate
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: 7,8-diaminononanoate
              evidence:
                - source_id: EC:2.6.1.62
                  statement: adenosylmethionine-8-amino-7-oxononanoate aminotransferase
            processes:
              - preferred_term: biotin biosynthetic process
                term:
                  id: GO:0009102
                  label: biotin biosynthetic process
            role_description: SAM-route aminotransferase forming DAPA.
          - id: bioD_dethiobiotin_synthetase
            label: "bioD: dethiobiotin synthetase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioD
            function:
              preferred_term: dethiobiotin synthase activity
              term:
                id: GO:0004141
                label: dethiobiotin synthase activity
              substrates:
                - preferred_term: 7,8-diaminononanoate
                - preferred_term: ATP
                - preferred_term: carbon dioxide
              products:
                - preferred_term: dethiobiotin
              evidence:
                - source_id: EC:6.3.3.3
                  statement: dethiobiotin synthetase
            processes:
              - preferred_term: biotin biosynthetic process
                term:
                  id: GO:0009102
                  label: biotin biosynthetic process
            role_description: Forms dethiobiotin from DAPA.
          - id: bioB_biotin_synthase
            label: "bioB: biotin synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bioB
            function:
              preferred_term: biotin synthase activity
              term:
                id: GO:0004076
                label: biotin synthase activity
              substrates:
                - preferred_term: dethiobiotin
                - preferred_term: S-adenosyl-L-methionine
                - preferred_term: sulfur carrier
              products:
                - preferred_term: biotin
              evidence:
                - source_id: EC:2.8.1.6
                  statement: biotin synthase
            processes:
              - preferred_term: biotin biosynthetic process
                term:
                  id: GO:0009102
                  label: biotin biosynthetic process
            role_description: Terminal radical-SAM sulfur insertion step.
    - order: 3
      role: Biotin protein ligation and operon regulation
      node:
        id: bira_biotinylation_and_regulation
        label: BirA biotinylation and regulation
        module_type: METABOLIC_PATHWAY
        description: >-
          BirA is not a biotin-biosynthesis enzyme, but it belongs in the KEGG
          biotin metabolism boundary because it activates biotin for protein
          biotinylation and represses the biotin operon when biotin is available.
        annotons:
          - id: birA_biotin_protein_ligase
            label: "birA: biotin-protein ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: birA
            function:
              preferred_term: biotin--[biotin carboxyl-carrier protein] ligase activity
              term:
                id: GO:0004077
                label: biotin--[biotin carboxyl-carrier protein] ligase activity
              substrates:
                - preferred_term: biotin
                - preferred_term: L-lysyl-[protein]
                - preferred_term: ATP
              products:
                - preferred_term: N(6)-biotinyl-L-lysyl-[protein]
              evidence:
                - source_id: EC:6.3.4.15
                  statement: biotin-protein ligase
            role_description: Attaches biotin to biotin carboxyl carrier proteins.
          - id: birA_biotin_operon_repressor
            label: "birA: biotin operon repressor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: birA
            function:
              preferred_term: DNA binding
              term:
                id: GO:0003677
                label: DNA binding
            processes:
              - preferred_term: regulation of DNA-templated transcription
                term:
                  id: GO:0006355
                  label: regulation of DNA-templated transcription
            role_description: Biotin-responsive transcriptional repressor of the biotin operon.
    - order: 4
      role: Fatty-acid/SDR boundary context
      node:
        id: fas_sdr_boundary_context
        label: Fatty-acid and SDR boundary context
        module_type: METABOLIC_PATHWAY
        description: >-
          These KEGG ppu00780 genes are not curated as committed biotin
          metabolism steps in this first pass. Several are FAS-II enzymes that
          can supply acyl-ACP chemistry upstream of pimeloyl-ACP, while others
          are unresolved SDR/reductase candidates or an aromatic-catabolism
          dehydrogenase captured by broad map propagation.
        annotons:
          - id: fabG_fasII_reductase_boundary
            label: "fabG: FAS-II 3-oxoacyl-ACP reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fabG
            function:
              preferred_term: 3-oxoacyl-[acyl-carrier-protein] reductase (NADPH) activity
              term:
                id: GO:0004316
                label: 3-oxoacyl-[acyl-carrier-protein] reductase (NADPH) activity
            role_description: Core fatty-acid elongation enzyme; boundary context for acyl-ACP precursor chemistry.
          - id: fabZ_fasII_dehydratase_boundary
            label: "fabZ: FAS-II 3-hydroxyacyl-ACP dehydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fabZ
            function:
              preferred_term: (3R)-hydroxyacyl-[acyl-carrier-protein] dehydratase activity
              term:
                id: GO:0019171
                label: (3R)-hydroxyacyl-[acyl-carrier-protein] dehydratase activity
            role_description: Core FAS-II enzyme; boundary context, not a committed biotin step.
          - id: fabF_fasII_synthase_boundary
            label: "fabF: FAS-II 3-oxoacyl-ACP synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fabF
            function:
              preferred_term: 3-oxoacyl-[acyl-carrier-protein] synthase activity
              term:
                id: GO:0004315
                label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
            role_description: Core fatty-acid elongation enzyme; boundary context for BioC/BioH precursor supply.
          - id: fabB_fasII_synthase_boundary
            label: "fabB: FAS-II 3-oxoacyl-ACP synthase I"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fabB
            function:
              preferred_term: 3-oxoacyl-[acyl-carrier-protein] synthase activity
              term:
                id: GO:0004315
                label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
            role_description: Core fatty-acid elongation enzyme; boundary context, not specific biotin metabolism.
          - id: pp3303_fasII_synthase_candidate_boundary
            label: "PP_3303: FabF-like 3-oxoacyl-ACP synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3303
            function:
              preferred_term: 3-oxoacyl-[acyl-carrier-protein] synthase activity
              term:
                id: GO:0004315
                label: 3-oxoacyl-[acyl-carrier-protein] synthase activity
            role_description: FabF-like fatty-acid elongation candidate; boundary context.
          - id: pp0581_sdr_boundary
            label: "PP_0581: unresolved SDR boundary candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0581
            function:
              preferred_term: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
              term:
                id: GO:0016616
                label: oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor
            role_description: Unresolved SDR/reductase candidate in the KEGG map; no core biotin role assigned.
          - id: pp1852_enoyl_acp_reductase_boundary
            label: "PP_1852: enoyl-ACP reductase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1852
            function:
              preferred_term: enoyl-[acyl-carrier-protein] reductase (NADPH) activity
              term:
                id: GO:0141148
                label: enoyl-[acyl-carrier-protein] reductase (NADPH) activity
            role_description: Candidate acyl-ACP reductase retained as unresolved boundary context.
          - id: pp2540_sdr_boundary
            label: "PP_2540: uncharacterized SDR boundary candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2540
            role_description: Uncharacterized SDR-family protein with no GOA terms; retained only as a boundary candidate.
          - id: pp2783_aromatic_dehydrogenase_boundary
            label: "PP_2783: aromatic dihydrodiol dehydrogenase side node"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2783
            function:
              preferred_term: 2,3-dihydroxy-2,3-dihydro-p-cumate dehydrogenase activity
              term:
                id: GO:0018511
                label: 2,3-dihydroxy-2,3-dihydro-p-cumate dehydrogenase activity
            role_description: Aromatic-catabolism enzyme; existing review removes fatty-acid elongation as unsupported.
