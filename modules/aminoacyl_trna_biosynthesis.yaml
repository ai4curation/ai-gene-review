  notes: >-
    The strict module is complete for canonical protein aminoacylation. Boundary
    handling is still important: GatCAB supports indirect amidated-tRNA
    synthesis, fmt supports initiator Met-tRNA formylation, selA/serS support
    selenocysteine-tRNA chemistry, and PP_0613 should not be overinterpreted
    without substrate-specific evidence.
