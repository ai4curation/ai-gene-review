id: MODULE:aminoacyl_trna_biosynthesis
title: Aminoacyl-tRNA biosynthesis
description: >-
  Species-neutral module seeded from KEGG ppu00970 in Pseudomonas putida
  KT2440. The core module is protein-translation tRNA charging by aminoacyl-tRNA
  synthetases, with GatCAB indirect Asn/Gln-tRNA formation, initiator
  methionyl-tRNA formylation, and selenocysteine-tRNA side chemistry tracked as
  related translation-boundary steps. PP_0613 is retained as an unresolved
  amidase-family side node rather than a satisfiable aminoacyl-tRNA step.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00970
    title: Aminoacyl-tRNA biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00970 provides the PSEPK curation batch. Its membership includes
      the canonical aminoacyl-tRNA ligases, the GatCAB transamidation system,
      methionyl-tRNA formyltransferase, selenocysteine-related tRNA enzymes, and
      one unresolved amidase-family side node.
  - source_id: file:projects/P_PUTIDA/batches/ppu00970_aminoacyl_trna_biosynthesis.tsv
    title: PSEPK ppu00970 aminoacyl-tRNA batch
    statement: >-
      The batch records the 27 PSEPK members and their first-pass review/Asta
      status.
