id: MODULE:peroxisomal_beta_oxidation
title: Peroxisomal fatty-acid beta-oxidation (VLCFA, branched-chain, bile-acid intermediates)
description: >-
  Peroxisomal beta-oxidation chain-shortens the fatty acids that mitochondria cannot handle: very-long-chain
  fatty acids (VLCFAs, >=C22), 2-methyl-branched fatty acids (pristanic acid, from phytanic-acid
  alpha-oxidation), the C27 bile-acid intermediates di- and tri-hydroxycholestanoyl-CoA (DHCA/THCA, en route
  to cholic/chenodeoxycholic acid), and dicarboxylic acids from omega-oxidation. Each cycle removes two
  carbons as acetyl-CoA through the same four reactions, but with peroxisome-specific enzymes. Step 1 is an
  FAD-dependent acyl-CoA OXIDASE that passes electrons directly to O2 (making H2O2, not feeding the
  respiratory chain): ACOX1 acts on straight-chain (VLC) acyl-CoAs, and ACOX3 on 2-methyl-branched
  (pristanoyl) acyl-CoAs. Steps 2-3 (hydration then NAD+-dependent dehydrogenation) are performed by
  multifunctional proteins of opposite stereochemistry: the D-bifunctional protein HSD17B4 (the main enzyme
  for VLCFA, pristanic acid and bile-acid intermediates) and the L-bifunctional protein EHHADH (more
  important for medium-chain and dicarboxylic-acid substrates). Step 4, thiolytic cleavage to acetyl-CoA (or
  propionyl-CoA for branched substrates) plus a shortened acyl-CoA, is carried out by ACAA1 (straight-chain
  thiolase) and by the SCPx thiolase (encoded by SCP2, which also yields the sterol-carrier protein SCP2)
  for branched-chain and bile-acid substrates. The chain-shortened acyl-CoA re-enters the spiral. Inherited
  single-enzyme defects — ACOX1 deficiency (pseudo-neonatal adrenoleukodystrophy), D-bifunctional protein
  (HSD17B4) deficiency, EHHADH (renal Fanconi), and SCP2 deficiency — as well as the peroxisome-biogenesis
  Zellweger spectrum, cause VLCFA/pristanic-acid/bile-acid accumulation with severe neurological disease.
status: DRAFT
evidence:
  - source_id: GO:0006635
    title: fatty acid beta-oxidation
    statement: ACOX1/ACOX3, HSD17B4/EHHADH and ACAA1/SCP2 carry out fatty-acid beta-oxidation (GO:0006635).
  - source_id: GO:0033540
    title: fatty acid beta-oxidation using acyl-CoA oxidase
    statement: The peroxisomal spiral is initiated by acyl-CoA oxidases, distinguishing it (GO:0033540).
  - source_id: file:human/ACOX1/ACOX1-ai-review.yaml
    title: ACOX1 gene review (human)
    statement: The straight-chain acyl-CoA oxidation step (UniProtKB:Q15067, GO:0003997) matches the completed human ACOX1 review.
  - source_id: file:human/ACOX3/ACOX3-ai-review.yaml
    title: ACOX3 gene review (human)
    statement: The branched (pristanoyl) acyl-CoA oxidation step (UniProtKB:O15254, GO:0016402) matches the completed human ACOX3 review.
  - source_id: file:human/HSD17B4/HSD17B4-ai-review.yaml
    title: HSD17B4 gene review (human)
    statement: The D-bifunctional hydratase/dehydrogenase step (UniProtKB:P51659, GO:0080023/GO:0106386) matches the completed human HSD17B4 review.
  - source_id: file:human/EHHADH/EHHADH-ai-review.yaml
    title: EHHADH gene review (human)
    statement: The L-bifunctional hydratase/dehydrogenase step (UniProtKB:Q08426, GO:0004300/GO:0003857) matches the completed human EHHADH review.
  - source_id: file:human/ACAA1/ACAA1-ai-review.yaml
    title: ACAA1 gene review (human)
    statement: The straight-chain thiolytic cleavage step (UniProtKB:P09110, GO:0003988) matches the completed human ACAA1 review.
  - source_id: file:human/SCP2/SCP2-ai-review.yaml
    title: SCP2 gene review (human)
    statement: The branched/bile-acid SCPx thiolase step (UniProtKB:P22307, GO:0050632) matches the completed human SCP2 review.
module:
  id: peroxisomal_beta_oxidation
  label: Peroxisomal fatty-acid beta-oxidation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
      description: Two-carbon chain-shortening of VLCFA/branched/bile-acid acyl-CoAs in the peroxisome.
    - preferred_term: fatty acid beta-oxidation using acyl-CoA oxidase
      term:
        id: GO:0033540
        label: fatty acid beta-oxidation using acyl-CoA oxidase
      description: The peroxisomal spiral, initiated by O2/H2O2-generating acyl-CoA oxidases.
  context:
    cellular_components:
      - preferred_term: peroxisomal matrix
        term:
          id: GO:0005782
          label: peroxisomal matrix
        description: All six enzymes act in the peroxisomal matrix.
  parts:
    - order: 1
      role: acyl-CoA oxidation (O2 -> H2O2)
      node:
        id: acyl_coa_oxidation
        label: Acyl-CoA oxidases (ACOX1/ACOX3)
        module_type: REACTION
        annotons:
          - id: acox_activity
            label: "ACOX1/ACOX3: FAD acyl-CoA oxidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ACOX / peroxisomal acyl-CoA oxidase family
                term:
                  id: PANTHER:PTHR10909
                  label: ACYL-COA OXIDASE
                representative_members:
                  - preferred_term: ACOX1 (human, straight-chain/VLCFA)
                    term:
                      id: UniProtKB:Q15067
                      label: Peroxisomal acyl-coenzyme A oxidase 1
                  - preferred_term: ACOX3 (human, branched/pristanoyl)
                    term:
                      id: UniProtKB:O15254
                      label: Peroxisomal acyl-coenzyme A oxidase 3
            function:
              preferred_term: acyl-CoA oxidase activity
              term:
                id: GO:0003997
                label: acyl-CoA oxidase activity
              substrates:
                - preferred_term: acyl-CoA (ACOX1 straight-chain/VLC; ACOX3 2-methyl-branched/pristanoyl)
                - preferred_term: O2 (FAD)
              products:
                - preferred_term: 2-trans-enoyl-CoA
                - preferred_term: H2O2
              evidence:
                - source_id: file:human/ACOX1/ACOX1-ai-review.yaml
                  statement: FAD oxidase; first, rate-limiting step passing electrons directly to O2 (H2O2). ACOX1 (Q15067) oxidises straight-chain VLC acyl-CoAs (deficiency = pseudo-neonatal ALD); ACOX3 (O15254, GO:0016402) oxidises 2-methyl-branched pristanoyl-CoA
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: Dehydrogenate acyl-CoA to 2-trans-enoyl-CoA, reducing O2 to H2O2.
    - order: 2
      role: hydration + dehydrogenation (bifunctional proteins)
      node:
        id: hydration_dehydrogenation
        label: Bifunctional proteins (HSD17B4 D / EHHADH L)
        module_type: REACTION
        annotons:
          - id: hsd17b4_activity
            label: "HSD17B4: D-bifunctional protein (hydratase 2 + (3R)-HAD)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HSD17B4 / D-bifunctional protein family
                term:
                  id: PANTHER:PTHR45024
                  label: PEROXISOMAL MULTIFUNCTIONAL ENZYME TYPE 2
                representative_members:
                  - preferred_term: HSD17B4 (human)
                    term:
                      id: UniProtKB:P51659
                      label: Peroxisomal multifunctional enzyme type 2
            function:
              preferred_term: (2E)-enoyl-CoA hydratase 2 activity (D-specific)
              term:
                id: GO:0080023
                label: (2E)-enoyl-CoA hydratase activity
              substrates:
                - preferred_term: 2-trans-enoyl-CoA (VLC / branched / bile-acid; H2O)
                - preferred_term: NAD+ (for the (3R)-HAD dehydrogenase domain, GO:0106386)
              products:
                - preferred_term: (R)-3-hydroxyacyl-CoA then 3-oxoacyl-CoA
                - preferred_term: NADH
              evidence:
                - source_id: file:human/HSD17B4/HSD17B4-ai-review.yaml
                  statement: Main peroxisomal D-bifunctional protein (hydratase 2 GO:0080023 + (3R)-3-hydroxyacyl-CoA dehydrogenase GO:0106386); handles VLCFA, pristanic acid and bile-acid intermediates; deficiency = D-BP deficiency / Perrault syndrome
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: D-specific hydration + (3R)-dehydrogenation (main enzyme).
          - id: ehhadh_activity
            label: "EHHADH: L-bifunctional protein (hydratase + (3S)-HAD)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: EHHADH / L-bifunctional protein family
                term:
                  id: PANTHER:PTHR23309
                  label: ENOYL-COA HYDRATASE/3-HYDROXYACYL COA DEHYDROGENASE
                representative_members:
                  - preferred_term: EHHADH (human)
                    term:
                      id: UniProtKB:Q08426
                      label: Peroxisomal bifunctional enzyme
            function:
              preferred_term: enoyl-CoA hydratase activity (L-specific)
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
              substrates:
                - preferred_term: 2-trans-enoyl-CoA (medium-chain / dicarboxylic; H2O)
                - preferred_term: NAD+ (for the (3S)-HAD dehydrogenase domain, GO:0003857)
              products:
                - preferred_term: L-3-hydroxyacyl-CoA then 3-oxoacyl-CoA
                - preferred_term: NADH
              evidence:
                - source_id: file:human/EHHADH/EHHADH-ai-review.yaml
                  statement: L-bifunctional protein (enoyl-CoA hydratase GO:0004300 + (3S)-3-hydroxyacyl-CoA dehydrogenase GO:0003857); PPARalpha-induced; medium-chain/dicarboxylic substrates; mistargeting causes renal Fanconi syndrome
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: L-specific hydration + (3S)-dehydrogenation.
    - order: 3
      role: thiolytic cleavage (-> acetyl/propionyl-CoA)
      node:
