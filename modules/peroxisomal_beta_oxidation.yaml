        label: Peroxisomal thiolases (ACAA1 / SCPx-SCP2)
        module_type: REACTION
        annotons:
          - id: acaa1_activity
            label: "ACAA1: straight-chain 3-ketoacyl-CoA thiolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: ACAA1 / peroxisomal 3-ketoacyl-CoA thiolase family
                term:
                  id: PANTHER:PTHR43853
                  label: 3-KETOACYL-COA THIOLASE, PEROXISOMAL
                representative_members:
                  - preferred_term: ACAA1 (human)
                    term:
                      id: UniProtKB:P09110
                      label: 3-ketoacyl-CoA thiolase, peroxisomal
            function:
              preferred_term: acetyl-CoA C-acyltransferase activity
              term:
                id: GO:0003988
                label: acetyl-CoA C-acyltransferase activity
              substrates:
                - preferred_term: 3-oxoacyl-CoA (straight-chain)
                - preferred_term: coenzyme A
              products:
                - preferred_term: acyl-CoA (shortened by C2)
                - preferred_term: acetyl-CoA
              evidence:
                - source_id: file:human/ACAA1/ACAA1-ai-review.yaml
                  statement: Peroxisomal 3-ketoacyl-CoA thiolase (EC 2.3.1.16); thiolytic cleavage of straight-chain 3-oxoacyl-CoA to acyl-CoA + acetyl-CoA (completes each cycle)
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: Thiolytic cleavage of straight-chain 3-oxoacyl-CoA (+ acetyl-CoA).
          - id: scp2_activity
            label: "SCP2 (SCPx): branched/bile-acid thiolase + sterol carrier"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SCP2 / SCPx thiolase + sterol-carrier family
                term:
                  id: PANTHER:PTHR42870
                  label: NON-SPECIFIC LIPID-TRANSFER PROTEIN
                representative_members:
                  - preferred_term: SCP2 (human, SCPx/SCP2)
                    term:
                      id: UniProtKB:P22307
                      label: Non-specific lipid-transfer protein
            function:
              preferred_term: propionyl-CoA C2-trimethyltridecanoyltransferase (branched thiolase) activity
              term:
                id: GO:0050632
                label: propionyl-CoA C2-trimethyltridecanoyltransferase activity
              substrates:
                - preferred_term: 3-oxopristanoyl-CoA / 24-oxo-bile-acyl-CoA (branched)
                - preferred_term: coenzyme A
              products:
                - preferred_term: shortened acyl-CoA + propionyl-CoA (branched)
                - preferred_term: choloyl-CoA / bile-acid-CoA (bile-acid branch)
              evidence:
                - source_id: file:human/SCP2/SCP2-ai-review.yaml
                  statement: The SCPx product is the branched-chain/bile-acid 3-ketoacyl-CoA thiolase (handles pristanic-acid and C27 bile-acid intermediates ACAA1 cannot); the SCP2 product is a sterol/lipid-transfer protein (GO:0120020); deficiency = SCP2 leukoencephalopathy
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: Thiolytic cleavage of branched/bile-acid 3-oxoacyl-CoA (+ sterol transfer).
  connections:
    - source: acyl_coa_oxidation
      target: hydration_dehydrogenation
      connection_type: PROVIDES_INPUT_FOR
      description: The 2-trans-enoyl-CoA made by the oxidases is hydrated + dehydrogenated by HSD17B4/EHHADH.
    - source: hydration_dehydrogenation
      target: thiolytic_cleavage
      connection_type: PROVIDES_INPUT_FOR
      description: The 3-oxoacyl-CoA is thiolytically cleaved by ACAA1 (straight) or SCPx/SCP2 (branched/bile-acid).
    - source: thiolytic_cleavage
      target: acyl_coa_oxidation
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The chain-shortened acyl-CoA (minus two carbons) re-enters the oxidase step, iterating the
        beta-oxidation spiral until the substrate is fully shortened.
  notes: >-
    Peroxisomal fatty-acid beta-oxidation (GO:0006635 + GO:0033540), grounded to six completed human gene
    reviews, all peroxisomal-matrix enzymes. STEP 1 (FAD oxidase, O2->H2O2): ACOX1 (Q15067, straight/VLCFA,
    GO:0003997; pseudo-neonatal ALD) + ACOX3 (O15254, 2-methyl-branched/pristanoyl, GO:0016402 — NB
    GO:0033812 is a THIOLASE not the oxidase) share PTHR10909. STEPS 2-3 (hydration+NAD+ dehydrogenation),
    opposite stereochemistry: D-bifunctional HSD17B4 (P51659 PTHR45024, GO:0080023 hydratase-2 + GO:0106386
    (3R)-HAD; main enzyme for VLCFA/pristanic/bile-acid; D-BP deficiency + Perrault) and L-bifunctional
    EHHADH (Q08426 PTHR23309, GO:0004300 hydratase + GO:0003857 (3S)-HAD; medium-chain/dicarboxylic;
    PPARa-induced; renal Fanconi on mistargeting). STEP 4 (thiolysis): straight-chain ACAA1 (P09110 PTHR43853,
    GO:0003988) + branched/bile-acid SCPx (SCP2 gene, P22307 PTHR42870, GO:0050632 thiolase + GO:0120020
    sterol transfer; SCP2 deficiency). The spiral iterates; acetyl-CoA/propionyl-CoA products and
    chain-shortened acyl-CoAs exit (via carnitine) to mitochondria. GO term ids/labels verified against the
    local go.db. This complements the mitochondrial FAO/ETF modules; the bile-acid branch feeds bile-acid
    synthesis (curated separately). Disorders: ACOX1, HSD17B4 (D-BP), EHHADH, SCP2 deficiencies; Zellweger
    spectrum (peroxisome biogenesis).
