                        label: Sulfur carrier protein ThiS adenylyltransferase
                      representative_members:
                        - preferred_term: thiF (Escherichia coli K-12)
                          term:
                            id: UniProtKB:P30138
                            label: Sulfur carrier protein ThiS adenylyltransferase
                  function:
                    preferred_term: ThiS ubiquitin-like sulfur-carrier activating enzyme activity
                    term:
                      id: GO:0008641
                      label: ubiquitin-like modifier activating enzyme activity
                    substrates:
                      - preferred_term: ThiS C-terminal glycine
                      - preferred_term: ATP
                    products:
                      - preferred_term: adenylylated ThiS
                      - preferred_term: diphosphate
                    evidence:
                      - source_id: EC:2.7.7.73
                        statement: ThiS adenylyltransferase / sulfur carrier protein ThiS activation step.
                      - source_id: QuickGO:UniProtKB:P30138
                        statement: >-
                          QuickGO GOA for E. coli thiF includes GO:0008641 and
                          thiazole biosynthetic process annotations; no
                          ThiS-specific adenylyltransferase MF term was found.
                  role_description: >-
                    Activates the ThiS C-terminus by ATP-dependent
                    adenylylation before sulfur transfer and thiocarboxylate
                    formation.
                  notes: >-
                    P. putida KT2440 lacks a dedicated thiF gene. MoeB/PP_0735
