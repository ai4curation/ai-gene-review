              term:
                id: GO:0004789
                label: thiamine-phosphate diphosphorylase activity
              substrates:
                - preferred_term: HMP diphosphate
                - preferred_term: thiazole phosphate
              products:
                - preferred_term: thiamine phosphate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.5.1.3
