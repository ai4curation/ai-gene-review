                      statement: Existing PSEPK review accepts the family-inferred ThiI role in thiazole biosynthesis and notes the missing precise ThiS-transfer MF term.
                  role_description: >-
                    Transfers sulfur to the ThiS sulfur carrier to form ThiS
                    thiocarboxylate for thiazole biosynthesis.
                  notes: >-
                    GO currently lacks the precise ThiS sulfur-carrier protein
                    sulfurtransferase MF proposed in the PSEPK thiI review, so
                    this role is represented by the specific thiazole process
                    and curator notes rather than a broad sulfurtransferase MF.
                - id: thiS_sulfur_carrier_role
                  label: "ThiS: sulfur carrier protein"
                  participant:
