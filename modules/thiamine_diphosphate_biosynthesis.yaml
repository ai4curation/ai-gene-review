id: MODULE:thiamine_diphosphate_biosynthesis
title: Bacterial thiamine diphosphate biosynthesis
description: >-
  Species-neutral bacterial pathway for de novo synthesis of thiamine
  diphosphate (ThDP), the active thiamine cofactor. The pathway has two
  converging branches: a hydroxymethylpyrimidine branch in which ThiC converts
  an AIR-derived precursor to HMP phosphate and ThiD phosphorylates it to the
  diphosphate, and a thiazole branch in which Dxs, ThiO, sulfur-relay proteins,
  and ThiG form the thiazole phosphate moiety. ThiE couples the pyrimidine and
  thiazole moieties to thiamine phosphate, and ThiL phosphorylates thiamine
  phosphate to ThDP. The thiazole branch includes the ThiS sulfur-carrier
  activation/thiocarboxylation relay rather than treating sulfur delivery as a
  single enzyme reaction.
status: DRAFT
evidence:
  - source_id: GO:0009228
    title: thiamine biosynthetic process
    statement: >-
      GO biological-process term for thiamine biosynthesis; used as the parent
      process grounding for the module.
  - source_id: GO:0009229
    title: thiamine diphosphate biosynthetic process
    statement: >-
      GO biological-process term for synthesis of active thiamine diphosphate;
      used as the specific process grounding for the module.
  - source_id: KEGG:map00730
    title: Thiamine metabolism
    statement: >-
      KEGG thiamine-metabolism pathway context. The PSEPK map includes de novo
      thiamine genes plus nucleotide-metabolism and ribosome-biogenesis spillover
      that require curator filtering.
  - source_id: UniPathway:UPA00060
    title: Thiamine diphosphate biosynthesis
    statement: >-
      UniPathway pathway context for bacterial thiamine diphosphate biosynthesis
      used by UniProt metadata for several PSEPK candidate genes.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata inventory
    statement: >-
      Local UniProt-derived inventory provides the Pseudomonas putida KT2440
      exemplar accessions, GO terms, EC numbers, and PANTHER families used to
      ground representative members in this module.
  - source_id: file:PSEPK/thiO/thiO-ai-review.yaml
    title: PSEPK thiO gene review
    statement: >-
      Existing review supports ThiO glycine oxidase activity and its role in
      supplying glyoxyl imine for thiazole/thiamine biosynthesis.
  - source_id: file:PSEPK/thiI/thiI-ai-review.yaml
    title: PSEPK thiI gene review
    statement: >-
      Existing review supports ThiI tRNA sulfurtransferase activity and the
      family-inferred ThiS sulfur-carrier transfer role in thiazole/thiamine
      biosynthesis, while noting that GO lacks a precise ThiS-transfer MF term.
  - source_id: file:modules/thiamine_diphosphate_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module review for bacterial thiamine diphosphate biosynthesis
    statement: >-
      Generic module-level retrieval supports the de novo ThDP boundary,
      separates salvage/transport from the core pathway, and highlights the
      IscS/ThiF/ThiI/ThiS sulfur-relay order for thiazole synthesis.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__thiamine_diphosphate_biosynthesis__ppu00730-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00730 thiamine diphosphate biosynthesis review
    statement: >-
      Species/pathway satisfiability review finds the KT2440 de novo ThDP
      pathway largely covered, adds PP_5105/ThiS as a missing module member,
      excludes KEGG overview artifacts such as adk and rsgA, and flags the
      ThiF-type ThiS adenylylation step as candidate_uncertain because KT2440
      lacks a dedicated thiF gene.
notes: >-
  This module is narrower than KEGG ppu00730 "Thiamine metabolism": it models
  de novo ThDP biosynthesis. Adenylate kinase (adk), RsgA, thiamine
  triphosphatase, aminopyrimidine aminohydrolases, and transport/salvage
  proteins are pathway neighbors or salvage context rather than required core
  biosynthetic steps. In P. putida KT2440, PP_5105 encodes the ThiS sulfur
  carrier and is a likely module member even though it is assigned to KEGG
  sulfur-relay map ppu04122 rather than ppu00730. The KT2440 ThiF-type ThiS
  adenylylation enzyme is unresolved: OpenScientist found no dedicated thiF and
  nominated MoeB/PP_0735 as the only plausible but unconfirmed E1-like
  substitute, so the module keeps a species-neutral ThiF-family step and records
  the PSEPK assignment as a curation gap.
