                    substitute identified by OpenScientist, but it remains a
                    candidate_uncertain member until full gene review or
                    experiment resolves whether it activates ThiS in vivo.
                - id: thiI_this_sulfurtransfer_role
                  label: "ThiI: sulfur transfer to ThiS"
                  participant:
                    selector_type: FAMILY
                    family:
