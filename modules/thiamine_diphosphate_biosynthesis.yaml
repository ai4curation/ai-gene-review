                      - source_id: EC:2.2.1.7
                        statement: 1-deoxy-D-xylulose-5-phosphate synthase.
                  role_description: Supplies DXP, the carbon precursor for the thiazole moiety.
                  notes: >-
                    DXP is also used in non-mevalonate isoprenoid biosynthesis;
                    the Dxs step is substrate supply for this module rather than
                    a thiamine-specific commitment step.
          - order: 2
            role: iminoglycine supply
            node:
              id: thiO_step
              label: Glycine oxidation to iminoglycine
              module_type: REACTION
              annotons:
                - id: glycine_oxidase_activity
                  label: "ThiO: glycine oxidase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: ThiO glycine oxidase family
                      term:
                        id: PANTHER:PTHR13847
                        label: D-amino acid oxidase / ThiO glycine oxidase family
                      representative_members:
