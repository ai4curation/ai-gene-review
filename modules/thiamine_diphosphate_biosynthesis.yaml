                            label: Cysteine desulfurase IscS
                        - preferred_term: iscS-II (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88K56
                            label: Cysteine desulfurase
                  function:
                    preferred_term: cysteine desulfurase activity
                    term:
                      id: GO:0031071
                      label: cysteine desulfurase activity
                    substrates:
                      - preferred_term: L-cysteine
                    products:
                      - preferred_term: enzyme-bound persulfide sulfur
                      - preferred_term: L-alanine
                    evidence:
                      - source_id: EC:2.8.1.7
                        statement: Cysteine desulfurase.
                  role_description: Mobilizes sulfur as persulfide for ThiI-mediated ThiS thiocarboxylation.
                  notes: >-
                    P. putida KT2440 encodes iscS and iscS-II candidates; the
                    exact thiamine-branch contributor should be checked in full
                    gene reviews.
                - id: thiF_this_adenylylation_activity
                  label: "ThiF: ThiS sulfur-carrier activation"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: ThiF sulfur carrier protein ThiS adenylyltransferase subfamily
                      term:
