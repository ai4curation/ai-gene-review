                      - source_id: file:PSEPK/thiO/thiO-ai-review.yaml
                        statement: Existing PSEPK review accepts glycine oxidase activity as ThiO core MF.
                  role_description: Supplies iminoglycine, the glycine-derived imine intermediate for thiazole formation.
          - order: 3
            role: sulfur mobilization and ThiS thiocarboxylation
            node:
              id: this_sulfur_relay
              label: ThiS sulfur-carrier thiocarboxylation
              module_type: METABOLIC_PATHWAY
              annotons:
                - id: cysteine_desulfurase_activity
                  label: "IscS: cysteine desulfurase sulfur donor"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: IscS cysteine desulfurase family
                      term:
                        id: PANTHER:PTHR11601
                        label: Cysteine desulfurase family
                      representative_members:
