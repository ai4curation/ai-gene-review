                        statement: Phosphomethylpyrimidine synthase.
                  role_description: Forms the phosphorylated HMP pyrimidine moiety.
          - order: 2
            role: HMP phosphate activation
            node:
              id: thiD_step
              label: HMP phosphate to HMP diphosphate
              module_type: REACTION
              annotons:
                - id: phosphomethylpyrimidine_kinase_activity
                  label: "ThiD: phosphomethylpyrimidine kinase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: ThiD hydroxymethylpyrimidine/phosphomethylpyrimidine kinase family
                      term:
                        id: PANTHER:PTHR20858
                        label: Hydroxymethylpyrimidine kinase family
                      representative_members:
                        - preferred_term: thiD (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88DP2
                            label: Hydroxymethylpyrimidine kinase
                  function:
                    preferred_term: phosphomethylpyrimidine kinase activity
                    term:
                      id: GO:0008972
                      label: phosphomethylpyrimidine kinase activity
                    substrates:
                      - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine phosphate
                      - preferred_term: ATP
                    products:
                      - preferred_term: 4-amino-5-hydroxymethyl-2-methylpyrimidine diphosphate
                      - preferred_term: ADP
                    evidence:
                      - source_id: EC:2.7.4.7
                        statement: Phosphomethylpyrimidine kinase activity for the modeled HMP-P to HMP-PP reaction.
                  role_description: Activates HMP phosphate to the diphosphate used by ThiE.
                  notes: >-
                    ThiD-family enzymes may also support HMP salvage via
                    hydroxymethylpyrimidine kinase activity; this annoton
                    represents the de novo HMP-P to HMP-PP step.
    - order: 2
      role: thiazole branch
      node:
        id: thiazole_branch
        label: Thiazole phosphate branch
        module_type: METABOLIC_PATHWAY
        description: >-
          Produces the thiazole phosphate moiety from DXP, glycine-derived
          imine chemistry, and sulfur carried through IscS/ThiI/ThiS.
        parts:
          - order: 1
            role: DXP precursor supply
            node:
              id: dxs_step
              label: DXP formation
              module_type: REACTION
              annotons:
                - id: dxp_synthase_activity
                  label: "Dxs: 1-deoxy-D-xylulose-5-phosphate synthase"
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: Dxs 1-deoxy-D-xylulose-5-phosphate synthase family
                      term:
                        id: PANTHER:PTHR43322
                        label: 1-deoxy-D-xylulose-5-phosphate synthase family
                      representative_members:
                        - preferred_term: dxs (Pseudomonas putida KT2440)
                          term:
                            id: UniProtKB:Q88QG7
                            label: 1-deoxy-D-xylulose-5-phosphate synthase
                  function:
                    preferred_term: 1-deoxy-D-xylulose-5-phosphate synthase activity
                    term:
