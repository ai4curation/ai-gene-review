                  role_description: Carries activated sulfur for ThiG-mediated thiazole phosphate formation.
                  notes: >-
                    PP_5105 is assigned to KEGG sulfur-relay map ppu04122 in the
                    local partition but is a likely missing ppu00730 member for
                    the thiazole branch.
