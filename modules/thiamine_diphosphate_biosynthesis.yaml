  knowledge_gaps:
    - gap_statement: >-
        In P. putida KT2440, the physiological enzyme for the ThiF-type ThiS
        C-terminal adenylylation step is unresolved: no dedicated thiF is
        annotated, and MoeB/PP_0735 is only an uncertain substitute candidate.
      boundary: >-
        Keep ThiS activation as a required species-neutral sulfur-relay step,
        but do not assert KT2440 MoeB as a confirmed thiamine-biosynthesis
        enzyme without gene-level review or experimental evidence.
      gap_kind:
        - BIOLOGY
        - CURATION
      dark_aspect: RESIDUAL_SUBGAP
      status: OPEN
      resolution: >-
        Resolve by full review and, ideally, genetic or biochemical evidence for
        whether MoeB/PP_0735 can activate ThiS in KT2440.
      provenance:
        - reference_id: file:projects/P_PUTIDA/deep-research/PSEPK__thiamine_diphosphate_biosynthesis__ppu00730-deep-research-openscientist.md
          supporting_text: >-
            The single genuine **gap** in the module is the **ThiF-type ThiS
            C-terminal adenylylation step (EC 2.7.7.73)**, which activates the
            sulfur-carrier protein ThiS for thiocarboxylate formation.
          reference_section_type: RESULTS
