            role: HMP phosphate formation
            node:
              id: thiC_step
              label: AIR-derived precursor to HMP phosphate
              module_type: REACTION
              annotons:
                - id: phosphomethylpyrimidine_synthase_activity
                  label: "ThiC: phosphomethylpyrimidine synthase"
