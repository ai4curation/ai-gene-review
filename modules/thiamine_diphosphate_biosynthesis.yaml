                      label: Thiamine-monophosphate kinase
            function:
              preferred_term: thiamine-phosphate kinase activity
              term:
                id: GO:0009030
                label: thiamine-phosphate kinase activity
              substrates:
                - preferred_term: thiamine phosphate
                - preferred_term: ATP
              products:
                - preferred_term: thiamine diphosphate
                - preferred_term: ADP
              cofactors:
                - preferred_term: magnesium ion
              evidence:
                - source_id: EC:2.7.4.16
                  statement: Thiamine-phosphate kinase.
            role_description: Produces the active cofactor thiamine diphosphate.
  connections:
    - source: thiC_step
      target: thiD_step
      connection_type: PRECEDES
    - source: dxs_step
      target: thiG_step
