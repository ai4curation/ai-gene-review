id: MODULE:flagellar_motor_switch_stator_boundary
title: Flagellar motor, switch, and stator boundary
description: >-
  Boundary module for the ppu02040 flagellar motor/switch/stator subset in
  Pseudomonas putida KT2440. The first-pass module covers the MotCD stator
  candidate pair encoded in the main flagellar cluster (PP_4336/PP_4335), the
  second MotAB stator pair (motA/motB), the FliG/FliM/FliN C-ring switch/rotor,
  two FliL-family motor-associated proteins, and the YcgR c-di-GMP-dependent
  flagellar brake from the motility/chemotaxis/biofilm functional-bucket
  extension. It separates motor operation from the broader ppu02040
  export/assembly, basal-body/hook/filament, flagellar-regulation, and
  c-di-GMP turnover buckets.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02040
    title: Flagellar assembly - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02040 provides the organism-specific flagellar assembly umbrella
      that includes the flagellar export apparatus, basal-body/hook/filament
      structural proteins, motor/switch/stator components, and regulators.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.tsv
    title: ppu02040 bacterial flagellar assembly partition table
    statement: >-
      The partition separates PP_4335, PP_4336, fliN, fliM, fliL, fliG, motB,
      motA, and PP_5209 into the flagellar motor/switch/stator bucket.
  - source_id: PMID:36409076
    title: Role of the Two Flagellar Stators in Swimming Motility of Pseudomonas putida.
    statement: >-
      The P. putida stator study identifies two stators, MotAB and MotCD, and
      maps the MotCD stator to PP4336/PP4335 in the main flagellar cluster and
      MotAB to PP4905/PP4904.
  - source_id: PMID:31452860
    title: Directional Switching Mechanism of the Bacterial Flagellar Motor.
    statement: >-
      FliG, FliM, and FliN form the C ring on the cytoplasmic face of the basal
      body and act as the rotor/switch device controlled by CheY-P.
  - source_id: PMID:35572622
    title: The Periplasmic Domain of the Ion-Conducting Stator of Bacterial Flagella Regulates Force Generation.
    statement: >-
      Flagellar stators couple ion influx to torque generation, the B subunit
      uses periplasmic peptidoglycan anchoring, and FliL is positioned near the
      stator at the flagellar base.
  - source_id: file:PSEPK/PP_4335/PP_4335-ai-review.yaml
    title: Curated PP_4335 review
    statement: >-
      The PP_4335 review treats PP_4335 as the MotB-like B subunit candidate of
      the MotCD stator and removes the generic membrane term as non-informative.
  - source_id: file:PSEPK/PP_4336/PP_4336-ai-review.yaml
    title: Curated PP_4336 review
    statement: >-
      The PP_4336 review treats PP_4336 as the MotA-like A subunit candidate of
      the MotCD stator and marks chemotaxis and swarming as indirect or
      over-specific.
  - source_id: file:PSEPK/motB/motB-ai-review.yaml
    title: Curated motB review
    statement: >-
      The motB review records the MotAB B subunit as a MotB-family stator
      protein with peptidoglycan-binding and proton-channel contribution in the
      bacterial-type flagellum stator complex.
  - source_id: file:PSEPK/motA/motA-ai-review.yaml
    title: Curated motA review
    statement: >-
      The motA review records the MotAB A subunit as a multi-pass stator
      component contributing proton transmembrane transporter activity to
      flagellum-dependent motility.
  - source_id: file:PSEPK/fliG/fliG-ai-review.yaml
    title: Curated fliG review
    statement: >-
      The fliG review records FliG as the C-ring rotor/switch component that
      couples stator force to flagellar rotation and directional switching.
  - source_id: file:PSEPK/fliM/fliM-ai-review.yaml
    title: Curated fliM review
    statement: >-
      The fliM review accepts C-ring motor/switch function and treats positive
      chemotaxis and swarming as more specific than the first-pass evidence
      supports.
  - source_id: file:PSEPK/fliN/fliN-ai-review.yaml
    title: Curated fliN review
    statement: >-
      The fliN review accepts C-ring motor/switch function and keeps chemotaxis
      as a higher-level non-core context.
  - source_id: file:PSEPK/fliL/fliL-ai-review.yaml
    title: Curated fliL review
    statement: >-
      The fliL review records FliL as a single-pass FliL-family flagellar
      basal-body/motor-associated protein supporting flagellum-dependent
      motility.
  - source_id: file:PSEPK/PP_5209/PP_5209-ai-review.yaml
    title: Curated PP_5209 review
    statement: >-
      The PP_5209 review records the second FliL-family protein as a
      motor-associated candidate with unresolved paralog-specific role.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_flagellar_assembly_regulation_spillovers.tsv
    title: Motility-bucket flagellar assembly/regulation spillover table
    statement: >-
      The motility functional-bucket partition routes ycgR to the flagellar
      motor/switch/stator boundary as a c-di-GMP-dependent motor-brake context.
  - source_id: file:PSEPK/ycgR/ycgR-ai-review.yaml
    title: Curated ycgR review
    statement: >-
      The ycgR review records YcgR as a PilZ-domain c-di-GMP-binding flagellar
      brake localized at the basal body and regulating motor speed.
notes: >-
  First-pass interpretation: PP_4336/PP_4335 are treated as the MotCD stator
  pair (MotC-like A subunit and MotD-like B subunit) on the basis of the P.
  putida stator study and UniProt/domain evidence. motA/motB are the second
  MotAB stator. FliG/FliM/FliN form the C-ring switch/rotor. fliL and PP_5209
  are retained as FliL-family basal-body/motor-associated support proteins, but
  their exact stator partner and load-dependent requirements are not resolved in
  this pass. ycgR is added as a c-di-GMP-binding flagellar brake that acts on
  motor output rather than c-di-GMP turnover.
