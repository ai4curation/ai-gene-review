id: MODULE:bile_acid_synthesis_sidechain_conjugation
title: Bile acid synthesis II — side-chain oxidation, peroxisomal shortening and amino-acid conjugation; CYP27A1/AMACR/ACOX2/SLC27A5/BAAT
description: >-
  After the sterol nucleus of cholesterol has been hydroxylated (the ring-modification
  segment: CYP7A1/CYP7B1/HSD3B7/AKR1D1), the C27 side chain must be oxidised and shortened
  by three carbons to give the mature C24 bile acids, which are then conjugated to an amino
  acid before secretion. Mitochondrial sterol 27-hydroxylase (CYP27A1) initiates side-chain
  oxidation, hydroxylating C27 of the 5beta-cholestane-3alpha,7alpha,12alpha-triol (and the
  7alpha-hydroxy-diol) and further oxidising it to the C27 bile-acid intermediates
  3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoic acid (THCA) and its 12-deoxy congener
  DHCA. These C27 acids are activated to their CoA thioesters and imported into the
  peroxisome, where alpha-methylacyl-CoA racemase (AMACR) converts the (25R) diastereomer to
  the (25S) form required for beta-oxidation, and the peroxisomal branched-chain acyl-CoA
  oxidase ACOX2 catalyses the first (oxidase) step of one round of beta-oxidation; the
  downstream MFP2/SCPx steps release propionyl-CoA to give the C24 bile-acyl-CoAs
  choloyl-CoA and chenodeoxychenoyl-CoA. Bile acid-CoA:amino acid N-acyltransferase (BAAT)
  then transfers the C24 bile acid from CoA onto glycine or taurine, forming the glyco- and
  tauro-conjugated bile salts that are the major biliary species; the ER-membrane bile
  acyl-CoA synthetase SLC27A5 (cholate-CoA ligase / FATP5) re-activates free bile acids to
  their CoA esters, chiefly in the enterohepatic recycling loop, feeding BAAT for
  re-conjugation. Inherited defects across this segment cause cerebrotendinous xanthomatosis
  (CYP27A1), AMACR deficiency (an adult sensorimotor neuropathy with bile-acid abnormalities),
  ACOX2 deficiency (a bile-acid synthesis defect with liver disease/dystonia) and familial
  hypercholanemia / bile acid conjugation defect (BAAT).
status: DRAFT
evidence:
  - source_id: GO:0006699
    title: bile acid biosynthetic process
    statement: >-
      The module is grounded in bile acid biosynthetic process (GO:0006699); it covers the
      side-chain-oxidation, peroxisomal-shortening and amino-acid-conjugation segment that
      converts C27 sterol-acid intermediates into secreted conjugated C24 bile salts.
  - source_id: Reactome:R-HSA-193368
    title: Synthesis of bile acids and bile salts via 7alpha-hydroxycholesterol
    statement: >-
      Step order, intermediates and reaction stoichiometries follow the human Reactome
      "Synthesis of bile acids and bile salts via 7alpha-hydroxycholesterol" sub-pathway,
      including the side-chain-oxidation and conjugation reactions cited on each node.
  - source_id: file:human/CYP27A1/CYP27A1-ai-review.yaml
    title: CYP27A1 gene review (human)
    statement: >-
      The mitochondrial sterol 27-hydroxylase side-chain-oxidation step
      (UniProtKB:Q02318, GO:0047748/GO:0031073) matches the completed human CYP27A1 review.
  - source_id: file:human/AMACR/AMACR-ai-review.yaml
    title: AMACR gene review (human)
    statement: >-
      The alpha-methylacyl-CoA racemase step (UniProtKB:Q9UHK6, GO:0008111) that supplies
      the (25S)-THCA-CoA substrate for beta-oxidation matches the completed human AMACR review.
  - source_id: file:human/ACOX2/ACOX2-ai-review.yaml
    title: ACOX2 gene review (human)
    statement: >-
      The peroxisomal branched-chain acyl-CoA oxidase step
      (UniProtKB:Q99424, GO:0003997/GO:0033791) matches the completed human ACOX2 review.
  - source_id: file:human/SLC27A5/SLC27A5-ai-review.yaml
    title: SLC27A5 gene review (human)
    statement: >-
      The ER-membrane bile acyl-CoA synthetase (cholate-CoA ligase) step
      (UniProtKB:Q9Y2P5, GO:0047747) matches the completed human SLC27A5 review.
  - source_id: file:human/BAAT/BAAT-ai-review.yaml
    title: BAAT gene review (human)
    statement: >-
      The final glycine/taurine N-acyltransferase conjugation step
      (UniProtKB:Q14032, GO:0047963) matches the completed human BAAT review.
module:
  id: bile_acid_synthesis_sidechain_conjugation
  label: Bile acid side-chain oxidation and conjugation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: bile acid biosynthetic process
      term:
        id: GO:0006699
        label: bile acid biosynthetic process
      description: >-
        Oxidation and three-carbon shortening of the cholestanoid side chain followed by
        amino-acid conjugation, producing secreted conjugated C24 bile salts.
  context:
    cellular_components:
      - preferred_term: mitochondrion
        term:
          id: GO:0005739
          label: mitochondrion
        description: CYP27A1 initiates side-chain oxidation in the mitochondrial inner membrane.
      - preferred_term: peroxisomal matrix
        term:
          id: GO:0005782
          label: peroxisomal matrix
        description: >-
          AMACR racemization and ACOX2-initiated beta-oxidation shortening occur in the
          peroxisome; BAAT conjugation is peroxisomal/cytosolic.
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: SLC27A5 (bile acyl-CoA synthetase) is an ER-membrane enzyme.
  parts:
    - order: 1
      role: side-chain oxidation (C27 -> C27 bile-acid intermediate)
      node:
        id: cyp27a1_step
        label: sterol side-chain 27-hydroxylation/oxidation to THCA/DHCA
        module_type: REACTION
        annotons:
          - id: cyp27a1_activity
            label: "CYP27A1: sterol 27-hydroxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Cytochrome P450 family 27 (CYP27A1)
                term:
                  id: PANTHER:PTHR24279
                  label: CYTOCHROME P450
                representative_members:
                  - preferred_term: CYP27A1 (human)
                    term:
                      id: UniProtKB:Q02318
                      label: Sterol 26-hydroxylase, mitochondrial
            function:
              preferred_term: cholestanetetraol 26-dehydrogenase activity
              term:
                id: GO:0047748
                label: cholestanetetraol 26-dehydrogenase activity
              substrates:
                - preferred_term: 5beta-cholestane-3alpha,7alpha,12alpha-triol
                - preferred_term: O2
                - preferred_term: NADPH (via adrenodoxin/adrenodoxin reductase)
              products:
                - preferred_term: 3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoic acid (THCA)
              evidence:
                - source_id: EC:1.14.15.15
                  statement: sterol 26-hydroxylase (mitochondrial P450); C27 side-chain hydroxylation/oxidation to the C27 bile-acid acids THCA/DHCA
                - source_id: Reactome:R-HSA-191999
                  statement: "CYP27A1 27-hydroxylates 5bCHOL3a,7a,12a-triol (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              Mitochondrial initiation of side-chain oxidation; also the sole enzyme of the
              acidic (alternative) bile-acid pathway. Deficiency = cerebrotendinous xanthomatosis.
    - order: 2
      role: racemization of the C27 acyl-CoA for beta-oxidation
      node:
        id: amacr_step
        label: (25R)-THCA-CoA to (25S)-THCA-CoA
        module_type: REACTION
        annotons:
          - id: amacr_activity
            label: "AMACR: alpha-methylacyl-CoA racemase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Alpha-methylacyl-CoA racemase family (AMACR)
                term:
                  id: PANTHER:PTHR48228
                  label: ALPHA-METHYLACYL-COA RACEMASE
                representative_members:
                  - preferred_term: AMACR (human)
                    term:
                      id: UniProtKB:Q9UHK6
                      label: Alpha-methylacyl-CoA racemase
            function:
              preferred_term: alpha-methylacyl-CoA racemase activity
              term:
                id: GO:0008111
                label: alpha-methylacyl-CoA racemase activity
              substrates:
                - preferred_term: (25R)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA
              products:
                - preferred_term: (25S)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA
              evidence:
                - source_id: EC:5.1.99.4
                  statement: alpha-methylacyl-CoA racemase; interconverts (R)/(S) 2-methyl-branched acyl-CoAs, producing the (25S) THCA/DHCA-CoA needed for peroxisomal beta-oxidation
                - source_id: Reactome:R-HSA-192056
                  statement: "Isomerization of 25(R) THCA-CoA to 25(S) THCA-CoA (human Reactome reaction)"
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: >-
              Chiral inversion at C25 that converts the (25R) product of side-chain oxidation
              into the (25S) substrate for ACOX2. Deficiency = adult AMACR-deficiency neuropathy.
    - order: 3
      role: peroxisomal beta-oxidation (side-chain shortening, first step)
      node:
        id: acox2_step
        label: (25S)-THCA-CoA to 24-ene-THCA-CoA (leading to choloyl-CoA)
        module_type: REACTION
        annotons:
          - id: acox2_activity
            label: "ACOX2: branched-chain acyl-CoA oxidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acyl-CoA oxidase family (ACOX2)
                term:
                  id: PANTHER:PTHR10909
                  label: ACYL-COA OXIDASE
                representative_members:
                  - preferred_term: ACOX2 (human)
                    term:
                      id: UniProtKB:Q99424
                      label: Peroxisomal acyl-coenzyme A oxidase 2
            function:
              preferred_term: 3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA 24-hydroxylase activity
              term:
                id: GO:0033791
                label: 3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA 24-hydroxylase activity
              substrates:
                - preferred_term: (25S)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA
                - preferred_term: O2
              products:
                - preferred_term: (24E)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholest-24-enoyl-CoA
                - preferred_term: H2O2
              evidence:
                - source_id: EC:1.17.99.3
                  statement: branched-chain (trihydroxycholestanoyl-CoA) oxidase; first, oxidase step of the peroxisomal beta-oxidation round that removes propionyl-CoA to give C24 choloyl-CoA
                - source_id: Reactome:R-HSA-192335
                  statement: "25(S) THCA-CoA is dehydrogenated to 3alpha,7alpha,12alpha-trihydroxy-cholestenoyl-CoA (human Reactome reaction)"
            locations:
              - preferred_term: peroxisomal matrix
                term:
                  id: GO:0005782
                  label: peroxisomal matrix
            role_description: >-
              Rate-limiting oxidase step of side-chain beta-oxidation; downstream MFP2 and
              SCPx complete one round, releasing propionyl-CoA to yield the C24 bile-acyl-CoAs.
              Deficiency = ACOX2-related bile-acid synthesis defect.
    - order: 4
      role: bile-acid CoA activation (enterohepatic recycling/activation)
      node:
        id: slc27a5_step
        label: cholate + CoA + ATP to choloyl-CoA
        module_type: REACTION
        annotons:
          - id: slc27a5_activity
            label: "SLC27A5: bile acyl-CoA synthetase (cholate-CoA ligase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Long-chain fatty-acid transport/CoA ligase family (SLC27/FATP)
                term:
                  id: PANTHER:PTHR43107
                  label: LONG-CHAIN-FATTY-ACID--COA LIGASE
                representative_members:
                  - preferred_term: SLC27A5 (human)
                    term:
                      id: UniProtKB:Q9Y2P5
                      label: Bile acyl-CoA synthetase
            function:
              preferred_term: cholate-CoA ligase activity
              term:
                id: GO:0047747
                label: cholate-CoA ligase activity
              substrates:
                - preferred_term: cholate (or chenodeoxycholate)
                - preferred_term: ATP
                - preferred_term: CoA
              products:
                - preferred_term: choloyl-CoA (or chenodeoxycholoyl-CoA)
                - preferred_term: AMP
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:6.2.1.7
                  statement: cholate-CoA ligase (bile acyl-CoA synthetase); ATP-dependent activation of free C24 bile acids to their CoA esters, chiefly re-activating reabsorbed bile acids for re-conjugation
                - source_id: Reactome:R-HSA-159425
                  statement: "Cytosolic cholate and chenodeoxycholate are conjugated with CoA (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Regenerates bile-acyl-CoA from free bile acids (also a long-chain-fatty-acid-CoA
              ligase); supplies the CoA-thioester substrate for BAAT during enterohepatic recycling.
    - order: 5
      role: amino-acid conjugation (final, secreted product)
      node:
        id: baat_step
        label: choloyl-CoA + glycine/taurine to glyco-/tauro-cholate
        module_type: REACTION
        annotons:
          - id: baat_activity
            label: "BAAT: bile acid-CoA:amino acid N-acyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Bile acid-CoA:amino acid N-acyltransferase family (BAAT)
                term:
                  id: PANTHER:PTHR10824
                  label: BILE ACID-COA:AMINO ACID N-ACYLTRANSFERASE
                representative_members:
                  - preferred_term: BAAT (human)
                    term:
                      id: UniProtKB:Q14032
                      label: Bile acid-CoA:amino acid N-acyltransferase
            function:
              preferred_term: glycine N-choloyltransferase activity
              term:
                id: GO:0047963
                label: glycine N-choloyltransferase activity
              substrates:
                - preferred_term: choloyl-CoA (or chenodeoxycholoyl-CoA)
                - preferred_term: glycine (or taurine)
              products:
                - preferred_term: glycocholate (or taurocholate)
                - preferred_term: CoA
              evidence:
                - source_id: EC:2.3.1.65
                  statement: bile acid-CoA:amino acid N-acyltransferase; final conjugation step transferring the C24 bile acid from CoA onto glycine or taurine
                - source_id: Reactome:R-HSA-192312
                  statement: "Choloyl CoA reacts with glycine or taurine to form glycocholate or taurocholate (human Reactome reaction)"
            locations:
              - preferred_term: peroxisome
                term:
                  id: GO:0005777
                  label: peroxisome
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Produces the mature, secreted glyco-/tauro-conjugated bile salts. Deficiency =
              familial hypercholanemia / bile acid conjugation defect.
  connections:
    - source: cyp27a1_step
      target: amacr_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The C27 acid (THCA/DHCA) from CYP27A1 is activated to its CoA ester and racemized by
        AMACR to the (25S) form.
    - source: amacr_step
      target: acox2_step
      connection_type: PROVIDES_INPUT_FOR
      description: (25S)-THCA-CoA from AMACR is the substrate for ACOX2-initiated beta-oxidation.
    - source: acox2_step
      target: baat_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Peroxisomal beta-oxidation (ACOX2 + MFP2/SCPx) shortens the side chain to the C24
        choloyl-CoA that BAAT conjugates.
    - source: slc27a5_step
      target: baat_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        SLC27A5 re-activates free bile acids to choloyl-CoA, supplying BAAT for re-conjugation
        during enterohepatic recycling.
  notes: >-
    Side-chain-oxidation/conjugation segment of bile-acid synthesis, grounded to the human
    enzymes CYP27A1 (UniProtKB:Q02318, GO:0047748/GO:0031073, EC 1.14.15.15), AMACR (Q9UHK6,
    GO:0008111, EC 5.1.99.4), ACOX2 (Q99424, GO:0033791/GO:0003997, EC 1.17.99.3), SLC27A5
    (Q9Y2P5, GO:0047747, EC 6.2.1.7) and BAAT (Q14032, GO:0047963, EC 2.3.1.65). GO
    molecular-function and location terms were taken from the completed human gene reviews and
    verified against the local go.db; Reactome reaction ids/titles were verified against the
    local reactome cache. Each step uses a PANTHER family selector with the human enzyme as
    representative so the module generalises across orthologs/paralogs. Upstream is the
    ring-modification module (CYP7A1/CYP7B1/HSD3B7/AKR1D1 -> the 5beta-cholestane-triol/diol);
    the C27-acid CoA activation and the downstream MFP2 (HSD17B4) and SCPx (SCP2) thiolytic
    steps that release propionyl-CoA are not represented as separate mapping genes here.
    SLC27A5 and BAAT together constitute the conjugation/recycling node feeding conjugated bile
    salts into biliary secretion (BSEP/ABCB11) and the enterohepatic circulation. Disorders
    span the segment: cerebrotendinous xanthomatosis (CYP27A1), AMACR deficiency, ACOX2
    deficiency and familial hypercholanemia / bile acid conjugation defect (BAAT).
