id: MODULE:scer_hog1_cascade
title: Budding yeast (S. cerevisiae) high-osmolarity (Ssk2-Pbs2-Hog1) MAPK cascade module
description: >-
  A decomposition of the Saccharomyces cerevisiae high-osmolarity glycerol (HOG)
  MAP kinase cascade, the osmostress-activated fungal realization of the generic
  three-tier MAP kinase relay (MODULE:mapk_relay). High external osmolarity is
  sensed by two upstream branches - the Sln1 two-component phosphorelay (which
  derepresses the MAP3Ks Ssk2/Ssk22) and the Sho1 branch (which routes through
  Ste11) - both converging on the single MAP2K Pbs2, which dually phosphorylates
  the MAPK Hog1 on its TGY activation-loop motif. Active Hog1 translocates to the
  nucleus and activates transcription factors (Hot1, Msn2/Msn4, Sko1) that induce
  glycerol-biosynthesis and stress-response genes restoring osmotic balance. The
  kinase relay - Ssk2/Ssk22 -> Pbs2 -> Hog1 - is declared as an inner bundle that
  `conforms_to` mapk_relay, while the osmosensing input and the Hog1
  transcriptional output are this cascade's free extensions around the conforming
  core. Grounded in GO:0007231 (osmosensory signaling pathway).
status: DRAFT
evidence:
  - source_id: GO:0007231
    title: osmosensory signaling pathway
    statement: >-
      The module is grounded in the GO biological process term for osmosensory
      signaling, the process driven by the yeast HOG pathway.
  - source_id: GO:0000165
    title: MAPK cascade
    statement: >-
      The relay tier conforms to the generic three-tier MAPK cascade motif
      (MODULE:mapk_relay).
notes: >-
  This module is the Saccharomyces cerevisiae HOG-pathway realization of the
  generic three-tier MAP kinase relay (MODULE:mapk_relay), and embeds two nested
  conforming bundles: the inner `sln1_phosphorelay` node bundles the Sln1 -> Ypd1
  -> Ssk1 tiers and conforms to MODULE:two_component_relay, and the inner
  `hog1_relay` node bundles the Ssk2/Ssk22 -> Pbs2 -> Hog1 tiers and conforms to
  mapk_relay. The downstream Hog1 transcriptional output is this cascade's free
  extension around the conforming cores. Representative UniProt members (Sln1
  P39928, Ypd1 Q07688, Ssk1 Q07084, Ssk2 P53599, Pbs2 P08018, Hog1 P32485) were
  verified against UniProt.
module:
  id: scer_hog1_cascade
  label: Budding yeast (S. cerevisiae) high-osmolarity (Ssk2-Pbs2-Hog1) cascade
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: osmosensory signaling pathway
      term:
        id: GO:0007231
        label: osmosensory signaling pathway
      description: The yeast HOG osmostress MAPK pathway, Ssk2/Ssk22 -> Pbs2 -> Hog1.
  context:
    taxa:
      - preferred_term: Saccharomyces cerevisiae
        term:
          id: NCBITaxon:4932
          label: Saccharomyces cerevisiae
        description: >-
          The HOG cascade is a budding-yeast (S. cerevisiae) osmostress pathway;
          the three-tier relay is conserved with the metazoan stress-activated
          MAPK cascades (it is the fungal counterpart of the p38 cascade), but
          the ortholog set (Ssk2/Pbs2/Hog1) is S. cerevisiae specific.
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: Sln1 phosphorelay osmosensing input (conforms to two_component_relay)
      node:
        id: sln1_phosphorelay
        label: Sln1 -> Ypd1 -> Ssk1 osmosensing phosphorelay
        module_type: SIGNALING_PATHWAY
        description: >-
          High external osmolarity is sensed by the Sln1 two-component
          phosphorelay: the sensor histidine kinase Sln1 transfers a phosphoryl
          group through the Hpt intermediate Ypd1 to the response regulator Ssk1.
          Under high osmolarity Sln1 is inactivated, so Ssk1 accumulates
          unphosphorylated and activates the Ssk2/Ssk22 MAP3K tier (a derepression
          logic). A parallel Sho1 branch (via Ste11) also feeds Pbs2. This bundle
          is an instance of the generic two-component phosphorelay.
        conforms_to:
          - template: two_component_relay
            status: EXACT
            notes: >-
              Sln1 (sensor, GO:0000155) -> Ypd1 (Hpt, GO:0009927) -> Ssk1
              (response regulator, GO:0000156) fills the linear phosphorelay
              tiers with the canonical His->Asp transfer topology.
        parts:
          - order: 1
            role: sensor kinase tier (Sln1)
            node:
              id: sln1_sensor
              label: Sln1 sensor histidine kinase autophosphorylation
              module_type: REACTION
              description: The osmosensor histidine kinase Sln1 autophosphorylates and feeds the relay.
              annotons:
                - id: sln1_activity
                  label: Sln1 phosphorelay sensor kinase activity
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: Sln1
                      description: Budding-yeast osmosensor histidine kinase.
                      term:
                        id: UniProtKB:P39928
                        label: Osmosensing histidine protein kinase SLN1
                  function:
                    preferred_term: phosphorelay sensor kinase activity
                    term:
                      id: GO:0000155
                      label: phosphorelay sensor kinase activity
                    targets:
                      - preferred_term: Ypd1
                  role_description: Senses osmolarity and initiates the phosphorelay.
          - order: 2
            role: Hpt tier (Ypd1)
            node:
              id: ypd1_hpt
              label: Ypd1 histidine phosphotransfer
              module_type: REACTION
              description: The Hpt intermediate Ypd1 shuttles the phosphoryl group from Sln1 to Ssk1.
              annotons:
                - id: ypd1_activity
                  label: Ypd1 histidine phosphotransfer kinase activity
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: Ypd1
                      description: Budding-yeast phosphorelay intermediate (Hpt) protein.
                      term:
                        id: UniProtKB:Q07688
                        label: Phosphorelay intermediate protein YPD1
                  function:
                    preferred_term: histidine phosphotransfer kinase activity
                    term:
                      id: GO:0009927
                      label: histidine phosphotransfer kinase activity
                    targets:
                      - preferred_term: Ssk1
                  role_description: Relays the phosphoryl group from Sln1 to Ssk1.
          - order: 3
            role: response regulator tier (Ssk1)
            node:
              id: ssk1_rr
              label: Ssk1 response regulator
              module_type: REACTION
              description: >-
                The response regulator Ssk1 receives the phosphoryl group; its
                unphosphorylated (high-osmolarity) form activates the Ssk2/Ssk22
                MAP3K tier.
              annotons:
                - id: ssk1_activity
                  label: Ssk1 phosphorelay response regulator activity
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: Ssk1
                      description: Budding-yeast osmolarity two-component response regulator.
                      term:
                        id: UniProtKB:Q07084
                        label: Osmolarity two-component system protein SSK1
                  function:
                    preferred_term: phosphorelay response regulator activity
                    term:
                      id: GO:0000156
                      label: phosphorelay response regulator activity
                  processes:
                    - preferred_term: osmosensory signaling pathway
                      term:
                        id: GO:0007231
                        label: osmosensory signaling pathway
                  role_description: Couples the phosphorelay state to the Ssk2/Ssk22 MAP3K tier.
        connections:
          - source: sln1_sensor
            target: ypd1_hpt
            connection_type: CAUSES
            description: Sln1 transfers its phosphoryl group to Ypd1.
          - source: ypd1_hpt
            target: ssk1_rr
            connection_type: CAUSES
            description: Ypd1 delivers the phosphoryl group to Ssk1.
    - order: 2
      role: Hog1 kinase relay (conforms to mapk_relay)
      node:
        id: hog1_relay
        label: Osmostress kinase relay (Ssk2/Ssk22 -> Pbs2 -> Hog1)
        module_type: REACTION
        description: >-
          The three-tier kinase relay of the HOG cascade: the MAP3K Ssk2 (with
          paralog Ssk22) phosphorylates the MAP2K Pbs2, which dually
          phosphorylates the MAPK Hog1 on its TGY activation-loop motif.
        conforms_to:
          - template: mapk_relay
            status: EXACT
            notes: >-
              Ssk2/Ssk22 -> Pbs2 -> Hog1 fills the MAP3K (GO:0004709) -> MAP2K
              (GO:0004708) -> MAPK (GO:0004707) tiers with their canonical
              activating phosphotransfer topology.
        parts:
          - order: 1
            role: MAP3K tier (Ssk2/Ssk22)
            node:
              id: hog1_map3k
              label: Ssk2/Ssk22 MAP kinase kinase kinase activation
              module_type: REACTION
              description: >-
                The MAP3K Ssk2 (and its paralog Ssk22), derepressed by the Sln1
                phosphorelay, phosphorylates and activates Pbs2.
              annotons:
                - id: hog1_map3k_activity
                  label: Ssk2/Ssk22 MAP3K activity
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: Ssk2/Ssk22 osmostress MAP3Ks
                      description: Budding-yeast MAP3Ks of the HOG pathway (Sln1 branch).
                      representative_members:
                        - preferred_term: Ssk2
                          term:
                            id: UniProtKB:P53599
                            label: MAP kinase kinase kinase SSK2
                  function:
                    preferred_term: MAP kinase kinase kinase activity
                    term:
                      id: GO:0004709
                      label: MAP kinase kinase kinase activity
                    targets:
                      - preferred_term: Pbs2
                  role_description: Top kinase tier; activates Pbs2.
          - order: 2
            role: MAP2K tier (Pbs2)
            node:
              id: hog1_map2k
              label: Pbs2 MAP kinase kinase activation
              module_type: REACTION
              description: >-
                The dual-specificity MAP2K Pbs2, which also scaffolds the pathway,
                phosphorylates Hog1 on both threonine and tyrosine of its TGY motif.
              annotons:
                - id: hog1_map2k_activity
                  label: Pbs2 MAP2K activity
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: Pbs2
                      description: Budding-yeast MAP2K and scaffold of the HOG pathway.
                      term:
                        id: UniProtKB:P08018
                        label: MAP kinase kinase PBS2
                  function:
                    preferred_term: MAP kinase kinase activity
                    term:
                      id: GO:0004708
                      label: MAP kinase kinase activity
                    targets:
                      - preferred_term: Hog1 TGY motif
                  role_description: Middle kinase tier; dual-specificity activation of Hog1.
          - order: 3
            role: MAPK tier (Hog1)
            node:
              id: hog1_mapk
              label: Hog1 MAP kinase activation
              module_type: REACTION
              description: >-
                Dually phosphorylated Hog1 becomes an active proline-directed
                serine/threonine kinase and translocates to the nucleus to act on
                osmostress substrates.
              annotons:
                - id: hog1_mapk_activity
                  label: Hog1 MAP kinase activity
                  participant:
                    selector_type: GENE_PRODUCT
                    gene_product:
                      preferred_term: Hog1
                      description: The terminal effector kinase of the yeast HOG cascade (p38 counterpart).
                      term:
                        id: UniProtKB:P32485
                        label: Mitogen-activated protein kinase HOG1
                  function:
                    preferred_term: MAP kinase activity
                    term:
                      id: GO:0004707
                      label: MAP kinase activity
                  locations:
                    - preferred_term: nucleus
                      term:
                        id: GO:0005634
                        label: nucleus
                  role_description: Effector kinase transducing the osmostress signal to substrates.
        connections:
          - source: hog1_map3k
            target: hog1_map2k
            connection_type: CAUSES
            description: Ssk2/Ssk22 phosphorylates and activates Pbs2.
          - source: hog1_map2k
            target: hog1_mapk
            connection_type: CAUSES
            description: Pbs2 dually phosphorylates Hog1.
    - order: 3
      role: Hog1 transcriptional output
      node:
        id: hog1_output
        label: Hog1 effector and osmostress transcriptional output
        module_type: REGULATORY_STEP
        description: >-
          Nuclear Hog1 activates transcription factors (Hot1, Msn2/Msn4, Sko1)
          that induce glycerol-biosynthesis (e.g. GPD1) and general stress-response
          genes, restoring osmotic balance; Hog1 also has cytoplasmic targets
          controlling cell-cycle and translation.
        annotons:
          - id: hog1_substrate_output
            label: Hog1 substrate phosphorylation and stress transcription
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: MAP kinase activity
                term:
                  id: GO:0004707
                  label: MAP kinase activity
            processes:
              - preferred_term: positive regulation of transcription by RNA polymerase II
                term:
                  id: GO:0045944
                  label: positive regulation of transcription by RNA polymerase II
            role_description: Converts Hog1 activity into the osmostress gene program.
  connections:
    - source: sln1_phosphorelay
      target: hog1_relay
      connection_type: PROVIDES_INPUT_FOR
      description: The Sln1 phosphorelay (via unphosphorylated Ssk1) activates the Ssk2/Ssk22 MAP3K tier.
    - source: hog1_relay
      target: hog1_output
      connection_type: PROVIDES_INPUT_FOR
      description: Active Hog1 drives the osmostress transcriptional program.
