id: MODULE:acarbose_validamycin_biosynthesis_boundary
title: Acarbose and validamycin biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00525 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only shared dTDP-glucose and
  dTDP-deoxy-sugar precursor enzymes, rfbA and rffG. These support
  nucleotide-sugar metabolism but not a complete acarbose, validamycin, or
  aminocyclitol antibiotic biosynthesis pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00525
    title: Acarbose and validamycin biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00525 provides the PSEPK curation batch. Its membership is limited
      to rfbA glucose-1-phosphate thymidylyltransferase and rffG dTDP-glucose
      4,6-dehydratase, both shared deoxy-sugar nucleotide precursor enzymes.
module:
  id: acarbose_validamycin_biosynthesis_boundary
  label: Acarbose and validamycin biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: acarbose and validamycin biosynthesis boundary
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has only
        shared dTDP-sugar precursor enzymes from ppu00525, not a satisfiable
        acarbose or validamycin biosynthesis module.
    - preferred_term: nucleotide-sugar metabolic process
      term:
        id: GO:0009225
        label: nucleotide-sugar metabolic process
      description: Shared nucleotide-sugar metabolism represented by the mapped enzymes.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The mapped dTDP-sugar enzymes are soluble cytosolic enzymes.
  parts:
    - order: 1
      role: Shared dTDP-glucose precursor formation
      node:
        id: dtdp_glucose_precursor_boundary
        label: RfbA dTDP-glucose precursor chemistry
        module_type: REACTION
        description: >-
          RfbA forms dTDP-glucose from glucose 1-phosphate and dTTP. Its
          presence in ppu00525 is treated as shared deoxy-sugar precursor
          chemistry rather than acarbose or validamycin pathway satisfiability.
        annotons:
          - id: rfbA_glucose_1_phosphate_thymidylyltransferase_context
            label: "rfbA: glucose-1-phosphate thymidylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rfbA
            function:
              preferred_term: glucose-1-phosphate thymidylyltransferase activity
              term:
                id: GO:0008879
                label: glucose-1-phosphate thymidylyltransferase activity
            role_description: Shared deoxy-sugar nucleotide precursor enzyme; boundary-only for acarbose and validamycin biosynthesis.
    - order: 2
      role: Shared dTDP-deoxy-sugar precursor dehydration
      node:
        id: dtdp_glucose_dehydratase_boundary
        label: RffG dTDP-glucose 4,6-dehydration
        module_type: REACTION
        description: >-
          RffG dehydrates dTDP-glucose to a 4-keto-6-deoxy dTDP-sugar
          intermediate. Its presence in ppu00525 is treated as shared
          deoxy-sugar nucleotide chemistry rather than acarbose or validamycin
          pathway satisfiability.
        annotons:
          - id: rffG_dtdp_glucose_4_6_dehydratase_context
            label: "rffG: dTDP-glucose 4,6-dehydratase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rffG
            function:
              preferred_term: dTDP-glucose 4,6-dehydratase activity
              term:
                id: GO:0008460
                label: dTDP-glucose 4,6-dehydratase activity
            role_description: Shared deoxy-sugar nucleotide precursor enzyme; boundary-only for acarbose and validamycin biosynthesis.
  notes: >-
    This module is intentionally named as a boundary/absence module. PSEPK has
    two shared dTDP-sugar precursor enzymes on KEGG ppu00525, but the
    first-pass curation does not support annotating KT2440 as carrying a
    complete acarbose or validamycin biosynthesis pathway.
