id: MODULE:primordial_germ_cell_specification
title: Primordial germ cell specification module
description: >-
  The early-metazoan program that sets aside the primordial germ cells (PGCs) -
  the lineage that will form the gametes - from the soma. Two evolutionarily
  alternative strategies achieve this and are modelled as a variant set along
  the "specification mode" axis: (1) preformation, in which maternally
  inherited germ plasm (a specialised cytoplasm rich in germline determinants
  such as Vasa/DDX4, Nanos, and Piwi-clade proteins) autonomously specifies PGCs
  in flies, worms, fish, and frogs; and (2) induction, in which BMP signalling
  from extraembryonic tissue instructs competent epiblast cells to become PGCs
  via the PRDM1/PRDM14/TFAP2C tripartite network, as in mouse and (inferred)
  human. Both routes converge on a conserved germline ground state:
  transcriptional quiescence of the somatic program, retention of pluripotency
  potential, and protection of the genome by piRNA-guided transposon silencing.
  Grounded in GO:0007281 (germ cell development) with the germ plasm component
  GO:0060293. See modules/bmp_signaling.yaml for the inductive signal.
status: DRAFT
evidence:
  - source_id: GO:0007281
    title: germ cell development
    statement: The module is grounded in the GO term for germ cell development.
  - source_id: GO:0060293
    title: germ plasm
    statement: The preformation variant is grounded in the germ plasm cellular-component term.
  - source_id: file:human/PIWIL1/PIWIL1-ai-review.yaml
    title: PIWIL1 gene review
    statement: PIWIL1 is used as a piRNA-pathway/germline exemplar; its function is reviewed in-repo.
notes: >-
  Exemplar gene products are curated human UniProt accessions orienting each
  conserved germline role. The preformation determinants (Vasa/DDX4, Nanos,
  Piwi) are ancient and broadly conserved even where the specification mode
  differs; the inductive network (PRDM1/PRDM14/TFAP2C) is the mammalian route.
  The piRNA/transposon-silencing arm is shared by both modes and modelled as a
  common part. Exemplar roles were cross-checked against curated GOA (QuickGO):
  DDX4, NANOS3, and PIWIL1 carry human germline/piRNA annotations, whereas the
  inductive network PRDM1/PRDM14/TFAP2C is supported for the PGC role chiefly by
  mouse orthologs (human GOA has cell fate commitment, inner cell mass and gonad
  terms, but not germ cell development on these three) - the mammalian PGC role
  is well established from Blimp1/Prdm14/Tfap2c knockouts.
module:
  id: primordial_germ_cell_specification
  label: Primordial germ cell specification
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: germ cell development
      term:
        id: GO:0007281
        label: germ cell development
      description: Setting aside and specifying the primordial germ cell lineage from the soma.
  context:
    taxa:
      - preferred_term: metazoa
        term:
          id: NCBITaxon:33208
          label: Metazoa
        description: Germline segregation is universal in animals, achieved by preformation or induction depending on clade.
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
  parts:
    - order: 1
      role: germline determination
      node:
        id: pgc_determination
        label: Primordial germ cell determination
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          The choice of which cells become PGCs, achieved by one of two
          alternative conserved strategies.
        variant_sets:
          - id: specification_mode
            label: Modes of germ cell specification
            axis: specification mode
            selection: EXACTLY_ONE
            variants:
              - id: preformation
                label: Preformation via inherited germ plasm
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  Maternally deposited germ plasm containing germline
                  determinants (Vasa/DDX4, Nanos, Bucky ball/Oskar-organised RNP
                  granules) is asymmetrically inherited and autonomously specifies
                  PGCs (Drosophila, C. elegans, zebrafish, Xenopus).
                concepts:
                  - preferred_term: germ plasm
                    term:
                      id: GO:0060293
                      label: germ plasm
                annotons:
                  - id: germ_plasm_vasa
                    label: Vasa/DDX4 germ plasm RNA helicase
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: DDX4 (Vasa)
                        term:
                          id: UniProtKB:Q9NQI0
                          label: Probable ATP-dependent RNA helicase DDX4
                        description: >-
                          DEAD-box RNA helicase; a canonical, broadly conserved
                          germ plasm/germ granule marker and translational regulator.
                    function:
                      preferred_term: germ-granule RNA helicase / mRNA binding
                      term:
                        id: GO:0003729
                        label: mRNA binding
                      targets:
                        - preferred_term: germline mRNAs in germ granules
                    processes:
                      - preferred_term: germ cell development
                        term:
                          id: GO:0007281
                          label: germ cell development
                    locations:
                      - preferred_term: germ plasm
                        term:
                          id: GO:0060293
                          label: germ plasm
                    role_description: Core germ plasm determinant organising germline mRNP granules.
                    evidence:
                      - source_id: PMID:10811828
                        title: "Zebrafish vasa RNA but not its protein is a component of the germ plasm and segregates asymmetrically before germline specification"
                        statement: "The vasa gene product is essential for germline specification and marks germ plasm."
                        supporting_text: "the vasa gene product is essential for germline specification"
                  - id: germ_plasm_nanos
                    label: Nanos translational repressor
                    participant:
                      selector_type: GENE_PRODUCT
                      gene_product:
                        preferred_term: NANOS3
                        term:
                          id: UniProtKB:P60323
                          label: Nanos homolog 3
                        description: >-
                          Zinc-finger translational repressor; conserved germline
                          determinant that represses somatic mRNAs in PGCs.
                    function:
                      preferred_term: sequence-specific mRNA binding / translational repression
                      term:
                        id: GO:0003729
                        label: mRNA binding
                      targets:
                        - preferred_term: somatic-program mRNAs in nascent PGCs
                    processes:
                      - preferred_term: germ cell development
                        term:
                          id: GO:0007281
                          label: germ cell development
                    locations:
                      - preferred_term: germ plasm
                        term:
                          id: GO:0060293
                          label: germ plasm
                    role_description: Represses somatic translation to protect germline identity.
                    evidence:
                      - source_id: PMID:11691838
                        title: "A zebrafish nanos-related gene is essential for the development of primordial germ cells"
                        statement: "Nanos is a germ-plasm-localised factor essential for primordial germ cell development."
                        supporting_text: "a nanos-like (nanos1) gene, which is expressed in the germ plasm and in the PGCs of the zebrafish"
              - id: induction
                label: Inductive specification via BMP signalling
                module_type: DEVELOPMENTAL_PROCESS
                description: >-
                  BMP4 from extraembryonic ectoderm induces competent epiblast
                  cells to activate the PRDM1(BLIMP1)/PRDM14/TFAP2C network, which
                  represses the somatic (mesodermal) program and re-establishes
                  the germline/pluripotency ground state (mouse; inferred human).
                concepts:
                  - preferred_term: germ cell development
                    term:
                      id: GO:0007281
                      label: germ cell development
                annotons:
                  - id: pgc_inductive_signal
                    label: BMP4 germ-cell-inducing signal
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: BMP2/4 subfamily (TGF-beta family)
                        term:
                          id: PANTHER:PTHR11848
                          label: TGF-beta family
                        description: >-
                          BMP2/4-class ligands within the TGF-beta family;
                          extraembryonic BMP4 is the inductive signal specifying
                          PGC fate in mammals.
                        representative_members:
                          - preferred_term: BMP4
                            term:
                              id: UniProtKB:P12644
                              label: Bone morphogenetic protein 4
                        ancestral_nodes:
                          - preferred_term: PAINT BMP-signaling node PTN008983382
                            term:
                              id: PANTHER:PTN008983382
                              label: PTN008983382
                            description: >-
                              PANTHER PAINT node in PTHR11848 with IBD support for
                              BMP signaling pathway participation (P:GO:0030509);
                              BMP4 (UniProtKB:P12644) is among its seed proteins.
                            evidence:
                              - source_id: GO_REF:0000033
                                statement: IBD propagation from PAINT node PTN008983382 in PTHR11848.
                    function:
                      preferred_term: BMP morphogen activity
                      term:
                        id: GO:0016015
                        label: morphogen activity
                      targets:
                        - preferred_term: BMP receptor complex on competent epiblast
                    processes:
                      - preferred_term: BMP signaling pathway
                        term:
                          id: GO:0030509
                          label: BMP signaling pathway
                    locations:
                      - preferred_term: plasma membrane
                        term:
                          id: GO:0005886
                          label: plasma membrane
                    role_description: Instructive extracellular cue initiating the germline program.
                    evidence:
                      - source_id: PMID:10049358
                        title: "Bmp4 is required for the generation of primordial germ cells in the mouse embryo"
                        statement: "BMP4 is required to induce primordial germ cells in the mouse embryo."
                        supporting_text: "Bmp4 homozygous null embryos contain no PGCs"
                  - id: pgc_tripartite_network
                    label: PRDM1/PRDM14/TFAP2C germline network
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: mammalian PGC specification transcription factors
                        description: >-
                          The tripartite transcriptional network that specifies
                          mammalian PGCs by repressing the somatic program and
                          restoring germline/pluripotency identity.
                        representative_members:
                          - preferred_term: PRDM1 (BLIMP1)
                            term:
                              id: UniProtKB:O75626
                              label: PR domain zinc finger protein 1
                          - preferred_term: PRDM14
                            term:
                              id: UniProtKB:Q9GZV8
                              label: PR domain zinc finger protein 14
                          - preferred_term: TFAP2C
                            term:
                              id: UniProtKB:Q92754
                              label: Transcription factor AP-2 gamma
                    function:
                      preferred_term: DNA-binding transcription factor activity
                      term:
                        id: GO:0000981
                        label: DNA-binding transcription factor activity, RNA polymerase II-specific
                    processes:
                      - preferred_term: germ cell development
                        term:
                          id: GO:0007281
                          label: germ cell development
                    locations:
                      - preferred_term: nucleus
                        term:
                          id: GO:0005634
                          label: nucleus
                    role_description: Represses somatic fate and installs the germline/pluripotency transcriptional state.
                    evidence:
                      - source_id: PMID:23851488
                        title: "A tripartite transcription factor network regulates primordial germ cell specification in mice"
                        statement: "BLIMP1 with PRDM14 and AP2gamma (TFAP2C) forms the tripartite network specifying mouse PGCs."
                        supporting_text: "BLIMP1, the key regulator of primordial germ cell (PGC) specification, apparently acts together with PRDM14 and AP2gamma"
                connections:
                  - source: pgc_inductive_signal
                    target: pgc_tripartite_network
                    connection_type: POSITIVELY_REGULATES
                    description: BMP4 signalling activates the PRDM1/PRDM14/TFAP2C germline network.
    - order: 2
      role: germline genome protection
      node:
        id: pgc_genome_protection
        label: piRNA-guided transposon silencing in the germline
        module_type: DEVELOPMENTAL_PROCESS
        description: >-
          A germline-shared arm in which Piwi-clade proteins, guided by piRNAs,
          silence transposable elements to protect genome integrity in the cells
          that will transmit the genome - required regardless of specification mode.
        annotons:
          - id: piwi_transposon_silencing
            label: Piwi-clade piRNA effector
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PIWIL1
                term:
                  id: UniProtKB:Q96J94
                  label: Piwi-like protein 1
                description: >-
                  Piwi-clade Argonaute; piRNA-guided effector silencing
                  transposons in the germline (see file:human/PIWIL1/PIWIL1-ai-review.yaml).
            function:
              preferred_term: piRNA binding (piRNA-guided small-RNA binding effector)
              term:
                id: GO:0034584
                label: piRNA binding
              targets:
                - preferred_term: transposable-element transcripts
            processes:
              - preferred_term: regulatory ncRNA-mediated post-transcriptional gene silencing
                term:
                  id: GO:0035194
                  label: regulatory ncRNA-mediated post-transcriptional gene silencing
              - preferred_term: germ cell development
                term:
                  id: GO:0007281
                  label: germ cell development
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Protects germline genome integrity via piRNA-guided transposon silencing.
            evidence:
              - source_id: PMID:25747396
                title: "PIWI-Interacting RNA: Its Biogenesis and Functions"
                statement: "PIWI proteins with piRNAs repress transposons and maintain germline genome integrity."
                supporting_text: "They associate with PIWI proteins, which constitute a germline-specific subclade of the Argonaute family, to form effector complexes known as piRNA-induced silencing complexes, which repress transposons via transcriptional or posttranscriptional mechanisms and maintain germline genome integrity"
  connections:
    - source: pgc_determination
      target: pgc_genome_protection
      connection_type: PRECEDES
      description: Once the germline is specified, piRNA-guided genome protection safeguards the lineage.
