              term:
                id: GO:0008117
                label: sphinganine-1-phosphate aldolase activity
              substrates:
                - preferred_term: sphingosine 1-phosphate (PLP cofactor)
              products:
                - preferred_term: (2E)-hexadecenal
                - preferred_term: phosphoethanolamine
              evidence:
                - source_id: file:human/SGPL1/SGPL1-ai-review.yaml
                  statement: PLP-dependent ER lyase performing the sole irreversible degradative exit of sphingolipid metabolism (S1P -> hexadecenal + phosphoethanolamine); deficiency = SPLIS (nephrotic syndrome + adrenal insufficiency)
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: Irreversibly cleaves S1P to hexadecenal + phosphoethanolamine (pathway exit).
  connections:
    - source: ceramide_to_sphingosine
      target: sphingosine_to_s1p
      connection_type: PROVIDES_INPUT_FOR
      description: The sphingosine released by the ceramidases is the substrate for the sphingosine kinases.
    - source: sphingosine_to_s1p
      target: s1p_lysis
      connection_type: PROVIDES_INPUT_FOR
      description: The S1P made by SPHK1/2 is irreversibly degraded by the lyase SGPL1 (pathway exit).
    - source: sphingosine_to_s1p
      target: s1p_to_sphingosine
      connection_type: PROVIDES_INPUT_FOR
      description: S1P is also reversibly dephosphorylated back to sphingosine by SGPP1/SGPP2.
    - source: s1p_to_sphingosine
      target: sphingosine_to_s1p
      connection_type: NEGATIVELY_REGULATES
      description: >-
        The SGPP phosphatases oppose the sphingosine kinases (regenerating sphingosine), forming the
        sphingosine<->S1P interconversion cycle at the heart of the rheostat.
  notes: >-
    Sphingosine-1-phosphate rheostat (GO:0006670 sphingosine metabolic + GO:0030149 sphingolipid catabolic),
    grounded to eight completed human gene reviews (acid/neutral ceramidases ASAH1/ASAH2 curated separately).
    CERAMIDE->SPHINGOSINE: alkaline ceramidases ACER1 (Q8TDN7, ER/skin), ACER2 (Q5QJU3, Golgi, p53-induced)
    sharing PTHR46139, and ACER3 (Q9NUN7 PTHR46187, ER/Golgi, unsaturated LC-ceramides + Zn2+; leukodystrophy),
    all GO:0017040 (the single GO ceramidase MF; there is no separate "alkaline ceramidase" term).
    SPHINGOSINE->S1P: SPHK1 (Q9NYA1, cytosol/PM, pro-survival) + SPHK2 (Q9NRA0, nucleus/ER/mito, nuclear S1P
    inhibits HDAC1/2 - GO:0046811) sharing PTHR12358, GO:0008481 + ATP (both correctly do NOT carry S1P
    receptor activity - they make the ligand). S1P->SPHINGOSINE (reverse): SGPP1 (Q9BX95) + SGPP2 (Q8IWX5)
    sharing PTHR14969, GO:0042392 (+ dihydro-S1P GO:0070780), ER. EXIT: SGPL1 (O95470 PTHR42735, GO:0008117
    sphinganine-1-phosphate aldolase = the S1P-lyase MF, PLP-dependent) irreversibly cleaves S1P to
    hexadecenal + phosphoethanolamine - the only exit, and the source of the tissue<->blood S1P gradient.
    Sphingosine regenerated by SGPP/ceramidases is re-acylated to ceramide by the CerS enzymes (de-novo
    ceramide module). GO term ids/labels verified against the local go.db. Disorders: ACER3 leukodystrophy;
    SGPL1 SPLIS (steroid-resistant nephrotic syndrome + adrenal insufficiency). Fingolimod/FTY720 is an
    SPHK2 substrate and S1P-receptor modulator.
