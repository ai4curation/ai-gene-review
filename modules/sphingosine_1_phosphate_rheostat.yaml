id: MODULE:sphingosine_1_phosphate_rheostat
title: Sphingosine-1-phosphate rheostat (ceramide -> sphingosine -> S1P -> exit)
description: >-
  The "sphingolipid rheostat" is the interconversion of the bioactive sphingolipids ceramide, sphingosine
  and sphingosine-1-phosphate (S1P), whose relative levels set the balance between cell death/growth
  arrest (ceramide, sphingosine) and survival/proliferation/migration (S1P). Ceramide is hydrolysed to
  sphingosine plus a free fatty acid by ceramidases: the alkaline ceramidases ACER1 (ER, skin), ACER2
  (Golgi) and ACER3 (ER/Golgi, broadly expressed) act here, complementing the acid (ASAH1, lysosomal) and
  neutral (ASAH2) ceramidases curated elsewhere. Sphingosine is then phosphorylated with ATP to S1P by the
  sphingosine kinases SPHK1 (cytosolic, translocating to the plasma membrane; pro-survival/pro-inflammatory)
  and SPHK2 (nuclear/ER/mitochondrial; its nuclear S1P inhibits HDAC1/2). S1P has two fates. It is
  reversibly dephosphorylated back to sphingosine by the ER S1P phosphatases SGPP1 and SGPP2 (recycling
  sphingosine for re-acylation to ceramide and damping S1P signalling), or it is IRREVERSIBLY cleaved by
  the PLP-dependent ER lyase SGPL1 to (2E)-hexadecenal + phosphoethanolamine — the sole exit from
  sphingolipid metabolism, which also builds the tissue-to-blood S1P gradient that governs lymphocyte
  egress. Inherited defects illustrate the pathway's importance: ACER3 childhood leukodystrophy and SGPL1
  sphingosine-phosphate-lyase insufficiency syndrome (steroid-resistant nephrotic syndrome with adrenal
  insufficiency); the S1P axis is also the target of the immunomodulator fingolimod (FTY720, an SPHK2
  substrate).
status: DRAFT
evidence:
  - source_id: GO:0006670
    title: sphingosine metabolic process
    statement: The ceramidases, kinases and phosphatases interconvert ceramide, sphingosine and S1P (GO:0006670).
  - source_id: GO:0030149
    title: sphingolipid catabolic process
    statement: SGPL1 provides the irreversible catabolic exit of sphingolipid metabolism (GO:0030149).
  - source_id: file:human/ACER1/ACER1-ai-review.yaml
    title: ACER1 gene review (human)
    statement: The ER ceramide->sphingosine step (UniProtKB:Q8TDN7, GO:0017040) matches the completed human ACER1 review.
  - source_id: file:human/ACER2/ACER2-ai-review.yaml
    title: ACER2 gene review (human)
    statement: The Golgi ceramide->sphingosine step (UniProtKB:Q5QJU3, GO:0017040) matches the completed human ACER2 review.
  - source_id: file:human/ACER3/ACER3-ai-review.yaml
    title: ACER3 gene review (human)
    statement: The ER/Golgi ceramide->sphingosine step (UniProtKB:Q9NUN7, GO:0017040) matches the completed human ACER3 review.
  - source_id: file:human/SPHK1/SPHK1-ai-review.yaml
    title: SPHK1 gene review (human)
    statement: The cytosolic sphingosine->S1P step (UniProtKB:Q9NYA1, GO:0008481) matches the completed human SPHK1 review.
  - source_id: file:human/SPHK2/SPHK2-ai-review.yaml
    title: SPHK2 gene review (human)
    statement: The nuclear/ER sphingosine->S1P step (UniProtKB:Q9NRA0, GO:0008481) matches the completed human SPHK2 review.
  - source_id: file:human/SGPP1/SGPP1-ai-review.yaml
    title: SGPP1 gene review (human)
    statement: The S1P->sphingosine dephosphorylation step (UniProtKB:Q9BX95, GO:0042392) matches the completed human SGPP1 review.
  - source_id: file:human/SGPP2/SGPP2-ai-review.yaml
    title: SGPP2 gene review (human)
    statement: The S1P->sphingosine dephosphorylation step (UniProtKB:Q8IWX5, GO:0042392) matches the completed human SGPP2 review.
  - source_id: file:human/SGPL1/SGPL1-ai-review.yaml
    title: SGPL1 gene review (human)
    statement: The irreversible S1P cleavage (exit) step (UniProtKB:O95470, GO:0008117 + PLP) matches the completed human SGPL1 review.
module:
  id: sphingosine_1_phosphate_rheostat
  label: Sphingosine-1-phosphate rheostat
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: sphingosine metabolic process
      term:
        id: GO:0006670
        label: sphingosine metabolic process
      description: Interconversion of ceramide, sphingosine and sphingosine-1-phosphate.
    - preferred_term: sphingolipid catabolic process
      term:
        id: GO:0030149
        label: sphingolipid catabolic process
      description: Irreversible degradation of S1P by SGPL1 (the exit from sphingolipid metabolism).
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: ACER1/ACER3, SGPP1/SGPP2 and SGPL1 are ER-membrane enzymes.
      - preferred_term: Golgi membrane
        term:
          id: GO:0000139
          label: Golgi membrane
        description: ACER2 (and ACER3) act at the Golgi membrane.
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: SPHK1 is largely cytosolic (translocating to the plasma membrane on activation).
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
        description: SPHK2 produces S1P in the nucleus (inhibiting HDAC1/2).
  parts:
    - order: 1
      role: ceramide hydrolysis to sphingosine
