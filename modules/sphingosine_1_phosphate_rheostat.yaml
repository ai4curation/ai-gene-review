                term:
                  id: PANTHER:PTHR46187
                  label: ALKALINE CERAMIDASE 3
                representative_members:
                  - preferred_term: ACER3 (human)
                    term:
                      id: UniProtKB:Q9NUN7
                      label: Alkaline ceramidase 3
            function:
