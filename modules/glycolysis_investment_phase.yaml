id: MODULE:glycolysis_investment_phase
title: Glycolysis I — investment phase (glucose → glyceraldehyde-3-phosphate); GSD VII/XII, TPI/GPI deficiency
description: >-
  The investment (preparatory) phase of glycolysis is the first half of the cytosolic
  pathway that converts one molecule of glucose into two molecules of
  glyceraldehyde-3-phosphate, at the net cost of two ATP, priming the sugar for the
  energy-yielding payoff phase. Five steps: a hexokinase (HK1-3 or the glucose-sensor
  glucokinase GCK) phosphorylates glucose to glucose-6-phosphate; glucose-6-phosphate
  isomerase (GPI) isomerises it to fructose-6-phosphate; 6-phosphofructokinase-1 (the
  committed, rate-limiting, allosterically controlled step; muscle PFKM) phosphorylates
  fructose-6-phosphate to fructose-1,6-bisphosphate; class-I fructose-bisphosphate
  aldolase (muscle ALDOA) cleaves it to dihydroxyacetone phosphate (DHAP) +
  glyceraldehyde-3-phosphate; and triosephosphate isomerase (TPI1) interconverts DHAP
  and glyceraldehyde-3-phosphate so that both trioses continue into the payoff phase.
  Inherited defects across this phase mostly present as hereditary nonspherocytic
  hemolytic anemia and/or myopathy, with distinctive extras: HK1 deficiency (hemolytic
  anemia; other HK1 variants cause neuropathy/retinopathy); GCK mutations cause
  MODY2/neonatal diabetes or hyperinsulinism (glucose-sensing, not hemolysis); GPI
  deficiency (hemolytic anemia); PFKM deficiency = glycogen storage disease type VII
  (Tarui, exercise intolerance); ALDOA deficiency = GSD type XII; and TPI1 deficiency is
  a severe hemolytic anemia with progressive neurodegeneration.
status: DRAFT
evidence:
  - source_id: GO:0006096
    title: glycolytic process
    statement: >-
      The module is grounded in the GO glycolytic process (GO:0006096); it covers the
      investment-phase steps from glucose to glyceraldehyde-3-phosphate.
  - source_id: Reactome:R-HSA-70171
    title: Glycolysis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome "Glycolysis"
      reactions R-HSA-70420 (hexokinase), R-HSA-70471 (GPI), R-HSA-70467 (PFK),
      R-HSA-71496 (aldolase) and R-HSA-70454 (TPI1).
  - source_id: file:human/HK1/HK1-ai-review.yaml
    title: HK1 gene review (human)
    statement: >-
      The hexokinase step (UniProtKB:P19367, GO:0004396) matches the completed human
      HK1 review.
  - source_id: file:human/GCK/GCK-ai-review.yaml
    title: GCK gene review (human)
    statement: >-
      The glucose-sensor glucokinase isozyme of the hexokinase step (UniProtKB:P35557,
      GO:0004340) matches the completed human GCK review.
  - source_id: file:human/GPI/GPI-ai-review.yaml
    title: GPI gene review (human)
    statement: >-
      The phosphoglucose-isomerase step (UniProtKB:P06744, GO:0004347) matches the
      completed human GPI review.
  - source_id: file:human/PFKM/PFKM-ai-review.yaml
    title: PFKM gene review (human)
    statement: >-
      The rate-limiting phosphofructokinase step (UniProtKB:P08237, GO:0003872) matches
      the completed human PFKM review.
  - source_id: file:human/ALDOA/ALDOA-ai-review.yaml
    title: ALDOA gene review (human)
    statement: >-
      The aldol-cleavage step (UniProtKB:P04075, GO:0004332) matches the completed
      human ALDOA review.
  - source_id: file:human/TPI1/TPI1-ai-review.yaml
    title: TPI1 gene review (human)
    statement: >-
      The triose-phosphate-isomerase step (UniProtKB:P60174, GO:0004807) matches the
      completed human TPI1 review.
module:
  id: glycolysis_investment_phase
  label: Glycolysis (investment phase)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycolytic process
      term:
        id: GO:0006096
        label: glycolytic process
      description: >-
        Investment-phase conversion of glucose to two glyceraldehyde-3-phosphate at a
        net cost of 2 ATP.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The glycolytic enzymes are cytosolic.
  parts:
    - order: 1
      role: phosphorylation of glucose (entry/commitment)
      node:
        id: hexokinase_step
        label: D-glucose + ATP to D-glucose-6-phosphate + ADP
        module_type: REACTION
        annotons:
          - id: hexokinase_activity
            label: "HK1-3/GCK: hexokinase / glucokinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Hexokinase family (HK1/HK2/HK3/GCK/HKDC1)
                term:
                  id: PANTHER:PTHR19443
                  label: HEXOKINASE
                representative_members:
                  - preferred_term: HK1 (human, ubiquitous hexokinase-1)
                    term:
                      id: UniProtKB:P19367
                      label: Hexokinase-1
                  - preferred_term: GCK (human, liver/beta-cell glucokinase)
                    term:
                      id: UniProtKB:P35557
                      label: Glucokinase
            function:
              preferred_term: hexokinase activity
              term:
                id: GO:0004396
                label: hexokinase activity
              substrates:
                - preferred_term: D-glucose
                - preferred_term: ATP
              products:
                - preferred_term: D-glucose 6-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.1
                  statement: hexokinase (GCK = glucokinase, EC 2.7.1.2, the low-affinity glucose sensor)
                - source_id: Reactome:R-HSA-70420
                  statement: "HK1,2,3,GCK,HKDC1 phosphorylate Glc to form G6P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Phosphorylates glucose to glucose-6-phosphate (also feeding the pentose
              phosphate pathway and glycogen synthesis). HK1-3 are high-affinity,
              G6P-product-inhibited hexokinases (HK1 ubiquitous); GCK is the high-Km,
              non-inhibited liver/beta-cell glucose sensor (MODY2, hyperinsulinism).
    - order: 2
      role: aldose-ketose isomerisation
      node:
        id: gpi_step
        label: D-glucose-6-phosphate to D-fructose-6-phosphate
        module_type: REACTION
        annotons:
          - id: gpi_activity
            label: "GPI: glucose-6-phosphate isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glucose-6-phosphate isomerase family (GPI)
                term:
                  id: PANTHER:PTHR11469
                  label: GLUCOSE-6-PHOSPHATE ISOMERASE
                representative_members:
                  - preferred_term: GPI (human)
                    term:
                      id: UniProtKB:P06744
                      label: Glucose-6-phosphate isomerase
            function:
              preferred_term: glucose-6-phosphate isomerase activity
              term:
                id: GO:0004347
                label: glucose-6-phosphate isomerase activity
              substrates:
                - preferred_term: D-glucose 6-phosphate
              products:
                - preferred_term: D-fructose 6-phosphate
              evidence:
                - source_id: EC:5.3.1.9
                  statement: glucose-6-phosphate isomerase (also the secreted neuroleukin/AMF cytokine, moonlighting)
                - source_id: Reactome:R-HSA-70471
                  statement: "GPI dimer isomerizes G6P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Reversibly isomerises glucose-6-phosphate and fructose-6-phosphate. The
              same protein moonlights extracellularly as neuroleukin / autocrine
              motility factor (non-core). Deficiency causes hemolytic anemia.
    - order: 3
      role: committed, rate-limiting phosphorylation
      node:
        id: pfk_step
        label: D-fructose-6-phosphate + ATP to D-fructose-1,6-bisphosphate + ADP
        module_type: REACTION
        annotons:
          - id: pfk_activity
            label: "PFKM/PFKL/PFKP: 6-phosphofructokinase-1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 6-phosphofructokinase-1 family (PFKM/PFKL/PFKP)
                term:
                  id: PANTHER:PTHR13697
                  label: 6-PHOSPHOFRUCTOKINASE
                representative_members:
                  - preferred_term: PFKM (human, muscle isozyme)
                    term:
                      id: UniProtKB:P08237
                      label: ATP-dependent 6-phosphofructokinase, muscle type
            function:
              preferred_term: 6-phosphofructokinase activity
              term:
                id: GO:0003872
                label: 6-phosphofructokinase activity
              substrates:
                - preferred_term: D-fructose 6-phosphate
                - preferred_term: ATP
              products:
                - preferred_term: D-fructose 1,6-bisphosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.11
                  statement: 6-phosphofructokinase; committed rate-limiting step; allosteric (AMP/F2,6BP activate; ATP/citrate inhibit)
                - source_id: Reactome:R-HSA-70467
                  statement: "PFK tetramer phosphorylates Fru(6)P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              The committed, rate-limiting glycolytic step and principal allosteric
              control point. Active as a tetramer of the PFKM/PFKL/PFKP isozymes
              (muscle = PFKM homotetramer). PFKM deficiency = GSD VII (Tarui disease).
    - order: 4
      role: aldol cleavage to two trioses
      node:
        id: aldolase_step
        label: D-fructose-1,6-bisphosphate to DHAP + D-glyceraldehyde-3-phosphate
        module_type: REACTION
        annotons:
          - id: aldolase_activity
            label: "ALDOA/B/C: fructose-bisphosphate aldolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Class I fructose-bisphosphate aldolase family (ALDOA/ALDOB/ALDOC)
                term:
                  id: PANTHER:PTHR11627
                  label: FRUCTOSE-BISPHOSPHATE ALDOLASE
                representative_members:
                  - preferred_term: ALDOA (human, muscle/red-cell isozyme)
                    term:
                      id: UniProtKB:P04075
                      label: Fructose-bisphosphate aldolase A
            function:
              preferred_term: fructose-bisphosphate aldolase activity
              term:
                id: GO:0004332
                label: fructose-bisphosphate aldolase activity
              substrates:
                - preferred_term: D-fructose 1,6-bisphosphate
              products:
                - preferred_term: dihydroxyacetone phosphate (DHAP)
                - preferred_term: D-glyceraldehyde 3-phosphate
              evidence:
                - source_id: EC:4.1.2.13
                  statement: class-I (Schiff-base) fructose-bisphosphate aldolase; ALDOA muscle, ALDOB liver, ALDOC brain
                - source_id: Reactome:R-HSA-71496
                  statement: "Aldolase tetramer cleaves F1,6PP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Homotetrameric Schiff-base aldolase cleaving fructose-1,6-bisphosphate
              into DHAP and glyceraldehyde-3-phosphate. ALDOA (muscle) deficiency = GSD
              XII (hemolytic anemia + myopathy); the ALDOB liver isozyme handles dietary
              fructose (fructolysis module; HFI).
    - order: 5
      role: interconversion of the triose phosphates
      node:
        id: tpi_step
        label: dihydroxyacetone phosphate to D-glyceraldehyde-3-phosphate
        module_type: REACTION
        annotons:
          - id: tpi_activity
            label: "TPI1: triosephosphate isomerase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Triosephosphate isomerase family (TPI1)
                term:
                  id: PANTHER:PTHR21139
                  label: TRIOSEPHOSPHATE ISOMERASE
                representative_members:
                  - preferred_term: TPI1 (human)
                    term:
                      id: UniProtKB:P60174
                      label: Triosephosphate isomerase
            function:
              preferred_term: triose-phosphate isomerase activity
              term:
                id: GO:0004807
                label: triose-phosphate isomerase activity
              substrates:
                - preferred_term: dihydroxyacetone phosphate (DHAP)
              products:
                - preferred_term: D-glyceraldehyde 3-phosphate
              evidence:
                - source_id: EC:5.3.1.1
                  statement: triosephosphate isomerase; near-perfect diffusion-limited catalyst
                - source_id: Reactome:R-HSA-70454
                  statement: "TPI1 dimer isomerizes DHAP to GA3P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Interconverts DHAP and glyceraldehyde-3-phosphate so that both aldolase
              products enter the payoff phase (doubling the yield). Deficiency causes a
              severe hemolytic anemia with progressive neurodegeneration.
  connections:
    - source: hexokinase_step
      target: gpi_step
      connection_type: PROVIDES_INPUT_FOR
      description: Glucose-6-phosphate from hexokinase is isomerised by GPI.
    - source: gpi_step
      target: pfk_step
      connection_type: PROVIDES_INPUT_FOR
      description: Fructose-6-phosphate from GPI is phosphorylated by PFK-1.
    - source: pfk_step
      target: aldolase_step
      connection_type: PROVIDES_INPUT_FOR
      description: Fructose-1,6-bisphosphate from PFK-1 is cleaved by aldolase.
    - source: aldolase_step
      target: tpi_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The DHAP arm from aldolase is isomerised by TPI1 to glyceraldehyde-3-phosphate
        (the glyceraldehyde-3-phosphate arm enters the payoff phase directly).
  notes: >-
    Five-step investment phase of glycolysis grounded to the human enzymes hexokinase
    HK1 (UniProtKB:P19367, GO:0004396) / glucokinase GCK (P35557, GO:0004340), GPI
    (P06744, GO:0004347), 6-phosphofructokinase PFKM (P08237, GO:0003872), aldolase
    ALDOA (P04075, GO:0004332) and triosephosphate isomerase TPI1 (P60174, GO:0004807).
    GO molecular-function terms were taken from the human GOA records; Reactome reaction
    ids and titles were verified against the local reactome cache. Each step uses a
    PANTHER family selector (generic over the tissue isozymes and orthologs): the
    hexokinase node carries HK1 and GCK as representatives (family also includes HK2/HK3/
    HKDC1); PFK covers PFKM/PFKL/PFKP; aldolase covers ALDOA/ALDOB/ALDOC (ALDOB reviewed
    in the fructolysis module). Downstream, the two glyceraldehyde-3-phosphate molecules
    feed the glycolysis payoff phase (GAPDH -> PGK1 -> PGAM -> ENO -> pyruvate kinase;
    GAPDH/PKM already reviewed, remainder to follow), and pyruvate feeds the pyruvate-
    metabolism module (PDC/PC). Upstream, glucose-6-phosphate is shared with the
    glucose-6-phosphatase system, glycogen metabolism (via PGM1) and the pentose
    phosphate pathway; fructose-6-phosphate also receives dietary fructose carbon
    (fructolysis). Moonlighting roles (GPI = neuroleukin/AMF; ALDOA actin/RNA binding)
    are captured non-core in the gene reviews. Disorders: HK1 (hemolytic anemia); GCK
    (MODY2/PNDM/hyperinsulinism); GPI (hemolytic anemia); PFKM (GSD VII/Tarui); ALDOA
    (GSD XII); TPI1 (hemolytic anemia + neurodegeneration).
