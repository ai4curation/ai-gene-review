id: MODULE:two_component_system_boundary
title: Two-component-system umbrella boundary
description: >-
  Umbrella boundary module for KEGG ppu02020 in Pseudomonas putida KT2440.
  The organism-specific map contains 99 primary genes and mixes canonical
  sensor-kinase/response-regulator pairs with ECF sigma/anti-sigma systems,
  transport-regulation neighborhoods, metal and nutrient homeostasis, pili and
  adhesion context, efflux machinery, and non-TCS spillovers. This parent
  module records the partition and should not be used as evidence that every
  member is a direct participant in one satisfiable two-component pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02020
    title: Two-component system - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02020 supplies the 99-gene PSEPK two-component-system umbrella
      map used for this boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_boundary.tsv
    title: PSEPK ppu02020 two-component-system batch
    statement: >-
      The batch table records 99 selected PSEPK members with review, curation,
      and Asta retrieval status.
  - source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
    title: PSEPK ppu02020 two-component-system partition table
    statement: >-
      The partition separates the 99 members into curated submodules for metal
      response, iron uptake, alginate/biofilm regulation, osmotic/envelope
      regulation, dicarboxylate/tricarboxylate transport regulation, ECF
      sigma/anti-sigma systems, nutrient homeostasis, pili/surface adhesion,
      orphan/generic TCS proteins, and two non-TCS side-context spillovers.
  - source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.md
    title: PSEPK ppu02020 two-component-system partition report
    statement: >-
      The partition report records the completed sub-batches and the decision
      to treat ppu02020 as PARTITIONED rather than as a single satisfiable
      module.
  - source_id: MODULE:two_component_relay
    title: Generic two-component / phosphorelay signal transduction motif
    statement: >-
      The reusable motif captures the canonical sensor histidine kinase to
      response regulator phosphorelay chemistry used by true TCS submodules.
module:
  id: two_component_system_boundary
  label: Two-component-system umbrella boundary
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: Canonical His-to-Asp two-component signaling process.
    - preferred_term: phosphorelay sensor kinase activity
      term:
        id: GO:0000155
        label: phosphorelay sensor kinase activity
      description: Sensor-kinase molecular function for canonical TCS branches.
    - preferred_term: phosphorelay response regulator activity
      term:
        id: GO:0000156
        label: phosphorelay response regulator activity
      description: Receiver-domain response-regulator molecular function.
    - preferred_term: regulation of DNA-templated transcription
      term:
        id: GO:0006355
        label: regulation of DNA-templated transcription
      description: Common transcriptional output for DNA-binding response regulators.
    - preferred_term: sigma factor antagonist activity
      term:
        id: GO:0016989
        label: sigma factor antagonist activity
      description: ECF anti-sigma/sensor context included in the KEGG map.
    - preferred_term: transmembrane transport
      term:
        id: GO:0055085
        label: transmembrane transport
      description: Transporter and efflux side context carried by several ppu02020 buckets.
    - preferred_term: cell adhesion
      term:
        id: GO:0007155
        label: cell adhesion
      description: Pili and surface-adhesion context carried by one ppu02020 bucket.
  parts:
    - order: 1
      role: Umbrella-map boundary
      node:
        id: ppu02020_umbrella_boundary
        label: ppu02020 umbrella boundary
        module_type: SIGNALING_PATHWAY
        description: >-
          ppu02020 is an umbrella KEGG map. Curate it through the partitioned
          submodules and side-context spillovers rather than as one linear
          phosphorelay pathway.
        annotons: []
    - order: 2
      role: Canonical reusable TCS motif
      node:
        id: reusable_two_component_relay_index
        label: Reusable two-component relay motif index
        module_type: SIGNALING_PATHWAY
        description: >-
          `two_component_relay` captures the generic sensor histidine kinase,
          optional Hpt, and response-regulator phosphorelay motif. Simple
          bacterial pairs generally conform with the Hpt step collapsed.
        annotons: []
    - order: 3
      role: Metal, iron, and nutrient homeostasis regulation
      node:
        id: metal_iron_nutrient_regulation_index
        label: Metal, iron, and nutrient regulation index
        module_type: REGULATORY_STEP
        description: >-
          Metal/copper/zinc response uses
          `metal_cation_response_efflux_boundary`; iron uptake regulation uses
          `iron_uptake_regulation_boundary`; nitrogen, phosphate, and potassium
          homeostasis uses `inorganic_nutrient_homeostasis_regulation_boundary`.
        annotons: []
    - order: 4
      role: Envelope, efflux, transport, and ECF regulation
      node:
        id: envelope_transport_ecf_regulation_index
        label: Envelope, transport, and ECF regulation index
        module_type: REGULATORY_STEP
        description: >-
          Osmotic/envelope/efflux regulation uses
          `osmotic_envelope_efflux_regulation_boundary`;
          dicarboxylate/tricarboxylate transport regulation uses
          `dicarboxylate_tricarboxylate_transport_regulation_boundary`; ECF
          sigma and anti-sigma pairs use `ecf_sigma_anti_sigma_boundary`.
        annotons: []
    - order: 5
      role: Surface behavior, biofilm, and adhesion context
      node:
        id: surface_behavior_biofilm_adhesion_index
        label: Surface behavior, biofilm, and adhesion index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Alginate and biofilm regulation uses
          `alginate_biofilm_regulation_boundary`; pili and surface-adhesion
          context uses `pili_surface_adhesion_boundary`.
        annotons: []
    - order: 6
      role: Orphan/generic TCS proteins
      node:
        id: orphan_generic_tcs_index
        label: Orphan and generic TCS index
        module_type: SIGNALING_PATHWAY
        description: >-
          Unresolved sensor kinases, response regulators, local predicted
          pairs, and FecR-like anti-sigma side contexts use
          `orphan_two_component_regulators_boundary` until input cues or
          target regulons are resolved.
        annotons: []
    - order: 7
      role: Non-TCS spillovers
      node:
        id: non_tcs_spillover_index
        label: Non-TCS spillover index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          `dnaA` remains in `bacterial_dna_replication` as replication-origin
          initiation side context, and `etp` remains in
          `protein_phosphorylation_boundary` as protein tyrosine phosphatase
          side context.
        annotons: []
  notes: >-
    This parent module records pathway satisfiability for the ppu02020 KEGG
    umbrella. The submodule reviews carry the gene-level biological claims.
    Use this module to navigate the partition, not to assign broad
    two-component signaling to transporters, pili, efflux components, sigma
    factors, dnaA, or etp.
