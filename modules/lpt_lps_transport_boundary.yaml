notes: This boundary module complements, rather than replaces, the lipopolysaccharide_biosynthesis module. It captures envelope transport and assembly after lipid A/core synthesis, and it keeps the Lpt pathway separate from the Mla phospholipid retrograde transport module. PP_1778-PP_1779 is represented as a separate Wzt/KpsT/TagH-like LPS or polysaccharide ABC export candidate, not merged into the canonical LptBFG/MsbA system.
