id: MODULE:c_di_gmp_turnover_boundary
title: c-di-GMP and cyclic-nucleotide turnover boundary
description: Boundary module for PSEPK c-di-GMP and cyclic-nucleotide turnover proteins plus adjacent membrane signaling and
  channel spillovers. It keeps established GGDEF diguanylate cyclases and EAL cyclic-guanylate phosphodiesterases together
  with lower-confidence GGDEF/EAL/CSS/PsiE candidates, and records neighboring mechanosensitive-channel, chloride/bestrophin-channel,
  and FecR/ECF-sigma regulatory proteins that entered the transport bucket through membrane, signaling, or channel evidence.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
  title: PSEPK ppu02025 biofilm partition table
  statement: The partition table selects PP_0914, PP_3581, TpbB, and pde as the c-di-GMP turnover bucket.
- source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_partition.tsv
  title: PSEPK motility/chemotaxis/biofilm partition table
  statement: The motility umbrella partition routes PP_2599 into this c-di-GMP turnover boundary because its HD-GYP/HD/PDEase
    and cyclic-di-GMP phosphodiesterase-family evidence supersedes the generic chemotaxis sensory-transducer product name.
- source_id: file:PSEPK/PP_0914/PP_0914-ai-review.yaml
  title: Curated PP_0914 review
  statement: The PP_0914 review supports its cyclic-nucleotide turnover boundary role.
- source_id: file:PSEPK/PP_3581/PP_3581-ai-review.yaml
  title: Curated PP_3581 review
  statement: The PP_3581 review supports its cyclic-nucleotide turnover boundary role.
- source_id: file:PSEPK/PP_2599/PP_2599-ai-review.yaml
  title: Curated PP_2599 review
  statement: The PP_2599 review supports a membrane-associated sensory cyclic-guanylate phosphodiesterase candidate role.
- source_id: file:PSEPK/TpbB/TpbB-ai-review.yaml
  title: Curated TpbB review
  statement: The TpbB review supports its cyclic-nucleotide turnover boundary role.
- source_id: file:PSEPK/pde/pde-ai-review.yaml
  title: Curated pde review
  statement: The pde review supports its cyclic-nucleotide turnover boundary role.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_membrane_signaling_channels_c_di_gmp_spillovers.tsv
  title: PSEPK transport-bucket membrane signaling, channel, and c-di-GMP spillover batch
  statement: The batch table records 39 PSEPK transport/membrane/efflux-bucket genes assigned to c-di-GMP turnover enzymes,
    mechanosensitive channels, chloride/bestrophin channel candidates, FecR/ECF sigma regulatory sensors, and low-information
    membrane signaling side nodes.
notes: 'First-pass interpretation: treat this as a reusable boundary/spillover module, not a single satisfiable pathway. EC/product/GOA-supported
  c-di-GMP synthesis and hydrolysis calls are retained as core enzyme functions. Biofilm, motility, nitric-oxide, and broad
  signal-transduction terms are kept as downstream or non-core signaling context unless direct gene-specific evidence is present.
  Mechanosensitive and chloride/bestrophin channels are separated from c-di-GMP turnover, and FecR/ECF-sigma membrane sensors
  are kept as regulatory spillovers. Domain-only CSS/PsiE/GGDEF-EAL candidates remain low-confidence until active-site, ligand,
  partner, or phenotype evidence is available.'
