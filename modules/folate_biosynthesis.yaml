id: MODULE:folate_biosynthesis
title: Folate biosynthesis
description: >-
  A bacterial folate biosynthesis module covering formation of the pterin
  precursor from GTP, formation of p-aminobenzoate from chorismate, condensation
  to dihydropteroate, conversion to dihydrofolate, reduction to
  tetrahydrofolate, and folylpolyglutamate formation. In Pseudomonas putida
  KT2440, KEGG ppu00790 is broader than strict folate synthesis: it also pulls
  in queuosine, molybdenum cofactor, tetrahydrobiopterin/phenylalanine
  hydroxylase, riboflavin, and generic MobA-like side nodes. Those are tracked
  as boundary context unless they directly form folate or tetrahydrofolate.
status: DRAFT
evidence:
  - source_id: GO:0046656
    title: folic acid biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      folic acid and related folate intermediates.
  - source_id: GO:0046654
    title: tetrahydrofolate biosynthetic process
    statement: >-
      The committed downstream route reduces dihydrofolate to tetrahydrofolate
      and modifies folates to the biologically used polyglutamyl forms.
  - source_id: KEGG:ppu00790
    title: Folate biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      strict folate biosynthesis with pterin, molybdenum cofactor, queuosine,
      riboflavin, and phenylalanine-hydroxylase side chemistry.
module:
  id: folate_biosynthesis
  label: Folate biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: folic acid biosynthetic process
      term:
        id: GO:0046656
        label: folic acid biosynthetic process
      description: Biosynthesis of folic acid and related folate precursors.
    - preferred_term: tetrahydrofolate biosynthetic process
      term:
        id: GO:0046654
        label: tetrahydrofolate biosynthetic process
      description: Biosynthesis of tetrahydrofolate from folate precursors.
    - preferred_term: folic acid-containing compound biosynthetic process
      term:
        id: GO:0009396
        label: folic acid-containing compound biosynthetic process
      description: Biosynthesis of folate-containing compounds.
  parts:
    - order: 1
      role: pterin branch initiation
      node:
        id: gtp_to_dihydroneopterin_triphosphate
        label: GTP to dihydroneopterin triphosphate
        module_type: REACTION
        description: >-
          GTP cyclohydrolase I opens GTP to form the pterin precursor
          dihydroneopterin triphosphate. KT2440 has multiple FolE/FolE2
          candidates; this step should be reviewed as an alternative set rather
          than assuming that every FolE paralog is the physiological folate
          biosynthesis enzyme.
        annotons:
          - id: folE1_gtp_cyclohydrolase_i
            label: FolE1 GTP cyclohydrolase I
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folE1
                term:
                  id: UniProtKB:Q88LV4
                  label: GTP cyclohydrolase 1 1
            function:
              preferred_term: GTP cyclohydrolase I activity
              term:
                id: GO:0003934
                label: GTP cyclohydrolase I activity
              substrates:
                - preferred_term: GTP
              products:
                - preferred_term: 7,8-dihydroneopterin triphosphate
              evidence:
                - source_id: EC:3.5.4.16
                  statement: GTP cyclohydrolase I
            role_description: FolE-family candidate for the first pterin-branch step.
          - id: folE2_q88jy1_gtp_cyclohydrolase_i
            label: FolE2 Q88JY1 GTP cyclohydrolase I
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folE2__Q88JY1
                term:
                  id: UniProtKB:Q88JY1
                  label: GTP cyclohydrolase 1 2
            function:
              preferred_term: GTP cyclohydrolase I activity
              term:
                id: GO:0003934
                label: GTP cyclohydrolase I activity
              evidence:
                - source_id: EC:3.5.4.16
                  statement: GTP cyclohydrolase I
            role_description: FolE2-family alternative candidate for the first pterin-branch step.
          - id: folE2_q88hm9_gtp_cyclohydrolase_i
            label: FolE2 Q88HM9 GTP cyclohydrolase I
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folE2__Q88HM9
                term:
                  id: UniProtKB:Q88HM9
                  label: GTP cyclohydrolase FolE2
            function:
              preferred_term: GTP cyclohydrolase I activity
              term:
                id: GO:0003934
                label: GTP cyclohydrolase I activity
              evidence:
                - source_id: EC:3.5.4.16
                  statement: GTP cyclohydrolase I
            role_description: Second FolE2-family candidate; gene-level evidence should decide whether it is core, redundant, or pterin-specialized.
    - order: 2
      role: pterin branch processing
      node:
        id: pterin_precursor_to_hmdhp
        label: Dihydroneopterin triphosphate to hydroxymethyldihydropterin diphosphate
        module_type: METABOLIC_PATHWAY
        description: >-
          FolB-family aldolase and FolK-family pyrophosphokinase activities
          produce the activated pterin substrate used by dihydropteroate
          synthase.
        annotons:
          - id: folB_dihydroneopterin_aldolase
            label: FolB dihydroneopterin aldolase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folB
                term:
                  id: UniProtKB:Q88QU4
                  label: 7,8-dihydroneopterin aldolase
            function:
              preferred_term: dihydroneopterin aldolase activity
              term:
                id: GO:0004150
                label: dihydroneopterin aldolase activity
              evidence:
                - source_id: EC:4.1.2.25
                  statement: 7,8-dihydroneopterin aldolase
            role_description: Removes the side chain from dihydroneopterin to generate the hydroxymethyl-dihydropterin precursor.
          - id: folK_pyrophosphokinase
            label: FolK hydroxymethyldihydropterin pyrophosphokinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folK
                term:
                  id: UniProtKB:Q88DX0
                  label: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine pyrophosphokinase
            function:
              preferred_term: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase activity
              term:
                id: GO:0003848
                label: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase activity
              evidence:
                - source_id: EC:2.7.6.3
                  statement: 6-hydroxymethyl-7,8-dihydropterin pyrophosphokinase
            role_description: Activates hydroxymethyldihydropterin as the diphosphate used by FolP.
          - id: pp0393_pyrophosphokinase_candidate
            label: PP_0393 hydroxymethyldihydropterin pyrophosphokinase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_0393
                term:
                  id: UniProtKB:Q88QU3
                  label: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase
            function:
              preferred_term: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase activity
              term:
                id: GO:0003848
                label: 2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase activity
              evidence:
                - source_id: EC:2.7.6.3
                  statement: 6-hydroxymethyl-7,8-dihydropterin pyrophosphokinase
            role_description: Paralogs or alternate HPPK candidates should be resolved at gene-review level.
    - order: 3
      role: p-aminobenzoate branch
      node:
        id: chorismate_to_paba
        label: Chorismate to p-aminobenzoate
        module_type: METABOLIC_PATHWAY
        description: >-
          Aminodeoxychorismate synthase diverts chorismate to the pABA branch,
          and PabC lyase converts aminodeoxychorismate to p-aminobenzoate. The
          aminodeoxychorismate synthase glutamine amidotransferase component is
          shared or ambiguous in KT2440 and should be considered together with
          the existing PP_0420/pabA tryptophan-pathway review.
        annotons:
          - id: pabB_aminodeoxychorismate_synthase
            label: PabB aminodeoxychorismate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pabB
                term:
                  id: UniProtKB:Q88KG1
                  label: aminodeoxychorismate synthase
            function:
              preferred_term: aminodeoxychorismate synthase activity
              term:
                id: GO:0046820
                label: aminodeoxychorismate synthase activity
              evidence:
                - source_id: EC:2.6.1.85
                  statement: aminodeoxychorismate synthase
            role_description: Chorismate-to-aminodeoxychorismate synthase component of pABA formation.
          - id: pabA_glutamine_amidotransferase_candidate
            label: PabA/TrpG-like glutamine amidotransferase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pabA / PP_0420
                term:
                  id: UniProtKB:Q88QR8
                  label: Aminodeoxychorismate synthase / para-aminobenzoate synthase multi-enzyme complex
            function:
              preferred_term: aminodeoxychorismate synthase activity
              term:
                id: GO:0046820
                label: aminodeoxychorismate synthase activity
            role_description: Candidate amidotransferase component for pABA synthesis; previous tryptophan-pathway review left folate/pABA contribution unresolved.
          - id: pabC_aminodeoxychorismate_lyase
            label: PabC aminodeoxychorismate lyase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pabC
                term:
                  id: UniProtKB:Q88LL3
                  label: Aminodeoxychorismate lyase
            function:
              preferred_term: 4-amino-4-deoxychorismate lyase activity
              term:
                id: GO:0008696
                label: 4-amino-4-deoxychorismate lyase activity
              evidence:
                - source_id: EC:4.1.3.38
                  statement: aminodeoxychorismate lyase
            role_description: Produces p-aminobenzoate from aminodeoxychorismate.
    - order: 4
      role: pterin-pABA condensation
      node:
        id: dihydropteroate_synthesis
        label: Activated pterin plus pABA to dihydropteroate
        module_type: REACTION
        annotons:
          - id: folP_dihydropteroate_synthase
            label: FolP dihydropteroate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folP
                term:
                  id: UniProtKB:Q88DV2
                  label: Dihydropteroate synthase
            function:
              preferred_term: dihydropteroate synthase activity
              term:
                id: GO:0004156
                label: dihydropteroate synthase activity
              substrates:
                - preferred_term: 6-hydroxymethyl-7,8-dihydropterin diphosphate
                - preferred_term: p-aminobenzoate
              products:
                - preferred_term: 7,8-dihydropteroate
              evidence:
                - source_id: EC:2.5.1.15
                  statement: dihydropteroate synthase
            role_description: Condenses the pterin and pABA branches.
    - order: 5
      role: dihydrofolate formation and polyglutamylation
      node:
        id: dihydrofolate_and_folylpolyglutamate_synthesis
        label: Dihydropteroate to dihydrofolate and folylpolyglutamate
        module_type: METABOLIC_PATHWAY
        annotons:
          - id: folC_dihydrofolate_synthase
            label: FolC dihydrofolate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folC
                term:
                  id: UniProtKB:Q88LD8
                  label: Dihydrofolate synthase/folylpolyglutamate synthase
            function:
              preferred_term: dihydrofolate synthase activity
              term:
                id: GO:0008841
                label: dihydrofolate synthase activity
              evidence:
                - source_id: EC:6.3.2.12
                  statement: dihydrofolate synthase
            role_description: Adds glutamate to dihydropteroate to form dihydrofolate.
          - id: folC_folylpolyglutamate_synthase
            label: FolC folylpolyglutamate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folC
                term:
                  id: UniProtKB:Q88LD8
                  label: Dihydrofolate synthase/folylpolyglutamate synthase
            function:
              preferred_term: tetrahydrofolylpolyglutamate synthase activity
              term:
                id: GO:0004326
                label: tetrahydrofolylpolyglutamate synthase activity
              evidence:
                - source_id: EC:6.3.2.17
                  statement: folylpolyglutamate synthase
            role_description: Adds additional glutamate residues to folate cofactors for cellular retention and enzyme use.
    - order: 6
      role: tetrahydrofolate formation
      node:
        id: dihydrofolate_to_tetrahydrofolate
        label: Dihydrofolate reduction to tetrahydrofolate
        module_type: REACTION
        annotons:
          - id: folA_dihydrofolate_reductase
            label: FolA dihydrofolate reductase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folA
                term:
                  id: UniProtKB:Q88CP8
                  label: Dihydrofolate reductase
            function:
              preferred_term: dihydrofolate reductase activity
              term:
                id: GO:0004146
                label: dihydrofolate reductase activity
              substrates:
                - preferred_term: 7,8-dihydrofolate
                - preferred_term: NADPH
              products:
                - preferred_term: tetrahydrofolate
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.5.1.3
                  statement: dihydrofolate reductase
            role_description: Reduces dihydrofolate to tetrahydrofolate.
          - id: folM_dihydrofolate_reductase_candidate
            label: FolM dihydrofolate reductase / dihydromonapterin reductase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK folM
                term:
                  id: UniProtKB:Q88E36
                  label: Dihydromonapterin reductase
            function:
              preferred_term: dihydrofolate reductase activity
              term:
                id: GO:0004146
                label: dihydrofolate reductase activity
              evidence:
                - source_id: EC:1.5.1.3
                  statement: dihydrofolate reductase
            role_description: Alternative or pterin-specialized reductase candidate; local evidence should decide whether this is core folate synthesis or boundary pterin metabolism.
    - order: 7
      role: KEGG ppu00790 boundary context
      optional: true
      node:
        id: ppu00790_boundary_context
        label: Non-folate pterin, MoCo, queuosine, and riboflavin side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00790 includes several GTP-derived pterin or folate-adjacent
          pathways. These should be curated in their own modules unless
          evidence shows direct folate synthesis.
        parts:
          - order: 1
            role: queuosine biosynthesis side branch
            node:
              id: queuosine_boundary
              label: Queuosine biosynthesis boundary
              module_type: METABOLIC_PATHWAY
              description: >-
                queD, queE, queC, and queF use pterin-like chemistry from GTP
                but produce preQ/queuosine precursors rather than folate.
          - order: 2
            role: molybdenum cofactor side branch
            node:
              id: molybdenum_cofactor_boundary
              label: Molybdenum cofactor biosynthesis boundary
              module_type: METABOLIC_PATHWAY
              description: >-
                moaA/moaB/moaC/moaE/moeA/mobA and related MobA-like candidates
                belong to molybdopterin or molybdenum cofactor biosynthesis,
                not strict folate synthesis.
          - order: 3
            role: tetrahydrobiopterin and aromatic hydroxylase side branch
            node:
              id: tetrahydrobiopterin_boundary
              label: Tetrahydrobiopterin and phenylalanine hydroxylase boundary
              module_type: METABOLIC_PATHWAY
              description: >-
                phhA and phhB are phenylalanine hydroxylase/BH4 regeneration
                context and are better handled with the tetrahydrobiopterin
                module and aromatic amino-acid metabolism.
          - order: 4
            role: riboflavin pathway spillover
            node:
              id: riboflavin_boundary
              label: Riboflavin pathway spillover
              module_type: METABOLIC_PATHWAY
              description: >-
                ribA and ribAB-I/ribAB-II belong to riboflavin biosynthesis
                and should not satisfy folate GTP cyclohydrolase I steps.
  connections:
    - source: pterin_precursor_to_hmdhp
      target: dihydropteroate_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: Activated hydroxymethyldihydropterin diphosphate is one substrate for FolP.
    - source: chorismate_to_paba
      target: dihydropteroate_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: p-aminobenzoate from the chorismate branch is the second substrate for FolP.
    - source: dihydropteroate_synthesis
      target: dihydrofolate_and_folylpolyglutamate_synthesis
      connection_type: PRECEDES
      description: Dihydropteroate produced by FolP is glutamylated by FolC to form dihydrofolate.
    - source: dihydrofolate_and_folylpolyglutamate_synthesis
      target: dihydrofolate_to_tetrahydrofolate
      connection_type: PRECEDES
      description: Dihydrofolate is reduced by FolA to tetrahydrofolate.
