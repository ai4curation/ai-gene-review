id: MODULE:methionine_biosynthesis
title: L-methionine biosynthesis (from homoserine)
description: >-
  De novo biosynthesis of L-methionine from L-homoserine, modelled as a
  species-agnostic pathway template with alternative routes at three steps, so the
  same logic can be evaluated across genomes (a eukaryote-to-prokaryote test of the
  module satisfiability engine). Homoserine is first activated by acylation, for
  which bacteria use either an O-succinyltransferase (metA) or an O-acetyltransferase
  (metX). Sulfur is then incorporated to give homocysteine by one of two routes:
  trans-sulfuration (cystathionine gamma-synthase metB plus cystathionine beta-lyase
  metC, drawing sulfur from cysteine) or direct sulfhydrylation (an O-acyl-homoserine
  sulfhydrylase, metY/metZ, using free sulfide in a single step). Finally homocysteine
  is methylated to methionine by either the cobalamin-independent synthase (metE) or
  the cobalamin-dependent synthase (metH). Because every step has alternatives, no
  single enzyme is universally required; an organism makes methionine if it encodes
  at least one option at each of the three steps. This mirrors GapMind-style pathway
  reconstruction: the template defines steps and route alternatives, and a per-genome
  oracle decides which candidates are present.
status: DRAFT
evidence:
  - source_id: GO:0071265
    title: L-methionine biosynthetic process
    statement: Module grounded in the GO biological-process term for L-methionine biosynthesis.
  - source_id: KEGG:map00270
    title: Cysteine and methionine metabolism
    statement: >-
      Step alternatives (metA/metX; trans-sulfuration vs direct sulfhydrylation;
      metE/metH) follow the KEGG/MetaCyc methionine biosynthesis routes; per-genome
      presence is resolved via KEGG Orthology (see oracle).
module:
  id: methionine_biosynthesis
  label: L-methionine biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: methionine biosynthesis
      term:
        id: GO:0071265
        label: L-methionine biosynthetic process
  parts:
    - order: 1
      role: acylation of homoserine (succinyl or acetyl)
      node:
        id: acylation
        label: Homoserine activation by acylation
        module_type: REACTION
        variant_sets:
          - id: acyltransferase
            label: Homoserine acyltransferase
            axis: acyl donor
            selection: ONE_OR_MORE
            variants:
              - id: metA_variant
                label: O-succinyltransferase (metA)
                module_type: REACTION
                annotons:
                  - id: metA_activity
                    label: "metA: homoserine O-succinyltransferase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metA (homoserine O-succinyltransferase)
                    function:
                      preferred_term: homoserine O-succinyltransferase activity
                      term:
                        id: GO:0008899
                        label: homoserine O-succinyltransferase activity
                    role_description: Activates homoserine to O-succinyl-L-homoserine.
              - id: metX_variant
                label: O-acetyltransferase (metX)
                module_type: REACTION
                annotons:
                  - id: metX_activity
                    label: "metX: homoserine O-acetyltransferase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metX (homoserine O-acetyltransferase)
                    function:
                      preferred_term: homoserine O-acetyltransferase activity
                      term:
                        id: GO:0004414
                        label: homoserine O-acetyltransferase activity
                    role_description: Activates homoserine to O-acetyl-L-homoserine.
    - order: 2
      role: sulfur incorporation to homocysteine (trans-sulfuration or direct)
      node:
        id: sulfur_incorporation
        label: Sulfur incorporation to homocysteine
        module_type: METABOLIC_PATHWAY
        variant_sets:
          - id: sulfur_route
            label: Sulfur-incorporation route
            axis: sulfur source
            selection: ONE_OR_MORE
            variants:
              - id: trans_sulfuration
                label: Trans-sulfuration (metB + metC)
                module_type: METABOLIC_PATHWAY
                description: Two enzymes, drawing sulfur from cysteine via cystathionine.
                parts:
                  - order: 1
                    role: cystathionine formation
                    node:
                      id: metB_node
                      label: Cystathionine gamma-synthase
                      module_type: REACTION
                      annotons:
                        - id: metB_activity
                          label: "metB: cystathionine gamma-synthase"
                          participant:
                            selector_type: GENE
                            gene:
                              preferred_term: metB (cystathionine gamma-synthase)
                          function:
                            preferred_term: cystathionine gamma-synthase activity
                            term:
                              id: GO:0003962
                              label: cystathionine gamma-synthase activity
                  - order: 2
                    role: cystathionine cleavage to homocysteine
                    node:
                      id: metC_node
                      label: Cystathionine beta-lyase
                      module_type: REACTION
                      annotons:
                        - id: metC_activity
                          label: "metC: cystathionine beta-lyase"
                          participant:
                            selector_type: GENE
                            gene:
                              preferred_term: metC (cystathionine beta-lyase)
                          function:
                            preferred_term: cysteine-S-conjugate beta-lyase activity
                            term:
                              id: GO:0047804
                              label: cysteine-S-conjugate beta-lyase activity
              - id: direct_sulfhydrylation
                label: Direct sulfhydrylation (metY)
                module_type: REACTION
                description: One enzyme, using free sulfide on O-acyl-homoserine.
                annotons:
                  - id: metY_activity
                    label: "metY: O-acylhomoserine sulfhydrylase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metY (O-acetylhomoserine sulfhydrylase)
                    function:
                      preferred_term: O-acetylhomoserine aminocarboxypropyltransferase activity
                      term:
                        id: GO:0003961
                        label: O-acetylhomoserine aminocarboxypropyltransferase activity
