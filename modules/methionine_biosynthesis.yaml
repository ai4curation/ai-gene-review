id: MODULE:methionine_biosynthesis
title: L-methionine biosynthesis (from homoserine)
description: >-
  De novo biosynthesis of L-methionine from L-homoserine, modelled as a
  species-agnostic pathway template with alternative routes at three steps, so the
  same logic can be evaluated across genomes (a eukaryote-to-prokaryote test of the
  module satisfiability engine). Homoserine is first activated by acylation, for
  which bacteria use either an O-succinyltransferase (metA) or an O-acetyltransferase
  (metX). Sulfur is then incorporated to give homocysteine by one of two routes:
  trans-sulfuration (cystathionine gamma-synthase metB plus cystathionine beta-lyase
  metC, drawing sulfur from cysteine) or direct sulfhydrylation (an O-acyl-homoserine
  sulfhydrylase, metY/metZ, using free sulfide in a single step). Finally homocysteine
  is methylated to methionine by either the cobalamin-independent synthase (metE) or
  the cobalamin-dependent synthase (metH). Because every step has alternatives, no
  single enzyme is universally required; an organism makes methionine if it encodes
  at least one option at each of the three steps. This mirrors GapMind-style pathway
  reconstruction: the template defines steps and route alternatives, and a per-genome
  oracle decides which candidates are present.
status: DRAFT
evidence:
  - source_id: GO:0071265
    title: L-methionine biosynthetic process
    statement: Module grounded in the GO biological-process term for L-methionine biosynthesis.
  - source_id: KEGG:map00270
    title: Cysteine and methionine metabolism
    statement: >-
      Step alternatives (metA/metX; trans-sulfuration vs direct sulfhydrylation;
      metE/metH) follow the KEGG/MetaCyc methionine biosynthesis routes; per-genome
      presence is resolved via KEGG Orthology (see oracle).
  - source_id: file:modules/methionine_biosynthesis-deep-research-openscientist.md
    title: OpenScientist module research for L-methionine biosynthesis
    statement: >-
      OpenScientist framed methionine biosynthesis from homoserine as a Boolean
      satisfiability problem with required acylation, sulfur-incorporation, and
      methylation steps, each having route alternatives.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__methionine_biosynthesis__ppu00270-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00270 methionine-biosynthesis research
    statement: >-
      OpenScientist concluded that the PSEPK module is satisfiable via MetXS/MetZ
      direct sulfhydrylation and terminal methionine synthase activity, with a
      secondary MetB/PP_4348 trans-sulfuration route and important caution around
      partial MetE-like candidates.
notes: >-
  Curated first-pass interpretation for PSEPK: the module is satisfiable, but the
  primary route appears to be Pseudomonas-style O-succinylhomoserine direct
  sulfhydrylation (metXS plus metZ), with metB plus PP_4348 as a plausible
  secondary trans-sulfuration route. The terminal methylation step is high-confidence
  through metH, and metE is a predicted compact single-barrel cobalamin-independent
  MetE candidate that still lacks direct KT2440 biochemical evidence. PP_2528,
  PP_4594, and PP_4637 should be treated as route/paralog-ambiguous unless gene-level
  evidence establishes physiological methionine-biosynthesis roles. In particular,
  the module scorer should not count PP_4637 alone as satisfying the cobalamin-independent
  methionine synthase alternative unless it can explicitly model a split/auxiliary
  MetE complex and require the catalytic partner.
module:
  id: methionine_biosynthesis
  label: L-methionine biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: methionine biosynthesis
      term:
        id: GO:0071265
        label: L-methionine biosynthetic process
  parts:
    - order: 1
      role: acylation of homoserine (succinyl or acetyl)
      node:
        id: acylation
        label: Homoserine activation by acylation
        module_type: REACTION
        variant_sets:
          - id: acyltransferase
            label: Homoserine acyltransferase
            axis: acyl donor
            selection: ONE_OR_MORE
            variants:
              - id: metA_variant
                label: O-succinyltransferase (metA)
                module_type: REACTION
                annotons:
                  - id: metA_activity
                    label: "metA: homoserine O-succinyltransferase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metA (homoserine O-succinyltransferase)
                    function:
                      preferred_term: homoserine O-succinyltransferase activity
                      term:
                        id: GO:0008899
                        label: homoserine O-succinyltransferase activity
                    role_description: Activates homoserine to O-succinyl-L-homoserine.
              - id: metX_variant
                label: O-acetyltransferase (metX)
                module_type: REACTION
                annotons:
                  - id: metX_activity
                    label: "metX: homoserine O-acetyltransferase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metX (homoserine O-acetyltransferase)
                    function:
                      preferred_term: homoserine O-acetyltransferase activity
                      term:
                        id: GO:0004414
                        label: homoserine O-acetyltransferase activity
                    role_description: Activates homoserine to O-acetyl-L-homoserine.
    - order: 2
      role: sulfur incorporation to homocysteine (trans-sulfuration or direct)
      node:
        id: sulfur_incorporation
        label: Sulfur incorporation to homocysteine
        module_type: METABOLIC_PATHWAY
        variant_sets:
          - id: sulfur_route
            label: Sulfur-incorporation route
            axis: sulfur source
            selection: ONE_OR_MORE
            variants:
              - id: trans_sulfuration
                label: Trans-sulfuration (metB + metC)
                module_type: METABOLIC_PATHWAY
                description: Two enzymes, drawing sulfur from cysteine via cystathionine.
                parts:
                  - order: 1
                    role: cystathionine formation
                    node:
                      id: metB_node
                      label: Cystathionine gamma-synthase
                      module_type: REACTION
                      annotons:
                        - id: metB_activity
                          label: "metB: cystathionine gamma-synthase"
                          participant:
                            selector_type: GENE
                            gene:
                              preferred_term: metB (cystathionine gamma-synthase)
                          function:
                            preferred_term: cystathionine gamma-synthase activity
                            term:
                              id: GO:0003962
                              label: cystathionine gamma-synthase activity
                  - order: 2
                    role: cystathionine cleavage to homocysteine
                    node:
                      id: metC_node
                      label: Cystathionine beta-lyase
                      module_type: REACTION
                      annotons:
                        - id: metC_activity
                          label: "metC: cystathionine beta-lyase"
                          participant:
                            selector_type: GENE
                            gene:
                              preferred_term: metC (cystathionine beta-lyase)
                          function:
                            preferred_term: cystathionine beta-lyase activity
                            term:
                              id: GO:0047804
                              label: cysteine-S-conjugate beta-lyase activity
                            evidence:
                              - source_id: file:PSEPK/PP_4348/PP_4348-notes.md
                                statement: >-
                                  QuickGO returned GO:0004121 with
                                  isObsolete=true and states that it is
                                  equivalent to the live GO:0047804
                                  cysteine-S-conjugate beta-lyase activity term;
                                  GO:0047804 also lists cystathionine beta-lyase
                                  activity as a related synonym.
              - id: direct_sulfhydrylation
                label: Direct sulfhydrylation of O-acetylhomoserine (metY)
                module_type: REACTION
                description: One enzyme, using free sulfide on O-acetyl-homoserine.
                annotons:
                  - id: metY_activity
                    label: "metY: O-acylhomoserine sulfhydrylase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metY (O-acetylhomoserine sulfhydrylase)
                    function:
                      preferred_term: O-acetylhomoserine aminocarboxypropyltransferase activity
                      term:
                        id: GO:0003961
                        label: O-acetylhomoserine aminocarboxypropyltransferase activity
              - id: direct_sulfhydrylation_metZ
                label: Direct sulfhydrylation of O-succinylhomoserine (metZ)
                module_type: REACTION
                description: >-
                  One enzyme, using free sulfide on O-succinylhomoserine to form
                  L-homocysteine. This is the Pseudomonas-style direct route used
                  by KT2440 when homoserine is activated by a succinyltransferase.
                annotons:
                  - id: metZ_activity
                    label: "metZ: O-succinylhomoserine sulfhydrylase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metZ (O-succinylhomoserine sulfhydrylase)
                    function:
                      preferred_term: carbon-sulfur lyase activity
                      term:
                        id: GO:0016846
                        label: carbon-sulfur lyase activity
                    role_description: >-
                      Converts O-succinyl-L-homoserine and sulfide to L-homocysteine;
                      GO lacks a more specific O-succinylhomoserine sulfhydrylase
                      molecular-function term in the local GOA record.
    - order: 3
      role: methylation of homocysteine to methionine (cobalamin-independent or -dependent)
      node:
        id: methylation
        label: Homocysteine methylation to methionine
        module_type: REACTION
        variant_sets:
          - id: methionine_synthase
            label: Methionine synthase
            axis: cobalamin dependence
            selection: ONE_OR_MORE
            variants:
              - id: metE_variant
                label: Cobalamin-independent synthase (metE)
                module_type: REACTION
                annotons:
                  - id: metE_activity
                    label: "metE: cobalamin-independent methionine synthase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metE (cobalamin-independent methionine synthase)
                    function:
                      preferred_term: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
                      term:
                        id: GO:0003871
                        label: 5-methyltetrahydropteroyltriglutamate-homocysteine S-methyltransferase activity
              - id: metH_variant
                label: Cobalamin-dependent synthase (metH)
                module_type: REACTION
                annotons:
                  - id: metH_activity
                    label: "metH: cobalamin-dependent methionine synthase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: metH (cobalamin-dependent methionine synthase)
                    function:
                      preferred_term: methionine synthase activity
                      term:
                        id: GO:0008705
                        label: methionine synthase activity
  connections:
    - source: acylation
      target: sulfur_incorporation
      connection_type: PRECEDES
    - source: sulfur_incorporation
      target: methylation
      connection_type: PRECEDES
  notes: >-
    Species-agnostic GapMind-style template. Steps are grounded by gene symbol and
    GO molecular function where possible; the authoritative per-genome step candidates are KEGG
    Orthology ids held by the oracle (metA=K00651, metX=K00641, metB=K01739,
    metC=K01760, metY=K01740, metE=K00549, metH=K00548), supplemented by
    species-aware review for metZ/O-succinylhomoserine sulfhydrylase and truncated
    MetE-like hits. See
    modules/experimental/gluconeogenesis-context/kegg_oracle.py and resolve_genomes.py
    for per-genome route resolution and gap detection.
