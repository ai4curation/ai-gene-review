      connection_type: PRECEDES
  notes: >-
    Species-agnostic GapMind-style template. Steps are grounded by gene symbol and
    GO molecular function; the authoritative per-genome step candidates are KEGG
    Orthology ids held by the oracle (metA=K00651, metX=K00641, metB=K01739,
    metC=K01760, metY=K01740, metE=K00549, metH=K00548). See
    modules/experimental/gluconeogenesis-context/kegg_oracle.py and resolve_genomes.py
    for per-genome route resolution and gap detection.
