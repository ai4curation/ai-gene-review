id: MODULE:envelope_polysaccharide_export_boundary
title: Envelope polysaccharide export and flippase boundary
description: Boundary module for the PSEPK transport/membrane/efflux envelope-polysaccharide and flippase split. The set contains
  lipid-linked glycan transfer proteins, O-antigen/Wzy/Wzz-like assembly context, polysaccharide transporter candidates, and
  peptidoglycan or low-resolution transglycosylase side nodes rather than one single satisfiable transport pathway.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_envelope_polysaccharide_export_and_flippase_context.tsv
  title: PSEPK transport envelope-polysaccharide/flippase batch
  statement: The transport partition routes 13 Wzy/O-antigen, exopolysaccharide, bactoprenol/undecaprenyl-linked glycan, glycosyltransferase,
    and transglycosylase genes into a boundary module for first-pass curation.
notes: Substrate and polymer specificity are intentionally conservative. PP_3127 is treated as Wzz-like polysaccharide export/chain-length
  context, not protein kinase activity; yceG is peptidoglycan transglycosylase context; PP_5334 remains an unresolved UPF0410
  transglycosylase side candidate.
