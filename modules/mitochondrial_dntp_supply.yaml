id: MODULE:mitochondrial_dntp_supply
title: Mitochondrial dNTP supply for mtDNA maintenance — MNGIE and mtDNA depletion syndromes
description: >-
  Faithful replication of mitochondrial DNA (mtDNA), including in post-mitotic tissues,
  requires a balanced supply of the four deoxyribonucleoside triphosphates (dNTPs) inside
  mitochondria. Because mitochondria cannot rely on the cell-cycle-regulated cytosolic de
  novo machinery, they use a dedicated salvage pathway plus a p53-inducible de novo input,
  and depend on cytosolic enzymes that keep nucleoside pools balanced. The mitochondrial
  deoxyribonucleoside kinases phosphorylate imported deoxyribonucleosides to dNMPs: thymidine
  kinase 2 (TK2) handles the pyrimidines (thymidine, deoxycytidine, deoxyuridine) and
  deoxyguanosine kinase (DGUOK) the purines (deoxyguanosine, deoxyadenosine). The p53-inducible
  ribonucleotide reductase small subunit RRM2B (p53R2), with RRM1, provides de novo
  deoxyribonucleoside diphosphates (dNDPs) by reducing NDPs — the main dNTP source for
  quiescent cells and mtDNA. Cytosolic thymidine phosphorylase (TYMP) governs systemic
  thymidine/deoxyuridine levels; its loss floods the dNTP pool with thymidine-derived
  nucleotides and destabilises mtDNA. Together these enzymes maintain the mitochondrial dNTP
  balance; imbalance (excess or deficiency) causes mtDNA depletion/deletions. Inherited
  defects are the classic mtDNA-maintenance disorders: TYMP -> MNGIE; TK2 -> myopathic
  mtDNA depletion; DGUOK -> hepatocerebral mtDNA depletion; RRM2B -> encephalomyopathic mtDNA
  depletion and dominant progressive external ophthalmoplegia.
status: DRAFT
evidence:
  - source_id: GO:0009263
    title: deoxyribonucleotide biosynthetic process
    statement: >-
      The module groups the enzymes that supply/balance the mitochondrial dNTP pool
      (deoxyribonucleotide biosynthetic process, GO:0009263) for mtDNA replication.
  - source_id: GO:0006264
    title: mitochondrial DNA replication
    statement: >-
      The physiological endpoint served is mitochondrial DNA replication (GO:0006264);
      dNTP imbalance from defects in these enzymes causes mtDNA depletion/instability.
  - source_id: file:human/TK2/TK2-ai-review.yaml
    title: TK2 gene review (human)
    statement: >-
      The mitochondrial pyrimidine deoxyribonucleoside-salvage step (UniProtKB:O00142,
      GO:0004797) matches the completed human TK2 review.
  - source_id: file:human/DGUOK/DGUOK-ai-review.yaml
    title: DGUOK gene review (human)
    statement: >-
      The mitochondrial purine deoxyribonucleoside-salvage step (UniProtKB:Q16854,
