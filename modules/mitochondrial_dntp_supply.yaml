      completed human TYMP review.
module:
  id: mitochondrial_dntp_supply
  label: Mitochondrial dNTP supply (mtDNA maintenance)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: deoxyribonucleotide biosynthetic process
      term:
        id: GO:0009263
        label: deoxyribonucleotide biosynthetic process
      description: >-
        Salvage and de novo supply of balanced dNTPs to mitochondria for mtDNA replication.
  context:
    cellular_components:
      - preferred_term: mitochondrion
        term:
          id: GO:0005739
          label: mitochondrion
        description: >-
          The salvage kinases (TK2, DGUOK) are mitochondrial-matrix enzymes; RRM2B and
          TYMP are cytosolic contributors to the pool.
  parts:
    - order: 1
      role: mitochondrial pyrimidine deoxyribonucleoside salvage
      node:
        id: tk2_step
        label: thymidine / deoxycytidine / deoxyuridine + ATP to dTMP / dCMP / dUMP
        module_type: REACTION
        annotons:
          - id: tk2_activity
            label: "TK2: mitochondrial thymidine kinase 2"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Deoxyribonucleoside kinase family (TK2/DGUOK/DCK)
                term:
                  id: PANTHER:PTHR10513
                  label: DEOXYCYTIDINE KINASE / DEOXYGUANOSINE KINASE
                representative_members:
                  - preferred_term: TK2 (human)
                    term:
                      id: UniProtKB:O00142
                      label: Thymidine kinase 2, mitochondrial
            function:
              preferred_term: thymidine kinase activity
              term:
                id: GO:0004797
                label: thymidine kinase activity
              substrates:
                - preferred_term: thymidine / deoxycytidine / deoxyuridine
                - preferred_term: ATP
              products:
                - preferred_term: dTMP / dCMP / dUMP
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.21
                  statement: mitochondrial thymidine kinase 2 (multisubstrate deoxyribonucleoside kinase; also deoxycytidine kinase GO:0004137)
                - source_id: Reactome:R-HSA-109759
                  statement: "deoxycytidine, thymidine, or deoxyuridine + ATP => dCMP, TMP, or dUMP (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Pyrimidine arm of the mitochondrial deoxyribonucleoside salvage pathway,
              phosphorylating thymidine/deoxycytidine/deoxyuridine to dNMPs for mtDNA.
              Deficiency = myopathic mtDNA depletion syndrome (MTDPS2).
    - order: 2
      role: mitochondrial purine deoxyribonucleoside salvage
      node:
        id: dguok_step
        label: deoxyguanosine / deoxyadenosine + ATP to dGMP / dAMP
        module_type: REACTION
        annotons:
          - id: dguok_activity
            label: "DGUOK: mitochondrial deoxyguanosine kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Deoxyribonucleoside kinase family (TK2/DGUOK/DCK)
                term:
                  id: PANTHER:PTHR10513
                  label: DEOXYCYTIDINE KINASE / DEOXYGUANOSINE KINASE
                representative_members:
                  - preferred_term: DGUOK (human)
                    term:
                      id: UniProtKB:Q16854
                      label: Deoxyguanosine kinase, mitochondrial
            function:
              preferred_term: deoxyguanosine kinase activity
              term:
                id: GO:0004138
                label: deoxyguanosine kinase activity
              substrates:
                - preferred_term: deoxyguanosine / deoxyadenosine / deoxyinosine
                - preferred_term: ATP
              products:
                - preferred_term: dGMP / dAMP / dIMP
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.113
                  statement: mitochondrial deoxyguanosine kinase (also deoxyadenosine kinase GO:0004136)
                - source_id: Reactome:R-HSA-74207
                  statement: "dA, dG, or dI + ATP => dAMP, dGMP, or dIMP + ADP (DGUOK) (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Purine arm of the mitochondrial deoxyribonucleoside salvage pathway,
              phosphorylating deoxyguanosine/deoxyadenosine to dNMPs for mtDNA.
              Deficiency = hepatocerebral mtDNA depletion syndrome (MTDPS3).
    - order: 3
      role: de novo dNDP supply (p53-inducible ribonucleotide reductase)
      node:
        id: rrm2b_step
        label: ribonucleoside diphosphate (NDP) to 2'-deoxyribonucleoside diphosphate (dNDP)
        module_type: REACTION
        annotons:
          - id: rrm2b_activity
            label: "RRM2B (p53R2): ribonucleotide reductase small subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ribonucleotide reductase small subunit family (RRM2/RRM2B)
                term:
                  id: PANTHER:PTHR23409
                  label: RIBONUCLEOSIDE-DIPHOSPHATE REDUCTASE SMALL CHAIN
                representative_members:
                  - preferred_term: RRM2B (human, p53R2)
                    term:
                      id: UniProtKB:Q7LG56
                      label: Ribonucleoside-diphosphate reductase subunit M2 B
            function:
              preferred_term: ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor
              term:
                id: GO:0004748
                label: ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor
              substrates:
                - preferred_term: ribonucleoside diphosphates (ADP/GDP/CDP/UDP)
                - preferred_term: thioredoxin (reductant)
              products:
                - preferred_term: 2'-deoxyribonucleoside diphosphates (dNDPs)
              evidence:
                - source_id: EC:1.17.4.1
                  statement: ribonucleotide reductase small subunit (p53-inducible p53R2); diiron-tyrosyl radical; acts with RRM1
                - source_id: Reactome:R-HSA-111804
                  statement: "RNR (M1M2B) reduces nucleotide diphosphates to deoxynucleotide diphosphates (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              p53-inducible small subunit of ribonucleotide reductase (with RRM1) providing
              the de novo dNDP supply for DNA repair and for mtDNA synthesis in quiescent
              cells. Deficiency = encephalomyopathic mtDNA depletion (MTDPS8) / dominant PEO.
    - order: 4
      role: thymidine-pool regulation (protects dNTP balance)
      node:
        id: tymp_step
        label: thymidine + phosphate <-> thymine + 2-deoxyribose-1-phosphate
        module_type: REACTION
        annotons:
          - id: tymp_activity
            label: "TYMP: thymidine phosphorylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Thymidine/pyrimidine-nucleoside phosphorylase family (TYMP)
                term:
                  id: PANTHER:PTHR10515
                  label: THYMIDINE PHOSPHORYLASE
                representative_members:
                  - preferred_term: TYMP (human)
                    term:
                      id: UniProtKB:P19971
                      label: Thymidine phosphorylase
            function:
              preferred_term: thymidine phosphorylase activity
              term:
                id: GO:0009032
                label: thymidine phosphorylase activity
              substrates:
                - preferred_term: thymidine / 2'-deoxyuridine
                - preferred_term: phosphate
              products:
                - preferred_term: thymine / uracil
                - preferred_term: 2-deoxy-alpha-D-ribose 1-phosphate
              evidence:
                - source_id: EC:2.4.2.4
                  statement: thymidine phosphorylase (= PD-ECGF); reversible phosphorolysis; controls systemic thymidine/deoxyuridine
                - source_id: Reactome:R-HSA-112265
                  statement: "thymidine or deoxyuridine + orthophosphate <=> thymine or uracil + 2-deoxy-D-ribose 1-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Cytosolic control of thymidine/deoxyuridine levels; its loss (MNGIE) floods
              the nucleotide pool with thymidine/deoxyuridine, imbalancing mitochondrial
              dNTPs and destabilising mtDNA.
  notes: >-
    Mitochondrial dNTP-supply / mtDNA-maintenance system grounded to the human enzymes
    TK2 (UniProtKB:O00142, GO:0004797, EC 2.7.1.21), DGUOK (Q16854, GO:0004138, EC 2.7.1.113),
    RRM2B (Q7LG56, GO:0004748, EC 1.17.4.1) and TYMP (P19971, GO:0009032, EC 2.4.2.4). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids and
    titles were verified against the local reactome cache. Each node uses a PANTHER family
    selector with the human enzyme as representative (TK2 and DGUOK are paralogs in the same
    deoxyribonucleoside-kinase family PTHR10513, with the cytosolic DCK/TK1 relatives; RRM2B is
    the p53-inducible paralog of the cell-cycle RRM2). This is a CONVERGENT-supply module rather
    than a linear pathway: TK2 (pyrimidine) and DGUOK (purine) salvage imported deoxyribonucleosides
    to dNMPs inside the matrix; RRM2B/RRM1 supply de novo dNDPs (cytosolic, imported); and TYMP
    keeps the thymidine/deoxyuridine pool balanced. The dNMPs/dNDPs are further phosphorylated
    (CMPK/NME kinases) to the dNTPs used by the mtDNA replisome (POLG). Their shared endpoint is a
    balanced mitochondrial dNTP pool for mtDNA replication (GO:0006264); genetic imbalance in any of
    them causes an mtDNA-maintenance disorder: TYMP -> MNGIE; TK2 -> myopathic mtDNA depletion
    (MTDPS2); DGUOK -> hepatocerebral mtDNA depletion (MTDPS3); RRM2B -> encephalomyopathic mtDNA
    depletion (MTDPS8) and autosomal-dominant progressive external ophthalmoplegia. RRM2B's dNTP
    supply and TYMP's angiogenic (PD-ECGF) moonlighting are captured in the respective gene reviews.
