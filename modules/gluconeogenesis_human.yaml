id: MODULE:gluconeogenesis_human
title: Gluconeogenesis (human, tissue- and compartment-resolved)
description: >-
  Human gluconeogenesis: the synthesis of free glucose from non-carbohydrate
  precursors (lactate, glucogenic amino acids such as alanine, and glycerol).
  Unlike the taxon-neutral gluconeogenesis template, this module is grounded to
  specific human isozymes and is organised around the fact that in a metazoan the
  pathway is not uniformly active: every cell carries the genes, but free-glucose
  output is restricted to a few tissues. Three control points are encoded as
  variant sets over human isozymes that differ by tissue and subcellular
  compartment: the phosphoenolpyruvate-forming step (cytosolic PCK1 vs
  mitochondrial PCK2), the fructose-1,6-bisphosphatase step (gluconeogenic FBP1 vs
  muscle FBP2), and the terminal glucose-releasing step, which is a two-component
  endoplasmic-reticulum system requiring both a catalytic subunit and the
  glucose-6-phosphate antiporter SLC37A4. The terminal step is the physiological
  gate: only tissues expressing the gluconeogenic catalytic subunit G6PC1 together
  with SLC37A4 can release free glucose, which is why liver, kidney cortex, and
  intestine are gluconeogenic while skeletal muscle and brain are not. This module
  is designed to be evaluated against tissue expression data: each isozyme atom is
  an expressed/not-expressed predicate per context, so the realised route through
  the pathway can be resolved per tissue.
status: DRAFT
evidence:
  - source_id: GO:0006094
    title: gluconeogenesis
    statement: The module is grounded in the GO biological-process term for gluconeogenesis.
  - source_id: MetaCyc:GLUCONEO-PWY
    title: gluconeogenesis
    statement: Pathway backbone follows the conserved gluconeogenesis route with human isozyme specialisation.
  - source_id: GTEx:gtex_v8
    title: GTEx v8 median gene expression
    statement: >-
      Tissue expression of the human isozymes (e.g. PCK1 and FBP1 peaking in liver
      and kidney cortex) is used to resolve which route is active per tissue.
    url: https://gtexportal.org/
module:
  id: gluconeogenesis_human
  label: Human gluconeogenesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: gluconeogenesis
      term:
        id: GO:0006094
        label: gluconeogenesis
      description: Formation of free glucose from non-carbohydrate precursors.
  parts:
    - order: 1
      role: carboxylation entry (pyruvate to oxaloacetate)
      node:
        id: pyruvate_carboxylase_step
        label: Pyruvate to oxaloacetate
        module_type: REACTION
        annotons:
          - id: PC_activity
            label: "PC: pyruvate carboxylase (mitochondrial)"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PC (pyruvate carboxylase)
                term:
                  id: UniProtKB:P11498
                  label: Pyruvate carboxylase, mitochondrial
            function:
              preferred_term: pyruvate carboxylase activity
              term:
                id: GO:0004736
                label: pyruvate carboxylase activity
              substrates:
                - preferred_term: pyruvate
                - preferred_term: bicarbonate
              products:
                - preferred_term: oxaloacetate
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Anaplerotic carboxylation of pyruvate; the entry point for
              lactate- and alanine-derived carbon into gluconeogenesis.
    - order: 2
      role: phosphoenolpyruvate-forming step (compartment variants)
      node:
        id: pepck_step
        label: Oxaloacetate to phosphoenolpyruvate
        module_type: REACTION
        description: >-
          PEPCK exists as cytosolic (PCK1) and mitochondrial (PCK2) isozymes; many
          gluconeogenic tissues express both, and the cytosolic/mitochondrial flux
          split varies by tissue and metabolic state.
        variant_sets:
          - id: pepck_compartment
            label: PEPCK compartment isozymes
            axis: subcellular compartment
            selection: ONE_OR_MORE
            variants:
              - id: pepck_cytosolic_variant
                label: Cytosolic PEPCK (PCK1)
                module_type: REACTION
                annotons:
                  - id: PCK1_activity
                    label: "PCK1: cytosolic PEPCK"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: PCK1 (cytosolic PEPCK)
                        term:
                          id: UniProtKB:P35558
                          label: Phosphoenolpyruvate carboxykinase, cytosolic [GTP]
                    function:
                      preferred_term: phosphoenolpyruvate carboxykinase (GTP) activity
                      term:
                        id: GO:0004613
                        label: phosphoenolpyruvate carboxykinase (GTP) activity
                      substrates:
                        - preferred_term: oxaloacetate
                        - preferred_term: GTP
                      products:
                        - preferred_term: phosphoenolpyruvate
                        - preferred_term: GDP
                        - preferred_term: carbon dioxide
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
              - id: pepck_mitochondrial_variant
                label: Mitochondrial PEPCK (PCK2)
                module_type: REACTION
                annotons:
                  - id: PCK2_activity
                    label: "PCK2: mitochondrial PEPCK"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: PCK2 (mitochondrial PEPCK)
                        term:
                          id: UniProtKB:Q16822
                          label: Phosphoenolpyruvate carboxykinase [GTP], mitochondrial
                    function:
                      preferred_term: phosphoenolpyruvate carboxykinase (GTP) activity
                      term:
                        id: GO:0004613
                        label: phosphoenolpyruvate carboxykinase (GTP) activity
                      substrates:
                        - preferred_term: oxaloacetate
                        - preferred_term: GTP
                      products:
                        - preferred_term: phosphoenolpyruvate
                        - preferred_term: GDP
                        - preferred_term: carbon dioxide
                    locations:
                      - preferred_term: mitochondrial matrix
                        term:
                          id: GO:0005759
                          label: mitochondrial matrix
    - order: 3
      role: reversible glycolytic trunk (housekeeping, near-equilibrium)
      node:
        id: reversible_glycolytic_trunk
        label: Reversible glycolytic trunk
        module_type: METABOLIC_PATHWAY
        description: >-
          The near-equilibrium reactions (enolase, phosphoglycerate mutase, PGK,
          GAPDH, aldolase, triosephosphate isomerase, phosphoglucose isomerase)
          run in the gluconeogenic direction. These are broadly expressed
          housekeeping enzymes and are not tissue-restricted, so the trunk is
          treated as constitutively satisfiable and is not a gate; the
          tissue-restricting control points are the bypass reactions.
        concepts:
          - preferred_term: reversible glycolysis segment (gluconeogenic direction)
            description: Bag of near-equilibrium glycolytic reactions; housekeeping expression.
    - order: 4
      role: fructose-1,6-bisphosphate bypass (tissue isozymes)
      node:
        id: fbpase_step
        label: Fructose 1,6-bisphosphate to fructose 6-phosphate
        module_type: REACTION
        variant_sets:
          - id: fbpase_isozymes
            label: Fructose-1,6-bisphosphatase isozymes
            axis: tissue isozyme
            selection: ONE_OR_MORE
            variants:
              - id: fbp1_variant
                label: Gluconeogenic FBPase (FBP1, liver/kidney)
                module_type: REACTION
                annotons:
                  - id: FBP1_activity
                    label: "FBP1: gluconeogenic fructose-1,6-bisphosphatase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: FBP1 (liver fructose-1,6-bisphosphatase)
                        term:
                          id: UniProtKB:P09467
                          label: Fructose-1,6-bisphosphatase 1
                    function:
                      preferred_term: fructose 1,6-bisphosphate 1-phosphatase activity
                      term:
                        id: GO:0042132
                        label: fructose 1,6-bisphosphate 1-phosphatase activity
                      substrates:
                        - preferred_term: fructose 1,6-bisphosphate
                      products:
                        - preferred_term: fructose 6-phosphate
                    locations:
                      - preferred_term: cytosol
                        term:
                          id: GO:0005829
                          label: cytosol
                    role_description: The gluconeogenic isozyme; carries gluconeogenic flux in liver and kidney.
              - id: fbp2_variant
                label: Muscle FBPase (FBP2)
                module_type: REACTION
                annotons:
                  - id: FBP2_activity
                    label: "FBP2: muscle fructose-1,6-bisphosphatase"
                    participant:
                      selector_type: GENE
                      gene:
                        preferred_term: FBP2 (muscle fructose-1,6-bisphosphatase)
                        term:
                          id: UniProtKB:O00757
                          label: Fructose-1,6-bisphosphatase isozyme 2
                    function:
                      preferred_term: fructose 1,6-bisphosphate 1-phosphatase activity
                      term:
                        id: GO:0042132
                        label: fructose 1,6-bisphosphate 1-phosphatase activity
                      substrates:
                        - preferred_term: fructose 1,6-bisphosphate
                      products:
                        - preferred_term: fructose 6-phosphate
                    role_description: >-
                      Muscle isozyme; provides the phosphatase activity but its
                      physiological role is linked to regulation of glycolysis/glycogen
                      rather than free-glucose-releasing gluconeogenesis.
    - order: 5
      role: terminal glucose release (ER glucose-6-phosphatase system) — physiological gate
      node:
        id: glucose_release_step
        label: Glucose 6-phosphate to glucose (ER glucose-6-phosphatase system)
        module_type: TRANSPORT_STEP
        description: >-
          Free-glucose output requires a two-component endoplasmic-reticulum
          system: glucose 6-phosphate must be imported into the ER lumen by the
          SLC37A4 antiporter AND hydrolysed by a catalytic subunit whose active
          site faces the ER lumen. Both components are required (logical AND),
          making this the gate that distinguishes gluconeogenic tissues. The
          gluconeogenic catalytic subunit is G6PC1; G6PC2 (islet) and G6PC3
          (ubiquitous, "G6Pase-beta") are paralogs that do not confer
          gluconeogenic free-glucose release and are recorded as a paralog trap,
          not as satisfying variants of the gluconeogenic route.
        parts:
          - order: 1
            role: catalytic subunit (gluconeogenic)
            node:
              id: g6pc_catalytic_node
              label: Glucose-6-phosphatase catalytic subunit
              module_type: REACTION
              annotons:
                - id: G6PC1_activity
                  label: "G6PC1: gluconeogenic glucose-6-phosphatase catalytic subunit"
                  participant:
                    selector_type: GENE
                    gene:
                      preferred_term: G6PC1 (glucose-6-phosphatase catalytic subunit 1)
                      term:
                        id: UniProtKB:P35575
                        label: Glucose-6-phosphatase catalytic subunit 1
                  function:
                    preferred_term: glucose-6-phosphatase activity
                    term:
                      id: GO:0004346
                      label: glucose-6-phosphatase activity
                    substrates:
                      - preferred_term: D-glucose 6-phosphate
                    products:
                      - preferred_term: D-glucose
                      - preferred_term: phosphate
                  locations:
                    - preferred_term: endoplasmic reticulum membrane
                      term:
                        id: GO:0005789
                        label: endoplasmic reticulum membrane
                  role_description: >-
                    Gluconeogenic catalytic subunit; expressed in liver, kidney
                    cortex, and intestine. Required for free-glucose release.
              notes: >-
                Paralog trap: G6PC2 (UniProtKB:Q9NQR9, pancreatic-islet, largely
                catalytically inactive autoantigen) and G6PC3 (UniProtKB:Q9BUM1,
                ubiquitous G6Pase-beta with a neutrophil role) are paralogs of
                G6PC1. Their expression must NOT be read as gluconeogenic
                free-glucose-release capacity; only G6PC1 satisfies the
                gluconeogenic route.
          - order: 2
            role: glucose-6-phosphate ER transporter (required)
            node:
              id: g6p_transport_node
              label: Glucose-6-phosphate ER antiporter
              module_type: TRANSPORT_STEP
              annotons:
                - id: SLC37A4_activity
                  label: "SLC37A4: glucose-6-phosphate ER antiporter"
                  participant:
                    selector_type: GENE
                    gene:
                      preferred_term: SLC37A4 (glucose-6-phosphate transporter / G6PT)
                      term:
                        id: UniProtKB:O43826
                        label: Glucose-6-phosphate exchanger SLC37A4
                  function:
                    preferred_term: glucose-6-phosphate transmembrane transporter activity
                    term:
                      id: GO:0015152
                      label: glucose-6-phosphate transmembrane transporter activity
                    substrates:
                      - preferred_term: D-glucose 6-phosphate (cytosolic)
                    products:
                      - preferred_term: D-glucose 6-phosphate (ER lumen)
                  locations:
                    - preferred_term: endoplasmic reticulum membrane
                      term:
                        id: GO:0005789
                        label: endoplasmic reticulum membrane
                  role_description: >-
                    Imports cytosolic glucose 6-phosphate into the ER lumen for
                    hydrolysis; obligately required alongside the catalytic subunit.
  connections:
    - source: pyruvate_carboxylase_step
      target: pepck_step
      connection_type: PROVIDES_INPUT_FOR
      description: Oxaloacetate from pyruvate carboxylase feeds PEPCK.
    - source: pepck_step
      target: reversible_glycolytic_trunk
      connection_type: PRECEDES
    - source: reversible_glycolytic_trunk
      target: fbpase_step
      connection_type: PRECEDES
    - source: fbpase_step
      target: glucose_release_step
      connection_type: PRECEDES
  notes: >-
    Tissue-/compartment-resolved human specialisation of the generic
    gluconeogenesis template (modules/gluconeogenesis.yaml). Human isozyme
    accessions were verified against UniProt; GO molecular-function, location, and
    transporter terms were verified via QuickGO. The module is built for
    expression-grounded satisfiability: see modules/experimental/gluconeogenesis-context/
    for the logic compiler and the GTEx oracle that resolve the active route per
    tissue and identify the terminal G6PC1+SLC37A4 step as the gluconeogenic gate.
