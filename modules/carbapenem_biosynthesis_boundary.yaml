id: MODULE:carbapenem_biosynthesis_boundary
title: Carbapenem biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00332 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only ProB and ProA, which are ordinary
  proline-biosynthesis enzymes that generate glutamate-derived
  pyrroline-5-carboxylate chemistry. This should not be interpreted as evidence
  for a complete carbapenem antibiotic biosynthesis pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00332
    title: Carbapenem biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00332 contains only proB and proA for PSEPK, so this batch is
      treated as shared precursor chemistry and pathway absence/boundary
      context.
module:
  id: carbapenem_biosynthesis_boundary
  label: Carbapenem biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: carbapenem biosynthesis boundary
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has the
        shared proline-precursor enzymes ProB and ProA but not a curated
        carbapenem biosynthesis module.
  parts:
    - order: 1
      role: Shared proline precursor chemistry
      node:
        id: proline_precursor_shared_context
        label: ProB/ProA shared precursor context
        module_type: METABOLIC_PATHWAY
        description: >-
          ProB and ProA are reviewed as proline-biosynthesis enzymes in the
          ppu00330 arginine/proline batch. Their presence in ppu00332 is treated
          as shared precursor chemistry rather than carbapenem-pathway
          satisfiability.
        annotons:
          - id: proB_glutamate_5_kinase_context
            label: "proB: glutamate 5-kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proB
            function:
              preferred_term: glutamate 5-kinase activity
              term:
                id: GO:0004349
                label: glutamate 5-kinase activity
            role_description: Proline-biosynthesis precursor enzyme; boundary-only for carbapenem biosynthesis.
          - id: proA_gamma_glutamyl_phosphate_reductase_context
            label: "proA: gamma-glutamyl phosphate reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: proA
            function:
              preferred_term: glutamate-5-semialdehyde dehydrogenase activity
              term:
                id: GO:0004350
                label: glutamate-5-semialdehyde dehydrogenase activity
            role_description: Proline-biosynthesis precursor enzyme; boundary-only for carbapenem biosynthesis.
