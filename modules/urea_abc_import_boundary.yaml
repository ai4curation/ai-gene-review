notes: >-
  This boundary module was created from the ppu02010 ABC-transporter partition
  work. It should remain distinct from the NikABCDE nickel importer and from
  generic branched-chain amino-acid ABC import modules until experiments show a
  broader substrate range for the KT2440 UrtABCDE locus.
