id: MODULE:urea_abc_import_boundary
title: Urea ABC import boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 PP_4841-PP_4845 UrtABCDE
  urea ABC importer pulled from the KEGG ppu02010 ABC-transporter umbrella map.
  UrtA is the signal-peptide-bearing periplasmic substrate-binding component,
  UrtB and UrtC are the inner-membrane permeases, and UrtD and UrtE are the
  ATP-binding energy-coupling subunits. The module records urea import as the
  core first-pass function and treats amino-acid or branched-chain amino-acid
  annotations on the locus as likely family-transfer spillover.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_4841-PP_4845 urtA/urtB/urtC/urtD/urtE
      locus as a coherent UrtABCDE urea ABC transporter sub-batch within the
      broad ABC-transporter umbrella map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records cluster C61 as urtA, urtB, urtC,
      urtD, and urtE after first-pass curation.
  - source_id: UniProtKB:Q88DI4
    title: UrtA urea ABC transporter periplasmic protein
    statement: >-
      UniProt names UrtA as a urea ABC transporter periplasmic protein, records
      an N-terminal signal peptide, and carries the UrtA urea-binding InterPro
      domain IPR017777.
  - source_id: UniProtKB:Q88DI3
    title: UrtB urea ABC transporter permease
    statement: >-
      UniProt names UrtB as a urea ABC transporter, places it in the cell inner
      membrane as a multi-pass membrane protein, and carries the UrtB bacterial
      transporter InterPro domain IPR017779.
  - source_id: UniProtKB:Q88DI2
    title: UrtC urea ABC transporter permease
    statement: >-
      UniProt names UrtC as a urea ABC transporter permease protein, places it
      in the cell inner membrane as a multi-pass membrane protein, and carries
      the UrtC urea-transporter permease InterPro domain IPR017778.
  - source_id: UniProtKB:Q88DI1
    title: UrtD urea ABC transporter ATP-binding protein
    statement: >-
      UniProt names UrtD as a urea ABC transporter ATP-binding protein and
      carries the UrtD urea-transporter ATP-binding InterPro domain IPR017781.
  - source_id: UniProtKB:Q88DI0
    title: UrtE urea ABC transporter ATP-binding protein
    statement: >-
      UniProt names UrtE as a urea ABC transporter ATP-binding protein and
      carries the UrtE urea-transporter ATP-binding InterPro domain IPR017780.
