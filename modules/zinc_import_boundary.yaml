id: MODULE:zinc_import_boundary
title: Zinc import boundary
description: Boundary module for Znu-like high-affinity zinc/cation ABC importers from the
  KEGG ppu02010 ABC transporter umbrella map in Pseudomonas putida KT2440. The module includes
  the curated PP_0117-PP_0120 ZnuABC importer and the newly curated PP_3801-PP_3803 Znu-like
  cation importer candidate. It keeps zinc/cation import separate from adjacent methionine,
  phosphonate, and other ABC-transporter neighborhoods.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes the PP_0117-PP_0120 ZnuABC zinc ABC transporter sub-batch.
    This is a coherent transport partition of the broad ABC transporter map, not evidence
    that ppu02010 is one satisfiable pathway.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records the C02 PP_0117-PP_0120 zinc-import half
    of the mixed methionine/zinc neighborhood after first-pass curation.
- source_id: UniProtKB:Q88RL2
  title: ZnuB high-affinity zinc uptake system membrane protein
  statement: UniProt names ZnuB as a high-affinity zinc uptake system membrane protein and
    describes it as involved in zinc uptake.
- source_id: UniProtKB:Q88RL1
  title: ZnuC zinc import ATP-binding protein
  statement: Reviewed UniProt/HAMAP annotation describes ZnuC as part of the ZnuABC ABC transporter
    complex involved in zinc import and records an ATP-driven Zn(2+) import reaction.
- source_id: UniProtKB:Q88RK9
  title: ZnuA high-affinity zinc uptake system protein
  statement: UniProt describes PP_0120/ZnuA as part of the ZnuABC transport system, binding
    zinc with high affinity and delivering it to the permease for import.
- source_id: UniProtKB:Q88GC3
  title: PP_3801 ZnuA-like high-affinity zinc uptake system protein
  statement: UniProt names PP_3801 as a high-affinity zinc uptake system protein ZnuA, records
    ZnuA-like/PsaA-like domains, and flags zinc transport.
- source_id: UniProtKB:Q88GC2
  title: PP_3802 cation ABC transporter ATP-binding protein
  statement: UniProt names PP_3802 as a cation ABC transporter ATP-binding protein with ABC-transporter
    and metal-ion-import ATPase domains.
- source_id: UniProtKB:Q88GC1
  title: PP_3803 cation ABC transporter permease protein
  statement: UniProt names PP_3803 as a cation ABC transporter permease, places it in the
    cell membrane, and records ABC-3/TroCD permease features.
