notes: This boundary module was created from the mixed C02 PP_0112-PP_0120 ppu02010 neighborhood
  and extended with the C50 PP_3801-PP_3803 Znu-like locus. PP_0120 is kept under its current
  review folder name rather than renamed znuA until local gene-symbol reconciliation is handled
  separately. The PP_3801-PP_3803 locus is retained as a substrate-specific zinc/cation candidate
  pending direct uptake evidence.
