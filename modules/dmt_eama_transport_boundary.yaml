id: MODULE:dmt_eama_transport_boundary
title: DMT/EamA small drug and metabolite transport boundary
description: Boundary module for the PSEPK transport/membrane/efflux split containing DMT, EamA, RarD, YedA/RhtA, and SMR/SugE/EmrE-like
  small drug or metabolite transporter candidates. The module keeps substrate, direction, and coupling assignments conservative
  unless product or family evidence is specific.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_dmt_eama_small_drug_metabolite_transporters.tsv
  title: PSEPK transport/membrane/efflux DMT/EamA transporter batch
  statement: The partition groups 21 DMT/EamA/RarD/SMR-family transporter candidates for first-pass curation.
notes: 'First-pass interpretation: SMR/SugE/EmrE-family proteins are retained as efflux candidates. Most EamA/RarD-family
  paralogs remain broad transporter candidates because product and family evidence does not resolve the transported substrate,
  direction, or coupling ion.'
module:
  id: dmt_eama_transport_boundary
  label: DMT/EamA small drug and metabolite transport boundary
  module_type: TRANSPORT_STEP
  concepts:
  - preferred_term: transmembrane transporter activity
    term:
      id: GO:0022857
      label: transmembrane transporter activity
    description: Broad transporter activity for DMT/EamA-family candidates.
  - preferred_term: transmembrane transport
    term:
      id: GO:0055085
      label: transmembrane transport
    description: Broad transport process for unresolved DMT/EamA-family candidates.
  - preferred_term: xenobiotic transmembrane transporter activity
    term:
      id: GO:0042910
      label: xenobiotic transmembrane transporter activity
    description: Xenobiotic/drug transporter activity for SMR/SugE/EmrE-family efflux candidates.
  - preferred_term: xenobiotic detoxification by transmembrane export across the plasma membrane
    term:
      id: GO:1990961
      label: xenobiotic detoxification by transmembrane export across the plasma membrane
    description: Xenobiotic detoxification/export process context for SMR-family efflux candidates.
  - preferred_term: antiporter activity
    term:
      id: GO:0015297
      label: antiporter activity
    description: Antiporter activity retained as non-core mechanism context for SMR-family proteins where present in GOA.
  context:
    cellular_components:
    - preferred_term: plasma membrane
      term:
        id: GO:0005886
        label: plasma membrane
      description: Bacterial plasma/inner membrane location for resolved inner-membrane transporters.
    - preferred_term: membrane
      term:
        id: GO:0016020
        label: membrane
      description: Broad membrane context for low-resolution transporter candidates.
