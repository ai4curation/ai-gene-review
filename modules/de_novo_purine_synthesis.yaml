id: MODULE:de_novo_purine_synthesis
title: De novo purine synthesis (PRPP -> IMP); ADSL deficiency, AICA-ribosiduria
description: >-
  De novo purine biosynthesis is the cytosolic ten-step pathway that builds the first
  complete purine nucleotide, inosine monophosphate (IMP), from 5-phospho-alpha-D-ribose
  1-diphosphate (PRPP), using glycine, glutamine, aspartate, CO2, two one-carbon units
  from 10-formyltetrahydrofolate, and ATP. Amidophosphoribosyltransferase (PPAT)
  catalyses the committed, feedback-regulated first step (PRPP + glutamine ->
  5-phosphoribosylamine); the trifunctional protein GART then carries out steps 2, 3 and
  5 (GAR synthetase, GAR transformylase, AIR synthetase), with phosphoribosylformyl-
  glycinamidine synthase (PFAS) performing the intervening step 4; the bifunctional PAICS
  performs steps 6 and 7 (AIR carboxylase, SAICAR synthetase); adenylosuccinate lyase
  (ADSL) performs step 8 (SAICAR -> AICAR + fumarate); and the bifunctional ATIC completes
  the pathway with steps 9 and 10 (AICAR transformylase, IMP cyclohydrolase) to yield IMP.
  IMP is then the branch point to AMP (ADSS/ADSL) and GMP (IMPDH/GMPS). The enzymes
  reversibly assemble into a multienzyme "purinosome" under high purine demand. Two of the
  steps are folate-dependent, making GART and ATIC targets of antifolate/antiproliferative
  drugs. Inherited defects: adenylosuccinate lyase (ADSL) deficiency causes a
  neurodevelopmental disorder with SAICA-riboside/succinyladenosine accumulation; ATIC
  deficiency causes AICA-ribosiduria (profound intellectual disability, epilepsy,
  dysmorphism); and a PAICS-deficiency multiple-malformation syndrome has been reported.
status: DRAFT
evidence:
  - source_id: GO:0006189
    title: "'de novo' IMP biosynthetic process"
    statement: >-
      The module is grounded in the GO 'de novo' IMP biosynthetic process (GO:0006189):
      the ten-step assembly of IMP from PRPP.
  - source_id: Reactome:R-HSA-73817
    title: Purine ribonucleoside monophosphate biosynthesis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome de novo purine
      biosynthesis reactions R-HSA-73815 (PPAT), R-HSA-73814/73813/73810 (GART),
      R-HSA-73812 (PFAS), R-HSA-73806/73805 (PAICS), R-HSA-73800 (ADSL) and
      R-HSA-73798/73797 (ATIC).
  - source_id: file:human/PPAT/PPAT-ai-review.yaml
    title: PPAT gene review (human)
    statement: >-
      The committed first step (UniProtKB:Q06203, GO:0004044) matches the completed
      human PPAT review.
  - source_id: file:human/GART/GART-ai-review.yaml
    title: GART gene review (human)
    statement: >-
      The trifunctional steps 2/3/5 (UniProtKB:P22102, GO:0004637/GO:0004644/GO:0004641)
      match the completed human GART review.
  - source_id: file:human/PFAS/PFAS-ai-review.yaml
    title: PFAS gene review (human)
    statement: >-
      The FGAM-synthase step 4 (UniProtKB:O15067, GO:0004642) matches the completed
      human PFAS review.
  - source_id: file:human/PAICS/PAICS-ai-review.yaml
    title: PAICS gene review (human)
    statement: >-
      The bifunctional steps 6/7 (UniProtKB:P22234, GO:0004638/GO:0004639) match the
      completed human PAICS review.
  - source_id: file:human/ADSL/ADSL-ai-review.yaml
    title: ADSL gene review (human)
    statement: >-
      The SAICAR-lyase step 8 (UniProtKB:P30566, GO:0070626) matches the completed
      human ADSL review.
  - source_id: file:human/ATIC/ATIC-ai-review.yaml
    title: ATIC gene review (human)
    statement: >-
      The bifunctional final steps 9/10 (UniProtKB:P31939, GO:0004643/GO:0003937) match
      the completed human ATIC review.
module:
  id: de_novo_purine_synthesis
  label: De novo purine synthesis (PRPP -> IMP)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: "'de novo' IMP biosynthetic process"
      term:
        id: GO:0006189
        label: "'de novo' IMP biosynthetic process"
      description: >-
        Cytosolic ten-step assembly of inosine monophosphate (IMP) from PRPP.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          The de novo purine enzymes are cytosolic, reversibly assembling into the
          purinosome under high purine demand.
  parts:
    - order: 1
      role: committed, rate-limiting first step
      node:
        id: ppat_step
        label: PRPP + L-glutamine to 5-phospho-beta-D-ribosylamine + L-glutamate + PPi
        module_type: REACTION
        annotons:
          - id: ppat_activity
            label: "PPAT: amidophosphoribosyltransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Amidophosphoribosyltransferase family (PPAT)
                term:
                  id: PANTHER:PTHR11907
                  label: AMIDOPHOSPHORIBOSYLTRANSFERASE
                representative_members:
                  - preferred_term: PPAT (human)
                    term:
                      id: UniProtKB:Q06203
                      label: Amidophosphoribosyltransferase
            function:
              preferred_term: amidophosphoribosyltransferase activity
              term:
                id: GO:0004044
                label: amidophosphoribosyltransferase activity
              substrates:
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
                - preferred_term: L-glutamine
              products:
                - preferred_term: 5-phospho-beta-D-ribosylamine (PRA)
                - preferred_term: L-glutamate
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.4.2.14
                  statement: glutamine PRPP amidotransferase; committed rate-limiting step; purine-nucleotide feedback; [4Fe-4S]
                - source_id: Reactome:R-HSA-73815
                  statement: "5-phospho-alpha-D-ribose 1-diphosphate (PRPP) + H2O + L-glutamine <=> ... (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Committed, rate-limiting entry step; feedback-inhibited by AMP/GMP/IMP. Its
              product 5-phosphoribosylamine begins purine-ring assembly on the ribose-5-phosphate
              scaffold.
    - order: 2
      role: trifunctional steps 2, 3 and 5 (GAR synthetase / transformylase / AIR synthetase)
      node:
        id: gart_step
        label: PRA -> GAR -> FGAR (steps 2-3) and FGAM -> AIR (step 5)
        module_type: REACTION
        annotons:
          - id: gart_activity
            label: "GART: trifunctional GARS / GAR transformylase / AIRS"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Trifunctional purine biosynthetic protein GART family
                term:
                  id: PANTHER:PTHR10520
                  label: TRIFUNCTIONAL PURINE BIOSYNTHETIC PROTEIN ADENOSINE-3
                representative_members:
                  - preferred_term: GART (human)
                    term:
                      id: UniProtKB:P22102
                      label: Trifunctional purine biosynthetic protein adenosine-3
            function:
              preferred_term: phosphoribosylamine-glycine ligase activity
              term:
                id: GO:0004637
                label: phosphoribosylamine-glycine ligase activity
              substrates:
                - preferred_term: 5-phospho-beta-D-ribosylamine (PRA)
                - preferred_term: glycine
                - preferred_term: ATP
              products:
                - preferred_term: 5'-phosphoribosylglycinamide (GAR)
                - preferred_term: further processed to FGAR and AIR
              evidence:
                - source_id: EC:6.3.4.13
                  statement: GAR synthetase (step 2); also GAR transformylase EC 2.1.2.2 (GO:0004644, step 3) and AIR synthetase EC 6.3.3.1 (GO:0004641, step 5)
                - source_id: Reactome:R-HSA-73814
                  statement: "5-Phosphoribosylamine + Glycine + ATP => GAR + ADP + Pi (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Trifunctional enzyme catalysing steps 2 (GAR synthetase), 3 (GAR
              transformylase, folate-dependent) and 5 (AIR synthetase); step 5 acts after
              the PFAS step 4, so GART re-enters the pathway. The GAR-transformylase domain
              is an antifolate (lometrexol/pemetrexed) target.
    - order: 3
      role: step 4 (FGAM synthase)
      node:
        id: pfas_step
        label: FGAR + L-glutamine + ATP to FGAM + L-glutamate + ADP + Pi
        module_type: REACTION
        annotons:
          - id: pfas_activity
            label: "PFAS: phosphoribosylformylglycinamidine synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Phosphoribosylformylglycinamidine synthase family (PFAS)
                term:
                  id: PANTHER:PTHR10099
                  label: PHOSPHORIBOSYLFORMYLGLYCINAMIDINE SYNTHASE
                representative_members:
                  - preferred_term: PFAS (human)
                    term:
                      id: UniProtKB:O15067
                      label: Phosphoribosylformylglycinamidine synthase
            function:
              preferred_term: phosphoribosylformylglycinamidine synthase activity
              term:
                id: GO:0004642
                label: phosphoribosylformylglycinamidine synthase activity
              substrates:
                - preferred_term: FGAR (formylglycinamide ribonucleotide)
                - preferred_term: L-glutamine
                - preferred_term: ATP
              products:
                - preferred_term: FGAM (formylglycinamidine ribonucleotide)
                - preferred_term: L-glutamate
              evidence:
                - source_id: EC:6.3.5.3
                  statement: FGAM synthase (step 4); glutamine amidotransferase
                - source_id: Reactome:R-HSA-73812
                  statement: "FGAR + L-Glutamine + ATP + H2O => FGAM + L-Glutamate + ADP + Pi (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Step 4: ATP/glutamine-dependent amidotransfer converting FGAR to FGAM; its
              product FGAM is then cyclised to AIR by the GART AIR-synthetase (step 5).
    - order: 4
      role: bifunctional steps 6 and 7 (AIR carboxylase / SAICAR synthetase)
      node:
        id: paics_step
        label: AIR -> CAIR (step 6) and CAIR + aspartate -> SAICAR (step 7)
        module_type: REACTION
        annotons:
          - id: paics_activity
            label: "PAICS: bifunctional AIR carboxylase / SAICAR synthetase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Multifunctional PAICS purine-biosynthesis family
                term:
                  id: PANTHER:PTHR43599
                  label: MULTIFUNCTIONAL PROTEIN ADE2
                representative_members:
                  - preferred_term: PAICS (human)
                    term:
                      id: UniProtKB:P22234
                      label: Multifunctional protein ADE2
            function:
              preferred_term: phosphoribosylaminoimidazole carboxylase activity
              term:
                id: GO:0004638
                label: phosphoribosylaminoimidazole carboxylase activity
              substrates:
                - preferred_term: AIR (5-aminoimidazole ribonucleotide)
                - preferred_term: CO2 / bicarbonate
                - preferred_term: L-aspartate + ATP (SAICAR-synthetase step)
              products:
                - preferred_term: CAIR (4-carboxy-AIR)
                - preferred_term: SAICAR
              evidence:
                - source_id: EC:4.1.1.21
                  statement: AIR carboxylase (step 6); also SAICAR synthetase EC 6.3.2.6 (GO:0004639, step 7)
                - source_id: Reactome:R-HSA-73806
                  statement: "AIR + CO2 => CAIR (human Reactome reaction)"
                - source_id: Reactome:R-HSA-73805
                  statement: "CAIR + Aspartate + ATP => SAICAR + ADP + Pi (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Bifunctional octamer catalysing carboxylation of AIR to CAIR (step 6) and
              ATP-dependent condensation of CAIR with aspartate to SAICAR (step 7).
    - order: 5
      role: step 8 (SAICAR lyase)
      node:
        id: adsl_step
        label: SAICAR to AICAR + fumarate
        module_type: REACTION
        annotons:
          - id: adsl_activity
            label: "ADSL: adenylosuccinate lyase (SAICAR-lyase activity)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenylosuccinate lyase family (ADSL)
                term:
                  id: PANTHER:PTHR43172
                  label: ADENYLOSUCCINATE LYASE
                representative_members:
                  - preferred_term: ADSL (human)
                    term:
                      id: UniProtKB:P30566
                      label: Adenylosuccinate lyase
            function:
              preferred_term: (S)-2-(5-amino-1-(5-phospho-D-ribosyl)imidazole-4-carboxamido) succinate lyase (fumarate-forming) activity
              term:
                id: GO:0070626
                label: (S)-2-(5-amino-1-(5-phospho-D-ribosyl)imidazole-4-carboxamido) succinate lyase (fumarate-forming) activity
              substrates:
                - preferred_term: SAICAR
              products:
                - preferred_term: AICAR
                - preferred_term: fumarate
              evidence:
                - source_id: EC:4.3.2.2
                  statement: adenylosuccinate lyase; SAICAR-lyase activity (step 8); also cleaves adenylosuccinate to AMP (IMP->AMP branch, GO:0004018)
                - source_id: Reactome:R-HSA-73800
                  statement: "SAICAR => AICAR + Fumarate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Homotetrameric dual-activity lyase; here the SAICAR-lyase activity (step 8).
              The same enzyme also cleaves adenylosuccinate to AMP in the IMP->AMP branch.
              Deficiency = adenylosuccinate lyase deficiency (neurodevelopmental).
    - order: 6
      role: bifunctional final steps 9 and 10 (AICAR transformylase / IMP cyclohydrolase)
      node:
        id: atic_step
        label: AICAR -> FAICAR (step 9) and FAICAR -> IMP (step 10)
        module_type: REACTION
        annotons:
          - id: atic_activity
            label: "ATIC: bifunctional AICAR transformylase / IMP cyclohydrolase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Bifunctional AICAR transformylase / IMP cyclohydrolase family (ATIC)
                term:
                  id: PANTHER:PTHR11692
                  label: 5-AMINOIMIDAZOLE-4-CARBOXAMIDE RIBONUCLEOTIDE TRANSFORMYLASE/IMP CYCLOHYDROLASE
                representative_members:
                  - preferred_term: ATIC (human)
                    term:
                      id: UniProtKB:P31939
                      label: Bifunctional purine biosynthesis protein ATIC
            function:
              preferred_term: phosphoribosylaminoimidazolecarboxamide formyltransferase activity
              term:
                id: GO:0004643
                label: phosphoribosylaminoimidazolecarboxamide formyltransferase activity
              substrates:
                - preferred_term: AICAR
                - preferred_term: 10-formyltetrahydrofolate
              products:
                - preferred_term: FAICAR (then cyclised to IMP)
                - preferred_term: inosine monophosphate (IMP)
              evidence:
                - source_id: EC:2.1.2.3
                  statement: AICAR transformylase (step 9, folate-dependent); also IMP cyclohydrolase EC 3.5.4.10 (GO:0003937, step 10)
                - source_id: Reactome:R-HSA-73798
                  statement: "AICAR + 10-Formyl-THF => FAICAR + THF (human Reactome reaction)"
                - source_id: Reactome:R-HSA-73797
                  statement: "FAICAR => IMP + H2O (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Bifunctional homodimer completing the pathway: AICAR transformylase (step 9,
              folate-dependent, antifolate/methotrexate target) then IMP cyclohydrolase
              (step 10) yielding IMP. Deficiency = AICA-ribosiduria.
  connections:
    - source: ppat_step
      target: gart_step
      connection_type: PROVIDES_INPUT_FOR
      description: 5-phosphoribosylamine from PPAT is the GART GAR-synthetase substrate.
    - source: gart_step
      target: pfas_step
      connection_type: PROVIDES_INPUT_FOR
      description: FGAR from the GART transformylase (step 3) is the PFAS substrate.
    - source: pfas_step
      target: gart_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        FGAM from PFAS (step 4) re-enters GART for the AIR-synthetase step 5 (the
        trifunctional GART acts both before and after PFAS).
    - source: gart_step
      target: paics_step
      connection_type: PROVIDES_INPUT_FOR
      description: AIR from the GART AIR-synthetase (step 5) is the PAICS carboxylase substrate.
    - source: paics_step
      target: adsl_step
      connection_type: PROVIDES_INPUT_FOR
      description: SAICAR from PAICS (step 7) is cleaved by ADSL (step 8).
    - source: adsl_step
      target: atic_step
      connection_type: PROVIDES_INPUT_FOR
      description: AICAR from ADSL (step 8) is processed to IMP by ATIC (steps 9-10).
  notes: >-
    Ten-step de novo purine (IMP) synthesis grounded to the human enzymes PPAT
    (UniProtKB:Q06203, GO:0004044, EC 2.4.2.14), the trifunctional GART (P22102;
    GO:0004637/GO:0004644/GO:0004641; EC 6.3.4.13 / 2.1.2.2 / 6.3.3.1), PFAS (O15067,
    GO:0004642, EC 6.3.5.3), the bifunctional PAICS (P22234; GO:0004638/GO:0004639; EC
    4.1.1.21 / 6.3.2.6), ADSL (P30566, GO:0070626, EC 4.3.2.2) and the bifunctional ATIC
    (P31939; GO:0004643/GO:0003937; EC 2.1.2.3 / 3.5.4.10). GO molecular-function terms
    were taken from the human GOA records; Reactome reaction ids and titles were verified
    against the local reactome cache. Each node uses a PANTHER family selector (generic
    over orthologs) with the human enzyme as representative; only the first activity of
    each multifunctional enzyme is placed in the annoton `function` slot, with the
    additional activities/EC numbers given in the evidence and role_description. The
    pathway is not strictly linear at the gene level: the trifunctional GART catalyses
    steps 2, 3 AND 5, re-entering after the PFAS step 4 (captured by the PFAS->GART
    connection). Upstream, PRPP comes from PRPS1 (pentose_phosphate_nonoxidative_branch
    module); downstream, IMP is the branch point to AMP (ADSS1/ADSL) and GMP (IMPDH1/2,
    GMPS) and the substrate handled with the purine salvage/catabolism module (HPRT1 makes
    IMP by salvage). Two folate-dependent steps (GART transformylase, ATIC transformylase)
    are antifolate/antiproliferative drug targets. Disorders: ADSL -> adenylosuccinate
    lyase deficiency; ATIC -> AICA-ribosiduria; PAICS -> a reported multiple-malformation
    syndrome; PPAT/GART/PFAS have no common Mendelian disease.
