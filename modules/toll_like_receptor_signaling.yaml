id: MODULE:toll_like_receptor_signaling
title: Toll-like receptor innate immune signaling pathway module
description: >-
  A compact Toll-like receptor (TLR) signaling module. Ligand-bound TLRs recruit
  TIR-domain adaptors such as MYD88, activate IRAK kinases and TRAF6 ubiquitin
  ligase scaffolds, and route the signal through TAK1/IKK and MAPK branches to
  NF-kappaB, AP-1, and inflammatory gene expression. The module is grounded in
  GO:0002224 and includes PTN anchors for TRAF6-family ubiquitin-ligase and
  innate-immune roles where local PAINT seed rows support them.
status: DRAFT
evidence:
  - source_id: GO:0002224
    title: toll-like receptor signaling pathway
    statement: The module is grounded in the GO biological process term for Toll-like receptor signaling.
