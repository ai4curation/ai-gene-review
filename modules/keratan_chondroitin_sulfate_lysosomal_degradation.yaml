id: MODULE:keratan_chondroitin_sulfate_lysosomal_degradation
title: Keratan and chondroitin sulfate lysosomal degradation (Morquio / GM2); GALNS/GLB1/HEXA/HEXB
description: >-
  Keratan sulfate and the galactose/N-acetylhexosamine termini of chondroitin, dermatan and
  keratan sulfate are degraded in the lysosome by an ordered exolytic cascade that complements
  the heparan-sulfate pathway. Keratan sulfate is a repeating -Gal-GlcNAc- polymer with 6-O-
  sulfates on both sugars: N-acetylgalactosamine-6-sulfatase / galactose-6-sulfatase (GALNS)
  removes the 6-O-sulfate from a terminal galactose-6-sulfate (and, in chondroitin-6-sulfate,
  from GalNAc-6-sulfate), and GlcNAc-6-sulfatase (GNS, in the heparan-sulfate module) removes it
  from GlcNAc-6-sulfate; lysosomal acid beta-galactosidase (GLB1) then hydrolyses the exposed
  terminal beta-galactose; and lysosomal beta-hexosaminidase — the alpha-beta heterodimer
  hexosaminidase A (HEXA+HEXB) and the beta-beta homodimer hexosaminidase B (HEXB) — removes the
  terminal beta-N-acetylhexosamine, regenerating a substrate for the next round. These enzymes
  are broadly specific: GLB1 also degrades the GM1 ganglioside, and hexosaminidase A (with the
  GM2-activator) degrades the GM2 ganglioside, so the same genes underlie both mucopolysaccharide
  and glycosphingolipid storage diseases. Disorders: MPS IVA (GALNS, Morquio A), GM1
  gangliosidosis / MPS IVB (GLB1, Morquio B), Tay-Sachs (HEXA) and Sandhoff (HEXB) GM2
  gangliosidoses.
status: DRAFT
evidence:
  - source_id: GO:0042340
    title: keratan sulfate proteoglycan catabolic process
    statement: >-
      The module is grounded in keratan sulfate proteoglycan catabolic process (GO:0042340); it
      covers the ordered lysosomal exolytic degradation of keratan (and chondroitin) sulfate termini.
  - source_id: GO:0030203
    title: glycosaminoglycan metabolic process
    statement: >-
      The enzymes also act on chondroitin/dermatan sulfate termini (glycosaminoglycan metabolic
      process, GO:0030203) and on gangliosides.
  - source_id: Reactome:R-HSA-2024096
    title: HS-GAG degradation
    statement: >-
      The keratan/chondroitin sulfate exolytic steps follow the human Reactome GAG-degradation
      reactions R-HSA-1630304 (GALNS), R-HSA-1630306 (GLB1) and R-HSA-1638053 (HEXA/HEXB).
  - source_id: file:human/GALNS/GALNS-ai-review.yaml
    title: GALNS gene review (human)
    statement: >-
      The galactose-6-sulfate / GalNAc-6-sulfate desulfation step (UniProtKB:P34059, GO:0043890)
      matches the completed human GALNS review.
  - source_id: file:human/GLB1/GLB1-ai-review.yaml
    title: GLB1 gene review (human)
    statement: >-
      The beta-galactosidase step (UniProtKB:P16278, GO:0004565) matches the completed human GLB1 review.
  - source_id: file:human/HEXA/HEXA-ai-review.yaml
    title: HEXA gene review (human)
    statement: >-
      The beta-hexosaminidase alpha-subunit step (UniProtKB:P06865, GO:0004563) matches the
      completed human HEXA review.
  - source_id: file:human/HEXB/HEXB-ai-review.yaml
    title: HEXB gene review (human)
    statement: >-
      The beta-hexosaminidase beta-subunit step (UniProtKB:P07686, GO:0004563) matches the
      completed human HEXB review.
module:
  id: keratan_chondroitin_sulfate_lysosomal_degradation
  label: Keratan / chondroitin sulfate lysosomal degradation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: keratan sulfate proteoglycan catabolic process
      term:
        id: GO:0042340
        label: keratan sulfate proteoglycan catabolic process
      description: Ordered lysosomal exolytic degradation of keratan sulfate termini.
    - preferred_term: glycosaminoglycan metabolic process
      term:
        id: GO:0030203
        label: glycosaminoglycan metabolic process
      description: Lysosomal degradation of chondroitin/dermatan/keratan sulfate termini (and gangliosides).
  context:
    cellular_components:
      - preferred_term: lysosomal lumen
        term:
          id: GO:0043202
          label: lysosomal lumen
        description: All four enzymes are soluble lysosomal-lumen hydrolases/sulfatases.
  parts:
    - order: 1
      role: galactose/GalNAc 6-desulfation
      node:
        id: galns_step
        label: removal of 6-O-sulfate from terminal galactose-6-sulfate / GalNAc-6-sulfate
        module_type: REACTION
        annotons:
          - id: galns_activity
            label: "GALNS: N-acetylgalactosamine-6-sulfatase / galactose-6-sulfatase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Sulfatase family (GALNS)
                term:
                  id: PANTHER:PTHR42693
                  label: N-ACETYLGALACTOSAMINE-6-SULFATASE
                representative_members:
                  - preferred_term: GALNS (human)
                    term:
                      id: UniProtKB:P34059
                      label: N-acetylgalactosamine-6-sulfatase
            function:
              preferred_term: N-acetylgalactosamine-6-sulfatase activity
              term:
                id: GO:0043890
                label: N-acetylgalactosamine-6-sulfatase activity
              substrates:
                - preferred_term: keratan sulfate (terminal galactose-6-sulfate)
                - preferred_term: chondroitin-6-sulfate (terminal GalNAc-6-sulfate)
              products:
                - preferred_term: keratan/chondroitin sulfate (terminal galactose / GalNAc)
                - preferred_term: sulfate
              evidence:
                - source_id: EC:3.1.6.4
                  statement: formylglycine-dependent lysosomal sulfatase; removes the 6-O-sulfate from Gal-6-sulfate (keratan) and GalNAc-6-sulfate (chondroitin-6-sulfate)
                - source_id: Reactome:R-HSA-1630304
                  statement: "GALNS oligomer hydrolyses sulfate from Gal6S in keratan sulfate (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = MPS IVA (Morquio A syndrome).
    - order: 2
      role: terminal galactose hydrolysis
      node:
        id: glb1_step
        label: hydrolysis of terminal beta-D-galactose
        module_type: REACTION
        annotons:
          - id: glb1_activity
            label: "GLB1: lysosomal acid beta-galactosidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycosyl hydrolase 35 family (GLB1)
                term:
                  id: PANTHER:PTHR23421
                  label: BETA-GALACTOSIDASE
                representative_members:
                  - preferred_term: GLB1 (human)
                    term:
                      id: UniProtKB:P16278
                      label: Beta-galactosidase
            function:
              preferred_term: beta-galactosidase activity
              term:
                id: GO:0004565
                label: beta-galactosidase activity
              substrates:
                - preferred_term: keratan sulfate (terminal beta-galactose)
                - preferred_term: GM1 ganglioside (terminal galactose)
              products:
                - preferred_term: D-galactose
                - preferred_term: shortened keratan sulfate chain / GM2 ganglioside
              evidence:
                - source_id: EC:3.2.1.23
                  statement: lysosomal acid beta-galactosidase; hydrolyses terminal beta-galactose from keratan sulfate and from GM1 ganglioside; part of the CTSA/NEU1 multienzyme complex
                - source_id: Reactome:R-HSA-1630306
                  statement: "GLB1 hydrolyses a glycosaminoglycan (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = GM1 gangliosidosis / MPS IVB (Morquio B).
    - order: 3
      role: terminal N-acetylhexosamine hydrolysis (beta-hexosaminidase)
      node:
        id: hex_step
        label: hydrolysis of terminal beta-N-acetylhexosamine
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: hexa_activity
            label: "HEXA: beta-hexosaminidase alpha subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycosyl hydrolase 20 / beta-hexosaminidase family (HEX)
                term:
                  id: PANTHER:PTHR22600
                  label: BETA-HEXOSAMINIDASE
                representative_members:
                  - preferred_term: HEXA (human, alpha subunit)
                    term:
                      id: UniProtKB:P06865
                      label: Beta-hexosaminidase subunit alpha
            function:
              preferred_term: beta-N-acetylhexosaminidase activity
              term:
                id: GO:0004563
                label: beta-N-acetylhexosaminidase activity
              substrates:
                - preferred_term: keratan sulfate (terminal beta-GlcNAc)
                - preferred_term: GM2 ganglioside (terminal GalNAc, with GM2-activator)
              products:
                - preferred_term: N-acetylhexosamine
                - preferred_term: shortened chain / GM3 ganglioside
              evidence:
                - source_id: EC:3.2.1.52
                  statement: alpha subunit of lysosomal beta-hexosaminidase; hexosaminidase A (alpha-beta) with the GM2-activator degrades GM2 ganglioside and removes terminal beta-hexosamines from GAGs
                - source_id: Reactome:R-HSA-1638053
                  statement: "HEXA cleaves the terminal GlcNAc from keratan sulfate (human Reactome reaction)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = Tay-Sachs disease (GM2 gangliosidosis type I).
          - id: hexb_activity
            label: "HEXB: beta-hexosaminidase beta subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycosyl hydrolase 20 / beta-hexosaminidase family (HEX)
                term:
                  id: PANTHER:PTHR22600
                  label: BETA-HEXOSAMINIDASE
                representative_members:
                  - preferred_term: HEXB (human, beta subunit)
                    term:
                      id: UniProtKB:P07686
                      label: Beta-hexosaminidase subunit beta
            function:
              preferred_term: beta-N-acetylhexosaminidase activity
              term:
                id: GO:0004563
                label: beta-N-acetylhexosaminidase activity
              substrates:
                - preferred_term: keratan/dermatan sulfate (terminal beta-N-acetylhexosamine)
                - preferred_term: GM2/GA2 ganglioside
              products:
                - preferred_term: N-acetylhexosamine
                - preferred_term: shortened chain
              evidence:
                - source_id: EC:3.2.1.52
                  statement: beta subunit shared by hexosaminidase A (alpha-beta) and B (beta-beta); catalytic and complex-stabilising; deficiency affects both isozymes
                - source_id: Reactome:R-HSA-1638053
                  statement: "HEXA cleaves the terminal GlcNAc from keratan sulfate (human Reactome reaction; HexA = HEXA:HEXB)"
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Deficiency = Sandhoff disease (GM2 gangliosidosis type II; affects both HexA and HexB).
  connections:
    - source: galns_step
      target: glb1_step
      connection_type: PROVIDES_INPUT_FOR
      description: GALNS desulfation of terminal galactose-6-sulfate exposes the beta-galactose for GLB1.
    - source: glb1_step
      target: hex_step
      connection_type: PROVIDES_INPUT_FOR
      description: GLB1 removal of terminal galactose exposes the beta-N-acetylhexosamine for beta-hexosaminidase.
  notes: >-
    Keratan/chondroitin sulfate lysosomal degradation, grounded to the human enzymes GALNS
    (UniProtKB:P34059, GO:0043890, EC 3.1.6.4), GLB1 (P16278, GO:0004565, EC 3.2.1.23) and the
    beta-hexosaminidase subunits HEXA (P06865) and HEXB (P07686) (both GO:0004563, EC 3.2.1.52;
    complex GO:1905379). GO molecular-function/BP/location terms were taken from the completed
    human gene reviews and verified against the local go.db; Reactome reaction ids/titles were
    verified against the local reactome cache. Each step uses a PANTHER family selector; the
    beta-hexosaminidase step is a PROTEIN_COMPLEX node (HEXA + HEXB, forming HexA alpha-beta and,
    for HEXB, HexB beta-beta). This is the sibling module to heparan-sulfate degradation: keratan
    sulfate is a -Gal-GlcNAc- polymer degraded by alternating desulfation (GALNS for Gal/GalNAc-6-
    sulfate, GNS for GlcNAc-6-sulfate — GNS reviewed in the heparan-sulfate module), beta-
    galactosidase (GLB1) and beta-hexosaminidase (HEXA/HEXB). The enzymes are broadly specific and
    also degrade gangliosides — GLB1 the GM1 ganglioside, hexosaminidase A the GM2 ganglioside —
    so the same genes cause both mucopolysaccharide (Morquio) and glycosphingolipid (GM1/GM2
    gangliosidosis) storage diseases; GLB1/NEU1 act in a lysosomal multienzyme complex with CTSA.
    Disorders: MPS IVA (GALNS, Morquio A), GM1 gangliosidosis / MPS IVB (GLB1, Morquio B),
    Tay-Sachs (HEXA) and Sandhoff (HEXB). Chondroitin/dermatan sulfate degradation additionally
    uses ARSB (reviewed) and GUSB/IDS/IDUA (reviewed in the heparan-sulfate module).
