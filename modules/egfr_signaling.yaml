    title: EGFR signaling pathway Falcon module review
    statement: >-
      Falcon/Edison module review generated 2026-06-28 is linked as supporting evidence for module boundaries,
      core mechanism, variation, constraints, and failure modes; open questions in that report require
      manual review before promotion to curated knowledge gaps.
  - source_id: GO:0007173
    title: epidermal growth factor receptor signaling pathway
    statement: The module is grounded in the GO biological process term for epidermal growth factor 
      receptor signaling pathway.
