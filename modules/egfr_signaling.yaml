id: MODULE:egfr_signaling
title: EGFR signaling pathway module
description: EGF-family ligand binding activates EGFR/ERBB1 receptor tyrosine kinase dimers, 
  creating phosphotyrosine docking sites that recruit GRB2/SOS, PI3K, PLCG, and STAT branches for 
  proliferation and differentiation outputs.
status: DRAFT
evidence:
