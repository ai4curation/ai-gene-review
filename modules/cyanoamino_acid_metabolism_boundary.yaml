id: MODULE:cyanoamino_acid_metabolism_boundary
title: Cyanoamino acid metabolism boundary
description: >-
  Boundary module for KEGG ppu00460 in Pseudomonas putida KT2440. The mapped
  set contains asparaginase-family enzymes plus serine hydroxymethyltransferase,
  a periplasmic beta-glucosidase, and glutathione hydrolases. This module keeps
  those supported activities visible while avoiding inference of a complete
  cyanogenic-glycoside or cyanoamino-acid detoxification pathway without
  substrate-specific evidence.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00460
    title: Cyanoamino acid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00460 provides the PSEPK curation batch. Its membership combines
      AnsA/PP_1160 asparaginase-family proteins with SHMT, beta-glucosidase,
      and glutathione hydrolase side nodes.
module:
  id: cyanoamino_acid_metabolism_boundary
  label: Cyanoamino acid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: asparaginase activity
      term:
        id: GO:0004067
        label: asparaginase activity
      description: Hydrolysis of L-asparagine to L-aspartate and ammonia.
    - preferred_term: beta-glucosidase activity
      term:
        id: GO:0008422
        label: beta-glucosidase activity
      description: Hydrolysis of terminal beta-D-glucosyl residues from beta-glucosides or glucans.
    - preferred_term: glutathione hydrolase activity
      term:
        id: GO:0036374
        label: glutathione hydrolase activity
      description: Hydrolysis of glutathione to L-cysteinylglycine and L-glutamate.
    - preferred_term: glycine hydroxymethyltransferase activity
      term:
        id: GO:0004372
        label: glycine hydroxymethyltransferase activity
      description: Reversible serine/glycine one-carbon transfer via tetrahydrofolate.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most ppu00460 members are soluble cytoplasmic enzymes; BglX is periplasmic boundary context.
  parts:
    - order: 1
      role: Asparaginase-family cyanoamino-acid map core
      node:
        id: asparaginase_family_context
        label: Asparaginase-family hydrolases
        module_type: METABOLIC_PATHWAY
        description: >-
          AnsA and PP_1160 are the primary ppu00460 bucket genes in KT2440.
          Their supported core activity is asparaginase/asparagine metabolism,
          not a proven cyanide-specific reaction.
        annotons:
          - id: ansA_asparaginase
            label: "ansA: type 1 L-asparaginase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ansA
            function:
              preferred_term: asparaginase activity
              term:
                id: GO:0004067
                label: asparaginase activity
            role_description: Primary ppu00460 asparaginase-family enzyme.
          - id: PP_1160_asparaginase_family
            label: "PP_1160: asparaginase family protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_1160
            function:
              preferred_term: asparaginase activity
              term:
                id: GO:0004067
                label: asparaginase activity
            role_description: Primary ppu00460 asparaginase-family candidate.
    - order: 2
      role: One-carbon and serine/glycine side context
      node:
        id: shmt_side_context
        label: Serine hydroxymethyltransferase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          GlyA1 and GlyA2 are included by the broad KEGG map but their curated
          core role is serine/glycine one-carbon metabolism.
        annotons:
          - id: glyA1_shmt
            label: "glyA1: serine hydroxymethyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glyA1
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
            role_description: One-carbon/serine-glycine side context.
          - id: glyA2_shmt
            label: "glyA2: serine hydroxymethyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glyA2
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
            role_description: One-carbon/serine-glycine side context.
    - order: 3
      role: Beta-glucoside hydrolysis side context
      node:
        id: beta_glucosidase_side_context
        label: Periplasmic beta-glucosidase side context
        module_type: REACTION
        description: >-
          BglX is a periplasmic beta-glucosidase. In ppu00460 it may reflect
          KEGG cyanogenic-glycoside map chemistry, but KT2440-specific substrate
          evidence is not established in the first pass.
        annotons:
          - id: bglX_beta_glucosidase
            label: "bglX: periplasmic beta-glucosidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bglX
            function:
              preferred_term: beta-glucosidase activity
              term:
                id: GO:0008422
                label: beta-glucosidase activity
            role_description: Carbohydrate/glucan side context, not a proven cyanoamino-acid enzyme.
    - order: 4
      role: Glutathione hydrolase side context
      node:
        id: glutathione_hydrolase_side_context
        label: GGT-family glutathione hydrolase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_3535 and ggt are glutathione hydrolases included by broad KEGG
          chemistry; they overlap taurine/hypotaurine and glutathione
          metabolism rather than defining cyanoamino-acid catabolism.
        annotons:
          - id: PP_3535_glutathione_hydrolase
            label: "PP_3535: glutathione hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3535
            function:
              preferred_term: glutathione hydrolase activity
              term:
                id: GO:0036374
                label: glutathione hydrolase activity
            role_description: Glutathione side context in the broad ppu00460 map.
          - id: ggt_glutathione_hydrolase
            label: "ggt: glutathione hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ggt
            function:
              preferred_term: glutathione hydrolase activity
              term:
                id: GO:0036374
                label: glutathione hydrolase activity
            role_description: Glutathione side context in the broad ppu00460 map.
  notes: >-
    Treat ppu00460 as a boundary module. AnsA and PP_1160 provide the
    asparaginase-family anchor, while GlyA1/GlyA2, BglX, PP_3535, and ggt
    should remain one-carbon, carbohydrate, or glutathione side context unless
    direct cyanogenic-glycoside or cyanoamino-acid substrate evidence is found.
