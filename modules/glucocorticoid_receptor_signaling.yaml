notes: >-
  Curated compact signaling-pathway module generated from verified UniProt exemplar accessions and local
  PAINT IBD rows. PTN anchors are included only when the exemplar accession appears in an IBD seed row
  in interpro/panther; roles without local PAINT seeds remain grounded by verified UniProt exemplar accessions.
  Falcon integration (2026-06-28): module-level Falcon findings were integrated as explicit evidence,
  structured knowledge gaps, and PANTHER-family evidence links. Extracted Falcon open questions: The Dissociation
  Hypothesis and SEGRAMs; Phase Separation as a Regulatory Layer; Gene-level selectivity; Quantitative
  contribution of nongenomic signaling; FKBP51/52 regulatory pharmacology; Phase separation functionality;
  +1 more. Machine-generated Falcon citations remain curation support and are not manually adjudicated
  here.
