knowledge_gaps:
  - gap_statement: The Dissociation Hypothesis and SEGRAMs remains unresolved in the Glucocorticoid 
      receptor signaling pathway module.
    boundary: The long-standing hypothesis that GR-mediated anti-inflammatory effects arise 
      predominantly from transrepression (monomeric tethering to NF-kappaB/AP-1) while metabolic 
      side effects result from transactivation (dimeric GRE binding) has driven decades of drug 
      development. Selective GR agonists/modulators (SEGRAMs) were designed to favor transrepression
      while minimizing transactivation.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/glucocorticoid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Phase Separation as a Regulatory Layer remains unresolved in the Glucocorticoid 
      receptor signaling pathway module.
    boundary: An emerging paradigm proposes that ligand-activated GR forms ~4,500 nuclear foci via 
      liquid-liquid phase separation (LLPS), often localized at super-enhancers 
      (fargason2025endocrineexamplesof pages 2-4).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/glucocorticoid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Gene-level selectivity remains unresolved in the Glucocorticoid receptor 
      signaling pathway module.
    boundary: How does GR achieve locus-specific activation versus repression given that the same 
      receptor binds thousands of genomic sites? The answer likely involves combinatorial logic of 
      DNA motif grammar, pioneer factor context, and condensate organization, but a predictive 
      framework is lacking.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/glucocorticoid_receptor_signaling-deep-research-falcon.md
  - gap_statement: Quantitative contribution of nongenomic signaling remains unresolved in the 
      Glucocorticoid receptor signaling pathway module.
    boundary: The relative contribution of rapid kinase-based GR effects versus genomic 
      transcriptional programs to anti-inflammatory efficacy remains poorly quantified in vivo.
    gap_kind:
