id: MODULE:glucocorticoid_receptor_signaling
title: Glucocorticoid receptor signaling pathway module
description: Glucocorticoid receptor signaling couples steroid ligand binding, HSP90/co-chaperone 
  regulation, nuclear translocation, and co-regulator exchange to anti-inflammatory and metabolic 
  transcriptional programs.
