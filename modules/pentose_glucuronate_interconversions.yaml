id: MODULE:pentose_glucuronate_interconversions
title: Pentose and glucuronate interconversions
description: >-
  A boundary module for the sugar-acid and pentose interconversion reactions
  grouped by bacterial KEGG pentose/glucuronate maps. The map connects three
  separable arms: phosphorylated pentose metabolism, UDP-glucose and
  UDP-glucuronate nucleotide-sugar generation, and oxidative hexuronate or
  aldarate catabolism. Organism-level curation should distinguish strict
  pentose-phosphate reactions, nucleotide-sugar biosynthesis, experimentally
  supported hexuronate-catabolic entry steps, and uncertain downstream
  dehydratase/dehydrogenase paralogs rather than treating every mapped enzyme as
  evidence for one complete linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00040
    title: Pentose and glucuronate interconversions - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00040 membership. The
      module is intentionally scoped as a boundary map because the PSEPK
      membership includes pentose-phosphate, UDP-sugar, and sugar-acid side-node
      enzymes.
  - source_id: GO:0019323
    title: pentose catabolic process
    statement: >-
      Ribulose-phosphate epimerase and related pentose-phosphate reactions can
      contribute to pentose catabolism and pentose-phosphate interconversion, but
      this does not by itself establish a complete uronate-degradation route.
  - source_id: GO:0006065
    title: UDP-glucuronate biosynthetic process
    statement: >-
      UDP-glucose 6-dehydrogenase and UDP-glucose pyrophosphorylase supply the
      activated nucleotide-sugar branch represented in the KEGG map.
  - source_id: file:modules/pentose_glucuronate_interconversions-deep-research-falcon.md
    title: Falcon module synthesis for pentose and glucuronate interconversions
    statement: >-
      Generic module-level synthesis supporting separation of pentose-phosphate
      interconversion, nucleotide-sugar biosynthesis, and non-phosphorylative
      sugar-acid catabolism.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__pentose_glucuronate_interconversions__ppu00040-deep-research-falcon.md
    title: Falcon PSEPK ppu00040 pathway satisfiability synthesis
    statement: >-
      Species-aware synthesis indicating that ppu00040 is a composite boundary
      map in P. putida KT2440 and that the oxidative hexuronate arm needs Udh,
      a lactonase, aldarate dehydratase, and an appropriate KGSADH isozyme.
  - source_id: PMID:19060141
    title: Cloning and characterization of uronate dehydrogenases from two pseudomonads and Agrobacterium tumefaciens strain C58.
    statement: >-
      Primary biochemical evidence for P. putida KT2440 Udh activity on
      glucuronate and galacturonate.
module:
  id: pentose_glucuronate_interconversions
  label: Pentose and glucuronate interconversions
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pentose catabolic process
      term:
        id: GO:0019323
        label: pentose catabolic process
      description: >-
        Conversion of pentose sugars or pentose phosphates into central
        metabolism intermediates.
    - preferred_term: UDP-glucuronate biosynthetic process
      term:
        id: GO:0006065
        label: UDP-glucuronate biosynthetic process
      description: >-
        Nucleotide-sugar branch producing UDP-glucuronate from UDP-glucose.
    - preferred_term: oxidative hexuronate catabolic arm
      description: >-
        Free glucuronate or galacturonate oxidation to aldarate and then to
        2-oxoglutarate through uronate dehydrogenase, lactonase, dehydratase,
        and KGSADH steps.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          The mapped enzymes are expected to act on soluble sugar phosphates,
          nucleotide sugars, or sugar-acid intermediates in the bacterial
          cytosol.
  parts:
    - order: 1
      role: pentose-phosphate interconversion
      node:
        id: ribulose_phosphate_epimerase_step
        label: Ribulose 5-phosphate to xylulose 5-phosphate
        module_type: REACTION
        annotons:
          - id: ribulose_phosphate_3_epimerase_activity
            label: Ribulose-phosphate 3-epimerase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: ribulose-phosphate 3-epimerase activity
                term:
                  id: GO:0004750
                  label: ribulose-phosphate 3-epimerase activity
            function:
              preferred_term: ribulose-phosphate 3-epimerase activity
              term:
                id: GO:0004750
                label: ribulose-phosphate 3-epimerase activity
              substrates:
                - preferred_term: D-ribulose 5-phosphate
              products:
                - preferred_term: D-xylulose 5-phosphate
              evidence:
                - source_id: EC:5.1.3.1
                  statement: ribulose-phosphate 3-epimerase
            role_description: >-
              Shared PPP/pentose-phosphate chemistry; in PSEPK this step is
              represented by rpe and should not be counted as a uronate-specific
              catabolic step.
    - order: 2
      role: UDP-glucose supply
      node:
        id: udp_glucose_pyrophosphorylase_step
        label: Glucose 1-phosphate to UDP-glucose
        module_type: REACTION
        annotons:
          - id: udp_glucose_pyrophosphorylase_activity
            label: UDP-glucose pyrophosphorylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: UTP:glucose-1-phosphate uridylyltransferase activity
                term:
                  id: GO:0003983
                  label: UTP:glucose-1-phosphate uridylyltransferase activity
            function:
              preferred_term: UTP:glucose-1-phosphate uridylyltransferase activity
              term:
                id: GO:0003983
                label: UTP:glucose-1-phosphate uridylyltransferase activity
              substrates:
                - preferred_term: glucose 1-phosphate
                - preferred_term: UTP
              products:
                - preferred_term: UDP-glucose
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.7.7.9
                  statement: UTP--glucose-1-phosphate uridylyltransferase
            role_description: >-
              Supplies UDP-glucose for nucleotide-sugar metabolism; adjacent to,
              but not specific for, pentose/glucuronate interconversion.
    - order: 3
      role: UDP-glucuronate formation
      node:
        id: udp_glucose_dehydrogenase_step
        label: UDP-glucose to UDP-glucuronate
        module_type: REACTION
        annotons:
          - id: udp_glucose_6_dehydrogenase_activity
            label: UDP-glucose 6-dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: UDP-glucose 6-dehydrogenase activity
                term:
                  id: GO:0003979
                  label: UDP-glucose 6-dehydrogenase activity
            function:
              preferred_term: UDP-glucose 6-dehydrogenase activity
              term:
                id: GO:0003979
                label: UDP-glucose 6-dehydrogenase activity
              substrates:
                - preferred_term: UDP-glucose
                - preferred_term: NAD+
              products:
                - preferred_term: UDP-glucuronate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.22
                  statement: UDP-glucose 6-dehydrogenase
            role_description: >-
              Generates UDP-glucuronate for nucleotide-sugar and cell-envelope
              precursor metabolism.
    - order: 4
      role: hexuronate oxidation
      node:
        id: uronate_dehydrogenase_step
        label: Glucuronate or galacturonate to urono-1,5-lactone
        module_type: REACTION
        annotons:
          - id: uronate_dehydrogenase_activity
            label: Uronate dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: uronate dehydrogenase activity
                term:
                  id: GO:0050388
                  label: uronate dehydrogenase activity
            function:
              preferred_term: uronate dehydrogenase activity
              term:
                id: GO:0050388
                label: uronate dehydrogenase activity
              substrates:
                - preferred_term: beta-D-glucuronate
                - preferred_term: beta-D-galacturonate
                - preferred_term: NAD+
              products:
                - preferred_term: D-glucaro-1,5-lactone
                - preferred_term: D-galactaro-1,5-lactone
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.203
                  statement: uronate dehydrogenase
                - source_id: PMID:19060141
                  statement: >-
                    P. putida KT2440 Udh was cloned, expressed, purified, and
                    characterized with glucuronate and galacturonate substrates.
            role_description: >-
              Entry step for the oxidative free-hexuronate catabolic arm. In
              PSEPK this is represented by udh/PP_1171, which is not part of
              the original eight-gene KEGG ppu00040 batch but is experimentally
              supported.
    - order: 5
      role: hexuronate lactone hydrolysis candidate
      node:
        id: hexuronate_lactonase_candidate_step
        label: Urono-1,5-lactone hydrolysis to aldarate
        module_type: REACTION
        annotons:
          - id: gluconolactonase_family_lactonase_activity
            label: Gluconolactonase-family lactonase candidate
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: gluconolactonase activity
                term:
                  id: GO:0004341
                  label: gluconolactonase activity
            function:
              preferred_term: gluconolactonase activity
              term:
                id: GO:0004341
                label: gluconolactonase activity
              substrates:
                - preferred_term: D-glucaro-1,5-lactone
                - preferred_term: D-galactaro-1,5-lactone
              products:
                - preferred_term: D-glucarate
                - preferred_term: D-galactarate
              evidence:
                - source_id: EC:3.1.1.17
                  statement: gluconolactonase
                - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__pentose_glucuronate_interconversions__ppu00040-deep-research-falcon.md
                  statement: >-
                    PSEPK Falcon synthesis promoted PP_1170/gnl as a strong
                    candidate lactonase for glucuronate and galacturonate use,
                    while retaining substrate specificity as an unresolved
                    question.
            role_description: >-
              Candidate lactone-opening step. In PSEPK this is represented by
              gnl/PP_1170, but the current GO term is a predicted
              gluconolactonase-family activity rather than a substrate-resolved
              glucaro- or galactaro-lactonase term.
    - order: 6
      role: aldarate dehydration gap
      node:
        id: aldarate_dehydratase_gap
        label: Aldarate dehydration to KGSA precursor
        module_type: REACTION
        description: >-
          Expected GudD/GarD-family dehydration of glucarate or galactarate to
          downstream keto-deoxy aldarate intermediates. The PSEPK ppu00040
          candidate list did not recover a confident KT2440 locus, so this is
          tracked as a pathway hole rather than silently skipped.
        concepts:
          - preferred_term: D-glucarate or D-galactarate dehydratase step
            description: >-
              Dehydration step between aldarate formation and KGSADH-mediated
              oxidation to 2-oxoglutarate.
    - order: 7
      role: 2,5-dioxovalerate or KGSA oxidation
      node:
        id: dioxovalerate_dehydrogenase_step
        label: 2,5-dioxovalerate or KGSA oxidation
        module_type: REACTION
        annotons:
          - id: dioxovalerate_dehydrogenase_activity
            label: 2,5-dioxovalerate dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 2,5-dioxovalerate dehydrogenase (NADP+) activity
                term:
                  id: GO:0047533
                  label: 2,5-dioxovalerate dehydrogenase (NADP+) activity
            function:
              preferred_term: 2,5-dioxovalerate dehydrogenase (NADP+) activity
              term:
                id: GO:0047533
                label: 2,5-dioxovalerate dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: 2,5-dioxovalerate
                - preferred_term: NADP+
              products:
                - preferred_term: 2-oxoglutarate
                - preferred_term: NADPH
              evidence:
                - source_id: EC:1.2.1.26
                  statement: 2,5-dioxovalerate dehydrogenase
            role_description: >-
              Candidate sugar-acid degradation endpoint represented by multiple
              PSEPK paralogs; paralog specificity and physiological route need
              organism-level review before any single paralog is counted as
              satisfying oxidative hexuronate catabolism.
  connections:
    - source: udp_glucose_pyrophosphorylase_step
      target: udp_glucose_dehydrogenase_step
      connection_type: PROVIDES_INPUT_FOR
      description: UDP-glucose is the substrate for UDP-glucose 6-dehydrogenase.
      chaining_status: VERIFIED
      chaining_note: UDP-glucose is an explicit product of GalU and substrate of Udg.
    - source: uronate_dehydrogenase_step
      target: hexuronate_lactonase_candidate_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Udh produces glucaro- or galactaro-1,5-lactones that require lactone
        hydrolysis before downstream aldarate dehydration.
      chaining_status: VERIFIED
      chaining_note: >-
        The product class from Udh is the expected lactonase substrate; the
        exact PSEPK lactonase substrate specificity remains to be tested.
    - source: hexuronate_lactonase_candidate_step
      target: aldarate_dehydratase_gap
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Lactonase activity would yield glucarate or galactarate for the missing
        aldarate dehydratase step.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        The biochemical route requires an aldarate dehydratase, but the specific
        KT2440 locus was not recovered in the KEGG ppu00040 metadata batch.
    - source: aldarate_dehydratase_gap
      target: dioxovalerate_dehydrogenase_step
      connection_type: PRECEDES
      description: >-
        Aldarate dehydration is expected upstream of KGSA or
        2,5-dioxovalerate oxidation, but the exact dehydratase and KGSADH
        paralog pairing is unresolved.
      chaining_status: KNOWLEDGE_GAP
      chaining_note: >-
        Multiple KGSADH paralogs are present in PSEPK, and the glucarate-linked
        isozyme has not been assigned from the current first-pass evidence.
  notes: >-
    This module is a scoped boundary for KEGG ppu00040 rather than a claim that
    all parts form one satisfiable pathway in every organism. In Pseudomonas
    putida KT2440, rpe overlaps the PPP module; galU and udg belong to
    nucleotide-sugar/cell-envelope precursor metabolism; udh and gnl are the
    promoted hexuronate entry/lactonase genes absent from the initial KEGG
    eight-gene batch; and the aldarate dehydratase plus KGSADH paralog
    assignments remain unresolved pathway holes for later focused curation.
