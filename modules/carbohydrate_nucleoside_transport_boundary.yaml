id: MODULE:carbohydrate_nucleoside_transport_boundary
title: Carbohydrate and nucleoside transport boundary
description: Boundary module for PSEPK non-ABC gluconate, nucleobase/cytosine, and nicotinamide-riboside transporters plus
  beta-glucanase, sugar-transferase, prophage, and low-confidence membrane side nodes.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_carbohydrate_nucleoside_transporters.tsv
  title: PSEPK carbohydrate/nucleoside transporter batch
  statement: The batch table records 14 PSEPK transport-bucket genes assigned to carbohydrate, nucleoside, nucleobase, and
    related side-node context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_partition.tsv
  title: PSEPK transport/membrane/efflux partition
  statement: The parent transport partition separates this carbohydrate/nucleoside panel from ABC transporters, MFS/DMT, ion/metal,
    amino-acid/amine, redox, and low-information membrane buckets.
notes: 'First-pass interpretation: keep GntP gluconate, CodB/cytosine, NCS1/nucleobase, and PnuC calls where product and domains
  agree; keep PP_1740, PP_3048, and PP_3142 as enzyme/prophage side nodes; leave PP_0138 unresolved beyond membrane context.'
