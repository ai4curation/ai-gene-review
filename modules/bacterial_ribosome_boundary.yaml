id: MODULE:bacterial_ribosome_boundary
title: Bacterial ribosome boundary
description: >-
  Umbrella boundary module for KEGG ppu03010 ribosome in Pseudomonas putida
  KT2440. The PSEPK primary set is a coherent bacterial ribosomal-protein set
  with no unknown or spillover bucket, but first-pass curation is clearer when
  the 54 proteins are split into 30S small-subunit and 50S large-subunit
  boundaries rather than one all-ribosome review unit.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03010
    title: Ribosome - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03010 supplies the organism-specific PSEPK bacterial ribosomal
      protein membership used for this boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu03010_bacterial_ribosome_boundary.tsv
    title: ppu03010 first-pass batch table
    statement: >-
      The primary-only batch table records 54 selected genes with review,
      curation, and Asta retrieval status.
  - source_id: file:projects/P_PUTIDA/batches/ppu03010_bacterial_ribosome_partition.tsv
    title: PSEPK ppu03010 ribosome partition table
    statement: >-
      The partition separates the 54 primary genes into 21 bacterial 30S
      ribosomal subunit proteins and 33 bacterial 50S ribosomal subunit
      proteins.
  - source_id: file:projects/P_PUTIDA/batches/ppu03010_bacterial_ribosome_partition.md
    title: PSEPK ppu03010 ribosome partition report
    statement: >-
      The partition report records the decision to curate ppu03010 through
      separate 30S and 50S protein-subunit modules with no unknown bucket.
module:
  id: bacterial_ribosome_boundary
  label: Bacterial ribosome boundary
  module_type: CELLULAR_COMPONENT
  concepts:
    - preferred_term: ribosome
      term:
        id: GO:0005840
        label: ribosome
      description: Whole ribosome context for translation.
    - preferred_term: small ribosomal subunit
      term:
        id: GO:0015935
        label: small ribosomal subunit
      description: 30S small-subunit protein boundary.
    - preferred_term: large ribosomal subunit
      term:
        id: GO:0015934
        label: large ribosomal subunit
      description: 50S large-subunit protein boundary.
    - preferred_term: structural constituent of ribosome
      term:
        id: GO:0003735
        label: structural constituent of ribosome
      description: Shared molecular role of the ribosomal proteins in this batch.
    - preferred_term: translation
      term:
        id: GO:0006412
        label: translation
      description: Protein synthesis carried out by the assembled ribosome.
    - preferred_term: rRNA binding
      term:
        id: GO:0019843
        label: rRNA binding
      description: Specific rRNA-contact activity retained for many ribosomal proteins.
  parts:
    - order: 1
      role: Whole ribosome boundary
      node:
        id: bacterial_ribosome_umbrella_boundary
        label: Bacterial ribosome umbrella boundary
        module_type: CELLULAR_COMPONENT
        description: >-
          ppu03010 is a coherent bacterial ribosomal-protein set, but the
          reviewed protein participants are maintained through 30S and 50S
          subunit modules for curation-scale tractability.
        annotons: []
    - order: 2
      role: 30S small ribosomal subunit
      node:
        id: bacterial_30s_ribosomal_subunit_index
        label: Bacterial 30S ribosomal subunit index
        module_type: CELLULAR_COMPONENT
        description: >-
          The 21 small-subunit protein participants are represented by
          `bacterial_30s_ribosomal_subunit_boundary`.
        annotons: []
    - order: 3
      role: 50S large ribosomal subunit
      node:
        id: bacterial_50s_ribosomal_subunit_index
        label: Bacterial 50S ribosomal subunit index
        module_type: CELLULAR_COMPONENT
        description: >-
          The 33 large-subunit protein participants are represented by
          `bacterial_50s_ribosomal_subunit_boundary`.
        annotons: []
  notes: >-
    This parent module is an index over completed 30S and 50S first-pass
    submodules. It does not attempt to model rRNA molecules, translation
    factors, or ribosome biogenesis factors outside the ppu03010 protein set.
