id: MODULE:viral_life_cycle_hiv1_boundary
title: Viral life cycle - HIV-1 boundary
description: >-
  Boundary/absence module for KEGG ppu03250 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only ppiA/PP_4541, a cyclophilin-family
  peptidyl-prolyl cis-trans isomerase involved in protein folding. This should
  not be interpreted as evidence for a viral, HIV-1, or host-virus life-cycle
  pathway in a bacterium; the mapped protein is curated as PPIase/protein-folding
  context only.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03250
    title: Viral life cycle - HIV-1 - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03250 provides the PSEPK curation batch, but the organism-specific
      membership is limited to ppiA/PP_4541.
  - source_id: UniProtKB:Q88EC5
    title: Peptidyl-prolyl cis-trans isomerase
    statement: >-
      UniProt describes ppiA as a peptidyl-prolyl cis-trans isomerase that
      catalyzes proline peptide-bond isomerization during protein folding.
  - source_id: file:PSEPK/ppiA/ppiA-ai-review.yaml
    title: Curated ppiA review
    statement: >-
      The first-pass ppiA review accepts peptidyl-prolyl cis-trans isomerase
      activity and protein folding as core, while marking generic isomerase
      activity as over-annotated relative to the specific PPIase function.
module:
  id: viral_life_cycle_hiv1_boundary
  label: Viral life cycle - HIV-1 boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: HIV-1 life-cycle pathway absence
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 is a
        bacterium and ppu03250 contains only a PPIase side node, so no HIV-1 or
        viral life-cycle pathway is satisfiable in this organism.
    - preferred_term: peptidyl-prolyl cis-trans isomerase activity
      term:
        id: GO:0003755
        label: peptidyl-prolyl cis-trans isomerase activity
      description: Native molecular function of the only PSEPK ppu03250 member, ppiA.
    - preferred_term: protein folding
      term:
        id: GO:0006457
        label: protein folding
      description: Direct bacterial process context for ppiA.
  parts:
    - order: 1
      role: HIV-1 pathway absence
      node:
        id: hiv1_life_cycle_absence
        label: HIV-1 life-cycle absence in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 does not encode an HIV-1 life-cycle pathway. The KEGG
          bucket is treated as an artifact of broad cross-map association with a
          cyclophilin/PPIase rather than as a satisfiable bacterial pathway.
        annotons: []
    - order: 2
      role: Cyclophilin/PPIase protein-folding side node
      node:
        id: ppiA_ppiase_protein_folding
        label: ppiA peptidyl-prolyl isomerase side node
        module_type: MOLECULAR_FUNCTION
        description: >-
          ppiA encodes a cyclophilin-family PPIase that accelerates protein
          folding by cis-trans isomerization of peptidyl-prolyl bonds. This is
          the only native biological role supported by the ppu03250 member.
        annotons:
          - id: ppiA_peptidyl_prolyl_isomerase
            label: "ppiA: peptidyl-prolyl cis-trans isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ppiA
            function:
              preferred_term: peptidyl-prolyl cis-trans isomerase activity
              term:
                id: GO:0003755
                label: peptidyl-prolyl cis-trans isomerase activity
              substrates:
                - preferred_term: peptidyl-prolyl bond in a protein
              products:
                - preferred_term: cis/trans-isomerized peptidyl-prolyl bond
            processes:
              - preferred_term: protein folding
                term:
                  id: GO:0006457
                  label: protein folding
            role_description: PPIase/protein-folding side node; boundary-only for the HIV-1 life-cycle KEGG map.
  notes: >-
    This module records an explicit boundary/absence call. The ppiA review does
    not need viral-life-cycle GO annotations; its correct curation is
    peptidyl-prolyl cis-trans isomerase activity and protein folding.
