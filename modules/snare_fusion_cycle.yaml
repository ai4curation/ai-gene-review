id: MODULE:snare_fusion_cycle
title: Generic SNARE-mediated membrane fusion cycle motif
description: >-
  The minimal, reusable membrane-fusion motif: cognate vesicle (v-/R-) and target
  (t-/Q-) SNAREs zipper into a four-helix trans-SNARE complex that pulls the two
  bilayers together; the resulting force drives membrane fusion and cargo
  delivery; and the ATPase NSF, with its SNAP cofactors, then disassembles the
  cis-SNARE complex to recycle the SNAREs for another round. This cycle underlies
  essentially all intracellular vesicular fusion (ER-Golgi, endosomal,
  synaptic-vesicle, etc.). The motif is gene-free and taxon-neutral, fixing only
  the SNARE-pairing and fusion roles and the pair -> fuse -> recycle topology.
  Grounded in GO:0006906 (vesicle fusion).
status: DRAFT
evidence:
  - source_id: GO:0006906
    title: vesicle fusion
    statement: The motif culminates in vesicle fusion driven by trans-SNARE complex assembly.
  - source_id: GO:0005484
    title: SNAP receptor activity
    statement: The pairing role is SNARE (SNAP receptor) activity forming the fusogenic complex.
notes: >-
  Reusable conformance target. A node declares
  `conforms_to: [{template: snare_fusion_cycle}]` when cognate SNAREs pair, drive
  fusion, and are recycled by NSF/SNAP. The specific SNARE set (syntaxin/SNAP-25/
  VAMP, etc.) and compartment are realization-specific.
