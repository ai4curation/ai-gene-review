      connection_type: CAUSES
      description: Trans-SNARE complex assembly drives fusion.
    - source: snare_disassembly
      target: snare_pairing
      connection_type: PROVIDES_INPUT_FOR
      description: NSF/SNAP recycling regenerates free SNAREs for the next round.
