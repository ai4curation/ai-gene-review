id: MODULE:mycolic_acid_biosynthesis
title: Mycolic acid biosynthesis boundary module
description: >-
  A taxon-neutral boundary module for formation of mycolic acids, the
  long-chain alpha-alkyl beta-hydroxy fatty acids characteristic of
  mycolate-containing bacterial envelopes. This module is intentionally framed
  as a boundary check for organism-specific pathway curation: generic
  phosphopantetheinyl-transferase and malonyl-ACP formation steps can appear in
  KEGG mycolic-acid maps, but by themselves they do not demonstrate that a
  genome encodes the mycolate-specific elongation, modification, condensation,
  reduction, and envelope-transfer machinery needed to synthesize mycolic acids.
  For Pseudomonas putida KT2440, KEGG ppu00074 contains only PP_1183 and fabD;
  current UniProt/GOA evidence supports siderophore carrier-protein activation
  and type-II fatty-acid biosynthesis, not a satisfiable mycolic-acid pathway.
status: DRAFT
evidence:
  - source_id: GO:0071768
    title: mycolic acid biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      mycolic acids, defined as beta-hydroxy fatty acids with a long alpha-alkyl
      side chain.
  - source_id: KEGG:ppu00074
    title: Mycolic acid biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway bucket contains only PP_1183 and fabD, which are reviewed
      here as boundary/context enzymes rather than evidence for a complete
      mycolate pathway in KT2440.
  - source_id: file:PSEPK/PP_1183/PP_1183-ai-review.yaml
    title: PSEPK PP_1183 gene review
    statement: >-
      PP_1183 is reviewed as an EntD-family 4'-phosphopantetheinyltransferase
      involved in siderophore carrier-protein activation, not as a
      mycolic-acid-specific enzyme.
  - source_id: file:PSEPK/fabD/fabD-ai-review.yaml
    title: PSEPK fabD gene review
    statement: >-
      FabD is reviewed as the malonyl-CoA:ACP transacylase that supplies
      malonyl-ACP for bacterial FAS-II fatty-acid biosynthesis.
  - source_id: file:modules/mycolic_acid_biosynthesis-deep-research-falcon.md
    title: Falcon mycolic acid biosynthesis module research
    statement: >-
      The generic module-level Falcon report supports treating PPTase and FabD
      activities as non-diagnostic support/context roles; a satisfiable
      mycolate module requires the dedicated activation, condensation,
      reduction, transport, and envelope-transfer machinery.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__mycolic-acid-biosynthesis__ppu00074-deep-research-falcon.md
    title: Falcon PSEPK ppu00074 mycolic acid biosynthesis research
    statement: >-
      The PSEPK-specific Falcon report supports classifying KEGG ppu00074 as an
      over-propagated pathway assignment in KT2440: PP_1183 and fabD are valid
      siderophore/NRPS and FAS-II context genes, but the target taxon lacks the
      mycolate-specific gene set.
module:
  id: mycolic_acid_biosynthesis
  label: Mycolic acid biosynthesis boundary module
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: mycolic acid biosynthetic process
      term:
        id: GO:0071768
        label: mycolic acid biosynthetic process
      description: >-
        Formation of mycolic acids, beta-hydroxy fatty acids with a long
        alpha-alkyl side chain.
  context:
    cellular_components:
      - preferred_term: bacterial cell envelope
        description: >-
          Mature mycolic acids are envelope lipids in mycolate-containing
          bacteria; soluble precursor reactions can occur in the cytosol.
  parts:
    - order: 1
      role: carrier-protein phosphopantetheinylation support
      optional: true
      node:
        id: carrier_protein_activation_support
        label: Carrier-protein phosphopantetheinylation
        module_type: REACTION
        description: >-
          Activation of acyl-, aryl-, or peptidyl-carrier proteins by transfer
          of 4'-phosphopantetheine from CoA. This activity is broadly used in
          fatty-acid, polyketide, nonribosomal-peptide, and siderophore systems,
          so it is not diagnostic for mycolic-acid biosynthesis.
        annotons:
          - id: phosphopantetheinyltransferase_activity
            label: 4'-phosphopantetheinyltransferase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: holo-[acyl-carrier-protein] synthase activity
                term:
                  id: GO:0008897
                  label: holo-[acyl-carrier-protein] synthase activity
            function:
              preferred_term: holo-[acyl-carrier-protein] synthase activity
              term:
                id: GO:0008897
                label: holo-[acyl-carrier-protein] synthase activity
              substrates:
                - preferred_term: apo carrier protein
                - preferred_term: CoA
              products:
                - preferred_term: holo carrier protein
                - preferred_term: adenosine 3',5'-bisphosphate
              evidence:
                - source_id: EC:2.7.8.7
                  statement: 4'-phosphopantetheinyltransferase / holo-ACP synthase activity
                - source_id: file:PSEPK/PP_1183/PP_1183-ai-review.yaml
                  statement: >-
                    PSEPK PP_1183 supports this activity as siderophore
                    carrier-protein activation context.
            role_description: >-
              Boundary support role; presence of this activity alone does not
              satisfy the mycolic-acid module.
    - order: 2
      role: malonyl-ACP precursor supply
      optional: true
      node:
        id: malonyl_acp_supply_context
        label: Malonyl-CoA to malonyl-ACP
        module_type: REACTION
        description: >-
          Malonyl-ACP formation supplies the two-carbon extender for generic
          bacterial type-II fatty-acid biosynthesis. It can feed upstream fatty
          acid precursor pools, but it is not mycolate-specific.
        annotons:
          - id: malonyl_acp_transferase_activity
            label: Malonyl CoA-acyl carrier protein transacylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: "[acyl-carrier-protein] S-malonyltransferase activity"
                term:
                  id: GO:0004314
                  label: "[acyl-carrier-protein] S-malonyltransferase activity"
            function:
              preferred_term: "[acyl-carrier-protein] S-malonyltransferase activity"
              term:
                id: GO:0004314
                label: "[acyl-carrier-protein] S-malonyltransferase activity"
              substrates:
                - preferred_term: malonyl-CoA
                - preferred_term: holo-[acyl-carrier protein]
              products:
                - preferred_term: malonyl-[acyl-carrier protein]
                - preferred_term: CoA
              evidence:
                - source_id: EC:2.3.1.39
                  statement: malonyl-CoA-acyl carrier protein transacylase
                - source_id: file:PSEPK/fabD/fabD-ai-review.yaml
                  statement: >-
                    PSEPK fabD supports this activity as core FAS-II context.
            role_description: >-
              Fatty-acid precursor support role; presence of FabD alone does not
              satisfy the mycolic-acid module.
    - order: 3
      role: mycolate-specific envelope-lipid assembly
      node:
        id: mycolate_specific_assembly
        label: Mycolate-specific chain assembly and envelope transfer
        module_type: METABOLIC_PATHWAY
        description: >-
          The diagnostic portion of the module covers production of very-long
          meromycolate-like chains, modification of those chains, condensation
          with a shorter alpha branch to form the alpha-alkyl beta-hydroxy
          mycolate scaffold, reduction or maturation of the product, and
          transfer into envelope lipids. Diagnostic genes or enzyme families
          include Pks13, FadD32, CmrA, MmpL3, Ag85/Fbp mycolyltransferases,
          KasA/KasB, InhA, MabA, HadABC, and meromycolate modification
          methyltransferases/cyclopropanases. These organism-specific roles are
          not represented by PP_1183 or fabD in PSEPK ppu00074.
        concepts:
          - preferred_term: mycolic acid biosynthetic process
            term:
              id: GO:0071768
              label: mycolic acid biosynthetic process
        notes: >-
          This step is intentionally left abstract until a mycolate-containing
          organism is curated. For PSEPK it is the missing diagnostic core of
          the KEGG ppu00074 pathway, and Falcon supports marking the
          mycolate-specific steps as not expected in this target taxon rather
          than as ordinary pathway gaps.
notes: >-
  PSEPK ppu00074 should be curated as a KEGG spillover/absence case. PP_1183 and
  fabD should remain in siderophore carrier-protein activation and FAS-II fatty
  acid biosynthesis contexts, respectively. A future positive mycolate module
  should require the lineage-specific condensation, maturation, transport, and
  envelope-transfer machinery rather than accepting generic PPTase or FabD
  activity as sufficient.
