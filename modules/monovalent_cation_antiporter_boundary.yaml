id: MODULE:monovalent_cation_antiporter_boundary
title: Monovalent cation antiporters and potassium systems boundary
description: Boundary module for the PSEPK transport ion/metal monovalent-cation sub-batch. The set contains Trk/Kup potassium
  uptake context, NhaA/NhaB/NhaP and Kef/CPA-family cation/proton antiporters, a six-gene Mrp multicomponent antiporter locus,
  potassium/calcium/channel candidates, and two conservative side candidates.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_monovalent_cation_antiporters_potassium_systems.tsv
  title: PSEPK transport ion/metal monovalent-cation antiporter batch
  statement: The partition groups 26 PSEPK ion/metal-bucket genes for first-pass curation of sodium, potassium, proton, and
    related monovalent-cation transport context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates monovalent-cation systems from metal ATPases, transition-metal transporters,
    redox spillovers, and membrane metalloenzyme side nodes.
notes: 'First-pass interpretation: keep substrate and direction conservative. TrkA is treated as a regulatory/RCK subunit
  rather than a pore-forming transporter; Mrp components are modeled as subunits of a multicomponent antiporter; yfbS is DASS-related
  and may route better with sodium/anion solute symporters after deeper evidence review.'
