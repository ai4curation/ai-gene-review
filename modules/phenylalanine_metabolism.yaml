id: MODULE:phenylalanine_metabolism
title: L-phenylalanine metabolism and phenylacetate degradation
description: >-
  Broad bacterial boundary module for KEGG ppu00360 in Pseudomonas putida
  KT2440. The map combines at least two biologically distinct routes: PhhA
  hydroxylation of L-phenylalanine to L-tyrosine followed by homogentisate
  catabolism, and the CoA-dependent phenylacetate degradation pathway centered
  on phenylacetyl-CoA activation, epoxidation, ring opening, and beta-oxidation-
  like lower steps. The KEGG bucket also contains aminotransferases,
  DOPA/aromatic amino-acid decarboxylase, D-amino-acid dehydrogenases,
  catalase-peroxidase, and generic fatty-acid-like enzymes that should be
  curated as boundary context unless gene-level evidence supports a committed
  phenylalanine-catabolic role.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00360
    title: Phenylalanine metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00360 provides the PSEPK curation batch; it combines PhhA/hpd
      phenylalanine-to-tyrosine/homogentisate chemistry with the paa
      phenylacetate catabolic operon and several side-node spillovers.
  - source_id: GO:0006559
    title: L-phenylalanine catabolic process
    statement: The route is grounded in the GO process for L-phenylalanine breakdown.
  - source_id: GO:0010124
    title: phenylacetate catabolic process
    statement: >-
      The Paa branch is grounded in the GO process for phenylacetate
      degradation.
module:
  id: phenylalanine_metabolism
  label: L-phenylalanine metabolism and phenylacetate degradation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-phenylalanine catabolic process
      term:
        id: GO:0006559
        label: L-phenylalanine catabolic process
      description: Breakdown of L-phenylalanine.
    - preferred_term: phenylacetate catabolic process
      term:
        id: GO:0010124
        label: phenylacetate catabolic process
      description: Breakdown of phenylacetate through phenylacetyl-CoA.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most phenylalanine and phenylacetate catabolic enzymes in PSEPK are soluble cytoplasmic enzymes.
  parts:
    - order: 1
      role: Phenylalanine hydroxylation into the homogentisate route
      node:
        id: phha_homogentisate_entry
        label: PhhA and homogentisate-route entry
        module_type: METABOLIC_PATHWAY
        description: >-
          PhhA hydroxylates L-phenylalanine to L-tyrosine; aromatic
          aminotransferases and Hpd then feed carbon to homogentisate. The
          downstream HmgA/HmgC/HmgB steps are tracked in the tyrosine catabolism
          module and cross-covered here because phenylalanine enters through
          tyrosine.
        annotons:
          - id: phhA_phenylalanine_hydroxylase
            label: "phhA: phenylalanine 4-monooxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: phhA
            function:
              preferred_term: phenylalanine 4-monooxygenase activity
              term:
                id: GO:0004505
                label: phenylalanine 4-monooxygenase activity
            role_description: Converts L-phenylalanine to L-tyrosine.
          - id: hpd_4_hydroxyphenylpyruvate_dioxygenase
            label: "hpd: 4-hydroxyphenylpyruvate dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hpd
            function:
              preferred_term: 4-hydroxyphenylpyruvate dioxygenase activity
              term:
                id: GO:0003868
                label: 4-hydroxyphenylpyruvate dioxygenase activity
            role_description: Converts 4-hydroxyphenylpyruvate to homogentisate.
          - id: hmgA_homogentisate_dioxygenase_cross_context
            label: "hmgA: homogentisate 1,2-dioxygenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgA
            function:
              preferred_term: homogentisate 1,2-dioxygenase activity
              term:
                id: GO:0004411
                label: homogentisate 1,2-dioxygenase activity
            role_description: Downstream homogentisate ring-cleavage step shared with tyrosine catabolism.
          - id: hmgC_maleylacetoacetate_isomerase_cross_context
            label: "hmgC: maleylacetoacetate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgC
            function:
              preferred_term: maleylacetoacetate isomerase activity
              term:
                id: GO:0016034
                label: maleylacetoacetate isomerase activity
            role_description: Downstream homogentisate-route isomerase step shared with tyrosine catabolism.
          - id: hmgB_fumarylacetoacetase_cross_context
            label: "hmgB: fumarylacetoacetase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: hmgB
            function:
              preferred_term: fumarylacetoacetase activity
              term:
                id: GO:0004334
                label: fumarylacetoacetase activity
            role_description: Terminal homogentisate-route hydrolase step shared with tyrosine catabolism.
    - order: 2
      role: Phenylacetate activation and epoxidation
      node:
        id: paa_activation_epoxidation
        label: Phenylacetyl-CoA activation and ring epoxidation
        module_type: METABOLIC_PATHWAY
        description: >-
          PaaK activates phenylacetate to phenylacetyl-CoA, and the
          PaaABCDE oxygenase/epoxidase system introduces the first ring
          oxygenation step of aerobic phenylacetate degradation.
        annotons:
          - id: paaK_phenylacetate_coa_ligase
            label: "paaK: phenylacetate-CoA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaK
            function:
              preferred_term: phenylacetate-CoA ligase activity
              term:
                id: GO:0047475
                label: phenylacetate-CoA ligase activity
            role_description: Activates phenylacetate to phenylacetyl-CoA.
          - id: paaA_epoxidase_alpha_subunit
            label: "paaA: phenylacetyl-CoA epoxidase alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaA
            function:
              preferred_term: phenylacetyl-CoA 1,2-epoxidase activity
              term:
                id: GO:0097266
                label: phenylacetyl-CoA 1,2-epoxidase activity
            role_description: Catalytic alpha subunit of the phenylacetyl-CoA epoxidase complex.
          - id: paaB_epoxidase_regulatory_subunit
            label: "paaB: phenylacetyl-CoA epoxidase regulatory subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaB
            function:
              preferred_term: phenylacetyl-CoA 1,2-epoxidase activity
              term:
                id: GO:0097266
                label: phenylacetyl-CoA 1,2-epoxidase activity
            role_description: Regulatory subunit of the phenylacetyl-CoA epoxidase complex.
          - id: paaC_epoxidase_beta_subunit
            label: "paaC: phenylacetyl-CoA epoxidase beta subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaC
            function:
              preferred_term: phenylacetyl-CoA 1,2-epoxidase activity
              term:
                id: GO:0097266
                label: phenylacetyl-CoA 1,2-epoxidase activity
            role_description: Beta subunit of the phenylacetyl-CoA epoxidase complex.
          - id: paaD_epoxidase_accessory_subunit
            label: "paaD: phenylacetate degradation enzyme subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaD
            role_description: Accessory subunit of the phenylacetyl-CoA epoxidase/degradation enzyme complex.
          - id: paaE_epoxidase_reductase_subunit
            label: "paaE: phenylacetyl-CoA epoxidase reductase subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaE
            function:
              preferred_term: phenylacetyl-CoA 1,2-epoxidase activity
              term:
                id: GO:0097266
                label: phenylacetyl-CoA 1,2-epoxidase activity
            role_description: Reductase/electron-transfer subunit of the phenylacetyl-CoA epoxidase system.
    - order: 3
      role: Phenylacetate lower pathway and beta-oxidation-like steps
      node:
        id: paa_lower_pathway
        label: Phenylacetate lower pathway
        module_type: METABOLIC_PATHWAY
        description: >-
          PaaG, PaaZ, PaaH, PaaF, PaaJ, and PaaI process epoxidized/ring-opened
          phenylacetyl-CoA intermediates through hydrolase, dehydrogenase,
          hydratase/isomerase, thiolase, and thioesterase chemistry. Several of
          these terms overlap fatty-acid beta-oxidation and should be kept in
          phenylacetate context when the paa gene neighborhood supports it.
        annotons:
          - id: paaG_epoxyphenylacetyl_coa_isomerase
            label: "paaG: 1,2-epoxyphenylacetyl-CoA isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaG
            function:
              preferred_term: isomerase activity
              term:
                id: GO:0016853
                label: isomerase activity
            role_description: Isomerase step after phenylacetyl-CoA epoxidation.
          - id: paaZ_hydrolase_dehydrogenase
            label: "paaZ: oxepin-CoA hydrolase/semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaZ
            function:
              preferred_term: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor
              term:
                id: GO:0016620
                label: oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor
            role_description: Bifunctional hydrolase/dehydrogenase step in phenylacetate catabolism.
          - id: paaH_hydroxyacyl_coa_dehydrogenase
            label: "paaH: hydroxyacyl-CoA dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaH
            function:
              preferred_term: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
              term:
                id: GO:0003857
                label: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
            role_description: Paa lower-pathway hydroxyacyl-CoA dehydrogenase.
          - id: paaF_enoyl_coa_hydratase
            label: "paaF: enoyl-CoA hydratase/isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaF
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
            role_description: Paa lower-pathway hydratase/isomerase step.
          - id: paaJ_thiolase
            label: "paaJ: phenylacetate-pathway thiolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaJ
            function:
              preferred_term: 3-oxoadipyl-CoA thiolase activity
              term:
                id: GO:0033812
                label: 3-oxoadipyl-CoA thiolase activity
            role_description: Thiolase step shared with related aromatic CoA-catabolic routes.
          - id: paaI_acyl_coa_hydrolase
            label: "paaI: acyl-CoA hydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: paaI
            function:
              preferred_term: acyl-CoA hydrolase activity
              term:
                id: GO:0016289
                label: acyl-CoA hydrolase activity
            role_description: Thioesterase/hydrolase context in the Paa pathway.
    - order: 4
      role: KEGG ppu00360 boundary spillovers
      node:
        id: ppu00360_boundary_spillovers
        label: ppu00360 boundary and side-node context
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu00360 batch includes genes that are not strict Paa or
          PhhA/homogentisate steps: aminotransferases, PP_2552
          DOPA/aromatic-amino-acid decarboxylase, PeaE phenylacetaldehyde
          dehydrogenase, D-amino-acid dehydrogenases, catalase-peroxidase,
          generic enoyl-CoA hydratases, and auxin/tryptophan side chemistry.
          These should be retained as boundary context unless gene-level review
          establishes a direct phenylalanine-catabolic role.
  notes: >-
    This module intentionally overlaps with `tyrosine_catabolism` for the
    homogentisate downstream route and with `benzoate_degradation` for
    aromatic-CoA thiolase/lower-pathway context. For ppu00360 curation, the main
    new hole-filling target is the Paa phenylacetate operon around PP_3270 to
    PP_3284, not the already-curated hmgABC route.
