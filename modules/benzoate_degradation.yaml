id: MODULE:benzoate_degradation
title: Benzoate and beta-ketoadipate aromatic degradation
description: >-
  A taxon-neutral bacterial aromatic-catabolism module centered on the
  conversion of benzoate and related hydroxyaromatic compounds into catechol or
  protocatechuate, followed by ortho ring cleavage and beta-ketoadipate pathway
  reactions that funnel carbon to central metabolism. The module distinguishes
  the strict benzoate-to-catechol entry branch from the protocatechuate,
  gallate, and terminal beta-ketoadipate branches that commonly share pathway
  intermediates in Pseudomonas and related bacteria. Broad KEGG benzoate maps
  can also include phenylacetate, xylene, gallate, fatty-acid beta-oxidation,
  generic thiolase, cytochrome P450, and ferredoxin nodes; those are adjacent
  context unless their substrate-specific role is established for a given taxon.
status: DRAFT
evidence:
  - source_id: GO:0043639
    title: benzoate catabolic process
    statement: The module includes the benzoate catabolic route from benzoate through catechol.
  - source_id: GO:0042952
    title: beta-ketoadipate pathway
    statement: >-
      The catechol and protocatechuate ortho-cleavage branches converge on
      beta-ketoadipate-pathway chemistry that produces central-carbon entry
      metabolites.
  - source_id: KEGG:ppu00362
    title: Benzoate degradation - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00362 membership. The
      module separates strict benzoate/beta-ketoadipate reactions from broader
      aromatic and CoA-metabolism side nodes present in the organism-specific
      pathway map.
