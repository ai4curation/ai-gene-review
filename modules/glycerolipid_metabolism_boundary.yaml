id: MODULE:glycerolipid_metabolism_boundary
title: Glycerolipid metabolism boundary
description: >-
  Boundary module for KEGG ppu00561 in Pseudomonas putida KT2440. The
  organism-specific KEGG map combines bacterial glycerolipid and
  glycerophospholipid precursor synthesis, diacylglycerol recycling, glycerol
  entry into central metabolism, and several side nodes from alcohol,
  glycerate/hydroxypyruvate, and generic lipase metabolism. The module treats
  PlsX/PlsY/PlsB/PlsC/DgkA as the cell-envelope lipid core and keeps other
  genes as boundary context unless reviewed evidence supports a tighter
  glycerolipid role.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00561
    title: Glycerolipid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00561 provides the PSEPK curation batch. Its membership includes
      PlsX/PlsY/PlsB/PlsC phosphatidic-acid precursor enzymes, two DgkA
      diacylglycerol kinase paralogs, glycerol kinase GlpK, and several
      broader side-node enzymes.
module:
  id: glycerolipid_metabolism_boundary
  label: Glycerolipid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycerolipid metabolic process
      description: Broad KEGG map context for glycerolipid and glycerophospholipid metabolism.
    - preferred_term: phospholipid biosynthetic process
      term:
        id: GO:0008654
        label: phospholipid biosynthetic process
      description: Bacterial membrane phospholipid assembly context.
    - preferred_term: phosphatidic acid biosynthetic process
      term:
        id: GO:0006654
        label: phosphatidic acid biosynthetic process
      description: Formation of phosphatidic acid from glycerol-3-phosphate or lysophosphatidic acid precursors.
    - preferred_term: glycerol catabolic process
      term:
        id: GO:0019563
        label: glycerol catabolic process
      description: Glycerol entry via glycerol kinase before central-carbon metabolism.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Many glycerolipid and phospholipid enzymes in this batch are membrane-associated.
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble precursor enzymes such as PlsX and GlpK act in the cytoplasm.
  parts:
    - order: 1
      role: Glycerol entry and glycerol-3-phosphate supply
      node:
        id: glycerol_entry_glycerol_3_phosphate_supply
        label: Glycerol entry and glycerol-3-phosphate supply
        module_type: METABOLIC_PATHWAY
        description: >-
          GlpK phosphorylates glycerol to sn-glycerol 3-phosphate. In this
          ppu00561 batch it is glycerol-entry context and potential glycerol-3-P
          supply for lipid metabolism, while its reviewed core process remains
          glycerol catabolism.
        annotons:
          - id: glpK_glycerol_kinase_context
            label: "glpK: glycerol kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glpK
            function:
              preferred_term: glycerol kinase activity
              term:
                id: GO:0004370
                label: glycerol kinase activity
            role_description: Glycerol entry and glycerol-3-phosphate supply context.
    - order: 2
      role: Acyl-phosphate and lysophosphatidic acid formation
      node:
        id: acyl_phosphate_and_lpa_formation
        label: Acyl-phosphate and lysophosphatidic acid formation
        module_type: METABOLIC_PATHWAY
        description: >-
          PlsX generates acyl-phosphate from acyl-ACP, and PlsY transfers the
          acyl group to glycerol-3-phosphate to form lysophosphatidic acid in
          the bacterial PlsX/PlsY route.
        annotons:
          - id: plsX_phosphate_acyltransferase
            label: "plsX: phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsX
            role_description: Generates acyl-phosphate for PlsY-dependent phospholipid precursor synthesis.
          - id: plsY_glycerol_3_phosphate_acyltransferase
            label: "plsY: glycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsY
            function:
              preferred_term: glycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0004366
                label: glycerol-3-phosphate O-acyltransferase activity
            role_description: Membrane acyltransferase forming lysophosphatidic acid from glycerol-3-phosphate.
          - id: plsB_glycerol_3_phosphate_acyltransferase
            label: "plsB: glycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsB
            function:
              preferred_term: glycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0004366
                label: glycerol-3-phosphate O-acyltransferase activity
            role_description: Alternative glycerol-3-phosphate acyltransferase route to lysophosphatidic acid.
    - order: 3
      role: Phosphatidic acid formation and diacylglycerol recycling
      node:
        id: phosphatidic_acid_formation_and_dag_recycling
        label: Phosphatidic acid formation and diacylglycerol recycling
        module_type: METABOLIC_PATHWAY
        description: >-
          PlsC acylates lysophosphatidic acid to phosphatidic acid, while DgkA
          paralogs can phosphorylate diacylglycerol back to phosphatidic acid.
        annotons:
          - id: plsC_1_acylglycerol_3_phosphate_acyltransferase
            label: "plsC: 1-acylglycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: plsC
            function:
              preferred_term: 1-acylglycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0003841
                label: 1-acylglycerol-3-phosphate O-acyltransferase activity
            role_description: Converts lysophosphatidic acid to phosphatidic acid.
          - id: PP_0058_1_acylglycerol_3_phosphate_acyltransferase
            label: "PP_0058: candidate 1-acylglycerol-3-phosphate acyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_0058
            function:
              preferred_term: 1-acylglycerol-3-phosphate O-acyltransferase activity
              term:
                id: GO:0003841
                label: 1-acylglycerol-3-phosphate O-acyltransferase activity
            role_description: Candidate paralogous lysophosphatidic-acid acyltransferase.
          - id: dgkA_I_diacylglycerol_kinase
            label: "dgkA-I: diacylglycerol kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dgkA-I
            function:
              preferred_term: diacylglycerol kinase activity
              term:
                id: GO:0004143
                label: diacylglycerol kinase activity
            role_description: Diacylglycerol-to-phosphatidic-acid recycling candidate.
          - id: dgkA_II_diacylglycerol_kinase
            label: "dgkA-II: diacylglycerol kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dgkA-II
            function:
              preferred_term: diacylglycerol kinase activity
              term:
                id: GO:0004143
                label: diacylglycerol kinase activity
            role_description: Second diacylglycerol-to-phosphatidic-acid recycling candidate.
    - order: 4
      role: KEGG side nodes and uncertain lipid context
      node:
        id: glycerolipid_map_side_nodes
        label: Glycerolipid map side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00561 also includes side nodes from glycerate/hydroxypyruvate
          metabolism, aromatic alcohol dehydrogenation, and a generic lipase.
          These are reviewed as boundary context unless evidence supports a
          specific glycerolipid pathway role.
        annotons:
          - id: garK_glycerate_kinase_side_context
            label: "garK: glycerate kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: garK
            function:
              preferred_term: glycerate kinase activity
              term:
                id: GO:0008887
                label: glycerate kinase activity
            role_description: Glycerate/glyoxylate side node, not core bacterial glycerolipid assembly.
          - id: ttuD_hydroxypyruvate_reductase_side_context
            label: "ttuD: hydroxypyruvate reductase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ttuD
            function:
              preferred_term: hydroxypyruvate reductase [NAD(P)H] activity
              term:
                id: GO:0016618
                label: hydroxypyruvate reductase [NAD(P)H] activity
            role_description: Hydroxypyruvate/glycerate side node, not core bacterial glycerolipid assembly.
          - id: calA_coniferyl_alcohol_dehydrogenase_side_context
            label: "calA: coniferyl alcohol dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: calA
            function:
              preferred_term: coniferyl-alcohol dehydrogenase activity
              term:
                id: GO:0050268
                label: coniferyl-alcohol dehydrogenase activity
            role_description: Aromatic alcohol dehydrogenase side node, not core bacterial glycerolipid assembly.
          - id: lip_lipase_uncertain_context
            label: "lip: generic lipase candidate"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lip
            role_description: Generic lipase candidate with uncertain substrate and pathway placement.
  notes: >-
    This module is intentionally broad. It preserves the useful cell-envelope
    lipid interpretation of Pls/DgkA genes while preventing KEGG side-node genes
    from being counted as strict glycerolipid biosynthesis evidence without
    stronger substrate-specific support.
