id: MODULE:integrated_stress_response_boundary
title: Integrated stress response boundary
description: >-
  Boundary/absence module for KEGG ppu04156 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains groEL/PP_1361, dnaK/PP_4727, htpG/PP_4179,
  and PP_5211. These members support bacterial cytosolic heat-shock/proteostasis
  context plus glutathione gamma-glutamylcyclotransferase context, not a
  eukaryotic integrated stress response signaling pathway. The
  stress/detoxification cold/heat-shock spillover split also routes capB,
  cspA-I, ibpA, PP_3313, and PP_3314 here as bacterial cold-shock and small
  heat-shock side nodes.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04156
    title: Integrated stress response signaling pathway - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04156 provides the PSEPK curation batch, but the
      organism-specific membership is limited to GroEL, DnaK, HtpG, and PP_5211.
  - source_id: file:projects/P_PUTIDA/batches/ppu04156_integrated_stress_response_boundary.tsv
    title: ppu04156 first-pass batch table
    statement: >-
      The batch table records three bacterial stress/proteostasis chaperones and
      one glutathione-specific gamma-glutamylcyclotransferase as the candidate
      review rows for this KEGG bucket.
  - source_id: UniProtKB:Q88N55
    title: Chaperonin GroEL
    statement: >-
      UniProt describes groEL as the bacterial chaperonin GroEL/Cpn60 with EC
      5.6.1.7, chaperonin-family membership, and Cpn60/GroEL domains.
  - source_id: UniProtKB:Q88DU2
    title: Chaperone protein DnaK
    statement: >-
      UniProt describes dnaK as an Hsp70-family DnaK chaperone with conserved
      ATPase and peptide-binding domains.
  - source_id: UniProtKB:Q88FB9
    title: Chaperone protein HtpG
    statement: >-
      UniProt describes htpG as bacterial Hsp90/HtpG, a cytoplasmic
      ATP-dependent protein folding chaperone with ATPase activity.
  - source_id: UniProtKB:Q88CH0
    title: Glutathione-specific gamma-glutamylcyclotransferase
    statement: >-
      UniProt describes PP_5211 as a glutathione-specific
      gamma-glutamylcyclotransferase with EC 4.3.2.7.
  - source_id: file:PSEPK/groEL/groEL-ai-review.yaml
    title: Curated groEL review
    statement: >-
      The groEL review accepts ATP-dependent protein folding chaperone, protein
      folding, protein refolding, ATP binding, and cytoplasmic localization.
  - source_id: file:PSEPK/dnaK/dnaK-ai-review.yaml
    title: Curated dnaK review
    statement: >-
      The dnaK review accepts protein folding, ATP binding, ATP hydrolysis, and
      adds unfolded protein binding as the direct Hsp70 client-binding function.
  - source_id: file:PSEPK/htpG/htpG-ai-review.yaml
    title: Curated htpG review
    statement: >-
      The htpG review accepts ATP-dependent protein folding chaperone, ATP
      hydrolysis, protein folding, and cytoplasmic localization.
  - source_id: file:PSEPK/PP_5211/PP_5211-ai-review.yaml
    title: Curated PP_5211 review
    statement: >-
      The PP_5211 review accepts glutathione-specific
      gamma-glutamylcyclotransferase activity and glutathione catabolic process.
  - source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_cold_heat_shock_chaperone_spillovers.tsv
    title: Stress/detoxification cold/heat-shock spillover split
    statement: >-
      The stress/detoxification partition routes capB, cspA-I, ibpA, PP_3313,
      and PP_3314 to this bacterial stress/proteostasis boundary instead of
      treating them as a separate metabolic pathway.
  - source_id: file:PSEPK/capB/capB-ai-review.yaml
    title: Curated capB review
    statement: >-
      The capB review accepts nucleic acid binding and cytosolic/cytoplasmic
      localization from cold-shock-domain evidence without promoting a specific
      RNA target, DNA target, or transcription-process claim.
  - source_id: file:PSEPK/cspA-I/cspA-I-ai-review.yaml
    title: Curated cspA-I review
    statement: >-
      The cspA-I review accepts nucleic acid binding and cytosolic/cytoplasmic
      localization for this major cold-shock-domain protein.
  - source_id: file:PSEPK/ibpA/ibpA-ai-review.yaml
    title: Curated ibpA review
    statement: >-
      The ibpA review adds conservative unfolded protein binding for an
      HSP20-family small heat-shock/holdase candidate.
  - source_id: file:PSEPK/PP_3313/PP_3313-ai-review.yaml
    title: Curated PP_3313 review
    statement: >-
      The PP_3313 review accepts response to heat and adds conservative
      unfolded protein binding for an HSP20-family small heat-shock/holdase
      candidate.
  - source_id: file:PSEPK/PP_3314/PP_3314-ai-review.yaml
    title: Curated PP_3314 review
    statement: >-
      The PP_3314 review adds conservative unfolded protein binding for an
      HSP20-family small heat-shock/holdase candidate.
module:
  id: integrated_stress_response_boundary
  label: Integrated stress response boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: integrated stress response signaling pathway absence
      description: >-
        Boundary interpretation of the KEGG map: KT2440 is a bacterium and the
        ppu04156 members are cytosolic chaperones or glutathione turnover
        enzymes, not eukaryotic eIF2/ISR signaling components.
    - preferred_term: ATP-dependent protein folding chaperone
      term:
        id: GO:0140662
        label: ATP-dependent protein folding chaperone
      description: Direct molecular function for GroEL and HtpG chaperone activity.
    - preferred_term: protein refolding
      term:
        id: GO:0042026
        label: protein refolding
      description: Stress-recovery process captured for GroEL.
    - preferred_term: protein folding
      term:
        id: GO:0006457
        label: protein folding
      description: Bacterial proteostasis context for GroEL, DnaK, and HtpG.
    - preferred_term: nucleic acid binding
      term:
        id: GO:0003676
        label: nucleic acid binding
      description: >-
        Conservative molecular function for capB and cspA-I cold-shock-domain
        proteins where specific RNA or DNA targets are unresolved.
    - preferred_term: unfolded protein binding
      term:
        id: GO:0051082
        label: unfolded protein binding
      description: >-
        Client/substrate binding function for DnaK and conservative holdase
        context for HSP20-family small heat-shock proteins.
    - preferred_term: response to heat
      term:
        id: GO:0009408
        label: response to heat
      description: Heat-stress process context for PP_3313 and related heat-shock proteins.
    - preferred_term: ATP hydrolysis activity
      term:
        id: GO:0016887
        label: ATP hydrolysis activity
      description: ATPase activity driving DnaK and HtpG chaperone cycles.
    - preferred_term: glutathione specific gamma-glutamylcyclotransferase activity
      term:
        id: GO:0061928
        label: glutathione specific gamma-glutamylcyclotransferase activity
      description: Core PP_5211 catalytic function in glutathione catabolism.
    - preferred_term: glutathione catabolic process
      term:
        id: GO:0006751
        label: glutathione catabolic process
      description: Supported biological-process context for PP_5211.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: ppu04156 members are treated as bacterial cytosolic proteins.
      - preferred_term: bacterial cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Supported localization for capB and cspA-I cold-shock-domain proteins.
  parts:
    - order: 1
      role: Integrated-stress-response pathway absence
      node:
        id: integrated_stress_response_absence
        label: Integrated stress response signaling absence in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 lacks the eukaryotic integrated stress response
          signaling architecture. The ppu04156 membership is treated as KEGG
          cross-map context around conserved stress and glutathione nodes rather
          than as a satisfiable ISR signaling pathway.
        annotons: []
    - order: 2
      role: GroEL chaperonin proteostasis node
      node:
        id: groEL_chaperonin
        label: GroEL chaperonin folding and refolding
        module_type: MOLECULAR_FUNCTION
        description: >-
          groEL encodes the bacterial Cpn60/GroEL chaperonin that promotes
          folding and refolding of non-native cytosolic proteins through an
          ATP-dependent chaperonin cycle.
        annotons:
          - id: groEL_atp_dependent_chaperonin
            label: "groEL: ATP-dependent chaperonin"
            participant:
              selector_type: GENE
              gene:
                preferred_term: groEL
            function:
              preferred_term: ATP-dependent protein folding chaperone
              term:
                id: GO:0140662
                label: ATP-dependent protein folding chaperone
              substrates:
                - preferred_term: non-native client protein
              cofactors:
                - preferred_term: ATP
            processes:
              - preferred_term: protein folding
                term:
                  id: GO:0006457
                  label: protein folding
              - preferred_term: protein refolding
                term:
                  id: GO:0042026
                  label: protein refolding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Bacterial chaperonin/proteostasis node; not eukaryotic ISR signaling.
    - order: 3
      role: DnaK/HtpG chaperone proteostasis nodes
      node:
        id: dnak_htpg_chaperone_context
        label: DnaK and HtpG cytosolic chaperone context
        module_type: BIOLOGICAL_PROCESS
        description: >-
          dnaK encodes the Hsp70-family DnaK chaperone and htpG encodes the
          bacterial Hsp90-family chaperone. Both belong with bacterial
          cytosolic protein quality control and stress-responsive proteostasis.
        annotons:
          - id: dnaK_unfolded_protein_binding
            label: "dnaK: Hsp70 unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaK
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            processes:
              - preferred_term: protein folding
                term:
                  id: GO:0006457
                  label: protein folding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Hsp70-family client-binding chaperone activity.
          - id: dnaK_atpase_activity
            label: "dnaK: chaperone ATPase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaK
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
              substrates:
                - preferred_term: ATP
              products:
                - preferred_term: ADP
                - preferred_term: phosphate
            role_description: ATPase cycle supporting DnaK substrate capture and release.
          - id: htpG_atp_dependent_chaperone
            label: "htpG: ATP-dependent Hsp90-family chaperone"
            participant:
              selector_type: GENE
              gene:
                preferred_term: htpG
            function:
              preferred_term: ATP-dependent protein folding chaperone
              term:
                id: GO:0140662
                label: ATP-dependent protein folding chaperone
              substrates:
                - preferred_term: non-native client protein
              cofactors:
                - preferred_term: ATP
            processes:
              - preferred_term: protein folding
                term:
                  id: GO:0006457
                  label: protein folding
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Bacterial Hsp90/HtpG chaperone; this gene is primary in ppu04141 and a side member here.
    - order: 4
      role: Glutathione turnover side node
      node:
        id: pp5211_glutathione_turnover
        label: PP_5211 glutathione gamma-glutamylcyclotransferase
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_5211 is a glutathione-specific gamma-glutamylcyclotransferase and
          belongs with glutathione catabolism/turnover. It is also represented
          in the broader glutathione metabolism boundary module.
        annotons:
          - id: PP_5211_gamma_glutamylcyclotransferase
            label: "PP_5211: glutathione-specific gamma-glutamylcyclotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_5211
            function:
              preferred_term: glutathione specific gamma-glutamylcyclotransferase activity
              term:
                id: GO:0061928
                label: glutathione specific gamma-glutamylcyclotransferase activity
              substrates:
                - preferred_term: glutathione
            processes:
              - preferred_term: glutathione catabolic process
                term:
                  id: GO:0006751
                  label: glutathione catabolic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Glutathione catabolic side node; not an ISR signaling component.
    - order: 5
      role: Cold-shock nucleic-acid-binding side nodes
      node:
        id: cold_shock_domain_side_nodes
        label: Cold-shock-domain nucleic-acid-binding proteins
        module_type: MOLECULAR_FUNCTION
        description: >-
          capB and cspA-I are small CspA-like cold-shock-domain proteins with
          OB-fold/CSD evidence for nucleic acid binding. The first-pass reviews
          keep the function at the conservative nucleic-acid-binding level
          because specific RNA or DNA targets and any direct transcriptional
          role are not resolved.
        annotons:
          - id: capB_cold_shock_nucleic_acid_binding
            label: "capB: cold-shock-domain nucleic acid binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: capB
            function:
              preferred_term: nucleic acid binding
              term:
                id: GO:0003676
                label: nucleic acid binding
              substrates:
                - preferred_term: nucleic acid
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Cold-shock-domain side node; not eukaryotic ISR signaling.
          - id: cspA-I_cold_shock_nucleic_acid_binding
            label: "cspA-I: cold-shock-domain nucleic acid binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: cspA-I
            function:
              preferred_term: nucleic acid binding
              term:
                id: GO:0003676
                label: nucleic acid binding
              substrates:
                - preferred_term: nucleic acid
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Cold-shock-domain side node; not eukaryotic ISR signaling.
    - order: 6
      role: HSP20-family small heat-shock holdase side nodes
      node:
        id: hsp20_holdase_side_nodes
        label: HSP20-family small heat-shock proteins
        module_type: MOLECULAR_FUNCTION
        description: >-
          ibpA, PP_3313, and PP_3314 are predicted HSP20-family small
          heat-shock proteins. The conservative first-pass call is
          unfolded-protein binding/holdase chaperone context; specific client
          proteins remain unresolved.
        annotons:
          - id: ibpA_hsp20_unfolded_protein_binding
            label: "ibpA: HSP20-family unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ibpA
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            role_description: Predicted small heat-shock holdase side node; not eukaryotic ISR signaling.
          - id: PP_3313_hsp20_unfolded_protein_binding
            label: "PP_3313: HSP20-family unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3313
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            processes:
              - preferred_term: response to heat
                term:
                  id: GO:0009408
                  label: response to heat
            role_description: Predicted small heat-shock holdase side node; not eukaryotic ISR signaling.
          - id: PP_3314_hsp20_unfolded_protein_binding
            label: "PP_3314: HSP20-family unfolded protein binding"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_3314
            function:
              preferred_term: unfolded protein binding
              term:
                id: GO:0051082
                label: unfolded protein binding
              substrates:
                - preferred_term: unfolded or non-native protein
            role_description: Predicted small heat-shock holdase side node; not eukaryotic ISR signaling.
  notes: >-
    This module records an explicit boundary/absence call. The PSEPK members
    belong with bacterial cytosolic proteostasis, cold-shock nucleic-acid
    binding, small heat-shock holdase context, or glutathione turnover biology;
    no integrated-stress-response signaling GO annotation is proposed for any
    KT2440 gene.
