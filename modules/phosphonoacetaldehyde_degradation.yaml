id: MODULE:phosphonoacetaldehyde_degradation
title: 2-aminoethylphosphonate degradation through phosphonoacetaldehyde
description: >-
  Species-neutral bacterial module for the PhnW/PhnX route of
  2-aminoethylphosphonate degradation. PhnW first transaminates
  2-aminoethylphosphonate with pyruvate to generate phosphonoacetaldehyde and
  L-alanine. PhnX then hydrolyzes phosphonoacetaldehyde, cleaving the carbon-
  phosphorus bond to yield acetaldehyde and inorganic phosphate. The module
  excludes unrelated C-P lyase systems and phosphonatase-family enzymes whose
  characterized substrates are not phosphonoacetaldehyde.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: KEGG:ppu00440
    title: Pseudomonas putida KT2440 phosphonate and phosphinate metabolism
    statement: >-
      The local PSEPK pathway partition assigns phnX/PP_2208 and phnW/PP_2209
      as the two primary genes in the compact ppu00440 phosphonate bucket.
  - source_id: file:PSEPK/phnW/phnW-uniprot.txt
    title: UniProtKB entry for PSEPK phnW
    statement: >-
      Q88KT0 is a reviewed 2-aminoethylphosphonate--pyruvate transaminase with
      the Rhea reaction producing phosphonoacetaldehyde and L-alanine.
  - source_id: file:PSEPK/phnX/phnX-uniprot.txt
    title: UniProtKB entry for PSEPK phnX
    statement: >-
      Q88KT1 is a reviewed phosphonoacetaldehyde hydrolase/phosphonatase with
      the Rhea reaction producing acetaldehyde, phosphate, and a proton.
notes: >-
  First-pass PSEPK interpretation: phnW and phnX form a coherent two-step AEP
  degradation module. Automated DNA-repair and phosphoglycolate-phosphatase
  labels on phnX should not be propagated into the pathway interpretation.
