knowledge_gaps:
  - gap_statement: Role of ATP in RIG-I activation remains unresolved in the RIG-I signaling pathway
      module.
    boundary: Contradicting conclusions have been reached regarding whether ATP hydrolysis is 
      required for CARD ejection from the autoinhibited state. Recent NMR studies support a model in
      which RNA binding, rather than ATP, is the primary driver of CARD release, with ATP providing 
      proofreading rather than activation per se (sikorska2024recentdevelopmentsin pages 3-6, 
      sikorska2024recentdevelopmentsin pages 1-3).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rig_i_signaling-deep-research-falcon.md
  - gap_statement: TRIM25 versus RIPLET hierarchy remains unresolved in the RIG-I signaling pathway 
      module.
    boundary: The relative contributions of TRIM25 and RIPLET to RIG-I activation remain 
      contentious. Some studies indicate RIPLET is required for endogenous RIG-I-dependent responses
      while TRIM25's contribution is more context-dependent (burkart2022kineticcharacterizationand 
      pages 130-132).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rig_i_signaling-deep-research-falcon.md
  - gap_statement: MAVS aggregation regulation remains unresolved in the RIG-I signaling pathway 
      module.
    boundary: While prion-like MAVS aggregation is well established, the molecular checkpoint that 
      permits or prevents this switch remains incompletely understood.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rig_i_signaling-deep-research-falcon.md
  - gap_statement: Compartment-specific MAVS functions remains unresolved in the RIG-I signaling 
      pathway module.
    boundary: The finding that peroxisomal MAVS drives type III IFN while MAM-associated MAVS drives
      type I IFN is paradigm-shifting but requires validation across cell types and in vivo models 
      (he2023mavsintegratesglucose pages 1-2, huizen2025therigilikereceptor pages 11-12).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rig_i_signaling-deep-research-falcon.md
  - gap_statement: Self-RNA recognition and autoimmunity remains unresolved in the RIG-I signaling 
      pathway module.
    boundary: The discovery that RIG-I can recognize metabolite-capped RNAs, endogenous Pol III 
      transcripts, and mitochondrial RNA under certain conditions raises fundamental questions about
      the boundary between antiviral defense and autoinflammatory disease 
      (solotchi2024proofreadingmechanismsof pages 12-14).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/rig_i_signaling-deep-research-falcon.md
  - gap_statement: Metabolic integration remains unresolved in the RIG-I signaling pathway module.
    boundary: The coupling of MAVS signaling to glucose metabolism-including the shift from 
      glycolysis to PPP and HBP-represents an emerging and incompletely understood dimension.
