id: MODULE:vitamin_b6_metabolism
title: Vitamin B6 metabolism
description: >-
  A bacterial vitamin B6 metabolism module covering DXP-dependent de novo
  formation of pyridoxine 5'-phosphate, oxidation to pyridoxal 5'-phosphate,
  and salvage phosphorylation of B6 vitamers. In Pseudomonas putida KT2440,
  KEGG ppu00750 also includes shared precursor and amino-acid-metabolism nodes;
  those are treated as boundary context unless they directly make or salvage
  pyridoxal 5'-phosphate.
status: DRAFT
evidence:
  - source_id: GO:0042823
    title: pyridoxal 5'-phosphate biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for formation of
      pyridoxal 5'-phosphate, the active vitamin B6 cofactor.
  - source_id: GO:0008615
    title: pyridoxine biosynthetic process
    statement: >-
      The PdxA/PdxB/PdxJ branch forms pyridoxine 5'-phosphate as the immediate
      precursor of pyridoxal 5'-phosphate in the de novo pathway.
  - source_id: GO:0009443
    title: pyridoxal 5'-phosphate salvage
    statement: >-
      Salvage phosphorylation by pyridoxal kinase interconverts B6 vitamers and
      supports PLP homeostasis.
  - source_id: KEGG:ppu00750
    title: Vitamin B6 metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set but is broader
      than strict de novo PLP formation and salvage.
  - source_id: UniPathway:UPA00244
    title: Pyridoxal 5'-phosphate biosynthesis
    statement: >-
      UniPathway UPA00244 cross-references the PdxA/PdxB/PdxJ de novo pathway
      candidates.
  - source_id: UniPathway:UPA01068
    title: Pyridoxal 5'-phosphate salvage
    statement: >-
      UniPathway UPA01068 cross-references PdxH/PdxY salvage and oxidation
      candidates.
  - source_id: file:modules/vitamin_b6_metabolism-deep-research-falcon.md
    title: Falcon module-level research for vitamin B6 metabolism
    statement: >-
      Falcon module research supports the DXP-dependent bacterial de novo PLP
      pathway structure and the distinction between committed B6 enzymes and
      broader PLP-dependent amino-acid metabolism.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__vitamin_b6_metabolism__ppu00750-deep-research-falcon.md
    title: Falcon species-aware research for PSEPK ppu00750 vitamin B6 metabolism
    statement: >-
      Species-aware Falcon research for Pseudomonas putida KT2440 supports epd,
      pdxB, serC, pdxA, pdxJ, and pdxH as the de novo PLP route, with pdxY as
      salvage and thrC/PP_0662 as boundary context.
module:
  id: vitamin_b6_metabolism
  label: Vitamin B6 metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyridoxal 5'-phosphate biosynthetic process
      term:
        id: GO:0042823
        label: pyridoxal 5'-phosphate biosynthetic process
      description: Biosynthesis of pyridoxal 5'-phosphate, the active vitamin B6 cofactor.
    - preferred_term: pyridoxine biosynthetic process
      term:
        id: GO:0008615
        label: pyridoxine biosynthetic process
      description: Biosynthesis of pyridoxine and phosphorylated pyridoxine intermediates.
    - preferred_term: pyridoxal 5'-phosphate salvage
      term:
        id: GO:0009443
        label: pyridoxal 5'-phosphate salvage
      description: Salvage and phosphorylation of vitamin B6 vitamers.
  parts:
    - order: 1
      role: de novo pyridoxine 5'-phosphate formation
      node:
        id: de_novo_pnp_formation
        label: De novo pyridoxine phosphate formation
        module_type: METABOLIC_PATHWAY
        description: >-
          The DXP-dependent bacterial de novo branch uses Epd, PdxB, SerC, PdxA,
          and PdxJ to form pyridoxine 5'-phosphate from erythrose-derived and
          threonine-phosphate-derived precursors.
        annotons:
          - id: epd_erythrose_phosphate_dehydrogenase
            label: Epd erythrose-4-phosphate dehydrogenase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK epd
                term:
                  id: UniProtKB:Q88D63
                  label: Erythrose-4-phosphate dehydrogenase
            function:
              preferred_term: erythrose-4-phosphate dehydrogenase activity
              term:
                id: GO:0048001
                label: erythrose-4-phosphate dehydrogenase activity
              substrates:
                - preferred_term: D-erythrose 4-phosphate
                - preferred_term: NAD+
              products:
                - preferred_term: 4-phospho-D-erythronate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.2.1.72
                  statement: erythrose-4-phosphate dehydrogenase
            role_description: Canonical first DXP-dependent PLP pathway step; supplies 4-phosphoerythronate.
          - id: pdxB_erythronate_phosphate_dehydrogenase
            label: PdxB 4-phosphoerythronate dehydrogenase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pdxB
                term:
                  id: UniProtKB:Q88L20
                  label: Erythronate-4-phosphate dehydrogenase
            function:
              preferred_term: 4-phosphoerythronate dehydrogenase activity
              term:
                id: GO:0033711
                label: 4-phosphoerythronate dehydrogenase activity
              substrates:
                - preferred_term: 4-phospho-D-erythronate
                - preferred_term: NAD+
              products:
                - preferred_term: 2-oxo-3-hydroxy-4-phosphobutanoate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.290
                  statement: erythronate-4-phosphate dehydrogenase
            role_description: Supplies 2-oxo-3-hydroxy-4-phosphobutanoate for the SerC transamination step.
          - id: serC_phosphoserine_aminotransferase
            label: SerC phosphoserine aminotransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK serC
                term:
                  id: UniProtKB:Q88M07
                  label: Phosphoserine aminotransferase
            function:
              preferred_term: O-phospho-L-serine:2-oxoglutarate transaminase activity
              term:
                id: GO:0004648
                label: O-phospho-L-serine:2-oxoglutarate transaminase activity
              substrates:
                - preferred_term: 2-oxo-3-hydroxy-4-phosphobutanoate
                - preferred_term: L-glutamate
              products:
                - preferred_term: 4-phosphohydroxy-L-threonine
                - preferred_term: 2-oxoglutarate
              evidence:
                - source_id: EC:2.6.1.52
                  statement: phosphoserine aminotransferase
            role_description: Shared serine/PLP transaminase step; core here but not B6-specific.
          - id: pdxA_hydroxythreonine_phosphate_dehydrogenase
            label: PdxA 4-hydroxythreonine-4-phosphate dehydrogenase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pdxA
                term:
                  id: UniProtKB:Q88QT5
                  label: 4-hydroxythreonine-4-phosphate dehydrogenase
            function:
              preferred_term: 4-hydroxythreonine-4-phosphate dehydrogenase activity
              term:
                id: GO:0050570
                label: 4-hydroxythreonine-4-phosphate dehydrogenase activity
              substrates:
                - preferred_term: 4-hydroxy-L-threonine 4-phosphate
                - preferred_term: NAD+
              products:
                - preferred_term: 2-amino-3-oxo-4-phosphonooxybutyrate
                - preferred_term: NADH
              evidence:
                - source_id: EC:1.1.1.262
                  statement: 4-hydroxythreonine-4-phosphate dehydrogenase
            role_description: Supplies the oxidized threonine-phosphate-derived substrate for PdxJ.
          - id: pdxJ_pyridoxine_phosphate_synthase
            label: PdxJ pyridoxine 5'-phosphate synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pdxJ
                term:
                  id: UniProtKB:Q88MY2
                  label: Pyridoxine 5'-phosphate synthase
            function:
              preferred_term: pyridoxine 5'-phosphate synthase activity
              term:
                id: GO:0033856
                label: pyridoxine 5'-phosphate synthase activity
              products:
                - preferred_term: pyridoxine 5'-phosphate
              evidence:
                - source_id: EC:2.6.99.2
                  statement: pyridoxine 5'-phosphate synthase
            role_description: Condenses the branch intermediates to form pyridoxine 5'-phosphate.
    - order: 2
      role: pyridoxal 5'-phosphate formation
      node:
        id: pnp_to_plp
        label: Pyridoxine phosphate oxidation
        module_type: REACTION
        description: >-
          PdxH oxidizes pyridoxine 5'-phosphate and pyridoxamine 5'-phosphate
          to pyridoxal 5'-phosphate.
        annotons:
          - id: pdxH_pyridoxamine_phosphate_oxidase
            label: PdxH pyridoxamine phosphate oxidase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pdxH
                term:
                  id: UniProtKB:Q88NS5
                  label: Pyridoxine/pyridoxamine 5'-phosphate oxidase
            function:
              preferred_term: pyridoxamine phosphate oxidase activity
              term:
                id: GO:0004733
                label: pyridoxamine phosphate oxidase activity
              substrates:
                - preferred_term: pyridoxine 5'-phosphate
                - preferred_term: pyridoxamine 5'-phosphate
              products:
                - preferred_term: pyridoxal 5'-phosphate
              evidence:
                - source_id: EC:1.4.3.5
                  statement: pyridoxine/pyridoxamine 5'-phosphate oxidase
            role_description: Final oxidation step to the active PLP cofactor.
    - order: 3
      role: vitamin B6 salvage phosphorylation
      node:
        id: b6_salvage_phosphorylation
        label: Vitamin B6 salvage phosphorylation
        module_type: REACTION
        description: >-
          PdxY phosphorylates pyridoxal and related vitamers, supporting
          pyridoxal 5'-phosphate salvage and homeostasis.
        annotons:
          - id: pdxY_pyridoxal_kinase
            label: PdxY pyridoxal kinase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK pdxY
                term:
                  id: UniProtKB:Q88C26
                  label: Pyridoxal kinase PdxY
            function:
              preferred_term: pyridoxal kinase activity
              term:
                id: GO:0008478
                label: pyridoxal kinase activity
              substrates:
                - preferred_term: pyridoxal
                - preferred_term: ATP
              products:
                - preferred_term: pyridoxal 5'-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.35
                  statement: pyridoxal kinase
            role_description: Salvage phosphorylation of vitamin B6 vitamers.
    - order: 4
      role: precursor and amino-acid side context
      node:
        id: precursor_boundary_context
        label: Precursor-side and PLP-enzyme context
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00750 includes threonine synthase-like and PLP-dependent
          amino-acid enzymes. They are useful boundary context but should not,
          by themselves, satisfy de novo PLP formation or B6 salvage.
        annotons:
          - id: thrC_threonine_synthase
            label: ThrC threonine synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK thrC
                term:
                  id: UniProtKB:Q88MU7
                  label: Threonine synthase
            function:
              preferred_term: threonine synthase activity
              term:
                id: GO:0004795
                label: threonine synthase activity
              evidence:
                - source_id: EC:4.2.3.1
                  statement: threonine synthase
            role_description: Amino-acid biosynthesis and PLP-dependent enzyme context.
          - id: pp_0662_threonine_synthase_candidate
            label: PP_0662 threonine synthase candidate
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK PP_0662
                term:
                  id: UniProtKB:Q88Q36
                  label: Threonine synthase
            function:
              preferred_term: threonine synthase activity
              term:
                id: GO:0004795
                label: threonine synthase activity
              evidence:
                - source_id: KEGG:ppu00750
                  statement: PP_0662 is included in the PSEPK vitamin B6 metabolism map as a threonine synthase-like candidate.
            role_description: Candidate threonine synthase/PLP-enzyme context requiring gene-level curation.
  notes: >-
    The strict PLP-forming module is satisfiable in Pseudomonas putida KT2440
    through epd, pdxB, serC, pdxA, pdxJ, and pdxH, with pdxY covering pyridoxal
    salvage phosphorylation. thrC and PP_0662 are retained as threonine
    synthase/PLP-enzyme boundary context and should not be counted as committed
    B6 biosynthetic steps. Dxs supplies the DXP boundary precursor but is shared
    with thiamine and MEP metabolism; no obvious PdxK-like broader B6 kinase was
    found in the local first-pass metadata.
