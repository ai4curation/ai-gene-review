id: MODULE:leucine_catabolism
title: L-leucine catabolism (isovaleryl-CoA to acetoacetate + acetyl-CoA)
description: >-
  The distal, leucine-specific arm of branched-chain amino acid catabolism,
  operating in the mitochondrial matrix, which degrades the isovaleryl-CoA
  produced from leucine (via transamination by BCAT2 and oxidative decarboxylation
  by the BCKDH complex) to the ketogenic end-products acetoacetate and acetyl-CoA.
  Four steps: isovaleryl-CoA dehydrogenase (IVD), an FAD-dependent acyl-CoA
  dehydrogenase, dehydrogenates isovaleryl-CoA to 3-methylcrotonyl-CoA (electrons
  to ETF); the biotin-dependent 3-methylcrotonyl-CoA carboxylase (MCC), an
  alpha6-beta6 dodecamer of MCCC1 (biotin carboxylase alpha) and MCCC2
  (carboxyltransferase beta), carboxylates 3-methylcrotonyl-CoA to
  3-methylglutaconyl-CoA using bicarbonate and ATP; 3-methylglutaconyl-CoA
  hydratase (AUH) hydrates this to (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA);
  and HMG-CoA lyase (HMGCL) cleaves HMG-CoA to acetoacetate + acetyl-CoA. The
  final HMGCL step is shared with ketogenesis (the pathway that makes ketone
  bodies from acetyl-CoA), so leucine catabolism feeds directly into the
  ketone-body pool. Inherited defects define a series of organic acidemias:
  IVD → isovaleric acidemia; MCCC1/MCCC2 → 3-methylcrotonyl-CoA carboxylase
  deficiency (a common, often benign newborn-screening finding); AUH →
  3-methylglutaconic aciduria type I; and HMGCL → HMG-CoA lyase deficiency
  (hypoketotic hypoglycemia, because both leucine degradation and ketogenesis are
  blocked).
status: DRAFT
evidence:
  - source_id: GO:0006552
    title: L-leucine catabolic process
    statement: >-
      The module is grounded in the GO L-leucine catabolic process (GO:0006552);
      every step is annotated within it.
  - source_id: Reactome:R-HSA-70895
    title: Branched-chain amino acid catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      branched-chain amino acid catabolism reactions R-HSA-70745 (IVD),
      R-HSA-70773 (MCC), R-HSA-70785 (AUH) and R-HSA-74180 (HMGCL).
  - source_id: file:human/IVD/IVD-ai-review.yaml
    title: IVD gene review (human)
    statement: >-
      The IVD step grounding (UniProtKB:P26440, GO:0008470 isovaleryl-CoA
      dehydrogenase activity) matches the completed human IVD review.
  - source_id: file:human/MCCC1/MCCC1-ai-review.yaml
    title: MCCC1 gene review (human)
    statement: >-
      The MCC alpha-subunit grounding (UniProtKB:Q96RQ3, GO:0004485
      methylcrotonoyl-CoA carboxylase activity, complex GO:1905202) matches the
      completed human MCCC1 review.
  - source_id: file:human/MCCC2/MCCC2-ai-review.yaml
    title: MCCC2 gene review (human)
    statement: >-
      The MCC beta-subunit grounding (UniProtKB:Q9HCC0, GO:0004485, complex
      GO:1905202) matches the completed human MCCC2 review.
  - source_id: file:human/AUH/AUH-ai-review.yaml
    title: AUH gene review (human)
    statement: >-
      The hydratase step grounding (UniProtKB:Q13825, GO:0004490
      methylglutaconyl-CoA hydratase activity) matches the completed human AUH
      review (which also captures AUH's moonlighting ARE-RNA-binding role).
  - source_id: file:human/HMGCL/HMGCL-ai-review.yaml
    title: HMGCL gene review (human)
    statement: >-
      The lyase step grounding (UniProtKB:P35914, GO:0004419 hydroxymethylglutaryl-CoA
      lyase activity) matches the completed human HMGCL review (shared with ketogenesis).
module:
  id: leucine_catabolism
  label: L-leucine catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-leucine catabolic process
      term:
        id: GO:0006552
        label: L-leucine catabolic process
      description: >-
        Degradation of leucine-derived isovaleryl-CoA to acetoacetate and
        acetyl-CoA, the leucine-specific distal arm of BCAA catabolism.
  context:
    cellular_components:
      - preferred_term: mitochondrial matrix
        term:
          id: GO:0005759
          label: mitochondrial matrix
        description: Compartment of all four steps.
  parts:
    - order: 1
      role: FAD-dependent dehydrogenation
      node:
        id: ivd_step
        label: isovaleryl-CoA + FAD to 3-methylcrotonyl-CoA + FADH2
        module_type: REACTION
        annotons:
          - id: ivd_activity
            label: "IVD: isovaleryl-CoA dehydrogenase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Acyl-CoA dehydrogenase family, isovaleryl-CoA subfamily (IVD)
                term:
                  id: PANTHER:PTHR43884
                  label: ACYL-COA DEHYDROGENASE
                representative_members:
                  - preferred_term: IVD (human)
                    term:
                      id: UniProtKB:P26440
                      label: Isovaleryl-CoA dehydrogenase, mitochondrial
            function:
              preferred_term: isovaleryl-CoA dehydrogenase activity
              term:
                id: GO:0008470
                label: isovaleryl-CoA dehydrogenase activity
              substrates:
                - preferred_term: isovaleryl-CoA (3-methylbutanoyl-CoA)
                - preferred_term: FAD
              products:
                - preferred_term: 3-methylcrotonyl-CoA
                - preferred_term: FADH2
              evidence:
                - source_id: EC:1.3.8.4
                  statement: isovaleryl-CoA dehydrogenase (FAD, ETF-linked)
                - source_id: Reactome:R-HSA-70745
                  statement: "isovaleryl-CoA + FAD => beta-methylcrotonyl-CoA + FADH2 (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              FAD-dependent homotetrameric acyl-CoA dehydrogenase; passes electrons
              to the electron-transfer flavoprotein (ETF). Deficiency causes
              isovaleric acidemia, the first-described organic acidemia.
    - order: 2
      role: biotin-dependent carboxylation (multienzyme complex)
      node:
        id: mcc_step
        label: 3-methylcrotonyl-CoA + HCO3- + ATP to 3-methylglutaconyl-CoA + ADP + Pi
        module_type: PROTEIN_COMPLEX
        annotons:
          - id: mccc1_activity
            label: "MCCC1: 3-methylcrotonyl-CoA carboxylase alpha (biotin carboxylase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biotin-dependent carboxylase alpha/biotin-carboxylase family (MCCC1)
                term:
                  id: PANTHER:PTHR18866
                  label: "CARBOXYLASE:PYRUVATE/ACETYL-COA/PROPIONYL-COA CARBOXYLASE"
                representative_members:
                  - preferred_term: MCCC1 (human)
                    term:
                      id: UniProtKB:Q96RQ3
                      label: Methylcrotonoyl-CoA carboxylase subunit alpha, mitochondrial
            function:
              preferred_term: methylcrotonoyl-CoA carboxylase activity
              term:
                id: GO:0004485
                label: methylcrotonoyl-CoA carboxylase activity
              substrates:
                - preferred_term: 3-methylcrotonyl-CoA
                - preferred_term: hydrogencarbonate
                - preferred_term: ATP
                - preferred_term: biotin (covalent cofactor)
              products:
                - preferred_term: 3-methylglutaconyl-CoA
                - preferred_term: ADP
                - preferred_term: phosphate
              evidence:
                - source_id: EC:6.4.1.4
                  statement: methylcrotonoyl-CoA carboxylase; biotin carboxylase + BCCP alpha subunit
                - source_id: Reactome:R-HSA-70773
                  statement: "beta-methylcrotonyl-CoA + ATP + HCO3- <=> beta-methylglutaconyl-CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Biotin-carrying alpha subunit of the alpha6-beta6 MCC dodecamer:
              ATP-dependently carboxylates biotin, which then carboxylates
              3-methylcrotonyl-CoA (via MCCC2). Loss of function causes 3-MCC deficiency.
          - id: mccc2_activity
            label: "MCCC2: 3-methylcrotonyl-CoA carboxylase beta (carboxyltransferase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Carboxyltransferase (acetyl/propionyl/methylcrotonyl carboxylase beta) family (MCCC2)
                term:
                  id: PANTHER:PTHR22855
                  label: "ACETYL, PROPIONYL, PYRUVATE, AND GLUTACONYL CARBOXYLASE-RELATED"
                representative_members:
                  - preferred_term: MCCC2 (human)
                    term:
                      id: UniProtKB:Q9HCC0
                      label: Methylcrotonoyl-CoA carboxylase beta chain, mitochondrial
            function:
              preferred_term: methylcrotonoyl-CoA carboxylase activity
              term:
                id: GO:0004485
                label: methylcrotonoyl-CoA carboxylase activity
              substrates:
                - preferred_term: 3-methylcrotonyl-CoA
                - preferred_term: carboxybiotin (from MCCC1)
              products:
                - preferred_term: 3-methylglutaconyl-CoA
              evidence:
                - source_id: EC:6.4.1.4
                  statement: methylcrotonoyl-CoA carboxylase; carboxyltransferase beta subunit
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Carboxyltransferase beta subunit: binds 3-methylcrotonyl-CoA and
              transfers the carboxyl group from carboxybiotin. Loss of function
              causes 3-MCC deficiency.
    - order: 3
      role: hydration to HMG-CoA
      node:
        id: auh_step
        label: 3-methylglutaconyl-CoA + H2O to (S)-3-hydroxy-3-methylglutaryl-CoA
        module_type: REACTION
        annotons:
          - id: auh_activity
            label: "AUH: 3-methylglutaconyl-CoA hydratase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Enoyl-CoA hydratase / crotonase superfamily (AUH)
                term:
                  id: PANTHER:PTHR11941
                  label: ENOYL-COA HYDRATASE-RELATED
                representative_members:
                  - preferred_term: AUH (human)
                    term:
                      id: UniProtKB:Q13825
                      label: Methylglutaconyl-CoA hydratase, mitochondrial
            function:
              preferred_term: methylglutaconyl-CoA hydratase activity
              term:
                id: GO:0004490
                label: methylglutaconyl-CoA hydratase activity
              substrates:
                - preferred_term: (E)-3-methylglutaconyl-CoA
                - preferred_term: water
              products:
                - preferred_term: (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA)
              evidence:
                - source_id: EC:4.2.1.18
                  statement: methylglutaconyl-CoA hydratase
                - source_id: Reactome:R-HSA-70785
                  statement: "beta-methylglutaconyl-CoA + H2O <=> beta-hydroxy-beta-methylglutaryl-CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Crotonase-superfamily hydratase; also moonlights as an AU-rich-element
              (ARE) RNA-binding protein (hence the name AUH). Deficiency causes
              3-methylglutaconic aciduria type I.
    - order: 4
      role: terminal lyase (shared with ketogenesis)
      node:
        id: hmgcl_step
        label: (S)-HMG-CoA to acetoacetate + acetyl-CoA
        module_type: REACTION
        annotons:
          - id: hmgcl_activity
            label: "HMGCL: HMG-CoA lyase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Hydroxymethylglutaryl-CoA lyase family (HMGCL)
                term:
                  id: PANTHER:PTHR42738
                  label: HYDROXYMETHYLGLUTARYL-COA LYASE
                representative_members:
                  - preferred_term: HMGCL (human)
                    term:
                      id: UniProtKB:P35914
                      label: Hydroxymethylglutaryl-CoA lyase, mitochondrial
            function:
              preferred_term: hydroxymethylglutaryl-CoA lyase activity
              term:
                id: GO:0004419
                label: hydroxymethylglutaryl-CoA lyase activity
              substrates:
                - preferred_term: (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA)
              products:
                - preferred_term: acetoacetate
                - preferred_term: acetyl-CoA
              evidence:
                - source_id: EC:4.1.3.4
                  statement: hydroxymethylglutaryl-CoA lyase (divalent-cation-dependent)
                - source_id: Reactome:R-HSA-74180
                  statement: "HMG CoA => acetoacetic acid + acetyl CoA (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: >-
              Terminal step, shared with ketogenesis: cleaves HMG-CoA to
              acetoacetate (a ketone body) + acetyl-CoA. Deficiency blocks both
              leucine degradation and ketone-body synthesis, causing hypoketotic
              hypoglycemia (HMG-CoA lyase deficiency).
  connections:
    - source: ivd_step
      target: mcc_step
      connection_type: PROVIDES_INPUT_FOR
      description: 3-methylcrotonyl-CoA from IVD is carboxylated by the MCC complex.
    - source: mcc_step
      target: auh_step
      connection_type: PROVIDES_INPUT_FOR
      description: 3-methylglutaconyl-CoA from MCC is hydrated by AUH.
    - source: auh_step
      target: hmgcl_step
      connection_type: PROVIDES_INPUT_FOR
      description: HMG-CoA from AUH is cleaved by HMGCL to acetoacetate + acetyl-CoA.
  notes: >-
    Four-step mitochondrial leucine catabolism (isovaleryl-CoA to acetoacetate +
    acetyl-CoA) grounded to the human enzymes IVD (UniProtKB:P26440, GO:0008470,
    EC 1.3.8.4), the MCC complex MCCC1 (Q96RQ3) + MCCC2 (Q9HCC0) (GO:0004485, EC
    6.4.1.4, complex GO:1905202), AUH (Q13825, GO:0004490, EC 4.2.1.18) and HMGCL
    (P35914, GO:0004419, EC 4.1.3.4). GO molecular-function terms were taken from
    the human GOA records; Reactome reaction ids and titles were verified against
    the local reactome cache. Each step uses a PANTHER family selector (generic
    over paralogs and orthologs) plus a concrete human representative member; MCC
    is modelled as a PROTEIN_COMPLEX node with its alpha (MCCC1) and beta (MCCC2)
    subunits. Upstream, isovaleryl-CoA is produced from leucine by BCAT2 + the
    BCKDH complex (see the BCAA catabolism module); the terminal HMGCL step is
    shared with ketogenesis, linking leucine catabolism to the ketone-body pool.
    AUH's moonlighting ARE-RNA-binding role is captured in its gene review, not in
    this metabolic module.
