knowledge_gaps:
  - gap_statement: Determinants of IFN Subtype Specificity remains unresolved in the Type I 
      interferon signaling pathway module.
    boundary: All type I IFN subtypes signal through the same IFNAR1/IFNAR2 receptor, yet they 
      produce quantitatively and qualitatively distinct biological outputs. The mechanisms 
      underlying this "differential signaling" remain incompletely understood.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_i_interferon_signaling-deep-research-falcon.md
  - gap_statement: Role of IFNAR1 Intracellular Domain Tyrosines remains unresolved in the Type I 
      interferon signaling pathway module.
    boundary: The requirement of specific tyrosine residues in the IFNAR1 ICD for STAT recruitment 
      remains debated. Recent studies suggest these residues may not be essential for type I IFN 
      function, challenging earlier models of STAT docking on IFNAR1 
      (weerd2024structure-functionoftype pages 4-6).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_i_interferon_signaling-deep-research-falcon.md
  - gap_statement: U-ISGF3 and Basal ISG Expression remains unresolved in the Type I interferon 
      signaling pathway module.
    boundary: The relative contributions of canonical phosphorylated ISGF3, unphosphorylated 
      U-ISGF3, and STAT2/IRF9 complexes to constitutive and long-term ISG regulation remain actively
      debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_i_interferon_signaling-deep-research-falcon.md
  - gap_statement: TYK2 as Therapeutic Target remains unresolved in the Type I interferon signaling 
      pathway module.
    boundary: The discovery that a naturally occurring TYK2 variant (P1104A) protects against 
      multiple autoimmune diseases while maintaining sufficient TYK2 signaling to prevent immune 
      deficiency has driven the development of allosteric TYK2 inhibitors 
      (jensen2023allosterictyk2inhibition pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/type_i_interferon_signaling-deep-research-falcon.md
  - gap_statement: Unresolved Mechanistic Questions remains unresolved in the Type I interferon 
      signaling pathway module.
    boundary: 'Several key questions remain open: Mathematical models exploring how receptor concentrations
      cooperatively affect IFN function have not been developed (weerd2024structure-functionoftype pages
