id: MODULE:type_i_interferon_signaling
title: Type I interferon signaling pathway module
description: Type I interferons engage IFNAR receptor complexes and JAK1/TYK2 kinases to activate 
  STAT1-STAT2-IRF9 transcriptional complexes that induce antiviral gene programs.
