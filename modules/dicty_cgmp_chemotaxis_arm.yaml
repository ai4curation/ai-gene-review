id: MODULE:dicty_cgmp_chemotaxis_arm
title: Dictyostelium cGMP chemotaxis arm (guanylyl cyclases to GbpC to myosin II)
description: >-
  The cGMP second-messenger branch that controls myosin II and the cell-rear
  response during chemoattractant (cAMP) chemotaxis in Dictyostelium discoideum.
  On stimulation, two guanylyl cyclases — the membrane-bound GCA and the cytosolic
  soluble guanylyl cyclase sGC (sgcA) — produce a transient cGMP burst (the two
  are partly redundant; only the gca/sgc double mutant loses all cGMP). cGMP is
  then read out by GbpC, the large multidomain Roco-family protein that accounts
  for essentially all high-affinity soluble cGMP binding: cGMP binding to its
  cyclic-nucleotide-binding domains drives an intramolecular cascade (RasGEF ->
  Roc GTPase -> MAP3K-like kinase) whose output regulates myosin II heavy-chain
  phosphorylation and filament assembly at the cell rear, enabling retraction and
  polarity. Phrased over enzyme/effector functions and family selectors with
  D. discoideum representatives. OUT OF SCOPE: the parallel cGMP effector GbpD (a
  Rap1 GEF) and the Ca2+ channel IplA, the upstream chemoattractant relay
  (dicty_extracellular_camp_relay), and the precise in-vivo myosin-kinase
  substrate of GbpC (an unresolved question flagged in the gbpC review).
status: DRAFT
evidence:
  - source_id: GO:0006182
    title: cGMP biosynthetic process
    statement: >-
      The production half of the module is grounded in cGMP biosynthetic process
      (GO:0006182); both GCA and sGC carry this annotation.
  - source_id: file:DICDI/gcA/gcA-ai-review.yaml
    title: gcA gene review (Dictyostelium discoideum)
    statement: >-
      Membrane guanylyl cyclase grounding (UniProtKB:Q553Y7, GO:0004383 guanylate
      cyclase activity).
  - source_id: file:DICDI/sgcA/sgcA-ai-review.yaml
    title: sgcA gene review (Dictyostelium discoideum)
    statement: >-
      Soluble guanylyl cyclase grounding (UniProtKB:Q551V8, GO:0004383); a
      class-III adenylyl/guanylyl cyclase (sAC-homolog), NOT an NO/heme sensor.
  - source_id: file:DICDI/gbpC/gbpC-ai-review.yaml
    title: gbpC gene review (Dictyostelium discoideum)
    statement: >-
      Principal cGMP effector grounding (UniProtKB:Q8MVR1, GO:0030553 cGMP
      binding); Roco-family protein controlling myosin II via an intramolecular
      GEF -> Roc -> kinase cascade.
notes: >-
  Dictyostelium-specific chemotaxis second-messenger module grounded to two
  guanylyl cyclases (GCA Q553Y7 and sGC/sgcA Q551V8, both GO:0004383) and the
  cGMP effector GbpC (Q8MVR1, GO:0030553). GO molecular-function terms were taken
  from the completed DICDI reviews; nodes use PANTHER family selectors plus
  D. discoideum representative members. The myosin II output is described in the
  effector role but not grounded as a separate node because GbpC's direct in-vivo
  kinase substrate is unresolved (see the gbpC review's suggested question). The
  parallel cGMP/Ca effectors GbpD and IplA are out of scope. Named to signal
  Dictyostelium scope so it does not collide with a generic cyclic-nucleotide
  signalling module.
module:
  id: dicty_cgmp_chemotaxis_arm
  label: cGMP chemotaxis arm (GCA/sGC -> cGMP -> GbpC -> myosin II)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: cGMP biosynthetic process
      term:
        id: GO:0006182
        label: cGMP biosynthetic process
      description: >-
        Chemoattractant-induced cGMP burst that drives the myosin II / cell-rear
        response in chemotaxis.
  parts:
    - order: 1
      role: chemoattractant-induced cGMP production
      node:
        id: cgmp_production
        label: GTP to cGMP by the guanylyl cyclases GCA and sGC
        module_type: REACTION
        annotons:
          - id: gca_activity
            label: "GCA: membrane-bound guanylyl cyclase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenylyl/guanylyl cyclase class III family (GCA)
                term:
                  id: PANTHER:PTHR11920
                  label: ADENYLYL/GUANYLYL CYCLASE
                representative_members:
                  - preferred_term: GCA (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q553Y7
                      label: Guanylate cyclase A
            function:
              preferred_term: guanylate cyclase activity
              term:
                id: GO:0004383
                label: guanylate cyclase activity
              substrates:
                - preferred_term: GTP
              products:
                - preferred_term: 3',5'-cyclic GMP
                - preferred_term: diphosphate
              evidence:
                - source_id: file:DICDI/gcA/gcA-ai-review.yaml
                  statement: GCA is the 12-TM membrane-bound guanylyl cyclase
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Membrane-bound (12-TM, adenylyl-cyclase-topology) guanylyl cyclase
              producing part of the chemoattractant-induced cGMP burst; partly
              redundant with sGC.
          - id: sgc_activity
            label: "sGC (sgcA): soluble guanylyl cyclase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Adenylyl/guanylyl cyclase class III family (sGC)
                term:
                  id: PANTHER:PTHR43642
                  label: ADENYLATE/GUANYLATE CYCLASE
                representative_members:
                  - preferred_term: sGC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q551V8
                      label: Soluble guanylyl cyclase sGC
            function:
              preferred_term: guanylate cyclase activity
              term:
                id: GO:0004383
                label: guanylate cyclase activity
              substrates:
                - preferred_term: GTP
              products:
                - preferred_term: 3',5'-cyclic GMP
                - preferred_term: diphosphate
              evidence:
                - source_id: file:DICDI/sgcA/sgcA-ai-review.yaml
                  statement: sGC is the cytosolic class-III cyclase making the cGMP burst
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Cytosolic class-III adenylyl/guanylyl cyclase (sAC-homolog, not an
              NO/heme sensor) that predominates in producing the aggregation-stage
              cGMP burst; translocates toward the leading edge.
    - order: 2
      role: cGMP read-out and myosin II regulation
      node:
        id: gbpc_effector
        label: cGMP binding to GbpC drives myosin II regulation at the cell rear
        module_type: REGULATORY_STEP
        annotons:
          - id: gbpc_activity
            label: "GbpC: principal cGMP effector (Roco-family)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Roco-family cGMP-binding protein family (GbpC)
                term:
                  id: PANTHER:PTHR44329
                  label: LEUCINE-RICH REPEAT AND ROC/COR DOMAIN PROTEIN
                representative_members:
                  - preferred_term: GbpC (Dictyostelium discoideum)
                    term:
                      id: UniProtKB:Q8MVR1
                      label: cGMP-binding protein C (GbpC)
            function:
              preferred_term: cGMP binding
              term:
                id: GO:0030553
                label: cGMP binding
              evidence:
                - source_id: file:DICDI/gbpC/gbpC-ai-review.yaml
                  statement: GbpC accounts for essentially all high-affinity soluble cGMP binding
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Large Roco-family protein that binds the cGMP burst and, via an
              intramolecular RasGEF -> Roc GTPase -> MAP3K-like kinase cascade,
              regulates myosin II heavy-chain phosphorylation and filament assembly
              at the cell rear (retraction/polarity). The direct in-vivo kinase
              substrate is unresolved.
  connections:
    - source: cgmp_production
      target: gbpc_effector
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The cGMP produced by GCA and sGC is the ligand bound by GbpC, activating
        its intramolecular cascade toward myosin II.
