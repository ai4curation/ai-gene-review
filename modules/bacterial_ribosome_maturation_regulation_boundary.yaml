id: MODULE:bacterial_ribosome_maturation_regulation_boundary
title: Bacterial ribosome maturation, hibernation, and ribosomal-protein modification boundary
description: Boundary module for PSEPK ribosome assembly and maturation factors, hibernation/silencing factors, ribosomal-protein
  modification enzymes, and unresolved ribosomal-interface side nodes. Structural ribosomal proteins and rRNA modification
  enzymes are kept in separate modules.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_translation_rna_processing_ribosome_assembly_maturation_hibernation.tsv
  title: PSEPK translation/RNA ribosome assembly and hibernation split
  statement: The batch records ribosome biogenesis GTPases, maturation factors, hibernation/silencing factors, ribosomal-protein
    modifiers, and low-information ribosomal-interface side nodes.
- source_id: file:PSEPK/yigZ/yigZ-ai-review.yaml
  title: Curated yigZ review
  statement: yigZ encodes an IMPACT-family ribosome-binding factor candidate in the cytoplasm, with first-pass support for
    translation-initiation regulatory context but no resolved catalytic activity.
- source_id: file:PSEPK/rimI/rimI-ai-review.yaml
  title: Curated rimI review
  statement: rimI encodes the cytoplasmic GNAT-family N-acetyltransferase that acetylates the N-terminal alanine of ribosomal
    protein bS18.
- source_id: file:PSEPK/der/der-ai-review.yaml
  title: Curated der review
  statement: der encodes the conserved EngA/Der ribosome-associated GTPase, a late-stage ribosome biogenesis factor.
- source_id: file:PSEPK/darP/darP-ai-review.yaml
  title: Curated darP review
  statement: darP encodes a cytoplasmic DarP/YjgA-family factor that binds rRNA/ribosomes and participates in 50S large-subunit
    precursor assembly.
- source_id: file:PSEPK/hpf/hpf-ai-review.yaml
  title: Curated hpf review
  statement: hpf encodes the ribosome hibernation-promoting factor HPF, which binds small ribosomal subunits and represses
    translational elongation during ribosome hibernation.
- source_id: file:PSEPK/rimO/rimO-ai-review.yaml
  title: Curated rimO review
  statement: rimO encodes a radical-SAM, iron-sulfur-dependent methylthiotransferase that methylthiolates an aspartate residue
    in ribosomal protein uS12.
- source_id: file:PSEPK/era/era-ai-review.yaml
  title: Curated era review
  statement: era encodes an essential cytoplasmic and membrane-associated GTPase that binds 16S rRNA/30S subunits and functions
    in small-subunit assembly and biogenesis.
- source_id: file:PSEPK/rimM/rimM-ai-review.yaml
  title: Curated rimM review
  statement: rimM encodes a cytoplasmic ribosome maturation factor that binds immature 30S particles and assists late small-subunit
    biogenesis and rRNA processing.
- source_id: file:PSEPK/prmB/prmB-ai-review.yaml
  title: Curated prmB review
  statement: prmB encodes the ribosomal protein uL3 glutamine methyltransferase that methylates a conserved glutamine in large-subunit
    protein uL3.
- source_id: file:PSEPK/PP_1910/PP_1910-ai-review.yaml
  title: Curated PP_1910 review
  statement: PP_1910 encodes a YceD-family cytosolic factor implicated in 23S rRNA accumulation, stability, or large-subunit
    biogenesis.
- source_id: file:PSEPK/PP_2956/PP_2956-ai-review.yaml
  title: Curated PP_2956 review
  statement: PP_2956 encodes a RimK-like ATP-grasp protein predicted to add glutamate residues to ribosomal protein S6.
- source_id: file:PSEPK/ycaO/ycaO-ai-review.yaml
  title: Curated ycaO review
  statement: ycaO encodes a YcaO-domain protein with PANTHER/product support as a cofactor for beta-methylthiolation of ribosomal
    protein S12, but no current GOA rows.
- source_id: file:PSEPK/PP_3810/PP_3810-ai-review.yaml
  title: Curated PP_3810 review
  statement: PP_3810 is a low-information locus-tag protein with a protein-language-model ribosomal protein S3AE name but
    no GOA rows or resolved domain support in this pass.
- source_id: file:PSEPK/rbfA/rbfA-ai-review.yaml
  title: Curated rbfA review
  statement: rbfA encodes cytoplasmic ribosome-binding factor A, a late 30S assembly factor involved in small-subunit rRNA
    maturation.
- source_id: file:PSEPK/rimP/rimP-ai-review.yaml
  title: Curated rimP review
  statement: rimP encodes a cytoplasmic ribosome maturation factor required for 30S small-subunit maturation.
- source_id: file:PSEPK/ybeY/ybeY-ai-review.yaml
  title: Curated ybeY review
  statement: ybeY encodes a cytoplasmic zinc-dependent single-strand RNA endonuclease involved in rRNA processing and ribosome
    biogenesis.
- source_id: file:PSEPK/rsfS/rsfS-ai-review.yaml
  title: Curated rsfS review
  statement: rsfS encodes a cytoplasmic ribosomal silencing factor that binds the large ribosomal subunit and negatively regulates
    translation/ribosome biogenesis.
- source_id: file:PSEPK/prmA/prmA-ai-review.yaml
  title: Curated prmA review
  statement: prmA encodes the cytoplasmic ribosomal protein L11 lysine N-methyltransferase.
- source_id: file:PSEPK/PP_4885/PP_4885-ai-review.yaml
  title: Curated PP_4885 review
  statement: PP_4885 is a low-information locus-tag protein with a protein-language-model SSU ribosomal protein S2p name but
    no GOA rows or resolved domain support in this pass.
- source_id: file:PSEPK/PP_4996/PP_4996-ai-review.yaml
  title: Curated PP_4996 review
  statement: PP_4996 encodes a YqgF/RuvX-family putative pre-16S rRNA nuclease implicated in rRNA 5-prime-end processing and
    ribosome biogenesis.
- source_id: file:PSEPK/typA/typA-ai-review.yaml
  title: Curated typA review
  statement: typA encodes BipA/TypA, a cytoplasmic ribosome-associated GTPase involved in large-subunit assembly and stress-responsive
    ribosome biogenesis.
- source_id: file:PSEPK/rmf/rmf-ai-review.yaml
  title: Curated rmf review
  statement: rmf encodes ribosome modulation factor, a stationary-phase hibernation factor that converts active 70S ribosomes
    into inactive dimers and regulates translation.
- source_id: file:PSEPK/PP_5700/PP_5700-ai-review.yaml
  title: Curated PP_5700 review
  statement: PP_5700 encodes an RHF/RaiA-like ribosomal subunit interface protein candidate, but has no GOA rows and no resolved
    first-pass activity.
- source_id: file:PSEPK/PP_5726/PP_5726-ai-review.yaml
  title: Curated PP_5726 review
  statement: PP_5726 is a low-information locus-tag protein with a protein-language-model SSU ribosomal protein S2p name but
    no GOA rows or resolved domain support in this pass.
