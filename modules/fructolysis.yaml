id: MODULE:fructolysis
title: Fructolysis (hepatic dietary fructose catabolism; hereditary fructose intolerance)
description: >-
  Fructolysis is the liver (and kidney/intestine) pathway that catabolises dietary
  fructose, feeding its carbon into glycolysis/gluconeogenesis while bypassing the
  main phosphofructokinase regulatory step of glycolysis. Three cytosolic steps:
  ketohexokinase (KHK, fructokinase) phosphorylates fructose to fructose-1-phosphate
  at the expense of ATP; the liver-type fructose-bisphosphate aldolase (ALDOB)
  cleaves fructose-1-phosphate to dihydroxyacetone phosphate (DHAP) + D-glyceraldehyde;
  and triokinase (TKFC) phosphorylates the D-glyceraldehyde to D-glyceraldehyde-3-
  phosphate. The DHAP and glyceraldehyde-3-phosphate then enter the glycolytic /
  gluconeogenic triose-phosphate pool. Because KHK is not feedback-regulated,
  hepatic fructose uptake and phosphorylation are rapid and unregulated, transiently
  trapping phosphate as fructose-1-phosphate. Inherited defects: KHK deficiency
  causes benign essential fructosuria; ALDOB deficiency causes hereditary fructose
  intolerance (HFI) — toxic accumulation of fructose-1-phosphate with ATP/phosphate
  depletion, hypoglycemia and hepatic/renal injury on fructose or sucrose ingestion;
  and TKFC deficiency causes a rare multisystem disorder (cataracts, developmental
  problems). ALDOB (like the other aldolases) also participates in the aldol
  cleavage of fructose-1,6-bisphosphate in glycolysis/gluconeogenesis, and TKFC
  additionally has an FMN-cyclase (FAD-AMP lyase) activity in riboflavin metabolism.
status: DRAFT
evidence:
  - source_id: GO:0061624
    title: fructose catabolic process to hydroxyacetone phosphate and glyceraldehyde-3-phosphate
    statement: >-
      The module is grounded in the GO fructolysis process (GO:0061624), the
      conversion of fructose to DHAP + glyceraldehyde-3-phosphate.
  - source_id: Reactome:R-HSA-70350
    title: Fructose catabolism
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Fructose catabolism" reactions R-HSA-70333 (KHK), R-HSA-70342 (ALDOB) and
      R-HSA-70349 (TKFC).
  - source_id: file:human/KHK/KHK-ai-review.yaml
    title: KHK gene review (human)
    statement: >-
      The fructose-phosphorylation step (UniProtKB:P50053, GO:0004454 ketohexokinase
      activity) matches the completed human KHK review.
  - source_id: file:human/ALDOB/ALDOB-ai-review.yaml
    title: ALDOB gene review (human)
    statement: >-
      The fructose-1-phosphate cleavage step (UniProtKB:P05062, GO:0061609
      fructose-1-phosphate aldolase activity, GO:0004332) matches the completed
      human ALDOB review.
  - source_id: file:human/TKFC/TKFC-ai-review.yaml
    title: TKFC gene review (human)
    statement: >-
      The triose-phosphorylation step (UniProtKB:Q3LXA3, GO:0050354 triokinase
      activity) matches the completed human TKFC review.
module:
  id: fructolysis
  label: Fructolysis (dietary fructose catabolism)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fructose catabolic process to hydroxyacetone phosphate and glyceraldehyde-3-phosphate
      term:
        id: GO:0061624
        label: fructose catabolic process to hydroxyacetone phosphate and glyceraldehyde-3-phosphate
      description: >-
        Cytosolic conversion of dietary fructose to the triose phosphates DHAP and
        glyceraldehyde-3-phosphate.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All three fructolytic enzymes are cytosolic.
  parts:
    - order: 1
      role: committed fructose phosphorylation
      node:
        id: khk_step
        label: D-fructose + ATP to D-fructose-1-phosphate + ADP
        module_type: REACTION
        annotons:
          - id: khk_activity
            label: "KHK: ketohexokinase (fructokinase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Ketohexokinase / carbohydrate kinase (FGGY-like) family (KHK)
                term:
                  id: PANTHER:PTHR42774
                  label: PHOSPHOTRANSFERASE SYSTEM TRANSPORT PROTEIN
                representative_members:
                  - preferred_term: KHK (human)
                    term:
                      id: UniProtKB:P50053
                      label: Ketohexokinase
            function:
              preferred_term: ketohexokinase activity
              term:
                id: GO:0004454
                label: ketohexokinase activity
              substrates:
                - preferred_term: D-fructose
                - preferred_term: ATP
              products:
                - preferred_term: D-fructose 1-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.3
                  statement: ketohexokinase (fructokinase)
                - source_id: Reactome:R-HSA-70333
                  statement: "KHK dimer phosphorylates Fru to Fru 1-P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Committed, unregulated first step of fructolysis (KHK-C is the
              high-affinity hepatic isoform; KHK-A a wider-tissue splice form).
              Deficiency causes benign essential fructosuria.
    - order: 2
      role: aldol cleavage of fructose-1-phosphate
      node:
        id: aldob_step
        label: D-fructose-1-phosphate to DHAP + D-glyceraldehyde
        module_type: REACTION
        annotons:
          - id: aldob_activity
            label: "ALDOB: fructose-bisphosphate aldolase B"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Class I fructose-bisphosphate aldolase family (ALDOA/B/C)
                term:
                  id: PANTHER:PTHR11627
                  label: FRUCTOSE-BISPHOSPHATE ALDOLASE
                representative_members:
                  - preferred_term: ALDOB (human, liver/kidney/intestine)
                    term:
                      id: UniProtKB:P05062
                      label: Fructose-bisphosphate aldolase B
            function:
              preferred_term: fructose-1-phosphate aldolase activity
              term:
                id: GO:0061609
                label: fructose-1-phosphate aldolase activity
              substrates:
                - preferred_term: D-fructose 1-phosphate
              products:
                - preferred_term: dihydroxyacetone phosphate (DHAP)
                - preferred_term: D-glyceraldehyde
              evidence:
                - source_id: EC:4.1.2.13
                  statement: fructose-bisphosphate aldolase; ALDOB has high fructose-1-phosphate activity
                - source_id: Reactome:R-HSA-70342
                  statement: "ALDOB tetramer cleaves Fru-1-P to GA and DHAP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Class-I (Schiff-base) homotetrameric aldolase; the liver isoform with
              high fructose-1-phosphate cleaving activity (it also cleaves
              fructose-1,6-bisphosphate in glycolysis/gluconeogenesis). Deficiency
              causes hereditary fructose intolerance (HFI).
    - order: 3
      role: phosphorylation of glyceraldehyde into the triose-phosphate pool
      node:
        id: tkfc_step
        label: D-glyceraldehyde + ATP to D-glyceraldehyde-3-phosphate + ADP
        module_type: REACTION
        annotons:
          - id: tkfc_activity
            label: "TKFC: triokinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Triokinase / FMN cyclase (DAK) family (TKFC)
                term:
                  id: PANTHER:PTHR28629
                  label: TRIOKINASE/FMN CYCLASE
                representative_members:
                  - preferred_term: TKFC (human)
                    term:
                      id: UniProtKB:Q3LXA3
                      label: Triokinase/FMN cyclase
            function:
              preferred_term: triokinase activity
              term:
                id: GO:0050354
                label: triokinase activity
              substrates:
                - preferred_term: D-glyceraldehyde
                - preferred_term: ATP
              products:
                - preferred_term: D-glyceraldehyde 3-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.28
                  statement: triokinase (also glycerone/dihydroxyacetone kinase, EC 2.7.1.29)
                - source_id: Reactome:R-HSA-70349
                  statement: "DAK dimer phosphorylates D-glyceraldehyde to form D-glyceraldehyde 3-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Phosphorylates the ALDOB-derived D-glyceraldehyde to
              glyceraldehyde-3-phosphate, returning fructose carbon to the
              glycolytic triose-phosphate pool. Bifunctional (also an FMN-cyclase /
              FAD-AMP lyase in riboflavin metabolism); deficiency is a rare
              multisystem disorder.
  connections:
    - source: khk_step
      target: aldob_step
      connection_type: PROVIDES_INPUT_FOR
      description: Fructose-1-phosphate from KHK is cleaved by ALDOB.
    - source: aldob_step
      target: tkfc_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The D-glyceraldehyde arm from ALDOB is phosphorylated by TKFC (the DHAP arm
        enters glycolysis directly).
  notes: >-
    Three-step hepatic fructolysis grounded to the human enzymes KHK
    (UniProtKB:P50053, GO:0004454, EC 2.7.1.3), ALDOB (P05062, GO:0061609 /
    GO:0004332, EC 4.1.2.13) and TKFC (Q3LXA3, GO:0050354, EC 2.7.1.28). GO
    molecular-function terms were taken from the human GOA records; Reactome
    reaction ids and titles were verified against the local reactome cache. Each
    step uses a PANTHER family selector (generic over paralogs and orthologs) plus
    a concrete human representative member; the ALDOB family also includes the
    glycolytic aldolases ALDOA (muscle) and ALDOC (brain). Downstream, DHAP and
    glyceraldehyde-3-phosphate feed glycolysis / gluconeogenesis (existing
    gluconeogenesis modules). ALDOB's glycolytic fructose-1,6-bisphosphate aldol
    activity and TKFC's FMN-cyclase / MDA5-regulatory moonlighting roles are noted
    but out of scope for this dietary-fructose-catabolism module. Disorders: KHK →
    essential fructosuria (benign); ALDOB → hereditary fructose intolerance;
    TKFC → TKFC deficiency.
