id: MODULE:inositol_phosphate_metabolism_boundary
title: Inositol phosphate metabolism boundary
description: >-
  Boundary/absence module for KEGG ppu00562 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains SuhB, an inositol-1-monophosphatase family
  protein with bacterial rRNA transcription-antitermination context, plus TpiA
  and two MmsA paralogs that belong primarily to central-carbon, valine/thymine,
  beta-alanine, and propanoate metabolism. This module should not be read as a
  complete eukaryote-like phosphatidylinositol signalling pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00562
    title: Inositol phosphate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00562 provides the PSEPK curation batch. Its membership includes
      suhB, mmsA-I, mmsA-II, and tpiA, so the batch is treated as boundary
      context around SuhB rather than as a complete inositol-phosphate pathway.
module:
  id: inositol_phosphate_metabolism_boundary
  label: Inositol phosphate metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: inositol metabolic process
      term:
        id: GO:0006020
        label: inositol metabolic process
      description: Broad inositol pathway context for SuhB.
    - preferred_term: inositol monophosphate 1-phosphatase activity
      term:
        id: GO:0008934
        label: inositol monophosphate 1-phosphatase activity
      description: SuhB-family phosphatase activity assigned to the only direct inositol-phosphate enzyme in this batch.
    - preferred_term: inositol-phosphate boundary map
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has no
        curated complete phosphatidylinositol signalling route from this
        membership.
  parts:
    - order: 1
      role: SuhB inositol-monophosphatase and rrnTAC context
      node:
        id: suhB_inositol_monophosphatase_boundary
        label: SuhB inositol-monophosphatase boundary
        module_type: REACTION
        description: >-
          SuhB has inositol-1-monophosphatase-family chemistry and UniProt also
          places it in the bacterial processive rRNA transcription and
          antitermination complex context. This is the only direct
          inositol-phosphate node in the PSEPK ppu00562 batch.
        annotons:
          - id: suhB_inositol_monophosphatase
            label: "suhB: inositol-1-monophosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: suhB
            function:
              preferred_term: inositol monophosphate 1-phosphatase activity
              term:
                id: GO:0008934
                label: inositol monophosphate 1-phosphatase activity
            role_description: Direct SuhB-family inositol monophosphatase node and bacterial rrnTAC/antitermination context.
    - order: 2
      role: KEGG side nodes from other metabolism
      node:
        id: ppu00562_side_nodes
        label: ppu00562 side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00562 also includes TpiA and MmsA paralogs. These are reviewed
          as central-carbon or methylmalonate-semialdehyde dehydrogenase side
          context rather than evidence for a dedicated inositol-phosphate route.
        annotons:
          - id: tpiA_triose_phosphate_isomerase_side_context
            label: "tpiA: triose-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tpiA
            function:
              preferred_term: triose-phosphate isomerase activity
              term:
                id: GO:0004807
                label: triose-phosphate isomerase activity
            role_description: Central-carbon triose-phosphate balancing enzyme; side context in ppu00562.
          - id: mmsA_I_methylmalonate_semialdehyde_dehydrogenase
            label: "mmsA-I: methylmalonate-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mmsA-I
            function:
              preferred_term: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
              term:
                id: GO:0004491
                label: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
            role_description: Valine/thymine/propanoate side node, not inositol-specific.
          - id: mmsA_II_methylmalonate_semialdehyde_dehydrogenase
            label: "mmsA-II: methylmalonate-semialdehyde dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mmsA-II
            function:
              preferred_term: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
              term:
                id: GO:0004491
                label: methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity
            role_description: Valine/thymine/propanoate side node, not inositol-specific.
  notes: >-
    The name is intentionally a boundary/absence module. SuhB supports
    inositol-monophosphatase-family chemistry, but the PSEPK candidate set does
    not support a complete phosphatidylinositol or inositol-polyphosphate
    signalling pathway.
