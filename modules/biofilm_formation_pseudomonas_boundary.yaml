id: MODULE:biofilm_formation_pseudomonas_boundary
title: Pseudomonas biofilm-formation boundary
description: >-
  Umbrella boundary module for KEGG ppu02025 biofilm formation in Pseudomonas
  putida KT2440. The PSEPK primary set is a Pseudomonas aeruginosa-oriented
  biofilm map that mixes global Gac/Csr/Crp regulation, Wsp-like surface
  sensing, c-di-GMP turnover, Pil/Chp twitching-motility signaling, type VI
  secretion context, and orphan regulatory sensors. Curate it through those
  sub-buckets rather than as one linear biofilm pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02025
    title: Biofilm formation - Pseudomonas aeruginosa
    statement: >-
      KEGG ppu02025 supplies the Pseudomonas biofilm-formation umbrella map used
      for the PSEPK boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_boundary.tsv
    title: ppu02025 first-pass batch table
    statement: >-
      The primary-only batch table records 43 selected genes with review,
      curation, and Asta retrieval status.
  - source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
    title: PSEPK ppu02025 biofilm partition table
    statement: >-
      The partition separates the 43 primary genes into global regulation,
      Wsp/c-di-GMP, c-di-GMP turnover, T6SS context, orphan sensor, and Pil/Chp
      twitching-regulation buckets.
  - source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.md
    title: PSEPK ppu02025 biofilm partition report
    statement: >-
      The partition report records the completed first-pass sub-batches and the
      decision to reuse the bacterial secretion-system boundary for the T6SS
      context bucket.
module:
  id: biofilm_formation_pseudomonas_boundary
  label: Pseudomonas biofilm-formation boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: biofilm formation
      term:
        id: GO:0042710
        label: biofilm formation
      description: Biofilm output context for the ppu02025 umbrella map.
    - preferred_term: positive regulation of single-species biofilm formation
      term:
        id: GO:1900192
        label: positive regulation of single-species biofilm formation
      description: Gac/Csr/Crp and c-di-GMP regulatory output context.
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: Two-component and Che-family signaling shared by several sub-buckets.
    - preferred_term: chemotaxis
      term:
        id: GO:0006935
        label: chemotaxis
      description: Wsp-like and Pil/Chp chemosensory signaling context.
    - preferred_term: diguanylate cyclase activity
      term:
        id: GO:0052621
        label: diguanylate cyclase activity
      description: c-di-GMP synthesis output in Wsp/c-di-GMP and turnover sub-buckets.
    - preferred_term: cyclic-guanylate-specific phosphodiesterase activity
      term:
        id: GO:0071111
        label: cyclic-guanylate-specific phosphodiesterase activity
      description: c-di-GMP hydrolysis output in the turnover sub-bucket.
    - preferred_term: type IV pilus-dependent motility
      term:
        id: GO:0043107
        label: type IV pilus-dependent motility
      description: Pil/Chp twitching-motility signaling context.
    - preferred_term: protein secretion by the type VI secretion system
      term:
        id: GO:0033103
        label: protein secretion by the type VI secretion system
      description: T6SS apparatus context carried by the reused secretion-system boundary.
  parts:
    - order: 1
      role: Umbrella biofilm boundary
      node:
        id: biofilm_formation_umbrella_boundary
        label: Pseudomonas biofilm-formation umbrella boundary
        module_type: BIOLOGICAL_PROCESS
        description: >-
          ppu02025 is a mixed regulatory and apparatus context for biofilm
          biology. This parent module indexes the curated sub-buckets and
          prevents generic biofilm over-annotation across all 43 genes.
        annotons: []
    - order: 2
      role: Global Gac/Csr/Crp regulation
      node:
        id: global_gac_csr_crp_biofilm_regulation_index
        label: Global Gac/Csr/Crp regulation index
        module_type: REGULATORY_STEP
        description: >-
          Global regulation is represented by
          `global_biofilm_regulation_boundary`, including GacS/GacA, Crp, and
          CsrA/RsmA-family post-transcriptional regulators.
        annotons: []
    - order: 3
      role: Wsp-like surface sensing and c-di-GMP output
      node:
        id: wsp_surface_sensing_c_di_gmp_index
        label: Wsp-like surface sensing and c-di-GMP index
        module_type: SIGNALING_PATHWAY
        description: >-
          Wsp-like receptor/adaptor, CheA/CheB adaptation, and GGDEF output
          context is represented by `wsp_surface_sensing_c_di_gmp_boundary`.
        annotons: []
    - order: 4
      role: c-di-GMP turnover enzymes
      node:
        id: c_di_gmp_turnover_index
        label: c-di-GMP turnover index
        module_type: SIGNALING_PATHWAY
        description: >-
          Diguanylate cyclase and cyclic-guanylate phosphodiesterase candidates
          are represented by `c_di_gmp_turnover_boundary`.
        annotons: []
    - order: 5
      role: Pil/Chp twitching-motility regulation
      node:
        id: pil_chp_twitching_regulation_index
        label: Pil/Chp twitching-regulation index
        module_type: SIGNALING_PATHWAY
        description: >-
          PilJ, CheW-like adaptors, a CheA-family kinase, and PilH/PilG receiver
          candidates are represented by `pil_chp_twitching_motility_boundary`.
        annotons: []
    - order: 6
      role: T6SS biofilm context
      node:
        id: t6ss_biofilm_context_index
        label: T6SS biofilm-context index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          T6SS apparatus and accessory genes from the ppu02025 map are reused
          through `bacterial_secretion_system_boundary` rather than assigned a
          direct per-gene biofilm-output claim.
        annotons: []
    - order: 7
      role: Orphan regulatory sensors
      node:
        id: orphan_biofilm_regulatory_sensors_index
        label: Orphan biofilm regulatory-sensor index
        module_type: SIGNALING_PATHWAY
        description: >-
          RetS/7TMR-DISM and other unresolved sensor histidine kinases plus the
          PP_4362-PP_4364 regulatory neighborhood are represented by
          `orphan_biofilm_regulatory_sensors_boundary`.
        annotons: []
  notes: >-
    This parent module is an index over completed first-pass curation-scale
    submodules. The submodule reviews carry the gene-level biological claims;
    this umbrella mainly documents ppu02025 pathway satisfiability and prevents
    over-curating all members as direct biofilm-formation genes.
