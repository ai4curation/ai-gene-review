id: MODULE:branched_chain_amino_acid_abc_import_boundary
title: Branched-chain amino acid ABC import boundary
description: Boundary module for five Pseudomonas putida KT2440 high-affinity branched-chain amino-acid ABC-transporter loci
  pulled from the KEGG ppu02010 ABC-transporter umbrella map. PP_1137-PP_1141 encodes the LivFGMHK system, PP_4863-PP_4867
  encodes a related Bra/Liv system, PP_0615-PP_0619 encodes a third related system, PP_2767-PP_2770 encodes a fourth predicted
  BCAA importer, and PP_2748-PP_2753 encodes a fifth predicted BCAA importer with two ATP-binding subunits, two permeases,
  and two leucine-family substrate-binding components. The module records coherent predicted BCAA uptake systems while leaving
  relative specificity and redundancy open.
status: DRAFT
evidence:
- source_id: KEGG:ppu02010
  title: ABC transporters - Pseudomonas putida KT2440
  statement: KEGG ppu02010 contributes the PP_0615-PP_0619, PP_1137-PP_1141, PP_2748-PP_2753, PP_2767-PP_2770, and PP_4863-PP_4867
    loci as coherent amino-acid ABC transporter sub-batches within the broad ABC-transporter umbrella map.
- source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
  title: PSEPK ppu02010 ABC-transporter partition batch
  statement: The ppu02010 partition batch records cluster C14 as PP_0615-PP_0619, cluster C25 as livF-I, livG, livM, livH,
    and livK, cluster C38 as PP_2748, PP_2749, PP_2750, PP_2751, PP_2752, and PP_2753, cluster C40 as PP_2767, PP_2768, PP_2769,
    and PP_2770, and cluster C62 as livF-II, braF, braE, braD, and PP_4867 after first-pass curation.
