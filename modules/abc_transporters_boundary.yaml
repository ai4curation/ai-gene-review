id: MODULE:abc_transporters_boundary
title: ABC transporters boundary
description: >-
  Umbrella boundary module for KEGG ppu02010 in Pseudomonas putida KT2440. The
  organism-specific ABC transporter map contains 207 transport or transport-like
  proteins across 74 locus-neighborhood clusters, spanning unrelated import,
  export, envelope biogenesis, and residual ABC-family component contexts. This
  module should be used as a pathway-boundary index, not as a single satisfiable
  biological pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 provides the PSEPK curation batch. Its members include
      amino-acid, peptide, polyamine, osmoprotectant, sulfur, phosphate,
      phosphonate, sugar, metal, cobalamin, siderophore, lipid, LPS,
      lipoprotein, protein-secretion, and residual ABC-family transport
      contexts.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter batch
    statement: >-
      The batch records 207 PSEPK members and their first-pass review/Asta
      status.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary_clusters.md
    title: PSEPK ppu02010 ABC transporter cluster report
    statement: >-
      The cluster report groups the 207 members into 74 locus-neighborhood
      clusters and summarizes major product classes for sub-batch handling.
module:
  id: abc_transporters_boundary
  label: ABC transporters boundary
  module_type: TRANSPORT_STEP
  concepts:
    - preferred_term: ABC-type transporter activity
      term:
        id: GO:0140359
        label: ABC-type transporter activity
      description: Broad molecular function for ATP-binding cassette transport systems.
    - preferred_term: ATP hydrolysis activity
      term:
        id: GO:0016887
        label: ATP hydrolysis activity
      description: ATPase activity for ABC nucleotide-binding components.
    - preferred_term: ATP-binding cassette (ABC) transporter complex
      term:
        id: GO:0043190
        label: ATP-binding cassette (ABC) transporter complex
      description: Complex context for multicomponent ABC importers and exporters.
    - preferred_term: transmembrane transport
      term:
        id: GO:0055085
        label: transmembrane transport
      description: Broad transport process for substrate-resolved and unresolved systems.
    - preferred_term: efflux transmembrane transporter activity
      term:
        id: GO:0015562
        label: efflux transmembrane transporter activity
      description: Export and secretion context for ABC efflux or type I secretion components.
    - preferred_term: amino acid transport
      term:
        id: GO:0006865
        label: amino acid transport
      description: Major import class covering amino-acid and peptide ABC systems.
  parts:
    - order: 1
      role: Umbrella-map boundary
      node:
        id: abc_transporter_umbrella_boundary
        label: ABC transporter umbrella-map boundary
        module_type: TRANSPORT_STEP
        description: >-
          ppu02010 is an umbrella transport map. It should be curated by
          substrate family, locus block, and component role rather than as a
          single pathway with one shared biological objective.
        annotons: []
    - order: 2
      role: Amino-acid, peptide, and polyamine import systems
      node:
        id: amino_acid_peptide_polyamine_import_index
        label: Amino-acid, peptide, and polyamine ABC import index
        module_type: TRANSPORT_STEP
        description: >-
          This class includes methionine, arginine/ornithine, branched-chain
          amino acid, glutamate/aspartate, dipeptide/peptide, YhdWXYZ/Yej-like,
          and polyamine transporter sub-batches. Component-level roles should be
          resolved in those substrate-focused modules.
        annotons: []
    - order: 3
      role: Compatible-solute, sugar, phosphate, phosphonate, and sulfur import systems
      node:
        id: nutrient_and_osmoprotectant_import_index
        label: Nutrient and osmoprotectant ABC import index
        module_type: TRANSPORT_STEP
        description: >-
          This class includes choline/betaine/carnitine and other compatible
          solute transporters, glucose/ribose/sugar/glycerol-phosphate systems,
          phosphate and phosphonate importers, and sulfur/cystine/sulfonate
          transporters that connect to sulfur metabolism.
        annotons: []
    - order: 4
      role: Metal, cofactor, and siderophore transport systems
      node:
        id: metal_cofactor_siderophore_transport_index
        label: Metal, cofactor, and siderophore ABC transport index
        module_type: TRANSPORT_STEP
        description: >-
          This class includes zinc, nickel, molybdate, cobalamin, ferric-iron,
          siderophore, and heme/cytochrome-c-maturation transporter or exporter
          components. Substrate specificity should stay as narrow as the
          component evidence supports.
        annotons: []
    - order: 5
      role: Envelope biogenesis, lipid transport, and secretion systems
      node:
        id: envelope_lipid_export_index
        label: Envelope, lipid, and secretion ABC-system index
        module_type: TRANSPORT_STEP
        description: >-
          This class includes Lpt LPS export, Mla phospholipid transport,
          LolCDE lipoprotein localization, FtsEX cell-division context, type I
          protein secretion/export, and other envelope-associated ABC systems.
          These are transport or envelope-biogenesis modules, not nutrient
          importer pathways.
        annotons: []
    - order: 6
      role: Residual and low-information ABC components
      node:
        id: residual_low_information_abc_index
        label: Residual low-information ABC component index
        module_type: TRANSPORT_STEP
        description: >-
          Residual ABC ATPases, permeases, binding proteins, and fused
          transporter-like proteins are kept component-level until genomic
          context, substrate evidence, or curated literature supports a more
          specific module.
        annotons: []
  notes: >-
    The ppu02010 curation strategy is to maintain this umbrella boundary module
    as an index and put actionable annotations into coherent substrate or
    envelope submodules. Do not use this module to justify broad substrate
    claims for individual ABC components.
