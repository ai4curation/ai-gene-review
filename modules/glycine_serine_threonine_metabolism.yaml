            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: sarcosine oxidase activity
                term:
                  id: GO:0008115
                  label: sarcosine oxidase activity
            function:
              preferred_term: sarcosine oxidase activity
              term:
                id: GO:0008115
                label: sarcosine oxidase activity
              evidence:
                - source_id: EC:1.5.3.1
                  statement: sarcosine oxidase
            role_description: Oxidizes sarcosine to glycine-linked one-carbon products.
    - order: 6
      role: threonine and glyoxylate side routes
      node:
        id: threonine_glyoxylate_side_routes
        label: Threonine catabolism and glyoxylate-linked side routes
        module_type: METABOLIC_PATHWAY
        description: >-
          Threonine aldolase, threonine/serine dehydratases, and
          hydroxypyruvate/glyoxylate reductases connect threonine, serine,
          glycine, and central carbon metabolism. Several KEGG members here are
          likely shared or condition-specific rather than core ppu00260 enzymes.
        annotons:
          - id: ltaE_threonine_aldolase
            label: LtaE threonine aldolase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ltaE
            function:
              preferred_term: threonine aldolase activity
              term:
                id: GO:0004793
                label: threonine aldolase activity
              evidence:
                - source_id: EC:4.1.2.48
                  statement: L-threonine aldolase
            processes:
              - preferred_term: L-threonine catabolic process
                term:
                  id: GO:0006567
                  label: L-threonine catabolic process
            role_description: Cleaves threonine to glycine and acetaldehyde; GOA may use the narrower allo-threonine term for some candidates.
          - id: threonine_deaminase
            label: Threonine deaminase/dehydratase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: threonine deaminase activity
                term:
                  id: GO:0004794
                  label: threonine deaminase activity
            function:
              preferred_term: threonine deaminase activity
              term:
                id: GO:0004794
                label: threonine deaminase activity
              evidence:
                - source_id: EC:4.3.1.19
                  statement: threonine dehydratase
            role_description: Deaminates threonine, linking ppu00260 to branched-chain amino-acid biosynthesis and catabolism.
          - id: glyoxylate_hydroxypyruvate_reductase
            label: Glyoxylate/hydroxypyruvate reductase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glyoxylate reductase activity
                term:
                  id: GO:0106345
                  label: glyoxylate reductase activity
            function:
              preferred_term: glyoxylate reductase activity
              term:
                id: GO:0106345
                label: glyoxylate reductase activity
              evidence:
                - source_id: KEGG:ppu00260
                  statement: glyoxylate/hydroxypyruvate reductase candidates in the ppu00260 membership set
            role_description: Boundary carbon-flow reaction connecting glycine/serine metabolism to glyoxylate and glycerate pools.
    - order: 7
      role: KEGG boundary and spillover nodes
      node:
        id: kegg_boundary_spillovers
        label: KEGG ppu00260 boundary members
        module_type: METABOLIC_PATHWAY
        description: >-
          The KEGG membership set includes reusable enzymes and side-pathway
          nodes such as TrpA/TrpB, PssA, PvdH, BetA/BetB, Ala racemase, GpmI,
          and PP_4421/PP_4423/PP_4432. These should be reviewed in the ppu00260
          batch because they are KEGG members, but their core functions may
          belong to tryptophan, phospholipid, pyoverdine, osmoprotection,
          peptidoglycan, glycolysis, or uncharacterized boundary pathways.
        annotons:
          - id: pssA_phosphatidylserine_synthase_boundary
            label: PssA phosphatidylserine synthase boundary node
            participant:
              selector_type: GENE
              gene:
                preferred_term: pssA
            function:
              preferred_term: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
              term:
                id: GO:0003882
                label: CDP-diacylglycerol-serine O-phosphatidyltransferase activity
              evidence:
                - source_id: EC:2.7.8.8
                  statement: phosphatidylserine synthase
            role_description: Uses L-serine as a substrate but belongs primarily to phospholipid biosynthesis.
          - id: betAB_choline_betaine_boundary
            label: BetAB choline and betaine aldehyde oxidation boundary
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: betaine-aldehyde dehydrogenase (NAD+) activity
                term:
                  id: GO:0008802
                  label: betaine-aldehyde dehydrogenase (NAD+) activity
            function:
              preferred_term: betaine-aldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0008802
                label: betaine-aldehyde dehydrogenase (NAD+) activity
              evidence:
                - source_id: KEGG:ppu00260
                  statement: betaine aldehyde/choline oxidation side nodes in ppu00260
            role_description: Osmoprotectant betaine biosynthesis/utilization boundary chemistry that feeds methylated-glycine metabolism.
notes: >-
  Falcon module and taxon/species reports are intentionally queued for this
  module while Edison Falcon access returns HTTP 402. Gene-level first-pass
  review should use Asta reports plus UniProt/GOA metadata.
