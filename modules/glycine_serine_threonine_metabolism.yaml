            processes:
              - preferred_term: glycine betaine catabolic process
                term:
                  id: GO:0031457
                  label: glycine betaine catabolic process
            role_description: Candidate glycine betaine demethylation/oxidation step; substrate specificity needs gene-level support.
          - id: dgc_dimethylglycine_dehydrogenase
            label: Dgc dimethylglycine dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: dimethylglycine dehydrogenase activity
                term:
                  id: GO:0047865
                  label: dimethylglycine dehydrogenase activity
            function:
              preferred_term: dimethylglycine dehydrogenase activity
              term:
                id: GO:0047865
                label: dimethylglycine dehydrogenase activity
              evidence:
