id: MODULE:glycine_serine_threonine_metabolism
title: Glycine, serine, and threonine metabolism
description: >-
  A bacterial boundary module for glycine, L-serine, and L-threonine
  metabolism. It covers de novo L-serine biosynthesis from 3-phosphoglycerate,
  the aspartate-derived L-threonine biosynthetic branch through homoserine,
  reversible serine/glycine one-carbon chemistry, glycine cleavage, and
  methylated-glycine catabolism from glycine betaine through dimethylglycine and
  sarcosine to glycine. In Pseudomonas putida KT2440, KEGG ppu00260 also pulls
  in tryptophan synthase, cysteine/methionine, glyoxylate, pyoverdine,
  phospholipid, betaine-osmoprotection, and cell-envelope side nodes. Those are
  tracked as boundary context unless gene-level evidence supports a committed
  glycine/serine/threonine role.
status: DRAFT
evidence:
  - source_id: GO:0006520
    title: amino acid metabolic process
    statement: >-
      The module is grounded in the amino-acid metabolism branch and focuses on
      the connected serine-family amino acid hub.
  - source_id: GO:0006563
    title: L-serine metabolic process
    statement: >-
      L-serine biosynthesis and serine-to-glycine one-carbon chemistry are core
      ppu00260 reactions.
  - source_id: GO:0006566
    title: L-threonine metabolic process
    statement: >-
      The module includes the aspartate-derived homoserine to L-threonine branch
      and threonine catabolic side routes.
  - source_id: GO:0006544
    title: glycine metabolic process
    statement: >-
      Glycine is produced and consumed by serine hydroxymethyltransferase,
      glycine cleavage, threonine aldolase, and methylated-glycine catabolism.
  - source_id: KEGG:ppu00260
    title: Glycine, serine and threonine metabolism - Pseudomonas putida KT2440
    statement: >-
      The KEGG PSEPK bucket provides the first-pass candidate set, but combines
      core serine/threonine/glycine reactions with broad one-carbon, osmolyte,
      lipid, glyoxylate, siderophore, and amino-acid side chemistry.
module:
  id: glycine_serine_threonine_metabolism
  label: Glycine, serine, and threonine metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
