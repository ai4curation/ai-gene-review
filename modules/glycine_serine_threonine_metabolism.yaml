        id: GO:0006520
        label: amino acid metabolic process
      description: Metabolism of amino acids and derivatives.
    - preferred_term: serine family amino acid biosynthetic process
      term:
        id: GO:0009070
        label: serine family amino acid biosynthetic process
      description: Biosynthesis of serine-family amino acids.
    - preferred_term: L-serine biosynthetic process
      term:
        id: GO:0006564
        label: L-serine biosynthetic process
      description: Formation of L-serine from central-carbon precursors.
    - preferred_term: L-threonine biosynthetic process
      term:
        id: GO:0009088
        label: L-threonine biosynthetic process
      description: Formation of L-threonine through the homoserine branch.
    - preferred_term: glycine metabolic process
      term:
        id: GO:0006544
        label: glycine metabolic process
      description: Formation and use of glycine.
    - preferred_term: glycine catabolic process
      term:
        id: GO:0006546
        label: glycine catabolic process
      description: Catabolism of glycine, including glycine cleavage.
    - preferred_term: glycine betaine catabolic process
      term:
        id: GO:0031457
        label: glycine betaine catabolic process
      description: Catabolism of glycine betaine through methylated glycine intermediates.
    - preferred_term: tetrahydrofolate interconversion
      term:
        id: GO:0035999
