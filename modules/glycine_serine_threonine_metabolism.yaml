                  statement: dihydrolipoyl dehydrogenase
            role_description: Reoxidizes reduced lipoamide; may be shared with other alpha-ketoacid dehydrogenase complexes.
    - order: 5
      role: methylated-glycine and glycine betaine catabolism
      node:
        id: methylated_glycine_catabolism
        label: Glycine betaine to glycine
        module_type: METABOLIC_PATHWAY
        description: >-
          PSEPK primary ppu00260 genes include predicted glycine betaine,
          dimethylglycine, and sarcosine oxidation systems. These reactions
          connect osmolyte utilization to glycine and one-carbon metabolism.
        concepts:
