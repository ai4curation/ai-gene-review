            term:
              id: GO:0031457
              label: glycine betaine catabolic process
        annotons:
          - id: gbcAB_glycine_betaine_dioxygenase
            label: GbcAB glycine betaine dioxygenase candidate
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: dioxygenase activity
                term:
                  id: GO:0051213
                  label: dioxygenase activity
            function:
              preferred_term: dioxygenase activity
              term:
                id: GO:0051213
                label: dioxygenase activity
              evidence:
                - source_id: KEGG:ppu00260
