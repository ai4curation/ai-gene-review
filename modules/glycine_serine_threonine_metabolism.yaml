      description: One-carbon transfer through tetrahydrofolate-linked reactions.
    - preferred_term: glycine cleavage complex
      term:
        id: GO:0005960
        label: glycine cleavage complex
      description: Multienzyme glycine cleavage complex that carries out glycine decarboxylation.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most soluble bacterial serine-family amino-acid enzymes operate in the cytoplasm.
  parts:
    - order: 1
      role: L-serine biosynthesis
      node:
        id: l_serine_biosynthesis
        label: 3-phosphoglycerate to L-serine
        module_type: METABOLIC_PATHWAY
        description: >-
          SerA, SerC, and SerB form the canonical bacterial route from
          3-phosphoglycerate to L-serine.
        concepts:
          - preferred_term: L-serine biosynthetic process
            term:
              id: GO:0006564
              label: L-serine biosynthetic process
        annotons:
          - id: serA_phosphoglycerate_dehydrogenase
            label: SerA phosphoglycerate dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: serA
            function:
              preferred_term: phosphoglycerate dehydrogenase activity
              term:
                id: GO:0004617
                label: phosphoglycerate dehydrogenase activity
              evidence:
                - source_id: EC:1.1.1.399
                  statement: D-3-phosphoglycerate dehydrogenase
            role_description: Oxidizes 3-phosphoglycerate toward phosphohydroxypyruvate in L-serine biosynthesis.
          - id: serC_phosphoserine_aminotransferase
            label: SerC phosphoserine aminotransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: serC
            function:
              preferred_term: O-phospho-L-serine:2-oxoglutarate transaminase activity
              term:
                id: GO:0004648
                label: O-phospho-L-serine:2-oxoglutarate transaminase activity
              evidence:
                - source_id: EC:2.6.1.52
                  statement: phosphoserine aminotransferase
            role_description: Transfers amino nitrogen to form O-phospho-L-serine.
          - id: serB_phosphoserine_phosphatase
            label: SerB phosphoserine phosphatase
            participant:
              selector_type: GENE
              gene:
                preferred_term: serB
            function:
              preferred_term: L-phosphoserine phosphatase activity
              term:
                id: GO:0036424
                label: L-phosphoserine phosphatase activity
              evidence:
                - source_id: EC:3.1.3.3
                  statement: phosphoserine phosphatase
            role_description: Hydrolyzes O-phospho-L-serine to L-serine.
    - order: 2
      role: L-threonine biosynthesis from homoserine
      node:
        id: l_threonine_biosynthesis
        label: Homoserine to L-threonine
        module_type: METABOLIC_PATHWAY
        description: >-
          Homoserine dehydrogenase, homoserine kinase, and threonine synthase
          convert the aspartate-family intermediate aspartate-semialdehyde to
          L-threonine. Upstream aspartate kinase and aspartate-semialdehyde
          dehydrogenase are shared with lysine and methionine biosynthesis.
        concepts:
          - preferred_term: L-threonine biosynthetic process
            term:
              id: GO:0009088
              label: L-threonine biosynthetic process
        annotons:
          - id: hom_homoserine_dehydrogenase
            label: Hom homoserine dehydrogenase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: homoserine dehydrogenase activity
                term:
                  id: GO:0004412
                  label: homoserine dehydrogenase activity
            function:
              preferred_term: homoserine dehydrogenase activity
              term:
                id: GO:0004412
                label: homoserine dehydrogenase activity
              evidence:
                - source_id: EC:1.1.1.3
                  statement: homoserine dehydrogenase
            role_description: Reduces aspartate-semialdehyde to homoserine in the aspartate-family amino-acid branch.
          - id: thrB_homoserine_kinase
            label: ThrB homoserine kinase
            participant:
              selector_type: GENE
              gene:
                preferred_term: thrB
            function:
              preferred_term: homoserine kinase activity
              term:
                id: GO:0004413
                label: homoserine kinase activity
              evidence:
                - source_id: EC:2.7.1.39
                  statement: homoserine kinase
            role_description: Phosphorylates homoserine to O-phospho-L-homoserine.
          - id: thrC_threonine_synthase
            label: ThrC threonine synthase
            participant:
              selector_type: GENE
              gene:
                preferred_term: thrC
            function:
              preferred_term: threonine synthase activity
              term:
                id: GO:0004795
                label: threonine synthase activity
              evidence:
                - source_id: EC:4.2.3.1
                  statement: threonine synthase
            role_description: Converts O-phospho-L-homoserine to L-threonine.
    - order: 3
      role: serine-glycine one-carbon interconversion
      node:
        id: serine_glycine_one_carbon
        label: Serine hydroxymethyltransferase
        module_type: REACTION
        description: >-
          Serine hydroxymethyltransferases interconvert L-serine and glycine
          while transferring one-carbon units through tetrahydrofolate.
        annotons:
          - id: glyA_serine_hydroxymethyltransferase
            label: GlyA serine hydroxymethyltransferase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glycine hydroxymethyltransferase activity
                term:
                  id: GO:0004372
                  label: glycine hydroxymethyltransferase activity
            function:
              preferred_term: glycine hydroxymethyltransferase activity
              term:
                id: GO:0004372
                label: glycine hydroxymethyltransferase activity
              evidence:
                - source_id: EC:2.1.2.1
                  statement: serine hydroxymethyltransferase
            processes:
              - preferred_term: tetrahydrofolate interconversion
                term:
                  id: GO:0035999
                  label: tetrahydrofolate interconversion
            role_description: Interconverts L-serine and glycine while producing or consuming 5,10-methylene-tetrahydrofolate.
    - order: 4
      role: glycine cleavage
      node:
        id: glycine_cleavage
        label: Glycine cleavage system
        module_type: PROTEIN_COMPLEX
        description: >-
          PSEPK encodes duplicated glycine-cleavage P/H/T components plus
          lipoamide dehydrogenase candidates. Gene-level review should resolve
          cluster-specific roles and whether Lpd/LpdG/LpdV are shared across
          dehydrogenase complexes.
        concepts:
