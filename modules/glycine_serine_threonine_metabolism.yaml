                term:
                  id: GO:0004375
                  label: glycine dehydrogenase (decarboxylating) activity
            function:
              preferred_term: glycine dehydrogenase (decarboxylating) activity
              term:
                id: GO:0004375
                label: glycine dehydrogenase (decarboxylating) activity
              evidence:
                - source_id: EC:1.4.4.2
                  statement: glycine cleavage P protein
            role_description: Initiates glycine decarboxylation in the glycine cleavage complex.
          - id: gcvT_aminomethyltransferase
            label: GcvT aminomethyltransferase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: aminomethyltransferase activity
                term:
                  id: GO:0004047
                  label: aminomethyltransferase activity
            function:
              preferred_term: aminomethyltransferase activity
              term:
