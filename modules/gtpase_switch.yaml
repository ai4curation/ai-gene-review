id: MODULE:gtpase_switch
title: Generic GTPase nucleotide switch motif (GEF / GTP / GAP)
description: >-
  The minimal, reusable nucleotide-switch motif shared by regulatory GTPases: a
  guanine-nucleotide exchange factor (GEF) loads GTP to flip the GTPase into its
  active conformation, where it engages downstream effectors; a GTPase-activating
  protein (GAP) then stimulates GTP hydrolysis to return the switch to its
  inactive GDP-bound state. The motif is deliberately gene-free and taxon-neutral:
  it fixes only the GEF/GTPase/GAP roles (by molecular-function term) and the
  load/hydrolyze topology. Concrete switches - the Ras, Rho/Rac/Cdc42, Rab, Arf,
  Ran, and heterotrimeric-Galpha families - embed this motif as an inner bundle
  through `conforms_to`, substituting their own GEF/GTPase/GAP and the specific
  effectors they activate. Grounded in GO:0007264 (small GTPase-mediated signal
  transduction).
status: DRAFT
evidence:
  - source_id: GO:0007264
    title: small GTPase-mediated signal transduction
    statement: >-
      The motif is grounded in small GTPase-mediated signal transduction, the
      binary GTP/GDP switch that couples upstream GEFs to downstream effectors.
notes: >-
  Reusable conformance target. A node in a concrete pathway declares
  `conforms_to: [{template: gtpase_switch}]` when its steps instantiate the
  GEF-load / active-GTPase / GAP-hydrolyze switch. The Ras switch inlined in
  MODULE:erk_cascade is one realization. Participants are abstract selectors
  because the motif asserts the switch chemistry only.
module:
  id: gtpase_switch
  label: GTPase nucleotide switch (GEF / GTP / GAP)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: small GTPase-mediated signal transduction
      term:
        id: GO:0007264
        label: small GTPase-mediated signal transduction
      description: Binary GTP/GDP molecular switch coupling GEFs to effectors.
  parts:
    - order: 1
      role: GEF-catalyzed GTP loading
      node:
        id: gef_step
        label: GEF-catalyzed GDP-for-GTP exchange
        module_type: REACTION
        description: A GEF catalyzes release of GDP and binding of GTP, switching the GTPase on.
        annotons:
          - id: gef_activity
            label: guanine-nucleotide exchange factor activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: guanyl-nucleotide exchange factor activity
                term:
                  id: GO:0005085
                  label: guanyl-nucleotide exchange factor activity
            function:
              preferred_term: guanyl-nucleotide exchange factor activity
              term:
                id: GO:0005085
                label: guanyl-nucleotide exchange factor activity
              targets:
                - preferred_term: GTPase
            role_description: Loads GTP onto the GTPase, activating the switch.
    - order: 2
      role: active GTP-bound GTPase
      node:
        id: active_gtpase
        label: Active GTP-bound GTPase
        module_type: REACTION
        description: >-
          The GTP-bound GTPase adopts its active conformation, engages effectors,
          and possesses intrinsic GTP-hydrolytic activity that resets the switch.
        annotons:
          - id: gtpase_activity
            label: GTPase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: GTPase activity
                term:
                  id: GO:0003924
                  label: GTPase activity
            function:
              preferred_term: GTPase activity
              term:
                id: GO:0003924
                label: GTPase activity
            processes:
              - preferred_term: small GTPase-mediated signal transduction
                term:
                  id: GO:0007264
                  label: small GTPase-mediated signal transduction
            role_description: Binary switch; active when GTP-bound, engages effectors.
    - order: 3
      role: GAP-stimulated switch-off
      node:
        id: gap_step
        label: GAP-stimulated GTP hydrolysis
        module_type: REACTION
        description: A GAP accelerates GTP hydrolysis, returning the GTPase to its inactive GDP-bound state.
        annotons:
          - id: gap_activity
            label: GTPase activator activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: GTPase activator activity
                term:
                  id: GO:0005096
                  label: GTPase activator activity
            function:
              preferred_term: GTPase activator activity
              term:
                id: GO:0005096
                label: GTPase activator activity
            role_description: Stimulates GTP hydrolysis to switch the GTPase off.
  connections:
