      target: active_gtpase
      connection_type: CAUSES
      description: GEF loading produces the active GTP-bound GTPase.
    - source: gap_step
      target: active_gtpase
      connection_type: NEGATIVELY_REGULATES
      description: GAP stimulates hydrolysis, switching the GTPase off.
