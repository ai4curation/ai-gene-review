id: MODULE:plant_xylan_biosynthesis
title: Plant xylan (glucuronoxylan) biosynthesis module
description: >-
  A taxon-neutral decomposition of plant heteroxylan biosynthesis as a
  recursively decomposable module. Xylan is the dominant hemicellulose of the
  secondary cell wall: a (1->4)-beta-D-xylan backbone decorated with
  (alpha-1,2)-linked (4-O-methyl)glucuronic acid and O-acetyl groups in eudicots
  (glucuronoxylan, GX) and additionally with alpha-arabinofuranosyl and
  feruloyl-arabinose substitutions in grasses (glucuronoarabinoxylan, GAX). Xylan
  coats and tethers cellulose microfibrils and is covalently and non-covalently
  associated with lignin in the lignin-carbohydrate complex, so it is a major
  contributor to biomass recalcitrance and a key acetyl-group source that
  inhibits downstream fermentation. The module separates (1) Golgi backbone
  elongation by the IRX9/IRX10/IRX14 xylan synthase machinery, (2) synthesis of
  the reducing-end oligosaccharide sequence that may prime/terminate the chain in
  eudicots, (3) alpha-glucuronosyl sidechain addition (GUX), (4) 4-O-methylation
  of the glucuronic acid (GXM), and (5) O-acetylation (ESK1/TBL29 with RWA
  acetyl-CoA supply). It is phrased as functions, complexes, and pathway segments
  rather than a fixed gene list so it can represent eudicot GX and grass GAX
  implementations; concrete UniProt members are Arabidopsis exemplars, not
  species-restricting claims. As a bioenergy module, xylan substitution pattern
  (acetylation, methyl-GlcA) and quantity are principal engineering targets for
  reducing recalcitrance and acetate-driven fermentation inhibition.
status: DRAFT
evidence:
  - source_id: GO:0045492
    title: xylan biosynthetic process
    statement: >-
      The module is grounded in the GO biological-process term for xylan
      biosynthesis; the eudicot-specific product is grounded to glucuronoxylan
      biosynthetic process (GO:0010417).
  - source_id: GO:0010417
    title: glucuronoxylan biosynthetic process
    statement: >-
      The eudicot secondary-wall xylan is glucuronoxylan (GX); grass GAX adds
      arabinosyl/feruloyl substitutions on the same backbone.
  - source_id: UniProtKB:Q9FZJ1
    title: beta-1,4-xylosyltransferase IRX10 (AtIRX10)
    statement: >-
      Arabidopsis exemplar GT47 catalytic xylosyltransferase elongating the
      (1->4)-beta-D-xylan backbone.
  - source_id: UniProtKB:Q9ZQC6
    title: beta-1,4-xylosyltransferase IRX9 (AtIRX9)
    statement: >-
      Arabidopsis exemplar GT43 component of the xylan synthase machinery
      (EC 2.4.2.24, 1,4-beta-D-xylan synthase); irx9 collapses xylem vessels.
  - source_id: UniProtKB:Q8L707
    title: beta-1,4-xylosyltransferase IRX14 (AtIRX14)
    statement: >-
      Arabidopsis exemplar GT43 component partnering IRX9/IRX10 in backbone
      elongation.
  - source_id: UniProtKB:Q9ZUV3
    title: Glucuronoxylan glucuronosyltransferase IRX7 / FRA8 (AtIRX7)
    statement: >-
      Arabidopsis exemplar GT47 enzyme required for the reducing-end
      oligosaccharide sequence of eudicot xylan.
  - source_id: UniProtKB:Q9FH36
    title: Galacturonosyltransferase 12 / IRX8 (AtGAUT12)
    statement: >-
      Arabidopsis exemplar GT8 enzyme required for xylan reducing-end sequence and
      normal xylan amount; irx8 has severely reduced xylan.
  - source_id: UniProtKB:Q9LN68
    title: Galacturonosyltransferase-like 1 / PARVUS (AtGATL1)
    statement: >-
      Arabidopsis exemplar GT8 enzyme contributing to the xylan reducing-end
      oligosaccharide sequence.
  - source_id: UniProtKB:Q9LSB1
    title: UDP-glucuronate:xylan alpha-glucuronosyltransferase 1 / GUX1 (AtGUX1)
    statement: >-
      Arabidopsis exemplar GT8 enzyme adding (alpha-1,2)-glucuronic acid
      sidechains to the xylan backbone (GO:0080116).
  - source_id: UniProtKB:Q9LQ32
    title: Glucuronoxylan 4-O-methyltransferase 3 / GXM3 (AtGXM3)
    statement: >-
      Arabidopsis exemplar 4-O-methylating the glucuronic acid sidechain to
      4-O-methyl-GlcA (GO:0030775, EC 2.1.1.112).
  - source_id: UniProtKB:Q9LY46
    title: Xylan O-acetyltransferase 1 / ESK1 / TBL29 (AtESK1)
    statement: >-
      Arabidopsis exemplar 2-O-/3-O-acetylating the xylan backbone
      (GO:1990538); esk1 has reduced xylan acetylation and collapsed xylem.
  - source_id: UniProtKB:Q0WW17
    title: REDUCED WALL ACETYLATION 2 / RWA2 (AtRWA2)
    statement: >-
      Arabidopsis exemplar of the RWA family supplying acetyl donor to the Golgi
      lumen for wall polysaccharide O-acetylation.
notes: >-
  Identifiers are grounded only where verified against the local GO term cache or
  UniProt; descriptors without a `term` (e.g. UDP-xylose donor, backbone
  oligosaccharide intermediates) are deliberate rather than oversights. The xylan
  backbone synthase is an IRX9/IRX10/IRX14 machine; IRX10 (GT47) is treated as the
  catalytic xylosyltransferase and IRX9/IRX14 (GT43) as required components. The
  reducing-end oligosaccharide sequence (IRX7/FRA8, IRX8/GAUT12, PARVUS) is a
  eudicot feature and is marked optional; grasses lack this reducing-end tetramer.
  The grass glucuronoarabinoxylan variant (alpha-arabinofuranosyl and
  feruloyl-arabinose substitutions) is represented as a descriptor-level variant
  without an asserted UniProt exemplar because the arabinosyl/feruloyl transferase
  members are grass genes not verified here. Representative UniProt members are
  concrete Arabidopsis exemplars for orientation, not exhaustive or
  species-restricting.
module:
  id: plant_xylan_biosynthesis
  label: Plant xylan (glucuronoxylan) biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: xylan biosynthetic process
      term:
        id: GO:0045492
        label: xylan biosynthetic process
      description: >-
        Golgi synthesis of the (1->4)-beta-D-xylan backbone and its glucuronosyl,
        4-O-methylglucuronosyl, and O-acetyl (and, in grasses, arabinosyl)
        substitutions.
    - preferred_term: glucuronoxylan biosynthetic process
      term:
        id: GO:0010417
        label: glucuronoxylan biosynthetic process
  context:
    taxa:
      - preferred_term: eudicots (glucuronoxylan, GX)
      - preferred_term: grasses / commelinid monocots (glucuronoarabinoxylan, GAX)
    cellular_components:
      - preferred_term: Golgi membrane (site of xylan synthase machinery)
        term:
          id: GO:0000139
          label: Golgi membrane
      - preferred_term: Golgi apparatus (lumenal substitution)
        term:
          id: GO:0005794
          label: Golgi apparatus
  parts:
    - order: 1
      role: (1->4)-beta-D-xylan backbone elongation
      node:
        id: xylan_backbone_synthase
        label: Xylan synthase machinery (IRX9/IRX10/IRX14)
        module_type: PROTEIN_COMPLEX
        description: >-
          Golgi-membrane glycosyltransferase machinery that elongates the
          (1->4)-beta-D-xylan backbone from UDP-D-xylose. IRX10 (GT47) is the
          catalytic xylosyltransferase; IRX9 and IRX14 (GT43) are required, likely
          structural/co-catalytic, partners.
        annotons:
          - id: xylan_synthase_activity
            label: 1,4-beta-D-xylan synthase (backbone elongation)
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: xylan synthase complex (IRX9/IRX10/IRX14)
                description: >-
                  Golgi glycosyltransferase complex adding beta-1,4-xylosyl units
                  to the growing backbone; catalytic GT47 (IRX10) plus GT43
                  components (IRX9, IRX14).
            function:
              preferred_term: 1,4-beta-D-xylan synthase activity
              term:
                id: GO:0047517
                label: 1,4-beta-D-xylan synthase activity
              substrates:
                - preferred_term: UDP-D-xylose
                - preferred_term: "(1->4)-beta-D-xylan (n)"
              products:
                - preferred_term: "(1->4)-beta-D-xylan (n+1)"
                - preferred_term: UDP
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: >-
              Processive backbone elongation; the rate-defining core of xylan
              synthesis and the irregular-xylem (irx9/irx10/irx14) locus.
          - id: irx10_catalytic
            label: IRX10 catalytic xylosyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GT47 xylan xylosyltransferase (IRX10)
                representative_members:
                  - preferred_term: Arabidopsis IRX10
                    term:
                      id: UniProtKB:Q9FZJ1
                      label: IRX10_ARATH
            function:
              preferred_term: UDP-xylosyltransferase activity
              term:
                id: GO:0035252
                label: UDP-xylosyltransferase activity
            processes:
              - preferred_term: glucuronoxylan biosynthetic process
                term:
                  id: GO:0010417
                  label: glucuronoxylan biosynthetic process
            role_description: >-
              GT47 catalytic subunit transferring xylose from UDP-xylose to the
              non-reducing end of the backbone.
          - id: irx9_irx14_components
            label: IRX9/IRX14 GT43 components
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GT43 xylan synthase components (IRX9, IRX14)
                representative_members:
                  - preferred_term: Arabidopsis IRX9
                    term:
                      id: UniProtKB:Q9ZQC6
                      label: IRX9_ARATH
                  - preferred_term: Arabidopsis IRX14
                    term:
                      id: UniProtKB:Q8L707
                      label: IRX14_ARATH
            function:
              preferred_term: GT43 component of the xylan synthase complex
              description: >-
                Required GT43 partners of the IRX10 catalytic core. Genetic loss
                of either abolishes xylan synthesis, but they are generally
                regarded as non-catalytic/structural components rather than
                independent xylosyltransferases, so no catalytic MF term is
                asserted for them here (the synthase activity, GO:0047517, is
                carried by the complex-level annoton).
            processes:
              - preferred_term: plant-type secondary cell wall biogenesis
                term:
                  id: GO:0009834
                  label: plant-type secondary cell wall biogenesis
            role_description: >-
              GT43 partners required for backbone synthesis; each is individually
              essential for normal xylan in Arabidopsis stems.
    - order: 2
      role: reducing-end oligosaccharide sequence (eudicot)
      optional: true
      node:
        id: reducing_end_sequence
        label: Reducing-end oligosaccharide primer/terminator
        module_type: METABOLIC_PATHWAY
        description: >-
          Eudicot glucuronoxylan carries a distinctive reducing-end tetrasaccharide
          (Xyl-Rha-GalA-Xyl). IRX7/FRA8, IRX8/GAUT12, and PARVUS are required for
          its synthesis and for normal xylan chain amount/length; grasses lack this
          sequence.
        annotons:
          - id: reducing_end_gts
            label: Reducing-end glycosyltransferases (FRA8/GAUT12/PARVUS)
            participant:
              selector_type: FAMILY
              family:
                preferred_term: xylan reducing-end glycosyltransferases
                representative_members:
                  - preferred_term: Arabidopsis IRX7 (FRA8)
                    term:
                      id: UniProtKB:Q9ZUV3
                      label: IRX7_ARATH
                  - preferred_term: Arabidopsis GAUT12 (IRX8)
                    term:
                      id: UniProtKB:Q9FH36
                      label: GAUTC_ARATH
                  - preferred_term: Arabidopsis PARVUS (GATL1)
                    term:
                      id: UniProtKB:Q9LN68
                      label: GATL1_ARATH
            function:
              preferred_term: reducing-end oligosaccharide glycosyltransfer
              description: >-
                Coordinated GT47/GT8 transfers building the Xyl-Rha-GalA-Xyl
                reducing-end sequence; exact per-enzyme linkage specificities are
                not asserted as single GO MF ids here.
            processes:
              - preferred_term: glucuronoxylan biosynthetic process
                term:
                  id: GO:0010417
                  label: glucuronoxylan biosynthetic process
            locations:
              - preferred_term: Golgi apparatus
                term:
                  id: GO:0005794
                  label: Golgi apparatus
            role_description: >-
              Synthesizes the eudicot reducing-end sequence proposed to prime or
              terminate the backbone; loss reduces xylan chain number.
    - order: 3
      role: alpha-glucuronosyl sidechain addition
      node:
        id: glucuronosyl_substitution
        label: GlcA sidechain addition (GUX)
        module_type: REACTION
        annotons:
          - id: gux_activity
            label: Xylan alpha-glucuronosyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: xylan alpha-(1,2)-glucuronosyltransferase (GUX)
                representative_members:
                  - preferred_term: Arabidopsis GUX1
                    term:
                      id: UniProtKB:Q9LSB1
                      label: GUX1_ARATH
            function:
              preferred_term: glucuronoxylan glucuronosyltransferase activity
              term:
                id: GO:0080116
                label: glucuronoxylan glucuronosyltransferase activity
              substrates:
                - preferred_term: UDP-glucuronate
                - preferred_term: "(1->4)-beta-D-xylan backbone"
              products:
                - preferred_term: glucuronoxylan (GlcA-substituted)
                - preferred_term: UDP
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: >-
              Adds (alpha-1,2)-glucuronic acid sidechains; the spacing/pattern of
              GlcA governs xylan-cellulose and xylan-lignin interactions.
    - order: 4
      role: 4-O-methylation of the glucuronic acid sidechain
      optional: true
      node:
        id: glcA_methylation
        label: 4-O-methylation of GlcA (GXM)
        module_type: REACTION
        annotons:
          - id: gxm_activity
            label: Glucuronoxylan 4-O-methyltransferase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: glucuronoxylan 4-O-methyltransferase (GXM/DUF579)
                representative_members:
                  - preferred_term: Arabidopsis GXM3
                    term:
                      id: UniProtKB:Q9LQ32
                      label: GXM3_ARATH
            function:
              preferred_term: glucuronoxylan 4-O-methyltransferase activity
              term:
                id: GO:0030775
                label: glucuronoxylan 4-O-methyltransferase activity
              substrates:
                - preferred_term: glucuronoxylan (GlcA)
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: glucuronoxylan (4-O-methyl-GlcA)
                - preferred_term: S-adenosyl-L-homocysteine
            locations:
              - preferred_term: Golgi apparatus
                term:
                  id: GO:0005794
                  label: Golgi apparatus
            role_description: >-
              Methylates GlcA to 4-O-methyl-GlcA; the methyl:non-methyl GlcA ratio
              affects xylan solubility and lignin association.
    - order: 5
      role: backbone O-acetylation
      node:
        id: xylan_acetylation
        label: Xylan O-acetylation (ESK1/TBL29 + RWA acetyl supply)
        module_type: METABOLIC_PATHWAY
        description: >-
          O-acetyl esters on the xylose backbone (2-O and 3-O) are the most
          abundant xylan substituent and a major source of acetate that inhibits
          microbial fermentation of hydrolysates.
        parts:
          - order: 1
            role: xylan O-acetyltransfer
            node:
              id: esk1_acetyltransfer
              label: Xylan O-acetyltransferase (ESK1/TBL29)
              module_type: REACTION
              annotons:
                - id: esk1_activity
                  label: Xylan O-acetyltransferase
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: TBL/DUF231 xylan O-acetyltransferase (ESK1/TBL29)
                      representative_members:
                        - preferred_term: Arabidopsis ESK1 (TBL29 / XOAT1)
                          term:
                            id: UniProtKB:Q9LY46
                            label: TBL29_ARATH
                  function:
                    preferred_term: xylan O-acetyltransferase activity
                    term:
                      id: GO:1990538
                      label: xylan O-acetyltransferase activity
                    substrates:
                      - preferred_term: acetyl-CoA (or acetyl donor)
                      - preferred_term: "(1->4)-beta-D-xylan backbone"
                    products:
                      - preferred_term: O-acetyl-xylan
                  locations:
                    - preferred_term: Golgi membrane
                      term:
                        id: GO:0000139
                        label: Golgi membrane
                  role_description: >-
                    Adds 2-O/3-O-acetyl esters to xylosyl residues; esk1 collapses
                    xylem and reduces acetylation.
          - order: 2
            role: Golgi acetyl-CoA supply
            optional: true
            node:
              id: rwa_acetyl_supply
              label: RWA acetyl donor supply
              module_type: TRANSPORT_STEP
              annotons:
                - id: rwa_activity
                  label: REDUCED WALL ACETYLATION (RWA) acetyl supply
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: RWA acetyl-CoA supply protein
                      representative_members:
                        - preferred_term: Arabidopsis RWA2
                          term:
                            id: UniProtKB:Q0WW17
                            label: RWA2_ARATH
                  function:
                    preferred_term: Golgi acetyl donor provision for wall O-acetylation
                    description: >-
                      RWA proteins supply the acetyl donor to the Golgi lumen for
                      polysaccharide O-acetylation; exact transported species/MF is
                      not asserted as a single GO id here.
                  locations:
                    - preferred_term: Golgi membrane
                      term:
                        id: GO:0000139
                        label: Golgi membrane
                  role_description: >-
                    Provides lumenal acetyl donor upstream of the O-acetyltransferases;
                    rwa mutants have globally reduced wall acetylation.
  connections:
    - source: xylan_backbone_synthase
      target: glucuronosyl_substitution
      connection_type: PROVIDES_INPUT_FOR
      description: The elongating xylan backbone is the acceptor for GlcA sidechain addition.
    - source: reducing_end_sequence
      target: xylan_backbone_synthase
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The reducing-end oligosaccharide sequence is proposed to prime/terminate
        eudicot backbone synthesis.
    - source: glucuronosyl_substitution
      target: glcA_methylation
      connection_type: PRECEDES
      chaining_status: VERIFIED
      chaining_note: >-
        GUX first installs the GlcA sidechain; GXM then 4-O-methylates that same
        GlcA to 4-O-methyl-GlcA.
    - source: xylan_backbone_synthase
      target: xylan_acetylation
      connection_type: PROVIDES_INPUT_FOR
      description: The backbone xylosyl residues are the acceptors for O-acetylation.
    - source: rwa_acetyl_supply
      target: esk1_acetyltransfer
      connection_type: PROVIDES_INPUT_FOR
      description: RWA-supplied lumenal acetyl donor feeds the xylan O-acetyltransferase.
