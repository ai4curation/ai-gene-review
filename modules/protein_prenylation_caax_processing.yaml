id: MODULE:protein_prenylation_caax_processing
title: Protein prenylation and CAAX processing (FTase/GGTase-I/RabGGTase -> RCE1 -> ICMT)
description: >-
  Prenylation is a lipid post-translational modification that irreversibly attaches a farnesyl (C15) or
  geranylgeranyl (C20) isoprenoid — supplied as FPP/GGPP from the mevalonate pathway — to C-terminal cysteines
  of ~300 human proteins (Ras, Rho, Rac, Rab and other small GTPases, nuclear lamins, kinases), anchoring them
  to membranes and enabling signalling and vesicular trafficking. Three heterodimeric prenyltransferases do
  the attachment. Farnesyltransferase (FTase = the shared alpha subunit FNTA + the beta subunit FNTB) and
  geranylgeranyltransferase type I (GGTase-I = FNTA + PGGT1B) recognise a C-terminal CAAX motif directly and
  prenylate its cysteine — FTase when X is Met/Ser/Gln/Ala, GGTase-I when X is Leu/Phe. Rab
  geranylgeranyltransferase (GGTase-II / RabGGTase = RABGGTA + RABGGTB) instead double-geranylgeranylates the
  C-terminal CC/CXC cysteines of Rab GTPases, which must first be presented by the Rab escort protein
  REP1/REP2 (CHM/CHML). For the CAAX (FTase/GGTase-I) substrates, two further ER-membrane maturation steps
  follow: the glutamate-type intramembrane protease RCE1 removes the -AAX tripeptide, exposing the
  prenylcysteine as the new C-terminus, and the SAM-dependent methyltransferase ICMT carboxymethylates that
  prenylcysteine, maximising hydrophobicity and membrane affinity. The pathway is a major anticancer target
  (Ras farnesylation; FTIs) and underlies Hutchinson-Gilford progeria (lamin A prenylation). RabGGTase/REP
  defects cause choroideremia (via CHM), and RCE1/ICMT are Ras-pathway drug targets.
status: DRAFT
evidence:
  - source_id: GO:0018343
    title: protein farnesylation
    statement: FTase (FNTA/FNTB) farnesylates CAAX proteins (GO:0018343).
  - source_id: GO:0018344
    title: protein geranylgeranylation
    statement: GGTase-I (FNTA/PGGT1B) and RabGGTase (RABGGTA/RABGGTB) geranylgeranylate CAAX and Rab proteins (GO:0018344).
  - source_id: GO:0071586
    title: CAAX-box protein processing
    statement: RCE1 and ICMT carry out post-prenylation CAAX maturation (GO:0071586).
  - source_id: file:human/FNTA/FNTA-ai-review.yaml
    title: FNTA gene review (human)
    statement: The shared FTase/GGTase-I alpha subunit (UniProtKB:P49354, GO:0004660/GO:0004662) matches the completed human FNTA review.
  - source_id: file:human/FNTB/FNTB-ai-review.yaml
    title: FNTB gene review (human)
    statement: The farnesyltransferase beta (catalytic) subunit (UniProtKB:P49356, GO:0004660) matches the completed human FNTB review.
  - source_id: file:human/PGGT1B/PGGT1B-ai-review.yaml
    title: PGGT1B gene review (human)
    statement: The GGTase-I beta (catalytic) subunit (UniProtKB:P53609, GO:0004662) matches the completed human PGGT1B review.
  - source_id: file:human/RABGGTA/RABGGTA-ai-review.yaml
    title: RABGGTA gene review (human)
    statement: The RabGGTase alpha subunit (UniProtKB:Q92696, GO:0004663) matches the completed human RABGGTA review.
  - source_id: file:human/RABGGTB/RABGGTB-ai-review.yaml
    title: RABGGTB gene review (human)
    statement: The RabGGTase beta (catalytic) subunit (UniProtKB:P53611, GO:0004663) matches the completed human RABGGTB review.
  - source_id: file:human/RCE1/RCE1-ai-review.yaml
    title: RCE1 gene review (human)
    statement: The CAAX -AAX endoprotease step (UniProtKB:Q9Y256, GO:0070002) matches the completed human RCE1 review.
  - source_id: file:human/ICMT/ICMT-ai-review.yaml
    title: ICMT gene review (human)
    statement: The prenylcysteine carboxyl methylation step (UniProtKB:O60725, GO:0004671) matches the completed human ICMT review.
