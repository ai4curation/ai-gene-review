  notes: >-
    Protein prenylation and CAAX processing (GO:0018344 + GO:0071586), grounded to seven completed human gene
    reviews. PRENYLATION (cytosol): FTase = FNTA (P49354, shared alpha, PTHR11129) + FNTB (P49356 PTHR11774,
    catalytic beta, GO:0004660) farnesylates CAAX (X=M/S/Q/A); GGTase-I = FNTA + PGGT1B (P53609 PTHR11774,
    GO:0004662) geranylgeranylates CAAX (X=L/F); RabGGTase/GGTase-II = RABGGTA (Q92696 PTHR11129, alpha) +
    RABGGTB (P53611 PTHR11774, catalytic beta, GO:0004663) double-geranylgeranylates Rab CC/CXC (Rab presented
    by REP1/REP2=CHM/CHML). FNTA modelled as the shared-alpha adaptor (contributes_to both FTase GO:0005965 and
    GGTase-I GO:0005953 complexes); the beta subunits carry the catalytic Zn2+. CAAX MATURATION (ER membrane,
    FTase/GGTase-I substrates only): RCE1 (Q9Y256 PTHR13046, GO:0070002 glutamate-type intramembrane protease —
    NOT metallo/cysteine; several obsolete protease terms corrected) removes -AAX; ICMT (O60725 PTHR12714,
    GO:0004671) carboxymethylates the prenylcysteine (SAM). FPP/GGPP donors come from the mevalonate/isoprenoid
    pathway (FDPS/GGPS1, separate). Recurrent curation: bare protein-binding IPIs over-annotated (mostly the
    cognate alpha/beta subunit or REP1); the choroideremia (visual perception) annotations belong to CHM/REP1,
    not the RabGGTase subunits (flagged). GO term ids/labels verified against the local go.db. Anticancer FTIs
    (Ras), Hutchinson-Gilford progeria (lamin A), choroideremia (CHM/REP1).
