id: MODULE:sulfur_relay_system_boundary
title: Sulfur relay system boundary
description: >-
  Umbrella boundary module for KEGG ppu04122 in Pseudomonas putida KT2440. The
  organism-specific sulfur relay map combines molybdopterin/MoCo sulfur-carrier
  chemistry, Tus/MnmA tRNA wobble-uridine thiolation, ThiS thiamine sulfur
  carrier context, and rhodanese or mercaptopyruvate sulfurtransferase side
  nodes. This module indexes those subroutes and should not be used as one
  generic sulfur-relay pathway for all member genes.
status: DRAFT
evidence:
  - source_id: KEGG:ppu04122
    title: Sulfur relay system - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu04122 provides the PSEPK sulfur-relay umbrella map. Its primary
      set mixes MoCo/molybdopterin biosynthesis, Tus/MnmA tRNA thiolation,
      thiamine sulfur-carrier context, and sulfurtransferase side nodes.
  - source_id: file:projects/P_PUTIDA/batches/ppu04122_sulfur_relay_system_partition.tsv
    title: PSEPK ppu04122 sulfur-relay partition table
    statement: >-
      The partition separates the 19 primary genes into molybdopterin/MoCo
      sulfur relay, Tus/MnmA tRNA thiolation, ThiS thiamine sulfur-carrier, and
      rhodanese/mercaptopyruvate sulfurtransferase buckets.
  - source_id: file:projects/P_PUTIDA/batches/ppu04122_sulfur_relay_system_partition.md
    title: PSEPK ppu04122 sulfur relay system partition
    statement: >-
      The partition report records completed first-pass sub-batches for the
      MoCo sulfur-relay and Tus/MnmA tRNA-thiolation subsets.
module:
  id: sulfur_relay_system_boundary
  label: Sulfur relay system boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: sulfur carrier activity
      term:
        id: GO:0097163
        label: sulfur carrier activity
      description: Protein-bound sulfur-carrier chemistry used by MoaD, Tus proteins, and ThiS-family systems.
    - preferred_term: Mo-molybdopterin cofactor biosynthetic process
      term:
        id: GO:0006777
        label: Mo-molybdopterin cofactor biosynthetic process
      description: MoCo/molybdopterin branch represented by Moa/Moe proteins.
    - preferred_term: tRNA wobble position uridine thiolation
      term:
        id: GO:0002143
        label: tRNA wobble position uridine thiolation
      description: Tus/MnmA sulfur relay endpoint for bacterial tRNA modification.
    - preferred_term: thiamine biosynthetic process
      term:
        id: GO:0009228
        label: thiamine biosynthetic process
      description: ThiS sulfur-carrier context for thiamine biosynthesis.
    - preferred_term: thiosulfate-cyanide sulfurtransferase activity
      term:
        id: GO:0004792
        label: thiosulfate-cyanide sulfurtransferase activity
      description: Rhodanese-family sulfurtransferase side-node context.
  parts:
    - order: 1
      role: Umbrella sulfur-relay boundary
      node:
        id: sulfur_relay_umbrella_boundary
        label: Sulfur relay umbrella boundary
        module_type: BIOLOGICAL_PROCESS
        description: >-
          ppu04122 is a KEGG umbrella map for multiple sulfur-carrier systems.
          Curate and review it through the subroutes below rather than applying
          one sulfur-relay process to every member.
        annotons: []
    - order: 2
      role: Molybdopterin/MoCo sulfur relay
      node:
        id: molybdopterin_moco_sulfur_relay_index
        label: Molybdopterin/MoCo sulfur relay index
        module_type: METABOLIC_PATHWAY
        description: >-
          The MoCo subset is represented by
          `molybdopterin_biosynthesis_sulfur_relay_boundary`, including MoaA,
          MoaC, MoeB, MoaD, MoaE, MoaB/Mog-family support, and MoaA-like
          paralog boundary candidates.
        annotons: []
    - order: 3
      role: Tus/MnmA tRNA thiolation relay
      node:
        id: tus_mnma_trna_thiolation_index
        label: Tus/MnmA tRNA thiolation index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The tRNA-thiolation subset is represented by
          `mnma_tus_trna_thiolation_boundary`, including TusA-family sulfur
          carriers, TusBCD/TusE relay components, and MnmA as the catalytic
          tRNA-uridine 2-sulfurtransferase endpoint.
        annotons: []
    - order: 4
      role: ThiS thiamine sulfur-carrier context
      node:
        id: this_thiamine_sulfur_carrier_index
        label: ThiS thiamine sulfur-carrier index
        module_type: METABOLIC_PATHWAY
        description: >-
          PP_5105/ThiS belongs with thiamine biosynthesis rather than the MoCo
          or Tus/MnmA relay modules. Keep it connected to the thiamine module
          unless sulfur-relay-specific evidence requires a separate branch.
        annotons: []
    - order: 5
      role: Rhodanese and mercaptopyruvate sulfurtransferase side nodes
      node:
        id: rhodanese_mercaptopyruvate_side_node_index
        label: Rhodanese and mercaptopyruvate sulfurtransferase side-node index
        module_type: METABOLIC_PATHWAY
        description: >-
          rhdA and sseA are retained with sulfur-metabolism sulfurtransferase
          context. They should not be promoted to a specific MoCo or Tus/MnmA
          sulfur relay without additional mechanism-specific evidence.
        annotons: []
  notes: >-
    This parent module is an index over completed curation-scale submodules.
    It exists to prevent KEGG umbrella membership from driving broad, generic
    sulfur-relay annotations across mechanistically distinct sulfur-carrier
    systems.
