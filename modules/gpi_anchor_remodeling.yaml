        label: removal of the sn-2 unsaturated fatty acid from the GPI anchor
        module_type: REACTION
        annotons:
          - id: pgap3_activity
            label: "PGAP3: GPI-specific phospholipase A2"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PGAP3/CREST GPI phospholipase family
