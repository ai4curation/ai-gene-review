id: MODULE:gpi_anchor_remodeling
title: GPI anchor biosynthesis V — post-attachment lipid remodeling; PGAP1/PGAP3/PGAP2
description: >-
  After a protein has been GPI-anchored by the transamidase, the anchor's lipid moiety is
  remodeled so the mature GPI-anchored protein can exit the ER, traffic through the Golgi and
  partition into membrane microdomains (lipid rafts). Three post-GPI-attachment factors carry
  out the remodeling. In the endoplasmic reticulum, PGAP1 is a GPI inositol-deacylase that
  removes the acyl chain from the inositol ring of the anchor (the acyl group added earlier by
  PIGW); this inositol-deacylation is required for efficient ER-to-Golgi transport of
  GPI-anchored proteins. In the Golgi, fatty-acid remodeling then exchanges the unsaturated
  sn-2 chain of the phosphatidylinositol for a saturated one: the GPI-specific phospholipase A2
  PGAP3 first removes the sn-2 unsaturated fatty acid, and PGAP2 is required to reacylate the
  resulting lyso-GPI intermediate with a saturated (stearoyl) chain, generating the mature,
  raft-associating anchor needed for stable cell-surface expression. Inherited defects cause
  GPI-deficiency disease: PGAP1 (intellectual disability / encephalopathy), PGAP3
  (hyperphosphatasia with mental retardation syndrome 4, HPMRS4) and PGAP2 (HPMRS3).
status: DRAFT
evidence:
  - source_id: GO:0120574
    title: GPI anchor remodelling
    statement: >-
      The module is grounded in GPI anchor remodelling (GO:0120574): post-attachment
      inositol-deacylation and fatty-acid remodeling of the GPI-anchored protein's lipid moiety.
  - source_id: Reactome:R-HSA-162710
    title: Synthesis of glycosylphosphatidylinositol (GPI)
    statement: >-
      The inositol-deacylation step (PGAP1) follows the human Reactome reaction R-HSA-162729
      (uPAR-acyl-GPI + H2O -> uPAR + long-chain fatty acid), part of "Synthesis of GPI".
  - source_id: file:human/PGAP1/PGAP1-ai-review.yaml
    title: PGAP1 gene review (human)
    statement: >-
      The ER inositol-deacylation step (UniProtKB:Q75T13, GO:0160215) matches the completed human
      PGAP1 review.
  - source_id: file:human/PGAP3/PGAP3-ai-review.yaml
    title: PGAP3 gene review (human)
    statement: >-
      The Golgi GPI-specific phospholipase-A2 (sn-2 deacylation) step (UniProtKB:Q96FM1, GO:0016788)
      matches the completed human PGAP3 review.
  - source_id: file:human/PGAP2/PGAP2-ai-review.yaml
    title: PGAP2 gene review (human)
    statement: >-
      The Golgi reacylation (fatty-acid remodeling) step (UniProtKB:Q9UHJ9, GPI anchor remodelling
      GO:0120574) matches the completed human PGAP2 review.
