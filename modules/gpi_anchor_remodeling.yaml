                statement: required for reacylation of the lyso-GPI intermediate with a saturated (stearoyl) chain after PGAP3; generates the mature raft-associating anchor; deficiency = HPMRS3
            role_description: >-
              Reacylates the lyso-GPI anchor with a saturated fatty acid (remodeling step 2),
              producing the mature raft-associating anchor. Deficiency = HPMRS3. (GOA carries no
              catalytic MF for PGAP2 — its precise catalytic vs accessory role is debated — so it
              is represented by its GPI-remodelling BP role.)
  connections:
    - source: pgap1_step
      target: pgap3_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The inositol-deacylated GPI-anchored protein (ER exit competent) undergoes Golgi
        fatty-acid remodeling, beginning with PGAP3 sn-2 deacylation.
    - source: pgap3_step
      target: pgap2_step
      connection_type: PROVIDES_INPUT_FOR
      description: The lyso-GPI intermediate from PGAP3 is reacylated by PGAP2 with a saturated chain.
  notes: >-
    GPI-anchor post-attachment lipid-remodeling segment, grounded to the human enzymes PGAP1
    (UniProtKB:Q75T13, GO:0160215 deacylase activity; ER) and the Golgi fatty-acid-remodeling pair
    PGAP3 (Q96FM1, GO:0016788 ester-bond hydrolase / GPI-specific phospholipase A2) and PGAP2
    (Q9UHJ9; no catalytic MF in GOA — modelled by its GPI anchor remodelling BP role). GO
    molecular-function/BP/location terms were taken from the completed human gene reviews and
    verified against the local go.db; the PGAP1 reaction (R-HSA-162729) and parent pathway
    (R-HSA-162710) were verified against the local reactome cache. Each step uses a PANTHER family
    selector with the human enzyme as representative. Note the two-compartment organisation:
    PGAP1 inositol-deacylation is an ER-membrane step required for ER exit, whereas the PGAP3/PGAP2
    fatty-acid remodeling (sn-2 unsaturated -> saturated) occurs in the Golgi and confers
    lipid-raft association / stable surface expression. Upstream is the GPI-transamidase module
    (PIGK/PIGS/PIGT/PIGU/GPAA1) that attaches the anchor; this remodeling module completes GPI-anchor
    maturation. This is the FIFTH and final module of the GPI-anchor biosynthesis series (GnT ->
    core glycan -> EtNP additions -> transamidase -> remodeling). Disorders: PGAP1 GPI-deficiency
    (intellectual disability/encephalopathy), PGAP3 HPMRS4, PGAP2 HPMRS3.
