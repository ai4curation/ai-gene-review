id: MODULE:bacterial_protein_export
title: Bacterial protein export
description: >-
  Boundary module for KEGG ppu03060 protein export in Pseudomonas putida KT2440.
  The strict bacterial protein-export story combines Sec-dependent
  post-translational translocation through SecA/SecYEG with SecDF-YajC support,
  SRP/FtsY co-translational membrane-protein targeting, YidC membrane-protein
  insertion, LepB/LspA signal peptide processing, and two TatABC-like loci for
  twin-arginine export of folded substrates. Type I secretion ABC exporters,
  LolCDE lipoprotein outer-membrane localization, and broad secretion-system
  maps are neighboring modules rather than core ppu03060 protein export here.
status: DRAFT
evidence:
