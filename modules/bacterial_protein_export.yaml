notes: >-
  First-pass interpretation: ppu03060 is a bacterial inner-membrane export and
  insertion module. SecA is the ATPase motor; SecYEG is the protein-conducting
  channel; SecDF-YajC is accessory context; SecB is the cytoplasmic preprotein
  chaperone; SRP/FtsY handles co-translational membrane targeting; YidC inserts
  membrane proteins; LepB/LspA process signal peptides; and two Tat loci export
  folded twin-arginine substrates.
