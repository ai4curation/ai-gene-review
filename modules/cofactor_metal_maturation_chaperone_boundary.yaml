id: MODULE:cofactor_metal_maturation_chaperone_boundary
title: Cofactor and metal maturation chaperone boundary
description: >-
  Boundary module for the Pseudomonas putida KT2440 cofactor, metal,
  metallochaperone, and enzyme-maturation split from the protein
  folding/targeting/turnover functional bucket. The module separates direct
  cofactor-transfer or metal-delivery roles from broader metabolism terms that
  arise secondarily from the target enzymes being matured.
status: DRAFT
evidence:
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_partition.tsv
    title: PSEPK protein folding/targeting/turnover partition
    statement: >-
      The umbrella bucket was partitioned into nine curation-scale splits; this
      module covers the cofactor_metal_maturation_chaperones split.
  - source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_cofactor_metal_maturation_chaperones.tsv
    title: PSEPK cofactor and metal maturation chaperone split
    statement: >-
      The batch table assigns PP_0588, sdhE, ureD, ureE, ureF, ureG, cobW,
      zinU, PP_4836, yggW, PP_5361, and PP_5393 to this first-pass split.
  - source_id: file:PSEPK/sdhE/sdhE-ai-review.yaml
    title: Curated sdhE review
    statement: >-
      The sdhE review records FAD assembly/flavinylation support for succinate
      dehydrogenase and related flavoproteins, while keeping succinate
      metabolism as non-core pathway context.
  - source_id: file:PSEPK/ureE/ureE-ai-review.yaml
    title: Curated ureE review
    statement: >-
      The ureE review records nickel donor/metallochaperone activity and
      chaperone-like urease assembly context.
  - source_id: file:PSEPK/cobW/cobW-ai-review.yaml
    title: Curated cobW review
    statement: >-
      The cobW review removes cobalamin biosynthesis as unsupported name/family
      transfer and records GTP-dependent zinc chaperone activity.
  - source_id: file:PSEPK/yggW/yggW-ai-review.yaml
    title: Curated yggW review
    statement: >-
      The yggW review treats coproporphyrinogen oxidase and generic catalytic
      activity as over-annotated relative to HemW heme-binding and 4Fe-4S
      cluster-binding evidence.
notes: >-
  First-pass interpretation: this is an enzyme/cofactor maturation boundary,
  not a single linear pathway. Core functions are mostly molecular functions
  for metal or cofactor handling. Broad downstream processes such as succinate
  metabolism, urea metabolism, porphyrin biosynthesis, and cobalamin
  biosynthesis were kept only where directly supported and not promoted to the
  principal module definition.
