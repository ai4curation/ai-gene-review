id: MODULE:dtdp_l_rhamnose_biosynthesis
title: dTDP-L-rhamnose biosynthesis
description: >-
  Species-neutral bacterial module for synthesis of the activated sugar
  dTDP-L-rhamnose from alpha-D-glucose 1-phosphate. The pathway proceeds
  through dTDP-glucose formation, dTDP-glucose 4,6-dehydration,
  dTDP-4-dehydrorhamnose 3,5-epimerization, and final NADPH-dependent
  reduction to dTDP-L-rhamnose. The module represents the soluble
  nucleotide-sugar supply pathway and treats downstream O-antigen, LPS, and
  specialized-polysaccharide assembly reactions as consumers, not as part of
  the biosynthetic module itself.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0019305
    title: dTDP-rhamnose biosynthetic process
    statement: >-
      GO:0019305 captures biosynthesis of dTDP-rhamnose, the process annotated
      on the PSEPK RmlC/RfbC epimerases and RfbD/PP_0500 reductases.
  - source_id: KEGG:ppu00523
    title: Pseudomonas putida KT2440 polyketide sugar unit biosynthesis bucket
    statement: >-
      The local PSEPK ppu00523 batch contains rmlC, PP_0500, rfbC, rfbD and also
      pulls in the adjacent rfbA/rffG early-step genes from ppu00525.
  - source_id: KEGG:ppu00525
    title: Pseudomonas putida KT2440 acarbose/validamycin bucket
    statement: >-
      The ppu00525 bucket contributes the early dTDP-glucose formation and
      dTDP-glucose 4,6-dehydration steps in PSEPK, rather than a literal
      acarbose or validamycin pathway.
  - source_id: file:PSEPK/rfbA/rfbA-uniprot.txt
    title: UniProtKB entry for PSEPK rfbA
    statement: Q88LZ3 is a glucose-1-phosphate thymidylyltransferase.
  - source_id: file:PSEPK/rffG/rffG-uniprot.txt
    title: UniProtKB entry for PSEPK rffG
    statement: Q88LZ1 is a dTDP-glucose 4,6-dehydratase.
  - source_id: file:PSEPK/rfbC/rfbC-uniprot.txt
    title: UniProtKB entry for PSEPK rfbC
    statement: Q88LZ4 is a dTDP-4-dehydrorhamnose 3,5-epimerase.
  - source_id: file:PSEPK/rfbD/rfbD-uniprot.txt
    title: UniProtKB entry for PSEPK rfbD
    statement: Q88LZ2 is a dTDP-4-dehydrorhamnose reductase.
notes: >-
  First-pass PSEPK interpretation: the PP_1782-PP_1785 rfbC-rfbA-rfbD-rffG
  cluster encodes a complete dTDP-L-rhamnose route, while rmlC/PP_0500 provide
  additional epimerase/reductase paralogs. Keep downstream O-antigen and other
  glycan assembly terms as product-use context rather than module-level
  molecular functions.
