id: MODULE:bacterial_rna_polymerase_core
title: Bacterial DNA-directed RNA polymerase core
description: >-
  Compact bacterial RNA polymerase core module for Pseudomonas putida KT2440
  KEGG ppu03020. The organism-specific pathway contains rpoA, rpoB, rpoC, and
  rpoZ, corresponding to the alpha, beta, beta-prime, and omega subunits of the
  alpha2-beta-beta-prime-omega DNA-directed RNA polymerase core. The core
  catalyzes DNA-template-directed RNA synthesis; sigma factors and transcription
  regulators are intentionally outside this compact core-complex boundary.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03020
    title: RNA polymerase - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03020 contains the four PSEPK bacterial RNAP core subunits
      rpoA/PP_0479, rpoB/PP_0447, rpoC/PP_0448, and rpoZ/PP_5301.
  - source_id: UniProtKB:Q88QL1
    title: DNA-directed RNA polymerase subunit alpha
    statement: >-
      UniProt describes rpoA as an alpha subunit of the RNAP catalytic core,
      with alpha dimerization, core assembly, basal transcription, and
      promoter/regulator interaction context.
  - source_id: UniProtKB:Q88QP2
    title: DNA-directed RNA polymerase subunit beta
    statement: >-
      UniProt describes rpoB as a beta subunit of DNA-dependent RNAP and records
      the DNA-directed RNA polymerase reaction.
  - source_id: UniProtKB:Q88QP1
    title: DNA-directed RNA polymerase subunit beta-prime
    statement: >-
      UniProt describes rpoC as a beta-prime subunit of DNA-dependent RNAP and
      records magnesium and zinc binding context for the subunit.
  - source_id: UniProtKB:Q88C82
    title: DNA-directed RNA polymerase subunit omega
    statement: >-
      UniProt describes rpoZ as the omega subunit that promotes RNAP assembly by
      latching beta-prime and facilitating its interaction with beta and alpha.
  - source_id: file:PSEPK/rpoA/rpoA-ai-review.yaml
    title: Curated rpoA review
    statement: >-
      The first-pass rpoA review accepts DNA-directed RNA polymerase activity and
      DNA-templated transcription and adds the missing RNAP complex annotation.
  - source_id: file:PSEPK/rpoB/rpoB-ai-review.yaml
    title: Curated rpoB review
    statement: >-
      The first-pass rpoB review accepts DNA-directed RNA polymerase activity and
      DNA-templated transcription and adds the missing RNAP complex annotation.
  - source_id: file:PSEPK/rpoC/rpoC-ai-review.yaml
    title: Curated rpoC review
    statement: >-
      The first-pass rpoC review accepts DNA-directed RNA polymerase activity and
      DNA-templated transcription, retains metal binding as non-core, and adds
      the missing RNAP complex annotation.
  - source_id: file:PSEPK/rpoZ/rpoZ-ai-review.yaml
    title: Curated rpoZ review
    statement: >-
      The first-pass rpoZ review treats omega as an RNAP assembly/contributing
      subunit rather than as an independently catalytic RNA polymerase.
module:
  id: bacterial_rna_polymerase_core
  label: Bacterial DNA-directed RNA polymerase core
  module_type: PROTEIN_COMPLEX
  concepts:
    - preferred_term: DNA-directed RNA polymerase complex
      term:
        id: GO:0000428
        label: DNA-directed RNA polymerase complex
      description: Alpha2-beta-beta-prime-omega bacterial RNAP core enzyme.
    - preferred_term: DNA-directed RNA polymerase activity
      term:
        id: GO:0003899
        label: DNA-directed RNA polymerase activity
      description: DNA-template-directed synthesis of RNA from ribonucleoside triphosphates.
    - preferred_term: DNA-templated transcription
      term:
        id: GO:0006351
        label: DNA-templated transcription
      description: Cellular transcription of DNA into RNA by bacterial RNAP.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Bacterial chromosomal transcription occurs in the cytoplasm.
  parts:
    - order: 1
      role: alpha dimer scaffold and promoter/regulator interface
      node:
        id: rpoA_alpha_dimer
        label: rpoA alpha subunit dimer
        module_type: PROTEIN_COMPLEX
        description: >-
          RpoA forms the alpha subunit dimer of the bacterial RNAP core. Its
          N-terminal domain supports RNAP assembly and basal transcription, and
          its C-terminal domain contacts transcriptional regulators and upstream
          promoter elements.
        annotons:
          - id: rpoA_alpha_core_subunit
            label: "rpoA: RNAP alpha subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpoA
            function:
              preferred_term: DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            role_description: Alpha dimer scaffold and promoter/regulator-contact subunit of bacterial RNAP.
    - order: 2
      role: beta catalytic-core subunit
      node:
        id: rpoB_beta_subunit
        label: rpoB beta subunit
        module_type: MOLECULAR_FUNCTION
        description: >-
          RpoB is the beta subunit of the RNAP catalytic core and contributes to
          DNA-directed RNA synthesis from ribonucleoside triphosphates.
        annotons:
          - id: rpoB_beta_core_subunit
            label: "rpoB: RNAP beta subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpoB
            function:
              preferred_term: DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
              substrates:
                - preferred_term: DNA template
                - preferred_term: ribonucleoside 5'-triphosphate
              products:
                - preferred_term: extended RNA transcript
                - preferred_term: diphosphate
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            role_description: Beta subunit contribution to the RNAP catalytic core.
    - order: 3
      role: beta-prime catalytic-core and metal-binding subunit
      node:
        id: rpoC_beta_prime_subunit
        label: rpoC beta-prime subunit
        module_type: MOLECULAR_FUNCTION
        description: >-
          RpoC is the beta-prime subunit of the RNAP catalytic core and carries
          magnesium and zinc binding context in UniProt/UniRule metadata.
        annotons:
          - id: rpoC_beta_prime_core_subunit
            label: "rpoC: RNAP beta-prime subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpoC
            function:
              preferred_term: DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
              cofactors:
                - preferred_term: Mg(2+)
                - preferred_term: Zn(2+)
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            role_description: Beta-prime subunit contribution to the RNAP catalytic core and metal-binding scaffold.
    - order: 4
      role: omega assembly and stabilization subunit
      node:
        id: rpoZ_omega_assembly
        label: rpoZ omega assembly subunit
        module_type: MOLECULAR_FUNCTION
        description: >-
          RpoZ promotes RNAP assembly by latching the beta-prime subunit and
          facilitating beta-prime interaction with beta and alpha, completing the
          core complex.
        annotons:
          - id: rpoZ_omega_core_subunit
            label: "rpoZ: RNAP omega subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpoZ
            function:
              preferred_term: DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            role_description: Assembly/stabilization subunit that contributes to completed RNAP core activity.
  connections:
    - source: rpoA_alpha_dimer
      target: rpoB_beta_subunit
      connection_type: PART_OF
      description: rpoA alpha subunits and rpoB beta are components of the same RNAP core complex.
      chaining_status: VERIFIED
      chaining_note: UniProt describes the RNAP catalytic core as containing two alpha, one beta, one beta-prime, and one omega subunit.
    - source: rpoC_beta_prime_subunit
      target: rpoB_beta_subunit
      connection_type: PART_OF
      description: rpoC beta-prime and rpoB beta are components of the same RNAP core complex.
      chaining_status: VERIFIED
      chaining_note: UniProt describes the RNAP catalytic core as containing beta and beta-prime subunits.
    - source: rpoZ_omega_assembly
      target: rpoC_beta_prime_subunit
      connection_type: POSITIVELY_REGULATES
      description: Omega promotes RNAP assembly by stabilizing beta-prime interactions with beta and alpha.
      chaining_status: VERIFIED
      chaining_note: UniProt states that omega latches beta-prime and facilitates interaction with beta and alpha.
  notes: >-
    This module captures the compact ppu03020 RNAP core subunit set. Sigma
    factors, transcription elongation/termination factors, and pathway-specific
    regulators should be curated in separate regulatory modules or pathway
    contexts rather than used to satisfy this core-complex module.
