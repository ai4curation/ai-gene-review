id: MODULE:bacterial_rna_polymerase_core
title: Bacterial DNA-directed RNA polymerase core enzyme
description: >-
  Species-neutral bacterial module for the DNA-directed RNA polymerase core
  enzyme that carries out DNA-templated RNA synthesis. The conserved bacterial
  core enzyme is built from an alpha dimer, beta and beta-prime catalytic cleft
  subunits, and the omega assembly/stability subunit. This module deliberately
  stops at the core enzyme and excludes sigma factors, transcription elongation
  factors, and promoter-specific regulatory proteins.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: KEGG:ppu03020
    title: Pseudomonas putida KT2440 RNA polymerase
    statement: >-
      The local PSEPK pathway partition assigns rpoA, rpoB, rpoC, and rpoZ as
      the four primary genes in the compact KEGG ppu03020 RNA polymerase bucket.
  - source_id: GO:0000428
    title: DNA-directed RNA polymerase complex
    statement: >-
      UniProt records for the PSEPK rpoA, rpoB, rpoC, and rpoZ exemplars all
      carry GO:0000428, supporting this module as a protein-complex module
      rather than a linear metabolic pathway.
  - source_id: GO:0003899
    title: DNA-directed RNA polymerase activity
    statement: >-
      GO:0003899 captures the complex-level nucleotidyltransferase activity
      performed by the assembled core enzyme during transcription.
  - source_id: file:PSEPK/rpoA/rpoA-uniprot.txt
    title: UniProtKB entry for PSEPK rpoA
    statement: >-
      Q88QL1 is the P. putida KT2440 DNA-directed RNA polymerase alpha subunit
      and carries RNA polymerase complex, DNA binding, RNA polymerase activity,
      dimerization, and DNA-templated transcription annotations.
  - source_id: file:PSEPK/rpoB/rpoB-uniprot.txt
    title: UniProtKB entry for PSEPK rpoB
    statement: >-
      Q88QP2 is the P. putida KT2440 DNA-directed RNA polymerase beta subunit
      and carries RNA polymerase complex, DNA binding, RNA polymerase activity,
      ribonucleoside binding, and DNA-templated transcription annotations.
  - source_id: file:PSEPK/rpoC/rpoC-uniprot.txt
    title: UniProtKB entry for PSEPK rpoC
    statement: >-
      Q88QP1 is the P. putida KT2440 DNA-directed RNA polymerase beta-prime
      subunit and carries RNA polymerase complex, DNA binding, RNA polymerase
      activity, magnesium and zinc ion binding, and DNA-templated transcription
      annotations.
  - source_id: file:PSEPK/rpoZ/rpoZ-uniprot.txt
    title: UniProtKB entry for PSEPK rpoZ
    statement: >-
      Q88C82 is the P. putida KT2440 DNA-directed RNA polymerase omega subunit
      and carries RNA polymerase complex, DNA binding, RNA polymerase activity,
      and DNA-templated transcription annotations.
notes: >-
  First-pass PSEPK interpretation: rpoA, rpoB, rpoC, and rpoZ satisfy the core
  RNA polymerase enzyme module. Sigma factors such as RpoD, RpoN, RpoS, RpoH,
  RpoE, FliA, and ECF sigma factors should be curated in promoter-recognition or
  stress-response modules, not as required parts of this core-enzyme module.
module:
  id: bacterial_rna_polymerase_core
  label: Bacterial DNA-directed RNA polymerase core enzyme
  module_type: PROTEIN_COMPLEX
  concepts:
    - preferred_term: DNA-directed RNA polymerase complex
      term:
        id: GO:0000428
        label: DNA-directed RNA polymerase complex
      description: >-
        Protein-containing complex that catalyzes DNA-templated RNA synthesis.
    - preferred_term: DNA-templated transcription
      term:
        id: GO:0006351
        label: DNA-templated transcription
      description: >-
        Cellular process carried out by the assembled RNA polymerase with
        promoter-recognition and regulatory factors.
  context:
    taxa:
      - preferred_term: bacteria
        term:
          id: NCBITaxon:2
          label: Bacteria
        description: >-
          This module represents the conserved bacterial core RNA polymerase
          architecture.
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          Bacterial transcription by the soluble core enzyme occurs in the
          cytosol/cytoplasm.
  parts:
    - order: 1
      role: alpha dimer assembly platform
      node:
        id: rpoa_alpha_dimer_platform
        label: RpoA alpha dimer platform
        module_type: PROTEIN_COMPLEX
        description: >-
          The alpha subunit forms the dimeric assembly platform that nucleates
          core enzyme assembly and contributes to DNA/promoter contacts.
        annotons:
          - id: rpoa_alpha_subunit
            label: "rpoA: RNA polymerase alpha subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial DNA-directed RNA polymerase alpha subunit family
                term:
                  id: InterPro:IPR011773
                  label: DNA-directed RNA polymerase alpha subunit
                representative_members:
                  - preferred_term: PSEPK rpoA exemplar
                    term:
                      id: UniProtKB:Q88QL1
                      label: DNA-directed RNA polymerase subunit alpha
                    description: Pseudomonas putida KT2440 rpoA/PP_0479.
            function:
              preferred_term: protein dimerization activity
              term:
                id: GO:0046983
                label: protein dimerization activity
              evidence:
                - source_id: file:PSEPK/rpoA/rpoA-goa.tsv
                  statement: >-
                    Q88QL1 GOA includes InterPro-derived protein dimerization
                    activity for the alpha-subunit family.
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Alpha subunit that dimerizes and forms the scaffold for beta and
              beta-prime subunit recruitment in the bacterial core enzyme.
    - order: 2
      role: beta and beta-prime catalytic cleft
      node:
        id: rpob_rpoc_catalytic_cleft
        label: RpoB/RpoC catalytic cleft
        module_type: PROTEIN_COMPLEX
        description: >-
          The beta and beta-prime subunits form the active-center cleft that
          binds DNA/RNA substrates, divalent metal ions, and incoming
          ribonucleotides for RNA-chain elongation.
        annotons:
          - id: rpob_beta_subunit
            label: "rpoB: RNA polymerase beta subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DNA-directed RNA polymerase beta subunit family
                term:
                  id: InterPro:IPR010243
                  label: RNA_pol_bsu_bac
                representative_members:
                  - preferred_term: PSEPK rpoB exemplar
                    term:
                      id: UniProtKB:Q88QP2
                      label: DNA-directed RNA polymerase subunit beta
                    description: Pseudomonas putida KT2440 rpoB/PP_0447.
            function:
              preferred_term: contributes to DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
              substrates:
                - preferred_term: DNA template
                - preferred_term: ribonucleoside triphosphates
              products:
                - preferred_term: RNA transcript
              evidence:
                - source_id: file:PSEPK/rpoB/rpoB-goa.tsv
                  statement: >-
                    Q88QP2 GOA includes DNA-directed RNA polymerase activity
                    and DNA-templated transcription for the beta subunit.
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Beta subunit that helps form the catalytic cleft and contributes
              substrate-binding surfaces for RNA synthesis by the assembled core.
          - id: rpoc_beta_prime_subunit
            label: "rpoC: RNA polymerase beta-prime subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: bacterial DNA-directed RNA polymerase beta-prime subunit family
                term:
                  id: InterPro:IPR012754
                  label: DNA-directed RNA polymerase beta-prime subunit, bacterial
                representative_members:
                  - preferred_term: PSEPK rpoC exemplar
                    term:
                      id: UniProtKB:Q88QP1
                      label: DNA-directed RNA polymerase subunit beta-prime
                    description: Pseudomonas putida KT2440 rpoC/PP_0448.
            function:
              preferred_term: contributes to DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
              substrates:
                - preferred_term: DNA template
                - preferred_term: ribonucleoside triphosphates
              products:
                - preferred_term: RNA transcript
              cofactors:
                - preferred_term: magnesium ion
                  term:
                    id: GO:0000287
                    label: magnesium ion binding
                - preferred_term: zinc ion
                  term:
                    id: GO:0008270
                    label: zinc ion binding
              evidence:
                - source_id: file:PSEPK/rpoC/rpoC-goa.tsv
                  statement: >-
                    Q88QP1 GOA includes DNA-directed RNA polymerase activity,
                    magnesium ion binding, zinc ion binding, and
                    DNA-templated transcription for the beta-prime subunit.
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Beta-prime subunit that supplies core active-center architecture,
              metal-binding determinants, and DNA/RNA binding surfaces.
    - order: 3
      role: omega assembly and stability subunit
      node:
        id: rpoz_omega_assembly_subunit
        label: RpoZ omega assembly/stability subunit
        module_type: PROTEIN_COMPLEX
        description: >-
          The omega subunit is a small conserved RNA polymerase component that
          promotes proper core-enzyme assembly and stability.
        annotons:
          - id: rpoz_omega_subunit
            label: "rpoZ: RNA polymerase omega subunit"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: DNA-directed RNA polymerase omega subunit family
                term:
                  id: PANTHER:PTHR34476
                  label: DNA-DIRECTED RNA POLYMERASE SUBUNIT OMEGA
                representative_members:
                  - preferred_term: PSEPK rpoZ exemplar
                    term:
                      id: UniProtKB:Q88C82
                      label: DNA-directed RNA polymerase subunit omega
                    description: Pseudomonas putida KT2440 rpoZ/PP_5301.
            function:
              preferred_term: contributes to DNA-directed RNA polymerase activity
              term:
                id: GO:0003899
                label: DNA-directed RNA polymerase activity
              evidence:
                - source_id: file:PSEPK/rpoZ/rpoZ-goa.tsv
                  statement: >-
                    Q88C82 GOA includes DNA-directed RNA polymerase activity
                    and DNA-templated transcription for the omega subunit.
            processes:
              - preferred_term: DNA-templated transcription
                term:
                  id: GO:0006351
                  label: DNA-templated transcription
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Small omega subunit that stabilizes and supports assembly of the
              bacterial RNA polymerase core enzyme.
  connections:
    - source: rpoa_alpha_dimer_platform
      target: rpob_rpoc_catalytic_cleft
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The alpha dimer provides the assembly platform for recruitment of the
        beta and beta-prime subunits into the core enzyme.
      chaining_status: NOT_APPLICABLE
      chaining_note: Protein-complex assembly relation, not a metabolic reaction chain.
    - source: rpoz_omega_assembly_subunit
      target: rpob_rpoc_catalytic_cleft
      connection_type: POSITIVELY_REGULATES
      description: >-
        The omega subunit supports proper assembly and stability of the
        beta/beta-prime-containing core enzyme.
      chaining_status: NOT_APPLICABLE
      chaining_note: Protein-complex assembly relation, not a metabolic reaction chain.
  knowledge_gaps:
    - gap_statement: >-
        This first-pass module does not model sigma-factor recruitment,
        promoter-specific initiation, transcription elongation factors, or
        termination factors.
      boundary: >-
        Keep rpoD, rpoN, rpoS, rpoH, rpoE, fliA, ECF sigma factors, RapA, DksA,
        Nus factors, and other accessory transcription regulators outside this
        core enzyme module unless a separate initiation or regulatory module is
        being curated.
      gap_kind:
        - CURATION
