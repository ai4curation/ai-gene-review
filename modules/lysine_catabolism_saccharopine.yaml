                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Dehydrogenates/decarboxylates glutaryl-CoA to crotonyl-CoA.
  connections:
    - source: lys_to_aasa
      target: aasa_to_oxoadipate
      connection_type: PROVIDES_INPUT_FOR
      description: AASS-derived 2-aminoadipate 6-semialdehyde is oxidised (ALDH7A1) and transaminated (AADAT) to 2-oxoadipate.
    - source: aasa_to_oxoadipate
      target: oxoadipate_to_crotonyl
      connection_type: PROVIDES_INPUT_FOR
      description: 2-oxoadipate is decarboxylated to glutaryl-CoA (DHTKD1) and dehydrogenated to crotonyl-CoA (GCDH), continuing to acetyl-CoA.
  notes: >-
    L-lysine catabolism (GO:0019477) via the saccharopine pathway, grounded to the completed human
    gene reviews: AASS (Q9UDR5, bifunctional, GO:0047130 saccharopine dehydrogenase — on main),
    ALDH7A1 (P49419, GO:0004043 aminoadipate-semialdehyde dehydrogenase — curated here), AADAT
    (Q8N5Z0, GO:0047536 2-aminoadipate transaminase + GO:0016212 kynurenine transaminase + PLP —
    curated here), DHTKD1 (Q96HY7, GO:0160166 2-oxoadipate dehydrogenase — on main) and GCDH (Q92947,
    GO:0004361 glutaryl-CoA dehydrogenase — on main). AADAT and DHTKD1 also connect this pathway to
    the mitochondrial 2-oxodicarboxylate carrier SLC25A21 and to tryptophan/kynurenine metabolism.
    GO term ids/labels verified against the local go.db (note GO:0006554 "lysine catabolic process"
    is obsolete → GO:0019477 used). Downstream, crotonyl-CoA is metabolised to two acetyl-CoA.
    Disorders: ALDH7A1 — pyridoxine-dependent epilepsy; DHTKD1 — 2-aminoadipic/2-oxoadipic aciduria;
    GCDH — glutaric aciduria type 1 (macrocephaly, striatal injury, encephalopathic crises).
