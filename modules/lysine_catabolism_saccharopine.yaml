id: MODULE:lysine_catabolism_saccharopine
title: Lysine catabolism (saccharopine pathway; AASS/ALDH7A1/AADAT/DHTKD1/GCDH)
description: >-
  The saccharopine pathway is the main route of L-lysine degradation in mammals, converting lysine
  to acetyl-CoA through 2-aminoadipate and glutaryl-CoA, predominantly in liver and brain
  mitochondria. The bifunctional enzyme AASS (2-aminoadipic-6-semialdehyde synthase) catalyses the
  first two steps: its lysine-ketoglutarate reductase domain condenses L-lysine with 2-oxoglutarate
  to saccharopine, and its saccharopine dehydrogenase domain then cleaves saccharopine to
  L-2-aminoadipate 6-semialdehyde (AASA) plus L-glutamate. AASA (in equilibrium with
  delta-1-piperideine-6-carboxylate, P6C) is oxidised to L-2-aminoadipate by the NAD-dependent
  aldehyde dehydrogenase ALDH7A1 (antiquitin); a block here causes accumulation of P6C, which
  inactivates pyridoxal-5'-phosphate and produces pyridoxine-dependent epilepsy. The PLP-dependent
  aminotransferase AADAT (KAT2) then transaminates 2-aminoadipate with 2-oxoglutarate to 2-oxoadipate
  (AADAT is also kynurenine aminotransferase II, linking to tryptophan metabolism). 2-oxoadipate is
  oxidatively decarboxylated to glutaryl-CoA by the 2-oxoadipate dehydrogenase DHTKD1 (with DLST and
  DLD), and glutaryl-CoA is dehydrogenated/decarboxylated to crotonyl-CoA by GCDH (glutaryl-CoA
  dehydrogenase), which continues to two acetyl-CoA. Inherited defects cause aminoadipic/oxoadipic
  aciduria (DHTKD1), pyridoxine-dependent epilepsy (ALDH7A1) and glutaric aciduria type 1 (GCDH).
status: DRAFT
evidence:
  - source_id: GO:0019477
    title: L-lysine catabolic process
    statement: The pathway carries out L-lysine catabolism (GO:0019477) via the saccharopine route to glutaryl-CoA.
  - source_id: file:human/AASS/AASS-ai-review.yaml
    title: AASS gene review (human)
    statement: The bifunctional lysine->AASA saccharopine step (UniProtKB:Q9UDR5, GO:0047130) matches the completed human AASS review (on main).
  - source_id: file:human/ALDH7A1/ALDH7A1-ai-review.yaml
    title: ALDH7A1 gene review (human)
    statement: The AASA->2-aminoadipate dehydrogenase step (UniProtKB:P49419, GO:0004043) matches the completed human ALDH7A1 review.
  - source_id: file:human/AADAT/AADAT-ai-review.yaml
    title: AADAT gene review (human)
    statement: The 2-aminoadipate->2-oxoadipate transamination step (UniProtKB:Q8N5Z0, GO:0047536) matches the completed human AADAT review.
  - source_id: file:human/DHTKD1/DHTKD1-ai-review.yaml
    title: DHTKD1 gene review (human)
    statement: The 2-oxoadipate->glutaryl-CoA step (UniProtKB:Q96HY7, GO:0160166) matches the completed human DHTKD1 review (on main).
  - source_id: file:human/GCDH/GCDH-ai-review.yaml
    title: GCDH gene review (human)
    statement: The glutaryl-CoA->crotonyl-CoA step (UniProtKB:Q92947, GO:0004361) matches the completed human GCDH review (on main).
