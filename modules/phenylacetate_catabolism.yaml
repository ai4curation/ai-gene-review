id: MODULE:phenylacetate_catabolism
title: Aerobic phenylacetate catabolism
description: >-
  A reusable aerobic phenylacetyl-CoA pathway that activates phenylacetate,
  epoxidizes the aromatic ring with the multicomponent PaaABCDE system,
  isomerizes and hydrolytically opens the ring, oxidizes the resulting
  semialdehyde, and processes the open-chain CoA ester through a
  beta-oxidation-like sequence to acetyl-CoA and succinyl-CoA. Regulatory and
  detoxification proteins are outside the required reaction chain.
status: DRAFT
evidence:
  - source_id: GO:0010124
    title: phenylacetate catabolic process
    statement: >-
      GO:0010124 provides the biological-process boundary for conversion of
      phenylacetate through the aerobic phenylacetyl-CoA pathway.
  - source_id: file:modules/phenylacetate_catabolism-deep-research-openscientist.md
    title: OpenScientist research for the reusable aerobic phenylacetate catabolism module
    statement: >-
      The module-level review supports the ordered phenylacetyl-CoA pathway,
      the multicomponent epoxidase, bifunctional PaaZ, and the distinction
      between required reactions and accessory detoxification proteins.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__phenylacetate_catabolism__ppu00360-deep-research-openscientist.md
    title: OpenScientist PSEPK ppu00360 pathway satisfiability review
    statement: >-
      The species-aware review finds the KT2440 pathway satisfiable, identifies
      paaJ as a gene omitted by the broad KEGG bucket, and separates the
      contiguous paa locus from paralogous beta-oxidation enzymes.
  - source_id: file:PSEPK/paaK/paaK-uniprot.txt
    title: UniProtKB entry Q88HS4 for PSEPK PaaK
    statement: >-
      UniProt identifies Q88HS4 as phenylacetate-CoA ligase, the activation
      step that supplies phenylacetyl-CoA.
  - source_id: file:PSEPK/paaA/paaA-uniprot.txt
    title: UniProtKB entry Q88HS5 for PSEPK PaaA
    statement: >-
      UniProt places Q88HS5 in the ring 1,2-phenylacetyl-CoA epoxidase system.
  - source_id: file:PSEPK/paaZ/paaZ-uniprot.txt
    title: UniProtKB entry Q88HT3 for PSEPK PaaZ
    statement: >-
      UniProt identifies Q88HT3 as the bifunctional oxepin-CoA hydrolase and
      semialdehyde dehydrogenase that opens and oxidizes the ring-cleavage
      intermediate.
  - source_id: file:PSEPK/paaJ/paaJ-uniprot.txt
    title: UniProtKB entry Q88HS3 for PSEPK PaaJ
    statement: >-
      UniProt identifies Q88HS3 as a 3-oxoadipyl-CoA thiolase in aromatic
      catabolism.
module:
  id: phenylacetate_catabolism
  label: Aerobic phenylacetate catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: phenylacetate catabolic process
      term:
        id: GO:0010124
        label: phenylacetate catabolic process
      description: >-
        Oxygen-dependent conversion of phenylacetate to acetyl-CoA and
        succinyl-CoA through phenylacetyl-CoA and open-chain CoA esters.
  parts:
    - order: 1
      role: phenylacetate activation
      node:
        id: phenylacetate_activation
        label: Phenylacetate activation to phenylacetyl-CoA
        module_type: REACTION
        annotons:
          - id: paaK_ligase
            label: Phenylacetate-CoA ligase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: phenylacetate-CoA ligases
                representative_members:
                  - preferred_term: PSEPK PaaK
                    term:
                      id: UniProtKB:Q88HS4
                      label: Phenylacetate-CoA ligase
            function:
              preferred_term: phenylacetate-CoA ligase activity
              term:
                id: GO:0047475
                label: phenylacetate-CoA ligase activity
              substrates:
                - preferred_term: phenylacetate
                - preferred_term: CoA
                - preferred_term: ATP
              products:
                - preferred_term: phenylacetyl-CoA
                - preferred_term: AMP
                - preferred_term: diphosphate
            role_description: Activates phenylacetate for the oxygenase system.
    - order: 2
      role: aromatic-ring epoxidation
      node:
        id: phenylacetyl_coa_epoxidation
        label: Ring 1,2-phenylacetyl-CoA epoxidation
        module_type: REACTION
        annotons:
          - id: paaABCDE_epoxidase_system
            label: PaaABCDE phenylacetyl-CoA epoxidase system
            participant:
              selector_type: PROTEIN_COMPLEX
              protein_complex:
                preferred_term: PaaABCDE phenylacetyl-CoA epoxidase system
                description: >-
                  Multicomponent oxygenase system containing the PaaA, PaaB,
                  PaaC, and PaaD oxygenase/accessory subunits and the
                  FAD-[2Fe-2S] PaaE reductase.
                active_units:
                  - id: paaA_alpha_unit
                    label: PaaA alpha subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PaaA epoxidase alpha subunits
                        representative_members:
                          - preferred_term: PSEPK PaaA
                            term:
                              id: UniProtKB:Q88HS5
                              label: Ring 1,2-phenylacetyl-CoA epoxidase alpha subunit
                    role: Catalytic oxygenase alpha subunit.
                  - id: paaB_regulatory_unit
                    label: PaaB regulatory subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PaaB epoxidase regulatory subunits
                        representative_members:
                          - preferred_term: PSEPK PaaB
                            term:
                              id: UniProtKB:Q88HS6
                              label: Ring 1,2-phenylacetyl-CoA epoxidase regulatory subunit
                    role: Regulatory/accessory subunit of the oxygenase system.
                  - id: paaC_beta_unit
                    label: PaaC beta subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PaaC epoxidase beta subunits
                        representative_members:
                          - preferred_term: PSEPK PaaC
                            term:
                              id: UniProtKB:Q88HS7
                              label: Ring 1,2-phenylacetyl-CoA epoxidase beta subunit
                    role: >-
                      Structural beta subunit that supports the PaaA-containing
                      catalytic core.
                  - id: paaD_accessory_unit
                    label: PaaD accessory subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PaaD-like epoxidase-associated proteins
                        representative_members:
                          - preferred_term: PSEPK PaaD
                            term:
                              id: UniProtKB:Q88HS8
                              label: Phenylacetate degradation enzyme subunit
                    role: >-
                      Noncatalytic epoxidase-associated subunit whose precise
                      assembly, maturation, or protective role remains unresolved.
                  - id: paaE_reductase_unit
                    label: PaaE reductase subunit
                    participant:
                      selector_type: FAMILY
                      family:
                        preferred_term: PaaE epoxidase reductase subunits
                        representative_members:
                          - preferred_term: PSEPK PaaE
                            term:
                              id: UniProtKB:Q88HS9
                              label: Ring 1,2-phenylacetyl-CoA epoxidase reductase subunit
                    role: Transfers reducing equivalents from NADPH through FAD and a [2Fe-2S] cluster.
                    function:
                      preferred_term: oxidoreductase activity
                      term:
                        id: GO:0016491
                        label: oxidoreductase activity
            function:
              preferred_term: phenylacetyl-CoA 1,2-epoxidase activity
              term:
                id: GO:0097266
                label: phenylacetyl-CoA 1,2-epoxidase activity
              substrates:
                - preferred_term: phenylacetyl-CoA
                - preferred_term: dioxygen
                - preferred_term: NADPH
              products:
                - preferred_term: 1,2-epoxyphenylacetyl-CoA
                - preferred_term: NADP+
                - preferred_term: H2O
            role_description: Activates the aromatic ring for nonoxygenolytic opening.
    - order: 3
      role: epoxide isomerization
      node:
        id: paaG_epoxide_isomerization
        label: PaaG epoxide isomerization
        module_type: REACTION
        annotons:
          - id: paaG_isomerase
            label: 1,2-epoxyphenylacetyl-CoA isomerase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PaaG 1,2-epoxyphenylacetyl-CoA isomerases
                representative_members:
                  - preferred_term: PSEPK PaaG
                    term:
                      id: UniProtKB:Q88HS0
                      label: 1,2-epoxyphenylacetyl-CoA isomerase
            function:
              preferred_term: isomerase activity
              term:
                id: GO:0016853
                label: isomerase activity
              substrates:
                - preferred_term: 1,2-epoxyphenylacetyl-CoA
              products:
                - preferred_term: oxepin-CoA
            role_description: >-
              Rearranges the epoxide to oxepin-CoA. GO currently provides only
              a broad isomerase term for this EC-defined activity.
    - order: 4
      role: hydrolytic ring opening and semialdehyde oxidation
      node:
        id: paaZ_ring_opening
        label: Bifunctional PaaZ ring opening
        module_type: METABOLIC_PATHWAY
        description: >-
          Two consecutive domains of PaaZ hydrolyze the oxepin intermediate and
          oxidize the resulting semialdehyde.
        parts:
          - order: 1
            role: oxepin-CoA hydrolysis
            node:
              id: paaZ_oxepin_hydrolysis
              label: Oxepin-CoA hydrolysis
              module_type: REACTION
              annotons:
                - id: paaZ_hydrolase
                  label: PaaZ oxepin-CoA hydrolase
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: bifunctional PaaZ proteins
                      representative_members:
                        - preferred_term: PSEPK PaaZ
                          term:
                            id: UniProtKB:Q88HT3
                            label: Oxepin-CoA hydrolase/semialdehyde dehydrogenase
                  function:
                    preferred_term: hydrolase activity
                    term:
                      id: GO:0016787
                      label: hydrolase activity
                    substrates:
                      - preferred_term: oxepin-CoA
                      - preferred_term: H2O
                    products:
                      - preferred_term: 3-oxo-5,6-dehydrosuberyl-CoA semialdehyde
                  role_description: >-
                    Hydrolytically opens oxepin-CoA to the open-chain
                    semialdehyde; GO currently provides only a broad hydrolase
                    term for the EC 3.3.2.12 activity.
          - order: 2
            role: semialdehyde oxidation
            node:
              id: paaZ_semialdehyde_oxidation
              label: PaaZ semialdehyde oxidation
              module_type: REACTION
              annotons:
                - id: paaZ_dehydrogenase
                  label: PaaZ semialdehyde dehydrogenase
                  participant:
                    selector_type: FAMILY
                    family:
                      preferred_term: bifunctional PaaZ proteins
                      representative_members:
                        - preferred_term: PSEPK PaaZ
                          term:
                            id: UniProtKB:Q88HT3
                            label: Oxepin-CoA hydrolase/semialdehyde dehydrogenase
                  function:
                    preferred_term: >-
                      oxidoreductase activity, acting on the aldehyde or oxo
                      group of donors, NAD or NADP as acceptor
                    term:
                      id: GO:0016620
                      label: >-
                        oxidoreductase activity, acting on the aldehyde or oxo
                        group of donors, NAD or NADP as acceptor
                    substrates:
                      - preferred_term: 3-oxo-5,6-dehydrosuberyl-CoA semialdehyde
                      - preferred_term: NAD+
                      - preferred_term: H2O
                    products:
                      - preferred_term: 3-oxo-5,6-dehydrosuberyl-CoA
                      - preferred_term: NADH
                      - preferred_term: H+
                  role_description: >-
                    Oxidizes the open-chain semialdehyde to
                    3-oxo-5,6-dehydrosuberyl-CoA; GO currently provides only a
                    broad aldehyde-dehydrogenase parent for the EC 1.2.1.91 activity.
        connections:
          - source: paaZ_oxepin_hydrolysis
            target: paaZ_semialdehyde_oxidation
            connection_type: PROVIDES_INPUT_FOR
            description: The hydrolase-domain product is oxidized by the dehydrogenase domain.
    - order: 5
      role: open-chain enoyl-CoA hydration
      node:
        id: paaF_hydration
        label: PaaF open-chain hydration
        module_type: REACTION
        annotons:
          - id: paaF_hydratase
            label: PaaF enoyl-CoA hydratase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PaaF-family open-chain enoyl-CoA hydratases
                representative_members:
                  - preferred_term: PSEPK PaaF
                    term:
                      id: UniProtKB:Q88HR9
                      label: Enoyl-CoA hydratase-isomerase
            function:
              preferred_term: enoyl-CoA hydratase activity
              term:
                id: GO:0004300
                label: enoyl-CoA hydratase activity
              substrates:
                - preferred_term: 3-oxo-5,6-dehydrosuberyl-CoA
                - preferred_term: H2O
              products:
                - preferred_term: 3-hydroxyadipyl-CoA
            role_description: Hydrates the open-chain unsaturated CoA ester to 3-hydroxyadipyl-CoA.
    - order: 6
      role: 3-hydroxyadipyl-CoA oxidation
      node:
        id: paaH_dehydrogenation
        label: PaaH 3-hydroxyadipyl-CoA oxidation
        module_type: REACTION
        annotons:
          - id: paaH_dehydrogenase
            label: PaaH 3-hydroxyacyl-CoA dehydrogenase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PaaH 3-hydroxyadipyl-CoA dehydrogenases
                representative_members:
                  - preferred_term: PSEPK PaaH
                    term:
                      id: UniProtKB:Q88HS1
                      label: 3-hydroxyadipyl-CoA dehydrogenase
            function:
              preferred_term: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
              term:
                id: GO:0003857
                label: (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity
              substrates:
                - preferred_term: 3-hydroxyadipyl-CoA
                - preferred_term: NAD+
              products:
                - preferred_term: 3-oxoadipyl-CoA
                - preferred_term: NADH
            role_description: Produces the beta-keto CoA ester used by PaaJ.
    - order: 7
      role: 3-oxoadipyl-CoA thiolysis
      node:
        id: paaJ_thiolysis
        label: PaaJ 3-oxoadipyl-CoA thiolysis
        module_type: REACTION
        annotons:
          - id: paaJ_thiolase
            label: PaaJ 3-oxoadipyl-CoA thiolase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: PaaJ 3-oxoadipyl-CoA thiolases
                term:
                  id: PANTHER:PTHR43853
                  label: 3-ketoacyl-CoA thiolase
                representative_members:
                  - preferred_term: PSEPK PaaJ
                    term:
                      id: UniProtKB:Q88HS3
                      label: 3-oxoadipyl-CoA thiolase
            function:
              preferred_term: 3-oxoadipyl-CoA thiolase activity
              term:
                id: GO:0033812
                label: 3-oxoadipyl-CoA thiolase activity
              substrates:
                - preferred_term: 3-oxoadipyl-CoA
                - preferred_term: CoA
              products:
                - preferred_term: succinyl-CoA
                - preferred_term: acetyl-CoA
            role_description: Completes the pathway by thiolytic carbon-carbon cleavage.
  connections:
    - source: phenylacetate_activation
      target: phenylacetyl_coa_epoxidation
      connection_type: PROVIDES_INPUT_FOR
      description: PaaK supplies phenylacetyl-CoA to the epoxidase system.
    - source: phenylacetyl_coa_epoxidation
      target: paaG_epoxide_isomerization
      connection_type: PROVIDES_INPUT_FOR
      description: The epoxidase product is rearranged by PaaG.
    - source: paaG_epoxide_isomerization
      target: paaZ_ring_opening
      connection_type: PROVIDES_INPUT_FOR
      description: PaaG supplies the oxepin-CoA intermediate to PaaZ.
    - source: paaZ_ring_opening
      target: paaF_hydration
      connection_type: PROVIDES_INPUT_FOR
      description: PaaZ produces the open-chain unsaturated CoA ester.
    - source: paaF_hydration
      target: paaH_dehydrogenation
      connection_type: PROVIDES_INPUT_FOR
      description: PaaF produces 3-hydroxyadipyl-CoA for PaaH.
    - source: paaH_dehydrogenation
      target: paaJ_thiolysis
      connection_type: PROVIDES_INPUT_FOR
      description: PaaH produces 3-oxoadipyl-CoA for PaaJ.
  notes: >-
    Exact KT2440 accessions are representative members, not a species restriction.
    PaaI and PaaY thioesterases are pathway-associated proofreading or
    detoxification proteins, and PaaX is a regulator; none is a required
    reaction in this core linear module. Broad organism-level pathway maps are
    useful for candidate discovery, but the module boundary is the
    paa-specific phenylacetyl-CoA route.
