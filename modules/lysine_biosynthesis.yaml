  knowledge_gaps:
    - gap_statement: >-
        KT2440 has two pathway-specific DapA proteins, two DapF proteins, and
        two LysA proteins with the same predicted reactions.
      boundary: >-
        Each paralog pair is retained as exact representative members of its
        biochemical step. Direct genetics, expression, or enzyme assays are
        needed to determine redundancy, condition-specific use, and dominant
        flux through each copy.
      gap_kind:
        - BIOLOGY
      status: OPEN
  notes: >-
    PP_2036 is DapA-like but lacks the DapA-specific InterPro/HAMAP and
    lysine-pathway assignments present on Q88NH2 and Q88JL0, so it is not counted
    in this first-pass module. Aspartate kinase and Asd are shared upstream
    precursor-supply enzymes. MurE/MurF consume meso-diaminopimelate for
    peptidoglycan and are outside L-lysine formation. Broader aminotransferases
    are not substituted for the DapC-specific family without physiological
    evidence.
