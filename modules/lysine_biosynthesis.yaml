id: MODULE:lysine_biosynthesis
title: L-lysine biosynthesis via diaminopimelate
description: >-
  A bacterial boundary module for L-lysine biosynthesis through the
  diaminopimelate route. The strict route starts from the shared aspartate-family
  precursor aspartate semialdehyde, forms tetrahydrodipicolinate through DapA
  and DapB, uses the succinylated DAP branch through DapD, DapC, and DapE,
  epimerizes L,L-diaminopimelate with DapF, and decarboxylates
  meso-diaminopimelate with LysA. In Pseudomonas putida KT2440, KEGG ppu00300
  also includes upstream aspartate-family branch enzymes, homoserine
  dehydrogenases, ornithine/acetylornithine aminotransferase context, and
  peptidoglycan ligases that consume meso-diaminopimelate; those are tracked as
  boundary context unless gene-level evidence supports a committed
  lysine-biosynthetic role.
status: DRAFT
evidence:
  - source_id: GO:0009085
    title: L-lysine biosynthetic process
    statement: >-
      The module is grounded in the current GO biological-process term for
      L-lysine biosynthesis; older GOA records may still contain obsolete
      diaminopimelate-specific process terms.
  - source_id: UniPathway:UPA00034
    title: L-lysine biosynthesis via diaminopimelate
    statement: >-
      UniPathway UPA00034 cross-references the bacterial diaminopimelate route
      represented by the DapA/DapB/DapD/DapC/DapE/DapF/LysA candidate set.
  - source_id: KEGG:ppu00300
    title: Lysine biosynthesis - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      strict DAP-route enzymes with upstream aspartate-family enzymes,
      homoserine branch nodes, peptidoglycan ligases, and aminotransferase side
      nodes.
module:
  id: lysine_biosynthesis
  label: L-lysine biosynthesis via diaminopimelate
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-lysine biosynthetic process
      term:
        id: GO:0009085
        label: L-lysine biosynthetic process
      description: Biosynthesis of L-lysine.
    - preferred_term: amino acid biosynthetic process
      term:
        id: GO:0008652
        label: amino acid biosynthetic process
      description: Biosynthesis of amino acids and derivatives.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Soluble bacterial lysine-biosynthetic enzymes operate in the cytoplasm.
  parts:
    - order: 1
      role: aspartate-family precursor supply
      node:
        id: aspartate_semialdehyde_supply
        label: L-aspartate to L-aspartate 4-semialdehyde
        module_type: METABOLIC_PATHWAY
        description: >-
          Aspartate kinase and aspartate-semialdehyde dehydrogenase supply the
          shared aspartate-family intermediate used by lysine, methionine, and
          threonine biosynthesis. KEGG ppu00300 also contains aspartate
          transaminase and homoserine dehydrogenase side nodes that are
          upstream or competing-branch context rather than committed
          DAP-route steps.
        annotons:
          - id: aspartate_kinase_context
            label: aspartate kinase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: aspartate kinase activity
                term:
                  id: GO:0004072
                  label: aspartate kinase activity
            function:
              preferred_term: aspartate kinase activity
              term:
                id: GO:0004072
                label: aspartate kinase activity
            role_description: Produces L-aspartyl phosphate for the shared aspartate-family branch.
          - id: aspartate_semialdehyde_dehydrogenase_context
            label: aspartate-semialdehyde dehydrogenase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: aspartate-semialdehyde dehydrogenase activity
                term:
                  id: GO:0004073
                  label: aspartate-semialdehyde dehydrogenase activity
            function:
              preferred_term: aspartate-semialdehyde dehydrogenase activity
              term:
                id: GO:0004073
                label: aspartate-semialdehyde dehydrogenase activity
            role_description: Produces L-aspartate 4-semialdehyde for the DAP route.
          - id: aspartate_transaminase_boundary
            label: aspartate transaminase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: L-aspartate:2-oxoglutarate transaminase activity
                term:
                  id: GO:0004069
                  label: L-aspartate:2-oxoglutarate transaminase activity
            function:
              preferred_term: L-aspartate:2-oxoglutarate transaminase activity
              term:
                id: GO:0004069
                label: L-aspartate:2-oxoglutarate transaminase activity
            role_description: Upstream aspartate supply context, not a committed lysine-biosynthetic step.
          - id: homoserine_dehydrogenase_boundary
            label: homoserine dehydrogenase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: homoserine dehydrogenase activity
                term:
                  id: GO:0004412
                  label: homoserine dehydrogenase activity
            function:
              preferred_term: homoserine dehydrogenase activity
              term:
                id: GO:0004412
                label: homoserine dehydrogenase activity
            role_description: Competing methionine/threonine branch context from aspartate semialdehyde.
    - order: 2
      role: tetrahydrodipicolinate formation
      node:
        id: dapA_dapB_steps
        label: Aspartate semialdehyde to tetrahydrodipicolinate
        module_type: METABOLIC_PATHWAY
        description: >-
          DapA condenses aspartate semialdehyde with pyruvate to form
          4-hydroxy-tetrahydrodipicolinate, and DapB reduces this intermediate
          toward tetrahydrodipicolinate. PSEPK encodes multiple DapA-like
          proteins, so gene-level curation should retain paralog uncertainty
          where direct pathway-specific evidence is missing.
        annotons:
          - id: dapA_thdp_synthase
            label: DapA 4-hydroxy-tetrahydrodipicolinate synthase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 4-hydroxy-tetrahydrodipicolinate synthase activity
                term:
                  id: GO:0008840
                  label: 4-hydroxy-tetrahydrodipicolinate synthase activity
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate synthase activity
              term:
                id: GO:0008840
                label: 4-hydroxy-tetrahydrodipicolinate synthase activity
            role_description: First committed DAP-route condensation step.
          - id: dapB_thdp_reductase
            label: DapB 4-hydroxy-tetrahydrodipicolinate reductase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 4-hydroxy-tetrahydrodipicolinate reductase activity
                term:
                  id: GO:0008839
                  label: 4-hydroxy-tetrahydrodipicolinate reductase activity
            function:
              preferred_term: 4-hydroxy-tetrahydrodipicolinate reductase activity
              term:
                id: GO:0008839
                label: 4-hydroxy-tetrahydrodipicolinate reductase activity
            role_description: Reductive DAP-route step after DapA.
    - order: 3
      role: succinylated diaminopimelate branch
      node:
        id: succinylated_dap_branch
        label: Tetrahydrodipicolinate to L,L-diaminopimelate
        module_type: METABOLIC_PATHWAY
        description: >-
          The canonical succinylated bacterial branch uses DapD, DapC, and DapE
          to introduce the second amino group and release L,L-diaminopimelate.
        annotons:
          - id: dapD_succinyltransferase
            label: DapD tetrahydrodipicolinate succinyltransferase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: 2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-succinyltransferase activity
                term:
                  id: GO:0008666
                  label: 2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-succinyltransferase activity
            function:
              preferred_term: 2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-succinyltransferase activity
              term:
                id: GO:0008666
                label: 2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-succinyltransferase activity
            role_description: Succinylates tetrahydrodipicolinate in the DAP route.
          - id: dapC_succinyldap_transaminase
            label: DapC succinyldiaminopimelate transaminase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: succinyldiaminopimelate:2-oxoglutarate transaminase activity
                term:
                  id: GO:0009016
                  label: succinyldiaminopimelate:2-oxoglutarate transaminase activity
            function:
              preferred_term: succinyldiaminopimelate:2-oxoglutarate transaminase activity
              term:
                id: GO:0009016
                label: succinyldiaminopimelate:2-oxoglutarate transaminase activity
            role_description: Aminotransferase step producing N-succinyl-L,L-diaminopimelate.
          - id: dapE_succinyldap_desuccinylase
            label: DapE succinyl-diaminopimelate desuccinylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: succinyl-diaminopimelate desuccinylase activity
                term:
                  id: GO:0009014
                  label: succinyl-diaminopimelate desuccinylase activity
            function:
              preferred_term: succinyl-diaminopimelate desuccinylase activity
              term:
                id: GO:0009014
                label: succinyl-diaminopimelate desuccinylase activity
            role_description: Releases L,L-diaminopimelate from the succinylated intermediate.
    - order: 4
      role: meso-diaminopimelate and lysine formation
      node:
        id: dapF_lysA_steps
        label: L,L-diaminopimelate to L-lysine
        module_type: METABOLIC_PATHWAY
        description: >-
          DapF produces meso-diaminopimelate and LysA decarboxylates it to
          L-lysine. PSEPK has duplicated DapF-like and LysA-like candidates, so
          first-pass curation should avoid assigning a unique committed paralog
          without stronger evidence.
        annotons:
          - id: dapF_epimerase
            label: DapF diaminopimelate epimerase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: diaminopimelate epimerase activity
                term:
                  id: GO:0008837
                  label: diaminopimelate epimerase activity
            function:
              preferred_term: diaminopimelate epimerase activity
              term:
                id: GO:0008837
                label: diaminopimelate epimerase activity
            role_description: Converts L,L-diaminopimelate to meso-diaminopimelate.
          - id: lysA_dap_decarboxylase
            label: LysA diaminopimelate decarboxylase
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: diaminopimelate decarboxylase activity
                term:
                  id: GO:0008836
                  label: diaminopimelate decarboxylase activity
            function:
              preferred_term: diaminopimelate decarboxylase activity
              term:
                id: GO:0008836
                label: diaminopimelate decarboxylase activity
            role_description: Final decarboxylation step producing L-lysine.
    - order: 5
      role: diaminopimelate use in peptidoglycan
      node:
        id: peptidoglycan_dap_boundary
        label: Meso-diaminopimelate incorporation into peptidoglycan
        module_type: METABOLIC_PATHWAY
        description: >-
          MurE and MurF consume meso-diaminopimelate in peptidoglycan precursor
          synthesis. They explain KEGG ppu00300 membership but are cell-wall
          biosynthesis boundary nodes, not enzymes that form L-lysine.
        annotons:
          - id: murE_dap_ligase_boundary
            label: MurE meso-diaminopimelate ligase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
                term:
                  id: GO:0008765
                  label: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
            function:
              preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
              term:
                id: GO:0008765
                label: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
            role_description: Peptidoglycan precursor ligase using meso-diaminopimelate.
          - id: murF_ligase_boundary
            label: MurF peptidoglycan ligase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
                term:
                  id: GO:0008766
                  label: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
            function:
              preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
              term:
                id: GO:0008766
                label: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
            role_description: Downstream peptidoglycan precursor ligase, outside strict L-lysine biosynthesis.
    - order: 6
      role: aminotransferase side-node context
      node:
        id: ornithine_aminotransferase_boundary
        label: Ornithine and acetylornithine aminotransferase side context
        module_type: REACTION
        description: >-
          KEGG ppu00300 includes AruC-like aminotransferase context. In PSEPK
          this is more naturally part of arginine/ornithine metabolism unless a
          specific lysine/DAP aminotransferase role is demonstrated.
        annotons:
          - id: acetylornithine_transaminase_boundary
            label: acetylornithine transaminase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
                term:
                  id: GO:0003992
                  label: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
            function:
              preferred_term: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
              term:
                id: GO:0003992
                label: N2-acetyl-L-ornithine:2-oxoglutarate 5-transaminase activity
            role_description: Arginine/ornithine aminotransferase side context, not strict DAP-route lysine biosynthesis.
