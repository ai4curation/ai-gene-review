id: MODULE:lysine_biosynthesis
title: L-lysine biosynthesis by the succinylated diaminopimelate pathway
description: >-
  Bacterial L-lysine biosynthesis from L-aspartate 4-semialdehyde and pyruvate
  through the succinylated diaminopimelate route. DapA and DapB form and reduce
  the tetrahydrodipicolinate intermediate. DapD masks it by succinylation, DapC
  introduces the second amino group, and DapE removes the succinyl group. DapF
  converts LL-diaminopimelate to meso-diaminopimelate, and LysA performs the
  terminal decarboxylation to L-lysine. Aspartate kinase and aspartate-semialdehyde
  dehydrogenase provide a shared precursor used by lysine, threonine, and
  methionine synthesis and are outside the dedicated module boundary. The
  meso-diaminopimelate product also feeds peptidoglycan assembly before its
  conversion to lysine.
status: DRAFT
evidence:
  - source_id: GO:0009085
    title: L-lysine biosynthetic process
    statement: The module is grounded in the current GO biological-process term for L-lysine biosynthesis.
  - source_id: KEGG:ppu00300
    title: Pseudomonas putida KT2440 lysine biosynthesis
    statement: >-
      The PSEPK pathway instance supplies candidate proteins for the succinylated
      DAP route together with upstream, peptidoglycan, and paralogous map members
      that require boundary curation.
  - source_id: UniPathway:UPA00034
    title: L-lysine biosynthesis via the diaminopimelate pathway
    statement: >-
      UniPathway grounds the DapA, DapB, DapD, DapC, DapE, DapF, and LysA
      reaction sequence represented here.
  - source_id: file:projects/P_PUTIDA/data/psepk_gene_list.tsv
    title: PSEPK UniProt metadata table
    statement: >-
      Supplies exact PSEPK accessions, locus tags, pathway assignments, and
      family identifiers for the representative members.
