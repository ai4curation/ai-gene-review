id: MODULE:mitochondrial_dicarboxylate_tricarboxylate_carriers
title: Mitochondrial di-/tricarboxylate and glutamate carriers (SLC25A1 citrate, SLC25A10 dicarboxylate, SLC25A21 oxodicarboxylate, SLC25A22 glutamate)
description: >-
  The tricarboxylic-acid (TCA) cycle both consumes and generates carbon skeletons that must move
  between the mitochondrial matrix and the cytosol for anabolism (lipogenesis, gluconeogenesis) and
  amino-acid metabolism. A set of SLC25 mitochondrial carriers exchanges these di- and
  tricarboxylate intermediates and related amino acids across the impermeable inner membrane. This
  module groups four such carriers. The citrate carrier SLC25A1 (CIC/CTP) exports matrix citrate in
  exchange for cytosolic malate, feeding cytosolic citrate lysis into acetyl-CoA (and NADPH) for
  fatty-acid and cholesterol synthesis. The dicarboxylate carrier SLC25A10 (DIC) exchanges malate or
  succinate for inorganic phosphate, supplying dicarboxylates for gluconeogenesis and lipogenesis and
  linking to sulfur metabolism. The oxodicarboxylate carrier SLC25A21 (ODC) transports the C5-C7
  2-oxodicarboxylates 2-oxoadipate and 2-oxoglutarate, serving the mitochondrial steps of lysine and
  tryptophan degradation. The glutamate carrier SLC25A22 (GC1) imports L-glutamate in symport with a
  proton, feeding glutamate catabolism and ammonia handling (and, in neurons, glutamate metabolism).
  Loss-of-function causes distinct metabolic diseases: SLC25A1 — combined D-2- and
  L-2-hydroxyglutaric aciduria and a congenital myasthenic syndrome; SLC25A22 — early infantile
  epileptic encephalopathy with migrating partial seizures; and SLC25A21 has been linked to a
  2-oxoadipate/2-oxoglutarate-dehydrogenase-related phenotype.
status: DRAFT
evidence:
  - source_id: GO:0006843
    title: mitochondrial citrate transmembrane transport
    statement: SLC25A1 mediates mitochondrial citrate transmembrane transport (GO:0006843).
  - source_id: GO:0071423
    title: malate transmembrane transport
    statement: SLC25A10 mediates malate (dicarboxylate) transmembrane transport (GO:0071423).
  - source_id: GO:1990550
    title: mitochondrial alpha-ketoglutarate transmembrane transport
    statement: SLC25A21 mediates mitochondrial 2-oxodicarboxylate (alpha-ketoglutarate/2-oxoadipate) transport (GO:1990550).
  - source_id: GO:0015813
    title: L-glutamate transmembrane transport
    statement: SLC25A22 mediates L-glutamate transmembrane transport (GO:0015813).
  - source_id: file:human/SLC25A1/SLC25A1-ai-review.yaml
    title: SLC25A1 gene review (human)
    statement: The citrate carrier (UniProtKB:P53007, GO:0071913) matches the completed human SLC25A1 review.
  - source_id: file:human/SLC25A10/SLC25A10-ai-review.yaml
    title: SLC25A10 gene review (human)
    statement: The dicarboxylate carrier (UniProtKB:Q9UBX3, GO:0015364) matches the completed human SLC25A10 review.
  - source_id: file:human/SLC25A21/SLC25A21-ai-review.yaml
    title: SLC25A21 gene review (human)
    statement: The oxodicarboxylate carrier (UniProtKB:Q9BQT8, GO:0015139) matches the completed human SLC25A21 review.
  - source_id: file:human/SLC25A22/SLC25A22-ai-review.yaml
    title: SLC25A22 gene review (human)
    statement: The glutamate carrier (UniProtKB:Q9H936, GO:0005313) matches the completed human SLC25A22 review.
