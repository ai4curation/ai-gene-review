  notes: >-
    Mitochondrial di-/tricarboxylate and glutamate exchange carriers of the SLC25 family, grounded to
    the completed human gene reviews: SLC25A1/CIC (P53007, GO:0071913 citrate secondary active
    transporter — citrate:malate antiporter proposed as a new term), SLC25A10/DIC (Q9UBX3, GO:0015364
    dicarboxylate:phosphate antiporter), SLC25A21/ODC (Q9BQT8, GO:0015139 alpha-ketoglutarate
    transporter — the closest existing MF; a 2-oxoadipate/oxodicarboxylate transporter term is
    proposed, and GO:0015367 oxoglutarate:malate was explicitly rejected because human ODC does not
    transport malate) and SLC25A22/GC1 (Q9H936, GO:0005313 L-glutamate transporter + GO:0005280 amino
    acid:proton symporter). All are inner-membrane transporters (no catalytic MF). Grouped as parallel
    carriers that move TCA-cycle-related di-/tricarboxylates and glutamate for anabolism (lipogenesis
    via SLC25A1, gluconeogenesis via SLC25A10) and amino-acid catabolism (lysine/tryptophan via
    SLC25A21, glutamate via SLC25A22). GO term ids/labels verified against the local go.db. These
    complement the malate_aspartate_shuttle (SLC25A11/OGC, SLC25A12/AGC1) and the OXPHOS/cofactor
    carrier modules. Disorders: SLC25A1 — combined D-2/L-2-hydroxyglutaric aciduria and congenital
    myasthenic syndrome; SLC25A22 — early infantile epileptic encephalopathy 3; SLC25A21 —
    2-oxoadipate/2-oxoglutarate-dehydrogenase-related phenotype.
