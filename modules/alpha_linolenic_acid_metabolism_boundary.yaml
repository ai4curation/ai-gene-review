id: MODULE:alpha_linolenic_acid_metabolism_boundary
title: Alpha-linolenic acid metabolism boundary
description: >-
  Boundary/absence module for KEGG ppu00592 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only two FadA-like 3-ketoacyl-CoA
  thiolases. These genes support generic fatty-acid beta-oxidation chemistry,
  not a complete alpha-linolenic-acid-specific pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00592
    title: alpha-Linolenic acid metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00592 provides the PSEPK curation batch. Its membership contains
      only PP_2051/fadA__Q88L84 and PP_2137/fadA__Q88L01, both reviewed as
      FadA-like thiolases in fatty-acid beta-oxidation context.
module:
  id: alpha_linolenic_acid_metabolism_boundary
  label: Alpha-linolenic acid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: fatty acid beta-oxidation
      term:
        id: GO:0006635
        label: fatty acid beta-oxidation
      description: Generic beta-oxidation context supported by the two FadA-like thiolases.
    - preferred_term: acetyl-CoA C-acyltransferase activity
      term:
        id: GO:0003988
        label: acetyl-CoA C-acyltransferase activity
      description: Thiolase/acyltransferase molecular function of the two KEGG ppu00592 members.
  parts:
    - order: 1
      role: FadA thiolase beta-oxidation side nodes
      node:
        id: fadA_thiolase_beta_oxidation_side_nodes
        label: FadA thiolase beta-oxidation side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          The two ppu00592 members are FadA-like 3-ketoacyl-CoA thiolases.
          Their curated core function is fatty-acid beta-oxidation rather than
          alpha-linolenic-acid-specific metabolism.
        annotons:
          - id: fadA_Q88L84_thiolase
            label: "fadA__Q88L84: FadA-like thiolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadA__Q88L84
            function:
              preferred_term: acetyl-CoA C-acyltransferase activity
              term:
                id: GO:0003988
                label: acetyl-CoA C-acyltransferase activity
            role_description: FadA-like thiolase side node for generic fatty-acid beta-oxidation.
          - id: fadA_Q88L01_thiolase
            label: "fadA__Q88L01: FadA beta-oxidation thiolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fadA__Q88L01
            function:
              preferred_term: acetyl-CoA C-acyltransferase activity
              term:
                id: GO:0003988
                label: acetyl-CoA C-acyltransferase activity
            role_description: FadA thiolase side node for generic fatty-acid beta-oxidation.
  notes: >-
    This module intentionally routes the two KEGG ppu00592 members back to the
    bacterial fatty-acid beta-oxidation interpretation. No alpha-linolenate-
    specific upstream oxidation, hydroperoxide, or plant oxylipin pathway
    chemistry is supported by the PSEPK candidate set.
