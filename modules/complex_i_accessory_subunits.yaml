  notes: >-
    Accessory/supernumerary (non-core) subunits of mitochondrial respiratory Complex I
    (NADH:ubiquinone oxidoreductase), grouped by arm and grounded to the completed human gene
    reviews. Peripheral (matrix) arm: NDUFA2 (O43678), NDUFA5 (Q16718), NDUFA6 (P56556), NDUFA12
    (Q9UI09), NDUFA13 (Q9P0J0, GRIM-19). Membrane arm: NDUFA1 (O15239), NDUFA8 (P51970), NDUFA10
    (O95299), NDUFA11 (Q86Y39), NDUFB3 (O43676), NDUFB7 (P17568), NDUFB8 (O95169), NDUFB9 (Q9Y6M9),
    NDUFB10 (O96000), NDUFB11 (Q9NX14), NDUFC2 (O95298). Every member is a non-catalytic structural
    constituent (GO:0005198 structural molecule activity) that contributes to, but does not itself
    enable, the complex-level NADH dehydrogenase (ubiquinone) activity (GO:0008137); all are part_of
    respiratory chain complex I (GO:0045271) at the mitochondrial inner membrane (GO:0005743).
    Notable subunits: NDUFA10 retains a deoxyribonucleoside-kinase fold but is catalytically inactive
    (pseudokinase — no kinase MF assigned); NDUFA13/GRIM-19 has a genuine STAT3-inhibition/apoptosis
    moonlighting role that is curated as a separate non-core function in its gene review; several
    (NDUFA8/NDUFB7/NDUFB10) are twin-CX9C proteins imported by the MIA40/CHCHD4 disulfide relay.
    This module complements the merged mitochondrial_complex_i_core (catalytic N+Q modules) and
    complex_i_assembly_factors modules; together they cover the nuclear-encoded Complex I proteome
    (the mtDNA-encoded ND1-6/ND4L membrane subunits are curated separately). GO term ids/labels were
    verified against the local go.db. Disorders: isolated mitochondrial complex I deficiency — Leigh
    syndrome, cardiomyopathy, leukoencephalopathy; NDUFB11 is X-linked (histiocytoid cardiomyopathy /
    MLS-like).
