id: MODULE:complex_i_accessory_subunits
title: Mitochondrial Complex I (NADH:ubiquinone oxidoreductase) accessory/supernumerary subunits; NDUFA1/2/5/6/8/10/11/12/13, NDUFB3/7/8/9/10/11, NDUFC2
description: >-
  Beyond its 14 conserved "core" subunits, mitochondrial respiratory Complex I (NADH:ubiquinone
  oxidoreductase) carries ~30 nuclear-encoded accessory (supernumerary) subunits that form a shell
  around the core L-shaped enzyme. These subunits are stable constituents of the mature holoenzyme
  (unlike the transient assembly factors) but are non-catalytic — they carry no redox cofactor and
  do not themselves perform the NADH:ubiquinone reaction. Their roles are structural: they stabilise
  and shield the core, seal the membrane arm, and are required for assembly and stability of a fully
  active complex. This module groups the human accessory subunits by which arm they decorate. The
  peripheral (matrix) arm accessory subunits — NDUFA2 (thioredoxin-fold), NDUFA5, NDUFA6, NDUFA12
  (near the N/Q junction) and NDUFA13/GRIM-19 — buttress the flavoprotein and Q modules; NDUFA13
  additionally has a well-documented moonlighting role as a negative regulator of STAT3 signalling
  and in apoptosis, curated separately from its structural role. The membrane arm accessory subunits
  — NDUFA1 (MWFE), NDUFA8 (twin-CX9C), NDUFA10, NDUFA11 (Tim17-like fold), NDUFB3, NDUFB7, NDUFB8,
  NDUFB9, NDUFB10 and NDUFB11 (several imported and disulfide-folded by the MIA40/CHCHD4 relay), and
  NDUFC2 — clamp the hydrophobic ND subunits. Loss of individual accessory subunits destabilises the
  holoenzyme and causes isolated mitochondrial complex I deficiency (Leigh syndrome, cardiomyopathy,
  leukoencephalopathy; NDUFB11 is X-linked, causing histiocytoid cardiomyopathy / MLS-like disease).
status: DRAFT
