id: MODULE:flagellar_regulation_boundary
title: Flagellar regulation boundary
description: >-
  Boundary module for the ppu02040 flagellar regulatory subset in Pseudomonas
  putida KT2440. The first-pass module covers the housekeeping sigma factor
  RpoD, sigma-54/RpoN, the flagellar sigma factor FliA, the FleQ master
  regulator, the AtoC/FleR-like sigma-54-associated response regulator, and the
  anti-sigma factor FlgM. It separates transcriptional control of the flagellar
  program from the export apparatus, structural apparatus, motor/switch/stator,
  and nonflagellar spillover buckets.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02040
    title: Flagellar assembly - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02040 includes flagellar regulators together with structural,
      export, motor, and spillover entries in the organism-specific flagellar
      assembly map.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.tsv
    title: ppu02040 bacterial flagellar assembly partition table
    statement: >-
      The partition separates rpoD, rpoN, fliA, atoC, fleQ, and flgM into the
      flagellar sigma/master regulation bucket.
  - source_id: file:PSEPK/rpoD/rpoD-ai-review.yaml
    title: Curated rpoD review
    statement: rpoD is curated as the primary sigma-70 housekeeping sigma factor for transcription initiation.
  - source_id: file:PSEPK/rpoN/rpoN-ai-review.yaml
    title: Curated rpoN review
    statement: rpoN is curated as sigma-54, an alternative sigma factor that directs RNA polymerase to sigma-54-dependent promoters.
  - source_id: file:PSEPK/fliA/fliA-ai-review.yaml
    title: Curated fliA review
    statement: fliA is curated as the flagellar sigma-28 factor that drives late flagellar gene transcription and flagellum assembly.
  - source_id: file:PSEPK/fleQ/fleQ-ai-review.yaml
    title: Curated fleQ review
    statement: fleQ is curated as the sigma-54-associated AAA+ master regulator that promotes flagellar assembly and integrates c-di-GMP-dependent biofilm regulation.
  - source_id: file:PSEPK/atoC/atoC-ai-review.yaml
    title: Curated atoC review
    statement: atoC is curated as a predicted phosphorylation-responsive sigma-54-associated DNA-binding transcription activator in the flagellar regulatory region.
  - source_id: file:PSEPK/flgM/flgM-ai-review.yaml
    title: Curated flgM review
    statement: flgM is curated as the anti-sigma-28 factor that antagonizes FliA and negatively regulates late flagellar transcription.
notes: >-
  First-pass interpretation: RpoD is included because KEGG ppu02040 carries the
  housekeeping sigma factor, but it is not flagellum-specific. RpoN/sigma-54 and
  FleQ provide the main early flagellar regulatory layer, with AtoC retained as
  a nearby NtrC/FleR-like response-regulator transcriptional activator whose
  exact KT2440 promoter targets remain unresolved. FliA/sigma-28 drives late
  flagellar gene transcription, while FlgM gates FliA activity as the anti-sigma
  checkpoint factor. This module does not treat biofilm, c-di-GMP, or global
  housekeeping transcription as part of the structural flagellar apparatus.
