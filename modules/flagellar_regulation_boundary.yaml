        apparatus components represented in the structural module.
  knowledge_gaps:
    - gap_statement: >-
        AtoC/PP_4371 has convincing response-regulator, sigma-54-interaction,
        AAA+, and HTH domain architecture, but Asta did not retrieve useful
        KT2440-specific literature for its exact targets.
      boundary: >-
        The module retains AtoC as a predicted sigma-54-associated
        transcriptional activator in the flagellar regulatory bucket without
        asserting a direct FleR-equivalent target set.
    - gap_statement: >-
        RpoD is a global housekeeping sigma factor rather than a dedicated
        flagellar regulator.
      boundary: >-
        RpoD remains in this boundary because it is a ppu02040 member, but the
        module does not treat housekeeping transcription as part of the core
        flagellar apparatus.
    - gap_statement: >-
        FleQ has experimentally supported c-di-GMP and biofilm/matrix roles in
        addition to flagellar activation.
