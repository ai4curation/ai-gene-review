  notes: >-
    Mitochondrial respiratory Complex III (cytochrome bc1), grounded to the human nuclear-encoded
    subunits UQCRFS1 (UniProtKB:P47985, GO:0009055), CYC1 (P08574, GO:0009055), UQCRC1 (P31930),
    UQCRC2 (P22695), UQCRB (P14927), UQCRQ (O14949) and UQCRH (P07919) — the last five structural
    (GO:0005198), the core proteins being peptidase-M16-fold pseudo-peptidases — and the assembly
    factors UQCC2 (Q9BRT2), UQCC3 (Q6UW78, GO:1901612 cardiolipin binding), LYRM7 (Q5U5X0,
    GO:0044183), BCS1L (Q9Y276, GO:0008320) and TTC19 (Q6DKK2). GO molecular-function/BP/location
    terms were taken from the completed human gene reviews and verified against the local go.db;
    Reactome reaction ids/titles were verified against the local reactome cache. The complex is the
    holoenzyme PROTEIN_COMPLEX node (catalytic UQCRFS1/CYC1 + cytochrome b, which is mtDNA-encoded
    MT-CYB and not a nuclear dismech gene, plus the structural subunits); the assembly factors form
    a regulatory node that positively regulates its formation. Note GO:0045275 "respiratory chain
    complex III" is the current complex term (GO:0005750 is obsolete). Complex III accepts electrons
    from Complex I (NADH:ubiquinone) and Complex II (succinate) via ubiquinol and passes them to
    cytochrome c → Complex IV; it also organises into respiratory supercomplexes. Disorders:
    mitochondrial complex III deficiency nuclear types 1-9 (subunit or assembly-factor loss),
    including GRACILE syndrome (BCS1L) and leukoencephalopathy (LYRM7); the mtDNA MT-CYB and the
    other respiratory complexes (I, II, IV, V; oxphos.yaml) are separate.
