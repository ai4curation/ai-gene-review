                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Committed, rate-limiting estrogen-synthesis step; expressed in gonad, placenta,
              adipose, brain, bone. Aromatase-inhibitor breast-cancer drug target; loss =
              aromatase deficiency, gain = aromatase excess.
    - order: 3
      role: potent-androgen activation (5alpha-reduction)
      node:
        id: srd5a2_step
        label: testosterone to 5alpha-dihydrotestosterone (DHT)
        module_type: REACTION
        annotons:
          - id: srd5a2_activity
            label: "SRD5A2: steroid 5alpha-reductase type 2"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Steroid 5-alpha reductase family (SRD5A)
                term:
                  id: PANTHER:PTHR10556
                  label: 3-OXO-5-ALPHA-STEROID 4-DEHYDROGENASE
                representative_members:
                  - preferred_term: SRD5A2 (human)
                    term:
                      id: UniProtKB:P31213
                      label: 3-oxo-5-alpha-steroid 4-dehydrogenase 2
            function:
              preferred_term: 3-oxo-5-alpha-steroid 4-dehydrogenase activity
              term:
                id: GO:0003865
                label: 3-oxo-5-alpha-steroid 4-dehydrogenase activity
              substrates:
                - preferred_term: testosterone
                - preferred_term: NADPH
              products:
                - preferred_term: 5alpha-dihydrotestosterone (DHT)
                - preferred_term: NADP+
