                  statement: "CYP19A1 hydroxylates TEST to EST17b (human Reactome reaction)"
                - source_id: Reactome:R-HSA-193060
                  statement: "CYP19A1 hydroxylates ANDST to E1 (human Reactome reaction)"
            locations:
