                - source_id: EC:1.3.1.22
                  statement: steroid 5alpha-reductase 2; NADPH-dependent irreversible reduction of the C4-C5 double bond of testosterone to the most potent androgen DHT (also acts on other 3-oxo-Delta4 steroids)
                - source_id: Reactome:R-HSA-9705713
                  statement: "SRD5A2 dehydrogenates TEST to DHTEST (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Local activation of testosterone to DHT in prostate/genital skin. Deficiency =
              5alpha-reductase-2 deficiency (46,XY DSD); finasteride/dutasteride target.
  connections:
    - source: hsd17b3_step
      target: cyp19a1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Testosterone from HSD17B3 is a substrate for aromatization to 17beta-estradiol by CYP19A1.
    - source: hsd17b3_step
      target: srd5a2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Testosterone from HSD17B3 is 5alpha-reduced by SRD5A2 to DHT.
  notes: >-
    Sex-steroid biosynthesis/activation grounded to the human enzymes HSD17B3 (UniProtKB:P37058,
    GO:0047045, EC 1.1.1.62), CYP19A1 (P11511, GO:0070330, EC 1.14.14.14) and SRD5A2 (P31213,
    GO:0003865, EC 1.3.1.22). GO molecular-function and location terms were taken from the
    completed human gene reviews and verified against the local go.db; Reactome reaction
    ids/titles were verified against the local reactome cache (including the "reducde"
    display-name typo in R-HSA-193064, left verbatim). Each step uses a PANTHER family selector
    with the human enzyme as representative so the module generalises across orthologs/paralogs.
    Upstream, the C19 androgen precursor androstenedione comes from the adrenal/gonadal
    steroidogenesis module (CYP17A1 17,20-lyase). The three enzymes are all ER-membrane proteins
    but define divergent fates: HSD17B3 makes testosterone, CYP19A1 diverts C19 androgens to
    estrogens, and SRD5A2 amplifies androgen signalling by making DHT. The pre-receptor
    cortisol/cortisone glucocorticoid shuttle (HSD11B1/HSD11B2) is a separate module. Disorders:
    46,XY DSD (HSD17B3, SRD5A2), aromatase deficiency/excess (CYP19A1); CYP19A1 and SRD5A2 are
    major drug targets (aromatase inhibitors; finasteride/dutasteride).
