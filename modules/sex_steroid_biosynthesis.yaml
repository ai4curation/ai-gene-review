id: MODULE:sex_steroid_biosynthesis
title: Sex-steroid biosynthesis and androgen activation — HSD17B3/CYP19A1/SRD5A2
description: >-
  The C19 androgen precursors made in the gonads and adrenal (androstenedione, from the
  CYP17A1 17,20-lyase reaction) are converted into the active sex steroids by three
  endoplasmic-reticulum-membrane enzymes. The testis-specific 17beta-hydroxysteroid
  dehydrogenase type 3 (HSD17B3) reduces the 17-keto group of androstenedione to give
  testosterone, the principal circulating androgen. Testosterone then has two activation
  fates in target tissues: the microsomal cytochrome P450 aromatase (CYP19A1) aromatizes
  the A-ring of C19 androgens to the C18 estrogens (androstenedione -> estrone,
  testosterone -> 17beta-estradiol), the committed and rate-limiting step of estrogen
  synthesis; and steroid 5alpha-reductase type 2 (SRD5A2) irreversibly reduces the C4-C5
  double bond of testosterone to 5alpha-dihydrotestosterone (DHT), the most potent androgen,
  in prostate and genital skin. Inherited defects define disorders of sex development and
  hormone imbalance: HSD17B3 (46,XY DSD, 17beta-HSD3 deficiency), CYP19A1 (aromatase
  deficiency / aromatase excess syndrome; CYP19A1 is also the aromatase-inhibitor
  breast-cancer drug target) and SRD5A2 (5alpha-reductase-2 deficiency 46,XY DSD; the
  finasteride/dutasteride target for benign prostatic hyperplasia and androgenetic alopecia).
status: DRAFT
evidence:
  - source_id: GO:0120178
    title: steroid hormone biosynthetic process
    statement: >-
      The module is grounded in steroid hormone biosynthetic process (GO:0120178); it covers
      the conversion of C19 androgen precursors into active androgens (testosterone, DHT) and
      estrogens.
  - source_id: GO:0006702
    title: androgen biosynthetic process
    statement: HSD17B3 (-> testosterone) and SRD5A2 (-> DHT) carry out androgen biosynthesis.
  - source_id: GO:0006703
    title: estrogen biosynthetic process
    statement: CYP19A1 (aromatase) carries out estrogen biosynthesis from C19 androgens.
  - source_id: Reactome:R-HSA-193048
    title: Androgen biosynthesis
    statement: >-
      The androgen steps (HSD17B3 androstenedione->testosterone; SRD5A2 testosterone->DHT)
      follow the human Reactome "Androgen biosynthesis" sub-pathway.
  - source_id: Reactome:R-HSA-193144
    title: Estrogen biosynthesis
    statement: >-
      The aromatase reactions (CYP19A1 androstenedione->estrone, testosterone->estradiol)
      follow the human Reactome "Estrogen biosynthesis" sub-pathway.
  - source_id: file:human/HSD17B3/HSD17B3-ai-review.yaml
    title: HSD17B3 gene review (human)
    statement: >-
      The androstenedione->testosterone step (UniProtKB:P37058, GO:0047045) matches the
      completed human HSD17B3 review.
  - source_id: file:human/CYP19A1/CYP19A1-ai-review.yaml
    title: CYP19A1 gene review (human)
    statement: >-
      The aromatase step (UniProtKB:P11511, GO:0070330) matches the completed human CYP19A1 review.
  - source_id: file:human/SRD5A2/SRD5A2-ai-review.yaml
    title: SRD5A2 gene review (human)
    statement: >-
      The testosterone->DHT 5alpha-reduction step (UniProtKB:P31213, GO:0003865) matches the
      completed human SRD5A2 review.
module:
  id: sex_steroid_biosynthesis
  label: Sex-steroid biosynthesis and androgen activation
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: steroid hormone biosynthetic process
      term:
        id: GO:0120178
        label: steroid hormone biosynthetic process
      description: Formation of active androgens (testosterone, DHT) and estrogens from C19 precursors.
    - preferred_term: androgen biosynthetic process
      term:
        id: GO:0006702
        label: androgen biosynthetic process
      description: Synthesis of testosterone (HSD17B3) and its activation to DHT (SRD5A2).
    - preferred_term: estrogen biosynthetic process
      term:
        id: GO:0006703
        label: estrogen biosynthetic process
      description: Aromatization of C19 androgens to C18 estrogens (CYP19A1).
  context:
    cellular_components:
      - preferred_term: endoplasmic reticulum membrane
        term:
          id: GO:0005789
          label: endoplasmic reticulum membrane
        description: HSD17B3, CYP19A1 and SRD5A2 are all endoplasmic-reticulum-membrane enzymes.
  parts:
    - order: 1
      role: testosterone synthesis (17-ketoreduction)
      node:
        id: hsd17b3_step
        label: androstenedione to testosterone
        module_type: REACTION
        annotons:
          - id: hsd17b3_activity
            label: "HSD17B3: 17beta-hydroxysteroid dehydrogenase type 3"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 17beta-hydroxysteroid dehydrogenase type 3 family (SDR)
                term:
                  id: PANTHER:PTHR43899
                  label: SHORT-CHAIN DEHYDROGENASE/REDUCTASE
                representative_members:
                  - preferred_term: HSD17B3 (human)
                    term:
                      id: UniProtKB:P37058
                      label: 17-beta-hydroxysteroid dehydrogenase type 3
            function:
              preferred_term: testosterone dehydrogenase (NADP+) activity
              term:
                id: GO:0047045
                label: testosterone dehydrogenase (NADP+) activity
              substrates:
                - preferred_term: androstenedione
                - preferred_term: NADPH
              products:
                - preferred_term: testosterone
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.1.1.62
                  statement: 17beta-HSD type 3; NADPH-dependent reduction of the 17-keto group of androstenedione to give testosterone (final testosterone-synthesis step)
                - source_id: Reactome:R-HSA-193064
                  statement: "HSD17B3-like proteins reducde ANDST to TEST (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
                term:
                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Testis-specific final step of testosterone biosynthesis. Deficiency = 46,XY DSD
              (17beta-HSD3 deficiency), with elevated androstenedione/testosterone ratio.
    - order: 2
      role: estrogen synthesis (aromatization)
      node:
        id: cyp19a1_step
        label: C19 androgens to C18 estrogens
        module_type: REACTION
        annotons:
          - id: cyp19a1_activity
            label: "CYP19A1: aromatase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Aromatase cytochrome P450 family (CYP19)
                term:
                  id: PANTHER:PTHR24291
                  label: CYTOCHROME P450 19A1 AROMATASE
                representative_members:
                  - preferred_term: CYP19A1 (human)
                    term:
                      id: UniProtKB:P11511
                      label: Aromatase
            function:
              preferred_term: aromatase activity
              term:
                id: GO:0070330
                label: aromatase activity
              substrates:
                - preferred_term: testosterone (or androstenedione)
                - preferred_term: O2
                - preferred_term: NADPH (via POR)
              products:
                - preferred_term: 17beta-estradiol (or estrone)
                - preferred_term: formate
              evidence:
                - source_id: EC:1.14.14.14
                  statement: aromatase; three sequential oxidations remove the C19 methyl and aromatize the A-ring, converting C19 androgens to C18 estrogens (committed, rate-limiting estrogen step)
