id: MODULE:flagellar_basal_body_hook_filament_boundary
title: Flagellar basal body, hook, and filament boundary
description: >-
  Boundary module for the ppu02040 basal-body/hook/filament structural subset
  in Pseudomonas putida KT2440. The first-pass module covers the FliF/FliE
  early basal-body scaffold, FlgB/FlgC/FlgF/FlgG rod components, FlgJ
  peptidoglycan-clearance activity, FlgD hook-formation support, FlgI/FlgH P/L
  rings, FlgE hook, FlgK/FlgL hook-filament junction, and FliC/FliD
  filament/cap layer. It separates structural apparatus construction from the
  export apparatus, motor/switch/stator, and flagellar-regulation buckets.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02040
    title: Flagellar assembly - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02040 provides the organism-specific flagellar assembly umbrella
      that includes export apparatus, basal-body/hook/filament structural
      proteins, motor/switch/stator components, and regulators.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.tsv
    title: ppu02040 bacterial flagellar assembly partition table
    statement: >-
      The partition separates fliF, fliE, fliD, fliC, flgL, flgK, flgJ, flgI,
      flgH, flgG, flgF, flgE, flgD, flgC, and flgB into the basal-body,
      hook, and filament structural bucket.
  - source_id: file:PSEPK/fliF/fliF-ai-review.yaml
    title: Curated fliF review
    statement: fliF is curated as the membrane-associated MS/M-ring scaffold of the flagellar basal body.
  - source_id: file:PSEPK/fliE/fliE-ai-review.yaml
    title: Curated fliE review
    statement: fliE is curated as a structural hook-basal-body complex component.
  - source_id: file:PSEPK/flgB/flgB-ai-review.yaml
    title: Curated flgB review
    statement: flgB is curated as a basal-body rod structural protein supporting flagellum-dependent motility.
  - source_id: file:PSEPK/flgC/flgC-ai-review.yaml
    title: Curated flgC review
    statement: flgC is curated as a basal-body rod structural protein supporting flagellum-dependent motility.
  - source_id: file:PSEPK/flgF/flgF-ai-review.yaml
    title: Curated flgF review
    statement: flgF is curated as a basal-body rod structural protein supporting flagellum-dependent motility.
  - source_id: file:PSEPK/flgG/flgG-ai-review.yaml
    title: Curated flgG review
    statement: flgG is curated as the distal rod structural protein of the flagellar basal body.
  - source_id: file:PSEPK/flgJ/flgJ-ai-review.yaml
    title: Curated flgJ review
    statement: flgJ is curated as a periplasmic glycosyl-bond hydrolase/muramidase for flagellar rod assembly.
  - source_id: file:PSEPK/flgD/flgD-ai-review.yaml
    title: Curated flgD review
    statement: flgD is curated as a hook-formation/rod-modification factor for bacterial-type flagellum organization.
  - source_id: file:PSEPK/flgI/flgI-ai-review.yaml
    title: Curated flgI review
    statement: flgI is curated as the periplasmic P-ring structural protein of the flagellar basal body.
  - source_id: file:PSEPK/flgH/flgH-ai-review.yaml
    title: Curated flgH review
    statement: flgH is curated as the outer-membrane L-ring structural protein of the flagellar basal body.
  - source_id: file:PSEPK/flgE/flgE-ai-review.yaml
    title: Curated flgE review
    statement: flgE is curated as the bacterial-type flagellar hook structural protein.
  - source_id: file:PSEPK/flgK/flgK-ai-review.yaml
    title: Curated flgK review
    statement: flgK is curated as a hook-filament junction structural protein.
  - source_id: file:PSEPK/flgL/flgL-ai-review.yaml
    title: Curated flgL review
    statement: flgL is curated as a hook-filament junction structural protein.
  - source_id: file:PSEPK/fliC/fliC-ai-review.yaml
    title: Curated fliC review
    statement: fliC is curated as the flagellin structural subunit of the bacterial-type flagellar filament.
  - source_id: file:PSEPK/fliD/fliD-ai-review.yaml
    title: Curated fliD review
    statement: fliD is curated as the exported FliD/HAP2 filament-cap protein.
notes: >-
  First-pass interpretation: FliF and FliE define the early basal-body scaffold
  near the MS-ring/rod junction; FlgB, FlgC, FlgF, and FlgG form rod-family
  structural layers, with FlgJ providing periplasmic peptidoglycan hydrolase
  activity and FlgD supporting hook formation. FlgI and FlgH form the P and L
  rings, FlgE forms the hook, FlgK/FlgL form the hook-filament junction, and
  FliC/FliD form the filament/cap layer. Broad swarming, adhesion, and
  cytoskeletal motor activity transfers were treated conservatively in the
  individual gene reviews.
