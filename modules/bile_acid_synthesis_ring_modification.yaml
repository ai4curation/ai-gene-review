id: MODULE:bile_acid_synthesis_ring_modification
title: Bile acid synthesis I — ring modification (cholesterol -> 5-beta-cholestane intermediates); CYP7A1/CYP7B1/HSD3B7/AKR1D1
description: >-
  The first phase of bile-acid biosynthesis modifies the cholesterol steroid nucleus,
  producing the 7-alpha-hydroxylated, 3-oxo, 5-beta-reduced cholestane intermediates that
  are later shortened in the side chain to the C24 bile acids. Two entry routes converge:
  the CLASSIC (neutral) pathway begins with cholesterol 7-alpha-hydroxylase (CYP7A1), the
  rate-limiting, feedback-regulated enzyme that hydroxylates cholesterol at C7-alpha; the
  ACIDIC (alternative) pathway begins when oxysterols (25- and 27-hydroxycholesterol, from
  CH25H/CYP27A1) are 7-alpha-hydroxylated by oxysterol 7-alpha-hydroxylase (CYP7B1). The
  7-alpha-hydroxy sterols are then oxidised and isomerised by the 3-beta-hydroxy-Delta5-C27-
  steroid dehydrogenase HSD3B7 to the 3-oxo-Delta4 intermediate (7-alpha-hydroxy-4-cholesten-
  3-one), and the Delta4 double bond is reduced to the 5-beta configuration by steroid
  5-beta-reductase (AKR1D1), giving the cis-fused (5-beta) A/B ring junction characteristic
  of bile acids. (CYP8B1 branches here to specify cholic vs chenodeoxycholic acid.) Inherited
  defects: CYP7A1 deficiency (hypercholesterolemia/gallstones); CYP7B1 deficiency (hereditary
  spastic paraplegia type 5A and severe neonatal liver failure); HSD3B7 deficiency (congenital
  bile acid synthesis defect type 1); and AKR1D1 deficiency (bile acid synthesis defect type 2)
  — the HSD3B7/AKR1D1 defects present as neonatal cholestasis with fat-soluble-vitamin malabsorption.
status: DRAFT
