  connections:
    - source: cyp7a1_step
      target: hsd3b7_step
      connection_type: PROVIDES_INPUT_FOR
      description: 7-alpha-hydroxycholesterol (classic pathway) is oxidised/isomerised by HSD3B7.
    - source: cyp7b1_step
      target: hsd3b7_step
      connection_type: PROVIDES_INPUT_FOR
      description: 7-alpha-hydroxy-oxysterols (acidic pathway) are also processed by HSD3B7.
    - source: hsd3b7_step
      target: akr1d1_step
      connection_type: PROVIDES_INPUT_FOR
      description: The 3-oxo-Delta4 intermediate from HSD3B7 is 5-beta-reduced by AKR1D1.
  notes: >-
    The ring-modification phase of bile-acid biosynthesis grounded to the human enzymes CYP7A1
    (UniProtKB:P22680, GO:0008123, EC 1.14.14.23), CYP7B1 (O75881, GO:0008396, EC 1.14.14.29),
    HSD3B7 (Q9H2F3, GO:0003854, EC 1.1.1.181) and AKR1D1 (P51857, GO:0047787, EC 1.3.1.3). GO
    molecular-function terms were taken from the human GOA records; Reactome reaction ids and
    titles were verified against the local reactome cache. CYP7A1 and CYP7B1 share the P450
    family PTHR24304 (each represented by its own gene); HSD3B7 and AKR1D1 use their own family
    selectors. Two entry routes converge: the classic/neutral pathway (CYP7A1, the rate-limiting
    committed step) and the acidic/alternative pathway (CYP7B1, on oxysterols from CYP27A1/CH25H);
    both feed HSD3B7 then AKR1D1. CYP8B1 (12-alpha-hydroxylase, not in this batch) branches at the
    HSD3B7/AKR1D1 intermediates to specify cholic vs chenodeoxycholic acid. Downstream, the
    5-beta-cholestane intermediates undergo side-chain oxidation (CYP27A1) and peroxisomal
    beta-oxidation (AMACR, ACOX2, then conjugation by SLC27A5/BAAT) to the mature C24 bile acids
    (a separate module, to follow). Disorders: CYP7A1 (hypercholesterolemia/gallstones); CYP7B1
    (SPG5A / neonatal liver failure); HSD3B7 (bile acid synthesis defect type 1); AKR1D1 (bile
    acid synthesis defect type 2).
