id: MODULE:bacterial_secretion_system_boundary
title: Bacterial secretion system boundary
description: >-
  Boundary module for KEGG ppu03070 bacterial secretion system in Pseudomonas
  putida KT2440. The primary PSEPK ppu03070 partition contains type II
  secretion/Xcp-Gsp components, a two-partner/type Vb secretion pair, several
  type VI secretion system loci and effectors, and a small type-I secretion
  accessory tail. Sec, Tat, SRP, and YidC inner-membrane export components are
  handled in the neighboring bacterial_protein_export module and are not part of
  this primary ppu03070 batch.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03070
    title: Bacterial secretion system - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03070 provides the organism-specific PSEPK bacterial secretion
      system membership used to seed this boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu03070_bacterial_secretion_system_boundary.tsv
    title: ppu03070 first-pass batch table
    statement: >-
      The primary-only batch table records 42 genes assigned to the ppu03070
      bacterial secretion-system boundary, with review, curation, and Asta
      retrieval status.
  - source_id: file:projects/P_PUTIDA/batches/ppu02025_biofilm_formation_pseudomonas_partition.tsv
    title: ppu02025 biofilm-formation partition table
    statement: >-
      The ppu02025 partition includes a T6SS/biofilm-context bucket whose
      baseplate, sheath, TssA-like, and TagF-like entries are best reused as
      bacterial secretion-system boundary context.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_hcp_t6ss_product_name_spillover.tsv
    title: Motility/chemotaxis/biofilm Hcp/T6SS product-name spillover batch
    statement: >-
      The motility/chemotaxis/biofilm functional-bucket partition routes PP_0655
      to this secretion-system boundary because its Hcp/T6SS domains match the
      existing Hcp candidate pattern despite a generic fimbrial-protein-related
      product name.
  - source_id: file:PSEPK/gspE/gspE-ai-review.yaml
    title: Curated gspE review
    statement: gspE is curated as a type-II secretion ATPase component.
  - source_id: file:PSEPK/xcpQ/xcpQ-ai-review.yaml
    title: Curated xcpQ review
    statement: xcpQ is curated as a type-II secretion outer-membrane secretin component.
  - source_id: file:PSEPK/PP_1450/PP_1450-ai-review.yaml
    title: Curated PP_1450 review
    statement: PP_1450 is curated as a two-partner/type Vb secretion outer-membrane transporter.
  - source_id: file:PSEPK/clpV/clpV-ai-review.yaml
    title: Curated clpV review
    statement: clpV is curated as a T6SS-associated ClpV-family AAA+ ATPase rather than a generic heat-shock protein.
  - source_id: file:PSEPK/cyaB/cyaB-ai-review.yaml
    title: Curated cyaB review
    statement: cyaB is curated as an ATP-driven type-I secretion ABC exporter/processing component.
notes: >-
  First-pass interpretation: ppu03070 is a secretion-system boundary module, not
  a single linear pathway. The Xcp/Gsp genes support type-II secretion; PP_1449
  and PP_1450 form a likely two-partner/type Vb secretion pair; the VgrG, Hcp,
  DotU, TssJ/SciN, TssM/IcmF, and ClpV-like entries mark several T6SS-associated
  loci; and PP_4926/CyaB are type-I secretion context. Many T6SS members have no
  GOA rows, so their gene reviews remain conservative and the module carries the
  pathway-level grouping. The ppu02025 biofilm-formation umbrella contributes
  additional TssA/TssB/TssC/TssG/TssK and TagF-like T6SS apparatus/accessory
  proteins that are secretion-boundary context rather than direct evidence for a
  dedicated biofilm-signaling pathway. PP_0655 is added from the
  motility/chemotaxis/biofilm functional bucket as another Hcp-family candidate
  whose product name is misleadingly fimbrial.
