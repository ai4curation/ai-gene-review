id: MODULE:arginine_biosynthesis
title: L-arginine biosynthesis via acetylated ornithine (microbial)
description: >-
  De novo microbial L-arginine biosynthesis from L-glutamate through
  N-acetylated intermediates and L-ornithine. The module includes the linear
  route, in which ArgA initiates acetylation and ArgE hydrolyses
  N-acetyl-L-ornithine, and the cyclic route, in which bifunctional ArgJ can
  initiate the pathway and recycle the acetyl group from N-acetyl-L-ornithine.
  After ornithine formation, ArgF, ArgG, and ArgH convert it through
  L-citrulline and argininosuccinate to L-arginine. Carbamoyl-phosphate
  production is shared with pyrimidine metabolism and is intentionally outside
  the module boundary. Succinylated-intermediate, N-acetylcitrulline, and
  LysW-dependent arginine pathways are distinct implementations not expanded
  in this module.
status: DRAFT
evidence:
  - source_id: GapMind:aa
    title: GapMind for amino acid biosynthesis
    statement: >-
      The conserved reaction set and alternative linear and cyclic
      acetylated-ornithine routes derive from the GapMind arginine pathway
      definition arg.steps (PaperBLAST, Price & Arkin, LBL).
    url: https://papers.genomics.lbl.gov/cgi-bin/gapView.cgi?gdb=NCBI&set=aa&path=arg
  - source_id: MetaCyc:ARGSYN-PWY
    title: L-arginine biosynthesis I via L-acetylornithine
    statement: Grounds the linear ArgA-to-ArgE acetylated-intermediate route.
  - source_id: MetaCyc:ARGSYNBSUB-PWY
    title: L-arginine biosynthesis II (acetyl cycle)
    statement: Grounds the cyclic ArgJ acetyl-transfer implementation.
  - source_id: GO:0006526
    title: L-arginine biosynthetic process
    statement: The module is grounded in the GO biological-process term for L-arginine biosynthesis.
  - source_id: PMID:31451546
    title: Arginine Biosynthesis Modulates Pyoverdine Production and Release in Pseudomonas putida as Part of the Mechanism of Adaptation to Oxidative Stress.
    statement: >-
      KT2440 genetics identifies PP_4481 as argD (= astC) and shows that
      separate argD, argE, and argJ mutants are not arginine auxotrophs. This
      supports overlapping aminotransferase and ornithine-release
      implementations without establishing which route carries dominant flux.
  - source_id: KEGG:ppu00220
    title: Pseudomonas putida KT2440 arginine biosynthesis map
    statement: >-
      The PSEPK pathway instance supplies exact UniProt exemplars for all eight
      reactions while the broader KEGG map also contains catabolic and shared
      nitrogen-metabolism genes outside this module boundary.
  - source_id: file:projects/P_PUTIDA/data/psepk_pathway_membership.tsv
    title: PSEPK pathway membership table
    statement: >-
      The local partition provides accession and locus-tag mappings used to
      distinguish the biosynthetic core from arginine catabolism, urease, and
      shared carbamoyl-phosphate synthesis.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__arginine_biosynthesis__ppu00220-deep-research-openscientist.md
    title: OpenScientist PSEPK module, pathway, and taxon synthesis
    statement: >-
      The species-aware retrieval recovers the eight-step pathway outline and
      flags the KEGG boundary spillover. Its recommendation to promote AST-operon
      PP_4481 as a biosynthetic step-4 contributor and its unqualified
      redundancy claims are rejected here in favor of direct KT2440 genetics,
      local PANTHER subfamilies, and the curated gene reviews.
  - source_id: file:PSEPK/argD/argD-deep-research-openscientist.md
    title: OpenScientist synthesis for PSEPK PP_4481 acyl-ornithine aminotransferase
    statement: >-
      Genomic context and family analysis place PP_4481 in the AST catabolic
      operon and identify PP_0372 as the stronger PSEPK candidate for the
      biosynthetic acetylornithine-transaminase step. The report's route-level
      claims are treated as hypotheses pending direct KT2440 genetics.
