id: MODULE:arginine_biosynthesis
title: L-arginine biosynthesis (microbial acetylated route)
description: >-
  De novo biosynthesis of L-arginine through the bacterial acetylated
  glutamate/ornithine route. The pathway converts L-glutamate to
  N-acetyl-L-glutamate, phosphorylates and reduces it to the semialdehyde,
  transaminates to N-acetyl-L-ornithine, releases L-ornithine either by
  deacetylation or acetyl-group recycling, forms carbamoyl phosphate with the
  glutamine-dependent CarAB carbamoyl-phosphate synthase, and completes arginine
  formation through ornithine carbamoyltransferase, argininosuccinate synthase,
  and argininosuccinate lyase. The module is species-neutral but is written to
  support bacterial pathway curation where KEGG arginine-biosynthesis maps also
  pull in catabolic arginine deiminase, urease, glutamine-synthetase, and
  polyamine side nodes.
status: DRAFT
evidence:
  - source_id: GO:0006526
    title: L-arginine biosynthetic process
    statement: The module is grounded in the GO biological-process term for L-arginine biosynthesis.
  - source_id: UniPathway:UPA00068
    title: L-arginine biosynthesis
    statement: >-
      UniPathway UPA00068 provides the bacterial L-arginine biosynthesis route
      represented in UniProt cross-references for the PSEPK ArgA/ArgB/ArgC/ArgD/
      ArgE/ArgF/ArgG/ArgH/ArgJ/CarAB candidate set.
  - source_id: KEGG:ppu00220
    title: Arginine biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00220 is used as the PSEPK curation batch, with side-node boundary
      review needed for arginine catabolism, urease, nitrogen-assimilation, and
      polyamine enzymes.
module:
  id: arginine_biosynthesis
  label: L-arginine biosynthesis
  module_type: METABOLIC_PATHWAY
