  notes: >-
    PSEPK-specific curation should evaluate ArgA versus ArgJ, ArgC1 versus
    ArgC2, ArgE/PP_3571 versus ArgJ acetyl recycling, and the missing-from-KEGG
    but UniPathway-supported ArgD aminotransferase. KEGG ppu00220 also includes
    ArcA/ArcB/ArcC catabolic arginine-deiminase chemistry, urease subunits,
    glutamine-synthetase-like polyamine enzymes, and nitrogen-assimilation nodes;
    those are boundary candidates rather than strict committed steps in this
    module.
