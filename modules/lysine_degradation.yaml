id: MODULE:lysine_degradation
title: L-lysine degradation and related glutarate/pipecolate routes
description: >-
  A bacterial boundary module for lysine degradation centered on conversion of
  L-lysine to glutarate through the DavB/DavA/DavT/DavD 5-aminovalerate route,
  with related D-lysine, pipecolate, aminoadipate, glutarate, and
  hydroxyglutarate side chemistry tracked explicitly. In Pseudomonas putida
  KT2440, KEGG ppu00310 also includes fatty-acid beta-oxidation enzymes,
  thiolases, lipoamide dehydrogenases, succinate-semialdehyde dehydrogenases,
  and broad aldehyde dehydrogenases; those are boundary context unless
  gene-level evidence supports a committed lysine-catabolic role.
status: DRAFT
evidence:
  - source_id: GO:0019477
    title: L-lysine catabolic process
    statement: The module is grounded in the current GO biological-process term for L-lysine catabolism.
  - source_id: KEGG:ppu00310
    title: Lysine degradation - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set, but combines
      the Dav L-lysine route with pipecolate, aminoadipate, glutarate,
      hydroxyglutarate, beta-oxidation, lipoamide, and aldehyde-dehydrogenase
      side nodes.
module:
  id: lysine_degradation
  label: L-lysine degradation and related glutarate/pipecolate routes
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-lysine catabolic process
      term:
        id: GO:0019477
        label: L-lysine catabolic process
      description: Breakdown of L-lysine.
    - preferred_term: GABA catabolic process
      term:
        id: GO:0009450
        label: GABA catabolic process
      description: Related aminobutyrate/aminovalerate aldehyde chemistry in broad KEGG maps.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most bacterial lysine-catabolic enzymes in this module are soluble cytoplasmic enzymes.
  parts:
    - order: 1
      role: L-lysine to 5-aminovalerate
      node:
        id: davB_davA_entry
        label: DavB/DavA conversion of L-lysine to 5-aminovalerate
        module_type: METABOLIC_PATHWAY
        description: >-
          The Pseudomonas Dav route starts with L-lysine 2-monooxygenase and
          5-aminopentanamidase chemistry to form 5-aminovalerate. Some automated
          annotations use older or substrate-mismatched monooxygenase family
          terms, so gene-level review should verify DavB substrate specificity.
        annotons:
          - id: davB_lysine_monooxygenase
            label: DavB L-lysine 2-monooxygenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: davB
            function:
              preferred_term: lysine 2-monooxygenase activity
              term:
                id: GO:0050067
                label: lysine 2-monooxygenase activity
            role_description: Oxidative decarboxylating monooxygenase step from L-lysine to 5-aminopentanamide.
          - id: davA_aminopentanamidase
            label: DavA 5-aminopentanamidase
            participant:
              selector_type: GENE
              gene:
                preferred_term: davA
            function:
              preferred_term: 5-aminopentanamidase activity
              term:
                id: GO:0047588
                label: 5-aminopentanamidase activity
            role_description: Hydrolyzes 5-aminopentanamide to 5-aminovalerate.
    - order: 2
      role: 5-aminovalerate to glutarate
      node:
        id: davT_davD_steps
        label: 5-aminovalerate to glutarate
        module_type: METABOLIC_PATHWAY
        description: >-
          DavT transaminates 5-aminovalerate to glutarate semialdehyde, and
          DavD oxidizes glutarate semialdehyde to glutarate. These are the most
          direct PSEPK L-lysine catabolic steps in the KEGG candidate set.
        annotons:
          - id: davT_aminovalerate_transaminase
            label: DavT 5-aminovalerate transaminase
            participant:
              selector_type: GENE
              gene:
                preferred_term: davT
            function:
              preferred_term: 5-aminovalerate:2-oxoglutarate transaminase activity
              term:
                id: GO:0047589
                label: 5-aminovalerate:2-oxoglutarate transaminase activity
            role_description: Converts 5-aminovalerate to glutarate semialdehyde.
          - id: davD_glutarate_semialdehyde_dehydrogenase
            label: DavD glutarate-semialdehyde dehydrogenase
            participant:
              selector_type: GENE
              gene:
                preferred_term: davD
            function:
              preferred_term: glutarate-semialdehyde dehydrogenase (NADP+) activity
              term:
                id: GO:0102810
                label: glutarate-semialdehyde dehydrogenase (NADP+) activity
            role_description: Oxidizes glutarate semialdehyde to glutarate.
    - order: 3
      role: glutarate and hydroxyglutarate handling
      node:
        id: glutarate_hydroxyglutarate_context
        label: Glutarate, glutaryl-CoA, and hydroxyglutarate side chemistry
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00310 includes glutarate, glutaryl-CoA, and 2-hydroxyglutarate
          enzymes that may connect lysine catabolism to central carbon
          metabolism, but not all are committed lysine-catabolic steps.
        annotons:
          - id: gcdH_glutaryl_coa_dehydrogenase
            label: glutaryl-CoA dehydrogenase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glutaryl-CoA dehydrogenase activity
                term:
                  id: GO:0004361
                  label: glutaryl-CoA dehydrogenase activity
            function:
              preferred_term: glutaryl-CoA dehydrogenase activity
              term:
                id: GO:0004361
                label: glutaryl-CoA dehydrogenase activity
            role_description: Glutaryl-CoA conversion context downstream of glutarate activation.
          - id: coa_transferase_boundary
            label: CoA-transferase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: CoA-transferase activity
                term:
                  id: GO:0008410
                  label: CoA-transferase activity
            function:
              preferred_term: CoA-transferase activity
              term:
                id: GO:0008410
                label: CoA-transferase activity
            role_description: Candidate glutarate CoA-transferase context requiring gene-level review.
          - id: glaH_glutarate_dioxygenase
            label: GlaH glutarate dioxygenase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glutarate dioxygenase activity
                term:
                  id: GO:0106343
                  label: glutarate dioxygenase activity
            function:
              preferred_term: glutarate dioxygenase activity
              term:
                id: GO:0106343
                label: glutarate dioxygenase activity
            role_description: Glutarate hydroxylation side step.
          - id: hydroxyglutarate_dehydrogenase_context
            label: hydroxyglutarate dehydrogenase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: (R)-2-hydroxyglutarate dehydrogenase activity
                term:
                  id: GO:0051990
                  label: (R)-2-hydroxyglutarate dehydrogenase activity
            function:
              preferred_term: (R)-2-hydroxyglutarate dehydrogenase activity
              term:
                id: GO:0051990
                label: (R)-2-hydroxyglutarate dehydrogenase activity
            role_description: Hydroxyglutarate side-pathway context.
    - order: 4
      role: D-lysine and pipecolate side route
      node:
        id: d_lysine_pipecolate_context
        label: D-lysine and pipecolate side chemistry
        module_type: METABOLIC_PATHWAY
        description: >-
          PSEPK ppu00310 includes broad-spectrum racemase, D-lysine oxidase,
          pipecolate oxidase, piperideine reductase, and aldehyde dehydrogenase
          candidates. These should be curated as a related side route until the
          exact physiological connection to L-lysine degradation is established.
        annotons:
          - id: dpkA_piperideine_reductase
            label: piperideine reductase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: delta1-piperideine-2-carboxylate reductase activity
                term:
                  id: GO:0047125
                  label: delta1-piperideine-2-carboxylate reductase activity
            function:
              preferred_term: delta1-piperideine-2-carboxylate reductase activity
              term:
                id: GO:0047125
                label: delta1-piperideine-2-carboxylate reductase activity
            role_description: Pipecolate/piperideine redox context.
          - id: amaA_pipecolate_oxidase
            label: AmaA L-pipecolate oxidase
            participant:
              selector_type: GENE
              gene:
                preferred_term: amaA
            function:
              preferred_term: L-pipecolate oxidase activity
              term:
                id: GO:0050031
                label: L-pipecolate oxidase activity
            role_description: Pipecolate oxidation side route.
          - id: amaB_aldehyde_dehydrogenase
            label: AmaB aldehyde dehydrogenase context
            participant:
              selector_type: GENE
              gene:
                preferred_term: amaB
            function:
              preferred_term: aldehyde dehydrogenase (NAD+) activity
              term:
                id: GO:0004029
                label: aldehyde dehydrogenase (NAD+) activity
            role_description: Aldehyde oxidation context in the pipecolate/D-lysine side route.
    - order: 5
      role: aminoadipate and broad side-node context
      node:
        id: aminoadipate_and_spillover_context
        label: Aminoadipate, beta-oxidation, thiolase, and lipoamide spillovers
        module_type: METABOLIC_PATHWAY
        description: >-
          KEGG ppu00310 pulls in aminoadipate aminotransferase, hglS,
          beta-oxidation enzymes, thiolases, aldehyde dehydrogenases, and
          lipoamide dehydrogenases. These should not be used to satisfy the
          strict Dav route without direct gene-level support.
        annotons:
          - id: aminoadipate_transaminase_context
            label: 2-aminoadipate transaminase context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: L-2-aminoadipate:2-oxoglutarate transaminase activity
                term:
                  id: GO:0047536
                  label: L-2-aminoadipate:2-oxoglutarate transaminase activity
            function:
              preferred_term: L-2-aminoadipate:2-oxoglutarate transaminase activity
              term:
                id: GO:0047536
                label: L-2-aminoadipate:2-oxoglutarate transaminase activity
            role_description: Aminoadipate side-pathway context.
          - id: generic_thiolase_boundary
            label: thiolase boundary context
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: acetyl-CoA C-acetyltransferase activity
                term:
                  id: GO:0003985
                  label: acetyl-CoA C-acetyltransferase activity
            function:
              preferred_term: acetyl-CoA C-acetyltransferase activity
              term:
                id: GO:0003985
                label: acetyl-CoA C-acetyltransferase activity
            role_description: Generic thiolase/acyl-CoA side context in the KEGG map.
