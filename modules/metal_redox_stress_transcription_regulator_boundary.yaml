notes: This is a regulator-family boundary rather than one satisfiable pathway. The first pass accepts DNA-binding transcription
  regulator activity where GOA and HTH/domain context agree, keeps metal, cofactor, stress, localization, and direction annotations
  as non-core context, and does not infer specific ligands or regulons for generic paralogs.
