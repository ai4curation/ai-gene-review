id: MODULE:pyruvate_metabolism_boundary
title: Pyruvate metabolism boundary
description: >-
  Boundary module for KEGG ppu00620 in Pseudomonas putida KT2440. The
  organism-specific KEGG map mixes pyruvate-forming and pyruvate-consuming
  central-carbon reactions, pyruvate dehydrogenase/lipoate complexes,
  acetate/acetyl-CoA routes, lactate and methylglyoxal/glyoxalase side routes,
  malate/oxaloacetate/TCA overlap, amino-acid precursor spillovers, and
  alcohol/aldehyde dehydrogenase side nodes. This module preserves that broad
  curation boundary without treating the complete KEGG membership as one
  satisfiable linear pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00620
    title: Pyruvate metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00620 provides the PSEPK curation batch. Its membership contains
      direct pyruvate-node enzymes plus many overlapping central-carbon,
      lipoamide-complex, acetate, lactate, glyoxalase, thiolase, and
      alcohol/aldehyde dehydrogenase side nodes.
module:
  id: pyruvate_metabolism_boundary
  label: Pyruvate metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: pyruvate metabolic process
      description: Broad central-carbon context for reactions forming, consuming, or adjacent to pyruvate.
    - preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
      term:
        id: GO:0004739
        label: pyruvate dehydrogenase (acetyl-transferring) activity
      description: Pyruvate oxidative decarboxylation to acetyl-CoA via the pyruvate dehydrogenase complex.
    - preferred_term: pyruvate carboxylase activity
      term:
        id: GO:0004736
        label: pyruvate carboxylase activity
      description: Anaplerotic pyruvate-to-oxaloacetate chemistry at the pyruvate/OAA node.
    - preferred_term: glyoxalase detoxification side route
      description: Methylglyoxal detoxification through glyoxalase I and II, included by KEGG as a pyruvate-map side route.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most soluble central-carbon enzymes in this batch act in the bacterial cytoplasm.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Several quinoprotein or flavoprotein dehydrogenase side nodes are membrane-associated.
  parts:
    - order: 1
      role: Direct pyruvate and phosphoenolpyruvate node
      node:
        id: direct_pyruvate_pep_node
        label: Direct pyruvate and PEP node
        module_type: METABOLIC_PATHWAY
        description: >-
          Pyruvate kinase, phosphoenolpyruvate synthase, phosphoenolpyruvate
          carboxylase, malic enzyme, and pyruvate carboxylase connect pyruvate
          with PEP, oxaloacetate, malate, and gluconeogenic or anaplerotic
          central-carbon flux.
        annotons:
          - id: pyk_pyruvate_kinase_context
            label: "pyk: pyruvate kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pyk
            function:
              preferred_term: pyruvate kinase activity
              term:
                id: GO:0004743
                label: pyruvate kinase activity
            role_description: PEP-to-pyruvate lower-central-carbon step.
          - id: ppsA_phosphoenolpyruvate_synthase_context
            label: "ppsA: phosphoenolpyruvate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ppsA
            role_description: Pyruvate-to-PEP gluconeogenic side of the pyruvate node.
          - id: pycAB_pyruvate_carboxylase_context
            label: "pycA/pycB: pyruvate carboxylase candidate"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: pyruvate carboxylase activity
                term:
                  id: GO:0004736
                  label: pyruvate carboxylase activity
            function:
              preferred_term: pyruvate carboxylase activity
              term:
                id: GO:0004736
                label: pyruvate carboxylase activity
            role_description: Anaplerotic conversion of pyruvate to oxaloacetate.
    - order: 2
      role: Pyruvate to acetyl-CoA and acetate boundary
      node:
        id: pyruvate_acetyl_coa_acetate_boundary
        label: Pyruvate, acetyl-CoA, and acetate boundary
        module_type: METABOLIC_PATHWAY
        concepts:
          - preferred_term: pyruvate dehydrogenase complex
            term:
              id: GO:0045254
              label: pyruvate dehydrogenase complex
        description: >-
          The KEGG map includes pyruvate dehydrogenase E1/E2, candidate E3
          lipoamide dehydrogenases, phosphate acetyltransferase, acetyl-CoA
          synthetases, and acetoin-cleavage/lipoate-complex paralogs. These are
          related through acetyl-CoA and lipoamide chemistry but are not one
          single route.
        annotons:
          - id: aceE_pyruvate_dehydrogenase_e1
            label: "aceE: pyruvate dehydrogenase E1"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aceE
            function:
              preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
              term:
                id: GO:0004739
                label: pyruvate dehydrogenase (acetyl-transferring) activity
            role_description: E1 component initiating pyruvate oxidative decarboxylation.
          - id: aceF_pyruvate_dehydrogenase_e2
            label: "aceF: pyruvate dehydrogenase E2"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aceF
            role_description: E2 acetyltransferase component of pyruvate dehydrogenase.
          - id: acsA_acetyl_coa_synthetase_context
            label: "acsA1/acsA2: acetyl-CoA synthetases"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: acetyl-CoA synthetase activity
                term:
                  id: GO:0003987
                  label: acetyl-CoA synthetase activity
            function:
              preferred_term: acetyl-CoA synthetase activity
              term:
                id: GO:0003987
                label: acetyl-CoA synthetase activity
            role_description: Acetate-to-acetyl-CoA side context adjacent to pyruvate-derived acetyl-CoA.
    - order: 3
      role: Lactate and methylglyoxal side routes
      node:
        id: lactate_and_glyoxalase_side_routes
        label: Lactate and glyoxalase side routes
        module_type: METABOLIC_PATHWAY
        description: >-
          ldhA/lldD/dld2 and gloA/gloB represent lactate interconversion and
          methylglyoxal detoxification branches that are adjacent to pyruvate
          metabolism but should be curated as distinct side routes.
        annotons:
          - id: ldhA_lactate_dehydrogenase_context
            label: "ldhA: lactate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ldhA
            function:
              preferred_term: L-lactate dehydrogenase (NAD+) activity
              term:
                id: GO:0004459
                label: L-lactate dehydrogenase (NAD+) activity
            role_description: Lactate/pyruvate redox side node.
          - id: gloA_glyoxalase_I
            label: "gloA: glyoxalase I"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gloA
            function:
              preferred_term: lactoylglutathione lyase activity
              term:
                id: GO:0004462
                label: lactoylglutathione lyase activity
            role_description: First step of methylglyoxal detoxification to S-lactoylglutathione.
          - id: gloB_glyoxalase_II
            label: "gloB: glyoxalase II"
            participant:
              selector_type: GENE
              gene:
                preferred_term: gloB
            function:
              preferred_term: hydroxyacylglutathione hydrolase activity
              term:
                id: GO:0004416
                label: hydroxyacylglutathione hydrolase activity
            role_description: Hydrolyzes S-lactoylglutathione in the glyoxalase pathway.
    - order: 4
      role: KEGG overlap and low-specificity side nodes
      node:
        id: pyruvate_map_overlap_side_nodes
        label: Pyruvate-map overlap and side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          The remaining ppu00620 members include glyoxylate/TCA overlap
          enzymes, malate dehydrogenases, fumarases, acetyl-CoA/fatty-acid
          thiolases, alcohol/aldehyde dehydrogenases, and several unresolved
          enzyme-family candidates. Their gene-level reviews should preserve
          more specific pathway assignments where available instead of forcing
          all annotations into pyruvate metabolism.
  notes: >-
    This module is intentionally a boundary scaffold. It supports batch review
    of all KEGG ppu00620 members while avoiding over-annotation of shared
    central-carbon, lipid, lipoate, lactate, methylglyoxal, and aromatic/alcohol
    side-node enzymes as dedicated pyruvate-pathway components.
