notes: >-
  This boundary module was seeded from C33 and extended with C39 of the ppu02010
  partition. It should remain separate from glucose_import_boundary because the
  PP_2454-PP_2456 and PP_2758-PP_2761 transporters are ribose-specific or
  ribose-like, whereas PP_1015-PP_1018 is the Gts glucose uptake system. Current
  first-pass evidence supports PP_2758/rbsA/PP_2760/PP_2761 as a second
  D-ribose ABC importer, but PP_2757 remains an adjacent unresolved
  sugar-binding protein whose ligand and chemotaxis relationship require
  experimental testing.
