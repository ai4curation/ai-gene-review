id: MODULE:ribose_import_boundary
title: Ribose import boundary
description: >-
  Boundary module for two ribose-like ABC importer loci in Pseudomonas putida
  KT2440. PP_2454-PP_2456 encodes a predicted Rbs D-ribose ABC importer with
  the nearby PP_2459 RbsD D-ribose pyranase accessory enzyme, while
  PP_2758-PP_2761 encodes a reviewed-UniProt-supported RbsABC D-ribose importer.
  PP_2757 is an adjacent cell-envelope sugar-binding protein whose ligand and
  relationship to the PP_2758-PP_2761 transporter remain unresolved.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02010
    title: ABC transporters - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02010 contributes the PP_2454-PP_2459 and PP_2757-PP_2761
      ribose-like ABC-transporter sub-batches. These are coherent
      ribose-import/utilization partitions of the broad ABC transporter map, not
      evidence that ppu02010 is one satisfiable pathway.
  - source_id: KEGG:ppu02030
    title: Bacterial chemotaxis - Pseudomonas putida KT2440
    statement: >-
      PP_2757 and PP_2758 also appear in KEGG ppu02030. This supports treating
      the two solute-binding proteins as a chemotaxis-adjacent boundary case,
      not as evidence that both have identical ribose-import roles.
  - source_id: file:projects/P_PUTIDA/batches/ppu02010_abc_transporters_boundary.tsv
    title: PSEPK ppu02010 ABC-transporter partition batch
    statement: >-
      The ppu02010 partition batch records C33 as the PP_2454-PP_2459
      rbsB/rbsA-I/rbsC/rbsD sugar/polyol transporter block and C39 as the
      PP_2757-PP_2761 ribose-like sugar/polyol block.
  - source_id: UniProtKB:Q88K38
    title: RbsB ribose ABC transporter periplasmic ribose-binding subunit
    statement: >-
      UniProt names RbsB as a ribose ABC transporter periplasmic ribose-binding
      subunit and assigns it to a bacterial solute-binding protein family.
  - source_id: UniProtKB:Q88K37
    title: RbsA-I ribose ABC transporter ATP-binding subunit
    statement: >-
      UniProt names RbsA-I as a ribose ABC transporter ATP-binding subunit,
      places it at the cell inner membrane/cell membrane, and assigns ABC
      carbohydrate-import ATPase domains.
  - source_id: UniProtKB:Q88K36
    title: RbsC D-ribose ABC transporter permease subunit
    statement: >-
      UniProt names RbsC as a D-ribose ABC transporter permease subunit and
      places it in the AraH/RbsC subfamily of binding-protein-dependent
      transport-system permeases.
  - source_id: UniProtKB:Q88K33
    title: RbsD D-ribose pyranase
    statement: >-
      Reviewed UniProt/HAMAP annotation describes RbsD as a cytoplasmic
      D-ribose pyranase catalyzing beta-D-ribopyranose/beta-D-ribofuranose
      interconversion in D-ribose degradation.
  - source_id: UniProtKB:Q88J92
    title: PP_2757 sugar-binding protein
    statement: >-
      UniProt names PP_2757 as a sugar-binding protein, places it in the cell
      envelope, and assigns it to the bacterial solute-binding protein 2 family;
      the specific ligand is not resolved.
  - source_id: UniProtKB:Q88J91
    title: PP_2758 ribose ABC transporter periplasmic ribose-binding protein
    statement: >-
      UniProt names PP_2758 as a ribose ABC transporter periplasmic
      ribose-binding protein and places it in the cell envelope.
  - source_id: UniProtKB:Q88J90
    title: RbsA ribose import ATP-binding protein
    statement: >-
      Reviewed UniProt/HAMAP annotation describes RbsA as part of the RbsABC
      transporter complex involved in ribose import, responsible for energy
      coupling, with EC 7.5.2.7.
  - source_id: UniProtKB:Q88J89
    title: PP_2760 ribose transport permease protein
    statement: >-
      UniProt names PP_2760 as a ribose transport permease protein and assigns
      it to the AraH/RbsC subfamily of binding-protein-dependent transport
      system permeases.
  - source_id: UniProtKB:Q88J88
    title: PP_2761 ribose ABC transporter permease protein
    statement: >-
      UniProt names PP_2761 as a ribose ABC transporter permease protein and
      assigns it to the AraH/RbsC subfamily of binding-protein-dependent
      transport system permeases.
