            role_description: Reattaches recycled L-Ala-gamma-D-Glu-meso-DAP tripeptide to UDP-MurNAc.
    - order: 3
      role: Lipid carrier and lipid-linked precursor assembly
      node:
        id: lipid_linked_peptidoglycan_precursor_assembly
        label: Lipid-linked peptidoglycan precursor assembly
        module_type: METABOLIC_PATHWAY
        description: >-
          UppS/UppP provide and recycle the undecaprenyl carrier, while MraY and
