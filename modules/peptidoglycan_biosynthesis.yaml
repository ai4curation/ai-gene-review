id: MODULE:peptidoglycan_biosynthesis
title: Peptidoglycan biosynthesis
description: >-
  Species-neutral first-pass module for the Pseudomonas putida KT2440 KEGG
  ppu00550 peptidoglycan biosynthesis batch. The module separates cytosolic
  UDP-MurNAc-peptide precursor assembly, MurNAc/muropeptide recycling and
  salvage, lipid-linked precursor assembly, lipid II flipping, glycan
  polymerization, D,D-transpeptidation, and carboxypeptidase/remodeling side
  nodes, plus additional peptidoglycan turnover and cell-wall remodeling
  candidates from the cell-envelope/division functional partition. It also
  records that MurJ is an expected lipid II flippase candidate even though it is
  not in the KEGG ppu00550 membership table.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00550
    title: Peptidoglycan biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00550 provides the primary PSEPK curation batch. Its membership
      includes MurA/B/C/D/E/F cytosolic precursor enzymes, DdlA/DdlB,
      MraY/MurG lipid-linked precursor enzymes, undecaprenyl carrier enzymes,
      SEDS-family polymerases, and multiple penicillin-binding proteins.
  - source_id: UniPathway:UPA00219
    title: Peptidoglycan biosynthesis
    statement: >-
      UniPathway UPA00219 supplies additional peptidoglycan-route context,
      including MurJ/lipid II flipping, the standalone ddl paralog, and
      L,D-transpeptidase-like remodeling candidates that are not all KEGG
      ppu00550 primary members for this organism-specific batch.
  - source_id: file:PSEPK/ddl/ddl-ai-review.yaml
    title: PSEPK ddl gene review
    statement: >-
      The curated ddl review supports cytoplasmic D-alanine-D-alanine ligase
      activity as an additional UPA00219 Ddl-family paralog.
  - source_id: file:PSEPK/PP_1451/PP_1451-ai-review.yaml
    title: PSEPK PP_1451 gene review
    statement: >-
      The curated PP_1451 review supports a predicted signal-peptide-bearing
      YkuD/L,D-transpeptidase-family enzyme in peptidoglycan biosynthesis or
      remodeling context.
  - source_id: UniPathway:UPA00544
    title: Peptidoglycan recycling
    statement: >-
      UniPathway UPA00544 supplies the MurNAc/anhMurNAc and muropeptide salvage
      route. In PSEPK, NagZ, AnmK, MupP, AmgK, MurU, and Mpl return
      peptidoglycan turnover products to UDP-MurNAc and UDP-MurNAc-peptide
      precursor supply.
  - source_id: file:projects/P_PUTIDA/batches/module_cell_envelope_division_peptidoglycan_turnover_remodeling_candidates.tsv
    title: PSEPK cell-envelope peptidoglycan turnover/remodeling partition batch
    statement: >-
      The cell-envelope/division partition contributes 11 additional
      peptidoglycan turnover and remodeling candidates: amiD, ampD,
      rlpA/Q88PC1, mltF, PP_1325, PP_2147, PP_3562, pbpG, rlpA/Q88DM1,
      PP_4971, and PP_5354.
  - source_id: file:projects/P_PUTIDA/curate_cell_envelope_peptidoglycan_turnover_first_pass.py
    title: First-pass curation helper for peptidoglycan turnover/remodeling candidates
    statement: >-
      The helper records accession-disambiguated first-pass curation decisions
      for the 11 cell-envelope peptidoglycan turnover/remodeling candidates,
      using local UniProt, GOA, and Asta evidence.
module:
  id: peptidoglycan_biosynthesis
  label: Peptidoglycan biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: Overall bacterial peptidoglycan precursor synthesis, export, polymerization, and cross-linking.
    - preferred_term: cell wall organization
      term:
        id: GO:0071555
        label: cell wall organization
      description: Cell-wall assembly and remodeling context.
    - preferred_term: peptidoglycan turnover
      term:
        id: GO:0009254
        label: peptidoglycan turnover
      description: Recycling and salvage of cell-wall turnover products back into peptidoglycan precursor metabolism.
    - preferred_term: N-acetylmuramoyl-L-alanine amidase activity
      term:
        id: GO:0008745
        label: N-acetylmuramoyl-L-alanine amidase activity
      description: AmiD/AmpD-family cleavage of MurNAc-L-Ala amide bonds in peptidoglycan or muropeptide turnover.
    - preferred_term: lytic endotransglycosylase activity
      term:
        id: GO:0008932
        label: lytic endotransglycosylase activity
      description: RlpA/Mlt-family lytic transglycosylase chemistry for peptidoglycan glycan-strand cleavage.
    - preferred_term: regulation of cell shape
      term:
        id: GO:0008360
        label: regulation of cell shape
      description: Downstream shape and elongation/septation context for peptidoglycan synthesis.
    - preferred_term: peptidoglycan glycosyltransferase activity
      term:
        id: GO:0008955
        label: peptidoglycan glycosyltransferase activity
      description: Glycan-strand polymerase activity in PBPs and SEDS-family polymerases.
    - preferred_term: serine-type D-Ala-D-Ala carboxypeptidase activity
      term:
        id: GO:0009002
        label: serine-type D-Ala-D-Ala carboxypeptidase activity
      description: PBP transpeptidase/carboxypeptidase family activity used by GOA for several PBPs.
    - preferred_term: peptidoglycan L,D-transpeptidase activity
      term:
        id: GO:0071972
        label: peptidoglycan L,D-transpeptidase activity
      description: YkuD-family L,D-transpeptidase chemistry used in alternative peptidoglycan cross-linking or remodeling.
    - preferred_term: penicillin binding
      term:
        id: GO:0008658
        label: penicillin binding
      description: PBP beta-lactam-binding context; useful but not itself the biosynthetic chemistry.
    - preferred_term: enzyme regulator activity
      term:
        id: GO:0030234
        label: enzyme regulator activity
      description: LpoA-family PBP regulator/activator context represented by PP_1325.
    - preferred_term: peptidoglycan binding
      term:
        id: GO:0042834
        label: peptidoglycan binding
      description: Peptidoglycan-binding context for CsiV/SPOR-like remodeling candidates.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Cytosolic Mur and Ddl enzymes build UDP-MurNAc-peptide precursors.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: MraY, MurG, MurJ, SEDS polymerases, and PBPs are membrane-associated.
      - preferred_term: outer membrane-bounded periplasmic space
        term:
          id: GO:0030288
          label: outer membrane-bounded periplasmic space
        description: Periplasmic PBP catalytic domains remodel and cross-link peptidoglycan.
      - preferred_term: cell outer membrane
        term:
          id: GO:0009279
          label: cell outer membrane
        description: Outer-membrane lipoprotein and lytic transglycosylase candidates act from the envelope surface/periplasmic side.
  parts:
    - order: 1
      role: Cytosolic UDP-MurNAc-peptide precursor assembly
      node:
        id: cytosolic_udp_murnac_peptide_assembly
        label: Cytosolic UDP-MurNAc-peptide precursor assembly
        module_type: METABOLIC_PATHWAY
        description: >-
          MurA/MurB form UDP-MurNAc from UDP-GlcNAc; MurC/MurD/MurE/MurF and
          DdlA/DdlB assemble the stem peptide and D-Ala-D-Ala dipeptide.
        annotons:
          - id: murA_udp_glcnac_enolpyruvyl_transferase
            label: "murA: UDP-N-acetylglucosamine 1-carboxyvinyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murA
            function:
              preferred_term: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
              term:
                id: GO:0008760
                label: UDP-N-acetylglucosamine 1-carboxyvinyltransferase activity
            role_description: First committed de novo UDP-MurNAc precursor step.
          - id: murB_udp_n_acetylmuramate_dehydrogenase
            label: "murB: UDP-N-acetylmuramate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murB
            function:
              preferred_term: UDP-N-acetylmuramate dehydrogenase activity
              term:
                id: GO:0008762
                label: UDP-N-acetylmuramate dehydrogenase activity
            role_description: Reduces the MurA product to UDP-MurNAc.
          - id: murC_udp_murnac_l_alanine_ligase
            label: "murC: UDP-N-acetylmuramate--L-alanine ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murC
            role_description: Adds L-alanine to UDP-MurNAc.
          - id: murD_udp_murnac_alanine_d_glutamate_ligase
            label: "murD: UDP-N-acetylmuramoylalanine-D-glutamate ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murD
            function:
              preferred_term: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
              term:
                id: GO:0008764
                label: UDP-N-acetylmuramoylalanine-D-glutamate ligase activity
            role_description: Adds D-glutamate to the peptidoglycan stem precursor.
          - id: murE_meso_dap_ligase
            label: "murE: meso-diaminopimelate-adding ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murE
            function:
              preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
              term:
                id: GO:0008765
                label: UDP-N-acetylmuramoylalanyl-D-glutamate-2,6-diaminopimelate ligase activity
            role_description: Adds meso-diaminopimelate to the stem peptide.
          - id: murF_d_ala_d_ala_ligase
            label: "murF: D-Ala-D-Ala-adding ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murF
            function:
              preferred_term: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
              term:
                id: GO:0008766
                label: UDP-N-acetylmuramoylalanyl-D-glutamyl-2,6-diaminopimelate-D-alanyl-D-alanine ligase activity
            role_description: Completes the UDP-MurNAc-pentapeptide precursor.
          - id: ddlA_d_alanine_d_alanine_ligase
            label: "ddlA: D-alanine-D-alanine ligase A"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlA
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            role_description: Forms D-Ala-D-Ala for MurF.
          - id: ddlB_d_alanine_d_alanine_ligase
            label: "ddlB: D-alanine-D-alanine ligase B"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddlB
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            role_description: Second D-Ala-D-Ala ligase paralog.
          - id: ddl_d_alanine_d_alanine_ligase
            label: "ddl: D-alanine-D-alanine ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ddl
            function:
              preferred_term: D-alanine-D-alanine ligase activity
              term:
                id: GO:0008716
                label: D-alanine-D-alanine ligase activity
            role_description: Third Ddl-family paralog from UPA00219; forms D-Ala-D-Ala for MurF-dependent pentapeptide synthesis.
    - order: 2
      role: MurNAc and muropeptide recycling/salvage
      node:
        id: peptidoglycan_recycling_salvage
        label: Peptidoglycan recycling and precursor salvage
        module_type: METABOLIC_PATHWAY
        description: >-
          NagZ, AnmK, MupP, AmgK, MurU, and Mpl connect muropeptide and MurNAc
          turnover products to UDP-MurNAc and UDP-MurNAc-peptide precursor
          supply. This salvage arm is distinct from de novo MurA/MurB/MurC-F
          precursor synthesis but feeds the same lipid-linked precursor route.
        annotons:
          - id: nagZ_beta_hexosaminidase_recycling
            label: "nagZ: beta-N-acetylhexosaminidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: nagZ
            function:
              preferred_term: beta-N-acetylhexosaminidase activity
              term:
                id: GO:0004563
                label: beta-N-acetylhexosaminidase activity
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Removes GlcNAc from peptidoglycan turnover products during recycling.
          - id: anmK_anhydromurnac_kinase_recycling
            label: "anmK: anhydro-N-acetylmuramic acid kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: anmK
            function:
              preferred_term: phosphotransferase activity, alcohol group as acceptor
              term:
                id: GO:0016773
                label: phosphotransferase activity, alcohol group as acceptor
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Phosphorylates 1,6-anhydro-N-acetylmuramic acid in the recycling route.
          - id: mupP_murnac_6_phosphate_phosphatase_recycling
            label: "mupP: MurNAc-6-phosphate phosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mupP
            function:
              preferred_term: phosphatase activity
              term:
                id: GO:0016791
                label: phosphatase activity
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Dephosphorylates MurNAc-6P to MurNAc in the Pseudomonas recycling shortcut.
          - id: amgK_anomeric_murnac_glcnac_kinase_recycling
            label: "amgK: MurNAc/GlcNAc anomeric sugar kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: amgK
            function:
              preferred_term: carbohydrate kinase activity
              term:
                id: GO:0019200
                label: carbohydrate kinase activity
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Generates MurNAc-alpha-1-phosphate for MurU-dependent UDP-MurNAc salvage.
          - id: murU_murnac_1p_uridylyltransferase_recycling
            label: "murU: MurNAc-alpha-1-phosphate uridylyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: murU
            function:
              preferred_term: uridylyltransferase activity
              term:
                id: GO:0070569
                label: uridylyltransferase activity
            processes:
              - preferred_term: peptidoglycan turnover
                term:
                  id: GO:0009254
                  label: peptidoglycan turnover
            role_description: Converts recycled MurNAc-alpha-1-phosphate to UDP-MurNAc.
          - id: mpl_murein_peptide_ligase_recycling
            label: "mpl: murein peptide ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mpl
