notes: 'Curation recommendations: use FMN reductase (NADPH) activity as the core MF for PP_1927 and arsH, and treat arsenical-resistance
  specificity as context until substrate evidence is stronger. Add conservative oxidoreductase activity and arsenic-response
  process context for PP_1928 and PP_2716; do not invent a specific arsenate reductase GO term in this first pass. Keep copB-I,
  copB-II, copA-I, and copA-II as cell-envelope copper-resistance proteins; CopA is not a P-type copper ATPase in this locus
  context. Open questions: which arsenic and copper species are the physiological substrates for each duplicated ArsH/ArsC-like
  and CopAB pair, and are the two arsenical-resistance loci and two copAB loci differentially induced by arsenate, arsenite,
  organoarsenicals, or copper?'
