id: MODULE:metal_resistance_detoxification_boundary
title: Metal resistance detoxification boundary
description: Boundary module for the Pseudomonas putida KT2440 arsenic/copper resistance split from the stress/detoxification
  functional bucket. The module groups two ArsH FMN reductases, two low-molecular-weight arsenate reductase candidates, and
  two CopA/CopB copper-resistance pairs. It is curated as metal-resistance and cell-envelope detoxification context, not as
  a generic oxidative-stress module.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_arsenic_copper_metal_resistance.tsv
  title: PSEPK stress/detoxification arsenic-copper metal-resistance split
  statement: 'The batch table records eight PSEPK stress/detoxification genes assigned to the arsenic/copper metal-resistance
    split: PP_1927, PP_1928, copB-I, copA-I, arsH, PP_2716, copB-II, and copA-II.'
- source_id: file:projects/P_PUTIDA/batches/module_stress_detoxification_partition.tsv
  title: PSEPK stress/detoxification functional-bucket partition
  statement: The stress/detoxification umbrella was partitioned into peroxide/peroxiredoxin, glutathione/thiol, arsenic/copper
    metal resistance, universal-stress-protein, cold/heat-shock, ThiJ/DJ-1/PfpI, and miscellaneous stress-regulatory splits.
