id: MODULE:de_novo_pyrimidine_synthesis
title: De novo pyrimidine synthesis (glutamine -> UMP); orotic aciduria, Miller syndrome, CAD-DEE
description: >-
  De novo pyrimidine biosynthesis is the six-step pathway that builds uridine
  monophosphate (UMP) — the parent pyrimidine ribonucleotide from which CTP, UTP, dTTP
  and the other pyrimidines derive — from glutamine, bicarbonate, ATP, aspartate and
  PRPP. Unlike de novo purine synthesis, the ring is assembled first and only attached
  to ribose-phosphate at the fifth step. The large multifunctional cytosolic protein CAD
  performs the first three steps: carbamoyl-phosphate synthetase II (glutamine + 2 ATP +
  HCO3- -> carbamoyl phosphate; the cytosolic pyrimidine CPS, distinct from the
  mitochondrial urea-cycle CPS1), aspartate transcarbamylase (-> N-carbamoyl-aspartate)
  and dihydroorotase (-> dihydroorotate). Dihydroorotate dehydrogenase (DHODH) — the only
  membrane-bound, mitochondrial step — then oxidises dihydroorotate to orotate using FMN
  and ubiquinone, coupling pyrimidine synthesis to the respiratory chain. Finally the
  bifunctional UMP synthase (UMPS) attaches PRPP (orotate phosphoribosyltransferase ->
  OMP) and decarboxylates OMP to UMP. Inherited defects: UMPS deficiency causes hereditary
  orotic aciduria (megaloblastic anemia, uridine-responsive); DHODH deficiency causes
  Miller syndrome (postaxial acrofacial dysostosis); and CAD deficiency causes a
  uridine-responsive developmental and epileptic encephalopathy. DHODH is the target of
  the immunosuppressant leflunomide/teriflunomide.
status: DRAFT
evidence:
  - source_id: GO:0044205
    title: "'de novo' UMP biosynthetic process"
    statement: >-
      The module is grounded in the GO 'de novo' UMP biosynthetic process (GO:0044205):
      the six-step assembly of UMP from glutamine/bicarbonate/aspartate/PRPP.
  - source_id: Reactome:R-HSA-500753
    title: Pyrimidine biosynthesis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome pyrimidine
      biosynthesis reactions R-HSA-73577/73573/73571 (CAD), R-HSA-73569 (DHODH) and
      R-HSA-73567/73564 (UMPS).
  - source_id: file:human/CAD/CAD-ai-review.yaml
    title: CAD gene review (human)
    statement: >-
      The multifunctional first three steps (UniProtKB:P27708, GO:0004088/GO:0004070/GO:0004151)
      match the completed human CAD review.
  - source_id: file:human/DHODH/DHODH-ai-review.yaml
    title: DHODH gene review (human)
    statement: >-
      The mitochondrial dihydroorotate-dehydrogenase step (UniProtKB:Q02127, GO:0004152)
      matches the completed human DHODH review.
  - source_id: file:human/UMPS/UMPS-ai-review.yaml
    title: UMPS gene review (human)
    statement: >-
      The bifunctional final two steps (UniProtKB:P11172, GO:0004588/GO:0004590) match
      the completed human UMPS review.
module:
  id: de_novo_pyrimidine_synthesis
  label: De novo pyrimidine synthesis (-> UMP)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: "'de novo' UMP biosynthetic process"
      term:
        id: GO:0044205
        label: "'de novo' UMP biosynthetic process"
      description: >-
        Six-step assembly of uridine monophosphate (UMP) from glutamine, bicarbonate,
        aspartate and PRPP.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          CAD and UMPS are cytosolic; DHODH is the exception, on the inner mitochondrial
          membrane.
  parts:
    - order: 1
      role: first three committed steps (CPS II / ATCase / dihydroorotase)
      node:
        id: cad_step
        label: L-glutamine + HCO3- + ATP -> ... -> (S)-dihydroorotate
        module_type: REACTION
        annotons:
          - id: cad_activity
            label: "CAD: CPS II / aspartate transcarbamylase / dihydroorotase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Multifunctional CAD pyrimidine-biosynthesis family
                term:
                  id: PANTHER:PTHR11405
                  label: CARBAMOYL PHOSPHATE SYNTHETASE
                representative_members:
                  - preferred_term: CAD (human)
                    term:
                      id: UniProtKB:P27708
                      label: CAD protein (glutamine-dependent carbamoyl-phosphate synthase / aspartate carbamoyltransferase / dihydroorotase)
            function:
              preferred_term: carbamoyl-phosphate synthase (glutamine-hydrolyzing) activity
              term:
                id: GO:0004088
                label: carbamoyl-phosphate synthase (glutamine-hydrolyzing) activity
              substrates:
                - preferred_term: L-glutamine
                - preferred_term: bicarbonate (HCO3-)
                - preferred_term: ATP; then L-aspartate (ATCase step)
              products:
                - preferred_term: carbamoyl phosphate -> N-carbamoyl-L-aspartate
                - preferred_term: (S)-dihydroorotate
              evidence:
                - source_id: EC:6.3.5.5
                  statement: carbamoyl-phosphate synthase II (glutamine); also aspartate transcarbamylase EC 2.1.3.2 (GO:0004070) and dihydroorotase EC 3.5.2.3 (GO:0004151)
                - source_id: Reactome:R-HSA-73577
                  statement: "CAD hexamer transforms L-Gln to CAP (human Reactome reaction)"
                - source_id: Reactome:R-HSA-73573
                  statement: "CAD hexamer transforms CAP to N-carb-L-Asp (human Reactome reaction)"
                - source_id: Reactome:R-HSA-73571
                  statement: "CAD hexamer dehydrates N-carb-L-Asp to (S)-DHO (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Multifunctional hexameric enzyme carrying out the first three committed
              pyrimidine steps (cytosolic CPS II — distinct from the mitochondrial
              urea-cycle CPS1 — then ATCase and dihydroorotase). mTOR/MAPK-regulated;
              deficiency = uridine-responsive epileptic encephalopathy (DEE50).
    - order: 2
      role: oxidation of dihydroorotate to orotate (only mitochondrial step)
      node:
        id: dhodh_step
        label: (S)-dihydroorotate + ubiquinone to orotate + ubiquinol
        module_type: REACTION
        annotons:
          - id: dhodh_activity
            label: "DHODH: dihydroorotate dehydrogenase (quinone)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydroorotate dehydrogenase family (DHODH)
                term:
                  id: PANTHER:PTHR48109
                  label: DIHYDROOROTATE DEHYDROGENASE
                representative_members:
                  - preferred_term: DHODH (human)
                    term:
                      id: UniProtKB:Q02127
                      label: Dihydroorotate dehydrogenase (quinone), mitochondrial
            function:
              preferred_term: dihydroorotate dehydrogenase (quinone) activity
              term:
                id: GO:0106430
                label: dihydroorotate dehydrogenase (quinone) activity
              substrates:
                - preferred_term: (S)-dihydroorotate
                - preferred_term: ubiquinone
              products:
                - preferred_term: orotate
                - preferred_term: ubiquinol
              evidence:
                - source_id: EC:1.3.5.2
                  statement: dihydroorotate dehydrogenase (quinone); FMN flavoprotein; couples pyrimidine synthesis to the respiratory chain
                - source_id: Reactome:R-HSA-73569
                  statement: "DHODH:FMN oxidises (S)-DHO to orotate (human Reactome reaction)"
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            role_description: >-
              The only membrane-bound, mitochondrial pyrimidine-synthesis step: FMN/
              ubiquinone-dependent oxidation of dihydroorotate to orotate on the outer
              face of the inner membrane. Deficiency = Miller syndrome; target of
              leflunomide/teriflunomide.
    - order: 3
      role: final two steps (PRPP transfer + decarboxylation to UMP)
      node:
        id: umps_step
        label: orotate + PRPP -> OMP -> UMP + CO2
        module_type: REACTION
        annotons:
          - id: umps_activity
            label: "UMPS: bifunctional OPRT / OMP decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: UMP synthase family (UMPS)
                term:
                  id: PANTHER:PTHR19278
                  label: OROTATE PHOSPHORIBOSYLTRANSFERASE
                representative_members:
                  - preferred_term: UMPS (human)
                    term:
                      id: UniProtKB:P11172
                      label: Uridine 5'-monophosphate synthase
            function:
              preferred_term: orotate phosphoribosyltransferase activity
              term:
                id: GO:0004588
                label: orotate phosphoribosyltransferase activity
              substrates:
                - preferred_term: orotate
                - preferred_term: PRPP; then OMP (decarboxylase step)
              products:
                - preferred_term: orotidine-5'-monophosphate (OMP)
                - preferred_term: UMP + CO2
              evidence:
                - source_id: EC:2.4.2.10
                  statement: orotate phosphoribosyltransferase; also orotidine-5'-phosphate decarboxylase EC 4.1.1.23 (GO:0004590)
                - source_id: Reactome:R-HSA-73567
                  statement: "UMPS dimer transfers phosphoribosyl group to ORO to form OMP (human Reactome reaction)"
                - source_id: Reactome:R-HSA-73564
                  statement: "UMPS dimer decarboxylates OMP to UMP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Bifunctional enzyme attaching PRPP to orotate (OPRT -> OMP) then
              decarboxylating OMP to UMP, the parent pyrimidine ribonucleotide. Deficiency
              = hereditary orotic aciduria (uridine-responsive megaloblastic anemia).
  connections:
    - source: cad_step
      target: dhodh_step
      connection_type: PROVIDES_INPUT_FOR
      description: The (S)-dihydroorotate from CAD is oxidised to orotate by DHODH.
    - source: dhodh_step
      target: umps_step
      connection_type: PROVIDES_INPUT_FOR
      description: The orotate from DHODH is converted to UMP by UMPS.
  notes: >-
    Six-step de novo pyrimidine (UMP) synthesis grounded to the human enzymes CAD
    (UniProtKB:P27708; GO:0004088/GO:0004070/GO:0004151; EC 6.3.5.5 / 2.1.3.2 / 3.5.2.3),
    DHODH (Q02127; GO:0106430/GO:0004152; EC 1.3.5.2) and UMPS (P11172;
    GO:0004588/GO:0004590; EC 2.4.2.10 / 4.1.1.23). GO molecular-function terms were taken
    from the human GOA records; Reactome reaction ids and titles were verified against the
    local reactome cache. Each node uses a PANTHER family selector (generic over orthologs)
    with the human enzyme as representative; only the first activity of each multifunctional
    enzyme is placed in the annoton `function` slot, with additional activities/EC numbers in
    the evidence and role_description. The pathway is compartment-split: CAD and UMPS are
    cytosolic while DHODH sits on the inner mitochondrial membrane (its ubiquinone electron
    acceptor links pyrimidine synthesis to the respiratory chain — hence DHODH-inhibitor
    sensitivity to ETC status). Upstream, PRPP comes from PRPS1 (pentose_phosphate module);
    downstream, UMP is phosphorylated and aminated to the other pyrimidine nucleotides (CTP,
    UTP, dTTP) by salvage/interconversion enzymes (not modelled here). CAD's cytosolic CPS II
    must not be confused with the mitochondrial urea-cycle CPS1 (carbamoyl phosphate for
    citrulline). Disorders: UMPS -> hereditary orotic aciduria; DHODH -> Miller syndrome;
    CAD -> developmental and epileptic encephalopathy 50 (all uridine-responsive where treated).
