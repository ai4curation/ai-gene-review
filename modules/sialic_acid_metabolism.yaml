id: MODULE:sialic_acid_metabolism
title: Sialic acid (N-acetylneuraminate) metabolism (biosynthesis, activation, transport, catabolism)
description: >-
  Sialic acids (in humans chiefly N-acetylneuraminate, Neu5Ac) are the negatively charged nine-carbon
  sugars that cap most cell-surface and secreted glycoconjugates, governing cell-cell recognition, receptor
  masking, serum-protein half-life and pathogen interactions. Their metabolism forms a compact cytosol-to-
  organelle pathway. Biosynthesis starts with the bifunctional, feedback-controlled enzyme GNE, whose
  epimerase domain converts UDP-N-acetylglucosamine to N-acetylmannosamine (ManNAc) and whose kinase domain
  phosphorylates ManNAc to ManNAc-6-phosphate. The sialic-acid synthase NANS then condenses ManNAc-6-P with
  phosphoenolpyruvate to N-acetylneuraminate-9-phosphate, which the HAD phosphatase NANP dephosphorylates to
  free Neu5Ac. In the nucleus, CMAS activates Neu5Ac with CTP to the sugar-nucleotide donor CMP-Neu5Ac; the
  Golgi antiporter SLC35A1 imports CMP-Neu5Ac into the Golgi lumen (in exchange for CMP) to supply the
  sialyltransferases that decorate glycans. CMP-Neu5Ac feedback-inhibits GNE, keeping flux matched to demand.
  On the catabolic side, the lysosomal sialidase NEU1 (acting within the CTSA/GLB1 lysosomal multienzyme
  complex) removes terminal sialic acids from glycoconjugates during turnover, and the cytosolic aldolase NPL
  cleaves free Neu5Ac to ManNAc + pyruvate, recycling the amino sugar. Inherited defects at nearly every step
  cause disease: GNE myopathy and sialuria (GNE), NANS-CDG, SLC35A1-CDG (CDG-IIf), sialidosis (NEU1) and an
  NPL-related myopathy — several of which are amenable to ManNAc / sialic-acid supplementation.
status: DRAFT
evidence:
  - source_id: GO:0046380
    title: N-acetylneuraminate biosynthetic process
    statement: GNE, NANS, NANP and CMAS carry out sialic acid (Neu5Ac) biosynthesis and activation (GO:0046380).
  - source_id: GO:0019262
    title: N-acetylneuraminate catabolic process
    statement: NEU1 and NPL carry out sialic acid catabolism/recycling (GO:0019262).
  - source_id: file:human/GNE/GNE-ai-review.yaml
    title: GNE gene review (human)
    statement: The UDP-GlcNAc->ManNAc->ManNAc-6-P step (UniProtKB:Q9Y223, GO:0008761/GO:0009384) matches the completed human GNE review.
  - source_id: file:human/NANS/NANS-ai-review.yaml
    title: NANS gene review (human)
    statement: The ManNAc-6-P + PEP -> Neu5Ac-9-P step (UniProtKB:Q9NR45, GO:0047444) matches the completed human NANS review.
  - source_id: file:human/NANP/NANP-ai-review.yaml
    title: NANP gene review (human)
    statement: The Neu5Ac-9-P -> Neu5Ac dephosphorylation step (UniProtKB:Q8TBE9, GO:0050124) matches the completed human NANP review.
  - source_id: file:human/CMAS/CMAS-ai-review.yaml
    title: CMAS gene review (human)
    statement: The Neu5Ac + CTP -> CMP-Neu5Ac activation step (UniProtKB:Q8NFW8, GO:0008781) matches the completed human CMAS review.
  - source_id: file:human/SLC35A1/SLC35A1-ai-review.yaml
    title: SLC35A1 gene review (human)
    statement: The Golgi CMP-Neu5Ac import step (UniProtKB:P78382, GO:0005456) matches the completed human SLC35A1 review.
  - source_id: file:human/NEU1/NEU1-ai-review.yaml
    title: NEU1 gene review (human)
    statement: The lysosomal desialylation step (UniProtKB:Q99519, GO:0004308) matches the completed human NEU1 review.
  - source_id: file:human/NPL/NPL-ai-review.yaml
    title: NPL gene review (human)
    statement: The Neu5Ac -> ManNAc + pyruvate recycling step (UniProtKB:Q9BXD5, GO:0008747) matches the completed human NPL review.
module:
  id: sialic_acid_metabolism
  label: Sialic acid (N-acetylneuraminate) metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: N-acetylneuraminate biosynthetic process
      term:
        id: GO:0046380
        label: N-acetylneuraminate biosynthetic process
      description: UDP-GlcNAc -> ManNAc(-6-P) -> Neu5Ac(-9-P) -> Neu5Ac -> CMP-Neu5Ac activation.
    - preferred_term: N-acetylneuraminate catabolic process
      term:
        id: GO:0019262
        label: N-acetylneuraminate catabolic process
      description: Lysosomal desialylation (NEU1) and cytosolic Neu5Ac cleavage to ManNAc + pyruvate (NPL).
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: GNE, NANS, NANP and NPL act in the cytosol.
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
        description: CMAS (CMP-Neu5Ac synthetase) is nuclear.
      - preferred_term: Golgi membrane
        term:
          id: GO:0000139
          label: Golgi membrane
        description: SLC35A1 imports CMP-Neu5Ac across the Golgi membrane.
      - preferred_term: lysosomal lumen
        term:
          id: GO:0043202
          label: lysosomal lumen
        description: NEU1 desialylates glycoconjugates in the lysosome.
  parts:
    - order: 1
      role: ManNAc(-6-P) synthesis (bifunctional, rate-limiting)
      node:
        id: udpglcnac_to_mannac6p
        label: UDP-GlcNAc 2-epimerase / ManNAc kinase (GNE)
        module_type: REACTION
        annotons:
          - id: gne_activity
            label: "GNE: bifunctional UDP-GlcNAc 2-epimerase / ManNAc kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GNE / bifunctional UDP-GlcNAc 2-epimerase-kinase family
                term:
                  id: PANTHER:PTHR18964
                  label: BIFUNCTIONAL UDP-N-ACETYLGLUCOSAMINE 2-EPIMERASE/N-ACETYLMANNOSAMINE KINASE
                representative_members:
                  - preferred_term: GNE (human)
                    term:
                      id: UniProtKB:Q9Y223
                      label: Bifunctional UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase
            function:
              preferred_term: UDP-N-acetylglucosamine 2-epimerase + N-acylmannosamine kinase activity
              term:
                id: GO:0008761
                label: UDP-N-acetylglucosamine 2-epimerase activity
              substrates:
                - preferred_term: UDP-N-acetyl-D-glucosamine
                - preferred_term: ATP (kinase domain, GO:0009384)
              products:
                - preferred_term: N-acetyl-D-mannosamine 6-phosphate (via ManNAc)
                - preferred_term: UDP + ADP
              evidence:
                - source_id: file:human/GNE/GNE-ai-review.yaml
                  statement: Bifunctional rate-limiting enzyme; epimerase (GO:0008761) makes ManNAc from UDP-GlcNAc, kinase (GO:0009384) phosphorylates ManNAc; feedback-inhibited by CMP-Neu5Ac; GNE myopathy / sialuria
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Makes ManNAc-6-phosphate from UDP-GlcNAc (epimerase + kinase).
    - order: 2
      role: sialic acid synthase
      node:
        id: mannac6p_to_neu5ac9p
        label: N-acetylneuraminate-9-phosphate synthase (NANS)
        module_type: REACTION
        annotons:
          - id: nans_activity
            label: "NANS: sialic acid (Neu5Ac-9-P) synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NANS / N-acetylneuraminate-9-phosphate synthase family
                term:
                  id: PANTHER:PTHR42966
                  label: N-ACETYLNEURAMINATE-9-PHOSPHATE SYNTHASE
                representative_members:
                  - preferred_term: NANS (human)
                    term:
                      id: UniProtKB:Q9NR45
                      label: Sialic acid synthase
            function:
              preferred_term: N-acylneuraminate-9-phosphate synthase activity
              term:
                id: GO:0047444
                label: N-acylneuraminate-9-phosphate synthase activity
              substrates:
                - preferred_term: N-acetyl-D-mannosamine 6-phosphate
                - preferred_term: phosphoenolpyruvate (PEP)
              products:
                - preferred_term: N-acetylneuraminate 9-phosphate (Neu5Ac-9-P)
                - preferred_term: phosphate
              evidence:
                - source_id: file:human/NANS/NANS-ai-review.yaml
                  statement: Condenses ManNAc-6-P with PEP to Neu5Ac-9-P (also KDN-9-P from Man-6-P); acts on the PHOSPHORYLATED sugar; NANS-CDG on deficiency
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Condenses ManNAc-6-P + PEP to Neu5Ac-9-phosphate.
    - order: 3
      role: Neu5Ac-9-P dephosphorylation
      node:
        id: neu5ac9p_to_neu5ac
        label: N-acylneuraminate-9-phosphatase (NANP)
        module_type: REACTION
        annotons:
          - id: nanp_activity
            label: "NANP: Neu5Ac-9-phosphatase (HAD)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NANP / HAD N-acylneuraminate-9-phosphatase family
                term:
                  id: PANTHER:PTHR46470
                  label: N-ACYLNEURAMINATE-9-PHOSPHATASE
                representative_members:
                  - preferred_term: NANP (human)
                    term:
                      id: UniProtKB:Q8TBE9
                      label: N-acylneuraminate-9-phosphatase
            function:
              preferred_term: N-acylneuraminate-9-phosphatase activity
              term:
                id: GO:0050124
                label: N-acylneuraminate-9-phosphatase activity
              substrates:
                - preferred_term: N-acetylneuraminate 9-phosphate (Mg2+)
              products:
                - preferred_term: N-acetylneuraminate (free Neu5Ac)
                - preferred_term: phosphate
              evidence:
                - source_id: file:human/NANP/NANP-ai-review.yaml
                  statement: Mg2+-dependent HAD-superfamily phosphatase; releases free Neu5Ac from Neu5Ac-9-P (final biosynthetic step before activation)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Dephosphorylates Neu5Ac-9-P to free Neu5Ac.
    - order: 4
      role: sialic acid activation (CMP donor)
      node:
        id: neu5ac_to_cmpneu5ac
        label: CMP-N-acetylneuraminate synthetase (CMAS)
        module_type: REACTION
        annotons:
          - id: cmas_activity
            label: "CMAS: CMP-sialic acid synthetase (nuclear)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CMAS / N-acylneuraminate cytidylyltransferase family
                term:
                  id: PANTHER:PTHR21485
                  label: N-ACYLNEURAMINATE CYTIDYLYLTRANSFERASE
                representative_members:
                  - preferred_term: CMAS (human)
                    term:
                      id: UniProtKB:Q8NFW8
                      label: N-acylneuraminate cytidylyltransferase
            function:
              preferred_term: N-acylneuraminate cytidylyltransferase activity
              term:
                id: GO:0008781
                label: N-acylneuraminate cytidylyltransferase activity
              substrates:
                - preferred_term: N-acetylneuraminate (Neu5Ac)
                - preferred_term: CTP
              products:
                - preferred_term: CMP-N-acetylneuraminate (CMP-Neu5Ac, donor)
                - preferred_term: diphosphate
              evidence:
                - source_id: file:human/CMAS/CMAS-ai-review.yaml
                  statement: Nuclear enzyme activating free Neu5Ac with CTP to the universal sialyltransferase donor CMP-Neu5Ac (which feedback-inhibits GNE)
            locations:
              - preferred_term: nucleus
                term:
                  id: GO:0005634
                  label: nucleus
            role_description: Activates Neu5Ac to CMP-Neu5Ac (sugar-nucleotide donor).
    - order: 5
      role: Golgi import of the CMP-Neu5Ac donor
      node:
        id: cmpneu5ac_golgi_import
        label: CMP-sialic acid transporter (SLC35A1)
        module_type: REACTION
        annotons:
          - id: slc35a1_activity
            label: "SLC35A1: CMP-Neu5Ac/CMP Golgi antiporter"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: SLC35A1 / nucleotide-sugar transporter family
                term:
                  id: PANTHER:PTHR10231
                  label: NUCLEOTIDE-SUGAR TRANSPORTER
                representative_members:
                  - preferred_term: SLC35A1 (human)
                    term:
                      id: UniProtKB:P78382
                      label: CMP-sialic acid transporter
            function:
              preferred_term: CMP-N-acetylneuraminate transmembrane transporter activity
              term:
                id: GO:0005456
                label: CMP-N-acetylneuraminate transmembrane transporter activity
              substrates:
                - preferred_term: CMP-N-acetylneuraminate (cytosolic)
              products:
                - preferred_term: CMP-N-acetylneuraminate (Golgi lumen; antiport for CMP)
              evidence:
                - source_id: file:human/SLC35A1/SLC35A1-ai-review.yaml
                  statement: Golgi-membrane antiporter importing CMP-Neu5Ac in exchange for CMP; supplies sialyltransferases; SLC35A1-CDG (CDG-IIf, thrombocytopenia)
            locations:
              - preferred_term: Golgi membrane
                term:
                  id: GO:0000139
                  label: Golgi membrane
            role_description: Imports CMP-Neu5Ac into the Golgi lumen (antiport with CMP).
    - order: 6
      role: lysosomal desialylation (catabolism)
      node:
        id: lysosomal_desialylation
        label: Lysosomal sialidase (NEU1)
        module_type: REACTION
        annotons:
          - id: neu1_activity
            label: "NEU1: lysosomal exo-alpha-sialidase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NEU / sialidase (neuraminidase) family
                term:
                  id: PANTHER:PTHR10628
                  label: SIALIDASE
                representative_members:
                  - preferred_term: NEU1 (human)
                    term:
                      id: UniProtKB:Q99519
                      label: Sialidase-1
            function:
              preferred_term: exo-alpha-sialidase activity
              term:
                id: GO:0004308
                label: exo-alpha-sialidase activity
              substrates:
                - preferred_term: sialylated glycoproteins / glycolipids / oligosaccharides
              products:
                - preferred_term: free N-acetylneuraminate + desialylated glycoconjugate
              evidence:
                - source_id: file:human/NEU1/NEU1-ai-review.yaml
                  statement: Lysosomal exo-alpha-sialidase acting within the CTSA/GLB1 multienzyme complex; removes terminal Neu5Ac during glycoconjugate turnover; deficiency = sialidosis
            locations:
              - preferred_term: lysosomal lumen
                term:
                  id: GO:0043202
                  label: lysosomal lumen
            role_description: Removes terminal sialic acid from glycoconjugates (lysosome).
    - order: 7
      role: free sialic acid cleavage / recycling
      node:
        id: neu5ac_cleavage
        label: N-acetylneuraminate lyase (NPL)
        module_type: REACTION
        annotons:
          - id: npl_activity
            label: "NPL: N-acetylneuraminate pyruvate lyase (aldolase)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: NPL / N-acetylneuraminate lyase family
                term:
                  id: PANTHER:PTHR12128
                  label: N-ACETYLNEURAMINATE LYASE
                representative_members:
                  - preferred_term: NPL (human)
                    term:
                      id: UniProtKB:Q9BXD5
                      label: N-acetylneuraminate lyase
            function:
              preferred_term: N-acetylneuraminate lyase activity
              term:
                id: GO:0008747
                label: N-acetylneuraminate lyase activity
              substrates:
                - preferred_term: N-acetylneuraminate (free Neu5Ac)
              products:
                - preferred_term: N-acetyl-D-mannosamine (ManNAc)
                - preferred_term: pyruvate
              evidence:
                - source_id: file:human/NPL/NPL-ai-review.yaml
                  statement: Cytosolic Schiff-base (class I) aldolase cleaving free Neu5Ac to ManNAc + pyruvate; controls free sialic-acid levels / recycles the amino sugar; NPL-related myopathy
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Cleaves free Neu5Ac to ManNAc + pyruvate (recycling).
  connections:
    - source: udpglcnac_to_mannac6p
      target: mannac6p_to_neu5ac9p
      connection_type: PROVIDES_INPUT_FOR
      description: GNE produces ManNAc-6-phosphate, the substrate condensed with PEP by NANS.
    - source: mannac6p_to_neu5ac9p
      target: neu5ac9p_to_neu5ac
      connection_type: PROVIDES_INPUT_FOR
      description: The Neu5Ac-9-phosphate made by NANS is dephosphorylated by NANP.
    - source: neu5ac9p_to_neu5ac
      target: neu5ac_to_cmpneu5ac
      connection_type: PROVIDES_INPUT_FOR
      description: The free Neu5Ac released by NANP is activated by CMAS to CMP-Neu5Ac.
    - source: neu5ac_to_cmpneu5ac
      target: cmpneu5ac_golgi_import
      connection_type: PROVIDES_INPUT_FOR
      description: The CMP-Neu5Ac made by CMAS is imported into the Golgi by SLC35A1 for sialyltransferases.
    - source: neu5ac_to_cmpneu5ac
      target: udpglcnac_to_mannac6p
      connection_type: NEGATIVELY_REGULATES
      description: CMP-Neu5Ac (the CMAS product) allosterically feedback-inhibits the GNE epimerase, matching flux to demand.
    - source: lysosomal_desialylation
      target: neu5ac_cleavage
      connection_type: PROVIDES_INPUT_FOR
      description: The free Neu5Ac released by lysosomal NEU1 is cleaved by cytosolic NPL to ManNAc + pyruvate.
  notes: >-
    Sialic acid (Neu5Ac) metabolism (GO:0046380 biosynthesis + GO:0019262 catabolism), grounded to seven
    completed human gene reviews, each a distinct PANTHER family. BIOSYNTHESIS (cytosol->nucleus): GNE
    (Q9Y223 PTHR18964, bifunctional GO:0008761 epimerase + GO:0009384 ManNAc kinase, rate-limiting, CMP-
    Neu5Ac-feedback-inhibited; GNE myopathy/sialuria) -> NANS (Q9NR45 PTHR42966, GO:0047444 — the PHOSPHATE
    synthase EC 2.5.1.57, NOT GO:0050462; NANS-CDG) -> NANP (Q8TBE9 PTHR46470, GO:0050124 HAD phosphatase +
    Mg) -> CMAS (Q8NFW8 PTHR21485, GO:0008781 nuclear cytidylyltransferase making the CMP-Neu5Ac donor).
    TRANSPORT: SLC35A1 (P78382 PTHR10231, GO:0005456 Golgi CMP-Neu5Ac/CMP antiporter; SLC35A1-CDG/CDG-IIf).
    CATABOLISM: NEU1 (Q99519 PTHR10628, GO:0004308 lysosomal exo-alpha-sialidase in the CTSA/GLB1 complex;
    sialidosis) -> NPL (Q9BXD5 PTHR12128, GO:0008747 cytosolic aldolase, Neu5Ac->ManNAc+pyruvate, recycling).
    The CMAS product CMP-Neu5Ac feedback-inhibits GNE (modelled as NEGATIVELY_REGULATES). ManNAc from NPL and
    ManNAc/sialic-acid supplementation can bypass upstream GNE/NANS/NPL defects therapeutically. GNPNAT1
    (hexosamine/UDP-GlcNAc synthesis, upstream) and the sialyltransferases (downstream) are separate modules.
    GO term ids/labels verified against the local go.db.
