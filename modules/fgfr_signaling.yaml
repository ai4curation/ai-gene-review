id: MODULE:fgfr_signaling
title: FGFR signaling pathway module
description: FGF ligands and heparan sulfate cofactor activate FGFR receptor tyrosine kinases, 
  recruiting FRS2/GRB2/SOS, PI3K, PLCG, and MAPK outputs for development, angiogenesis, and tissue 
  repair.
