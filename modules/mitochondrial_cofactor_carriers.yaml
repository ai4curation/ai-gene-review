    statement: SLC25A19 mediates thiamine pyrophosphate transmembrane transport (GO:0030974) into the matrix.
  - source_id: GO:1990543
    title: mitochondrial S-adenosyl-L-methionine transmembrane transport
    statement: SLC25A26 mediates mitochondrial S-adenosyl-L-methionine transmembrane transport (GO:1990543).
  - source_id: GO:1990548
    title: mitochondrial FAD transmembrane transport
    statement: SLC25A32 mediates mitochondrial FAD transmembrane transport (GO:1990548).
  - source_id: GO:1990559
    title: mitochondrial coenzyme A transmembrane transport
    statement: SLC25A42 mediates mitochondrial coenzyme A transmembrane transport (GO:1990559).
  - source_id: file:human/SLC25A19/SLC25A19-ai-review.yaml
    title: SLC25A19 gene review (human)
    statement: The thiamine pyrophosphate carrier (UniProtKB:Q9HC21, GO:0090422) matches the completed human SLC25A19 review.
  - source_id: file:human/SLC25A26/SLC25A26-ai-review.yaml
    title: SLC25A26 gene review (human)
    statement: The S-adenosylmethionine carrier (UniProtKB:Q70HW3, GO:0000095) matches the completed human SLC25A26 review.
  - source_id: file:human/SLC25A32/SLC25A32-ai-review.yaml
    title: SLC25A32 gene review (human)
    statement: The FAD carrier (UniProtKB:Q9H2D1, GO:0015230) matches the completed human SLC25A32 review.
  - source_id: file:human/SLC25A42/SLC25A42-ai-review.yaml
    title: SLC25A42 gene review (human)
    statement: The coenzyme A carrier (UniProtKB:Q86VD7, GO:0015228) matches the completed human SLC25A42 review.
