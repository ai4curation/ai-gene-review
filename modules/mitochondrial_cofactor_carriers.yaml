id: MODULE:mitochondrial_cofactor_carriers
title: Mitochondrial cofactor/coenzyme carriers (SLC25A19 ThPP, SLC25A26 SAM, SLC25A32 FAD, SLC25A42 CoA)
description: >-
  Many essential enzyme cofactors and coenzymes are synthesised (wholly or partly) in the cytosol
  but are required by enzymes inside the mitochondrial matrix, which the inner membrane keeps
  impermeable. A set of SLC25 mitochondrial-carrier proteins solves this by importing specific
  cofactors into the matrix. This module groups the human cofactor/coenzyme carriers. SLC25A19
  imports thiamine pyrophosphate (ThPP), the cofactor of the matrix 2-oxo-acid dehydrogenases
  (pyruvate dehydrogenase, 2-oxoglutarate dehydrogenase, branched-chain ketoacid dehydrogenase) and
  transketolase-like enzymes; SLC25A26 is the only carrier that imports S-adenosylmethionine (SAM),
  the methyl donor for matrix methyltransferases (mtDNA/RNA methylation and cofactor maturation),
  exchanging it for the product S-adenosylhomocysteine; SLC25A32 imports FAD (and is linked to
  mitochondrial folate/one-carbon metabolism); and SLC25A42 imports coenzyme A (CoA), needed for
  matrix acyl-CoA metabolism (fatty-acid oxidation and the TCA cycle), in exchange for
  intramitochondrial adenine nucleotides. Loss-of-function of these carriers causes cofactor-specific
  mitochondrial diseases: SLC25A19 — Amish lethal microcephaly and bilateral striatal
  necrosis/polyneuropathy (THMD3/4); SLC25A26 — combined oxidative phosphorylation deficiency 28;
  SLC25A32 — riboflavin/folate-responsive exercise intolerance and myopathy; SLC25A42 — a
  mitochondrial myopathy with episodic metabolic crises.
status: DRAFT
