  notes: >-
    Mitochondrial cofactor/coenzyme import carriers of the SLC25 family, grounded to the completed
    human gene reviews: SLC25A19 (Q9HC21, GO:0090422 thiamine pyrophosphate transporter — its old
    deoxynucleotide-carrier identity is refuted, recorded as NOT annotations in the gene review),
    SLC25A26 (Q70HW3, GO:0000095 SAM transporter / GO:0180003 SAM:SAH antiporter), SLC25A32 (Q9H2D1,
    GO:0015230 FAD transporter — the primary substrate is FAD per mouse genetics, with folate
    handling now understood as an indirect FAD-dependent effect; historical folate-transporter terms
    kept non-core), and SLC25A42 (Q86VD7, GO:0015228 CoA transporter). All are inner-membrane
    transporters (no catalytic MF). Grouped as parallel, independent cofactor-import carriers (no
    metabolic connection between them). GO term ids/labels verified against the local go.db (note
    GO:0051181 "cofactor transport" is obsolete, so the specific per-cofactor transport BPs are used
    as concepts). These carriers supply cofactors to matrix pathways curated elsewhere (2-oxo-acid
    dehydrogenases, one-carbon metabolism, fatty-acid oxidation, TCA cycle). Disorders: SLC25A19 —
    Amish lethal microcephaly / THMD3-4; SLC25A26 — COXPD28; SLC25A32 — riboflavin/folate-responsive
    myopathy; SLC25A42 — mitochondrial myopathy with metabolic crises.
