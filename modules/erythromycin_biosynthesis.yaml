id: MODULE:erythromycin_biosynthesis
title: Erythromycin A biosynthesis (Saccharopolyspora erythraea)
description: >-
  Representative-species module for biosynthesis of the macrolide antibiotic erythromycin A in
  Saccharopolyspora erythraea, encoded by the ery cluster (MIBiG BGC0000055). It is grounded to
  the concrete S. erythraea gene set reviewed under genes/SACEN/. The module combines a modular
  type I polyketide synthase (DEBS) that builds the macrolactone, post-PKS cytochrome-P450
  oxidations, two TDP-deoxysugar pathways feeding two glycosyltransferases, final O-methylation,
  and rRNA-methylation self-resistance. Companion prose/MIBiG-alignment notes are in
  terms/erythromycin_biosynthesis/.
status: DRAFT
references:
  - id: PMID:2024119
    title: Modular organization of genes required for complex polyketide biosynthesis.
  - id: PMID:22056329
    title: Structure of the glycosyltransferase EryCIII in complex with its activating P450 homologue EryCII.
  - id: PMID:15303858
    title: Reconstitution and characterization of a new desosaminyl transferase, EryCIII.
evidence:
  - source_id: MIBiG:BGC0000055
    title: Erythromycin biosynthetic gene cluster
    statement: The ery cluster (23 genes) encodes the enzymes of erythromycin A biosynthesis in S. erythraea.
  - source_id: GO:1901115
    title: erythromycin biosynthetic process
    statement: The module is grounded in the GO biological process term for erythromycin biosynthesis.
module:
  id: erythromycin_biosynthesis
  label: Erythromycin A biosynthesis
  module_type: METABOLIC_PATHWAY
  context:
    taxa:
      - preferred_term: Saccharopolyspora erythraea NRRL 2338
        term:
          id: NCBITaxon:405948
          label: Saccharopolyspora erythraea
  concepts:
    - preferred_term: erythromycin biosynthetic process
      term:
        id: GO:1901115
        label: erythromycin biosynthetic process
  parts:
    - order: 1
      role: macrolactone assembly
      node:
        id: debs_assembly
        label: DEBS modular type I PKS assembles 6-deoxyerythronolide B
        module_type: METABOLIC_PATHWAY
        description: >-
          Three multimodular polypeptides (EryAI/AII/AIII) condense one propionyl-CoA starter with
          six (2S)-methylmalonyl-CoA extenders over six modules; the EryAIII C-terminal thioesterase
          macrolactonizes and releases 6-deoxyerythronolide B (6-dEB).
        annotons:
          - id: eryAI_fn
            label: DEBS1 (loading didomain + modules 1-2)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryAI
                term:
                  id: UniProtKB:A4F7N8
                  label: eryAI
            function:
              preferred_term: erythronolide synthase activity (EC 2.3.1.94)
              term:
                id: GO:0047879
                label: erythronolide synthase activity
              substrates:
                - preferred_term: propionyl-CoA
                - preferred_term: (2S)-methylmalonyl-CoA
            role_description: Loads the propionyl starter and performs the first two chain-extension cycles.
          - id: eryAII_fn
            label: DEBS2 (modules 3-4)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryAII
                term:
                  id: UniProtKB:A4F7P0
                  label: eryAII
            function:
              preferred_term: erythronolide synthase activity (EC 2.3.1.94)
              term:
                id: GO:0047879
                label: erythronolide synthase activity
            role_description: Chain-extension and beta-keto reduction cycles 3-4 (module 4 fully reducing).
          - id: eryAIII_fn
            label: DEBS3 (modules 5-6 + thioesterase)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryAIII
                term:
                  id: UniProtKB:A4F7P1
                  label: eryAIII
            function:
              preferred_term: erythronolide synthase activity (EC 2.3.1.94)
              term:
                id: GO:0047879
                label: erythronolide synthase activity
              products:
                - preferred_term: 6-deoxyerythronolide B
            role_description: Final extensions; the thioesterase macrolactonizes and releases 6-dEB.
          - id: teII_fn
            label: type II thioesterase (PKS editing/proofreading)
            participant:
              selector_type: GENE
              gene:
                preferred_term: TEII (locus CAM00070)
                term:
                  id: UniProtKB:A4F7P6
                  label: A4F7P6
            function:
              preferred_term: acyl-[ACP] hydrolase, PKS editing
              term:
                id: GO:0016297
                label: fatty acyl-[ACP] hydrolase activity
            role_description: Hydrolyzes aberrant acyl-ACP species to maintain assembly-line fidelity.
    - order: 2
      role: post-PKS C-6 hydroxylation
      node:
        id: eryF_step
        label: EryF hydroxylates 6-dEB to erythronolide B
        module_type: REACTION
        annotons:
          - id: eryF_fn
            label: 6-deoxyerythronolide B C-6 hydroxylase (P450eryF)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryF
                term:
                  id: UniProtKB:Q00441
                  label: eryF
            function:
              preferred_term: 6-deoxyerythronolide B 6-hydroxylase activity (EC 1.14.15.35)
              term:
                id: GO:0004497
                label: monooxygenase activity
              substrates:
                - preferred_term: 6-deoxyerythronolide B
                - preferred_term: dioxygen
              products:
                - preferred_term: erythronolide B
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
    - order: 3
      role: mycarosylation (first glycosylation)
      node:
        id: eryBV_step
        label: EryBV attaches L-mycarose to erythronolide B
        module_type: REACTION
        annotons:
          - id: eryBV_fn
            label: mycarosyltransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBV
                term:
                  id: UniProtKB:A4F7N6
                  label: eryBV
            function:
              preferred_term: TDP-L-mycarose mycarosyltransferase activity
              term:
                id: GO:0016758
                label: hexosyltransferase activity
              substrates:
                - preferred_term: erythronolide B
                - preferred_term: TDP-L-mycarose
              products:
                - preferred_term: 3-O-mycarosyl-erythronolide B
    - order: 4
      role: desosaminylation (second glycosylation, activator-dependent)
      node:
        id: eryCIII_step
        label: EryCIII (activated by EryCII) attaches D-desosamine, forming erythromycin D
        module_type: REACTION
        annotons:
          - id: eryCIII_fn
            label: desosaminyltransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCIII
                term:
                  id: UniProtKB:A4F7P3
                  label: eryCIII
            function:
              preferred_term: 3-alpha-mycarosylerythronolide B desosaminyltransferase activity (EC 2.4.1.278)
              term:
                id: GO:0016758
                label: hexosyltransferase activity
              substrates:
                - preferred_term: 3-O-mycarosyl-erythronolide B
                - preferred_term: TDP-D-desosamine
              products:
                - preferred_term: erythromycin D
          - id: eryCII_fn
            label: EryCII - required allosteric activator of EryCIII (heme-less P450 pseudoenzyme)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCII
                term:
                  id: UniProtKB:A4F7P2
                  label: eryCII
            function:
              preferred_term: glycosyltransferase (EryCIII) activator activity
              term:
                id: GO:0008047
                label: enzyme activator activity
            role_description: >-
              Forms an alpha2-beta2 heterotetramer with EryCIII and is required for its activity;
              a cytochrome-P450 homologue that lacks the heme and is catalytically dead.
    - order: 5
      role: final tailoring to erythromycin A
      node:
        id: tailoring
        label: C-12 hydroxylation (EryK) and 3''-O-methylation (EryG)
        module_type: METABOLIC_PATHWAY
        description: >-
          EryK (C-12 hydroxylation) and EryG (mycarose 3''-O-methylation to cladinose) act in either
          order on erythromycin D, via erythromycins B and C, converging on erythromycin A.
        annotons:
          - id: eryK_fn
            label: erythromycin C-12 hydroxylase (CYP113A1)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryK
                term:
                  id: UniProtKB:P48635
                  label: eryK
            function:
              preferred_term: erythromycin 12-hydroxylase activity (EC 1.14.13.154)
              term:
                id: GO:0016709
                label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen
              substrates:
                - preferred_term: erythromycin D
                - preferred_term: dioxygen
              products:
                - preferred_term: erythromycin C
          - id: eryG_fn
            label: erythromycin 3''-O-methyltransferase (mycarose to cladinose)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryG
                term:
                  id: UniProtKB:A4F7P5
                  label: eryG
            function:
              preferred_term: erythromycin 3''-O-methyltransferase activity (EC 2.1.1.254)
              term:
                id: GO:0102307
                label: erythromycin 3''-o-methyltransferase activity
              substrates:
                - preferred_term: erythromycin C
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: erythromycin A
                - preferred_term: S-adenosyl-L-homocysteine
    - order: 6
      role: TDP-D-desosamine biosynthesis (donor for desosaminylation)
      node:
        id: desosamine_pathway
        label: TDP-D-desosamine biosynthesis (EryC* + EryBVII)
        module_type: METABOLIC_PATHWAY
        description: >-
          Builds the aminodeoxysugar donor TDP-D-desosamine from a TDP-4-keto-6-deoxyglucose
          precursor. Several enzymes are minimally characterized; the C-3 aminotransferase (EryCI)
          and the N,N-dimethyltransferase (EryCVI) are the best-defined steps.
        annotons:
          - id: eryCI_fn
            label: PLP-dependent sugar aminotransferase (DegT/DnrJ/EryC1 family)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCI
                term:
                  id: UniProtKB:P14290
                  label: eryCI
            function:
              preferred_term: sugar (C-3) aminotransferase activity
              term:
                id: GO:0008483
                label: transaminase activity
            role_description: Installs the C-3 amino group; UniProt P14290 is mis-named a "sensory transduction protein".
          - id: eryCIV_fn
            label: PLP-dependent 3,4-dehydratase (activity unverified)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCIV
                term:
                  id: UniProtKB:A4F7N3
                  label: eryCIV
            function:
              preferred_term: pyridoxal phosphate binding
              term:
                id: GO:0030170
                label: pyridoxal phosphate binding
          - id: eryCV_fn
            label: radical-SAM (4Fe-4S) enzyme (activity unverified)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCV
                term:
                  id: UniProtKB:A4F7N2
                  label: eryCV
            function:
              preferred_term: 4Fe-4S cluster binding (radical-SAM)
              term:
                id: GO:0051539
                label: 4 iron, 4 sulfur cluster binding
          - id: eryCVI_fn
            label: TDP-desosamine N,N-dimethyltransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryCVI
                term:
                  id: UniProtKB:A4F7N5
                  label: eryCVI
            function:
              preferred_term: TDP-desosamine N,N-dimethyltransferase activity
              term:
                id: GO:0008168
                label: methyltransferase activity
              products:
                - preferred_term: TDP-D-desosamine
          - id: eryBVII_desosamine_fn
            label: dTDP-sugar 3,5-epimerase (shared)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBVII
                term:
                  id: UniProtKB:A4F7N1
                  label: eryBVII
            function:
              preferred_term: dTDP-sugar 3,5-epimerase activity (EC 5.1.3.13)
              term:
                id: GO:0008830
                label: dTDP-4-dehydrorhamnose 3,5-epimerase activity
            role_description: Shared 3,5-epimerase used by both the desosamine and mycarose branches.
    - order: 7
      role: TDP-L-mycarose biosynthesis (donor for mycarosylation)
      node:
        id: mycarose_pathway
        label: TDP-L-mycarose biosynthesis (EryB*)
        module_type: METABOLIC_PATHWAY
        description: >-
          Builds the branched-chain deoxysugar donor TDP-L-mycarose. Enzymes are largely
          name-/homology-defined (TrEMBL); the C-methyltransferase (EryBIII) installs the C-3 methyl
          branch.
        annotons:
          - id: eryBVI_fn
            label: 2,3-dehydratase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBVI
                term:
                  id: UniProtKB:A4F7N4
                  label: eryBVI
            function:
              preferred_term: NDP-4-keto-6-deoxyglucose 2,3-dehydratase activity
              term:
                id: GO:0016829
                label: lyase activity
          - id: eryBII_fn
            label: TDP-sugar 2,3-reductase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBII
                term:
                  id: UniProtKB:A4F7P4
                  label: eryBII
            function:
              preferred_term: TDP-4-keto-6-deoxyhexose 2,3-reductase activity
              term:
                id: GO:0016491
                label: oxidoreductase activity
          - id: eryBIII_fn
            label: 3-C-methyltransferase (mycarose C-methyl branch)
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBIII
                term:
                  id: UniProtKB:A4F7P8
                  label: eryBIII
            function:
              preferred_term: NDP-4-keto-2,6-dideoxyhexose 3-C-methyltransferase activity
              term:
                id: GO:0008168
                label: methyltransferase activity
          - id: eryBIV_fn
            label: 4-reductase
            participant:
              selector_type: GENE
              gene:
                preferred_term: eryBIV
                term:
                  id: UniProtKB:A4F7N7
                  label: eryBIV
            function:
              preferred_term: dTDP-4-keto-6-deoxy-L-hexose 4-reductase activity
              term:
                id: GO:0016491
                label: oxidoreductase activity
              products:
                - preferred_term: TDP-L-mycarose
    - order: 8
      role: self-resistance
      optional: true
      node:
        id: resistance
        label: ErmE 23S rRNA methylation self-resistance
        module_type: REACTION
        annotons:
          - id: ermE_fn
            label: 23S rRNA A2085 N6,N6-dimethyltransferase
            participant:
              selector_type: GENE
              gene:
                preferred_term: ermE
                term:
                  id: UniProtKB:P07287
                  label: ermE
            function:
              preferred_term: 23S rRNA (adenine-2085-N6)-dimethyltransferase activity (EC 2.1.1.184)
              term:
                id: GO:0052910
                label: 23S rRNA (adenine(2085)-N(6))-dimethyltransferase activity
            role_description: >-
              Dimethylates 23S rRNA A2085 (E. coli A2058), blocking erythromycin binding to the 50S
              subunit and conferring macrolide self-resistance on the producer.
  connections:
    - source: debs_assembly
      target: eryF_step
      connection_type: PROVIDES_INPUT_FOR
      description: 6-deoxyerythronolide B is the substrate of EryF.
    - source: eryF_step
      target: eryBV_step
      connection_type: PROVIDES_INPUT_FOR
      description: Erythronolide B is the acceptor for mycarosylation.
    - source: eryBV_step
      target: eryCIII_step
      connection_type: PROVIDES_INPUT_FOR
      description: 3-O-mycarosyl-erythronolide B is the acceptor for desosaminylation.
    - source: eryCIII_step
      target: tailoring
      connection_type: PROVIDES_INPUT_FOR
      description: Erythromycin D is the substrate for the final EryK/EryG tailoring.
    - source: mycarose_pathway
      target: eryBV_step
      connection_type: PROVIDES_INPUT_FOR
      description: Supplies the TDP-L-mycarose glycosyl donor.
    - source: desosamine_pathway
      target: eryCIII_step
      connection_type: PROVIDES_INPUT_FOR
      description: Supplies the TDP-D-desosamine glycosyl donor.
  notes: >-
    Status DRAFT. EryCIV/EryCV catalytic specifics and several mycarose-pathway steps are
    name-/homology-based (TrEMBL) and carried as UNDECIDED in the per-gene reviews. EC 2.4.1.278
    (desosaminyltransferase), EC 1.14.15.35 (EryF) and EC 1.14.13.154 (EryK) lack specific GO MF
    terms; the function descriptors above carry the precise activity names. See
    genes/SACEN/<gene>/ for per-gene reviews and terms/erythromycin_biosynthesis/ for the
    MIBiG-aligned prose and discrepancy notes.
