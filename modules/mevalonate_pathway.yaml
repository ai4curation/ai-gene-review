                  id: GO:0005789
                  label: endoplasmic reticulum membrane
            role_description: >-
              Rate-limiting, committed enzyme of the pathway; polytopic ER-membrane protein
              with sterol-sensing domain and SREBP/Insig-regulated degradation. Target of
              the statin cholesterol-lowering drugs.
    - order: 3
      role: mevalonate phosphorylation
      node:
        id: mvk_step
        label: (R)-mevalonate + ATP to (R)-mevalonate-5-phosphate + ADP
        module_type: REACTION
        annotons:
          - id: mvk_activity
            label: "MVK: mevalonate kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Mevalonate kinase / GHMP kinase family (MVK)
                term:
                  id: PANTHER:PTHR43290
                  label: MEVALONATE KINASE
                representative_members:
                  - preferred_term: MVK (human)
                    term:
                      id: UniProtKB:Q03426
                      label: Mevalonate kinase
            function:
              preferred_term: mevalonate kinase activity
              term:
                id: GO:0004496
                label: mevalonate kinase activity
              substrates:
                - preferred_term: (R)-mevalonate
                - preferred_term: ATP
              products:
                - preferred_term: (R)-mevalonate 5-phosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.1.36
                  statement: mevalonate kinase (GHMP kinase); Mg2+/ATP-dependent
                - source_id: Reactome:R-HSA-191380
                  statement: "Mevalonate is phosphorylated to mevalonate-5-phosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Phosphorylates mevalonate to mevalonate-5-phosphate. Deficiency causes
              mevalonate kinase deficiency (hyper-IgD/periodic fever to mevalonic aciduria).
    - order: 4
      role: second phosphorylation
      node:
        id: pmvk_step
        label: (R)-mevalonate-5-phosphate + ATP to (R)-mevalonate-5-diphosphate + ADP
        module_type: REACTION
        annotons:
          - id: pmvk_activity
            label: "PMVK: phosphomevalonate kinase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Phosphomevalonate kinase family (PMVK)
                term:
                  id: PANTHER:PTHR13101
                  label: PHOSPHOMEVALONATE KINASE
                representative_members:
                  - preferred_term: PMVK (human)
                    term:
                      id: UniProtKB:Q15126
                      label: Phosphomevalonate kinase
            function:
              preferred_term: phosphomevalonate kinase activity
              term:
                id: GO:0004631
                label: phosphomevalonate kinase activity
              substrates:
                - preferred_term: (R)-mevalonate 5-phosphate
                - preferred_term: ATP
              products:
                - preferred_term: (R)-mevalonate 5-diphosphate
                - preferred_term: ADP
              evidence:
                - source_id: EC:2.7.4.2
                  statement: phosphomevalonate kinase; ATP-dependent
                - source_id: Reactome:R-HSA-191422
                  statement: "Mevalonate-5-phosphate is further phosphorylated (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Phosphorylates mevalonate-5-phosphate to mevalonate-5-diphosphate (between MVK
              and MVD).
    - order: 5
      role: decarboxylation to isopentenyl diphosphate (IPP)
      node:
        id: mvd_step
        label: (R)-mevalonate-5-diphosphate + ATP to isopentenyl diphosphate + CO2 + ADP + Pi
        module_type: REACTION
        annotons:
          - id: mvd_activity
            label: "MVD: diphosphomevalonate decarboxylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Diphosphomevalonate decarboxylase family (MVD)
                term:
                  id: PANTHER:PTHR10977
                  label: DIPHOSPHOMEVALONATE DECARBOXYLASE
                representative_members:
                  - preferred_term: MVD (human)
                    term:
                      id: UniProtKB:P53602
                      label: Diphosphomevalonate decarboxylase
            function:
              preferred_term: diphosphomevalonate decarboxylase activity
              term:
                id: GO:0004163
                label: diphosphomevalonate decarboxylase activity
              substrates:
                - preferred_term: (R)-mevalonate 5-diphosphate
                - preferred_term: ATP
              products:
                - preferred_term: isopentenyl diphosphate (IPP)
                - preferred_term: CO2 + ADP + phosphate
              evidence:
                - source_id: EC:4.1.1.33
                  statement: diphosphomevalonate decarboxylase; ATP-dependent; final mevalonate-pathway step; homodimer
                - source_id: Reactome:R-HSA-191414
                  statement: "MVD decarboxylates MVA5PP to IPPP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Final step: ATP-dependent decarboxylation of mevalonate-5-diphosphate to the
              C5 isoprenoid unit isopentenyl diphosphate (IPP). Deficiency causes porokeratosis.
  connections:
    - source: hmgcs1_step
      target: hmgcr_step
      connection_type: PROVIDES_INPUT_FOR
      description: HMG-CoA from HMGCS1 is reduced to mevalonate by HMGCR.
    - source: hmgcr_step
      target: mvk_step
      connection_type: PROVIDES_INPUT_FOR
      description: Mevalonate from HMGCR is phosphorylated by MVK.
    - source: mvk_step
      target: pmvk_step
      connection_type: PROVIDES_INPUT_FOR
      description: Mevalonate-5-phosphate from MVK is phosphorylated by PMVK.
    - source: pmvk_step
      target: mvd_step
      connection_type: PROVIDES_INPUT_FOR
      description: Mevalonate-5-diphosphate from PMVK is decarboxylated by MVD to IPP.
  notes: >-
    The mevalonate pathway (acetyl-CoA -> IPP) grounded to the human enzymes HMGCS1
    (UniProtKB:Q01581, GO:0004421, EC 2.3.3.10), HMGCR (P04035, GO:0004420, EC 1.1.1.34),
    MVK (Q03426, GO:0004496, EC 2.7.1.36), PMVK (Q15126, GO:0004631, EC 2.7.4.2) and MVD
    (P53602, GO:0004163, EC 4.1.1.33). GO molecular-function terms were taken from the human
    GOA records; Reactome reaction ids and titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector (generic over orthologs; HMGCS node covers
    HMGCS1 cytosolic + HMGCS2 mitochondrial, the latter being the ketogenesis enzyme reviewed
    in the ketogenesis module). HMGCR is the sole ER-membrane step (sterol-regulated, statin
    target); the rest are cytosolic. Downstream, IPP is isomerised to dimethylallyl-PP (IDI1)
    and condensed by farnesyl/geranylgeranyl-PP synthases (FDPS/GGPS1) toward squalene ->
    cholesterol (post-squalene sterol synthesis: SQLE/LSS/.../SC5D/DHCR7/DHCR24), and also
    supplies dolichol, ubiquinone (CoQ), heme A and the prenyl groups for protein prenylation.
    Disorders: MVK -> mevalonate kinase deficiency (HIDS/periodic fever to mevalonic aciduria);
    MVD (and MVK) -> porokeratosis; HMGCR -> statin target and autoantibody-mediated necrotizing
    myopathy; HMGCS1 -> a rare rigid-spine myopathy. (Acetoacetyl-CoA for HMGCS1 is supplied by
    cytosolic thiolase ACAT2.)
