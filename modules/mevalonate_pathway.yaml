id: MODULE:mevalonate_pathway
title: Mevalonate pathway (acetyl-CoA -> isopentenyl diphosphate); statin target, mevalonate kinase deficiency
description: >-
  The mevalonate pathway is the cytosolic/ER route that converts acetyl-CoA into the
  universal five-carbon isoprenoid building block isopentenyl diphosphate (IPP), the
  precursor of cholesterol, dolichol, ubiquinone (CoQ), heme A, and the farnesyl/
  geranylgeranyl groups used for protein prenylation. Cytosolic HMG-CoA synthase (HMGCS1)
  condenses acetoacetyl-CoA with acetyl-CoA to 3-hydroxy-3-methylglutaryl-CoA (HMG-CoA);
  HMG-CoA reductase (HMGCR), the rate-limiting, committed, sterol-feedback-regulated
  enzyme and target of the statin drugs, reduces HMG-CoA to mevalonate using 2 NADPH on
  the endoplasmic-reticulum membrane; mevalonate kinase (MVK) and phosphomevalonate kinase
  (PMVK) then doubly phosphorylate mevalonate to mevalonate-5-diphosphate; and
  diphosphomevalonate decarboxylase (MVD) decarboxylates it to IPP. Inherited defects
  cause: mevalonate kinase deficiency (MVK) — spanning hyper-IgD/periodic fever syndrome
  to mevalonic aciduria; porokeratosis (MVD and MVK); and HMGCR/HMGCS1 are pharmacologic/
  autoimmune (statin) and rare-myopathy loci rather than classic enzymopathies.
status: DRAFT
evidence:
  - source_id: GO:0019287
    title: "isopentenyl diphosphate biosynthetic process, mevalonate pathway"
    statement: >-
      The module is grounded in the GO isopentenyl diphosphate biosynthetic process,
      mevalonate pathway (GO:0019287): acetyl-CoA -> HMG-CoA -> mevalonate -> IPP.
  - source_id: Reactome:R-HSA-191273
    title: Cholesterol biosynthesis
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome cholesterol/
      isoprenoid-biosynthesis reactions R-HSA-191323 (HMGCS1), R-HSA-191352 (HMGCR),
      R-HSA-191380 (MVK), R-HSA-191422 (PMVK) and R-HSA-191414 (MVD).
  - source_id: file:human/HMGCS1/HMGCS1-ai-review.yaml
    title: HMGCS1 gene review (human)
    statement: >-
      The HMG-CoA-synthesis step (UniProtKB:Q01581, GO:0004421) matches the completed
      human HMGCS1 review.
  - source_id: file:human/HMGCR/HMGCR-ai-review.yaml
    title: HMGCR gene review (human)
    statement: >-
      The rate-limiting HMG-CoA-reductase step (UniProtKB:P04035, GO:0004420) matches
      the completed human HMGCR review.
  - source_id: file:human/MVK/MVK-ai-review.yaml
    title: MVK gene review (human)
    statement: >-
      The mevalonate-kinase step (UniProtKB:Q03426, GO:0004496) matches the completed
      human MVK review.
  - source_id: file:human/PMVK/PMVK-ai-review.yaml
    title: PMVK gene review (human)
    statement: >-
      The phosphomevalonate-kinase step (UniProtKB:Q15126, GO:0004631) matches the
      completed human PMVK review.
  - source_id: file:human/MVD/MVD-ai-review.yaml
    title: MVD gene review (human)
    statement: >-
      The diphosphomevalonate-decarboxylase step (UniProtKB:P53602, GO:0004163) matches
      the completed human MVD review.
module:
  id: mevalonate_pathway
  label: Mevalonate pathway (-> IPP)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: "isopentenyl diphosphate biosynthetic process, mevalonate pathway"
      term:
        id: GO:0019287
        label: "isopentenyl diphosphate biosynthetic process, mevalonate pathway"
      description: >-
        Conversion of acetyl-CoA to the C5 isoprenoid unit IPP via HMG-CoA and mevalonate.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          The soluble mevalonate enzymes are cytosolic; HMGCR is an integral ER-membrane
          protein.
  parts:
    - order: 1
      role: HMG-CoA synthesis
      node:
        id: hmgcs1_step
        label: acetoacetyl-CoA + acetyl-CoA to (S)-HMG-CoA + CoA
        module_type: REACTION
        annotons:
          - id: hmgcs1_activity
            label: "HMGCS1: HMG-CoA synthase (cytosolic)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HMG-CoA synthase family (HMGCS1/HMGCS2)
                term:
                  id: PANTHER:PTHR43323
                  label: HYDROXYMETHYLGLUTARYL-COA SYNTHASE
                representative_members:
                  - preferred_term: HMGCS1 (human, cytosolic)
                    term:
                      id: UniProtKB:Q01581
                      label: Hydroxymethylglutaryl-CoA synthase, cytoplasmic
            function:
              preferred_term: hydroxymethylglutaryl-CoA synthase activity
              term:
                id: GO:0004421
                label: hydroxymethylglutaryl-CoA synthase activity
              substrates:
                - preferred_term: acetoacetyl-CoA
                - preferred_term: acetyl-CoA
              products:
                - preferred_term: (S)-3-hydroxy-3-methylglutaryl-CoA (HMG-CoA)
                - preferred_term: CoA
              evidence:
                - source_id: EC:2.3.3.10
                  statement: hydroxymethylglutaryl-CoA synthase; cytosolic HMGCS1 (mevalonate), distinct from mitochondrial HMGCS2 (ketogenesis)
                - source_id: Reactome:R-HSA-191323
                  statement: "HMGCS1 condenses Ac-CoA and ACA-CoA to form bHMG-CoA (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              First committed cytosolic step: condenses acetoacetyl-CoA + acetyl-CoA to
              HMG-CoA (SREBP-regulated). Distinct from mitochondrial HMGCS2 of ketogenesis.
    - order: 2
      role: rate-limiting reduction to mevalonate (statin target)
      node:
        id: hmgcr_step
        label: (S)-HMG-CoA + 2 NADPH to (R)-mevalonate + CoA
        module_type: REACTION
        annotons:
          - id: hmgcr_activity
            label: "HMGCR: HMG-CoA reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HMG-CoA reductase family (HMGCR)
                term:
                  id: PANTHER:PTHR10572
                  label: 3-HYDROXY-3-METHYLGLUTARYL-COENZYME A REDUCTASE
                representative_members:
                  - preferred_term: HMGCR (human)
                    term:
                      id: UniProtKB:P04035
                      label: 3-hydroxy-3-methylglutaryl-coenzyme A reductase
            function:
              preferred_term: hydroxymethylglutaryl-CoA reductase (NADPH) activity
              term:
                id: GO:0004420
                label: hydroxymethylglutaryl-CoA reductase (NADPH) activity
              substrates:
                - preferred_term: (S)-HMG-CoA
                - preferred_term: NADPH (x2)
              products:
                - preferred_term: (R)-mevalonate
                - preferred_term: CoA
              evidence:
                - source_id: EC:1.1.1.34
                  statement: HMG-CoA reductase (NADPH); rate-limiting committed step; ER membrane, sterol-regulated degradation; statin target
                - source_id: Reactome:R-HSA-191352
                  statement: "HMGCR dimer reduces bHMG-CoA to MVA (human Reactome reaction)"
            locations:
              - preferred_term: endoplasmic reticulum membrane
