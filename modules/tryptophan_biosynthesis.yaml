id: MODULE:tryptophan_biosynthesis
title: L-tryptophan biosynthesis (microbial)
description: >-
  De novo biosynthesis of L-tryptophan from chorismate, the branch-point
  precursor of the aromatic amino acids. Five enzymatic activities convert
  chorismate to L-tryptophan, drawing in L-glutamine (amide nitrogen), PRPP
  (5-phospho-alpha-D-ribose 1-diphosphate), and L-serine, and releasing pyruvate,
  CO2 and glyceraldehyde 3-phosphate along the way. The pathway is the classic
  textbook microbial operon (the trp operon) and is notable for extensive enzyme
  fusion and channeling: anthranilate synthase is a glutamine amidotransferase
  built from a synthase component (TrpE) and a glutaminase component (TrpD/TrpG),
  the latter frequently fused to anthranilate phosphoribosyltransferase in enteric
  bacteria; phosphoribosylanthranilate isomerase (TrpF) is often fused to
  indole-3-glycerol-phosphate synthase (TrpC); and the terminal tryptophan
  synthase is an alpha-2-beta-2 complex in which indole produced at the TrpA
  (alpha) active site is channeled through an intramolecular tunnel to the TrpB
  (beta) active site, where it condenses with L-serine, so free indole is not
  released. The pathway is feedback-regulated by L-tryptophan, classically at
  anthranilate synthase and, in many bacteria, also transcriptionally via
  attenuation and the TrpR repressor.
status: DRAFT
evidence:
  - source_id: GapMind:aa
    title: GapMind for amino acid biosynthesis
    statement: >-
      Step set and characterized-protein groundings derive from the GapMind
      amino-acid biosynthesis pathway definition trp.steps (PaperBLAST, Price &
      Arkin, LBL).
    url: https://papers.genomics.lbl.gov/cgi-bin/gapView.cgi?gdb=NCBI&set=aa&path=trp
  - source_id: MetaCyc:TRPSYN-PWY
    title: L-tryptophan biosynthesis
    statement: GapMind bases the tryptophan pathway on the MetaCyc pathway TRPSYN-PWY.
  - source_id: GO:0000162
    title: L-tryptophan biosynthetic process
    statement: The module is grounded in the GO biological-process term for tryptophan biosynthesis.
  - source_id: file:modules/tryptophan_biosynthesis-deep-research-falcon.md
    title: Falcon module review for microbial L-tryptophan biosynthesis
    statement: >-
      Generic module-level retrieval supports the chorismate-to-tryptophan
      boundary, common fusion/complex architectures, and terminal tryptophan
      synthase channeling.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__tryptophan_biosynthesis__ppu00400-deep-research-falcon.md
    title: Falcon PSEPK ppu00400 tryptophan biosynthesis review
    statement: >-
      Species/pathway review finds the KT2440 chorismate-to-tryptophan pathway
      fully covered by seven core genes, separates broad ppu00400 shikimate and
      phenylalanine/tyrosine spillover from the tryptophan core, and flags
      PP_0420 as a TrpG-like anthranilate-synthase amidotransferase despite the
      local pabA gene name.
  - source_id: file:PSEPK/pabA/pabA-ai-review.yaml
    title: PSEPK PP_0420/pabA gene review
    statement: >-
      Existing review supports PP_0420 as the TrpG-like glutamine
      amidotransferase component of anthranilate synthase for tryptophan module
      satisfiability, while leaving any folate/pABA role unresolved.
module:
  id: tryptophan_biosynthesis
  label: L-tryptophan biosynthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: L-tryptophan biosynthetic process
      term:
        id: GO:0000162
        label: L-tryptophan biosynthetic process
      description: Formation of L-tryptophan from chorismate, glutamine, PRPP and serine.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: In bacteria the pathway operates in the cytoplasm.
  parts:
    - order: 1
      role: chorismate to anthranilate (anthranilate synthase)
      node:
        id: anthranilate_synthase_node
        label: Chorismate to anthranilate (anthranilate synthase, alternative architectures)
        module_type: REACTION
        description: >-
          Anthranilate synthase aminates chorismate using the amide nitrogen of
          L-glutamine, eliminating pyruvate. It is a glutamine amidotransferase
          whose subunit architecture varies between taxa.
        concepts:
          - preferred_term: anthranilate synthase reaction
            description: chorismate + L-glutamine -> anthranilate + pyruvate + L-glutamate.
        variant_sets:
          - id: anthranilate_synthase_architecture
            label: Anthranilate synthase subunit architecture
            axis: enzyme architecture
            selection: EXACTLY_ONE
            variants:
              - id: two_component_anthranilate_synthase
                label: Two-component anthranilate synthase (TrpE + TrpD/TrpG)
                module_type: PROTEIN_COMPLEX
                description: >-
                  The canonical (e.g. E. coli) arrangement: a synthase component
                  (TrpE) plus a separate glutamine-amidotransferase component
                  (TrpG, here trpD_1; in E. coli this is the N-terminal domain of
                  the bifunctional TrpD protein).
                annotons:
                  - id: trpE_activity
                    label: "trpE: anthranilate synthase component I (synthase subunit)"
                    participant:
                      selector_type: FAMILY
                      required_function:
                        preferred_term: anthranilate synthase activity
                        term:
                          id: GO:0004049
                          label: anthranilate synthase activity
                      family:
                        preferred_term: anthranilate synthase component I (TrpE)
                        term:
                          id: NCBIfam:TIGR00565
                          label: anthranilate synthase component I
                        representative_members:
                          - preferred_term: trpE (Pseudomonas putida KT2440)
                            term:
                              id: UniProtKB:Q88QS1
                              label: Anthranilate synthase component 1
                    function:
                      preferred_term: anthranilate synthase activity
                      term:
                        id: GO:0004049
                        label: anthranilate synthase activity
                      substrates:
                        - preferred_term: chorismate
                        - preferred_term: ammonia (channeled from the glutaminase subunit)
                      products:
                        - preferred_term: anthranilate
                        - preferred_term: pyruvate
                      evidence:
                        - source_id: EC:4.1.3.27
                          statement: anthranilate synthase
                          notes: "ModelSEED:rxn00726; KEGG:R00985; HMM NCBIfam:TIGR00564/TIGR00565/TIGR01820"
                    role_description: Synthase (component I) subunit; aminates chorismate and eliminates pyruvate.
                  - id: trpD1_activity
                    label: "trpD_1/trpG: glutamine amidotransferase component of anthranilate synthase"
                    participant:
                      selector_type: FAMILY
                      required_function:
                        preferred_term: anthranilate synthase activity
                        term:
                          id: GO:0004049
                          label: anthranilate synthase activity
                      family:
                        preferred_term: anthranilate synthase glutamine amidotransferase component (TrpG/TrpD)
                        term:
                          id: NCBIfam:TIGR00566
                          label: anthranilate synthase component II / glutamine amidotransferase
                        representative_members:
                          - preferred_term: trpG / PP_0420 (Pseudomonas putida KT2440; UniProt gene name pabA)
                            term:
                              id: UniProtKB:Q88QR8
                              label: TrpG-like anthranilate synthase amidotransferase component
                    function:
                      preferred_term: anthranilate synthase activity
                      term:
                        id: GO:0004049
                        label: anthranilate synthase activity
                      cofactors:
                        - preferred_term: L-glutamine (ammonia donor)
                      evidence:
                        - source_id: EC:4.1.3.27
                          statement: glutamine amidotransferase (component II) of anthranilate synthase
                          notes: >-
                            HMM NCBIfam:TIGR00566. The same amidotransferase family also serves
                            4-amino-4-deoxychorismate / p-aminobenzoate synthase (EC 2.6.1.85).
                    role_description: >-
                      Glutaminase (component II) subunit; hydrolyses L-glutamine and channels
                      ammonia to the TrpE active site. In E. coli this is the N-terminal domain
                      of bifunctional TrpD, fused to anthranilate phosphoribosyltransferase.
              - id: single_protein_anthranilate_synthase
                label: Single-protein anthranilate synthase (TrpED, alphaproteobacterial clade)
                module_type: REACTION
                annotons:
                  - id: trpED_activity
                    label: "trpED: single-protein anthranilate synthase"
                    participant:
                      selector_type: FAMILY
                      required_function:
                        preferred_term: anthranilate synthase activity
                        term:
                          id: GO:0004049
                          label: anthranilate synthase activity
                      family:
                        preferred_term: single-protein anthranilate synthase (TrpED clade)
                        term:
                          id: NCBIfam:TIGR01815
                          label: anthranilate synthase, alphaproteobacterial clade
                        representative_members:
                          - preferred_term: trpE(G) (Sinorhizobium meliloti 1021)
                            term:
                              id: UniProtKB:P15395
                              label: Anthranilate synthase
                    function:
                      preferred_term: anthranilate synthase activity
                      term:
                        id: GO:0004049
                        label: anthranilate synthase activity
                      substrates:
                        - preferred_term: chorismate
                        - preferred_term: L-glutamine
                      products:
                        - preferred_term: anthranilate
                        - preferred_term: pyruvate
                        - preferred_term: L-glutamate
                      evidence:
                        - source_id: EC:4.1.3.27
                          statement: single-polypeptide anthranilate synthase
                          notes: "ModelSEED:rxn00726; KEGG:R00985; HMM NCBIfam:TIGR01815"
                    role_description: Some alphaproteobacteria carry anthranilate synthase as a single fused polypeptide.
    - order: 2
      role: anthranilate phosphoribosyltransferase (TrpD2)
      node:
        id: trpD2_step
        label: Anthranilate to N-(5'-phosphoribosyl)-anthranilate
        module_type: REACTION
        annotons:
          - id: trpD2_activity
            label: "trpD_2: anthranilate phosphoribosyltransferase"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: anthranilate phosphoribosyltransferase activity
                term:
                  id: GO:0004048
                  label: anthranilate phosphoribosyltransferase activity
              family:
                preferred_term: anthranilate phosphoribosyltransferase family
                term:
                  id: PANTHER:PTHR43285
                  label: Anthranilate phosphoribosyltransferase
                representative_members:
                  - preferred_term: trpD (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QR7
                      label: Anthranilate phosphoribosyltransferase
            function:
              preferred_term: anthranilate phosphoribosyltransferase activity
              term:
                id: GO:0004048
                label: anthranilate phosphoribosyltransferase activity
              substrates:
                - preferred_term: anthranilate
                - preferred_term: 5-phospho-alpha-D-ribose 1-diphosphate (PRPP)
              products:
                - preferred_term: N-(5'-phospho-D-ribosyl)-anthranilate (PRA)
                - preferred_term: diphosphate
              evidence:
                - source_id: EC:2.4.2.18
                  statement: anthranilate phosphoribosyltransferase
                  notes: "ModelSEED:rxn00791; KEGG:R01073; MetaCyc:PRTRANS-RXN"
            role_description: >-
              In enteric bacteria such as E. coli this activity is the C-terminal
              domain of bifunctional TrpD, fused to the anthranilate synthase
              glutaminase component (trpD_1).
    - order: 3
      role: phosphoribosylanthranilate isomerase (TrpF)
      node:
        id: prai_step
        label: PRA to CdRP
        module_type: REACTION
        annotons:
          - id: prai_activity
            label: "PRAI/trpF: phosphoribosylanthranilate isomerase"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: phosphoribosylanthranilate isomerase activity
                term:
                  id: GO:0004640
                  label: phosphoribosylanthranilate isomerase activity
              family:
                preferred_term: phosphoribosylanthranilate isomerase family
                term:
                  id: PANTHER:PTHR42894
                  label: N-(5'-phosphoribosyl)anthranilate isomerase
                representative_members:
                  - preferred_term: trpF (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88LE0
                      label: N-(5'-phosphoribosyl)anthranilate isomerase
            function:
              preferred_term: phosphoribosylanthranilate isomerase activity
              term:
                id: GO:0004640
                label: phosphoribosylanthranilate isomerase activity
              substrates:
                - preferred_term: N-(5'-phospho-D-ribosyl)-anthranilate (PRA)
              products:
                - preferred_term: 1-(o-carboxyphenylamino)-1-deoxy-D-ribulose 5-phosphate (CdRP)
              evidence:
                - source_id: EC:5.3.1.24
                  statement: phosphoribosylanthranilate isomerase
                  notes: "ModelSEED:rxn02508; KEGG:R03509; MetaCyc:PRAISOM-RXN"
            role_description: >-
              TrpF. Frequently fused to indole-3-glycerol-phosphate synthase as
              bifunctional TrpC. In some actinobacteria a single bifunctional PriA
              enzyme performs both this reaction (EC 5.3.1.24) and the analogous
              HisA reaction (EC 5.3.1.16) in histidine biosynthesis.
    - order: 4
      role: indole-3-glycerol-phosphate synthase (TrpC)
      node:
        id: igps_step
        label: CdRP to indole-3-glycerol phosphate
        module_type: REACTION
        annotons:
          - id: igps_activity
            label: "IGPS/trpC: indole-3-glycerol-phosphate synthase"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: indole-3-glycerol-phosphate synthase activity
                term:
                  id: GO:0004425
                  label: indole-3-glycerol-phosphate synthase activity
              family:
                preferred_term: indole-3-glycerol-phosphate synthase family
                term:
                  id: PANTHER:PTHR22854
                  label: Tryptophan biosynthesis protein / indole-3-glycerol-phosphate synthase family
                representative_members:
                  - preferred_term: trpC (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88QR6
                      label: Indole-3-glycerol phosphate synthase
            function:
              preferred_term: indole-3-glycerol-phosphate synthase activity
              term:
                id: GO:0004425
                label: indole-3-glycerol-phosphate synthase activity
              substrates:
                - preferred_term: 1-(o-carboxyphenylamino)-1-deoxy-D-ribulose 5-phosphate (CdRP)
              products:
                - preferred_term: (1S,2R)-1-C-(indol-3-yl)glycerol 3-phosphate (indole-3-glycerol phosphate)
                - preferred_term: carbon dioxide
                - preferred_term: water
              evidence:
                - source_id: EC:4.1.1.48
                  statement: indole-3-glycerol-phosphate synthase
                  notes: "ModelSEED:rxn02507; KEGG:R03508; MetaCyc:IGPSYN-RXN"
            role_description: TrpC. Ring closure with decarboxylation; often fused to PRAI (TrpF).
    - order: 5
      role: tryptophan synthase complex (TrpA + TrpB, channeled)
      node:
        id: tryptophan_synthase_step
        label: Indole-3-glycerol phosphate + L-serine to L-tryptophan
        module_type: REACTION
        description: >-
          Tryptophan synthase is an alpha-2-beta-2 complex. The TrpA (alpha) active
          site retro-aldol-cleaves indole-3-glycerol phosphate to indole and
          glyceraldehyde 3-phosphate; the indole is channeled ~25 angstroms through
          an intramolecular tunnel to the PLP-dependent TrpB (beta) active site,
          where it condenses with L-serine to give L-tryptophan. Free indole is not
          released into the cytoplasm under normal operation.
        annotons:
          - id: trpA_activity
            label: "trpA: tryptophan synthase alpha subunit (indole-3-glycerol-phosphate lyase)"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: tryptophan synthase activity
                term:
                  id: GO:0004834
                  label: tryptophan synthase activity
              family:
                preferred_term: tryptophan synthase alpha chain (TrpA)
                term:
                  id: NCBIfam:TIGR00262
                  label: tryptophan synthase, alpha subunit
                representative_members:
                  - preferred_term: trpA (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88RP7
                      label: Tryptophan synthase alpha chain
            function:
              preferred_term: tryptophan synthase activity
              term:
                id: GO:0004834
                label: tryptophan synthase activity
              substrates:
                - preferred_term: (1S,2R)-1-C-(indol-3-yl)glycerol 3-phosphate (indole-3-glycerol phosphate)
              products:
                - preferred_term: indole (channeled to the beta subunit)
                - preferred_term: D-glyceraldehyde 3-phosphate
              evidence:
                - source_id: EC:4.1.2.8
                  statement: indole-3-glycerol-phosphate lyase (tryptophan synthase alpha reaction)
                  notes: "ModelSEED:rxn01682; KEGG:R02340; MetaCyc:RXN0-2381; HMM NCBIfam:TIGR00262"
            role_description: Alpha subunit; cleaves indole-3-glycerol phosphate, feeding indole into the tunnel.
          - id: trpB_activity
            label: "trpB: tryptophan synthase beta subunit"
            participant:
              selector_type: FAMILY
              required_function:
                preferred_term: tryptophan synthase activity
                term:
                  id: GO:0004834
                  label: tryptophan synthase activity
              family:
                preferred_term: tryptophan synthase beta chain (TrpB)
                term:
                  id: NCBIfam:TIGR00263
                  label: tryptophan synthase, beta subunit
                representative_members:
                  - preferred_term: trpB (Pseudomonas putida KT2440)
                    term:
                      id: UniProtKB:Q88RP6
                      label: Tryptophan synthase beta chain
            function:
              preferred_term: tryptophan synthase activity
              term:
                id: GO:0004834
                label: tryptophan synthase activity
              substrates:
                - preferred_term: indole (channeled from the alpha subunit)
                - preferred_term: L-serine
              products:
                - preferred_term: L-tryptophan
                - preferred_term: water
              cofactors:
                - preferred_term: pyridoxal 5'-phosphate
              evidence:
                - source_id: EC:4.2.1.20
                  statement: tryptophan synthase (beta reaction)
                  notes: "ModelSEED:rxn00474; KEGG:R00674; MetaCyc:RXN0-2382; HMM NCBIfam:TIGR00263"
            role_description: >-
              Beta subunit; PLP-dependent condensation of indole with L-serine to
              form L-tryptophan. Standalone "TrpB2" indole-salvage enzymes belong
              to a related family and may use phosphoserine.
  connections:
    - source: anthranilate_synthase_node
      target: trpD2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Anthranilate feeds the phosphoribosyltransferase step.
    - source: trpD2_step
      target: prai_step
      connection_type: PRECEDES
    - source: prai_step
      target: igps_step
      connection_type: PRECEDES
    - source: igps_step
      target: tryptophan_synthase_step
      connection_type: PRECEDES
  notes: >-
    Backbone and characterized-protein groundings were mined from GapMind
    trp.steps and ModelSEED (see modules/experimental/gapmind-mining/), then
    curated: GO molecular-function terms were verified via QuickGO, reaction
    chemistry and channeling/fusion notes were added, and the GapMind
    anthranilate-synthase OR-rule (two-component vs single-protein) was curated
    into an EXACTLY_ONE variant set. EC numbers that GapMind records only as
    ignore_other (the true reaction ECs 4.1.3.27, 4.1.2.8, 4.2.1.20) were
    reinstated as reaction evidence. Bifunctional microbial fusions are flagged:
    TrpD (trpD_1 + trpD_2), TrpC (PRAI + IGPS), and PriA (HisA + TrpF). In the
    P. putida KT2440 ppu00400 batch, the narrow module is fully satisfied by
    trpE, PP_0420/trpG-like amidotransferase, trpD, trpF, trpC, trpA, and trpB.
    Upstream shikimate genes, phenylalanine/tyrosine branch enzymes, and
    quinate-catabolic genes from the broad KEGG map are outside this module.
