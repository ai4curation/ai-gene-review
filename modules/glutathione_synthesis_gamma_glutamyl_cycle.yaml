            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Converts gamma-glutamyl-amino acids to 5-oxoproline + amino acid.
    - order: 6
      role: intracellular GSH degradation (stress-induced)
      node:
