        label: Glutathione-specific gamma-glutamylcyclotransferase (CHAC1)
        module_type: REACTION
        annotons:
          - id: chac1_activity
            label: "CHAC1: glutathione-specific gamma-glutamylcyclotransferase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: CHAC / glutathione-specific gamma-glutamylcyclotransferase family
                term:
                  id: PANTHER:PTHR12192
                  label: GLUTATHIONE-SPECIFIC GAMMA-GLUTAMYLCYCLOTRANSFERASE
