                id: GO:0017168
                label: 5-oxoprolinase (ATP-hydrolyzing) activity
              substrates:
                - preferred_term: 5-oxo-L-proline (pyroglutamate)
                - preferred_term: ATP
              products:
                - preferred_term: L-glutamate
                - preferred_term: ADP + phosphate
              evidence:
                - source_id: file:human/OPLAH/OPLAH-ai-review.yaml
                  statement: ATP-dependent enzyme converting 5-oxoproline to glutamate, closing the gamma-glutamyl cycle; deficiency = 5-oxoprolinuria (pyroglutamic aciduria)
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Hydrolyses 5-oxoproline to glutamate (regenerates the gamma-glutamyl donor).
  connections:
    - source: glutamate_cysteine_ligation
      target: glutathione_synthesis
      connection_type: PROVIDES_INPUT_FOR
      description: The gamma-glutamylcysteine made by GCL is the substrate for GSS.
    - source: glutathione_synthesis
      target: extracellular_gsh_breakdown
      connection_type: PROVIDES_INPUT_FOR
      description: GSH synthesised by GSS is (extracellularly) catabolised by GGT1.
    - source: glutathione_synthesis
      target: intracellular_gsh_degradation
      connection_type: PROVIDES_INPUT_FOR
      description: GSH is also degraded intracellularly by CHAC1.
    - source: glutathione_recycling
      target: extracellular_gsh_breakdown
      connection_type: POSITIVELY_REGULATES
      description: GSR keeps the glutathione pool reduced (GSSG -> 2 GSH), sustaining the GSH available for turnover.
    - source: extracellular_gsh_breakdown
      target: gamma_glutamyl_cyclization
      connection_type: PROVIDES_INPUT_FOR
      description: The gamma-glutamyl-amino acids released by GGT1 are cyclised by GGCT.
    - source: gamma_glutamyl_cyclization
      target: oxoproline_to_glutamate
      connection_type: PROVIDES_INPUT_FOR
      description: The 5-oxoproline made by GGCT is hydrolysed to glutamate by OPLAH.
    - source: intracellular_gsh_degradation
      target: oxoproline_to_glutamate
      connection_type: PROVIDES_INPUT_FOR
      description: The 5-oxoproline released by CHAC1 is likewise converted to glutamate by OPLAH.
    - source: oxoproline_to_glutamate
      target: glutamate_cysteine_ligation
      connection_type: PROVIDES_INPUT_FOR
      description: The glutamate regenerated by OPLAH re-enters GCL, closing the gamma-glutamyl cycle.
  notes: >-
    Glutathione synthesis (GO:0006750), recycling and the gamma-glutamyl cycle (GO:0006751), grounded to
    nine completed human gene reviews (GCLC and GSS were reviewed/merged earlier). SYNTHESIS (cytosol):
    GCL = GCLC (P48506 PTHR11164, GO:0004357 catalytic, rate-limiting, GSH-feedback-inhibited) + GCLM
    (P48507 PTHR13295, GO:1990609 modifier, in_complex GO:0017109 — non-catalytic, lowers Km/raises feedback
    Ki) -> GSS (P48637 PTHR11130, GO:0004363 adds glycine -> GSH). RECYCLING: GSR (P00390 PTHR42737, GO:0004362
    FAD/NADPH, GSSG->2 GSH). GAMMA-GLUTAMYL CYCLE (turnover): GGT1 (P19440 PTHR11686, GO:0036374 — cell-surface
    Ntn-hydrolase; NB the old GO:0003840 gamma-glutamyltransferase term is OBSOLETE) -> GGCT (O75223 PTHR12935,
    GO:0003839) -> OPLAH (O14841 PTHR11365, GO:0017168 ATP-dependent, regenerates glutamate, closing the cycle).
    A parallel intracellular GSH-degradation route: CHAC1 (Q9BUX1 PTHR12192, GO:0061928; ATF4/ER-stress-induced,
    pro-apoptotic/ferroptotic) -> 5-oxoproline + cysteinylglycine, also feeding OPLAH. GCLM is modelled with
    `processes` (non-catalytic modifier). GO term ids/labels verified against the local go.db. Downstream
    GSH-consuming enzymes (glutathione peroxidases GPX1/4, glutathione transferases) are separate modules.
    Disorders: hemolytic anemia (GCLC, GSR), GSS deficiency/5-oxoprolinuria, glutathionuria (GGT1),
    5-oxoprolinase deficiency (OPLAH).
