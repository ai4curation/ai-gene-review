                - preferred_term: H2O / amino-acid acceptor
              products:
                - preferred_term: L-cysteinylglycine
                - preferred_term: L-gamma-glutamyl-amino acid (or L-glutamate)
              evidence:
                - source_id: file:human/GGT1/GGT1-ai-review.yaml
                  statement: Autoprocessed cell-surface Ntn-hydrolase; initiates extracellular GSH catabolism (also leukotriene-C4 conversion); salvages cysteine; deficiency = glutathionuria. NB GO:0003840 gamma-glutamyltransferase activity is obsolete -> GO:0036374
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: Cleaves the gamma-glutamyl bond of extracellular GSH (-> cysteinylglycine).
    - order: 5
