id: MODULE:glutathione_synthesis_gamma_glutamyl_cycle
title: Glutathione synthesis, recycling, and the gamma-glutamyl cycle
description: >-
  Glutathione (GSH, gamma-L-glutamyl-L-cysteinylglycine) is the most abundant cellular thiol and the
  central small-molecule antioxidant and redox buffer, also serving in detoxification (as GSH conjugates),
  cysteine storage/transport and leukotriene metabolism. Its metabolism has three linked arms. Synthesis
  is a two-step, ATP-dependent cytosolic route: glutamate-cysteine ligase (GCL, a heterodimer of the
  catalytic subunit GCLC and the regulatory modifier subunit GCLM) joins L-glutamate and L-cysteine to
  gamma-glutamylcysteine (the rate-limiting, feedback-controlled step), and glutathione synthetase (GSS)
  adds glycine to make GSH. Recycling keeps the pool reduced: glutathione-disulfide reductase (GSR), an
  FAD/NADPH enzyme, reduces oxidized glutathione (GSSG) back to two GSH, sustaining the high GSH/GSSG ratio.
  Turnover proceeds through the gamma-glutamyl cycle: the cell-surface ectoenzyme gamma-glutamyltransferase
  GGT1 initiates extracellular GSH breakdown by transferring/hydrolysing its gamma-glutamyl group (yielding
  cysteinylglycine plus a gamma-glutamyl-amino acid), gamma-glutamylcyclotransferase (GGCT) converts the
  gamma-glutamyl-amino acid to 5-oxoproline plus the free amino acid, and 5-oxoprolinase (OPLAH) hydrolyses
  5-oxoproline back to glutamate at the expense of ATP, closing the cycle. A parallel intracellular route,
  the ATF4/stress-induced glutathione-specific gamma-glutamylcyclotransferase CHAC1, degrades cytosolic GSH
  directly to 5-oxoproline plus cysteinylglycine (promoting apoptosis/ferroptosis on GSH depletion).
  Inherited defects cause hemolytic anemia (GCLC, GSR), glutathione synthetase deficiency / 5-oxoprolinuria
  (GSS), glutathionuria (GGT1) and 5-oxoprolinase deficiency (OPLAH).
status: DRAFT
evidence:
  - source_id: GO:0006750
    title: glutathione biosynthetic process
    statement: GCLC/GCLM and GSS carry out glutathione biosynthesis (GO:0006750).
  - source_id: GO:0006751
    title: glutathione catabolic process
    statement: GGT1, GGCT, OPLAH and CHAC1 mediate glutathione catabolism / the gamma-glutamyl cycle (GO:0006751).
  - source_id: file:human/GCLC/GCLC-ai-review.yaml
    title: GCLC gene review (human)
    statement: The rate-limiting gamma-glutamylcysteine synthesis step (UniProtKB:P48506, GO:0004357) matches the completed human GCLC review.
  - source_id: file:human/GCLM/GCLM-ai-review.yaml
    title: GCLM gene review (human)
    statement: The GCL modifier subunit (UniProtKB:P48507, GO:1990609 + GO:0017109) matches the completed human GCLM review.
  - source_id: file:human/GSS/GSS-ai-review.yaml
    title: GSS gene review (human)
    statement: The glutathione synthetase step (UniProtKB:P48637, GO:0004363) matches the completed human GSS review.
  - source_id: file:human/GSR/GSR-ai-review.yaml
    title: GSR gene review (human)
    statement: The GSSG->2 GSH recycling step (UniProtKB:P00390, GO:0004362) matches the completed human GSR review.
  - source_id: file:human/GGT1/GGT1-ai-review.yaml
    title: GGT1 gene review (human)
    statement: The extracellular gamma-glutamyl transfer step (UniProtKB:P19440, GO:0036374) matches the completed human GGT1 review.
  - source_id: file:human/GGCT/GGCT-ai-review.yaml
    title: GGCT gene review (human)
    statement: The gamma-glutamylcyclotransferase step (UniProtKB:O75223, GO:0003839) matches the completed human GGCT review.
  - source_id: file:human/OPLAH/OPLAH-ai-review.yaml
    title: OPLAH gene review (human)
    statement: The 5-oxoprolinase (cycle-closing) step (UniProtKB:O14841, GO:0017168) matches the completed human OPLAH review.
  - source_id: file:human/CHAC1/CHAC1-ai-review.yaml
    title: CHAC1 gene review (human)
    statement: The intracellular glutathione-degrading step (UniProtKB:Q9BUX1, GO:0061928) matches the completed human CHAC1 review.
module:
  id: glutathione_synthesis_gamma_glutamyl_cycle
  label: Glutathione synthesis, recycling, and the gamma-glutamyl cycle
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glutathione biosynthetic process
      term:
        id: GO:0006750
        label: glutathione biosynthetic process
      description: Two-step ATP-dependent synthesis of GSH (GCL then GSS).
    - preferred_term: glutathione catabolic process
      term:
        id: GO:0006751
        label: glutathione catabolic process
      description: GSH turnover via the gamma-glutamyl cycle (GGT1/GGCT/OPLAH) and intracellular CHAC1.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: GCL, GSS, GSR, GGCT, OPLAH and CHAC1 act in the cytosol.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: GGT1 is a cell-surface ectoenzyme initiating extracellular GSH breakdown.
  parts:
    - order: 1
      role: gamma-glutamylcysteine synthesis (rate-limiting)
      node:
        id: glutamate_cysteine_ligation
        label: Glutamate-cysteine ligase (GCLC catalytic + GCLM modifier)
        module_type: REACTION
        annotons:
          - id: gclc_activity
            label: "GCLC: glutamate-cysteine ligase (catalytic subunit)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GCLC / glutamate-cysteine ligase catalytic family
                term:
                  id: PANTHER:PTHR11164
                  label: GLUTAMATE-CYSTEINE LIGASE
                representative_members:
                  - preferred_term: GCLC (human)
                    term:
                      id: UniProtKB:P48506
                      label: Glutamate--cysteine ligase catalytic subunit
            function:
              preferred_term: glutamate-cysteine ligase activity
              term:
                id: GO:0004357
                label: glutamate-cysteine ligase activity
              substrates:
                - preferred_term: L-glutamate
                - preferred_term: L-cysteine
                - preferred_term: ATP
              products:
