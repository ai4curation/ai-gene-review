                  id: PANTHER:PTHR13295
                  label: GLUTAMATE-CYSTEINE LIGASE MODIFIER SUBUNIT
                representative_members:
                  - preferred_term: GCLM (human)
                    term:
                      id: UniProtKB:P48507
                      label: Glutamate--cysteine ligase regulatory subunit
            processes:
              - preferred_term: glutathione biosynthetic process
                term:
                  id: GO:0006750
                  label: glutathione biosynthetic process
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Non-catalytic modifier subunit (GO:1990609) forming the GCL holoenzyme (GO:0017109) with GCLC;
              lowers Km for glutamate/ATP and raises Ki for GSH feedback, greatly enhancing GCL efficiency.
    - order: 2
      role: glutathione synthesis (glycine addition)
