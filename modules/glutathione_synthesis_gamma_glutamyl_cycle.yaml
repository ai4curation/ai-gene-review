              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Adds glycine to gamma-glutamylcysteine, forming glutathione.
    - order: 3
      role: glutathione recycling (GSSG -> 2 GSH)
      node:
        id: glutathione_recycling
        label: Glutathione-disulfide reductase (GSR)
        module_type: REACTION
        annotons:
          - id: gsr_activity
            label: "GSR: glutathione reductase (FAD/NADPH)"
            participant:
              selector_type: FAMILY
              family:
