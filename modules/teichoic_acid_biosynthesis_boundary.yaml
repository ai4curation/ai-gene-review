id: MODULE:teichoic_acid_biosynthesis_boundary
title: Teichoic acid biosynthesis boundary
description: >-
  Boundary/absence module for KEGG ppu00552 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains only wbpM, an unresolved
  polysaccharide-biosynthesis/CapD-like membrane protein, and uppP, the shared
  undecaprenyl-diphosphatase/BacA carrier-recycling enzyme. This should not be
  interpreted as evidence for a complete Gram-positive wall or lipoteichoic acid
  biosynthesis pathway in KT2440.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00552
    title: Teichoic acid biosynthesis - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00552 provides the PSEPK curation batch. Its membership is
      limited to wbpM and uppP, so the map is treated as cell-envelope boundary
      context rather than a satisfiable teichoic-acid biosynthesis route.
module:
  id: teichoic_acid_biosynthesis_boundary
  label: Teichoic acid biosynthesis boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: teichoic acid biosynthesis boundary
      description: >-
        A negative/boundary interpretation of the KEGG map: KT2440 has no
        curated complete teichoic-acid pathway from the ppu00552 membership.
    - preferred_term: cell wall organization
      term:
        id: GO:0071555
        label: cell wall organization
      description: Broad cell-envelope context for the mapped genes.
    - preferred_term: peptidoglycan biosynthetic process
      term:
        id: GO:0009252
        label: peptidoglycan biosynthetic process
      description: UppP participates in peptidoglycan precursor carrier recycling rather than a teichoic-acid-specific route in this batch.
  context:
    cellular_components:
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Both mapped proteins are membrane-associated or predicted membrane proteins.
  parts:
    - order: 1
      role: Shared undecaprenyl carrier recycling
      node:
        id: uppP_shared_undecaprenyl_carrier_recycling
        label: UppP shared undecaprenyl carrier recycling
        module_type: REACTION
        description: >-
          UppP dephosphorylates undecaprenyl diphosphate to regenerate the
          undecaprenyl phosphate lipid carrier used in cell-envelope glycan
          biosynthesis. Its presence in ppu00552 is treated as shared carrier
          recycling, not as evidence for a complete teichoic-acid route.
        annotons:
          - id: uppP_undecaprenyl_diphosphatase_boundary
            label: "uppP: undecaprenyl-diphosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uppP
            function:
              preferred_term: undecaprenyl-diphosphatase activity
              term:
                id: GO:0050380
                label: undecaprenyl-diphosphatase activity
            role_description: Shared lipid-carrier recycling enzyme; boundary-only for teichoic acid biosynthesis in KT2440.
    - order: 2
      role: Unresolved envelope polysaccharide side candidate
      node:
        id: wbpM_unresolved_polysaccharide_boundary
        label: WbpM unresolved polysaccharide side candidate
        module_type: METABOLIC_PATHWAY
        description: >-
          WbpM is annotated only as a polysaccharide-biosynthesis/CapD-like
          membrane protein in the local first-pass evidence. It remains an
          unresolved envelope-polysaccharide side node and is not sufficient to
          satisfy a teichoic-acid biosynthesis pathway.
        annotons:
          - id: wbpM_unresolved_polysaccharide_context
            label: "wbpM: unresolved polysaccharide biosynthesis protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: wbpM
            role_description: Unresolved polysaccharide/CapD-like membrane protein; no specific teichoic-acid function assigned.
  notes: >-
    This module is intentionally named as a boundary/absence module. PSEPK is a
    Gram-negative bacterium, and the two ppu00552 mapped genes support shared
    cell-envelope context rather than a complete teichoic-acid biosynthetic
    route.
