id: MODULE:serotonin_melatonin_biosynthesis
title: Serotonin and melatonin biosynthesis (Trp -> 5-HTP -> serotonin -> N-acetylserotonin -> melatonin)
description: >-
  Serotonin (5-hydroxytryptamine) and the pineal hormone melatonin are the indoleamine products of a four-step
  pathway from the essential amino acid L-tryptophan. Tryptophan hydroxylase - the neuronal isoform TPH2 in
  brainstem raphe serotonergic neurons, the peripheral isoform TPH1 in gut enterochromaffin cells, pineal
  gland and skin - catalyses the rate-limiting hydroxylation of L-tryptophan to 5-hydroxy-L-tryptophan (5-HTP)
  using tetrahydrobiopterin (BH4), O2 and a non-heme Fe(II) centre. The shared aromatic-L-amino-acid
  decarboxylase (DDC/AADC, curated with the catecholamine pathway) decarboxylates 5-HTP to serotonin. In the
  pineal gland (and retina) serotonin is then converted to melatonin in two further steps that are gated by
  the circadian clock: serotonin N-acetyltransferase (AANAT, the "timezyme") N-acetylates serotonin to
  N-acetylserotonin using acetyl-CoA - the sharply night-elevated, cAMP/14-3-3-regulated rate-controlling step
  - and acetylserotonin O-methyltransferase (ASMT/HIOMT) O-methylates N-acetylserotonin to melatonin using
  S-adenosyl-L-methionine. Serotonin acts as a central and enteric neurotransmitter and platelet mediator,
  while melatonin signals darkness/photoperiod. Variants across the pathway are studied in mood, autism-
  spectrum and sleep phenotypes.
status: DRAFT
evidence:
  - source_id: GO:0042427
    title: serotonin biosynthetic process
    statement: TPH1/TPH2 + DDC synthesise serotonin from tryptophan (GO:0042427).
  - source_id: GO:0030187
    title: melatonin biosynthetic process
    statement: AANAT + ASMT convert serotonin to melatonin (GO:0030187).
  - source_id: file:human/TPH1/TPH1-ai-review.yaml
    title: TPH1 gene review (human)
    statement: Tryptophan 5-hydroxylase 1 (peripheral) (UniProtKB:P17752, GO:0004510) matches the completed human TPH1 review.
  - source_id: file:human/TPH2/TPH2-ai-review.yaml
    title: TPH2 gene review (human)
    statement: Tryptophan 5-hydroxylase 2 (neuronal) (UniProtKB:Q8IWU9, GO:0004510) matches the completed human TPH2 review.
  - source_id: file:human/DDC/DDC-ai-review.yaml
    title: DDC gene review (human)
    statement: Aromatic-L-amino-acid decarboxylase, 5-HTP branch (UniProtKB:P20711, GO:0036467) matches the completed human DDC review.
  - source_id: file:human/AANAT/AANAT-ai-review.yaml
    title: AANAT gene review (human)
    statement: Serotonin N-acetyltransferase (UniProtKB:Q16613, GO:0004059) matches the completed human AANAT review.
  - source_id: file:human/ASMT/ASMT-ai-review.yaml
    title: ASMT gene review (human)
    statement: Acetylserotonin O-methyltransferase (UniProtKB:P46597, GO:0017096) matches the completed human ASMT review.
