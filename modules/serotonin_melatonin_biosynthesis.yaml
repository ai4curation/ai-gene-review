  notes: >-
    Serotonin and melatonin biosynthesis (GO:0042427 -> GO:0030187), grounded to five completed human gene
    reviews (four new + the shared DDC, already merged). Route: TPH2 (Q8IWU9, neuronal) / TPH1 (P17752,
    peripheral/pineal) both PTHR11473 (same family as TH/PAH), GO:0004510, BH4/Fe(II), Trp -> 5-HTP (rate-
    limiting); DDC (P20711 PTHR11999, GO:0036467, PLP) 5-HTP -> serotonin (shared with the catecholamine
    module's catecholamine_biosynthesis); then the pineal melatonin steps: AANAT (Q16613 PTHR10908, GO:0004059,
    acetyl-CoA) serotonin -> N-acetylserotonin (the circadian "timezyme", cAMP/14-3-3-gated); ASMT/HIOMT
    (P46597 PTHR43712, GO:0017096, SAM) N-acetylserotonin -> melatonin. All cytosolic. Precursor tryptophan
    and BH4 come from separate pathways; DDC and TPH share the aromatic-amino-acid-hydroxylase/decarboxylase
    logic with the catecholamine pathway (TPH/TH same PANTHER family; DDC the common decarboxylase). Curation:
    TPH1 peripheral so neuron-projection IBA over-annotated (belongs to TPH2); AANAT's GO:0006474 N-terminal-
    protein-acetylation IDA is a small-molecule-vs-protein misclassification (over-annotated); ASMT's
    S-methyltransferase TAS is wrong branch (O-, not S-methylation). GO term ids/labels verified against the
    local go.db; module passes structural + term-label validation.
