id: MODULE:transition_metal_magnesium_cobalt_transport_boundary
title: Transition-metal, magnesium, and cobalt transport boundary
description: Boundary module for PSEPK CDF, ZIP, CorA/MgtE, NiCoT, CbiM/CbtA, and CorC/CNNM-UPF0053 transport-family entries
  from the transport ion/metal split.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_transition_metal_magnesium_cobalt_transporters.tsv
  title: PSEPK transition-metal/magnesium/cobalt transporter batch
  statement: The batch table records 15 PSEPK ion/metal-bucket genes assigned to transition-metal, magnesium, cobalt, nickel,
    zinc, and low-resolution metal-transporter context.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates this transporter-family set from P-type ATPases, monovalent-cation antiporters,
    redox spillovers, and membrane enzyme side nodes.
notes: 'First-pass interpretation: keep substrate calls evidence-driven. ZIP/CDF and MgtE/MIT entries keep specific metal
  calls where product/GOA support them; CmaX, PP_2955, CorC, PP_5322, and PP_0683 are kept broad when substrate specificity
  is unresolved; PP_3928 is regulatory/response context rather than a transporter pore.'
