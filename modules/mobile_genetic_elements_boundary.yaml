id: MODULE:mobile_genetic_elements_boundary
title: Mobile genetic element recombination, transposition, and retroelement boundary
description: Boundary module for PSEPK DNA-bucket and broad mobile-genetic-elements members that resolve to mobile-element
  integrase, resolvase, transposase, excisionase, YqaJ-like recombinase, reverse-transcriptase, or integration/transposition
  context rather than chromosome replication, homologous recombination, or DNA repair.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_dna_replication_repair_recombination_mobile_integrase_recombinase_transposase.tsv
  title: PSEPK mobile integrase/recombinase/transposase split table
  statement: The split table routes 25 DNA-bucket genes to mobile-element recombinase, integrase, transposase, excisionase,
    or YqaJ-like context.
- source_id: file:projects/P_PUTIDA/batches/module_dna_replication_repair_recombination_retroelement_reverse_transcriptase.tsv
  title: PSEPK retroelement reverse-transcriptase split table
  statement: The split table routes three DNA-bucket genes to reverse-transcriptase/retroelement context.
- source_id: file:projects/P_PUTIDA/batches/module_mobile_genetic_elements_transposase_goa_supported.tsv
  title: PSEPK mobile-genetic-elements GOA-supported transposase split table
  statement: The split table routes 18 broad mobile-genetic-elements genes to GOA-supported transposase or IS3/rve integration/transposition
    context.
- source_id: file:projects/P_PUTIDA/batches/module_mobile_genetic_elements_integrase_mobile_element_context.tsv
  title: PSEPK mobile-genetic-elements integrase split table
  statement: The split table routes three broad mobile-genetic-elements genes to integrase/mobile-element context.
- source_id: file:projects/P_PUTIDA/batches/module_mobile_genetic_elements_transposase_domain_or_fragment.tsv
  title: PSEPK mobile-genetic-elements domain-only/fragmentary transposase split table
  statement: The split table routes 22 broad mobile-genetic-elements genes to full IS66, isolated Orf2/TnpB, TniB/TniQ, DUF,
    product-only, or mixed-domain transposase-related evidence classes.
notes: First-pass boundary. PP_2495 is retained as an unresolved YqaJ viral recombinase-domain member with no GOA rows and
  no synthetic core GO function in its gene review. PP_0635 was already curated before this batch and is reused here with
  newly generated Asta provider coverage. The module:mobile_genetic_elements transposase_goa_supported sub-batch adds 18 broad-bucket
  genes; four IS3/rve-family records are kept as endonuclease/integration/transposition calls without synthetic transposase-activity
  rows. The module:mobile_genetic_elements integrase_mobile_element_context sub-batch adds three broad-bucket integrase candidates;
  PP_2825 is retained as a phage-integrase-family DNA-binding/integration protein, while PP_1963 and PP_3677 remain unresolved
  product-name-only candidates with no core GO function asserted. The transposase_domain_or_fragment sub-batch adds six full
  IS66 multi-domain proteins as domain-supported transposase/DNA-transposition annotons; isolated IS66 Orf2/TnpB, IS66-C-only,
  DUF6429, TniB/TniQ, mixed-domain, and product-only records remain curated as unresolved mobile-element context without core
  GO functions.
