id: MODULE:inorganic_ion_channel_resistance_boundary
title: Inorganic ion channel and resistance boundary
description: Boundary module for chromate, fluoride, and HlyIII-family inorganic-channel/resistance entries in the PSEPK transport
  ion/metal split.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_chromate_fluoride_and_other_inorganic_channels.tsv
  title: Inorganic ion channel and resistance boundary batch
  statement: The batch table records 3 PSEPK ion/metal-bucket genes assigned to this first-pass boundary module.
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_ion_metal_partition.tsv
  title: PSEPK transport ion/metal sub-bucket partition
  statement: The deeper ion/metal partition separates monovalent-cation systems, P-type metal ATPases, inorganic channels,
    transition-metal transporters, redox spillovers, and membrane metalloenzyme side nodes.
notes: 'First-pass interpretation: PP_2556 and fluC have substrate-specific chromate/fluoride support; PP_4986 is retained
  as an HlyIII-family pore-forming candidate with unresolved physiological substrate.'
