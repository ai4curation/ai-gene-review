knowledge_gaps:
  - gap_statement: 'Direct vs. Indirect Activation: Settled or Still Debated? remains unresolved in the
      Intrinsic apoptotic signaling pathway module.'
    boundary: While both direct and indirect activation models are supported by extensive 
      experimental evidence, their relative contributions in vivo remain context-dependent and 
      actively debated.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: The Nature of the Apoptosome In Vivo remains unresolved in the Intrinsic 
      apoptotic signaling pathway module.
    boundary: The classical view of the apoptosome as a discrete heptameric wheel has been 
      challenged by in-cell observations showing large, pleiomorphic, cloud-like APAF1 assemblies 
      that function as transient membrane-less compartments (borgeaud2025largetransientassemblies 
      pages 5-7).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Caspase-9 Activation Mechanism remains unresolved in the Intrinsic apoptotic 
      signaling pathway module.
    boundary: The substrate-dependent dimerization model proposed by Sever et al. (2023) challenges 
      simpler induced-proximity models of caspase-9 activation, demonstrating that caspase-9 
      molecules remain monomeric on the apoptosome until substrate is present 
      (sever2023activationofcaspase9 pages 1-2, sever2023activationofcaspase9 pages 11-11).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Minority MOMP and Its Biological Significance remains unresolved in the Intrinsic
      apoptotic signaling pathway module.
    boundary: 'The discovery that sublethal MOMP can drive inflammation, genomic instability, and senescence
      has opened an entirely new dimension of BCL2 family biology (victorelli2023apoptoticstresscauses
      pages 8-9, schofield2023regulatorsmountup pages 2-3). Key unresolved questions include: what determines
      whether MOMP is complete or partial? How do cells calibrate the fraction of mitochondria that undergo
      permeabilization?'
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Evolutionary Divergence and Model Organism Extrapolation remains unresolved in 
      the Intrinsic apoptotic signaling pathway module.
    boundary: The demonstration that caspase-9 is deuterostome-specific, and that *C. elegans* and 
      *Drosophila* apoptosis does not depend on cytochrome c release or MOMP, urges caution in 
      extrapolating findings across species (horkan2024evolutionofapoptotic pages 1-2, 
      krasovec2024intrinsicapoptosisis pages 2-3, krasovec2024intrinsicapoptosisis pages 1-1).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Non-Apoptotic Functions of BCL2 Family Proteins remains unresolved in the 
      Intrinsic apoptotic signaling pathway module.
    boundary: BCL2 family members regulate ER calcium homeostasis, autophagy, mitochondrial 
      dynamics, and mitophagy (lalier2022bcl2familymembers pages 14-16, vogler2025thebcl2family 
      pages 3-5).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/intrinsic_apoptotic_signaling-deep-research-falcon.md
  - gap_statement: Pore Structure and Mechanism of Membrane Permeabilization remains unresolved in 
      the Intrinsic apoptotic signaling pathway module.
    boundary: Despite decades of research, the precise mechanism by which BAX/BAK oligomers 
      permeabilize lipid bilayers remains elusive. BAX forms larger pores more slowly than BAK, and 
      pore growth dynamics differ between the two effectors-cells expressing predominantly BAK 
      release mtDNA faster (bock2023whencelldeath pages 5-6).
    gap_kind:
