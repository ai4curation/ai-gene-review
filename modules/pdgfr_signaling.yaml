knowledge_gaps:
  - gap_statement: Receptor activation mechanism remains unresolved in the PDGFR signaling pathway 
      module.
    boundary: Despite decades of study, the precise mechanism by which ligand binding propagates 
      through the transmembrane domain to activate the kinase remains incompletely understood.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: Endosomal versus surface signaling remains unresolved in the PDGFR signaling 
      pathway module.
    boundary: Whether PDGFR signals predominantly from the plasma membrane or from endosomes remains
      an area of active investigation. Evidence shows PDGFRbeta recruits adaptors at endosomes and 
      that dynamin-dependent internalization is required for STAT3 activation, but the quantitative 
      contribution of endosomal signaling to overall output is uncertain 
      (rogers2020theemergingcomplexity pages 6-8, rogers2020theemergingcomplexity pag...
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: PDGFRalpha versus PDGFRbeta signaling specificity remains unresolved in the PDGFR
      signaling pathway module.
    boundary: While PDGFRalpha and PDGFRbeta share similar intracellular domain architecture and 
      recruit overlapping sets of SH2-domain effectors, they produce different biological outcomes.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: Heterodimer biology remains unresolved in the PDGFR signaling pathway module.
    boundary: The PDGFRalphabeta heterodimer is the least characterized receptor species. Its 
      formation is driven by PDGF-BB and PDGF-AB, but its signaling properties and biological 
      functions remain poorly understood compared to the homodimers 
      (solinc2022theplateletderivedgrowth pages 3-4, kadrmas2020geneticanalysesin pages 1-2).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: Ligand-receptor cross-reactivity remains unresolved in the PDGFR signaling 
      pathway module.
    boundary: Recent work has challenged the canonical model of PDGF ligand specificity, 
      demonstrating that PDGF-AB can robustly activate PDGFRbeta homodimers and that PDGFRalpha is 
      capable of eliciting biological responses previously attributed exclusively to PDGFRbeta, such
      as circular dorsal ruffle formation (kadrmas2020geneticanalysesin pages 1-2, 
      kadrmas2020geneticanalysesin pages 7-9).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: Therapeutic challenges remains unresolved in the PDGFR signaling pathway module.
    boundary: While tyrosine kinase inhibitors (imatinib, dasatinib, avapritinib) have demonstrated 
      efficacy against specific PDGFR-driven conditions, the broad expression of PDGFRs in normal 
      mesenchymal tissues creates challenges for therapeutic specificity. The PDGFRA D842V mutation 
      in GIST is resistant to imatinib but sensitive to avapritinib (guerit2021pdgfreceptormutations
      pages 8-9).
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/pdgfr_signaling-deep-research-falcon.md
  - gap_statement: Pericyte plasticity remains unresolved in the PDGFR signaling pathway module.
    boundary: Whether pericytes genuinely transdifferentiate into myofibroblasts during fibrosis or 
      whether apparent pericyte-to-myofibroblast transition reflects selection of pre-existing 
      subpopulations remains contested.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
