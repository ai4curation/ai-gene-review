id: MODULE:conidiation_regulatory_cascade
title: Conidiation central regulatory cascade (Aspergillus paradigm)
description: >-
  The central genetic regulatory cascade that commits vegetative hyphae to asexual sporulation in
  Aspergillus nidulans: an upstream developmental-competence signal (FluG and the Flb factors)
  induces the master regulator BrlA, which activates the middle regulator AbaA and then the late
  regulator WetA together with the velvet complex (VosA/VelB), driving conidiophore morphogenesis,
  conidium (spore) formation and maturation, and the structural output of the spore wall
  (hydrophobin rodlet layer and DHN/pigment biosynthesis). Proliferation signaling through the
  heterotrimeric G protein (FadA) and its RGS attenuator FlbA gate entry into the program.
status: DRAFT
scope: CONCRETE
evidence:
  - source_id: GO:0048315
    title: conidium formation
    statement: >-
      Primary spore-cell axis concept for the module. Note GO:0061794 "conidium development" is being
      obsoleted as an unnecessary grouping term (geneontology/go-ontology#32315); GO:0048315 is the
      surviving specific term.
  - source_id: GO:0070787
    title: conidiophore development
    statement: >-
      Second, structural axis concept. On the reproductive-structure-development branch and NOT a
      descendant of conidium formation; the cascade drives both axes (BrlA/AbaA build the conidiophore,
      WetA/velvet mature the spore).
  - source_id: file:projects/CONIDIATION.md
    title: Conidiation regulatory cascade module design proposal
    statement: >-
      Module boundary, part decomposition, two-axis ontology analysis, and the annotation-inconsistency
      caveat (most conidiation annotation piles onto the broad asexual sporulation grouping term rather
      than the specific conidium/conidiophore terms) are recorded in the project design page.
notes: >-
  Concrete Aspergillus nidulans instance. Every participant is grounded in a verified UniProtKB
  accession resolved from UniProt (taxon 162425); reviewed (Swiss-Prot) entries are used where
  available. This can later be generalized to an ABSTRACT reusable module with taxon variant_sets
  (adding the Neurospora crassa fl/acon/WCC macroconidiation program). PANTHER PTN ancestral-node
  grounding was intentionally deferred; participants use concrete GENE_PRODUCT selectors with
  verified accessions. Molecular-function terms are placed on the leaf annotons that perform the
  activity, not on the process-level module concepts.
module:
  id: conidiation_regulatory_cascade
  label: Conidiation central regulatory cascade
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
    - preferred_term: conidium formation
      term:
        id: GO:0048315
        label: conidium formation
      description: >-
        Production of non-motile asexual spores (conidia) by mitotic reproduction; the spore-cell axis
        of the program (WetA/velvet maturation output).
    - preferred_term: conidiophore development
      term:
        id: GO:0070787
        label: conidiophore development
      description: >-
        Development of the specialized aerial conidiophore that bears the conidia; the structural axis
        of the program (BrlA/AbaA morphogenetic output).
  context:
    taxa:
      - preferred_term: Aspergillus nidulans
        term:
          id: NCBITaxon:162425
          label: Aspergillus nidulans
    cellular_components:
      - preferred_term: nucleus
        term:
          id: GO:0005634
          label: nucleus
        description: Site of the transcription-factor relay (FluG/Flb, BrlA, AbaA, WetA, velvet).
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: Locus of G-protein proliferation signaling (FadA/SfaD/GpgA) and FlbA attenuation.
      - preferred_term: extracellular region
        term:
          id: GO:0005576
          label: extracellular region
        description: Compartment of the FluG-dependent extracellular developmental signal and the rodlet layer.
  parts:
    - order: 1
      role: developmental competence / upstream activation
      node:
        id: upstream_activation
        label: Developmental competence and upstream activation
        module_type: REGULATORY_STEP
        description: >-
          FluG generates a low-molecular-weight extracellular signal that relieves repression by SfgA;
          the fluffy (Flb) transcription factors FlbB, FlbC and FlbD (with FlbE) then converge to induce
          the master regulator brlA.
        annotons:
          - id: fluG
            label: FluG developmental signal factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FluG
                term:
                  id: UniProtKB:P38094
                  label: Protein fluG
            role_description: >-
              Synthesizes the diffusible extracellular factor required to trigger conidiation; loss gives
              a fluffy aconidial colony.
          - id: flbB
            label: FlbB bZIP factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbB
                term:
                  id: UniProtKB:C8VBM8
                  label: Developmental regulator flbB
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: bZIP transcription factor acting upstream of brlA.
          - id: flbC
            label: FlbC C2H2 factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbC
                term:
                  id: UniProtKB:G5EAS8
                  label: C2H2-type domain-containing protein FlbC
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: C2H2 zinc-finger transcription factor contributing to brlA induction.
          - id: flbD
            label: FlbD Myb factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbD
                term:
                  id: UniProtKB:G5EAY5
                  label: MYB family conidiophore development protein FlbD
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: cMyb-family transcription factor acting with FlbB to activate brlA.
          - id: flbE
            label: FlbE accessory factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbE
                term:
                  id: UniProtKB:Q5BFF9
                  label: FlbE
            role_description: Accessory factor that interacts with FlbB and is required for its activity.
    - order: 2
      role: master-switch induction
      node:
        id: brla_induction
        label: BrlA master-switch induction
        module_type: REGULATORY_STEP
        description: >-
          BrlA, a C2H2 zinc-finger transcription factor, is the master regulator whose activation switches
          hyphal growth to conidiophore development.
        annotons:
          - id: brlA
            label: BrlA master regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: BrlA
                term:
                  id: UniProtKB:P10069
                  label: C2H2 type master regulator of conidiophore development brlA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
              - preferred_term: conidiophore development
                term:
                  id: GO:0070787
                  label: conidiophore development
            role_description: >-
              Master switch; required for conidiophore vesicle and sterigmata formation. brlA mutants
              form bristle-like stalks without conidia.
    - order: 3
      role: phialide differentiation (mid-development)
      node:
        id: abaa_differentiation
        label: AbaA phialide differentiation
        module_type: REGULATORY_STEP
        description: >-
          AbaA, a TEA/ATTS-domain transcription factor activated by BrlA during mid-development, drives
          differentiation of the spore-producing phialides.
        annotons:
          - id: abaA
            label: AbaA middle regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: AbaA
                term:
                  id: UniProtKB:P20945
                  label: Conidiophore development regulator abaA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
              - preferred_term: conidiophore development
                term:
                  id: GO:0070787
                  label: conidiophore development
            role_description: >-
              TEA/ATTS transcription factor for phialide differentiation; abaA mutants form beaded
              (abacus) chains instead of conidia.
    - order: 4
      role: spore maturation and dormancy (WetA + velvet)
      node:
        id: weta_maturation
        label: WetA and velvet-complex spore maturation
        module_type: REGULATORY_STEP
        description: >-
          AbaA activates wetA, which together with the velvet-complex regulators VosA and VelB (with VeA
          and the methyltransferase LaeA) drives spore-specific gene expression, conidial wall maturation,
          trehalose biosynthesis, dormancy and stress resistance.
        annotons:
          - id: wetA
            label: WetA late regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WetA
                term:
                  id: UniProtKB:P22022
                  label: Developmental regulatory protein wetA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
              - preferred_term: conidium formation
                term:
                  id: GO:0048315
                  label: conidium formation
            role_description: >-
              Late regulator of conidium-specific gene expression and wall maturation; wetA mutants make
              conidia that autolyse (wet-white).
          - id: vosA
            label: VosA velvet regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VosA
                term:
                  id: UniProtKB:Q5BBX1
                  label: Spore development regulator vosA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
              - preferred_term: conidium formation
                term:
                  id: GO:0048315
                  label: conidium formation
            role_description: >-
              Velvet-family regulator of spore maturation, trehalose biosynthesis and dormancy; represses
              premature germination.
          - id: velB
            label: VelB velvet subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VelB
                term:
                  id: UniProtKB:C8VTS4
                  label: Velvet complex subunit B
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: Velvet-complex subunit partnering VosA in spore maturation.
          - id: veA
            label: VeA velvet subunit (light regulator)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VeA
                term:
                  id: UniProtKB:C8VTV4
                  label: Developmental and secondary metabolism regulator veA
            role_description: >-
              Light-responsive bridging subunit of the velvet complex coordinating the asexual/sexual
              developmental balance; nuclear import is favored in the dark.
          - id: laeA
            label: LaeA velvet methyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LaeA
                term:
                  id: UniProtKB:C8VQG9
                  label: Protein-methionine methyltransferase laeA
            function:
              preferred_term: methyltransferase activity
              term:
                id: GO:0008168
                label: methyltransferase activity
            role_description: >-
              Velvet-complex methyltransferase linking development to secondary metabolism.
    - order: 5
      role: structural output (spore wall and pigment)
      node:
        id: structural_output
        label: Conidial wall and pigment structural output
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Late-activated structural genes build the mature conidial surface: class I hydrophobins RodA and
          DewA form the hydrophobic rodlet layer, and the WA polyketide synthase with the YA laccase
          produce the conidial green (DHN-derived) pigment.
        annotons:
          - id: rodA
            label: RodA rodlet hydrophobin
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: RodA
                term:
                  id: UniProtKB:P28346
                  label: Class I hydrophobin rodA
            function:
              preferred_term: structural molecule activity
              term:
                id: GO:0005198
                label: structural molecule activity
            role_description: Principal rodlet-layer hydrophobin conferring conidial surface hydrophobicity.
          - id: dewA
            label: DewA spore-wall hydrophobin
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: DewA
                term:
                  id: UniProtKB:P52750
                  label: Class I hydrophobin dewA
            function:
              preferred_term: structural molecule activity
              term:
                id: GO:0005198
                label: structural molecule activity
            role_description: Second conidial hydrophobin contributing to spore-wall surface properties.
          - id: wA
            label: WA conidial pigment polyketide synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WA
                term:
                  id: UniProtKB:Q03149
                  label: Conidial yellow pigment biosynthesis polyketide synthase
            function:
              preferred_term: polyketide synthase activity
              term:
                id: GO:0016218
                label: polyketide synthase activity
            role_description: >-
              Polyketide synthase producing the naphthopyrone precursor of the conidial pigment; wA
              mutants have white conidia.
          - id: yA
            label: YA conidial laccase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: YA
                term:
                  id: UniProtKB:P17489
                  label: Laccase-1 (conidial laccase)
            function:
              preferred_term: oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor
              term:
                id: GO:0016682
                label: oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor
            role_description: >-
              Conidial laccase (p-diphenol oxidase) converting the WA-derived pigment intermediate to the
              mature green pigment; yA mutants have yellow conidia.
    - order: 6
      role: repressive gating (proliferation signaling and its attenuation)
      node:
        id: repressive_gating
        label: G-protein proliferation signaling and FlbA attenuation
        module_type: REGULATORY_STEP
        description: >-
          The heterotrimeric G protein (FadA-alpha, SfaD-beta, GpgA-gamma) promotes vegetative
          proliferation and represses conidiation; the RGS protein FlbA attenuates FadA signaling to
          license development. SfgA is a negative regulator downstream of FluG.
        annotons:
          - id: fadA
            label: FadA G-protein alpha subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FadA
                term:
                  id: UniProtKB:Q00743
                  label: Guanine nucleotide-binding protein subunit alpha (FadA)
            function:
              preferred_term: G protein activity
              term:
                id: GO:0003925
                label: G protein activity
            role_description: >-
              Galpha subunit; active GTP-bound FadA drives proliferation and blocks conidiation.
          - id: sfaD
            label: SfaD G-protein beta subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SfaD
                term:
                  id: UniProtKB:Q5BH99
                  label: Guanine nucleotide-binding protein subunit beta (SfaD)
            role_description: Gbeta subunit of the proliferation-promoting heterotrimeric G protein.
          - id: gpgA
            label: GpgA G-protein gamma subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GpgA
                term:
                  id: UniProtKB:Q5B9N8
                  label: Guanine nucleotide-binding protein subunit gamma (GpgA)
            role_description: Ggamma subunit of the proliferation-promoting heterotrimeric G protein.
          - id: flbA
            label: FlbA regulator of G-protein signaling
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbA
                term:
                  id: UniProtKB:P38093
                  label: Developmental regulator flbA
            function:
              preferred_term: GTPase activator activity
              term:
                id: GO:0005096
                label: GTPase activator activity
            role_description: >-
              RGS protein that stimulates FadA GTP hydrolysis, dampening proliferation signaling so
              conidiation can proceed; flbA mutants are fluffy and aconidial.
          - id: sfgA
            label: SfgA negative regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SfgA
                term:
                  id: UniProtKB:Q3I5F3
                  label: SfgA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: >-
              Zn(II)2Cys6 negative regulator acting downstream of FluG and upstream of the Flb factors;
              FluG signaling relieves SfgA repression.
  connections:
    - source: upstream_activation
      target: brla_induction
      connection_type: POSITIVELY_REGULATES
      description: FluG/Flb developmental competence induces the master regulator brlA.
    - source: brla_induction
      target: abaa_differentiation
      connection_type: CAUSES
      description: BrlA activates abaA during mid-development.
    - source: abaa_differentiation
      target: weta_maturation
      connection_type: CAUSES
      description: AbaA activates wetA and the maturation program.
    - source: weta_maturation
      target: structural_output
      connection_type: POSITIVELY_REGULATES
      description: WetA/velvet late regulation switches on spore-wall and pigment structural genes.
    - source: repressive_gating
      target: upstream_activation
      connection_type: NEGATIVELY_REGULATES
      description: Active FadA/G-protein proliferation signaling represses entry into the conidiation program.
    - source: flbA
      target: fadA
      connection_type: NEGATIVELY_REGULATES
      description: FlbA (RGS) attenuates FadA GTPase signaling, relieving repression of conidiation.
    - source: fluG
      target: sfgA
      connection_type: NEGATIVELY_REGULATES
      description: FluG-dependent signaling relieves SfgA-mediated repression of the Flb activators.
