id: MODULE:conidiation_regulatory_cascade
title: Conidiation (asexual sporulation) central regulatory cascade
description: 'A reusable module for the central genetic regulatory cascade that commits vegetative hyphae
  to asexual sporulation (conidiation) in filamentous ascomycetes. The shared logic - light/nutrient gating
  -> a master transcriptional activator -> stage-specific regulators -> structural output (hydrophobin
  rodlet layer and pigment) - is realized by two largely non-orthologous programs, captured as taxon variants:
  the Aspergillus nidulans FluG/Flb -> BrlA -> AbaA -> WetA/velvet pathway with G-protein/FlbA gating,
  and the Neurospora crassa fluffy (FL) program gated by the blue-light White Collar Complex and the circadian
  clock.'
status: DRAFT
scope: ABSTRACT
evidence:
- source_id: GO:0048315
  title: conidium formation
  statement: Primary spore-cell axis concept for the module. Note GO:0061794 "conidium development" is
    being obsoleted as an unnecessary grouping term (geneontology/go-ontology#32315); GO:0048315 is the
    surviving specific term.
- source_id: GO:0070787
  title: conidiophore development
  statement: Second, structural axis concept. On the reproductive-structure-development branch and NOT
    a descendant of conidium formation; the cascade drives both axes (BrlA/AbaA build the conidiophore,
    WetA/velvet mature the spore).
- source_id: file:projects/CONIDIATION.md
  title: Conidiation regulatory cascade module design proposal
  statement: Module boundary, part decomposition, two-axis ontology analysis, and the annotation-inconsistency
    caveat (most conidiation annotation piles onto the broad asexual sporulation grouping term rather
    than the specific conidium/conidiophore terms) are recorded in the project design page.
- source_id: UniProtKB:O13360
  title: Conidial development protein fluffy (Neurospora crassa)
  statement: FL (fluffy), a Gal4-type Zn(II)2Cys6 transcription factor, grounds the master-activation
    role of the Neurospora macroconidiation variant.
- source_id: NCBITaxon:367110
  title: Neurospora crassa OR74A
  statement: Taxon of the second variant; Neurospora forms macroconidia by budding of aerial hyphae rather
    than on a dedicated conidiophore.
notes: 'Reusable ABSTRACT module with two taxon variants (EXACTLY_ONE): the Aspergillus nidulans BrlA
  central-regulatory-pathway paradigm and the Neurospora crassa fluffy/WCC-clock macroconidiation program.
  All 28 grounded genes have validated gene reviews (genes/EMENI/ and genes/NEUCR/). Conserved-role annotons
  are grounded as FAMILY selectors with a PANTHER PTHR family term, a verified UniProtKB representative
  member, and PAINT ancestral_nodes (PANTHER:PTN...) taken from the GOA WITH/FROM evidence on each gene''s
  IBA annotations (GO_REF:0000033); PTN ids were never guessed. Nodes propagating terms flagged in the
  gene reviews were deliberately excluded (e.g. the flbD cell-cycle node PTN000067791 and the wA oxidoreductase
  node PTN002453893). Species-specific members without an IBD node (fluG, flbE, sfgA, rodA, dewA, wA,
  FL, FRQ, EAS, CON-10) remain GENE_PRODUCT selectors grounded by verified UniProtKB accessions. Molecular-function
  terms are on the leaf annotons.'
module:
