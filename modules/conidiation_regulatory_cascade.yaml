  label: Asexual sporulation (conidiation) central regulatory cascade
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
  - preferred_term: conidium formation
    term:
      id: GO:0048315
      label: conidium formation
    description: Production of non-motile asexual spores (conidia) by mitotic reproduction - the shared
      output of both paradigms.
  context:
    taxa:
    - preferred_term: Pezizomycotina
      term:
        id: NCBITaxon:147538
        label: Pezizomycotina
  variant_sets:
  - id: conidiation_paradigm_variants
