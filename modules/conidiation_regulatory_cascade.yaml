id: MODULE:conidiation_regulatory_cascade
title: Conidiation (asexual sporulation) central regulatory cascade
description: 'A reusable module for the central genetic regulatory cascade that commits vegetative hyphae
  to asexual sporulation (conidiation) in filamentous ascomycetes. The shared logic - light/nutrient gating
  -> a master transcriptional activator -> stage-specific regulators -> structural output (hydrophobin
  rodlet layer and pigment) - is realized by two largely non-orthologous programs, captured as taxon variants:
  the Aspergillus nidulans FluG/Flb -> BrlA -> AbaA -> WetA/velvet pathway with G-protein/FlbA gating,
  and the Neurospora crassa fluffy (FL) program gated by the blue-light White Collar Complex and the circadian
  clock.'
status: DRAFT
scope: ABSTRACT
evidence:
- source_id: GO:0048315
  title: conidium formation
  statement: Primary spore-cell axis concept for the module. Note GO:0061794 "conidium development" is
    being obsoleted as an unnecessary grouping term (geneontology/go-ontology#32315); GO:0048315 is the
    surviving specific term.
- source_id: GO:0070787
  title: conidiophore development
  statement: Second, structural axis concept. On the reproductive-structure-development branch and NOT
    a descendant of conidium formation; the cascade drives both axes (BrlA/AbaA build the conidiophore,
    WetA/velvet mature the spore).
- source_id: file:projects/CONIDIATION.md
  title: Conidiation regulatory cascade module design proposal
  statement: Module boundary, part decomposition, two-axis ontology analysis, and the annotation-inconsistency
    caveat (most conidiation annotation piles onto the broad asexual sporulation grouping term rather
    than the specific conidium/conidiophore terms) are recorded in the project design page.
- source_id: UniProtKB:O13360
  title: Conidial development protein fluffy (Neurospora crassa)
  statement: FL (fluffy), a Gal4-type Zn(II)2Cys6 transcription factor, grounds the master-activation
    role of the Neurospora macroconidiation variant.
- source_id: NCBITaxon:367110
  title: Neurospora crassa OR74A
  statement: Taxon of the second variant; Neurospora forms macroconidia by budding of aerial hyphae rather
    than on a dedicated conidiophore.
notes: 'Reusable ABSTRACT module with two taxon variants (EXACTLY_ONE): the Aspergillus nidulans BrlA
  central-regulatory-pathway paradigm (fully curated - all 21 member genes have validated gene reviews
  under genes/EMENI/) and the Neurospora crassa fluffy/WCC-clock macroconidiation program (grounded in
  verified UniProtKB exemplars; full gene reviews are a tracked follow-up). Every participant is grounded
  in a verified UniProtKB accession. The two programs share developmental logic but are largely non-orthologous.
  PANTHER PTN ancestral-node grounding intentionally deferred; molecular-function terms are placed on
  the leaf annotons that perform the activity.'
module:
  id: conidiation_regulatory_cascade
  label: Asexual sporulation (conidiation) central regulatory cascade
  module_type: DEVELOPMENTAL_PROCESS
  concepts:
  - preferred_term: conidium formation
    term:
      id: GO:0048315
      label: conidium formation
    description: Production of non-motile asexual spores (conidia) by mitotic reproduction - the shared
      output of both paradigms.
  context:
    taxa:
    - preferred_term: Pezizomycotina
      term:
        id: NCBITaxon:147538
        label: Pezizomycotina
  variant_sets:
  - id: conidiation_paradigm_variants
    label: Taxon-specific realizations of the conidiation regulatory cascade
    axis: fungal lineage / taxon
    selection: EXACTLY_ONE
    variants:
    - id: aspergillus_paradigm
      label: Aspergillus paradigm (BrlA central regulatory pathway)
      module_type: DEVELOPMENTAL_PROCESS
      description: 'The Aspergillus nidulans realization of the conidiation cascade: FluG/Flb upstream
        activators induce the C2H2 master regulator BrlA, which activates AbaA and then WetA plus the
        velvet complex (VosA/VelB/VeA/LaeA), building a multicellular conidiophore and maturing the conidia.
        G-protein (FadA) proliferation signaling, attenuated by the RGS protein FlbA, gates entry.'
      concepts:
      - preferred_term: conidiophore development
        term:
          id: GO:0070787
          label: conidiophore development
        description: Aspergillus builds a dedicated multicellular conidiophore (stalk, vesicle, metulae,
          phialides); the structural axis specific to this paradigm.
      context:
        taxa:
        - preferred_term: Aspergillus nidulans
          term:
            id: NCBITaxon:162425
            label: Aspergillus nidulans
      parts:
      - order: 1
        role: developmental competence / upstream activation
        node:
          id: upstream_activation
          label: Developmental competence and upstream activation
          module_type: REGULATORY_STEP
          description: FluG generates a low-molecular-weight extracellular signal that relieves repression
            by SfgA; the fluffy (Flb) transcription factors FlbB, FlbC and FlbD (with FlbE) then converge
            to induce the master regulator brlA.
          annotons:
          - id: fluG
            label: FluG developmental signal factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FluG
                term:
                  id: UniProtKB:P38094
                  label: Protein fluG
            role_description: Synthesizes the diffusible extracellular factor required to trigger conidiation;
              loss gives a fluffy aconidial colony.
          - id: flbB
            label: FlbB bZIP factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbB
                term:
                  id: UniProtKB:C8VBM8
                  label: Developmental regulator flbB
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: bZIP transcription factor acting upstream of brlA.
          - id: flbC
            label: FlbC C2H2 factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbC
                term:
                  id: UniProtKB:G5EAS8
                  label: C2H2-type domain-containing protein FlbC
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: C2H2 zinc-finger transcription factor contributing to brlA induction.
          - id: flbD
            label: FlbD Myb factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbD
                term:
                  id: UniProtKB:G5EAY5
                  label: MYB family conidiophore development protein FlbD
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: cMyb-family transcription factor acting with FlbB to activate brlA.
          - id: flbE
            label: FlbE accessory factor
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbE
                term:
                  id: UniProtKB:Q5BFF9
                  label: FlbE
            role_description: Accessory factor that interacts with FlbB and is required for its activity.
      - order: 2
        role: master-switch induction
        node:
          id: brla_induction
          label: BrlA master-switch induction
          module_type: REGULATORY_STEP
          description: BrlA, a C2H2 zinc-finger transcription factor, is the master regulator whose activation
            switches hyphal growth to conidiophore development.
          annotons:
          - id: brlA
            label: BrlA master regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: BrlA
                term:
                  id: UniProtKB:P10069
                  label: C2H2 type master regulator of conidiophore development brlA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
            - preferred_term: conidiophore development
              term:
                id: GO:0070787
                label: conidiophore development
            role_description: Master switch; required for conidiophore vesicle and sterigmata formation.
              brlA mutants form bristle-like stalks without conidia.
      - order: 3
        role: phialide differentiation (mid-development)
        node:
          id: abaa_differentiation
          label: AbaA phialide differentiation
          module_type: REGULATORY_STEP
          description: AbaA, a TEA/ATTS-domain transcription factor activated by BrlA during mid-development,
            drives differentiation of the spore-producing phialides.
          annotons:
          - id: abaA
            label: AbaA middle regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: AbaA
                term:
                  id: UniProtKB:P20945
                  label: Conidiophore development regulator abaA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
            - preferred_term: conidiophore development
              term:
                id: GO:0070787
                label: conidiophore development
            role_description: TEA/ATTS transcription factor for phialide differentiation; abaA mutants
              form beaded (abacus) chains instead of conidia.
      - order: 4
        role: spore maturation and dormancy (WetA + velvet)
        node:
          id: weta_maturation
          label: WetA and velvet-complex spore maturation
          module_type: REGULATORY_STEP
          description: AbaA activates wetA, which together with the velvet-complex regulators VosA and
            VelB (with VeA and the methyltransferase LaeA) drives spore-specific gene expression, conidial
            wall maturation, trehalose biosynthesis, dormancy and stress resistance.
          annotons:
          - id: wetA
            label: WetA late regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WetA
                term:
                  id: UniProtKB:P22022
                  label: Developmental regulatory protein wetA
            processes:
            - preferred_term: conidium formation
              term:
                id: GO:0048315
                label: conidium formation
            - preferred_term: asexual spore wall assembly
              term:
                id: GO:0042243
                label: asexual spore wall assembly
            role_description: Late regulator of conidium-specific gene expression and wall maturation;
              wetA mutants make conidia that autolyse (wet-white). Acts as a developmental regulator of
              gene expression; a specific sequence-specific DNA-binding activity is not firmly established,
              so no molecular function term is asserted (see gene review).
          - id: vosA
            label: VosA velvet regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VosA
                term:
                  id: UniProtKB:Q5BBX1
                  label: Spore development regulator vosA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            processes:
            - preferred_term: conidium formation
              term:
                id: GO:0048315
                label: conidium formation
            role_description: Velvet-family regulator of spore maturation, trehalose biosynthesis and
              dormancy; represses premature germination.
          - id: velB
            label: VelB velvet subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VelB
                term:
                  id: UniProtKB:C8VTS4
                  label: Velvet complex subunit B
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: Velvet-complex subunit partnering VosA in spore maturation.
          - id: veA
            label: VeA velvet subunit (light regulator)
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: VeA
                term:
                  id: UniProtKB:C8VTV4
                  label: Developmental and secondary metabolism regulator veA
            role_description: Light-responsive bridging subunit of the velvet complex coordinating the
              asexual/sexual developmental balance; nuclear import is favored in the dark.
          - id: laeA
            label: LaeA velvet methyltransferase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: LaeA
                term:
                  id: UniProtKB:C8VQG9
                  label: Protein-methionine methyltransferase laeA
            function:
              preferred_term: methyltransferase activity
              term:
                id: GO:0008168
                label: methyltransferase activity
            role_description: Velvet-complex methyltransferase linking development to secondary metabolism.
      - order: 5
        role: structural output (spore wall and pigment)
        node:
          id: structural_output
          label: Conidial wall and pigment structural output
          module_type: BIOLOGICAL_PROCESS
          description: 'Late-activated structural genes build the mature conidial surface: class I hydrophobins
            RodA and DewA form the hydrophobic rodlet layer, and the WA polyketide synthase with the YA
            laccase produce the conidial green (DHN-derived) pigment.'
          annotons:
          - id: rodA
            label: RodA rodlet hydrophobin
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: RodA
                term:
                  id: UniProtKB:P28346
                  label: Class I hydrophobin rodA
            function:
              preferred_term: structural constituent of cell wall
              term:
                id: GO:0005199
                label: structural constituent of cell wall
            role_description: Principal rodlet-layer hydrophobin conferring conidial surface hydrophobicity.
          - id: dewA
            label: DewA spore-wall hydrophobin
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: DewA
                term:
                  id: UniProtKB:P52750
                  label: Class I hydrophobin dewA
            function:
              preferred_term: structural constituent of cell wall
              term:
                id: GO:0005199
                label: structural constituent of cell wall
            role_description: Second conidial hydrophobin contributing to spore-wall surface properties.
          - id: wA
            label: WA conidial pigment polyketide synthase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WA
                term:
                  id: UniProtKB:Q03149
                  label: Conidial yellow pigment biosynthesis polyketide synthase
            function:
              preferred_term: polyketide synthase activity
              term:
                id: GO:0016218
                label: polyketide synthase activity
            role_description: Polyketide synthase producing the naphthopyrone precursor of the conidial
              pigment; wA mutants have white conidia.
          - id: yA
            label: YA conidial laccase
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: YA
                term:
                  id: UniProtKB:P17489
                  label: Laccase-1 (conidial laccase)
            function:
              preferred_term: hydroquinone:oxygen oxidoreductase activity
              term:
                id: GO:0052716
                label: hydroquinone:oxygen oxidoreductase activity
            role_description: Conidial laccase (p-diphenol oxidase) converting the WA-derived pigment
              intermediate to the mature green pigment; yA mutants have yellow conidia.
      - order: 6
        role: repressive gating (proliferation signaling and its attenuation)
        node:
          id: repressive_gating
          label: G-protein proliferation signaling and FlbA attenuation
          module_type: REGULATORY_STEP
          description: The heterotrimeric G protein (FadA-alpha, SfaD-beta, GpgA-gamma) promotes vegetative
            proliferation and represses conidiation; the RGS protein FlbA attenuates FadA signaling to
            license development. SfgA is a negative regulator downstream of FluG.
          annotons:
          - id: fadA
            label: FadA G-protein alpha subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FadA
                term:
                  id: UniProtKB:Q00743
                  label: Guanine nucleotide-binding protein subunit alpha (FadA)
            function:
              preferred_term: G protein activity
              term:
                id: GO:0003925
                label: G protein activity
            role_description: Galpha subunit; active GTP-bound FadA drives proliferation and blocks conidiation.
          - id: sfaD
            label: SfaD G-protein beta subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SfaD
                term:
                  id: UniProtKB:Q5BH99
                  label: Guanine nucleotide-binding protein subunit beta (SfaD)
            role_description: Gbeta subunit of the proliferation-promoting heterotrimeric G protein.
          - id: gpgA
            label: GpgA G-protein gamma subunit
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: GpgA
                term:
                  id: UniProtKB:Q5B9N8
                  label: Guanine nucleotide-binding protein subunit gamma (GpgA)
            role_description: Ggamma subunit of the proliferation-promoting heterotrimeric G protein.
          - id: flbA
            label: FlbA regulator of G-protein signaling
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FlbA
                term:
                  id: UniProtKB:P38093
                  label: Developmental regulator flbA
            function:
              preferred_term: GTPase activator activity
              term:
                id: GO:0005096
                label: GTPase activator activity
            role_description: RGS protein that stimulates FadA GTP hydrolysis, dampening proliferation
              signaling so conidiation can proceed; flbA mutants are fluffy and aconidial.
          - id: sfgA
            label: SfgA negative regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: SfgA
                term:
                  id: UniProtKB:Q3I5F3
                  label: SfgA
            function:
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: Zn(II)2Cys6 negative regulator acting downstream of FluG and upstream of
              the Flb factors; FluG signaling relieves SfgA repression.
      connections:
      - source: upstream_activation
        target: brla_induction
        connection_type: POSITIVELY_REGULATES
        description: FluG/Flb developmental competence induces the master regulator brlA.
      - source: brla_induction
        target: abaa_differentiation
        connection_type: CAUSES
        description: BrlA activates abaA during mid-development.
      - source: abaa_differentiation
        target: weta_maturation
        connection_type: CAUSES
        description: AbaA activates wetA and the maturation program.
      - source: weta_maturation
        target: structural_output
        connection_type: POSITIVELY_REGULATES
        description: WetA/velvet late regulation switches on spore-wall and pigment structural genes.
      - source: repressive_gating
        target: upstream_activation
        connection_type: NEGATIVELY_REGULATES
        description: Active FadA/G-protein proliferation signaling represses entry into the conidiation
          program.
      - source: flbA
        target: fadA
        connection_type: NEGATIVELY_REGULATES
        description: FlbA (RGS) attenuates FadA GTPase signaling, relieving repression of conidiation.
      - source: fluG
        target: sfgA
        connection_type: NEGATIVELY_REGULATES
        description: FluG-dependent signaling relieves SfgA-mediated repression of the Flb activators.
    - id: neurospora_macroconidiation
      label: Neurospora crassa macroconidiation (fluffy / WCC-clock program)
      module_type: DEVELOPMENTAL_PROCESS
      description: 'The Neurospora crassa realization: an analogous but non-orthologous program. Neurospora
        forms macroconidia by budding/fission of aerial hyphae rather than a brlA-type conidiophore. The
        blue-light White Collar Complex (WC-1/WC-2) and the circadian clock (FRQ) gate the timing of conidiation
        (the classic banding rhythm); the Gal4-type Zn(II)2Cys6 transcription factor FL (fluffy) is the
        central activator; conidiation-specific and rodlet (hydrophobin) genes provide structural output.
        Stage genes acon-2 and acon-3 control successive morphological steps.'
      concepts:
      - preferred_term: conidium formation
        term:
          id: GO:0048315
          label: conidium formation
        description: Macroconidiation by budding of aerial hyphae (no dedicated conidiophore).
      context:
        taxa:
        - preferred_term: Neurospora crassa
          term:
            id: NCBITaxon:367110
            label: Neurospora crassa OR74A
      parts:
      - order: 1
        role: light and circadian gating
        node:
          id: neu_wcc_clock_gating
          label: White Collar Complex and circadian clock gating
          module_type: REGULATORY_STEP
          description: The blue-light photoreceptor White Collar Complex (WC-1/WC-2) and the circadian
            oscillator FRQ gate the timing and rhythm (banding) of conidiation in response to light and
            the clock.
          annotons:
          - id: neu_wc1
            label: WC-1 blue-light photoreceptor / TF
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WC-1
                term:
                  id: UniProtKB:Q01371
                  label: White collar 1 protein (WC1)
            function: &id001
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: GATA-type, LOV-domain blue-light photoreceptor; with WC-2 forms the White
              Collar Complex that activates light-induced genes including conidiation and frq.
          - id: neu_wc2
            label: WC-2 White Collar Complex partner
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: WC-2
                term:
                  id: UniProtKB:P78714
                  label: White collar 2 protein (WC2)
            function: *id001
            role_description: GATA-type transcription factor partnering WC-1 in the White Collar Complex.
          - id: neu_frq
            label: FRQ circadian clock protein
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FRQ
                term:
                  id: UniProtKB:P19970
                  label: Frequency clock protein
            role_description: Core negative-feedback oscillator that, with the WCC, imposes circadian
              control on conidiation (banding rhythm).
      - order: 2
        role: master activation
        node:
          id: neu_fl_activation
          label: FL (fluffy) master activation
          module_type: REGULATORY_STEP
          description: FL (fluffy), a Gal4-type Zn(II)2Cys6 transcription factor, is the central activator
            of the macroconidiation program; fl mutants grow as undifferentiated fluffy aerial hyphae.
          annotons:
          - id: neu_fl
            label: FL fluffy master regulator
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: FL (fluffy)
                term:
                  id: UniProtKB:O13360
                  label: Conidial development protein fluffy
            function: *id001
            processes:
            - preferred_term: conidium formation
              term:
                id: GO:0048315
                label: conidium formation
            role_description: Zn(II)2Cys6 transcription factor; the central positive regulator of macroconidiation
              (functional analog of the Aspergillus BrlA role, but non-orthologous). Acts with the stage
              regulators acon-2 and acon-3.
      - order: 3
        role: structural / conidiation-specific output
        node:
          id: neu_structural_output
          label: Conidiation-specific and rodlet structural output
          module_type: BIOLOGICAL_PROCESS
          description: Conidiation-specific (con) genes and the EAS/CCG-2 class I hydrophobin build the
            mature macroconidium surface, including the rodlet layer.
          annotons:
          - id: neu_eas
            label: EAS/CCG-2 rodlet hydrophobin
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: EAS (CCG-2)
                term:
                  id: UniProtKB:Q04571
                  label: Class I hydrophobin eas
            function:
              preferred_term: structural constituent of cell wall
              term:
                id: GO:0005199
                label: structural constituent of cell wall
            processes:
            - preferred_term: asexual spore wall assembly
              term:
                id: GO:0042243
                label: asexual spore wall assembly
            role_description: Class I hydrophobin forming the conidial rodlet layer; clock-controlled
              (ccg-2).
          - id: neu_con6
            label: CON-6 conidiation-specific protein
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: CON-6
                term:
                  id: UniProtKB:P34762
                  label: Conidiation-specific protein 6
            role_description: Conidiation-specific gene product accumulating during macroconidiation.
          - id: neu_con10
            label: CON-10 conidiation-specific protein
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: CON-10
                term:
                  id: UniProtKB:P10713
                  label: Conidiation-specific protein 10
            role_description: Light- and development-regulated conidiation-specific gene product.
      connections:
      - source: neu_wcc_clock_gating
        target: neu_fl_activation
        connection_type: POSITIVELY_REGULATES
        description: Light (WCC) and the circadian clock gate induction of the FL-driven conidiation program.
      - source: neu_fl_activation
        target: neu_structural_output
        connection_type: POSITIVELY_REGULATES
        description: FL activation drives conidiation-specific and rodlet structural gene expression.
    notes: 'The two programs are analogous (same developmental logic: gate -> master activator -> stage
      regulation -> structural output) but largely non-orthologous: Aspergillus BrlA/AbaA/WetA have no
      one-to-one Neurospora counterparts, and Neurospora forms macroconidia by budding rather than on
      a dedicated conidiophore. Additional Aspergilli (A. fumigatus, A. flavus) follow the Aspergillus
      paradigm.'
