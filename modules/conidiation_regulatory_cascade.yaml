              term:
                id: GO:0048315
                label: conidium formation
            role_description: Zn(II)2Cys6 transcription factor; the central positive regulator of macroconidiation
              (functional analog of the Aspergillus BrlA role, but non-orthologous). Acts with the stage
              regulators acon-2 and acon-3.
      - order: 3
