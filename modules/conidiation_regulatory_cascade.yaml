    - id: neurospora_macroconidiation
      label: Neurospora crassa macroconidiation (fluffy / WCC-clock program)
      module_type: DEVELOPMENTAL_PROCESS
      description: 'The Neurospora crassa realization: an analogous but non-orthologous program. Neurospora
        forms macroconidia by budding/fission of aerial hyphae rather than a brlA-type conidiophore. The
        blue-light White Collar Complex (WC-1/WC-2) and the circadian clock (FRQ) gate the timing of conidiation
        (the classic banding rhythm); the Gal4-type Zn(II)2Cys6 transcription factor FL (fluffy) is the
        central activator; conidiation-specific and rodlet (hydrophobin) genes provide structural output.
        Stage genes acon-2 and acon-3 control successive morphological steps.'
      concepts:
      - preferred_term: conidium formation
        term:
          id: GO:0048315
          label: conidium formation
        description: Macroconidiation by budding of aerial hyphae (no dedicated conidiophore).
      context:
        taxa:
        - preferred_term: Neurospora crassa
          term:
            id: NCBITaxon:367110
            label: Neurospora crassa OR74A
      parts:
      - order: 1
        role: light and circadian gating
        node:
          id: neu_wcc_clock_gating
          label: White Collar Complex and circadian clock gating
          module_type: REGULATORY_STEP
          description: The blue-light photoreceptor White Collar Complex (WC-1/WC-2) and the circadian
            oscillator FRQ gate the timing and rhythm (banding) of conidiation in response to light and
            the clock.
          annotons:
          - id: neu_wc1
            label: WC-1 blue-light photoreceptor / TF
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 'Blue-light signal transduction (representative: WC-1)'
                term:
                  id: PANTHER:PTHR47429
                  label: Blue-light signal transduction
                representative_members:
                - preferred_term: WC-1
                  term:
                    id: UniProtKB:Q01371
                    label: White collar 1 protein (WC1)
                ancestral_nodes:
                - preferred_term: PAINT node PTN002390197 for WC-1
                  term:
                    id: PANTHER:PTN002390197
                    label: PTN002390197
                  description: IBD ancestral node in PTHR47429 propagating C:GO:0005634 nucleus.
                  evidence:
                  - source_id: GO_REF:0000033
                    statement: IBD propagation from PAINT node PTN002390197 in PTHR47429 (from GOA WITH/FROM
                      on the gene's IBA annotations).
            function: &id001
              preferred_term: DNA-binding transcription factor activity
              term:
                id: GO:0003700
                label: DNA-binding transcription factor activity
            role_description: GATA-type, LOV-domain blue-light photoreceptor; with WC-2 forms the White
              Collar Complex that activates light-induced genes including conidiation and frq.
          - id: neu_wc2
            label: WC-2 White Collar Complex partner
            participant:
              selector_type: FAMILY
