id: MODULE:pili_surface_adhesion_boundary
title: Pili, adhesion, and surface-structure boundary
description: Boundary module for the ppu02020 pili/surface-adhesion partition and the motility/chemotaxis/biofilm
  fimbrial extension in Pseudomonas putida KT2440. It captures the existing PilA type IV pilin review,
  a FimC/FimD-like chaperone-usher pair extended with PP_1888 and fimI structural-subunit candidates,
  a PP_2356 phytochrome-like sensor near a Csu-like chaperone-usher cluster, and a PP_3126
  polysaccharide-export side node. This is surface-structure context from broad signaling/motility
  umbrella maps rather than one canonical signaling pathway.
status: DRAFT
evidence:
- source_id: KEGG:ppu02020
  title: Two-component system - Pseudomonas putida KT2440
  statement: KEGG ppu02020 supplies the umbrella membership for this boundary module.
- source_id: file:projects/P_PUTIDA/batches/ppu02020_two_component_system_partition.tsv
  title: PSEPK ppu02020 partition table
  statement: The partition table groups pilA, fimD, PP_1890, PP_2356, PP_2357-PP_2363, and PP_3126 into
    the pili/surface-adhesion bucket.
- source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_fimbrial_type1_surface_adhesion_extension.tsv
  title: PSEPK motility/chemotaxis/biofilm fimbrial extension batch
  statement: The motility/chemotaxis/biofilm functional-bucket partition routes PP_1888 and fimI to the
    existing FimD/PP_1890 chaperone-usher context, while PP_0655 is routed out to Hcp/T6SS context.
notes: Several Csu-like subunits currently have no fetched GOA rows. They are represented conservatively
  as structural/pilus-assembly candidates from local gene context, product names, and FanG-like domains.
  PP_1888 and fimI extend the FimD/PP_1890 chaperone-usher context as predicted fimbrial structural
  subunits; PP_0655 is excluded from this module because its Hcp/T6SS domains support secretion-system
  context rather than a fimbrial-subunit role.
