knowledge_gaps:
  - gap_statement: The ITAMi Paradox remains unresolved in the Fc-gamma receptor signaling pathway 
      module.
    boundary: The discovery that ITAM-containing receptors can transmit inhibitory signals under 
      conditions of low clustering (ITAMi) remains incompletely understood. The precise molecular 
      determinants that distinguish activating ITAM from ITAMi signaling-beyond simple 
      phosphorylation stoichiometry-are unclear.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_gamma_receptor_signaling-deep-research-falcon.md
  - gap_statement: FcgammaRI Function remains unresolved in the Fc-gamma receptor signaling pathway 
      module.
    boundary: The biological purpose of high-affinity FcgammaRI remains perplexing. Under 
      steady-state conditions, FcgammaRI is saturated by circulating monomeric IgG and continuously 
      internalized without productive signaling.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_gamma_receptor_signaling-deep-research-falcon.md
  - gap_statement: FcgammaRIIIb Signaling Mechanism remains unresolved in the Fc-gamma receptor 
      signaling pathway module.
    boundary: FcgammaRIIIb, as a GPI-anchored receptor, lacks a cytoplasmic signaling domain, yet it
      modulates neutrophil function. The mechanism by which it cooperates with FcgammaRIIA-and 
      whether it signals through lateral membrane interactions with ITAM-bearing partners or via 
      lipid raft-mediated signaling-remains incompletely defined.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_gamma_receptor_signaling-deep-research-falcon.md
  - gap_statement: Integrated Receptor Signaling remains unresolved in the Fc-gamma receptor 
      signaling pathway module.
    boundary: Myeloid cells express multiple FcgammaRs simultaneously, yet studies typically examine
      individual receptors in isolation. The integrated signaling output from co-engagement of 
      activating and inhibitory FcgammaRs, the role of receptor stoichiometry and spatial 
      distribution, and the influence of lipid composition and immune synapse micro-organization on 
      signal quality are poorly understood.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_gamma_receptor_signaling-deep-research-falcon.md
  - gap_statement: PLCG2 Dose-Response Paradox remains unresolved in the Fc-gamma receptor signaling
      pathway module.
    boundary: The observation that moderate PLCG2 gain-of-function (P522R, ~2-3-fold) enhances 
      immune function and confers disease protection, while strong gain-of-function (S707Y, 
      ~120-fold) paradoxically impairs phagocytosis and causes immune dysregulation, suggests a 
      bell-shaped dose-response curve for PLCgamma2 signaling.
    gap_kind:
      - BIOLOGY
    dark_aspect: RESIDUAL_SUBGAP
    status: OPEN
    significance: Falcon flagged this as a load-bearing uncertainty for interpreting or refining the
      module.
    resolution: Resolve by expert review of the cited Falcon sources and targeted structural, 
      biochemical, genetic, or cell-context experiments as appropriate.
    provenance:
      - reference_id: file:modules/fc_gamma_receptor_signaling-deep-research-falcon.md
  - gap_statement: Species Extrapolation remains unresolved in the Fc-gamma receptor signaling 
      pathway module.
    boundary: The substantial differences between human and mouse FcgammaR repertoires (humans have 
      FcgammaRIIA and FcgammaRIIIb with no mouse orthologs; mice have FcgammaRIV with no human 
      ortholog) mean that many mechanistic conclusions drawn from mouse models may not directly 
      apply to human biology.
    gap_kind:
