id: MODULE:fc_gamma_receptor_signaling
title: Fc-gamma receptor signaling pathway module
description: Fc-gamma receptor signaling couples immune-complex binding to ITAM-containing receptor 
  chains, SYK/BTK activation, PLC-gamma and PI3K branches, phagocytosis, and inflammatory effector 
  functions.
