id: MODULE:fructose_mannose_metabolism
title: Fructose and mannose metabolism boundary module
description: >-
  A bacterial carbohydrate boundary module that separates fructose PTS entry and
  fructose-1-phosphate phosphorylation from GDP-mannose and GDP-mannuronate
  precursor biosynthesis, alginate polymerization/modification/export, and
  LPS/O-antigen deoxy-sugar side branches. KEGG ppu00051 groups these adjacent
  reactions under fructose and mannose metabolism in Pseudomonas putida KT2440,
  but species-level curation should distinguish soluble central-carbon entry
  reactions from alginate and envelope-polysaccharide biosynthesis.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00051
    title: Fructose and mannose metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK pathway batch is seeded from KEGG ppu00051 membership; the
      membership includes fructose PTS/catabolic genes, GDP-mannose and
      GDP-mannuronate precursor genes, alginate polymer-handling genes, and
      fucose/rhamnose side-branch genes.
  - source_id: UniPathway:UPA00126
    title: GDP-alpha-D-mannose biosynthesis
    statement: >-
      UniPathway anchors the mannose-phosphate and GDP-mannose precursor branch
      represented by mannose-6-phosphate isomerase, phosphomannomutase, and
      mannose-1-phosphate guanylyltransferase activities.
  - source_id: UniPathway:UPA00286
    title: Alginate biosynthesis
    statement: >-
      UniPathway anchors the alginate precursor, polymerization, modification,
      and export branch that KEGG overlaps with fructose and mannose metabolism.
  - source_id: file:PSEPK/algA/algA-ai-review.yaml
    title: PSEPK algA gene review
    statement: >-
      The curated AlgA review supports bifunctional mannose-6-phosphate
      isomerase and mannose-1-phosphate guanylyltransferase roles in
      GDP-mannose precursor synthesis.
  - source_id: file:PSEPK/algD/algD-ai-review.yaml
    title: PSEPK algD gene review
    statement: >-
      The curated AlgD review supports GDP-mannose 6-dehydrogenase activity as
      the committed GDP-mannuronate precursor-forming step for alginate
      biosynthesis.
  - source_id: file:PSEPK/algG/algG-ai-review.yaml
    title: PSEPK algG gene review
    statement: >-
      The curated AlgG review supports periplasmic mannuronan C5-epimerase
      function in alginate polymer maturation.
  - source_id: file:PSEPK/fruB/fruB-ai-review.yaml
    title: PSEPK fruB gene review
    statement: >-
      The curated FruB review supports the upstream PEP-dependent PTS
      phosphorelay component missing from the initial KEGG ppu00051 candidate
      extraction.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__fructose_mannose_metabolism__ppu00051-deep-research-falcon.md
    title: Falcon PSEPK ppu00051 pathway review
    statement: >-
      The taxon-aware Falcon report recommends adding fruB, distinguishing the
      LPS/O-antigen PP_1776/gmd/rmd branch from alginate, and splitting this
      broad KEGG bucket into fructose PTS, alginate precursor, LPS/O-antigen
      nucleotide-sugar, and alginate polymerization/export submodules.
module:
  id: fructose_mannose_metabolism
  label: Fructose and mannose metabolism boundary module
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: carbohydrate catabolic process
      term:
        id: GO:0016052
        label: carbohydrate catabolic process
      description: >-
        Fructose PTS import and phosphorylation feed carbohydrate carbon into
        central metabolism.
    - preferred_term: GDP-mannose biosynthetic process
      term:
        id: GO:0009298
        label: GDP-mannose biosynthetic process
      description: >-
        Mannose-phosphate conversion and guanylyltransferase reactions generate
        GDP-mannose for mannose-containing envelope glycans and alginate
        precursor synthesis.
    - preferred_term: alginic acid biosynthetic process
      term:
        id: GO:0042121
        label: alginic acid biosynthetic process
      description: >-
        GDP-mannuronate generation, polymerization, periplasmic modification,
        and export of alginate.
    - preferred_term: GDP-D-rhamnose biosynthetic process
      term:
        id: GO:0019306
        label: GDP-D-rhamnose biosynthetic process
      description: >-
        GDP-mannose-derived side branch to GDP-D-rhamnose precursors for
        LPS/O-antigen nucleotide-sugar biosynthesis.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: >-
          Fructose kinase and mannose/GDP-mannose precursor enzymes are expected
          to operate in the bacterial cytosol.
      - preferred_term: plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: >-
          Fructose PTS permease and alginate polymerization machinery include
          integral inner-membrane components.
      - preferred_term: periplasmic space
        term:
          id: GO:0042597
          label: periplasmic space
        description: >-
          Alginate modification, lyase/protective processing, and scaffold
          functions occur in the Gram-negative periplasm.
  parts:
    - order: 1
      role: fructose PTS import and phosphorylation
      node:
        id: fructose_pts_entry
        label: Fructose PTS entry
        module_type: REACTION
        annotons:
          - id: frub_pep_protein_phosphotransferase_activity
            label: FruB PEP-dependent PTS phosphorelay
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphoenolpyruvate-protein phosphotransferase activity
                term:
                  id: GO:0008965
                  label: phosphoenolpyruvate-protein phosphotransferase activity
            function:
              preferred_term: phosphoenolpyruvate-protein phosphotransferase activity
              term:
                id: GO:0008965
                label: phosphoenolpyruvate-protein phosphotransferase activity
              substrates:
                - preferred_term: phosphoenolpyruvate
                - preferred_term: L-histidyl-[protein]
              products:
                - preferred_term: pyruvate
                - preferred_term: N(pros)-phospho-L-histidyl-[protein]
              evidence:
                - source_id: EC:2.7.3.9
                  statement: phosphoenolpyruvate--protein phosphotransferase
                - source_id: file:PSEPK/fruB/fruB-ai-review.yaml
                  statement: PSEPK FruB is curated as the missing PEP-dependent PTS phosphorelay component for the fructose entry branch.
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
          - id: fructose_pts_activity
            label: Fructose-specific PTS permease activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
                term:
                  id: GO:0008982
                  label: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
            function:
              preferred_term: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
              term:
                id: GO:0008982
                label: protein-N(PI)-phosphohistidine-sugar phosphotransferase activity
              substrates:
                - preferred_term: D-fructose
                - preferred_term: phosphoenolpyruvate
              products:
                - preferred_term: D-fructose 1-phosphate
                - preferred_term: pyruvate
              evidence:
                - source_id: EC:2.7.1.202
                  statement: protein-N(pi)-phosphohistidine--D-fructose phosphotransferase
                - source_id: KEGG:ppu00051
                  statement: KEGG places fruA in the PSEPK fructose and mannose map.
            locations:
              - preferred_term: plasma membrane
                term:
                  id: GO:0005886
                  label: plasma membrane
            role_description: >-
              Fructose-specific PTS import/phosphorylation. In PSEPK this role
              is represented by fruA/PP_0795 and requires the adjacent FruB
