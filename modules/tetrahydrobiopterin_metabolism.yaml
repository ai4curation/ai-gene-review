id: MODULE:tetrahydrobiopterin_metabolism
title: Tetrahydrobiopterin (BH4) biosynthesis and regeneration
description: >-
  Tetrahydrobiopterin (BH4, (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin) is an
  essential reduced-pteridine cofactor for the aromatic amino acid hydroxylases
  (phenylalanine hydroxylase PAH, tyrosine hydroxylase TH, and the tryptophan
  hydroxylases TPH1/TPH2), for the nitric oxide synthases, and for
  alkylglycerol monooxygenase. This module covers the two arms of BH4
  homeostasis. (1) De novo biosynthesis, a short cytosolic three-step pathway
  from GTP: GTP cyclohydrolase I (GCH1) opens the imidazole ring of GTP to give
  7,8-dihydroneopterin 3'-triphosphate (the committed, feedback-regulated step);
  6-pyruvoyltetrahydropterin synthase (PTS/PTPS) converts this to
  6-pyruvoyl-5,6,7,8-tetrahydropterin; and sepiapterin reductase (SPR) carries
  out the NADPH-dependent reductions that yield BH4. (2) Regeneration
  (recycling), which is required because each turn of an aromatic amino acid
  hydroxylase oxidises BH4 to pterin-4a-carbinolamine (4a-hydroxy-BH4):
  pterin-4a-carbinolamine dehydratase (PCBD1/PCD) dehydrates this to quinonoid
  dihydrobiopterin, and dihydropteridine reductase (QDPR/DHPR) reduces the
  quinonoid dihydrobiopterin back to BH4 using NADH. Because the hydroxylases
  turn over far faster than de novo synthesis, the PCBD1-QDPR salvage loop
  supplies most of the BH4 used at steady state. Inherited defects of GCH1, PTS,
  SPR, PCBD1 or QDPR all cause BH4 deficiency, presenting as
  BH4-deficient hyperphenylalaninemia (atypical/"malignant" PKU) and/or
  monoamine-neurotransmitter deficiency (dopa-responsive dystonia, catecholamine
  and serotonin deficiency), a distinct and separately treatable group of
  disorders from PAH-deficient classical PKU. PCBD1 additionally moonlights as
  DCoH, the dimerization cofactor / transcriptional coactivator of the HNF1
  transcription factors.
status: DRAFT
evidence:
  - source_id: GO:0006729
    title: tetrahydrobiopterin biosynthetic process
    statement: >-
      The de novo arm is grounded in the GO biological-process term for
      tetrahydrobiopterin biosynthesis (GO:0006729); the whole module is scoped
      by tetrahydrobiopterin metabolic process (GO:0046146).
  - source_id: Reactome:R-HSA-1474151
    title: Tetrahydrobiopterin (BH4) synthesis, recycling, salvage and regulation
    statement: >-
      Step order, compartmentalization and reaction stoichiometries follow the
      human Reactome BH4 pathway and its member reactions (R-HSA-1474146,
      R-HSA-1474184, R-HSA-1475414, R-HSA-71146, R-HSA-71130).
  - source_id: file:human/GCH1/GCH1-ai-review.yaml
    title: GCH1 gene review (human)
    statement: >-
      The GCH1 step grounding (UniProtKB:P30793, GO:0003934 GTP cyclohydrolase I
      activity, EC 3.5.4.16) matches the completed human GCH1 review.
  - source_id: file:human/PTS/PTS-ai-review.yaml
    title: PTS gene review (human)
    statement: >-
      The PTS step grounding (UniProtKB:Q03393, GO:0003874 6-pyruvoyltetrahydropterin
      synthase activity, EC 4.2.3.12) matches the completed human PTS review.
  - source_id: file:human/SPR/SPR-ai-review.yaml
    title: SPR gene review (human)
    statement: >-
      The SPR step grounding (UniProtKB:P35270, GO:0004757 sepiapterin reductase
      (NADP+) activity, EC 1.1.1.153) matches the completed human SPR review.
  - source_id: file:human/PCBD1/PCBD1-ai-review.yaml
    title: PCBD1 gene review (human)
    statement: >-
      The PCBD1/PCD regeneration step (UniProtKB:P61457, GO:0008124
      4-alpha-hydroxytetrahydrobiopterin dehydratase activity, EC 4.2.1.96)
      matches the completed human PCBD1 review, which also captures the DCoH
      transcriptional-coactivator moonlighting role.
  - source_id: file:human/QDPR/QDPR-ai-review.yaml
    title: QDPR gene review (human)
    statement: >-
      The QDPR/DHPR regeneration step (UniProtKB:P09417, GO:0004155
      6,7-dihydropteridine reductase activity, EC 1.5.1.34) matches the completed
      human QDPR review.
module:
  id: tetrahydrobiopterin_metabolism
  label: Tetrahydrobiopterin (BH4) metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: tetrahydrobiopterin biosynthetic process
      term:
        id: GO:0006729
        label: tetrahydrobiopterin biosynthetic process
      description: De novo formation of BH4 from GTP in three cytosolic steps.
    - preferred_term: tetrahydrobiopterin metabolic process
      term:
        id: GO:0046146
        label: tetrahydrobiopterin metabolic process
      description: >-
        The full module scope, including the regeneration/recycling of BH4 after
        its use by the aromatic amino acid hydroxylases.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: All five enzymes of BH4 synthesis and regeneration are cytosolic.
  parts:
    - order: 1
      role: de novo synthesis, committed step
      node:
        id: gch1_step
        label: GTP to 7,8-dihydroneopterin 3'-triphosphate
        module_type: REACTION
        annotons:
          - id: gch1_activity
            label: "GCH1: GTP cyclohydrolase I"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: GTP cyclohydrolase I family (GCH1)
                term:
                  id: PANTHER:PTHR11109
                  label: GTP CYCLOHYDROLASE I
                representative_members:
                  - preferred_term: GCH1 (human)
                    term:
                      id: UniProtKB:P30793
                      label: GTP cyclohydrolase 1
            function:
              preferred_term: GTP cyclohydrolase I activity
              term:
                id: GO:0003934
                label: GTP cyclohydrolase I activity
              substrates:
                - preferred_term: GTP
              products:
                - preferred_term: 7,8-dihydroneopterin 3'-triphosphate
                - preferred_term: formate
              evidence:
                - source_id: EC:3.5.4.16
                  statement: GTP cyclohydrolase I
                - source_id: Reactome:R-HSA-1474146
                  statement: "GCH1 reduces GTP to dihydroneopterin triphosphate (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Committed, rate-limiting and feedback-regulated first step of de
              novo BH4 synthesis (GCH1 is feedback-inhibited by BH4 via the
              GCH1-feedback regulatory protein GCHFR, and stimulated by
              phenylalanine). Dominant GCH1 mutations cause dopa-responsive
              dystonia (Segawa disease); recessive loss causes BH4-deficient
              hyperphenylalaninemia.
    - order: 2
      role: de novo synthesis, second step
      node:
        id: pts_step
        label: 7,8-dihydroneopterin 3'-triphosphate to 6-pyruvoyltetrahydropterin
        module_type: REACTION
        annotons:
          - id: pts_activity
            label: "PTS/PTPS: 6-pyruvoyltetrahydropterin synthase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: 6-pyruvoyltetrahydropterin synthase family (PTS/PTPS)
                term:
                  id: PANTHER:PTHR12589
                  label: PYRUVOYL TETRAHYDROBIOPTERIN SYNTHASE
                representative_members:
                  - preferred_term: PTS (human)
                    term:
                      id: UniProtKB:Q03393
                      label: 6-pyruvoyl tetrahydrobiopterin synthase
            function:
              preferred_term: 6-pyruvoyltetrahydropterin synthase activity
              term:
                id: GO:0003874
                label: 6-pyruvoyltetrahydropterin synthase activity
              substrates:
                - preferred_term: 7,8-dihydroneopterin 3'-triphosphate
              products:
                - preferred_term: 6-pyruvoyl-5,6,7,8-tetrahydropterin
                - preferred_term: triphosphate
              evidence:
                - source_id: EC:4.2.3.12
                  statement: 6-pyruvoyltetrahydropterin synthase
                - source_id: Reactome:R-HSA-1474184
                  statement: "DHNTP is dephosphorylated by PTPS to PTHP (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Zinc- and magnesium-dependent triphosphate elimination / rearrangement
              converting dihydroneopterin triphosphate to 6-pyruvoyltetrahydropterin.
              PTS deficiency (PTPS deficiency) is the most common cause of
              BH4-deficient hyperphenylalaninemia.
    - order: 3
      role: de novo synthesis, terminal reduction to BH4
      node:
        id: spr_step
        label: 6-pyruvoyltetrahydropterin to tetrahydrobiopterin (BH4)
        module_type: REACTION
        annotons:
          - id: spr_activity
            label: "SPR: sepiapterin reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Sepiapterin reductase family (SPR)
                term:
                  id: PANTHER:PTHR44085
                  label: SEPIAPTERIN REDUCTASE
                representative_members:
                  - preferred_term: SPR (human)
                    term:
                      id: UniProtKB:P35270
                      label: Sepiapterin reductase
            function:
              preferred_term: sepiapterin reductase (NADP+) activity
              term:
                id: GO:0004757
                label: sepiapterin reductase (NADP+) activity
              substrates:
                - preferred_term: 6-pyruvoyl-5,6,7,8-tetrahydropterin
                - preferred_term: NADPH
              products:
                - preferred_term: tetrahydrobiopterin (BH4)
                - preferred_term: NADP+
              evidence:
                - source_id: EC:1.1.1.153
                  statement: sepiapterin reductase (NADP+)
                - source_id: Reactome:R-HSA-1475414
                  statement: "PTHP is reduced to BH4 by sepiapterin reductase (SPR) (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal NADPH-dependent reductions producing BH4. In tissues that
              lack SPR, alternative "salvage" enzymes (aldo-keto reductases,
              carbonyl reductase) can complete the last reductions, so SPR
              deficiency is dominated by central monoamine-neurotransmitter
              deficiency (dopa-responsive dystonia) rather than hyperphenylalaninemia.
    - order: 4
      role: BH4 utilization (regenerates the substrate for the recycling arm)
      node:
        id: aaah_utilization
        label: aromatic amino acid hydroxylation consumes BH4, producing pterin-4a-carbinolamine
        module_type: REACTION
        annotons:
          - id: aaah_activity
            label: "PAH / TH / TPH: BH4-dependent aromatic amino acid hydroxylases"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Biopterin-dependent aromatic amino acid hydroxylase family (PAH, TH, TPH1/2)
                representative_members:
                  - preferred_term: PAH (human, phenylalanine hydroxylase)
                    term:
                      id: UniProtKB:P00439
                      label: Phenylalanine-4-hydroxylase
                  - preferred_term: TH (human, tyrosine hydroxylase)
                    term:
                      id: UniProtKB:P07101
                      label: Tyrosine 3-monooxygenase
                  - preferred_term: TPH1 (human, tryptophan hydroxylase 1)
                    term:
                      id: UniProtKB:P17752
                      label: Tryptophan 5-hydroxylase 1
                  - preferred_term: TPH2 (human, tryptophan hydroxylase 2)
                    term:
                      id: UniProtKB:Q8IWU9
                      label: Tryptophan 5-hydroxylase 2
            function:
              preferred_term: reduced-pteridine-dependent aromatic amino acid monooxygenase activity
              term:
                id: GO:0016714
                label: oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, reduced pteridine as one donor, and incorporation of one atom of oxygen
              substrates:
                - preferred_term: aromatic amino acid (Phe / Tyr / Trp)
                - preferred_term: tetrahydrobiopterin (BH4)
                - preferred_term: dioxygen
              products:
                - preferred_term: hydroxylated amino acid
                - preferred_term: pterin-4a-carbinolamine (4a-hydroxy-BH4)
              evidence:
                - source_id: EC:1.14.16.1
                  statement: phenylalanine 4-monooxygenase (PAH) — representative reaction
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Not part of BH4 synthesis, but the reason BH4 must be regenerated:
              each hydroxylation of an aromatic amino acid oxidises BH4 to
              pterin-4a-carbinolamine, which is the substrate that enters the
              PCBD1-QDPR recycling loop. Represented generically by the
              biopterin-dependent aromatic amino acid hydroxylase family.
    - order: 5
      role: regeneration, dehydration of the carbinolamine
      node:
        id: pcbd1_step
        label: pterin-4a-carbinolamine to quinonoid dihydrobiopterin + H2O
        module_type: REACTION
        annotons:
          - id: pcbd1_activity
            label: "PCBD1/PCD: pterin-4a-carbinolamine dehydratase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Pterin-4-alpha-carbinolamine dehydratase / DCoH family (PCBD1/PCBD2)
                term:
                  id: PANTHER:PTHR12599
                  label: PTERIN-4-ALPHA-CARBINOLAMINE DEHYDRATASE
                representative_members:
                  - preferred_term: PCBD1 / DCoH (human)
                    term:
                      id: UniProtKB:P61457
                      label: Pterin-4-alpha-carbinolamine dehydratase
                  - preferred_term: PCBD2 / DCoHm (human paralog)
                    term:
                      id: UniProtKB:Q9H0N5
                      label: Pterin-4-alpha-carbinolamine dehydratase 2
            function:
              preferred_term: 4-alpha-hydroxytetrahydrobiopterin dehydratase activity
              term:
                id: GO:0008124
                label: 4-alpha-hydroxytetrahydrobiopterin dehydratase activity
              substrates:
                - preferred_term: pterin-4a-carbinolamine (4a-hydroxy-BH4)
              products:
                - preferred_term: quinonoid dihydrobiopterin
                - preferred_term: water
              evidence:
                - source_id: EC:4.2.1.96
                  statement: 4a-hydroxytetrahydrobiopterin dehydratase (pterin-4a-carbinolamine dehydratase)
                - source_id: Reactome:R-HSA-71146
                  statement: "4a-hydroxytetrahydrobiopterin => q-dihydrobiopterin + H2O (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              First step of BH4 regeneration: dehydrates the pterin-4a-carbinolamine
              produced by the hydroxylases to quinonoid dihydrobiopterin (also
              suppresses the side production of 7-biopterin / primapterin). PCD
              deficiency causes a mild/transient hyperphenylalaninemia with
              primapterinuria. The same protein moonlights as DCoH, stabilizing the
              HNF1 transcription-factor dimer in the nucleus (a distinct function
              represented in the PCBD1 gene review, not in this metabolic module).
    - order: 6
      role: regeneration, NADH-dependent reduction back to BH4
      node:
        id: qdpr_step
        label: quinonoid dihydrobiopterin + NADH to tetrahydrobiopterin (BH4)
        module_type: REACTION
        annotons:
          - id: qdpr_activity
            label: "QDPR/DHPR: dihydropteridine reductase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Dihydropteridine reductase family (QDPR/DHPR)
                term:
                  id: PANTHER:PTHR15104
                  label: DIHYDROPTERIDINE REDUCTASE
                representative_members:
                  - preferred_term: QDPR (human)
                    term:
                      id: UniProtKB:P09417
                      label: Dihydropteridine reductase
            function:
              preferred_term: 6,7-dihydropteridine reductase activity
              term:
                id: GO:0004155
                label: 6,7-dihydropteridine reductase activity
              substrates:
                - preferred_term: quinonoid dihydrobiopterin
                - preferred_term: NADH
              products:
                - preferred_term: tetrahydrobiopterin (BH4)
                - preferred_term: NAD+
              evidence:
                - source_id: EC:1.5.1.34
                  statement: 6,7-dihydropteridine reductase
                - source_id: Reactome:R-HSA-71130
                  statement: "q-dihydrobiopterin + NADH + H+ => tetrahydrobiopterin + NAD+ (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Terminal step of BH4 regeneration: NADH-dependent reduction of
              quinonoid dihydrobiopterin back to BH4, the quantitatively dominant
              route of BH4 supply during active hydroxylase turnover. DHPR
              deficiency is a BH4-deficient hyperphenylalaninemia with severe
              monoamine-neurotransmitter deficiency requiring BH4 plus
              neurotransmitter-precursor therapy (not diet alone).
  connections:
    - source: gch1_step
      target: pts_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        7,8-dihydroneopterin 3'-triphosphate from GCH1 is the substrate of PTS.
    - source: pts_step
      target: spr_step
      connection_type: PROVIDES_INPUT_FOR
      description: 6-pyruvoyltetrahydropterin from PTS is reduced to BH4 by SPR.
    - source: spr_step
      target: aaah_utilization
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        De novo BH4 made by SPR is the reduced-pteridine cofactor consumed by the
        aromatic amino acid hydroxylases.
    - source: aaah_utilization
      target: pcbd1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Hydroxylase turnover oxidises BH4 to pterin-4a-carbinolamine, the substrate
        dehydrated by PCBD1.
    - source: pcbd1_step
      target: qdpr_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Quinonoid dihydrobiopterin from PCBD1 is reduced back to BH4 by QDPR.
    - source: qdpr_step
      target: aaah_utilization
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        BH4 regenerated by QDPR re-enters the hydroxylase reactions, closing the
        recycling loop that supplies most BH4 at steady state.
  notes: >-
    BH4 synthesis (GCH1 -> PTS -> SPR) and regeneration (PCBD1 -> QDPR) grounded
    to the human enzymes GCH1 (UniProtKB:P30793, GO:0003934, EC 3.5.4.16), PTS
    (Q03393, GO:0003874, EC 4.2.3.12), SPR (P35270, GO:0004757, EC 1.1.1.153),
    PCBD1 (P61457, GO:0008124, EC 4.2.1.96) and QDPR (P09417, GO:0004155, EC
    1.5.1.34). GO molecular-function terms were taken from the human GOA records;
    Reactome reaction ids and titles were verified against the local reactome
    cache. Each step uses a PANTHER family selector (generic over paralogs and
    orthologs) plus a concrete human representative member; the PCBD1 family lists
    the PCBD2/DCoHm paralog. The BH4-utilization node is included only to close
    the recycling loop and is grounded generically to the biopterin-dependent
    aromatic amino acid hydroxylase family (PAH, TH, TPH1/2). Downstream monoamine
    neurotransmitter synthesis (dopamine, serotonin), nitric oxide synthesis, and
    the DCoH/HNF1 transcriptional moonlighting role of PCBD1 are noted but out of
    scope for this cofactor-metabolism module.
