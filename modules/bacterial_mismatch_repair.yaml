    - order: 3
      role: Replisome, proofreading, and SSB context
      node:
        id: replisome_and_ssb_context
        label: Replisome and SSB context
        module_type: BIOLOGICAL_PROCESS
        description: >-
          KEGG ppu03430 includes DNA polymerase III, beta clamp, clamp-loader,
          proofreading, and SSB proteins. These provide replication fidelity,
          repair-synthesis, and strand-discrimination context, but most are
          better primary members of the DNA replication bucket.
        annotons:
          - id: dnaN_beta_sliding_clamp
            label: "dnaN: beta sliding clamp"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaN
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
            role_description: Beta clamp processivity factor in DNA polymerase III; complex-level contributor, not the catalytic polymerase.
          - id: dnaEA_pol_iii_alpha
            label: "dnaEA: DNA polymerase III alpha"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaEA
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
            role_description: Replicative polymerase catalytic subunit; primary home is DNA replication.
          - id: dnaQ_pol_iii_epsilon
            label: "dnaQ: DNA polymerase III epsilon proofreading"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaQ
            function:
              preferred_term: 3'-5' exonuclease activity
              term:
                id: GO:0008408
                label: 3'-5' exonuclease activity
            processes:
              - preferred_term: DNA replication proofreading
                term:
                  id: GO:0045004
                  label: DNA replication proofreading
            role_description: Proofreading exonuclease subunit of the replisome.
          - id: dnaX_clamp_loader_tau_gamma
            label: "dnaX: clamp-loader tau/gamma"
            participant:
              selector_type: GENE
              gene:
                preferred_term: dnaX
            function:
              preferred_term: ATP binding
              term:
                id: GO:0005524
                label: ATP binding
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
            role_description: ATP-binding DNA polymerase III clamp-loader subunit; primary home is DNA replication.
          - id: holA_clamp_loader_delta
            label: "holA: clamp-loader delta"
            participant:
              selector_type: GENE
              gene:
                preferred_term: holA
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
            role_description: Delta clamp-loader subunit; contributes to DNA polymerase III complex function.
          - id: holB_clamp_loader_delta_prime
            label: "holB: clamp-loader delta prime"
            participant:
              selector_type: GENE
              gene:
                preferred_term: holB
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
            role_description: Delta-prime clamp-loader subunit; contributes to DNA polymerase III complex function.
          - id: holC_clamp_loader_chi
            label: "holC: clamp-loader chi"
            participant:
              selector_type: GENE
              gene:
                preferred_term: holC
            function:
              preferred_term: DNA-directed DNA polymerase activity
              term:
                id: GO:0003887
                label: DNA-directed DNA polymerase activity
            processes:
              - preferred_term: DNA replication
