id: MODULE:bacterial_mismatch_repair
title: Bacterial mismatch repair
description: >-
  Boundary module for KEGG ppu03430 mismatch repair in Pseudomonas putida
  KT2440. The strict mismatch-repair core is MutS mismatch recognition and MutL
  ATP-dependent coordination of downstream strand processing in a MutH-free
  bacterial system. The organism-specific KEGG map also includes UvrD helicase,
  ExoVII/ExoI/RecJ and DnaQ-like exonuclease context, SSB, DNA polymerase III
  processivity/clamp-loader/proofreading subunits, and NAD-dependent ligases.
  These are satisfiable repair or replication-side nodes but should not all be
  interpreted as specific MutS-MutL mismatch-recognition components.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03430
    title: Mismatch repair - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03430 provides the PSEPK curation batch with MutS/MutL, UvrD,
      exonucleases, SSB, DNA polymerase III and clamp-loader proteins, and
      ligases as organism-specific members.
  - source_id: PMID:31599106
    title: Mismatch repair hierarchy of Pseudomonas putida revealed by mutagenic ssDNA recombineering of the pyrF gene
    statement: >-
      P. putida KT2440 mismatch-repair genetics support MutS and MutL as the
      central mismatch-repair determinants in this organism.
  - source_id: file:projects/P_PUTIDA/batches/ppu03430_bacterial_mismatch_repair.tsv
    title: ppu03430 first-pass batch table
    statement: >-
      The batch table records 19 KEGG membership genes, including five primary
      ppu03430 bucket genes and multiple DNA replication, nucleotide-excision,
      base-excision, and homologous-recombination side nodes.
  - source_id: file:PSEPK/mutS/mutS-ai-review.yaml
    title: Curated mutS review
    statement: >-
      The mutS review accepts mismatch repair, mismatched DNA binding, ATP
      binding, and ATP-dependent DNA damage sensor activity.
  - source_id: file:PSEPK/mutL/mutL-ai-review.yaml
    title: Curated mutL review
    statement: >-
      The mutL review accepts mismatch repair, ATP binding/hydrolysis,
      mismatched DNA binding, and mismatch-repair-complex membership.
  - source_id: file:PSEPK/uvrD/uvrD-ai-review.yaml
    title: Curated uvrD review
    statement: >-
      The uvrD review accepts 3'-5' DNA helicase activity, ATP binding and
      hydrolysis, and DNA repair/recombination context.
  - source_id: file:PSEPK/xseA/xseA-ai-review.yaml
    title: Curated xseA review
    statement: >-
      The xseA review accepts exodeoxyribonuclease VII activity and complex
      membership.
  - source_id: file:PSEPK/xseB/xseB-ai-review.yaml
    title: Curated xseB review
    statement: >-
      The xseB review accepts exodeoxyribonuclease VII activity and complex
      membership.
module:
  id: bacterial_mismatch_repair
  label: Bacterial mismatch repair
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: mismatch repair
      term:
        id: GO:0006298
        label: mismatch repair
      description: Post-replicative correction of mispaired bases or small insertion/deletion loops.
    - preferred_term: mismatched DNA binding
      term:
        id: GO:0030983
        label: mismatched DNA binding
      description: MutS/MutL-associated binding to mismatch-containing DNA substrates.
    - preferred_term: mismatch repair complex
      term:
        id: GO:0032300
        label: mismatch repair complex
      description: MutS-MutL repair complex context.
    - preferred_term: 3'-5' DNA helicase activity
      term:
        id: GO:0043138
        label: 3'-5' DNA helicase activity
      description: UvrD helicase activity used in repair/excision contexts.
    - preferred_term: exodeoxyribonuclease VII activity
      term:
        id: GO:0008855
        label: exodeoxyribonuclease VII activity
      description: XseA/XseB exonuclease VII side-node activity.
    - preferred_term: DNA polymerase III complex
      term:
        id: GO:0009360
        label: DNA polymerase III complex
      description: Replisome and beta-clamp context linked to strand discrimination and repair synthesis.
    - preferred_term: DNA ligase (NAD+) activity
      term:
        id: GO:0003911
        label: DNA ligase (NAD+) activity
      description: NAD-dependent nick sealing by LigA and LigB.
  context:
    cellular_components:
      - preferred_term: bacterial cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: Soluble mismatch-repair, replication, helicase, nuclease, and ligase proteins act in the bacterial cytosol/nucleoid region.
  parts:
    - order: 1
      role: MutS/MutL mismatch-recognition core
      node:
        id: muts_mutl_core
        label: MutS-MutL mismatch repair core
        module_type: BIOLOGICAL_PROCESS
        description: >-
          MutS recognizes mismatched DNA and MutL acts downstream as an
          ATP-dependent coordinator in KT2440 mismatch repair. The local reviews
          and organism-specific literature support this as the strict core of
          the ppu03430 bucket.
        annotons:
          - id: mutS_mismatch_sensor
            label: "mutS: mismatch sensor"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mutS
            function:
              preferred_term: mismatched DNA binding
              term:
                id: GO:0030983
                label: mismatched DNA binding
            processes:
              - preferred_term: mismatch repair
                term:
                  id: GO:0006298
                  label: mismatch repair
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: Primary mismatch-recognition ATPase initiating bacterial MMR.
          - id: mutL_mismatch_repair_matchmaker
            label: "mutL: mismatch-repair coordinator"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mutL
            function:
              preferred_term: ATP hydrolysis activity
              term:
                id: GO:0016887
                label: ATP hydrolysis activity
            processes:
              - preferred_term: mismatch repair
                term:
                  id: GO:0006298
                  label: mismatch repair
            role_description: MutL-family ATPase coupling MutS-bound mismatches to downstream strand processing in the mismatch repair complex.
    - order: 2
      role: Helicase and exonuclease strand-processing context
      node:
        id: helicase_exonuclease_processing_context
        label: UvrD and exonuclease processing context
        module_type: BIOLOGICAL_PROCESS
        description: >-
          KEGG ppu03430 includes UvrD helicase and several exonucleases. These
          are repair/excision-processing side nodes used across mismatch,
          nucleotide-excision, base-excision, and recombination contexts.
        annotons:
          - id: uvrD_dna_helicase_ii
            label: "uvrD: DNA helicase II"
            participant:
              selector_type: GENE
              gene:
                preferred_term: uvrD
            function:
              preferred_term: 3'-5' DNA helicase activity
              term:
                id: GO:0043138
                label: 3'-5' DNA helicase activity
            processes:
              - preferred_term: recombinational repair
                term:
                  id: GO:0000725
                  label: recombinational repair
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: UvrD-family helicase shared with nucleotide-excision and recombination-associated repair contexts.
          - id: xseA_exodeoxyribonuclease_vii_large
            label: "xseA: ExoVII large subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: xseA
            function:
              preferred_term: exodeoxyribonuclease VII activity
              term:
                id: GO:0008855
                label: exodeoxyribonuclease VII activity
            processes:
              - preferred_term: DNA catabolic process
                term:
                  id: GO:0006308
                  label: DNA catabolic process
            role_description: Large catalytic ExoVII complex subunit and primary ppu03430 bucket gene.
          - id: xseB_exodeoxyribonuclease_vii_small
            label: "xseB: ExoVII small subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: xseB
            function:
              preferred_term: exodeoxyribonuclease VII activity
              term:
                id: GO:0008855
                label: exodeoxyribonuclease VII activity
            processes:
              - preferred_term: DNA catabolic process
                term:
                  id: GO:0006308
                  label: DNA catabolic process
            role_description: Small ExoVII complex subunit and primary ppu03430 bucket gene.
          - id: sbcB_exonuclease_i
            label: "sbcB: exodeoxyribonuclease I"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sbcB
            function:
