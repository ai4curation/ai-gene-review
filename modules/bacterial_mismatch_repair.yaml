                label: single-stranded DNA 3'-5' DNA exonuclease activity
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: ExoI single-stranded DNA exonuclease; primary ppu03430 bucket gene but shared with broader DNA repair/recombination.
          - id: recJ_5_3_exonuclease
            label: "recJ: 5'-3' exonuclease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: recJ
            function:
              preferred_term: 5'-3' exonuclease activity
              term:
                id: GO:0008409
