    - order: 4
      role: DNA nick-sealing context
      node:
        id: dna_ligation_context
        label: NAD-dependent ligase context
        module_type: BIOLOGICAL_PROCESS
        description: >-
          LigA and LigB seal DNA nicks during replication and repair. They are
          shared repair/replication context rather than the initial mismatch
          recognition machinery.
        annotons:
          - id: ligA_nad_dependent_dna_ligase
            label: "ligA: NAD-dependent DNA ligase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ligA
            function:
              preferred_term: DNA ligase (NAD+) activity
              term:
                id: GO:0003911
                label: DNA ligase (NAD+) activity
            processes:
              - preferred_term: DNA replication
                term:
                  id: GO:0006260
                  label: DNA replication
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: Primary NAD-dependent DNA ligase for replication and repair nick sealing.
          - id: ligB_nad_dependent_dna_ligase_b
            label: "ligB: NAD-dependent DNA ligase B"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ligB
            function:
              preferred_term: DNA ligase (NAD+) activity
              term:
                id: GO:0003911
                label: DNA ligase (NAD+) activity
            processes:
              - preferred_term: DNA repair
                term:
                  id: GO:0006281
                  label: DNA repair
            role_description: Repair-associated NAD-dependent DNA ligase paralog.
  connections:
    - source: muts_mutl_core
      target: helicase_exonuclease_processing_context
      connection_type: PRECEDES
      description: Mismatch recognition and MutL coordination precede helicase/exonuclease strand processing.
    - source: helicase_exonuclease_processing_context
      target: replisome_and_ssb_context
      connection_type: PROVIDES_INPUT_FOR
      description: Excision creates repair-synthesis substrates handled by replication and SSB machinery.
    - source: replisome_and_ssb_context
      target: dna_ligation_context
      connection_type: PRECEDES
      description: Repair synthesis and gap filling precede DNA nick sealing by ligases.
  notes: >-
    KT2440 has MutS and MutL but no MutH/Dam-centered E. coli-style MMR module
    in the ppu03430 membership. The module therefore treats MutS/MutL as the
    strict mismatch-repair core and records the remaining KEGG members as
    shared replication, helicase, exonuclease, and ligase context.
