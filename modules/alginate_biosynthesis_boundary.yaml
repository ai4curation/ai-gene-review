id: MODULE:alginate_biosynthesis_boundary
title: Alginate biosynthesis boundary
description: >-
  Boundary module for UniPathway UPA00286 alginate biosynthesis in
  Pseudomonas putida KT2440. The local UniPathway membership spans precursor
  formation, inner-membrane polymerization, periplasmic modification/maturation,
  outer-membrane export/scaffold components, and adjacent transcriptional
  regulation. The motility/biofilm functional-bucket pass added nearby
  alginate-efficiency, export-domain, and alginate-lyase-domain candidates as
  boundary context. This module records that full alginate-biosynthesis coverage
  while preserving the existing splits into fructose/mannose precursor
  metabolism, exopolysaccharide biosynthesis, and alginate/biofilm regulation
  batches.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00286
    title: Alginate biosynthesis
    statement: >-
      UniPathway UPA00286 supplies the local alginate-biosynthesis membership:
      algB, algF, algJ, algI, algX, algG, algE, algK, alg44, alg8, and algD.
  - source_id: file:modules/fructose_mannose_metabolism.yaml
    title: Fructose and mannose metabolism boundary module
    statement: >-
      The fructose/mannose module already separates GDP-mannose and
      GDP-mannuronate precursor formation from central fructose metabolism and
      includes the alginate precursor and polymer-handling branch.
  - source_id: file:modules/exopolysaccharide_biosynthesis_boundary.yaml
    title: Exopolysaccharide biosynthesis boundary module
    statement: >-
      The exopolysaccharide module already curates the alginate polymerization
      and O-acetylation/modification members from KEGG ppu00543.
  - source_id: file:modules/alginate_biofilm_regulation_boundary.yaml
    title: Alginate and biofilm regulation boundary module
    statement: >-
      The alginate/biofilm regulation module already curates AlgB as an
      alginate-linked response regulator in the ppu02020 regulatory partition.
  - source_id: file:PSEPK/algE/algE-ai-review.yaml
    title: PSEPK algE gene review
    statement: >-
      The algE review supports an outer-membrane alginate permeability-pore role
      in alginate biosynthesis/export.
  - source_id: file:PSEPK/algK/algK-ai-review.yaml
    title: PSEPK algK gene review
    statement: >-
      The algK review supports an outer-membrane-anchored periplasmic scaffold
      role in the alginate biosynthesis/export apparatus.
  - source_id: file:projects/P_PUTIDA/batches/module_motility_chemotaxis_biofilm_alginate_envelope_and_lyase_context.tsv
    title: Motility/biofilm alginate envelope and lyase context partition
    statement: >-
      The motility/chemotaxis/biofilm functional-bucket partition routed glmP,
      PP_1754, PP_3350, PP_3464, and PP_3774 to this existing alginate boundary
      rather than treating them as generic motility genes.
notes: >-
  First-pass interpretation: UPA00286 is satisfiable in KT2440, but it is not a
  single enzyme chain. It is best treated as a trans-envelope alginate production
  system: AlgD makes the GDP-mannuronate precursor; Alg8/Alg44 drive
  polymerization and cyclic-di-GMP-coupled activation; AlgF/AlgJ/AlgI/AlgX and
  AlgG support periplasmic modification and maturation; AlgE/AlgK support export
  and complex organization; AlgB is retained as regulatory context, not a
  catalytic component. The additional motility-bucket genes are retained as
  boundary context: glmP is a membrane factor required for efficient alginate
  biosynthesis, PP_3350/PP_3464 are alginate export-domain candidates, and
  PP_1754/PP_3774 are alginate-lyase-domain processing/catabolic candidates.
