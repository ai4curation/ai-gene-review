id: MODULE:bacterial_flagellar_assembly_boundary
title: Bacterial flagellar assembly boundary
description: >-
  Umbrella boundary module for KEGG ppu02040 flagellar assembly in Pseudomonas
  putida KT2440. The PSEPK primary set is a coherent flagellar biology map, but
  it is too broad for one gene-review batch because it combines flagellar
  regulation, export and assembly factors, basal-body/hook/filament structural
  proteins, motor/switch/stator components, and nonflagellar
  transport/envelope spillovers. Curate it through those sub-buckets rather than
  as one undifferentiated flagellar pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu02040
    title: Flagellar assembly - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu02040 provides the organism-specific PSEPK flagellar assembly
      umbrella map used to seed this boundary batch.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_boundary.tsv
    title: ppu02040 first-pass batch table
    statement: >-
      The primary-only batch table records 47 selected genes with review,
      curation, and Asta retrieval status.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.tsv
    title: PSEPK ppu02040 flagellar assembly partition table
    statement: >-
      The partition separates the 47 primary genes into flagellar regulation,
      nonflagellar transport/envelope spillover, export/assembly, basal-body/
      hook/filament, and motor/switch/stator buckets.
  - source_id: file:projects/P_PUTIDA/batches/ppu02040_bacterial_flagellar_assembly_partition.md
    title: PSEPK ppu02040 flagellar assembly partition report
    statement: >-
      The partition report records completed first-pass sub-batches and the
      decision to keep fliY, PP_1087, and PP_5157 outside the flagellar
      apparatus core unless direct evidence emerges.
module:
  id: bacterial_flagellar_assembly_boundary
  label: Bacterial flagellar assembly boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: bacterial-type flagellum assembly
      term:
        id: GO:0044780
        label: bacterial-type flagellum assembly
      description: Assembly of the bacterial-type flagellar apparatus.
    - preferred_term: bacterial-type flagellum organization
      term:
        id: GO:0044781
        label: bacterial-type flagellum organization
      description: Organization and biogenesis of bacterial flagellar structures.
    - preferred_term: bacterial-type flagellum-dependent cell motility
      term:
        id: GO:0071973
        label: bacterial-type flagellum-dependent cell motility
      description: Motility output powered by bacterial-type flagella.
    - preferred_term: bacterial-type flagellum
      term:
        id: GO:0009288
        label: bacterial-type flagellum
      description: Whole flagellar apparatus context.
    - preferred_term: bacterial-type flagellum basal body
      term:
        id: GO:0009425
        label: bacterial-type flagellum basal body
      description: Basal-body context for rings, rod, stator, and switch components.
    - preferred_term: positive regulation of bacterial-type flagellum assembly
      term:
        id: GO:1902210
        label: positive regulation of bacterial-type flagellum assembly
      description: Flagellar transcriptional and master-regulator output context.
    - preferred_term: sigma factor activity
      term:
        id: GO:0016987
        label: sigma factor activity
      description: RpoD, RpoN, and FliA regulatory layer context.
    - preferred_term: structural molecule activity
      term:
        id: GO:0005198
        label: structural molecule activity
      description: Structural role for rod, ring, hook, filament, and junction subunits.
  parts:
    - order: 1
      role: Umbrella flagellar assembly boundary
      node:
        id: flagellar_assembly_umbrella_boundary
        label: Bacterial flagellar assembly umbrella boundary
        module_type: BIOLOGICAL_PROCESS
        description: >-
          ppu02040 is a broad flagellar map that should be curated through
          regulation, export/assembly, structural, motor, and spillover
          submodules rather than assigned as one generic pathway to every gene.
        annotons: []
    - order: 2
      role: Flagellar regulation
      node:
        id: flagellar_regulation_index
        label: Flagellar regulation index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          Sigma-factor, master-regulator, response-regulator, and anti-sigma
          control is represented by `flagellar_regulation_boundary`.
        annotons: []
    - order: 3
      role: Flagellar export and assembly support
      node:
        id: flagellar_export_assembly_index
        label: Flagellar export and assembly index
        module_type: BIOLOGICAL_PROCESS
        description: >-
          The FlhA/FlhB/FliPQR export gate, FliI/FliH/FliJ export-energy module,
          hook-length control, and assembly chaperones are represented by
          `flagellar_export_assembly_boundary`.
        annotons: []
    - order: 4
      role: Basal body, hook, and filament structure
      node:
        id: flagellar_basal_body_hook_filament_index
        label: Basal body, hook, and filament index
        module_type: CELLULAR_COMPONENT
        description: >-
          Structural rod, ring, hook, hook-filament junction, filament, and cap
          components are represented by
          `flagellar_basal_body_hook_filament_boundary`.
        annotons: []
    - order: 5
      role: Motor, switch, and stator
      node:
        id: flagellar_motor_switch_stator_index
        label: Motor, switch, and stator index
        module_type: CELLULAR_COMPONENT
        description: >-
          MotAB/MotCD stators, FliG/FliM/FliN switch/rotor proteins, and
          FliL-family support proteins are represented by
          `flagellar_motor_switch_stator_boundary`.
        annotons: []
    - order: 6
      role: Nonflagellar transport/envelope spillovers
      node:
        id: nonflagellar_transport_envelope_spillover_index
        label: Nonflagellar transport/envelope spillover index
        module_type: TRANSPORT_STEP
        description: >-
          fliY, PP_1087, and PP_5157 are represented by
          `transport_envelope_spillover_boundary` unless direct flagellar
          assembly evidence emerges.
        annotons: []
  notes: >-
    This parent module is an index over completed first-pass submodules. The
    submodule reviews carry the gene-level flagellar or spillover claims; this
    umbrella documents ppu02040 pathway satisfiability and keeps the structural
    apparatus, export machinery, motor machinery, regulation, and nonflagellar
    side entries separated.
