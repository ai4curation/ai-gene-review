id: MODULE:glycine_betaine_biosynthesis_boundary
title: Glycine betaine biosynthesis from choline with BetI regulatory boundary
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00529 boundary module for choline-
  derived glycine betaine biosynthesis. The strict catalytic route converts
  choline to betaine aldehyde and then glycine betaine through BetA and BetB.
  BetI is included as regulatory context because the UniPathway member set and
  UniProt record place it in choline regulation of the bet genes, but BetI is
  not a catalytic biosynthetic enzyme.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00529
    title: UniPathway UPA00529
    statement: >-
      The local UPA00529 membership set contains betA, betB, and betI: two
      enzymes for choline-derived glycine betaine synthesis plus a BetI-family
      transcriptional repressor.
  - source_id: GO:0019285
    title: glycine betaine biosynthetic process from choline
    statement: >-
      GO:0019285 is the pathway-level biological-process grounding for the
      conversion of choline into glycine betaine.
  - source_id: file:PSEPK/betA/betA-ai-review.yaml
    title: Curated betA review
    statement: >-
      The betA review accepts choline dehydrogenase activity and retains the
      associated betaine-aldehyde dehydrogenase activity assigned to this BetA
      family member.
  - source_id: file:PSEPK/betB/betB-ai-review.yaml
    title: Curated betB review
    statement: >-
      The betB review accepts NAD+-dependent betaine-aldehyde dehydrogenase
      activity as the main BetB function.
  - source_id: file:PSEPK/betI/betI-ai-review.yaml
    title: Curated betI review
    statement: >-
      The betI review accepts DNA-binding transcription factor activity and
      negative regulation of DNA-templated transcription, keeping BetI as a
      regulatory boundary component rather than a catalytic biosynthetic step.
  - source_id: file:PSEPK/betA/betA-uniprot.txt
    title: UniProtKB entry for betA
    statement: >-
      UniProt states that BetA is involved in biosynthesis of the
      osmoprotectant glycine betaine and catalyzes choline and betaine
      aldehyde oxidation.
  - source_id: file:PSEPK/betB/betB-uniprot.txt
    title: UniProtKB entry for betB
    statement: >-
      UniProt states that BetB catalyzes irreversible oxidation of betaine
      aldehyde to the corresponding acid in glycine betaine biosynthesis.
  - source_id: file:PSEPK/betI/betI-uniprot.txt
    title: UniProtKB entry for betI
    statement: >-
      UniProt states that BetI represses transcription of BetT and BetAB genes
      involved in glycine betaine synthesis.
notes: >-
  First-pass interpretation: UPA00529 is satisfiable as a compact
  osmoprotection-side pathway. The catalytic biosynthesis module is BetA/BetB.
  BetI is retained as a boundary/regulatory member because the pathway member
  list includes it and its curated function is control of bet gene
  transcription. Transporters such as BetT and paralogous choline
  dehydrogenases outside the UPA00529 member set are not included here.
