  knowledge_gaps:
    - gap_statement: >-
        BetA is annotated with both choline dehydrogenase and betaine-aldehyde
        dehydrogenase activity, while BetB is the dedicated betaine aldehyde
        dehydrogenase.
      boundary: >-
        The module records both activities but should not imply that the BetA
        second oxidation is the dominant in vivo route when BetB is present.
      gap_kind:
