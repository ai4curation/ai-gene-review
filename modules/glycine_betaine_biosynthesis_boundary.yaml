        - CURATION
    - gap_statement: >-
        BetI target sites, effector response, and operon architecture are not
        directly established in this first-pass KT2440 evidence set.
      boundary: >-
        BetI is included as a regulatory boundary member by UniProt/GOA family
        evidence; exact promoter/operator claims should wait for direct
        P. putida data.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        UPA00529 does not enumerate the full osmoprotection system in KT2440.
      boundary: >-
        Choline/glycine betaine transporters and unassigned paralogous choline
        dehydrogenases are excluded unless independently assigned to this
        pathway during later curation.
      gap_kind:
