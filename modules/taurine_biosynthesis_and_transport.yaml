  notes: >-
    Taurine / hypotaurine biosynthesis and transport (GO:0042412 + GO:0015734), grounded to four completed
    human gene reviews. Two biosynthetic routes converge on hypotaurine: (route 1) CDO1 (Q16878 PTHR12918,
    GO:0017172, non-heme Fe(II), Cys-Tyr cofactor) oxidises L-cysteine -> cysteinesulfinate, then CSAD
    (Q9Y600 PTHR45677, GO:0004782, PLP) decarboxylates it -> hypotaurine; (route 2) ADO (Q96SZ5 PTHR22966,
    GO:0047800, non-heme Fe(II)) oxidises cysteamine -> hypotaurine. Hypotaurine is then oxidised to taurine
    (the terminal oxidation lacks a firmly assigned human enzyme, so it is not modelled as a node). SLC6A6
    (P31641 PTHR11616, GO:0005369, Na+/Cl- symport) imports taurine at the plasma membrane, dominating supply
    in low-synthesis tissues (retina, heart). ADO is dual-function: besides cysteamine dioxygenase it is the
    Cys/N-degron N-terminal cysteine dioxygenase oxygen sensor (peptidyl-cysteine oxidation; a proposed_new_
    term for the protein-N-terminal-cysteine-dioxygenase MF was noted in the ADO review, since GO lacks a
    dedicated class). CDO1 is a frequently-silenced tumour suppressor; SLC6A6 LOF -> taurine-deficiency retinal
    degeneration/cardiomyopathy. GO term ids/labels verified against the local go.db; module passes structural
    + term-label validation.
