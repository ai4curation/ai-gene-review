id: MODULE:taurine_biosynthesis_and_transport
title: Taurine / hypotaurine biosynthesis and transport (CDO1 -> CSAD / ADO; SLC6A6)
description: >-
  Taurine is one of the most abundant free amino acids in mammalian tissues, essential for bile-salt
  conjugation, osmoregulation, membrane stabilisation, calcium handling and mitochondrial tRNA modification;
  it is supplied both by endogenous biosynthesis from cysteine and by cellular uptake. The main biosynthetic
  route starts with cysteine dioxygenase (CDO1), which oxidises L-cysteine to 3-sulfino-L-alanine
  (cysteinesulfinate) using O2 and a non-heme Fe(II) centre — the committed, rate-limiting step of cysteine
  catabolism. Cysteinesulfinic acid decarboxylase (CSAD), a PLP-dependent enzyme, then decarboxylates
  cysteinesulfinate to hypotaurine. A parallel route is provided by 2-aminoethanethiol (cysteamine)
  dioxygenase (ADO), which oxidises cysteamine (derived from coenzyme A / pantetheine turnover) directly to
  hypotaurine; ADO is additionally the N-terminal cysteine dioxygenase of the Cys/N-degron oxygen-sensing
  pathway. Hypotaurine from either route is oxidised to taurine. Cells that synthesise little taurine rely on
  the plasma-membrane Na+/Cl- -coupled taurine transporter SLC6A6 (TauT) to import it. Defects illustrate the
  pathway's importance: SLC6A6 loss-of-function causes taurine-deficiency retinal degeneration and
  cardiomyopathy, and CDO1 is frequently epigenetically silenced in cancer.
status: DRAFT
evidence:
  - source_id: GO:0042412
    title: taurine biosynthetic process
    statement: CDO1/CSAD and ADO synthesise hypotaurine/taurine from cysteine and cysteamine (GO:0042412).
  - source_id: GO:0000098
    title: sulfur amino acid catabolic process
    statement: The CDO1 step initiates catabolism of the sulfur amino acid cysteine (GO:0000098).
  - source_id: GO:0015734
    title: taurine transmembrane transport
    statement: SLC6A6 imports taurine across the plasma membrane (GO:0015734).
  - source_id: file:human/CDO1/CDO1-ai-review.yaml
    title: CDO1 gene review (human)
    statement: Cysteine dioxygenase (UniProtKB:Q16878, GO:0017172) matches the completed human CDO1 review.
  - source_id: file:human/CSAD/CSAD-ai-review.yaml
    title: CSAD gene review (human)
    statement: Cysteinesulfinic acid decarboxylase (UniProtKB:Q9Y600, GO:0004782) matches the completed human CSAD review.
  - source_id: file:human/ADO/ADO-ai-review.yaml
    title: ADO gene review (human)
    statement: Cysteamine dioxygenase / N-terminal cysteine dioxygenase (UniProtKB:Q96SZ5, GO:0047800) matches the completed human ADO review.
  - source_id: file:human/SLC6A6/SLC6A6-ai-review.yaml
    title: SLC6A6 gene review (human)
    statement: Taurine:sodium symporter / TauT (UniProtKB:P31641, GO:0005369) matches the completed human SLC6A6 review.
