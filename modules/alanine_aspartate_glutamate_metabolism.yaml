  notes: >-
    This module is intentionally broad because KEGG ppu00250 is a hub map. The
    batch review should decide which members are core alanine/aspartate/
    glutamate reactions and which are better treated as side nodes for arginine,
    purine, pyrimidine, NAD, proline/polyamine, amino-sugar, or lysine
    catabolism modules.
