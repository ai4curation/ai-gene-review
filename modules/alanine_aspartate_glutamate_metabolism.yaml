          label: cytoplasm
        description: Most soluble bacterial amino-acid metabolism enzymes operate in the cytoplasm.
  parts:
    - order: 1
      role: alanine transamination
      node:
        id: alanine_transamination
        label: Pyruvate and glutamate to alanine and 2-oxoglutarate
        module_type: REACTION
        annotons:
