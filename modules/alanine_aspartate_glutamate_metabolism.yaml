id: MODULE:alanine_aspartate_glutamate_metabolism
title: Alanine, aspartate, and glutamate metabolism
description: >-
  A bacterial boundary module for alanine, aspartate, glutamate, glutamine, and
  asparagine interconversion. It covers central amino-nitrogen assimilation
  through glutamate dehydrogenase, glutamine synthetase, and glutamate synthase;
  alanine aminotransferase chemistry; aspartate formation and catabolism;
  asparagine synthesis and hydrolysis; and connected proline, polyamine, and
  succinate-semialdehyde side routes. In Pseudomonas putida KT2440, KEGG
  ppu00250 also pulls in nucleotide, arginine, pyrimidine, NAD, amino-sugar, and
  lysine-catabolism enzymes that use aspartate, glutamine, or glutamate as
  donors or products. Those are tracked as boundary context unless gene-level
  evidence supports a committed alanine/aspartate/glutamate role.
status: DRAFT
evidence:
  - source_id: GO:0006520
    title: amino acid metabolic process
    statement: >-
      The module is grounded in the GO amino-acid metabolism branch and focuses
      on the alanine, aspartate, glutamate, glutamine, and asparagine hub.
  - source_id: GO:0006536
    title: glutamate metabolic process
    statement: >-
      Glutamate is the central amino-nitrogen donor and product connecting
      transamination, reductive amination, GS/GOGAT, proline, and polyamine
      reactions.
  - source_id: GO:0006531
    title: aspartate metabolic process
    statement: >-
      Aspartate supplies amino acid, nucleotide, NAD, arginine, and pyrimidine
      branches in the KEGG ppu00250 membership set.
  - source_id: KEGG:ppu00250
    title: Alanine, aspartate and glutamate metabolism - Pseudomonas putida KT2440
    statement: >-
      The KEGG PSEPK bucket provides the first-pass candidate set, but combines
      core alanine/aspartate/glutamate reactions with broad nitrogen-assimilation
      and cross-pathway donor/acceptor side nodes.
module:
  id: alanine_aspartate_glutamate_metabolism
  label: Alanine, aspartate, and glutamate metabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: amino acid metabolic process
      term:
        id: GO:0006520
        label: amino acid metabolic process
      description: Metabolism of amino acids and derivatives.
    - preferred_term: L-alanine biosynthetic process
      term:
        id: GO:0042852
        label: L-alanine biosynthetic process
      description: Formation of L-alanine, usually by transamination from pyruvate.
    - preferred_term: aspartate metabolic process
      term:
        id: GO:0006531
        label: aspartate metabolic process
      description: Formation and use of aspartate as a nitrogen and carbon donor.
    - preferred_term: L-aspartate biosynthetic process
      term:
        id: GO:0006532
        label: L-aspartate biosynthetic process
      description: Formation of L-aspartate.
    - preferred_term: glutamate metabolic process
      term:
        id: GO:0006536
        label: glutamate metabolic process
      description: Formation and use of glutamate as a central amino-nitrogen donor.
    - preferred_term: L-glutamate biosynthetic process
      term:
        id: GO:0097054
        label: L-glutamate biosynthetic process
      description: Formation of L-glutamate.
    - preferred_term: L-glutamine biosynthetic process
      term:
        id: GO:1901704
        label: L-glutamine biosynthetic process
