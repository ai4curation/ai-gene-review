id: MODULE:carbon_fixation_calvin_cycle_boundary
title: Carbon fixation by Calvin cycle boundary
description: >-
  Boundary/absence module for KEGG ppu00710 in Pseudomonas putida KT2440. The
  organism-specific "Carbon fixation by Calvin cycle" map does not establish a
  complete Calvin-Benson-Bassham cycle in KT2440: the candidate set lacks the
  route-defining Rubisco and phosphoribulokinase steps. Its genes instead
  represent reusable non-oxidative pentose-phosphate reactions, lower
  EMP/gluconeogenic reactions, phosphoenolpyruvate carboxylase anaplerotic
  carbon fixation, malic enzyme, and malate dehydrogenase side context.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00710
    title: Carbon fixation by Calvin cycle - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00710 provides the PSEPK curation batch. Its KT2440 membership
      contains Rpe, RpiA, TktA, Tal, GapA/GapB, PGK, TpiA, Fba, Fbp, Ppc, MaeB,
      and Mdh, but no curated Rubisco or phosphoribulokinase candidates.
  - source_id: file:modules/pentose_phosphate_pathway.yaml
    title: Pentose phosphate pathway module
    statement: >-
      Rpe, RpiA, TktA, and Tal are already interpreted through the
      non-oxidative pentose-phosphate pathway rather than a Calvin-cycle
      commitment.
  - source_id: file:modules/entner_doudoroff_and_gluconeogenesis.yaml
    title: Entner-Doudoroff and gluconeogenesis module
    statement: >-
      GapA/GapB, PGK, TpiA, Fba, and Fbp are central lower-trunk or
      gluconeogenic enzymes in KT2440.
module:
  id: carbon_fixation_calvin_cycle_boundary
  label: Carbon fixation by Calvin cycle boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: carbon fixation
      term:
        id: GO:0015977
        label: carbon fixation
      description: Broad carbon fixation process; in this batch it is supported by PEPC anaplerotic carboxylation, not a complete Calvin cycle.
    - preferred_term: pentose-phosphate shunt
      term:
        id: GO:0006098
        label: pentose-phosphate shunt
      description: Pentose phosphate pathway context represented by Rpe, RpiA, Tal, and TktA.
    - preferred_term: pentose-phosphate shunt, non-oxidative branch
      term:
        id: GO:0009052
        label: pentose-phosphate shunt, non-oxidative branch
      description: Non-oxidative PPP carbon rearrangement context.
    - preferred_term: gluconeogenesis
      term:
        id: GO:0006094
        label: gluconeogenesis
      description: Central-carbon side context for Fbp, PGK, TpiA, and related lower-trunk enzymes.
    - preferred_term: glycolytic process
      term:
        id: GO:0006096
        label: glycolytic process
      description: Lower EMP/triose-phosphate side context in the KEGG map.
    - preferred_term: phosphoenolpyruvate carboxylase activity
      term:
        id: GO:0008964
        label: phosphoenolpyruvate carboxylase activity
      description: Ppc anaplerotic CO2/bicarbonate fixation to oxaloacetate.
    - preferred_term: malate dehydrogenase (decarboxylating) (NADP+) activity
      term:
        id: GO:0004473
        label: malate dehydrogenase (decarboxylating) (NADP+) activity
      description: MaeB malic enzyme side context.
    - preferred_term: L-malate dehydrogenase (NAD+) activity
      term:
        id: GO:0030060
        label: L-malate dehydrogenase (NAD+) activity
      description: Mdh TCA malate/oxaloacetate redox context.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The soluble PPP, gluconeogenic, and anaplerotic enzymes in this batch are cytosolic/cytoplasmic.
  parts:
    - order: 1
      role: Calvin-cycle absence guardrail
      node:
        id: calvin_cycle_absence_guardrail
        label: Calvin-cycle absence guardrail
        module_type: METABOLIC_PATHWAY
        description: >-
          The ppu00710 candidate set should not be read as a complete
          Calvin-Benson-Bassham cycle in KT2440. The batch lacks the defining
          carboxylation and regeneration commitments represented by Rubisco and
          phosphoribulokinase. The genes present are reusable central-carbon
          enzymes that overlap with CBB maps in autotrophs.
    - order: 2
      role: Non-oxidative PPP overlap
      node:
        id: non_oxidative_ppp_overlap
        label: Non-oxidative pentose-phosphate overlap
        module_type: METABOLIC_PATHWAY
        description: >-
          Rpe, RpiA, TktA, and Tal are non-oxidative PPP enzymes. They can be
          drawn in Calvin-cycle maps because they rearrange ribose/ribulose,
          sedoheptulose, and glyceraldehyde phosphate pools, but their curated
          KT2440 context remains pentose-phosphate metabolism.
        annotons:
          - id: rpe_ribulose_phosphate_epimerase
            label: "rpe: ribulose-phosphate 3-epimerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpe
            function:
              preferred_term: D-ribulose-phosphate 3-epimerase activity
              term:
                id: GO:0004750
                label: D-ribulose-phosphate 3-epimerase activity
            role_description: Non-oxidative PPP ribulose/ribose/xylulose phosphate interconversion context.
          - id: rpiA_ribose_phosphate_isomerase
            label: "rpiA: ribose-5-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rpiA
            function:
              preferred_term: ribose-5-phosphate isomerase activity
              term:
                id: GO:0004751
                label: ribose-5-phosphate isomerase activity
            role_description: Non-oxidative PPP ribose-5-phosphate isomerization.
          - id: tktA_transketolase
            label: "tktA: transketolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tktA
            function:
              preferred_term: transketolase activity
              term:
                id: GO:0004802
                label: transketolase activity
            role_description: Non-oxidative PPP two-carbon transfer.
          - id: tal_transaldolase
            label: "tal: transaldolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tal
            function:
              preferred_term: transaldolase activity
              term:
                id: GO:0004801
                label: transaldolase activity
            role_description: Non-oxidative PPP three-carbon transfer.
    - order: 3
      role: Lower EMP and gluconeogenic overlap
      node:
        id: lower_emp_gluconeogenic_overlap
        label: Lower EMP and gluconeogenic overlap
        module_type: METABOLIC_PATHWAY
        description: >-
          GapA/GapB, PGK, TpiA, Fba, and Fbp are lower-trunk or gluconeogenic
          enzymes. They can appear in Calvin-cycle maps because CBB carbon
          rearrangement shares triose-phosphate and fructose/sedoheptulose
          phosphate chemistry, but KT2440 reviews keep them as
          glycolysis/gluconeogenesis or ED/central-carbon context.
        annotons:
          - id: gapA_gapB_glyceraldehyde_3_phosphate_dehydrogenase
            label: "gapA/gapB: glyceraldehyde-3-phosphate dehydrogenase"
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
                term:
                  id: GO:0004365
                  label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
            function:
              preferred_term: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
              term:
                id: GO:0004365
                label: glyceraldehyde-3-phosphate dehydrogenase (NAD+) (phosphorylating) activity
            role_description: Reversible lower-trunk aldehyde oxidation/reduction context.
          - id: pgk_phosphoglycerate_kinase
            label: "pgk: phosphoglycerate kinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgk
            function:
              preferred_term: phosphoglycerate kinase activity
              term:
                id: GO:0004618
                label: phosphoglycerate kinase activity
            role_description: Lower EMP/gluconeogenic phosphoglycerate kinase step.
          - id: tpiA_triose_phosphate_isomerase
            label: "tpiA: triose-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: tpiA
            function:
              preferred_term: triose-phosphate isomerase activity
              term:
                id: GO:0004807
                label: triose-phosphate isomerase activity
            role_description: Reversible DHAP/glyceraldehyde-3-phosphate interconversion.
          - id: fba_fructose_bisphosphate_aldolase
            label: "fba: fructose-bisphosphate aldolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fba
            function:
              preferred_term: fructose-bisphosphate aldolase activity
              term:
                id: GO:0004332
                label: fructose-bisphosphate aldolase activity
            role_description: Fructose bisphosphate aldolase side context shared by lower EMP and gluconeogenesis.
          - id: fbp_fructose_bisphosphatase
            label: "fbp: fructose 1,6-bisphosphatase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: fbp
            function:
              preferred_term: fructose 1,6-bisphosphate 1-phosphatase activity
              term:
                id: GO:0042132
                label: fructose 1,6-bisphosphate 1-phosphatase activity
            role_description: Gluconeogenic fructose-bisphosphate dephosphorylation.
    - order: 4
      role: Anaplerotic carbon fixation and malate side nodes
      node:
        id: anaplerotic_carbon_fixation_and_malate_side_nodes
        label: Anaplerotic carbon fixation and malate side nodes
        module_type: METABOLIC_PATHWAY
        description: >-
          Ppc provides genuine anaplerotic carbon fixation through
          phosphoenolpyruvate carboxylase, but this is not Calvin-cycle CO2
          assimilation. MaeB and Mdh are malate/oxaloacetate redox or
          decarboxylating side nodes linked to central carbon and TCA context.
        annotons:
          - id: ppc_phosphoenolpyruvate_carboxylase
            label: "ppc: phosphoenolpyruvate carboxylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: ppc
            function:
              preferred_term: phosphoenolpyruvate carboxylase activity
              term:
                id: GO:0008964
                label: phosphoenolpyruvate carboxylase activity
            role_description: Anaplerotic carboxylation of phosphoenolpyruvate to oxaloacetate.
          - id: maeB_malic_enzyme
            label: "maeB: NADP-dependent malic enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: maeB
            function:
              preferred_term: malate dehydrogenase (decarboxylating) (NADP+) activity
              term:
                id: GO:0004473
                label: malate dehydrogenase (decarboxylating) (NADP+) activity
            role_description: Malic enzyme side node in central carbon metabolism.
          - id: mdh_malate_dehydrogenase
            label: "mdh: malate dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: mdh
            function:
              preferred_term: L-malate dehydrogenase (NAD+) activity
              term:
                id: GO:0030060
                label: L-malate dehydrogenase (NAD+) activity
            role_description: TCA-cycle malate/oxaloacetate redox context.
