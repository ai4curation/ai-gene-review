id: MODULE:homogentisate_catabolism
title: Homogentisate catabolism
description: >-
  A reusable three-reaction pathway that opens the aromatic ring of
  homogentisate to form maleylacetoacetate, isomerizes
  maleylacetoacetate to fumarylacetoacetate, and hydrolyzes
  fumarylacetoacetate to fumarate and acetoacetate. This lower pathway accepts
  homogentisate from multiple upstream aromatic-substrate routes and ends at
  metabolites that can enter central carbon metabolism.
status: DRAFT
evidence:
  - source_id: GO:1902000
    title: homogentisate catabolic process
    statement: >-
      GO:1902000 defines the biological-process boundary from homogentisate
      consumption through lower-pathway products.
  - source_id: file:modules/homogentisate_catabolism-deep-research-openscientist.md
    title: OpenScientist research for the reusable homogentisate-catabolism module
    statement: >-
      The module-level review supports the ordered HmgA-HmgC-HmgB lower
      pathway and distinguishes its boundaries from upstream aromatic-substrate
      routes and downstream central metabolism.
  - source_id: file:PSEPK/hmgA/hmgA-ai-review.yaml
    title: PSEPK hmgA gene review
    statement: >-
      The curated KT2440 review identifies Q88E47 as an iron-dependent
      homogentisate 1,2-dioxygenase and separates its enzymatic role from
      misassigned transcription-regulator annotations.
  - source_id: file:PSEPK/hmgC/hmgC-ai-review.yaml
    title: PSEPK hmgC gene review
    statement: >-
      The curated KT2440 review identifies Q88E49 as the
      glutathione-dependent maleylacetoacetate isomerase.
  - source_id: file:PSEPK/hmgB/hmgB-ai-review.yaml
    title: PSEPK hmgB gene review
    statement: >-
      The curated KT2440 review identifies Q88E48 as the terminal
      fumarylacetoacetase.
  - source_id: PMID:15262943
    title: >-
      The homogentisate pathway: a central catabolic pathway involved in the
      degradation of L-phenylalanine, L-tyrosine, and
      3-hydroxyphenylacetate in Pseudomonas putida.
    statement: >-
      The organism-specific study identifies HmgA, HmgC, and HmgB as the
      three enzymes that convert homogentisate to fumarate and acetoacetate.
module:
  id: homogentisate_catabolism
  label: Homogentisate catabolism
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: homogentisate catabolic process
      term:
        id: GO:1902000
        label: homogentisate catabolic process
      description: >-
        Conversion of homogentisate to fumarate and acetoacetate through
        maleylacetoacetate and fumarylacetoacetate.
  parts:
    - order: 1
      role: homogentisate ring cleavage
      node:
        id: homogentisate_ring_cleavage
        label: Homogentisate oxidative ring cleavage
        module_type: REACTION
        annotons:
          - id: homogentisate_dioxygenase
            label: Homogentisate 1,2-dioxygenase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HmgA homogentisate 1,2-dioxygenases
                representative_members:
                  - preferred_term: PSEPK HmgA
                    term:
                      id: UniProtKB:Q88E47
                      label: Homogentisate 1,2-dioxygenase
            function:
              preferred_term: homogentisate 1,2-dioxygenase activity
              term:
                id: GO:0004411
                label: homogentisate 1,2-dioxygenase activity
              substrates:
                - preferred_term: homogentisate
                - preferred_term: dioxygen
              products:
                - preferred_term: maleylacetoacetate
              cofactors:
                - preferred_term: iron ion
            role_description: >-
              Performs oxidative aromatic-ring cleavage to create the open-chain
              maleylacetoacetate intermediate.
    - order: 2
      role: maleylacetoacetate isomerization
      node:
        id: maleylacetoacetate_isomerization
        label: Maleylacetoacetate isomerization
        module_type: REACTION
        annotons:
          - id: maleylacetoacetate_isomerase
            label: Maleylacetoacetate isomerase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HmgC maleylacetoacetate isomerases
                representative_members:
                  - preferred_term: PSEPK HmgC
                    term:
                      id: UniProtKB:Q88E49
                      label: Maleylacetoacetate isomerase
            function:
              preferred_term: maleylacetoacetate isomerase activity
              term:
                id: GO:0016034
                label: maleylacetoacetate isomerase activity
              substrates:
                - preferred_term: maleylacetoacetate
              products:
                - preferred_term: fumarylacetoacetate
              cofactors:
                - preferred_term: glutathione
            role_description: >-
              Converts the cis-like maleyl intermediate to the fumaryl
              intermediate used by HmgB.
    - order: 3
      role: fumarylacetoacetate hydrolysis
      node:
        id: fumarylacetoacetate_hydrolysis
        label: Fumarylacetoacetate hydrolysis
        module_type: REACTION
        annotons:
          - id: fumarylacetoacetase
            label: Fumarylacetoacetase
            participant:
              selector_type: FAMILY
              family:
                preferred_term: HmgB fumarylacetoacetases
                representative_members:
                  - preferred_term: PSEPK HmgB
                    term:
                      id: UniProtKB:Q88E48
                      label: Fumarylacetoacetase
            function:
              preferred_term: fumarylacetoacetase activity
              term:
                id: GO:0004334
                label: fumarylacetoacetase activity
              substrates:
                - preferred_term: fumarylacetoacetate
                - preferred_term: H2O
              products:
                - preferred_term: fumarate
                - preferred_term: acetoacetate
            role_description: >-
              Releases fumarate and acetoacetate for entry into central carbon
              metabolism.
  connections:
    - source: homogentisate_ring_cleavage
      target: maleylacetoacetate_isomerization
      connection_type: PROVIDES_INPUT_FOR
      description: HmgA produces maleylacetoacetate for HmgC.
    - source: maleylacetoacetate_isomerization
      target: fumarylacetoacetate_hydrolysis
      connection_type: PROVIDES_INPUT_FOR
      description: HmgC produces fumarylacetoacetate for HmgB.
  notes: >-
    The module begins at homogentisate so that phenylalanine, tyrosine,
    3-hydroxyphenylacetate, and other upstream routes can connect without being
    treated as required parts. Exact KT2440 accessions serve as representative
    members and do not restrict the module to Pseudomonas. A nonenzymatic
    glutathione-mediated maleylacetoacetate isomerization bypass has been
    reported in MAAI-deficient mammalian contexts; it is not modeled here as a
    general enzymatic variant because HmgC is the canonical biological
    implementation of this step.
