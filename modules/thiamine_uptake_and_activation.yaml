id: MODULE:thiamine_uptake_and_activation
title: Thiamine (vitamin B1) uptake and diphosphate activation (SLC19A2/A3 -> TPK1 -> SLC25A19; THTPA)
description: >-
  Humans cannot synthesise thiamine (vitamin B1) and must take it up from the diet, then convert it to its
  active cofactor form thiamine diphosphate (ThDP, also called thiamine pyrophosphate, TPP), which is
  required by pyruvate dehydrogenase, 2-oxoglutarate dehydrogenase, branched-chain 2-oxoacid dehydrogenase
  and transketolase. Free thiamine is imported across the plasma membrane by the two high-affinity SLC19
  thiamine transporters THTR1 (SLC19A2) and THTR2 (SLC19A3). In the cytosol thiamine pyrophosphokinase TPK1
  transfers a diphosphate group from ATP (physiologically UTP is the preferred donor) to thiamine, producing
  ThDP. ThDP is then delivered to the mitochondrial matrix by the inner-membrane carrier SLC25A19 to supply
  the matrix dehydrogenases. Cellular thiamine triphosphate (ThTP), a minor phosphorylated form, is hydrolysed
  back to ThDP by the cytosolic thiamine triphosphatase THTPA, contributing to phosphothiamine homeostasis.
  Defects in this module cause thiamine-responsive megaloblastic anaemia (SLC19A2 / Rogers syndrome),
  biotin-thiamine-responsive basal ganglia disease (SLC19A3), thiamine metabolism dysfunction syndrome 5 /
  episodic encephalopathy (TPK1) and Amish lethal microcephaly / THMD4 (SLC25A19).
status: DRAFT
evidence:
  - source_id: GO:0006772
    title: thiamine metabolic process
    statement: The module covers thiamine uptake, activation to ThDP, and phosphothiamine homeostasis (GO:0006772).
  - source_id: GO:0015888
    title: thiamine transport
    statement: SLC19A2/SLC19A3 import thiamine across the plasma membrane (GO:0015888).
  - source_id: GO:0009229
    title: thiamine diphosphate biosynthetic process
    statement: TPK1 produces the active cofactor thiamine diphosphate (GO:0009229).
  - source_id: file:human/SLC19A2/SLC19A2-ai-review.yaml
    title: SLC19A2 gene review (human)
    statement: Plasma-membrane thiamine transporter THTR1 (UniProtKB:O60779, GO:0015234) matches the completed human SLC19A2 review.
  - source_id: file:human/SLC19A3/SLC19A3-ai-review.yaml
    title: SLC19A3 gene review (human)
    statement: Plasma-membrane thiamine transporter THTR2 (UniProtKB:Q9BZV2, GO:0015234) matches the completed human SLC19A3 review.
  - source_id: file:human/TPK1/TPK1-ai-review.yaml
    title: TPK1 gene review (human)
    statement: Thiamine pyrophosphokinase (UniProtKB:Q9H3S4, GO:0004788) matches the completed human TPK1 review.
  - source_id: file:human/SLC25A19/SLC25A19-ai-review.yaml
    title: SLC25A19 gene review (human)
    statement: Mitochondrial ThDP carrier (UniProtKB:Q9HC21, GO:0090422) matches the completed human SLC25A19 review.
  - source_id: file:human/THTPA/THTPA-ai-review.yaml
    title: THTPA gene review (human)
    statement: Cytosolic thiamine triphosphatase (UniProtKB:Q9BU02, GO:0050333) matches the completed human THTPA review.
