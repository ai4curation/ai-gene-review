  notes: >-
    Thiamine (vitamin B1) uptake and diphosphate activation (GO:0006772), grounded to five completed human
    gene reviews. Humans are thiamine auxotrophs: uptake -> plasma-membrane SLC19A2/THTR1 (O60779) +
    SLC19A3/THTR2 (Q9BZV2), both PTHR10686 (thiamine-specific SLC19 members; the paralog SLC19A1 is a folate
    carrier), GO:0015234 H+/thiamine antiport; activation -> cytosolic TPK1 (Q9H3S4 PTHR13622) transfers PPi
    from ATP (human prefers UTP; GO:0141200) to thiamine -> ThDP (GO:0004788/GO:0009229); distribution ->
    mitochondrial inner-membrane carrier SLC25A19 (Q9HC21 PTHR24089, GO:0090422, already reviewed) imports ThDP
    to the matrix dehydrogenases; homeostasis -> cytosolic THTPA (Q9BU02 PTHR14586, GO:0050333) hydrolyses the
    minor ThTP pool back to ThDP. ThDP is the cofactor for PDH, OGDH, BCKDH and transketolase. Both SLC19A2 and
    SLC19A3 also show secondary pyridoxine transport (kept non-core); neither transports folate (SLC19A2 wrong
    folic-acid-transport IEA removed) nor biotin (Reactome states no biotin affinity for SLC19A3, despite
    BTBGD's biotin-responsiveness). Diseases: SLC19A2 = TRMA/Rogers, SLC19A3 = BTBGD, TPK1 = THMD5, SLC25A19 =
    Amish lethal microcephaly/THMD4. GO term ids/labels verified against the local go.db; module passes
    structural + term-label validation.
