id: MODULE:lysr_transcriptional_regulator_boundary
title: LysR-family transcriptional regulator boundary
description: Boundary module for the PSEPK regulation/signal-transduction LysR-family expansion. It groups
  107 predicted LysR-family transcription regulators, preserving existing curated pathway-specific anchors
  for pcaQ, galR, and catR while treating the remaining paralogs conservatively as DNA-binding transcription
  regulators until target regulons, effector ligands, and regulatory directions are experimentally resolved.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_regulation_signal_transduction_lysr_transcriptional_regulators.tsv
  title: PSEPK regulation-bucket LysR split
  statement: The functional-bucket partition groups 107 LysR-family transcriptional regulators for family-level
    first-pass curation.
notes: This module is a boundary/regulator-family grouping, not one satisfiable pathway. Direct pathway-process
  annotations on named TrpI, MetR, LysR, and other regulators are treated as pathway association rather
  than catalytic participation unless a curated anchor review supports pathway-specific transcription
  activation.
