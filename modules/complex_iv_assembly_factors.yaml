id: MODULE:complex_iv_assembly_factors
title: Mitochondrial Complex IV (cytochrome c oxidase) assembly factors; TACO1/COA3/COX11/COA6/COX16/COA5/COX18/COA7/PET100/PET117
description: >-
  Assembly of cytochrome c oxidase (Complex IV) around its three mtDNA-encoded catalytic subunits
  (MT-CO1, MT-CO2, MT-CO3) is a highly ordered, factor-dependent process, because the copper and
  heme redox centres must be built into hydrophobic membrane proteins in the correct sequence.
  This module groups the dedicated assembly factors by the step they serve. Synthesis of the
  central MT-CO1 subunit is activated by the matrix RNA-binding translational activator TACO1
  (which binds the MT-CO1 mRNA on the mitoribosome), and the nascent MT-CO1 is captured and
  stabilised by the MITRAC module (COA3/CCDC56 with COX14) that couples its translation to
  assembly. The MT-CO1 CuB site is metallated by the copper chaperone COX11, while the MT-CO2 CuA
  site is built by an intermembrane-space copper-relay/thiol-redox system — COA6 and COA7 (twin
  CX9C protein-disulfide reductases), COX16 and COA5 — acting with the SCO1/SCO2 metallochaperones
  (reviewed elsewhere). MT-CO2 itself is threaded into the membrane by the OXA1L-family insertase
  COX18 (with COX20). Finally, PET100 and PET117 are small chaperones that promote incorporation
  of the early nuclear-encoded subunits (COX7/COX8) to complete the holoenzyme. Loss of any factor
  causes mitochondrial complex IV (cytochrome c oxidase) deficiency — Leigh syndrome, fatal
  infantile cardioencephalomyopathy (COA5/COA6), axonal neuropathy with leukoencephalopathy (COA7)
  and other encephalopathies.
status: DRAFT
evidence:
  - source_id: GO:0033617
    title: mitochondrial respiratory chain complex IV assembly
    statement: >-
      The module is grounded in mitochondrial respiratory chain complex IV assembly (GO:0033617);
      it groups the dedicated factors that build cytochrome c oxidase.
  - source_id: Reactome:R-HSA-9864848
    title: Complex IV assembly
    statement: >-
      The MT-CO1/MT-CO2 metallation and subunit-incorporation steps follow the human Reactome
      "Complex IV assembly" pathway (R-HSA-9865449 CuB, R-HSA-9865630 CuA, R-HSA-9902096 COX18).
  - source_id: file:human/TACO1/TACO1-ai-review.yaml
    title: TACO1 gene review (human)
    statement: >-
      The MT-CO1 translational-activator step (UniProtKB:Q9BSH4, GO:0097177) matches the completed human TACO1 review.
  - source_id: file:human/COA3/COA3-ai-review.yaml
    title: COA3 gene review (human)
    statement: >-
      The MITRAC MT-CO1 stabilisation step (UniProtKB:Q9Y2R0) matches the completed human COA3 review.
  - source_id: file:human/COX11/COX11-ai-review.yaml
    title: COX11 gene review (human)
    statement: >-
      The MT-CO1 CuB metallation step (UniProtKB:Q9Y6N1, GO:0016531) matches the completed human COX11 review.
  - source_id: file:human/COA6/COA6-ai-review.yaml
    title: COA6 gene review (human)
    statement: >-
      The MT-CO2 CuA copper-relay step (UniProtKB:Q5JTJ3, GO:0015035) matches the completed human COA6 review.
  - source_id: file:human/COX16/COX16-ai-review.yaml
    title: COX16 gene review (human)
    statement: >-
      The MT-CO2 CuA assembly step (UniProtKB:Q9P0S2) matches the completed human COX16 review.
  - source_id: file:human/COA5/COA5-ai-review.yaml
    title: COA5 gene review (human)
    statement: >-
      The early MT-CO2 maturation step (UniProtKB:Q86WW8) matches the completed human COA5 review.
  - source_id: file:human/COX18/COX18-ai-review.yaml
    title: COX18 gene review (human)
    statement: >-
      The MT-CO2 membrane-insertion step (UniProtKB:Q8N8Q8, GO:0032977) matches the completed human COX18 review.
  - source_id: file:human/COA7/COA7-ai-review.yaml
    title: COA7 gene review (human)
    statement: >-
      The IMS thiol-redox assembly step (UniProtKB:Q96BR5, GO:0015035) matches the completed human COA7 review.
  - source_id: file:human/PET100/PET100-ai-review.yaml
    title: PET100 gene review (human)
    statement: >-
      The early-subunit (COX7/COX8) incorporation step (UniProtKB:P0DJ07) matches the completed human PET100 review.
  - source_id: file:human/PET117/PET117-ai-review.yaml
    title: PET117 gene review (human)
    statement: >-
      The PET100-related early-assembly step (UniProtKB:Q6UWS5) matches the completed human PET117 review.
module:
  id: complex_iv_assembly_factors
  label: Complex IV (cytochrome c oxidase) assembly factors
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: mitochondrial respiratory chain complex IV assembly
      term:
        id: GO:0033617
        label: mitochondrial respiratory chain complex IV assembly
      description: Ordered, factor-dependent assembly of cytochrome c oxidase around MT-CO1/CO2/CO3.
  context:
    cellular_components:
      - preferred_term: mitochondrial inner membrane
        term:
          id: GO:0005743
          label: mitochondrial inner membrane
        description: Most Complex IV assembly factors act on the mitochondrial inner membrane.
      - preferred_term: mitochondrial intermembrane space
        term:
          id: GO:0005758
          label: mitochondrial intermembrane space
        description: The CuA copper-relay/thiol-redox factors (COA6, COA7, COA5) act in the intermembrane space.
  parts:
    - order: 1
      role: MT-CO1 synthesis and stabilisation
      node:
        id: mtco1_synthesis
        label: MT-CO1 translation activation and MITRAC stabilisation
        module_type: REACTION
        annotons:
          - id: taco1_activity
            label: "TACO1: MT-CO1 translational activator"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: TACO1 / S4-domain translational activator family
                term:
                  id: PANTHER:PTHR12532
                  label: TRANSLATIONAL ACTIVATOR OF CYTOCHROME C OXIDASE 1
                representative_members:
                  - preferred_term: TACO1 (human)
                    term:
                      id: UniProtKB:Q9BSH4
                      label: Translational activator of cytochrome c oxidase 1
            function:
              preferred_term: mitochondrial ribosome binding
              term:
                id: GO:0097177
                label: mitochondrial ribosome binding
              substrates:
                - preferred_term: MT-CO1 (COX1) mitochondrial mRNA / mitoribosome
              products:
                - preferred_term: translated MT-CO1 protein
              evidence:
                - source_id: file:human/TACO1/TACO1-ai-review.yaml
                  statement: matrix RNA-binding translational activator; binds the mitoribosome and activates MT-CO1 translation; deficiency = Leigh syndrome
            locations:
              - preferred_term: mitochondrial matrix
                term:
                  id: GO:0005759
                  label: mitochondrial matrix
            role_description: Activates translation of the MT-CO1 catalytic core subunit.
          - id: coa3_activity
            label: "COA3 (MITRAC12/CCDC56): MT-CO1 stabilisation"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COA3 / MITRAC12 family
                term:
                  id: PANTHER:PTHR15642
                  label: CYTOCHROME C OXIDASE ASSEMBLY FACTOR 3
                representative_members:
                  - preferred_term: COA3 (human)
                    term:
                      id: UniProtKB:Q9Y2R0
                      label: Cytochrome c oxidase assembly factor 3 homolog, mitochondrial
            processes:
              - preferred_term: mitochondrial respiratory chain complex IV assembly
                term:
                  id: GO:0033617
                  label: mitochondrial respiratory chain complex IV assembly
            locations:
              - preferred_term: mitochondrial inner membrane
                term:
                  id: GO:0005743
                  label: mitochondrial inner membrane
            evidence:
              - source_id: file:human/COA3/COA3-ai-review.yaml
                statement: MITRAC component (with COX14) that captures/stabilises nascent MT-CO1 and couples its translation to assembly
            role_description: Stabilises nascent MT-CO1 in the MITRAC module.
    - order: 2
      role: MT-CO1 CuB copper metallation
      node:
        id: cub_metallation
        label: copper insertion into the MT-CO1 CuB site
        module_type: REACTION
        annotons:
          - id: cox11_activity
            label: "COX11: CuB copper chaperone"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: COX11 copper chaperone family
                term:
