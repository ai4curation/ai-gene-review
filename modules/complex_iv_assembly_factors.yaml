  connections:
    - source: mtco1_synthesis
      target: cub_metallation
      connection_type: PROVIDES_INPUT_FOR
      description: The stabilised MT-CO1 produced with TACO1/COA3 is metallated at CuB by COX11.
    - source: cub_metallation
      target: subunit_incorporation
      connection_type: PROVIDES_INPUT_FOR
      description: The metallated MT-CO1 seed recruits the nuclear subunits via PET100/PET117.
    - source: mtco2_insertion
      target: cua_metallation
      connection_type: PROVIDES_INPUT_FOR
      description: Membrane-inserted MT-CO2 (COX18) is CuA-metallated by the COA6/COA7/COX16/COA5 relay.
    - source: cua_metallation
      target: subunit_incorporation
      connection_type: PROVIDES_INPUT_FOR
      description: Metallated MT-CO2 joins the MT-CO1 module as the nuclear subunits are incorporated.
  notes: >-
    Complex IV (cytochrome c oxidase) assembly factors, grouped by the step they serve and grounded
    to the human proteins TACO1 (UniProtKB:Q9BSH4, GO:0097177), COA3 (Q9Y2R0), COX11 (Q9Y6N1,
    GO:0016531), COA6 (Q5JTJ3, GO:0015035), COA7 (Q96BR5, GO:0015035), COX16 (Q9P0S2), COA5 (Q86WW8),
    COX18 (Q8N8Q8, GO:0032977), PET100 (P0DJ07) and PET117 (Q6UWS5); all carry
    GO:0033617 (Complex IV assembly). GO molecular-function/BP/location terms were taken from the
    completed human gene reviews and verified against the local go.db; Reactome reaction ids/titles
    were verified against the local reactome cache. Each factor uses a PANTHER family selector; the
    catalytically-informative factors (TACO1 mitoribosome binding, COX11 copper chaperone, COX18
    insertase, COA6/COA7 protein-disulfide reductase) carry an MF, while the purely scaffolding
    factors (COA3, COX16, COA5, PET100, PET117) are modelled by their GO:0033617 BP role. The
    mtDNA-encoded catalytic subunits (MT-CO1/CO2/CO3) and the copper/heme metallochaperones already
    reviewed on main (SCO1/SCO2 GO:0016531, COX10 heme O, COX15 heme a, SURF1, COX17) are the
    substrates/partners of these factors; the nuclear structural subunits and their holoenzyme are
    the sibling Complex IV module. The current Complex IV membership term is GO:0045277 (GO:0005751
    obsolete); the assembly BP is GO:0033617. Disorders: mitochondrial complex IV deficiency — Leigh
    syndrome (TACO1, PET100), fatal infantile cardioencephalomyopathy (COA5, COA6), axonal neuropathy
    with leukoencephalopathy / SCAN3 (COA7), and other encephalopathies (COA3, COX16, COX18, PET117).
