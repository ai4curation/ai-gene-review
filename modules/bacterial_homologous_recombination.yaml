id: MODULE:bacterial_homologous_recombination
title: Bacterial homologous recombination
description: Boundary module for KEGG ppu03440 homologous recombination in Pseudomonas putida KT2440. The strict homologous-recombination
  core includes RecA-mediated presynaptic filament formation, RecFOR mediator activity, RecBCD double-strand-end processing,
  and RuvAB/RuvC or RecG processing of branched DNA intermediates. The organism-specific KEGG map also includes SSB, RecJ,
  PriA, DNA polymerase III replisome/clamp-loader subunits, DnaQ-like exonucleases, and PolA as repair, replication-restart,
  or repair-synthesis side nodes. These are satisfiable boundary members but should not all be interpreted as specific RecA
  strand-exchange factors.
status: DRAFT
evidence:
- source_id: KEGG:ppu03440
  title: Homologous recombination - Pseudomonas putida KT2440
  statement: KEGG ppu03440 provides the organism-specific PSEPK curation batch with RecA/RecFOR, RecBCD, RuvABC, RecG, PriA,
    SSB, RecJ, PolA, DnaQ-like exonucleases, and DNA polymerase III replication-side proteins.
- source_id: file:projects/P_PUTIDA/batches/ppu03440_bacterial_homologous_recombination.tsv
  title: ppu03440 first-pass batch table
  statement: The batch table records 24 KEGG ppu03440 membership genes, including 12 primary ppu03440 bucket genes and 12
    DNA replication or repair side nodes.
- source_id: file:PSEPK/recA/recA-ai-review.yaml
  title: Curated recA review
  statement: The recA review accepts single-stranded DNA binding, ATP-dependent DNA-acting activity, DNA recombination, DNA
    repair, DNA damage response, and SOS response.
- source_id: file:PSEPK/recF/recF-ai-review.yaml
  title: Curated recF review
  statement: The recF review accepts single-stranded DNA binding, ATP binding, DNA repair, and double-strand break repair
    for the RecFOR mediator role.
- source_id: file:PSEPK/recO/recO-ai-review.yaml
  title: Curated recO review
  statement: The recO review accepts DNA repair, double-strand break repair, DNA recombination, and bacterial nucleoid localization.
- source_id: file:PSEPK/recR/recR-ai-review.yaml
  title: Curated recR review
  statement: The recR review accepts DNA binding, DNA repair, and DNA recombination, and recommends zinc ion binding over
    generic metal ion binding.
- source_id: file:PSEPK/recB/recB-ai-review.yaml
  title: Curated recB review
  statement: The recB review accepts 3'-5' DNA helicase activity, exodeoxyribonuclease V activity, ATP binding/hydrolysis,
    exodeoxyribonuclease V complex membership, and homologous-recombination DSB repair.
- source_id: file:PSEPK/recC/recC-ai-review.yaml
  title: Curated recC review
  statement: The recC review accepts RecBCD complex membership, DNA binding, DNA recombination, and homologous-recombination
    DSB repair, while treating helicase/ATPase terms as subunit over-annotations.
- source_id: file:PSEPK/recD/recD-ai-review.yaml
  title: Curated recD review
  statement: The recD review accepts 5'-3' DNA helicase activity, ATP binding/hydrolysis, RecBCD complex membership, and homologous-recombination
    DSB repair.
- source_id: file:PSEPK/ruvA/ruvA-ai-review.yaml
  title: Curated ruvA review
  statement: The ruvA review accepts four-way junction DNA binding, DNA recombination, DNA repair, Holliday junction helicase
    complex membership, and RuvABC resolvase-complex context.
- source_id: file:PSEPK/ruvB/ruvB-ai-review.yaml
  title: Curated ruvB review
  statement: The ruvB review accepts four-way junction DNA binding, four-way junction helicase activity, ATP binding/hydrolysis,
    DNA recombination, DNA repair, and Holliday junction resolvase-complex context.
- source_id: file:PSEPK/ruvC/ruvC-ai-review.yaml
  title: Curated ruvC review
  statement: The ruvC review accepts crossover junction DNA endonuclease activity, magnesium ion binding, DNA recombination,
    DNA repair, and Holliday junction resolvase complex membership.
- source_id: file:PSEPK/recG/recG-ai-review.yaml
  title: Curated recG review
  statement: The recG review accepts 3'-5' DNA helicase activity, ATP binding/hydrolysis, DNA repair, and DNA recombination.
- source_id: file:PSEPK/priA/priA-ai-review.yaml
  title: Curated priA review
  statement: The priA review accepts 3'-5' DNA helicase activity, ATP binding/hydrolysis, DNA replication initiation, recombination-linked
    replication restart, zinc ion binding, and primosome-complex membership.
- source_id: file:projects/P_PUTIDA/batches/module_dna_replication_repair_recombination_repair_helicase_recombination_core.tsv
  title: PSEPK repair-helicase/recombination-core split table
  statement: The split table records the 20 broad DNA-repair/recombination candidates reviewed as supplemental boundary context
    for the homologous-recombination module.
notes: 'First-pass hole-filling interpretation: RecFOR, RecBCD, RuvABC, RecG, RecA, and PriA are the ppu03440-specific curation
  targets. SSB, RecJ, PolA, DNA polymerase III clamp/clamp-loader/proofreading proteins, and DnaQ-like exonuclease candidates
  are retained as legitimate KEGG boundary nodes shared with replication, BER, NER, and mismatch-repair modules. The 2026-07-10
  repair-helicase/recombination split adds supplemental Lhr/DinG/UvrD-like helicases, SbcCD, RdgC, RadA, RecN, Uup, and unresolved
  low-evidence boundary candidates; ProtNLM-only names are not promoted to module functions.'
