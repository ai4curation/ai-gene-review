id: MODULE:amino_acid_peptide_polyamine_abc_transport_boundary
title: Amino-acid, peptide, and polyamine ABC importer boundary
description: Boundary module for the PSEPK transport/membrane/efflux split containing amino-acid, ectoine/osmoprotectant,
  and related ABC importer binding proteins, permeases, and ATPase components. Component-level roles are kept separate unless
  substrate and partner evidence support a complete importer assignment.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_transport_membrane_efflux_amino_acid_peptide_polyamine_abc_importers.tsv
  title: PSEPK transport/membrane/efflux amino-acid/peptide/polyamine ABC importer batch
  statement: The partition groups 15 amino-acid, ectoine/osmoprotectant, or related ABC importer components for first-pass
    curation.
notes: 'First-pass interpretation: membrane permeases, periplasmic binding proteins, and ATP-binding proteins are modeled
  as ABC importer components. The split avoids asserting exact substrates except where product/family evidence supports glutamate/aspartate,
  arginine/amino-acid, ectoine/Ehu, branched-chain amino-acid, or glutamine-like context.'
