id: MODULE:dna_bucket_architectural_rna_protein_spillover_boundary
title: DNA-bucket architectural, RNA-helicase, chaperone, and protease spillover boundary
description: Boundary module for PSEPK genes that entered the DNA replication/repair/recombination umbrella through broad
  DNA, helicase, inhibitor, or stress keywords but resolve to architectural DNA-binding, RNA helicase, protein-folding, or
  protease contexts.
status: DRAFT
evidence:
- source_id: file:projects/P_PUTIDA/batches/module_dna_replication_repair_recombination_architectural_rna_protein_spillovers.tsv
  title: PSEPK architectural/RNA/protein spillover split table
  statement: The split table records seven genes pulled from the broad DNA replication/repair/recombination functional bucket
    and routed to non-DNA-repair contexts.
- source_id: file:projects/P_PUTIDA/batches/module_protein_folding_targeting_turnover_dna_damage_or_repair_spillover_proteases.tsv
  title: PSEPK protein-turnover DNA-damage spillover split table
  statement: The split table records three protein-folding/turnover genes whose protease-like keywords overlap DNA-damage
    or RadC/SRAP-family repair context.
- source_id: file:PSEPK/dnaJ/dnaJ-ai-review.yaml
  title: Curated dnaJ review
  statement: The dnaJ review supports DnaJ as a DnaK/Hsp70 co-chaperone with protein-folding, protein-refolding, ATPase-activator,
    and chaperone-binding roles.
- source_id: file:PSEPK/tldD/tldD-ai-review.yaml
  title: Curated tldD review
  statement: The tldD review records the non-DNA-repair routing decision for this spillover member.
