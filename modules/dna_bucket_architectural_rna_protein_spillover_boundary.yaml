notes: First-pass boundary. TldD is retained as metalloprotease/proteolysis; IHF alpha/beta as architectural and regulatory
  DNA-binding; CspD as cold-shock-domain DNA-binding replication inhibitor context; HrpA/HrpB as RNA-helicase-family proteins;
  DnaJ as DnaK-system chaperone context. PP_0758 and PP_2941 are SRAP/HMCES-like protein-DNA cross-link repair proteins, while
  PP_2493 is retained conservatively as a RadC/JAB/MPN metalloprotease-like spillover pending direct DNA-repair evidence.
