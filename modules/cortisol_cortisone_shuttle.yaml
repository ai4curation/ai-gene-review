id: MODULE:cortisol_cortisone_shuttle
title: Cortisol-cortisone shuttle — pre-receptor glucocorticoid interconversion; HSD11B1/HSD11B2
description: >-
  Tissue glucocorticoid action is set not only by circulating cortisol but by local,
  pre-receptor interconversion between active cortisol and inactive cortisone, catalysed by
  two endoplasmic-reticulum-membrane 11beta-hydroxysteroid dehydrogenases with opposite
  directionality. 11beta-HSD type 1 (HSD11B1) acts predominantly as an NADPH-dependent
  reductase — its direction fixed by NADPH generated in the ER lumen by hexose-6-phosphate
  dehydrogenase (H6PD) — regenerating active cortisol from cortisone and thereby amplifying
  glucocorticoid signalling in liver, adipose tissue and brain (a validated metabolic-syndrome
  drug target). 11beta-HSD type 2 (HSD11B2) is an NAD+-dependent, essentially unidirectional
  dehydrogenase that inactivates cortisol to cortisone; in aldosterone-target epithelia
  (distal nephron, colon, salivary gland) it destroys cortisol locally so that the
  non-selective mineralocorticoid receptor is protected from illicit activation by cortisol,
  conferring aldosterone specificity, and in the placenta it shields the fetus from maternal
  glucocorticoid. Loss of HSD11B2 causes apparent mineralocorticoid excess (AME), a severe
  juvenile hypertension with hypokalaemia; altered HSD11B1 activity underlies cortisone
  reductase deficiency and is implicated in the metabolic syndrome.
status: DRAFT
evidence:
  - source_id: GO:0008211
    title: glucocorticoid metabolic process
    statement: >-
      The module is grounded in glucocorticoid metabolic process (GO:0008211); it covers the
      pre-receptor cortisol<->cortisone interconversion that governs local glucocorticoid action.
  - source_id: Reactome:R-HSA-194023
    title: "HSD11B2,HSD11B1 dimer oxidise CORT to COR"
    statement: >-
      The cortisol->cortisone oxidation is the human Reactome reaction R-HSA-194023; HSD11B1
      also runs the reverse (cortisone->cortisol) reduction in vivo.
  - source_id: file:human/HSD11B1/HSD11B1-ai-review.yaml
    title: HSD11B1 gene review (human)
    statement: >-
      The cortisone->cortisol reductase step (UniProtKB:P28845, GO:0070524) matches the
      completed human HSD11B1 review.
  - source_id: file:human/HSD11B2/HSD11B2-ai-review.yaml
    title: HSD11B2 gene review (human)
    statement: >-
      The cortisol->cortisone dehydrogenase step (UniProtKB:P80365, GO:0070523) matches the
      completed human HSD11B2 review.
module:
  id: cortisol_cortisone_shuttle
  label: Cortisol-cortisone shuttle (pre-receptor glucocorticoid interconversion)
