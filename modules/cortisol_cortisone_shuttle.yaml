    - source: hsd11b2_step
      target: hsd11b1_step
      connection_type: PROVIDES_INPUT_FOR
      description: Cortisone generated by HSD11B2 is the substrate that HSD11B1 reduces back to cortisol.
    - source: hsd11b1_step
      target: hsd11b2_step
      connection_type: PROVIDES_INPUT_FOR
      description: Cortisol regenerated by HSD11B1 is the substrate that HSD11B2 inactivates to cortisone.
  notes: >-
    Pre-receptor cortisol<->cortisone shuttle grounded to the human enzymes HSD11B1
    (UniProtKB:P28845, GO:0070524, NADP+-dependent, EC 1.1.1.146) and HSD11B2 (P80365,
    GO:0070523, NAD+-dependent, EC 1.1.1.-). The two enzymes catalyse the same chemical
    interconversion in opposite directions, so the module is a cycle rather than a linear
    pathway: HSD11B1 predominantly reduces cortisone to active cortisol (its direction fixed by
    ER-lumenal H6PD NADPH), while HSD11B2 unidirectionally oxidises cortisol to inactive
    cortisone. GO molecular-function/location terms were taken from the completed human gene
    reviews and verified against the local go.db; the shared human Reactome reaction R-HSA-194023
    (cortisol->cortisone) was verified against the local reactome cache. Each enzyme uses a
    PANTHER family selector with the human protein as representative so the module generalises
    across orthologs/paralogs. Physiologically this shuttle sets tissue glucocorticoid tone:
    HSD11B1 amplifies it (liver/adipose/brain; metabolic-syndrome target), HSD11B2 confers
    aldosterone specificity on the mineralocorticoid receptor (kidney/colon) and protects the
    fetus (placenta). Disorders: apparent mineralocorticoid excess (HSD11B2), cortisone reductase
    deficiency and metabolic-syndrome association (HSD11B1). Upstream cortisol is made by the
    adrenal steroidogenesis module (CYP11B1); the sex-steroid biosynthesis enzymes are a
    separate module.
