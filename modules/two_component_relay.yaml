id: MODULE:two_component_relay
title: Generic two-component / phosphorelay signal transduction motif
description: >-
  The minimal, reusable phosphorelay motif of two-component signal transduction:
  a sensor histidine kinase autophosphorylates on a conserved histidine in
  response to a stimulus, then transfers the phosphoryl group to a conserved
  aspartate on a cognate response regulator, which effects the output (often
  transcriptional). An optional histidine-phosphotransfer (Hpt) step inserts a
  His->Asp->His->Asp multistep relay between the sensor and the terminal response
  regulator. The motif is gene-free and taxon-neutral: it fixes the sensor-kinase
  / (phosphotransfer) / response-regulator roles by molecular-function term and
  the His->Asp phosphotransfer topology. Bacterial, archaeal, plant, and fungal
  two-component systems embed it through `conforms_to` (e.g. the Sln1->Ypd1->Ssk1
  phosphorelay upstream of MODULE:scer_hog1_cascade). Grounded in GO:0000160
  (phosphorelay signal transduction system).
status: DRAFT
evidence:
  - source_id: GO:0000160
    title: phosphorelay signal transduction system
    statement: >-
      The motif is grounded in the phosphorelay (two-component) signal
      transduction system: a sensor kinase and a response regulator coupled by
      His->Asp phosphotransfer.
notes: >-
  Reusable conformance target. The canonical motif is the linear multistep
  phosphorelay sensor -> Hpt -> response regulator. A multistep phosphorelay
  (e.g. the yeast Sln1 -> Ypd1 -> Ssk1 system) conforms EXACT. A simple bacterial
  two-component system, which lacks a discrete Hpt domain and transfers directly
  from the sensor to the response regulator, declares
  `conforms_to: [{template: two_component_relay, status: WITH_DEVIATIONS}]` with a
  deviation noting the collapsed Hpt step. Participants are abstract selectors
  because the motif asserts the phosphorelay chemistry only.
module:
  id: two_component_relay
  label: Two-component / phosphorelay (sensor kinase -> response regulator)
  module_type: SIGNALING_PATHWAY
  concepts:
    - preferred_term: phosphorelay signal transduction system
      term:
        id: GO:0000160
        label: phosphorelay signal transduction system
      description: His->Asp phosphotransfer from a sensor kinase to a response regulator.
  parts:
    - order: 1
      role: sensor histidine kinase autophosphorylation
      node:
        id: sensor_kinase
        label: Sensor histidine kinase autophosphorylation
        module_type: REACTION
        description: >-
          A stimulus-regulated sensor histidine kinase autophosphorylates on a
          conserved histidine.
        annotons:
          - id: sensor_kinase_activity
            label: phosphorelay sensor kinase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphorelay sensor kinase activity
                term:
                  id: GO:0000155
                  label: phosphorelay sensor kinase activity
            function:
              preferred_term: phosphorelay sensor kinase activity
              term:
                id: GO:0000155
                label: phosphorelay sensor kinase activity
            role_description: Senses the stimulus and autophosphorylates on histidine.
    - order: 2
      role: histidine-phosphotransfer (Hpt) relay
      node:
        id: phosphotransfer
        label: Histidine phosphotransfer (Hpt) relay
        module_type: REACTION
        description: >-
          The Hpt domain shuttles the phosphoryl group (His->Asp->His->Asp)
          between the sensor and the terminal response regulator. In simple
          bacterial two-component systems this step is collapsed and the sensor
          transfers directly to the response regulator (a WITH_DEVIATIONS case).
        annotons:
          - id: hpt_activity
            label: histidine phosphotransfer kinase activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: histidine phosphotransfer kinase activity
                term:
                  id: GO:0009927
                  label: histidine phosphotransfer kinase activity
            function:
              preferred_term: histidine phosphotransfer kinase activity
              term:
                id: GO:0009927
                label: histidine phosphotransfer kinase activity
            role_description: Relays the phosphoryl group between sensor and response regulator.
    - order: 3
      role: response regulator output
      node:
        id: response_regulator
        label: Response regulator aspartate phosphorylation
        module_type: REACTION
        description: >-
          The response regulator receives the phosphoryl group on a conserved
          aspartate and effects the output (commonly DNA binding / transcription).
        annotons:
          - id: response_regulator_activity
            label: phosphorelay response regulator activity
            participant:
              selector_type: ANY_WITH_FUNCTION
              required_function:
                preferred_term: phosphorelay response regulator activity
                term:
                  id: GO:0000156
                  label: phosphorelay response regulator activity
            function:
              preferred_term: phosphorelay response regulator activity
              term:
                id: GO:0000156
                label: phosphorelay response regulator activity
            role_description: Receives the phosphoryl group and effects the output.
  connections:
    - source: sensor_kinase
      target: phosphotransfer
      connection_type: CAUSES
      description: The sensor kinase transfers its phosphoryl group into the Hpt relay.
    - source: phosphotransfer
      target: response_regulator
      connection_type: CAUSES
      description: The Hpt relay delivers the phosphoryl group to the response regulator.
