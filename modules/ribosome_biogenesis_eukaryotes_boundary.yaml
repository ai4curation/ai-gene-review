id: MODULE:ribosome_biogenesis_eukaryotes_boundary
title: Ribosome biogenesis in eukaryotes boundary
description: >-
  Boundary/absence module for KEGG ppu03008 in Pseudomonas putida KT2440. The
  organism-specific KEGG map contains rnc/PP_1433, PP_2912, and orn/PP_4902.
  These are native bacterial RNA-processing or kinase-like side nodes: RNase
  III rRNA processing, oligoribonuclease RNA-fragment turnover, and an inferred
  RIO-type serine/threonine kinase-like protein. This should not be interpreted
  as evidence for a eukaryotic ribosome-biogenesis pathway in a bacterium.
status: DRAFT
evidence:
  - source_id: KEGG:ppu03008
    title: Ribosome biogenesis in eukaryotes - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu03008 provides the PSEPK curation batch, but the
      organism-specific membership is limited to rnc/PP_1433, PP_2912, and
      orn/PP_4902.
  - source_id: file:projects/P_PUTIDA/batches/ppu03008_ribosome_biogenesis_eukaryotes_boundary.tsv
    title: ppu03008 first-pass batch table
    statement: >-
      The batch table records three candidate review rows for this KEGG bucket
      after worklist extraction.
  - source_id: UniProtKB:Q88MY5
    title: Ribonuclease 3
    statement: >-
      UniProt describes rnc as RNase III, a double-stranded-RNA endonuclease
      involved in processing primary rRNA transcripts to immediate 23S and 16S
      rRNA precursors.
  - source_id: UniProtKB:Q88IT7
    title: Non-specific serine/threonine protein kinase
    statement: >-
      UniProt describes PP_2912 as an inferred non-specific serine/threonine
      protein kinase in the RIO-type Ser/Thr kinase family.
  - source_id: UniProtKB:Q88DC5
    title: Oligoribonuclease
    statement: >-
      UniProt describes orn as a cytoplasmic 3'-to-5' exoribonuclease specific
      for small oligoribonucleotides.
  - source_id: file:PSEPK/rnc/rnc-ai-review.yaml
    title: Curated rnc review
    statement: >-
      The first-pass rnc review accepts ribonuclease III activity,
      double-stranded RNA binding, cytoplasmic localization, and rRNA
      processing.
  - source_id: file:PSEPK/PP_2912/PP_2912-ai-review.yaml
    title: Curated PP_2912 review
    statement: >-
      The first-pass PP_2912 review accepts protein serine/threonine kinase
      activity and treats ATP binding as non-core cofactor context.
  - source_id: file:PSEPK/orn/orn-ai-review.yaml
    title: Curated orn review
    statement: >-
      The first-pass orn review accepts 3'-5'-RNA exonuclease activity, RNA
      exonuclease activity producing 5'-phosphomonoesters, and cytoplasmic
      localization.
module:
  id: ribosome_biogenesis_eukaryotes_boundary
  label: Ribosome biogenesis in eukaryotes boundary
  module_type: BIOLOGICAL_PROCESS
  concepts:
    - preferred_term: eukaryotic ribosome-biogenesis pathway absence
      description: >-
        Boundary interpretation of the KEGG map: KT2440 is a bacterium and the
        ppu03008 members are bacterial RNA-processing or kinase-like side nodes,
        not a eukaryotic nucleolar ribosome-biogenesis pathway.
    - preferred_term: ribonuclease III activity
      term:
        id: GO:0004525
        label: ribonuclease III activity
      description: Native molecular function of rnc.
    - preferred_term: rRNA processing
      term:
        id: GO:0006364
        label: rRNA processing
      description: Bacterial pre-rRNA processing context for RNase III.
    - preferred_term: protein serine/threonine kinase activity
      term:
        id: GO:0004674
        label: protein serine/threonine kinase activity
      description: Current best supported molecular function of PP_2912.
    - preferred_term: 3'-5'-RNA exonuclease activity
      term:
        id: GO:0000175
        label: 3'-5'-RNA exonuclease activity
      description: Native molecular function of orn.
  parts:
    - order: 1
      role: Eukaryotic ribosome-biogenesis pathway absence
      node:
        id: eukaryotic_ribosome_biogenesis_absence
        label: Eukaryotic ribosome-biogenesis absence in KT2440
        module_type: BIOLOGICAL_PROCESS
        description: >-
          P. putida KT2440 does not encode a eukaryotic nucleolar
          ribosome-biogenesis pathway. The KEGG bucket is treated as a
          boundary/cross-map artifact with three bacterial side nodes.
        annotons: []
    - order: 2
      role: RNase III rRNA-processing side node
      node:
        id: rnc_rRNA_processing
        label: rnc RNase III rRNA processing
        module_type: REACTION
        description: >-
          rnc encodes bacterial RNase III, which digests double-stranded RNA and
          processes primary rRNA transcripts to immediate 23S and 16S rRNA
          precursors.
        annotons:
          - id: rnc_ribonuclease_iii
            label: "rnc: ribonuclease III"
            participant:
              selector_type: GENE
              gene:
                preferred_term: rnc
            function:
              preferred_term: ribonuclease III activity
              term:
                id: GO:0004525
                label: ribonuclease III activity
              substrates:
                - preferred_term: double-stranded RNA
              products:
                - preferred_term: RNA fragments with 5'-phosphomonoester termini
              cofactors:
                - preferred_term: magnesium ion
            processes:
              - preferred_term: rRNA processing
                term:
                  id: GO:0006364
                  label: rRNA processing
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: Bacterial pre-rRNA-processing side node; not evidence for eukaryotic ribosome biogenesis.
    - order: 3
      role: RIO-type kinase-like side node
      node:
        id: pp2912_rio_type_kinase
        label: PP_2912 RIO-type kinase-like protein
        module_type: MOLECULAR_FUNCTION
        description: >-
          PP_2912 is an inferred RIO-type serine/threonine kinase-like protein.
          The local evidence supports kinase activity but does not establish a
          specific eukaryotic ribosome-biogenesis role.
        annotons:
          - id: pp2912_serine_threonine_kinase
            label: "PP_2912: RIO-type serine/threonine kinase-like protein"
            participant:
              selector_type: GENE
              gene:
                preferred_term: PP_2912
            function:
              preferred_term: protein serine/threonine kinase activity
              term:
                id: GO:0004674
                label: protein serine/threonine kinase activity
              substrates:
                - preferred_term: protein substrate
                - preferred_term: ATP
              products:
                - preferred_term: phosphorylated protein substrate
                - preferred_term: ADP
            role_description: RIO-family kinase-like side node; pathway role remains unresolved in KT2440.
    - order: 4
      role: Oligoribonuclease RNA-turnover side node
      node:
        id: orn_oligoribonuclease
        label: orn oligoribonuclease
        module_type: REACTION
        description: >-
          orn encodes cytoplasmic oligoribonuclease, a 3'-to-5' exoribonuclease
          for small oligoribonucleotides in bacterial RNA turnover.
        annotons:
          - id: orn_3_to_5_rna_exonuclease
            label: "orn: oligoribonuclease"
            participant:
              selector_type: GENE
              gene:
                preferred_term: orn
            function:
              preferred_term: 3'-5'-RNA exonuclease activity
              term:
                id: GO:0000175
                label: 3'-5'-RNA exonuclease activity
              substrates:
                - preferred_term: small oligoribonucleotide
              products:
                - preferred_term: ribonucleotide monophosphate
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: RNA-turnover side node; not a eukaryotic ribosome-biogenesis factor.
  notes: >-
    This module records an explicit boundary/absence call. The three PSEPK
    members are valid bacterial RNA-processing or kinase-like annotations, but
    no eukaryotic ribosome-biogenesis GO annotation is proposed for KT2440.
