              term:
                id: GO:0003863
                label: branched-chain 2-oxo acid dehydrogenase activity
            role_description: Alpha E1 subunit for branched-chain 2-oxoacid dehydrogenase.
          - id: bkdAB_bckdh_e1_beta
            label: "bkdAB: BCKDH E1 beta"
            participant:
              selector_type: GENE
