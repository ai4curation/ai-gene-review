id: MODULE:lipoic_acid_metabolism_boundary
title: Lipoic acid metabolism boundary
description: >-
  Boundary module for KEGG ppu00785 in Pseudomonas putida KT2440. The strict
  endogenous protein-lipoylation route is LipB octanoyl transfer followed by
  LipA radical-SAM sulfur insertion. The broader KEGG lipoic-acid map also
  includes lipoate-dependent enzyme complexes and shared dihydrolipoyl
  dehydrogenases: pyruvate dehydrogenase, 2-oxoglutarate dehydrogenase,
  branched-chain 2-oxoacid dehydrogenase, glycine cleavage, and an
  acetoin-cleavage E2-like component. These are tracked as lipoylated target or
  lipoamide redox context rather than additional lipoate-biosynthesis enzymes.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00785
    title: Lipoic acid metabolism - Pseudomonas putida KT2440
    statement: >-
      The PSEPK KEGG bucket provides the first-pass candidate set and combines
      LipA/LipB lipoylation machinery with enzymes that carry or recycle
      protein-bound lipoamide.
  - source_id: GO:0009249
    title: protein lipoylation
    statement: >-
      The module is grounded in the GO biological-process term for addition of
      lipoic acid to proteins.
  - source_id: GO:0009107
    title: lipoate biosynthetic process
    statement: >-
      LipA represents endogenous lipoate biosynthesis by sulfur insertion into
      an octanoylated protein substrate.
  - source_id: file:PSEPK/lipA/lipA-ai-review.yaml
    title: lipA first-pass review
    statement: >-
      lipA is curated as the radical-SAM lipoate synthase step of endogenous
      protein lipoylation.
  - source_id: file:PSEPK/lipB/lipB-ai-review.yaml
    title: lipB first-pass review
    statement: >-
      lipB is curated as the octanoyltransferase step that loads octanoyl
      groups onto lipoyl domains before LipA sulfur insertion.
  - source_id: file:modules/pyruvate_metabolism_boundary.yaml
    title: Pyruvate metabolism boundary module
    statement: >-
      Existing pyruvate-metabolism curation captures the pyruvate dehydrogenase
      lipoate-dependent complex context.
  - source_id: file:modules/glycine_serine_threonine_metabolism.yaml
    title: Glycine, serine, and threonine metabolism module
    statement: >-
      Existing glycine/serine/threonine curation captures glycine-cleavage
      complex context.
module:
  id: lipoic_acid_metabolism_boundary
  label: Lipoic acid metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: protein lipoylation
      term:
        id: GO:0009249
        label: protein lipoylation
      description: Covalent attachment and maturation of protein-bound lipoyl groups.
    - preferred_term: lipoate biosynthetic process
      term:
        id: GO:0009107
        label: lipoate biosynthetic process
      description: Endogenous formation of lipoate/lipoyl cofactors.
    - preferred_term: lipoyl(octanoyl) transferase activity
      term:
        id: GO:0033819
        label: lipoyl(octanoyl) transferase activity
      description: LipB loading of octanoyl groups onto lipoyl-domain proteins.
    - preferred_term: lipoate synthase activity
      term:
        id: GO:0016992
        label: lipoate synthase activity
      description: LipA sulfur insertion into octanoylated protein substrates.
  parts:
    - order: 1
      role: Endogenous protein lipoylation
      node:
        id: endogenous_protein_lipoylation
        label: LipB-LipA endogenous protein lipoylation
        module_type: METABOLIC_PATHWAY
        description: >-
          LipB transfers an octanoyl group from octanoyl-ACP to target lipoyl
          domains. LipA then inserts sulfur atoms into the octanoylated lysine
          side chain, forming the protein-bound lipoyl cofactor used by
          2-oxoacid dehydrogenase and glycine-cleavage systems.
        annotons:
          - id: lipB_octanoyltransferase
            label: "lipB: octanoyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lipB
            function:
              preferred_term: lipoyl(octanoyl) transferase activity
              term:
                id: GO:0033819
                label: lipoyl(octanoyl) transferase activity
              substrates:
                - preferred_term: octanoyl-[acyl-carrier protein]
                - preferred_term: L-lysyl-[protein]
              products:
                - preferred_term: N(6)-octanoyl-L-lysyl-[protein]
                - preferred_term: holo-[acyl-carrier protein]
              evidence:
                - source_id: EC:2.3.1.181
                  statement: octanoyltransferase
            processes:
              - preferred_term: protein lipoylation
                term:
                  id: GO:0009249
                  label: protein lipoylation
            role_description: First endogenous protein-lipoylation step.
          - id: lipA_lipoate_synthase
            label: "lipA: lipoate synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lipA
            function:
              preferred_term: lipoate synthase activity
              term:
                id: GO:0016992
                label: lipoate synthase activity
              substrates:
                - preferred_term: N(6)-octanoyl-L-lysyl-[protein]
                - preferred_term: S-adenosyl-L-methionine
              products:
                - preferred_term: N(6)-lipoyl-L-lysyl-[protein]
              evidence:
                - source_id: EC:2.8.1.8
                  statement: lipoate synthase
            processes:
              - preferred_term: protein lipoylation
                term:
                  id: GO:0009249
                  label: protein lipoylation
              - preferred_term: lipoate biosynthetic process
                term:
                  id: GO:0009107
                  label: lipoate biosynthetic process
            role_description: Radical-SAM sulfur insertion step forming protein-bound lipoyl groups.
    - order: 2
      role: Pyruvate dehydrogenase lipoylated target context
      node:
        id: pyruvate_dehydrogenase_lipoate_context
        label: Pyruvate dehydrogenase lipoate context
        module_type: PROTEIN_COMPLEX
        description: >-
          AceE/AceF and associated Lpd activity are lipoate-dependent pyruvate
          dehydrogenase context. They consume and recycle protein-bound
          lipoamide but do not synthesize lipoate.
        annotons:
          - id: aceE_pdh_e1
            label: "aceE: pyruvate dehydrogenase E1"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aceE
            function:
              preferred_term: pyruvate dehydrogenase (acetyl-transferring) activity
              term:
                id: GO:0004739
                label: pyruvate dehydrogenase (acetyl-transferring) activity
            role_description: E1 component transferring acetyl units to lipoyl-E2.
          - id: aceF_pdh_e2
            label: "aceF: pyruvate dehydrogenase E2"
            participant:
              selector_type: GENE
              gene:
                preferred_term: aceF
            function:
              preferred_term: dihydrolipoyllysine-residue acetyltransferase activity
              term:
                id: GO:0004742
                label: dihydrolipoyllysine-residue acetyltransferase activity
            role_description: Lipoylated E2 acetyltransferase target of protein lipoylation.
          - id: lpd_pdh_e3_context
            label: "lpd: shared dihydrolipoyl dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpd
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
            role_description: Shared E3 redox component regenerating oxidized lipoamide.
    - order: 3
      role: 2-oxoglutarate dehydrogenase lipoylated target context
      node:
        id: oxoglutarate_dehydrogenase_lipoate_context
        label: 2-oxoglutarate dehydrogenase lipoate context
        module_type: PROTEIN_COMPLEX
        description: >-
          SucA/SucB and Lpd-family redox components are TCA-cycle
          2-oxoglutarate dehydrogenase context. SucB carries the lipoylated E2
          domain.
        annotons:
          - id: sucA_ogdh_e1
            label: "sucA: oxoglutarate dehydrogenase E1"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sucA
            function:
              preferred_term: oxoglutarate dehydrogenase (succinyl-transferring) activity
              term:
                id: GO:0004591
                label: oxoglutarate dehydrogenase (succinyl-transferring) activity
            role_description: E1 component transferring succinyl units to lipoyl-E2.
          - id: sucB_ogdh_e2
            label: "sucB: oxoglutarate dehydrogenase E2"
            participant:
              selector_type: GENE
              gene:
                preferred_term: sucB
            function:
              preferred_term: dihydrolipoyllysine-residue succinyltransferase activity
              term:
                id: GO:0004149
                label: dihydrolipoyllysine-residue succinyltransferase activity
            role_description: Lipoylated E2 succinyltransferase target of protein lipoylation.
          - id: lpdG_ogdh_e3_context
            label: "lpdG: dihydrolipoyl dehydrogenase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: lpdG
            function:
              preferred_term: dihydrolipoyl dehydrogenase (NADH) activity
              term:
                id: GO:0004148
                label: dihydrolipoyl dehydrogenase (NADH) activity
            role_description: Lpd-family redox component for lipoamide recycling.
    - order: 4
      role: Branched-chain 2-oxoacid dehydrogenase lipoylated target context
      node:
        id: bckdh_lipoate_context
        label: Branched-chain 2-oxoacid dehydrogenase lipoate context
        module_type: PROTEIN_COMPLEX
        description: >-
          The BkdAA/BkdAB/BkdB/LpdV proteins are lipoate-dependent BCKDH
