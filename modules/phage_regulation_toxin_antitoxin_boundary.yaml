  XRE/Cro split. Not every batch member is phage-origin: RodZ-like, CdaR/PucR, LuxR/GerE, and PuuR/cupin records are retained
  as regulator spillovers with unresolved pathway placement. mqsR is kept as an MqsR-family toxin candidate; quorum-sensing
  and biofilm annotations are not promoted to core KT2440 phenotypes.'
