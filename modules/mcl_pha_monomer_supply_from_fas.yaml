id: MODULE:mcl_pha_monomer_supply_from_fas
title: mcl-PHA monomer supply from de novo fatty-acid synthesis
description: >-
  A Pseudomonas putida KT2440 UniPathway UPA00212 module for the PhaG bridge
  from de novo fatty-acid synthesis to medium-chain-length
  polyhydroxyalkanoate (mcl-PHA) biosynthesis. PhaG routes ACP-bound
  (R)-3-hydroxyacyl fatty-acid-synthesis intermediates toward mcl-PHA monomer
  supply, but direct ACP:CoA transacylation versus thioesterase release followed
  by CoA ligation remains unresolved for the native route. This module records
  that FAS-to-PHA connection rather than the PhaC polymerization step or the
  alternative beta-oxidation/PhaJ monomer-supply routes.
status: DRAFT
evidence:
  - source_id: UniPathway:UPA00212
    title: UniPathway UPA00212
    statement: >-
      The local UPA00212 membership set contains phaG as the P. putida KT2440
      gene connecting de novo fatty-acid synthesis to polyhydroxyalkanoate
      biosynthesis.
  - source_id: file:PSEPK/phaG/phaG-ai-review.yaml
    title: Curated phaG review
    statement: >-
      The phaG review records PhaG as a 3-hydroxyacyl-ACP:CoA transacylase
      involved in poly(3-hydroxyalkanoate) biosynthesis and notes that the
      exact in vivo mechanism is still debated.
  - source_id: file:PSEPK/phaG/phaG-uniprot.txt
    title: UniProtKB reviewed entry for phaG
    statement: >-
      UniProt describes PhaG as (R)-3-hydroxydecanoyl-ACP:CoA transacylase,
      places it in polyhydroxyalkanoate biosynthesis, and records UPA00212.
  - source_id: PMID:9727022
    title: "A new metabolic link between fatty acid de novo synthesis and polyhydroxyalkanoic acid synthesis. The PHAG gene from Pseudomonas putida KT2440 encodes a 3-hydroxyacyl-acyl carrier protein-coenzyme a transferase."
    statement: >-
      The primary P. putida KT2440 phaG paper cloned phaG and established it
      as the metabolic link between de novo fatty-acid synthesis and PHA
      biosynthesis.
  - source_id: file:PSEPK/phaG/phaG-deep-research-falcon.md
    title: Falcon deep research report for phaG
    statement: >-
      The gene-level Falcon report supports PhaG as a PHA monomer-supply
      enzyme and highlights redundancy with other KT2440 monomer-supply routes.
  - source_id: file:PSEPK/phaG/phaG-deep-research-asta.md
    title: Asta literature retrieval for phaG
    statement: >-
      Asta first-pass retrieval was run for phaG. It did not add stronger
      direct evidence than the curated PMID, UniProt, and Falcon sources.
  - source_id: file:modules/mcl_pha_monomer_supply_from_fas-deep-research-openscientist.md
    title: OpenScientist module research for mcl-PHA monomer supply from FAS
    statement: >-
      OpenScientist module-level research supports PhaG as the de novo
      fatty-acid-synthesis bridge to mcl-PHA monomer supply, but identifies the
      transacylase-versus-thioesterase mechanism and possible need for a
      separate 3-hydroxyacyl-CoA ligase as the dominant curation issue.
  - source_id: file:projects/P_PUTIDA/deep-research/PSEPK__mcl_pha_monomer_supply_from_fas__upa00212-deep-research-openscientist.md
    title: OpenScientist PSEPK UPA00212 pathway satisfiability review
    statement: >-
      The PSEPK-specific OpenScientist report treats phaG as covered for the
      UPA00212 membership set, but flags PP_0763/Q88PT5 as a likely missing
      3-hydroxyacyl-CoA ligase step if the curated module is intended to reach
      the CoA-thioester substrate used by PHA synthases.
notes: >-
  First-pass interpretation: UPA00212 is satisfiable as the PhaG fatty-acid
  synthesis to mcl-PHA monomer-supply bridge, but the module is only partly
  satisfiable if interpreted as complete CoA-thioester monomer production. It
  should not be merged with the full PHA synthase/polymerization step, because
  the KT2440 PhaC1/PhaC2 polymerases are handled in the broader butanoate/PHA
  boundary module. It also should not imply PhaG is the sole route to PHA
  monomers, because KT2440 has alternative beta-oxidation/PhaJ-linked inputs.
  OpenScientist's PSEPK-specific review highlights PP_0763/Q88PT5 as a candidate
  missing 3-hydroxyacyl-CoA ligase that should be promoted from the orphan bucket
  to a full gene review before claiming the complete CoA-activation route.
module:
  id: mcl_pha_monomer_supply_from_fas
  label: mcl-PHA monomer supply from de novo fatty-acid synthesis
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: poly(3-hydroxyalkanoate) biosynthetic process
      term:
        id: GO:0042621
        label: poly(3-hydroxyalkanoate) biosynthetic process
      description: Downstream biological process fed by PhaG-derived mcl-PHA monomers.
  context:
    cellular_components:
      - preferred_term: cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: >-
          PhaG acts on ACP-bound fatty-acid-synthesis intermediates and
          CoA-thioester products in the bacterial cytoplasmic metabolic pool.
      - preferred_term: polyhydroxyalkanoate granule
        term:
          id: GO:0070088
          label: polyhydroxyalkanoate granule
        description: >-
          Downstream PHA synthases polymerize supplied monomers at PHA storage
          granules; this is context, not direct localization evidence for PhaG.
  parts:
    - order: 1
      role: PhaG bridge from FAS intermediates to mcl-PHA monomers
      node:
        id: phag_fas_to_mcl_pha_monomer_supply
        label: PhaG FAS-to-mcl-PHA monomer supply
        module_type: REACTION
        description: >-
          PhaG diverts ACP-bound de novo fatty-acid-synthesis intermediates
          toward mcl-PHA monomer supply. The curated reaction is kept
          direction-neutral because the physiological mechanism has been
          described as direct ACP:CoA transacylation and, in later reports, as
          thioesterase-like release of a free 3-hydroxy fatty acid followed by
          acyl-CoA ligation.
        annotons:
          - id: phaG_3_hydroxyacyl_ACP_CoA_transacylase
            label: "phaG: 3-hydroxyacyl-ACP:CoA transacylase"
            participant:
              selector_type: GENE_PRODUCT
              gene_product:
                preferred_term: PSEPK phaG
                term:
                  id: UniProtKB:O85207
                  label: (R)-3-hydroxydecanoyl-ACP:CoA transacylase
            function:
              preferred_term: acyltransferase activity
              term:
                id: GO:0016746
                label: acyltransferase activity
              substrates:
                - preferred_term: (R)-3-hydroxyacyl-acyl carrier protein
                - preferred_term: coenzyme A
              products:
                - preferred_term: (R)-3-hydroxy fatty acid or (R)-3-hydroxyacyl-CoA
                - preferred_term: acyl carrier protein
            processes:
              - preferred_term: poly(3-hydroxyalkanoate) biosynthetic process
                term:
                  id: GO:0042621
                  label: poly(3-hydroxyalkanoate) biosynthetic process
            locations:
              - preferred_term: cytoplasm
                term:
                  id: GO:0005737
                  label: cytoplasm
            role_description: >-
              Supplies or releases mcl-PHA monomer precursors from
              fatty-acid-synthesis intermediates for downstream CoA activation
              and PhaC1/PhaC2 polymerization.
  knowledge_gaps:
    - gap_statement: >-
        GO currently lacks a PhaG-specific molecular-function term for
        (R)-3-hydroxyacyl-ACP:CoA transacylase activity, so the module and gene
        review use broad transferase/acyltransferase parents and propose a
        more specific term.
      boundary: >-
        Do not replace the pathway-level PHA biosynthesis annotation with a
        vague transferase annotation; keep the missing MF term as a curation
        gap.
      gap_kind:
        - CURATION
    - gap_statement: >-
        The dominant in vivo mechanism and chain-length range of KT2440 PhaG
        remain incompletely resolved.
      boundary: >-
        Keep the module direction-neutral and avoid asserting that PhaG is the
        sole or essential KT2440 PHA monomer-supply route.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        If PhaG acts primarily as a thioesterase, complete production of the
        CoA-thioester substrate used by PhaC1/PhaC2 requires a separate
        3-hydroxyacyl-CoA ligase. The PSEPK-specific OpenScientist report
        identifies PP_0763/Q88PT5 as the likely KT2440 candidate, but this gene
        is currently outside the single-gene UPA00212 membership set.
      boundary: >-
        Do not add PP_0763 to the curated module as a confirmed annoton until it
        has a full gene review and direct supporting evidence is checked; track
        it as the next pathway-hole candidate for this module.
      gap_kind:
        - BIOLOGY
        - CURATION
    - gap_statement: >-
        PhaC1/PhaC2 polymerization and beta-oxidation/PhaJ-derived monomer
        supply are adjacent PHA biology but outside the single-gene UPA00212
        membership set.
      boundary: >-
        Use this module for the PhaG FAS-to-PHA bridge and the
        butanoate/PHA-boundary module for broader PHA storage-polymer context.
      gap_kind:
        - BIOLOGY
