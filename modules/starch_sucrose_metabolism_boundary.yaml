id: MODULE:starch_sucrose_metabolism_boundary
title: Starch and sucrose metabolism boundary
description: >-
  Broad boundary module for KEGG ppu00500 in Pseudomonas putida KT2440. The
  PSEPK membership centers on bacterial glycogen/alpha-glucan metabolism,
  trehalose formation from maltooligosaccharides, UDP-glucose-dependent
  cellulose synthesis, and shared sugar-phosphate or cell-envelope precursor
  nodes. The module separates those contexts rather than treating the KEGG map
  as a plant-like starch/sucrose pathway.
status: DRAFT
evidence:
  - source_id: KEGG:ppu00500
    title: Starch and sucrose metabolism - Pseudomonas putida KT2440
    statement: >-
      KEGG ppu00500 provides the PSEPK curation batch. Its membership includes
      glycogen synthase, branching, debranching, and phosphorylase enzymes; the
      GlgE/TreS/TreY/TreZ alpha-glucan and trehalose cluster; cellulose synthase
      BcsA; beta-glucosidase BglX; and shared glucose/UDP-glucose precursor
      enzymes.
module:
  id: starch_sucrose_metabolism_boundary
  label: Starch and sucrose metabolism boundary
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: carbohydrate metabolic process
      term:
        id: GO:0005975
        label: carbohydrate metabolic process
      description: Broad context for sugar-phosphate and glucan metabolism.
    - preferred_term: glycogen biosynthetic process
      term:
        id: GO:0005978
        label: glycogen biosynthetic process
      description: Bacterial alpha-glucan/glycogen synthesis and branching.
    - preferred_term: glycogen catabolic process
      term:
        id: GO:0005980
        label: glycogen catabolic process
      description: Alpha-glucan/glycogen debranching, transfer, and phosphorylysis.
    - preferred_term: trehalose biosynthetic process
      term:
        id: GO:0005992
        label: trehalose biosynthetic process
      description: Formation of trehalose from maltooligosaccharide or maltose-derived substrates.
    - preferred_term: cellulose biosynthetic process
      term:
        id: GO:0030244
        label: cellulose biosynthetic process
      description: UDP-glucose-dependent bacterial cellulose synthesis.
    - preferred_term: UDP-alpha-D-glucose metabolic process
      term:
        id: GO:0006011
        label: UDP-alpha-D-glucose metabolic process
      description: UDP-glucose precursor supply shared with cellulose and envelope polysaccharide pathways.
  context:
    cellular_components:
      - preferred_term: bacterial cytoplasm
        term:
          id: GO:0005737
          label: cytoplasm
        description: Most alpha-glucan and trehalose enzymes are soluble cytoplasmic enzymes.
      - preferred_term: bacterial plasma membrane
        term:
          id: GO:0005886
          label: plasma membrane
        description: BcsA is the membrane-integrated cellulose synthase catalytic subunit.
  parts:
    - order: 1
      role: Shared sugar-phosphate and UDP-glucose precursor supply
      node:
        id: sugar_phosphate_udp_glucose_supply
        label: Sugar-phosphate and UDP-glucose precursor supply
        module_type: METABOLIC_PATHWAY
        description: >-
          Glucose phosphorylation, phosphoglucose isomerase, phosphoglucomutase,
          phosphomannomutase, and UDP-glucose pyrophosphorylase reactions supply
          shared precursors for glycogen, cellulose, and cell-envelope
          polysaccharides.
        annotons:
          - id: glk_glucokinase_boundary
            label: "glk: glucokinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glk
            function:
              preferred_term: glucokinase activity
              term:
                id: GO:0004340
                label: glucokinase activity
            role_description: Glucose entry to glucose 6-phosphate; shared carbohydrate context.
          - id: pgi1_glucose_6_phosphate_isomerase_boundary
            label: "pgi1: glucose-6-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgi1
            function:
              preferred_term: glucose-6-phosphate isomerase activity
              term:
                id: GO:0004347
                label: glucose-6-phosphate isomerase activity
            role_description: Shared fructose/glucose phosphate interconversion.
          - id: pgi2_glucose_6_phosphate_isomerase_boundary
            label: "pgi2: glucose-6-phosphate isomerase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgi2
            function:
              preferred_term: glucose-6-phosphate isomerase activity
              term:
                id: GO:0004347
                label: glucose-6-phosphate isomerase activity
            role_description: Second glucose-6-phosphate isomerase paralog.
          - id: pgm_phosphoglucomutase_boundary
            label: "pgm: phosphoglucomutase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: pgm
            function:
              preferred_term: phosphoglucomutase activity
              term:
                id: GO:0004614
                label: phosphoglucomutase activity
            role_description: Glucose 1-phosphate precursor supply.
          - id: galU_udp_glucose_pyrophosphorylase_boundary
            label: "galU: UDP-glucose pyrophosphorylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: galU
            function:
              preferred_term: UTP:glucose-1-phosphate uridylyltransferase activity
              term:
                id: GO:0003983
                label: UTP:glucose-1-phosphate uridylyltransferase activity
            role_description: UDP-glucose production for cellulose and envelope polysaccharides.
    - order: 2
      role: Bacterial cellulose synthesis
      node:
        id: bacterial_cellulose_synthesis
        label: BcsA cellulose synthase branch
        module_type: METABOLIC_PATHWAY
        description: >-
          BcsA is the membrane cellulose synthase catalytic subunit. In KEGG
          ppu00500 it is a cellulose/UDP-glucose branch, separate from glycogen
          and trehalose metabolism.
        annotons:
          - id: bcsA_cellulose_synthase
            label: "bcsA: cellulose synthase catalytic subunit"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bcsA
            function:
              preferred_term: cellulose synthase (UDP-forming) activity
              term:
                id: GO:0016760
                label: cellulose synthase (UDP-forming) activity
            role_description: UDP-glucose-dependent beta-1,4-glucan/cellulose polymerization.
    - order: 3
      role: Glycogen and alpha-glucan synthesis
      node:
        id: glycogen_alpha_glucan_synthesis
        label: Bacterial glycogen and alpha-glucan synthesis
        module_type: METABOLIC_PATHWAY
        description: >-
          GlgA/GlgB support classic bacterial glycogen synthesis and branching.
          GlgE/TreS/TreSB-related reactions connect maltose-1-phosphate and
          alpha-glucan metabolism.
        annotons:
          - id: glgA_glycogen_synthase
            label: "glgA: glycogen synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glgA
            function:
              preferred_term: alpha-1,4-glucan glucosyltransferase (ADP-glucose donor) activity
              term:
                id: GO:0009011
                label: alpha-1,4-glucan glucosyltransferase (ADP-glucose donor) activity
            role_description: Bacterial glycogen synthase activity.
          - id: glgB_branching_enzyme
            label: "glgB: glycogen branching enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glgB
            function:
              preferred_term: 1,4-alpha-glucan branching enzyme activity
              term:
                id: GO:0003844
                label: 1,4-alpha-glucan branching enzyme activity
            role_description: Alpha-glucan branch formation in glycogen biosynthesis.
          - id: glgE_maltosyltransferase
            label: "glgE: alpha-glucan:maltose-1-phosphate maltosyltransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glgE
            function:
              preferred_term: hexosyltransferase activity
              term:
                id: GO:0016758
                label: hexosyltransferase activity
            role_description: GlgE-route alpha-glucan extension from maltose-1-phosphate.
          - id: treSB_maltose_glucosyltransferase
            label: "treSB: maltose alpha-D-glucosyltransferase/maltokinase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: treSB
            function:
              preferred_term: maltose alpha-D-glucosyltransferase activity
              term:
                id: GO:0047471
                label: maltose alpha-D-glucosyltransferase activity
            role_description: Maltose/maltose-1-phosphate interconversion branch feeding GlgE-route alpha-glucan metabolism.
    - order: 4
      role: Glycogen and alpha-glucan turnover
      node:
        id: glycogen_alpha_glucan_turnover
        label: Alpha-glucan transfer, debranching, and phosphorylysis
        module_type: METABOLIC_PATHWAY
        description: >-
          MalQ, GlgX, and GlgP are alpha-glucan turnover enzymes. They should be
          distinguished from cellulose synthesis and from shared sugar-phosphate
          precursor nodes.
        annotons:
          - id: malQ_4_alpha_glucanotransferase
            label: "malQ: 4-alpha-glucanotransferase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: malQ
            function:
              preferred_term: 4-alpha-glucanotransferase activity
              term:
                id: GO:0004134
                label: 4-alpha-glucanotransferase activity
            role_description: Alpha-glucan chain transfer/disproportionation.
          - id: glgX_glycogen_debranching
            label: "glgX: glycogen debranching enzyme"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glgX
            function:
              preferred_term: amylo-alpha-1,6-glucosidase activity
              term:
                id: GO:0004135
                label: amylo-alpha-1,6-glucosidase activity
            role_description: Glycogen/alpha-glucan debranching.
          - id: glgP_glucan_phosphorylase
            label: "glgP: alpha-1,4-glucan phosphorylase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: glgP
            function:
              preferred_term: glycogen phosphorylase activity
              term:
                id: GO:0008184
                label: glycogen phosphorylase activity
            role_description: Phosphorolytic alpha-glucan/glycogen degradation.
    - order: 5
      role: Maltooligosaccharide-derived trehalose
      node:
        id: maltooligosaccharide_trehalose
        label: TreY/TreZ maltooligosaccharide trehalose route
        module_type: METABOLIC_PATHWAY
        description: >-
          TreY and TreZ support the maltooligosaccharide-derived trehalose route.
          This is a trehalose side branch inside the broader starch/sucrose KEGG
          map.
        annotons:
          - id: treY_maltooligosyl_trehalose_synthase
            label: "treY: maltooligosyl trehalose synthase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: treY
            function:
              preferred_term: (1,4)-alpha-D-glucan 1-alpha-D-glucosylmutase activity
              term:
                id: GO:0047470
                label: (1,4)-alpha-D-glucan 1-alpha-D-glucosylmutase activity
            role_description: Converts maltooligosaccharide termini toward maltooligosyltrehalose.
          - id: treZ_maltooligosyltrehalose_trehalohydrolase
            label: "treZ: maltooligosyltrehalose trehalohydrolase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: treZ
            function:
              preferred_term: 4-alpha-D-(1->4)-alpha-D-glucanotrehalose trehalohydrolase activity
              term:
                id: GO:0033942
                label: 4-alpha-D-(1->4)-alpha-D-glucanotrehalose trehalohydrolase activity
            role_description: Hydrolyzes maltooligosyltrehalose to trehalose.
    - order: 6
      role: Beta-glucoside/glucan side context
      node:
        id: beta_glucosidase_side_context
        label: Periplasmic beta-glucosidase side context
        module_type: METABOLIC_PATHWAY
        description: >-
          BglX is included by KEGG ppu00500 as a beta-glucosidase/cellobiose
          side node. It is useful boundary context but is not part of bacterial
          glycogen or trehalose synthesis.
        annotons:
          - id: bglX_beta_glucosidase
            label: "bglX: periplasmic beta-glucosidase"
            participant:
              selector_type: GENE
              gene:
                preferred_term: bglX
            function:
              preferred_term: beta-glucosidase activity
              term:
                id: GO:0008422
                label: beta-glucosidase activity
            role_description: Beta-glucoside/glucan hydrolysis side context.
