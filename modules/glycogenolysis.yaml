id: MODULE:glycogenolysis
title: Glycogenolysis (glycogen breakdown to glucose-1/6-phosphate) — GSD III/V/VI, PGM1-CDG
description: >-
  Glycogenolysis is the cytosolic breakdown of stored glycogen to release glucose
  units for glycolysis (muscle) or blood-glucose maintenance (liver). Glycogen
  phosphorylase (the rate-limiting, PLP-dependent enzyme; muscle PYGM, liver PYGL,
  brain PYGB isoforms) sequentially phosphorolyses the alpha-1,4-glycosidic bonds at
  the non-reducing ends of glycogen, releasing glucose-1-phosphate, until it stalls
  about four glucose residues from an alpha-1,6 branch point (leaving a "limit
  dextrin"). The bifunctional glycogen debranching enzyme (AGL) then remodels the
  branch: its 4-alpha-glucanotransferase activity transfers a maltotriosyl unit to a
  nearby chain, exposing the single alpha-1,6-linked glucose, which its
  amylo-alpha-1,6-glucosidase activity hydrolyses to free glucose — restoring a
  linear chain that phosphorylase can continue to degrade. Finally phosphoglucomutase
  (PGM1) reversibly isomerises the glucose-1-phosphate to glucose-6-phosphate (via a
  glucose-1,6-bisphosphate intermediate, Mg2+-dependent), which enters glycolysis or,
  in liver/kidney, is dephosphorylated by the glucose-6-phosphatase system for export
  as free glucose. Inherited defects define glycogen storage diseases: PYGM deficiency
  causes GSD V (McArdle disease, exercise intolerance/myoglobinuria); PYGL deficiency
  GSD VI (Hers disease, hepatomegaly/hypoglycemia); AGL deficiency GSD III
  (Cori/Forbes disease, with abnormal limit-dextrin-like glycogen); and PGM1 deficiency
  PGM1-CDG (a mixed glycogenosis and congenital disorder of glycosylation).
status: DRAFT
evidence:
  - source_id: GO:0005980
    title: glycogen catabolic process
    statement: >-
      The module is grounded in the GO glycogen catabolic process (GO:0005980):
      phosphorolysis (PYGL/PYGM), debranching (AGL) and G1P/G6P isomerisation (PGM1).
  - source_id: Reactome:R-HSA-70221
    title: Glycogen breakdown (glycogenolysis)
    statement: >-
      Step order and reaction stoichiometries follow the human Reactome
      "Glycogen breakdown (glycogenolysis)" pathway (R-HSA-70221): phosphorolysis
      (R-HSA-71590), debranching (R-HSA-71552 transferase, R-HSA-71593 glucosidase)
      and PGM1 isomerisation (R-HSA-9638125).
  - source_id: file:human/PYGL/PYGL-ai-review.yaml
    title: PYGL gene review (human)
    statement: >-
      The liver glycogen-phosphorylase step (UniProtKB:P06737, GO:0008184) matches
      the completed human PYGL review.
  - source_id: file:human/PYGM/PYGM-ai-review.yaml
    title: PYGM gene review (human)
    statement: >-
      The muscle glycogen-phosphorylase step (UniProtKB:P11217, GO:0008184) matches
      the completed human PYGM review.
  - source_id: file:human/AGL/AGL-ai-review.yaml
    title: AGL gene review (human)
    statement: >-
      The bifunctional debranching step (UniProtKB:P35573, GO:0004134 + GO:0004135)
      matches the completed human AGL review.
  - source_id: file:human/PGM1/PGM1-ai-review.yaml
    title: PGM1 gene review (human)
    statement: >-
      The glucose-1-phosphate to glucose-6-phosphate isomerisation step
      (UniProtKB:P36871, GO:0004614) matches the completed human PGM1 review.
module:
  id: glycogenolysis
  label: Glycogenolysis (glycogen breakdown)
  module_type: METABOLIC_PATHWAY
  concepts:
    - preferred_term: glycogen catabolic process
      term:
        id: GO:0005980
        label: glycogen catabolic process
      description: >-
        Cytosolic breakdown of glycogen to glucose-1-phosphate (phosphorolysis +
        debranching) and its isomerisation to glucose-6-phosphate.
  context:
    cellular_components:
      - preferred_term: cytosol
        term:
          id: GO:0005829
          label: cytosol
        description: The glycogenolytic enzymes are cytosolic.
  parts:
    - order: 1
      role: phosphorolysis of the alpha-1,4 chains (rate-limiting)
      node:
        id: phosphorylase_step
        label: glycogen(n) + phosphate to glucose-1-phosphate + glycogen(n-1) / limit dextrin
        module_type: REACTION
        annotons:
          - id: phosphorylase_activity
            label: "PYGL/PYGM/PYGB: glycogen phosphorylase"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycogen phosphorylase family (PYGL/PYGM/PYGB)
                term:
                  id: PANTHER:PTHR11468
                  label: GLYCOGEN PHOSPHORYLASE
                representative_members:
                  - preferred_term: PYGL (human, liver isoform)
                    term:
                      id: UniProtKB:P06737
                      label: Glycogen phosphorylase, liver form
                  - preferred_term: PYGM (human, muscle isoform)
                    term:
                      id: UniProtKB:P11217
                      label: Glycogen phosphorylase, muscle form
            function:
              preferred_term: glycogen phosphorylase activity
              term:
                id: GO:0008184
                label: glycogen phosphorylase activity
              substrates:
                - preferred_term: glycogen (alpha-1,4 non-reducing ends)
                - preferred_term: phosphate
              products:
                - preferred_term: alpha-D-glucose 1-phosphate
                - preferred_term: glycogen(n-1) / limit dextrin
              evidence:
                - source_id: EC:2.4.1.1
                  statement: glycogen phosphorylase (1,4-alpha-oligoglucan phosphorylase); PLP cofactor
                - source_id: Reactome:R-HSA-71590
                  statement: "glycogen-glycogenin-2 + n orthophosphate => limit dextrin-glycogenin-2 (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Rate-limiting, PLP-dependent homodimeric phosphorylase releasing
              glucose-1-phosphate from glycogen non-reducing ends until ~4 residues
              from an alpha-1,6 branch (allosterically activated by AMP; covalently
              activated b->a by phosphorylase kinase). Tissue isoforms: PYGM (muscle,
              GSD V/McArdle), PYGL (liver, GSD VI/Hers), PYGB (brain).
    - order: 2
      role: debranching of the alpha-1,6 branch points
      node:
        id: debranching_step
        label: limit dextrin to linear glycogen + free glucose (transferase + glucosidase)
        module_type: REACTION
        annotons:
          - id: agl_activity
            label: "AGL: glycogen debranching enzyme (bifunctional)"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Glycogen debranching enzyme family (AGL)
                term:
                  id: PANTHER:PTHR10569
                  label: GLYCOGEN DEBRANCHING ENZYME
                representative_members:
                  - preferred_term: AGL (human)
                    term:
                      id: UniProtKB:P35573
                      label: Glycogen debranching enzyme
            function:
              preferred_term: amylo-alpha-1,6-glucosidase activity
              term:
                id: GO:0004135
                label: amylo-alpha-1,6-glucosidase activity
              substrates:
                - preferred_term: limit dextrin (alpha-1,6-branched)
                - preferred_term: water
              products:
                - preferred_term: linear alpha-1,4-glucan
                - preferred_term: free D-glucose
              evidence:
                - source_id: EC:3.2.1.33
                  statement: amylo-alpha-1,6-glucosidase (with 4-alpha-glucanotransferase EC 2.4.1.25, GO:0004134)
                - source_id: Reactome:R-HSA-71552
                  statement: "limit dextrin-glycogenin => ((1,6)-alpha-glucosyl)poly((1,4)-alpha-glucosyl) (human Reactome transferase reaction)"
                - source_id: Reactome:R-HSA-71593
                  statement: "((1,6)-alpha-glucosyl)poly((1,4)-alpha-glucosyl)glycogenin => poly{(1,4)-alpha-glucosyl} (human Reactome glucosidase reaction, releasing free glucose)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Single-polypeptide bifunctional enzyme with two activities: a
              4-alpha-glucanotransferase (GO:0004134) that transfers a maltotriosyl
              unit to expose the alpha-1,6-linked glucose, and an
              amylo-alpha-1,6-glucosidase (GO:0004135) that hydrolyses it to free
              glucose, regenerating a linear chain for continued phosphorolysis.
              Deficiency causes GSD III (Cori/Forbes disease).
    - order: 3
      role: isomerisation into the hexose-phosphate pool
      node:
        id: pgm1_step
        label: glucose-1-phosphate to glucose-6-phosphate
        module_type: REACTION
        annotons:
          - id: pgm1_activity
            label: "PGM1: phosphoglucomutase-1"
            participant:
              selector_type: FAMILY
              family:
                preferred_term: Phosphoglucomutase / phosphohexomutase family (PGM1)
                term:
                  id: PANTHER:PTHR22573
                  label: PHOSPHOHEXOMUTASE FAMILY MEMBER
                representative_members:
                  - preferred_term: PGM1 (human)
                    term:
                      id: UniProtKB:P36871
                      label: Phosphoglucomutase-1
            function:
              preferred_term: phosphoglucomutase activity
              term:
                id: GO:0004614
                label: phosphoglucomutase activity
              substrates:
                - preferred_term: alpha-D-glucose 1-phosphate
              products:
                - preferred_term: alpha-D-glucose 6-phosphate
              evidence:
                - source_id: EC:5.4.2.2
                  statement: phosphoglucomutase (Mg2+-dependent; glucose-1,6-bisphosphate intermediate)
                - source_id: Reactome:R-HSA-9638125
                  statement: "PGM1:Mg2+ isomerises G1P to G6P (human Reactome reaction)"
            locations:
              - preferred_term: cytosol
                term:
                  id: GO:0005829
                  label: cytosol
            role_description: >-
              Mg2+-dependent mutase interconverting glucose-1-phosphate and
              glucose-6-phosphate at the junction of glycogen metabolism and
              glycolysis/gluconeogenesis. In glycogenolysis it converts the G1P
              from phosphorylase into G6P; deficiency causes PGM1-CDG.
  connections:
    - source: phosphorylase_step
      target: debranching_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        Phosphorylase stalls ~4 residues from a branch, producing the limit dextrin
        that AGL debranches.
    - source: debranching_step
      target: phosphorylase_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        AGL restores a linear alpha-1,4 chain, allowing phosphorylase to resume
        phosphorolysis (the phosphorylase/debranching cycle).
    - source: phosphorylase_step
      target: pgm1_step
      connection_type: PROVIDES_INPUT_FOR
      description: >-
        The glucose-1-phosphate released by phosphorylase is isomerised to
        glucose-6-phosphate by PGM1.
  notes: >-
    Three-step cytosolic glycogenolysis grounded to the human enzymes glycogen
    phosphorylase (PYGL, UniProtKB:P06737 / PYGM, P11217; GO:0008184, EC 2.4.1.1),
    the bifunctional debranching enzyme AGL (P35573; GO:0004134 + GO:0004135, EC
    2.4.1.25 / 3.2.1.33) and phosphoglucomutase PGM1 (P36871; GO:0004614, EC 5.4.2.2).
    GO molecular-function terms were taken from the human GOA records; Reactome
    reaction ids and titles were verified against the local reactome cache. The
    phosphorylase step uses a PANTHER family selector (PTHR11468) generic over the
    three human isoforms PYGL/PYGM/PYGB and their orthologs, with PYGL and PYGM as
    representative members; AGL and PGM1 likewise use family selectors plus a human
    representative. Downstream, glucose-6-phosphate enters glycolysis or, in liver
    and kidney, is dephosphorylated by the glucose-6-phosphatase system (G6PC1 +
    SLC37A4) for export as free glucose (not yet reviewed). Phosphorylase-kinase
    activation of phosphorylase (the PHK complex; GSD IX) and glycogen synthesis are
    out of scope for this degradation module. PGM1 runs reversibly and also serves
    glycogen synthesis and the galactose Leloir pathway (its non-glycogenolytic roles
    are captured in the PGM1 gene review). Disorders: PYGM -> GSD V (McArdle);
    PYGL -> GSD VI (Hers); AGL -> GSD III (Cori/Forbes); PGM1 -> PGM1-CDG.
