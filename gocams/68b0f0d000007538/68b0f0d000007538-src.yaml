id: gomodel:68b0f0d000007538
title: Glucocorticoid biosynthetic process 2 (Mouse)
taxon: NCBITaxon:10090
status: production
date_modified: '2026-03-12'
comments:
- 'Automated change 2026-03-12: GO:0005615 replaced by GO:0005576'
- This is the major pathway of glucocorticoid biosynthesis in the adult mouse adrenal
  gland. Corticosterone rather than cortisol is the major glucocorticoid species generated
  (PMID:29069360). The cortisol pathway functions during embryogenesis (PMID:15169901).
