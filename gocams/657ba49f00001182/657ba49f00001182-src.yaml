id: gomodel:657ba49f00001182
title: 'astrocytic Best1-mediated glutamate on

  postsynaptic NMDARs upon PAR-1 activation (Human)'
taxon: NCBITaxon:9606
status: production
date_modified: '2025-04-14'
comments:
- "Previous data already showed that PARs activate\nphospholipase C (PLC), which converts\
  \ membrane bound\nphosphatidyl inositol (4,5)-bisphosphate into inositol\ntrisphosphate\
  \ (InsP3) and diacylglycerol. InsP3 diffuses\ninto the cytoplasm and triggers release\
  \ of Ca2\x01 from the\nendoplasmic reticulum by binding to InsP3 receptors\n(Wang\
  \ et al., 2002b)."
