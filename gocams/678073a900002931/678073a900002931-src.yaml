id: gomodel:678073a900002931
title: fatty acid biosynthetic process (GO:0006633)
taxon: NCBITaxon:4896
status: production
date_modified: '2026-04-07'
comments:
- 'Automated change 2025-04-24: GO:0004108 replaced by GO:0036440'
- SPAPB2B4.06 appears to be a mitochondrial paralogy of the4, but I couldn't find
  how fatty acids might be generated from fatty-acyl-[ACP]
- etr1 enoyl-ACP reductase activity produces the general compound CHEBI:78784 in its
  Rhea reaction, as it acts at the end of every round of fatty acid elongation in
  the mitochondria. We have modelled it producing the more specific compound CHEBI:78463
  at the end of the final round of elongation, so that we can join it with the first
  step of the protein lipoylation pathway.
