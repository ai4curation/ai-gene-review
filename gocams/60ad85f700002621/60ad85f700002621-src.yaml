id: gomodel:60ad85f700002621
title: Transcription Factor - Target Gene NR3C1 BLM FES HDDC3 MAN2A2
taxon: NCBITaxon:9606
status: production
date_modified: '2026-06-05'
comments:
- 'Automated change 2023-03-16: RO:0002213 replaced by RO:0002407'
- 'These four genes (BLM, FES, MAN2A2, HDDC3) are next to each other on chr15q26.1
  and all 4 are driven by one enhancer bound by GR within a BLM intron. This model
  is an attempt to capture this ''one enhancer for four target gene promoters'' system.
  Furthermore, they reside in the same Topologically Associated Domain (TAD).


  This model evolved to having one NR3C1 glucocorticoid receptor activity unit because
  in this case it binds to ONE enhancer that activates the proomoters of its four
  target genes.'
