id: gomodel:6882d2b800000941
title: mitochondrial small ribosomal subunit assembly (Dmel)
taxon: NCBITaxon:7227
status: production
date_modified: '2025-09-16'
comments:
- 'This model is based on human mitochondrial small ribsome assembly in PMID:37169615
  and PMID:36482135. CG3862 is orthologous to human RCC1L - GEF and RNA binding, contributes
  to assembly of large and small SUs, but functional aspect of this unknown so left
  unconnected. PMID: 32735630'
