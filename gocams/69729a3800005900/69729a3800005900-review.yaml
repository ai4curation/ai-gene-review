  notes: >-
    USP18 directly positively regulates (stabilizes) SLC7A11 via
    "cysteine-type deubiquitinase activity" (GO:0004843), part_of negative
    regulation of ferroptosis (the rescue arm). The biological claim is CORRECT
    and specifically established by PMID:38959043 (Gou et al., PNAS 2024, "The
    CRL3-KCTD10 ubiquitin ligase-USP18 axis coordinately regulates cystine uptake
    and ferroptosis by modulating SLC7A11"), which shows USP18 counteracts
    CRL3-KCTD10 ubiquitylation to stabilize SLC7A11 - so the MF is appropriate and
    my earlier ISG15-specificity concern is resolved. The QC issue is a
    REFERENCE error, not a biology error: every evidence assertion on this USP18
    activity cites PMID:30404837, whose abstract (verified) contains no mention of
    USP18, SLC7A11, ferroptosis, or deubiquitinase - it is the
    "Cullin-3-KCTD10-mediated CEP97 degradation promotes primary cilium formation"
    ciliogenesis paper. PMID:30404837 is the correct source for KCTD10's generic
    CRL3 substrate-adaptor machinery (and is correctly cited on the sibling KCTD10
    activity), and appears to have been INHERITED onto USP18 when it was modelled
    as the antagonist mirror of KCTD10 (identical sole reference, identical
    occurs_in GO:0005737), while the actual ferroptosis source (PMID:38959043) that
    motivates the whole sub-model was never attached. This is a mechanically-valid
    but semantically-wrong citation (the PMID resolves and its title matches the
    real record) - flagged MISSING_EVIDENCE; the model should re-cite this activity
    (and the KCTD10->SLC7A11->ferroptosis framing) to PMID:38959043.
