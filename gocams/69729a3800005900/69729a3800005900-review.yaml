model: gomodel:69729a3800005900
title: KCTD10-mediated degradation of  SLC7A11 leading to regulation of ferroptosis
  (Human)
taxon: NCBITaxon:9606
status: COMPLETE
summary: >-
  An opposed-regulation model of the ferroptosis-defense node SLC7A11 (system
  xc-). The terminal defense activity is SLC7A11 cystine:glutamate antiporter
  activity, part_of L-glutamate transmembrane transport and ultimately part_of
  negative regulation of ferroptosis (i.e. SLC7A11 is the suppressor). Two opposed
  arms set its abundance: a CRL3 destabilizer arm - CUL3 (ligase-complex scaffold)
  positively regulates the KCTD10 BTB substrate adaptor, which positively
  regulates the RBX1 RING ligase, which (via SLC7A11 ubiquitination) directly
  negatively regulates SLC7A11 and is part_of positive regulation of ferroptosis;
  and a deubiquitinase rescue arm - USP18 directly positively regulates SLC7A11
  and is part_of negative regulation of ferroptosis. This instantiates a reusable
  motif: opposed destabilizer (E3/degradation) vs stabilizer (DUB) control of a
  ferroptosis-defense factor, with the same role topology as the GPX4/CMA-vs-EGLN3
  model (gomodel:680ad14200007201) but entirely different concrete machinery -
  evidence that the motif is a genuine abstraction rather than a one-off.
