  with (because this model has different upstream pathways for different tRNAs)
- 'basic pathway https://www.researchgate.net/publication/6852717_A_Peroxisomal_Glutathione_Transferase_of_Saccharomyces_cerevisiae_Is_Functionally_Related_to_Sulfur_Amino_Acid_Metabolism/figures?lo=1

  '
- 'see https://github.com/geneontology/go-ontology/issues/28833 foir an explanation
  of the alternative cysteine synthase specificity/inputs

