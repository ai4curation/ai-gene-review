comments:
- 'PMID: 38425362  COQ9 has been shown to facilitate COQ7 activity in vivo38,39. Consistently,
  addition of COQ9 increased catalytic efficiency by 1.5-fold, substantiating its
  role for COQ7 function (Fig. 5b and Extended Data Fig. 2).

  '
- 'PMID: 38425362 . We therefore hypothesized that COQ8B could act as a COQ3 kinase.
  Intact protein MS validated this idea: COQ3, but not COQ6, is phosphorylated by
  COQ8B at multiple sites (Supplementary Fig. 13). This finding resonates with the
  work by Clarke and co-workers demonstrating that yeast mitochondrial Coq3 is phosphorylated48.
  Consistent with the increased activities for COQ6:COQ3, we noticed that this pair
  stimulates ATPase activity of COQ8B by ten-fold '
- https://www.frontiersin.org/files/Articles/626971/fonc-11-626971-HTML/image_m/fonc-11-626971-g001.jpg
- https://www.mdpi.com/2072-6643/11/9/2221
- https://www.pombase.org/reference/PMID:37156397
