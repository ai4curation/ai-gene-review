model: gomodel:680ad14200007201
title: GPX4 hydroxylation by EGLN3 prevents its degradation via chaperone-mediated
  autophagy, inhibiting ferroptosis (Human).
taxon: NCBITaxon:9606
status: IN_PROGRESS
summary: >-
  An opposed-regulation model of the ferroptosis-defense node GPX4. The terminal
  defense activity is GPX4 phospholipid-hydroperoxide glutathione peroxidase
  activity, part_of negative regulation of ferroptosis (the suppressor). Two
  opposed arms set its abundance: a chaperone-mediated-autophagy (CMA)
  destabilizer arm - HSPA8 (HSC70 adaptor) provides input for LAMP2 (LAMP2A CMA
  receptor), which directly negatively regulates GPX4, both nested part_of
  positive regulation of ferroptosis; and a stabilizer arm - EGLN3/PHD3
  (peptidyl-proline 4-dioxygenase) hydroxylates GPX4 and "removes input for"
  (RO:0012010) the HSPA8 CMA step, blocking degradation and thereby stabilizing
  GPX4 (part_of protein stabilization -> negative regulation of ferroptosis). The
  stabilizer arm is supplied upstream by PSAT1 (producing the 2-oxoglutarate
  co-substrate the dioxygenase needs) under positive regulation by CAMK2A. This
  is the same reusable motif as the SLC7A11 CRL3-vs-USP18 model
  (gomodel:69729a3800005900) - opposed destabilizer (degradation) vs stabilizer
  control of a ferroptosis-defense factor - implemented here with a completely
  different destabilizer (CMA, not a CRL) and a PTM-based stabilizer (prolyl
  hydroxylation, not a DUB), which is strong evidence the motif is a real
  abstraction.
