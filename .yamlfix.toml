[tool.yamlfix]
# Only process YAML files, not CSV/TSV/other files
exclude = ["cache/", "reports/", "*.csv", "*.tsv"]
line_length = 80
sequence_style = "block_style"
# Keep 2-space indentation for sequences inside mappings
# This matches the hand-authored style: "  - item" not "- item"
indent_mapping = 2
indent_offset = 2
indent_sequence = 4
# Don't reorder keys - schema slot order matters
allow_duplicate_keys = false
# Preserve existing quoting where possible
quote_basic_values = false
quote_keys_and_basic_values = false
