condition_overlap:
  assessment: SIGNIFICANT
  notes: >-
    The use of 267 different InterPro domains suggests extensive functional 
    diversity and likely overlap in captured protein functions. Many domains 
    likely appear in proteins with primary functions unrelated to gene 
    expression regulation, creating high false positive risk. Without systematic 
    analysis of domain overlap and specificity, the rule's precision cannot 
    be assessed.
  supported_by:
  - reference_id: "analysis:domain_diversity"
    supporting_text: "267 unique InterPro domains across diverse taxonomic groups suggests extensive functional overlap"

go_specificity:
  assessment: TOO_BROAD
  notes: >-
    GO:0010468 "regulation of gene expression" is an extremely broad biological 
    process term that provides minimal functional information. The term encompasses 
    virtually any process affecting gene expression frequency, rate, or extent, 
    including transcriptional, post-transcriptional, and post-translational 
    mechanisms. Modern GO annotation practices favor more specific terms that 
    provide mechanistic insight.
  supported_by:
  - reference_id: "https://www.ebi.ac.uk/QuickGO/services/ontology/go/terms/GO:0010468"
    supporting_text: "Any process that modulates the frequency, rate or extent of gene expression. Gene expression is the process in which a gene's coding sequence is converted into a mature gene product (protein or RNA)"

taxonomic_scope:
  assessment: TOO_BROAD
  notes: >-
    The rule spans 134 different taxonomic groups from Bacteria to Mammalia, 
    suggesting indiscriminate application across all life without consideration 
    of lineage-specific gene regulatory mechanisms. This broad taxonomic scope, 
    combined with the diverse domain collection, suggests the rule attempts to 
    capture all possible gene expression regulators rather than focusing on 
    well-defined functional families.
  supported_by:
  - reference_id: "analysis:taxonomic_distribution"
    supporting_text: "Rule conditions span 134 different taxonomic groups including Bacteria, Eukaryota, Mammalia, and numerous other lineages"

