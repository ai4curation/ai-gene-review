id: ARBA00026991
description: 'ARBA rule with 83 condition sets targeting diverse metabolic enzymes (glycolysis, TCA cycle, electron transport, glycogen metabolism) for broad energy metabolism annotation GO:0015980'
status: COMPLETE
rule_type: ARBA
rule:
  rule_id: ARBA00026991
  condition_sets: []
  go_annotations: []
  reviewed_protein_count: 0
  unreviewed_protein_count: 0
  created_date: '2021-10-20'
  modified_date: '2025-05-15'
  entries:
  - id: GO:0015980
    type: GO_TERM
    label: energy derivation by oxidation of organic compounds
review_summary: 'Extremely complex rule (83 condition sets) with inappropriate scope and design. Combines mechanistically distinct metabolic pathways under an overly broad GO term. Excessive taxonomic restrictions contradict pathway conservation. Likely source of over-annotation and curator burden. Exceeds analytical capacity and violates ARBA best practices. Strong candidate for retirement and replacement with pathway-specific rules.'
action: DEPRECATE
action_rationale: 'Rule violates fundamental ARBA design principles: (1) Excessive complexity with 83 condition sets exceeds maintainability and analytical capacity, (2) Mechanistic incoherence combining unrelated metabolic pathways, (3) Overly broad GO term (GO:0015980) inappropriate for specific enzymes, (4) Taxonomic over-restriction contradicting metabolic pathway conservation, (5) High risk of over-annotation and false positives. Rule should be deprecated and replaced with smaller, pathway-specific rules using appropriate GO terms.'
suggested_modifications:
- 'Replace with separate rules for glycolysis (GO:0006096), TCA cycle (GO:0006099), oxidative phosphorylation (GO:0006119), and glycogen metabolism (GO:0005977/GO:0005978)'
- 'Each replacement rule should have <12 condition sets focusing on core, conserved enzymes'
- 'Remove taxonomic restrictions for universally conserved metabolic enzymes'
- 'Use CATH FunFams for higher specificity and reduced promiscuity risk'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule has 83 condition sets, far exceeding the recommended maximum of 12 and making analysis computationally prohibitive. Contains multiple condition sets targeting related enzymes within same pathways (e.g., multiple pyruvate kinase FunFams, multiple phosphoglycerate kinase FunFams), indicating significant redundancy. Complexity suggests poor rule design rather than biological necessity.'
literature_support:
  assessment: CONTRADICTED
  notes: 'While individual enzymes are well-characterized, the rule design contradicts established principles: (1) Central metabolic pathways are highly conserved across taxa, yet rule uses narrow taxonomic restrictions, (2) GO annotation best practices recommend specific terms over broad ones, (3) Individual metabolic pathways merit separate annotations rather than umbrella terms'
  supported_by:
  - reference_id: file:rules/arba/ARBA00026991/ARBA00026991-deep-research-manual.md
    supporting_text: 'Central metabolic pathways (glycolysis, TCA cycle, oxidative phosphorylation) are highly conserved across life forms. The extreme taxonomic specificity in this rule contradicts this biological principle. The GO Consortium recommends using the most specific applicable term. GO:0015980 is inappropriately broad for specific metabolic enzymes.'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Cannot perform quantitative analysis due to rule complexity (83 condition sets), but manual inspection reveals multiple condition sets targeting closely related enzymes. Examples include multiple FunFams for pyruvate kinase, phosphoglycerate kinase, and NADH dehydrogenase subunits. This suggests substantial redundancy and potential for conflicting annotations.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00026991/ARBA00026991-deep-research-manual.md
    supporting_text: 'With 83 condition sets targeting related metabolic enzymes, significant domain overlap is highly probable, creating redundant annotations. Examples: pyruvate kinase (multiple FunFams: 2.40.33.10:FF:000023, etc.), phosphoglycerate kinase (multiple FunFams: 3.40.50.1260:FF:000019, etc.)'
go_specificity:
  assessment: TOO_BROAD
  notes: 'GO:0015980 "energy derivation by oxidation of organic compounds" is extremely broad, encompassing virtually all catabolic metabolism. Specific enzyme classes merit more precise annotations: glycolytic enzymes should use GO:0006096, TCA cycle enzymes GO:0006099, electron transport chain GO:0022904, etc. Broad term creates low-value annotations.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00026991/ARBA00026991-deep-research-manual.md
    supporting_text: 'GO:0015980 is inappropriately broad for specific metabolic enzymes that could be annotated with more precise terms like: GO:0006096 (glycolytic process), GO:0006099 (tricarboxylic acid cycle), GO:0022904 (respiratory electron transport chain)'
taxonomic_scope:
  assessment: TOO_NARROW
  notes: 'Rule applies inappropriate taxonomic restrictions to universally conserved metabolic enzymes. Many condition sets are restricted to very specific taxa (e.g., Rodentia, Muroidea, Haplorrhini) for enzymes like glycolytic and TCA cycle components that are conserved across all domains of life. This contradicts biological reality and limits appropriate annotations.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00026991/ARBA00026991-deep-research-manual.md
    supporting_text: 'Many condition sets have very narrow taxonomic restrictions (e.g., Rodentia, Muroidea) for universally conserved metabolic enzymes, suggesting poor rule design. Central metabolic pathways are highly conserved across life forms.'
