id: ARBA00090047
description: 'This rule annotates proteins containing the SepA cytokinesis protein domain (CATH FunFam 1.20.58.2220:FF:000006) in Taphrinomycotina fungi with the highly specific GO term GO:1904498 (protein localization to mitotic actomyosin contractile ring). The rule targets a well-characterized cytokinesis regulator but applies an extremely specific localization annotation that requires strong experimental validation.'
