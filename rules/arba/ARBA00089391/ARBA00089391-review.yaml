review_summary: 'This rule presents significant biological concerns by predicting spermidine transport for two functionally distinct transporter families. The MFS multidrug transporter domain (1.20.1250.20:FF:000011) is associated with broad-spectrum drug efflux, while the urea active transporter domain (1.20.1730.10:FF:000006) is specifically adapted for urea transport. Neither family has established biological connection to spermidine transport. The low coverage (21.8% and 60% respectively) suggests poor predictive accuracy. The taxonomic restrictions appear arbitrary and lack biological justification.'
action: DEPRECATE
action_rationale: 'The rule should be deprecated because it conflates functionally distinct transporter families without biological evidence supporting spermidine transport function. MFS multidrug transporters are specialized for xenobiotic efflux, while urea transporters are adapted for specific nitrogenous waste transport. The low coverage rates indicate poor specificity, and the taxonomic restrictions lack clear biological rationale. The rule is likely to generate false positive annotations.'
suggested_modifications:
- 'N/A - recommend complete removal rather than modification'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'The rule combines two functionally unrelated transporter families (MFS multidrug and urea transporters) under different taxonomic constraints without biological justification. This complexity is not warranted and suggests the rule was created by merging disparate functional predictions without proper validation.'
literature_support:
  assessment: NONE
  notes: 'No literature support found linking either MFS multidrug transporters or urea active transporters to spermidine transport. MFS multidrug transporters are well-characterized for xenobiotic efflux, while urea transporters are specialized for nitrogen waste management. Spermidine transport is typically mediated by polyamine-specific transporters with distinct structural and functional characteristics.'
  supported_by:
  - reference_id: 'general biochemical knowledge'
    supporting_text: 'MFS multidrug transporters are characterized by broad substrate specificity for toxic compounds and drugs, not polyamine transport. Urea transporters belong to a distinct family specialized for urea and related compounds.'
condition_overlap:
  assessment: NONE
  notes: 'The two domain conditions show complete disjoint (Jaccard similarity = 0.0), indicating they identify completely different protein sets. This supports the assessment that these are functionally distinct families that should not be grouped under a single annotation rule.'
  supported_by:
  - reference_id: 'file:rules/arba/ARBA00089391/ARBA00089391-analysis.yaml'
    supporting_text: 'jaccard_similarity: 0.0, containment_a_in_b: 0.0, containment_b_in_a: 0.0, interpretation: DISJOINT'
go_specificity:
  assessment: MISMATCHED
  notes: 'GO:1903711 (spermidine transmembrane transport) is a specific and appropriate term, but it mismatches the biological functions of the condition domains. Neither MFS multidrug transporters nor urea active transporters have established roles in spermidine transport based on their known substrate specificities and physiological functions.'
  supported_by:
  - reference_id: 'biochemical knowledge'
    supporting_text: 'Spermidine transport is mediated by specialized polyamine transporters, not by multidrug efflux pumps or urea channels'
taxonomic_scope:
  assessment: UNNECESSARY
  notes: 'The taxonomic restrictions (Taphrinomycotina for MFS multidrug, all Fungi for urea transporters) appear arbitrary and lack biological justification. If these transporters truly mediated spermidine transport, the function would likely be conserved across broader taxonomic groups. The differential taxonomic restrictions suggest these may be annotation artifacts rather than biologically meaningful constraints.'
  supported_by:
