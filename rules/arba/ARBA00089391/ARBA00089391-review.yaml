description: 'ARBA00089391 predicts spermidine transmembrane transport (GO:1903711)
  for fungal proteins containing either MFS multidrug transporter domains (in Taphrinomycotina)
  or urea active transporter domains (in all Fungi). The rule combines taxonomic
  restrictions with functionally distinct transporter families.'
