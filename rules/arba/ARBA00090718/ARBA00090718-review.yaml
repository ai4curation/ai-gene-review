review_summary: This rule contains a critical functional mismatch, assigning (S)-2-hydroxyglutarate dehydrogenase activity to proteins with D-3-phosphoglycerate dehydrogenase domains. These are biochemically distinct enzymatic activities with different substrates, products, and metabolic roles. The rule creates false positive annotations and should be removed.
action: DEPRECATE
action_rationale: Clear functional mismatch between condition (D-3-phosphoglycerate dehydrogenase) and annotation ((S)-2-hydroxyglutarate dehydrogenase). These enzymes have distinct substrates, products, cofactors, and metabolic pathways. The rule produces false positive annotations and should be deprecated to prevent misleading functional genomics analyses.
suggested_modifications: []
parsimony:
  assessment: PARSIMONIOUS
  notes: Single condition set with one FunFam condition is structurally simple and parsimonious, though functionally incorrect
literature_support:
  assessment: CONTRADICTED
  notes: Biochemical literature clearly distinguishes D-3-phosphoglycerate dehydrogenase (EC 1.1.1.95, serine biosynthesis) from (S)-2-hydroxyglutarate dehydrogenase (EC 1.1.99.2, 2-hydroxyglutarate metabolism). No evidence found for dual functionality.
  supported_by:
  - reference_id: file:rules/arba/ARBA00090718/ARBA00090718-deep-research-manual.md
    supporting_text: These are biochemically distinct enzymatic activities with different substrates (D-3-phosphoglycerate vs (S)-2-hydroxyglutarate), products, cofactors, and metabolic pathways
condition_overlap:
  assessment: NONE
  notes: Single condition set with one FunFam condition - no internal overlap possible. External analysis shows 0 overlap with related IPR030862
  supported_by:
  - reference_id: file:rules/arba/ARBA00090718/ARBA00090718-analysis.txt
    supporting_text: '3.40.50.720:FF:000041 ↔ IPR030862: Jaccard similarity: 0.000, Interpretation: DISJOINT'
go_specificity:
  assessment: MISMATCHED
  notes: GO:0047545 ((S)-2-hydroxyglutarate dehydrogenase activity) is appropriately specific but incorrectly matched to the D-3-phosphoglycerate dehydrogenase domain condition
  supported_by:
  - reference_id: file:rules/arba/ARBA00090718/ARBA00090718-deep-research-manual.md
    supporting_text: The GO term is specific and accurate for its intended enzyme, but mismatched to proteins containing D-3-phosphoglycerate dehydrogenase domains
taxonomic_scope:
  assessment: TOO_BROAD
  notes: No taxonomic restrictions applied. Rule would incorrectly annotate D-3-phosphoglycerate dehydrogenases across all taxa with wrong enzymatic activity
  supported_by:
  - reference_id: file:rules/arba/ARBA00090718/ARBA00090718-deep-research-manual.md
    supporting_text: The rule applies broadly without taxonomic restriction, creating false positive annotations across all domains of life
