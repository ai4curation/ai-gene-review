id: ARBA00023002
status: COMPLETE
rule_type: ARBA
description: "Extremely large rule with 2105 condition sets combining 975 InterPro domains and 1489 CATH FunFam families to annotate oxidoreductase proteins across all domains of life"
action: MODIFY
action_rationale: "While the majority of condition sets correctly identify oxidoreductases, the rule contains clear false positives (e.g., kinases, phosphatases) and overly broad structural domains that compromise specificity. The rule's enormous size (2105 condition sets) makes comprehensive validation impossible and creates maintenance challenges. Additionally, providing only keyword annotations without GO terms limits biological utility."

