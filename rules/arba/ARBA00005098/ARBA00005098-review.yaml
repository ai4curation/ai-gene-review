review_summary: 'This rule has fundamental design flaws that make it unsuitable for GO annotation. The most critical issue is the complete absence of GO term annotations - the rule only provides pathway information. Additionally, it inappropriately groups functionally distinct enzymes (arginase and agmatinase) and has inconsistent taxonomic restrictions. While the biological pathway information is accurate, the lack of molecular function GO terms renders this rule useless for GO annotation purposes. This explains why it was flagged in the GO annotation issue tracker.'
action: DEPRECATE
action_rationale: 'This rule should be deprecated because: (1) It provides no GO term annotations, only pathway information, making it unsuitable for GO annotation purposes; (2) It inappropriately conflates functionally distinct enzymes (arginase EC 3.5.3.1 vs agmatinase EC 3.5.3.11) that should have different molecular function annotations; (3) It has inconsistent and poorly justified taxonomic restrictions; (4) The broad condition set creates significant redundancy through nested subset relationships. A complete redesign would be needed to make this rule useful for GO annotation.'
suggested_modifications:
- 'Split into separate rules for arginase (EC 3.5.3.1) and agmatinase (EC 3.5.3.11)'
- 'Add appropriate GO molecular function terms: GO:0004053 (arginase activity) and GO:0052689 (carboxylic acid dimethylamide hydrolase activity) for agmatinase'
- 'Simplify condition sets by removing redundant InterPro hierarchies'
- 'Justify or remove taxonomic restrictions based on phylogenetic evidence'
- 'Add cellular component annotations where appropriate (mitochondrial vs cytosolic forms)'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule has significant redundancy issues. Condition set 1 contains three nested InterPro terms where IPR014033 ⊆ IPR006035 ⊆ IPR023696, creating unnecessary complexity. The 8 condition sets target both related and unrelated enzymes, violating parsimony principles.'
