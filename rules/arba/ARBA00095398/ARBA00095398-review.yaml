id: ARBA00095398
description: "Deprecated ARBA rule that inappropriately annotated ribosomal protein L12.1/L12A with ribophagy function"
status: COMPLETE
rule_type: ARBA
rule:
  rule_id: ARBA00095398
  condition_sets: []
  go_annotations: []
  entries: []

action: DEPRECATE
action_rationale: |
  This rule represents a fundamental biological error by annotating structural ribosomal proteins with a process (ribophagy) that degrades ribosomes. The rule has been correctly removed from the ARBA system.
  
  Key issues:
  1. Functional contradiction - ribosomal structural proteins cannot mediate ribosome degradation
  2. No literature support for L12 proteins in autophagy mechanisms  
  3. Violates basic cell biology principles
  4. Reported in GitHub issue #6365 as problematic

review_summary: |
  ARBA00095398 was identified as a problematic rule that annotated ribosomal proteins L12.1/L12A with ribophagy function. 
  This represents a fundamental biological error as:
  
  1. Ribosomal proteins are structural components essential for translation
  2. Ribophagy is a selective autophagy process that DEGRADES ribosomes
  3. No literature supports L12 proteins having any role in autophagy mechanisms
  4. The annotation contradicts basic cell biology principles
  
  The rule has been appropriately removed from the ARBA system, indicating that quality control 
  mechanisms identified and corrected this error. This case highlights the importance of biological 
  validation in automated annotation systems.

