action_rationale: 'Recommended for deprecation due to: 1) Zero protein coverage indicating potential issues with rule conditions, 2) Novel GO annotation not supported by InterPro2GO mappings, 3) Extremely narrow taxonomic restriction without clear biological justification, 4) Lack of accessible evidence linking the specific CATH FunFam domain to spermine transport function, 5) High risk of false positive annotations without experimental validation of the domain-function relationship.'
