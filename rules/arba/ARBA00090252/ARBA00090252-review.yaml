review_summary: 'This rule incorrectly assigns an export process function to structural ribosomal proteins. The targeted proteins (RPL40, L10a) are components of the ribosomal subunit that gets exported, not factors that mediate the export process. Export is actually performed by dedicated adapter proteins like NMD3. The rule conflates being part of an exported complex with mediating the export process itself. High domain overlap (90% Jaccard) in condition set 2 indicates redundancy. The rule should be deprecated as it creates misleading functional annotations.'
action: DEPRECATE
action_rationale: 'The rule fundamentally misassigns function by annotating structural ribosomal proteins with an export process. Ribosomal proteins L40 and L10a are incorporated into the 60S subunit during assembly and are exported AS CARGO, not as export mediators. True export factors like NMD3 have adapter activity and provide nuclear export signals. This annotation violates GO principles by confusing components with processes. The rule would create systematic false annotations across fungal proteomes.'
suggested_modifications:
- 'Rule cannot be meaningfully modified - fundamental conceptual error'
parsimony:
  assessment: REDUNDANT
  notes: 'Condition set 2 shows 90% Jaccard similarity between ribosomal protein domains, indicating near-complete redundancy. Condition set 1 has 63.6% overlap between ubiquitin-ribosomal fusions. Multiple condition sets targeting essentially the same protein families.'
literature_support:
  assessment: CONTRADICTED
  notes: 'Deep research analysis reveals literature clearly distinguishes between export factors and ribosomal structural proteins. Export is mediated by adapter proteins like TMA16, NMD3, and eIF6, not by ribosomal proteins themselves. Ribosomal proteins are exported as cargo, not as export mediators.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-deep-research-summary.md
    supporting_text: 'Export factors (TMA16, NMD3, eIF6) have adapter/regulatory activity and provide export signals, while ribosomal proteins (RPL40, RPL10A) are structural components that are passengers in the export process'
  - reference_id: file:genes/human/TMA16/TMA16-deep-research-falcon.md
    supporting_text: 'TMA16 functions as export adapter in pre-60S pathway, listed alongside eIF6, NMD3, LLPH as pre-60S export/maturation factors (Junod et al., iScience, 2023)'
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-biological-research.md
    supporting_text: 'Export factors like NMD3 facilitate transport but are not ribosomal components. The rule conflates structural proteins with export machinery.'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Condition set 2 has 90% Jaccard similarity indicating near-identical protein sets. Condition set 1 has 63.6% overlap. Both sets are disjoint from each other, suggesting they target different protein families for the same incorrect annotation.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-analysis.yaml
    supporting_text: 'jaccard_similarity: 0.9, containment_a_in_b: 0.9642857142857143, containment_b_in_a: 0.9310344827586207, interpretation: SUBSET'
go_specificity:
  assessment: MISMATCHED
  notes: 'GO:0000055 describes an active export process, but the rule targets passive cargo (ribosomal proteins). Correct terms would be GO:0003735 (structural constituent of ribosome) or GO:0006412 (translation).'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-biological-research.md
    supporting_text: 'Ribosomal proteins L40 and L10a are involved in: Translation (GO:0006412), Ribosome structural components (GO:0003735), Assembly of ribosomal subunits during biogenesis. They do NOT actively mediate nuclear export.'
taxonomic_scope:
  assessment: APPROPRIATE
  notes: 'Fungal restriction is reasonable for these specific domain families, though the functional annotation itself is incorrect regardless of taxonomy.'
  supported_by: []
