review_summary: 'This rule exhibits a fundamental biological misconception by annotating structural ribosomal protein components with a transport process (nuclear export). Ribosomal proteins L40 and L10a are structural components of the large ribosomal subunit that are transported AS CARGO during nuclear export, but they do not mediate or perform the export process itself. The rule shows poor specificity with only 12-28% of targeted proteins actually overlapping with the GO term annotation. High domain overlap within condition sets indicates redundancy. The taxonomic restriction to fungi appears arbitrary given that ribosomal export occurs in all eukaryotes.'
action: DEPRECATE
action_rationale: 'This rule should be deprecated because it represents a fundamental misunderstanding of the biological process. It incorrectly annotates structural ribosomal proteins with a transport function they do not perform. The proteins are cargo in the export process, not the export machinery. Low coverage (12-28%) indicates poor specificity, and the rule would create numerous false positive annotations. InterPro entries IPR027312 and IPR037700 already provide more appropriate coverage for this GO term with 100% containment.'
suggested_modifications: []
parsimony:
  assessment: REDUNDANT
  notes: 'Condition set 2 shows 90% Jaccard similarity between ribosomal protein domains, indicating near-complete redundancy. Condition set 1 shows high overlap (64% Jaccard) between ubiquitin-fusion domains. The rule could be simplified, but fundamental biological issues make it unsuitable regardless.'
literature_support:
  assessment: CONTRADICTED
  notes: 'Literature clearly demonstrates that ribosomal proteins are structural components, not export factors. Nuclear export of ribosomal subunits is mediated by dedicated export machinery including Exportin-1/CRM1, Nmd3, and Lsg1. Ribosomal proteins are substrates (cargo) of this process, not mediators.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-manual-research.md
    supporting_text: 'Proteins actually involved in ribosomal large subunit nuclear export include Exportin-1, Nmd3, Lsg1, and nuclear pore components. Ribosomal proteins are structural components that become part of exported subunits but do not mediate export.'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Condition set 2 shows 90% Jaccard similarity between ribosomal protein domains (3.30.190.20:FF:000006 and 3.30.190.20:FF:000009), indicating substantial redundancy. Condition set 1 shows 64% Jaccard overlap between ubiquitin-fusion domains. Cross-condition overlap is appropriately zero, indicating the sets target distinct protein families.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-analysis.yaml
    supporting_text: 'jaccard_similarity: 0.9, containment_a_in_b: 0.964, containment_b_in_a: 0.931, interpretation: SUBSET for domains 3.30.190.20:FF:000006 and 3.30.190.20:FF:000009'
go_specificity:
  assessment: MISMATCHED
  notes: 'GO:0000055 describes a transport process (nuclear export), while the rule targets structural protein components. This is a categorical mismatch - the GO term describes a biological process performed by transport machinery, but the rule annotates structural components that are transported. The specificity level is irrelevant when the functional category is incorrect.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-manual-research.md
    supporting_text: 'The rule annotates ribosomal protein components with ribosomal large subunit export from nucleus. However, ribosomal proteins are COMPONENTS of the ribosome, not export factors.'
taxonomic_scope:
  assessment: TOO_NARROW
  notes: 'Nuclear export of ribosomal large subunits occurs in all eukaryotes, yet this rule restricts annotations to Fungi (condition 1) and Dikarya (condition 2). If the biological annotation were correct, such taxonomic restriction would be unjustified. However, since the fundamental annotation is incorrect, the taxonomic scope issue is secondary.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00090252/ARBA00090252-manual-research.md
    supporting_text: 'Nuclear export of ribosomal subunits occurs in all eukaryotes. If this were a valid annotation, taxonomic restriction seems arbitrary.'
