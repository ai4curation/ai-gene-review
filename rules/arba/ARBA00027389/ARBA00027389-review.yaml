id: ARBA00027389
description: 'ARBA rule with 29 condition sets predicting GO:0042546 (cell wall biogenesis) based on diverse protein families including cellulose synthases, glucan synthases, chitin deacetylases, peptidoglycan biosynthesis enzymes, fatty acid ligases, polyketide synthases, and various signaling proteins'
status: COMPLETE
rule_type: ARBA
rule:
  rule_id: ARBA00027389
  condition_sets: []
  go_annotations:
  - go_id: GO:0042546
    go_label: cell wall biogenesis
  reviewed_protein_count: 0
  unreviewed_protein_count: 0
  created_date: '2021-10-20'
  modified_date: '2025-03-21'
  entries: []
review_summary: 'This rule is overly broad and mechanistically incoherent, combining genuine cell wall biosynthesis enzymes with signaling proteins and secondary metabolite synthases. While it captures some legitimate cell wall functions, the inclusion of 29 diverse condition sets creates high false positive risk and conflates direct biosynthetic roles with regulatory functions. The rule would benefit from splitting into multiple focused rules for specific cell wall components.'
action: MODIFY
action_rationale: 'The rule contains legitimate cell wall biosynthesis functions but is overly broad and mechanistically incoherent. Many condition sets include signaling proteins (MAP kinases, Rho GTPases) and secondary metabolite synthases that should not be annotated with cell wall biogenesis. The rule should be split into focused rules for specific cell wall components (peptidoglycan, cellulose, chitin, glucan) to improve specificity and reduce false positives.'
suggested_modifications:
- 'Split into separate rules for peptidoglycan biosynthesis (condition sets with transpeptidases, ligases), cellulose biosynthesis (cellulose synthases), chitin biosynthesis (chitin deacetylases), and glucan biosynthesis (glucan synthases)'
- 'Remove signaling proteins (MAP kinases in condition sets 10, 17; Rho GTPases/GAPs in condition sets 11, 20) unless direct biosynthetic evidence exists'
- 'Carefully evaluate polyketide synthases - retain only those with demonstrated cell wall functions, remove secondary metabolite producers'
- 'Add more restrictive taxonomic constraints to prevent over-annotation across kingdoms'
- 'Consider using more specific child GO terms (e.g., GO:0045226 extracellular polysaccharide biosynthetic process, GO:0009058 biosynthetic process)'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule contains 29 condition sets covering vastly different protein functions, violating parsimony principles. Many condition sets capture unrelated biological processes (signaling, secondary metabolism) that should be separate rules. The complexity exceeds analytical limits (>12 condition sets) and creates maintenance challenges.'
literature_support:
  assessment: MODERATE
  notes: 'Mixed literature support - strong evidence for core cell wall enzymes (cellulose synthases, glucan synthases, chitin deacetylases, peptidoglycan enzymes) but weak or absent evidence for signaling proteins and secondary metabolite synthases in direct cell wall biosynthesis roles'
  supported_by:
  - reference_id: file:rules/arba/ARBA00027389/ARBA00027389-deep-research-manual.md
    supporting_text: 'Standard cell wall biogenesis pathways focus on: substrate activation, polymerization, modification, assembly and cross-linking. This rule includes many appropriate enzymes but also extends far beyond core biosynthetic functions.'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Cannot perform quantitative overlap analysis due to rule complexity (29 condition sets exceeds analytical limits), but manual inspection reveals potential functional redundancy among polyketide synthase condition sets and between different deacetylase families. Multiple condition sets target related enzyme families that may have overlapping protein sets.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00027389/ARBA00027389-deep-research-manual.md
    supporting_text: 'Multiple condition sets (6, 8, 9, 12-14, 16) contain polyketide synthase FunFams'
  - reference_id: file:rules/arba/ARBA00027389/ARBA00027389-deep-research-manual.md
    supporting_text: 'Rule ARBA00027389 has 29 condition sets, which exceeds the maximum of 12. Analysis is skipped for rules with too many condition sets'
go_specificity:
  assessment: TOO_BROAD
  notes: 'GO:0042546 (cell wall biogenesis) is appropriate for genuine cell wall biosynthesis enzymes, but the rule conflates multiple distinct biosynthetic pathways and includes non-biosynthetic functions. More specific child terms would be preferable for focused rules (e.g., peptidoglycan biosynthetic process, cellulose biosynthetic process).'
  supported_by:
  - reference_id: file:rules/arba/ARBA00027389/ARBA00027389-deep-research-manual.md
    supporting_text: 'GO:0042546 (cell wall biogenesis) is defined as "A cellular process that results in the biosynthesis of constituent macromolecules, assembly, arrangement of constituent parts, or disassembly of a cell wall." This is a broad biological process term'
taxonomic_scope:
  assessment: TOO_BROAD
  notes: 'Many condition sets lack appropriate taxonomic restrictions, risking over-annotation. Some restrictions are appropriate (e.g., cellulose synthase limited to Liliopsida), but others are too broad or missing entirely. Peptidoglycan enzymes should be restricted to bacteria, chitin enzymes to fungi, etc.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00027389/ARBA00027389-deep-research-manual.md
    supporting_text: 'Cell wall biogenesis is a fundamental process that varies significantly across kingdoms: Bacterial Cell Walls (peptidoglycan), Fungal Cell Walls (β-glucans, chitin, mannoproteins), Plant Cell Walls (cellulose, hemicellulose, pectin)'
