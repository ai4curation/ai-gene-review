id: ARBA00029057
description: 'Overly broad ARBA rule with 89 condition sets targeting diverse protein families (metabolic enzymes, structural proteins, transport proteins, kinases) for annotation with GO:0065003 protein-containing complex assembly'
status: COMPLETE
rule_type: ARBA
rule:
  rule_id: ARBA00029057
  condition_sets: []
  go_annotations: []
  reviewed_protein_count: 0
  unreviewed_protein_count: 0
  created_date: '2021-10-20'
  modified_date: '2025-09-20'
  entries: []
review_summary: 'This rule represents a fundamental misapplication of annotation principles, combining 89 biologically unrelated condition sets under an overly broad GO term. The rule lacks mechanistic coherence, has extremely high false positive risk, and violates GO annotation best practices. The massive scope makes it unmaintainable and the broad GO term provides minimal biological insight. Complete removal is strongly recommended.'
action: DEPRECATE
action_rationale: 'Deprecation is recommended due to: (1) Biological incoherence - no shared mechanistic basis across 89 condition sets spanning metabolic enzymes, structural proteins, kinases, and transport proteins; (2) Overgeneralization - GO:0065003 is too broad for meaningful annotation; (3) High false positive risk - will incorrectly annotate many proteins whose primary function is not complex assembly; (4) Maintenance burden - 89 condition sets make rule analysis impossible and updates impractical; (5) Violation of GO principles - contradicts guidelines for specificity and biological relevance. The rule provides more harm than benefit to the annotation ecosystem.'
suggested_modifications:
- 'Rule cannot be meaningfully modified - fundamental design is flawed'
- 'Recommend creating separate, focused rules for genuine complex assembly proteins'
- 'Use more specific GO terms like GO:0006457 protein folding or specific assembly processes'
- 'Limit future rules to <12 condition sets with shared mechanistic basis'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule has 89 condition sets with no shared biological rationale, making it extremely non-parsimonious. Automated analysis was impossible due to excessive size. The condition sets span completely unrelated protein families (metabolic enzymes, structural proteins, kinases, transporters) with no mechanistic coherence.'
literature_support:
  assessment: WEAK
  notes: 'While individual proteins may participate in complex assembly as secondary functions, there is no literature support for grouping these diverse protein families under a single assembly annotation. Research emphasizes annotating primary rather than incidental functions.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00029057/ARBA00029057-deep-research-manual.md
    supporting_text: 'Research consistently shows that many proteins have complex assembly as a secondary function while their primary function is catalytic or structural. Annotating proteins based on secondary functions leads to: dilution of functional specificity, confusion in pathway analysis, reduced utility for functional prediction.'
condition_overlap:
  assessment: COMPLETE
  notes: 'Analysis impossible due to 89 condition sets exceeding system limits. Manual inspection reveals condition sets targeting completely different protein families with no expected overlap. High condition count itself indicates poor design.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00029057/ARBA00029057-deep-research-manual.md
    supporting_text: 'Due to the rules excessive size (89 condition sets), automated domain overlap analysis was not performed. However, manual inspection reveals: Promiscuous domains: Many condition sets use broad structural domains that appear in multiple functional contexts; Functional mixing: Combining metabolic enzymes, structural proteins, and regulatory factors; No shared mechanistic basis: Condition sets lack a common assembly-related function'
go_specificity:
  assessment: TOO_BROAD
  notes: 'GO:0065003 protein-containing complex assembly is far too broad for meaningful annotation. It captures any protein involvement in complex formation, diluting functional specificity. More specific child terms should be used for distinct assembly processes.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00029057/ARBA00029057-deep-research-manual.md
    supporting_text: 'GO:0065003 "protein-containing complex assembly" is defined as: "The aggregation, arrangement and bonding together of a set of macromolecules to form a protein-containing complex." Problems: Too broad for meaningful annotation; Many proteins annotated (e.g., metabolic enzymes) do not primarily function in complex assembly; Mixing catalytic activities with assembly processes; No mechanistic coherence across targets'
taxonomic_scope:
  assessment: TOO_BROAD
  notes: 'Taxonomic restrictions are inconsistent and lack biological justification. Some condition sets target specific taxa (Saccharomycotina, Primates, Archaea) while others have no restrictions. The pattern appears arbitrary rather than based on evolutionary biology.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00029057/ARBA00029057-deep-research-manual.md
    supporting_text: 'The rule applies across vastly different taxonomic groups with inconsistent restrictions: Some condition sets target specific taxa (e.g., Saccharomycotina, Primates, Archaea); Others have no taxonomic restrictions; No biological justification for these taxonomic patterns'
