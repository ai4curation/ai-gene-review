  - statement: 'GLCE (glucuronyl C5-epimerase) converts glucuronic acid to iduronic acid, critical for chain flexibility and subsequent sulfation'
  - statement: 'IPR027417 (P-loop domain) is overly broad, affecting 40,360 proteins including many unrelated ATP-binding enzymes'
