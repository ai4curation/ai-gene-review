id: ARBA00035048
description: >-
  Annotates proteins with GO:0005681 "spliceosomal complex" using 18 condition sets
  (including one empty set) targeting snRNPs, DEAH-box helicases, Sm proteins, and
  auxiliary splicing factors. Known to produce false positive annotations of non-spliceosomal
  DEAH-box helicases, as flagged in GO annotation issue #4733.
status: COMPLETE
rule_type: ARBA
rule:
  rule_id: ARBA00035048
  condition_sets: []
  go_annotations: []
  reviewed_protein_count: 0
  unreviewed_protein_count: 0
  created_date: '2023-03-22'
  modified_date: '2025-03-21'
  entries: []
review_summary: >-
  ARBA00035048 annotates proteins with GO:0005681 "spliceosomal complex" using 18 condition
  sets (17 with conditions plus one empty set). The rule was flagged in GO annotation issue
  #4733 for producing false positive annotations of non-spliceosomal DEAH-box helicases in
  S. pombe, specifically dhx37/SPAPB1A10.06c (small subunit processome component),
  prh1/SPAC2G11.11c (nucleolar protein), and ucp12/SPCC895.09c (unknown function).

  The core problem is that DEAH-box helicases are highly similar to each other in sequence
  and domain architecture, but only a small subset are genuinely spliceosomal. In S. cerevisiae,
  only 4 DEAH-box ATPases are spliceosomal (Prp2, Prp16, Prp22, Prp43), with 5 in
  S. pombe and humans (PMID:37441768). Condition Set 1 (IPR002464 + IPR007502 +
  Taphrinomycotina) is particularly problematic because IPR002464 "DNA/RNA helicase,
  DEAH-box type, conserved site" is a broad signature that matches all DEAH-box helicases
  regardless of their actual biological role. Similarly, Condition Set 2 (FunFam
  3.40.50.300:FF:000007 + Fungi) uses a P-loop NTPase superfamily FunFam that likely
  captures non-spliceosomal helicases.

  The rule also contains structural quality issues: Condition Set 18 is empty (no conditions
  at all), taxonomic restrictions are inconsistent across sets, and several condition sets
  (12-17) lack any taxonomic restriction. While the GO term GO:0005681 is appropriate for
  genuine spliceosomal components, the rule's inability to distinguish spliceosomal from
  non-spliceosomal DEAH-box helicases makes it a significant source of false positive
  annotations.
action: MODIFY
action_rationale: >-
  The rule targets a legitimate biological complex but has a critical specificity problem
  with DEAH-box helicases, as documented in GO annotation issue #4733. The false positives
  are not minor edge cases but represent fundamental misannotation of proteins involved in
  completely different processes (ribosome biogenesis, nucleolar functions). Condition Set 1
  (IPR002464 + IPR007502 + Taphrinomycotina) must be replaced with more specific conditions
  that distinguish spliceosomal DEAH-box helicases from non-spliceosomal ones. Condition
  Set 18 (empty) should be removed. The remaining condition sets targeting snRNP components
  and Sm proteins are likely sound but should be validated. The rule should also be
  simplified from 18 to fewer than 12 condition sets by consolidating related FunFam-based
  conditions.
suggested_modifications:
- >-
  Remove or replace Condition Set 1 (IPR002464 + IPR007502 + Taphrinomycotina): IPR002464
  is too broad for DEAH-box helicases, matching non-spliceosomal members like dhx37, prh1,
  and ucp12. Replace with more specific InterPro signatures or FunFams that distinguish
  spliceosomal DEAH-box helicases (Prp2, Prp16, Prp22, Prp43 orthologs) from
  non-spliceosomal ones.
- >-
  Evaluate Condition Set 2 (FunFam 3.40.50.300:FF:000007 + Fungi): The P-loop NTPase
  superfamily FunFam 3.40.50.300:FF:000007 may be too broad. Verify whether this FunFam
  exclusively captures spliceosomal helicases or also matches ribosome biogenesis helicases.
- >-
  Remove Condition Set 18 (empty set with no conditions): An empty condition set is a
  data quality issue that could potentially match any protein.
- >-
  Consolidate related FunFam condition sets: Multiple sets use FunFams from the same CATH
  superfamily (e.g., 2.30.30.100 appears in Sets 8, 13, 14, 15; 3.30.70.330 appears in
  Sets 5, 6, 11, 17). Evaluate whether these can be merged.
- >-
  Standardize taxonomic restrictions: Some condition sets have narrow restrictions
  (Taphrinomycotina, Haplorrhini) while others have none. Establish consistent criteria
  based on biological distribution of the targeted protein families.
- >-
  Validate condition sets 12-17 (no taxonomic restriction): These single-FunFam conditions
  without taxonomic scope need verification that the FunFams are specific enough to not
  require taxonomic constraints.
parsimony:
  assessment: OVERLY_COMPLEX
  notes: >-
    The rule contains 18 condition sets (including one empty set), exceeding the recommended
    maximum of 12. Multiple condition sets use FunFams from overlapping CATH superfamilies
    (e.g., four sets use 2.30.30.100 FunFams, four sets use 3.30.70.330 FunFams),
    suggesting consolidation opportunities. The combination of InterPro-based conditions
    (Set 1), FunFam-based conditions (Sets 2-17), and an empty condition (Set 18) indicates
    the rule grew incrementally without periodic simplification.
  supported_by:
  - reference_id: file:rules/arba/ARBA00035048/ARBA00035048-deep-research-manual.md
    supporting_text: >-
      Excessive condition sets: 17 sets exceed practical limits for review and analysis
literature_support:
  assessment: MODERATE
  notes: >-
    While the spliceosome and its components are extensively studied, the literature
    explicitly warns against treating all DEAH-box helicases as spliceosomal. Only 4-5
    DEAH-box ATPases per organism are genuinely spliceosomal (PMID:37441768). The rule's
    condition sets for snRNP components and Sm proteins have strong support, but the
    helicase-targeting conditions (Sets 1-4) lack the specificity required by the
    literature. The false positives identified in GO issue #4733 (dhx37, prh1, ucp12)
    confirm that the rule's helicase conditions are too broad.
  supported_by:
  - reference_id: file:rules/arba/ARBA00035048/ARBA00035048-deep-research-manual.md
    supporting_text: >-
      DEAH-box helicases are well-established spliceosome components. The spliceosome
      consists of five small nuclear ribonucleoproteins (snRNPs): U1, U2, U4, U5, and
      U6, along with numerous protein cofactors.
  - reference_id: 'https://github.com/geneontology/go-annotation/issues/4733'
    supporting_text: >-
      A lot of DEAH box helicases are mapped to spliceosomes. This is because DEAH box
      helicases are highly similar to each other, but they are involved in different
      processes.
  - reference_id: 'PMID:37441768'
    supporting_text: >-
      Four DEAH-box ATPases are essential components of the spliceosome, which play an
      important role in the spliceosome activation, the splicing reaction, the release of
      the spliced mRNA and intron lariat, and the disassembly of the spliceosome.
condition_overlap:
  assessment: SIGNIFICANT
  notes: >-
    Multiple condition sets target related protein families using FunFams from the same
    CATH superfamilies. Specifically: (1) CATH 2.30.30.100 appears in Sets 8, 13, 14, 15
    with different FunFam IDs but the same structural fold, suggesting these target related
    snRNP-like proteins. (2) CATH 3.30.70.330 appears in Sets 5, 6, 11, 17, likely
    targeting related Sm/LSm proteins. (3) Sets 1-4 all target helicase families that may
    have overlapping protein membership. Without quantitative overlap analysis (which was
    not performed due to the high condition set count), the degree of protein-level
    redundancy is uncertain but structurally suggested.
  supported_by:
  - reference_id: file:rules/arba/ARBA00035048/ARBA00035048-deep-research-manual.md
    supporting_text: >-
      Potential redundancy: Multiple conditions may target overlapping protein populations
go_specificity:
  assessment: APPROPRIATE
  notes: >-
    GO:0005681 "spliceosomal complex" is the correct cellular component term for proteins
    that are bona fide components of the spliceosome. The term itself is not the problem;
    rather, the issue is that several condition sets (particularly Set 1 with IPR002464)
    match proteins that are NOT spliceosomal components, resulting in false positive
    application of an otherwise appropriate GO term. For the condition sets that do
    correctly identify spliceosomal proteins (snRNP and Sm protein conditions), this GO
    term is well-chosen.
  supported_by:
  - reference_id: file:rules/arba/ARBA00035048/ARBA00035048-deep-research-manual.md
    supporting_text: >-
      The spliceosome is a dynamic ribonucleoprotein complex responsible for removing
      introns from pre-mRNA in eukaryotes.
taxonomic_scope:
  assessment: MISSING
  notes: >-
    Taxonomic restrictions are inconsistent across the 18 condition sets. Sets 1 and 11
    are restricted to Taphrinomycotina (451866), Set 2 to Fungi (4751), Set 3 to
    Dikarya (451864), Set 4 to Eukaryota (2759), Sets 5-6 to primates/Euarchontoglires,
    Sets 7-10 to various animal clades, while Sets 12-17 have no taxonomic restriction at
    all. This inconsistency raises questions: if Set 4 requires Eukaryota restriction, why
    do Sets 12-17 with single FunFam conditions not need any taxonomic scope? The narrow
    restriction of Set 1 to Taphrinomycotina is particularly concerning because it
    specifically targets the clade where false positives were identified (S. pombe).
  supported_by:
  - reference_id: file:rules/arba/ARBA00035048/ARBA00035048-deep-research-manual.md
    supporting_text: >-
      Inconsistent restrictions: Some conditions broadly applied, others highly restricted
confidence: 0.5
