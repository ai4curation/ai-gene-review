review_summary: 'This rule represents a serious annotation quality problem. With 174 condition sets covering fundamentally different protein classes (transcription factors, kinases, adhesion molecules, structural proteins, etc.), it violates core GO annotation principles of specificity and mechanistic coherence. The GO term "cell development" is far too broad for the diverse molecular functions captured. The rule exceeds our analysis tools'' capacity (>12 condition set limit) and would generate numerous false positives by over-annotating proteins with house-keeping functions. This represents a classic case of attempting to capture broad developmental involvement rather than specific molecular mechanisms.'
action: DEPRECATE
action_rationale: 'This rule should be deprecated due to: (1) Excessive complexity with 174 condition sets that violates biological plausibility and computational feasibility, (2) Mechanistic incoherence - captures unrelated protein classes with different developmental roles, (3) Over-broad GO term that fails to provide meaningful functional annotation, (4) High false positive risk for house-keeping proteins, (5) Violation of GO annotation principles favoring specificity over generality. The rule should be replaced with multiple specific rules using appropriate molecular function and biological process terms.'
suggested_modifications:
- 'Replace with separate rules for specific protein classes (e.g., transcription factors, growth factor receptors, cell adhesion molecules)'
- 'Use specific GO terms appropriate to each protein class (e.g., GO:0003700 DNA-binding transcription factor activity, GO:0007155 cell adhesion)'
- 'Limit condition sets to ≤12 per rule for biological coherence'
- 'Apply appropriate taxonomic restrictions based on evolutionary conservation patterns'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule contains 174 condition sets, which is far beyond any reasonable threshold for coherent annotation. This exceeds our analysis tools capacity (12 condition set limit) and represents extreme over-complexity that lacks biological justification. The heterogeneous nature of captured proteins suggests this may be an inappropriate merger of multiple distinct functional categories.'
literature_support:
  assessment: WEAK
  notes: 'While individual protein classes captured by this rule are indeed involved in development, the literature does not support using the broad term "cell development" for such diverse molecular mechanisms. Most experimental studies focus on specific molecular functions rather than general developmental involvement.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00028665/ARBA00028665-deep-research-manual.md
    supporting_text: 'GO aims for specific, mechanistically coherent annotations rather than broad process categorizations. Most experimental studies of these protein families focus on specific molecular functions rather than the broad concept of cell development.'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Cannot perform quantitative analysis due to excessive number of condition sets (174 > 12 limit), but manual inspection reveals significant conceptual overlap and heterogeneity. Multiple condition sets capture related protein families that should be consolidated, while others capture completely unrelated functions that should be separated.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00028665/ARBA00028665-deep-research-manual.md
    supporting_text: 'The rule captures proteins involved in: transcriptional regulation, signal transduction, cell adhesion, cytoskeletal organization, metabolic processes. These represent fundamentally different mechanisms of contributing to development.'
go_specificity:
  assessment: TOO_BROAD
  notes: 'GO:0048468 (cell development) is far too broad for the diverse molecular functions captured by this rule. Different condition sets would be better served by specific terms like GO:0003700 (DNA-binding transcription factor activity), GO:0007155 (cell adhesion), GO:0030036 (actin cytoskeleton organization), etc.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00028665/ARBA00028665-deep-research-manual.md
    supporting_text: 'Different condition sets would be better served by different GO terms: transcription factors (regulation of transcription), growth factor receptors (receptor signaling pathways), adhesion molecules (cell adhesion processes), structural proteins (cytoskeleton organization).'
taxonomic_scope:
  assessment: TOO_BROAD
  notes: 'The rule contains wildly inconsistent taxonomic restrictions, from very specific (e.g., Drosophilidae) to very broad (e.g., Eukaryota). The overall scope is too broad given the heterogeneous nature of captured protein classes, and many individual restrictions appear arbitrary for conserved developmental proteins. This heterogeneity reflects the fundamental problem of trying to capture diverse protein classes in a single rule.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00028665/ARBA00028665-deep-research-manual.md
    supporting_text: 'Some are restricted to very specific taxa (e.g., Drosophilidae), others apply to broad groups (e.g., Eukaryota, Metazoa), many have inappropriate taxonomic restrictions for conserved proteins.'
