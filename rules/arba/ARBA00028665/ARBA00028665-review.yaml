id: ARBA00028665
description: 'Overly complex rule with 174 condition sets attempting to annotate diverse protein classes (transcription factors, kinases, adhesion molecules, structural proteins) with the broad GO term "cell development" (GO:0048468)'
status: COMPLETE
rule_type: ARBA
