    supporting_text: 'Jaccard similarities range from 0.16 to 0.50, with containment values showing laminin beta domain has 80% containment in cadherin domain (containment_b_in_a: 0.8)'
go_specificity:
  assessment: MISMATCHED
  notes: 'The GO term laminin-121 trimer (GO:0005608) is appropriately specific for a defined protein complex, but it is completely mismatched to the domain architecture this rule requires. Laminin-121 trimers have well-defined subunit composition (alpha1, beta2, gamma1) that does not include cadherin or netrin domains.'
  supported_by:
