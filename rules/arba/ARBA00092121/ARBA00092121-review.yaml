review_summary: 'ARBA00092121 represents a problematic annotation rule that lacks biological foundation. The rule attempts to connect developmentally-regulated GTP-binding proteins in fungi with positive regulation of amino acid starvation response, but this functional relationship has no support in the literature. GTP-binding proteins involved in development typically regulate morphogenesis, cell division, and vesicle trafficking, while amino acid starvation responses in fungi are mediated by well-characterized pathways involving GCN2 kinase and GCN4 transcriptional activator. The zero protein coverage indicates the rule specification is incorrect. The recent creation date (March 2025) suggests this may be an experimental annotation that should not be deployed.'
action: DEPRECATE
action_rationale: 'This rule should be removed due to: (1) Zero protein coverage indicating incorrect specification, (2) No biological basis for connecting developmentally-regulated GTP-binding proteins to amino acid starvation response regulation, (3) No literature support for this functional relationship, (4) Recent creation date suggesting experimental/problematic status.'
