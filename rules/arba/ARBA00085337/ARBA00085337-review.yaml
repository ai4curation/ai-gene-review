review_summary: 'This rule contains a mix of legitimate and problematic condition sets. Core redox homeostasis proteins (glutathione reductase, thioredoxins, peroxiredoxins - sets 2, 4, 6, 8, 9) are appropriately annotated to GO:0045454. However, 4 of 9 condition sets target proteins whose primary function is NOT redox homeostasis: NOS (set 1, primarily NO signaling), KRIT1 (set 3, primarily vascular development with indirect transcriptional redox effects), Por1p/VDAC (set 5, primarily metabolite transport), and SCO1 (set 7, copper chaperone with thioredoxin fold used for copper binding not disulfide reduction). These 4 condition sets should be removed. The rule also has domain redundancy (Jaccard=1.0 in set 3) and fragmented taxonomic scope.'
action: MODIFY
action_rationale: 'MODIFY rather than REMOVE because 5 of 9 condition sets correctly identify core redox homeostasis proteins. The 4 problematic condition sets (NOS, KRIT1, Por1p, SCO1) should be removed: NOS produces NO as a signaling molecule (NADPH consumption is catalytic, not homeostatic); KRIT1 affects redox indirectly via SOD2 transcriptional regulation; Por1p is a metabolite transporter; SCO1 uses its thioredoxin fold for copper binding not disulfide reduction. Retained sets (thioredoxins, glutathione reductase, peroxiredoxins) have strong mechanistic basis for GO:0045454.'
suggested_modifications:
- 'REMOVE condition set 1 (NOS): NOS produces nitric oxide as a signaling molecule; NADPH consumption is catalytic, not evidence of redox homeostasis. Over-annotation.'
- 'REMOVE condition set 3 (KRIT1): primary function is vascular development; redox involvement is indirect via transcriptional regulation of antioxidant genes, not direct redox homeostasis. Also has complete domain redundancy (Jaccard=1.0).'
- 'REMOVE condition set 5 (Por1p/VDAC): primary function is metabolite transport; ROS release link is indirect.'
- 'REMOVE condition set 7 (SCO1): copper chaperone with thioredoxin-like fold used for copper binding, not disulfide reduction. Structural similarity to thioredoxins does not imply functional equivalence.'
- 'RETAIN condition sets 2, 4, 6, 8, 9 (thioredoxins, glutathione reductase, peroxiredoxins, chloroplastic thioredoxin F-type): these are core redox homeostasis proteins with direct roles.'
- 'Evaluate taxonomic restrictions on retained sets: some FunFam-level restrictions may be narrower than biological distribution warrants.'
parsimony:
  assessment: OVERLY_COMPLEX
  notes: 'Rule has 9 condition sets mixing mechanistically diverse proteins. Redundancy exists within condition sets (set 3 has Jaccard=1.0 between two FunFams, set 1 has 70% overlap), not between sets. After removing 4 inappropriate condition sets, the remaining 5 sets cover genuinely distinct protein families and should be retained.'
literature_support:
  assessment: WEAK
  notes: 'Literature support is strong for core redox proteins (sets 2, 4, 6, 8, 9) but absent or contradictory for 4 condition sets: NOS literature supports NO signaling not redox homeostasis; KRIT1 literature shows indirect transcriptional effects; Por1p literature shows transport function; SCO1 literature shows copper chaperone function. The deep research file lacks actual citations (no PMIDs/DOIs), making claims unverifiable. Additional literature review needed.'
  supported_by:
  - reference_id: file:rules/arba/ARBA00085337/ARBA00085337-deep-research-manual.md
    supporting_text: 'Strong candidates: Glutathione reductase, thioredoxins, peroxiredoxins - these are core redox homeostasis proteins. Questionable candidates: KRIT1 (developmental protein with oxidative stress sensitivity), Por1p (transporter with indirect redox involvement)'
condition_overlap:
  assessment: SIGNIFICANT
  notes: 'Analysis reveals concerning overlap patterns: Set 3 contains completely redundant domains (Jaccard=1.0), Set 1 has high overlap (Jaccard=0.70), and Set 4 shows subset relationships. This indicates poor curation and unnecessary complexity.'
  supported_by: []
go_specificity:
  assessment: MISMATCHED
  notes: 'GO:0045454 is APPROPRIATE for condition sets 2, 4, 6, 8, 9 (thioredoxins, glutathione reductase, peroxiredoxins) but MISMATCHED for sets 1, 3, 5, 7 (NOS, KRIT1, Por1p, SCO1) whose primary functions are not redox homeostasis. The term itself is correct; the issue is that 4 condition sets identify proteins that do not primarily perform this function.'
  supported_by: []
taxonomic_scope:
  assessment: TOO_NARROW
  notes: 'Fragmented taxonomic restrictions across condition sets. However, this assessment needs nuance: some restrictions may reflect FunFam scope rather than biological distribution (e.g., thioredoxin FunFam FF:000104 may only capture fungal members). For condition sets recommended for removal (NOS Primates-only, etc.), taxonomic scope is moot. For retained sets, the question is whether the specific FunFams are taxon-limited or whether orthologs in other taxa are missed.'
  supported_by: []
confidence: 0.5
