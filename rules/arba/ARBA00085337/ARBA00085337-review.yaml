    notes: 'LIKELY OVER-ANNOTATION: NOS enzymes produce nitric oxide, primarily a signaling molecule. NADPH consumption is a catalytic mechanism feature, not evidence of redox homeostasis function. NOS uncoupling produces superoxide but this is pathological, not homeostatic. Primary GO annotations should be nitric-oxide synthase activity and NO biosynthetic process. Candidate for REMOVAL from this rule.'
