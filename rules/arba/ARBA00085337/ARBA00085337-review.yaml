    notes: 'OVER-ANNOTATION: KRIT1 primary function is vascular development. While KRIT1 contains a NUDIX domain shown to regulate SOD2 expression and mitochondrial ROS levels (Goitre et al., 2010; Antognelli et al., 2018), its effect on redox is indirect via transcriptional regulation of antioxidant genes, not direct redox homeostasis. Complete domain redundancy (Jaccard=1.0) between two FunFams further weakens this condition set. Candidate for REMOVAL.'
