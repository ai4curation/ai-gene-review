    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "1d0db38904205bec4d6f6f6a1f6cec3e", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "deb086867995046fabd72f93d5d490f2", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"pathway-satisfiability\"\u003EPathway satisfiability\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EIs a pathway wired up \u003Cem\u003Ehere\u003C/em\u003E \u2014 in this tissue, this genome?\u003C/strong\u003E A pathway is read as a\nlogic formula over its steps, and a context \u2014 which genes are expressed, or encoded \u2014\ndecides which steps are on. Move the slider below: human gluconeogenesis switches on in\nexactly the tissues known to make glucose, and every other tissue fails at the same\ncontrol point. The same logic then reconstructs methionine biosynthesis across microbial\ngenomes.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3d15bf5687582a54c738f990c4db225a", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "29e4bf8c95d187d31b7d6d0494e73610", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-pathway-and-its-bottleneck\"\u003EThe pathway, and its bottleneck\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EHuman gluconeogenesis can run by \u003Cstrong\u003E4\u003C/strong\u003E different isozyme combinations \u2014 but they\nall funnel through the same required steps:\u003C/span\u003E\n\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPC, G6PC1, SLC37A4\u003C/strong\u003E\u003C/span\u003E\n\u003C/blockquote\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EG6PC1\u003C/code\u003E + \u003Ccode\u003ESLC37A4\u003C/code\u003E are the terminal system that releases free glucose. A tissue missing\nthis gate can't make glucose, no matter what else it expresses \u2014 which is exactly why\nonly some tissues are gluconeogenic.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f53f540fdca975b3e4c115735d59d97f", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='lEQa-0' random-id='37676597-36e4-31b5-7704-8316fac26de3'\u003E\u003Cmarimo-slider data-initial-value='1.0' data-label='\u0026quot;\u0026#92;u003cspan class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026#92;u003e\u0026#92;u003cspan class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026#92;u003eexpression gate \u2014 median TPM \u2265\u0026#92;u003c/span\u0026#92;u003e\u0026#92;u003c/span\u0026#92;u003e\u0026quot;' data-start='0.5' data-stop='20.0' data-step='0.5' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "90cdb4e28efa61fb369e7e8b3d3b1858", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"which-tissues-can-make-glucose-expression-10-tpm\"\u003EWhich tissues can make glucose? (expression \u2265 1.0 TPM)\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EYes, in 3 of 54 tissues:\u003C/strong\u003E Kidney_Cortex, Liver, Small_Intestine_Terminal_Ileum\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ematches the textbook set: \u003Cstrong\u003EKidney_Cortex, Liver, Small_Intestine_Terminal_Ileum\u003C/strong\u003E\u003C/li\u003E\n\u003Cli\u003Efalse positives: none \u00b7 missed: none\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ERaise the slider:\u003C/em\u003E tissues drop out \u003Cstrong\u003Eliver \u2192 kidney \u2192 intestine\u003C/strong\u003E, the order of their\nreal contribution to blood glucose. Every other tissue fails at the \u003Cstrong\u003Esame\u003C/strong\u003E step \u2014\n\u003Ccode\u003EG6PC1\u003C/code\u003E \u2014 and the near-ubiquitous look-alike \u003Ccode\u003EG6PC3\u003C/code\u003E is correctly not accepted for it.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='PKri-0' random-id='553e2cd3-f199-b314-7071-56a1162dd4f4'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Kidney_Cortex\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:true,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;FBP1, PCK1, PCK2\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Liver\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:true,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;FBP1, PCK1, PCK2\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Small_Intestine_Terminal_Ileum\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:true,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;FBP1, PCK1, PCK2\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Adipose_Subcutaneous\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;G6PC1\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Adipose_Visceral_Omentum\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;G6PC1\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Adrenal_Gland\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;G6PC1\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Artery_Aorta\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;G6PC1\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;tissue\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Artery_Coronary\u0026#92;\u0026quot;,\u0026#92;\u0026quot;satisfiable\u0026#92;\u0026quot;:false,\u0026#92;\u0026quot;variants\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026quot;,\u0026#92;\u0026quot;gate failure\u0026#92;\u0026quot;:\u0026#92;\u0026quot;G6PC1\u0026#92;\u0026quot;}]\u0026quot;' data-total-rows='54' data-total-columns='4' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='true' data-page-size='8' data-show-filters='false' data-show-download='true' data-show-search='true' data-show-column-summaries='true' da
