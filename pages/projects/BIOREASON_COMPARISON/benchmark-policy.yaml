schema_version: 1
benchmark_release: argo-audit-2026-07-11
baseline_commit: f661dc2298c040d22ef8cf070c349d32616e2073

cohorts:
  argo139_rl_narrative:
    role: collected_cohort
    expected_members: 139
    membership_file: genes.csv
    prediction_suffix: -bioreason-rl-predictions.md
    review_suffix: -bioreason-rl-review.md
    model_source: app.bioreason.net/RL
    model_version: unavailable_in_web_export
    export_timestamp_source: per-file BioReason export header
    frozen_inputs:
      goa: per-gene committed TSV at baseline_commit, identified by SHA-256
      ontology_release: "2026-03-25"
      ontology_url: https://release.geneontology.org/2026-03-25/ontology/go-basic.obo
      model_input_sections: >-
        The full sequence, InterPro Domains section, and upstream GO-GPT GO Terms
        section are preserved in each committed raw web export. Per-section counts
        and SHA-256 checksums are recorded in benchmark-quality.csv.
    reference:
      source: local AIGR gene review
      interpretation: agent-adjudicated local reference, not independent expert ground truth
      status_field: status
    scoring:
      minimum: 1
      maximum: 5
      axes:
        correctness: factual support for claims that the model actually makes
        completeness: coverage of established core functions, locations, complexes, and pathway context
    input_quality:
      model_sequence_limit: 2000
      truncated_inputs_are_stratified: true
      truncated_inputs_are_excluded: false
    performance_exclusions:
      - species: worm
        symbol: csr-1
        reason: WRONG_INPUT_SEQUENCE
        details: >-
          The benchmark requested CSR-1 (Q21992), but the cached UniProt record and
          BioReason input are nhr-47 (Q17370). The resulting nuclear-receptor summary
          evaluates the supplied sequence correctly and is not a model-function error.

  argo95_sft_terms:
    role: primary_sft_term_cohort
    expected_members: 95
    parent: argo139_rl_narrative
    model_source: wanglab/protein_catalogue
    novelty_rule: >-
      COR means absent from the committed per-gene GOA snapshot; an exact GOA
      identifier match is CNN unless a separately documented temporal rule applies.

reporting:
  distinguish_collection_and_performance_denominators: true
  report_reference_status_distribution: true
  report_input_quality_distribution: true
  generated_sidecars:
    - benchmark-cohorts.csv
    - benchmark-genes.csv
    - benchmark-quality.csv
    - benchmark-metrics.json
    - second-review-agreement.json
